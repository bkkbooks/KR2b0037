body:
  text: 先是下溪州彭師晏襲州事師晏兄師綵殺其父仕羲師晏殺之事具前尋進為刺史㑹章惇經制南北江湖北提刑李平招納師晏誓下州注見前峝蠻各以其地歸版籍至是師晏遂降下溪為誓主招納其誓下故師晏亦降詔築下溪州城賜名㑹溪戍以兵隸辰州出租賦同漢民師晏詣闕授禮賔副使于是五溪注見前皆平二月以郭逵為安南招討使欽亷既陷得交人露布言中國作青苗助役之法窮困生民今出兵欲相拯濟王安石見之恚怒自草勅牓詆之以天章閣待制趙卨為招討使宦者嘉州防禦使李憲為副将兵封之憲乆在西北邊好論兵王韶之開熙河憲與有勞故用之既而卨與憲議事不合帝因問卨孰可代憲卨言逵老于邊事願以為使而已副之帝從其言仍詔占城注見前占臘即真臘國在占城南合擊交阯秋七月御史中丞鄧綰有罪免吕惠卿既出知陳州張若濟獄事具前乆不成王雱令門下客吕嘉問練亨甫氏族畧練氏見姓苑建安多此姓共取鄧綰所列惠卿事雜他書下制獄王安石不知也省吏告惠卿于陳惠卿以状聞且訟安石盡棄所學隆尚縱横之末數方命矯令罔上要君帝以状示安石安石謝無有歸以問雱雱言其情安石咎之雱忿患疽發背死帝頗厭安石所為綰慮安石去失勢乃上書言宜録安石子及婿仍賜第京師帝以語安石安石曰綰為國司直而為宰臣乞恩澤極傷國體當黜之帝以綰操心頗僻賦性姦囘論事薦人不循分守斥知虢州八月罷粥祠廟司農粥祠廟于民應天府閼伯髙辛氏之子㣲子具見前廟閼伯廟在歸徳府商邱之巔㣲子廟在歸徳府城内一名象賢祠皆在粥中判官劉摯嘆曰一至于此往見判府張方平曰獨不能為朝廷言之邪方平矍然託摯為奏曰閼伯遷商邱主祀炎火閼伯為陶唐氏火正居商邱祀大火見左傳為國家盛徳所乗㣲子宋始封之君開國此地亦本朝受命建號所因又有雙廟今曰恊忠廟在歸徳府治西乃唐張廵許逺孤城死賊事具前能捍大患今若令承買小人規利冗䙝凟慢何所不為嵗収㣲細實損國體乞留此三廟以慰邦人崇奉之意疏上帝震怒批牘尾曰慢神辱國無甚于斯于是天下祠廟皆得罷粥冬十月王安石免以吴充王珪同平章事馮京知樞宻院事安石之再相也屢謝病求去及子雱死尤悲傷不堪力請解機務帝益厭之乃以使相判江寧府尋改集禧觀使安石既退處金陵往往冩福建子三字葢深悔為吕惠卿所誤也充子安持雖娶安石女而充心不善安石所為數為帝言新法不便帝察充中立無與及安石免遂相之充欲有所變革乞召司馬光吕公著韓維蘇頌及薦孫覺李常程顥等數十人光自洛遺書充曰自新法之行中外洶洶民困于煩苛迫于誎欽愁怨流離轉死溝􅊤日夜引領冀朝廷覺悟一變敝法今日救天下之急當罷青苗免役保甲市易而息征伐之謀欲去此五者必先别利害開言路以悟人主之心今病雖已深猶未至膏肓失今不治遂為痼疾矣充不能用吕惠卿告安石罪發其私書有無使上知及勿令齊年知之語京與安石同年生故云帝以安石為欺而賢京故召用之十二月郭逵敗交阯兵于富良江一名瀘江在今安南國治北其上流即雲南之瀾滄江由普洱府流逕安南境會白鶴歸化等江逶迤以達于海李乾徳降逵次長沙先遣将復邕亷而自将西征至富良江蠻以精兵乗船逆戰官軍不能濟趙卨分遣将吏伐木治攻具機石如雨蠻船皆壊因設伏擊之斬首數千殺其偽太子洪真李乾德懼遣使奉表詣軍門納欵時官兵八萬人冒暑涉瘴地死者過半富良江去其國不逺逵不敢渡得其廣源州注見前門州思浪州蘇茂州桄榔縣地俱在今安南國界而還羣臣稱賀詔以廣源為順州赦乾德罪治劉彛沈起開釁之罪安置隨秀州已而李乾德遣使來貢表求所失州縣詔不許乾徳尋歸所掠民乃以順州賜之其後定交阯界復還其六縣二州詔宦者李憲節度秦鳯熙河諸軍棟戩将果荘先冦五牟谷在鞏昌府洮州㕔北復聚兵洮岷脇新附羌多叛歸之帝遣内侍押班李憲乗驛往秦鳯熙河措置邊事詔諸将皆受節制御史彭汝礪字器資鄱陽人等極論其不可且言果荘之患小用憲之患大憲功不成其患小功成其患大章再上不聽丁巳十年春二月王韶免韶與王安石有隙且以勤兵逺畧歸曲朝廷帝亦不悦數以母老乞歸乃出知洪州韶鑿空開邊驟躋政地然用兵有機畧臨出師召諸將授以指不後更問毎戰必㨗甞夜卧帳中前部遇敵矢石已及呼聲振山谷侍者股栗而韶鼻息自如人服其量秋七月河大決于澶州此黄河南北分流之始自開直河水勢增漲田廬益壊至是大決于澶州曹村在今開州西南北流斷絶河道南徙東滙于梁山張澤濼在兖州府夀張縣東南梁山下即古鉅野澤下流汶濟二水會而成濼宋時決河滙入其中綿亘數百里後大河南徙嵗乆填淤遂成平陸分為二𣲖一合南清河即古泗水注見前入于淮一合北清河即古濟水今自東平州北出曰鹽河流逕濟南府曰大淸河又合小清河濟之南源也古謂之濼水又東北至武定府之利津縣入于海入于海凡灌郡縣四郡縣四十五而濮齊鄆徐尤甚壊田逾三十萬頃遣使修閉判大名府文彦博言臣前奏河勢變移漫流四散若不預為經制必溢魏博恩澶之境而都水漫無施設但希省費之賞未甞増修堤􅜌今者果大決溢此非天災實人力不至也考續綱目載文彦博奏採節不明今依河渠志改輯明年決口塞詔改曹村埽曰靈平九月河南邵雍卒雍天性髙邁逈出千古而坦夷温厚不見圭角時新法行吏牽迫不可為或投劾去雍門生故友居州縣者或貽書訪之雍曰此賢者所當盡力之時新法固嚴能寛一分則民受一分之賜矣投劾何益邪程顥甞與議論終日退而嘆曰堯夫内聖外王之學也雍知慮絶人遇事能前知程顥甞曰其心虚明自能知之富弼司馬光吕公著雅敬雍雍所居曰安樂窩時逰城中乗小軒一人挽之士大夫識其車音爭相迎候或留信宿去好事者别作室以待其至謂之行窩安樂窩在洛陽天津橋南及卒顥為墓銘稱其學純一不雜汪洋浩大就其所至而論之可謂安且成矣所著皇極經世觀物内外篇漁樵問答傳于世元祜中賜諡康節冬十一月遼魏王耶律伊遜殺其君之子濬濬幼好學善騎射既立為太子兼北南院樞宻使時耶律伊遜擅政搆害宣懿皇后而立其黨蕭錫黙舊作霞抹今改之妹為后遂欲害濬㑹䕶衛蕭和克字阿斯里斯和克舊作忽古阿斯里斯舊作阿斯憐今改知伊遜姦状伏橋下欲殺之適暴雨橋壊所謀不遂乃下獄濬亦以母故有憂色副㸃檢蕭錫沙穆爾古納部人錫沙舊作十三穆爾古納舊作荗古乃今改謂伊遜曰臣民心屬太子一旦若立吾輩措身何地伊遜然之乃隂令䕶衞耶律札喇舊作查剌今改誣告都宫使耶律薩喇字董隱南院大王穆哩庫之孫薩喇舊作撒剌穆哩庫舊作磨魯古今改及和克舊作忽克今改等謀廢立按驗無状而罷既而伊遜復令蕭額都温國舅少父房之後舊作訛都斡今改等誣首札喇前告非妄遼主命伊遜及張孝傑建州永覇縣人依續綱目作耶律孝傑今遼史改等鞫治薩喇等誣服皆殺之而幽濬于别室濬具陳枉状屬耶律延格字善寧時為北面林牙舊作燕哥今改辨之延格伊遜黨也因易其言為欵伏遼主廢濬為庶人徙上京伊遜遣其私人蕭達和克舊作達魯古今改等夜引力士殺之詐云疾薨遼主命有司𦵏于龍門山在今宣化府赤城縣北既而伊遜復遣人殺濬妃蕭氏遼主後知其寃悔恨無及追諡濬曰昭懐太子同知太常禮院張載卒載自崇文歸終日危坐一室左右編簡俯而讀仰而思冇得則識之或中夜起坐取燭以書其志道精思未甞須臾息也與諸生講學每告以知禮成性變化氣質之道學必如聖人而後已以為知人而不知天求為賢人而不求為聖人此秦漢以來學者大弊也故其學以易為宗以中庸為體以孔孟為法黜怪妄辨鬼神其家婚喪葬祭率用先王之意而傅以今禮又論定井田學校之法皆欲條理成書使可舉而措諸事業吕大防薦之召同知太常禮院以疾歸而卒世稱横渠先生所著正蒙西銘等書行于世戊午元豐元年春閏正月曽孝寛罷以孫固字和父鄭州管城人同知樞宻院事初固與王安石議新法不合出知真定至是帝思其先見召用之夏六月癸卯朔日食秋九月以吕公著薛向同知樞宻院事帝臨御日乆羣臣憚上威嚴莫敢進規公著在翰林毎因事獻納帝深敬之故有是命帝甞以釋老之事語公著公著問曰堯舜知此道乎帝曰堯舜豈不知公著曰堯舜雖知此而惟以知人安民為難所以為堯舜也帝黙然向幹局絶人尤善商財計算無遺䇿然不能不病民王安石方尚功利從中主之故益得展奮由文俗吏得大用議復肉刑帝初即位韓絳曽布建議復肉刑至是復召輔臣議吕公著曰後世禮教未備而刑獄繁興肉刑不可復將有踊貴屨賤之譏王珪欲取死囚試劓刖之公著曰不可刖而不死則此法遂行矣議遂寢冬十二月復置大理獄帝以國初廢大理獄非是又開封囚猥多乃命復置己未二年春二月召程顥判武學既而罷之顥自知扶溝縣注見前召判武學命下數日李定何正臣字君表新淦人劾其學術迂濶趨向僻異且新法之初首為異論復罷之吕公著上疏言方朝廷修改法度之初凡在朝野孰無議論陛下兼包豈悉記録而小人賊害指目未已如顥者陛下早自知之其立身行已素有本末昔在言路時有論列皆辭意忠厚不失臣子之體兼所除武學亦未為仕宦要津而小人齗齗必以為不可者直欲深梗正路其所措意非特一二人而已疏奏不納顥竟歸故官夏五月元絳罷以蔡確字持正泉州晉江人參知政事確善觀人主意與時上下以王安石薦再調監察御史因為之用知帝已厭安石即論安石乗馬入宣德門與衛士競以賈直文彦博言濬川杷非濬河之具帝遣知制誥熊本行視以文彦博言為是確遂論本附彦博本坐罷確因代其職改外諫院判司農事覬欲得臺端因論中丞鄧潤甫字温伯建昌人御史上官均字彦衡邵武人按獄失實潤甫均皆罷而確得中丞猶領司農凡常平免役之法皆成其手㑹太學生虞蕃訟博士受賄確深探其獄連引朝士自翰林學士許将字冲元福州人閩及元絳子耆寧以下皆逮繫遂劾絳為子有所屬請出知亳州確遂代其位確自諫院為參知政事皆以起獄奪人位而居之士大夫交口叱罵而確自以為得計也吴充數為帝言新法不便欲稍去甚者確曰曹參與蕭何有隙至代為相一遵何約束今陛下所自建立豈容一人挾怨而壞之法遂不變絳工于文辭而無特操仕已顯猶為遲晚時論鄙之秋八月許二史左右史直前奏事修起居注王存字正仲潤州丹陽人乞復唐貞觀二史之職執筆隨宰相入殿帝是其言又故事左右史雖日侍立而欲奏事必稟中書候㫖存與同修起居注王安禮字和甫安石弟及對及之乃詔許直前著為令下知湖州蘇軾獄尋貶為黄州團練副使考蘇軾詩集元豐二年八月十八日赴臺獄有寄弟轍詩十二月二十八日恩責黄州又有詩月日甚明續綱日因兼書軾貶乃并軾下獄俱係于十月後非是今改書于八月仍兼書貶而加尋字以别之軾自徐徙湖上以謝又以事不便民者不敢言以詩託諷庶有益于國中丞李定御史舒亶字信道明州慈谿人擿其語以為侮慢因論軾自熙寧以來作為文章怨謗君父交通戚里謂駙馬都尉王詵詵字晉卿開封人尚英宗女魏國公主逮軾赴臺獄詔定與知諫院張璪御史何正臣舒亶等雜治定等媒蘖以為誹謗時事鍜鍊乆之且引多名士欲置之死太皇太后方不豫聞之謂帝曰甞憶仁宗以制科得軾兄弟喜曰吾為子孫得兩宰相今聞軾以作詩繋獄得非仇人中傷之乎捃至于詩其過㣲矣宜熟察之帝曰謹受教吴充申救甚力帝亦憐之㑹同修起居注王安禮從容白帝曰自古大度之君不以言語罪人軾以才自奮謂爵禄可立取顧録録如此其心不能無觖望今一旦致于理恐後世謂陛下不能容才帝曰朕固不深譴也行為卿貰之第去勿漏言軾方賈怨于衆恐言者緣以害卿也王珪復舉軾詠檜詩曰根到九泉無曲處世間惟有蟄龍知以為不臣帝曰彼自詠檜爾何預朕事已而獄具軾遂得輕比舒亶又言駙馬都尉王詵輩公為朋比如盛僑周攽固不足論若司馬光張方平范鎮陳襄劉摯皆畧能誦説先王之言而所懐如此可置而不誅乎帝不從但貶蘇軾黄州團練副使本州安置弟轍及王詵皆坐謫貶張方平司馬光范鎮等二十二人俱罰銅初鮮于侁為東京轉運使王安石吕惠卿當國正人不得立朝嘆曰吾有薦舉之權而所列非賢恥也遂舉劉摯李常蘇軾蘇轍劉攽范祖禹等及知揚州會軾自湖赴獄親朋皆絶與交道出廣陵侁往見之臺吏不許通或曰公與軾相知乆其所往來文字書問宜焚之勿留不然且獲罪侁曰欺君負友吾不忍為以忠義分譴則所願也至是以舉吏累謫主管西京御史臺軾既貶居黄州三年帝手札移軾汝州軾未至汝上書自言願居常州許之至哲宗即位始復軾朝奉郎知登州尋召還朝事在元豐八年劉攽字貢父敞之弟范祖禹字潤甫一字夢得鎮從孫冬十月太皇太后曹氏崩帝事太后極誠孝后亦慈愛天至故事外家男子毋得入謁帝以后春秋髙數請召弟佾入見乆之乃許及見少頃后謂佾曰此非汝所當留得輙遣出曹佾字公伯彬之孫帝甞有意于燕薊已與大臣定議乃詣太后白其事后曰儲蓄賜予備乎鎧杖士卒精乎帝曰固已辦之矣后曰事體至大吉凶悔吝生乎動得之不過南面受賀而已萬一不諧則生靈所繫未易以言苟可取之太祖太宗収復乆矣何待今日帝曰敢不受教庚申三年春正月遼出耶律伊遜于興中府注見前伊遜又欲害太子濬之子延禧時年六嵗因言宋魏王和囉格字阿尼雅興中第二子和囉格舊作和魯斡阿尼雅舊作阿輦今改之子淳可為儲嗣羣臣畏伊遜莫敢言北院宣徽使蕭烏納一名托卜嘉字特黙六院部人烏納舊作兀納托卜嘉舊作撻不也特黙舊作特免今改伊勒希巴遼官名掌刑獄舊作夷離畢今改蕭托輝字烏庫哩宰相恰特六世孫托輝舊作陶阮烏庫哩舊作烏古鄰恰特舊作轄特今改諫曰舍嫡不立是以國與人也遼主未决㑹獵于黒山方輿紀要在朶顔衛東朶顔今喀喇沁地見扈從官屬多隨伊遜後始惡其専遂改知南院大王遼初分塔喇額勒金為北南院大王額勒金統軍馬大官塔喇額勒金舊作迭剌夷離董今改事伊遜入謝遼主即日出之興中府其黨多黜遂封延禧梁王為䚳旗鼓蘇拉六人以䕶衛之遼軍制有蘇拉司此掌旗鼓者也蘇拉舊作拽剌今改以章惇參知政事三月吴充罷充欲有所為毎為王珪蔡確所沮諫官張璪論充與郭逵書止其進兵故安南無功充既遭同列困毁素病瘤積憂畏疾益侵遂罷為西太乙宫使踰月卒充為相務安静心正而力不足知不可為而不能勇退為世所譏𦵏慈聖光獻皇后夏四月瀘州夷復叛詔邊将討之初烏蠻有二酋曰晏子箇恕熊本既平柯隂事具前并招納之晏子尋死箇恕授知歸倈州即柯隂廢縣改置其子乞弟授蕃部廵檢㑹羅苟夷叛犯納溪宋縣今屬瀘州詔涇原副總管韓存寳擊之存寳檄乞弟犄角遂平羣蠻兵罷未幾乞弟帥歩騎六千至江安隋縣今屬瀘州城下責賞都監王宣以賄召之且與盟乞弟以為畏已益悖慢至是以衆攻熟夷宣往救之一軍皆沒朝廷驛召存寳授方畧使統軍進討存寳怯懦不敢進明年存寳坐逗遛棄市以環慶副總管林廣萊州人代将乞弟請降帝不許督廣進師廣擊敗乞弟斬首二千級乞弟遁廣帥兵深入叢箐雨雪浹旬士卒死者不可勝計窮追過鴉飛不到山在江安縣西南次歸倈州竟不得乞弟而還後乞弟無所依往來羣蠻間遂死六月詔中書詳定官制國初承唐制三省無専職臺省寺監亦無定員類以他官注判三省長官不預朝政六曹不釐本務給舍不領本職諫議無言責起居不記注司諫正言非特㫖供職亦不任諫諍其官人受授之别有官有職有差遣其次有階有勲有爵叙位著職以待文學之選差遣以内外之事而官但以寓禄秩而已故仕者皆以臺閣禁從為顯宦以差遣要劇為貴途而官之遲速階勲爵邑之有無皆非所計議者多以正名為請帝慨然欲更其制乃置詳定官制局于中書命翰林學士張璪樞宻副承㫖張誠一領之詔秘書監劉几字伯夀温叟孫等定雅樂帝自即位于禮樂之事未遑制作至是詔徴致仕秘書監劉几議樂侍郎范鎮參考几請知禮院楊傑字次公無為軍人同議先是傑言大樂七失一曰歌不永言聲不依永律不和聲二曰八音不諧鐘磬闕四清聲三四金石奪倫四曰舞不象成五曰樂失部奏六曰祭祀享無分樂之序七曰鄭聲亂雅并上十二均圖帝以其圖説下鎮几參定几言律主于人聲不以尺度求合儒者泥古致詳于形名度數而不知清濁輕重之用故求于器雖合考于聲則不諧乃即舊樂仁宗時李照樂而増以四清聲鐘磬十六十二為本聲四為應聲本聲重大應聲輕清故曰四清聲李照不用几増之下王朴樂二律朴樂聲髙歌者難遂故四清聲置而不用今下二律則四清聲皆用而諧協且請追考成周分樂之序几以周禮大樂正凡樂圍鐘為宫黄鐘為角太簇為徵姑洗為羽圍鐘者夾鐘也今明堂景靈宫降天神之樂宜以夾鐘為宮用其均宫聲為始終其黄鐘為角則用黄鐘均以其角聲為始終太簇為徵則用太簇均以其徵聲為始終姑洗為羽則用姑洗均以其羽聲為始終祭地祇享宗廟皆視此均法辨正二舞文舞武舞容節傑議同而鎮欲求一桴二米真黍以律生尺改修鍾量廢四清聲詔悉從几傑議樂成第加恩賚鎮謝曰此劉几樂也臣何預焉復上疏論之不報秋七月彗出太微垣注見前詔羣臣直言闕失王安禮應詔上疏曰人事失于下變象見于上陛下有仁民愛物之心而澤不下究意者左右大臣是非好惡不遵諸道乗權射利者用力殫于溝瘠取利究于園夫足以干隂陽而召星變願察近臣之行杜邪枉之門至于祈禳小數貶損舊章恐非所以應天者帝覽疏嘉嘆諭之曰王珪欲使卿條具朕甞謂不應沮格人言以自壅障今以一指蔽目雖泰華在前弗之見近習蔽其君何以異此卿當益自信遂進翰林學士知開封府九月定百官寄禄格官制成下詔行之凡領空名者一切罷去而易之以階雜取唐及宋初舊制自開府儀同三司至将仕郎定為二十四階如領侍中中書令同平章事者易以開府儀同三司領左右僕射者易以特進自是以下􅉍易有差因以寄禄議者又欲罷樞宻院歸兵部帝曰祖宗不以兵柄歸有司故専命官以統之互相維制何可廢也遂止帝甞謂執政曰官制将行欲新舊人兩用指御史大夫曰非司馬光不可王珪蔡確相顧失色珪憂甚不知所出確曰上乆欲収靈武公能任責則相位可保也珪喜謝之因薦俞充帥慶使上平西夏策其意以為既用兵深入必不召光雖召将不至已而光果不召俞充字公達明州鄭人以馮京為樞宻使薛向孫固吕公著為副使向尋免向既在政地養威持重同列質以西北事多黙不對㑹詔民畜馬向既奏命旋知民不便欲改議御史舒亶論其反覆無大臣體斥知潁州冬十一月己丑朔日食辛酉四年春正月馮京罷以孫固知樞宻院事吕公著韓縝同知院事京再執政初與王安石不合後為吕惠卿所傾中立不倚人服其操宋進士自鄉舉至廷試皆第一者三人王曽宋庠為名宰相京為名執政不愧科名云三月章惇有罪免以張璪參知政事朱服字行中湖州烏程人為御史惇宻使客達意于服為服所白惇父俞又彊占民田民遮訴惇惇繫之開封府事併聞遂免知蔡州夏四月築河隄自大名至瀛州先是河決澶州北外都水監丞陳祐甫議修禹河故迹請遣使相視祐甫以商胡横隴故道地勢髙平土性疏惡皆不可復復亦不能持乆惟禹故瀆在大坯大行之間地卑而勢固故秘閣枝理李垂與今知深州孫民先皆有修築之議望召民先同河北漕臣自王供埽按視迄于海口從之至是河復大決于州之小埽詔都水監丞李立之經畫以聞帝謂輔臣曰河之為患乆矣後世以事治水故常有礙夫水之趨下乃其性也如能順水所向遷徙城邑以避之復有何患已而立之言河流自乾寧軍至劈地口在今天津府静海縣東北入海宜自北京至瀛州分立東西堤五十九埽詔從之立之在熙寧初已主立堤至是竟行其言胡渭曰自商胡決後二十一嵗為熙寜二年導東流而北流閉又十二嵗為元豐四年河復北流至紹聖初又閉後元符二年東流斷絶河竟北流五月夏人幽其主秉常秋七月詔李憲㑹陜西河東五路之師討之知慶州俞充知帝有用兵意屢請西伐又言諜報云夏将李清本秦人説秉常以河南地來歸秉常母梁氏知之遂誅清奪秉常政而幽之宜興師問罪此千載一時也帝然之遂詔熙河經制李憲等大舉征夏召鄜延副總管种諤入對諤至大言曰夏國無人秉常孺子往持其臂以來耳帝壯之乃决意西伐方議出師孫固諫曰舉兵易解禍難不可帝曰夏有釁不取則為遼人所有不可失也固曰必不得已請聲其罪薄伐之分裂其地使其酋長自守帝笑曰此真酈生之説爾時執政有言便當直渡河不可留行固曰然則孰為陛下任此者帝曰朕以屬李憲固曰伐國大事而使宦者為之則士大夫孰肯為用帝不悦他日固又曰今五路進師而無大帥就使成功兵必為亂帝諭以無其人吕公著進曰問罪之師當先擇帥既無其人曷若已之固曰公著之言是也帝不聽竟命李憲出熙河种諤出鄜延髙遵裕字公綽瓊之孫出環慶劉昌祚字子京真定人出涇原王中正宦者開封人出河東分道並進又詔吐蕃首領棟戬集兵㑹伐詔定選格太祖設官分職多襲五代之制凡入仕有貢舉奏䕃攝署流外從軍五等吏部銓惟注擬州縣官幕職文臣少卿監以上中書主之京朝官則審官院主之武臣刺史副率以上内職樞宻院主之使臣則三班院主之帝自即位欲更制度以王安石議置審官東西院事具前于是典選之職分而為四文選曰審官東院曰流内銓武選曰審官西院曰三班院又詔内外官司舉官悉罷命廷臣議選格遂定銓主之法悉歸選部而左右選分焉審官東院為尚書左選流内銓為侍郎左選審官西院為尚書右選三班院為侍郎右選舊制中書有堂選與百司郡縣奏舉皆不隸于有司王安石在中書欲罷堂選曽公亮不可而止至是既罷内外長吏舉官法堂選亦廢九月李憲復蘭州憲總熙秦七軍及棟戩兵三萬敗夏人于西市新城在蘭州府臯蘭縣東南復襲女遮谷在臯蘭縣東破之遂復古蘭州城之請建為帥府既而种諤克米脂城宋砦今為縣屬綏徳州髙遵裕復清逺軍注見前王中正以河東兵入宥州中正率兵至麟州度無定河循水北行地皆沙濕士馬多陷沒糗糧不能繼又恥無功遂入于宥州時夏人棄城走河北城中遺民百餘中正遂屠之掠其牛馬以充食無定河出榆林府邊外流逕米脂縣綏德州又東南至清澗縣入黄河即古奢延水也以潰沙急流深淺不定故名冬十一月癸未朔日食髙遵裕等兵潰李憲不至靈州而還劉昌祚率蕃漢兵五萬受遵裕節制令兩路合軍以進既入境環慶兵不至昌祚次瑪伊克隘在靈州南舊作磨􅗹今改遇夏衆十萬阨險破之遂薄靈州城兵幾入門遵裕嫉其功馳使止之昌祚按甲不敢進遵裕至圍城十八日不能下夏人決黄河七級渠在靈州南以灌營復抄絶餉道士卒凍溺死遂潰而還餘軍纔萬三千而已夏人躡之復敗焉昌祚亦還涇原种諤留千人守米脂而自率大衆進攻銀石夏州遂破石堡城在榆林府榆林縣南進至夏州駐軍索家平在榆林府懐逺縣故夏州南㑹大校劉歸仁以衆潰而軍食又乏復值大雪乃引還死者不可勝計入塞者僅三萬人王中正自宥州行至柰王井在廢宥州西糧盡士卒死者二萬人亦引還初詔憲帥五路兵直趨興靈憲總師東上營于天都山下在平涼府固原州西北焚夏之南牟内殿并其館庫追襲其統軍日木多凌丹舊作仁多㖫丁今改敗之次于葫蘆河即蔚茹水注見前遂班師時諸路兵皆至靈州獨憲不至壬戌五年春正月貶髙遵裕等官以李憲為涇原經畧安撫制置使初夏人聞朝廷大舉梁氏問䇿于廷諸将少者盡請戰一老将獨曰但堅壁清野縱其深入聚勁兵于靈夏而遣輕騎抄絶其餽運可不戰而困也梁氏從之師卒無功而還帝曰朕始以孫固言為迂今悔無及矣至是討敗師罪髙遵裕責授郢州團練副使本州安置种諤王中正劉昌祚並降官憲欲以開蘭㑹今鞏昌府靖逺縣本唐㑹州後沒吐蕃宋初屬夏後収復邀功弭責孫固曰兵法後期者斬况諸路皆至而憲獨不行不可赦帝以憲有功但令詰其擅還之由憲以餽餉不接為辭釋弗誅憲復上再舉之䇿詔以為涇原經畧按撫制置使知蘭州夏四月壬子朔日食御史中丞舒亶有罪免亶舉劾多私氣熖熏灼見者側目至是坐詐為録目奪兩秩勒停逺近稱快以王珪為尚書左僕射兼門下侍郎蔡確為尚書右僕射兼中書侍郎章惇為門下侍郎張璪為中書侍郎蒲宗孟為尚書左丞王安禮為尚書右丞官制成改同中書門下平章事為左右僕射參知政事為門下中書侍郎尚書左右丞初議官制葢倣唐六典事無大小並中書取㫖門下審復尚書受而行之三省分班奏事並歸中書確説珪曰公乆在相位必得中書令珪信不疑確乃言于帝曰三省長官位髙不須置令但令左右僕射分兼兩省侍郎足矣帝以為然故確名為次相實顓大政王珪以左僕射兼門下拱手而已確既相屢興羅織之獄縉紳士大夫重足而立富弼在洛上書確小人不宜大用帝不從帝甞語輔臣有無人才之嘆宗孟率爾對曰人才半為司馬光邪説所壞帝不語直視乆之曰蒲宗孟乃不取司馬光邪未論别事只辭樞宻一節朕自即位以来未見此一人他人則雖迫之使去亦不肯矣宗孟慚懼無以為容時李憲乞再舉伐夏帝以訪輔臣王珪對曰向所患者用不足朝廷今捐錢鈔五百萬緍以供軍食有餘矣安禮曰鈔不可噉必變而為錢錢又變為芻粟今距出征纔兩月安能集事帝曰李憲以為己有備彼宦者能如是卿等獨無意乎唐平淮蔡唯裴度謀議與主同今乃不出公卿而出于閹寺朕甚恥之安禮曰淮西三州爾有裴度之謀李光顔李愬之将然猶引天下之兵力厯嵗而後定今夏氏之彊非淮蔡比憲才非度匹諸将非有光顔愬輩臣懼無以副聖志也以曽鞏為中書舍人鞏能文章為歐陽修所重帝深知其才命充史館修撰專典司事至是命為中書舍人時自三省百職事選授一新除書日至十數人人舉其職鞏所製訓辭典約而盡未幾卒鞏甞通判越州徙襄州洪州所至皆有聲績吕公著甞言于帝曰鞏為人行義不如政事政事不如文章以是不大用吕公著罷公著以興兵討西夏秦晉民大困數白其害不從引疾求去出知定州秋七月給事中徐禧字德占洪州分寧人䕶兵城永樂注見前种諤西討不能如志知延州沈括欲盡城横山注見前下瞰平夏注亦見前使虜不得絶磧為冦諤遂上其䇿于朝且言興功當自銀州始帝以為然遣給事中徐禧内侍李舜舉開封人往鄜延議之舜舉退詣執政王珪迎謂曰朝廷以邊事屬押班及李留後無西顧之憂矣舜舉曰四郊多壘卿大夫之辱也相公當國而以邊事屬二内臣可乎内臣止宜供禁廷灑掃之職耳豈可當将帥之任邪聞者代珪發慙禧至鄜延上言銀州雖據明堂川在米脂縣西北即古榆溪今亦謂之西河源出榆林府邊外下流入無定河無定河之㑹故城東南已為河水所吞其西北又阻天塹謂黄河不如永樂之形勢險阨請先城永樂永樂依山無水泉种諤極言其不可帝從禧議乃詔禧䕶諸将往城之而命括移府並塞總兵為援陜西轉運判官李稷主饋餉禧以諤䟦扈奏留諤守延州自率諸将往築十四日而成賜名銀川岩禧等退還米脂以兵萬人屬曲珍字君玉隴阡人守之九月夏人陷永樂徐禧等敗死禧等既城去九日夏人以數千騎來攻曲珍使報禧遂與李舜舉李稷往援之沈括守米脂比抵永樂夏人傾國而至大将髙永能字君舉青澗人請及其未陳擊之禧曰爾何知王師不鼓不成列執刀自率士卒拒戰夏人益衆進薄城下珍兵陳于水際将士皆有懼色珍白禧曰今衆心已揺不可戰戰必敗請収兵入城禧曰君為大将柰何遇敵先自退邪乃以七萬人陳于城下夏人縱鐡騎渡河珍曰此鐡鷂子軍也當其半濟擊之乃可以逞得地則其鋒不可當也禧不從鐡騎既濟震蕩衝突大衆繼之珍鋭卒敗奔還蹂後陳夏人乗之珍衆大潰珍収餘衆入城夏人圍之厚數里且據其水砦珍士卒晝夜血戰城中乏水已數日掘井不及泉渇死者十六七括與李憲援兵及饋餉皆為夏人所隔不得前种諤怨禧不遣救師城中大急㑹夜半大雨夏人圜城急攻城遂陷禧舜舉稷永能皆為亂兵所害惟珍裸跣走免将校死者數百人喪士卒役夫二十餘萬夏人耀兵米脂城下而還自熙寧以來用兵得夏葭蘆注見前吴堡宋砦金為縣屬葭州義合本夏人砦宋収復故城在今綏德州東米脂浮圖塞門注俱見前六城而靈州永樂之役官軍熟羌義堡死者六十萬人錢穀銀絹不可勝計事聞帝臨朝痛悼為之不食贈禧等官而貶括為均州團練副使隨州安置降珍為皇城使自靈武之敗秦晉困棘天下企望息兵而括諤進攻取之䇿禧素以邊事自任狂謀輕敵遂致覆敗自是帝始知邊臣不可倚信深自悔咎無意于西伐而夏人亦困弊矣初帝之遣禧也王安禮諫曰禧志大才疎必誤國事帝不聼及敗帝曰安禮每勸朕勿用兵少置獄葢為是也癸夘六年春二月夏人冦蘭州貶李憲為熙河都總管夏人數十萬圍蘭州已奪兩闗門鈐轄王文郁字周卿麟州新秦人夜集死士七百餘人縋城擊走之未幾夏人復分道入冦亦多為諸路所敗中丞劉摯言熙河經畧使李憲貪功生事一出欺罔避興靈㑹師之期頓兵以城蘭州遺患至今詔貶憲為熙河安撫經畧都總管夏四月遼大雪平地文餘馬死者十六七閏六月夏人復來修貢夏人亦弊于兵西南都統茂錫克額木齊舊作昴星嵬名濟今改移書示涇原劉昌祚乞通好如初昌􅍈以聞帝諭昌􅍈答之及入冦屢敗國用益竭乃遣黙爾根宻克滿竒雅舊作謨箇咩迷乞遇今改來上表帝許之復詔陜西河東經畧司其新復城砦徼循母出二三里夏之嵗賜悉如其舊未幾夏主上書乞還侵疆帝不許司徒韓公富弼卒諡文忠弼早有公輔之望名聞夷狄遼使每至必問其出處安否臨事周悉不萬全不發當其敢言奮不顧身忠義之性老而彌篤家居一紀斯須未甞忘朝廷及卒贈太尉弼遺表畧云陛下即位之初邪臣納説上誤聰明浸成禍患今上自輔臣下及多士畏禍圖利習成敝風去年永樂之役兵民死亡者數十萬今乆戍未解百姓困窮豈諱過恥敗不思救禍之時乎天地至仁寜與羌夷校勝負願休兵息民使闗陜之間稍遂生理兼陜西再團保甲州縣奉行勢侔星大人情惶駭不若寝罷以綏懐之臣之所陳急于濟事若夫要道則在聖心所存與所用之人君子小人之辨爾秋八月蒲宗孟免以王安禮李清臣字邦直魏人為尚書左右丞御史論宗孟荒于酒色及繕治府舍過制故免九月癸夘朔日食冬十月遼耶律遜伏誅伊遜在興中府坐以禁物鬻入外國減死幽于倈州當作來州遼置廢城在今錦州府寧逺州其黨耶律仁傑削爵為民至是伊遜復謀出奔及私蔵兵甲事覺伏誅十一月太師文彦博致仕彦博自河南入朝帝嘉其輔立英宗而不伐其功加兩鎮節度使将行賜燕瓊林苑兩遣中使遺詩祖道當世榮之至是請老以太師致仕彦博之在河南也與富弼等用居易故事就弼第置酒相樂尚齒不尚官洛陽多名園古刹諸老鬚眉皓白衣冠甚偉都人常隨觀之已而圖形妙覺僧舍謂之洛陽耆英㑹司馬光年未六十以狄兼謩故事與焉白居易故事居易在洛稱香山居士與胡杲等九人為尚齒會人繪為九老圖狄兼謩年未七十十二月户部獻今嵗民數時天下凡二十三路東南際海西盡巴􅈎北極三闗東西六千四百八十五里南北萬一千六百二十里天下主客户一千七百二十一萬一千七百一十三甲辰七年春正月夏人大舉冦蘭州初李憲以夏人數至蘭州河外而翺翔不進意必大舉乃増城守之備至是果大舉入㓂歩騎號八十萬圍蘭州意在必取督衆急攻矢如雨雹雲梯革洞百道並進凡十晝夜不克糧盡引去尋復㓂延州順德軍注見前定西城宋砦廢城在今秦州西北及熙河諸砦夏五月詔以孟軻配食孔子先是判國子監常秩字夷甫潁州潁隂人請立孟軻楊雄像于廟廷仍賜爵號又請追尊孔子為帝下兩制禮官詳議以為非是而止知鄆州曾孝寛復請加封孟子乃詔封為鄒國公至是復詔孟子與顔子並配孔子又追封荀况為蘭陵伯楊雄為成都伯韓愈為昌黎伯從祀廟廷冬十二月端明殿學士司馬光上資治通鑑初光約戰國至秦二世如左氏體為通志以進英宗悦之命續其事就崇文殿開局許自選官屬得借龍圖天章三館秘閣書籍給御府筆墨繒帛及御前錢以供果餌以内臣為承受光遂與劉攽劉恕范祖禹及子康字公純編集史記前後漢屬攽三國迄隋屬恕唐及五代屬祖禹帝即位賜名資治通鑑製序文賜之㑹光出知永興軍以衰病乞閒乃差判西京留司御史臺及提舉崇福宫前後六任聼以書局自隨光于是徧閱舊史旁采小説抉摘幽隠較計毫釐上起周威烈王二十三年下終五代又畧舉事目年經國緯以備檢尋為目録又參考羣書評其同異俾歸一塗為考異合三百五十四卷厯十九年而成至是上之詔以光為資政殿學士降詔奨諭乙巳八年春正月帝有疾三月詔立延安郡王傭帝第六子為皇太子賜名煦皇太后權同聽政帝疾甚羣臣請立皇太子及請皇太后髙氏權同聽政許之三月甲午朔立傭為皇太子賜名煦先是岐王顥嘉王頵英宗第四子日問起居太后既垂簾命二王母輙入且隂敕中人梁惟簡妻制十嵗兒一黄袍懐以來葢宻為踐阼倉卒備也初太子之未立也職方員外郎邢恕與蔡確成謀宻語太后之姪髙公繪公紀曰上疾不可諱延安㓜冲宜早有定論岐嘉皆賢王也公繪曰此何言君欲禍吾家邪恕知計不行反宣言太后屬意岐工而與王珪表裏導確約珪入問疾陽鈎致珪語使知開封府蔡京伏劍士土外須珪小持異則執而誅之既而珪言上自有子定議立延安恕益無所施及太子已立猶與確謂有定策功傳播其語于朝逰邢恕字和叔鄭州陽武人蔡京字元長興化仙人帝崩太子即位是為哲宗赦太子時年十嵗既即位皇太后同聼政尊皇太后曰太皇太后皇后曰皇太后徳妃朱氏曰皇太妃帝生母開封人太皇太后既聼政散遣修京城役夫止造軍器及禁庭工技出近侍尤無状者戒中外無苛歛寛民間保戸馬事由中㫖王珪等弗預知也蔡確思求媚于太后以自固太后從父髙遵裕坐西征失律抵罪因上言乞復遵裕官后曰遵裕靈武之役塗炭百萬先帝中夜得報起環榻而行徽旦不能寐自是驚悸馴致大故禍由遵裕得免刑誅幸矣先帝肉未冷吾何敢顧私恩而違天下公議乎確悚慄而退罷京城邏卒及免行錢廢濬河司蠲逋賦尋詔寛民力有司或致廢格者監察御史糾劾之司馬光自洛入臨夏五月詔求直言光居洛十五年天下以為真宰相田夫野老皆號為司馬相公婦人女子亦知其為君實也神宗崩光欲入臨避嫌不敢時程顥在洛勸光行乃從之衛士見光皆以手加額曰此司馬相公也所至民遮道聚觀馬至不得行曰公無歸洛留相天子活百姓公懼亟還太后遣内侍梁惟簡勞光問為政所當先光請開言路詔榜朝堂而大臣有不悦者設六語云若隂有所懐犯非其分或扇揺機事之重或迎合已行之令上以僥倖希進下以眩惑流俗若此者罰無赦后復命示光光曰此非求諫乃拒諫也人臣惟不言言則入六事矣乃具論其情改詔行之于是上封事者千數召程顥為宗正寺丞未至卒顥甞曰新法之行乃吾黨激成之當時自愧不能以誠感上心遂至今日之禍豈可獨罪王安石也至是召為宗正丞未行而卒顥十五六時與弟頥聞汝南周敦頥論道遂厭科舉之業慨然有求道之志未知其要泛濫于諸家出入于老釋者幾十年返求諸六經而後得之資性過人充養有道純粹之氣盎于面背門人交友從之嵗乆未甞見其忿厲之容遇事優為雖當倉卒不動聲色深有意經濟方召用遽卒士大夫識與不識莫不哀傷焉文彦博采衆論題其墓曰明道先生王珪卒珪以文學見推流軰然自執政至宰相凡十六年無所建明率道諛将順當時目為三㫖相公以其上殿進呈云取聖㫖上可否訖云領聖㫖退諭禀事者云已得聖㫖也以司馬光為門下侍郎詔起光知陳州過闕留為門下侍郎是時天下之民引領拭目以觀新政而議者猶謂三年無改于父之道光曰先帝之法其善者雖百世不可變也若王安石吕惠卿所建為天下害者改之當如救焚拯溺况太皇太后以母改子非子改父也于是衆議少止六月賜楚州孝子徐積字仲車楚州山陽人粟帛積事親孝旦夕必冠帶定省從胡瑗學所居一室寒一裘啜粟飲水雖瑗遺以食亦不受以父名石至終身不用石器行遇石則避而不踐中年屏居窮里而四方事無不知甞借人書經夕還之借者紿言書中有金葉積賣衣償之不與辨後以近臣薦授楚州教授毎升堂訓諸生曰諸生欲為君子而使勞己之力費己之財如此而不為君子猶可也不勞己之力不費己之財諸君何不為居子鄉人賤之父母惡之如此而不為君子猶可也鄉人榮之父母欲之諸君何不為君子聞者敬服及卒賜諡節孝秋七月以吕公著為尚書左丞公著知揚州被召侍讀太后遣使問所欲言公著曰先帝本意以寛省民力為先而建議者以變法侵民為務與己異者一切斥去故日乆而弊愈深法行而民愈困誠得中正之士講求天下之利病恊力而為之宜不難矣既至拜左丞罷保甲法先是司馬光言于太后曰兵出民間雖云古法然古者八百家纔出甲士三人步卒七十二人閒民甚多三時務農一時講武不妨稼穡自兩司馬以上皆選賢士大夫為之無侵漁之患故卒乗輯睦動則有功今籍鄉材之民二丁取一授以弓弩教之戰陳是農民半為兵也三四年來又令三路置都教場無問四時毎五日一教一丁在閱一丁供送雖云五日而保正長以泥棚除草為名聚之教場得賂則縱否則留之是三路耕紜収獲稼穡之事幾盡廢矣至是復力言其公私勞擾有害無益遂詔罷之冬十一月復以鮮于侁為京東轉運使先是熙寧末侁甞為京東轉運使尋知揚州已而吴居厚字敦老洪州人為副使時方興鹽鐡居厚精心計籠絡鈎稽収羡息錢數百萬即萊蕪利國二冶萊蕪漢縣今屬泰安府縣東南舊有冶宋置監于此利國冶在徐州府銅山縣東北宋置監今為驛鑄錢以能擢都轉運使議行河北鹽法搜剔無遺居厚起州縣凡流徒以言利得進在京東苛刻劇盗王冲因民怨聚衆數千欲乗居厚行部至徐篡取投諸鐡冶中居厚聞之遁去及是為言者所論坐貶貶知廬州尋摘黄州安置乃復用侁司馬光語人曰以子駿之賢不宜復使居外然朝廷欲救東土之弊非子駿不可此一路福星也安得百子駿布在天下乎侁既至奏罷萊蕪利國兩冶又奏海鹽依河北通商民大悦𦵏永裕陵在鞏縣西南昭陵西史臣曰神宗孝友謙抑勵精圖治将大有為未幾王安石入相以偏見曲學起而桑之天下洶洶騷動帝終不覺悟致祖宗之良法美意變壊幾盡由是邪佞日進人心日離禍亂日起惜哉罷方田法十二月罷市易法貶吕嘉問知淮掦軍言者交論市易之患被于天下本錢無慮千二百萬緡率二分其息十有五年之間子本當數倍今乃僅足本錢葢買物入官未轉售而先計息取償至于物貨苦惡上下相䝉虧折日多空有虚名而已監察御史韓川請趣罷其法于是詔罷市易而削前提舉市易光禄卿吕嘉問三秩貶知淮揚軍其黨皆降黜罷保馬法起居舍人邢恕有罪貶知隨州恕博貫經籍能文章從程頤學司馬光吕公著王安石吴充皆重之然天資詭詐冒進與蔡確謀立岐王顥事既不成㑹王珪卒恕與覺及章惇宣言太皇太后及吴充有異議頼確擁䕶而止自以為功至是復為髙公繪草奏乞尊崇朱太妃為髙氏異日計太后怒黜知隨州哲宗皇帝丙寅元祐元年春閏二月蔡確有罪免右司諫王覿字明叟泰州如臯人上疏言國家安危治亂繫于大臣今執政八人而姦邪居半使一二元老何以行其志哉因極論蔡確章惇韓縝張璪朋邪害政章數十上㑹右諫議大夫孫覺侍御史劉摯左司諫蘇轍御史王巖叟字彦霖大名清豐人朱光廷上官均等連章論確罪且言確在熙豐時寃獄苛政首尾預其間及至今日稍語于人曰當時確豈敢言此其意欲固竊名位反歸曲于先帝也司馬光吕公著進用蠲除煩苛確言皆已所建白于是公論亦不容太后不忍斥之但罷政出知陳州以司馬光為尚書左僕射兼門下侍郎吕公著為門下侍郎李清臣吕大防為尚書左右丞時光已得疾而青苖免役将官之法猶在西戎之議未決光嘆曰四害未除吾死不瞑目矣折簡與吕公著曰光以身付醫以家事付愚子惟國事未有所托今以屬公既而詔免朝覲許乗肩輿三日一入省光不敢當曰不見君不可以視事詔令子康扶入對遼人聞之敕邊吏曰中國相司馬矣毋輕生事開邊隙以李常為户部尚書司馬光言户部尚書舊三司使之任其所管財榖事有㪚在五曹及寺監者並歸户部詔從之尋以常為尚書或疑其少幹局慮不勝任光曰用常主邦計則人知朝廷不急于征利聚歛少息矣章惇有罪免以范純仁同知樞宻院事言者論惇讒賊狠戾罔上蔽明不忠之罪與蔡確等惇不自安及確免論者益力㑹與司馬光爭辨役法于太后簾前其語甚悖太后怒斥知汝州以安夀字厚卿開封人代惇知樞宻院事范純仁同知院事命既下給事中王巖叟侍御史劉摯等交章論夀附惇不當躐遷至封還誥命夀亦力辭乃詔仍同知院事罷青苗法復常平舊法累年積蓄錢穀財物盡委提㸃刑獄交管罷諸州常平新法提舉管勾官三月罷免役法司馬光請悉罷免役錢諸色役人皆如舊制其見在役錢撥充州縣常平本錢于是詔修定役書侍御史劉摯乞並用祖宗差法監察御史王巖叟請立諸役相助法中書舍人蘇軾請行熙寧給田募役法因列其五利王巖叟言五利難信而有十弊軾遂議格光復言免役之法其害有五乞直降勅罷之光曰上户舊充役固有陪備而得番休今出錢比舊費特多年年無休息下户舊不充役今例使出錢舊所差皆土著良民今皆浮浪之人恣為姦欺又農民出錢難于出力凶年則賣荘田牛具以錢納官又提舉司惟務多歛役錢廣積寛剰以為功此五害也今莫若直降勅命委縣令佐揭簿定差其人不願身自供役許擇可任者雇代惟衙前一役最號重難今仍行差法陪備既少當不致破家若猶矜其力難獨任即乞如舊于官户寺觀单丁女户有屋産田荘者隨貧富以差出助役錢尚慮役人利害四方不能齊同乞許監司守令審其可否可則亟行如未究盡縣五日具措畫上之州州一月上轉運使以聞朝廷委執政審定隨一路一州各為之勅務要曲盡章惇取光所奏疏畧未盡者駁奏之吕公著言惇専欲求勝不顧命令大體望遷差近臣詳定于是資政殿大學士韓維及范純仁吕大防孫永等詳定以聞蘇軾言于光曰差役免役各有利害免役之害聚歛于上而下有錢荒之患差役之害民不得力農而吏胥緣以為姦此二害輕重畧等矣光曰于君何如軾曰法相因則事易成事有漸則民不驚三代之法兵農為一至秦始分為二及唐中葉盡變府兵為長征卒自是農出穀帛以養兵兵出性命以衛農天下便之雖聖人復起不能易也今免役之法實大類此公欲驟罷免役而行差役正如罷長征而復民兵葢未易也光不以為然軾又陳于政事堂光色忿然軾曰昔韓魏公刺陜西義勇公為諫官争之甚力韓公不樂公亦不顧軾昔聞公道其詳豈今日作相不許軾盡言耶光謝之自是役人悉用見數為額惟衙前用坊場河渡錢雇募餘悉定差仍罷官户寺觀單丁女户尋以衙前不皆有雇直遂改雇募為招募純仁謂光曰差役當熟講緩行不然滋為民病願虚心以延衆論不必謀自己出謀自己出則諂諛得乗間迎合矣役議或難囘則可先行之一路以觀其究竟光不從持之益堅純仁曰是使人不得言爾若欲媚公以為容悦何如少年合安石以速富貴哉光深謝之初差役之復為期五日同列病其太廹知開封府蔡京獨如約悉改畿縣雇役無一違者詣政事堂白光光喜曰使人人奉法如君何不可行之有范子淵有罪貶知峽州子淵在熙豐間提舉修堤開河縻費巨萬而功用卒不成䕶堤壓埽之人溺死無算至是御史吕陶劾其罪出知峽州中書舍人蘇軾草制詞有曰汝以有限之財興必不可成之役驅無辜之民置之必死之地時以為至言置訴理所許熙寧以來得罪者自言夏四月罷熙河經制財用司召程頤為崇政殿説書初頤年十八上書仁宗欲黜世俗之論以王道為心治平元豐間大臣屢薦皆不起至是司馬光吕公著共疏其行義曰伏見河南處士程頤力學好古安貧守節言必忠信動遵禮法年踰五十不求仕進真儒者之髙蹈聖世之逸民望擢以不次使士類有所矜式召為秘書郎及入對改崇殿殿説書頤上疏言習與智長化與心成陛下春秋方富雖睿聖得于天資而輔養之道不可不至大率一日之中接賢士大夫之時多親寺人宮女之時少則氣質變化自然而成願選名儒入侍勸講講罷留之分直以備訪問或有小失隨時獻規嵗月積乆必能養成聖徳頤聞帝在宮中盥而避蟻問有是乎帝曰然誠恐傷之耳頤曰推此心以及四海帝王之要道也帝甞憑楹偶折栁枝頤正色曰方春時和萬物發生不當輕有所折以傷天地之和帝頷之韓縝免御史中丞劉摯殿中侍御史吕陶諫官孫覺蘇轍王覿朱光庭等連章論縝才鄙望輕在先朝奉使割地七百里以遺契丹邊人怨之切骨不可居相位遂出知潁昌今許州宋曰潁昌府縝外事荘重所至以嚴稱雖出入将相而寂無功烈厚自奉養世以比晉何曾王安石卒安石未柄用時名震京師不好華腴自奉至儉或衣垢不浣面垢不洗世多稱其賢蘇洵字明允軾之父獨曰是不近人情者作辨姦論以刺之謂王衍盧杞合為一人性彊忮遇事無可否自信所見執意不囘方議變法在廷交執不可安石傳經義出己意辨論輙數百言衆不能詘甚者謂天變不足畏祖宗不足法人言不足恤以是怨議紛起既再罷終神宗世不復召凡八年而卒安石毎聞朝廷變其法夷然不以為意及聞罷助後愕然失聲曰亦罷至此乎良乆曰此法終不可罷又甞曰新法以為始終可行者曾子宣也始終以為不可行者司馬君實也朱子曰安石以文章節行髙一世而尤以道徳經濟為己任被過神宗致位宰相世方見其有為庶幾復見二帝三王之盛而安石乃汲汲以財利兵革為先務引用凶邪排擯忠直躁迫彊戾使天下之人囂然喪其樂生之心卒之羣姦嗣虐流毒四海至于崇宣之際而禍亂極矣以吕公著為尚書右僕射兼中書侍郎元豐官制成三省並建而中書獨為取㫖之地尚書門下受成而已又執政官率數日一至執政堂事多決于其長同列英得預至是公著以為言詔自今事干三省者執政並同取㫖而各行之并命執政官長貮日集議事遂為定制考公著此請續綱目係于公著為門下侍郎條又不載政事堂日集議事今採宋史公著本傳改輯詔起文彦博平章軍國重事彦博致仕居洛司馬光言其宿徳元老宜起以自輔太后将用為三省長官言者以為不可乃命平章軍國重事六日一朝一月兩赴經筵班宰相上恩禮甚渥彦博年八十一矣黜内侍李憲等于外中丞劉摯言陛下臨御以來分别邪正而元惡大憝猶有漏網宦者李憲貪功生事漁歛生民膏血興靈之役首違師期乃頓兵城蘭州遺患今日王中正将兵二十萬出河東逗遛違詔精兵勁騎死亡殆盡宋用臣開封人神宗築京城建尚書省起太學立宗廟導洛通汴用臣悉領其事董大功役侵陵官司誅求小民奪其衣食之路石得一開封人領皇城司縱遣伺者飛書朝上則暮入狴犴朝士都民相顧以目者殆十年是四人者權勢烽焰張灼中外幸而先帝神武足以鎮壓不然其為禍豈減漢唐宦者哉侍御史林旦亦以為言詔並降官憲中正得一提舉宫觀用臣監太平州税務詔舉經明行修之士司馬光請立經明行修科嵗委升朝文臣各舉所知以勉勵天下使敦士行以示不専取文學之意若所舉人違犯名教必坐舉主母赦則自不敢妄舉而士之居鄉居家者惟懼玷闕外聞不待學官日訓月察立賞告訐而士行自美矣于是詔自今凡遇科舉令升朝官各舉經明行修之士一人俟登第日用以升甲五月以韓維為門下侍郎神宗崩維自提舉嵩山崇福宫入臨太后手詔勞問維對曰人情貧則思富苦則思樂困則思息鬱則思通誠能常以利民為本則民富常以憂民為心則民樂賦役非人力所堪者去之則勞困息法禁非人情所便者蠲之則鬱塞通推此而廣之盡誠而行之則子孫觀陛下之德不待教而成矣未幾起知陳州召為資政殿大學士兼侍讀至是拜門下侍郎命程頥等修定學制太學自蔡確起大獄連引朝士有司緣此造為法禁煩苛凝宻博士諸生禁不相見教諭無所施御史中丞劉摯以為言至是命程頥等修定條制頥大槩以為學校禮義相先之地而月使之爭殊非教養之道請改試為課有所未至則學宫召而敎之更不考定髙下置尊賢堂以延天下道徳之士鐫解額以去利誘省煩文以専委任勵行檢以厚風教及置待賔吏師齋立觀光法如是者亦數十條六月放鄧綰李定于滁州吕惠卿有罪建州安置惠卿見正人彚進知不容于時懇求散地右司諫蘇轍王覿厯數其姦請投畀四裔以禦魑魅中丞劉摯復列其五罪于是貶光禄卿分司南京再貶建寧軍節度副使建州安置中書舍人蘇軾草其制曰惠卿以斗筲之才穿窬之智諂事宰輔同升廟堂樂禍貪功好兵喜殺以聚歛為仁義以法律為詩書首建青苖次行助役均輸之政事同商賈手實之禍下逮雞豚苟可蠧國害民率皆攘臂稱首先帝求賢如不及從善如轉園始以帝堯之仁姑試伯鯀終焉孔子之聖不信宰子猶寛兩觀之殊薄示三危之竄天下傳誦稱快馬時惠卿章惇吕嘉問鄧綰李定蒲宗孟范子淵等皆已斥外言者論之不已范純仁言于太后曰録人之過不宜太深后然之乃詔前朝希合附㑹之人一無所問言者勿復彈劾惠卿黨稍安或謂公著曰今除惡不盡将貽後患公著曰治道去太甚耳文景之世網漏吞舟且人材實難宜使自新豈宜使自棄邪秋七月罷𣙜蜀茶初熙寧中以蒲宗閔領𣙜蜀茶事見前又以李稷為都大提舉稷與宗閔務浸利刻急一年之間通謀利及舊界息七十六萬七千餘緡及稷死以陸師閔詵之子代之師閔𣙜利尤刻税息培于稷至是劉摯蘇轍論師閔増場𣙜茶其害過于市易乃貶師閔官而罷成都茶場立十科舉士法司馬光奏為政得人則治然人之才或長于此而短于彼雖臯陶稷契各守一官中人安可求備若指瑕掩善則朝無可用之人苟隨器授任則世無可棄之士以臣備位宰相職當選官若専引知識則嫌于私若止循資序未必皆才乞朝廷設十科舉士一曰行義純固可為師表有官無官人皆可舉二曰節操方正可備獻納舉有官人三曰智勇過人可備将帥舉文武有官人四曰公正聰明可備監司舉知州以上資序五曰經術精通可備講讀有官無官人皆可舉六曰學問該博可備顧問同經術舉人七曰文章典麗可備著述同經術舉人八曰善聼訟獄盡公得實舉有官人九曰善治財賦公私俱便舉有官人十曰練習法令能斷請讞舉有官人凡此十科應侍從以上每嵗各舉三人中書置籍記之有事須材執政按籍視其所舉科隨事試之有勞又著之籍内外官闕取甞試有效者隨科授職所賜告命仍具所舉官姓名其人任官無状坐以繆舉之罪詔從之夏主秉常卒子乾順立時年三嵗帝初即位秉常遣阿拉雅舊作訛羅聿今改求蘭州米脂等五砦未許㑹秉常卒遣使來告哀詔自元豐四年用兵所得城砦待歸我永樂陷執民當畫以給還遂遣穆衍弔祭尋遣使封乾順為國主九月尚書左僕射兼門下侍郎河内公司馬光卒諡文正時兩宫虚己以聼光為政光亦自見言行計從欲以身徇社稷躬親庶務不舍晝夜賔客見其體羸舉諸葛亮食少事煩以為戒光曰死生命也為之益力病革諄諄語如夢中皆朝廷天下事也及薨太后哭之慟與帝臨其喪贈太師温國公京師之民罷市往弔鬻衣以致奠巷哭以過車比喪還如陜𦵏送者如哭私親四方皆畫像以祀飲食必祝焉光孝友忠信恭儉正直居處有法動作有禮自少至老語未甞妄自言吾無過人者但生平所為未甞有不可對人言者耳誠心自然天下敬信陜洛間皆化其徳如有不善曰君實得無知之乎光于物澹然無所好于學無所不通惟不喜釋老曰其㣲言不能出吾書其誕吾不信也及居政府凡王安石吕惠卿所建新法為民害者剗革畧盡或謂光曰熙豐舊臣多憸巧小人他日有以父子之義間上則禍作矣光正色曰天若祚宋必無此事遂改之不疑史臣曰熙寧新法病民者二十年一旦光起而為政毅然以天下自任開言路進賢才凡新法之害民者次第取而更張之海内之民歡忻鼓舞甚于更生君子稱其有旋乾轉坤之功而光已老且病不克終治惜哉以蘇軾為翰林學士軾自登州召還十月之間三遷清要尋兼侍讀毎經筵進講未甞不反覆開導覬有所啟悟甞鎖宿禁中召見便殿太后問曰卿前年為何官對曰黄州團練副使曰今為何官對曰待罪翰林學士曰何以遽至此對曰遭遇太皇太后皇帝陛下曰非也對曰豈大臣論薦乎曰亦非也軾驚曰臣雖無状不敢自他途進曰此先帝意也先帝毎誦卿文章必嘆曰竒才竒才但未能進用卿耳軾不覺哭失聲太后與帝亦泣左右皆感涕已而命坐賜茶撤御前金蓮燈送歸院軾在翰林􅀈以言語文章規切時政衛尉丞畢仲㳺憂其及禍貽書戒之曰君官非諫官職非御史而好非是人危身觸諱以遊其間殆猶抱石而救溺也軾不能從畢仲㳺字公叔士安曽孫張璪免諌官王覿御史吕陶上官均等奏疏言璪姦邪便佞劉摯亦言璪初奉安石旋附惠卿隨王珪黨章惇諂蔡確數人之性不同而能探情變節左右順從各得其歡心今過惡既彰不可不速去之疏入皆不報至是罷知鄭州冬十月改封孔子後為奉聖公鴻臚卿孔宗翰字周翰道輔子言孔子後世襲公爵本為侍祠今乃兼領他官不在故郡于名為不正乞自今襲封之人使終身在鄉里詔改衍聖公為奉聖公不預他職添給田百頃供祭祀外許均贍族人賜國子監書立學官以誨其子弟十一月以吕大防為中書侍郎劉摯為尚書右丞摯為中丞數月彈劾多所貶黜百僚敬憚時人以比吕晦包拯甞與同列奏事論及人才摯曰人才難得能否不一性忠實而才識有餘上也才識不逮而忠實有餘次也有才而難保可藉以集事又其次也懐邪觀望隨時改變此小人也太后及帝曰卿常能如此用人則國家何憂丁夘二年春正月禁科舉用王氏經義字説時科舉罷詞賦専用王安石經義且雜以釋氏之説凡士子自一語以上非安石新義不得用學者至不誦正經唯竊安石之書以干進精熟者輙上第故科舉益弊吕公著當國始請禁主司不得以老荘書命題舉子不得以申韓佛書為學經義參用古今諸儒説毋得専取王氏尋又禁毋得引用王氏字説夏四月詔文彦博十日一議事都堂彦博累表乞致仕故也以處士陳師道字履常一字無已彭城人為徐州教授師道髙介有節安貧樂道博學善文家貧或經日不炊晏如也熙寧中王氏經義盛行師道心非其説遂絶意進取至是以蘇軾薦授是職復制科李清臣免時釐正熙寧之政清臣固爭以為不可遂罷知河陽府秋七月庚戌朔日食罷門下侍郎韓維維處東省踰年有忌之者宻為讒愬詔分司南京尚書左丞王存抗聲簾前曰韓維得罪莫知其端臣竊為朝廷惜之乃還維資政殿大學士知鄧州八月罷崇政殿説書程頥頥甞言天下重任惟宰相經筵天下治亂繋宰相君徳成就責經筵其在經筵以禮法自持毎進講色甚荘繼以諷諫蘇軾謂其不近人情深嫉之毎加玩侮于是頥門人右司諫賈易字明叔無為軍人左正言朱光庭等積不能平劾軾試館職䇿問謗訕軾因乞補郡殿中侍御史吕陶言臺諫當盡至公不可假借事權以報私隙右司諫王覿言軾命辭失輕重其事小不足考若悉考同異深究嫌疑則兩岐遂分使士大夫有朋黨之名大患也太后然之范純仁亦言軾無罪遂置不問㑹帝患瘡疹不出頥詣宰相問知否且曰上不御殿太后不當獨坐人主有疾而大臣可不知乎翼日宰臣以頥言問疾由是大臣亦多不悦御史中丞胡宗愈右諫議大夫孔文仲給事中顧臨字子敦㑹稽人遂連章力詆頥不宜在經筵乃罷頥出管勾西京國子監時吕公著獨當國羣賢咸在朝不能不以類相從遂有洛黨蜀黨朔黨之語洛黨以頤為首而朱光庭賈易為輔蜀黨以蘇軾為首而吕陶等為輔朔黨以劉摯梁燾字况之鄲州須城人王巖叟劉安世字器之航之子為首而輔之者尤衆是時熙豐用事之臣退休㪚地怨入骨髓隂伺間隙而諸賢不悟各為黨比以訾議惟吕大防秦人戅直無黨范祖禹師司馬光不立黨既而帝聞之以問胡宗愈宗愈對曰君子指小人為姦小人指君子為黨陛下能擇中立之士而用之則黨禍熄矣因著君子無黨論以進吐蕃阿里庫誘果荘使據洮以叛岷州将种誼字夀伯世衡子執之檻送京師棟戩既死養子阿里庫嗣為邈川首領逼果荘使帥其衆據洮河岷州行營将种誼等帥師執果荘檻送京師尋赦之遣居秦州招其子嘉勒斡磋舊作結咓齪今改及部屬以自贖阿里庫懼乃上表謝罪罷右司諌賈易時程頥蘇軾交惡其黨互相攻訐易因劾吕陶黨軾兄弟語侵文彦博范純仁太后怒欲峻責易吕公著言易言頗直惟詆大臣太甚不可處諫列耳乃止罷知懐州公著退語同列諌官所言未論得失顧主上方富于春秋異時有導諛惑上心者正頼左右力諫不可使人主輕厭言者吕大防劉摯王存私顧而嘆曰吕公可謂仁者之勇戊辰三年春正月復置廣恵倉夏四月以吕公著為司空同平章軍國事吕公著以老懇辭位乃拜司空同平章軍國事詔建第于東府之南啟北扉以便執政㑹議凡三省樞宻院之職皆得總理間日一朝因至都堂其出不以時葢異禮也國初以來宰相以三公平章軍國事者四人而公著與其父夷簡居其二世羡其榮時熙豐用事之臣雖去其黨猶分布中外鴻臚丞常安民貽公著書曰善觀天下之勢猶良醫之視疾方安寕無事之時語人曰其後必将有大憂則衆必駭笑惟識㣲見幾之士然後能逆知其漸故不憂于可憂而憂之于無足憂者至憂也今日天下之勢可為大憂雖登進忠良而不能搜致海内之英才使皆萃于朝以勝小人恐端人正士未得安枕而卧也故去小人不為難而勝小人為難陳蕃竇武恊心同力選用名賢天下想望太平然卒死曹節之手遂成黨錮之禍張東之五王中興唐室以為慶流萬世及武三思一得志至于竄移淪沒凡此者皆前世已然之禍今怨忿已積一發其害必大可不為大憂乎公著得書黙然常安民字希古卭州人以吕大防范純仁為尚書左右僕射兼門下中書侍郎孫固劉摯為門下中書侍郎王存胡宗愈為尚書左右丞趙瞻簽書樞宻院事大防朴厚惷直純仁務以博大開上意忠厚革士風二人同心戮力以相王室大后復盡心委之故元祐之治比隆嘉祐時黨論方起純仁慮之㑹右諫議大夫王覿以胡宗愈進君子無黨論惡之因疏宗愈不可執政太后大怒純仁與文彦博吕公著辨于簾前太后意未解純仁曰朝臣本無黨但善惡邪正各以類分彦博公著皆累朝舊人豈容雷同㒺上昔先臣與韓琦富弼同慶厯柄任各舉所知當時飛語指為朋黨三人相繼補外造謗者共相慶曰一網打盡矣此事未逺願陛下戒之因極言前事朋黨之禍并録歐陽修朋黨論上之然竟出覿知潤州而宗愈居位如故冬閏十二月蜀公范鎮卒諡忠文初起鎮提舉中太乙宫兼侍讀且欲以為門下侍郎鎮雅不欲起從孫祖禹亦勸止之遂固辭不拜以銀青光禄大夫再致仕卒鎮清白坦夷恭儉慎黙篤于行義口不言人過臨大節决大議色和而語荘常欲繼之以死雖在萬乗前無所屈其學本六經口不道佛老申韓之説熙寕元豐之際天下賢士大夫以為相者鎮興司馬光二人至稱之曰景仁君實不敢有所軒輊己巳四年春二月司空東平公吕公著卒諡正獻公著薨太皇太后見輔臣泣曰邦國不幸司馬相公既亡吕司空復逝帝亦悲感即詣其家臨奠贈太師封申國公公著自少講學即以治心養性為本平居無疾言遽色于聲利紛泊然無所好簡重清淨葢天禀然其識慮深敏量宏而學粹毎議政事博採衆善以為善至所當守則毅然不可回奪神宗甞言其于人材不欺如權衡之稱物尤能避逺聲著迹不以知人自處王安石博辨騁辭人莫敢與抗公獨以精識要言服之安石甞曰疵吝毎不自勝詣長者即廢其服如此三月胡宗愈免中丞孫覺右正言劉世安等論之也夏四月分經義詩賦為兩科試士罷明法科尚書省請復詩賦與經義兼行解經通用先儒傳注及已説又言舊明法最為下科今中者即除司法叙名反在及第進士上非是乃詔立經義詩賦兩科罷試律義凡詩賦進士習一經試本經論孟義及詩賦論䇿凡四場經義進士習兩經試本經論孟義及論䇿亦四場兩科通定髙下而取解額中分之各占其半專經者以經義定取舍兼詩賦者以許賦為去留其名次髙下則于䇿論參之初司馬光言取士之道當先徳行後文學就文學言之經術又當先于詞章神宗専用經義論䇿取士此乃復先王令典百王不易之法但王安石不當以一家私學欲葢先儒令天下師生講解至于律令皆當官所須使為士者果能知道義自與法律㝠合何必置明法一科習為刻薄非所以長育人材敦厚風俗也至是遂罷之未幾詔御試舉人仍試詩賦論三題五月以范祖禹為右諫議大夫兼侍講祖禹初從司馬光修資治通鑑在洛十五年不事進取王安石尤愛重之祖禹終不往謁帝即位擢右正言以婦翁吕公著當國引嫌辭職再改著作郎兼侍講會夏暑權罷經筵祖禹上言陛下今日之學與不學係他日治亂如好學則天下君子欣慕願立于朝以直道事陛下輔佐徳黨以致太平不學則小人皆動共心務為邪諂以竊富貴且凡人之進學莫不于少時今聖質日長數耳之後恐不得如今日之專竊為陛下惜也公著薨始除右諫議大夫尋加禮部侍郎聞禁中覓乳媪以帝年十四非近女色之時與左諌議大夫劉安世上疏勸進德愛身又乞太皇太后保䕶聖躬言甚切至太后謂曰乳媪之説外間虚傳祖禹對曰外事雖虚亦足為先事之戒凡事言于未然則誠為過及其已然則又無所及言之何益陛下寧受未然之言勿使臣等有無及之悔太后深嘉之安置蔡確于新州唐置今肇慶府新興縣是確失勢日乆遂懐怨望在安州甞逰車葢亭在今德安府安陸縣治西北賦詩十章知漢陽軍今湖北漢陽府宋時為軍吴處厚邵武人與確有隙因解釋其語用郝處俊上元間諫髙宗欲傳位武后事指斥東朝上之以為譏訕于是臺諌言確怨謗乞正其罪詔確具析確自辨甚悉右正言劉安世等又言確罪状著明何待具析此乃大臣委曲為之地耳乃貶確光禄卿分司南京臺諫論之不置而諌議大夫范祖禹亦言確之罪惡天下不容尚以列卿分務留都未厭衆論執政議寘確于法范純仁王存獨以為不可力爭之文彦博欲貶確嶺嶠純仁聞之謂吕大防曰此路自乾興以來荆棘近七十年吾輩開之恐自不免大防遂不敢言越六日再貶確英州别駕新州安置純仁又言于太后曰聖朝宜務寛厚不可以語言文章之間曖昩不明之過竄誅大臣今舉動宜為将來法此事甚不可開端也且以重刑除惡如以猛藥治病其過也不能無損焉不聼確至新州未幾死初確之具析未上也梁燾自潞州召為諫議大夫過河陽邢恕極論確有䇿立勲燾至奏之太后諭三省曰帝是先帝長子子繼父業其分當然確有何䇿立勲也若使確他日復來欺罔上下豈不為朝廷害恐帝年少制御不得故今因其自敗如此行遣葢為社稷也六月范純仁王存罷吕大防言蔡確之黨盛不可不治純仁面諫朋黨難辨恐誤及善人司諫吴安詩正言劉安世因論純仁黨確純仁亦力求罷政乃出知潁州府存確所舉也故亦出知蔡州庚午五年春二月夏人來歸永樂之俘詔以米脂等四砦畀之夏人來歸永樂所獲吏士百四十九人遂詔以米脂葭蘆浮圖安疆四砦還之夏得地益驕文彦博致仕彦博復居政府無嵗不求去㑹殿中侍御史賈易言彦博至和建儲之議不可信太后命付史館彦博益求罷乃以太師充䕶國軍山南西道節度等使致仕令有司備禮册命宴餞于玉津園先是遼使耶律永昌來聘蘇軾館之與永昌入覲見彦博于殿門外却立改容曰此潞公也邪問其年曰何壮也軾曰使者見其容未聞其語其綜理㢘務雖精練少年猶不如其貫穿古今雖專門名家有不逮永昌拱手曰天下異人也三月趙瞻卒以韓忠彦字師模琦之子同知樞宻院事蘇頌為尚書左丞彦博甞與傅堯俞許将論事不合俱求罷政殿中侍御史上宫均言大臣之任同國休戚廟堂之上當務協諧使中外之人冺然不知有同異之迹若悻悻然辨論不顧事體何以觀視百僚堯俞等雖有辨論之失然事皆縁公無顯惡大過望令就職太后從之夏四月知樞宻院事孫固卒先是知樞宻院事安燾以父喪去職固代知院事至是卒固宅心誠粹不喜矯亢與人居乆而益信故更厯夷險而不為人所疾害傅堯俞言司馬公之清節孫公之淳徳葢所謂不言而信者也世以為確論秋八月召鄧潤甫為翰林學士承㫖罷御史中丞梁燾諫議大夫劉安世朱光庭初潤甫以母喪終制除吏部尚書梁燾權給事中駁之改知亳州至是復以承㫖召燾為中丞與左諌議大夫劉安世右諫議大夫朱光庭交章論潤甫出入王吕黨中始終反覆今之進用實繋君子小人消長之機又言潤甫甞為蔡確制稱確有定䇿之功以欺惑天下乞行罷黜累疏不報燾等因力請外乃出燾知鄭州光庭知亳州安世提舉崇福宫時劉摯上疏請暫出潤甫留燾等蘇轍亦三疏論之皆不報以蘇轍為御史中丞考宋史蘇轍傳元祜五年遷御史中丞上疏極論調停之説葢梁燾既罷轍代為中丞因上此疏續綱目附載其疏于召用鄧潤甫條目而不更書轍為中丞宋元通鑑又載其疏于召用鄧潤甫之前皆非是今據轍傳増輯自司馬光卒後熙豐舊黨爭起邪説以揺撼在位吕大防劉摯患之欲稍引用以平夙怨謂之調停太后疑不决轍面論其非又以説有未盡復上疏言之畧曰親君子逺小人則主尊國安疎君子任小人則主憂國殆此理之必然未聞以小人在外憂其不悦而引之于内以自貽患也光帝聰明聖智疾頽靡之俗将以綱紀四方比隆三代而臣下不能将順造作諸法上逆天意下失民心二聖因民所願取而更之上下忻慰前者用事之臣不加斥逐宥之于外葢已厚矣而議者惑于衆説乃欲招而納之與之共事謂之調停此軰若返豈肯但已哉必将戕害正人漸復舊事以快私忿人臣被禍葢不足言臣所惜者祖宗朝廷也惟陛下斷自聖心勿使小人一進後有噬臍之悔疏入太后命宰執讀于簾前曰轍疑吾君臣兼用邪正其言極中理諸臣從而和之調停之説遂已辛未六年春二月以劉摯為尚書右僕射兼中書侍郎蘇轍為尚書右丞王巖叟簽書樞宻院事轍除命既下右司諌楊康國奏曰轍之兄弟謂其無文學則非也蹈道則未也其學乃學為儀秦者也其文率務馳騁好作為縱横捭闔無安靜理陛下若悦蘇轍文學而用之不疑是又用一安石也轍以文學自負而剛狠好勝則與安石無異不報巖叟居言職五年正諫無隠及拜簽樞宻謝因進曰太后聼政以來納諫從善務合人心所以朝廷清明天下安靜願信之勿疑守之勿失復進言于帝曰陛下今日聖學當深辨邪正正人在朝則朝廷安邪人一進便有不安之象非謂一夫能然葢其類應之者衆上下蔽䝉不覺養成禍患爾又曰或聞有以君子小人參用之説告陛下者不知果有之否此乃深誤陛下也自古君子小人無參用之理聖人但云君子在内小人在外則泰君子在外小人在内則否小人既進君子必引類而去若君子與小人競進則危亡之基也兩宫深然之夏五月己未朔日食六月淅西水杭州死者五十萬蘇州死者三十萬詔賜米百萬石錢二十萬緡賑之翰林學士承㫖蘇軾罷初軾以論事為衆所忌趙挺之字正夫宻州諸城人王覿攻之遂出知杭州未幾召還侍御史賈易復劾軾元豐未在揚州聞先帝厭代作詩及草吕惠卿制皆誹怨先帝無人臣禮御史中丞趙君錫字無愧安仁孫亦繼言之太后怒罷易知宣州君錫知鄭州吕大防請併軾兩罷乃出軾知潁州尋改知揚州秋七月復制置解鹽使詔解鹽復許通商冬十一月罷劉摯知鄆州摯性峭直有氣節不為利誘威怵與吕大防同位國家大事多决于大防惟進退士大夫實執其柄然持心少恕勇于去惡竟為朋讒竒中遂與大防有隙先是蔡確之貶邢恕亦謫監永州酒税以書抵摯摯故與恕善答其書有永州佳處第往以俟休復之語排岸官茹東濟得其書隂録以示中丞鄭雍字公肅襄邑人殿中侍御史楊畏字子安遂寕人徙洛陽二人方附吕大防因箋釋其語謂休復者語出周易以俟休復者俟他日太皇太后復子明辟也上之又章惇諸子故與摯子㳺摯亦間與之接雍畏謂延見接納為牢籠之計以覬後福且論王巖叟梁燾劉安世朱光庭等三十人皆其死友太后于是面諭摯曰言者謂卿交通匪人為異日地卿當一心王室若章惇者雖以宰相處之未必樂也摯惶恐退上章自辨而梁燾王巖叟果上疏論救之太后曰垂簾之初摯斥排姦邪實為忠直但此三事非所當為也遂罷知鄆州給事中朱光庭駁之曰摯忠義自奮朝廷擢之大位一旦以疑而罷天下不見其過言者以光庭為黨亦罷知亳州中書侍郎傅堯俞卒諡獻肅堯俞卒太后謂輔臣曰傅侍郎清直一節終始不變金玉君子也方倚以為相遽至是乎堯俞素與王安石善熙寜初自知廬州入京時方行新法安石謂之曰舉朝紛紛俟君來乆矣将以待制諫院處君堯俞曰新法世以為不便誠如是當極論之安石怒遂不用司馬光甞謂邵雍曰清直勇三徳人所難兼吾于欽之畏焉雍曰欽之清而不耀直而不激勇而能温是為難耳御批厯代通鑑輯覽卷七十八

  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_102-1a, image: WYG0339/WYG0339-0285a.png}
body:
  text: 時軍伍頗缺衛所勾軍州縣多不以實無丁之家誅求不已有丁之户行賄得免興州軍士范濟詣闕言之乃命宗載等十五人分往直省清理之其後定清軍例二十四條遣京卿給事中御史以為常三月以禮部左侍郎張瑛邢臺人兼華蓋殿大學士直文淵閣初帝為皇太孫瑛以給事中與陳山沙縣人俱侍講讀至是以舊恩遂有是命瑛善承風旨雖參機務委蛇受成而已帝亦弗重也陳山于明年正月亦拜謹身殿大學士夏四月遣成山侯王通征黎利先是利陷茶籠去年十月陳智方政討之敗績是年三月時渠魁未平小冦蜂起宣化賊周臧太原賊黃菴芙蒥賊潘可利雲南寧逺州紅衣賊長擎俱叛附利址宣化太原皆府名芙蒥縣名皆屬交布政司今為安南國地帝降旨切責智政以通為征夷大將軍充總兵官馬瑛為參將帥師討利尚書陳洽參贊軍務智政俱削爵充為事官明制凡以失律奪職戴罪從征者稱為事官聽通節制通既出師一日帝御文華殿蹇義夏原吉楊士竒楊榮侍帝曰交址自建郡縣以來用兵無寧歲昨遣將出師朕反覆思之欲如洪武中使自為一國歲奉常貢以全一方民命卿等以為何如義原吉對曰太宗皇帝平定此方勞費多矣二十年之功棄于一旦臣等以為非是帝顧士竒榮曰卿兩人云何對曰交址唐虞三代俱在荒服之外漢唐以來雖為郡縣叛服不常漢元帝時以賈捐之議罷珠崖郡前史稱之元帝中主猶能布仁行義况陛下父母天下與此豺豕較得失邪帝頷之乃下詔大赦交址罪人黎利潘僚降亦授職停採辦金銀香貨欲以弭賊而賊無悛心五月詔毁身療親疾者不得旌表初洪武中禮部定議凡人子卧氷刲股者不在旌表之例事見前至是總旗明史兵志凡千百户所各設總旗二小旗十衛整女母病篤刲肝煮液母飲之而愈禮部特為請旌帝曰孝親有道剖腹刲肝豈可為孝若因此傷生則其罪益大所請不允秋七月京師地震是歲南京地亦震始立內書堂洪武中設內官監典簿掌文籍以通書算小內使為之又設尚寶監掌玉寶圖書皆僅識字不明其義及永樂時始令聽選教官入內教習至是開書堂于內府改刑部主事劉翀為翰林修撰専授小內使書其後大學士陳山修撰朱祚俱専是職選內使年十歲上下者二三百人讀書其中後增至四五百人翰林官四人教習以為常于是內官始通文墨掌章奏照閣票批硃與外庭交結往來矣京師地生毛長尺餘詔自今內官內使傳旨必覆奏始行屢申諭部科而內官內使之擅傳旨者終不能禁部科亦不能違也八月漢王高煦反帝親征高煦徙國樂安永樂中高煦有罪自雲南徙封樂安事具前益怨望帝即位與其黨日夜造軍器籍丁壯為兵破獄出死囚厚養之集旁近無賴子弟及逋逃賜銀幣編隊甲奪府州縣官民畜馬立五軍指揮王斌將前軍韋達左軍千戶盛堅右軍知州朱恆後軍高煦自將中軍四哨指揮韋𢎞韋興千戶王玉李智領之部署已定授王斌太師朱恆及長史錢巽尚書盛堅及典仗侯海都督教授錢常侍郎其餘各以差授職遣人約山東都指揮靳榮為助期先取濟南然後犯闕御史樂安李濬家居變姓名詣京白其事山東文武軍民真定等衛所告變者亦踵至高煦遣親信枚青入京約英國公張輔為內應輔立縶以聞帝遣中官侯泰賜高煦書泰至高煦盛兵見泰曰靖難時非我出死力不得至是太宗輕聽讒言削去護衛徙我樂安仁宗徒以金帛餌我今上舉口談祖制吾安能鬱鬱久居此乎因命泰觀其軍馬兵器曰以此橫行天下可也爾歸報爾主速執送姦臣然後議吾所欲耳泰懼不敢言歸亦不以實對越數日高煦所遣百戶陳剛賫奏至多所指斥索誅姦臣以夏原吉為罪首帝遣陽武侯薛祿膠人行六軍中呼薛六後貴更名祿往討之夜召諸大臣入議原吉免冠謝死罪帝曰卿何為是言彼借卿為兵端耳休戚與卿共之命諸大臣坐屏左右密語楊榮首勸帝親征帝難之張輔曰願假臣兵二萬擒獻闕下不足煩至尊榮曰彼謂陛下新立必不自行故敢爾以天威臨之事無不濟臣請先驅原吉曰獨不見李景隆已事邪臣昨見所遣將命下即色變退語臣等泣臨事可知且兵貴神速卷甲趨之所謂先人有奪人之心也榮言是議遂決越三日發京師命鄭王瞻埈襄王瞻墡居守帝在道馬上顧謂從臣日卿等度高煦計安出或對曰樂安城小彼必先取濟南為巢窟或曰彼曩不肯離南京今必引兵南行帝曰不然濟南雖近攻之未易下聞大軍至亦不暇攻護衛軍家屬在樂安豈肯舍之而南以朕計之高煦外強中怯敢反者以朕年少新立衆心未附又謂朕不能自行他將來以甘言厚利誘之冀僥幸成事今朕來已膽落敢出戰乎至即成擒耳帝至樂安高煦降遂班師高煦初聞薛祿將喜曰易與耳及聞帝親征始懼其黨有自拔來歸者帝厚賞之令還諭其衆復遺高煦書曰張敖失國本之貫高淮南受誅成于伍被今六師壓境王即出倡謀者朕與王除過恩禮如初不然一戰成擒或縛王來獻朕雖欲保全不可得矣前鋒至樂安高煦約詰朝出戰帝聞令大軍蓐食兼行駐蹕樂安城北諸將壁其四門王斌等乘城舉炮大軍發神機銃擊之聲如雷震諸將請即攻城帝不許復再敕諭高煦又以敕矢射城中諭逆黨禍福城中多欲執高煦獻者高煦懼密遣人請降願假今夕訣妻子明日出歸罪帝許之其夜高煦焚兵器及通逆文書火通夕不息昧爽帝移蹕城南髙煦將出城王斌固止之曰寧一戰死無為人所擒髙煦紿斌等復入宫潛從間道出為官軍所執帝以廷臣劾章示之令為書召諸子同歸京師改樂安州為武定州命陽武侯薛祿兵部尚書張本字致中東阿人留鎮焉九月帝還京師遣使諭趙王高燧師還次單橋即單家橋注見前陳山迎謁請乘勝襲彰德執趙王楊榮以帝意令楊士竒草敕士竒曰太宗皇帝惟三子今上惟兩叔父有罪者不可赦無罪者宜厚待之疑則嚴防之使無虞而已何遽加兵傷皇祖在天意乎時惟楊溥與士竒合請皆入以死諍二人入閽者不納帝召蹇義義以士竒言白帝移兵事遂罷至京師帝語士竒曰議者喋喋多言趙王事奈何士竒曰趙王與陛下最親陛下當保全之無惑羣言帝曰吾亦思之今欲封羣臣章示王令王自處何如士竒曰得一璽書更善帝從之乃遣駙馬都尉廣平侯袁容夀州人尚成祖女永安公主等奉書及羣臣所上章至趙趙王大喜已泣曰吾生矣即上表謝且獻護衛言者頓息自是帝待趙王益厚而薄陳山山尋入內閣帝問楊士竒曰陳山何如人對曰山寡學昧大體帝曰然趙王事幾為所誤未幾命輟機務專授小內使書張瑛亦出為南京禮部尚書廢高煦為庶人築室西安門內謂之逍遙城并其諸子錮之王斌朱恆等皆伏誅長史李默以嘗諫免死謫口北為民天津山東諸都督指揮以預謀誅死者六百四十餘人戍邊者一千五百餘人帝親製東征記備書其事後數年寧王權上言請赦高煦不從一日帝往視之高煦伸足勾帝仆于地帝命舁銅缸覆之缸重三百斤高煦頂負之輒動乃命積炭于上燃之逾時火熾銅鎔高煦死諸子亦死冬十月釋李時勉于獄復以為翰林侍讀時勉既下獄至是復有言其得罪先帝者帝震怒命校尉縛以來又使即斬西市毋入見而時勉已為前校尉縛至帝遙見罵曰爾觸忤先帝疏何語具數之時勉曰臣言諒暗中不宜近妃嬪皇太子不宜逺左右帝聞氣稍平時勉數至六事止帝令盡陳之對曰臣惶懼不能悉記帝意益解曰是第難言耳草安在對曰焚之矣帝太息曰忠臣也立赦之復其官大雷電雨十一月王通兵至交址遇賊于應平交址舊縣屬交州府敗績參贊尚書陳洽死之通未至交址黎利弟善攻交州府都督陳濬擊却之參將馬瑛破賊清威與下石室東關俱交址舊縣屬交州府至石室會通兵亦至遂與之合進次應平之寧橋臨沙河諸將言地險惡恐有伏宜且駐師覘賊通不聽麾兵徑渡人馬行泥淖中不能成列伏四起軍大潰死者二三萬人通被創走尚書陳洽陷陳墜馬左右欲扶還洽叱曰吾為國大臣報國正在今日揮刀殺賊數人自剄死黎利在清化聞之自將精卒疾馳圍東關通本無將略一敗即氣沮隂遣人許為利乞封不奉朝命擅割清化以南地畀賊令官吏軍民盡還東關檄至清化知州羅通不從與指揮打忠攖城拒守利移兵攻之不下既而利犯交州通出兵擊之賊大敗斬其偽官以下萬餘級利惶懼欲走諸將請乘勝急擊通猶豫數日賊得樹柵掘濠塹四出攻掠遂分兵陷昌江都指揮李任前後三十戰力竭自剄死復攻邱溫邱溫去廣西憑祥止二宿總兵官顧興祖擁兵不救城遂陷事俱在明年昌江城在故諒江府南邱溫城在故諒山府北李任永康人十二月遣安逺侯柳升征黎利黔國公沐晟自雲南引兵會之帝聞王通敗大駭乃命升充總兵官保定伯梁銘汝陽人副之都督崔聚懷逺人充參將尚書李慶字德孚順義人參贊軍務帥師由廣西赴討又命沐晟及興安伯徐亨新寧伯談忠從雲南進兵敕通固守以俟又以黃福仍兼交址布按二司事與升等同行丁未二年春正月南京地震是年凡十有一震夏四月晉王濟熿有罪廢為庶人初濟熿既搆陷濟熺事具前幽其父子空室中蔬食不給恭王宫中老媪走訴成祖盡得其搆陷狀乃命釋濟熺封其子美圭為平陽王畀以恭王故田濟熿靳不與仁宗屢詔諭之不聽帝即位高煦反濟熿與通謀其黨至京自首寧化王濟煥亦奏其弒母事亦見前帝遣人察之皆實乃免為庶人幽之鳯陽同謀者皆伏誅王通許黎利和介其使上表利圍交州久通閉城不敢出利益易之致書請和上表謝罪通欲許之集衆議按察使楊時習曰奉命討賊與之和而擅退師何以逃罪通怒厲聲叱之衆莫敢言遂遣人偕利使至京進表及方物秋七月松潘畨叛遣都督同知陳懷合肥人等討之松潘衛當發軍戍交址將士憚行千戶錢宏與衆謀詭言畨叛冀免調都司果罷其役而發軍討畨宏潛至畨寨脅以大軍將致討逼取牛馬財物畨本不反忽聞大軍且至衆遂驚走約生畨為亂殺指揮陳傑衆至五萬人合攻松潘城焚上下四關及諸屯堡又圍威茂壘溪注見前諸衛所官軍屢戰皆敗帝遣懷與指揮蔣貴字大富江都人合兵討之而梟宏于松潘以徇明年正月官軍連敗賊復疊溪招撫諸畨三十餘寨松潘平命懷鎮其地令官吏軍民入米贖罪自死罪至笞四十分十等納米百石至二石有差納者贓罪得不死徒流以下皆復用不能納者雖笞杖久繫不釋往往至死後以御史張純言貧人罪輕者始免追繫命都督僉事山雲徐州人鎮廣西栁慶蠻韋萬黃等糾合猺獞苗種名劫掠臨桂唐縣今為桂林府治諸縣鎮逺侯顧興祖坐逮以不救交址命雲佩征蠻將軍印充總兵官率官軍討之賊退保山巔壘石于藤俟官軍至輒斷藤下之莫敢近雲夜束火牛羊角以金鼓驅向賊賊亟斷藤下木石比明木石且盡衆譟而登斬首萬餘級賊降雲乃築四城九堡傳舍九十餘區以鎮要害初土官饋獻帥率受之然卒為所持雲聞府吏鄭牢剛直召問曰饋可受乎牢曰潔衣被體一汚不可復湔將軍新潔衣也寧可汚乎雲曰彼且疑奈何牢曰黷貨法當死將軍不畏天子法乃畏土夷邪雲曰善盡却之由是土酋皆服九月栁升師次倒馬坡在雞陵關南遇伏死諸軍盡殁升奉命久俟諸軍集至是始抵隘留關黎利與王通已有成言乃偽為國人書詭稱陳氏有後令其下詣升軍乞罷兵立陳氏裔升不啓封遣使奏聞趣進兵連破關隘數十直抵鎮夷關即雞陵關永樂中更名升意殊輕賊郎中史安字志靜豐城人主事陳鏞字叔振錢塘人恐賊示弱以誘官軍亟言于李慶請升持重勿輕進時慶及梁銘皆病甚強起告升都事潘禋鄞人且引寧橋事為戒升不為意前至倒馬坡與百餘騎先馳度橋橋遽壞後隊不得進升陷泥淖中伏發升中鏢死從者皆殁其夕銘卒明日慶亦卒崔聚整軍至昌江遇賊殊死鬬賊驅象大至陳亂聚為賊所獲誘之降不屈遂被殺官軍或走或死無一人降者安鏞禋及主事李宗昉史無里系皆死黃福奔還為守關者所獲欲自殺守關者力阻之日公我父母也公不歸我曹豈敢至此利聞饋白金餱糧以肩輿送出境福至龍州以賊所遺歸之官冬十月王通棄交址與黎利盟而還通聞栁升敗殁益懼更啖利和教利立陳皓為陳氏後詭言皓實先陳王暊三世孫今訪得之交人欲奉以為後輒立壇集軍民官吏與利盟誓退師因宴利遺利錦綺利以重寶賂通通為馳上表即引兵還沐晟軍至水尾聞已議和遂引退賊乘之晟大敗水尾交址舊縣屬歸化州接雲南界十一月詔赦黎利罷交址兵悉召文武吏士北還鴻臚寺進黎利與栁升書越一日王通使以利所奉陳皓表亦至詞略相同帝覽之心知其詐然欲藉此息兵乃以表示廷臣命集議張輔曰此詐也請益發兵討之臣期以一年擒賊蹇義夏原吉亦以為不可許而楊士竒楊榮知帝厭兵且前有欲棄交址語語具前因力言許利便帝意遂決廷臣不敢復爭于是遣侍郎李琦羅汝敬等齎詔撫諭交址赦除其罪并諭利興滅繼絶意令具陳氏後人之實以聞敕召王通馬瑛及三司衛所府州縣官吏盡撤軍民北還詔未至王通已由陸路還廣西陳智及中官馬騏山夀由水路還欽州官吏軍民得還者八萬六千餘人為賊所獲及拘留者不可勝計交址內屬二十餘年屢叛屢討及棄地罷兵嵗省軍興巨萬而中國兵威亦稍詘自是逺夷朝貢多不至者皇子生赦帝年三十胡皇后未有子而孫貴妃有寵妃鄒平人幼育宫中有美色帝即位立為貴妃乃隂取宫人子為己子帝以長子生大喜寵貴妃有加戊申三年春二月立子祁鎮為皇太子即英宗皇子生八日羣臣即上表請立為太子皇后亦屢表請早定國本貴妃佯驚曰后病痊自有子吾子敢先后子邪帝不允貴妃子遂立作帝訓成凡二十五扁曰君德奉天法祖正家睦親仁民經國勤政恭儉敞戒用賢知人去邪防微求賢祭祀重農興學賞罰黜陟恤刑文治武備御夷藥餌帝自為之序復題其後以詔子孫三月廢皇后胡氏立貴妃孫氏為皇后太子既立帝以春秋母以子貴將廢后而立貴妃召諸大臣言之楊士竒以為不可翼日帝獨召士竒至武英殿密諭之士竒曰皇后今有疾惟以疾辭位遜居别宫則進退有禮帝俞之乃令后上表辭位退居長安宫賜號靜慈仙師而册貴妃為皇后胡后既廢張太后常召居清寧宫至正統八年乃殂葬金山天順間追諡恭讓皇后金山在宛平縣西北宴大臣于西苑在今西華門西明彭時賜遊西苑記西苑在宫垣西中有太液周十餘里池中駕虹梁以通往來橋東為圓臺臺上為圓殿其北即萬歲山山上有殿亭六七所最高處廣寒殿也帝命蹇義夏原吉楊士竒楊榮等十有八人從遊萬歲山復賜登御舟泛太液池帝指御舟曰治天下猶此舟矣利涉大川卿等之力也當是時帝方勵精求治諸大臣亦同心輔政海內漸臻治平帝乃倣古君臣豫遊事每首歲許百官旬休選勝宴樂帝亦時遊西苑諸學士皆從問民間疾苦賦詩賡唱朝野稱盛事云夏四月詔自今官民建言尚書都御史給事中會議以聞閏月遣使撫輯河南流民工部郎中李新自河南還言山西飢民流徙南陽諸郡不下十餘萬官司遣人捕逐民愈窮困死亡日多帝即遣官撫恤撥廩賑之王通陳智等及內官馬騏山夀俱以棄交址罪下獄論死時議以通棄地擅和騏恣虐激變罪為最重然帝皆不誅長繫待決而已顧興祖先被逮亦下獄沐晟為廷臣所劾帝不問封章示之五月贈恤交址死事諸臣秋七月以顧佐字禮卿太康人為右都御史都御史劉觀雄縣人以貪被黜楊士竒楊榮薦佐亷公有威尹京師政清弊革帝立擢佐右都御史賜敕奬勉佐視事即奏御史不法及老疾者三十二人朝綱肅然佐性嚴毅每旦趨朝小憩于外立雙藤户側百僚皆旋折避之入內直廬獨處小夾室非議政不與諸司羣坐人稱顧獨坐云都察院吏訴佐受𨽻金私遣𨽻歸帝密示楊士竒曰爾不嘗舉佐亷乎對曰有之朝官俸薄僕馬薪芻資之𨽻不得不遣半歸使出資免役官得資費𨽻得歸耕永樂以來朝臣皆然即臣亦然帝歎曰朝臣貧乃如此因怒訴者曰朕方用佐小人輒敢誣之乃以狀付佐曰汝自治之佐召吏吏恐甚佐曰上命我治汝汝改行吾當貸汝帝聞謂佐得大體益喜八月罷北京行後軍都督府及行部初仁宗將還都南京命北京諸司悉稱行在事見前復設行後軍都督府及行部至是罷之諸司行在字至正統六年始去帝巡邊敗烏梁海之衆于寬河在今喀喇沁左翼南源出寬山東流會額類河入逺盛京寧州界帝次石門驛在遵化州西有鎮聞烏梁海統率部衆萬餘人已入塞乃留大軍于遵化遼縣今為州而自率精騎三千人人二騎持十日糧出喜峯口注見前遇敵于寬河帝親射其前鋒殪三人分鐵騎為兩翼夾擊之飛矢如雨神機炮並發烏梁海部衆潰散人馬死者過半帝親率百餘騎追奔其衆望見黃龍旗悉下馬羅拜請降明日命諸將搜山谷獲軍器馬駝不可勝計冬十月命中官郭敬鎮守大同武安侯鄭亨久鎮大同治軍嚴肅撫士卒有恩常云大同我國家後門我死後來者何人幸勿壞我家事也時內官在邊總兵官畏之惟亨與敬議事無所撓亨卒敬始縱恣己酉四年春正月兩京地震北京是年震者三南京震者七夏四月命工部尚書黃福平江伯陳瑄經略漕運大臣督漕自此始詔贓吏不得贖罪御史王翺字九臯鹽山人言官吏害民蠧政贓犯為甚今官吏罪無輕重運磚復職是貪贖者幸免廉潔者鮮勸非為治之道也請自今贓吏坐死但許贖罪不許復官從之未幾文職有贓罪納米者吏部請降一級用帝曰納米乃一時之權宜懲貪為立國之大法自今文職官吏犯贓者悉依律治六月初設鈔關洪武定制有商稅而無船稅至是户部以鈔法不行請行納鈔例御史羅亨信字用實東莞人等亦言之乃沿兩京水道設關收鈔于是置漷縣濟寧徐州淮安揚州上新河在南京滸墅在蘇州九江金沙州在湖廣臨清北新在杭州諸鈔關量舟大小修廣而差其額謂之船料不稅其貨惟臨清北新則兼收貨稅冬十月帝製猗蘭操賜大臣又諭蹇義等曰薦賢為國大臣之道卿等宜勉副朕懷庚戌五年春正月少保兼太子少傅户部尚書夏原吉卒諡忠靖原吉與蹇義皆起家太祖時義秉銓政原吉管度支俱二十七年時稱蹇夏及是原吉卒贈太師原吉有雅量嘗曰處有事當如無事處大事當如小事若先自張皇則此中無主何能應事嘗與同列飲他所夜歸值雪過禁門有欲無下者原吉曰君子不以冥冥墮行其敬慎如此二月下詔寬恤帝以春和將下詔寬恤先諭楊士竒欲蠲免災糧寬民間追償畜馬士竒對曰聖念及此真民生之幸但今當寬恤者尚不止此因請免積欠薪芻量減官田租額部符採買當按土宜法司理刑務敦平恕工匠在京者宜分户丁之半還家帝悉嘉納命士竒即草敕行之帝奉皇太后謁長陵獻陵帝親櫜鞬騎𨗳太后輦至清河橋清河注見前下馬扶輦畿民夾道拜觀陵旁老稚皆山呼迎拜太后顧曰百姓戴君以能安之耳皇帝宜重念帝奉太后過農家召老婦問所業賜鈔幣有進蔬食酒漿者太后取嘗之以與帝曰此田家味也皇帝宜知之扈從臣張輔蹇義楊士竒楊榮金幼孜楊溥見太后于行殿太后慰勞之帝還見道中耕者取其耒三推顧侍臣曰朕三推已不勝勞况常事此乎賜之鈔凡所過農家皆賜之夏五月擢郎中况鍾字伯律靖安人等九人為知府賜敕遣之帝以知府多循資格不稱任會雄劇地九郡缺守命大臣舉京官亷能者用之乃擢鍾知蘇州及郎中趙豫字定素安肅人知松江莫愚臨桂人知常州羅以禮桂陽人知西安員外郎陳本深字有源鄞人知吉安邵旻知武昌馬儀知杭州二人史皆失其里系御史何文淵字巨川廣昌人知溫州陳鼎新興人知建昌等皆賜敕俾馳驛之任其冬復用薛廣等二十九人亦如之後鍾等皆著聲績有居官至一二十年者吏稱其職民安其業一時蒸蒸稱極盛焉蘇松鄰郡况鍾在蘇州其為政務鋤豪強植良弱興利除害不遺餘力民有况太守民父母之歌趙豫在松江一意拊循與民休息在職十五年尤以愷悌稱及去老稚攀轅留一履以志遺愛時論謂鍾為能吏而豫為循吏云六月遷開平衛于獨石即今獨石城在宣化府赤城縣東北獨石口南本元雲州地明移開平衛于此今設副將同知駐防洪武初設開平衛置八驛東接大寧古北口西接獨石永樂間大寧既棄開平勢孤至是遂徙開平衛于獨石棄地三百里盡失龍岡灤河注俱見前之險邊備益虛遣使捕畿內蝗諭户部曰往年捕蝗之使害民不減于蝗宜知此弊因作捕蝗詩示之秋八月己巳朔日食隂雨不見禮部請表賀不許命工部尚書黃福總理畿南山東河南淮北屯田尋罷福上言永樂間營建北京南征交址北伐沙漠資用未嘗缺乏比國無大費而資用僅給即不幸有水旱征調何以濟之臣請役操備營繕軍十萬人于濟寧以北衛輝真定以東緣河屯種歲可得米一百萬石帝善之遣郎中趙新等經理福總其事兵部尚書張本言軍有常業若復分營田役未免勞擾事遂不行九月以周忱為工部侍郎巡撫南畿帝以天下財賦多不理而江南尤甚思得才力大臣往釐之乃用大臣薦擢忱巡撫南畿兼督稅糧許便宜行事忱浮沉郎署畿二十年稍遷越府長史及是以楊榮薦遂被擢用忱至即召父老訪悉逋稅故設法以次理之時蘇州逋賦最多積至八百萬石而賦額亦較他府獨重官民田租共二百七十餘萬石而官田乃至二百六十二萬石民不能堪帝屢詔減之忱與知府况鍾曲算纍月減至七十二萬餘石他府亦以次減民困獲蘇先是胡槩為巡撫用法嚴忱一切治以簡易凡告訐輒不省或面訐忱公不及胡卿忱笑曰胡卿敕旨在驅除民害朝廷命我但云撫安軍民委寄正不同耳及在江南既久與吏民相習若家人父子每行村落屏去騶從與農夫餉婦相對從容問疾苦為之商略處置其馭下雖卑官冗吏悉開心訪納遇長吏有能者則推誠與咨畫務盡其長故事無不舉嘗相視水利督濬崑山嘉定諸浦時以匹馬往來江上見者不知為巡撫也始與忱同命者北畿山東曹𢎞湖廣吳政由員外郎江西趙新浙江趙倫由郎中河南山西于謙由御史皆擢侍郎為巡撫而忱與謙任最久政績亦最著于謙字廷益錢塘人冬十月帝巡邊至洗馬林注見前閲武而還十二月兩京地震北京震者一南京震者四辛亥六年春三月命考察外官自布政按察二司始夏六月命黎利權署安南國事三年夏李琦還自交址黎利遣使奉表謝恩詭言陳皓物故陳氏子孫已絶國人推利守其國以俟朝命帝知陳氏即有後利亦必不言然以封利無名復遣使齎敕諭利及其國人令遍訪陳氏之子孫并盡還官吏軍民及兵器之留其國者利亦再遣使奉表并具頭目耆老奏堅言陳氏無後仍為利乞封帝乃遣禮部侍郎章敞字尚文會稽人齎敕命利權署安南國事利雖受朝命其居國則稱帝紀元順天建交州府為東都清華府為西都分十三道各設承政憲察及總兵使司其制度僭擬中國云秋七月帝微行漏下十二刻帝從四騎幸楊士竒宅士竒倉皇出迎頓首曰陛下奈何以宗廟社稷之身自輕帝曰朕思卿一言故來耳越數日帝遣內官問士竒微行有何不可對曰陛下尊居九重幽隱豈能遍洽萬一寃夫怨卒窺間竊發誠不可不慮後旬餘獲二盜如士竒言帝語士竒曰今而後知卿之愛朕也冬十月令官軍兌運民糧北京初建水陸轉漕皆用民運會通河既開陳瑄改用官軍支運造淺船三千餘艘分遣官軍就近挽運交淮徐德通四倉名曰支運既而官軍多所調遣仍用民運道逺數違期會黃福與瑄董理漕事福請復支運法在四年令江西湖廣浙江江南北諸郡民轉粟于淮徐臨清各倉而令官軍接運至京至是瑄上言民運糧諸倉往反經年失悮農業若令民兑與附近衛所官軍運載至京量給耗米及道里費則軍民交便帝命黃福等議行之謂之兑運又命廷臣議定則例耗米以地逺近為差民有運至淮安兑軍者耗減十之四如兑運不盡仍令民自運至倉其不願兑者聽其自運兑運與支運參行軍既加耗又給輕齎銀為洪閘謂徐吕二洪及會通河諸閘盤撥費且得附載他物皆樂從而民亦以逺運為艱由是兑運多而支運者少矣十二月中官袁琦有罪伏誅琦自幼侍帝恃恩縱肆擅遣內官內使假採辦名虐取官民財物事覺下錦衣衛獄籍其家金寶千萬計服用僭侈非法遂磔琦併戮其黨十餘人仍命都察院榜琦罪示天下太子少保武英殿大學士金幼孜卒諡文靖幼孜病革家人囑請身後恩幼孜曰此君子所恥不聽及卒贈少保壬子七年春正月辛酉朔日食賜中官金英范洪交址人免死詔三月復下詔寬恤帝召楊士竒諭曰恤民詔下已久今更有可恤者乎士竒因請撫流民減稅課察貪吏薦賢能京官三品以上及布按二司各舉所知備方面郡守選軍民中有文學勇略者羣臣察舉以聞極刑家子孫皆得仕進帝從之夏六月修天下府州縣倉巡察湖廣御史朱鑑言洪武年間府州縣四鄉皆置倉積榖多者萬餘石少者四五千石倉設老人監之富民守之遇水旱以貸貧民今皆廢毁宜遵舊制俾旱潦有資從之作官針戒百官凡三十五篇秋七月揭豳風圖于殿壁帝閲內庫書畫得元趙孟俯所繪豳風圖賦詩一章命侍臣書于圖右而揭諸便殿之壁嘗夏日午朝退語侍臣曰天氣向炎正農夫耕耘時也因咏聶夷中鋤禾日當午句曰吾每誦此未嘗不念農人八月宥誹謗者罪有男子大呼西華門外語涉訕誹守門者執至帝前呼仍不已羣臣請下法司帝曰聖人之世設誹謗木以來諫者此人寧可罪邪其釋之置蘇州府濟農倉故時公侯祿米軍官月俸皆蘇松民輸南京户部給之石加米六斗周忱請就給蘇松止與船價米一斗餘存米共四十萬石并官鈔平糴米時江南大稔忱奉詔令諸州縣以官鈔平糴共得七十五萬石有竒置倉貯之又每歲民糧起運羡餘存貯在倉者曰餘米皆書諸册而官掌之貧民借貸及綱運風漂盜奪者皆資給焉秋成抵數還官忱與况鍾定條約以聞帝悉允行名其倉為濟農久之歲有餘羡貧民不能償者多不追取忱在任二十五年百姓不知凶荒兩稅未嘗逋負後之巡撫江南者莫及焉癸丑八年春三月賜曹鼐字萬鍾寧晉人等進士及第出身有差鼐初由鄉舉授訓導願就别職改泰和縣注見前典史七年督工匠至京疏乞入試復中順天鄉試及是舉進士一甲第一賜宴禮部進士宴禮部自鼐始秋閏八月西域貢麒麟景星見禮官請表賀不許甲寅九年秋八月衛拉特托歡襲殺韃靼阿嚕台于穆納山在今鳥喇特旗西舊作毋納山今改托歡遣使來告且獻玊璽帝賜敕曰王殺阿嚕台見王克復世仇甚善顧王言玉璽傳世久近殊不在此王得之王用之可也賜遣之阿嚕台子諤博爾濟延舊作阿卜只俺今改來歸九月帝巡邊至洗馬林還諸將言衛拉特獵所去洗馬林不逺襲之可大克也帝召問楊榮榮對曰陛下屢遣人招諭命其近邊獵牧故感恩而來若擊之是前敕誘之矣且彼聞上至必先遁雖擊何益徒失戎心耳乃止冬十月松潘畨叛都督僉事方政討平之松潘諸族明史土司傳松潘衛領占藏先結等十八族長官司及空郎龍溪諸寨方輿紀要松潘衛南歸化關左右有龍溪諸畨寨畨叛帝屢命陳懷討之寇如故乃召懷歸命政與都督蔣貴討之政至榜諭禍福威茂諸畨悉降惟松潘猶梗化政等連破三十餘寨寇平遂留政鎮守松潘乙卯十年春正月帝崩太子祁鎮即位是為英宗遺詔國家重事白皇太后行時太子方九齡外廷傳言太后取金符入內欲召立襄王楊士竒楊榮率百官入臨請見太子太后即至乾清宫㩦太子泣曰此新天子也士竒等伏謁呼萬歲浮議乃息罷金銀硃砂銅鐵坑冶免其課減稅鈔悉如洪武舊額少師兼吏部尚書蹇義卒諡忠定義歷事六朝凡五十年及是卒贈太師義與夏原吉聲譽相埒朝議推義善謀原吉善斷有古大臣風烈而義尤厚重質實善處僚友間未嘗一語傷物至議典法不苟為包容上前所言退不敢以語人罷十三布政司鎮守中官其守備南京鎮守諸邊收糧徐州臨清巡鹽淮浙者如故加户部尚書黃福少保參贊南京機務留都文臣參機務自福始時襄城伯李隆守備南京福以參贊嘗坐隆側然隆待福禮甚恭公退即推福上坐福亦不辭福遇事先籌定付隆隆悉從之由是政肅民安逺近悅服二月尊皇太后為太皇太后左右有請垂簾聽政者太后曰毋壞我祖宗法第罷不急務斥宫中玩好之物時時朂帝嚮學而已朝廷大政羣臣白太后太后令悉送內閣俟楊士竒等議決然後行太后兄彭城伯昶都督升惟令朝朔望毋得與聞國政升素賢士竒等請加委任太后終不許尊皇后為皇太后封弟祁鈺宣宗次子賢妃吳氏出為郕王封平陽王美圭為晉王晉自濟熿廢後不立王者已八年至是以美圭紹封以禮部尚書楊溥復入內閣預機務溥自四年秋毋喪起復至是與楊士竒等復同直內閣三月放教坊司樂工凡三千八百餘人江西盜作亂僉事彭森等討平之時連年水旱有司不能振恤大盤山在撫州府樂安縣西北山延袤數十里跨新淦永豐二縣界賊曽子良等為亂衆至三萬屢撫不服森與吉安知府陳本深率官軍民壯討之本深以計擒斬子良餘衆潰散詔死罪必三覆奏以元儒吳澄從祀孔子廟庭夏五月詔自今初任者不得除風憲官六月葬景陵在天夀山東長陵之北諡曰章皇帝廟號宣宗明史贊曰宣宗即位以後吏稱其職政得其平綱紀修明閭閻樂業蓋明興至是歷年六十民氣漸舒蒸然有治平之象矣若乃強藩猝起旋即削平掃蕩邊塵狡寇震懾帝之英姿睿略庶幾克繩祖武者歟秋七月太白經天九月詔四方毋進祥瑞龍州宣撫司此四川龍州今龍安府是以瑞麥獻有一莖六穗七穗者詔曰今旱蝗相望獨一方稱瑞如天下飢民何自今有若此類者毋獻釋御史陳祚字永錫吳人主事郭循字循初廬陵人于獄復其官宣德間祚請講大學衍義帝怒曰祚以朕為未讀大學邪薄朕至此不可不誅命籍其家逮其親屬同下錦衣獄婦女發浣衣局時拓西內皇城修離宫别館循為刑部主事極諫帝怒命裹以氈至大內親詰之循對不屈帝益怒手射之亦下錦衣獄至是皆赦復職以王振蔚州人掌司禮監明史百官志內官十二監司禮監有提督掌印秉筆隨堂各太監為內官最要職振狡點多智事仁宗于東宫宣德初寖用事帝為太子朝夕侍左右及即位命掌司禮監寵任之太后嘗遣振至內閣問事楊士竒擬議未下振輒施可否士竒愠三日不出太后問故揚榮以實對太后怒鞭振仍令至士竒所謝罪且戒曰再爾必殺無赦自是間數日太后必遣使至閣問連日曽有何事來議如何施行令具帖以聞冬十月詔天下衛所皆立學十一月戊辰朔日食命楊士竒楊榮楊溥議臣民章奏太皇太后委任三人三人同心輔政士竒有學行通達國體榮謀而能斷溥有雅操淳謹小心每議事士竒引古義榮出一言決之諸大臣爭可否或有違言溥舍已從人略無繫吝時論賢之號三楊以居第目士竒曰西楊榮曰東楊溥嘗自書郡望曰南郡因目為南楊阿爾台寇甘肅總兵官陳懋擊敗之阿嚕台既死其所立阿爾台王子及所部多爾濟巴勒等為托克托布哈舊作托都不花今改所窘竄額齊訥外為納欵而數寇甘涼至是陳懋連敗之追至蘇武山在涼州府鎮畨縣東南山右有蘇武廟因名而還托克托布哈者元後衛拉特托歡既殺阿嚕台欲自立為汗衆不可乃立托克托布哈而奉之實不承其號令也英宗皇帝丙辰正統元年春正月發京軍屯田畿輔楊士竒言國家歲用糧儲皆自東南轉運軍民勞苦今京軍操練外餘卒尚多宜令于北京八府屯田可省南方轉運之費從之二月始御經筵楊士竒楊榮楊溥請開經筵并擇老成重厚識達大體者數人以供侍講之職太皇太后然之命士竒榮溥及侍講學士王直字行儉泰和人等為經筵官每十日會講文華殿宣德前儒臣進講無定日亦無定所至是定于文華殿以月之初二十二二十二三日為講期餘日仍令講讀官四人入講經史夏五月始置提督學校官南京户部尚書黃福言比來生員學藝疏淺宜令布政按察二司遍歷考試庶得真才于是兩畿及十三布政司各置提督學校官一員兩畿以御史十三布政司以按察司僉事著為令秋七月復聖賢後裔令有司訪求南宋衍聖公孔端友從高宗南渡居衢州事具前及宋儒周敦頤程皓程頥司馬光朱熹後裔蠲其徭役祠墓傾圮者修之兩畿山東河南陜西湖廣廣東大水八月始徴金花銀入內承運庫初州縣歲賦有折銀者俱送南京供武臣俸祿及北京既建各衛官支俸南京道逺費多所餘無幾至是副都御史周銓請于直省不通舟楫之州縣折收白金布絹赴京充俸巡撫江西侍郎趙新亦為言帝問尚書胡濙字源潔武進人濙言太祖時嘗行之民以為便洪武中天下稅糧許民以銀鈔代輸于是謂米麥為本色諸折鈔者謂之折色乃倣洪武制米一石折銀二錢五分麥亦如之南畿及浙江江西湖廣福建廣東廣西共折銀百餘萬兩不送南京盡解內承運庫謂之金花銀除給放武臣俸餘専供內用其後槩行于天下自起運兑軍外糧四石折銀一兩解京以為永例由是諸方賦入折銀者幾半而倉廪之積漸少矣九月封黎利子麟為安南國王初利死以其子麟權知國事至是帝以陳氏宗支既絶麟事朝廷甚恭遂遣使齎敕印往封之冬十一月詔廷臣舉堪任御史知縣者各一人十二月下兵部尚書王驥字尚德束鹿人于獄尋釋之王振初用事欲令朝臣畏已會驥議邊事五日未奏振教帝召驥面責之曰卿等欺朕年幼邪遂執驥及右侍郎鄺野字孟質宜章人下獄尋釋之未幾右都御史陳智劾張輔回奏稽延并劾科道不舉奏帝釋輔不問杖御史給事中各二十自是言官承振風指屢托大臣過自公侯駙馬伯及尚書都御史以下無不被劾或下獄或荷校甚至譴謫殆無虛歲丁巳二年春正月太皇太后召見大臣于便殿太后御便殿帝西面立后傍召張輔楊士竒楊榮楊溥胡濙入見五人東西稍下立太后諭曰卿等老臣嗣君幼幸同心共安社稷又召溥前曰先帝念卿忠屢形愁嘆不意今復得見卿溥泣太后亦泣左右皆悲愴始仁宗為太子時被讒宫僚多下獄溥及黃淮一繫十年屢瀕于死仁宗每于宫中言及東宫時事慘然泣下以故太后言之太后又顧帝曰此五臣先帝簡任俾輔後人皇帝萬幾宜與五臣共計有頃宣王振至太后頓怒曰汝侍皇帝起居多不律今當賜汝死時女官雜佩刀劍侍遂以刃加振頸帝跪為振請五臣皆跪太后曰皇帝年幼豈知此輩自古誤人國家我聽帝暨諸大臣留振此後不得令干國事也振故心憚太后自此稍斂戢已而太后病遂跋扈不可制矣夏五月遣王驥經理甘肅邊務韃靼阿爾台及多爾濟巴勒數寇甘涼邊將失利帝命驥往許便宜行事先是都督蔣貴追敵魚海子在今涼州府鎮畨縣東北即白亭海古休屠澤也將及之都指揮安敬以前無水草遂引軍還巡撫甘肅都御史曹翼奏之帝命驥責貴狀并戮敬驥祕之疾馳至軍大會諸將問往時魚海子先退者為誰僉曰安敬乃即縛敬斬軍門責貴曰汝大將亦當死姑貸汝立功自贖諸將皆股栗莫敢仰視于是校閲將士分兵畫地使各自防禦邊境肅然尋還報命會阿爾台復入寇帝命驥帥都督任禮字尚義臨漳人蔣貴擊之驥遣貴為前鋒而自與禮統大軍繼進戒貴曰不捷無相見也貴擊敵石城在甘州府邊外故居延城北走之驥及禮復敗之胡桐林與下多喇溝黑泉俱在額齊訥地按胡桐木名漢書西域傳注胡桐似桐蟲食其葉而沫出下流者俗名胡桐淚可以汗金銀即此舊説作梧桐林非是又及之多喇溝舊作刀力溝今改窮追至黑泉而還是役官軍出漠千餘里諸將左右夾擊殱敵幾盡先後獲其部長百五十人阿爾台多爾濟巴勒皆逺遁尋為托克托布哈所殺詔旌出榖賑荒者為義民復其家六月以宋儒胡安國蔡沈真德秀從祀孔子廟庭秋九月以指揮僉事楊洪字宗道六合人守備獨石洪初副李謙守備赤城獨石謙老而怯與洪不相能洪嘗勵將士殺敵謙笑曰徒殺吾人耳敵可盡乎御史張鵬劾罷李謙遂以洪代洪紀律嚴明烽堠修飭數與烏梁海戰斬其酋威名聞嶺北稱楊王戊午三年春二月京師地震夏四月設大同馬市與衛拉特互市也六月旱録囚秋陜西飢令雜犯死罪以下輸銀贖罪送邊吏易米振之冬十一月逮天下逋逃工匠四千餘人宣德間徴天下軍民工匠多所興造帝即位悉罷之未幾建宫殿修九門改造五府六部諸司公署又建京城內外諸佛寺工役繁興匠多逃者二年二月以後已逮六千餘人至是又逮四千二百餘人後又逮萬人逮至者皆桎梏赴工六年夏以盛暑始脫桎梏四年春三月遼王貴烚簡王植長子有罪廢為庶人貴烚杖殺長史笞荆州知府為撫按官所劾帝亦聞其內亂召訊具伏廢為庶人已封其弟貴燰為遼王夏五月京師大雨水溢壞官廨民居三千三百餘區貧民露宿長安街皆滿六月彗星見長丈餘五十四日乃滅京師地震八月又震庚申五年春正月少保南京户部尚書黃福卒福歷事六朝多所建白安南貢使入朝或指福問曰識此大人否對曰南交草木亦知公名安得不識其卒也贈諡不及士論惜之成化初贈太保諡忠宣二月以翰林院侍講學士馬愈字性和臨朐人侍講曹鼐入內閣預機務王振至內閣語楊士竒楊榮曰朝廷事久勞公等公等皆高年倦矣當若何士竒曰老臣盡瘁報國死而後已榮曰不然吾輩衰殘無以效力當擇後生可任者報聖恩耳振喜而退士竒咎榮榮曰彼厭吾輩矣一旦內中出片紙令某人入閣且奈何及此時進一二賢者同心輔政尚可為也士竒以為然翌日列愈鼐及侍講學士苗衷字秉彛定逺人侍講高榖字世用揚州興化人名以進四人皆帝初御經筵士竒等所薦愈鼐遂先被擢用夏六月兩畿山東河南浙江江西大水江河皆溢陜西大雨雹深尺餘度僧道二萬餘人王振喜釋道每歲必一度之是年五月以前已度二萬一千人至是又度前後共二萬二千三百餘人黃冠緇服布滿街市僧道之多莫逾于此秋七月遣侍郎何文淵等分行天下修荒政從楊士竒請也時太皇太后専以養民為務每四方水旱賑濟動億萬計蠲免災糧或數百萬石閭閻安樂雖災不為害逮王振用事悉反初政惟蠲租賑荒尚仍之不改云少師謹身殿大學士楊榮卒諡文敏榮乞歸省墓比還至杭州卒贈太師授世襲都指揮使榮歷事四朝謀而能斷成祖初與解縉等七人同入閣榮年少最警敏一日寧夏報被圍成祖示以奏榮曰寧夏城堅人皆習戰奏上已十餘日圍解矣夜半奏至圍果解成祖與諸大臣議事未決或至發怒榮至輒霽威事亦隨決李時勉夏原吉皆以榮言得無死或謂榮處國家大事隨機應變不愧唐姚崇而不拘小節亦頗類之冬十一月河南僧楊行祥詐稱建文帝下錦衣衛獄尋死有僧年九十餘由雲南至廣西自稱建文皇帝詣思恩府土官知府岑瑛執送總兵官栁溥升之子械至京會官鞫之紀事本末云僧稱年九十餘且死思葬祖父陵旁耳御史言建文君生洪武十年距正統五年當六十四歲何得九十嵗僧乃言其姓名為楊行祥河南鈞州白沙里人洪武十七年度為僧歷遊兩京雲南貴州至廣西帝令錦衣衛錮禁之四踰月死從者十二人皆戍邊楊行祥事見正統實録記載家或附會傳訛或牽合失據舊史例議辨之甚悉今故于諸説皆不取辛酉六年春正月己亥朔欽天監言日食不應禮官請表賀不許以蔣貴為平蠻將軍王驥總督軍務討麓川蠻洪武中麓川平緬宣慰司思倫發思倫發本平緬酋既內屬太祖命兼統麓川之地為麓川平緬宣慰司事見前為其頭目刀幹孟所遂赴京陳欣事亦見前太祖仍命為宣慰回居麓川已分其地設府三曰孟養蠻名香柏城元雲逺路明初為土府後陛宣慰司今為孟艮土司地木邦蠻名孟邦元木邦路明初為土府後升宣慰司今仍為木邦土司在孟定耿馬二土司界外孟定蠻名景麻甸元孟定路明為禦夷府今仍為土府屬永昌府隸雲南長官司四曰潞江蠻名怒江甸後升宣撫司今司屬永昌府干崖蠻名干賴賧後升宣撫司今司屬騰越州大候蠻名孟祐後升雲州今州屬順寧府灣甸蠻名細賧後升禦夷州今仍為土州屬永昌府隸金齒明設金齒衛于永昌今省久之思倫發死其子思任發襲職桀黠喜兵會孟養木邦與緬甸相仇殺思任發乘機侵據之遂欲盡復其父故所失地稱兵擾南甸注見前突干崖進陷騰衝注亦見前屢詔撫諭不受命黔國公沐晟請發兵進勦帝命都督方政會晟及其弟昻共討之事在四年政與晟不協思任發佯言遣使朝貢冀緩師晟遽信之政欲出戰晟不可欲造舟濟師又不許政不勝憤獨引兵至上江即龍川江源出騰越州徼外流經麓川為麓川江下流入大盈江蠻人以江在麓川者為上江近騰越者為下江全軍皆殁政敗賊高黎共山下乘勝深入援師不至賊出象陳衝擊政死一軍殱焉事聞朝廷切責晟晟懼罪暴卒敕昻代統其軍久亦無功昻畏賊不敢出久之至芒市前驅遇賊敗遽引還已而賊據者章寨昻進克之賊遁去尋寇如故事俱在五年思任發由是愈橫既乃遣其頭目以象馬金銀來修貢且請罪帝用楊士竒言降敕許赦其罪侍郎何文淵亦請罷兵遣官招諭命下廷臣議皆如文淵言而王振方用事欲示威四夷先已召還甘肅總兵官蔣貴等使待命尚書王驥揣知振意力主用兵振大悅遂絀廷議以貴為平蠻將軍都督李安劉聚為副驥總督軍務大發東南諸道兵十五萬人往討麓川侍講劉球字廷振安福人上疏諫不聽球言思任發僻居南徼素本羈縻以邊將失馭致勤大兵陛下特降璽書原其罪釁使得自新甚盛德也乃詔旨甫下忽大舉興師今南方水旱相仍軍民交困若復動衆紛擾為憂且衛拉特世為邊患近雖稍抑部曲尚強今乃移甘肅守將以事南征卒然有警何以為禦臣望陛下急罷麓川之師専備西北章下兵部以南征己有成命寢之三月下巡撫侍郎于謙于獄既而釋之謙巡撫山西河南十二年威惠大行每入京無私謁王振銜之謙以在外久乞召還薦參政王來字原之慈溪人孫原貞名瑀以字行德興人自代右通政李鍚阿振指劾謙以久任不遷怨望擅舉人自代會謙來朝遂下法司論死繫獄三月得釋左遷大理少卿山西河南吏民伏闕上書請留謙者以千數乃命復原官時山東陜西流民就食河南者二十餘萬謙請以河南懷慶二府積粟賑之又奏令布政司撫集其衆授田給牛耕種流民以安夏五月太白經天遣使録囚秋九月奉天華蓋謹身三殿乾清坤寧二宫成永樂中宫闕未備三殿成而復災以奉天門為正朝至是宫殿成宴百官故事中官不與外廷宴是日帝遣使問王先生何為王先生謂王振也帝在宫中呼振先生而不名使至振方大怒曰周公輔成王我獨不可一坐邪使復命帝蹙然命開東華中門召振至百官候拜門外振始悅冬十月進蘇州知府况鍾吉安知府陳本深秩正三品鍾本深治行為天下最秩滿九載當遷部民乞留詔豫正三品仍視府事鍾先以丁憂當去部民詣闕請留詔許復任及秩滿請留者至二萬餘人鍾雖起刀筆吏然重學校禮文儒及卒士民聚哭立祠祀之本深守吉安十八年政化大行民恥爭訟一日升堂聞鼓樂聲問知廨前民嫁女本深笑曰我來時乳下兒也今且嫁我尚留此邪遂請老去郡人肖像以祀十二月王驥等克麓川思任發走孟養驥至雲南部署諸將分三道進取右參將冉保由東路趨孟定驥與蔣貴由中路趨上江副總兵劉聚自下江夾象石在騰越州東龍川江東岸渡江而西即高黎共山麓合攻上江賊重地立寨堅守攻之不克會大風官軍縱火焚柵斬首五萬餘級遂拔其寨由夾象石渡下江通高黎共山道至騰衝長驅抵木籠山在永昌府芒市土司南連破七寨進搗賊巢即麓川城城在山上山陡峻深塹環之其東南一面傍江壁立賊從間道潛師出大軍後驥戒軍中無動而令都指揮方瑛政之子突入賊寨斬首數百又誘敗其象陳會冉保亦由東路破諸蠻寨以兵來集驥令截守西峩渡在芒市司南路通木邦而分遣諸將四面環攻西風大作復縱火賊死者不可勝計思任發㩦二子走孟養驥留兵守之而還捷聞進貴定西侯驥封靖逺伯餘遷賞有差惟副總兵李安以攻餘賊敗績下獄論死壬戌七年夏四月兩畿山東山西河南陜西旱蝗五月立皇后錢氏海州人后族單微帝欲封后父貴為侯后輒遜謝故后家獨無封六月遣户部侍郎焦宏備倭倭屢入寇命宏整飭浙江傋倭事兼理蘇松福建冬十月太皇太后張氏崩諡誠孝太皇太后大漸命中官問楊士竒楊溥國家尚有何大事未舉士竒舉三事其一言建文君雖亡曽臨御四年當修實録仍用建文年號其二言太宗詔有收方孝儒諸臣遺書者死宜弛其禁其三未及上而太后已崩遺詔勉大臣佐帝惇行仁政語甚諄篤王振自太后有疾數年間已縱恣及太后崩遂益無忌憚十一月衛拉特遣使入貢故事衛拉特使止三十餘人其後利朝廷賞賚所遣動以千計大同供應費至三十餘萬巡撫盧睿户部侍郎劉中敷大興人等俱以供饋有缺至下獄是年春帝亦以貢使太多限三百人入關其秋至大同者復二千餘人旬日又百餘人帝悉納之使人以馬易弓藏于衣篋不可勝計巡撫羅亨信請于居庸關詰檢之帝不許鎮守太監郭敬歲造箭鏃數十甕遺其使帝亦不問十二月葬誠孝皇后癸未八年春正月以王直為吏部尚書直子為南京國子監博士考滿至京選司欲改北學以侍直直曰是亂法自我始矣固止之直遇王振未嘗少降辭色振每坐直先君其右曰太監四品吾尚書二品也振無如之何更加禮貌焉夏五月復遣王驥蔣貴征麓川蠻思任發之走孟養也詔能擒獲者即以麓川地與之既而思任發自木邦竄緬甸緬人執之挾以求地而其子思機發復師餘衆據者藍麓川别寨地道孟養奏乞入朝謝罪廷議欲困而撫之王振不可于是命驥等合兵再討麓川發卒轉餉凡五十萬人驥至金齒檄緬人獻思任發緬佯諾不遣及大軍逼境緬人以樓船來覘官軍而潛以他舟載思任發遁驥分軍為五進薄之緬人堅執前詔必豫地始出思任發驥無如何乃趨者藍搗思機發巢破之思機發遁去俘其妻子部衆立隴川宣慰司在隴川城北地舊名隴把而還後二年緬人始出思任發獻雲南思任發垂死千户王政斬之函首京師雷震奉天殿六月太監王振殺翰林院侍講劉球球應詔言事略曰自古帝王政自已出則權不下移太祖太宗日視三朝進大臣于便殿裁決庶政故權總于上陛下臨御今已九年願守二聖之成規親決之故事使政本歸一古之擇大臣者必詢諸左右大夫國人及其有犯雖至大辟亦不加刑第賜之死今用大臣未嘗皆出公論及有小失輒桎梏箠楚之未幾又復其職甚非所以敬大臣也今之太常即古之秩宗今卿二皆缺宜選習禮儒臣使領其職古者人君不親刑獄悉付理官邇者法司所上多奉敕增減法司不能執奏或先觀望以為輕重民以多寃至運磚納米尤非古法且使貪者幸免亷者蒙辜宜皆停罷京師營作已五六年曰不煩民而役軍軍獨非國家赤子乎今營築多完宜罷工以蘇人力麓川連年用兵死者十七八軍資爵賞不可勝計今又遣將逺征緬甸責獻思任發假使得寇以歸不過獻諸廷梟諸市而已然彼挾以為功必求與木邦分地不與則致怨與之則兩夷並大是滅一麓川生二麓川也設有蹉跌兵爭無已死者必多迤北貢使日增包藏禍心誠所難測宜分遣給事御史督視官軍及時訓練母使借工各厰服役私家仍公武舉之選以求良將定召募之法以求武勇廣屯田公鹽法以厚蓄儲庶武備無缺而外患有防疏入下廷議惟從其擇太常寺官一事欽天監正彭德清球鄉人也倚振為姦公卿多趨謁球絶不與通德清恨甚遂摘疏中攬權語謂振曰此指公耳振大怒下球錦衣衛獄囑馬順殺球順深夜㩦一小校持刀至球所球方卧起立大呼太祖太宗校前斷其首血流被地體猶植立支解之瘞獄户下景泰初贈翰林學士諡忠愍下大理寺少卿薛瑄字德溫河津人于獄既而釋之瑄有學行人稱為薛夫子初為山東提學僉事王振問楊士竒吾鄉有可為京卿者乎士竒以瑄對召為大理少卿瑄至士竒使謁振瑄曰拜爵公朝謝恩私室吾不為也一旦會議東閣公卿見振皆趨拜瑄獨屹立振知為瑄也先揖之自是銜瑄會指揮某死振從子山欲強娶其妾誣指揮妻毒殺夫處極刑瑄辨其寃三却之都御史王文字千之束鹿人承振指劾瑄受賄故出人罪下獄論死將行刑振蒼頭忽泣于㸑下問故曰聞薛夫子將刑也振感動會兵部侍郎王偉亦申救乃免秋七月枷祭酒李時勉于國子監門三日釋之時勉與南京祭酒陳敬宗字光世慈溪人並以師道著聞時稱南陳北李時勉請改建國子監帝命王振往視時勉不加禮振銜之亷其過無所得時勉嘗芟彛倫堂樹旁枝遂坐以擅伐官樹枷署門監生石大用豐潤人李貴鳯陽人等三千餘人上疏救不納適會昌侯孫忠生日公卿皆為夀忠太后父也助教李繼因公卿請于忠太后使至忠家忠言今歲生辰殊不樂以公卿皆集獨李先生荷校不至耳使復奏太后言于帝帝始知振所為即釋之甲子九年春正月遣成國公朱勇能之子等分兵四路擊烏梁海王振言于帝曰三衛雖陽為朝貢而數寇邊宜討之乃命朱勇出喜峯口都督馬亮淇縣人出劉家口在永平府遷安縣東北有關舊為出大寧要路興安伯徐亨出界嶺口在永平府撫寧縣北舊有關城都督陳懷出古北口各率兵萬人分勦已而諸將皆奏捷勇奏敗敵于富峪川亨奏敗敵于土河懷奏敗敵于虎頭山亮奏敗敵于黑山虎頭山在故大寧城北黑山方輿紀要在朵顔東境富峪土河注俱見前然俱無大功稍有斬獲而已諸將遂並加封賞進勇太保封亮招逺伯懷平鄉伯增亨歲祿諸衛帶俸官升者二十九人其後巡邊者多以斬擊邀功由是三衛積怨遂導衛拉特入寇三月帝視國子監以新作國子監成也祭酒李時勉當進講會久病及升堂講尚書辭旨清朗帝悅賜豫有加時勉為祭酒六年訓勵諸生崇亷恥抑奔競督令讀書燈火達旦書聲不絶英國公張輔暨諸侯伯嘗奏請詣國子監聽講帝命以三月三日往時勉令諸生立講五經各一章講罷設酒饌諸侯伯就諸生列坐惟輔與時勉抗禮諸生歌鹿鳴之詩賓主雍雍盡暮散去一時稱為盛事少師華蓋殿大學士楊士竒卒諡文貞士竒先以老病請告及是卒贈太師士竒公正持大體雅善知人好推轂寒士帝即位初凡所建白無不行及王振用事擅作威福士竒與楊溥依違其間無所救正士竒既耄其子稷家居多不法士竒不得聞于是言官交章劾稷逮下獄士竒方在告帝恐傷其意降詔慰勉士竒感泣憂不能起未幾卒後數月稷竟瘐死獄中夏四月以翰林學士陳循字德遵泰和人入內閣預機務初閣務皆三楊主之及是榮士竒已卒惟溥在循及曹鼐馬愈遂皆參決秋閏七月復開福建浙江銀場帝初即位詔封坑冶福建參政宋新交址人紀事本末作宋彰今從明史浙江參政俞士悅以礦盜日熾言開銀場則利歸于上而盜無所容浙江按察使軒輗字惟行鹿邑人力持不可乃止至是礦盜青田葉宗留麗水陳鑑湖等聚衆至數千福建參議竺淵奉化人捕之為盜所殺于是中官及言利諸臣爭請開礦乃命户部侍郎王質經理之定歲課福建銀二萬餘浙江四萬餘而官屬供億費較課銀尚過之自是民困而盜益衆八月敕諸將嚴邊備衛拉特托歡死其子額森嗣額森母蘇州人隨夫戍邊為托歡所虜遂生額森按額森舊作也先今改後仿此自稱太師淮王凶狡桀驁北部皆服屬惟烏梁海未附額森屢擊破之又結婚沙州赤斤注見前諸衛劫制哈密巡視陜西都御史陳鎰字有戒吳縣人以聞帝敕諸將嚴為備冬十月丙午朔日食戍御史李儼于鐵嶺衛儼在光祿寺監收祭物王振過之怒其應對不跪下錦衣衛獄謫戍之時振以義子馬順掌鎮撫司官無大小悉送順拷訊戕害甚衆順大通賄賂車馬冠蓋其門如市乙丑十年春正月磔錦衣衛卒王永王振専恣日甚朝臣無敢言者永心不平乃數振罪惡為書揭之通衢又揭于振姪王山家為緝事者所獲刑部坐以妖言當斬詔即磔之不必覆奏二月京師地震夏四月甲辰朔日食始命天下學校考取附學生知縣楊瓚蠡縣人以治行卓異擢知府上言民間子弟可造者衆請增廣生員毋限額禮部採瓚言議令提學官額外增取附學天下學校之有附學生自瓚始其後定制諸生食廩者謂之廩膳生增廣者謂之增廣生俱有定員以歲科兩試髙等者充補其初入學者謂之附學生秋七月下霸州知州張需于獄戌之需見民遊食者多每里置簿列男女大小口數計其耕桑樹畜為設方略暇則躬自巡視有不如教者罰之民皆勤力州以饒富有中官牧馬擾民者需笞其校卒中官譖于王振執下錦衣衛獄箠楚幾死詔戍邊并坐需舉主順天府丞王鐸罷為民冬十月以兵部侍郎苗衷工部侍郎高榖入內閣預機務衷榖與馬愈曹鼐皆楊士竒所薦事見前及是四人並在內閣而鼐尤通達政體閣務多取決焉丙寅十一年春正月豫太監王振等錦衣衛世職振姪林世襲指揮僉事曹吉祥灤州人等弟姪俱世襲副千户二月異氣見奉天華蓋二殿三月遣御史柳華討礦盜福建銀場既開盜礦者益衆葉宗留為賊首自稱大王帝遣户部郎中楊諶招撫浙江參議吳升言福建礦盜出沒浙江江西廣東諸境東捕則西逃南搜則北竄若合而為一其患不小宜特遣朝臣専董勦捕乃命華督福建浙江江西軍討之華至福建遣兵分捕羣盜令村聚皆置望樓編民為甲擇其豪為長使自置兵器督轄巡夫盜稍戢而葉宗留劫掠如故已而鄧茂七反指揮使不能討歸咎于華謂茂七等俱以甲夫為亂時華已為山東副使聞之遂自殺鄧茂七事詳後夏六月京師地震有聲秋七月增市稅先是以于謙言天下稅課司局課鈔不及三萬貫者悉罷之領其稅于有司上下稱便至是户部尚書王佐海豐人請增稅課置彰義門官房收商稅課鈔天下稅課司一萬五千貫以上者俱請復設征𣙜漸繁少保武英殿大學士楊溥卒諡文定溥入內閣後楊士竒楊榮二十餘年及卒亦最在後贈太師溥質直亷靜自楊榮楊士竒相繼卒在閣者皆後進望輕溥孤立王振益恣橫及溥卒中外大權一歸于振矣八月下吏部尚書王直等于獄尋釋之光祿寺卿奈亨諂事王振亨詐稱詔旨日支御膳供振振悅之擢户部侍郎時工部郎中王祐亦以諂振擢本部侍郎祐無鬚振問之對曰爺無鬚兒子安敢有一時傳以為笑亨嘗以事干請吏部不行怨郎中趙敏搆之詞連尚書王直侍郎曹義趙新並下獄三法司六科廷鞫論亨斬直義新俱徒帝宥直義奪新亨俸視職如故先是駙馬都尉石璟詈其家閹振惡其賤已同類下璟獄已而大理寺丞羅綺參贊寧夏軍務嘗詆中官為老奴總兵官奏之法司坐綺罪徒錦衣衛改戍邊于是刑部尚書金濓左都御史陳鎰等為馬順所劾並下獄帝以濓等已輸伏遂釋之行人尚禠言古者刑不上大夫今文武大臣偶因微眚遽陷囹圄事或涉虛旋即復職是今日衣冠之大臣即昨日受辱之囚繫面僚友而統屬官寧能無愧請自今有犯者召至午門大臣會問事實則疏其輕重請上裁決不實即奏還其職帝頗然之而惑于王振不能改也禠尋授南京御史隂石璟昌黎人尚宣宗女順德公主金濓字京瀚山人行人司洪武中置司正秩正七品司副從七品行人正八品職專奉使冬十二月大雨雷電御批歷代通鑑輯覽卷一百三

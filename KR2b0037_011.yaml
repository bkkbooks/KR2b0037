front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷十二楚漢乙是義帝心元西楚霸王項籍元漢王劉邦元年是嵗未秦亡綱目于楚漢之際每甲子下俱分列諸國今但列楚漢諸國倐亡倐亡不備載五星嵗星柬方春木熒惑南方夏火太白西方秋金辰星北方冬水填星中央季夏土聚于東井東井八星天之南門主水衡自井十度至栁三度為為首之次屬秦分漢書天文志漢元年十月五星聚于東井從嵗壘也後魏髙允曰金水二星常附日而行冬十月日旦在尾箕昏沒于申南而東井方出于寅北何因背日而行崔浩曰五星以前三月聚東井非十月也宋劉邠曰秦之十月今七月日當在鶉尾故太白辰星得從嵗星也考漢書律厯志秦以十月為正劉攽之言蓋本于此沛公至霸上即白鹿原在西安府咸寧縣東水經注白鹿原東即霸川之西謂之霸上霸水注見前秦王子嬰降

  text: 欽定四庫全書御批歷代通鑑輯覽卷一百十一明神宗皇帝壬午萬厯十年春正月免天下逋賦
  hash: sha256:44cb805db26bde48b543756747598027c05c38be7843227b1174db73da17a0eb

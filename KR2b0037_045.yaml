front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷四十六南北朝已陳高宗宣帝頊太建元年丑周天和四年齊天統五年春正月陳主頊立是為宣帝
  hash: sha256:7b712b9e11946617b624b1c4f036c60c50c06c59c147f2b1d93e8bd653dbcee4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_045-1a, image: WYG0336/WYG0336-0547a.png}
body:
  text: 陳安城王頊既以太后令入纂大統事具前至是遂即帝位復太皇太后為皇太后皇太后為文皇后立妃栁氏為皇后世子叔寶為太子二月齊殺其太尉趙郡王睿初和士開為世祖所親狎出入卧內遂得幸於胡后及世祖殂齊主深委任之與婁定遠昭之子等俱用事時號八貴和士開婁定遠趙彥深元文遙唐雍綦連猛髙阿那肱胡長粲八人綦連氏出西方諸部猛武兒代人髙阿那肱善無人胡長粲國珍曾孫太尉趙郡王睿與定遠等皆言于齊主請出士開太后不可睿復令元文遙入奏齊王及太后召問士開對曰陛下諒暗伊始大臣皆有覬覦今若出臣正是自翦羽翼宜謂睿等云文遙與臣俱受先帝任用可並用為州待過山陵然後遣之齊主及太后乃以士開為兖州刺史葬畢太后欲留士開過百日俟卒哭也睿不許遂更見太后苦言之先是太后觴朝貴于前殿睿靣數士開受納賄賂穢亂宫掖之罪太后曰且飲酒勿多言睿辭色愈厲投冠于地拂衣而起及是與太后言太后令酌酒賜睿睿正色曰論國家大事非為巵酒言訖遽出士開載美女珠簾詣婁定遠定遠喜士開因謂曰今當遠出願得一辭覲二宫定遠許之士開由是得見太后及齊主進說曰先帝一旦登遐臣愧不能自死觀朝貴意勢欲以陛下為乾明廢帝殷年號臣出之後必有大變臣何靣目見先帝于地下因慟哭齊主太后皆泣問計士開曰臣已得入復何所慮正須數行詔書耳于是詔出定遠為青州刺史責趙郡王睿以不臣之罪旦日睿將復入諌妻子咸止之睿曰社稷事重吾寧死事先皇不忍見朝廷顛沛至殿門又有人謂曰入恐有變睿曰吾上不負天死亦無恨入見太后論執彌固出至永巷遇丘執送華林園拉殺之睿清正自守朝野寃惜之復以士開為僕射定遠歸士開所遺加以餘珍賂之夏四月齊以髙阿那肱為尚書令韓長鸞名鳯昌黎人為領軍陸令萱穆提婆之母為女侍中穆提婆漢陽人為開府儀同三司祖珽為祕書監齊主年少多嬖寵武衛將軍髙阿那肱都督韓長鸞素被親狎阿那肱以諂倿為世祖所厚多令在東宫侍齊主由是有寵長鸞亦嘗侍衛東宫齊主數唤共戲最親愛之阿那肱纍遷并省尚書令晋陽之尚書令也晋陽為并州故云并省長鸞纍遷侍中領軍總知內省機密宫婢陸令萱以保養恩為女侍中引其子提婆入侍齊主朝夕戲狎纍遷開府儀同三司令萱前坐其夫駱超謀叛配掖庭子提婆亦沒為奴齊主之在襁褓令萱養之謂之乾阿嬭令萱巧黠善取媚有寵于胡太后和士開髙阿那肱皆為之養子斛律后之從婢穆舍利有寵于齊主令萱乃為之養母因令提婆冒姓穆氏然和士開用事最久諸幸臣皆依附之齊主思祖珽士開亦以珽有膽略欲引為謀主乃棄舊怨與令萱言于齊主曰三帝之子皆不得立今至尊獨在帝位者祖孝徴之力也其人心行雖薄竒略出人緩急可使且目已肓必無反心齊主乃召以為祕書監秋八月陳廣州刺史歐陽紇反歐陽紇在廣州十餘年永定元年紇與父願定廣州天嘉四年頠卒紇代為刺史至是凡十三年威惠著于百越自華皎叛陳主疑之徴為左衛將軍紇懼遂舉兵攻衡州陳主遣徐儉陵之子持節諭㫖儉語紇曰吕嘉之事誠當已遠將軍獨不見周迪陳寶應乎紇默然不應儉還陳主乃遣車騎將軍章昭達字伯通吳興武康人討之冬十二月周陳復通好庚陳太建二年齊武平寅元年周天和五年春二月陳人討歐陽紇斬之封陽春太守馮僕母洗氏為石龍注見前太夫人歐陽紇召陽春太守馮僕至南海誘與同反僕遣使告其母洗夫人夫人曰我忠貞兩世今不能惜汝而負國也遂發兵拒境帥諸酋長迎章昭達昭達至始興紇懼出頓洭口水經注洭水徑含洭縣西右會溱水謂之洭口洭水即湟水溱水即始興大江含洭故縣在今韶州府英德縣昭達破其水栅擒紇送建康斬之馮僕以其母功封信都侯遷石龍太守遣使者持節册命洗氏為石龍太夫人賜以繡幰安車鼓吹麾節鹵簿如刺史之儀陳遣兵攻梁周人救之陳師還章昭達攻梁梁主與周總管陸騰字顯聖代人拒之周人於峽口南岸築城橫引大索編葦為橋以度軍糧昭達為長㦸施于樓船上仰割之索斷糧絶遂攻其城下之梁主告急于周周使將軍李遷哲字孝彥安康人將兵救之昭達兵不利引還冬十月辛巳朔日食齊以蕭莊為梁王齊復以梁永嘉王莊為梁王許以興復竟不果及齊亡莊憤悒卒於鄴辛陳太建三年齊武平卯二年周天和六年春正月齊斛律光及周韋孝寬戰于汾北汾水之北周師敗績先是周勳州刺史韋孝寬請築城於汾北時周齊爭宜陽久而不决孝寬謂其下曰宜陽一城之地不足損益兩國爭之勞師彌年彼若棄之來圖汾北我必失地宜速於華谷長秋築城以杜其意乃畫地形且圖其狀長華谷在山西絳州稷山縣西北今為鎮長秋即漢修故縣音訛為秋今曰泉掌鎮在綘州西北宇文護不從已而齊斛律光出晋州道於汾北築華谷龍門二城今華谷鎮南有故城光所築也龍門城在稷山縣北俗呼曰古城遂進圍定陽魏郡隋改文成金為吉州今州𨽻山西築南汾城在今吉州南以逼之至是光與孝寬戰于汾北孝寬敗光築十三城于西境馬上以鞭指畫而成拓地五百里已而周人取齊宜陽等九城光師步騎赴之與周師戰于宜陽城下取建安等四戍而還夏四月戊寅朔日食六月齊假韶圍周定陽克之獲汾州刺史楊敷字文衍愔族子齊假韶圍定陽周汾州刺史楊敷固守不下韶急攻之曰此城三靣重澗皆無走路惟慮東南一道耳乃令壯士千餘人伏于東南澗口城中糧盡敷走伏兵擊擒之遂取汾州敷至鄴不屈未幾卒其子素以父守節未蒙贈諡申理再三周主大怒命左右斬之素大言曰臣事無道天子死其分也周主壯其言贈敷大將軍諡曰忠壯素少多才藝及是漸見禮遇命為詔書下筆立成詞義兼美周主曰勉之勿憂不富貴素曰但恐富貴來逼臣臣無心圖富貴也處楊敷子素字道秋七月齊琅邪王儼殺和士開九月齊主殺儼和士開威權日甚朝士無恥者或為之假子士開患傷寒醫云應服黃龍湯士開有難色適一士人往參請先嘗之一飲而盡黃龍湯年久糞汁也治大熱病與穆提婆俱專權奢縱琅邪王儼意甚不平二人忌之出儼居北宫時儼猶帶中丞士開等又欲出之于外治書侍御史王子宜說儼曰殿下被疏正由士開間搆何可出北宫也儼謂侍中馮子琮曰士開罪重殺之何如子琮心欲廢齊主而立儼因勸成之儼令子宜彈士開罪請禁推收禁而推鞫之也子琮雜他文書奏之齊主可之儼誑領軍庫狄伏連使收士開送臺儼斬之儼黨因逼儼帥軍士三千人屯千秋門齊主使劉桃枝召儼儼欲誘陸令萱而殺之因對曰尊兄若赦臣請令姊姊來迎姊姊謂令萱也齊諸王皆呼嫡母為家家乳母為姊姊婦為妹妹令萱聞之戰栗齊主乃急召斛律光光聞儼殺士開撫掌大笑曰龍子所為固自不似凡人入見齊主齊主帥宿衛者受甲將出戰光曰小兒輩弄兵與交手即亂鄙諺云奴見大家臣妾呼天子曰大家心死至尊自宜至千秋門琅邪必不敢動齊主從之光步道使人走出曰大家來儼徒駭散光就儼執其手疆引以前請于齊主曰琅邪王年少腸肥腦滿輕為舉措稍長自不然願寬其罪齊主拔刀鐶築其辮頭良久乃釋之收庫狄伏連王子宜等支解之太后責儼儼曰馮子琮教兒太后遂殺子琮已而陸令萱說齊主曰人稱琅邪聰明雄勇當今無敵觀其相表殆非人臣自專殺以來常懷恐懼宜早為之計齊主未决以問侍中祖珽珽稱周公誅管叔季友鴆慶父齊主乃擕儼之晋陽使劉桃枝拉殺之時儼年十四遺腹四男皆幽死既而贈儼楚恭哀帝以慰太后心冬十月齊主幽其太后胡氏於北宫齊胡太后出入不節與沙門統曇獻通齊主聞而未之信後朝太后見二尼悅而召之乃男子也于是曇獻事亦發皆伏誅遂幽太后於北宫太后或為齊主設食齊主亦不敢嘗壬陳太建四年齊武平辰三年周建德元年春二月齊以祖珽為左僕射胡太后既幽北宫珽引魏保太后故事魏太武帝始光初尊保毋憲氏為保太后欲立陸令萱為太后且謂人曰陸雖婦人然實雄傑女媧以來未之有也令萱亦謂珽為國師由此得左僕射三月癸卯朔日食周主討其太師宇文護殺之初周太祖為魏相立左右十二軍總屬相府太祖殂皆受晋公護處分護第兵衛盛于宫闕諸子僚屬皆貪殘恣橫士民患之周主深自晦匿無所關預人不測其淺深衛公直有怨于護勸周主誅之周乃密與直及右宫伯後周有左右宫伯中大夫宇文神舉太祖族子內史周官後周如制下大夫王軌太原祁人右侍後周倣周官侍御置上士宇文孝伯字胡三深之子謀之周主每于禁中見護常行家人禮至是引護入謁太后謂曰太后好飲屢諫不納因出懷中酒誥授之曰願兄以此入諫護入讀未畢周主以玉珽禮記天子搢珽鄭康成曰珽亦笏也自後擊之護踣于地直出斬之召宫伯長孫覽宇休因紹逺之子等收護子弟親黨殺之初宇文孝伯與周主同日生太祖愛而養之幼與周主同學及即位欲引至左右託言欲與講習故護弗之疑孝伯為人沈正忠諒朝政得失外間細事無不以聞至是以為車騎大將軍護之未敗也問稍伯大夫庾季才曰比日天道何如對曰頃上自有變公宜歸政請老護遂疏之及護誅周主閲其書記得季才書兩紙盛言緯候災祥宜返政歸權周主命賜粟帛遷大中大夫稍伯後周官蓋周官稍人之職庾季才字叔奕新野人仕梁江陵陷入長安周主親政以其弟齊公憲為大冢宰衛公直為大司徒周主始親政頗事威刑雖骨肉無所寬借齊公憲雖遷冢宰實奪之權又謂憲侍讀斐文舉曰昔魏末不綱太祖輔政及周室受命晋公復執大權積習生常愚者謂法應如是卿雖陪侍齊公不得遽同為臣欲死于所事宜輔以正道勸以義方輯睦我君臣協和我兄弟勿令自致嫌疑文舉咸以白憲憲指心撫几曰吾之夙心公寧不知但當盡忠竭節耳知復何言人斐文舉字道裕聞喜衛公直性浮詭貪狠意望大冢宰既不得殊怏怏更請為大司馬欲據兵權周主揣知其意曰汝兄弟長幼有序豈可返居下列由是用為大司徒夏六月齊主殺其左丞相咸陽王斛律光以祖珽知騎兵外兵事祖珽勢傾朝野斛律惡之謂諸將曰邉境消息兵馬處分盲人全不與吾輩語恐誤國事珽覺之私賂光從奴問之奴曰自公用事相王每夜抱膝歎曰盲人入國必破矣穆提婆求娶光庶女不許齊主賜提婆晋陽田光言于朝曰此田神武以來常種禾飼馬以擬寇敵今賜提婆無乃闕軍務乎由是祖穆皆怨之斛律后無寵珽因而間之光弟羡為幽州刺史亦善治兵突厥畏之謂之南可汗光雖貴極人臣性節儉不好聲色杜絶饋餉不貪權勢行兵效其父金之法嘗為士卒先士卒有罪惟大杖撾背未嘗妄殺衆皆爭為之死結髮從軍未嘗敗北深為鄰敵所憚周韋孝寬密為謡言曰百升飛上天明月照長安又曰髙山不推自崩槲木不扶自舉令諜傳之於鄴珽因續之曰盲老公背受大斧饒舌老母不得語使其妻兄鄭道蓋奏之珽與陸令萱因解之曰百升者斛也盲老公謂珽饒舌老母似謂陸氏也且斛律纍世大將明月光之字聲震關西豐樂羡之字威行突厥女為皇后男尚公主謡言甚可畏也齊主以問韓長鸞長鸞以為不可事遂寢㑹丞相府佐封士讓密啓云光前西討還逼帝城將行不軌先是光自宜陽還未至鄴齊主敕使散兵光以軍士未得慰勞表請遣使宣㫖遂至紫陌駐言營齊主惡之故土讓以此為家藏弩甲僮奴千數若不早圖恐事不可測齊主召珽告之珽請遣使賜以駿馬光必入謝因而執之齊主如其言光入至凉風堂劉桃枝自後撲之不仆顧曰桃枝常為如此事我不負國家桃枝與三力士拉殺之血流于地剗之迹終不滅于是下詔稱其欲反并殺其二子珽使二千石郎邢祖信簿録光家得弓十五宴射箭百刀七賜稍二珽問問更得何物祖信曰得棗杖二十束擬奴與人鬪者不曲直即杖之一百珽大慙及出人尤其抗直祖信慨然曰賢宰相尚死我何惜餘生遣中領軍賀拔伏恩乘驛捕羡至幽州門者曰使人𠂻甲馬有汗宜閉城門羡曰敇使豈可拒也出見之伏恩執而殺之及其五子珽自是專主機衡總知騎兵外兵事齊主常令中要人扶侍出入每同御榻論决政事周主聞光死為赦其境內八月齊廢斛律后為庶人秋九月庚子朔日食冬十月齊主立昭儀穆氏即穆舍利為右后先是齊斛律后廢齊主立昭儀胡氏為后后胡太后兄女也太后自愧失德求悅于齊主先飾后置宫中令齊主見之齊主果悅納為昭儀及斛律后廢陸令萱欲立穆夫人太后卑辭厚禮以求令萱結為姊妹令萱不得已乃與祖珽白齊主后遂得立未幾胡后寵衰令萱使人行厭蠱之術胡后遂精神恍惚言笑無恆齊主惡之令萱一日忽以后服被穆昭儀坐之帳中謂齊主曰如此人不作皇后遣何物人作齊主乃立穆氏為右皇后以胡氏為左皇后已而令萱譛胡氏于太后太后大怒呼胡氏立剃其髮送還家尋以穆氏為皇后突厥木杆可汗死弟他鉢可汗立又分立東西二可汗木杆捨其子大邏便而立其弟是為他鉢可汗分立爾伏可汗統東靣步離可汗統西靣周人與之和親嵗給繪絮錦綵十萬齊亦厚賂之他鉢益驕謂其下曰但使我在南兩兒常孝何憂于貧阿史那后無寵于周主神武公竇毅尚襄陽公主生女尚幼密言于周主曰今齊陳鼎峙突厥方彊願舅抑情慰撫以生民為念周主深納之女竇毅宇天武熾兄子即唐髙祖之后癸陳太建五年齊武平已四年周建德二年春正月齊以髙阿那肱録尚書事阿那肱與穆提婆韓長鸞共處衡軸號曰三貴蠧國害民日月滋甚長鸞尤疾士人朝夕惟事潛訴常帶刀走馬瞋目張拳有噉人之勢朝士咨事莫敢仰視齊置文林館齊主頗好文學祖珽奏置文林館以侍郎李德林字公輔博陵安平人顔之推字介琅邪臨沂人同判館事共撰修文殿御覽夏四月陳將軍吳明徹將兵擊齊取江北數郡陳主謀伐齊公卿各有異同唯鎮前將軍吳明徹決策請行陳主謂公卿曰朕意已決可舉元帥衆議以中權將軍梁置四中將軍班四征上淳于量字思明濟北人位重共署推之僕射徐陵獨曰吳明徹家在淮左悉彼風俗將略人才當今亦無過者尚書裴忌曰臣同徐僕射陵應聲曰裴忌亦良副也遂以明徹都督征討忌監軍事統衆伐齊明徹出秦郡注見前都督黃法氍字仲昭巴山新建人氍巨俱反出厯陽齊遣軍救厯陽法氍擊破之又遣開府儀同三司尉破胡救秦州趙彥深私問計于祕書監源文宗文宗曰朝廷精兵必不肯多付諸將數千以下適足為吳人之餌破胡人品王之所知敗績之事匪朝伊夕莫若専委王琳招募淮南三四萬人風俗相通能得死力兼命舊將將之屯于淮北足以固守且琳之于頊必不肯北靣事之明矣若不推赤心于琳更遣餘人掣肘復成速禍彌不可為彥深歎曰此策誠足制勝爭之十日已不見從持事至此安可盡言因相顧流涕故源文宗名彪以字行于恭之子趙彥深封宜陽王文宗稱為王齊師選長大有膂力者為前隊號蒼頭犀角大力其鋒甚鋭又有西域胡善射弦無虛發陳軍尤憚之將戰吳明徹謂巴山太守蕭摩訶曰若殪此胡則彼軍奪氣矣摩訶曰當為公取之明徹乃召降人有識胡者使指示之自酌酒以飲摩訶摩訶飲畢馳馬衝齊軍胡挺身出陳彀弓未發摩訶擲銑鋧小鑿也銑蘇典反鋧池典反中其額應手而仆大力十餘人出戰摩訶又斬之于是齊軍大敗破胡之出師也王琳謂曰吳兵甚鋭宜以長策制之慎勿輕鬬破胡不從而敗齊乃使琳赴夀陽召募以拒陳于是瓦梁北齊郡今日瓦梁壘在江寧府六合縣西廬江厯陽合肥注俱見前皆降於陳法氍禁侵掠撫戍卒與之盟而縱之高唐梁郡隋改縣曰宿松今屬安慶府齊昌注見前瓜步胡墅俱在今六合縣等城亦降于陳已而陳又克齊灄口及巴青州山陽廣陵等城北灄口在今漢陽府黃彼縣古灄水入江之口巴州齊以西陽郡置故城在今黃州府黃岡縣餘注俱見前五月齊以祖珽為北徐州魏置齊移治琅邪今山東沂州府是刺史珽既執政頗欲黜諸閹竪及羣小輩陸令萱穆提婆議頗同異珽乃諷中丞麗伯律麗姓伯律名令劾主書魏置中書屬王子冲納賂事連提婆欲因此并坐及令萱令萱聞而懷怒釋子冲不問珽由是日益疏諸宦者更共譖之齊主以問令萱令萱下牀拜曰老婢應死孝徴大是奸臣人實難知齊主令韓長鸞檢案得其詐出敕受賜僞出恩敕以為受賜等十餘事齊主以嘗與重誓故不殺出刺北徐州珽至州會有陳師州人多叛應之穆提婆欲令城陷不遣援兵珽且戰且守叛者散退尋死于州齊主殺其蘭陵王長恭齊蘭陵王長恭貌美而勇以邙山之捷齊敗周師于洛陽長恭為軍事具前威名大盛武士歌之為蘭陵王入陳曲杜佑曰作此舞以效其指麾擊刺之容齊主忌之其所親尉相願代人標之子謂曰朝廷忌王宜屬疾在家勿預時事長恭然之而未能退及江淮用兵恐復為將有疾不療齊主鴆殺之秋八月周太子贇即宣帝納妃楊氏劉友益曰此著隋篡之始妃隋公堅之女也大子好眤近小人左宫正宇文孝伯言于周主曰皇太子春秋尚少志業未成請妙選正人為其師友調護聖質如或不然悔無及矣周主斂容曰正人豈復過卿乃以尉遲運為右宫正周主嘗問萬年丞樂運曰太子何如人對曰中人周主顧為齊公憲曰百官佞我唯運所言乃忠直耳因問運中人之狀對曰如齊桓公是也管仲相之則霸豎貂輔之則亂可與為善可與為惡周主曰我知之矣乃妙選宫官以輔之太子不悅尉遲運回弟綱之子樂運字承業南陽淯陽人陳師攻齊壽陽克之殺其刺史王琳遂取齊昌徐州北魏東徐州也治下邳亦曰南徐州下邳注見前等城吳明徹攻夀陽堰肥水以灌城城中多病腫泄死者什六七齊皮景和琅邪下邳人等救夀陽衆數十萬去夀陽三十里頓軍不進陳諸將以堅城未拔大援在近皆懼明徹曰兵貴神速而彼結營不進自挫其鋒其不敢戰明矣乃疾攻一鼓拔之擒王琳等送建康琳素得將士心齊人亦重其忠義及被擒麾下在明徹軍見者皆欷歔不能仰視爭為請命及致給資明徹恐其為變遣使追斬之哭者聲如雷有一叟以酒脯來祭哭盡哀收其血而去聞者莫不流涕齊主聞壽陽陷頗以為憂穆提婆等曰假使國家盡失黃河以南猶可作一龜兹國更可憐人生如寄唯當行樂何用愁為左右嬖臣因贊和之齊主即大喜酣飲鼓舞以皮景和全軍而還賞之陳以明徹為車騎大將軍豫州刺史陳主置酒舉杯屬徐陵曰賞卿知人陵遜席曰定䇿聖衷非臣力也遂克齊昌前已請降今復取之淮陰朐山注見前濟陰東魏僑郡故城在今泗州盱眙縣濟南徐州胡三省注齊當作齊書齊南徐以别于京口之南徐等城陳懸王琳首于建康市故吏朱瑒致書徐陵請許其葬陳主許之楊瘞琳于八公山側義故會葬者數千人尋有壽陽人芧智勝等密送其柩于鄴齊贈開府儀同三司諡曰忠武給輼輬車以葬之義故胡三省注故舊以義結者甲陳太建六年齊武平午五年周建德三年春正月周詔齊公憲等皆進爵為王二月壬午朔日食三月周太后叱奴氏殂周叱奴太后殂周主居倚廬朝夕進一溢米羣臣表請纍旬乃止及葬周主跣行至陵所詔曰三年之喪達於天子但軍國務重須自聼朝衰麻之節苫廬之禮率遵前典以申罔極百僚宜依遺令既葬而除公卿固請依權制周主不許卒申三年之制五服之內亦令依禮先是衛王直齊王憲言其喪次飲酒食肉無異平日周主曰吾與齊王異生俱非正嫡特以故同袒括髮汝親太后之子時承慈愛但當自勉何論他人及既葬周主如雲陽直以怨憤遂與其黨作亂尉遲運擊敗之伏誅夏五月周廢佛道教毁淫祠初周主定三教先後以儒為先道為次釋為後至是遂禁佛道二教經像悉毁沙門道士並還俗諸淫祠非祀典所載者悉除之尋立通道觀以一聖賢之教冬十二月陳以孔奐為吏部尚書時新復淮泗攻戰降附功賞紛紜奐識見精敏不受請託事無凝滯人皆悅服齊殺其南陽王綽字世通世祖之子綽刺定州喜為殘虐嘗見婦人抱兒取以飼狗復以兒血塗婦人縱狗食之齊主鎖詣行在至而宥之齊主問綽在州何事最樂對曰聚蠍于器置狙其中觀之極樂齊主即命索蠍置浴斛使人裸卧斛中號呌宛轉齊主與綽臨觀喜噱不己因讓之曰如此樂事何不早馳驛奏聞由是有寵拜大將軍韓長鸞疾之使人誣告其反殺之乙陳大建七年齊武平未六年周建德四年春二月丙戌朔日食三月周使開府儀同三司伊婁謙伊婁魏十姓之一謙字彥恭鮮卑人如齊齊人留之齊主承世祖奢泰之餘後宫皆寶衣玉食競為新巧先為胡后造珠裙袴所費不可勝計為大所焚尋復為穆后營之既而穆后寵衰其侍婢馮小憐大幸拜為淑妃坐則同席出則並馬誓同生死盛修宫苑窮極壯麗所好不常數毁又復每有災異寇盜不自貶損唯多設齊以為修德好自彈琵琶為無愁之曲民間謂之無愁天子于華林園立貧兒村自衣藍縷之服行乞其間以為樂陸令萱穆提婆髙阿那肱韓長鸞等宰制朝政宦官鄧長顒陳德信等並參預機權官由財進獄以賄成舊蒼頭劉桃枝等皆開府封王其餘歌舞人見鬼人等濫得富貴者殆將萬數庶姓封王者以百數開府千餘人儀同無數乃至狗馬及鷹亦有儀同郡君之號皆食其祿見鬼人巫覡輩也一戲之賞動踰巨萬既而府藏空竭乃賜郡縣使賣官取直由是為守令者率皆商賈競為貪縱民不聊生周主謀伐之韋孝寬上疏陳三策其一曰齊自長淮之南悉為陳氏所取內離外叛計盡力窮大軍若出軹關方軌而進兼與陳氏共為掎角并令廣州義旅出自三鴉又募山南驍鋭沿河而下復遣北山稽胡絶其并晋之路百道俱進並趨虜庭必當望旗奔潰所向摧殄其二曰若國家更為後圖未即大舉宜與陳人分其兵勢三鴉以北萬春以南廣事屯田預為貯積募其驍悍立為部伍彼既東南有敵戎馬相恃我出竒兵破其疆場彼若興師赴援我則堅壁清野待其去逺還復出師常以邊外之軍引其腹心之衆我無宿春之費彼有奔命之勞一二年中必白離叛且齊氏淫暴政出多門鬻獄賣官忌害忠直境嗷然覆亡可待乘間電掃事等摧枯其三曰若欲更存遵飬且復相時則宜還崇鄰好申其盟約安民和衆通商惠工畜鋭養威觀釁而動斯乃長策逺馭坐自兼并也三鴉即魯陽關在今河南南陽府南召縣東北與汝州魯山縣界萬春周齊分界處唐于此置縣故城在今山西絳州河津縣書奏周主引開府儀同三司伊婁謙于內殿從容謂曰朕欲用兵何者為先對曰齊氏沉溺倡優耽昏麴蘖其折衝之將斛律明月已弊于讒口上下離心道路以目此易取也乃使謙聘於齊以觀釁其參軍髙遵以情告齊人齊人留謙等不遣夏四月陳焚文錦於雲龍門陳監豫州陳桃根得青牛以獻陳主還之又表上織成羅文錦被詔于雲龍門外焚之秋七月周主伐齊克河陰本漢平陰縣三國魏更名隋省故城在今河南府孟津縣攻金墉不克而還周主下詔伐齊帥衆六萬直指河陰八月入齊境禁伐樹踐稼犯者皆斬攻河陽大城拔之齊王憲進圍洛口舊洛水入河之口在河南府鞏縣南有城拔二城焚浮橋齊都督傅伏大安人自永橋城名在懷慶府武陟縣西夜入中灘城在懷慶府孟縣胡三省曰河陽有三城南城北城中灘城是也周人圍之不下洛州刺史獨孤永業字世基中山人守金墉周主攻之不克永業通夜辦馬槽二千周人聞之以為大軍且至憚之九月周主有疾夜引兵還傅伏謂行臺乞伏貴和曰周師疲弊願得精騎二千追擊之可破也貴和不許齊王憲等降拔三十餘城皆棄不守冬十二月辛亥朔日食丙陳太建八年齊隆化申元年周建德五年春二月周遣其太子贇伐吐谷渾周主命太子巡撫西土因伐吐谷渾大將軍王軌官正宇文孝伯從行至伏俟城注見前而還太子在軍多失德官尹鄭譯字正儀儼兄子王端等皆有寵軍還軌等言之周主怒杖太子除譯等名已而太子復召譯戲狎如初夏六月戊申朔日食陳太子詹事江總免初陳太子叔寶欲以江總為詹事孔奐曰江有潘陸之華而無園綺之實不可太子深以為恨自言于陳主將許之奐奏曰江總文華之士太子文華不少豈藉于總願選敦重之才以居輔導之職陳主曰然則誰可者奐曰王廓世有懿德識性敦敏可以居之太子時在側曰廓父名泰字仲通僧虔之孫不宜為太子詹事奐日范曄即范泰之子亦為太子詹事太子固爭陳主從之總遂與太子為長夜之飲飬良娣陳氏為女太子亟微行遊總家陳主怒免總官冬周主復伐齊齊主大敗走晉陽遂奔鄴晉陽人立安王延宗文襄第五子以守周主拔而執之周主謂羣臣日前入齊境見其行師殆同兒戲况其朝廷昏亂政由羣小百姓嗷然朝不謀夕天與不取恐貽後悔晉州髙歡所起之地鎮攝要重今往攻之彼必來援吾嚴軍以待擊之必克然後乘破竹之勢鼓行而東足以窮其巢穴混同文軌矣于是自將伐齊至晋州遣內史王誼字宜君洛陽人監諸軍攻平陽城降之齊兵大潰遂克晋州齊主方與馮淑妃獵于天池在今欣州靜樂縣西南唐于此置縣宋省告急者三至丞相高阿那肱曰大家正為樂邊鄙小事何急奏聞至暮使至則平陽已陷矣齊主將還妃請更殺一圍從之十一月自帥大軍至平陽聲勢甚盛周主欲避其鋒以梁士彥字相如安定烏氏人為晋州刺史而還齊師遂圍平陽晝夜攻之不克齊人作地道攻平陽城陷十餘步將士乘勢欲入齊主敕且止召馮淑妃觀之淑妃粧㸃不時至周人以木拒塞之城遂不下周主還長安明日下詔復伐齊十二月至平陽置陳二十餘里齊兵陳于城南塹北自旦至申相持不决齊髙阿那肱曰吾兵雖多堪戰者少不如勿戰却守髙梁橋在平陽府東北髙梁城下齊主意未决諸內參曰彼亦天子我亦天子彼尚能遠來我何為守塹示弱齊主曰此言是也于是填塹南引周主大喜勒諸軍擊之兵才合齊主與馮淑妃並騎觀戰東偏少却淑妃怖曰軍敗矣穆提婆曰大家去大家去齊主遂以淑妃北走齊師大潰安德王延宗獨全軍而還齊主至洪洞淑妃方以粉鏡自玩後聲亂唱賊至于是復走先是齊主以淑妃為有功將立為左皇后遣內參詣晋陽取禕翟等至是遇于中塗齊主為按轡命淑妃著之然後去洪洞北齊鎮隋為縣今屬平陽府周主入平陽遂帥諸將追齊師齊主欲自晋陽向北朔州注見前以安德王延宗為并州刺史謂曰并州兄自取之兒今去矣延宗曰陛下為社稷勿動臣為陛下出死力戰必能破之穆提婆曰至尊計已成王不得轍沮齊主乃夜斬五龍門而出欲奔突厥從官多散乃回向鄴穆提婆西奔周軍陸令萱自殺周主以提婆為柱國詔諭齊臣曰若逹天命官爵有加自是降者相繼并州將帥請於延宗曰王不為天子諸人實不能為王出死力延宗不得已遂即位衆聞之不召而至者前後相屬延宗發府藏及後宫以賜將士見士卒皆親執手稱名流涕嗚咽衆爭為死童兒女子亦乘屋攘袂投甎石以禦敵周主至晋陽延宗身自拒戰徑捷若飛所向無前周主攻其東門延宗擊之死者二千餘人周主左右略盡齊人奮擊幾中之僅得免時已四更齊人既捷飲酒醉卧延宗不復能整周主乃駐馬鳴角收兵俄頃復振明旦還攻東門克之延宗力屈被擒周主下馬執其手曰兩國非有怨惡直為百姓來耳終不相害勿怖也使復衣帽而禮之于是大赦削齊亂制收禮文武齊主入鄴廣寧王孝珩請使任城王湝將幽州兵趣并州獨孤永業將洛州兵趣長安自將京畿兵鼓行逆戰斛律孝卿請齊主親勞將士為之撰辭且曰宜慷慨流涕以感激人心齊主既出不得記所受言遂大笑左右亦笑將士皆怒無復戰心行臺僕射髙勱將兵衛太后太子還鄴謂齊主曰今之叛者多是貴人至于卒伍猶未離心且王師頻北賊徒輕我今背城一决理必破之齊主不能用廣寧王孝珩文襄第二子任城王湝髙祖第十子高勱字敬德清河王嶽子斛律孝卿太安人羌舉之子丁陳太建九年齊幼主恆承光元年周建德六年酉是嵗齊亡陳周二大國後梁一小國凡三國春齊主緯傳位於太子恆周師圍鄴緯出走周主入鄴齊高阿那肱引周師追緯及恆獲之遂滅齊北齊自顯祖至後主亡凡五主共二十八年齊望氣者言當有革易齊王引高元海等議禪位太子于是太子恆即位生八年矣齊主緯自為太上皇帝廣寧王孝珩求拒周師高韓恐其為變出孝珩為滄州刺史領軍尉相願拔佩刀斫柱歎曰大事去矣知復何言周師至鄴圍之齊人出戰大敗緯從百騎東走周師入鄴齊王公以下皆降留守大將軍慕容三藏紹宗之子猶拒戰周主引見禮之周主先以馬腦酒鍾遺齊將鮮于世榮漁陽人世榮碎之至是在三臺前鳴鼓不輟周人執之世榮不屈乃殺之周主使將軍尉遲勤代人綱之子追齊主齊國子博士熊安生博通五經聞周主入鄴遽令掃門語家人曰周帝重道尊儒必將見我俄而周主幸其家不聼拜親執其手引與同坐賞賜甚厚給安車駟馬以自隨又遣侍臣就中書侍郎李德林宅慰諭之引入宫訪以齊事熊安生字植之長樂阜城人緯留胡太后于濟州使髙阿那肱守關即碻磝關注見前自與穆后馮妃幼主恆韓長鸞等數十人奔青州欲入陳而髙阿那肱密召周師約生致齊主屢啓云周師尚遠已令燒斷橋路緯由是淹留自寬周師至關阿那肱即降之周師奄至青州緯囊金繫鞍後與后妃幼主等十餘騎南走尉遲勤追及盡擒之并胡太后送鄴周主詔故斛律光等宜追加贈諡并為改葬子孫隨蔭叙録田宅沒官者還之指斛律光名曰此人在朕安得至此髙緯至鄴周主降階以賔禮見之周主至長安置緯于前列其王公等于後備大駕布六軍奏凱樂獻俘於太廟觀者皆稱萬嵗封緯為溫公周主與齊君臣飲酒令緯起舞高延宗悲不自持屢欲仰藥其侍婢禁止之既而周人誣緯和穆提婆謀反并其宗族皆賜死衆人多自辨理延宗獨攘袂泣而不言以椒塞口而死二月齊廣寧王孝珩任城王湝起兵信都周齊王憲伐而執之齊廣寧王孝珩以五千人㑹任城王湝於信都共謀匡復周主使齊王憲柱國楊堅擊之至信都湝所署領軍尉相願以衆降湝遂戰敗與孝珩俱被執憲謂湝曰任城王何苦至此湝曰下官神武皇帝之子兄弟十五人幸而獨存逢宗社顛覆今日得死無愧憤陵憲肚之命歸其妻子又親為孝珩冼瘡傳藥禮遇甚厚先是齊洛州刺史獨孤永業有甲士三萬聞晋州陷請出兵擊周奏寢不報永業慨憤及聞并州陷乃降周東雍州行臺傅伏不下周主遣韋孝寬招之令其子以上大將軍武鄉公告身賜伏伏不受謂孝寬曰事君有死無二此貌為臣不能竭忠為子不能盡孝願速斬之以令天下周主又遣髙阿那肱召伏伏知齊主已被擒仰天大哭然後出降周主謂曰何不早降代流涕對曰臣三世為齊臣不能自死羞見天地周主執其手曰為臣當如此乃以所食羊肋骨賜伏曰骨親肉疏所以相付遂授上儀同大將軍東雍州魏置今山西絳州是梁主朝周於鄴自秦兼天下無朝覲之禮至是周始命有司草具其事致積子賜反饋之芻米也致餼饔餼也熟曰饔腥曰餼設九儐主副也九介賔副也受享於廟享獻之禮于廟受之三公三孤六卿致食音嗣餼賔及其從勞賔慰問之也還贄執圭為贄既見還之致享享宴也皆如古禮周詔舉山東明經幹治者周主西還詔山東諸州各舉明經幹治者一人若竒才異術卓爾不羣者不拘此數已而周主以李德林為內史上士詔誥格式及用山東人物並以委之夏五月周主毁其宫室之壯麗者周主詔以路寢㑹義諸殿皆晋公護専政時所為事窮壯麗有踰清廟可悉毁撤雕斫之物並賜貧民繕造之宜務從卑朴并鄴諸堂殿壯麗者凖此又制庶人以上惟聼衣綢綿綢絲布圓綾紗絹綃葛布等九種餘悉禁之朝祭之服不拘此制周主性節儉常服布袍寢布被後宫惟置妃二人世婦三人御妻三人此外皆减之秋八月周定權衡度量詔頒之四方又行刑書要制羣盜贓一匹及正長五家為保有長保五為閭有正隱五丁若地頃以上皆死時鄭州獲九尾狐已死獻其骨周主曰瑞應之來必彰有德今無其時恐非實録詔焚之冬十月陳司空吳明徹侵周圍彭城陳主聞周人滅齊欲爭徐兖詔吳明徹督諸軍北伐至吕梁注見前周徐州總管梁士彥帥衆拒戰明徹擊破之士彥嬰城自守明徹圍之陳主鋭意以為河南指麾可定蔡景厯諌曰師老將驕不宜過窮遠略陳主怒以為沮衆免官削爵土十一月己亥晦日食十二月齊范陽王高紹義顯祖第三子稱帝於北邊先是齊亡范陽王紹義至馬邑北朔州治肆州以北皆應之紹義引兵欲南取并州至新興而肆州已為周守遂奔突厥他鉢可汗甚愛重紹義凡齊人在北者悉以𨽻之營州魏置治和龍和龍注見前刺史髙寶寧齊之疏屬久鎮和龍甚得夷夏之心鄴都既陷周主遣使招之不應至是寶寧上表勸進于紹義紹義遂稱帝改元武平以寶寧為丞相突厥舉兵助之已而幽州人盧昌期據范陽迎紹義紹義引突厥兵赴之周東平公宇文神舉擒斬昌期紹義還入突厥寶寧救范陽未至聞昌期死還據和龍紹義後為突厥所誘執送周人徙死蜀中戊陳太建十年周宣戌帝贇宣政元年春二月周大將軍王軌救彭城獲陳將吳明徹吳明徹圍周彭城環列舟艦攻之甚急周遣王軌救之軌引兵輕行據淮口結長圍以鐵鎖貫車輪數百沈之清水即泗水以遏陳船歸路軍中忷懼蕭摩訶言於明徹曰聞王軌始鎖下流其兩端築城未立請往擊之不然吾屬皆為虜矣明徹奮髯曰搴旗陷陳將軍事也長算遠略老夫事也摩訶失色而退一旬之間水路遂斷周兵益至明徹苦背疾摩訶復請曰今求戰不得進退無路潛軍突圍未足為恥願公帥步卒乘馬輿徐行麾訶領鐵騎數千驅馳前後必當使公安達京邑明徹曰此良圖也然吾為總督必須身居其後馬軍宜在前不可緩摩訶因帥馬軍夜發明徹决堰退軍至清口水勢漸微舟礙車輪不得過王軌引兵蹙之衆潰明徹被執將士輜重皆沒于周獨蕭摩訶與將軍任忠字奉誠汝隂人周羅㬋字公布尋陽人全軍得還陳主聞明徹被執即日召蔡景厯以為咨議參軍明徹憂憤而死三月周主初服常冠其制以皂紗全幅向後襆髮仍裁為夏五月周主雍伐突厥有疾而還六月殂太子贇立是為宣帝以鄭譯為內史中大夫突厥寇掠幽州周主帥諸軍伐之以疾留雲陽宫詔停諸軍驛召宇文孝伯執其手以後事付之令馳驛入京鎮守以備非常六月朔殂諡武皇帝廟號髙祖葬孝陵太子即位即逞奢欲曽無戚容捫其杖痕大罵曰死晚矣閲視宫人逼而幸之超拜鄭譯為內史中大夫委以朝政不踰月而葬詔議即吉樂運以為葬期既促事訖即除太為汲汲不從周主贇殺其叔父齊王憲周主以齊王憲屬尊望重忌之謂宇文孝伯曰公能為朕圖齊王當以其官相授孝伯叩頭曰先帝遺詔不許濫誅骨肉齊王陛下叔父功髙德茂社稷重臣陛下若無故害之臣又順㫖曲從則臣為不忠之臣陛下為不孝之子矣周主不懌由是疏之乃與于智謹之子鄭譯等謀密使智告憲有異謀遣孝伯召憲入殿伏壯士執之憲自辨理周主使智證之憲目光如炬與智相質既而歎曰死生有命寧復圖存但老母在堂恐留兹恨耳因擲笏于地遂縊之周主召憲僚屬使證成憲罪參軍李綱以死自誓終無撓辭撫棺號慟自廛之哭拜而去李綱字文紀勃海蓚人閏月周立后楊氏秋七月周以后父楊堅為上柱國大司馬初周內史王軌嘗言於髙祖曰太子非社稷主普六茹堅堅父忠賜姓普六茹氏貌有反相髙祖不悅曰必天命有在將若之何堅聞之懼深自晦匿齊王憲亦言堅相貌非常恐非人下請早除之髙祖以問來和和素附堅對曰隋公正是守節人耳來和字孔順長安人至是堅以后父故有是命九月陳主及其羣臣盟陳主立方明壇於婁湖以始興王叔陵字子嵩陳主第二子為王官伯盟百官自幸婁湖誓衆分遣大使頒下四方以相警戒己陳太建十一年周亥靜帝闡大象元年春正月周作刑書聖制周主初立以髙祖刑書要制為太重除之又數行赦宥由是民輕犯法既而又自以奢淫多過失惡人規諌欲為威虐懾服羣下乃更為刑經聖制用法益深大醮於正武殿告天而行之密令左右伺察羣臣小有過失輒行誅譴又居喪才踰年即恣聲樂魚龍百戲常陳殿前日夜不休多娶美女增置位號遊宴沉湎旬日不出於是樂運輿櫬詣朝堂陳周主八失其一事多獨斷不參宰輔其二采女實宫儀同以上女不許輒嫁其三一入後宫數日不出所須奏聞多附宦者其四寬刑未幾更嚴前制其五髙祖斫雕為朴今乃遽窮奢麗其六徭賦下民以奉俳優角抵其七上書字誤即治其罪阻獻書之路其八元象垂誡不修布德政若不革兹八事臣見周廟不血食矣周主大怒將殺之朝臣恐懼莫不救者內史中大夫元巖字君山洛陽人歎曰臧洪同死人猶願之况比干乎若樂運不免吾將與之同斃乃詣閣請見曰樂運不顧其死欲以求名陛下不如勞而遣之以廣聖度周主感悟明日召運謂曰朕思卿所奏實為忠臣賜御食而罷之二月周主殺其徐州總管王軌及宫正宇文孝伯周主之在東宫也高祖慮不堪承嗣御之甚嚴王軌因言曰太子仁孝無聞恐不了陛下家事後又因內宴捋髙祖鬚曰可愛好老公但恨後嗣弱耳及周主嗣位鄭譯等用事軌聞之自知及禍謂所親曰吾昔在先朝實申社稷至計今日之事斷可知矣此州控帶淮南鄰接疆冦欲為身計易如反掌但忠義不可虧正可于此待死冀千載後知吾心耳周主從容問譯曰我腳杖痕誰所為也對曰事由烏丸軌軌之先為元魏護烏丸校尉故稱烏丸王氏宇文孝伯謂吐谷渾之後事具前因言捋鬚事周主遣使殺軌元巖不肯署詔御正中大夫顔之儀切諌不聼巖進繼之脫巾頓顙三拜三進周主曰汝欲黨軌邪巖曰臣非黨軌正恐濫誅失天下之望周主怒使閹豎摶其靣軌遂死巖亦廢于家顔之儀字子升見遠之孫他日周主託以齊王憲事讓孝伯曰公知齊王謀反何以不言對曰臣知齊王忠於社稷為羣小所譖言必不用所以不言且先帝付囑微臣唯命輔導陛下今諫而不從實負顧託以此為罪是所甘心周主大慙俯首不語命將出賜死於家周主贇傳位於太子闡自稱天元皇帝天元傳位驕侈彌甚所居稱天臺自比上帝冕服車旗皆倍常制以樽􅉓圭瓉飲食羣臣朝者致齊三日清身一日不令人有天高上大之稱官名犯者皆改之逰戲不節晨出夜還公卿以下常被楚撻每捶人皆以百二十為至度謂之天杖其後又加二百四十后妃嬪御亦多杖背於是內外恐怖人不自安周主闡仍居東宫號正陽宫冬十月周主贇復佛道像天元與二像並坐大陳雜戲令士民縱觀又集百官宫人外命婦大列妓樂作乞寒胡戲乞寒亦曰潑寒西域之樂十二月周取陳江北地周行軍元帥韋孝寬侵陳克夀陽及廣陵遂取陳江北地南北兖晋三州及旴眙山陽陽平馬頭秦厯陽沛北譙南梁等九郡民並自拔還江南周又取譙北徐州自是江北之地盡沒于周府晋州梁置今安慶府是陽平晋郡故城在今鳯陽靈璧縣馬頭宋郡故城在今鳯陽府懷逺縣沛梁南沛郡故城在今泗州天長縣北譙東魏郡今滁州全椒縣是南梁梁郡故城在今鳯陽府夀州譙州東魏置治渦陽今潁州府蒙城縣是餘注俱見前庚陳太建十二年子周大象二年春三月周主贇立五后先是周天元立妃朱氏吳人闡之母為天元帝后已又改為天皇后立妃元氏為天右皇后陳氏為天左皇后與天元皇太后楊氏凡四后至是將立五后以問小宗伯辛彥之狄道人對曰皇后與天子敵體不宜有五博士何妥字棲鳯西城人曰帝嚳四妃虞舜二妃先代之數何常之有天元大悅免彥之官以陳氏為天中太皇后尉遲妃為天左太皇后造下帳五使五后各居其一又以五輅載婦人自帥左右步從夏五月周主贇殂楊堅自為大丞相假黃鉞居東宫周天元昏暴滋甚楊后父隨公堅位望隆重天元忌之嘗因忿謂后曰必滅爾家因召堅欲殺之而不果鄭譯與堅少同學竒堅相表堅龍顔額上有五柱入頂目光外射有文在手曰王傾心相結及是天元不豫小御正劉昉博陵望都人素以狡諂得幸與御正中大夫顔之儀並見親信天元召入卧內欲囑以後事而瘖不能言昉見周主闡幼冲以堅后父有重名遂與譯及御飾大夫後周置掌御飾栁裘字茂和世隆之曽孫內史大夫韋譽京兆人御正下士皇甫績字功明安定朝那人謀引堅輔政堅不敢當昉曰公若為速為之不為昉自為也堅乃稱受詔居中侍疾天元遂殂祕不發喪昉譯矯詔以堅總知中外兵馬事之儀不從昉等逼之儀速署之儀厲聲曰主上并遐嗣子幼冲阿衡之任宜在宗英趙王名招字豆盧突太祖子合膺重寄公等奈何欲以神器假人之儀有死而已不能誣罔先帝昉等乃代署而行之諸衛既受敕並受堅節度堅就之儀索符璽之儀正色曰此天子之令自有主者宰相何故索之堅大怒將殺之以其民望出為西疆後周郡治合川故城在今西寧府碾伯郡守于是乃發喪上宣帝諡葬定陵周主入居天臺尊楊后為皇太后朱后為帝太后陳元尉遲三后並為尼以楊堅為假黃鉞左大丞相百官總已以聼時衆情未一堅引司武上士盧賁字子微辨弟子置左右潛令部伍仗衛至東宫門者拒不納賁叱之堅乃得入賁遂典丞相府宿衛以鄭譯為長史劉昉為司馬李德林為府屬內史下大夫髙熲字昭元勃海蓚人明敏有器局習兵事多計略堅引為司録時漢王贊字乾依髙祖子居禁中劉昉飾美妓送贊說之歸第曰待事寧後入為天子此萬全計也贊年少庸下從之堅革宣帝苛酷之政更為寬大剛略舊律作刑書要制奏而行之躬履節儉中外悅之堅夜召太史中大夫庾季才問曰天時人事何如季才曰天道精微難測以人事卜之符兆定矣獨孤夫人亦謂堅曰騎虎之勢必不得下勉之信獨孤夫人之女周相州總管蜀公尉遲迥舉兵相州討楊堅堅遣韋孝寬將兵擊之堅以迥位望素重必不附已召之㑹葬而以韋孝寬為相州總管迥知堅將不利於周室謀舉兵討之集文武士民令之曰楊堅藉后父之勢挾幼主以作威福不臣之跡暴于行路吾與國舅甥任兼將相今欲糾合義勇匡國庇民何如衆咸從命迥乃自稱大總管奉趙王招少子以號令天元時諸王咸就國及堅秉政恐諸王在外生變因徴入朝堅以鄖公韋孝寬為行軍元帥以討迥迥移書于其弟子青州總管勤勤表送其書尋復從迥于是迥及勤所統諸州皆從之衆數十萬迥遣使招并州刺史李穆穆子士榮以穆所居天下精兵處隂勸穆從迥穆深拒之堅使穆子渾往布腹心穆使渾奉尉斗于堅日願執威柄以尉安天下又以十三鐶金帶遺堅十三鐶金帶者天子之服也堅大悅穆兄子崇為懷州刺史初欲應迥後知穆附堅慨然太息曰闔家富貴數十人值國有難竟不能扶傾繼絶復何靣目處天地間乎不得已亦附于堅字尉斗即尉斗也李渾宇金才穆少子李崇永隆賢之子周楊堅自加都督中外諸軍事周楊堅殺趙王招越王盛字立久突髙祖子先是周畢賢字乾陽世宗子謀殺堅事泄堅殺賢及其三子至是趙王招邀堅過其第引入寢室伏壯士于室後堅左右皆不得從惟腹心元胄魏濮陽王順之孫坐戶側酒酣招以佩刀刺瓜連啖堅欲因而刺之胄進曰相府有事不可久留招叱之使却胄瞋目憤氣扣刀入衛扶堅趨去招將追之胄以身蔽户招不得出堅乃誣招與越王盛謀反皆殺之及其諸子賞賜元胄不可勝計周室諸王數欲伺隙殺堅堅都督李圓通常保護之由是得免已而堅又殺陳主縱及代王達膝王逌字李圓通京兆涇陽人陳王純字堙智突代王達度斤突滕王逌字爾固突俱大祖子秋八月梁遣使如周梁使中書舍人栁莊字思敬斛人奉書入周丞相堅執莊手曰孤昔從役江陵深蒙梁主殊眷今猥蒙顧托當相與共保嵗寒耳時周鄙州總管司馬消難舉兵應相州益州總管王謙亦起兵于蜀梁諸臣俱勸梁主與尉遲迥連謀以為進可以盡節周氏退可以席卷山南梁主疑未决㑹莊至具道堅語且曰尉遲迥昏耄已甚難王謙常人之下者非有匡合之才終當覆滅隨公必移周祚莫若保境息民以觀其變梁主然之已而消難以衆奔陳王謙為梁睿所敗被殺高阿那肱為謙將睿并斬之鄖州本西魏安州後周更名今湖北德安府是山南漢沔之地在終南太華之南故曰山南王謙字敕萬雄之子梁睿字恃德禦之子周尉遲迥兵敗自殺先是周韋孝寬引軍壁于武陟隋縣今屬河南懷慶府與尉遲迥隔沁水出山西沁州沁源縣羊頭山流至武陟縣入于河相持不進孝寬長史李詢字孝詢崇之兄密啓丞相堅云總管梁士彥等並受迥金堅憂之與李德林謀欲遣腹心一人往監諸軍使觀情僞劉昉鄭譯皆辭堅不悅司録高熲請行堅大喜即遣之及是熲至軍為橋于沁水迥子魏安公惇軍沁東布陳二十餘里麾兵少却欲待孝寬軍軍半度擊之孝寬因其却鳴鼓齊進軍既度熲命焚橋以絶士卒反顧心惇兵大敗孝寬乘勝進追至鄴迥卒十三萬陳于城南迥弟勤帥衆五萬自青州赴逈以三千騎先至迥素習軍旅老猶被甲臨陳其麾下皆關中人為之力戰孝寬等軍不利而却鄴中士民觀戰者數萬人宇文欣字仲樂貴之子曰事急矣吾當以詭道破之乃先射觀者觀者皆走轉相騰藉聲如雷霆欣乃傳呼曰賊敗矣衆復振因其擾而乘之迥軍大敗走保鄴城孝寬縱兵圍之迥擲弓于地罵堅極口而自殺迥起兵六十八日而敗孝寬分兵悉平關東勤走青州追獲之堅以其初有誠欵特不之罪冬十月甲寅日食後周書北史俱不書朔晦十二月周楊堅自為相國進爵隨王加九錫辛陳太建十三年周大象三年二月以後隋高祖丑文帝楊堅開皇元年是嵗周亡隋代凡三國春二月周楊堅稱皇帝是為隋文帝木襲封隨公故國號曰隨以周齊不遑寧處乃去辵作隋以辵訓是故也辵本作是音綽庾季才勸隋王以今月甲子應天受命李穆盧賁亦勸之于是周主遜居别宫隋王即皇帝位後周自愍帝至靜帝亡凡五主合二十五年時周境內有州二百一十一郡五百八隋皆有之初隋主與周載下大夫榮建緒有舊將受禪建緒出為息州刺史隋主謂曰且躊躇當共取富貴建緒正色曰明公此㫖非僕所聞及即位來朝隋主謂曰卿亦悔不對曰臣位非徐廣情類楊彪隋主曰朕雖不曉書語亦知卿此言不遜竇毅之女聞隋受禪自投堂下撫膺太息曰恨我不為男子救舅氏之患毅及襄陽公主掩其口曰汝勿妄言滅吾族由是竒之及長以適唐公李淵載下大夫胡三省注載下逸師字後周置載師屬地官有中大夫下大夫息州後周改魏東豫州置今光州息縣是榮氏出周榮公後建緒北平無終人李淵昞之子即唐髙祖隋改官名崔仲方字不齊博陵安平人勸隋主除周六官依漢魏之舊於是置三師太師太傅太保三公太尉司徒司空及尚書設令左右僕射無所不統門下置納言給事等官內史置監令等祕書領著作內侍皆宦官五省御史主彈劾都水主作造二臺太僕等十一寺太常光祿衛尉宗正太僕大理鴻臚司農太府國子將作左右衛等十二府皆軍府以分司統職又置上柱國至都督十一等勳官柱國大將軍開府儀同三司皆有上凡八等都督有大有帥凡三等以酬勤勞特進至朝散大夫特進左右光祿金紫銀青光祿及朝議朝散大夫七等散官以加文武之有德聲者改侍中為納言己丙改度支尚書為民部都官尚部書為刑部命左僕射判吏禮兵三右僕射判民刑工三部廢光祿衛尉鴻臚寺及都水臺隋修廟社尊考為武元皇帝廟號太祖妣吕氏為元明皇后社稷並列于含光門內之右隋立后獨孤氏后家世貴盛而能謙恭雅好讀書言事多與隋主意合甚寵憚之宫中稱為二聖隋主每臨朝后輒與方輦而進至閣乃止使宦官伺隋主政有所失隨事匡諫退朝同反燕寢有司奏稱周禮百官之妻命于皇后請依古制后曰婦人預政或從此為漸不可開其源也都督崔長仁后之中外兄弟也犯法當斬隋主以后故欲免之后曰國家之事焉可顧私長仁竟坐死隋主亦懲周氏之失不以權任假借外戚后兄弟不過將軍刺史隋立世子勇字睍地伐為太子諸子皆為王廣一名英第二子即焬帝為晉王俊字阿祇第三子為秦王秀第四子為越王諒字德章第五子為漢王隋廢周主闡為介公改封周太后楊氏為樂平公主初劉鄭矯詔以隋主政楊后雖不預謀然以嗣主幼冲恐權在他族聞之甚喜後知其父有異圖意頗不平形于言色及禪位愈憤惋隋主愧之改封樂平公主欲奪其志公主誓不許乃止隋主盡滅宇文氏之族虞慶則京兆櫟陽人勸隋主盡滅宇文氏高熲楊惠隋主族子後更名雄亦依違從之李德林固爭以為不可隋主作色曰君書生不足與議此於是周太祖以下子孫皆死而德林品位遂不進隋徴蘇威字無畏綽之子為太子少保威少有令名周宇文護彊以女妻之威見護專權恐禍及已屏居山寺以諷讀為娛周高祖聞其賢除車騎大將軍辭疾不拜隋主為丞相高熲薦之隋主召見與語大悅居月餘聞將受禪遁歸田里熲請追之隋主曰此不欲預吾事耳置之及受禪徴拜太子少保追封綽為邳公以威襲爵尋兼納言度支尚書初蘇綽在西魏以國用不足為征稅法顧重既而歎曰今所為者正如張弓非平世法也後之君子誰能弛之威聞其言每以為己任至是奏滅賦役務從輕簡隋主從之威嘗言于隋主曰臣先人每戒臣云唯讀孝經一卷足以立身治國何用多為隋主深然之夏四月隋放散樂禁雜戲五月隋主堅弒介公闡諡曰周靜帝秋九月隋鑄五銖初周齊所鑄錢凡四等齊天保初改置常平五銖重如其文後周保定初更鑄布泉之錢以一當五建德中更鑄五行大布錢以一當十大象初又鑄永通萬國錢以一當千及民間私錢多品甚衆鄴中有赤熟青熟細眉赤生之異河南有青薄鉊錫之别梁益雜用古錢河西諸郡或用西域金銀之錢輕重不等隋主患之更鑄五銖錢背面肉好皆有周郭每一千重四斤二兩悉禁古錢及私錢不如樣者沒官銷毁自是錢幣始一民間便之隋上柱國鄭譯有罪除名譯以上柱國歸第先是譯辭監軍隋主漸疏之敕官屬不得白事于譯譯懼遂求解職自以被疏陰呼道士醮章祈福婢告以為巫蠱譯又與母别居為憲司所劾除名隋主下詔曰譯若留之于世在人為不道之臣戮之于朝入地為不孝之鬼宜賜以孝經令其熟讀仍遣與母同居冬十月隋初行新律初周法比于齊律煩而不要隋主命髙熲鄭譯及楊素裴政字德表邃之孫等更加修定政練習典故達于從政乃采魏晉舊律下至齊梁沿革重輕取其折衷去梟轘鞭法非謀叛無族罪始制死刑二絞斬流刑三自二千里至三千里徒刑五自一年至三年杖刑五自六十至百笞刑五自十至五十又制議羣臣議請請于上減罪有可原減夲科贖以銅贖罪官當罰官品以當其罪之科以優士大夫除訊囚酷法考掠不得過二百枷杖大小咸有程式民有枉屈縣不為理者聽以次經郡州省若仍不為理聽詣闕伸訴自是法制遂定後隋主覽刑部奏獄數猶至萬以律尚嚴密敕蘇威及牛𢎞更定之刑綱簡要疏而不失仍置律博士弟子員牛𢎞字里仁安定鶉觚人夲姓尞文允仕魏賜姓牛氏隋以梁彥光字修芝安定烏氏人為相州刺史房恭懿字慎言䧄陽人為海州東魏置今𨽻江南刺史初彥光為岐州魏置今陜西鳯翔府是刺史岐俗質厚彥光以靜鎮之奏課連為天下最隋主下詔褒美賜粟帛徙相州刺史鄴自齊亡衣冠士人多遷入關唯工商樂戶移實州郭風俗儉詖好興謡訟彥光居部如岐州法因目彥光為著帽餳隋主聞之免彥光官彥光請復為之發擲姦伏有若神明豪猾潜竄關境大治于是招致名儒每鄉立學親臨策試褒勤黜怠風化大變無復訟者著帽餳餳軟而甘言其乘善也新豐令房恭懿政為三輔之最每朝謁隋主呼至榻前訪以治民之術謂諸州朝集使曰房恭懿志存體國愛養我民卿等宜師之因擢為海州刺史由是吏多稱職百姓富庶十二月突厥他鉢可汗死分立四可汗初他鉢可汗病且卒謂其子菴邏曰吾兄不立其子委位于我我死汝當避大邏便木杆之子及卒國人以大邏便母賤菴邏實貴竟立為嗣大邏便心不服菴邏每遣人詈辱之菴邏不能制因以國讓攝圗逸可汗之子國人共迎立之號沙鉢略可汗居都斤山在漠北菴邏降居獨洛水亦在漢北稱第二可汗沙鉢略以大邏便為阿波可汗還領所部又沙鉢略從父玷厥居西面號達頭可汗諸可汗各統部衆分居四面沙鉢略勇而得衆北方皆畏附之先是周與突厥和親以趙王招女為千金公主妻之及隋主立公主傷其宗祀覆沒日夜請為周復讐沙鉢略謂其臣曰我周之親也今隋公自立而不能制復何面目見可賀敦乎乃與髙寶寧合兵伐隋隋主崚長城命虞慶則鎮并州屯兵以備之壬陳太建十四年寅隋開皇二年春正月陳主頊殂始興王叔陵作亂伏誅太子叔寶立是為後主叔陵性苛刻狡險為揚州刺史與新安王伯固字􅀢之世祖第五子密圗不軌陳主不豫太子與叔陵及長沙王叔堅字子成陳主第四子並入侍疾陳主殂太子衰哭俯伏叔陵抽銼藥刀斫之中項悶絶于地栁后來救又斫之叔堅手扼叔陵奪其刀叔陵走出雲龍門馳車還東府召左右斷青溪道赦東城囚以充戰士散金帛賞賜又召諸王將帥莫有至者唯伯固單馬赴之叔堅白栁后以太子命召右衛將軍蕭摩訶入見受敕帥馬步數百趣東府屯城西門叔陵惶恐自知不濟欲奔隋臺軍邀斬之伯固亦為亂兵所殺太子即位諡陳主曰孝宣皇帝廟號髙宗葬顯寧陵隋以晉王廣為河北行臺尚書令蜀王秀先封越以為益州總管因徙封為西南行臺尚書令秦王俊為河南行臺尚書令隋主懲周氏孤弱而亡故使三子分涖方面盛選僚佐以王韶字子相太原晉陽人李雄字毗盧趙郡髙邑人李徹字廣達朔方巖緑人總晉王府軍事元巖為益州長史韶雄巖俱有骨鯾名徹前朝舊將故用之雄家世以學業自通雄獨習騎射其兄子旦讓之雄曰自古聖賢文武不備而能成其功業者鮮矣雄雖不敏事頗觀前志但不守章句耳至是隋主謂雄曰吾兒更未多卿才兼文武吾無北顧之憂矣陳遣使請和于隋先是隋僕射髙熲督諸軍侵陳及是陳髙宗殂嗣主新立遣使請和于隋髙熲奏禮不伐喪隋乃詔熲班師夏六月隋作新都于龍首山注見前隋主嫌長安城制度狹小蘇威因勸遷都隋主夜與威及髙熲共議明旦庾季才奏曰臣仰觀元象俯察圗記必有遷都之事且漢營此城將八百嵗水皆鹹鹵不甚宜人願陛下協天下之心為遷徙之計隋主愕然謂熲威曰是何神也乃詔熲等創新都于龍首山癸陳後主叔寶至德卯元年隋開皇三年春二月己巳朔日食陳以毛喜為永嘉內史陳主之即位也病創不能視事政皆决于長沙王叔堅已而創愈置酒自慶引江總以下展樂賦詩既醉而命毛喜召與言事也時山陵初畢喜見之不懌欲諌則陳主已醉乃升階陽為心疾什于階下移出省中陳主醒謂江總曰喜實無疾但欲非我所為耳欲殺之不果為永嘉內史三月隋遷于新都隋新都成命曰大興城徙都之今西安府隋大興城也唐曰京城唐書地理志京城前直子午谷後枕龍首山左臨灞岸右扺澧水隋減調役弛酒鹽禁初令民二十一成丁減役者嵗為二十日調絹為二丈周末𣙜酒坊鹽池鹽井至是皆罷之隋詔求遺書祕書監牛𢎞上表曰典籍屢經喪亂卒多散逸周氏聚書僅盈萬卷平齊所得裁益五千興集之期屬膺聖世為國之本莫此為先隋主從之詔獻書一卷賚縑一匹夏四月隋遣元帥衛王爽字師仁隋主之弟伐突厥大破之突厥數為隋寇先是髙寶寧引突厥寇隋平州突厥悉發控弦之士四十萬入長城尋入蘭州隋行軍總管達奚長孺與之遇且戰且行轉鬪三晝夜凡十四戰五兵咸盡士卒以拳毆之手皆骨見殺傷萬計虜乃解去已而突厥又寇武威等七郡達奚長孺字富仁代人至是隋主下詔曰往者周齊抗衡俱通突厥以虜輕重為國安危朕以為厚斂兆庶多惠豺狼未嘗感恩資而為賊節之以禮不為虛費省徭薄賦國用有餘因入賊之物加賜將士息道路之民務為耕織清邉制勝成䇿在心諸將今行義兼含育有降者納有違者死于是命衛王爽等為行軍元帥分八道出塞擊之爽督總管李充隴西成紀人唐書宰相世系表作充節等出朔州道與沙鉢略可汗遇于白道胡三省注朔州長城北有白道嶺充言于爽曰突厥狃于驟勝必輕我而無備以精兵襲之可破也諸將多以為疑唯長史李徹贊成之遂與充帥精騎五千掩擊突厥大破之沙鉢略棄所服金甲而遁其軍無食粉骨為糧加以疾役死者甚衆幽州總管陰夀字羅雲武威人出盧龍塞注見前擊髙寶寧突厥不能救寶寧為其下所殺和龍悉平秋八月丁卯朔日食冬十一月隋罷郡為州兵部尚書楊尚希華隂人曰今或地無百里而數縣並置或户不滿千而二郡分領僚吏既衆資費日繁民少官多十羊九牧宜存要去間併小為大國家則不虧粟帛選舉則易得賢良蘇威亦以為請隋主從之罷郡為州隋沿河置倉運粟以給長安隋主以長安倉廪尚虛詔西自蒲陜蒲州注見前陜州後周置今𨽻河南東至衛汴衛州後周置今衛輝府是汴州後周改齊梁州置今開封府是水次十三州募丁運米又于衛州置黎陽倉陜州置常平倉華州西魏置今屬同州府置廣通倉轉相灌輸漕關東及汾晉之粟以給長安隋杞州隋置尋廢今開封府把縣是刺史和千子免時刺史多任武將類不稱職治書侍御史栁彧字幼文仲禮之子上表曰昔漢光武與二十八將披荆棘而定天下及功成之後無所任職伏見詔書以和千子為把州刺史千子前任趙州百姓歌之曰老禾不早殺餘種穢良田千子弓馬武用是其所長治民涖衆非其所解若令刺舉所損殊大隋主善之千子竟免彧見隋主勤于聽受百僚奏請多有煩碎上疏諌曰自古聖帝莫過唐虞然皆勞于求賢逸于任使陛下留心治道無憚疲勞乃至營造細小之事出給輕微之物一日之內酬答百司日旰忘食夜分未寢動以文簿憂勞聖躬願察臣言少減煩務唯經國大事非臣下所能裁斷者奏請詳决自餘細務責成所司隋主嘉之曰栁彧直士國之寶也甲陳至德二年辰隋開皇四年春正月甲子朔日食隋頒甲子元厯前華州刺史張賔儀同三司劉暉所造詔頒行之二月突厥達頭可汗請降于隋初周遣長孫晟字季晟覽從子送千金公主于突厥突厥留之竟嵗晟因悉知其山川形勢部衆彊弱及還上書隋主請密運籌䇿以離諸部晟以為玷厥之于攝圖兵彊而位下外名相屬內隙巳彰攝圖之弟處羅侯姦多勢弱曲取衆心阿波首鼠介在其間唯彊是與未有定心今宜逺交而近攻離彊而合弱通使玷厥說合阿波又引處羅遣連奚霫俾攝圖首尾猜嫌腹心離阻因而乘釁討之可一舉而空其國矣即玷厥即達頭攝圗即沙鉢略處羅侯號突利設奚庫莫奚東胡别種霫先立反奚之别種隋主省書大悅皆納用焉遣太僕元暉詣達頭賜以狼頭纛達頭使至引居沙鉢略使上又使晟齎幣賜奚霫契丹至處羅侯所誘之內附元暉字叔平洛陽人契丹注見前由是諸部果相猜二晟復縱行反間逹頭阿波與沙鉢略遂連兵不已阿波與凉州總管竇榮定相拒屢敗晟時為偏將遣使謂曰攝圗阿波兵勢不敵今攝圖日勝而阿波不利攝圖行滅北牙矣何不與隋連和依附天子連結達頭相合為彊此萬全計也阿波然之遣使隋晟入朝沙鉢略聞之遂襲破北牙阿波還無所歸西奔達頭達頭大怒遣阿波帥兵而東與沙鉢略相攻屢破之復得故地兵勢日彊沙鉢略部衆多叛歸之竇榮定熾從子至是達頭請降于隋夏六月隋作廣通渠即漢漕渠故道隋後開之今煙隋主以渭水多沙深淺不常漕者苦之詔宇文愷字安樂欣之弟鑿渠引渭自大興城東至潼關三百餘里名廣通渠漕運通利關內賴之秋九月隋詔公私文翰並宜實録隋主不善辭華故有是詔治書侍御史李諤上書曰魏之三祖崇尚文詞遂成風俗江左齊梁其弊彌甚競一韻之竒爭一字之巧連篇纍牘不出月露之形積案盈箱唯是風雲之狀世俗以之相髙朝廷以之擢士故其文日繁其政日亂良由棄大聖之軌模搆無用以為用也今朝廷雖有是詔而州縣仍踵弊風躬仁孝之行者不加收齒工輕薄之藝者舉送天朝請加采察送臺推劾又言士大夫矜伐干進無復廉恥乞明加罪黜以懲風軌詔以其奏頒示四方李諤字士恢趙郡人魏三祖謂曹魏太祖髙祖烈祖隋與突厥和親突厥沙鉢略可汗數為隋敗乃請和親千金公主自請改姓楊氏為隋主女隋更封以為大義公主沙鉢略遣使致書自稱從天生大突厥天下賢聖天子沙鉢略可汗隋主復書曰大隋天子貽書大突厥沙鉢略可汗得書知大有善意既為沙鉢略婦翁今日視沙鉢略與兒子不異時遣大臣往彼省女復省沙鉢略也于是遣僕射虞慶則往使將軍長孫晟副之沙鉢略陳兵坐見慶則稱疾不能起長孫晟曰突厥與隋俱大國天子但可汗是大隋女壻奈何敬不婦翁沙鉢略笑乃起拜頓顙跪受璽書以戴于首既而大慙與群下聚哭慶則要以稱臣沙鉢略謂左右曰何謂臣左右曰隋言臣猶此云奴耳沙鉢略曰得為大隋天子奴虞僕射之力也贈馬千匹以從妹妻之冬十一月隋遣使如陳隋主遣薛道衡字元卿汾陰人聰之孫等如陳戒之曰當識朕意勿以言辭相折陳起臨春結綺望仙閣舊址在今江寧府故臺城中陳主起三閣各髙數十丈連延數十間皆以沉檀為之金玉珠翠為飾珠簾寶帳服玩瑰麗近古未有其下積石為山引水為池雜植花卉陳主自居臨春張貴妃居結綺龔孔二貴嬪居望仙復道往來以宫人袁大捨等為女學士僕射江總雖為宰輔不親攻務日與都官尚書孔範字法言會稽山陰人等文士十餘人侍宴後庭謂之狎客使諸妃嬪及女學士與狎客共賦詩采其尤艷麗者被以新聲其曲有玉樹後庭花臨春樂等大略皆美諸妃嬪之容色君臣酣歌自夕達旦以此為常張貴妃名麗華本兵家女性敏慧有神彩善侯人主顔色陳主怠于政事百司啓奏並因宦者以進陳主置妃膝上共决之由是宦官近習內外連結賣官鬻獄貨賂公行大臣有不從者因而譛之于是大臣皆從風諂附孔範與孔貴嬪結為兄妹陳主惡聞過失每有惡事範必曲為文飾稱揚贊美由是寵遇優渥言聽計從羣臣有諌者輒以罪斥之中書舍人施文慶嘗事陳主于東宫大被親幸薦所善沈客卿陽惠朗徐哲暨慧景等有吏能陳主皆櫂用之督責苛碎聚斂無厭關市之稅嵗入數十倍士民嗟怨陳主大悅孔範自謂文武才能舉朝莫及白陳主曰諸將起自行伍匹失敵耳自是將帥微有過即奪其兵分配文吏由是文武解體以至覆滅乙陳至德三年已隋開皇五年春正月戊午朔日食隋頒五禮禮部尚書牛𢎞所修也夏五月隋初置義倉工部通鑑作度支隋書食貨志作工部考開皇元年已改度支為民部通鑑疑有誤今從隋志尚書長孫平字處均儉之子奏令民間每秋家出粟麥一石以下貧富為差儲之當社百家有里里有社委社司檢校以備凶年名曰義倉隋主從之梁主巋殂太子琮字溫文立巋孝慈儉約境內安之諡孝明皇帝廟號世宗秋八月突厥沙鉢略可汗遣子入朝于隋突厥阿波可汗寢彊諸胡皆附號西突厥沙鉢略既與阿波有隙又為達頭所困復畏契丹遣使告急于隋請將部落度漠南隋主命晉王廣以兵援之給以衣服賜之車服鼓吹沙鉢略因擊西突厥破之乃立約以磧為界因上表曰天無二日土無二王大隋皇帝真皇帝也豈敢阻兵恃險偷竊名號今屈膝稽顙求為藩附遣其子庫合真入朝自是嵗時貢獻不絶陳主殺其中書通事舍人傳縡字宜事北地靈州人縡先事陳主于東宫負才使氣人多怨之及是施文慶沈客卿共譛縡受髙麗使金陳主收縡下獄縡于獄中上書略曰夫君人者恭事上帝子愛下民省嗜欲逺諂侫未明求衣日旰忘食是以澤被區宇慶流子孫陛下頃來酒色過度不䖍郊廟小人在側宦豎㺯權惡忠直如仇讐視生民如草芥後宫曵綺繡廄馬餘菽粟百姓流離僵尸蔽野貨賄公行帑藏損耗神怒民怨衆叛親離臣恐東南王氣自斯而盡矣陳主每當郊祀常稱疾不行故縡言及之書奏陳主大怒頃之意稍解遣使謂曰我欲赦卿卿能改過否對曰臣心如面面可改則心可改矣陳主益怒遂賜死吳興章華好學能文以無閥閲除大市令鬱鬱不得志上書極諌略曰陛下即三位于今五年溺于嬖寵惑于酒色祠七廟而不出拜妃而臨軒老臣宿將棄之草莽諂佞讒邪升之廟廷今疆場日戲隋軍壓境陛下如不改弦易張臣見麋鹿復遊于姑蘇矣陳主大怒斬之章華字仲宗隋築長城隋主發丁三萬于朔方靈武今寧夏府靈州周置普樂郡隋初廢後復為郡曰靈武築長城東距河西至綏州西魏置今峽西綏德州是綿厯七百里明年又發丁十五萬于朔方以東緣邉築數十城以遏胡寇丙陳至德四年隋開皇六午年梁後主琮廣運元年春正月黨項羌西羌别種其國在禹貢析支之地請降于隋秋閏八月隋殺其上柱國梁士彥宇文欣劉昉初士彥討尉遲迥破之代為相州刺史欣與隋主少相厚善用兵有威名隋主皆忌之以譴去官昉亦被疏逺俱懷怨望欣欲使士彥于蒲州起兵已為內應士彥之甥裴通預其謀而告之隋主隱其事以士彥為晉州刺史欲觀其意士彥欣然謂昉等曰天也隋主因其朝謁執而詰之遂皆伏誅隋主素服臨射殿命百官射三家資物以為戒冬十月吐谷渾太子訶請降于隋隋主弗納吐谷渾可汗夸吕在位百年屢因喜怒廢殺太子後太子懼謀執夸吕而降請兵於隋邊吏請以兵應之隋主不許太子謀泄被殺復立其少子嵬王訶訶復懼誅謀帥部降隋遣使請兵隋主曰渾賊風俗特異人倫父既不慈子復不孝朕以德訓人何以成其惡逆乎乃謂使者曰父有過失子當諫諍豈可潛謀非法受不孝之名溥天之下皆朕臣妾各為善事即稱朕心嵬王既欲歸朕朕惟教嵬王為臣子之法不可逺遣兵馬助為惡事嵬王訶乃止丁陳禎明元年隋開皇七年未是嵗後梁亡凡二國春二月隋開揚州山陽瀆即邗溝注見前突厥沙鉢略可汗死弟莫何可汗處羅侯立沙鉢略死遣令立其弟葉護突厥官名處羅侯處羅侯與沙鉢略之子雍虞閭相讓者五六遂立是為莫何可汗以雍虞閭為棄護莫何勇而有謀以隋所賜旗鼓西擊阿波阿波之衆以為隋兵助之多望風降附遂生擒阿波上書請其死生之命隋主以問長孫晟晟對曰阿波之惡非負國家因其困窮取而為戮恐非招逺之道不如兩存之髙熲亦言宜存養以示寬大隋主從之明年莫何死兄子頡伽施多那都藍可汗立夏五月乙巳朔日食秋九月隋滅梁以其主蕭琮為莒公後梁自中宗察至琮亡凡三主合三十三年隋徴梁主入朝梁主發江陵隋主遣武鄉公崔𢎞度字摩訶衍博陵人辨曽孫將兵戍之梁主叔父巖字義逺中宗子弟瓛字欽文世宗子等恐𢎞度襲之遣使請降于陳九月陳荆州刺史陳慧紀字元方髙祖從孫引兵至江陵巖等驅文武男女一萬口奔陳隋主聞之廢梁國遣髙熲安集遺民拜梁主琮柱國賜爵莒公冬十一月陳臨平湖注見前開時江南妖異特衆臨平湖草久塞忽然自開陳主惡之乃自賣于佛寺為奴以厭之初陳髙祖殂隋主遣使赴弔書稱姓名頓首陳主答之益驕隋主不悅已而問取陳之策于髙熲對曰江北田收差晚江南水田早熟量彼收穫之際微徴士馬聲言掩襲彼必屯兵守禦廢其農時彼既聚兵我便解甲再三如此彼以為常後更集兵彼必不信猶豫之頃我乃濟師江南土薄舍多茅竹儲積皆非地窖當密遣人因風縱火待彼修立復更燒之不出數年才力俱盡矣隋主用其萊陳人始困及陳受蕭巖等降隋主益忿謂髙熲曰我為民父母豈可限一衣帶水不拯之乎命大作戰船人請密之隋主曰吾將顯行天誅何密之有使投其柿于江曰若彼懼而能改吾復何求戊陳禎明二年申隋開皇八年春三月隋下詔伐陳詔曰陳叔寶據手掌之地恣溪壑之欲劫奪閭閻驅迫內外窮奢極侈俾晝作夜斬直言之客滅無罪之家欺天造惡祭鬼求恩君子潛逃小人得志天災地孽物怪人妖每關聼覽有懷傷惻可出師授律應機誅殄在斯一舉永清吳越又送璽書暴陳主二十惡寫詔三十萬紙遍諭江外冬十月隋以晉王廣為淮南行省尚書令行軍元帥帥師伐陳隋置淮南行省于夀春以晉王廣為尚書令遂有事于太廟命廣及秦王俊清河公楊素皆為行軍元帥廣出六合後周郡隋改縣今屬江寧府俊出襄陽素出永安廬州總管韓擒虎字子通東垣人雄之子出廬州吳州總管賀若弼出廣陵凡總管九十兵五十一萬八千皆受晉王節度旌旗舟揖橫亘數千里以髙熲為元帥長史王韶為司馬軍事皆取决焉熲問郎中薛道衡曰江東可克乎道衡曰克之郭璞言江東分王三百年復與中國合今此數將周一也主上恭儉勤勞叔寶荒淫驕侈二也國之安危在所守任彼以江總為相唯事詩酒蕭摩訶任蠻奴為大將皆一夫之用三也我有道而大彼無德而小量其甲士不過十萬西自巫峽東至滄海分之則勢懸而力弱聚之則守此而失彼四也席卷之勢事在不疑也秦王俊督諸軍屯漢口為上流節度陳以周羅㬋督諸軍拒之楊素引舟師下三峽軍至流頭灘在今宜昌府東湖縣北銜枚夜發擊破陳將軍戚昕悉俘其衆遂帥水軍東下舟艫被江旌甲曜日陳之鎮戍相繼以聞施文慶沈客卿並抑而不言陳江中無一鬭船上流兵皆阻楊素軍不得至護軍將軍樊毅言于僕射袁憲字德章君正之子曰京口采石俱是要地各須鋭兵五千并出金翅舟名二百緣江上下為防備憲及驃騎將軍蕭摩訶皆以為然文慶客卿白陳主曰此是常事邊城將帥足以當之若出人船必恐驚擾及隋軍臨江間諜驟至憲等奏請再三文慶曰元㑹將逼南郊復邇今若出兵事便廢闕由是議久不决陳主從容謂侍臣曰王氣在此齊兵三來周師再來無不摧敗彼何為者邪孔範曰長江天塹限隔南北今日虜軍豈能飛渡邪陳主以為然故不為深備奏伎縱酒賦詩不輟御批厯代通鑑輯覽卷四十六

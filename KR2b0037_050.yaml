front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷五十一唐太宗文武皇帝丁酉貞觀十一年春正月以吳王恪帝次子等為諸州都督
  hash: sha256:95221b696c59fbc526354509f8de0e261f6fab1114a1f053b75989c8c8dbc5a0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_050-1a, image: WYG0337/WYG0337-0034a.png}
body:
  text: 諸王將之官土賜書戒敕且曰吾欲遺汝珍玩恐益驕奢不如得此一言耳恪督安州數出畋獵頗損居人侍御史栁範彈奏恪坐免官後褚遂良言皇子興州者多幼稚未知從政不若留京師教以經術俟其長而遣之上以為然安州注見前栁範解人褚遂良字登善亮之子制釋奠以孔子為先聖舊制釋奠於太學以周公為先聖孔子配饗至是房元齡等建議以孔子為先聖顔回配饗詔從之定律令房元齡等先受詔定律令凡定律五百條立刑名二十等比隋律減大辟九十二條減流入徒者七十一條削煩去蠧變重為輕者不可勝紀又定令一千五百九十餘條刪武德以來敕格定留七百條至是頒行之自張藴古之死法官以出罪為戒時有失入者又不加罪上嘗問大理卿劉德威曰近日刑網稍密何也對曰此在主上不在羣臣律文失入減三等失出減五等今乃失入無辜失出獲罪是以史各自免競就深文陛下倘一斷以律則此風立變矣上悅從之由是斷獄平允劉德威徐州彭城人二月豫為山陵終制上以漢世豫作山陵免子孫倉卒勞費又志在儉葬恐子孫從俗奢靡自為終制因山為陵容棺而已幸洛陽宫上至顯仁宫隋書地理志夀安有顯仁宫壽安故城在今河南府宜陽縣官吏以闕儲偫被譴魏徵諫曰陛下以儲偫譴官吏臣恐乘風相扇異日民不聊生殆非行幸之本意也昔煬帝諷郡縣獻食視其豐儉以為賞罰故海內叛之此陛下所親見奈何欲效之乎上驚曰非公不聞此言因謂長孫無忌等曰朕昔過此買飯而食僦舍而宿今供頓如此豈得猶嫌不足乎至洛陽宫西苑泛積翠池顧謂侍臣曰煬帝作此宫苑結怨於民今悉為我有正由宇文述虞世基之徒內為諂諛外蔽聰眀故也可不戒哉三月丙戌朔日食詔行新禮房元齡魏徵所定凡百三十八篇以王圭為魏王泰師上謂泰曰汝事圭當如事我泰見圭輒先拜圭亦以師道自居圭子敬直尚南平公主先是公主下嫁皆不以婦禮事舅姑圭曰主上欽明動循禮法吾受公主謁見豈為身榮所以成國家之美耳乃與其妻就席坐令公主執笲行盥饋之禮是後公主始行婦禮手笲音煩竹器以盛棗栗腏修盥饋沃而進食於舅姑其禮如是夏六月以荆王元景帝之弟長孫無忌等為諸州刺史子孫世襲秋七月穀洛溢詔百官極言過失大雨穀洛溢入洛陽宫壞官寺民居溺死者六千餘人詔水所毁宫少加修繕才令可居廢明德宫元圃院以其材給遭水者令百官上封事極言過失侍御史馬周上疏以為三代及漢歷年多者八百少者不減四百良以恩結人心人不能忘故也自是以降多者六十年少者才二十餘年皆無恩於人本根不固故也今之户口不及隋之仆一而給役者兄去弟還道路相繼營繕不休器服華侈陛下少居民間知民疾苦尚復如此况皇太子生長深宫不更外事萬嵗之後固聖慮所當憂也臣觀自古百姓愁怨國未有不亡者人主當修之於可修之時不可悔之於既失之後貞觀之初天下飢歉斗米直匹絹而百姓不怨者知陛下憂念不忘故也今比年豐穰匹絹得粟十餘斛而百姓怨咨者知陛下不復念之多營不急之務故也自古以來國之興亡不以蓄積多少在於百姓苦樂且以近事驗之隋貯洛口倉而李密因之東都積布帛而世充資之西京府庫亦為國家之用至今未盡夫蓄積固不可無要當人有餘力然後收之不可強斂以資敵寇也夫儉以息人貞觀之初陛下所親行也豈今日而難之乎欲為長久之計但如貞觀之初則天下幸甚又陛下寵遇諸王過厚亦不可不深思也魏武帝愛陳思王及文帝即位遂遭囚禁然則武帝愛之適所以苦之也又百姓所以治安惟在刺史縣令今重內官而輕州縣刺史多用武臣或京官不稱職始補外任邊逺之處用人更輕所以百姓未安殆由於此疏奏上稱善久之謂侍臣曰刺史朕當自選縣令宜詔京官五品以上各舉一人朕魏徵上疏曰人主善始者多克終者寡豈取之易而守之難乎蓋以殷憂則竭誠以盡下安逸則驕恣而輕物盡下則胡越同心輕物則六親離德雖震之以威怒亦皆貌從而心不服故也人主誠能見可欲則思知足將興繕則思知止處髙危則思謙降臨滿盈則思抑損遇逸樂則思撙節在晏安則思後患防壅蔽則思延納疾讒邪則思正已行爵賞則思因喜而僭施刑罰則思因怒而濫兼是十思而選賢任能則可以無為而治矣於又曰陛下欲善之志不及於昔時聞過必改少虧曩日譴罰積多威怒微厲乃知貴不期驕富不期侈非虛言也在昔隋之未亂也自謂必無亂其未亡也自謂必無亡故賦役無窮征伐不息以致禍將及身而尚未之寤也夫鑒形莫如止水鑒敗莫如亡國伏願取鑒於隋去奢從約親忠逺佞以今之無事行昔之恭儉則盡善盡美矣夫取之實難守之甚易陛下能得其所難豈不能保其所易乎又曰今立政致治必委之君子事有得失或訪之小人其待君子也敬而疏遇小人也輕而狎狎則言無不盡疏則情不上通夫中智之人豈無小慧然才非經國慮不及逺雖竭力盡誠猶未免有敗况內懷姦宄其禍豈不深乎夫雖君子不能無小過茍不害於正道斯可略矣陛下誠能慎選君子以禮信用之何憂不治不然危亡之期未可保也上賜手詔褒美曰得公之諫朕知過矣當置之几案以比弦韋冬十月以武氏為才人劉友益曰書此謹亂始也故荆州都督武士彠女年十四上聞其美召入後宫戊戌十二年春正月頒氏族志上命吏部尚書高士亷等遍貴天下譜諜質諸史籍考其真偽分為九等先是山東人士崔盧李鄭諸族自矜地望凡為婚姻必多貴財帛或捨其鄉里而妄稱名族或兄弟齊列而更以妻族相陵上惡之故命士亷等考定甲乙士亷等以黃門侍郎崔民幹為第一上曰漢髙祖與蕭曹樊灌皆起布衣至今推仰以為英賢豈在世祿乎髙氏偏據山東梁陳辟在江南雖有人物蓋何足言况其子孫衰替而猶卬然以門第自負販鬻松檟無復亷耻不知世人何為貴之今三品以上皆以德行勳勞文學致位貴顯彼衰世舊門何足慕哉今欲釐正訛謬捨名取實而卿曹猶以民幹為第一是輕我官爵而徇流俗之情也乃更命刋定専以今朝品秩為髙下皇族為首外戚次之崔盧李鄭諸族又次之凡二百九十三姓千六百五十一家頒於天下二月帝發洛陽觀砥柱祠禹廟遂至蒲州蒲州刺史趙元楷飾樓觀盛儲偫上怒曰此乃亡隋之弊俗也贈隋堯君素為蒲州刺史君素守河東事具前詔曰隋故鷹擊郎將堯君素雖桀犬吠堯有乖倒戈之志而疾風徑草實表歲寒之心可贈蒲州刺史閏月庚辰朔日食帝還宫三月宴五品以上於東宫時以皇孫生故宴於東宫上曰貞觀之前從朕經營天下元齡之功也貞觀以來繩愆紏謬魏徵之功也皆賜之佩刀上謂徵曰朕政事何如往年對曰威德所加比往年則逺矣人心恱服則不逮也上曰何也對曰陛下往以未治為憂故日新今以既治為安故不逮上曰今日所為亦何以異於往年邪對曰陛下初年恐人不諫常導之使言中間恱而從之今則勉強從之而猶有難色也上曰其事可得聞歟對曰陛下昔欲殺元律師孫伏伽以為法不當死陛下賜以蘭陵公主園直百萬或云太厚陛下云朕即位以來未有諫者故賞之此導之使言也司户柳雄妄訴隋資陛下欲誺之納戴胄之諫而止是恱而從之也近皇甫德參上書諫修洛陽宫陛下恚之雖以臣言而罷勉從之也上曰非公不能及此人苦不自知耳夏五月永興公虞世南卒諡文懿世南外和柔而內忠直上嘗稱世南有五絶一德行二忠直三博學四文辭五書翰世南嘗獻聖德論上賜詔曰卿論朕太髙朕何敢當然卿適覩其始未覩其終若朕能慎終如始則此論可傳不然恐徒使後世笑卿也冬十一月置屯營飛騎初置左右屯營飛騎於元武門以諸將軍領之又簡飛騎才力驍健善騎射者號百騎以從遊幸十二月以馬周為中書舍人周有機辨岑文本常稱馬君論事援引事類揚榷古今舉要刪煩會文切理一字不可增減聽之靡靡令人忘倦以霍王元軌帝之弟為徐州刺史元軌好讀書恭謹自守舉措不妄與處士劉元平為布衣交人問元平王所長元平曰無長問者怪之元平曰人有所短乃見所長至於霍王無所短何以稱其長哉西突厥乙毗咄陸可汗立初西突厥嘻利失可汗前咄陸可汗之弟先是統葉護諸父莫賀咄殺統葉護而自立為屈利俟毗可汗國人不附立統葉護之子嘻力特勒為乙毗鉢羅肆葉護可汗已而俟毗為莫賀設之子泥孰所殺肆葉護為國人所攻走死泥孰立為咄陸可汗咄陸死弟同娥設立為沙鉢羅嘻利失可汗分其國為十部每部酋長各賜一箭謂之十箭又分左右廂左廂號五咄陸置五大啜右廂號五弩失畢置五大俟斤通謂之十姓至是嘻利失失衆心為其臣統吐屯所逐走焉耆尋復得其故地西部遂立欲谷設為乙毗咄陸可汗先是統吐屯將立欲谷設為可汗會統吐屯為人所殺欲谷設兵亦敗不果立已而西部竟立之中分其地以伊列水亦曰伊麗水即今伊犁河在伊犁地為界水以西屬乙毗咄陸以東屬嘻利失已而嘻利失之臣俟利發與乙毗咄陸通謀為亂嘻利失窮蹙死其弟子沙鉢羅葉護可汗立謂之南庭乙毗咄陸為北庭己亥十三年春正月加房元齡太子少師元齡為太子少師太子欲拜之元齡不敢謁見而歸時人美其有讓先是中書侍郎岑文本以穀洛水溢上書略言開撥亂之業其功既難守已成之基其道不易故居安思危所以定其業也有始有卒所以崇其基也上深嘉之及是上問侍臣創業與守成孰難元齡曰草昧之初與羣雄並起角力而後臣之創業難矣魏徵曰自古帝王莫不得之於艱難失之於安逸守成難矣上曰元齡與吾共取天下出百死得一生故知創業之難徵與吾共安天下常恐驕奢生於富貴禍亂生於所忽故知守成之難然創業之難既已往矣守成之難方當與諸公慎之元齡等拜曰陛下之言及此四海之福也永寧公王圭卒諡曰懿圭性寬裕自奉養甚薄於令三品以上當立家廟圭祭於寢為法司所劾上不問命有司為之立廟以愧之二月以尉遲敬德為鄜州元魏置今隸陜西都督上嘗謂敬德曰人或言卿反何也對曰臣從陛下征伐四方身經百戰今之存者皆鋒鏑之餘也天下已定乃更疑臣反乎因解衣投地出其瘢痍上流涕而撫之上又嘗謂敬德曰朕欲以女妻卿何如敬德謝曰臣妻雖陋相與共貧賤久矣臣雖不學聞古人富不易妻此非臣所願也乃止詔內職有闕選良家有才行者充尚書奏近世掖庭之選或微賤之族禮訓蔑聞或刑戮之家憂怨所積請自今後宫及東宫內職有闕皆選良家有才行者以禮聘其沒官口賤人不得補用上從之詔停襲封刺史上既詔宗室功臣襲封刺史于志寧以為古今事殊恐非久安之道上疏爭之馬周亦言堯舜之父猶有朱均之子倘有孩童嗣職萬一驕愚兆庶被殃國家受敗正欲絶之也則子文之治猶在楚莊王事詳具前正欲留之也則欒黶之惡已彰晉士鞅語亦見前與其毒害於見存之百姓寧使割恩於己亡之一臣矣然則向所謂愛之者適所以傷之也會長孫無忌等皆不願之國上表固讓乃詔停之夏五月旱詔五品以上言事魏徵上疏言陛下志業比貞觀之初漸不克終者有十謹用條陳裨萬分一初清淨寡欲化及荒外今萬里遣使訪求怪珍一漸也初護民如子不輕營為今寖奢肆輕用民力二漸也初役已以利物今縱欲以勞人雖憂人之言不絶於口而樂身之事實切於心三漸也初親君子逺小人今重君子也恭而逺之輕小人也狎而近之近之莫見其非逺之莫見其是四漸也初不貴異物不作無益今難得之貨雜然並進玩好之物無時而息五漸也初求士如渴今由心好惡讒佞得行守道疏間六漸也初高居深拱無田獵畢弋之好今晨出夕返馳騁為樂七漸也初遇下有禮羣情上達今詰責細過忠款不申八漸也初孜孜治道常若不足今長傲縱欲無事興兵九漸也初頻年霜旱撫寧户口死不擕二今徭役勞弊百姓之心恐不能如前帖泰十漸也疏奏上深奬嘆報云已列諸屏障朝夕瞻仰仍録付史官秋七月立李思摩頡利族人為突厥可汗先是突厥結社率突利之弟作亂伏誅結社率入朝為中郎將久不進秩會上幸九成宫結社率隂結種人夜犯御營折衝孫武開帥衆擊斬之於是言事者多云突厥留河南不便上乃賜懷化郡王阿史那思摩姓李氏立以為泥孰俟利苾可汗賜之鼓纛使帥其種落還舊部突厥咸憚薛延陀不肯出塞上賜薛延陀璽書諭令各守土疆無或踰分薛延陀奉詔於是遣思摩帥所部建牙於河北命趙郡王孝恭等齎册書立之上謂侍臣曰中國根幹也四夷枝葉也割根幹以奉枝葉木安得滋榮朕不用魏徵言幾致狼狽八月辛未朔日食冬十一月以楊師道字景猷隋觀王雄子為中書令劉洎為黃門侍郎參知政事劉友益曰參知政事之名始此十二月以侯君集為交河大總管將兵擊髙昌初高昌王麴文泰多遏絶西域朝貢及拘留中國人詔令入朝又不至與西突厥共擊破焉耆焉耆訴之上遣使問狀文泰曰鷹飛於天雉伏于蒿貓遊于堂鼠噍于穴各得其所豈不能自生邪上怒欲發兵擊之薛延陀可汗遣使請為鄉導上猶冀文泰悔過復下璽書以示禍福徵之入朝文泰竟稱疾不至至是乃遣君集及薛萬均將兵擊之太史令傅奕卒初上嘗謂奕曰佛教元妙可師卿何獨不悟其理對曰佛書乃中國邪僻之人竊取莊老元談飾以妖幻之語用欺愚俗無益於民有害於國臣非不悟鄙不學也上頗然之及是年八十五卒臨終戒其子無得學佛書又集魏晉以來駁佛教者為高識傳行於世奕精究術數之書而終不之信有僧自西域來能咒人使立死復咒即生上試之驗以告奕奕曰此邪術也臣聞邪不干正請使咒臣必不能行上命僧咒奕奕初無所覺須臾僧忽僵仆遂不復蘇又有婆羅門僧言得佛齒所擊輒碎長安士女輻輳如市奕謂子曰吾聞有金剛石者性至堅物莫能傷惟羚羊角能破之汝往試焉其子如言叩之應手而碎觀者乃止庚子十四年春二月詣國子監上幸國子監觀釋奠命祭酒孔頴達講孝經賜諸生帛有差是時上大徵天下名儒為學官數幸國子監使之講論學生能眀一大經以上皆得補官增築學舍千二百間增學生滿三千二百六十員自屯營飛騎亦給博士使授以經有能通經者聽得貢舉於是四方學者雲集京師乃至高麗百濟新羅高昌吐蕃諸酋長亦遣子弟請入國學升講筵者至八千餘人上以師説多門章句繁雜命頴達與諸儒定五經疏謂之正義令學者習之大經唐取士以禮記春秋左氏傳為大經詩儀禮周禮為中經易尚書公羊穀梁為小經百濟國名馬韓之屬其先以百家濟故號焉今為朝鮮國全羅道新羅注見前三月流鬼國杜佑曰在北海之北入貢流鬼去京師萬五千里重三譯而至上以其使者余孫愐曰視遮反姓也志為騎都尉夏五月侯君集滅髙昌以其地為西州唐西州交河郡治前庭即漢車師前王庭也注已見前高昌王文泰聞唐兵起謂其國人曰唐去我七千里而沙磧即瀚海也居二千里地無水草寒風如刀熱風如燒安能致大軍乎及聞唐兵臨磧石憂懼發疾卒子智盛立刻日將葬諸將請襲之侯君集曰天子以髙昌無禮故使吾討之今襲人於墟墓之間非問罪之師也於是鼓行而進詰朝攻之及午而克智盛出降高昌麴氏自嘉至智盛凡五世百三十四年而滅君集分兵略地下其二十二城户八千四十六上欲以高昌為州縣魏徵諫曰文泰有罪故王誅加之今罪人已死其子又服宜撫其百姓存其社稷復立其子則威德被於遐荒四夷皆悅服矣若以為州縣當復遣兵鎮守勞費不資死亡相繼而陛下終不得髙昌撮粟尺帛以佐中國所謂散有用以事無用也上不從以其地為西州置安西都護府於是唐地東極於海西至焉耆南盡林邑北抵大漠皆為州縣凡東西九千五百一十里南北一萬九百一十八里君集之破高昌也私其珍寶將士競為竊盜為有司所劾詔下君集等獄岑文本上疏曰命將出征茍能克敵雖貪可賞若其敗績雖亷可誅漢之李廣利隋之韓擒虎皆負罪譴卒受封賞今君集等雖自詿羅網願録其微勞忘其大過則法雖屈而德彌顯矣上乃釋之以劉仁軌字正則汴州尉氏人為櫟陽丞初陳倉折衝都尉魯寧坐事繫獄自恃高班慢罵陳倉尉劉仁軌仁軌杖殺之州司以聞上怒追至長安將面詰而斬之仁軌曰魯寧對臣百姓辱臣如此臣實忿而殺之辭色自若魏徵侍側曰隋末百姓強而陵官吏多如魯寧之比隋以是亡上乃擢仁軌為櫟陽丞上將幸司州校獵仁軌上言大稔未穫使農民供獵事治道葺橋動費一二萬工願少停旬日則公私俱濟矣上賜繭書嘉納遷新安令冬十一月詔李淳風考定戊寅厯時戊寅厯以癸亥為十一月朔李淳風表稱古厯分日起於子半今嵗甲子朔冬至而傅仁均減餘稍多子初為朔遂差三刻用乖天正請更加考定從之詔更定服制禮官奏請加髙祖父母服齊衰五月嫡子婦服期嫂叔弟妻夫兄舅皆服小功從之以太常卿韋挺為封禪使先是羣臣再請封禪上命祕書監顔師古議其禮房元齡裁定之事在十一年至是百官復請故有是命明年四月詔將有事於泰山會星孛太微褚遂良以東封為言乃罷辛丑十五年春正月以文成公主宗室女嫁吐蕃先是吐蕃贊普棄宗弄讚遣使奉表求婚上未之許弄讚遂帥衆二十萬進寇松州唐置今四川松潘衛是上命侯君集擊敗之弄讚懼遣使謝罪因復請婚上許之事在十六年至是弄讚遣其大論吐蕃國相之稱祿東贊獻黃金珍寶為聘上嘉祿東贊善應對欲以琅邪公主外孫假氏妻之辭曰臣國中有婦父母所聘不可棄也且贊普未得謁公主陪臣何敢先娶上益賢之然欲撫以厚恩竟不從其志乃命江夏王道宗持節送文成公主於吐蕃贊普大喜慕中國衣服儀衛之美為公主别築城郭宫室而處之其國人皆以赭塗面公主惡之贊普禁之亦漸革其猜暴之性遣其子弟入國學受詩書夏四月命太常博士吕才博州清平人刋定隂陽雜書上以近世隂陽雜書訛偽尤多命太常博士吕才刋定上之才皆為之敘質以經史其敘宅經曰近世巫覡妄分五姓如張王為商武庾為羽以取諧韻至於以栁為宫以趙為角又復不類或同出一姓分屬宫商或復姓數字莫辨徵羽此則事不稽古義理乖僻者也敘祿命曰祿命之書多言或中人乃信之然長平坑卒未聞共犯三刑南陽貴士何必俱當六合今亦有同年同祿而貴賤懸殊共命共胎而夭夀更異此皆祿命不險之著明者也其敘葬曰古者卜葬蓋以朝市遷變泉石交侵不可前知故謀之龜筮近代或選年月或相墓田以為窮達夭壽皆因卜葬所致按禮天子諸侯大夫葬皆有月數是古人不擇年月也春秋九月丁巳葬定公雨不克葬戊午日昃乃克葬是不擇日也鄭中葬簡公司墓之室當路毁之則朝而窆不毁則日而窆子産不毁是不擇時也古之葬者皆於國都之北兆域有常處是不擇地也今以妖巫妄言遂於劈踊之際擇地選時以希富貴或云辰日不可哭泣遂莞爾而對弔客或云同屬忌於臨壙遂吉服不送其親傷教敗禮莫斯為甚識者以為確論音五姓隂陽家以五音配姓而定其方向如趙姓角宜坐丙向寅之類三刑如寅刑已之類六合如子與丑合之類起復于志寧為太子詹事詹事于志寧遭母喪起復舊職太子治宫室妨農功好鄭衛之樂寵昵宦官役使司馭不使分番私引突厥入宫志寧上書切諫太子大怒遣刺客張師政紇干承基殺之二人入其第見志寧寢處苫塊竟不忍殺冬十一月以李世績為兵部尚書并州長史李世績在州十六年令行禁止民夷懷服上曰隋煬帝勞百姓築長城以備突厥卒無所益朕惟置李世績於晉陽而邊塵不驚其為長城豈不壯哉因有是命薛延陀攻突厥遣李世績等將兵討破之薛延陀真珠可汗遣其子大度設發諸部兵二十萬擊突厥思摩不能禦帥部落入長城保朔州遣使告急詔遣李世績等分道擊之諸將辭行上戒之曰薛延陀負其強盛踰漠而南行數千里馬已疲瘦見利不能速進不利不能速退吾已敇思摩燒剃秋草彼糧糗日盡野無所獲卿等俟其將退與思摩一時奮擊破之必矣十二月世績敗薛延陀於諾真水胡三省注在雲中古城西北斬首三千餘級捕虜五萬餘人大度設脫身走值大雪人畜凍死者十八九世績還軍定襄薛延陀既敗遣使請婚上謂侍臣曰薛延陀屈強漠北今御之止有二策非發兵殄滅之則與之婚姻以撫之耳房元齡曰兵凶戰危臣以為和親便先是契苾何力省母涼州其故部劫之以降薛延陀何力不屈拔佩刀割左耳自誓會有使者自薛延陀來言其狀上即命兵部侍郎崔敦禮持節使薛延陀許以新興公主妻之以求何力何力由是得歸遂上言薛延陀不可與婚上曰吾已許之豈可食言何力因請敕使親迎彼必不敢來則絶之有名上乃詔幸靈州與真珠可汗會禮真珠大喜益搜賦馬羊充聘薛延陀本無庫廄調斂諸部不亟集又度磧乏水草畜口耗死過半失期不至乃責以聘禮不備詔絶其婚停幸靈州上契苾何力鐵勒哥楞莫何可汗之孫崔敦禮字安咸陽人新興公主帝第十三女後嫁長孫曦壬寅十六年春正月魏王泰上括地志泰好學司馬蘇朂説泰以古之賢王皆招士著書故泰奏請修括地志於是大開館舍門庭如市至是上之泰月給踰於太子褚遂良上疏曰聖人制禮庶子雖愛不得踰嫡所以塞嫌疑之漸除禍亂之源也若當親者疏當尊者卑則佞巧之姦乘機而動矣今魏王新出閣宜示以禮上從之上又令泰徙居武德殿魏徵曰此殿海陵昔嘗居之陛下愛魏王常欲使之安全宜每抑其驕奢不可處之嫌疑之地上遽遣泰歸第封海陵元吉追王號夏六月詔太子用庫物有司勿為限制詔太子用庫物有司勿為限制於是太子發取無度左庶子張元素上太子書曰恩旨未踰六旬用物已過七萬驕奢之極孰云過此苦藥利病苦言利行伏惟居安思危日慎一日太子惡之令户奴隂伺擊之幾斃秋九月以魏徵為太子太師初魏徵有疾上手詔問之且言不見數日朕過多矣若有聞見可封狀進來徵上言比者弟子陵師奴婢忽主下多輕上漸不可長又言陛下臨朝常以至公為言退而行之未免私僻或畏人知橫加威怒欲蓋彌彰竟有何益徵宅無堂上命輟小殿之材以構之五日而成仍賜以素屛風素褥几杖等以遂其所尚徵上表謝上手詔曰處卿至此蓋為黎元與國家何事過謝會上問侍臣以國家急務褚遂良曰太子諸王宜有定分此為最急時太子承乾失德魏王泰有寵羣臣日有疑議故遂良對及之上乃曰方今羣臣忠直無踰魏徵我遣傅太子用絶天下之疑乃以徵為太子太師徵以疾辭上曰知公疾病可卧護之徵乃受詔上嘗謂侍臣曰朕雖平定天下其守之甚難徵對曰臣聞戰勝易守勝難陛下之言及此宗廟社稷之福也上嘗問徵比來朝臣殊不論事何也對曰陛下虛心采納必有言者凡臣徇國者寡愛身者多彼畏罪故不言耳房元齡髙士亷遇少府少監竇德素於路問北門近何營繕德素奏之上怒讓元齡等曰君但知南牙政事北門小營繕何預君事元齡等拜謝魏徵進曰元齡等為陛下股肱耳目於中外事豈有不應知者使所營者是則當助成之非則當請罷之不知何罪而責亦何罪而謝也上甚愧之上嘗問侍臣曰或君亂而臣治或君治而臣亂孰愈魏徵對曰君治則善惡明賞罰當臣安得而亂之茍為不治縱暴愎諫雖有良臣將安所施上曰齊文宣得楊遵彥非君亂而臣治乎對曰彼才能救亡耳烏足為治哉北門南牙唐正牙在南元武門在北南門公卿出入北門宦官私人所出入也西突厥寇伊州安西都護郭孝恪擊敗之西突厥乙毗咄陸可汗既並沙鉢羅葉護之衆自恃強大遣兵寇伊州郭孝恪擊敗之未幾乙毗咄陸為其下所逐乙毗咄陸擊破米國不分虜獲與其下又斬其將泥孰啜泥孰啜部將胡祿屋襲擊之乙毗咄陸走保白水胡城距米國胡三省注一曰彌末治末息德城北康居百里於是所部詣闕請更立可汗上遣使立莫賀咄之子為乙毗射匱可汗乙毗咄陸奔吐火羅唐書西域傳一曰土豁羅居蔥嶺西烏滸河之南古大夏地冬十一月高麗泉蓋蘇文泉姓蓋蘇文名亦號蓋金弒其王建武髙麗東部大人泉蓋蘇文凶暴多不法其王及大臣議誅之蓋蘇文知之勒兵盡殺諸大臣因馳入宫手弒其王立王弟子藏為王自為莫離支其官如中國吏部兼兵部尚書也於是號令逺近専制國事蓋蘇文狀貌雄偉身佩五刀左右莫敢仰視每出行前導長呼人皆奔逬不避坑谷亳州刺史裴思莊奏請伐高麗上曰高麗職貢不絶為賊臣所弒朕甚哀之但山東雕弊吾未忍言用兵耳已而遣使持節册命高藏為遼東郡王廣州都督黨仁𢎞馮翊人有罪徙欽州隋置今屬廣東亷州府髙祖之入關也黨仁𢎞將兵有功其後歷官所至有聲迹至是為廣州都督坐贓當死上欲宥之召五品以上謂曰法者人君所受於天不可以私今朕私黨仁𢎞而欲赦之是自亂其法上負於天欲席藁於南郊三日日一進蔬食以謝罪羣臣以為自貶太過頓首固請上乃降手詔曰朕有三罪知人不明一也以私亂法二也善善未賞惡惡未誅三也於是黜仁𢎞為庶人徙欽州詔議反逆緣坐律刑部以反逆緣坐律兄弟沒官為輕請改從死敕八座議之議者皆以為秦漢之法反者夷族宜如刑部之請給事中崔仁師駁曰古者父子兄弟罪不相及奈何以亡秦酷法變隆周中典周禮秋官刑平國用中典上從之癸卯十七年春正月鄭公魏徵卒諡文貞魏徵寢疾上與太子同至其第指衡山公主欲以妻其子叔玉徵薨命百官赴喪給羽葆鼓吹陪葬昭陵其妻裴氏曰徵平生儉素今葬以羽儀非其志也辭不受以布車載柩而葬上登苑西樓望哭盡哀自製碑文并為書石謂侍臣曰人以銅為鏡可以正衣冠以古為鏡可以見興替以人為鏡可以知得失魏徵歿朕亡一鏡矣以張亮鄭州滎陽人為洛州都督侯君集自以有功而下吏怨望有異志會亮出為洛州君集謂曰我平一國來逢嗔如屋大鬱鬱殊不聊生公能反乎與公反亮密以聞上曰卿與君集皆功臣語時旁無他人若下吏君集必不服卿且勿言待君集如故圖功臣於凌煙閣南部新書閣在西內三清殿畫功臣皆北面上命圖畫功臣長孫無忌趙公趙郡王孝恭元王杜如晦萊成公魏徵鄭文貞公房元齡梁公高士廉申公尉遲敬德鄂公李靖衛公蕭瑀宋公假志元褒忠壯公劉𢎞基夔公屈突通蔣忠公殷開山鄖節公柴紹譙襄公長孫順德邳襄公張亮鄖公侯君集陳公張公謹郯襄公程知節盧公虞世南永興文懿公劉政會渝襄公唐儉莒公李世績英公秦叔寶胡壯公等於凌煙閣胡三省注書爵不書諡者其人存書爵書諡者其人已卒齊州都督齊王祐帝之子反伏誅祐性輕躁昵近羣小好畋獵長史權萬紀驟諫不聽恐并獲罪乃條祐過失迫令表首上以敕書戒之祐大怒曰長史賣我以為功必殺之萬紀拘持祐益急不聽出城門悉解縱鷹犬劾其左右數十人上遣使按之詔祐入朝祐殺萬紀驅民入城繕甲兵樓堞詔發兵討之兵未至齊府兵曹杜行敏等執祐送京師賜死上檢祐家文疏得記室孫處約諫書嗟賞之纍遷中書舍人孫處約本名道茂汝州郟城人夏四月太子承乾謀反廢為庶人立晉王治帝第九子即高宗為皇太子貶魏王泰為東萊郡王太子承乾少有躄疾喜聲色畋獵所為奢靡居宫中與小相褻狎效突厥語及服飾飲食謂左右曰一朝有天下當帥數萬騎獵於金城西然後解髮委身思摩若當一設不居人後矣漢王元昌髙祖子所為多不法上數譴責之由是怨望太子與之甚善魏王泰多能有寵潛有奪嫡之志折節下士以求聲譽太子畏其逼隂養刺客紇干承基等謀殺之吏部尚書侯君集怨望以太子暗劣欲乘釁圖之因勸之反太子大然之厚賂中郎將李安儼頓邱人使為中詗洋州刺史趙節慈景之子高祖女長廣公主所生駙馬都尉杜荷如晦之子尚帝女城陽公主漢王元昌皆預其謀割臂為誓會齊王祐反事連承基繫獄當死上變告太子謀反敇大理中書門下參鞫之反形已具上面責承乾承乾曰臣為太子復何所求但為泰所圖時與朝臣謀自安之術不逞之人遂教臣為不軌耳今若泰為太子所謂落其度內也上乃謂侍臣曰將何以處承乾羣臣莫敢對通事舍人來濟護兜之子進曰陛下不失為慈父太子得盡天年則善矣上從之詔廢承乾為庶人幽之元昌賜自盡君集安儼節荷等皆伏誅庶子張元素等以不諫諍免為庶人獨于志寧以數諫見褒承乾既獲罪魏王泰日入侍奉上面許立為太子岑文本劉洎亦勸之長孫無忌固請立晉王治上謂侍臣曰昨青雀泰小字投我懷云臣今日始得為陛下子臣有一子臣死之日當為陛下殺之傳位晉王朕甚憐之諫議大夫褚遂良曰陛下言大失願審思勿誤安有陛下萬嵗後魏王據天下肯殺其愛子傳位晉王者乎陛下前者以嫡庶之分不明致此紛紜今必立魏王願先措置晉王始得安全耳上流涕曰吾不能也因起入宫魏王泰恐上立晉王謂之曰汝與元昌善得無憂乎治憂形於色上怪屢問其故治以狀告上憮然始悔立泰之言因留長孫無忌房元齡李世績褚遂良謂曰我三子承乾祐泰一弟元昌所為如是我心誠無聊賴因自投於牀抽佩刀欲自刺遂良奪刀以授晉王無忌等請上所欲上曰我欲立晉王無忌曰謹奉詔上乃使治拜無忌曰汝舅許汝矣即御太極殿召羣臣謂曰承乾悖逆泰亦凶險諸子誰可立者衆皆歡呼曰晉王仁孝當為嗣上悅詔立晉王治為皇太子時年十六謂侍臣曰我欲立泰則是太子之位可經營而得自今太子失道藩王窺伺者皆兩棄之傳諸子孫永為後法乃降泰爵東萊郡王幽之北苑府僚親狎者皆遷嶺表先是侯君集被收上謂侍臣曰君集有功欲乞其生可乎羣臣不可上乃泣謂之曰與公長訣矣今而後惟見公遺像矣遂斬之而原其妻子上嘗使李靖教君集兵法君集言於丄曰靖將反矣上問其故對曰靖獨教臣以其粗而匿其精以是知之上以問靖對曰此乃君集欲反耳今諸夏已定臣之所教足以制四夷而君集固求盡臣之術非反而何江夏王道宗嘗從容言於上曰君集自負微功耻在房李之下以臣觀之必將為亂上不之信至是上乃謝道宗曰果如卿言以太子太保蕭瑀詹事李世績同中書門下三品歐陽修曰同三品之名始此詔以長孫無忌為太子太師房元齡為太傅蕭瑀為太保李世績為詹事瑀世績並同中書門下三品唐書百官志唐以三省之長中書令侍中尚書令共議國政其後以太宗嘗為尚書令臣下不敢居其職遂以僕射為尚書省長官與侍中中書令號為宰相後李世績以詹事同中書門下三品謂同侍中中書令也至髙宗以後為宰相者必加同中書門下三品雖品髙者亦然又以李大亮于志寧馬周蘇朂高季輔張行成褚遂良皆為僚屬世績嘗得暴疾方云鬚灰可療上自剪鬚為之和藥又嘗從容謂曰朕求羣臣可託孤者無以踰公公往不負李密豈負朕哉世績流涕辭謝齧指出血宫黃門侍郎劉洎言太子宜勤學問親師友今入侍闈動踰旬朔師保以下接對甚稀上乃命洎與岑文本褚遂良馬周更詣東宫與太子遊處談論上自立大子遇物則誨之見其飯則曰汝知稼穡之艱難則常有斯飯矣見其乘馬則曰汝知其勞而不竭其力則常得乘之矣見其乘舟則曰水所以載舟亦所以覆舟民猶水也君猶舟也見其息於木下則曰木從繩則正后從諌則聖守上疑太子柔弱密謂長孫無忌曰雉奴懦恐不能社稷吳王恪英果類我我欲立之何如無忌固爭以為不可上曰公以恪非己之甥耶無忌曰太子仁厚真守文良主儲副至重豈可數易上乃止雉奴太子小字六月己卯朔日食詔太子知左右屯營兵馬事上謂羣臣曰吾如治年時頗不能循常度治自幼寬厚諺曰生狼猶恐如羊冀其稍壯自不同耳長孫無忌曰陛下神武撥亂之才太子仁恕實守文之德也秋七月貶杜正倫為交州都督初太子承乾失德上密謂庶子杜正倫曰吾兒果不可教當來告我正倫屢諫不聽乃以上語告之承乾表聞上責正倫正倫對曰臣以此恐之冀其遷善耳及承乾敗正倫左遷交州踣魏徵碑初魏徵嘗薦杜正倫侯君集有宰相才至是正倫以罪黜君集謀反誅上始疑徵阿黨又有言徵自録前後諫辭以示起居郎褚遂良者上愈不恱乃罷叔玉尚主而踣所撰碑房元齡上髙祖今上實録上謂褚遂良曰卿知起居注所書可得觀乎對曰史官書人君言動備記善惡庶幾人君不敢為非未聞自取而觀之也上曰朕有不善卿亦記之邪對曰臣職當載筆不敢不記黃門侍郎劉洎曰借使遂良不記天下亦皆記之矣已而上又謂監修國史房元齡曰朕欲觀國史以知前日之惡為後來之戒公可撰次以聞諫議大夫朱子奢上言陛下聖德在躬獨覽起居於事無失若以此法傳示子孫或有飾非護短史官不免刑誅則莫不順旨全身千載何所信乎上不從元齡乃與給事中許敬宗等刪為髙祖今上實録書成上之上見書六月四日事語多微隱謂元齡曰昔周公誅管蔡以安周季友鴆叔牙以存魯朕之所為亦類是矣史官何諱焉即令直書其事九月新羅乞兵伐髙麗遣使諭之新羅遣使言百濟與髙麗連兵謀絶新羅入朝之路乞兵救援上遣使齎璽書諭之蓋蘇文不奉詔使還上曰蓋蘇文弒君不可以不討諫議大夫褚遂良曰今中原清晏四夷讋服陛下之威望大矣乃欲渡海逺征小夷萬一蹉跌傷威損望更興忿兵則安危難測也李世績曰間者薛延陀入寇陛下欲發兵窮追用魏徵之言遂失機會不然薛延陀無遺類矣上曰然此誠徵之誤朕尋悔之而不欲言恐塞嘉言之路耳於是遂欲自征髙麗遂良復諌曰天下譬猶一身兩京心腹也州縣四肢也四夷身外之物也髙麗罪大誠當致討但命一二猛將將四五萬衆取之如反掌耳今太子新立幼稚諸王陛下所知一旦棄金湯之全踰遼海之險以天下之君輕行逺舉皆臣之所甚憂也羣臣亦多諫者上皆不聽徙故太子承乾於黔州順陽王泰泰由東萊徙封順陽於均州注俱見前甲辰十八年秋七月以劉洎為侍中岑文本馬周為中書令岑文本既拜還家有憂色母問其故文本曰非􅈴非舊濫荷寵榮位髙貴重所以憂懼語賀客曰今受弔不受賀也上嘗謂侍臣曰朕欲自聞其失諸公宜直言無隱劉洎曰頃有上書不稱旨者陛下皆面加窮詰恐非所以廣言路馬周曰陛下比來賞罰微以喜怒有所高下上皆納之上文學辨敏羣臣言事者引古今以折之多不能對劉洎丄書諫曰以至愚而對至聖以極卑而對至尊虛襟以納其説猶恐未敢對敡况動神機縱天辨飾辭而折其理引古以排其議欲令凡庶何階應答且多記損心多語損氣願為社稷自愛上飛白答之曰非慮無以臨下非言無以述慮比有談論遂致煩多輕物驕人恐由兹道形神志氣非此為勞今聞讜言虛懷以改施飛白書體也蔡雍見鴻門匠人堊帚遂創造焉白通作帛九月以褚遂良為黃門侍郎參預朝政上嘗問褚遂良曰舜造漆器諫者十餘人此何足諫對曰奢侈者危亡之本漆器不已將以金玉為之忠臣愛君必防其漸若禍亂已成無所復諫矣上曰然朕見前世帝王拒諫者多云業已為之終不為改如此欲無危亡得乎上謂長孫無忌等曰人苦不自知其過卿可為朕明言之無忌對曰陛下武功文德臣等將順之不暇又何過之可言上曰朕問公以已過公等乃曲相諛説朕欲面舉公等得失以相戒而改之何如皆拜謝上曰長孫無忌善避嫌疑敏於決斷而總兵攻戰非其所長高士亷臨難不改節當官無朋黨所乏者骨鯁規諫耳唐儉言辭辨捷善和解人事朕三十年遂無言及於獻替楊師道性行純和而情實怯懦緩急不可得力岑文本性質敦厚持論恆據經速自當不負於物劉洎性最堅貞有利益但意尚然諾私於朋友馬周凡事敏速直道而言朕比任使多能稱意褚遂良學問稍長性亦堅正每寫忠誠親附於朕譬如飛鳥依人人自憐之冬十月辛丑朔日食帝如洛陽命房元齡留守十一月以張亮李世績為行軍大總管詔親征高麗先是蓋蘇文貢白金褚遂良曰此郜鼎之類不可受也上從之而責其使者悉以屬大理及是上至洛陽前宜州刺史鄭元璹已致仕上以其嘗從隋煬帝伐髙麗召問之對曰遼東道逺糧運艱阻東夷善守城攻之不可猝下上曰今日非隋之比公但聽之乃以張亮為平壤大總管帥兵自萊州泛海趣平壤以李世績為遼東大總管帥步騎趣遼東手詔諭天下以髙麗蓋蘇文弒主虐民今問其罪以順討逆以治乘亂何憂不克布告元元勿為疑懼十二月武陽公李大亮卒諡曰懿大亮忠儉恭謹房元齡每稱其有王陵周勃之節及是副房元齡守京師卒初大亮為李密所獲其帥張弼見而釋之及大亮貴求弼弼為將作丞自匿不言大亮遇諸塗而識之持弼而泣以家資遺弼不受言於上乞悉以其官爵授之上為之擢弼為中郎將時人皆賢大亮不負恩而多弼之不伐也大亮卒遺表請罷髙麗之師家餘米五斛布三十匹親戚早孤為大亮所養喪之如父者十有五人故太子承乾卒突厥徙居河南可汗李思摩入朝思摩自渡河之後薛延陀數攻之雖有衆十萬不能撫御其衆悉南渡河處於勝夏二州之間思摩遂輕騎入朝願留宿衛上以為右武衛將軍乙巳十九年春正月帝發洛陽上自將諸軍發洛陽詔諡殷太師比干曰忠烈命所司封其墓春秋祠以少牢給五户灑掃至鄴上自為文祭魏太祖曰臨危制變料敵設奇一將之智有餘萬乘之才不足三月至定州詔皇太子監國詔太子監國留居定州命太傅高士亷詹事張行成庶子高季輔及侍中劉洎中書令馬周同掌機務以輔之將行太子悲泣數日上曰為國之要在於進賢退不肖賞善罰惡至公無私汝當努力行此悲泣何為於是遂發定州長孫無忌岑文本楊師道從上親佩弓矢手結雨衣於鞍後夏四月岑文本卒諡曰憲以許敬宗檢校中書侍郎上悉以軍中資糧器械簿書委岑文本文本夙夜勤力精神耗竭遇暴疾卒上召許敬宗代之五月帝渡遼拔遼東城注見前六月攻白巖城在今遼陽州東北降之進攻安市本漢縣故城在今奉天府蓋平縣東北敗其援兵於城下先是李世績潛師濟遼水攻蓋牟城本漢西蓋馬縣後入髙句麗今為蓋平縣屬奉天府拔之以其地為蓋州已而張亮以舟師渡海襲卑沙城注見前城潰世績遂圍遼東城髙麗步騎四萬來救江夏王道宗將四千騎逆擊敗之車駕次遼澤泥淖二百餘里布土作橋以渡既渡撤之以堅士心進至遼東城下上見士卒負土填塹即分其尤重者自於馬上持之從官爭負土致城下時世績攻城已十二日上引精兵會之圍其城數百里縱火登城高麗力戰不能敵遂克之以其城為遼城六月降白巖城李思摩中弩矢上親吮血將士聞之莫不感動契苾何力擊髙麗救兵挺身陷陳槊中其腰尚輦奉御薛萬備單騎往救援何力於萬衆之中而還何力氣益憤束瘡而戰遂破高麗兵白巖城既降而中悔上怒其反覆攻之約以虜口畀諸將頃之復乞降上將受之李世績曰士奮而先貪虜獲也今城垂拔奈何許降以孤戰士之心上下馬謝曰將軍言是也然縱兵殺人而虜其妻孥朕所不忍將軍麾下有功者朕以庫物賞之庶因將軍贖此一城耳世績乃退上受其降以為巖州進攻安市高麗北部耨薩高麗有左右前後內五部耨薩官名北都督延壽惠真二人名高氏宗族帥兵十五萬救之上謂侍臣曰延夀若引兵直前連城為壘據險食粟掠吾牛馬坐困吾軍上䇿也拔衆宵遁中䇿也不度智能來與吾戰下䇿也必成擒矣高麗有對盧年老習事謂延夀曰秦王內芟羣雄外服戎狄獨立為帝此命世之才今舉海內之衆而來不可敵也為吾計者莫若頓兵不戰曠日持久分遣奇兵斷其運道糧食既盡求戰不得欲歸無路乃可勝也不從北對盧高麗官大對盧一品延壽引軍直進上命阿史那社爾突厥處羅可汗次子將千騎誘之兵始交而偽走高麗相謂曰易與耳競進乘之至安市城東南依山而陳上以數百騎乘高觀望形勢命李世績將步騎萬五千陳於西嶺長孫無忌將精兵萬一千自山北出狹谷以衝其後上自將步騎四千為竒兵挾鼓角偃旗幟登北山敕諸軍聞鼓角齊出奮擊延壽等見世績布陳勒兵欲戰上望見無忌軍塵起命作鼓角舉旗幟諸軍鼓譟並進延壽等大懼欲分兵禦之而陳已亂龍門人薛仁貴名禮以字行安都六世孫著白衣大呼陷陳所向無敵大軍乘之高麗兵大潰延壽惠真帥衆請降舉國大駭上乃更名所幸山曰駐蹕山即首山在遼陽州西南刻石紀功驛書報太子及高士亷等曰朕為將如此何如秋九月薛延陀真珠可汗死子多彌可汗拔灼立上之伐高麗也薛延陀遣使入貢且請發兵助軍上不許及高麗敗於駐蹕山莫離支使説真珠啖以厚利真珠懾不敢動及是卒初真珠請分國立其庶長子曵莽嫡子拔灼皆為可汗詔從之至是拔灼殺其兄曵莽而自立自為多彌可汗帝攻安市城不下詔班師上攻安市城中望見旌麾輒乘陴而譟上怒李世績請克城之日男子盡誅城中聞之益堅守攻久不下江夏王道宗督衆築土山攻東南城中增陴以拒李世績攻其西衝車所壞城中隨立木柵以塞其缺士卒分番交戰晝夜不息凡六旬用功五十萬上以遼左早寒草枯水凍士馬難久留且糧食將盡敕班師耀兵於安市城下而旋城主登城拜辭上嘉其固守賜縑百匹以勵事君速師渡遭暴風雪士卒沾濕多死者冬十月遣使祀魏徵復立所踣碑凡征高麗戰士死者幾三千人戰馬死者什七八上以不能成功深悔之歎曰魏徵若在不使朕有是行也命馳驛祀徵以少牢復立所製碑召其妻子詣行在勞賜之帝還至營州注見前祭戰亡士卒贖諸軍所虜高麗民上至營州詔集戰亡士卒骸骨祭以太牢上自作文臨哭從臣皆流涕聞太子奉迎將至乃從飛騎馳入臨榆關注見前道逢太子初上發定州指所御褐袍謂太子曰俟見汝乃易此袍耳在遼左雖盛暑流汗弗之易至是太子進新衣乃易之諸軍所虜高麗民萬四千口安集幽州將以賞軍上愍其父子夫婦離散命有司平其直悉以錢帛贖為民歡呼之聲三日不息十二月殺侍中劉洎初上將東行謂侍中劉洎曰我今逺征爾輔太子安危所寄宜深識我意對曰願陛下無憂大臣有罪者臣謹即行誅上以其妄發怪之及上還不豫洎色悲懼謂同列曰疾勢如此聖躬可憂或譖於上曰洎言國家事不足憂但當輔幼主行伊霍故事大臣有異志者誅之自定矣上以為然詔賜自盡以馬周攝吏部尚書周以四時選為勞復請十一月選至三月畢從之丙午二十年春正月遣大理卿孫伏伽等巡察四方遣大理卿孫伏伽等二十二人以六條胡三省注用漢六條也巡察四方伏伽等多所貶黜其人詣闕稱寃者前後相屬上令褚遂良類狀以聞上親臨決以能進擢者二十人以罪死者七人流以下除免者數百千人帝還京師初上攻安市城江夏王道宗請以偏師徑趨平壤道宗曰高麗傾國以拒吾師平壤之守必弱願假臣精兵五千覆其根本則數十萬衆可不戰而降矣上不聽及還上謂李靖曰吾以天下之衆困於小夷何也靖曰此道宗所解上顧問道宗具陳前語上悵然曰當時匆匆吾不憶也三月詔皇太子聽政上疾未全平欲専保養詔太子間日聽政於東宫既罷則入侍藥膳不離左右褚遂良請遣太子旬日一還東宫與師傅講論從之殺刑部尚書張亮人告亮有反謀上命按之亮不服命百官議其獄皆言亮反當誅獨將作少監李道裕言亮反形未具不當死上不聽斬之後歲餘刑部侍郎缺上曰朕得其人矣往者李道裕議張亮獄朕雖不從至今悔之遂以為刑部侍郎閏月癸巳朔日食夏五月高麗遣使謝罪却之高麗王藏及莫離支蓋金即蓋蘇文遣使謝罪并獻二美女上以師還之後金益驕恣表辭詭誕待使者倨慢屢違詔攻新羅詔勿受其朝貢復議討之秋八月帝如靈州遣李世績擊薛延陀降之敕勒諸部遣使請吏薛延陀多彌可汗猜褊好殺廢棄父時貴臣専用已所親昵國人不附回紇諸部擊之大敗上詔江夏王道宗等將兵分道並進國中驚擾多彌出走回紇殺之盡據其地餘衆西走猶七萬餘口共立真珠兄子咄摩支遣使奉表請居鬱督軍山之北詔遣使安集之敕勒九姓酋長聞咄摩支來皆懼朝議亦恐其為磧北之患乃遣李世績圖之上自詣靈州招撫世績至鬱督軍山咄摩支降道宗兵既度磧薛延陀拒戰道宗擊破之遣使招諭敕勒諸部其酋長皆喜請入朝駕至浮陽胡三省注當作涇陽涇陽注見前回紇等十一姓各遣使歸命乞置官司上大喜遣使納之詔曰朕聊命偏師遂擒頡利始宏廟略巳滅延陀鐵勒百餘萬户請為州郡混元以降殊未前聞宜備禮告廟仍頌示普天上為詩曰雪恥酬百王除凶報千古勒石於靈州明年回紇諸部皆來朝請吏詔以為六府一州各以其酋長為都督刺史諸酋長請以回紇以南突厥以北開一道謂之參天可汗道置六十八驛許之於是北荒悉平然回紇吐迷度已私自稱可汗官號皆如突厥故事冬十月貶蕭瑀為商州刺史瑀性狷介與同僚多不合嘗言房元齡等朋黨不忠但未反耳上不聽瑀內不自得因自請出家既而悔之上以瑀反覆不平詔曰朕於佛教非意所遵梁武簡文窮心釋氏社稷為墟報施之徵何其謬也瑀踐覆車之餘軌襲亡國之遺風自請出家尋復違異豈具瞻之量乎貶商州刺史後瑀卒太常議諡曰德尚書議諡曰肅上曰諡者行之迹當得其實可諡貞𥚹子鋭嗣十二月帝生日罷宴樂上謂長孫無忌等曰今日吾生日世俗皆為樂在朕翻成傷感今君臨天下富有四海而承歡膝下永不可得此子路所以有負米之恨也見家語詩云哀哀父母生我劬勞奈何以劬勞之日更為歡樂乎因泣數行下左右皆悲幸房元齡第元齡嘗以微譴歸第褚遂良諫曰元齡翼贊聖功冒死決策選賢立政勤力為多自非罪在不赦不可遐棄若以其衰老亦當退之以禮上然之因幸芙蓉園在咸寧縣南雍録園本古曲江地隋文帝惡其名曲改曰芙蓉元齡敕子弟泛掃門庭曰乘輿且至有頃上幸其第因載元齡還宫丁未二十一年春正月詔以來年仲春有事於泰山已而以河北水災遂罷以牛進達李世績為行軍大總管伐高麗上將復伐高麗朝議以為高麗依山為城攻之不可猝拔前大駕親征國人不得耕種大半乏食今若遣偏師更迭擾其疆場使彼疲於奔命釋耒入堡數年之間千里蕭條則人心自離鴨緑以北可不戰而取矣上從之遣牛進達李世績水陸並進以討之是年五月世績破南蘇城七月進逹拔石城乃皆還明年正月復遣薛萬徹從海道入萬徹渡鴨緑水斬其梁帥而還縣南蘇漢高句驪地有南蘇水城因此名今為寧海屬奉天府石城在今蓋平縣東北石城山上夏四月以李素立為燕然都護置燕然都護府其後更名瀚海又曰安北遷徙不常最後移治天德軍在今吳喇忒旗西北黃河北岸以李素立為之統瀚海等六府回紇及多覽葛等臯蘭等七州渾及斛薛等素立撫以恩信夷落懷之共率馬牛為獻素立惟受其酒一杯餘悉還之上問侍臣曰自古帝王雖平中夏不能服戎狄朕才不及古人而成功過之何也羣臣稱頌功德上曰不然朕所以能及此者止由五事耳自古帝王多疾勝已者朕見人之善若已有之人之行能不能兼備朕常棄其所短取其所長人主往往進賢則欲置諸懷退不肖則欲推諸壑朕見賢者則進之不肖者則憐之人主多惡正直隂誅顯戮無代無之朕踐阼以來正直之士比肩於朝未嘗黜責一人自古皆貴中華賤夷狄獨朕愛之如一故其部落皆依朕如父母此五者朕所以成今日之功也五月帝如翠微宫先是上得風疾苦京師盛暑命修終南山太和廢宫髙祖建為翠微宫至是幸之進士張昌齡獻翠微宫頌上愛其文命於通事舍人裏供奉初昌齡與王公治皆有文名考功員外郎王師旦知貢舉黜之上問其故師旦曰二人文體輕薄終非令器若置之髙第恐後進效之傷陛下雅道上善其言骨利幹注見前遣使入貢骨利幹於鐵勒諸部為最逺晝長夜短日沒後天色正曛煮羊胛適熟日已復出矣立皇子明為曹王曹王明母楊氏巢刺王之妃也有寵於上文德皇后之崩也欲立為皇后魏徵諫曰陛下方比德唐虞奈何以辰嬴自纍乃止尋以明繼元吉後冬十一月突厥車鼻可汗遣入貢車鼻本突厥同族頡利之敗諸部欲立之時薛延陀方強車鼻不敢當帥衆歸之薛延陀以車鼻貴種有勇略恐其為後患欲殺之車鼻逃去建牙金山之北自稱可汗突厥餘衆稍歸之及薛延陀敗車鼻勢益張遣子入見又請入朝遣使徵之車鼻不至戊申二十二年春正月作帝範以賜太子上作帝範十二篇以賜太子曰君體建親求賢審官納諫去讒戒盈崇儉賞罰務農閲武崇文且曰修身治國備在其中一旦不諱更無所言矣夫成遲敗速者國也失易得難者位也可不惜哉可不慎哉中書令馬周卒上親為調藥使太子臨問周疾甚取奏草悉焚之遂卒結骨即黠戞斯古堅昆國也地當伊吾之西焉者北白山之旁漢郅支單於都此後得其地者訛為結骨亦曰紇扢斯最後謂之黠戞斯俟利發入朝結骨人皆長大赤髮緑睛自古未通中國至是其俟利發其君之稱失鉢屈阿棧其君之名來朝請除一官詔以為堅昆都督是時四夷君長爭入獻見每元正朝賀常數百千人上曰漢武帝窮兵三十餘年所獲無幾豈如今日綏之以德使窮髮之地盡為編户乎帝如玉華宫在今鄜州宜君縣上營玉華宫務為儉約惟寢殿覆瓦餘皆茅茨然所費已巨億計充容九嬪之一徐惠孝德之女上疏其略曰今東征髙麗西討龜兹以有盡之農功填無窮之巨浪圖未獲之他衆喪已成之我軍地廣非常安之術人勞乃易亂之源又曰作法於儉猶恐其奢作法於奢何以制後上善其言甚禮重之三月故隋后蕭氏卒詔復其位號諡曰愍使三品護葬江都夏五月遣右衛長史王元策使天竺唐書西域傳天竺曰國或曰摩伽陀或婆羅門去京師九千六百里居蔥嶺南分東西南北中五天竺南天竺瀕海北天竺距雪山東天竺際海與扶南林邑接西天竺與罽賔波斯接中天竺在四天竺之會都城曰茶鎛和羅城也因襲擊之執其王以歸初中天竺兵最強四天竺皆臣之王元䇿奉使至其國會其王卒其臣阿羅那順自立發兵攻元䇿元䇿脫身宵遁抵吐蕃西境徵鄰國兵吐蕃泥婆國即泥婆羅國在吐蕃之西樂陵川皆遣兵赴之元䇿帥之進至中天竺連戰三日大破城邑聚落降者五百八十餘所俘阿羅那順以歸殺華州刺史李君羡太白屢晝見太史占云女主昌民間又傳祕記云唐三世之後女主武王代有天下上惡之以武衛將軍李君羡小字五娘而官稱封邑皆有武字君羡武安人封武連縣公出為華州刺史御史復奏君羡謀不軌上遂誅之上嘗密問太史令李淳風祕記所云信有之乎對曰臣仰稽天象俯察厯數其人已在宫中自今不過三十年當王天下殺唐子孫殆盡其兆既成矣上曰疑似者盡殺之何如對曰天之所命人不能違也王者不死徒多殺無辜且自今以往三十年其人已老庶幾頗有慈心為禍或淺今借使得而殺之天或生壯者肆其怨毒恐陛下子孫無遺類矣上乃止司徒梁公房元齡卒諡文昭元齡留守京師疾篤上徵赴玉華宫肩輿入殿相對流涕因留宫下候問不絶元齡謂諸子曰吾受主上厚恩今天下無事惟東征無已羣臣莫敢諫吾知而不言死有餘責乃上表諫略言老子曰知足不辱知止不殆陛下威名功德亦可足矣拓地開疆亦可止矣且陛下每決一重囚必令三覆五奏膳素止樂者重人命也今驅無罪之士卒委之鋒創之下使之肝腦塗地獨不足懲乎向使髙麗違失臣節誅之可也侵擾百姓滅之可也他日能為中國患除之可也今無此三條而坐煩中國內為前代雪恥外為新羅報讎豈非所存者小所損者大乎願陛下許高麗自新焚凌波之船罷應募之衆自然華夷慶賴逺肅邇安臣旦夕入地倘蒙録北哀嗚死且不朽上覽表曰病勢如此尚能憂我國家乃自臨視握手與訣悲不自勝遂卒秋八月己酉朔日食冬十月帝還宫雅眉卭州雅州隋置今為府屬四川眉州唐置卭州梁置二州今俱隸四川獠反初上以高麗困弊議以明年發三十萬衆一舉滅之或以劍南隋末無寇屬者遼東之役又不預徵發百姓富庶宜使造舟上從之遣使發民造船役及山獠於是三州獠反發隴右峽中兵二萬餘人以擊之蜀人苦造船之役州縣督迫嚴急民至賣田宅鬻子女不能供穀價踊貴劍外騷然十二月阿史那社爾等擊龜兹執其王布失畢龜兹王訶黎布失畢寖失臣禮侵漁鄰國上怒詔阿史那社爾契苾何力郭孝恪等將兵擊之社爾引兵自焉耆之西趣龜兹北境分兵為五道出其不意焉耆王奔龜兹社爾遣兵擊斬之進屯磧口龜兹王布失畢及相那利戰敗走保都城社爾進軍逼之拔其城使郭孝恪守之布失畢走保撥換城龜兹城名社爾追擒之那利收合餘燼潛引西突厥之衆襲殺孝恪驍衛將軍曹繼叔等擊那利獲之社爾破其大城五遣使諭降七百餘城立王弟葉護為王西域震駭社爾勒石紀功而還己酉二十三年春三月帝有疾詔太子聽政夏四月帝如翠微宫五月以李世績為疊州後周置隋廢唐復置故城在今洮州衛邉外都督上謂太子曰李世績才智有餘然汝與之無恩我今黜之若其即行俟我死汝用為僕射親任之若徘徊顧望當殺之耳乃左遷世績為疊州都督世績受詔不至家而去衛公李靖卒諡曰景武靖病甚上幸其第流涕曰公乃朕生平故人今疾若此邪卒贈司徒帝崩長孫無忌褚遂良受遺詔輔太子還宫發喪罷遼東兵上苦痢增劇太子晝夜不離側或纍日不食髮有變白者上召長孫無忌褚遂良入卧內謂之曰太子仁孝善輔導之謂太子曰無忌遂良在汝勿憂天下又謂遂良曰無忌盡忠於我我有天下多其力也我死勿令讒人間之仍令遂良草遺詔有頃上崩祕不發喪無忌等請太子先還飛騎徑兵及舊將皆從大行御馬輿繼至發喪宣遺詔罷遼東之役及諸土木之功四夷入仕及朝貢者數百人聞喪皆慟哭剪髮𠢐面割耳流血灑地六月太子即位是為髙宗太子初即位召朝集使謂曰事有不便於百姓者悉宜陳不盡者更封奏自是日引刺史十人入閣問以百姓疾苦及其政治長孫無忌褚遂良同心輔政故永徽之治百姓阜安有貞觀之遺風以長孫無忌為太尉李績時太宗二名俱諱故稱李績為開府儀同三司並同三品秋八月地震晉州尤甚壓殺五千餘人葬昭陵在西安府醴泉縣東北阿史那社爾契苾何力請殉葬上遣人諭以先旨不許蠻夷君長為先帝所擒服者頡利等十四人皆琢石為象列於北司馬門內范氏祖禹曰太宗以武撥亂以仁勝殘其材略優於漢高而規模不及也恭儉不若孝文而功烈過之矣迹其本性強悍勇不顧親而能畏義好賢屈已從諫刻勵矯揉力於為善此所以致貞觀之治也九月以李績為左僕射胡三省曰行先帝之治命也冬十二月詔濮王泰泰於貞觀二十一年徙封濮王開府置僚屬高宗皇帝庚戌永徽元年春正月立妃王氏并州祁人思政之孫為皇后秋九月右驍衛郎將高侃擊突厥車鼻可汗擒之初太宗以車鼻可汗不入朝遣高侃發兵討之至是侃至阿息山車鼻發諸部兵皆不應遂以數百騎走侃追獲之送京師獻於廟社及昭陵而赦之置狼山都督於鬱督軍山統其餘衆於是突厥諸部盡為內臣置單于瀚海二都護府宋白曰振武軍舊為單于都護府即漢定襄郡之盛樂也瀚海都護後移於回紇本部盛樂注見前十都督二十二州分統之冬十月以褚遂良為同州刺史監察御史韋思謙名仁約以字行鄭州陽武人劾奏遂良抑買人地左遷同州刺史辛亥二年秋七月西突厥賀魯逹頭可汗從曾孫叛自立為沙鉢羅可汗寇庭州貞觀中置漢車師後王庭也元和志州東至西州五百里詔武候大將軍梁建方等討之考唐書西突厥傳不言賀魯殺射匱通鑑亦但言擊破射匱綱目於是條綱書賀魯殺射匱目云西擊射匱滅之未知何據今依唐書通鑑改初西突厥乙毗咄陸可汗既奔吐火羅事具前其葉護阿史那賀魯以衆內屬詔以為瑶池都督處庭州之莫賀城賀魯招集離散廬帳漸盛聞太宗崩遂擊破乙毗射匱可汗建牙於千泉即石國千泉注見前自稱沙鉢羅可汗統有咄陸弩失畢十姓勝兵數十萬與乙毗咄陸連兵處月處密皆西突厥别部及西域諸國多附之至是進寇庭州攻陷金嶺城唐書地理志西州交河縣北行經栁谷度金沙嶺至北庭都護城詔梁建方契苾何力發兵三萬及回紇五萬騎以討之賀魯之叛處月朱邪孤注與之連兵明年梁建方等擊孤注斬之又二年乙毗咄陸死其子真珠葉護擊破沙鉢羅已而復為沙鉢羅所併冬十一月詔獻鷹隼犬馬者罪之壬子三年春二月御安福門樓觀百戲上謂侍臣曰朕舊聞胡人善為擊鞠王幼學曰擊鞠猶今言打毬謂騎而以杖擊之嘗一觀之昨初升樓即有羣胡擊鞠意謂朕篤好之也帝王所為豈宜容易朕已焚此鞠冀杜胡人窺望之情亦因以自戒秋七月立陳王忠後宫劉氏所生為皇太子王皇后無子其舅栁奭字子邵解人時為中書令為后謀以忠母微賤勸后請立為太子上從之冬十一月濮王泰卒子欣嗣癸丑四年春二月散騎常侍房遺愛元齡次子及高陽公主謀反伏誅遂殺荆王元景吳王恪流宇文節等於嶺表初房遺愛尚太宗女高陽公主公主驕恣與浮屠辨機等私通事覺怨望遂使掖庭令陳元運伺宫省禨祥遺愛亦與駙馬都尉薛萬徹尚髙祖女丹陽公主柴令武紹之子尚太宗女巴陵公主謀奉荆王元景為主以舉事至是公主謀黜遺愛兄遺直封爵使人誣告遺直罪上令長孫無忌鞫之更獲遺愛及主反狀吳王恪有文武才素為物情所向太宗欲立之無忌固爭而止事見前遂與無忌相惡無忌欲因事誅之遺愛因言與恪同謀冀得免死於是遺愛萬徹令武皆斬元景恪髙陽巴陵公主並賜自盡恪且死罵曰長孫無忌竊弄威權搆害良善宗社有靈當族滅不久宇文節江夏王道宗執失思力並坐與遺愛交通流嶺表道宗素與無忌及褚遂良不協故得罪罷元齡配饗甲寅五年春三月以太宗才人武氏為昭儀劉友益曰志禍始也初蕭淑妃有寵王皇后疾之上之為太子也入侍太宗見才人武氏而悅之太宗崩武氏隨諸嬪御出為尼忌日上詣寺行香見之泣后聞之隂令長髮納之後宫欲以間淑妃之寵武氏巧慧多權數初入宫屈體事后后數稱其美未幾大幸拜為昭儀后及淑妃寵皆衰更相與譖之上皆不納昭儀欲追贈其父而無名故託以褒賞功臣遍贈屈突通等而武士彠預焉夏閏四月帝在萬年宫即九成宫永徽二年更名夜大水上在萬年宫夜大雨山水衝元武門此萬年宫之元武門衛士皆走郎將薛仁貴曰天子有急敢畏死乎登門桄讀如肱門上橫木大呼以警宫內上遽出乘高俄而水入寢殿漂溺三千餘人胡氏寅曰高宗即位地震晉陽武氏入宫水入寢殿高宗既視之漠然大臣亦無以恐懼修省告者何人謀之忽不如天意之昭也六月恆州大水滹沱溢漂溺五千餘家冬十月築長安外郭雍州參軍薛景宣上言漢惠帝城長安尋宴駕今復城之必有大咎于志寧等以景宣言涉不順請誅之上曰景宣雖狂妄若得罪恐絶言路遂赦之上嘗謂宰相曰聞所在官司行事互觀顔面多不盡公長孫無忌對曰此豈能無然亦不至肆情曲法至於小小收取人情恐陛下亦不能免上嘉之為上嘗出畋遇雨即問諫議大夫谷那律曰油衣若則不漏對曰以瓦為之必不漏上恱為之罷獵諫引駕盧文操盜左藏物上命誅之諫議大夫蕭鈞曰文操情實難原然法不至死上乃免之顧侍臣曰此真諫議也論上嘗謂五品以上曰頃在先帝左右見五品以上事或仗下而陳或退上對事終日不絶豈今日獨無事邪何公等皆不言也谷那律魏州昌樂人蕭鈞瑀從子大稔洛中粟米斗兩錢半粳米斗十一錢隋開皇中户八百七十萬今三百八十萬以長孫無忌子三人為朝散大夫王皇后蕭淑妃與武昭儀更相譖訴后不能曲事上左右昭儀伺后所不敬者必傾心與相結由是后及淑妃動靜昭儀必知之皆以聞於上后寵雖衰然上未有意廢也會昭儀生女后憐而弄之后出昭儀潛扼殺之上至昭儀陽歡笑發被視之女已死矣即驚啼問左右左右皆曰皇后適在此上大怒曰后殺吾女昭儀因泣數其罪后無以自明上由是有廢立之志又恐大臣不從乃與昭儀幸長孫無忌第酣飲極歡拜無忌寵姬子三人皆為朝散大夫仍載金寶繒錦十車以賜無忌上因從容言皇后無子以諷無忌無忌對以他語上與昭儀皆不恱而罷禮部尚書許敬宗亦數勸無忌無忌厲色折之乙卯六年夏五月以韓瑗字伯玉京兆三原人為侍中來濟為中書令唐因隋制後宫有貴妃淑妃德妃賢妃皆視一品上欲特置宸妃以昭儀為之韓瑗來濟諫以為故事無之乃止秋七月貶吏部尚書柳奭為榮州唐置今為縣屬四川嘉定府刺史奭以皇后舅纍遷中書令已而后寵衰奭內不自安請解政事遂罷為吏部尚書至是武昭儀誣后與其母栁氏為厭勝禁不得入宫因并貶奭以李義府瀛州饒陽人為中書侍郎中書舍人李義府為長孫無忌所惡左遷壁州唐置宋省故城在今四川保寧府通江縣司馬義府問計於中書舍人王德儉許敬宗甥癭而智善揣事德儉曰上欲立武昭儀恐宰官異議君能建策立之則轉禍為福矣義府然之叩閣表請上恱留之超拜中書侍郎於是衛尉卿許敬宗御史大夫崔義元東武城人逞之後中丞袁公瑜皆潛布心腹於昭儀矣八月始置員外同正官員外同正自此始以裴行儉字守約仁基子為西州注見前長史長安令裴行儉聞將立武昭儀以國家之禍必由此始與長孫無忌褚遂良私議其事袁公瑜聞之以告昭儀母楊氏行儉坐左遷九月貶右僕射褚遂良為潭州隋置今湖南長沙府是都督上召長孫無忌李績于志寧褚遂良入內殿遂良曰今日之召多為中宫上意既決逆之必死太尉元舅司空功臣不可使上有殺元舅功臣之名遂良起於草茅無汗馬之勞致位至此且受顧託不以死爭之何以下見先帝績稱疾無忌等入上曰武昭儀有子欲立為后何如遂良對曰皇后名家子先帝為陛下娶之臨崩執陛下手謂臣曰朕佳兒佳婦今以付卿非有大故不可廢也上不悅而罷明日又言之遂良曰陛下必欲易后請擇令族何必武氏武氏經事先帝衆所共知萬代後謂陛下為何如臣今忤陛下意罪當死因執笏於殿階叩頭流血曰還陛下笏乞放歸田里上大怒命引出昭儀在簾中大言曰何不撲殺此獠無忌曰遂良受先朝顧命有罪不可加刑于志寧不敢言韓瑗因泣涕極諫上不納瑗又上疏曰妲己傾殷褒姒滅周每覽前古常興歎息不謂今日塵黷聖代陛下不用臣言臣恐宗廟不血食矣來濟上表曰王者立后上法乾坤必擇禮教名家幽間令淑副四海之望稱神祇之心漢成以婢為后卒使社稷傾淪惟陛下察之上皆不納他日李績入見上問之曰朕欲立武昭儀為后遂良固執以為不可事當且已乎對曰此陛下家事何必更問外人上意遂決許敬宗宣言於朝曰田舍翁多收十斛麥尚欲易婦况天子立一后何預諸人事而妄生異議昭儀令左右以聞貶遂良為潭州都督尋遷桂州遂良之貶潭州也韓瑗上疏為遂良訟寃曰遂良體國忘家損身徇物風霜其撡鐵石其心社稷之舊臣陛下之賢佐無罪斥去內外咸嗟願鑒無辜稍寬非罪上不聽瑗復言曰昔微子去而殷國以亡張華存而綱紀不亂陛下無故秉逐舊臣恐非國家之福上不納慶桂州注見前遂良徙桂州都督事在顯二年冬十月廢皇后王氏為庶人立昭儀武氏為皇后詔曰武氏門著勳庸地華纓黻往以才行選入後庭朕昔在儲二常得侍從嬪嬙之間未曾忤目聖情鑒悉每乘賞歎遂以賜朕事同政君漢元后可立為皇后后上表曰陛下前以妾為宸妃韓瑗來濟面折庭爭乞加褒賞上以表示之瑗等大懼屢請去不許百官朝后於肅儀門故后王氏淑妃蕭氏並囚於别院上嘗念之間行至其所呼之王后泣對曰至尊若念疇昔使得再見日月幸甚上曰朕即有處置武后聞之大怒遣人斷去手足投酒甕中曰令二嫗骨醉數日而死又斬之淑妃將死罵曰阿武妖猾乃至於此願他生我為貓阿武為鼠生生扼其喉由是宮中不育貓武后數見王蕭為祟如死時狀即徙蓬萊宫厲復見故多在洛陽不敢歸長安以中書侍郎李義府參知政事義府容貌溫恭與人語必嬉怡微笑而狡險忌刻故時人謂義府笑中有刀又以其柔而害物謂之李貓御批歷代通鑑輯覽卷五十一

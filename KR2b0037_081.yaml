front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷八十二宋欽宗皇帝丙午靖康元年金太宗完顔晟天㑹四年注是年後依東音例金國用分紀年春正月詔中外臣庶直言得失
  hash: sha256:562f2b3364623e4a48d903849333a97d84de90cc1ab50e26b2c9196616ac590f

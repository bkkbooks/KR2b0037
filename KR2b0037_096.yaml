front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷九十七元武宗皇帝戊申至大元年春正月以阿實克布哈為右丞相行御史大夫事
  hash: sha256:3da4020df17c8c3e8d6e9c902cf8a8f7d3ee0e83202f1e836aa9406f689c005a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_096-1a, image: WYG0339/WYG0339-0075a.png}
body:
  text: 初阿實克布哈見帝容日悴乗間進曰陛下八珍之味不知御萬金之身不知愛而惟麴蘖是耽妃嬪是好是猶兩斧代孤樹未有不顛仆者陛下縦不自愛獨不思祖宗付託之重天下仰望之切乎帝大悦曰非卿孰為朕言因命進酒阿實克布哈頓首謝曰臣欲陛下節飲而反勸之是臣之言不信于陛下也臣不敢奉詔左右皆賀帝得直臣遂授右丞相行御史大夫事尋以太子請復入中書既又賜爵康國公兩浙饑民饑者四十六萬户死者甚衆詔户月給米六斗以沒入朱清張瑄財産賑之時浙東宣慰同知托歡徹爾議行勸貸令斂富民錢百五十餘萬以二十五萬屬寧海縣晉縣今屬台州府簿胡長孺字汲仲婺州永康人藏之長孺察其有乾沒意悉散于民既而果索其錢長孺抱成案進曰錢在是托歡徹爾雖怒不敢問西僧毆上都留守李璧釋不問西番僧之在上都者强市民薪民訴于璧璧方詢其由僧已率其黨持白梃突入公府隔案引璧髮摔諸地捶扑交下拽歸閉諸空室久乃得脱奔訴于朝僧竟遇赦免未幾其徒恭噶舊作龔柯等與諸王哈喇巴爾舊作合兒入剌今改妃爭道拉妃墮車毆之語侵上事聞亦釋不問時宣政院方奉㫖言毆西僧者㫁其手詈者截其舌皇太子聞之亟上言此法昔所未有遂寢其令三月建興聖宫為皇太后所居帝如上都夏六月隴西雲南地大震加宦者李邦寧大司徒兼左丞相邦寧在宋為小黄門初従瀛國公入見世祖留給事内庭至是帝欲以為江浙平章辭曰臣以閹腐餘命前朝赦而用之使承乏中涓今陛下復欲置臣宰輔臣聞宰輔者佐天子共治天下者也奈何辱以寺人陛下縦不臣惜如天下後世何誠不敢奉詔帝大悦加大司徒遙授左丞相仍領太醫院事秋七月皇子和實拉帝長子即明宗按和實拉舊作和世㻋今改後仿此請括河南田詔止之和實拉請立總管府括河南歸徳汝寧瀕河荒地嵗收其租中書言瀕河之地出沒無常近有齊黙格舊作赤馬罕今改者妄稱省中委之括地以有主之田指為荒地所至騷動被害之民相率来愬方議其罪遇赦獲免今乃妄以其地獻于皇子且河南連嵗凶荒脱従所請為害非細帝曰安用多言其止勿行築呼鷹臺于漷州本遼漷隂縣元升漷州明改為縣呼本朝省故城在今順天府通州南鷹臺在今通州故漷縣西南亦名晾鷹臺初改鷹坊為仁虞院秩正二品命右丞相托克托等為院使領其事至是築呼鷹臺漷州澤中發軍千五百人助其役以塔斯布哈舊作荅思不花為右丞相竒塔特布濟克舊作乞台普濟今並改後仿此為左丞相詔内外機務並従中書區處諸王公主駙馬等毋沮撓之近侍官屬及内外諸司事非由中書議者毋隔越奏聞八月諸路水旱蝗時淮揚旱蝗江浙大水詔凡發使賑貸之處差税並蠲除之仍令有司贖饑民所鬻子女中書省臣言夏秋之間鞏昌地震歸徳暴風濟寧㤗安真定大水民居蕩析江浙饑荒之餘疫癘大作死者相枕藉父鬻其子夫離其妻哭聲震野所不忍聞是皆臣等不才猥當大任以致隂陽失序願避賢路帝曰災害有由非爾等所致也但當慎所行爾九月帝還大都冬十月以西僧嘉勒斡巴勒舊作教瓦班今改為翰林學士承㫖十一月省臣奏請汰冗官節財用省臣言世祖時自中書以下諸司官有定員邇者諸司遞陞一級一司多至二三十員事不改舊而官日増乞如大徳十年員數冗濫悉汰之又今中都築城大都建寺及為諸貴近營造私第軍民困斃廩藏空虚而用度日廣毎賜一人動至鉅萬恐至不繼宜暫節縮况百司之事毎于中書有干預者乞申禁之帝曰嘗令諸人毋干中書之政他日或有乗朕忽忘持内降文記至中書者其執之以來禁賈人乗驛時有進沉檀異木可構宫室者勅江浙行省驛致之中書省臣言西域賈人佩虎符馳驛馬名奉勅求珍異乃或以一豹上獻亦要回賜虎符國之信器驛馬使臣所需畀之商賈誠非所宜既又言江浙諸驛半嵗之間使人過者千二百餘桑烏保赫鼎舊作三布瓦丁等進獅豹鴉鶻數日食肉千餘斤自今有來獻者乞令自備資力従之覈天下屯田中書言天下屯田一百二十餘處由所用非人多致廢弛除四川甘州應昌元路地在今克西克騰西北雲南為地遼逺餘當選習農務者往覈其可興者興可廢者廢詔従之閏月太傅哈喇哈斯卒諡忠獻伊徹察喇進攻徹伯爾諸部漠北悉平伊徹察喇言徹伯爾諸王之在邊境者素無悛心儻諸部合謀必為國患請撫安都勒斡子庫春舊作欵徹今改及處諸部來歸者于金山之陽遣軍屯田山北脱彼有謀吾已𢷬其腹心矣帝稱善趣進軍攻之徹伯爾等果欲奔庫春不納遂相率來降漠北悉平左遷敬儼字卿其先河東人後徙易水為兩淮轉運使時儼為江南治書侍御史以議立尚書省不便忤宰臣意適兩淮鹽法久滯乃左遷儼為左運使欲䧟之儼至黜貪理敝課復増羡至二十五萬引河南省臣來㑹鹽莢欲以所増羡為嵗入常額儼以民罷已甚以羡為額病民以為己不可遂止己酉二年春正月越王圖喇有罪賜死圖喇居常怏怏有怨望意前秋帝幸涼亭元時廵幸駐蹕處有東西二凉亭廢址在故開平城南明置驛于此去古北口四百六十餘里將御舟圖喇前止之言渉不遜帝由是銜之及宴萬嵗山在今獨石口外上駟院牧厰東土人名額勒哲伊圖阿爾賔鄂拉山圖喇醉起解腰帶擲地瞋目謂帝曰爾與我者止此耳帝疑其有異志命省臣鞫之辭服遂誅之始親饗太廟以受尊號告謝太廟為親饗之始是冬以上太祖睿宗尊諡廟號及光獻莊聖皇后尊諡復親饗光獻太祖后莊聖睿宗后追還内降璽書丞相塔斯布哈等言朝廷璽書不由中書徑令翰林頒給者自大徳六年至今凡六千三百餘道皆千土田户口錢榖銓選獄訟害民妨政之事請悉追奪後凡不由中書者乞勿予之制可帝如上都御史言京師之内工役繁興加之嵗旱民饑狂愚易惑今乗輿行幸乞命丞相一人留守京師著為令従之夏六月復徴僧道賦税従省臣言也秋七月河決歸徳又決封邱八月復置尚書省以竒塔特布濟克為右丞相托克托舊作脱虎脱左丞相三寳努舊作三布瓦約蘇平章政事保巴舊作保八右丞孟克特穆爾舊作忙哥鐵木兒今並改左丞王羆參知政事初帝欲復置尚書省分理財用御史臺臣言前者阿哈瑪特僧格相繼立尚書省綜理財用事敗併入中書今四方地震水災嵗仍不登百姓重困又復立之則必増置有司濫設官吏殆非益民之事且綜理財用在人為之若止命中書未見不可帝雖是其言而仍欲行之至是命約蘇保巴與塔斯布哈集議保巴言政事得失皆前日中書所為今欲舉正彼懼有累孰願行者臣請乞舊事従中書新政従尚書尚書省官以竒塔特布濟克托克托為丞相三寳努約蘇為平章保巴為右丞王羆為參知政事帝並従之三寳努言尚書省既立更新庶政變易鈔法用官六十四員其中宿衛之士有之品秩未至者有之未歴任者有之此皆素習于事既已任之乞勿拘例授以宣勑仍改各行中書省為行尚書省以尚書省條畫頒示天下敢有沮撓者罪之置太子右衛率府命右丞相托克托御史大夫布琳尼敦舊作不里牙敦今改後仿此領府事取河南䝉古軍萬人𨽻之王約曰左衛率府舊制有之今置右府何為諸公深思之不可以累儲宫也太子又命取安西兵器給宿衛士約謂詹事鄂勒哲曰詹事移文數千里取兵器人必驚疑主上聞之奈何鄂勒哲愧曰實不慮及此家令薛居言陜西分地五事命往理之約不為署行語之曰太子潛龍也當勿用之時為飛龍之事可乎遂止太子喜諭羣下曰事未經王彦博議者勿啟一日約方啟事二宦官侍側太子問曰自古宦官壊人家國有諸對曰宦官善惡皆有之但恐處置失宜耳太子深然其言九月頒行至大銀鈔帝従約蘇言鈔法大壊乃改造至大銀鈔凡十三等毎一兩准至元鈔五貫白銀一兩黄金一錢隨路立平准行用庫及常平倉以權物價毋令沸騰元之鈔法至是凡三變云帝還大都始鑄錢先是鈔法雖皆以錢為文而廢錢弗鑄至是始詔大都立資國院山東河東遼陽江淮湖廣四川立泉貨監六産銅之地設提舉司十九秩従五品錢文曰至大通寳者毎一文准銀鈔一釐曰大元通寳者准至大錢十文與歴代錢通用其當五當三折二並以舊數用之既而御史言至大銀鈔始行品目繁多民猶未悟而又兼行銅錢慮有相妨今民間拘収銅器甚急民殊不便乞與省臣詳議不報復行内降㫖尚書省言三宫内降之㫖曩中書奏請勿行臣等謂宜仍舊行之儻于大事有害則復奏請中書之務乞以盡歸臣等従之冬十月以皇太子兼尚書令初帝従竒塔特布濟克等言由尚書省任人以宣勅散官委之中書至是太子言舊制百官宣勅皆歸中書以臣為中書令故也自今勅牒宜令尚書省給降宣命仍委中書従之質江南富民子為軍約蘇言江南平垂四十年其民止輸地税餘皆無與富室有占編民奴役之者動輒百千家有多至萬家者其力可知乞令有司収糧五萬石以上者石輸二升于官仍質一子而軍之所輸之糧半入京師以飬御士半留于彼以備凶年富國安民無善于此詔如其言行之十一月以阿薩爾為尚書左丞相行中書平章政事尋出商議遼陽行省事庚戊至大三年春正月徵李孟入見以為同知樞宻院事初孟既逃去有譖于帝者曰内難初定時孟嘗勸皇太子自取帝弗之信一日太子侍内宴忽戚然改容帝曰吾弟何不樂太子従容起謝曰賴天地祖宗神靈神器有歸然成今日母子兄弟之歡者李道復之功居多適思之不自知其變于色也帝即命捜訪之得于許昌陘山在今許昌府新鄭縣西南亦作邢山為南北隘道山海經所云少陘之山是也謂宰臣曰此皇祖妣命為朕賓師者宜速任之乃命以中書平章事集賢大學士同知樞宻院事立皇后鴻吉哩氏托琳子班巴爾之女不托琳舊作脱憐班巴爾舊作迸剌今並改二月寧王庫庫楚世祖第九子謀反流于髙麗庫庫楚與圖喇子喇特納實里舊作阿剌納失里今改後仿此謀為不軌事覺下庫庫楚獄竄喇特納實里于漠北磔西僧特哩舊作鐵里今改等二十四人于市遂欲誅庫庫楚平章政事特爾格獨辨其誣詔釋之流于髙麗三月賜諸王徹伯爾幣帛初世祖以海都叛詔積其分地五户絲為幣帛俟其來降賜之至是其子徹伯爾來歸尚書省臣請以賜之帝命省臣備述其故以與之使彼知所愧夏五月詔尚書省右丞相托克托左丞相三寳努總治百司庶務尋加托克托太師爵義國公三寳努爵楚國公荆襄大水山崩襄陽峽州路荆門州大水壊官廨民居二萬一千八百餘間死者三千四百餘人汝州六安州循州皆大水冬十月詔減宫人膳尚書省言宣徽院元置秩正三品掌供玉食及燕享之事廪給日増儲㣥雖廣亦不能給帝曰比見後宫飲膳與朕無異其覈實減之十一月始以太祖配享南郊先是三寳努等言奉詔舉行郊祀典禮臣等議欲祀北郊必先南郊今嵗冬至祀天圜丘尊太祖皇帝配享來嵗夏至祀地方丘尊世祖皇帝配享至是有事南郊以太祖配享上帝殺大都留守鄭阿爾斯蘭制宜之子舊作阿兒思蘭今改後仿此阿爾斯蘭襲父職為武衛都指揮使尚書省搆其與兄榮祖等十七人圖為不軌置獄鞫之並棄市籍其家中外寃之城中都在翁郭察圖之地元時建為中都今鑲黄等旗牧厰西北故沙城是也土人名為察罕巴勒哈遜城旺按翁郭察圖舊作兀察都今改以牛車運土各部衛士助之限以來嵗四月畢集失期者罪辛亥四年春正月帝崩夀三十一國語稱曰庫魯克皇帝庫魯克䝉古語傑出之謂元史舊訛作曲律今譯改史臣曰帝慨然欲創治改法而有為故其封爵大盛而遥授之官衆賜賚太隆而泛賞之思溥至元大徳之政于是稍有變更云皇太子罷尚書省誅托克托三寳努約蘇按宰相年表約蘇時為平章政事續綱目于三年二月書以約蘇為左丞相本紀並同盖當時遥授之職以丞相仍領平章非真相也今特刪其前文而附辨于此保巴王羆流孟克特穆爾于海南皇太子以托克托等變亂舊章流毒百姓凡悞國者欲悉按誅之延慶使楊多爾濟河西寧夏人舊作朶爾只今改後仿此諫曰為政而首尚殺非帝王治也太子感其言特誅其尤者既而御史言托克托等既正典刑而黨附之徒布在百司若博囉特穆爾竒爾濟蘇烏訥爾舊作烏馬兒今改後仿此等奸貪害政令中書方欲用為各省平章叅政等官宜加罷黜従之尋復以行尚書省為行中書省百司庶務復歸中書罷城中都皇太子以司徒蕭珍城中都徼功毒民命追奪其符印令百司禁錮之凡中都所占民田悉還之民以特門徳爾瑪拉噶齊之子舊按特們徳爾舊作鐵木迭兒瑪拉噶齊作木兒火赤今並改後仿此為右丞相鄂勒哲李孟並平章政事召先朝舊臣程鵬飛等十六人召先朝諳知政務老臣程鵬飛董士選李謙字受益鄆之東阿人張閭陳天祥尚文字周卿祁州深澤人徙保定劉正郝天挺字繼先出于朶魯别族世居安肅州董士珍蕭􅝥字惟斗奉元人劉敏中字端甫濟南章邱人王思亷字仲常真定獲鹿人韓従益趙君信程文海阿哈瑪特杭州路逹魯噶齊此又一阿哈瑪非世祖時奸臣阿哈瑪特也詣闕同議庶政不赴召者五人按元史陳天祥傳言天祥辭疾不至又劉敏中蕭㪺傳俱言于武宗朝辭歸不復起是亦召而不至者餘無考謙至首陳九事正陳八事皆欲朝廷守成憲開言路重名爵節財用興學校定律令舉切時弊二月罷喀喇托克托為江浙行省左丞相托克托至進父老問民間利病咸謂杭城舊有便河通江滸湮廢已久若疏鑿以通舟楫物價必平僚佐或難之托克托曰吾陛辭時宻㫖許以便宜行事民以為便行之可俄有詔禁作土功托克托曰敬天莫先勤民民䝉其利則災沴自弭土功何尢也不一月河成三月皇太子阿裕爾巴里巴特喇即位是為仁宗皇太后欲用隂陽家言令太子即位隆福宫御史中丞張珪言當御大明殿太子悟移仗大明殿既即位親解所御衣及濟遜衣元史舊作只孫輿服志云一色服也按今䝉古語凡物之顔色謂之濟遜只孫盖音譯之訛今改正二十襲金帶一賜之詔百司遞陞品秩者復舊制詔武宗時百司遞陞品秩者悉従至元舊制既又諭省臣曰卿等裒集中統至元以來條章擇老臣明法律者斟酌重輕折中歸一頒行天下俾有司遵行之則抵罪者庶無寃抑寧夏地裂遣宦者李邦寧釋奠于孔子邦寧既受命行禮方就位忽大風起殿上及兩廡燭盡滅燭臺底鐵鐏入地尺許無不拔者邦寧悚息伏地諸執事者皆伏良久風息乃成禮邦寧因慚悔累日初帝在東宫邦寧知三寶努等畏帝英明乗間言于武宗曰陛下富于春秋皇子漸長父作子述古之道也未聞有子而立弟者武宗不悦曰朕志已定汝自往東宫言之邦寧慚懼而退及帝即位左右咸請誅之帝曰帝王歴數自有天命其言何足介懐加邦寧開府儀同三司為集賢院大學士尋死夏四月罷行至大銀鈔銅錢詔以中統至元鈔法行之五十餘年比因尚書省妄事變更既創至大銀鈔又鑄大元至大銅錢鈔以倍數太多輕重失宜錢以鼓鑄弗給新舊恣用曽未再期其弊滋甚命悉罷之時楊多爾濟曰法有便否不當視立法之人為廢置銅錢與楮弊相權而用古之道也何可遽廢邪言雖不用時論是之五月遣兵擊八百媳婦帝以八百媳婦寇邊命雲南王及右丞阿固岱此又一阿固岱非成宗時左丞相之阿固岱也討之陜西侍御史趙世延字子敬其先永古特族人居雲中北邊祖鞠于外家譌為趙因氏焉按永古特舊作雍古今改諫曰蠻夷事在覊縻先朝用兵不已至亡失軍旅誅戮省臣今第當選重臣知治體者付以邊寄兵宜勿用也不聴秋閏七月賜李孟爵秦國公孟感帝知遇頗以國事為己任節賜與重名爵覈大官之濫費汰宿衛之冗員貴戚近臣惡其不便于己而心服其公皆無間言時風俗奢糜車服僭擬上下無章孟請各為之限制帝皆従之初帝在懐州深見吏弊既即位欲痛剗除之孟曰吏亦當有賢者在激厲之而已帝曰卿儒者宜與此曹氣類不合而曲為保䕶如此真長者言也嘗謂之曰朕在位必卿在中書賜爵秦國公圖其象命祀臣贊之毎入見稱曰道復而不名増國子生為三百人帝既命李孟領國子學至是又諭省臣曰昔世祖注意國學如博果宻等皆䝉古人而教以成材朕今親定國子生為三百人仍増陪堂生二十人通一經者以次補伴讀著為式既而孟等言方今進用儒者而老成日以凋謝四方儒士成材者請擢任國學翰林祕書太常或儒學提舉等職俾學者有所激勸帝従之詔自今勿限資級果材而賢雖白身亦用之九月還安南國王陳益稷舊賜田益稷入見言臣自世祖朝來歸妻子皆為國人所害朝廷因遥授王爵賜漢陽田五百頃俾自贍今臣年幾七十而有司拘所授田就食無所帝謂省臣曰益稷來歸宜厚賜以懐逺人其進勲爵授田如故冬十一月罷營繕李孟奏錢糧為國之本今毎嵗支鈔六百餘萬錠又土木營繕百餘處計用數百萬錠内降㫖賞賜復用三百餘萬錠北邊軍需又六七百萬錠帑藏見貯止十一餘萬安能周給浮費宜悉停罷帝納其言罷諸營繕時都水監傳㫖給驛往取杭州所造龍舟省臣諫曰陛下踐阼詔天下凡非宣索毋得擅進誠取此舟有乖前詔遂命止之十二月詔停内降旨帝初諭省臣曰朕前戒近侍毋以文記傳㫖中書敢有犯者徑逮其人治之至是省臣復言祖宗立選法明黜陟以示激勸今官未及考或無故更代或躐等進階僭受國公丞相等職諸司已裁而復置者有之今春以來内降旨除官千餘人其中欺偽豈能盡知壊亂選法莫此為甚帝曰自今凡内降旨一切勿行仁宗皇帝壬子皇慶元年春正月制進翰林國史院秩帝諭省臣曰翰林集賢儒臣須朕自選用毋輒擬奏人言御史臺任重朕謂國史院尤重盖御史臺是一時公論國史院是萬世公論于是陞翰林國史院秩従一品尋勅博選中外才學之士居之夏六月乙丑朔日食勅左右勿僥倖乞加官時朝廷封拜繁多羣臣無功而受王公之爵者前後相繼于是誡左右勤職業勿妄僥倖加官御史中丞郝天挺言自先帝即位之時大事初定故于左右三五有功之人爵之太髙遂使近倖之臣因而相襲王公師保接迹于朝比者雖令追印裁罷曽未經嵗又復紛然不知朝廷名器重則升斗之祿足以鼓舞豪傑名器濫則雖日拜卿相而人不勸矣又言國初設官在内須三十月在外須三周嵗考其殿最以為黜陟比者省院臺部之臣久者一二嵗少者三五月甚有旬日之間而屢遷數易者奔走往来不暇何暇宣風布化叅理機務哉乞自今惟大臣可急闕選授其餘内外大小官屬必候任滿方許超選庶免朝除夕改啟倖長奸之弊冬十二月李孟罷以張珪為平章政事孟以請告還朝即堅求謝事命以平章政事承㫖翰林而以樞宻副使張珪代之時帝欲以伶人曹耀珠舊作咬住今改後仿此為禮部尚書珪曰伶人為宗伯何以示後世力諫止之癸丑二年正月特們徳爾罷以圖古勒舊作秃忽魯今改後仿此為右丞相先是以平章阿薩爾為左丞相章律為平章政事事在元年五月後二年閭以强奪民田為中丞楊多爾濟所劾罷至是特們徳爾以病去職以太府卿圖古勒代為右丞相三月立皇后鴻吉哩氏彗出東井丞相圖古勒等以天象示警奏請罷黜帝曰事豈関汝輩其勿復言御史臺亦言富人夤縁特㫖濫授官爵徽政宣徽用人多廢罪之流内侍託為貧乏互奏恩賞而西僧以作佛事之故累釋重囚諸王駙馬寺觀土田徴租民間擾害尤甚皆今之弊政所宜悉革也制従之夏六月京師地震詔以周敦頤程顥程頤張載邵雍司馬光朱熹張栻吕祖謙許衡並従祀孔子廟庭河決陳亳睢三州開封陳留等縣皆決漂民田廬無算冬十一月初詔行科舉初世祖時議定科舉新制未及行至是中書省臣復以為言乃命定其條制下詔行之科塲毎三嵗一次開以皇慶三年八月為始天下郡縣興其賢能充賦有司次年二月㑹試京師中選者親䇿之第一塲明經經疑二問大學論語孟子中庸内出題並用朱氏章句集註限三百字以上經義一道各治一經限五百字以上弟二塲古賦詔誥章表内科一道第三塲䇿一道經史時務内出䝉古色目人與漢人南人各命題䝉古色目人願試漢人南人科目中選者加一等注授京師大旱疫帝問弭災之道翰林學士程鉅夫舉湯禱桑林事以對帝歎曰此實朕之責也赤子何罪陜西行臺治書侍御史尉遲徳誠字信甫絳州人亦上言西僧以作佛事疎放罪囚以為祈福奴婢殺主妻妾殺夫皆獲夤縁以免實紊典常必欲修政以答天譴夫豈有先于此者哉甲寅延祐元年春二月以趙世延恭知政事省臣言比奉詔漢人恭政宜用儒者侍御史趙世延其人也帝曰世延誠可用然永古特氏非漢人其署宜居右遂拜恭知政事夏五月勅自今宦者勿得授文階秋八月地震冀寧汴梁及武安漢縣元𨽻磁州今屬彰徳府涉縣晉縣元𨽻真定路今亦屬彰徳府壊官民廬舍壓死者三百四十人九月復以特們徳爾為右丞相圖古勒罷以阿薩爾代為右丞相阿薩爾自言非世勲族姓不可以居右相因舉特們徳爾自代遂拜特們徳爾開府儀同三司録軍國重事至是復拜右丞相而仍以阿薩爾為左丞相未幾李孟亦復起為平章政事後三年孟罷以王毅代之冬十二月詔定官民車服之制帝以士民靡麗相尚僭禮費財命中書省定車服等第惟䝉古及集賽諸色人不禁然亦不許服龍鳯文復以齊履謙注見前為國子司業帝初即位履謙與呉澄字㓜清撫州崇仁人俱在國學教飬有法未幾以履謙僉太史院事學制稍廢至是復以履謙為司業乃酌舊制議立升齋積分之法毎季攷其學行以次第升既升上齋踰再嵗始與私試詞理俱優者一分辭平理優者為半分嵗終積至八分者為髙等禮部集賢嵗選六人以貢帝従其議詔經理江浙江西河南民田章律言經理之法世祖已行但其間尚多欺蔽遂遣律等往三省行之限民四十日以其所冇田自實于官期限猝廹貪刻用事富民黠吏並縁為姦于是民不聊生盗賊蜂起田野荒蕪其弊反有甚于前者樞宻副使呉元珪注見前入見言世祖限田四百畆以給軍需餘田悉令賦税况江南之平幾四十年户有定籍田有定賦今經理之法務以増多為能加之有司頭㑹箕斂元元困苦日甚臣恐變生不測非國之福帝命仍遵舊制乙夘二年春正月遣使廵行天下詔遣宣撫使分十二道問民疾苦黜陟官吏三月廷試進士賜呼圖克岱舊作䕶都㳫兒今改後仿此張起巖等五十有六人及第出身有差分進士為兩榜䝉古色目人為右漢人南人為左第一名従六品第二名以下及第二甲皆正七品第三甲正八品兩榜並同夏四月戊寅朔日食五月成紀縣山移是夜疾風電雹北山南移至夕河州即夕陽河在今秦安縣西寰宇記羅谷水分流入夕陽河是也次日再移平地突出土阜髙者二三丈䧟沒民居監察御史馬祖常字伯庸世為永古特人居靖州言山不動之物今而動焉由在野有當用不用之賢在官有當言不言之佞故致然爾時帝在位久猶居東宫飲酒常過度祖常復上書言天子承天繼統當極保愛玉食之御猶審五味之宜酒醴之供可不思百拜之義大内正衙朝賀之地雖陛下不忘東宫之舊竊慮起民間觀聴之疑且國家百年朝儀尚闕誠使羣臣奏對之際御史執簡史官執筆則雖有懐奸利乞官賞者不敢出諸其口乞令中書集議或三日二日常出視朝則治道昭明生民之福也加宦官續元暉昭文館大學士江西湖廣饑秋七月畿内大雨水贛州民蔡五九作亂擒斬之初經理之法既行特們徳爾猶以為未實復下令括田増税鼐智宻鼎舊竹昵匝馬丁今改後仿此在江西酷虐尤甚信豐注見前一縣撤民廬千九百區夷墓揚骨以為所増頃畆居民怨毒入骨贛州民蔡五九等遂率衆冦抄汀漳諸路䧟寧化縣唐縣今屬汀州府據之稱王建號詔遣章律討之擒斬五九餘黨悉平以趙世延為御史中丞世延自参知政事遷中丞詔省臣自平章以下送之入臺其禮前所無有由是為特們徳爾所忌用太后㫖出為雲南右丞陛辭帝令仍為中丞冬十月以郭貫字安道保定人為參知政事貫初為河東亷訪副使帝在東宮時幸五臺注見前因問河東亷訪使穆爾濟逹舊作滅里吉歹今改後仿此何以有善政左右曰副使郭貫之教也厚賜之及帝即位累遷至淮西續綱日作浙西今従元史本傳改正亷訪使至是以為参知政事十一月彗見紫薇垣赦丞相阿薩爾以星變乞避位帝曰此朕之愆豈卿等所致其復乃職苟政有過差勿憚于改凡可安百姓者當悉言之因赦免各路差税有差立武宗子和實拉為周王出鎮雲南初武宗既立帝為太子丞相三寳努復勸立和實拉召喀喇托克托言之托克托曰太弟曩定宗社居東宫久兄弟叔姪世世相承孰敢紊其序三寳努曰今日兄已授弟異日能保叔授其姪乎托克托曰在我不可渝彼失其信天實監之至是議立太子丞相特們徳爾欲邀寵請立皇子碩廸巴拉帝嫡子即英宗舊作碩徳八喇今譯改又與太后幸臣實勒們此又一實勒們非前定宗時之實勒們也譖王于兩宫遂封為周王遣出鎮雲南詔免江浙等三省自實田租二年時方警贛州之亂而章律在江浙復以括田廹民有至死者御史臺尚書累言經理及括田之害詔罷之復令河南自實田自延祐五年始止科其半而汴梁一路凡減虚増之數一十二萬石丙辰三年春三月平章政事張珪謝病歸初皇太后以特們徳爾為太師張珪嘗論其不可至是帝如上都方度居庸闗實勒們𫝊太后㫖召珪切責杖之珪創甚輿歸京師明日遂出國門時珪子景元宿衛左右以父病篤辭還帝驚問故殊不懌遣使賜之酒進拜大司徒遂謝病歸禁方春畋獵初有議禁民畋獵犯者抵死左司郎中韓若愚字希賢保定滿城人曰齊宣王之囿方四十里殺其麋鹿者如殺人之罪孟子非之衆以為然遂輕其刑太史令郭守敬卒自宋以來學者于天文水利多不講守敬獨能任其絶學以成一代之制太史令王恂毎見其制度精巧深歎服之所著推步測驗諸書並藏于官卒年八十六冬十月以趙孟頫為翰林學士承旨帝在東宫素知孟頫名及即位召除集賢侍講學士至是拜翰林學士承㫖有問之者言國史不宜令孟頫與帝曰子昂世祖所簡㧞朕置之館閣使典述作傳之後世此屬呶呶何也復厚賜之十一月周王和實拉逃居漠北和實拉次延安其臣圖古勒此又一圖古勒非前右丞相之圖古勒也及武宗舊臣哩日舊作釐曰今改後仿此等來㑹常侍嘉琿舊作教化今改後仿此謀曰天下者我武宗之天下也王之出鎮本非上意由讒搆致然請聞之朝廷庶可杜塞離間遂與陜西丞相阿斯罕舊作阿思罕今改後仿此平章塔齊爾此又一塔察爾非前博勒呼之従孫也行臺御史大夫圖魯卜舊作脱里伯今改後仿此中丞托歡發闗中兵分道自潼闗河中府入已而塔齊爾背約襲殺阿斯罕嘉軍于河中和實拉西走至金山西北附諸王察克台舊作察克台今改後仿此等部居之十二月立子碩廸巴拉為皇大子仍兼中書令樞宻使丁巳四年春二月詔郡縣復置義倉夏四月不雨帝嘗夜坐謂侍臣曰雨暘不時奈何蕭拜珠契丹舒穆魯氏時為平章政事曰宰相之過也帝曰卿不在中書邪拜珠惶愧頃之帝露香禱于天既而大雨左右以雨衣進帝曰朕為民祈雨何避焉六月特們徳爾罷以阿薩爾為右丞相特們徳爾之再入相怙勢貪虐兇穢滋甚中外切齒羣臣不知所為平章政事蕭拜珠稍牽制之中丞楊多爾濟慨然以糾正其罪為己任上都富民張弼殺人繫獄特們徳爾使家奴脇留守賀勝字貞卿一字舉安小字巴延以小字行使出之勝不可多爾濟亷得特們徳爾受弼賂鉅萬萬家奴猶數千乃與拜珠及勝奏之而内外御史凡四十餘人共劾其桀黠姦貪欺上罔下占據御史田及衛兵牧地竊食郊廟供祀馬受諸王珍玉之賄動以萬計誤國之罪又在僧格阿哈嗎特上四海疾憤咸願車裂斬首以快人心奏上帝震怒特們徳爾懼逃匿太后宫帝為不御酒食數日以待決獄盡誅其同惡數人特們徳爾終不能得多爾濟持之益急太后召多爾濟責之帝不忍傷太后意但罷其相位而遷多爾濟為集賢學士命優恤䝉古部民及衛士帝諭省臣曰比聞䝉古諸部困乏往往鬻子女于民家為奴婢其命有司贖還各部又帝出見衛士有弊衣者駐馬問之對曰戍守邊鎮餘十五年以故貧耳帝曰此輩久勞于外留守臣未嘗以聞非朕親見何由知之自今有類此者必言于朕因命賜之錢帛秋九月以博廸蘇舊作伯答沙今改後仿此為右丞相阿薩爾為左丞相初阿薩爾奏事畢帝曰卿等日所行者何事對曰奉行詔㫖而已帝曰卿等何嘗奉行朕㫖雖祖宗遺訓朝廷法令皆不遵守夫法者所以辨上下定民志自古未有法不立而天下治者使人君制法宰相能守法則民知畏避免于刑戮若法弛民慢怨言並興求治難矣阿薩爾言故事丞相必用䝉古勲臣臣西域人不厭人望因懇辭遂以宣徽使博廸蘇為右丞相阿薩爾仍左丞相嶺北即和林路元初置和林總管府至仁宗皇慶元年改名和寧路總管府立嶺北等處行中書省以統之地震三日戊午五年春正月賜邁珠舊作買住今改後仿此爵魯國公邁珠由湖廣平章政事進爵魯國公大司農未幾御史言比年以名爵太濫方詔裁罷近聞禮部鑄太尉司徒等印二十有六此輩無功于國載諸史冊貽笑將來宜令革去従之二月癸巳朔日食寫金字佛經詔書西天字維摩經共糜金三千餘兩初宣徽院使嵗㑹内佛事之費以觔數者麫四十三萬九千五百油七萬九千酥宻共五萬餘盖自至元三十年間醮祠佛事之目僅百有二大徳七年再立功徳使司増至五百餘至是僧徒冒利無厭嵗費滋甚較之大徳數又加倍夏六月術者趙子玉謀作亂伏誅魏王阿穆爾克順宗長子仁宗之兄續綱目作衛王考元史宗室世系表及諸王表並作魏王續綱目盖沿本紀之誤又阿穆噶舊作阿木哥今並改正貶髙麗子玉言于王府司馬曹圖布台舊作脱不台今改後仿此曰阿穆爾克名應圖䜟因潛謀備兵器航海往髙麗取阿穆爾克至大都竢時而發行次利津縣金置元𨽻濱州今屬武定府事覺詔誅子玉等七人冬十一月増江南茶税初世祖時置𣙜茶都轉運司于江州總江南及兩淮茶税尋改江西其税自二萬四千錠以漸増至一十九萬二千八百錠至是又因江西茶副帕哈哩鼎舊作法忽魯丁今改後仿此言立減引増課之法勅以二十五萬錠為額復増至二十八萬九千餘錠郡縣所輸竭山谷之産不能充其半餘皆鑿空取之民間嵗以為常時轉運司得以専制有司凡五品以下官皆杖決州縣莫敢誰何江南僉事鄧文原字善之綿州人徙錢塘請罷其司俾郡縣領之不報己未六年春二月丁亥朔日食夏四月以特們徳爾為太子太師特們徳爾家居未逾年復夤縁為太子太師中外聞之莫不驚駭時御史中丞趙世延論其不法數十事並内外臺劾其不可輔𨗳東宫者又四十餘人然以太后之故皆不聴揚州火燬官民廬舍二萬三千五百餘區六月山東准南諸路大水冬十二月詔太子参決朝政帝嘗顧侍臣曰卿等以朕居帝位為安邪朕惟祖宗創業艱難恒懼不能守成使百姓樂得其所朕念慮在兹卿等固不知也至是復語左右曰前代皆有太上皇之號今太子且長可居大位朕欲為太上皇與若等遊觀西山以終天年羣臣遂皆稱善右司郎中伊嚕特穆爾布凌錦都爾伯特氏按伊魯特穆爾舊作月魯帖木兒布凌錦都爾伯特氏舊作卜領勤多禮伯臺氏今並改後仿此曰臣聞昔之所謂太上皇若唐元宗宋徽宗皆當禍亂不得已而為之願陛下正大位保無疆之業前代虚名何足慕哉帝乃止庚申七年春正月辛巳朔日食帝崩夀三十六國語稱曰布延圖皇帝布延圖䝉古語有福之謂元史舊訛作普顔篤今譯改史臣曰仁宗天性恭儉通逹儒術兼曉釋典不事遊畋不喜征伐不崇貨利事皇太后終身不違顔色待宗戚勲舊始終以禮大臣親老時加賞賚大官進膳必分賜貴近有司奏大辟毎惨惻移時其孜孜為治一遵世祖成憲云太后以特們徳爾為右丞相帝崩方四日特們徳爾遂以太后命復入中書後數日參議省事青沙津舊作乞失監今改後仿此有罪應杖太后命笞之太子曰不可法者天下之公徇私而輕重之非所以正天下也徽政院使實勒們復以太后命請遷轉朝官太子曰此豈除官時邪且先帝舊臣豈宜輕動俟子即位之後議于宗親元老賢者任之邪者黜之可也二月籍江南冒為白雲僧元時釋教領于宣政院有曰禪日教曰律又有曰白雲宗白蓮宗者為民先是省臣言江南白雲宗總攝沈明仁强奪民田二萬頃誑誘愚俗十萬人私賂近侍妄受司空名爵已奉㫖追奪請汏其徒并還所奪民田江浙省臣亦言明仁擅度僧四千八百人贓敗鉅萬至是始正其罪籍其冒度為僧者復為民特們徳爾殺前中書平章政事蕭拜珠御史中丞楊多爾濟初特們徳爾以蕭拜珠及多爾濟攻其姦惡必欲報之至是以太后㫖召二人至徽政院與徽政使實勒們御史大夫托克托呼舊作秃秃吟今改雜問之責以前違太后㫖之罪多爾濟曰中丞之職恨不即斬汝以謝天下果違太后㫖汝豈有今日邪特們徳爾又引同時為御史者二人證其罪多爾濟唾之曰汝等嘗備員風憲乃為是狗彘事邪坐者皆慚俯首特們徳爾即起入奏未幾稱㫖執二人載諸國門之外皆殺之是日風沙晦𡨕都人恟懼道路相視以目復欲奪多爾濟妻劉氏與人劉剪髪毁容自誓乃免時特們徳爾日思報復讐怨誅戮不已左丞張思明字士瞻其先獲嘉人徙輝州謂曰山陵甫畢新君未立丞相恣行殺戮人皆謂隂有不臣之心萬一諸王駙馬疑而不至奈何不可不熟慮也衆皆危之特們徳爾大悟曰非左丞言幾悮吾事特們徳爾怨上都留守賀勝嘗發張弼之獄又奏其便服迎詔為不敬殺之籍其家三月太子碩廸巴拉即位是為英宗尊皇太后為太皇太后皇后為皇太后加特們徳爾為太師尋詔中外毋沮議之特們徳爾既復相即奏委平章王毅右丞髙昉等徵理在京錢榖虧耗者七十八萬石及諸路嵗貢幣帛稍紞繆者俱責償所司程督嚴刻怨讟復興奪李孟封爵左遷為集賢侍講學士特們徳爾以孟初不附己讒搆于上盡奪其前後封拜制命仆其先墓碑左遷為集賢侍講學士度其必辭因中害之孟拜命欣然適翰林學士劉賡來慰問即與同入院宣徽使以聞曰李孟今日供職例當賜酒帝愕然曰李道復乃肯俯就集賢邪因顧謂特們徳爾子巴爾濟蘇舊作八爾志思今改後仿此曰爾輩謂彼不肯為是官今定何如由是無敢言者夏四月近臣獻七寳帶却之有獻七寳帶者因近臣以進帝曰朕登大位不聞卿進賢而為人獻帶是以帶誘朕也其還之以拜珠安圖之孫為左丞相鼐喇呼塔斯哈雅鼐喇呼舊作乃剌忽塔斯哈雅舊作塔失為牙今改後仿此並平章政事拜珠初襲為宿衛長帝在東宫聞其賢召之辭曰嫌疑之際君子所慎我掌天子宿衛而私往來東宫我固得罪亦豈皇太子之福邪卒不往帝初即位自太常禮儀院使擢授平章政事至是阿薩爾罷為嶺北行省平章政事遂以拜珠代之平章政事赫魯是年二月赫嚕拜平章政事按赫嚕舊作黑驢今改後仿此御史大夫托克托呼舊作脱忒哈今改等謀逆伏誅冇告赫嚕托克托呼阿薩爾實勒們等與約蘇穆爾妻伊呼薩巴舊作亦列失八今改後仿此謀廢立事拜珠曰此輩擅權亂政久矣今猶不懲謀危社稷請鞫狀帝曰彼若借太皇太后為詞奈何命悉誅之籍其家六月以喀喇托克托為御史大夫既而罷之時塔齊爾舊作帖赤今改為御史大夫喀喇托都既被召塔齊爾忌之奏改江南行臺復嗾言者劾其擅離職守將徙之雲南㑹塔齊爾誅乃解家居不出者五年而卒詔免沙門繇役秋八月下四川平章政事趙世延獄初世延既解中丞出為四川平章特們徳爾猶怨之不已仁宗崩即屬其黨誘世延従弟索約爾哈呼舊作胥益兒哈呼今改後仿此誣告之逮世延置對既遇赦猶鍜鍊成獄請置極典詔以經赦置不問特們徳爾更以他事白帝繫之刑曹逼令自裁世延不為動帝獵北凉亭在今獨石口外舊開平城南有東西二凉亭元時廵幸駐蹕處顧謂侍臣曰趙世延先帝所尊禮而特們徳爾妄入其罪數請誅之此殆報私怨耳朕豈能従之侍臣皆叩頭謝然猶囚繫經再嵗既而索約爾哈呼自以所言涉誣亡去丞相拜珠為言其無辜始得釋因著令原告逃亡百日不出則釋待對者冬十一月始服衮冕享太廟帝將以四時躬享太廟命禮官與中書翰林集議其禮制曰此追逺報本之道也毋以朕勞于對越而有所損焉至是以恭謝太廟乃備法駕服衮冕以行禮至仁宗室輒歔欷流涕左右感動自是始以明年正月四時親享嵗以為常禮畢還宫鼔吹交作萬姓莫不聳觀河南饑帝召羣臣問故皆莫對帝曰良由朕治道未洽卿等又不盡職致隂陽不和災害洊至自今宜各務勤恪以應天心毋使吾民重困詔上書言事者得専逹特們徳爾奏比詔内外直言得失今上封事者或徑至御前乞令臣等開視乃入奏聞帝曰言事者當直至御前如細民訴訟者則禁之英宗皇帝辛酉至治元年春正月罷元夕張燈於禁中帝欲以元夕張燈禁中為鰲山時張養浩字希孟濟南人以禮部尚書參議中書省事遂具疏因拜珠以諫曰世祖臨御三十餘年每值元夕閭閻之間燈火亦禁况闕廷宫掖之嚴邃尤當戒慎今燈山之搆所翫者小所繫者大所樂者淺所患者深帝大怒既而喜曰非張希孟不敢言即罷之仍賜尚服金織幣帛各一以旌其直既而帝如上都以察罕諾爾行宫制度卑隘欲更廣之拜住曰北地苦寒入憂始種粟黍初登大寶不求民瘼而遽興大役以妨農務恐失民望帝即為罷役察罕諾爾注見前二月建夀安山即五華山在今宛平縣西寺殺監察御史觀音保等詔建大刹于京西夀安山督役甚急御史觀音保索約勒哈廸宻實伊吾廬人徳呼威蘓之子續綱目誤分二人今從本傳改正按索約勒哈廸宻實舊作鎻咬兒哈的迷失徳呼威蘓舊作迭里威失今並改後仿此成珪李謙亨以嵗洊饑且東作方興上章諫時特門德爾之子孫諾木舊作鎖南今改後仿此為治書侍御史與臺諫有隙宻奏其訕上掦直大不敬帝怒殺觀音保索約勒哈廸宻實杖珪謙亨流尼嚕罕地尋詔増夀安山寺役卒七千人又冶銅五十萬斤鑄佛像置中瑞司以領之明尼嚕罕舊作奴兒千元屬海蘭府額逹勒逹等路置尼嚕罕都司今為寧古塔界内地夏五月遷武宗子圖卜特穆爾即文宗武宗次子周王和實哩之弟舊作圖帖睦爾今改後仿此于瓊州時特們徳爾懐私固寵搆釁骨肉諸王大臣莫不自危中政使時改典内院為中政院秩二品掌皇后服御耀珠舊作咬佳今改後仿此告托歡徹爾等交通親王于是徙圖卜特穆爾居海南因禁日者毋交通諸王駙馬掌隂陽五科者毋泄占候六月癸卯朔日食禁妄言時政時太白經天趙宏祚等以上書言事勒歸田里因禁妄言時政渾河溢被災者二萬三千二百餘户時大雨滹沱河及巨馬河在涿州西北自淶水縣流入與琉璃河合即古桃水也俱溢冬十二月立皇后依竒哩氏昌國公主伊勒噶雅之女按依竒哩氏舊作亦啟烈氏伊呼噶雅舊作益里海涯今並改後仿此壬戌二年春正月勅有司䘏孔氏子孫貧乏者二月禁捕鴐鵞違者籍其家免河間河南陕西十二郡民租之半以旱澇民饑故也秋七月特們徳爾死特們徳爾自復相以來恃其權寵乗間肆毒睚眦之私無有不報帝覺其所譖毁者皆先帝舊人滋不悦其所為乃任拜珠委以心腹由是特們徳爾漸見疏外因稱疾不出及聞拜珠奉㫖往立其祖安圖碑于范陽將復莅省事入朝至内門帝聞其來遣人止之遂怏怏而還尋死于家太皇太后鴻吉哩氏崩謚莊懿慈聖時有司將以十月有事于太廟太常奏國哀以日易月旬有二日外乃舉祀事帝曰太廟禮不可廢迎香去樂可也九月京師地震冬十月以拜珠為右丞相特們徳爾死進拜珠右丞相遂不置左相獨任以政十一月甲午朔日食癸亥三年春正月起王約呉元珪韓従益商議中書省事呉澄為翰林直學士時約等以年老致仕丞相拜珠一新政務尊禮老臣傳詔復起約等俾以其禄家居毎日一至中書省議事至治之政多所参酌澄在延祐初詔起為集賢學士以疾不果行至是亦以拜珠薦起為翰林直學士罷上都諸路金銀冶上都雲州古望雲川地遼置縣金為州後廢今赤城縣北雲川堡是興和金撫州地改改興和路今張家口外鑲黄等旗牧厰地是宣徳金置州元改為府今宣化府是奉聖州遼置今宣化府保安州是及雞鳴山在今宣化府房山黄蘆三乂諸路金銀冶聴民採煉以十分之三輸官二月頒行大元通制時法制不一有司無所遵守命樞宻院使完顔納丹侍御史曹伯啟字士開濟寧碭山人等簒集累朝格例而損益之凡為條二千五百三十有九名曰大元通制頒行天下伯啟言五刑者刑異五等今黥杖徒役于千里之外百無一生還者是一人身被五刑非五刑各底于人也法當改易丞相是之㑹伯啟除浙西亷訪使不果行命御史大夫特克實舊作鐵失今改後仿此振舉臺綱帝初即位特克實以太醫院使拜御史大夫尋領左右阿蘇衛百官志至元初立阿蘇巴圖魯逹魯噶齊遂名阿蘇軍至大三年立衛至是命其振舉臺綱詔諭中外帝又謂臺臣曰朕深居九重臣下奸貪民生疾苦豈能周知故用卿等為耳目曩者特們徳爾貪蠧無厭汝等拱黙不言其人雖死宜籍其家以懲後勅寫金字藏經時方書金字藏經帝在上都使左丞蘇蘇舊作速速今改後仿此詔學士吴澄為序澄曰主上冩經為民祈福甚盛舉也若用以追薦臣所未諭盖福田利益雖人所樂聞而輪回之説不過謂為善者死則上通髙明其極品與日月齊光為惡者死則下淪汚穢其極下與沙蟲同類其徒遂創為薦㧞之論以惑世人今列聖之神上同日月何庸薦㧞且自國初以來凡寫經追薦不知其幾若未效是無佛法矣若已效是誣其祖矣撰為文辭不可以示後世夏四月詔行助役法遣使考視税籍髙下出田若干畆使應役之人更掌之収其税入以助役費官不得預六月追奪特們徳爾官爵特們徳爾既死罪惡日彰監察御史盖繼元宋翼言其奸貪負國生逃顯戮死有餘辜乃命毁所立碑并追奪官爵及封贈制書籍沒其家貲大風拔木大風雨雹㧞桞林行宫木二千餘株奉元元改陕西行省為奉元路即今西安府治也行宫正殿災帝語羣臣曰世皇建宫室至朕而燬實朕不能圖治之故也嘗御大安閣見太祖世祖遺衣皆縑素木棉重加補綴嗟嘆良久謂侍臣曰祖宗創業艱難服用節儉乃如此朕焉敢頃刻忘之秋七月詔減海運糧拜珠以海運糧視世祖時頓増數倍今江南民力困極而京倉充滿奏乞嵗減二十萬石帝遂并特們徳爾所増江淮糧免之八月御史大夫特克實弑帝于南坡及右丞相拜珠初特們徳爾既奪爵籍産克實等以奸黨不自安帝在上都夜寐不寧命作佛事拜珠以國用不足諫止之既而懼誅者復隂誘羣僧言國當有厄非作佛事而大赦無以禳之拜珠叱曰爾輩不過圖得金帛而已又欲庇有罪邪奸黨聞之益懼乃生異謀至是帝自上都南還駐驆南坡是夕特克實與知樞宻院事額森特穆爾舊作也先鐵木兒今改諸王額特布哈舊作按梯不花今改等謀逆以特克實所領阿蘇衛兵為外應特克實先與前平章政事齊勤特穆爾舊作赤斤鐵木兒今改殺拜珠而特克實直犯禁幄手弑帝于卧所時年二十一國語稱曰格根皇帝格根䝉古語明鍳之謂元史舊訛作格堅今譯改史臣曰帝性剛明嘗以地震撤樂減膳近臣有稱觴賀者叱曰朕方修徳不暇汝為大臣不能臣輔反為諂邪拜仼進曰咎在臣等宜求賢自代帝曰毋多遜朕之過也嘗謂宰執曰中書選人署事未旬日御史臺即改除之臺除者中書亦然今山林儒逸良多卿等不能盡心求訪惟以親戚故舊更相引用耶其明㫁多類此然以果于刑戮奸黨畏誅遂搆大變云諸王額特布哈等奉璽綬迎晉王伊蘇特穆爾晉王噶瑪拉長子裕宗嫡孫舊作也孫鐵木兒今譯改于北邊九月晉王即位于龍居河是為泰定皇帝河龍居河即臚朐河今名克嚕倫在喀爾喀界内初噶瑪拉薨其子伊蘇特穆爾襲封晉王仍鎮北邊領四大鄂爾多之地王府内史都爾蘇西域人按朶洛沙舊作倒沙今改得幸于王嘗偵伺朝廷事機以其子哈克繖事丞相拜珠得入宿衛久之哈克繖知特克實欲傾害拜珠遂脱歸是年三月宣徽使塔坦舊作探忒今改來王邸為都爾蘇言主上將不利于晉王由此二人深相要結八月二日特克實宻遣烏嚕斯舊作斡羅思今改告晉王曰我與哈克繖額森特穆爾實逹爾舊作失秃兒今改謀已定事成推立王為皇帝又告都爾蘇曰汝與巴蘇呼舊作焉速忽今改知之勿令舒瑪爾節舊作旭邁傑今改得聞也于是王命囚烏嚕斯遣巴拉宻實特舊作别烈迷迷失今改赴上都以逆謀告未至帝遇弑諸王額特布哈及額森特穆爾奉皇帝璽綬北迎王于鎮所遂即皇帝位于龍居河大赦天下冬十月特克實額森特穆爾伏誅帝初即位以額森特穆爾為右丞相特克實知樞宻院事至是諸王邁努舊作買奴今改言于帝曰不誅元凶則陛下善名不著天下後世何従而知帝深然之于是誅額森特穆爾鄂勒哲舊作完者今改索諾木特克實之弟按此又一索諾木非特們徳爾之子也圖門舊作禿滿今政等于行在所命舒瑪爾節寧珠舊作組澤今改入京師收特克實及其黨齊勤特穆爾等悉誅之戮其子孫籍沒家産惟特們徳爾子前治書御史索諾木議逺流張珪曰索諾木従逆賊親斫丞相拜珠臂乃欲活之邪尋亦伏誅餘黨俱免官十一月帝至大都詔雪楊多爾濟蕭拜珠等寃御史言特們徳爾専政誣殺楊多爾濟蕭拜珠賀巴延即賀勝觀音保索約勒哈廸宻實黥竄李謙亨成珪罷免王毅髙昉張志弼請昭雪之詔存者召還録用死者贈官有差追尊考晉王為皇帝廟號顯宗母鴻吉哩氏曰宣懿淑聖皇后盗竊太廟神主太廟神主制皆用黄金為之至是仁宗及莊懿慈聖皇后金主為寇所竊太常博士李好文字惟中大名東明人言在禮神主當以木為之金玉祭器宜貯别室不従時參知政事瑪喇勒舊作馬剌今改後仿此兼領太常禮儀使當遷左丞集賢大學士張珪曰太常奉宗祏不謹當待罪而反遷官何以謝在天之靈命遂格流諸王伊嚕特穆爾等于邊地伊嚕特穆爾雲南額特布哈海南庫魯克布哈舊作曲吕不花今改後仿此尼嚕罕博囉烏魯斯布哈舊作兀魯思不花今改後仿此海島並坐與特克實逆謀故也封邁努為㤗寧宋縣今屬福建邵武府王舒瑪爾節等言南坡之變諸王邁努逃赴潛邸願效死力且其請戮元凶上契宸衷嘗䝉奬諭今臣等議宗戚中能自拔逆黨者惟有邁努請加封賞以示激勸遂以㤗寧縣五千户封邁努為㤗寧王以都爾蘇為左丞相茂穆蘇舊作馬某沙今改後仿此寧珠索多舊作鎖禿今改後仿此並加光禄大夫賜舒瑪爾節等金有差以討逆功也泰定皇帝甲子泰定元年春正月召圖卜特穆爾于瓊州時命諸王逺従者悉還其部遂召圖卜特穆爾于海南阿穆噶于大同二月開經筵江浙行省左丞趙簡請開經筵及擇師傳令太子及諸王大臣子孫受學章上遂命平章政事張珪等以帝範資治通鑑大學衍義貞觀政要等書進講立皇后鴻吉哩氏元史帝紀作巴拜哈斯氏按后本鴻吉哩氏巴拜哈斯其名也今依后妃列傳改正又巴拜哈斯舊作八八罕今改立子喇實晋巴舊作阿速吉八今改後仿此為皇太子夏四月大風地震時帝在大都以烈風地震戒飭百官并詔大都守臣集議以聞張珪乃與樞宻院御史臺翰林集賢兩院官極論當世得失詣上都奏之畧曰特們徳爾與特克實之徒結為父子終以遺患搆成弑逆其子索諾木親與逆謀今復給還所籍家産其諸子尚在京師夤縁再入宿衛宜仍籍其家産竄其子孫以明不共戴天之義諸王額特布哈傳囉伊嚕特穆爾庫魯克布哈等與特克實逆謀罪止于流竄宜誅之以謝天下遼王托克托居鎮遼東因國家有變報復讐忿殺親王妃主百餘人分其羊馬畜産殘忍骨内今不之罪乃復厚賜放還臣恐國之紀綱従此不振况令死者含寃感傷和氣宜奪削其爵土置之他所以彰天威武備卿濟哩前太尉布哈矯制令英實强収鄭國寳妻噶哈刑曹逮鞫服實竟原其罪夫匹婦銜寃三年不雨宜仍付刑曹鞫正其罪賈胡中賣寳物分珠寸石價直數萬夫以經國有用之寳而易此不濟餞寒之物是皆時貴妄稱呈獻冒給回賜髙其價直且至十倍彼此通同暗行分用宜行禁止自古聖君惟誠于治政可以動天地感鬼神初未嘗徼福于僧道也至元三十年醮祠佛事之目止百有二大徳七年再立功徳使司積五百有餘今年一増其目明年即指為例已倍四之三矣比年佛事餘繁享國不永致災愈速事無應驗㫁可知矣宜罷功徳使司及累朝忌日醮祠佛事名目止今宣政院主領修舉餘悉停罷游惰之徒妄投宿衛部屬及宦者女紅大醫隂陽之屬不可勝數一人収籍一門蠲復一嵗請衣馬芻糧數十户所徵入不足以給之耗國損民為甚宜如世祖時支請之數給之餘悉減汏自特們徳爾専恣主特克實搆逆良善枉死皆未申理宜加褒贈優敘其子孫天下繫囚寃滯宜命省臺選官審録結正邊鎮利病宜令行省行臺體究興除廣海鎮戍卒更病者宜給粥食藥力死者給鈔責所司及同卿者歸骨于其家廣東採珠勞擾宜悉停罷至元三十年以後冗員宜悉減併不該常調之人不得濫入常選凡官飬馬駝宜如大徳團槽之制所賜勲戚及宦者之田悉拘還官其僧道典買民田及民間所施産業宜悉役之左右之臣非有功勲勞効著明實跡不加以賞賜請皆著為令按濟哩舊作即烈噶哈舊作古哈今改後仿此書几數千言詞甚切至帝皆不従冬十月命左右丞相日直禁中乙丑二年春正月命懐王圖卜特穆爾出居建康初圖卜特穆爾自海南召還至潭州復命止之居數月乃還大都封為懐王至是又命出居建康夏五月河溢汴梁六月革大臣兼領軍務續綱目繫于四月今従本紀改政參知政事尊逹布哈舊作左塔不台今改後仿此言大臣兼領軍務前古所無特克實以御史大夫額森特穆爾以知樞宻院事領衛兵如虎而翼故成逆謀今軍衛之職乞勿以大臣領之庶勲舊之家得以保全従之冬十月都爾蘇罷為御史大夫十一月復以為左丞相相十二月以逹實特穆爾舊作塔失帖木兒今改後仿此為右丞相並加聞府儀同三司録軍國重事仍封逹實特穆爾薊國公丙寅三年夏四月畿内河北山東饑初張珪告歸保定上冡帝思念之召還問曰卿來時民間如何珪曰臣老少賓客不能逺知保定真定河間臣鄉里也民饑甚朝廷雖賑以金帛恵未及者十五六帝惻然命賑糧四月至是復令免三路及濟南等郡縣民半租張珪尋以病退居西山得㫖還家嵗餘而卒禁西僧馳驛擾民先是西臺御史李昌言嘗經平凉府金置府元屬鞏昌路今仍為府𨽻甘肅静當作静寧元置州今屬平凉府㑹金置州元移治西寧縣後廢今縣屬鞏昌府定西金置州元移治安西縣今鞏昌府定縣是等州見西番僧佩金字圓符絡繹道途馳騎累百傳舍至不能容則假館民舍因廹逐男子奸汚婦女奉元一路自正月至七月往反百八十五次用馬至八百四十餘匹較之諸王行省之馬十多六七驛户無所控訴臺察莫得誰何且國家之製圓符本為邊防警報之虞僧人何事而輒佩之乞更正僧人給驛法且得以糾察不報至是聞其擾民禁之秋七月河決陽武漂民居萬六千五百餘家尋復壊汴梁樂利隄𤼵丁夫六萬四千人築之冬十月賜大夫源延聖寺田初帝命建顯宗神御殿于盧師寺在今宛平縣盧師山後改名清凉寺額曰大天源延聖寺奉安御容至是又賜吉安臨江二路田千頃中書省臣言養給軍民必資地利况土地祖宗所有子孫當共惜之臣恐兹後藉為口實妄興工役􅗲福利以逞私欲也帝嘉納之然不能用十二月赦都爾蘇當國與平章額卜徳哷勒西域人以皇慶二年五月延祐四年六月至治三年十月三為平章政事額卜徳哷勒舊作烏伯都剌今改以私意欲因赦酬累朝賈胡所獻諸物之直及擢用英廟至今為憲臺奪官者額卜徳哷勒自禁中出至政事堂集宰執僚佐以詔藁示左司都事宋本字誠夫大都人本曰今天儆災異而畏獻物未酬直者憤怨此有司細故形諸王言必貽笑天下憲司褫有罪者官世祖成法也今上即位累詔法世祖若擢用之是廢成憲而反汙前詔也後復有邪佞贓穢者将治之邪置不問邪宰執聞本言相視嘆息罷去明日宣詔竟本遂稱疾不出丁夘四年春正月御史臺臣請親祀郊廟不允先是監察御史趙思魯字希顔霸州文安人以大禮未舉言天子親祀郊廟所以通精誠迎福釐生烝民阜萬物百王不易之禮也宜講求故事對越以格純嘏至是御史臺臣復以為言帝曰朕遵世祖舊制其命大臣攝之夏四月盜竊武宗神主旱蝗民饑秋八月山崩地震通漕縣應作通渭縣宋置今屬鞏昌府山崩碉門地震有聲如雷晝晦天全道漢徙縣地元置碉門宣撫司又分置天全招討司今政設天全州治碉門城屬雅州府山崩飛石斃人鳯翔興元成都峽州江陵地同日皆震九月丙申朔日食戊辰致和元年八月帝喇實晉巴即位改元天順九月圖卜特穆爾僭稱天歴元年按喇實晉巴即位上都似亦循踰年之例改明年為天順今因是年九月圖卜特穆爾僭立于大都改元天歴十月上都被陷天順帝不知所終八月後元統無屬故變例以天順改元分注其圖卜特穆爾所稱天歴則直書僭號云春二月帝如上都命簽書樞宻事雅克特穆爾竒卜察克氏綽和爾第三子舊作燕鐵木兒綽和爾舊作牀兀兒今改等居守徙懐王圖卜特穆爾于江陵初圖卜特穆爾出居建康以殊祥院使額森鼐舊作也先控今改後仿此掌其衛士至是額森鼐私至上都與都爾蘇等共謀復遣使遷之于江陵夏四月禁䝉古色目人居親䘮逹實特穆爾都爾蘇請凡䝉古色目人效漢法丁憂者除其名従之秋七月寧夏地震帝崩于上都夀三十六文宗不為立廟謚世止稱為泰定帝史臣曰泰定之世災異數見君臣之間亦未見其引咎責躬之實然能知守祖宗之法以行天下無事號稱治平八月簽書樞宻院事雅克特穆爾謀逆執中書省臣額卜徳哷勒等下之獄遣使迎懐王圖卜特穆爾于江陵初雅克特穆爾以㤗定帝由晉邸入繼與諸王滿都舊作滿禿今改等乗帝有疾恒懐異圖以身受武宗寵拔之恩欲迎其二子周王和實拉及懐王圖卜特穆爾立之至是帝崩于上都都爾蘇専權自用踰月不立君朝野恐懼皇后皇太子遣使詣大都命平章政事額卜徳哷勒収掌百司印章及諭安百姓于是雅克特穆爾與安西王喇特納實里舊作阿剌忒納失里今改後仿此隂結勇士八月甲午黎明百官集興聖宫雅克特穆爾率其黨十七人兵皆露刃號于衆曰武宗皇帝有子二人天下正統當歸之敢有不順者斬執平章政事額卜徳哷勒御史臺臣特黙格左丞托多按特墨格舊作鐵木哥朶都舊作朶朶今改後仿此参政王士熙等下獄與安西王入守内廷分處腹心于樞宻命前参政明埓棟阿舊作明理董阿今改後仿此乗驛迎圖卜特穆爾于江陵推前湖廣左丞拜布哈舊作别不花今改後仿此為左丞相詹事塔斯哈雅為平章蘇蘇為左丞王布琳濟逹舊作王不憐吉台今改後仿此為樞宻副使與右丞趙世延等分典庶務時有諸衛軍無統屬者及謁選并罷退軍官皆給之符牌以待調遣衆既受命皆注目而立未知所謝乃指揮南向拜衆驚竦毛髪凛然始知其意在懐王也雅克和穆爾直宿禁中達旦不寐一夕再徙人莫知其處者將一月又恐人心疑懼令逹實特穆爾矯為南使云懐王旦夕且至復令奈瑪台舊作乃馬台今改後仿此為北使稱周王亦従諸王南來矣河南行省平章政事巴延黙爾吉濟特氏默爾吉濟特舊作蔑里吉䚟今改殺参知政事圖卜台舊作脱别台今改初明埒棟阿至河南以宻謀告巴延巴延従之遂殺平章庫哩舊作曲烈今改後仿此右丞拜特穆爾舊作别鐵木兒今改後仿此等别遣兵南迎圖卜特穆爾而躬自勒兵以俟参知政事圖卜台獨曰今䝉古軍馬與宿衛之士皆在上都而諸隘守兵單弱吾恐此事之不可成也巴延不従是夜圖卜台手刃欲殺巴延巴延覺遂拔劍殺圖卜台而奪其所部軍器馬匹圖卜特穆爾𤼵江陵遣使以巴延為河南左丞相諸王滿都等謀叛附于雅克特穆爾伏誅諸王滿都阿穆爾台舊作阿馬剌台今改後仿此宗正庫庫楚平章瑪魯舊作買閭今改後仿此集賢學士烏嚕斯布哈太常禮儀院使噶海齊舊作哈海赤今改後仿此等十八人同謀附雅克特穆爾事覺悉為都爾蘇所殺皇太子喇實晉巴即位于上都時平九嵗改元天順遣梁王旺沁梁王蘇克繖之子顯宗之孫舊作王禪今改右丞相逹實特穆爾將兵分道討雅克特穆爾懐王圖卜特穆爾入京師以明埒棟阿庫庫台舊作濶濶台今改蘇蘇並為平章政事曹立為右丞巴延為御史大夫趙世延為御史中丞髙昌王特穆爾布哈舊作鐵木兒補化今改知樞宻院事尋又殺平章政事額卜徳哷勒流左丞托多等于逺州後一年復徴托多等十二人于貶所放歸田里九月圖卜特穆爾僭位圖卜特穆爾既至雅克特穆爾以為擾攘之際不稱大號不足以係天下之志圖卜特穆爾以周王和實拉在漠北欲虚位俟之雅克特穆爾曰人心向背之機間不容髮一或失之噬臍無及圖卜特穆爾曰必不得已當明著吾志播告中外遂襲帝位改元天歴詔天下曰謹俟大兄之至以遂朕固譲之心大赦封雅克特穆爾為太平王加右丞相知樞宻院事加巴延太尉梁王旺沁等兵入居庸闗與雅克特穆爾戰敗引還初雅克特穆爾之弟薩敦舊作撒敦今改子騰吉斯舊作唐其勢今改皆在上都宻遣人召之來歸使薩敦將兵守居庸闗騰吉斯屯古北口及旺沁等兵次榆林雅克特穆爾將兵拒之遣薩敦先馳至榆林西乗其未陣薄之旺沁兵稍却時諸王額森特穆爾兵自遼東入遷民鎮遼置遷民縣金廢為鎮今改撫寧縣東相傳山海闗即鎮故址圖卜特穆爾復令雅克特穆爾禦之次于薊州旺沁等兵破居庸闗雅克特穆爾聞之倍道還軍逆戰于榆河一名濕餘河俗名富河自居庸闗南流至通州北入白河漢書地理志軍都縣濕餘水東至潞南入沽是也之北旺沁兵復不利追至紅橋在昌平州西南阻水而陣相持者累日旺沁再戰再北遂率餘衆遁還靖安王扣布哈舊作濶不花今改後仿此等兵破潼闗河南大震扣布哈等以兵應上都自陕西東撃潼闗破之遂克閿鄉陕州行臺御史大夫額森特穆爾此又一額森特穆爾非諸王額森特穆爾也分兵北渡河中趨懐孟河東官吏皆棄城走特黙格南過武闗破鄧州直趨㐮陽下郡縣二十餘横絶數千里河南大震諸王額森特穆爾等兵破通州遂趨京師雅克特穆爾拒之引還圖們岱爾舊作秃滿迭兒今改及諸王額森特穆爾軍破通州將襲大都雅克特穆爾急引軍還撃之陽翟王太平太宗第七子宻特哩大王之元孫宻特哩舊作里今改敗沒死者蔽野餘兵皆潰散而還諸王哷喇台舊作忽剌台今改後仿此等兵入紫荆闗在易州西即大行第七徑也宋時謂之金陂闗金元以來皆名紫荆守闗軍士皆潰散遂乗勝進逼京城與額森鼐等軍遇于良鄉南轉戰至盧溝橋聞雅克特穆爾援兵益至遂引去冬十月圖卜特穆爾遣使至陜西省臣執之送上都初雅克特穆爾召陜西行省平章特默齊舊作探馬赤行臺御史滿濟勒噶台舊作馬扎兒合今並改後仿此皆不至至是使者頒懐王即位詔于甘肅至陜西行省行臺官焚毁其詔執其使械送上都既而使者持至浙江歸言省臣亦皆不服懐王悉欲誅之左司郎中䇿丹䝉古人策黨舊作自當今改後仿此見雅克特穆爾曰雲南四川且猶未定乃欲以使臣一言殺行省大臣恐非盛徳事况浙江豪奢地使臣或不厭所需造言䧟之耳雅克特穆爾入言之事乃止圖卜特穆爾兵䧟上都帝不知所終梁王旺沁遁走遼王托克托死之先是齊王伊嚕特穆爾及東路䝉古元師布哈特穆爾舊作不花帖木兒今改後仿此等聞懐王即位先後舉兵趨上都圍之時諸王大臣出戰屢敗勢蹙都爾蘇等遂奉皇帝寳出降梁王旺沁遁走遼王托克托遇害帝不知所終伊嚕特穆爾奉皇帝寳又収諸王百司符印遣兵送都爾蘇等于京師靖安王扣布哈等大敗河南兵進拔虎牢尋引還扣布哈等兵至鞏縣黒石渡在今河南府鞏縣西南各水津渡處與河南兵戰大敗之獲其輜重鉅萬遂克虎牢旋引軍至汴㑹有使者來言上都已破河南省臣遣使招諭扣布哈等殺其使臣十餘輩既而圖卜特穆爾復遣使臣諭之乃逡巡引去十一月圖卜特穆爾遷㤗定皇后鴻吉哩氏于東安州遣使迎周王和實拉于漠北圖卜特穆爾殺梁王旺沁及都爾蘇等梁王旺沁既遁圖卜特穆爾募有能捕之者官五品以上尋被執賜死都爾蘇茂穆蘇寧珠薩題勒宻實額森特穆爾皆棄市時復欲盡戮大臣之在上都者平章政事敬儼字威卿其先河東人後徙易水抗論謂是皆常嵗従行之人殺之非罪衆頼以免四川平章政事嚢嘉特舊作嚢加台今改後仿此稱兵燒絶棧道囊嘉特自稱鎮西王以其省左丞托克托為平章前雲南亷訪使楊静為左丞殺平章庫春舊作寛徹今改後仿此等稱兵燒絶棧道弛䝉古色目人居親䘮之禁自願者聴如舊制御批厯代通鑑輯覽卷九十七

front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷八十四宋髙宗皇帝己酉建炎三年金关㑹七年春正月河北制置使王彦致仕
  hash: sha256:7dec7f420ca06eee851067116303fc28ebd7901044421c6507cd1fb47116a5d8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_083-1a, image: WYG0338/WYG0338-0414a.png}
body:
  text: 彦以所部兵馬付東京留守司而親率兵趋行在見黄潛善汪伯彦力陳兩河忠義延頸以望王師願因人心大舉北伐言辭憤激二人大怒遂請降㫖免對差充御營平寇統領彦遂稱疾致仕金尼瑪哈陷徐州知州事王復死之金人圍城復與子倚率軍兵力戰外援不至城破復謂尼瑪哈曰死守者我也願殺我而舎僚吏百姓尼瑪哈欲降之復嫚罵求死闔門百口皆被殺韓世忠㑹兵救濮州至沭陽後周縣今屬江南海州兵潰金尼瑪哈遂入淮泗世忠屯淮陽北周縣後廢故城在今泗州㑹山東兵以援濮州尼瑪哈聞之分兵萬人趋揚州自率大軍迎戰世忠以衆寡不敵夜引還尼瑪哈躡之至沭陽世忠棄軍走鹽城本漢鹽凟晉更名今縣屬淮安府衆遂潰張遇戰死尼瑪哈入淮陽以騎兵三千取彭城間遒趋淮東入泗州二月詔劉光世將兵阻淮以拒金光世兵潰走還金尼瑪哈遂陷天長軍本唐縣宋改軍尋仍為縣今屬泗州帝奔鎮江詔江淮制置使劉光世阻淮以拒金人敵未至而軍自潰尼瑪哈至楚州守臣朱琳降遂乘勝而南破天長軍内侍鄺詢報金兵至帝即被甲乘騎馳至𤓰洲步得小舟渡江惟䕶聖軍卒數人及王淵張浚内侍康履等從行日暮至鎮江府時汪伯彦黄潛善方率同列聽浮屠克勤說法罷㑹食堂吏大呼曰駕已行矣二人相顧蒼黄乃戎服策馬南馳居民爭門而出死者相枕籍無不怨憤司農卿黄鍔至江上軍士以為黄潛善罵之曰誤國誤民皆汝之罪鍔方辯其非是而首已斷矣是日金將馬武舊作馬五今改帥五百騎先馳至揚州聞帝南行乃追至揚子橋時事起倉卒朝廷儀物皆委棄太常少卿季陵字廷仲處州龍泉人亟取九廟神主以行出城未數里囘望城中烟焰燭天陵為金人所追亡太祖神主于道帝如杭州以吕頤浩簽書樞密院事守鎮江帝至鎮江宿于府治翌日召從臣問去留吏部尚書吕頤浩乞留蹕以為江北聲援羣臣皆以為然王淵獨言鎮江止可捍一面若金人自通州渡江以㨿姑蘇將若之何不如錢塘有重江之險帝意遂决命留朱勝非守鎮江以江淮制置使劉光世充行在五軍制置使控扼江口續綱目于帝意遂決下作以頤浩為江淮制置使與行在五軍制置使劉光世駐鎮江考宋史高宗紀二月癸丑以吏部尚書吕頤浩為資政殿大學士江淮制置使劉光世充行在五軍制置使是江淮制置使乃劉光世之官綱目誤係于吕頤浩殊為疎謬再考髙宗紀是月庚申次崇徳縣拜吕頤浩兩浙江淮制置使續綱目既誤書于前又複書于後一官再命尤為舛錯今依本紀改輯而于頤浩為資政殿大學士不另立綱附注于此是夕發鎮江越四日次平江今蘇州府宋為平江府命朱勝非節制平江秀州軍馬張浚副之留王淵守平江又二日次崇徳五代吳越縣今改石門屬嘉興府時吕頤浩從行即拜同簽書樞密院事江淮兩浙制置使以兵二千還屯京口又命張俊以兵八千守吳江吳越縣今屬蘇州府遣閤門祇侯劉俊民使金軍詔錄用張邦昌親屬仍命俊民持邦昌貽金人約和書藁以行金羅索陷晉寧軍徐徽言死之羅索破晉寧軍徽言據子城拒戰不勝欲自殺左右持之金人猝至挾徽言以去使之拜不拜臨之以兵不動命折可求諭使降徽言大罵羅索殺之統制孫昂翊之子及士卒皆不屈被害事聞贈徽言晉州觀察使諡忠壯羅索遂進陷鄜坊二州又破鞏州帝至杭州赦帝駐蹕杭州即州治為行宫下詔罪已求直言赦死罪以下放還士大夫被竄斥者惟李綱不赦更不放還葢用黄潛善計罪綱以謝金也和州防禦使馬擴應詔上書言前日之事其誤有四其失有六今願陛下西幸巴蜀用陜右之兵留重臣使鎮江南撫淮甸破金人之計囘天下之心是為上䇿都守武昌襟帶荆湖控引川廣招集義兵屯布上流扼據形勢密約河南諸路豪傑許以得地世守是為中策駐蹕金陵備禦江口通逹漕運精習水軍厚激將士以幸一勝觀敵事勢豫備遷徙是為下策若倚長江為可恃幸金人之不來猶豫遷延侯至秋冬金人再舉驅敵舟檝江准千里數道並進至此後悔是為無䇿擴累數千言皆切事機金人焚揚州而去吕頤浩遣陳彦渡江襲金餘兵復揚州黄潛善汪伯彦以罪免潛善伯彦至杭州聨疏言艱難之時不敢具文求退續綱目作聯疏求退今依宋史本傳中丞張澂論二人大罪二十致陛下䝉塵天下怨懟乞加罪斥乃罷潛善知江寧府伯彦知洪州潛善猥持國柄嫉害忠良逐李綱沮宗澤臺諫内侍言者隨陷以竒禍中外切齒而帝不悟伯彦則居位日淺論者或末減其罪云贈陳東歐陽澈官仍官其親屬一人恤其家又召馬伸赴行在時伸已卒詔贈直龍圖問三月日中有黑子以朱勝非為尚書右僕射兼中書侍郎命張俊駐平江以王淵同簽書樞密院事先是帝渡江劉光世見帝泣曰王淵専管江上海船每言緩急不誤今臣所部數萬騎二千餘不能濟淵忿其言斬江北都巡檢使皇甫佐以自解朱勝非馳見淵督之淵始經畫已無所及遂失諸將心至是制下諸將籍籍帝乃命淵免進呈書押扈從統制苗傅劉正彦作亂殺王淵及内侍康履等刦帝傳位于魏國公旉請隆祐大后臨朝苗傅自負世將以王淵驟遷顯職心不平之而劉正彦亦以招降劇盜功大賞薄怨上二人因相結時内使康履藍珪恃恩用事履尤妄作威福凌忽諸將諸將嫉之㑹内侍臨浙觀潮供帳遮道傅等怒曰汝輩使天子顛沛至此猶敢爾耶中大夫王世修亦嫉内侍恣横言于正彦正彦曰㑹當共除之及王淵入樞府傅等疑其由内侍以進遂與世修謀先斬淵然後殺宦者議既定時以劉光世為殿前都指揮百官入聼宣制傅正彦令世修伏兵城北橋下俟淵退朝即捽下馬誣以結宦者謀反正彦手斬淵即與傅擁兵至行宫門外梟淵首于行闕分捕内侍皆殺之履馳入宫白帝帝大驚朱勝非急趋樓上詰傅等擅殺之故中軍統制吳湛守宫門引傅黨入内奏曰傅等不負國恩止為天下除害耳知杭州康允之見事急請帝御樓撫諭之日將午帝登樓傅等望見黄葢猶山呼而拜帝憑欄呼傅等問故傅厲聲對曰陛下信任中官賞罰不公軍士有功者不賞内侍所主得官黄潛善汪伯彦誤國至此猶未遠竄王淵遇賊不戰首先渡江因交康履乃除樞宻臣自陛下即位以來功多賞薄臣已將王淵斬首中官在外者皆誅訖更乞康履曽擇誅之以謝三軍帝曰潛善伯彦已降黜履擇當重與降責卿等可歸營傅曰天下生靈無辜肝腦塗地止縁中官擅權若不斬履擇臣不還營帝猶未許逾時傅兵不退帝不得已命湛執履與之傅即于樓下腰斬履臠其肉梟首與淵首相望并捕擇斬之編管藍珪于遠州帝諭傅等歸營傅等進曰陞下不當即大位將來淵聖皇帝來歸未知何以處之帝命朱勝非縋樓下曲諭之傅請隆祐太后同聽政及遣人議和帝許之即下詔請隆祐太后垂簾傅等聞詔不拜曰自有皇太子可立况道君皇帝已有故事勝非還白帝帝曰朕當退避但須太后手詔也乃遣顔岐入内請太后御樓太后至帝立檻側從官請帝坐帝曰不當坐此矣太后因乘肩輿下樓出門見傅等諭之曰自道君皇帝任蔡京王黼更祖宗法度童貫起邊事所以招致金人之禍豈闗今上皇帝事况皇帝初無失徳止為黄潛善汪伯彦所誤今已竄逐統制豈不知之傅等對曰臣等必欲太后為天下主奉皇子為帝后曰今彊敵在前吾以一婦人抱三嵗兒決事何以令天下敵國聞之豈不轉加輕侮傅等不從后顧勝非曰今日政須大臣果決相公何無一言勝非還白帝曰傅等腹心有王鈞甫者適語臣云二將忠有餘而學不足此語可為後圖之緒帝乃即坐上作詔禪位于皇子而請太后同聽政宣詔畢傅等麾其軍退于是皇子旉即位大后埀簾決事尊帝為睿聖仁孝皇帝以顯寧寺為睿聖宫是夕徙帝居之大赦改元明受加傅為武當軍節度使正彦為武成軍節度使朱勝非奏母后垂簾須二人同對此承平故事今日事機須密奏乞許臣僚獨對而日引傅黨二人上殿以弭其疑太后語帝曰頼相此人若汪黄在位事已狼籍矣傅等欲挾帝幸徽越勝非諭之以禍福乃止張浚吕頤浩㑹兵討賊改元赦書至平江張浚命守臣湯東野秘不宣既而得苗傅等所傳檄浚慟哭召東野及提刑趙哲謀起兵討之時傅令張俊以三百人赴秦鳳而以餘兵屬他將俊知其偽拒不受軍士洶洶俊諭之曰當詣張侍郎決之即引所部八千人至平江俊見浚語故相持而泣且諭俊以將起兵問罪俊泣拜曰此須侍郎濟以機術毋驚動乘輿也赦至江寧吕頤浩曰是必有兵變其子抗曰主上春秋鼎盛二帝蒙塵沙漠日望拯救其肯遽遜位于幼冲乎灼知兵變無疑也即遣人寓書于浚浚以頤浩有威望能斷大事乃答書約共起兵且告劉光世于鎮江令以兵來㑹頤浩得浚書因上疏請復辟遂以兵發江寧舉鞭誓衆士皆感厲張浚又念傅等居中欲得辯士往說之節制司參議官馮轓字元通後賜名康國遂寧府人請行浚遣之至杭見傅等折以正義令早反正劉正彦遣轓約浚至杭浚命張俊分兵扼吳江上疏請復辟苗傅等謀除浚禮部尚書命將所部詣行在浚以大兵未集未敢誦言討賊乃託云張俊驟回人情震讋不可少留以撫其軍㑹韓世忠自鹽城出海道將赴行在至常熟梁縣今屬蘇州府張俊聞之曰世忠來事濟矣因白浚以書招之世忠得書以酒酹地曰誓不與此賊共戴天至平江見浚慟哭曰今日之事世忠願與張俊任之公無憂也浚因大犒俊世忠將士衆皆感憤于是令世忠帥兵赴闕戒之曰投䑕忌器事不可急急則恐有他變宜趋秀州據糧道以俟大軍之至世忠發平江至秀州稱疾不行而大修戰具傅等聞之始懼欲拘世忠妻子以為質朱勝非紿傳曰不若遣之使迓世忠而慰撫之則平江諸人益安矣傅從之乃白太后封世忠妻梁氏為安國夫人俾迓世忠梁氏疾驅出城一日夜㑹世忠于秀州勝非喜曰二兒真無能為也張浚復遣馮轓往杭因報書于正彦曰自古言涉不順謂之指斥乘輿事涉不遜謂之震驚宫闕廢立之事謂之大逆不道大逆不道者族今建炎皇帝不聞失徳一旦遜位豈所宜聞傅等得書恐乃遣苗瑀馬柔吉將重兵扼臨平注見前亟除俊世忠節度使而誣浚欲危社稷謫黄州團練副使桞州安置浚等皆不受頤浩將至平江浚乘輕舟迓之咨以大計頤浩曰曩諫開邊幾死宦臣之手承乏漕輓幾陷沙漠之域今事不諧不過赤族為社稷死豈不快乎浚壯其言既而劉光世兵亦至浚乃草檄聲傅正彦之罪以韓世忠為前軍張俊翼之劉光世為逰擊頤浩浚總中軍光世分兵殿後太后降㫖睿聖皇帝處分兵馬重事以浚同知樞密院事李邴字漢老濟州任城人鄭瑴字致剛建州人並同簽書院事浚頤浩等發平江上疏乞建炎皇帝還即尊位傅等聞之憂恐不知所為朱勝非謂之曰勤王之師未進者使此間自反正耳不然下詔率百官六軍請帝還宫公等置身何地乎即召李邴張守字子固常州晉陵人作百官章及太后手詔賜傅正彦鐵劵傅等遂帥百官于睿聖宫帝慰勞之傅正彦以手加額曰聖天子度量如是也傅黨張逵曰趙氏安苗氏危矣金以劉豫知東平府節制河南州郡時京東諸郡多入于金金界舊河以南俾豫統之又以豫子麟知濟南府鄂爾多還屯濱州注見前尼瑪哈歸至東平命逹蘭屯兵衝要以鎮撫之王復故將趙立徐州張益村人復徐州初徐州既破都虞侯趙立戰死復蘇求王復尸瘞之陰結鄉民為收復計及金師北去乃帥殘兵邀擊大敗之遂復徐州事聞詔以立權知州事時山東為盜區立介居其間威名流聞夏四月帝復位詔張浚知樞密院事太后下詔還政朱勝非帥百官詣睿聖宫親掖帝乘馬還行宫與太后御前殿垂簾復以建炎紀年以苗傅為淮西制置使劉正彦副之越四日太后撤簾吕頤浩張浚敗賊將苗翊于臨平苗傅劉正彦夜遁頤浩浚入杭州吕頤浩張浚軍次秀州頤浩諭諸將曰今雖反正而賊猶握兵居内事若不濟必反以惡名加我翟義徐敬業可監也進次臨平苗翊馬柔吉負山阻水為陣中流植鹿角以梗行舟韓世忠舎舟力戰張俊劉光世繼之翊衆少郤世忠復舎馬操戈而前令將士曰今日當以死報國面不被數矢者皆斬于是士卒爭用命翊引神臂弩持滿以待世忠瞋目大呼挺刅突前翊衆辟易矢不及發遂敗走勤王兵入北關即今北新關在杭州府仁和縣北傅正彦急趋都堂取鐵劵擁精兵二千夜開湧金門遁走犯富陽注見前新城三國吳縣今屬杭州府二縣將趋閩中頤浩浚入城世忠手執王世修以屬吏頤浩浚入見伏地涕泣待罪帝問勞再三謂浚曰曩在睿聖兩宫隔絶一日啜羮怱聞貶卿不覺覆手念卿被謫此事誰任解所服玉帶賜之帝握世忠手慟哭曰中軍統制吳湛佐逆為最尚留朕肘腋能先誅乎世忠即謁湛握手與語折其中指與王世修俱斬于市逆黨王元左言馬瑗范仲熊時希孟皆貶朱勝非免以吕頤浩為尚書右僕射兼中書侍郎帝初復位勝非見帝言曰臣昔遇變義當即死偷生至此欲圖今日之事耳因乞罷政帝問誰可代者對曰吕頤浩張浚帝問孰優對曰頤浩練事而暴浚喜事而疎帝曰浚太年少對曰臣向被召軍旅錢穀悉付浚此舉浚實主之中丞張守論勝非不能預防致賊猖獗宜罷之不報至是與同位顔岐門下侍郎王孝迪中書侍郎張澂尚書右丞盧益同知樞密路允迪簽書樞密等俱免而拜頤浩右相復以劉光世為御營副使韓世忠張俊為御前左右軍都統制勝非尋落職居張澂于衡州禁内侍干預朝政詔内侍不得與主兵官交通及饋遺假貸借役禁軍干預朝政外官非親戚亦不得往還如違並行軍法重正三省官名自元豐新官制三省不置長官以尚書左右僕射兼門下中書侍郎分班奏事獨中書取㫖門下雖為首相不更與聞事俱具前續綱目敘次重複今刪節改輯元祐初司馬光請令三省合班奏事分省治事至是從吕頤浩言詔左右僕射並同中書門下平章事改中書門下侍郎為參知政事省尚書左右丞帝如江寧既至改江寧為建康府冊魏國公旉為皇太子五月以張浚為川陜京湖宣撫處置使便宜黜陟浚招諭劇盜薛慶于高郵慶降浚因留撫其衆或傳浚被執吕頤浩等請罷浚帝從之越十日浚還帝驚嘆即日趣還原職浚謂中興當自闗陜始慮金人或先入陜蜀則東南不可保因慷慨請行詔以浚為宣撫處置使聽便宜黜陟與沿江襄漢守臣議儲蓄以待臨幸帝問浚大計浚請身任陜蜀之事置幕府于秦州别遣大臣與韓世忠鎮淮東令吕頤浩扈蹕來武昌為趋陜之計復以張俊劉光世與秦州相首尾帝然之初浚宣撫川陜之議未決監登聞檢院汪若海曰天下者常山蛇勢也秦蜀為首東南為尾中原為脊今以東南為首安能起天下之脊哉將圖恢復必在川陜浚大悅遣徽猷閣待制洪皓字光弼鄱陽人使金金人拘之尼瑪哈自東平還雲中鄂爾多自濱州還燕山帝遣皓還金遺尼瑪哈書願去尊號用金正朔比于藩臣時所在盜梗皓艱難百端得逹太原留一年遣至雲中尼瑪哈迫皓使仕劉豫皓曰萬里衘命不得奉兩宫南歸恨力不能磔逆豫忍事之邪留亦死不事豫亦死不願偷生狗䑕間願就鼎鑊無悔尼瑪哈怒將殺之旁一校曰此真忠臣也目止劍士為皓跪請得流遞冷山即冷􅣦山亦作冷陘方輿紀要山在故黄龍府北韓世忠獲苖傅劉正彦送行在誅之世忠言賊擁精兵距甌閩甚邇倘成巢穴卒未可滅帝詔世忠與劉光世追討之世忠自衢信進至浦城注見前之魚梁驛與苗傅劉正彦遇世忠步走挺戈而前賊望見咋曰此韓將軍也皆驚潰遂擒正彦及傅弟翊王德亦執苗瑀斬馬柔吉傅亡入建陽縣人詹剽執之獻于世忠世忠悉送行在斬之帝手書忠勇二字揭旗以賜世忠六月大霖雨詔郎官以上言闕政罷王安石配享神宗廟廷時久雨恒陰吕頤浩張浚皆謝罪求去詔郎官以上言闕政司勲員外郎趙鼎上疏曰自熙寧間王安石用事變祖宗之法而民始病假闢國之謀造生邊患興理財之政窮困民力設虚無之學敗壞人材至崇寧初蔡京託紹述之名盡祖安石之政凡今日之患始于安石成于蔡京今安石猶配享神宗而京之黨未除時政之闕莫大于此帝從之遂罷安石配享尋下詔以四失罪己一曰昧經邦之大畧二曰昧戡難之遠圖三曰無綏人之徳四曰失馭臣之柄仍榜朝堂使知朕悔過之意中丞張守上疏曰陛下處宫室之安則思二帝母后穹廬毳幕之居享膳羞之奉則思二帝母后羶肉酪漿之味服細暖之衣則思二帝母后窮邊絶塞之寒苦操予奪之柄則思二帝母后語言動作受制于人享嬪御之適則思二帝母后誰為之之使今對臣下之朝則思二帝母后誰為之尊禮思又思兢兢栗栗聖心不倦而天不為之順助者萬無耳是理也今罪已之詔數下而天未悔禍實有所未至罷右司諫袁植植請誅黄潛善及失守者權邦彦字朝美河間人等九人詔以朕方念咎責已豈可盡罪臣下植雖敢言然導朕以殺人此非美事遂出知池州金烏珠大舉南侵尼瑪哈鄂爾多既還烏珠請大起燕雲河朔兵南侵金主從之遂破磁單密州又破興仁府帝以金人復來乃遣工部尚書崔縱使金并通問二帝縱至金首以大義責金人請還二帝金人怒徙之寢荒縱不少屈竟死焉崔縱字元矩撫州臨安人秋七月太子旉卒諡元懿御營司提舉范瓊有罪伏誅張浚發建康初汴京破二帝及宗室北遷多瓊之謀又乘時剽掠左右張邦昌為之從衛至是自洪州入朝悖慢無禮且乞貸苗劉等死帝畏其威以為御營司提舉一行事務張浚將赴川陜與樞密檢詳文字劉子羽密謀誅之一日命張俊以千兵渡江若備他盜者使皆甲而來因詔瓊浚及劉光世赴都堂議事為設食食已諸公相顧未發子羽坐廡下恐瓊覺取黄紙趋前舉以麾瓊曰下有敕將軍可詣大理寺置對瓊愕不知所為子羽顧左右擁置輿中衛以俊兵送獄光世出撫其衆數瓊在圍城中附金迫二帝北狩之罪且曰誅止瓊爾汝等固天子自將之軍也衆皆投刃曰諾有旨分𨽻御營五軍瓊下獄具服賜死子弟皆流嶺南瓊既誅張浚乃發建康升杭州為臨安府初吕頤浩與張浚定幸武昌之議及浚行頤浩以為道遠饋餉難繼乃變前論㑹滕康字子濟宋城人張守陳武昌有十害不可往帝從之遂升杭州為臨安府將定都焉詔李邴時為叅知政事滕康時簽書樞密權知三省樞密院事奉隆祐太后如洪州太后至建康㑹防秋迫命劉寧止字無虞湖州歸安人制置江淮荆湖扈太后往洪州百司非預軍事者悉從命康邴權知三省樞密院事從行凡四方奏讞吏部差注舉辟功賞之數皆隸焉李邴尋罷以劉珏代之又命四廂都指揮使楊惟忠將兵萬人以衛過落星寺在南康府星子縣南鄱陽湖中方輿紀要昔有星墜水為石因名宋建炎中孟大后過此建寺後改為福星院暴風覆舟宫人溺死者無數惟后舟無虞以杜充同知樞密院事充留守東京以糧絶歸行在遂有是命充將發汴岳飛諌曰中原地尺寸不可棄今一舉足此地非我有他日取之非數十萬衆不可不聽朝廷命郭仲荀程昌㝢相繼代充然留守司名存而已廣州教授林勲賀州人上本政書勲上本政書十三篇言國朝兵農之政大抵因唐末今農貧而民失職兵驕而不可用地利多遺財用不足皆本政不修之故宜倣古井田之制使民一夫占田五十畝其有羡田之家毋得市田其無田與游惰末作者皆驅之使為隸農以耕田之羡者而雜紐錢穀以為什一之稅毎十六夫為一井毎井賦二兵馬一匹蠶婦之貢絹三尺緜一兩非蠶鄉則布六尺麻二兩其說甚備書奏詔以為桂州節度掌書記八月遣使致書于金金人不答時聞金人南侵而洪皓崔縱未得還帝求可使緩師者乃遣京東轉運判官杜時亮及修武郎宋汝為字師禹豐縣人使金請和致書于尼瑪哈又命吕頤浩遺書劉豫以諭意與尼瑪哈書曰古之有國家而迫于危亡者不過守與奔而已今以守則無人以奔則無地此所以諰諰然惟冀閣下之見哀而已故前者連奉書願削去舊號是天地之間皆大金之國而尊無二上亦何必勞師遠涉而後為快哉閏月以吕頤浩杜充守尚書左右僕射並同中書門下平章事時始正官名事具前罷起居郎胡寅寅上疏曰陛下以親王介弟受淵聖皇帝之命出師河北二帝既遷則當糾合義師北向迎請而乃亟居尊位建立太子不復歸覲宫闕展省陵寢偷安嵗月畧無捍禦及敵騎乘虛匹馬南渡一向畏縮惟務遠逃軍民怨咨恐非自全之計也因進七策一罷和議而修戰畧二置行臺以區别緩急之務三務實效去虛文四大起天下之兵以自彊五都荆襄以定根本六選宗室之賢才封建任使之七存紀綱以立國體書凡數千言吕頤浩惡其切直罷之于外詔杜充韓世忠劉光世分屯江東以備金帝召諸將議駐蹕之地張俊辛企宗請自鄂岳幸長沙韓世忠曰國家已失河北山東若又棄江淮更有何地吕頤浩曰金人之謀以陛下所至為必爭之地今當且戰且避奉陛下于萬全之地臣願留常潤死守帝曰朕左右不可無相乃以充兼江淮宣撫使守建康王􅊅隸之韓世忠為浙西制置使守鎮江劉光世為江東宣撫使守太平池州皆受充節制杜充嚴急光世不樂屬充㑹朝議以隆祐太后在豫章恐有震驚乃命光世移屯江州以屏蔽之帝如臨安考功員外郎樓炤字仲輝婺州永康人上疏言今日之計當思古人量力之言察兵家知己之計力可以保淮南則以淮南為屏蔽權都建康漸圖恢復力未可以保淮南則因長江為險阻權都吳㑹以養國力于是帝還臨安不復議防淮矣九月丙午朔日食金人破南京知府凌唐佐字公弼徽州休寜人被執劉豫因使為守唐佐與宋汝為密疏其虛實以蠟書告于朝事泄豫併其家捕之唐佐見豫責以大義豫怒殺之境上詔周望守平江諜報金人治舟師將由海道窺江浙詔韓世忠守圖山在鎮江府丹徒縣東北濱江為險福山在蘇州府常熟縣北下臨大江與通州狼山相對望初由兵部尚書進簽書樞密院事至是以為兩浙荆湖宣撫使總兵守平江既而郭仲威降于望進望同知樞宻院事仍守平江遣直龍圖閣張邵字才彦烏江人使金金人囚之邵至濰州見逹蘭命邵拜邵曰監軍與邵為南北朝從臣無拜禮且其書言兵不在彊弱在曲直天未厭宋而金乃裂地以封劉豫復窮兵不已曲有在矣達蘭怒取所賫國書去送邵密州囚于祚山祚山方輿紀要作岞山在青州府安邱縣東北金人置砦于此金殺故知真定府李邈邈故為真定帥被執三年金人欲使知滄州邈笑不答及是金下令改易冠服邈憤詆之金人撾擊其口猶吮血噀之遂遇害邈將死顔色不變南向拜訖就死燕人為之流涕後事聞諡曰忠壯冬十月帝至臨安留七日復加越州時烏珠分兵一自滁和入江東一自蘄黄入江西帝遂如越州張浚治兵于興元浚至興元上疏言漢中實形勝之地前控六路之師後據兩川之粟左通荆襄之財右出奏隴之馬號令中原必基于此宜謹積粟理財以待巡幸于是辟劉子羽㕘議軍事承制以趙開字應祥普州安居人為隨軍轉運使專總四川財賦開先提舉川陜茶馬事茶引收息至一百七十餘萬緡馬逾二萬匹至是見浚曰蜀之民力盡矣錙銖不可加獨椎貨尚存贏餘而貪猾認為已有互相隱匿惟不恤怨詈斷而敢行庶可救一時之急浚銳意興復委任不疑于是大變酒法即舊撲買坊場所置隔釀設官主之麴與釀具官悉自買聽釀戸各以米赴官場自釀斛䩱錢三十頭子錢二十二其釀之多寡惟錢是視不限數也又于秦州置錢引務興州鼓鑄銅錢官賣銀絹聽民以錢引或銅錢買之凡民錢當入官者並聽用引折納官支出亦如之民以為便時浚荷重寄旬犒月賞期得士死力費用不貲盡取辦于開開悉智慮于食貨算無遺䇿雖支費不可計而貲財常有餘初曲端欲斬王庶朝廷疑其叛浚以百口保之且以其與敵屢角欲仗其威聲承制築壇拜端威武大將軍宣撫司都統制軍士歡聲如雷子羽又薦涇原都監吳玠及弟璘字唐卿之才勇浚以玠為統制璘掌帳前親兵金人趋江西劉光世引兵遁十一月隆祐太后如䖍州江西州軍多潰烏珠遣當海先取夀春而自以兵繼之掠光州擊破張用軍聞太后在南昌遂攻破黄州知州趙令􅍲燕王徳昭後不屈被殺光世在江州日置酒高㑹金人自黄州渡江凡三日無知之者金兵薄城下光世遂引兵趋南康金人入城由大冶五代南唐縣今屬武昌府趋洪州滕康劉珏聞金兵至奉太后出城江西制置使王子獻棄洪州走金人遂破臨江軍宋置今江西臨江府是洪撫袁三州注俱見前亦破太后至吉州方五日金人追之急后乘舟夜行質明至太和縣隋縣明改㤗和今屬吉安府舟人景信反楊惟忠兵潰失宫人一百六十滕康劉珏皆遁兵衛不滿百遂自萬安宋縣今屬吉安府陸行如䖍州后及潘貴妃開封人以農夫肩輿而行至䖍州府庫皆空衛兵所給惟得沙錢市買不售與百姓交鬭縦火肆掠土豪陳新率衆圍城楊惟忠部將胡友自外引兵破新于城下后稍得安既而金人破吉州還屠洪州帝如浙西未至復如越州帝初欲幸明州用吕頤浩計復還杭州乃下詔親征百司有至曹娥江其上流即剡溪自紹興府嵊縣流逕㑹稽縣曹娥廟前因名曹娥江其下流亦曰舜江至三江口入海者有至錢清堰即錢青鎮在紹興府山隂縣錢清江所經也以東漢太守劉寵受父老一錢事得名者侍御史趙鼎力諫以為衆寡不敵不若為避敵之計遂復詔百司回越州知徐州趙立將兵勤王敗金人于淮陰立聞詔諸路以兵勤王乃將兵三萬趋行在杜充承制以立知楚州金人聞立棄徐州將赴楚州乃以兵邀于淮陰立麾下勸立不如還保徐州立奮怒嚼其齒曰回顧者斬于是率衆徑進與金人遇轉戰四十里至楚州城下立中箭貫兩頰口不能言以手指揮既入城休士而後㧞鏃議者謂自燕山之役南北戰爭未有如此之鏖戰者以范宗尹參知政事趙鼎為御史中丞二人皆嘗建議避金人故遂用之金烏珠渡江入建康杜充叛降金通判楊邦乂字希稷吉水人死之時江浙倚重于充而充日事誅殺且無制敵之方及烏珠與李成合兵攻烏江充閉門不出統制岳飛泣諫請視師充不從烏珠遂乘充無備進兵取和州無為軍遂由馬家渡渡江破太平州充始遣都統制陳淬字君銳莆田人及飛帥師迎戰王􅊛以軍先遁淬敗死諸將皆潰充兵亦散烏珠至建康守臣陳邦光户部尚書李梲迎降充渡江保真州諸將怨充嚴刻欲乘其敗害之充聞不敢還營居長蘆寺烏珠遣人說之曰若降當封以中原如張邦昌故事充遂降金通判楊邦乂獨不肯屈膝以血大書裾曰寧作趙氏鬼不為他邦臣烏珠使人誘以官終不屈大罵求死遂殺之充至金尼瑪哈薄其為人久之乃得仕帝奔明州帝聞杜充叛降謂吕頤浩曰事迫矣若何頤浩遂進航海之䇿其言曰敵兵多騎必不能乘舟襲我江浙地熱必不能久留俟其退去復還二浙彼出我入彼入我出此兵家之竒也帝然之遂如明州盜桑仲據襄陽初張浚承制以程千秋為京西制置使軍襄陽千秋招降劇盜曹端桑仲未㡬疑仲有異命端圖之端及千秋所部俱為仲所敗千秋棄城自金州注見前入蜀仲遂據襄陽京西列城皆為仲所有時有邵青者本五丈河舟人去為盜剽掠淮泗間又江淮宣撫司凖備將戚方擁衆為盜犯鎮江殺守臣胡唐老進破廣徳軍既而方為岳飛所敗令降于張俊青後降而復叛聚其衆于崇明沙劉光世王徳討之諜言賊將用火牛徳笑曰此古法也可一不可再命合軍特滿陣始交萬矢齊發牛皆返奔賊衆殱焉青自縛請罪徳獻諸行在廣徳軍宋置今安徽廣徳州是崇明沙即今太倉州崇明縣唐宋時疊漲三沙鼎立海中其東沙即舊縣所治後已屢遷王徳字子華通遠軍熱羊砦人韓世忠自鎮江退守江陰今常州府江陰縣宋為江陰軍十二月金烏珠破臨安遣兵渡浙追帝帝航于海烏珠自建康趋廣徳殺守臣周烈遂過獨松闗在杭州府餘杭縣西北獨松嶺上為江浙二境要隘見無戍者謂其下曰南朝若以羸兵數百守此吾豈能遽度哉遂扺臨安守臣康允之棄城走錢塘縣令朱蹕湖州吉安人死之烏珠聞帝在明州遣阿里富埓琿帥精騎渡浙追之帝乘樓船入海次于定海縣五代吳越置望海縣宋太平興國中改名定海即春秋甬東也注見前留范宗尹趙鼎于明州以俟金又謂張俊曰若能捍敵成功當加王爵吕頤浩奏令從官以下各從便去帝曰士大夫當知義理豈可不扈從若然則朕所至乃同寇盜耳于是郎官以下多從衛越四日帝舟次昌國縣宋置明改為衛在今寧波府象山縣西南江淮統制岳飛敗金人于廣徳飛率所部自建康躡金人于廣徳境中六戰皆捷擒金將王權俘首領四十餘察其可用者結以恩義遣還令夜斫營縱火飛乘亂縱擊大破之駐軍鍾村在廣徳州境軍無見糧將士忍饑秋毫無犯金所籍兵爭降附之金人破越州遂趋明州張俊使統制楊沂中迎戰于高橋敗之阿里富埓琿入越州宣撫郭仲荀奔温州知府李鄴降通判曾怘守仲常鞏之孫死之富埒琿遂濟曹娥江至明州西門之高橋張俊使統制劉保與戰而敗楊沂中等復殊死戰沂中舍舟登岸知明州劉洪道帥州兵射其旁大破之殺數千人金使來召人至砦計事俊使小校往金人與語欲入越州請降俊拒之戒將士慮敵必再至下令清野多以輕舟伏弩閉闗自守庚戌四年金天㑹八年春正月金人破明州屠其民遂襲帝于海帝走温州是月朔西風大作金師乘之次日復攻明州張俊劉洪道坐城樓遣兵掩擊殺傷大半金人奔北死于江者無數夜拔砦退屯餘姚而遣人請濟師于烏珠明日帝移次台州章安鎮本後漢縣隋廢為鎮今曰章安市在台州府臨海縣西南越四日烏珠遣兵與阿里富埓琿復攻明州張俊懼帥師趋台州劉洪道亦遁越九日金師乃入城屠其民乘勝破昌國縣聞帝在章安以舟師追三百餘里弗及提領海舟張公裕引大舶擊郤之金人引還帝發章安如温州泊于港口續綱目作帝聞明州破移次章安鎮考宋史髙宗紀丙午帝次章安己未金破明州相距十有四日今依本紀次序改輯金羅索陷陜州知州事李彦仙死之彦先在陜蒐軍實增陴濬隍益為戰守備遣都領邵興復虢州金將烏魯來攻彦仙敗之羅索聞之自蒲解率兵大至彦仙又大敗之羅索僅以身免彦仙度金人必併力來攻即遣人求兵于張浚已而羅索果率折可求等衆十萬來分其軍為十以正月旦為始日輪一軍攻城期以三旬必拔彦仙意氣如常數出兵與戰既而食盡告急于浚浚檄曲端以涇原兵援之端素嫉彦仙不奉命浚曰金若下陜則全據大河且窺蜀矣乃出師至長安道阻不得進彦仙日與金戰羅索竒其才誘啗百端彦仙悉斬其使力盡城陷彦仙投河死其屬官居民無一人降者羅索怒盡屠之金以韓企先燕京人為尚書左僕射兼侍中時金方議禮制度企先博通經史知前代故事或因或革咸取折衷二月河北盜酈瓊字國寳相州臨漳人降于劉光世瓊初𨽻宗澤澤死調戌滑州金人南下戍軍亂殺其統制推瓊為主瓊因誘衆勤王行收兵比渡淮有衆萬餘至和州為金當海所敗遂率衆降于光世詔以為楚州安撫使以盧益李囘權知三省樞密院事御史張延夀論滕康劉珏不能憂國使太后涉險為敵人追迫遂俱免而以益囘代之金人屠潭州金既破江西諸郡乃引兵趣湖南遂陷潭州將吏王暕劉价趙聿之戰死向子諲字伯恭敏中元孫率兵奪門而出金兵遂大掠屠其城而去金烏珠引兵北還烏珠還臨安縱火焚掠以輜重不可遵陸取道秀州而北金游騎至平江周望奔太湖知府湯東野棄城遁烏珠入城縦火焚掠死者五十萬烏珠遂入常州鎮江府既而侍御史沈與求論望罪謫連州安置沈與求字必先湖州徳清人金人入東京權留守上官悟出奔為盜所殺自是四京皆沒于金鼎州人鍾相作亂尋伏誅其黨楊太復叛金人去潭州羣盜大起相嘗以左道惑衆因結集勇壯以捍敵為名自稱楚王改元天載攻陷澧州既而孔彦舟擊相時彦舟初降擒送行在誅之其黨楊太復聚衆于龍陽三國吳縣今屬常徳府太又名么蓋楚人謂年少者為么云後太衆日盛自稱大聖天王立種相少子子儀為太子大以下皆臣事之三月遣使迎隆祐太后于䖍州帝為輔臣曰朕初不識太后自迎至南京愛朕不啻已出今在數千里外兵馬驚擾當即奉迎以愜朕朝夕慕念之意遂遣盧益及辛企宗潘永思等奉迎于䖍州夏四月金人入潼闗曲端使吳玠拒于彭原在慶陽府寧州故彭原縣西南寰宇記隋因原名縣敗績端走還涇原宋史曲端傳作涇州考宋涇原路治涇州端退還本鎮故宋史與綱目互舉言之金羅索既破陜遂長驅入闗攻環慶曲端遣吳玠拒于彭原而自將屯邠州玠先擊金人敗之薩里罕懼而泣金人目之日啼哭郎君羅索整軍復戰玠軍敗績端退屯涇原金乘勝焚邠州玠怨端不為援大罵之由是二人有隙金人雖勝玠以端全軍退去且時方盛暑遂復還河東帝還越州金人退帝將西還召羣臣議駐驆之所吕頤浩曰將來宜駐浙右徐圖入蜀范宗尹曰若便入蜀恐兩失之據江表而圖闗陜則兩得之帝曰善遂發温州至越州下詔親征巡幸浙西尋升越州為紹興府韓世忠邀擊金烏珠于江中大敗之走建康復引兵襲世忠世忠敗績烏珠遂趋江北初韓世忠以前軍駐青龍鎮在松江府青浦縣北以青龍江名中軍駐江灣鎮名在太倉州寶山縣南吳淞江口後軍駐海口欲俟烏珠師還擊之及烏珠由秀趋平江世忠事不就遂移師鎮江以待之金師至江上世忠先以八千人屯焦山寺山在鎭江府丹徒縣東江中後漢處士焦先隱此因名烏珠欲濟江乃遣使通問且約戰期世忠許之因謂諸將曰是間形勢無如金山在丹徒縣西北江中與焦山對峙本名浮玉山以裴頭陀開山得金因改名龍王廟者敵必登之以覘我虛實乃遣蘇徳將百人伏廟中百人伏廟下岸側戒之曰聞江中鼓聲則岸兵先入廟兵繼出以合擊之及敵至果有五騎趨廟廟兵先鼓而出獲兩騎其三騎則振策以馳馳者一人紅袍玉帶既墜復跳而起詰諸獲者則烏珠也既而接戰江中凡數十合世忠妻梁氏親執桴鼓敵終不能濟俘獲甚衆獲烏珠之壻龍虎大王烏珠懼請盡歸所掠以假道世忠不許復益以名馬又不許遂自鎮江泝流西上烏珠循南岸世忠循北岸且戰且行世忠艨艟大艦出金師前後數里擊柝之聲逹旦將至黄天蕩在江寧府上元縣東北大江至此寖深廣横濶三十里烏珠窘甚或曰老鸛河故道亦名老鸛嘴在黄天蕩南今雖湮塞若鑿之可通秦淮烏珠從之一夕渠成凡三十里遂趋建康岳飛以騎三百步兵三千邀擊于新城亦曰北城在句容縣北大破之烏珠乃復自龍灣市名在上元縣西北出江中趋淮西㑹達蘭自濰州遣貝勒塔葉舊作孛堇太乙今改後仿此引兵來援烏珠乃復引還欲北渡世忠與之相持于黄天蕩塔葉軍江北烏珠軍江南世忠以海艦進泊金山下豫以鐵綆貫大鈎授健者明旦敵舟譟而前世忠分海舟為兩道出其背每縋一綆則曳一舟沉之烏珠窮蹙求㑹語祈請甚哀世忠曰還我兩宫復我疆土則可以相全烏珠語塞又數日求再㑹而言不遜世忠引弓欲射之烏珠亟馳去見海舟乘風使篷往來如飛謂其下曰南軍使船如使馬奈何乃募人獻破舟之策于是閩人王姓者教其舟中載土以平板鋪之穴船板以櫂槳俟風息則出海舟無風不可動也且以火箭射其箬篷則不攻自破矣烏珠從之刑白馬以祭天及天霽風止烏珠以小舟出江世忠絶流擊之海舟無風不能動烏珠令善射者乘輕舟以火箭射之烟燄蔽天師遂大潰焚溺死者不可勝數世忠僅以身免奔還鎮江烏珠遂濟江屯于六合縣世忠以八千人拒烏珠十萬之衆凡四十八日而敗然金人自是亦不敢復渡江矣遷趙鼎為翰林學士辭不拜吕頤浩免初御營司本以行幸總齊軍政而宰相兼領之遂專兵柄樞府㡬無所預頤浩在位尤顓恣中丞趙鼎嘗疏論之及聞韓世忠敗金人頤浩請帝幸浙西下詔親征帝將從之趙鼎以為不可輕舉頤浩惡鼎異已改鼎翰林學士鼎不拜改吏部尚書又不拜乃上言陛下有聽納之誠而宰相陳拒諫之説陛下有眷待臺臣之意而宰相挾挫沮言臣之威堅卧不出上疏論頤浩過失凡千餘言頤浩因求去詔以頤浩倡義勤王宜從優禮乃罷為鎮南軍節度使醴泉觀使而復命鼎為中丞諭之曰朕每聞前朝忠諌之臣恨不之識今于卿見之留守司統制牛臯字伯遠汝州魯山人追敗金人于寶豐宋縣今屬汝川金兵下江西者聞烏珠北還亦自荆門注見前引去留守司統制牛臯潛軍邀擊敗之于寶豐之宋村五月岳飛襲金人于靜安鎮名在上元縣西北其旁即龍灣市敗之烏珠既濟江金人在建康者大肆焚掠執李梲陳邦光等自靜安渡宣化亦鎮名在六合縣南而去梲道死邦光歸于劉豫岳飛邀金人于靜安鎮大敗之初杜充之敗也其將士潰去多行剽掠獨飛嚴戢所部不擾居民士夫避寇者多賴以免以翟興等為荆湖淮南諸路鎮撫使分地處之時京東西荆湖南北淮南諸路盜賊蠭起大者數萬人據有州郡朝廷不能制范宗尹言于帝曰羣盜皆烏合之衆急之則併死力以拒官軍莫若析地以處之盜有所歸則可以漸制帝善之乃以翟興等並為鎮撫使分地畀焉翟興河南府孟汝唐州趙立楚泗州漣水軍今淮安府安東縣宋為漣水軍劉位滁濠州趙霖和州無為軍李成舒蘄州吳翊光黄州李彦先海州淮陽軍薛慶高郵天長軍未幾又授陳規徳安府復州漢陽軍解潛荆南府歸峽州荆門公安軍程昌㝢鼎澧州陳求道字徳之成寧人襄陽府鄧隨郢州范之才金均房州馮長寧順昌府蔡州軍興聽便宜從事俾立顯功許以世襲然李成薛慶輩起于羣盜翟興劉位土豪李彦先等皆潰將既無統屬有急又不遣援故諸鎮鮮能自守尋又以孔彦舟為辰沅靖州郭仲威為真楊鎮撫使既而陳求道為劉忠所執罵賊死劉位為盜所殺薛慶與金人戰楊州城下敗績死之李彦先引兵援楚州亦敗死馮長寧叛附劉豫吳翊棄城遁走郭仲威謀據淮南以道劉豫王徳襲執之送行在伏誅其李成孔彦舟降劉豫翟興為下所殺事别詳後金人圍楚州金逹蘭圍楚州急趙立命撤廢屋城下然火池壯士持長矛以待金人登城鈎取投火中金人選死士突入又搏殺之乃稍引退至是烏珠將北歸以輜重假道于楚立斬其使烏珠怒乃設南北兩屯絶楚餉道六月罷御營司以范宗尹兼知樞密院事秋七月張浚罷其都統制曲端浚雖重用端然以人言浸潤不能無疑乃使張彬詣渭州察之彬至謂端曰今兵合財備羅索以孤軍深入吾境我合諸路攻之不難端曰彼將士精銳且因糧于我我今反為客未可勝也若按兵據險時出偏師以擾其耕穫彼必取糧河東則我為主矣如此一二年彼必困弊乃可圖也萬一輕舉後憂方大彬還白浚浚不以為然及烏珠留江淮浚議出師撓之端曰平原廣野敵便于衝突而我軍未嘗習水戰金人新造之勢難與爭鋒宜訓兵秣馬保疆而已俟十年乃可浚積前疑遂以彭原之敗罷端兵柄再貶海州團練副使萬安軍安置以岳飛為通泰鎮撫使張浚薦之也飛辭乞淮東一重難任使收復本路州郡乘機漸進使山東河北河東京畿等路次第而復不聽金烏珠引兵趨陜西時張浚以金兵萃淮上懼其復擾東南謀牽制之欲出兵分道由同州鄜延以擣其虛烏珠聞之遂自六合引兵趋陜西金主亦以羅索專攻陜西所下城邑旋復拒守因其請益兵命鄂爾多往監其軍張浚遣兵復陜西軍州趙哲復鄜州吳玠復永興軍其餘州縣多迎降金徙二帝于五國城注見前金將立劉豫乃徙二帝于五國城去上京東北千里徙此踰月太上皇后鄭氏崩洪浩自雲中密遣人奏書以桃梨栗麪等獻二帝始知帝即位之實建人范汝為作亂時方艱食民從之者甚衆州遣兵出戰為所敗賊勢滋盛統制李捧捕之官軍大潰而遁詔福建安撫使程邁㑹兵進討時汝為已破建陽乃移命神武副軍統制辛企宗討之八月隆祐太后至越州以桑仲為襄鄧隨郢鎮撫使范宗尹念鄉國被禍請赦仲罪而授以官從之九月金立劉豫為齊帝初金主聞帝如東南遣尼瑪哈南侵諭之曰俟宋平當援立藩輔如張邦昌者及烏珠北還衆議折可求劉豫皆可立豫以重寶賂達蘭請立已達蘭許之乃言于尼瑪哈未之許高慶裔說之曰吾家舉兵只欲取兩河故汴京既得則立張邦昌今河南州郡官制不易者豈非欲循邦昌故事邪元帥盍不早建議而使恩歸他人也尼瑪哈從之乃遣使即豫所部咨軍民所宜立者衆未及對豫鄉人張浹請立豫議遂定達蘭以聞于是金乃遣慶裔及知制誥韓昉備璽綬寶冊立豫為大齊皇帝世修子禮奉金正朔置丞相以下官九月豫即位都大名府以子麟為提領諸路兵馬兼知濟南府弟益為北京留守冊其母翟氏為皇太后妾錢氏為皇后改明年為阜昌元年朝廷聞之凡偽仕于豫而其家屬在東南者悉厚加撫䘏詔劉光世督諸軍救楚州光世不進鎮撫使趙立死之楚州破楚州被圍久立遣人告急趙鼎欲遣張俊救之俊辭不行乃命劉光世督淮南諸鎮救楚州光世將王徳酈瓊等多不用命惟岳飛僅能為援而衆寡不敵帝以書趣光世㑹兵者五光世訖不行金人知外援絶進攻東城立登磴道以觀飛礟中其首左右馳救之立曰我終不能為國殄敵矣言訖而絶金人疑立詐死不敢動越旬餘城始破立為人木強不知書忠義出天性仇視金人所俘磔以示衆未嘗獻馘也事聞贈奉國節度使謚忠烈張浚使都統制劉錫帥五路之兵與金羅索大戰于富平敗績浚退軍秦州浚聞烏珠將至檄召熙河劉錫秦鳳孫偓涇原劉錡字信叔德順軍人環慶趙哲四經畧及吳玠之兵合四十萬人馬七萬匹以錫為統帥迎敵決戰王彦諫曰陜西兵將上下之情未通若不利則五路俱失不若且屯利閬興洋以固根本敵入境則檄五路之兵來援萬一不捷未大失也浚不從劉子羽亦力言未可浚曰吾寧不知此顧東南事方急不得不為是耳吳玠郭浩字充道龍于人皆曰敵鋒方銳宜各守要害須其弊而乘之亦不從遂行次于富平縣劉錫㑹諸將議戰玠曰兵以利動今地勢不利未見其可宜擇高阜據之使不可勝諸將皆曰我衆彼寡又前阻葦澤敵有騎不得施何用他徙將戰軍中詐張前都統制曲端旗以懼敵金羅索撫掌大笑曰聞曲將軍已得罪何紿我也遂擁兵驟至後宋元通鑑以詐張端旗為富平再戰之事係端死考宋史張浚傳無再敗富平之事通鑑蓋本羅大經鶴林玉露說不足據今採岳珂桯史輯注已而金人輿柴囊土藉淖平行進薄諸營錫等與之力戰劉錡身率將士薄陳殺獲頗多勝負未分而金鐵騎直擊趙哲軍他將不及援哲因離所部其將校望見塵起遂驚遁諸將皆潰金乘勝而進闗陜大震浚時駐邠州督戰既敗退保秦州召趙哲斬之而安置劉錫于合州令諸將各還本路上書待罪帝手詔慰勉之自是闗陜不可復論者咎浚之輕師失律焉是役也金羅索已病既戰烏珠左翼軍將郤羅索以右翼力戰遂敗浚軍未㡬索卒冬十月金人縱秦檜還檜從二帝至燕金主以檜賜逹蘭為其任用達蘭信之及南侵以為㕘謀軍事又以為隨軍轉運使達蘭攻楚州檜與妻王氏自軍中趋漣水軍自言殺金人監已者奪舟而來欲赴行在遂航海至越州帝命先見宰執檜首言如欲天下無事須是南自南北自北朝士多疑其與何㮚孫傅等同被拘執而檜獨還又自燕至楚二千八百里踰河越海豈無譏訶之者安得殺監而南就令從軍達蘭金人縱之必質妻屬安得與王氏偕惟范宗尹及李回二人素與檜善盡破羣疑力薦其忠檜入對首奏所草與達蘭求和書帝謂輔臣曰檜樸忠過人朕得之喜而不寐既聞母后消息又得一佳士也遂拜禮部尚書先是朝廷雖數遣使于金但且守且和而專意與金解仇息兵則自檜始葢檜首倡和議故達蘭隂縱之使還也十一月趙鼎罷以富直柔字季申弼之孫簽書樞密院事上欲以副都統辛企宗為節度使鼎言企宗非軍功持不下帝不樂遂罷鼎提舉洞霄宫欲申企宗前命謝克家是秋八月拜參知政事曰如此是使鼎得名企宗得利而陛下獨負謗于天下後世也日南至帝率百官遙拜二帝自渡江至是始有此禮其後正旦亦然以王彦為金均房州鎮撫使時所在盜起加以饑饉無所資食惟蜀富饒巨盜徃往窺覬桑仲既陷均房遂乘勢直搗金州白土闗在陜西與安州平利縣東南與湖北鄖陽府竹溪縣接界衆號三十萬仲彦舊部曲也以申牘請于彦曰仲于公無敢犯願假道入蜀就食耳彦遣統領閔立為先鋒擊之賊銳甚立戰死將士失色或請避之彦叱曰樞相張公方有事闗陜若仲越金而至梁洋則腹背受敵大事去矣敢言避者斬即勒兵趋長沙平在鄖陽府房縣阻水據山設伏以待仲見官軍少蟻附搏戰彦執幟一麾士殊死鬬仲敗走彦休士進擊追奔至白磧山名在房縣西北遂復房州張浚以彦為金均房州鎮撫使張浚退軍興州遣吳玠守和尚原在鳳翔府寶雞縣西南大散闗之東以拒金時金人盡破涇原諸州軍叛將慕洧復引金兵破環慶遂入徳順軍注見前浚聞之乃退保興州時輜重焚棄將士散亡惟親兵千餘自隨人情大沮或請徙治夔州㕘軍劉子羽叱之曰孺子可斬也四川全盛敵欲入寇久矣直以川口有鐵山在漢中府沔縣北棧道注見前之險未敢遽窺爾今不堅守縱使深入而吾僻處夔峽遂與闗中聲援不相聞進退失計悔將何及今幸敵方肆掠未逼近郡宣司但當留駐興州外繫闗中之望内安全蜀之心急遣官屬出闗呼召諸將收集散亡分布隘險堅壁固壘觀釁而動庶幾可以補前愆耳浚然其言而諸參佐無敢行者子羽請即奉命乃單騎至秦州召諸亡將時諸將不知宣司所在及聞命大喜悉以其衆來㑹凡十餘萬人軍勢復振子羽因請遣吳玠聚兵扼險于鳳翔大散闗柬之和尚原以斷金人來路闗師古等聚熙河兵于岷州大潭宋縣屬岷州故城在今秦州禮縣孫偓賈世方等聚涇原鳳翔兵于階成鳳三州以固蜀口金人知有備遂引去十二月金人侵熙河副總管劉惟輔死之金人掠熙河惟輔擊敗之殺五千餘人已而復至惟輔顧熙河尚有積粟恐金人因之以守急出焚之為金人所執捽以去惟輔大呼曰斬即斬吾頭豈汝捽也顧坐上客曰國家不負汝一旦遽降敵邪即閉口不言而死所部亦多不屈被殺定差役法初帝在河朔親見閭閻之苦嘗嘆知縣不得其人一充役次即至破家及即位深加講議乃定差役法以二十五家為一保十大保為一都内選才勇物力最高者二人充都保主一都盗賊烟火之事一年得替其次有保長二年得替又有户長主催一都人户夏秋二稅一稅一替若品官之家並得免差而限田有制一品限五十頃至九品五頃子孫減半䕃盡則役同編户太學生及得解經省試者許募人充役軍丁女户及孤弱悉免金人大索客户拘殺之金密諭諸路令同日大索兩河之民及拘行旅于道凡三日而罷應客戸並籍入官刺其耳為官字鎻之雲中及散養民間立價鬻之或驅之于韃靼諸國以易馬蓋既立偽齊以舊河為界恐陷敵者逃歸豫地故爾樂壽縣得客户六十八人誤作六百八人以報尼瑪哈必責其數縣官執窮民以足之被掠歸雲中者不令出城無以自活士大夫往往乞食于途尼瑪哈見其多恐或生事聚三千餘人坑之辛亥紹興元年金天㑹九年春正月以張俊為江淮招討使岳飛副之時孔彦舟據武陵張用據襄漢李成據江淮湖湘十餘郡尤悍強連兵數萬有席捲東南之意多造符䜟幻惑中外久圍江州吕頤浩救之不克時頤浩為江南安撫制置大使為成將馬進所敗江州尋陷朝廷患之以俊為招討使俊請岳飛同討許之未幾李成復陷筠州所筠州唐置今江西瑞州是二月以秦檜參知政事三月張俊岳飛大敗李成于樓子莊在江西南康府建昌縣長山西南羣盜皆遁俊聞李成將馬進在筠州以豫章介江筠之間遂急趋之既入城喜曰我已得洪破賊決矣及進犯洪州連營西山在南昌府新建縣西一名南昌山俊歛兵若無人者居月餘進以大書牒索戰俊以細書狀報之進以俊為怯俊諜知賊怠乃議戰岳飛曰賊貪而不慮後若以騎兵自上流絶生米渡亦曰生米潭上有市又曰生米市在新建縣西南出其不意破之必矣因請為先鋒俊大喜乃令楊沂中絶生米渡飛重鎧躍馬潛出賊右突其陣所部從之進大敗走筠州飛抵東城進出城布陣飛設伏以紅羅為幟上刺岳字選騎二百隨幟而前賊易其少薄之伏發進大敗走飛使人呼曰不從賊者坐吾不汝殺坐而降者八萬人俊與沂中復前後夾擊賊大潰進以餘卒奔南康飛夜引兵至朱家山即長山在建昌縣南又斬其將趙萬成聞進敗自引兵十餘萬來俊與飛遇成于樓子莊大破之遂復筠州成復以十萬衆與俊夾河而營沂中夜銜枚渡河與俊夾攻成又大敗俊乘勝追至江州成勢迫絶江而去因呼俊為張鐵山遂復江州興國軍宋置今湖北武昌府興國州是等處羣盜皆遁已而俊引兵渡江追成至蘄州黄梅縣大敗之馬進為追兵所殺成北走降劉豫張用復寇江西岳飛與用俱相人以書諭之用遂率衆降江淮也平俊奏飛功第一詔進飛右軍都統制屯洪州彈壓盜賊孔彦舟本李成黨尋為蘄黄鎮撫暴横不奉法明年朝廷將以兵執之彦舟遂以所部叛降劉豫武功大夫張榮擊敗金兵于興化五代楊吳縣今屬楊州府達蘭北遁榮本梁山濼漁人聚舟數百以刼掠金人杜充時嘗借補武功大夫金人南侵攻之不克及金人退榮襲據通州聯舟入興化縮頭湖在縣東亦曰率頭湖後名得勝作水寨以守金達蘭在泰州謀再渡江欲先破榮寨榮率舟師與之遇見金戰艦不多餘皆小舟時水退隔泥淖不能前乃舎舟登岸大呼而擊之金人不得騁舟中自亂溺水及陷泥淖者不可勝計俘馘五千餘人達蘭收餘衆奔還楚州退屯宿遷尋北去榮告捷于朝遂以榮知泰州張浚退屯閬州分諸將守川陜先是金破鞏河樂蘭廓積石西寧諸州盡有涇原熙河二路至是復破福津本西魏覆津縣唐改福津元省故城在今甘肅階州蹂同谷西魏縣元省故城在階州成縣以迫興州浚遂退保閬州而以張深為四川制置使與劉子羽趋益昌注見前王庶為利夔制置使節度陜西諸路知興元府未幾復以吳玠為陜西都統制夏四月隆祐皇太后孟氏崩諡昭慈獻烈詔權攢不葬而掩其柩曰攢于㑹稽縣之上皇村金襲西遼和勒端舊作曷董今改城方輿紀要在故庭州東北不克金聞耶律達實在和州遼置在漢北之域恐與夏人合遣使索之夏國報以境土不相接亦不知達實所往尼瑪哈以耶律伊都遼之近族必知其巢穴以番漢及女真軍萬人付伊都使攻達實軍于和勒端城臨行質其妻子仍起燕雲河東夫運餉和勒端去雲中三千餘里是行也三路之夫死者不可勝計劉光世復楚州秋七月封太祖後令話燕王徳昭元孫為安定郡王先是下詔曰太祖創業垂統徳被萬世神宗初封子孫一人為安定郡王今其封久不舉有司具上應襲封者至是以令話為安定郡王自後襲封不絶范宗尹免宗尹有才智年三十為相毅然以國事自任然為政多私屢為言者所詆秦檜從而擠之帝亦惡其為人㑹侍御史沈與求奏其罪狀遂落職八月張浚殺前威武大將軍曲端浚既敗于富平乃思端言召之還稍復其官徙閬州將復用之吳玠憾端因言端再起必不利于公王庶又從而間之玠復書曲端謀反四字于手以示浚庶又來言端嘗作詩題柱曰不向闗中興事葉郤江上泛漁舟謂其指斥乗輿浚乃送端于恭州獄有武臣康隨者嘗以事忤端端鞭其背遂深憾之及浚以隨提㸃夔路刑獄端聞之曰吾其死矣隨至命獄吏縶維端以紙糊其口熁之以火端乾渴求飲與之酒九竅流血而死陜西士大夫莫不痛惜之軍士悵恨有叛去者端有馬名鐵象日馳四百里愛之甚于子息及在獄閱康隨至呼天者數聲又連呼鐵象可惜者復數聲既死不旬日鐵象亦斃以汪伯彦為江東安撫大使既而罷之張守免時黃潛善已死張守復薦用伯彦侍御史沈與求論劾之詔伯彦復褫新職守亦引疾辭去以秦檜為尚書右僕射同平章事兼知樞密院事范宗尹既去檜欲得其位因揚言曰我有二策可聳動天下或問何不言檜曰今無相不可行也帝聞乃有是命詔贈程頤直龍圖閣九月以吕頤浩為尚書左僕射同平章事兼知樞密院事時江淮初定命頤浩仍兼宣撫頤浩先為江東宣撫見上頤浩敗賊張琪于饒州遂拜少保復相及入對首言先平内寇然後可禦外侮而閩寇最急廣寇次之蓋閩中去行在不逺二廣未經殘破若非速除為害不細帝深然之復修日歴翰林學士汪藻言本朝宰相皆兼史官故書榻前議論之詞則有時政記柱下見聞之實則有起居注謂之日歴所以備言垂一世之典苟曠三十年之久漫無一字何以示來世帝從之即以命藻長星見詔求直言冬十月吳玠及其弟璘大敗金烏珠于和尚原烏珠遁玠自富平之敗收散卒保和尚原積粟繕兵列柵為死守計時闗隴六路盡陷止餘階成岷鳳洮五州及鳳翔之和尚原隴州之方山原而已或謂玠宜退屯漢中扼蜀口以安人心玠曰我保此敵決不敢越我而進是所以保蜀也玠在原上鳯翔民感其遺惠相與夜輸芻粟助之玠饋以銀帛民益喜輸者益多金人怒伏兵渭河邀殺之且令保伍連坐民冒禁如故金將摩哩舊作浚立今改自鳳翔敖拉扎哈舊作烏勒折合今改自階成出散闗約日㑹和尚原敖拉扎哈先期至陣北山索戰玠命諸將堅陣待之更戰迭休金人大敗遁去摩哩方攻箭筈闗即箭括嶺為岐山最髙處在鳳翔府岐山縣東北玠復遣將擊破之兩軍終不得合金人自起海角狃于常勝及與玠戰輒敗憤甚謀必取玠于是烏珠㑹諸帥率兵十餘萬造浮梁跨渭自寶雞結連珠營壘石為城夾澗與玠軍相拒進薄和尚原玠與弟璘選勁弩命諸將分番迭射號駐隊矢連發不絶繁如雨注金人稍卻則以竒兵旁擊絶其糧道度其困且走設伏于神岔溝名在隴州南吳山下以待之金軍至伏發遂大亂玠因縱兵夜擊大敗之烏珠中二流矢僅以身免亟鬀其鬚髯而遁初金人之至也玠與璘以散卒數千駐原上朝問隔絶人無固志有謀刼玠之兄弟北降者玠知之召諸將歃血盟勉以忠義皆感泣願盡死力故能成功初置見錢闗子時命張俊屯婺州有司請樁辦合用錢而路不通舟錢重難致乃造闗子付婺州召商入中以給軍食商人執闗子于𣙜貨務請錢願得茶鹽香貨鈔引者聽于是州縣以闗子充糴本未免抑配而𣙜貨又止以日輸三分之一償之人皆嗟怨十一月以孟庾為福建江西荆湖宣撫使韓世忠副之辛企宗討范汝為不克其勢益熾乃命庾為宣撫使世忠副之發大軍由温台路入閩汝為聞大軍將至亟入據建州十二月盗曹成破道州成初破漢陽鄂州屯攸縣漢縣今屬長沙府湖東安撫向子諲招之成聽命子諲遣兵扼衡陽唐縣今為衡州府治欲圖之而援兵不至成忿子諲扼已即擁衆而南官軍悉潰成大掠執子諲而去已而統制馬廣遣人諭成子諲始得釋金以陜西地畀劉豫先是豫置招受司于宿州以誘逋逃者至是金復以陜西地畀之于是中原盡屬于豫御批歴代通鑑輯覽巻八十四

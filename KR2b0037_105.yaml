  text: 欽定四庫全書御批歷代通鑑輯覽卷一百六明憲宗皇帝甲午成化十年春正月命王越總制三邊
  hash: sha256:0da5216815e3cbc2222d9e061acab44f0a651275fbd6f77e028ccf0fb3c32535

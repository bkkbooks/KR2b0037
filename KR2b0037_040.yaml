body:
  text: 齊南康王稱相國以簫穎胄為左長史蕭衍為征東將軍衍發襄陽留弟偉字文違總府州事憺字僧逹守壘城附近大城之壘魏彭城王協歸第以咸陽王禧為太保北海王詳為大將軍録尚書事于烈為領軍魏太尉咸陽王禧不親政務驕奢貪淫魏主惡之禧遣奴就領軍于烈求羽林虎賁烈以無詔拒之禧復遣謂曰吾天子叔父身為元輔有所求須與詔何異烈厲色曰烈非不知王之貴也奈何使私奴索天子羽林烈頭可得羽林不可得禧怒以烈為恆州刺史烈遂稱疾不出北海王詳密以禧過惡白魏主且言彭城王協大得人情不宜久輔政魏主然之詔協以王歸第禧進位太保詳為大將軍録尚書事復以于烈為領軍軍國大事皆得參焉魏主不能親決庶務委之左右於是偉臣茹皓字禽竒吳人趙修字景業趙郡人及外戚髙肇等始用事魏政浸衰已而禧以謀反伏誅主由是益疏忌宗室三月齊相國南康王寶融廢其君寶卷為涪陵王而自立是為齊和帝齊南康王寶融即位於江陵改元以蕭穎胄為尚書令荆州刺史蕭衍為左僕射征東大將軍都督征討諸軍假黃鉞夏侯詳為中領軍封寶卷為涪陵王寶卷以陳伯之為江州刺史西擊荆雍四月蕭衍出沔命王茂等逼郢城寶卷遣軍救之屯巴口巴水入江之口也巴水今謂之巴河出黃州府羅田縣南流至黃岡縣入江六月西臺江陵在西故曰西臺遣席闡文勞衍軍齎穎胄等議詣衍謂宜請救於魏衍曰若郢州既拔席卷沿流自然風靡丈夫舉事欲清天步擁數州之兵以誅羣小懸河注火奚有不滅豈容北面請救戎狄以示弱於天下卿為我輩白鎮軍前途攻取但以見付借鎮軍靖鎮之耳已而東軍進屯加湖在漢陽府黃陂縣東南衍遣王茂等乘水漲襲之加湖潰城名在漢陽東北郢城降衍以韋睿行郢府事郢人安之先是郢城被圍郢州刺史張冲與竟陵太守房僧寄悉力拒守會冲及僧寄相繼病卒七卒死者什七八冲子孜與諸將議降冲故吏房長瑜曰前使君忠貫昊天郎君但當坐守畫一以荷析薪若天運不與亦當幅巾待命下從使君孜不從遂以郢城降張冲字思約劭之孫秋七月齊雍州刺史張欣泰字義亨興世子謀立建安王寶寅不克而死齊涪陵王寶卷作芳樂苑窮極竒麗苑中山石皆望五采望民家有好樹美竹則毁舊撤屋而徙之於苑中立市使宫人宦者共為稗販以貴妃為市令自為録事小有得失妃則與杖又好巫覡左右詐云見先帝大嗔不許數出寶卷大怒拔刀尋之既不見乃縛菰為髙宗形北向斬之懸首苑門雍州刺史張欣泰與弟欣時密謀結胡松及王靈秀鴻選鴻姓選名等誅諸姦幸廢寶卷㑹寶卷遣中書舍人馮元嗣救郢茹法珍梅蟲兒李居士楊明泰送之於中興堂即新亭宋孝武即位於此因改名欣泰等使人于坐殺元嗣明泰傷蟲兒居士法珍等散走靈秀詣石頭迎建安王寶寅向臺城百姓數千人皆空手隨之欣泰聞事作馳入宫會法珍得返閉門上仗鴻選不敢發寶寅至杜姥宅在上元縣北晉成帝杜后母立第於此因名曰已暝人皆潰去寶寅逃三日乃出泣言受制不自由寶卷復其爵位欣泰與胡松皆被誅九月齊蕭衍引兵東下衍既克郢城諸將欲頓兵夏口衍以為宜乘勝直指建康張𢎞策庾域亦以為然乃命衆軍即日上道緣江至建康凡磯浦村落軍行宿次立頓處所𢎞策逆為圖畫如在目中遂克尋陽時陳伯之鎮江州衍曰用兵未須實力所聽威聲耳加湖之潰尋陽人情理宜恟懼可傳檄而定也乃遣使說伯之許即用為江州伯之雖許歸附而云大軍未須遽下衍曰伯之首鼠及其猶豫急往遙之乃引兵至尋陽伯之束甲請罪初巴東王子響之亂司馬席恭祖被殺至是其子謙以新蔡太守從伯之鎮晉陽伯之將降謙曰我家世忠貞有殞不二伯之殺之衍以伯之為江州刺史其子虎牙為徐州刺史齊主寶融詔衍若定京邑得以便宜從事衍留鄭紹叔守尋陽引兵東下謂曰卿我之蕭何寇恂也比克建康紹叔督江湘糧運未嘗乏絶魏築洛陽諸坊魏司州牧廣陵王嘉太武之孫請築洛陽三百二十三坊各坊三百步曰雖有暫勞姦盜永息詔發畿內夫五萬人築之四旬而罷魏立后于氏后烈弟徑之女也烈方為領軍總心膂之寄故立之冬十月齊蕭衍圍建康蕭衍之克江郢也涪陵王寶卷遊騁如故聞至近道聚兵為固守之計衍遣曹景宗等進頓江寧擊破李居士於新亭因乘勝而前新亭城主江道林引兵出戰禽之於陳衍至新林遣吕僧珍據白板橋在江寧縣西南李居士帥鋭卒萬人直來薄壘越塹拔柵僧珍分人上城矢石俱發自帥馬步三百人出其後城上人復踰城而下內外夾擊居士敗走十月寶卷遣將軍王珍國字德重廣之子也將精兵十萬陳于朱雀航南宦官王寶孫持白虎幡督戰開航背水以絶歸路衍軍小却王茂下馬單刀直前其甥韋欣慶執鐵纒矟以翼之衝擊東軍應時而陷曹景宗縱兵乘之吕僧珍縱火焚營將士皆殊死戰鼓譟震天地珍國等不能抗軍遂大潰衍長驅至宣陽門諸將移營稍前寶卷將軍徐元瑜以東府城降李居士以新亭降衍鎮石頭寶卷閉門自守衍命諸軍築長圍守之十一月齊尚書令巴東公蕭穎胄卒諡獻武穎胄既卒由是衆望盡歸於衍先是齊邑東巴西二郡不從穎胄之命引兵破硤口進至上明穎胄遣蔡迫恭拒之相持不決穎胄憂憤而卒已而巴軍聞建康已危衆潰而降上明注見前蔡道恭字懷儉南陽冠軍人魏以任城王澄都督淮南軍事魏鎮南將軍元英上書曰蕭寶卷驕縱日甚虐害無辜其雍州刺史蕭衍掃土興兵順流東下唯有孤城更無重衛乃皇天授我之日臣乞躬帥步騎三萬直至沔陽據襄陽之城斷黑水今襄陽府穀城縣東有黑水河與光化縣接界之路長驅南出進拔江陵則三楚可收岷蜀斷絶又命揚徐聲言俱舉建業窮蹙文軌可齊不報車騎大將軍源懷本名思禮賀之子亦言廣陵淮隂觀望得失宜東西齊舉以成席卷之勢若使蕭衍克濟上下同心豈惟後圖之難亦恐揚州危逼是月魏東豫州刺史田益宗侵齊戰于赤亭齊人敗績齊赤亭在黃州府麻城縣東南水經注舉水徑安郡西厯赤亭下謂之赤亭水即此十二月齊人弒涪陵王寶卷蕭衍入建康以太后令追廢寶卷為東昏侯自為大司馬承制是時建康城中實甲猶七萬人寶卷悉以軍士委王珍國使兖州刺史張稷字公喬瓌之弟為之副寶卷尊蔣子文之神為靈帝迎入後堂使巫禱祀寶卷于殿中騎馬出入以金銀為鎧甲飾以孔翠晝眠夜起一如平常長圍既立屢戰不勝尤惜金錢不肯賞賜雕鏤雜物倍急于常衆情怨怠皆思早亡莫敢先發法珍蟲兒說寶卷曰大臣不留意使圍不解宜悉誅之珍國及稷懼禍謀弒寶卷使後閣舍人錢强夜開雲龍門珍國稷引兵入殿御刀豐勇之為內應寶卷方在含德殿作笙歌兵入斬之稷召僕射王亮字奉叔瑩從父弟等令百僚署箋以黃油裹寶卷首遣博士范雲等送詣石頭右衛將軍王志字次道僧䖍之子歎曰冠雖弊何可加足取庭中樹葉挼服之僞悶不署名衍覽箋無志名心嘉之衍與雲有舊即留參帷幄使張𢎞䇿先入清宫封府庫圖籍時城內珍寶委積𢎞業禁勒部曲秋毫無犯收潘妃及法珍蟲兒等四十一人皆以屬吏以宣德太后文惠太子妃鬱林王尊為皇太后明帝即位出居鄱陽王故第王為號曰宣德宫令追廢寶卷為東昏侯以衍為大司馬録尚書事依晉武陵王遵承制故事百僚致敬以王亮為長史衍入閲武堂下令大赦凡昏制謬賦淫刑濫役悉皆除蕩潘妃有國色衍欲留之以問領軍王茂茂曰亡齊者此物留之恐為外議乃并法珍等誅之齊大司馬衍執豫州刺史馬仙琕字靈馥扶風郡人吳興太守昻字千里凱之子既而釋之齊蕭衍之東下也豫州刺史馬仙琕擁兵百萬衍使其故人姚仲賔說之仙琕斬于軍門以狥衍圍宫城州郡皆請降吳興太守袁昻獨拒境不受命衍使江革為書與昻曰竭力昏主未足為忠家門屠滅非所謂孝豈若翻然改圖自招多福昻復書拒之及建康平衍使豫州刺史李元履巡撫東土敕勿以兵威陵辱昻元履至宣衍㫖昻亦不請降開門撤備而已仙琕聞臺城不守號泣謂將士曰我受人任寄義不容降君等皆有父母我為忠臣君等為孝子不亦可乎乃悉遣兵出降餘壯士數十閉門獨守俄而兵入仙琕令士皆持滿兵不敢近日暮仙琕乃授弓曰諸軍但來見取我義不降乃遣送石頭衍釋之使待袁昻至俱入曰令天下見二義士皆厚遇之壬齊中興二年梁高祖武帝蕭衍天監午元年魏景明三年是嵗齊亡梁代春正月齊大司馬衍迎宣德太后入宫稱制二月衍自為相國封梁公加九錫尋進爵為王初衍與范雲沈約任昉同在竟陵王西邸至是引雲為咨議約為司馬昉為記室參謀議謝朏何𦙍先棄官居家衍奏徴為軍咨祭酒朏𦙍皆不至衍內有受禪之志沈約進曰齊祚已終明公當承其運雖欲謙光不可得已衍曰我方思之約曰公初建牙樊沔此時應思今王業已成何所復思若天子還都公卿在位則君臣分定無復異心豈復有人方更同公作賊衍然之召雲等告之雲對略同約㫖衍曰卿明早將休文更來雲出語約約曰卿必待我雲許諾而約先期入衍命草具其事約乃出懷中詔書並諸選置雲至殿門不得入約出問曰何以見處約舉手向左謂左僕射雲笑曰不乖所望有頃衍召雲入曰我起兵三年矣諸將不為無功然成帝業者卿二人也於是衍以詔進位相國掦州牧封十郡為梁公備九錫置百司已復進爵為王蕭衍以沈約為梁僕射范雲為梁侍中衍納東昏余妃頗妨政事范雲以為言未從雲與將軍王茂同入見雲曰昔沛公入關婦女無所幸此范增所以畏其志大也今明公始定建康海內想望風聲奈何襲亂亡之迹以女德為纍乎茂起拜曰雲言是也公必以天下為念不宜留此衍默然雲即請以余氏賚茂衍許之賜雲茂錢各百萬三月蕭衍殺齊邵陵王寶攸字智宣明帝第九子等三人鄱陽王寶寅出奔魏先是衍以齊湘東王寶晊安陸王緬之子好文學忌之誣為謀反并其弟寶覽寶宏皆殺之至是役殺邵陵王寶攸晉熙王寶嵩字智靖明帝第十子桂陽王寶貞明帝第十一子鄱陽王寶寅穿牆夜出遁匿山澗晝伏宵行抵夀陽之東魏任城王澄以車馬迎之待以客禮寶寅請喪君斬衰之服澄以喪兄齊衰之服給之仍帥官僚赴弔寶寅居處有禮澄深器重之齊主發江陵以蕭憺都督荆湘六州軍士齊主東歸以蕭憺為荆州刺史荆州軍旅之後公私空乏憺厲精為治廣屯田省力役存問兵死之家供其困乏自以年少居重任謂佐吏曰政之不臧士君子所宜共惜吾今開懷卿其無𨼆于是人人得盡意民有訟者皆立前待符教决于俄頃曹無留事荆人大悅夏四月齊梁王蕭衍稱皇帝是為梁髙祖武帝廢齊主為巴陵王遷太后于别宫封拜功臣有差齊自髙帝代宋至和帝凡七主合二十三年齊主至姑孰下詔禪位于梁四月宣德太后遣尚書令亮等奉璽綬詣梁宫梁王即位于南郊贈兄懿為丞相封長沙王諡曰宣武奉齊主為巴陵王宫於姑孰奉宣德太后為齊文帝妃封文武諸臣車騎將軍夏侯詳等十五人為公侯以王亮為尚書令王瑩字奉光亮從父兄為中書監沈約為僕射范雲為吏部尚書梁主蕭衍弒巴陵王于姑孰齊御史中丞顔見逺晉侍中含之七世子孫死之梁主欲以南海郡為巴陵國徙王居之沈約曰不可慕虛名而受實禍梁主領之乃使所親鄭伯禽詣姑孰以生金進王王曰我死不須金醇醪足矣乃飲沉醉伯禽就摺殺之王之鎮荆州也琅邪顔見逺為録事參軍及即位為御史中丞既禪位見逺不食數日而卒梁主聞之曰我自應天從人何預天下士大夫事而顔見逺乃至於此乃以蕭寶義字智勇明帝長子為巴陵王使奉齊祀寶義幼有廢疾不能言故獨得全梁徴謝朏何𦙍何㸃不至梁徴謝朏何𦙍為光祿大夫何㸃為侍中𦙍㸃終不就梁置謗木肺石函周禮大司冦以肺石逹窮民注赤石也沈括石形如垂肺肺主聲所以逹寃也梁主詔公車府謗木肺石各置一函若肉食莫言欲有橫議謂在位者不言而布衣處士欲議朝政投謗木函若有功勞才器寃沉莫逹者投肺石函梁主身服浣濯之衣常膳惟以菜蔬每簡長吏務選廉平皆召見于前勗以政道小縣令有能遷大縣大縣有能遷二千石由是廉能莫不知勸五月盜入梁宫捕得伏誅齊東昏侯嬖臣孫文明等夜帥其徒作亂燒神虎門總章觀殺衛尉張𢎞䇿復燒尚書及雲龍門軍司馬吕僧珍以宿衛兵拒之不能却梁主戎服御前殿曰賊夜來是其衆少曉則走矣命擊五鼓賊謂已曉散走會將軍王茂等引兵赴救悉捕誅之梁江州刺史陳伯之反兵敗奔魏伯之目不識書與奪决于主者豫章鄧善為别駕河南褚緭自建康投之及其鄉人朱龍符並乘伯之愚暗恣為姦利梁主聞之遣人代繕伯之不受命繕于是日夜說伯之反緭等共贊成之伯之乃集府州僚佐詐為齊建安王寶寅書示之且云我荷明帝厚恩誓死以報即命纂嚴召臨川內史王觀僧䖍之孫為長史觀不應命豫章太守鄭伯倫起兵拒守梁主以王茂為江州刺史帥衆討之伯之引兵趣豫章攻不能下王茂軍至伯之表裏受敵遂敗走間道渡江與其子虎牙及緭等俱奔魏六月梁益州刺史劉季連反梁主以鄧元起字仲居南郡當陽人為益州刺史遣左右送劉季連子弟三人入蜀諭㫖季連受命飭還裝元起乃之官初季連為南郡不禮于元起都録朱道琛有罪季連欲殺之逃匿得免至是道琛為元起典籖既至言語不恭見人器物輒奪之有不獲者語曰會當屬人何須苦惜于是軍府大懼謂元起必誅季連禍及黨與季連亦懼乃召兵算之有精甲十萬歎曰據天險之地握此彊兵進可以匡社稷退不失作劉備捨此安之遂召佐史矯稱齊宣德太后令聚兵反收道琛殺之元起至巴西季連遣其將李奉伯拒戰敗還成都季連閉城固守元起圍之明年成都食盡人相食季連肉袒請降元起待之以禮遂還建康梁主赦為庶人秋八月梁定正雅樂梁主素善鍾律欲釐正雅樂乃自制四器名之為通一曰元英通二曰青陽通三曰朱明通四曰白藏通每通施三絃黃鍾絃用二百七十絲長九尺黃鍾律長九寸引而伸之為九尺應鍾絃用一百四十二絲長四尺七寸四分差彊即上生下生三分益一三分損一之數因以通聲轉推月氣悉無差違而還得相中又制十二笛竹之屬漢武時邱仲所作黃鍾笛長三尺八寸應鍾笛長二尺三寸中間十律以是為差以寫通聲飲去聲韻會舉要度聲曰飲古鍾玉律並皆不差于是被以八音施以七聲宫商角徵羽及變宫變徵莫不和韻先是宫懸止有四鎛鍾特懸者為鏄鍾雜以編鍾小鍾也上下各八縣于一簴編磬亦十六枚而同簴衡鍾鍾大于鎛凡十六簴鍾之拊縱曰簴至是始設十二鏄鍾應十二辰之位各有編鍾編磬凡三十六簴而去衡鍾四隅植建鼓大鼓也一名植鼓植木而旁懸鼓焉冬十一月梁立子統字德施為太子統生五嵗能遍誦五經梁大旱飢是嵗江東大旱斗米五千民多飢死癸梁夭監二年末魏景明四年夏四月魏以蕭寶寅為齊王寶寅伏于魏闕之下請兵伐梁雖暴風大雨終不暫移會陳伯之降魏亦請兵自效魏以寶寅為揚州刺史丹陽公齊王禮賜甚厚配兵一萬令屯東城注見前以伯之為江州刺史屯陽石城名在今穎州府霍邱縣南亦曰羊石城俟秋冬大舉寶寅明謂明旦也當拜命慟哭至晨過期猶絶酒肉悴色粗衣未嘗嬉笑梁頒新律初梁主命刪定郎蔡法度濟陽人損益舊律至是書成律二十卷令三十卷詔頒行之五月梁僕射范雲卒以左丞徐勉字修仁東海郯人將軍周捨字升逸朗族孫顯之子同參國政雲盡心事上知無不為臨繁處劇精力過人及卒衆謂沈約宜當樞管上以約輕易不如尚書左丞徐勉乃以勉及右衛將軍周捨同參國政捨雅量不及勉而清簡過之兩人俱稱賢相勉每有表奏輒焚其藁捨豫機密二十餘年與人言謔終日而竟不泄機事衆尤服之六月梁以謝朏為司徒朏逃竄年餘一旦輕舟自出詣闕以為司徒尚書令朏辭腳疾不堪拜謁角巾白輿詣雲龍門謝詔乘小車就席明日梁主幸其宅宴語盡歡朏固陳本志不許朏素憚煩不省職事衆頗失望秋七月魏以彭城王協為太師魏主以協為太師協固辭魏主賜詔敦諭又為家人書祈請懇至協不得已受命冬十月魏都督元英攻梁拔數城攻阜陵不克先是魏發兵伐梁委任城王澄經略蕭寶寅陳伯之皆聽節度至是梁司州刺史蔡道恭聞魏軍將至遣將軍楊由帥城外居民保賢首山注見前為三柵元英勒軍圍之柵民斬由降魏任城王澄命統軍党法宗党氏出自西羌世為羌豪分兵擊東關注見前拔關要城名在六安州霍山縣西北潁川宋僑郡後廢故城在今廬州府巢縣東南大峴山名在今和州含山縣東北三城白塔岡名在巢縣南牽城在霍山縣北清溪今含山縣西有清溪鎮清溪水所出皆潰初梁遣馮道根戍阜陵注見前甫到即修城隍逺斥堠如敵將至衆頗笑之道根曰防怯勇戰此之謂也城未畢法宗等奄至衆皆失色道根命大開門緩服登城遣精鋭出戰破之魏人見其意思閒暇戰又不利遂引去梁乃以道根為豫州刺史魏以僕射源懷為行臺胡三省注魏道武始置行臺官于中山至是置于北邉兼統民事巡北邊魏既遷洛陽北邉荒逺因以飢饉百姓困弊乃如僕射源懷行臺使持節巡行北邉賑貧乏考殿最事之得失先决後聞懷通濟有無飢民賴之沃野鎮將于祚后之世父與懷通婚時于徑方用事勢傾朝野祚頗有受納懷將入鎮祚郊迎道左懷不與語即劾奏免官懷朔鎮將元尼須與懷舊交貪穢狼籍置酒謂懷曰命之短長繫卿之口懷曰今日源懷與故人飲酒之坐非鞫獄之所也明日公庭始為使者檢鎮將罪狀之處耳竟按扺罪沃野漢縣後魏為鎮故城在今榆林府西北懷朔魏六鎮之一故城在今吳喇忒東北梁吉翂字彥霄馮翊蓮勺人請代父死梁主赦之吉翂父為原鄉後漢縣隋省故城在今湖州府孝豐縣令為姦吏所誣逮詣殿尉罪當死翂年十五撾登聞鼓乞代父命梁主以其幼疑人教之使廷尉卿蔡法度訊之翂曰囚雖愚幼豈不知死之可憚顧不忍見父極刑故求代之死非細故奈何受人教邪法度乃更和顔誘之終無異辭法度以聞梁主乃宥其父罪丹陽尹王志欲于歲首舉充純孝翂曰異哉王尹何量翂之薄乎父辱子死道固當然若翂當此舉乃是因父取名何辱如之固拒而止甲梁天監三年申魏正始元年春正月梁襲魏夀陽不克魏攻梁鍾離梁遣兵救之敗績梁將軍姜慶真乘魏任城王在外襲夀陽據其外郭任城太妃孟氏勒兵登陴激厲文武安慰新舊勸以賞罰將士咸有奮志太妃親巡城守不避矢石蕭寶寅引兵至合擊之慶真敗走是月任城王澄攻梁鍾離梁主遣將軍張惠紹字德繼義陽人等將兵送糧澄遣將軍劉思祖彭城人芳從子邀之戰于邵陽注見前大敗梁兵殺虜殆盡尚書論思祖功應封千戶侯侍中元暉字景襲常山王素之孫求二婢于思祖不得事遂寢夏五月魏司徒北海王詳有罪幽死詳驕奢好聲色貪冒無厭請託公行中外嗟怨將軍茹皓以巧思有寵于魏主弄權納賄詳亦附馬高肇本出高麗時望輕之魏主專委以事肇以詳位居其上欲去之乃譖云詳皓謀逆四月魏主召中尉崔亮字敬儒清河東武城人使彈詳皓詔賜皓死宥詳免為庶人徙太府寺圍禁之詳遂暴卒先是有獻雞雛四翼四足者詔以問侍中崔光光上表曰漢元帝時有雌雞伏子漸化為雄冠距鳴將又有雄雞生角劉向以為小臣執政之象已而石顯伏誅此其效也靈帝時南宫寺雌雞欲化為雄但頭冠未變蔡雍以為雞身已變未至于頭而上知之將有其事而不遂成之象也若應之不精政無所改頭冠或成為患滋大是後黃巾破壞四方天下遂大亂今之雞狀雖與不同而其應頗相類誠可畏也翼足衆多亦羣下相扇助之象雛而未大足羽差卜其勢尚微易制御也臣聞災異之見所以示吉凶明君覩之而懼乃能致福暗主覩之而慢所以致禍或者今亦有自賤而貴關預政事如前世石顯之比者邪願陛下進賢黜佞則妖弭慶集矣後數日皓等伏誅魏主由此愈重光魏大旱魏大旱邢巒字洪賓鄚人穎之孫奏昔者明王重粟帛輕金玉何則粟帛養民而安國金玉無用而敗德故也先帝深鑒奢泰務崇節儉至以紙絹為帳扆銅鐵為轡勒府藏之金裁給而已逮景明初貢篚相繼商佑交入金玉常有餘國用常不足茍非為之分限但恐嵗計不充自今請非要須者一切不受魏主納之秋八月梁義陽降魏魏立元英為中山王魏人圍義陽梁司州刺史蔡道恭隨方抗禦相持百餘日斬獲不可勝計魏軍憚之將退㑹道恭病卒道恭疾篤呼從弟靈恩及諸將佐謂曰汝等當以死固節無令吾沒有餘恨及卒靈恩代之守城魏人聞之攻義陽益急梁遣將軍馬仙琕救之轉戰而前兵勢甚鋭元英結壘士雅山即大木山在汝寧府信陽州西北晉祖逖置其家於此後遂以逖字名山分命諸將伏於四山示之以弱仙俾乘勝直掩英營英僞北以誘之至平地縱兵擊之統軍傳永擐甲執槊突陳橫過梁兵射永洞其左股永拔箭復入仙琕敗走永復與諸軍追之永時年七十餘軍中莫不壯之仙琕盡鋭决戰一日三交皆大敗而返蔡靈恩勢窮遂降於魏三關一曰平靖關即春秋冥厄一曰武陽關亦曰武勝即春秋直轅一曰黃峴關亦曰百鴈即春秋大燧俱在信陽州戍將亦棄城走初魏南安王楨景穆帝之子以預穆泰之謀奪爵邑及是英克義陽乃復立英為中山王梁於南義陽置司州移鎮關南以鄭紹叔為刺史紹叔立城隍繕器械廣田積穀招集流散百姓安之今南義陽治鹿城關隋為木蘭縣唐省故城在黃州府黃安縣九月魏築九城於北邊柔然侵魏魏詔車騎大將軍源懷行北邊指授規略以便宜從事懷至雲中柔然遁去懷以為用夏制夷莫如城郭還至恆代案視要害之地欲東西為九城及儲糧積仗之宜犬牙相救之勢凡五十八條表上之曰今定鼎成周去北遙逺代表諸國頗或外叛宜準舊鎮東西相望令形勢相接築壘置戍分兵要害勸農積粟警急之日隨便翦討彼遊騎之冦終不敢越城南出如此北方無憂矣魏主從之冬十一月魏營國學時魏學業大盛燕齊趙魏間教授者不可勝數弟子著録多者千餘人州舉茂異郡貢孝廉每年逾衆乙梁天監四年酉魏正始二年春正月梁置五經博士立州郡學梁主雅好儒術以東晉宋齊雖開置國學而無講授之實乃下詔曰二漢登賢莫非經術服膺雅道名立行成魏晉浮蕩儒教淪歇風節罔樹抑此之由其置五經博士廣開館宇招納後進給其餼廩其射策通明者即除為吏又選學生往雲門山在紹興府㑹稽縣南亦曰東山從何𦙍受業齊永明中𦙍棄國子祭酒還東山隱居教授命𦙍選經明行修者以聞分遣博士祭酒巡州郡立學梁漢中太守夏侯道遷譙國人以郡叛降於魏魏遣將軍邢巒入漢中遂取梁州初梁夏侯道遷從裴叔業鎖壽陽與叔業有隙單騎奔魏魏王肅使守合肥肅卒道遷奔梁梁以為漢中太守至是復叛降魏魏以巒為鎖西將軍將兵赴之巒至漢中所向摧破魏以巒為梁秦二州刺史梁遣將軍孔陵等拒魏巒遣統軍王足擊之陵等退保梓潼足又破之遂進攻涪城大敗梁軍殺其將魯方達等三十九人蜀中大震城戍降者什二三於是巒表請乘勝取蜀魏主不從先是魏主以王足行益州刺史既而以羊祉代之足聞之不悅輒引兵還遂不能定蜀久之奔梁巴西人亦殺魏守將降於梁羊祉字靈祐泰山巨平人夏四月梁益州刺史蕭淵藻字靖藝懿之子殺前刺史鄧元起州民作亂淵藻討平之梁益州刺史鄧元起乞歸詔以西昌侯淵藻代之元起營還裝糧儲器械取之無遺淵藻恨之又求其良馬不得愈恚遂因醉殺之而誣以反梁主疑焉元起故吏廣漢羅研詣闕訟之梁主曰果如我所量也使讓淵藻貶為將軍恤贈元起時益州民焦僧護作亂淵藻乘肩輿巡行賊壘賊聚弓亂射矢如雨下從者舉楯禦矢淵藻命去之由是民心大安擊僧護平之六月梁初立孔子廟秋七月魏有芝生於太極殿侍中崔光上表曰氣蒸成菌生於墟落濕穢之地不當生於殿堂髙華之處今忽有之誠足異也夫野木生朝野鳥入廟古人皆以為敗亡之象故太戊中宗懼灾修德殷道以昌今西南二方兵革未息郊甸之內大旱踰時民勞物瘁莫此之甚願陛下側躬聳意惟新聖道節夜飲之樂養方富之年則魏祚可以永隆皇夀等於山嶽矣於是魏主好宴樂故光言及之冬十月梁遣臨川王宏字宣達梁主弟帥師伐魏宏都督諸軍僕射桞惔字文通世隆子為副軍於洛口注見前梁大有年米斛三十錢丙梁天監二年戌魏正始三年春正月魏邢巒討武興氐滅之置東益州先是武興王楊集始卒子紹先嗣紹先年幼委事於其叔集起集義會魏始克漢中集起集義恐武興不能久為外藩乃扇動羣氐推紹先為帝圍魏關城陽平關城於是魏邢巒遣傅豎眼清河人徙陽討之克武興執紹先送洛陽集起集義亡走遂滅其國以為東益州自晉惠帝元康六年楊義搜始據仇池至是乃滅三月丙寅朔日食魏豫州刺史陳伯之叛復歸梁梁臨川王宏使記室邱遲字希範吳興人為書遺陳伯之書曰軍勇冠三軍才為世出如何一旦為奔亡之虜尋君去就之際非有他故直以不能內審諸己外受流言沉迷猖蹶以至於此主上屈法申思吞舟是漏將軍松柏不翦親戚安居髙臺未傾愛妾尚在而將軍魚遊於沸鼎之中燕巢於飛幕之上不亦成乎暮春三月江南草長雜花生樹羣鶯亂飛見故國之旗鼓感生平於疇日撫弦登陴豈不愴恨想早勵良圖自求多福伯之得書即於夀陽擁衆歸梁梁以為通直散騎常侍久之死夏四月魏罷鹽池在山西解州東安邑縣西之禁魏河東郡鹽池舊立官司以收稅利魏主即位之初景明元年御史中尉甄琛字思伯中山無極人上表請弛鹽禁琛言周禮山林川澤有虞衡之官為之厲禁蓋取之以時不使戕賊而已故雖置有司實為民守之也夫一家之長必惠養子孫天下之君必惠養北民未有為人父母而吝其醢醯富有羣生而𣙜其一物者也今縣官障護河東鹽池而收其利是専奉口腹而不及四體也天子富有四海何患於貧乞弛鹽榮而興民共之詔下八座魏置八郡以擬八座事具前議録尚書事彭城王協等以為宜依常禁協等言琛之所陳坐談則理髙行之則事眀聖人斂山澤之貨以寬田疇之富收關市之稅以助仆一之儲取此與彼皆非為身所謂資天地之産惠天地之民也鹽池之禁為日已久今而罷之一行一改法若爽棊參論理要宜如舊式魏主卒如琛議已而鹽利多為富强所擅乃還收之入公景明四年至是下詔復罷鹽池之禁自此官雖無權而豪貴之家乘勢占奪近池之民又輒障吝强弱相陵逺近滋弊於是髙陽王維字思穆獻文帝子清河王懌字宣仁孝文帝子等請依先朝之禁仍置官監校從之明帝神龜元年其後更罷更立迄於西魏孝武帝永熙之世又凡數變云胡三省曰甄琛表弛鹽禁通鑑日録摽於景明元年正文則載於正始三年蓋琛議行於景明初年隨格於景明四年正始三年而後從其議也胡氏之言如此今考魏書宣武紀及甄琛傳俱於胡氏相符因依其次以叙并節採食貨志統紀元魏盬榷之始末于此以備考魏遣中山王英督諸軍以拒梁師魏以中山王英為征南將軍都督揚徐諸軍事帥衆十餘萬以拒梁軍所至以便宜從事已而魏復以邢巒都督東討諸軍事發定冀瀛相并肆魏置治永安郡今山西欣州是六州十萬人以益南行之兵五月梁拔魏宿預梁城在鳳陽府夀州東北晉太元中僑立梁郡於此故曰梁城小峴合肥等城梁右衛率張惠紹拔宿豫北徐州京口為南徐鍾離為北徐刺史昌義之厯陽烏江人拔梁城豫州刺史韋睿攻小峴未拔出行圍栅魏出數百人陳于門外睿欲擊之諸將皆曰向者輕來未有戰備請還授甲睿曰魏城足以固守今無故出人于外必其驍勇茍能挫之其城自拔衆猶遲疑睿指其節曰朝廷授此非以為飾韋睿法不可犯也乃進擊敗之因急攻城中宿而拔遂至合肥睿夜堰肥水起鬬艦髙與合肥城等四靣臨之城中人皆哭遂潰俘斬萬餘級于是遷豫州治合肥睿體素羸未嘗跨馬每戰嘗乘白板輿督厲將士勇氣無敵軍至東陵有詔班師睿悉遣輜重居前身乘小輿殿後魏人畏睿威名望之不敢逼是月梁廬江太守裴邃克魏羊石霍邱六月青冀刺史桓和克朐山固城張惠紹進趣彭城兵不利城東陵在頴州府霍邱縣西北濱准羊石即陽石固即五固注俱見前裴邃字淵明河東聞喜人秋九月梁臨川王宏自洛口逃歸諸軍皆潰宏以介弟將兵軍容甚盛比人以為百餘年來所未有也前軍既克梁城諸將欲乘勝深入宏性懦怯部分乖方魏詔邢巒與中山王英合攻梁城宏聞之懼召諸將議旋師吕僧珍曰知難而退不亦善乎宏然之栁惔曰大衆所臨何城不服何謂難乎裴邃曰是行也固敵是求何難之避馬仙琕曰天子掃境內以屬王有前死一尺無却生一寸昌義之怒須髮盡磔曰吕僧珍可斬也百萬之師出未逢敵望風遽退何靣日見聖主乎議者出宏不敢遽違羣議停軍不前魏人知宏不武遺以巾幗且歌之曰不畏蕭娘與吕姥但畏合肥有韋虎虎謂韋睿也僧珍亦自愧嘆請遣裴邃分軍取夀陽宏不聼會夜暴風雨軍中驚宏與數騎逃去將士皆散投棄戈甲填滿水陸諸軍聞宏已逃亦皆引退宏乘小舟濟江夜至白石壘叩城門求入臨汝侯淵猷登城謂曰百萬之師一朝鳥散國之存亡未可知也恐姦人乘開為變城不可夜開宏無以對淵猷淵藻之弟冬十月魏徴邢巒還遣齊王蕭寶寅與中山王英圍鍾離梁洛口軍既潰魏中山王英進圍鍾離魏主詔邢巒引兵㑹之巒表言南軍雖野戰非敵而城守有餘且鍾離天險必無克理臣寧荷怯懦不進之責不受敗損空行之罪魏主乃以將軍蕭寶寅代之侍中盧昶素惡巒使中尉崔亮彈巒巒以漢中所得美女賂元暉暉言于魏主遂不問暉昶恃寵貪縱時人謂之餓虎將軍飢鷹侍中暉尋遷吏部尚書用官皆有定價選者謂之市曹盧昶字叔逹度世從丁梁天監六年亥魏正始四年春三月梁將軍曺景宗豫州刺史韋睿大敗魏師于鍾離魏中山王英與將軍楊大眼等衆數十萬攻鍾離鍾離城北阻淮水魏人于邵陽洲兩岸為橋樹栅數百步跨淮通道城中才三千人昌義之隨方抗禦魏人使其衆負土填塹嚴騎蹙之人未及回以土迮之俄而塹滿衝車所撞城土輒頺義之用泥補之衝車雖入而不能壞魏人晝夜苦攻分番相代墜而復升莫有退者一日戰數十合前後殺傷萬計魏人死者與城平二月魏主召英還英表稱必克願少寬假先是梁主詔曺景宗督軍二十萬救鍾離敕景宗頓道人洲在邵陽洲之東俟諸軍至齊發至是復遣韋睿將兵繼進受景宗節度睿自合肥由隂陵大澤行注見前值澗谷輒飛橋以濟師或勸緩行睿曰鍾離鑿穴而處負户而汲車馳卒奔猶恐其後而况緩乎魏人已墮吾腹中卿曺勿憂也旬日至邵陽梁主豫敕景宗曰韋睿卿之鄉望宜善敬之景宗見睿禮甚謹梁主聞之曰二將和師必濟矣睿塹洲為城去魏城百餘步馮道根能走馬步地計馬足以賦功賦布功力也謂計夫之力而布之工作也比曉而營立英大驚曰是何神也景宗等器甲精新軍容甚盛魏軍望之奪氣城中知有外援勇氣百倍楊大眼將萬餘騎來戰睿結東為陳以彊弩二千一時俱發矢貫大眼右臂退走明旦英自帥衆來戰睿乘素木輿執白角如意以麾軍一日數合英乃退梁主命景宗等豫裝髙艦與魏橋等為火攻之計三月淮水暴漲六七尺睿使馮道根等乘艦擊魏洲上軍盡殪别以小船載草灌膏焚其橋風怒火盛煙塵晦冥敢死之士拔栅斫橋倐忽俱盡道根等身自搏戰軍人奮勇呼聲動天地無不一當百魏軍大潰英脫身走大眼亦焚營去諸壘土崩水死者十餘萬斬首亦如之生擒五萬人收其資糧器械山積睿遣報昌義之義之悲喜不暇答語但呌曰更生更生羣帥爭先告捷睿獨居後世尤以此賢之梁主詔增景宗睿爵邑義之等賞各有差魏有司奏英寶寅罪當誅詔免死除名為民冬十月梁以徐勉為吏部尚書勉精力過人雖文案填積坐客充滿應對如流手不停筆嘗與門人夜集客求官勉正色曰今夕止可談風月不可及公事時人咸服其無私閏月魏尚書令髙肇弒其主之后于氏及其子昌時髙貴嬪肇弟優之女有寵而妬髙肇勢傾中外后暴疾殂人皆歸咎髙氏宫禁事祕莫能詳也后所生子昌尋卒侍御師王顯字世榮平陽人以醫進用失于療治時人亦以為承肇之意云起莘發明曰昔趙盾以亡不越境反不討賊而書弒髙肇既為用事大臣一國之事皆出其手如使弒逆不出于肇則必討逆而正其罪今既主名不立則其為肇也明矣直筆書之所謂原其情而定其實耳戊梁天監七年子魏永平元年春正月梁定官品百官九品為十八班班多者為貴十八班最貴一班最下二月梁置州望郡宗鄉豪各一人専掌搜薦搜求才能而薦之于上秋七月魏立貴嬪髙氏為后髙后既立髙肇益貴重用事多變更先朝舊制削封秩黜勳臣怨聲盈路羣臣宗室皆下之唯度支尚書元匡字扶建陽平幽王之子與抗衡先造棺置廳事欲輿棺詣闕論肇罪自殺以諫肇惡之會匡與劉芳字伯支彭城人議權量肇主芳議匡表肇指鹿為馬中尉王顯彈匡有司處匡死刑詔貶其官八月梁竟陵公曹景宗卒諡曰壯景宗自救鍾離進爵為公及是卒景宗之自鍾離還也梁主于華光殿與羣臣宴飲令沈約賦韵景宗不得意甚不平梁主曰卿伎能甚多何必一詩景宗求作不已時韵已盡止餘競病二字景宗操筆立成其辭曰去時兒女悲歸來笳鼓競借問路傍人何如霍去病梁主嘉嘆不已及卒贈府儀同三司魏京兆王愈字宣德孝文帝子反信都魏主遣尚書李平字雲定崇從弟討愈執之髙肇隂殺愈奏除平名初愈納于后之妹為妃不愛愛妾李氏生子于后召李氏入宫捶之已而魏主復以愈驕縱不法杖之五十出為冀州刺史愈既屢辱潛懷愧恨髙肇又數譖之愈不勝忿遂詐言髙肇弒逆稱帝于信都立李氏為后魏主以尚書李平為都督討之愈出城拒戰屢敗平進圍之愈知勢窮擕李氏及四子突圍出走平追執以聞羣臣請誅愈魏主不許詔送洛陽申以家人之訓髙肇隂使人殺之于道肇與王顯素惡李平平既定冀州詔加散騎常侍顯彈平隱截官口謂隱匿叛黨之應沒官者肇奏除平名九月魏主殺其叔父彭城王協魏髙后之立也協固諫不聼髙肇怨之數譖于魏主遂因京兆王愈之反誣協北與愈通南招蠻賊魏主信之召協與諸王入宴禁中至夜皆醉各就别所使左衛元珍引武士齎毒酒飲之協曰吾無罪願一見至尊死無恨珍曰至尊何可復見武士以刀環築之協大言曰寃哉皇天忠而見殺乃飲毒酒武士就殺之向晨以尸歸第云王因醉而薨諡曰武宣在朝貴賤莫不喪氣行路士女皆流涕曰髙令公枉殺賢王由是中外惡肇益甚魏郢州魏正始初改南司州曰郢州治義陽叛三關注見前降梁魏遣兵擊之魏郢州司馬彭珍等叛魏潛引梁兵趣義陽三關戍主侯登等以城降梁魏以中山王英京兆王愈反復英封討愈未發而愈敗將步騎出汝南討之是冬魏懸瓠軍主白早生亦叛魏殺豫州刺史司馬悅請援于梁梁司州刺史馬仙琕遣兵助之魏主以邢巒行豫州事將兵擊早生時魏郢豫諸城皆沒唯義陽一城為魏堅守中山王英以衆少屢請益兵弗許英遂與巒共攻懸瓠克之斬早生英乃趨義陽義陽大守辛祥與郢州刺史婁悅嬰城共守梁將軍胡武城陶平虜攻之祥夜襲其營擒平虜斬武城州境獲全論功當賞婁悅恥功出祥下間之執政賞遂不行魏豫州治汝南注見前司馬悅字廣宗楚之之孫辛祥字萬福紹先之孫乙梁天監八年丑魏永平二年春正月梁主祀南郊宋齊舊儀祀天皆服衮冕至是用著作郎許懋字昭哲髙陽新城人說始服大裘周禮司裘大裘以供王祀天之服注大裘黑羔裘服以祀天示質也是時有司以鄭注未足為據乃以元繒為之其式如裘其裳以纁皆無文繡冕則無旒制曰可又以齊日不樂詔輿駕始出鼓吹從而不作還宫如常儀時有請封會稽禪國山在常州府荆溪縣西南本名離里山吳孫皓封為中嶽更名者梁主命諸儒草封禪儀欲行之許懋建議以為舜柴岱宗是為巡狩而鄭引孝經鈎命决云封于泰山考績柴燎禪乎梁甫刻石紀號此緯書之曲說非正經之通義也如管夷吾所說七十二君燧人之前世質民淳安得尼金檢玉結繩而治安得鐫文告成妄亦甚矣若聖主不須封禪若凡主不應封禪秦始皇嘗封泰山孫皓嘗封國山皆由主好名于上而臣阿㫖于下非盛德之事不足為法也說鄭謂鄭康成鈎命決緯書篇名管夷吾所見史記梁主嘉納之因推衍懋議以答請者由是遂止魏復取三關魏中山王英至義陽將取三關先策之曰三關相須如左右手若克一關兩關不攻而破攻難不如攻易宜先攻東關即武陽輿地紀勝三關之險大寨嶺為平易大寨嶺即武陽關也又恐其并力于東乃使長史李華帥五統五統軍之衆向西關即平靖以分其兵勢自督諸軍向東關攻之六日而拔進取廣峴即黃峴及西關梁將馬仙琕等皆棄城走梁主使韋睿救仙琕至安陸增築城二丈餘更開大塹起髙樓衆頗譏其怯睿曰為將當有怯時不可專勇英急追仙琕將復邵陽之恥聞睿至乃退梁主求成于魏魏主不肯初魏懸瓠南叛魏主使中書舍人董紹字興逺新蔡鮦陽人以慰諭白早生囚之送建康吕僧珍與之言愛其文義言于梁主梁主使謂紹曰今聼卿還令卿通兩家之好彼此息民豈不善也因召見慰勞之且曰戰爭多年民物塗炭吾是以不恥先言卿宜偹申此意夫立君以為民也凡在民上豈可不思此乎紹還言之魏主不從三月魏侵梁雍州梁州兵擊敗之魏荆州刺史元志字猛略河間公齊之孫將兵七萬攻潺溝在襄陽縣北驅迫羣蠻羣蠻悉渡漢水降梁梁雍州刺史吳平侯昺字子昭梁主從父弟納之綱紀州郡上佐謂之綱紀皆以蠻纍為邊患不如因此除之昺曰窮來歸我誅之不祥且魏人來侵吾得蠻以為屛蔽不亦善乎乃受其降使司馬朱思逺擊志于潺溝大破之斬首萬餘級冬十一月魏主親講佛書作永明間居寺魏主專心釋典不事經籍中書侍郎裴延俊諫曰漢光武魏武帝雖在戎馬未嘗廢書先帝天縱多能營遷謀伐手不釋卷良以經史義深不可暫輟故也陛下親講大覺凡在聼矚塵蔽俱開然五經治世之模楷應務之所先伏願互覽兼存則內外俱周真俗斯暢矣不納裴延儶字平子喜人于是佛教盛于洛陽沙門自西域來者三千餘人魏主别為之立永明寺以居之處士馮亮字靈通南陽人有巧思魏主使擇嵩山形勝之地立間居寺今河南府登封縣有嵩嶽寺即魏間居寺也隋開皇中更今名極巖壑土木之美由是逺近承風無不事佛比及魏主末年州郡共有一萬三千餘寺庚梁天監九年寅魏永平三年春三月魏子詡生劉友益曰此志胡后亂魏之始詡母胡充華武始伯國珍字世玉安定臨涇人之女也初入掖庭同列以故事祝之曰願生諸王公主勿生太子充華曰妾之志異于諸人奈何愛一身之死而使國家無嗣乎及有娠同列勸去之充華不可私自誓曰若幸而有男次第當長男生身死所不憾也既而生詡魏主頻喪子既生詡深加慎護選擇乳保養于别宫梁主視學梁主幸國子學親臨講肄詔皇太子以下及王侯之子皆入學冬十月梁行大明厯先是梁主即位之三年詔定新厯散騎侍郎祖暅字景爍暅古鄧反奏其父冲之考古法具見前為正歷不可改至是行之辛梁天監十年卯魏永平四年春正月魏元會始用新舞先是魏詔太常卿劉芳造樂器定舞名魏公孫崇造樂尺以十二黍為寸劉芳非之更以十黍為寸尚書令髙肇等奏崇所造樂器與經傳不同請更令劉芳依周禮造成詔可既而芳又上言請更文武二舞之名及鼓吹諸曲詔芳與侍中崔光等參定至是芳等奏所造樂器及文武二舞登歌鼓吹諸曲已成乞集議用之詔舞可用新餘且仍舊三月梁胊山叛降魏夏五月梁遣兵圍朐山冬十二月取之先是梁以張稷為青冀刺史稷自謂功大賞薄侍宴酒酣怨望形于辭色梁主曰卿兄殺郡守弟弒其君有何名稱稷曰臣乃無名稱至於陛下不為無勳東昏暴虐義師伐之豈在臣而已梁主捋其須曰張公可畏人乃以為青冀刺史至是琅邪民王萬夀殺太守據朐山召魏兵魏徐州刺史盧昶遣戍主傅文驥赴之稷遣兵拒之不勝文驥遂據朐山五月梁主遣馬仙琕圍之昶本儒生不習軍旅朐山糧樵俱竭傅文驥以城降十二月昶引兵先遁諸軍皆潰會大雪軍士凍死墮手足者過半仙琕追擊大破之二百里間僵尸相屬免者什一二收其糧畜器械不可勝數壬梁天監十一年辰魏延昌元年春正月魏以髙肇為司徒清河王懌為司空高肇自尚書令為司徒猶自以去要任怏怏形於言色右丞髙綽博士封軌素以方直自業及肇為司徒綽送迎往來軌竟不詣肇綽顧不見軌乃遽歸歎曰吾生平自謂不失規矩今日舉措不如封生逺矣髙綽字僧裕允之子封軌字廣度渤海蓚人清河王懌有才學文望懲彭城之禍彭城王協見殺事見前因侍宴謂肇曰天子兄弟詎有幾人而剪之幾盡昔日王莽頭禿藉渭陽之資遂篡漢室今君身曲亦恐終成亂階會大旱肇擅録囚徒欲以收衆心懌言于魏主曰減膳録囚乃陛下之事而今司徒行之豈人臣之義乎魏主笑而不應遂詔尚書與羣司鞠理獄訟令飢民就食北方冬十月魏立子詡為太子魏於是始不殺太子之母以僕射郭祚領太子少師祚嘗從魏主幸東宫懷黃㼐以奉太子時應詔左右趙桃弓深為魏主所信任祚私事之時人謂之桃弓僕射黃㼐少師十一月梁五禮成行之初齊步兵校尉伏曼容字公儀平邱安昌人表求制一代禮樂世祖選學士十人修五禮丹陽尹王儉及將軍何佟之字士威廬江灊人相繼掌之經齊末兵火僅有存者梁初尚書議省之詔曰禮壞樂缺冝以時定於是僕射沈約等奏請以右軍記室明山賔字孝若僧紹之子等分掌五禮佟之總其事其中疑者依石渠白虎故事請制㫖斷決佟之卒以鎮北參議伏暅字元曜曼容子代之至是五禮成列上之合八千一十九條詔有司遵行癸梁天監十二年巳魏延昌二年春二月梁鬱洲青冀刺史治叛降魏梁討平之梁青冀刺史張稷不得志政令寬弛僚吏頗多浸漁鬱洲民徐道角等夜襲州城殺稷送其首降魏魏遣兵赴之於是魏饑民死者數萬侍中游肇寧伯始明根子諫以為朐山濵海卑濕難居鬱洲又在海中得之尤為無用方今年饑民困唯宜安靜而復勞以軍旅費以糧餉臣見其損未見其益魏主不從遣兵未發梁北兖州治淮隂刺史康絢字長明華山藍田人討平之閠月梁侍中沈約死約文學髙一時而貪冒榮利用事十餘年有志台司梁主不用豫州獻栗大徑寸半梁主竒之與約各疏栗事約少上三事出謂人曰此公護前不讓則死梁主聞之怒梁主有憾於張稷從容與約語及之約曰已往之事何足復論梁主怒而起約懼不覺坐如初及還憑空頓僵仆也于户下因病夢齊和帝以劍斷其舌乃呼道士奏赤章于天稱禪代之事不由己出梁主遣使視疾還白其事大怒譴責數四約益懼遂死有司諡曰文梁主曰情懷不盡曰隱改諡隱侯夏五月魏夀陽大水夀陽久雨大水入城廬舍皆沒魏揚州刺史李崇勒兵泊于城上城不沒者二版將佐皆勸崇棄城保比山即八公山崇曰淮南萬里繫於吾身一旦動足百姓瓦解吾豈愛一身取愧王尊漢王尊立金隄事見前但憐此士民無辜同死可結筏隨髙人規自脫吾必與此城同沒治中裴絢叔業兄孫叛降於梁崇遣從弟神等討執之絢初謂崇已北遷及知崇尚在乃曰吾何面見李公乎投水而死崇沈深寬厚有方略得士心在夀陽十年常養壯士數千人冦來無不摧破鄰敵謂之卧虎秋八月魏恆魏置司州治代都平城遷洛後改名恆州二州地震山鳴肆注見前踰年不已民覆壓死傷甚衆甲梁天監十三年午魏延昌三年春二月梁主耕藉田宋齊藉田皆用正月至是始用二月及致齊祀先農冬十一月魏遣司徒髙肇督諸軍侵梁益州梁涪人李苗及校尉泰山淳于誕奔魏共說魏主以取蜀之䇿魏主信之以高肇為大都督將步騎十五萬攻梁益州游肇諫曰今頻年水旱不宜勞役蜀地險隘鎮戍無隙豈得承浮說而動大軍舉不慎始悔將何及不從梁築淮堰魏降人王足王足奔梁事其前陳計求堰淮水以灌夀陽梁主以為然將軍祖水工陳承伯相視地形咸謂准內沙土漂輕功不可就不聼發徐揚民築之民率二十户取五丁役人及戰士合二十萬假康絢都督諸軍并護堰作南起浮山在今泗州盱眙縣西寰宇記山下有穴准水泛溢其穴即髙水減復低有似山浮故名北抵巉石山名在泗州五河縣東水經注淮水東徑浮小北對巉石即此依岸築土合脊於中流明年夏堰成而復潰更築之或言蛟龍能乘風雨破堰其性惡鐵乃運鐵數千萬斤沉之亦不能合乃伐樹為井幹填以巨石加土其上緣淮百里木石俱盡負者肩穿疫死者大半又值是冬大寒淮泗等處皆氷堰卒凍死者什七八又明年四月堰乃成堰長九里下廣百四十丈上廣四十五丈髙二十丈樹以把柳軍壘列居其上或謂康絢曰四瀆天所以節宣其氣不可久塞若鑿湬東注則游波寬緩堰得不壞絢乃開甃東注又縱反間於魏曰梁懼開湬不畏野戰蕭寶寅信之鑿山五丈開湬北注水猶不減魏軍乃還通湬與湫水溝也乙梁天監十四年未魏延昌四年春正月魏主恪殂太子詡立是為魏孝明帝魏主有疾殂於式乾殿諡曰宣武皇帝廟號世宗葬景陵侍中中書監崔光侍中領軍于忠字思賢烈之子詹事王顯庶子侯剛字乾之洛陽人迎太子詡于東宫即位顯欲須明即位光曰天位不可暫曠何待至明顯曰須奏中宫光曰帝崩太子立國之常典何須中宫令也于是請太子止哭立于東序忠扶太子西面哭十餘聲止光攝太尉奉䇿進璽綬太子跪受服衮冕御太極殿即皇帝位光等與夜直羣官稽首呼萬嵗明日乃大赦悉召還西伐東防兵廣平王懷孝文帝子扶疾入臨云欲上殿哭大行見主上衆愕然無敢對者崔光攘衰振杖引漢趙熹故事事具前辭色甚厲懷曰侍中以古義裁我我敢不服髙后欲殺胡貴嬪中給事劉騰以告侯剛剛言於崔光于忠光使置貴嬪於别所嚴加守衛由是貴嬪深德四人中給事宦官也劉騰譙郡人魏王顯伏誅以太保髙陽王雍尚書令任城王澄同總國事于忠與門下門下省侍中等官居之議以魏主幼未能親政宜使高陽王雍入居西柏堂省決庶政以任城王澄為尚書令總攝百揆先是髙肇擅權尤忌宗室有時望者任城王澄懼不自全乃酣飲陽狂朝廷機要無所關豫至是肇方督兵在外故于忠議用之奏皇后請即敕授王顯素有寵於世宗恃勢使威為衆所疾恐不為澄等所容乃密謀寢門下之奏矯皇后令以髙肇録尚書事顯與髙猛肇兄子同為侍中忠等聞之託以侍療無效執顯于禁中殺之下詔如門下奏百官總已聼于二王中外悅服二月魏司徒髙肇伏誅魏主告哀於高肇且召之肇承變憂懼及還入哭盡哀髙陽王雍與于忠密謀伏壯士於省下俟肇入扼殺之下詔暴其罪惡削除職爵葬以士禮魏尊貴嬪胡氏為太妃廢其太后髙氏為尼秋八月魏侍中于忠殺僕射郭祚尚書裴植字文逺叔業兄子免太保髙陽王雍遣就第魏于忠既居門下又總宿衛遂專朝政權傾一時初尚書裴植自謂人門不後王肅而朝廷處之不髙常怏怏及為尚書志氣驕滿好面譏毁羣官僕射郭祚冒進不已與植俱惡于忠專橫勸高陽王雍使出之忠聞之大怒令有司誣奏植祚罪皆賜死忠又欲殺髙陽王崔光固執不從乃免雍官還第朝野寃憤魏尊太妃胡氏為太后以元乂字伯儶江陽王繼之子為散騎侍郎乂妻胡氏為女侍中太后居崇訓宫于忠領衛尉劉騰為太僕侯剛為侍中初江陽王繼以罪奪爵其子乂娶胡氏太后妹也至是復繼本封乂為通直散騎侍郎乂妻為新平郡君仍拜女侍中九月魏太后稱制以于忠為冀州刺史司空澄任城王進位司空領尚書令魏太后始臨朝聽政猶稱令以行事羣臣上書稱殿下加胡國珍侍中封安定公自郭祚等死詔令生殺皆出于忠王公畏之重足脅息太后既親政乃出忠為冀州刺史司空澄領尚書事大后聰悟頗好讀書屬文政事皆手筆自決司空澄奏安定公宜出入禁中參咨大務詔從之梁據魏西硤石硤石注見前西硤石在准水之西岸者魏遣將軍崔亮攻之梁將軍趙祖悅襲魏西硤石據之以逼夀陽田道龍等散攻諸戌魏揚州刺史李崇分兵拒守已而魏假崔亮鎮南將軍攻西硤石久之不下明年正月乃克之崔亮與李崇約水陸並進崇屢違期不至胡太后使尚書李平持節督諸軍進攻梁遣將軍昌義之沂淮西救魏將軍崔延伯夾淮為營取車輪失輞削水鋭其輻兩兩接對揉竹為絙貫連相屬並十餘道橫為橋兩頭施大鹿盧出沒隨意不可燒斫既斷趙祖悅走路又令戰艦不通義之不得進李平部分水陸攻克硤石外城祖悅出降斬之平遂進攻浮山堰崔亮違平節度以疾請還魏師乃退崔延伯博陵安平人冬十二月魏太后攝行祭事太后以魏主幼未能祭欲代行事禮官議以為不可太后以問崔光光引漢和熹鄧太后祭宗廟故事事具前以對太后大悅從之丙梁天監十五年魏肅宗申孝明帝詡熙平元年春二月魏侍中侯剛有罪削户三百魏侍中侯剛本出寒微以善烹調為嘗食典御魏官掌調和御食世宗晏駕有德於太后事見前遂由侍中進爵為公頗專恣用事王公皆畏附之至是以掠殺羽林為中尉元匡所彈廷尉處剛大辟太后曰剛因公事掠人邂逅致死於律不坐少卿袁翻字景翔陳郡項人曰邂逅謂情狀已露𨼆避不引謂不引伏也考訊以理者也今此羽林問則具首剛口唱打殺撾築非理安得謂之邂逅太后乃削剛户三百解嘗食典御剛自太和進食為典御垂三十年至此始解頗為失意夏四月梁圍魏武興魏郡為東益州治楊氏故地也注具前秋七月魏擊敗之魏東益州刺史元法僧陽平王熙之曾孫素無治幹加以貪殘葭萌民任令宗因衆心之怨殺魏晉夀此為東晉夀齊郡魏於此置益州故城在今四川保寧府廣元縣又有西晉夀晉郡後周廢故城在今保寧府昭化縣太守以城降梁梁益州刺史鄱陽王恢字宏達梁主弟遣太守張齊字子響馮翊人將兵迎之法僧遣其子景隆拒齊齊與戰於葭萌大破之遂圍武興法興境內皆叛唯武興一城僅存上表告急於魏魏以傅豎眼為益州刺史救之豎眼入境轉戰三日行二百餘里九遇皆捷張齊退保白水漢縣隋省故城在今昭化縣已出侵葭萌豎眼擊敗之齊引還於是葭萌通鑑作東益州今依梁書張齊傳輯復沒於魏魏梓潼太守茍金龍領關城戍主梁兵至金龍疾病不堪部分其妻劉氏帥厲城民乘城拒戰百有餘日戊副髙景謀叛劉氏斬之并在城外為梁兵所據城中水絶會天大雨劉氏命出公私布絹及衣服懸之絞而取水悉以雜器儲之人心益固梁兵退魏人封其子為平昌縣子九月梁淮堰壞淮水暴漲堰壞其聲如雷聞三百里緣淮城戍村落十餘萬口皆漂入海初魏人患淮堰以任城王澄為大都督勒衆攻之李平以為不假兵力終當自壞既而果然冬魏作永寧寺胡太后作永寧寺於宫側又作石窟寺於伊闕注見前口皆極土木之美而永寧尤甚為九層浮圖髙九十丈剎所轄反浮圖上柱今謂之相輪復高十丈每夜靜鈴鐸聲聞十里佛殿僧房珠玉錦繡駭人心目自佛法入中國塔廟之盛未之有也揚州刺史李崇表言髙祖遷都垂三十年明堂未修大學荒廢城闕府寺頗亦頺壞非所以追隆堂構儀型萬國也宜罷尚方雕靡之作省永寧土木之功分石窋鐫琢之勞因農之隙修此數條使國容嚴顯用禮化興行豈不休哉大后不能柔然大破髙車殺其王彌俄突先是髙車敗柔然於蒲類海注見前殺他汗可汗其子醜奴立號豆羅伏跋豆伐可汗魏言彰制也醜奴壯健善用兵是嵗西擊髙車大破之殺其王彌俄突漆其頭以為飲器鄰國叛去者皆擊滅之其國復彊於是遣使請和於魏用敵國之禮魏主引見使者責以藩禮不備議依漢待胸奴故事遣使報之司農少卿張倫表言宜命宰臣致書諭以歸順之道不當使王人銜命遽虧國體不從張倫字天念白澤之子丁梁天監十六年酉魏熙平二年春正月魏制諸錢新舊通行巧僞者罪之魏初民間皆不用錢髙祖始鑄太和五銖錢民欲鑄者聽就官爐銅必精鍊無得殽雜世宗又鑄五銖錢禁不依準式者既而洛陽及諸州鎮所用不同商賈不通任城王澄上言曰不行之錢律有明式指謂雞眼鐶鑿更無餘禁計河南諸州今所行者悉非制限昔來繩禁愚竊惑焉又河北既無新餞復禁舊者專以單絲之縑疏縷之布狹幅促度不中常式裂匹為尺以濟有無徒成杼軸之勞不免饑寒之苦乞下諸方州鎮新舊諸錢內外全好並得通行其雞眼鐶鑿及盜鑄巧僞不如法者據律罪之詔從之然河北少錢猶用物交易錢不入市已而崔亮請於王屋等山採銅鑄錢於是民多私鑄錢稍薄小用之益輕夏四月梁罷宗廟牲牢薦以疏果詔以宗廟牲牢有纍冥道宜皆以麵為之於是朝野喧譁以為宗廟去牲乃是不復血食八座乃議以大脯代一元大武尋詔以餅代脯其餘盡用蔬果戊梁天監十七年戍魏神龜元年夏四月魏司徒胡國珍卒追號太上秦公國珍卒贈假黃鉞相國太師號曰太上秦公葬以殊禮迎太后母皇甫氏之柩與合葬謂之太上秦孝穆君諫議大夫張普惠以為太上之名不可施於人臣上疏陳之左右莫敢為通㑹胡氏穿礦遇石普惠乃密表曰天無二日土無二王大上者因上而生名也皇太后稱令以繫敇下蓋取三從之道今尊司徒為太上恐乖繫敕之意比克吉定兆而以淺改卜或天地神靈所以垂至戒啓聖情也伏願停逼上之號以邀謙光之福太后乃集五品以上博議王公皆希大后意爭詰難普惠普惠應機辨析無能屈者大后不從敕張普惠字洪賑常山九門人稱令以繫下謂繫太后令字於皇帝敕字下魏主始月一視朝張普惠以魏主好遊騁苑囿不親視朝過崇佛法郊廟之事多委有司上疏切諫由是魏主始月一陛見羣臣五月梁司徒臨川王宏有罪免尋復其位梁臨川王宏妾弟殺人匿於宏府梁主敕宏出之即日伏辜南司御史臺曰南司亦曰南臺奏免宏官梁主泣曰愛宏者兄弟私親免宏者王者正法所奏可宏自洛口之敗常懷愧憤都下每有竊發輒以宏為名屢為有司所奏梁主輒赦之及是竟免宏官宏後堂有庫屋垂百間關籥甚嚴或疑是鎧仗者密以間他日梁主送盛饌與宏就飲半醉後徑往後堂檢視每屋錢百萬為一聚黃榜標之千萬為一庫懸一紫標如此三十餘間餘悉貯絹布蠟等物屋皆滿梁主始知非仗大悅謂曰阿六生計大可乃更劇飲至夜而還未幾復以宏行司徒秋九月魏太后胡氏弒其故太后髙氏胡太后以天文有變欲以髙太后當之既而暴卒以尼禮葬之魏遣使如西域求佛書胡太后遣使者宋雲與比邱華言乞士僧也慧生如西域求佛經雲等行四千里至赤嶺在西寧府邊外西唐書地理志鄯城有石堡城西二十里至赤嶺即此乃出魏境又西行再朞至乾羅國通考比印度西行十二日至乾陀羅國得佛書百七十部而還己梁天監十八年亥魏神龜二年春二月魏羽林虎賁作亂殺將軍張彛字慶寶清河東武城人魏征西將軍張彛之子仲瑀上封事求銓量也削選格排抑武人不使豫清品於是羽林虎賁作亂立榜大巷刻期會集近千人至尚書省詬罵以瓦石擊省門上下懾懼莫敢禁討遂殺彛焚其第賊曵彛堂下捶辱極意焚其第舍仲瑀兄始均拜賊請其父命賊就毆擊投之火中仲瑀重傷走免彛僅有餘息再宿而死逺近震駭胡太后收掩羽林虎賁凶彊者八人斬之其餘不復窮治大赦以安之因令武官得依資入選時懷朔鎮函使函奏往來之使高歡字賀六渾勃海蓚人曾祖湖燕大守奔魏祖謐魏御史坐法徙懷朔世居北邊遂習鮮卑俗歡家貧執役平城富人婁氏女見而竒之遂嫁焉始有馬得給鎮為函使至洛陽見張彛之死還家傾資以給客或問其故歡曰宿衛相帥焚大臣之第朝廷懼其亂而不問為政如此事可知矣財物豈可常守耶歡與司馬子如字遵業溫人徙雲中劉貴秀容陽曲人賈顯智中山無極人孫騰字龍雀咸陽石安人侯景字萬景朔方人尉景秦置尉候官因以為氏景字士真善無人蔡儶廣寧石門人相友善並以任俠雄於鄉里胡三省曰髙歡事始此魏以崔亮為吏部尚書立停年格時魏官員既少應選者多崔亮為吏部尚書奏立格制不問士之賢愚專以停解日月為斷沉滯者稱其能洛陽令薛琡魏西方叱于氏後改為薛氏琡代人上書言黎元之命繫於長吏若選曹唯取年勞不簡能否義均行鴈次若貫魚執簿呼名一吏足矣數人而用何謂銓衡書奏不報已復奏乞令王公貴臣薦賢以補郡縣詔公卿議事亦寢時亮甥劉景安與亮書曰殷周以鄉孰貢士兩漢由州縣薦才魏晉因循又置中正雖未盡美十收六七而朝廷貢才止求其文不取其理察孝亷唯論章句不及治道立中正不考材行空辨姓氏取士不博沙汏未精舅當銓衡宜須改張易調如何反為停年格以限之天下士子誰復修厲名行哉亮以古今不同時宜須異為書復之其後甄琛等繼亮為尚書利其便己踵而行之魏之選舉失人自亮始魏減百官祿初魏髙祖以用度不足百官之祿四分減一及魏王即位于忠秉政復之至是又減魏纍世彊盛東夷西域貢獻不絶又立互市以致南貨至熙平神龜開府庫盈溢太后嘗至絹藏命從行者百餘人各自負絹稱力取之少者不減百餘匹或過重顛仆於地崔光止取二匹衆皆愧之時宗室權幸競為豪侈髙陽王雍冨冠一國河間王琛與之爭冨駿馬十餘匹皆以銀為槽窗户之上王鳯銜鈴金龍吐斾宴會酒器有水精峯瑪瑙碗赤玉厄皆中國所無嘗曰不恨我不見石崇恨石崇不見我胡太后建寺無己令諸州各建五級浮圖民力疲敝諸王貴大宦官羽林各建寺於洛陽相髙以壯麗太后設會施僧動以萬計賞賜左右所費不資而未嘗施惠及民府庫漸虛乃減削百官祿食任城王澄表言公私貧困宜節省浮費以周急務大后不能用在河間王琛字曇寶文成帝孫祿力祿官所受之祿力在官所用白直也御批厯代通鑑輯覽卷四十一

front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷十五漢世宗孝武皇帝辛丑建元元年師古曰自古帝王未有年號始起于此舉賢良方正直言極諫之士以董仲舒為江都相
  hash: sha256:c81db8a93c02662007e0c342162d208443320e1c66e75192068fc0fbe5531d72

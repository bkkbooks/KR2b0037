front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷四十三南北朝辛梁中大通三年魏節閔帝恭亥普泰元年廢帝朗中興元年春二月魏爾朱世隆廢其主煜而立廣陵王恭廣陵王羽之子是為節閔帝
  hash: sha256:b30dab8725d58b7f9d038118e26dcc09aa806dc36c3f494804a3021a1ce2ba22

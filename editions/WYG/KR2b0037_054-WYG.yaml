body:
  text: 李林甫數勸上立夀王瑁上以忠王璵年長孝謹好學意欲立之猶豫不决常忽忽不樂髙力士請其故上曰汝揣我何意力士曰得非以郎君未定耶上曰然對曰但推長而立誰復敢争上曰汝言是也由是遂定璵將受冊命儀注有中嚴外辦及綘紗袍璵嫌與至尊同稱表請易之于是停中嚴改辦曰備易絳紗袍為朱明服故事太子乗輅至殿門至是璵不就輅步而入中嚴外辦唐書禮樂志皇帝大祀致齋畫漏上水一刻侍中版奏請中嚴諸衛入陳殿庭文武五品以上陪位二刻侍中版奏外辦受朝日同皇太子亦中嚴外辦左庶子版奏絳紗袍車服志皇帝冠通天冠服綘紗袍冬至受朝賀祭還燕羣臣養老之服也皇太子冠逺遊冠服綘紗袍謁朝還宮元日朔日入朝釋奠之服也突騎施殺其可汗蘇禄初蘇禄亷儉攻戰所得悉與諸部分之由是衆樂為用既尚唐公主帝以西突厥降王阿史那懐道之女為交河公主妻蘇禄突厥吐蕃亦各以女妻之用度寖廣所得不復更分由是諸部離心渠長莫賀達干夜襲蘇禄殺之都摩度立蘇禄之子骨咄為吐火仙可汗收其餘衆居碎葉城吐火仙與莫賀達干相攻莫賀達干遣使告磧西節度使蓋嘉運明年秋嘉運擊吐火仙擒之並取交河公主而還九月丙申朔日食冊南詔為雲南王南詔之先本哀牢夷烏蠻别種哀牢注見前地居姚州唐置今為姚安府治西東南接交阯西北接吐蕃蠻語謂王曰詔先有六詔曰蒙嶲曰越析曰浪穹曰進晱曰施浪曰蒙舎蒙嶲古為嶲昆明漢置嶲唐縣晉以後没于蠻地在今大理府雲龍州越析唐初置州後為蠻所居亦曰磨些今麗江府是浪穹今大理府浪穹縣是進晱今大理府鄧川州是施浪居矣苴和城在今浪穹縣䝉次和山下䝉舎亦名陽𤓰州今雲南䝉化府是考通鑑蒙巂進晱施浪三詔作蒙越樣備越澹今從唐書莫能相一厯代因之以分其勢䝉舎最在南故謂之南詔至皮邏閤始彊大高宗時蒙舎細奴邏初入朝細奴邏生邏盛邏盛生盛邏皮盛邏皮生皮邏閤而五詔微弱乃賂劍南節度使王昱求合六詔為一朝廷許之賜名歸義于是以兵威脅服羣蠻遂破吐蕃徙居太和城在今大理府太和縣南名太和村城址尚存卒為邉患胡三省曰南詔自此始己卯二十七年夏六月貶張守珪為括州刺史幽州將趙堪白真陀羅矯節度使張守珪之命使平盧軍使烏知義邀叛奚餘黨知義不從白真陀羅矯稱制指以迫之知義出師與奚遇先勝後敗守珪掩其敗狀以克獲聞事頗泄上令内謁者監内官掌内傳宣及諸親命婦朝會之藉牛仙童往察之守珪重賂仙童歸罪于白真陀羅逼令縊死衆宦官疾仙童發其事上怒杖殺之守珪坐貶已而守珪疽發背死秋八月追諡孔子為文宣王先是祀先聖先師周公南向孔子東向坐制自今孔子南向坐被王者之服釋奠用宫懸贈弟子為公侯伯冬十二月更定禘祫之制初睿宗䘮既除祫于太廟自是三年一祫五年一禘是嵗夏既禘冬又當祫太常以為祭數則凟請停祫祭自是通計五年一禘一祫從之庚辰二十八年春正月荆州長史張九齡卒上雖以九齡忤㫖逐之然終愛重其人每宰相薦士輒問曰風度得似九齡不讀曰否及是以病卒三月丁亥朔日食立那史那昕為十姓即西突厥十部具見前可汗突騎施吐火仙既被擒詔立那史那懐道之子昕為十姓可汗莫賀達干聞之怒曰平蘇禄我功也今立昕謂何遂誘諸部以叛詔蓋嘉運招諭以莫賀達干為突騎施可汗已而昕竟為莫賀達干所殺西突厥遂亡後安西節度使夫蒙靈詧計莫賀達干斬之突騎施亦漸衰冬十月吐蕃宼安戎城注見前發關中兵救之初吐蕃䧟安戎城而據之事具前其地險要唐屢攻之不克劍南節度使王昱築兩城于其側運資糧以逼之吐蕃發兵来救昱衆大敗脱身走資仗皆沒于是貶昱髙要注見前尉以張宥代之宥文吏不習軍旅悉以軍政委團練副使唐注凡有團結營之處置團練使章仇複姓本章氏因避仇遂加仇字兼瓊兼瓊入奏事盛言安戎城可取上説之以宥為光禄卿兼瓊為節度使兼瓊潛與安戎城中結謀使開門納唐兵盡殺吐蕃將卒以監察御史許逺敬宗曽孫守之至是吐蕃宼安戎發關中彊騎救之吐蕃引去更命安戎城曰平戎辛巳二十九年春正月立賑饑法制曰前承饑饉皆待奏報然後開倉道路悠逺何救懸絶自今委州縣及採訪使給訖奏聞秋七月洛水溢八月以安禄山為營州都督禄山傾巧善事人人多譽之上左右至平盧者禄山皆厚賂之由是上益以為賢又賂採訪使張利貞利貞盛稱之上乃以為營州都督充平盧軍使冬十一月太尉寧王憲薨即宋王成器更封改名追諡曰讓皇帝憲薨上哀惋特甚曰天下兄之天下也固讓于我為唐太伯常名不足以處之乃諡曰讓皇帝其子汝陽王璡表述先志固讓不許十二月吐蕃陷石堡城先是吐蕃四十萬入宼至安人軍在今西寧府西騎將臧希液帥衆五千撃破之及是吐蕃攻陷石堡城蓋嘉運不能禦初嘉運入朝獻吐火仙之㨗上嘉其功以為河西隴右節度使經畧吐蕃嘉運恃恩流連不時發裴耀卿疏言嘉運雖勇烈有餘然言氣矜誇恐難成事况防秋非逺未言發期若臨事始去則士卒尚未相識何以制敵乞速遣進途嚴加訓厲上乃趣嘉運行及是竟無功壬午天寳元年春正月以安禄山為平盧節度使是時天下聲教所被之州三百二十一羈縻之州八百唐書地理志太宗平突厥西北諸蕃及蠻夷稍稍内屬即其部落列置州縣大者為都督府以其首領為都督刺史凡州府云八百五十六號為羈縻置十節度經畧使以備邊安西節度撫寧西域治龜兹城北庭節度防制突騎施堅昆治北庭都䕶府河西節度斷隔吐蕃突厥治凉州朔方節度捍禦突厥治靈州河東節度與朔方犄角以禦突厥治太原府范陽節度臨制奚契丹治幽州平盧節度鎮撫室韋靺鞨治營州隴右節度備禦吐蕃南撫蠻獠治益州嶺南五府經畧綏静夷獠治廣州此外又有長樂經畧福州領之東萊守捉萊州領之東牟守捉登州領之龜兹唐安西四鎮之一本西域國治伊邏盧城即漢延城也今其地為庫車城在吐魯蕃西南路室韋契丹别種地在今黒龍江西北餘注俱見前守捉唐制兵之戍邉者大曰軍小曰守捉凡鎮兵四十九萬人馬八萬餘匹開元之前每嵗供邊兵衣糧費不過二百萬天寶之後益兵浸多每嵗用衣千二十萬匹糧百九十萬斛公私勞費民始困苦矣穿三門運渠陜州刺史李齊物淮安王神通曽孫鑿底柱為門以通漕開其山嶺為輓路沃醯而鑿之棄石入河水益湍怒舟不能入新門候水漲以人輓舟而上上疑之遣宦者往視齊物厚賂宦者還言其便羣臣請加尊號先是上夢元元皇帝云吾像在京城西南百餘里遣使求得之于盩厔音周窒漢縣今屬西安府元和志山曲曰盩水曲曰厔樓觀山間元和志樓觀在盩厔縣東舊有尹先生樓故名迎置興慶宫至是陳王帝之子名珪府參軍田同秀言元元皇帝告以藏靈符在尹喜故宅宅在陜州靈寶縣函谷故闗有望氣臺寰宇記春秋時喜為關令見紫氣丈餘飛入關曰必有異人過此次日老子果騎青牛至後人即其處立臺上遣使求得之羣臣上表以寶符潛應年號請于尊號加天寶字從之于是加同秀朝㪚大夫時人皆疑寶符即同秀所為間一嵗清河人崔以清言見元元皇帝藏寶符在武城紫薇山勅使往掘亦得之東都留守王倕知其詐按問果服奏之上亦不深罪也其後或又言元元皇帝降于華清宫之朝元閣因改會昌縣曰昭應昌武城即漢東武城縣後魏曰武城今屬東昌府㑹縣天寶初置七載改昭應宋曰臨潼今屬西安府二月享元元皇帝于新廟越三日享太廟越二日合祀天地于南郊改官名侍中中書令為左右相丞相改為僕射東北都皆為京州為郡刺史為太守三月以韋堅字子金京兆萬年人為江淮租庸轉運使初宇文融既敗言利者稍息及楊慎矜得幸于是韋堅王鉷方翼之孫之徒競以利進百司有事權者稍稍别置使以領之舊官充位而已堅太子之妃兄也督江淮租運嵗増巨萬上以為能故擢任之王鉷亦以善治租賦為户部員外郎以盧絢嚴挺之為員外詹事李林甫為相凡才望功業出已右者必百計去之尤忌文學之士或陽與之善而隂陷之兵部侍郎盧絢綘州刺史嚴挺之為其所忌皆左遷㪚秩世謂林甫口有蜜腹有劍上嘗陳樂于勤政樓下垂簾視之盧絢謂上已起垂鞭按轡横過樓下絢風標清粹上目送之林甫知之乃召絢子弟謂曰交廣藉才上欲以尊君為之若憚逺行則當左遷姑以賓詹分務東洛何如絢懼請之乃除華州刺史未㡬誣其有疾除員外詹事上又嘗問林甫嚴挺之可用今安在挺之時為絳州刺史林甫退召挺之弟諭以上意甚厚盍稱疾求還可以見上挺之從之林甫以其奏白上云挺之老疾宜且授以㪚秩以便醫藥上歎吒久之亦以為員外詹事秋七月癸夘朔日食癸未二年春正月安禄山入朝禄山入朝上寵待甚厚謁見無時禄山奏言去秋營州蟲食苗臣焚香祝天云臣若操心不正事君不忠願使蟲食臣心若不負神祗願使蟲㪚即有羣鳥從北來食蟲立盡請宣付史館從之時李林甫領吏部尚書日在政府選事悉委侍郎宋遥苗晋卿選人集者以萬計進晋卿以御史中丞張倚得幸于上擢其子奭為首禄山言于上上招入面試之奭手持試紙終日不成一字時人謂之曳白于是三人皆坐貶苗晋卿字元輔潞州壺關人三月追尊周上御大夫為先天太皇臯繇為徳明皇帝時謂老子父官周上御大夫又謂臯繇為理官以理為姓殷周時避難食木子而生因改姓李故皆追尊之廣運潭在長安縣東南成加韋堅右散騎常侍堅引滻水源出藍田縣谷中北流至咸寧縣合灞水入渭抵苑東望春樓下為潭以聚江淮運船役夫匠通漕渠發人邱壟自江淮至京城民間愁怨二年而成上幸樓觀之堅以新船數百艘扁榜郡名各陳珍寶陜尉崔成甫著錦半臂紅抹額居前船唱得寶歌先是民間唱俚歌曰得體紇那邪其後得寶符于桃林成甫更得體歌為得寶歌辭曰得寶𢎞寶野𢎞農得寶邪潭裏舟船閙揚州銅器多三郎當殿坐聴唱得寶歌其俚更甚寶桃林縣名隋以漢𢎞農縣置天寶初于縣得老子符更名靈寶今縣屬陜州使美婦百人盛飾而和之連檣數里堅跪進輕貨仍上百牙盤食上置宴竟日而罷加堅常侍吏卒褒賞有差賜其潭名廣運甲申三載春正月改年曰載二月以安禄山兼范陽節度使河北黜陟使席建侯名豫以字行襄陽人稱禄山公直李林甫裴寛亦順㫖稱譽其美由是禄山之寵益固秋突厥亂冊回紇骨力裴羅為懐仁可汗胡三省曰回紇自此彊盛初突厥毘伽可汗為其大臣梅録啜毒死毘伽被毒忍死誅梅録啜夷其種乃卒其子伊然可汗立八年死弟骨咄立册為登利可汗其左部攻殺之立毘伽可汗子為骨咄葉䕶所殺登利年幼其母婆匐預政登利從父二人分掌東西兵號左右殺登利與其母誘斬右殺奪其兵左殺懼攻登利殺之左殺者判闕特勒也遂立毘伽可汗子俄為骨咄葉䕶所殺立其弟又殺之葉䕶遂自立為可汗上以突厥内亂命羽林將軍孫老奴招諭回紇葛邏祿抜悉密等郡已而抜悉密及回紇葛邏禄三部並起攻葉䕶殺之尊抜悉密部長為頡跌伊施可汗回紇葛邏禄自為左右葉䕶突厥餘衆奉判闕特勒子為烏蘇米施可汗上遣使諭烏蘇内附烏蘇不從朔方節度使王忠嗣説抜悉密等部攻之烏蘇遁去其西葉䕶阿布思反西殺葛臘哆等帥千餘帳相次來降至是抜悉宻攻殺烏蘇米施國人立其弟為白眉可汗于是突厥大亂上敕朔方節度使王忠嗣以兵乗之忠嗣破其左廂十一部獨右廂未下㑹回紇葛邏録共攻抜悉宻頡跌伊施可汗殺之奉回紇骨力裴羅定其國遣使言狀上册拜裴羅為懐仁可汗懐仁于是南據突厥故地立牙帳于烏徳鞬山舊統藥邏葛等九姓其後又併抜悉宻葛邏禄凡十一部各置都督明年懐仁攻殺白眉突厥遂亡始突厥國于後魏大統時至是滅其地盡入回紇毘伽可敦即登利母婆匐帥衆來歸上御花蕚樓宴羣臣賦詩美其事懐仁既殺白眉斥地愈廣東極室韋西抵金山南控大漠盡得古匈奴地已而懐仁死子磨延啜立號葛勒可汗九月以楊慎矜為御史中丞初上以慎矜知御史中丞事時李林甫専權公卿之進有不出其門者必以罪去之慎矜固辭不受至是林甫以慎矜屈附于已復以為中丞始祀九宫貴神九宫自一至九其神太乙攝提軒轅招摇天符青龍咸池太隂天乙其星天蓬天内天衝天輔天禽天心天柱天任天英其卦八一坎二坤三震四㢲五九同離六乾七兑八艮其五行一為水二與五八同土三與四同木六與七同金九為火其方之色曰白黒碧緑黄赤紫而白兼一六八之三方初術士蘇嘉慶言遯甲術有九宫貴神典司水旱請立壇于東郊祀以四孟月從之禮在太清宫太廟上所用牲玉皆侔天地乙酉四載春正月帝聞空中神語上謂宰相曰朕于宫中為壇為百姓祈福自草黄素置案上俄飛昇天聞空中語云聖夀延長又煉藥成置壇上及夜欲收又聞空中語云藥未須收此自守䕶羣臣表賀上尊道教慕長生于是所在争言符瑞太白山人李渾等上言見神人言金星洞有玉板石記聖王福夀之符命王鉷求獲之已而山人王元翼又言見元元皇帝云寶仙洞有妙寶真符命張均等復求得之李林甫等皆請舎宅為觀以祝聖夀上説太白山終南别名在今鳯翔府郿縣東南其山最高古謡武功太白去天三百即此金星寶仙二洞俱在太白山二月以朔方節度使王忠嗣兼河東節度使忠嗣少勇敢及鎮方面専以持重安邉為務常曰太平之將但當撫循訓練士卒不可疲中國之力以邀功名軍中日夜思戰忠嗣多遣間諜見可勝然後興師故出必有功既兼兩道節制自朔方至雲中邊陲數千里要害之地悉置城堡斥地各數百里邊人以為自張仁亶張仁愿初名仁亶之後將帥皆不及忠嗣每互市髙估馬價諸蕃聞之爭賣馬于唐忠嗣皆買之由是蕃馬少唐兵益壯秋七月册夀王妃韋氏八月以楊太真為貴妃初武恵妃薨後宫無當意者或言夀王妃楊氏之美上見而悦之乃令妃自以其意乞為女官女道士也號太真為夀王娶郎將韋昭訓女潛内太真宫中不朞嵗寵遇如恵妃宫中號曰娘子凡儀體皆如皇后至是册為貴妃贈其父元琰兵部尚書以從兄銛為殿中少監錡為駙馬都尉三姊皆賜第京師寵貴赫然已而復以妃從祖兄釗為金吾兵曹參軍釗不學無行為宗黨所鄙從軍于蜀貧不能歸新政富民鮮于仲通常資給之仲通頗讀書有才智章仇兼瓊引為採訪支使委以心腹嘗從容謂仲通曰今吾獨為上所厚茍無内援李林甫必見危聞楊妃新得幸子能為我結之吾無患矣仲通言釗本末釗儀觀甚偉言詞敏給兼瓊見之大悦即辟為推官使獻春綵于京師贐蜀貨直萬緡釗大喜過望至長安見諸妹分以遺之曰此章仇公所贈也于是諸楊日夜譽兼瓊且言釗善樗蒲引之見上得随供奉官出入禁中府南新政唐縣元省故城在今四川保寕部縣九月以韋堅為刑部尚書楊矜慎為租庸轉運使堅以通漕有寵遂有入相之志又與李適之常山愍王承乾曽孫天寶元年代牛仙客為左相善林甫由是惡之故遷以美官實奪之權也安禄山討奚契丹破之禄山欲以邊功市寵數侵掠奚契丹奚契丹各殺所尚公主上以外孫獨孤氏為静樂公主嫁契丹王以甥楊氏為宜芳公主嫁奚王以叛禄山討破之已而禄山奏臣討契丹至北平郡夢先朝名將李靖李勣從臣求食遂命立廟又奏薦享之日廟梁産芝以王鉷為京畿採訪使初鉷為户口色役使掌諸色雜徭役者敕賜百姓復除鉷奏徴其輦運之費廣張錢數使市輕貨百姓所輸乃甚于不復除舊制戍邊者免其租庸六嵗而更時邊將恥敗士卒死者皆不申牒貫籍不除王鉷皆以為避課六嵗之外悉徴其租庸有併徴三十年者民無所訴上在位久用度日侈又不欲數于左右藏取之鉷知上㫖嵗貢額外錢帛百億萬貯于内庫以供宴賜曰此皆不出于租庸調上以鉷為能富國益厚遇之中外嘆怨至是以為御史中丞京畿採訪使楊釗侍宴禁中専掌樗蒲文簿鈎校精宻上賞其彊明曰好度支郎諸揚數徵此言於上又以屬王鉷鉷因奏充判官丙戌五載春正月貶韋堅為縉雲唐郡今浙江處州府是太守皇甫惟明為播州唐置天寳初為郡今貴州遵義府是太守初太子之立非李林甫意林甫恐異日為已禍欲動摇之隴右節度使皇甫惟明嘗為忠王友太子先封忠王見前時破吐蕃入獻㨗見林甫専權勸上去之林甫知之使楊慎矜宻伺其所為㑹正月望夜太子出遊與韋堅相見堅為太子妃兄堅又與惟明㑹于景龍觀慎矜遂告堅與惟明謀立太子收下獄林甫使慎矜等鞫之上亦疑堅與惟明有謀而不顯其罪皆貶之親黨坐者數十人太子表請與妃離昏帝素知太子孝謹故譴怒不及以王忠嗣為河西隴右朔方河東節度使忠嗣仗四節控制萬里天下勁兵重鎮皆在掌握與吐蕃戰于青海積石皆大㨗又討吐谷渾俘其全部而歸忠嗣功名日盛李林甫恐其入相忌之安禄山潜蓄異志託以禦宼築雄武城大貯兵器請忠嗣助役欲留其兵忠嗣先期而往不見禄山而還數奏言禄山必反林甫益惡之已而忠嗣固辭河東朔方節度許之薊雄武城在今順天府州東北夏四月李適之罷韋堅等既貶適之懼自求㪚地遂罷政事初適之與林甫有隙適之領兵部尚書林甫使人發兵部銓曹姦利事收吏六十餘人付京兆京兆尹蕭炅使法曹吉温鞫之温置吏于外先取二重囚訊之號呼之聲所不忍聞吏聞之大懼引入皆自誣服頃刻獄成敕誚責前後知銓侍郎及判南曹郎官而宥之始太子文學薛嶷薦温才上召見顧嶷曰是一不良人朕不用也及林甫欲除不附己者求治獄吏炅薦温于林甫林甫大喜又有羅希奭者為吏深刻林甫引為殿中侍御史二人皆随林甫所欲深淺鍛錬成獄無能自脱者時人謂之羅鉗吉網吉温頊從子羅希奭錢塘人南曹郎唐書百官志吏部員外郎二人一判南曹以陳希烈宋州人同平章事希烈以講老荘得進専用神仙符瑞媚于上李林甫以希烈柔佞易制故引以為相政事一决于林甫希烈但給唯諾故事宰相午後六刻乃出林甫奏今太平無事已時即還第機務皆決于私家主書抱成案詣希烈書名而已五月壬子朔日食秋七月加嶺南經畧使張九章三品以廣陵長史王翼為户部侍郎楊貴妃方有寵中外争獻珍玩九章翼所獻精美九章加三品翼為户部侍郎民間歌之曰生男勿喜女勿悲君今看女作門楣妃欲得生荔枝嵗命嶺南馳驛致之比至長安色味不變妃嘗以妬悍不遜送歸銛第上遂不食及夜力士奏請迎妃歸院遂開禁門而入後復以忤㫖遣歸吉温因宦官言於上曰陛下何愛宫中一席之地使之就死而辱之于外舎耶上亦悔之遣中使賜以御膳妃對使者涕泣曰金玉珍玩皆陛下所賜惟髮者父母所與乃剪髮一繚而獻之上遽召還寵待益深丁亥六載春正月殺北海太守李邕淄川太守裴敦復及皇甫惟明韋堅等王琚李適之自殺先是韋堅之弟将作少匠蘭兵部員外郎芝為堅訟寃且引太子為言上怒李林甫因言堅與李適之朋黨堅遂長流適之貶宜春本袁州天實初改郡太守已而左驍衛兵曹栁勣告贊善大夫杜有鄰妄稱圖纎交搆東宫指斥乗輿有鄰女為太子良娣良娣之姊勣妻也勣性疎狂好功名善交結豪傑名士與妻族不協欲䧟之故為飛語以告林甫令吉温鞫之乃勣首謀遂與有鄰俱杖殺太子亦出良娣為庶人勣素與淄川太守裴敦復善敦復先以平海賊有功擢嶺南經畧使林甫忌之貶淄川守敦復薦之北海太守李邕邕遂與定交㑹鄴郡太守王琚以贓貶江華唐郡今湖南永州府道州是司馬琚性豪侈與邕皆自謂耆舊久在外意怏怏林甫欲因事除之至是别遣羅希奭按邕敦復皆杖死邕才藝出衆盧藏用嘗語之曰君如干将莫邪難與争鋒然終虞缺折耳邕不能用林甫又奏分遣御史賜皇甫惟明韋堅等死希奭自青州之嶺南所過殺遷謫者李適之仰藥琚自縊適之子霅迎䘮至東京林甫令人誣告殺之給事中房琯字次律河南人坐與適之善貶宜春太守林甫恨韋堅不已遣使于循河及江淮州縣坐堅罪收繫綱典船夫徵剝逋負延及鄰伍死者甚衆至林甫死乃止綱典十船為一綱以吏典之除絞斬條上慕好生之名令應絞斬者皆重杖流嶺南其實有司率杖殺之令天下嫁母服三載令士通一藝以上皆詣京師上欲廣求天下之士命通一藝以上皆詣京師李林甫恐草野之士對策斥其姦惡建言舉人卑賤恐有俚言汚濁聖聴乃令郡縣精加試練送省覆試具名奏聞既而至者皆試以詩賦論遂無一人及第者林甫乃以野無遺賢上表稱賀以安禄山兼御史大夫禄山體肥腹垂過膝外若癡直内實狡黠其在上前應對敏給雜以詼諧上嘗戲指其腹曰此胡腹中安所有其大乃爾對曰更無餘物止有赤心耳又嘗命見太子禄山不拜左右趣之拜禄山曰太子何官上曰此儲君也朕千秋萬嵗後代朕君汝者也禄山曰臣愚曏者惟知有陛下一人不知乃更有儲君不得已然後拜上以為信然益愛之上嘗宴勤政樓百官列坐樓下獨禄山于御座東間設金鷄帳置榻使坐其前命楊銛姊弟皆與禄山叙兄弟禄山得出入禁中因請為貴妃兒上與貴妃同坐禄山先拜貴妃上問何故對曰胡人先母而後父上悦冬十月帝如驪山温泉在今西安府臨潼縣南驪山之麓名其宫曰華清先是置温泉宫上嵗幸之至是更宫名曰華清治湯井為池環山列宫室内有集靈臺朝元閣飛霜九龍長生明珠等殿又築羅城置百司及公卿邸第将軍董延光攻吐蕃石堡城不克十一月以哥舒翰突騎施哥舒部渠長之子充隴右節度使貶王忠嗣為漢陽太守忠嗣以部将哥舒翰為大斗軍在今凉州府永昌縣西南以大斗抜谷為名副使李光弼營州栁城人契丹王楷落之子為河西兵馬使翰光弼皆以勇畧為忠嗣所重每嵗積石軍麥熟吐蕃輙来穫之無能禦者翰先伏兵于其側冦至㫁其後夹擊之無一人得返自是不敢復來積石軍在今蘭州府河州西上欲使忠嗣攻吐蕃石堡城忠嗣上言石堡險固吐蕃舉國守之非殺數萬人不能克臣恐所得不如所亡不如厲兵秣馬俟其有釁然後取之上意不決将軍董延光請行上命忠嗣分兵助之忠嗣不得已奉詔而不盡如其所欲李光弼曰大夫以數萬衆授延光而不立重賞士卒安肯為之盡力且此天子意也彼無功必歸罪于大夫大夫何以杜其讒口乎忠嗣曰今以數萬之衆爭一城得之未足以制敵不得亦無害于國故不欲為之忠嗣今受責天子不過一将軍歸宿衡其次不過黔中上佐豈以數萬人之命易一官乎光弼曰大夫能行古人之事非光弼所能及也延光過期不克言忠嗣阻撓軍計上怒李林甫因使人告忠嗣欲擁兵奉太子敕徴忠嗣入朝委三司鞫之上聞哥舒翰名召見悦之以為隴右節度使而詔三司曰吾兒居深宫安得與外人通謀此必妄也但劾忠嗣阻撓軍功三司奏忠嗣罪當死翰力陳其寃上感悟貶忠嗣漢陽太守李林甫屢起大獄以楊釗有掖庭之親乃因以為援事有微渉東宫者皆指摘使之奏劾付羅希奭吉温鞫之釗因得逞其私志所擠陷誅夷者數百家幸太子仁孝謹静張垍髙力士常保䕶于上前故林甫終不能間也張垍説之子殺户部侍郎楊慎矜慎矜為上所厚李林甫浸忌之慎矜與王鉷父中表兄弟也故引鉷入臺及鉷遷中丞慎矜猶名之鉷意不平慎矜不之覺嘗與之私語纎書慎矜與術士史敬忠善敬忠言天下将亂勸慎矜于臨汝山中買茌避亂林甫知鉷與慎矜有隙誘使圖之鉷乃遣人以飛語告慎矜隋煬帝孫與凶人往來家有䜟書謀復祖業上大怒收慎矜繋獄命楊釗盧鉉同鞫之使吉温捕敬忠于汝州敬忠與温父善温幼時敬忠嘗抱撫之及捕獲温不與語鎖其頸驅之馬前使吏誘之曰楊慎矜已欵服惟須子一辨解意則生不然必死敬忠求紙温不答敬忠懇請哀切乃令答辨還鞫慎矜因以為證慎矜皆引服惟搜䜟書不獲使盧鉉入長安搜其家鉉袖䜟書入闇中出詬曰逆賊深藏秘記以示慎矜歎曰吾不蓄䜟書此何從在我家哉吾應死而已于是兄弟皆賜死妻子流嶺南連坐者數十人十二月以天下嵗貢賜李林甫命百官閲嵗貢物于尚書省悉以車載賜李林甫上或有時不視朝百官悉集林甫第門臺省為空林甫子岫為将作監頗以滿盈為懼嘗從林甫遊後園指役夫言曰大人久處鈞軸怨仇滿天下一朝禍至欲為此得乎林甫不樂曰勢已如此将若之何先是宰相皆以徳度自處騶從不過數人林甫自以多結怨常虞刺客出則歩騎百餘人為左右翼金吾静街前驅在數百歩外居則重關複壁如防大敵一夕屢徙牀雖家人莫知其處以高仙芝高麗人為安西四鎮節度使仙芝從軍安西驍勇善騎射累官四鎮節度副使小勃律王及其旁二十餘國皆服吐蕃貢獻不入討之不克制以仙芝為行營節度使討之自安西行百餘日至連雲堡胡三省注堡在吐蕃南依山北據娑勒川為固破之遣将軍席元慶将千騎前行謂曰小勃律聞大軍至其君臣百姓必走山谷第呼出取繒帛稱敕賜之大臣至盡縛之以待我元慶如其言仙芝至斬其附吐蕃者數人急遣元慶往斫娑夷藤橋唐書西域傳小勃律王居孽多城臨娑夷水藤橋去城六十里甫畢而吐蕃救至已無所及娑夷即弱水不能勝草芥藤橋濶盡一矢力修之朞年乃成仙芝俘小勃律王及吐蕃公主而還上以仙芝為安西四鎮節度使仙芝署封常清蒲州猗氏人判官任以軍事自唐興以來邊帥皆用忠厚名臣不久任不遥領不兼統功名著者往往入為宰相其四夷之将雖才畧如阿史那社爾契苾何力猶不専大将之任皆以大臣為使以制之及開元中天子有吞四夷之志為邊将者十餘年不易始久任矣皇子則慶忠諸王宰相則蕭暠牛仙客始遥領矣蓋嘉運王忠嗣専制數道始兼統矣李林甫欲杜邊帥入相之路以蕃人不知書乃奏言文臣為将怯當矢石不若用寒族蕃人蕃人則勇決習戰寒族則孤立無黨陛下誠以恩結其心彼必能為朝廷盡死上悦其言始用安禄山至是諸道節度使盡用蕃人精兵咸戍北邊天下之勢偏重卒使禄山傾覆天下皆出于林甫專寵固位之謀也戊子七載夏四月以高力士為驃騎大将軍力士承恩嵗久中外畏之太子亦呼之為兄諸王公呼之為翁駙馬輩直謂之爺自李林甫安禄山輩皆因之以取将相然性和謹少過不敢驕横故天子終親任之士大夫亦不疾惡也上嘗從容謂力士曰朕不出長安近十年天下無事朕欲悉以政事委李林甫何如對曰天子巡守古之制也且天下大柄不可假人彼威勢既成誰敢復議之者上不悦力士頓首謝罪上意乃解力士自是亦不敢深言天下事矣五月羣臣上尊號賜安禄山鐵券以楊釗判度支事釗善窺上意所愛惡而迎之以聚斂驟遷嵗中領十五使恩幸日隆冬十一月以貴妃姊為國夫人貴妃姊三人皆有才色上呼之為姨出入宫掖並承恩澤勢傾天下至是封韓虢秦國夫人與銛錡五家凡有請託府縣承迎峻于制敕四方賂遺惟恐居後上所賜與五家如一競開第舎極其壮麗一堂之費動踰千萬既成見他人有勝已者輒毁而改焉虢國尤為豪蕩虢國新第堂成召匠圬埐以絳羅五百叚賞之匠嗤不顧曰請取螻蟻蜥蜴記其數置堂中茍失一物不敢受直十二月哥舒翰築神威軍在青海上應龍城在青海中龍駒島魏書吐谷渾傳青海中有小山每冬氷合後㳺牝此山明年生駒必多駿異因名其島曰龍駒翰築神威軍吐蕃至撃破之乃更築應龍城于青海中以謫卒二千戍之明年冬青海氷合吐蕃大至戍者盡没己丑八載春二月帥羣臣觀左藏賜楊釗金紫是時州縣殷富倉庫積粟帛動以萬計釗請令糶變為輕貨輸京師屢奏帑藏充牣古今罕儔故上帥羣臣觀之賜釗紫衣金魚上由是視金帛如糞壤賞賜無限夏四月殺咸寧太守趙奉璋奉璋告李林甫罪二十條未達林甫諷御史逮捕以為妖言杖殺之五月停折衝府上下魚書先是折衝府天下三百六十四府其府統軍為折衝都尉皆有木契以木書契銅魚刻銅為符作魚形契與魚皆中剖以其左付軍府其右藏天府朝廷徴發下敕書契魚都督郡府叅驗皆合然後遣之自募置彍騎府兵日壊死亡不補器械耗㪚畧盡府兵入宿衛者謂之侍官言其為天子侍衛也其後本衛多以假人役使如奴𨽻長安人羞之至以相詬病其戍邊者又多為邊将苦使利其死而沒其財由是應為府兵者皆逃匿至是無兵可交李林甫遂奏停折衝府上下魚書是後府兵徒有官吏而已彍騎之法天寶以後稍亦變廢應募者皆市井負販無頼子弟未嘗習兵時承平日久議者多謂中國兵可銷于是民間挾兵器者有禁子弟為武官父兄擯不齒猛将精兵皆聚于西北邊中國無武偹矣六月加聖祖及諸帝后號諡上以符瑞相繼上聖祖號曰大道元元皇帝高祖曰神堯太宗曰文武髙宗曰天皇中宗曰孝和睿宗曰元貞五帝諡帝皆曰大聖后皆曰順聖閏月上謁太清宫羣臣上尊號曰開元天地大寶聖神文武應運皇帝十三載二月復加元元皇帝及諸帝后諡號上亦加尊號至十四字太清宫元元皇帝之廟也哥舒翰攻吐蕃石堡城拔之翰帥兵六萬攻吐蕃石堡城其城三面險絶惟一徑可上吐蕃但以數百人守之貯糧食積木石唐兵前後屢攻之不能克翰進攻數日不拔召禆将髙秀巖張守瑜欲斬之二人請三日期拔之獲吐蕃四百人唐士卒死者數萬以石堡城為神武軍庚寅九載春正月羣臣請封西嶽許之已而關中旱嶽祠災遂罷封祀夏四月流宋渾于潮陽本潮州天寶初改郡今廣東潮州府是初吉温因李林甫得進及楊釗恩遇浸深温遂棄林甫而附之為畫代林甫執政之䇿御史中丞宋渾林甫所厚也温使釗奏而逐之以剪其心腹林甫不能救五月賜安禄山爵東平郡王唐將帥封王自此始秋八月以安禄山兼河北道採訪處置使求殷周漢後廢韓元魏後介後周後酅隋後公處士崔昌上言國家宜承周漢以土代火魏周隋皆閏位不當以其子孫為二王後事下公卿集議集賢院學士衛包上言集議之夜四星聚于尾尾九星後宫之塲妃后之府考唐書天文志天寶九載八月五星聚于箕尾熒惑後至而先去尾箕燕分也占曰有徳則慶無徳則凶據此聚本五星而衛包言四星者蓋以熒惑後至而不言且附㑹殷周漢唐之説也天意昭然上乃命求殷周漢後為三恪廢韓介酅公十二載夏復以魏周隋後為三恪崔昌衛包皆坐貶時李林甫已死楊國忠欲攻其短故有是命安禄山入朝禄山屢誘奚契丹飲以莨菪酒莨菪藥名以其子釀酒飲之不復醒醉而阬之動數千人斬首以獻前後數四至是請入朝上命有司先為起第于昭應禄山至戲水在臨潼縣東下流入渭水古有戯亭楊釗兄弟姊妹皆往迎之上幸望春宫以待之禄山獻奚俘八千人上命考課之日書上上考前此聴禄山于上谷鑄錢五壚禄山乃獻錢樣千緡制追復張易之兄弟官爵賜楊釗名國忠楊釗張易之之甥也奏乞雪易之兄弟制引易之兄弟迎中宗于房陵之功復其官爵仍官其子釗以圖䜟有金刀請更名上賜名國忠南詔反陷雲南郡即姚州天寶初改郡楊國忠徳鮮于仲通薦為劍南節度使仲通性褊急失蠻夷心故事南詔常與妻子俱謁都督過雲南太守張䖍陁皆私之又多所徴求南詔王閤羅鳯皮羅閤死閤羅鳯嗣忿怒發兵反攻陷雲南殺䖍陁取夷州三十二辛卯十載春正月免駙馬程昌裔官楊氏五宅夜遊與廣平公主帝之女從者爭西市門楊氏奴揮鞭及公主衣公主墜馬昌裔下扶之亦被數鞭公主泣訴于上上為之杖殺楊氏奴明日免昌裔官不聴朝謁為安禄山起第于親仁坊命有司為禄山起第于親仁坊敕諭但窮壮麗不限財力令中使䕶作敕之曰胡眼大勿令笑我及第成禄山置酒請墨敕召宰相至第上命宰相皆赴之又日遣諸楊與之遊宴通鑑載禄山生日上及楊妃賜予甚厚後三日召入禁中貴妃以錦繡為大襁褓裹之使宫人以輿舁之上聞問故左右以貴妃洗禄兒對上賜貴妃洗皃金銀錢復厚賜禄山盡歡而罷自是禄山出入宫掖不禁考此皆出禄山事跡及天寶遺事諸稗史恐非實録今不取以安禄山兼河東節度使户部郎中吉温見禄山有寵約為兄弟説禄山曰李丞相雖以時事親三兄必不肯以兄為相兄若薦温于上温即奏兄堪大任共排林甫出之為相必矣禄山悦其言數穪温才于上㑹禄山領河東因奏温為副使知留後以大理司直張通儒為判官委以軍事林甫與禄山語每揣知其情先言之禄山驚服每見雖盛冬常汗霑衣林甫引與坐于中書㕔撫以温言自解披袍以覆之禄山荷言無不盡謂林甫為十郎既歸范陽留其将劉駱各在長安每還必問十郎何言得美言則喜或但云語安大夫須好檢校即反手據牀曰噫嘻我死矣禄山既兼領三鎮日益驕恣自以曩時不拜太子見上春秋高頗内懼又見武備堕弛有輕中國之心孔目官嚴荘掌書記高尚雍奴人因為之解圖䜟勸之作亂禄山養同羅奚契丹降者八千餘人謂之曳落河曳落河者猶言壯士也皆驍勇善戰一可當百以尚荘通儒及将軍孫孝哲契丹部人為腹心史思明安守忠李歸仁蔡希徳牛廷玠向潤容李庭望崔乾祐尹子竒何千年武令珣能音耐元皓能氏系出長廣田承嗣田乾真阿史那承慶為爪牙尚夲名不危頗有詞學薄遊河朔貧困不得志常歎曰高不危當舉大事而死豈能齧草根求活耶禄山因置幕府出入臥内尚典賤奏荘治簿書承嗣為前鋒兵馬使治軍嚴整嘗大雪禄山按行諸營至承嗣營寂若無人入閲士卒無一人不在者禄山是以重之夏四月劍南節度使鮮于仲通討南詔蠻敗績制復募兵以擊之仲通将兵八萬討南詔南詔王閤羅鳯遣使謝罪請還所俘掠城雲南而去仲通不可囚其使進軍至西洱河與戰大敗士卒死者六萬人仲通僅以身免楊國忠掩其敗状仍叙其戰功閤羅鳯遂北臣于吐蕃吐蕃號曰東帝閤羅鳯刻碑于國門言已不得已而叛唐且曰我世世事唐受其封賞後世容復歸唐當指碑以示唐使者知吾之叛非本心也制募兵以撃之人聞雲南多瘴氣莫肯應募楊國忠遣御史分道捕人枷送軍所舊制百姓有勲者免征役國忠奏先取髙勲于是行者愁怨父母妻子送之所在哭聲震野高仙芝撃大食注見前敗績初仙芝偽與石國月氏餘種在漢大宛西鄙約和因兵襲之俘其王以歸掠得瑟瑟十餘斛黄金五六槖駝皆入其家瑟瑟廣雅曰碧珠也石國王子走告諸部諸部皆怒潜引大食欲共攻四鎮仙芝将兵三萬擊之深入七百餘里與戰大敗士卒死亡畧盡将軍李嗣業勸仙芝宵遁别将殺秀實詬之曰避敵先奔無勇也全已棄衆不仁也幸而得達獨無愧乎嗣業執其手謝之留拒追兵收㪚卒得俱免還至安西言于仙芝以秀實兼都知兵馬使為已判官段李嗣業京兆髙陵人秀實字成公汧陽人秋八月武庫火燒兵器三十七萬安禄山討契丹大敗禄山将三道兵六萬以討契丹以奚騎二千為鄉導過平盧千餘里遇雨弓弩筋膠皆弛奚復叛與契丹合夾撃唐兵殺傷殆盡禄山獨與麾下二十騎走入師州唐羈縻州以室韋部置後僑治于良郷縣之故東閭城歸罪于左賢王哥解兵馬使魚承仙斬之平盧兵馬使史思明懼逃入山谷禄山遷至平盧麾下皆亡史思明出見禄山禄山喜執其手曰吾得汝復何憂思明退謂人曰曏使早出已與哥解并斬矣冬十一月以楊國忠領劍南節度使壬辰十一載春二月以粟帛庫錢易惡錢先是江淮多惡錢貴戚大商往往以良錢一易惡錢五載入長安市井不勝其弊故李林甫奏請禁之官為易取期一月不輸官者罪之于是商賈不以為便遮楊國忠馬自言國忠為言于上乃更命非鉛錫所鑄及穿穴者皆聴用之三月安禄山撃契丹禄山撃契丹欲以雪去秋之恥㑹突厥降将阿布思叛初突厥阿布思來降上厚禮之賜姓名李獻忠累遷朔方節度副使獻忠有權畧不為安禄山下禄山恨之至是奏請獻忠俱撃契丹獻忠恐為禄山所害乃帥所部叛歸漠北禄山遂頓兵不進已而阿布思為回紇所破禄山誘其部落降之由是禄山兵精天下莫及阿布思遁入葛邏禄其葉䕶執之送京師改吏兵刑為文武憲部夏户部侍郎京兆尹王鉷伏誅鉷權寵日甚其弟户部郎中銲凶險不法召術士任海川問我有王者之相否海川懼亡匿鉷恐事泄捕得托以他事杖殺之王府司馬韋㑹話之私庭鉷又使長安尉賈季鄰收繫殺之銲所善邢縡與龍武萬騎謀作亂有告之者上以告状面授鉷使捕之鉷意銲在縡所先遣人召之日晏乃命捕縡縡帥其黨格鬬㑹髙力士引禁軍至撃斬縡捕其黨皆擒之國忠白上鉷必預謀上以鉷任遇深不應同逆李林甫亦為之解辯乃命特原銲不問使國忠諷鉷表請罪之鉷不忍上怒㑹陳希烈極言鉷大逆當誅敕希烈與國忠鞫之仍以國忠兼京兆尹任海川韋會等事皆發獄具鉷賜自盡銲杖死于朝堂有司籍其第舎數不能徧五月以楊國忠為御史大夫京畿採訪使初李林甫以國忠㣲才且貴妃之族故善遇之國忠以林甫薦王鉷為大夫不悦遂深探邢縡獄令引林甫交私事状陳希烈哥舒翰從而證之上由是疎林甫擢國忠為大夫凡鉷所領使務皆歸之國忠貴震天下始與林甫為讐敵矣是秋上復幸左藏國忠奏有鳯凰見左藏屋出納判官魏仲犀見之遂以仲犀為殿中侍御史冬十一月右相李林甫死先是林甫奏請楊國忠赴鎮劍南國忠既領劍南節度南詔數宼邉蜀人請國忠赴鎮林甫因奏遣之國忠将行泣言必為林甫所害上曰卿暫到蜀區處軍事朕屈指待卿還當入相林甫時已有疾聞之憂懣不知所為至是林甫疾劇上遣中使召國忠還至昭應謁林甫拜于牀下林甫流涕謂曰林甫死矣公必為相以後事累公國忠謝不敢當汗流覆面林甫遂死上晚年自恃承平以為天下無復可憂遂深居禁中専以聲色自娱悉委政事于林甫林甫媚事左右迎合上意以固其寵杜絶言路掩蔽聪明以成其姦妬賢嫉能排抑勝己以保其位屢起大獄誅逐貴臣以張其勢自皇太子以下畏之側足凡在相位十九年養成天下之亂而上不之寤也以楊國忠為右相兼文部尚書國忠為人强辨而輕躁無威儀既為相裁决機務果敢不疑攘袂扼腕公卿以下頤指氣使莫不震慴凡領四十餘使或勸陜郡進士張彖謁國忠彖曰君輩倚楊右相如㤗山吾以為氷山耳若皎日既出君輩得無失所恃乎遂隐居嵩山癸巳十二載春正月楊國忠注選人于都堂國忠欲收人望選人無問賢不肖選深者留之依資據闕注官滯淹者翕然稱之凡所施置皆曲徇時人所欲故頗得衆譽故事兵吏部尚書知政事者選事悉委侍郎以下三注三唱仍過門下省審自春及夏乃畢至是國忠欲自示精敏乃遣令史先于私第宻定名闕召左相陳希烈及給事中諸司長官皆集尚書都堂唱注一日而畢曰今左相給事中俱在座已過門下矣其間資格差謬甚衆無敢言者于是門下不復過官侍郎但掌試判而已時中書舎人宋昱知選事進士劉迺遺昱書曰禹稷臯陶同居舜朝猶曰載采有九徳考績以九載近代主司察言于一幅之判觀行于一揖之間何古今遲速不侔之甚哉借使周公孔子今處銓廷考其辭華則不及徐庚觀其利口則不如嗇夫何暇論聖賢之事業乎闕劉迺字永夷河南伊人二月追削李林甫官爵剖其棺楊國忠説安禄山使阿布思部落降者詣闕誣告李林甫與阿布思謀反上信之下吏按問林甫婿諌議大夫楊齊宣懼為所累證成之時林甫尚未𦵏制削官爵子孫皆流嶺南黔中親近及黨與坐貶者五十餘人剖棺抉含珠褫金紫更以小棺如庶人禮𦵏之秋八月以哥舒翰兼河西節度使安禄山以李林甫狡猾踰已故畏服之及楊國忠為相視之蔑如也由是有隙國忠屢言禄山有反状上不聽隴右節度使哥舒翰素與禄山不協先是翰與禄山俱入朝上使高力士宴之城東禄山謂翰曰公與我族類頗同何得不相親翰曰古人云狐向窟嘷不祥為其忘本也兄茍見親翰敢不盡心禄山以為譏其胡也怒駡曰突厥敢爾翰欲應之力士目翰乃止由是為怨愈深㑹翰撃吐蕃悉收九曲唐軍名在今蘭州府河州邊外西北唐書吐蕃傳九曲地宜畜牧開元中吐蕃賂都督楊矩請其地為金城公主湯沐矩表與之由是吐蕃近與唐接勢益張天寶十二載哥舒翰收復故地遂列郡縣部落國忠欲厚結翰與共排禄山因奏以翰兼河西節度賜爵西平郡王是時中國盛彊自安逺門西盡唐境凡萬二千里閭閻相望桑麻翳野天下稱富庶者無如隴右翰每遣使入奏嘗騎白槖駞日馳五百里門安逺門長安城西北冬十月帝如華清宫楊國忠與虢國夫人居第相鄰晝夜往來無復期度或並轡走馬不施鄣幕道路掩目三夫人從幸華清㑹于國忠第車馬僕從充溢數坊錦繡珠玉鮮華奪目國忠謂客曰吾本寒家一旦緣椒房至此未知稅駕之所然終不能致令名不若且極樂耳楊氏五家隊各為一色衣以相别五家合隊粲若雲錦國忠仍以劒南旌節引于其前國忠子暄舉明經荒陋不及格禮部侍郎達奚珣畏國忠遣其子邀國忠馬白之然亦未敢落也國忠怒曰我子何患不富貴乃令鼠輩相賣䇿馬不顧而去珣懼遂置暄上等甲午十三載春正月安禄山入朝是時楊國忠言禄山必反且曰陛下試召之必不來上使召之禄山即至見上泣曰臣本胡人陛下寵擢至此為國忠所疾臣死無日矣上憐之賞賜巨萬由是國忠之言不能入矣太子亦言禄山必反上不聴禄山求兼領羣牧總監表吉温自副因擇良馬納范陽加安禄山左僕射上欲加禄山同平章事已令太常張垍草制楊國忠曰禄山雖有軍功目不知書豈可為宰相制書若下恐四夷輕唐上乃以禄山為僕射唐初詔敕皆中書門下官有文者為之乾封以後始召文士草諸文辭常于北門候進止時人謂之北門學士上即位始置翰林院宻邇禁庭延文章之士下至僧道書畫琴棋數術之工皆處之謂之待詔刑部尚書張均及弟垍皆翰林院供奉三月安禄山歸范陽禄山奏所部将士討奚契丹等勲效甚多乞超資加賞除将軍者五百餘人中郎将者二千餘人禄山欲反故先以此收衆心也禄山辭歸范陽上解御衣以賜之禄山驚喜恐楊國忠奏留之疾驅出關乗船沿河而下晝夜兼行日數百里自是有言禄山反者上皆縛送之由是人無敢言者禄山之發長安也上令髙力士餞之及還上問禄山慰意乎對曰觀其意怏怏必知欲命為相而中止也上以告國忠國忠曰此議他人不知必張垍兄弟告之也上怒貶均垍官夏六月乙丑朔日食不盡如鈎劒南留後李宓撃南詔敗没宓撃南詔閤羅鳯誘之深入至太和城閉壁不戰宓糧盡士卒瘴疫饑死什七八乃引還蠻追撃之全軍皆没國忠隐其敗更以㨗聞益發中國兵討之前後死者幾二十萬人無敢言者上嘗謂髙力士曰朕今老矣朝事付之宰相邊事付之諸将夫復何憂力士對曰臣聞雲南數䘮師又邊将擁兵太盛陛下将何以致之臣恐一旦祸起不可復救何謂無憂也上曰卿勿言朕深思之秋八月陳希烈罷以韋見素字㑹微湊之子同平章事楊國忠忌陳希烈希烈累表辭位上欲以吉温代之國忠以温附安禄山奏言不可以見素和雅易制薦之關中大饑自去嵗水旱相繼關中大饑上憂雨傷稼國忠取禾之善者獻之曰雨雖多不害稼也上以為然扶風太守房琯言所部水災國忠使御史推之是嵗天下無敢言災者高力士侍側上曰淫雨不已卿可盡言對曰自陛下以權假宰相賞罸無章隂陽失度臣何敢言上然之冬閏十一月貶韋陟字殷卿安石子為桂嶺隋縣元省故城在今廣西平樂府賀縣尉吉温為澧陽本澧州天寶初改郡後仍為州今𨽻湖南長史河東太守韋陟文雅有盛名楊國忠恐其入相使人告陟贓汚事下御史陟賂中丞吉温使求救于安禄山復為國忠所發貶陟桂嶺尉温澧陽長史安禄山為温訟寃且言國忠䜛疾上兩無所問户部奏郡縣户口之數先是開元十四年户七百六萬九千五百六十五口四千一百四十一萬九千七百一十二二十八年户八百四十一萬二千八百七十一口四千八百一十四萬三千六百九時西京東都米斛直錢不滿二百絹匹亦如之海内富安行者萬里不持寸兵至是户部奏天下郡三百二十一縣千五百三十八户九百六十一萬九千二百五十四口五千二百八十八萬四百八十八唐之盛止此乙未十四載春二月安禄山請以蕃将代漢将從之禄山使副将何千年入奏請以蕃将三十二人代漢将韋見素謂楊國忠曰禄山久有異志今又有此請其反明矣明日入見上迎謂曰卿等疑禄山邪見素因極言禄山反已有迹所請不可許上不悦竟從禄山之請他日國忠見素言于上曰臣有策可坐消禄山之謀若除禄山平章事召詣闕以賈循吕知誨楊光翽分領范陽平盧河東節度則勢自分矣上從之已草制而不發更遣中使輔璆琳以珍果賜禄山潜察其變璆琳受禄山厚賂還盛言禄山無二心上謂國忠等曰朕推心待之必無異志朕自保之卿等勿憂也事遂寝别賈循華原人輔姓晋大夫智果族為輔氏秋七月安禄山表請獻馬遣中使諭止之禄山表獻馬三千匹每匹執鞚夫二人遣蕃将二十二人部送河南尹達奚珣疑有變奏請諭禄山以進馬宜俟至冬官自給夫無煩本軍于是上稍寤始有疑禄山之意會輔璆琳受賂事泄上托以他事撲殺之遣中使馮神威齎手詔諭禄山如珣策禄山踞牀不拜曰馬不獻亦可十月當詣京師尋遣還亦無表冬十一月安禄山反遣封常清如東京募兵以禦之禄山専制三道隂蓄異志殆将十年以上待之厚欲俟上晏駕然後作亂㑹楊國忠屢言禄山且反數以事激之欲其速反以取信于上禄山由是決意遽反獨與嚴荘髙尚阿史那承慶宻謀㑹有奏事官自京師還禄山詐為敕書示諸将曰有宻㫖令禄山将兵入朝討楊國忠衆愕然相顧莫敢異言于是發所部兵及奚契丹凡十五萬反于范陽大閲􅊎衆引兵而南歩騎精鋭烟塵千里時承平久百姓不識兵革河北州縣望風瓦解北京以聞上未之信及聞禄山定反乃召宰相謀之楊國忠揚揚有得色曰今反者獨禄山耳将士皆不欲也不過旬日必傳首詣行在時上幸華清宫上以為然安西節度使封常清入朝上問以討賊方畧常清大言請詣東京開府庫募驍勇桃馬箠渡河計日取逆賊之首獻闕下上悦以為范陽平盧節度使乗驛詣東京募兵旬日得六萬人乃斷河陽橋為守禦之備禄山子慶宗尚宗女在京師及是上自華清宫還誅之以郭子儀字子儀華州鄭人為朔方節度使子儀先以天徳軍在今呉喇忒旗西北使兼九原太守至是授朔方節度使率軍東討以張介然猗氏人為河南節度使領陳留本汴州天寶初改郡今河南開封府是等十三郡諸郡當賊衝者皆置防禦使介然至陳留纔數日禄山已自靈昌渡河介然授兵乗城衆恟懼不能守太守郭納以城降介然遂被殺禄山聞其子安慶宗死慟哭曰我何罪而殺我子于是陳留将士降者皆殺之以快其忿衛靈昌本滑州天寶初改郡今輝府滑縣是十二月以高仙芝為副元帥統諸軍屯陜以榮王琬帝之子為元帥髙仙芝副之統諸軍東征出内府錢帛于京師募兵十一萬號曰天武軍旬日而集皆市井子弟也仙芝以五萬人發京師遣宦者邊令誠監其軍屯于陜唐宦者監軍自此始封常清與賊戰于武牢敗績安禄山遂陷東京留守李憕并州文水人御史中丞盧奕懐慎之子死之禄山以田承嗣安忠志禄山假子張孝忠本夷種名阿勞後歸朝賜名為前鋒常清所募兵皆白徒屯武牢以拒賊賊以鐵騎蹂之再戰皆敗禄山陷東京常清再戰城中又敗乃西走河南尹達奚珣降于禄山留守李憕謂御史中丞盧奕曰吾曹荷國重任雖知力不敵必死之奕許諾憕收殘兵數百欲戰皆潰憕坐府中奕先遣妻子懐印間道走長安朝服坐臺中禄山使人執之及採訪判官􅃽清欽緒之子皆殺之奕罵禄山數其罪顧賊黨曰凡為人當知順逆我死不失節夫復何恨高仙芝退保潼關河南多陷封常清帥餘衆至陜謂高仙芝曰常清連日血戰賊鋒不可當且潼關無兵若賊豕突入關則長安危矣陕不可守不如引兵先據潼關以拒之仙芝乃趨潼關修完守備禄山使其将崔乾祐屯陜于是河南諸郡皆降于禄山是時朝廷徵兵未至關中恟懼㑹禄山方謀稱帝留東京不進故朝廷得為之備兵亦稍集東平今泰安府東平州天寶初置郡太守呉王祗信安王禕之弟起兵討賊禄山以張通晤為睢陽即宋州注見前太守東畧地郡縣官多望風降走惟東平太守嗣吳王祗濟南太守李随起兵拒之郡縣之不從賊者皆倚吳王為名單父漢縣今曹州府單縣是尉賈賁帥吏民撃斬通晤有衆二千詔以祗為靈昌太守河南都知兵馬使以永王璘為山南節度使頴王璬二王皆帝子為劍南節度使二王皆不出閤以江陵蜀郡長史源洧乾曜族孫崔圓字有裕貝州武城人副之制太子監國上議親征制太子監國上謂宰相曰朕在位垂五十載去秋已欲傳位太子值水旱相仍不欲以餘災遺子孫不意逆臣横發朕當親征且使之監國事平之日朕将髙枕無為矣楊國忠大懼退謂三夫人曰太子素惡吾家若一旦得天下吾與姊妹併命在旦暮矣使説貴妃銜土請命于上事遂寝平原太守顔真卿字清臣師古五世從孫起兵討賊初真卿知禄山且反因霖雨完城浚濠料丁壮實倉廩禄山以其書生易之及反牒真卿将兵防江津真卿遣平原司兵李平間道奏之上始聞河北郡縣皆從賊嘆曰二十四郡曽無一人義士耶及平至大喜曰朕不識顔真卿作何状乃能如是真卿使親客宻懐購賊牒詣諸郡由是諸郡多應者召募勇士旬日至萬餘人涕泣諭以舉兵討賊士皆感憤禄山使其黨段子光齎李憕盧奕􅃽清首徇河北諸郡至平原真卿執之腰斬以徇取三人首續以蒲身棺斂𦵏之祭哭受弔禄山以劉道元攝景城太守清池尉賈載鹽山尉穆寕共斬之得其甲仗五十餘船攜其首謁長史李暐暐收嚴荘宗族悉誅之送道元首至平原真卿召寕及清河尉張澹詣平原計事饒陽太守盧全誠據城不受代河間司法李奐殺禄山所署長史王懐忠李随殺禄山所署博平太守馬冀各以衆數千或萬人共推真卿為主軍事皆禀焉景城本滄州天寶初改郡今仍為州屬天津府清池隋縣明省故城在滄州鹽山隋縣今屬天津府餘注俱見前殺高仙芝封常清以哥舒翰為副元帥邊令誠數以事干仙芝仙芝不從令誠入奏事遂言常清以賊摇衆而仙芝棄陜地數百里又盜減糧賜上大怒遣令誠齎敕即軍中斬仙芝及常清初常清既敗三遣使表陳賊形勢上皆不之見常清乃自馳詣闕至渭南敕削其官爵令還軍自效常清草遺表曰臣死之後望陛下不輕此賊無忘臣言時朝議皆以禄山狂悖不日授首故常清云然令誠至潼關先引常清宣敕示之常清以表附令誠上之常清既死令誠乃謂仙芝曰大夫亦有恩命仙芝遽下令誠宣敕仙芝曰我遇敵而退死則宜矣謂我盗減糧賜則之誣也時士卒在前大呼稱枉其聲震地遂斬先是哥舒翰入朝以疾留京師及是上以翰有威名且素與禄山不協召見拜兵馬副元帥将兵六萬以討禄山翰以疾固辭上不許以田良邱為行軍司馬蕃将火抜歸仁等将部落以從併仙芝舊卒號二十萬軍于潼關翰疾不能治事悉以軍政委良邱良邱復不敢専決使王思禮主騎李承光主步無所統一翰用法嚴而不恤士卒皆懈弛無鬬志王思禮髙麗人安禄山遣兵寇振武唐軍名單于都督府治此地在今歸化城南郭子儀使兵馬使李光弼僕固懐恩鐵勒部人撃破之子儀乘勝遂收雲中拔馬邑開東陘關在今代州南胡三省曰時河東太原閉關以拒賊子儀既破賊衆關始開常山即恒州注見前太守顔杲卿字昕真卿同五世兄起兵討賊河北諸郡皆應之先是禄山至藁城漢縣今屬正定府常山太守顔杲卿力不能拒與長史袁履謙往迎之禄山輒賜杲卿金紫質其子弟使仍守常山杲卿歸途中指其衣謂履謙曰何為著此履謙悟其意乃隂與杲卿謀討禄山至是将起兵㑹族弟真卿自平原遣甥盧逖潛告杲卿欲連兵斷禄山歸路以緩其西入之謀時禄山将李欽湊守井陘口杲卿誘至斬之悉㪚井陘之衆有頃賊将高邈何千年適至又皆擒之賊将張獻誠方圍饒陽千年因謂杲卿曰此郡應募烏合難以臨敵宜深溝髙壘勿與爭鋒俟朔方軍至併力齊進傳檄趙魏斷燕薊要膂彼則成擒矣今且宜聲云李光弼兵出井陘因使人説張獻誠解饒陽圍此亦一竒也杲卿悦用其策獻誠果遁去兵皆潰杲卿乃命藁城尉崔安石等徇諸郡云大軍朝夕當至先下者賞後至者誅于是河北諸郡響應凡十七郡皆歸朝廷兵合二十餘萬其附禄山者惟范陽即幽州注見前盧龍唐志無盧龍郡胡三省曰當作北平宻雲本檀州天寶初改郡今順天府宻雲縣是漁陽今薊州天寶初置郡汲鄴注俱見前六郡而已杲卿又宻使人入漁陽招賈循郟城人馬燧説循曰禄山負恩悖逆終歸夷滅公若以范陽歸國傾其根柢此不世之功也循然之猶豫不時發别将牛潤容知之以告禄山禄山召循殺之馬燧亡入西山隐者徐遇匿之得免禄山欲攻潼關至新安聞河北有變而還馬燧字洵美丙申十五載肅宗皇帝至徳元載春正月安禄山僭號劉友益曰書僭號自禄山始天子在上也禄山自稱大燕皇帝改元聖武以達奚珣為侍中張通儒為中書令髙尚嚴荘為中書侍郎以許逺為睢陽太守賊将史思明陷常山顔杲卿死之杲卿起兵纔八日守備未完史思明蔡希徳引兵皆至城下杲卿告急于太原尹王承業承業擁兵不救杲卿晝夜拒戰糧盡矢竭城遂陷賊執杲卿及袁履謙等送洛陽禄山數之曰我奏汝為判官不數年超至太守何負于汝而反杲卿罵曰汝本營州牧羊羯奴天子擢汝為三道節度使恩幸無比何負于汝而反我世為唐臣禄位皆唐有雖為汝所奏豈從汝反邪我為國討賊恨不斬汝何謂反也臊羯狗何不速殺我禄山大怒并履謙咼古瓦反磔也之二人比死罵不絶口顔氏死者三十餘人思明既克常山引兵擊諸郡之不從者于是諸郡復為賊守以李光弼為河東節度使上命郭子儀罷圍雲中還朔方益發兵進取東京選良将分兵先出井陘以定河北子儀薦光弼以為河東節度使分朔方兵萬人與之二月李光弼入常山執賊将安思義遂與史思明戰大敗之李光弼将蕃漢歩騎萬餘人太原弩手三千人出井陘至常山常山團練兵執安思義出降光弼得思義不殺引問計答曰大夫逺來疲弊遇敵恐未易當不如按軍入守料勝而出冦兵雖鋭不能持重氣沮心離乃可圖也光弼曰善釋其縛即移軍入城思明方圍饒陽太守盧全誠拒守不下聞常山不守立即解圍合二萬餘騎直抵城下光弼以五百弩于城上齊發射之賊稍却乃出弩手千人分為四隊使其矢發發相繼賊不能當乃退有村民告賊歩兵五千自饒陽來至九門漢縣宋省故城在今藁城縣南逢壁九門之地名光弼遣歩騎各二千匿旗鼓並水潛行遇賊方飯縱兵掩撃殺之無遺思明聞之失勢退入九門時常山九縣七附官軍惟九門藁城為賊所據光弼與思明相守四十餘日思明絶常山糧道光弼遣使告急于郭子儀子儀引兵自井陘出至常山與光弼軍合蕃漠歩騎共十餘萬與思明戰于九門城南思明大敗中郎将渾瑊射其将李立節殺之思明收餘衆奔趙郡復如博陵河朔之民苦賊殘暴所在屯結各為營以拒賊及郭李軍至爭出自効遂攻趙郡降之渾瑊鐵勒渾部渠長釋之之子真源唐縣今歸徳府鹿邑縣是令張廵起兵雍邱注見前討賊先是譙郡注見前太守楊萬石以郡降安禄山逼真源令張廵為長史使西迎賊廵至真源帥吏民哭于元元皇帝廟起兵討賊樂從者數千人廵選精兵千人西至雍邱與賈賁合初雍邱令令狐潮以縣降賊引精兵攻雍邱賁出戰敗死廵力戰却賊因兼領賁衆潮復與賊将李懐仙栁城部人等四萬餘衆奄至城下衆懼廵曰賊兵精鋭有輕我心今出于不意撃之彼必驚潰賊勢少折然後城可守也乃使千人乗城自帥千人分數隊開門突出廵身先士卒直衝賊陣人馬辟易賊遂退明日復進蟻附攻城廵束蒿灌脂焚而投之賊不得上積六十餘日大小三百餘戰帶甲而食裹瘡復戰賊遂敗退廵乗勢追之獲賊兵二千人而還軍聲大振加顔真卿河北採訪使真卿撃魏郡拔之先是清河客李蕚一作㟧字伯髙趙人年二十餘為郡人乞師于真卿蕚曰公首唱大義河北諸郡恃公以為長城今清河公之西鄰國家平日聚江淮河内錢帛于彼以贍北軍今有布三百餘萬匹帛八十餘萬匹錢三百餘萬緡糧三十餘萬斛昔討黙啜甲兵盡貯其庫今有五十餘萬事户七萬口十餘萬竊計財足以三平原之富兵足以倍平原之彊公誠資以士卒撫而有之以二郡為腹心則餘郡如四支無不随所使矣真卿曰吾兵新集未練何暇及鄰然子之請兵欲何為乎蕚曰清河非力不足而借公之師也亦以觀大賢之名義耳今仰瞻髙意未有決辭定色僕何敢遽言所為乎真卿欲與之兵衆以蕚年少輕慮必無所成真卿不得已辭之蕚就館復為書説真卿書曰清河去逆效順奉粟帛器械以資軍公乃不納而疑之僕回轅之後清河不能孤立必有所繫託将為公西面之彊敵公能無悔乎真卿得書大驚遽詣其館以兵六千借之送至境執手别因問之曰兵已行矣可以言子之所為乎蕚曰聞朝廷遣程千里京兆萬年人将精兵十萬出崞音郭口舊唐書崞口在相州西山胡三省曰葢即壺關之險也賊據險拒之不得前今當引兵先擊魏郡執其守将分兵開崞口以出千里之師因討汲鄴以北至于幽陵即幽州然後帥諸同盟合兵十萬南臨孟津分兵循河據守要害制其北走之路討官軍東討者不下二十萬河南義兵西向者亦不減十萬公但當表朝廷堅壁勿戰不過月餘賊必有内潰相圖之變矣真卿曰善令參軍李擇交等将其兵㑹清河博平兵五千人軍於堂邑隋縣今屬東昌府禄山所署魏郡太守袁知泰逆戰大敗遂克魏郡軍聲大振以賀蘭進明為河北招討使時北海太守賀蘭進明亦起兵真卿以書召之并力進明将歩騎五千渡河真卿陳兵逆之相揖哭于馬上哀動行伍進明屯平原城南真卿每事咨之由是軍權稍移于進明真卿不以為嫌復以堂邑之功讓之進明奏其状取捨任意敕加進明河北招討使擇交等微進資級清河博平有功者皆不録進明攻信都郡久之不克參軍第五琦勸進明厚以金帛募勇士乃克之第五琦字禹珪長安人夏四月以來瑱邠州永夀人為潁川太守楊國忠問将于左拾遺張鎬字從周博州人及蕭昕字中明梁鄱陽王恢七世孫鎬昕薦瑱以為潁川太守前後破賊甚衆人謂之來嚼鐵以劉正臣武陟人為平盧節度使平盧軍将劉客奴董秦薊人後賜姓名曰李忠臣王元志同謀殺吕知誨禄山首發以知誨守平盧遣使踰海與顔真卿相聞請取范陽以自效真卿遣判官以衣糧助之真卿時惟一子頗才十餘嵗使詣客奴為質朝廷聞之以客奴鎮平盧賜名正臣秦及元志拜官有差已而正臣将襲范陽未至為史思明所敗比還王元志酖殺之以虢王巨高祖子鳯之曽孫為河南節度使賊圍南陽太守卿張垍薦虢王巨有勇畧上徴吳王祗還以巨代之引兵出藍田賊解圍走五月郭子儀李光弼與史思明戰于嘉山亦曰嘉禾山在今定州曲陽縣東大破之復河北十餘郡子儀光弼既抜趙郡光弼進圍博陵不克與子儀俱還常山史思明收㪚卒數萬踵其後子儀選驍騎更挑戰三日賊疲乃退子儀乗之又敗之于沙河在今定州南卽古泒水源出山西逕正定定州至祁州與唐河合唐河古滱水也禄山復使蔡希徳将歩騎二萬人北就思明又使牛廷玠發范陽等郡兵助之合五萬餘人子儀至恒陽今曲陽縣隋曰恒陽唐元和中更今名深溝高壘以待之賊來則守去則追之晝則耀兵夜斫其營賊不得休息數日光弼子儀議曰賊倦矣可以出戰戰于嘉山大破之斬首四萬級捕獲千餘人思明奔博陵光弼就圍之軍聲大振于是河北十餘郡皆殺賊守将而降漁陽路再絶前者顔果卿起兵漁陽路絶杲卿敗而復通今郭李破史思明故再絶賊往來者多為官軍所獲賊衆家在漁陽者無不摇心禄山大懼召髙尚嚴荘詬之曰汝教我反以為萬全今守潼關數月不能進北路已絶諸軍四合萬全何在尚荘懼數日不敢見田乾真説禄山曰自古帝王經營大業皆有勝敗豈能一舉而成尚荘皆佐命元勲一旦絶之諸将誰不内懼禄山即置酒酣宴待之如初遂議棄洛陽走歸范陽計未决六月哥舒翰與賊戰于靈寶大敗賊遂入關是時天下以楊國忠召亂莫不切齒王思禮説哥舒翰使抗表請誅國忠翰曰如此乃翰反非禄山也或説國忠朝廷重兵盡在翰手翰若援旗西指于公豈不危哉國忠大懼募萬人屯灞上令所親杜乾運将之名為禦寇實備翰也翰聞之亦恐為國忠所圖乃表請灞上軍𨽻潼關召乾運斬之國忠益懼㑹有告賊将崔乾祐在陜兵不滿四千皆羸弱無備上遣使趣翰進兵復陜洛翰奏曰禄山久習用兵豈肯無備是必羸師以誘我若往必堕其計中且賊逺來利在速戰官軍據險利在堅守况賊勢日蹙将有内變因而乗之可不戰擒也要在成功何必務速今諸道徴兵尚多未集請且待之郭子儀李光弼亦請引兵北取范陽覆其巢穴賊必内潰潼關大軍惟應固守以弊之不可輕出國忠疑翰謀已言于上以翰逗留恐失機㑹上以為然遣中使趣之項背相望翰不得已撫膺慟哭引兵出關遇崔乾祐之軍于靈寶西原乾祐先據險南薄山北阻河隘道七十里翰使王思禮等将精兵五萬居前龎忠等将餘兵十萬繼之翰以兵三萬登河北阜望之鳴鼓以助其勢乾祐所出兵不過萬人什什伍伍㪚如列星或疏或宻或前或却官軍望而笑之兵既交賊偃旗如欲遁者官軍懈不為備賊乗髙下木石撃殺士卒甚衆道隘士卒如束槍槊不得用翰以氊車駕馬為前驅欲以衝賊日過中東風暴急乾祐以草車數十乗塞氊車之前縱火焚之烟熖所被官軍不能開目妄自相殺乾祐遣精騎自後擊之官軍大敗後軍自潰河北軍望之亦潰翰獨與麾下百餘騎走入關乾祐遂進攻潼關克之蕃将火拔歸仁等執翰降賊送洛陽禄山謂翰曰汝常輕我今定何如翰伏地對曰臣肉眼不識聖人禄山以翰為司空謂歸仁不忠斬之帝出奔蜀哥舒翰麾下來告急上不時召見及暮平安火唐制烽候相去三十里每日初夜放烟一炬謂之平安火不至上始懼召宰相謀之楊國忠首唱幸蜀之策上然之乃御樓下制云欲親征聞者皆莫之信既夕命龍武大将軍陳元禮整比六軍厚賜錢帛選閑廐馬九百餘匹黎明上獨與貴妃姊妹皇子妃主皇孫及親近宦官宫人出延秋門妃主皇孫之在外者皆委之而去上過左藏國忠請焚之上曰賊來無所得必更斂于百姓不如與之無重困赤子是日百官猶入朝門既啟則宫人亂出中外大擾不知上所之四出逃匿上既過便橋楊國忠即使人焚橋上曰人各避賊求生奈何絶其路留髙力士撲滅之至咸陽日向中上猶未食民獻糲飯雜以麥豆皇孫輩爭以手掬食之須臾而盡有老父郭從謹進言曰禄山包藏禍心固非一日有告其謀者陛下往往誅之使得逞其姦逆致陛下播越是以先王務延訪忠良以廣聰明葢為此也臣猶記宋璟為相數進直言天下頼以安自頃以來在廷之臣以言為諱闕門之外陛下皆不得知草野之臣必知有今日久矣但九重嚴邃區區之心無路上達事不至此臣何由得覩陛下之面而訴之乎上曰朕之不明悔無所及慰諭而遣之次于馬嵬在今西安府興平縣西楊國忠為禁軍所殺貴妃楊氏賜死上至馬嵬驛将士饑疲皆憤怒陳元禮以禍由楊國忠欲誅之因李輔國東宫宦者以告太子未決㑹吐蕃使者二十餘人遮國忠馬訴以無食軍士呼曰國忠與逆賊謀反國忠走追殺之屠割支體以槍揭其首于驛門外并殺韓國秦國夫人上聞諠譁出門慰勞令收隊軍士不應上使髙力士問之元禮對曰國忠謀反貴妃不宜供奉願陛下割恩正法上曰朕當自處之入門倚杖傾首而立久之京兆司禄韋諤見素之子前言曰今衆怒難犯安危在晷刻願陛下速决因叩頭流血上曰貴妃常居深宫安知國忠反謀髙力士曰貴妃誠無罪然将士已殺國忠而貴妃在陛下左右豈敢自安願陛下深思之将士安則陛下安矣上乃命高力士引貴妃于佛堂縊殺之輿尸置驛庭召元禮等入觀之元禮乃免胄釋甲頓首謝罪軍士皆呼萬嵗于是始整部伍為行計國忠妻子及虢國夫人走陳倉縣令薛景仙誅之改陳倉漢縣唐至徳中寶雞今屬鳯翔府發馬嵬留太子東討賊上将發馬嵬朝臣惟韋見素一人乃以韋諤為御史中丞充置頓使父老遮道請留上命太子宣慰之父老曰至尊既不肯留某等願帥子弟從殿下東破賊取長安若殿下與至尊皆入蜀中原百姓誰為之主須臾聚至數千人太子不可涕泣跋馬欲西建寧王倓太子之子與李輔國執鞚諌曰逆賊犯闕四海分崩不因人情何以興復殿下不如收西北邊之兵召郭李于河北與之併力東討逆賊克復二京削平四海使社稷危而復安宗廟毁而更存掃除宫禁以迎至尊豈非孝之大者何必區區溫清為兒女之戀乎廣平王俶亦太子子即代宗亦勸太子留父老共擁太子馬不得行太子乃使俶馳白上上曰天也命分後軍二千人及飛龍廐馬從太子諭之曰太子仁孝可奉宗廟汝曹善輔佐之又使諭太子曰汝勉之勿以吾為念西北諸部吾撫之素厚汝必得其用且宣㫖欲傳位太子太子不受帝至扶風上至扶風士卒流言不遜陳元禮不能制㑹成都貢春綵十餘萬匹至上命陳之于庭召将士諭之曰朕衰耄託任失人致逆賊亂常須逺避其鋒卿等倉猝從朕不得别父母妻子跋渉至此勞若至矣朕甚愧之蜀路阻長郡縣褊小人馬衆多或不能供今聴卿等各還家朕獨與子孫中官前行入蜀亦足自達今日與卿等訣别可共分此綵以備資糧若歸見父母及長安父老為朕致意各好自愛也因泣下沾襟衆皆哭曰臣等死生從陛下不敢有貳上良久曰去留聴卿自是流言始息太子至平凉太子既留未知所適建寧王倓曰殿下昔嘗為朔方節度大使将吏嵗時致啟倓畧識其姓名今河西隴右之衆皆敗降賊父兄子弟多在賊中或生異圖朔方道近士馬全盛裴冕字章甫河東人衣冠名族必無二心速往就之此上策也衆皆曰善通夜馳三百餘里至彭原本寧州天寳初改郡今仍為州屬慶陽府太守李遵出迎獻衣及糗糧遂至平凉閲監牧馬得數萬匹又募士得五百餘人軍勢稍振帝至河池本鳯州天寳初改郡今漢中府鳯縣是以崔圓同平章事劍南節度使崔圓奉表迎車駕具陳蜀土豐稔甲兵全盛上大悦即以為相陳倉令薛景仙殺賊将克扶風而守之是月改扶風為鳯翔府已而賊兵來宼景仙復擊却之時禄山遣其将以勅書繒綵誘河隴将士大震關使郭英乂斬之乂大震關即隴關在今鳯翔府隴州西郭英字元武知運之子賊将孫孝哲陷長安禄山不意上遽西幸止崔乾祐兵留潼關凡十日遣孫孝哲将兵入長安殺妃主皇孫數十人刳其心以祭安慶宗搜捕百官宦者宫女每數百人輙以兵送洛陽王侯将相扈從車駕家留長安者誅及嬰孩陳希烈以晩節失恩怨上與張均張垍等皆降于賊禄山以希烈垍為相自餘朝士皆授以官于是賊勢大熾西脅汧隴南侵江漢北割河東之半既陷長安賊将日夜縱酒専以聲色寳賂為事無復西出之意故上得安行入蜀太子北行亦無追廹之患帝至普安今四川保寧府劍州天寶初改為普安郡以房琯同平章事上之發長安也羣臣多不知至咸陽謂高力士曰朝臣誰當來誰不來對曰張垍張均受恩最深且連戚里是必先來時論皆謂房琯宜為相陛下不用又禄山嘗薦之恐或不來上曰事未可知及琯至上問均兄弟對曰臣帥與偕來逗遛不進觀其意似有所蓄而不能言也上顧力士曰朕固知之矣即日以琯為相初陳希烈罷相上許以垍代之垍拜謝既而不用故垍懷怏怏秋七月太子即位于靈武是為肅宗尊帝為上皇天帝以裴冕同平章事先是太子至平凉朔方留後杜鴻漸字之㢲暹族子水陸運使魏少遊邢州鉅鹿人判官崔漪盧簡李涵宗室永安王孝基曽孫相與謀曰平凉㪚地非屯兵之所靈武兵食完富若迎太子至此北收諸城兵西發河隴勁騎南向以定中原此萬世一時也乃使涵奉箋于太子且籍北方士馬甲兵穀帛軍資之數以獻之㑹河西司馬裴冕至平凉亦勸太子之朔方鴻漸自迎太子于平凉北境使少遊居後葺次舎庀資儲少遊盛治宫室幃帳皆倣禁中太子至悉命撤之至是冕鴻漸等上太子牋請遵馬嵬之命不許牋五上太子乃許之是日即位于靈武尊帝為上皇天帝大赦改元以杜鴻漸崔漪並知中書舎人事裴冕為中書侍郎同平章事時文武官不滿三十人披草萊立朝廷制度草創武人驕慢大将管崇嗣在朝堂背闕而坐言笑自若監察御史李勉奏彈之繫于有司上持原之嘆曰吾有李勉朝廷始尊張良娣性巧慧能得上意從上來朔方良娣每寝常居上前上曰禦宼非婦人所能良娣曰倉猝之際妾以身當之殿下可從後逸去至靈武産子三日起縫戰士衣上止之對曰此非妾自養之時上以是益憐之李勉字元卿髙祖子鄭王元懿曽孫張良娣鄧州人家新豐元宗母竇太后女弟之孫制以太子充天下兵馬元帥諸王分總天下節制制以太子為兵馬元帥永王璘盛王琦豐王珙分領諸道節度都使琦珙皆不出閤惟璘赴江陵先是四方聞潼關失守莫知上所之及是制下始知乗輿所在李泌字長源魏柱國弼六世孫至靈武初京兆李泌幼以才敏著聞元宗欲官之不可使與太子為布衣交楊國忠惡之奏徙蘄春隋縣明省故城在今黄州府蘄州後隐居潁陽後魏縣金省故城在今河南府登封縣上自馬嵬遣使召之謁見于靈武上大喜出則聯轡寝則對榻如為太子時事無大小皆咨之言無不從上欲以泌為右相泌固辭曰陛下待以賓友則貴于宰相矣何必屈其志上乃止河西安西皆遣兵詣行在上命河西節度副使李嗣業将兵五千赴行在嗣業與節度使梁宰謀且緩師以觀變綏徳府折衝段秀實讓嗣業曰豈有君父告急而臣子晏然不赴者乎特進常自謂大丈夫今日視之乃兒女子耳嗣業大慚即白宰發兵以秀實自副詣行在上又徴兵于安西行軍司馬李栖筠字貞一趙州人發兵七千勵以忠義而遣之帝至成都從官六軍至者千三百人而已令狐潮圍雍邱張廵擊走之令狐潮攻雍邱潮與張廵有舊于城下相勞苦如平生潮因説廵曰天下事去矣足下堅守危城欲誰為乎廵曰足下平生以忠義自許今日之舉忠義何在潮慚而退圍守四十餘日朝廷聲聞不通潮聞帝已幸蜀復以書招廵大将六人白廵以兵勢不敵且上存亡不可知不如降賊廵陽許諾明日堂上設天子畫像帥将士朝之人人皆泣引六将于前責以大義斬之士心益勸城中矢盡廵縛藁為人千餘被以黒衣夜縋城下潮兵争射之得矢數十萬其後復夜縋人賊笑不設備乃以死士五百斫潮營潮軍大亂焚壘而遁追奔十餘里潮益兵圍之廵使郎将雷萬春史不詳所系于城上與潮相聞語未絶賊弩射之面中六矢而不動潮疑其木人使諜問之乃大驚遥謂廵曰向見雷将軍方知足下軍令矣然其如天道何廵謂之曰君未識人倫焉知天道未幾出戰擒将十四人斬首百餘級賊乃夜遁以顔真卿為工部尚書初真卿聞李光弼下井陘即斂軍還平原已而光弼郭子儀引兵西入子儀光弼聞潼關不守引兵入井陘留太守王俌守常山未幾俌欲降賊諸将殺之常山無主遂與趙郡俱陷真卿始復區處河北軍事以蠟丸達表于靈武以真卿為工部尚書兼御史大夫領使如故并致赦書亦以蠟丸達之真卿頒下諸郡又遣人頒于河南江淮由是諸道始知上即位于靈武徇國之心益堅矣八月以郭子儀為靈武長史李光弼為北都留守並同平章事子儀等将兵五萬自河北至靈武靈武軍威始盛人有興復之望矣其後上謂李泌曰今子儀光弼已為宰相若克兩京平四海則無有以賞之奈何對曰古者有功則錫以茅土傳之子孫太宗欲復古制人臣議論不同而止由是賞功以官夫賞功以官有二害非才則廢事權重則難制曏使禄山有百里之國亦惜之以遺子孫而不反矣為今計莫若疏爵土以賞功臣則雖大國不過二三百里可比今之小郡豈難制哉上曰善以第五琦為江淮租庸使賀蘭進明遣參軍第五琦入蜀奏事琦言今方用兵財賦為急財賦所産江淮居多乞假臣一職可使軍無乏用帝悦以為租庸使已而琦至彭原見上請以江淮租庸市輕貨泝江漢而上至洋川令漢中王瑀陸運至扶風上從之加琦山南等五道度支使琦作𣙜鹽法用以饒洋川本洋州天寶初改郡今漢中府洋縣是漢中王瑀汝陽王璡之弟帝稱上皇遣使奉册寶如靈武靈武使者至蜀帝喜曰吾兒應天順人吾復何憂制自今改制敕為誥表疏稱太上皇軍國事皆先取皇帝進止仍奏朕知俟克復上京朕不復預事命韋見素房琯崔渙元暉子上皇至蜀拜同平章事奉傳國寶及玉册詣靈武傳位九月見素等至奉上寶册上不肯受曰比以中原未靖權總百官豈敢乗危遽為傳襲羣臣固請上不許寘于别殿朝夕事之如定省之禮上素聞房琯名虚心待之琯見上言時事辭情慷慨上為改容由是軍國多謀于琯琯亦以天下為己任知無不為諸将拱手避之安禄山取長安樂工犀象詣洛陽初上皇每酺宴先設太常雅樂坐部六堂上坐奏立部八堂下立奏繼以鼓吹鐃歌鼓吹曲雜樂龜兹疏勒諸部樂㪚樂雜戲兩畿赤縣所進又出宫人舞霓裳羽衣河西節度使楊敬􅄒所獻凡十二曲又教舞馬百匹銜杯上夀又引犀象入塲或拜或舞禄山見而悦之至是命捜捕至洛陽宴其羣臣于凝碧池在洛陽禁苑中盛奏衆樂梨園弟子往往欷歔泣下賊皆露刃睨之樂工雷海青不勝悲憤擲樂器于池西向慟哭禄山怒支解之禄山聞曏日百姓乗亂多盗庫物既得長安命大索三日并其私財盡掠之民間騷然益思唐室自上馬嵬北行民間相傳太子北收兵來取長安日夜望之或時相驚曰太子大軍至矣則皆走市里為空賊望見北方塵起輙驚欲走京畿豪傑往往殺賊官吏遥應官軍誅而復起相繼不絶賊不能制至是西門之外率為敵壘賊兵力所及者南不出武關北不過雲陽西不過武功江淮奏請貢獻之蜀之靈武者皆自襄陽取上津路抵扶風道路無雍皆薛景仙之功也上津隋縣元省故城在今鄖陽府鄖西縣九月以廣平王俶為天下兵馬元帥李泌為侍謀軍國元帥長史上欲以建寧王倓為元帥李泌以為不可倓英果有才畧軍中皆屬目上欲以為元帥泌曰建寧誠元帥才然廣平兄也若建寧功成豈可使廣平為吳泰伯乎上曰廣平冢嗣也何必以元帥為重泌曰廣平未正位東宫今天下艱難衆心所屬在于元帥若建寧大功既成陛下雖欲不以為儲副同立功者豈可已乎太宗上皇即其事也乃以廣平王俶為元帥諸将皆屬倓聞之謝泌曰此固倓之心也上與泌出行軍軍士指之竊言曰衣黄者聖人也衣白者山人也上聞之以告泌曰艱難之際不敢相屈以官且衣紫袍以絶羣疑泌不得已受之上笑曰既服此豈可無名稱出懐中敕以泌為侍謀軍國元帥府行軍長史泌固辭上曰朕非敢相臣以濟艱難耳俟賊平任行髙志泌乃受泌又言于上曰諸将畏憚天威在陛下前數陳軍事或不能盡所懐萬一小差為害甚大乞先令與臣及廣平熟議從容奏聞上許之時軍旅務繁四方奏報自昏至曉無虚刻上悉使送府泌先開視有急切者及烽火重封隔門通進餘則待明禁門鑰契悉委俶與泌掌之有通進禁門側置輪盤遇夜門開外急切文書納諸輪盤旋轉而進遣使徴兵囘紇上雖用朔方之衆欲借兵于外夷以張軍勢以豳王守禮之子承寀為燉煌王與僕固懐恩使回紇以請兵又請發拔汗那兵且使轉諭城郭諸國許以厚賞使從安西兵入援帝如彭原李泌勸上且幸彭原俟西北兵将至進幸扶風以應之于是庸調亦集可以贍軍上從之彭原廨舎狹隘上與張良娣博打子聲聞于外李泌言諸軍奏報停壅上乃潜令刻乾樹雞為子不欲有聲先是册寶至靈武上皇賜良娣七寶鞍泌曰今四海分崩當以儉約示人良娣不宜乗此請撤其珠玉付庫吏以賞戰功上遽從之建寧王倓泣于廊下上驚問之對曰臣比憂祸亂未已今陛下從諌如流不日當見陛下迎上皇還長安是以喜極而悲耳既而上又謂泌曰良娣祖母昭成太后之妹也上皇所念朕欲使正位中宫何如對曰陛下在靈武以羣臣望尺寸之功故踐天位非私己也至于家事宜待上皇之命不過晚嵗月之間耳良娣由是惡泌及倓倓謂泌曰先生舉倓于上得展臣子之效無以報徳請為先生除害泌曰何也倓以良娣為言泌曰此非人子所言願姑置之倓不從昭成元宗母竇太后諡制諌官言事勿白宰相初李林甫為相諌官言事皆先白宰相退則又以所言白之御史言事須大夫同署至是敕盡革其弊開諌諍之塗又令宰相分直政事筆承㫖謂分日當筆及承上㫖旬日而更懲林甫及楊國忠之専權故也冬十月辛巳朔日食既以房琯為招討節度使與賊戰于陳濤一作陶斜在咸陽縣東其地斜出故名敗績琯喜賓客好談論多引拔知名之士而輕鄙庸俗人多怨之北海太守賀蘭進明詣行在上命琯以為嶺南節度使兼御史大夫琯以為攝御史大夫進明入謝上怪問之進明因言與琯有隙且曰晋用王衍為三公祖尚浮虛致中原板蕩而房琯専為迂濶大言以立虚名所引用皆浮華之黨真王衍之比也陛下用為宰相恐非社稷之福且琯在南朝佐上皇使陛下與諸王分領諸道節制仍置陛下于沙塞空虚之地又多布私黨以副戎權其意以為上皇一子得天下則已不失富貴此豈忠臣所為乎上由是疏之琯請自将兵復兩京上許之琯又請自擇參佐以李楫為司馬劉秩字祚卿知幾子為參謀悉以戎務委之曰賊曳落河雖多安能當我劉秩二人皆書生不閑軍旅遇賊将安守忠于陳濤斜琯效古法用車戰以牛車二千乗馬歩夾之賊順風鼓譟牛皆震駭縱火焚之人畜大亂死傷四萬餘人上大怒李泌為之營救上乃宥之待琯如初史思明攻陷河北諸郡饒陽禆将張興束鹿人死之思明攻河間景城李奐李暐皆死又使其将康沒野波攻平原顔真卿力不敵棄郡走于是清河博平諸郡皆陷饒陽裨将張興力舉千鈞性復明辨賊攻饒陽彌年不能下及諸郡皆陷思明併力圍之外救俱絶城陷擒興謂曰将軍誠壮士能與我共富貴乎興曰興唐之忠臣固無降理今數刻之人耳願一言而死思明曰試言之興曰主上待禄山恩如父子羣臣莫及不知報徳乃興兵指闕塗炭生人大丈夫不能剪除凶逆乃北面為之臣乎且足下所以從賊求富貴耳譬如燕巢于幕豈能久安何如乗間取賊轉禍為福長享富貴不亦美乎思明怒鋸殺之罵不絶口以至于死永王璘反詔遣淮南節度使高適字達夫滄州渤海人等討之綱目作上皇遣高適等考唐書通鑑及綱目分注本文遣適等者乃肅宗非元宗也綱疑有悞劉友益乃謂病肅宗而書上皇不以肅宗主之此豈據事直書之義今改正初上皇命諸子分總節制諌議大夫高適諌以為不可上皇不聴以璘領四道節度都使鎮江陵時江淮租賦山積于江陵璘召募勇士數萬人日費巨萬子瑒有勇力好兵薛璆等為之謀主以為天下大亂惟南方完富宜據金陵保有江表如東晋故事上聞之敕璘歸蜀璘不從上乃以高適為淮南節度使來瑱為淮南西道節度使與江東節度使韋陟共圖璘璘遂引舟師沿江東下吳郡太守李希言廣陵太守李成式遣兵拒之皆為璘所破江淮大震高適與來瑱韋陟㑹于安陸即安州注見前結盟誓衆以討之回紇遣葛邏支将兵入援十二月安禄山遣兵陷潁川執太守薛愿汾隂人長史龎堅涇陽人殺之禄山遣兵攻潁川城中兵少無蓄積太守薛愿長史龎堅悉力拒守期年救兵不至至是城陷執愿堅送洛陽殺之上問李泌今敵彊如此何時事定對曰臣觀賊所獲子女金帛皆輸之范陽此豈有雄據四海之志邪以臣料之不過二年天下無宼矣上曰何故對曰賊之驍将不過史思明安守忠田乾真張忠志阿思那承慶等數大而已今若令李光弼自太原出井陘郭子儀自馮翊入河東則思明忠志不敢離范陽常山守忠乾真不敢離長安是以兩軍縶其四将也從禄山者獨承慶耳願敕子儀勿取華隂使兩京之道常通陛下軍于扶風與子儀光弼互出撃之彼救首則撃其尾救尾則撃其首使賊往来數千里疲于奔命我常以逸待勞賊至則避其鋒去則乗其弊不攻城不遏路來春復命建寧為范陽節度大使並塞北出與光弼南北犄角以取范陽覆其巢穴賊退則無所歸留則不獲安然後大軍四合而攻之必成擒矣上悦張廵移軍寧陵注見前與賊将楊朝宗戰大破之令狐潮李庭望攻雍邱數月不下築城于雍邱之北以絶其糧援賊常數萬人而張廵衆纔千餘每戰輙克河南節度使虢王巨屯彭城假廵先鋒使是月魯東平濟隂陷于賊賊将楊朝宗帥馬歩二萬将襲寧陵斷廵後廵遂拔雍邱東守寧陵以待之始與睢陽太守許逺相見是日朝宗亦至廵逺與戰晝夜數十合大破走之斬首萬餘級敕以廵為河南節度副使廵以将士有功遣使詣虢王巨請空名告身及賜物巨惟與折衝果毅告身三十通不與賜物廵移書責巨巨竟不應于闐王勝将兵入援勝聞亂使弟曜攝國事自将兵五千入援上嘉之以為殿中監御批厯代通鑑輯覽卷五十五

front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷一百十四明莊烈帝戊辰崇禎元年春正月詔中官非命不得出禁門尊熹宗皇后為懿安皇后三月𦵏徳陵
  hash: sha256:293ccfd103156b1f310204c74dfa71bc3bd17092b87b68c73ccc869ca1770b40

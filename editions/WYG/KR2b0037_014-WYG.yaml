body:
  text: 上初即位詔舉賢良方正直言極諫之士親策問之廣川董仲舒對策畧曰臣觀天人相與之際甚可畏也國家將有失道之敗而天乃出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至以此見天心之仁愛人君而欲止其亂也自非大無道之世盡欲扶持而安全之事在彊勉而已矣彊勉學問則聞見博而知益明彊勉行道則徳日起而大有功此皆可使還至而立有效者也道者所繇適于治之路也仁義禮樂皆其具也故聖王已沒而子孫長久安寧數百嵗此皆禮樂教化之功也夫周道衰于幽厲非道亡也幽厲不繇也至于宣王思昔先王之徳興滯補弊明文武之功業周道粲然復興故治亂廢興在于己非天降命不可反者也臣聞命者天之合也性者生之質也情者人之欲也或夭或夀或仁或鄙陶冶而成之不能粹美故堯舜行徳則民仁夀桀紂行暴則民鄙夭上之化下唯下之從上猶泥之在鈞唯甄者之所為猶金之在鎔冶者之所鑄綏之斯倈動之斯和此之謂也王者欲有所為宜求其端于天天道之大者在陰陽陽為德隂為刑刑主殺而徳主生故陽常居大夏而以生育長養為事隂常居大冬而積于空虚不用之處以此見天之任徳不任刑也王者承天意以從事故任徳教而不任刑刑之不可任以治世猶隂之不可任以成嵗也今廢先王徳教之官獨任執法之吏而欲徳教之被四海難矣為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫敢不壹于正而亡有邪氣奸其間者是以隂陽調而風雨時羣生和而萬物殖諸福之物可致之祥莫不畢至今陛下行髙而恩厚知明而意美愛民而好士可謂誼主矣然而天地未應而美祥莫至者凡以教化不立而萬民不正也夫萬民之從利如水之走下不以教化隄防之不能止也古之王者明于此故南面而治天下莫不以教化為大務立太學以教于國設庠序以化于邑漸民以仁摩民以誼節民以禮故其刑罸甚輕而禁不犯者教化行而習俗美也聖王之繼亂世也掃除其迹而悉去之復修教化而崇起之譬之琴瑟不調必解而更張之乃可鼔也為政而不行甚者必變而更化之乃可理也古人有言曰臨淵羡魚不如退而結網今臨政而願治不如退而更化更化則可善治善治則災害日去福禄日來故受天之祜而徳施于方外延及羣生也上覽其對而異焉再策之仲舒復對畧曰臣聞聖王之治天下也少則習之學長則材諸位爵禄以養其徳刑罸以威其惡故民曉于禮誼而恥犯其上今陛下并有天下海内莫不率服而功不加于百姓者殆王心未加焉曽子曰尊其所聞則髙明矣行其所知則光大矣髙明光大不在乎它在乎加之意而已願陛下因用所聞設誠于内而致行之則三王何異哉陛下夙寤晨興務以求賢亦堯舜之用心也而未云獲者士不素厲也夫不素養士而欲求賢譬猶不琢玉而求文采也故養士莫大乎太學太學者賢士之所關也教化之本原也願興太學置明師以養天下之士數考問以盡其材則英俊宜可得矣郡守縣令民之師帥所使承流而宣化也師帥不賢則主徳不宣恩澤不流是以隂陽錯繆氛氣充塞羣生寡遂黎民未濟至于此也古者任官稱職非謂積日累久也故小材雖累日不離于小官賢材雖未久不害為輔佐是以有司竭力盡知務治其業而以赴功今則不然累日以取貴積乆以致官是以亷恥貿亂賢不肖混殽未得其真也臣愚以為使諸列侯郡守各擇其吏民之賢者嵗貢各二人以給宿衛且以觀大臣之能所貢賢者有賞所貢不肖者有罸夫如是諸侯吏二千石盡心于求賢天下之士可得而官使也毋以日月為功實試賢能為上量材而投官録徳而定位則亷恥殊路賢不肖異處矣于是上三策之仲舒又復對畧曰臣聞天者羣物之祖故徧覆包函而無所殊聖人法天而立道亦溥愛而無私春者天之所以生也仁者君之所以愛也夏者天之所以長也徳者君之所以養也霜者天之所以殺也刑者君之所以罸也繇此言之天人之徵古今之道也天令之謂命命非聖人不行質樸之謂性性非教化不成人欲之謂情情非制度不節是故王者上謹于承天意以順命也下務明教民以成性也正法度之宜别上下之序以防欲也修此三者而大本舉矣人受命于天固超然異于羣生故孔子曰天地之性人為貴明于天性知自貴于物然後知仁誼知仁誼然後重禮節重禮節然後安處善安處善然後樂循禮樂循禮然後謂之君子也臣又聞之聚少成多積小致鉅故聖人莫不以晻致明以微致顯言出于已不可塞也行發于身不可掩也言行治之大者君子之所以動天地也故盡小者大慎微者著積善在身猶長日加益而人不知也積惡在身猶火之銷膏而人不見也此唐虞之所以得令名而桀紂之可為悼懼者也夫樂而不亂復而不厭者謂之道道者萬世無敝敝者道之失也三王之道所祖不同非其相反将以捄溢扶衰所遭之變然也故王者有改制之名無變道之實夏尚忠殷尚敬周尚文者所繼之捄當用此也道之大原出于天天不變道亦不變是以禹繼舜舜繼堯三聖相授而守一道亡捄敝之政也繇是觀之繼治世者其道同繼亂世者其道變今漢繼大亂之後若宜少損周之文致用夏之忠者夫古之天下亦今之天下共是天下以古準今壹何不相逮之逺也意者有所失于古之道與有所詭于天之理與夫天亦有所分予予之齒者去其角傅之翼者兩其足是所受大者不得取小也古之予禄者不食于力不動于末是亦與天同意者也身寵而載髙位家温而食厚禄因乗富貴之資力以與民争利于下民日削月朘寖以大窮尚不避死安能避罪此刑罸之所以蕃而姦邪不可勝者也公儀子相魯之其家見織帛怒而出其妻食于舎而茹葵愠而拔其葵曰吾已食禄又奪園夫紅女利乎古之賢人君子在列位者皆如是是故下髙其行而從其教民化其廉而不貪鄙豈可以居賢人之位而為庶人之行哉夫皇皇求則化利常恐乏匱者庶人之意也皇皇求仁義惟恐不能民者大夫之意也易曰負且乗致寇至言居君子之位而為庶人之行者患禍必至也若居君子之位當君子之行則舎公儀休之相魯無可為者矣春秋大一統者天地之常經古今之通誼也今師異道人異論百家殊方指意不同是以上無以持一統法制數變下不知所守臣愚以為諸不在六藝之科孔子之術者皆絶其道勿使並進邪辟之説滅息然後統紀可一而法度可明民知所従矣對既畢上以仲舒為江都相丞相衞綰因奏所舉賢良或治申韓蘇張之言亂國政請皆罷之奏可仲舒少治春秋為博士下惟講誦葢三年不窺園其精如此進退容止非禮不行學士皆師尊之及為江都王易王非相王帝兄素驕好勇仲舒以禮匡正王敬重焉嘗問曰越王勾踐與大夫泄庸種蠡伐吳滅之寡人以為越有三仁何如仲舒對曰夫仁人者正其誼不謀其利明其道不計其功是以仲尼之門五尺之童羞稱五伯為其先詐力而後仁誼也繇此言之則越未嘗有一仁也王曰善後公孫𢎞菑川薛人亦治春秋而希世用事仲舒以公孫𢎞為從諛𢎞嫉之以膠西王于王端亦上兄尤縱恣數害吏言于上使仲舒相之王素聞其賢善待之仲舒兩事驕王皆正身率下教令國中所居而治及去位家居不問産業専以講學著書為事朝廷有大議使使就問之其對皆有明法自帝即位始崇儒及仲舒對策推明孔氏抑黜百家立學校之官州郡舉茂才孝亷皆自仲舒發之年老以夀終于家夏六月丞相綰免以竇嬰封魏其侯魏其故城在山東沂州府蘭山縣為丞相田蚡長陵人王太后同母弟封武安侯武安注見前為太尉趙綰代人為御史大夫王臧蘭陵人為郎中令迎申公魯人為大中大夫上雅嚮儒術嬰蚡俱好儒推轂謂升薦之若轉車轂也趙綰為御史大夫王臧為郎中令綰臧請立明堂注見前以朝諸侯不能就其事乃言師申公故楚王戊胥靡申公申公愧之歸魯以詩教弟子受業者千餘人上使使者奉安車蒲輪用蒲裏其輪取其安也束帛加璧下設束帛上加以璧尊徳也迎之既至問治亂之事申公年八十餘對曰為治者不在多言顧力行何如耳時上方好文詞見申公對黙然然已招致則以為大中大夫舎魯邸漢制郡國皆立邸于京師議明堂廵狩改厯服色事壬寅二年冬十月淮南王安來朝淮南王安好書善為文辭作内書二十一篇外書甚衆又有中篇八卷言神仙黄白之術至是入朝上以安屬為諸父而材髙甚尊重之每宴見談説昏暮然後罷安雅善田蚡其入朝蚡迎之霸上與語曰上無太子王親髙帝孫行仁義天下莫不聞宮車一日晏駕非王尚誰立者安大喜厚遺蚡寳賂趙綰王臧下吏自殺丞相嬰太尉蚡免申公免歸以石建石衛石氏之别為郎中令石慶為内史太皇太后好黄老言不悦儒術趙綰請毋奏事東宫長樂宫在東太后居之故曰東宫應劭曰禮婦人不預政事時帝已躬省萬㡬太后又非五經故綰欲毋奏事太后太后大怒求得綰臧過以讓上曰此欲復為新垣平也上因廢明堂事及諸所欲興者下綰臧吏皆自殺嬰蚡免申公亦以疾免歸初景帝以石奮河内温人少侍髙祖其姊為美人因徙長安中戚里及四子官皆二千石號奮為萬石君萬石君無文學而恭謹無與比子孫為小吏來歸謁必朝服見之不名有過失不責讓為便坐對案不食然後諸子相責因長老肉袒謝罪改之乃許子孫勝冠者在側雖燕居必冠其執喪哀戚甚悼子孫遵教亦如之以故孝謹聞乎郡國及是綰臧獲罪太后以為儒者文多質少今萬石君家不言而躬行乃以其長子建為郎中令少子慶為内史建在上側事有可言屏人恣言極切至廷見如不能言上以是親之慶為太僕御出上問車中幾馬慶以策數馬畢舉手曰六焉慶于兄弟最為簡易矣然猶如此春二月丙戌朔日食三月以許昌髙祖功臣柏至侯許盎孫嗣侯為太常為丞相以衛青為大中大夫初上之為太子館陶大長公主有力焉以其女為太子妃及即位妃為皇后后驕妬擅寵而無子寵寖衰上嘗過平陽公主帝姊王太后出降平陽侯曹夀悦謳者衛子夫其出微母曰衛媪平陽侯家僮主因奉子夫送入宫日尊寵陳皇后聞之恚幾死者數焉子夫同母弟青字仲卿其父鄭季河東平陽人以縣吏給事侯家私與衛媪通生青冒姓衞氏為侯家騎奴大長公主以子夫故執囚青欲殺之青友公孫敖與壮士徃篡取之得不死上召為建章宫名在上林苑中監侍中已而以子夫為夫人青為大中大夫夏四月有星如日夜出癸卯三年冬十月中山王勝來朝時議多􅁈鼂錯之策務摧抑諸侯王數奏暴其過惡吹毛求疵諸侯王莫不悲怨至是諸王來朝置酒勝聞樂聲而泣上問其故勝具以吏所侵聞上乃厚諸侯之禮省有司所奏諸侯事加親親之恩焉春河溢平原注見前大饑人相食顔師古曰河溢之處損害田畝故饑秋七月有星孛于西北閩越撃東甌遣使發兵救之遂徙其衆于江淮間時閩越發兵圍東甌初吳王濞太子駒亡走閩越怨東甌殺其父常勸閩越撃東甌從之東甌使人告急上問田蚡對曰越人相攻撃固其常又數反覆自秦時棄不屬不足以煩中國往救也荘助莊以諡為氏助吳人以賢良對策擢中大夫曰小國以窮困來告急天子不救何以子萬國乎且秦舉咸陽而棄之何但越也上曰太尉不足與計吾新即位不欲出虎符發兵郡國乃遣助以節發兵會稽會稽守欲距法不為發以法距之為無虎符驗也助乃斬一司馬喻意指遂發兵浮海救東甌未至閩越兵罷東甌請舉國内徙乃悉舉其衆處于江淮之間九月丙子晦日食帝始㣲行起上林苑三輔黄圖苑周袤三百里離宫七十所上招選天下文學材智之士拔其俊異者寵用之荘助最先進後又得朱買臣字翁子吳人吾邱夀王吾音虞晉有虞邱氏夀王字子贛趙人司馬相如字長卿成都人東方朔風俗通伏羲之後帝出乎震主東方因氏馬朔字曼倩厭次人枚臯枚氏出周官銜枚氏阜淮隂枚乘孽子終軍終氏顓頊裔陸終之後以名為氏軍字子雲亦曰終童濟南人等並在左右每令與大臣等辨論中外中謂荘助等外謂卿大夫相應以義理之文大臣數絀焉然相如特以辭賦得幸朔臯不根持論好詼諧上以俳優畜之惟助與夀王見任用而朔時為直諌有所補益是嵗上始為㣲行與左右善騎射者期諸殿門期門之號始此以夜漏下十刻始出旦明入南山下馳射至夕還大驩樂之是後數出私置更衣十二所晝休更衣夜則止宿然上以道逺勞苦又為百姓所患嘗從南山下馳騖禾稼地鄂杜令欲執之示以乘輿物乃得免又嘗夜至栢谷逆旅主人疑為盗聚少年欲攻之主人嫗異上状貌止其翁不聴嫗飲翁酒醉而縳之少年乃㪚去柏谷在陜州靈寶縣西南于是使大中大夫吾邱夀王除上林苑屬之南山東方朔諌曰南山天下之阻陸海謂陸産富饒有同于海之區今規以為苑絶陂池水澤之利而取民膏腴之地上乏國用下奪農業其不可一也盛荆棘之林大虎狼之虛讀作墟壊人冢墓發人室廬其不可二也垣而囿之騎馳車騖有深溝大渠夫一日之樂不足以危無隄之輿劉敞曰不足之不當作亦隄猶防也言車輿馳騁不為防慮必有顛覆之變其不可三也帝乃拜朔為大中大夫給事中加官以給事禁中名然遂起上林苑甲辰四年夏有風赤如血乙巳五年春置五經博士丙午六年夏五月太皇太后崩合𦵏霸陵六月丞相昌免以田蚡為丞相蚡驕侈治宅甲諸第田園極膏腴多受四方賂遺每入奏事坐語移日所言皆聴薦人或起家至二千石權移主上上乃曰君除吏已盡未吾亦欲除吏嘗請考工少府官屬地益宅上怒曰君何不遂取武庫是後乃少退秋八月有星孛于東方長竟天閩越王郢攻南越遣大行王恢燕人等将兵撃之越人殺郢降兵還南越遣太子嬰齊入宿衛閩越王郢興兵撃南越南越守天子約不敢擅舉兵上書以聞上多其義遣大行王恢出豫章漢郡治南昌今南昌府南昌縣是大農令韓安國出㑹稽俱為将軍撃閩越淮南王安上書諌畧曰越方外之國剪髮文身之民不可以冠帶之國法度理也自三代之盛不受正朔非彊不能伏威不能制以為不居之地不收之民不足以煩中國也今自相攻擊而陛下發兵救之是反以中國而勞蠻夷也臣聞天子之兵有征而無戰言莫敢校也如使越人徼幸以逆執事厮輿之卒有一不備而歸雖得越王之首臣猶羞之陛下以九州為家生民皆為臣妾天下之安如泰山而四維之也蠻夷之地何足以為一日之間而煩汗馬之勞乎詩云王猶允塞徐方既來言王道甚大而逺方懐之也臣安竊恐将吏之以十萬之師為一使之任也是時漢兵遂岀未踰嶺閩越王郢發兵距險其弟餘善與宗族謀鏦殺郢使使奉其頭致王恢恢乃以便宜案兵告安國而使使奉王頭馳奏詔罷兵立無諸孫繇音摇邑號君丑為越繇王餘善既殺郢威行于國繇王不能制上聞之以餘善不足復興師立為東越王與繇王並處使荘助諭意南越南越王胡頓首曰天子乃與臣興兵討閩越死無以報徳遣太子嬰齊入宿衞助還過淮南上又使助諭淮南王安以討越事嘉答其意安謝不及助遂與安相結而還以汲黯字長孺濮陽人胡三省曰黯之先世為衛大夫葢食采于汲遂以為氏為主爵都尉初黯為謁者東越相攻上使黯徃視之至呉還報曰越人相攻固其俗然不足以辱天子使河内漢郡治懐懐注見前失火延燒千餘家上使黯徃視之還報曰家人失火屋比延燒不足憂也臣過河南漢郡注見前貧民傷水旱萬餘家或父子相食臣謹以便宜持節發倉粟以賑之臣請歸節伏矯制之罪上賢而釋之已遷為東海漢郡治郯今山東沂州府郯城縣是太守黯好清靜擇丞史漢制郡守屬有丞有諸曹掾史任之責大指不苛小臥閣不出嵗餘東海大治上聞召為主爵都尉時天子方招文學嘗曰吾欲云云黯曰陛下内多欲而外施仁義奈何欲效唐虞之治乎上怒罷朝謂左右曰甚矣汲黯之戇也羣臣或數黯黯曰天子置公卿輔弼之臣寧令從諛承意陷主于不義乎且已在其位縱愛身奈辱朝廷何黯多病賜告休假曰告賜告天子優賜其告也者數終不愈最後荘助為請上曰汲黯何如人助曰使黯任職居官無以踰人至其輔少主守城深堅謂志操深逺堅固招之不來麾之不去雖賁育孟賁夏育皆衛力士不能奪之矣帝曰然古有社稷之臣至如黯近之矣黯以嚴見憚大将軍丞相燕見上或不冠至黯不冠不見也上嘗坐武帳黯前奏事上不冠避帳中使人可其奏其敬禮如此丁未元光元年冬十一月初令郡國舉孝廉各一人從董仲舒對策之言也以李廣程不識程伯休父封于程其後以邑為氏為将軍将兵屯北邊廣與不識俱以将兵有名當時廣行無部曲行陣就善水草舎止人人自便不撃刁斗孟康曰以銅作鐎受一斗晝炊飲食夜擊持行故曰刁斗鐎音譙温器有柄以自衛莫府省約文書然亦逺斥候斥度候望也所以偵伺盗賊未嘗遇害不識正部曲行伍營陣撃刁斗治軍簿至明軍不得休息亦未嘗遇害然匈奴畏李廣之畧士卒亦多樂從廣而苦程不識秋七月癸未日食戊申二年冬十月始親祠竈五祀夏所祭其神祝融遣方士求神仙李少君以祠竈却老方見上上尊之少君者故深澤侯髙祖功臣有深澤侯趙将夕舎人匿其年及所生長善為巧發竒中嘗從武安侯宴坐中有老人九十餘少君乃言與其大父㳺射處老人為兒時從大父識其處一坐盡驚及見上上有故銅器問少君少君曰此器齊桓公十年陳于栢寝已而案其刻果然于是上大駭以少君為數百嵗人也言上曰祠竈則致物謂鬼物而丹砂可化為黄金蓬萊仙者可見見之以封禪則不死于是天子始親祠竈遣方士入海求蓬萊安期生琅邪人秦時賣藥海邊人言其千嵗少君為上言安期生嘗食臣棗大如𤓰之屬而事化丹砂諸藥齊才計反藥之分劑為黄金久之少君病死天子以為化去不死而海上燕齊怪迂之士多更來言神仙事矣時又有亳人謬忌奏祠太一曰天神貴者太一太一佐曰五帝上為立祠長安東南郊太一天帝之别名中宫天極星其一明者太一常居也五帝太㣲垣五帝座也夏六月遣間誘匈奴入塞将軍王恢等伏兵邀之不獲恢以罪下吏自殺先是匈奴請和親上下其議大行王恢請舉兵擊之御史大夫韓安國以為不如和親羣臣多附安國議遂許之至是鴈門馬邑豪聶翁壹聶注見前翁者老人之稱壹名因恢言匈奴初和親可誘以利伏兵襲撃必破之上召問公卿恢及安國更相詰難恢曰陛下之威海内為一而匈奴侵盜不已無它以不恐之故臣竊以為擊之便安國曰臣聞髙皇帝常圍于平城七日不食及解圍反位而無忿怒之心聖人以天下為度不以己私怒傷天下之公故結和親至今為五世利臣竊以為勿擊便恢曰不然髙皇帝不報平城之怨者非力不能所以休天下之心也今邊境數驚士卒死傷中國槥車相望此仁人之所隐也故曰擊之便安國曰不然臣聞用兵者以飽待饑常坐而役敵國今将卷甲輕舉深入長驅從行則廹脅衡行則中絶疾則糧乏徐則後利兵法云遺人獲也臣故曰勿擊便恢曰不然臣言撃之者非發而深入也将順因單于之欲誘而致之邊吾選梟騎隂伏而處審遮險阻或營其左或營其右或當其前或絶其後單于可擒百全必取上從恢議六月以韓安國李廣王恢為将軍将車騎材官三十餘萬匿馬邑傍谷中使聶翁壹亡入匈奴謂單于曰吾能斬馬邑令丞以城降財物可盡取單于信之以十萬騎入武州漢縣故城在山西朔平府左雲縣塞未至馬邑百餘里見畜布野而無人牧者乃攻亭得鴈門尉史漢近塞郡皆置尉每百里尉史二人欲殺之尉史具告單于漢兵所居單于大驚曰我固疑之乃引兵還單于曰吾得尉史天也以為天王漢兵追至塞弗及乃皆罷兵始王恢主别從代擊虜輜重及聞單于還兵多亦不敢出上怒下恢廷尉廷尉當恢逗撓當斬恢行千金田蚡蚡言于太后曰王恢首為馬邑事今不成而誅恢是為匈奴報仇也太后以告上上曰首為馬邑事者恢故發天下兵數十萬從其言為此且縱單于不可得恢所部撃其輜重猶頗可得以慰士大夫心今不誅恢無以謝天下恢遂自殺自是匈奴絶和親徃徃入盗邊不可勝數然尚貪樂關市嗜漢財物漢亦通關市不絶以中之己酉二年春河徙頓邱漢縣本春秋衞邑注見前夏決濮陽漢東郡治注見前黄河自周定王五年後至是再徙春河水徙從頓邱東南禹貢錐指河水徙從頓邱東南是一句通鑑考異以頓邱屬東郡渤海乃在頓邱東北恐誤因刪去入渤海三字盖誤以東南二字屬下讀也流入渤海禹貢錐指頓邱決口及入海處溝洫志不載不可得聞今以水經注考之北凟初經頓邱縣西北至是改流過其縣東南厯畔觀至東陽武奪漯川之道東北至千乘入海者也畔觀今山東觀城縣東陽武今山東朝城縣俱屬曹州府千乘漯川注俱見前夏復決濮陽瓠子在開州南亦曰瓠子口禹貢錐指漯川狹小不能容故其夏又自長夀津溢而東以決于濮陽長夀津注見前注鉅野在曹州府鉅野縣北即古大野澤注見前通淮泗此黄河入淮之始汎郡十六天子使汲黯鄭當時字荘陳人發卒十萬塞之輙復壊是時田蚡奉邑食鄃漢縣故城在今山東濟南府平原居河北河決而南則鄃無水災邑多收因言于上曰江河之決皆天事未易以人力彊塞望氣者亦以為然于是久不塞禹貢錐指河既決瓠子東南通淮泗于是北凟之流微漯川之水涸矣庚戌四年冬十二月晦殺魏其侯竇嬰春三月田蚡卒初孝景時竇嬰為大将軍田蚡乃為諸郎已而蚡日益貴幸嬰失勢賔客益衰獨故燕相灌夫字仲孺潁隂人父張孟為潁隂侯嬰舎人遂冒姓灌氏不去嬰乃厚遇夫相為引重夫為人剛直使酒諸有埶在己之右者必陵之故與田蚡有隙蚡奏夫家在潁川横甚夫宗族賔客為姦利潁川兒歌之曰潁水清灌氏寧潁水濁灌氏族請治之上曰此丞相事何請夫亦持蚡隂事受淮南王金與語言事具前賔客居間遂解未幾蚡取燕王女為夫人太后詔列侯宗室皆徃賀嬰彊夫與俱徃夫因行酒罵坐夫行酒至蚡蚡不肯滿觴夫無所發怒適臨汝侯灌賢與程不識耳語夫乃罵曰生平鄙程不識不直一錢今日長老為夀乃效女兒曹呫囁耳語耶蚡大怒令騎縛夫繋居室署名屬少府遂其前事遂竟也竟前所奏夫事遣吏分曹逐捕諸灌氏支屬皆得棄市罪夫既繋不得言蚡隂事嬰乃上書論救得見上具言灌夫醉飽事不足誅上以為然令東朝太后朝廷辯之嬰與蚡因互相詆訐上問朝臣兩人孰是惟汲黯是嬰韓安國兩以為是鄭當時是嬰後不敢堅上怒當時曰公今日廷論局趣效轅下駒吾并斬若屬矣即罷起入上食太后太后怒不食曰吾在也而人皆藉猶蹈也吾弟令我百嵗後皆魚肉之乎上不得已遂族灌夫使有司案治嬰得棄市罪景帝時嬰常受遺詔曰事有不便以便宜論上及是事急使昆弟子上書言之書奏案尚書大行無遺詔詔書獨蔵嬰家乃劾嬰矯先帝詔罪當棄市遂于十二月晦論殺之張晏曰著日月者見春垂至恐遇赦贖之胡三省曰此田蚡之意也春田蚡亦卒蚡疾一身盡痛若有撃者上使視鬼者瞻之曰魏其侯與灌夫共守笞欲殺之竟死嬰蚡事上本不直蚡特以太后故後淮南王安敗上聞蚡受安金有不順語曰使武安侯在者族矣夏四月隕霜殺草五月以薛澤高祖功臣薛歐之孫續封平棘侯為丞相地震辛亥五年冬十月河間王徳來朝獻雅樂對詔䇿春正月還國卒河間王徳修學好古實事求是務得其實每求真是也以金帛招求四方善書得書多與漢朝等時淮南王亦好書所招致率多浮辯王所得皆古文先秦猶言秦先舊書王得周官有五篇失冬官募以千金不得取考工記補之禮古經出魯淹中王收集餘燼獻之趙人毛萇善詩自云子夏所傳作詁訓傳王好之其他若尚書禮禮記孟子左氏春秋之屬皆經傳説記七十子之徒所論其學舉六蓺謂六經修禮樂被服儒術造次必于儒者山東諸儒皆從之遊是嵗十月來朝獻雅樂對三雍宫應劭曰辟雍明堂靈臺也胡三省曰對三雍之制度非對于三雍宫及詔策所問三十餘事推道術而言得事之中文約指明天子下太樂官屬太常存肄王所獻雅聲嵗時以備數然不常御也正月王歸國薨中尉以聞大行令奏諡曰獻通南夷置犍為郡初治鄨今貴州遵義府遵義縣是後徙治僰道今四川叙州府宜賔縣是通西夷置一都尉初王恢之討東越也使番陽漢縣今曰鄱陽屬江西饒州府令唐䝉風喻南越南越食蒙以蜀枸醤枸一作蒟音矩草類縁木而生子如桑椹熟時正青以蜜藏而食之䝉問所從來曰道西北牂牁江一作牂柯即古欝水其上流為今貴州之盤江逕廣西南寧府為左江至潯州府合右江即黔江亦導源貴州入廣東境為西江下畨禹入海牂牁江廣數里出番禺城下蒙歸問蜀賈人賈人曰獨蜀出枸醤多持竊去市夜郎今貴州以西南籠諸府地古為夜郎國漢置縣唐始移縣于珍州今遵義縣桐梓縣是夜郎臨牂牁江牂牁擊船杙也楚莊蹻伐夜郎椓船于岸而步戰既滅夜郎以江有椓船柯處乃改名曰牂牁江廣百餘步南越以財物役屬之然亦不能臣使也蒙乃上書曰南越東西萬餘里從長沙豫章徃水道多絶竊聞夜郎精兵可十餘萬浮船牂牁出其不意此亦制越一竒也請通夜郎道為置吏上乃拜蒙中郎将将千人從筰關今四川雅州府清溪縣古筰都國其東北有大關山即卭崍坂也入遂見夜郎侯多同侯以竹為姓多同其名也厚賜之喻以威徳約為置吏多同貪漢繒帛以為道險漢終不能有乃且聴約䝉還報上以為犍為郡發卒治道數萬人卒多物故有逃亡者用軍興法誅之巴蜀民大驚恐上使司馬相如責蒙因喻告巴蜀民以非上意相如還報時卭今四川寧逺府古卭都國筰注見上君長聞南夷得賞賜多欲請吏上問相如相如曰卭筰冉駹冉駹西夷二族今四川茂州是近蜀易通為置郡縣愈于南夷上乃拜相如中郎将建節徃使因巴蜀吏幣物以賂西夷皆請為内臣除邊關關益斥言廣也西至沫即青衣水出雅州府天全州徼外下流至嘉定府入江若水即瀘水注見前南至牂牁為徼通零關道零一作靈漢書地理志靈關道屬越嶲郡府越嶲今寧逺橋孫水水經注孫水出臺登縣一名白沙江南入若水臺登今寧逺府冕寧縣以通卭都為置一都尉十餘縣屬蜀上大悦秋七月皇后陳氏廢后以祠祭厭勝媚道事覺册收璽綬退居長門宫竇太主即館陶長公主慙懼稽顙謝上慰諭之初上嘗置酒主家主見所幸賣珠兒董偃上使之侍飲稱為主人翁而不名常從遊戲馳逐觀雞踘謂鬭雞蹋鞠之戲角狗馬上樂之因為主置酒宣室使謁者引内偃中郎東方朔辟㦸謂以㦸置地而前曰董偃有斬罪三安得入乎上曰何也朔曰偃以人臣私侍公主一也敗男女之化亂婚姻之禮傷王制二也陛下富於春秋方積思于六經而偃以靡麗奢侈道淫辟之路乃國家之大賊人主之大蜮一曰短狐亦曰射工南方淫氣所生三也上黙然良久曰吾業已設飲後而自改朔曰不可夫宣室者先帝之正處也非法度之政不得入焉淫亂之漸其變為簒上曰善詔置酒北宫在未央宫北引偃從東司馬門入賜朔黄金三十斤偃寵由是日衰詔大中大夫張湯杜陵人中大夫趙禹斄人定律令湯禹務在深文拘守職之吏蘇林曰拘刻于因循守職無所改作之吏于是始作見知法張晏曰吏見知人犯法不舉告為故縱以其罪罪之八月螟以公孫𢎞為博士是時徴吏民有明當時之務習先聖之術者縣次續食音嗣令各縣依次第接續供養飲食令與計偕計者上計簿使也偕俱也令所徴者與上計使者偕來也菑川公孫𢎞對策畧曰臣聞堯舜之時不貴爵賞而民勸善不重刑罸而民不犯率躬以正而遇民信也是故因能任官則分職治去無用之言則事情得不作無用之器則賦斂省不奪民時不妨民力則百姓富有徳者進無徳者退則朝廷尊有功者上無功者下則羣臣逡罸當罪則奸邪止賞當功則臣下勸凡此八者治之本也臣又聞之氣同則從聲比則應人主和徳于上百姓和合于下故心和則氣和氣和則形和形和則聲和聲和則天地之和應矣太常奏第居下上特擢為第一拜博士待詔金馬門宦署門也時有善相馬者東門京鑄銅馬獻之詔立馬于魯班門故更名金馬門時齊人轅固年九十餘亦以賢良徴謂曰公孫子務正學以言無曲學以阿世諸儒多疾毁固遂以老罷歸壬子六年冬初算商車春穿渭渠亦曰漕渠在西安府城南水經注漢漕渠自昆明池南傍三原東至于河大司馬鄭當時言穿渭為渠下至河漕關東粟徑易又可以溉渠下民田萬餘頃詔發卒數萬人穿之三嵗而通人以為便匈奴宼上谷注見前遣車騎将軍衞青等撃却之匈奴入上谷遣衞青及公孫賀公孫敖皆義渠人李廣四将軍撃之李廣軍敗為匈奴所得置兩馬間絡而盛卧廣佯死睨其旁有一兒騎善馬暫騰而上兒馬推堕兒奪其弓鞭馬南馳遂得歸下吏當死贖為庶人兩将軍亦無功惟青得首虜賜爵關内侯青雖出于奴虜然善騎射材力絶人遇士大夫以禮與士卒有恩衆樂為用故每出輙有功癸丑元朔元年冬十一月定二千石不舉孝亷罪法詔曰朕深詔執事興亷舉孝庶㡬成風紹休聖緒夫十室之邑必有忠信三人並行厥有我師今或至闔郡而不薦一人是化不下究而積行之君子壅于上聞也且進賢受上賞蔽賢蒙顯戮古之道也其議二千石不舉者罪有司奏不舉孝不奉詔當以不敬論不察亷不勝任也當免奏可子據生即戾太子立夫人衞氏為皇后帝未有子是年衞夫人始生子據遂立為后帝得皇子甚喜為立禖使東方朔枚臯作禖祝后立臯為奏賦以戒終秋匈奴入宼以李廣為右北平漢郡治平剛故城在今熱河八溝界太守廣在郡匈奴號曰漢飛将軍避之數嵗不入界初廣屏居藍田南山嘗夜從人田間飲還至亭霸陵尉醉呵止廣廣騎曰故李将軍尉曰今将軍尚不得夜行何故也宿廣亭下居無何廣拜右北平請尉與俱至軍而斬之上書自陳帝弗罪也廣猿臂善射嘗出獵見草中石以為虎而射之中石没矢視之石也他日射之終不能入矣薉即濊貊今奉天府鳯凰城東及朝鮮國之江原道皆其道也君降置蒼海郡薉君南閭薉君名等率口二十八萬詣遼東漢郡治襄平故城在今奉天府遼陽州北内屬詔以其地置蒼海郡人徒之費擬于南夷數年乃罷以主父偃趙武靈王自號主父支庶因以為氏嚴安徐樂為郎中主父偃臨菑人始遊齊燕趙皆莫能厚遇乃西入關上書闕下朝奏暮召入所言九事其八事為律令一事諌伐匈奴其畧曰昔秦吞戰國務勝不休使䝉恬将兵北伐辟地千里天下飛芻輓粟起于負海轉輸北河男子疾耕不足于糧餉女子紡績不足于帷幕百姓靡敝天下始叛夫匈奴難得而制非一世也行盗侵驅天性固然虞夏殷周固弗程督今不上觀虞夏商周之統而下循近世之失此臣之所大憂百姓之所疾苦也時偃同郡嚴安以故丞相史上書畧言今天下人民用財侈靡臣願為制度以防其淫又今徇南夷朝夜郎降羌僰畧薉州建城邑深入匈奴之境燔其龍城議者美之此人臣之利非天下之策也無終徐樂亦上書畧言天下之患在土崩不在瓦解何謂土崩秦之末世是也何謂瓦解吴楚七國之兵是也此二體者安危之明要也間者關東數不登重以邊境之事民宜有不安其處矣不安故易動易動者土崩之埶也故賢主獨觀萬化之原修之廟堂之上而銷未形之患期使天下無土崩之埶而已矣書奏上召見謂曰公等皆安在何相見之晩也皆拜為郎中三人惟偃尤親幸一嵗四遷為中大夫大臣畏其口賂遺累千金或謂偃曰太横矣偃曰吾生不五鼎食死即五鼎烹耳甲寅二年春正月詔諸侯王得分國邑封子弟為列侯主父偃説上曰古者諸侯不過百里今或連城數十地方千里緩則驕奢易為淫亂急則阻彊合從以逆京師以法割削之則逆節萌起前日鼂錯是也今諸侯子弟或十數而適嗣代立餘無尺地之封則仁孝之道不宣願陛下令諸侯得推恩分子弟以地侯之彼人人喜得所願上以徳施實分其國不削而稍弱矣上從之匈奴入寇遣衞青等将兵擊走之遂取河南地立朔方郡故城在今鄂爾多斯右翼後旗匈奴入上谷漁陽漢郡治漁陽今順天府宻雲縣是遣衛青李息郁郅人出雲中以西撃走白羊樓煩王遂取河南地詔封青為長平漢縣故城在今河南陳州府西華縣東北侯主父偃言河南地肥饒外阻河城之以逐匈奴可省轉戍廣中國公卿皆言不便上竟用偃計立朔方郡募民徙者十萬口築城繕塞因河為固榆林志黄河自寧夏西折而北經三受降城南至廢東勝州西折而南入府谷縣境其中謂之河套廻環數千里費數十百鉅萬三月乙亥晦日食徙郡國豪傑于茂陵帝陵邑在今西安府興平縣東北主父偃言茂陵初立天下豪傑并兼亂衆之民皆可徙置内實京師外銷姦猾所謂不誅而害除上從之軹人郭解關東大俠也在徙中衛青為言郭解家貧不中徙上曰解布衣權至使将軍為言此其家不貧卒徙解家解生平睚眦殺人甚衆上聞之下吏捕治所殺皆在赦前軹有儒生侍使者坐客譽郭解生曰解専以奸犯公法何謂賢解客聞殺此生斷其舌吏以此責解解實不知吏奏解無罪公孫𢎞議曰解布衣為任俠行權以睚眦殺人解雖不知此罪甚于解殺之當大逆無道遂族郭解齊王次昌有罪自殺國除誅齊相主父偃夷其族主父偃嘗欲納女于齊王王不許偃因上言臨淄殷富非親愛子弟不得王今齊王屬疏又與姊亂與紀翁主通請治之于是拜偃為齊相偃至齊急治王後宫宦者辭及王王懼自殺偃始為布衣時遊齊及燕趙既貴首發燕王定國隂事定國自殺國除已又敗齊趙王彭祖恐上書告偃受諸侯金以故諸侯子弟多得封者上聞大怒囚偃下吏偃辭不服上欲勿誅公孫𢎞曰齊王自殺國除偃本首惡不誅無以謝天下乃族誅之以孔臧孔子後髙祖功臣蓼侯叢子嗣為侯為太常上欲以孔臧為御史大夫臧辭曰臣世以經學為業乞為太常典臣家業與從弟侍中安國孔子十二世孫以治尚書為侍中綱紀古訓使永垂後嗣帝從之其禮賜如三公乙夘三年以張騫漢中人為大中大夫初匈奴降者言月氏故居敦煌漢縣唐建中後廢今復置屬甘肅安西府祁連即天山匈奴呼天曰祁連山在今甘州府張掖縣西南緜亘甘凉之境一名南山一名雪山西連肅州安西又西際于葱嶺蓋數千里所考祁連有南北之分此為南祁連即漢書西域傳謂南山也其北祁連在今哈宻城北自葱嶺分支蜿蜒而東最髙者曰博克達山其餘随地易名延袤亦數千里即西域傳所謂北山也杜佑通典自張掖以西至于庭州山皆周徧蓋統南北兩祁連而言之間為彊國匈奴攻破之殺月氏王以其頭為飲器餘衆逃遁逺去怨匈奴無與共撃之上募能通月氏者張騫以郎應募出隴西徑匈奴中單于得之留十餘嵗騫得間西去數十日至大宛西域國治貴山城去長安萬二千五百五十里大宛為發譯道抵康居亦西域國治樂越慝地到卑闐城去長安萬二千三百里傳致大月氏治監氏城去長安萬一千六百里大月氏太子為王臣大夏亦西域國在大宛西南二千餘里媯水南本無大君長兵弱畏戰故月氏徙來皆臣之而君之居媯水北地肥饒少宼殊無報胡之心騫留嵗餘竟不能得月氏要領乃還復為匈奴所得會匈奴亂騫乃逃歸帝拜為大中大夫騫初行時百餘人去十三嵗唯二人得還夏六月皇太后崩合𦵏陽陵秋以張湯為廷尉湯為人多詐舞智以御人時上方鄉文學湯陽浮慕事董仲舒等以兒寛兒本郳以國為氏其後去邑寛千乗人為奏讞據以古法義決疑獄所治即上意所欲罪予監史廷尉有左右監獄史深刻者即上意所欲釋予監史輕平者上繇是悦之湯于故人子弟調䕶之尤厚其造請諸公不避寒暑是以得聲譽汲黯數質責湯于上前曰公為正卿上不能褒先帝之功業下不能抑天下之邪心何空取髙皇帝約束紛更之為黯時與湯議論湯辯常在文深小苛黯伉厲守髙不能屈忿發罵曰天下謂刀筆吏不可以為公卿果然必湯也令天下重足而立側目而視矣丁巳五年十一月丞相澤免以公孫𢎞為丞相封平津鄉名在直𨽻天津府鹽山縣南侯丞相封侯自此始漢常以列侯為丞相此則既相而後封時上方興功業丞相于是開東閣以延賢人與參謀議丞相身食一肉飯脱粟奉禄以給故人賔客家無所餘然其性意忌外寛内深居嘗有隙無近逺雖陽與善後竟報其過汲黯每面觸之黯嘗與約議至上前悉背黯約以順上旨黯廷詰其多詐不忠乃陽謝曰知臣者以臣為忠不知臣者以臣為不忠因欲誅之以事請徙黯為右内史景帝二年分置左右内史右内史部中多貴人宗室難治黯居數嵗官事不廢丞相請禁民毋得挾弓弩上下其議吾邱夀王對曰臣聞古者作五兵以禁暴討邪故聖王合射以明教未聞弓矢之為禁且所謂禁者以盗賊之攻奪而大奸之于重誅故不避也臣恐邪人挾之而吏不能止良民以自備而抵法禁是擅賊威而奪民救也大不便于是丞相絀服春匈奴宼朔方遣衛青率六將軍撃走之還以青為大將軍匈奴右賢王數侵擾朔方天子令車騎將軍青將三萬騎出髙闕通典高闕在隂山西隂山在今呉喇忒西北將軍蘇建杜陵人封平陵侯為衛尉李沮雲中人為左内史公孫賀為太僕李蔡廣從弟為代相俱出朔方李息為大行張次公河東人封岸頭侯俱出右北平右賢王以為漢兵逺不能至飲醉青等夜至圍之右賢王驚潰圍北去得禆王小王猶禆將也十餘人衆男女萬五千人畜數十萬匹于是引兵還天子使使者即軍中拜青為大將軍諸將皆屬焉益封青八千七百户三子皆為列侯㐾為宜春侯不疑為隂安侯登為發千侯青固謝讓功諸將上乃封諸將校尉侯者七人公孫敖為合騎侯韓説為龍頟侯公孫賀為南窌侯李蔡為樂安侯李朔為涉軹侯趙不虞為随成侯公孫戎奴為從平侯青尊寵于羣臣無二公卿以下皆卑奉之獨汲黯與亢禮或説黯曰大將軍尊重不可以不拜黯曰以大將軍有揖客反不重邪青聞愈賢黯數請問國家朝廷所疑遇黯加于平日夏六月為博士置弟子五十人詔曰盖聞導民以禮風之以樂今禮壊樂崩朕甚閔焉其令禮官勸學興禮以為天下先于是丞相平津侯等奏請為博士官置弟子五十人太常擇民年十八以上儀狀端正者補博士弟子郡國二千石謹察可者常與計偕詣太常受業如弟子一歲輒課第其髙下以補郎中文學掌故漢舊儀博士弟子試射策中甲科補郎中乙科補掌故掌故治禮之官主故事者以有文學習禮儀者為之故名即者秀才異等輙以名聞其不事學若下材輒罷之又吏通一藝以上者請皆選擇以補右職謂中二千石二千石卒史也上從之自此公卿大夫士吏彬彬多文學之士矣戊午六年夏四月衛青率六将軍公孫敖公孫賀趙信蘇建李廣李沮撃匈奴前将軍趙信故匈奴小王降漢封翕侯敗降匈奴衛青率六將軍再出二月四月定襄漢郡治成樂故城在今歸化城南前後斬首虜萬餘人右將軍建前將軍信并軍逢單于兵與戰一日餘漢兵且盡信將其餘騎降匈奴建盡亡其軍脱身自歸大將軍議郎周霸曰自大將軍出未嘗斬禆將今建棄軍可斬以明威青曰青幸得以肺腑待罪行間不患無威職雖當斬將然以臣之尊寵而不敢自擅誅于境外于以見為人臣不敢專權不亦可乎遂囚建詣行在所詔贖為庶人青姊子霍去病平陽吏霍仲孺給事平陽侯家與衛少兒私通生去病少兒以皇后貴更為陳掌妻年十八善騎射為票姚讀作飄摇校尉與輕勇騎八百直棄大軍數百里赴利謂奔趨便利斬捕首虜過當謂所將人數少而斬首及捕獲數多過于所當于是封為冠軍今河南南陽府鄧州有冠軍城去病所封以功冠諸軍故名侯校尉張騫以知水草處軍得不乏封博望漢縣今為驛在南陽縣北侯是嵗失兩軍亡翕侯以故大将軍不益封止賜千金單于既得翕侯以為自次王信教單于益北絶幕以誘罷漢兵徼極而取之毋近塞單于從之六月置武功爵臣瓉曰茂陵中書有武功爵一級曰造士二級曰閑輿衛三級曰良士四級曰元戎士五級曰官首六級曰秉繹七級曰千夫八級曰樂卿九級曰執戎十級曰政戾庶長十一級曰軍衛此武帝所置以寵軍功詔曰五帝之教不相復而治禹湯之法不同道而王所繇殊路而建徳一也今中國一統而北邊未安稳甚悼之日者大將軍攻匈奴斬首虜受爵賞而欲移賣者無所流貤顔師古曰貤物之重次第也言欲移賣爵而無有差次不得流行也其議為令是時嵗撃匈奴大司農經用既竭故為此詔有司奏請令民得買爵及贖禁錮免臧罪置賞官名曰武功爵級十七萬凡直三十餘萬金胡三省曰賣爵一級為錢十七萬自此以上每級加二萬萬錢一金合成三十餘萬也諸買武功爵至千夫者得除為吏吏道雜而多端官職耗廢矣己未元狩元年冬十月祠五畤獲一角獸以燎始以天瑞紀元行幸雍祠五畤獲獸一角而足有五蹄有司言陛下肅祇郊祀上帝報享錫一角獸盖麟云于是以薦五畤畤加一牛以燎時以為獲白麟乃作白麟之歌又得竒木其枝旁出輙復合于木上上異此二物博謀羣臣終軍上對曰野獸并角明同本也衆枝内附示無外也若此之應將有削左袵要衣裳而蒙化者焉對奏由是始議改元有司奏言元宜以天瑞命一元曰建二元以長星曰光今元以郊得一角獸曰狩云淮南王安衡山王賜謀反自殺初淮南王安招致賔客多江淮間輕薄士常以厲王遷死感激安安乃治戰具積金錢郎中雷被雷氏出古方雷氏後獲罪于太子遷被善用劒太子召與戲誤中太子故得罪時有詔願從軍者輙詣長安被即願奮撃匈奴安斥免之被遂亡之長安上書自明事下廷尉治蹤跡連安上遣中尉即訊安太子遷欲使人刺殺中尉不果遷恐漢使即建安乃使人衣衛士衣持㦸居安旁漢使有非是者即刺殺之因發兵反中尉至安視其顔色和遂不發公卿奏安格明詔當棄市詔削二縣安恥之為反謀益甚衡山王賜與安故不相能賜聞安有反謀恐為所并亦結賔客使陳喜等作輣車鍜矢刻天子璽將相軍吏印當入朝過淮南乃昆弟語除前隙約束反具遂謝病不朝安數召中郎伍被被楚人與謀反事被始以為不可安固問之被曰今諸侯無異心百姓無怨氣可偽為詔徙郡國豪傑于朔方又偽為詔獄盡逮諸侯太子幸臣使民怨諸侯懼即使辯士随而説之儻可徼倖得什一欲使人偽得罪而西事大將軍青因即刺殺之且曰漢廷大臣獨汲黯好直諌守節死義難惑以非至如説丞相等如發蒙振落耳韋昭曰言如發去物上之蒙振落樹上之葉取之至易也㑹太子遷謀殺漢使事覺安有孽子不害最長弗愛不害之子建材髙有氣數怨望太子乃隂使人告遷謀殺漢中尉事廷尉逮捕安欲發兵猶豫未决伍被自詣吏具告與安謀反事上使宗正以符節治安未至安自剄王后太子皆伏誅有司捕諸與謀反者得陳喜于衡山王子孝家先是衡山王以王后徐來言欲廢太子爽而立其弟孝乃囚太子佩孝以王印令交結賔客與陳喜枚赫等為反計孝聞律先自告除其罪即先自告所與謀反者陳喜枚赫等公卿請逮賜治之賜自剄死王后太子及孝皆棄市凡二獄所連引列侯二千石豪傑等死者數萬人上以伍被雅辭多引漢之美欲勿誅廷尉湯曰被首為王畫反計罪不可赦乃誅被侍中荘助素受安賂遺上薄其罪張湯以為助出入禁門腹心之臣乃與諸侯交私不誅後不可治助竟棄市夏四月立子據為皇太子五月乙巳晦日食遣博望侯張騫使西域始通滇國古荒服地楚莊蹻始開遂留王之今雲南府是也復事西南夷初張騫自匈奴還具為天子言西域諸國風俗大宛在漢正西其俗土著耕田有城郭室屋如中國多善馬馬汗血顔師古曰大宛國有高山其上有馬不可得因取五色母馬置其下與集生駒皆汗血因號曰天馬子云其東北則烏孫行國與匈奴同俗治赤谷去長安八千九百里顔師古曰烏孫于諸戎形最異今胡人靑眼赤鬚狀類獼猴者皆其種也東則于闐治西城去長安九千六百七十里其河多玉石于闐之西則水皆西流注西海水經注河源潜發葱嶺分為二水其一水西逕月氏諸國南注雷翥海連胡三省曰雷翥海即西海南交州其東水東流注鹽澤即蒲昌海亦曰泑澤水經注泑澤水積鄯善之東北龍城之西南地廣千里皆為鹽而堅剛故有鹽澤之稱嶺考今土魯番西南有澤名羅卜淖爾周五百里葱東北之水皆入焉葢自古鹽澤舊志亦謂之洛普池也鹽澤潛行地下其南則河源出焉漢書西域傳河有兩源一出葱嶺一出于闐于闐河北流與葱嶺河合東注蒲昌海其水亭居冬夏不增減皆以為潛行地下東出于積石為中國河云考河源不見于經言之者自漢張騫始然所云于闐葱嶺兩源杜佑歐陽忞等俱斥其非山海經水經注所紀又荒逺不經唐劉元鼎明釋宗泐所言稍合又各不同惟元潘昻霄為都實撰河源志説最詳輿本朝康熙間屢遣使臣考求河源測量地度繪入圖河實導源于西番之巴顔喀喇山東名阿爾坦河東北流三百餘里合鄂敦塔拉諸泉滙為查靈鄂靈二海子廻環曲屈凡二千三百餘里入河州界為中國黄河葢河源更出鄂敦淖爾之西視元都實所志更得其真矣鹽澤去長安可五千里匈奴右方居澤以東南接羌隔漢道焉大夏在大宛西南與大宛同俗前使時見卭竹杖元和志雅州卭崍山竹高節實可為杖蜀布問安得此曰市之身毒音捐篤孟康曰即天竺也後漢書西域傳天竺國一名身毒在月氐東南俗與月氏同而修浮圖道不殺伐考身毒國自後漢時號曰天竺唐分為五天竺又曰五印度地最廣逺今西藏去四川可數千里其西南之阿里有岡底斯山盖即釋氏所云阿耨達山為近古天竺云身毒在大夏東南可數千里其俗土著與大夏同度大夏居漢西南今身毒又居大夏東南有蜀物此其去蜀不逺矣今使大夏從羌中險少北則為匈奴所得從蜀宜徑又無宼天子既聞諸國多竒物而兵弱貴漢財物誠得而以義屬之則廣地萬里威德徧于四海欣然以騫言為然乃令騫因蜀犍為注見前發間使四道並出出冉出駹出徙出卭僰指求身毒國各行一二千里其北閉氐筰南閉嶲昆明終莫得通于是始通滇國漢使至滇滇王當羌謂曰漢孰與我大及夜郎侯亦然以道不通故各自以為一州主不知漢廣大使者還因盛言滇大國足事親附天子注意焉乃復事西南夷元朔四年罷西夷至是復通庚申二年春丞相公孫𢎞卒以李蔡為丞相張湯為御史大夫蔡為人在下中取充位天下事皆决于湯以霍去病為票徐廣曰通作驃騎將軍品秩同大將軍擊匈奴敗之去病以票騎將軍將萬騎出隴西擊匈奴轉戰六日過焉支山在今甘肅甘州府山丹縣東南西河舊事焉支山水草茂美宜畜牧與祁連同匈奴失此二山歌曰亡我祁連山使我六畜不蕃息失我焉支山使我婦女無顔色千餘里斬首虜獲甚衆收休屠音朽儲王匈奴屬王號今甘肅凉州府漢初為匈奴休屠王之地祭天金人顔師古曰作金人以為天神之主而祭之今佛像是其遺法益封二千户夏復與公孫敖將數萬騎俱出北地去病復深入二千餘里踰居延漢書地里志張掖郡居延有居延澤古文以為流沙流沙注見前過小月氏注見前至祁連山斬首三萬虜獲尤多益封五千户是時諸宿將所將兵皆不如去病去病所將常選謂選取驍鋭然亦敢深入常與壯騎先其大軍軍亦有天幸未嘗困絶也而諸宿將常留落不偶謂遲留零落而不遇合也由此去病益以親貴比大將軍矣是夏衛尉張騫郎中令李廣俱出右北平廣殺匈奴數千人而漢軍死者亦過半故無賞騫及公孫敖皆以後期當斬贖為庻人秋匈奴渾邪王匈奴屬王之號今甘肅甘州府漢初為匈奴渾邪王地降置五屬國各依本國之俗而屬于漢故曰屬國以處其衆匈奴渾邪王殺休屠王渾邪王休屠王居匈奴西方單于怒其數為漢所殺虜欲召誅之渾邪休屠恐謀降漢休屠後悔渾邪遂殺之并其衆降漢詔發車二萬乘迎之縣官從民貰馬民或匿馬馬不具上怒欲斬長安令右内史汲黯曰長安令無罪獨斬臣黯民乃肯出馬且匈奴畔其主而降漢漢徐以縣次傅之何至令天下騷動乎上黙然及渾邪至賞賜數十鉅萬封渾邪萬户為漯隂侯其禆王四人皆為列侯賈人與市者坐當死五百人黯請間曰渾邪率數萬之衆來降虚府庫賞賜發良民侍養譬若奉驕子愚民安知市買長安中而文吏繩以為闌出財物于邉闋應劭曰漢律胡市吏民不得持兵及鐵出闗雖于京師市買其法一也殺無知者五百餘人是所謂庇其葉而傷其枝者竊為陛下不取也上曰吾久不聞汲黯之言今又復妄發矣居頃之乃分徙降者邊五郡隴西北地上郡朔方雲中故塞外因其故俗為五屬國而金城漢郡治允吾故城在今甘肅蘭州府臯蘭縣胡三省曰金城置于昭帝此言者史追書也河西黄河之西西並南山即南祁連注具前考是山自葱嶺而東亘西域諸國之南故名南山山東南一枝包青海繞黄河東入岷州界循渭而南為武功太白諸山漢書西域𫝊云南山東出金城與漢南山屬是也至鹽澤空無匈奴矣明年詔減隴西北地上郡戍卒之半以寛天下之繇休屠王太子日磾音宻低没入官輸黄門少府屬養馬乆之上遊宴見馬日磾牽馬過殿下容貎甚嚴上異而問之具以本狀對即日拜為侍中以休屠作金人為祭天主賜日磾姓金氏辛酉三年春有星孛于東方山東大水徙其民于闗西朔方山東被水民多饑乏遣使虚倉粟以振猶不足又募富人假貸尚不能相救乃徙貧民于闗以西及充朔方以南新秦中應劭曰秦得匈奴河南地築城郭徙民居之曰新秦中七十餘萬口衣食皆仰給縣官數歲貸與産業使者分部䕶之費以億計作昆明池在西安府長安縣西南今涸三輔黄圖昆明池中有神池堯時治水嘗停舟于此上將伐昆明杜佑通典昆明在越嶲西南一名昆彌以昆明有池方三百里漢書注臣瓚曰昆明有滇池通典昆明以西洱河為境亦曰昆彌川漢武像其形鑿池非滇池也人西洱河即古葉榆澤在今雲南大理府城東如耳形亦曰洱海方三百里有三島四洲之勝乃作昆明池以習水戰故吏弄法者皆謫令伐棘上林穿昆明池考漢書西南夷𫝊夜郎以西滇最大桐師以東北至葉榆為嶲昆明是滇與昆明乃兩國臣瓚以滇池屬之昆明非是杜佑指西洱為昆明之池葢承漢書北至葉榆之文也得神馬于渥洼音握窐水中李斐曰南陽新野有暴利長遭刑屯田燉煌界數于此水旁見羣野馬中有奇者與凡馬異來飲此水利長先作土人持勒絆于水旁後馬玩習乆之乃代土人持勒絆收得此馬獻之欲神異此馬故云從水中出黨渥洼水西域圖誌云氐置水之支流也氏置水即今河在燉煌縣南帝方立樂府顔師古曰樂府之名起此及司馬相如等造為歌詩以宦者李延年李夫人兄為協律都尉絃次以合八音之調及得神馬次以為歌其詞曰太一况天馬下霑赤汗沫流赭志俶儻精權竒籋浮雲晻上持體容與迣萬里今安匹龍為友汲黯曰王者作樂上以承祖宗下以化兆民今陛下得馬詩以為歌協于宗廟先帝百姓能知其音耶上黙然不悦壬戌四年冬造皮幣白金鑄三銖錢置鹽鐡官算緡錢舟車有司言縣官用度太空而富商大賈財或絫萬金不佐國家之急請更錢造幣以贍用而摧浮滛兼并之徒時禁苑有白鹿而少府多銀錫乃以白鹿皮方尺縁以藻繢為皮幣直四十萬朝覲聘享必以皮幣薦璧然後得行又造銀錫為白金三品時議以為天用莫如龍地用莫如馬人用莫如龜故白金之品大者圜之其文龍直三千次方之其文馬直五百小者橢之其文龜直三百橢他果反令縣官銷半兩錢更鑄三銖錢盗鑄者罪皆死於是以東郭咸陽東郭以地為氏咸陽名齊之大煮鹽孔僅南陽大冶為大農丞大農令有兩丞領鹽鐡事桑𢎞羊桑氏秦大夫子桑之後𢎞羊洛陽賈人子以計算用事三人言利事悉秋毫禁民敢鑄鐡器煮鹽釱徒計反左趾以鐡為鉗著左足以代刖没入其器物又令諸賈人末作各以其物自占各隠度其財物之多少為名簿送之于官率緡錢二千而一算緡絲也以貫錢一貫千錢出算二十也及民有船車者皆算皆平作錢數每千錢一算匿不自占占不悉戍邊一嵗没入緡錢有能告者以其半畀之其法大抵皆出張湯湯每朝奏事語國家用日旰天子至忘食焉以卜式為中郎賜爵左庶長初河南卜式數輸財助邊上使使問式欲官乎曰不願有寃欲言乎曰無所欲言如此何欲曰天子誅匈奴愚以為賢者宜死節於邊有財者宜輸委而匈奴可滅也上由是賢之欲尊顯以風百姓乃召拜式為中郎賜爵左庶長田十頃布告天下使明知之式先牧羊山中十餘年羊致千餘頭及為郎不願仕上曰吾有羊在上林中欲令子牧之式布衣草蹻而牧羊嵗餘羊肥息上過而善之式曰非獨羊也治民亦猶是也以時起居惡者輒去毋令敗羣上竒其言以為緱氏令民便之未幾擢為齊相春有星孛于東北夏長星出西北遣衛青霍去病擊匈奴青部前将軍李廣失道自殺去病封狼居胥山在漠北今喀爾喀地而還詔以青去病皆為大司馬是年始置以冠将軍之號上與諸將議大發士卒粟馬十萬令大將軍青票騎將軍去病各将五萬騎擊匈奴青出定襄去病出代郡李廣請行上以其老弗許良久許之隂戒大将軍以廣老數竒毋令當單于以為前將軍公孫賀為左将軍趙食其音異箕主爵都尉為右將軍曹襄平陽侯為後將軍皆屬大將軍青既出塞捕虜知單于所居乃自以精兵走之而令前將軍廣併于右將軍軍出東道廣請曰臣部為前將軍今大將軍乃徙令出東道臣願居前先死單于青以受上誡不聽廣遂行青度幕見單于兵陳而待于是令武剛車兵車也有巾有葢自環為營而縱五千騎往當匈奴匈奴亦縱可萬騎㑹日且入大風起砂磔擊面兩軍不相見漢益縱左右翼繞單于單于視漢兵多度不能戰遂乗六騾冐圍而去漢發輕騎夜追之不得單于捕斬首虜萬九千級遂至寘顔山趙信城俱在喀爾喀地城趙信所築故名燒其積粟而還廣與食其軍無導惑失道後期大將軍還過幕南乃遇之責廣之幕府對簿廣謂其麾下曰廣結髪與匈奴七十餘戰今幸接單于兵而大將軍徙廣部行囘逺而又迷失道豈非天哉且廣年六十餘矣終不能復對刀筆之吏遂自剄廣為人㢘得賞賜輒分其麾下為二千石四十餘年家無餘財將兵乏絶之處見水士卒不盡飲廣不近水不盡食不嘗食士以此愛樂為用及死一軍皆哭百姓聞者無老壯皆為流涕食其下吏當死贖為庶人去病出代右北平二千餘里絶大幕直左方兵匈奴諸左王將居東方獲王將相等八十餘人封狼居胥山禪于姑衍山名在漠北登臨瀚海在蘇尼特之北喀爾喀之南其西接伊犁界斬七萬級功多于大將軍青既皆還去病益封五千八百户青不得益封置大司馬位青去病皆為之自是青日退而去病日益貴去病為人少言不泄有氣敢往帝嘗欲敎之孫呉兵法對曰顧方畧何如耳不至學古兵法帝為治第令視之對曰匈奴未滅無以家為帝益愛重之青為人仁喜士退讓以和柔自媚于上兩人志操如此是時漢所殺虜匈奴合八九萬而漢士卒物故亦數萬是後匈奴逺遁而幕南無王庭匈奴所都處為庭漢渡河自朔方以西至令居漢縣故城在今甘肅凉州府平番縣往往通渠置田官稍蠶食匈奴以北然亦以馬少先兩軍出塞官私馬十四萬匹復入塞者乃不滿三萬匹不復大出擊匈奴矣以義縱河東人為右内史王温舒陽陵人為中尉初縱為南陽太守按寗成家破之成坐免南陽吏民重足一迹言累及也後徙定襄方至掩獄中重罪輕繫及私入視者一切捕鞠曰為死罪解脫是日皆報殺四百餘人郡中不寒而栗時趙禹張湯以深刻為九卿然其治尚輔法而行縱專以鷹擊為治是嵗汲黯免乃以縱為右内史温舒始為廣平今直𨽻廣平府是都尉盗賊不敢近廣平遷守河内以九月至令郡具私馬五十匹為驛捕郡中豪猾相坐二千餘家上書請大者至族小者乃死奏行不過二三日得可事論報至流血十餘里盡十二月郡中無聲會春温舒頓足嘆曰嗟乎令冬月得益展一月足吾事矣上聞之以為能擢中尉温舒所為弗先言縱縱必以氣陵之然縱㢘其治效郅都時楊可方受告緡時下告緡令人有告不出緡者可方受之縱以為此亂民部吏捕其為可使者上以縱為廢格沮事棄縱市温舒少文居它惛惛不辨至中尉則心開故善謟有執家雖有姦如山弗犯無執雖貴戚必侵辱後徙右内史復行中尉會發兵大宛詔徵豪吏温舒匿之人告温舒受吏錢及它姦利事罪至族自殺其時温舒兩弟及兩婚家亦各自坐它罪而族光禄勲郎中令更名徐自為曰悲夫古有三族而王温舒罪至同時而五族乎温舒與弟同三族而兩婚家合一故為五也方士文成將軍少翁伏誅齊人少翁以鬼神方見上上有所幸王夫人齊王聞之母卒少翁以方夜致鬼如王夫人之貌天子自帷中望焉于是拜少翁為文成將軍以客禮之文成又勸上為臺室而置祭具以致天神居嵗餘其方益衰乃為帛書以飯牛陽不知言曰此牛腹中有竒殺視得書書言甚怪天子識其手書于是誅之癸亥五年春三月丞相蔡有罪自殺坐盜孝景園堧地也罷三銖錢更鑄五銖錢有司言三銖錢輕易作姦詐請鑄五銖錢周郭其質令不可摩鎔以汲黯為淮陽太守于時民盗鑄錢楚地尤甚乃召拜汲黯為淮揚太守黯曰臣自以為填溝壑不得見陛下不意復收用之臣常有狗馬病力不能任郡事臣願為中郎出入禁闥補過拾遺臣之願也上曰君薄淮陽耶吾今召君矣顧淮陽吏民不相得吾徒得君之重卧而治之黯既辭行過大行李息曰黯棄逐居郡不得與朝廷議矣御史大夫湯内懐詐以御主心外挾賊吏以為威重公列九卿不蚤言公與之俱受戮矣息終不敢言及湯敗帝抵息罪黯居淮陽十嵗而卒夏四月以莊青翟髙祖功臣武彊侯莊不識孫嗣侯為太子少傅為丞相甲子六年冬十月雨水無氷夏四月廟立顔師古曰于廟中䇿命之子閎為齊王旦為燕王胥為廣陵王初作誥䇿三王同日立賜䇿各以國土風俗申戒閎立八年薨無子國除旦胥後俱以罪自殺事具後秋九月大司馬票騎將軍冠軍侯霍去病卒諡曰景桓帝甚悼之令為冡像祁連山初去病為票騎將軍擊匈奴道出河東迎見其父霍仲孺仲孺自平陽侯家歸絶不相聞去病既壯大始自知為仲孺子時仲孺已娶婦生子光字子孟去病大為父買田宅奴婢將光西至長安任為郎稍遷至奉車都尉帝置掌御乗輿車光禄大夫即中大夫更名殺大農令顔異邾俠之後夷父字顔子孫因以為氏異濟南人初異以㢘直至九卿上既造白鹿皮幣問異異曰今王侯朝賀蒼璧直數千而皮幣反四十萬本末不相稱上不悅人有告異他事下張湯治異與客語客言初令下有不便者異不應微反脣湯奏當異九卿見令不便不入言而腹誹論死自是之後有腹誹之法比而公卿大夫多謟諛取容矣御批歴代通鑑輯覽卷十五

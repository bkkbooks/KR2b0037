  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_039-1a, image: WYG0336/WYG0336-0368a.png}
body:
  text: 初魏主詔有司議定雅樂當時無有知者至是始集新舊樂章非雅者除之後復簡制樂官命中書監高閭參定在太和十一年魏光禄大夫咸陽公高允卒諡曰文允厯事五帝太武景穆文成獻文及高祖出入三省尚書中書秘書五十餘年未嘗有譴魏主甚重之允仁恕簡静雖處貴重情同寒素執書吟覽晝夜不去手誨人以善恂恂不倦篤親念故無所遺棄顯祖徙青徐望族于代多允婚媾流離饑寒允傾家賑施咸得其所又隨其才行薦之于朝議者多以初附間之允曰任賢使能何有新舊至是卒年九十八贈司空二月齊敗魏師取舞陽先是齊荒人桓天生自稱桓元宗族據河南故城在南陽府新野縣劉宋僑置齊廢請兵于魏齊遣將軍陳顯逹戴僧静等討之至是天生引魏兵至沘陽漢縣明改泌陽今屬南陽府顯逹遣僧静等與戰大破之天生退保沘陽僧静圍之不克齊以顯逹為雍州刺史進據舞陽城明年天生復引魏兵出據隔城齊將軍曹虎擊破魏兵遂拔隔城斬其太守天生棄城走已而魏築城于醴陽陳顯逹攻拔之進攻沘陽魏鎮將韋珍憑城拒戰顯逹乃還隔城醴陽城故址俱在南陽府桐栢縣曹虎字士下邳人魏大旱秋七月詔有司賑貸魏春夏大旱代地尤甚牛疫民死齊州刺史韓麒麟上表畧曰京師民庶不田者多遊食之口三分居二豐稔積年矜夸成俗貴富之家童妾袨服工商之旅僕隷玉食而農夫缺糟糠蠶婦乏短褐故令耕者日少田有荒蕪愚謂凡侈異之物皆宜禁斷吉凶之禮備為格式勸課農桑嚴加賞罰數年之中必有盈贍往年比校户貫租賦輕少雖于民為利而不可長久脫有戎役或遭天災恐供給之方無所取濟請減絹帛増穀租年豐多積嵗儉出賑所謂私民之榖寄積于官官有宿積則民無荒年矣于是詔有司開倉賑貸聽民出闗就食遣使造籍以分去留所過給糧所至三長見前贍養之又詔罷無益之作出宫人不執機杼者時魏久無事府藏盈積盡出御府衣服珍寶太官雜器大僕乘具内庫弓矢刀鈴十分之八外府衣物繒布絲纊非供國用者以大半班賚百司下至工商皂隸逮于六鎮邊戍畿内孤寡貧癃有差後又詔犯死刑而親老無他子旁親者以聞八月柔然侵魏魏人擊敗之高車阿伏至羅自立為王柔然伏古敦可汗殘暴部衆離心八月㓂魏邊魏以尚書陸叡代人麗子為都督擊破之初高車阿伏至羅有部落十餘萬役屬柔然伏古敦之侵魏也阿伏至羅諌不聽怒與從弟窮竒帥部落西走自立為王二人甚親睦分部而立伏古敦擊之屢為所敗乃引衆東徙冬十二月魏以高祐字子集允從祖弟為西兖州此魏天興初所置兖州也治滑臺城皇興中得宋兖州故于此稱西太和十八年改為東郡屬司州至後孝昌中别置西兖州治定陶地形志所載甚明質實不詳目中出鎮滑臺之文而以定陶之西兖釋此誤矣刺史魏主問祐曰何以止盗曰昔宋均立徳猛虎渡河卓茂行化蝗不入境事俱見前况盗賊人也茍守宰得人治化有方止之易矣祐又言今之選舉不採職治之優劣専簡年勞之多少非所以盡人才也若停薄藝棄朽勞惟才是舉則官方穆矣又勲舊之臣才非撫民者可加以爵賞不宜委以方任所謂王者可私人以財不可私人以官者也魏主善之及出鎮滑臺命縣立講學黨立小學戊齊永明六年魏辰太和十二年冬齊呉興饑西陵戍主杜元懿言呉興無秋會稽豐登商旅往來倍多常嵗牛埭今紹興府蕭山縣西有西興塲即六朝時西陵牛埭用牛挽船過埭故名稅格日可增倍乞與領攝一年格外可長四百許萬會稽行事顧憲之字士思呉郡呉人議以為不可憲之言始立牛埭非逼蹴以取稅也以風濤迅險濟急利物耳領監者不逹其本各務己功或禁遏他道或空稅江行今呉興薦饑民流衆散舊格尚減將何以加元懿不仁幸災榷利若事不副言懼加譴詰必百方侵若為公賈怨愚又以便宜者非能于民力之外用天分地率皆即日不宜于民方來不便于公名與實反有乖政體凡如此等宜加深察齊主納之而止魏主詔羣臣言事秘書臣李彪字道固頓邱衛國人上封事陳安民之術畧曰豪貴之家奢僣過度第宅車服宜為等制又國之興亡在冢嗣之得失宜準古立師𫝊以訓導太子又漢置常平倉以救匱乏去嵗京師不稔移民就豐既廢管生且損國體宜豫儲倉粟安而給之請析州郡常調九分之二京師度支嵗用之餘各立官司年豐糴粟積之于倉儉則加私之二糶之于人年登則常積嵗凶則直給數年之中榖積而人足矣又請于河表七州之人擢其門才引令赴闕隨能序之以廣聖朝均新舊之義以懷江漢歸有道之情又父兄有犯子弟當素服肉袒詣闕請罪子弟有坐父兄露板引咎乞解所司足以敦厲凡溥又朝臣遭親䘮者假滿赴職衣錦乘軒鳴玉垂緌傷人子之道虧天地之經愚謂凡遭大父母父母䘮者皆令終服或起令視事但綜司出納敷奏國慶一令無預河表大河之外七州荆兖豫洛青徐齊也魏主悉從之由是公私豐贍水旱有備己齊永明七年魏巳太和十三年夏五月齊中書監南昌公王儉卒儉卒禮官欲諡為文獻吏部尚書王晏素與儉不平啟齊主曰此諡宋氏以來不加異姓出謂人曰平頭憲事已行矣乃諡文憲儉常薦御史中丞徐孝嗣字始昌湛之之孫自代至是徵為五兵尚書通考魏置五兵尚書五兵謂中兵外兵騎兵别兵都兵也晉以後皆有之秋八月魏遣使如齊冬十二月齊遣使如魏魏久與齊絶魏主欲遣使令羣臣議尚書游明根曰朝廷不遣使者又築醴陽其直在彼今復遣使不亦可乎由是通好明年齊人歸魏隔城之俘齊以張緒領揚州中正江斆字叔文湛之曾孫為都官尚書宋置領都官水部庫部功論四曹長沙王晃字宣明太祖第四子屬張緒用呉興聞人邕緒不許晃使固請緒正色曰此是身家州鄉殿下安得見逼中書舍人紀僧真得幸于齊主請于齊主曰臣出自武吏階榮至此無復所須唯就陛下乞作士大夫齊主曰此由江斆謝瀹字義潔朏之弟可自詣之僧真詣斆登榻坐定斆顧左右曰移吾牀逺客僧真喪氣而退告齊主曰士大夫故非天子所命庚齊永明八年魏午太和十四年秋七月齊荆州刺史巴東王子響字雲音齊主第四子有罪㐲誅子響有勇力好武事自選帶仗左右六十人數以牛酒犒之私作錦袍絳襖欲以餉蠻交易器仗長史劉寅等宻聞子響執寅等殺之齊主欲遣戴僧静討之僧静曰巴東王年少長史執之太急忿不思難故耳天子兒過誤殺人有何大罪忽遣軍西上人情惶懼齊主心善之乃别遣衛尉胡諧之豫章南昌人將軍尹畧中書舍人茹法亮詣江陵勅之曰子響若束手來歸可全其命諧之至築城燕尾洲在今荆州府江陵縣西南子響白服登城遣使云天下豈有兒反今便單舸還闕受殺人之罪何築城見捉耶尹畧獨答曰誰將引也汝反父人共語子響灑泣乃殺牛具酒饌餉臺軍畧棄之江流子響呼法亮求見傳詔法亮執其使子響怒遣兵西渡與臺軍戰臺軍敗畧死諧之逃齊主又遣丹陽尹蕭順之字文緯梁武帝父將兵繼至子響即日乘舴艋小船也赴建康太子長懋素忌子響宻諭順之早為之所勿令得還子響見順之欲自申明順之不許于射堂縊殺之久之齊主遊華林園見一猿透擲悲鳴左右曰猿子前日墜崖死齊主因嗚咽流涕順之慚懼而卒臺軍焚江陵府舍皆盡齊主以南湯樂藹為荆州治中藹繕廨舍數百區頃之咸畢而役不及民荆民稱之淯樂藹字蔚逺南陽陽人九月魏太后馮氏殂諡文明太皇太后魏主勺飲不入口者五日哀毁過禮羣臣諌之始進一粥王公表請定兆域詔曰奉侍梓宫猶希髣髴山陵遷厝所未忍聞王公固請乃𦵏永固陵先是魏主如方山馮太后樂其山川曰他日必𦵏我于此乃營夀陵作永固石室及是太后殂遂𦵏方山不從金陵之兆方山在大同府大同縣北永固陵在其上太尉丕等請抑至情奉行舊典魏主曰祖宗情専武畧未修文教朕仰禀聖訓庶習古道論時比事與先世不同又問游明根等曰聖人制卒哭之禮授服之變皆奪情以漸今旬日之間言及即吉得無傷于禮乎對曰踰月而𦵏𦵏而即吉此金冊遺㫖以太后遺㫖書之金冊也魏主曰金冊之㫖羣公之請慮廢政事朕今不敢闇黙不言以荒庶政惟縗麻廢吉禮朔望盡哀誠故専欲行之秘書丞李彪曰漢明徳馬后保養章帝后崩𦵏不淹旬尋已從吉章帝不受譏明徳不損名願陛下察之魏主曰朕眷戀衰絰實情所不忍豈徒茍免嗤嫌且公卿每稱四海晏安禮樂日新可以參美唐虞今乃苦奪朕志使不踰魏晉何耶又曰古王者亦有除衰而諒闇終喪者若不許朕衰服則當除哀拱黙委政冢宰二事惟公卿所擇明根曰淵黙不言大政將曠仰順聖心請從衰服魏主曰朕在不言之地不應如此喋喋但公卿欲奪朕情遂成往復追用悲絶遂號慟而入羣臣亦哭而出初太后忌魏主英敏恐不利于己盛寒誾于空室絶食三日欲廢之魏主無憾意又有宦者譖于太后太后杖之及太后殂魏主亦不復問冬十月齊議鑄錢不果行初齊太祖以南方錢少更欲鑄錢建元末奉朝請孔顗上言畧曰鑄錢之弊在輕重屢變重錢患難用而難用為累輕輕錢弊盗鑄而盗鑄為禍深民所以盗鑄嚴法不能禁者由上惜銅愛工不詳慮其為患也漢興鑄輕錢巧偽者多及鑄五銖民計其費不能相償私鑄益少此不惜銅不愛工之效也宋帝鑄四銖至景和錢益輕雖有周郭而鎔冶不精于是盗鑄紛紛而起不可復禁此惜銅愛工之驗也自漢至宋五百餘年制度世有興廢而不變五銖者明其輕重可法得貨之宜故也自晉氏不鑄錢後經㓂戎水火所失嵗多愚以為宜如舊制大興鎔鑄錢重重五銖一依漢法嚴斷翦鑿輕小破缺無周郭者不得行官錢小者銷以為大利貧良之民塞姦巧之路錢貨既均百姓樂業矣太祖然之使州郡大市銅炭會晏駕事寢是嵗益州行事劉悛字士操彭城人言嚴道銅山注見前舊鑄錢處可以經畧齊主從之頃之以功費多而止辛齊永明九年魏未太和十五年春正月魏主始聽政魏主自居太后之喪至是始聽政于皇信堂之東室已而魏主謁永固陵設薦于太和廟始薦蔬食追感哀哭終日不飯侍中馮誕等諫經宿乃飯罷朝夕哭正馮誕字熙之子二月齊遣使如魏夏四月魏遣使如齊散騎常侍裴昭明駰之子侍郎謝竣如魏弔欲以朝服行事主客曰弔有常禮何得以朱衣入昭明等曰受命本朝不敢輙易往還數四魏主命著作郎成淹字季文上谷居庸人與之言昭明曰魏朝不聽使者朝服出何典禮淹曰羔裘元冠不以弔此童稚所知也昭明曰齊高皇帝之喪魏遣李彪來弔初不素服齊朝亦不以為疑何今日而見逼邪淹曰齊不能行亮隂之禮踰月即吉彪不得主人之命固不敢以素服往厠其間今皇帝仁孝居廬食粥豈得以此方彼乎昭明曰三王不同禮孰能知其得失淹曰然則虞舜高宗非邪昭明竣相顧而笑曰非孝者無親何可當也乃對曰弔服唯主人裁之然違命本朝返必獲罪淹曰使彼有君子卿將命得宜且有厚賞若無君子卿出而光國得罪何傷自當有良史書之乃以衣㡊給之魏主嘉淹之敏遷侍郎賜絹百疋四月魏遣員外㪚騎常侍李彪等聘于齊齊為置燕設樂彪辭曰主上孝思罔極興墜正失朝臣雖除衰絰猶以素服從事使臣不敢承奏樂之賜從之彪凡六奉使齊主甚重之將還親送至瑯邪城命羣臣賦詩以寵之瑯邪城晉僑郡在江乘齊徙白下在今上元縣西北五月魏主更定律令親决疑獄魏主更定律令于東明觀親决疑獄命李冲議定輕重潤色辭㫖然後書之冲忠勤明斷加以慎宻為魏主所委情義無間舊臣貴戚莫不心服中外推之秋八月魏正祀典魏主銳意復古尤重祭典先是親祀南郊始備大駕又祭方澤太和十三年既而復作明堂營太廟是年四月定廟祧之制詔尊烈祖為大祖以世祖與顯祖為二祧餘皆以次遷二祧禮記祭法逺廟為祧有二祧正義曰廟在應遷之例故曰逺特為功徳而留故曰祧祧之為言超也二祧者二廟不遷以遷廟之主藏焉考六宗之禮六宗之說凡十有一家魏主以六宗即天皇大帝及五帝之神既祭南郊無煩别立六宗之位正禘祫之名魏主問羣臣以禘祫之義鄭王是非安在游明根從鄭高間從王詔圜丘宗廟皆有禘名從鄭禘祫并為一祭從王著之于令俱是年之七月至是詔朝日以朔夕月以朏時議朝日夕月皆欲以二分之日于東西郊行禮魏主從前秘書監薛謂說用朔朏朏月之初生三日也又宗廟四時之祭祀舊用中節自後改用孟月擇日而祭魏舊制每嵗祀天于西郊魏主與公卿從二十餘騎戎服遶壇謂之蹋壇明日戎服登壇祀畢又遶壇謂之遶天至是罷之又罷羣祀之非典者四十餘所九月魏主祥祭于廟冬十月謁永固陵十一月魏主禫祭遂祀圜丘明堂饗羣臣遷神主于新廟有司上言求卜祥日詔曰筮日求吉既乖敬事之志又違永慕之心今直用晦日前一日夜宿于廟帥羣臣哭已易服縞冠革帶黒屨侍臣易服黒介幘白絹單衣革帶烏屨遂哭盡一夜明日易祭服縞冠素紕白布深衣繩屨侍臣去幘易幍既祭出廟立哭久之乃還十月謁永固陵毁瘠尤甚司空穆亮諫曰王者為天地所子為萬民父母未有子過哀而父母不戚父母憂而子獨悦豫者也今和氣不應風旱為灾願陛下襲輕服御常膳庶使天人交慶詔曰孝悌之至無所不通今飄風旱氣皆誠慕未濃幽顯無感也所言過衷之咎諒為未衷十一月禫祭始服衮冕易黑介幘素紗深衣拜陵而還冬至祀圜丘遂祀明堂臨太華殿服通天冠綘紗袍以餐羣臣樂懸而不作服衮冕辭太和廟帥百官奉神主遷于新廟齊律書成齊主留心法令詔獄官詳正舊注晉張斐杫預所注律也宋㤗始以來用之律文簡約或一章之中兩家所處生殺頓異臨時吏得為姦詔公卿參議竟陵王子良總其事衆不能一者制㫖平决是嵗書成廷尉孔稚珪表言律文雖定茍用失其平則寃魂猶結古之名流多有法學今之士子莫肯為業縦有習者世議所輕將恐此書永淪胥吏之手矣今若置律助教國子有欲讀者䇿試擢用庶幾士流勸慕詔從之事竟不行山孔稚珪字徳璋隂人壬齊永明十年魏申太和十六年春正月魏主宗祀明堂朔之次日魏主宗祀顯祖于明堂以配上帝遂登靈臺以觀雲物降居青陽左个布政事越二日始以太祖配南郊是春二月魏主始朝日于東郊自是朝日夕月皆親之魏定行次五行之次為水徳魏主命羣臣議行次高閭以魏得姓出于軒轅宜為土徳李元等以為司馬祚終而拓跋受命不可捨晉而為土穆亮等皆附其議乃詔為水徳祖申臘辰魏修堯舜禹周公孔子之祀祀堯于平陽舜于廣寗漢縣晉改大寗後廢故城在今宣化府宣化縣禹于安邑周公于洛陽皆戍牧守執事其宣尼之廟祀于中書省改諡曰文聖尼父親行拜祭齊大司馬太傅豫章王嶷卒諡曰文獻嶷性仁謹亷儉不事財賄齋庫失火燒荆州還資嶷自荆州還為揚州評直三千餘萬杖主局數十而已疾篤遺令諸子曰才有優劣位有通塞運有貧富此自然之理無足以相陵侮也及卒第庫無見錢敕月給錢百萬贈假黄鉞都督丞相喪禮皆如漢東平獻王故事秋七月吐谷渾遣子入朝于魏初魏主召吐谷渾王伏連籌入朝不至而修洮陽注見前泥和魏書作洪和故城在今鞏昌府洮州二戍置兵焉魏遣兵伐之拔二戍及馮太后之喪使人告哀伏連籌拜命又不恭羣臣請討之魏主不許又請還其貢物魏主曰貢物乃人臣之禮今而不受是棄絶之彼雖欲自新其路無由矣因命歸洮陽泥和之俘于是吐谷渾遣其世子賀虜頭入朝于魏魏遣使如齊魏散騎常侍宋弁字義和隱之孫聘于齊及還魏主問江南何如弁曰蕭氏父子無大功于天下既以逆取不能順守政令苛碎賦役繁重朝無股肱之臣野有愁怨之民其得没身幸矣非貽厥孫謀之道也是冬十二月齊蕭琛范雲聘于魏魏主甚重之親與談論顧謂羣臣曰江南多好臣侍臣季元凱曰江南多好臣嵗一易主江北無好臣百年一易主魏主主甚慙八月魏主養老于明堂以尉元為三老游明根為五更魏主再拜三老親袒割牲執爵而饋肅拜五更且乞言焉元明根勸以孝友化民又養國老庶老于階下禄三老以上公五更以元卿齊詔太子家令沈約撰宋書約撰宋書疑立袁粲傳齊主曰袁粲自是宋室忠臣約又多載宋世祖太宗諸鄙凟事齊主曰孝武事迹不容頓爾我昔經事明帝卿可思諱惡之義于是多所刪除癸齊永明十一年酉魏太和十七年春正月齊太子長懋卒齊主晚年好遊宴尚書曹事分送太子省之由是威加内外太子性奢靡治堂殿園囿過于上宫而莫敢以聞者及卒齊主乃見其服玩大怒敕皆毁除太子素惡西昌侯鸞嘗曰我殊不喜此人不解其故當由其福薄故也及鸞得政太子子孫無遺焉二月齊雍州刺史王奐字彦孫彧兄子有罪伏誅奐惡寧蠻長史劉興祖誣其搆扇山蠻殺之齊主大怒遣中書舍人吕文顯等收奐敕鎮西司馬曹虎會之奐子彪素凶險奐不能制輙發州兵閉門拒守奐門生鄭羽叩頭啟奐乞迎臺使奐曰我不作賊欲先遣啟自申正恐曹吕輩小人相陵藉故且閉門自守耳彪遂出與虎戰兵敗走歸司馬黄瑶起長史裴叔業聞喜人居襄陽等起兵攻奐斬之執彪及弟爽弼并誅之彪弟肅字恭懿獨得脫奔魏夏四月齊主立其孫昭業字元尚為太孫東宫文武悉起為太孫官屬秋七月魏立子恂為太子初恂始生文明太后以恂當為太子乃賜其母林氏平原人死自撫養之及長太后親為立名字字元道至是魏主以為太子魏詔大舉伐齊魏主以平城地寒六月雨雪風沙常起將遷都洛陽恐羣臣不從乃議大舉伐齊欲以脇衆命太常卿王諶筮之遇革魏主曰湯武革命順乎天而應乎人吉孰大焉任城王澄字道鎮景穆帝孫曰陛下奕葉重光帝有中土今出師而得革命之象未為全吉也魏主厲聲曰社稷我之社稷任城欲沮衆邪澄曰社稷雖為陛下之有臣為社稷之臣安可知危而不言邪魏主還宫召澄屏人謂曰今日之舉誠為不易但國家興自朔土徙居平城乃用武之地非可文治移風易俗其道誠難朕欲因此遷宅中原卿以為何如澄曰陛下欲卜宅中土以經畧四海此周漢之所以興隆也魏主曰北人習常戀故必將驚擾奈何澄曰非常之事故非常人之所及陛下斷自聖心彼亦何所能為魏主曰任城吾之子房也于是戒嚴發露布及移書稱當南伐齊主賾殂太孫昭業立是為廢帝鬱林王以竟陵王子良為太傅蕭鸞為尚書令齊主聞有魏師詔發徐揚民丁廣設召募以備之竟陵王子良于東府募兵板中書郎王融寧朔將軍使典其事融躁于名利自恃人地三十内望為公輔嘗夜直省中撫案歎曰為爾寂寂鄧禹笑人行逢朱雀桁開喧湫不得進槌車壁歎曰車前無八騶何得稱丈夫子良愛其文學特親厚之會齊主不豫召子良甲仗入侍齊主慮朝野憂惶力疾召樂府奏伎子良日夜在内太孫間日參承俄而齊主疾亟蹔絶太孫未入融欲矯詔立子良詔草已立適太孫至融戎服絳衫于中書省閤口斷其仗不得進頃之齊主復蘇問太孫所在召入以朝事委僕射西昌侯鸞乃殂諡武皇帝廟號世祖世祖留心政事務總大體嚴明有斷郡縣久于其職故永明之世百姓豐樂盗賊屏息然頗好遊宴華靡之事常言恨之未能頓遣及殂遺詔子良輔政鸞知尚書事内外事無大小悉與鸞參决融以子良兵禁諸門鸞聞之馳至雲龍門不得進鸞曰有敕召我排之而入奉太孫登殿命左右扶出子良融知不遂釋服還省歎曰公誤我矣初齊主昭業養于子良妃袁氏慈愛甚著及王融有謀遂深忌之以子良居中書省遣虎賁中郎將潘敞領仗防之既成服諸王皆出子良乞停至山陵不許遂稱遺詔以鸞為尚書令子良為太傅𦵏世祖于武進景安陵魏主發平城魏主發平城南伐步騎三十餘萬使太尉丕廣陵王羽字叔翻獻文帝子留守齊中書郎王融有罪伏誅齊主深怨王融即位十餘日即收融下廷尉獄融求援子良子良憂懼不敢救遂賜死融臨死歎曰若不為百嵗老母融母謝恵宣女教融書學欲吐一言融意欲指斥齊主東宫時過失也齊主性慧辯美容止而矯情飾詐隂懷鄙慝初從竟陵王在西州每宻就富人求錢夜開後閤與左右滛宴諸營署所愛皆逆加官爵疏于黄紙使囊盛帶之許南面之日依此施行侍文恵太子疾及居䘮憂容號毁裁還私室即歡笑酣飲常令女巫楊氏禱祀速求天位及太子卒謂由楊氏之力呼為楊婆民間為作楊婆兒歌及為太孫世祖有疾又令楊氏禱祀與何妃書作一大喜字而三十六小喜字繞之侍世祖疾言發淚下世祖以為必能負荷大業臨終執其手曰若憶翁當好作遂殂大歛始畢悉呼世祖諸伎備奏衆樂及𦵏輼輬車未出端門亟稱疾還于閤内奏胡伎鞞鐸之聲響震内外九月魏主至洛陽罷兵冬十月營洛都魏主至洛陽霖雨不止詔諸軍前發魏主戎服執鞕乘馬而出羣臣稽首馬前泣諫魏主乃諭曰今者興發不小動而無成何以示後茍不南伐當遷都于此王公以為何如南安王楨景穆帝子進曰陛下輟南伐之謀遷都洛陽此臣等之願蒼生之幸也時舊人雖不願内徙而憚于南伐無敢言者遂定遷都之訃罷兵十月徴穆亮字幼輔羆之弟與李冲將作大匠等經營洛都設壇于滑臺城東以告行廟遣澄還平城諭留司百官聞者盡駭澄援引古今以曉之衆乃開㐲謂曉諭以發其䝉莫不厭伏也澄還報魏主喜曰非任城朕事不成魏以王肅為輔國將軍王肅見魏主于鄴陳伐齊之策魏主與之言不覺促席移晷自是器遇日隆人莫能間或屏左右語至夜分自謂相得之晚時魏主方議興禮樂變華風凡威儀文物皆肅所定齊益州刺史劉悛坐贓禁錮初悛罷廣司二州傾貲以獻世祖家無留儲世祖嘗幸悛宅悛捧金澡盆面廣三尺愛姬執金澡罐受四升以充沃盥因以奉獻納之及齊主即位以悛所獻減少怒欲殺之西昌侯鸞救之得免猶禁錮終身甲齊主昭業隆昌元年昭文延興元年高戌宗明帝鸞建武元年魏太和十八年春正月齊以隨王子隆字雲興武帝第八子為撫軍將軍西昌侯鸞將謀廢立引蕭衍與同謀荆州刺史隨王子隆有文才鸞欲徴之恐其不從衍曰隨王雖有美名其實庸劣止須折簡耳乃召子隆為撫軍將軍豫州刺史崔慧景高武舊將鸞疑之以衍為寧朔將軍戌夀陽慧景懼白服出迎衍撫安之崔慧景字君山東武城人魏主南廵祭比干墓注見前魏主過比干墓祭以太牢自為文曰嗚呼介士胡不我臣齊蕭鸞殺直閣將軍周奉叔齊主昭業寵幸中書舍人綦母珍之朱隆之直閣將軍曹道剛周奉叔宦者徐龍駒等有司相語曰寧拒至尊敕不可違舍人命自山陵之後即與左右微服遊走市里擲塗賭跳作諸鄙戲世祖聚錢及金帛不可勝計未期嵗用垂盡西昌侯鸞數諫不從心忌鸞欲除之以衛尉蕭諶字彦孚世祖族子征南􅖴議蕭坦之字君平齊宗室皆祖父舊人甚親信之何后亦淫泆與左右楊珉通齊主恣之齊閤夜開無復分别鸞遣坦之入奏誅珉何后流涕救之坦之固請齊主不得已而許之鸞又啟誅徐龍駒齊主亦不能違而心忌鸞益甚諶坦之見齊主狂縱日甚恐禍及已乃更勸鸞廢立隂為耳目齊主不之覺也周奉叔恃勇挾勢陵轢公卿每語人曰周郎刀不識人鸞忌之使二人說齊王出奉叔為外援以為青州刺史將之鎮稱敕召入毆殺之魏中書侍郎韓顯宗字懋卿麒麟子上書言事魏主如洛陽西宫顯宗上書陳四事其一以為竊聞輿駕今夏不廵三齊當幸中山蠶麥方急何以堪命願早還北京以省諸州供張其二以為洛陽宫殿故基皆魏明帝所造前世已譏其奢宜加裁損北都富室競以第舍相尚宜因遷徙為之制度端廣衢路通利溝渠其三以為陛下之還洛陽輕將從騎王者于闈闥之内猶施警䠋况涉履山河而不加三思乎其四以為陛下日對百辟心虞萬幾景昃而食夜分而寢加以孝思之至隨時而深文章之業日成篇卷雖叡明所用未足為煩非所以嗇神養性也魏主頗納之顯宗又上言以為州郡貢察徒有秀孝之名而無其實朝廷但檢其門望不復彈坐如此則可令别貢門望何用假冒秀孝之名也夫門望者乃其父祖之遺烈何益于時益于時者賢才而已茍有其才雖屠釣奴虜聖主不耻以為臣苟非其才雖三后之裔墜于皂隸矣又刑罰之要在于明當今内外之官欲邀當時之名争以深刻為無私迭相敕厲遂成風俗陛下居九重之内視人如赤子百司分萬務之任遇下如仇讐是則堯舜止一人而桀紂以千百和氣不至蓋由于此又昔周居洛邑猶存宗周漢遷東都京兆置尹春秋之義邑有宗廟曰都况代京陵廟所託王業所基而可同之郡國乎宜建畿置尹一如故事又古者四民異居欲其業専志定太祖劍基分别士庶不令雜居工伎屠㳓各有攸處但不設科禁久而混殽今聞洛邑居民之制専以官位相從不分族類夫官位無常朝榮夕悴衣冠皂𨽻不日同處欲使工伎之家習士人風禮百年難成使士人之子效工伎容態一朝而就此乃風俗之原不可不察况今遷徙之初皆是公地分别工伎在于一言有何可疑而闕盛美又南人昔有淮北僑置郡縣仍而不改名實難辨宜皆釐革小者并合大者分置又君人者以天下為家不可有所私比來頒賚動以千計若分以賜鰥寡孤獨所濟實多今直以與親近之臣殆非周急不繼富之謂也魏主善之是月魏主如河隂三月還平城部分遷留夏四月齊竟陵王子良以憂卒齊主常憂子良為變聞其卒甚喜五月甲戌朔日食秋七月齊蕭鸞弑其君昭業而立新安王昭文文恵太子第二子是為廢帝海陵王自為驃騎大將軍録尚書事封宣城公鸞既誅徐龍駒周奉叔尼媪外入者頗傳異語中書令何𦙍字子季㸃之弟以后從叔為齊主昭業所親使直殿省與謀誅鸞𦙍不敢當依違諫說齊主意復止乃謀出鸞于西州中勅用事不復闗咨于鸞是時蕭諶蕭坦之握兵權僕射王晏總尚書事鸞以廢立之謀告晏及丹陽尹徐孝嗣皆從之驃騎録事樂豫謂孝嗣曰外傳籍籍似有伊霍之事君蒙武帝殊常之恩荷託付之重恐不得同人此舉人笑褚公至令齒冷孝嗣不能從樂豫字文介南陽湼陽人直閤將軍曹道剛疑外間有異宻有處分謀未能發鸞慮事變以告坦之坦之馳謂諶曰廢天子古來大事聞道剛等轉已猜疑衛尉明日若不就事無所復及弟有百嵗毋豈能坐聽禍敗正應作餘計耳諶惶遽從之鸞使諶先入遇道剛殺之鸞引兵入雲龍門齊主聞變猶為手勅呼蕭諶俄而諶引兵入閤齊主拔劍自刺不入輿接而出行至西弄弑之輿屍出𦵏以王禮諸嬖幸皆㐲誅以太后令追廢昭業為鬱林王迎立新安王昭文昭文即位年十五以鸞為驃騎大將軍録尚書事揚州刺史封宣城公吏部尚書謝瀹方與客棊聞變竟局還卧竟不問外事大匠虞悰竊歎曰王徐遂縛袴廢天子天下豈有此理邪朝臣被召入宫國子祭酒江斆至雲龍門託藥發吐車中而去鸞欲引中散大夫孫謙為腹心使兼衛尉給甲仗百人謙不欲與之同輙散甲士鸞亦不之罪也虞悰字景預晉侍中潭之曾孫齊以始安王遥光字元暉為南郡太守遥光鸞兄鳳之子也鸞有異志遥光贊成之凡大誅賞無不預謀鸞欲樹置親黨故用為南郡守而不之官九月魏主考績黜陟百官初魏主詔三載考繢即行黜陟各令當曹考其優劣為三等其上下二等仍分為三六品以下尚書重問五品以上親與公卿論之上上者遷下下者黜中者守本任于是親臨朝堂黜陟百官謂諸尚書未能獻可替否進賢退不肖録尚書事廣陵王羽無勤恪之聲有阿黨之迹而令僕左右丞不能相導罷黜削禄有差任城王澄以神志驕傲解少保尚書于果栗磾之孫以不勤事削録餘皆面數其過而行之齊蕭鸞殺鄱陽王鏘字宣韶武帝第七子等鸞權勢益重中外皆知其畜不臣之志鄱陽王鏘每詣鸞鸞語及家國言淚俱發鏘以此信之宫臺之内皆屬意于鏘制局監謝粲說鏘及隨王子隆曰二王但出天子置朝堂夾輔號令粲等閉城上仗誰敢不同東城人正共縳送蕭令耳胡三省注鸞是時已進録尚書事粲曰蕭令蓋舉舊官稱之子隆欲定計鏘意猶豫命駕將入復還與母别日暮不成行典籖知其謀告之鸞遣兵殺鏘及子隆謝粲等時太祖諸子子隆最壯大有才能故鸞尤忌之江州刺史晉安王子懋字雲昌武帝第七子聞二王死欲起兵以母阮氏在建康宻遣迎之阮氏報其同母兄于瑶之為計瑶之馳告鸞鸞遣中䕶軍王元邈討子懋又遣軍主裴叔業與瑶之先襲尋陽參軍于琳之為内應遂殺子懋先是子懋將舉事防閤呉郡陸超之丹陽董僧慧皆勸之及子懋見殺王元邈執僧慧將殺之僧慧曰晉安舉義僕實豫謀死不恨願大斂畢退就鼎鑊元邈義之白鸞免死子懋子昭棊方九嵗以方二寸絹為書參其消息僧慧視之曰郎君書也悲慟而卒于琳之勸超之逃亡超之曰人皆有死此不足懼吾若逃亡非惟孤晉安之眷亦恐田横客笑人元邈等欲囚以還都超之端坐俟命超之門生謂殺超之當得賞宻自後斬之頭墜而身不僵元邈厚加殯斂其門生亦助舉棺棺墜壓門生首折頸而死鸞遣將軍王廣之字士林沛郡相人襲南兖州刺史安陸王子敬字雲端武帝第五子斬之又遣徐元慶西上害荆州刺史臨海王昭秀字懷尚文恵太子第三子行事何昌㝢字儼望尚之弟子曰僕受朝廷意寄翼輔外藩殿下未有愆失何容即以相付邪若朝廷必須殿下當自啟聞更聽後㫖昭秀由是得還建康鸞以孔琇之靖之孫行郢州事使殺郢州刺史晉熙王銶字宣攸髙帝第十八子琇之辭不許遂不食而死裴叔業進向湘州欲殺南平王銳字宣毅高帝第十五子防閤周伯王大言于衆曰此非天子意今斬叔業舉兵匡社稷誰敢不從典籖叱左右斬之遂殺銳又殺銶及南豫州刺史宜都王鏗字宣儼高帝第十六子冬十月齊蕭鸞自為太傅揚州牧進爵為王鸞謀繼大統多引名士與參籌䇿侍中謝朏心不願乃求出為呉興太守至郡致酒數斛遺其弟吏部尚書瀹曰可力飲此勿豫人事鸞雖専政人情未服自以胛有赤誌示王洪範曰人言此是日月相卿幸勿泄洪範曰公日月在軀如何可隱當轉言之齊蕭鸞殺桂陽王鑠字宣朗高帝第八子衡陽王鈞字宣禮高帝子出繼兄元王道後等桂陽王鑠與鄱陽王鏘齊名鏘好文章鑠好名理時稱為鄱桂鏘死鑠不自安至東府見鸞還謂左右曰向録公見接慇懃不已而面有慚色欲殺我也是夕遇害江夏王鋒字宣頴髙帝第十二子有才行鸞嘗與之言遥光才力可委鋒曰遥光之于殿下猶殿下之于高皇衛宗廟安社稷實有攸寄鸞失色及殺諸王鋒遺鸞書誚責之鸞深憚之使兼祠官于太廟夜遣兵收之鋒手擊數人皆仆地然後死遣茹法亮殺巴陵王子倫字雲宗武帝第十三子子倫性英果時鎮瑯邪有守兵鸞恐不肯就死以問典籖華伯茂伯茂曰今若以兵取之恐不可即辦若委伯茂一夫力耳乃自執酖逼之子倫正衣冠出受詔謂法亮曰先朝昔滅劉氏今日理數固然君自身家舊人今衘此使當由事不獲已此酒非勸酬之爵因仰之而死法亮及左右皆流涕初諸王出鎮皆置典籖主帥一方之事悉以委之時入奏事刺史美惡専繫其口莫不折節奉之于是威行州部大為姦利及鸞誅諸王皆令典籖殺之無能拒者孔稚珪聞之流涕曰若不立籤帥當不至于此鸞亦深知其弊乃詔自今諸州有事宻以奏聞勿遣典籤入都自是典籖之任浸輕矣齊蕭鸞廢其主昭文為海陵王而自立是為明帝齊主昭文在位起居飲食皆諮鸞而後行至是鸞以皇太后令廢昭文為海陵王而自立以王敬則為大司馬陳顯逹為太尉尚書虞悰稱疾不陪位鸞欲引參佐命使王晏喻之悰曰主上聖明公卿戮力寧假朽老以贊惟新乎不敢聞命因慟哭朝議欲糾之徐孝嗣曰此亦古之遺直乃止十一月齊以始安王遥光為揚州刺史聞喜公遥欣字重暉遥光弟為荆州刺史齊主長子寶義字智勇有廢疾諸子皆弱小故以遥光居中遥欣鎮撫上流齊立子寶卷字智藏為太子詔東宫肇建逺近或有慶禮可悉斷之魏遷都洛陽魏主以太尉東陽王丕為太傅録尚書事留守平城親告于太廟使高陽王雍字思穆獻文帝子于烈果之兄奉遷神主遂發平城至洛陽定都焉明年六宫文武俱遷洛陽魏置牧塲于河陽魏主敕將軍宇文福莫槐之後行牧地福表石濟注見前以西河内以東距河凡十里魏主自代徙雜畜置其地使福掌之畜無耗失以為司衛監初世祖平統萬及秦涼以河西水草豐美用為牧地畜甚蕃息馬至二百餘萬匹橐駞半之牛羊無數及是置牧地于河陽常畜戎馬十萬匹每嵗自河西徙牧并州稍復南徙欲其漸習水土不至死傷而河西之牧愈蕃迫後正光之際皆為㓂盗所掠無孑遺矣齊主蕭鸞弑海陵王鸞詐稱王有疾數遣御師瞻視因而殞之魏賜郢州刺史韋珍榖帛珍在州有聲績魏主賜以駿馬榖帛珍集境内孤貧者散與之謂之曰天子以我能撫綏卿等故賜以榖帛吾何敢獨有之魏主自將代齊魏主以齊主自立謀大舉伐之會邊將言齊雍州刺史曹虎遣使請降魏主欲自將伐齊引公卿入議鎮南將軍李冲曰遷都草創人思少安為内應者未得審諦不宜輕動任城王澄曰虎無質任使不再來詐可知也今新遷之民居無一椽食無甔石冬月垂盡東作將起而驅之擐甲執兵殆非歌舞之師也穆亮及諸公卿皆以為宜行澄謂亮曰公輩平居議論不願南征何得對上即為此語面背不同豈大臣之義乎冲曰任城可謂忠于社稷然魏主竟不從遂發洛陽詔諸將所獲男女皆放還南曹虎果不降乙齊建武二年魏亥太和十九年春二月魏主攻齊鍾離春秋國漢縣齊北徐州治此鍾離國注見前不克遣使臨江數齊主之罪而還齊遣將軍王廣之蕭坦之沈文季督諸軍以拒魏魏徐州刺史拓跋衍攻鍾離齊徐州刺史蕭恵休恵之弟拒守閒出襲擊破之魏大將軍劉昶將軍王肅攻義陽齊司州齊司州治義陽刺史蕭誕字彦偉諶之兄拒之肅屢敗誕兵二月魏主至夀陽衆號三十萬道過甚命去蓋見軍士病者親撫慰之遣使呼城中人齊豫州刺史豐城公遥昌字季暉遥欣弟使參軍崔慶逺出應之慶逺問師故魏主曰齊主何故廢立慶逺曰廢昏立明古今非一未審何疑魏主曰卿主若不忘忠義何以不立近親而自取之乎慶逺曰霍光亦捨近親而立宣帝唯其賢也魏主曰霍光何以不自立慶逮曰非其類也主上正可比宣帝耳安可比光且若然者武王伐紂而不立微子亦為貪天下乎魏主大笑賜慶逺酒殽衣服而遣之魏主循淮而東至鍾離齊遣將軍崔慧景救之劉昶王肅塹柵三重并力攻義陽王廣之不敢進黄門侍郎蕭衍間道夜發徑上賢首山在汝寧府信陽州西南亦曰賢隱山魏人不敢逼黎明城中望見援軍誕遣長史王伯瑜出攻魏柵因風縱火衍等自外擊之魏解圍去追擊破之魏主敕諸軍欲南臨江已發會司徒馮誕卒魏主將輕騎數千夜還鍾離誕卒于軍魏主還哭之遣使臨江數齊主罪惡久之鍾離不下魏主乃如邵陽築二城于洲上邵陽洲在鳳陽府故臨淮縣淮水中渡淮而還魏主之渡淮也諸軍未濟齊人據渚邀斷津路魏軍主奚康生縳筏積柴縱火燒齊船艦因烟熖飛刀進斫齊人遂潰魏將軍揚播以步騎殿後時春水方長齊兵大至戰艦塞川播結陳以待齊兵四面圍之魏主在北岸水盛不能救已而水播厯齊艦大呼曰我今欲渡能戰者來乃擁衆俱濟字奚康生河南陽翟人楊播延慶華隂人夏四月魏圍齊南鄭不克而還魏梁州刺史拓跋英南安王楨之子擊漢中齊梁州刺史蕭懿字元達衍之兄遣部將據險立五柵以拒之英曰彼帥賤莫相統壹我選精卒克其一營四營皆走矣乃急攻一營拔之四營俱潰乘勝長驅進逼南鄭城中恟懼參軍庾域字司大新野人封題空倉數十指示將士曰此粟皆滿足支二年但努力堅守衆心乃安會魏主召英還英遣使與懿别懿以為詐英去二日乃遣將追之英下馬與戰懿兵不敢逼而反英入斜谷會天大雨士卒截竹貯米執炬火于馬上炊之魏主如魯城祠孔子封其後為崇聖侯魏主如魯城親祠孔子拜孔氏四人顔氏二人官仍選諸孔宗子一人封崇聖侯奉孔子祀魏攻齊赭陽齊擊敗之魏城陽王鸞字宣明景穆帝孫等攻赭陽圍守百餘日諸將欲不戰以疲之李佐獨晝夜攻撃士卒死者甚衆齊遣右衛率垣厯生榮祖從弟救之諸將欲退佐獨逆戰而敗厯生追擊大破之魏主降封鸞為定襄縣王削户五百佐削官爵徙瀛州魏置今河間府是六月齊殺其領軍蕭諶及西陽王子明字雲光武帝第十子等諶恃功于政所欲選用輙命尚書申論齊主聞而忌之以其兄誕弟誄方將兵拒魏隱忍不發至是殺之并其諸弟及西陽王子明南海王子罕字雲華武帝第十一子邵陵王子貞字雲松武帝第十四子秋八月魏立國子太學四門小學學立于國之四門故名魏主好讀書善屬文詔䇿皆自為之李冲李彪高閭王肅之徒皆以文雅見親貴顯用事于是下詔斷諸北語一從正音違者免官求遺書秘閣所無而有益于時用者加以優賞法度量改用長尺大斗悉依漢志至是立國子太學四門小學已又班品令賜冠服宴羣臣國老庶老于華林園各賜樢杖衣裳制禮作樂鬱然可觀有太平之風焉治書侍御史薛聰彈劾不避彊禦魏主每曰朕見聰不能不憚况諸人乎自是貴戚斂手累遷直閤將軍每欲進以名位輙若讓不受魏主亦雅相體悉謂之曰卿天爵自高固非人爵之所能榮也薛聰字延智河東汾隂人冬魏行太和五銖錢先是魏人未嘗用錢魏主始命鑄之是嵗鼓鑄粗備詔公私用之丙齊建武三年魏子大和二十年春正月魏改姓元氏初定族姓魏主下詔以為北人謂土為拓后為跋魏之先出于黄帝以土徳王故為拓跋氏夫土者黄中之色萬物之元也宜改姓元氏諸功臣舊族自代來者姓或重複皆改之魏主雅重門族嘗與羣臣論選調李冲曰未審張官列位為膏粱子弟乎為致治乎魏主曰欲為治耳冲曰然則今日何為専取門品不拔才能乎魏主曰君子之門借使無當時之用要自徳行純篤朕故用之冲曰傳說吕望豈可以門地得之魏主曰非常之人曠世乃有一二耳李彪曰魯之三卿敦若四科韓顯宗曰陛下豈可以貴襲貴以賤襲賤魏主曰必有高明卓然出類拔萃者朕亦不拘此制二月魏詔羣臣聽終三年喪齊詔去乘輿金銀飾齊主志慕節儉故有是詔太官元日上夀有銀酒鎗齊主欲壞之王晏等咸稱盛徳衛尉蕭頴胄曰朝廷盛禮莫若三元此器舊物不足為侈齊主不悅後過曲宴銀器滿席頴胄曰陛下前欲壞酒鎗恐宜移在此器齊主甚慚齊主躬親細務綱目繁宻南康侍郎鍾嶸上書言古者明君揆才頒政量能受職三公坐而論道九卿作而成務天子唯恭己南面而已齊主不懌謂大中大夫顧嵩曰鍾嶸何人欲斷朕機務對曰嶸雖位末名卑而所言或有可乘其繁碎職事各有司存今人主總而親之所謂代庖人宰而為大匠斵也齊主不顧而言他長蕭穎胄字雲長高帝從祖弟子鍾嶸字仲偉穎川社人秋七月魏主廢其后馮氏后馮熙少女也其姊昭儀先后入宫得幸未幾以疾還家既而疾愈迎拜昭儀譛后而廢之后素有徳操遂居瑶光寺為練行尼明年秋昭儀立為后魏旱久旱魏主不食三日羣臣請見魏主遣舍人辭焉且問來故王肅對曰今四郊雨已霑洽獨京城微少庶民未乏一餐而陛下撤膳三日臣下惶惶無復情地魏主使應之曰朕不食數日猶無所感比來中外皆言四郊有雨朕疑其欲相寛勉未必有實方將遣使視之果如所言即當進膳如其不然朕何以生為當以身為萬民塞咎耳是夕大雨八月魏太子恂有罪廢為庶人恂不好學體素肥大苦河南地熱常思北歸殺中庶子高道悅謀輕騎奔平城魏主大駭引羣臣議遂廢為庶人置于河陽無鼻城一作無辟城在懷慶府孟縣東水經注溴水逕無辟邑世謂之無鼻城即此以兵守之明年李彪表恂復謀為逆遂賜死冬十月魏恒州刺史穆㤗定州刺史陸叡謀反魏主遣任城王澄討禽之魏主南遷所親任者多中州儒士宗室及代人往往不樂㤗出為定州刺史自陳久病土温則甚乞為恒州魏主徙恒州刺史陸叡為定州以㤗代之㤗至叡未發遂相與謀作亂推陽平王頤景穆帝孫為主頤偽許之而宻以聞任城王澄方有疾魏主召見謂曰穆㤗謀為不軌今遷都甫爾北人戀舊南北紛擾朕洛陽不立也此大事非卿不能辦彊為我北行乃授澄節行至鴈門太守夜告㤗已引兵西就陽平陽平王刺朔州在平城西澄遽令進發倍道兼行先遣御史李煥單騎入代曉諭㤗黨示以禍福皆莫為之用㤗攻煥不克而走追禽之澄至窮治黨與收陸叡繫獄民間帖然明年魏主如平城㤗叡俱伏誅丁齊建武四年魏丑大和二十一年春正月魏立子恪為太子即宣武帝齊主殺其尚書令王晏以徐孝嗣為尚書令初晏為世祖所寵任及齊主謀廢鬱林王晏即欣然推奉齊主即位晏自謂佐命新朝事多専決齊主惡之始安王遥光勸齊主誅晏齊主曰晏于我有功且未有罪遥光曰晏尚不能為武帝安能為陛下乎齊主黙然晏意望開府數呼相工自視云當大貴又好與賓客屏人語齊主聞之疑晏欲反遂召晏于華林省誅之鬰林王之將廢也晏從弟思逺謂晏曰兄荷世祖厚恩今一旦賛人如此事彼以權計相須未知將來何以自立若及此引決猶可保全門户不失後名晏曰方噉粥未暇此事及拜驃騎謂子弟曰隆昌之末阿戎勸吾自裁若從其語豈有今日思逺遽應曰如阿戎所見今猶未晚也思逺知齊主意已疑異乘間謂曰時事稍異兄亦覺不凡人多拙于自謀而巧于謀人晏不應思逺退晏方歎曰世乃有勸人死者旬日而敗晏外弟阮孝緒亦知晏必敗晏每至其門逃匿不見嘗食醤美問知得于晏家吐而覆之及晏敗人為之懼孝緒曰親而不黨何懼之有卒免于罪阮孝緒字士宗尉氏人二月魏新興公丕以罪免死為民丕先由東陽王以疎屬例降為公初魏主遷都變易舊俗新興公丕不樂及變衣冠魏詔改服在太和十八年丕獨從舊服太子恂自平城將遷洛陽丕子隆及弟超與穆㤗等宻謀留恂因舉兵斷關規據陘北丕在并州隆等以其謀告之丕口雖折難心頗然之至是有司奏隆超皆㤗黨罪當族丕應從坐魏主以丕嘗受詔許以不死聽免死為民誅隆超是時代鄉舊族多以㤗等連謀唯于烈無所染涉魏主由是益重之又以北方酋長及侍子畏暑聽秋朝洛陽春還部落時人謂之鴈臣秋七月魏立昭儀馮氏為后后既立欲母養太子恪恪母高氏暴卒八月魏主自將伐齊九月攻南陽不克魏發河北五州兵以伐齊假彭城王勰字彦和獻文帝子勰音恊中軍大將軍辭曰昔陳思求而不允愚臣不請而得何否㤗之相逺也魏主笑曰二曹以才名相忌吾與汝以道徳相親先是魏荆州刺史薛真度安都後祖弟攻齊南陽太守房伯王從吉從弟擊敗之魏主怒以南陽小郡志必滅之乃引兵向襄陽衆號百萬吹脣以齒齧脣作氣吹之聲如鷹隼沸池留諸將攻赭陽自以兵至宛夜襲其郛克之伯玉嬰内城拒守宛城東南有橋魏主過之伯玉使勇士數人衣斑衣戴虎頭㡌伏于竇下突出擊之魏主人馬皆驚召善射者射殺之乃得免是冬魏主至新野齊將軍韓秀方等十五人皆降遂敗齊師于沔北已而齊侵魏太倉口魏置豫州治廣陵城置倉于此故名廣陵城在今光州息縣魏豫州刺史王肅遣長史傅永字修期清和人擊敗之永與齊人夾淮而軍永曰南人好夜斫營必于淮中置火以記淺處乃設二伏今以瓠貯火當深處置之戒曰見火起則亦然之其夜齊人果引兵斫永營伏兵夾擊之齊人奔趣淮水火既競起不知所從溺死及斬首數千級已而永擊齊豫州刺史裴叔業軍又大破之魏主遣謁者就拜永汝南太守永有勇力好學能文魏主嘗曰上馬能擊賊下馬作露板唯𫝊修期耳魏伐氐克武興以李崇為梁州刺史魏氐帥楊靈珍以衆降齊襲魏武興王楊集始殺其二弟集始窘急亦降于齊魏遣李崇為都督討之崇槎山分道出氐不意表裏襲之羣氐散歸靈珍戰敗遂克武興魏主聞之曰使朕無西顧之憂者崇也以為梁州刺史安集其地靈珍奔還漢中齊以為武都王以集始為北秦州刺史後集始降魏魏復其爵位靈珍為魏所殺齊以劉季連字恵續遵考從父弟子為益州刺史曲江公遥欣好武事齊主以諸子尚幼内仗遥欣外倚后弟劉暄彭城人内弟江祏字𢎞業考城人齊主母景皇后祏之姑也故曰内弟故以始安王遥光為揚州遥欣為荆州而遥欣在江陵多招材勇厚自封殖齊主惡之南郡太守劉季連宻表遥欣有異迹齊主乃以季連為益州刺史使據遥欣上流以制之戊齊永㤗元年魏寅太和二十二年春正月魏拔新野齊沔北守將皆棄城走先是魏主至新野齊太守劉思忌拒守攻之不克築長圍以守之至是魏拔新野縛劉思忌問之曰今欲降未思忌曰寧為南鬼不作北臣乃殺之于是沔北大震湖陽赭陽戍主及南鄉太守相繼南遁舞隂戍主黄瑶起為魏所獲魏主以賜王肅肅臠而食之瑶起殺肅父奐事具前已而魏人克宛房伯玉面縛出降又敗齊兵于鄧城軍主劉山陽死戰魏軍乃退魏主復以十萬衆圍樊城曹虎閉門自守魏主去如懸瓠注見前齊主殺其河東王鉉字宣𦙍高帝第十九子等十人齊主有疾以近親寡弱而高武子孫猶有十王欲盡除之以問太尉陳顯逹對曰此等何足介慮以問始安王遥光遥光以為當以次施行遥光有躄疾毎肩輿入殿與齊主屏人久語畢齊主索香火嗚咽流涕明日必有所誅會齊主疾甚暴絶遥光遂殺河東王鉉南康王子琳字雲璋武帝第十九子等臨賀王子岳西陽王子文永陽王子峻衡陽王子珉湘東王子建南郡王子夏桂陽王昭燦巴陵王昭秀子岳字雲嶠子文字雲儒子峻字雲嵩子建字雲立子夏字雲廣皆武帝子昭燦昭秀文恵太子子十人于是太祖世祖及世宗諸子皆盡矣鉉等已死乃使公卿奏其罪請誅之下詔不許再奏然後許之南康侍讀江泌字士清考城人哭子琳淚盡繼之以血親視殯𦵏畢乃去魏攻齊義陽齊圍魏渦陽魏縣唐改蒙城今屬江南潁州府以救之義陽圍解齊師亦潰魏鎮南將軍王肅攻義陽齊裴叔業圍渦陽以救之魏南兖州刺史孟表守渦陽糧盡食草木皮葉魏主使將軍傅永等救渦陽叔業進擊大破之斬首萬級俘三千餘人獲器械雜畜財物以千萬計王肅更請遣軍救渦陽魏主曰少分兵則不足制敵多分兵則禁旅有闕卿審圖之義陽當止則止當下則下若失渦陽卿之過也肅乃解義陽之圍與統軍楊大眼難當之孫奚康生等救渦陽叔業見魏兵盛夜退明日士衆奔潰魏人追之殺傷甚衆魏中尉李彪免僕射李冲卒彪家世孤微初遊代都以李冲好士傾心附之冲亦重其才學禮遇甚厚公私汲引及為中尉彈劾不避貴戚魏主賢之以比汲黯彪自以結知人主不復藉冲無復宗敬之意冲浸銜之及魏主南伐彪與冲及任城王澄共掌留務彪數與冲争辨形于聲色事多専恣冲不勝忿乃積其前後過惡上表劾之請付廷尉魏主覽表歎悵久之曰道固可謂溢矣而僕射亦為滿也有司處彪大辟魏主宥之除名而已冲性温厚及收彪之際瞋目大呼投折几案詈辱肆口遂發病荒悸言語錯謬醫不能療以為肝裂旬餘而卒夏四月齊大司馬王敬則反㑹稽至曲阿敗死齊大司馬會稽太守王敬則自以高武舊將心不自安齊主外雖禮之而内實相疑聞其衰老且居内地故得少寛敬則世子仲雄善琴齊主以蔡邕焦尾琴琴録呉人有燒桐以爨者蔡邕聞火烈之聲知其良木因請而為琴果有美音而其尾焦故名借之仲雄于齊主前鼓琴作懊儂歌其辭曰常嘆負情儂郎今果行許又曰君行不浄心那得惡人題懊懊儂曲晉書樂志隆安初俗間訛謡之曲與惱同儂如冬反齊主愈猜愧會疾病乃以張瓌字祖逸呉人為平東將軍呉郡太守以防敬則敬則聞之曰東今有誰只是欲平我耳東亦何易可平吾終不受金甖金甖謂鴆也徐州行事謝朓敬則子壻也敬則子幼隆遣人告之朓執其使以聞敬則五官掾王公林敬則族子勸敬則急送啟賜兒死單舟星夜還都敬則不應遂舉兵反以奉南康侯子恪豫章王嶷之子為名子恪亡走始安王遥光遂勸齊主盡誅高武子孫于是悉召入宫孩幼者與乳母俱入須三更當盡殺之子恪徙跣自歸二更逹建陽門而齊主眠不起中書舍人沈徽孚與左右單景雋謀少留其事須臾齊主覺景雋啟子恪已至齊主驚問曰未邪未邪景雋具對齊主撫牀曰遥光幾誤人事乃賜王侯供饌明日悉遣還第敬則帥實甲萬人過浙江張瓌遣人拒之聞鼓聲皆散走瓌逃民間敬則以舊將舉事百姓擔篙荷鍤隨之者十餘萬至武進陵口齊高武帝陵俱在武進慟哭而過五月齊主詔前軍司馬左興盛將軍胡松等築壘于曲阿長岡敬則急攻之臺軍不能敵欲退而圍不開各死戰松引騎兵突其後敬則軍大敗斬之是時齊主疾已篤敬則倉猝東起朝廷震懼太子寶卷急裝欲走敬則聞之喜曰檀公三十六䇿走為上䇿宋人譏檀道濟避魏語計汝父子惟有走耳晉陵民以附敬則應死者甚衆太守王瞻字思寵𢎞從孫言愚民易動不足窮法許之所全活以萬數謝朓以功遷吏部郎三讓不許朓妻常懷刄欲刺朓脁不敢相見秋七月魏省宫掖費用以給軍賞魏彭城王勰表以一嵗國秩職俸親恤禆單國之用魏主乃詔損皇后私府之半六宫嬪御五服男女供恤亦減半在軍者三分省一以給軍賞齊以蕭衍為雍州刺史先是雍州相傳樊城有王氣及是謡言更甚齊主鸞殂太子寶卷立是為廢帝東昏侯初齊主有疾甚秘之至是殂諡明皇帝廟號高宗𦵏曲阿興安陵高宗性猜多慮簡于出入竟不郊天又深信巫現毎出先占利害東出云西南出云北及疾欲塞後湖以為厭勝會殂事遂寢遺詔以徐孝嗣為尚書令沈文季江祏為僕射江祀字景昌祏之弟為侍中劉暄為衛尉軍政事委陳太尉謂顯逹衆事委孝嗣遥光坦之江祏大事文季祀暄參懷心膂之任可委劉悛蕭惠休崔慧景太子寶卷即位惡靈柩在太極殿欲速𦵏徐孝嗣固争得踰月寶卷每當哭輙云喉痛大中大夫羊闡入臨無髮俯仰幘脫寳卷輟哭大笑謂左右曰禿鶖啼來乎禿鶖水鳥頸長而頭秃故名八月高車叛魏九月魏主引兵還討降之魏發高車兵南伐高車憚逺役奉袁紇樹者為主相帥北叛魏主遣將軍宇文福討之大敗而還更命將軍江陽王繼字世仁道武帝元孫討之尋聞齊高宗殂下詔稱禮不伐喪引兵還北伐高車會得疾甚彭城王勰宻為壇于汝水之濱告天地及顯祖乞以身代魏主疾有間十一月至鄴江陽王繼上言高車頑昧避役逃遁若悉追戮恐遂擾亂請遣使推檢斬魁首一人餘加慰撫從之于是叛者往往自歸繼先遣人慰諭樹者樹者亡入柔然尋自悔相帥出降己齊主寶卷永元元年夘魏太和二十三年春正月魏主還洛陽后馮氏有罪退處後宫魏主連年在外馮后私于宦者高菩薩及是魏主還洛收菩薩等案問具伏以文明太后故不忍廢賜后辭訣入居後宫諸嬪御奉之猶如后禮惟命太子不復朝謁而已初馮熙以太后兄尚公主生三女二為后一為昭儀貴寵冠羣臣賞賜累巨萬熙為太保子誕為司徒修為侍中聿為黄門郎侍中崔光嘗謂聿曰君家富貴太盛終必衰敗聿曰君無故詛我何也光曰不然物盛必衰此天地之常理若以古事推之不可不慎後嵗餘修以罪黜誕熙卒幽后廢聿亦擯棄馮氏遂衰崔光字長仁東清河鄃人齊取魏馬圏城名在南陽府鄧州東北南鄉注見前魏主自將禦之齊師敗績先是齊太尉陳顯逹督將軍崔慧景擊魏欲復雍州諸郡魏遣將軍元英拒之顯逹屢破英軍拔馬圏南鄉魏主乃發洛陽自將禦之命廣陽王嘉大武帝孫斷均口注見前邀齊兵歸路齊兵大敗顯逹南走慧景亦還時魏主久疾彭城王勰常居中侍醫藥晝夜不離左右飲食必先嘗而後進蓬首垢面衣不解帶魏主以勰為都督中外諸軍事勰辭曰臣侍疾無暇安能治軍願更請一王使總軍要魏主曰吾深慮不濟安六軍保社稷者皆憑于汝何容更請人乎夏四月魏主宏殂于糓塘原在南陽府鄧州東南后馮氏伏誅太子恪立是為宣武帝魏主疾甚北還至糓塘原謂司徒勰曰吾病殆必不起天下未平嗣子幼弱倚托親賢唯汝勉之勰泣曰臣以至親久參機要寵靈輝赫今復任以元宰震主之聲取罪必矣魏主黙然久之乃手詔太子曰汝叔父勰清規懋徳松竹為心吾百年後其聽勰辭蟬冕遂其冲挹之性又謂勰曰後宫久乖隂徳吾死後可賜自盡葬以后禮遂殂諡孝文皇帝廟號高祖𦵏長陵高祖親任賢能精勤庶務常曰人主患不能處心公平推誠于物能是二者則胡越之人皆可使如兄弟矣用法嚴于大臣無所容貸然人有小過常多澗畧郊廟之祭未嘗不親宫室非不得已不修衣冠浣濯而服之鞍勒鐵木而已嘗謂史官曰時事不可不直書人君威福在已無能制之者若䇿史復不書其惡將何所畏忌邪及是殂于糓塘原軍中以陳顯逹去尚未逺秘不發喪遣使奉詔徵太子太子至魯陽乃發喪即位以遺詔賜馮后死先是太子之至魯陽也東宫官屬多疑勰有異志宻防之而勰推誠盡禮卒無間隙咸陽王禧至謂勰曰汝此行不唯勤勞亦實危險勰曰兄年長識高故知有夷險彦和握蛇騎虎不覺艱難已而禧等聞馮后死相謂曰設無遺詔亦當去之豈可令失行婦人宰制天下殺我輩邪咸陽王禧字永夀獻文帝子魏主追尊其母高氏為后魏主追尊皇妣高氏為文昭皇后后之先本勃海人後入高麗后父颺入魏為將軍生后配享高祖封后兄肇字首文為平原公顯為澄城公數日之間富貴赫奕秋八月齊主殺其僕射江祏侍中江祀始安王遥光起兵東城右將軍蕭坦之討平之齊主自在東宫嬉戲無度及即位不與朝士相接専親信宦官及左右御刀應敕等是時揚州刺史始安王遥光尚書令徐孝嗣右僕射江祏右將軍蕭坦之侍中江祀衛尉劉暄更直閤省分日帖敕雍州刺史蕭衍聞之謂參軍張𢎞䇿字真簡范陽方城人曰六貴同朝亂將作矣衍與𢎞䇿宻修武備招聚驍勇以萬數多伐竹木沈之檀溪積茅如岡阜皆不之用參軍吕僧珍覺其意亦私具櫓數百張時衍兄懿行郢州事衍使𢎞策說懿曰主上媟近左右慄輕忍虐必大行誅戮始安欲為趙王倫形迹已見然性猜量挾徒為禍階蕭垣之忌克陵人徐孝嗣聴其穿鼻江祏無斷劉暄弱一朝禍發中外土崩郢州控帶荆湘雍州士馬精彊世治則竭誠本朝世亂則足以匡濟若不早圖後悔無及懿不從元檀溪在襄陽府襄陽縣西南吕僧珍字瑜東平范人初高宗顧命羣臣意寄多在江祏兄弟及是齊主失徳寢彰祏議廢之而立江夏王寶元字智深明帝第三子劉暄不欲暄嘗為寳元郢州行事執事過刻寶元恚曰舅殊無渭陽情暄由是忌之不同祏議祏兄弟乃欲更立始安王遥光祏告吏部郎謝朓遥光亦遣所親致意于朓朓說劉暄不宜立遥光遥光收朓付廷尉死獄中劉暄以遥光若立則已失元舅之尊復不肯同祏議故祏遲疑久不决遥光大怒遣左右刺暄暄覺之遂發祏謀齊主收祏祀殺之齊主自是無所忌憚益得自恣日夜與近習于後堂鼓呌戲馬常以五更就寢日晡乃起臺閣奏案閲數十日乃報或不知所在五省黄案皆為宦者裹魚肉還家遥光素有異志與其弟荆州刺史遥欣宻謀舉兵將發而遥欣卒江祏又誅遥光懼陽狂稱疾不復入臺謀舉兵東府以討劉暄為名夜遣數百人破東冶出囚于尚方取仗向曉有詔召徐孝嗣屯衛宫城蕭坦之率臺軍討遥光至夜城潰遥光扶匐牀下軍人牽出斬之以孝嗣為司空坦之為僕射齊主殺其僕射蕭坦之領軍劉暄及司空徐孝嗣將軍沈文季齊主左右捉刀應敕之徒皆恣横用事時人謂之刀敕蕭坦之剛狠而専嬖倖畏而憎之至是齊主遣兵圍其宅殺之茹法珍等譛劉暄有異志齊主曰暄是我舅豈應有此直徐世檦曰明帝猶滅武帝之後舅焉可信邪亦殺之初高宗臨殂以隆昌事謂鬰林王也戒齊主曰作事不可在人後故齊主數與近習謀誅大臣皆發于倉猝决意不疑于是大臣人人莫敢自保徐孝嗣以文士不顯同異故名位雖重猶得久存中郎將許凖勸行廢立孝嗣遲疑久之沈文季自托老疾不預朝權侍中沈昭畧字茂隆文叔之子謂之曰叔父行年六十為員外僕射欲求自免豈可得乎文季笑而不應已而齊主召孝嗣文季昭畧入華林省使茹法珍賜以藥酒昭畧怒罵孝嗣曰廢昏立明古今令典宰相無才致有今日冬十二月齊太尉陳顯逹舉兵襲建康敗死顯逹自以高武舊將當高宗之世内懷危懼深自貶損及齊主立顯逹彌不樂在建康得江州甚喜既而聞齊主屢誅大臣𫝊云當遣兵襲江州乃舉兵令長史庾𢎞逺字士仲文之子等與朝貴書數齊主罪惡云欲奉建安王寶寅字智亮明帝第六子為主齊主以崔慧景為平南將軍督諸軍擊顯逹顯逹發尋陽敗臺軍于采石潜師夜渡襲宫城不克退走臺軍追斬之庾𢎞逺被執臨刑索㡌著之曰子路結纓吾不可以不冠而死謂觀者曰吾非賊乃是義兵為諸君請命耳陳公太輕事若用吾言天下將免塗炭其子子曜年十四抱父乞代并殺之齊主既誅顯逹益自驕恣漸出逰走一月凡二十餘出出輙不言定所常以三四更中鼓聲四出火光照天幡㦸横路士民驚震啼號塞道嘗至沈公城有一婦人臨産不能去因剖其腹視其男女又好擔幢侍御滿側暹諸變態曽無愧色魏以郭祚字季祐太原晉陽人為吏部尚書祚清謹重惜官位每有銓授雖得其人必徘徊久之然後下筆曰此人便已貴矣人以是多怨之然所用者無不稱職庚齊永元二年魏世宋辰宣武帝恪景明元年春正月齊豫州刺史裴叔業以夀陽叛降于魏魏遣司徒彭城王勰鎮之叔業聞齊主數誅大臣心不自安遣人至襄陽問蕭衍曰天下大勢可知恐無復自存之理不若回面向北不失作河南公衍報曰羣小用事豈能及逺若意外相逼當勒馬步直出横江以斷其後則天下之事一舉可定若欲北向彼必遣人相代以河北一州相處河南公寧可復得邪叔業沉疑未决乃遣信詣魏豫州刺史薛真度問以入魏可否真度勸其早降叔業遂奉表降魏魏以彭城王勰為司徒領揚州刺史鎮夀陽奉叔業蘭陵郡公豫州刺史叔業尋卒夏四月齊遣將軍崔慧景將兵討夀陽慧景還兵奉江夏王寶元逼建康兵敗皆死齊主遣平西將軍崔慧景將水軍討夀陽自出送之召慧景單騎而進裁交數言拜辭而去既出喜甚過廣陵數十里會諸軍主曰吾荷三帝厚恩當顧託之重幼主昏狂朝廷壞亂危而不扶責在今日欲與諸君共建大功以安社稷何如衆皆響應于是還兵向廣陵司馬崔恭祖慧景族人納之慧景濟江遣使奉江夏王寶元為主寶元斬其使而宻與相應分部軍衆隨慧景向建康攻竹里拔之以竹塘人萬副兒言分遣千餘人從蔣山龍尾魚貫而上自西巖夜下鼓譟臨城臺軍驚散宫門閉慧景引衆圍之時豫州刺史蕭懿將兵在小峴在和州含山縣北亦曰昭山齊主遣宻使告之懿自采石濟江恭祖勸慧景擊之不許會慧景子覺度南岸戰敗恭祖詣城降衆心離壞慧景將心腹數人潜去于道為人所殺寶元逃亡數日乃出齊主殺之崔慧景既平曲赦其黨詔書再下而嬖倖貪虐多所誣陷是時齊主所寵左右茹法珍梅蟲兒等並為外監口稱詔敕中書舍人王咺之専掌文輸與相唇齒齊主呼所幸潘貴妃父寶慶及法珍為阿文蟲兒及營兵俞靈韻為阿兄數往諸刀敕家遊宴躬自汲水助厨人作膳奄人王寳孫年十三四號倀子最有寵參預朝政咺之蟲兒之徒亦下之控制大臣移易詔敕乃至騎馬入殿諙訶天子公卿見之莫不懾息焉秋八月齊攻魏夀陽魏人擊敗之遂取淮南地齊將軍陳伯之濟隂睢陵人再攻夀陽魏彭城王勰拒之汝隂太守傳永將兵來救伯之防淮口甚固永去淮口二十餘里牽船上汝水南岸直南趣淮夜逹夀陽勰遂與永并勢擊伯之于肥口大破之伯之遁還淮南遂入于魏齊後宫火齊後宫火時嬖倖之徒皆號為鬼有趙鬼者能讀西京賦言于齊主曰栢梁既災建章是營齊主乃大起芳樂玉夀等殿以麝塗璧刻畫裝飾窮極綺麗後宫服御極選珍竒鑿金為蓮花以帖地令潘妃行其上曰此歩歩生蓮花也冬十月齊主殺其尚書令蕭懿崔慧景死懿為尚書令弟暢為衛尉掌管籥時齊主出入無度或勸懿因其出門舉兵廢之懿不聽嬖臣茹法珍等憚懿說齊主曰懿將行隆昌故事齊主然之賜懿藥于省中懿且死曰家弟在雍深為朝廷憂之魏以彭城王勰為司徒録尚書事勰雅好恬素不樂勢利高祖重其事幹故委以權任雖有遺詔復為魏主所留固辭不免常悽然歎息勰為人美風儀好文史小心謹慎未嘗有過雖間居獨處亦無惰容愛敬儒雅傾心禮待清正儉素門無私謁十一月齊雍州刺史蕭衍起兵襄陽行荆州事蕭頴冑亦以南康王寶融明帝第八子即和帝起兵江陵初齊主疑衍有異志使直後鄭植往刺之不果楨弟紹叔為衍寧蠻長史知其謀白之衍置酒紹叔家戯植曰朝廷遣卿見圖今日間宴是可取良會也賓主大笑而散滎鄭紹叔字仲明陽開封人及蕭懿死衍夜召張𢎞䇿等入宅定議明日集僚佐謂曰昏主暴虐當與卿等共除之是日建牙集衆得甲士萬餘人馬千餘匹船三千艘出檀溪竹木装艦葺之以茅事皆立辦諸將争擄吕僧珍出先所具者付之争者乃息是時南康王寶融為荆州刺史長史蕭頴胄行府州事齊主遣輔國將軍劉山陽就頴胄兵襲襄陽衍知其謀遣參軍王天虎詣江陵徧與州府書聲云山陽西上并襲雍荆頴胄得書疑未决山陽至巴陵衍復令天虎齎書與頴胄及其弟頴逹衍謂張𢎞策曰用兵之道攻心為上近遣天虎往人皆有書今段乘驛甚急止有兩函與行事兄弟云天虎口具彼間人問天虎而無所說必謂行事與天虎共隱其事則行事進退無以自明必入吾謀内是馳兩空函定一州矣已而山陽至江安遲回不上頴胄計無所出夜呼參軍席闡文安定臨涇人柳忱字文若世隆之子閉齋定議闡文曰蕭雍州蓄養士馬非復一日必不可制就能制之嵗寒復不為朝廷所容今若殺山陽與雍州舉事立天子以令諸侯則霸業成矣山陽既不信我今斬送天虎則彼疑可釋至而圖之罔不濟矣忱曰朝廷狂悖日滋雍州之事且藉以相斃耳獨不見蕭令君乎前事之不忘後事之師也頴逹亦勸頴胄從闡文等計詰旦頴胄謂天虎曰卿與劉輔國相識今不得不借卿頭乃斬天虎送山陽山陽大喜單車至頴胄伏兵斬之乃以南康王寶融教纂嚴以蕭衍都督前鋒頴胄都督行留諸軍事十二月頴胄及司馬夏侯詳字叔業譙郡人移檄建康州郡數齊主及梅蟲兒茹法珍罪惡竟陵太守曹景宗字子震新野人遣人說衍迎寶融正尊號然後進軍衍不從王茂字休逺太原祁人謂張𢎞䇿曰今以南康置人手中彼挾天子以令諸侯節下前進為人所使此豈他日之長計乎𢎞䇿以告衍曰若前塗大事不㨗故自蘭艾同焚若其克㨗則威震四海誰敢不從豈碌碌受人處分者邪初陳顯逹崔慧景之亂上庸太守韋叡曰陳雖舊將非命世才崔頗更事懦而不武其赤族宜矣定天下者殆必在吾州將乎乃遣二子自結于蕭衍及衍起兵叡帥郡兵二千倍道赴之馮道根居母䘮亦帥鄉人子弟來赴道韋叡字懐文京兆杜陵人馮根字巨基廣平鄼人御批厯代通鑑輯覽卷四十

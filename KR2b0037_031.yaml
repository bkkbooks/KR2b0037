front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷三十二晉中宗元皇帝己夘太興二年漢定號趙後趙髙祖石勒元年趙舊大國一趙國二成凉新大國一後凡四僣國春二月石勒獻捷于漢勒拔平陽事具前漢斬其使
  hash: sha256:47cab1e7e98a72013f09b5b7fc132796e3b7f7f993314da6ac38d7d861828c28

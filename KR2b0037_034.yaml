body:
  text: 魏主珪分尚書三十六曺胡三省注後漢光武分尚書為六曺晉武帝増置三十五曺至後魏又增為三十六曺及外署凡置三百六十曹令八部大人主之八部擬八座謂之八國吏部尚書崔宏通署三十六曹如令僕統事置五經博士増國子太學生員合三千人珪問博士李先字榮仁中山盧奴人曰天下何物可以益人神智對曰莫若書籍珪曰書籍有幾如何可集對曰自書契以來世有滋益至今不可勝計茍人主所好何憂不集遂命郡縣大索書籍悉送平城追尊所生母陳氏為徳皇太后夏四月以㑹稽世子元顯為揚州刺史會稽王道子有疾且無日不醉元顯知朝望去之諷朝廷解道子揚州以授元顯道子醒而知之大怒無如之何元顯以廬江太守張法順會稽人為謀主多引樹親黨朝貴皆畏事之燕除公侯金帛贖罪法燕主盛十日一决獄不加考掠多得其情下詔曰法例律晉初改舊律為刑名法例此蓋言法例所載之律也公侯有罪得以金帛贖此蓋不足以懲惡而利于王府甚無謂也自今皆令立功以自贖南凉王烏孤卒弟利鹿孤立徙治西平注見前南燕王徳陷廣固注見前遂都之初秦主登之弟廣帥衆依南燕王徳已而廣自稱秦王南燕所屬多去附廣徳乃留魯王和守滑臺自帥衆討廣斬之和長史李辯殺和以滑臺降魏徳欲還攻滑臺與其下謀之韓範曰嚮也魏為客吾為主今也吾為客魏為主人心危懼不可復戰不如先據一方自立基本乃圖進取潘聰曰青州沃野二千里精兵十餘萬左有負海之饒右有山河之固廣固城地形阻峻若得其地閉關養鋭伺隙而動此乃陛下之關中河内也徳乃引師而南進據琅邪徐兖之民歸附者十餘萬幽州刺史辟閭複姓渾守廣固其下多出降渾懼奔魏徳追斬之遂定都廣固先是燕蘭汙之亂吏部尚書封孚徳南奔辟閭渾渾表為渤海太守及至孚出降徳大喜曰孤得青州不為喜喜得卿耳乃遂委以機宻國事悉與之參酌封孚字處道渤海蓨人秦主興降號稱王興以災異屢見降號稱王詔羣臣卿士將牧守宰各降一等存問孤貧舉㧞賢俊簡省法令清察獄訟守令有政績者賞之貪殘者誅之逺近肅然冬十月秦陷洛陽秦冦洛陽河南太守辛恭靖隴西狄道人固守百餘日秦兵抜洛陽獲之恭靖見秦王興不拜曰吾不為羗賊臣興囚之于是淮漢以北多降于秦恭靖被囚三年逃歸江東病卒孫恩冦陷會稽殺内史王凝之羲之之子詔徐州刺史謝琰及劉牢之討破之以琰為會稽太守會稽世子元顯性苛刻生殺任意發東土諸郡免奴為客者胡三省注有罪没為官奴凡公卿之後及士人子孫占䕃以為客户是為免奴為客置京師以充兵役東土囂然孫恩因民心騷動自海島攻會稽殺内史王凝之凝之世奉天師道不出兵亦不設備官屬請討之凝之曰我已借鬼兵守諸要津不足憂也恩遂陷會稽殺凝之于是八郡會稽吳郡吳興義興臨海永嘉東陽新安之人一時起兵殺長吏以應恩旬日中衆數十萬恩自稱征東將軍號其黨曰長生人表會稽王道子及元顯之罪誅之于是内外戒嚴加道子黄鉞元顯領中軍將軍命徐州刺史謝琰討之牢之亦發兵討恩拜表輙行琰擊斬義興呉郡羣盜與牢之轉鬭而前所向輙克琰留屯烏程遣司馬髙素助牢之進臨浙江注見前詔以牢之都督吳郡諸軍事初彭城劉裕字徳輿小字寄奴漢楚元王交之後僑居京口勇健有大志僅識文字以賣屨為業好摴蒱為鄉閭所賤嘗伐荻新洲遇大蛇擊傷之明日復至洲見有羣兒𢷬藥裕問何為答曰吾王為劉寄奴所傷裕曰何不殺之兒曰寄奴王者不死裕叱之皆散大新洲胡三省注在京口西江中至是牢之引叅軍事使將數十人覘賊遇數千人即迎擊之從者皆死裕墜于岸下賊臨岸欲下裕奮長刀仰斫殺數人乃得登岸仍大呼逐之殺傷甚衆劉敬宣怪裕久不返引兵尋之見裕獨驅數千人咸歎息因進擊賊大破之胡三省曰劉裕事始此恩驅男女二十餘萬口東走多棄寳物子女于道官軍競取之恩由是得脫復逃入海島朝廷憂之復至以琰為會稽太守都督五郡軍事戍海浦明年夏恩復冠會稽謝琰出戰兵敗為帳下所殺恩轉冦臨海朝廷大震遣兵討之不克已而恩為劉牢之所破復走入海郡海浦自龕山東至定海皆是臨海吳今浙江台州府是以會稽世子元顯録尚書事時謂道子為東録元顯為西録西府車騎填凑東第門可張羅元顯所親信率皆佞諛諷禮官立議公卿以下見者皆拜時國用虚竭公卿曰廪七升而元顯聚斂不已富踰帝室桓元舉兵攻江陵殺殷仲堪楊佺期殷仲堪恐桓元跋扈乃與楊佺期結婚為援佺期屢欲攻元仲堪每止之元恐終為殷楊所滅乃求廣其所統執政亦欲搆使乖離乃加元都督荆州四郡軍事义以元兄偉代佺期兄廣為南蠻校尉佺期忿懼欲與仲堪共襲元仲堪多疑少决苦禁止之是嵗荆州大水仲堪竭倉廪以賑饑民元欲乗其虚而伐之乃發兵西上聲言救洛先遣兵襲取巴陵積糓食之仲堪遣楊廣等拒之皆為所敗江陵乏食以胡麻廪軍急召佺期自救佺期曰江陵無食可来相就共守襄陽仲堪紿之曰比來收集已有儲矣佺期帥歩騎八千至江陵仲堪唯以飯餉之佺期大怒曰今兹敗矣不見仲堪與兄廣共擊元大敗單騎奔還仲堪亦奔酇城元遣將軍馮該追獲皆殺之初仲堪叅軍罷企生謂其弟遵生曰殷侯仁而無斷必及于難吾䝉知遇義不可去必將死之及仲堪敗走文武無送者惟企生從之路經家門遵生曰作如此分離何可不一執手企生旋馬授手遵生膏下之曰家有老母去將何之抱之甚急遂不得去及元至荆州人士無不詣者企生獨不往而營理仲堪家事元遣人收之問欲何言企生曰乞一弟以養老母元乃殺企生而赦其弟凉王光卒太子紹字永業嗣庶兄纂弑而代之光疾甚立紹為天王自號太上皇以太原公纂為太尉常山公宏為司徒光謂紹曰吾没之後汝委重二兄庻幾可濟毋内相猜忌也又謂纂宏曰永業才非撥亂直以立嫡有常猥居元首汝兄弟輯睦則祚流萬世若内自相圖則禍不旋踵及光卒紹祕不發喪纂排閤入哭盡哀而出紹懼以位讓之纂不許宏謂纂曰主上闇弱未堪多難兄宜為社稷計纂宏于是夜帥兵入宫紹自殺纂乃即天王位以宏為大都督録尚書事已而宏作亂纂殺之庚子四年南燕建平元年南燕王利鹿孤建和元年西凉公李暠庚子元年是嵗西秦降秦舊大國三燕秦魏小國四凉南凉北凉南燕新小國一西凉凡八僭國春三月詔桓元都督荆江八州軍事荆江州刺史元既克荆雍表求領荆江詔以元都督荆司等七州軍事領荆州刺史元復求江州乃加督八州領二州刺史元輙以兄偉為雍州刺史朝廷不能違夏六月庚辰朔日食秋七月太皇太后李氏崩秦擊西秦西秦王乾歸戰敗奔南凉遂降秦秦遣姚碩徳伐西秦入白南安峽在鞏昌府安定縣南西秦王乾歸使將軍慕兀等屯守秦軍樵采路絶秦王興潛引兵救之乾歸聞之自將輕騎迎戰敗走其衆皆降興進軍枹罕乾歸奔金城將復西走與諸豪帥大哭而别遂乞降于南凉南凉王利鹿孤待以上賓秦兵既退南羗梁戈等密招乾歸乾歸將應之或以白利鹿孤乾歸懼為所殺遂奔于秦秦封乾歸為歸義侯明年春復使乾歸還鎮苑川九月地震以會稽世子元顯都督揚豫等十六州軍事北凉敦煌太守李暠字元盛隴西郡成紀人自稱凉公是為西凉初北凉李暠好文學有令名孟敏為沙州刺史以暠為效榖漢縣後周省故城在今安西府敦煌縣令敏卒治中索仙敦煌人等以暠温毅有恵政推為敦煌太守請于段業業因授之至是晉昌晉郡今安西府是太守唐瑤叛移檄六郡推暠為沙州刺史凉公暠遣宋繇字體業敦煌人東代凉興前凉郡後周為縣故城在今西凉府淵泉縣并擊玉門以西諸城皆下之初梁太常郭膺善天文術數嘗與李暠宋繇同宿黁起謂繇曰君當位極人臣李君終當有國家有騍馬生白額駒此其時矣及索仙等推暠暠初難之㑹繇至謂暠曰忘郭膺之言邪白額駒今已生矣暠乃從之黁先叛凉舉兵為吕纂所破後歸姚興將奔晉追者殺之郭黁西平人黁奴昆反騍馬牝馬也騍音課冬十二月有星孛于天津晉書天文志天津九星横河中一曰天漢會稽世子元顯解録尚書事元顯以星變解録尚書事復加尚書令吏部尚書車𦙍以元顯驕恣白會稽王道子請禁抑之元顯問道子曰車武子屛人言及何事道子怒曰爾欲幽我不令與朝士語耶元顯出謂其徒曰𦙍間我父子𦙍懼自殺魏置僊人博士魏儀曹郎董謐獻服餌僊經珪置僊人博士立僊坊煮煉百藥成令死罪者試服之不騐而訪求不已南燕王徳稱帝更名備徳辛丑五年燕王慕容熙光始元年凉王吕隆神鼎元年北凉王沮渠䝉遜永安元年春二月凉吕超弑其君纂而立其兄隆超隆皆光從子超擅擊鮮卑思盤纂命超及思盤入朝超懼深自結于殿中監杜尚纂見超責之曰卿恃兄弟謂超與隆桓桓乃敢欺吾要當斬卿天下乃定然實無意殺之也因引超思盤及羣臣宴于内殿超兄隆數勸纂酒纂醉超取劍擊殺之讓位于隆隆遂即天王位以超都督中外録尚書事纂后楊氏將出宫超恐其挾珍寳命索之后曰爾兄弟不義手刃相屠我旦夕死人安用寳為义問玉璽所在后曰己毁之矣后有美色超將納之謂其父桓曰后若自殺禍及卿宗桓以告后后曰大人賣女于氐以圖己之冨貴一之為甚其可再乎遂自殺桓奔河西夏五月北凉沮渠䝉遜弑其君業北凉王業憚沮渠䝉遜勇畧䝉遜亦深自晦匿張掖太守馬權素為業所親重䝉遜譖而殺之乃謂其兄男成曰段公非撥亂之主向所憚者馬權今權已死欲除之以奉兄何如男成曰人親信我圖之不祥蒙遜乃隂使人告男成謀反業遂收男成賜死男成曰䝉遜先與臣謀反臣以兄弟之故𨼆而不言今以臣在恐部衆不從故誣臣反其意欲王之殺臣也乞詐言臣死暴臣罪惡䝉遜必反然後使臣討之無不克矣業不聼殺之男成素得衆心衆皆憤怒䝉遜因帥衆陽言為男成報仇入張掖業被殺䝉遜自稱張掖公亦號北凉六月孫恩冦丹徒漢縣今為江南鎮江府治劉裕擊破之先是劉裕戍句章注見前袁山松喬之孫築滬瀆在江南松江府上海縣東北吳都記松江東㵼海曰滬海亦謂之扈瀆壘以備恩已而恩冦句章攻海鹽漢縣後漢時淪為當湖晉徙置于吳禦城今縣是也屬浙江嘉興府裕隨而拒之海鹽城中兵少裕偃旗匿衆明晨開門使羸疾者數人登城賊問裕所在曰夜已走矣賊争入城裕奮擊大破之恩進趣滬瀆裕追之不利引歸恩遂陷滬瀆殺山松至是恩浮海奄至丹徒戰士十餘萬樓船千餘艘建康震駭内外戒嚴劉牢之使裕自海鹽入援裕兵不滿千人倍道兼行與恩俱至丹徒守軍莫有鬭志恩率衆鼔譟登蒜山在鎮江府城西江岸居民皆荷擔而立裕帥所領奔擊大破之恩狼狽僅得還船然恩猶恃衆復整兵向京師譙王尚之帥精鋭馳至恩樓船髙大泝風不得疾行數日乃至白石閒尚之在建康牢之至新洲乃浮海北走郁洲即鬰洲洲上有島曰鬱林山在江南海州東北海中其别將攻陷廣陵朝廷以裕為下邳太守討破恩于郁洲恩由是衰弱復縁海南走裕隨擊屢破之秋八月燕段璣弑其君盛太后丁氏立盛叔父熙討璣殺之燕王盛懲其父寳以懦弱失國務峻威刑宗親勲舊人不自保前將軍段璣段太后兄之子等夜于禁中作亂盛自帥左右出戰被傷而卒中壘將慕容㧞白太后丁氏以國家多難宜立長君時衆望在盛弟平原公元字道光寳第四子而河間公熙字道文垂少子素得幸于丁氏乃廢太子定迎熙入宫即天王位捕璣等夷三族元定皆賜死後熙納苻謨二女有寵丁氏怨恚謀廢熙熙逼丁氏令自殺九月秦聞凉凉王隆遣使降秦凉王隆多殺豪望以立威名内外囂然魏安寰宇記魏安城在昌松縣東夲漠模縣後為魏安隋省模音蒲環昌松注見前人焦朗遣人説秦伐之于是秦主興使隴西公姚碩徳帥師濟河徑趨姑臧隆遣吕超逆戰大敗隆嬰城自守碩徳圍之累月撫納夷夏分置守宰節食聚粟為持久計超言于隆曰今資儲内竭上下嗷嗷當卑辭以退敵敵去之後修政息民若卜世未窮何憂舊業不復若天命去矣亦可保全宗族隆乃遣使請降于秦碩徳表隆凉州刺史秦軍既還吕超攻焦朗于魏安朗請救于南凉利鹿孤遣將軍傉檀赴之比至超已退傉檀乃與朗連和尋擊取之冬十一月桓元表桓偉鎮夏口刁暢鎮襄陽桓元表其兄偉為江州刺史鎮夏口司馬刁暢督八郡鎮襄陽遣其將馮該戍湓口元自謂有晉國三分之二數使人上已符瑞欲以惑衆又致牋于會稽王道子曰賊造近郊以風不得進食盡故去非力屈也昔國寳死後王恭不乘此威入統朝政足見其心非侮于明公也而謂之不忠今之腹心誰有時望豈無佳勝直是不能信用之耳元顯見之大懼張法順謂曰元始得荆州人情未附若使劉牢之為前鋒而以大軍繼進元可取也元顯以為然會武昌太守庾楷密使人自結于元顯請為内應元顯喜遣法順至京口謀于牢之牢之以為難法順還曰觀牢之顔色必貳于我不如召入殺之不爾敗人大事元顯不從于是大治水軍謀討元壬寅元興元年南凉王秃髮傉檀宏昌元年春正月以尚書令元顯為征討大都督加黄鉞討桓元下詔罪狀桓元以元顯為驃騎大將軍征討大都督加黄鉞劉牢之為前鋒譙王尚之為後部張法順言于元顯曰桓謙字敬祖冲次子兄弟謂謙弟修修字承祖每為上流耳目而牢之反覆萬一有變則禍敗立至可令牢之殺謙兄弟以示無二若不受命當逆為之所元顯曰今非牢之無以敵元且始事而誅大將人情不安又以桓冲有遺恵于荆土乃除謙荆州刺史以結西人之心柔然據漠北自稱可汗胡三省曰柔然為魏患自此始初魏王珪立慕容氏故燕主寳之季女為后魏故事將立后鑄金人以卜之慕容氏所鑄成遂立為后已復遣賀狄干比部大人獻馬求昏于秦秦王興間魏先已立后遂留狄干而絶其昏由是魏與秦有隙攻其屬國没奕干諸部柔然社崙方睦于秦遣將救之大敗逺遁漠北奪髙車之地而居之遂吞併諸部士馬繁盛雄于北方其地西至焉耆東接朝鮮南臨大漠傍側小國皆覊屬焉自號豆代可汗始立約束以千人為軍軍有將以百人為幢幢有帥戰攻先登者賜以虜獲畏懦者以石擊其首殺之桓元舉兵反東土遭孫恩之亂因以饑饉漕運不繼桓元禁斷江路商旅俱絶公私匱乏以粰扶牛反糓皮也橡似两反栩實也給士卒元謂朝廷多虞必未暇討已可以蓄力觀釁及聞大軍將發乃大驚欲完聚保江陵長史卞範之字敬祖寃句人曰明公威振逺近元顯口尚乳臭劉牢之大失物情若兵臨近畿示以禍福土崩之勢可翹足而待何為延敵入境自取窮蹙乎元從之留桓偉守江陵抗表傳檄罪狀元顯舉兵東下檄至元顯大懼下船而不發元兵至姑孰三月劉牢之叛附于元元顯軍潰元入建康自以太尉總百揆殺元顯等以牢之為會稽内史牢之自殺桓元發江陵至厯陽庾拑謀泄元囚之譙王尚之衆潰被執司馬休之敗走劉牢之素惡元顯又慮功髙不為所容自恃材武擁强兵欲假元以持執政復伺元隙而自取之叅軍劉裕請擊元牢之不許元使牢之族舅何穆説之牢之遂與元通東海何無忌牢之之甥也與劉裕極諫不聼其子敬宣又諫牢之怒曰吾豈不知今日取元如反覆手但平元之後令我奈驃騎何遂遣敬宣詣元請降元隂欲誅牢之乃與敬宣宴飲陳名書畵共觀之以安悦其意敬宣不覺也元顯將發聞元已至新亭棄船退軍越二日元至南桁元顯欲還宫元遣人㧞刀隨後大呼曰放仗軍人皆奔潰元顯走入東府元遣從事收縳數之元顯曰為法順所誤耳元入京師稱詔解嚴自為丞相總百揆都督中外録尚書事揚州牧復讓丞相而為太尉以桓偉為荆州刺史桓脩為徐兖刺史桓石生為江州刺史卞範之為丹陽尹王謐字稚逺導之孫為中書令徙會稽王道子于安成郡呉置治平都故城在今江西吉安府安福縣斬元顯尚之庾楷張法順以劉牢之為會稽内史牢之曰始爾便奪我兵禍其至矣敬宣勸牢之襲元牢之猶豫告劉裕曰今當北至廣陵舉兵以匡社稷卿能從我乎裕曰將軍以勁卒數萬望風降服彼新得志威震天下朝野人情皆已去矣廣陵可得至邪裕當返服還京口耳退謂何無忌曰吾觀鎮北必不免卿可隨我還京口元若守臣節當與卿事之不然當與卿圖之于是牢之大集僚佐議據江北以討元㕘軍劉襲曰事之不可者莫大于反將軍往年反王兖州近日反司馬郎君今復反桓公一人三反何以自立語畢趨出佐吏多散走牢之懼帥部曲北走至新洲縊而死元尋辭録尚書事出屯姑孰大事皆就諮焉小事則决于桓謙及卞範之元使御史杜林防衛會稽王道子至安成林承元㫖酖殺之孫恩冦臨海郡兵擊破之恩赴海死元以恩黨盧循字子先諶之曾孫為永嘉晉郡今浙江温州府是太守孫恩冦臨海太守辛景擊破之恩所虜三呉男女死亡殆盡恐為官軍所獲乃赴海死其黨從死者以百數謂之水仙餘衆數千人復推恩妹夫盧循循神采清秀雅有才藝少時沙門恵逺常謂之曰君雖體渉風素而志存不軌如何桓元欲撫安東土乃以循為永嘉守循雖受命而冦暴不已南凉王利鹿孤卒弟傉檀立始稱凉王徙樂都初思復鞬愛重傉檀謂諸子曰傉檀噐誠非汝曺所及也故諸兄不以傳子而傳于弟三吳大饑三吳大饑户口減半臨海永嘉殆盡冨室皆衣羅紈懷金玉閉門餓死秦王興攻魏敗績其將姚平死之秦王興大發諸軍遣義陽公平等代魏自將大軍繼之魏主珪遣長孫肥代人為前鋒亦自將大軍繼後平為肥所敗結壘固守魏軍圍之興將兵四萬來救珪帥步騎逆戰于䝉阬在今平陽府曲沃縣北之南興退走平悉衆突圍不得出乃帥麾下赴水死餘衆二萬餘人皆斂手就擒興力不能救舉軍慟哭數遣使求和于魏珪不許將軍司馬休之字季預尚之之弟劉敬宣髙雅之奔南燕元殺吳興守髙素將軍竺謙之及劉襲等皆牢之北府舊將也襲兄軌邀司馬休之劉敬宣髙雅之等共據山陽晉縣今為江南淮安府治欲起兵攻元不克遂奔南燕癸卯二年是嵗凉亡大國三燕秦魏小國四南凉北凉西凉南燕凡七僭國春盧循使其黨徐道覆冦東陽晉郡治長山今浙江金華府治之金華縣是建武將軍劉裕擊破之道覆循之姊夫也桓元自為大將軍元上表請帥諸軍平關洛而諷朝廷不許乃云奉詔故止元初欲飭裝先命作輕舸載服玩書畵或問其故對曰兵㓙戰危脱有意外當使輕而易運衆皆笑之夏四月癸巳朔日食五月燕作龍騰苑燕王熙作龍騰苑方十餘里役徒二萬人築景雲山于苑内基廣五百步峰髙十七丈後熙復于苑中起逍遙宫鑿曲光海方盛夏士卒暍死大半秋七月秦徴吕隆為散騎常侍以王尚為凉州刺史南北凉互出兵攻吕隆秦之謀臣言于秦主興曰隆今饑窘尚能自支若將來豐贍終不為吾有不如因其危而取之興乃徴吕超入侍遣齊難等帥兵迎隆隆素車白馬迎于道旁難以司馬王尚行凉州刺史鎮姑臧徙隆宗族及民萬户于長安興以隆為散騎常侍超為安定守後凉自吕光據姑臧至隆亡凡四主合十九年九月桓元自為相國封楚王加九錫殷仲文覬之弟卞範之勸元早受禪朝廷册命元為相國總百揆封楚王加九錫楚國置丞相以下官桓謙私問劉裕曰楚王勲徳隆重朝廷之情咸謂宜有揖讓卿以為何如劉裕曰楚王勲徳蓋世晉室民望久移乘運禪代有何不可喜曰卿謂之可即可耳南燕講武城西髙雅之表南燕主備徳請伐元曰縱未能廓清呉會亦可收江北之地韓範亦上疏曰晉室衰亂戎馬單弱重以桓元悖逆上下離心拓地定功正在今日失時不取彼之豪傑誅滅桓元更脩徳政則無望矣備徳因講武城西公卿皆以元新得志未可圖乃止冬十月桓元自稱皇帝廢帝為平固晉縣隋省故城在今江西贛州府興國縣王遷于尋陽元表請歸藩使帝作手詔固留之詐言錢塘臨平湖注見前聞江州甘露降因使百僚集賀為己受命之符又以前世皆有隱士耻獨無之求得安定皇甫謐六世孫希之給其資用使居山林徴為著作郎又使固辭然後下詔旌禮號曰髙士時人謂之𨼆元性貪鄙人士有法書好畵及佳園宅必假蒱搏而取之尤愛珠玉未嘗離手至是卞範之為禪詔逼帝書之遣司徒王謐奉璽綬禪位于楚帝出居永安宫百官詣姑孰勸進元築壇于九井山在大平府當塗縣北即帝位改元永始封帝為平固王遷于尋陽元入建康宫登御座而床忽陷羣下失色殷仲文曰將由聖徳深厚地不能載元大恱元以其祖彛以上名位不顯不復追尊獨納桓溫神主于太廟卞承之曰宗廟之祭上不及祖有以知楚徳之不長矣元性苛細好自矜伐詔令紛紜有司奉荅不暇而綱紀不治奏案停積朝野騷然思亂者衆益州刺史毛璩字叔璉寳之孫起兵討桓元元遣使加璩左將軍璩不受命傳檄列元罪狀進屯白帝甲辰三年魏天賜元年春二月劉裕起兵京口討桓元元使弟謙拒之劉裕從徐兊刺史桓脩入朝元謂王謐曰裕風骨不常蓋人傑也毎逰集必引接殷勤贈賜甚厚元妻劉氏謂元曰裕龍行虎步視瞻不凡恐終不為人下宜早除之元曰我方平蕩中原非裕莫可用者俟闗河平定别議之耳裕與何無忌同舟還京口密謀興復劉邁字伯羣下邳人弟毅字希樂家于京口亦與無忌謀之無忌曰桓氏强盛其可圗乎毅曰天下自有强弱茍為失道雖强焉弱正患事主難得耳無忌曰草澤之中非無英雄也毅曰所見唯有劉下邳無忌笑而不答還以告裕平昌孟㫤自建康還裕謂之曰草間當有英雄起卿頗聞之乎㫤曰今日英雄有誰正當是卿耳于是裕毅無忌㫤及裕弟道規字道則諸葛長民琅邪陽邵人等相與合謀起兵時桓宏鎮廣陵刁逵鎮厯陽道規為宏叅軍㫤為王裕使毅就道規㫤共圖宏據廣陵長民為逵叅軍裕使長民就殺逵據厯陽無忌夜草檄文其母密窺之泣曰吾不及東海吕母明矣汝能如此吾復何恨問所與同謀者曰劉裕母尤喜東桓宏修之弟刁逵恊之孫海吕母王莽時人事見前裕託以遊獵與無忌收合徒衆得百餘人詰旦京口門開無忌著傳詔服稱敕使居前徒衆隨之入斬桓脩以徇裕問無忌曰急湏一府主簿何由得之無忌曰無過劉道民劉穆之東莞莒人字道和道民其小字也裕曰吾亦識之即馳信召焉時穆之間京口讙譟聲晨起出陌頭腐與信會直視不言者久之返室壊布裳為袴往見裕裕見穆之曰始舉大義湏一軍吏甚急卿謂誰堪其選穆之曰倉猝之際畧當無見踰者裕笑曰卿能自屈吾事濟矣即于坐署主簿是日孟㫤在廣陵亦勸桓宏出獵㫤與劉毅劉道規帥壯士數十人斬之因收衆濟江衆推裕為盟主總督徐州事以㫤為長史守京口裕帥二州之衆千七百人軍于竹里移檄逺近元加桓謙征討都督謙等請亟遣兵擊裕元曰不如屯大衆于覆舟山在江寧府上元縣東北元和志鍾山西足也以拒之彼空行二百里無所得鋭氣已挫忽見大軍必驚愕我按兵堅陣勿與交鋒彼求戰不得自然敗走此䇿之上也謙等固請乃遣吳甫之皇甫敷相繼北上元憂懼特甚或曰裕等烏合㣲弱勢必無成何憲之深元曰劉裕足為一世之雄劉毅家無擔石之儲摴蒱一擲百萬何無忌酷似其舅共舉大事何謂無成三月劉裕及桓謙戰于覆舟山大破之元出走裕立留臺于石頭三月朔裕軍與吳甫之遇于江乘注見前斬之至羅落橋在上元縣東北建康志下有羅落浦入于大江皇甫敷帥數千人逆戰又斬之元使桓謙屯東陵卞範之屯覆舟山西合衆二萬明日裕衆食畢悉棄餘糧數道並前裕與劉毅身先士卒進突其陳將士皆殊死戰因風縱火謙等大潰元先已潛使殷仲文具舟至是遂將其子昇鞭馬趣石頭浮江南走經日不食悲不自勝裕入建康明日徙屯石頭城立留臺百官焚桓温神主造晉新主納于太廟遣諸將追元尚書王嘏帥百官奉迎乘輿誅元宗族在建康者使臧熹東莞人燾之弟入宫收圖籍噐物封閉府庫元司徒王謐與衆議推裕領揚州裕固辭乃以謐為侍中領揚州刺史録尚書事裕初名位㣲薄唯謐獨竒貴之元受禪時謐親解帝璽綬授元及元敗衆謂謚宜伏誅裕以舊恩特保全之謐推裕為都督八州徐州刺史何無忌為琅邪内史孟㫤為丹陽尹劉道規為義昌宋書州郡志南梁太守永初郡國有義昌胡三省曰蓋晉未置郡宋初廢為縣也南梁晉僑郡寄治夀陽太守諸大處分皆委于劉穆之倉猝立定無不允惬裕遂託以腹心時晉政寛弛綱紀不立豪族陵縱小民窮蹙穆之斟酌時宜隨方矯正裕以身範物先以威禁内外肅然諸葛長民至豫州失期不得發刁逵執之檻車送桓元未至而元敗送人共破檻出長民還趣厯陽逵棄城走其下執以送裕斬于石頭豫州晉南渡後僑置于厯陽元至尋陽逼帝西上劉毅等帥兵追之元在道自作起居注叙討劉裕經畧舉無遺䇿諸軍違節度以致奔敗專思著述不暇與羣下議事已而元挾帝入江陵恐威令不行更增峻刑罰衆益離怨荆江諸郡間元播越有上表問起居者元皆不受更令所在賀遷新都劉裕推武陵王遵字茂逺威王晞子承制行事裕稱受密詔以遵承制入居東宫内外畢敬遷除稱制教稱命劉敬宣司馬休之自南燕來歸劉敬宣髙雅之結青州大姓及鮮卑豪帥謀殺南燕王備徳推司馬休之為主謀泄南走南燕人追殺雅之敬宣休之至淮泗間聞桓元敗遂來歸劉裕以敬宣為晉陵吳毘陵郡晉更名今江南常州府是太守休之為荆州刺史敬宣尋為江州刺史夏四月何無忌及元兵戰于桑落洲在江西九江府徳化縣東北大破之桓元遣庾稚祖何澹之等守湓口何無忌劉道規至桑落洲澹之等逆戰澹之常所乘舫旗幟甚盛無忌曰賊帥必不居此欲詐我耳今寡衆不敵戰無全勝此舫戰士必弱我以勁兵攻之必得之得之則彼勢沮而我氣倍因而薄之破賊必矣遂攻得之因傳呼曰已得何澹之矣賊軍驚擾官軍亦以為然乘勝大破之遂克湓口進據尋陽遣使奉送宗廟主祏還京師元挾帝東下五月劉毅等及元戰于崢嶸洲在湖北武昌府東昌縣東北一名得勝洲大破之元復挾帝入江陵寧州督䕶馮遷擊元誅之帝復位桓元收集荆州兵有衆二萬復帥諸軍挾帝東下使徐放説劉裕等散甲裕等不聼劉毅何無忌劉道規帥衆自尋陽西上與元遇于崢嶸洲道規麾衆先進毅等從之乘風縱火盡鋭爭先元衆大潰元挾帝單舸西走留永安何皇后穆帝后及王皇后帝之后于巴陵殷仲文因叛元奉二后還建康元與帝入江陵欲奔漢中而人情乖沮乃與腹心百餘人夜出更相殺害僅得至船左右奔敗荆州别駕王康産奉帝入南郡府舎校尉毛脩之字敬文璩之弟子誘元入蜀元從之會毛璩弟寧州刺史璠卒官璩使兄孫祐之及叅軍費恬帥數百人送其喪遇元于枚回洲在荆州府江陵之西南迎擊之督䕶馮遷漢嘉人抽刀而前元曰汝何人敢殺天子遷曰我殺天子之賊耳遂斬之乘輿反正于江陵以脩之為驃騎將軍大赦奉神主于太廟毅等傳送元首梟于大桁閠月桓振襲江陵陷之劉毅等進兵討之不克毅等既戰勝以為大事已定不急追躡元死幾一旬諸軍猶未至桓謙及振竄匿復出聚衆襲江陵陷之殺王康産振見帝于宫欲行弑逆謙苦禁之乃拜而出為元舉哀追謚謙帥羣臣奉璽綬于帝侍御左右皆振腹心何無忌劉道規進攻謙于馬頭城名在荆州府公安縣東水經注江津戌南封馬頭岸即此破之無忌直趨江陵振逆戰于靈溪在荆州府江陵縣西無忌等大敗退還尋陽秋七月永安皇后何氏崩九月魏改官制魏主置六謁其秩五品凖古六卿臨昭陽殿親加銓擇列爵四等曰王公侯子王封大郡公封小郡侯封大縣子封小縣其品第一至第四又置散官五等其品第五至第九前世職次皆無從品魏制自第一至第九皆有之文官材能秀異武官堪為將帥者其品亦比第五至第九百官有闕則于其中擢補之其官多倣上古龍官鳥官謂諸曹之使為鳬鴨取其飛之速疾也謂候官伺察者為白鷺取其延頸逺望也餘皆類此冬十一月魏命宗室州郡各置帥魏主命宗室置宗師八國即八部見前置大師小師州郡亦各置師以辨宗黨舉材行如魏晉中正之職燕王熙與其后苻氏苻謨㓜女遊白鹿山在今喀喇右翼西北水經注石城川水北屈逕白鹿山西即此今蒙古名是山為布虎圖是行士卒為虎狼所害及凍死者五千餘人熙為苻氏起承華殿負土北門與榖同價苻氏嘗季夏思凍魚熙下有司切責不得斬之乙巳義熙元年南燕主慕容超太上元年西凉建初元年春正月劉毅等入江陵桓振亡走謙奔秦先是劉毅等進克巴陵號令嚴整所過百姓安恱至是軍至馬頭桓振挾帝岀屯江津遣使求割江荆二州奉送天子毅等不許會南陽太守魯宗之字彦仁扶風郿人起兵襲襄陽桓蔚南走宗之進屯紀南注見前振留桓謙馮該守江陵而自引兵與宗之戰毅等擊破該于豫章口在江陵縣東南水經江水又東得豫章口注夏水所通也謙棄城走毅等入江陵執卞範之等斬之振還知城已陷其衆皆潰乃逃于溳川亦曰鄖川在湖北徳安府安陸縣詔大處分悉委冠軍將軍劉毅大赦改元惟桓氏不原以桓冲盡忠王室特宥其孫𦙍徙新安以魯宗之為雍州東晉僑置雍州于襄陽刺史毛璩為征西將軍督梁益等五州弟瑾為梁秦刺史瑗為寧州刺史桓謙何澹之等皆奔秦既而桓振復襲江陵將軍劉懷肅與戰誅之劉懷肅彭城人秦以鳩摩羅什為國師秦王興以鳩摩羅什為國師奉之如神帥羣臣及沙門聼講又命羅什繙譯西域經論大營塔寺沙門坐禪者常以千數由是州郡化之事佛者十室而九西凉公暠遣使來上表西凉公暠自稱大將軍領秦凉二州牧遣黄始梁興間行奉表詣建康二月帝東還留臺備法駕迎帝于江陵劉毅劉道規留屯夏口何無忌奉帝東還益州叅軍譙縱巴西南充人殺其刺史毛璩自稱成都王先是毛璩遣兵攻梁州誅元所署刺史桓希已聞桓振陷江陵帥衆三萬順流東下將討之使其弟瑗出外水蜀有内水外水内水即涪江亦曰内江外水即岷江亦曰蜀江水經注江州縣對二水口右則涪内水左則蜀外水是也叅軍譙縱岀涪水蜀人不樂逺征逼譙縱為主璩聞變奔還成都遣兵討之不克營户民之分配軍營者為營户開城納縱殺璩及瑗縱自稱成都王于是蜀大亂漢中空虚氐王楊盛遣其兄子撫據之三月帝至建康除拜琅邪王徳文武陵王遵劉裕以下有差帝至建康百官詣闕待罪詔令復職尚書殷仲文以朝廷音樂未備言于劉裕請治之裕曰今日不暇給且性所不解仲文曰好之自解裕曰正以解則好之故不習耳以琅邪王徳文為大司馬武陵王遵為太保劉裕為侍中車騎將軍都督中外諸軍加録尚書裕皆不受而請歸藩尋以裕都督十六州軍事出鎮京口以劉敬宣為宣城内史初劉毅嘗為劉敬宣叅軍時人或以雄傑許之敬宣曰非常之才自有調度此君外寛而内忌自伐而尚人若一旦遭遇亦當以陵上取禍耳毅聞而恨之及敬宣為江州毅使人言于裕曰敬宣不預建義授郡已為過優聞為江州尤用駭惋敬宣不自安請解職乃召還為宣城内史以盧循為廣州刺史先是盧循陷番禺注見前徐道覆陷始興注亦見前時朝廷新定未暇征討以循為廣州刺史徐道覆為始興相循遣使獻貢因遺劉裕益智粽裕報以續命湯循之陷番禺也執刺史吳隠之至是裕與循書命遣𨼆之還循不從久乃遣之城吳隐之字處黙濮陽甄人夏五月劉毅何無忌討滅桓元餘黨荆湘江豫皆平桓元餘黨苻宏等擁衆冦郡縣者以十數劉毅等分討滅之荆湘江豫皆平詔以毅為都督淮南五郡豫州刺史何無忌都督江東五郡會稽内史秋七月劉裕遣使求和于秦得南鄉晉郡故城在今南陽府浙川縣等十二郡劉裕遣使求和于秦因求南鄉諸郡秦王興許之羣臣以為不可興曰天下之善一也劉裕㧞起細微能討桓元復晉室内釐庶政外脩封疆吾何惜數郡不以成其羙乎遂以十二郡歸晉九月南燕主備徳卒太子超字祖明備徳兄子立汝水胡三省注汝當作女水在山東青州府臨淄縣東南水經注女水岀東安平縣之蛇頭山或云齊桓公女冡在其上故以名水東北流入巨淀竭南燕主備徳惡之俄而寢疾先是備徳兄子超自秦逃歸封比海王備徳前從秦王堅南冦留金刀與其母公孫氏别及備徳與垂舉兵山東秦殺其兄納及其諸子公孫氏以老得免納妻段氏方娠備徳故吏呼延平引奔羗中生超十嵗而公孫氏卒以刀授超已而平以超母子奔凉呂隆降秦隨徙長安平卒段氏為超娶其女超恐為秦所録乃陽狂行乞會備徳遣人視之超不敢告其母妻潛變姓名逃歸以金刀獻備徳備徳悲慟不自勝乃封超為北海王及是超請禱于汝水備徳曰人命在天非汝水所能制也病篤召羣臣議立超為太子俄而地震君臣震恐是夕備徳卒為十餘棺夜分出四門潛瘞山谷超即位虚葬備徳于東陵超既立以母妻猶在秦遣使請之秦要使稱藩且令獻太樂諸伎超從之秦乃還超母妻厚其資禮而遣之西凉徙都酒泉西凉公暠與長史張邈謀徙都酒泉以逼沮渠䝉遜暠手令戒諸子曰從政者當審慎賞罰勿任愛憎近忠正逺佞諛勿使左右竊弄威福毁譽之來當研覈真偽聼訟折獄必和顔任理慎勿逆詐億必輕加聲色務廣咨詢勿事専用吾涖事五年雖未能息民然含垢匿瑕朝為冦讐夕委心膂事任公平坦然無類計近則如不足經逺乃為有餘庶亦無愧于前人也丙午二年夏六月秦以秃髮傉檀為凉州刺史守姑臧南凉傉檀伐北凉還獻馬三千匹羊三萬口于秦秦王興以為忠以傉檀為凉州刺史鎮姑臧徴王尚還凉州人遣主簿胡威請留尚弗許威見興流涕言曰臣州僻逺仗良牧仁政保全至今陛下奈何以臣等貿馬羊乎若軍國湏馬直煩尚書一符臣州三千餘户朝下而夕可辦也昔漢武帝傾天下資力開拓河西以斷匃奴右臂今無故棄五郡忠良華族以資暴虜豈惟臣州士民墜于塗炭恐方為聖朝旰食之憂興悔之使人馳止尚則傉檀己軍五澗逼遣尚行矣五澗水名在凉州府武威縣東今謂之雜木澗原出天梯山北流合黄羊川傉檀雖受秦爵命然其車服禮儀皆如王者冬十月論建義功封賞劉裕等有差劉裕豫章郡公劉毅南平郡公何無忌安成郡公自餘封賞有差西秦乞伏乾歸如秦秦王興以乾歸寖彊難制留為主客尚書以其子熾磐監其部衆丁未三年燕王髙雲正始元年夏主赫連勃勃龍升元年是嵗燕慕容熙亡舊大國二秦魏小國四南凉北凉南燕西凉新小國二燕夏凡八僭國春二月劉裕殺東陽太守殷仲文及桓冲孫𦙍夷其族仲文素有才望自謂宜秉朝政出為東陽太守悒悒不樂何無忌素慕其名仲文許便道脩謁無忌喜欽遲之而仲文失志恍惚遂不過府無忌以為薄己大怒會南燕入冦無忌言于劉裕曰桓𦙍殷仲文乃腹心之疾北虜不足憂也會裕府將駱球謀作亂伏誅裕因言球與仲文桓𦙍有謀皆族誅之夏六月赫連勃勃劉衛辰之子見前自稱大夏天王勃勃魁岸羙風儀性辨慧秦王興見而竒之與論大事寵遇踰于勲舊興弟邕曰勃勃不可近也興曰勃勃有濟世才吾方與之平天下奈何逆忌之乃以為將軍使助没奕干鎮髙平伺魏間隙邕固爭興乃止久之竟配以雜虜二萬餘落使鎮朔方勃勃遂謀叛秦柔然獻馬于秦勃勃掠取之襲殺没奕干而并其衆自謂夏后氏之苖裔匈奴桀子淳維之後稱大夏天王勃勃以其先從母姓劉氏為非禮乃改姓赫連氏言其徵赫與天連也秋七月戊戌朔日食燕髙雲弑其主熙自立為天王初燕將軍馮䟦字文超長樂信都人得罪于燕主熙亡命山澤熙賦役繁數民不堪命䟦因民之怨欲舉大事潛入龍城匿于孫䕶家會熙后苻氏卒熙哭之絶而復蘇斬衰食粥命百官哭無淚者罪之又以其嫂張氏為殉及是熙岀送葬被髮徒跣歩從二十餘里跋等與將軍張興等作亂推熙養子夕陽公雲為主雲前從熙襲髙句麗傷于矢且畏熙之虐遂以疾去官及是跋至其家扶之而岀帥衆入宫授甲閉門拒守熙還攻北門不克雲遂即天王位大赦改元執熙弑之復姓髙氏以跋為都督中外諸軍録尚書事夏王勃勃破薛干等部降之遂進攻秦及南凉大破之夏王勃勃破鮮卑薛干等三部降其衆以萬數進攻秦三城在陜西延安府膚施縣以北諸戌斬秦將楊丕姚石生等諸將請都髙平以固根本勃勃曰吾大業草創姚興亦一時之雄未可圖也今專固一城彼必并力于我亡可立待不如以驍騎風馳出其不意救前則擊後救後則擊前使彼疲于奔命我則㳺食自若不及十年嶺北胡三省注九峻嶺之北河東盡為我有待興既死徐取長安在吾計中矣于是侵掠嶺北諸城秦主興乃歎曰吾不用黄兒姚邕小字之言以至于此勃勃求婚于南凉傉檀不許勃勃帥騎二萬擊破之名臣勇將死者什六七勃勃積尸而封之號曰髑髏臺戊申四年南凉嘉平元年春正月劉裕自為揚州刺史録尚書事王謐既卒劉􅐧等不欲劉裕入輔政議以謝混字叔原琰之子為揚州刺史或欲令裕于丹徒領揚州以内事付孟㫤遣皮沈以二議諮裕沈先見劉穆之具道朝議穆之宻白裕請入朝穆之曰晉命已移公勲髙位重豈得遂為守藩之將邪劉孟與公俱起布衣立大義以取冨貴一時相推非委體心服宿定臣主之分也力敵勢均終相吞噬揚州根本所繋不可假人前者以授王謐事出權道今若復以他授便應受制于人一時權柄何由可得今但答以此事既大非可懸論便暫入朝共盡同異公至京邑彼必不敢越公更授餘人矣裕從之朝廷乃徴裕為侍中揚州刺史録尚書事裕解兖州以諸葛長民鎮丹徒劉道憐祫中弟戍石頭南燕主超祀南郊超任所親公孫五樓為腹心猜虐日甚五樓欲朝權譖比地王鍾請誅之鍾懼遂與段宏謀反不克鍾奔秦宏奔魏至是超祀南郊有獸如鼠而赤大如馬來至壇側湏臾大風晦冥羽儀帷幄皆毁裂超懼以問太史令成公綏對曰陛下信用姦佞誅戮賢良賦役繁重之所致也超乃黜五樓等尋復用之夏五月譙縱稱藩于秦先是劉裕遣將軍毛修之與益州刺史司馬榮期其討譙縱榮期為㕘軍楊承祖所殺修之退屯白帝至是縱稱藩于秦且請桓謙與共擊劉裕秦王興以問謙謙因請行興曰小水不容巨魚若縱才力自足辦事亦不假君為羽翼矣遂遣之謙至成都虚懷引士縱疑之置于龍格使人守之胡三省注龍格即廣都縣龍爪灘之地已而裕表劉敬宣督修之討縱敬宣入峽轉戰而前去成都五百里秦遣兵救之縱亦悉衆拒守會饑疫乃引軍還敬宣坐免官裕降號中軍將軍秦遣兵襲南凉討夏皆敗績秦王興以傉檀内外多難傉檀為赫連勃勃所敗其諸將梁裒邊憲等以謀叛誅欲因而取之使韋宗徃覘傉檀與言經世大畧縱横無窮宗退嘆曰竒才英噐不必華夏眀智敏識不必讀書吾乃今知九州之外五經之表復自有人也歸言于興曰凉州雖弊未可圖也興不聼使其子廣平公弼將軍斂成帥歩騎三萬襲傉檀僕射齊難帥騎三萬討勃勃弼長驅至姑臧傉檀嬰城自守出竒兵擊破之命郡縣悉散牛羊于野歛成縱兵鈔掠又擊敗之勃勃聞秦兵且至退保河曲黄河千里一曲此河曲在朔方之北齊難遂縱兵夜掠勃勃潛師襲取之遂禽難虜其將士萬三千人于是嶺北夷夏附于勃勃者以萬數勃勃皆置守宰以撫之冬十一月南凉復稱王己酉五年魏太宗拓跋嗣永興元年北燕王馮跋太平元年西秦更始元年舊大國二秦魏小國六南凉北凉南燕西凉北燕夏新小國一西秦凡九僭國春二月南燕冦掠宿豫晉縣後魏置郡唐仍為縣曰宿遷今屬江南徐州府南燕主超正旦朝會歎大樂不備議掠晉人以補伎韓􅒲曰先帝以舊京傾覆戢翼三齊陛下不養士息民伺釁恢復而更侵掠南隣以廣仇敵可乎超曰我計已定不與卿言遂遣公孫五樓兄歸將兵冦宿豫㧞之大掠而去簡男女二千五百付太樂教之時五樓專總朝政宗親並居顯要尚書都令史王儼謟事五樓比嵗屡遷官至左丞國人為之語曰欲得侯事五樓三月恒山注見前崩夏四月雷震魏天安殿雷震魏天安殿東序魏主惡之命以衝車攻東西序皆毁之初魏主服寒食散煉鍾乳硃砂等藥為之云可辟火食故曰寒食胡三省注晉人多服此散葢始于何晏藥發躁怒無常至是寖劇又災異數見占者言有急變生肘腋魏主憂懣廢寢食每百官奏事至記其舊惡輙殺之死者皆陳天安殿前羣臣多不敢求親近惟著作郎崔浩字伯淵清河人恭勤不懈父吏部尚書宏未嘗諂諛亦不忤㫖故父子獨不被譴劉裕伐南燕六月及燕師戰于臨朐晉縣今屬山東青州府大破之遂圍廣固劉裕抗表伐南燕朝議皆以為不可惟孟㫤謝裕字景仁安從孫臧熹勸行裕以㫤監南府事初苻氏之敗王猛孫鎮惡來奔騎射不能及人而有謀畧善果斷喜論軍國大事至是或薦于裕與語悦之因留宿明旦謂叅佐曰吾聞將門有將信然即以為中軍叅軍裕帥舟師自淮入泗五月至下邳留輜重歩進至琅邪所過皆築城留兵守之或謂裕曰燕人若塞大峴山名在臨朐縣東南齊乘大峴山即穆陵闗也為齊南天險之險或堅壁清野大軍深入不唯無功將不能自歸奈何裕曰吾慮之熟矣鮮卑貪婪不知逺計進利虜獲退惜禾苗謂我孤軍逺入不能持久不過進據臨朐退守廣固必不能守險清野敢為諸君保之南燕主超召羣臣會議公孫五樓曰吳兵利在速戰宜據大峴使不得入曠日延時且其鋭氣然後徐簡精騎循海而南絶其糧道段暉帥兖州之衆縁山東下腹背擊之此上策也各命守宰依險自固投其資儲餘悉焚使敵無所得旬月之間可以坐制此中䇿也縱賊入峴出城逆戰此下策也超曰今嵗星居齊以天道推之不戰自克客主勢殊以人事言之彼逺來疲敝勢不能久奈何芟苗徙民先自蹙弱乎不如縱使入峴以精騎蹂之何憂不克桂林王鎮曰陛下必以騎兵利平地者宜岀峴逆戰戰而不勝猶可退守不宜縱兵入峴自棄險固也超不從鎮出歎曰既不能逆戰又不肯清野延敝入腹坐待攻圍酷似劉璋矣超聞之怒收鎮下獄裕過大峴燕兵不出裕舉手指天喜形于色左右曰公未見敵而先喜何也裕曰兵已過險士有必死之志餘糧樓畆人無匱乏之憂虜已入吾掌中矣六月裕至東莞超先遣五樓及段暉等將歩騎五萬屯臨朐聞晉兵入峴自將步騎四萬往就之裕以車四千乘為左右翼方軌徐進與燕兵戰于臨朐南日昃時勝負未决叅軍胡藩言于裕曰燕悉兵出戰臨朐城中留守必寡願以竒兵從間道取其城此韓信所以破趙也裕遣藩等潛師岀燕兵後攻臨朐聲言輕兵自海道進遂克之超大驚單騎就暉于城南裕因縱兵奮擊大敗之斬暉等大將十餘人乘勝逐北至廣固克其大城超入保小城裕築長圍守之撫納降附采抜賢俊因齊地糧儲停江淮漕運超遣張綱乞師于秦赦桂王鎮以為都督且問計焉鎮曰聞秦自有内患恐不暇救人今散卒尚有數萬宜悉出金帛以餌之更决一戰若天命助我必能破敵如其不然死亦為美樂浪王恵曰晉軍氣勢百倍我以敗卒當之不亦難乎秦與我如唇齒也安得不來相救超從恵計復遣韓範如秦裕圍城益急超請割地稱藩不許秦王興遣使謂裕曰今遣鐡騎十萬屯洛陽晉軍不還當長驅而進矣裕謂其使者曰語汝姚興我克燕之後息兵三年當取關洛今能自送便可速來劉穆之閒裕言尤之曰此語不足威敵適足以怒之若廣固未㧞羗冦奄至不審何以待之裕答曰此正是兵機非卿所解夫兵貴神速彼若審能赴救必畏我知寜容先告今設此言是自張大之辭耳晉師不出久矣羗見伐齊殆將内懼自保不暇何能救人耶秋七月西秦復稱王先是乞伏乾歸自秦逃歸苑川留世子熾磐鎮枹罕至是復稱王乾歸以安南焦遺為太子太師謂熾磐曰焦生非特名儒乃王佐之才也汝事之當如事吾遺子華至孝乾歸欲以女妻之辭曰凡娶妻者欲與之共事二親也今以王姬之貴下嫁蓬茅之士臣懼其闕于中饋也乾歸乃止冬十月燕弑其君雲馮跋自立為天王是為北燕跋考晉書以馮為北燕髙雲則附後燕之末以雲為慕容熙養子也通鑑于雲即稱北燕今仍依晉書燕王雲自以無功徳而居位内懷危懼嘗蓄養壯士以為腹心爪牙寵臣離班桃仁專典禁衛賞賜巨萬衣服起居皆與之同而班仁志願無厭猶有怨憾至是殺雲後燕白慕容垂僭立至熙凡四主又髙雲簒位一年而亡合二十五年馮跋升門觀變帳下共斬班仁䟦遂即天王位于昌黎以其弟范陽公素弗録尚書事素弗謙恭儉約以身率下百僚憚之論者美其有宰相之度魏拓跋紹弑其君珪齊王嗣討紹誅之遂自立魏主珪將立齊王嗣為太子魏故事凡立嗣子輙先殺其母乃賜嗣母劉貴人死召嗣諭之嗣性孝哀泣不自勝珪怒嗣還舎日夜號泣珪復召之左右曰上怒甚入將不測不如且避之嗣乃逃匿于外惟帳下車路頭代人王洛兒京兆人隨之初珪見賀太后之妺美殺其夫而納之生清河王紹紹兇狠無頼珪嘗倒懸井中垂死乃出之至是譴責賀夫人將殺之夫人密使告紹曰何以救我紹夜與宦者宫人通謀踰垣入宫弑珪嗣聞變遣洛兒入平城告將軍安同遼東人等衆翕然響應爭出奉迎衛士執紹送嗣嗣并賀氏殺之乃即位謚珪曰宣武廟號烈祖公卿先罷歸第者悉用之詔長孫嵩與安同奚斤崔宏等八人坐止車門右共聼政時人謂之八公十二月太白犯虚危南燕靈臺令張光勸南燕王降超手殺之庚戌六年是嵗南燕亡大國二秦魏小國六西凉南凉北凉北燕夏西秦凡八僭國春二月劉裕㧞廣固執南燕主超送建康斬之南燕城久閉男女病脚弱者大半出降者相繼尚書悦夀曰今戰士凋疲外援絶望豈可不思變通之計生超歎曰廢興命也吾寜奮劍而死不能銜璧而劉裕悉衆攻城或曰今日往亡不利行師裕曰我往彼亡何為不利四面急攻之悦夀開門納晉師超哭圍岀走追獲之裕數以不降之罪超神色自若一無所言惟以母託劉敬宣而已先是韓範以秦兵來救會秦為夏所敗追其兵還範遂降于裕至是裕以廣固久不下欲盡阬之以妻女賞將士範諫曰晉室南遷中原鼎沸士民無援强則附之既為君臣必湏為之盡力彼皆衣冠舊族先帝遺民今王師弔伐而盡阬之竊恐西北之人無復來蘇之望矣裕改容謝之然猶殺王公以下三千人没入家口萬餘夷其城隍裕送超詣建康斬之南燕自慕容徳僭立至超亡凡二主合十一年盧循冦陷長沙南康晉郡治贛縣今江西贛州府是諸郡劉裕引軍還三月江荆都督何無忌討徐道覆戰敗死之謚曰忠肅初徐道覆聞劉裕北伐勸盧循襲建康不從自至番禺説之循乃自始興冦長沙道覆冦南康廬陵豫章皆陷之道覆順流而下舟楫甚盛朝廷急徴裕裕方議留鎮下邳經營司雍會得詔乃引兵還裕以韓範為都督八郡軍事封融為渤海太守久之劉穆之稱範融謀反皆殺之江荆都督何無忌自尋陽引兵拒循與道覆遇于豫章賊令强弩數百登山邀射乘風暴急以大艦逼之衆遂奔潰無忌厲聲曰取我蘓武節來節至執以督戰賊衆雲集遂握節而死中外震駭劉裕至下邳以船載輜重自帥精鋭歩歸間何無忌敗死卷甲兼行將濟江風急衆咸難之裕曰若天命助我風自當息不然覆溺何害即命登舟舟移而風止遂至建康夏五月豫州都督劉毅及盧循戰于桑落洲注見前敗績循進逼建康毅將自拒盧循裕與書曰賊新獲利其鋒不可輕今修船畢當與弟同舉又遣劉藩毅從弟諭止之毅怒謂藩曰往以一時之功相推耳汝以我真不及劉裕邪投書于地帥舟師二萬發姑孰五月與循戰于桑落洲毅兵大敗棄船步走其衆皆為循所虜循聞裕已還與其黨相視失色欲退還尋陽取江陵據二州以抗朝廷徐道覆謂宜乘勝徑進固爭累日循乃從之裕募人為兵賞之同京口赴義之科發民治石頭城議者謂宜分兵守津要裕曰賊衆我寡若分兵屯守賊易測我虚實且一處失利則沮三軍之心今聚衆石頭隨宜應付既令彼無以測又于衆力不分若徒旅漸集徐更論耳朝廷聞劉毅敗人情恟懼時北師始還將士多創病建康戰士不盈數千循既克二鎮戰士十餘萬舟車百里樓船髙十二丈孟㫤諸葛長民欲奉乘輿過江裕不聼叅軍王仲徳言于裕曰明公新建大功威鎮六合妖賊既聞凱旋自當奔潰若先自遁逃則勢同匹夫匹夫號令何以威物裕然之㫤固請不已裕曰今重鎮外傾强冦内逼人情危駭莫有固志若一旦遷動便自土崩瓦解江北亦豈可得至設令得至不過延日月耳今兵士雖少自足一戰若其克濟則臣主同休茍厄運必至我當横尸廟門遂其以身許國之志不能草間求活也㫤恚甚旋卒人王仲徳名懿以字行太原祈循至淮口秦淮入江之口中外戒嚴琅邪王徳文都督宫城裕屯石頭謂將佐曰賊于新亭直進其鋒不可當宜且避之若廻泊西岸此成禽耳裕登城見循軍引向新亭顧左右失色既而廻泊蔡洲乃悦遂栅石頭淮口修治越城在江寜縣西南寰宇記越相范蠡所築築查浦在江寜縣西藥園種芍藥之所廷尉官寺所在因以為名三壘皆以兵守之六月劉裕自為太尉中書監加黄鉞復辭官而受黄鉞秋七月盧循退還尋陽劉裕遣兵追之循冦掠諸縣無所得謂徐道覆曰師老矣不如還尋陽并力取荆州據天下三分之二徐更與建康爭衡耳遂還裕使王仲徳等帥師追之劉裕遣將軍孫處字季髙會稽永興人等率兵襲番禺劉裕還東府大治水軍遣將軍孫處沈田子吳興武康人自海道襲番禺衆以為海道艱逺必至為難且分撤現力非目前之急裕不從勅處曰大軍十二月之交必破妖虜卿至時先傾其巢窟使彼走無所歸也循兵守廣州者不以海道為虞處乘海奄至㑹大霧四靣攻之即日㧞其城處撫其舊氏戮循親黨勒兵謹守分遣田子等擊嶺表諸郡譙縱使桓謙會秦將茍林入冦荆州刺史劉道規大破斬之譙縱遣使請兵于秦以謙為荆州刺史帥衆二萬冦荆州秦王興遣將軍茍林帥騎兵會之謙于道召募舊民投之者二萬人謙屯枝江漢縣今屬荆州府林屯江津士民多懐觀望道規乃會將士告之曰聞諸長者頗有去就之計吾東來文武足以濟事若欲去者不相禁也因夜開城門達曉不閉衆咸憚服莫有去者魯宗之帥衆數千自襄陽赴救或謂宗之情未可測道規單馬迎之宗之感悦道規使之居守委以腹心道規帥諸軍攻謙水陸齊進戰于枝江天門吳郡今為石門縣屬湖南澧州太守檀道濟髙平金鄉人先進陷陳大破之謙林皆走並追斬之初謙至枝江江陵士民皆與書言城中虚實許為内應至是檢得之道規悉焚不視衆乃大安桓石綏亦起兵于洛口洛谷水入漢之口在今漢中府洋縣梁州刺史何紹討斬之桓氏遂滅冬十月劉裕南擊盧循劉毅還至建康固求追討盧循長史王誕字茂世琅邪臨沂人密言于劉裕曰毅既喪敗不宜復使立功裕乃帥劉藩檀韶字令孫金鄉人等南擊循以毅監留府徐道覆冦江陵劉道規大破之徐道覆帥衆三萬趣江陵奄至破冡在江岸之東江漢士民感劉道規焚書之恩無復貳志道規使劉遵臨淮人别為遊軍自拒道覆于豫章口前驅失利遵自外横擊大破之斬首萬餘級餘多赴水死道覆單舸走還湓口十二月劉裕及盧循戰于大雷注見前又戰于左里即左蠡城名在今江西南康府都昌縣大破之循及徐道覆南走裕遣將軍劉藩等追之劉裕軍雷池盧循揚聲不攻雷池當乘流徑下裕知其欲戰進軍大雷循及徐道覆帥衆數萬塞江而下裕悉出輕騎及水軍擊之又分歩騎屯于西岸先備火具裕以勁弩射循軍因風水之勢以蹙之循艦悉泊西岸岸上軍投火焚之循道覆兵大敗將趣豫章乃悉力栅斷左里裕至攻之麾兵將進麾折幡沈衆皆懼裕笑曰往年覆舟之戰如是今乃復見必破賊矣即破栅而進殺溺死者萬餘人循收散卒徑還番禺道覆走始興裕遣劉藩孟懷王平昌安邱人等追之遂還建康御批厯代通鑑輯覽卷三十五

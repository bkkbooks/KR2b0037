front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷五十五唐元宗明皇帝戊寅開元二十六年春正月令天下州縣里皆置學夏六月立忠王璵為皇太子改名亨先更名紹又更名亨
  hash: sha256:f53849c2b56230327d49770029bc27423e661480815ee2a630c2fc4afa6edcf7

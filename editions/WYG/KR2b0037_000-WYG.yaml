body:
  text: 御製歴代通鑑輯覽序編年之書莫備於皇祖御批之資治通鑑綱目蓋是書集三編為一部自三皇以至元末明初振綱挈目謹予嚴奪足以昭萬世法戒為人君者不可不日手其帙而心其義也然皇祖雖嘗抉精微徵辭㫖著論百餘首亦惟析疑正陋垂教後世耳於其書則一仍厥舊無所筆削也故全書篇幅雖多而議論乃什倍於事實即如前編之中總論史論音釋辨疑考證紛不一家正編之中凡例發明書法考異集覽考證正誤質實濫觴益甚至於續編之作成於有明諸臣其時周禮沿尹起莘例作發明而廣義則出於張時泰效劉友益書法而為之者夫發明書法其於歴朝興革正統偏安之際已不能得執中之論而况效而為之者哉且以本朝之臣而紀其開國之事自不能不右本朝而左勝國此亦理之常也况三編中嬗代崛起之際稱太祖而繫以我者不一而足亦非體例也故命儒臣纂歴代通鑑輯覽一書盡去歴朝臣各私其君之習而歸之正自隆古以至本朝四千五百五十九年事實編為一部全書於凡正統偏安天命人心繫屬存亡必公必平惟嚴惟謹而無所容心曲徇於其間觀是書者凛天命之無常知統系之應守則所以教萬世之為君者即所以教萬世之為臣者也書中批論一依皇祖之例自述所見據事以書者十之三儒臣擬批者十之七而經筆削塗乙者七之五即用其語弗㸃竄者亦七之二云乾隆丁亥秋月御筆御製觀通鑑輯覽至褚遂良貶潭州事嘉其忠悃輙效其體擬作元舅與功臣由來不可誅草茅承顧託寜當惜殘軀忍視夷姜汚曲從政君誣國是太宗創臣忝召奭徒叩首願還笏忤㫖罪奚逋潭州被薄譴敢曰非其辜迴首望金門無言以嗟吁御製書通鑑輯覽明崇禎甲申紀年事通鑑輯覽將成司事者舉通鑑綱目三編之例扵甲申嵗􅁒大書順治元年分注崇禎十七年於下且凡勝朝事皆别書明而扵李自成陷京師即繫以明亾余曰不可夫三編之例非􅄒續編之例乎續續扵元順帝二十七年即分注明年元主北奔而繫以元亾去至正二十八年為洪武元年且自順帝十五年眀祖起兵之後扵凡元政即别書元以示異雖臣各私其君之義也而朕實鄙之盖以理責人者必光以理自處天下者天下之天下非一家之天下也言悖而出者亦悖而入居今之時貶亡明而尊本朝如眀之元其誰曰不可然朕不為也也通鑑輯覽之書非一時之書乃萬世之書扵正統偏安之繫必公必平天命人心之嚮必嚴必謹且正編續編既一正其自視尊大之陋習而頋扵本朝嬗代之際有所偏向是不有恧於心而貽来世之譏乎兹扵甲申嵗仍命大書崇禎十七年分書順治元年以别之即李自成陷京師亦不遽書明亡而福王𢎞光元年亦令分注扵下必俟次年福王於江寜被執而後書眀亡夫福王設於江南能自立未嘗不可為南北朝如宋髙宗之例也而奈其日即慆淫以致天命去而人心失是非開創者欲究我兵威而實守成者自失其神器也若夫唐王桂王窮竄邉隅苟延旦夕此正與宋之帝昺帝昰同例不可仍以正統屬之用以示萬世守成之主思天命人心之難諶凛凛乎惴惴乎保祖宗所貽留為臣民所繫屬而不敢謬恃書法之可有髙下焉庶㡬朕纂通鑑輯覽之本意或不失春秋大一統之義乎命通鑑輯覽附紀明唐桂二王事蹟諭甲申嵗我國家既定鼎京師而明福王朱由崧為南京諸臣迎立改元首尾一載其後唐王朱聿鍵桂王朱由榔相繼稱號者又十有餘年當時以其事渉本朝開創之初凡所紀年號例從芟削即朱璘之明紀輯畧亦以附三王紀年為浙江撫臣等所奏燬兹以搜訪遺籍外省奏進此書閲其體例非不尊崇本朝且無犯諱字跡徒以附紀明末三王自不宜在概禁之列前命編纂通鑑輯覽館臣請不録福王事寔因念厯朝嬗代之際進退予奪繫乎萬世公論若前代偏私􅃝徇之陋習以曲筆妄為髙下朕寔鄙之即如福王承其遺緒江山半壁疆域可慿使能立國自强未甞不足比於宋髙宗之建炎南渡乃孱弱荒滛自貽顚覆而偏安之規模未失不可遽以亡國法絶之特命於崇禎末附紀福王年號仍用雙行分注而提綱則書明以為别至蕪湖被執始大書明亡葢所以折𠂻至是務合乎人情天理之公也至於唐王桂王遁跡閩滇茍延殘喘不復成其為國正與宋末昰昺二王之流離海島者相類本不得等於福王之例是以輯覽内未經載入今思二王究為明室宗支與異姓僣竊者不同非偽託也且其始末雖無足道而奔竄事蹟亦多有可攷與其聴不知者私相傳述或致失實無稽轉不若為之約舉大凡俾知二王窮蹙情形不􅂈如此更可以正傳聞之譌舛又其下諸臣以旅拒王師者向多以偽官目之然其間如白文選李定國等本獻賊義子反側無常彼在明已合稱賊稱偽自當凖春秋書盗之例又如金堡等之五虎横行把持國是者亦無足齒録若其他各為其主始終不屈以至隕首捐軀者不一而足較宋末之文天祥陸秀夫寔相彷彿雖混一之初兵威迅掃不得不行抗命之誅而諸人瑣尾間闗有死無貳洵無愧人臣忠於所事之義迄今日乆將遂冺沒朕甚憫之亦宜略為紀緑使之有傳於後設以為載筆有體則凡事涉二王者不妨直以彼字稱之用存偏正之别而其臣則竟書為某王之某官某槩不必斥之為偽也明紀輯畧已命有司弛其禁而通鑑輯覽校刋將竣其令四庫全書館總裁詮叙唐桂二王本末别為附録卷尾凡彼時仗節死義之人考訂事跡悉與備書朕將親為裁定宣付刋行俾讀者咸知朕大中至正未甞有一毫私意偏倚其間而崇奨忠貞亦足以為世道人心之勸書成即以此諭同御製輯覽原序並冠卷端庻将來有所恭考喻朕意焉凡例一厯代通鑑纂要本明正德間所輯其書倣宋司馬光舉要之例上自伏羲下迄元代凡九十有二卷我皇上幾餘省覽以編内採録尚未精審特勅重加訂正并增入明代事迹釐為一百十六卷發凡起例皆經睿裁鑑定盡善盡美集史學之大成實足表裏六經準式萬世一朱子綱目及前編續編我聖祖仁皇帝御批刋布昭如星日我皇上聖學髙深緝熙繩武凡數千百年史䇿得失靡不條貫兼綜折衷美備臣等以次屬稿進呈仰䝉親御丹毫詳加論定其間析疑考異洞悉毫芒而大義所昭㣲言特掲謹次第敬録簡端用垂至教一年經事緯提綱分目一依朱子綱目書法一大書以提要分注以備言此綱目舊例也今提綱綴目皆酌用大書取便觀覽其有事非一時而牽連並及或語非至要而採摭堪資者則用小字附書至注内有更須詮釋者空格以别本文務使眉目朗然無淆覩記一表嵗首年綱目第一要義髙辛以前無甲子可紀帝堯甲辰以後謹遵聖祖仁皇帝御批綱目前編用邵子皇極經世書例編次干支標於每年之上歴代倣此至唐虞稱載夏稱嵗商稱祀周以後稱年皆隨其代而書之一劉恕陳桱通鑑外紀胡宏皇王大紀皆始於盤古其說荒遠難稽金履祥通鑑前編始自唐堯於上古事又多闕畧今以孔子繫易為斷肇始庖羲不更逺溯邃古一我國家誕膺符命朱果發祥瑞貺屢臻昭爍今古太祖髙皇帝肇興大業太宗文皇帝嗣炳鴻謨凡偉烈豐功事闗明紀者自宜登諸簡䇿用昭興運之隆今並㳟依實録敬謹纂輯一尚書備稱祀載春秋首紀春王統事表年實史家大法是書於厯代紀年之際大書分注進退攸闗皆仰禀聖謨權衡允協其有未改嵗而事渉兩朝者則並用一年兩系之例以存其統至附庸小國嵗首不書年號惟嗣位改元乃一書一正統偏安之辨其界最嚴前史毎以興代而紀載前朝因多偏徇若續綱目於宋元明之際更屬不公瀛國既執而猶以宋紀年順帝未亡而即標明國號任意低昂適足貽識者者今自景炎而後至正以前皆恪奉宸裁統歸元紀至於明之崇禎十七年明統尚存亦用大書紀嵗而福王事蹟並遵㫖採輯附書明紀大公至正曠古無倫謹於卷内恭録御製文冠諸卷首以昭定論一凡立綱書法褒貶攸闗仰䝉睿鑒精詳折𠂻至當大義炳然如賈充禇淵等之書死狄仁傑之書周唐肅宗之書太子徐夀輝之書害並以變文示義特筆所垂發千古未發之隠洵足微顯闡幽永彰法戒一綱目始於周威烈王之二十三年前編亦止於是年二書起訖之際自當區分明晰今於初命晉晉大夫一條另標卷首以還二書之舊一史法固宜簡要而紀載實貴詳明今自三代以前皆上本六經旁稽諸子秦漢而後事迹滋繁從本史以迄外乗稗官無不博採彚叅以衷至是其或異同互見之處並加案語考定弗蹈兩岐一綱目凡例凡命官惟宰相皆書餘官非有故不書今酌用其例凡宰臣之拜免及卒皆書其非有事跡顯然者則於他條互見若非宰相而用舍有關國是者則以特書例書之一前史措詞類多失實而南北區分之㑹則彼此互相指斥尤舛至公如五代晉之於遼南宋之於金於元皆嘗稱臣稱姪而交兵搆釁猶以入宼書之於情義實為未協今並恪遵指示酌量改定書法悉去偏私以歸至正一綱目一書乃朱子門人纂集紀年系月舛誤尚多至續綱目所載尤為疎畧失當如分䕫离不蕭幹為二人之類踳駁叠見考證難資今依据正史博稽羣籍悉正牴牾之舊以臻完善之觀一凡輿地名目悉按現在郡邑沿革注其大畧其有謬誤相沿之處仍行核正不使異義少滋至於本朝聲教四訖遐方絶域盡入版圖如河有重源足證都實傳聞之誤實為得諸目覩一破羣盲今並詳加按語用以垂信方來一凡卷内所見人名字里並依本傳詳注其有本史未立傳者則為旁採諸書俾無滲漏至或有一人而異名及數人而同名者亦悉分晰證明以資考核一金元二史出自後代儒臣之手大抵音譯失宜乖舛滋甚厯蒙指示以國語及䝉古語證合本音本義無不確合近又命喀爾喀親王成衮札布進所藏蒙古源流一書堪以互為考證今並遵㫖詳加譯改仍於初見處注明舊作某某字様俾開卷了然足資考据一唐宋而後野史漸夥增飾流傳殊難依據若宋太祖之斧聲燭影明惠宗之遜國出亡等事異說滋多尤當剖晰是非以昭定論今並隨文駁正勿使滋惑傳聞致乖大義一凡一事而首尾相距頗逺者綱目於前後皆為立綱雖起訖自明而檢尋未易今皆量其事之本末酌行總敘或於初見一條備言其終或於最後一條追敘其始仍用先是至是及初字尋字等文分别紀録眉清目朗庶覺貫串非難一綱目定例書月不書日今仍其舊惟日食則仍系日其或有事迹紛冗必須詳載干支次序方能明了者則亦於目内書日以别之一先儒論斷其醇正可取者間加甄録具載姓名其採於本史者則曰史臣或稱某史贊以别之一史家音注如司馬貞之於史記顔師古之於漢書胡三省之於資治通鑑並稱詳贍今於奥義竒文間採諸家之說為之箋釋至如賀善之贊尹起莘之發明以及周禮張時泰等所述皆摭拾空談文蕪義淺並加刋削以省繁文一杜預解左傳及胡三省解通鑑多有注某事始此某人始此等例今於事之有闗係者並倣其例酌加標注以便檢尋御批歴代通鑑輯覽告成進呈表大學士公臣傅恒等奉勅編纂御批歴代通鑑輯覽告成謹奉表上進者臣恒等誠惶誠恐稽首頓首上言欽惟我皇上法古綏猷右文成化稽帝堯而稽帝舜考禮樂以等百世之王監有夏而監有殷秉權衡以定一中之統刋厯代廿二家之史文訂差訛紀勝國三百載之書編沿正續廣修明於舊典取鑑無遺闡義例於㣲言折衷有待惟作者之謂聖體則史而義則經洵煥乎其有文指以千而言以萬成編既定至教斯垂原夫在昔有邦若時稽古因文見義用布訓於丹青比事屬辭咸取裁於筆削葢史使其記必明取舍之宜而鑑監於前實具是非之迹至編年以定體尤提要而徴文涑水之表嵗系時裒輯實原於漢紀紫陽之列綱分目指歸悉本於魯書洎遞嬗夫元明亦間沿為著述然而年芟益部不同習氏之存劉系黜房陵莫問昭公之在晉合書地書人以表例枘鑿恒多繋嵗陽嵗隂以表名盾矛不免雖糾唐有作文人之習相沿而譏鄶無庸史法之傳漸失乃在前明中葉復有纂要一書畧具規模倍多踳駁魯魚錯見沿故牘之乖譌臧否失宜任詹言之蕪漏當發函於幾暇欲訂毫釐因付館以編摩載陳圭臬纂排數載㑹萃羣書授青簡而肇錫嘉名御丹毫而時抒精義溯自分編以論次逮兹削藁而觀成凡條目之攸紛幸睿裁之悉禀闡特標之論覺管窺蠡測而無由垂刪定之文實壤薄流涓之莫助承素王而纘彛典說明則道自可行仰聖祖而紹前聞揆一則心無不合昭其經法大㫖備而悉奉指南示以變通舊例繁而不皆從朔大用䇿而小用牘若網在綱國為緯而年為經咸指諸掌審是非而繩懸悉準具首尾而囊括無餘紀載之例綦嚴宜事增而文省見聞之辭各異故逺畧而近詳或分注以備言特書與附書並列或後經以終義事本與事末兼該披月竁之輿圖悉河判重源之實考星經之次舍知躔同五緯之誣國語則遥證金源按出之傳譌始剖世牒則逺徴䝉古却特之受姓咸稽以至正字審音三蒼並協旁及釋名辨物五雅兼資凡質實而辨疑盡部居而州次譬校讐於掃葉作述之義昭如擥體要於挈裘興替之端備矣且夫正統偏安之辨尤屬人心天命所關即良史未協於大公欽宸斷獨衷於至是蓋自緹油失職恒縁諱飾為文迨至光岳分區浸以詆諆成習名互稱夫島索徒相嘲出聘之車號已貶於孫臣尚欲侈横磨之劒總偏私之曲徇致名義之都乖况如丙子䜟成宋祚隨江潮並歇庚申史就元基與塞草同荒乃或續景炎於南渡之餘更且擯至正於北遷之始皆妄加其予奪遂盡悖乎公平惟至聖之制義因心故定案必循名責實削紀年於閏位凛乎大命之難諶改書宼於舊條截然内詞之莫假實從古未發之義於此心適得所同屬勝朝改玉之時當聖代膺圖之㑹欣際六龍乗御大一統已悉受周疆特念五馬倉皇小朝廷尚僅留夏肄殉黄巾於冀北既大書春月之三擅白版於江東遂并紀福王之一運分甲乙存殘局而國號斯加事削閩滇溯遺封而藩稱非偽是皆擴天地為公之量覆載同符因之冠星雲有倬之章典謨並燦春秋之㫖在居正奉正義以無私帝王之事集大成勒成書於有永允矣無偏而無黨粲然是訓而是行至特筆之所垂統全書而咸貫劒南之册未至肅皇不改儲稱上都之號猶存懷邸難逃簒字循莽大夫之例望石城而冷笑褚公冠周平章之名對髙廟而多慚狄相莫不約羣紛以炳義本彛訓以敷言立綱常名教之大防極㣲顯婉彰而一致信讀書之貴得間不啻引錐而畫沙審觀人之必於㣲乃如鑄鼎以象物蓋揚王鈇以治萬世非天子莫操其權而㑹民極以執兩端獨聖人能見其大昔者蘭陵通史繁華徒侈千篇貞觀晉書論斷祇存四贊咨忠臣而録袁粲寧本親裁侈盛事而補陳橋何闗正體從未有定書法則軒鏡心懸著史評則堯文手勒善者勸而惡者懼知袞鉞之非空言參於天而驗於人在方䇿以明大道書成一百十六卷盡善盡美而蔑以加事紀四千五百年舉要舉凡而得其當臣等學慚閎覽才謝淹通識故籍而有愧五難論先民而粗聞十例時政記言起居記事願依左右史之班伯恭知古君舉知今難參大小賢之列屬操觚於虎觀濫厠分排承執簡於麟編幸邀鑒定惟子夏得其書矣詎能贊夫一詞若臯陶見而知之實叨榮於千載從此名山藏副定百家作史之模更欣秘殿刋成闡奕禩傳心之要臣等無任瞻天仰聖激切屏營之至謹奉表恭進以聞乾隆三十三年正月初十日大學士公臣傅恒大學士臣尹繼善大學士臣劉統勲協辦大學士尚書公臣阿里衮協辦大學士尚書臣劉綸户部尚書臣于敏中刑部尚書臣舒赫德等謹上表監理武英殿管理事務多羅履郡王臣永珹經筵講官武英殿管理事務戸部左侍郎總管内務府大臣臣英廉武英殿管理事務正紅旗漢軍副都統臣和爾經額校刋經筵講官武英殿總裁禮部尚書臣王際華臣覺羅奉寛監造内務府管理六庫事務郎中加十級紀録五次臣六十九内務府營造司郎中加一級紀録七次臣誠意南苑員外郎兼佐領臣劉淳武備院主事加一級紀録七次臣永善内管領臣扎欽副管領臣六格監造加三級臣吉蘭泰監造加三級臣文殊保庫掌臣六達塞庫掌臣伊靈阿校對日講起居注官武英殿提調左春坊左贊善臣彭紹觀武英殿提調翰林院編修臣陳淦翰林院修撰臣張書勲翰林院編修臣姚頥翰林院編修臣陸費墀翰林院編修臣陳昌圖翰林院編修臣陳桂森翰林院編修臣黄良棟翰林院編修臣徐天柱翰林院編修臣秦泉翰林院編修臣劉錫嘏翰林院編修臣楊夀楠翰林院檢討臣張運暹翰林院檢討臣季學錦舉人臣顧天駿舉人臣𡊮錫衡舉人臣毛圻副榜貢生臣戚健中副榜貢生臣楊有源嵗貢生臣王炳文正總裁臣傅恒臣來保臣尹繼善臣劉統勲副總裁臣兆惠臣阿里衮臣舒赫德臣阿桂臣劉綸臣于敏中經筵講官刑部尚書今任工部尚書臣裘曰修提調官禮科掌印給事中今任河南布政使臣覺羅巴延三原任吏部文選司郎中續任刑部侍郎臣額爾景額原任戸部員外郎續任工部侍郎臣珠魯訥戸部員外郎續任理藩院侍郎臣慶桂原任戸部郎中續任漕運總督臣傅顯戸部員外郎今任内閣學士臣博清額原任内閣侍讀學士續任戸部侍郎世襲雲騎尉臣伊克坦布吏部文選司郎中今任吏部侍郎臣袁守侗陜西道監察御史今任湖南沅州府知府臣晆朝棟原任江西道監察御史臣毛永爕原任吏部員外郎
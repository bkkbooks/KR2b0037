front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷四十五南北朝癸梁承聖二年魏主欽酉二年齊天保四年春正月魏宇文泰自加都督中外諸軍事三月梁武陵王紀伐江陵魏遣大將軍尉遲迥尉遲魏之别部後以為氏迥字羅代人伐成都以救之
  hash: sha256:fc3cd1efd362dc21a13c77ec5b4847eeed13c6ed1055cec6e609c04404e2b319

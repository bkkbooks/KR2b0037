  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_030-1a, image: WYG0336/WYG0336-0101a.png}
body:
  text: 東海中尉劉洽以張方刼遷車駕勸東海王越討之越傳檄山東紏率義旅迎天子還舊都徐州長史王修説刺史東平王楙字孔偉義陽成王望之子以州授之越乃以司空領徐州都督楙自為兖州刺史于是范陽王虓及王浚等共推越為盟主越輒選置刺史以下朝士多赴之成都故將公師藩公師複姓蒲陽平人㓂掠趙魏成都王頴既廢河北人多憐之其故將公師藩等自稱將軍起兵趙魏衆至數萬初上黨武鄉晉縣故城在今山西遼州榆社縣羯人晉書匈奴傳北狄入居塞内者十九種羯其一也石勒字世龍初名㔨㔨音佩有膽力善騎射并州大饑東嬴公騰執諸胡于山東賣充軍實勒亦被掠賣為茌平漢縣今屬山東東昌府人師懽奴懽竒其狀貎而免之懽家鄰于馬牧勒乃與牧帥汲桑結壯士為羣盗及藩起桑與勒帥數百騎赴之桑始命勒以石為姓勒為名藩攻陷郡縣轉前攻鄴范陽王虓遣其將茍晞擊走之胡三省曰石勒始此八月東海王越范陽王虓發兵西豫州刺史劉喬字仲彦南陽人拒之太宰顒遣張方助喬冬十月襲虓破之東海王越留琅邪王睿守下邳睿請王導為司馬委以軍事越西屯蕭縣注見前范陽王虓自許屯于滎陽越承制以豫州刺史劉喬為冀州使虓領豫州喬以虓非天子命發兵拒之虓以劉琨為司馬越以劉蕃琨之父為淮北䕶軍劉輿為潁川太守喬上尚書列輿兄弟罪惡因引兵攻虓于許遣其子祐拒越于靈壁蕭縣地名非今靈壁縣也東平王楙在兖州徴求不已郡縣不堪命虓遣茍晞還兖州徙楙青州楙不受命與劉喬合顒聞山東兵起甚懼表成都王頴都督河北諸軍事復鎮鄴詔越等各就國越等不從顒得喬上事下詔稱劉輿脅虓造逆令鎮南將軍劉𢎞征東將軍劉準與喬并力以張方為都督共㑹許昌誅輿兄弟使頴與石超等據河陽為喬繼授𢎞遺喬及越書使解怨釋兵同奬王室皆不聽𢎞又上表曰自頃兵戈紛亂搆于羣王載籍以來骨肉之禍未有如今日者也謂宜速詔越等兩釋猜疑各保分局自今有擅興兵馬者天下共伐之時顒方拒闗東倚喬為助不納喬乗虚襲許破之琨輿及虓俱犇河北𢎞以張方殘暴知顒必敗乃帥諸軍受越節度既而虓遣琨乞師于王浚遂擊斬石超于滎陽東迎越又擊劉祐于譙殺之喬衆潰走有星孛于北斗十一月將軍周權矯詔立羊后事覺伏誅于是太宰顒矯詔敕留臺賜后死司𨽻校尉劉暾等上表理后無罪顒欲收暾暾犇青州然羊后以是得免十二月成都王頴據洛陽陳敏據江東劉𢎞遣江夏太守陶侃將兵討破之初敏既克石氷事見前自謂勇略無敵遂據歴陽以叛呉王常侍甘卓棄官歸敏為子景娶卓女使卓假稱皇太弟令拜敏揚州刺史敏使弟恢及别将錢端等南略江州弟斌東略諸郡遂據江東以顧榮為右將軍賀循為丹陽内史周玘為安豐魏郡治安風安風注見前太守豪傑名士咸加收禮循佯狂得免玘亦稱疾不赴敏疑諸名士不為已用盡欲誅之滎曰將軍神武不世若能委信君子散蒂芥之嫌塞讒諂之口則上方數州可傳檄而定不然終不濟也敏乃止太宰顒以張光為順陽晉郡治鄼故城在今湖北襄陽府光化縣太守帥步騎討敏劉𢎞遣江夏太守陶侃屯夏口又遣南平晉郡治作唐故城在今湖南澧州安鄉縣太守應詹字思逺南頓人璩之孫督水軍以繼之侃與敏同郡又同嵗舉吏或謂𢎞曰侃脱有異志則荆州無東門矣𢎞不聽侃遣子洪詣𢎞以自固𢎞引為參軍資而遣之曰匹夫之交尚不負心况大丈夫乎敏遣陳恢冦武昌侃與戰屡破之又與皮初張光共破錢端于長岐地名胡三省注在江夏界或謂𢎞曰張光太宰腹心公既與東海宜斬光以明向背𢎞曰宰輔得失豈張光之罪危人自安君子不為也乃表光勲請加遷擢敏據江東踰年刑政無章子弟凶暴廬江内史華譚以書讓顧榮周玘榮玘見之甚慙乃密遣人告征東将軍劉凖使發兵臨江已為内應準許之于是榮玘及甘卓紀瞻等共攻敏敏衆潰單騎北走追斬之傳首京師紀瞻字思逺秣陵人丙寅光熈元年成晏平元年凡是嵗成始建國號與漢二僭國春正月戊子朔日食太宰顒殺張方成都王頴奔長安東海王越之起兵也使人說太宰顒令奉帝還洛約與分陜為伯顒欲從之張方自以罪重恐為誅首謂顒曰今據形勢之地國富兵彊挾天子以號令誰敢不從奈何拱手受制于人顒乃止及劉喬敗越進屯陽武王浚遣其將祁𢎞以突騎鮮卑烏桓為越先驅顒懼欲罷兵恐方不從乃誘方帳下督郅輔使殺方送首于越以請和越不許遣祁𢎞等帥鮮卑西迎車駕宋胄等進逼洛陽頴奔長安三月五苓夷寧州附塞部落之名冦寧州晉置治建寧郡今雲南曲靖府是寧州頻嵗饑疫五苓夷彊盛遂圍州城㑹刺史李毅病卒其女秀明逹有父風衆推領州事秀奬厲戰士嬰城固守城中糧盡炙鼠拔草而食之伺夷稍怠輒出兵掩擊破之後毅子釗自洛往州人奉以為主釗遣使詣京師求刺史朝廷以王遜為南夷校尉兼刺寧州遜招集離散撃平叛夷州境復安王遜字邵伯魏興人夏四月東海王越進屯温遣祁𢎞入長安奉帝東還太宰顒遣兵拒祁𢎞等于湖𢎞擊破之遂西入闗又破其兵于覇水顒單馬逃入太白山在鳯翔府郿縣東南即禹貢終南漢書作太壹𢎞等入長安所部鮮卑大掠百官奔散𢎞等奉帝乗牛車東還闗中皆服于東海王越顒保城而已六月至洛陽復羊后成都王雄稱成皇帝雄即帝位國號大成初范長生詣成都雄門迎執版拜為丞相尊之曰范賢至是以為天地太師時諸將恃恩互争班位尚書令閻式請考漢晉故事立百官制度從之秋七月乙酉朔日食八月以東海王越為太傅錄尚書事范陽王虓為司空鎮鄴越以庾敳字子嵩鄢陵人為軍諮祭酒胡母輔之為從事中郎郭象字子元河南人為主簿阮修為行參軍謝鯤為掾敳等皆尚虚元不以世務嬰心縱酒放誕越皆以其名重辟之荆州都督新城公劉𢎞卒諡曰元時天下大亂𢎞専督江漢威行南服事成則曰某人之功如敗則曰老子之罪每有興發手書守相丁寧欵密人皆感悅争赴之咸曰得劉公一紙書賢于十部從事至是卒九月頓邱晉郡本漢縣注見前太守馮嵩執成都王頴送鄴兖州刺史茍晞擊斬公師藩冬十月范陽王虓卒長史劉輿誅頴祁𢎞之入闗也成都王頴自武闗奔新野㑹劉𢎞卒司馬郭勱作亂欲奉頴為主不克而誅頴遂北濟河收故將士欲赴公師藩頓邱太守馮嵩執送鄴范陽王虓幽之而茍晞亦擊斬藩十月虓卒長史劉輿以頴素為鄴人所附偽稱詔賜死穎官屬皆先逃散惟盧志不去至是收而殯之太傅越召為軍諮祭酒越又將召輿或曰輿猶膩也近則汚人及至越踈之輿宻視天下兵簿及倉庫牛馬器械水陸之形皆黙識之每會議應機辨畫越傾膝酬接即以為左長史軍國之務悉以委之十一月帝中毒崩太弟熾即位是為懐帝尊皇后曰恵皇后立妃梁氏為皇后帝食䴵中毒而崩或曰太傅越之鴆也羊后自以于太弟為嫂恐不得為太后將立清河王覃侍中華混露版馳告太傅越召太弟入宫即帝位尊后曰恵皇后居𢎞訓宫帝始遵舊制于東堂聽政每至宴㑹輒與羣臣論衆務考經籍黄門侍郎傅宣歎曰今日復見武帝之世矣十二月壬午朔日食劉友益書法于是一嵗三食千三百六十餘年惟此而已南陽王模字元表宣帝弟高宻王泰子誅河間王顒太傅越以詔徴顒為司徒顒就徴模自許昌遣將邀殺之葬太陽陵尹氏起莘曰晉恵之為君動輒受制于人如嬰兒玩弄于股掌之上欲東而東欲西而西莫適為主是以始焉不保母后次焉不保其妻子終焉不保其身昏愚亦已甚矣以劉琨為并州刺史劉輿說太傅越遣琨鎮并州以為北面之重而徙東燕王騰騰以迎駕㓛進封鎮鄴越從之琨至上黨騰即自井陘東下時并州饑饉數為胡冦所掠吏民萬餘人悉隨騰就穀兾州號為乞活所餘戸不滿二萬冦賊縱横道路斷塞琨募兵上黨得五百人轉鬬而前至晉陽府寺焚毁邑野蕭條琨撫循勞徠流民稱集孝懐皇帝丁夘永嘉元年春二月羣盗王彌冦青徐初􅀈音堅漢縣故城在今山東登州府黄縣令劉栢根反王浚討斬之其長史王彌遂為羣盗至是冦青徐殺東萊太守既而為茍純晞之弟所敗遂降漢陽平劉靈少貧賤力制犇牛走及奔馬甞撫膺曰天乎何當亂也及公師藩起靈自稱將軍冦掠趙魏藩死與王彌俱降漢立清河王覃弟詮為皇太子太傅越出鎮許昌帝親覽大政留心庶務越不悅固求出藩以南陽王模都督秦雍等州軍務夏五月羣盗汲桑石勒入鄴殺都督新蔡王騰騰于是年三月改封復攻兖州太傅越遣茍晞討之公師藩既死汲桑逃還苑中茌平牧馬苑也更聚衆聲言為成都王報仇以石勒為前驅所向輒克遂進攻鄴時鄴中空竭而新蔡王騰資用頗饒性吝嗇臨急賜將士米各數升帛各丈尺以是人不為用桑遂入鄴殺騰焼宫大掠而去南擊兖州太傅越使茍晞等討之相持數月互有勝負秋七月以琅邪王睿為安東將軍都督掦州諸軍事鎮建業睿至建業以王導為謀主推心親信每事咨焉睿名論素輕吳人不附居乆之士大夫莫有至者㑹睿出觀褉胡三省注漢儀季春上已官及百姓皆褉于東流水上應劭曰褉潔也于水上盥潔之也導使睿乗肩輿具威儀導與諸名勝皆騎從紀瞻顧榮等見之驚異相帥拜于道左導因說睿曰顧榮賀循此土之望宜引之以結人心二子既至則無不來矣睿乃使導躬造之循榮皆應命以循為吳國内史榮為軍司加散騎常侍凡軍府政事皆與之謀又以紀瞻為軍祭酒卞壼卞以邑為氏壼字望之濟陰人為從事中郎周玘劉超字世瑜琅邪人張闓字敬緒吳張昭曽孫孔衍字舒元孔子二十二世孫皆為掾屬導說睿謙以接士儉以足用以清靜為政撫綏新舊故江東歸心焉睿初至頗以酒廢事導以為言睿命酌引觴覆之于此遂絶茍晞擊汲桑石勒大破之桑走死勒降漢茍晞追擊汲桑破其八壘死者萬餘人桑奔馬牧為人所殺勒奔樂平晉郡今為縣屬山西平定州太𫝊越加晞都督青兖諸軍事晞屡破彊冦善治繁劇威名甚盛其從母依之奉飬甚厚其子求為將晞不許曰吾不以王法貸人固求之乃以為督䕶後犯法晞杖節斬之從母叩頭救之不聴既而素服哭之曰殺卿者兖州刺史哭弟者茍道將也其用法嚴峻如此胡部大張㔨督等胡人一部之長呼為部大姓張氏名㔨督擁衆壁于上黨石勒徃從之因說㔨督等與俱歸漢漢王淵以勒為䕶漢將軍平晉王冬十一月戊申朔日食以王衍為司徒衍說太傅越曰朝廷危亂當頼方伯宜得文武兼資以任之乃以弟澄字平子為荆州都督族弟敦字處仲為青州刺史語之曰荆州有江漢之固青州有負海之險卿二人在外而吾居中足以為三窟矣澄至鎮日夜縱酒不視庶務雖冦戎交急不以為懐太傅越自領兖州牧徙茍晞為青州刺史初越與晞親善引升堂結為兄弟司馬潘淊説越曰兖州衝要魏武以之創業晞有大志非純臣也若徙之青州公自領兖州經緯諸夏藩衛本朝此所謂為之于未亂者也越以為然自領兖州牧以晞為征東大將軍青州刺史王敦徴為中書監越晞由是有隙晞至青州以嚴刻立威日行斬戮州人謂之屠伯慕容廆自稱鮮卑大單于是時拓䟦禄官卒弟猗盧統攝三部見前與廆通好戊辰二年漢永鳯元年春正月丙午朔日食二月太傅越殺清河王覃夏五月漢王彌冦洛陽張軌遣督䕶北宫純入衛擊破之彌收集亡散兵復大振分遣諸將攻陷郡縣遂入許昌張軌遣北宫純將兵衛京師與彌戰數敗之彌走平陽漢王淵遣侍中郊迎令曰孤親行將軍之館拂席洗爵敬待將軍及至拜司𨽻校尉詔封張軌西平郡公辭不受時州郡之使莫有至者軌獨貢獻不絶冬十月漢王淵稱皇帝漢王淵徙都蒲子即春秋晉蒲城注見前稱皇帝大赦改元是歳漢石勒劉靈冦汲魏頓邱三郡百姓望風降附靈後為王浚将祁𢎞所殺己巳三年漢河瑞元年春正月朔熒惑犯紫微漢徙都平陽漢太史令宣于複姓修之以星變言于漢主曰不出三年必克洛陽蒲子﨑嶇難以乆安平陽氣象方昌請徙都之淵從之時汾水得玉璽淵因改元河瑞三月以山簡字季倫濤之子都督荆湘元年分荆廣二州置統長沙始興等九郡等州軍事簡督荆湘交廣四州嗜酒不恤政事初荆州冦盗不禁詔起劉𢎞子璠為順陽内史江漢間翕然歸之簡表璠得衆心恐百姓刼以為主詔徴璠為越騎校尉南州由是遂亂父老莫不追思劉𢎞太𫝊越入京師殺中書令繆播字宣則蘭陵人帝舅王延等十餘人越入京師中書監王敦謂所親曰太傅専制威權而選用表請尚書猶以舊制裁之今來必有所誅帝之為太弟也與繆播善及即位委以心膂帝舅散騎常侍王延尚書何綏字伯蔚曽之孫太史令髙堂冲並參機宻劉輿潘滔勸越誅之越乃誣播等欲為亂遣甲士三千人入宫執播等十餘人于帝側付廷尉殺之帝歎息流涕而已初何曽侍武帝宴退謂諸子曰主上開創大業吾每宴見未嘗聞經國逺圖惟説平生常事非貽厥孫謀之道也及身而已後嗣其殆乎汝輩猶可以免指諸孫曰此屬必及于難及綏死兄嵩哭之曰我祖其殆聖乎曽日食萬錢猶云無下箸䖏子劭日食二萬綏及弟機羡汰侈尢甚與人書疏詞禮簡傲王尼見綏書謂人曰伯蔚居亂世而矜豪乃爾其能免乎人曰伯蔚聞卿言必相危害尼曰伯蔚比聞吾言自己死矣及永嘉之末何氏無遺種太𫝊越使將軍何倫等領其國兵入宿衛越以頃來多事多由殿省乃奏宿衛有侯爵者皆罷之更使何倫王秉領東海國兵數百人宿衛夏大旱江漢河洛皆可涉漢石勒冦鉅鹿常山勒衆至十餘萬集衣冠人物以為君子營以張賔字孟孫中邱人為謀主刁膺張敬為股肱䕫安䕫以國為氏孔萇支雄其先月支胡人桃豹桃以邑為氏逯明為爪牙并州諸胡羯多從之初張賓好讀書濶逹有大志常自比張子房及勒徇山東賔謂所親曰吾歴覯諸將無如此胡將軍可與共成大業乃提劍詣軍門大呼請見勒亦未之竒也賔數以策千勒已而皆如所言由是動靜咨之冬十一月漢冦洛陽北宫純擊敗之漢初冦黎陽繼冦壺闗皆陷之秋攻洛陽為𢎞農太守垣延所敗至是復遣劉聰等冦洛陽屯西明門北宫純等夜帥勇士出攻漢壁斬其將軍呼延顥聰南屯洛水而大司空呼延翼又為其下所殺衆遂潰歸宣于修之言于淵曰嵗在辛未乃得洛陽今晉氣猶盛大軍不歸必敗淵乃召聰等還庚午四年漢烈宗劉聰光興元年春正月琅邪王睿以周玘為吳興吳郡今浙江湖州府是太守玘三定江南惠帝永興元年討石氷永嘉元年討陳敏至是錢璯冦陽羡又討斬之琅邪王睿以為吳興太守于其鄉里置義興郡治陽羡注見前以旌之秋七月漢主淵卒太子和立其弟聰弑而代之漢主淵寢疾以陳留王歡樂為太宰楚王聰為大司馬大單于並録尚書事安昌王盛安邑王欽西陽王璿分典禁兵初盛少時不好讀書唯誦孝經論語曰誦此能行足矣安用多誦而不行乎李憙見之嘆曰望之如可易及至肅如嚴君可謂君子矣淵以其忠篤故臨終委以要任淵卒太子和即位和性猜忌無恩宗正呼延攸侍中劉乗西昌王鋭説和曰先帝不惟輕重之勢使大司馬擁十萬之衆屯于近郊陛下便為寄坐耳宜早為之計和信之夜召盛欽告之盛曰陛下勿信讒以疑兄弟兄弟尚不可信他人誰足信哉攸鋭怒命左右刃之遂攻聰于單于臺不克鋭等走入南宫聰前鋒隨之殺和及鋭攸乗聰以北海王乂單后氐酋單徵之女是年初立為后之子也以位讓之乂涕泣固請聰遂即位以乂為皇太弟領大單于子粲為河内王都督中外諸軍事石勒為并州刺史乃葬淵于永光陵諡光文廟號髙祖氐酋蒲洪晉載記氐之先蓋有扈氏之苗裔世為西戎酋長洪家池中生蒲長五丈五節如竹形時咸謂之蒲家因以為氏洪字廣世自稱畧陽公洪畧陽臨渭氐酋也驍勇多權畧羣氐畏服之漢拜洪平逺將軍不受自稱秦州刺史畧陽公胡三省曰蒲洪事始此流民王如京兆新豐人冦南陽以附漢雍州流民多在南陽詔書遣還鄉里流民以闗中荒殘皆不願歸山簡遣兵促發京兆王如潛結壯士夜襲其軍破之攻城鎮殺令長衆至四五萬自號大將軍稱藩于漢冬十月以拓䟦猗盧為大單于封代公初匈奴劉猛死猛匈奴右賢王武帝泰始七年叛走出塞八年入冦并州為左部將所殺劉虎代領其衆居新興晉郡今山西忻州是號鐵弗氏與白部鮮卑皆附于漢劉琨將討之遣使卑辭厚禮説拓䟦猗盧以請兵猗盧使其弟弗之子鬰律魏太祖平文帝帥騎二萬助之遂破劉虎白部琨與猗盧結為兄弟表為大單于以代郡封之為代公時代郡屬幽州王浚不許遣兵擊猗盧猗盧拒破之浚由是與琨有隙猗盧以封邑去國懸逺民不相接乃帥部落萬餘家自雲中入鴈門從琨求陘北今代州西北有勾注山一名西陘山陘北山之北也之地琨乃徙樓煩今山西寜武府漢樓煩縣地馬邑注見前隂館今勾注山北有下館城故隂館縣也繁畤故縣城在今山西大同府渾源州崞故城亦在渾源州五縣民于陘南以其地與之由是猗盧益盛琨遣使言于太傅越請出兵共討劉聰石勒越忌茍晞為後患不許琨乃謝猗盧之兵遣歸國遣使徴天下兵入援京師饑困日甚太傅越遣使以羽檄徴天下兵使入援京師帝謂使者曰為我語諸征鎮今日尚可救後則無及矣既而卒無至者山簡遣督䕶將兵入援為王如所敗如遂大掠沔漢進逼襄陽簡嬰城自守王澄自將欲援京師道聞簡敗衆散而還朝議欲遷都以避難王衍以為不可賣車牛以安衆心漢石勒冦襄陽十一月太傅越率兵討之次于項石勒引兵渡河趣南陽王如及其黨以軍拒勒勒擊破之盡并其衆進屯宛北遂冦襄陽太傅越以胡冦益盛内不自安乃戎服入見請討石勒帝曰今胡虜侵逼郊畿公豈可逺去以孤根本對曰臣出幸而破賊則國威可振猶愈于坐待困窮也乃帥甲士四萬向許昌以王衍為軍司朝賢素望悉為佐吏名將勁卒咸入其府于是宫省無復守衛荒饑日甚盗賊公行越東屯項自領豫州牧辛未五年漢嘉平元年成王衡元年春正月成冦陷涪梓潼注見前内史譙登字順明周之孫死之初譙周之子居巴西為太守馬脱所殺其子登詣劉𢎞請兵復讐𢎞表登為梓潼内史使自募巴蜀流民得二千人西上攻宕渠漢縣晉置郡㝷復為縣今順慶府渠縣是斬脱食其肝遂據涪城成人攻之屢為所敗至是三年食盡援絶士民熏鼠食之無一人離叛者城陷見獲成主雄欲宥之登詞氣不屈乃殺之湘州流民作亂推杜弢字景文成都人為刺史巴蜀流民布在荆湘間為土民所困苦湘州參軍馮素與蜀人汝班有隙言于刺史荀眺欲盡誅流民流民大懼四五萬家一時俱反推醴陵漢縣今屬湖南長沙府令杜弢為湘州刺史已而弢陷長沙南破零陵東侵武昌殺長吏甚衆琅邪王睿逐揚州都督周馥字祖宣浚從父弟以王敦為刺史都督征討諸軍事馥以洛陽孤危表請遷都壽春太傅越怒馥不先白已召之馥不行睿以裴碩請碩淮南太守詐稱受越宻㫖襲馥為馥所敗請救于睿遂攻之馥敗走死睿以敦為刺史三月太傅越死以茍晞為大將軍督六州茍晞移檄諸州陳越罪狀帝亦惡越專權違命宻賜晞詔使討之越亦下檄罪狀晞遣兵攻之晞遣騎收越黨尚書劉曽侍中程延斬之越憂憤成疾以後事付王衍而死衆推衍為元帥衍不敢當奉越䘮還葬東海帝追貶越為縣王以晞為大將軍都督青徐兖豫荆揚諸軍事夏四月漢石勒追敗越軍于苦縣注見前執王衍等殺之勒帥輕騎追太傅越之䘮及于苦縣大敗晉兵縱騎圍而射之將士十餘萬人無一免者執太尉衍等問以晉故衍具陳禍敗之由云計不在已且自言少無宦情不豫世事因勸勒稱尊號冀以自免勒曰君少壯登朝名蓋四海身居重任何得言無宦情邪破壊天下非君而誰命左右扶出衆人畏死多自陳述獨襄陽王範神色儼然顧呵之曰今日之事何復紛紜勒謂孔萇曰吾行天下多矣未嘗見此輩人當可存乎萇曰彼皆晉之王公終不為吾用勒曰雖然要不可加以鋒刃夜使人排墻殺之剖越柩焚其尸曰亂天下者此人也吾為天下報之故焚其骨以告天越世子毗及宗室四十八王皆没于勒裴妃為人所掠賣乆之渡江初琅邪王之鎮建業裴妃意也故睿徳之厚加存橅以其子冲繼越後五月漢人入冦六月陷洛陽殺太子詮遷帝于平陽封平阿公茍晞表請遷都倉垣城名在今河南開封府祥符縣水經注汲水東逕倉垣城即此帝將從之公卿猶豫不果行既而洛陽饑困人相食百姓流亡者什八九帝將行而衛從不備無車輿乃步出西掖門至銅駝街為盗所掠不得進度支魏浚東郡東阿人帥流民數百家保河隂之硤石水經注穀水東逕雍谷谿石路阻陿有硤石之稱今曰硤石堡在河南府新安縣時掠得榖麥獻之漢主聰使呼延晏將兵二萬七千冦洛陽比及河南晉兵前後十二敗劉曜王彌石勒皆引兵㑹之晏先至攻平昌門克之焚東陽門及府寺司空荀藩及弟光禄大夫組奔轘轅彌晏克宣陽門入宫大掠帝欲奔長安漢兵追執之曜自西明門入執太子詮等士民死者三萬餘人遂發掘諸陵焚宫廟曜納羊后遷帝及六璽于平陽勒引兵出屯許昌漢以帝為左光禄大夫封平阿公以侍中庾珉字子琚敳之兄王儁為光禄大夫初曜以彌不待己至先入洛陽怨之彌説曜請白漢主自平陽徙都洛曜不用彌䇿而焚之彌罵曰屠各匈奴貴種名子豈有帝王之意邪遂與曜有隙引兵東屯項闗在陳州府項城縣西北司空茍晞奉豫章王端建行臺于蒙城䝉縣城也注見前荀藩奉秦王業即愍帝趣許昌荀藩在陽城汝隂晉郡治汝隂本漢縣注見前太守李矩字世迴平陽人輸給之藩建行臺于宻注見前傳檄四方推琅邪王睿為盟主以矩為滎陽太守豫章王端太子詮弟也東奔倉垣茍晞奉為皇太子置行臺徙屯䝉城秦王業吳孝王晏之子為秦王後藩甥也年十二南奔宻藩等奉之以趣許昌天水閻鼎字台臣聚西州流民數千于宻欲還鄉里藩以鼎有才而擁衆用為豫州刺史以周顗字伯仁浚之子等為參佐琅邪王睿遣兵擊江州刺史華軼字彦夏平原人斬之時海内大亂獨江東差安中國士民避亂者多南渡江王導説睿收其賢俊辟掾屬刁協字元亮勃海饒安人王承字安期湛之子卞壼諸葛恢字道明靚之子陳頵俱倫切字延思陳國人庾亮字元規衮從子等百餘人時人謂之百六掾及承荀藩檄承制署置江州刺史華軼及豫州刺史裴憲字景思楷之子皆不從命睿遣王敦甘卓周訪字士逹汝南安成人合兵擊軼斬之憲奔幽州睿以卓為湘州刺史訪為尋陽太守陶侃為武昌太守秋七月大司馬王浚自領尚書令浚設壇告類非時祭天謂之類言以事類告也假立太子稱受中詔承制封拜備置百官列署征鎮漢劉曜冦長安南陽王模出降曜斬之遂據長安模世子保保上邽注見前南陽王模使牙門趙染戌蒲坂染帥衆降漢漢遣染與將軍劉雅攻模于長安劉曜劉粲繼之染敗模兵于潼闗長驅至下邽秦縣有上邽故加下故城在今西安府渭南縣涼州將北宫純自長安帥衆降漢漢兵圍長安模倉庫虚竭士卒離散遂降于漢粲殺之闗西饑饉白骨蔽野士民存者百無一二漢主聰以曜為雍州牧封中山王守長安模都尉陳安帥衆歸世子保于上邽保遂據有秦州㝷稱大司馬承制署隴右氏羌皆從之漢石勒陷蒙城執茍晞及豫章王端晞驕奢苛暴前遼西太守閻亨巴西人纉之子數諫殺之從事明預有疾自舉入諫晞怒曰我殺閻亨何闗人事而舉病罵我預曰明公以禮待預故預以禮自盡今明公怒預其如逺近怒明公何願明公思預之晞不從明出秦大夫孟明之後以字為氏由是衆心離怨加以疾疫饑饉勒襲䝉城執晞及豫章王鎻晞頸以為左司馬王彌與石勒外相親而内相忌㑹彌將徐邈叛去兵漸衰勒既禽茍晞張賓勸勒因彌之小衰誘而取之乃請彌宴酒酣遂斬之而并其衆茍晞潛謀叛勒勒殺之冬十月馮翊太守索綝字巨秀靖之子等敗漢兵于長安十二月迎秦王業入雍城注見前初索綝為馮翊太守與安夷䕶軍麴允金城人安定太守賈疋字彦度武威人疋古雅字謀復晉室帥衆五萬向長安雍州刺史麴特等帥衆十萬㑹之大敗劉曜于黄邱胡三省注在雲陽縣黄嶔山下雲陽故城在今西安府涇陽縣又破劉粲于新豐兵勢大振闗西胡晉翕然響應閻鼎欲奉秦王業入闗據長安以號令四方荀藩周顗等皆山東人不欲西行中途逃散顗奔江東鼎與業至藍田遣人告疋疋遣兵迎之入于雍城使梁綜以兵衛之慕容廆擊破鮮卑素喜木丸部遼東附塞鮮卑素喜連木丸津素喜木丸鮮卑二種連津其帥名攻陷諸縣屢敗郡兵東夷校尉封釋渤海蓚人不能討民失業歸慕容廆者甚衆廆子翰字元邕廆庶長子言于廆曰自古有為之君莫不尊天子以從民望成大業今連津冦暴不已不若數其罪而討之上則興復遼東下則并吞二部忠義彰于本朝私利歸于我國此覇王之業也廆笑曰孺子乃能及此乎遂擊連津以翰為前鋒破斬之盡併二部之衆封釋疾病屬其孫奕于廆釋卒廆召奕與語説之曰竒士也補小都督釋子悛抽來奔䘮廆見之曰此家抎抎千斤犍也以道不通皆留仕廆抽為長史悛為叅軍也抎抎彊健有力之貌犍居言反犗牛其力専彊以擬悛抽言非常人琅邪王睿以周顗為軍諮祭酒前騎都尉桓彞字茂倫譙國龍亢人避亂過江見睿微弱謂顗曰我以中州多故來此求全而單弱如此將何以濟既而見王導共論世事退謂顗曰向見管夷吾無復憂矣諸名士遊宴新亭在江寧府江寧縣南一曰勞勞亭亦名臨滄觀寰宇記臨滄觀在勞勞山上有亭七間名曰新亭顗中坐歎曰風景不殊舉目有山河之異因相視流涕導愀然變色曰當共戮力王室克復神州何至作楚囚對泣邪衆皆收涙謝之陳頵遺導書曰中華所以傾弊者正以取才失所先白望而後實事浮競驅馳互相貢薦加有老莊之俗傾惑朝廷飬望者為𢎞雅政事者為俗人夫欲制逺先自近始今宜改張明賞信罰㧞卓茂于密縣顯朱邑于桐鄉然後大業可舉中興可冀導不能從白望猶言虚名壬申六年劉友益曰于是帝遷平陽踰年矣書六年存統也春二月壬子朔日食琅邪王睿遣將軍紀瞻討石勒于葛陂在河南汝寧府上蔡縣北水經注澺水東迤為葛陂即此勒引兵退石勒築壘于葛陂課農造舟將攻建業睿大集江南之衆于壽春以紀瞻為揚威將軍討之會大雨三月不止勒軍中饑疫死者大半集將佐議之刁膺請送欵于睿求掃平河北以自贖俟其軍退徐圖之勒愀然長嘯孔萇等請分兵夜攻壽春據城食粟要以今年定江南勒笑曰是勇將之計也顧謂張賓曰子君意何如賓曰將軍攻陷京師囚執天子殺害王公妻畧妃主擢將軍之髪不足以數將軍之罪奈何復相臣奉乎今天降霖雨于數百里中示將軍不應留此也鄴有三臺之固西接平陽山河四塞宜北據之以營河北河北既定天下無處將軍之右者矣宜使輜重從北道先發將軍引大兵向夀春輜重既逺大兵徐還何憂進退無地乎勒攘袂皷髯曰張君計是也于是黜膺擢賓為右長史號曰右侯前鄴三臺注見勒引兵發葛陂遣石虎字季龍勒從子向壽春遇晉運船虎將士争取之為紀瞻所敗追奔百里前及勒軍勒結陳待之瞻不敢擊初勒為人所掠賣與其母王氏相失劉琨得之并其從子虎送子勒因遺書諭以順逆之故勒遺琨名馬珍寶厚禮其使謝而絶之時虎年十七殘忍無度勒白母除之母曰快牛為犢多能破車汝小忍之及長勇冠當時每屠城邑鮮有遺種然御衆嚴而不煩莫敢犯者指授攻討所向無前勒遂寵任之漢封帝為會稽郡公漢主聰謂帝曰卿昔為豫章王朕與王武子造卿卿贈朕柘弓銀研卿頗記否帝曰臣安敢忘之但恨爾日不早識龍顔聰曰卿家骨肉何相殘如此帝曰大漢將應天受命故為陛下自相驅除此殆天意非人事也且臣家若能奉武皇帝之業九族敦睦陛下何由得之聰喜以小劉貴人妻帝曰此名公之孫也卿善遇之小劉貴人劉殷女孫也先是聰納殷二女英娥為左右貴嬪又納殷女孫四人皆為貴人于是六劉之寵傾後宫至是以一貴人賜帝張軌遣兵詣長安涼州主簿馬魴説軌宜命將出師翼戴帝室軌從之馳檄闗中共尊輔秦王且言今遣前鋒宋配帥歩騎二萬徑趨長安諸軍絡繹繼發夏漢太保劉殷死掦雄仕芥綱目書死以斥之劉殷以晉臣仕漢位至大保二女四女孫皆納後宫厥罪實浮于雄而綱目書卒今特改書初殷為新興太守明刑旌善甚有政能值亂遂没于漢漢主聰擢任之歴官侍中太保至是死殷不為犯顔忤旨然因事進規補益甚多甞戒其子孫曰事君當務幾諫凡人尚不可面斥其過况萬乗乎夫幾諫之功無異犯顔但不彰君之過所以為優耳殷在公卿間常恂恂有卑讓之色故能處驕暴之國保其富貴以壽考終殷有七子五子各授一經一子授史記一子授漢書一門之内七業俱興北州之學殷門為盛石勒引兵據襄國劉琨以兄子演字始仁輿之子鎮鄴石勒濟河演保三臺以自固勒諸將欲攻之張賔曰攻之未易猝㧞捨之彼將自潰方今王彭祖劉越石公之大敵也宜先取之演不足顧也且天下饑亂明公擁兵覉旅人無定志非所以保萬全制四方也不若擇便地而據之西禀平陽言稟命于漢也以圖幽并此覇王之業也勒遂進據襄國分命諸將攻冀州郡縣運榖以輸襄國漢以勒為冀州牧漢劉曜襲晉陽陷之劉琨奔常山琨素奢豪喜聲色河南徐潤以音律得幸干預政事䕶軍令狐盛數以為言潤因譖盛琨收盛殺之琨母曰汝不能駕馭豪傑以恢逺畧專除勝已祸必及我盛子泥奔漢具言虚實漢主聰遣粲曜將兵冦并州以泥為鄉導琨聞之東出收兵于常山粲曜遂乗虚襲䧟晉陽泥殺琨父母琨還救不及帥數十騎奔常山秋九月賈疋等奉秦王業為皇太子建行臺于長安先是賈疋等進圍長安劉曜敗走業入長安及是疋等奉業為皇太子建行臺登壇告類建宗廟社稷未幾盗殺疋初疋入闗殺漢梁州刺史彭仲蕩至是其子天䕶帥羣胡攻疋殺之麴允領雍州刺史冬十月代公猗盧攻晉陽劉曜敗走猗盧追擊大敗之劉琨遣使求救于代猗盧遣其子六修帥衆數萬為前鋒自率二十萬繼之劉琨收散卒為鄉導六修與劉曜戰于汾東曜兵敗墜馬中七創夜踰䝉山在山西太原府太原縣西北一名西山而歸猗盧追之戰于藍谷在太原府太谷縣西漢兵大敗伏尸數百里猗盧因大獵夀陽山夀陽縣之山也夀陽晉縣今屬山西平定州陳閲皮肉山為之赤琨自營門步入拜謝固請進軍猗盧曰吾逺來士馬疲弊且待後舉劉聰未可滅也留其將箕澹等戍晉陽琨徙居陽曲後漢縣今為太原府治招集亡散十二月王敦殺其兄荆州都督澄澄少與兄衍名冠海内劉琨謂澄曰卿形雖散朗而内實動俠言其心易動又豪俠自喜也以此處世難得其死及在荆州屢為杜弢所敗望實俱損猶傲然自得與内史王機長沙人日夜縱酒博奕上下離心故山簡參軍王冲擁衆自稱刺史澄懼徙治沓中胡三省注此非姜維種麥之沓中蓋在孱陵之東琅邪王聞之召為軍諮祭酒以周顗代之王敦方討杜弢進屯豫章澄過之自以名聲素出敦右猶以舊意侮敦敦怒誣其與杜弢通信殺之是嵗王如以軍乏食降于王敦王機以澄被害懼禍及將其奴客千餘人入廣州機父嘗刺廣州將士皆故部曲刺史郭訥遣拒機皆迎降訥乃避位以州授之前太子洗馬衛玠字叔寳卒玠瓘之孫也美風神善清談常以為人有不及可以情恕非意相干可以理遣故終身不見喜愠之色羌酋姚弋仲自稱扶風公弋仲南安赤亭羌也晉載記後漢時燒當裔孫遷郍率種内附漢以為西羌校尉處于南安之赤亭郍元孫柯迴生弋仲經南安注見前赤亭水名在鞏昌府隴西縣東北水注赤亭水逕䝠道縣城北又南入渭䝠道今隴西縣也東徙榆眉即隃麋注見前戎夏襁負隨之者數萬胡三省曰姚弋仲事始此癸酉七年孝愍皇帝建興元年孝是年夏四月愍帝始即位改元通鑑綱目以懐于二月遇害故于嵗首即以建興紀年但綱目與通鑑體例不同一條之中大書孝愍皇帝于上接書劉聰弑帝于下二帝似乎相混今依晉書帝紀書曰七年仍依武帝泰熈元年之例而以愍帝建興元年分注于下春二月漢主聰弑帝于平陽庾珉王雋死之正月朔漢主聰宴羣臣于光極殿使帝著青衣行酒庾珉王雋等不勝悲憤因號哭聰惡之有告珉等謀以平陽應劉琨等聰遂殺珉雋等帝亦遇害荀崧曰懐帝天資清劭少著英猷若遇承平足為守文佳主而繼恵帝擾亂之後東海専政故無幽厲之釁而有流亡之禍三月漢立其貴嬪劉娥為后漢主聰為后起䳨與凰同儀殿廷尉陳元達切諫聰大怒曰朕為天子營一殿何闗汝鼠子乎命左右曵出斬之并其妻子梟首東市時聰在逍遥園李中堂元達先鎻腰而入即以鎻鎻堂下樹呼曰臣所言者社稷之計而陛下殺臣朱雲有言臣得與龍逄比干逰足矣左右曵之不能動大司徒任顗等叩頭出血曰元達言雖狂直願陛下容之聰黙然劉后聞之宻勅左右停刑手疏上言略曰今宫室已備無煩更營四海未一宜愛民力廷尉之言社稷之福也宜加封賞而更誅之四海謂陛下何如哉夫忠臣進諫者固不顧其身也而人主拒諫者亦不顧其身也陛下為妾營殿而殺諫臣使忠臣結舌者由妾逺近怨怒者由妾公私困弊者由妾社稷阽危者由妾天下之罪皆萃于妾妾何以當之妾觀自古敗國䘮家未始不由婦人心常疾之不意今日身自為之使後世視妾猶妾之視昔人也妾誠無面目復奉巾櫛願賜死此堂聰覽之變色命顗等冠履就坐引元達上以表示之曰外輔如公内輔如后朕復何憂更命園曰納賢園堂曰愧賢堂謂元達曰卿當畏朕而反使朕畏卿邪夏四月太子業即位于長安是為愍帝索綝領太尉懐帝凶問至長安皇太子舉哀因加元服即帝位大赦改元始改元建興以梁芬為司徒麴允索綝為僕射是時長安城中户不盈百蒿荆成林公私有車四乗百官無章服印綬唯桑版署號而已㝷以綝為衛將軍領太尉軍國之事悉以委之石勒遣石虎攻陷鄴而據之虎攻鄴鄴潰三臺流民皆降之劉演奔廩邱注見前勒遂以虎鎮鄴初劉琨用焦求為兖州刺史荀藩又用李述為之琨召求還及是鄴城失守琨復以劉演為兖州刺史鎮廩邱前中書侍郎郗鑒帥髙平千餘家避亂保嶧山琅邪王就用為兖州鎮鄒山三人各屯一郡吏民不知所從山郗鑒字道徽髙平金鄉人嶧山注見前鄒山即嶧以在鄒縣故亦名鄒山琅邪王睿以華譚為軍諮祭酒陳頵為譙郡太守譚甞在夀春依周馥至是睿謂譚曰周祖宣何故反譚曰馥見冦賊滋蔓欲移郡以紓國難執政不悦興兵討馥死未踰時而洛都淪没若謂之反不亦誣乎睿曰馥位為征鎮召之不入危而不持亦天下之罪人也譚曰然危而不持當與天下共受其責非但馥也頵出于寒微為睿參軍數持正論時睿參佐多避事自逸頵言于睿曰洛中承平之時朝士以小心恭恪為凡俗偃蹇倨肆為優雅流風相染以致敗國今僚屬皆承西臺餘弊飬望自髙是前車已覆而後車又將隨之也請自今臨使稱疾者皆免官不從三王之誅趙王倫也制己亥格以賞功自是循而用之頵曰昔趙王篡逆恵皇失位三王討之故厚賞以懐嚮義之心今功無大小皆以格斷乃至金紫佩士卒之身符䇿委僕𨽻之門非所以重名器正紀綱也請一切罷之由是府中多惡頵出為譙郡太守慕容廆攻叚氏取徒河先是王浚遣督䕶王昌等率叚就陸眷務目塵從弟通鑑作疾陸眷今依晉載記及魏書北史作就及弟匹磾文從弟末柸等攻石勒于襄國勒敗還壘末柸追入壘門為勒所獲就陸眷退走以鎧馬金銀請末柸于勒勒召末柸與之燕飲誓為父子遣之昌等亦引還至是浚復召就陸眷與共攻勒就陸眷不至浚怒檄慕容廆討之廆遂取徒河初中國民避亂者多依王浚浚政法不立徃徃去之叚氏兄弟專尚武勇不禮士大夫唯廆政事修明愛重人物故多歸焉廆以河東裴嶷北平楊耽為謀主廣平游邃北海逢羡勃海封抽河東裴開為股肱平原宋該安定皇甫岌岌弟真及封奕封裕典機要又以平原劉讃為東庠祭酒子皝率國胄束脩受業于是路有頌聲禮讓興矣裴嶷字文冀封裕抽之子奕抽從子皇甫真字楚季慕容皝字元真廆弟三子五月以琅邪王睿為左丞相南陽王保為右丞相分督陜東西諸軍事詔曰今當掃除鯨鯢奉迎梓宫令幽并兩州勒卒三十萬直造平陽右丞相宜帥秦涼梁雍之師徑詣長安左丞相帥所領精兵造洛陽同赴大期克成元勲又詔以時進軍與乗輿㑹除中原睿辭以方平定江東未暇北伐以刁協為丞相左長史劉隗字大連彭城人為司直隗雅習文史善伺候睿意故特親愛之主簿熊逺字孝文南昌人上書請嗣後凡為駁議者皆當引律令經傳不得直以情言無所依準以虧舊典睿不能從左丞相睿以祖逖為豫州刺史逖少有大志與劉琨俱為司州主簿同寢中夜聞雞鳴蹴琨覺曰此非惡聲也因起舞及渡江左丞相睿以為軍諮祭酒逖居京口紏合驍健言于睿曰晉室之亂非上無道而下怨叛也由宗室争權自相魚肉遂使戎狄乗隙毒流中土今遺民思奮大王誠能命將出師使如逖者統之以復中原郡國豪傑必有聞風響應者矣睿素無北伐之志以逖為豫州刺史給千人廪布三千疋不給鎧伏使自召募逖將其部曲百餘家渡江中流撃楫而誓曰祖逖不能清中原而復濟者有如大江遂屯淮隂起冶鑄兵募得二千餘人而後進逖任俠慷慨志清中原劉琨謂人曰常恐祖生先吾著鞭冬十月漢劉曜冦長安十一月麴允破走之曜使趙染帥精騎襲長安帝奔射鴈樓染焚龍尾龍首山之尾也在西安府咸寧縣南水經注龍首山頭于渭尾違樊川及諸營退屯逍遥園在長安縣東北水經注沈水枝津東入逍遥園即此將軍麴鑒帥衆救長安與曜遇于零武零當作靈今西安府咸陽縣有靈武鄉晉時移漢北地郡之靈武縣于此故名鑒兵大敗曜恃勝不設備麴允引兵襲之漢兵大敗曜引歸平陽十二月石勒遣使奉表于王浚浚謀稱尊號劉亮髙柔切諫皆殺之燕國霍原志節清髙屢辭徵辟浚以尊號事問之原不答浚誣以罪殺而梟其首原字休明燕國廣陽人于是士民駭怨而浚矜豪日甚所任皆苛刻小人棗嵩朱碩尤貪横北州謡曰府中赫赫朱邱伯十囊五囊入棗郎石勒欲襲之未知虚實用張賔言遣舎人王子春奉表于浚辭意懇切浚大喜遣使報聘明年正月浚使者至襄國勒匿其勁甲精卒羸師虚府以示之北靣拜使者而後受書浚遺勒塵尾勒陽不敢執懸之于壁上朝夕拜之曰我不得見王公見其所賜之物如見王公也復遣董肇奉表于浚期以三月中旬親詣幽州奉上尊號浚使者還具言勒形勢寡弱款誠無二浚益驕怠不復設備孝愍皇帝甲戌建興二年春正月有如日隕于地又有三日相承東行有流星隕于平陽北化為肉流星出牽牛晉書天文志牽牛六星在河鼓南入紫微光燭地隕平陽北化為肉長三十步廣二十七步漢主聰惡之以問公卿陳元達以為女寵太盛亡國之徴聰曰此隂陽之理何闗人事梁州人張咸以州降成先是氐王楊茂搜之子難敵與王如餘黨楊虎合攻梁州刺史張光嬰城固守憤激成疾而卒難敵遂抜城據之虎據漢中吏民奔蜀至是州人張咸等起兵逐難敵難敵走咸以其地歸成于是漢嘉涪陵漢中注俱見前之地皆為成有成主雄虚己好賢隨才授任命太傅驤養民于内李鳯等招懐于外刑政寛簡獄無滯囚興學校置史官其賦民男丁嵗榖三斛女丁半之疾病又半之户調絹不遇數丈綿數兩事少役希民多富實新附者給復除是時天下大亂而蜀獨無事年榖屢熟乃至閭門不閉路不拾遺然朝無儀品爵位濫溢吏無禄秩取給于民軍無部伍號令不肅此其所短也三月漢石勒襲薊陷之殺王浚師還薊降于叚匹磾勒將襲王浚而未發張賔曰豈非畏劉琨及鮮卑烏桓為我後患乎勒曰然賔曰彼三方智勇無及將軍者將軍雖逺出彼必不敢動且彼未謂將軍便能懸軍千里取幽州也輕軍徃返不出二旬藉使彼有心比其謀議出師吾已還矣劉琨王浚雖同名晉臣實為仇敵若修牋于琨送質請和琨必喜我之服而快浚之亡終不救浚而襲我也勒曰吾所未了右侯已了之遂以火宵行遣使奉牋于琨自陳罪惡請討浚自効琨大喜移檄州郡言勒已降當襲平陽除僭逆三日勒軍達易水注見前浚都䕶孫緯馳遣白浚浚將佐皆請撃之浚怒曰石公來正欲奉戴我耳敢言撃者斬設饗以待之勒晨至薊叱門者開門先驅牛羊數千頭聲言上禮實欲塞諸街巷浚始懼勒升其聴事執浚于前浚罵曰胡奴調田聊反戯也乃公何凶逆如此勒曰公位冠元台手握彊兵坐觀本朝傾覆曽不救援乃欲自尊為天子非凶逆乎即送襄國斬之浚將佐等詣軍門謝罪前尚書裴憲從事中郎荀綽獨不至勒召而讓之對曰憲等世事晉朝浚雖凶麤猶是晉之藩臣故從之不敢有貳明公茍不修徳義専事威刑則憲等死自其分請就死不拜而出勒謝之待以客禮勒數朱碩棗嵩等以納財亂政責游統以不忠所事皆斬之籍浚將佐親戚家貲皆巨萬惟憲綽止有書數衮鹽米各十餘解而已勒曰吾不喜得幽州惟喜得二子以憲為從事中郎綽為參軍勒停薊二日焚浚宫殿以故尚書劉翰行幽州刺史戍薊遣使奉浚首獻㨗于漢漢以勒為東單于劉琨請兵于拓䟦猗盧以撃漢㑹猗盧所部雜胡謀應勒猗盧悉誅之不果赴約琨知勒無降意大懼劉翰不欲從勒乃歸叚匹磾匹磾遂據薊城浚所置樂陵太守邵續附勒勒以其子乂為督䕶勃海太守劉𦙍棄郡依續謂曰君為晉臣奈何從賊以自汚乎㑹叚匹磾以書邀續同歸江東續從之或曰其如乂何續曰我豈得顧子而終為叛臣乎勒問之殺乂遂圉續匹磾救之勒引去樂陵漢縣晉置郡今仍為縣属山東武定府劉𦙍字承𦙍掖人襄國大饑時榖二升直銀一斤夏五月太尉涼州牧西平公張軌卒諡曰武穆子寔字安遜嗣軌寢疾遺令文武將佐務安百姓上思報國下以寧家軌卒長史張璽等表世子寔攝父位詔寔為都督刺史西平公六月漢冦長安索綝大破之漢大司馬中山王曜趙染冦長安索綝出拒之染有輕綝之色長史魯徽曰晉之君臣自知彊弱不敵將致死于我不可輕也染不聽晨帥輕騎數百逆之綝與戰于城西染兵敗而歸悔曰吾不用徽言至此何靣目見之先命斬徽徽曰將軍愚愎以取敗乃復忌前害勝猶有天地其能死于枕席乎染攻北地中弩而死乙亥三年漢建元元年春二月以左丞相睿為丞相都督中外諸軍事南陽王保為相國劉琨為司空進代公猗盧爵為王詔進猗盧爵為代王置官屬食代常山二郡猗盧請并州從事莫含于劉琨含不欲行琨曰以并州单弱吾之不村而能自存于胡羯之間者代王之力也吾傾身竭貲以長子為質而奉之者庶幾為朝廷雪大耻也卿奈何惜共事之小誠而忘狥國之大節乎含遂行猗盧甚重之常與參大計猗盧用法嚴國人犯法者或舉部就誅老㓜相携而行人問何之曰徃就死無一人敢逃匿者雁莫氏楚莫敖之後含門人漢曹嶷東莱人據臨淄漢青州刺史曹嶷嶷先從王彌彌降漢表嶷行安東將軍使徇青州嶷克束平進攻琅邪遂破青州盡得齊魯間郡縣自鎮臨淄築城曰廣固在今青州府益都縣西北水經注城四周絶澗岨水深隍有衆十餘萬臨河置戍石勒表稱嶷有専據東方之志請討之漢主聰恐勒滅嶷不可復制弗許太興初嶷叛漢來降又以建康懸逺復與石勒相結後石虎擊破廣固殺之漢立三后初漢后劉氏賢明漢主聰所為不道每規正之及劉氏卒嬖寵競進後宫無序至是聰納中䕶軍靳準二女月光月華立月光為上皇后劉貴妃與月華為左右皇后陳元達極諫以為並立三后非禮也聰不悦元達又奏月光有穢行聰不得已廢之月光慙恚自殺聰以是恨元達後聰立故張后侍婢樊氏為上皇后三后之外佩皇后璽綬者復七人已又立中常侍王沉養女為左皇后宣懐飬女為中皇后大將軍敷數涕泣切諫不聽尚書令王鑒等又諫聰皆殺之盗發漢覇杜二陵盗發二陵及薄太后陵得金帛甚多朝廷以用度不足詔收其餘以實内府帝問索綝曰漢陵中物何多邪對曰漢天子即位一年而為陵天下貢賦三分一供宗廟一供賔客一充山陵漢武比崩陵中不能容物赤眉取之不盡于今猶有朽帛此二陵其儉者耳夏六月陶侃撃杜弢破之弢走死湘州平丞相睿加王敦都督江揚等州軍事先是陶侃破走杜弢王敦表侃為荆州刺史事在元年侃及諸將與弢前後數十戰弢士卒多死乃請降丞相睿以為巴東監軍弢既受命諸將猶攻之不已弢憤怒復反至是侃與弢相攻弢使王貢出挑戰侃遥謂之曰弢為益州小吏盗用庫錢父死不奔䘮卿本佳人何為隨之天下寧有白頭賊耶言為賊者不得至老貢遂降弢衆潰遁走道死侃進克長沙湘州悉平丞相睿進王敦鎮東大將軍都督江揚荆湘交廣六州諸軍事江州刺史敦始自選置刺史以下寖益彊横潛蓄異志從弟稜諌之敦怒會降賊王如配稜麾下甞耻諸將辱己敦因宻使人激如殺稜聞之陽驚捕如誅之王稜字文子琛之子王敦徙陶侃為廣州刺史初故新野王歆牙門將胡元起兵竟陵以杜曽新野人勇冠三軍能被甲游于水中為竟陵太守事在永嘉六年己曽殺元而并其衆㑹朝廷以第五猗為荆州刺史曽迎猗于襄陽聚兵萬人與猗分據漢沔至是陶侃既破杜弢乗勝進撃曽有輕曽之志反為所敗時荀崧都督荆州屯宛曽引故兵圍之崧兵少食盡求援于吏襄城太守石覽崧小女灌年十三帥勇士數十人踰城突圍夜出且戰且前遂達覽所又為崧求救扵豫章太守周訪訪遣子撫帥兵與覽共救崧曽乃遁去曽復致箋于崧求自効崧許之侃遺崧書曰杜曽凶狡此人不死州土未寧足下當識吾言崧以兵少藉為外援不從曽復帥流亡二千餘人圍襄陽不克而還人荀崧字景猷潁川周撫字道和王敦嬖人錢鳯字世儀吳興人疾侃之功屢毀之侃詣敦自陳敦留不遣左轉廣州刺史以其從弟廙字世將刺荆州將吏鄭攀等詣敦留侃不許衆情憤惋遂迎杜曽第五猗以拒廙敦意攀等承侃風㫖被甲持矛將殺侃出而復還者數四侃正色曰使君䧺斷當裁天下何此不決乎因起如厠參軍梅陶言于敦曰周訪與侃親姻如左右手安有斷人左手而右手不應者乎敦意解乃設盛饌以餞之侃便夜發時王機盗據廣州侃至始興呉郡今廣東韶州府治是州人皆言宜觀察形勢侃不聽直至廣州遣督䕶討機走之機病死于道廣州遂平侃在州無事輒朝運百甓于齋外暮運百甓于齋内人問其故答曰吾方致力中原過爾優逸恐不堪事故習勞耳時鄭攀等相與拒王廙乆之衆心不一攀懼請降杜曽亦請撃第五猗以自效已而曽復冦陷楊口廙遣周訪撃走之遂定漢沔廙始得至荆州訪以功遷梁州刺史屯襄陽冬十月漢冦馮翊陷之劉曜冦北地進抜馮翊麴允軍于靈武以兵弱不敢進帝屢徴兵于相國保保左右皆曰蝮蛇螫手壯士斷腕今胡冦方盛且宜斷隴道以觀其變從事中郎裴詵曰今蛇已螫頭頭可斷乎保乃以胡崧行前鋒都督須諸軍集乃發允欲奉帝徃就保索綝曰保得天子必逞其私志乃止于是自長安以西不復貢奉百官饑乏採稆以自存丙子四年漢麟嘉元年春二月漢殺其少府陳休等七人初漢太弟乂寵衰太后單氏年少色美漢主聰烝焉乂屢以為言單氏慙恚而死乂寵由是漸衰漢主聰以子晉王粲為相國粲少有儁才自為相驕奢専恣逺賢親佞嚴刻愎諫國人惡之太子太傅崔瑋少保許遐勸乂圖粲乂不從瑋遐說乂曰相國威重踰于東宫殿下非徒不得立也且有不測之危不如早為之計乂弗從舎人告之漢主聰誅瑋遐使將軍卜抽將兵監守東宫乂上表乞為庶人且請以粲為嗣抽弗為通中常侍王沈郭猗等寵幸用事聰逰宴後宫或三日不醒或百日不出政事一委相國粲惟殺生除拜乃使沈等入白沈等多自以其私意決之猗有怨于乂謂粲曰聞太弟與大將軍聰子敷粲之弟謀因上己大宴作亂今禍期甚廹宜早圖之靳準素諂事猗亦謂粲宜自居東宫以領相國使天下早有所繋粲深以為然至是聰臨上秋閣命收少府陳休將軍卜崇及特進綦母達等七人誅之皆沈等所惡也休崇為人清直素惡沈等雖在公座未甞與言故沈等疾之卜幹泣諫聰怒免為庶人河間王易及陳元達等表奏請免沈等官付有司治罪聰以示沈等笑曰羣兒為元達所引遂成癡也聰問沈等于粲粲盛稱其忠清聰悅封沈等為列侯易又上疏極諫聰大怒手壞其疏易忿恚而卒易素忠直元達倚之為援得盡諫争及卒元達哭之慟曰人之云亡邦國殄瘁吾既不復能言安用黙黙茍生乎歸而自殺既而聰宴羣臣引見太弟乂見其惟悴涕泣陳謝聰亦慟哭待之如初代六修弑其君猗盧普根討之而立㝷卒鬱律立初代王猗盧愛其少子比延欲以為嗣使長子六修出居新平城在灅水之陽猗盧所築灅水出朔平府馬邑縣即桑乾河上源也而黜其母六修來朝猗盧使拜比延六修不從而去猗盧大怒帥衆討之兵敗遂為所弑猗㐌子普根攻六修滅之代立國中大亂將軍衛雄箕澹與劉琨質子遵帥晉人及烏桓三萬家馬牛羊十萬頭歸于琨琨兵由是復振普根㝷卒國人立鬱律鬱律撃走劉虎降其部落于是西取烏孫故地東兼勿吉以西士馬精彊雄于北方勿吉即挹婁今寜古塔地張寔遣兵入援寔遣將軍王該帥步騎五千人援長安且送諸郡貢計詔拜寔都督陜西諸軍事以其弟茂字成遜為秦州刺史先是涼州軍士得玉璽文曰皇帝行璽獻于張寔僚屬皆賀寔曰是非人臣所得留歸之長安夏六月丁巳朔日食漢大蝗河東平陽大蝗民流殍者什五六石勒遣將屯并州招納流民歸之者二十萬户聰遣使讓之勒不受命秋七月漢劉曜陷北地進至涇陽曜圍北地麴允救之曜使反間紿允曰郡城已陷徃無及也衆懼而潰曜追敗允遂取北地允性仁厚無威斷惟以爵位悦人而恩不及下故諸將驕恣士卒離怨曜進至涇陽渭北諸城悉潰曜獲將軍魯充梁緯緯被殺以充賢飲之酒曰吾得子天下不足定也充曰身為晉將國家䘮敗不敢求生若蒙公恩速死為幸曜曰義士也與之劍令自殺梁緯妻辛氏美色曜將妻之辛氏大哭曰妾夫已死義不獨生且一婦人而事二夫明公又安用之曜曰貞女也亦聴自殺皆以禮𦵏之冬十一月漢劉曜陷長安帝出降御史中丞吉朗馮翊蓮芍人死之漢封帝為懐安侯曜逼長安安定太守焦嵩安定人新平太守竺恢引兵來救皆畏漢兵彊不敢進相國保遣胡崧入援擊曜于靈臺三輔黄圖周文王靈臺在長安西破之崧恐國威復振則麴索勢盛乃還槐里曜攻陷長安外城麴允索綝退守小城内外斷絶城中饑甚亡逃不可制唯涼州義衆千人守死不移太倉有麴數十䴵允屑之為粥以進至是帝泣謂允曰今窮厄如此外無救援當忍耻出降以活士民因歎曰悞我事者麴索二公也使侍中宗敞送降牋于曜綝潛留敞使其子說曜曰若許綝以車騎儀同萬户郡公者請以城降曜斬而送之曰帝王之師以義行也孤將兵十五年未甞以詭計敗人必窮兵極勢然後取之今綝所言如此天下之惡一也輒相為戮之帝乗羊車肉袒出降羣臣號泣攀車帝亦悲不自勝御史中丞吉朗歎曰吾智不能謀勇不能死何忍君臣相隨北靣事賊虜乎乃自殺曜送帝于平陽漢主聰臨光極殿帝稽首于前允伏地慟哭聰怒囚之允自殺聰以帝為光禄大夫封懷安侯以曜為太宰假黄鉞督陜西封秦王贈允車騎將軍諡節愍侯斬綝于市石勒冦樂平劉琨救之大敗樂平遂陷先是勒陷廩邱劉演奔叚氏及是勒圍樂平太守韓據請救于劉琨琨新得猗盧之衆欲因其鋭氣以討勒箕澹諫曰此雖晉民久淪異域未習明公恩信恐其難用琨不從悉發其衆命澹帥步騎二萬為前驅琨屯廣牧漢故縣屬朔方郡後漢移置陘南地在今忻州為之聲援勒據險要設疑兵于山上前設二伏出輕騎與澹戰陽為不勝而走澹縱兵追之入伏中勒前後夾撃大破之澹奔代郡據棄城走并土震駭既而琨長史李𢎞以并州降勒琨進退失據叚匹磾遣信邀之琨遂帥衆奔薊十二月乙卯朔日食丞相睿出師露次移檄北征睿聞長安不守出師露次躬擐甲胄移檄四方刻日北征以漕運稽期斬都運令史淳于伯刑者以刀拭柱血逆流上至柱末二丈餘而下觀者咸以為寃司直劉隗上言伯罪不至死請免從事中郎周筵等官于是王導等引咎請解職睿曰政刑失中皆吾闇塞所致一無所問隗性剛訐當時名士多被彈劾睿率皆容貸由是衆怨歸之南中郎將王含敦之兄也以族彊位顯驕傲自恣隗奏含文致甚苦事雖被寢而王氏深疾之文致甚苦謂深文以致其罪中宗元皇帝考晉自元帝以後記載家俱稱東晉通鑑不分統曰晉紀今依之帝名睿宣帝之曽孫琅邪恭王覲之子年十五嗣王位永嘉初以安東將軍鎮建業事具前長安不守始稱晉王愍帝遇害乃即位于江左先是太元之際童謡云五馬浮渡江一馬化為龍及永嘉淪覆帝與西陽汝南南頓彭城五王獲濟而帝竟登大位焉丁丑建武元年凉元公張寔稱建興五年舊大國一漢小國一成新小國一涼凡三僭國春正月張寔遣司馬韓璞將兵伐漢黄門郎史淑自長安奔涼州稱愍帝出降前一日使淑齎詔賜張寔拜涼州牧承制行事且曰朕已詔琅邪王時攝大位君其協賛共濟多難淑至姑臧寔大臨三日辭官不受遣司馬韓璞等帥步騎一萬東撃漢遺相國保書曰王室有事不忘投軀前遣賈騫瞻公舉動中被符命敕騫還軍㑹聞朝廷傾覆為忠不遂憤痛之深死有餘責今更遣璞等唯公命是從璞等卒不能進而還先是長安謡曰秦川中血没腕惟有涼州倚柱觀及漢兵覆闗中氐羌掠隴右雍秦之民死者什九獨涼州安全二月漢冦滎陽太守李矩擊敗之漢主聰使從弟暢帥兵三萬攻滎陽矩未及為備乃遣使詐降暢不復設備矩欲夜襲之士卒皆恇懼乃遣其將郭誦禱于子産祠鄭州東有鄭大夫廟祀子産時李矩屯新鄭故禱于此使巫陽言曰子産有教當遣神兵相助衆皆踴躍争進掩擊暢營暢僅以身免後矩將耿稚等復襲漢太子粲營于孟津粲衆驚潰死傷大半詔以矩都督河南軍事三月丞相睿即晉王位𢎞農太守宋哲為漢所攻棄郡奔建康稱受愍帝詔令丞相睿統攝萬幾睿素服出次舉哀三日官屬上尊號不許固請不已睿慨然流涕曰孤罪人也若見逼不已當歸琅邪耳命駕將歸國乃請依魏晉故事稱晉王許之遂即位改元置百官立宗廟社稷有司請立太子王愛次子宣城公裒字道成欲立之謂王導曰立子當以徳導曰世子宣城俱有朗儁之美而世子年長王從之立世子紹即明帝為王太子封裒為琅邪王奉恭王後鎮廣陵以西陽王羕字延年汝南王亮之子為太保封譙王遜字子悌宣帝弟進之子之子氶音丞字敬才為譙王王敦為大將軍王導為揚州刺史領中書監錄尚書事刁協為僕射周顗為吏部尚書賀循為太常時承䘮亂之後江東草創協乆宦中朝諳練舊事循為世儒宗明習禮學凡有疑義皆取決焉劉琨慕容廆皆遣使勸進劉琨叚匹磾相與歃血同盟翼戴晉至琨檄告華夷遣右司馬温嶠字太真太原人奏表詣建康勸進琨謂嶠曰晉祚雖衰天命未改吾當立功河朔使卿延譽江南行矣勉之嶠至建康王導周顗庾亮等皆愛其才争與之交王以慕容廆為龍驤將軍大單于昌黎公廆不受處士遼東高詡曰霸王之資非義不濟今晉室雖微人心猶附之宜遣使江東示有所尊然後㐲大義以征諸部不患無辭矣乃從之廆遣長史王濟浮海詣建康勸進既而廆以裴嶷言諸部弱小者稍稍撃取之夏四月漢主聰殺其太弟乂相國粲使其黨謂乂曰適奉中詔云京師將有變宜衷甲以備乂信之命宫臣皆衷甲粲遣告靳準王沈準白漢主聰曰太弟將為亂已衷甲矣聰于是誅東宫官屬阮士卒萬五千餘人廢乂為北部王粲㝷使準殺之乂形神秀爽寛仁有器度故士心多附之聰聞其死哭之慟曰吾兄弟止餘二人而不相容安得使天下知吾心邪既而立粲為太子五月壬午朔日食六月祖逖取譙城在河南歸德府夏邑縣北元和志祖逖克譙城而居之謂此漢石虎入寇逖撃走之初流民張平樊雅各聚衆在譙為塢主王之為丞相也遣行叅軍桓宣譙國銍人說而下之及逖屯蘆洲使叅軍殷乂詣平雅乂意輕平視其屋曰可作馬廐見大鑊曰可鑄鐵器平曰此乃帝王鑊天下清平方用之又曰卿未能保其頭而愛鑊邪平大怒于坐斬乂勒兵固守逖攻之嵗餘不下乃誘其部將使殺之雅猶據譙城攻之不克南中郎將王含遣桓宣將兵助逖逖謂宣曰卿信義已著于彼今復為我說雅宣乃單馬從兩人詣雅曰祖豫州方欲平蕩劉石倚卿為援前殷乂輕薄非豫州意也雅即詣降逖既入譙城石勒遣石虎圍譙含復遣宣救之虎解去逖表宣為譙國内史晉王傳檄天下稱石虎敢帥犬羊渡河縱毒今遣琅邪王裒等水陸四道徑造賊場受逖節度㝷召裒還建康數月而卒冬十一月己酉朔日食立太學征南軍司戴邈字望之廣陵人淵之弟上疏以為世道乆䘮禮俗日弊猶火消膏莫之覺也今王業肇建萬物權輿謂宜篤道崇儒以勵風化王從之十二月漢主劉聰弑帝于平陽辛賔隴西狄道人死之漢主聰出畋以帝行車騎將軍戎服執㦸前導見者指之曰此故長安天子也故老有泣者太子粲言于聰曰昔周武王豈樂殺紂乎正恐同惡相求為患故也不如早除之聰曰前殺庾珉輩而民心猶如是吾未忍也且小觀之十二月聰饗羣臣使帝行酒洗爵已而又使執蓋晉臣涕泣有失聲者尚書郎辛賔起抱帝大哭聰斬之洛陽守將趙固本漢將降于李矩河内太守郭黙河内懐人侵漢河東揚言曰要當生縛劉粲以贖天子帝遂遇害史臣曰愍帝繼統天下崩離長安危急諸侯無釋位之志征鎮闕勤王之舉故君臣窘廹以至殺辱云河南王吐谷渾卒胡三省曰吐谷渾始見此吐谷渾者慕容廆之庶兄也父涉歸分户以𨽻之及廆嗣位二部馬鬬廆遣使讓之曰先公分建有别何不相逺異渾怒曰馬鬬乃其常何至怒人欲逺别甚易恐後㑹為難耳遂帥其衆西徙廆遣長史追謝之渾遂西傅隂山注見前而居屬永嘉之亂因度隴據洮水注見前之西極于白蘭羌别種唐為維恭二州地廢維州在四川茂州保縣西廢恭州在松潘衛西南地方數千里今青海及四川松潘皆吐谷渾故地鮮卑謂兄為阿干廆追思之為作阿干之歌渾有子六十人長子吐延嗣吐延有勇力羌胡畏之後吐延為羌酋所殺子葉延嗣葉延孝而好學以為禮公侯之子得以王父字為氏乃號其國曰吐谷渾戊寅太興元年漢主劉曜光初元年春三月王即皇帝位愍帝凶問至建康王斬縗居廬百官請上尊號不許紀瞻曰晉氏統絶于今二年兩都燔蕩宗廟無主劉聰竊號于西北而陛下方髙讓于東南此所謂揖讓而救火也王猶不許使殿中將軍韓績撤去御座瞻叱績曰帝座上應列星敢動者斬王為之改容奉朝請周嵩上䟽曰古之王者義全而後取讓成而後得是以享世長久今梓宫未返舊京未清宜開延嘉謀訓卒勵兵先雪大耻副四海之心則神器將安適哉由是忤旨出為新安太守嵩字仲智顗之弟王遂即皇帝位百官皆陪列命王導升御牀共坐導固辭曰若太陽下同萬物蒼生何由仰照乃止大赦文武増位二等更王太子紹為皇太子紹仁孝喜文辭善武藝好賢禮士容受規諫與庾亮温嶠等為布衣之交亮風格峻整善談老莊帝器重之聘其妹為紹妃使亮侍講東宫帝好刑名家以韓非書賜太子亮諫曰申韓刻薄傷化不足留聖心太子納之張寔遣使上表都尉陳安叛相國保舉兵逼上邽保遣使告急于張寔寔遣歩騎二萬赴之軍至新陽晉縣屬天水郡聞愍帝崩保謀稱尊號破羌都尉張詵言于寔曰南陽忘大耻而亟欲自尊必不能成功晉王近親且有名徳當率天下以奉之寔從之遣牙門蔡忠奉表詣建康比至帝已即位寔不用江東年號猶稱建興自此涼州始别為國夏四月丁丑朔日食加王導驃騎大將軍開府儀同三司導遣從事行揚州郡國還見各言二千石官長得失獨頋和字君孝吳郡人無言導問之和曰明公作輔寧使網漏吞舟何縁採聽風聞以察察為政耶導咨嗟稱善五月叚匹磾殺太尉廣武侯劉琨諡曰愍初琨世子羣字公度為叚末柸所得末柸厚禮之許以琨為幽州刺史欲與之襲匹磾宻遣使齎羣書請琨為内應為匹磾邏騎所得琨不知也來見匹磾匹磾以書示之曰意亦不疑公是以白公耳琨曰與公同盟庶雪國家之耻琨終不以一子之故負公而忘義匹磾雅重琨初無害琨意其弟叔軍諌之乃留琨㑹代郡太守辟閭複姓嵩潛謀襲匹磾事泄匹磾收其徒黨悉誅之乃稱詔收琨縊殺之琨從事盧諶等帥衆依末柸奉琨子羣為主將佐多奔石勒朝廷以匹磾尚彊兾其能平河朔乃不為琨舉哀温嶠表琨盡忠帝室宜在褒恤後數嵗乃加贈太尉初温嶠為琨奉表詣建康其母崔氏固止之嶠絶裾以去既至屢求返命朝廷不許㑹琨死除散騎侍郎嶠聞母死固辭苦請北歸詔曰今桀逆未梟諸軍奉迎梓宫猶不得進嶠可以私難而不拜邪嶠不得已受拜秋七月漢主聰卒太子粲立八月靳準弑而代之石勒引兵討準冬十月劉曜自立于赤壁水名寰宇記在岳陽縣南西北流入澗水岳陽今屬平陽府封勒為趙公漢主聰寢疾徴劉曜石勒受遺詔輔政皆固辭乃以曜為丞相領雍州牧勒為大將軍領幽兾牧上洛王景濟南王驥並録尚書事靳準為大司空皆迭決奏事聰卒粲即位改元漢昌聰后四人皆年未二十粲多行無禮靳準隂有異志私謂粲曰如聞諸公欲行伊霍之事宜早圖之粲乃收景驥等殺之粲常遊宴後宫軍國之事一決之於準準遂勒兵升殿執粲殺之劉氏男女無少長皆斬東市發淵聰二陵斬聰屍焚其廟自號大将軍漢天王以傳國璽付胡嵩曰還汝晉家嵩不敢受乃殺之遣使告司州刺史李矩曰劉淵屠各小醜矯稱天命使二帝幽没輒率衆扶持梓宫請以上聞矩馳表聞帝遣太常韓𦙍等奉迎梓宫準欲以王延為左光祿大夫延罵曰屠各逆奴何不速殺我也乃殺之曜聞亂自長安赴之勒帥精騎五萬以討準據襄陵漢縣今屬平陽府北原準數挑戰勒堅壁以挫之曜至赤壁即皇帝位以勒為大司馬加九錫進爵為趙公勒進攻準于平陽巴巴氐也魏武遷于闗中河東皆有之及羌羯降者十餘萬落勒皆徙于所部既而將軍喬泰等討準斬之推準弟明為主十一月乙卯日夜出髙三丈詔州郡秀孝復試經策時詔羣公卿士各陳得失御史中丞熊逺上疏畧曰胡賊猾夏梓宫未返而不能遣軍進討一失也羣官不以讐賊未報為耻務在調戯酒食二失也選官用人不料實德選求才幹惟事請託當官者以治事為俗吏奉法為苛刻盡禮為諂諛從容為高妙放蕩為達士驕蹇為簡雅三失也世所惡者陸沉泥滓時所喜者翺翔雲霄安得朝有辨争之臣士無祿仕之志乎古之取士敷奏以言今光祿不試甚違古義又舉賢不出世族用法不及權貴是以才不濟務姦無所懲若此道不改求以救亂難矣先是帝欲慰悅人心州郡秀孝至者不試皆署吏尚書陳頵亦上言宜循舊制試以經策從之仍詔不中科者刺史太守免官于是秀孝皆不敢行其有到者亦皆托疾比三年無就試者帝欲特除孝亷已到者官尚書郎孔坦字君平㑹稽山隂人以為近郡懼累君父皆不敢行逺郡冀于不試冒昧來赴不若一切罷之而為之延期使得就學則法均而令信矣帝從之聴申至七年乃試石勒攻拔平陽靳明犇赤壁漢主曜族誅之喬泰等遣使奉傳國六璽降漢石勒怒進軍攻明明與戰屢敗求救于曜曜使人迎之明帥平陽士女萬五千人犇漢曜收靳氏男女無少長皆斬之石勒焚平陽宫室修二陵收粲以下百餘口𦵏之置戍而歸御批歴代通鑑輯覽卷三十一

front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷二十二後漢世祖光武皇帝癸卯建武十九年春正月尊孝宣皇帝廟為中宗始祠元帝以上于太廟成帝以下于長安徙四親廟于章陵
  hash: sha256:d52223e089be1e417de8b33f9319bff776ffc5057edd081b1faabf760eb90108

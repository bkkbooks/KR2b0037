front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷一百三明宣宗皇帝丙午宣德元年春正月命侍郎黃宗載一名垕字厚夫豐城人等清理天下軍伍
  hash: sha256:cbf0e218db645d7fe1445548589428e89a728f9ff6ff736a0d164d02b03feff7

  text: 欽定四庫全書御批厯代通鑑輯覽卷一百九明世宗皇帝乙未嘉靖十四年春正月罷督理倉場中官
  hash: sha256:bdb10c942ada5e33f7c02dece370daf91d9ea5d69e3525598070e79299cf8dba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_108-1a, image: WYG0339/WYG0339-0474a.png}
body:
  text: 初孫交為户部尚書以監督倉場中官為數太多初止數人正德中增至五十五人請盡去之并臨清準徐諸倉一切勿遣帝罷撤其半餘仍如故至是監督中官王奉季慎互以姦贓訐奏下法司按問給事中管懷理山東臨邑人因言倉場錢穀皆户部事今參用內官惟肆貪叨于國計無補請悉撤回從之先是帝既盡撤天下鎮守中官至是復罷倉場監督監鎗太監于是諸斂迹終帝之世四十餘年不敢為惡莊肅皇后夏氏崩禮臣上喪儀帝曰嫂叔無服且兩宫在上朕當服青臣民如母后服夏言奏羣臣不敢以素服見上請暫罷朝參許之已而議諡張孚敬曰大行皇后上嫂也與纍朝元后異宜用二字或四字言與李時等以莊肅配武宗請遵纍朝舊制帝不悅因用六字曰孝靜莊惠安肅毅皇后已悟孚敬言非是改諡孝靜莊惠安肅溫誠順天偕聖毅皇后二月作九廟祖宗各為專廟太祖廟居中左為三昭廟與文祖世室祀太宗百世不遷而四右為三穆廟廟各有殿殿有寢以藏主皆南向世室殿寢視昭穆廟加崇廣焉帝語閣臣曰文祖廟為世室則世廟宇當避張孚敬言世廟著明倫大典頒詔四方不可改文世室宜稱太宗廟從之三月葬孝靜皇后遼東軍亂囚巡撫都御史吕經字道夫陜西寧州人經以苛虐失衆心為亂軍所執故事每軍一佐以餘丁三每馬一給以牧地五十畝經至損餘丁之二編入均徭册盡收牧地還官又役軍築邊牆督趨過當諸軍詣經乞罷經訴者卒遂亂毀府門火均徭册經竄别室中搜得之裂其冠裳幽之都司署帝聞召經回行至廣寧悍卒于蠻兒等復辱之巡按御史曾銑字子重江都人上言往者甘肅大同軍變處之過輕羣小謂罪不過此遂狃為故常今宜誅首惡以懲其後乃捕斬數十人懸首邊城全遼大定擢銑大理寺丞經謫戍夏四月張孚敬罷孚敬有疾帝與李時言頗及其執拗且不惜人材以叢怨孚敬聞之念前此三黜皆為帝所薄遂屢疏乞骸骨許之明年復遣官視疾趨入朝行至金華疾大作乃歸召費宏復入閣帝追念宏遣行人即家起之比還朝眷遇益厚常偕李時召入無逸殿與周覽殿廬從容笑語移時始出自是數有咨問宏亦竭誠無隱承張桂操切之後易以寬和朝士皆慕樂之秋九月詔九卿會推巡撫官帝懲遼東之變欲慎簡撫臣費宏請會九卿推舉如京堂官例從之冬十月華蓋殿大學士費宏卒諡文憲帝深嗟悼賻恤有加贈太保宏恭慎謙抑明習國家故事持重得大體三入政府中遭讒搆迄以功名終丙申十五年春正月以劉天和字養和麻城人為兵部侍郎總制三邊先是濟農居套中西抵賀蘭山限以黃河不得渡用牛皮為渾脫即革囊騎以濟河俗謂之皮渾屯與渾脫音相近故史傳借用之渡入山後諳達亦自豐州注見前入套相率為邊患總制唐龍字虞佐蘭溪人用總兵官王效延綏人梁震新野人數敗敵十二年冬虜犯鎮逺關效震之河虜殺溺死者甚衆明年又犯黃甫川震擊走之既而復犯花馬池不得入引去震追敗之乾溝谷鎮逺關在寧夏府寶豐縣西南黃甫川在葭州府縣東北有城乾溝亦曰蘆溝在鞏昌府靖逺縣東北寧夏固原邉接界處然蹂躪迄無寧嵗及是天和赴鎮龍召為刑部尚書修戰具飭邊備築增城堡時兵車皆雙輪用二十人遇險即困又行不適于用天和倣前總督秦絃隻輪車上置炮槍弩戟前樹狻猊牌左右虎盾連二車蔽三十四人一人挽之推且翼者各二人戰則護騎士其中敵逺施火器稍近發弓弩又近乃出短兵敵敗則騎兵追以練諸邊將濟農以十萬衆將大舉入犯天和策寇瞰西有備必東密檄延綏副將白爵宵行與參將吳瑛合寇果東至黑河墩黑河即古黑水在榆林府北晉書載記赫連勃勃于黑水之南營都城即此遇伏大創而去爵等尾擊之寇連敗多死其分犯寧夏者亦為王效所破捷聞進天和左都御史二月帝奉章聖皇太后詣天壽山謁陵帝至沙河見居民蕭條顧謂大學士李時曰七陵在此宜加守護時對曰昔邱濬建議京師當設四輔以臨清為南昌平為北薊州保定為東西各屯兵一二萬今若于昌平增一總兵可南衛京師北護陵寢帝乃下廷臣勘議于沙河築鞏華城在昌平州東南今有同知及都司駐此為置戍焉夏五月毁禁中佛殿禁中大善佛殿元時所造藏金銀諸佛像及器物至是悉命燬之凡一百九十六座其重萬三千餘斤以其地建太后宫冬十二月以道士邵元節為禮部尚書元節自嘉靖三年召入京大加寵信封真人班二品贈其父母官其孫及曽孫至是以皇儲生嘉其禱祀功拜尚書閏月以禮部尚書夏言兼武英殿大學士預機務言入閣李時雖為首輔政多自言出時亦每推讓焉丁酉十六年春二月詔右都御史毛伯溫字汝厲吉水人討安南初安南社堂燒香官陳皓安南前後有兩陳皓一在宣德時黎利偽奉以降一即此詭稱前王陳氏後殺國王黎晭而自立自黎利後九傳而至晭多行不義遂及于難晭臣莫登庸初附皓後與黎氏大臣阮宏裕等起兵討皓皓奔諒山兵敗走死立晭兄子譓為王登庸握兵柄潛蓄異志黎氏舊臣鄭綏以譓徒擁虛位别立其族子酉榜登庸破綏捕殺酉榜益恃功驕恣旋逐譓奔清華登庸立其庶弟懬已復殺懬篡其位不通朝貢者二十餘年至是譓子寧時譓已卒于清華遣使告難乞興問罪師夏言等列登庸罪狀請大振宸斷尅期徂征詔起伯溫于家伯溫先為大理丞坐李福逹獄奪職尋起用都御史以憂回籍命參軍務以都督僉事江桓牛桓督軍討之兵部待郎潘珍字玉卿婺源人言安南不足置郡縣真叛服無與中國用兵非計廣東巡按御史余光江寧人亦言莫之篡黎猶黎之篡陳不足深較但當罪其不庭責以稱臣修貢不必逺征以疲中國帝怒褫珍職奪光俸己而伯溫至京奏上方略而帝意忽中變命暫緩師會雲南巡撫汪文盛字希周崇陽人招納黎氏舊臣得其進兵地圖并獲登庸間諜及所撰偽大誥登庸篡位時作大誥五十九條頒之國中上之命仍遵前詔征討明年春文盛復以登庸降表至請宥罪許貢下廷檥僉言不可許乃趣伯溫啓行制甫下兩廣總督侍郎張經以用兵方略上具言須兵三十萬餉百六十萬石欽州知州林希元則極言登庸易取狀請即日出師兵部尚書張瓚不敢決復請廷議議上無成策帝不懌讓瓚師復止初帝以用兵事重本無必討意特欲威服之故命下而罷者再至十八年登庸屢表乞降帝亦欲因撫之再下廷臣議𠞰撫之宜瓚及廷臣請仍命伯溫南征如登庸束手歸命無異心則待以不死從之人張經字廷彝候官夏五月雷震謹身殿冬十一月故昌國公張鶴齡下獄死姦人班期于雲鶴告延齡兄弟挾左道咒詛逮鶴齡下詔獄太后衣敝襦席藁為請不得鶴齡瘐死獄中戊戌十七年夏六月詔議明堂大饗禮下户部侍郎唐胄字平侯瓊山人于獄初獻皇帝廟止修時祀至是前揚州府同知豐坊字存禮熙之子請建明堂尊獻皇帝廟號為宗以配上帝下禮部集議尚書嚴嵩字惟中分宜人言傳稱萬物成形于秋故秋祀明堂以父配主親親也至宋儒論則主祖宗之功德今以功德則宜配文皇以親則宜配獻皇且未有稱宗而不祔太廟者帝示夏言言不敢議帝曰皇考稱宗豈為過情嵩于是曲順帝旨以為嚴父配天允合周道唐胄爭之曰三代之禮莫備于周郊祀后稷以配天宗祀文王于明堂以配帝至周成王之世未聞以嚴父配天之祭移于武王也臣謂明堂宜奉太宗配若獻皇帝得聖人為子不待稱宗議配而專廟之享百世不遷矣疏入帝大怒下詔獄黜為民坊性狂誕熙既卒家居貧乏思效張桂等以片言取通顯待命久之無所進擢歸家悒悒以死人咸惡其畔父云秋八月以禮部尚書顧鼎臣兼文淵閣大學士預機務時夏言當國鼎臣入恃先逹且年長頗欲有所可否言不悅鼎臣遂不敢與爭九月尊獻皇帝廟號曰睿宗祔于太廟先是帝命議稱宗祔廟之禮集文武大臣于東閣嚴嵩與羣臣議沮之帝大不悅著明堂或問難嵩嵩惶恐盡改前説條畫禮儀甚備且言古者父子異昭穆兄弟同世次故殷有四君一世而同廟宋太祖太宗同居昭位前事可據今皇考與孝宗當同一廟奏上羣臣無敢異議至是帝諭禮臣曰獻皇帝躬備大德延及朕躬宜薦宗稱乃改太宗廟號為成祖尊獻皇帝廟號為睿宗遂奉睿宗主祔太廟復配享上帝于元極寶殿冬十一月上皇天上帝大號帝以獻皇帝既稱宗配享乃躬詣南郊上皇天上帝大號恭進册表禮成還詣太廟加上髙皇帝髙皇后尊號是日皇后助行亞獻禮文武官命婦陪祀嚴嵩奏慶雲見請受羣臣朝賀又為慶雲賦及大禮告成頌上之帝悅命付史館十二月章聖皇太后蔣氏崩諡慈孝皇后先是帝營壽陵于大峪山在昌平府西北及是太后崩將奉獻皇帝改葬焉命駙馬都尉崔元尚書張瓚等為奉迎禮儀使已帝親詣大峪相視復令議奉太后南詣合葬嚴嵩等言靈駕北來慈宫南詣共一舉耳如初議便帝意終未決因止元等毋行而令指揮趙俊南往啓視幽宫于是親幸承天之議起李時卒諡文康時在閣帝待之不如張孚敬夏言然頗少責辱恩禮亦始終不替及是卒贈太傅己亥十八年春二月立子載壑帝第二子為皇太子封載垕帝第三子即穆宗為裕王載圳帝第四子為景王後之藩安陸起翟鑾為兵部尚書行邊先是鑾以憂歸服闋久不召夏言顧鼎臣居政府鑾與謀召已及是帝將南巡欲謁顯陵慮塞上有警議遣重臣巡視言等因薦鑾改兵部尚書節制諸邊以曾子裔孫質粹字好古吉安永豐人曽子五十九世孫為世襲五經博士張孚敬卒孚敬卒于家帝至承天始聞之傷悼不已贈太師孚敬剛明果敢持身特亷痛惡贓吏一時苞苴路絶而性狠愎報復相尋不護善類欲力破人臣私黨而已先為黨魁大禮獄叢詬沒世顧帝始終眷禮廷臣卒莫與二嘗稱少師蘿山而不名其卒也禮官請諡帝取危身奉上之議特諡文忠帝如承天謁顯陵夏四月還京師趙俊自承天還言顯陵不吉帝欲親詣承天周閲卜兆九卿大臣許讚吕柟等諫帝曰朕豈空行哉為吾母耳乃命宣城伯衛錞華亭人頴之孫遂安伯陳鏸巴人志三世孫及顧鼎臣等輔太子居守遂如承天夏言嚴嵩等扈從行次衛輝夜四更行宫火從官倉猝不知帝所在錦衣衛指揮使陸炳負帝出御乘與帝自是愛幸炳衣炳之先平湖人後𨽻錦籍炳母帝乳媪也三月至承天謁顯陵命作新宫曰待合葬也越三日享上帝于龍飛殿奉睿宗配秩于國社國稷遍羣祀又三日御龍飛殿受賀謁陵畢嚴嵩請表賀夏言請俟還京帝報罷意大不懌嵩知帝指固以請帝乃曰禮樂自天子出可也令表賀帝自是不悅言詔赦天下給復承天三年免湖廣田賦五之二畿內河南三之一歸過慶都本漢望都縣金改名今仍舊屬保定府從臣請祀堯母墓在望都縣城內帝曰帝堯父母異陵可徵合葬非古既至京復詣大峪審視曰大峪不如純德本松林山在鍾祥縣東北以顯陵所在故改名卒定南祔之議彗星見五月夏言罷尋諭留之翊國公郭勛勛以獻皇帝祔廟進封公得幸害言寵嚴嵩亦心妬言遂相與搆之會帝自承天還復幸大峪山言進居守敕稍遲帝大怒責言怠慢不恭命還前賜銀章言前銀章文曰學博才優得密封言事并纍所降手敕言惶懼謝罪請免追銀章手敕為子孫百世榮詞甚哀帝怒不已疑言毁損令禮部追取削言勳階言以祗薦皇天上帝册表加少師特進光祿大夫上柱國明世人臣無有加上柱國者言所自擬也令致仕言乃以手敕四百餘并銀章上之居數日帝怒解命止行復諭入直言疏謝帝悅諭令勵初忠秉公持正免衆怨言心知所云衆怨者勛輩也再疏謝謂自處不敢後他人一志孤立為衆所忌帝復不悅詰責之惶恐謝乃己未幾以所追銀章手敕還之復以梁材字大用南京金吾衛人為戶部尚書材初長戶部力袪宿弊以忤權貴失帝眷及尚書李廷相罷帝念材亷廷臣亦交薦召復原官材三掌國計砥節守公如一日帝嘗曰尚書得如材者十二人無憂天下矣六月雷震奉先殿詔廷臣自陳都御史王廷相字子衛儀封人奏曰人事修而後天道順大臣法而後小臣廉今廉隅不飭賄賂公行臣職憲紀宜先罷斥意蓋斥嚴嵩張瓚輩也帝但諭留而已秋閏七月葬慈孝皇后于顯陵河南飢命户部侍郎王杲字景初汶上人賑之時河南災甚杲請急發帑詔齎臨清倉銀五萬兩以行既至復請發十五萬兩全活不可勝計庚子十九年春正月翟鑾還京復入閣鑾之行邊也諸邊文武大吏俱櫜鞬郊迎惟恐不得當鑾意饋不資既事竣歸裝千輛用遺貴近遂復以原官入閣夏五月詔勳戚子弟入監肄業司業王同祖字繩武崑山人言世祿之家鮮克由禮失教故也請敕公侯伯子弟未仕者悉入成均俟學有可觀奏請敘廕不率者糾治從之尋命已任事者亦送監肄業于是少年勳戚爭以入學為榮矣秋八月殺太僕卿楊最字殿之射洪人時帝好神仙給事中顧存仁字伯剛太倉人髙金石州人王納言信陽人皆以直諌得罪會方士段朝用以所煉白金器百餘因郭勛以進云以盛飲食物供齋醮即神仙可致也帝立召與語大悅朝用言帝居深宫無與外人接則黃金可成不死藥可得帝益悅即諭廷臣令太子監國朕少假一二年乃親政舉朝愕不敢言最抗疏諫曰陛下春秋方壯乃聖諭及此不過得一方士欲服食求神仙耳夫神仙乃山棲澡鍊者所為豈有髙居紫闥衮衣玉食而能白日翀舉者臣雖至愚不敢奉詔帝怒立下詔獄杖殺之監國議亦罷明年朝用伏誅隆慶初贈最副都御史諡忠節九月劉天和敗濟農于黑水苑在固原州西斬其子錫沙王舊作小十王今改濟農連年入寇邊將禦之屢被殺傷是年七月寇萬全右衛總兵官白爵逆戰再敗之至是復入固原剽掠且饜會淫潦弓矢盡膠無鬭志而諸將多畏縮天和斬指揮二人召故總兵官周尚文尚文優將材負氣桀倣所至與文吏競文吏又往往挫折之以故彌不相得巡撫賈啓劾尚文老悖遂革任尚文字彥章西安後衛人激令立功尚文盡鋭奮擊之黑水苑斬濟農子錫沙王寇遁走寧夏巡撫楊守禮字秉節蒲州人總兵任傑等復邀擊于鐵柱泉在靈州花馬池西南有泉百步明時以寇入必飲馬于此築堡守之敗之進天和南京户部尚書以守禮總督軍務尚文復都督同知冬十月顧鼎臣卒諡文康鼎臣素柔媚其居政府謹事夏言不能有為及是卒贈太保辛丑二十年春二月下監察御史楊爵字伯珍富平人于獄時帝經年不視朝日事齋醮工作煩興嵗頻旱元日微雪夏言嚴嵩作頌稱賀爵撫膺大息上疏言今天下大勢如人衰病已極腹心百體無不受患猶且奔競成風賄賂公行遇災不憂非瑞稱賀邪佞日親諍臣日逺此大憂也因歷陳諸弊其一以郭勛姦蠧任用肆毒其二以工作不休朘民膏血其三以朝御希簡經筵曠廢其四以崇信方術濫加保傅其五以阻抑言路忠杜口詞俱切直帝震怒立下詔獄搒掠血肉狼籍死一夕復蘇獄卒以帝意不測屏其家人不納飲食屢瀕于死處之泰然主事周天佐字子弼晉江人御史浦鋐字汝器文登人疏救先後死獄中自是無敢言者天佐與爵無生平交入獄時爵第隔相訊而已比三日天佐不勝楚遂死尸出獄大興民有祭而哭之慟者或問之曰吾哀其忠之至而死之酷也鋐方病入獄被杖百復錮以鐖柙爵迎哭之鋐息已絶徐張目曰此吾職也子無然後數日卒隆慶初天佐贈光祿卿鋐贈光祿少卿夏四月置安南都統使司毛伯溫等督師至廣西傳檄諭莫登庸能束身歸命即待以不死登庸乃率從子文明及諸部目入鎮南關在廣西大平府憑祥州西南左右石山髙插雲表設關建城為安南入貢之道上土地軍民籍請奉正朔永為藩臣伯溫承制許之納其圖籍權令還國聽命疏聞帝大喜詔改安南國為安南都統使司授登庸都統使更十三道為十三宣撫司各設同知副使僉事聽都統黜陟三嵗一貢以為常併令覆黎寧真偽如果黎氏後割所據四府俾奉祀事否則已之伯溫受命嵗餘不發一矢而安南定由帝本不欲用兵故也九廟災五月以兵部侍郎王以旗字士招江寧人總理河漕時黃河南徙決野雞岡在歸德府睢州北由渦河經亳州入淮舊決口俱塞徐吕二洪竭漕舟膠總河郭持平久治不效乃命以旗督理以旗言黃河遷徙不常不能借以濟運宜濬山東諸泉入野雞岡新開河道以濟徐吕而築長堤沛縣以南聚水如閘河制從之秋八月昭聖皇太后張氏崩諡孝康皇后夏言罷九月郭勛以罪下獄冬十月言復入閣言勛交惡日甚九廟災言方以疾在告自陳乞罷不允昭聖太后崩詔問太子服制言報疏有訛字帝切責言言謝罪且乞還家治疾帝益怒令致仕及將出都詣西苑齋宫叩首謝帝憐之俾還私第治疾俟後命時勛以言官重劾給事中賢等劾勛擅作威福網利虐民亦引疾在告京山侯崔元新有寵直內苑忌勛帝從容問元言勛皆朕股肱相妬何也元不對帝問言歸何時曰俟聖誕後乃敢請又問勛何疾曰勛無疾言歸即出耳帝頷之言官知帝眷言惡勛因共劾勛勛辨語悖謾先是帝給勛敕與兵部尚書王廷相等同清軍役敕具勛久不領言官劾之勛疏辨冇何必更勞賜敕語帝怒責勛無人臣禮給事中髙時浙江臨安人因盡發勛貪縱不法十數事遂下勛錦衣獄復詔言入直方言在告時閣事多取裁決及治勛獄排根批柢悉其指授朝士方惡勛不以咎言也勛下獄後帝念其曽贊大禮論鎮撫司勿加刑訊奏上當勛罪斬帝以奏當不明令法司覆勘法司更當勛不軌罪斬沒入妻孥田宅奏上留中不下帝意本欲寬勛屢示意指而廷臣惡勛繆為不喻指者更坐重辟久之勛竟死獄中十一月葬孝康皇后壬寅二十一年夏六月諳逹寇山西先是諳逹遣使欵大同詔却之諳逹與濟農遂分道人犯及是復遣使求貢大同巡撫龍大有茶陵州人誘縛之詭言用計擒獲詔磔于市敵怒入掠朔州以下注俱見前抵廣武由太原南下沁汾復從欣崞而北屯祁縣參將張世忠等戰死敵遂從雁門故道而去未幾濟農死其子朗台吉舊作狼台吉今改後仿此等散處河西勢分諳逹獨盛嵗數擾邊秋七月己酉朔日食夏言罷八月以禮部尚書嚴嵩兼武英殿大學士預機務言再罷再相帝雖優禮然恩眷已不及初帝以奉道嘗御香葉冠因刻沉水香冠五賜言等言以非人臣法服不奉詔帝怒甚嵩因召對冠之籠以輕紗帝見益內親嵩而欲去言嵩因傾之嵩與言同鄉科第先言而位下之始倚言事之謹言入閣嵩自代以門客畜之嵩恨甚嘗置酒邀言躬詣其第言辭不見嵩布席展所具啓跽讀言謂嵩實下已不疑也言既失帝意懼斥呼嵩與謀嵩已潛造陶仲文第謀齮言代其位言知甚愠諷言官劾嵩帝方憐之不聽也兩人遂大郤嵩因燕見頓首雨泣訴言見凌狀帝使悉陳言罪嵩遂振暴其短典陶仲文方士初名真黃岡人會日食既帝手詔以為下慢上之咎落言職間住言既去醮祀青詞非嵩無當帝意者遂代言入閣嵩時年已六十餘不異少壯朝夕直西苑板房未嘗一歸洗沐帝謂其勤益信之嵩無他才略惟一意媚上竊權罔利帝英察自信果刑戮頗護已短嵩以故得因事激帝怒戕害人以成其私誅斥者不可勝計云九月作雷壇錮工部員外郎劉魁字煥吾泰和人于獄帝用陶仲文言建雷壇于太液池西所司希帝意務宏侈程工峻急魁欲諫度必得重禍先命家人鬻棺以待遂上章曰頃營大享殿大髙元殿工費以億萬計土木衣文繡匠作班朱紫道流所居擬于宫禁國用已耗民力已竭而復為此不經之事非所以示天下後世帝震怒杖于廷錮之詔獄冬十月宫婢楊金英謀逆伏誅殺端妃曹氏帝宿曹妃宫宫婢楊金英伺帝熟寢以組縊帝項未絶有走告皇后者后馳救得蘇后命內監張佐等捕宫人雜治言王寧嬪實首謀又言端妃亦與知時帝病悸不能言后傳旨收端妃寧嬪及金英等悉磔于市久之帝始知妃寃癸卯二十二年春正月丙午朔日食秋九月逮巡按山東御史葉經字叔明上虞人杖殺之嚴嵩與經有宿憾嵩在禮部以秦晉二藩宗人襲封事受重賄經發之彌縫得免故恨經及是經按山東監鄉試試録上嵩指發䇿語為誹謗激帝怒下禮部參論尚書張璧字崇象石首人等阿旨請逮考試官周礦提調布政使陳儒及經等并治嵩密言試事盡由御史帝乃降旨斥文中語為狂悖經杖八十為民創重卒礦儒等謫官由嵩報復也嵩借事殺異己自經始先是嵩相甫踰月御史謝瑜字如卿上虞人即劾之比之四凶請急誅斥帝雖譙讓瑜然未深罪嵩亦以初得政未敢顯為擠陷故瑜得居職如故及經杖死嵩益發舒其後劾嵩者希得免矣瑜後以大計嵩囑主者黜之遂除名于是給事中王協沈良材陳御史喻時陳紹及山西巡撫童漢臣福建巡按何維柏等相繼得罪皆並瑜劾嵩者也喻王協字韜孟金壇人沈良材泰州人陳餘姚人時光山人陳紹上虞人童漢臣錢塘人何維柏字喬仲南海人冬十月朵顔入寇攻圍慕田峪在昌平州北有闕口殺守備陳舜副總兵王繼祖等往援乃退甲辰二十三年秋八月翟鑾罷嚴嵩入閣鑾以資地居其上嵩惡之嗾言官劾其子夤緣舉進士遂斥為民鑾子汝儉汝孝與其師崔奇勛所親焦清同舉進士嵩屬給事中王交等劾其有弊帝怒下吏部都察院鑾疏辨帝益怒曰鑾被劾待勘敢先瀆擾邪二子縱有才何至與其師並進勒鑾父子竒勛清及分考官等皆為民九月以吏部尚書許讚兼文淵閣大學士禮部尚書張璧兼東閣大學士並預機務時大權一歸嚴嵩讚璧不得預票擬讚常嘆曰何奪我吏部使我旁睨人因屢乞休冬十月諳逹入寇明史世宗本紀作小王子翟鵬傳作諳逹今依鵬傳諳逹自萬全右衛毁牆入掠蔚州直抵完縣京師戒嚴命逮總督宣大兵部尚書翟鵬字志南撫寧衛人巡撫薊鎮都御史朱方下獄鵬在朔州聞警夜半至馬邑調兵食復趨渾源遣諸將遇敵言官劾其逗遛致震畿輔遂遣官械鵬而以侍郎張漢代之方以建議撤諸路防秋兵致敵乘間入犯亦命繫鵬坐永戌方杖死府渾源五季唐縣元改州今州屬大同張漢鍾祥人十一月加方士陶仲文少師仲文由吏員需次京師故與邵元節善元節年老宫中黑眚見治不效因薦仲文以符水噀劍絶宫中妖被寵幸尋授少保禮部尚書未幾加少傅至是大同獲間諜帝歸功上元加仲文少師仍兼傅保後復以禱雨功封恭城伯帝自二十年遭宫婢之變移居西內日求長生郊廟不親朝講盡廢君臣不相接獨陶仲文得時見輒賜坐稱之為師而不名于是小人顧可學盛端明朱隆禧輩皆緣以進饒可學無錫人端明平人隆禧崑山人乙巳二十四年夏五月壬戌朔日食六月重建太廟成建殿九間仍復舊制同堂聚享位皆南向太祖居中左四序成宣憲睿右四序仁英孝武其後為祧廟以藏祧主秋八月張璧卒諡文簡九月召夏言復入閣帝微覺嚴嵩貪橫復召用言言至復盛氣陵嵩出其上凡所批答略不顧嵩嵩噤不敢吐一語所引用私人言多斥之亦不敢救銜刺骨而言以廢棄久務張權所譴逐亦不盡當御史陳其學以鹽法事劾崔元及錦衣都督陸炳言擬旨令陳狀皆造言請死炳行三千金求解不得長跪泣謝罪乃已二人與嵩比而搆言言不悟楚世子英耀弒其父顯榕伏誅英耀性淫惡蒸楚王宫人又使卒劉金納妓别館王欲罪金金遂勸英耀謀逆會元夕後張燈置酒饗王别宴武岡王顯槐顯榕弟于西室酒半金等從座後以銅瓜擊王腦立斃顯槐驚救被傷得免英耀徙王尸宫中以中風報王從者抉門出告變撫按官以聞帝命駙馬都尉塢景和崑山人尚孝宗女永福公主等往鞫得實及是詔逮入京告太廟磔于市焚尸揚灰逆黨悉伏誅冬十一月許讚罷讚求去帝責其忘君愛身落職間住讚歸三年卒尋復其官追諡文簡丙午二十五年春正月謫御史周冕資縣人為通海縣元置今屬雲南臨安府典史時太子生十一年尚未出閣講學冕極言豫教不可緩帝怒謫之三月四川白草番注見前亂遣何卿成都衛人充總兵官討平之卿初鎮松潘十七年威望素著會以北警召卿入衛至是番人亂復命卿往討卿至將士咸喜乃會巡撫張時徹字惟靜鄞人討擒賊渠俘斬千計克四十餘寨毁其碉房獲馬牛器械無算久之賊盡平在明年四月于是松潘威茂間行旅往來無剽奪患邊境安堵夏四月以兵部侍郎曾銑總督陜西三邊軍務是秋諳達以十萬騎西入延安慶陽銑率兵數千駐塞門名在延安府安塞縣北而遣前參將李珍陜西人坐事奪官銑復加録用搗巢于馬梁山在榆林府北後敵始退秋八月天鼓鳴冬十月故建昌侯張延齡棄市初延齡下獄後姦人劉東山發其手書有君道賞罰不明字延齡復加訕上罪長繫如故至是竟斬西市丁未二十六年夏四月諳達求貢拒之自龍大有誘執虜使後諳達連嵗犯邊不已及是奉印信番文詣邊陳欵總督侍郎翁萬達字仁夫揭陽人以聞時萬達方修築邊牆因再疏言自冬涉春虜使屢至其詞益恭似宜允許况今版築方興正當羈縻使無侵擾帝責其罔瀆不聽萬達在邊帝深倚任所奏無不聽納嘗議撤山西內關雁門寧武偏頭諸關兵併力守禦大同外邊巡撫孫繼魯字道甫雲南右衛人力陳不可帝納萬達言遂逮繼魯下獄死繼魯先知淮安府以忤中官被逮夏言救免繼魯不謝言怒及是言不為地遂死獄中獨議諳逹貢事與帝意左再被責讓蓋是時曾銑建言復套夏言主之故力絀貢議云銑案喜功名會寇居河套久為中國患上言賊據河套侵擾邊鄙今將百年出套則寇宣大三關以震幾服入套則寇延寧甘固以擾關中深山大川勢固在彼而不在我臣枕戈汗馬切齒痛心竊嘗計之秋髙馬肥弓徑矢利彼聚而攻我散而守則彼勝冬深水枯馬無宿藁春寒隂兩壤無燥土彼勢漸弱我乘其弊則中國勝臣請以鋭卒六萬益以山東鎗手二千每嵗春夏交携五十日餉水陸並進直搗其巢材官騶發炮火雷擊如是三舉則寇自不能支此一勞永逸之策也遂條八議以進帝壯其言命諸邊臣議之俱以為難而萬違九以橫挑強寇為非計帝方嚮銑議上不省秋七月河決曹縣水入城二尺漫金鄉魚臺定陶城武衝穀亭鎮名在魚臺縣東明時為漕運往來要地隆慶後運河東徙鎮遂廢河臣詹瀚請于趙皮寨在開封府蘭陽縣北一名張録口諸口穿支河以分水勢從之冬十一月大內火釋楊爵等于獄初爵既下獄工部員外郎劉魁給事中周怡字順之太平縣人並以言事同繫三人屢瀕死講誦不輟爵于獄中著周易辨説中庸解忘其困歷五年不釋久之有神降于乩帝感其言立出三人未踰月尚書熊浹疏言乩仙之妄帝怒命東厰追執爵等爵抵家甫十日校尉至與共麥畢即就道尉曰盡處置家事爵竟去不顧觀者泣下復同繫鎮撫獄桎梏加嚴飲食屢絶至是大髙元殿災帝禱于露臺空中若有所聞遂傳詔釋之爵居家二年卒隆慶初贈光祿卿諡忠介皇后方氏崩諡孝烈皇后戊申二十七年春正月夏言罷言素慷慨以經濟自許會曾銑議復河套欲倚以成大功因密薦銑謂羣臣無如銑忠者鳩兵繕塞輒破敵帝亦頗嚮之令言擬旨優奬者再銑喜益鋭志出師條上方略廷議一如銑言帝忽中變降旨詰責詞甚厲曰今逐賊河套師果有名否兵食果有餘成功可必否一銑何足言如生民荼毒何嚴嵩知帝意遂極言河套必不可復廷臣亦盡反前議如嵩説嵩乃力攻言謂向擬旨褒銑臣皆不與聞言始大懼謝罪且云嵩初未嘗異議今胡乃盡委于臣帝已入嵩譖怒不可解盡奪言官階令言致仕初言與嵩同直西苑帝數使小內豎詣言所言負氣岸奴視之其詣嵩嵩必延坐親納金錢袖中以故日譽嵩而短言進青詞取具而已往往失帝旨嵩聞愈精治其事由是嵩益被寵而言眷漸移及套議起嵩復從中隂詆之以激帝怒而言遂敗三月殺總督侍郎曾銑兵部侍郎萬鏓字平甫清陽人等劾銑罔上貪功擅開邊釁逮下獄出兵部尚書王以旗代之先是咸寧侯仇鸞鉞之子鎮甘肅以貪縱為銑所劾遂逮問嚴嵩雅親鸞至是代鸞獄中草奏誣夏言納銑金銑所善同邑蘇綱言繼妻父也銑建議復套時綱亟稱之言益信銑為可辦因力主其議及是嵩代鸞奏銑尅餉萬屬綱賂言交為姦利法司承帝旨坐銑交結近侍律斬西市妻子流二千里並逮言下吏出鸞于獄銑有膽略長于用兵性持廉既殁家無餘資隆慶初贈尚書諡襄愍夏五月葬孝烈皇后于永陵在昌平州陽翠嶺詔曰皇后比救朕危奉天濟難其以元后禮葬預名葬地曰永陵秋七月京師地震冬十月殺前華蓋殿大學士夏言言抵通州聞銑所坐大驚墮車曰噫吾死矣上疏訟寃言鸞方就逮上降諭不兩日鸞何以知蓋嚴嵩與崔元輩詐為鸞疏以傾臣嵩靜言庸違似共工謙恭下士似王莽姦巧弄權父子專政似司馬懿臣生死係嵩掌握惟聖慈曲賜保全帝不省獄成論死法司援議貴議能條以上帝怒切責之猶言及前不戴香冠事會譜達冦居庸嵩謂夏言等收河套故報復至此遂棄言市妻蘇氏流廣西從子主事克承從孫尚寶丞朝慶皆削籍言豪邁有俊才縱橫辨博人莫能屈初被特眷曰與議禮諸貴人抗及居政府與嵩共事嵩懷姦黷賄言獨能裁抑之以是天下多稱言者然自大用後日蹇傲寖為帝所厭裁決穖務頗專恣物議亦不悉協特因其為嵩誣陷以死人方惡嵩故子言益深惜之隆慶初復官諡文愍己酉二十八年春二月以張治字文邦茶陵川人為禮部尚書兼文淵閣大學士李本餘姚人為少詹事兼翰林院學士入內閣並預機務夏言得罪死嚴嵩遂獨相至是治本以疏逺入閣治自南京吏部召益不敢預可否默默而已諳達冦宣府大同總兵官周尚文擊敗之敵犯宣府滴水崖在宣化府赤城縣東南石崖滴水隆冬不凍崖之北有堡為戍守處把總江瀚指揮董暘戰死全軍覆遂犯永寧明縣永樂中置今省故城在宣化府延慶州束有都司駐此尚文力戰敗之斬其魁尚文清約愛士善用間知敵中曲折故戰輒有功嚴嵩父子以宿憾尚文初僉後府嵩子世蕃為府都事驕蹇不法將劾之嵩謝得免以故銜尚文刺骨謀傾陷之帝方藉以抗強敵故讒不得入未幾卒嵩格恤典不豫給事中沈束字宗安會稽人以為言嵩激帝怒錮之詔獄束繫獄十八年其妻張氏上書言臣夫家有老親年已八十有九襄病侵尋朝不計夕臣妾欲歸奉舅則夫之饘粥無資欲留養夫則舅又旦夕待盡展轉思維進退無䇿臣願代夫繫獄令夫得送父終年仍還赴繫實惟陛下莫大之德法司亦為請帝終不許帝深嫉言官以廷杖遣戍未足遏其言乃長繫以困之而日令獄卒奏其語言食息謂之監帖或無所得雖諧語亦以聞一日鵲噪于束前束謾語曰豈冇喜及罪人邪卒奏帝忽心動釋束還家其父已前死矣隆慶初起故官不赴卒于家周尚文追贈太傅諡武襄三月辛未朔日食皇太子載壑卒秋七月倭寇浙東初倭雖通貢而瀕海州縣數被侵掠倭自永樂末貢使不至宣德中命琉球國王轉諭之使復至倭性黠時載方物戎器出沒海濱得聞則張戎器而肆攻掠不得則陳方物而稱朝貢然利中國互市每貢所攜私物逾貢數十倍舊制于浙江設市舶提舉司駐寧波海舶至則平其直制馭之權在官及帝初年廢市舶不設市舶司舊以中官主之會倭使宋素卿宗設數輩至互事真偽素卿本中國人逃入倭太監賴納其金右之宗設怒遂相鬬殺大肆焚掠而去事聞詔逮素卿及恩并治遂撤市舶議者謂當罷者中官非市舶也然卒罷之濱海姦人遂闌出中國財物與倭交易居寧波之雙嶼為之主屢負倭直已而嚴通番之禁倭使互市往往留海濱不去內地諸姦多為之囊槖巡按御史髙行節請嚴禁姦豪交通得旨允遂移之貴官勢家負直愈甚倭糧匱不得返大怨恨姦民勾之遂煽為亂朝議設重臣巡撫浙江兼統福建沿海諸府以都御史朱紈字子純長洲人為之紈至嚴為申禁獲交通者不俟命輒以便宜斬之由是浙閩大姓素為倭內主者失利而怨紈又數騰疏于朝顯言大姓通倭狀閩浙人咸惡之而閩尤甚巡按御史周亮閩人也上疏詆紈請改巡撫為巡視以殺其權其黨在朝者左右之竟如其請御史陳九德復劾紈擅殺閩人黎光頭數為倭主已復引佛郎機行劫紈擒而戮之遂為九德所劾遣官按問罷紈職紈仰藥死自是海禁復弛亂益滋甚時海上承平日久民不知兵聞倭至寢走一空終帝之世迄無寧嵗九月朵顔三衛犯遼東庚戌二十九年秋八月諳達犯京師先是夏六月諳達犯大同總兵官張達副總兵林椿戰死敵引去傳箭諸部大舉至是循潮河川南下至古北口都御史王汝孝率薊鎮兵禦之敵陽引滿內嚮而别遣精騎自間道潰牆入汝孝兵潰遂大掠懷柔圍順義長驅至通州營白河東時巡按御史王忬奏言潮河川有徑道一日夜可扺通州因疾馳至通為守禦計盡撤舟楫之在東岸者夜半寇果大至阻白河不得渡王忬字應民太倉人分兵剽昌平犯諸陵殺剠不可勝記京師戒嚴詔各鎮勤王分遣文武大臣各九人守京城九門急集諸營兵僅四五萬老弱半之是時禁軍册籍皆虛數又半役內外提督大臣家不歸伍歸伍者亦涕泣不敢前從武庫索甲仗主庫人勒常例不時發久之不能軍詔城中居民及四方入應武舉者悉登陴守命都御史商大節字孟堅鍾祥人率五城御史統之發帑金五千兩令便宜募壯士時寇已自通州渡河而西前鋒七百騎駐安定門外教場遂薄都城會大同總兵官仇鸞巡撫保定都御史楊守謙字允亨徐州人各以兵至帝拜鸞大將軍節制諸路兵馬守謙為兵部侍郎提督軍務時勤王兵先後五六萬人皆聞變即赴未齎糗糧制下犒師牛酒諸費皆不知所出戶部文移往復越二三日軍士始得數餅餌益飢疾不任戰帝久不視朝軍事無由面白廷臣多以為言不許禮部尚書徐階復固請乃許之羣臣昧爽入至日晡帝始御奉天殿不發一詞但命階奉敕諭切責百官而趣諸將戰甚急兵部尚書丁汝夔字大章霑化人以咨嚴嵩嵩曰塞上敗可掩也失利輦下上無不知誰執其咎寇飽自揚去耳汝夔因不敢主戰且承嵩意戒諸將勿輕舉守謙以孤軍薄諳達營而陳無後繼亦不敢戰于是諸將皆堅壁不發一矢輒以汝夔及守謙為辭寇遂燬城外廬舍火光燭天亦莫能救城西北隅內臣圜宅在環泣帝前曰將帥為文臣制故寇得至此帝怒守謙益甚寇縱橫內地凡八日本無意攻城且所剠已過望乃整輜重將趣白羊口在昌平州西有城亦曰白揚而去仇鸞尾之冦猝東返鸞兵潰死傷千餘人寇遂徐由古北口出塞諸將收斬遺尸得八十餘級以捷聞帝優詔慰鸞加太保賜金幣汝夔守謙棄市帝將大行誅以懲後汝夔窘求救于嵩嵩曰我在必不令公死及見帝帝怒甚竟不敢言汝夔臨死始知為嵩所賣守謙性遲重客有勸之戰者應曰周亞夫何人乎客曰公誤矣今日何得比漢法守謙不納竟得罪方寇薄通州時詔副都御史王儀以兵二千往守巡按王忬奏其虐大同軍大同軍者仇鸞兵也及冦退帝立命逮儀斥為民而擢忬僉都御史代之王儀字克敬文安人謫諭德趙貞吉字孟靜內江人為荔波典史方諳達薄都城以謾書求貢詔百官集議貞吉奮袖大言曰城下之盟春秋恥之既許貢則必入城倘要索無已奈何徐階曰君必有良䇿貞吉請追録周尚文功以勵邊帥出沈束于獄以開言路輕損軍之令重賞功之格遣官諭諸將力戰退敵時帝遣中使瞷廷臣日中莫發一語獨聞貞吉言心壯之召入左順門令手疏便宜立擢諭德兼監察御史奉敕宣諭諸軍給白金五萬兩聽隨宜勞賞嚴嵩心惡之先是貞吉廷議罷盛氣謁嵩嵩辭不見貞吉怒叱門者適趙文華至謂貞吉曰公休矣天下事當徐議之貞吉厲聲曰汝輩安知天下事嵩聞之大恨趙文華慈溪人會撰敕不令督戰以輕其權且不豫一卒護行時寇騎充斥貞吉馳入諸將營散金犒士宣諭德意明日即復命帝怒謂貞吉漫無區畫徒為周尚文沈束遊説下獄廷杖謫荔波典史九月以仇鸞總督京營戎政吏部侍郎王邦瑞字惟賢宜陽人攝兵部事以營政久弛上疏論之略曰國初京營徑旅不減七八十萬自三大營變為十二團營又變為兩官廳寖不如初然額軍常三十八萬有竒今武備積弛見籍至十四萬而操練者不過五六萬比寇騎深入戰守俱困此其弊不在逃亡而在占役不在軍士而在將領蓋提督以下諸官多世胄紈袴平時占役營軍以空名支餉臨操則集市人呼舞博笑而已乞遣官精核帝是其言于是悉罷團營兩官廳復三大營舊制設戎政府以仇鸞統之邦瑞協理鸞方貴幸請選各邊兵更番入衛分𨽻京營塞上有警主將不得徵集由是邊事益壞鸞欲節制邊將罷築蘇鎮邊垣邦瑞皆以為不可鸞大憾遂肆讒搆會邦瑞陳安攘大計被旨落職鸞死踰十年始復官廢鄭王厚烷懿王祐檡子為庶人帝修齋醮諸王爭遣使進香厚烷獨上居敬窮理克己存誠四針演連珠十章以神仙土木為戒帝怒下其使者于獄已而故盟津王見濍祐檡之叔子祐橏訐厚烷謀不軌初見濍以罪革為庶人至是祐橏求復郡王爵怨厚炕不為奏遂承帝怒厚烷四十罪以叛逆告遣官往訊無左驗帝下詔數厚烷驕慢無禮廢為庶人幽之鳯陽厚烷世子載堉篤學有至性痛父非罪見繫築土宫室門外席藁獨處者十九年隆慶初厚烷復爵載堉始入宫削刑部郎中徐學詩字以言上虞人籍先是諳達既退詔廷臣陳制敵之䇿諸臣多掇細事以應學詩憤然曰大姦柄國亂之本也亂本不除能攘外患哉即疏劾嚴嵩略曰外攘之備在于內治內治之要在于端本今大學士嵩輔政十載姦貪日甚內結勳貴外比羣小文武遷除悉要厚賄致此輩掊克軍民釀成寇患國事至此猶敢謬引佳兵不祥之説以謾清問近因都城有警密輸財賄南還人車數十乘樓船十餘艘水陸載道駭人耳目舉朝莫不歎憤而無一人敢言之者誠以內外盤結上下比周積久勢成而其子世蕃又凶狡成性擅執父權凡諸司章奏必先關白然後上聞掩罪飾非乘機搆隙故凡論之者雖不能顯禍之于正言直指之時莫不假事因人隂禍之于遷除考察之際天下痛心視為鬼蜮伏願陛下罷嵩父子别簡忠良則內治既清外患自寧矣帝覽疏頗感動方士陶仲文密言嵩孤立盡忠學詩特為所私修隙耳帝于是發怒下學詩詔獄削其籍先劾嵩者葉經謝瑜陳紹興學詩皆同里時稱上虞四諫又都給事中厲汝進劾世蕃竊弄父權嗜賄張焰嵩上疏自理且求援中官以激帝怒帝杖汝進謫典史明年嵩假考察奪其職灤厲汝進字子修州人冬十月張治卒諡文隱十一月祧仁宗祔孝烈皇后于太廟初睿宗入廟帝恐後世議祧遂欲當已世預祧仁宗以孝烈祔廟自為一世下禮部議尚書徐階抗言女后無先入廟者帝大怒階煌恐不敢守前議遂祧仁宗升祔孝烈皇后辛亥三十年春正月戍錦衣衛經歷沈鍊字純甫會稽人于邊初趙貞吉請勿許諳達求貢廷臣無敢是貞吉者鍊獨大言以為是吏部尚書夏邦謨目之曰若何官鍊曰錦衣經歷沈鍊也大臣不言故小吏言之鍊憤國無人致寇猖獗請以萬騎護陵寢萬騎護通州軍儲合勤王師十餘萬擊其惰歸可大得志帝不省時嚴嵩用事邊臣爭致賄遺及失事懼罪益輦金賄嵩鍊時時扼腕一日從尚寶丞張遜業飲酒半及嵩因慷慨詈罵流涕交頤遂疏劾嵩黷賄十罪併及邦謨諂諛狀請均斥罷帝怒搒之數十謫佃保安鍊既被謫中外懾嵩威益箝口南京御史王宗茂拜官甫三月即劾嵩負國十罪疏至通政司趙文華密以示嵩留數日始上由是嵩得預為地遂以宗茂誣詆大臣謫平陽縣丞王宗茂字時育京山人平陽五季吳越縣今屬浙江溫州府三月開馬市于大同宣府仇鸞駑怯畏寇密遣人持貨幣結諳達義子托克托使貢馬互市諳達許之投書于宣大總督蘇祐祐以聞鸞與嚴嵩定議每嵗春秋兩市命侍郎史道涿州人領其事兵部車駕司員外郎楊繼盛字仲芳容城人以讐恥未雪示弱辱國乃奏言十不可五謬略曰互市者和親别名也諳達蹂躪我陵寢虔劉我赤子大讐也而先之和不可一下詔北伐日夜征繕兵食忽更之曰和失信天下不可二堂堂中國與之互市不可三海內豪傑爭磨礪待試一旦委曲無用異時號召誰復興起不可四使邊鎮將帥懈弛兵事不可五邊卒私通境外例率裁禁今乃導之與通不可六盜賊伏恭徒㒤國威今知畏怯睥睨之漸必開不可七諳達往嵗深入乘我無備故也備之一嵗以互市終彼謂國冇人乎不可八或諳達負約不至至矣或隂謀伏兵哭入或今日市明日復寇或以下馬索上直不可九嵗帛數十萬得馬數萬匹十年以後帛將不紀不可十議者曰吾外為市以羈縻之而內修我甲兵此一謬也夫寇欲無厭其以釁終明甚苟內修武偹安事羈縻曰吾因市以益吾馬此二謬也夫和而不戰馬將焉用且彼寧肯與我善馬哉曰市不已彼且入貢此三謬也夫貢之賞不訾是名美而實大損也曰諳違利我市必無失信此四謬也吾之市能盡給其衆乎能信不給者之無入掠也曰佳兵不祥此五謬也敵加已而應之何佳也人身四支皆癰疽毒日內攻而憚藥石可乎此蓋必有為陛下主其事者故公卿大夫知而莫為一言宜奮獨斷悉按諸言互市者疏入帝頗心動下鸞等會議鸞攘臂詈曰豎子目不睹寇宜其易之諸大臣遂言遣官已行勢難中止帝尚猶豫鸞復進密疏乃下繼盛詔獄貶狄道典史秋九月京師地震壬子三十一年春三月置內府營置于內教場以練諸內使以禮部尚書徐階兼東閣大學士預機務初階由夏言薦嚴嵩忌之階恐被中傷乃精治齋詞迎帝意左右亦多為地者遂入閣秋七月以王忬巡撫浙江備倭自朱紈死浙江不設巡撫者四年中外不敢復言海禁事姦民汪直徐海陳東麻葉輩悉逸海島為主謀倭悉聽其指揮遂誘之入寇而海中巨盜皆襲倭服飾旗號分艘掠內地無不大利由倭患日劇廷議復設巡撫以王忬任之然賊已蔓延不可撲滅初沿海要地建衛所設戰船董以都司等官控制周密逮承平久船敝伍虛及遇警乃募漁船以資哨守兵非素鍊船非專業見冦舶至輒望風逃匿以故賊帆所指無不殘破明年春直勾諸倭大舉入寇連艦數百蔽海而至浙東西江南北濱海數千里同時告警破昌國衛明置今裁故城在浙江寧波府象山縣西南陷上海城元縣今屬江南松江府流劫乍浦鎮名在浙江嘉興府平湖縣東南海口要地今有副都統駐此金山明衛今為縣屬松江府太倉崇明常熟注俱見前嘉定宗縣今在大倉州又明年掠蘇州松江復趨江北薄通泰尋陷嘉善明縣宣德中置今屬嘉興府崇明入崇德縣五季吳越置今改名石門屬嘉興府掠嘉興還屯柘林鎮名在松江府華亭縣東南有城縱橫往來忬不能禦乃移忬巡撫大同以李天寵孟津人代之八月仇鸞死詔戮其尸馬市既開諸邊日苦侵暴帝命鸞逐冦大同鸞不得已出鎮川堡遇伏敗還至是病疽猶戀大將軍印不肯上徐階密疏發鸞罪兵部尚書趙錦亦言強寇壓境而鸞病不能軍萬一寇衆長驅貽憂君父不小帝命罷鸞以侍郎蔣應奎暫掌戎政鸞大恚恨疽益劇始死始鸞與嵩約為父子已而相惡嵩密疏毁鸞鸞亦陳嵩世蕃貪橫狀帝少疏嵩嵩當直入不召者數矣嵩見徐階李本入西內即與俱入至西華門門者以非詔旨格之嵩還第父子對泣嵩因結錦衣都督陸炳共圖鸞鸞既死炳盡發其通虜納賄狀帝大怒下詔暴鸞罪追戮之傳首九邊九月河決徐州運道淤阻五十里總河都御史曽均字廷和進賢人請濬劉伶臺在淮安府山陽縣東北臨淮至赤宴廟在安東縣八十里築草灣在山陽縣西北老黃河口增髙家長堤在山陽縣西南洪澤湖東後漢陳登建明陳瑄重築繕新莊等舊閘新莊閘在清河縣惠濟祠東明初建後廢從之罷馬市諳達以羸馬索厚值弗豫輒大譁大同市則冦宣府宣府市則寇大同甚者朝市暮寇併羸馬掠去帝惡之詔罷馬市冬十月築京師外城以寇警故築外城一十五里閲九月訖工十二月殺光祿寺少卿馬從謙字益之漂陽人中官杜泰提督光祿寺乾沒內帑數萬從謙奏發其罪並及宫中齋醮事命下詔獄杖殺之癸丑三十二年春正月戊寅朔日食隂雲不見兵部員外郎楊繼盛上疏劾嚴嵩下詔獄帝既誅仇鸞罷馬市乃思繼盛言自典史四遷為兵部員外郎時嚴嵩方用事恨鸞初凌已善繼盛首攻鸞欲驟貴之復改兵部武選司而繼盛惡嵩甚于鸞且念起謫籍思所以報國抵任甫一月即草疏劾嵩十大罪五姦略曰祖宗罷丞相設閣臣備顧問視制草而已嵩乃儼然以丞相自居百官奔走請命直房如市無丞相名而冇丞相權是壞祖宗之成法大罪一陛下用一人嵩曰我薦也斤一人曰此非我所親陛下宥一人嵩曰我救也罰一人曰此得罪于我伺陛下喜怒以恣威福是竊君上之大權大罪二陛下有善政嵩必令子世蕃告人主上不及此我議而成之欲天下以陛下之善盡歸于已是掩君之治功大罪三陛下令嵩票擬蓋其職也嵩何取而令世蕃代之題疏方上天語已傳故京師有大丞相小丞相之謡是縱姦子之僭竊大罪四嚴效忠嚴鵠乳臭子耳未嘗一涉伍行皆以軍功官錦衣兩廣將帥俱以私黨躐府部是冒朝廷之軍功大罪五逆鸞下獄賄世蕃三十金嵩即薦為大將已知陛下疑鸞乃互相排詆以泯前迹是引悖逆之姦臣大罪六諳達深入擊其惰歸大機也嵩戒丁汝夔勿戰是誤國家之軍機大罪七郎中徐學詩給事厲汝進俱以劾嵩削籍內外之臣中傷者何可勝計是専黜陟之大柄大罪八文武遷擢但論金之多寡將辨惟賄嵩不得不朘削士卒有司惟賄嵩不得不掊克百姓毒流海內患起域中是失天下之人心大罪九自嵩用事風俗大變賄賂者薦及盜跖疏拙者黜逮夷齊守法度者為迂滯巧彌縫者為才能是敝天下風俗大罪十嵩冇十罪而又濟以五姦以左右侍從之能察意旨也厚賄結納得備聞宫中言動是陛下之左右皆賊嵩之間諜以通政司之主出納也以趙文華為使凡有疏至必先送嵩閲竟然後入御是陛下之喉舌乃賊嵩之鷹犬畏厰衛之緝訪也即令子世蕃結為婚姻是陛下之爪牙皆賊嵩之瓜葛畏科道之多言也非其私屬不得與臺諫有所愛憎即授之論刺是陛下之耳目皆賊嵩之奴𨽻懼部寺之猶有人也擇有才望者羅致門下連絡盤結深根固蒂是陛下之臣工皆賊嵩之心膂陛下奈何愛一賊臣而使百萬蒼生陷于塗岸哉願陛下聽臣之言察嵩之姦或召問景裕二王或詢諸閣臣重則置之憲典以正國法輕則諭令致仕以全國體嚴效忠嚴鵠俱世蕃子疏入帝已怒嵩見召問二王語喜謂可指此為罪密搆于帝帝益大怒下繼盛詔獄詰何故引二王繼盛曰非二王誰不懾嵩者獄上杖之百移刑部定罪繼盛將杖或遺之蚺蛇膽却之曰椒山自有膽何蚺蛇為椒山繼盛别號也及入獄創甚夜半而蘇碎瓷碗手割腐肉肉盡筋挂膜手截去獄卒執燈顫欲墜繼盛意氣自若侍郎王學益安福人嵩黨也欲坐繼盛詐傳親王令旨絞郎中史朝賓晉冮人持之嵩謫之外于是尚書何鰲山隂人竟如嵩指成獄繼盛既得罪帝方蓄怒以待言者兵部郎中周冕申論嚴效忠冒功事力陳其誣妄遂下詔獄雲南清軍御史趙錦以元旦日食為權姦亂政之應馳疏請罷嵩以謝天變帝手批責錦誣天謗君遣官逺至京下獄拷訊斥為民部趙錦字元朴餘姚人時有兩趙錦一為兵尚書一即此秋七月諳達大舉入寇初叛人趙全邱富等以罪亡入敵數誘入寇且教之益習攻戰事諳達信用之全富等先興其黨蕭芹同入敵芹詭言能喝城使墮敵貢市時欲毁邊垣試其術不驗遂縳以獻而全富等竟匿不出乃招集亡命居豐州築城自衛墾水田搆宫殿號曰拜甡諳達每入寇必置酒全所間計豐州城即今歸化城拜甡舊作板升今改其春兩犯宣府至是大舉深入下渾源靈邱廣昌急攻插箭浮圖等峪插箭峪在廣昌縣東南浮圖峪在廣昌縣東路出紫荆關遊擊陳鳯朱玉力戰却之敵分兵東犯蔚西掠代繁畤已駐鄜延二十日屠掠延慶諸城幾遍會久雨乃去未幾復寇大同巡撫趙時春字景仁平涼人禦之遇伏敗績總兵官李淶戰死全軍皆沒既而復犯宣大在明年春攻薊鎮牆百道並進警報日數十至京師戒嚴薊遼總督楊博字惟約蒲州人悉力拒守募死士夜斫共營敵驚擾乃遁柘城隋縣今屬河南歸德府盜師尚詔作亂官軍討平之尚詔本鹽徒以私販作姦剽掠逺近官府不能制巡撫謝存儒蒲州人苟幸無事假以總保長令總諸鎮民捕盜尚詔肆為威虐守臣欲誅之遂反結劇盜數千薄歸德城其黨啓門納之乃劫獄因掠帑藏去官軍分道擊賊遇之鄢陵注前見與戰敗績已追獲于山東莘縣注亦見前詔即所在斬之賊起數十餘日破府一州二縣八屠戮十餘萬人三省皆震甲寅三十三年春正月朔杖六科給事中于廷以科臣賀表違制盡豫杖夏五月命張經總督軍務討倭經為南京兵部尚書朝議以倭寇猖獗議設總督大臣命經不解部務督江南北浙江山東福建湖廣諸軍便宜行事既而用兵科言改經右都御史兼兵部侍郎専辦討賊時倭二萬餘據柘林川沙窪在松江府上海縣東南有城為沿海巨鎮抄掠四出經至選將錬兵為搗巢計以江浙山東兵屢敗乃大徵兩廣狼土兵協力進勦秋七月詔勳戚大臣入直西內帝崇道益篤特命駙馬都尉塢景和安平伯方承裕鋭之子尚書本默字時言甌寧人王用賓字元興咸寧人左都督陸炳入直西內侍郎程文德字舜敷永康人閔如霖字師望烏程人郭朴字質夫安陽人吳山字曰靜髙安人供撰青詞景和以不諳元理辭帝不悅罷其入直已而賚在直諸臣景和與焉景和辭免且言臣願洗心滌慮效馬革裹尸之報帝怒其怨訕黜為民乙卯三十四年春二月遣趙文華督視海防文華諂事嚴嵩結為父子自通政使進工部侍郎東南倭患棘文華言七事首請遣官望祭海神帝用嵩言即命文華往兼督察軍情文華恃寵恣睢百司震懾公私財賂填集江南為之困敝又牽制兵機顛倒功罪雖徵兵半天下而倭勢愈熾夏五月張經敗倭于王江涇在嘉興府秀水縣北一名聞川宋聞人氏家焉今有鎮為南北要銜詔逮經下獄趙文華頤指大吏經以位在其上獨輕之文華不悅與巡按御史胡宗憲字汝貞績溪人比屢趣經進兵時諸路狼兵已集惟永順保靖兵未至經欲待其至而後戰文華再三言經守便宜且慮文華輕淺泄師期竟不以告文華怒疏劾經養寇失機疏方上而永保兵已至經大破倭于王江涇斬一千九百餘級焚溺死者無算為軍興戰功第一文華攘之以奏謂已與宗憲督師所致帝問嚴嵩嵩對如文華指且言狼兵初至經不許戰及文華宗憲致捷遂冒以為功帝深入其言即下詔逮經經至疏言臣任總督半載前後俘斬五千乞賜原宥不納遂與巡撫李天寵以文華謗除名復為宗憲所劾被逮俱論死繫獄舉朝知其寃莫敢奏冬十月殺張經李天寵遂及兵部員外郎楊繼盛繼盛繫獄三載帝猶無意殺之每朝審時觀者塞見繼盛囊三木輒憤歎日奈何不以囊嵩而以若或至泣下已而有為營救于嵩者其黨胡植南昌人鄢懋卿豐城人怵之曰公不覩養虎者邪將自貽患嵩頷之會張經李天寵坐大辟嵩揣帝意必殺二人比秋審因附繼盛名並奏得報繼盛妻張氏伏闕上書請代夫死其辭曰臣夫繼盛誤聞市井之言尚狃書生之見遂發狂論聖明不即加戮俾從吏議兩經奏請並荷寬恩今忽聞入張經疏尾奉旨處決臣仰惟聖德毗蟲草本皆欲得所豈惜一回宸顧下逮覆盆倘以罪重必不可赦願即斬臣妾首以代夫誅夫雖逺禦魑魅必能為疆場效死以報君父嵩屏不奏繼盛遂與經天寵並棄西市繼盛臨刑賦詩曰浩氣還太虛丹心照千古平生未報恩留作忠魂補天下涕泣傳誦之隆慶初恤直諫諸臣以繼盛為首贈大常卿諡忠愍張經亦復官諡襄愍十一月壬辰朔日食十二月山西陜西河南地震聲如雷雞犬鳴吠陜西渭南華州朝邑三原及山西蒲州諸處尤甚或地裂泉湧中有魚物或城郭廬舍陷入地中或平地突成山阜河渭溢華嶽終南山鳴官吏軍民死者八十三萬有竒丙辰三十五年春二月趙文華還京以胡宗憲總督軍務討倭初張經被逮易以周珫應城人未幾又以楊宜衡水人代之張經深得狼土兵心既逮皆憤無鬬志楊宜節制不行而趙文華威出宜上宜惟曲意奉之而已時倭聚柘林其黨自紹興竄轉掠杭嚴徽寧國太平直犯南京出秣陵關在江寧縣南今有鎮劫溧陽宜興抵無錫趨滸墅關名在長洲縣西北吳地記本名虎疁唐諱虎錢氏諱疁遂改名滸墅轉鬪數千里殺傷四千人歷八十餘日始為應天巡撫曹邦輔字子忠定陶人所殱文華欲分其功而邦輔捷書已奏文華恨之乃大集浙直兵與宗憲親將之搗倭於松江之陶宅在奉縣縣西北進營瓦橋倭悉鋭來衝大敗文華氣奪乃定計招撫會川兵破賊周浦在奉賢縣東南總兵俞大猷字志輔晉江人破賊海洋文華遂言水陸成功江南清宴請還朝許之比至言餘倭無幾盛毁楊宜而薦宗憲遂奪宜職謫戌邦輔而推宗憲為兵部侍郎督諸軍討倭三月以趙文華為工部尚書文華歸後東南敗報踵至帝疑文華妄數詰嚴嵩嵩曲為解帝終不釋文華稔帝好告訐會吏部尚書李默發䇿試選人中言漢武征西夷而海內虛耗唐宗攻淮蔡而晚業不終文華劾共誹謗默坐死帝以是為文華忠進尚書加太子太保夏五月復遣趙文華視師倭警遝至部議再遣大臣督師已命兵部侍郎沈良才泰州人矣嵩令文華自請行且言江南人矯首望文華帝信之命兼右副都御史提督軍務文華再出胡宗憲欲藉以通嵩諂奉無不至文帝素不知兵亦倚宗憲兩人交甚固已宗憲俘陳東平徐海宗憲遣指揮夏正等要海降且曰陳東已有約所慮獨公耳海因疑東而東知海營有宗憲使者亦大驚由是有隙宗憲因諭海縛陳東麻葉許以世爵海果縛葉以獻宗憲解其縛令以書致東圗海而隂泄其書于海海怒海妾受宗憲賂亦説海于是海復行計縛東來獻刻日請降忽率百餘人先期猝至文華恐欲弗許宗憲強之海叩首伏罪宗憲慰之海自擇沈莊屯其衆沈莊者東西各一以河為塹宗憲居海東莊以西莊處東黨令東致書其黨曰督府檄海夕禽若屬矣東黨恐乘夜攻海海走間道官軍追之投水死文華以大捷聞歸功上元帝大喜加文華少保宗憲右都御史秋九月徽王載埨有罪廢為庶人自殺初載埨父厚爝善方士陶仲文仲文奏其忠敬奉道帝喜封為真人豫金印及載埨嗣益以奉道媚帝命綰其父真人印南陽人梁高輔者自言能導引服食載埨用其術和藥命高輔因仲文以進髙輔被上寵不復親載埨載埨銜之已而髙輔為帝取藥不得求載埨舊所蓄者載埨不與而與仲文高輔大恨乘間言載埨過失載埨壞民屋作臺榭苑囿庫官王章諫杖死之嘗微服至揚州鳯陽為邏者所獲羈留三月走歸帝疑之奪真人印仲文知釁已成不敢言會有民耿安告載埨奪其女下按治有司因發其諸不法事詔廢為庶人錮髙牆載埨自縊死妻妻皆從之冬十月丙戌朔日食三十六年夏四月奉天華蓋謹身三殿災帝下詔引咎修齋五日止諸司封事秋九月趙文華有罪免其子懌思戌邉三殿既災帝急欲建正陽門樓文華猝不能辦帝不懌且聞其視師江南黷貨要功狀思逐之嚴嵩言文華因觸暑南征疾尚未愈隨令上章稱疾帝手批令回籍休養制下舉朝稱賀嵩獨不懌者纍日帝以文華逐逐未盡其罪而言官無攻之者帝怒無所泄會其子錦衣千戶懌思以齋祀停封章日請假送父帝大怒黜文華為民戍懌思邉衛文華故病蠱及譴譴卧舟中意悒悒不自聊一夕手捫其腹腹裂臟腑出遂死殺前錦衣衛經歷沈鍊鍊既至保安末有館賈人某詢知其得罪故空家舍授之里長老亦日致薪米遣子弟學鍊語以忠義大節皆大喜塞外人素戅直又稔知嚴嵩惡爭罵嵩以快鍊且縛草為人象李林甫秦檜及嚴嵩醉則聚子弟射之或踔騎居庸關口南向戟手詈嵩痛哭而歸語稍稍聞京師嵩大恨其黨路楷汶上人巡按宣府世蕃屬與總督楊順德州人合圖之兩人日夜謀中錬會蔚州獲妖人閻浩詞所連甚衆順喜謂楷曰是足以報嚴公子矣竄錬其中上之遂斬于宣府市戍子襄極邊豫順一子錦衣千户楷待銓五品卿寺順曰嚴公薄我賞意豈未愜乎併取錬子衮褒杖殺之冬十一月諳達豫錫林阿舊作辛愛今改後仿此圍大同右衛錫林阿有妾曰托斯齊舊作桃松寨今改正曰托斯齊也私部目懼罪來降楊順詡為竒功致之京師錫林阿來索不得寇應朔二州毁七十餘堡縱掠大同圍右衛數匝順懼乃詭言敵欲以叛人趙全等來易托斯齊兵部尚書許論字廷議進少子以為便乃紿托斯齊逸出塞紿之西走隂告錫林阿錫林阿執而戮之狎知順為無能圍右衛益急更分犯宣薊西鄙西鄙震動嚴嵩論計欲棄右衛帝不聽詔諸臣發兵措餉而以兵部侍郎江東山東朝城人代順時故將尚表以餉餽入圍城悉力捍禦時出兵突戰獲諳達孫及壻與其部將各一人會江東及巡撫楊選字以公章邱人總兵張承勳等各嚴兵進圍乃解胡宗憲誘降海盜汪直誅之直據海島挾倭為雄朝廷懸賞購之迄不能致既而內地有備倭亦多被勦戮有全島無一人歸者往往怨直直不自安宗憲與直同鄉里欲招致之釋直母妻於獄館之杭州資給甚厚遣寧波諸生蔣洲齎其家書往招之直知家屬既無恙頗心動及是遂率夷目數十人來貢市泊舟山在寧波府定海縣治東明設千户所于此今改名定海山之岑港在定海縣西北舊為戍守要地將吏以為入寇陳兵備直遣其養子王滶入見宗憲曰我以好來何故陳兵相侍宗憲解諭百方直終不信要一貴官為質宗憲立遣指揮夏正往直疑解乃來謁宗憲慰之甚至令謁巡按御史王本固邢州人於杭州本固下直於獄以聞宗憲疏請曲貸直以繫番人心本固爭之強遂斬直其黨太恨支解夏正焚舟登山阻岑港而守已移之柯梅嶺名在定海縣海中過此即為外洋造新舟以遁宗愈利其去不追賊遂揚帆而南流刀閩廣戊午三十七年春三月總督宣大侍郎楊順以罪逮下獄方錫林阿之圍大同也殺掠吏民無算楊順大恐懼路楷奏之賄以七千金楷悉為掩覆及是給事中吳時來字惟修仙居人抗章劾順罪且發楷受金狀帝方怒順召冦立命逮順及楷下獄嚴嵩不能救乃言楷受金當勘而令其黨給事中鄭茂還因事為順辨復言楷受金無左驗順楷俱薄譴于是時來即劾嵩朋姦罔上會主事張翀字子儀栁州人董傳策字原臣松冮華亭人亦于是日劾嵩翀與時來皆徐階門生傳策則階邑子時來先又官松江嵩疑階主使乃密奏三人同日搆陷必有人主之帝下三人詔獄鞫訊久之無所得三人皆譴戌然自是帝亦稍厭嵩矣秋八月寇圍甘州濟農舊作吉能即前濟農子按濟農係蒙古王號故父子並襲其稱舊分作吉囊吉能音譯岐誤今俱改正犯永昌涼州進圍甘州十四日始退冬十月禮部進瑞芝先是帝于祕殿扶乩言服芝可延年乃詔有司採芝五嶽及諸名山至是禮部進一千八百六十本詔廣求徑尺以上者宛平民獻芝五本賚銀幣于是四方來獻者接踵皆積苑中內侍竊出市人復進之以邀賞凡得芝萬本聚為一山號萬歲芝山己未三十八年春二月錫林阿寇灤河錫林阿與婁巴圖爾舊作老把都今改諸部謀大舉入犯屯會州注見前聲言東下薊遼總督王忬不能察遽引兵而東號令數易虜乘間入潘家口渡灤河而西大掠遵化遷安薊州玊田駐內地五日京師大震御史王漸方輅交章劾忬遂逮忬下詔獄論死初帝器忬才甚眷之所建請無不從及為總督邉將數以敗聞漸失寵嚴嵩嘗不悅忬而忬子世貞復以口語為嵩子世蕃所憾楊繼盛之死世貞又經紀其喪嵩父子益大恨灤河變聞遂得行其計隆慶初世貞伏闕訟寃復忬官子恤夏五月巡撫都御史李遂字邦良豐城人平江非倭倭數百艘寇海門五季周縣注見前遂令副使劉景韶湖廣崇陽人遊擊邱升扼如臯而身馳泰州當共衝賊知如臯有備將犯泰州遂急檄景韶升遏賊連戰皆捷先是遂語諸將曰賊若由泰州出鳯泗則陵寢驚若由黃橋鎮名在通州泰興縣北逼瓜儀則運道梗若沿海而至廟灣在淮安府山陽縣東北射陽湖會諸水由此入海有城今設同知駐此則絶地也及是賊果沿海東剠遂喜曰賊無能為矣令景韶尾其後而致之廟灣復慮賊突淮安乃夜半馳入城賊尋至遂督恭將曹克新等禦之姚家蕩在淮安府鹽城縣西北為濱海重地會通政唐順之時奉命視師江浙副總兵劉顯南昌人來援賊大敗走保廟灣景韶亦敗賊印莊鎮名在泰興縣東廟灣賊據險不出攻之月餘不克順之顯馳救三沙注見前遂令景韶填塹夷木壓壘而陳以火焚其舟賊乘夜雨潛遁追奔至蝦子港方輿紀要姚家蕩東南有蛤蜊蝦子等港為賊窺伺徑道江北倭悉平帝璽書奬遂遷南京兵部侍郎以順之代為巡撫順之尋卒順之初舉進士第一改庶吉士尋調主事遂引疾歸讀書陽羡山中凡天文樂律地理兵法弧矢勾股壬竒禽乙莫不究極原委會趙文華視師特疏薦順之順之商出處于羅洪先洪先曰向已𨽻名仕籍此身非我有安得作處士順之遂出然聞望頗由此損秋七月南京地震庚申三十九年春二月南京兵亂殺總督糧儲侍郎黃懋官莆田人先是南京設振武營募健兒禦倭素驕悍懋官稍裁抑之舊制南軍有妻者月糧米一石無者減其四春秋二仲米石折銀五錢馬坤掌南户部奏減折色之一懋官又奏革募補者妻糧諸軍以嵗飢求復折色故額懋官不可給餉又復逾期馬坤字順卿南通州人諸軍大怒遂以都肄日殺懋官裸尸于市守備太監何綬等遣使持黃紙許給賞萬金卒輒碎之許犒十萬金乃稍定侍郎李遂託病閉閣給免死劵以慰安之而密捕首惡二十五人繫獄事聞追褫懋官官止誅叛卒三人而三人已前死兵自此益驕三月以鄢懋卿總理鹽政舊制無一人總理四運司者至是懋卿以嚴嵩力總理兩浙兩淮長蘆河東鹽政驟增鹽課四十餘萬所至市權納賄勢焰薰灼其按部常與妻偕行製五綵輿令十二女子舁之道路傾駭淳安知縣海瑞字汝賢瓊山供帳簡薄抗言貧邑不能容軒車慈溪知縣霍與瑕韜之子亦清鯁不屈懋卿嗾巡鹽御史袁淳劾之俱削籍已嵩敗懋卿以賊戍邊秋七月大同總兵劉漢大同人襲諳達于豐州破之先是虜聚衆喜峯口規犯薊鎮漢乘虛搗其帳于灰河在寧武府西下流至馬邑縣入桑乾河至是漢復與參將王孟夏等分道出搗豐州擒斬百五十人焚拜牲略盡時邱富已隨虜帳他徙趙全亦遁免邊兵積弱已久寇易之駐近塞出沒無所忌及是再為漢所挫他鎮亦往往乘間出搗寇始懼漸移其帳八月胡宗憲獻白龜芝草自趙文華得罪宗憲失內援又見倭患方未已思自媚于上乃于一嵗中再獲白鹿以獻在三十七年帝喜天瑞頻降告謝元極寶殿及太廟百官稱賀晉宗憲秩兵部尚書兼節制巡撫及操江都御史如三邊故事至是復獻白龜二五色芝五帝益大悅賜名龜曰玊龜芝曰仙芝告謝如前賚宗憲加等宗憲性喜賔客東南學才士茅坤徐渭沈明臣輩皆招致幕府用是名日起其獻白鹿也令渭草表并他客草寄所善學士擇其尤者上之學士以渭表進帝稱善宗憲以是益重渭渭知兵好竒計宗憲擒徐海誘汪直皆預謀焉後宗憲敗渭佯狂自廢隂茅坤字順甫歸安人徐渭字文長山人沈明臣字嘉則鄞人御批厯代通鑑輯覽卷一百九

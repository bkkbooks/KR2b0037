  text: 欽定四庫全書御批歴代通鑑輯覽卷一百十一明神宗皇帝壬午萬厯十年春正月免天下逋賦
  hash: sha256:0f362f3e32d629d38b87dd76841f852a64d598e01920a06325d71c7411faf6a7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_110-1a, image: WYG0339/WYG0339-0537a.png}
body:
  text: 張居正上言帶徵逋賦徒為民累百姓財力有限一嵗之入傅足供一嵗不幸嵗歉目前尚不能辦豈復有餘力更完累嵗積逋乎有司避責往徃移新抵舊年分雜淆小民竭脂膏胥吏飽谿壑甚者不肖有司因而漁獵與其朘民以實奸貪之槖孰若盡蠲以施曠蕩之恩乞諭户部覈萬厯七年以前積負悉行蠲免帝從之凡免二百餘萬有竒而是時帑藏充盈國最完富三月杭州兵亂以兵部侍郎張佳允字肖甫銅梁人巡撫浙江討定之浙江巡撫吳善言成安人奉詔減月餉東西二營兵馬文英劉廷用等搆黨大噪縛毆善言朝議以佳允才令代之佳允初知滑縣劇盜髙章者詐為緹騎直入官署刧佳允索帑金佳允色不變偽書劵貸金悉署游徼名召入立檎賊由此知名累遷宣大廵撫潘五大掠塞外佳允用計服之張居正以為才故令代善言佳允甫入境而杭民以行保甲故亦亂佳允問告者曰亂兵與亂民合乎曰未也佳允喜曰速驅之尚可離而二也既至民剽益甚佳允從數卒佯問民所苦下令除之衆愈張熾夜掠富室火光燭天佳允召遊擊徐景星諭二營兵令討亂民自贖擒百五十人斬其三之二乃佯召文英廷用予冠帶而密屬景星捕七人并文英廷用斬之二亂悉定帝優詔褒美蘇巴爾噶冦義州李成梁擊斬之泰寧部蘇巴爾噶與弟綽哈子布延圖舊作卜言土今改入犯義州成梁設伏鎮彛堡在錦州府羲州東北參將李平胡射中蘇巴爾噶墜馬斬之寇大奔綽哈等慟哭去自是敵數入成梁等數敗之輒斬其魁又時襲擊于塞外敵少戢夏四月京師旱疫彗星見六月丁亥朔日食加張居正太師以前禮部尚書潘晟新昌人兼武英殿大學士吏部侍郎余有丁字丙仲鄞人兼文淵閣大學士並預機務晟尋罷居正卧病四閲月不愈百官並齋醮為祈禱修撰王家屏戸部主事顧憲成不往憲成同官代之署名憲成聞馳往手削去之王家屏字忠伯大同山隂人顧憲成字叔時無錫人南都秦晉楚豫諸大吏無不建醮帝命張四維等理閣中細務大事即家令居正平章居正始自力後憊甚不能徧閲然尚不令四維等參之㑹遼東奏㨗加居正太師先是居正以十二載滿加太傅明世文臣無真拜三公者自居正始已而居正病革自度不起乃薦晟有丁自代晟素貪鄙不厭清議馮保素從受書彊居正薦之命下甫五日為言者交章劾罷張居正卒諡文忠帝愴悼輟朝諭祭九壇祝國公兼師傳者贈上柱國命四品京鄉錦衣堂上官司禮太監䕶喪歸葬居正當國務尊主權課吏職信賞罰一號令雖萬里外朝下而夕奉行故神宗初政起衰振隳綱紀修明海内殷阜居正力也然威權震主好諛自尊士大夫始譽以伊周五臣繼竟擬之舜禹居正恬然不為怪晚益偏恣黜陟多由愛憎左右頗通賄賂議者謂其昧寵利居功之戒所以身死未幾即致禍敗初帝在講筵讀論語色勃如也誤讀為背居正遽厲聲曰當讀作勃帝悚然驚起同列皆失色由此帝益心憚居正時比之霍氏驂乘云秋八月皇子常洛生即光宗㳟妃王氏出妃初為慈寧宮宫人年長矣帝過慈寕私幸之有身故事宮中承寵必有賞賚文書房内即記年月及所賜以為驗時帝諱之故左右無一言者一日侍慈聖宴語及之帝不應慈聖命取内起居注示帝且好語曰吾老矣猶未有孫果男者宗社福也母以子寧分差等邪是年四月封恭妃及是遂生皇長子帝御殿受賀頒詔大赦冬十二月太監馮保以罪謫為奉御安置南京初保内倚太后外倚張居正専擅威福帝有所賞罪非出保口無敢行者帝積不能堪然迫于太后居正不能去也及太后歸政居正又卒保失所倚然猶肆横如故潘晟既罷保方病起詬曰我小恙遽無我邪皇長子生保欲封伯爵張四維以無故事難之擬廕弟姪一人都督僉事保怨曰爾由誰得今日而負我其恣如此東宫舊閹張鯨素害保寵謀去之其同事張誠向為保所惡斥于外至是復入兩人乃伺間陳保過惡並發其與張居正交結狀帝猶未發㑹御史江東之字長信歙人首劾保黨錦衣同知徐爵帝下爵獄論死李植字汝培江都人遂列保十二大罪帝震怒謫保南京奉御籍其家金寳巨萬東之并糾吏部尚書梁夢龍字乾吉真定人賂徐爵得官工部尚書曾省吾彭澤人吏部侍郎王篆夷陵州人皆被論得罪去于是彈擊居正者紛起矣以嚴清字公直雲南後衛人為吏部尚書清素著清望張居正當國清任刑部尚書不附麗居正及籍馮保家得廷臣餽遺錄獨無清名帝深重之㑹梁夢龍罷即以清代日討故實辨官材自丞佐以下皆親署無一倖進者中外師其亷儉書問幾絶甫半嵗得疾歸卒諡恭肅改薊鎮總兵官戚繼光于廣東繼光在薊鎮十六年當國大臣徐階髙拱張居正先後倚任之居正尤事與商㩁動無掣肘故繼光益發舒及是居正歿甫半嵗給事中張鼎思言繼光不宜于北閣臣擬㫖遽調之廣東繼光悒悒不得志赴粤踰年即謝病歸居三年卒繼光更厯南北並著聲在南方戰功特甚北則専主守邉防修舉繼之者踵其成法數十年得無事所著紀效新書練兵事實談兵家遵用爲萬厯末追諡武毅癸未十一年春三月追奪張居正官階馮保既得罪新進者益務攻居正詔奪上柱國太師再奪諡居正諸所引用者斥削殆盡召還吳中行趙用賢等遷官有差夏四月張四維罷初四維曲事張居正然心不善其所為又居正卒始當國政知中外積苦居正欲大収人心因上疏言事請蕩滌煩苛宏敷惠澤帝納其言朝政為之稍變四維復引居正所沉抑者稍稍登用時望頗屬至是以父喪歸先是居正餘黨欲逐四維擁申時行為首輔四維愠語時行客曰夫首相者若天行有春必有夏何相廹為時行得疾在告及起不敢謝過黙黙而已四維乃與門生在言路者謀攻時行疏具將上㑹四維父訃至乃已四維歸後服將而卒贈太師諡文毅以許國字維禎歙縣人為禮部尚書兼東閣大學士預機務張四維既去申時行為首輔國素與相善由是政府無間致仕武英殿大學士徐階卒諡文貞階里居後為髙拱所厄及拱罷始得安帝元年階年已八十詔遣行人存問賜璽書金幣既而張居正將歸𦵏父擬薦階自代未果居正念臣里居者髙拱與已有深隙殷士儋多奥援或乘間以出惟階老易與擬薦之自代既念階前輩已還當位其下乃止至是卒贈太師階以恭勤結主知立朝有相度保全善類嘉隆之政多所匡救間有委蛇亦不失大節方嚴嵩初罷階榜三語于直廬曰以威福還主上以政務還諸司以用舍刑賞還公論由是票擬公之同列言路亦益發舒當時翕然稱階為名相五月我太祖髙皇帝起兵征尼堪外蘭克圖倫城臣等謹按自古帝王貞符所啟瑞應駢臻若元烏生啇武敏誕稷備埀詩頌咸足著信千秋洪惟我命造國家受東土慶鍾邦龍興天誕朱果發祥是用神竒肇跡與三代開基之始先後同符逮錫姓愛新建邦長白太祖髙我帝經營大業締鴻圖適㑹尼堪外蘭構兵召釁潛皇太祖髙逞狡圖我義徂征聲罪致討巨憝既伏厥辜明人猶庇皇帝爰仗太祖髙惡渝盟不知悔禍我恨告于皇帝不得已以七大上帝明誓衆士師直為壯撫順來降遼潘尋經底定尚冀明人警悟屢戢軍鋒遺書講好太祖興朝舉措光明俊偉洵足逺邁百王及我文皇帝嗣登寳阼以明人舊隙未平繼承先志大軍直薄燕宗明人國勢莫支然且埀成弗取迨至明政親統朝不網闖賊猖狂坐貽板蕩我雪恥除兇其冇徳于明者復因明臣呉三桂之請為之實録所至深且厚臣等仰惟載聖神代起矞矞皇皇固巴具詳典冊而圖倫一役名正言順實為謨烈昭重鴻業所由成敬依例特書以彰撻伐大義自時厥後凡六師順動仁義兼資以及掃蕩鯨鯢施恩勝國事與明紀有闗者並依次恭載大略用昭我夭眷國家誕膺而符瑞昭然列聖式廓鴻基得天下之正尤為隆古所未有又豈漢唐以來所克比擬于萬一哉初長白山在吉林烏拉城東南横亘千餘里東自寜古塔西至奉天府諸山皆發脈于此之東有布庫哩山下有池曰布勒瑚哩相傳有天女三長曰恩古倫次曰正古倫季曰佛庫倫浴于池有神鵲啣朱果置季女衣取而吞之遂有身尋産一男生而能言體貎竒異及長母告以故命以愛新覺羅為姓名曰布庫哩雍順以小舫乘之令順流而下至河歩登岸端坐其地有三姓方搆兵或汲于河見而異之歸語衆人往觀詢知所由來皆驚曰此天生聖人也遂迎舁至家三姓者議曰我等盍息爭推此人為主以女伯哩妻之奉為貝勒其亂乃定于是布庫哩雍順居長白山東鄂謨輝之野鄂多理城國號曰滿洲實為我朝開基之始數傳後有名樊察者以國人弗靖遁于荒野追者將及之有神鵲止其首追者疑為枯木遂得免後傳至肇祖原皇帝興祖直皇帝景祖翼皇帝顯祖宣皇帝相繼嗣興威服諸部景祖居赫圖阿拉地兄弟六人築城分居號寧古塔貝勒時有望氣者言滿洲將有聖人出戡定衆亂統一諸國繼而顯祖嫡妃喜塔喇氏以明嘉靖三十八年己未嵗誕生太祖髙皇帝天表非常勇略蓋世號為聰睿貝勒時諸部争奪不已太祖恩威並用漸次削平㑹蘇克素䕶河部圖倫城有尼堪外蘭者隂搆明總兵李成梁引兵攻古哷城主阿泰章京阿泰妻乃景祖長子禮敦巴圖魯之女景祖聞警恐女孫被陷偕顯祖往救先後入古哷城城中守禦甚堅成梁不能克尼堪外蘭詭往招撫城中人信其言殺阿泰以降成梁盡屠之遂并害景祖顯祖太祖聞之赫然震怒往詰責明邉吏明人尋歸二祖喪至是太祖年二十有五思復祖父讐乃以顯祖遺甲十三副起兵征尼堪外蘭于圖倫城尼堪外蘭遁于嘉班遂克其城而歸既而復進征嘉班城尼堪外蘭乃逃于鄂勒歡築城以居事在是年八月太祖尋復進克鵞爾渾城尼堪外蘭遁入邉太祖遣齋薩率四十人索之邉吏執以畀齋薩遂斬之而歸自此嵗輸銀幣通和好焉事在丙戍年冬十一月己卯朔日食十二月慈寧宫災甲申十二年春二月京師地震釋建文諸臣外親之謫戍者御史屠叔明請釋革除忠臣外親後裔詔自齊泰黄子澄外其坐方孝孺等連及者俱免之于是浙江江西福建四川廣東得免者凡三千餘人後光宗嗣位併泰子澄戚屬後裔俱放還夏四月騰衝遊擊劉綎顯之子討平隴川賊初􅃡酋莽瑞體以兵服諸蠻嘉靖中孟養木邦酋攻殺􅃡酋莽紀嵗分有其地紀嵗子瑞體奔洞吾母家為之後尋以計侵據大古喇遂復入􅃡陷孟密併孟養勢益彊于是木邦蠻莫諸部皆叛附之分大古喇地在洞吾南濵海與安狒機鄰蠻莫孟密地在蠻哈山下萬厯中析置撫司後廢遣人招隴川宣撫多士寧士寧不從而記室岳鳯方用事鳯江西人行賈隴川驍傑多智士寧妻以妹使為記室鳯媚士寧而奪之權欲降􅃡遂誘士寧而酖之并殺其妻子奪金牌印符受瑞體偽命代士寧為宣撫既而瑞體死子應裏嗣鳯導之入㓂窺騰越永昌諸處已陷順寧本蒲蠻地元置府今府屬雲南指揮吳繼登等戰死事聞詔以綎為騰衝遊擊鄧子龍豐城人為永昌參將提兵往討當是時迤西諸部皆叛以兵助􅃡進逼姚闗在甸灣土州北接順寧界勢甚盛㑹綖子龍兵至諸土兵亦大集綎與子龍大破之攀枝花地在姚闗南乘勝追擊先後斬首萬餘鳯大懼乃令妻子及部曲來降綎責令獻金牌符印及蠻莫孟密地而分兵趨沙木籠山注見前先據其險自領大兵馳入隴川鳯度無可脱遂詣軍門降時諸部蠻視鳯為向背緬亦倚鳯為心腹鳯既降諸部俱殺􅃡使來歸綎率兵進􅃡直抵阿瓦城名為緬中五城之一應裏退走阿瓦酋猛勺詣綎降猛勺應裏從父也遂班師獻俘于朝鳯伏誅未幾􅃡復熾進據孟養蠻莫官軍戰却之巡撫陳用賔築八于騰列兵戍守募人至暹羅約攻緬久之􅃡為暹羅所困勢頓衰然近緬諸部仍服屬之終明世不能復籍張居正家御史羊可立汝陽人復追論居正搆陷遼王王妃因上疏訟寃言遼邸金寳悉入居正家帝命司禮監張誠等詣荆州籍居正家守令先期録人口錮其門子女餓死者十餘輩誠等盡括其親族所有得黄金可一萬白金十餘萬長子禮部主事敬修不勝拷掠自縊死事聞申時行等與六卿大臣合疏請少緩之刑部尚書潘季馴復特疏言居正母年逾八旬旦暮莫必其命語尤激楚于是詔留空宅一所田十頃膽其母而盡削居正官奪璽書詔命以罪狀示天下其弟都指揮居易子編修嗣修俱戍極邉諸以忤居正罷黜者俱召還初言路為居正所抑至是爭礪鋒鋭摶擊當路可立與李植江東之並荷帝寵三人更相結亦頗引吳中行趙用賢沈思孝為重執政惡之未幾御史丁此吕劾侍郎髙啟愚主試以舜亦以命禹為題為居正勸進帝手疏示申時行時行言此吕以曖昧陷人大逆恐讒言踵至非清明之朝所宜有尚書楊巍因請出此吕于外植東之交章劾時行巍蔽塞言路帝為罷啟愚留此吕時行巍求去余有丁言大臣國體所繫今以羣言留此吕恐無以安時行巍心帝乃聽巍出此吕于外許國尤不勝憤専疏求去言昔之専恣在權貴今乃在下僚昔顛倒是非在小人今乃在君子意氣感激偶成一二事遂自負不世之節號召浮薄喜事之人黨同伐異罔上行私其風漸不可長意蓋指中行用賢等也自是言官與政府日相水火矣楊丁此吕字右武新建人髙啟愚銅梁人巍字伯謙海豐人冬十月余有丁卒諡文敏十二月以王錫爵為禮部尚書兼文淵閣大學士王家屏為吏部侍郎兼東閣大學士並預機務錫爵因救論奪情諸臣積忤張居正以禮部侍郎家居五年不出至是即家起之家屏前為日講官敷奏剴摯帝斂容受之稱為端士及是遂以吏部侍郎入閣去史官僅二年先是李植江東之申時行相搆以錫爵負時望具素惡居正當與時行貳故力推之比錫爵至乃與時行合弗善植等由是大恨之詔以陳獻章胡居仁字叔心餘千人王守仁從祠孔廟申時行等言守仁言致知出大學良知出孟子陳獻章言主靜延宋儒周敦頤程顥且孝弟出處如獻章文章功業如守仁純心篤行如胡居仁居仁聞吳與弼講學崇仁往從之游絶意仕進其學以主忠信為先求放心為要闇修自守布衣終其身並宜崇祀從之終明世從祀文廟者薛瑄與守仁等四人乙酉十三年春三月李成梁襲巴圖爾舊作巴士兒今改後仿此綽哈大破之巴圖爾欲報父蘇巴爾噶之怨偕從父綽哈姑婿呼達舊作花大糾西部伊勒敦舊作以兒鄧今並改後仿此等以數萬騎掠瀋陽既退駐牧遼河欲犯開原鐡嶺成梁與巡撫李松大城人潛為浮橋濟師踰塞百五十里疾掩其帳冦已先覺整衆迎戰成梁為疊陣親督前陣擊冦而松以後陣繼之斬首八百有竒至秋諸部長復犯蒲河在奉天府承徳縣西北明置千戸所于此今廢而西部音登舊作銀燈今改亦窺遼瀋成梁命部將李平胡出塞三百五十里搗破音登營斬首一百八級諸部長聞之始引去以尚寶少卿徐貞明字孺東貴溪人領墾田使督治京畿水田初貞明為給事中嘗請興西北水利言神京雄據上游兵食宜取之畿内今皆仰給東南豈西北古稱富彊地而不足以實廩而練卒乎夫賦税所出括民脂膏而軍船夫役之費常以數石致一石東南之力竭矣又河流多變運道多梗竊有隠憂聞陜西河南故渠廢堰在在有之山東諸泉引之率可成田而畿輔諸郡或支河所經或澗泉自出皆足以資灌溉北人未習水利惟苦水害不知水害未除正由水利未興也葢水聚之則為害散之則為利今順天真定河間諸郡桑麻之區半為沮洳由上流諸河之水惟泄于猫兒灣欲其不汎濫而壅塞勢不能也今誠於上流疏渠濬溝引之灌田以殺水勢下流多開支河以泄横流其淀之最下者留以瀦水稍髙者皆如南人築圩之制則水利興水患亦除矣至于永平灤州抵滄州慶雲地皆萑葦土實膏腴元虞集欲于京東濵海地築塘捍水以成稻田若倣集意招徠南人俾之耕藝北起遼海南濵青齊皆良田也宜特簡憲臣假以事權毋阻浮議需以嵗月不取近功或撫窮民而給其牛種或任富室而緩其科征或選擇健卒分建屯營或招徠南人許其占籍俟有成績次及河南山東陜西庶東南轉漕可滅西北儲蓄常充國計永無絀矣猫兒灣今在雄縣東時以財匱不能舉及謫官南行御史傳應禎下獄貞明入獄調䕶坐貶太平府知事又著潞水客談論水利當興者十四事畧曰西北之地旱則赤地千里潦則洪流萬頃惟雨𤾉時若庻幾樂嵗無饑此可常恃哉惟水利興而後旱潦有備利一也中人治生必有常稔之田以國家之全盛獨待哺于東南豈計之得哉水利興則餘糧棲畆皆倉庾之積利二也東南轉輸其費數倍若西北有一石之入則東南省數石之輸久則蠲租之詔可下東南民力庶幾稍甦利三也西北無溝洫故河水横流而民居多沒修復水田則可分河流殺水患利四也西北地平廣㓂騎得以長驅若溝洫盡舉則田野皆金湯利五也游民輕去鄉土易于為亂水利興則農業者依田里而游民有所歸利六也招南人以耕西北之田則民均而田亦均利七也東南多漏役之民西北罹重徭之苦以南賦繁而役减北賦省而徭重也使田墾而民聚則賦増而北徭可減利八也沿邉諸鎮有積貯轉輸不煩利九也天下浮戸依富家為佃客者何限募之為農而簡之為兵屯政無不舉矣利十也塞上之卒土著者少屯政舉則兵自足可以省逺募之費甦班戍之勞停勾欇之苦利十一也宗禄浩繁勢將難繼今自中尉以下量祿之田使自食其土為長子孫計則宗禄可減利十二也修復水利則倣古井田可限民名田而自昔養民之政漸可舉行利十三也民與地均可倣古比閭族黨之制而教化漸興風俗自美利十四也既還朝給事中王敬民薦之㑹巡撫張國彦邯鄲人等方開水利于薊永間有效遂令貞明兼察御史領墾田使貞明先詣永平募南人為倡及明年二月已墾三萬九千餘畞又遍厯諸河周覽水泉分合將大行疏濬而閹人勛戚之占田者爭言不便帝惑之遂罷夏四月京師旱大雩自去年八月不雨至是月帝歩禱南郊靣諭大學士等曰天旱雖由朕不徳亦天下有司貪婪剥害小民以致上干天和今後宜慎選有司乃詔中外理寃抑免天下被災田租一歳先是李植等疏劾尚書潘季馴朋奸罔上詔削季馴籍擢植太僕少卿江東之光禄少卿羊可立尚寳少卿至是御史蔡系周以旱上疏劾植且言陛下欲雪枉而刑部尚書之枉先不得雪今日之旱蓋實由植所稱尚書謂李馴也于是東之抗疏求罷可立復代為植辨給事御史齊世臣吳定等交章劾之帝報曰朕方憂旱諸臣何得紛爭乃已秋七月雷震郊壇八月京師地震閏九月帝詣大峪山閲夀宫初帝謁山陵用禮部尚書徐學謨字叔明蘇州府嘉定人言將卜夀宫于大峪在十一年時李植以巡撫御史扈行閲視謂其地未善欲與江東之疏争不果既而帝再臨視在十二年遂作宫役既興矣在是年八月植以夀宫有石申時行與學謨姻故主之可用是罪也乃與東之羊可立合疏上言地果吉則不宜有石則宜奏請改圖乃學謨以私意主其議時行以親故贊其成非大臣謀國之忠時行奏辯車駕初閲時植東之不言今已二年忽創此議其借事傾臣明甚帝責三人奪俸半嵗未幾復以王錫爵言貶三人官鍚爵具奏不平者八事大畧言張馮之獄上意先定言者適投其㑹而輒自附于用賢等櫻鱗折檻之黨且謂舍建言别無人品建言之中舍採摭張馮舊事别無同志以中人之資乗一言之㑹超越朝右日尋戈矛皆不平之大者帝乃貶植東之員外郎可立評事然猶以植言夀宫有石恐寶座將置于石上至是復親詣閲之終謂大峪吉遂調三人于外冬十一月禮科給事中王三餘安平人請帝親郊不從三餘請帝親郊以答大戒帝怒其奏請不早詰責之仍遣官代時帝累詔稱疾郊祀廟享多弗躬親明年禮部主事盧洪春以帝不時享太廟上疏極諌帝震怒傳諭内閣百餘言責洪春悖妄命擬㫖治罪閣臣擬奪官不從杖斥為民給事御史先後申救奪俸有差陽盧洪春字思仁東人丙戌十四年春二月冊鄭氏大興人為皇貴妃三月禁部曹言事妃有殊寵生子常洵進封皇貴妃而王恭妃生皇長子已五嵗不益封中外籍籍疑帝將立愛給事中姜應麟字泰符慈谿人首抗疏請立元嗣為東宫貶廣昌漢置縣隋改飛狐明洪武初復曰廣昌今縣屬易州典史大學士申時行率同列再請建儲不聴時帝以旱霾下詔求直言郎官劉復初髙陵人李懋檜字克蒼安溪人等顯侵貴妃時行請帝下詔令諸曹建言止及所司職掌聴其長擇而獻之不得專達帝甚悦之于是言者蠭起皆指斥宫闈攻擊執政帝概置不問門戸之禍大起夏六月松茂番平松茂諸番列砦四十八嵗為吏民患王廷瞻字稚表黄岡人撫蜀時嘗遣將擊破丢骨人荒沒舌三砦諸酋乃降故事諸番嵗有賞賚番要索無已其所索例有新班錢熟衣錢架梁錢躧草錢放狗錢掛綵錢㫁酒錢廷瞻一切除之西陲稍靖僅六七年勢復猖獗十三年夏楊柳番入犯金瓶堡在今四川龍安府松潘㕔南殺守將巡撫雒遵字道行涇陽人遣總兵官李應祥湖廣九谿衛人討定之番恃强剽如故㑹徐元泰宣城人代遵撫蜀使使檄諭番不應是年春復攻蒲江關今名鎮江關在松潘㕔南守將出擊賊稍解東南路始通元㤗決計大征遣遊擊周于徳邉之垣總兵郭成參將朱文達等將諸路兵進討命應祥居中節制應祥于軍中樹赤白幟各一下令良民陷賊者徒手立赤幟下熟番不附賊者徒手立白幟下即免罪番遇急不相救官軍連破河東河西諸賊巢擒賊渠三十餘人俘馘千計之垣祖輪嘉靖初以指揮討茹兒賊被殺漆其頭為飲器及是六十年之垣乃得之以還葬焉至是班師明年又討破建昌注見前諸番及卭部今寜逺府越嶲㕔屬夷以其地置屏山縣今屬叙州府蜀中劇冦盡平秋九月王家屏罷家屏遭繼母憂詔賜銀幣馳傳歸冬十一月祀南郊丁亥十五年春三月詔徹哩克舊作撦力克今改後仿此襲封順義王初諳達死徹辰汗舊作乞慶哈即歡台吉改名襲至是徹辰汗死子徹哩克襲其妻三娘子即諳達所奪之外孫女而為婦者也歴配三王主兵柄為中國守邉保塞諸部畏服之帝嘉其功封忠順夫人夏四月旱京師地震六月京師大雨溺人民無算命順天府賑恤秋七月江南水江北山西陜西河南山東旱時所在災荒河北尤甚戸部右侍郎孫丕揚字叔孝富平人上言海内困加派宜寛賦節用損上益下以培蒼生大命帝感其言頗有所減罷九月丁亥朔日食不見冬十月南京右都御史海瑞卒諡忠介初瑞自南京謝病歸髙拱張居正相繼當國俱憚瑞峭直中外交薦卒不召及居正卒吏部始擬用累遷南京右都御史瑞力矯偷惰百司惴恐至是卒僉都御史王用汲字明受晉江人入視葛幃敝籯有寒士所不堪者因醵金為歛百姓罷市送者數百里不絶瑞生平為學以剛為主自號剛峯天下識與不識咸稱剛峯先生戊子十六年春三月詔改景泰實録去郕戾王號不果行時上下偷惰詔勅多不奉行景泰實録終明世未嘗改也南畿浙江山西陜西河南大饑疫起前尚書潘季馴為右都御史總督河道季馴前為李植所劾落職為民御史李棟上疏訟曰隆慶間河決崔鎮為運道梗數年以來民居既奠河水安流咸曰此潘尚書功也昔先臣宋禮治㑹通河至于今是頼季馴功不在禮下乃當身存之日使與編戸齒寧不隳諸臣任事之心失朝廷報功之典其後論薦者不已遂起季馴右都御史總督河道自呉桂芳後河漕皆總理至是復設専官尋加季馴工部尚書秋八月壬午朔日食冬十二月杖給事中李沂字景魯嘉魚人于廷斥為民中官張鯨掌東厰横肆無憚御史何出光劾鯨死罪八并及其黨錦衣都督劉守有序班邢尚智尚智論死守有除名而鯨竟不罪任職如故外議謂鯨以金寶獻帝獲免沂拜官甫一月即上疏言之畧曰陛下富有四海豈愛金寶威如雷霆豈徇請乞及見明㫖許鯨策勵共事外議籍遂謂為真虧損聖徳夫豈淺尠且鯨奸謀既遂恐國家之禍將從此始帝得疏震怒謂沂欲為馮保張居正報讐立下詔獄嚴鞫閣臣申時行等乞宥不從讞上詔廷杖六十斥為民馮保獲罪實鯨為之故帝云然或曰張誠與鯨交惡授意言者攻之鯨廹衆論不得已乞罷乃命私家閒住未幾復召入己丑十七年春正月己酉朔日食時以日食免朝賀嗣後毎元旦皆不視朝三月免陞授官靣謝自是臨御遂簡夏四月召王家屏復入閣家屏服甫闋詔進禮部尚書遣行人召還抵京師三月未得見家屏以為言帝遣中官諭家屏奬以忠愛家屏疏謝請帝視朝居數日帝為一御門延見自是益深居不出矣六月賑南畿浙江饑南畿久旱浙江大風海溢既而亦旱發帑金八十萬賑之庚寅十八年春正月召見申時行等于毓徳宫斥大理評事雒于仁字少經涇陽人為民于仁疏上酒色財氣四箴直攻帝失疏言臣備官嵗餘僅朝見陛下者三此外惟聞聖體違和一切傳免郊祀廟享遣官代行政事不親講筵久輟臣知陞下之疾所以致之者有由也臣聞嗜酒則腐腸戀色則伐性貪財則喪志尚氣則戕生陛下八珍在御觴酌是耽卜畫不足繼以長夜此其病在嗜酒也寵十俊以啟倖門溺鄭妃靡言不聽忠謀擯斥儲位久虛此其病在戀色也傳索帑金括取幣帛甚且掠問宦官有獻則已無則譴怒李沂之瘡痍未平而張鯨之貲賄復入此其病在貪財也今日榜宫女明日挾中官罪狀未明立斃杖下又宿怨藏怒于直臣如范儁姜應麟孫如法輩皆一詘不申賜環無日此其病在尚氣也四者之病膠繞身心豈藥石所能治臣今敢以四箴獻陛下肯用臣言即立誅臣身臣雖死猶生也安十俊時有十小被寵謂之十俊范儁字國士髙人以疏陳時政被斥孫如法字世行餘姚人以諫鄭貴妃進封貶官帝震怒將加嚴譴㑹嵗暮留其疏十日及是元旦召見申時行等分析之時行請毋下其章而諷令于仁自引去遂斥為民自此章奏留中遂成故事是日帝宣皇長子出見時行請早定大計帝猶豫久之乃曰朕不喜激聒近閲諸臣所奏惡其離間父子故概置之若諸臣不復奏擾當以後年冊立否則俟皇長子十五嵗舉行時行因戒廷臣母凟擾二月罷日講帝每遇講期多傳免申時行請免講日仍進講章以備觀覽自後講筵遂永罷三月以宋纁字伯敬商邱人為吏部尚書纁前為戸部五年值四方多災酌盈虚籌緩急上下賴之石星代為户部語纁曰某郡有羨餘可濟國用纁曰朝廷錢榖寧積久不用勿使搜括無餘上知物力充羡則侈心生矣時中外陳奏帝多不省或直言指斥亦不罪于慎行稱帝寛大纁曰言官極論得失要使人主動心縱罪及言官上意猶有所儆省概置弗問則如痿痺不可療矣石星于帝初元起故官累進尚書及移吏部絶請託奬亷抑貪痛懲黠吏于政府一無所闗白屢乞休不允卒宫諡莊敬夏六月青海酋浩爾齊舊作火落赤今改後倣此犯邉自諳逹西掠諸番番人不支輸欵于虜虜騎遂數入番中至是套部章圖哩舊作莊秃賴等據水塘青海地布色圖舊作卜失土今並改浩爾齊等據莽拉舊作莾剌今改聶恭舊作揑工今改兩川皆洮水支流隨地易名浩爾齊尤黠傑数犯甘凉岷洮西寧間已而進圍舊洮州即古洮陽城在洮州衛西南城臨洮水副將李聨芳洵陽人戰沒未幾復大掠河州臨洮渭源官軍禦之敗績西陲大震時徹里克勢衰亦為布色圖等所誘西行逺邉初諳答建寺青海奏于朝賜名仰華至是齊里克以赴仰華為名西至青海諸部咸挾以為重帝惡之詔停市賞秋七月庚子朔日食命兵部尚書鄭雒字禹秀安肅人經畧邉防雒前督宣大軍撫順義王及忠順夫人有恩故用之初徹辰汗襲封年老且病欲妻三娘子三娘子不從率衆西走徹辰汗追之貢市久不至雒計三娘子别屬則徹辰汗雖王無益乃使人語之曰夫人能歸王不失恩寵否則塞上一婦人耳三娘子聴命貢市惟謹徹辰汗死徹哩克當襲三娘子自以年長練兵萬人築城别居雒恐貢市無主復諭徹哩克曰夫人三世歸順汝能與之匹則王不然封别有屬也徹哩克盡逐諸妾復妻三娘子遂嗣封雒以洮河之難由縱敵入青海之所致乃馳赴甘肅下令曰北部自青海歸巢者聴假道自巢入青海者即勒兵拒之未幾布色圖欲趨青海雒設伏掩擊之布色圖僅以身免章圖哩後至聞之亦退去于是大布招番之令歸附者日衆乃進兵青海逐浩爾齊諸部而諭徹哩克縳獻首叛踰二年徹哩克以史二中國叛人等來獻命復其市賞辛夘十九年春閏三月彗星見夏四月朔享太廟是後廟祀皆遣代六月王錫爵罷錫爵初還朝申時行為首輔許國錫爵次之三人皆南畿人錫爵又與時行同郡且同舉進士相得甚然時行柔和而錫爵性剛負氣十六年子衡字辰玉舉順天試第一郎官髙桂饒伸字仰之進賢人論之時庶子黄洪憲典試時行婿李鴻亦預選桂摘可疑者八人并及衡請俱覆試禮部侍郎于慎行列甲乙以上閣臣調㫖盡留之衡少有文名為舉首才自稱因被論遂不復㑹試至二十九年錫爵罷官已久始舉㑹試第二人廷試亦第二授編修秀黄洪憲字懋忠水人錫爵連章辯訐語極忿伸桂皆得罪以是積與廷論忤十八年錫爵疏請豫教元子録用言官姜應麟等不報遂因旱乞罷帝不許及浩爾齊犯邉議者爭請用兵錫爵與申時行主欵失帝意未幾又偕同列請建儲不得遂以母老乞歸秋畿内蝗九月申時行許國罷先是廷臣争請建儲得㫖于二十年春舉行至是工部主事張有徳祥符人預以儀注請帝怒奪有徳俸時申時行方在告許國與王家屏慮事中變欲因而就之引前㫖爭首列時行名時行聞帝怒宻疏言臣方在告實不與知給事中羅大紘字公廓吉水人劾時行陽附廷臣請立之議隂為自交宫掖之謀歙人黄正賓者以貲為中書舍人思立竒節自附清流見大紘疏亦抗章詆時行帝怒斥大紘正賓為民時行力求罷而國與家屏又以建儲請帝責大臣不當與小臣比遂罷國未幾時行亦罷國素與時行無嫌然性木强遇事輒發力詆言事諸臣士論頗不附浩爾齊犯邉時行主欵國獨謂宼渝盟犯順宜一大創之帝心然國言以時行方柄政不能奪會時行門生給事中任讓論國庸鄙而國門生萬國欽又論時行以圖報復至是國與時行並罷論者謂國之去以争執差勝于時行之以被劾去也初張居正卒時行與張四維相繼當國時行欲以寛大收人心召用老成布列庶位朝論多稱之然政令務承帝指不能有所匡正又罷居正所行考成法一切務為簡易由是上下恬熙法紀漸不振歸後里居最久至帝四十二年始卒贈大師諡文定國在閣九年亷慎自守故累遭攻擊不能被以汙名及卒贈太保諡文穆萬國欽字二愚新建人以趙志臯為禮部尚書張位為吏部侍郎並兼東閣大學士預機務申時行既謝政宻薦志臯位自代遂用之吏部尚書陸光祖言舊制閣臣必由廷推若令一人宻薦恐開植黨之門志臯位因疏辭帝不允冬十一月遼東總兵官李成梁罷十七年以後土黙特結西部數入冦將弁多戰没成梁又潛兵出塞襲虜遇伏死者千餘人仍報首功増爵廕敵再入海州成梁不敢擊縱掠數日而去是年閏三月成梁乘給事中侯先春無錫人閲邉謀邀搗巢功遣副將李寧襲破拜甡還師遇敵死者又數千為廵按御史胡克儉所劾及先春還朝尤力詆之遂罷成梁官以寧逺伯奉朝請壬辰二十年春正月杖給事中孟養浩字義甫湖廣威寧人除其名時禮科給事中李獻可字堯俞同安人疏請豫教言元子年十有一矣豫教之典當及首春舉行倘謂内廷足可誦讀近侍亦堪輔𨗳則禁闥幽閒豈若外朝之清肅内臣忠敬何如師保之尊嚴疏入帝大怒摘疏中誤書𢎞治年號責以違㫖侮君貶一秩調外于是六科給事中鍾羽正字叔亷益都人舒宏緒通山人陳尚象都匀人丁懋遜霑化人張棟字伯任崑山人呉之佳長洲人楊其休青城人葉初春呉縣人及御史鄒徳泳字汝聖安福人各具疏救而養浩言尤力命錦衣衛杖之百削籍為民養浩等既逐言者未已禮部員外郎董嗣成御史賈名儒陳禹謨給事中李周䇿復先後論諫成被譴董嗣成烏程人賈名儒真定人陳禹瑛仁和人李周䇿呉江人三月巴拜舊作哱拜今改後倣此據寧夏反巴拜故韃靼種嘉靖中巴拜得罪其酋長來降屢立戰功官都指揮帝十七年巴拜老加副總兵致仕子承恩襲巴拜雖告老而多畜亡命承恩性狠戾十九年洮河告警廵邉御史周宏禴字元孚麻城人舉承恩及指揮土文秀并巴拜義子布延舊作哱雲今改後倣此等廵撫党馨益都人檄文秀西援巴拜謁經畧鄭雒願與子承恩從出師馨惡其自薦抑損之巴拜以故心怨至金城見諸總兵皆出其下比賊退取道塞外還宼騎遇之皆辟易遂有輕中外心馨欲按承恩冒糧罪又以承恩娶民女為妾笞之二十㑹戍卒衣糧久弗給巴拜遂嗾軍鋒劉東𤾉靖魯人許朝等作亂是年二月殺馨及副使石繼芳逼總兵張維忠自縊死東𤾉自稱總兵奉巴拜為謀主承恩朝為左右副將布延文秀為左右參將承恩遂陷玉泉營與下靈州花馬池注並見前及廣武河西四十七堡皆陷惟土文秀徇平魯今平羅縣屬寧夏府參將蕭如薰字季馨延安衛人堅守不下如薰妻楊氏盡出簪珥勞軍士妻帥之守城賊攻圍數月竟不能克賊率兵渡河欲取靈州又齎金帛誘河套卓哩克圖舊作著力兔今改後倣此等許以花馬池一帶聴其駐牧勢甚猖獗全陜震動王家屏罷李獻可之謫家屏封還御批力諫帝怒家屏引疾乞罷帝責家屏希名託疾家屏復奏言名非臣所敢棄臣所希者陛下為堯舜之君臣為堯舜之臣則名埀千載没有餘榮若使臣不希名將身處髙官家享厚禄主愆莫正政亂莫匡國家奚頼焉更使臣棄名不顧逢迎為悦阿諛取容許敬宗李林甫之姦佞無不可為矣帝益不悦遣内侍至其邸責之于是求去益力詔馳傳歸家屏柄政止半載以戅直去國朝野惜焉夏四月總督河道尚書潘季馴罷季馴四任治河前後二十七年習知地形水勢以借水衝沙築隄束水為河漕兼利之䇿下至木石椿埽綜理纎悉以勞疾累疏乞休不允至是泗州大水與撫按議濬治不合得請歸後三年卒五月倭陷朝鮮倭酋平秀吉薩摩州人起人奴初隨倭闗白倭國官名猶言丞相信長為信長畫䇿奪二十餘州㑹信長為其下所弑秀吉遂統其兵自號闗白刦降六十餘州窺朝鮮無備分遣行長清正等率舟師從對馬島方輿紀要日本國海曲部有伊岐對馬多藝三島為北境盡處逼釡山鎮在朝鮮東萊縣南濱大海與日本對馬島相望時朝鮮承平久兵不習戰其王李昖又湎酒廢弛島夷猝至望風皆潰棄王城奔平壤令次子琿攝國事已復走義州在平壤西北濱鴨緑江七月倭遂入王京刦王子陪臣掠府庫八道京畿江原黄海全羅慶尚忠淸咸平安凡八幾盡没旦暮渡鴨緑江請援之使絡繹于道廷議以朝鮮為國藩蔽在所必争遣行人諭昖以興復大義揚言大兵且至而倭業抵平壤遊擊史儒等率師至戰死副總兵祖承訓援之僅以身免中朝震動乃詔兵部右侍郎宋應昌字桐岡仁和人經畧備倭軍務以救之八月倭入豐徳等郡兵部尚書石星計無所出議遣人偵之于是嘉興人沈惟敬應募惟敬者市中無頼也是時平秀吉次對馬島分其將行長等守要害惟敬至平壤行長跪曰天朝幸按兵不動我亦不久當還當以大同江為界平壤以西盡歸朝鮮耳惟敬以聞廷議以倭許難信趣應昌進兵而石星頗惑其言假惟敬遊擊赴軍前且請金行間江豐徳郡在國城南屬京畿道大同在平壤城東亦名大通江秋九月寧夏賊平巴拜叛總督魏學曾字惟貫涇陽人檄副總兵李昫率兵進勦諸堡皆次第收復惟寧夏鎮城猶為賊據㑹套部卓哩克圖等控弦三千騎至賊益掠城中子女饋之套人揚言已與布王子為一家布延引卓哩克圖攻平虜堡參將蕭如薫伏兵南闗佯敗以誘之射布延死套部遂遁出塞四月以蕭如薰為總兵調麻貴大同右衛人為副總兵率兵抵鎮城帝復用石星言賜學曽尚方劍督戰御史梅國楨字克生麻城人薦李如松字子茂成梁子忠勇可任遂令如松總寧夏兵國楨監之㑹寧夏廵撫朱正色南和人甘肅廵撫葉夢熊字男兆歸善人皆先後至軍並逼城下學曾與夢熊定計決黄河大壩水灌之城外水深八九尺賊懼陽求撫以緩我師而仍結套部為助七月布色圖仗圖頼以三萬騎犯定邉小鹽池在寧夏府靈州東南别遣宰桑舊作宰僧今改後倣此以萬騎從花馬池西沙湃口入為巴拜聲援學曾令麻貴等分擊之皆敗去八月卓哩克圖復入李剛堡在寧夏府平羅縣南如松等擊之追奔至賀蘭山賊援遂絶㑹給事中許子偉瓊山人劾學曾惑于招撫悞國事先是學曾欲招劉東𤾉許朝使殺巴拜父子贖罪遣卒葉得新往學曾留同原十日以俟之得新旋被害帝責學曾玩宼學曾前上疏請令監軍無與兵事梅國楨憾之國楨至軍遂劾諸將觀望而并及學曾玩宼匿敗之罪帝遂大怒學曾被逮以夢熊代之賊被圍食盡城受水浸益大圮國楨用間紿東𤾉朝承恩使互相殺以降許貰其罪三人互猜疑至是東𤾉朝遂誘殺承恩黨土文秀承恩亦與其黨周國柱誘東𤾉朝殺之開門降如松率兵圍巴拜家巴拜自縊死俘承恩等至京師磔于市學曾被逮不一月而賊平敘勞復其官致仕葉夢熊朱正色梅國楨各予世廕武臣李如松蕭如薫等加恩有差如薰為將持重後更厯七鎮所在見稱自隆慶後欵市既成邉燧少警輦下視鎮帥為外府山人雜流乞朝士尺牘往者無不饜所欲薊鎮戚繼光有能詩名尤好延納名士如薰亦能詩賓座常滿妻楊氏至脱簮珥供客猶不給一時風㑹所尚諸邉物力為耗識者嘆焉冬十月以李如松充防海禦倭總兵官救朝鮮如松弟如栢字子貞如梅字子清並率師援勦以十二月至軍㑹沈惟敬自倭歸復伸封貢之請如松叱惟敬憸邪欲斬之參謀李應試曰藉惟敬紿倭封而隂襲之竒計也如松以為然乃置惟敬于營誓師渡江明年正月次肅寧館在平壤西北行長以為封使至遣牙將來迎進次平壤行長猶未覺竚風月樓以待如松分布諸軍抵平壤城諸將逡巡未入形大露倭悉登陴拒守如松令諸軍圍之以倭素輕朝鮮軍令祖承訓詭為其裝伏西南令遊擊吳惟忠攻迤北牡丹峯而如松親提大軍攻徇東南軍少却如松斬先退者以募死士援鈎梯直上倭方輕南面軍承訓等忽卸裝露甲倭大驚急分兵捍拒如松如柏等已分道並入如松馬斃于礟易馬躍塹而上麾兵益進遂克其城行長渡大同江道已而如栢復開城屬朝鮮京畿道所失四道並復官軍既連勝有輕敵心朝鮮人有以敵己棄王京遁告者如松信之將輕騎趨碧蹏館在朝鮮國城西猝遇倭圍之數重如松幾不免官軍喪失甚多乃退駐開城如松令諸將分據要害聞倭積粟數十萬在龍山乃宻遣死士焚之倭遂乏食然如松既敗衂氣大索應昌亦即欲休息于是沈惟敬封貢之議復行其年四月倭以糧盡棄王京如松與應昌入城將遣兵尾擊之而倭步步為營官軍不敢擊倭結營釜山為久留計時兵部尚書石星力主欵議獨留劉綎拒守如松乃班師南龍山在朝鮮國城東癸巳二十一年春正月召王錫爵復入閣錫爵至宻請建儲以踐大信帝手詔欲待嫡子令元子與兩弟皇三子常洵鄭貴妃出皇五子常浩周端妃出且並封為王錫爵懼失上指立奉詔擬㫖進又外慮公論因言漢明帝馬后唐明皇王后宋真宗劉后皆養諸妃子為子請令皇后撫育元子而生母不必崇位號以上壓皇貴妃亦擬㫖進帝竟下前諭令有司具儀于是舉朝大譁禮部尚書羅萬化字一甫㑹稽人給事中史孟麟字際明宜興人等詣錫爵力争廷臣諌者章日數上錫爵偕趙志臯張位請追還前詔帝不從既而諫者益衆岳元聲字之初嘉興人顧允成字季時無錫人等十餘人遮錫爵于朝靣争之錫爵請下廷議不許請面對亦不報因自劾求罷帝亦廹公議追寢前命命少俟二三年舉行秋七月吏部尚書孫鑨字文中燧之孫罷初張居正當國吏部權漸輕及宋纁陸光祖相繼為尚書稍自振飭至鑨守益堅閣臣張位等欲奪其權建議大僚缺九卿各舉一人類奏以聴上裁鑨争之不能得自是吏部權又漸散之九卿矣㑹大計京朝官鑨與考功郎中趙南星字夢白髙邑人力杜請謁員外郎吕允昌餘姚人鑨甥也首斥之南星亦斥其姻給事中王三餘一時公論所不予者貶斥殆盡而大學士趙志臯弟預焉王錫爵以首輔還朝欲有所庇比至而察疏已上庇者皆在黜中由是閣臣皆憾㑹言官論劾員外郎虞淳熙杭州右衛人郎中楊于廷全椒人主事袁黄嘉善人鑨議留淳熙于廷給事中劉道隆潛江人遂劾南星專權植黨貶南星三秩鑨亦奪俸遂連疏乞休去左都御史李世達以己同掌察上疏為南星訟不聴于是僉都御史王汝訓右通政魏允貞等交章論而員外郎陳泰求言尤切帝怒斥南星為民泰來等皆被謫李世達字子成涇陽人王汝訓字古師聊城人陳泰來字伯符平湖人八月彗星見紫微冬十一月召見王錫爵于煖閣皇太后生辰帝御門受賀畢獨召錫爵煖閣勞之曰卿扶母來京誠忠孝兩全錫爵叩頭對曰臣今日正恐忠孝兩虧因力請早定國本帝曰中宫有出奈何對曰此説在十年前猶可今元子已十三尚何待况自古至今豈有子弟十三嵗猶不讀書者帝頗感悟錫爵因復言外廷以固寵隂謀歸之皇貴妃恐鄭氏舉族不得安惟陛下深省帝益心動未幾遂有出閣之命甲午二十二年春二月皇長子常洛出閣講學輔臣侍班詞臣六人侍講讀俱如東官儀河南饑吏部郎中顧憲成削籍先是羣臣争建儲惟王家屏與言者意合申時行王錫爵皆宛轉調䕶亦頗以言者為多事並封命下憲成上疏力争又遣書錫爵反覆辨論議遂寢孫鑨趙南星主考察憲成實左右之既遷郎中所推多與政府牴牾至是王錫爵將謝政㑹推閣臣憲成舉家屏忤帝意削籍歸憲成既廢名益髙里故有東林書院為宋楊時講道處憲成與弟允成倡修之常州知府歐陽東鳯無錫知縣林宰為之營構衡歐陽東鳯字千仭潛江人林宰字徳漳浦人偕同志髙攀龍字存之無錫人錢一本字國瑞武進人薛敷教字以身武進人史孟麟于孔兼字元時金壇人諸人講學其中海内聞風景附往往諷議時政裁量人物朝士慕之亦遙相應和由是東林名大著而忌者亦多憲成嘗言官輦轂志不在君父官封疆志不在民生居水邉林下志不在世道君子無取故講習之餘必及時事後卒以此為世口實其後孫丕揚鄒元標趙南星等相繼講學自負氣節與政府相抗是為東林黨議之始夏四月己酉朔日食五月以禮部尚書陳于陛字元忠以勤子南京禮部尚書沈一貫字肩吾鄞人並兼東閣大學士預機務于陛少從父以勤習國家故實為史官益究心經史學嘗請修國史詔命詞臣分曹類纂以于陛及一貫等總裁之又嘗請建東宫及時豫教皆不報一貫充講官時進講髙宗諒隂曰託孤寄命必忠貞不二心之臣乃可使百官總已以聴苟非其人不若躬親聴覽之為孝也張居正以為刺已頗憾一貫及居正卒始遷官以吏部左侍郎家居及是王錫爵將謝政遂進于陛禮部尚書起一貫南京禮部尚書同入閣王錫爵罷錫爵在閣時嘗請罷江南織造停江西陶器減雲南貢金力争不宜用廷杖為世所稱特以阿並封㫖被物議既而趙南星斥趙用賢放歸論救者咸被譴責衆指錫爵為之因連章自明乞罷歸秋八月以孫丕揚為吏部尚書丕揚掌吏部清正不撓百僚無敢干以私者獨患中官請謁乃用掣籖法大選凡聽選及考定陞降者歸于雙月謂之大選急選凡改授改降丁憂候補歸于單月謂之急選悉聴人自掣請寄無所容銓政自是一變丕楊既變選法一時宮禁相傳以為至公下巷莫不翕然稱頌而議者謂其人材不分髙下地方不論繁簡而一憑籖注無異于掩鏡索照或至作竹籖傳譏之然自其法既行卒莫能改韶竹籖傳常熟顧大作冬十月綽哈犯遼東總兵官董一元宣府前人擊敗之初蘇巴爾噶為官軍所殺其弟綽哈子巴圖爾益結土黙特東西相倚數侵邉一元遣部將孫守亷馳右屯禦西部而自將大軍匿鎮武外為空營以待敵騎深入官軍忽從中起奮擊破之逐北七十餘里巴圖爾中矢走西部亦解去一元復以嵗晏敵不設備率健卒踏氷渡河疾馳四百里抵虜巢斬二百餘級獲牛馬甲仗無算全師而還巴圖爾旋死諸部悉逺遁乙未二十三年春正月詔宗室得就試鄭世子載堉請宗室皆得儒服就試視才器使從之許奉國中尉以下入試輔國中尉以上爵尊不得與其後禮臣李廷機字爾張晉江人言封爵科目原自兩途彼既願從科目入仕應照士子出身資格銓除何拘原爵亦從之惟不得除京朝官夏五月京師地震秋九月青海酋永什卜舊作永邵卜今改後倣此犯甘肅參將達雲凉州衛人擊敗之永什卜者順義王諳達從子也部衆强盛先嘗授都督同知再進龍虎將軍自以貢市在宣化守臣遇己厚不可逞乃隨諳達西迎活佛留據青海嵗為邉患嘗誘殺副將李魁邊臣不能報遂有輕中國心至是九月九日度將士必燕飲擁勁騎直入南川在西寧府西南自邉外東北流入境屬番偵告雲伏兵要害令番人繞出朶爾峽外潛扼其背而自提精卒二千夾擊大敗之斬首七百餘級其走峽外者番人殱之為西陲戰功第一雲既勝度㓂必復至厚集以待踰月冦果結浩爾齊諸部先圍番寨以誘官軍番不能支合于㓂㓂遂入犯西寧西寧軍堅不可破㓂始遁追奔數十里而還雲乃招集番人初與㓂合者七千餘户皆復其業尋進雲總兵官鎮甘蕭復建文年號初司業王祖嫡徳州人以建文不宜革除上請禮部尚書沈鯉字仲化歸徳人力贊之帝不從至是禮科給事中楊天民字正甫山西太平人復以為言始詔復建文年號附事蹟于太祖實録之末未幾南京太常卿沈子木疏言建文帝御宇五年顧不得一盂麥飯下同齊民于誼未忍請祔食于懿文太子之側章下部議不果行沈子木歸安人淮水溢浸泗州祖陵冬十月湖廣饑丙申二十四年春三月乾清坤寧兩宫災夏福建饑秋七月仁聖皇太后陳氏崩遣中官開礦初畿輔奸民慫慂中官多言礦利大學士申時行力持不可至是承寧夏朝鮮用兵之後國用大匱營建兩宫計臣束手前衛千戸仲春請開礦助工帝允之自是獻礦峒者踵至首開畿内命中官領之嗣後河南山西南直湖廣浙江陜西四川遼東廣東廣西江西福建雲南無地不開中使四出皆給以闗防併偕原奏官徃礦脉㣲細無所得勒民償之而奸人假開採之名乘勢横索民財有司稍忤意輙劾其阻撓逮治富家巨族則誣以盜礦良田美宅則指為下有礦脉卒役圍捕辱及婦女其横暴如此羣臣屢諫帝皆不聽其後又増設各省税使如天津店租廣州珠監兩淮餘鹽浙江福建廣東市舶成都茶鹽重慶名木湖口長江船税荆州店税寶坻魚葦及門攤商税等都邑闗津中使碁布水陸行數十里即樹旗建厰所至納奸民為爪牙肆行殺奪又立土商名目窮鄉僻塢米鹽雞豕皆令輸税中人之家大半皆破由是民不聊生變亂蠭起閏八月乙丑朔日食九月葬孝安皇后梓宫發引帝託疾不送遣官代行吏部侍郎孫繼臯字以徳無錫人員外郎王就學字所敬無錫人抗疏諫帝怒抵繼臯疏于地而置就學疏不省已而詔吏部甄别郎官斥就學為民繼臯亦罷去河決單縣時徐泗淮揚間無嵗不苦水患總河楊一魁安邑人議分殺黄流以縱淮别疏海口以導黄于是役夫二十萬開桃源黄河壩新河起黄家嘴在桃源縣東北至安東五港灌口在安東縣東北長三百餘里分洩黄水入海闢清口沙七里建武家墩注見前髙良澗在山陽縣西南由清河澗沙阜橋西入于淮沙阜橋在清河縣東南周家橋在山陽縣西南髙堰上石閘洩淮水三道入海且引其支流入江于是泗陵水患平而淮揚得無患然一魁專力桃清淮泗間而上流單縣黄堌口在今曹州府單縣南之決如故後以黄堌口不塞致衝祖陵斥一魁為民冬十二月陳于陛卒諡文憲于陛在閣與趙志臯張位沈一貫皆同年生遇事無齟齬而帝拒諫益甚上下否隔于陛憂形于色以不能補救在直廬數太息視日影至是以兩宫災請面對不報乞罷亦不許以積憂成疾卒贈少保丁酉二十五年春三月以楊鎬啇邱人為僉都御史經畧朝鮮軍務征倭軍既撤詔以顧養謙字益卿江南通州人為經畧養謙亦主欵奏言闗白宜封為日本王二十二年冬倭遣小西飛入朝定封貢議命都指揮楊方亨等充封使同沈惟敬往養謙薦侍郎孫鑛字文融鑨之弟自代乞身去二十四年九月方亨等至日本闗白怒朝鮮王子不來謝不肯撤兵所進表文又謾無臣禮是年二月方亨歸委罪惟敬并呈石星前後手書帝怒逮星惟敬按問下獄論死星于隆慶初建言被杖直聲震天下及起廢籍居官有重望然本書生素無謀畧失信奸人力主封貢遂以此敗後竟死獄中以尚書邢玠青州益都人總督薊遼改麻貴為備倭大將軍而以鎬為經畧時倭將行長清正等據南原在朝鮮國城東南與全州相犄角為國城要害全州在國城南犯全羅即朝鮮全羅道治全州其地南濱大海東接慶尚為朝鮮門户慶尚即朝鮮慶尚道治慶州在國城東南濱海與日本相對為朝鮮屏蔽逼王京㑹沈惟敬就逮鄉導乃絶九月鎬抵王京倭已退屯蔚山即朝鮮蔚山郡在慶州西北十二月鎬㑹邢玠麻貴議進取分為三協合攻蔚山賊出戰大敗奔據島山在蔚山郡城南結三柵以自固遊擊陳寅連破其二第三柵已垂㧞而鎬素與李如梅善以如梅未至不欲寅功出如梅上遽鳴金收軍再攻不克明年正月行長救至鎬狼狽先奔諸軍繼之賊前擊官兵死者無算輜重多喪失是役也傾海内全力合朝鮮通國之衆委棄于一旦舉朝嗟恨鎬既奔還王京與總督玠詭以㨗聞贊畫主事丁應泰武昌左衛人聞敗詣鎬咨後計鎬揚揚自詡功伐應泰憤抗疏盡列敗狀乃罷鎬令聴勘而以萬世徳山西偏頭所人代之邤玠以前役無水兵故敗乃益募江南水兵謀海運為持久計分四路進兵麻為伏兵所敗中路將董一元亦潰迄無成功夏六月三殿災時帝鋭意聚財多假殿工為名言者謂天以民困之故災二殿以示儆奈何復因天災以困民帝不納屢徴木于川廣令輸京師費數百萬率被中官冒沒終帝世三殿實未嘗復建也秋七月赦播州宣慰使楊應龍叛唐乾符間有楊端者應募定南詔遂據播州厯宋元皆附屬稱臣洪武初楊鑑内附授宣慰使數傳至應龍數從征伐恃功驕蹇帝十八年貴州廵撫葉夢熊廵按陳效成都井研人並疏應龍凶惡諸罪四川廵按李化龍字于田長垣人以時方調播州兵防禦松潘請暫免勘問由是川貴撫按議不合應龍性猜狠阻兵嗜殺所轄五司黄平草塘二安撫司白泥餘慶重安三長官司黄平司洪武八年置萬厯二十八年改為州今屬平越府草塘司在遵義府東洪武中置今廢餘慶司元置州洪武中分置餘慶白泥二司萬厯二十八年改置縣今屬平越府重安司在今潢平州西洪武八年置萬厯二十七年廢七姓田張袁盧譚羅呉悉畔離其妻叔張時照等上變告應龍反應龍嬖小妻田雌鳯殺其妻張并其母故時照欲報之夢熊請發兵勦之蜀中士大夫悉謂蜀三面臨播屬裔以什伯數皆其彈壓且兵驍勇數赴征調有功翦除未為長䇿以故蜀撫按並主撫朝議命勘應龍願赴蜀不赴黔二十年應龍赴重慶對簿坐法當斬請以二萬金贖又請願將兵五千征倭報効詔釋之㑹廵撫王繼光登州人至嚴提勘結應龍抗不出用兵之議遂決二十一年繼光至重慶與總兵劉承嗣分兵三道進婁山闗今名太平闗在遵義府北大婁山上白石口在婁山闗南反為所敗繼光論罷二十二年以南京兵部侍郎邢玠為總督往勘之㑹水西宣慰安疆臣請父國亨䘏典兵部尚書石星手札示疆臣趣應龍就吏得貰罪疆臣奉札至播招應龍時七姓恐應龍出得除罪而四方亡命竄匿其間又幸應龍反因以為利遂阻其事應龍諉罪于其黨黄元阿羔執以獻乃斬元羔于重慶市應龍請輸四萬金以贖罪羈其次子可棟于重慶追贖應龍既免死怙惡不悛㑹可棟死益痛恨遂糾諸苗反焚刦草塘餘慶二司及興隆都匀注並見前諸衛進圍黄平重安殺官吏大掠江津南川綦江合江寖及湖廣勢遂大熾八月京師地震冬十月以黎惟潭為安南都統使初莫登庸請封制下而登庸已死遂使其孫福海襲福海卒子宏瀷嗣宏瀷不能攝衆為黎寧臣鄭檢所逐寧死冄傳至惟潭漸强盛遂舉兵攻殺宏瀷子茂洽復據安南欵闗求貢總督陳大科北直通州人上言莫之簒黎其事逆黎之復讐其名正宜許其來歸詔以惟潭為都統使自是安南復為黎氏所有而莫氏惟據髙平一郡宗黨多竄處海隅時出侵軼為邉患戊戌二十六年夏四月土黙特犯遼東總兵官李如松出塞遇伏死初如松棄倭班師言路交章詆其和親辱國帝置不問㑹遼東總兵董一元罷廷推如松代之如松感帝知氣益奮綽哈糾土黙特諸部連東遼東殺掠無算如松率輕騎出塞搗巢遇伏兵力戰死詔以其弟如梅代之踰年坐擁兵畏敵劾罷成梁諸子如松最果敢有父風其次稱如梅然躁動非大將才京師旱六月張位罷位初官翰林聲望甚重朝士冀其大用及入政府招權示威素望漸衰日本封事壊位力薦楊鎬才請付以朝鮮軍務鎬遭父喪又請奪情視事帝皆從之㑹贊畫主事丁應泰劾鎬喪師言位與鎬宻書徃來朋黨欺國鎬拔擢由賄位得之帝怒下廷議位惶恐奏辯給事中趙完璧陜西人徐觀瀾澤州人復交章論之位窘亟奏羣言交攻孤忠可憫臣心無纎毫愧惟上矜察帝怒曰鎬由卿宻揭屢薦故奪哀授任今乃朋欺隠慝辱國損威猶云無愧遂奪職閒住後復以妖書事除名位果于自用任氣好矜故廷臣莫之救既卒亦無湔雪之者秋八月京師地震冬十一月倭遁去官軍分道追擊敗之朝鮮平初官軍分道擊倭不利㑹平秀吉死羣倭俱有歸志其渠帥清正發舟先走總兵官麻貴遂入島山西浦都督陳璘字朝爵翁源人遣副將鄧子龍督水軍千人駕三巨艦為前鋒邀之釡山南海戰殁子龍素慷慨初起廣東把總厯麻陽永昌參將擢總兵官所在立戰功時年踰七十意氣彌厲欲得首功急携壯士三百人躍上朝鮮舟直前奮擊賊死傷無算他舟誤擲火器入子龍舟舟中火起賊乘之子龍戰死㑹副將陳蠶季金等軍至邀擊之倭無鬭意官軍焚其舟賊大敗脱登岸者又為陸兵所殱焚溺者萬計時總兵劉綎方攻行長奪曳橋砦在朝鮮慶州西南順天城外璘以舟師夾擊復焚其舟百餘行長黨石蔓子引舟師來救璘邀之半洋擊殺之于是諸倭揚帆盡去自倭亂朝鮮七載喪師數十萬縻餉數百萬中國與朝鮮迄無勝算至秀吉死禍始息初萬世徳代楊鎬經畧朝鮮軍務畏不敢前比聞倭退兼程馳至㑹同總督邢玠奏㨗贊畫主事丁應泰等疏劾諸臣賂倭賣國帝以將士久勞苦仍發同金十萬兩犒師敘東征功首陳璘次劉綎擢都督同知又次麻貴加右都督邢玠萬世徳各予世廕董一元楊鎬俱復原職以劉東星字子明沁水人為工部侍郎總理河漕初潘季馴議開黄河上流循商虞而下厯丁家道口在今歸徳府商邱縣北出徐州小浮橋今名雲集橋在銅山縣舊城東北隅即元賈魯所浚故道也朝廷以費鉅不果東星即其地開濬起曲里鋪在今蕭縣西至三仙臺山名在蕭縣北抵小浮橋又濬漕渠自徐沛至宿遷凡五閲月工竣官軍襲浩爾齊于松山走之復其地徹哩克已東歸而套虜浩爾齊巴什圖等頻年抄掠如故據三大巢曰河套曰海西曰松山聲息交倚總督三邉李汶内聨四鎮外招番人襲破㓂衆于松山復其地築邉垣四百里己亥二十七年春三月以李化龍總督川湖貴州軍務討楊應龍先是貴州廵撫江東之令都司楊國柱指揮李廷棟率部兵三千勦應龍應龍遣子朝棟弟兆龍等迎敵于飛練堡在今平越府甕安縣東廢草塘司北十里賊佯走天邦囤在廢草塘司西北誘官軍盡殱之國柱等皆死東之罷以郭子章泰和人代而命化龍節制川湖貴三省軍事調東征諸將劉綎麻貴陳璘董一元南征六月應龍乘大兵未集遂勒兵犯綦江城中新募兵不滿三千賊兵八萬奄至圍綦江城數匝參將房嘉寵遊擊張良賢率師巷戰俱死之應龍因刦縣令焚掠出綦江庫犒師盡殺城中人投屍蔽江水為赤尋退屯三溪唐置縣宋廢故城在今重慶府綦江縣南益結九股生苗及黒脚苗為助應龍以綦江之三溪母渡南川之東郷壩立石為播界號宣慰官莊聲言江津合江皆播故土時郭子章日夜徴調各漢土兵分守南川合江等處軍聲漸振應龍偽軍師孫時泰請應龍直取重慶搗成都刦蜀王為質而應龍遷延不進止言争界給葬以冀曲赦化龍至成都以徵兵未至亦謬為好語縻之東鄉壩在南川縣西南帝聞綦江破賜化龍劍假便宜討賊十月化龍移駐重慶已而應龍屯官壩在遵義府城西北聲言窺蜀又焚東坡在平越府黄平州東爛橋在鎮逺府施秉縣南楚黔路梗黄平龍泉元置龍泉坪長官司明萬厯中改置縣今縣屬石阡府所在告急賊復據偏橋明初置長官司今屬鎮逺府出掠興隆鎮逺化龍議置勁兵萬餘據守要害通楚黔道益調諸路兵以俟大舉夏旱閏四月遣中官覈天下積儲以諸皇子婚詔取太倉銀二千四百萬兩戸部告匱乃命中官嚴覈各省積儲由是外帑日耗秋八月陜西山崩狄道縣有山長二百餘丈聲如雷者十數夜遂陷為池山南平地湧山五髙者二十餘丈冬十月加四川湖廣田賦以播州用兵故十二月武昌漢陽民變擊傷税使陳奉奉在湖廣恣行威虐慘毒備至興國州奸人漆有光訐居民徐鼎等掘唐相李林甫妻楊氏墓得黄金巨萬奉奏之帝命奉括進内庫奉因毒拷責償且悉發境内諸墓廵按御史王立賢言所掘墓乃元吕文徳妻非林甫妻奸人訐奏語多不實請罷不治而停他處開掘不報廵撫支可大崑山人以下唯諾惟謹獨分廵僉事馮應京字可大盱眙人以法裁之至是有武昌漢陽諸生妻被辱訴上官市民從者萬餘哭聲動地蠭涌入奉廨争投瓦石擊奉奉被傷諸司馳救之乃免可大遇變噤不敢發聲應京捕治奉爪牙抗疏列其九大罪奉亦誣奏應京撓命凌敕使帝怒貶應京邉方雜職事在二十八年既而奉又劾襄陽通判邸宅氏族志邸氏望出中山推官何棟如無錫人棗陽知縣王之翰綘川人詔逮訊并追逮應京應京素有惠政民號哭往送切齒恨奉奉又榜列應京罪狀于衢民益憤聚數萬人圍奉廨誓必殺奉奉逃匿楚王府衆乃投奉黨十六人于江以可大助虐燔其轅門事聞閣臣沈一貫等請撤奉回不報事在二十九年㑹江西湖口税使李道奏奉水阻商舟陸截販賈剝民病國帝乃召奉還奉至湖廣二年武昌凡冄變繼之漢口黄州荆州荆門襄陽寶慶徳安湘潭諸處變經十起幾成大亂而是時山東臨清民亦譟而逐税監馬堂縱火焚堂署斃其黨三十七人皆黥臂諸偷也詔捕首惡株連甚衆有王朝佐者素仗義慨然曰首難者我也勿累無辜臨刑神色不變臨清民立祠以祀未幾蘇州亦民變殺税監孫隆黨六人有司捕亂者民葛誠獨承論死後遇赦得釋奉歸時所得金寶財物鉅萬計可大恐為民所掠多與徒衛送之出境應京等至京繫獄久之應京及宅棟如得釋之翰竟瘐死自礦税興中使暴横所至跆藉有司謗書一聞駕帖立下二十四年則遼東參將梁心二十五年則山東福山知縣韋國賢二十六年則山東益都知縣吳宗堯二十七年則江西南康府知府吳寶秀星子知縣吳一元山東臨清守備王煬湖廣荆州府推官華鈺經厯車任重二十八年則廣東新㑹在籍通刋呉應鴻舉人勞養魁鐘聲朝梁斗輝雲南尋甸知府蔡如川趙州知州甘學書陜西富平知縣王正志二十九年則應京宅棟如之翰及武昌同知卞孔時江西饒州通判陳竒可三十年則鳯陽臨淮知縣林錡三十四年則陜西咸陽知縣宋時濟三十五年則陜西咸寧知縣滿朝薦三十七年則遼東海防同知王邦本參將李獲陽皆幽繫詔獄久者至十餘年煬應鴻志學𫉬陽俱斃獄中其他削籍貶官甚衆至士民囚繫死亡者尤不可勝紀呉宗堯字仁叔歙縣人呉寶秀字汝珍浙江平陽人華鈺字徳夫丹徒人王正志祥符人滿朝薦字震東麻陽人庚子二十八年春二月京師地震夏六月李化龍帥師平播州楊應龍勒兵數萬五道並出攻破龍泉司時化龍徴兵大集大㑹文武于重慶登壇誓師分八路進兵川師四路總兵官劉綎由綦江入總兵官馬孔英宣府塞外降丁由南川入總兵官呉廣廣東人由合江入副將曹希郴受廣節制由永寧入黔師三路總兵官童元鎮桂林右衛人由烏江在今遵義府南境上有闗明洪武中置入參將朱鶴齡受元鎮節制統宣慰使安疆臣由沙溪在今尊義府城南入總兵官李應祥由興隆入楚師一路分兩翼總兵官陳璘由偏橋入總兵官陳良玭受璘節制由龍泉入毎路兵三萬官兵三之土司七之廵撫郭子章駐貴陽湖廣廵撫支可大移沅州化龍自將中軍䇿應部署既定劉綎遂從綦江進兵破其前鋒楊朝棟僅以身免賊皆膽落連克桑木在遵義府綏陽縣東烏江河渡在烏江闗東三闗奪天邦諸囤乘勝入婁山闗屯白石應龍率諸苗決死戰綎親勒騎衝中堅分兩翼夾擊敗之追奔至海龍囤在遵義府城北為應龍穴壘時陳璘已破青蛇囤在遵義府城東安疆臣亦奪落䝉闗在遵義府城西呉廣從崖門闗在遵義府城西北入營水牛塘與賊力戰三日却之遂攻燒二闗奪賊樵汲路賊見勢急父子相抱哭上囤死守遣使詐降化龍檄諸將斬使焚書已而八路兵大集海龍囤下遂築長圍更番迭攻賊大困㑹化龍聞父喪詔以墨縗視師化龍念賊囤前險不能越令馬孔英勒兵攻其後天久雨將士馳泥淖中苦戰綎先士卒克土城應龍益廹散金募死士拒戰諸苗皆駭散無應者起提刀廵壘見四面火光燭天大兵已登囤入應龍倉皇同愛妾二闔室自縊生擒朝棟兆龍等百餘人計出師至滅賊百十有四日化龍露布以聞詔磔應龍屍戮朝棟兆龍等于市以其地置遵義平越二府分屬川貴冬十月下給事中王徳完字子醇廣安人于獄廷杖除名時鄭貴妃日有寵而王皇后多疾左右咸竊意后崩貴妃即正中宫位其子為太子中允黄輝皇長子講官也從内侍微窺得其狀謂徳完曰此國家大事旦夕不測書之史冊謂朝廷無人徳完乃屬輝具草及是上之疏入帝震怒立下詔獄拷訊尚書李戴字仁夫延津人御史周盤等連疏論救忤㫖切責御史奪俸有差閣臣沈一貫方在告力疾草奏為徳完解帝亦不懌命杖徳完百除其名復傳諭廷臣諸臣為皇長子邪為徳完邪如為皇長子慎無凟擾必欲為徳完則冄遲冊立一嵗廷臣乃不復言兩畿盜起頻年災旱又苦礦税兵民多起為盜浙人趙一平以妖術倡亂竄徐州與其黨孟化鯨等招集亡命自稱宋後署偽官期明年二月諸方並起事覺伏誅鳯陽廵撫李三才再疏陳礦税之害言陛下愛珠玉民亦慕温飽陛下愛子孫民亦戀妻孥奈何崇聚財賄而使小民無朝夕之安又言近日奏章凡及礦税悉置不省此宗社存亡所闗一旦衆畔土崩小民皆為敵國陛下即黄金盈箱明珠填屋誰為守之皆不報李三才字道甫順天通州人辛丑二十九年夏五月罷山西巡撫魏允貞中官張忠孫朝先後領山西礦税誅求百方允貞毎事裁抑疏暴其罪朝怒劾允貞抗命沮撓帝留允貞疏不下而下朝疏于部院將加譴責吏部尚書李戴都御史温純字景文二原人力争允貞賢請下允貞疏平議帝並留中山西軍民數千詣闕為允貞訟寃言官亦連章論救帝置不問允貞父年九十餘乃乞歸侍養廷議以税使害民非允貞不能制因留之允貞請益力始聴歸未幾卒晉人立祠祀之旱畿輔山東河南赤地數千里六月法司請熱審不報嗣後數年每請皆不報獄囚久繫多死秋八月復以李成梁鎮遼東成梁去遼十年之間更易八帥邉備益弛㑹總兵馬林獲罪沈一貫言成梁雖老尚堪將兵乃命冄鎮遼東年已七十六矣時土黙特長安及巴圖舊作把土今改已死宼掠漸稀而開原廣寧復設馬木二市先是泰寧朶顔扶餘諸部屢犯邉後朶顔小岱青悔禍欵塞請聞木市于義州二十三年遼東廵撫李化龍疏言木市五利廷議從之未幾遂罷并罷馬市小岱青復為宼至是成作小歹梁力請復之後以為常按扶餘舊作福餘小岱青舊青今改後倣此諸部躭市賞利争就欵以故成梁冄鎮八年遼左少事九月趙志臯卒諡文懿志臯柔弱頗為朝士所輕日本封貢志臯與石星相應和星敗劾星者必及志臯志臯乞休疏八十餘上俱不許在告四年卒于邸舍志臯才氣不如沈一貫張位而醇謹過之時帝益怠荒章疏沉閣官僚曠闕志臯亦頗論諫特以石星之敗物議叢焉以前禮部尚書沈鯉朱賡字少欽浙冮山隂人並兼東閣大學士預機務鯉素鯁亮前在禮部持典禮多所建白申時行銜鯉不附己深忌之一日鯉請告時行遽擬㫖放歸帝曰沈尚書好官奈何使去傳㫖諭留帝有意大用鯉㣲言沈尚書不曉人意内豎宻告鯉鯉拒之曰禁中語非所敢聞卒引疾歸賡充講官時宫中方興土木治苑囿賡因講宋史極言花石綱之害帝為悚然累遷禮部尚書遭繼母喪去至是趙志臯卒沈一貫請增置閣臣帝素慮大臣植黨欲用林居及久廢者遂詔鯉與賡以原官入閣參預機務冬十月立子常洛為皇太子時太子年二十羣臣屢請冊立冠婚並行沈一貫草勅請下禮官具儀而廷議有欲先冠婚後冊立者一貫不可曰不正名而苟成事是降儲君為諸王也帝意亦悟命即日舉行既而復令改期一貫封還諭㫖力爭乃立常洛為皇太子初儲位未定鄭貴妃要帝至大髙元殿祀神設宻誓立其子為太子帝因書一紙緘玉合中賜妃為符契後廷争之疆慈聖太后復堅持立長而妃又忽失懽于是皇長子遂得立為太子帝遣人取玉合封識宛然發合蟲蝕書畫矣帝悚然異之同日封諸子常洵福王後之藩洛陽常浩端王後之藩漢中常潤與常瀛並李貴妃出惠王後之藩荆州常瀛桂王後之藩衡州御批歴代通鑑輯覽卷一百十一

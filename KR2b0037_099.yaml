  text: 欽定四庫全書御批厯代通鑑輯覽卷一百明太祖皇帝
  hash: sha256:09cde6fb819871460c07637f53b43fdd240ad711db961db59392ad6336486ca1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_099-1a, image: WYG0339/WYG0339-0186a.png}
body:
  text: 帝姓朱氏名元章字國瑞濠州鍾離人先世家沛後徙句容宋李大父徙居泗州父又徙父世珍追諡仁祖髙祖伯六追諡德祖曾祖四九追諡懿祖祖初一追諡熙祖母陳氏追諡淳皇后生四子帝其季也帝生之夕紅光滿是夜數有里望見以為火奔救至則無有人咸異之年十七歲為僧與下起兵等事俱已見前二十五起兵滁州初依郭子興後遂渡江克金陵以次平定東南移師北伐凡十有五載而成帝業焉戊申洪武元年是年一歲兩係說具前卷秋八月以應天為南京開封為北京先是帝幸汴梁將營都而未果及是既克元都遂有是命且下詔將以春秋巡狩詔曰朕觀中原土壤四方朝貢道里適均其以金陵為南京大梁為北京朕于春秋往來巡狩京播告爾民便知朕意尋又命徙北平軍民于北始建六部中書省初設四部掌錢穀禮儀刑名營造之事至是定置吏户禮兵刑工六部設尚書侍郎等官仍屬中書省各部各設郎中員外郎主事分理庶務官考洪武時設官建置不在一時今據明史百志舉其要者隨時以書餘不具載大赦仍諭有司利害當興革而詔書未載者具奏以聞御史中丞劉基致仕初帝北巡命李善長與基留守中書省都事李彬犯法基按之罪當死彬素附善長善長請緩其獄基不聽奏上竟殺彬方奏至會祈雨善長曰禱雨可殺人乎基曰殺之天必雨遂殺彬由是善長銜基及帝還善長訴基專恣言基戮人壇壝下不敬會基有妻喪遂告歸徴元故官至京師既至帝御奉天門召問元政得失馬翌對曰元有天下以寬得之亦以寬失之帝曰以寬得之則聞之矣以寬失之則未之聞也元季君臣耽于逸樂馴至淪亡其失在縱弛實非寬也聖王之道寬而有制不以廢事為寬簡而有節不以慢易為簡施之適中則無弊矣帝如北京放元宫人九月江西行省參政陶安卒安博涉經史帝渡江時首謁軍門陳王道語具前吳元年徴諸儒議禮命安為總裁官諸禮多所裁定至是卒追封姑孰郡公冬十月帝還南京十一月詔使訪求賢才以孔子五十六世孫希學字士行襲封衍聖公希大世襲曲阜縣知縣元時衍聖公秩三品帝謂禮部曰孔子萬世師後嗣秩止三品弗稱其授希學秩二品賜銀印置衍聖公官屬曰掌書典籍司樂知印奏差書寫各一人立孔顔孟三氏學教授學録學司各一人尼山泗水二書院各設山長一人復孔氏子孫及顔孟大宗子孫徭役其官屬皆衍聖公選舉手詔召劉基還建大本堂延儒臣教授太子諸王上時臨幸商榷古今評論經史上嘗御文樓太子侍問近與諸臣講何史對曰漢七國事上問曲直安在對曰曲在七國上曰此講官一偏之說景帝為太子時以博局殺吳世子及為帝又輕聼朝錯黜削諸侯七國之變實由于此若為諸子講此則當言藩王當上尊天子母撓天下公法如此則為太子者知敦睦九族隆親親之恩為諸子者知夾輔王室盡君臣之義矣十二月徐達克太原元庫庫特穆爾走甘肅山西平達既定元都進取山西常遇春先下保定中山真定馮勝湯和下懷慶度太行取澤潞庫庫特穆爾遣將來禦戰于韓店在潞安府長治縣南楊璟大敗㑹元帝自開平注見前命庫庫特穆爾復大都庫庫特穆爾乃引兵出雁門由居庸以攻北平達聞之謂諸將曰庫庫特穆爾逺出大原必虛北平有孫都督時于北平置燕山六衛命都督副使孫興祖僉事華雲龍守之興祖濠人雲龍定逺人足以禦之今乘敵不偹直搗太原所謂批亢搗虛者也彼若還救太原進退失據必成擒矣諸將皆曰善乃率師趨太平庫庫特穆爾至保安元州明廢復置今州屬宣化府聞之果還救遇春謀于達曰我騎兵雖集步卒未至驟與戰必多殺傷若夜襲之可得志達然之㑹庫庫特穆爾將呼必勒瑪舊作豁鼻馬今改來約降請為內應達夜選精騎襲其營庫庫特穆爾方燃燭治兵書倉卒不知所出跣一足乘驏馬從十八騎遁呼必勒瑪降得甲士四萬遂克太原乘勢收大同分遣馮勝等狥猗氏平陽絳擒其守將榆次平遙介休以次下山西悉平己酉二年春正月立功臣廟帝親定功臣位次以徐達為首次常遇春李文忠鄧愈湯和沐英胡大海字通甫虹人馮國用勝之兄趙德勝濠人耿再成字德甫五河人華高含山人丁德興定逺人俞通海字碧泉濠人徙巢張德勝字仁輔合肥人吳良定逺人初名國興後賜名吳楨良之弟初名國後賜名曹良臣安豐人康荗才字夀卿靳人吳復字伯起合肥人茅成定逺人孫興祖凡二十二人立廟雞鳴山注見前下死者像祀生者虛其位又以廖永安字彥敬永忠之兄俞通海張德勝桑世傑無為人耿再成胡大海趙德勝七人配享太廟免山東北平山西河南及畿內諸郡田租倭寇山東此明倭冦之始二月詔修元史大都既克得元十三朝實録乃詔修元史以左丞相李善長監修前起居注宋濓漳州府通判王禕字子充義烏人為總裁徴山林隱逸之士汪克寬字德一祁門人胡翰字仲伸金華人陶凱字仲立臨海人曽魯字得之新淦人高啓字季迪長洲人趙汸字子常休寧人等十六人為纂修帝諭善長等曰元初君臣朴厚政事簡略與民休息時號小康季世嗣君荒淫權臣跋扈兵戈四起民命顛危間有賢智之臣言不見用用不見信遂至土崩其間君臣行事有善有否賢人君子或隱或顯其言行亦多可稱者爾等務直述其事毋溢美毋隱惡以垂鑒戒閲六月書成而元統以後之史未偹乃分遣使者十二人往北平山東採遺事明年續修仍以濓禕總其事先是元都破元翰林學士承旨危素趨所居報恩寺將入井寺僧大梓力挽之曰國史非公莫知公死是死國史也素遂止兵迫史庫往告鎮撫吳勉輦而出之元實録得無失及素至京授翰林侍讀學士年已七十餘一日帝御東閣側室素行簾外履聲槖槖然帝問誰也對曰老臣危素帝哂曰朕謂是文天祥耳御史王著希旨論素亡國之臣不宜列侍從詔謫居和州守余闕廟嵗餘卒危素字太金溪人元丞相伊蘇侵通州平章曹良臣擊走之大軍狥山西北平守偹單弱曹良臣守通州兵不滿千人伊蘇將萬騎營白河注見前良臣曰吾兵少不可與戰當以計走之乃于瀕河舟中多立赤幟亘十餘里鉦鼓聲相聞伊蘇驚遁良臣出精騎逐北百餘里元兵自是不敢窺北平帝耕藉田三月徐達克奉元常遇春克鳯翔元將李思齊據鳯翔張思道即張良弼注見前孔興都爾伯等駐鹿臺即鹿苑原在西安府高陵縣西南寰字記原上有禱雨祠禱雨輒應以衛奉元徐達兵入關思道遁去郭子興此郭子興一名興濠人將輕騎直搗奉元守將棄城走御史僧格實里郎中昻克舊作王可檢討阿什克布哈舊作阿失不花今並改三原尹朱春俱抗節死僧格實里力窮不屈與妻子投崖死昻克仰藥死阿什克布哈自經死朱春將死謂其妻曰吾當以死報國妻曰君能盡忠吾豈不能殉節俱投崖死遂改奉元路為西安府時關中饑詔户賑米三石民大悅遇春兵至鳯翔思齊奔臨洮夏四月命博士孔克仁句容人授諸子經功臣子弟俱令入學馮勝狥臨洮李思齊降時張思道弟良臣守慶陽徐達㑹諸將議所向皆曰張思道之才不如李思齊而慶陽易于臨洮請先慶陽達曰不然慶陽城險兵精猝未易拔臨洮西控羌戎北界河湟得之其人足偹戰鬪物産足佐軍儲蹙以大軍思齊不西走則束手就降矣臨洮既克于旁郡何有遂度隴克秦州下伏羌寧逺宋寨改縣今縣屬鞏昌府入鞏昌遣馮勝逼臨洮思齊果不戰降初思齊在鳯翔帝以書諭之且言若果能審去就當以漢待竇融之禮相報思齊得書欲降其養子趙琦本狄道人紿思齊奔吐番思齊信之遂奔臨洮琦私竊寶貨婦女逃匿山谷間思齊窮蹙遂降琦尋亦來歸思齊至京帝深慰之授江西行省左丞不之官久之遣往招諭庫庫特穆爾至則待以禮尋使騎士送之還至塞下辭曰主帥有命請留一物為别思齊曰吾逺來無所齎騎士曰願得公一臂思齊知不能免遂斷與之還未幾卒五月甲午朔日食御史中丞章溢卒溢與劉基並拜御史中丞時廷臣伺帝意多尚嚴苛溢獨存大體不以搏擊為能受詔赴閩擇鄉兵行至處州遭母喪乞終制不許鄉兵既集再乞終制許之哀毁卒帝痛惜親撰文祭之六月常遇春克開平元帝奔和林先是遇春下鳯翔詔還偹北平以李文忠副之至是遇春文忠帥步騎九萬敗元將江文清于錦州注見前敗伊蘇于全寧元置全寧路明廢故城在今喀喇沁故大寧城西北進攻大興州即興州金末嘗置治利民鎮俗呼為小興州故名此為大興州注見前分千騎為八伏守將夜遁盡擒之遂拔開平元帝北走追奔數百里獲其宗王齊克慔舊作慶生今改平章鼎珠等斬之凡得將士萬人車萬輛馬三千匹牛五萬頭薊北悉平秋七月征虜副將軍鄂國公常遇春卒于軍諡忠武詔李文忠領其衆遇春師還次桞河川在宣化府龍門縣西暴疾卒年僅四十遇春沉鷙果敢善撫士卒摧鋒陷陳未嘗敗北雖不習書史用兵輒與古合自言能將十萬衆橫行天下軍中稱常十萬長于大將軍達二嵗聽約束惟謹一時名將稱徐常喪歸帝用宋太宗喪趙普故事臨于龍江關名今在江寧縣西儀鳯門外追封開平王八月元兵攻大同李文忠擊敗之文忠㑹徐達攻慶陽行次太原聞大同圍急謂左丞趙庸廬州人曰閫外之事苟利于國專之可也遂出雁門敗元遊兵于馬邑擒其平章劉特穆爾舊作劉帖木今改進至白楊門在朔平府馬邑縣北天雨雪已駐營文忠引數騎入山察視疑有伏遽令移前五里阻水自固元兵果乘夜來劫文忠令堅壁不動質明敵大至以二營委之殊死戰度敵疲乃出精兵左右擊大破之擒其將圖魯卜俘戮萬餘人窮追至孟克桑方輿紀要在大同府邊外舊作莾哥蒼今改而還先是元帝北走屯噶哩布令都爾伯孔興以重兵攻大同欲圖恢復及是都爾伯既被擒孔興走綏德其部將斬之來降元帝知事無濟不復南向矣按噶哩布舊作蓋里泊今改定內侍官制諭吏部曰內臣但偹使令毋多人馭之之道當使畏法勿令有功畏法則檢束有功則驕恣矣封王顓為高麗國王先是顓遣使朝貢且請封遂有是命徐達克慶陽擒張良臣斬之陜西平逹自臨洮下蘭州襲走元豫王盡收其部落輜重還出蕭關克平凉張思道懼使其弟良臣守慶陽而自奔寧夏為庫庫特穆爾所執良臣以慶陽降達遣薛顯蕭人受之良臣先出迎尋復叛襲傷顯達督兵圍之良臣之降也捷奏至京帝戒達曰張思道兄弟多譎詐勿墮其計中良臣果叛達謂諸將曰上明見萬里外今日之事一如上諭然良臣叛祇取减亡耳當與諸公戮力剪之良臣求援于庫庫特穆爾庫庫特穆爾遣將攻原州陷涇陽為慶陽聲援達遣馮勝扼驛馬關在慶陽府安化縣西南舊有城敗其將哈扎噶爾舊作韓扎兒今改等良臣被圍久數出戰不利糧乏絶至煮人汁丸泥咽之守者遂開門降良臣父子俱投井引出斬之良臣驍勇軍中呼小平章養子七人皆善戰軍中語曰不怕金牌張惟怕七條鎗金牌張張思道驍將也良臣自以慶陽城高險上有井泉可據守又倚思道庫庫特穆爾為聲援賀宗哲喀扎噶爾為羽翼姚暉葛八為瓜牙故降而復叛以圖大功及被圍猶日開門出汲馳騁城下達進營逼其四門由是不得逞其求援寧夏者又悉被穫將士相繼出降城遂破父子俱死時元賀宗哲攻鳯翔指揮使金興旺與知府周焕嬰城守敵編荆為大箕形如半舫五人負之攻城矢石不能入投藁焚之輒揚起乃置諸藁中擲著其隙火遂熾敵棄箕走復為地道薄城攻不已㑹百户王輅收臨洮降卒還入城共守敵拔營去衆欲追之輅曰未敗而還誘我也偵之至五里坡伏果發還師復圍城衆欲走興旺叱曰天子以城畀我豈可去耶以輅所將皆新附乃括城中資令曰敵退當大犒新兵新兵喜協力固守持十五日敵聞慶陽下乃引去宗哲尋掠蘭州達遣馮勝率步騎往擊宗哲渡河遁勝乃還修禮書詔舉素志高潔博通古今練達時宜之士年四十以上者禮送至京纂修明年書成名大明集禮九月置中都以臨濠為中都營城郭宫殿如京師制帝召諸老臣問以建都之地或言關中險同或言洛陽天下之中汴梁為宋舊京或又云北平故元宫室就之可省民力帝曰所言皆善惟時有不同耳長安洛陽汴京周秦漢魏唐宋故都但平定之初民未蘇息朕若建都于彼供給力役悉資江南重勞其民若就北平宫室亦不無更作建業長江天塹龍蟠虎踞足以建國臨濠前江後淮有險可恃有水可漕朕欲建為中都何如羣臣皆稱善遂營之冬十月詔天下府州縣皆立學庚戌三年春正月遣徐達李文忠分兵北伐時元帝尚在近塞帝再致元帝書皆不報而庫庫特穆爾攻蘭州指揮于光都昌人力戰死徐達軍還庫庫特穆爾偵知率兵奄至蘭州圍城數重于光自鞏昌來援猝與敵遇力戰而敗被執使呼城內出降光大呼曰我不幸被執公等堅守大軍旦夕至矣敵怒披其頰遂遇害城中間光言守益固庫庫特穆爾尋引去帝以達為大將軍文忠及馮勝鄧愈湯和副之分二道出兵達自潼關出西道搗定西元州明改安定縣今縣屬鞏昌府取庫庫特穆爾文忠自居庸出東道絶大漠追元帝二月文忠至興和注見前降其守將進兵察罕諾爾擒元平章珠展次駱駝山在張家口外鑲黃旗察哈爾東南走平章沙布迪音舊作沙不丁今改次開平降平章沙逹哈舊作上都今改罕等吏部請謫有罪于儋崖不許帝曰前代謂儋崖為化外以處罪人朕今天下一家若有風俗未淳宜更擇良吏治之豈宜居罪人耶二月追封郭子興為滁陽王立廟滁州祀之仍以其三子從祀夏四月封子九人為王樉帝第二子皇后出為秦王封西安棡帝第三子皇后出為晋王封太原棣帝第四子即成祖皇后出為燕王封北平橚帝第五子皇后出為吳王有司請置護衛于杭州帝以財賦地不可封後改周王封開封楨帝第六子胡充妃出為楚王封武昌槫帝第七子達定妃出為齊王封青州梓帝第八子達定妃出為潭王封長沙檀帝第十子郭寧妃出為魯王封兖州從孫守謙帝長兄子文正之子為靖江王封桂林元帝懲宋孤立失古封建意于是擇名城大都豫王諸子待其壯而遣就藩服外衛邊陲內資夾輔其制祿親王嵗萬石置相傳官屬護衛甲士少者三千人多者至萬九千人籍𨽻兵部冕服車旗邸第下天子一等公侯大臣伏而拜謁禮無與鈞體制崇重惟列爵而不臨民分藩而不錫土與周漢封國稍異焉徐達大破庫庫特穆爾于沈兒峪在鞏昌府安定縣北之車道峴南達至安定庫庫特穆爾退屯沈兒峪達進軍薄之隔溝而壘日數交戰庫庫特穆爾遣精兵千餘人由間道劫東南壘左丞胡德濟倉猝失措軍驚擾達親擊却之德濟大海子也達械送京師而斬其下趙指揮等數人以徇明日整兵奪溝殊死戰大破庫庫特穆爾兵擒郯王濟王及國公平章以下文武僚屬千八百餘人士卒八萬庫庫穆特爾僅挾妻子數人遁去至黃河得流木以渡遂奔和林達自徽州元置今改縣屬秦州南出一百八渡河名在漢中府略陽縣東源出徽縣下流入嘉陵江渡凡一百八處故名至略陽以下注俱見前克沔州入連雲棧攻興元取之鄧愈亦自臨洮進克河州德濟至京師帝釋之而以書諭達曰將軍效衛青不斬蘇建耳獨不見穰苴之待莊賈乎且將軍在軍中誅之則已今下廷議吾且念其信州諸暨功不忍加誅繼自今將軍母事姑息是役也都督孫興祖戰死五郎口帝深悼惜追封燕山侯封陳日熞為安南國王元帝殂于應昌注見前詔諡之曰順帝國人諡曰惠宗子阿裕實哩達喇嗣五月始設科取士時以天下初定令各行省連舉三年自後三年一舉鄉試以八月㑹試以二月李文忠克應昌獲元密迪哩巴喇舊作買的里八剌今改後仿此送京師文忠聞元帝殂督兵兼程進圍應昌克之元嗣君阿裕實哩達喇北走獲其子密迪哩巴拉及后妃諸王官屬數百人并獲宋元玉璽金寶玉册鎮圭大圭玉斧等駝馬牛羊無算窮追至北慶州遼置故城在今巴林西北遼史地理志慶州元寧軍有赤山黑水即此而還道興州注見前擒國公江文清等降三萬七千人至紅螺山亦作紅羅山一統志今獨石口北御馬厰西有烏蘭哈朗噶山即紅螺山也明初李文忠敗元兵於此又降楊思祖之衆萬六千餘人是月旱六月朔帝親禱于山川壇越五日雨帝齊于西廡皇后躬執㸑為農家食太子諸王饋于齊所帝素服草屨徒步至壇席藁曝日中夜卧于地凡三日詔省獄囚命有司訪求通經術深明治道者越五日大雨頒平定朔漠詔于天下封密迪哩巴拉為崇禮侯李文忠捷奏至羣臣慶賀帝命朝臣嘗仕元者勿與翌日中書省草詔進帝見有侈大之詞諭改之帝責省臣曰元主中國百年朕與卿等父母皆賴其生飬元之興亡自是氣運于朕何預而以此張之四方有識之士口雖不言心未必以為是也可更草以進密迪哩巴拉至京師羣臣請獻俘帝曰武王伐殷用之乎省臣對唐太宗嘗行之帝曰是待王世充耳若遇隋之子孫恐不爾也令以本服朝見賜冠帶母妃皆朝中宫賜第龍光山蓋即龍舟山一統志覆舟山一名龍舟山在江寧府東北太平門內立開中鹽法山西行省請令商人于大同倉入米一石太原倉入米一石三斗給淮鹽一小引商人鬻畢即以原引赴所在繳之帝從其請召商輸糧而與之鹽謂之開中其後各行省邊境多召商中鹽以偹邊儲計道里逺近自五石至一石有差徙蘇松嘉湖杭民無業者田臨濠凡四千餘户給牛種車糧資遣之三年不徴稅其後復徙北平山後民散處諸府縣又徙沙漠遺民屯田北平又徙江南民十四萬于鳯陽又徙山西民于河北又屢徙浙西及山西民于滁和北平山東河南終洪武之世徙民最多秋七月中書左丞楊憲字希武陽曲人有罪誅憲有才辨裁决明敏然意刻深有不足于己者輒中傷之在中書欲盡易省中故事凡舊吏皆罷去更用己所親信者汪廣洋字朝宗烏郵人為右丞以憲專决依違不與較猶不能得憲意憲竟逐侍御史劉炳劾罷廣洋且請徙之廣南帝不從已復有所論劾帝覺其誣下炳獄炳吐實遂誅憲冬十一月大封功臣先是徐達李文忠師還至龍江帝出勞于江上越二日以武成告于郊廟令大都督府兵部上諸將功績帝自定其次第至是遂班爵行賞進李善長韓國公鄧愈衛國公常遇春子茂鄭國公湯和等侯者二十八人已又封汪廣洋忠勤伯御史中丞劉基誠意伯越三日大晏翌日諸臣入謝帝賜坐華蓋殿從容論取天下之略曰朕起鄉里本圖自全及渡江以來觀羣雄所為徒為民害張士誠陳有諒尤為巨蠧士誠恃富友諒恃强朕獨無所恃惟不嗜殺人布信義行節儉與卿等同心共濟初與二寇相持士誠尤逼近或謂宜先擊之朕以友諒志驕士誠器小志驕則好生事器小則無逺圖故先攻友諒鄱陽之役士誠卒不能出姑蘇一步以為之援向使先攻士誠姑蘇堅守友諒必空國而來吾腹背受敵矣及北定中原先山東次河洛止潼關之兵不遽取秦隴者以庫庫特穆爾李思齊張思道皆百戰之餘未肯遽下急之則併力一隅猝未易定故出其不意反斾而北燕都既舉然後西征張李望絶勢窮不戰而克然庫庫特穆爾猶力抗不屈向令未下燕都驟與角力勝負未可知也自正月至十二月日中屢有黑子詔求直言亥辛四年春正月李善長罷以汪廣洋為右丞相胡惟庸定逺人為左丞善長貌寬和而性忮刻比進封大國意稍驕帝頗厭之以疾致仕初帝嘗以吏事責善長劉基言善長勳舊能調和諸將帝曰是數害君君乃為之地耶吾行相君矣基頓首曰是如易柱必得大木若束小木為之且立仆帝又嘗欲相楊憲憲素善基基立言不可曰憲有相才無相器夫宰相者持心如水以禮義為權衡而已不與焉者也帝曰汪廣洋何如曰褊淺殆甚于憲又問胡惟庸曰譬之駕懼其僨轅也帝曰然則無逾先生對曰基疾惡太甚又不耐繁劇為之且孤上恩天下何患無才惟明主悉心求之目前諸人誠未見其可及憲惟庸廣洋皆敗如基言以湯和為征西將軍傅友德為征虜前將軍帥師伐明升先是帝遣平章楊璟招諭明升令奉國入覲升牽于羣議不能决升年幼國事皆决于母彭氏及丞相戴夀等璟還復以書切諭禍福升不能從已而帝遣使假道征雲南升不奉詔其將吳友仁又數冦興元徐達之克興元也令金興旺守之及達還西安友仁以兵三萬來攻决濠填塹勢甚張興旺嬰城拒守遣使告急于違遣傳友德救之友仁乃引去至是乃下詔伐之命湯和帥副將軍周德興濠州人廖永忠等以舟師由瞿塘趨重慶傅友德帥副將軍顧時字時舉濠人等以步騎由秦隴趨成都鄧愈督餉給軍二月元參政劉益以遼陽降益為元遼陽行省參政籍所部來降詔立遼陽指揮使司以益為指揮同知未幾元平章馬彥翬洪保保殺益右丞張良佐執彥翬殺之保保走依納克楚舊作納哈出今改後仿此良佐因權衛事執彥翬黨以獻帝授良佐蓋州衛指揮僉事既念遼陽懸絶納克楚未靖乃設遼東都指揮使司命葉旺六安人馬雲合肥人往鎮之納克楚者元穆呼哩裔孫為太平萬户府帝拔太平獲之待之甚厚納克楚常鬱鬱不樂帝召語之曰人臣各為其主况爾有父母妻子耶乃縱之北還其後屢為邊患帝數以書諭之皆不答夏六月湯和下重慶明升降帝之遣和友德也諭之曰蜀人聞我師西伐必悉精鋭東守瞿塘北阻金牛若出不意直搗階文門户既隳腹心必潰兵貴神速患不勇耳友德疾馳至陜西集諸軍聲言出金牛而濳引兵趨陳倉攀援巖谷晝夜行抵階州敗其將丁世珍克其城蜀人斷白龍江橋在階州南亦曰南橋造舟為梁跨白龍江上白龍江原出鞏昌府岷州經階州文縣與白水江合白水江注見前友德修橋以渡破五里關在文縣北遂拔文州進破綿州將渡漢江㑹水漲不得渡友德命伐木造戰艦欲以軍聲通瞿塘乃削木為牌數千書克階文綿日月投漢水順流下蜀守者見之皆解體其丞相戴壽等聞階文綿已破急分兵援漢州未至友德舟師已逼大破其守將向大亨于城下援師膽落友德迎擊大敗之遂拔漢州廖永忠兵至瞿塘阻鐵鎖橋先是明升遣黃仁夀以鐵索橫斷瞿塘峽口鑿兩崖石壁引鐵索為飛橋用木板置炮以拒守師不得進永忠密遣數百人持糗糧水筒舁小舟踰山度關出其上流蜀山多草木令將士皆衣青蓑衣魚貫走崖石間度已至帥精鋭出黑葉渡夜五鼓分兩軍攻其水陸寨水軍皆以鐵裹船頭置火器而前黎明蜀人始覺盡鋭來拒永忠已先破其陸寨將士舁舟出江者一時並發鼓譟而下下流之師亦擁舟急擊上下夾攻大破之入䕫州明日和始至乃分道進永忠帥舟師直搗重慶升大懼羣下勸奔成都升母彭泣曰成都可到亦僅延旦夕耳不如早降升乃靣縛銜璧輿櫬率官屬降于軍門和等承制撫慰之友德進圍成都身中流矢不退將士殊死戰突其象陳象反走躪籍死者甚衆遂降成都分兵狥州邑蜀地悉平戴夀向大亨既降至䕫峽皆鑿舟自沉死吳友仁守保寧城破執至京戮于市丁世傑守文州時友德攻之據險力戰汪興祖死焉文州破遁去已復以兵破文州殺朱顯忠友德擊走之明升既亡復集餘衆攻秦州兵敗為其下所殺秋七月以方克勤字去矜寧海人知濟寧府今兖州府濟寧州明初為濟寧府尋降為州克勤為治以德化為本不喜近名曰近名必立威立威必殃民吾不忍也時詔民懇荒閲三嵗乃稅吏不俟期徴民輒棄田去克勤稅如期區田為九等以等徴發吏不得為奸立社學數百區葺孔子廟堂延名士為師弟子繫籍者二千人盛夏郡將督民築城克勤曰民方耕奈何以畚鍤重困之請之中書省得罷役㑹天旱遂大㴻濟寧人歌曰孰罷我役使君之力孰活我黍使君之雨使君勿去我民父母封明升為歸義侯升至京羣臣請帝御殿受俘如孟昶降宋故事帝曰升幼弱事由臣下與昶異免其伏地待罪之儀授爵歸義侯賜居第九月庚戌朔日食設糧長詔以田多者為之督其鄉之稅糧以萬石為率設長副各一人輸以時至得召見語合輒蒙擢用其後官軍兑運法行而糧長不廢科斂橫溢滋為民害其孱弱者復為勢豪所陵耽延逋負率鬻産以償遂至隕身喪家云冬十二月逮漢中知府費震鄱陽人尋釋之震以賢良徴為吉水知州寬惠得民擢知漢中府嵗凶多盜震發倉粟十餘萬石貸民盜聞皆來歸鄰境民亦爭赴震令占宅自為保伍籍之得數千家至是坐事被逮帝曰良吏也釋之以為牧民者勸授寶鈔局提舉震後以提舉擢户部尚書出為湖廣布政使卒壬子五年春正月遣翰林院待制王禕使雲南被執不屈死元梁王巴咱爾斡爾密舊作巴匝剌瓦爾密今改後仿此鎮雲南大都不守順帝北去王嵗遣使自塞外達元帝行在執臣節如故蜀地既平天下大定帝以雲南僻逺難進兵而王所遣漠北使者蘇成適為北平守將所獲乃命禕齎詔偕成往招諭王待禕以禮㑹元主遣托克托徴餉雲南知禕在王所疑王有他意脅以危語王不得已出禕見之托克托欲屈禕禕叱曰天既訖汝元命爝火餘燼敢與日月爭明耶我奉使逺來豈為汝屈遂自刎梁王具衣冠斂之徙陳理明升于高麗或告陳理明升有怨言帝曰童儒輩言語小過不足問但恐為小人蠱惑將不能保始終宜處之逺方則隙無自生乃徙高麗遣徐達李文忠馮勝等分道征庫庫特穆爾達軍敗績文忠勝敗元兵而還帝以庫庫特穆爾數擾邊命達為征虜大將軍出雁門趣和林李文忠為左副將軍出居庸趣應昌勝為征西將軍出金蘭趣甘肅三月達先遣都督藍玉定逺人敗庫庫特穆爾于圖拉河源出喀爾喀鄂諾河西北下流與鄂爾冲河合昆按圖拉河舊作土剌河鄂爾河舊作阿魯渾河今並改五月庫特穆穆爾與賀宗哲合兵拒達于嶺北達軍敗死者數萬人勝至蘭州遣副將軍傅友德前驅再敗元兵拔甘肅下額齊訥路注見前次畢道山方輿紀要山在梁州邊外舊作别篤山今改元岐王多爾濟巴勒遁去獲其平章昌嘉努舊作長加奴今改等二十七人友德復追至瓜沙州斬獲甚衆文忠至鄂爾坤河源出喀爾喀杭愛山南流數百里圖拉河來入馬馬中流矢指揮李榮以所乘馬授文忠而自奪敵馬乘之文忠殊死戰遂破敵追奔至青海注見前椎牛饗士而還以鄧愈為征南將軍討湖南廣西蠻辰澧諸蠻作亂慈利土司覃垕連搆諸蠻為冦楊璟討之垕遁入溪峝師還尋復出冦周德興討之垕復遁去帝命愈往討以周德興吳良副之愈出澧州討散毛今施南府來鳯縣元時為散毛泂明設土官宣撫司𨽻施州衛諸洞蠻德興出南寧本雍州元改南寧路明為府今府屬廣西討婪鳯宋羈縻州元廢地在今思恩府田州東安元來安路地田唐置田州曰橫山郡明在今田州西為上府後降為州今州屬思恩府諸州蠻良出靖州注見前討㑹同宋縣今屬靖州五開今貴州黎平府開泰縣明初為五開衛潭溪宋置長官司元明不改今司屬黎平府古州注見前諸蠻悉平之二月安南陳叔明弒其王日熞而自立遣使入貢却之叔明篡立懼討遣使入貢以覘朝廷意主客部洪武初設六部部各四屬俱亦稱部至二十九年各部增設所屬始俱定清吏司主客部禮部屬已受表主事曽魯取副封白尚書詰使者曰前王日熞今何驟更名使者不敢諱具言其實帝曰島夷乃狡獪如是郤其貢叔明復遣使謝罪乃命以前王印視事置茶馬司户部言陜西四川茶宜十取其一以易番馬從之于諸産茶地設茶課司定稅額設茶馬司于秦洮河雅諸州自碉門注見前黎雅抵朵甘烏斯藏即今西藏明初置朵甘烏斯藏二指揮司行茶之地五千餘里西方諸部落無不以馬售者三月免京民役時當運輸官物應天府請悉役京民帝曰京民自開國以來勞費倍于外郡今兵革漸息正當休養命免其役未幾又賜京民絹户一匹高麗國王遣子弟入國子學夏六月作鐵榜戒功臣帝以功臣不能檢下作鐵榜臚目目凡有九以申戒之冬十一月納克楚侵遼東十二月詔百官奏事啓皇太子癸丑六年春正月令天下府州縣官入覲帝諭之曰慈祥愷悌身之德也刻薄殘酷德之賊也若僞為慈祥必無仁愛之實僞為愷悌必無樂易之誠爾等勉之選朝天宫在上元縣西即吳冶城宋天慶觀也明初改名道士供事郊壇天地社稷山川香幣皆令司之汪廣洋罷為廣東行省參政時左丞胡惟庸專省中事廣洋無所建白故黜之二月停科舉諭有司察舉賢才帝初以官多闕員舉人俱免㑹試赴京聽選又擇其年少俊異者張唯王輝等為翰林院編修入禁中文華堂肄業命贊善大夫宋濓為之師帝政暇親品隲其文日給光祿酒饌每食皇太子親王迭為之主嵗時賜賚甚厚至是以所取多後生少年有文無實遂罷科舉别令有司察舉賢才以德行為本文藝次之其目曰聰明正直曰賢良方正曰孝弟力田曰儒士曰孝亷曰秀才曰人才曰耆民皆禮送京師不次擢用而各省貢生亦由太學以進于是罷科舉者十年先是禮部請增廣國子生帝曰朕觀前代學者皆能出為世用後世師不知所以教弟子不知所以學以記誦為能欲其成材也難矣今祭酒乏人可訪才德兼偹宜為人師者以聞帝又嘗令國子生習騎射諭之曰古之學者文足以經邦武足以戡亂故能出入將相定安社稷今天下承平爾等雖務文學亦豈可忘武偹耶始命御史及按察使考察有司初設六科給事中先是統設給事中秩正五品掌侍從規諫補闕拾遺至是始分為六科分察六部各設給事中改從七品共八十一人後每科增都給事中一人正七品左右給事中一人亦從七品三月癸卯朔日食命徐達等帥師鎮山西北平先是帝命徐達李文忠練兵山西北平尋召還至是以元兵窺塞乃命達文忠及馮勝鄧愈湯和等帥師往鎮以偹之初元宗室四大王逃匿岢嵐山中結寨自固尋出攻武州指揮䄇桂等擊敗之四大王遁去時元降臣劉元利張時用等知四大王尚在將攻太原謀為內應桂捕斬之四大王仍侵掠不止已而納克楚侵遼東軍士死者數千人國公魯爾等侵遷安縣殺知縣餘兵復陷雲內州及崞縣至是達駐臨清遣文忠及顧時傅友德等統騎兵勝和及俞通源朱亮祖等統步兵分駐山西北平相機偹禦是年元兵復侵武朔保德諸州及雁門白登河曲撫寧諸地達俱遣將擊走之又指揮使常守道王約等追元遣兵斬其左丞相呼同克擒平章鼎鼎達又自大同府遣將掩捕武平章等于懷柔縣之三角村國按魯爾舊作驢兒呼充舊作忽都令並改復以魏觀字把山蒲圻人知蘇州府觀知蘇州府明教化正風俗郡中翕然課績為天下最擢四川行省參政以部民乞留命還任初蘇州府舊治張士誠據以為宫因遷于都水行司觀以其地湫隘還治舊基又濬錦帆涇興水利或譖觀興既滅之基帝怒命御史亷其事以聞遂被誅帝尋悔之命致祭歸葬錦帆涇在蘇州府盤門內相傳吳王錦帆以逰故名夏六月京師城成城周九十六里門十有三外城周一百八十里門十有六秋七月以胡惟庸為右丞相陳寧茶陵人為御史大夫自汪廣洋罷惟庸獨專省事帝以為才寵任之惟庸亦自勵所為多稱㫖遂至大用寧性殘刻先為蘇州知府徵賦苛急嘗令左右燒鐵烙人肌膚吏民苦之號為陳烙鐵以惟庸薦擢居憲臺益務威嚴帝屢責之寧不能改九月定有司季報歲報初府州縣户口錢糧學校獄訟每月具書于册縣達州州達府府行省類咨中書吏牘煩碎而公私之多縻費又有司决獄笞五十者縣决之杖八十者州決之一百者府决之徒以上具獄送行省或州縣受賕省府弄法出入輕重文移駁議動多淹滯帝命中書省御史臺詳議革月報為季報以季報之數類為歲報凡府州縣獄囚依律斷决毋俟轉發其有違枉御史按察使紏劾天下便之冬十一月潞州貢人參却之帝曰人參得之甚難毌重勞民往者金華進香米太原進葡萄酒朕俱止之國家以養民為務何口腹纍人閏月録已故功臣子孫功臣早世恩未及嗣者録凡二百九人十年又録丁忠等五百十一人授指揮千百户等官有差定大明律先是帝頒律令恐民不能周知命大理卿周禎字文典江寧人等為之直解又令儒臣同刑官講唐律日進二十餘條至是重命刑部尚書劉惟謙詳定大明律篇目皆凖于唐損益舊律凡六百有六條甲寅七年春正月遣將屯田西北時河南山東北平陜西山西及直𨽻淮安諸府雖有屯田然尚未廣乃命都督僉事王簡等分往諸省經理屯務明年又命李善長朱亮祖命通源撫諭諸屯勸課農事西北田野日闢屯軍三分守城七分耕作人授田五十畝給牛種教樹植復租賦官畝稅一斗民以不困而軍餉益饒遣總兵官吳禎巡海偹倭倭屢冦瀕海州縣帝遣使往諭其王良懷良懷遣僧奉表入貢未幾冦掠如故先是帝遣使倭國告以即位且詰其入冦之故良懷不受命已又遣萊州府同知趙秩往諭良懷見之曰往者蒙古欺我小邦令其臣趙姓者來訹我今新天子即位使者亦姓趙豈蒙古裔即目左右將刃之秩不為動且嚴詞折之良懷氣沮下堂延秩禮遇甚優遣其僧祖來奉表稱臣且貢方物帝甚嘉之念其俗侫佛可以西方教誘也遣僧祖闡等送使者還賜良懷大統厯及羅緞等物祖闡等至為其國演教國人頗崇奉之而良懷傲慢無禮拘之二年始放還乃以禎充總兵官都督于顯副之總江陰四衛軍出海至琉球大洋獲其兵船獻俘京師其後屢遣僧奉貢但齎書上中書省而無表且多倨慢帝却勿受命禮部移牒責漸之并諭以欲征之意自是朝貢不通而海上之警亦息二月丁酉朔日食修曲阜孔子廟立孔顔曾三氏子孫教授訓其族人夏四月都督藍玉拔興和時元將托音特穆爾守興和玉大敗其衆于白酒泉在故興和城西南擒國公特爾默齊舊作帖里密赤今改及官屬五十九人托音時穆爾棄城走五月日厯成自起兵臨濠至六年冬征伐禮樂政刑及羣臣功過四夷朝貢皆載焉既成名曰大明日歷藏之金匱宋濓請仿唐太宗貞觀政要分類更輯凡四十類名曰皇明寶訓自是凡有政事史官日記録之檢類增入焉六月汰北方府州縣官帝以北方郡縣民稀事簡命吏部量减河南北平山東府州縣官三百八人秋七月李文忠拔髙州遼置明廢故城在今喀喇沁故大寧城西北先是文忠奉命同徐達以所統將士分布山西北平屯駐因遣兵出塞獲元平章鄧慱囉特穆爾事在是年三月尋遣禆將至賽音布拉克川名在鞏昌府靖逺縣西北黃河外舊作三不剌今改擒陳安禮至順寧斬其將沁珠克壘舊作真珠驢今改至朔州擒太尉巴延布哈事在是年四月至是文忠復自率兵攻髙州拔之斬宗王托克托實哩舊作朵朵失里今改擒承㫖伯家奴舊作百家奴今改追奔至氊帽山在故大寧城北擊斬魯王獲其妃及司徒達哈勒濟舊作答海俊今改等九月遣崇禮侯密迪哩巴拉北歸遣老成宦者二人護行并遺元嗣君書冬十一月定服制貴妃孫氏陳州人薨勑禮部定服制禮部尚書牛諒等奏儀禮父在為母服期庶母則無服帝曰父母之恩一也低昂若是不情甚矣命儒臣考定宋濓等考古人論服母喪者四十二人願服三年者二十八人服期年者十四人帝曰三年之喪天下通喪人情所安即天理所在乃定制子為父母庶子為其母皆斬衰三年嫡子衆子為庶母皆齊衰杖期五服喪服皆有升降書成命之曰孝慈録頒天下貴妃無子命吳王橚行慈母服斬衰三年主喪事皇太子及諸王皆齊衰杖期太子曰在禮惟士為庶母服緦大夫以上則無服今陛下貴為天子臣忝居適長而為庶母服期非所以敬宗廟重繼體也不敢奉詔帝大怒羣臣震讋不知所出正字桂彥良言于太子曰殿下當緣君父之情不可執小禮以虧大孝因持衰服之太子乃服以拜謝帝怒始解以桂彥良名德稱字行慈溪人髙麗李仁任弒其王顓顓無子以寵臣辛肫之子禑為嗣于是仁任立禑仁任既弒顓又殺朝廷使者而遣使來告喪陽言朝使實盜所殺今已誅之帝疑其詐拘其使而遣使弔祭已仁任又為故主請諡帝曰是欲假朝命以鎮撫其民且掩其弒逆之事不許釋前使還自是朝貢皆不納乙邜八年春正月詔天下立社學帝以都邑皆有學而鄉社之民未沾教化命有司更立社學延師儒教民間子弟河决開封壞大黃寺堤百餘丈集民夫三萬餘人塞之二月帝耕藉田三月立鈔法時中外各置局鑄錢有司責民出銅毀器物輸官頗以為苦而商賈沿元之舊習用鈔而不用錢乃詔中書省造大明寶鈔其等有六曰一貫曰五百文四百文三百文二百文一百文每鈔一貫凖錢一千銀一兩餘以是為差禁民間不得以金銀貨物交易違者罪之稅課錢糧兼收錢什三鈔什七百文以下止用錢賜德慶侯廖永忠死初永忠覆韓林兒之舟于瓜安事見前帝咎之及大封功臣帝曰永忠戰鄱陽忘軀拒敵可謂竒男子然使所善儒生窺朕意邀封爵故止封侯而不公永忠又素與楊憲比憲誅永忠以功大得免至是坐僭侈失人臣禮賜死永忠勇而善謀行師有紀律平廣東四川民懷其惠俱為立祠既死子權嗣侯夏四月罷營中都帝初欲如周漢制建兩京至是以勞費罷其役誠意伯劉基卒基佐帝定天下工謀畫料事如神暇則敷陳王道帝以比張子房常呼先生而不名然性剛疾惡胡惟庸深忌之初甌括間有隙地曰談洋為鹽盜藪基奏立巡檢司守之奸民弗便也合逃軍為亂吏匿不以聞基令長子璉奏其事不先白中書省惟庸方掌省事怒使吏訐奏談洋地有王氣基圖為墓迫逐居民以致亂基坐奪俸帝初欲相惟庸基不可既而惟庸相基曰使吾言不驗蒼生福也憂憤疾作惟庸挾醫往視飲其藥如有物積腹中遂篤帝遣使護歸居月餘卒初基在元時得天文書于燕市一夕而誦其言已為髙安丞進賢鄧祥甫精象緯學盡以其術授之愈洞其要及病歸將卒前數日以天文書授子璉曰亟上之母令後人習也世傳基事多神竒然帝嘗言基數以孔子之言導豫是知陰陽風角之術基所重固不在此璉字孟藻基長子五月遣中官趙成使河州自鈔法行西畨馬至者少帝遣成齎羅綺及巴茶往河州市之馬稍集中官奉使自此始成尋為西畨多爾濟巴勒所殺秋七月己未朔日食詔百官奔喪母俟報京師地震八月元庫庫特穆爾卒自元時帝遣使通好于庫庫特穆爾庫庫特穆爾留使者不遣前後七致書皆不答既出塞復遣人招之亦不應帝益心敬之嘗大㑹諸將問曰天下竒男子誰也皆對曰常遇春帝曰遇春雖人傑吾得而臣之吾不能臣保保乃竒男子耳竟册其妹為秦王之妃保保庫庫特穆爾小字也劉基亦嘗言于帝以庫庫特穆爾未可輕及徐達敗後大兵亦稀出塞庫庫特穆爾從其主徙金山至是卒于哈喇諾海在和林北舊作哈拉那海今改之衙庭其妻毛氏亦自經死九月遣湖廣參政吳雲宜興人使雲南為所殺帝以雲南未下冉遣使招諭曾梁王使其臣鐡知院等使漠北為官軍所獲帝釋之命與雲偕行知院等以己奉使被執且得罪乃誘雲改制書詐為元使者紿梁王雲以死拒知院等殺之冬十月改都衛為都司帝初置各部衛指揮使司節制方面至是詔改為都指揮使司凡都司十有三北平陜西山西浙江江西山東四川福建湖南遼東廣東廣西河南行都司三西安大同建寧十五年增置貴州雲南二都司十二月納克楚侵遼東都指揮使馬雲葉旺擊敗之帝以納克楚兵必至敕雲等預為偹未幾果至見備禦嚴不敢攻越蓋州徑趨至金州注俱見前指揮韋富王勝等伏弩城下擒其驍將敵大沮沿柞河亦曰梓河在今奉天府蓋平縣南西流入海遁旺先引兵扼河緣河壘氷為墻沃以水經宿凝沍如堅城旁設坑穽敵至伏四起納克楚急趨連雲島在今蓋平縣西明設關于此遇氷城旁走悉陷穽中衆大潰雲自城中出合兵追擊至畢魯河即畢列河在蓋平縣東南下流入海唐代髙麗劉仁願出畢列道蓋即以此水名今又訛為畢利河斬獲無算納克楚僅以身免丙辰九年春正月遣湯和帥師鎮延安元將巴延特穆爾為邉患帝以和為征西將軍防延安是秋巴延特穆爾來侵和使傳友德破擒之降其衆二月太白晝見凡五日三日復見三月免近畿及山西陜西河南福建河南浙江北平湖廣田租夏六月改行中書省為承宣布政使司浙江江西福建北平廣西四川山東廣東河南陜西湖廣山西諸行省俱改為承宣布政使司罷行省平章政事左右丞等官設布政司一員秩從二品置左右參政秩從三品各一員後設左右布政使各一員復又增置左右參議秋七月癸丑朔日食閏九月詔求直言以五星纂度先是六月有客星大如彈丸白色止天倉越數日益有光遂入紫垣掃文昌尋入于張凡四十餘日乃滅日月相刑故有是詔冬十一月平遙訓導葉伯巨字居升寧海人應詔言事下獄死伯巨上書言三事一曰分封太侈略言先王之制大都不過三國之一今秦晉燕齊梁椘吳蜀諸國無不連城數十異時尾大不掉然後削其地而奪其權則必生觖望願及諸王未之國之先節其都邑减其兵衛限疆理以待封諸王子孫割一時之思制萬世之利莫先于此二曰用刑太繁略言臣又觀厯代開國之君未有不以任德結民心以任刑失民心者今議者曰宋元之末專事姑息以致滅亡主上痛懲其弊故用刑多裁自聖𠂻冶獄之吏趨承意㫖深刻者多功平反者獲罪雖刪定舊例减宥有差然有寬宥之名未見寬宥之實所謂實者俱在上下在下也古之為士者以登進為榮令之為士者以涃跡無為福以受玷不録為幸以屯田工役為必獲之罪以鞭笞捶楚為尋常之辱其始也取天下之士網羅捃托務無餘逸有司敦迫上道如捕重囚比至除官多以貔選所學非所用所用非所學居官一有差跌苟免誅戮則必在屯田工役之科率是為常不少顧惜此豈陛下所樂為哉誠人懼而不敢犯也然竊見數年來誅殺亦不少矣而犯者相踵自今宜存大體赦小過三曰求治太速略言昔者周自文武至于成康教化大行漢自髙帝至于文景始稱富庶致治之道果不可驟今陛下切切于民俗澆濟人不知懼乃至令下而尋改已赦而復收天下臣民莫知適從而不稱陛下求治之心也臣愚謂求治之道莫先于正風俗正風俗之道莫先于守令知所務風憲知所重今之守令不過具文案偹照刷而已風紀之司不過聽從讞獄而已非所以使民遷善逺罪為治之大者也古者教士于學俊造遞升論定後官任官後爵故成周得人為盛今天下諸生升太學者末數月遽選入官臣恐其人未諳時務上乖國政而下困黎民也開國以來選舉秀才不為不多所任名臣不為不重自今數之在者有幾此皆求治太速之過書上帝大怒曰小子間吾骨肉逮下獄瘐死時上書者又有海州學正曾秉政刑部主事茹太素皆纍萬言帝嘉秉政而杖太素尋又採太素疏中數事行之因命中書定奏對式凡臣下上書言得失者文辭母得過繁其初伯巨之上書也語其友曰今天下惟三事可患二事易見而患遲其一事難見而患速縱無明詔吾猶將言之况求言乎其意蓋為分封也然是時諸王止建藩號未曾裂土而封不盡如伯巨所言逮帝末年蕪王奉命屢出塞勢始强後因削奪稱兵遂有天下人乃以伯巨為先見云曾秉政南吕人茄太素澤州人十二月遣元臣蔡子英永寧人歸和林子英元至正中進士察罕特穆爾辟為參軍纍遷行省參政元亡從庫庫特穆爾走定西庫庫特穆爾軍敗子英單騎走關中入南山帝遣人繪形求得之傳詣京師至江濱亡去久之復被獲械過洛陽見湯和長揖不拜抑之跪不肯熱火焚其鬚不為動其妻適在洛于英避弗見至京授以官不受退而上書略曰陛下以萬乘之君全匹夫之節不降天誅反療其病易冠賜酒饌授以名爵陛下之量包乎天地臣感恩無極非不欲自竭犬馬伹名義所存不敢輒渝初志自惟五身本韋布知識淺陋過篆主術知薦躍馬食肉十有年愧無尺寸功以報國士之遇及國家破亡又復失節何面目見天下士哉臣被獲以來日夜思維咎往昔之不死至于今日分宜自裁陛下待臣以恩禮臣固不敢賣死立名亦不敢偷生苟祿若察臣之愚全臣之志禁錮南海畢其餘生則雖死之曰猶生之年帝覽書益重之館之儀曹忽一夕大哭不止人問故曰思舊主耳帝知終不可奪命有司送出塞從其故主于和林丁巳十年春正月翰林學士承㫖宋濂致仕濓年老帝憫之豫告歸濓每燕見必命茶賜坐濓素不能飲一日侍飲醉不能成步帝歡甚命侍臣咸賦醉學士歌曰使後世知吾君臣同樂如此也濓艱于步趨帝命選良馬以賜復為作良馬歌命詞臣咸賦之及歸後每歲一朝至則恩禮加厚夏四月遣鄧愈帥師擊吐蕃平之初鄧愈克臨洮遣員外郎許允德招諭吐蕃諸族而以指揮使韋正字正卿夀州人本姓寧為韋德成養子因冒姓韋德成初從帝渡江戰死守臨洮㑹吐蕃來冦正擊降之吐蕃屯洮河原正率兵往禦時河水未氷不能進忽有氷如巨屋自上流下風隨之河氷遂合正疾渡直搗敵營敵大驚以為神遂投戈降既而允德還元吐蕃宣慰司何索諾穆溫布舊作何瑣南普今改詣軍門降鎮西武靖王伯訥哷舊作卜納剌今改亦以諸郡來降遂移正使守河州時河州城邑空虛人骨山積衆欲委棄之正不可日夜撫巡勞徠不數年遂為樂土其後吐蕃所部往往邀阻蕃藏貢使先是許允德招降吐蕃于是烏斯藏攝帝師納木札勒布勒藏布及國公納木喀蕯丹巴嘉木燦等皆入朝帝置朵甘烏斯藏二衛其後數遣使朝貢多被吐蕃侵掠按納木札勒巴勒藏布舊作喃加巴藏卜納木喀蓧丹色嘉木燦舊作南哥思丹八亦監藏今並改帝命愈為征西將軍偕都督同知沐英命之分兵三道窮追至崑崙山俘斬萬計留兵戍諸要害而還五月詔韓國公李善長曹國公李文忠議軍國重事中書省都督府御史臺事悉總之議當然後奏行六月詔臣民言事實封達御前秋七月初置通政使司通政司一人秩二品左右通政各一人秩正四品左右參議各一人秩正五品掌出納諸司文書章奏封駁之事始遣御史巡按州縣巡按之設始此俾詢民間疾苦廉察風俗申教化九月以胡惟庸為左丞相汪廣洋為右丞相惟庸居政府生殺黜陟或不奏徑行內外諸司上封事必先關白四方躁進之徒及功臣武夫失職者爭走其門饋遺金帛名馬玩好不可勝數廣洋浮沈守位而已冬十一月衛國公鄧禹卒諡武順愈征吐蕃還卒于夀春追封寧河王愈沉毅簡重事母孝撫幼弟有恩敬禮儒士有士君子之行云十二月乙巳朔日食戊午十一年春正月封子五人為王椿帝第十一字郭惠妃出為蜀王封成都柏帝第十二子胡順妃出湘王封荆州桂帝第十三子郭惠妃出豫王楧帝第十四子母郜無名號漢王植帝第十五子韓妃出衛王其後桂改封代封大同楧改封肅封甘州植改封遼封廣寧徴天下布政使及知府來朝命吏部課其殿最稱職無過者為上賜坐宴有過稱職者為中宴而不坐有過而不稱職者為下不預宴序立于門宴畢然後退朝覲考核自此始三月詔奏事母先白中書省夏四月元阿育師利達拉卒子特古斯特穆爾舊作脫古思帖木兒今改後倣此嗣帝遣使往弔自為文祭之秋七月蘇松楊台諸府海溢遣使賑恤冬十月河决蘭陽十一月總兵官楊仲明討五關叛蠻平之遣內官吕玉詣其軍先是五關蠻吳面兒作亂殺靖州衛指揮過興詔以辰州指揮使楊仲明為總兵官討之既而帝遣內官吳誠往諭仲明及觀兵勢及是仲明討破諸蠻面兒逺遁帝復遣尚履奉御吕玉詣軍閲勝是役帝兩使內官至軍云帝嘗讀唐書至魚朝恩為觀軍容使謂侍臣曰當時使此曹掌兵致恣肆如此然代宗一旦去之如孤雛腐鼠小人竊柄人主决意去之亦有何難惟在斷不斷耳又曰漢末宦官雖驕縱尚無兵權唐以兵權授之馴至劫脅天子廢興在其掌握朕深鑒前轍左右服役之外重者傳命四方而已遣僧宗泐字季潭寧海人使西域帝以佛經遺佚遣泐偕其徒往求之三年而還泐還額埒軍民萬户府拜哲萬户府俱遣使隨泐朝貢額埒蘇舊作俄力思拜哲舊作巴者今並改己未十二年春正月始合祀天地于南郊帝以分祀天地情有未安乃作大祀殿于圜丘壇址合祀天地遣征西將軍沐英擊洮州畨大破之洮州十八族畨酋三副使等叛據納琳七站地在洮州西帝命英討之復命李文忠往籌軍事英至洮州舊城在洮州西南即古洮陽城也後漢書西羌傳諸羌退聚洮陽即此冦遁去追擊大破之擒三副使等築城東籠山在洮州東畨人耕種于此置洮州衛舊衛屬臨洮府今為㕔屬鞏昌府文忠言官軍守洮州餉艱民勞帝曰洮州西控蕃戎東蔽湟隴漢唐以來備邉要地今蕃冦既斥棄之不守數年後將復為患慮小費而忘大虞豈良䇿哉卒置衛守之平羌將軍丁玉初名國珍河中人後賜名擊松州畨平之先是四川威茂土司董帖里叛以玉為平羌將軍討之玉至威州貼里降時指揮胡淵童勝擊降汶川叛酋陽者七等詔置茂州衛仍命淵等從玉軍征松州及是松州平玉遣指揮髙顯城之遂併潘州于松州置松潘衛明年帝以松州逺在山谷屯種不給命罷之未幾指揮耿忠經略其地言松州為畨蜀要害地軍衛不可罷乃命復置秋七月以李文忠領大都督府事八月給致仕官誥敕復其家秩三品以上仍舊四品以下各加一級給誥敕復其家終身無所與其居鄊與宗族親黨相見序尊卑如庶家人禮凡異姓無官者相見不答禮民則以官禮謁見冬十二月賜汪廣洋死廣洋與胡惟庸同相惟庸所為不法廣洋知而不言御史中丞涂節言劉基遇毒死廣洋宜知狀帝問之對曰無有帝怒責廣洋欺罔貶海南舟次太平賜死徴元吏部侍郎巴延資中西域人祖父仕江西因家馬舊作伯顔子中令改不至飲鴆卒巴延資中初為元建昌教授江西盜起授分省都事使守贛州而陳友諒兵已破贛巴延資中間道走閩陳友定素知之辟為行省員外郎巴延資中出竒計收復建昌浮海如元都獻捷纍遷至吏部侍郎持節發廣東何真兵救閩至則真已降于廖永忠巴延資中墮馬求死不得折其一足永忠釋之乃變姓名浪迹江湖間帝求之不得簿録其妻子巴延資中竟不出常齎鴆自隨誓不復仕至是江西布政使沈立本言于朝以幣聘巴延資中慨然曰死晚矣為歌七章哭其祖父師友飲鴆死庚申十三年春正月胡惟庸謀反及其黨陳寧涂節等皆伏誅惟庸貪賄弄權無所畏忌其定逺舊宅井中忽生石笋出水髙數尺諛者爭言瑞氣又言其祖父塜上夜有光惟庸益喜自負有異謀吉安侯陸仲亨自陜西歸擅乘傳平凉侯費聚奉命招降蒙古無功帝皆切責之二人懼惟庸陰以權利脅誘之令在外收輯軍馬又與陳寧坐省中閲天下軍馬籍令都督毛驤取衛士劉遇賢亡命魏文進等為心膂太僕寺丞李存義者太師善長弟惟庸壻李佑父也惟庸陰令說善長善長驚悸曰爾言何為者若爾九族皆滅後十餘日惟庸又令存義告善長善長不能制惟庸乃遣指揮林賢下海招倭與期㑹又遣元故臣封績致書稱臣于元請兵為外應事皆未發㑹惟庸子馳馬于市墜死車下惟庸殺挽車者帝怒惟庸請以金帛給其家不許惟庸懼乃與御史大夫陳寧中丞涂節等謀起事既而節見事不成遂上變告帝大怒命羣臣更訊復自臨問乃誅惟庸寧以節本預謀并誅之善長仲亨置不問罷中書省改大都督府為五軍都督府帝懲惟庸亂政罷丞相以政歸六部分大都督府為中左右前後五府征調則𨽻兵部後復敕諭羣臣國家罷丞相設府部院寺分理庶務事權歸于朝廷立法至為詳善以後嗣君母得置議丞相臣下敢以請者置重典始南北更調用人北平山西陜西河南四川人于浙江江西湖廣直𨽻用之浙江江西湖廣直𨽻人于北平山東山西陕西河南四川廣東廣西福建用之廣西廣東福建人亦于山東山西陜西河南四川用之考核不稱職及以事降謪者不分南北悉于廣東廣西福建汀漳江西龍安安逺湖廣郴州之地選用沐英襲元將托和齊舊作脫火赤今改後倣此等于額齊訥路擒之元國公托和齊知院按珠舊作愛足今改屯和林帝命英擊之英至靈州偵知托和齊等在額齊訥路遂渡黃河經寧夏厯賀蘭山注見前涉流沙七日夜至其境去敵營五十里分軍為四乘夜銜枚而進合圍之擒托和齊按珠盡獲其部曲以歸已而英又襲元桞城王虜之復獲平章呼圗克特穆爾豳王額琳沁及其部曲十四百人遂還肅州呼圖克特穆爾舊作忽都帖木兒額琳沁舊作亦憐真今改三月减蘇松嘉湖糧額畝科七斗五升至四斗四升者减十之二四斗三升至三斗六升者概徴三斗五升其以下仍舊初帝平吳怒蘇松嘉湖為張士誠守乃籍諸豪族及富民田以為官田按租簿為稅額楊憲為司農卿又以浙西地膏腴增其加二倍故浙西官民田賦視他方倍蓰已而詔減四府極重田稅之半然重者每畝猶徵至七斗以上至是復命户部計其數而减之而蘇州一府糧二百七十四萬七千餘石額與浙江通省埒其重猶如此燕王棣之國先是秦晉二王俱各之國尋復來朝及是燕王始之藩北平其後諸王相繼之藩不具書夏四月命羣臣各舉所知五月雷震謹身殿大赦詔免天下今年田租六月雷震奉天門帝避正殿省愆罷王府工役秋七月詔天下學校師生日給廪膳九月置四輔官帝以密勿論思不可無人乃建四輔官以四時為號詔天下舉賢才户部尚書范敏薦耆儒王本不詳里籍等召至告于太廟以本及杜佑安邑人龔斆鉛山人為春官杜斆字致道壺關人趙民望藁城人吳源甫田人為夏官秋冬官缺以本等攝之俱兼太子賓客位列公侯都督之次敕以協贊政事均調四時既而斆等相繼罷本坐事誅復召安然祥符人李幹綘州人何顯周內黃人等代之然尋卒幹出為知府顯周亦罷此職遂廢冬十月安置致仕翰林學士承㫖宋濓于茂州道卒濂孫慎坐胡惟庸黨被刑籍其家械濓至京師怒欲誅之皇后以濓親教授太子諸王乞赦其死帝意解發茂州安置行至夔州以疾卒濂傅太子十餘年一言一動必以禮一起一居必于道至省政教及前世興亡事必拱手曰當如是不當加彼太子每斂容嘉納敬禮未嘗少衰四方求文者非其人不與日本使嘗奉勑請文以百金為獻却不受帝問濓對曰天朝侍從而受小夷金非所以崇國體也帝然之海外諸國朝貢至者必問濓安否其卒也朝野莫不惜之辛酉十四年春正月元兵侵邉命徐達禦之先是元平章鄂勒哲布哈鼐爾布哈舊作乃兒不花今改後倣此犯永平指揮劉廣戰歿千户王輅擊敗之擒鄂勒哲布哈至是命達帥湯和等討鼐爾布哈達率諸將出塞傳友德夜襲灰山方輿紀要在故大寧城東北克之沐英等獲全寧四部以歸達仍鎮北平自是每嵗春出冬暮召還以為常定賦役籍詔天下編賦役黃册凡鄉一百十户為里里有里長十户為甲甲有甲首歲以里長一人董一里之事應役一年一周謂之排年其先後以丁糧多寡為序在城為坊近城曰廂役亦如里里編一册册有丁有田以户為主册首為圖鰥寡孤獨不任役者附十甲後為畸零册有四一進户部面用黃紙故謂黃册其三用青紙布政司府縣各留一焉每十年有司更定其册以丁糧增減而升降之其後復命國子生分行州縣隨糧定區區設糧長四人量度田畝方圓次之以字號編類為魚鱗圖册黃册以户為凖魚鱗册以土田為凖魚鱗册為經土田之訟質馬黃冊為緯賦役之法定焉年事在二十三月赦秋八月河決原武并決祥符中牟明年春復決陜西朝邑其秋又決榮澤湯武九月命傅友德等征雲南帝以雲南自恃險逺遣使招諭輒為所害乃以友德為征南將軍藍玉為左副將軍沐英為右副將軍率步騎三十萬往征之諭曰朕覽輿圖識雲南扼塞當先遣騎將率一軍自永寧向烏撒而大軍自辰沅入普定分據要害然後進師曲靖曲靖雲南咽喉彼必併力子此以抗我師既下曲靖一將軍向烏撒以應永寧之師大軍直搗雲南破之必矣雲南破分兵徑趨大理可母頓刃也永慶元州尋廢明復置今州屬貴州安順府辰沅烏撒注俱見前普定元路明為府今為安順府治曲靖本唐曲州靖州地元并為路明改府今府屬雲南冬十月壬子朔日食制法司録囚㑹翰林春坊官給事中集議以聞十二月命翰林春坊官考驗諸司奏章傅友德等下曲靖元梁王巴咱爾幹爾密走普寧唐縣元為州今州屬雲南府明史作普寧考雲南有晉寧州而無普寧忽納寨又在普寧普蓋晉之訛也今依一統志改正自殺藍玉沐英遂克雲南友德至湖廣遣都督胡海字海洋定逺人等由永寧趍烏撒平凉侯費聚趨普定友德玉英率大軍由辰沅趨貴州克普定普安元路明為州今州屬貴州南籠府梁王遣司徒平章達爾瑪舊作達里麻今改後倣此將兵十餘萬屯曲靖以偹英謂友德曰彼不意我師深入若倍道疾趨出其不意破之必矣友德是之遂進師來至曲靖數里忽大霧四塞衝霧行阻水而止則已臨白石江在曲靖府南寧縣東北下流入南盤江矣頃之霧霽達爾瑪大驚友德欲渡英曰我兵疲恐為所扼乃帥諸軍嚴陳若將渡者而竒兵從下流濟出其陳後張疑幟山谷間人吹一銅角元兵驚擾英急麾軍渡江縱鐡騎搗之生擒達爾瑪俘獲萬計友德自率衆擊烏撒分遣玉英趨雲南梁王聞敗度不能支乃走晋寧州之忽納寨在晋寧寧西驅妻子赴滇池死與其左丞托迪舊作達的今改右丞魯爾等俱自殺玉英師至板橋驛召在雲南府昆明縣東右丞觀音保以城降玉等整軍入城戒輯軍士秋毫無犯友德擊破烏撒蠻遂城之又克七星關在貴州大定府畢節縣西七星山上下臨七星河有城當雲貴川三省之交為喉吭之地以通畢節明衛今為縣屬大寧府于是東川烏蒙􅉭部水西注俱見前諸蠻皆望風降附壬戌十五年春正月命朝覲官各舉所知一人閏二月藍玉沐英克大理擒土酋假世屬郡悉下雲南平先是景川侯曹震定逺侯王弼分兵下臨安古句町國元臨安路明為府今府屬雲南威楚注見前諸路及是玉英帥師至大理大理城倚㸃蒼山在大理府太和縣西山高千餘仞有峯十九蒼翠如玉䝉氏嘗封為中嶽西臨洱河即葉榆水注見前以上下二關為固上關曰龍首關在太和縣北當洱河之首下關曰龍尾關在太和南南當洱河之尾皆南詔皮羅閣所築土酋假世元憲宗取雲南假智興降封為摩和爾綽克管領八方世有大理十傳至假寶世寶之子摩和爾綽克舊作摩訶羅嵯今改聞大兵且至聚衆扼下關英攻之不克乃命王弼等東趨上關自以兵綴下關為犄角勢别遣胡海夜從間道渡河繞出㸃蒼山後緣崖而上立旗幟昧爽軍在下關者望見之皆歡譟蠻衆驚亂英身先士卒䇿馬渡河水沒馬腹將士隨之胡海之師亦自山而下遂斬關入拔其城世就擒分兵取鶴慶元路明為府今府屬雲南略麗江元宣撫司明為府今府屬雲南破石門關在麗江府舊通安州西下金齒注見前于是諸蠻部皆下雲南平雲南置都指揮司布政司貴州置都指揮司夏四月殺大理寺卿李仕魯字宗孔濮州人帝頗好釋氏教詔徴東南戒律僧數建法㑹于蔣山應對稱㫖者輒召入禁中賜坐講論時寄以耳目諸僧怙寵請為釋氏創立職官于是設左右善世闡教等皆高其品秩道教亦然仕魯疏言陛下方創業意指所向即示子孫萬世法程奈何舍聖學而崇異端章數上不聽仕魯性剛介以闢佛自任及言不見用遂乞骸骨置笏帝前帝大怒命武士捽搏之立死階下免畿內浙江江西河南山東田租置錦衣衛錦衣衛始此初置拱衛司管領校尉已改為親軍都尉府而設儀鸞司至是罷儀鸞司改置錦衣衛掌侍衛緝捕刑獄之事指揮使秩正三品鎮撫司𨽻焉帝時有誅戮輒下鎮撫司雜治不由三法司其從校五百人祿秩名號無異京衛軍士而獨不𨽻大都督府稱為親軍五月帝詣國子監釋奠于先師帝初以應天府為國子學至是改學為監親行釋菜禮命祭酒吳顒等進講遂親說尚書大禹臯陶謨洪範大㫖賜宴還國子監分六堂以館諸生厚給廩餼歲時賜布帛文綺遇諸令節俱賞節錢流廣平府吏王允道于嶺南允道請開磁州鐡冶帝曰朕聞治世無遺賢不聞無遺利今軍器不乏若復設此必重擾民杖之流海外秋八月復行科舉三年一行為定制時雖復行科舉而監生與薦舉人才參用者居多嘗擢監生劉政等六十四人為布政按察使參政及副使等官或用為御史給事中而薦舉之途尤廣賢良郭有道秀才范敏曽泰稅户人才鄭沂儒士趙槩皆起家為尚書其他由布衣登大僚者不可勝數皇后馬氏崩后寢疾羣臣請禱祀求良醫后謂帝曰死生命也禱祀何益且醫何能活人使藥不效陛下能不以妾故而殺諸醫乎疾革帝問所欲言曰願陛下求賢納諫子孫皆賢臣民得所而已遂崩后勤于內治暇則􅊰求古訓以宋多賢后命女使録其家法朝夕省覽或言宋過仁厚后曰過仁厚不愈于刻薄乎帝前殿决事或震怒后伺帝還宫輒隨事微諫帝為緩刑戮帝幸太學還后問生徒幾何帝曰數千后曰人才衆矣諸生冇廩食妻子何所仰給帝遂立紅板倉積糧賜其家諸將克元都俘寶玉至后曰元有是而不能守意者帝王自有寶歟帝曰后意謂得賢為寶耳后拜謝曰誠如陛下言崩後宫人思之作歌曰我后聖慈化行家邦撫我育我懷德難忘懷德難忘于斯萬年毖彼下泉悠悠蒼天九月葬孝慈皇后選僧侍諸王髙后崩諸王奔喪將還帝命各以一僧與之令誦經修佛事吳僧道衍即姚廣孝長洲人先以宗泐薦名在燕府籍中見燕王棣即深相納數以竒謀進棣甚信任之冬十月更定都察院官制初吳元年置御史臺設御史大夫秩從一品中丞正二品及侍御史從二品等官後罷臺在十三年設都察院在十四年都御史秩正七品分監察御史為十二道浙江江西福建廣東廣西山東北平四川河南湖廣山西陜西秩正九品至是升都御史正二品御史正七品後又設副都御史秩正三品僉都御史秩正四品方御史臺初建帝謂鄧愈劉基等曰國家立三大府中書總政事都督掌軍旅御史掌紏察朝廷紀綱盡繫于此其後罷中書省政歸六部然部有專司惟都察院總憲綱專紏劾為天子風紀耳目之司其職綦重云十一月置殿閣大學士以禮部尚書邵質為華蓋殿大學士翰林學士宋訥字敏仲滑人為文淵閣大學士檢討吳伯宗名祐以字行金溪人為武英殿大學士典籍吳沉字濬仲蘭溪人為東閣大學士又置文華殿大學士徴耆儒鮑恂字仲孚崇德人余詮字士平豐城人等為之以輔導太子秩俱正五品當是時以翰林春坊詳看諸司奏啓兼司平駁大學士特侍左右偹顧問而已癸亥十六年春二月始令天下學校嵗貢士于京師三月傳友德師選命沐英留鎮雲南其後沐氏遂世鎮雲南復鳯陽臨淮二縣民世世無所與秋八月壬申朔日食甲子十七年春三月曹國公李文忠卒諡武靖文忠疾帝親臨視及卒御製文祭之追封岐陽王文忠器量沉宏常師事金華范祖幹胡翰通曉經義其釋兵家居恂恂若儒者常勸帝少誅戮又諫帝征日本及言寵宦者過甚非天子不近刑人之義以是積忤旨頗不免誚讓云頒科舉條式子午邜酉年鄉試辰戌丑未年㑹試鄉試中式者各布政使司送禮部㑹試㑹試中式者赴殿試凡鄉會試試各三場第一場弒四書義三道經義四道四書主朱子集注易主程朱傳義書主蔡沈傳及古注疏春秋主三傳及胡安國張洽傳禮記主古注疏二場試論一判語五詔誥章表各一三場試經史䇿五其應試者國子學生及府州縣學生之學或者儒士之未仕者官之未入流者皆由有司申舉其罷官吏及娼優之家與居父母喪者皆不許入試秋七月禁內官預外事敕諸司母通內官監文移盱眙人獻天書誅之八月河决開封杞縣冬十月河南北平水遣賑之閏月詔天下刑獄刑部都察院詳議大理寺覆讞奏决乙丑十八年春二月雷電雨雪詔臣民極言得失太傅魏國公徐達卒諡武寧先是太隂犯上將帝心惡之時達在北平召還至是病卒帝為輟朝悲慟不已追封中山王賜葬鍾山之隂御製神道碑文以紀其功達言簡慮精屢為大將善拊循與下同甘苦士無不思效死尤嚴戢部伍單車就舍禮儒生談議終日在帝前恭敬若不能言帝嘗稱之曰受命而出成功而旋不矜不伐婦女無所愛財帛無所取中正無疵昭明乎日月大將軍一人而已三月始選進士入翰林及為庶吉士帝廷試進士擢一甲丁顯建陽人等為翰林院修撰二甲馮京等為編修吳文等為檢討進士入翰林自此始命進士觀政于諸司其在翰林院承敕監中書六科者曰庶吉士在六部都察院諸司者仍稱進士庶吉士及觀政進士之名亦俱自此始定翰林官品員先是翰林官無常員吳元年置翰林學士侍講學士直學士及修撰編修尋又置學士承㫖侍讀學士增待制應奉等員已而承㫖直學士待制俱革亦無定秩學士先為正三品後改從三品侍講學士正四品直學士正五品侍讀學士從四品修撰編修正八品至是更定品員著為永制學士一人正五品侍讀侍講學士各二人並從五品侍讀侍講各二人並正六品始以侍讀先侍講史官修撰從六品編修正七品檢討從七品俱無定員其侍書及待詔則不常設秋七月遣使封髙麗國王禑先是髙麗貢使數至帝皆不納已而帝諭政府令遣官往視嗣王何如政令安在若政令如前嗣王不被拘囚則可許所請否則必討無赦及是禑又上表請襲爵并乞故王諡乃遣使封之賜故王顓諡曰恭愍九月古州蠻亂命楚王楨率湯和討平之親王統兵自此始先是吳面兒既遁帝諭楊仲明不必窮追至是面兒復冦古州乃命楨率和討之和至古州擊平亂蠻擒面兒送京師誅之楨還藩冬十月頒大誥於天下帝患民狃元習徇私滅公乃輯官民過犯條為大誥其目有十頒學宫以課士里置孰師教之囚有能讀大誥者罪減等其後復命刑官撮大誥條目要略附載于律謂之律誥而大誥所載諸峻令未嘗輕用云十一月免河南山東北平湖廣田租十二月平緬古百夷地宣置麓川平緬二路明初并為麓川平緬慰司後改隴州宣撫司今司𨽻雲南永昌府騰越州東北距布政司六十六里宣慰使思倫發叛先是大兵下金齒平緬壤地相接思倫發懼請降詔以為宣慰使尋又命兼統麓川之地至是思倫發反率衆十餘萬冦景東南詔銀生府元置開南州明為景東府今府屬雲南都督馮誠禦之㑹天大霧官軍失利千户王升戰死丙寅十九年夏六月詔有司存問髙年貧民年八十以上月給米五斗酒三斗肉五斤九十以上歲加帛一匹絮一斤有田産者罷給米應天鳯陽冨民年八十以上賜爵社十九十以上鄉士天下富民年八十以上里士九十以上社士皆與縣官均禮復其家秋七月詔舉經明行修練達時務之士年六十以上者置翰林偹顧問六十以下于六部布按二司用之冬十二月癸未朔日食御批厯代通鑑輯覽卷一百

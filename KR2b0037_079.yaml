front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷八十宋徽宗皇帝甲申崇寜三年春正月鑄當十大錢
  hash: sha256:c2dcae3ee4dbc9f59b6d30a1ece651613eff9ff5aa1cba2e6e62d1a00331896c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_079-1a, image: WYG0338/WYG0338-0290a.png}
body:
  text: 蔡京當政將以利惑人主乃用其黨陜西轉運副使許天啟言請鑄當十錢募私鑄人為官匠并其家設營以居之謂得昔人招納天下亡命即山鑄錢之意其錢惟令陜西鐡錢地分鑄造却于銅錢地分行使議者多言非便帝亦知其不可而卒從之時京又以河東運判洪中孚言遼夏以中國錢鐡為兵器若雜以鉛錫則脆不可用乃改鑄夾錫錢即令許天啟推行其法毎夾錫錢一折銅錢二至大觀元年乃降錢式及錫母于鑄錢諸路先是錢制有銅有鐡折二折三當五随時立制慶厯中范雍知永興軍始請鑄折十錢盜鑄者衆公私病之後改折二盗鑄乃息至是復行當十錢又兼行夾錫錢法由是益壊命方士魏漢津本蜀黥卒定樂鑄九鼎帝鋭意制作以文太平蔡京復毎為帝言方今帛幣所積贏五千萬和足以廣樂富足以備禮帝惑其説制作營造之事漸興至是京客劉昺字子蒙開封人為大司樂引蜀方士魏漢津見帝獻樂議破先儒累黍之非用夏禹以身為度之文漢津謂禹用左手中指三節三寸謂之君指裁為宫聲之管又用第四指三節三寸謂之臣指裁為商聲之管又用第五指三節三寸謂之物指裁為羽聲之管第二指為民為角大指為事為徴民與事君臣治之以物飬之故不用為裁管之法得三指合之為九寸即黄鐘之律定矣黄鐘定餘律從而生焉乃取帝指三節三寸為度定黄鐘之律請先鑄九鼎以備百物之象然後均弦裁管為一代之樂制帝從之漢津本剰員兵士自云居蜀師事唐仙人李良授鼎樂之法皇祐中與房庶俱被召至京而黍律己成不得仲因所學而退或謂漢津嘗被執役于范鎮窺見其制作掠取之蔡京神其説託之于李良云然漢津曉隂陽數術多竒中嘗説所知曰不三十年天下亂矣人未之信也三月令天下坑冶金銀悉輸内藏大内災夏四月罷講議司詔諸州見行新法文字許直達尚書省其講議司官屬依制置三司條例司例推恩自張康國字賓老揚州人以下遷官者幾四十人尚書省復言追復先朝法度以來無慮千百數尚懼講求未盡乞令諸路官司有未興復者各具以聞從之王厚復鄯廓州注見前五月封蔡京為嘉國公以厚為武勝節度留後厚帥大軍次湟命髙永年本河東蕃官將左軍别將張誠將右軍自將中軍期㑹宗噶爾舊作宗哥今改川在西寜縣西東北流入湟河羌置陣臨宗水即宗噶爾川宋史地理志宗水南有宗谷口後訛曰宗哥因以名城倚北山希斯羅斯張黄屋建大斾乘高指呼望中軍旗鼓爭赴之厚麾遊騎登山攻其北親帥彊弩迎射羌退走右軍濟水撃之大風揚沙翳羌目不得視遂大敗戰首四千三百餘級俘三千餘人羅斯以一騎馳去其母龜兹公主與諸酋開城門降厚計羅斯必且走青唐將夜追之童貫以為不能及遂止師下青唐知羅期留一宿去貫始悔之厚將大軍趨廓州羌酋喇實釣凌結舊作落施軍令結今改以衆降遂入廓州詔加京司空封爵而超􅕥厚武勝軍節度觀察留後置京西北路交子所蔡京請置京西北路専管切幹通行子所交倣川峽路立偽造法通情轉用幷鄰人不告者皆罪之私造交子紙者罪以配徒已而令諸路更用錢引凖新様印製四川如舊法惟閩浙湖廣不行錢引趙挺之以為閩乃京鄉里故得免焉六月圖熙寜元豐功臣于顯謨閣以王安石配享孔子辟雍初成詔荆國公王安石孟軻以來一人而已其以配享孔子位次孟軻吏部尚書何執中字伯通處州龍泉人請開學殿使都人縱觀置書畫算學書學習篆隸注見前草漢黄門令史逰解散隸體作章草後漢張芝變為今草三體明說文漢許慎纂字説即王安石所撰爾雅晋郭璞注博雅隋曹憲撰方言漢揚雄撰其説文則令書篆字著音訓餘書皆設問答以所解義觀其能通書意與否畫學以不倣前人而物之情態形色俱若自然筆韻簡高為上算學以九章算術也周公所作凡九篇方田粟米差分少廣均輸方程旁要贏不足鉤股見後漢書注周髀即盖天之說周公受之商高周人志之故曰周髀髀股也股者表也見晉書天文志及假設疑數為算問仍併厯算三式天文書為本科其生皆占經以試其取士法畧如太學上舍三等推恩以通仕登仕將仕郎為次未㡬即罷重定黨人刻石朝堂詔重定元祐元符黨人及上書邪等者合為一籍通一百九人刻石于朝堂餘並出籍自今毋復得彈奏户部尚書劉拯字彦修宣州南陵人言漢唐失政皆自朋黨始今日指前日之人為黨焉知後日不以今日為黨乎大抵人之過惡自有公論何必悉拘于籍而禁錮之哉蔡京大不懌風臺臣劾之出知蘄州秋七月復行方田法八月許將罷将居政府十年不能有所建明中丞朱諤字聖與秀州華亭人收将舊謝章表析文句以為謗且謂将在元祐則盡更元豐之所守居紹聖則隂匿元祐之所為遂罷知河南府諤蔡京黨也九月以趙挺之吳居厚為門下中書侍郎張康國鄧洵武為尚書左右丞紹聖中蔡京治役法薦康國為屬及京當國定當籍議紹述康國皆預密謀故京引援之甚力自福建轉運判官不三嵗入翰林為承㫖遂拜左丞以胡師文為戶部侍郎初東南六路糧斛自江浙起綱至於淮甸以及真揚楚泗為倉七以聚蓄軍儲復自楚泗置汴綱般運上京以江淮發運使董之故常有六百萬石以供京師而諸倉常有數年之積州郡告歉則折收上價謂之額斛計本州嵗額以倉儲代輸京師謂之代發復于豐熟以中價收糴糓賤則官糴不至傷農嵗歉則令民納錢民以為便本錢嵗増兵食有餘其法良善及蔡京當國始求羡財以供侈費于是以其姻家胡師文為法運使以糴本數百萬緡充貢入為户部侍郎自是繼者效尤時有進獻而本錢竭矣本竭不能增糴儲積漸空而輸般之法壊罷科舉法時雖設辟雍大學以待士之升貢者然州縣猶以科舉貢士蔡京以為言遂詔天下取士悉由學校升貢其州郡發解凡試禮部法並罷而每嵗試上舍生則差知舉如禮部法云冬十二月復封孔子為衍聖公是嵗大蝗以陶節夫字子禮鄱陽人經制陕西河東五路初蔡京任節夫師鄜延節夫誕妄特甚每進築一城寨即奏云此西人要害必争之地未一年自常調遷至樞密直學士然未嘗遣一騎一卒出塞盖與敵戰則有勝負獨進築則無虞又皆逺靈武數百里之地敵所不争故皆得就功論賞而京力主之奏使經畧五路先是秦鳯招納司言階州生蕃納土得邦疊潘三州計二千五百里大小首領一百二十人于是本路經畧胡宗回等俱進秩然所奏實皆誕妄吐邦州地在今四川松潘衛疊州注見前潘州宋初蕃巴勒結地故名松潘衛舊冇上中下三潘州路接洮岷今漳臘營即故下潘州地乙酉四年春正月蔡卞罷卞居心傾邪一意婦翁王安石所行為至當以兄京晩達而位在上致已不得相故二府政事時有不合至是京請以童貫為制置使卞言不宜用宦者必誤邊計京于帝前詆卞卞求去遂出知河南府以童貫為熙河蘭湟秦鳯路經畧安撫制置使三月王江蠻即古州蠻古州在今貴州永平府西北與廣西栁州府接界州西有江曰古州冮亦曰福禄冮廣西右江之上源也流逕栁州府懷逺縣縣舊名王口砦羣蠻居此故冇王江之名内附詔置懷逺軍今為懷逺縣黎續綱目是條提綱作黎峒王江蠻内附考峒蠻乃黎母山黎人宋史别冇黎峒傳與王冮各不相渉徽宗紀但云王江蠻歸順並無黎峒字惟王祖道傳云黎人願為王民請置鎮州于黎母山心奏在大觀元年亦非崇寧四年事也續綱目誤以黎峒為溪峒遂與王江混而為一今依本紀書綱節採王祖道傳作目而以黎峒事附注目後自蔡京以開邉蠱上由是邉臣皆欲乗時邀取冨貴知桂州王祖道字若愚福州人誘王江蠻楊晟免等使納土誇言向募者百二十峒五千九百家十餘萬口又稱王江山川形勢據諸峒要害宜開建城邑置諸峒司主之詔從其請以王口砦為懐逺軍尋改平州又分其地置允格二州允州以安口隘置格州以中右州置尋改從州故城俱在今黎平府永從縣増設提舉溪峒宫後二年祖道復言黎人歸化請于黎母山心置鎮州為下為督府詔從之賜軍額曰静海亦黎母山今在廣東瓊州府定安縣西南山有五峯名五指山黎人錯處其間其服屬州縣者為熟黎其居山峒無征徭者為生黎鎮州政和中廢故城在今瓊州府感恩縣考宋時雷瓊厓萬諸州俱屬廣南西路故祖道奏請建置復銀州竄知慶州曾孝序字逄源泉州晋江人於嶺南初孝序察訪湖北過闕與蔡京論講議司事曰天下之財貴于通流取民膏血聚於京師恐非大平法京銜之遂出知慶州至是京行結糴始于熈寜中以川茶市易軍儲運給熙河謂之結糴其後蔡京復行之陜西俵糴亦始于熙寜中以米塩鐵鈔在京粳米付都提舉市易司貿易度民田入多寡豫給錢物秋成于澶州北京及縁邉入粟米封椿謂之俵糴後蔡京命坊郭鄉村以等第給錢俟収以時價入粟邉郡之法盡括民財充數孝序上書曰民力殫矣一有逃移誰與守邦京益怒遣御史宋聖寵劾其私事追逮其家人鍜鍊無所得但言約日出師㡬誤軍期除名竄嶺表夏人冦涇源遂誘吐蕃圍宣威城本釐牛城崇寜中改名今在西寜府西寜縣北執知鄯州髙永年殺之詔貶王厚為郢州防禦使蔡京使王厚招夏綽羅舊作卓羅今改右廂監軍日木多舊作仁多今改保忠厚言保忠雖有歸意下無附者章數上京責厚愈急厚遣弟詣保忠還為夏所獲遂追保忠赴牙帳厚以保忠縦不為夏所殺亦不能復領軍政使得之一匹夫耳何益于事京怒必令招致之夏乃㸃兵延衛慶三路各數千騎出沒聲言假兵于遼而朝延用京計又命西邉能招致夏人者毋問首從賞同斬級令陶節夫在延安大加招誘夏主遣使巽請皆拒之又令殺其放牧者夏人遂入鎮戎畧數萬口與羌酋希斯羅斯合兵廹宣威城知鄯州髙永年出禦之行三十里為羌人所執都爾伯謂其下曰此人奪我國使我宗族漂落無處所遂殺之探其心肝食焉已而羌衆復焚大通河橋宋置大通城今為衛屬西寜府河橋在今衛南以叛湟鄯大震事聞帝怒親書五路将帥劉仲武字子文成化人等十八人姓名敕御史候䝉字元功髙宻人往秦州逮治蒙至秦仲武等囚服聴命䝉諭之曰君等皆候伯無庸辱獄吏苐以實對獄既具䝉奏言漢武帝殺王恢不如秦穆公赦孟明子玉縊而晋侯死孔明亡而蜀國輕今羌殺吾一都䕶而使十八將由之以死是自戕其肢體也欲身不病得乎帝悟釋不治唯王厚坐逗遛降授郢州防禦使未幾夏人復入冦鄜延將劉延慶等敗之劉延慶保安軍人置議禮局初太祖命聶崇義重集三禮圖劉温叟等撰開兀通禮景祐中賈昌朝撰太常新禮及祀儀皇祐中文彦慱撰大享明堂記嘉祐中歐陽修撰太常因革禮元豐中宋敏求詳定朝㑹儀注祈禳蕃國喪𦵏禮縂百六十三卷帝以為未備置議禮局于省尚書命詳議官具禮本末議定請㫖以給事中劉昺領其事夏四月遼人來聘遣翰林學士林攄字彦振福州人報之遼為夏人求還侵地及退兵也五月除黨人父兄子弟之禁六月趙挺之罷挺之于四月三月為尚書右僕射初帝以蔡京獨相謀置佑輔京力薦挺之及既相與京争權陳京奸惡且請去位以避之遂罷秋七月置四輔郡右司諫姚祐字伯受湖州長興人請置輔郡以拱大畿詔以頴昌府為南輔升襄邑縣為拱州為東輔鄭州為西輔澶州為北輔各屯兵二萬重其資給蔡京欲兵權歸已故也還上書流人八月新樂及九鼎成九月受朝賀于太慶殿九鼎成奉安于九成宫以蔡京為定鼎禮儀使帝幸宫行酌獻禮鼎各一殿周以垣墻上施埤堄墁如方色外築垣環之中央曰帝鼐北曰寳鼎東曰牧鼎東北曰蒼鼎東南曰岡鼎南曰彤鼎西南曰阜鼎西曰皛鼎西北曰魁鼎又鑄帝坐大鐘及二十四氣鐘時制新樂亦成賜名大晟置之大晟府建宫屬九月帝受賀于大慶殿加號魏津漢虗和冲顯寳應先生帝之幸九成宫也酌獻至北方寳鼎鼎忽破水流溢于外㦯者以為北方致亂之兆詔徙元祐黨人於近地惟不得至畿甸冬十一月林攄還自遼攄之使遼也蔡京使其激怒以啓釁攄遂恣情不遜遼人大怒空客館絶烟火三日乃遣還凡饔餼祖犒皆廢歸復命議者以為怒鄰生事猶除禮部尚書遼人以失禮来言始出知潁州以朱勔領蘇杭應奉局及花石綱先是蘇州人有朱冲者及其子勔俱給事蔡京所京竄其父子姓名于童貫軍籍中皆得官帝頗垂意花石京諷冲宻取浙中珍異以進初致黄楊三本帝嘉之後歳歳増加舳艫相銜于淮汴號花石綱乃命勔領應奉局及綱事勔指取内帑如囊中物每取以數千百萬計於是搜巖剔藪幽隐不置九士庶之家一石一木稍堪玩者即領健卒直入其家用黄封表識使䕶視之微不謹即被以大不恭罪及發行必撤屋抉墻以出人不幸有一物小異共指為不祥惟恐芟夷之不速民預是役者傾家破産或鬻賣子女以供其須斸山輦石程督慘刻雖在江湖不測之淵百計取之必得乃止至載諸道糧餉綱旁羅商船揭所貢暴其上篙工柁師倚勢貪横凌虐州縣道路以目方士魏漢津死賜號嘉成候漢津年九十于京師賜號嘉成候詔于鑄鼎之地作寳成宫置殿以祀黄帝夏禹周成王周公旦召公奭置堂以祀唐李良及漢津丙戌五年春正月彗出西方長竟天以呉居厚為門下侍郎劉逵字公路隨州人為中書侍郎詔求直言毁黨人碑復謫者仕籍帝以星變避殿損膳劉逵方拜中書侍郎即請碎元祐黨人碑寛上書邪籍之禁帝從之夜半遣黄門至朝堂毁石刻翼日蔡京見之厲聲曰石可毁名不可滅也尋以太白晝見赦除黨人一切之禁權罷方田之法及諸州歳貢供奉物詔崇寜以來左降者無問存沒稍復其官盡還諸徙者二月蔡京有罪免京懐奸植黨貶斥羣賢増修利財之政務以侈靡惑人主動以周官惟王不㑹為説每及前朝惜財省費者必以為陋至于土木營造率欲度前規而侈後觀時天下乆平京都帑庾盈溢遂倡為豐亨豫大之説視官爵財物如糞土累朝所儲掃地矣帝嘗大宴出玉琖玉巵示輔臣曰欲用此恐人以為太華京曰今臣昔使契丹持玉盤琖夸臣謂石晋時物南朝無此用之上夀于禮無嫌帝曰先帝作一小臺上封事者甚衆朕畏其言此器己就乆矣儻人言復興久當莫辨京曰事苟當于理多言不足畏也陛下當享天下之奉區區王器何足計哉帝悦其言乃置應奉司御前生活所營繕所蘇杭造作所其名雜出大率争以竒巧為功而花石綱之害為尤甚及彗星見帝悟其姦凡所建置一切罷之而京免為中太乙宫使留京師以趙挺之為尚書右僕射兼中書侍郎蔡京既免帝召見挺之曰京所為一如卿言復拜右相挺之欲劉逵同心輔政凡京所行悖理虐民之事稍稍澄正之挺之多知慮後患毎建白務開其端而使逵畢説逵亦欲自以為功直情不顧初蔡京興邉事用兵累年至是帝臨朝語大臣曰朝廷不可與四夷生隙釁端一開兵連禍結生民肝腦塗地豈人主愛民之意哉挺之退謂同列曰上志在息兵吾曹所宜将順時執政皆京黨但㣲笑而已三月罷求直言以星變已消也尋復方田諸法及諸州嵗貢供奉物許夏人平廢銀州為銀川城罷五路制經司徒陶節夫知洪州夏五月行紀元厯劉昺所造也秋七月庚寅朔日當食不虧冬十二月戊午朔日當食不虧羣臣稱賀劉逵罷蔡京令其黨進言于帝曰京之改法度皆禀上㫖非私為之今一切皆罷恐非紹述之意帝惑其說復有用京之心然羣臣未冇覺者鄭居中字逹夫開封人往來鄭妃開封人父紳所知之即入見言陛下所建立皆學校禮樂居養安濟等法乃厚下裕民何所逆天而致威譴乃更張邪帝悦其言退語禮部侍郎劉正夫字聴初衢州西安人正夫因請對語與居中合帝遂疑逵擅政于是京黨御史余深福州人石公弼字國佐越州新昌人論逵専恣反覆陵蔑同列引用邪黨出知亳州丁亥大觀元年春正月復以蔡京為尚書左僕射兼門下侍郎吴居厚罷以何執中為中書侍郎鄧洵武梁子羙須城人適之子為尚書左右丞子美初為河北轉運使傾漕計以奉上捐緡錢三百萬市北珠以進北珠出于女眞子美市干遼遼嗜其利虐女真捕海東青以求珠女真由是怨遼北珠即東珠出混同江海東青鷹名俊健能擒天鵝𤓰白者尤異出黒龍江左右用是貴顯洵武與妖人張懐素之黨連婚未㡬懐素謀反朝士多誅連者洵武亦㘴免三月以鄭居中同知樞宻院事尋罷初居中置學士院自言為鄭貴妃從兄弟妃家世微亦倚為重及居中入樞府妃時已貴重于居中無所賴乃用宦者黄經臣計以親嫌為請改授中太乙宫使居中不懌蔡京為言宥府本兵樞府出納宻令取宥宻之義故曰宥府專掌兵柄故曰本兵之地非三省執政用親無嫌經臣沮之于是居中疑京援已不力稍怨之以蔡攸字居安京長子為龍圖閣學士兼侍讀初元符中攸監在京裁造院帝時為端王毎退朝攸適趨局遇諸塗必下馬拱立王問知為攸心善之及即位遂有寵自鴻臚丞賜進士出身拜秘書郎厯官集賢修撰京再入相遂進學士立八行取士科八行者孝友睦婣任恤忠和也凢有此八行者即免試補太學上舍知台州李諤文以徐中行字徳臣台州臨海人薦中行聞之盡毁其所為文入委羽山在台州府黄巖縣南一名俱依山以避之或問之中行曰人而無行與禽獸等使吾得以八行應科目則彼之不被舉者非人類歟夏五月以蔡薿字文繞開封人為給事中薿以諸生試䇿揣蔡京且復用即對曰熈寜之徳業足以配天不幸繼之以元祐紹聖之賛述足以永賴不幸繼之以靖國陛下兩下求言之詔冀以聞至言収實用也而見于元符之末者方且幸時變而肆奸言乘間隙而投異意詆誣先烈動揺國是願逆處其未至而絶其原于是擢為第一以所對頒天下甫解褐即除秘書正字未踰年至侍從前此未有也詔諸路監司勿任元祐學術者秋九月貶侍御史沈畸字徳侔湖州徳清人監信州酒稅竄御史蕭服字昭甫廬陵人于處州蔡京怨劉逵㑹蘇州盜鑄錢獄起京欲陷逵婦兄章綖兄弟遣開封尹李孝夀鞫之株連者千餘人彊抑使承死者甚衆京猶以為緩遣侍御史沈畸御史蕭服往代畸至蘇即日决釋無左證者七百人歎曰為天子耳目司而可傅㑹權要殺人以圖富貴乎遂閲實平反以聞京大怒貶畸監信州酒税服覊管處州而綖竟竄海島故直秘閣程頤卒頤于書無所不讀其學本于誠以大學論語孟子中庸為標指而達于六經動止語黙一以聖人為師卒得孔孟不傳之學為諸儒倡著易春秋傳平生誨人不倦故學者出其門最多淵源所漸皆為名士而劉絢字質夫常山人李籲字端伯洛陽人謝良佐游酢字定夫建陽人張繹字思叔河南壽安人蘇昞字季明武功人吕大臨字與叔大防弟大鈞字和叔亦大防弟尹焞楊時字中立南劒将樂人成徳尤著世稱頣為伊川先生卒年七十五絢學力不倦頣毎言他人之學敏則有矣未易保也若絢者吾無疑焉仕終太常博士籲頣稱具才器可大任又言自予兄弟倡明道學能使學者視倣而信從之籲與劉絢有力焉仕終校書郎良佐學問該贍事有未澈則顙有泚嘗與頣别一年復來見頣問所進對曰但去得一矜字耳頤喜曰是子可謂博學切問而近思者與游酢楊時吕大臨在程門號四先生仕終監西京竹木場酢初與兄醇俱以文行知名所交皆天下士頣見之京師謂其資可以進道及程顥興扶講學酢盡棄故所習而學焉仕終知濠州繹家世甚微傭力于市後發憤力學遂以文名㑹頣自涪還河南繹徃受業頣稱其頴悟嘗曰吾晚得二士謂繹與尹焞也昞始學于張載而事二程卒業仕為太常博士坐元符上書邪等人編管饒州卒大鈞能守其師説而踐履之尤喜講明井田兵制謂治道必自此始張載毎歎其勇為不可及仕終陜西轉運從事大臨通六經尤䆳于禮毎欲掇習三代遺文舊制令可行不為空言以拂世矯俗仕終秘書省正字時舉熈寜進士調宦不赴以師禮見顥于潁昌其歸也顥目送之曰吾道南矣及顥卒復師事頣一日頣偶瞑坐時與游酢侍立不去頣既覺門外雪深一尺矣宣和初蔡京薦于朝事詳後冬閠十月以林攄為尚書左丞鄭居中同知樞宻院事居中既怨蔡京遂陰與張康國比而間京都水使者趙霆得龜兩首于黄河獻以為瑞京曰此齊小白所謂象罔見之而覇者也居中言首豈有二人皆駭異而京獨主之殆不可測帝命棄龜金明池謂居中愛己故申前命流太廟齋郎方軫于嶺南軫上書言蔡京睥睨社稷内懐不道專以紹述熙豐之説為自媒之計内而執政侍從外而帥臣監司無非其門人親戚京每有奏請盡作御筆行出語人曰此主意也明日不行又語人曰京實啟之也善則稱已過則稱君必欲陛下歛天下之怨而後已自元符末陛下嗣服忠義之士投匭者無日無之京分為邪等黥配編置不齒仕籍則誰肯為陛下言哉京又使子攸曰以花石禽鳥為獻欲愚陛下使不知天下治亂臣以為京必反也請誅京詔宣示京京請下軫獄竟流嶺南十一月壬子朔日食蔡京以不及所當食分率羣臣稱賀十二月置黔南路加蔡京太尉召王祖道為兵部尚書南丹州地本蠻崗宋置州今屬廣西慶逺府與宜州注見前及西南夷接壤世為莫氏所居自置刺史王祖道欲取之乃誣其酋莫公佞阻文蘭州宋覊縻州故地俱在今慶逺府東蘭州界不令納土發兵討之擒公佞以南丹州為觀州公佞弟公晟結溪峝報復侵掠城邑殺刺史蔡京匿不以聞特置黔南路領庭孚平允從宜栁融及觀九州京以功加太尉而召祖道為兵部尚書祖道在桂四年厚以官爵金帛挑諸夷建城邑調兵鎮戍輦輸内地錢帛塩粟無復齊限地瘴癘戍者十亡五六實無尺土一民益于縣官時廣西南路轉運副使張莊與祖道表裏遂以代其任後荘及龎恭孫趙遹程鄰皆以柘地受上賞大抵皆規模祖道云孺張荘應天人龎恭孫字徳籍之孫趙遹開封人涪州夷内附以其地為珍承州珍州唐置後沒于蠻宋復建地在今直州遵義府桐梓承州今置今遵義府綏陽縣知涪州龎恭孫誘之也既而恭孫奏渝州南平夷内附置溱播州及遵義軍乂奏瀘州夷納土置純滋州每開一城恭孫輒得褒遷進知成都府又誘降威茂夷置祺亨州㳟孫在西南二十年所得州縣多張名簿實瘠鹵不毛地繕治轉餉為蜀人病未㡬皆廢溱播州注俱見前遵義軍今為府属貴州滋州宣和中廢為武都城今在遵義府懐仁縣純州宣和中廢為九支城今在瀘州祺州本宋覊縻保州亨州本宋覊縻霸州地皆在今四川茂州保縣黄河清乾寜軍言河清踰八百里凡七晝夜詔以乾寜軍為清州戊子二年春正月壬子朔受八寳于大慶殿赦先是有玉印六寸龜紐獻者文曰承天福延萬億永無極詔名鎮國寳至是又得良玉工帝命作六寳以合秦制天子六璽之數與受命鎮國通曰八寳蔡京特上表賀京又奏甘露祥雲靈芝瑞穀雙頭蓮連理木牛生麒麟禽産鳯凰不可勝數輙拜表稱賀二月以葉夢得為翰林學士夢得初用蔡京薦為吏部員外郎京罷相趙挺之更其所行及京再相復反前政夢得入對因言事不過可不可二者而已以為可而出于陛下則今日不應廢以為不可而不出于陛下則今日不可復今徒以大臣進退為可否無乃陛下未有了然于胸中乎帝悦以為起居郎遂進學士夏五月庚戌朔日食童貫復洮州詔加貫檢校司空先是以八寳恩加貫節度使内臣建節始此及是貫捷至復有是命百官表賀帝以玉帶賜蔡京貫尋復積石軍有二一為唐置本静邉鎮一為宋置本溪哥城俱在今蘭州府河州西易鎮奉寜貫以奉寜節度易鎮洮州恃功驕恣選置將吏皆取中㫖不復闗朝廷蔡京不悦秋七月以林攄為中書侍郎余深為尚書左丞深為中丞時攄知開封府同治妖人張懐素獄事懐素謀反事具前多連蔡京二人曲為掩覆凡獄辭及交通書問有及京者輙取焚之京深徳二人故力引之皇后王氏崩諡靖和冬十二月𦵏靖和皇后安化即撫水州注見前諸州蠻内附詔以張莊為黔南經畧安撫使知桂州張荘奏安化上三州一鎮宋史蠻夷傳撫水蠻酋皆䝉姓有上中下三房及北遐一鎮三州盖即三房也諸蠻納土共五萬一千一百餘户二十六萬二千餘人幅員九千餘里又奏寛樂州安沙州譜州四州七原等州王祖道張莊鑿空開邊指名州縣率多虚妄不久即廢今㨿宋史地理志邕州覊縻州有歸樂七原二州俱屬右江道寛樂或即歸樂之訛餘無考納土計二萬人一十六州三十三縣五十餘峝幅員萬里蔡京帥百官表賀詔莊兼黔南經畧安撫使詔以孔伋從祀孔子廟己丑三年春三月張康國暴卒康國始因附蔡京而進及在樞府寖為崖異時帝惡京專愎隂令康國阻其姦且許以相京忌康國遂引吴執中為中丞執中将論康國康國先知之旦奏事留白帝曰執中今日入對必為京論臣臣避位既而執中對果陳其事帝怒黜執中知除州至是康國因朝退趨殿廬得疾仰天吐舌舁至待漏院卒或疑中毒云謫右正言陳禾字秀實鄞人監信州酒税時童貫權益張與黄經臣胥用事中丞盧航表裏為姦搢紳側目陳禾曰此國家安危之本也遂上書劾貫經臣怙寵㺯權之罪願亟竄之逺方論奏未終帝拂衣起禾引帝衣請畢其説衣裾落帝曰正言碎朕衣矣禾言陛下不惜碎衣臣豈惜碎首以報陛下此曹今日受冨貴之利陛下他日受危亡之禍言愈切帝變色曰卿能如此朕復何憂内侍請帝易衣帝郤之曰留以旌直臣翌日貫等相率前訴謂國家極治安得如此不祥語邪遂奏禾狂妄謫監信州酒税夏四月林攄有罪免集英臚唱貢士攄當傳姓名不識甄盎字帝笑曰卿誤邪攄不謝而語詆同列御史論其寡學倨傲不恭失人臣禮黜知滁州久之自揚州徙大名道過闕為帝言頃使遼見其國中攜貳若兼而有之勢無不可盖欲報其辱也帝由是始有北伐之意以鄭居中知樞宻院事管師仁同知院事余深為中書侍郎薛昻杭州人劉正夫為尚書左右丞昻與余深林攄附蔡京最乆昻至舉家為京避私諱或誤及之輒加笞責昻嘗誤及即自批其口五月留孟翊于逺方學官孟翊獻所畵卦象謂宋將中㣲有再受命之象亦更年號改官名變庶事以厭之帝不樂詔竄之逺方六月蔡京有罪免中承石公弼殿中侍御史張克公字介仲楊翟人劾京罪惡章數十上京遂罷為太乙宫使時有郭天信字祜之開封人者以方伎得親幸深以京為非每奏天文必指陳以撼京宻白日中有黒子帝為之恐後屢白不已上始疑京故罷以何執中為尚書左僕射兼門下侍郎執中一意謹事蔡京遂代為首相太學生陳朝老詣闕上書曰陛下知蔡京之姦解其相印天下之人鼓舞有若更生及相執中中外黯然失望執中雖不敢若京之蠧國害民然碌碌常質初無過人天下敗壞至此如人一身臟腑受沴已深豈庸庸之醫所能起乎執中夤縁攀附致位二府亦已大幸遽俾之經體贊元是猶以蚉負山多見其不勝任也疏奏不省而眷注益異冬十一月詔蔡京以太師致仕留京師提舉修英宗實録改封楚國公朝朔望石公弼言京盤旋京師餘威震于羣臣願持必斷之決以消後悔殿中侍御史洪彦昇字仲達饒州樂平人言京假紹述之名一切更張敗壞先朝法度朋奸誤國公私困弊既已上印而偃蹇都城上憑眷頋之恩中懷跋扈之志願早賜英㫁遣之出京殿中侍御史毛注字聖可衢州府西安人言京擅持威福動揺中外以翰林學士葉夢得為腹心交植黨與帝為逐夢得而遷注為侍御史京遂致仕注復極論京受孟翊妖姦之書與逆人張懐素游處引凶朋林攄置政府用所親宋喬年字仙民庠之孫尹京等事太學生陳朝老亦疏京惡十四事乞投卑逺方以禦魑魅皆不報禮書成尋又置禮制局命劉昞討論古今宫室車服器用昏䘮冠祭沿革制度及更置郊廟禋祀之器為五禮新儀頒行天下庚寅四年春正月以余深為門下侍郎張商英為中書侍郎侯䝉同知樞密院事蔡京既免商英自峽州起知杭州過闕賜對因奏曰神宗修建法度務以去大害興大利今誠一一舉行則盡紹述之美法若有弊不可不變但不失其意足矣遂留居政府帝嘗從容問䝉曰蔡京何如人也䝉對曰使京正其心術雖古賢相何以加帝使宻伺京所為京聞而銜之夏五月立詞學兼茂科帝以宏詞科不足以致文學之士改立詞學兼茂科嵗附貢士院試去檄書而増制誥中格則授館職歲不過五人彗出奎婁詔直言闕失貶蔡京為太子少保出居杭州帝以彗出奎婁間避殿減膳令侍從官直言指陳闕失石公弼等遂極論京罪張克公亦論京輔政八年權震海内不軌不忠凡數十事毛注又論京罪積惡大天人交譴雖罷相致政猶怙恩恃寵偃居賜第以致上天威怒推原其咎實在于京考京之罪蓋不可以縷數陛下去黨碑以開自新之路京疾其異已而别為禁防陛下頒明詔以來天下之言京惡其議已而重致于法以嚴刑峻罰脇持海内以美官重祿交結人心錢鈔屢更而商賈不行邊事數興而國力大匱聲焰所震中外憤疾宜早令去國消弭天變奏上乃出知杭州余深與蔡京結為死黨京既去國深不自安上疏乞罷乃出知杭州貶王祖道為昭信節度副使放張荘于永州討妄言拓地之罪也六月以張商英為尚書右僕射兼中書侍郎蔡京久盜國柄中外怨疾見商英能立異同更稱為賢帝因人望而相之時久旱彗星中天商英受命是夕彗不見明日雨帝大喜因大書商霖二字賜之秋七月罷方田九月丙寅朔日食冬十月立貴妃鄭氏為皇后后本欽聖殿押班初帝位端王常朝欽聖太后太后命供侍及帝即位遂以賜帝后性端謹善順承帝意好觀書章奏能自製帝愛其才寵冠後宫竟立為后鄭居中罷以吳居厚知樞密院事蔡京之免居中自許必得相帝覺之不果用至是復以外戚罷辛夘政和元年秋八月張商英罷商英為政持平謂蔡京雖名紹述但借以刦制人主禁錮士大夫耳于是大革弊事改京所鑄當十大錢為當三夾錫錢亦罷以平泉貨復轉般倉以罷直達行鹽鈔法以通商旅蠲横歛以寛民力勸帝節華侈息土木抑倖僥帝頗嚴憚之嘗葺井平樓戒主者遇丞祖導騎至必匿匠樓下時稱商英忠直然意廣才疎凡所當為先于公座誦言故不便者得預為計初何執中與蔡京同相凡營立皆預議至是惡商英出已上與鄭居中日夜醖織其短先使言者論其門下客唐庚字子西眉州丹稜人商英薦其才提舉京畿當平竄知惠州㑹商英與天信往來初帝在邸天信言當居天位及即位頗睠寵之商英因與往來事覺居中因諷中丞張克公并論之遂罷政出知河南府尋貶為崇信軍節度副使九月遣端明學士鄭充中及童貫使遼童貫既得志于西羗遂謂遼亦可圖因請使遼以覘之乃以鄭允中充賀遼主生辰使而以貫副之或言以宦官為上介國無人乎帝曰契丹聞貫破羌故欲見之因使覘其國策之善者也遂行冬十月覊管陳瓘于台州瓘以忤蔡京竄郴州瓘子正彚在杭訟京有動揺東宫迹杭州蔡薿執送京師隂告京俾為計事下開封府併逮治瓘尹李孝壽字景山廸弟及之子逼使證其妄瓘曰正彚聞京將不利社稷傳于道路瓘豈得預知以所不知忘父子之恩而指其為妄則情有所不忍挾私情以符合其説又義所不為京之姦邪必為國禍瓘固嘗論之于諫省亦不待今日語言間也内侍黄經臣莅鞠聞其詞失聲太息謂曰主上正欲得實但如言以對可也獄具正彚猶以所告失實流海上瓘安置通州瓘嘗撰尊堯集謂紹聖史官專據王安石日録沒修神宗史變亂是非不可傳信深明誣妄以正君臣之義張商英為相取其書既上而商英罷瓘又徙台州何執中起遷人石悈曰台州欲置瓘以必死悈至執瓘至庭大陳獄具将以死瓘揣知其意大呼曰今日之事豈被制主邪悈失措始告之曰朝廷合取尊堯集爾瓘曰然則何用許使君知尊堯集所以立名乎蓋以神考為堯主上為舜尊堯何得為罪時相學術短淺為人所愚君所得幾何乃亦不畏公議干犯名分乎悈慚揖瓘使退所以窘辱百端終不能害執中怒罷悈瓘平生論京兄弟皆披摘其處心發露其情忌最所忌恨故得最酷童貫以遼李良嗣來命為秘書丞賜姓趙燕人馬植本遼大族仕至光禄卿行汚而内亂不齒于人童貫使遼道盧溝即今盧溝河在順天府西植夜見其侍史自言有滅燕之策因得見貫貫與語大竒之載與俱歸易姓名曰李良嗣薦諸朝植即獻策曰女真恨遼人切骨而天祚荒滛失道本朝若自登萊渉海結好女真與之相約攻遼其國可圖也議者謂祖宗以來雖有此道以其地接諸蕃禁商賈舟船不得行百有餘年一旦啓之懼非中國之利不聽帝召問之植對曰遼國必亡陛下念舊民遭塗炭之苦復中國徃昔之疆代天譴責以治伐亂王師一出必壺漿來迎萬一女真得志先發制人後發制于人事不侔矣帝嘉納之賜姓趙氏以為秘書丞圖燕之議自此始壬辰二年春正月詔元符上書邪等人不得除監司二月復蔡京太師賜第京師京自杭州召還帝宴之于内苑太清樓夏四月復行方田五月詔蔡京三日一至都堂議事京患言者議已乃作御筆宻進而丐帝親書以降謂之御筆手詔違者以違制坐之事無巨細皆托以行至有不類帝書者羣下亦莫敢言由是貴戚近臣争相請求至使中人楊球代書號曰書楊京復病之而亦不能上矣秋九月更定官名蔡京率意自用欲更置官名以繼元豐之政乃首更開封守臣為尹牧由是府分六曹以士戸儀兵刑工為次縣分六案如六曹之次内侍省職悉倣機延之號宋初内得省官有内客省使延福宫使等名政和二年以通侍大夫正侍大夫等名易之修六尚局宋史職官志殿中省凡總六局曰尚食尚藥尚醖尚衣尚合尚輦然皆不𨽻于本省崇寧二年乃营殿中省蔡京修成六尚局敕令格式六十巻建三衛親衛􅈴衛翊衛郎秩比大中大夫遂詔太師太𫝊太保古三公之官今為三師古無此稱今依三代為三公為真相之任司徒司空問六卿之官太尉秦主兵之任皆非三公並宜罷仍立三孤為次相之任更侍中為左輔中書令為右弼尚書左僕射為太宰兼門下侍郎右僕射為少宰兼中書侍郎罷尚書令及文武􅈴官而以大尉冠武階然是時員既濫冗名且紊雜甚者走馬承受升擁使華黄冠道流亦濫朝品元豐之制至此大壞冬十一月受元圭于大慶殿赦時民間有得玉圭來獻者帝御殿受賀蔡京封魯國公執政皆進爵十二月加童貫太尉癸巳三年春正月追封王安石為舒王安石子雱為臨川伯從祀孔子廟時新廟成于正月元旦舍菜仲春仲秋上丁舍奠以兖國鄒國公及舒王配享殿上頒辟雍大成殿名于諸路州學二月太后劉氏自殺帝以哲宗故曲加恩禮于后而后頗干預外事且以不謹聞帝與輔臣議將廢之而后已為左右所逼即簾鈎自縊死諡昭懐祔葬永泰陵三月壬子朔日食夏四月作玉清和陽宫在福寧殿東奉安道象帝所生之地也五月頒新燕樂詔曰大晟之樂已薦之郊廟而未施之宴饗比令有司播之教坊試于殿庭無惉懘焦急之聲可頒之天下其舊樂悉禁秋九月賜方士王老志濮州臨泉人號洞㣲先生王仔昔洪州人號通妙先生老志初為小吏遇異人授以丹遂棄妻子結草廬田間為人言休咎多驗大僕卿王亶以名聞時帝方嚮道術乃召至京師館于蔡京第嘗緘書一封至帝所啓視乃昔歲秋中與喬劉二妃燕好之語也由是益信之號為洞㣲先生朝士多從求書初若不可觧者卒應者什八九其門如市京慮太甚頗以為戒老志亦謹畏乃奏禁絶之踰年而死保昔初隠于嵩山自言遇許遜晉人字敬之家南昌少從吳猛得神方秘術初為旌陽令尋去官時斬除較蛇毒物以濟人得大洞隠書豁落七元之法能道人未來事京薦之帝召見賜號冲隠處士篆符有驗進封通妙先生由是道家之事日興而仔昔恩寵寖加時朝臣戚里夤緣闗通中丞王安石上疏請自今招延山林道術之士當責所屬保任宣召出入必令察視其所經由仍申嚴臣庶往還之禁并言蔡京欺君僭上蠧國害民數事帝欣然納之已而再疏京罪帝曰本欲即行卿章以近天寜節俟過此當為卿罷京京伺知之大懼其子攸日夕侍禁中泣拜懇祈帝為遷安中翰林學士安中字履道中山曲陽人冬十一月祀天于圜丘以天神降詔百官帝南郊執大圭以道士百人執威儀前導蔡攸為執綏官玉輅出南薰門帝忽曰玉津園東若有樓臺重複是何處也攸即奏見雲間樓臺殿閣隠隠數重既而審視皆去地數十丈頃之帝又曰見人物否攸即奏有若道流童子持幡幢節葢相繼而出雲間眉目歴歴可識遂以天神䧏詔告在位即其地建道宫名曰迎真作天真䧏臨示現記由是益信神仙之事矣十二月詔求道教僊經于天下女真阿古達自稱達貝勒達貝勒舊作都勃極烈今改初遼主如春州當作長春州遼史地理志無春州續綱目誤長春州注見前幸混同江釣魚生女真部長在千里内者以故事皆來朝適遇頭魚宴遼史國語解上嵗時釣魚得頭魚輙置酒張宴與頭鵞宴同續綱目誤作魚頭今改遼主命諸部次第起舞至阿古達辭不能但端立直視遼主諭之再三終不從他日遼主宻諭北院樞宻使蕭奉先天祚元妃之兄曰阿古達雄豪不常可托以邊事誅之否則必貽後患奉先曰彼麄人不知禮義且無大過而殺之恐傷向化心設有異志蕞爾小國亦何能為遼主乃止阿古達歸疑遼主知其異志且以遼主淫酗不恤國政遂稱兵先併旁近族至是節度使烏雅舒卒金追贈康宗阿古達襲位為達貝勒遼使愛錫拉布往謂之曰何故不告喪阿古逹曰有喪不能弔而乃以為罪乎愛賜拉布字達爾丹五院部人舊作阿息保達爾丹舊作特里興今改甲午四年春正月置道階時王老志王仔昔徐知常等得幸遂置道階先生處士等名秩比中大夫至將仕郎凡二十六級後又置道官二十六等有諸殿侍宸校籍授經以擬待制修撰直閣之名夏五月祭地祗于方澤秋八月新作延福宫成宫在大内北拱宸門外初蔡京欲以宫室媚帝召内侍童貫楊戬賈詳何訢藍從熙五人諷以内中逼窄之狀五人乃請因延福舊名而新作之五人分任工役視力所致争以侈麗髙廣相夸尚各為制度不務沿襲及成號延福五位東西配大内南北稍劣其東直景龍門西抵天波門其間殿閣亭臺相望鑿池為海疏泉為湖鶴莊鹿砦文禽竒獸孔雀諸柵蹄尾動以數千嘉花名木類聚區别怪石巖壑幽勝宛若天成不類塵境既成帝自為文以記之其後又為村居野店酒肆青帘于其間每嵗冬至後即放燈自東華門以北並不禁夜徙市民行鋪夾道以居縱博犀飲至上元後乃罷謂之先賞尋又跨舊城修築號廷福第六位復跨城外浚濠作二橋橋下疊石為固引舟相通而橋上人物外自通行不覺也名曰景龍江夾道皆植奇花珍木殿宇皆對峙馬冬十月女真阿古達舉兵攻遼取寧江州遼置亦曰混同軍故城在今吉林烏喇北混同江東遼主滛酗怠于政事每嵗遣使市名鷹海東青于海上道出生女真使者貪縱徵索無藝女真厭苦之烏雅舒甞以遼主不遣阿蘇為辭阿蘇奔遼事見前稍拒市鷹使者及阿古達襲位相繼遣普嘉努又名昱阿庫納孫按普嘉努舊作蒲家奴今改後仿此實古納舊作習古乃今改後仿此等索阿蘇遼主終不許實古納歸具言遼主驕肆廢弛之狀阿古達乃召其所屬使備衝要建城堡修戎器遼主使御史愛錫拉布詰之阿古達曰我小國也事大國不敢廢禮大國徳澤不施而逋逃是主以此字小能無望也乎若還阿蘇朝貢如故不然城未已愛錫拉布還遼主發渾河在今奉天府承徳縣南源出邊外下流至海城縣入邊即古小遼水也北諸軍益東北路統軍司阿古達聞之謂其下曰遼人知我將舉兵集諸路軍備我我必先發制之無為人制乃與薩哈子尼瑪哈後改名宗翰按尼瑪哈舊作粘沒喝今改後仿此等謀徵集所屬諸部兵九月皆㑹于拉林水注見前得二千五百人以遼之罪申告于天地傳梃而誓至遼界遇渤海軍攻金左翼遼兵直攻中軍遼耶律色實舊作謝十今改墜馬阿古達射殺之衆從而進遼軍大奔蹂踐死者十七八薩哈在别部聞之使尼瑪哈及古紳完顔部人罕都之子後更名完顔希尹古紳舊作谷神罕都舊作歡都今改來賀勸稱帝阿古達曰一戰而勝遂稱大號何示人淺也進軍寧江州填塹攻城寧江人自東門出阿古達邀擊盡殪之遼統軍司以聞時遼主射鹿于慶州注見前畧不介意惟遣海州遼置今奉天府海城縣是刺史高仙夀應援十月朔寕江陷防禦使藥太師努努舊作奴今改被獲阿古達隂縱之使招諭遼人遂引兵還初女真部民皆無徭役壯者悉為兵平居則漁畋射獵有警則下諸部徵之凡步騎之仗糗皆自備焉其部長曰具勒行兵則稱曰明安穆昆明安猶千夫長穆昆猶百夫長也按貝勒舊作孛堇明安舊作猛安穆昆舊作謀克今並改後仿此十一月遼遣都統蕭嗣先奉先之弟伐女真阿古達迎戰于混同江遼軍大敗遼主聞寕江州陷以司空蕭嗣先為東北路都統蕭托卜嘉鄂爾多國舅郡王髙九之孫舊作撻不也鄂爾多舊作斡里端今改副之發契丹奚軍三千及京中禁兵等七千屯珠赫舊作出河今改店今奉天府伯都訥城南有肇州故城舊名珠赫店金以此肇王迹故建州因名之後廢阿古達帥衆來禦未至混同江㑹夜方就枕若有扶其首者三寤而起曰神明警我也即鳴鼓舉燧而行黎明至混同江遼兵方壊凌道阿古達選壯士十人擊走之遂登岸與遼兵遇㑹大風起塵埃蔽天乗風奪擊遼兵潰將士多死其獲免者十有七人樞密使蕭奉先懼嗣先得罪輒奏東征潰軍所至劫掠若不肆赦恐聚為患遼主從之嗣先但免官而已自是諸軍相謂曰戰則有死無功退則有生無罪故士無鬬志遇敵輒潰遼人常言女真兵滿萬則不可敵至是始滿萬云伯都訥舊作白都訥今改遼圖哩舊作鐵驪今改部奚部族號遼建為州奚王和勒博一名翰字紐掄奚王特哩之後即蕭幹也舊作回离保紉掄舊作挼懶特哩舊作忒鄰今改叛降女真已而逃歸遼東北諸州多叛降女真奚王和勒博總知東路兵馬事亦率所部降之已而復逃歸于遼以童貫為陜西經畧使環州定逺大首領夏人李阿雅卜舊作訛􅗹今改以書遺其國統軍梁多凌舊作哆㖫今改曰我居漢二十年毎見春廩既虚秋庾未積糧草轉輸例給空劵方春未秋士有飢色若徑擣定逺唾手可取既得定逺則旁十餘城不攻而下矣我儲糓累嵗闕地藏之大兵之來斗糧無齎可坐而飽也多凌遂以萬人來迎轉運使任諒先知其謀募兵盡發窖糓多凌圍定逺失所藏越七日阿雅卜遂以其部萬餘歸夏夏主築臧底河城宋延州有石堡訾在今延安府保安縣北砦旁有洑流名臧底河政和中夏人于此築城以扼要害詔童貫為經畧以討之乙未五年春正月女真完顔阿古達稱帝國號金是為金太祖阿古達既屢勝遼其弟烏竒邁合里博第四子按烏竒邁舊作吳乞買今改後仿此率將佐勸其稱帝阿古達不許鄂蘭哈瑪爾阿庫納第八子按鄂蘭哈瑪爾舊作阿里哈懣今改後仿此普嘉努尼瑪哈等復以為言阿古逹乃用楊朴遼東鐵州人䇿于正月朔即皇帝位且曰遼以賔鐵為號取其堅也賔鐵雖堅終亦變壞惟金不變不壞金之色白完顔色尚白况所居安春水即今呼爾哈河在寧古塔城東南源出吉林烏喇東北流入混同江唐時謂之忽汗河金以後謂之金水河金國語以金為安春水源于此因又謂之金源之上于是國號大金改元收國更名旻以烏竒邁為安班金史作版舊作諳班今改貝勒薩哈舍音阿庫納第五子後更名杲按舍音舊作斜也今改後仿此為古倫貝勒金史國語解云尊禮優崇得自由者所謂國相也按古倫貝勒舊作國論勃極烈今改後仿此晏州唐置宋為覊縻州地在今叙州府興文縣夷反以趙遹為瀘南招討使平之初知梅嶺砦宋置在今瀘州江安縣西南高公老之妻宗女也甞出金玉器飲晏州夷酋卜漏等漏心艶之㑹瀘帥賈宗諒以斂竹木擾諸部且誣致其酋卜固謗等罪夷人咸怨漏遂相結因上元張燈襲破梅嶺砦虜公老妻及其器物四出剽掠梓州轉運使趙遹聞之倍道趨瀘劾宗諒罷之詔康延魯代宗諒聽遹節制遹隂有専討意兵端益大于是詔發陜西軍三萬以遹為招討使遹與别將馬覺張思正分道出期㑹于晏州漏據輪縳大圃即南夀山在今興文縣南其山崛起數百仞林箐深密諸村囤夷為遹敗潰者悉赴之乃壘石樹栅以守遹軍不能進巡檢种友直所部多思黔土丁習山險而山多猱遹乃用竒計以火猱攻囤遂克之遹遣士丁伐䝉密縁崩石挽藤葛而上得猱數十頭束麻作炬灌以膏蟣縛于猱背暮夜復遣土丁負繩梯登崖顛乃縋梯下引人人銜枚挈猱蟻附而上比鷄鳴友直等悉力擁刀斧穿箐入及賊柵出火燃炬猱熱狂跳賊盧舎皆茅竹猱竄其上火輙發賊號呼奔撲猱益死者驚火益熾官軍鼔譟柵賊授亂不能復抗赴火墜崖不可勝計斬數千人生擒卜漏晏州平拓地千里遹為建城砦畫疆畝募耕種且習戰守號曰勝兵遼遣使如金議和金不従遼主遣僧家努舊作僧家奴今改持書往金議和使為屬國金主遣薩喇舊作賽剌今改復書云若歸叛人阿蘇遷黄龍府于别地然後議之已而遼復遣耶律章嘉努等六人齎書使金斥金主名兾其降金主留其使五人獨遣章家努還報亦斥遼主名諭使降後遼又遣蕭薩喇如金金主復以書辭慢留之不遣章嘉努舊作張家奴薩喇舊作辭剌今改金擊遼兵于達嚕噶舊作達魯古今改城遼黄龍府地大敗之金主自將攻遼黄龍府進薄益州遼益州觀察屬黄龍府地在今奉天府原縣界州人走保黄龍金取其餘民而去遼遣都統鄂爾多舊作幹里朶今改左副統蕭伊蘇字圗敏國舅少父房之後舊作蕭乙薛圖敏舊作特免今改右副統耶律章嘉努字特們季父房之後特們舊作特末衍今改都監蕭色佛埒舊作蕭謝佛留今改將騎二十萬步卒七萬戍邊且屯田以為長久計金主聞之率衆趨達嚕噶城登髙望遼兵顧謂左右曰遼兵心貳而情怯雖多不足畏遂趨髙阜為陣摩囉歡烏雅舒長子後更名宗雄舊作謀良虎今改以右翼先馳遼左軍左軍却羅索字斡里延完顔部人舊作婁室斡里延舊作斡里衍今改尼楚赫金室宗子舊作銀述可今改衝遼中堅陷陳力戰尼瑪哈以中軍助之遼兵遂敗金兵乗勝追躡至其營㑹日已暮圍之黎明遼軍潰圍出金人逐北至阿嚕舊作阿婁今改岡遼步卒盡殪耕具皆為金所獲是役也遼人本欲屯田且戰且守故併其耕具皆失之熙河將劉法敗夏人于古庫勒城名在今西寕府碾伯縣北舊作古骨龍今改童貫遣熙和經畧使劉法將步騎十五萬出湟州秦鳳經畧使劉中武將兵五萬出㑹州貫以中軍駐蘭州為兩路聲援仲武至清水河在今蘭州府靖逺縣西築城屯守而還城名徳威在黄河東法與夏右廂軍戰于古庫勒大敗之斬首三千餘既而貫又使法與仲武合熙秦之師十萬攻夏仁多泉城城中力守以援不至遂降法受而屠之縣仁多泉城在西寕府西寧北一月立定王桓為皇太子赦桓帝長子顯㳟皇后所生以童貫領六路邊事時永興鄜延環慶秦鳳涇原熙河各置經畧安撫司以貫總領之于是西兵之柄皆屬于貫夏六月作三山大伾及居山汶子二小山也一大伾注見前居山一名紫金山汶子名鳳凰山俱在今衛輝府濬縣東大伾之支隴也河橋蔡京以孟昌齡為都水使者引河穿大伾及東北二小山分為二股合于下流因三山為址作天成聖功二橋屬濬州者名天成屬滑州者名聖功調役數十萬民不聊生至是畢工已而水漲橋壞秋七月戊辰朔日食八月作明堂初元豐禮官以明堂寓大慶殿别請建立以盡嚴奉而未暇講求至是下詔内出圖式宣示于崇政殿且以明堂宜正臨丙方近東以據福徳之地乃徙秘書省于宣徳門東而以省地營之命蔡京為明堂使開局興工日役萬人至七年六月始成遼伐金遼主率蕃漢兵十餘萬出長春路北邊紀事遼長春州亦曰長春路長春州注見前命蕭呼都克字哈凖太和宫分人遼紀作蕭奉先今依呼都克章努二傳呼都克舊作胡篤哈準舊作合术隐今改為御營都統耶律章努副之以精兵二萬為先鋒餘分五部北出駱駞口在今札賚特西北遼為長春州北境别以漢步騎三萬南出寕江州發數月糧期必滅女真有星流出于柳其光昭地色赤黄有尾占者以為天子宗廟有喜國家建造宫室之祥蔡京率百官表賀安置太子詹事陳邦光于池州蔡京獻太子以大食國注見前琉璃酒器羅列宫庭太子怒曰天子大臣不聞以道義相訓乃持玩好之具蕩吾志耶命左右碎之京閒邦光實激太子諷言者擊逐之九月金取遼黄龍府金主攻黄龍府次混同江水深無舟以渡金主使一人導前乘赭白馬徑涉曰視吾鞭所指而行諸軍隨之才及馬腹遂克黄龍府遣蕭薩喇還遼曰若歸我叛人阿蘇即當班師遼軍渡混同江副都統耶律章奴作亂伏誅遼師渡混同江章努與耶律淳妃弟蕭廸里舊作諦里今改及其甥蕭延留等謀迎立淳誘將士亡歸上京遣廸里以其謀告淳淳曰非此細事主上自有諸王當立北南面大臣不來而汝言及此何也宻令左右拘之有頃遼主使行官實達爾伊遜遼著賬戸司有承應實達爾局官舊作小底乙信今改持書言章努之謀淳即斬廸里攜其首單騎請廣平淀遼史營衛志冬巴納曰廣平淀任永州東南地理志永州永昌軍務河南士河二水合流故號永州考士河即今老河發源喀爾心經敖潢翁牛特諸部落㑹于西拉木倫即史所云潢河也巴納遼四時遊獵行在所之稱按巴納舊作捺鈢今改後仿此待罪遼主遇之如初章奴知淳不見聼乃率麾下掠取上京府庫財物至祖州帥其黨告太祖廟數遼主過惡移檄州縣遂結渤海羣盜至數萬趨廣平犯行營不能克率衆北走欲順國女真阿固齊𨽻遼之熟女真舊作阿鶻産今改以三百騎一戰勝之擒其貴族二百餘人並斬以徇餘脫者皆奔女真章努詐為使者欲奔女真為邏者所獲縛送行在腰斬于市冬十一月金襲遼軍于呼卜圖岡方輿紀要在混同江西舊作䕶布答今改大敗之金王聞遼出軍𠢐面仰天慟哭曰始與汝等起兵葢苦契丹殘忍欲自立國今天祚親至奈何非人死戰莫當也不若殺我一族汝等迎降轉禍為福諸軍曰事已至此惟命是從金主遂率師迎敵遼主自將至圖敏舊作駞門今改駙馬蕭特黙等將騎兵五萬步卒四十萬至噶琳濼方輿紀要在遼黄龍府東北按噶琳濼舊作幹隣濼今改後彷此金主行次約羅屯名在黄龍府東按約羅舊作剌今改後彷此與其臣謀曰遼兵號七十萬其鋒不可當吾軍遠來人馬疲乏宜駐于此深溝髙壘以待之㑹獲遼督餉者知遼主以章努反西還已二日矣諸將乃乗怠擊之遂追遼主及于呼卜圖岡金主曰彼衆我寡兵不可分視其中軍最堅遼主必在焉敗其中軍可以得志使右翼先戰左翼合而攻之遼兵大潰枕籍相屬百餘里獲輿輦帟幄兵械軍資他寳物馬牛不可勝計蕭特黙焚營而遁金主亦引退丙申六年春正月遼將髙永昌勃海人據遼陽以叛遼東京留守蕭保先嚴酷渤海苦之正月朔夜半有惡少年十餘乘酒執刀踰垣入府刺殺保先户部使大公鼎大定府人聞亂即攝留守事與副留守髙清明集奚漢兵千人盡捕斬之撫定其民禆將髙永昌時以兵三千屯八甔口在奉天府承徳縣東見遼政日衰金兵方強遂誘渤海并戍卒入遼陽據之旬日之間逺近響應有兵八千人因僭號稱隆基元年遼主遣蕭罕嘉努張琳㵢州人討之賜方士林靈素字嵗昌温州人號通真達靈先生靈素少從浮屠苦其師笞罵去為道士善妖幻徃來淮泗間丐食僧寺苦之及王老志死後王仔昔寵亦衰帝訪方士于左階道籙徐知常知常以靈素對即召見靈素大言曰天有九霄而神霄為最髙其治曰府神霄玉清王者上帝之長子主南方號稱長生大帝君陛下是也既下降于世其弟號青華帝君者主東方攝領之又有仙官八百餘名今蔡京即左元仙伯王黼初名甫字將明開封祥符人即文華使鄭居中童貫等皆有名而已即仙卿褚慧下降佐帝君之治時劉貴妃方有寵靈素以為九華玉真安妃帝心獨喜其事甚加寵信賜號通真達靈先生賞賚無算為改温州為應道軍靈素本無所能惟稍習五雷法召呼風霆間禱雨有小驗而已以童貫為陜西兩河宣撫使渭州將种師道字彜叔世衡之孫克夏臧底河城先是王厚與劉仲武合涇原鄜延環慶之師攻夏臧底河城敗績死者十四五秦鳳等三將全軍皆没厚重賂童貫匿不以聞未幾夏人大掠蕭闗而去至是師道以兵攻城八日而克之閏月立道學從林靈素之言也尋詔太學辟雍各置内經道徳經莊列博士二員以内經道徳經為大經莊列為小經升貢及三嵗大比法冋科舉又用蔡京言集古今道敎事為紀志賜名道史二月作上清寳籙宫成帝于景龍門汴京北面中門對晨暉門延福宫東門名作上清寶籙宫密連禁署宫中山包平地環以佳木清流列諸館舍臺閣多以美材為楹棟不施五采有自然之勝上下立亭宇不可勝計帝時登皇城下視之由是間景龍門城上作複道通寳籙宫以便齋醮之事夏四月金人攻高永昌殺之遂取遼東京州縣永昌使人求援于金且曰願併力以取遼金主使呼實布完顔部人按呼實布舊作胡沙補今改後仿此謂永昌曰同力取遼固可東京近地汝輒據之以僭大號則不可若能歸欵當受王爵永昌不從金主乃遣斡魯韓國公和卓子帥諸軍攻永昌時遼張琳等討永昌久不克斡魯與戰敗之遂取瀋州遼置今奉天府是永昌大懼率衆拒金遇于活水即瀋水在奉天府承徳縣南源出縣東下流入渾河金師既濟永昌之軍不戰而郤逐北至遼陽城下明日永昌盡帥其衆與金戰又大敗遂以五千騎奔長松地名方輿紀要在遼陽東遼陽人托卜嘉又曰大臭按托卜嘉舊作塔不野今改後仿此執永昌以獻金主殺之于是遼之東京州縣及南路繫遼女真皆降于金金主以斡魯為南路都統沃稜舊作斡倫今改後仿此知東京事何執中罷執中輔政一紀年高疾甚賜之寛告尋以太傅就第朝朔望儀物廩稍一如居位時未幾卒執中甞為端王侍講故終始恩遇不替然無所建明惟以謹畏迎主意贊飾太平而已詔蔡京三日一朝總治三省事京改都堂為公相㕔詔京總治三省正公相位五月以鄭居中為少保太宰劉正夫為少宰鄧洵武知樞密院事時蔡京大興工役民不聊生變亂法度吏無所師鄭居中每為帝言帝亦惡京專乃拜居中太宰使伺察之又以正夫議論數與京異拜為少宰居中存紀綱守格令抑僥倖振淹滯士論翕然望治正夫能迎時上下持禄養權入相半嵗即以疾致仕後二年鄧洵武亦卒鄧氏自綰以來世濟其奸而洵武阿二蔡尤力京之敗亂天下祸源自洵武始焉六月遼以耶律淳為都元帥秋九月帝詣玉清和陽宫上徽號于上帝赦帝奉玉册玉寳如玉清和陽宫上玉帝尊號曰太上開天執符御歴含真體道昊天玉皇上帝詔天下洞天福地修建宫觀塑造聖像尋又上地祗徽號曰承天效法厚徳光大后土皇地祗上寶册儀禮一如上帝尋改宫名為玉清神霄宫又鑄神霄九鼎安置于上清寳籙宫之神霄殿冬十月夏人冦涇原屠靖夏城夏大舉攻涇原靖夏城時久無雪夏先使數萬騎繞城踐塵漲天乃潛穿壕為地道入城中城遂陷屠之而去丁酉七年春二月大理注見前入貢廣州觀察使黄璘潭州湘鄉人誘大理入貢詔以其主段和譽為雲南節度使封大理國王已而知桂州周穜劾璘許昌璘遂得罪帝幸上清寶籙宫命林靈素講道經時道士皆有俸每一觀給田亦不下數百千頃凡設大齋輒費緡錢數萬貧下之人多買青布幅巾以赴日得一飫餐而襯施錢三百謂之千道㑹且令士庶人聽靈素講經帝為設幄其側靈素據高座使人于下再拜請問然所言無殊絶者時時雜以滑稽媟語上下為大閧笑莫有君臣之禮復令吏民詣宫授神霄秘籙朝士嗜進者亦靡然趨之夏六月道籙院上章册帝為敎主道君皇帝帝諷道籙院曰朕乃上帝元子為太霄帝君憫中華被金狄之敎劉定之曰金狄指佛而言也佛之徒謂佛身體面貌皆若金色故徽宗云遂懇上帝願為人主令天下歸於正道卿等可册朕為敎主道君皇帝于是道籙院上表册之然止於道敎章疏内用宋制廢后入道謂之敎主故郭后曰金庭敎主孟后曰華陽敎主時孟后在瑶華宫遂去教主之稱以避尊號秋七月置提舉御前人船所時東南監司郡官二廣市舶率有應奉又有不待㫖但送物至都計㑹宦者以獻大率靈壁宋縣今屬鳳陽府縣有磬石山大湖具區也注見前慈谿唐置今屬寧波府武康注見前諸石二浙奇竹異花海錯福建荔枝與下龍眼椰實注俱見前橄欖一名南諌亦曰味諌亦曰諌果江南呼為青果龍眼南海椰實登萊文石湖湘文竹四川佳果木皆越海渡江毀橋梁鑿城郭而至植之皆生而異味珍苞則以健步㨗走雖甚逺數日即逹色香未變也至是蔡京又言陛下無聲色犬馬之奉所尚者山林間物乃人之所棄但有司奉行之過因以致擾願節其浮濫乃請作提舉淮浙人船所命内侍鄧文誥領之詔自後有所用即從御前降下乃如數貢餘不許妄進意欲以便民而實擾害如故熙河環慶涇原地震旬日不止壊城壁廬舍壓死者甚衆八月鄭居中罷居中與蔡京不相能至是以母喪去位京以居中王珪壻也乃使蔡確子懋即蔡渭重理定䇿事遂追封確清源郡王御製文立石墓前欲借是撼居中然卒不能害未幾居中起復為太宰已而復請終喪遼置怨軍遼主自燕至隂涼河在今札魯特右翼西北遼史地理志上京道有隂涼河即此募遼東人為兵使報怨于女真號曰怨軍凡八營屯衛州當作渭州遼置廢址在今錦州府寧逺縣界蒺藜山方輿紀要在寧逺縣邊外以渤海鐵州遼置故城在今奉天府葢平縣人郭藥師等為帥冬十一月命蔡京五日一赴都堂治事以余深為少宰白時中為中書侍郎深諂附蔡京結為死黨京復用事引為門下侍郎遂拜少宰十二月方士王仔昔下獄死仔昔倨傲而戅帝待以客禮故遇宦侍若童奴又欲羣道士皆宗已林靈素忌之乃與宦者馮浩誣以言語怨望下獄死有星如月南行帝言天神降于坤寧殿詔示百官帝惑于林靈素之言建宫觀徧天下又造青華帝君正畫臨壇及火龍神劍夜䧏内宫之事託天神臨䧏造帝誥天書雲篆務以惑世欺衆其説妄誕不可究質宦者道士有所不快必託為帝誥則莫不如志尋加靈素號通真達靈元妙先生張虛白通元冲妙先生視中大夫出入呵引至與諸王争道都人稱曰道家兩府其徒美衣玉食者幾二萬人以童貫領樞密院事内侍自古無賜坐者時貫加開府儀同三司領樞密院毎春秋大燕則坐于執政之上日與宰相同班進呈畢即自屏後入内復易窄衫與羣閹為伍出則為大臣當體貌之禮入則為近侍執使令之役古所未有也作萬嵗山故址在今開封府城東北隅初帝以未得嗣子為念道士劉混康以法籙符水出入禁中言京師西北隅地協堪輿倘形勢加以少高當有多男之祥始命為數仞岡阜已而後宫生子漸多帝甚喜始信道敎于是蔡條倡為異聞謂有珠星璧月跨鳳乘龍天書雲篆之符以逢迎之遂竭國力以經營土木之工至是又命戸部侍郎孟揆于上清寶籙宫東築山以像餘杭之鳳凰山在杭州府城南方與紀要山岩逶迤左瞰大江如鳯凰欲飛故名號曰萬嵗竄侍御史黄葆光字元暉徽州黟人于昭州初葆光為左司諫始莅職即言三省吏猥多乞非元豐舊制者一切革去蔡京怒其異已密白帝䧏内批云當豐亨豫大之時為衰亂減省之計徙為符寶郎明年復拜侍御史至是大旱帝以為念葆光上疏言蔡京彊悍自專侈大過制無君臣之分鄭居中余深依違畏避不能任天下之責故致此異疏上不報京權勢震赫舉朝結舌葆光獨出力攻之京懼中以他事竄之昭州遼耶律淳及金將烏楞古金宗室子按烏楞古舊作斡魯古今改後仿此戰于蒺藜山敗走金遂取遼八州遼主命淳㑹四路兵馬防秋淳遺金咸州遼置故城在今奉天府鐵嶺縣都統烏楞古書議和烏楞古告于金主金主猶以歸薩喇及阿蘇為言淳軍至蒺藜山烏楞古及知東京事㓇稜等進攻顯州遼置今錦州府廣寧縣是遼怨軍帥郭藥師乘夜進襲烏楞古擊走之遂與淳戰淳敗走烏楞古追至額勒錦舊作河里真今改陂方輿紀要在廣寜北遂㧞顯州于是乾懿壕復成川惠七州皆遼置乾懿川壕四州故城皆在今廣寜縣境復州今仍為州屬奉天府成州故城在今錦州府義州惠州故城在今喀剌沁右翼皆䧏金金遣使如遼楊朴言于金主曰自古英雄開國每先得大國封册金主從之使至遼時遼東諸州盜賊蜂起掠民以充食樞密使蕭奉先等勸遼主許之戊戍重和元年春正月作定命寶成于闐上美玉踰二尺帝命製寶文曰範圍天地幽贊神明保合太和萬壽無疆篆以魚蟲制作之工幾于秦璽號曰定命寶合前八寳為九寳以定命寳為首且曰八寳者國之神器至于定命乃我所自制也寶成帝御殿受賀肆赦以王黼為尚書左丞黼美風姿有口辯寡學術而多智善佞初以何執中薦累官左司諫張商英為相寖失帝意帝遣使以玉環賜蔡京于杭黼覘知之因數條奏京所行政事并擊商英及京復相徳其助已嵗中三遷為御史中丞黼欲京専國遂疏執中二十罪已而改翰林學士㑹京與鄭居中不合黼復内交居中京由是怨之徙為戸部尚書將陷以罪黼以計獲免還為學士承㫖遂入政府二月遣武義大夫馬政熙和人浮海使金約夾攻遼建隆中女真甞自其國之蘇州遼以南蘇地置南蘇注見前泛海至登州賣馬故道猶存至是有漢人高藥師者泛海來言女真建國屢破遼師登州守臣王師中以聞詔蔡京童貫共議命師中募人同藥師等齎市馬詔以往不能達而還帝乃復委童貫選人使之遂使武義大夫金史作登州防禦使東都事畧作登州都巡檢馬政同藥師由海道如金政言于金主曰主上聞貴朝攻破契丹五十餘城欲與通好共行弔伐若允許後當遣使來議通金好自此始夏五月壬午朔日食秋八月以童貫為太保九月掖庭大火自甲夜達曉大雨如傾火益熾凡爇五千餘間苑後廣聖宫及宫人所居幾盡焚死者甚衆閏月立周恭帝後詔周柴氏後已封崇義公復立恭帝後以為宣義郎監周陵廟世世為國三恪冬十二月置裕民局尋罷之醴泉觀使兼侍讀徐處仁言水旱之餘賦役繁重宜㑹一嵗財用之數量入為出帝稱善詔置裕民局討論振兵裕民之道以處仁詳定蔡京不悦局尋罷遼大饑人相食御批歴代通鑑輯覽巻八十

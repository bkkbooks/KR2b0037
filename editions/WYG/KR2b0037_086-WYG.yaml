front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷八十七宋髙宗皇帝丙寅紹興十六年全皇統六年春正月行耤田禮
  hash: sha256:db073d68a928985c355747c5007eed012d06f780db4514f8973f57ad2e54df60
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_086-1a, image: WYG0338/WYG0338-0507a.png}
body:
  text: 先是知䖍州續綱目作度州今依宋史髙宗紀及秦檜傳改正薛弼字直老温州永嘉人言州民朽柱中有文曰天下太平年秦檜大喜乞詔付史館于是修彌文以餙治具如鄉飲耕耤之類節節偹舉為苟安餘杭之計自此不復廵幸江上而祥瑞之奏日聞矣夏五月金右丞相韓企先燕京人卒企先為金右丞相毎欲為官擇人専以培植勸奬後進為己任推轂士類甄别人物一時臺諫多君子號稱賢相六月金殺其翰林學士宇文虚中金人重虚中之才號為國師而虚中恃才輕肆好譏訕凡見女真人輙以礦鹵目之貴人逹官積不能平至是唐古酬舊作唐括酬斡今改後仿此家奴等告虗中謀反有司鞫治無狀乃羅織虗中家圖書為反具虗中曰死自吾分至于圖籍南來士大夫家家有之翰林直學士髙士談字季黙瓊之孫圖書尤多于我家豈亦反邪有司承順風㫖並殺士談于是虗中以老幼百口同日焚死秋九月金劉豫死冬十二月金遣使如西遼西遼殺之先是囘紇遣使入貢于金言耶律逹實時逹實林牙已死西方諸部仍以逹實呼之與其國鄰金遣鈕祜祿罕努舊作粘割韓奴今改與囘紇使俱往遼主遇之于野罕努語不遜遼主怒而殺之丁卯十七年金皇統七年夏四月金主醉殺其戸部尚書宗禮金主自即位以來委政于尼瑪哈烏布烏珠雖初年國家多故而吏清政簡百姓樂業既而其后費摩氏舊作裴滿氏今改後仿此干政朝官往往因之以取宰相金主欲立繼嗣為后所制心不能平因縱酒自遣酗怒至于手刄大臣至是宴便殿金主被酒彊諸王飲不能俱逃去金主大怒時惟戸部尚書宗禮在側乃使之跪手殺之五月安置饒州通判洪皓于英州先是皓居母䘮秦檜黨猶謂皓睥睨鈞衡及終䘮除饒州通判李勤又附檜續綱目作饒州通判李勤考宋史皓本傳明言皓終䘮除饒州通判若以為李勤官則上文除字將安所指乎續綱目誤甚今依宋史改正誣皓作欺世飛語責濠州團練副使英州安置六月金殺其横海節度使田瑴初韓企先引瑴為吏部侍郎孟浩字浩然灤州人為左司員外郎銓叙得人時烏珠當國其所任刑部員外郎蔡松年字伯堅靖之子求與瑴相結瑴薄其為人拒之松年遂日短瑴于烏珠企先卒即出瑴為横海節度使及是尚書省令史許霖首告瑴在吏部時為選人龔夷鍳倒用日月事霖亦烏珠所親信與蔡松年搆成其訟殺瑴及左司郎中奚毅翰林待制邢具瞻並王植髙鳯廷王傚趙益興與夷鑑等其妻子及所往來孟浩等皆徙海上仍不以赦原天下寃之秋八月故相趙鼎卒于吉陽軍鼎潛居深處門人故吏皆不敢通問惟廣西帥張宗元時饋醪米㑹降㫖趙鼎李光遇赦永不檢舉且令本軍月具存亡申省鼎遣人語其子汾曰秦檜必欲殺我我死汝曹無患不爾禍及一家矣自書墓中石記鄉里及除拜嵗月且書銘旌云身騎箕尾歸天上氣作山河壯本朝遺言其子乞歸葬遂不食而死天下聞而悲之鼎為相専以固本為先以為本固而後敵可圖讐可復惜其見忌于檜齎志以没然中興賢相鼎為稱首鼎既卒參知政事段拂為之嘆息秦檜怒遂罷拂為資政殿學士尋落職興國軍居住属興國軍宋置今為州湖北武昌府九月罷四川宣撫副使鄭剛中剛中治蜀有方略秦檜忌之使人求其隂事召還責貴陽軍安置未幾四川宣撫司亦罷冬十月辛邜朔日食十二月金及蒙古和初逹蘭既誅其子勝花都郎君金史逹蘭傳誅逹蘭並殺其二子威台額特布此勝花都郎君或其幼子事出大金國志金史無考按威台舊作斡帶額特布舊烏逹㭪今改率其父故部曲以叛與䝉古通䝉古益彊烏珠討之連年不能克乃與之議和割西平河方輿紀要即臚朐河宋元興中金人與䝉古和割河以北地與之即此則考臚朐河下流與黒龍江合䝉古在黒龍江之北此西平河或即臚朐河之下流也臚朐河源委注詳前以北二十七團寨與之嵗遺牛羊米豆且冊其長敖拉貝勒舊作熬羅孛極烈今改後仿此為䝉輔國王不受自號大蒙古國至是始和嵗遺甚厚于是敖拉貝勒自稱祖元皇帝改元天興戊辰十八年金皇統八年春三月以秦熺知樞宻院事秦檜問勑令所刪定官胡寜字和仲安國第三子曰兒子近除外議如何寜曰以為必不襲蔡京之迹檜怒之已而熺乞避父子共政遂罷為觀文殿學士兼侍讀位次右僕射尋加少保夏四月戊子朔日食五月放浙東副總管李顯忠于台州顯忠熟知西邉山川險易因上恢復策秦檜惡之降奉祠台州居住六月金以完顔亮即海陵烏布之子太祖之孫本名都古嚕訥舊作廸古乃今改平章政事亮為人慓急猜忌殘忍任數自以已與金主同為太祖孫常懐覬望及為中京留守専立威以厭伏小人結明安蕭裕本名伊徹奚人按伊徹舊作遥折今改後仿此每與論天下事裕傾險揣知其意因曰留守先太師太祖長子德望如此人心天意宜有所属誠有志舉大事願竭力以從亮喜遂與謀議及入為右丞進平章攬持權柄用腹心為省臺要職引裕為兵部侍郎是冬亮為右丞相亮生日金主遣近侍局直長大興國以司馬光畫像玉陶罕鹿馬賜之后亦附賜禮物金主怒枤興國奪回賜物亮本懐不執疑畏愈甚改陶罕舊作吐鶻今冬十月金太師都元帥烏珠卒金自尼瑪哈死逹蘭富勒呼等皆有自為之意烏布獨力不能如之何時無烏珠國勢殆矣故其國論功以為尼瑪哈後惟烏珠一人耳十一月竄胡銓于海南秦檜諷司諌羅汝楫論銓飾非横議竄新州同郡王廷珪嘗以詩贈銓坐流辰州新州守張隶承檜㫖論銓與客唱酬謗詘怨望詔送海南編管以隶提舉湖北常平至官一日卒時洪皓在英州閩人倪詧為守聞隶以巧中遷官取使節欲效之即使人伺隙捕皓家奴寘獄中釀成其罪未及發而詧卒事乃觧己巳十九年金皇統九年十二月以後廢主亮天徳元年春三月癸未朔日食夏五月金出完顔亮于行䑓秋九月復召入平章政事金主以完顔亮為太保領三省事四月壬申夜大風雨雷電震壊金主寢殿鴟尾有火入寢内燒幃幔金主趨别殿避之越五日有龍鬬于榆林河水上金史熙宗紀作利州榆林河考利州金置元廢故城在今哈喇沁左翼東北大風壊民居官舎瓦木人畜皆飃颺十數里死傷者數百人五月以天變肆赦命翰林學士張鈞草詔參知政事蕭肄奚人摘其語以為誹謗金主殺鈞且問誰使為之左丞相宗賢本名色哩希卜蘇之孫舊作賽里希卜蘇舊作習不失今改曰都古嚕訥實使之金主不悦故出亮亮過中京與留守蕭裕定約而去九月至良鄉召還莫測其故大恐及至復拜平章逆謀益甚冬十月金主殺其弟胙王常勝等烏布子金主弟後追改名元遂殺其后費摩氏金宰臣議遷遼陽渤海之民于燕南近侍髙夀星等當遷訴于費摩后后白金主金主怒遂杖平章政事秉徳本名伊遜尼瑪哈孫右丞唐古辯本名翁郭羅尚金主之女舊作唐括辯翁郭羅舊作斡骨剌今改而殺左司郎中薩哈舊作三合今改夀星等竟不遷秉徳辯二人怨望遂與大理卿烏逹阿里布之子按武岱舊作烏帶阿里布舊作阿魯補今改後仿此謀廢立烏逹以告完顔亮一日亮與辯語因問曰若舉大事誰可立者辯曰胙王常勝乎問其次曰鄧王名奭宗傑子太祖孫子敖拉舊作阿懶今改後仿此亮曰敖拉屬疎安得立辯曰公豈有意邪亮曰果不得已舎我其誰于是旦夕相與宻謀䕶衛將軍塔斯舊作特思今改後仿此疑之以告費摩后后白金主金主怒召辯謂曰爾與亮謀何事將如我何枤之亮因此忌常勝惡塔斯㑹河南兵士孫進作亂自稱皇帝阿禪舊作按寨今改大王金主之弟止有常勝扎拉舊作查剌今改亮乗此搆常勝扎拉金主使塔斯鞫之無狀亮曰塔斯鞫不以實遂俱殺之又殺敖拉逹蘭亦鄧王子舊作逹楞今改後仿此金主積怨于后遂俱殺之而召胙王妃薩摩舊作撒夘今改後仿此入宫繼之又殺德妃烏庫哩舊作烏古論今改氏及瓜爾佳舊作夾谷今改後仿此氏張氏等十二月金完顔亮弑其主亶而自立亮弑主篡立寔金之亂臣故即位後變例書名至金世宗既立金統有歸亮止書名而不稱主䕶衛十人長布薩呼圖後改名思恭上京羅卜科逹噶人舊作僕散忽土羅卜科逹噶舊作老海逹噶今改舊受烏布恩圖克坦額呼楚克㑹寜噶嗎哈嚇仲人徙懿州舊作阿里出虎噶嗎哈赫伸舊作葛馬合窟甲今改與亮為姻家亮皆使為内應大興國嘗以羅卜藏後賜名維忠舊作李老僧今改属亮得為尚書省令史亮度興國被杖怨望又使羅卜藏結興國内應興國給事寢殿夜嘗取符鑰歸家十二月丁巳乗布薩呼圖額呼楚克内直作變夜二鼓興國以符鑰啟門亮與妹壻圖克坦貞特赫塔拉人特赫塔拉舊作忒黑闥剌今改及平章政事秉徳左丞唐古辯大理卿烏逹羅卜藏等皆以刀藏衣下同入宫門者以辯乃國壻亮又至親不疑而納之及殿門衛士始覺有變亮等抽刀刦之莫敢動遂入寢殿金主常置佩刀于榻是夜興國先取刀投榻下金主求刀不得額呼楚克先進刃呼圖次之金主頓仆亮前手刃之血濺滿其面與衣金主既殂秉徳等未有所属呼圖曰始者議立平章今復何疑秉徳等遂與羣臣奉亮即位詐以金主欲議立后召大臣因殺曹國王宗敏左丞相宗賢以秉徳為左丞相唐古辯為右丞相烏逹為平章政事諡費摩后為悼平皇后廢金主亶為東昏王大赦改元庚午二十年金天徳二年春正月殿司軍士施全刺秦檜不克檜殺之檜趨朝殿前司後軍使臣宋史兵志殿前馬歩諸軍有廵教使臣施全挾刃于道遮檜肩輿刺之不中捕送大理檜親鞫之全對曰舉天下皆欲殺敵人汝獨不肯故我欲殺汝也詔磔于市自是檜每出列五十兵持長梃以自衛金主亮尊其嫡母圖克坦氏及母大氏皆為太后圖克坦氏賢御下有恩意與大氏相得至歡亮弑熈宗圖克坦氏曰帝雖失道人臣豈可至此亮衘之至是追尊烏布為帝廟號徳宗二母俱尊為皇太后圖克坦氏居東宫號永夀宫大氏居西宫號永寜宫後圖克坦后生日酒酣大氏起為壽圖克坦后方與諸公主宗婦語大氏跪者久之亮怒而出明日召與圖克坦后語者皆杖之大氏以為不可亮曰今日之事豈能尚如前日耶三月以余堯弼參知政事巫伋簽書樞宻院事遣堯弼使金賀即位也及還金主亮以上皇玊帯附遺于帝其秘書郎張仲軻小名鈕爾按鈕爾舊作牛兒今改後仿此曰此希世之寳也亮曰江南之地他日當為我有此置之外府耳仲軻由是知亮有南侵之意遂每事先意逄之下李光子孟堅于大理獄流之峽州責降徽猷閣直學士胡寅等官有差光在瓊嘗作私史其仲子孟堅為所親陸升之山隂人光姪壻言之升之訐其事秦檜命兩浙轉運副使曹泳究寔泳言孟堅省記父光所作小史語渉譏訕送大理寺獄成詔光遇赦永不檢舉孟堅除名編管峽州于是胡寅程瑀潘良貴宗潁澤之子張燾許忻賀允中呉元許八人皆縁坐降責有差有從政郎楊煒常州通判沈長卿字文伯湖州人舊與李光言和戎非便知雷州王趯求内徙李光俱坐貶又有太常主簿呉元美作夏二子傳指蚊蝇也其鄉人告之以為譏毁大臣又言其家亭號潛光有心于黨李堂名商隐無意于事秦檜大怒竄之容州唐置今廣西梧州府容縣是夏四月置力田科募民耕兩淮田從知廬州呉逵請也金主亮大殺其宗室亮在熈宗世見太宗諸子盛彊忌之及即位遂與蕭裕謀殺之又以前左丞相秉德首謀廢立而不即勸進銜之將盡誅焉于是豫敎尚書省令史蕭玉奚人上變遂召領三省事阿嚕即宋本太宗子阿嚕舊作阿魯今改左丞相唐古辯判大宗正寺呼爾察即宗美阿嚕弟舊作胡里甲今改後仿此繫鞫至則殺之因遣使如東京殺留守阿林即宗懿太宗于舊作阿隣今改後仿此北京殺留守呼拉布金史海陵紀作卞世系表云北京留守卞太宗孫今仍續綱目改按呼拉布舊作斛禄補今後仿此南京殺領行臺事秉徳並誅其親属復殺太宗之子孫七十餘人尼瑪哈子孫三十餘人諸宗室五十餘人太宗尼瑪哈後皆絶而烏逹蕭裕蕭玉等皆受重賞亮又令玉子尚主曰朕無以報卿使朕女為卿男婦代朕事卿也冬十月金主亮殺其左副元帥薩里罕等夷其族金主亮復忌舎音諸子盛彊及宗室勲舊大臣欲盡除之乃諷都元帥府令史約索即白彦敬博勒郭部族人舊作遥設博勒郭舊作部羅火今改誣餙上變遂殺薩里罕及景祖孫穆里延舊作謀里野今改舎音子博濟即宗義舊作孛吉今改並其族百數十人以魏王威台太祖之弟舊作斡帶今改按此與前達蘭之子名威台者另是一人孫呼爾察舊作活里甲今改好修飾亦族之秦檜有疾詔執政赴檜第議事十二月甲子檜始朝命肩輿入宫門二孫塤堪扶掖升殿不拜辛未二十一年金天徳三年春正月金置國子監二月以巫伋為金國祈請使伋至金首請迎靖康帝歸國金主亮曰不知歸後何處頓放伋唯唯而退三月金大營宫室于燕續綱目此條目内叙營建事本金史海陵紀乃汴宮而誤為燕宫今改叙于二十八年金營汴宫綱下金主亮稍習經史慕中國衣冠人物宻有遷都意遂下詔求直言而上書者多謂上京僻在一隅不若徙燕以應天地之中與亮意合乃遣左丞相張浩字浩然遼陽渤海人本姓髙右丞相張通吉字樂之易州易縣人等調諸路夫匠築燕京宫室城周九里三十歩其宫室一依汴京制度夏五月金主亮納其叔母阿蘭舊作阿懶今改後仿此及宗婦于宫阿蘭亮叔曹王阿里布妻也亮殺阿里布而納之封為昭妃又命圖克坦貞語宰相曰朕嗣續未廣所誅黨人諸婦多朕中表親宜選納焉宰相乃奏請行焉亮遂納阿魯子蘇爾圖舊作莎魯啜令改後仿此呼嚕即宗固亦太宗子舊作胡魯今改後仿此子呼喇勒舊作胡里剌今改後仿此和碩台舊作胡失打今改後仿此秉德弟嘉哩舊作乣里今改後仿此四人之妻于宫尋封嘉哩妻髙氏為修儀崇義節度使烏逹妻唐古鼎格舊嘗與亮私及為帝鼎格使侍婢來朝亮諷使殺烏逹許以為后鼎格初不忍亮訹之曰不殺汝夫將俗滅汝家鼎格大恐縊死烏逹遂納之宫中封貴妃大愛幸後與舊家奴姦賜死又使秘書補監完顔文出其妻唐古實格而以為麗妃使伊唎出其妻富察伊徹而納之伊徹亮姊之女也石按唐古鼎格舊作唐括定哥唐古實格舊作唐括哥伊喇補舊作乙剌補富察伊徹舊作蒲察乂察今改後仿此秋八月太傅鎮南武安寜國節度使咸平王韓世忠卒世忠性戇直勇敢忠義事關廟社必流涕極言屢詆和議觸秦檜解兵罷政卧家凡十年至是卒世忠嗜義輕財賜賚悉分將士将軍嚴重與士卒同甘苦器仗規畫精絶過人嘗中毒矢入骨以彊弩括取之十指僅全四不能動刀痕箭瘢如刻畫然知人善奬用成閔解元劉寳等起行伍秉將旄皆其部曲也孝宗朝追封蘄王諡忠武子彦直彦質彦古皆以才見用武閔字居仁邢州人壬申二十二年金天徳四年春三月編管王庻子之奇之荀于嶺南初庻卒于貶所其子之奇之荀撫棺而哭曰秦檜秦檜此仇必報親舊掩其口曰禍未巳也至是為人所告坐謗朝廷編管之奇于梅州本南漢恭州宋改今廣東嘉應州是之荀于容州又以直龍圖閣葉三省監都作院王逺嘗通書王庻及趙鼎力詆和議安置三省于筠州逺于髙州夏四月巫伋罷以章复音伏簽書樞宻院事伋與秦檜居同里一日檜語伋曰里中有何新事伋曰有一術士自鄉里來頗能論命檜變色曰是人言公何日拜相伋惶恐而退中丞張复聞之即劾伋隂懐異意遂罷复拜簽樞未幾亦罷五月襄陽大水平地五尺漢水冒城而入冬十二月金主亮召濟南尹烏祿妻烏凌阿氏即昭德皇后舊作烏林逹氏今改未至自殺葛王烏祿時為濟南尹烏凌阿氏儀容整肅亮召之乃謂烏祿曰我不行上必殺王我當自勉不以相累也遂召王府臣僕曰為我禱東岳使皇天后土明鍳我心行至良鄉得間自殺癸酉二十三年金貞元元年春三月金遷都于燕金主亮自上京至燕京初偹法駕下詔改元親選良家子百三十人充後宫以燕列國之名不當為京師號遂改燕京為中都大興府汴京為南京削上京之名止稱㑹寕府又改中京大定府為北京而東京遼陽府西京大同府如舊以王循友知建康府循友知鎮江上書乞加秦檜九錫檜喜而遷之踰年檜以循友罪其族黨安置藤州廣置今廣西梧州府藤縣是夏四月金太后大氏卒亮遷都于燕親属皆從獨留圖克坦太后于㑹寜圖克坦后嘗憂懼每中使至必易衣俟命大氏在燕常思念圖克坦后及病篤以不得見圖克坦后為恨將死謂亮曰汝以我之故不令永夀宫偕來我死必迎致之事之當如事我五月潼川本唐梓州宋置府今府属四川大水平地丈五尺死者甚衆甲戌二十四年金貞元二年春正月地震金右丞相蕭裕謀反坐誅裕在相位恃功専恣金主亮倚信之他相仰成而已裕以亮猜忌忍殺恐禍及遂與蕭豐嘉努舊作蕭馮家奴今改後仿此等謀立故遼主豫王延禧之孫事覺伏誅夏五月癸丑朔日食金始置交鈔庫從户部尚書蔡松年請也設印造鈔引及交鈔庫一貫二貫三貫五貫十貫五等謂之大鈔一伯二伯三伯五伯七伯五等謂之小鈔與鈔並用以七年為限納舊易新每貫取工墨錢十五文諸路並設使副判各一員都監二員盖以銅少為權宜之制云秋七月張俊卒俊握兵最早屢立戰功帝于諸將中眷注特厚然忌劉錡附秦檜殺岳飛為世所鄙薄焉以敷文閣待制秦塤修撰實録院初魏師遜湯思退字進之處州人等知貢舉以秦熺子塤為榜首及廷試檜以思退為編排師遜為詳定復擬塤第一帝讀塤䇿覺所用皆檜熺語遂進張孝詳字安國歴陽烏江人第一而塤第三時檜從子煒焴姻黨周夤沈興傑皆擢髙第天下切齒至是以塤修撰實録院祖父孫三世同領史職前此未有也八月禁百官避輪對秦檜擅政以來屏塞人語蔽上目耳一時獻言者非誦檜功徳則訐人語言以中傷善類欲有言者恐觸忌諱僅論銷金鋪翠乞禁鹿胎冠子之類以塞責而已故皆避免輪對至是上乃諭執政曰百官輪對正欲聞所未聞近輪對者多謁告避免可令檢舉約束葢防檜壅蔽也冬千一月以施鉅參知政事自秦檜専國士大夫有名望者悉屏之逺方凡齷齪委靡之徒一言契合即登政府稍出一語輙斥去之不異奴隸故自万俟卨罷至此十年參預政事者纔四人而已加秦熺少傅封嘉國公金主亮納其諸從姊妹于宫夀寜縣主實庫舊作什古今改斡布雅布之女也静樂縣主布拉舊作蒲剌今改及實納舊作習橪今改烏珠之女也舒庫爾舊作師古兒今改後仿此額爾衮之女也混同縣君蘇嚕克沁舊作莎里古真今改後仿此及其妹伊都舊作餘都今改後仿此阿嚕之女也皆亮之從姊妹郕國夫人崇節舊作重節今改後仿此富勒呼之女孫亮之姪也張定安妻鼐喇古舊作柰剌忽今改後仿此太后大氏之兄嫂也富魯和卓舊作蒲盧胡只今改後仿此麗妃薩哈之妹也皆有夫亮無所忌耻皆召與之私分属諸妃位下凡宫人在外有夫者初猶分畨出入後乃盡遣其夫往㑹寜不聼出外毎幸婦人必奏樂撒幃常于卧内遍設地衣倮逐為戯十二月西遼耶律伊呼死其妹布沙堪舊作普速完今改權國事伊哷卒子㓜布沙堪以遺令權國稱制改元崇福自號承天皇太后諡伊哷曰仁宗乙亥二十五年全貞元三年夏五月丁未朔日食六月改岳州為純州岳陽軍為華陽軍或言岳州乃岳飛駐軍之地又與其姓同乞改之盖以媚秦檜也岳州人謂飛駐軍乃鄂州于我州何與而改之金汴京火金主亮隂有南侵之意乃謀遷汴遣完顔長寜為南京留守經畫之既而大火宫室盡焚亮大怒杖殺長寜秋八月下趙鼎子汾等于大理獄秦檜于一徳格天閣書趙鼎李光胡銓三人姓名必欲殺之及鼎死而憾不已江西運判張常先箋注前帥張宗元與張浚詩言于朝其詞連逮者數十家將誣以不軌而盡去之㑹汪召錫告宗室知泉州令衿太祖五世孫觀檜家廟記口誦君子之澤五世而斬謫居汀州檜乃諷殿中侍御史徐嚞論趙汾與令袊飲别厚贐必有奸謀詔送汾令袊大理鞫問使汾自誣與張俊李光胡寅胡銓等五十三人謀大逆獄成而檜病不能書矣冬十月徙洪浩于袁州未至卒皓居英州九年始復朝奉郎徙袁州至南雄卒皓久在北庭為金人所敬既歸金人至必問皓為何官居何地不幸為檜所忌不死于敵國而死于讒慝聞者悼之進封秦檜為建康郡王加其子熺為少師並致仕是夕檜死檜病帝幸其第問焉無一語惟流涕而已熺奏請代居相位者為誰帝曰此事卿不當與帝還宫命沈虗中草檜及熺制並令致仕熺夜遣塤與右司員外郎林一飛宗正丞鄭柟見其黨殿中侍御史徐嚞左正言張扶謀請已為相翌日檜熺致仕詔下塤堪皆提舉江州太平興國宫是夜檜死檜居相位十九年倡和誤國忘仇斁倫其遺表有云願陛下固隣國之歡盟謹國是之揺動猶思刦制君上于死後性隂險深阻如崖穽不可測同列論事上前未嘗力辨但以一二語頃擠之俾帝自怒一時忠臣良將誅鋤畧盡其頑鈍無耻者率為檜用争以誣陷善類為功凡無罪可狀者則曰立黨沽檜名曰訕謗曰指斥甚則曰有無君心凡論人章疏皆自操以授言官識之者曰此老秦筆也晚年殘忍尤甚屢興大獄察事之卒布滿京城稍議之者即捕治中以深文専務羅織執政惟取備員甫入輙出惟深徳王次翁歴四年始出之立久任之説士淹滯失職有十年不調者然附之則立與擢用開門受賂富敵于國外國珍寳死猶及門隂結内侍及醫師王繼先伺上㣲旨動静必具知之郡國事惟申省無至上前者由是張扶請檜乗金銀車吕愿中獻秦城王氣詩勢漸不可制及檜死帝謂楊存中曰朕今日始免防檜逆謀矣朱子曰紹興初諸将累捷大有恢復之勢金人始露和議以沮吾計而宰相秦檜歸自金庭獨以長樂梓宫藉口攘却衆謀熒惑主聼使和議翕然以定而不可破士大夫狃于積衷之俗見國家無事而檜與其徒皆享成功無後患顧以忘仇忍辱為事理之當然嗚呼始則倡邪謀以誤國中則挾敵勢以要君使人倫不明人心不正而末流之弊遺親後君無所不至此檜之罪所以上通于天萬死不足以贖也金主亮迎其太后圖克坦氏至燕金主亮命以大房山在順天府房山縣西北亦曰大防山水經注防水出大防山南即此雲峯寺為山陵遣右丞相布薩呼圖如㑹寜奉遷太祖太宗梓宫及迎圖克坦后至流沙河在順天府昌平州南有南北二流北沙河即古濕餘水自居庸關南流至州南與南沙河合南沙河即古易荆水下流至通州入白河亮親迎之命左右持枤二束跪太后前曰亮不孝久缺温凊願笞之后掖之曰今庻民有克家子尚且愛之不忍笞我有子如是寜忍笞乎叱杖者退既至亮事之外極恭順后起則自扶之常從輿輦同行后所御物或自執之見者以為至孝雖太后亦信其誠黜秦檜姻黨十一月釋趙汾李孟堅王之奇等自便臺諌湯鵬舉等累疏言秦檜之姦請逐其姻黨詔安置戸部侍郎曹泳于新州罷端明殿學士鄭仲熊字行可衢州西安人等四人徙侍御史徐嚞正言張扶為他官知建康府王㑹等六人俱以諂附貪冒罷又竄吕愿中等于逺州秦塤曹冠等以檜子孫親戚濫科革正之莫及張常先等八人並以告訐濫叨官爵送逺郡編管尋復趙汾官先是詔奪汾二官與李孟堅王之奇等皆令自便十二月復張浚胡寅張九成二十九人官徙李光及胡銓于近州光移郴州銓移衡州光尋卒丙子二十六年金正隆元年春正月追復趙鼎鄭剛中等官三月罷宰相兼樞宻使以邉事已定也竄東平進士梁勛于逺州勛上書言金人必舉兵宜為之備帝怒編管勛于千里外州軍而下詔曰講和之䇿㫁自朕志秦檜但能贊朕而已豈以存亡而渝定議邪近者無知之輩鼓倡浮言以惑衆聼至有偽撰詔命召用舊臣抗章公車妄議邉事朕甚駭之自今有此當重寘憲典夏五月以沈該万俟卨為左右僕射並同平章事湯思退知樞宻院事初秦檜病篤召董德元字體仁永豐人二十五年九月拜參知政事湯思退至卧内属以後事各贈黄金千兩徳元慮檜以為自外不敢辭思退慮檜以為期其死不敢受帝聞思退不受以為非檜黨遂信任之靖康帝卒于金命史館重修日厯以秦熺修不實也秋七月彗出幷詔求直言八月以張綱字彦正潤州丹徒人參知政事綱初為給事中以秦檜用事遂致仕卧家者二十餘年檜死召為吏部侍郎擢尚書時以彗出求言綱奏求言易聼察難宜命有司詳審章奏無事苟簡及參政事帝力懲秦檜苛政時時以寛恤民力諭輔臣綱乃摘其切于利民八十事標以大指乞鏤版宣布中外冬十月復安置觀文殿大學士張浚于永州浚去國二十年天下士無賢不肖莫不傾心慕焉武夫健將言浚者必咨嗟嘆息至兒童婦女亦知有張都督金使至必問浚安在惟恐其復用而秦檜懼其正論害已令臺臣有所彈劾語必及浚謂為國賊必欲殺之檜死乃復觀文殿大學士判洪州時䘮母將歸葬㑹星變求直言浚慮金人數年間勢必求釁用兵而吾方溺于宴安謂敵可信莫為之備沈該万俟卨居相位尤不厭天下望自以大臣義同休戚不敢以居䘮為嫌乃上疏極言沈該万俟卨湯思退謂敵未有釁而浚乃若禍在年嵗間者皆笑其狂臺諌湯鵬舉凌哲等論浚名在罪籍倡異議以動國是若使歸蜀恐或逺方生患復安置永州丁丑二十七年金正隆二年春三月万俟卨死夏六月以湯思退為尚書右僕射同平章事卨為相主和固位無異秦檜既死思退遂相戊寅二十八年金正隆二年春三月辛酉朔日食秋七月金以李通參知政事金主亮將議南侵以通為謀主故有是命初亮召其倖臣秘書少監張仲軻左諌議大夫馬欽校書郎田與信等便殿侍坐亮謂仲軻曰漢之封疆不過七八千里今吾國幅􅊷萬里可謂大矣仲軻曰本朝疆土雖大而天下有四主若能一之乃謂大耳亮曰彼且何罪而伐之仲軻曰臣聞宋人者馬修器械招納山東叛亡豈得謂無罪亮喜曰向梁珫嘗為朕言宋有劉貴妃者資質美艷今一舉而両得之俗所謂因行掉臂也江南聞我舉兵必遠竄耳欽與與信皆對曰海島蠻越臣等皆知道路彼將安往亮曰然則天與我也朕舉兵滅宋逺不過二三年然後討平髙麗夏國一統之後論功遷秩分賞將士彼必忘勞矣時亮恃其累世彊盛欲大肆征伐以一天下嘗曰天下一家可以為正統及拜李通參知政事通揣知亮意遂與仲軻欽及近習羣小輩盛言江南富庻子女玉帛之多逢其意亮遂議興兵南侵九月以王剛中字時亨饒州樂平人為四川制置使初剛中為中書舎人言禦敵為今日先務敵彊則犯邉弱則請盟今勿計敵人之彊弱必先自治擇將帥蒐士卒實邉儲備軍械加我數年國勢富彊將良士勇彼請盟則為漢文帝犯邉則為唐太宗帝韙其言㑹西蜀謀帥帝曰無如王剛中矣遂有是命冬十月金營汴宫金主亮遣其左丞相張浩參政敬嗣暉字唐臣易州人如汴京營建宫室運一木之費至二十萬牽一車之力至五百人宫殿之餙遍傅黄金而後間以五采金屑飛空如落雪一殿之費以億萬計成而復毀務極華麗國子司業黄中字通老邵武人使還言金人治汴京必欲徙居以廹我不可不早為之備若彼果至京則壯士健馬不數日可及境矣湯思逺大怒左遷中官己卯二十九年金正隆四年春二月金籍諸路兵造戰具金主亮謀南侵乃造戰船于通州金置今屬順天府遣使籍諸路明安部族及契丹奚人不限丁數悉僉之凡二十四萬又僉中都南都中原渤海丁壯年二十以上五十以下者皆籍之凡二十七萬雖親老丁多求一子留侍亦不聼又遣使分詣諸道總管府督造兵器命諸路舊貯軍器並致于燕時又建汴京修燕城民不能堪箭羽一尺至千錢村落間往往椎牛以供筋革至于烏鵲狗彘無不被害者夏五月貶禮部侍郎孫道夫字太冲眉州丹稜人知綿州道夫前使金金主亮將欲南侵陽設為詰責之語亮謂道夫曰歸白爾帝事我上國多有不誠今畧舉二事爾民有逃入我境者邉吏皆即發還我民有叛入爾境者有司索之往往託詞不發一也爾于沿邉盗買鞍馬偹戰陣二也葢將敗盟故先設此二事為辭道夫還具奏之帝曰朝廷待之甚厚欲以何名為兵端道夫曰彼身弑其君而奪之位興兵豈有定名湯思退沈該以為不然道夫每對帝輙言武事該疑其引用張浚忌之故貶六月遣王綸字徳言建康人使金帝聞金主亮有南侵意疑之使王綸徃覘綸還入對言鄰國恭順和好無他皆陛下威德所致湯思退等皆賀帝曰中外之論皆欲沿邉屯戍軍馬移易將帥為進取之計萬一輕舉兵連祸結何時而已秋八月召監潭州南嶽廟朱熹字元晦一字仲晦徽州婺源人不至熹少有求道之志父松字喬年度支員外郎史館校勘忤秦檜出知饒州方疾亟屬熹曰胡憲字原仲安國從子劉勉之字致中建州崇安人劉子翬字彦冲韐仲子三人學有淵源吾所敬畏吾即死汝往事之熹奉以告而禀學焉既博求之經傳復徧交當世有識之士及舉進士為泉州同安晉縣今属福建泉州府主簿罷歸聞延平注見前李侗字愿中南劔州劍浦人學于羅從彦字仲素南劍州人得伊洛之正遂徒歩往從之其學大要窮理致知反躬踐實而以居敬為主築室于武夷山中山在福建建寜府崇安縣南山高五百仭有三十六峯其溪流分為九曲昔有神人武夷君居此故名漢武帝嘗祀之四方逰學之士從之者如市上聞其賢故召之熹卒不至憲生而静慤不妄笑語紹興中與勉之同入太學時禁伊洛之學憲與勉之求得程頥書潛抄黙誦夜以繼日聞涪陵譙定受易學于頥二人往從受業久未有得定曰心為物漬故不有見惟學乃可明耳憲悟曰所謂學者非克己工夫耶自是一意下學不求人知一旦揖諸生歸崇安故山力田賣藥以奉其親從遊日衆號籍溪先生仕終秘書省正字勉之從譙定劉安世楊時受學卒業乃還崇安結草堂讀書其中力耕自給澹然無求于世惟與憲子翬日相往來講論學者踵至勉之随其才器為説聖賢之道因以女妻熹門人號曰白水先生子翬以父死國難痛憤致疾棄興化通判隐居武夷山中者十七年與憲勉之交相得毎見講學外無雜言他所與遊皆知名士而期以任重致逺者朱燾而已熹從子翬遊子翬以易之不遠復三言俾佩之終身學者稱為屏山先生譙定字天授涪陵人劉安世字器之魏人興化宋軍今為府属福建九月以湯思退陳康伯字長卿信州弋陽人為尚書左右僕射並同平章事時湯思退轉左僕射康伯遂同相帝謂康伯曰卿静重明敏一語不妄發真宰相也今與思退共政如有可否勿憚商㩁康伯曰大臣論國事自當盡心若依阿植黨臣所不敢皇太后韋氏崩諡曰顯仁帝事后甚謹先意承志惟恐不及或一食稍減輙不勝憂懼常戒宫人曰太后年已髙惟優游無事起居適意即夀考康寜事有所關慎勿令知第來白朕至是崩年八十矣冬十一月攅顯仁皇后攢子永祐陵之西祔神主太廟庚辰三十年金正隆五年春二月以普安郡王瑗為皇子更名瑋進封建王初帝知瑗之賢欲立為嗣恐太后意所不欲遲囘久之及后崩帝問吏部尚書張燾以方今大計對曰儲嗣者國之本也天下大計無踰于此今兩邸名分宜早定帝喜曰朕懐此久矣開春當議典禮燾頓首謝至是利州提㸃刑獄范如圭掇至和嘉祐間名臣奏章凡三十六篇合為一書囊封以獻請㫁以至公勿疑帝感悟即日下詔以普安郡王為皇子加恩平郡王璩開府儀同三司判大宗正寺稱皇姪秋七月以葉義問字審言嚴州壽昌人知樞宻院事朱倬字漢章閩縣人參知政事倬初以張浚薦自宜興簿入對時方以劉豫為憂倬䇿其必敗帝大喜而秦檜惡之出為越州敎授檜死倬知恵州陛辭因言前事帝問卿何久淹如此倬言為檜所扼帝愀然慰諭目送之且曰人不知卿惟朕獨知遂累擢至中丞論事多所禆益帝信任之八月丙午朔日食九月以李寳河北人為浙西副總管寳嘗覊金拔身自海道來歸至是召對詢以北事歴歴如數乃授官令于平江督海舟捍禦冬十二月湯思退有罪免侍御史陳俊卿字應求興化人論思退挾巧詐之心濟傾邪之術觀其所為多效秦檜葢思退致身皆秦檜父子恩也宜寘之憲典遂奉祠初行㑹子户部侍郎錢端禮字處和臨安人被㫖造㑹子儲見錢于城内外流轉其合發官錢並許兑㑹子輸左藏庫初行于兩浙遂通行諸州辛巳三十一年金正隆六年十月世宗雍大定元年春正月甲戌朔日食帝不受朝風雷大雨雪侍御史汪澈字明逺新安人徙饒州言春秋魯隠公時大雨震電繼以雨雪孔子以八月之間再有大變謹而書之今一夕之間二異交至此隂盛之證殆為金人且言荆襄無統督江海乏偹禦因陳修攘之䇿二月分經義詩賦為兩科取士禮部侍郎金安節言熙寜元豐以來經義詩賦廢興離合隨時更革近合科以來通經者苦賦體雕刻習賦者病經㫖淵微心有弗精業難兼濟此後進往往得志而老生宿儒多困也請復立兩科永為成憲從之先是定制以本經語孟義各一道為首次詩賦各一首次子史論時務䇿各一道至是分經義詩賦為兩科而解額未定議者謂宜以三為率二取經義一取詩賦然不果行三月以陳康伯朱倬為尚書左右僕射並同平章事以呉拱玠之子知襄陽府先是康伯以金人必敗盟請早為之偹及聞金人决欲敗盟乃以利州西路都統制呉拱知襄陽府部兵三千戍之考宋史髙宗紀及陳康伯張去為傳召楊存中等議舉兵並在五月金使既來之後續綱目係于金使未来之前非是今改係詔議舉兵條下夏五月金主亮遣使徴漢淮之地始聞靖康帝之䘮金主亮嘗宻隐畫工于奉使中俾冩臨安湖山以歸為屏而圖已之像䇿馬于呉山在杭州府城内西南隅舊名胥山上有伍子胥祠絶頂題詩其上有立馬呉山第一峯之句至是遣其簽書樞宻院事髙景山右司員外郎王全來賀天申節亮謂全曰汝見宋主即面数其焚南京宫室沿邉買馬招致叛亡之罪當命大臣来此朕將親詰之且索漢淮之地如不從則厲聲詆責之彼必不敢害汝盖欲激怒以為南侵之名也又謂景山曰囘日以全所言奏聞全至臨安一如金主之言以詆帝帝謂全曰聞公北方名家何乃如是全復曰趙桓今已死矣帝始聞淵聖崩遽起發哀而罷詔持斬衰三年上淵聖廟號曰欽宗時朝論俟使去發䘮左史黄中馳白宰相此國家大事臣子至痛一有失禮謂天下後世何左僕射陳康伯獨主中持論竟得如禮詔議舉兵帝命宰執召同安郡王楊存中三衙帥趙宻字㣲叔太原清河人至都堂議舉兵又召侍從臺諌集議陳康伯傳上㫖曰今日更不論和與守直問戰當如何時帝意雅欲視師内侍省都知張去為隂沮用兵且陳退避䇿中外妄傳幸閩蜀人情洶洶朱倬無一語康伯奏曰金敵敗盟天人共憤今日之事有進無退聖意堅决則將士之意自倍願分三衙禁旅助襄漢待其先發應之時已先命呉拱守㐮陽又命主管馬軍司成閔部兵三萬戍鄂州殿中侍御史陳俊卿以去為竊權撓政乞斬之以作士氣以呉璘為四川宣撫使詔以金使語諭諸路統制郡守監司隨宜應變以呉璘宣撫四川仍令王剛中同處置軍事六月以劉錡為江淮浙西置制使屯揚州時宿將無在者乃以錡為江淮浙西置制使節制逐路軍馬故遼人伊喇斡翰舊作移剌窩斡今改後仿此叛金圍臨潢初金主亮徴兵南侵使牌印金官名掌御寳及金銀等牌後改名御寶郎素赫舊作燥合今改後仿此如西北路盡僉契丹壯丁契丹人不願行求之素赫素赫不從于是西北路招討司譯史薩巴與部衆殺招討使完顔烏澤舊作沃側今改後仿此及素赫等取招討使司貯甲三千遂反議立故遼主延禧子孫推都監楞華善舊作老和尚今改為招討使山後山前諸羣收應之咸平府金置故城在今奉天府鐵嶺縣穆昆瓜里舊作謀克括里今改舉兵據咸平繕完器甲出府庫財物募兵以應薩巴其勢益張金主亮使布薩呼圗等討之皆無功而薩巴自度大軍必繼至勢不可支謀歸西遼乃率衆沿龍駒河金史地理志臨潢府長㤗縣北有龍駒河長泰廢縣在故臨潢城東宋薛映記所謂長泰館是也西出舊居山前者皆不欲往偽署六院節度使伊喇斡罕殺薩巴執楞華善等自為都元帥擁衆東還至臨潢府東南新羅寨東京留守曹國公烏禄使伊喇扎巴舊作移剌扎八今改後仿此招之斡罕已約降而扎巴見斡罕兵衆彊盛車帳滿野意其可以有成反説之曰我之始來以汝輩不能有為今觀兵勢彊盛如此汝等欲如羣羊為人所驅去乎將欲待天時乎若果有大志吾亦不復還矣于是斡罕决意不降遂攻臨潢圍之衆至五萬秋七月金主亮遷都于汴金大括馬于諸路先是調馬于諸路以户口為差計五六十萬匹仍令其戸自養以俟至是又大括驘馬官至七品聼留一匹等而上之並舊籍民馬其在東者給西軍在西者給東軍交相往來晝夜絡繹不絶死者狼籍于道其亡失多者官吏懼罪或自殺所過蹂踐民田調發牽馬夫役詔河南州縣所貯糧米以俻大軍不得他用驘馬所至當給芻粟而無可給有司以為請金主亮曰北方比歳民間儲畜尚多今禾稼滿野驘馬可就牧田中借令再歳不穫亦何傷乎于是國内騷然盗賊蠭起大者連城邑小者保山澤有以盜賊事聞者亮輙杖而黜其官太醫使祈宰字彦輔江淮人上疏諫南侵亮殺之由是羣臣不敢言金主亮大殺宋遼宗室之在其國者凡百三十餘人遣樞宻都承㫖徐嚞如金至盱眙金人却之乃還先是遣周麟之字茂振海陵人賀金遷都麟之憚金辭行坐免遂以嚞代之嚞至盱眙金主亮使韓汝嘉就境上止之曰朕始至此比聞北方小警欲復歸中都無庸來賀也嚞乃還八月宿遷人魏勝字彦威淮陽軍宿遷人起兵復海州詔以勝知州事勝多智勇應募為弓箭手居山陽及金人籍諸路民為兵勝躍曰此其時也聚義士三百北渡淮取漣水軍宣布朝廷徳意不殺一人金知海州事髙文富遣兵捕勝勝迎擊走之追至城下文富閉門固守勝令城外張旗幟舉烟火為疑兵又使人向諸城門諭以金人棄信背盟無名興兵及本朝寛大之意城中人聞即開門獨文富與其子安仁率牙兵拒之勝殺安仁及州兵千餘擒文富民皆安堵如故勝遣人諭朐山後周縣明省入海州懐仁東魏縣故城在今海州贛榆縣沐陽東魏縣今属海州東海注見前諸縣皆定之乃蠲租税釋罪囚發倉庫犒戰士分忠義士為五軍紀律明肅部分如宿將勝益募忠義以圖收復逺近聞之響應旬日得兵數千勝將董成率所部千餘人直入汴州殺金守將及軍士三千餘衆悉降得器甲數萬金遣䝉古舊作䝉括今改鎮國以兵萬餘取海州抵州北二十里新橋勝迎之設伏于隘陣以待衆殊死戰伏發敵大敗殺鎮國馘千人降三百人軍聲益振山東之民咸欲來附勝傳檄招諭結集以待王師之至沂民壁蒼山者數十萬金人圍之久不下砦首滕􅀢告急于勝勝提兵往救之陳于山下金人多伏兵勝兵遇伏皆赴砦金人襲之勝單騎而殿以大刀奮擊金人望見勝知其為將也以五百騎圍之數重勝馳突四擊金陣開復闔戰移時身被數十槍冒刃出圍金兵追之馬中矢踣歩而入砦無敢當者金人又急攻絶其水砦中食乾糒殺牛馬飲血金人攻益急周山為營勝度其必復攻海州因間出砦趨城中金人果解蒼山圍自新橋抵城下勝出戰皆捷金分兵四面攻之勝募士登城以禦矢石如雨者七日金兵多死傷遁去蒼山在山東沂州府蘭山縣東以成閔為京湖制置使金完顔亮弑其太后圖克坦氏九月遂大舉入冦亮本金朝亂賊且是年金世宗即位故變例書入冦圖克坦氏聞亮欲南侵數以言諌亮不悦毎謁見還宫必忿怒人不知其故及至汴后居寜德宫使侍婢髙福娘問亮起居亮幸之因使伺候動静凡后所為事無大小福娘夫特黙格舊作特末哥今改後仿此教福娘増餙其言以聞及契丹反樞宻使布薩呼圖討往辭謁后后謂曰國家世居上京既徙中都今又至汴復将興兵涉江淮伐宋疲弊中國我嘗諌止之不見聴也契丹事復如此奈何福娘以告亮亮意謂后嘗養鄭王充本名錫圖美宗幹之子太祖之孫接錫圖美舊作神土懣今改後仿此為己子充四子皆成立恐呼圗將兵在外或有異圗乃召㸃檢大懷忠等使弑后且指名后左右數人皆令殺之后方摴蒲懐忠等至令后跪受詔后愕然方下跪尚衣局使華特黙舊作虎特末今後改仿此從後擊之仆而復起者再高福娘等縊殺之並殺其左右數人亮命焚后于宫中棄骨于水並殺鄭王充之子塔納舊作擅奴今改後仿此阿里布舊作阿里白今改後仿此等二人遂召呼圗等還皆殺之封髙福娘為鄖國夫人以特默格為澤州刺史又以尚書令張浩左丞相蕭玉諌伐宋杖而釋之自是莫有敢諌者遂分諸道兵為三十二軍置左右大都督及三道都統制府以總之以璸都錫斡之子後改名昻舊作奔賭錫斡舊作斜斡今改為左大都督李通副之赫舍哩良弼輝發川人輝發川舊作回怕川今改為右大都督烏雅富勒琿副之蘇保衡字宗尹雲州天成人為浙東道水軍都統制完顔正嘉努舊作鄭家今改副之由海道徑趨臨安劉蕚大興宛平人為漢南道行營兵馬都統制進自蔡州以瞰荆襄圗克坦喀齊喀上京素蘇海水人喀齊喀舊作合喜素蘇海舊作速蘇海今改為西蜀道行營兵馬都統制由鳯翔取大散闗駐軍以俟後命左監軍圗克坦貞别將兵二萬入淮隂九月亮召諸將授方畧賜宴于尚書省令皇后圗克坦氏與太子光英居守張浩蕭玉敬嗣暉留治省事亮戎服乘馬具裝起行妃嬪皆從衆六十萬號百萬氊帳相望鉦鼓之聲不絶李通造浮梁于淮水之上將自清河口入淮東逺近皆震金人攻黄牛堡在漢中府鳯翔縣東比呉璘等敗之遂復秦隴洮三州金圖克坦喀齊喀將五千騎扼大散闗遊騎攻黄牛堡守將李彦堅告急人情洶洶制置使王剛中跨一馬馳二百里至呉璘營起璘于帳中曰大將與國義同休戚臨敵安得髙枕而卧璘大驚即馳至殺金平注見前駐軍青野原在漢中府畧陽縣北益調内郡兵分道而進以援黄牛剛中又以蠟書抵張正彦濟師西師大集李彦堅以神臂弓射金師卻之璘遣别將彭青至寳雞渭河夜刦橋頭寨在鳯翔府寳鷄縣南渭河自隴州流入有橋跨其上故名破之又遣劉海復秦州彭青復隴州曹休復洮州金師既退剛中倍道馳還謂其屬李燾曰將帥之功吾何有焉燾嘆曰身督戰而功成不居過人逺矣李燾字仁甫眉州丹祾人劉錡遣兵復泗州髙平人王友直字聖益博州髙平人考宋史地理志博州有髙唐博平無髙平髙平乃凙州縣也列傳疑有悞起兵復大名遣使入朝友直父佐以材武稱友直幼從父諳兵法志復中原聞金亮渝盟乃結豪傑謂之曰權所以濟事權歸于正何害于理即矯制自稱河北等路安撫制置使以其使王任為副使徧諭州縣勤王未幾得衆數萬制為十二軍置統制等官以統之進攻大名一鼔而克撫定衆庻諭以紹興年號遣人入朝奏事已而自夀春來歸詔以為忠義都統制冬十月金人圍海州魏勝李寶合擊大敗之亮渡淮慮勝睨其後分軍數萬圍海州㑹李寶帥舟師由海道將拒敵于膠西隋縣元于此置膠州明省縣入州今州屬山東萊州府勝遣人邀之寶遡風至東海慷慨厲士赴援與勝同擊金兵于新橋在海州北敗之勝還守北關方輿紀要在海北北宋時築此據險戍守金兵逼闗勝登闗門張樂飲酒犒軍士令固守勿出戰踰時乃少遣士出慿險隘擊之金人知不可攻率軍轉而渡河襲關後欲過砂堰在海州東北圜城為營勝先已據堰尋以單騎逐敵騎于東門外大聲叱之皆駭㪚翌早乘昏霧四面薄城急攻勝竭力捍禦金兵不能前乃㧞砦走金人渡淮劉錡進軍楚州以拒之劉錡兵至揚州建大將旗鼓軍容甚肅以兵駐清河口扼金師金人以氊裹船載糧而來錡使善没者鑿沈其舟金人自渦口渡淮錡次于淮陰列兵運河岸以扼之金人立曹國公烏禄為帝于遼陽更名雍是為金世宗亮自發汴京將士在道多亡歸者哈斯罕舊作曷蘇館今改方輿紀要遼置以處熟女真今改路置節度使後廢故城在葢州東南考葢州今奉天府盖平縣是明安完顔福夀髙忠建盧萬家博索舊作婆束後訛為婆娑今改路金置博索府故城在今奉天府鳯城東總管黙音羅索子舊作謀衍今改東京穆昆金珠舊作金住今改等始受甲于大名即舉部亡歸從者二萬餘皆公言于路曰我輩今往東京立新天子矣時東京留守烏禄性仁孝沈静明逹衆心歸之亮常使摩羅歡舊作謀良虎按此與金初别名宗雄之摩羅歡另是一人圖淮北諸王烏禄聞而憂懼㑹故吏禄錦舊作六斥今改後仿此自汴還具言金主殺母䓁事且曰將遣使害宗室兄弟矣烏禄益懼謀于其舅興元少尹李石字子堅遼陽人石勸烏禄先殺副留守髙存福烏禄遂執存福將殺之適福夀等以軍入東京乃共殺存福等烏禄遂御宣政殿即位赦改元大定下詔暴揚亮罪惡數十事追尊鄂爾多為帝廟曰睿宗劉錡將王權軍潰于昭闗錡引還揚州金完顔亮入廬州錡遣都統王權措置淮西權不從錡節制聞金兵大至即棄廬州退屯昭闗不戰而潰錡聞之遂自淮陰退還揚州亮入廬州權自昭闗退保和州已而金人䧟真州統制邵宏淵逆戰敗走王權尋退屯采石金亮遂入和州吳拱成閔遣兵復唐鄧諸州帝親征詔葉義問督視江淮軍馬虞允文字彬甫降州仁夀人參謀軍事帝聞王權敗詔楊存中至内殿議禦敵之䇿因命存中就陳康伯議欲航海避敵康伯延之入解衣置酒帝聞之已自寛明日康伯入奏曰聞有勸陛下幸越趨閩者審爾大事去矣盍静以待之一日帝忽降手詔曰如敵未退散百官康伯焚詔而後奏曰百官散主勢孤矣帝意既堅康伯乃請下詔親征帝從之以葉義問督視江淮軍馬中書舍人虞允文參贊軍事尋以楊存中為御營宿衛使詔呉璘出兵漢中璘遂復商虢州李寳大破金人于陳家島在膠州海中殺其將完顔正嘉弩寳既解海州之圍遂與其子公佐引舟師至膠西石臼島在膠州南海中海防考濱海要衝有膠州石臼等所及海中之陳家島諸處敵舟已出海口泊陳家島相距僅一山時北風盛寳禱于石臼神風自柂樓中來如鐘鐸聲衆咸奮引舟握刀待戰金操舟者皆中原遺民遥見寳船紿敵兵入舟中使不知王師猝至風駛舟疾過山薄敵鼓聲震蕩海波騰躍敵大驚掣矴舉帆帆皆油纈彌亘數里風浪捲聚一隅窘束無復行次寳命大箭射之烟焰隨發延燒數百艘火所不及者猶欲前拒寳叱壯士躍登其舟以短兵擊殺之降者三千餘人斬其將完顔正嘉弩等六人擒倪詢等上于朝獲其統軍符印與文書器甲糧斛以萬計餘物衆不能舉者悉焚之火四晝夜不滅金人破揚州劉錡遣兵拒于皂角林在揚州府江都縣南大敗之錡以舟渡真揚之民于江南留屯爪洲金人來争錡命步將呉超員琦王佐等拒之于皂角林錡䧟重圍下馬死戰佐以歩卒設伏林中金人既入張弩俄發金人以運河岸狹非騎兵之利稍稍引去追擊大破之斬其統軍髙景山十一月召張浚判建康府殿中侍御史陳俊卿上疏極言浚忠藎帝悟乃詔復官判建康府至岳陽買舟冒風雪而行時金兵充斥浚遇東來者云敵兵方盛焚采石烟熖張天慎毋輕進浚曰吾赴君父之急知直前求乗輿所在而已遂乗小舟徑行時長江無一舟敢行北岸者編管王權于瓊州以李顯忠代將其軍金人侵𤓰洲葉義問使中軍統制劉氾錡之姪禦之敗績義問走建康時劉錡病甚求解兵柄留其姪中軍統制氾以千五百人塞𤓰洲李横以八千固守詔錡還鎮江専防江于是盡失兩淮之地金人攻𤓰洲汜以克敵弓射卻之葉義問至鎮江見錡病劇以李横權錡軍遂督兵渡江衆以為不可義問彊之汜請出戰錡不從汜拜家廟而行金人以重兵逼𤓰州汜先退李横以孤軍不能當亦郤失其都統制印横左軍統制魏俊右軍統制王方死之横汜僅以身免錡聞汜敗因憤悶疾益甚義問聞之乃遵陸趨建康市人皆媟罵之虞允文大敗金軍于采石完顔亮趨揚州亮築臺江上自披金甲登臺殺黒馬以祭天以一羊一豕投于江中召賓都等謂之曰舟楫已具可以濟江矣富勒琿曰臣觀宋舟甚大我舟小而行遲恐不可濟亮怒曰爾昔從梁王追趙構入海島豈皆大舟邪誓明日渡江晨炊玉麟堂即毓麟堂在和州梅江之濱先濟者與黄金一兩亮置黄旗紅旗于岸上以號令進止時葉義問命虞允文徃蕪湖迎李顯忠交王權軍且犒師允文至采石權已去顯忠未來敵騎充斥軍士三五星散解鞍束甲坐道傍皆權敗兵也允文謂坐待顯忠則誤國事遂立召諸將勉以忠義曰金帛誥命皆在此以待有功衆曰今既有主請死戰或謂允文曰公受命犒師不受命督戰他人壞之公受其咎邪允文叱之曰危及社稷吾將安避乃命諸將列大陣不動分戈船為五其二並東西岸其一駐中流藏精兵待戰其二藏小港備不測部分已畢敵已大呼亮操小紅旗麾數百艘絶江而來瞬息之間抵南岸者七十艘直薄官軍軍小郤允文入陣中撫統制時俊之背曰汝膽畧聞四方立陣後則兒女子爾俊即揮雙刀出士殊死戰中流允文軍以海鰌船衝敵舟皆平沈敵半死半戰日暮未退㑹有潰卒自光州至允文授以旗鼓從山後轉出敵疑援兵至始遁允文又命勁弩尾擊追射大敗之金兵還和州凡不死于江者亮悉敲殺之㑹報曹國公已即位于東京改元大定亮撫髀歎曰朕本欲平江南改元大定此非天乎因出其素所書取一戎衣天下大定改元事以示羣臣遂召諸將帥謀北還且分兵渡江李通曰陛下親征深入異境無功而還若衆散于前敵乘于後非萬全計若留兵渡江車駕北還諸將亦將解體今燕北諸軍近遼陽者恐有異志宜先發兵渡江斂舟焚之絶其歸望然後陛下北還南北皆指日而定矣亮然之允文知亮敗明當復来夜半部分諸將分海舟縋上流别遣盛新以舟師截金人于揚林河口在和州東今曰揚林渡明旦敵果至因夾擊之復大敗焚其舟三百敵遣偽詔來諭王權似有宿約者允文曰此反間也乃復書言權因退師已寘憲典新將李顯忠也願快戰以决雌雄亮得書大怒遂焚其龍鳯舟斬梁漢臣首勸亮渡江者及造舟者二人率軍趨揚州使符寳郎耶律摩多舊作没答今改後仿此䕶神果軍扼淮渡凡自軍中還至淮上無都督府文字皆殺之劉錡罷以成閔李顯忠呉拱為兩淮京湖三路招討使顯忠至采石虞允文語之曰敵入揚州必與瓜洲兵合京口無備我當徃公能分兵相助乎顯忠分萬六千與之允文遂還京口時敵屯重兵滁河今曰後河源出黄山逕和州西北與滁州分界東南至六合縣入江造三牐儲水深數尺塞山洲口楊存中成閔邵宏淵諸軍皆集京口凡二十餘萬允文以戰艦數少不足用聚材改治之命張深守滁河口扼大江之衝以苖定駐下蜀鎮名在江寜府句容縣北為援且謁劉錡問疾錡執允文手曰疾何必問朝廷養兵三十年一技不施而大功乃出一儒生我輩愧死矣以疾篤召還提舉萬夀觀詔以閔等為招討使閔淮東顯忠淮西拱湖北京西金完顔亮為其下所殺亮至𤓰洲居于龜山寺虞允文與楊存中臨江按試命戰士踏車船中流上下三周金山囘轉如飛敵持滿以待相顧駭愕亮笑曰紙船耳有一將跪奏南軍有備不可輕願駐揚州徐圖進取亮怒杖之五十召諸將約以三日濟江否則盡殺之驍騎噶山舊作髙僧今改欲誘其黨以亡事覺亮命衆刃剉之乃下令曰軍士亡者殺其富埒琿穆昆之副舊作蒲里衍今改後仿此富勒琿亡者殺其穆昆穆昆亡者殺其明安明安亡者殺其總管由是軍士益危懼亮又令軍中運鴉鶻船于𤓰洲期以明日渡江敢後者死衆欲亡歸乃决計于浙西都統制耶律元宜本名聞烈一名伊特璉父慎思賜姓完顔按阿烈舊作阿列伊特璉舊作移特輦今改後仿此及明安唐古烏頁舊作唐括烏野今改後仿此且曰前阻淮渡皆成擒矣比聞遼陽新天子即位不若共行大事然後舉軍北還元宜然之乃期詰旦衛軍番代即行事黎明元宜等帥諸將以衆薄亮營亮聞亂意宋兵奄至攬衣遽起箭入帳中亮取視之愕然曰我兵也近侍大慶善舊作大慶山今改曰事急矣當出避之亮曰走將安往方取弓已中箭仆地延安少尹納合㙮鄂勒博舊作納合幹魯補今改先刃之手足猶動逐縊殺之軍士攘取行營服用皆盡乃取驍騎指揮使逹磐舊作大磐今改衣巾裹其尸焚之收其妃嬪及李通郭安國圖克坦永年梁珫大慶善等殺之元宜自為左領軍副大都督使人殺太子光英于汴退軍三十里遣人持檄詣鎮江議和未幾金軍在荆襄兩淮者皆拔寨北還史臣曰完顔亮智足以拒諫言足以餙非欲為君則弒其君欲圖隣則弑其母欲奪人之妻則使之殺其夫三綱絶矣何暇他論至于屠滅宗族剪刈忠良婦姑姊妹盡入嬪御卒之戾氣感召身由惡終使天下後世稱無道主以亮為首可不戒哉可不戒哉十二月成閔李顯忠收復兩淮州郡帝如建康張浚至建康即具行宫儀物請車駕臨幸帝從之帝至建康張浚迎拜道左衛士見浚無不以手加額浚起復用風采隐然軍民皆倚為重金主入燕壬午三十二年金大定二年春正月戊辰朔日食山東人耿京起兵復柬平遣其將辛棄疾字㓜安齊州人來朝完顔亮死中原豪傑並起山東人耿京據東平自稱天平節度使以齊州人辛棄疾掌書記棄疾勸京來歸京遣棄疾奉表詣行在帝大喜厚賚之以京知東平府金遣使來聘金主下令散南征之衆以髙忠建為報諭宋國使且告即位二月以虞允文為川陜宣諭使允文還朝帝慰藉嘉嘆謂陳俊卿曰允文朕之裴度及是陛辭言金亮既誅新主初立彼國方亂天相我恢復也和則海内氣沮戰則海内氣伸帝以為然允文至蜀遂與呉璘經畧中原帝還臨安時將祔欽宗于太廟帝還臨安謂張浚曰卿在此朕無北顧憂矣御史呉芾字明可台州仙居人言建康可以控帯襄漢經畧淮甸大駕宜留以繫中原之望若還臨安則西北之勢不能相接不從金以張浩為尚書令金主嘗謂宰相曰進賢退不肖宰相之職也有才能髙于己者或懼其分權往往不肯引置同列朕甚不取卿等母以此為心時以近侍進言欲罷科舉者金主問浩曰自古帝王有不用文學者乎浩曰有之曰誰歟浩曰秦始皇金主顧近侍曰豈可使我為秦始皇事遂寢閏月祔欽宗于太廟呉璘復大散闗分兵和尚原金人走寳雞璘遣兵復河源州及積石鎮戎軍遂復大散關太尉威武節度使劉錡卒諡武穆錡以劉汜敗發怒嘔血數升至是卒贈開府儀同三司錡慷慨深毅有儒將風亮之南下也令有敢言錡姓名者斬枚舉南朝諸將問其下孰敢當者皆随名姓以對其答如響至錡莫有應者亮而没曰吾自當之惜錡以疾不能成功齊恨耿京將張安國殺京以降金辛棄疾還執安國送臨安斬之張安國殺京降金辛棄疾還至海州與衆謀曰我縁主帥來歸朝不期事變何以復命乃約李寳統制王世隆等徑趨金營即帳中縛安國獻于臨安斬之詔授棄疾江隂僉判棄疾獻議恢復持論勁直不為迎合衆壯之呉璘復順徳軍宋置治隴干故城在今平凉府静寜縣及環州注見前璘遣姚仲取鞏王彦屯商虢陜華惠逄取熈河或久攻不下或既得復失竟無成功仲舎鞏攻德順踰四旬不克璘以李師顔代之遣子挺節制軍司挺與金人戰于瓦亭大敗之擒其千戸耶律紏堅舊作九斤今改後仿此等百三十七人金人懲其敗悉兵趨順德璘自將往督師先壁于險且治夾河戰地璘至城下守陴者聞呼相公來觀望咨嗟矢不忍發璘按行諸屯斬不用命者先以數百騎進金鋭卒空壁躍出突璘軍璘軍得先治地無不一當百至暮璘忽傳呼其將戰不力人益奮搏金大敗遁入壁黎明師再出金人堅壁不動㑹大風雪遂拔營去凡八日而克璘入城市不改肆父老擁馬迎之璘又遣嚴忠取環州遂還河池時姚仲等又復蘭㑹熈鞏等州及永安軍宋陜西諸路無永安軍當作永興遣起居舎人洪邁字景盧皓季子使金金髙忠建至臨安議遣使報聘且賀即位工部侍郎張闡字大猷永嘉人請嚴遣使之命正敵國之禮彼或不從則有戰耳如是則中國之威可以復振帝然之遂遣洪邁充賀登極使帝謂執政曰向日講和本為梓宫太后雖屈已卑辭有所不憚今兩國之盟已絶宜正名畫境朝儀嵗幣當先定之邁乃奏接伴禮儀十有四事既而忠建責臣禮及取新復州郡陳康伯以義折之乃止邁行書用敵國禮帝手扎賜邁曰祖宗陵寢隔濶三十年不得以時灑掃祭祀心實痛之若彼能以河南地見歸必欲居尊如故正復屈已亦何所惜邁奏言山東之兵未解則兩國之好不成至燕金閤門見國書不如式抑令于表中改部臣二字朝見之儀必欲用舊禮邁執不可金鎻使館三日水漿不通及見金人語不遜欲留邁張浩不可乃遣還夏四月金人又攻海州鎮江都統張子蓋字徳髙俊從子及魏勝大敗之金人復遣烏錦舊作五斤今改後仿此太師發諸路兵三十餘萬攻海州先遣一軍自州西南㫁勝軍饟道勝擇勇悍士三千餘騎拒于石門堰亦曰石闥堰在海州西南即石湫河上游也金軍不能進逮夜始還留千人偹險隘金兵十萬來奪勝率衆鏖戰殺數千人餘皆遁去勝還入城無何金兵還城圍數重勝以郭蔚分兵備禦或獨出擾之使不得休息又間夜發兵刦其營或焚其攻具既而金人併力急攻勝告急于李寳寳以聞命張子盖往援進次石湫堰在石門堰南今為鎮金人陳萬騎于河東子盖率精鋭數千騎擊之統制張汜畧陣中流矢死子葢曰事急矣奮臂大呼馳入陣勝等繼之殊死戰金人大敗擁溺石湫河死者半圍遂解五月金追廢完顔亮為海陵煬王蕭玉敬嗣暉許霖等輔亮為虐皆放歸田里特黙格及其妻髙氏伏誅明年追討亮弑熈宗罪廢為庻人立建王瑋為皇太子更名眘音慎初完顔亮南侵兩淮失守朝臣多勸帝退避建王瑋不勝其憤及帝下詔親征瑋請帥師為前驅直講史浩字直翁明州鄞縣人聞之入言于瑋曰皇子不宜將兵因為草奏請扈蹕以供子職帝亦欲瑋徧識諸將遂命從幸金陵及還臨安帝欲遜位陳康伯宻贊大議乞先正名俾天下咸知聖意遂草立太子詔以進帝從之瑋既立更名眘六月罷三招討使以李顯忠主管侍衛軍馬司成閔主管殿前衛司呉拱主管侍衛歩軍司顯忠隂結金都統蕭錡為内應請出師欲自宿亳趋汴由汴京以通関陜関陜既通則鄜延一路熟知顯忠威名皆得響應且欲起其舊部數萬以取河東㑹詔罷兵乃止追封子偁為秀王詔集議子偁封爵户部侍郎汪應辰字聖錫信州玉山人定其稱曰太子本生之親議入内降曰皇太子所生父可封秀王諡安僖母張氏為王夫人帝傳位于太子自稱太上皇帝皇后稱太上皇后太子即位大赦是為孝宗帝降手札曰皇太子可即皇帝位朕稱太上皇帝后稱太上皇后退居德夀宫帝服袍履歩出祥曦門冒雨掖輦以行及宫門弗止上皇麾謝再三且令左右扶掖以還顧謂羣臣曰付託得人吾無憾矣帝朝太上皇于德夀宫帝五日一朝太上皇不許自是月四朝以龍大淵為樞宻副都承㫖曽覿字統甫其先汴人幹辦皇城司二人帝潛邸内知客也尋以大淵知閤門事覿同知閤門事詔中外臣庻陳時政闕失監南嶽廟朱熹封事首言帝王之學必先格物致知以極夫事物之變使義理所存纎悉必照則自然意誠心正而可以應天下之務次言修攘之計不時定者講和之説疑之也金於我有不共戴天之仇則不可和也明矣願㫁以義理之公參以義利之實閉闗絶納任賢使能更相激厲以圖事功數年之間國富兵彊視吾力之彊弱觀彼釁之淺深徐起而圖之中原故地不為吾有而將焉往次言四海利病係斯民之休戚斯民之休戚係守令之賢否監司者守令之綱朝廷者監司之本欲斯民之得所本原之地亦在朝廷而已秋七月召張浚入朝以為江淮宣撫使封魏國公帝手書召浚入見浚至帝改容曰久聞公名今朝廷所恃惟公因賜之坐浚從容言人主之學以心為本一心合天何事不濟所謂天者天下之公理而已必兢業自持使清明在躬則賞罰舉錯無有不當人心自歸敵仇自服帝悚然曰當不忘公言加浚少傅魏國公宣撫江淮浚見帝英武力陳和議之非勸帝堅意以圖恢復欲遣舟師自海道𢷬山東命諸將出師掎角以向中原翰林學士史浩以潜邸舊臣特預樞宻議欲城采石𤓰洲浚言不守兩淮而守江是示敵以削弱怠戰守之氣不若先城泗州浩不悦遂與有隙凡浚所規畫浩必沮之竟無成功追復岳飛官以禮改葬官其孫六人初飛死獄卒隗順負其屍葬之九曲叢祠至是懸賞購其瘞順子告于官而改葬之墓在今錢塘縣棲霞嶺之左八月以史浩參知政事九月罷川陜宣諭使虞允文浩上言官軍西討東不可過寳雞北不可過徳順若兵宿於外去川口逺則敵人必襲之朝廷遂欲棄三路允文上言恢復莫先于陜西三路新復州郡又係于德順之存亡一旦棄之則窺蜀之路愈多西和成階利害至重不可不慮于是允文罷知䕫州以王之望代之故遼人伊喇斡罕舊作伊拉武雅今改稱帝金将布薩忠義本名烏哲上京博各科河人舊作璞薩忠烏哲舊作烏者博洛科舊作拔盧古河今改討平之伊喇斡罕稱帝改元天正兵勢大張往討者多為所敗金主遣右副元帥黙音討之遇于長濼方輿紀要即遼饒州長濼縣在臨潢西南斡罕大敗率衆西走黙音復追敗于霿􅟶河在臨潢西南斡罕去攻懿州注見前金師久無功布薩忠義自請行乃以為右副元帥代黙音忠義及赫舎哩志寧本名薩哈連上京和坦人塔薩哈連舊作撒合輦和坦舊作胡安今改等追之至梟嶺亦作裊嶺在臨潢西南西陷泉金史地理志臨潢府有陷臬國言曰埒綳吉按埒綳吉舊作舊孛魯今改後仿此大敗之斡罕以數騎僅免比收合散卒萬餘入奚部其黨多降斡罕自知勢窮北走沙沱其徒執之獻于右都監完顔思敬送中都斬之其黨悉平惟扎巴不服頗為邉患金人苦之冬十一月金以布薩忠義為都元帥赫舎哩志寧副之金主以宋不稱臣乃詔忠義總戎事居南京節制諸軍復令志寧駐軍淮陽忠義將行金主諭之曰宋若歸侵疆貢禮如故則可罷兵忠義至汴簡閲士卒分屯要害十二月詔宰相復兼樞宻使詔呉璘班師金以重兵扼鳯翔争呉璘新復十三州三軍璘亟馳德順以偹之已而金富察世傑本名阿爾山哈斯罕阿多固河人徙遼陽舊作浦察世傑阿爾山舊作阿撒阿多固河舊作斡篤河今改後仿此率師十萬來攻璘力戰而拒之時議棄三路遂詔璘班師明年正月璘得詔寮属交諫曰將在軍君命有所不受此舉所係甚重奈何退師璘知朝論主和乃曰璘豈不知此顧主上初政璘握重兵在逺有詔璘何敢為遂退師還河池金人乗其後璘軍亡失者三萬三千部將數十人連營痛哭聲振原野于是泰鳳熙河永興三路新復十三州三軍皆復為金取既而虞允文自川陜還入對言今日有八可戰且以笏畫地陳棄地利害帝曰此史浩誤朕也改允文知太平御批歴代通鑑輯覽卷八十七

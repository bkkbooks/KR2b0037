body:
  text: 姓司馬氏名炎字安世河內溫人楚漢間司馬卬為殷王都河內漢以其地為郡子孫因家焉自卬十三世為高祖懿晉國既建議立世子何曽以帝髮委地手過膝非人臣之相遂定帝由太子文帝以世子為太子事見前嗣為王遂代魏稱帝并吳而一天下庚子太康元年春諸軍並進吳丞相張悌迎戰死之三月龍驤將軍王濬以舟師入石頭吳主皓出降正月王渾出橫江浦名注見前攻吳鎮戍所向皆克二月王濬唐彬攻丹陽此秭歸之丹陽注見前破之吳人于江磧要害之處並以鐡鎖橫截之乂作鐵錐長丈餘暗置水中逆拒舟艦濬作大筏數十方百餘步令善水者以筏先行遇鐵錐錐輒著筏而去又作大炬長十餘丈大數十圍灌以麻油在船前遇鎖然炬燒之須臾融液斷絶于是船無所礙遂克西陵荆門夷道注俱見前杜預向江陵遣牙門周㫖等夜濟江襲樂鄉多張旗幟起火巴山在荆州府松滋縣西南山北有巴復村故名吳都督孫歆懼曰北來諸軍乃飛渡江也㫖等伏兵虜之預遂進克江陵于是沅湘以南州郡望風送印綬預仗節稱詔而綏撫之㑹詔濬與胡奮王戎共平夏口武昌預當鎮靜零桂懷輯衡陽預乃分兵益濬攻武昌下之預與衆軍㑹議或曰百年之冦未可盡克方春水生難于久駐宜俟來冬更為大舉預曰今兵威已振譬如破竹數節之後皆迎刃而解無復著手處也遂指授羣帥方略徑造建業吳丞相張悌督沈瑩丹陽太守諸葛靚字仲思魏諸葛誕子誕死留吳等率三萬衆渡江迎戰大敗靚走悌及瑩等皆被殺先是悌率衆至牛渚瑩曰上流諸軍素無戒備晉水軍必至此宜畜力以待之今若渡江與戰不幸而敗大事去矣悌曰吳之將亡賢愚所知及今渡江猶可決戰茍其喪敗同死社稷無所復恨若坐待蜀兵之至恐士衆散盡君臣俱降無復一人死難者不亦辱乎遂渡江與晉揚州刺史周浚戰于板橋大敗靚欲遁去使迎悌悌垂涕曰仲思今日是我死日也且我為兒童時便為卿家丞相所識拔常恐不得其死負名賢知顧今以身徇社稷復何道邪靚流涕而去悌遂為晉兵所殺并斬瑩等突牛渚山名在今江南太平府當塗縣西北其山下入江處謂之采石磯元和志采石戍為六朝重鎮周浚字開林汝南安成人初詔書使王濬下建平受杜預節度至建業受王渾節度濬至西陵預以濬順流長驅威名已著不宜受制遂與書曰足下既摧其西藩便當徑取建業討纍世之逋冦釋吳人之塗炭振旅還都亦曠世之一事也濬大悅表呈預書及是張悌敗死掦州别駕何惲謂刺史周浚宜速渡江直指建業浚使白王渾渾曰受詔但屯江北不使輕進且詔令龍驤受我節度但當具君舟楫一時俱濟耳憚曰龍驤克萬里之冦以既成之功來受節度未之聞也且明公為上將見可而進豈一一須詔命乎渾不聽何惲廬江灊人濬自武昌順流而下吳遣將軍張象帥舟師萬人拒之望旗而降吳人大懼吳主嬖臣岑昏傾險諛佞為百姓患苦至是殿中親近數百人請誅昏吳主惶憒從之陶濬自武昌還謂吳主曰蜀船皆小今得二萬兵乘大船以戰自足破之于是合衆授濬節鉞未發而濆時琅邪王胄亦臨近境吳主分遣使者奉書渾濬請降而送璽綬于胄濬舟師過三山在江寧府江寧縣西南寰宇記山有三峯南北相接吳時為津濟處渾遣信要與論事濬舉帆直指建業報曰風利不得泊也是日濬戎卒八萬方舟百里鼓譟入于石頭吳主皓面縛輿櫬詣軍門降濬解縛焚櫬延請相見吳自大帝建元黃武至皓亡凡四主共五十九年琅邪王胄以皓致印綬于已遣使送皓洛陽朝廷聞吳已平羣臣皆賀上壽帝執爵流涕曰此羊太傅之功也驃騎將軍孫秀不賀南面流涕曰昔討逆以一校尉創業今後主舉江南而棄之悠悠蒼天此何人哉孫秀吳大帝母弟匡之孫為吳夏口督以皓見疑弃晉夏四月賜孫皓爵歸命侯遣使行荆揚除吳苛政皓至泥頭面縛詣東陽門洛陽城東門名詔遣謁者解縛賜以衣服車乘拜其子弟為郎吳之舊望隨才擢叙孫氏將吏渡江者復十年百姓復二十年帝臨軒大㑹引見皓謂曰朕設此座以待卿久矣皓曰臣于南方亦設此座以待陛下賈充謂皓曰聞君在南方鑿人目剝人面此何等刑也皓曰人臣有弒其君及姦回不忠者則加此刑耳充默然甚愧先是王濬之東下也吳城戍皆望風款附獨建平太守吾彥嬰城不下聞吳亡乃降帝以為金城太守諸葛靚逃竄不出帝與之有舊知其在姊琅邪王妃家因就見焉靚逃于厠帝逼見之靚流涕曰臣不能漆身皮面復見聖顔誠為慙愧詔以為侍中固辭不受歸于鄉里終身不向朝廷而坐封拜平吳功臣王濬之入建業也其明日王渾乃濟江以濬不待己意甚愧忿將攻濬濬參軍何攀字惠興蜀郡郫人勸濬送皓與渾由是事得解何渾與周浚箋使諌止渾渾不納表濬違詔不受節度渾子濟尚公主宗黨彊盛有司請檻車徴濬帝弗許濬至京師與渾爭功不已帝命廷尉劉頌字子雅廣陵人校其事以渾為上功濬為中功帝以頌折法失理左遷京兆太守魏代漢改京兆為太守等于列郡乃詔增渾邑八千户進爵為公以濬為輔國大將軍與杜預王戎皆封縣侯諸將賞賜有差策告羊祜廟封其夫人為萬嵗鄉君食邑五千户濬自以功大而為渾父子黨與所抑每進見陳說或不勝忿憤徑出不辭益州護軍范通謂曰卿功則美矣然恨所以居美者未盡善也卿旋斾之日角巾私第口不言平吳之事若有問者輒曰聖主之德羣帥之功老夫何力之有此藺生所以屈廉頗也濬曰吾始懲鄧艾之禍不得無言其終不能遣諸胸中是吾褊也時人咸以濬功重報輕為之憤邑博士秦秀等上表訟之帝乃遷濬鎮軍大將軍杜預還襄陽以為天下雖安忘戰必危乃勤于講武申嚴戍守又引滍清水以浸田萬餘頃開楊口起夏水達巴陵通零桂之漕公私賴之預身不跨馬射不穿札而用兵制勝諸將莫及在鎮數餉遺洛中貴要或問其故預曰吾但恐為患不求益也陵淫淯水注見前楊口楊水之口水經注楊水徑竟縣北入于沔謂之楊口是也竟陵故城在今安陸府天門縣其西南有楊口壘夏水在荆州府江陵縣東南首受大江下流入漢巴陵注亦見前冬十月前將軍青州刺史胡威字伯武淮南壽春人卒威為尚書時威由豫州刺史拜尚書復出為青州常諫時政之寬帝曰尚書郎以下吾無所假借威曰巨之所陳豈在丞郎令史正謂如臣等輩始可以肅化明法耳初威父質為魏荆州刺史有清績威往省之自驅驢單行既至見父止宿廄中及歸質賜以絹一匹威跪曰大人清白不識于何得此絹質曰此吾俸祿之餘故以為汝糧耳乃受之威入晉歷官宰牧嘗賜見帝問曰卿清孰與父清對曰臣父清恐人知臣清恐人不知臣不如也質字文德卒于荆州詔罷州郡兵是嵗以司𨽻所統郡置司州凡州十九郡國百七十三户二百四十五萬九千八百四十乃下詔曰自漢末四海分崩刺史內親民事外領兵馬今天下為一當韜戢干戈刺史分職皆如漢氏故事悉去州郡兵大郡置武吏百人小郡五十人交州牧陶璜上言州兵未宜約損以示單虛僕射山濤亦言不宜去州郡武備帝不聽及永寧之後盜賊羣起州郡不能制天下遂大亂如濤所言然其後刺史復兼兵民之政州鎮愈重矣陶璜字世瑛丹陽秣陵人辛丑二年春三月選吳伎妾五千人入宫帝既平吳頗事遊宴怠于政事掖庭殆將萬人嘗乘羊車恣其所之至便宴寢宮人競以竹葉插户鹽汁灑地以引帝車羊嗜竹葉而喜鹽故以引帝車后父楊駿及弟珧濟字文通始用事勢傾內外時人謂之三楊舊臣多被疏退山濤數有規諷帝雖知而不能改冬十月鮮卑慕容涉歸王沈魏書漢桓帝時鮮卑檀石槐分其地為中東西三部其中部大人曰柯最闕居慕容氏為大帥此為慕容氏之始晉書載記魏時燕代多冠步搖冠涉歸之祖好之遂襲冠焉諸部因呼為步搖其後音訛為慕容或云慕二儀之德繼三光之容遂以慕容為氏胡三省曰步搖之說誕或云之說慕容臣子附㑹之辭冦昌黎魏郡晉因之地在今熱河塔子溝界漢書地理志遼西郡交黎應劭曰今昌黎水經注引之考三國魏志正始五年鮮卑內屬立昌黎縣以居之又晉書地理志昌黎郡魏置據此則昌黎魏始立縣而復置郡應劭係後漢初平中太守去正始時已遠注疑有誤至今永平府之昌黎縣乃漢絫縣地遼于此立廣寧縣為營州治金大定間改名曰昌黎非魏晉昌黎地也馮智舒質實所引誤初鮮卑莫護跋始自塞外入居遼西棘城胡三省注在昌黎後慕容氏于此置縣元魏併入龍城龍城即漢栁城注見前之北號慕容部胡三省曰慕容氏始見此至孫涉歸遷于遼東之北世附中國數從征討有功拜大單于至是始叛冦昌黎自漢魏以來羌胡鮮卑降者多處之塞內諸郡其後數因忿恨殺害長吏漸為民患侍御史郭欽上疏曰魏初民少西北諸郡皆為戎居內及京兆魏郡𢎞農往往有之今雖服從若百年之後有風塵之警胡騎自平陽上黨不三日而至孟津北地西河太原馮翊安定上郡盡為狄庭矣宜及平吳之威謀臣猛將之略漸徙內郡雜胡于邊地峻四夷出入之防明先王荒服之制此萬世長策也不聽郭欽西河人揚州刺史周浚移鎮秣陵吳民之未服者屢為冦亂浚皆討平之賓禮故老搜求俊乂威惠並行吳人悅服壬寅三年春正月朔帝親祀南郊禮畢帝問司𨽻校尉劉毅字仲雄東萊掖人曰朕可方漢何帝對曰桓靈帝曰何至于此對曰桓靈賣官錢入官庫陛下賣官錢入私門以此言之殆不如也帝大笑曰桓靈不聞此言今朕有直臣固為勝之毅糾繩豪貴無所顧忌中護軍羊琇恃寵驕侈數犯法毅劾奏琇罪當死都官從事程衛徑馳入營收琇屬吏考問帝不得已免琇官未幾復使白衣領職琇景獻后之從父弟也後將軍王愷文明后之弟也散騎常侍石崇苞之子也三人皆富于財競以奢侈相高愷以􅏁澳釡崇以蠟代薪愷作紫絲步障四十里崇作錦步障五十里崇塗屋以椒愷用赤石脂帝每助愷嘗以珊瑚樹賜之高二尺許愷以示崇崇以鐵如意碎之愷怒崇曰不足多恨乃悉取其家珊瑚樹高三四尺者六七株如愷比者甚衆愷恍然自失車騎司馬傅咸上書曰先王之治天下食肉衣帛皆有其制奢侈之費甚于天災古者人稠地狹而有儲蓄由于節也今土廣人稀而患不足由于奢也欲時人崇儉當詰其奢奢不見詰轉相高尚無有窮極矣羊琇字稚舒泰山陽平人程衛字長元廣平曲周人王愷字君夫東海郯人石崇字李倫􅏁盈之反餳也澳于到反沃也步障所以障蔽若今之罣罳以張華都督幽州軍事尚書張華以文學才識名重一時論者皆謂宜為三公荀勗馮紞以伐吳之謀深疾之㑹帝問華誰可託後事者華對以明德至親莫如齊王由是忤㫖勗因而譖之以華都督幽州華撫循夷夏譽望益振帝復欲徴之紞侍側從容語及鍾㑹紕曰㑹之反頗由太祖帝變色曰是何言邪紞免冠謝曰善御者必知六轡緩急之宜㑹才智有限而太祖誇奬無極使㑹自謂算無遺策功在不賞遂搆凶逆耳向令録其小能節以大禮則亂心無由生矣帝然之紞稽首曰陛下既然臣之言宜思堅氷之漸因屏左右而言曰陛下謀畫之臣著大功於天下據方鎮總戎馬者皆在聖慮矣帝默然由是止不徴華夏四月賈充死綱目書卒今改書充老病自憂諡傳去聲從子模字思範曰是非久自見不可掩也至是死充無嗣妻郭槐欲以外孫韓謐為世孫曹軫諫曰禮無異姓為後之文槐表陳之云充遺意帝許之太常議諡博士秦秀曰充悖禮溺情以亂大倫昔鄫養外孫莒公子為後春秋書莒人滅鄫絶父祖之血食開朝廷之亂原案諡法昏亂紀度曰荒請諡荒公帝更曰武韓謐字長深南陽堵陽人父壽字德真母賈午充少女也莒人滅鄫見春秋魯襄公六年穀梁傳莒人滅鄫非滅也立異姓以蒞祭祀滅亡之道也冬十二月以齊王攸為大司馬都督青州軍事齊王攸德望日隆荀勗馮紞楊珧皆惡之紞言于帝曰陛下詔諸侯之國宜從親者始齊王獨留京師可乎勗曰百僚皆歸心齊王陛下試詔之國必舉朝以為不可則臣言驗矣帝以為然乃以攸為大司馬都督青州諸軍事于是羣臣皆切諫王渾曰攸至親盛德宜贊朝政今出之國假以虛號而無典戎幹方之實懼非陛下追述先帝太后待攸之宿意也若以同姓寵之太厚則有吳楚逆亂之謀漢之吕霍王氏皆何人也歷觀古事輕重所在無不為害惟當任正道而求忠良耳若以智計猜物雖親見疑疏者庸可保乎帝不聽侍中王濟甄德本姓郭氏魏明帝命為甄黃後黃即與明帝幼女淑合葬者也事見前使其妻公主濟尚帝女常山公主德尚文帝女京兆長公主俱入涕泣請帝留攸帝怒謂王戎曰兄弟至親今出齊王自是朕家事而甄德王濟連遣婦來生哭人邪乃出濟德明年正月命太常議崇錫齊王之物博士庾敷秦秀等曰古禮三公無職坐而論道不聞以方任嬰之今天下已定六合為家將數延三事與論太平之基而更出之違舊章矣祭酒曹志歎曰安有如此之才如此之親不得樹本助化而逺出海隅晉室之隆其殆矣乎乃極諫以為當如博士議帝大怒曰曹志尚不明吾心况四海乎且博士不答所問而答所不問橫造議論遂免志官除敷等名賜齊王備物殊禮人庾敷字允臧純之子曹志字允恭譙癸卯四年春三月辛丑朔日食大司馬齊王攸卒攸憤怨發病乞守先后陵不許御醫診視希㫖皆言無疾河南尹向雄諫曰陛下子弟雖多然有德望者少齊王卧居京邑所益實深不可不思也帝不納雄憤恚而卒攸疾轉篤猶催上道攸嘔血而薨初攸有寵于文帝每見攸輒撫床呼其小字曰此桃符座也幾為太子者數矣臨終為帝敘漢淮南王魏陳思王事而泣執攸手以授之王太后臨終亦流涕謂帝曰桃符性急而汝為兄不慈恐不能相容以是屬汝勿忘我言帝故愛攸甚篤已為荀勗馮紞所搆欲為身後之慮因出之及薨帝往臨喪哀慟不已馮紞侍側曰齊王名過其實天下歸之今自薨殞社稷之福也陛下何哀之過帝收淚而止夏琅邪王胄卒諡曰武子覲字思祖嗣覲即元帝之父冬河南荆揚大水歸命侯孫皓卒甲辰五年春正月龍見武庫井中青龍二見武庫井中帝觀之有喜色百官將賀劉毅曰昔龍降夏庭卒為周禍尋案舊典無賀龍之禮乃止乙巳六年春正月尚書左僕射劉毅卒初陳羣以吏部不能審核天下之士故令郡國及州各置中正事見前使銓次等級吏部憑以補授行之浸久中正或非其人姦敝日滋毅嘗上疏請罷之疏曰中正之設損政者八高下逐彊弱是非隨興衰一人之身旬日異狀上品無寒門下品無勢族一也重其任而輕其人使駁論橫于州里嫌隙結于大臣二也優劣易地首尾倒錯三也禁人訴訟使受枉者不獲上聞四也采譽于臺府納毀于流言任己則有不識之蔽聽受則有彼此之偏五也當官著效者或附卑品在官無績者更獲高敘抑功實而隆虛名長浮華而廢考績六也不狀其才之所宜而但第為九品以品取人或非才能之所長以狀取人則為本品之所限七也所下不彰其罪所上不列其善各任愛憎以植其私天下之人懈德行而鋭人事八也由此論之職名中正實為姦府事名九品而有八損宜罷中正除九品更立一代之制帝雖善其言而終不能改衛瓘亦言魏乘喪亂之後人士流移考詳無地故立九品之制今九域同規無復懸屬異土宜盡除中正使舉善進才各由鄉論則浮競自息不報以王渾為尚書左僕射時渾子濟為侍中嘗坐事免官久之帝謂和嶠字長輿汝南西平人曰我將罵濟而後官之如何嶠曰濟俊爽恐不可屈帝召濟責讓之既而曰頗知愧不濟曰尺布斗粟之謠常為陛下愧之他人能令親者疏臣不能令親者親以此愧陛下耳帝默然旱秋八月丙戌朔日食丙午七年春正月甲寅朔日食司徒魏舒罷舒稱疾遜位舒所為必先行而後言遜位之際莫有知者丁未八年春正月戊申朔日食太廟殿陷秋九月改營之至十年夏始成戊申九年春正月壬申朔日食夏六月庚子朔日食秋八月星隕如雨地震己酉十年夏四月鮮卑慕容廆字奕洛瓌降以為鮮卑都督廆涉歸之子也先是涉歸死其弟刪篡立既而國人殺刪迎廆立之涉歸與宇文部遼東鮮卑别部其先有大人曰普回因狩得玉璽文曰皇帝璽普回以為天授其俗謂天為宇謂君為文故號宇文部遂以為氏胡三省曰宇文氏始見此有隙廆請討之朝廷弗許廆怒入冦遼西殺掠甚衆至是廆遣使請降詔以為鮮卑都督廆謁見東夷校尉何龕以士大夫禮巾衣詣門龕嚴軍以見之廆乃改服戎衣而入人問其故廆曰主人不以禮待客客何為哉龕聞之甚慚時宇文氏段氏遼西鮮卑别部有段日陸眷者以嵗饑逐食遼西遂招誘亡叛其衆漸盛曰徒河段方彊數侵掠廆廆卑辭厚禮以事之以遼東僻逺遷于徒河漢縣魏省故城在今錦州府錦縣之青山後廆以大棘城為帝顓頊之墟復徙居之大棘城在錦州府義州冬十一月遣諸王假節之國督諸州軍事封子孫六人為王帝極意聲色遂至成疾楊駿忌汝南王亮字子翼宣帝第四子以為大司馬都督豫州諸軍事使鎮許昌又徙皇子南陽王柬字𢎞度為秦王都督關中瑋字彥度為楚王都督荆州允字欽度為淮南王都督揚江二州諸軍事胡三省注晉江州置于惠帝元康初此江二雨字疑衍文並假節之國立皇子乂字士度為長沙王穎字章度成都王晏字平度吳王熾即懷帝豫章王演字宏度代王孫遹字熙祖為廣陵王初帝以才人謝玖賜太子生遹宫中嘗夜失火帝登樓望之遹年五嵗牽帝裾入暗中曰暮夜倉猝宜備非常不可令照見人主帝竒之嘗稱遹似宣帝故天下咸歸仰之帝知太子不才然恃遹明慧故無廢立之志復用王佑濟從兄謀以太子母帝柬瑋允分鎮要害又恐楊氏之逼以佑為北軍中候典禁兵帝為遹高選僚佐以散騎常侍劉實志行清素命為之傅實以時俗喜進趨少廉讓嘗著崇讓論以為世爭則優劣難分時讓則賢智顯出當此時也能退身修己則讓之者多矣欲守貧賤不可得也馳鶩進趨而欲人見讓猶却行而求前也以劉淵為胸奴北部都尉淵輕財好施傾心接物五部豪傑幽冀名儒多往歸之庚戊太熙元年孝惠皇帝永熙元年位是年正月改元太熙四月帝崩太子即即改元永熙今依蜀漢章武三年例大書太熙元年而以惠帝永熙元年分注于下夏四月以楊駿為太尉輔政帝崩太子衷即位是為惠帝尊皇后曰皇太后立皇后賈氏帝疾篤楊駿獨侍疾禁中大臣皆不得在左右駿因以私意改易要近樹其心腹㑹帝少間正色謂曰何得便爾時汝南王亮尚未發乃令作詔以亮與駿同輔政且欲擇朝士有聞望者佐之㑹帝復迷亂皇后奏以駿輔政帝頷之后召華廙字長駿平原高唐人何劭字敬祖曽之子作詔授駿太尉都督中外諸軍録尚書事仍趣亮赴鎮帝復小間問汝南王來未左右言未至遂崩太子即位駿入居太極殿以虎賁百人自衛亮不敢臨喪哭于大司馬門外表求過葬而行或告亮欲討駿駿密遣兵圖之亮夜馳赴許昌乃免五月葬峻陽陵在洛陽縣北賀善贊曰武帝即位如置設諌官禁獻竒異往往有可觀者然暗于知子納紀賈氏而啓五王之亂蔽于信讒疏斥齊王而失燕翼之謀昧于防患尊寵劉淵而基亂華之禍蓋以位為樂而無深長之思故雖能開創帝業身歿而天下大亂矣詔羣臣增位賜爵有差楊駿自知素無美望欲普進封爵以求媚于衆將軍傅祗字子莊嘏之子謂曰未有帝王始崩而臣下論功者也駿不從詔中外羣臣增位賜爵有差復租調一年散騎侍郎何攀奏曰帝正位東宫二十餘年今承大業而班賞行爵優于革命之初輕重不倫且大晉卜世無窮制當垂後若有爵必進則數世之後莫非公侯矣不從以楊駿為太傅大都督假黃鉞録朝政百官總己以聽傅咸謂駿曰諒暗不行久矣今上謙沖委政于公而天下不以為善懼明公未易當也周公大聖猶致流言况上春秋非成王之年乎進退之宜明公當審思之駿不從楊濟遺咸書曰諺云生子癡了官事官事未易了也咸復書曰衛公有言酒色殺人甚于作直坐酒色死人不為悔而逆畏以直致禍此由心不直正欲以茍且為明哲耳自古以直致禍者當由矯枉過正或不忠篤而舒以亢厲為聲故致忿耳安有悾悾忠益而反見怨疾乎駿以賈后險悍多權略忌之以其甥段廣管機密張劭典禁兵凡有詔命帝省訖入呈太后然後行之馮翊太守孫楚字子荆太原中都人謂曰公以外戚居伊霍之任而不與宗室共參萬幾禍至無日矣駿不從駿辟胸奴東部人王彰為司馬彰逃不受其友怪問之彰曰自古一姓二后鮮有不敗况楊太傅昵近小人踈逺君子專權自恣吾踰海塞以避之猶恐及禍奈何應其辟乎且武帝不惟社稷大計嗣子既不克負荷受遺復非其人天下大亂可立待也秋八月立廣陵王遹為太子遹既立以何劭裴楷王戎張華楊濟和嶠為師保拜母謝氏為淑媛賈后常置謝氏于别室不聽與太子相見初和嶠嘗言于武帝曰太子有淳古之風而末世多僞恐不了陛下家事後與荀勗同侍武帝曰太子近進卿可俱詣之既還勗等稱太子明識雅度嶠曰聖質如初武帝不悅而起及是嶠從遹入朝賈后使帝問曰卿昔謂我不了家事今定何如嶠曰臣昔事先帝曽有是言言之不效國之福也以劉淵為胸奴五部大都督琅邪王覲卒諡曰恭子睿嗣即元帝考魏書以元帝為晉將牛金子冒姓司馬為琅邪王覲嗣晉書元帝紀云宣帝以元石圖有牛繼馬後故深忌牛氏鴆其將牛金而琅邪恭王妃夏侯氏竟通小吏牛氏而生帝說互不同故通鑑不採今依考異之例附注于此孝惠皇帝辛亥元康元年春三月皇后賈氏殺太傅楊駿廢皇太后為庶人初賈后為太子妃常以妬手殺數人又以㦸擲孕妾子隨刃墮武帝大怒將廢之楊后曰賈公閭有大勳于社稷豈可以其女妬而忘之耶妃得不廢后數誡厲妃妃不知其助己返以為恨至是不以婦道事太后又欲預政為楊駿所抑殿中中郎孟觀字叔時渤海東光人李肇皆駿所不禮也賈后使黃門董猛與觀肇謀誅駿廢太后又使報楚王瑋瑋許之乃求入朝既至觀肇啓帝夜作詔誣駿謀反命東安公繇字思元琅邪武王子帥殿中四百人討之瑋屯司馬門駿聞變召官屬謀之主簿朱振曰必閹豎為賈后謀不利于公宜燒雲龍門以脅之索造事者首引東宫及外營兵擁皇太子入宫取姦人殿內震懼必斬送之不然無以免難駿素怯懦不決乃曰雲龍門魏明帝所造功費甚大奈何燒之皇太后題帛為書射城外曰救太傅者有賞賈后因宣言太后同反尋殿中兵出燒駿府駿逃于廄就殺之遂收珧濟及張劭段廣等皆夷三族珧臨刑告東安公繇曰表在石函武帝立楊后珧上表請免異日同禍事具前可問張華繇不聽賈后矯詔送太后于永寧宫復諷羣公奏曰皇太后圖危社稷自絶于天陛下雖懷無己之情臣下不敢奉詔中書監張華議皇太后非得罪于先帝今黨其所親為不母于聖世宜依漢廢趙太后故事稱武皇后居異宫以全始終有司奏請廢太后為庶人詣金墉城詔可先是詔原駿妻龎氏以慰太后之心及太后廢有司復請以龎付廷尉行刑詔從之龎臨刑太后抱持號叫截髮稽顙上表賈后稱妾請全母命不省董養遊太學升堂嘆曰朝廷建斯堂將以何為乎每覽赦書謀反大逆皆赦至于殺祖父母父母不赦者以為王法所不容也公卿處議至此天人之理既滅大亂將作矣董養字仲道陳留浚儀人徴汝南王亮為太宰與太保衛瓘録尚書事亮欲悅衆論誅楊駿功督將侯者千八十一人御史中丞傅咸曰無功而獲厚賞則人莫不樂國之有禍是禍原無窮也亮不從亮頗專權勢咸復諫亦不從賈后族兄模從舅郭彰字叔武太原人女弟之子賈謐與楚王瑋東安王繇繇以誅駿功進爵為王並預政后暴戾日甚繇密謀廢后繇兄淡字思𢎞素惡繇屢譖于亮詔免繇官廢徙帶方注見前于是謐彰權勢愈盛謐雖驕奢而喜延士大夫彰與石崇陸機機弟雲潘嶽摰虞左思牽秀劉輿輿弟琨等皆附于謐號二十四友崇與嶽尤諂每謐及廣成君郭槐出皆降車道左望塵而拜長潘嶽字安仁滎陽中牟人摯以國為氏虞字仲冾安人左思字太沖臨淄人牽秀字成叔魏牽招子劉輿字慶孫琨字越石中山魏昌人夏六月皇后殺太宰亮太保瓘及楚王瑋太宰亮太保瓘以北軍中候楚王瑋剛愎好殺欲奪其兵權以裴楷代之瑋怒楷不敢拜復謀遣瑋之國瑋長史公孫宏舍人岐盛周文王遷豐其支庶留岐者為岐氏勸瑋自昵于賈后后留瑋領太子少傅盛素善于楊駿瓘惡其反覆將收之盛乃因將軍李肇矯稱瑋命譖亮瓘于賈后曰將謀廢立后素怨瓘且患二公秉政已不得專恣六月使帝作手詔賜瑋曰太宰太保欲為伊霍之事王宜宣詔屯諸宫門免亮瓘官夜使黃門齎以授瑋瑋亦欲因此復私怨遂勒本軍復矯詔召三十六軍遣宏肇以兵圍亮府清河王遐字深度收瓘長史劉準謂亮曰此必姦謀府中俊乂如林猶可力戰不聽遂為肇所執嘆曰我之赤心可破示天下也與世子矩俱死瓘左右亦疑遐矯詔請拒之須自表得報就戮未晚瓘不聽初瓘為司空帳下督榮晦有罪斥遣之至是誨從遐收瓘輒殺瓘及子孫共九人盛因說瑋誅賈郭以正王室瑋未決㑹天明張華使董猛說賈后曰楚王既誅二公則威權盡歸之矣人主何以自安宜以專殺之罪誅之乃遣殿中將軍齎騶虞幡騶虞仁獸繡于幡上所以止兵麾衆曰楚王矯詔勿聽也衆皆釋仗遂執瑋斬之宏盛夷三族衛瓘女遺國臣書曰先公名諡未顯一國無言春秋之失其咎安在太保主簿劉繇等執黃幡檛登聞鼓訟瓘寃乃詔族誅榮晦追復亮瓘爵位諡亮曰文成諡瓘曰成以賈模張華裴頠字逸民秀之子為侍中並管機要賈后專朝以模為散騎常侍加侍中謐與后謀以張華庶姓無逼上之嫌而儒雅有籌略為衆望所依乃以華為侍中中書監裴頠為侍中裴楷為中書令加侍中與右僕射王戎並管機要華盡忠帝室彌縫遺闕后雖凶險猶知敬重與模頠同心輔政故數年之間雖暗主在上而朝野安靜壬子二年春二月皇后賈氏弒故皇太后楊氏于金墉城時太后尚有侍御十餘人賈后悉奪之絶膳八日而卒賈后恐太后有靈覆而殯之仍施諸厭術癸丑三年夏六月𢎞農雨雹深三尺甲寅四年大饑司𨽻校尉傅咸卒咸性剛簡風格峻整初為司𨽻上言貨賂流行所宜深絶遂奏免河南尹淡等官京師肅然乙卯五年夏荆揚兖豫青徐六州大水冬十月武庫災焚纍代之寶漢高祖斬蛇劍孔子履等盡焚焉及二百萬人器械索頭分其國為三部拓跋氏自悉祿立事見前三傳至祿官悉祿死弟綽立綽死沙漢汙子弗立弗死叔父祿官立後魏諡綽平帝諡弗思帝諡祿官昭帝祿官分國為三部一居上谷之北濡源濡水即今灤河水經注濡水出禦彛鎮東南鎮故城在今宣化府赤城縣今灤河自縣之獨石口外發源東北流稍南與熱河會又東入遵化州界至永平府之樂亭縣入海之西祿官自統之一居代郡參合陂在今山西大同府陽高縣東北邊牆外之北使兄子猗㐌諡桓帝統之一居定襄之盛樂故城注見前使猗㐌弟猗盧諡穆帝統之代人衛操字德元與從子雄字世逺及同郡箕魏書作姬淡字世雅往依拓跋氏說猗㐌猗盧招納晉人猗㐌悅之任以國事晉人附者稍衆已而猗㐌度漠北巡因西略諸部降附者三十餘國丙辰六年夏胸奴郝度元反胸奴郝度元與馮翊北地馬蘭羌胡三省注羌居馬蘭山中因以為種落之號山在今陜西同州府白水縣西北盧水胡胡三省注胡居安定界俱反殺北地太守征西大將軍趙王倫字子彛宣帝子信用嬖人孫秀琅邪人與雍州刺史解系解氏晉大夫解揚之後系字少連濟南著人爭軍事朝廷徴倫還以梁王肜字子徽宣帝子代之系表請誅秀以謝氐羌張華以告肜使誅之秀友人為之說肜得免倫遂用秀計深交賈郭賈后大愛信因求録尚書事張華裴頠固執不可倫秀由是怨之秋八月秦雍氐羌齊萬年反冬十一月遣將軍周處等討之初御史中丞周處彈劾不避權戚梁王肜嘗違法處按劾之至是秦雍氐羌悉反其帥齊萬年僭帝號圍涇陽注見前詔以處為建威將軍𨽻安西將軍夏侯駿以討之中書令陳凖曰駿及梁王皆貴戚非將帥之才進不求名退不畏罪周處忠直果敢有仇無援宜詔孟觀以精兵萬人為處前鋒必能殄冠不然梁王當使處先驅而不救其敗必也朝廷不從陳準諶曽孫萬年聞處來曰周府君有文武才若專斷而來不可當也或受制于人此成禽耳關中饑疫冬十二月略陽氐楊茂搜據仇池山名在階州成縣西三秦記山本名仇維其上有池故曰仇池初略陽清水今縣屬秦州縣西有西城漢晉時故縣也氐楊駒始居仇池仇池方百頃其旁平地二十餘里四面斗絶而高為羊腸盤道三十六回而上駒孫千萬附魏封為百頃王千萬孫飛龍寖彊盛徙居略陽以其甥令狐茂搜為子茂搜避齊萬年之亂帥部落還保仇池自號輔國將軍右賢王關中人士避亂者多依之茂搜迎接撫納欲去者衛護資送之是後楊氏遂世據仇池丁巳七年春正月將軍周處及齊萬年戰敗死之齊萬年屯梁山在今陜西乾州西北胡渭曰雍州有二梁山一在韓城禹貢治梁及岐是也一在乾州孟子太王去邠踰梁山是也有衆七萬梁王肜夏侯駿使周處以五千兵擊之處曰兵無後繼必敗不徒亡身為國取恥肜駿逼遣之處攻萬年于六陌在乾州東今曰六陌鎮軍士未食肜促令速進自旦戰至暮斬獲甚衆弦絶矢盡救兵不至左右勸處退處按劍曰是吾效節致命之日也遂力戰而死朝廷雖以尤肜而亦不能罪也秋七月雍秦旱疫米斛萬錢九月以王戎為司徒戎為三公與時浮沈無所匡救委事僚宷輕出遊放性復貪吝園田遍天下每自執牙籌晝夜會計常若不足家有好李賣之恐人得種常鑽其核凡所賞拔專事虛名阮咸之子瞻字千里嘗見戎戎問曰聖人貴名教老莊明自然其㫖異同瞻曰將無同戎咨嗟良久遂辟之時人謂之三語掾是時王衍為尚書令樂廣為河南尹皆善清談宅心事外朝野爭慕效之衍與弟澄好品題人物舉世以為儀凖衍神情明秀少時山濤見之曰何物老嫗生寧馨兒然誤天下蒼生者未必非此人也廣性冲約清逺與物無競每談論以約言析理厭人之心而其所不知默如也凡論人必先稱其所長則短者自見澄及阮咸咸從子修胡母輔之謝鯤王尼畢卓皆以任放為達輔之嘗酣飲其子謙之厲聲呼其父字曰彥國年老不得為爾輔之歡笑呼入共飲卓比舍郎釀熟因夜至甕間盜飲為其掌酒者所縳明旦視之乃畢吏部也廣聞而笑之曰名教之中自有樂地何必乃爾初何晏等祖述老莊立論以為天地萬物皆以無為本無也者開物成務無往不存者也王衍之徒皆愛重之由是朝士大夫皆以浮誕為美廢弛職業裴頠著崇有論以釋其蔽曰談者深列有形之纍盛稱空無之美于是立言虛無謂之元妙處官不親所職謂之雅逺奉身散其廉操謂之曠達故悖吉凶之禮忽容止之表瀆長幼之序混貴賤之級無所不至夫萬物之生以有為分者也故心非事也而制事必由于心不可謂心為無也匹非器也而制器必須于匠不可謂匠非有也由此而觀濟有者皆有也虛無奚益于已有之羣生哉然習俗已成頠論亦不能救王澄字平子戎從弟樂廣字彥輔南陽淯陽人阮修字宣子陳留尉氏人胡母輔之字彥國泰山奉高人謝鯤字幼輿陳國陽夏人王尼字孝孫城陽人畢卓字茂世新蔡鮦陽人戊午八年秋九月荆豫徐揚冀五州大水遣侍御史李苾慰勞漢川流民初略陽巴氐李氏李氏之先世居巴中秦并天下以為黔中郡薄賦其口嵗出錢四十巴人呼賦為賨因謂之賨人漢末張魯據漢中李氏往依之魏武平魯徙李氏之衆于略陽北土名曰巴氐有子曰特字元欽庠字元序流字元通皆有才武善騎射性任俠州黨多附之及齊萬年反關中薦饑略陽天水等六郡魏以漢略陽縣置郡晉因之後周廢民流移入漢川者數萬家道路有疾病窮乏者特兄弟振救之由是得衆心流民至漢中上書求寄食巴蜀朝議遣侍御史李苾持節慰勞且監察之不令入劍閣苾受流民賂表言流民十萬餘口非漢中一郡所能振贍蜀有倉儲宜令就食從之由是散在梁晉分益州置梁州統漢中梓潼等八郡益不可禁止特至劍閣太息曰劉禪有如此地面縛于人豈非庸才邪胡三省曰李特事始此己未九年春正月將軍孟觀討齊萬年獲之張華薦觀有文武才使討齊萬年觀身當矢石大戰十數皆破之遂禽萬年太子洗馬江統作徙戎論以警朝廷曰四夷之中戎狄為甚弱則畏服彊則侵叛是以有道之君待之有備禦之有常雖稽顙執贄而邊城不弛固守彊暴為冦而兵甲不加逺征期令境內獲安疆場不侵而已漢建武中馬援領隴西太守討叛羌徙其餘種于關中居馮翊河東空地數嵗之後族類蕃息永初叛亂夷夏俱敝自此之後餘燼不盡小有際㑹輒復侵叛魏武帝徙武都氐于秦川以禦蜀蓋權宜之計今已受其敝矣夫關中帝王所居而戎狄錯在此土士庶玩習侮其輕弱以貪悍之性挾憤怒之情候隙乘便輒為橫逆此必然之勢也今宜及兵威方盛因其死亡流散徙諸羌著先零罕开析支之地徙請氐出還隴右著陰平武都之界各附本種返其舊土使屬國撫夷就安集之縱有猾夏之心絶逺中國隔閡山河為害不廣矣并州之胡本胸奴桀冦建安中使右賢王去卑誘質呼厨泉聽其部落散居六郡今為五部户至數萬驍勇便利倍于氐羌若有不虞則并州之域可為寒心正始中毋邱儉討高句驪徙其餘種于滎陽部户今以千計數世之後必至殷熾今百姓失職猶或亡叛犬馬肥充則有噬齧况于夷狄能不為變乎夫為邦者憂不在寡而在不安以四海之廣士民之富豈須夷虜在內然後取足哉此等皆可申諭發遣還其本域慰彼土思惠此中國于計為長也朝廷不能用陳江統字應元留圉人以成都王穎為平北將軍鎮鄴河間王顒字文載安平獻王孚之孫為鎮西將軍鎮關中賈謐侍講東宫對太子倨傲穎見而叱之謐怒言于賈后出之又以顒鎮關中初武帝作石函之制非至親不得鎮關中顒輕財愛士朝廷以為賢故用之秋八月侍中賈模卒以裴頠為尚書僕射賈后淫虐日甚私于太醫令程據等裴頠與賈模及張華議廢后更立謝淑妃模華皆曰主上自無廢黜之意而吾等專行之儻上心不以為然將若之何且諸王方彊朋黨各異恐一旦禍起身死國危無益社稷頠曰誠如公言然中宫逞其昏虐亂可立待也華曰卿二人于中宫皆親戚言或見信宜數為陳禍福之戒庶無大悖則天下尚未至于亂吾曹得以優游卒嵗而已頠旦夕說其從母廣城君即充妻郭槐頠母亦郭氏令戒諭賈后以親厚太子模亦數為后言禍福后反以模為毀已而疏之模憂憤而卒頠雖后親屬然雅望素隆四海唯恐其不居權位頠拜尚書僕射又詔專任門下事頠上表固辭或謂曰君可以言當盡言于中宫言而不從當逺引而去儻二者不立雖有十表難以免矣頠不能從帝為人戅騃嘗在華林園聞蝦蟆謂左右曰此鳥者為官乎為私乎時天下荒饉百姓餓死帝聞之曰何不食肉糜由是權在羣下政出多門勢位之家更相薦託有如互市賈郭恣橫貨賂公行南陽魯褒作錢神論以譏之又朝臣務以苛察相高每有疑議各立私意刑法不一獄訟繁滋尚書劉頌上疏極言乃下詔郎令史復出法駁案者隨事以聞然亦不能革也頠薦平陽韋忠于張華華辟之忠辭疾不起人問其故忠曰張茂先華而不實裴逸民欲而無厭棄典禮而附賊后此豈大丈夫之所為常恐其溺于深淵而餘波及我况可褰裳而就之哉關內侯索靖知天下將亂指洛陽宫門銅駝嘆曰㑹見汝在荆棘中耳元出法駁案者謂出于法之外而為駁議也魯褒字道南陽人韋忠字子節平陽人索靖字幼安敦煌人冬十一月甲子朔日食十二月廢太子遹為庶人初廣城君郭槐以賈后無子常勸后慈愛太子欲以韓壽女為太子妃太子亦欲婚韓氏以自固壽妻賈午及后皆不聽而為太子聘王衍少女太子聞衍長女美而后為賈謐聘之心不能平頗以為言及廣城君病臨終執后手令盡心于太子又曰趙粲武帝充華與后黨賈午必亂汝家后不從更與粲午謀害太子太子幼有令名及長不好學惟與左右嬉戲后復使黃門輩誘之為奢虐由是名譽浸減或廢朝侍而縱遊逸于宫中為市使人屠酤手揣斤兩輕重不差其母本屠家女也故太子好之又好隂陽小數多所拘忌洗馬江統上書陳五事不從太子性剛知賈謐恃中宫驕貴不能假借之謐譖于后曰太子多畜私財以結小人者為賈氏故也不如早圖之后乃宣揚太子之短又詐為有娠內藁物産具取妹夫韓夀子養之時朝野咸知后有害太子之意左衛率劉卞以問張華華曰君欲如何卞曰東宫俊乂如林四率精兵萬人若得公命皇太子因朝入録尚書事廢賈后于金墉城兩黃門力耳華曰今天子當陽太子人子也吾又不受阿衡之命忽相與行此是無君父而以不孝示天下也雖能有成猶不免罪况權戚滿朝威柄不一成可必乎后頗聞之以卞為雍州刺史卞飲樂死劉卞字叔龍東平須昌人十二月后詐稱帝不豫召太子入朝既至置于别室遣婢陳舞以帝命賜酒三升逼使盡飲之遂大醉后使黃門侍郎潘嶽作書草稱詔使書之文曰陛下宜自了不自了吾當入了之中宫又宜速自了不自了吾當手了之并與謝妃共要刻期兩發掃除患害太子醉迷遂依而寫之字半不成后補成之以呈帝帝幸式乾殿召公卿入以太子書示之曰遹書如此令賜死諸王公莫有言者張華曰此國之大禍自古常因廢黜正嫡以致喪亂願陛下詳之裴頠以為宜先檢校傳書者又請比較太子手書恐有詐妄議至日西不決后懼事變乃表免太子為庶人詔許之以其子霦臧尚皆幽于金墉城王衍自表離婚許之殺謝淑媛霦亦尋卒庚申永康元年春正月皇后幽故太子遹于許昌三月殺之賈后使黃門自首欲與太子為逆詔以首辭班示公卿遣干兵衛太子幽于許昌自太子之廢衆情忿怒衛督司馬雅嘗給事東宫與殿中郎士猗等謀廢賈后復太子以張華裴頠安常保位難與行權右軍將軍趙王倫執兵柄性貪冒可假以濟事乃說孫秀曰今國無嫡嗣社稷將危大臣將起大事而公名奉侍中宫與賈郭親善太子之廢皆云豫知一朝事起禍必相及何不先謀之乎秀言于倫倫納焉遂告通事令史張林使為內應將發秀又謂倫曰太子聰明剛猛若還東宫必不受制于人明公素黨于賈后今雖建大功太子謂公特逼于百姓之望以免罪耳必不深德明公不若遷延緩期賈后必害太子然後廢后為太子報讐豈徒免禍且可以得志倫然之秀因使人行反間言殿中人欲廢皇后迎太子后聞之甚懼三月后使太醫令程據和毒藥遣黃門孫慮至許昌逼太子殺之尉氏注見前雨血妖星見南方胡三省注星見妖而不知其名故但曰妖星太白晝見晉書天文志太白晝見與日爭明占曰彊國弱小國彊女主昌中台天文志三台六星兩兩而居西近文昌二星曰上台為司命次二星曰中台為司中東二星日下台為司祿星坼張華少子韙勸華遜位華曰天道幽逺不如靜以待之夏四月辛卯朔日食趙王倫廢皇后賈氏為庶人殺之遂殺司空張華僕射裴頠自為相國追復故太子位號趙王倫孫秀使司馬雅告張華曰趙王欲與公共匡社稷為天下除害華拒之雅怒曰刃將加頸猶為是言邪不顧而出倫矯詔敕三部司馬晉左右二衛有前驅由基彊弩三部司馬曰中宫與賈謐等殺太子今使車騎時倫以車騎將軍領右軍將軍入廢中宫汝等從命賜爵關中侯不從者誅三族衆皆從之開門夜入遣齊王冏字景治獻王攸之子將百人排閣迎帝幸東堂召賈謐斬之齊王冏收后后見之驚曰卿何為來冏曰有詔收后后曰詔當從我出何詔也問起事者誰時梁王肜亦預謀因答曰梁趙后曰繫狗當繫頸反繫其尾何得不然乃出遂廢后為庶人收趙粲賈午考竟召八座以上皆夜入殿倫陰與秀謀篡位欲先除朝望且報宿怨乃執張華裴頠解系等于殿前華謂張林曰卿欲害忠臣邪林稱詔詰之曰卿為宰相太子之廢不能死節何也華曰式乾之議臣諌事具存可覆按也林曰諌而不從何不去位華無以對遂皆斬之夷三族倫送賈庶人于金墉誅董猛孫慮程據等自為都督中外諸軍事相國侍中孫秀等並據兵權文武封侯者數千人詔追復故太子遹位號諡曰愍懷立其子臧字敬文為臨淮王有司奏尚書令王衍備位大臣太子被誣志在茍免請禁錮終身從之已倫矯詔遣使齎金屑酒至金墉城賜賈后死倫素庸愚復受制于孫秀秀為中書令威權震朝廷天下皆事秀而無求于倫倫欲收人望選用海內名德之士以李重荀組為左右長史王堪劉謨為左右司馬束晳為記室荀嵩陸機為參軍重知倫有異志辭疾不就倫逼之不已憂憤成疾扶曳受拜數日而卒李重字茂曽江夏鍾武人荀組字大章勗之子王堪東平人劉謨沛國人束氏漢疏廣之後廣曽孫避難因去疏字之足改姓為束晳字廣微陽平元城人荀嵩字景獻彧元孫五月立臨淮王臧為皇太孫秋八月淮南王允討趙王倫不克而死趙王倫以允為驃騎將軍領中護軍允性沈毅宿衛將士皆畏服之知倫秀有異志謀討之倫秀轉允為太尉外示優崇實奪其兵權允稱疾不拜遂率國兵數百人直出大呼曰趙王反我討之從者左袒于是從者甚衆遂圍相府倫與戰屢敗死者千餘人允結陳于承華門前中書令陳淮胡三省注淮應作準欲應允言于帝遣伏𦙍持白虎幡晉制有白虎騶虞二幡以解鬭胡三省注白虎威猛以麾軍進戰非解鬬也陳準以帝昏愚故託言解鬬而實以麾軍使倫兵見之知允之攻倫出于帝意也倫子汝陰王䖍在門下省陰與𦙍誓曰富貴當共之𦙍乃詐言有詔助淮南王允不之覺開陳受詔𦙍因殺之坐允夷滅者數千人初孫秀為小吏嘗事黃門郎潘嶽嶽屢撻之石崇之甥歐陽建素與倫有隙崇有愛妾緑珠秀求之不與及允敗秀因稱崇嶽建奉允為亂收之崇嘆曰奴輩利吾財耳收者曰知財為禍何不早散之崇不能答初嶽母常誚責嶽曰汝當知足而乾沒不已乎及敗嶽謝母曰負阿母遂皆族誅歐陽建字堅石渤海人以齊王冏為平東將軍鎮許昌齊王冏以功遷遊擊將軍冏意不滿孫秀覺之且憚其在內乃以為平東將軍出鎮許昌趙王倫自加九錫孫秀議加倫九錫吏部尚書劉頌曰昔漢之錫魏魏之錫晉皆一時之用非所通行周勃霍光其功至大不聞有九錫之命也張林欲殺之秀曰殺張裴已傷時望不可復殺頌乃止遂下詔加倫九錫倫及諸子頑鄙無識秀狡黠貪淫所與共事者皆邪佞之士惟競榮利無深謀逺略志趣乖異互相憎疾秀子㑹形貌短陋如奴僕之下者秀使尚帝女河東公主冬十一月立皇后羊氏后父尚書郎元之泰山南城人孫秀黨也后外祖樂安孫旗與秀合族相善故秀立之元之封興晉侯前益州刺史趙廞巴西人反詔徴益州刺史趙廞為大長秋以成都內史耿滕代之廞賈后之姻親也聞徴甚懼且以晉室衰亂陰有據蜀之志乃傾倉廩賑流民厚遇李特兄弟以為爪牙特等恃勢聚衆為盜滕至州文武千餘人迎之廞遣兵逆戰滕敗死復殺西夷校尉陳總廞遂自稱益州牧置僚屬易守令李庠等以四千騎歸廞廞委以心膂使招合六郡壯勇萬人六郡謂秦州之略陽等六郡壯勇謂流民之壯勇者以斷北道明年李庠為趙廞所殺李特怒遂攻廞殺之遣使詣洛陽陳廞罪狀詔以羅尚為益州刺史尚入蜀廣漢太守辛冉謂尚曰特等專為盜賊宜因會斬之尚不從羅尚字敬之襄陽人辛酉永寧元年是年正月趙王倫改元建始四月帝反正始改元永寧春正月以張軌字士彥安定烏氏人為涼州刺史散騎常侍張軌以時方多難陰有保據河西之志故求為涼州時盜賊縱橫鮮卑為冦軌悉討破之威著西土胡三省曰張氏保據梁土始此趙王倫自稱皇帝遷帝于金墉城殺太孫臧趙王倫逼奪璽綬備法駕入宫即位帝出居金墉城尊為太上皇廢皇太孫為濮陽王殺之以孫秀為侍中中書監其餘黨與皆為卿將奴卒亦加爵位每朝㑹貂蟬盈座時人為之諺曰貂不足狗尾續是嵗天下所舉賢良秀才孝廉皆不試郡國計吏及太學生年十六以上者皆署吏守令赦日在職者皆封侯郡縣綱紀並為孝亷廉吏府庫之儲不足以供賜與應侯者多鑄印不及或以白板封之三月齊王冏及成都王穎河間王顒等舉兵討倫倫遣兵拒之齊王冏遣使告成都王穎河間王顒常山王乂及新野公歆字𢎞舒扶風武王駿子移檄征鎮稱逆臣孫秀迷誤趙王當共討之有不從命誅及三族穎召鄴令盧志謀之志曰仗順討逆百姓必不召自至穎從之逺近響應至朝歌衆二十餘萬歆得冏檄未知所從嬖人王綏曰趙親而彊齊疏而弱宜從趙參軍孫洵大言曰趙王凶逆天下當共誅之何親疏彊弱之有歆乃從冏顒初用長史李含謀執冏使遣張方將兵助倫及聞二王兵盛復召方還更附二王盧志字子道育之孫孫洵楚之子李含字世容隴西狄道人張方河間人倫秀聞兵起大懼遣孫輔張泓司馬雅帥兵拒冏秀子㑹及士猗許超率兵拒穎閏月丙戌朔日食自正月至于是月五星互經天縱橫無常夏四月成都王穎擊敗倫兵帥師濟河左衛將軍王輿等迎帝復位倫伏誅張泓等與齊王冏戰于潁上潁水之上潁水注見前屢破之泓攻冏營冏出兵擊破其别將泓等乃退成都王穎前鋒至黃橋胡三省注朝歌西有黃澤水謂之黃雀溝橋當在其上為孫㑹士猗許超所敗穎欲退盧志曰今我軍失利敵有輕我之心不若更選精兵星行倍道出敵不意此用兵之竒也穎從之倫賞黃橋之功猗超㑹皆持節由是軍政不一且恃勝不設備穎擊之于湨水注見前湨梁㑹等大敗穎乘勝長驅濟河自冏起兵百官軍士皆欲誅倫秀及河北軍敗左衛將軍王輿帥營兵入宫三部司馬為應于內攻孫秀于中書省斬之使黃門將倫還第迎帝于金墉城自端門入升殿羣臣頓首謝罪分遣使者慰勞三王賜倫死收其子誅之凡百官為倫所拜者皆斥免臺省府衛僅有存者穎顒皆至洛陽自興兵六十餘日戰鬭死者近十萬人先是孟觀監沔北軍冏檄至觀知天文以紫宫帝座無他變倫必不敗為之固守及倫誅其屬斬之傳首洛陽孫旗亦伏誅六月以齊王冏為大司馬輔政成都王穎為大將軍河間王顒為太尉各還鎮齊王冏入洛陽甲士數十萬威震京師詔以為大司馬加九錫備物典策如宣景文武輔政故事成都王穎為將軍都督中外諸軍事假黃鉞録尚書事加九錫河間王顒為侍中太尉常山王乂為撫軍大將軍進新野公歆爵為王歆說冏奪穎兵權乂亦勸穎圖冏聞者憂懼盧志謂穎曰大王徑前濟河功無與二然兩雄不俱立宜因太妃微疾求還定省委重齊王以收四海之心穎從之表稱冏功德宜委以萬幾即辭歸鄴由是士民之譽皆歸穎冏辟劉殷為軍咨祭酒曹攄為記室江統茍晞參軍事張翰孫惠為掾顧榮王豹為主簿冏又封其將佐有功者葛旟等五人為縣公委以心膂號曰五公穎至鄴讓九錫殊禮表論興義功臣乞運河北邸閣米以賑陽翟饑民斂祭黃橋戰士旌顯其家皆盧志之謀也初冏疑中書郎陸機為趙王倫撰禪詔故欲殺之穎為辨理得免因表為平原內史以其弟雲為清河內史機友人顧榮戴淵以中國多難勸機還吳機以受穎全濟之恩且謂穎有時望可與立功遂留不去將劉殷字長盛新興人曹攄字顔逺譙人茍晞字道河內山陽人張翰字季鷹吳人孫惠字德施吳國富陽人顧榮字彥先雍之孫王豹順陽人戴淵字若思廣陵人冬十月李特據廣漢進攻成都初朝廷符下秦雍召還流民入蜀者遣御史馮該督之李特兄輔自略陽至蜀言中國方亂不足復還特以為然因納賂于刺史羅尚及該數為流民請留流民感特多相率歸之㑹廣漢太守辛冉營柵衝要謀掩流民流民大懼歸特愈衆旬日間至二萬人特乃與弟流分為二管繕甲厲兵以待至是冉潛帥步騎二萬襲特營特發伏擊之死者甚衆于是流民推特行鎮北大將軍承制封拜流及兄輔弟驤皆號將軍進兵攻冉于廣漢冉出戰屢敗奔德陽後漢縣後周廢故城在今四川潼川府遂寧縣今綿州德陽唐所置特入據郡進攻成都與蜀民約法三章施捨振貸禮賢拔滯軍政肅然蜀民大悅尚頻為特所敗乃阻長圍與特相拒求救于梁州及南夷校尉明年河問王顒遣督護衙博討特軍梓潼朝廷復以張微為廣漢太守軍德陽特使其子蕩等敗博兵博走衆降特自稱大將軍益州牧張微擊破特兵進攻其營李蕩引兵還救遂破微殺之李驤進攻成都李流軍城北羅尚遣精勇萬人攻驤驤與流合擊大破之還者什之一二衙博姓名秦穆公子食采于衙因以為氏壬戌泰安元年夏五月立清河王覃康王遐子為皇太子齊王冏欲久專政以帝子孫俱盡大將軍穎有次立之勢清河王覃武帝孫也方八嵗乃上表請立為皇太子以冏為太子太師東海王越字元超宣帝弟高密王泰之子為司空領中書監冬十二月河間王顒使長沙王乂殺齊王冏齊王冏驕奢擅權中外失望侍中稽紹上疏曰存不忘亡易之善戒也臣願陛下無忘金墉大司馬無忘潁上大將軍無忘黃橋則禍亂之萌無由而兆矣冏耽于宴樂不入朝見坐拜百官符敕三臺選舉不均嬖寵用事南陽處士鄭方上書切諌孫惠亦以為宜思功成身退之道委重二王長揖歸藩冏不能用惠遂辭疾去冏謂曹攄曰或勸吾委權還國何如攄曰物禁太甚大王誠能居高慮危褰裳去之誠善之善者也冏不聽張翰顧榮皆慮及禍翰因秋風起思菰菜蓴羹鱸魚鱠歎曰人生貴適志耳富貴何為即引去榮故酣飲不省府事以廢職徙為中書侍郎潁川處士庾衮聞冏期年不朝歎曰晉室卑矣禍亂將興帥妻子逃于林慮山中王豹致箋于冏請悉遣王侯之國依周召之法以成都王為北州伯治鄴王自為南州伯治宛分河為界各統王侯以夾輔天子長沙王乂見豹箋謂冏曰小子離間骨肉何不銅駝下打殺冏乃鞭殺之豹將死曰縣吾頭大司馬門見兵之攻齊也鄭方字子回南陽人庾衮字叔褒鄢陵人林慮山注見前冏以河間王顒本附趙王倫恨之顒長史李含因說顒曰成都王至親有大功推讓還藩甚得衆心齊王越親而專政朝廷側目今檄長沙王使討齊齊王必誅長沙吾因以為齊罪而討之去齊立成都除逼建親以安社稷大勳也顒從之顒表陳冏罪請長沙王乂廢冏以穎輔政遂舉兵遣李含張方等趨洛陽十二月顒表至冏大懼㑹百官議之尚書王戎曰二王兵盛不可當也若以王就第委權崇讓庶可求安冏從事中郎葛旟怒曰漢魏以來王侯就第寧有得保妻子者邪議者可斬百官震悚戎僞藥發墮厠得免李含屯陰盤故城在今西安府臨潼縣寰宇記後漢靈帝末移安定陰盤縣寄理于此晉屬京兆郡張方軍新安檄乂使討冏乂將左右百餘人馳入宫閉諸門奉天子攻大司馬府城內大戰帝幸上東門矢集御前羣臣死者相枕連戰三日冏衆大敗執冏斬之同黨皆夷三族含等引兵還長安乂雖在朝廷事無巨細皆就鄴咨穎陳留王曹奐卒諡曰魏元皇帝癸亥二年春二月羅尚大破李特斬之李流代領其衆李特潛渡江擊羅尚尚軍散走蜀郡太守以少城降華陽國志晉時益州治太城成都治少城胡三省曰太城成都府子城也少城惟西南北三壁東即太城之西墉特入據之赦境內改元建初蜀民相聚為塢者皆送款于特特分流民于諸塢就食李流言于特曰諸塢新附宜質其大姓子弟聚兵自守以備不虞特怒曰大事已定但當安民何為更逆加疑忌使之離叛乎朝廷遣荆州刺史宗岱等帥水軍三萬救尚軍勢甚盛諸塢皆有二志功曹仕睿因言于尚密約諸塢刻期同發二月尚遣兵掩襲特營諸塢皆應之特兵大敗斬特傳首洛陽李流收餘衆還保赤祖胡三省注地名在綿竹東李蕩中矛而死流以宗岱將至甚懼欲降李驤及特之子雄字仲儶特第三子迭諫不納雄乃誘說流民與襲擊東軍大破之㑹岱卒軍退流甚慙由是竒雄才軍事悉以任之是年李雄攻殺汶山太守取郫城流徙據之已而流卒雄代領其衆衆推為益州牧雄攻走羅尚遂入成都府郫漢縣今屬成都夏五月義陽魏縣晉為郡故城在今南陽府桐柏縣蠻張昌反詔以劉𢎞字李和沛國相人都督荆州軍事秋七月𢎞遣都護陶侃字士行鄱陽人討昌昌走衆降新野王歆督荆州為政嚴急失蠻夷心義陽蠻張昌聚黨數千人為亂江夏太守弓欽討之不勝奔武昌昌遂據江夏得山都縣吏邱沈更其姓名曰劉尼詐云漢後奉以為主而自為相國建元神鳳江沔間所在起兵應之旬月問衆至三萬皆著絳帽以馬尾作髯昌至樊城歆出拒之衆潰為昌所殺詔以荆州刺史劉𢎞代歆為鎮南將軍督荆州軍𢎞以南蠻長史陶侃為大都護衙門將皮初皮氏樊仲皮之後為都戰帥進據襄陽昌攻之不克其黨石氷冦揚州敗刺史陳徽諸郡盡沒又破江州元康初割荆揚二州地置江州統豫章武昌等十郡攻武陵零陵豫章武昌長沙注俱見前皆陷之于是荆江揚豫徐五州之境多為昌所據昌更置牧守皆桀盜小人專以劫掠為務𢎞遣陶侃等攻昌于竟陵注見前大破之昌逃于下雋山胡三省注下雋縣之山也下雋注見前其衆悉降八月劉𢎞斬昌于清水初陶侃少孤貧為郡督郵長沙太守萬嗣見而異之命其子與結交後察孝廉至洛陽郎中令楊晫薦之于顧榮侃由是知名既克張昌劉𢎞謂曰吾昔為羊公參軍謂吾後當居其處今觀卿必繼老夫矣時荆部守宰多闕𢎞請補選詔許之𢎞叙功詮德隨才授任人皆服其公當表皮初補襄陽太守朝廷以初望淺更用𢎞壻夏侯陟𢎞語人曰夫治一國者宜以國為心必若姻親然後可用則荆州十郡安得十女壻然後為政哉乃表陟姻親舊制不得相監皮初之勳宜見酬報詔聽之𢎞于是勸課農桑寬刑省賦公私給足百姓愛之河間王顒成都王穎舉兵反九月帝自將討穎顒將張方入城大掠河間王顒初用李含計欲俟齊王冏殺長沙王乂而討之遂廢帝立成都王穎以己為相既而不如所謀穎亦恃功驕奢百度廢弛嫌乂在內不得逞其欲欲與顒共攻乂盧志諫曰公委權辭寵時望美矣今宜頓軍關外文服入朝此伯主之事也參軍邵續諌曰人有兄弟如左右手今公欲當天下之敵而先去其一手可乎穎皆不聽邵續字嗣祖魏郡安陽人八月穎顒共表乂論功不平與僕射羊元之將軍皇甫商安定朝那人專擅朝政請遣乂還國誅元之等詔曰穎顒敢舉兵向闕吾將親率六軍以討之其以乂為太尉都督中外諸軍事顒以張方為都督將精兵七萬東趨洛陽穎引兵屯朝歌以陸機為前鋒都督督王粹牽秀石超苞之子等軍二十餘萬向洛陽帝如十三里橋乂使皇甫商將萬餘人拒張方于宜陽方襲敗之帝軍于芒山羊元之憂懼而卒遂幸緱氏擊牽秀走之張方入京城大掠死者萬計冬十月長沙王乂奉帝及穎兵戰于建春門洛城上東門大破之帝自緱氏還宫穎遣將軍馬咸助陸機乂奉帝與機戰于建春門乂司馬王瑚使數千騎繫㦸于馬以突咸陳咸軍亂執而斬之機軍大敗赴七里澗在洛陽縣東水經注穀水東合七里澗澗有石梁别考陜州亦有七里澗古曹陽也與此死者如積水為之不流初宦人孟玖有寵于穎玖欲用其父為邯鄲令右司馬陸雲固執不許玖深怨之玖弟超為小督未戰縱兵大掠機録其主者超將鐡騎直入麾下奪之顧謂機曰貉奴能作督不機司馬孫拯勸機殺之機不能用及戰超敗沒玖疑機殺之譖于穎曰機有二心于長沙牽秀等素諂事玖相與證之穎大怒使秀將兵收機機聞秀至釋戎衣著白祫與秀相見為箋辭穎既而嘆曰華亭鶴唳可復聞乎秀遂殺之穎又收雲及拯下獄玖催令殺雲夷三族獄吏掠拯數百兩踝骨見終言機寃吏知拯義烈謂曰二陸之枉誰不知之君何不愛身乎拯仰天嘆曰陸君兄弟世之竒才吾䝉知愛今既不能救其死忍復從而誣之乎玖等令獄吏詐為拯辭亦夷三族拯門人費慈宰意詣獄明拯寃拯譬遣之曰吾義不負二陸死自吾分卿何為爾邪曰君既不負二陸僕又安敢負君固言拯寃玖又殺之華亭今江南松江府婁縣西有平原村即古華亭谷陸機故宅在其側孫拯吳郡人十一月長沙王乂奉帝討張方不克穎進兵逼京師詔雍州刺史劉沈字道真燕國薊人討顒長沙王乂奉帝攻張方方兵望見乘輿皆退走遂大敗衆懼欲夜遁方曰勝負兵家之常善用兵者能因敗為成今我更前作壘出其不意此竒策也乃夜潛進逼洛城七里築壘數重外引廩穀以足軍食乂既戰勝以為方不足憂聞方壘成攻之不利穎進逼京師公私窮踧米石萬錢詔命所行一城而已驃騎主簿祖逖字士雅范陽遒人言于乂曰劉沈忠義果毅雍州兵力足制河間宜啓上詔沈發兵襲顒顒窘急必詔張方以自救此良策也乂從之沈奉詔合七郡之衆凡萬餘人趨長安甲子永興元年漢高祖劉淵元熙元年成太宗李雄建興元年凡僭國二是年以後僭國初建及嗣立或重改元者皆分注年下非此則不列春正月尚書令樂廣卒廣女為成都王妃或譖諸太尉乂乂以問廣廣神色不動徐曰廣豈以三男易一女哉乂猶疑之廣以憂卒東海王越使張方殺長沙王乂穎入京師自為丞相尋還鎮鄴乂屢破穎兵而未嘗虧奉上之禮城中糧食日窘士卒無離心張方以為洛陽未可克欲還長安而東海王越慮事不濟潛與殿中諸將夜收乂啓帝下詔免乂官置金墉城大赦改元城既開將士見外兵不盛悔之更謀劫出乂以拒穎越懼遣人密告張方方炙殺之方將士皆為流涕穎入京師復還鎮于鄴詔以穎為丞相越守尚書令穎遣石超等帥兵屯十二城門殿中宿所忌者皆殺之悉代去宿衛兵雍州刺史劉沈及顒戰敗死之顒屯軍于鄭注見前為東軍聲援聞沈起兵退入長安急召張方方掠洛中官私奴婢萬餘人而西沈渡渭而軍與顒戰屢敗之沈使衙博皇甫淡以精甲五千襲長安入其門力戰至顒帳下沈兵來遲顒黨張輔字世偉南陽西鄂人見其無繼橫擊之殺博及淡沈兵遂敗沈南走被獲顒殺之沈為顒所獲謂顒曰知己之惠輕君臣之義重沈不可違天子之詔量强弱以苟全投袂之日期以必死葅醢之戮其甘如薺顒怒斬之新平太守張光數為沈畫計顒執而詰之光曰劉雍州不用鄙計故令大王得有今日顒壯之表為右衛司馬張光字景武江夏鍾武人二月穎廢皇后羊氏及太子覃廣陵度支陳敏字令通廬江人及議郎周玘字宣佩處之子擊張昌黨石氷于建康斬之先是石氷據臨淮晉郡治盱眙盱眙注見前不下議郎周玘等起兵江東討之推前吳興太守顧祕都督揚州九郡傳檄州郡殺氷所署將吏于是前侍御史賀循字彥先卲之子廬江內史華談字令思廣陵人及丹陽葛洪字稚川句客人甘卓字季思寧之子皆起兵應祕氷遣其將拒玘玘擊斬之氷自臨淮退趨壽春至是廣陵度支陳敏謂征東將軍劉準曰此等烏合之衆其勢易離請為公破之時氷衆十倍于敏準乃益敏兵敏擊之所向皆捷遂與玘合攻斬氷揚徐二州平玘及賀循皆散衆還家不言功賞朝廷以敏為廣陵相顒表穎為皇太弟自為太宰雍州牧秋七月東海王越奉帝征穎復皇后太子穎遣兵拒戰蕩陰漢縣故城在今河南彰德府湯陰縣侍中嵇紹死之帝遂入鄴越走歸國穎僭侈日甚嬖幸用事大失衆望東海王越與右衛將軍陳眕勒兵入雲龍門以詔召三公百僚戒嚴討穎石超奔鄴復皇后羊氏及太子覃越奉帝北征徴前侍中嵇紹詣行在侍中秦準謂紹曰今往安危難測卿有佳馬乎紹正色曰臣子扈衛乘輿死生以之佳馬何為又檄召四方兵比至安陽漢縣今為彰德府治衆十餘萬穎㑹羣僚問計東安王繇曰天子親征宜釋甲縞素出迎請罪穎不從遣石超率衆拒戰乘輿敗績于蕩陰帝頰中三矢百官侍御皆散嵇紹朝服登輦以身衛帝兵人引紹斫之帝曰忠臣也勿殺對曰奉太弟令惟不犯陛下一人耳遂殺紹血濺帝衣帝墮于草中亡六璽超奉帝幸其營帝餒甚超進水左右奉秋桃穎迎帝入鄴改元建武左右欲浣帝衣帝曰嵇侍中血勿浣也陳眕上官已奉太子覃守洛陽越還東海孫惠勸邀結藩方同奬王室越以惠為記室參軍與參謀議北軍中候茍晞奔豫州都督范陽王虓字武㑹宣帝弟康王綏之子虓以為兖州刺史幽州都督王浚字彭祖沈之子并州刺史東嬴公騰字元邁越之弟起兵討穎初三王之討趙王倫也王浚擁衆挾兩端禁所部士民不得赴三王召募穎陰圖之不克至是又稱詔徴之浚遂與鮮卑段務目塵段日陸眷再傳為務目塵浚表為遼西公以女妻之目通鑑作勿今依晉書北史烏桓羯末及并州刺史東嬴公騰同起兵討穎穎遣石超擊之八月穎殺東安王繇琅邪王睿走歸國穎怨東安王繇前議殺之繇兄子琅邪王睿沈敏有度量為左將軍與東海參軍王導字茂𢎞覽之孫善導以朝廷多故每勸睿之國及繇死睿從帝在鄴恐及禍將逃歸穎先敕關津無得出貴人睿至河陽為津吏所止從者宋典自後來以鞭拂睿而笑曰舍長官禁貴人汝亦被拘邪吏乃聽過至洛陽迎太妃夏侯氏俱歸國胡三省曰元帝中興事始此張方復入京城廢皇后太子劉淵自稱大單于初穎表胸奴左賢王劉淵監五部軍事使將兵在鄴淵子聰字元明驍勇絶人博涉經史彎弓三百斤弱冠遊京師名士莫不與交淵從祖宣字士則謂其族人曰漢亡以來我單于徒有虛號斂手受役奄過百年左賢王英武超世天茍不欲興胸奴必不虛生此人也今司馬氏骨肉相殘四海鼎沸復呼韓邪之業此其時矣乃相與謀推淵為大單于使其黨呼延攸顔師古漢書注胸奴中貴種有呼衍氏即今之呼延氏詣鄴告之淵白穎請歸㑹葬勿許淵令攸先歸告宣等使招集五部聲言助穎實欲叛之及幽并起兵淵說穎曰今二鎮跋扈恐非宿衛及近郡士衆所能禦也請還說五部赴國難穎悅拜淵為北單于參丞相軍事淵至左國城杜佑曰在離石北劉宣等上大單于之號二旬之間有衆五萬都于離石戰國趙邑漢置縣晉為西河國治今山西汾州府永寧州是幽并兵至鄴穎奉帝還洛陽浚大掠鄴而還王浚東嬴公騰合兵敗石超于平棘注見前乘勝進軍鄴中奔潰穎將數千騎奉帝御犢車南奔倉卒無齎中黃門被囊中齎私錢二千詔貸之于道中買飯食以瓦盆至溫將謁陵帝喪履納從者之履下拜流涕張方迎帝還宫奔散者稍還百官粗備浚入鄴暴掠復還薊劉淵聞穎去鄴歎曰不用吾言逆自奔潰真奴才也然不可以不救將發兵擊鮮卑烏桓劉宣等諫曰晉人奴𨽻御我今其骨肉相殘是天棄彼而使我復呼韓邪之業也鮮卑烏桓我之氣類可以為援奈何擊之淵曰善大丈夫當為漢高魏武呼韓邪何足效哉宣等稽首曰非所及也冬十月李雄自稱成都王是為後蜀以前有蜀漢故稱後以别之雄以范長生涪陵人有名德為蜀人所重先是李流據郫城蜀民並保險結塢城邑皆空流衆饑乏長生以千餘家依青城山徐輿說長生給流軍糧流軍復振青城山在成都府灌縣西南一名丈人山欲迎以為君長生不可雄遂即王位約法七章以叔父驤為太傅兄始為太保李離為太尉李國為太宰雄以國離有智謀事必咨而後行然國離事雄彌謹劉淵自稱漢王是為前趙以後劉曜改號故統稱趙劉淵遷都左國城胡晉歸之者愈衆淵謂羣臣曰昔漢有天下久長恩結于民吾漢氏之甥約為兄弟兄亡弟紹不亦可乎乃建國號曰漢依高祖稱漢王尊安樂公禪為孝懷皇帝以右賢王宣為丞相崔游為御史大夫後部人陳元達字長宏為黃門郎族子曜字永明為建武將軍游固辭不受元達少有志操淵嘗招之不答及淵為王或謂曰君其懼乎元達笑曰不過二三日驛書必至其暮淵果徴之元達事淵屢進忠言退而削草雖子弟莫得知也曜生而眉白目有赤光幼聰慧有膽識早孤養于淵及長儀觀魁偉性拓落不羣好讀書善屬文鐵厚一寸射而泂之劉聰重之以為漢世祖魏武帝之流十一月張方遷帝于長安僕射荀藩字大堅勗長子立留臺于洛陽復皇后羊氏張方在洛既久剽掠殆竭乃引兵入殿以所乘車迎帝逼令上車帝垂涕從之帝令方具車載宫人寶物軍人因妻掠後宫分爭府藏割流蘇武帳為馬帴魏晉積蓄掃地無餘方擁帝及穎豫章王熾等趨長安顒迎于霸上以征西府為宫惟僕射荀藩及司𨽻劉暾字長升毅之子等在洛陽為留臺承制行事復稱永安立羊后號東西臺十二月顒廢太弟穎更立豫章王熾為皇太弟帝兄弟二十五人時存者惟穎熾及吳王晏晏材庸下熾沖素好學故顒立之詔穎還第而以顒都督中外又以東海王越為太傅與顒夾輔帝室王戎參録朝政王衍為左僕射張方為中領軍録尚書事令州郡蠲除苛政愛民務本清通之後當還東京時顒以四方乖離禍難不已故下此詔和解之冀獲少安越辭太傅不受漢冦太原西河郡漢王淵遣劉曜冦太原取泫氏漢縣北齊改高平今屬山西澤州府喬晞冦西河取介休介休令賈渾不降晞殺之將納其妻宗氏罵晞而哭晞又殺之淵聞之大怒曰使天道有知喬晞望有種乎追還降秩四等收渾尸葬之介休漢縣今屬汾州府御批歷代通鑑輯覽卷三十

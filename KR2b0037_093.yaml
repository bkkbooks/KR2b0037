body:
  text: 使時揚州新遭火公私蕭然庭芝以制置兼知揚州初至官即放民負鹽二百餘萬又鑿河四十里入金沙餘慶場今江南通州金沙場東有河下逹鹽運河入海即李庭芝所鑿以省車運始平山堂注見前瞰揚城敵至則搆望樓其上張弓弩以射城中庭芝大築城包之募汴南流民二萬餘人以實之號武鋭軍修學賑飢民德之如父母葉夢鼎上疏乞致仕不待報而去夢鼎扼于賈似道不得行乃引杜衍故事致仕單車宵遁詔判福州夢鼎不拜蒙古遣史天澤益兵圍襄陽蒙古括諸路兵以益襄陽之師遣史天澤與宗王大臣往經畫之天澤至吕文煥遣使餉以鹽茗天澤築長圍起萬山在襄陽西北一名漢皋山處襄陽記即鄭交甫見玉女包百丈山在襄陽南今南北不相通又築峴山虎頭山為一宇城聨亘諸堡以立久駐必取之基蒙古阿哈瑪特請罷御史臺及諸道提刑司蒙古主不許阿哈瑪特專總財賦以新立憲臺言于蒙古主曰庶務責成各路錢榖付之轉運必繩治之事何由辦亷希憲曰立臺察內則彈劾姦邪外則察視非常訪求民瘼裨益國政無大于此者如阿哈瑪特所言必使上下專恣貪暴公行然後可集事邪阿哈瑪特語塞乃止二月蒙古行新字加號西僧帕克斯巴為大寶法王蒙古主命帕克斯巴創蒙古新字頒行諸路譯寫一切文字更號帕克斯巴為大寶法王三月蒙古軍闈樊遂城鹿門京湖都統張世傑范陽人將兵拒之戰于赤灘圃在襄陽縣東南漢江上敗績世傑柔之從子從柔戍杞有罪來奔阮思聰見而竒之言于吕文德文德召置麾下纍功至都統制以江萬里馬廷鸞字翔仲饒州樂平人為左右丞相兼樞密使廷鸞每見文法益密功賞稽遲將校不出死力于邉閫升辟稍越拘攣似道頗疑異已黥堂吏以泄其憤秋七月夏貴襲蒙古阿珠于新城敗績新城續綱目作新郢考輿志新郢城在德安府鍾祥縣西南宋宋築為戍守處新城在襄陽縣東南元改襄陽時築以絶宋糧援兩城相去蓋數百里夏貴赴援至襄陽城下則已踰新郢而西不得云襲新郢也且續綱目于目中明云貴趣新城而提綱乃書新郢抵牾殊甚今特改書詔以貴為沿江制置副使援襄樊貴乘春水漲輕兵部糧至襄陽城下懼蒙古軍掩襲僅能與吕文煥交語而還及秋大霖雨漢水溢貴分遣舟師出沒東岸林谷間阿珠謂諸將曰此虛形不可與戰宜整舟師以備新城舊志元圍襄陽分築十城新城其一也明日貴舟果趣新城至虎尾洲在襄陽縣南為阿珠所敗士卒溺漢水死者甚衆范文虎復以舟師援貴至灌子灘在襄陽縣鹿門山南漢江西岸亦為阿珠所敗文虎以輕舟遁八月高麗林衍廢其主植而立安慶公淐植之弟冬十月蒙古遣兵討之蒙古主以衍廢立命趙璧行省東京聚兵平壤往問其罪已而璧至東京會衍已死乃請于蒙古主以兵衛植復國誅衍之子及其親屬未幾衍黨復集餘衆立植庶族為王竄入海島踰年始討平之十二月呂文德卒以范文虎為殿前副都指揮使文德以許蒙古置𣙜場為恨每曰誤國家者我也因疽發背乞致仕詔授少師封衛國公卒賈似道以其壻范文虎總禁兵庚午六年蒙元古至七年春正月以李庭芝為京湖制置大使督師援襄樊時夏貴范文虎相繼大敗及聞庭芝至文虎遺書賈似道曰吾持兵數萬入襄陽一戰可平但願無使聽命于京閫事成則功歸恩相矣似道即命文虎之兵從中制之庭芝屢約進兵文虎但與妓妾嬖幸擊鞠飲宴為樂以取旨未至為辭起復孫虎臣為淮東安撫副使江萬里罷萬里以襄樊為憂屢請益師往救賈似道不答萬里遂力求去出知福州蒙古亷希憲罷希憲立朝儻正有內侍入朝堂傳旨言某事當爾希憲曰此閹宦預政之漸不可啓也入奏杖之蒙古主常令希憲受帝師戒希憲對曰臣受孔子戒矣蒙古主曰汝孔子亦有戒邪對曰為臣當忠為子當孝如是而已時詔釋大都囚西域人鼐智密迪音舊作匿贊馬丁今改為怨家所訴繫獄亦被原免蒙古主自開平還怨家復訴之時希憲在告實不預其事乃取堂判補署之曰天威不測豈可幸其獨不署以苟免邪遂與左丞相耶律鑄俱罷蒙古主嘗問侍臣希憲居家何為阿哈瑪曰日與妻妾宴樂耳帝曰希憲清貧何從宴設阿哈瑪愧而退以陳宗禮字立之淳祐進士簽書樞密院事宫中飲宴名曰排當理宗朝排當之禮多內侍自為之一有排當則必有私事密啓帝即位益盛至出內帑為之宗禮為給事中嘗上疏言內侍用心非借排當以侵羡餘則假秩筵以奉殷勤不知費幾州汗血之勞而供一夕笙歌之樂請禁絶之不報及是拜簽樞未幾卒蒙古主立尚書省以阿哈瑪特平章政事阿哈瑪特為人多智巧言以功利自效蒙古主急于富國試以行事頗有成績因竒其材授以政柄言無不從而不知其專愎益甚既立尚書省以為平章政事三月庚子朔日食蒙古以許衡為中書左丞衡固辭不許衡被徴入朝與姚樞等詳定禮儀時阿哈瑪特勢傾中外一時大臣多阿附之衡每與議必正言不少讓已而其子呼遜舊作息辛今改有同簽樞密院之命衡獨執奏曰國家事權兵民財三者而已父典民與財子又典兵不可蒙古主曰卿慮其反邪衡對曰彼雖不反此反道也帝以語阿哈瑪特由是怨衡亟薦衡為左丞欲因以事中之衡屢入辭免蒙古主不許夏四月罷直學士院文天祥賈似道以去要君帝勉留益堅命學士降詔天祥當制時內制相承必先呈稿于相天祥不從似道意不滿諷别院改作天祥援楊億故事亟求解職遷祕書監似道使臺官張志立劾罷之秋八月詔賈似道十日一朝入朝不拜似道屢稱疾求去帝至涕泣留之不從詔六日一朝一月兩赴經筵尋又詔入朝不拜朝退帝亦起避席目送之出殿庭始坐繼復詔十日一朝時襄樊圍急似道日坐葛嶺起樓閣亭榭作半間堂延羽流塑己像其中取宮人葉氏及娼尼有美色者為妾日肆淫樂與故博徒縱博人無敢窺其第者有妾兄來立府門若將入狀似道見之縛投火中嘗與羣妾踞地鬪蟋蟀所狎客戲之曰此軍國重事邪酷嗜寶玩建多寶閣一日一登玩聞余玠有玉帶求之已徇葬矣發其冢取之人有物求不與輒得罪自是或纍月不朝雖朝享景靈宮亦不從駕有言邉事者輒加貶斥一日帝問曰襄陽之圍巳三年矣奈何似道對曰北兵已退陛下何從得此言帝曰有女嬪言之似道詰其人誣以他事賜死由是邉事雖日急無敢言者冬十月詔范文虎總中外諸軍救襄陽十一月蒙古城萬山張𢎞範字仲疇柔第九子軍于鹿門以斷官軍糧道及郢復之援言于史天澤曰今規取襄陽周于圍而緩于攻者計待其自斃也然夏貴乘江漲送衣糧入城我無禦之者而江陵歸峽行旅休卒道出襄陽南者相繼也寧有自斃之時乎若築萬山以斷其西立柵灌子灘以絶其東則庶幾斃之之道也天澤從之遂築萬山徙𢎞範軍焉自是襄樊道絶辛未七年蒙古至元八年十一月改國號曰元春二月大飢是嵗淮浙江西皆飢命官賑貸知撫州黃震字東發慈溪人大書閉糶者籍強糴者斬不抑米價勸分有方全活甚衆夏五月蒙古兵分道侵嘉定諸路蒙古詔東道兵圍襄陽各道宜進兵以牽制之于是秦蜀行省平章政事賽音諤德齊沙木斯鼎一名烏瑪喇回回人舊作賽典赤贍思丁烏瑪喇舊作烏馬兒今改後倣此率諸將水陸並進鄭鼎澤州陽城人出嘉定汪良臣出重慶札喇布哈舊作札剌不花今改後倣此出瀘州所至順流縱筏斷浮橋獲將卒戰艦甚衆六月范文虎帥師至鹿門而遁李庭芝自劾請代不許時漢水溢文虎不得已將衛卒及兩淮舟師十萬進至鹿門阿珠夾江東西為陳别令一軍趨會丹灘在襄陽縣東南犯其前鋒諸將順流鼓譟文虎軍逆戰不利棄旗鼓鎧仗乘夜遁去蒙古俘其軍獲戰船甲仗不可勝計蒙古以許衡為集賢大學士兼國子祭酒衡疏論阿哈瑪特專權罔上蠧政害民諸事不報因謝病請解機務蒙古主不許且命舉自代者衡奏曰用人天子之大柄臣下泛論其賢否則可若授之以位則斷自宸衷不可使臣下有市恩之漸乃拜衡集賢大學士兼國子祭酒即燕京南城舊樞密院設學衡聞命喜曰此吾事也因請徴其弟子王梓耶律有尚字伯強遼東丹王十世孫家東平姚燧字端甫樞之從子等十二人為齋長時所選弟子皆幼稚衡待之如成人愛之如子出入進退其嚴如君臣其為教因覺以明善因善以開蔽課誦少暇即習禮或習書算少者即令習拜跪揖讓進退應對或射或投壺負者罰讀書若干遍久之諸生人人自得尊師敬業下至童子亦知三綱五常為生人之道秋八月壬辰朔日食九月蒙古弛四川茶鹽之禁蒙古主以四川民力困弊詔免茶鹽等課以軍民田租給軍食仍敕有司有言茶鹽之利者以違制論冬十一月蒙古改國號曰元取昜乾元之義從太保劉秉忠請也十二月初置士籍賈似道欲制東南士心乃令御史陳伯大請置士籍開具鄉里姓名年甲三代妻室令鄉鄰結勘于科舉條制無礙方許納卷又嚴後省覆試法比較中省元卷字迹稍異者黜之壬申八年元至元九年春正月元罷尚書省考元史百官志至元七年置尚書省及八年併入中書二十四年復置二十九年又罷其後至武宗至大二年再立尚書省四年復罷今並注于此後因事附見不具書阿哈瑪特仍平章中書省事夏五月李庭芝使統制張順張貴將兵救襄陽與元軍戰敗績皆死之襄陽被圍五年援兵不至至是詔李庭芝移屯郢州庭芝偵知襄陽西北一水曰清泥河源于均房河自襄陽西北東流入漢三國蜀志樂進在清泥以兵相拒即此即其地造輕舟百艘以三舟聨為一舫中一舟裝載左右舟則虛其底而掩覆之出重賞募死士得襄郢山西民兵之驍悍善戰者三千人求將得民兵部轄張順張貴俱智勇素為諸將所服俾為都統號貴曰矮張順曰竹園張出令曰此行有死而已汝輩或非本心宜亟去毋敗吾事人人感憤漢水方生乘順流發舟百艘稍進團山注見前下又進高頭港口在團山南結方陳夜漏下三刻出江以紅燈為號貴先登順殿之乘風破浪徑犯重圍元兵布舟蔽江無隙可入順等乘鋭轉戰元兵皆披靡黎明抵襄陽城下城中久絶援聞順等至踴躍過望勇氣百倍及收軍獨失順越數日有浮尸遡流而上被甲胄執弓矢直抵浮梁視之則順也身中四鎗六箭怒氣勃勃如生諸軍驚以為神結塜斂葬之貴入襄陽文煥固留共守貴恃其驍勇欲還郢乃募二士能伏水中數日不食持蠟書赴范文虎于郢求援元兵增守益密水路連鎖數十里列撒星椿雖魚蝦不得度二人遇椿即鋸斷之竟逹郢還報許發兵五千駐龍尾洲在襄陽縣東南漢江下以助夾擊刻日既定乃别文煥東下點視所部軍洎登舟帳前一人亡去乃有過被撻者貴驚曰吾事泄矣亟行彼或未及知復不能銜枚隱迹乃舉炮鼓譟發舟乘夜順流斷絙破圍冒進元兵皆辟昜既出險地夜半天黑至小新城阿珠劉整分艤戰艦邀擊以死拒戰沿岸束荻列炬火光燭天如白晝漸近龍尾洲遙望軍船旗幟紛披貴兵以為郢兵來會喜躍而進舉流星火示之軍船見火即前迎及勢近欲合則來舟皆元軍也蓋郢兵前二日以風水驚疑退屯三十里而元兵得逃卒之報先據龍尾洲以逸待勞貴與戰而困且出于不意所部殺傷殆盡貴身被數十創力不能支遂被執見阿珠欲降之貴誓不屈乃見殺元令降卒四人舁貴尸至襄陽城下曰識矮張都統乎此是也守陴者皆哭城中喪氣文煥斬四卒以貴祔葬順塜立雙廟祀之六月竄資政殿大學士皮龍榮于衡州道卒龍榮舊宫僚也知賈似道忌之家居杜門不預人事一日帝偶問龍榮安在似道恐其召用隂諷湖南提刑李雷應誣劾以事徙衡州居住龍榮恐不為雷應所容未至飲藥卒秋八月丙戌朔日食九月有事于明堂大雨帝還宫賈似道去位詔出貴嬪胡氏為尼似道乃還祀明堂似道為大禮使禮成幸景靈宫將還遇大雨似道期帝雨止升輅胡貴嬪之兄顯祖為帶御器械請如開禧故事却輅乘逍遙輦還宫帝曰平章得無不可顯祖紿曰平章已允帝遂歸似道大怒曰臣為大禮使陛下舉動不得預聞乞罷政即日出嘉會門帝固留之不得乃罷顯祖涕泣出貴嬪為尼似道始還似道專恣日甚畏人議已務以權術駕馭不愛官爵牢籠一時名士以故言路斷絶威福肆行相視以目冬十一月馬廷鸞罷廷鸞扼于賈似道力辭相位乃授觀文殿大學士知饒州入辭帝惻怛久之曰丞相勉為朕留廷鸞對曰臣死亡無日恐不得再見君父然國事方殷強圉孔棘天下安危人主不知國家利害羣臣不知陛下與元老大臣惟懷永圖臣死且瞑目泣拜而出遣使入元封劉整為燕王元執使者殺之朝廷患劉整為元用詔以整為盧龍軍節度使封燕郡王遣永寧人賫告身及金印牙符期致之整既入元事覺整自軍中入見元主曰此宋患臣用兵襄陽欲以此殺臣耳元主詔磔其人于市且移書來責執政十二月召葉夢鼎入相固辭不至詔加夢鼎少傅入相夢鼎引疾力辭使者相繼促行扶病至嵊縣本漢剡縣宋改名今縣屬紹興府疏奏願上厲精寡欲規當國者收人心固邦本扁舟徑還使者以禍福告夢鼎曰亷耻事大死生事小萬無可回之理賈似道大怒乃令致仕癸酉九年元至元十年春正月樊城陷守將范天順文虎之姪牛富霍邱人死之樊被圍四年范天順牛富力戰不為衄富又數射書襄陽城中期吕文煥相與固守為唇齒初襄樊兩城漢水出其間文煥植木江中鎖以鐵絙上造浮橋以通援兵樊亦恃此為固至是阿珠以機鋸斷木以斧斷絙燔其橋襄兵不能援乃以兵截江而出鋭師薄樊城城遂破天順仰天嘆曰生為宋臣死為宋鬼即所守處縊死富率死士百人巷戰元兵死傷者不可計渴飲血水轉戰而進遇民居燒絶街道富身被重傷以頭觸柱赴火死禆將王福見富死歎曰將軍死國事吾豈宜獨生亦赴火死二月吕文煥以襄陽叛降元襄陽久困援絶撤屋為薪緝關會為衣文煥每一巡城南望慟哭而後下告急于朝賈似道纍上書請行邉而隂使臺諌上章留已樊城既陷復申請之事下公卿雜議監察御史陳堅等以為帥臣出顧襄未必能及淮顧淮未必能及襄不若居中以運天下帝從之時羣臣多言高逹可援襄陽者御史李旺入言于似道似道曰吾用逹如吕氏何旺出歎曰吕氏安則趙氏危矣文煥聞逹且至亦不樂以語其客客曰昜耳今朝廷以襄急故遣逹吾以捷聞則逹必不成遣矣文煥大以為然會獲元哨騎數十人文煥即謬以大捷奏然不知朝中實無援襄事也先是阿爾哈雅輝和爾人舊作阿里海涯今改攻樊城得西域人所獻新炮法遂破外郛至是移向襄陽一炮中其譙樓聲如震雷城中洶洶諸將多踰城降者阿爾哈雅乃身至城下宣元主所降招諭文煥詔曰爾等拒守孤城于今五年宣力爾主固其宜也然勢窮援絶如數萬生靈何若能納欵悉赦勿治且加遷擢文煥狐疑未決因折矢與之誓文煥乃出降阿珠入襄陽阿爾哈雅遂偕文煥朝燕元主以文煥為襄漢大都督事聞似道言于帝曰臣始屢請行邉陛下不之許向使早聼臣出當不至此文煥兄知廬州文福文德子知靖冮府師夔俱上表待罪似道庇之詔皆不問三月詔城清口注見前劉整故吏羅鑑自北復還上整書稿一帙于四川制司有取江南二䇿其一言先取全蜀蜀平江南可定其二言清口桃源河淮皆要衝宜先城其地屯山東軍以圖進取帝亟詔淮東制司往清口擇利地築城備之置清河軍元改縣今縣屬淮安府置機速房于中書襄城既失賈似道復上書言事勢如此非臣上下驅馳聨絡氣勢將有大可慮者帝曰師相豈可一日離左右似道乃建機速房以革樞密院漏泄兵事稽遲邉報之弊尋詔中外大小臣僚有才識超卓明控御之宜懷攻守之略者密具以聞四川宣撫司參議官張夢發陳危急三䇿曰鎖漢江口岸曰城荆門軍當陽界之玉泉山在安陸府當陽縣西亦名覆船山曰峽州宜都而下聨署堡寨以保聚流民且守且耕並圖上城築形勢似道不以上聞下京湖制司審度可否事竟不行元主立其子珍戬為太子珍戬為元主之長子初封燕王守中書令兼判樞密院事劉秉忠薦中山王恂字敬甫唐縣人以輔之元主以為太子贊善珍戬問恂以心之所守恂曰嘗聞許衡之言人心猶印板然板本不差雖摹千萬本皆不差本既差矣摹之于紙無不差者珍戬曰善至是立為皇太子李庭芝免夏四月以汪立信為京湖制置使趙溍字元晉葵之子為沿江制置使立信兼知江陵溍兼建康留守溍多獻寶玉于似道故有是命六月降范文虎一官職任如故竄俞興子大忠于循州注見前給事中陳宜中言襄樊之失皆由范文虎怯懦逃遁乞斬之賈似道不許止降一官監察御史陳文龍字君貴福州興化人言文虎失襄陽猶使知安慶府是當罰而賞也趙溍乳臭小子何足以當大閫之寄請皆罷之似道大怒黜文龍知撫州旋又使臺官季可劾退之汪立信言臣奉命分閫延見吏民皆痛哭流涕言襄樊之禍皆由范文虎俞興父子文虎以三衙長聞難怯戰僅從薄罰興奴𨽻庸才務復私怨激叛劉整流毒至今其子大忠挾多資為父行賄且自希進今雖寸斬未足以快天下之忿乞置重典則人心興起事功可圖詔除大忠名循州拘管秋七月元許衡乞罷許之衡請還懷孟元主以問翰林學士王磐磐對曰衡教人有法諸生行可從政此國之大體宜勿聽其去元主又命諸老臣議其去留竇默為衡懇請乃聽衡還劉秉忠姚樞及磐默等復請以贊善王恂攝學事衡弟子耶律有尚等為助教庶幾衡之規矩不致廢墜從之元人城馬騣山在重慶府合州東北知合州張珏字君玉鳯洲人擊走之劉整獻計于元欲自青居進築馬騣虎頭亦在合州東北二山扼三江口嘉陵江入合州界合渠冮曰嘉渠口又徑州東南合涪江曰三江口以圖合州遣統軍哈喇舊作合剌今改築之張珏聞哈喇至乃張疑兵于嘉渠口潛師渡平陽灘在合州嘉陵江中火其資糧器械越寨七十里焚船場由是馬騣城築卒不就先是元兵入蜀珏與王堅協力拒守堅還以珏代之珏承公凋弊之後外以兵護農內教民墾田積粟未及再期私兼足至是元兵既退珏言于朝請城馬騣虎頭二山或先城其一以據險要不報冬十一月以李庭芝夏貴為淮東西制置使陳奕為沿江制置使庭芝兼知掦州貴兼知廬州奕兼知黃州庭芝請分所部兩淮為二司故以淮西付貴奕以兄事賈似道玉工陳振民以求進自小官厯顯要遂掌禁兵封子顯帝次子全后出顯同顯即顯字為嘉國公甲戌十年元至元十一年春正月賈似道母死詔以鹵簿葬之遂起復似道入朝似道母胡氏死似道歸越治葬詔以天子鹵簿葬之起墳擬山陵百官奉襄事立大雨中終日無敢昜位者既葬詔起復之似道遂還朝元以巴延蒙古巴林部人舊作伯顔今改為中書左丞相巴延事宗王實喇于西域嘗入奏事元主見其貌偉言厲曰此非諸侯王臣遂留與議國政自右丞進左相秋七月帝崩子嘉國公顯即位太后臨朝稱詔帝為太子時以好內聞既立耽于酒色及是崩賈似道入宫議所立衆以建國公是同正帝長子長當立似道主嫡乃立嘉國公顯時年四嵗矣謝太后臨朝稱詔封兄是為吉王弟昺為同炳度宗第三子信王是母楊淑妃昺母俞修容詔賈似道獨班起居尊皇太后曰太皇太后皇后曰皇太后罷京湖制置使汪立信立信移書責賈似道謂今天下之勢十去八九誠上下交修以迓續天命之幾重惜分隂以趨事赴功之日也而乃酣歌深宫嘯傲湖山玩嵗愒月緩急倒施以求當天心俯遂民物拱揖指揮而折衝萬里不亦難乎為今日之計者其䇿有三夫內郡何事多兵宜盡出之江干以實外禦算兵帳見兵可七十餘萬人老弱柔脆十分汏二為選兵五十餘萬人而沿江之守則不過七千里若距百里而屯屯有守將十屯為府府有總督其尤要害處輒參倍其兵無事則泛舟長淮往來遊徼有事則東西齊奮戰守並用刁斗相聞餽餉不絶互相應援以為聨絡之固選宗室大臣忠良有幹用者立為統制分東西二府以蒞治之此上策也久拘聘使無益于我徒使敵得以為辭請禮而歸之許輸嵗幣以緩師期不一二年邉運稍休藩垣稍固生兵日增可戰可守此中策也二策果不得行則天敗我也銜璧輿襯之禮請備以俟似道得書大怒抵之地詬曰瞎賊狂言敢爾蓋立信一目微眇云尋中以危法廢斥之以朱祀孫為京湖制使兼知江陵府八月大霖雨天目山崩山在杭州府臨安縣西北與于潛縣及湖州府安吉州接界元和志山有兩峯峯頂各一池左右相對名曰天目水涌安吉臨安餘杭注俱見前民溺死者無算元太保劉秉忠卒諡文貞秉忠自幼好學至老不衰雖位極人臣終日淡然不異平昔至是卒元主驚悼謂左右曰秉忠事朕三十年小心慎密不避艱險言無隱情其隂陽術數之精占事知來若合符契惟朕知之他人不得與聞也贈太傅趙國公元史天澤巴延大舉南侵天澤有疾而還元主下詔數賈似道背盟拘執信使之罪命天澤巴延總諸道兵與阿珠阿爾哈雅吕文煥行中書省于荆湖博爾歡莽人太祖功臣鄂約逹勒曾孫舊作博羅歡莽郭舊作忙兀今改阿爾哈蘇逹蘇人舊作遜都思今改劉整逹春蒙古扎拉爾氏舊作塔出今改董文炳行樞密院于淮西兵凡二十萬天澤至郢病篤召還諸軍並聽巴延節制九月元吕文煥以巴延趨郢州劉整以博爾歡趨淮西巴延分大軍為兩道自與阿珠由襄陽入漢濟江以吕文煥將舟師為前鋒博爾歡由東道取揚州監淮東兵以劉整將騎兵先行巴延一軍自分三道索多扎拉爾氏舊作唆都今改將一軍由棗陽哨司空山在襄陽府南漳縣西北與鄖陽府接界翟招討將一軍由老鴉山在南渧縣南山最險隘徇荆南而自與阿珠帥阿嘍罕扎拉爾氏舊作阿剌罕今改張𢎞範諸軍水陸趨郢旌旗延袤前後數百里冬十月元巴延攻郢州張世傑力戰禦之巴延遂潛兵入漢屠沙洋鎮名在安陸府荆門州東南州志西魏置緑麻縣後廢今為沙洋鎮臨漢水上陷新郢守將邉居誼隨州人死之巴延薄郢州軍于城西時張世傑將兵屯郢郢在漢北以石為城郢州城即古石城今為安陸府治石城注見前新郢在漢南橫鐵絙鎖戰艦密植椿木水中夾以炮弩其要津皆施杙設攻具元軍襲城世傑力戰元軍不能前遣人招世傑不聽阿珠乃用俘者言由間道趨郢俘言沿江九郡精鋭皆萃于二郢若舟師出其間騎兵不得護岸此危道也不若取黃家灣堡東有河口可入藤湖轉而下江僅三里巴延從之拔攻黃家灣堡引諸軍蕩舟由藤湖入漢黃家灣堡在鍾祥縣南藤湖在荆門州東南進至沙洋遣俘持黃榜檄文入城守將王虎臣王大用斬俘焚榜文煥復至城下招之亦不應日暮風大起巴延命順風掣金汁炮焚其廬舍煙熖漲天城遂破生擒虎臣大用餘悉屠之遂薄新城即新郢城文煥列沙洋所馘于城下復縛大用等至壁使招降都統邉居誼不答明日又至曰吾欲與吕參政語耳文煥以為降已馳馬至伏弩亂發中文煥右臂并馬馬仆幾鈎得之衆挾文煥以他馬奔走會其總制黃順副將任寧俱出降其部曲多欲縋城出者居誼悉驅入當門斬之文煥乃麾兵攻城居誼以火具却之旋蟻附而上居誼度力不支拔劍自殺不殊赴火死所部三千人猶力戰悉死焉十一月以陸秀夫字君實楚州鹽城人後徙鎮江參議淮東制置司事李庭芝在淮南聞秀夫名辟置幕下時天下稱得士多者以淮東為第一號小朝廷秀夫性沉靜不苟求人知每僚吏至閣賔主交歡秀夫獨斂焉無一語或時宴集府中矜莊終日未嘗少有希合至察其事皆治庭芝益器之雖改官不使去已以王鑰字仲潛一字伯晦紹興新昌人章鑑字公秉分寧人為左右丞相兼樞密使制下鑰屢疏固辭不許尋又請母判省院公牘亦不許十二月元巴延攻陽邏堡注見前夏貴帥師拒之巴延使阿珠襲青山磯在武昌府江夏縣東北濵大江遂渡江巴延至蔡店在漢陽府漢陽縣西今為鎮有巡司大會諸將刻期渡江遣人觀漢口形勢時夏貴以漢鄂舟師分據要害王逹守陽邏堡朱祀孫以遊擊軍扼中流兵不得進軍將馬福言淪河在漢陽府孝感縣東南上流即澴水分流曰灄水又别為竹子港下流俱入大江口穿湖中可從陽邏堡西沙蕪口在漢陽府黃陂縣南上通武湖下逹大江一名武口亦名沙武口入江巴延乃進圍漢陽聲言取漢口渡江乘間遣阿嘍罕將竒兵倍道襲沙蕪口奪之因是漢口開壩引船入淪河轉沙蕪口以逹江戰艦萬計相踵而至遣人招諭陽邏堡不應巴延因密謀于阿珠曰彼謂我必拔此堡方能渡江此堡甚堅攻之徒勞汝今夜以鐵騎三千泛舟直趨上流為搗虛之計阿珠即以昏時率四翼軍遡流二十里至青山磯是夜雪大作黎明阿珠遙見南岸多露沙洲即登舟指示諸將令徑渡載馬後隨萬户史格字晉明天澤子一軍先渡為荆鄂都統程鵬飛所敗阿珠引兵繼之大戰中流鵬飛軍却阿珠遂登沙洲攀岸步鬪散而復合者數四出馬急擊追至鄂東門鵬飛被重創走元巴延拔陽邏堡夏貴棄師走還巴延遂會阿珠趨鄂州阿珠遣人還報巴延大喜揮諸將急攻陽邏堡夏貴聞阿珠飛渡大驚引麾下三百艘先遁沿流東下縱火焚西南岸大掠還廬州都統制王逹及定海水軍統制劉成俱戰死元師遂入堡諸將請追貴巴延曰陽邏之捷吾將遣使前告宋人今貴走是代吾使也乃渡江與阿珠會趨鄂州知漢陽軍王儀以城叛降朱祀孫將兵救鄂不至而還祀孫聞元兵趨鄂帥師援之道聞陽邏堡之敗乃夜奔還江陵府鄂州降元巴延使行省右丞阿爾哈雅戍鄂遂引兵東下鄂恃漢陽為蔽及京湖之援朱祀孫既遁漢陽復失鄂勢遂孤吕文煥列兵城下招諭權守張宴然與都統程鵬飛度不能守遂以州軍降幕僚張山翁獨不屈元諸將請殺之巴延曰義士也釋之命阿爾哈雅以四萬人守鄂規取荆湖而自率大衆與阿珠東下趨臨安詔賈似道都督諸路軍馬開府臨安似道以孫虎臣總統諸軍鄂既破朝廷大懼三學生及羣臣上疏以為非師相親出不可似道不得已始開都督府于臨安以黃萬石等參贊軍事所辟官屬皆先命後奏仍于封椿庫撥金十萬兩銀五十萬關子一千萬貫充都督府之公用王侯邸第皆輸助軍錢榖且核釋道租稅收之以備用詔天下勤王陳奕以黃州叛降元元巴延遣程鵬飛至黃州招諭陳奕奕使人過江請降且求名爵巴延曰汝既率衆來歸何必慮及名爵以沿江大都督許之奕大喜遂以城降時沿江諸郡皆吕氏舊部曲望風附欵奕又以書誘其子巖以安東州降元李庭芝遣兵入援帝顯乙亥德祐元年元至元十二年春正月元兵入黃蘄州葬永紹陵史臣曰度宗嗣位雖無大失德而拱手權姦衰弊寖甚國亡不于身幸矣以吕師夔參贊都督府軍事師夔不受命以江州叛降元初師夔提舉江州興福宫請募兵以禦元詔與知州錢真孫同募至是賈似道承制召師夔參贊都督府事任中流調遣師夔不受命與真孫降元巴延以師夔知江州時知夀昌軍宋置屬鄂州今武昌府武昌縣是胡夢麟寓治州中自殺師夔設宴庾公樓選宗室女二人獻巴延巴延怒曰吾奉天于命興仁義師問罪于宋豈以女色移吾心乎斥遣之庾公樓在九冮府治後濵大江元劉整死于無為軍周禮曰整以宋臣降元引戕故國從叛逆例書死初元人南侵用吕文煥與整為導尋命整别將兵出淮南整鋭欲渡江曰大軍自襄樊東下宋悉力西拒東方虛弱徑造臨安可一鼓而捷也巴延不可至是整率騎兵攻無為軍久而不克聞文煥入鄂捷至失聲曰首帥束我使我成功後于人遂發憤死于無為城下知安慶府宋置今屬江南范文虎叛降元文虎遣人如江州迎元軍巴延乃使阿珠以舟師先造文虎以城降通判夏倚仰藥死巴延繼至承制授文虎兩浙大都督賈似道出師次于蕪湖二月夏貴引兵會之似道畏劉整不敢發及聞其死喜曰吾得天助也乃上表出師抽諸路精兵十三萬人以行金帛輜重之舟舳艫相銜百有餘里命宰執小事專決大事則關白督府不得擅行進次蕪湖遣人通吕師夔以議和未幾夏貴引兵來會袖中出一編書示似道曰宋厯三百二十年似道俯首而已以汪立信為江淮招討使募兵禦元賈似道至江上以立信為江淮招討使俾就建康募兵立信受詔即日上道與似道遇于蕪湖似道拊立信背曰不用公言以至于此因問立信何向立信曰今江南無一寸乾淨地某去尋一片趙家地上死要死得分明耳既至建康守兵悉潰四面皆北軍立信知事不可成歎曰吾生為宋臣死為宋鬼終為國一死但徒死無益耳率所部數千人至高郵欲控引淮漢以為後圖賈似道復請和于元巴延不許似道復使宋京如元軍請稱臣奉嵗幣如開慶約巴延答書曰未渡江時議和入貢則可今沿江州郡皆已內屬欲和則當來面議也似道不答元克池州唐置明為府今屬江南權守趙卯發字漢卿昌化人死之池守王起宗聞元軍渡江棄官去通判趙卯發攝州事卯發繕壁聚糧為固守計都統張林屢諷之降卯發峻拒之已而林帥兵巡江隂遣人納欵而陽助卯發為守守兵皆歸于林卯發知事不濟乃置酒會親友與訣謂妻雍氏曰城將破吾守臣不當去汝先出走雍曰君為忠臣我獨不能為忠臣婦乎明日元兵薄城卯發晨起書几上曰國不可背城不可降夫婦同死節義成雙遂與雍氏同縊死林開門降巴延入城問太守何在左右以死對深歎惜之命具棺衾合葬祭其墓而去事聞贈華文閣待制諡文節雍氏贈順義夫人元主封其子諾摩罕舊作那木罕今改為北平王以安圖行省院事于北鄙元太宗長孫曰海都元史諸王世系表海都為太宗第五子和碩王之子和碩王舊作合失大王今改居北方自定宗以來日尋干戈至是詔封諾摩罕為北平王率諸王兵鎮守而安圖總省院之政元平章軍國重事史天澤卒諡忠武天澤至真定病篤附奏曰臣死不足惜但願天兵渡江慎勿殺掠語不及他元主聞訃震悼贈太尉追封鎮陽王天澤平居未嘗自矜其能及臨大事毅然以天下自任出入將相五十年上不疑下無怨人以比郭子儀曹彬云孫虎臣夏貴之師潰于江上賈似道奔揚州元盡取江淮州軍賈似道以精鋭七萬餘人盡屬孫虎臣軍于池州下流之丁家洲在池州府銅陵縣東北夏貴以戰艦二千五百艘橫亘江中似道自將後軍軍魯港在蕪湖縣西南上源即寧國之小淮水下流入江今有鎮貴嘗失利于鄂恐督府成功無所逃罪又忌虎臣新進出已上殊無鬬志會巴延令軍中作大筏數十採薪芻置其上陽言欲焚舟而隂遣步騎夾道以進時阿珠與虎臣對陳巴延舉巨炮擊虎臣中堅虎臣軍動阿珠以划船數千艘秉風直進呼聲動天地虎臣前鋒將薑才濠州人方接戰虎臣遽過其妾所乘舟衆見之歡曰步帥遁矣軍遂亂夏貴不戰而走以扁舟掠似道船呼曰彼衆我寡勢不支矣似道聞之錯愕失措遽鳴鉦收軍舳艫簸蕩乍分乍合阿珠麾將校橫擊深入巴延以步騎左右掎之殺溺死者不可勝計水為之赤軍資器械盡為元所獲似道夜駐珠金沙召貴計事頃之虎臣至撫膺哭曰吾兵無一人用命者貴微笑曰吾嘗血戰當之矣似道曰計將安出貴曰諸軍已膽落吾何以戰師相惟有入揚州招潰兵迎駕海上吾當以死守淮西耳遂解舟去似道乃與虎臣單舸奔還揚州明日潰兵蔽江而下似道使人登岸揚旗招之皆莫應有為惡語嫚罵之者于是鎮江寧國隆興江隂守臣皆棄城遁太平和州無為軍俱相繼降元元克饒州知州事唐震字景實會稽人故相江萬里死之元軍略饒州知州唐震發州民城守時元遣使來取降欵通判萬道同諷震降震叱之曰我忍偷生負國邪城中少年感震言殺元使者已而元軍登陴衆皆散震入坐府中元軍執牘使署降震擲筆于地不屈遂死之其兄與家人俱死初江萬里罷相後聞襄樊破鑿池芝山在饒州府鄱陽縣北唐刺史薛振常採芝于此因名後圃扁其亭曰止水人莫喻其意至是謂門人陳偉器曰大勢不可為余雖不在位當與國為存亡遂赴止水死左右及子鎬本蜀人王橚子為萬里後相繼投沼中積尸如疊翌日萬里尸獨浮出水上從者斂葬之事聞贈震華文閣待制諡忠介萬里太傅益國公諡文忠行宫留守趙溍棄建康而逃溍盡取行宫金帛回城而逃賈似道上書請遷都王爚去位似道至揚州檄列郡如海上迎駕上書請遷都太皇太后不許殿帥韓震賈似道親信出師時令總禁兵復以為請詔下公卿雜議王鑰請堅蹕未決以已不能與大計乞罷政不待報徑去已而宗學生上言陛下移蹕不于慶元則于平江事勢危急則航海幸閩不思我往彼亦能往徒驚擾無益乃止張世傑將兵入衛遂復饒州時方危急徴諸將勤王多不至惟世傑來上下歎異陳宜中疑世傑歸自元昜其所部軍江西提刑文天祥起兵勤王勤王詔至贛天祥奉之涕泣發郡中豪傑并結溪洞山蠻有衆萬人遂入衛盡以家資為軍費每與賔客僚佐語及時事輒撫几曰樂人之樂者憂人之憂食人之食者死人之事聞者為之感動湖南提刑李芾字叔章衡州人遣兵入援芾性剛直忤賈似道貶官家居者久之至是提刑湖南發壯士三千人使將將之勤王以陳宜中知樞密院事兼參知政事遣元行人郝經還元主復使經弟行樞密院都事庸字季常等來問經所在詔遣總管假佑以禮送經歸經道病元主敕尚醫近侍迎勞至燕未幾卒諡文忠經留宋十六年思託言垂後所著有續漢書及易春秋外傳諸書從者皆通于學其北還之嵗汴中民射鴈金明池得繫帛書詩云霜落風高恣所如歸期回首是春初上林天子援弓繳窮海纍臣有帛書中統十五年九月一日放鴈獲者勿殺國信大使郝經書于真州忠勇軍營新館蓋經以久留音問不通乃用蠟九帛書親繫鴈足祝之北飛時南北隔絶不知中統之為至元也事載元史經夲傳明宋濓有題帛書後文且云是書為安豐教授王時中所得至延祐中集賢學士郭貫獲之始上于朝仁宗令裝潢成怢藏諸東觀吳澄袁桷虞集皆有所作其言尤為詳確續綱目不載今特為補輯賈似道有罪免陳宜中初附似道得驟登政府及堂吏翁應龍自軍中以都督府印還宜中問似道所在應龍以不知對宜中意其已死即上疏乞誅似道以正誤國之罪太皇太后曰似道勤勞三朝安忍以一朝之罪失待大臣之禮詔授似道醴泉觀使罷平章都督凡似道諸不恤民之政次第除之以公田給還田主令率其租户為兵放還諸竄謫人右丞相章鑑遁鑑聞元兵日迫託故徑去端明殿學士江淮招討使汪立信卒于軍立信聞賈似道師潰江漢守臣望風降遁歎曰吾今日猶得死于宋土也乃置酒招賔僚與訣手自為表起居三宫與從子書屬以家事夜分起步庭中慷慨悲歌握拳撫案者三以是失聲三日扼吭而卒後元軍至建康金明立信愛將以其家人免或以立信三䇿及死告巴延請戮其孥巴延歎息久之曰宋有是人有是言哉使果用之我安得至此命求其家厚恤之曰忠臣之家也金明以立信之喪歸葬丹陽三月陳宜中殺殿前都指揮使韓震或言震謀劫帝遷都陳宜中欲示非賈似道黨乃召震計事伏壯士袖鐵椎擊殺之震部曲百餘人大閧而出射火箭入宫斫嘉會門宜中遣兵逐之遂奔建康元巴延入建康建康都統徐旺榮迎巴延入城居之時江東大疫居民乏食巴延開倉賑之且遣醫治疾民大悅會元主有詔以時方暑不利行師俟秋再舉巴延上言曰百年逋敵已扼其吭少爾遲回奔播海島遺後悔矣元主從之詔巴延以行中書省駐建康阿珠分兵駐揚州與博爾歡逹春絶宋淮南之援巴延分兵四出知廣德軍令狐槩以城降元以王爚陳宜中為左右丞相並兼樞密使都督諸路軍馬爚與宜中論事多不合宜中請建督府于京師檄召諸路軍馬勤王并令潰軍各歸所部團結內外兵十七萬五千人分廂差官為督給一兵付教場教閲削章鑑官放歸田里鑑既去太皇太后遣使召還罷相豫祠韓震之死鑑明其無他為御史王應龍所劾削一官放歸田里鑑居位號寬厚與人多許可時日為滿朝徵復吳潛向士璧官貶竄賈似道黨人有差御史陳過續綱目作陳過庭考宋史本紀無庭字今改正潘文卿請竄賈似道并治其黨與詔刺配翁應龍于吉陽軍罷廖瑩中王庭金華人劉良貴陳伯大董朴等官元軍入常州知常州趙與鑑遁州人錢訔續綱目作王良臣今從宋史等以城降元知平江府潛説友亦叛降于元後五月和州防御史劉師勇復取常州州劉師勇廬人詔張世傑總都督府諸軍世傑分道出兵以拒元世傑遣其將閻順李存進軍廣德謝洪永進軍平江李山進軍常州順遂復廣德軍有二星鬬于中天一星隕趣五郡鎮撫使吕文福將兵入衛文福殺使者叛入江州臨安戒嚴曾淵子字廣微南豐人文及翁字時學綿州人倪普等棄位而遁詔戒禁之元兵既近臨安戒嚴于是同知樞密院事曾淵子左司諫潘文卿右正言季可兩浙轉運副使許自浙東安撫王霖龍侍從陳堅何夢桂曾希顔等數十人皆遁朝中為之蕭然簽書樞密院事文及翁同簽書院事倪普諷臺諫劾已章未上亟出關遁太皇太后聞之詔榜朝堂云我朝三百餘年待士大夫以禮吾與嗣君遭家多難爾小大臣未嘗有出一言以救國者方且表裏合謀接踵宵遁平日讀聖賢書自諉謂何乃于此時作此舉措生何面目對人死亦何以見先帝天命未改國法尚在其在朝文武官並轉二資其畔官而遁者令御史臺覺察以聞然不能禁也元禮部尚書亷希賢字逹甫一名凖圖哈雅希憲從弟等來至獨松關在今餘杭縣西北獨松嶺上為江浙二省要隘守將張濡後曾孫殺之元主遣禮部尚書亷希賢工部侍郎嚴忠範泰安長清人實之子奉國書而南至建康希賢請兵自衛巴延曰行人以言不以兵兵多反致疑耳希賢固請遂以兵五百送之行至獨松關張濡部曲不知為使襲殺忠範執希賢送臨安希賢病創死朝廷使人移書元軍言殺使之事乃邉將太后及嗣君實不知當按誅之請罷兵通好巴延曰彼為詐計視我虛實耳當擇人同往觀其事體令彼速降乃遣議事官張羽同使人還臨安羽至平江被殺元阿爾哈雅入嶽州嶽州安撫使高世傑復會郢復嶽三州及上流諸軍戰船數千艘扼荆江口阿爾哈雅督諸翼水軍屯東岸世傑乘夜陳于洞庭湖中阿爾哈雅分道擊之世傑敗走力屈乃降阿爾哈雅斬世傑以徇嶽州總制孟之紹舉城降元元兵尋復破沙市城監鎮司馬夢求敘州人光五世孫死之夏四月元阿爾哈雅侵江陵朱祀孫高逹以城降遂盡取荆南州軍初高逹解鄂州之圍賈似道許以建節後忌而不與逹遂怨望至是阿爾哈雅自嶽州攻江陵逹戰纍敗及元屠沙市逹與祀孫及提刑青陽夢炎等遂出降阿爾哈雅遂入城命祀孫移檄所部于是湖北諸郡歸峽鄂復鼎澧辰沅靖隨常德均房施荆門相繼皆降阿爾哈雅以兵守峽捷聞元主喜謂近臣曰巴延東下阿爾哈雅孤軍守鄂朕常憂之今荆南定吾東兵可無後患矣乃親作手詔褒之授高逹參知政事祀孫至上都死以福王與苪為浙東安撫大使開府紹興有司議建藩屏以強王室詔以與苪為浙東安撫大使判紹興開府置長史司馬元阿珠侵真揚州李庭芝遣守將苗再成薑才帥兵禦之敗績元兵東下所過迎降李庭芝率勵所部固守揚州阿珠遣李虎持招降榜入城庭芝殺虎焚其榜總制張俊出戰持降臣孟之縉書來招降庭芝復焚其書梟俊首于市時出金帛牛酒燕犒將士人人感激自奮及阿珠攻真州苖再成與趙孟錦宗室子帥兵大戰于老鸛觜注見前敗績阿珠乘勝進趨揚州薑才為三疊陳逆之于三里溝敗之阿珠陽退才逐之阿珠反戰至楊子橋在楊州府江都縣南兩軍夾水而陳元張𢎞範以二十騎絶渡衝才軍才軍堅不可動𢎞範引郤以誘以一騎躍馬揮刀直趣𢎞範𢎞範旋轡反迎刺之應手而斃才軍遂潰阿珠與𢎞範追之自相蹂踐與陷濠水死者甚衆流矢中才肩才拔矢揮刀而前元軍辟昜不敢逼遂以身免元軍進薄揚州南門詔與婺州處士何基王柏基字子恭柏字會之俱金華人贈諡基少師事黃幹醇固篤實絶類漢儒趙汝騰蔡抗字仲節元定孫楊棟字元極眉州青城人相繼薦于朝詔與州學教授又改承務郎基終不受柏年三十始知為學之源捐去俗學勇于求道從基遊基授以立志居敬之旨以質實堅苦自勵凡六經四書及濓洛關閩之書皆有著述至是詔諡基曰文定贈柏承事郎詔張世傑等四道出兵以禦元時知慶逺府仇子真淮東兵馬鈐轄阮克己各將兵入衛詔與世傑張彥分道出擊元軍臺諌請命大臣監護事下公卿雜議久而不決陳文龍上言北兵今日取某城明日築某堡而我以文相遜以迹相疑譬猶拯溺救焚而為安行徐步之儀也請詔大臣無滋虛議不報六月庚子朔日食既晝晦如夜成都安撫使咱萬壽以嘉定唐嘉州地宋置府今𨽻四川諸城叛降元元主召汪良臣入朝謂之曰成都被兵久須卿安集之授西川行樞密事遣還良臣進攻嘉定萬壽堅守不出良臣度有伏兵大搜山谷果得而殺之進壘薄城萬壽悉軍出戰大敗遂籍境內三龜山名在今嘉定府東以形似得名九頂山名在今嘉定府東一里隔江山有九峯故名紫雲在今犍為縣東南又曰子雲城相傳楊雄曽居此而名諸城降元元以萬壽僉西川行樞密院事咱萬壽既降兩川郡縣多送欵于元獨四川制置副使張珏固守不下元主建東西行樞密院會兵圍之鳯張珏字君玉隴西洲人以王爚平章軍國重事陳宜中留夢炎為左右丞相並兼樞密使都督諸路軍馬王爚與陳宜中不協會夢炎自湖南入朝爚宜中皆請相夢炎而求去太皇太后曰二相毋藉此求間也乃以爚平章軍國重事一月兩赴經筵五日一朝宜中夢炎並相爚即日就民居以丞相府讓宜中宜中言一辭一受何以解天下之譏因辭去遣使遮留乃還秋七月張世傑與元阿珠戰焦山下世傑敗績奔圖山在今鎮江府丹徒縣東北山在江濵有上下二箭洞世傑與劉師勇孫虎臣等大出舟師萬餘艘次于焦山令以十舟為方碇江中流非有號令毋得發碇示以必死元阿珠登石公山在今丹徒縣東北與焦山對峙望之曰可燒而走也遂遣健卒善彀者千人載以巨艦分兩翼夾射阿珠居中合勢進戰繼以火矢篷檣俱焚煙焰蔽江諸軍既碇舟死戰至是欲走不能前軍爭赴江死張𢎞範董文炳復以鋭卒橫衝世傑不能復軍奔圗山阿珠𢎞範追之獲黃白鷂船七百餘艘師勇還常州虎臣還真州世傑請濟師不報放賈似道于循州籍其家似道既免三學生及臺諌侍從皆上疏乞誅似道太皇太后不許而似道亦自上表乞保全且言為夏貴孫虎臣所誤有旨令李庭芝津遣歸越以終喪制似道尚留揚不還王爚復論似道既不死忠又不成孝乞下詔切責似道得詔乃還紹興府紹興守臣閉城不納王爚復言于太后曰本朝權臣稔禍未有如似道之烈者搢紳草茅不知幾疏陛下皆抑而不行付人言于不恤何以謝天下太后乃降似道三官婺州居住婺人聞似道至率衆為露布逐之尋又徙于建寧府詔斬翁應龍籍其家廖瑩中王庭除名流之嶺南皆自殺翁合上言似道總權罔上賣國召兵專利虐民滔天之罪人人能言迫于衆怒僅謫建寧夫建寧實朱熹講道之闕里雖三尺童子亦知向方聞似道名咸欲嘔唾况見其面乎乞逺投荒昧以禦魑魅國子司業方應發中書舍人王應麟亦言之皆不從于是侍御史陳景行孫嶸叟等上疏以似道罪重罰輕乞斬之以正法乃詔責授高州團練副使循州安置籍其家遣使監押之貶所會稽縣尉鄭虎臣以其父嘗為似道所配欲報之欣然請行似道時寓建寧之開元寺在今建寧府甌寧縣城南晉建舊名林泉唐賜今名侍妾尚數十人虎臣至悉屏去撤轎蓋暴行秋日中令舁轎夫唱杭州歌謔之每名斥似道窘辱備至一日入古寺壁上有吳潛南行所題字虎臣呼似道曰賈團練吳丞相何以至此似道慙不能對至泉州洛陽橋在今泉州府晉江縣東北一名萬安橋宋嘉祐中太守蔡襄建遇葉李自漳州放還見于客邸李賦詞贈之似道俯首謝焉陳宜中去位詔罷王爚為醴泉觀使召宜中于溫州初張世傑之將出師也王爚謂二相宜一人督師吳門不然則已請行宜中甚愧已而世傑敗于焦山爚復言曰今二相並建都督廟算指授臣不得而知比者六月出師諸將無統臣豈不知吳門去京不逺而必為此請者蓋大敵在境非陛下自將則大臣出督今世傑以諸將心力不一而敗不知國家尚堪幾敗邪臣既不得其職又不得其言乞罷平章太后不許既而京學生劉九皋等伏闕上書言宜中擅權其略以為趙溍趙與鑒皆棄城遁宜中乃借使過之説以報私恩令狐槩潛説友皆以城降乃受其苞苴而為之羽翼文天祥率兵勤王信讒而沮撓之賈似道喪師辱國陽請致罰而隂佑之元兵薄國門勤王之師乃留之京城而不遣宰相當出督而畏縮猶豫第令集議而不行師夔狼子野心而使之通好乞盟馬張世傑步兵而用之于水劉師勇水兵而用之于步指授失宜因以敗事臣恐誤國將不止一似道也初宜中事多専決不關白爚或謂京學之論實爚嗾之書上宜中徑去遣使四輩召之不至太后乃下九皋等臨安獄而降手詔曰給舍之奏謂爚與宜中必難久處兼爚近奏乞免平章辭氣不平誠有如人言者可罷爚平章軍國重事以少保觀文殿大學士充醴泉觀使爚既罷相未幾遂卒爚清修剛徑不阿權勢及為相屬國勢危亡乃不能協謀以濟大事士論惜之元以巴延為右丞相阿珠為左丞相元主召巴延還至上都面陳形勢乞即進兵遂拜右丞相巴延辭曰阿珠功多臣宜居後乃進阿珠左丞相仍詔巴延直趨臨安阿珠仍攻淮南阿爾哈雅取湖南萬户宋都木逹舊作宋都䚟今改吕師夔李恆西夏之裔等取江西加夏貴樞密副使兩淮宣撫大使貴不奉詔詔貴與淮東制置副使知揚州朱煥互調召李庭芝還朝貴不奉詔煥還揚州庭芝亦不行八月以李芾知潭州文天祥知平江府天祥至臨安上疏言本朝懲五季之亂削藩鎮建都邑一時雖足以矯尾大之弊然國以寖弱故敵至一州則一州破至一縣則一縣殘中原陸沉痛悔何及今宜分境內為四鎮建都統御于其中以廣西益湖南而建閫于長沙以廣東益江西而建閫于隆興以福建益江東而建閫于番陽以淮西益淮東而建閫于揚州責長沙取鄂隆興取蘄黃番陽取江東揚州取兩淮地大力衆乃足以抗敵約日齊奮有進無退日夜以圖之彼備多力分疲于奔命而吾民之豪傑者又伺間出于其中如此則敵不難却也時議以為迂濶不報命知平江府元以亷希憲行省事于江陵阿爾哈雅以江陵地圖上進請重臣開大府鎮之元主命希憲行省事希憲至江陵阿爾哈雅率其屬郊迎望拜塵中荆人大駭希憲録舊官禁剽奪興學墾田民情大安由是思播田揚二氏及西南溪洞皆越境請降冬十月以留夢炎陳宜中為左右丞相兼樞密使都督諸路軍馬時夢炎自右相除左相宜中自觀文殿大學士復除右相宜中在溫州被召以親老力辭太后自為書遺其母楊氏使諭之宜中乃赴召元阿爾哈雅圍潭州李芾力戰禦之李芾至潭元遊騎已入湘隂五代宋縣今屬湖南長沙府益陽漢縣今亦屬長沙府諸縣城中守卒不滿三千芾結洞蠻為援繕器械峙芻糧柵江修壁及元兵至芾慷慨登陴與諸將分地而守民老弱皆出結保伍助之不令而集芾日以忠義勉將士人皆殊死戰有來招降者輒殺之以徇監押官鄭虎臣殺賈似道于漳州似道舟次南劍州黯淡灘在今延平府城東其水湍急其石亷利號稱極險虎臣曰水清甚何不死于此似道曰太皇許我不死候有詔即死十月至木綿菴在今龍溪縣南虎臣曰吾為天下殺似道雖死何憾遂拘其子與妾于别館即厠上拉其胸殺之陳宜中至福州捕虎臣斃于獄後十二月復詔許似道歸葬返其田廬元阿珠圍揚州李庭芝力戰禦之阿珠攻揚久而不拔乃築長圍困之城中食盡死者枕籍滿道而庭芝之志益堅會巴延至灣頭召諸將授方略遂率衆軍南行元巴延渡江分兵東下巴延分兵為三道阿嘍罕鄂囉齊喇拉台人舊作奧魯赤喇拉台舊作扎剌台今改等帥右軍自建康出廣德四安鎮在今廣德州東與長興縣接界為江浙陸行通道趨獨松關董文炳薑衛國王固察子舊作相威固察舊作速渾察今改等帥左軍出江並海取道江隂趨澉浦在今海鹽縣南水經注云谷水于縣出為澉浦以通巨海即此華亭以范文虎為前鋒巴延及安塔哈舊作阿答海今改等將中軍趨常州以吕文煥為前鋒水陸並進期會臨安文天祥遣兵救常州不克常州告急天祥使尹王寧都人麻士龍朱華與張全陳宜中所遣也合將兵赴援士龍戰虞橋先死玉戰五牧在今武進縣東南前後殺傷數千人復收殘卒五百與北兵相持一夕手殺數十人遂死麾下無一人降者全華不戰而遁十一月元將阿嘍罕克廣德軍四安鎮召文天祥入衛阿嘍罕破銀樹東壩戍將趙淮葵之子死之遂至護牙山一名伍牙山在今建平縣東北為金陵諸山之祖支沠連屬北接溧陽連戰皆捷進克廣德軍四安鎮陳宜中倉皇發臨安民年十五以上者皆籍為兵號武定軍召文天祥于平江元將宋都木逹李恆等盡取江西州軍都統密佑其先密州人後居廬州逆戰于撫州死之宋都木逹與李恆等所至莫當其鋒隆興轉運判官劉槃以城降不數月取江西十一城進逼撫州時黃萬石開閫州治聞兵至奔建昌都統密佑率衆逆戰進賢坪在今進賢縣南元兵呼曰降者乎鬪者乎佑曰鬬者也麾其兵突進元軍闈之數重佑身被四矢三槍猶揮雙刀率死士數十人斫圍南走橋斷遂被執宋都木逹曰壯士也欲降之不屈令其子説之曰父死子安之佑斥曰汝行乞于市第云密都統子誰不憐汝怡然自解其衣請刑遂死元進取建昌萬石走入閩元巴延克常州屠其民知州事姚訔希得子通判陳照字光伯常州人都統王安節堅之子死之巴延至常州會兵圍城姚訔陳照劉師勇王安節力戰固守巴延遣人招之譬喻百端終不聽巴延怒役城外居民運土為壘土至併人以築之且殺民煎膏取油以作炮焚其牌杈日夜攻不息城中甚急而訔等守志益堅巴延乃叱帳前諸軍奮勇爭先四面並進城遂破訔死之照與安節猶巷戰或謂照曰城東北門未合可走照曰去此一步非死所矣日中兵至死焉巴延命屠其民執安節至軍前不屈亦死師勇以八騎突圍走平江以謝枋得為江西招諭使知信州初枋得聞淮西江東西州郡守將皆吕氏部曲故爭降附自以與吕師夔善乃應詔上書以一族保師夔可信乞分沿江諸屯兵以師夔為鎮撫使使之行成且乞身至江州見文煥與議朝廷乃以枋得為沿江察訪使以往會文煥北還不及而返遂改知信州追封故濟王竑為鎮王諡昭肅中書舍人王應麟請為濟王立後乃詔贈太師尚書令進封鎮王擇後奉祀賜田萬畝元軍破獨松關守將張濡遁獨松既破鄰邑望風皆遁朝廷大懼時勤王師尚三四萬人文天祥與張世傑議以為淮東堅壁閩廣全城若與敵血戰萬一得捷則令淮師以截其後國事猶可為也世傑大喜陳宜中白太后降詔以王師務宜持重議遂止張濡既遁後為亷希賢之子所殺左丞相留夢炎遁十二月遣工部侍郎桞嶽如元軍請平巴延不許陳宜中當國遭時多難不能措一策惟事蒙蔽將士離心郡邑降破方且理會科舉明堂等事及士大夫陳乞差遣士人覬覦恩例至是遣桞嶽奉書如元軍前乞班師修好嶽見巴延于無錫泣請曰嗣君幼沖在衰絰中自古禮不伐喪凡今日事至此者皆姦臣賈似道失信誤國耳巴延曰汝國執戮我行人故我興師錢氏納土李氏出降皆汝國之法也汝國得天下于小兒亦失于小兒天道如此尚何多言遂令囊嘉特奈曼人舊作囊加歹今改偕嶽還而别遣人奏上都追封吕文德為和義郡王朝議以吕文煥為元鄉導乃追封文德而以文德子師孟為兵部侍郎覬成和議元巴延入平江平江府通判王矩之統制王邦傑以城迎降于常州府巴延使吕文煥先往受之然後入城張世傑未至平江已破乃以兵入衛復遣桞嶽如元求封行至高郵民殺之陳宜中因桞嶽還復奏遣宗正少卿陸秀夫及吕師孟等同囊嘉特使元軍求稱姪納幣不從則稱姪孫且敕吕文煥令通好罷兵秀夫等見巴延于平江巴延不許宜中乃白太后奉表求封為小國太后從之直學士院高應松開慶元年進士不肯草表改命京局官劉褎然為之嶽等至高郵嵇家莊為嵇聳所殺黃萬石叛降元統制米立淮人死之立初從陳奕守黃州奕降立潰圍出萬石署為悵前都統制元軍略江西立迎戰于江坊兵敗被執不降繫獄至是萬石舉軍降元元行省遣萬石諭立曰吾官銜一牙牌書不盡今亦降矣立曰侍郎國家大臣立一小卒爾但三世食趙氏祿趙亡何以生為立乃陳上生擒之人與投拜者不同萬石再三諭之不屈遂遇害丙子二年是年依前夏商例一嵗兩係三月以前為宋德祐二年三月以後為元至元十三年説詳後春正月元阿爾哈雅破潭州湖南鎮撫大使知州事李芾死之遂盡取湖南州軍阿爾哈雅督戰益急與諸將畫地分圍決隍水以炮攻之城中大窘力不能支諸將泣請曰事急矣吾屬為國死可也如民何芾罵曰國家平時所以厚養汝者為今日也汝第死守有復言者吾先戮汝除夕元兵登城蟻附而上知衡州尹榖字耕臾潭州長沙人時寓城中知事不可為與其家人自焚芾命酒酹之因留賔佐會飲夜傳令猶手書盡忠字為號飲逹旦諸賔佐乃出參議楊霆字震仲赴園池死芾坐熊湘閣召帳下沈忠遺之金曰吾力竭分當死吾家人亦不可辱于俘汝盡殺之而後殺我忠辭以不能芾固命之忠泣而諾取酒飲其家人盡醉乃遍刃之芾亦引頸受刃忠縱火焚其居還家殺其妻子復至火所大慟舉身投地乃自刎幕僚陳億孫安仁人顔應焱皆死潭民聞之多舉家自盡城無虛井縊林木者相望元旦守將吳繼明劉孝忠以城降阿爾哈雅傳檄諸郡由是袁連衡永郴全道桂陽武岡皆降于元寶慶通判曾如驥亦不屈而死事聞贈芾端明殿大學士諡忠節陳文龍元年十二月文龍參知政事黃鏞元年十一月鏞同簽書樞密院事遁以吳堅元年十一月堅簽書樞密院事為左丞相兼樞密使常楙字長孺同曾孫參知政事日午宣麻慈元殿文班止六人尋以夏士林簽書樞密院事楙及士林皆遁去召留夢炎還亦不至詔即以為江東西湖南北宣撫大使諸關兵皆潰知嘉興府劉漢傑以城降元元兵圍安吉州知州趙良淳字景程汝愚曽孫居饒之餘干與提刑徐道隆字伯謙婺州武義人同守時元兵迫行都召道隆入衛道絶不通乃由太湖經武康晉縣今屬湖州府臨安晉縣今屬杭州府縣境勤王范文虎致書誘良淳降良淳焚書斬其使元兵至良淳率衆城守夜就茇舍陴上不歸既而戍將吳國定開門納元兵良淳命車歸府兵士止之曰侍郎何自苦良淳叱去之閉閣自經元兵追道隆及之一軍盡沒道隆見執伺守者少怠赴水死遣監察御史劉岊奉表稱臣于元陸秀夫還言巴延不肯從伯姪之稱太后命用臣禮陳宜中難之太后涕泣曰苟存社稷稱臣非所較也遂遣岊奉表稱臣上尊號嵗貢銀絹二十五萬兩匹乞存境土以奉蒸嘗且約巴延會長安鎮在今海寧縣西北與仁和縣接界以輸平進封吉王是為益王判福州信王昺為廣王判泉州初召文天祥知臨安府天祥辭不拜請以福王秀王名與檡安僖王子稱之後判臨安係民望身為少尹以死衛宗廟又乞命吉王信王鎮閩廣以圗興復俱不許至是宗親復請太后從之以駙馬都尉楊鎮及楊淑妃弟亮節俞修容弟如圭提舉二王府事陳宜中請遷都不果行宜中以元不許和計無所出乃率羣臣入宫請遷都太后不許宜中慟哭以請太后命具裝以俟及暮宜中不入太后怒曰吾初不欲遷而大臣數以為請顧欺我邪脫簮珥投之地遂閉閣羣臣請見皆不納蓋宜中實以翼日行倉卒失于奏爾元巴延軍皋亭山在今仁和縣東北太皇太后遣使奉璽以降右丞相陳宜中夜遁巴延至長安鎮陳宜中違約不往議事巴延乃進次皋亭山阿嘍罕董文炳之師皆會遊騎至臨安府北關即今北新關在仁和縣北武林門外文天祥張世傑請移三宫入海而已帥衆背城一戰宜中不許白太后遣監察御史楊應奎上傳國璽以降巴延受之遣使召宜中議降事而使囊嘉特奉璽表赴上都應奎既行是夜宜中遁歸于溫州之清澳張世傑劉師勇各以所部兵入于海世傑師勇及蘇劉義以不戰而降遂去世傑次于定海宋縣今改名鎮海屬寧波府元石國英使都統卞彪説世傑降世傑以為彪來從已俱南也椎牛享之酒半彪從容為言世傑大怒斷彪舌磔之于巾子山在今鎮海縣東北山形卓立如巾幘故名師勇至海上見時事不可為憂憤縱酒卒吳堅文天祥如元軍巴延執天祥遣堅還楊應奎還言巴延欲執政面議太后乃以天祥為右丞相兼樞密使天祥先拜簽書樞密院事與吳堅偕往天祥辭不拜遂行因説巴延曰北朝若以宋為與國請退兵平江或嘉興然後議嵗幣與金帛犒師北朝全兵以還策之上也若欲毁其宗社則淮浙閩廣尚多未下利鈍未可知兵連禍結必自此始巴延以北詔為辭顧天祥舉動不常疑有異志留之軍中遣堅還天祥怒數請歸曰我之此來為兩國大事何故留我巴延曰勿怒君為宋大臣責任非輕今日之事正當與我共之令蒙古台蒙古塔塔爾氏舊作忙兀台今改索多館伴羈縻之駙馬都尉楊鎮等奉益王廣王走婺州楊淑妃秀王與檡從行元吕師夔侵江東謝枋得迎戰敗績枋得與元戰于安仁陳縣今屬饒州府矢盡而敗遂奔建寧宋名屬福建路今福建建寧府是山中妻子皆被執枋得至建寧變姓名寓逆旅中日麻衣躡屨東鄉而哭人不識之以為被病也已而去賣卜建陽市中有來卜者惟取米屨而已委以錢率謝不取其後人稍稍識之多延至其家使為弟子論學建陽晉縣今屬建寧府二月日中有黑子元巴延遣人入臨安封府庫收圖籍符印巴延承制以臨安為兩浙大都督府命蒙古台范文虎入城治都督府事又令程鵬飛取太皇太后手詔及三省樞密院檄諭州郡降附執政皆署家鉉翁眉州人時為簽書樞密院事獨不肯鵬飛令縛之鉉翁曰中書無縛執政之理歸私第以待命可也乃止巴延進屯湖州市在今杭州城北復令吕文煥及范文虎等慰諭太皇太后文煥因入內上表謝而出略曰兹銜北命來抗南師視以犬馬報以仇讐非曰子弟攻其父母不得已也尚何言哉巴延令張惠阿嘍罕董文炳張𢎞範索都等封府庫收史館禮寺圖書及百司符印告敕罷官府及侍衛軍尋復索宫女內侍及諸樂官宫女赴水死者以百數以賈餘慶為右丞相兼樞密使是年正月餘慶已同簽書樞密院事劉岊同簽書樞密院事與吳堅謝堂家鉉翁並充祈請使如元謝堂逃歸餘慶凶狡殘忍岊狎邪小人皆乘時竊美官謂使畢即歸由是罷遣文天祥所部勤王兵堂納賂于北而遁元人以文天祥北去天祥尋自鎮江亡入真州遂浮海如溫州巴延嘗引天祥與吳堅等同坐天祥面斥賈餘慶賣國且責巴延失信吕文煥從旁諭解之天祥并斥文煥及其姪師孟父于兄弟受國厚恩不能以死報國乃合族為逆尚何言文煥等慚恚巴延遂拘天祥隨祈請使北行至鎮江天祥與其客杜滸字貴卿範從子等十二人夜亡入真州苖再成出迎喜且泣曰兩淮兵足以興復特二閫小隙不能合從耳天祥問計將安出再成曰今先約淮西兵趨建康彼必悉力以扞我西兵指揮淮東諸將以通泰兵攻灣頭以高郵寶應淮安兵攻揚子橋以揚兵攻瓜步吾以舟師直搗鎮江同日大舉灣頭揚子橋皆沿江脆兵且日夜望我師之至攻之即下合攻瓜步之三面我自江中一面薄之雖有智者不能為之謀矣瓜步既舉以淮東兵入京口淮西兵入金陵要其歸路其大帥可坐致也天祥大稱善即以書遺李庭芝遣使四出約結初天祥未至真時揚有逸卒言元密遣一丞相入真州説降矣庭芝信之以為天祥來説降也使再成亟殺之再成不忍紿天祥出相城壘以制司文示之閉之門外久之復遣二路分覘天祥果説降者即殺之二路分與天祥語見其忠義亦不忍殺以兵二十人道之如揚四鼓抵城下聞候門者談制置司下令備文丞相甚急衆相顧吐舌天祥乃東入海道遇元兵伏環堵中得免然飢莫能起從樵者乞得餘糝羮行入板橋元兵又至衆走伏叢篠中兵入索之執杜滸金應以去滸應以所懷金與卒得逸二樵者以蕢荷天祥至高郵遂由通州泛海如溫以求二王浙江潮三日不至時元兵分駐江沙上杭人方幸之潮汐竟三日不至元巴延使范文虎追益王廣王不及執楊鎮還臨安二王遂走溫州巴延自二王自嘉會門出渡浙江而南遣范文虎將兵追之楊鎮得報即還曰吾將就死于彼以緩追兵楊亮節等遂負二王及楊淑妃徒步匿山中七日統制張全以兵數十人追及遂同走溫州夏貴以淮西叛降元知鎮巢軍唐巢縣地宋置鎮巢軍今仍為縣屬廬州府洪福死之阿珠屯淮南東道其西道屬之萬户昂吉爾張掖人姓葉普爾努氏始為西夏將舊作昻吉兒葉普爾努舊作野蒲今改俾駐和州進攻廬州夏貴以書抵巴延曰願毋費國力攻奪邉城若行都歸附邉城焉往至是舉所部納欵于元元以貴為淮西安撫使有洪福者貴家僮也從貴積勞知鎮巢軍貴既北降招福不聽使其從子往福斬之元兵攻城久不拔貴至城下好語語福請單騎入城福信之門發而伏兵起執福父子屠城中貴蒞殺福子大源大淵呼曰法止誅首謀何乃舉家為戮福叱曰以一命報宋朝何至告人求活邪次及福福大罵數貴不忠請身南向死以明不背國聞者流涕三月元巴延入臨安以帝及皇太后全氏福王與苪等北去宋亡巴延自湖州市入城建大將旗鼓率左右翼萬户巡城觀潮于浙江又登獅子峯在今錢塘縣天竺西南風篁嶺之北觀臨安形勝部分諸將時福王亦自紹興至巴延深慰之太皇太后及帝欲與相見巴延固辭曰未入朝無相見之禮明日發臨安塔哈等入宫宣詔免牽羊繫頸之禮趣帝及太后入覲太后泣謂帝曰荷天于聖慈活汝宜拜謝禮畢帝與太后肩輿出宫太皇太后以疾留內與苪及沂王乃猷度宗母隆國夫人黃氏并楊鎮謝堂高應松庶僚劉褎然三學生等皆行太學生徐應鑣字巨翁衢州江山人與其二男一女同赴井死御批厯代通鑑輯覽卷九十四

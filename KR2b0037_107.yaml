front:
  text: 欽定四庫全書御批厯代通鑑輯覽巻一百八明武宗皇帝己夘正徳十四年春二月帝還京師
  hash: sha256:8ca3aca54045a9829ebb2c13a3cea098750bbf2158099b11a5e26fd9422b18b1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_107-1a, image: WYG0339/WYG0339-0441a.png}
body:
  text: 帝遊幸邉塞歴數千里乗馬腰弓矢涉險阻冐風雪從者多道病帝無倦容至是自宣府還京羣臣奉迎如前儀京師地震帝自加太師勅諭廵行祈福三月郎中黄鞏字伯固莆田人修撰舒芬字國裳進賢人等百四十六人先後疏諫悉杖之死者十一人帝降手勅于吏部曰鎮國公朱夀宜加太師又諭禮部曰威武大將軍太師鎮國公朱夀今徃兩畿山東祀神祈福復諭工部急修黄馬快船備用閣臣及科道官皆切諌不報兵部郎中黄鞏與員外郎陸震字汝亨蘭谿人具疏連署以進畧言陛下即位以來紀綱法度一壞于劉瑾再壞于侫倖又再壞于邉帥蓋蕩然無餘矣亂本已生禍變將起因陳最急者六事一崇正學二通言路三正名號四戒逰幸五去小人六建儲貳修撰舒芬亦邀其同官崔桐字來鳯揚州人等七人上疏極諫畧言陛下两廵西北四民告病今復聞南幸盡皆逃竄非古廵狩之舉而幾于秦皇漢武之逰宜監博浪栢谷之禍吏部員外郎夏良勝字于中南城人及禮部主事萬潮字汝信進賢人太常博士陳九川字惟濬臨川人復連疏入於是吏部郎中張衍瑞字元承汲縣人等十四人刑部郎中陸俸吴縣人等五十三人繼之禮部郎中姜龍太倉人等十六人兵部郎中孫鳳洛陽人等十六人又繼之而醫士徐鏊嘉定人本高氏子少依舅京師冐其姓亦以其術諫帝與諸倖臣皆大怒下鞏震良勝潮九川鏊詔獄芬等百有七人罰跪午門外五日已而大理寺周正叙九谿衛人等十人行人司副余廷瓚鄱陽人等二十人工部主事林大輅莆田人等三人連名疏又相繼上帝益怒並下詔獄俄令與鞏震等俱跪闕下五日加梏拲焉至晩仍繫獄諸臣朝入暮出纍纍若重囚道旁觀者無不太息泣下廷臣自内閣及尚書石价字邦秀藁城人疏救外莫有言者諸嬖倖揚揚得意士民忿恨伺諸大臣出入爭擲瓦礫詬詈之諸大臣皆恐入朝不敢待辨色請下詔禁言事者通政司遂格不受疏是時天連曀盡晦南海子水涌四尺餘金吾衛指揮僉事張英曰此變徵也乃肉袒㦸刄於胸持疏誎當蹕跪哭即自刺其胸血流滿地衛士奪其刄縛送詔獄詔杖之八十死諸臣跪既畢仍杖之於廷死者十一人陸震余廷瓚及工部主事何遵刑部主事劉校照磨劉珏大理評事林公輔行人李紹賢孟陽詹軾劉槩李恵人遵字孟循江寕人校邵城人珏汲縣人公輔長樂紹賢旴𣅿人陽澤州人軾玉山人槩安樂人恵祥符人餘除名貶黜有差戍鏊於邊而車駕亦不復出矣夏六月寧王宸濠反廵撫江西都御史孫燧字徳成餘姚人按察司副使許逵字汝登固始人死之宸濠乆蓄異志交通肘腋因帝無緒嗣逰幸不時人情危懼遂日夕覬覦宸濠賄錢寧取中㫖召其子司香太廟寧言於帝用異色龍牋報賜異色龍牋者故事所賜監國書牋也宸濠大喜列仗受賀復勒諸生父老奏闕下稱其孝且勤時冮彬欲傾寕及臧賢令太監張忠乘問為帝言曰賢稱寧王孝譏陛下不孝耳稱寧王勤譏陛下不勤耳帝曰然下詔逐王府人毋留下廵撫都御史孫燧七上章言之皆為所邀阻宸濠益與其黨李士實致仕都御史劉養正舉人謀遣姦人分布水陸孔道萬里傳報浹旬徃返蹤跡大露諸權倖匿不以聞㑹御史蕭淮盡發其不軌状大學士楊廷和請如宣宗處趙府故事遣勲戚大臣宣諭帝乃命駙馬都尉崔元代州人尚憲宗女永康公主都御史顔頤夀巴陵人等持諭徃收其䕶衛宸濠聞元等且至乃决計反以己生辰日宴諸守土官詰旦皆入謝宸濠命甲士環之大言曰孝宗為李廣所誤抱民間子祖宗不血食者十四年今太后有詔令我起兵討賊亦知之乎衆相顧愕眙孫燧直前曰安得此言請出詔示我宸濠曰毋多言我徃南京汝當扈駕燧大怒曰汝速死耳天無二日吾豈從汝為逆哉宸濠入内殿易戎服出麾兵縛燧按察司副使許逵奮曰汝曹安得辱天子大臣因以身翼蔽燧賊并縛逵二人罵不絶口賊擊燧折左臂與逵同曵出殺之恵民門外廵按御史王金布政使梁宸參政王綸以下咸稽首呼萬嵗宸濠以李士實劉養正為左右丞相王綸為兵部尚書集兵號十萬釋獄囚收庫藏遣人分詣諸郡邑奪印起兵命其承奉徐欽與素所蓄羣盗閔念四等略九江南康皆䧟之廵撫南贛都御史王守仁起兵討宸濠秋七月復南昌守仁方奉命勘福建叛軍行至豐城注見前而宸濠反知縣顧秘以告守仁急趋吉安與知府伍文定徴調兵食治器械舟楫傳檄暴宸濠罪俾守令各率吏士勤王因集衆議曰賊若出長江順流東下南都不可保吾欲以計撓之少遲旬日無患矣乃多遣間諜檄府縣言都督許泰率京軍四萬南贛王守仁湖廣秦金字國聲無錫人兩廣楊旦字晉初建安人各率所部合十六萬直𢷬南昌所至缺供者以軍法論又為蠟書遺偽相李士實劉養正叙其歸國之誠令慫惥早發兵東下而縱諜洩之宸濠果疑與士實養正謀則皆勸之疾趨南京即大位宸濠益大疑十餘日詗知中外兵不至乃悟守仁紿之七月壬辰朔留宜春王拱樤守城而刦其衆六萬人出大江攻安慶都督僉事楊鋭字進之蕭縣人知府張文錦安邱人等固守不能克安慶被圍十有八日鋭等以寡敵衆隨機應變所向摧敗宸濠謂其下曰安慶且不克安望金陵哉守仁聞南昌兵少則大喜趨樟樹鎮在臨江府清江縣東北亦曰清江鎮道通豐城為南北津要臨江知縣戴徳孺臨海人袁州知府徐漣朝邑人等各以兵來㑹合八萬人或請救安慶守仁曰不然今九江南康已為賊守我越南昌與相持江上二郡兵絶我後是腹背受敵也不如直搗南昌賊守備虚我軍新集氣鋭攻必破賊聞南昌破必解圍自救逆擊之湖中蔑不勝矣衆曰善己酉次豐城以文定為先鋒庚戌夜半兵抵廣潤門守兵駭散辛亥黎明諸軍梯絙登縳拱樤等宫人多焚死軍士頗殺掠守仁戮犯令者十餘人宥脅從安士民慰諭宗室人心乃悦王守仁敗宸濠於樵舍鎮名在南昌府新建縣西北擒之守仁既下南昌居二日遣伍文定徐璉戴徳孺各將精兵分道進而使瑞州通判胡堯元等設伏以待宸濠果解安慶圍還救南昌遇於黄家渡在南昌縣東通饒州府餘干縣文定當其前鋒賊趨利邢珣繞出賊背貫其中文定乘之堯元等伏發賊大潰退保八字腦在饒州府西宸濠懼盡發南康九江兵復戰大敗退保樵舍聨舟為方陣盡出金寳犒士明日宸濠方晨朝其羣臣官軍奄至以小舟載薪乘風縱火焚其副舟妃婁氏上饒人以下皆投水死宸濠欲謀逆婁氏嘗苦諫不聼及是嘆曰昔紂用婦言亡吾以不用婦言亡悔何及宸濠舟膠淺倉卒易舟遁萬安知縣王冕所部兵追執之士實養正及降賊按察使楊璋等皆就擒南康九江亦下凡三十五日而賊平秋八月帝自將擊宸濠初宸濠反狀聞邉將在豹房者各獻擒宸濠之䇿帝亦欲假親征南逰遂傳㫖稱宸濠悖逆天道謀為不法即令總督軍務威武大将軍鎮國公朱夀統各鎮邉兵征勦所下璽書改稱軍門檄江彬等皆隨征楊廷和等諫不聼至是駕發京師梁儲蔣冕扈從次涿州王守仁㨗奏至留之不下帝至保定晏於府堂與都御史伍符為藏闗戲符探得闗帝不悅飲符至醉乃大笑方帝之南發也劉姬疾不從約以玉簪召帝過盧溝橋馳馬失簪索之不得及至臨清遣使召姬姬以無信約不肯行帝乘單舸晨夜疾行至張家灣載與俱南内外從官無知者命太監張忠安邉伯許㤗率禁軍徃江西王守仁初上宸濠反書因請黜姦諛諸嬖倖皆恨宸濠既平相與媢功且懼發其罪競言守仁先與通謀又欲令縱宸濠湖中待帝自擒守仁乘忠㤗未至先俘宸濠于南昌忠㤗以威武大將軍檄邀之守仁不與至錢塘遇太監張永守仁夜見永頌其賢永故與楊一清善除劉瑾故守仁稱之因極言江西困敝不堪六師擾永深然之曰永此來為調䕶聖躬非邀功也公大勛永知之但不可徑情耳守仁乃以宸濠付永而身至京口欲朝行在㑹帝命守仁廵撫江西守仁乃還南昌忠泰已先至恨失宸濠執伍文定窘辱備至故縱京軍犯守仁或呼名嫚罵守仁撫之愈厚病予藥死予棺京軍謂王都堂愛我無復犯者㑹冬至守仁命居民巷祭已上塜哭時新䘮亂悲號震野京軍離家乆聞之無不泣下思歸忠㤗不得已班師比見帝讒毁百端獨永時時左右之冬十二月帝如南京自帝發京師江彬在途矯㫖輒縳長吏通判胡琮懼自縊死至揚州即民居為提督府遍刷寡婦處女導帝漁獵以劉姬諫稍止及是至南京又欲導帝幸蘇州下浙江抵湖湘諸臣極諫㑹其黨亦勸沮乃止彬率邊兵數萬䟦扈甚成國公朱輔為長跪魏國公徐鵬舉逹七世孫及公卿大臣皆側足事之惟參贊尚書喬宇字希大山西樂平人應天府丞冦天叙字子敦榆次人挺身與抗彬氣稍折庚辰十五年春正月帝在南京改卜郊時帝議南京行郊禮大學士梁儲蔣冕計此議行則回鑾益無日極陳不可疏三上始得請焉時帝駐蹕舊邸不入大内一日幸牛首山軍中夜驚左右不知帝所在大擾乆之乃定傳者或謂江彬欲為逆云苕邸太祖為吴王時所居也秋閏八月受江西俘江西俘宸濠至帝令設廣場樹大纛環以諸軍釋囚去桎梏伐鼓鳴金而擒之然後置械受俘時張忠許泰屢嬌㫖召王守仁守仁不赴忠揚言帝前曰守仁必反試召之必不至守仁知出帝意立馳至忠奉計沮不令見帝守仁乃入九華山日宴坐僧寺帝覘知之曰王守仁學道人聞召即至何謂反乃遣還鎮令更上捷音守仁乃易前奏言奉威武大將軍方畧討平叛亂而盡入諸嬖倖名江彬等乃無言帝發南京先是梁儲蔣冕乞還乘輿疏八九上帝不省是秋有物若豕首墮帝前色碧又帝所御室中若懸人首狀人情益驚儲冕手疏跪泣行宫門外歴未至酉帝遣人取疏入諭之起叩頭言未奉諭㫖不敢起帝許不日還京乃出㑹宸濠擊江上舟中民間訛言將為變帝心疑欲歸乃下詔班師丁酉發南京是夕祭龍江駐蹕儀置次日至𤓰州避雨民間後自𤓰州濟江登金山遂南渡幸大學士楊一清第製詩十章䁑之還至楊州太監邱得索賄不得以鐡絙繋知粹府蔣安瑤窘辱備至数日乃得釋瑶字卿歸人九月漁于積水池遂有疾帝至清江浦幸太監張楊第踰三日自泛小舟漁于積水池舟覆溺焉左右夾帝出自是遂不豫冬十月至通州十二月誅宸濠還京師帝至通州江彬矯㫖召勲戚大臣赴行在議宸濠獄時帝乆駐于外京師洶洶人情危懼大學士楊廷和毛紀等請帝還大内御殿受俘然後誅宸濠不納趣召廷和等至通州受事遂賜宸濠自盡仍焚棄其屍帝之北還每令濠舟與御舟啣尾而行意甚防之及抵通州謂左右曰吾必决此獄乃入羣臣請如先年處置高煦寘鐇例祭告天地宗廟仍勅天下諸王議罪然後明正其法皆不聼傳者謂江彬復欲邀帝北幸故欲速决此獄云越三日帝還京師大耀軍容俘諸逆者及家屬數千人陳輦道東西陸完錢寧亦皆祼體反接帝去年南征江彬發寜罪状即命羈之臨清陸完素與宸濠比太監張永在江西搜閲簿籍得完交通事奏之遂命執完識行在收其母妻子女封其家揭白幟標其姓名死者梟于竿凡數里不絶帝戎服乘馬立正陽門下閱視良乆乃入辛巳十六年春三月癸丑朔日食帝崩于豹房帝于正月郊祀嘔血不能成禮輿疾歸及是益甚謂太監陳敬蘇進曰朕疾殆不可為可以朕意逹皇太后天下事與内閣輔臣議處之前此事皆由朕誤非汝軰所能預也丙寅遂崩於豹房太監谷大用張永等以皇太后命移殯大内皇太后以遺詔遣官迎興世子厚熜獻王祐杭子時獻王薨厚熄以世子理國事入嗣皇帝位先是帝大漸司禮中官魏彬等以帝無皇嗣至閣言國醫力竭矣請捐黄金購之草澤楊廷和心知所謂不應而㣲以倫序之説諷之彬等唯唯及帝崩谷大用張永至閣議所當立廷和出祖訓于䄂中示之曰兄終弟及誰能凟焉興獻王長子憲宗之孫孝宗之從子大行皇帝之從弟序當立梁儲蔣冕毛紀咸贊之乃令中官入啟皇太后廷和等候左順門下吏部尚書王瓊率九卿入左掖門厲聲曰此豈小事我九卿長顧不與邪衆不答頃之中官奉遺詔及太后懿㫖宣諭羣臣一如廷和請乃議遣官奉迎故事當以内閣一人與中貴勲戚禮官偕徃廷和恐蔣冕去則已益孤而梁儲老矣或憚徃乃佯惜儲憊阻其行儲奮曰事孰有大於迎天子者乎敢以憊辭遂與太監谷大用等奉遺詔以行罷威武團營楊廷和請于皇太后傳遺㫖罷威武團練諸營邉軍俱重賚歸鎮革京城内外皇店縱遣豹房番僧及教坊司樂人又以遺詔放還四方進獻女子停京師不急工務收宣府行宫珠寳歸之内府中外大悦執江彬等下獄彬知天下惡已又見罷遣邊兵益内疑其黨都督李琮勸彬速反不勝則北走塞外彬猶豫未决令許泰詣内閣探意廷和慰以温言而密與蔣冕毛紀及太監温祥魏彬張永合謀捕之魏彬入白太后㑹坤寧宫安獸吻令江彬入祭祭畢張永留彬飯故緩之俄而逮㫖下彬亟走西安門門閉尋走北安門門者曰有㫖留提督彬曰今日安所得㫖門者擁之遂被執拔其鬚且盡有頃神周李琮亦縛至並下詔獄藉彬家黄金七十櫃白金二千二百櫃他珍寶不可勝計彬既敗張忠許泰等以次下獄夏四月興世子至京師入即位是為世宗世子至京師止於郊外禮官具儀請如皇太子即位禮王顧長史袁宗臯曰遺詔以我嗣皇帝位非皇子也楊廷和請由東安門入居文華殿擇日登極不允㑹皇太后趣羣臣上牋勸進乃即郊外受牋是日日中入自大明門御奉天殿即位詔草言奉皇兄遺命入奉宗祧帝遲回久之始報可詔赦天下除一切弊政以明年為嘉靖元年帝之未至京師也楊廷和總朝政者三十七日中外倚以為安及帝即位廷和草登極詔凡正徳中蠹政釐挾且盡所革錦衣内監旗校工役凡十餘萬口中貴義子傳堕乞陞一切恩倖得官者大半皆斥去朝野皆稱新天子神聖且頌廷和功而諸失職之徒銜廷和次骨廷和入朝有挾白刄伺輿傍者事聞詔以營卒百人衛出入遣使迎母妃蔣氏大興人於安陸召費宏入内閣宸濠既敗言事者争請召宏於是起宏為少保入輔政並復其弟寀編修詔議崇奉興獻王典禮時帝即位甫六日即詔議興獻王主祀及尊稱禮部尚書毛澄字憲清崑山人請於楊廷和廷和出漢定陶王宋濮王事受之曰是足為據澄乃大㑹文武羣臣上議曰漢成帝立定陶王為太子而以先王孫景後定陶共王師丹以為恩禮備至今陛下入繼大統宜如定陶王故事以益王子厚炫主後興國其稱號宜如宋英宗濮定獻王故事稱孝宗曰皇考興獻王曰皇叔父興獻王妃曰皇叔母議上帝大愠曰父母若是互易邪其再議廷和偕蔣冕毛紀奏言前代入繼之君追崇所生者皆不合典禮惟宋儒程頤濮議最得義禮之正採而行之可為萬世法帝益不悦命博考典禮務求至當廷和冕紀復上言三代以前聖莫如舜未聞追崇所生父瞽瞍三代以後賢莫如漢光武亦未聞追崇所生父南頓君陛下惟取法二君澄亦㑹廷臣再三執奏俱留中不下五月梁儲罷王瓊以罪戍邉初瓊在兵部凡所誅賞悉聴中㫖至是給事中張允敘劾瓊濫鬻將官依阿權倖併劾梁儲持禄固寵儲三疏求去賜勅馳傳歸下瓊都察院鞫治論死瓊疏辨乃減死戍邉儲後辛於家帝念先朝舊臣贈太師諡文康以袁宗臯為禮部尚書兼文淵閣大學士預機務宗臯由進士授興府長史帝即位擢吏部侍郎尋入閣自是藩邸舊臣俱以扈從功不次録用宗臯以疾辭不允未幾卒六月江彬伏誅與李琮神周錢寧等俱磔於市時京師久旱彬誅遂大雨沙呼實亦并伏誅惟張忠許泰夤縁貴近減死徙邉秋七月進士張璁字秉用永嘉人上疏請尊崇所生立興獻王廟於京師璁時以進士觀政見廷議追崇興獻王禮三上三却璁揣知帝意乃遂上疏畧言陛下嗣登大寶即議追尊聖考以正其號奉迎聖母以致其養誠大孝也廷議執漢定陶王宋濮王故事欲考孝宗叔興獻王夫漢哀帝宋英宗皆預養宫中立為儲嗣其為人後之義甚明今陛下以倫序當立循繼統之義非為孝宗後也且迎養聖母稱皇叔母則當以君臣禮見子可以臣母乎長子不得為人後興獻王子惟陛下一人利天下而為人後將母自絶其父母乎故謂陛下入繼祖統則可謂為人後而自絶其親則不可今宜别立聖考廟於京師以隆尊親之孝且使母以子貴尊與父同則聖考不失其為父聖母不失其為母矣帝方扼廷議得璁疏大喜曰此論出吾父子獲全矣遂手詔楊廷和蔣冕毛紀欲尊父為興獻皇帝母為興獻皇后祖母為夀安皇太后廷和等持不可封還手詔于是給事中朱鴻湯史于光御史王溱盧瓊字獻卿浮梁人交章劾璁帝不聼初璁以舉人八上㑹試始得第有胡鐸者與璁同舉於鄉死璁舉進士及大禮議起鐸已官湖廣參政在京師意亦主考獻王與璁合璁要之同署鐸曰主上天性固不可違天下人情亦不可拂考獻王不已則宗宗不已則入廟入廟則當有祧以藩封虚號之帝而奪君臨治世之宗義固不可也入廟則有位將位武宗上乎武宗下乎生為之臣死不得躋于君然魯嘗躋禧公矣恐異日不乏夏父之徒也不肯署璁疏遂獨上其後諸臣争以議禮干進稱宗入廟果如鐸言胡鐸字時振餘姚人命自今親喪不得奪情署為令九月𦵏康陵在昌平州金嶺山東北諡曰毅皇帝廟號武宗明史贊曰毅皇手除逆瑾躬禦邉冦奮然欲以武功自雄然耽樂嬉遊暱近羣小至自署名號冠履之分蕩然矣然幸用人之柄躬自操持而秉鈞諸臣補苴匡救其不底於危亡者藉以此夫冬十月追尊父興獻王為興獻帝祖母憲宗貴妃邵氏為皇太后母妃蔣氏為興獻后帝屢諭閣臣早定大禮㑹母妃至通州聞朝議考孝宗恚曰安得以我子為他人子止通州不入帝聞而泣啟慈夀太后願避位歸藩羣臣惶懼毛澄乃謀於内閣請稱興獻王為興獻帝王妃蔣氏為興獻后而以皇太后懿㫖行之帝不得已乃報可并尊憲宗貴妃邵氏為皇太后張璁知帝意嚮已又聞母妃止通州益大喜著大禮或問以上且曰非天子不議禮願奮獨斷揭父子大倫明告中外章下禮部見者皆目為邪説惟兵部主事霍韜字謂先南海人給事中熊浹字悦之南昌人揣璁言必用附和之未幾浹外轉僉事璁出為南京刑部主事韜自知為衆論所齕引疾歸興獻后至京師謁太廟先是禮官具議后由正陽左門入大明東門帝不可乃自定儀由中門入謁見太廟時尊崇議定已詔告天下越數日帝復手勅加興獻帝后以皇號楊廷和等上言漢皇帝繼孝昭後追謚史皇孫王夫人曰悼考悼后而已光武上繼元帝鉅鹿南頓君以上立廟章陵而已今興獻加稱帝后較之前代已極尊號若加皇字與孝廟慈夀並是忘所後而重本生任私恩而棄大義臣等不得辭其責願罷歸尚書喬宇亦言正統大義惟頼皇子以明若加於本生之親則正統混而無别非所以重宗廟正名分也帝曰慈壽皇太后懿㫖朕不敢達廷和等復偕禮臣執奏編修陳音給事中朱鳴陽御史陳昌等百有五人皆言稱皇非是請斥張璁邪説俱不報世宗皇帝壬午嘉靖元年春正月清寜宫後殿災定皇考聖母本生父母稱號清寧宫後三小殿災揚廷和等因言興獻帝后加稱列聖神靈容有未安今火災示戒昭然可見給事中鄧繼曾字士魯資縣人亦以為言繼曾言天有五行火實主禮人有五事火實主言名不正則言不順言不順則禮不興今之大災廢禮失言之效也帝勉從衆議乃稱孝宗曰皇考慈夀皇太后曰聖母興獻帝后止稱本生不稱皇甘州軍亂殺巡撫都御史許銘甘肅總兵官李隆與銘不相能㑹支月糧嗾步卒請增值銘不許遂圍公廨毆殺銘焚其屍五衛軍大亂詔擢陳九疇為僉都御史帝登極初九疇復原官進陜西按察使巡撫甘肅按驗銘事誅隆及亂卒首事者九疇抵鎮後言額軍七萬餘存者不及半且多老弱請令召募從之三月上慈夀皇太后尊號曰昭聖慈夀皇太后武宗皇后曰莊肅皇后皇太后邵氏曰夀安皇太后興獻后曰興獻太后秋九月立皇后陳氏元城人冬十一月夀安皇太后邵氏崩初太后為憲宗妃興王之藩例不從及是崩别祀奉慈殿癸未二年春二月提督軍務右都御史俞諌討河南山東賊平之青州礦盗王堂等起顔神鎮令青州府博山縣舊為顔神鎮地以齊孝婦顔文姜居此因名置本朝雍正十二年始縣流刦東昌兖州濟南都指揮楊紀指揮楊浩等撃之浩戰死紀僅以身免詔責山東將吏于是諸臣分道逐賊賊不復屯聚徃來金鄉魚臺以下註並見前間突至曹州欲渡河不得轉掠考城循河而西至東明長垣流入祥符封邱歸徳南抵徐州廷議以巡撫官各顧其土事權不一請設總制大臣乃令諌與都督魯綱提督兩畿山東河南諸軍討之賊復流至考城官軍方欲戰而河南降賊張進引三百騎馳至麾旗先卻賊乘之官軍大潰諌等連營而進賊始滅葬孝恵皇太后于茂陵先是太后崩帝欲附葬茂陵數下廷議禮官不敢固爭楊廷和等言祖陵不宜數興工作驚動神靈帝不從及是卒附葬焉禮部尚書毛澄罷道卒謚文簡澄以議禮不合帝意抗疏引疾至五六上不允及是疾甚復力請乃許之舟至興濟宋縣明屬河間府今省為鎮而卒澄端亮有學行論事不為媕婀大禮議起帝屢遣中官諭意澄奮然曰老臣悖謬不能隳典禮惟有一去不與議已耳帝雅敬澄雖數忤㫖恩禮不衰其卒也深悼惜之贈少傅嵗星太白同晝見夏四月旱兩畿山東河南湖廣江西及嘉興大同成都皆旱赤地千里殍殣載道帝以災異勅羣臣修省以宋儒朱熹裔孫墅朱子十一世孫爲五經博士正徳間給事中戴洗汪元錫字天啟婺源人御史王完等相繼言朱子繼孔子者也孔子之後有曲阜西安朱子之後亦有建安婺源今建安已置博士其子孫在婺源者宜如衢州孔廟例官其嫡長一人以奉祀詔從之至是授墅翰林院五經博士尋令世襲閏月帝始修醮于宫中帝用太監崔文言建醮宫中日夜不絶給事中劉最字振廷崇仁人劾文左道糜帑帝怒謫廣徳州晉廣徳縣來為軍元改路明降為州今州𨽻江南通判文憾不已嗾其黨芮景賢奏最在途仍故銜乘巨舫取夫役帝益怒逮最下獄戍邵武其後帝益好長生齋醮無虚日命夏言字公謹青溪人充監禮使湛若水字元明増城人顧鼎臣字九如崑山人充導引官鼎臣進步虚詞七章且列上壇中應行事帝優詔褒答之自此詞臣多以青詞干進矣秋七月南畿大水甲申三年春正月地震兩畿河南山東陜西同時皆震南京刑部主事桂蕚字子實安仁人請改稱孝宗皇伯考詔下廷臣議孝宗興獻帝稱號定已二年尊崇議且寢蕚在南京與張璁同官日夜私詆朝議蕚遂上疏希帝指請改稱孝宗曰皇伯考興獻帝曰皇考興國太后曰聖母并録侍郎席書字文同遂寧人員外郎方獻夫字叔賢南海人二疏以聞蕚疏畧言禮官失考典章納陛下于與為人後之非而滅武宗之統奪獻帝之宗且使興國太后壓于慈夀太后禮莫之盡三綱頓廢非常之變也竊念陛下侍興國太后慨興獻帝弗祀已三年矣拊心出涕不知其幾願速發明詔稱孝宗曰皇伯考興獻帝皇考别立廟大内正興國太后之禮定稱聖母至廷臣所執不過宋濮議耳按范純仁告英宗曰陛下受神宗詔為之子封爵悉用皇子故事與入繼之主不同則宋臣之論亦自有别今陛下奉祖訓入繼大統未嘗受孝宗詔為之子則陛下非為人後而為入繼之主也甚明考興獻帝母興國太后又何疑臣久欲以請乃者復得席書方獻犬二疏伏望奮然裁斷將臣與二臣疏並付禮官令臣等靣質初書與獻犬知大禮未定各草疏請追尊所生帝后定號曰皇考皇母既具聞朝中詆張璁為邪説懼不敢上而密以示蕚及是蕚並進之帝得疏心動手詔下廷臣集議于是禮部尚書汪俊字抑之弋陽人㑹文武羣臣二百五十餘人並排蕚議俊議言祖訓兄終弟及指同産言今陛下為武宗親弟自宜考孝宗孰謂與人為後而滅武宗之統也儀禮傳曰為人後者孰後後太宗也漢宣起民間猶嗣孝昭光武中興猶考孝元孰謂入繼之主與為人後者異也宋范純仁所言蓋言恩義尤篤益當不顧私親非以生前為子者乃為人後身後入繼者不為人後也蕚言孝宗既有武宗為之子安得復為立後臣等謂陛下自後武宗而上考孝宗非為孝宗立後也人言武宗全神器授陛下何忍不繼其統臣等謂陛下既稱武宗為皇兄矣豈必改孝宗稱伯乃為繼其統乎又言禮官執者不過前宋濮議臣等愚昧實不出此葢程頤之議曰雖當專意于正統豈得盡絶於私恩故所繼主于大義所生存乎至情至於名稱統緒所係若其無别斯亂大倫殆為今日發也議上留中而特㫖召璁蕚及書于南京越十數日復降手諭令再集議以聞俊不得已與羣臣請加皇字以全徽稱帝又留之十餘日始報可二月華蓋殿大學士楊廷和罷自帝即位廷和以帝雖冲年性英敏自信可輔太平事事有所持諍及議大禮先後封還御批者四執奏幾三十疏帝常忽忽有所恨左右因乘間言廷和専恣無人臣禮帝意遂内移最後以諌阻内官提督蘇杭織造大忤帝㫖累疏乞休及是更議大禮求去益力許之言官交章請留不報三月罷禮部尚書汪俊以席書代之帝諭建室奉先殿側名觀徳殿祀獻帝主俊上疏力争帝不聴趣建室益急俊遂乞休帝怒責以肆慢允其去召席書代之書未至命侍即呉一鵬署部事既而命一鵬與中官賴義京山侯崔元迎主安陸一鵬言厯考前史並無自寢園迎主入大内者且安陸為先帝啟封之疆神靈所戀又陛下龍興之地王氣所鍾伏乞俯納羣言改題神主奉安故宫為百世不遷之廟其觀徳殿中宜别設神位香几以慰孝思奏入不納一鵬乃行及秋迎主至奉安於觀徳殿夏四月追尊興獻帝曰本生皇考恭穆獻皇帝上興國太后尊號曰本生聖母章聖皇太后擇日祭告郊廟大赦天下時編修鄒守益疏言陛下推崇本生業已尊為帝后今復加稱皇考去其始封之號直與正統無别不可以示後世又言厯觀前史如冷褒叚猶之徒當時所謂忠愛後世所斥為邪媚也師丹司馬光之徒當時之所謂欺謾後世所仰為正直也臣恐後之視今猶今視昔帝得疏大怒下詔獄拷掠謫廣德州判官已而修撰吕柟亦言大禮未正御史叚續陳相請正席書桂蕚罪吏部員外即薛蕙上為人後解鴻臚寺少卿胡侍言張璁等議禮之失俱下獄謫官鄒守益字謙之安福人吕柟字仲木髙陵人薛蕙字君采亳州人胡侍寧夏人五月謹身殿大學士蔣冕罷以石珤字邦彦玠之弟為吏部尚書兼文淵閣大學士預機務自楊廷和罷冕以首輔當國帝逐汪俊用席書召張璁桂蕚悉由中㫖追尊建室親自裁决不闗閣臣冕言有官守者不得其職則去臣備員内閣于朝廷事無所匡救溺職甚矣因連疏求罷帝以珤為廷和所不悦珤先為吏部尚書楊廷和有所不悦改掌詹事誥勅欲引以贊大禮乃聴冕致仕命珤入閣珤據理力爭持論堅確大失帝意六月以張璁桂蕚為翰林學士方獻夫為侍講學士先是蕚疏既上廷臣方具議璁復疏言今日之禮不在皇與不皇而在考與不考蕚又言陛下承祖宗大統執政乃無故任巳私為不道使陛下終身為無父人逆倫悖義若此猶可使與斯議哉二人疏同上帝故趣召之初議禮諸臣無力詆執政者至蕚遂斥為不道且欲不使議其言恣肆無忌朝士尤疾之既而獻帝已追尊本生皇考閣臣請停召命帝不得已從之二人已在道意大沮喪乃復合疏請與禮官面質且云本生對所後而言若不亟去此二字則雖稱皇考實與皇叔無異疏入帝復召二人比至都衆洶洶欲倣先朝馬順故事斃之于廷蕚懼不敢出璁越數日始朝恐有伺者出東華門走匿武定侯郭勛英五世孫家勛大喜約為内助時給事中張翀字習之潼川人等連章劾璁蕚及方獻夫席書諸人章下所司翀彚送刑部尚書趙鑑即列璁等罪狀上請私相語曰倘得愈㫖便撲殺之帝亷知之特命璁蕚為學士獻夫為侍講學士切責翀鑑學士豐熈字原學鄞人修撰舒芬楊慎字用修廷和子張衍慶編修王思等皆不願與璁蕚同列乞罷歸帝怒俱奪俸璁蕚以議禮驟貴于是閑罷失職武夫小吏皆望風希指抗論廟謨矣秋七月罷吏部尚書喬宇帝即位初求治甚鋭以字長吏部宇自為選郎即有人倫鑒及是鈐政一清起用林俊起刑部尚書俊時年已七十餘寓止朝房示無久居意彭澤起兵部尚書孫交字志同安陸人素為獻皇帝愛重帝久聞其名甫即位起戸部尚書皆海内重望頗委任之然帝性剛好自用宇所執漸不見聼其争大禮尤切積忤帝及是張璁桂蕚並為學士宇言内降恩澤先朝率施於佞倖小人士大夫一預其間即不為清議所齒况學士最清華而俾蕚等居之誰復肯與同列哉帝怒切責宇遂乞休許之林俊彭澤在部多所執持俊以言不見納澤為言路所攻俱乞歸惟孫交始終恩禮以年老致仕詔章聖皇太后尊號去本生字羣臣伏闕諫戍學士豐熙等於邉杖員外郎馬理字伯循三原人於廷帝召見羣臣左順門示以手勅言章聖皇太后命去本生字羣臣駭愕而張璁桂蕚復列上禮官欺罔十三事且斥為朋黨於是九卿詹事翰林給事御史六部大理行人諸司各上章争之皆留中不下尚書金獻民字舜舉綿州人少卿徐文華字用光嘉定州人倡言曰諸疏留中必改稱孝宗為伯考矣吏部右侍郎何孟春曰憲宗朝議慈懿太后𦵏禮姚䕫率百官伏哭文華門此我朝故事也楊慎曰國家飬士百五十年仗節死義正在今日編修王元正字舜卿盩厔人給事中張翀曰萬世瞻仰在此一舉有不力争者共擊之遂㑹羣僚九卿二十三人翰林二十二人給事二十人御史三十人諸司郎官吏部十二人户部三十六人禮部十二人兵部二十人刑部二十七人工部十五人大理寺屬十二人跪伏左順門有大呼髙皇帝孝宗皇帝者帝方齋居文華殿命中官諭之退不聴帝怒遣錦衣先執為首者豐熙張翀及御史余翺郎中余寛浙江臨海人黄待顯蒲田人陶滋相世芳安邑人大理正毋徳純南充人八人下獄楊慎等乃撼門大哭衆皆哭聲震闕廷帝益怒命盡録諸臣姓名時有不在列者其親故以不預義舉為嫌多為代書遂繋馬理等一百九十人於獄孟春等待罪越數日為首者戍邉四品以上奪俸五品以下予杖編修王相字懋卿鄞人等十有六人杖死自是衣冠喪氣璁蕚等勢益張武英殿大學士毛紀罷紀請宥伏闕諸臣罪帝怒傳㫖責紀要結朋奸背君報私紀乃上疏乞骸骨帝銜紀亢直允其去土魯番圍肅州命尚書金獻民都督杭雄字世臣世為綏徳衛總旗往禦之土魯番比嵗通貢朝廷待之如故亦不問巴雅濟事至是莽蘇爾忽以二萬騎圍肅州巡撫都御史陳九疇自甘州馳入城守禦奏聞於朝帝以獻民總制軍務充總兵官率師西討八月大同軍亂殺巡撫都御史張文錦初文錦以大同無險可恃乃度地築五堡參將賈鑑督役嚴卒皆怨堡成議徙卒戍之衆憚行鑑復趣之急遂為亂殺鑑并及文錦裂其屍出故總兵朱振於獄脇為帥事聞以蔡天祐字成之雎州人為僉都御史往撫之衆稍戢已而金獻民杭雄師過大同叛卒疑見討復亂命侍郎胡瓚字伯珩永平人都督魯綱統京軍三千往討叛卒洶洶拒守殺知縣王文昌圍代王府脅王奏乞赦王微服夜走宣府天祐請止京軍勿遣而瓚等已至楊和頃之總兵官桂勇令干户苖登擒斬首惡郭鑑等天祐函封送瓚請班師甫二日鑑父郭疤子復肆焚掠詔切責天祐召勇還京即以朱振代之疤子逃匿塞外明年春復潛入城天祐閉門索獲之及其黨三十餘人皆斬以狥衆始定自廿州軍亂朝廷處之輕諸邉卒頗無忌故復有是變席書以朱振不宜用詆政府皆中材無能定亂濟時因力薦楊一清王守仁入閣以賈詠臨潁人為禮部尚書兼文淵閣大學士預機務詠先為吏部侍郎及是遂晉尚書入閣九月更定大禮稱孝宗為皇伯考昭聖皇太后為皇伯母獻皇帝為皇考章聖皇太后為聖母尊稱由是遂定土魯番退金獻民等還陳九疇擊破土魯番衆斬塔濟廸音其分掠甘州者亦為總兵官姜奭所敗賊乃遁走獻民等至蘭州聞冦已退遂引還冬十二月起楊一清為兵部尚書總制三邉故相行邉自一清始一清自是凡三為總制温詔褒美比之郭子儀乙酉四年春三月仁壽宫災夏五月復轉陞官初王邦竒在武宗朝夤入錦衣搆害甚衆帝即位悉革傳陞官至是邦竒詭詞求復遂授錦衣衛試百户同時復官者九十餘人兵部尚書金獻民固争不聼邦竒素憾楊廷和彭澤未幾連搆大獄事詳後京師大雨雹作世廟初國子生何淵首請建世廟廷臣惡之出為平凉主簿屢次上官搒笞求内改帝擢為光禄寺署丞於是復申前議併請祀獻皇帝於太廟章下廷議席書率羣臣言天子七廟周文武並有功徳故立文武世室於三昭三穆之上獻皇帝追稱帝號末為天子淵妄為諛詞乞寢其奏不報張璁奏曰孝子之心無窮分則有限别立禰廟禮之得為者也臣昩死勸陞下為之入於太廟禮之不得為者也臣沬死勸陛下勿為書復三疏勸止帝遣中官諭書曰朕紹膺大統即以皇考為百世之室何不可而卿乃怯衆飾奸邪書知帝意不可回遂請於皇城内别立一廟詔可定名世廟後更為獻皇帝廟秋八月營仁壽宫南畿地震是嵗天下地震凡六十有三田州指揮岑猛叛詔都御史姚鏌字英之慈谿人討誅之廣西岑氏自洪武以來世為土知府田州思明𢎞治中猛與思明岑濬搆兵濬攻䧟田州猛遁走總督潘蕃字廷芳崇徳人討誅濬朝議田州思明復改設流官降猛千户徙福建劉大夏所議已見前正徳初猛賂劉瑾以同知攝府事撫輯遺衆覬復祖職後從征江西流賊所至剽掠為民害尋以賊平論功進指揮同知非猛本意頗怨望又自恃兵力數侵奪鄰境巡撫都御史盛應期字思徴呉江人上猛反狀請討㑹應期以他事去詔鏌往代鏌調永順保靖兵令都指揮沈希儀字唐佐貴縣人統之進討用希儀計結猛婦翁岑璋為内應璋因其女失愛藉以報猛斬猛長子邦彦復誘猛殺之以其首獻田州平後遂改為流官冬十二月大禮集議成頒示天下閏月乙邜朔日食丙戌五年春二月定有司乆任法吏部尚書廖紀字時乘東光人言邇者首令遷轉太頻政多苟且宜遵舊制俟九年考滿有政績者乃遷從之夏五月召楊一清復入閣席書與費宏有隙張璁桂蕚亦力排宏先是御史吉棠請召還一清以消朋比帝因議禮故欲藉一清以箝衆口命以吏部尚書入閣初大禮議起一清方居家見張璁疏寓書門人喬宇曰張生此議聖人復起不能易也聞席書禮部之命勸書早赴召以定大議璁等既驟顯頗引一清帝亦以一清老臣恩禮加渥焉秋九月章聖皇太后有事于太廟世廟世廟既成章聖太后欲謁見帝詢張璁桂蕚俱援廟見禮言宜先見太廟次謁世廟費宏楊一清等爭之不得石珤復上疏極諌言我朝家法后妃入宫未有無故復出者太廟尊嚴非時享祫祭天子亦不輕入况乃后妃璁輩所引廟見禮今奉先殿是也聖祖神宗行之百五十年何至今日忽倡為異議且隂陽有定位不可侵越陛下為天地百神之主致母后無故入太廟坤行乾事隂侵陽位不可之大者也帝不聼丁亥六月春二月小王子宼宣府小王子宼宣府水地莊再入太白陽堡在龍門縣西北即唐嬀州白陽鎮叅將王經開山戰死所部殺殆盡時小王子最富㩖控弦十餘萬多蓄貨貝其後稍厭兵徙幕東方號曰土逹二黙特分諸部落在西北邉者其從父行濟農諳部最疆㨿有河套時入冦邉囊小王子徒幕在十一年按濟農舊作古今改費宏石珤罷張璁桂蕚由即署入翰林驟至詹事望為經筵講官典兩京鄉試教習庻吉士宏毎示裁抑璁蕚大恨毁宏于帝及璁居兵部宏欲用新寕伯譚綸字子理忠曽孫掌奮武營璁遂劾宏刦制府部宏連疏乞休帝雖慰留然終不以譴璁蕚于是行人王邦竒承璁蕚指上書訐故大學士楊廷和邦竒指廷和次子主事惇及婿修撰金勛鄉人侍讀葉桂章與彭澤弟冲交闗請囑俱逮下詔獄并誣宏及珤為奸黨璁蕚将興大獄給事中楊言抗章曰故輔廷和有社稷之勲閣臣宏珤乃百寮之表邦竒心懐怨望文飾奸言詬辱大臣熒惑聖聴宜罪帝大怒逮言親鞫午門備極五毒卒無撓詞已而言謫官獄亦尋解楊言字惟仁鄞人宏珤求去益力帝許宏馳驛而責珤歸怨朝廷失大臣誼一切恩典皆不予歸装襥被車一兩而已都人嘆異謂自來宰臣去國未有若珤者珤清介端亮繼楊廷和蔣冕毛紀後以彊諫罷政自是迄嘉靖季宻勿大臣無進逆耳之言者矣珤歸後踰年卒謚文隠召謝遷復入閣費宏舉遷自代楊一清欲阻張璁亦力舉遷帝遣行人齎手勅即家起之命撫按官敦促上道遷不得已拜命三月前少保謹身殿大學士劉健卒謐文靖健自劉瑾誅後復原官致仕聞武宗數事巡逰輒涕泗不食曰吾負先帝帝登極屢賜存問比之司馬光文彦博至是卒年九十有四贈太師健器局峻整學問深邃在時同列李東陽以詩文引後進海内士皆抵掌談文健若不獨教人治經窮理其事業光明俊偉明世輔臣鮮有比者以翟鸞字仲明其先諸城人後家京師為吏部侍郎兼翰林學士入内閣預機務帝意欲相張璁命廷臣舉素有才望者再推而璁不與㑹中官多譽鑾遂用之楊一清以鑾望輕請用羅欽順字允升泰和人吳一鵬不聼夏五月丁丑朔日食以羅欽順為吏部尚書辭不拜欽順見張璁桂蕚用事屢召不起家居杜門潛心格物致知之學所著有困知記至是卒贈太子太保諡文荘總制兩廣軍務王守仁撫降田州蠻田州既設流官州人皆不樂岑猛黨盧蘇王受等糾衆為亂䧟州城姚鏌不能定詔起守仁兵部尚書督兩廣軍討之守仁疏言田州地隣交趾猺獞出沒宜仍設土官俾為屏蔽遂與廵按御史石金黄梅人定計招撫散遣諸軍祗留永順保靖兵一千解甲休息蘇受初求撫不得至是率衆乞降守仁諭以朝廷威徳蘇及其衆皆踴躍羅拜乃囚首自縳赴軍門請命守仁數二人罪杖而遣之隨入營撫定其衆因上言岑氏世効邉功宜存其祀請割田州地别立一州以岑猛次子邦相為吏目署州事設廵檢司十九以蘇受等任之並受約束于流官報可田州以安六月詔科道官互相糾劾時京察拾遺桂蕚為南御史所論乃上言楊廷和私黨猶在言路昔憲宗初年命科道于拾遺後互相紏劾請舉行如制吏部侍郎何孟春言憲宗無此詔蕚被論圖報復不可信帝終用蕚言趣速舉孟春以御史儲良材等四人名上帝獨黜良材而特㫖斥鄭自璧字采東祥符人等數人自璧素敢言權倖側目或中以蜚語故被斥已而良材辨疏力詆廷和指孟春為奸黨蕚奏復其官秋八月覆治妖賊李福逹獄罷謫刑部尚書顔頤夀等四十六人福逹山西崞縣人初坐妖賊王良李鉞黨戍山丹衛明置今為縣屬甘州府逃還更名午為清軍御史所勾再戍山海衛明置今為臨榆縣屬永平府復逃居洛川姚秦縣今屬鄜州以彌勒教誘愚民邵進禄等為亂事覺進禄伏誅福逹先還家得免更姓名曰張寅挾重貲徃來徐溝金縣今屬太原府間輸粟得太原衛指揮用黄白術干武定侯郭勛勛大信幸其仇薛良訟於廵按御史馬録字君卿信陽人録問得實檄洛川父老雜辨之益信勛為移書祈免録不從偕廵撫江潮具獄以聞且劾勛庇奸亂法章下都察院覆如録奏詔責勛對狀勛懼乞恩因為福逹代辨帝置不問㑹給事御史等交章劾勛勛再自訴以議禮觸衆怒為言帝心動勛復乞張璁桂蕚為援璁蕚素惡廷臣攻已亦欲借是舒宿憤乃合謀騰蜚語謂諸臣内外交結借端䧟勛將漸及諸議禮者帝深入其言而外廷不知攻勛益急帝愈疑命取福逹等至京師下三法司訊既又命文武大臣更訊之皆無異詞帝大怒将親訊以楊一清言而止仍下廷鞫頤夀等不敢自堅改妖言律帝猶怒乃反前獄扺薛良誣告罪帝以罪不及録怒甚命璁蕚方獻夫分署二法司事盡下尚書頤夀左都御史聶賢長夀人大理卿湯沐字新之江隂人等于獄嚴刑推問璁蕚等復請逮給事御史前劾勛者亦并繫獄于是大肆搒掠録不勝刑自誣故入人罪璁蕚等乃定爰書言寅非福逹録等恨勛搆成寃獄因列上諸臣罪名帝悉從其言謫戍極邊遇赦不宥者五人山西布政使李璋按察使李珏等謫戍邉衛者七人給事中劉𤦺御史程啟充等皆前劾勛者𤦺字廷珍洛陽人啟充字以道嘉定州人黜為民者十一人都御史聶賢給事中王科等科亦前劾勛者科字一卿涉縣人革職閒住者十七人尚書顔頤壽廵撫江朝太僕卿汪元錫光禄卿余才等元錫與才于廷臣㑹訊時偶語曰此獄已得情何用再鞫偵者告蕚以圍亦逮問論罪其他下廵按逮問者又五人副使周宣等録以故入人死擬重辟獻夫力爭乃減死永戌烟瘴地遇赦不宥薛良抵死衆證皆戍張寅還職帝以璁萼等平反有功賜二品服俸給三代誥命遂編欽明大獄録頒示天下方璁蕚等反福逹之獄舉朝雖不直璁蕚而以寅福逹姓名錯互亦或疑之至四十五年正月四川大盗蔡伯貫就擒自言學妖術于山西李同所司􅀈山西捕同下獄同供李午之孫其父曰大禮世習白蓮教惑衆侣亂與大獄録姓名無異由是福逹獄始明賈詠罷馬録之被逮也詠遺書相慰璁蕚等搜録箧得之帝責詠詠引罪致仕去九月以桂蕚為禮部尚書兼翰林學士故事尚書無兼學士者自蕚始冬十月以張璁為禮部尚書兼文淵閣大學士預機務璁自釋褐至入閣僅六年時楊一清為首輔翟鑾亦在閣帝待之不如璁甞諭璁朕有宻諭毋泄朕與卿帖悉親書璁因引仁宗賜楊士奇等銀章事帝從其言賜之璁深恨諸翰林㑹侍讀汪佃講洪範不稱㫖璁請自講讀以下量材外補于是改官及被黜者二十餘人并罷選庻吉士翰苑為空戊子七年春正月逮前都御史陳九疇於獄謫戍極邉削奪前尚書金獻民彭澤職初土魯畨敗退都指揮王輔言莾蘇爾及伊蘭俱死礟下九疇以聞其實兩人未死帝因疑之獻民至蘭州時㓂退已久獻民再復奏㨗帝亦頗知其事事皆在三年然皆未發也㑹百户王邦竒訐楊廷和彭澤言哈宻失國番賊内侵由澤賂番求和廷和論殺沙呼實所致詞連九疇獻民部議猶未覆桂蕚知帝方恕邉臣欺罔因請追論前事意欲并坐廷和帝降手詔數百言遣官逮九疇及獻民下獄必欲置九疇於死刑部尚書胡世寧言九疇誤信部校之言罔報賊死罪固難免然奮身破賊保全肅州孤城功亦足扺帝意稍回乃减死戍極邉獻民澤皆落職廷和得免璁蕚等既反李福逹定案復搆興封疆之獄搢紳無不側目而當時又有陳洸一事洸朝陽人素無行以給事中奉使遽回籍家居踰二年與知縣宋文翰不相能命其子桂録訐元翰謫戍元翰摭光罪及帷薄事刋布之名辦寃由是洸不齒于清議已而洸赴京復命方在道聞已外補僉事大恚先是洸嘗言獻帝不可稱皇及是見璁蕚輩驟顯乃以舊官上疏言璁等議是亟宜去本生之稱侍郎何孟春言洸已外補猶冒舊銜宜究問帝不聼復洸故官洸遂劾大學士費宏尚書吳一鵬等為邪黨璁蕚大悦遂引以撃異己于是御史藍田特疏論洸且封上元翰辦寃禄都察院請觧洸任回籍聼勘帝不得已從之遣刑部郎中葉應驄及錦衣千户李經偕徃應璁恐經受賄與焚香誓天㑹廵按御史態蘭等雜治具上洸罪狀至百七十二條除赦前及瞹昧者勿論當論者十三條罪惡極宜斬妻離異子柱絞洸懼亡詣闕求救于蕚帝方持應璁䟽未下蕚要璁共奏謂洸議禮臣為法官所中帝入其言得免罪為民尋并原其妻子獄定已久㑹馬録等得罪洸意桑此故案可翻也上言訐應璁等蕚因為洸訟寃遂逮應驄元翰及洸九卿㑹錦衣衛廷訊是日黄霧四塞獄弗竟次日又大風㧞木詔停刑乃當應驄按事不實律斥為民洸復冦帶猶憾應驄不已越數年又令人誣奏應璁勘獄時酷殺無辜二十餘人按驗無實帝特謫應驄戍遼東是獄始終八年凡攻及治洸獄者無不得畢逮捕至數百人天下益惡璁蕚輩恣横羞言議禮臣矣藍田即墨人葉應驄字肅卿鄞人二月起王瓊為兵部尚書總制三邊瓊在戍久桂蕚等言瓊前攻楊廷和故羣臣爭起排之今邊陲急人廷臣才實出瓊下帝乃復瓊官代王憲字維綱東平人總制三邊三月大學士謝遷罷遷之赴召也年已七十有九居位數月力求去帝待之愈厚天寒免朝叅除夕賜詩及是以病告歸遷學術純正秉節直諒始終如一歸後三年卒于家贈太傅諡文正夏六月頒明倫大典於天下削前華盖殿大學士楊廷和等籍初大禮集議成張璁謮彚為全書桂蕚請備書大臣進退百官譴謫以志明斷至是帝自製文序名曰明倫大典刋布天下追論前議禮諸臣罪削廷和籍蔣冕毛紀毛澄汪俊喬宇林俊皆奪職斥何孟春夏良勝為民時毛澄林俊已前卒蔣冕及汪俊喬宇何孟春後俱卒于家毛紀里居久之以恩詔叙復帝亦忘其議禮時事再遣官存問卒時太保謚文簡夏良勝嘗輯其在吏部時章奏名曰銓司存藁凡議禮諸疏具在後為仇家所發再下獄謫戍遼東卒隆慶初諸臣皆復官追贈蔣冕謚文定林俊諡貞肅汪俊諡文莊喬宇諡莊簡何孟春諡文簡秋七月王守仁平㫁藤峡猺自韓雍去兩廣㫁藤峡猺復熾上連八塞今廣西思恩府上林縣北有周安鎮明時為八塞之一八塞者恩吉周安古邜古蓬古鉢都者羅黒刹丁後又益龍哈咘咳為十塞猺獠占據於此下通仙䑓花相諸峒在潯州府平南縣北迴環相屬盤據三百餘里郡縣罹害者數十年守仁平田州還兩江左右江也父老遮道言狀盧蘇王受亦請立功自贖守仁乃留南寕故為罷遣諸兵示不再用伺賊不備潛軍突進連破牛腸六寺等塞在藤峽迤西循横石江亦曰横水江在潯州府武宜縣東南栁州右江上源諸水至此合流而東即大藤峡而下攻克仙䑓花相諸賊復令蘇受搗平八塞於是藤峡復寕初守仁赴廣西桂蕚諷令乗機取交阯守仁辭不應蕚大恚至是斥守仁征撫交失賞格不行冬十月皇后陳氏崩謚悼靈皇后後改謚孝㓗十一月立妃張氏為皇后土魯番㓂肅州王瓊請令入貢詔許之遂棄哈密初陳九疇在甘肅力言土魯畨不可撫宜閉闗絶貢專固邊防帝可之因拘其前後使數十輩及九疇得罪瓊督三邊悉遣還所繋且許通貢番酋益驕㑹其黨伊蘭本庫森人㓜為番所掠長而黠健阿里妻以妹握兵用事為西陲恵庫森舊作曲先今改獲罪内附遂引衛拉特犯肅州為逰擊彭濬所敗乃復遣使求貢請以哈密城易伊蘭瓊疏請許之兵部尚書胡世寧言番酋變詐多端請勅瓊毋輕許通貢以弛邉備至哈密三立三絶不必興復伊蘭反正歸順不可遣還帝深然其言命瓊熟計詳處瓊再䟽申前請張璁等皆主瓊議遂從之而獨留伊蘭不遣自是土魯番許通貢而哈密城印及巴雅濟存亡遂置不問已而莽蘇爾桀傲愈甚朝廷不能罪然自伊蘭既降其勢漸孤河西稍獲休息哈密後為沙巴逹子彌爾瑪哈穆特所有服屬土魯番比嵗一貢迄隆慶萬厯朝不絶非忠順王苗裔矣穆爾瑪哈穆特舊作米兒馬黒木今改己丑八年春正月兵部尚書兼左都御史新建伯王守仁卒隆慶初追謚文成守仁病篤乞骸骨舉鄖陽廵撫林富莆田人自代不俟命竟歸行至南安卒䘮過江西軍民無不縞素哭送者桂蕚劾其擅離職守詔停世襲䘏典俱不予守仁天姿英異㓜時謁上饒婁諒與講朱子格物大㫖還家曰端坐讀五經亦泛濫二氏學數年無所得及謫龍場窮荒無書日繹舊聞始悟格物致知當返諸心不當求諸事物喟然曰道在是矣故其為教専以致良知為主從逰弟子甚衆最著者餘姚錢徳洪山隂王畿學者稱之婁諒字克貞錢徳洪名寛以字行王畿字汝中二月以桂蕚為吏部尚書兼武英殿大學士預機務萼素與張璁比及同居政府遂復相失河南襄陽大饑廵按湖廣御史張禄平原人繪圖以獻帝憫之詔有司亟賑時廣東僉事林希元字懋貞晉江人上言救荒有二難曰得人難審户難有三便曰極貧便賑米次貧便賑錢稍貧便轉貸有六急曰垂死急饘粥疾病急醫藥病起急湯米既死急募瘞遺棄孩穉急收養輕重繫囚急寛恤有三權曰借官錢以糶糴興攻作以助賑借牛種以通變有六禁曰禁侵漁禁攘盜禁遏糴禁抑價禁宰牛禁度僧有三戒曰戒遲緩戒拘文戒遣使因輯為書以上詔有司舉行夏六月前少師華葢殿大學士楊廷和卒隆慶初追諡文忠廷和卒後帝問李時字宗易任邱人太倉所積幾何對曰可支數年由陛下初年詔書裁革冗員所致帝慨然曰此楊廷和功不可沒也廷和性沉静詳審初選翰林不好為聲律華藻之學惟考究掌故民瘼邉事及一切法家言鬰然負公輔望入閣後李東陽謂曰吾於文翰頗有一日之長若經濟事須歸介夫及武宗之終卒安社稷者廷和力也人以東陽為知言秋八月張璁桂蕚罷九月召璁還楊一清罷璁蕚與楊一清積不相能給事中孫應奎字文宿洛陽人疏論一清及璁蕚優劣乞鑒三臣賢否以定去留其同官王準字子推世籍秦府儀衛司陸粲字子餘長州人復相繼劾璁蕚引用私人日圖報復威權既盛黨與復多不亟去之將為社稷患帝感悟立罷璁蕚霍韜攘臂言曰張桂行勢且及我乃疏詆一清力為璁蕚辨雪謂陸粲之劾實一清嗾之臣與璁蕚俱以議禮進璁蕚去臣不得獨留帝即召璁還貶準典史粲驛丞霍韜再疏詆一清帝令法司㑹廷臣雜議刑部尚書許讚字廷美進之子請削一清籍璁故三上密疏引一清贊禮功乞寛假實以堅帝意俾速去帝果令一清致仕冬十月癸亥朔日食戍刑部員外郎邵經邦字和徳仁和人於邊衛經邦疏言日食於正陽之月質諸小雅變象懸符今得毋有皇父其人乎邇者張璁桂蕚已罷尋以議禮功復召輔政人言莫之恤天變可不畏哉疏入帝大怒立下鎮撫司拷問戍鎮海衛明置今省故城在福建漳州府漳浦縣東北除外戚世封著為令從方獻夫請也獻夫言外戚之封不當世及厯引漢唐宋事以證帝善其言下廷臣議由是外戚永絶世封十一月復召桂蕚入閣張璁既召還儒士蔡圻知帝必復蕚因疏頌蕚功請召之帝乃賜敕令撫按官趣上道蕚還朝盡復所奪官仍恭機務庚寅九年春二月皇后親蠶于北郊都給事中夏言疏請皇后親蠶以為古者天子親耕南郊皇后親蠶北郊禮本並行不宜偏廢帝詔禮官詳考古制以聞大學士張璁等因請建先蠶壇于安定門外皇后行親蠶禮既而以壯郊出入未便命于西苑行之夏四月楊一清卒一清故與太監張永善至是永叔家奴訐永曽盗庫金及歿永弟容多以饋一清求作墓誌詔法司推問張璁從中主之坐一清受賕奪職一清大恨曰老矣乃為儒子所賣疽發背死一清博學善權變尤曉暢邉事羽書旁午一夕占十疏悉中機宜晚為璁蕚所軋不穫以恩禮終殁後數年始復故官尋追諡文五月作四郊帝既定明倫大典益覃恩制作之事以天地合祭為非禮洪武初李善長等建議分祭天地於南北郊冬至則祀昊天上帝于丘以大明夜明星辰太嵗從夏至則祀皇地祗于方丘以五嶽五鎮四海四凟從太祖如其議行之十年春太祖感齊居隂兩覽京房災異之説謂天地猶父母分祭異䖏情有未安乃作大祀殿于南郊每嵗孟春合祀天地列朝遵之至是帝以上帝皇地祗合祭一處非古禮與張璁言之欲分建二郊并日月為四張璁不敢决㑹夏言請舉親蠶禮帝以南北郊之説與分建二郊義合因令璁諭言陳郊議言乃上疏以為國家合祀天地舉行不于長至而于孟春俱不合古典宜令羣臣博考詩書禮經所載及漢宋諸儒之定論太祖國初之舊制陸下稱制而裁定之此中興大業也詹事霍韜謂分祀説見周禮王莽偽書不足據言復上疏以為周禮一書于祭祀為詳故宋儒葉時之言曰郊丘分合當以周禮為據朱子亦以是書為周公輔導成王垂法後世何可誣以為偽因遂劾韜帝大怒下韜獄于是禮部集上羣臣所議主分祭者都御史汪鋐婺源人等八十二人主分祭而以慎重成憲及時未可為言者大學士張璁等八十四人主分祭而以山川壇為方丘者尚書李瓉等二十八人主合祭而不以分祭為非者尚書方獻夫等二百六人無可否者英國公張崙懋之孫等九十八人帝特降璽書奬言賜四品服俸卒従其議分建圜丘方丘于南北郊以二至日祭建朝日夕月壇于東西郊以春秋分祭祈榖南郊則以正月上辛行之言又贊成二郊配享議洪武時郊祀以仁祖配建文即位改奉太祖洪熈以後太祖太宗並配及是言上疏云太祖太宗並配父子同列稽之經㫖未能無疑臣謂周人郊祀后稷以配天我大祖足當之宗祀文王于明堂以配上帝我太宗足當之禮成集議以為二祖配享百有餘年以為輕改帝降勅諭欲于二至日奉太祖配南北郊孟春奉太宗配上帝于大祀殿言再疏賛之乃定議南北郊太祖獨配孟春大祀殿太祖太宋並配自是言大䝉帝眷時帝又議建雩壇于夏行大雩禮議太社太稷以句龍后稷配議祀帝社帝稷于西苑議祀髙禖之神于皇城東雖皆命下禮官多以獨斷行之秋九月罷雲南鎮守中官冬十一月更定孔廟祀典尊孔子曰至聖先師張璁上言先師祀典有當更正者叔梁紇乃孔子之父顔路曽晳孔鯉乃顔曽子思之父三子配享廟廷紇及諸父從祀兩廡聖賢之心豈安請于大成殿後别立一堂祀叔梁紇而以顔路曽晳孔鯉配之帝以為然因言聖人尊天與尊親同今籩豆十二洪武舊制籩豆用十成化中以尚書周洪謨言増為十二牲用犢全同祀天儀亦非正禮其諡號章服洪武仍元之舊稱大成至聖文宣王冕十二旒服十二章悉宜改正璁縁帝意言孔子宜稱至聖先師不稱王祀宇宜稱廟不稱殿宜用木主其塑像應毁塑像始于唐開元八年籩豆用十樂用六佾配位公侯伯之號宜去止稱先賢先儒其從祀申黨公伯寮秦冉等十二人宜罷申黨即申棖後禮官儀去黨存棖不在十二人之數其顔何荀况戴聖劉向賈陸馬融何休王肅王弼杜預吳澄俱罷林放蘧瑗等六人後禮官議林放蘧瑗外又有盧植鄭衆鄭元服䖍范共七人祀于其鄉后蒼王通歐陽修胡瑗蔡元定宜從祀帝皆從之時編修徐階獨條不可不改五不必改者三詞甚辯帝怒謫階于外階字子升華亭人乃御製正孔子祀典說宣付史館初洪武時司業宋濓請去像設主禮儀樂章多所更改太祖不恱謫濓官成化間少詹程敏政嘗謂馬融等八人宜斥給事中張九功并請罷荀况公伯寮等而進后蒼王通為周謨所抑而止至是璁議毁像盖用濓説先賢去留畧如九功言其進歐陽修則以濮議故也叔梁紇本祀殿西璁謬謂兩廡也以動帝聼其建廟雖當亦縁附㑹獻皇廟而行之始祀昊天上帝于南郊禮成大赦辛卯十年春正月祈穀于大祀殿禮畢帝終以太祖太宗並配為不然因諭張璁嗣後大報祈穀但奉太祖配尋又親定祈穀儀注改用驚蟄節明年啟蟄届帝疾不能親乃命武定侯郭勛代至十八年改行于大内之元極寳殿不奉配遂為定制更定廟祀遷徳祖于祧廟初太祖定廟祀孟春特享羣廟各南向三時祭于徳祖廟序用昭穆後罷特享四孟歳暮俱以昭穆序北京既建廟制一如南京及憲宗升祔九室已備徳懿熙仁四祖太祖太宗及仁宣英三宗用禮官議祧懿祖孝武繼祔祧熈仁二祖獨德祖以始祖不祧毎時享太祖位猶東向帝欲更定之乃先於去年春復行特享禮令祠官于殿内設帷幄如九廟位皆南向各奠獻如儀至是遂遷德祖主于祧廟奉太祖主于殿正中七宗以序進遷于是太祖始正南向位而德祖不復與時享矣桂蕚罷蕚初鋭意功名不恤物議及再召還氣懾不敢復縱至是以病乞歸未數月卒蕚性狠愎為知縣時悻悻使氣屢為上官所辱既得志報復無虗日又好排異己凌虐周官議禮議獄搆害不下數十百人三月復罷四川鎮守中官帝既罷雲南中官至是四川繼之尋浙江湖廣福建兩廣及獨石萬全永寕皆罷凡内臣之為鎮守者先後撤除殆盡云夏四月禘于太廟帝既正太祖位向欲復古禘祭侍讀學士夏言帝欲輯郊禮為成書擢言侍讀學士充纂修官獻禘議以為三代而下欲如虞夏之禘黄帝啇周之禘帝嚳譜諜難考宜為虚位以祀庻曠典復行中允廖道周字鳴吾蒲圻人上言皇姓為顓頊之裔宜禘顓頊帝命廷臣集議咸謂稱虚位者茫昩無據尊顓頊者世逺難稽廟制既定高皇帝為始祖當禘徳祖帝卒從言議乃于太廟設虚位以帝皇初祖南向奉太祖配西向行禮如南郊儀定以丙辛歳一行五月始祀皇地祗于方澤六月雷震午門秋七月張孚敬罷孚敬即璁以犯帝嫌名請改帝手書賜之夏言恃帝眷數以事訐孚敬孚敬衘之與太常卿彭澤此又一彭澤南海人以議禮進用搆䧟行人司正薛侃字尚謙揭陽人欲以傾言廷鞫事露帝斥其忮罔令致仕去時侃上疏請擇親藩賢者居京師以待皇嗣之生帝怒下侃獄究交通主使者侃先曾以疏草示澤澤與侃及言俱同年生澤素附孚敬而孚敬方憾言黙計儲副事觸帝怒必興大獄誣言同謀可禍也紿侃藁示孚敬因報侃曰張公甚稱善當從中贊之敬孚乃先録侃藁以進謂出于言請勿先發以待疏至帝許之侃猶豫澤頻趣之乃上及廷鞫拷掠備至侃獨自陳澤挑使引言侃瞋目曰疏我自具趣我上者爾也爾謂張少傳許助言何與給事中孫應奎等揖孚敬避孚敬怒應奎等疏聞并並下言等獄再鞫具得其實乃釋言等侃為民澤戍邉八月升安陸州為承天府廵檢徐震奏于安陸建京師禮部尚書李時等駁其非制遂改州為承天府設鍾祥縣為府治先是尊崇禮定帝名獻皇帝陵曰顯林已而錦衣百户隨全等請遷顯陵北𦵏天夀山工部尚書趙璜力斥其謬席書亦再集廷臣議已之至是光録寺厨役王福等復以為言李時極諫不可事乃寢趙璜字廷實安福人九月以李時為禮部尚書兼文淵閣大學士預機務自張桂與費宏楊一清相傾軋讙囂不已孚敬罷翟鑾獨秉政者兩月時入兩人皆遜順無齟齬政府稍寧帝幸西苑先是西苑宫殿成宴羣臣以落之及是帝御無逸殿召李時坐講無逸篇翟鑾講豳風七月詩武定侯郭勛及九卿翰林俱入侍講畢帝退御豳風亭賜晏以夏言為禮部尚書時士大夫多惡張孚敬恃言抗之言既以開敏結主知又折節下士大得聲譽朝廷制作一决于言閣臣李時翟鑾取充位而已冬十一月召張孚敬復入閣孚敬還朝夏言益用事孚敬亦不能專恣如曩時矣十二月戍監察御史喻希禮麻城人石金于邊衛時方修醮祈嗣希禮乞赦免議禮議獄得罪諸臣帝大怒曰希禮謂朕罪諸臣致遲嗣續邪命所司恭議以聞未上金復言之二人並謫戍邊衛壬辰十一年夏四月復常遇春李文忠鄧愈湯和世爵遇春後封懐逺侯文忠後封臨淮侯愈後封定逺侯和後封靈璧侯于是開平岐陽寧河東甌四王復延世緒五月以方獻夫為吏部尚書兼武英殿大學士預機務先是獻夫以吏部尚書去位既而有詔召還獻夫潛入西樵山名在廣州府南海縣西南以疾固辭使命再至乃就道以故官入閣秋八月彗星見東井芒長丈餘掃太㣲垣及角宿天門凡一百十有五日乃滅編修楊名字實卿遂寜人應詔上言汪鋐小人之尤郭勛奸回之首而陛下用之是偏於喜也建言諸臣譴罰已乆未䝉收録是偏于怒也且工作屢興財力並竭又崇信真人邵元節貴溪人龍虎山上清宫道士不稽之言設醮内府命左右大臣奔走供事此皆聖心之偏蔽帝怒下獄戍邊時南京御史馮思亦上疏以張孚敬為根本之彗汪鋐為腹心之彗方獻夫為門庭之彗三彗不除庻政終不可理帝得疏大怒逮下詔獄論死比朝審鋐當主筆東向坐恩獨向跪鋐令卒拽之向已恩起立不屈因與鋐互相詬詈夏言等解之乃止及出士民觀者如堵皆嘆曰是御史非但口如鐡其膝其膽其骨皆鐡也因稱四鐡御史恩子行可年十三伏訟寃日夜號呼長安街乞救無敢言者乆之乃刺臂血書疏自縳下請代父死詞極哀帝覧之惻然令法司再議恩遂遣戍雷州後遇赦還行可以孝行旌尋舉鄉薦馮恩字子仁松江華亭人張孚敬罷帝以星變心疑大臣擅政孚敬因求罷給事中魏良弼字師説新建人劾孚敬專横竊威福秦鰲字子元崑山人復詆其妬賢病國二疏並入帝為罷孚敬癸巳十二年春正月廵撫河南都御史吴山吴縣人獻白鹿羣臣表賀自後諸瑞異踵至百寮表賀遂為常典召張孚敬復入閣帝復思孚敬遣鴻臚召還已而彗復見畢昴間孚敬乞避位不許三月釋奠于先師冬十月大同兵亂殺總兵官李瑾小王子屯大同塞外瑾督役浚濠急役卒王福勝王保等數十人鼔噪殺瑾廵撫潘倣洛陽人奏瑾激變宜撫帝命總制劉源清字汝澄東平人討之師次陽和倣捕殺叛軍數人繫王保等以獻請班師源清懲前胡瓚事不欲己遣禆将入城索賊賊復夜噪殺千户張欽出前恭將黄鎮指揮馬昇楊麟于獄奉為帥與官軍迎戰源清等亦晝夜攻圍賊潛出塞誘外宼為助宼兵與官軍殺傷相當知叛卒不足頼大詬而去源清請增兵置帥禦㓂而已得專事攻城帝不許源清仍百道攻之死者相籍帝怒奪其職以張瓚字廷獻倉州滄州人官代之瓚未至郎中詹榮字仁甫山海衛人督餉大同察馬昇楊麟無逆至許宥其死俾自効昇等遂結心腹擒斬首惡黄鎮等以獻亂乃定已而瓚至麾兵退二舍鼓吹入城大集文武将吏置酒髙㑹賞有功者而還下建昌侯張延齡于獄削昌國公張鶴齡爵初興國太后入宫皇太后猶以藩妃禮遇之帝頗不悦及帝朝皇太后待之又倨㑹延齡為人所告正徳中日者曹祖告延齡謀不軌下獄鞫之祖仰藥死獄無左証遂觧指揮司聰負延齡金索之急遂與天文生董㫤子至謀訐祖前所首事脅廷齡賄延齡幽殺聰而折所負劵至發其事奏上之延齡又嘗以私憾殺婢及僧池又僭侈踰制及是并發遂欲坐以謀逆族其家皇太后窘廹無所出欲為請帝謝不見張孚敬言延齡守財虜耳何能反法司治延齡前事坐違制殺人論死及秋盡當論孚敬又上言皇太后春秋髙卒聞延齡死萬一不食有他故何以慰敬皇帝在天之靈帝恚以危語怵孚敬帝曰自古彊臣令君非一若今愛死囚令主矣當悔不從楊廷和事敬皇帝邪孚敬仍力爭以故終昭聖太后世得長繫鶴齡以延齡故削爵謫南京指揮甲午十三年春正月廢皇后張氏立妃方氏為皇后應天江寧人夏四月削給事中張選字舜舉無錫人籍時帝乆不親祀事孟夏時享復遣郭勛攝選疏諫忤㫖廷杖八十死而復甦遂削籍方獻夫罷獻夫好飾恬退名而屢為言官所劾中恧雖執大政氣厭厭不振又以帝恩威不測居職二載三疏引疾帝優詔許之初獻夫縁議禮進以司馬光與王莾同論為人所痛詆及與璁蕚其事持論頗平恕以此人不甚惡之家居十年卒六月南京太廟災時帝欲更營太廟命夏言等相度規制㑹南京太廟災帝遂用言等議言㑹張璁等議曰京師宗廟行将復古而南京太廟遽罹回禄皇天睿徳之意祖宗啟後之靈可以黙㑹矣帝善其言南京太廟不復建其遺趾倣壇墠意築周垣䕶之歳時香火并于南京奉先殿而益趣營新廟御批厯代通鑑輯覽巻一百八

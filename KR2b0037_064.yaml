front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷六十五唐昭宗皇帝壬戌天復二年春正月以韋貽範字垂憲京兆人同平章事
  hash: sha256:c879f432ca8e5f60e3f78cd0241b4e097557b42721c89c53dd066ee694293500
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_064-1a, image: WYG0337/WYG0337-0537a.png}
body:
  text: 貽範因李茂貞薦由刺史拜給事中纔閲旬遂相上嘗與李茂貞及宰相中尉宴酒酣茂貞及韓全誨亡去上問巡範朕何以巡幸至此對曰臣在外不知上曰卿既以非道取宰相當于公事如法若有不可必凖故事因怒目視之微言曰此賊當杖之二十貽範屢持杯獻上上不即持貽範舉杯直及上頤二月盜發簡陵懿宗陵注見前三月汴兵圍晉陽先是河東將李嗣昭周徳威攻克慈隰二州進逼晉絳朱全忠還河中遣兄子友寧字安仁全忠兄存之子及氏叔琮擊之汴軍横陳十里河東軍不過數萬深入敵境衆心恟懼及是徳威戰敗河東軍潰友寧叔琮乘勝取慈隰汾三州遂圍晉陽時嗣昭徳威雖收餘衆得還而城中兵尚未集叔琮攻城甚急克用召諸將議走保雲州李存信欲入北虜嗣昭徳威及李嗣源皆曰兒軰在此必能固守王勿為此謀動摇人心劉夫人亦曰王常笑王行瑜輕棄其城死於人手奈何效之且一足出城則禍變不測塞外可得至邪克用乃止居數日潰兵復集軍府浸安嗣昭嗣源數將敢死士夜入叔琮營斬首捕虜汴軍驚擾㑹大疫引兵還嗣昭與徳威追之復取慈隰汾三州自是克用不敢與全忠争者數年克用以貯粮繕兵修城利害引咨幕府掌書記李襲吉曰國富不在倉儲兵强不由衆寡覇國無貧主强将無弱兵願大王崇徳愛人去奢省役設險固境訓兵務農定亂者選武臣制禮者選文吏錢榖有司刑法有律誅賞由我則下無威福之弊近密多正則人無譛謗之憂如此則國不求富而自富不求安而自安矣至於率閭閭定間架增麴糵檢田疇恐非開國建邦之切務也克用子存朂警敏有勇畧克用以封疆日蹙憂形於色存朂進言曰朱氏窮凶極暴人怒神怒今其極也殆将斃矣吾家代襲忠貞大人當遵飬時晦以待其衰奈何輕為沮䘮使羣下失望乎克用悦引咨謂以文引咨詢也以楊行密為行營都統賜爵呉王上遣金吾將軍李儼張濬子賜姓宣諭江淮書御扎賜楊行密令討朱全忠立功將士聼承制遷補然後表聞既而儼至揚州行密始建制敕院毎有封拜輒以告儼於紫極宫元宗像前陳制書再拜然後下回鶻遣使入貢回鶻請發兵赴難上命韓偓答詔許之偓曰戎狄不可倚信彼見國家人物華靡而甲兵凋弊必有輕中國之心且自㑹昌以來為國家所破恐其乘危復怨宣喻以小心㓂竊不須赴難虛愧其意實沮其謀從之夏五月朱全忠至東渭橋崔𦙍詣河中泣訴於朱全忠請以時迎奉全忠與之宴𦙍親執板歌以侑酒全忠乃將兵五萬發河中以霖雨留東渭橋韋貽範罷貽範以母䘮去位宦官欲引翰林學士洎為相洎謀謀於韓偓偓曰若圖永乆之利則莫若未就為善儻出上意亦無不可且汴軍旦夕合圍孤城難保家族在東可不慮乎洎乃移疾上亦不許宦官之請進錢鏐爵為越王以蘇檢字聖用武功人同平章事韋貽範方居䘮薦檢及姚洎於李茂貞上既不用洎茂貞及宦官恐上自用人協力薦檢遂用之昇州刺史馮𢎞鐸襲宣州敗走楊行密取昇州馮𢎞鐸介居宣揚之間自恃樓船之強不事兩道至是帥衆襲宣州田頵帥舟師逆擊破之𢎞鐸收餘衆將入海楊行密遣使招之署節度副使館給甚厚以李神福為昇州刺史初𢎞鐸遣牙将尚公廼詣行密求潤州行密不許公迺大言曰公不見聼但恐不樓船耳至是行密謂公廼曰頗記求潤州時否公廼謝曰将吏各為其主但恨無成耳行密笑曰爾事楊叟如馮公無憂矣尚公廼丹徒人朱全忠圍鳯翔李茂貞自將與朱全忠戰於虢縣隨縣元省故城在今鳳翔府寳雞縣之北大敗而還全忠進軍鳳翔城下朝服向城而泣曰臣但欲迎車駕還宮耳不與岐王角勝也遂為五寨環之秋八月兩江軍亂初孫孺死其士卒多奔浙西錢鏐受其驍悍以為中軍號武勇都至是鏐如衣錦軍在杭州府臨安縣北寰宇記唐昭宗升錢鏐所居營為衣錦軍鏐時來遊宴父老山林皆被以錦命指揮使徐綰治溝洫衆有怨言綰因將所部還杭州與左都許再思等合兵焚掠進逼牙城鏐聞變㣲服夜歸踰城而入守之恐綰等召田頵於宣州乃遣顧全武向楊行密告急且以子傳璙為質行密許之以女妻傳璙既而綰等既召頵頵引兵赴之急攻杭州行密遣人召頵曰不還吾且使人代鎮宣州頵取鏐次子傳瓘字明寶為質乃還徐綰許再思同還起復韋貽範同平章事貽範之為相也多受人賂許以官既而以䘮罷去日為債家所譟故汲汲於起復日遣人詣兩中尉樞密及李茂貞求之於是遂起復貽範上先命韓偓草制偓曰吾腕可斷此制不可草即上疏論之以為此必駭物聼傷國體中使怒曰學士忽以死馬戯偓以疏授之解衣而寢中使奏之上命罷草明日班定無白麻可宦官喧言韓侍郎不肯草麻茂貞入見曰陛下命相而學士不肯草麻與反何異上曰學士所陳事理明白若之何不從茂貞不悦而出語人曰我寔不知書生理數為貽範所誤貽範乃止既而别使姚洎草制貽範不讓即表謝明日視事未幾貽範死蘇檢馬韓偓經營入相遣親吏告偓偓怒曰公不能有所為乃欲以此相汚邪王建取興元西川軍請假道於興元節度使李繼密遣人拒之戰敗奔還西川軍乘勝至城下王宗滌先登克之繼密請降得兵三萬騎五千詔以王宗滌鎮之宗滌有勇畧得衆心王建忌之王宗佶建飬子本姓甘汴州人等疾其功搆以飛語建召宗滌詰責遂縊殺之成都為之罷市連營涕泣如䘮親戚建以王宗賀亦建飬子權興元留後九月李茂貞攻朱全忠營敗績朱全忠以久雨士卒病議引兵歸河中指揮使髙季昌字昭孫陜州硤石人後更名季興劉知俊曰天下英雄窺此舉一歲矣今茂貞已困奈何舍去全忠患茂貞堅壁不出季昌請募人為諜入城誘致之騎士馬景請行㑹朱友倫存次子發兵於大梁將至當出兵迓之全忠命諸軍秣馬飽士偃旗幟潛伏營中寂如無人景乃詐為逃亡入城告茂貞曰全忠舉軍遁矣獨留傷病者近萬人守營請速擊之茂貞開門悉衆攻全忠營全忠鼓於中軍百營俱出縱兵擊之又遣數百騎據其城門鳯翔軍進退失據自蹈藉殺傷殆盡茂貞自是䘮氣始議與全忠連和奉車駕還京矣冬十月朱全忠遣使奉表迎車駕朱全忠遣幕僚司馬鄴奉表入城獻食物繒帛復遣使請與茂貞連和修宮闕迎車駕上亦遣使齎詔賜之鳯翔軍夜縋降汴軍者甚衆茂貞疑上與全忠有密約増兵防衛汴軍夜鳴鼓角城中地如動攻城者詬城上人云刦天子賊乘城者詬城下人云奪天子賊是冬大雪城中食盡凍餓死者不可勝計或卧未死肉已為人所剐市中賣人肉斤直百錢犬肉直五百茂貞儲偫亦竭以犬氣供御膳上鬻御衣及小皇子衣於市以充用十一月保大中和二年賜號鄜坊節度為保大軍節度使李茂勲茂貞之弟引兵救鳯翔朱全忠遣兵取鄜坊茂勲降十二月李繼昭此李繼昭李茂貞養子本姓苻名道昭蔡州人五代史作李繼逺非賜姓名李繼昭之孫徳昭也詣朱全忠降茂貞山南州鎮皆入王建闗中州鎮皆入全忠坐守孤城乃密謀誅宦官以自贖遺全忠書曰禍亂之興皆由全誨僕迎駕至此以偹他盗公既志匡社稷請公迎扈還宫僕以敝甲凋兵從公陳力全忠復書曰僕舉兵至此以乘輿播遷公能協力固所願也上召李茂貞蘇檢李繼誨等食議與全忠和上曰十六宅諸王以下凍餒死者日有數人在内諸王及公主妃嬪一日食粥一日食湯餅五代史作一日食不托不托即餅也今亦竭矣卿等意如何皆不對上曰速當和解耳鳯翔兵十餘人遮韓全誨罵之曰闔城塗炭正為軍容軰數人耳李繼昭為全誨曰昔楊軍容破楊守亮一族今軍容亦破繼昭一族邪慢罵之遂出降於朱全忠復姓名苻道昭癸丑二年春正月平盧節度使王師範發兵討朱全忠克兖州師範頗好學以忠義自許為治有聲迹全忠圍鳯翔韓全誨以詔書徴藩鎮兵入援師範見之泣下霑衿曰吾屬為帝室藩屛豈得坐視天子困辱如此㑹張濬亦遺之書勸舉義兵師範曰張公言正合吾意雖力不足當死生以之時闗東兵多從全忠在鳯翔師範分遣諸將詐為貢獻及商販包束兵仗載以小舟入汴徐諸州西至陜華期以同日俱發討全忠邉諸州者多事泄被擒獨行軍司馬劉鄩取兖州時恭寜節度使葛從周將其兵屯邢州鄩帥精兵自水竇入據府舍拜從周母待其妻子以禮全忠判官裴廸守大梁師範遣走卒賫書至見廸色動廸問知之不暇白全忠亟詣馬歩都指揮使朱友寕将兵萬餘人東廵兖鄆召從周於邢州共攻師範全忠聞變亦分兵先歸使支寕并将之裴廸字昇之聞喜人李茂貞殺韓全誨等帝幸朱全忠營遂發鳯翔復以崔𦙍為司空同平章事李茂貞獨見上請誅全誨等與全忠和解奉車駕還京上喜即收全誨等斬之又斬李繼筠繼誨彦弼等十六人而以第五可範仇承坦為中尉王知古楊䖍朗為樞密使遣韓偓及趙國夫人詣全忠營囊全誨等首以示之曰曏來脇留車駕不欲協和皆此曹也今朕與茂貞决意誅之卿可曉諭諸軍以豁衆憤全忠遣判官李振奉表入謝而圍猶未解茂貞疑崔𦙍教全忠必欲取鳯翔白上急召𦙍令帥百官赴行在賜詔六七𦙍竟不至全忠亦以書召之𦙍始來鳯翔乃啟城門茂貞請以其子侃尚平原公主何后女蘇檢女為景王帝之子妃以自固上皆從之時鳯翔所誅宦官已七十二人全忠又密令京兆捕誅九十人車駕幸全忠營全忠素服待罪頓首流涕上亦泣親解玉𢃄以賜之少休即行全忠命朱友倫將兵扈從駕至興平崔𦙍始帥百官迎謁復以為相領三司如故車駕至長安大誅宦官以崔𦙍判六軍十二衛事車駕入長安崔𦙍奏宦官典兵預政傾危國家不剪其根禍終不已請悉罷内諸司使其事務盡歸之省寺諸道監軍俱召還闕下上從之全忠遂以兵驅第五可範已下數百人盡殺之寃號之聲徹於内外其出使外方者詔所在誅之止留黄衣㓜弱者三十人以備灑掃自是宣傳詔命皆令宫人出入其兩軍八鎮兵悉屬六軍以崔𦙍兼判六軍十二衛事司馬氏光曰宦官用權為國家患其來已久東漢之衰最名驕橫然皆假人主之權依凴城社以濁亂天下未有刦脇天子廢置在手如唐世者也所以然者無他漢不握兵唐握兵故也蓋其禍始於明皇盛於肅宗成於徳宗極於昭宗於是翦滅其黨靡有孑遺而唐之廟社因以邱墟矣夫寺人之官俱載詩禮所以謹開闢之禁通内外之言安可無也其或有罪小則刑之大則誅之無所寛赦如此羅使之專權又孰敢焉豈可不察減否不擇是非欲草薙而禽猶之能無亂乎是以袁紹行之於前而董卓弱漢崔昌遐襲之於後而朱氏簒唐雖快一時之忿而國隨以亡是猶惡衣之垢而焚之患木之蠧而伐之其為害不益多哉二月貶陸扆為沂王名禮帝第四子傅分司車駕還京師賜諸道詔書獨鳯翔無之扆曰茂貞罪雖大然朝廷未與之絶今獨無詔書示人不廣崔𦙍怒奏貶之賜蘇檢盧光啟死貶王溥為賓客分司皆崔𦙍所惡也賜朱全忠號回天再造竭忠守正功臣將佐敬翔朱友寜及都頭以下皆賜號有差以輝王祚帝第九子為諸道兵馬元帥朱全忠守太尉以副之進爵梁王崔𦙍為司徒兼侍中上議褒崇全忠欲以皇子為元帥全忠副之崔𦙍請以耀王為之上曰漢王通鑑考異曰即徳王裕改封長𦙍承全忠密指於㓜冲為之固請從之𦙍恃全忠之勢專權自恣天子動静皆稟之刑賞繫其愛憎中外畏之李克用聞之曰𦙍外倚賊勢内脇其君權重則怨多勢侔則釁生破國亡家則日中矣貶韓偓為濮州司馬上嘗謂偓曰崔𦙍雖忠然頗用機數對曰凡為天下者萬國皆屬之耳目安可以機數欺之莫若推誠直致雖日計之不足而歲計之有餘也上欲用偓為相偓薦趙崇御史大夫偓舉進士座主王贊兵部侍郎自代𦙍惡其分已權使朱全忠白上曰趙崇輕薄王贊不才韓偓何得妄薦上不得已貶偓上與泣别偓曰是人非復向來之比臣得貶死為幸不忍見簒弑之辱後偓再經貶徙南依王審知而卒朱全忠辭歸鎮全忠奏留歩騎萬人於故兩軍左右宿衛也以朱友倫為宿衛使張廷範為宫苑使王殷為皇城使蔣元暉為街使乃辭歸鎮上餞之於延喜樓全忠奏曰克用於臣本無大嫌乞厚加撫慰克用聞之笑曰此賊欲有事淄青畏吾掎其後耳上之餞全忠也賜全忠詩全忠亦和進又進楊栁枝詞五首百官班辭於長樂驛崔𦙍獨送至灞橋夜二鼓𦙍始還入城上復召對問以全忠安否置酒作樂至四鼓乃罷以裴樞同平章事朱全忠薦之也三月朱全忠遣朱友寕葛從周擊王師範夏五月師範以淮南兵擊斬友寕秋七月全忠擊師範破之遣楊師厚潁州沂溝人攻青州朱全忠還至大梁王師範遣兵圍齊州全忠遣友寕擊郤之復擊取師範所益劉鄩兵鄩由是援絶葛從周引兵圍之友寕攻㧞博昌漢縣後唐改博興今縣屬清州府臨淄抵青州城下師範求救於淮南楊行密遣將王茂章合肥人救之茂章與師範大破友寕斬之乘勝逐北俘斬殆盡全忠聞友寕死將兵二十萬晝夜兼行赴之師範逆戰大敗茂章以衆寡不敵引兵還全忠留楊師厚攻青州而歸汴兵之敗王師範也王茂章閉壘向汴兵稍懈毁柵出戰戰酣退坐召諸將飲酒已而復戰全忠登高望見之嘆曰使吾得此人為將天下不足平也至晡汴兵退八月進王建爵為蜀王楊師厚逼青州王師範降冬十月葛從周取兖州楊師厚屯朐注見前王師範攻之師厚奮擊大破之獲師範弟師克進逼青州師範以弟故遂請降時朱全忠聞李茂貞將起兵恐其復刦天子而去欲迎車駕詣洛陽乃受之葛從周急攻兖州劉􅬸固守鄩使從周毋登城謂從周曰劉将軍事我不異於汝從周攻城為之少緩㑹師範使者至諭鄩乃降全忠表鄩為保大留後已又表師範為河陽節度使後師範舉族為全忠所殺師範舉族遷大梁全忠客之後朱友寕妻訢讐乃族師範有司次第左右告之故師範與家人宴少長列坐語使者曰死固不免余懼昭穆失序不可以見先人酒行以次就戮者二百人山南東道節度使趙匡凝字光儀蔡州人取荆南表其弟匡明為留後匡凝父徳諲初事秦宗權以山南東道七州降朱全忠全忠表為節度使徳諲卒匡凝嗣至是荆南節度使成汭為淮南將李神福所擊赴水死先是神福擊鄂州節度使杜洪求救於朱全忠全忠令汭及湖南馬殷出兵救之汭發舟師十萬沿江東下殷遣将許德動乘虚襲䧟江陵大掠而去荆南将士聞之以亡其家皆無鬭志汭遂為神福所敗而死杜洪鄂州人武貞澧朗軍名節度使雷彦威滿之子時滿已卒彦威嗣遣兵襲據其地匡凝令匡明擊走之表匡明為留後時天子㣲弱諸道多不上供惟匡凝兄弟委輸不絶雷彦威狡獪殘忍常泛舟焚掠鄰境荆鄂之間殆至無人尋為其弟彦恭所逐李茂貞李繼徽舉兵逼京畿朱全忠之克邠州也執靖難節度使楊崇本妻於河中而私焉崇本怒使謂李茂貞曰唐室将滅父本茂貞餋子故稱忍坐視之乎遂相與連兵侵逼京畿復姓名李繼徽全忠恐其復有刦遷之謀乃發兵屯河中十一月楊行密克宣州斬田頵初田頵破馮𢎞鐸詣楊行密求池歙二州為廵屬行密不許頵攻錢鏐行密又召之還頵遂有叛志與潤州團練使安仁義本沙陀叛将同舉兵行密使李神福討頵王茂章討仁義頵將水軍拒神福神福曰賊棄城而來此天亡也堅壁不戰遣使告行密發兵㫁其歸路行密遣臺濛将兵赴之至是濛擊斬頵遂克宣州仁義勇决得士心茂章攻潤州踰年始克之斬仁義頵之叛也行密妻弟夀州節度使朱延夀隂與通謀行密詐為目疾謂夫人曰吾不幸失明諸子皆㓜軍府事當悉以授三舅夫人以報延夀行密亦自遣人召之延壽至行密斬之而出朱夫人方延夀赴召其妻王氏曰君此行吉凶未可知願日發使以安我一日使不至王氏曰事可知矣部分僮僕授兵聞門騎至乃焚府舎曰妾誓不以皎然之軀易讐人所辱赴火而死初行密與頵里相善約為兄弟及頵首至廣陵行密視之泣下因赦其母殷氏行宻與諸子皆以子孫禮事之殷氏與頵婦弟郭師從常保䕶傅瓘頵敗傅瓘歸杭州錢鏐以師從為鎮東虞候朱延夀舒城人郭師從合肥人以獨孤損字又損及之從曾孫同平章事裴贄罷損以禮部尚書相贄罷為左僕射朱全忠殺左僕射張濬朱全忠綱目作張全義考殺濬者全義使全義者全忠也今依唐書昭宗紀改書濬居長水本後魏南陜縣唐更名今馬鎮在河南府永寕縣西南王師範舉兵時欲取濬為謀主不克及是朱全忠謀篡奪恐濬扇動藩鎮諷張全義殺之縣吏葉彦素濬所厚知全義謀以告濬濬謂其子格曰汝留則俱死去則存種格哭拜而去彦遣子人送之自荆南入蜀張格字義師濬次甲子天祐元年春正月朱全忠殺崔𦙍以崔逺柳璨字炤之公綽族孫同平章事初崔𦙍假朱全忠兵力以誅宦官全忠既破李茂貞威震天下遂有簒奪之志𦙍懼與全忠外雖親厚私心漸異乃謂全忠曰長安密邇茂貞不可不為之備六軍十二衛但有空名請召募以實之使公無西顧之憂全忠知其意曲從之密使麾下壯士應幕以察之𦙍不之兵與京兆尹鄭元規等繕治兵仗日夜不息㑹朱友倫擊毬墜馬而死全忠疑𦙍所為殺同戯者十餘人遣兄子友諒全昱子代典宿衛至是全忠欲遷天子都洛恐𦙍立異密表𦙍等專權亂國請并其黨鄭元規等誅之詔皆貶之而以裴樞獨孤損分制六軍三司全忠密令朱友諒殺𦙍及元規等數人朱全忠屯河中表請遷都帝發長安二月至陜朱全忠引兵屯河中遣牙將奉表稱邠岐兵逼畿甸請上遷都洛陽時上御延喜樓及下裴樞已促百官東行驅徙士民號哭滿路罵曰賊臣崔𦙍召朱温來傾覆社稷使我曹流離至此上遂發長安全忠以張廷範為御營使毁長安宫室百司及民間廬舍取其材浮渭沿河而下長安遂墟上至華州民夾道呼萬歲上泣曰勿呼萬歲朕不復為汝主矣館於興徳宫謂侍臣曰紇干山頭凍殺雀何不飛去生處樂紇干山一名紇真山在今大同府大同縣東元和志蕃語紇真華言三十里也寰字記其山夏恒積雪故彼人有山頭凍殺雀之語朕今漂泊不知竟落何所因泣下霑襟左右莫能仰視二月至陜以東都宫闕未成留止全忠來朝上延入寢室見何后后泣曰自今大家夫婦委身全忠矣王建遣兵迎車駕上遣間使以御札告難於建建遣王宗祐建飬子將兵㑹鳯翔兵至興平遇汴兵不得進而還建始自用墨制除官云俟車駕還長安表聞三月朱全忠判六軍諸衛事全忠既殺崔𦙍遂專總禁衛朱全忠赴洛陽全忠置酒私第陜城私邸也邀上臨幸遂請赴洛陽督修宫闕上與之宴羣臣既罷留全忠及韓建飲皇后出自捧玉巵飲之宮人或附上耳語建躡全忠足全忠不飲陽醉而出遣間使以密詔告難於四方上復遣間使以絹詔告急於王建楊行密李克用等令糾率藩鎮以圖匡復曰朕至洛陽則為全忠所幽閉詔敕皆出其手朕意不得復通矣楊行密遣兵擊杜洪行密以李神福為鄂岳招討使將兵擊杜洪朱全忠遣使詣之請捨鄂岳復請舊好行密報曰俟天子還長安始敢聞命既而神福卒行密以劉存代之明年朱全忠遣其将曹延祚救洪存攻㧞岳州執洪及延祚送廣陵悉誅之劉存泌陽人夏四月帝至洛陽朱全忠奏宫室已成請車駕早發上遣宫人諭以皇后新産未任就路請俟十月東行全忠疑上徘徊俟變怒甚謂牙將㓂彦卿字俊臣開封人曰汝速至陜即日促官家發來閏月車駕發陜全忠迎於新安殺上左右及宫人數人自崔𦙍之死六軍散亡俱盡餘内園小兒三百餘人從上而東全忠盡殺之預選二百人大小相類者依其服而代之上初不覺累日乃悟自是上之左右使令皆全忠之人矣至洛陽入宫以蒋元暉王殷為宣徽南北院宣徽二院唐中葉置宦者之百官志不載乃使張廷範為街使韋震為河南尹又召朱友恭氏叔琮為左右龍武統軍典宿衛以朱全忠為䕶國宣武宣義忠武節度使更封錢鏐為呉王鏐求封呉越王朝廷不許乃更封呉王命魏博曰天雄軍進羅紹威爵為鄴王代宗以魏博為天雄軍及田悦拒命除其號今復之五月朱全忠還鎮帝宴全忠等既罷復召全忠宴於内殿全忠疑不入帝曰然則可使敬翔來全忠擿翔使去曰翔亦醉矣乃還大梁六月李茂貞王建李繼徽合兵討朱全忠全忠拒之河中時西川諸將勸王建乘茂貞之衰取鳯翔建以問判官馮涓涓曰今梁晉虎争勢不兩立若并而為一舉兵向蜀雖諸葛復生不能敵矣鳯翔蜀之藩蔽不若與之和親無事則務農訓兵有事則觀釁而動可以萬全建曰然乃與茂貞修好及李繼徽合兵誅朱全忠全忠拒之河中秋八月朱全忠弑帝于椒殿太子祝即位是為昭宣帝初全忠見徳王裕眉目疎秀年齒已壯惡之私謂崔𦙍曰徳王嘗奸帝位豈可復留公何不言之𦙍言于帝帝問全忠全忠曰陛下父子之間臣安敢竊議此崔𦙍賣臣耳帝自離長安日憂不測與何后終日沈飲或相對悲泣全忠使蔣元暉伺帝動静帝從容謂元暉曰徳王朕愛子全忠何故堅欲殺之因泣下齧中指血流元暉具以語全忠全忠愈不自安時李茂貞等移􅊾來往皆以興復為辭全忠方西討以帝有英氣恐變生于中欲立㓜君易謀禪代乃遣判官李振至洛陽與元暉及朱友恭氏叔琮等圖之元暉選牙官史太等百人夜叩宮門殺宮人裴貞一帝在椒殿方醉遽起單衣繞柱走太追弑之昭儀李漸榮以身蔽帝呼曰寜殺我曹勿殺大家太亦殺之又欲殺何后后求哀于元暉乃釋之于是元暉矯詔稱貞一漸榮弑逆立輝王祚為皇太子更名祝于柩前即位時年十三宮中恐懼不敢出聲哭全忠聞之陽驚哭自投于地曰奴軰負我令我受惡名於萬代至東郡伏梓宮慟哭殺友恭叔琮友恭臨刑大呼曰賣我以塞天下之謗如鬼神何全忠遂辭赴鎮楊行密以子偓為宣州觀察使臺濛卒行密以子偓代之徐温謂偓曰王寢疾而嫡嗣出藩此必奸臣之謀他日相召非温使者及王令書慎無亟來偓泣謝而行九月尊皇后為皇太后冬十月辛邜朔日食十二月楊行密遣馬賨歸長沙賨性沈勇事行密屢有功行密從容問其兄弟乃知為馬殷之弟大驚曰吾嘗怪汝器度瓌偉果非常人遣歸長沙賨固辭行密固遣之賨至長沙殷議入貢賨曰楊王地廣兵强不若與之結好殷作色曰楊王不事天子一旦朝廷致討及吾汝置此論勿為吾禍以劉隠為清海節度使隱以重賂結朱全忠故有是命昭宣帝乙丑天祐二年劉友益曰君立踰年改元恒也昭宣于是踰年矣而不改先君之舊號則臣子之罪也其畏全忠亦甚矣綱目非元年不書號于是特書昭宣帝天祐二年所以表其為新君之初年以正始也春二月朱全忠殺徳王裕等九人全忠使蔣元暉邀徳王裕等九人裕及棣王祤䖍王禊祈王禋遂王禕景王祕祁王祺雅王禎瓊王祥置酒九曲池悉縊殺之投尸池中皆昭宗之子也葬和陵在河南府偃師縣南賀善贊曰昭宗即位首務彊兵志張王室而性失卞急不審事宜是以三命出師不惟無功益以長亂雖唐亡已决亦其處之不善祗以速之也獨孤損裴樞崔逺並罷以張文尉字友華河間人楊渉字文川兄子同平章事初桞璨及第不四年為相性傾巧時天子左右皆朱全忠腹心璨曲意事之同列裴樞崔逺獨孤損皆朝廷宿望意輕之璨以為憾張廷範本優人有寵于全忠奏以為太常卿樞曰廷範勲臣幸有方鎮何藉樂卿恐非元帥指持之不下全忠聞之謂賓佐曰吾嘗以裴十四器識真純不入浮薄之黨觀此議論本態露矣璨因此並譖逺損于全忠故三人皆罷以張文蔚楊渉為相渉為人和謹聞當為相泣謂其子凝式曰此吾家之不幸也必為汝累夏四月慧星出西北長竟天六月殺裴樞獨孤損崔逺陸扆王溥等三十餘人桞璨恃朱全忠之勢恣為威福會有星變占者曰君臣俱焚宜誅殺以應之璨因疏其素所不快者于全忠曰此曹皆怨望腹誹冝以之塞災異李振因言于全忠曰王欲圖大事此曹皆朝廷之難制者也不若盡去之全忠以為然貶獨孤損裴樞崔逺陸扆王溥趙崇致仕太子太保王贊等官有差自餘或門胄高華或科第自進以名檢自處者皆指以為浮薄貶之六月朔聚樞等三十餘人于白馬驛注見前一夕盡殺之投尸于河初李振屢舉進士不中第故深疾搢紳之士言于全忠曰此軰嘗自謂清流宜投之黄河使為濁流全忠笑而從之振自汴至洛朝臣必有竄逐時為之鴟梟秋八月徴前禮部員外郎司空圖字表聖臨淄人詣闕尋放還山初圖棄官居王官谷在今蒲州府虞鄉縣東南元王憚記中條山又東得王官谷漢故壘也有唐司空表聖别業昭宗屢徴之不起桞璨以詔書徴之圖懼入見陽為衰野墜笏失儀璨復下詔曰養高釣名匪夷匪惠難居公正之朝可放還山後全忠篡位徵圖為禮部尚書不起及昭宣帝遇弑圖聞之不食而卒冬十月朱全忠擊淮南不利而還全忠遣楊師厚取襄陽趙匡凝奔廣陵復㧞江陵趙匡明奔淮都乘勝遂擊淮南敬翔諌不聴至棗陽隨縣今屬襄陽府遇大雨抵光州道險塗潦人馬疲乏士卒逃亡十一月渡淮而北光州刺史柴再用汝陽人抄其後軍斬首三千級獲輜重萬計全忠悔之躁忿尤甚遂還大梁改昭宗諡號起居郎蘇楷禮部尚書循之子素無行嘗登進士第在乾寜三年昭宗覆試黜之楷文最下承不聴入科場此洪邁曰唐人謂貢院為科場言由而决科進取争名之埸也至是建議昭宗謚聖穆景文多溢美請改之太常卿張廷範奏改為恭靈莊愍廟號襄宗十一月吳王楊行密卒謚武忠子偓代為淮南節度使行密長子偓素無令譽軍府輕之行密寢疾命判官周隱舒州人召偓隠性蠢直對曰司徒輕易信䜛喜擊毬好飲酒非保家之主餘子皆㓜未能駕馭諸將廬州刺史劉威從王起微細必不負王不若使之權領軍府俟諸子長而授之行密不應徐温張顥蔡人密言於行密曰王出萬死冒矢石為子孫立基業安可使他人有之行密曰吾死瞑目矣行密使温與幕僚嚴可求馮翊人家江都詣隱取牒遣使召偓以王茂章代守宣州偓至行密卒李儼承制以偓為節度使偓既襲位召周隠殺之又怒王茂章遣兵襲之茂章奔杭州錢以為鎮東節度副使更名景仁後使于梁遂留之以朱全忠為相國封魏王加九錫全忠不受先是全忠急於𫝊禪密使將元暉等謀之元暉與桞璨等議以魏晉以來皆先封大國加九錫殊禮然後受禪當次第行之全忠大怒宣徽副使王殷趙殷衡本姓孔名循為全忠家乳母養子冒姓趙後漸貴復其姓名譖之曰元暉璨等欲延唐祚故留其事以須變元暉聞之懼詣全忠言狀全忠曰汝曹巧述間事以阻我借使我不受九錫豈不能作天子耶元暉曰唐祚已盡天命歸王但以晉燕岐蜀皆吾勍敵王遽受禪彼心未服不可不曲盡義理然後取之元暉等欲為王創萬代之業耳全忠叱曰汝果反矣元暉歸與璨議加全忠九錫朝士多竊懐憤悒禮部尚書蘓循即楷之父史不詳何所人獨揚言曰梁王功業顯大厯數有歸朝廷宜速行揖讓朝士無敢違者乃以全忠為相國總百揆進封魏王加九錫全忠怒不受璨遂奏請𫝊禪詣大梁白全忠全忠拒之十二月朱全忠弑太后何氏殺蔣元暉桞璨張廷範初柳璨與元琿廷範相結為全忠謀禪大事何太后使宮人逹意求傳之後子母生全王殷趙殷衡譖元暉云與璨廷範于積善堂夜飲對太后焚香為誓興復唐祚全忠信之收斬元暉揭尸于都門外聚衆焚之以殷權知樞宻殷衡權判宣徽院事殷等遂誣元暉私侍太后全忠令殷等弑太后于積善堂斬桞璨於上東門車裂廷範于都市璨臨刑呼曰負國賊死其宜矣罷謁郊廟先是禮院奏皇帝登位應祀南郊敕用十月行之既習儀朱全忠怒曰桞璨蔣元暉欲郊天以延唐祚璨等懼改用來年正月至是全忠弑太后誅璨等敕以宫禁内亂罷之丙寅三年春正月羅紹威殺其牙軍八千家初田承嗣鎮魏博選募六州驍勇之士五千人為牙軍厚其給賜以自衛自是父子相繼親黨膠固日益驕横小不如意輙族舊帥而易之自史憲誠以來皆立於其手羅紹威惡之力不能制密告朱全忠欲借兵以誅之全忠乃發兵屯深州聲言擊滄州㑹全忠女適紹威子者卒全忠遣將實甲兵於槖中選兵千人為擔夫入魏詐云㑹葬全忠自以大軍繼其後云赴行營牙軍不之疑紹威潛遣人入庫斷弓弦甲襻普患反甲之系也夜帥奴客數百人與汴將合擊牙軍牙軍欲戰而弓甲皆不可用遂合營殪之凡八千家嬰孺無遺詰旦全忠引兵入城已而天雄諸軍皆猜懼牙將史仁遇等作亂全忠討平之至秋乃還大梁全忠留魏中歲紹威供億所殺牛羊豕近七十萬資粮稱是蓄積為之一空紹威雖去其而魏兵自是衰弱紹威悔之謂人曰合六州四十三縣鐡不能為此錯也以朱全忠為三司注見前都制置使全忠辭不受通鑑以三司之名始於此綱目因之考天復中崔昌遐以宰相兼領三司是三司之名前已有之不始於此也今不採夏四月癸未朔日食秋九月朱全忠攻滄州全忠以幽滄相首尾為魏患欲先取滄州乃發兵渡河圍之劉仁恭下令境内男子十五以上七十以下悉自偹兵粮詣行營文其面曰定霸都士人則文其臂曰一心事主得兵十萬軍於瓦橋闗名在今保定府雄縣南易水上畏汴軍彊不敢戰滄州城中食盡全忠使人説劉守文曰何不早降守文登城應之曰梁王方以大義服天下若子叛父而來將安用之全忠愧其辭直為之緩攻仁恭求救於河東前後數百軰李克用恨其反覆未之許存朂諫曰天下之勢歸朱温者什七八自河以北能為温患者獨我與幽滄耳今不與之併力非計也為天下者不顧小怨彼嘗困我而我救其急一舉而名實附焉此乃吾復振之時不可失也克用以為然謀召幽州兵與攻潞州曰於彼則可以解圍於我則可以拓境乃許仁恭和仁恭遣兵三萬詣晋陽克用遣周徳威李嗣昭等將兵與之共攻潞州楊渥取洪州先是鎮南節度使鍾傳卒軍中立中子匡時為留後傳飬子延規恨不得立降淮南及是楊渥遣秦裴將兵擊洪州軍於蓼州在今南昌府南昌縣東南兩洲相並水入中府入於章江即水經注所謂谷鹿州也諸將請阻水立寨裴不從匡時果遣其將劉楚據之諸將以咎裴裴曰匡時驍勇獨楚耳若率衆守城不可猝㧞吾故以要害誘致之耳破寨執楚遂圍洪州㧞之虜匡時以歸楊氏遂兼有江西之地冬十月王建立行臺王建始立行臺於蜀建東向舞蹈號慟言曰自大駕東還制命不通請權立行臺用李晟鄭畋故事承制拜封仍以榜帖告諭所部朱全忠以髙紀昌為荆南留後武貞雷彦恭屡㓂荆南留後賀瓌閉城自守朱全忠以為怯使季昌代之髙氏自此遂據有荆南十二月昭義節度使丁㑹降於河東朱全忠引兵還初昭宗凶訃至潞州㑹帥將士縞素流泣久之及李嗣昭攻潞州㑹舉兵降之李克用以嗣昭為昭義留後㑹見克用泣曰㑹豈力不能守耶梁王陵虐唐室㑹雖受其舉㧞之恩誠不忍其所為故來歸命耳克用厚待之位於諸將之上全忠將攻滄州聞潞州不守引兵還先是全忠謂河南北芻粮諸營出積及還命悉焚之在舟中音鑿而焚之劉守文始遺全忠書曰城中數萬口不食數月矣與其焚之為烟沉之為泥願求所餘以救其命全忠留數困以遺之滄州頼以濟丁夘四年四月以後梁朱晃開平元年西州稱唐天復七年是歲唐亡梁晉岐淮南西州凡五國呉越湖南荆南福州嶺南凡五鎮故綱目分注於梁書太祖按唐同光時追廢温為庻人削而不書其唐晉漢周仍依綱目是是時五鎮之外尚有鎮冀昜定魏慱盧龍等鎮綱目以五代史十國為斷故自丁夘以後但列五鎮餘下並載今從之春正月淮南牙將張顥徐温作亂楊偓既得江西驕侈益甚偓君父䘮酣飲作樂燃十圍之燭以擊毬單騎常出遊從者不知所之左右牙指揮使張顥徐温泣諫偓怒曰汝謂我不才何不殺我自為之顥温懼潛謀作亂一日帥牙兵二百露刃直入庭中偓曰爾果欲殺我邪對曰非敢然也欲誅王左右亂政者爾因數偓所親信十餘人之罪曵下擊殺之謂之兵諌左傳鬻拳彊諛楚子不從臨之以兵懼而從之遂自刖也諸將不與之同者稍以法誅之於是軍政悉歸二人三月遣使奉冊寳如梁全忠自滄州還威望大沮恐中外離心欲速受禪過魏有疾羅紹威恐全忠襲之説曰今唐室衰㣲天命已改而四方稱兵者皆以興復為名王宜早正位號以絶人望全忠然之乃歸大梁帝遣御史大夫薛貽矩字熙同聞喜人勞之貽矩請以臣禮見北面拜舞於庭還言于帝曰元帥有受禪之意矣帝乃下詔禪位於梁遣宰相張文蔚楊渉及薛貽矩蘇循張䇿字少逸敦煌人趙光逢字延吉隠之子等奉玉冊傳國寳帥百官備法駕詣大梁楊涉子直史館凝式言於涉曰大人為唐宰相而國家至此不可謂之無過况手持天子璽綬於人雖保富貴奈千載何盍辭之涉大駭曰汝滅吾族神色為之不寕者數日夏四月盧龍節度使劉仁恭為其子守光所囚仁恭驕奢貪暴以大安山在今順天府房山縣西北四面懸絶築館其上極壯麗實以美女與方士煉藥其中悉歛境内錢瘞山巔令民間用菫泥黏士也為錢有愛妾羅氏其子守光通焉仁恭杖守光而斥之至是梁遣李思安擊之直抵城下仁恭在大安城幾不守守光自外引兵入登城拒守却之遂自稱節度使令部將李小喜攻大安虜仁恭以歸囚於别室守光弟守竒奔河東梁王朱全忠更名晃稱皇帝是為後梁太祖廢唐帝為濟隂王張文蔚等至大梁梁王更名晃文蔚等承格奉冊寶至金祥殿晃被衮冕即皇帝位文蔚等升殿讀冊寳已降帥百官舞蹈稱賀梁主與之宴舉酒勞之曰此皆諸公推戴之力也文蔚等皆慚伏不能對獨蘇循薛貽矩盛稱功徳宜應天順人梁主復與宗戚飲博宫中酒酣其兄全昱睨之曰朱三汝本碭山一民也從黄巢為盗天子用汝為四鎮節度使富貴極矣奈何一旦滅唐家三百年社稷他日得無滅吾族乎梁主不懌而罷廢唐帝為濟隂王遷於曹州栫在甸反園也之以棘使甲士守之梁以汴州為東都開封府洛陽為西都長安為大安府佑國軍梁以馬殷為楚王梁以敬翔知崇政院事梁以宣武掌書記太府卿敬翔知崇政院事以備顧問參謀議于禁中承上㫖宣于宰相而行之宰相非時奏請皆因以聞後廢樞密院以其職事歸之翔為人沈深有知畧在幕府二十餘年盡心勤勞晝夜不寐自言離馬上乃得休息梁主性暴戾難近人莫能測睢翔能識其意有所不可未嘗顯言但㣲示遲疑梁主已悟禪代之際翔謀居多梁以朱友文字徳明本姓康名勤梁主養以為子判建昌院事初梁主為四鎮節度使凡倉庫之籍置建昌院以領之至是以友文判院事掌萬國之金榖淮南西川移􅊾興復唐室時惟河東鳯翔淮南稱天祐西川稱天復元年王建以天祐為朱氏所改元故止稱天復餘皆禀梁正朔蜀王建與楊偓移檄諸道云欲與岐王晉王㑹兵興復唐室卒無應者建乃謀稱帝遺晉王書云請各帝一方晉王復書不許曰誓於此生靡敢失節唐末之誅宦官也詔書至河東晉王匿監軍張承業於斛律寺斬罪人以應詔至是復以為監軍待之加厚承業亦為之盡力岐王李茂貞開府茂貞治軍寛簡無紀律兵贏地蹙不敢稱帝但開岐王府置百官宫殿號令皆擬帝者契丹遣使如梁初契丹有八部五代史契丹部族之大者違呼爾氏後分為八部一曰違爾節二曰伊斯緷三曰舍緷四曰納斡五曰丕勒牟尼六曰納古濟七曰濟勒錦八曰希幹考遼史遼始祖聶哷别統塔喇部在八部之外並要尼氏共為十部與五代史所載不同部各有大人推一人為王建旗鼓以號令諸部三年一代以次為之及耶律按巴堅舊作阿保機今改正為王遼史帝紀太祖姓耶律氏諱億字按巴堅契丹塔喇伊色哩鄉耶律密律密拉人按鍚拉伊色哩舊作霞瀬益日烈密拉舊作彌里今並改正尤雄勇奚及室韋逹靼咸役屬之按巴堅恃其强不肯受代七部刦之按巴堅不得已傳旗鼓請師種落居古漢城五代史漢城在炭山東南濼河上後魏滑鹽縣也炭山在今宣化府獨石口外濼河注見前滑䀋本漢縣在熱河故城今西北别為一部漢城地宜五榖有鹽池之利後稍以兵擊滅七部北侵室韋女真即唐黒水靺鞨五季時屬遼號女真有生熟黄生熟黄頭三避遼諱改曰女直西取突厥故地東北諸夷皆畏服之是歳帥衆三十萬侵雲州晉王與之連和約為兄弟延之帳中縱酒握手盡歡約共擊梁或勸晉王擒之晉王不許留之旬日厚贈遺之按巴堅既歸而背盟更附于梁晉王由是恨之按巴堅事始此時鎮海節度判官羅隠字昭諫杭州新城人説鏐舉兵討梁曰縱無成功猶可退保杭越自為東都奈何交臂事賊為終古之羞乎鏐始以隠為不遇於唐隱屢舉進士不第必有怨心及聞其言雖不能用心甚義之梁以髙紀昌為荆南節度使依政西魏縣故城在今四川卭州進士梁震唐末登第歸蜀過江陵髙季昌愛其才識留之欲奏為判官震耻之欲去恐及禍乃曰震素不慕榮宦明公不以為愚必欲使参謀議但以白衣侍樽爼可也季昌許之以為謀主呼曰先軰梁主封其兄全昱為廣王全昱不樂在京師常居碭山故里二子皆封王梁令蘇循等致仕循及其子楷自謂有功於梁朝夕望為相梁主薄其為人敬翔李振亦鄙之言於梁主曰蘇循唐之鴟梟賣國求利不可立於維新之朝詔循等十五人並勒致仕楷斥歸田里循父子乃之河中依朱友謙六月淮南遣兵擊楚楚大破之遂取岳州楊偓遣其將劉存許元應將水軍擊楚楚王殷懼軍使楊定眞駕曰我軍勝矣殷問其故定眞曰夫戰懼則勝驕則敗今淮南兵驕而王有懼色吾是以知其必勝也殷命指揮使秦彦暉黄璠帥戰艦擊之存等遇雨引兵還彦暉追之存數戰不利遺殷書許降彦暉使謂殷曰此必詐也勿受鼓譟而進存等走黄璠引兵合擊大破之執存㧞岳州元應渥之腹心也張顥徐温因其敗收斬之梁侵晉圍潞州晉遣周徳威等救之梁遣康懷貞攻潞州晉李嗣昭閉城拒守懐貞晝夜攻之半月不克乃築壘穿蚰蜒塹蚰蜒音尤延濕蟲也遇蜈蚣蝎以蜒規之則不敢動故以名塹而守之内外斷絶晋王以周徳威為行營都指揮使救之秋七月梁以劉守光為盧龍節度使八月晉敗梁兵於潞州梁築夾寨守之晉周徳威壁於髙河即絳河在今潞安府屯留縣西南下流入漳康懐貞遣親騎擊之不克梁主遣李思安代之將兵西上至潞州城下更築重城内以防奔突外以拒援兵謂之夾寨調山東民饋軍粮徳威曰以輕騎抄之思安乃自東南山口築甬道屬於夾寨徳威與諸將互徃攻之一晝夜數十發梁兵疲於奔命閉壁不出九月蜀王建稱帝蜀王建議稱帝將佐皆以為然馮涓獨獻議請以蜀王稱制曰朝興則未爽稱臣賊在則不同為惡不從涓杜門不出建用副使掌書記韋莊字端己見素之後之謀即帝位國號大蜀建元武成以王宗佶韋莊為宰相唐道襲開州人為内樞密使是時唐衣冠之族多避亂在蜀蜀主禮而用之使修舉故事故其典章文物有唐之遺風冬十一月義昌滄景軍號唐太和中置節度使劉守文舉兵討其弟守光守文聞其弟守光幽其父集將吏大哭曰不意吾家生此梟獍梟不孝鳥食母獍即磽鏡惡獸也父食吾生不如死誓與諸君討之乃發兵擊守光互有勝負守文恐梁乗虚襲其後遣使請降五季梁開平元年分注唐昭宣徳四年下二年以後至周顯徳六年俱分注毎年甲子下以五代係十國之前標曰五季宋太祖建隆元年至開寳七年天下未一亦分用注係五季之後戊晉岐淮南稱唐天祐五年梁開平二年蜀王建武成辰辰年是嵗西川稱賀凡五國五鎮自復依隋唐例五代紀年十國非建國嗣位改元不具書春正月晉王克用卒子存勗立晉王病篤周徳威等退屯亂柳寨名胡三省注在屯留縣晉王命其弟克寧監軍張承業大將李存璋吳珙掌書記盧質立其子晉州刺史存勗為嗣曰此子志氣逺大必能成吾事爾曹善教導之謂存勗曰嗣昭厄于重圍吾不及見矣俟葬畢汝與徳威輩速竭力救之又謂克寧等曰以亞子存勗小名累汝言終而卒克寧久總兵柄有次立之勢軍中多竊議者存勗懼以位讓之克寧曰汝冡嗣也且有先王之命誰敢違之將吏欲謁見存勗存勗方哭哀久未出張承業入曰大孝在不墮基業多哭何為因扶存勗出襲位為河東節度使晉王克寧首帥諸將拜賀既而克寧謀作亂晉王流涕而殺之初晉王克用多養軍中壯士以為子寵遇如真子及存勗立諸假子皆年長握兵心怏怏不樂假子存顥陰説克寧圖存勗克寧不許已惑其妻孟氏言遂心動于是存顥等謀奉克寧為節度使舉河東附梁執晉王及太夫人曹氏送大梁帳下親信史敬鎔知之以告太夫人大駭召張承業言之承業乃召李存璋等陰為之備置酒府舎伏甲執克寧存顥于座晉王流涕數之曰兒嚮以軍府讓叔父叔父不取今事已定奈何復為此謀忍以吾母子遺仇讎乎遂殺之二月蜀以張格張濬子奔蜀者事見前同平章事格為相多迎合主意有勝己者必以計排去之梁主晃弑濟陰王追諡曰唐哀皇帝葬濟陰縣之定陶鄉後唐明宗追諡昭宣光烈皇帝夏五月晉王攻梁夾寨破之潞州圍解梁軍久圍潞州晉李嗣昭固守逾年梁主屢遣使諭降嗣昭焚詔書斬使者時梁軍亡將校四十餘人士斬卒以萬計梁主削李思安爵監押楊敏貞欲召還兵又恐晉人躡其後梁主乃自至澤州遣使就與諸將議欲還兵諸將以為李克用死晉兵且退上黨孤城無援請更留旬月以俟之梁主從之㑹晉召周徳威還晉陽初徳威握重兵在外國人疑之晉王乃召徳威還四月徳威至晉陽留兵城外徒步而入伏哭極哀退謁嗣王甚恭衆心由是釋然梁夾寨奏晉兵已去梁主以為援兵不能復來遂還大梁夾寨亦不復設備晉王與諸將謀曰上黨河東之藩蔽無上黨是無河東也且朱温所憚者獨先王爾聞吾新立以為童子未嫻軍旅必有驕怠之心若簡精兵倍道趣之出其不意破之必矣取威定霸在此一舉不可失也張承業亦勸之行乃大閲士卒以丁㑹為都招討使帥周徳威等發晉陽五月朔晉王伏兵三垂岡下岡在潞安府潞城縣西詰旦大霧進兵直抵夾寨梁軍無斥候將士尚未起晉王命周徳威李嗣源分兵為二道填坑燒寨鼓譟而入梁兵大潰南走招討使符道昭馬􅥚被殺失亡將士萬計委棄資械山積徳威至城下呼嗣昭曰先王已薨今王自來破賊賊已去矣可開門嗣昭不信曰此必為賊所得來誑我耳王自往呼之嗣昭見王白服大慟幾絶城中皆哭遂開門初徳威與嗣昭有隙晉王克用臨終謂存勗曰進通忠孝吾愛之深今不出重圍豈徳威不亡舊怨耶汝為吾以此意諭之若潞圍不解吾死不瞑目進通嗣昭小名也存勗以告徳威徳威感泣由是戰甚力既相好歡交如初梁主聞夾寨不守大驚既而歎曰生子當如李亞子克用為不亡矣至如吾兒豚犬爾周徳威乗勝進趣澤州梁統軍牛存節將兵應接潰兵至天井關謂其衆曰澤州要害地不可失也雖無詔㫖當救之遂引衆而前至澤州城中人已欲應晉存節至乃定晉兵尋至攻之存節晝夜拒戰凡旬有三日劉知俊引兵救之徳威乃退牛存節字贊正青州博昌人晉王歸晉陽晉王歸休兵行賞命州縣舉賢才黜貪殘寛租賦撫孤窮伸寃濫禁姦盜境内大治訓練士卒令騎兵不見敵無得乗馬部分已定無得相逾越謂左不得越右後不得逾前及留絶以避險軍行須聯屬不得留止而中絶避險而不整分道並進期㑹無得差晷刻犯者必斬初唐昭宗許晉王克用承制封拜時方鎮多行墨制王恥與之同毎除吏必表聞至是存勗始承制除吏兄事張承業升堂拜母賜遺甚厚潞州圍守歴年士民死者大半嗣昭勸課農桑寛租緩刑數年之間軍城完復淮南張顥徐温弑其節度使楊渥温復攻顥殺之張顥徐温専制軍政𢎞農王渥心不能平欲去之而未能二人不自安共謀弑王分其地以臣于梁于是顥遣其黨紀祥弑渥集將吏于府庭列白刃厲聲問曰嗣王暴薨軍府誰當主之三問莫應氣色益怒幕僚嚴可求前密啓曰軍府至大四境多虞非公主之不可然今日則恐太速顥曰何也可求曰劉威陶雅皆先王等夷必不肯為公下不若立幼主輔之諸將孰敢不從顥黙然可求因屏左右急書一紙置袖中麾同列詣使宅賀節度所居曰使宅賀者賀新君也衆莫測其所為既至可求跪讀之乃太夫人史氏教也大要言先王創業艱難嗣王不幸早世隆演字鴻源行密第三子次當立諸將宜無負楊氏善輔之辭㫖明切顥氣色皆沮以其義正不敢奪遂奉渥弟隆演稱留後顥以徐温鎮潤州可求説温曰公捨牙兵而出顥必以弑君之罪歸公温驚曰奈何可求曰顥明愎而暗于事請為公圖之乃往説顥請留温顥曰業已行矣奈何可求曰止之易爾明日可求邀顥詣温可求瞋目責温曰古人不忘一飯之恩況公楊氏宿將今幼嗣初立多事之時乃求自安於外可乎温謝曰茍諸公見容温何敢自専由是不行顥知可求陰附温夜遣盜刺之可求知不免請為書辭府主盜執刀臨之可求操筆無懼色盜見其辭㫖忠壯曰公長者吾不忍殺掠其財以復命温與可求謀密結將軍鍾泰章合肥人等壯士三十人斬顥與牙堂暴其弑君之罪初顥與温謀弑威王渥諡歐史作景温曰參用左右牙兵心必不一不若獨用吾兵顥不可温曰然則獨用公兵顥從之至是窮治逆黨皆左牙兵也由是人以温實不知謀隆演以温為左右牙都指揮使軍府事咸取決焉以可求為揚州司馬温性沈毅自奉簡儉雖不知書使人讀獄訟之辭而決之皆中情理立法度禁强暴政舉大綱軍民安之温以軍旅委可求以財賦委支計官駱知祥皆稱其職淮南謂之嚴駱駱知祥合肥人蜀岐晉會兵攻梁雍州梁遣忠武此梁所置同州軍號非陳許之忠武軍也節度使劉知俊拒卻之秋七月楚收茶税湖南判官高郁請聽民自採茶賣于北客收其征以贍軍楚王殷從之請于梁置回圖務胡三省注猶今之回易場也運茶于河南北賣之以易繒纊戰馬而歸由是富贍先是楚遣兵擊雷彦恭彦恭奔淮南既而向瓌亦以澧州降于是澧朗二州皆入于楚淮南將吏推楊隆演為節度使淮南將吏請於李儼承制授隆演淮南節度使𢎞農王冬十月華原隋縣今陜西懼州是賊帥温韜華原人發唐諸陵韜據華原韜先事李茂貞冒姓李名彦韜後降梁尋復叛歸茂貞茂貞置義勝軍以為節度使暴掠雍州諸縣唐帝諸陵𤼵之殆徧韜發諸陵取所藏金寶唯昭陵最固韜從埏道下見宫室閔麗不異人間中為正寢東西廂列石牀牀上石函中為鐵匣悉藏前代圖書鍾王筆迹紙墨如新韜悉取之遂傳人間巳晉岐淮南稱唐天祐六年梁已開平三年是嵗凡五國五鎮春正月梁遷都洛陽以大梁為東都命養子博王友文為留守二月丁酉朔日食梁攻岐取丹延鄜坊四州丹州西魏置元省故城在今延安府宜川縣餘注俱見前初邠寧楊崇本崇本叛梁復曰李繼徽此從五代史傳書本姓名攻夏州梁遣劉知俊擊敗之西軍由是不振及是保塞軍唐中和二年以延州置亂指揮使高萬興河西人及其弟萬全以兵降於知俊知俊遂攻丹延保塞軍鄜坊保大軍皆取之淮南徐温自領昇州注見前刺史徐温以金陵形勝戰艦所聚乃自以淮南行軍副使領昇州刺史留廣陵以其假子元從指揮使知誥為昇州防遏兼樓船副使往治之夏四月梁以王審知為閩王審知儉約常躡麻屨府舎卑陋未嘗營葺寛刑薄賦公私富實境内以安淮南攻吳越圍蘇州吳越擊敗之淮南遣指揮使周本舒州宿松人擊吳越圍蘇州久之不克淮南兵圍蘇州吳越指揮使錢鏢等救之蘇州有水通城中淮南軍張網綴鈴縣水中魚鼈過皆知之吳越虞候司馬福欲潛行入城故以竿觸網敵聞鈴聲舉網福因得過入城由是城中號令與援兵相應敵以為神先是吳王鏐嘗游府園見園卒陸仁章睦州人樹藝有智而志之至是仁章通信入城果得報而返吳越兵内外合擊淮南兵大破之擒其將二十餘人周本夜遁五月劉守光執其兄守文進攻滄州劉守文以重賂招契丹吐谷渾之衆合四萬屯薊州守光逆戰為所敗守文單馬立于陳前泣謂其衆曰勿殺吾弟守光將元行欽幽州人識之直前擒之滄徳兵皆潰守光囚守文於别室乗勝進攻滄州滄州判官吕兖幽州安次人孫鶴推守文子延祚為帥乗城拒守六月梁劉知俊叛奔岐知俊功名浸盛以梁主猜忌日甚内不自安㑹佑國節度使王重師被誅重師鎮長安數年梁主怒其貢奉不時以統軍劉捍為留後捍譖重師與邠岐通遂殺之夷其族劉捍開封人益懼梁主急徵知俊欲以為河東行營都統知俊弟知沅密使人語知俊云入必死知俊遂以同州附于岐遣兵襲華州守潼關遣人以重利啗長安諸將執劉捍送于岐殺之梁主遣近臣諭知俊曰朕待卿甚厚何忽相負對曰臣不背徳但畏族爾詔削知俊官爵遣楊師厚劉鄩等討之至關東獲知俊伏路兵使為前導關吏納之鄩兵直進遂克潼關知俊舉族奔岐岐王厚禮知俊以為中書令秋七月梁以劉守光為燕王守光既執守文遣使如梁上表告捷故有是命守光表言俟滄徳事畢為陛下掃平并宼亦致書晉王云欲與同破偽梁淮南盡取江西地撫州刺史危全諷帥撫信袁吉之兵攻洪州淮南守兵纔千人節度使劉威密遣使告急于廣陵日召僚佐宴飲全諷聞之屯象牙潭在南昌府新建縣西南即章江西曲處也不敢進楚王殷遣指揮使苑玫苑姓玫蔡州人圍高安注見前以助全諷徐温問將于嚴可求可求薦周本乃以本將兵七千救高安本曰楚人為全諷聲援耳非欲取高安也吾敗全諷援兵必還乃疾趣象牙潭全諷營柵臨溪亘數十里本隔溪佈陣先使羸兵嘗敵全諷兵涉溪追之本乗其半濟縱兵擊之全諷兵大潰本分兵斷其歸路擒全諷乗勝克袁州歙州刺史陶雅遣兵襲饒信饒州刺史唐寶棄城走米志誠敗苑玫於上高唐鎮南唐置縣今屬江西瑞州府吉州刺史彭玕本赤石洞蠻酋鍾傳用為刺史帥衆奔楚信州刺史危仔倡奔吳越吳越以為淮南節度副使更其姓曰元氏䖍州刺史盧光稠南康人唐末與譚全播據䖍州譚全播亦南康人以州附于淮南于是江西之地盡入于楊氏光稠亦遣使附于梁冬十一月岐遣劉知俊攻梁靈州梁遣兵救之大敗而還岐王欲取靈州以處劉知俊使自將兵攻之朔方節度使韓遜本靈州牙校唐末據有本鎮因即以為節度使遣使告急于梁梁主遣康懷貞寇彦卿將兵攻邠寧以救之懷貞等所向皆捷知俊解圍引去梁主急召懷貞等還知俊據險邀之左龍驤軍使王彦章字子明鄆州壽張人力戰懷貞等乃得過至昇平唐縣宋省故城在今鄜州宜君縣知俊伏兵山口懷貞大敗僅以身免岐王以知俊為彰義節度使鎮涇州彦章驍勇絶倫每戰用二鐵鎗皆重百觔一置鞍中一在手所向無前時人謂之王鐵鎗蜀蜀州刺史王宗弁本鹿弁蜀主養以為子賜姓名罷宗弁稱疾罷歸杜門不出蜀主疑其怨望加檢校太保不受謂人曰廉者足而不憂貪者憂而不足吾小人致仕至此足矣豈可求進不已乎蜀主嘉其志而許之庚晉岐吳稱唐天祐七年梁開平四午年是嵗淮南稱吳凡五國五鎮春正月劉守光克滄州殺其兄守文滄州城中食盡吕兖選男女羸弱者烹之以給軍食正月劉延祚力盡出降守光使大將張萬進周知裕輔其子繼威鎮滄州後繼威以淫虐為張萬進所殺以延祚歸使人潛殺守文歸罪于殺者而誅之族吕兖而釋孫鶴兖子琦年十五臨刑門下客趙玉紿監刑者曰此吾弟也勿妄殺遂挈以逃琦足痛不能行玉負之變姓名乞食于路僅而得免琦感家門殄滅力學自立晉王聞其名署代州判官吕琦字輝山趙玉安次人二月岐王承制加楊隆演嗣吳王于是淮南稱吳夏四月梁夏州亂殺節度使李彝昌唐末党項拓跋思敬以破黄巢功賜姓李氏彝昌思敬弟思諫之子以其族父仁福代之先是彝昌父思諫卒彝昌代為節度使及是都指揮使高宗益作亂殺彞昌軍中將吏共誅宗益迎仁福時方戍兵于外立之梁以為節度使胡三省曰李仁福子孫强盛遂為宋朝西邊之患所謂西夏也梁宋州獻瑞麥梁宋州節度使衡王友諒獻瑞麥一莖三穗梁主曰豐年為上瑞今宋州大水安用此為詔除本縣令名遣使詰責友諒以惠王友能全昱子代之梁貶寇彦卿為遊擊將軍梁左金吾大將軍寇彦卿入朝至天津橋在河南府洛陽縣西南有民不避道投諸欄外而死彦卿自首梁主以彦卿有功命以私財遺死者家以贖罪御史司憲崔沂沆之弟劾奏請論如法梁主命彦卿分析使之自辨彦卿對令從者舉置欄外不意誤死梁主欲以過失論沂奏在法以勢力使令為首下手為從不得歸罪從者不鬬而故毆傷人加傷罪一等不得為過失乃責授彦卿遊擊將軍彦卿揚言有得崔沂首者賞萬緡梁主使人謂彦卿曰崔沂有毫髪傷我當族汝時功臣驕横由是稍肅五月梁天雄節度使羅紹威卒以其子周翰代之梁以楚王殷為天策上將軍楚王殷求為天策上將始開府以弟賨存為相秋八月吳越築捍海石塘今在杭州府錢塘仁和二縣境廣杭州城臨安志江挾海潮為杭人患梁開平中錢武肅王始建候潮通江門潮水衝激板築不就因命强弩數百以射潮頭既而潮水漸向西陵乃積石植木為塘扞之城基始定由是錢塘富庶盛於東南冬十一月蜀主立其假子宗裕等為王初唐末宦官典兵者多養軍中壯士為子以自强由是諸將亦效之而蜀主多至百二十人雖冒姓連名而不禁婚姻梁遣兵襲鎮州取深冀鎮定推晉王為盟主晉遣兵救之梁主疑趙王鎔貳于晉且欲因鄴王紹威卒除移鎮定㑹燕王守光𤼵兵侵定州遣供奉官杜廷隠丁延徽監魏博兵三千分屯深冀聲言助趙守禦趙將石公立戌深州白鎔拒之鎔不從公立出門指城而泣曰朱氏滅唐社稷三尺童子知其為人而我王猶恃姻好以長者期之此所謂開門揖盜者也惜乎此城之人今為虜矣深冀民見魏博兵入奔走驚駭未幾廷隠等閉門盡殺趙戍卒乗城拒守鎔始命公立攻之不克乃遣使求援于燕晉與義武節度使王處直共推晉王為盟主合兵攻梁晉王㑹將佐謀之皆曰鎔久臣朱温輸賂結昏其交深矣此必詐也王曰彼亦擇其害而為之爾王氏在唐猶或臣或叛況肯終為朱氏之臣乎今救死不贍何顧昏姻我若疑而不救正墮朱氏計中乃遣周徳威將兵出井陘屯趙州鎔使者至幽州守光方獵孫鶴馳詣野謂曰趙人乞師此天欲成王之功業也守光曰何故對曰比常患其與朱温膠固温之志非盡吞河朔不已今彼自為讎敵王若與之併力破梁則鎮定皆歛袵而朝燕矣不早出師但恐晉人先我矣守光曰王鎔數負約今使之與梁自相弊吾可以坐承其利又何救焉守光不為出兵自是鎮定復稱唐天祐年號梁主命王景仁等將兵擊之十二月梁進軍逼鎮州晉王救之次于高邑梁王景仁等進軍柏鄉趙王鎔復告急于晉晉王自將東下王處直遣將將兵五千以從至趙州與周徳威合進距柏鄉五里營于野河即槐河在柏鄉縣西南源出正定府贊皇縣下流入胡盧河之北晉遣胡騎迫梁營馳射且詬之梁將韓勍等將步騎追之鎧胄鮮華光彩炫耀晉人望之奪氣徳威徇于軍曰彼皆汴州屠酤傭販之徒爾衣鎧雖鮮十不能當汝一擒獲一夫足以自富乃奇貨不可失也帥精騎千餘擊其兩端獲百餘人且戰且却距野河而止晉王欲速戰徳威曰鎮定之兵長于守城短於野戰且吾所恃者騎兵利於平原曠野可以馳突今壓賊壘門騎無所展其足且衆寡不敵使彼知吾虚實則事危矣王不悦退臥帳中諸將莫敢言徳威往見張承業曰大王驟勝而輕敵不量力而務速戰今去賊咫尺所限者一水爾彼若造橋以薄我我衆立盡矣不若退軍高邑誘賊離營彼出則歸彼歸則出别以輕騎掠其饋餉不過逾月破之必矣承業入褰帳撫王曰此豈王安寢時邪徳威老將知兵其言不可忽也王蹶然而興曰予方思之梁兵有降者詰之曰景仁方造浮橋王謂徳威曰果如公言是日拔營退保高邑辛晉岐吳稱唐天祐八年梁乾化元未年蜀永平元年是嵗凡五國五鎮春正月丙戌朔日食晉王伐梁軍於柏鄉大破之周徳威與别將史建塘雁門人李嗣源將精騎三千壓梁壘門而詬之王景仁韓勍怒悉衆而出徳威等轉戰而北至高邑南李存璋以步兵陳于野河之上梁兵競前奪橋晉指揮使李建及許州人本姓王李罕之假子力戰卻之戰自己至午勝負未決王謂徳威曰兩軍已合勢不可離我之興亡在此一舉我為公先登公可繼之徳威諫曰觀梁兵之勢可以勞逸制之未易以力勝也彼去營三十餘里雖挾糗糧亦不暇食日昳之後饑渴内迫矢刃外交士卒勞倦必有退志當是時我以精騎乗之必大捷今未可也王乃止至晡梁軍未食果引卻徳威疾呼曰梁兵走矣晉兵大譟爭進梁兵驚怖大潰李存璋引步兵乗之呼曰梁人亦吾人也父兄子弟餉軍者勿殺于是戰士悉解甲投兵而棄之囂聲動天地趙人以深冀之憾不顧剽掠但奮白刃追之梁之精兵殆盡棄糧食資械不可勝計凡斬首二萬級河朔大震晉王收兵屯趙州杜廷隠等棄深冀而去晉師圍邢魏梁兵救之晉師還晉王遣周徳威史建塘趣澶魏考澶州唐初置今開州是也貞觀中廢至晉天福中復置此云澶魏蓋史臣追敘之文張承業李存璋攻邢州自以大軍繼之移檄河北州縣諭以利害劉守光聞梁兵敗使人謂趙王鎔及王處直曰聞二鎮與晉王破梁兵舉軍南下僕亦有精騎三萬欲自將之為諸公啓行然四鎮連兵必有盟主僕若至彼何以處之鎔告于晉王晉王笑曰趙人告急守光不能出一卒以攻之及吾成功乃復欲以兵威離間二鎮愚莫甚焉諸將曰雲代與燕接境彼若擾我城戍動摇人情亦腹心之患也不若先取守光然後可以專意南討王曰善會梁楊師厚引兵救邢魏晉王解圍去師厚留屯魏州周徳威等亦解邢州圍晉王命徳威以兵戍趙州趙王鎔謁晉王大犒將士遣其養子徳明將三十七都從晉王征討既而楊師厚將兵屯邢州鎔甚懼㑹晉王于承天軍晉王以鎔父友事之甚恭謂曰朱温之惡極矣天將誅雖有師厚軰不能救也脱侵軼僕白率衆當之叔父勿以為憂鎔奉巵為壽謂晉王四十六舅晉王許以女妻其幼子昭誨由是晉趙之交遂固禮王徳明本姓張名文燕人也三月梁清海節度使劉隠卒弟巖知留後尋以為節度使巖多延中國士人置幕府出為刺史刺史無武人夏四月晉王推劉守光為尚父梁亦以為采訪使守光淫虐滋甚毎刑人必置諸鐵籠以火逼之又以鐵刷刷人面嘗衣赭袍顧謂將吏曰今天下大亂英雄角逐吾兵强地險亦欲自帝何如孫鶴曰今内難新平公私困竭太原窺吾西契丹伺吾北遽欲自帝未見其可守光不悦又使人諷鎮定求尊已為尚父趙王鎔以告晉王晉王怒欲伐之諸將皆曰是為惡極矣行當族滅不若陽為推尊以稔之乃與鎔及義武王處直昭義李嗣昭振武周徳威天徳宋瑶六節度使并河東為六共奉冊推守光為尚書令尚父守光不寤益驕表梁主曰晉王等推臣臣荷陛下厚恩未之敢受不若陛下授臣河北都統則并鎮不足平矣梁主亦知其狂愚乃以守光為河北道采訪使遣使冊命之守光命僚屬草受冊儀僚屬取唐冊太尉儀獻之守光問何得無郊天改元之事對曰尚父人臣也安得郊天改元者乎守光怒投之于地曰我地方三千里帶甲三十萬直作河北天子誰能禁我尚父何足道哉命趣具即帝位之儀械繫梁及諸道使者于獄既而皆釋之秋七月梁主避暑于河南尹張宗奭即張全義梁更其名第梁主避暑宗奭第亂其婦女殆徧宗奭子繼祚不勝憤恥欲弑之宗奭止之曰吾家頃在河陽為李罕之所圍事具前啗木屑以度朝夕賴其救我得有今日此恩不可忘也乃止八月劉守光稱帝守光將稱帝將佐多竊議以為不可守光乃置斧鑕于庭曰敢諫者斬孫鶴曰滄州之破鶴分當死蒙王生全以至今日敢愛死而忘恩乎竊以為今日之帝未可也守光怒伏諸鎮上令軍士咼而噉之鶴呼曰百日之外必有急兵守光命以土窒其口寸斬之遂即位國號燕改元應天受冊之日契丹陷平州燕人驚擾晉王聞守光稱帝大笑曰俟彼卜年吾當問其鼎矣張承業請遣使致賀以驕之晉王遣太原少尹李成勲往用鄰藩通使之禮燕典客欲使稱臣庭見成勲曰吾受命唐朝為太原少尹燕王豈得而臣之守光怒囚之數日竟不能屈也卜年晉王以周成王卜年楚子問鼎事戲笑守光綱目誤作十年今改正岐王使劉知俊攻蜀圍安逺軍今漢中府沔縣西有西縣故城五代時曰安逺軍先是岐攻蜀興元蜀山南節度使唐道襲擊卻之蜀主之女普慈公主嫁岐王從子繼崇繼崇驕矜嗜酒蜀主召公主歸寧留之岐王怒始與蜀絶遂搆兵及是岐王復使劉知俊李繼崇將兵擊蜀蜀將王宗侃大敗奔安逺軍知俊繼崇追圍之已而蜀主自將援安逺大破岐兵岐兵遁去岐王左右讒劉知俊岐王奪其兵知俊舉族居于秦州九月梁主如相州冬十一月還洛陽梁主聞晉趙謀南伐自將拒之至衞州方食軍前奏晉軍已出井陘遽命輦北趣邢洺晝夜倍道兼行至相州聞晉兵不出乃止刺史李思安不意梁主猝至落然無具坐削官爵梁主尋至洹水九域志成安有洹水鎮成安今縣屬廣平府邊吏言晉趙兵南下梁主即時進軍至魏縣或告云沙陀至矣士卒恟懼多逃亡嚴刑不能禁既而復告云無寇上下始定梁主病已經年以夾寨柏鄉屢失利故力疾北巡思一雪其恥意鬱鬱多躁忿功臣宿將往往以小過被誅衆心益懼既而晉趙兵竟不出梁主南還納懷州刺史段明逺開封人後更名凝妹為美人明逺饋獻豐備梁主悦至洛陽疾復作明年梁主至武陟明逺供饋有加于前梁主追思李思安前事貶柳州司戸告曰觀明逺之忠勤如此見思安之悖慢何如尋長流賜死幽州參軍馮道字可道瀛州景城人奔晉劉守光謀攻易定道以為未可繫獄得免亡奔晉張承業薦之晉王以為掌書記壬晉岐吳稱唐天祐九年梁乾申化二年是嵗凡五國五鎮春正月晉師及鎮定之兵伐幽州二月梁主救之大敗走還晉周徳威東出飛狐注見前與趙將王徳明義武將程巖㑹于易水攻燕祁溝關即今岐溝店在順天府涿州西南下之進克涿州徳威遂至幽州城下守光求救于梁梁主自將救之從官以梁主誅戮無常多憚行梁主怒至白馬頓賜從官食多未至遣騎趣之散騎常侍孫隲等三人後至撲殺之至魏州命楊師厚李周彝圍棗强賀徳倫袁象先宋州下邑人圍蓚縣晝夜兼行至下博遇趙將符習趙州昭慶人引數百騎巡邏或告曰晉兵大至矣梁主棄行幄亟引兵趣棗强與師厚軍合師厚急攻棗强拔其城屠之徳倫攻蓚晉將李存審引兵扼下博橋在今深州故下博城東跨胡盧河上使史建塘李嗣肱分道擒生獲梁軍之樵芻者數百人殺之留數人斷臂縱去曰為我語朱公晉王大軍至矣時梁主引師厚兵攻蓚未及置營建塘嗣肱各將三百騎效梁軍旗幟服色與樵芻者雜行暮至營門縱火大譟弓矢亂發營中大擾不知所為斷臂者復來曰晉軍大至矣梁主大駭燒營夜遁迷失道委曲行百五十里蓚之耕者皆荷鋤奮挺逐之委棄資械不可勝計既而復遣騎覘之曰晉軍實未來此乃史先鋒遊騎爾梁主慙憤病遂増劇晉師克瓦橋關周徳威遣禆將攻瓦橋關其將吏及莫州刺史李嚴幽州人皆降嚴涉獵書傳晉王使傅其子繼岌嚴固辭王怒將斬之教練使孟知祥字保允遷兄子諫曰强敵未滅大王豈宜以一怒戮嚮義之士乎乃免之胡三省曰孟知祥始此夏五月梁主至洛陽梁主至洛陽疾甚謂近臣曰我經營天下三十年不意太原餘孽更昌熾如此吾觀其志不小天復奪我年我諸兒非彼敵也吾無葬地矣因哽咽絶而復蘇劉守光遣兵出戰晉人擊敗之擒其將守光遣其將單廷珪將精兵萬人出戰與周徳威遇于龍頭岡亦曰臥龍岡在今順天府宛平縣西北曰今日必擒周楊五徳威小字以獻既戰見徳威于陣單騎逐之槍及徳威背徳威側身避之奮撾反擊廷珪墜馬擒之燕兵退走引騎乗之斬首三千級廷珪燕驍將也燕人失之奪氣吳徐温攻宣州克之殺其觀察使李遇吳鎮南節度使劉威歙州觀察使陶雅宣州觀察使李遇常州刺史李簡上蔡人皆武忠王舊將有大功以徐温秉政内不能平李遇尤甚館驛使徐玠字蘊圭彭城人使于吳越温使説遇入見新王曰公不爾人謂公反遇怒曰君言遇反殺侍中謂楊渥者非反邪温怒以王檀胡三省注檀當作壇為宣州制置使數遇不入朝之罪遣柴再用徐知誥副之遇不受代再用攻之逾月不克遇少子為淮南牙將温執至城下示之遇不忍戰乃請降温斬之夷其族於是諸將始畏温莫敢違其命知誥以功遷昇州刺史時諸州長史多武夫専以軍旅為務不恤民事知誥在昇州獨選用廉吏修明政教招延四方士大夫洪州進士宋齊邱好縱横之術謁知誥知誥奇之辟為推官與判官王令謀參軍王翊専主謀議以牙吏馬仁裕周宗曹悰為腹心宋齊邱字子嵩萬載人馬仁裕字徳寛彭城人周宗字君泰漣水人六月梁朱友珪弑其主晃而自立梁主長子郴王友裕早卒次假子博王友文梁主特愛之常留守東都次郢王友珪其母亳州營娼也為控鶴指揮使無寵次均王友貞為東都指揮使初張后嚴整多智梁主敬憚之后殂梁主恣意聲色諸子雖在外常徵其婦入侍友文婦王氏色美尤寵之欲以友文為太子友珪心不平梁主疾甚命王氏召友文欲付以後事友珪婦張氏知之密告友珪曰大家以傳國寶付王氏懷往東都吾屬死無日矣夫婦相泣左右或説之曰事急計生何不改圖六月朔梁主命敬翔出友珪為萊州刺史友珪怒易服微行入左龍虎軍見統軍韓勍以情告之勍亦見功臣多被誅懼不自保遂相與合謀以牙兵從友珪雜控鶴士中夜斬關入至寢殿梁主驚起曰我固疑此賊恨不早殺之汝悖逆如此天地豈容汝乎友珪曰老賊萬段友珪僕夫馮廷諤刺梁主腹刃出于背以敗氊裹之瘞于寢殿遣供奉官丁昭溥馳詣東都命友貞殺友文矯詔稱友文謀逆賴友珪忠孝將兵誅之宣令友珪權主軍國之務韓勍為友珪謀多出金帛賜諸軍及百官以取悦乃𤼵喪即位梁匡國軍梁陳許軍號亂殺節度使韓建時梁新有内難許州軍士更相告變建不之省亦不為備遂為其下所殺秋七月梁以楊師厚為天雄節度使天雄節度使羅周翰幼弱楊師厚軍于魏州久欲圖之憚太祖嚴威不敢發至是引兵入牙城據位視事梁以師厚為天雄節度使徙周翰鎮宣義自唐文徳元年羅𢎞信據魏博傳子至孫而亡梁加吳越王鏐尚父梁遣兵擊河中節度使朱友謙降晉友珪既簒立諸宿將多憤怒雖曲加恩禮終不悦䕶國節度使冀王友謙泣曰先帝數十年開創基業前日變起宫掖聲問甚惡吾備位藩鎮心竊恥之友珪加友謙侍中且徵之友謙謂使者曰先帝晏駕不以禮吾且至洛陽問罪何以徵為友珪遣韓勍擊之友謙以河中附于晉以求救晉王自將而西遇梁將康懐貞大破之梁軍解圍退保陜州梁以敬翔同平章事友珪以敬翔太祖腹心恐其不利于己欲解其内職恐失人望遂以為相以李振充崇政院使翔多稱疾不預政事吳以徐温領鎮海節度使吳劉威為帥府所忌徐温將討之威幕客黄訥説威曰公受謗雖深反本無狀若輕舟入覲則嫌疑皆亡矣威從之陶雅亦懼與威偕詣廣陵温待之甚恭如事忠武王之禮皆遣還鎮由是人皆重温冬十月梁楊師厚入朝楊師厚既得魏博又兼都招討使宿衞勁兵多在麾下諸鎮兵皆得調𤼵威勢甚重心輕友珪專行不顧友珪患之𤼵詔召之師厚將行其腹心曰往必不測師原曰吾知其為人矣乃帥精兵萬人渡河友珪大懼至都門留兵於外與十餘人入見友桂喜遜詞恱之厚賜遣還御批厯代通鑑輯覽卷六十五

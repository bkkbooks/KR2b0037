front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷二十漢孺子嬰丙寅居攝元年春正月王莽祀南郊劉友益書法自是以後皆斥書莽而削其姓三月立宣帝元孫嬰為皇太子號曰孺子
  hash: sha256:9c9a9cf7126e23fbac5356007157e5770e6051560a3b64908feb875f56ef1207

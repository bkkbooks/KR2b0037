front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷九十五元世祖皇帝
  hash: sha256:8a0e6cec99a20daef8d9212b696fbc39b024d1bc730749b47c70f64dfa2b6600
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_094-1a, image: WYG0339/WYG0339-0001a.png}
body:
  text: 帝名呼必賚太祖少子圖壘追諡睿宗事具前第四子母竒咪氏諡莊聖太后舊作怯烈氏今改帝嗣位始建元立國號俱見前滅宋而有天下子至元十三年宋益五昰景炎元年前是年三月元兵入臨安宋統已絶依夏商例一歳兩係三月以前為宋帝㬎徳祐元年三月以後為元世祖至元十三年仍以宋二王紀年附注其下春三月以阿嘍罕董文炳行省事于臨安巴延自臨安北還承制留阿嘍罕董文炳經畧閩浙以䝉古台鎮浙西索多鎮浙東㑹江西都元帥宋都木逹言宋二王在閩廣聚兵將攻江西乃遣逹春移軍與李恒吕師夔㑹阿嘍罕文炳同取未下州縣以追二王閏月宋陳宜中等奉益王昰開府福州宋陸秀夫蘇劉義等聞二王走温州相繼追及于道遣人召陳宜中于清澳宜中來謁復召張世傑于定海世傑亦以所部兵來温之江心寺在今永嘉縣孤嶼山麓舊有宋髙宗南奔時御座衆相率哭座下奉益王昰為都元帥廣王昺副之𤼵兵除吏以秀王與檡為福建察訪使先入閩中撫吏民諭同姓檄召諸路忠義同謀興復㑹謝太后遣二宦者以兵百人召二王還臨安宜中等沈其兵江中遂入閩時汀建諸州方謀從黄萬石納欵萬石嘗為福建漕使故降附後欲取全閩為己功聞二王至復閉門以拒萬石南建應作劔宋南劍州屬福州路注見前守臣林起鰲遣軍攻之萬石敗走宋人兵勢稍振時宋人傳檄嶺海言夏貴己復瀕江州郡諸將聞之以江路既絶不可北歸皆欲託計事還静江獨廣西宣慰使史格曰君等勿為虚聲所懼待貴踰嶺審不可北歸取途雲南未為不可豈敢輙棄戍哉行省又欲棄廣之肇慶徳慶封州併兵戍梧州亦為格所沮西靜江唐軍名宋置府今廣桂林府是宋主㬎時㬎已降續綱目尚書帝非是今依元史世祖本紀之例改書至爪洲李庭芝使姜才將兵襲𤓰洲不克宋主㬎北行至𤓰洲李庭芝與姜才涕泣誓將士出兵奪兩宮將士皆感泣乃盡散金帛犒兵以四萬人夜𢷬𤓰洲戰三時衆擁㬎避去才追戰至浦子市夜猶不退阿珠使人招之才曰吾寧死豈作降將軍邪真州苗再成亦謀出兵奪㬎不克夏五月宋人奉益王昰立于福州宋陳宜中等共立益王改元景炎尊度宗淑妃楊氏為皇太妃同聽政遥上宋主㬎尊號為孝宗懿聖皇帝又上謝太后全太后尊號進封廣王昺為衛王升福州為福安府以大都督府為垂拱殿便㕔為延和殿王剛中知福州府是日有大聲出府中衆皆驚仆宋以陳宜中為左丞相兼樞宻使都督諸路軍馬陳文龍劉黻叅知政事黻尋卒張世傑為樞宻副使陸秀夫簽書樞宻院事續綱目作直學士院按宋史本紀及秀夫傳皆云為端明殿學士簽書樞宻院事與續綱目不同似得其實今從之陳宜中以陸秀夫久在兵間知軍務毎事咨訪始行秀夫亦悉心匡贊久之與宜中議不合宜中使言者劾罷之乃謫居潮州時又以蘇劉義主管殿前司召李廷芝為右丞相姜才為保康軍承宣使宋以趙溍為江西制置使吳浚字允文吁江人為江西招諭使宋人謀起兵興復以溍為制置使進兵邵武謝枋得進兵饒州李世逵方興等進兵浙東吳浚為招諭使鄒㵯字鳳叔吉水人副之毛統由海道至淮約兵㑹合仍詔傅卓翟國秀等分道出師時枋得敗走已不能軍宋以文天祥為樞宻使同都督諸路軍馬天祥自温州至福州拜右丞相兼樞宻使都督諸路軍馬天祥以國事皆決于陳宜中固辭不拜乃以為樞宻使同都督天祥使吕祖太平州人招豪傑于江淮杜滸募兵于温州封宋主㬎為瀛國公初宋吳堅等至燕不得命留館中賈餘慶病卒惟家鉉翁聞國亡旦夕哭泣不食飲者數十日宋主㬎及全太后至燕高應松亦不食卒堅及鉉翁迎謁伏地流涕稱謝奉使無狀不能保存宗社巴延遂以㬎赴上都見帝于大安殿降封瀛國公凡家資在杭越者有司輦至京師付之帝嘗召宋降將問曰汝等降何容易對曰賈似道專國每優禮文士而輕武臣臣等久積不平故望風送欵帝遣董文忠語之曰似道實輕汝曹恃似道一人之過汝主何負馬正如汝言則似道輕汝也固宜以巴延同知樞宻院事巴延入朝帝命百官郊迎以勞之既至拜同知樞宻院事尋詔以藤州原屬廣西道今為縣屬梧州府等處五千戸為食邑建康安撫使索多克衢州宋江東西湖南北宣撫大使留夣炎降時衢婺諸州皆復起兵董文炳謂索多曰嚴州不守臨安必危公往鎮之未十日諸州連兵來攻索多連戰三月遂克婺州衢守備甚嚴索多率總管高興等皷譟先登拔其城宋故相留夣炎降六月阿爾哈雅遣將克廣州宋廣東經畧使徐直諒遣其將梁雄飛請降于隆興阿爾哈雅假雄飛招討使使徇廣東既而直諒聞益王昰立乃復遣權通判李性道摧鋒軍將黄俊等拒雄飛于石門山名在今廣州府南海縣西北兩山對峙屹若門關性道不戰俊戰敗直諒棄城遁雄飛遂入廣州諸降將皆授以官俊獨不受被害宋吳浚兵敗于南豐浚聚兵于廣昌宋縣今屬建昌府復取南豐宜黄俱見前寧都宋縣今為州直𨽻江西三縣翟國秀取秀山傅卓至衢信諸縣民多應之者㑹浚兵敗國秀引還卓兵亦敗詣江西元帥府降已而張世傑遣都統張文虎與吳浚合兵十萬期必復建昌與元帥李恒戰兵敗浚奔寧都秋七月宋文天祥開府南劔州天祥欲還温州以圖進取陳宜中不從葢宜中棄温州入閩欲倚張世傑復浙東西以自洗濯乃命天祥開府南劔州經畧江西宋揚州守將朱煥泰州禆將孫貴等以城降李庭芝姜才死之淮東州縣皆平初臨安既下阿珠以宋謝太后手詔諭庭芝使降庭芝豋城謂使者曰奉詔守城未聞有詔諭降也及宋主㬎次𤓰洲謝太后復賜庭芝詔曰比詔卿納欵日久未報豈未悉吾意尚欲固圉邪今吾與嗣君既已臣伏卿尚為誰守之庭芝不答命𤼵弩射之一使斃餘皆奔去阿珠乃遣兵守髙郵寶應以絶其餉道復遣使者持帝手詔招降庭芝開壁納使者斬之焚其詔于陴上既而淮安盱眙泗州以糧盡皆降庭芝猶括民間粟以給兵粟盡令官人出粟粟人盡令將校出粟雜牛皮麴糵以給之兵有自食其子者然猶力戰不屈姜才聞髙郵米運將至出步騎五千戰于丁村自夜逹旦董士元一名布哈字長卿文炳長子戰死阿珠使巴延徹爾舊作巴顔察爾今改救之所將皆阿珠麾下才軍識其旗幟皆濱才脱身走阿珠請帝降詔赦庭芝焚詔殺使之罪令早歸欵庭芝不納㑹福州召命至庭芝令制置副使朱煥守揚而自與姜才將兵七千趨泰州將東入海庭芝既行煥即以城降阿珠分道追及庭芝殺步卒千餘人庭芝走入泰州阿珠圍之㑹姜才疽𤼵背不能戰泰州裨將孫貴胡惟孝開北門以降庭芝赴蓮池中水淺不死遂興姜才俱被執至揚州阿珠責其不降才曰不降者我也憤罵不已猶愛其才勇未忍殺之朱煥請曰揚自用兵以來積骸滿野皆庭芝與才所為不殺之何俟阿珠乃皆殺之揚民聞者英不泣下阿珠既破揚州攻真益急趙孟錦乗霧出襲霧聞衆見其兵少逐之孟錦豋舟失足墮水中死焉城遂䧟苗再成不屈死帝召阿珠入城賜泰興户二千為食邑宋趙與檡圍婺州董文炳拒卻之宋楊亮節居中秉權與檡多所諫止遂犯忌嫉諸將俱憚之至是遣與檡出兵浙東宋廷臣皆言與檡有劉更生之忠曹王皋之孝宜留輔以隆國本譖者益急卒遣之封宋謝太后為夀春郡夫人謝太后以病久留臨安至是自宫中舁其牀以出侍衛七十人遂赴燕降封夀春郡夫人九月命阿嘍罕逹春等分道將兵入閩廣阿嘍罕董文炳及䝉古台索多以舟師出明州逹春及吕師夔李恒等以騎兵出江西阿爾哈雅將兵入廣西宋都統馬塈宕昌人力戰禦之初宋徴知邕州馬塈入衛未行而臨安破因留静江總屯戍諸軍㑹帝使阿爾哈雅取廣西塈發所部及諸峒兵守静江而自將三千人守嚴關在今桂林府興安縣西南為楚粤咽喉前軍攻之不克乃以偏師入平樂宋郡今為府屬廣西過臨桂宋縣今屬桂林府夾攻塈塈退保静江阿爾哈雅使人招降塈𤼵弩射之攻三月塈夜不解甲前後百餘戰城中死傷相藉訖無降意冬十月宋文天祥帥師次于汀州天祥遣趙時賞字宗白和州人宋宗室子等將一軍趨贛以取寧都吳浚將一軍取雩都漢縣今屬贛州府劉洙字淵伯廬陵人等皆自江西起兵㑹之吕師夔等將兵入梅嶺遂克韶州初東莞唐縣今屬廣州府民熊飛以兵應趙溍攻梁雄飛于廣州雄飛遁飛遂取韶州新㑹隋縣今屬廣州府令曾逢龍亦帥兵至廣州李性道出迎謁飛與逢龍執而殺之溍遂入廣州至是吕師夔等將兵度梅嶺溍使飛及逢龍拒之于南雄宋置州今為府屬廣東逢龍敗死飛走韶州追圍之守將劉自立以城降飛巷戰兵敗赴水死溍棄廣州遁去十一月阿嘍罕董文炳入處州宋趙與檡等逆戰于瑞安宋置府今為縣屬温州府敗績死之與檡與弟與慮子孟備及觀察使李世逹監軍趙由􅀈察訪使林温被執皆不屈而死知處州李珏知瑞安府方洪俱以城降宋史作洪率衆巷戰兵敗俱死與綱目不同宋陳宜中張世傑奉益王昰遁入海阿嘍罕兵至建寧府執守臣趙崇機知邵武軍趙時賞等皆棄城去陳宜中張世傑備海舟奉其主昰及衛王楊太妃等豋舟時軍十七萬人民兵三十萬人淮兵萬人與北舟相遇值天霧晦冥不辨舟得以進宋福建招撫使王積翁以福州降先是宋以積翁知南劔州備禦上三州副使黄恮知漳州備禦下三州積翁聞兵至棄城走福州遣人送欵軍前至是阿嘍罕軍至福安積翁為内應遂與知州王剛中同降宋益王昰走潮州十二月宋招撫使蒲夀庚以泉州降昰泊舟泉州港招撫使蒲夀庚迎謁請留駐張世傑不可初夀庚提舉市舶擅舶利者三十年或勸世傑留夀庚不遣則凡海舶不令自隨世傑不從縱之歸繼而舟不足乃掠其舟並沒其貲夀庚怒殺宋宗室及士大夫與淮兵之在泉者宜中等乃奉昰趨潮州夀庚遂與知泉州田子真以城降阿嘍罕克興化軍宋知軍事陳文龍死之王剛中既降遣使至興化軍文龍斬之而發民兵固守阿嘍罕復遣使招之文龍復斬之使部將林華伺于境上華反導阿嘍罕兵至城下通判曹澄孫開門降執文龍欲降之文龍指其腹曰此皆節義文章也可相逼邪卒不屈乃械送杭州文龍不食死後阿嘍罕北歸文龍之姪瓚復舉兵殺林華搌興化未幾復為索多所破瓚死之屠其民宋置制副使張珏復取瀘涪州時廣西川行院合兵萬人圍重慶肆于剽掠軍政不一故久無功而城中益得自守張珏雖領重慶之命宋前以珏為四川制置副使知重慶府不能赴留合州為拒守計且遣兵䧟瀘涪二州及圍兵以不和而潰珏乃得入城遣將四出兩川軍屢敗阿爾哈雅破静江坑其民宋都統馬塈死之廣西州郡皆平阿爾哈雅為書許塈以江西大都督塈不聽又請帝親降手詔諭之塈焚詔斬其使静江以水為固阿爾哈雅乃築堰㫁大陽在今臨桂縣源出靈川縣思磨山下東流合于桂江小溶一名小融江在興安縣西與大融江合二江以遏上流决東南埭以涸其隍城遂破塈卒死士巷戰刀傷臂被執㫁其首猶握拳奮起立踰時始仆阿爾哈雅悉坑其民分兵取鬱林潯容藤梧等州宋廣西提刑鄧得遇字逹夫卭州人聞静江破朝服南望拜辭投南流江在今思恩府武縁縣東南源出上林縣大明山而死宋益王昰次惠州遣使奉表請降昰次于惠之甲子門在今海豐縣東海口有大石壁立上下各有六十甲子字故名遣倪宙奉表詣軍前請降索多命其子元帥伯嘉努舊作百家奴今改偕宙赴燕命諸將分道入兩川詔以哈坦竒爾濟蘇舊作濶里吉思今改領東川行樞宻院攻合州布哈李徳輝字仲實通州潞縣人領西川行樞宻院攻重慶仍令徳輝留成都給軍食丁丑十四年宋益王昰景炎二年春正月宋文天祥移屯漳州汀守黄去疾及吳浚以汀州降汀闗既破天祥欲據城拒敵汀守黄去疾聞益王航海擁兵有異志天祥乃移屯漳州時趙孟濚等軍還惟吳浚不至未幾浚與去疾俱叛宋降浚降後復至漳州説天祥降天祥貴以大義斬之命道士張宗演道陵之後居信州龍虎山領江南道教詔封宗演為嗣漢天師潢道靈冲和真人命百官郊勞待以客禮二月詔諸將班師留潛説友為福州宣慰使王積翁副之時北方有警帝詔諸將班師凡諸將及淮兵在福安者命李雄統之潛説友尋為雄所殺已而淮兵在福州者謀殺王積翁以應張世傑事覺皆為積翁所殺以西僧嘉木揚喇勒智舊作楊璉真加今改總攝江南釋教除僧租税禁擾寺宇者夏四月宋廣東制置使張鎮孫字鼎卿惠州人復取廣州先是吕師䕫軍至廣州州人趙若岡以城降廣東諸郡皆下至是宋張鎮孫襲廣州復取之張世傑亦將兵入潮州宋文天祥引兵自梅州出江西天祥進兵復取梅州提兵出江西吉贛兵皆㑹之遂復取㑹昌縣宋縣今屬贛州府淮人張徳興傅髙起兵䧟黄州夀昌軍殺湖北宣慰使鄭鼎徳興與淮西野人原寨劉源等起兵司空山民傅髙應之遂䧟黄州夀昌軍用宋景炎年號賈居貞使鄭鼎將兵拒之鼎言鄂之大姓皆與髙通請先除之以絶禍本居貞不可鼎將行留其所善部將曰聞吾還軍汝就舉烽城樓内外合𤼵當盡殺城中大姓鼎與徳興遇于樊口戰敗溺死後五月淮西宣慰使昂吉爾等將兵襲破司空山寨殺徳興執其三子以去髙變姓名出走尋被獲殺之六月宋文天祥入雩都秋七月使趙時賞等分道復取吉贛諸縣遂圍贛州時衡山人趙璠撫州人何時等咸起兵應天祥諸縣豪傑悉遣人如軍中受約束臨洪諸郡皆阿之惟贛州不下諸王錫里濟舊作昔里吉今改刦北平王諾摩罕及安圖以叛命巴延討平之諸王錫里濟刦北平王于阿里瑪圖舊作阿力麻里今改之地械繫右丞相安圖脅諸王以叛使通好于海都海都弗納遂率兵至和林城北帝命巴延率軍往禦之巴延與共衆遇于鄂勒歡舊作斡魯懽今改河夾水而陣相持彌日俟其懈掩擊破之錫里濟走死宋張世傑㑹師攻蒲夀庚于泉州遂復取邵武軍世傑以福州軍北還自將淮兵攻蒲夀庚時汀漳諸路劇盜陳弔眼及許夫人所統諸峒畬軍皆㑹兵勢稍振夀庚閉城自守世傑遂傳檄諸路遣將復取邵武軍八月江西宣慰使李恒襲宋文天祥于興國縣宋縣今屬贛州府天祥兵潰走循州其將鞏信安豐軍人趙時賞等皆死之李恒遣兵援贛而自將攻天祥于興國天祥不意恒猝至遣兵戰鐘步不利時鄒㵯聚兵數萬于永豐天祥引兵就之㑹㵯兵先潰恒追天祥至方石嶺在興國縣東北及之鞏信以短兵接戰恒駭其以寡敵衆疑有伏斂兵不進信坐巨石餘卒侍左右箭雨集屹不動恒從間道就視之創被體而死不仆天祥至空坑兵盡潰時趙時賞坐肩輿後追兵問為誰時賞曰我姓文衆以為天祥擒之恒遍求俘虜人識認有曰此趙督參時賞也天祥由是得與杜滸鄒㵯乘騎逸去至循州散兵頗集天祥妻子及幕僚客將皆被執時賞至隆興奮罵不屈有係累至者輙麾去云小小簽㕔官耳執之何為得脱者甚衆臨刑劉洙頗自辨時賞叱曰死耳何必然于是被執者皆死恒送天祥妻子家屬于燕二子死于道九月宋益王昰遷于潮州之淺灣今潮州南澳山相近有錢澳或曰即淺灣詔逹春等將兵入大庾嶺帝詔逹春與吕師䕫李恒等以步卒入嶺䝉古台索多蒲夀庚及元帥劉深等以舟師下海合追二王索多遣兵援泉州宋張世傑走歸淺灣世傑使謝洪永進攻泉州南門不利蒲夀庚復陰賂畬軍攻城不力得間道求救于索多至是索多來援世傑觧圍還淺灣參政葉特密什舊作也的迷失今改復取邵武遂入福州冬十月丙辰朔日食宋復以陸秀夫同簽書樞宻院事秀夫之謫張世傑讓陳宜中曰此何如時動以臺諌論人宜中惶恐亟召秀夫還時宋播越海濵庶事疏畧楊太妃垂簾與羣臣語猶自稱奴毎時朝㑹獨秀夫儼然正笏立如治朝或時在行中悽然泣下以朝衣拭淚衣盡濕左右無不悲慟者十一月逹春㑹兵克廣州初逹春令索多取道泉州泛海㑹于廣之富場一名官富場在今廣州府新安縣東南索多既取興化軍及漳州進攻潮州宋守臣馬發竭力拒守索多恐失期乃舍之而去至惠州與吕師䕫合軍趨廣州宋制置使張鎮孫以城降逹春遂夷廣州城劉深將兵襲淺灣宋張世傑奉益王昰走秀山一名虎頭山俗號虎頭門在今廣州府東莞縣西南海中遂至井澳在今廣州府香山縣南海中横琴山下昰至井澳颶風壊舟溺水幾不救遂得驚疾旬餘諸兵士稍集死者過半劉深襲井澳宋益王昰奔謝女峽一名仙女澳亦在今香山縣境海中陳宜中逃之占城昰復入海至七里洋當作九星洋方與紀要海中有九曜山羅列如九星洋因以名欲往占城陳宜中請先往諭意度事不可為遂不返遣兵伐􅃡方輿紀要古西南夷後漢禪國也在唐謂之驃國至宋始謂之緬元于緬城置邦牙宣慰司明置緬甸宣慰司去雲南布政司三十八程後失初朝廷屢遣使徴緬朝貢不從而率衆侵擾永昌雲南行省遣兵伐之降其砦三百餘而還戊寅十五年宋益王昰景炎三年五月以後衛王昺祥興元年春正月布哈將兵入重慶宋制置副使張珏死之西川州縣皆平西川行院布哈督汪良臣等兵入重慶李徳輝為書與張珏曰君之為臣不親于宋之子孫合州為州不大于宋之天下珏不答布哈至城下營浮屠造梯衝將攻之珏悉衆與良臣鏖戰良臣身中四矢明日督戰益急珏與伊蘇岱爾舊作也速䚟兒今改戰扶桑壩在今重慶府東分軍從後合擊之珏衆大潰其夜都統趙安等以城降珏率兵巷戰不支歸索鴆飲不得乃順流走涪布哈遣舟師邀之遂被執至安西砦名在今涪州西解弓弦自經死先是瀘州食盡宋安撫王世昌自經死涪州守將王明亦以城破不屈被殺紹慶南平䕫施恩播諸州皆相繼降附定武官承襲之制凡有功陞秩者原職令他有功者居之不得令子姪復代陣亡者始得襲病死降一等總把百户老死者不襲著為令三月索多將兵克潮州逹春令索多還攻潮州宋馬發城守益備索多塞塹填濠造雲梯鵝車日久急攻發潛遣人焚之凡相拒二十餘日而敗發死之索多屠其民以許衡領太史院事元初承用金大明歴歳久寖疏帝欲釐正之乃命王恂字敬甫中山唐縣人及楊恭懿郭守敬字若思順徳邢臺人測驗改正而以張文謙字仲謙邢州沙河人張易董之恂言歴家知歴數而不知歴理宜得許衡總之遂命衡領太史院事三月以索多等行省事于福州倪宙至燕帝召逹春等北還議二王事宜乃留索多蒲夀庚行省事鎮撫瀕海諸郡宋文天祥收兵復出麗江浦在今惠州府海豐縣南合龍津蛟溪諸水東流入海即長沙海口也天祥以弟璧及母在惠州乃趨之行收兵出海豐縣遂次于麗江浦宋益王昰遷于碙洲在今髙州府吳川縣南屹立海中當南北道宋以曾淵子為參知政事淵子起兵據雷州軍前屢使人諭降不聽進兵攻之淵子奔碙洲宋以為參知政事廣西宣諭使夏四月宋益王昰卒宋人立其弟昺昰卒年十一後塟于厓山宋人諡之曰端宗羣臣多欲散去陸秀夫曰度宗皇帝一子尚在將焉置之古人有以一旅一成中興者今百官有司皆具士卒數萬天若未欲絶宋此豈不可為國邪乃與衆共立衛王昺年八歳矣時有黄龍見海中因改元祥興升碙洲為翔龍縣楊太妃仍同聽政陳宜中入占城宋人日候其還宜中竟不至五月宋張世傑攻雷州不克世傑使張應科王用將兵取雷州應科三戰不利用遂降應科収兵復戰敗死世傑悉衆圍城城中絶糧士以草為食史格漕欽亷髙化糧以給之世傑引還六月宋衛王昺遷于新㑹之厓山在今廣州府新㑹縣南大海中亦曰厓門山時宋軍所泊居雷化犬牙處而厓山在鉅海中與竒石山相對立如兩扉潮汐之所出入也故有鎮戍張世傑以為天險可扼以自固乃奉其主昺移駐遣人入山伐木造行宫軍屋千餘間行宫正殿曰慈元楊太妃居之升廣州為祥興府是年二月宋都統淩震復取廣州時官民兵尚二十餘萬多居于舟資糧取辦于廣右諸郡海外四州復刷人匠造舟楫製器杖至十二月罷詔以張洪範為都元帥李恒副之將兵入閩廣𢎞範言張世傑復立衛王閩廣響應宜進取之帝以𢎞範為䝉古漢軍都元帥賜寶劔專決軍事洪範薦李恒自副從之𢎞範至揚州選將校發水陸之師二萬分道而南帝復命逹春留後供軍費秋七月宋湖南制置使張烈良等起兵應厓山與阿爾哈雅戰敗死之海南州縣皆平烈良及提刑劉應龍起兵以應厓山雷瓊全永與潭屬縣之民周隆賀十二等咸應之帝命阿爾哈雅往討斬隆十二烈良等奔思州烏羅洞軍復襲之皆戰死阿爾哈雅畧地海外遣人招宋瓊州安撫趙與珞降與珞不聽率兵拒于白沙口在今瓊州府北海口港南岸一名神應港又曰白沙津未幾州人執與珞以降阿爾哈雅裂殺之由是瓊南寧萬安吉陽諸州縣及八番羅甸諸蠻皆相率降附汰江南冗官阿哈瑪特奏立江西𣙜茶運司及諸路轉運鹽使司宣課提舉司宣課司官吏多至五百餘人至是崔斌言江南官冗杭州地大民衆阿哈瑪特以私愛任其子巴蘇呼舊作抺遠忽今改且阿哈瑪特先自陳免其子弟之任今乃身為平章而子若姪或為參政或為尚書或領將作監㑹同舘一門悉處要津有虧公道帝命罷黜之然終不為阿哈瑪特罪既而淮西宣慰使昻吉爾入朝亦以官冗為言于是詔江西省併入福建罷𣙜茶營田司歸本道宣慰司罷漕運司歸行省八月有星隕于廣南色紅大如箕中爆烈為五殷如雷鳴一時頃止宋加文天祥少保信國公張世傑越國公天祥聞衛王昺繼立上表自劾兵敗江西之罪乞入朝不許而加官爵天祥移書陸秀夫云天子幼冲宰相遁荒詔令皆出諸公之口豈得以遊詞相拒㑹軍中大疫士卒多死天祥母亦病歿尋起復之天祥長子復亡家屬皆盡冬閏十一月張𢎞範襲執宋文天祥于五坡嶺在今海豐縣北天祥屯潮陽鄒㵯劉子俊字民章廬陵人皆集師㑹之遂討劇盜陳懿劉興于潮興死懿遁以海舟導張𢎞範兵濟潮陽天祥帥麾下走海豐先鋒將張𢎞正𢎞範弟追之天祥方飯五坡嶺𢎞正兵突至衆不及戰天祥遂被執吞腦子不死鄒㵯自剄劉子俊自詭為天祥冀可免天祥及天祥至各爭真偽遂烹子俊天祥至潮陽見𢎞範左右命之拜天祥不屈𢎞範釋其縳以客禮之天祥固請死𢎞範不許處之舟中求族屬被俘者悉還之十二月西僧嘉木揚喇勒智發宋紹興諸陵嘉木揚喇勒智利宋殯宫金玉發諸陵在紹興者及大臣塜墓凡一百一所又欲裒諸陵骨雜牛馬枯骼為鎮南浮屠㑹稽人唐珏字玉潛獨痛憤乃貨家具行貸得百金為酒食陰召諸惡少泣曰爾輩皆宋人吾不忍陵骨之暴露欲以他骨易之已造石函六刻紀年一字為號自思陵以下隨號收殯衆如珏言夜往取遺骸𦵏蘭亭山一名蘭渚山在今山陰縣西南即晉王羲之修禊處後人移宋故宫冬青樹植其上以識聞者悲之己卯十六年宋衛王昺祥興二年是年二月昺溺于海春正月張𢎞範將兵襲厓山𢎞範由潮陽港乘舟入海至甲子門獲斥堠將知衛王昺所在乃至厓山或謂張世傑曰北兵以舟師塞海口則戰不能進退盍先據之幸而勝國之福也不勝猶可西走世傑恐久在海中士卒離心動則必散乃曰頻年航海何時已乎今湏與決勝負遂焚行朝草市結大舶千餘作一字陣碇海中中艫外舳貫以大索四周起樓棚如城堞奉衛王居其間為死計人皆危之厓山北淺舟膠不可進𢎞範由山東轉而南入大洋與世傑之師相遇薄之且出騎兵㫁其汲路世傑舟堅不能動𢎞範乃舟載茅茨沃以膏脂乘風縱火焚之世傑戰艦皆塗泥縳長木以拒火舟不爇𢎞範無如之何時世傑有甥韓在軍中𢎞範三使韓招世傑世傑不從曰吾知降生且富貴但義不可移爾因歴數古忠臣以答之𢎞範乃命文天祥為書招世傑天祥曰吾不能扞父母乃教叛父母可乎固命之天祥遂書所過零丁洋詩與之其末有云人生自古誰無死留取丹心照汗青𢎞範笑而置之𢎞範復遣人語厓山士民曰汝陳丞相已去文丞相已執汝復欲何為士民亦無叛者零丁洋在今香山縣東𢎞範乂以舟師據海口世傑兵士茹乾糧十餘日下掬海水飲之水鹹飲即嘔泄兵士大困世傑帥蘇劉義方興等旦夕大戰既而李恒自廣州以師來㑹𢎞範命恒守厓山北宋合州守將王立以城降東川州縣皆平東川行院恥功不立乃辭西川而自以兵圍合州宋守將王立以夙與東川有深怨懼誅乃使使間行至成都請降于李徳輝徳輝單舸濟江至合城下呼立出降安集其民合人徳之于是東川州縣皆降附二月張𢎞範及宋張世傑戰于厓山世傑兵潰陸秀夫負其主衛王昺赴海死之世傑復收兵至海陵山在今肇慶府海陽縣南舊名羅州人名羅島舟覆而死宋都統張逹乘夜襲𢎞範軍敗還𢎞範乃四分其軍自將一軍相去里許令諸將曰宋舟西艤厓山潮至必東遁急攻之聞吾樂作乃戰違令者斬時黑氣出山東李恒乘早潮退攻其北世傑以淮兵殊死戰至午潮上軍中樂作世傑以為且懈不設備𢎞範以舟攻其南世傑南北受敵兵士皆疲不能復戰俄有一舟檣旗仆諸舟之檣旗皆仆世傑知事去乃抽精兵入中軍諸軍皆潰翟國秀凌震等皆解甲降𢎞範麾兵進薄中軍㑹日暮風雨昏霧四塞咫尺不相辨世傑乃與蘇劉義㫁維以十六舟奪港而去陸秀夫走其主昺所居舟舟稍大且諸舟環結度不得出走乃先驅其妻子入海謂其主曰國事至此陛下當為國死徳祐皇帝辱已甚陛下不可再辱即負其主同溺後宫諸臣從死者甚衆餘舟尚八百盡為𢎞範所得越七日屍浮海上者十餘萬人因得昺屍及詔書之寶世傑行收兵遇楊太妃欲奉以求趙氏後楊太妃始知昺溺海之問撫膺大慟曰我忍死間關至此者正為趙氏一塊肉耳今無望矣遂赴海死世傑𦵏之海濵世傑趨占城土豪彊之還廣東乃囘舟艤南恩之海陵山散潰稍集謀入廣颶風大作將士勸世傑豋岸世傑曰無以為也登柁樓露香祝曰我為趙氏亦已至矣一君亡復立一君今又亡我未死者庶幾敵兵退别立趙氏以存祀耳今若此豈天意邪風濤愈甚世傑墮水溺死蘇劉義出海洋為其下所殺史臣曰宋雖起于用武而以仁傳家然仁之弊失于弱中世有欲自彊以革其弊用乖共方馴致棼擾建炎而後土宇分裂猶能六主百五十年而後亡豈非禮義足以維持君子之志歟既而宋之遺臣區區奉二王為海上之謀雖無救于亡然人臣忠于所事而至于斯其亦可悲也夫三月詔定州縣社稷制度詔太常寺考䆒州郡社稷制度禮官折􅇆前代參酌儀禮定祭祀儀式及壇􅀈祭器圖冩成書名曰至元州縣社稷通禮夏五月命道士張留孫字師漢信州貴溪人作醮事留孫初從張宗演入朝奏對稱㫖遂留侍闕下授元教宗師至是命作醮事奏赤章于天凡五晝夜既而復命李居夀建醮一如留孫事畢居夀請間曰皇太子春秋鼎盛宜預國政帝喜曰尋將及之秋九月詔皇太子參決朝政詔省院臺司之事皆先啓後奏冬十月宋文天祥至大都不屈囚之厓山之破張𢎞範等置酒大㑹謂天祥曰國亡丞相忠孝盡矣能改心以事宋者事今將不失為宰相也天祥泫然出涕曰國亡不能救為人臣者死有餘罪况敢逃其死而貳其心乎𢎞範義之遣使䕶送天祥赴燕道經吉州痛恨不食八日猶生乃復食十月至燕館人供帳甚盛天祥不寢處坐逹旦遂移兵馬司元史百官志至元九年改千户所為兵馬司凡二司一置北城一置南城設卒守之既而丞相博囉等召見于樞宻院欲使拜天祥長揖不屈仰首言曰天下事有興有廢自帝王以及將相滅亡誅戮何代無之天祥今日願早求死博囉曰汝謂有興有廢且問盤古至今幾帝幾王一一為我言之天祥曰一部十七史從何處説起吾今日非應博學鴻辭科何暇泛論博囉曰汝不肯説興廢事且道古來有以宗廟土地與人而復逃者乎天祥曰奉國與人是賣國之臣也賣國者有所利而為之必不去去者必非賣國者也予前除宰相不拜奉使軍前尋被拘執已而有賊臣獻國國亡當死所以不死者以度宗二子在浙東老母在廣故耳博囉曰棄徳祐嗣君而立二王忠乎天祥曰當此之時社稷為重君為輕吾别立君為宗廟社稷計也從懷愍而北者非忠從元帝為忠從徽欽而北者非忠從髙宗為忠博囉語塞忽曰晉元帝宋髙宗皆有所受命二王不以正是篡也天祥曰景炎乃度宗長子徳祐親兄不可謂不正登極于徳祐去位之後不可謂篡陳丞相以太皇命奉二王出宫不可謂無所受命博囉等皆無辭但以無受命為解天祥曰天與之人歸之雖無傳受之命推戴擁立亦何不可博囉怒曰爾立二王竟成何功天祥曰立君以存宗社存一日則盡臣子一日之責何功之有曰既知其不可何必為天祥曰父母有疾雖不可為無不下藥之理盡吾心焉不可救則天命也今日天祥至此有死而已何必多言博囉欲殺之帝及大臣不可𢎞範時在疾中亦表奏天祥忠于所事願釋勿殺乃囚之十二月増置宿衛宿衛舊領于四集賽集賽猶言分番宿衛也以太祖功臣博勒呼博爾濟穆呼哩濟拉衮四族子孫世領之具見前子孫世襲年勞既久即擢為一品或以才能任使貴盛雖極一日歸至内庭則執事如故其後集賽増至四千八百衛而累朝鄂爾多猶言宫室集賽尤多國之大費毎縻于此庚辰十七年春正月詔覈阿爾哈雅所俘户口放為民時阿爾哈雅下荆南江南廣南海南之地得州凡五十八峒夷山獠不可勝計行臺御史言其俘獲三萬人悉役為奴自置吏治之責其租賦詔行臺御史大夫姜衛檢覈之悉放為民都元帥張𢎞範卒諡武畧後改諡獻武平宋之功𢎞範居多還朝未幾瘴癘疾作遂卒後累封淮陽王三月帝如上都初帝定大興府為大都開平府為上都毎年三四月迤北草青則駕幸上都避暑頒賜于宗戚馬亦就水草焉八九月草將枯則駕回大都歳以為常今于是年具書往還餘不悉載秋七月以郝鎮耿仁並為中書丞阿哈瑪特貪横益肆援引參知政事郝鎮耿仁驟升同列内通貨賄外示威刑廷中相視無敢言者八月集賢大學士兼國子祭酒許衡致仕衡以疾乞致仕皇太子請以其子思可為懐孟路總管以便侍養且遣使諭之曰公毋以道不行為憂也公安則道行有時矣翰林學士承㫖姚樞卒諡文獻自樞應召中州名儒接踵而出論者謂樞實有以倡之及是卒九月帝還大都冬十月以阿嘍罕為右丞相大發兵擊日本注見前初帝屢遣使徃通日本不納乃命鳳州經畧使實都舊作忻都今改伐之無功而還復遣禮部侍郎杜世忠等使其國亦不報且執世忠等殺之至是命阿嘍罕為右丞相范文虎洪察球舊作茶爾邱今改為右丞李庭本金人富察氏歸元後改李氏家壽光張巴圖參知政事並行中書省事率師十萬以往時髙麗王暙來朝願益兵併擊之加暙行省右丞相遣使窮河源以逹實舊作都實今改為招討使往求河源四閲月始抵其地河源出吐番朶甘思元置朶甘思宣慰司在今青海境内西鄙有泉百餘泓方可七八十里燦如列星名鄂端諾爾即今鄂敦塔拉舊作火敦腦兒今改羣流奔輳近五七里滙二巨澤名敖拉諾爾即今扎稜諾爾鄂稜諾爾舊作阿拉腦兒今改東騖成川號齊必勒舊作赤賔河今名郭羅珪諾爾又合伊爾齊舊作亦里赤呼蘭舊作忽蘭伊拉齊舊作也里术今並改三河始名黄河又岐為八九股名也孫鄂洛木舊作也孫斡倫今改譯言九渡自是行二十日有大雪山名伊拉瑪博囉舊作亦爾麻不莫剌今改今名阿木尼瑪勒占木遜山西番語謂祖為阿木尼䝉古語謂瑪勒占為花色水為木遜以山石斑駁上多氷雪為青海望山故尊而名之其山最髙譯言騰格哩哈逹舊作謄乞里塔今改䝉古語謂天為騰格哩哈逹山峯也即崑崙也今阿木尼瑪勒占木遜山為積石山河流其南誤作崑崙非是河繞崑崙南行十餘日有水西南來名納琳哈剌舊作呐隣哈喇今改譯言細黄河也又兩日水南來名竒爾穆蘇舊作乞兒馬出今改二水合河北流復折而西流過崑崙北又轉而東北約行半月至貴徳州元置今為歸徳堡在河州西又四五日至積石州元置明廢在今河州西以有小積石山故名即禹貢積石河州西之小積石本名唐述山誤為禹貢積石非是始入中國逹實還報並圖其城傳位置以聞焉按此説本潘昻霄河源志及朱師本所譯帝師梵字圖書元史採入地里志河源附録今為之節錄如右但其説亦多附㑹不實如以大雪山為崑崙是崑崙反在河源之下既與爾雅諸書不合又以導河積石之文誤屬河州之小積石而於大雪山之為真積石者反被以崑崙之名彼此混淆錯互更甚葢篤什祇能以䝉古字言其山川形勢之大概昻霄不加詳考譯以漢文妄引經傳證之遂至名實乖謬至其力斥張騫所言何源出鹽澤之文為謬妄則尤非是考史記大宛傳云于寘之西水皆實流其東水東流注鹽澤鹽澤潛行地下其南則河源出焉又云漢使窮河源河源出于寘其山多玉石采來天子案古圖書名河所出山曰崑崙云漢書西域傳河水一出葱嶺一出于闐合注蒲昌海一名鹽澤者也潛行地下南出于積石為中國河山海經注云敦薨之水西流注泑澤實為河源水經注云河水東注蒲昌海即河水之所潛出于積石者也又云河水重源發于西塞之外出于積石之山是河水之出葱嶺于注鹽澤潛行至積石又出而為中國河源者諸書都無異説以今輿地考之葱嶺在囘部葉爾羗西于闐即今和闐在葉爾羗東南蒲昌海即今羅卜諾爾在回部闢展西南葉爾羗河和闐河合而東蒲為他里末河厄爾勾河又東注于羅布淖爾即古所謂河水一出葱嶺一出于闐合注蒲昌海者也羅卜諾爾上承千餘里長河之水奫淪渟滀伏流地中而其南磧地數百里之間時有小水上泛成澤潛行之迹宛然積石山在今青海境内名阿木尼瑪勒占木遜山其西有三山曰巴延哈喇曰巴爾布哈曰阿克塔沁總名枯爾坤當羅卜諾爾之東南境其巴顔哈喇山東麓冇泉出焉是為阿勒坦河東北流三百餘里有泉千百泓厯厯如星名鄂敦塔拉實為河水潛行復出之象即所謂星宿海也從此彚合諸泉至阿木尼瑪勒占木遜山東成二巨澤曰扎稜諾爾卾稜諾爾自二諾爾流出繞山南折北又折而東南行始各黄河入陜西河州界即古所謂河自蒲昌海潛行至積石復出而為中國河源者也黄河大源發于崑崙至蒲昌海潛行復出而發于積石故曰河有重源也我朝康熙年間遣使往窮河源得于枯爾坤山視元史所載為尤詳但其時未平囘部故河出葱嶺于闐合注蒲昌海之説未得其証今者西域㡳定囘部内屬凡古所稱葱嶺于闐蒲昌海諸境俱𨽻版圖爰舉史漢諸書所謂出葱嶺于闐合流注鹽澤而潛行者按之今時形勢適相符合是謂積石以上之河源即漢張騫所求而得之者不得謂其鑿空無據但惜其言之未悉致啟後人之疑耳至崑岡出玉之文見于尚書今和闐産玉與史記河源出于闐其山多玉石之説相合是和闐之山亦屬崑崙一脈所分故河從此出亦爾雅所謂河出崑崙墟之一証也十一月行授時歴郭守敬等以為金雖改歴止以宋紀元歴㣲加増益未嘗測驗于天况冬至者歴之本而求歴本者在驗氣汴宋舊儀今多不恊乃與南北日官陳鼎臣等創建儀象圭表為器凡十有三曰簡儀曰侯極儀曰渾天象曰玲瓏儀曰仰儀曰立運儀曰證理儀曰景符曰窺几曰日月食儀曰星晷定時儀曰九表懸證儀曰座正儀復遣監候官十四人分道測驗凡二十七所東至髙麗西極滇池南踰朱崖北盡鐵勒徧參歴法酌取中數成新歴上之言自漢以後歴法經七十改創法者十三家西漢造三統歴東漢造四分歴劉洪造乾象歴南北朝後秦姜岌造三甲子歴宋何承天造元嘉歴祖冲之造大明歴隋張子信造新歴劉焯造皇極歴唐傅仁圴造戊寅元歴李淳風造麟徳歴一行造大衍歴徐昻造宣明歴宋姚舜輔造紀元歴今所考正者凡七事一曰冬至二曰嵗餘三曰日躔四曰月離五曰人交六曰二十八宿距度七曰日出入晝夜刻所創法者五事一曰太陽盈縮二曰月行遲疾三曰黄赤道差四曰黄赤道内外度五月白道交周其法視古加宻而又悉去諸歴積年月日法之傅㑹者一本天道自然之數可以施之永久而無弊歴上賜名曰授時頒之天下平章政事亷希憲卒後追諡文正希憲自江陵以疾召還太子遣使問之希憲曰臣疾無足憂所憂者大姦誤國羣小附之病之大者也尋卒巴顔嘗曰亷公宰相中真宰相男子中真男子世以為名言大徳間贈太師恒陽王十二月殺江淮行省平章政事阿里布舊作阿里伯今改右丞雅克特穆爾左丞崔斌斌發阿哈瑪特姦蠧海内稱快尋遷斌江淮行省左丞阿哈瑪特慮其害己乃奏理算江淮行省錢榖誣構斌與阿里布等盜官糧四十萬及擅易命官八百餘員命都事劉正字清卿清州人等往案獄弗具復遣參政張澍等雜治之竟置斌等于死斌有文學逹政術附阿爾哈雅取荆湖廣海屢建大功多所全活太子聞殺斌方食投箸惻然遣使止之不及天下寃之昭文館大學士竇黙卒諡文正黙為人樂易平居未嘗出一言方人物至論國家大計靣折廷諍人謂可比汲黯帝嘗曰朕求賢三十年得一竇漢卿及李俊民字用章澤州人隱居嵩山嘗召見旋乞還卒賜諡莊靜先生又曰如竇漢卿之心姚公茂之才合而為一可謂全人矣累贈太師封魏國公漳州民陳桂龍據髙安砦在漳州府龍溪縣西北命福建都元帥卾勒哲圖奇卜察克人舊作完者都今改等擊走之桂龍及其兄子陳弔眼有衆數萬屯髙安砦據之命卾勒哲圖及副帥髙興字功起蔡州人討之時建寧賊黄華勢尤猖獗卾勒哲圖先引兵壓其境軍威大振華驚懼乞降卾勒哲圖奏以華為副元帥凡軍行悉以咨之桂龍等乘髙為險人莫敢進興命人挾束薪進至半山棄薪退如是六日誘其矢石皆盡乃爇薪焚栅斬首二萬級桂龍遁走桂龍既遁髙興等撃斬陳弔眼桂龍遂求降詔流之邉地既而黄華復叛聚衆幾十萬稱宋祥興年號詔史弼等討之華敗走自焚餘衆悉潰史弼字君佐蠡州博野人辛巳十八年春二月皇后鴻吉哩氏崩後追諡順聖皇后后性明敏逹於事機國家初政左右匡正與有力焉四集賽奏割京城外近地牧馬帝許之后將諌陽責劉秉忠曰汝何不諌若初定都時以地牧馬則可今軍民分業已定奪之可乎事遂止宋亡幼主入朝后不樂帝曰江南平自此不用兵甲人皆喜之爾何獨不樂后曰自古無千歳之國母使吾母子及見此則幸矣帝以宋府庫物置殿廷召后視之后一視而反帝問后何欲后曰宋人貯蓄以貽子孫子孫不能守而歸于我我又何取之邪宋太后全氏至京不習風土后屢奏乞令回江南帝不允后益厚待之遣皇太子行邊以巴延佐之帝諭太子曰巴延有文武才汝毋以常人遇之也集賢大學士兼國子祭酒致仕許衡卒諡文正衡病革家人祀先衡曰吾一日未死寧不有祀于祖考起奠獻如儀既徹而卒衡嘗語其子曰我平生虚名所累竟不能辭官死後慎勿請諡勿立碑但書許某之墓四字使子孫識其處足矣後贈司徒封魏國公從祀孔子廟庭秋七月阿嘍罕卒于軍八月諸將棄師于海島而還阿嘍罕既卒詔以左丞相安塔哈代之未至范文虎等已航海至平壺島一作五龍山籌海説日本國西有大漁洲謂之懸海其西有平壺島四面皆木可屯軍又西為五島有五山相錯即五龍山乃日本西境之盡處遇颶風敗舟諸將各擇堅艦乘之遁去棄士卒十餘萬于島衆推張百户者為帥方伐木作舟為歸計日本覘知之率衆襲殺殆盡惟餘南人萬餘不殺而奴之未幾得還者財三人閏八月括江南户口稅時京兆等路歳課自一萬九千錠増至五萬四千阿哈瑪特猶以為未實欲覈之上察其非而止冬十二月焚毁道書帝方信桑門之説詔樞宻副使張易參校道書言惟道徳經為老子所著餘皆後人偽撰詔悉焚之壬午十九年春二月遣諸王桑阿克逹爾舊作相吾荅兒續綱目作相荅吾兒今改擊􅃡尼雅斯拉鼎囘回人舊作納剌速丁今改自緬還言熟其形勢可擊遂以台布舊作太卜今改為右丞伊克徳濟錫喇婁人舊作也罕的厅錫喇婁舊作匣剌魯今改為參政命諸王桑阿克逹爾督諸軍復往擊之三月益都千户王著殺阿哈瑪特于闕下著因人心怨阿哈瑪特宻鑄大鎚與妖人髙和尚謀撃殺之時皇太子從帝如上都阿哈瑪特留守京師著以太子素惡其姦乃遣二西僧至中書詐稱皇太子還都作佛事省中疑之時髙觹字彦解渤海人張九思字子冇宛平人皆宿衛宮中詰之倉皇失對遂執之訊問不伏及午著復矯太子令俾樞宻副使張易發兵夜㑹東宫易不察遽以兵往觹問果何為易附耳語曰太子來誅左相也既而省中遣使出迎悉為偽太子所殺奪其馬入健徳門夜二鼓至東宫前立馬呼省官至前責阿哈瑪特數語著即牽去遂以銅鎚碎其腦立斃繼呼郝鎮至殺之囚右丞張惠字廷傑成都新繁人于是觹九思開門大呼曰此賊也叱衛士急捕之留守布敦舊作博敦今改持挺擊立馬者墜地衆奔潰多就擒髙和尚逃去惟著挺身請囚時帝在察罕諾爾方輿紀要在故開平衛西聞之即遣和爾果斯等歸討為亂者獲髙和尚于髙梁河與王著張易皆棄市著臨刑大呼曰王著為天下除害今死矣異日必有為我書其事者復以張易從著為亂將傳首四方張九思曰易應變不審則有之坐以與謀則過矣乞兔傳首從之夏四月以和爾果思為右丞相初昻吉爾岱舊作甕吉剌帶今改為右丞相至是降留守以和爾果斯代之皇太子謂曰阿哈瑪特已死汝任中書省事有便國和民者毋憚更張或有阻撓吾當力持之自是庶務更新省部用人多所推舉詔戮阿哈瑪特屍窮治其黨阿哈瑪特死帝猶不深知其姦及詢樞宻副使博囉舊作孛羅今改乃盡得其罪狀始大怒曰王著殺之誠是也命發塜剖其官戮屍于通元門外縱犬食之四民聚觀稱快籍其家得櫝蔵二人皮問之其妾云毎咒詛時置神座于上又以絹二幅畫甲騎圍守幄殿兵皆張弦挺刄内向如擊刺者狀涉不軌遂并誅其子呼遜等四人尋令中書省悉罷黜其黨與凡汰其官省部者七百十四又罷其濫設官府二百餘所又以郝鎮耿仁黨惡尤甚鎮已死命戮其屍下仁于獄誅之以張雄飛字鵬舉琅琊臨沂人為參知政事初阿哈瑪特欲誣殺秦長卿洛陽人劉仲澤伊瑪都木逹舊作亦麻都丁今改兵部尚書張雄飛力持不可阿哈瑪特使人㗖之曰誠能殺此三人當處以參政雄飛曰殺人以求大官不為也阿哈瑪特怒出為澧州安撫使三人竟死獄中後雄飛累遷御史中丞行御史臺事阿哈瑪特以子呼遜為江淮右丞恐不為所容改雄飛陜西按察使未行阿哈瑪特死召拜參知政事呼遜被逮敕廷臣雜問呼遜指宰執曰汝曾受我家錢何得問我雄飛曰我曾受否曰公獨無雄飛曰如是則我當問汝矣遂伏辜六月己丑朔日食命索多將兵擊占城不克引還初朝廷以占城既附遣索多就其國立省撫治之王子博第舊作補的今改負固弗率凡使臣經其國者皆執之帝怒命索多討之已而破其城王子遁入山谷後遣其臣巴圖特罕舊作寶脱秃花今改陽求歸附以欵師復潛殺所執使臣皇甫傑等百餘人索多等久之方覺其詐乃遣兵攻之轉戰至木城下阻隘不敢進賊兵旁截歸路軍殊死戰得出索多等遂引還秋七月戊午朔日食九月俱藍國入貢海外諸蕃惟馬八兒與俱藍足以綱領諸國而俱藍又為馬八兒後障自泉州至其境約十萬里遣招討使楊庭壁三往招之遂遣使貢寶貨及黒猿一自是海南諸蕃凡十國日馬八兒曰湏門那曰僧急里曰南無力曰馬蘭丹曰那旺曰丁呵兒曰來來曰急蘭亦䚟曰蘇木都喇皆以次遣使暨子弟上表來覲入貢遣使括雲南金定其賦税用金為則詔諸路歳舉儒吏各一人中書省掾史有闕選樞宻院御史臺六部令史轉用之令史則取諸路歳貢之數仍詔諸路歳貢儒吏儒必通吏事吏必知經史事者冬十月以宋衍聖公孔洙為國子祭酒提舉浙東學校孔子後自宋南渡初其四十八代孫端友子玠寓衢州事見前帝既平宋疑所立或言孔氏子孫寓衢者乃其宗子召洙赴闕洙遜于居曲阜者帝曰寧違榮而不違親真聖人後也遂命為國子祭酒兼提舉浙東學校十二月殺宋少保樞宻使信國公文天祥時有閩僧言土星犯帝座疑有變未幾中山有狂人自稱宋主有衆千人欲取丞相京城亦有匿名書言某日燒簑城葦率兩翼兵為亂丞相可無憂者朝廷疑之遂撮簑城葦遷瀛國公及宋宗室于上都疑丞相為天祥乃召天祥入諭之曰汝移所以事宋者事我當以汝為相矣天祥曰天祥為宋宰相安事二姓願賜之一死足矣帝猶未忍遽麾之退左右力贊從其請遂詔殺之于都城之柴市在今北城教忠坊西北隅天祥臨刑殊從容謂吏卒曰吾事畢矣南向再拜死其衣帶中有贊曰孔曰成仁孟曰取義惟其義盡所以仁至讀聖賢書所學何事而今而後庶幾無愧其妻歐陽氏收其屍面如生天祥既死帝臨朝歎曰文天祥好男子不肯為吾用殺之誠可惜也乃贈廬陵郡公諡忠武命王積翁書神主設壇祀之丞相博囉初行奠禮忽狂颷旋地起卷主入雲中博囉等即改書前宋少保右丞相信國公天始開霽方天祥之在獄也忠義之氣著於詩歌累數十百篇及死兵馬司籍所存上之觀者無不流涕悲慟有得其一履者亦寶蔵之尋有義士張毅甫者負其骨歸葬吉州適家人自廣東奉其母曾夫人之柩同日至城下人以為忠孝所感云史臣曰自古志士欲信大義于天下者不以成敗利鈍動其心君子命之曰仁以合天理之正即人心之安爾宋徳祐亡矣文天祥奉兩孱主﨑嶇嶺海以圖興復兵敗身執終不可屈而從容伏鑕就死如歸是其所欲自甚于生者可不謂之仁哉徴處士劉因初名駰字夢驥後改名因字夢吉保定容城人為右贊善大夫尋辭歸因天資絶人日記千百言過目成誦初為經學䆒訓詁注釋之説歎曰聖人精義殆不止此及得周邵程朱之書一見即曰我固謂當有是也及論諸子之所學則曰邵至大也周至精也程至正也朱子極其大盡其精而貫之正也愛諸葛孔明静以修身之語表所居曰静修博果宻一名時用字用臣世為瑭哩大人舊作不忽木塘哩舊作唐里今改薦之詔徴之至擢右贊善大夫未幾以繼母年老遂辭歸俸給一無所受詔御史臺得自選其屬初御史惟用漢人至是中丞崔彧字文卿𢎞州人請參取蒙古人用之又言臺察之選止由中書寧無偏黨之弊今宜令本臺得自選任從之既而江淮省臣有欲尃恣而忌臺察之言者上議欲以行臺𨽻行省詔廷臣雜議兵部尚書董文用曰御史臺譬之臥虎雖未噬人人猶畏其虎也今虚名僅存而綱紀猶不振更加抑之則風采恭然無復可望矣此不可行也遂止始海運大都糧運仰給江南者或自浙西渉江入淮由黄河逆流至中灤鎮名在開封府封邱縣南黄河北岸元初運道以此為中頓陸運至淇門亦鎮名在衛輝府汲縣東北入運河即衛河注見前以至京師又或自利津河即大清河下流大清河注見前或開膠萊河在萊州府平虔州東南膠州東北入海利津運道自淮逹泗入大清河至利津入海膠萊河分南北二流南流自膠州麻灣口入海北流經平度州至掖縣海倉口入海勞費無成初宋季有海盜朱清者嘗為富家傭殺其主亡入海島與其徒張瑄乘舟抄掠海上備知海道曲折尋就招懷為防海義民巴延平宋時遣清等載宋庫蔵諸物從海道入京師授金符千户二人遂言海運可通乃命總管羅璧字仲玉鎮江人暨瑄等造船六十艘運糧四萬六千餘石由海道入京然創行海洋亦逾年始至朝廷未知其例仍通舊運尋復因䝉古岱言海運為便遂立萬户府四總其事又併四府為都漕運萬户府止令清瑄二人掌之元時海運自平江路劉家港入海經通州海門縣開洋沿山嶼而行其道險惡已而朱清等開生道自劉家港開洋轉放大洋取道差為徑直後殷明畧又開新道從劉家港入海至崇明之三沙放洋向東行入黒水大洋取成山折而西至登州沙門島放大洋至直沽舟行風信有時自浙西至京師不過旬日而已縣劉家港今曰劉家口婁江下流也在太倉州鎮洋東北海門縣五代周置從圯于海今廢餘注見前篇癸未二十年春正月立鴻吉哩氏為皇后時帝春秋髙后頗預朝政相臣嘗不得見帝輒因后以奏事焉初鴻吉哩之族從太祖起兵有功尋立其女為后遂與約曰鴻吉哩氏生女世以為后生男世尚公主故元世諸后多其族焉詔停燕南河北山東租賦御史臺臣言燕南河北山東去歳旱災按察司已嘗閲視而中書不為奏免税糧民何以堪詔令有司權停勿徴時刑部尚書崔彧亦言自阿哈瑪特用貪吏河南北諸郡人不聊生江南既定中原之民相率南遷以避徭役者十八九數年之間亡失十五六萬餘户去家就旅豈人之情賦重政繁驅之至此乞特降詔㫖招集復業量免科役蠲除積欠給還事産郡縣長吏滿替以户口増耗為黜陟其徙江南不還者與土著之人一例差遣庶幾流亡自歸田野日闢詔下廷臣議行之河北流民渡河南就食者朝廷遣使止之按察副使程思亷曰河南河北皆吾民也縱其渡河全者甚衆程思亷字介甫東勝州人三月廣州亂討平之廣州民林桂方等擁衆萬餘稱羅平國改元延康官軍擒斬之餘黨悉平夏四月復命髙麗王暙及安塔哈𤼵兵擊日本帝憤日本襲殺島中軍命髙麗王暙及安塔哈領征行省左丞相率師往擊之詔各路拘集水手又造船五百餘艘民不勝苦中丞崔彧及昻吉爾皆諌止不從五月罷採民間女子初有詔採民間女子入内有司夤縁為害耶律鑄字成仲楚材子請令大郡歳貢三人小郡二人庶不大擾至是復因崔彧言罷之六月詔増給官吏俸初詔定官吏贜罪法自五十貫以上皆決杖除名不敘百貫以上者死崔彧言今百官月俸不能副贍養之資難責以亷勤之操宜更議増庶官月俸所増俸鈔雖賦之于民官吏不貪民必受惠其有以貪抵罪又復何辭遂詔内外官吏俸以十分為差増給五分詔四川行省擊溪洞蠻平之思播以南施黔鼎澧辰沅之界各州注俱見前九溪十八洞蠻獠叛服不常詔四川行省討之參政竒爾濟蘇舊作曲里吉思今改等鑿山開道分兵並進諸蠻伏險以拒然衆寡不敵多就擒戮其酋長率衆來降詔分其地郡縣之大者為州小者為縣並立總管府聽順元路宣慰司節制冬十一月桑阿克逹爾擊緬破之西南夷十二部俱降諸王桑阿克達爾右丞台布等分道攻緬江頭城在緬甸北破之遂遣使招諭其王不應以建都太公城在江頭城南乃其巢穴復進軍㧞之初金齒百蠻之俗以金塗其齒者曰金齒蠻元初置金齒宣撫司于銀生厓甸後以逺不可守移于近地今雲南永昌府治是也諸夷欲降制于緬不能逹既克二城遂俱來降明年緬酋來降遂于蒲甘緬城置邦牙宣慰司以兵戍之蒲甘緬城在緬甸西南甲申二十一年春正月羣臣上尊號時議欲肆赦張雄飛諌曰古人言無赦之國其刑必平故赦者不平之政也聖明之世豈宜數赦上納之遂止下輕刑之詔二月遷宋宗室及大臣之仕者于内地時荆湖閩廣間兵興無寧歳有言宋宗室居江南欲反者遣使捕之率衛士諤爾根薩里輝和爾人舊作阿魯暉薩里今改曰江南初下民心未附宋宗室反不聞郡縣言而信一人浮言輒捕之恐人人自危矣帝悟召使者還尋詔遷宋宗室及大臣之仕者于内地遣王積翁使日本未至舟人殺之帝以其俗尚佛遣積翁與補陀山名在寕波府定海縣東海中梵名補陀洛迦華言小白華也亦名普陀山僧如智航海以往舟人有不願行者共謀殺積翁秋七月詔鎮南王托歡帝第九子假道安南擊占城帝怒占城叛服不常詔封子托歡為鎮南王與左丞李恒往㑹索多兵進擊之復以安南通謀占城令軍行假道于其國且徴其糧餉以給軍已而托歡次安南安南王陳日烜言其國至占城水陸非便遣兵分道拒守境上九月京師地震冬十一月和爾果斯張雄飛等罷復以安圖為右丞相盧世榮大名人為右丞史樞為左丞博囉哈思哈雅舊作不魯述失海牙薩題勒宻實舊作撒爾述失今並改並參知政事初阿哈瑪特專政世榮以賄進為江西𣙜茶運使以罪廢阿哈瑪特死廷臣諱言利無以副上意者總制院使僧格丹巴國師弟子能通諸國語言舊作桑哥丹巴一名恭噶喇實西域圖克逹木人舊作膽巴恭噶喇實舊作功嘉葛喇思圖克逹木舊作哭甘思旦麻今改薦世榮才能富國召問稱旨令與中書廷辨所欲行右丞相和爾果斯等皆以議不合罷去復以安圖為右丞相盧世榮為右丞史樞等皆世榮所薦也初安圖與北安王為海都所拘十年始得還有譖安圖嘗受海都官爵者帝怒斷事官石天麟亦自海都部中還奏曰海都實宗親偶有違言非仇敵比安圖不拒絶之所以釋其疑心導其臣順也帝怒方􅄙雄飛剛直亷慎始終一節嘗召見便殿聞之曰聞卿貧甚賜白金二千五百兩鈔二千五百貫既出又加賜黄金五十兩雄飛拜受封識蔵于家及其罷政阿哈瑪特之黨矯詔追奪之或有勸雄飛自辨者雄飛曰上以老臣亷故賜臣然臣未敢輕用而封識以俟者正慮今日耳又何自辨乎尋起為燕南河北道宣慰使卒石天麟字天瑞順州人海都太宗第五子哈什王之子詔盧世榮為鈔法下御史中丞崔彧吏罷之世榮既入中書即日奉詔理鈔法之弊自謂其生財有法用其法當賦倍増而民不擾翰林學士董文用曰此錢取于右丞家邪將取之民邪取于右丞家則吾不知若取于民則有説矣牧羊者歳嘗兩剪其毛今牧人日剪以獻主者固悦其得毛之多然羊無以避寒熱既死且盡毛又可得乎民財有限右丞將盡取之得無有日剪其毛之患乎世榮不能對御史中丞崔彧亦極言世榮不可相帝大怒下彧吏欲致之法尋罷之詔議立科舉法不果行至元初丞相史天澤學士承㫖王鶚等屢請帝以科舉取士詔令中書議定程式未及施行至是和爾果斯與留夣炎等復言天下習儒者少而由刀筆吏得官者多帝曰將若之何對曰惟貢舉取士為便凡䝉古之士及儒吏陰陽醫術皆令試舉則用心為學矣帝可其奏㑹和爾果斯罷事遂止宋謝太后卒于燕乙酉二十二年春正月罷江南行御史臺尋復之盧世榮奏罷江南行御史臺及改諸路按察司為提刑轉運司兼理錢穀未幾御史臺臣言行臺不可輙罷且按察司兼轉運則紏彈之職廢帝以為疑安圖曰江南盗賊屢起行臺鎮遏之功居多不可罷但與行省竝治杭州差覺僻逺宜徙江州據三省之間從之二月立規措所初盧世榮言天下歳課鈔九十萬餘以臣經畫之不取于民可增三百萬事未行而中外已非議臣請與臺院面議上前行之帝曰不必如此卿但言之世榮又言自王文統後鈔法虚弊已久宜括銅鑄錢並製綾劵與鈔參行泉杭二州宜立市舶轉運司給民錢令商販諸番官取其息七民取其三各路雖設常平倉名存實廢宜取權豪所擅鐡冶鑄器鬻之以其息儲粟平糶則可均物價而獲厚利民間酒課太輕宜官給鈔行古𣙜酤法仍禁民私酤米一石取鈔十貫可得二十倍國家以兵得天下不藉糧餽惟資羊馬宜于上都隆興諸路買幣帛易羊馬選䝉古人牧之歳攵其皮毛筋角酥酪之用以十之二與牧者而馬以備軍興羊以充賜予帝皆善而行之至是請立規措所所司官吏以善賈為之帝曰此何職世榮曰規畫錢榖耳從之又言天下能規運錢榖者為阿哈瑪特所用悉以為汚濫黜之臣欲擇而用之懼有言臣私有罪者帝曰何必計此第用其可用者于是擢用甚衆立真定等路宣慰司兼都轉運司領課程事世榮請于真定濟南太原甘肅江西江淮湖廣等處立宣慰司兼都轉運司以治課程仍嚴立修例禁諸司不得沮撓檢察以宣徳王好禮並為浙西宣慰使帝曰宣徳人多言其惡世榮言彼自陳能歳辦鈔七十餘萬錠是以用之夏五月托歡兵擊陳日烜敗走之遂入其城而還日烜遣兵來追索多李恒戰死托歡屢移書日烜假道不納益修兵船為迎敵計托歡乘間縳栰為橋渡富良江北與日烜大戰破之日烜遁走不知所之其弟益稷率其屬來降然交兵雖敗而勢猶盛適盛夏淋潦軍中疾作死傷者衆占城竟不可逹乃謀引兵還交兵追襲之李恒中毒矢至思明唐置州明為府今府屬廣西與安南交界卒索多軍與托歡相去二百餘里托歡軍還索多猶未知之亟趨其營交人邀于乾滿江富良江别流在安南國故交州府界力戰而死冬十一月盧世榮伏誅世榮居中書數月恃委任之專肆無忌憚視丞相猶虚位也左司郎中周戭因議事㣲有可否誣以沮格詔㫖入奏令杖一百斬之于是朝中震懾無敢言者監察御史陳天祥字吉甫趙州寜晉人徙洛陽上疏言世榮始為江西𣙜茶轉運使屢犯贜罪動數萬計今竟不悛狂悖尤甚雖居丞轄實專大政恣行苛刻大肆誅殺欲以一歳之期致十年之積考其行事不副所言始言能令鈔法如舊鈔今愈虚始言能令百物自賤物今愈貴始言不取于民能令課程增三百萬錠今乃廹脇諸路官司虚増其數凡若所為動為民擾脱不早有更張湏其自敗正猶蠧雖就除木病深矣疏聞詔丞相以下雜問其罪復召天祥與世榮俱至上都親鞫之一一欵服遂命誅之世榮初以言利進太子意深非之曰財非天降安能嵗取嬴乎僧格素主世榮者聞太子言不敢捄之十二月集僧四萬作資戒㑹凡七晝夜太子珍戬卒時帝春秋高南臺御史上書請内襌太子聞之懼臺臣寢其奏不敢聞阿哈瑪特之黨以臺臣隱匿乘間發之帝震怒太子益憂懼不自安尋卒太子初從姚樞竇黙學仁孝恭儉尤優禮大臣一時在師友之列者非朝廷名徳則布衣節行之士在中書日久明于聽㫁聞四方科徴輓漕造作和市有係民之休戚者多奏罷之中外歸心焉江南行省以歳課羡鈔四十七萬貫來獻太子怒曰朝廷但令汝等安百姓百姓安錢糧何患不足百姓不安錢糧雖多能自奉乎盡卻之行臺治書侍御史王惲進承華事畧二十篇太子覽之至漢成帝不絶馳道唐肅宗改絳紗服為朱明服心甚喜曰我若遇是禮亦當如是又至邢峙止齊太子食邪蒿顧侍臣曰一菜之名遽能耶人耶詹事九思曰正臣防微理固當然太子善其説令諸子傅觀之其大雅不羣葢本于天性云王惲字仲謀衛州波縣人以哈喇哈斯卾羅納爾氏舊作哈剌哈孫幹剌納兒今改為大宗正哈喇哈斯由掌宿衛哈剌哈斯之曾祖竒竒哩太祖時以功賜號逹爾罕至元初録功臣後以哈剌哈斯掌宿衛襲逹爾罕拜大宗正用法平允時欲以江南獄𨽻宗正哈喇哈斯曰江南新附敎令未孚且相去數千里欲遥制其刑獄得無寃乎事遂止丙戌二十三年春正月詔罷征日本大舉兵伐安南不果行先是立征東行省命安塔哈洪察球爾再擊日本敕各處造海舶集漕船募水手貯糧餉期以是年三月以次而發八月㑹于合浦有司徴歛大為姦利吏部尚書劉宣字伯宣其先潞人徙太原上書言近日再興日本之兵此役不息安危所係近用索多議伐占城阿爾哈雅言征交趾數年吏民大擾盜賊蝟興且交趾小邦親王提兵深入無功反殪大將况日本海洋萬里非二國比萬一不利援兵安能飛渡邪帝納其言遂令詔罷征日本專事安南命阿爾哈雅等大徴各省兵仍遣鎮南王托歡將之以行以安南王弟陳益稷效順來歸封為安南王約平定其國以兵納之宣復言曰安南臣事已久歳貢未嘗愆期往者用兵無功瘡痍未復今乃復大舉聞者恐懼且交廣炎蒸之區今約七月集諸路兵于静江病死者必衆矣况湖廣宻邇溪洞㓂盜尚多大兵一出萬一奸頑乘間生變何以應之時湖廣宣慰司亦上言乞罷交趾兵以甦民窮詔從之令還軍各省居益稷于卾州二月禁漢人持兵器罷鬻江南學田時江浙行省理算錢榖甚急鬻所在學田輸其直于官利用監臣徹爾延濟克台氏其曾祖塔喇齊封徐州因家焉舊作徹里延濟克台舊作燕只台塔剌齊舊作太赤今改使江南見之謂曰學有田以供祭祀育賢才安可鬻耶遂奏罷之三月遣侍御史程文海字鉅夫後避武宗諱以字行建昌人訪求江南人才先是文海為集賢直學士言省院諸司皆用南人惟御史臺按察司無之江南風俗南人所諳亦宜參用之至是遂詔文海仍集賢學士拜侍御史行御史臺事往江南博採知名之士帝素聞趙孟適葉李字太白一名舜玉杭州人名宻諭文海必致此二人文海復薦宋宗室趙孟頫字子昻秦王徳芳之後居湖州及張伯淳字師道嘉興路崇徳人等二十餘人帝皆擢用之夏四月遣湖廣右丞約蘇穆爾舊作要束本今改鈎考荆湖錢榖六月下治書侍御史陳天祥獄時遣約蘇穆爾鈎考荆湖錢榖中書擬為平章政事及托克托呼舊作脱脱忽今改叅知政事帝曰約蘇穆爾小人事朕方五年授一理算官足矣托克托呼人奴之奴令史宣使才也讀卿所進擬令人恥之已而湖廣行省左丞相阿爾哈雅入朝言約蘇穆爾在卾豈無贜賄迹臣亦請鈎考之遂遣天祥偕往天祥至卾即劾約蘇穆爾貪暴不法事時僧格與約蘇穆爾連婣相倚為奸摘天祥疏中語誣以不道遣使䆒問欲殺之行臺御史申屠致逺字大用壽張人累章辨其無罪猶係于獄歳餘方釋之阿爾哈雅亦尋卒省臣言向阿爾哈雅與約蘇木爾互請鈞考今雖已死而事之是非宜暴白帝曰比事自約蘇穆爾所發宜從其言行之既而約蘇穆爾遂籍阿爾哈雅家貲歸之京師秋七月免左丞相昻吉爾岱平章政事阿必實克舊作阿必失合今改先是二十二年正月以阿必實克為平章政事二月復以昻吉爾岱為左丞相至是總制院使僧格好言財利帝深喜之遂有大任之意嘗令具省臣姓名以進帝曰安圖郭佑楊居寛等並仍前職昻吉爾岱等其别議仍選可代者以聞遂罷之自是廷中有所建置人才進退僧格咸與聞焉銓定省院臺部官屬詔中書省銓定省院臺部官屬自中書令左右丞相而下各有定員知政事二員行中書省平章政事二員左右丞並一員參知政事簽行省事並二員樞宻院除樞宻使外同知院事一員副使簽院事並二員院判一員御史臺御史大夫一員中丞侍御史治書侍御史並二員行臺同六部尚書侍郎郎中員外郎並二員仍諭安圖曰中書省朕當親擇其餘諸司並從中書裁减安圖曰比聞聖意欲倚近侍為耳目如臣所行非法從其舉奏今近臣乃伺隙援引非類曰某居某官某居某職以所署奏目付中書施行銓選之法自有定制其尤無事例者臣嘗廢格不行慮其黨有短臣者帝曰卿言良是後若此者其勿行之置洪澤芍陂注俱見前屯田兩淮兵革之餘荆榛蔽野宣慰使昻吉爾言可立屯田以給軍餉時以用兵日本未及行未幾令千人往其田試之果大穫遂以兵二萬屯之歳得米數十萬斛冬十月河决衝突河南郡縣凡十五處開封祥符陳留杞太康通許鄢陵扶溝洧川尉氏陽武延津中牟原武睢州役民二十餘萬塞之丁亥二十四年春正月復詔托歡督諸軍擊安南屢戰敗之陳日烜棄城走時復詔托歡督右丞程鵬飛參知政事樊楫冠州人等進擊安南與楫等分兵三道水陸並進凡十七戰皆㨗遂深入其境安南王日烜棄城走于海二月以敏珠爾多卜丹舊作麥术督丁今改為平章政事初敏珠爾多卜丹為右丞以與盧世榮議不合而罷尋以其行已亷潔起佐安圖治省事至是遂拜平章政事閏月復置尚書省以僧格特穆爾並為平章政事諤爾根薩里為右丞葉李為左丞馬紹字子卿濟州金鄉人叅知政事敏珠爾多卜丹言自制國用使司改尚書省頗有成效今仍分兩省為宜詔從之安圖諫曰臣力不能囘天但乞不用僧格别選賢者猶或不至虐民誤國不聽初置國子監以耶律有尚為祭酒初太宗設總敎國子之官逮至元初乃以許衡為祭酒而侍臣子弟就學者纔十餘人衡既去敎益廢而學舍未建師生寓居民舍國子司業邪律有尚屢以言始立國子監設監官増廣弟子員遂以有尚為祭酒祭酒一員司業二員監丞一員學官博士二員助敎四員生員百二十人䝉古漢人各半官給紙箚飲食仍𨽻集賢院設江南各路儒學提舉司時江南諸縣各置教諭二人又用廷臣議諸道各置提舉司設提舉儒學二人統諸路府州縣學祭祀錢糧之事未幾復從僧格等言鈎考江西學田所入羡餘貯之集賢院以給有才藝之士三月行至元鈔僧格以交鈔及中統元寶行之既久物重鈔輕遂建議更造至元鈔行之自一貫至五十文凡十有一等與中統鈔通行毎一貫文視中統鈔五貫文時孟頫初膺薦入見詔令與議適刑曹欲擬贜罪滿至元鈔二百貫者死孟曰始造中統鈔時以銀為本虚實相權及今二十年輕重相去至數十倍故改中統為至元後二十年至元鈔必復如中統矣若計鈔抵法疑于太重或有詆其沮格鈔法者孟頫曰孟頫奉詔與議不敢不言公不揆于理而但以勢相陵可乎其人慚而止夏四月諸王納顔烈祖後廣寕王伯勒格特依之孫舊作乃顔孛魯古歹之孫今並改反五月帝自將討平之秋八月還上都先是有告納顔反者帝遣巴延往覘虚實納顔謀執之巴延覺得脱歸時西北諸王聞納顔反多從之者帝以為憂宿衛士阿實克布哈剛哩國王族大祖挍剛哩時來歸舊作阿沙不花今改曰莫若先撫安諸王乃行天討則叛者勢自孤矣帝曰善爾試為朕行之乃北説諸王諾延舊作納牙今改曰大王聞納顔反耶曰聞之曰大王知納顔已遣使自歸耶曰不知也曰聞大王等皆欲為納顔外應今納顔既自歸矣是獨大王與主上抗耳大王何不往見上自陳為萬全計諾延許之于是諸王之謀皆解帝遂議親討之以左丞李庭等將漢軍用漢法以戰既而納顔之黨金嘉努舊作金嘉奴塔布岱舊作塔不歹今並改擁衆號十萬進逼乘輿帝親麾諸軍圍之納顔堅壁不出司農卿特爾格舊作鐡哥哥今改曰彼衆我寡當以疑退之帝張蓋據胡床坐特爾格進酒塔布岱按兵覘之不敢進李庭曰彼夜當遁耳乃引壯士十餘人抱火礟夜入其陣礟發果自潰㪚帝曰何以知之庭曰兵雖多而無紀律見車駕駐此而不戰必疑有大軍繼至是以知其必遁遂命庭將漢軍伊實特穆爾博爾濟賜號益魯勒舊作玉昔鐵木兒益魯勒舊作月吕魯今改將䝉古軍並進納顔敗走追執之帝遂還冬十月戊午朔日食檢覈中書錢穀殺叅知政事郭佑楊居寛初僧格奉詔檢覈中書省虧欠鈔六千餘錠參知政事楊居寛㣲自辨以為實掌銓選錢穀非所專僧格怒令左右拳其頰遂與佑皆引服事聞帝令丞相安圖共議之曰此曹狡獪毋令他日得以脇問誣服為詞由是佑居寛皆坐棄市籍其家人咸寃之時有江寕縣逹嚕噶齊吳徳者憤言尚書今日鈎中書不遺餘力他日復為中書鈎考汝獨不死耶或以告僧格亟捕徳殺之十一月以僧格為尚書右丞相諤爾根薩里平章政事葉李為右丞馬紹為左丞帝問翰林諸臣言以丞相領尚書省事漢唐有此制否咸曰有之而左丞葉李遽言前省臣所不能者僧格舉能行之宜以為丞相遂授僧格尚書右丞相進李右丞左丞相阿珠卒時受命西征至哈喇和卓舊作哈剌霍州今改卒追封河南王御批歴代通鑑輯覽卷九十五

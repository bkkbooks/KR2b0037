front:
  text: 欽定四庫全書御批歴伐通鑑輯覽巻九十九元順帝
  hash: sha256:341d122823b5ee4585c3e22b1dda56850f35e2abc1e8b472138c22eb53d4119a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_098-1a, image: WYG0339/WYG0339-0146a.png}
body:
  text: 至正十三年春正月以哈瑪爾為右丞先是托克托為相哈瑪爾日趨附其兄弟之門及托克托侍其父西行博爾克布哈為相以宿怨每欲中傷之賴哈瑪爾營䕶得免博爾克布哈又與太平韓嘉納圖們岱爾等十人結為兄弟謀黜哈瑪爾不克及托克托復相博爾克布哈等相繼得罪去哈瑪爾復見召用而托克托兄弟尤徳之至是遂拜右丞立分司農司先是托克托言京畿近水地利請召募江南人耕種歳可収粟麥百萬餘石可以不煩海運而京師自能足食帝曰此事有利國家其議行之于是立分司農司以右丞烏蘭哈逹舊作悟良哈台今改後仿此左丞烏克遜良楨字幹卿臨潢人兼大司農卿給分司農司印西自西山南至保定河間北抵檀順東及遷民鎮注俱見前凡官地及原管各屯田悉從分司農司立法佃種給鈔五百萬錠以供工價半具農器穀種之用又略仿前集賢學士虞集議于江淮召募能種水田及修築圍􅀈之人各千人為農師降空名勅牒十二道有能募農民百人者授正九品二百人者正八品三百人者從七品就以領其所募之人所募農夫人給鈔十錠期年散歸夏五月泰州注見前張士誠小字九四白駒場亭人作亂據髙郵自稱誠王知府李齊字公平廣平人死之士誠及弟士徳士信等皆以操舟運鹽為業富家多陵侮之弓手邱義窘辱尤甚士誠怒帥壯士十八人殺義及諸富家招少年起兵鹽丁方苦重役遂共推為主陷泰州淮南行省遣齊招降被留久之賊渠自相戕始縱齊來歸士誠尋復鼓變殺㕘政趙璉陷興化縣行省以左丞奇齊葉圖鎮髙郵而出齊守甓社湖在今髙郵州西北㑹數賊呼譟入城省憲官皆遁齊還城門已閉士誠遂據髙郵稱誠王國號大周建元天佑已而有詔赦之使至不得入賊紿曰請知府來乃受命行省強齊往至則拘縶之齊雖辯説百端而士誠本無降意特遷延為繕飭計官軍急進攻之士誠呼齊使跪齊叱曰吾膝如鐵豈為賊屈士誠怒使曵倒槌碎其膝而咼之尋詔淮南行省平意政事福夀瑭古特人進兵討士誠六月立子阿裕錫哩逹喇為皇太子自六月不雨至于秋八月九月乙丑朔日食冬十月以方國珍為徽州路治中元制上路總管府同知治中判官各一員不受命國珍潛遣人至京師徧賂諸權貴詔遣江浙左丞托里特穆爾舊作帖里帖木兒南臺侍御史尊達錫哩舊作左答納失里今並改後仿此復招諭之二人報國珍已降乞授以五品流官令納其船散遣徒衆遂以國珍為徽州路治中國璋廣徳路治中國瑛信州路治中國珍等疑懼不受命仍擁船千艘據海道阻絶糧運乃復遣江浙右丞阿爾烏遜舊作阿兒温沙今改後仿此等率兵伐之十二月江浙平章政事布延特穆爾舊作卜顔帖木兒今改後仿此等㑹兵討徐夀輝于蘄水破之先是布延特穆爾軍池州賊衆十萬來攻布延特穆爾曰賊表裏連結破之實難今新至疲弊乘其驕惰盡鋭攻之功可成也與諸將分番進戰大敗賊衆率舟師追之連戰皆㨗遂復江州進克蘄州擒其將鄒普泰分兵平兩巴河巴水出羅田縣北南流經蘄水縣界至黄岡入江有上巴河下巴河故曰兩巴江路始得通至是西寧王揚沙舊作牙罕沙今改後仿此等諸軍皆㑹分道進攻蘄水㧞之獲其官屬四百餘人夀輝僅以身免大都無雲而雷聲震天地少頃有火墜于東南是月大同復大疫人死者過半哈瑪爾進西番僧于帝僧教帝行房中運氣之術號延徹爾舊作演揲兒今改法華言大喜樂也集賢學士圗嚕特穆爾哈瑪爾姝壻按圖嚕特穆爾舊作秃魯帖木兒今改後仿此又進僧結琳沁舊作伽璘真今改後仿此善秘密法亦名雙修法帝皆習之乃詔以西番僧為司徒結琳沁為大元國師各取良家女三四人奉之謂之供養帝日從事于其法廣取女婦惟滛戲是樂帝諸弟巴朗舊作八朗今改後仿此與圖嚕特穆爾等十人俱號伊納克舊作􅀝納今改皆在帝前相與䙝狎號所處室曰濟齊齋烏格依華言事事無碍也按濟齊齋烏格依舊作皆即兀該今改羣僧出入禁中無所禁止醜穢外聞皇太子既長深疾二僧等所為欲去之未能也濠人朱元璋字國瑞起兵據滁州明太祖事始此元璋先世家沛再徙泗州父世珍始徙濠之鍾離晉郡後為縣今鳳陽府臨淮縣是生四子元璋其季也至正四年大饑疫時元璋年十七父母兄相繼殁孤無所依乃入皇覺寺為僧遊食諸州尋復還寺㑹盗賊並起元璋謀避兵卜之去留皆不吉乃入濠城見郭子興子興奇其貌留為親兵妻以所撫馬公宿州人逸其名女賈魯圍濠元璋力拒之既而圍解因收里中兵得七百人子興署為鎮撫元璋見諸帥無足與共事乃以兵屬他將而獨與徐逹字天徳濠人湯和字鼎臣濠人費聚字子英五河人等南畧地定逺梁縣今屬鳯陽府計降驢牌寨民兵三千與俱東襲張知院于横澗山在定逺縣西北收其卒三萬道遇李善長字百室定逺人與語大悦遂與俱攻陷滁州時郭子興與趙均用相惡均用嘗執囚子興元璋救出之至是専狠益甚挾子興攻盱眙泗州將害之元璋又使人賂其左右子興得免乃將其所部萬餘就元璋于滁州甲午十四年春正月汴河冰五色冰皆成五色花草如繪畫三日方解二月遣吏部侍郎貢師泰字泰甫寧國宣城人和糴于浙西時江浙兵起京師食不足命師泰詣浙西和糴得糧百萬石三月癸亥朔日食夏四月江西湖廣大饑民以疫癘死者無算秋九月命右丞相托克托督諸軍討張士誠士誠冦揚州逹什特穆爾兵敗詔托克托總制諸王諸省軍討之一切聽便宜行事兵至髙郵戰于城外大敗士誠衆遂遣兵西平六合注見前賊勢大蹙冬十二月詔削托克托官爵安置淮安以台哈布哈等代總其軍初托克托再相信用儒克忠巴勒由左司郎中㕘議中書省事平章以下議事莫敢異同惟哈瑪爾以有徳于托克托不為下儒克忠巴勒因譖之托克托改為宣政院使哈瑪爾深銜之及托克托討髙郵哈瑪爾復入為平章遂嗾御史袁賽音布哈等劾托克托出師三月略無寸功傾國家之財為己用半朝廷之官以自隨其弟御史大夫額森特穆爾庸鄙貪滛玷汚清臺章三上詔削托克托官爵淮安安置額森特穆爾安置寧夏升台哈布哈為河南行省左丞相伊克徹爾加太尉蘓蘓知樞密院事代將詔至軍龔伯璲曰將在軍君命有所不受且丞相出師時嘗被密㫖一意進討可也詔書且勿開開則大事去矣托克托曰天子詔我而我不從是我與天子抗也君臣之義何在既聽詔頓首曰臣至愚荷天子委以軍國重事蚤夜懼弗克勝一旦釋此重負上恩所及深矣即出兵甲名馬分賜諸將俾各帥所部以聽伊克徹爾等節制客省副使哈喇台舊作哈刺答今改曰丞相此行我輩必死于他人之手今日寧死丞相前遂㧞刀自刎而死詔威順王庫沁布哈還鎮湖廣王初以武昌被陷奪其印至是以討賊立功還其印遣歸舊鎮大都大饑疫民有父子相食者帝製龍舟于内苑帝于内苑造龍舟自製其様船長一百二十尺廣二十尺用水手二十四人皆衣金紫自後宫至前宫山下海子内往來遊戲行時龍首眼口爪尾皆動又自製宫漏髙六七尺廣半之造木為匱藏壺其中運水上下匱上設三聖殿匱腰立玉女捧時刻籌時至輒浮水而上左右二金甲神一懸鐘一懸鉦夜則神人自能按更而撃無分毫差鳴鐘鉦時獅鳯在側者皆自翔舞匱之東西有日月宫飛仙六人立宫前遇子午時自能耦進度仙橋達三聖殿復退立如前其精巧絶出人意皆前所未有帝既怠于政治惟事遊宴以宫女十六人按舞名十六天魔戴象牙佛冠身被纓絡大紅綃各執噶巴拉薩巴舊作加巴剌般今改之器毎宫中讚佛則按舞奏樂宦官非受秘密戒者不得與乙未十五年春正月徐夀輝遣其黨倪文俊復陷沔陽威順王庫沁布哈令其子報恩努舊作報恩奴今改等同元帥阿爾斯蘭水陸並進討文俊至漢州水淺船閣文俊用火筏燒船報恩努死之庫沁布哈走陜西文俊尋進陷中興路元帥多爾濟巴勒死之遂復陷漢陽迎夀輝居之教授鄭咺請正國俗不報大鄂爾多舊作大斡耳朶今改儒學教授鄭咺言䝉古乃國家本族宜教之以禮而猶循本俗不行三年之䘮又妻其繼庶母叔母兄妻恐貽笑後世宜令改革繩以禮法不報遣兵分戍河南諸路時河南賊數渡河焚掠州縣上下視若常事中書參議成遵言于丞相曰今天下州縣䘮亂過半而河北稍安者以河為之障賊兵卒不能渡所以剝膚椎髓以供軍儲而民無深怨者視河南之民猶得保其室家故也今賊北渡而官軍不禦是大河之險已不能守河北之民復何所恃民心一揺國勢將若之何語未畢哽咽不能言宰執而下皆揮涕乃入奏帝即遣使罪守河將帥而防禦稍嚴仍遣河南參政洪超爾舊作洪丑驢今改後仿此等各將兵分守陜西山東諸路二月劉福通以韓林兒稱宋帝福通等自碭山夾河迎林兒至亳立為皇帝又號小明王國號宋改元龍鳳以其母楊氏為皇太后杜遵道盛文郁為丞相福通羅文素為平章劉六福通母弟知樞密院折鹿邑縣太清宫材建宫闕于亳遵道等各遣子入侍福通疾遵道専權命甲士撾殺之遂自為丞相三月竄托克托于雲南初安置托克托于淮安既又移額齊訥舊作亦集乃今改路元置屬甘肅行省方輿紀要肅州北有漢居延城元額齊訥路治此至是臺臣猶論其謫輕故再徙雲南之鎮西其弟額森特穆爾徙四川碉門長子哈喇章舊作哈剌章今改後仿此肅州次子三布斡蘭州仍籍其貲産薊州雨血夏四月以鼎珠為右丞相十四年十二月鼎珠已為左丞相哈瑪爾為左丞相桑圖錫里舊作桑哥失里今改正為平章政事舒蘇為御史大夫哈瑪爾為相舒蘇為御史大夫于是國家大柄盡歸其兄弟矣五月詔削台哈布哈官爵命逹什巴圖魯沙卜珠岱人耨埒之孫按逹什巴圖魯舊作答失八都魯今改後仿此總其兵台哈布哈以軍士乏糧之故頗驕傲不遵朝廷命軍士又往往剽掠為民患監察御史劾其慢功虐民詔削其官仍俾率領和實衮舊作火赤温今改後仿此從征命逹什巴圖魯總領其兵六月朱元璋自和州渡江襲取太平路先是元璋自滁州用計㧞和州郭子興檄元璋總諸軍守其地時樞宻副使班珠爾瑪克舊作絆住馬民兵元帥陳額森舊作陳埜先今並改後仿此屯兵絶餉道元璋奮擊破之皆走渡江去㑹子興卒劉福通立韓林兒為帝檄子興子天叙為都元帥張天佑及元璋為左右副元帥元璋曰大丈夫寧能受制于人邪然以其勢方盛可􅀝藉乃用龍鳳年號以令軍中至是元璋謀渡江無舟楫㑹巢湖帥廖永忠巢人俞通海字碧泉其先濠人徙于巢等以水師千艘來附元璋大喜往撫其衆而中丞曼濟哈雅舊作蠻子海牙今改後仿此扼銅城牐在含山縣東南諸隘舟師不得出忽大雨水漲遂從小港縱舟擊敗曼濟哈雅軍乃定計渡江諸將請直趣集慶元璋曰取集慶必自采石在當塗縣西北始采石重鎮守必固牛渚前臨大江彼難為備可克也乃揚帆直逹牛渚常遇春字伯仁懐逺人先登㧞之采石兵亦潰諸將以和州饑爭取資糧謀歸元璋謂徐逹曰渡江幸㨗若舍而歸江東非吾有也乃悉斷舟䌫放急流中謂諸將曰太平甚近當與公等取之遂乘勝趣太平㧞其城總管靳義赴水死元璋揭榜禁剽掠軍中肅然置太平興國翼元帥府自領元帥事召陶安字主敬當塗人叅幕府事而以耆儒李習字伯羽當塗人為知府陶安時以避亂家居率父老出迎元璋元璋召與語安進曰海内鼎沸豪傑並爭然其意在子女玉帛非有撥亂救民安天下心明公渡江神武不殺人心悦服天下不足平也元璋曰吾欲取金陵何如安曰金陵古帝王都取而有之撫形勝以臨四方何向不克元璋曰善秋七月遣使招諭諸起兵者遣諸王錫哩瑪勒舊作失里門今改後仿此四川左丞錫哩巴拉等率兵守禦山東湖廣四川諸路又命將作院判官烏瑪喇等招諭濠泗沔陽諸起兵者中書左丞許有壬言朝廷務行姑息之政賞重罰輕故將士貪掠子女玉帛而無鬭志遂倡為招降之策耳不聽以達什特穆爾為江浙行省左丞相時江淮繹騷南北阻隔詔許達什特穆爾便宜行事乃任用非人肆通賄賂賣官鬻爵惟視貨之重輕為髙下由是謗議紛然所部郡縣往往淪陷亦恬不為意冬十一月逹什巴圖魯擊劉福通軍破之十二月遂圍亳福通以韓林兒走安豐先是逹什巴圖魯進次許州與福通軍遇戰于長葛為其所敗將士皆奔潰至中牟收散卒屯聚㑹劉哈喇布哈舊作劉哈剌不花今改後仿此引兵來援大破福通兵復駐汴梁至是進兵大敗之于太康遂圍亳州韓林兒遁走安豐哈瑪爾矯詔殺故相托克托初托克托貶雲南行次大理騰衝今永昌府騰越州是知府髙惠欲以女事之托克托曰吾罪人也安敢念及此巽辭拒絶惠銜之至是再徙阿輕乞之地惠發軍圖之哈瑪爾矯詔賜之鴆遂卒年四十二托克托儀狀雄偉器識宏逹輕貨財逺聲色好禮賢士皆出天性至于事君之際始終不失臣節惟其惑于羣小急復私仇君子譏焉後御史張冲等上章雪其寃始復官爵置大兵農司詔有水田處置大兵農司招誘夫丁有事則乘機進討無事則栽植播種凡置保定河間武清景薊共五處其屬又有兵農千户司二十四百户所四十八鎮撫司四丙申十六年春正月哈瑪爾蘇蘇有罪伏誅哈瑪爾既相恥前進西僧事告其父圖嚕曰我兄弟位宰輔宜導人主以正今圖嚕特穆爾専以滛䙝媚上天下士大夫必譏笑我有何面目見人我將除之且上日昏暗何以治天下皇太子年長聰明不若立為帝而奉上為太上皇其妹聞之歸告其夫圖嚕特穆爾恐太子立則己必先誅即以聞于帝然不敢斥言滛䙝事第曰哈瑪爾謂陛下年老故耳帝大驚曰朕頭未白齒未落遽謂我為老耶因與謀去哈瑪爾及蘇蘇計已定有㫖哈瑪爾蘇蘇母入朝御史大夫綽斯戩竒􅚕氏因劾奏二人罪惡帝曰哈瑪爾兄弟雖有罪然侍朕久且與朕弟同乳姑緩其罰令出征自効嗣省臣復糾其罪不已遂詔安置哈瑪爾惠州蘇蘇肇州比行皆杖死初額森特穆爾就貶籍其家貲以賜哈瑪爾及是籍哈瑪爾家所得庫藏封䜟猶未啓也哈瑪爾前既譖害托克托兄弟為中外所共疾及是以不䡄誅人咸快之二月張士誠陷平江據之時淮東大饑士誠遣其弟士徳由通州渡江入常熟遂陷平江及湖州松江常州諸路改平江為隆平府自髙郵徙據之初或謂士誠有降意詔遣集賢待制烏瑪喇孫撝持詔往諭之士誠拘之一室廹使降撝詬斥不絶及士誠徒平江撝與士誠部將張茂先謀遣人約鎮南王刻日進兵復髙郵語泄遂遇害州孫撝字自謙曹人三月朱元璋陷集慶南臺御史大夫福夀死之元璋率諸軍進侵集慶至江寧鎮在今江寧縣西南破陳兆先營擒之盡降其衆福夀數督兵出戰力不能支城遂陷百司皆潰福夀獨踞胡床坐鳳凰臺在今江寧縣南下指麾左右或勸之去叱曰吾國家重臣城存則生城破則死尚何往哉俄而亂兵四集遂遇害元璋入城召官吏父老諭之曰我來為民除亂耳其各安堵如故舊政不便者除之民大喜遂改集慶路為應天府遣徐逹侵鎮江鄧愈侵廣徳皆陷之方國珍復降命為海道漕運萬户以其兄國璋為衢州路總管是月有兩日相盪夏六月彰徳李實如黄𤓰時有童謡云李生黄𤓰民皆無家秋七月張士誠遣兵㓂杭州江浙丞相逹什特穆爾遁平章政事尊逹錫哩死之初江南始亂逹什特穆爾等屢敗議者以為苗軍可用遂自寳慶招土官楊完者字彦英武岡綏寧人至淮南殺賊以功累官江浙行省參政至是士誠遣弟士徳從間道㓂陷杭州逹什特穆爾遁入富陽完者乃别由嘉興引苗軍及萬户普賢努舊作普賢奴今改後仿此擊敗之復其城逹什特穆爾乃還朱元璋自稱吳國公以御史臺為公府置江南行中書省自總省事置㕘議以下等官八月彗星見彗出張宿色青白指西南長尺餘至十二月朔始滅冬十月星隕大名化為石從東南流芒尾如曳篲隨地有聲火燄蓬勃久之乃息化為石青黒色形如狗頭其斷處若新割者賊陷淮安城江東亷訪使褚布哈字君實隰州石樓人按褚布哈舊作褚不華今改後仿此死之初褚布哈與樞密判官劉甲扞禦淮安甲守韓信城在今清河縣東相掎角為聲援褚布哈上章劾總兵逗撓罪總兵者恚之檄甲别將兵擊賊以困褚布哈賊因掘塹圍淮安芻餉路絶元帥吳徳琇運米萬斛入河為賊所抄攻圍日急總兵者屯下邳按兵不出遣使十九輩告急皆不應城中餓者仆道上人即取啖之草木螺蛤魚蛙烏燕及鞾皮鞍韉革廂敗弓之筋皆盡而後父子夫婦老穉更相食撤屋為薪人多露處坊陌生荆棘力既盡城陷褚布哈猶據西門力鬭中傷見執為賊所臠子班格舊作伴哥今改亦死褚布哈守淮安五年大小數百戰精忠大節人比之張巡云初同僉淮南行樞密院事董摶霄建議以淮安南北襟喉江淮要衝其地一失兩淮皆未易保救援淮安誠為急務為今日計莫若于黄河上下并瀕淮南之地及自沭陽抵沂莒諸州縣布連珠營每三十里設一總砦又于三十里中設一小砦使烽堠相望而巡邏往來遇賊則并力野戰無事則屯種而食然後進有援退有守常為不可勝以待敵之可勝也又言淮南北之民壯者已盡為兵老幼無所依者宜置軍民防禦司籍其民以屯故地練兵積糓且耕且戰内全山東完固之邦外捍淮海出没之冦而後恢復可圖也時不能用而淮安旋陷丁酉十七年春正月丙子朔日食二月韓林皃黨李武崔徳陷商州察罕特穆爾與李思齊連兵擊敗之李武崔徳等兵破商州攻武闗注見前遂直趨長安分掠同華等諸州三輔震恐時豫王喇特納錫哩及省院官皆洶懼計無所出行臺治書侍御史王思誠字致道兖州滋陽人曰察罕特穆爾河南名將賊素畏之宜遣使求援此上策也守將恐客兵軋已論久不決思誠曰吾兵弱旦夕失守咎將安歸乃移書察罕特穆爾曰河南陜西兩省互為脣齒陜西危則河南豈能獨安乎察罕特穆爾新復陜州得書大喜遂提輕兵五千與李思齊倍道來援與賊遇戰輒勝殺獲無算餘黨皆潰散走南山河南總兵官以察罕特穆爾擅調遣人問之思誠亟言于朝請令専守關陜仍許便宜行事朝從之以察罕特穆爾為陜西行省左丞李思齊為四川左丞三月朱元璋陷常州先是張士誠以舟師攻鎮江元璋遣徐逹敗之于龍潭鎮名在江寧府句容縣西北為濱江要地遂進圍常州士誠遣將來援逹離城設二伏以待而身自督戰敵走遇伏大破之獲其二將士誠乃以書求和請歳輸粟二十萬石黄金五百兩元璋答書責其歸所留使人楊憲字希武太原陽曲人而歳輸五十萬石士誠不報逹復請益兵圍之至是遂下其城已而徐逹徇宜興攻常熟張士徳戰敗為前鋒趙徳勝所擒士徳善戰有謀能得士心既被執士誠大沮元璋欲留士徳以招士誠士徳間道貽士誠書俾降元遂不食而死趙徳勝濠人韓林兒黨毛貴陷膠萊諸州詔遣知樞密院事布喇竒舊作不蘭奚今改後仿此等將兵擊之劉福通遣毛貴連陷膠州萊州益都般陽注俱見前諸郡縣遂以董摶霄為山東宣慰使從布喇竒擊之既而中書省臣言山東郡縣相次陷没濟南曰危宜選將練卒信賞必罰為保燕趙計以衛京師不報御史張楨亦上疏陳十禍以輕大臣解權綱事安逸杜言路離人心濫刑獄六者為根本之禍以不慎調度不咨羣策不明賞罰不擇將帥四者為征討之禍其所言多剴切其事安逸不明賞罰二條尤中時弊大畧謂陛下因循治安不預防慮今海内不寧天道變常人情難保正當修實徳以答天意推至誠以回人心凡土木之勞聲色之樂宴安鴆毒之惑皆宜痛撤勇改而陛下乃泰然處之若承平無事時此所謂根本之禍者也又言自四方有警調兵六年初無紀律又無激勸之宜將帥因敗為功指虚為實大小相瞞内外相依其性情不一而邀功求賞則同是以有覆兵之將殘民之將貪婪之將怯懦之將曾無懲戒所經之處鷄犬一空貨財罄盡而面諛游説者反以克復受賞且河南一省今所存者不過三四縣而江淮千里所在蕭條如此而望天雨粟地湧金朝夕存亡且不能保况以地力有限之費供將帥無窮之欲哉陛下事佛求福飯僧消禍以天夀節而禁屠宰皆虚名也今天下兵起殺人不知其數陛下泰然不理而曰吾將以是求福福何自而至哉此所謂征伐之禍者也疏奏不省既而執政惡其訐直除山南道亷訪僉事夏五月以綽斯戩為右丞相太平為左丞相綽斯戩自哈瑪爾得罪已拜左丞相至是進為右丞相而太平亦自遼陽行省丞相復召為左丞相朱元璋陷寧國等路徐達常遇春率兵侵寧國城久不下元璋乃親往督戰既至守臣楊仲英開門出降百户張文貴殺其妻妾自刎而死執義兵元帥朱亮祖六安人尋遣趙繼祖侵江隂胡大海字通甫虹縣人侵徽州常遇春侵池州繆大亨定逺人侵揚州皆陷之六月有龍鬬于樂清江樂清本晉樂成縣五季吳越改名縣西南有館頭江甌江下流也南入于海颶風大作所至有火光如毬死者萬餘人秋七月大都晝霧自旦至午昬暝不辨人物如是者旬有五日八月劉福通攻汴梁遂分兵畧地于山東西分軍為三道闗先生破頭潘馮長舅沙劉二王士誠㓂晉冀白不信大刀敖李喜喜趨闗中毛貴出山東北犯其勢益熾以楊完者為江浙行省左丞苗軍素無紀律肆為抄掠所過蕩然無遺時逹什特穆爾方傍楊完者以為重莫敢禁遏之故楊完者雖陽尊事之而生殺予奪皆決于己矜驕日肆不可復制達什特穆爾謹署成案而已張士誠降詔以為太尉士誠㓂嘉興屢為楊完者兵所敗乃以書請降詞多不遜楊完者欲納之逹什特穆爾以士誠反覆不可信不許楊完者固勸乃承制假江浙亷訪使周伯琦行省參致至平江招諭之士誠始要王爵達什特穆爾不許又請爵為三公逹什特穆爾曰三公非有司所定今我雖奉詔便宜行事然不敢専也楊完者又力為之請逹什特穆爾外雖拒之心實幸其降又恐忤楊完者意遂授士誠太尉其弟士信等皆受官有差士誠雖去偽號擅甲兵土地如故朝廷以招安士誠為達什特穆爾功詔加太尉時楊完者強盛士誠復欲圖之而逹什特穆爾亦心厭其驕肆不可制乃隂與定計尋舉兵襲殺之士誠遂據杭州朝廷因以其弟士信為江浙平章方面大懽自是悉歸張氏矣命太尉努都爾岱巴爾茂四世孫按努都爾岱舊作紐的該今改後仿此總諸軍守禦東昌初鎮守黄河義兵萬户田豐叛降于劉福通陷濟寧義兵萬户孟本周攻之豐敗走至是復率衆㓂東昌努都爾岱擊却之九月倪文俊奔黄州徐夀輝黨陳友諒沔陽人本謝氏祖贅于陳因從其姓襲殺之友諒本漁家子嘗為縣吏不樂㑹夀輝文俊兵起慨然往從之遂為文俊簿書掾尋亦領兵為元帥及文俊専恣心不能平至是文俊謀害夀輝不克奔黄州友諒因乗釁襲殺之遂并其軍自稱平章政事冬十月韓林兒黨白不信等陷興元遂圍鳯翔察罕特穆爾等合兵擊走之不信等既陷秦隴據鞏昌遂窺鳳翔察罕特穆爾即先分兵入守鳯翔城而遣諜者誘賊圍鳯翔賊果來圍之數十重察罕特穆爾自將鐵騎晝夜馳二百里往赴比去城五里所分軍張左右翼掩擊之城中軍亦鼓譟而出内外合擊呼聲動天地不信等大潰及李喜喜皆遁入蜀十一月汾州桃杏華十二月隨州人明玉珍作亂襲據重慶遂陷成都及嘉定平章埒克達舊作朗革歹右丞旺扎勒圖舊作完者都今並改參政趙資死之玉珍初聞徐夀輝兵起團結千餘人屯青山今名青林山在隨州南結柵自固夀輝使人招之乃引衆降令以元帥守沔陽久之帥五十艘掠糧川峽間因襲破重慶右丞旺扎勒圖出走已而復㑹平章埒克逹參政趙資屯嘉定之大佛寺謀復重慶玉珍遣其將萬勝黄陂人禦之分兵襲陷成都未幾嘉定亦陷執資及旺扎勒圖埒克達以歸欲説降之三人皆不屈遇害蜀人謂之三忠于是蜀中郡縣相繼降于玉珍太尉逹什巴圖魯卒以其子博囉特穆爾為河南平章政事領其軍劉福通攻陷曹濮大名衛輝諸路逹什巴圖魯引兵擊之詔遣知樞密院達爾瑪錫哩舊作答理麻失里今改來援分兵雷澤在濮州東南濮州以禦福通逹爾瑪錫哩戰没諸軍大潰逹什巴圖魯退駐石村朝廷頗疑其玩寇失機使者趣戰相踵敵覘知之詐為達什巴圖魯通好書遺諸路使者果得之以進逹什巴圖魯覺知一夕憂憤而死尋命其子四川左丞博囉特穆爾為河南平章政事代領其軍詔天下團結義兵路府州縣正官俱兼防禦使翰林學士承㫖歐陽元卒初元以湖廣行省右丞致仕將歸帝諭留之仍為承㫖及天下盗起元獻招捕之策千餘言皆切實可行時不能用後以中原道梗欲致仕去由蜀還鄉復不允至是卒戊戌十八年春正月陳友諒陷安慶淮南行省左丞余闕死之先是闕固守安慶􅀝小孤山為藩蔽命義兵元帥胡巴延舊作胡伯顔今改後仿此統水軍戍守友諒自上流引軍直𢷬山下巴延與戰四日夜敗還敵追薄城下闕遣兵扼之俄而饒州祝寇攻西門友諒兵乘東門既登城闕簡死士奮擊敗之賊兵恚甚乃并軍樹柵起飛樓復來攻闕分兵捍禦晝夜不得息至是池州趙普勝本巢湖水軍將降朱元璋復叛歸徐夀輝軍東門友諒軍西門祝寇軍南門四面蟻集闕徒步提戈為士卒先分遣部將督三門之兵自以孤軍血戰斬首無算而闕亦被十餘創日中城陷城中火起闕知不可為乃引刀自剄墮清水塘中死妻伊伯舊作耶卜今改氏子徳生女福童亦皆赴井死守臣韓建以下死者數十人其知名者萬户李宗可紀守仁陳彬金承宗經厯段桂芳都事特穆爾布哈千户盧廷玉推葛延齡邱許元琰奏差烏徳美百户黄寅孫安慶官黄圖嚕台經歴楊恒知事余中懐寧縣尹陳巨濟按特穆爾布哈舊作帖木補化烏徳美舊作兀都蠻黄圖魯台舊作黄秃倫歹今並改城中士民相率登樓自捐其梯曰寧俱死此誓不從賊焚死者以千計事聞贈闕淮南江北等處行省平章政事追封豳國公諡忠宣闕號令嚴信與下同甘苦然稍有違令即斬以徇常出戰矢石亂下如雨士以盾蔽闕闕卻之曰汝輩亦有命何蔽我為故人爭用命稍暇即註周易帥諸生謁郡學㑹講立軍士門外以聽有古良將風烈或欲挽闕入翰林闕以國步危蹙辭不往其忠國之心蓋素定云二月毛貴陷濟南路河南行省右丞董摶霄與戰死之初摶霄從布喇竒援益都而濟南方告急乃提兵越濟南連敗賊兵城下詔升淮南行樞密院副使兼山東宣慰使都元帥有嫉其功者譖于努都爾岱令依前從征益都摶霄屬老且病請以弟昻霄代領其衆詔授昻霄淮南行院判官未幾復命摶霄守河間之長蘆後周縣宋廢故城在今滄州西北搏霄以兵北行且曰我去濟南必不可保至是濟南果陷毛貴遂入據之時搏霄方駐于南皮縣注見前之魏家莊在南皮縣西詔遣使拜為河南右丞甫拜命值貴兵卒至而營壘猶未完諸將曰賊至當如何搏霄曰當以死報國因拔劍督戰賊突前捽搏霄刺殺之無血惟見白氣衝天是日昻霄亦死韓林兒黨田豐陷濟寧努都爾岱棄東昌走努都爾岱聞田豐兵逼境即棄城遁柏鄉尋還京師拜中書添設左丞相豐遂入據其城引兵大掠諸郡已而復退保東昌三月毛貴陷薊州詔徴四方兵入衛毛貴率衆由河間趨直沽在天津府城北有大小直沽遂陷薊州畧柳林逼畿甸樞密副使逹克津舊作達國珍今改戰死京師大恐廷臣或勸帝北巡以避之或勸遷都闗陜衆議紛然獨丞相太平力以為不可遷遂徴四方兵入衛同知樞密院事劉哈喇布哈以兵拒于柳林貴衆潰退走濟南大同路夜聞空中有聲初黒氣蔽西方有聲如雷頃之東北方有雲如火交射中天遍地俱見火光空中如有兵戈之聲夏四月陳友諒陷龍興江西行省平章政事多通高昌人按多通舊作道童今改死之多通初任其將章巴延舊作伯顔今改後仿此布延布哈字希占䝉古氏按布延布哈舊作普顔不花今改後仿此捍禦數有功至是左丞和尼齊來江西専兵柄素與多通不相能且貪忍不得將士心見城且陷遂夜遁去多通因退保撫州謀集兵再圖克復為追騎所及遂遇害五月劉福通陷汴梁韓林兒遷據之福通攻汴梁守將珠占舊作竹貞今改後仿此出走遂入據其城乃自安豐迎林兒居之削右丞相台哈布哈官爵尋殺之以知行樞宻院烏蘭哈達代總其軍台哈布哈與太平有隙前聞其復相意不平嘆曰太平漢人乃復居中用事我反在外勞苦邪尋有詔起台哈布哈為湖廣右丞相招討㓂賊諸將皆欲進兵台哈布哈以養鋭為名勒兵退及賊攻汴梁守臣請援至十往反猶按甲不動或諫之台哈布哈大言曰我在何物小宼敢來既而出軍縱掠百里内蕩然自是宼益蔓延不可制朝廷憂之兩遣重臣諭㫖授以成算皆不聽其子碩通舊作夀童今改將兵分討山東入奏事語言驕慢帝由是惡之㑹毛貴田豐等勢愈充斥乃拜台哈布哈右丞相總兵進討台哈布哈即上言軍行以糧餉為先請令太平至軍供給乃可濟事不然兵不能進太平知其欲害已遂諷御史劾其緩師拒命之罪詔削奪官爵蓋州注見前安置以知行樞密院事烏蘭哈達代之台哈布哈聞有詔夜馳詣故部將劉哈喇布哈求救哈喇布哈時駐兵保定即至京首見太平太平問其來故具以告太平責之俾致台哈布哈以來哈喇布哈還縳台哈布哈父子送京師未至皆殺之路盜宼河北前翰林待制巴延一名師聖字宗道哈喇魯特氏世居開州濮陽縣按哈喇魯特舊作哈刺魯今改死之巴延自弱冠以斯文為己任至正初徴至京師授翰林待制已而辭歸四方來學者甚衆其學務真知力踐必期措諸實用至是河南宼蔓延河北巴延乃渡北行至磁與寇遇宼知其名士欲誘以富貴巴延罵不屈與妻子俱死之巴延既死宼剖其腹見其心有數孔曰古稱聖人心有七竅此非賢士乎乃納心于其腹中覆墻而掩之六月戊辰朔日食韓林兒黨闗先生兵陷遼州注見前遂大掠塞外諸郡闗先生破頭潘等分兵二道一出絳州唐置今屬山西一出沁州注見前踰太行焚上黨攻破遼州晉冀雲中鴈門代郡烽火數千餘里于是大掠塞外諸郡尋復轉而南察罕特穆爾遣其部將闗保等率兵分扼阻隘而自勒重兵屯聞喜絳陽又分兵屯澤潞及塞井陘以杜太行諸道屢擊却之河東悉定詔拜察罕特穆爾為左丞尋進平章政事冬十一月左丞相綽斯戩有罪免以努都爾岱為左丞相時天下多故外則疆宇曰蹙内則帑藏空虚而帝方溺于娛樂不恤政務綽斯戩居相位毫無所匡救而公受賄賂貪聲著聞于是御史伊齊布哈舊作燕赤不花今改後仿此劾奏其任用私人都哷舊作朶列今改後仿此及妾弟崔旺扎勒特穆爾舊作崔完者帖木兒今改後仿此印造偽鈔事將敗因殺都哷以滅口綽斯戩乃自請罷政詔止收其印綬御史王尋等復劾之不已帝終不聽十二月乙丑朔日食朱元璋陷婺州胡大海侵婺州久不下元璋自將往擊之僉行樞密院事舒穆嚕伊遜字申之其先遼之徳里乣人按舒穆嚕伊遜舊作石抹宜孫徳里乣舊作廸烈今並改後仿此方率兵守處州其母及弟和遜舊作厚孫今改後仿此皆在婺乃遣將率車師由松溪在金華縣東來援元璋曰道陿車戰適取敗耳命胡徳濟字世美大海養子迎戰于梅花門即蘭谿縣龍門山大梅溪繞其下故名伊遜兵大敗遂陷婺州改州為寧越府令知府王宗顯和州人開郡學延儒士葉儀字景翰金華人宋濓字景濓其先潛溪人遷浦江為五經師戴良字叔能浦江人為學正吳沉字潛仲蘭溪人為訓導時䘮亂之餘學校久廢至是始聞弦誦聲闗先生兵䧟上都焚宫闕尋轉掠遼陽至髙麗自是上都宫闕盡燬帝不復時巡矣既而帝復欲修之工役大興參議中書省事陳祖仁上疏諫曰自古人君不幸遇艱虞多難之時孰不欲奮發有為成不世之功以光復祖宗之業苟或上不奉于天道下不順于民心緩急失宜舉措未當雖以此道持盈守成猶或致亂而况欲撥亂世反之正乎夫上都宫闕創自先帝修于累朝自經兵火焚燬殆盡所不忍言此陛下所為日夜痛心宜亟圖興復者也然今四海未靖倉庫告虚乃欲驅疲民以供大役廢其耕耨而荒其田畝何異扼其吭而奪之食以速其斃乎陛下追惟祖宗宫闕念兹在兹然不思今日所當興復乃有大于此者願陛下以生養民力為本以恢復天下為務信賞必罰以驅策英雄親正人逺邪佞以圖謀治道夫如是則承平之觀不日咸復詎止上都宫闕而已乎疏奏帝嘉納之陳祖仁字子山汴人大饑疫時兩河山東被兵之民攜老幼流入京師重以饑疫死者枕藉宦者保布哈又作王布哈布哈髙麗人按保布哈舊作朴不花今改正後仿此請市地收瘞之前後凡二十餘萬人太白經天己亥十九年春二月詔博囉特穆爾移鎮大同欲􅀝以捍蔽京師故也復置大都督兵農司専督屯種以博囉特穆爾領之所在侵奪民田不勝煩擾三月方國珍遣使以温台慶元三郡附于朱元璋元璋既陷婺州遣使招方國珍國珍與其下謀曰江左號令嚴明恐不能與抗况與我為敵者西有吳南有閩莫若姑示順從藉為聲援以觀其變遂遣使奉書幣請獻温台慶元三郡且以其次子闗為質元璋却其質厚賜而遣之然國珍實隂持兩端特以甘言謝元璋而已夏四月趙均用殺毛貴其黨續繼祖尋執均用殺之韓林兒諸將惟貴稍有智畧其在濟南立賔興院選用故官分守諸路又于萊州立屯田三十六十所凡官民田十取其二多所規畫故得據山東者三年及是為均用所殺其黨續繼祖復自遼陽入益都殺均用遂與其所部自相讎敵五月大蝗山東西河南北及闗中飛蝗蔽天人馬不能行所落溝塹皆平京師銀一錠易米八斗通州民有殺其子而食者六月陳友諒陷信州江東亷訪副使巴延布哈徳克津字蒼崖輝和爾氏按巴延布哈徳克津舊作伯顔不花的斤今改死之友諒遣其黨王奉國宼信州巴延布哈徳克津自衢州往援破走之時鎮南王子逹勝努舊作大聖奴今改屯兵城中開門出迎巴延布哈徳克津登城四顧誓必破賊後數日賊又來攻遂分兵為三出城奮擊斬首數千級復大破之賊繞城植木柵進攻益急又遣使來説降巴延布哈徳克津曰汝來誘我邪我頭可斷足不可移乃數其罪而斬之由是日夜鏖戰糧竭矢盡而氣不衰城中食草苗茶紙括鞾底煮食之又盡乃殺老弱以食巴延布哈徳克津屢出兵破賊王奉國遂穴地梯城晝夜攻之不息踰旬城遂陷巴延布哈徳克津與逹勝努及部將哈喇坦舊作海魯丁今改蔡誠蔣廣皆戰死秋八月察罕特穆爾克汴梁劉福通以韓林兒復走安豐韓林兒本起盜賊無大志又聽命劉福通諸將在外者率不遵約束至啖老弱為糧且皆福通故等夷福通亦不能制兵雖盛威令不行所攻下城邑多不能守至是察罕特穆爾圖復汴梁大發秦晉之師㑹汴城下首奪其外城遂環城而壘累誘賊出戰輒計敗之賊懼不敢復出尋諜知城中計窮食盡乃督諸將分門而攻至夜將士鼓勇登城斬闕而入遂㧞其城劉福通復挾林兒出東門遁還安豐俘獲數萬軍不敢私市不易肆不旬日河南悉定㨗聞詔以察罕特穆爾為河南行省平章兼知行樞密院事仍便宜行事九月朱元璋陷衢處州常遇春入衢州亷訪使宋巴顔布哈舊作伯顔不花今改被擒胡大海入處州舒穆嚕伊遜戰敗走福建境上欲圖克復而人心已散因歎曰吾勢已窮無所往不如還處州境死亦為處州鬼耳還至慶元縣宋縣今屬處州府為亂兵所害元璋既得處州有薦劉基章溢葉琛及宋濓者即以書幣招之入見喜甚嘗從容與論經史及咨以時事命于所居之西創禮賢館處之時李文忠守金華復薦王褘王天錫至皆用之劉基字伯溫青田人章溢字三益龍泉人葉琛字景淵麗水人李文忠字思本盱眙人元璋姊子王褘字子充義烏人遣使徴海運糧于張士誠中原既亂江南海漕久不通京師屢苦饑至是因河南始平乃遣兵部尚書巴延特穆爾等以御酒龍衣賜士誠徴海運糧巴延特穆爾等至杭州傳詔命士誠輸粟方國珍具舟丞相逹什特穆爾總督之既而士誠慮國珍載粟不送京師國珍又恐士誠掣其舟乗虚襲已互相猜疑巴延特穆爾往來開諭乃運粟十一萬石至京師自是嵗以為常冬十一月大都有杜鵑十二月太子殺左丞成遵參知政事趙中先是竒皇后與太子謀内禪諭意太平太平不答后又召太平至宫中舉酒申前意太平依違而已是時太子欲盡逐帝左右令御史劾帝所親暱御史中丞圖嚕特穆爾未及奏而所令御史被遷為他官太子疑太平子額森呼圖克又名均字公秉按額森呼圖克舊作也先忽都今改後仿此泄其事益决意去太平政柄知樞密院事努都爾岱聞之數于帝前左右之以故太子志未得逞至是太子以遵中皆太平所任用令御史誣其贓罪下獄杖殺之陳友諒徙徐夀輝于江州自稱漢王初夀輝聞友諒破龍興欲徙居之友諒忌其來不利于已不從至是夀輝遽引兵發漢陽南下江州友諒陽出迎而伏兵于城西俟夀輝既入門閉伏發盡殺其所部因留夀輝居之而自稱漢王置王府官屬事權一歸友諒夀輝惟擁虛位而已庚子二十年春正月知樞密院事努都爾岱卒二月太平罷成遵等既死㑹努都爾岱又卒太平知勢不可留乃數以病辭位拜太保令養疾于家臺臣奏留之不允三月復以綽斯戩為右丞相時帝益厭政宦者布木布哈用事為奸利綽斯戬因與結搆相表裏四方警報及將臣功狀皆壅不上聞由是内外解體夏五月丁亥朔日食陳友諒攻太平拔其城遂害其主徐壽輝於采石自稱皇帝友諒挾夀輝東下攻太平太平城堅不可拔乃引巨舟薄城西南士卒縁舟尾攀堞而登遂克之朱元璋守將花雲懐逺人及其養子朱文遜等皆不屈死友諒志益驕急謀僭竊進駐采石磯佯使人白事夀輝前戒壯士持鐵撾擊碎其首壽輝死友諒遂以采石五通廟為行殿稱皇帝國號漢改元大義太師鄒普勝以下皆仍偽官㑹大風雨羣下班沙岸稱賀不能成禮友諒既僭號欲東取建康朱元璋令其故人康茂才為書應之友諒果引舟師東下至江東橋呼荗才不應始知見紿遂大敗乘輕舸走還江州元璋乘勢取安慶康茂才字夀卿靳人江東橋在江寧縣江東門外秋九月博囉特穆爾引兵攻冀寧察罕特穆爾調兵拒戰詔遣使和解之初山西晉冀之地皆察罕特穆爾所平定而博囉特穆爾兵駐大同因欲并據晉冀兩人遂相讐隙詔命博囉特穆爾守石嶺關注見前以北察罕特穆爾守闗以南至是博囉特穆爾復調兵自石嶺闗直抵晉冀圍其城三日退屯交城察罕特穆爾調兵拒戰㑹朝廷使參知政事額森布哈等諭令講和遂各退守關南北尋有㫖以冀寜畀博囉特穆爾察罕特穆爾以用兵數年皆藉晉冀給軍食以致强盛不肯奉詔託言用師汴梁尋渡河屯澤潞拒之調延安軍交戰於東勝州再遣部將本布實勒援之本布實勒曰彼軍奉詔而來我何敢抗察罕特穆爾怒殺之已而朝廷復遣使諭二人令罷兵還鎮博囉特穆爾遂罷兵還察罕特穆爾尋亦遣其子副詹事庫庫特穆爾本姓王小字保保察罕特穆爾之甥養為子後按庫庫特穆爾舊作擴廓帖木兒今改正仿此貢糧至京師皇太子親與之定約遂不復疑額森布哈等初奉詔往解二家之兵遷延不進山南道亷訪僉事張楨上疏請誅之不報楨歎曰天下事不可為矣即辭去居河中安邑山谷聞有訪之者不復言時事但對之流涕而已冬十二月陽翟王阿哩衮特穆爾太宗子密特哩大王七世孫舉兵反遣知樞密院事圖沁特穆爾將兵討之時兵起四方朝廷屢詔宗王以北兵南討阿哩衮特穆爾知國事不可為乘間擁兵數十萬屯於穆爾楚在開平南境穆爾固楚舊作木兒古徹兀今改之地將犯京畿使來言曰祖宗以天下付汝汝己失其大半若以國璽付我我當自為之帝遣報之曰天命有在汝欲為則為之遂命圖沁特穆爾將兵擊之軍潰圖沁特穆爾走上都辛丑二十一年夏四月辛巳朔日食秋八月朱元璋克江州陳友諒走武昌友諒遣其將張定邊復取安慶元璋乃率舟師遡流而上友諒將傅友徳其先宿州人後徙碭山等皆迎降長驅向江州分兩翼挾擊大破之友諒挈妻子夜奔武昌遂克其城既而友諒江西行省平章胡廷瑞以龍興降于元璋建昌饒袁相繼皆降元璋入龍興除陳氏苛政改為洪都府美胡廷瑞沔陽人後改名察罕特穆爾克山東田豐等降察罕特穆爾既定河南乃以兵分鎮闗陜荆襄河洛而重兵屯太行營壘旌旗相望數千里日訓練士卒務農積糓謀大舉以復山東至是諜知山東羣盗自相攻殺乃輿疾自陜抵洛大㑹諸將議師期分兵五道水陸並進而自率鐵騎渡孟津踰覃懐而東復冠州隋冠氏縣地元置州今為縣屬東昌府東昌遣其子庫庫特穆爾直𢷬東平以田豐據山東久軍民服之乃遺書諭以順逆之理豐及王士城皆降遂復東平濟寜時賊兵皆聚於濟南察罕特穆爾乃分竒兵間道出賊後南畧泰安逼益都北徇濟陽金縣今屬濟南府章邱隋縣今亦屬濟南府中循瀕海郡邑自將大軍進逼濟南攻圍三月乃下之九月阿哩衮特穆爾兵敗伏誅阿哩衮特穆爾兵逼上都命少保魯章以兵十萬擊之大敗其衆時太子言於帝令以太平為留守實欲置之死地㑹阿哩衮特穆爾部將托歡者太平子額森呼圖克故將也引兵縳阿哩衮特穆爾至軍前太平不受送闕下誅之冬十月以察罕特穆爾為平章政事仍兼知河南山東行樞密院事陜西行臺中丞十一月黄河清自平陸三門磧即砥柱三門注見前下至孟津五百里皆清凡七日大饑壬寅二十二年春正月李思齊等攻張良弼良弼敗之先是博囉特穆爾遣其將據長安謀入陜朝廷以張良弼為陜西參政駐兵藍田受節制於察罕特穆爾良弼隂結平章鼎珠聴丞相托里特穆爾調遣察罕特穆爾銜之與李思齊連兵攻良弼詔和解之且命思齊討四川良弼平襄漢以分其勢尋申諭二將各以兵自効未幾思齊復遣兵攻良弼至于武功良弼伏兵大破之二月彗星見未幾長星復見于虚危之間其形如練長數十丈三月明玉珍陷雲南夏五月自稱隴蜀王初玉珍聞陳友諒害徐壽輝謀欲討之乃堅兵守䕫關絶不與通復立廟以祀夀輝至是遣兵陷雲南省治屯金馬山在今昆明縣東玉珍遂自稱隴蜀王以張楨字維周瀘州人為參謀分兵陷興元鞏昌等路六月田豐復叛平章政事察罕特穆爾遇害詔以其子庫庫特穆爾代總其兵時山東俱定獨益都孤城不下察罕特穆爾移兵圍之大治攻具諸道並進賊悉力拒守田豐復與王士誠隂結賊謀叛初豐之降也察罕特穆爾推誠待之不疑數入其帳中及是豐乃紿請行營衆以為不可往察罕特穆爾曰吾推心待人安得人人而防之左右請以力士從又不許乃從十一騎行至豐營遂為士誠所刺先是太史奏白氣如索起危宿貫太微垣山東當大水帝曰不然山東必失一良將即馳詔戒察罕特穆爾勿輕舉未至而已及于難詔贈河南行省左丞相封潁川王諡忠襄命其子庫庫特穆爾為平章政事兼知山東河南行樞密院事代總其兵冬十一月庫庫特穆爾克益都執田豐等誅之庫庫特穆爾既領兵討賊誓必復讐而賊城守益固乃穴地通道以入抜其城執賊首陳猱頭等二百餘人獻闕下而取田豐王士誠之心以祭其父餘黨皆就誅尋遣兵取莒州山東悉平乃引兵還河南十二月立塔斯特穆爾舊作塔思帖木兒今改後仿此為髙麗王遣兵送之國髙麗以兵拒之大敗而還初皇后竒氏宗族在髙麗者恃􅃂驕横為國王巴延特穆爾所殺后䜛之于帝遂廢巴延特穆爾而議立其昆弟在京師者塔斯特穆爾為王國人上書言舊王不當廢新王不當立帝不聴乃以將作同知崔特穆爾為丞相率兵萬人送之國至鴨緑江髙麗伏兵四起乃大敗僅餘十七騎走還京師遣戸部尚書張㫤宛平人如江東以朱元璋為江西行省平章政事元璋不受初察罕特穆爾破山東江淮震動元璋遣使致書于察罕特穆爾察罕特穆爾留其使朝廷因命戸部尚書張㫤郎中嗎哈木特舊作馬合謀今改浮海如江東授元璋江西等處行中書省平章政事賜以龍衣御酒未至而察罕特穆爾被刺元璋遂不受殺嗎哈木特以張㫤才留官之癸夘二十三年春正月明玉珍稱帝於重慶玉珍用劉楨䇿僭即帝位建國號曰夏改元天統二月張士誠將吕珍入安豐殺劉福通朱元璋率兵擊走之以韓林兒歸于滁州時福通兵勢日窘珍引兵圍安豐林兒吿急于元璋元璋乃率徐達常遇春等往救之未至而珍已殺福通據其城元璋擊走之以林兒歸居之滁州夏六月博囉特穆爾遣珠占襲據陜西庫庫特穆爾與李思齊合兵討珠占降之時陜西行省右丞達什特穆爾與行臺有隙且恐陜西為庫庫特穆爾所據隂結博囉特穆爾請珠占入城刦取御史大夫旺扎勒特穆爾印復拘留之庫庫特穆爾遣部將摩該舊作􅀈髙今改後仿此合李思齊兵討之珠占乃降秋七月陳友諒圍洪都朱元璋率師救之大戰于鄱陽湖友諒敗死張定邊等復立其子理初友諒忿疆埸日蹙乃大治舟艦復圍洪都載家眷百官盡鋭進攻飛梯衝車百道並舉時元璋從子文正元璋兄興隆之子及鄧愈守洪都随方備禦三月不能下趙徳勝中流矢死内外音問不通文正乃遣使赴建康吿急元璋自將救之進次湖口友諒聞援兵至撤圍東出鄱陽湖遇于康郎山友諒兵號六十萬元璋分兵十一隊禦之張守邊直趨元璋舟舟膠于沙不得退危甚適援舟驟進水湧得脱友諒集巨艦連鎖為陣元璋兵仰攻不下皆有怖色㑹日暮東北風起乃命死士載火藥蘆葦焚友諒舟風烈火熾友諒弟友仁等皆燒死翌日復戰自辰至午友諒兵大敗欲退保鞋山即大孤山以形似得名元璋既扼湖口邀其歸路相持數日友諒食盡突圍出湖口元璋自上流邀擊之大戰涇江今名禁江在湖口縣東北口友諒軍且鬬且走日暮猶不解友諒從舟中引首出有所指撝驟中流矢貫睛及顱而死軍遂大潰其長子善兒被執張定邊夜挾友諒次子理載其屍遁還武昌復立理為帝改元徳壽元璋復進兵圍之既而還建康留常遇春督諸軍先是元璋救安豐劉基諫不聴至是謂基曰我不當有安豐之行使友諒乘虛𢷬建康大事去矣乃頓兵南昌不亡何待友諒亡天下不足定也張士誠自稱吳王詔徵其糧士誠不奉詔士誠令其下頌功徳邀王爵達什特穆爾恐逆其意為所害乃具文請于朝至再三不報士誠遂自立為吳王即平江治宫室置官屬尊母曹氏為太妃朝廷遣使徵糧不復與參軍俞思齊字中孚泰州人諫曰向為賊可無貢今為臣不貢可乎士誠怒抵案仆地思齊即引疾去士誠以弟士信與女夫潘元紹為腹心參軍黄敬夫蔡彦文葉徳新主謀議陳基饒介典文章又好招延賔客所贈遺甚具諸僑寓者爭趨之冬十月山東赤氣千里博囉特穆爾遣兵攻冀寜庫庫特穆爾擊走之博囉特穆爾自察罕特穆爾既死之後復數以兵爭晉冀朝廷雖屢下詔解之而讐隙日深至是復遣兵攻冀寜至石嶺闗庫庫特穆爾大破之擒其將烏嗎喇殷興祖軍勢日蹙十一月殺太傅太平初帝欲以巴咱爾舊作伯撒里今改後仿此為相辭曰老臣不足以任宰相若必以命臣非得太平同事不可時太平方辭歸奉元于是密㫖令巴咱爾留之太平至沙岸聞命而止皇太子惡之令御史大夫布哈劫其違命詔拘収所受宣命綽斯戩因誣奏之詔安置土蕃復遣使至東勝逼令自裁十二月出治書侍御史陳祖仁為甘肅參知政事御史大夫羅達錫帝母舅按羅達錫舊作老的沙今改後仿此知樞密院事圖沁特穆爾皆逃時宦者布木布哈托歡内侍太子外結綽斯戩驕恣不法御史傅公讓劾之忤太子意坐左遷祖仁乃上書太子極諫其畧曰天下者祖宗之天下臺諫者祖宗之所建立顧以二􅆆之㣲而于天下之重臺諫之言一切不恤獨不念祖宗乎且殿下職在監國撫軍問安視膳而已予奪賞罰之權自在君父今方毓徳春宫反使諫臣結舌凶人肆志豈惟君父徒擁虚器天下蒼生亦將奚望書奏太子怒令御史大夫羅達錫諭祖仁以托歡等初無是事御史紏言不實已與美除昔裕宗為太子時凡事合奏者皆許啓聞非獨我今日也祖仁乃復上書切言之而臺臣大小皆請罷于是太子以其事聞二人乃皆辭退帝又令羅達錫諭㫖祖仁復上書極論之其畧曰祖宗以天下傳之陛下今乃壊亂不可救藥雖曰天運使然亦刑法不明之所致也區區二􅆆猶不能除况于大者願陛下顯斥二人勿令以辭退為名成其奸計使海内皆知陛下信賞必罰自二人始則將士亦必効力天下可全疏既奏帝大怒時侍御史李國鳳亦言二人當斥于是祖仁等皆左遷時羅達錫執其事頗力太子惡之因譖于帝以母舅故封為雍王遣歸國而復以布木布哈為集賢大學士羅達錫乃與圖沁特穆爾皆奔大同博囉特穆爾匿之軍中甲辰二十四年春正月朱元璋自立為吳王元璋以正月朔即吳王位建有司官屬以李善長為右相國徐達為左相國常遇春俞通海為平章政事汪廣洋字朝宗髙郵人為右司郎中張㫤為左司都事二月吳王元璋將兵圍武昌陳理降元璋以武昌圍久不下復自將攻之其臣張必先自岳州來援常遇春擊擒之徇于城下城中大懼元璋乃遣其故臣羅復仁入城招理理遂率其太慰張定邊等出降凡府庫倉儲恣理自取城中民饑困發粟賑之以理歸建康封為歸徳侯湖廣江西諸郡縣皆降於元璋江西行省以陳友諒鏤金牀進元璋曰此與孟昶七寳溺器何異立命毁之時句容儒士戎簡入見語及陳氏之事簡曰向者敗陳氏于九江其衆既潰何不乘虚直抵武昌而乃引還今雖克之費力多矣元璋曰汝豈不知覆巢之下豈有完卵乎若乘勝急追彼必死鬬殺傷必多吾故縱之遣偏師綴其後恐其奔逸料彼創殘之餘人各偷生喘息不暇豈復敢戰我以大軍臨之故全城降服一者我師不傷二者生靈復全三者保全智勇所得不亦多乎簡大悦服三月削博囉特穆爾官爵不受命詔庫庫特穆爾討之夏四月博囉特穆爾舉兵犯闕殺右丞相綽斯戩太子出奔初綽斯戩徇太子㫖遂誣羅達錫及太平子宣政院使額森呼圖克等謀不軌収其黨鍜鍊具獄連逮不已帝知其無辠數諭太子寢其事太子不從綽斯戩布木布哈皆阿附太子必窮究其事額森呼圖克等皆貶死又圖沁特穆爾先與中書右丞額森布哈有隙額森布哈因譖其詆毁朝政而博囉特穆爾素與圖沁特穆爾相友善且知其受誣遣人白其非罪太子怒博囉特穆爾跋扈交通圖沁特穆爾及羅達錫等于是下詔削博囉特穆爾官爵而奪其兵博囉特穆爾拒命遂詔庫庫特穆爾率兵討之博囉特穆爾知詔命調遣皆由綽斯戩所為非出帝意遂命圖沁特穆爾舉兵向闕入居庸闗知院伊蘇䝉古人按伊蘇舊作也速今改後仿此詹事布喇竒迎戰不利皇太子率侍衛兵出古北口東走興松二州名元興州今在熱河界内元松州今在哈爾沁右翼界内圖沁特穆爾兵至清河在宛平縣西北水出玉泉山至海淀分流而北東入白河列營時京師無備城中大震令百官吏卒分守使達達國師即其軍問故以必得綽斯戩布木布哈為對詔慰解之不聴乃執二人畀之皆為所殺遂復博囉特穆爾官爵加太保仍命守禦大同圖沁特穆爾兵自健徳門入覲帝于延春閣慟哭請罪帝宴賚之授平章政事乃引軍還大同五月太子還宫遣兵攻大同博囉特穆爾復舉兵犯闕太子率師拒之戰不利遂復出奔詔以博囉特穆爾為右丞相先是太子至路兒嶺詔追及之還宫恚怒不已遂命庫庫特穆爾調兵分道討博囉特穆爾其東道以白索珠舊作鎖住今改領兵三萬守禦京師中道以摩該珠占領兵四萬西道以闗保領兵五萬合擊之闗保等進逼大同博囉特穆爾留兵守大同而自率兵與圖沁特穆爾羅達錫復大舉向闕前鋒入居庸闗太子親統兵禦于清河軍潰馳還白索珠遂引兵扈從太子出順承門由雄霸河間取道以達冀寜博囉特穆爾兵駐健徳門外與羅達錫等入見帝于宣文閣訴其非罪皆泣帝亦泣乃賜宴博囉特穆爾欲追襲太子羅達錫止之博囉特穆爾又使翰林承㫖張翥草詔削奪庫庫特穆爾官爵發兵討之翥不從或勸之翥曰吾臂可㫁筆不可操帝知其不可奪乃命他學士為之張翥字仲舉晉寜人遂以博囉特穆爾為左丞相尋進右丞相節制天下軍馬羅達錫為平章政事圖沁特穆爾為御史大夫其部屬皆布列省臺百司博囉特穆爾既専國遂誅狎臣圖嚕特穆爾等罷三宫不急諸造作沙汰宦寺禁西僧作佛事數遣使請太子還使至太原拘留不報秋八月壬辰朔日食張士誠逐達什特穆爾以其弟士信為江浙左丞相南臺御史大夫布哈特穆爾不屈死時右丞達蘭特穆爾舊作荅蘭帖木兒郎中珍布舊作真保今並改後仿此二人諂事士誠受其金帛數媒孽達什特穆爾之短于士誠遂有不相容之勢至是士誠遣使面數達什特穆爾過失勒其自陳老病去職又言丞相非士信不可即逼取符印遷于嘉興幽之而士信自為丞相士誠又諷行臺為之請實授王爵布哈特穆爾不從即使人至紹興索其臺印布哈特穆爾封其印置諸庫曰我頭可斷印不可與又迫之登舟曰我可死不可辱也從容沐浴更衣與妻子訣賦詩二章乃仰藥死後數日達什特穆爾聞之嘆曰大夫且死吾不死何為遂命左右以藥酒進飲之而死乙巳二十五年春二月日旁有一月一星三月太子大發兵討博囉特穆爾博囉特穆爾幽二皇后竒氏調兵拒戰大敗時太子在外日夜謀除内難庫庫特穆爾使白索珠將二萬騎屯漁陽為朝廷聲援而使闗保等以兵𢷬大同克之太子乃承制大發諸路兵分三道而進自率庫庫特穆爾兵由中道博囉特穆爾怒遂出二皇后竒氏幽之于諸色總管府既又逼后還宫取印章偽為后書召太子復出而幽之乃遣圖沁特穆爾率衆攻上都之附太子者調伊蘇南禦庫庫特穆爾兵伊蘇次良鄉不進而謀之于衆皆以為博囉特穆爾稱兵悖逆中外同憤遂勒兵歸永平遣人西連庫庫特穆爾東連遼陽諸王軍聲大振博囉特穆爾患之遣驍將姚巴延布哈統兵出拒至通州河溢營虹橋在通州之東以待伊蘇出其不意襲而破之擒斬姚巴延布哈博囉特穆爾大怒自將兵出通州三日大雨而還時后亦數納美女于博囉特穆爾至百日始還宫初庫庫特穆爾將輔皇太子入討博囉特穆爾因遣使傳皇太子㫖賜前僉山南道肅政亷訪使張楨以上尊且訪以時事楨復書曰合燕趙齊魯之境大河内外長淮南北悉為邱墟闗陜之區所存無幾江左日思薦食上國湘漢荆楚川蜀淫名僭號幸我有變閣下國之右族三世二王得不思亷藺之于趙㓂賈之于漢乎京師一殘假有不逞之徒􅔒起草澤借名義存君父倡其説于天下閣下將何以處之守京師者能聚不能散禦外侮者能進不能退紛紛籍籍神分志奪國家之事能不為閣下憂乎志曰不備不虞不可以為師僕之惓惓為言者獻忠之道也然為言大要有三保君父一也扶社稷二也衛生靈三也請以近似者陳其一二衛出公據國至于不父其父趙有沙邱之變其臣成兑平之不可謂無功而後至于不君其君唐肅宗流播之中怵于邪謀遂成靈武之篡千載之下雖有智辯百出不能為雪嗚呼是豈可以不鑒之乎然吾聞之天之所廢不驟也驟其得志肆其􅃂樂使忘其覺悟之心非安之也厚其毒而降之罰也天遂其欲民厭其汰而鬼神勿福也其能久乎閣下覽觀焉謀出于萬全則善矣詢之輿議急則其變不測徐則其釁必起通則往來之使達其上下之情得其情則得其䇿矣孔子曰君君臣臣父父子子今九重在上者如寄青宫在下者如寄生民之憂國家之憂也可以深思而熟計之哉庫庫特穆爾深納其説夏五月大都雨氂長尺許或曰龍鬚也命拾而祀之秋七月博囉特穆爾羅達錫圖沁特穆爾等皆伏誅博囉特穆爾先嘗以疑殺其將保安既又失姚巴延布哈鬱鬱不樂乃日與羅達錫等飲宴荒淫無度又酗酒殺人喜怒不測威順王之子華善忿其無君數言于帝受密㫖與徐士本謀結勇士瑪勒舊作上都馬今改金諾海舊作那海今改畢徳爾舊作百達兒今改等隂圖剌之至是圖沁特穆爾遣使來吿攻上都之捷博囉特穆爾入奏行至延春閣下畢徳爾自衆中奮出斫之中其腦瑪勒等競前斫死羅達錫傷額趨出擁博囉特穆爾家屬北遁詔民間盡殺其部黨既而羅達錫被執伏誅圖沁特穆爾引輕兵走巴咱爾舊作八思兒今改之地尋亦討殺之時遇變城門不開者三日珠占摩該軍至城外縁城而上碎平則門鍵以入大掠于都市皇后翁吉喇特氏崩九月太子還大都以巴咱爾為右丞相庫庫特穆爾為左丞相帝遣使函博囉特穆爾首往冀寜召太子還于是庫庫特穆爾扈從至京師詔以巴咱爾為太師右丞相庫庫特穆爾為太尉左丞相知樞密院事冬閠十月詔封庫庫特穆爾為河南王總制諸道軍馬時巴咱爾以累朝舊臣庫庫特穆爾後生晚進與之並相中朝多忌之者而庫庫特穆爾久典軍亦不樂在内居兩月即請南還視師是時中原無事而江淮川蜀皆已陷没皇太子累請躬出督師征討帝難之乃詔封庫庫特穆爾河南王代之親征總制闗陜晉冀山東諸道並迤南一應軍馬凡黜陟予奪悉聴便宜而行庫庫特穆爾于是分省中官屬之半以自随鹵簿甲仗亘數十里軍容甚盛尋還河南欲廬墓以終喪左右咸以為受命出師不可中止乃復北渡居懐慶又移居彰徳十二月立竒氏為皇后改竒氏為索隆噶舊作肅良合今改氏丙午二十六年春二月黄河北徙禹貢錐指元大徳初河決把縣蒲口蓋河自陳留南入於把其後河徙而北自陳留入蘭陽儀封而把界遂無河矣考河自金明昌五年南北分流後大勢日趨於南而北流益弱此云北徙者乃決流非大徙也故特引禹貢錐指以釋之先是河決小流口達于清河壊民居傷禾稼至是復北徙自東明曹濮下及濟寜民皆被害庫庫特穆爾調張良弼等兵不應遂遣兵西擊良弼李思齊等與良弼連兵拒之初李思齊與察罕特穆爾同起義兵齒位畧相等及是庫庫特穆爾總其兵檄諸將㑹師大舉思齊不能平而張良弼遂首拒命孔興圖魯卜舊作脱烈伯今改後仿此等亦皆恃功懐異請别為一軍莫肯統屬庫庫特穆爾嘆曰吾奉詔總天下兵而鎮將皆不受調遣何討賊為乃遣闗保和爾齊舊作虎林赤今改後仿此以兵西攻良弼於鹿臺思齊與圖魯卜孔興等皆與良弼合庫庫特穆爾遣闗保等合兵渡河且約思齊以攻良弼良弼遣子弟質于思齊連兵拒守闗保等戰不利思齊請詔和解之時禮部侍郎瑪實貝爾吏部侍郎温都爾罕持詔諭思齊開通川蜀道路思齊方事兵爭不奉詔瑪實貝爾等留鳳翔一年始還京師哈按瑪實貝爾舊作滿尚賔温都爾罕舊作掩篤剌今並改後仿此三月明玉珍卒子昇復僭稱帝玉珍素無逺畧然性節儉頗好學折節下士既僭稱尊號設國子監教公卿子弟開進士科定賦税以十分取一蜀人悉便安之至是疾革召其左丞相戴夀等諭之曰西蜀險固若協力同心則可以自守不然後事非所知也遂卒子昇立年甫十嵗尊母彭氏為太后同聴政夏四月吳王元璋取淮安諸路時徐達克髙郵遂襲破張士誠將徐義于淮安義遁左丞梅思祖夏邑人以城降濠徐宿諸州皆相繼下之元璋遂如濠州省基置守塜二十家召父老飲極歡除其税賦秋七月辛巳朔日食八月以陳友定一名有定字安國福清人為福建行省平章政事友定始為黄土砦巡檢以討平山寨功再遷為汀州路總管陳友諒將鄧克明陷汀州友定入援連戰克捷盡復所失州縣進參知政事尋進兵攻處州為朱元璋守將胡深字仲淵處州龍泉人所敗深乃與朱亮祖進攻建寜破二柵友定遣阮徳柔以兵四萬繞出深後斷其歸路而自帥鋭師搏戰徳柔自後夾擊深兵大敗遂被執而死至是詔置分省於延平以友定為平章于是友定盡有福建八郡之地友定頗任威福所屬違令者誅竄不絶威震八閩然事朝廷未嘗失臣節時張士誠方國珍各據一方嵗漕粟大都輙不至而友定嵗輸粟數十萬石海道遼逺至者嘗十三四帝嘉之下詔褒美九月以方國珍為江浙行省左丞相先是以國珍為淮南左丞相分省慶元至是復拜江浙左丞相封衢國公其弟國瑛國珉姪明善並為平章政事有星孛于東北吳王元璋遣將擊張士誠取湖州諸路元璋與張士誠接境數以兵相攻元璋將廖永安字彦敬永忠兄被執死謝再興叛降于士誠㑹元璋方與陳友諒相持未暇東畧及破武昌即出師規取淮北地至是元璋乃移檄數士誠八罪命徐達常遇春帥二十萬衆擊之元璋命之曰城下之日毋殺掠毋毁廬舍毋發邱壟士誠母塟平江城外毋侵毁既而召問達遇春用兵當何先遇春欲直𢷬平江元璋曰湖州張天騏杭州潘原明為士誠臂指平江窮蹙兩人悉力赴援難以取勝不若先攻湖州羽翼既披平江勢孤立破矣達等自太湖趣湖州守將迎戰而敗遂進圍之士誠遣朱暹等來援屯於舊館村名在烏程縣東達遇春築壘斷其糧道士誠知事急親督兵來戰敗於皂林潘元紹又敗于烏鎮在烏程縣東南昇山在烏程縣東水陸寨皆破舊館援絶朱暹等降達等以徇于城下城中大震左丞張天騏遂舉城降於是李文忠攻杭州紹興華雲龍定逺人攻嘉興皆下之冬十二月韓林兒卒林兒既居滁州至是卒僭號凡十二年或曰吳王元璋命廖永忠迎林兒歸建康至𤓰步覆舟沉于江云吳江元璋立宗廟社稷元璋本用宋龍鳳年號林兒既殁始以明年為吳元年立廟社建宫室有司進宫殿圖見有雕琢竒麗者即去之及新殿成製皆樸素命博士熊鼎編次古人行事可為鑒戒者書于殿壁又命書大學衍義于兩廡壁間曰前代宫室多施絢畫今書此以備省覽豈不愈于丹青乎時有言瑞州出文石可以甃地者元璋曰搆建宫室已覺作者之勞况逺取文石能不厲民乎言者慙而退元璋又命訪求古今書籍嘗謂博士詹同等曰吾毎無事輒取孔子之言觀之如節用而愛人使民以時真治國之良規也尋又命協律郎冷謙考正雅樂音律及鐘磬等器定樂舞之制文武生各六十四人又定文武二科取士之制其應文舉者察之言行以觀其徳考之經術以觀其業試之書算以觀其能䇿以經史時務以觀其政事應武舉者先之以謀畧次之以武藝令有司預為勸勉以俟開科源詹同初名書字同文婺人丁未二十七年吳王朱元璋元年春正月絳州天鼔鳴其聲如空中戰鬭者李思齊等㑹兵于陜西同拒庫庫特穆爾庫庫特穆爾遣其弟托音特穆爾舊作脱因帖木兒今改後仿此以一軍屯濟南防遏南軍而引兵西入闗攻思齊等思齊乃與張良弼圖魯卜等㑹于含元殿舊基共推思齊為盟主遣將守黄連寨庫庫特穆爾使闗保等擊走之侯巴延達什舊作侯伯顔達世今改後仿此以兵援庫庫特穆爾亦攻下秦州既而闗保引兵退侯巴延達什亦奔潰思齊乃遣將㑹良弼等屯於華隂而自還鳳翔夏六月丙午朔日食秋八月詔太子總制天下軍馬置大撫軍院初太子之奔太原也欲援唐肅宗靈武故事自立庫庫特穆爾不從及還京竒后遣人諭庫庫特穆爾以重兵擁太子入城脅帝禪位庫庫特穆爾逆知其意未至京城三十里即散遣其軍以數騎入朝故太子深銜之及與李思齊相持經年帝數使使諭令罷兵専事江淮庫庫特穆爾欲遂定思齊等然後引軍東不奉詔廷臣譁言其跋扈有狀帝亦心忌之乃下詔命皇太子以中書令樞密使總制天下軍馬詔畧曰曩者障塞決河本以拯民昏墊豈期妖盗積造訛言塗炭郡邑兹逾一紀阿裕錫哩達喇計安社稷累請出師朕以國本至重遂授庫庫特穆爾總戎重寄俾代其行李思齊等各懐異見稱兵不已以至盗賊愈熾深遺朕憂爰遵舊典命皇太子悉總天下兵馬生殺予奪事無輕重如出朕裁其庫庫特穆爾總領本軍自潼闗已東肅清江淮李思齊自鳳翔以西進取川蜀以少保圖魯為陜西行省左丞相總本部及張良弼孔興魯卜各枝兵馬進取襄樊王信固守山東别聽調遣太子又用錫喇岱爾舊作沙藍答兒今改後仿此等計立大撫軍院設知院同知等官専備庫庫特穆爾九月吳王元璋克平江執張士誠以歸士誠自殺先是徐達等進攻平江築長圍困之士誠拒守數月數突圍決戰不利元璋貽書招之不報士誠故將李伯昇知其困甚遣所善客踰城説之降亦不聴士誠故有勇勝軍皆驍猛善鬭悉敗溺萬里橋下死最後丞相士信中礟死城中洶洶無固志至是城破士誠収餘衆戰于萬夀寺在蘇州府治東北東街衆散走倉皇歸府第拒戸自經故部將趙世雄解之士誠妻劉氏積薪齊雲樓在蘇州府治後子城上下驅羣妾登樓令養子辰保縱火焚之亦自縊徐達數遣李伯昇等諭意士誠士誠瞑目不荅乃以戸扉舁之出葑門入舟不復食至金陵竟自縊死士誠為人外遲重寡言似有器量而實無逺圖既據有吳中吳承平久戸口殷盛士誠漸奢縱怠于政事其弟士信及潘元紹尤好聚歛金玉珍寳及法書名畫無不充牣將帥亦偃蹇不用命每有攻戰輒稱疾邀官爵田宅然後起至軍即摴蒲蹴踘皆不以軍務為意及喪師失地還士誠概置不問已復用為將上下嬉娛以至于亡元璋既克平江乃遣使致書于帝並送宗室紳寳舊作神保今改後仿此大王等北還冬十月詔罷庫庫特穆爾官奪其軍命諸將分統之初太子既受詔竟止不行而分兵之命庫庫特穆爾亦扞拒不受其將摩該所統多博囉特穆爾之效部曲因鼓變脇之叛庫庫特穆爾殺衛輝彰徳守將欲進襲懐慶聞有備而還摩該遂上疏列庫庫特穆爾罪狀于朝闗保亦自歸于朝廷帝乃下詔以庫庫特穆爾拒命宜黜其兵柄落太傅左丞相及兼領諸職仍前河南王以汝州為其食邑弟托音特穆爾為集賢學士同居河南其帳前諸軍命索珠和爾齊分統之河南諸軍李克􅂜統之闗保本部軍仍令統之山東諸軍伊蘇統之山西諸軍錫喇岱爾統之河北諸軍摩該統之詔下庫庫特穆爾遂退軍澤州吳王元璋遣徐達等將兵北侵元璋召諸將議曰山東則王宣反測河南則庫庫特穆爾跋扈闗隴則李思齊等梟張猜忌元祚將亡中原塗炭今將北伐何以決勝常遇春曰以我百戰之師敵彼久逸之卒直𢷬元都破竹之勢也元璋曰元建國百年守備必固懸軍深入餽餉不前援兵四集危道也吾欲先取山東撤彼屏蔽移兵兩河破其藩籬拔潼闗而守之扼其戸檻然後進兵元都勢孤援絶不戰自克鼓行而西雲中九原闗隴可蓆捲也諸將皆曰善乃以徐達為征討大將軍常遇春為副將軍率師二十五萬由淮入河而北時又命征南將軍胡廷瑞率安吉寜國等軍南取八閩俟八閩既定即以其師航海趣廣東湖廣平章楊璟等率荆湘之衆以取廣西楊璟合肥人吳王元璋定律令初元璋以唐宋皆有成律斷獄惟元不倣古制取一時所行之事為條格胥吏易為奸弊自平武昌以來即議定律至是命左丞相李善長等詳定律令語之曰立法貴在簡當使人易曉若條緒繁多或一事而兩端可輕可重奸貪之吏得夤縁為奸則所以禁殘暴者反以賊良善非良法也卿等宜盡心參究凡刑名條目逐日來上吾與卿等面議斟酌之庶可以為久逺之法既而太史院使劉基及其屬髙翼以所定戊申厯來上元璋命頒行之十二月吳王元璋遣將克慶元方國珍降初元璋遣兵攻温州國珍懼請俟杭城下即納土來歸元璋為罷兵及杭州既克國珍據境自若遣間諜假貢獻名覘勝負又數通好于庫庫特穆爾及陳友定元璋怒遺書責其懐奸挾詐陽降隂叛且徵其貢糧二十三萬石國珍不報遂遣湯和等進兵克温台州長驅抵慶元國珍懼遁入海島復令廖永忠引兵自海道㑹和攻之其步將多來降諸郡縣相繼皆下國珍惶惑失措乃遣子明完奉表乞降既而及其弟國珉親帥所部謁和于軍門和送國珍等于建康元璋授國珍廣西行省左丞食祿不之官數年卒于建康時延平建寜福州興化漳泉皆屬陳友定湯和兵既克國珍遂由海道徑取福州吳王元璋兵陷山東諸路徐達常遇春引兵而北首陷沂州進陷嶧州宋置今為縣屬兖州府于是般陽濟寜萊州東平濟南諸路相繼皆陷詔右丞相伊蘇同諸將守禦山東李思齊為副總統圖魯卜等出潼闗渡河東行共勤王事思齊等皆不奉命戊申二十八年是年依厯朝嬗代一嵗兩係例閠七月以前為元順帝至正二十八年八月以後為明太祖洪武元年春正月吳相國李善長等奉吳王元璋為皇帝國號明先是善長等率羣臣奉表勸進王不允凡三上王乃命具儀以聞及是遂祀天地於南郊即皇帝位定國號曰明建元洪武追尊祖考為皇帝髙祖考曰元皇帝廟號徳祖曽祖考曰恒皇帝廟號懿祖祖考曰裕皇帝廟號熙祖考曰淳皇帝廟號仁祖妣皆皇后立妃馬氏為皇后世子標為皇太子后仁慈有智鑒好書史吳漢接境戰爭無虚日后手緝甲士衣履佐軍嘗言治天下以不殺人為本明主善之既即位欲官后族后謝曰爵禄私外家非法力辭而止乃追封后父馬公徐王修墓置廟標后長子也明以李善長為左丞相徐達為右丞相善長少習法家言有智計明主嘗從容問曰四方戰爭何時定乎對曰漢髙祖起布衣豁達大度知人善任五載成帝業今元綱既紊天下土崩瓦解公濠産距沛不逺山川王氣公當受之法其所為天下不足定也明主稱善明主凡自將征討皆命居守轉調兵餉無乏至是改官制尚左以為左丞相明將軍湯和陷福建平章陳友定死之先是明主既命和由海道趨閩復命胡美即胡廷瑞注見前由江西趨杉闗注見前遣使至延平招友定友定置酒㑹諸將殺死者瀝血酒中與衆酌飲之誓以死守已聞杉闗破急分軍為二以一軍守福而自帥一軍守延平和舟師抵福之五虎門在福州府閩縣海中五虎山下蟻附登城守將遁去參政尹克仁宣政使多爾瑪舊作朶耳麻今改不屈死僉院拜特穆爾殺妻女縱火自焚死時胡美已克建寕和遂進攻延平友定欲以持久困之諸將請出戰不許數請不已友定疑其部將殺一人軍士多出降者㑹軍器局災城中礟聲震地明師知有變急攻之友定呼其屬與訣退入省堂仰藥死所部開門納明師舁友定出水東門未絶也天大雷雨友定復甦械送建康入見明主詰之友定厲聲曰國破家亡死耳尚何言遂併其子殺之延平既下興化泉州皆望風附獨漳州路達嚕噶齊徳爾密什囘囘人按徳爾密什舊作迭里彌實今改自殺時稱閩有三忠謂友定拜特穆爾徳爾密什也削庫庫特穆爾爵邑命圖嚕李思齊討之庫庫特穆爾既退軍澤州帝知其勢孤乃詔李思齊等東出闗與摩該共攻之而命闗保以兵戍大原庫庫特穆爾憤甚引兵據太原盡殺朝廷所置官吏于是下詔削庫庫特穆爾官爵令諸將四面討之夏四月明將軍廖永忠陷廣東永忠自福州以書諭行省左丞何真字邦佐東筦人曉譬利害真即奉表迎降永忠至廣東降盧左丞擒海㓂邵宗愚數其殘暴斬之廣人大悦馳諭九真曰南朱崖儋耳三十餘城皆納印請吏又遣陸仲亨濠人進畧清逺英徳亷州廣東悉入于明明徐達常遇春陷河南梁王阿哩衮察罕特穆爾之父也降于明徐達陷山東㑹遇春于濟寜引舟師泝河趣汴梁守將李克彞走左君弼珠占等降遂自虎牢闗入守將托音特穆爾以兵五萬陳洛水北遇春單騎突陳二十餘騎攢槊刺之遇春一矢殪其前鋒大呼馳入托音特穆爾軍遂大潰追奔五十餘里梁王阿哩衮降嵩陜陳汝諸州次第告陷明主如汴梁改為開封府召徐達至命其率軍北畧諭之曰中原之民久為羣雄所苦故命將北伐拯民水火元祖宗功徳在人其子孫罔恤民隠天厭棄之君實有罪民則何辜前代革命之際肆行屠戮朕實不忍諸將毋肆焚掠妄殺人元之宗戚咸俾安全庶幾上荅天心下慰民望達頓首受命明主尋還應天明都督馮勝陷潼闗明師既陷河南李思齊張良弼明史作張思道今仍従元史合兵駐潼闗㑹火焚良弼營思齊移軍葫蘆灘在華隂縣渭水南明師遂陷潼闗思齊奔鳳翔良弼奔鄜城注見前尋共推思齊為總兵諸將皆以兵㑹之於鳳翔六月明平章楊璟陷廣西璟攻永州鄧祖勝歛兵固守璟分營築壘造浮橋西江急攻之祖勝力盡仰藥死遂陷永州以次畧取寳慶全州道州藍山諸州縣藍山唐縣今屬桂陽州餘注俱見前進攻靖江不下璟謂諸將曰彼所恃西濠水耳決其堤岸破之必矣乃遣將殺守堤兵盡決濠水築土堤五道傅城攻兩月㑹廖永忠朱亮祖自廣東陷梧州連破潯桂鬱林亮祖以兵來㑹總制張榮約降璟與之白帽為識夜半從寳賢門入執平章額爾吉訥舊作也兒吉尼今改移師郴州降兩江土官黄英岑巴延等永忠亦陷南寜象州廣西悉入于明秋閠七月復庫庫特穆爾官爵命率師㑹諸將復河洛闗保摩該進攻晉寜庫庫特穆爾與戰擒之尋皆為所殺帝大恐乃下詔歸罪于太子罷大撫軍院誅知院事巴延特穆爾等詔庫庫特穆爾仍前河南王左丞相統軍馬直抵彰徳衛輝右丞相伊蘇由東道同圖嚕李思齊四道進兵克復汴洛詔下而明兵已逼庫庫特穆爾尋自晉寜退守太原明師陷通州帝北去八月徐達入大都監國淮王特穆爾布哈死之元亡徐達帥師發開封遣裨將分道徇河北地連下衛輝彰徳廣平次臨清使傅友徳以輕兵先進開陸路通步騎顧時字時舉濠人浚河通舟師㑹常遇春已陷徳州合兵陷長蘆扼直沽作浮橋濟師水陸並進遂陷通州知樞密院事布延特穆爾力戰被執死之帝于是詔淮王特穆爾布哈監國以慶同為左丞相同守京師御清寜殿集三宫后妃皇太子議避兵北行左丞相錫哩瑪勒知樞密院事赫色舊作黑斯今改後仿此宦者趙巴延布哈以為不可帝不聴巴延布哈慟哭曰天下者世祖之天下陛下當以死守奈何棄之臣等願率諸軍民及諸集賽等出城拒戰願陛下固守京城卒不聴夜半開健徳門北去達陳兵齊化門將士填濠登城入淮王及左丞相慶同平章徳爾畢什舊作迭兒必失富森寨音布哈舊作朴賽因不花今並改右丞相張康伯御史中丞穆辰舊作滿州今改等不降殺之餘不戮一人封府庫及圖籍寳物令指揮張勝以兵千人守宫殿門宦者䕶視宫人妃主禁士卒毋侵暴吏民安堵市肆不移遣傅友徳等分守古北諸隘口元亡御批厯代通鑑輯覽卷九十九

body:
  text: 帝至江都荒淫益甚然見天下危亂亦不自安退朝則幅巾短衣徧厯臺閣汲汲顧景惟恐不足常仰視天文謂蕭后曰外間大有圖儂者且共樂飲耳因引滿沈醉又引鏡自照曰好頭頸誰當斫之后驚問故帝笑曰貴賤苦樂更迭為之亦復何傷見中原已亂無心北歸欲保江東乃命治丹陽宫將徙都之時江都糧盡從駕驍果多闗中人思歸郎將司馬徳戡元禮直閤裴䖍通等共謀亡去因轉相招引日夜結約郎將趙行樞以告將作少監宇文智及智及大喜曰今天實喪隋英雄並起同心叛者已數萬人因行大事此帝王之業也徳戡等然之行樞因請以智及兄許公化及為主乃悉召驍果諭以所為夜于東城集兵得數萬人徳戡使䖍通將數百騎入宫屯衛將軍獨孤盛與左右十一人拒戰而死徳戡遂引兵自元武門入先是帝選驍健宫奴數百人置元武門謂之給使以備非常至是化及等結帝所信司宫魏氏使矯詔聴給使出外徳戡遂得入帝聞亂易服逃于西閤䖍通等入永巷問陛下安在有美人出指之校尉令狐行達拔刀直進扶帝下閤勒兵守之至旦以甲騎迎化及化及戰栗不能言既至徳戡等迎謁引入朝堂號為丞相䖍通逼帝出宫化及見之曰何用持此物出亟還與手言與之毒手而殺之于是引帝還至寢殿䖍通露刃侍立帝嘆曰我何罪至此賊黨馬文舉曰陛下違棄宗廟巡遊不息外勤征討内極奢淫使丁壯盡于矢刃女弱填于溝壑四民喪業盜賊蜂起専任佞䛕飾非拒諫何謂無罪帝曰我實負百姓至于爾輩榮禄兼極何乃如是今日之事孰為首邪徳戡曰溥天同怨何止一人化及又使封徳彛數帝罪帝曰卿乃士人何為亦爾徳彛赧然而退帝愛子趙王杲年十三在側號慟不已䖍通斬之血濺御服欲遂弑帝帝曰天子死自有法何得加以鋒刃取鴆酒來文舉等不許于是令狐行達引帝縊殺之初帝每巡幸常以蜀王秀自隨化及既弑帝欲迎立之衆議不可乃殺之及齊王暕宗戚無少長皆死唯秦王浩素與智及往來得免又殺虞世基裴藴來䕶兒等世基弟世南抱世基號泣請以身代化及不許虞世南字伯施化及自稱大丞相總百揆以皇后令立秦王浩為帝居别宫以兵守之令發詔畫敕而已化及之入朝堂也百官畢賀蘇威亦往給事郎許善心獨不至化及殺之其母范氏年九十二撫柩不哭曰吾有子矣不食而卒唐王之入闗也張季珣之弟仲琰為上洛令死之至是仲琰弟琮為千牛左右亦為化及所殺兄弟皆死國難時人惜之唐王聞變慟哭曰吾北面事人失道不能救敢忘哀乎追諡曰煬宇文化及發江都化及擁衆十餘萬據有六宫自奉如煬帝以少主浩付尚書省令衛士守之遣吏取其畫敕百官不復朝㕘下令欲還長安奪人舟楫以行虎賁郎將麥孟才等與折衝郎將沈光謀曰吾儕受先帝厚恩今俛首事讐何面目視息人間光泣曰是所望于將軍也乃與孟才糾合恩舊帥所將數千人將以晨襲化及語洩被殺其麾下皆鬬死無一降者麥孟才鐵杖子沈光字總持呉興人及至彭城司馬徳戡與趙行樞等亦謀殺化及事洩化及殺之魏公宻兵據鞏洛以拒化及化及不得西遂引兵入東郡吳興太守沈法興武康人恪之子起兵據江表十餘郡法興聞宇文化及弑逆舉兵討之得精兵六萬攻餘杭本錢塘郡聞皇中曰杭州大業初改郡曰餘杭今浙江杭州府是毘陵丹陽注俱見前皆下之據十餘郡夏四月隋恭帝侑義寜三年恭帝侗皇泰元年唐髙祖神堯皇帝李淵武徳元年夏王竇建徳五鳳元年涼王李軌安樂元年楚王朱粲昌達元年梁是嵗三月隋煬帝亡四月後并楚林士𢎞魏定楊梁師都秦梁蕭銑凡十二國隋恭帝侑秦魏亡唐世子建成趙公世民世民于三月徙封趙等還長安建成世民引兵至東都城中多欲為内應者世民曰吾新定闗中根本未固雖得東都不能守也遂不受將還世民又曰城中見吾還必來追躡乃設三伏以待之段達等果來追遇伏而敗世民遂置新安宜陽二郡注見前分兵守之而還梁王銑稱皇帝梁王蕭銑即帝位置百官徙都江陵修復原廟引岑文本字景仁鄧州棘陽人為中書侍郎委以機宻又使張繡徇嶺南郡縣多降于是東自九江西自三峽南盡交阯北距漢川銑皆有之勝兵四十餘萬五月唐王淵稱皇帝先是唐王淵自加殊禮劍履上殿贊拜不名王以書諭郡縣于是東至商洛南盡巴蜀郡縣長吏盜賊氐羌皆遣子弟請降已而復為相國總百揆將加九錫王謂僚屬曰此諂䛕所為耳孤秉大政而自加九錫可乎必若循魏晉之迹彼皆繁文偽飾欺天罔人孤竊耻之或曰厯代所行亦何可廢王曰堯舜湯武各因其時未聞夏商之末必效唐虞之禪也但改丞相為相國府其九錫殊禮皆歸之有司至是隋帝侑禪位于唐唐王即皇帝位推五運為土徳色尚黄廢帝侑為酅國公而選用其宗室詔曰近世以來時運遷革前代親族莫不誅夷興亡之効豈伊人力其隋蔡王智積等子孫并付所司量才選用唐罷郡置州以太守為刺史隋越王侗稱皇帝東都留守官聞煬帝凶問奉越王侗即位段達王世充為納言元文都為内史令共掌朝政唐定律令置學校命裴寂劉文靜等修律令行之置國子太學四門生三百餘員郡縣學亦置生員六月唐以裴寂為右僕射知政事劉文靜為納言竇威蕭瑀為内史令唐主待裴寂特厚羣臣莫及稱為裴監而不名委蕭瑀以庶政事無大小莫不闗掌瑀亦孜孜盡力繩違舉過人皆憚而毁之瑀終不自理唐主嘗有敕瑀不時宣行唐主責之瑀對曰大業之世内史宣敕或前後相違有司不知所從今王業經始事繋安危故臣每受一敕必勘審使與前敕不違始敢宣行稽緩之愆實由于此唐主曰卿用心如此吾復何憂唐立四親廟追尊髙祖熙曰宣簡公曽祖天錫曰懿王祖虎曰景皇帝廟號太祖考昞曰元皇帝廟號世祖妣皆為后諡妃竇氏曰穆皇后每嵗祀昊天上帝皇地祇神州鄒衍大九州之一中國在焉秦以後遂為中國之稱地祇以景帝配感生帝五帝迭王王者之興必感其一是為感生帝說出春秋元命苞迭王之王去聲明堂宗祀也注見前以元帝配唐立世子建成為太子世民為秦王元吉為齊王宗室封王者八人唐以永安王孝基唐主從父弟為陜州總管時邊要州皆置總管府以統數州之兵唐以孫伏伽貝州武城人為治書侍御史萬年縣後周置今曰咸寧與長安俱為西安府治法曹孫伏伽上表畧曰隋以惡聞其過亡天下故陛下得之然陛下徒知得之之易而未知隋失之之不難也謂宜易其覆轍務盡下情凡人君言動不可不慎陛下今日即位而明日有獻鷂雛者此乃少年之事豈聖主所須哉又百戲散樂亡國淫聲近太常于民問借婦女裙􅃭以充妓衣擬五月五日元武門遊戲此亦非所以為子孫法也夫善惡之習漸染易移太子諸王參僚左右宜謹擇其人有門風不睦素無行義専好奢靡以聲色遊獵為事者皆不可近自古骨肉乖離以至敗亡未有不因左右離間而然也唐主省之大悅下詔褒稱擢為治書侍御史賜帛三百匹仍頒示逺近魏公宻敗宇文化及于黎陽奉表降隋東都聞宇文化及西來上下震懼有盖琮者上疏請說李宻與之合勢以拒化及元文都盧楚范陽人以為然使琮齎敕書賜宻化及引兵北趣黎陽李宻將徐世勣畏其軍鋒西保倉城化及渡河分兵圍世勣宻壁于清淇與化及隔水而語數之曰卿本匈奴皂𨽻世受隋恩主上失徳不能死諫反行弑逆天地所不容將欲何之化及黙然良久大言曰與爾論相殺事何須作書語耶乃盛修攻具以逼倉城世勣擊敗之宻畏東都議其後見盖琮至大喜遂上表乞降請滅化及以贖罪隋主册拜宻太尉封魏公俟平化及入朝輔政元文都等喜于和解于上東門置酒作樂王世充作色曰朝廷官爵乃以與賊其志欲何為邪文都等亦疑世充欲以城應化及由是有隙已而化及食盡引餘衆北趣魏縣宻知其無能為西還鞏洛留徐世勣以備之時蘇威亦詣宻降宻虚心禮之威初不言帝室艱難惟再三舞蹈稱不圖今日復見聖明時人鄙之秋七月隋王世充殺元文都隋主以世充為僕射魏公宻如東都不至而復李宻每戰勝輒使告捷于隋隋人皆喜世充獨曰文都輩刀筆吏耳吾觀其勢必為李宻所擒且吾軍士屢與宻戰殺其軍父兄子弟前後已多一旦為之下吾屬無噍類矣欲以激怒其衆文都懼謀因世充朝伏甲誅之段達以告世充世充夜勒兵襲含嘉門文都入奉隋主御殿閉門拒守世充攻太陽門得入殺盧楚使段達脅隋主出文都殺之及其諸子悉遣人代宿衛者然後入見謝曰文都等欲召李宻以危社稷疾臣違異深積猜嫌迫于救死不暇聞奏乃被髮為誓詞淚俱發隋主以為誠以世充為左僕射總督内外諸軍事世充移居尚書省使兄世惲入居禁中子弟咸典兵馬隋主拱手而已宻將入朝至温聞變而還初宻獲東都國子祭酒徐文逺故嘗受業者也備弟子禮北面拜之文逺曰將軍之志欲為伊霍以繼絶扶傾則老夫雖遲暮猶願盡力若為莽卓乗危邀利則無所用老夫矣宻頓首受教至是宻復問計文逺曰世充亦吾門人也其人殘忍必有異圖將軍前計必不諧矣世充未破不可入朝也後宻敗文逺復入東都見世充必先拜或問曰君倨見宻而敬王公何也文逺曰魏公君子也能容賢士王公小人也能殺故人安得不拜世徐文逺名曠以字行孝嗣五孫長樂王建徳定都樂壽初建徳攻河間隋郡丞王琮拒守嵗餘不下及聞煬帝凶問琮帥吏民發喪建徳遣使弔之琮乃請降建徳退舍待之琮言及隋亡建徳亦為之泣諸將請烹之建徳曰忠臣也吾方賞之以勸事君奈何殺之往在髙雞泊為盜容可妄殺人今欲安百姓定天下豈得害忠良乎以琮為瀛州刺史于是河北郡縣聞之争附于建徳饒陽令宋正本博學有才氣說建徳以定河北之䇿建徳引為謀主定都樂壽備置百官八月秦主舉卒子仁杲立先是唐秦王世民與秦主舉戰于髙墌城名在今陜西邠州長武縣北敗績郝瑗因言于舉曰唐兵新破闗中騷動宜乗勝直取長安舉然之㑹病卒仁杲立居折墌城仁杲之為太子也與諸將多有隙及即位衆心猜懼郝瑗哭舉而死由是寖弱折墌城在今平凉府涇州唐立李軌為涼王唐主欲與李軌共圖秦隴遣使招撫之謂之從弟軌大喜遣弟入貢遂册拜軌為涼王已而軌自稱帝隋人葬煬帝于江都隋江都太守陳稜求得煬帝之柩略備儀衛葬之葬于江都宫西吳公臺下魏公宻與隋戰大敗遂以其衆降唐宻開洛口倉羣盜就食者近百萬口東都降者日以百數倉無防守文券取者隨意委棄衢路米厚數寸淘米洛水兩岸十里粲如白沙宻喜謂賈閏甫曰此可謂足食矣閏甫曰國以民為本民以食為天今民襁負而至者以所天在此故也一旦米盡民散孰與成大業哉時隋軍乏食宻軍少衣王世充請交易宻許之東都降者遂少世充簡兵擊宻宻留王伯當守金墉邴元真守洛口自引精兵出偃師北阻邙山以待之裴仁基謂宻曰世充悉衆而至洛下必虚可簡精兵三萬傍河西出以逼東都世充還我且按甲如此則我有餘力彼勞奔命破之必矣宻以為然既而諸將欲戰者什七八宻又惑而從之魏徴亦言于長史鄭頲曰世充乏食志在死戰未若深溝髙壘以拒之不過旬月世充必退追而擊之蔑不勝矣頲曰此老生之常談耳宻輕世充不設壘壁世充夜遣騎潛入北山伏谿谷中命軍士皆秣馬蓐食遲明薄宻宻兵未及成列世充縱擊之其士卒皆江淮剽勇出入如飛戰方酣伏兵乗髙馳下宻衆大潰馳回洛口邴元真已遣人潛引世充單雄信亦降宻自度不能支帥輕騎奔虎牢王伯當亦棄金墉保河陽宻欲南阻河北守太行東連黎陽時徐世勣鎮黎陽以圖進取諸將曰兵新失利衆心危懼難以成功宻曰孤所恃者衆也衆既不願孤道窮矣諸君幸不相棄當共歸闗中衆咸曰然從宻入闗者二萬人于是宻之將帥州縣多降于隋唐行戊寅厯白馬道士傅仁均所造也隋宇文化及弑秦王浩自稱許帝宇文化及兵勢日蹙兄弟酣宴尤智及曰今所向無成負弑君之名天下不容必將滅族豈不由汝智及怒數相鬬䦧其衆多亡化及嘆曰人生固當死豈不一日為帝乎于是鴆殺秦王浩稱帝于魏縣國號許冬十月壬申朔日食唐以李宻為光禄卿邢國公宻將至唐主遣使迎勞相望宻喜曰我擁衆百萬解甲歸唐比于竇融功亦不細豈不以台司見處及至長安乃拜光禄卿賜爵邢國公宻大失望朱粲自稱楚帝取唐鄧州開皇中置大業初改南陽郡唐仍為州今屬南陽府刺史吕子臧蒲州河東人死之子臧與撫慰使馬元規安陸人擊朱粲破之言于元規曰粲新敗危懼併力擊之一舉可滅若復遷延其徒稍集則為患深矣元規不從既而粲收集餘衆兵復大振自稱楚帝進攻鄧州子臧撫膺謂元規曰老夫今日坐公死矣㑹霖雨城壊所親勸子臧降子臧曰安有天子方伯降賊者乎帥麾下赴敵死俄而城陷元規亦死十一月唐秦王世民破秦兵秦主仁杲降還至長安斬之唐主遣秦王世民伐秦至髙墌仁杲使宗羅㬋將兵拒之世民堅壁不出諸將請戰世民曰我軍新敗士氣沮喪賊恃勝而驕有輕我心宜閉壘以待之彼驕我奮可一戰而克也乃令軍中曰敢言戰者斬相持六十餘日仁杲糧盡所部多降世民乃命梁實營于淺水原一名鶉觚原在邠州長武縣東北以誘之羅㬋大喜盡鋭攻之數日世民度其已疲謂諸將曰可以戰矣使龎玉陳于原南羅㬋併兵擊之玉㡬不能支世民乃引大軍自原北出其不意自帥驍騎陷陳羅㬋軍潰世民帥騎追之竇軌叩馬苦諫世民曰破竹之勢不可失也遂進圍仁杲仁杲將士多叛計窮出降得其精兵萬餘人諸將皆賀因問曰大王一戰而勝遽捨步兵又無攻具直造城下衆皆以為不克而卒取之何也世民曰羅㬋所將皆隴外驍將悍卒吾特出其不意破之斬獲不多若緩之則皆入城仁杲撫而用之未易克也急之則散歸隴外折墌虚弱仁杲破膽不暇為謀此吾所以克也衆皆悦服世民聞褚亮名求訪獲之引為文學唐主使李宻迎世民于豳州宻自恃智略功名見唐主猶有傲色及見世民不覺驚服私謂殷開山曰真英主也不如是何以定禍亂乎世民還至長安唐主命斬仁杲于市并酋黨數十人仁杲父子據隴西凡五年而滅徐世勣降唐賜姓李氏世勣據李宻舊境未有所屬魏徵隨宻至長安無所知名乃自請安集山東唐主以為秘書丞乗傳至黎陽勸世勣早降世勣遂决計西向謂長史郭孝恪陽翟人曰此民衆土地皆魏公有也吾若獻之是利主之敗自為功以邀富貴也今宜籍郡縣户口士馬之數以啓魏公使自獻之乃使孝恪詣長安唐主初怪世勣無表既而聞之嘆曰世勣不背徳不邀功純臣也賜姓李氏長樂王建徳改國號曰夏有大鳥五集于樂壽羣鳥數萬從之又有得元圭以獻者建徳羣臣曰此天所以賜大禹也乃改國號夏改元五鳳唐以秦王世民為陜東大行臺蒲州及河北兵馬並受節度唐殺隋河東守將堯君素隋將堯君素守河東唐遣獨孤懐恩信之孫攻之不下招之不從遣其妻至城下謂之曰隋室已亡君何自苦君素曰天下名義非婦人所知引弓射之應絃而倒君素志在守死每言及國家未嘗不㱆欷謂將士曰吾大義不得不死必若隋祚永終天命有屬自當斷頭以付諸君持取富貴今城池甚固倉儲豐備大事猶未可知不可横生心也久之食盡又聞江都傾覆左右殺君素以降别將王行本誅作亂者復乗城拒守懐恩引兵圍之行本拒守二年糧盡援絶乃出降唐主斬之懐恩以久攻蒲坂不下唐主數誚讓之由是怨望及行本降懐恩遂謀據蒲坂以叛事覺伏誅唐以羅藝為幽州總管初宇文化及遣使招藝藝曰我隋臣也斬其使為煬帝發喪竇建徳髙開道各遣使招之藝曰二子皆劇賊耳唐公乃吾主也遂奉表降唐唐以為幽州總管其將薛萬徹萬均皆世雄子亦皆授以官爵藝司馬温彦博名大臨以字行并州祁人贊其歸唐之計唐徵為中書侍郎與兄黄門侍郎大雅字彦𢎞並居近宻竇建徳帥衆十萬寇幽州藝用萬均計以羸兵阻水為陳伏百騎於城旁俟建徳半渡擊之建徳大敗引還已而唐賜藝姓李氏又屢敗夏兵唐以西突厥曷娑那可汗為歸義王曷娑那獻大珠唐主曰珠誠至寳然朕寳王赤心珠無所用竟還之後北突厥遣使請殺曷娑那唐主不許久之縱北突厥使者殺之唐李宻叛行軍總管盛彦師宋州虞城人討斬之先是宻言于唐主請收撫山東與賈閏甫偕行宻遇大朝㑹職當進食深恥之退以告王伯當伯當曰天下事在公度内耳宻因請收山東以自效唐主許之羣臣以為不可唐主不聴以王伯當為副而遣之宻既出闗長史張寳徳上封事言其必叛唐主乃敕宻還更受節度宻謂賈閏甫曰無故召還恐無生理不若破桃林縣收兵渡河茍得至黎陽大事必成公意如何閏甫曰明公既已委質復生異圖雖破桃林兵豈暇集一稱叛逆誰復相容為明公計不若且應朝命以明原無異心宻怒曰唐使吾與絳灌同列吾何以堪之閏甫曰自翟讓受戮之後人皆謂明公棄恩忘本今日誰肯復以兵委公者大福不再願熟思之宻大怒揮刃欲擊之閏甫奔熊州熊桃林隋縣唐改靈寳今屬陜州州後周置今河南府宜陽縣是宻遂斬使者入桃林縣驅掠徒衆直趣南山乗險而東使人馳告故將伊州刺史張善相伊州人令以兵應接而聲言向洛行軍總管盛彦師聞之率衆踰熊耳山南據要道令其衆夾路而伏令之曰俟賊半度一時俱發或曰聞宻欲向洛而公入山何也彦師曰宻聲言向洛實欲出人不意走襄城就張善相耳若賊入谷我自後追之山路險隘一夫殿後必不能制今吾得先入谷擒之必矣宻果南出半度彦師擊斬之及伯當傳首長安宻起兵凡六年而滅李世勣在黎陽唐主遣使以宻首示之世勣北面號慟表請收葬詔歸其屍世勣舉軍縞素葬之宻素得士心哭之多嘔血張善相降于唐後為王世充所殺髙開道據魚陽自稱燕王署置百官有衆數萬懐戎浮屠髙曇晟殺令據縣自號大乗皇帝遣使約開道為兄弟開道引衆從之居三月殺曇晟并有其地懐戎北齊縣故城在今宣化府保安州唐以李素立趙州髙邑人義深曽孫為侍御史唐六典侍御史從六品上有犯法不至死者唐主特命殺之監察御史六典監察御史從八品上李素立諌曰三尺法王者所與天下共也法一動摇人無所措手足陛下甫創鴻業奈何棄法臣不敢奉詔唐主從之命所司授以七品清要官擬雍州司戸唐主曰要而不清又擬秘書郎唐主曰清而不要遂擢授侍御史隋唐已隋恭帝侗皇泰二年唐武徳二年鄭王王世充開明夘元年梁玉沈法興延康元年吳王李子通明政元年是嵗隋梁楚粲亡并楚夏定楊梁師都梁銑凡七國嗣再是年以後分據諸國依十六國之例非建國改元位嵗首俱不備列春正月隋王世充殺總管劉孝元獨孤武都王世充之敗李宻也隋主以為太尉尚書令使開府備置官屬于是世充盡取隋朝顯官名士為大尉府屬杜淹字執禮如晦叔戴胄字元𦙍相州安陽人皆預焉世充専總朝政設三榜于府外上書陳事者日以百數世充悉引見殷勤慰諭人人自喜然終無所施行下至士卒厮養皆以甘言悦之而實無恩施馬軍總管獨孤武都為世充所親任步軍總管劉孝元與武都從弟機等謀召唐兵使崔孝仁說武都為内應武都從之事泄世充皆殺之淮安本顯州大業初改郡今南陽府泌陽縣是楊士林擊朱粲破之朱粲有衆二十萬剽掠漢淮間每破州縣食其積粟將去悉焚其餘軍中乏食乃教士卒烹婦人嬰兒噉之曰肉之美者無過于人但使他國有人何憂于餒于是諸城堡相率叛之淮安土豪楊士林起兵攻粲旁郡響應粲大敗奔菊潭本漢酈縣隋更名故城在今南陽府内鄉縣縣西北有菊潭水極甘芳飲者多夀隋以此名縣士林帥漢東四郡降唐唐以為顯州唐改郡為州從舊稱道行臺已而粲降唐唐以為楚王使散騎常侍段確勞粲確醉戲粲曰聞卿好噉人人作何味粲曰噉醉人正如糟彘確怒罵曰狂賊入朝為一頭奴耳復得噉人乎粲烹食之遂屠菊潭奔王世充後世充敗粲斬于洛水上士庶擲瓦礫擊其尸須臾若冡楊士林後為長史田瓚所殺以州歸唐二月唐定租庸調法其法以人丁為本田則有租身則有庸戸則有調損益厯代之制而定之制詳後取按租取于田即粟米之征庸于丁即力役之征調取于户即布縷之征也唐置宗師詔諸宗姓居官者在同列之上未仕者免徭役每州置宗師一人以攝總别為團伍夏王建徳破宇文化及于聊城注見前誅之宇文化及誘海曲注見前諸賊帥王薄等共守聊城竇建徳謂其下曰隋為吾君吾為隋民化及弑逆不可不討乃引兵趣聊城與化及連戰大破之生擒化及先謁隋蕭后稱臣素服哭煬帝盡哀收傳國璽執智及與其黨集隋宫而斬之以檻車載化及斬之襄國建徳每克城得資財悉以分將士常食蔬茹粟飯妻曹氏不衣紈綺婢妾纔十許人得隋宫人數千即時散遣以裴矩為左僕射自餘隨才授職欲詣闗中及東都者聴之王薄等皆歸建徳薄尋降唐授齊州總管後為李武意所殺唐以宇文士及為上儀同封徳彞為内史侍郎初唐主與宇文士及善化及既死手詔召之士及與封徳彞來降時士及妹為昭儀由是授上儀同唐主以徳彞諂詐不忠罷遣就舍徳􅂜以秘䇿干唐主唐主悅拜内史舍人俄遷侍郎隋王世充侵唐穀州隋開皇中置大業初改新安郡唐復為州今河南府新安縣是王世充以秦叔寳程知節李宻敗後二人皆歸世充為將軍待之皆厚然二人疾世充多詐知節謂叔寳曰王公器度淺狹多妄語好咒誓乃老巫嫗耳豈撥亂之主乎至是世充與唐兵戰于九曲城名在今河南府宜陽縣水經注洛水自宜陽而東逕九曲南即此王幼學釋為鄯州之九曲誤叔寳知節以數十騎西馳百許步下馬拜世充曰荷公殊禮深思報効公猜忌信䜛非僕托身之所請從此辭遂降于唐秦王世民以叔寳為總管知節為統軍既而世充將李君羨武安人田留安臨邑人羅士信皆降于唐士信初從李宻擊世充兵敗為世充所得世充厚禮之既而得邴元真等待之如士信士信恥之故降唐元真尋為宻故將杜才幹所殺持其首以祭宻墓唐以楊恭仁隋觀王雄之子為涼州總管恭仁素習邊事曉羌胡情偽民夷悅服自蔥嶺以東並入朝貢隋王世充自稱鄭王加九錫夏四月世充稱帝初王世充既殺元盧慮人情未附猶媚事隋主既而漸驕横不復朝謁及是召集文武議受九錫參軍戴胄固諌世充怒出為鄭州長史乃使段達等言于隋主隋主曰鄭公近平李宻已拜太尉自是以来未有殊績俟天下稍平議之未晚達曰太尉欲之隋主熟視曰任公達等遂稱詔進世充爵鄭王加九錫四月世充令長史韋節等造禪代儀稱隋主命禪位于鄭世充先遣段達等入奏隋主曰天命不常鄭王功徳甚盛願陛下遵唐虞之迹隋主怒曰天下者髙祖之天下若隋祚未亡此言不應發必天命已改何煩禪讓公等或祖禰舊臣或台鼎髙位既有斯言朕復何望世充乃幽隋主于含凉殿雖有三表陳讓及敕書敦勸隋主皆不之知世充遂備法駕入宫即皇帝位奉隋主為潞國公納言蘇威年老不任朝謁世充以威隋代重臣欲以炫耀士民每勸進必冠威名及受殊禮之日扶威置百官之上然後南面正坐受之既受禪以威為太師又以陸徳明為其子漢王元恕師令元恕就徳明家行束脩禮徳明恥之故服巴豆散對之遺利竟不與語行陸徳明名元朗以字吳人夏王建徳立楊政道為鄖公建徳初結好于王世充及聞世充自立乃絶之始建天子旌旗出入警蹕立隋齊王暕遺腹子政道為鄖公然猶倚突厥以壯兵勢隋義成公主遣使迎蕭后建徳遣之又傳宇文化及首以獻公主已而突厥立政道為隋王居定襄唐遣安興貴襲執涼王軌以歸殺之河西平先是唐册使至涼州軌欲去帝號受唐爵曹珍請依蕭詧事魏故事軌乃遣鄧曉奉書稱皇從弟大凉皇帝臣軌唐主怒乃遣吐谷渾伐之隋煬帝征吐谷渾可汗伏允奔党項煬帝立其質子順為主不果入㑹中國亂伏允收還故地唐主與之連和許以順還之伏允喜起兵擊軌數遣使入貢請順唐主遣之至是軌將安修仁之兄興貴仕長安表請說軌唐主曰軌豈口舌所能下興貴曰臣家在涼州奕世豪望為民夷所附弟修仁又軌所信任軌聴臣固善不聴則圖之唐主乃遣之興貴至乗間說軌以竇融故事軌不聴興貴乃與修仁結諸胡起兵擊軌軌敗被執河西平鄧曉在長安舞蹈稱慶唐主曰汝為使臣聞國亡而不戚既不忠于軌其肯為朕用乎遂廢之終身軌至長安斬于西市軌自起至亡凡三年唐主以興貴修仁為左右武侯大將軍五月鄭王王世充弑隋主侗世充以裴仁基行儼李宻敗後仁基父子為世充所獲仁基為尚書行儼為大將軍有威名忌之仁基父子知之亦不自安乃與尚書左丞宇文儒童等謀殺世充復立隋主事泄皆夷三族世充之兄世惲曰儒童等謀反正為隋主尚在故也不如早除之世充遣人酖之隋主請與太后訣不許乃布席禮佛曰願自今以往不復生帝王家飲藥不能絶以帛縊殺之諡曰恭皇帝秋七月唐置十二軍置十二軍分統闗内諸府皆取天星為名初析闗中為十二道萬年道為參旗軍長安道為鼓旗軍富平道為元戎軍醴泉道為井鉞軍同州道為羽林軍華州道為騎官軍西麟道為苑游軍寜州道為折威軍岐州道為平道軍豳州道為招揺軍涇州道為天紀軍宜州道為天節軍每軍將副各一人督以耕戰之務由是士馬精彊所向無敵後武徳六年十二軍俱廢尋又復之西突厥遣使入貢于唐初西突厥曷娑那可汗入隋事具前國人立其叔父號射匱可汗達頭可汗之孫射匱既立拓地東至金山注見前西至海即今大西洋遂與北突厥為敵建庭于龜兹北三彌山射匱卒弟統葉䕶可汗立統葉䕶勇而有謀北并鐵勒控弦數十萬據烏孫故地又移庭于石國胡三省注康居支庶之分治柘析城漢時大宛北鄙北千泉其地有雪山多泉故名西域諸國皆臣之統葉䕶各遣吐屯注見前監之督其征賦至是入貢于唐八月唐酅公薨諡曰隋恭帝唐殺其民部尚書劉文靜文靜自以才畧功勲在裴寂之右而位居其下意甚不平數侵侮寂由是有隙文靜家數有妖弟文起召巫厭勝文靜有妾無寵使其兄上變告之唐主以文靜屬吏遣寂問狀秦王世民固請曰昔在晉陽文靜先建非常之策始告寂知及克京城任遇懸隔今文靜觖望則有之非敢謀反寂曰文靜才畧過人性復粗險天下未定留之必貽後患唐主卒用寂言殺之沈法興稱梁王于毗陵李子通稱吳帝于江都沈法興稱梁王都毗陵性殘忍専尚威刑其下離怨時杜伏威據厯陽陳稜據江都李子通據海陵俱有窺江表之心子通攻江都克之稜奔伏威子通入江都即帝位國號吳伏威尋降唐唐以為和州總管江和州北齊以厯陽郡置今州隸南定陽可汗武周取唐并州總管裴寂軍潰齊王元吉奔長安先是武周取唐榆次漢縣厯代因之今屬山西太原府進圍并州元吉拒却之元吉時守晉陽武周又遣宋金剛寇并州金剛本易州賊為竇建徳所敗奔武周武周號曰宋王委以軍事金剛說武周圖晉陽南向爭天下武周使將兵寇并州自進陷介州介介州隋置今汾州府休縣是唐以裴寂為總管拒之至是寂為金剛所敗軍潰自晉州以北城鎮皆沒武周進逼并州元吉紿其參佐夜擕妻妾奔還長安武周據太原遣金剛攻晉州拔之進逼絳州陷龍門唐以李綱為太子少保初綱以尚書領太子詹事太子建成始甚禮之久之漸昵近小人以秦王世民功髙忌之綱屢諫不聴乃乞骸骨唐主罵曰卿為何潘仁西域商胡入司竹園為盜後歸唐長史乃恥為朕尚書邪綱曰潘仁賊也每欲妄殺人臣諫之則止為其長史可以無愧陛下創業明主臣所言如水投石于太子亦然臣何敢久汚天臺辱東朝乎唐主曰知公直士勉留輔吾兒以為太子少保尚書詹事如故綱復諫太子飲酒無節及信䜛慝疎骨肉太子不懌綱固稱老病辭職乃解尚書仍為少保唐主嘗考第羣臣以綱及孫伏伽為第一謂裴寂曰隋以主驕臣諂亡天下朕即位以來每虚心求諫唯綱盡忠欵伏伽誠直餘人皆踵弊風俛首而已豈朕所望哉朕視卿如愛子卿當視朕如慈父有懐必盡勿自隠也冬定楊將宋金剛取澮州唐置今平陽府翼城縣是唐遣秦王世民擊之宋金剛取澮州陷之軍勢甚銳唐主欲棄大河以東謹守闗西秦王世民請曰太原王業所基國之根本河東殷實京邑所資若舉而棄之臣竊憤恨願假臣精兵三萬必平殄武周克復汾晉唐主于是發闗中兵以益世民使擊武周夏王建徳克唐黎陽虜淮安王神通唐主從弟李世勣降遂定衛滑齊充等州先是唐以淮安王神通為山東安撫大使已而竇建徳取唐邢今順徳府是滄注見前洺今廣平府是相注見前等州神通不能拒就世勣于黎陽建徳又取趙州建徳執總管張志昻慰撫使張道源以其不早降欲殺之國子祭酒凌敬曰大王使髙士興拒羅藝于易水藝纔至興即降大王以為何如建徳悟釋之至是建徳進趣衛州過黎陽二十里世勣遣騎將邱孝剛偵之與建徳遇擊之建徳敗走其大軍救之斬孝剛建徳怒還宫黎陽克之虜淮安王神通及世勣父盖并魏徵等世勣走免數日以父故還詣建徳降建徳使守黎陽而以其父為質以徵為起居舍人遂徙都洺州滑州刺史王􅁤奴殺軌擕其首詣建徳降建徳曰奴殺主大逆立斬之反􅁤首于滑州吏民感悅即日降于是旁近郡縣及徐圓朗等皆附唐主遣使與建徳修好建徳以淮安王神通等歸之唐以夏侯端壽春人詳之孫為秘書監初唐主遣秘書監夏侯端安撫淮左端傳檄州縣東至于海南至于淮二十餘州皆降㑹汴亳降鄭王世充徇地至滑臺汴亳等州降之還路遂絶端素得衆心所從二千人雖糧盡不忍委去從行五日餒死及遇賊奔潰唯存五十二人時河南之地皆入世充唯把州刺史李公逸雍邱人為唐堅守遣兵迎端館給之世充遣使召端解衣遺之除書以端為淮南郡公端對使者焚書毁衣曰夏侯端天子大使豈受王世充官乎汝欲吾往唯取吾首耳因解節旄懐之置刃于竿自山中西走冒踐荆棘晝夜兼行得達宜陽從者墜崖溺死為虎狼所食又喪其半端詣闕見唐主但謝無功初不自言艱苦唐主復以為秘書監時又遣大理卿郎楚之安撫山東楚之為竇建徳所獲不屈竟得還李公逸守孤城唐不能救公逸乃留其屬李善行守雍邱身帥輕騎入朝為世充所獲世充謂曰卿越鄭臣唐其說安在公逸曰我于天下唯知有唐不知有鄭世充怒斬之善行亦死庚唐武徳三年是嵗并楚夏定楊梁師都梁辰銑鄭梁法興吳凡九國定楊梁法興亡春正月李世勣復歸于唐李世勣欲歸唐恐禍及其父謀于郭孝恪孝恪曰今新事竇氏動則見疑宜立效以取信然後可圖也世勣乃襲獲嘉隋改漢修武縣置今縣屬河南衛輝府擊新鄉隋改漢獲嘉縣置今縣亦屬衛輝府虜世充將劉黒闥黒闥漳南人少與建徳善王世充嘗竊笑其所為至是歸建徳署為將軍建徳由是親世勣世勣因勸建徳取孟海公所據曹戴二州遂臨徐兖以向河南建徳以為然遣其妻兄曹旦將兵先渡河世勣㑹之世勣謀俟建徳至襲殺之冀得其父并建徳土地歸唐久之建徳不至世勣欲襲曹旦營聞已有備乃與郭孝恪數十騎奔唐建徳羣臣請誅世勣父建徳曰世勣為唐臣不忘故國忠臣也其父何罪赦之明年二月建徳克周橋虜孟海公二月唐改官名納言為侍中内史令為中書令給事郎為給事中夏四月唐秦王世民擊宋金剛破之定楊可汗武周及金剛皆走死先是世民自龍門渡河屯栢壁城名在絳州西南與金剛相持民間聞世民來莫不歸附世民休兵秣馬堅壁不戰惟令偏裨乗間抄掠永安王孝基等攻賊帥吕崇荗金剛遣其將尉遲敬徳尋相救之虜孝基等將還世民遣殷開山邀之于美良川大破之敬徳相潛引精騎向蒲坂世民自將步騎從間道邀擊又大破之敬徳僅以身免悉俘其衆朔永安王孝基唐主從父弟尉遲敬徳名恭以字行州人美良川在絳州東北諸將咸請戰世民曰金剛懸軍深入兵精將猛利在速戰我養鋭以挫其鋒俟其糧盡自當遁走當待此機未宜速戰也孝基謀逃歸武周殺之至是金剛食盡北走世民追及尋相大破之乗勝逐北一晝夜行二百餘里戰數十合劉𢎞基諫世民曰功難成而易敗機難得而易失必乗此勢取之遂進追及金剛于雀鼠口一日八戰皆破之俘斬數萬人世民不食二日軍中止有一羊與將士分食之引兵趣介休注見前金剛以衆二萬出西門背城布陳南北七里李世勣與戰小却世民帥精騎擊之出其陳後金剛大敗尉遲敬徳尋相舉介休及永安注亦見前降世民得敬徳喜甚使將其舊衆八千與諸營相參屈突通慮其為變以為言世民不聴劉武周聞金剛敗大懼棄并州走突厥金剛欲復戰衆莫肯從亦走突厥世民入并州武周所得州縣皆入于唐未㡬武周謀歸馬邑事泄突厥殺之武周起兵六年而滅金剛謀走上谷突厥追獲腰斬之武周之南冦也其黨苑君璋諫曰唐主舉一州之衆直取長安所向無敵此乃天授非人力也不如北連突厥南結唐朝南面稱孤足為長䇿武周不聴及敗泣謂君璋曰不用公言以至于此人苑君璋馬邑五月唐立老子廟晉州人吉善行自言于羊角山在今平陽府浮山縣南見白衣老父曰為吾語唐天子吾而祖也詔于其地立廟秋七月唐遣秦王世民督諸軍伐鄭唐主詔秦王世民督諸軍擊世充屈突通二子在洛陽唐主謂通曰今欲使卿東征如卿二兒何通曰臣昔為俘囚分當就死陛下釋縛加以恩禮當是時臣心口相誓期以更生餘年為陛下盡節但恐不獲死所耳今得備先驅二兒何足顧乎唐主歎曰徇義之士一至此乎世民遣行軍總管史萬寳自宜陽南據龍門此伊闕也俗亦名龍門劉徳威自太行東圍河内王君廓并州石艾人自洛口斷其餉道黄君漢攻迴洛城大軍屯于北邙連營以逼之世充陳于青城宫世民亦置陳當之世充隔水謂世民曰唐帝闗中鄭帝河南世充未嘗西侵王忽舉兵東來何也世民使應之曰四海咸仰皇風惟公獨阻聲教為此而來世充曰相與息兵講好不亦善乎又應之曰奉詔取東都不令講好也至暮各引兵還青城宫在洛陽縣北大業初所建已而世民遣王君廓攻轘轅注見前拔之于是河南州縣相繼降唐杜才幹以濮州降楊慶以管州降魏陸以滎州降王雄以陽城王要漢以汴州皆來降王楊慶隋河間王𢎞之子管州隋以管城縣置滎州世充以滎陽縣置管城滎陽及陽城汴州注俱見前世充子元應鎮虎牢聞諸州叛奔還洛陽許亳等州許州即潁州亳州即譙郡注俱見前亦降于唐時劉武周降將尋相等多叛去諸將疑尉遲敬徳囚之屈突通殷開山言于世民曰敬徳驍勇絶倫留之恐為後患不如殺之世民曰敬徳若叛豈在尋相之後耶遽命釋之引入臥内賜之金曰丈夫意氣相期勿以小嫌介意必欲去者以此金相資表一時共事之情也世民以五百騎行戰地世充帥步騎萬餘猝至圍之單雄信引槊直趣世民敬徳躍馬大呼横刺雄信墜馬翼世民出圍更帥騎兵還戰會屈突通引兵至世充敗去世民謂敬徳曰公何相報之速也自是寵遇日隆冬十月夏王建徳圍幽州髙開道遣使降唐竇建徳圍幽州李藝告急于髙開道開道帥二千騎救之建徳兵引去開道因藝遣使降唐唐以為蔚州唐置今屬宣化府總管賜姓李氏封北平郡王已而建徳帥衆二十萬復攻幽州兵已攀堞薛萬均萬徹帥敢死百人從地道出其背擊走之鄭遣使如夏乞師初王世充侵黎陽竇建徳襲破其殷州注見前以報之自是二國交惡信使不通及唐兵逼洛陽世充遣使求救于建徳夏中書侍郎劉彬請解仇救鄭彬曰唐得闗西鄭得河南夏得河北共成鼎足之勢今唐舉兵臨鄭鄭地日蹙鄭亡則夏不能獨立矣不如解仇除忿發兵救之夏擊其外鄭攻其内破唐必矣唐師既退徐觀其變若鄭可取則取之併二國之兵乗唐師之老天下可取也建徳從之十二月吳主子通敗梁兵取京口杜伏威擊之子通敗走襲梁梁王法興走死李子通渡江攻沈法興取京口法興敗走呉郡于是丹陽毘陵等郡皆降于子通杜伏威遣輔公祏攻之子通大敗棄江都保京口江西之地盡入于伏威伏威徙居丹陽子通復東走太湖收合亡散得二萬人襲沈法興于吳郡大破之法興赴江溺死法興起事三年而滅子通軍勢復振帥其羣臣徙都餘杭盡取法興之地北自太湖南至嶺東包㑹稽西距宣城皆有之辛唐武徳四年是嵗夏鄭梁銑已吳亡并楚梁師都凡三國春二月唐以趙郡王孝恭為䕫州唐以巴東郡置今為府屬四川總管李靖為行軍總管先是唐主遣開府李靖詣䕫州經畧蕭銑靖至峽州本梁宜州後周更名今湖北宜昌府是阻銑兵不得進唐主敕峽州刺史許紹字嗣宗安陸人斬之紹惜其才為之奏請得免已而唐峽州兵伐梁拔荆門鎮在荆州府宜都縣以荆門山名黔州後周置今四川黔彭㕔彭水縣是兵伐梁又拔其五州四鎮至是靖說孝恭攻取蕭銑十䇿孝恭上之詔以孝恭為䕫州總管使大造舟艦習水戰以靖為行軍總管委以軍事靖說孝恭悉召巴蜀酋長子弟量才授任置之左右外示引擢實以為質蕭銑性猜忌大將軍董景珍弟謀作亂事泄伏誅景珍據長沙郡降唐銑遣張繡討之景珍為部下所殺繡恃功驕恣銑又殺之由是諸將皆離心兵勢益弱唐秦王世民敗鄭主世充于穀水注見前進圍洛陽世民奏請唐主進圍東都移軍青城即青城官壁壘未立王世充帥衆二萬臨穀水以拒之諸將皆懼世民曰賊勢窘矣悉衆而出邀幸一戰今日破之後不敢復出矣命屈突通率步卒五千渡水擊之兵交世民引騎南下身先士卒與通合勢衆殊死戰散而復合者數四自辰至午世充兵始退世民縱兵乗之直抵城下遂圍之城中守禦甚嚴世民四面攻之旬餘不能克將士皆疲敝思歸總管劉𢎞基請班師世民曰東方諸州已望風欵服洛陽孤城勢不能久功在垂成奈何棄之乃下令軍中曰敢言班師者斬衆乃不敢復言唐主亦宻敕世民使還世民遣封徳彞言于唐主曰世充號令所行一城而已智盡力窮克在朝夕若旋師賊勢復振後必難圖唐主從之世民又遣王君廓夜襲虎牢拔之突厥寇唐汾隂注見前突厥頡利可汗始畢可汗之弟始畢卒弟處羅可汗立處羅卒弟頡利立士馬雄盛有憑陵中國之志王世充使人說之曰昔啟民奔隋賴文帝之力有此土宇子孫享之今唐天子非文帝子孫宜奉楊政道伐之以報文帝之徳頡利然之唐主以中國未寜待突厥甚厚而頡利求請無厭言辭驕慢至是冦汾隂已而唐主遣使賂頡利并許結婚頡利乃遣使如唐未㡬頡利帥騎十五萬入雁門冦并州唐主遣襄邑王神符等擊破之乃遣鄭元璹詣頡利責以負約頡利頗慙元璹因說之還師修好頡利悅遂引兵還襄邑王神符唐主從弟鄭元璹譯之子夏王建徳將兵救鄭夏五月唐秦王世民大破擒之鄭主世充降唐兵圍洛陽掘塹築壘而守之城中乏食死者相倚于道竇建徳悉發其衆西救洛陽陷管州及滎陽翟等縣水陸並進兵十餘萬軍于成臯之東原遣使與王世充相聞先是建徳遺秦王世民書請退軍潼闗返鄭侵地復修前好世民不許世民集將佐議皆請避其鋒郭孝恪曰世充窮蹙垂將面縛建徳逺來助之此天意欲兩亡之也宜據武牢以拒之伺間而動破之必矣記室薛收曰世充府庫充實所將皆江淮精鋭但乏糧食故為我持建徳自將逺來亦當極其精銳若縱之至此兩冦合從轉河北之粟以饋洛陽則戰争方始混一無期今宜分兵守洛陽深溝髙壘勿與戰大王親率驍銳先據成臯以逸待勞決可克也建徳既破世充自下不過二旬兩主就縛矣世民善之蕭瑀屈突通封徳彝皆欲退保新安以乗其弊世民曰建徳逺來吾據武牢扼其咽喉彼若争鋒取之甚易若其不戰旬月之間世充自潰一舉兩克在此行也若不速進賊入武牢諸城新附必不能守兩賊併力其勢必彊何弊之乗吾計決矣避薛收字伯褒道衡子武牢即虎牢唐諱虎皆改武乃中分麾下使屈突通等副齊王守東都世民自將驍勇東趣武牢正晝出兵厯北邙抵河陽趍鞏世充莫測竞不敢出世民遂入武牢世民將驍騎五百出覘建徳營縁道分留使李世勣程知節秦叔寳將之伏于道旁纔餘四騎偕進去建徳營三里所建徳遊兵遇之世民大呼曰我秦王也引弓射之斃其一將建徳大驚出五六千騎逐之世民按轡徐行追騎將至則射之止而復來如是再三世民逡巡稍却以誘之既入伏世勣等奮擊大破之建徳迫于武牢累月不得進戰數不利將士思歸世民又遣王君廓將輕騎千餘掠其糧運淩敬言于建徳曰大王宜悉兵濟河攻懐州河陽遂建旗鼓踰大行入上黨徇汾晉趣蒲津拓地收兵則闗中震懼鄭圍自解建徳將從之而世充遣使告急又隂以金玉啗建徳諸將諸將皆欲戰建徳乃謝敬其妻曹氏曰祭酒之言不可違也建徳不聴五月建徳悉衆出牛口峪名在開封府氾水縣西北置陳亘二十里鼔行而進諸將皆懼世民升髙望之謂諸將曰賊起山東未嘗見大敵今度險而囂是無紀律逼城而陳有輕我心我按兵不出彼勇氣自衰陳久卒饑勢將自退追而擊之無不克矣建徳列陳自辰至午士卒饑倦逡巡欲退世民命宇文士及將三百騎經建徳陳西馳而南上建徳陳動世民曰可擊矣世民率輕騎先進大軍繼之直薄其陳建徳方朝羣臣召騎兵使拒唐兵阻朝者不得過建徳揮朝者令退進退之間唐兵已至于是大戰世民帥史大奈西突厥特勒程知節秦叔寳等卷斾而入出于陳後張唐旗幟建徳將士見之大潰建徳中槊墜馬車騎將軍楊武威擒之世民讓之曰我討世充何預汝事建徳曰今不自來恐煩逺取年建徳起兵至滅凡六建徳將士皆潰去俘獲五萬人世民即日散遣使還鄉里遂囚建徳至洛陽城下以示世充世充乃素服帥其子及羣臣三千餘人詣軍門降世充簒凡三年滅于是部分諸軍先入洛陽分守市肆禁止侵掠無敢犯者世民乃入宫城命房元齡收隋圖籍制誥已為世充所毁命蕭瑀等封府庫收其金帛頒賜將士收段達單雄信等十餘人斬之世民坐閶闔門蘇威請見稱老病不能拜世民遣人數之曰公隋室宰相危不能扶使君弑國亡見李宻王世充皆拜伏舞蹈今既老病何勞相見世民觀隋宫殿歎曰逞侈心窮人力欲無亡得乎命撒端門樓焚乾陽殿毁則天門闕廢諸道塲建徳餘衆走至洺州欲立建徳養子為主徵兵以拒唐僕射齊善行曰夏王英武士馬精强一朝為擒易如反掌豈非天命有所屬耶今喪敗如此必無所成不若委心請命于唐乃與裴矩曹旦帥百官奉建徳妻曹氏及傳國八璽請降于唐王世充弟世辯亦以徐宋等三十八州請降淮安王神通又徇下山東三十餘州世充建徳之地悉平世民還長安獻俘太廟赦世充斬建徳詔赦世充為庶人徙蜀定州刺史獨孤修徳以其父機前為世充所殺乃矯詔殺世充以報父仇詔免修徳官獨孤機事見前秋七月唐以蘇世長武功人為諫議大夫王世充僕射蘇世長以襄州來降唐主與之有舊既至長安以為諫議大夫世長嘗從校獵髙陵大獲禽獸唐主曰今日樂乎世長曰不滿十旬未足為樂唐主變色既而笑曰狂態復發邪對曰于臣則狂于陛下甚忠嘗侍宴披香殿酒酣謂唐主曰此殿煬帝之所為邪唐主曰卿諫似直而實多詐豈不知此殿朕之所為乎對曰臣實不知但見其華侈非興王之所為耳昔侍陛下于武功見所居宅僅庇風雨當時亦以為足今因隋之宫室已極侈矣而又増之將何以矯其失乎唐主深然之唐初行開元通寳錢隋末錢幣濫薄至裁皮糊紙為之民間不勝其弊至是初行開元通寳錢徑八分重二銖四絫十黍為絫十絫為銖積十錢重一兩輕重大小最為折衷逺近便之置監于洛并幽益等州秦王世民齊王元吉賜三罏裴寂賜一罏聴鑄錢餘盜鑄者身死家没竇建徳故將劉黑闥起兵漳南竇建徳諸將居閭里暴横為民患唐官吏以法繩之皆驚懼不安㑹詔悉徵建徳故將于是范願髙雅賢等相謂曰王世充以洛陽降唐其將相大臣皆夷滅吾屬至長安必不免矣且夏王得淮安王遇以客禮唐得夏王即殺之吾屬皆為夏王所厚今不為之報仇無以見天下之士乃謀作亂卜之以劉氏為主吉因相與之漳南見建徳故將劉雅雅曰天下適安定吾將老于耕桑不願復起兵衆怒殺之故漢東公劉黑闥屏居漳南諸將詣之告以其謀黑闥方種蔬即殺耕牛與之飲食定計聚衆襲縣據之既又陷㓱縣建徳舊黨稍出歸之乃為壇于漳南祭建徳告以舉兵之意自稱大將軍唐主詔將軍秦武通定州總管李元通藍田人擊之又詔李藝引兵㑹擊八月丙戌朔日食唐徐圓朗以兵應劉黑闥圓朗初附李宻宻敗歸竇建徳唐平洛陽圓朗請降授兖州總管㑹劉黑闥兵起圓朗應之自稱魯王唐蠲太常樂工為民詔以太常樂工皆前代因罪配没子孫相承多厯年所並蠲為民且令執事若仕宦入流從九品以上為流内官勿使追集冬十月唐以秦王世民為天䇿上將唐主以秦王世民功大前代官皆不足以稱之特置天䇿上將位在王公上以世民為之開府置屬世民以海内浸平乃開館以延文學之士杜如晦房元齡虞世南禇亮姚思亷李元道隴西人蔡允恭江陵人薛元敬收從子顔相時字睿師古弟蘇朂字慎行武功人于志寧蘇世長薛收李守素趙州人陸徳明孔穎達字仲達衡水人盖文達信都人許敬宗字延族善心之子為文學館學士分為三番更日直宿世民暇日輒至館中討論文籍或至夜分使庫直閻立本京兆萬年人圖像褚亮為贊號十八學士士大夫得預其選者時人謂之登瀛洲時府僚多補外官如晦亦出為陜州長史元齡曰如晦王佐之才大王欲經營四方非如晦不可世民即奏留之使參謀帷幄軍中多事如晦剖決如流世民每克城諸將争取寳貨元齡獨收采人物致之幕府每令入奏事唐主曰元齡為吾兒陳事雖隔千里皆如面談唐使趙郡王孝恭李靖伐梁梁主銑降唐發巴蜀兵以孝恭李靖統之自䕫州東擊蕭銑時峽江方漲諸將請俟水落靖曰兵貴神速今吾乗江漲掩其不備可成擒也孝恭乃東下銑果不為備孝恭等拔其荆門宜都注俱見前二鎮進至夷陵入北江江水至枝江縣百里洲分而為二其出洲北而東流者謂之北江銑以罷兵營農宿衛纔數千人聞唐兵至倉猝徵兵未集乃悉出見兵拒戰孝恭逆擊敗走銑衆委舟收掠軍資靖見其衆亂縱兵奮擊大破之乗勝直抵江陵入其外郭大獲舟艦靖使散之江中諸將皆曰破敵所獲當藉其用奈何棄之靖曰吾懸軍深入若攻城未拔援兵四集吾表裏受敵進退不獲雖有舟楫將安用之今棄舟艦使塞江而下援兵見之必謂江陵已破未敢輕進往來覘伺動淹旬月吾必取之矣援兵見舟艦疑不敢進遂圍江陵銑内外阻絶問䇿于岑文本文本勸銑降銑謂羣臣曰天不祚梁不可復支矣必待力屈則百姓蒙患奈何以我之故陷百姓于塗炭乎以太牢告廟下令出降守城者皆哭銑帥羣臣緦縗布幘詣軍門曰當死者唯銑耳百姓無罪願不殺掠孝恭入城諸將欲大掠岑文本曰江南之民遭隋虐政重以征戰跂踵連頸以望真主以蕭后君臣決計歸命庶幾有所息肩今若縱兵俘掠士民失望恐自此以南無復向化之心矣孝恭稱善遂禁止之諸將又言梁將帥拒鬬死者請籍其家以賞將士靖曰王者之師宜使義聲先路彼為其主鬭死乃忠臣也豈可同之叛逆之科乎于是城中安堵秋毫無犯南方州縣聞之皆望風欵附孝恭送銑長安斬于都市銑建國凡五年而滅以孝恭為荆州總管靖為上柱國安撫嶺南先是銑遣劉洎畧地嶺表得五十餘城未還而銑敗洎以所得城來降靖既度嶺所至皆下銑桂州總管李襲志帥所部來降以靖代之引兵下九十六州得户六十餘萬劉洎字師道江陵人李襲志字重光金城安康人十一月唐杜伏威擊李子通執送長安伏威遣其將王雄誕曹州濟隂人擊子通子通窮蹙請降伏威執送長安子通僭號七年而亡唐主釋之時新安汪華據黟歙聞人遂安據崑山伏威皆降之于是盡有淮南江東之地華後歸唐為總管黟歙皆漢縣今歙縣為徽州府治黟縣屬府髙開道叛唐復稱燕王幽州饑李藝告糴于髙開道許之藝發三千人車數百乗馬千匹往受粟開道悉留之告絶于藝復稱燕王北連突厥南與劉黑闥相結恒定幽易咸被其患久之開道復欲歸唐未果為其將張金樹所殺開道起兵凡八年而滅唐以其地置媯州唐媯州今宣化府懷來縣是十二月唐命秦王世民齊王元吉擊劉黑闥初黑闥擊破淮安王神通神通與李藝合兵擊黒闥反為所敗藝歸幽州黒闥移書趙魏竇建徳故將争殺唐官吏以應之已而又破定州執總管李元通黑闥欲降元通元通不屈故吏有餽以酒肉者元通飲醉紿守者刀自刺潰腹而死李世勣走保洺州黑闥復追破之半嵗之間盡復建徳舊境遣使北連突厥將軍秦武通程名振洺州平恩人等皆自河北遁歸長安乃命秦王世民齊王元吉討之壬唐武徳五年漢東王劉黑闥天造午元年是嵗楚亡并梁師都凡三國春正月劉黑闥自稱漢東王三月唐秦王世民破之于洺水黑闥奔突厥黑闥稱王改元都洺州竇建徳時文武悉復本位其設法行政悉師建徳而攻戰勇決過之三月世民進軍洺水上以逼之李藝以兵數萬來㑹黑闥使其僕射范願守洺州自將兵拒藝程名振載鼔六十具於城西堤上急擊之城中地皆震動范願馳告黑闥黑闥遽還遣兵繫藝于鼔城隋縣今正定府晉州是大敗洺水人據城來降世民遣王君廓守之黑闥引兵還攻甚急世民三引兵救之不得進恐君廓不能守行軍總管羅士信請代君廓守之世民登城西南髙冡以旗招君廓君廓率其徒力戰潰圍而出士信乗之入城黑闥晝夜急攻會大雪救兵不得往凡八日城陷黑闥素聞士信勇欲生之士信辭色不屈乃殺之曲洺水隋縣故城在今廣平府周縣世民與藝營于洺水之南黑闥數挑戰世民堅壁不應李世勣擊斬黑闥將髙雅賢程名振又邀截其運糧相持六十餘日世民度黑闥糧盡必來決戰乃使人堰洺水上流黑闥果帥步騎二萬南度洺水壓唐營而陳世民自將精騎擊破之黑闥率衆殊死戰自午至昏戰數合黑闥勢不能支遂先遁餘衆不知猶格戰守吏決堰水大至衆遂潰黑闥與范願等奔突厥山東悉平秋七月唐秦王世民擊徐圓朗杜伏威入朝于唐秦王世民擊徐圓朗下十餘城聲振淮泗杜伏威懼遂請入朝世民以淮濟畧定使淮安王神通及任瓌李世勣攻圓朗自引兵還已而圓朗棄城夜亡為野人所殺李子通聞杜伏威入朝欲往收其衆遂亡走至藍田為吏所獲伏誅隋漢陽太守馮盎降唐初盎以漢陽太守從隋煬帝征遼東及隋亂奔還嶺表據有其地或說盎宜效趙佗稱王盎曰吾家居此為牧伯者五世富貴極矣常懼不克負荷為先人羞敢效佗乎至是承李靖檄以所部降唐嶺南悉平十月楚主林士𢎞卒初士𢎞為蕭銑所逼退保餘干本漢餘汗縣隋改汗曰干今縣屬江西饒州府及銑敗散卒多歸之軍勢復振至是士𢎞卒其衆遂散士𢎞僭號七年而亡十一月唐遣太子建成擊劉黑闥黑闥既奔突厥引突厥冦山東又冦定州唐遣齊王元吉擊之淮陽王道元唐主從子將兵三萬與黑闥戰敗没道元與副將史萬寳不協帥輕騎犯陳萬寳擁兵不進故敗時年十九秦王世民深惜之曰道元嘗從吾征伐見吾深入賊陳心慕效之以至于此為之流涕山東震駭黑闥盡復故地進據洺州元吉不敢進太子建成請行故遣太子中允王珪洗馬魏徵說太子曰秦王功葢天下中外歸心殿下但以年長居東宫無大功以鎮服海内今劉黑闥散亡之餘衆不滿萬殿下宜自擊之以取功名庶可自安于是太子請行初唐主之起兵晉陽也皆秦王世民之謀唐主謂世民曰事成當以汝為太子將佐亦以為請世民固辭而止太子喜酒色遊畋齊王多過失皆無寵世民功名日盛建成内不自安乃與元吉協謀共傾世民曲意事諸妃嬪以求媚于上世民獨不事之由是諸妃嬪争譽建成元吉而短世民世民每侍宴思太穆皇后早終不得見唐主有天下或流涕唐主不樂諸妃嬪曰陛下春秋髙宜相娱樂而秦王如此正是憎妾等陛下萬嵗後妾子母必無孑遺皇太子仁孝必能保全妾等唐主為之愴然由是無易太子意時世民元吉皆居別殿與上臺東宫晝夜通行無復禁限相遇如家人禮太子令秦齊王教與詔敕並行有司莫知所從唯據得之先後為定世民以淮安王神通有㓛給田數十頃張媫妤求之手敕賜之神通以教給在先不與媫妤訴于唐主唐主怒以責世民復謂裴寂曰此兒久典兵在外為書生所教非復昔日子也王珪字叔玠郿人癸唐武徳六年都是嵗漢未東亡并梁師凡二國春正月漢東將諸葛徳威執其君黑闥降唐唐斬之先是唐太子建成兵至昌樂漢縣唐改南樂今屬大名府黑闥亡走魏徵曰前破黑闥其將帥皆懸名處死故其衆皆為之盡力今宜悉解其俘囚慰諭遣之則可坐視其離散矣太子從之黑闥食盡衆多降黑闥與數百騎遁去太子遣騎將劉宏基追之至饒陽黑闥所署刺史諸葛徳威出迎饋之食未畢勒兵執之送詣太子斬于洺州黒闥臨刑嘆曰我幸在家鋤菜為髙雅賢輩所誤至此林邑遣使入貢于唐初隋破林邑分其地為三郡及中原喪亂林邑復國至是始入貢幽州總管李藝入朝于唐藝入朝唐以為左翊衛大將軍後貞觀元年藝反將奔突厥為其下所殺夏六月苑君璋奔突厥髙滿政以馬邑降唐初突厥既殺劉武周以苑君璋代統其衆居馬邑馬邑人多不願屬突厥君璋將髙滿政因衆心不欲夜襲君璋君璋奔突厥引之入冦滿政破之降唐唐以為朔州總管已而突厥圍馬邑都虞候杜士逺殺滿政以馬邑降突厥㑹突厥請和親乃以馬邑歸唐秋八月唐淮南道行臺僕射輔公祏反初杜伏威降唐唐以輔公祏為淮南道行臺僕射伏威素與公祏友善兄事之軍中謂之伯父畏敬與伏威等已而伏威浸忌之潛奪其兵權公祏知之陽為學道辟穀以自明及伏威入朝留公祏守丹陽令王雄誕典兵為之副公祏詐雄誕奪其兵諭以反計雄誕曰今天下方平定吳王在京師奈何無故自求族滅乎公祏殺之詭稱伏威貽書令其起兵尋稱帝于丹陽國號宋唐主詔趙郡王孝恭李靖等討之孝恭將發與諸將宴集命取水忽變為血在坐皆失色孝恭舉止自若曰此乃公祏授首之徴也飲而盡之衆皆悅服明年孝恭李靖攻克丹陽斬公祏傳首長安公祏之反也與唐洪州總管張善安連兵善安故兖州賊帥降唐授總管已而復叛唐遣安撫使涇陽李大亮討之善安委罪諸將請降大亮執送長安赦其罪及公祏敗得所與往還書乃殺之考隋自王薄倡亂四方並起僭竊位號割據州郡凡一百三十餘人至唐武徳七年始俱翦滅唯梁師都至貞觀二年乃亡今自大業七年以後録其尤著者各具起滅餘或因事附見不備載再綱目于武徳七年以後梁師都亦不附注嵗首今依之唐置屯田于并州突厥數為邊患并州長史竇靜字元休抗之子表請于太原置屯田以省餽運議者以為煩擾靜切論不已徵靜入朝與裴寂等相問難于唐主前寂等不能屈乃從靜議嵗收榖數千斛秦王復請増置屯田于并州之境從之御批厯代通鑑輯覽卷四十九

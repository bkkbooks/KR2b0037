body:
  text: 李克用既克磁洺具前復拔邢州孟遷力詘執宣武援將王虔裕以降既而又攻雲州防禦使赫連鐸求救於盧龍李匡威匡威將兵赴之克用將安金俊戰死克用乃引還於是赫連鐸李匡威請討克用朱全忠亦上言克用終為國患臣請與河北三鎮共除之乞朝廷命大臣為統帥上命集羣臣議之初張濬夲由楊復恭以進復恭中廢更附田令孜而薄復恭復恭再用事深恨之上知濬與復恭有隙特親倚之及全忠請討克用濬因此欲倚外勢以擠復恭時三省御史臺四品以上言克用不可討者十六七杜讓能劉崇望字希徒崇龜之弟龍紀元年同平章事亦以為不可張濬獨曰先帝再幸山南沙陀所為也臣嘗慮其與河朔相表裏致朝廷不能制今兩河藩鎮共請討之此千載一時也但乞陛下付臣兵柄旬日可平孔緯曰濬言是也楊復恭曰先朝播遷雖藩鎮跋扈亦由居中之臣措置未得其宜今宗廟甫安不宜更造兵端上曰克用有興復大功今乘其危而攻之謂諸鎮與仇天下其謂我何緯曰陛下所言一時之體張濬所言萬世之利上以二相言協僶俯從之曰兹事付卿二人無貽朕羞乃以濬為河東行營都招討制置使京兆尹孫揆副之濬奏給事中牛徽僧孺之孫為行營判官徽曰國家以喪亂之餘欲為英武之舉橫挑強冦吾見其顛沛也遂以衰疾固辭濬發京師日言於上曰俟臣先除外憂然後為陛下除內患楊復恭竊聽之餞濬於長樂坡屬濬酒濬辭復恭戲之曰相公杖鉞専征作態邪濬曰俟平賊還方作態耳復恭益忌之岸長樂坡在西安府咸寧縣東北即水西昭義軍亂殺留後李克恭朱全忠取潞州李克用遣兵圍之詔以孫揆領昭義節度使初李克用巡潞州以供具不厚怒節度使李克修詬而笞之克修慙憤成疾卒克用表其弟克恭為留後潞人素樂克修簡儉以其死非罪憐之而克恭驕慢不習軍事將士胥怨昭義有徑兵號後院將克用將圖河朔令克恭選五百人送晉陽克恭遣其將馮霸部送至銅鞮漢縣州省故城在今山西沁州霸劫其衆以叛牙將安居受因之作亂攻克恭而焚殺之附于朱全忠已而居受為衆所殺居受召霸霸不至因出走為野人所殺霸引兵入潞自為留後全忠遣河陽留後朱崇節將兵入潞州克用遣康君立李存孝將兵圍之詔以孫揆領昭義節度使秋八月李克用執昭義節度使孫揆揆死之綱目作李克用執招討副使孫揆以歸殺之今依唐書昭宗紀改書七月官軍至陰地關在平陽府靈石縣西南今曰南關鎮朱全忠遣驍將葛從周將千騎潛自壺關後魏縣今屬潞安府夜抵潞州犯圍入城又遣别將攻李罕之於澤州奏請遣孫揆赴鎮張濬亦恐昭義遂為汴人所據使揆將兵二千趣潞州八月發晉州李存孝聞之以三百騎伏於長子秦縣今屬潞安府西谷中擒揆及中使韓歸範獻於克用欲以揆為河東副使揆曰吾天子大臣兵敗而死分也豈能復事鎮使邪克用怒命鋸之鋸不行揆罵曰死狗奴鋸人當用夾板汝豈知邪乃以板夾而鋸之至死罵不絶聲九月李克用復取潞州先是汴軍圍澤州呼李罕之曰相公每恃河東今張相公圍太原葛僕射入潞州旬日之間沙陀無穴自藏相公何路求生邪及是李存孝至選精騎五百繞汴寨呼曰我沙陀之求穴者也欲得爾肉以飽士卒可令肥者出鬭汴將鄧季筠亦驍將也引兵出戰存孝生擒之餘衆遁走存孝大破之復攻潞州葛從周棄城走歸全忠時軍河陽聞之亦引還是月李匡威攻蔚州李嗣源擊走之嗣源性謹重儉諸將相會各自誇勇略嗣源獨默然徐曰諸君喜以口擊賊嗣源但以手擊賊耳衆慚而止王建克卭州先是建攻卭州陳敬瑄遣其大將楊儒以兵三千助刺史毛湘守之儒率所部降建儒登城見建兵盛嘆曰唐祚盡矣王公治衆嚴而不殘殆可以庇民乎遂出降建養以為子更名宗儒建留張琳許州人為卭州招安使引兵還成都於是簡資嘉戎四州悉降於建簡州唐置今屬成都府餘注俱見前及是建攻卭州益急城中食盡救兵不至毛湘謂都知兵馬使任可知曰吾不忍負田軍容湘本令孜親吏吏民何罪爾可持吾頭歸王建乃沐浴以俟刃可知斬湘以降建入卭州以張琳知留後繕完城隍撫安夷獠經營蜀雅引兵復還成都已而建取蜀州冬十月李克用遣兵拒官軍於趙城注見前十一月官軍潰張濬韓建遁還官軍出陰地關克用遣李存孝將兵五千營於趙城鎮國節度使韓建以壯兵三百夜襲其營存孝設伏以待之建兵不利靜難鳯翔之兵不戰而走禁軍自潰河東兵乘勝逐北扺晉州西門張濬出戰又敗濬與韓建拒守晉州存孝攻之三日語其衆曰張濬宰相俘之無益天子禁兵不宜加害乃退五十里而軍濬建乃得遁去存孝取晉綘注見前二州大掠慈唐置慈州金曰吉州今州𨽻山西隰注見前之境是克用遣範歸範歸附表頌冤曰臣父子三代受恩四朝破勛黃巢黜王存易定致陛下今日冠通天之冠佩白玉之璽未必非臣之力也若以攻雲州為臣罪則拓拔思恭之取延朱全忠之侵徐鄲何獨不討賞彼誅此臣豈無辭今張濬既已出師則臣故難束手已集蕃漢兵五十萬欲直扺藩潼與濬格鬬若其不勝甘從削奪不然輕騎叫閣頓首丹陛訴姦回於扆坐納制敕於朝廷然後自拘司敗恭俟鈇鑕表至濬已敗朝廷震恐濬建至河陽撤屋為筏以濟師徒失亡殆盡是役也朝廷倚朱全忠及河朔三鎮及濬至晉州全忠方連兵徐鄆鎮魏倚河東為扞蔽皆不出兵兵未交而孫揆被擒掦復恭復從中沮之故濬軍望風自潰復置升州今江南江寧府唐初曰蔣州乾元初改升州上元後廢大順初復置時張雄據上元詔復置升州以雄為刺史未幾卒裨將馮𢎞鐸雄同里人代之楊行密之圍揚州也雄率軍浮淘屯東塘城中競以金玉珠繒詣雄軍貿食通天𢃄一得米五升錦衾一得娕五升雄軍富過所望即不戰去後遂據上元雄善撫衆人懷之其卒也為立祠辛亥二年春正月朱全忠攻魏博羅𢎞信拒之不克請和全忠乃還初全忠假道於魏以伐河東羅𢎞信不許乃自黎陽濟河擊魏丁會葛從周取黎陽臨河隋縣故城在今大明府開州龎師古曹州南華人霍存洺州曲周人下淇門鎮名在今衛輝府汲縣衛縣隋縣即古朝歌注見前全忠自以大軍繼之𢎞信軍於內黃全忠擊之五戰皆捷𢎞信懼遣使厚幣請和全忠乃還魏博自是服於汴孔緯張濬罷以崔昭緯字藴曜慎由從子徐彥若商之子同平章事張濬既敗故與緯同罷而相昭緯彥若緯出為京南節度使濬出為鄂嶽觀察使楊復恭使人劫緯於長樂坡斬其旌節資裝俱盡緯僅能自免貶孔緯張濬逺州刺史復李克用官爵李克用上表曰張濬以陛下萬代之業邀自己一時之功知臣與朱溫深仇私相連結臣今身無官爵名是罪人不敢歸陛下藩方且欲于河中寄寓進退行止伏俟指揮於是再貶緯濬復克用官爵使歸晉陽既又加克用中書令貶濬繡州唐置宋省故城在今廣西潯州府桂平縣司户濬奔華州依韓建與孔緯求敕於朱全忠全忠表訟其寃朝庭不得已並聽自便孫儒攻宣州孫儒盡舉淮蔡之兵濟江轉戰而南楊行密城戍皆望風奔潰儒將李從立奄至宣州東溪即宛溪在今寧國府宣城縣東行密守備尚未固衆心危懼夜使其將臺濛臺氏古臺駘之後以名為氏濛合肥人將五百人屯溪西宛溪之西濛使士卒傳呼往返數四從立以為大衆繼至遽引去儒前軍至溧水隋縣今屬江寧府行密使將李神福洺州人帥精兵襲之俘斬千人未幾儒引還掦州遣將據滁和行密即攻復之朱全忠遣使與行密約共攻儒儒恃其強移牒藩鎮數行密全忠之罪且曰俟平宣汴當引兵入朝除君側之惡於是悉焚揚州廬舍盡驅丁壯及婦女渡江殺老弱以充食儒於是引兵復逼宣州屢破行密兵旌旗輜重亘百餘里行密求救於錢鏐鏐以兵食助之行密遂取常州會時溥遣兵南侵至楚州行密將張訓等擊敗之復取楚州張訓滁州清流人二月以王師範為平盧節度使師範初為留後棣州刺史張蟾不從起兵討之至是師範遣其將盧宏擊棣州宏引兵還攻師範師範使人迎之仍請避位宏以師範年少信之不設備師範密謂小校劉鄩密州安邱人曰汝能殺宏吾以汝為大將宏入城師範伏甲而饗之鄩殺宏於座師範慰諭士卒自將以攻棣州殺蟾以鄩為馬步副都指揮使詔以師範為節度使師範和謹好學每本縣令到官師範輒備儀衛往謁之命客將挾令坐聽事自稱百姓拜之於庭僚佐或諫師範曰吾敬桑梓所以教子孫不忘本也夏四月彗星見赦天下彗星出三台注見前入太微注亦見前長十餘丈王建逐韋昭度還攻成都韋昭度將諸道兵十餘萬討陳敬瑄三年不能克饋運不繼朝議欲息兵乃下詔復敬瑄官爵令顧彥朗王建各帥衆歸鎮建見制書曰大功垂成奈何棄之周庠勸建請韋公還朝獨攻成都克而有之於是建表敬瑄令孜罪不可赦願畢命以圖成功復説昭度曰今關東藩鎮迭相吞噬此腹心之疾也相公宜早歸廟堂與天子謀之敬瑄疥癬與癬同責建可辦也昭度猶豫未決建擒其親吏駱保于行府門臠食之昭度大懼遽稱疾以印節授建即日東還建送之出劍門即以兵守之不復內東軍急攻成都環城烽塹亘五十里秋七月李克用攻雲州克之赫連鐸走吐谷渾降部之居代北者後克用攻殺之王建克成都自稱西川留後陳敬瑄巡內州縣率為建所取田令孜登城謂建曰老夫向於公甚厚何見困如是建曰父子之恩豈敢忘但朝廷命建討不受代者儻太師改圖建復何求是夕令孜自携印節詣建營授之建泣謝請復為父子如初敬瑄開城迎建建下令禁焚掠自稱西川留後敬暄寓居新津後周縣今屬成都府建以一縣租賦贍之尋授建為西川節度使建留心政事容納直言好施樂士用人各盡其才謙恭儉素然多忌好殺諸將有功名者多因事誅之九月以楊復恭為上將軍致仕楊復恭總宿衛兵専制朝政諸假子皆為節度使又養宦官子六百人多為監軍上舅王瓌惠安太后弟求節度使復恭不可瓌怒詬之復恭奏以為黔南節度使至桔柏津在四川保寧府昭化縣東即嘉陵白水二江合流處覆諸江中上深恨之李順節盡以復恭陰事告上上乃出復恭為鳳翔監軍復恭愠懟不肯行稱疾求致仕從之使者致詔命還復恭潛刺殺之冬十月楊復恭謀反遣天威都頭李順節討之復恭走興元與楊守亮等舉兵拒命復恭居第近玉山營唐初分藍田縣地置玉山縣尋廢營蓋因廢縣而名以屯禁軍假子守信為玉山軍使數往省之或告復恭與守信謀反上御安喜門命順節將兵攻其第不克禁軍欲掠兩市遇劉崇望立馬諭之曰天子親在街東督戰汴曹皆宿衛之士當於樓前殺賊立功勿貪小利自取惡名衆皆曰諾遂從而東守信兵望見潰走定信與楊復恭挈其族趣興元與楊守亮等同舉兵拒朝廷以討李順節為名時東川節度使顧彥朗卒詔以其弟彥暉代之遣中使往賜旌節楊守亮囚而奪之使楊守厚將兵攻梓州彥暉求救于王建建遣兵救之守厚走還守亮又欲自金商襲京師時昭信防禦使馮行襲方奉命治金州逆擊大破之馮行襲字正臣均州人十二月殺天威都頭李順節順節恃恩驕橫出入常以兵自隨中尉劉敬宣西門君遂惡之白上恐其作亂誘殺之百官表賀壬子景福元年春二月以李茂貞為山南西道招討使先是鳯翔李茂貞靜難邠寧軍王行瑜鎮國華州軍韓建同州匡國軍王行約秦州天雄軍李茂莊五節度使上言楊守亮容匿叛臣楊復恭請出兵討之乞加茂貞山南西道招討使朝議以茂貞得山南不可復制下詔和解之皆不聼茂貞行瑜擅舉兵擊興元表請不已遺杜讓能西門君遂書陵蔑朝廷上意不能容召宰相諌官議于時宦官有陰與二鎮相表裏者宰相不敢言給事中牛徽曰先朝多難茂貞誠有翼衛之功諸楊阻兵亟出攻討其志亦在疾惡但不當不以詔命耳比聞兵過山南殺傷至多陛下儻不俟招討使授之使用國法約束則山南之民盡矣上乃從之既而茂貞取興元復恭守亮等奔閬州以時溥為太子太師溥不奉詔朱全忠連年攻時溥徐泗濠三州民不得耕穫兖鄆河東兵救之皆無功全忠取曹州徐之驍將劉知俊降之溥軍自是不振劉知俊字希賢徐州沛人復值水災人死者十六七溥困甚請和於全忠全忠曰必移鎮乃可溥許之全忠乃奏請移溥他鎮詔以溥為太子太師溥恐全忠詐而殺之據城不奉詔朝庭不得已復以溥為感化節度使夏六月楊行密擊孫儒斬之遂歸揚州孫儒屢攻宣州大順二年正月十二日凡再攻至是年二月遂圍之楊行密謂諸將曰儒之衆十倍於我吾數戰不利欲退保銅官山名注見前何如劉威彭城人李神福曰儒掃地逺來利在速戰宜屯據險要堅壁清野以老其師時出輕騎抄其饋餉奪其俘掠彼前不得戰退無資糧可坐擒也戴友規盧州人曰若望風棄城正墮其計淮南士民及自儒軍來降者甚衆公宜遣將先護送歸淮南使復生業儒軍聞淮南安堵皆有思歸之心人心既搖安得不敗行密悅從之至是屢破儒兵張訓屯安吉後漢縣今為州屬浙江湖州府斷其糧道儒食盡士卒大疫行密縱兵擊之儒軍大敗田頵擒斬之傳首京師儒衆多降於行密行密帥衆歸揚州表田頵守宣州安仁義代北人守潤州孫儒降兵多蔡人行密選其尢勇健者五千人厚其廩賜以皂衣蒙甲號黑雲都每戰使之先登陷陳四鄰畏之既而詔以行密為淮南節度使行密以用度不足欲以茶鹽易民布帛掌書記髙朂舒城人曰兵火之後十室九空又漁利以困之將復離叛不若悉我所有易鄰道所無足以給軍選賢守令勸課農桑數年之間倉庫自實行密從之田頵聞之曰賢者之言其利逺哉先是揚州富庶甲天下時人稱揚一益二及是被兵六年江淮之暗掃地殆盡行密能以勤儉足用招撫流散輕徭薄斂未及數年公私交足幾復承平之舊掦一益二言揚州第一益州為次也冬十月以李存孝為邢洺磁節度使李克用之復取潞州也李存孝以不得昭義克用以康君立為昭義留後以存孝為汾州刺史憤怒始有叛志已而克用表存孝為邢洺磁留後克用所署節度使安知建潛附朱全忠乃表存孝代之存孝與李存信俱為克用假子存孝本安敬思存信本張氏子俱見前不相睦存信有寵於克用存孝欲立大功以勝之乃建議取鎮冀存信從中沮之不時聼許及王鎔圍堯山克用攻王鎔大破之拔臨城等數縣李匡威救之克用大掠而還既而鎔匡威合兵十餘萬攻堯山臨城唐縣今屬直棣趙州堯山唐縣今順德府唐山縣是存孝救之不克克用更遣李嗣勳等擊破之存信因譛存孝無心擊賊疑有私約存孝聞之憤怒且懼禍及乃潛結王鎔及朱全忠上表以三州自歸乞賜旌節及會諸道兵討克用詔以存孝為節度使不許會兵十二月初行景福崇元厯太子少詹事邊冏等所造癸丑二年春正月以李茂貞為山南西道節度使茂貞不奉詔茂貞自請鎮興元故有是命茂貞欲兼得鳯翔不奉詔二月李克用擊王鎔李匡威救之克用還攻邢州李克用圍邢州王鎔致書解之克用怒進擊鎔大破之遂下井陘李存孝將兵救之又乞師於朱全忠全忠方與時溥相攻不能救李匡威引兵救鎔敗河東兵於元氏注見前克用引還攻邢州既而鎔救邢州克用敗之復與連和李匡威為弟匡籌所逐奔鎮州匡威之發幽州也家人會别以弟匡籌之妻美醉而淫之及還匡籌據軍府自稱留後以符追行營兵匡威衆潰王鎔迎歸鎮州父事之既而匡威謀奪鎮州為鎮人所殺匡威為鎔完城塹繕甲兵訓士卒潛謀奪鎮州隂以恩施悅其將士王氏在鎮又鎮人愛之不徇匡威匡威忌日鎔弔之匡威素服甲伏兵劫之鎔趨抱匡威曰鎔為晉人所困幾亡矣賴公以有今日公欲得四州此固鎔之願也不若與公共歸府以位讓公則將士莫之拒矣匡威以鎔年少易之與鎔駢馬入府會大風雷雨鹿瓦皆振匡威入門鎮軍之有屠者墨君和自缺垣躍出拳毆匡威甲士挾堵登屋共攻匡威殺之鎔時年十七以栁玭為濾州注見前刺史栁氏自公綽以來世以孝悌禮法為士大夫所宗玭為御史大夫上欲以為相宦官惡之故久謫於外玭嘗戒其子弟曰凡門第髙可畏不可恃也立身行已一事有失則得罪重於他人死無以見先人於地下此其所以可畏門髙則驕心易生族盛則為人所疾懿行實材人未之信小有疪類衆皆指之此其所以不可恃也故膏粱子弟學宜加勤行冝加勵僅得比他人耳夏四月王建殺陳敬瑄田令孜建屢請殺敬瑄令孜朝廷不許建使人告敬瑄作亂令孜通鳳翔書皆殺之建令判官馮涓草表奏之曰開柙出虎孔宣父不責他人當路斬蛇孫叔敖蓋非利已專殺不行於外先機恐失於彀中馮涓宿之孫朱全忠拔徐州時溥自殺先是濠泗二州時漙巡屬降於朱全忠全忠遣其子友裕攻濮州朱瑄巡屬拔之遂令移兵擊時溥既而友裕圍彭城久之不克至是全忠自將如徐州都指揮使龎帥古先拔佛山即石佛山注見前寨遂拔彭城溥舉族登燕子樓在徐州府城東北隅張建封所築自焚死全忠以宋州刺史張廷範知感化留後乞除文臣為節度使朱友裕之圍彭城也時溥數出兵友裕堅壁不戰都虞候朱友恭譛之於全忠全忠怒書下龎帥古使代之將按其事書誤達於友裕友裕大懼以二十騎逃入山中潛匿伯父全昱所全忠夫人張氏聞之使友裕單騎詣汴州見全忠全忠將斬之夫人趨就抱之泣曰汝舍兵衆束身歸罪無異志明矣全忠悟而捨之張夫人多智略全忠敬憚之雖軍府事時與之謀議或將兵出至中途夫人以為不可遣一介召之立為之返朱友恭本夀春人李彥威全忠養以為子幽州將劉仁恭深州樂夀人攻李匡籌不克奔河東仁恭將兵戍蔚州過期未代會李匡籌立戍卒奉仁恭為帥還攻幽州不克仁恭奔河東李克用厚待之五月王潮取福州先是福建觀察使陳巖卒都將范暉自稱留後巖疾病遣使召王潮欲授以軍政未至而卒暉諷將士推已為留後發兵把潮暉驕侈失衆心王潮以從弟彥復為都統弟審知為都監將兵攻暉經年不克白潮罷兵潮報日兵盡添兵將盡添將兵將俱盡吾當自來彥復等懼急攻之至是暉棄城走為將士所殺潮入福州自稱留後素服葬陳巖以女妻其子厚撫其家汀建州降汀州唐置今為府建州注見前羣盜皆潰尋以潮為福建觀察使已又以為節度使後潮擊破黃連洞蠻閩地略定潮遣僚佐巡州縣勸農桑定租稅交好鄰道保境息民閩人安之黃連洞在汀州府寧化縣東秋八月以覃王嗣周通鑑考異順宗子經封郯王嗣周當是其後會昌後避武宗諱炎字改郯作覃為京西招討使討李茂貞茂貞恃功驕橫上表曰陛下貴為萬乘不能庇元舅之一身謂王瓌事見前尊極九州不能戮復恭之一豎但觀強弱不計是非體物錙銖謂量物微有輕重即待之有異看人衡纊劉峻廣絶交論衡所以權其輕重纊所以屬其鼻息若衡不能舉纊不能飛雖顔冉曾史視若遊塵若衡重錙銖纊微祿雖共工歡兜皆在折支舐痔語蓋本此軍情易變戎馬難羈唯慮甸服生靈因兹受禍未審乘輿播越自此何之上怒決䇿討之命杜讓能専掌其事讓能諫曰陛下初臨大國步未夷茂貞近在國門未宜搆怨萬一不克悔之無及上曰王室日卑號令不出國門此志士憤痛之秋朕不能坐視陵夷卿但為謂兵食朕自委諸王用兵成敗不以責卿讓能曰陛下必欲行之中外大臣宜協力以成聖志不當獨以任臣上曰卿居元輔與朕同休戚無宜避事讓能泣曰臣豈敢避事顧時有未可勢有不能恐他日徒受朝錯之誅不能弭七國之禍也敢不奉韶以死繼之乃命讓能留中書計畫調度月餘不歸崔昭緯陰結邠王行瑜岐李茂貞為之耳目讓能朝發一言二鎮夕必知之李茂貞使其黨糾合市人數千百人邀西門君遂馬及崔昭緯鄭昌延字光逺從讜從兄弟景福元年同平章事肩輿訴之二相曰兹事王上専委杜太尉吾曹不預知市人因亂投瓦石二相走匿僅免上命捕其倡帥者誅之用兵之意益堅遂有是命揚行密取歙州以陶雅合肥人為刺史先是行密克廬州斬蔡儔儔本行密部將以州叛附朱全忠全忠不納行密遣兵克而斬之行密先冢皆為儔所發左右或請發儔父母墓行密曰此儔之罪也吾何為效之及是行密遣田頵攻歙州刺史裴樞字紀雲遵慶曾孫城守久不下時諸將為刺史者多貪暴獨池州陶雅寬厚得民歙人曰得陶雅為刺史請聽命行密即以雅為刺史歙人納之雅盡禮見樞送之還朝既而行密復取舒州九月以錢鏐為鎮海節度使鎮海軍本置於潤州今以命錢鏐於杭州鏐發民夫及十三都軍士築杭州羅城周七十里臨安志鏐先築夾城周五十里有奇後又築羅城自秦望山由夾城東亘江干泊錢唐湖霍山范浦周七十里李茂貞王行瑜合兵拒官軍官軍逃潰貶杜讓能雷州司户覃王嗣周帥禁軍三萬軍於興平李茂貞王行瑜合兵六萬軍於盩厔以拒之禁軍皆新募市井少年而兩鎮皆邊兵百戰之餘茂貞等進逼興平禁軍皆望風逃潰茂貞等乘勝進攻三橋京師大震茂貞等陳於臨臯驛在長安城西表讓能罪請誅之讓能曰臣固先言之矣請以臣為解上涕下不自禁曰與卿訣矣是日貶讓能梧州刺史再貶雷州司户斬西門君遂等三人以韋昭度崔胤字垂休一字昌遐慎由子同平章事胤外寬宏而內巧險與崔昭緯深相結故得為相季父安潛謂所親曰吾父兄刻苦以立門户終為緇郎所壞緇郎胤小字也冬十月殺雷州司户杜讓能以李茂貞為鳯翔兼山南西道節度使李茂貞勒兵不解請誅杜讓能然後還鎮崔昭緯復從而擠之遂賜死自是朝廷動息皆稟於邠岐南北司往往依附二鎮以邀恩澤復以茂貞鎮兩道於是茂貞盡有鳯翔興元洋隴秦十五州之地十一月以王行瑜為太師號尚父賜鐵劵行瑜求為尚書令韋昭度密奏曰太宗以尚書令登大位自是不以授人惟郭子儀以大功拜終身避讓行瑜安敢輕議遂有是命十二月朱全忠請領鹽鐵不許朱全忠請徙鹽鐵於汴州崔昭緯以為全忠新破徐鄆兵力倍增若更判鹽鐵不可復制乃賜詔開諭之邵州刺史鄧處訥邵州龍潭人取潭州殺周嶽初處訥從閔朂為邵州刺史朂為周嶽所殺事見前處訥聞而哭之諸將入弔處訥曰吾與公等咸受僕射謂閔朂大恩今嶽殺之吾欲與公等竭力為僕射報仇可乎皆曰善於是訓卒厲兵八年乃結朗州刺史雷滿共攻潭州斬嶽自稱留後詔以為節度使甲寅乾寧元年春正月李茂貞入朝茂貞入朝大陳兵自衛數日歸鎮二月以鄭綮字蘊武以進士登第同平章事綮好詼諧多為歇後詩譏嘲時事上以為有所蘊手注班簿命以為相聞者大驚堂吏往告之綮笑曰諸君大誤使天下更無人未至鄭綮吏曰特出聖意綮曰果如是奈人笑何既而賀客至綮搔首言曰歇後鄭五作宰相時事可知矣纍讓不獲乃視事已而綮纍表避位竟致仕李克用克邢州殺李存孝先是克用自引兵攻邢州掘塹築壘環之存孝時出突擊塹壘不能成河東牙將袁奉韜使人紿存孝曰大王俟塹成即歸諸將非尚書敵咫尺之塹安能沮尚書之鋒鋭邪存孝以為然按兵不出旬日塹壘成飛走不能越存孝由是遂窮及是邢州城中食盡存孝出見克用泥首謝罪克用囚之以歸車裂於牙門存孝驍勇軍中莫及常將騎兵為先鋒身披重鎧腰弓髀槊獨舞鐵撾陷陳萬人辟易克用惜其才意臨刑諸將必為之請既而諸將疾其能竟無一人言者既死克用為之不視事者旬日又有薛阿檀者其勇與存孝相侔諸將疾之常不得志密與存孝通恐事泄遂自殺自是克用兵勢浸弱而朱全忠㯮盛矣夏五月劉建鋒馬殷入潭州殺鄧處訥孫儒之敗也劉建鋒馬殷收餘衆七千南走比至洪州已十餘萬及是至醴陵後漢縣今屬湖南長沙府鄧處訥遣其將蔣勛將步騎三千守龍回關在長沙府善化縣東疊峰拔峙如城中間僅通一路今名關山殷遣使説勛曰劉龍驤智勇兼人將十萬衆精鋭無敵而君以鄉兵數千拒之難矣不如先下之取富貴還鄉里不亦善乎勛謂衆曰東軍許吾屬還矣士卒皆歡呼棄旗幟鎧仗遁去建鋒令前鋒衣其甲張其旗趣潭州守者以為關兵還納之建鋒徑入府殺處訥自稱留後已而朝廷以建鋒為武安節度使建鋒以殷為內馬步軍都指揮使蔣勛求邵州建鋒不許勛引兵冦湘潭據郡州建鋒遣殷擊之湘潭梁縣今屬長沙府王建克彭州唐置今為縣屬成都府殺楊晟初田令孜以楊晟為威戎節度使治彭州令孜既敗王建遣兵圍之久而不下民皆竄匿山谷諸寨日出俘驚謂之淘虜有軍士王先成者新津人本書生世亂為兵度諸將唯王宗侃最賢乃往説之因條列為狀凡七條一乞招安山中百姓二乞禁諸寨淘虜三乞置招安寨以處招安百姓四乞招安之事須委宗侃專掌五乞嚴勒諸寨其前日所虜悉部送招安寨中敢匿者斬六乞置行縣以撫理百姓給帖壯者使入山招其親戚七彭土宜麻民未入山多漚藏者宜令行縣曉諭使出而鬻之以為資糧宗侃白建建悉從之三日山中民爭出赴寨月餘各復故業及是彭州城中食盡建克之殺楊晟獲其馬步使安師建欲使為將師建泣謝曰師建誓與楊司徒同生死不忍復戴日月惟速死為惠再三諭之不從乃殺之禮葬而祭之六月以李溪字景望鄘之孫同平章事尋罷之以翰林學士李溪為相時鄭延昌罷以溪代方宣制知制詔劉崇魯出班掠麻慟哭上召問之對曰溪姦邪依附宦官得在翰林不任相恐危社稷溪竟罷為太子少傅上師溪為文崔昭緯恐分已權故使崇魯沮之溪十表自訟醜詆崇魯嘗庭拜田令孜為朱玫作勸進表慟哭正殿為國不祥詔停崇魯見任秋八月楊復恭等伏誅李茂貞拔閬州楊復恭帥其黨出走韓建獲之獻闕下斬於獨栁茂貞獻復恭與守亮書訴致仕之由云承天門乃隋家舊業大姪但積粟訓兵勿貢獻吾於荆榛中立夀王才得尊位廣定策國老有如此負心門生天子冬十一月楊行密取泗州朱全忠遣使至泗州陵慢刺史張諫諫舉州降行密行密遣押牙唐令回持茶萬餘斤如汴宋貿易全忠執令回盡取其茶揚汴始有隙十二月李克用攻幽州克之李匡籌走死劉仁恭數因蓋寓獻䇿於克用願得兵萬人取幽州克用方攻邢州分兵數千納仁恭不克匡籌益驕數侵河東之境克用怒大舉兵攻匡籌拔武州唐光啓中置今直𨽻宣化府是進圍新州本北燕州光啓中更名今宣化府保安州是匡籌遣兵救之李克用逆戰破之新州降匡籌復發兵出居庸關克用使精騎夾攻之幽兵大敗匡籌奔滄州義昌節度使盧彥威遣兵攻殺之克用進軍幽州其大將請降自李全忠得幽州凡三世十年而減幽州軍民以麾蓋歌鼓迎克用入府舍克用命李存審本姓苻宛邱人克用養以為子劉仁恭略定巡屬以劉隱為封州刺史封州刺史劉謙卒其子隱居喪賀江謙以刺史兼賀江鎮遏使賀江源出廣西富川縣南徑賀縣至廣東肇慶府封川縣亦曰封溪水入西江士民百餘人謀亂隱一夕盡誅之嶺南節度使劉崇龜召補押牙表刺封州既而崇龜卒嗣薛王知柔代為帥未至會廣州將盧琚單玘作亂隱以封州兵攻殺之迎知柔知柔辟隱行軍司馬知柔贈忠宣太子業五世孫乙卯二年春正月護國節度使王重盈卒王重盈卒軍中請以重榮子珂知留後珂本重榮兄重簡子重榮養以為子重盈之子保義節度使珙晉州刺史瑤舉兵擊珂表言珂非王氏子珂上表自陳且求援於李克用上遣中使諭解之二月董昌僣號於越州昌為政苛虐加斂數倍以充貢獻由是寵命相繼求為越王未許昌不悅曰朝廷欲負我矣有諂之者曰與其為越王曷若為越帝於是民間訛言相率填門請昌為帝昌大喜集將佐議之副使黃褐閩人曰今唐室雖微天人未厭大王興於畎畝受朝廷厚恩位至將相富貴極矣奈何一旦忽為族滅之計昌族誅之又問會稽令吳鐐鐐曰大王不為真諸侯以傳子孫欲為假天子以取滅亡邪昌亦族誅之山隂令張遜曰浙東雖領六州王若稱帝彼必不從徒守孤城為天下笑耳昌又殺之遂稱皇帝先是咸通末吳越間訛言山中有大鳥四目三足聲云羅平天册見者有殃民間多畫像祀之及昌僣號曰此吾鸑鷟也乃自稱大越羅乎國改元順天署城樓曰天册之樓令羣下謂已曰聖人鸑鷟鳳屬錢鏐遺昌書曰與其閉門作天子與九族百姓俱陷塗炭豈若開門作節度使終身富貴邪及今悛悔尚可及也昌不聽鏐以狀聞復以李溪同平章事三月罷上重溪文學復以為相崔昭緯與邠岐相結得天子過失朝廷機事悉以告之溪再入相昭緯使告行瑜曰嚮者尚書令之命已行矣而韋昭度沮之今又引李溪為同列相與熒惑聖聽恐復有杜太尉之事行瑜乃與茂貞表溪姦邪昭度無相業宜罷居散秩上報曰軍旅之事朕則與藩鎮圖之至於命相當出朕懷行瑜等論列不已溪復罷以劉仁恭為盧龍節度使從李克用之請也崔胤罷以王摶字昭逸興曾孫同平章事王珙王瑤請朝廷命河中帥詔以胤充護國節度使摶同平章事以王珂為護國留後珂李克用之壻也克用表重榮有功於國請賜珂節鉞王珙厚結王行瑜李茂貞韓建更上表稱珂非王氏子請以珂為陜州珙為河中上報曰先已允克用之奏矣楊行密取濠州行密攻濠州拔之掠得徐州人李氏子生八年矣養以為子其長子渥字承天憎之行密謂徐溫曰此兒質狀性識頗異於人吾度渥必不能容今賜汝為子溫名之曰知誥字正倫俊復姓李名升知誥勤孝過諸子溫愛之使掌家事家人無違言及長喜書善射識度英偉行密謂溫曰知誥俊傑諸將子皆不及也胡三省曰徐知諸事始此既而行密復取壽州及連水隋縣今曰安東屬淮安府夏四月罷諸王將兵上以郊畿多盜至有踰垣入宫侵犯陵寢者欲令宗室諸王將兵巡警又欲使之四方撫慰藩鎮南北司用事之臣恐其不利於已交章論諌上不得已罷之五月制削奪董昌官爵委錢鏐討之王行瑜李茂貞韓建舉兵犯闕殺韋昭度李溪行瑜以不得尚書令怨朝廷畿內有八鎮兵𨽻左右軍郃陽漢縣今屬同州府鎮近華州韓建求之良原隋縣元省故城在今平原府靈臺縣鎮近邠州王行瑜求之宦官曰此天子禁軍何可得也王珂王珙爭河中行瑜建及茂貞皆為珙請不能得恥之珙使人語三帥曰珂與河東婚姻必為諸公不利請討之行瑜使其弟同州刺史行約攻河中而自與茂貞建各將精騎數千入朝上御安福門以待之三帥盛陳甲兵拜伏舞蹈上詰之曰卿輩不奏請俟報輒稱兵入京城其志欲何為乎若不能事朕今日請避賢路行瑜茂貞流汗不能言獨韓建粗述入朝之由上與之宴三帥奏稱南北司互有朋黨隳紊朝政韋昭度討西川失䇿李溪作相不合衆心請誅之上未之許行瑜等輒殺之及樞密使康尚弼等數人請除王珙河中徙王行約於陜王珂於同州上皆許之李克用聞三鎮犯闕即日遣使發北部兵期以來月渡河入關始三帥謀廢上立吉王保懿宗子帝弟也及聞克用起兵行瑜茂貞各留兵三千人宿衛京師與建皆還本鎮六月以孔緯同平章事張濬為諸道租庸使上以崔昭緯等外交藩鎮朋黨相傾思得骨鯁之士故驟用緯濬既而朱全忠薦濬上欲復相之李克用表請發兵擊全忠且言濬朝為相臣夕至闕詔和解之李克用舉兵討三鎮秋七月王行約李繼鵬作亂帝如石門鎮今曰石門谷在西安府藍田縣西南長安志唐昭宗出幸南山次石門佛寺即此質實以為在淳化又以為在靜寧皆非糾繆以為在略陽尤誤李克用大舉蕃漢兵南下上表稱王行瑜李茂貞韓建稱兵犯闕賊害大臣請討之又移檄三鎮數其罪行瑜等大懼克用軍至絳州攻拔之斬刺史王瑤至河中王珂迎謁於路王行約棄同州走弟行實時為左軍指揮使奏請幸邠州樞密使駱全瓘請幸鳯翔上曰克用尚駐軍河中就使至此朕自有以枝梧卿等但各撫本軍勿令搖動右軍指揮使李繼鵬本姓閻名圭茂貞假子也謀劫上幸鳯翔中尉劉景宣與王行實知之欲劫上幸邠州孔緯面折景宣以為不可輕離宫闕向晚王行約引左軍攻右軍鼓譟震地上聞亂登承天樓欲諭止之捧日都頭李筠將本軍於樓前侍衛李繼鵬以鳯翔兵攻筠矢拂御衣左右扶上下樓繼鵬復縱火焚宫門煙焰蔽天時鹽州六都兵屯京師素為兩軍所憚上急召入衛既至兩軍退走上幸李筠營護蹕都頭李居實帥衆繼至或傳行瑜茂貞欲自來迎車駕上懼為所迫以筠居實兩都兵自衛幸石門鎮出啓夏門幸南山之莎城鎮駐於石門佛寺啓夏門長安東南門莎城鎮在長安城南近郊之地克用遣判官王環奉表問起居遣兵攻華州韓建登城呼曰僕於李公未嘗失禮何為見攻克用使謂之曰公為人臣逼逐天子公為有禮孰為無禮者乎會聞邠岐欲迎車駕乃移兵營渭橋上遣供奉宜張承業詣克用軍承業同州人屢奉使於克用因留監其軍克用遣其將李存貞為前鋒又遣史儼將三千騎詣石門侍衛遣李存信存審會保大節度使李思孝本姓拓跋思恭之弟也攻王行瑜梨園寨今邠州淳化縣治是明史地理志淳化縣宋以雲陽縣之梨園鎮置擒其將王令陶等獻於行在李茂貞懼斬李繼鵬傳首行在上表請罪且遣使求和於克用上復遣延王戒丕元宗子玢封延王戒丕其後也諭克用令且赦茂貞併力討行瑜復以崔胤同平章事胤雖授河中節不得赴乃復以中書侍郎輔政制削奪王行瑜官爵以李克用為招討使討之詔李克用討王行瑜克用遣其子存朂克用長子即後唐莊宗詣行在年十一上竒其狀貌撫之曰兒方為國之棟梁他日宜盡忠於吾家胡三省曰李存朂始此車駕還京師李克用表請車駕還京師從之時宫室焚毁未暇完葺上寓居尚書省百官往往無袍笏僕馬王建遣兵赴援屯綿州建頓兵不進已奏言顧彥暉不發兵赴難而略奪輜重請興兵討之冬十月貶崔昭緯為梧州司馬以孫偓字龍光武邑人同平章事以昭緯黨附邠岐故貶以偓代之十一月李克用克邠州王行瑜伏誅河東將李存貞敗邠寧兵於梨園北李罕之李存信等又急攻之王行約行實遁去行瑜以精兵五千守龍泉寨即龍泉鎮在邠州三水縣東北李克用攻拔之行瑜走入邠州克用引兵逼之行瑜登城號哭謂克用曰行瑜無罪脅迫乘輿皆茂貞繼鵬所為請移兵問鳯翔行瑜願束身歸朝克用曰王尚父何恭之甚僕受詔討三賊臣公預其一束身歸朝非僕所得專也行瑜挈族出走克用入邠州封府庫撫居人行瑜尋為部下所殺傳首京師朱全忠圍兖州朱全忠遣葛從周擊兖州自以大軍繼之圍其城朱瑄遣其將賀瓌字光逺濮陽人柳存薛懷寶將兵萬餘人襲曹州以解兖州之圍全忠自中都本平陸縣唐更名故城在今兖州府汶上縣引兵夜追之比明至巨野漢縣今屬曹州府南及之屠殺殆盡擒三將俘三千人會大風晦冥全忠曰此殺人未足耳命所得俘皆殺之縛三將徇於兖州城下謂朱瑾曰卿兄已敗何不早降既而殺存及懷寶聞瓌名禮而用之瑄瑾告急於河東李克用遣大將史儼將數千騎以救之十二月進李克用爵晉王克用還晉陽詔李克用進爵晉王李罕之蓋寓諸將佐進官有差克用遣掌書記李襲吉洛陽人入謝請乘勝勢遂取鳯翔上謀於貴近或曰茂貞復滅則沙陀太盛朝廷危矣上乃賜克用詔褒其忠欵且言不臣之狀行瑜為甚茂貞韓建自知其罪職貢相繼且當休兵息民克用奉詔而止既而私謂詔使曰觀朝廷之意似疑克用有異心也然不去茂貞關中無安寧之日詔又免克用入朝將佐或言今密邇闕廷豈可不入見天子克用猶豫未決蓋寓曰天子還未安席人心尚危大王若引兵渡渭竊恐復驚駭都邑人臣盡忠在於勤王不在入覲願熟圖之克用笑曰蓋寓尚不欲吾入朝況天下之人乎克用性嚴急左右無敢違忤惟寓敏慧能拂其意婉辭裨益無不從者克用乃表曰臣總帥大軍不敢徑入朝覲表至京師上下始安克用遂引兵歸而茂貞驕橫如故河西州縣多為所據丙辰三年春李克用遣李存信將兵救兖州鄆羅𢎞信襲之存信軍潰李克用遣李存信將萬騎假道於魏以救兖鄆軍於莘縣朱全忠使人謂羅𢎞信曰克用志吞河朔師還之日貴道可憂存信戢衆不嚴侵暴魏人𢎞信怒發兵三萬夜襲之存信軍潰委棄資糧兵械萬數𢎞信自是與河東絶專志汴州全忠方圖兖鄆畏𢎞信議其後𢎞信每有贈遺全忠必對使者北面拜受之曰六兄於豫倍年以長固非諸鄰之比𢎞信信之全忠以是得專意東方夏四月河漲劉友益曰志患始也河漲將毁滑州朱全忠決為二河夾城而東為害滋甚武安軍亂殺劉建鋒推馬殷留後建鋒嗜酒不親政事長直兵陳贍妻美建鋒私之贍殺建鋒諸將迎行軍司馬張信長安人為留後佶將入馬忽踶齧傷髀時馬殷攻邵州未下佶謂諸將曰馬公勇而有謀寬厚樂善吾所不及真乃主也乃以牒召之殷至佶肩輿入府坐受殷拜謁已乃命殷升廳事以留後讓之即趨下帥將吏拜賀復為行軍司馬代殷將兵攻邵州朝廷尋以殷判湖南軍府事殷以高郁為謀主而畏楊行密成汭之強議以金帛結之郁曰成汭不足畏也行密公之讐雖以萬金賂之安肯為吾援乎不若上奉天子下撫士民訓卒厲兵以修霸業則誰與敵矣殷從之已而張佶克郡州擒蔣勛詔以殷知武安留後時湖南營內多為羣盜所據殷遣兵以次攻郴衡道永諸州皆下之高郁揚州人崔昭緯伏誅昭緯既貶復求救於朱全忠詔遣中使賜昭緯死及於荆南斬之中外咸以為快錢鏐克越州董昌伏誅先是鏐遣其將顧全武餘姚人討昌昌將多降遂進兵越州昌出戰而敗全武圍之昌始懼去帝號會楊行密克蘇州行密圍蘇州常熟鎮使陸郢以州城應行密獲刺史成及常熟梁縣今屬蘇州府成及字𢎞濬錢塘人鏐急召全武使備行密全武曰越州賊之根本奈何垂克而棄之請先取越州後復蘇州鏐從之及是全武攻克越州外郭昌猶據牙城拒之鏐遣紿昌云奉詔令大王致仕歸臨安昌乃送牌印而出全武斬之昌在圍城中貪吝益甚口率民間錢帛減戰士糧及城破庫有金帛雜貨五百間倉有糧三百萬斛錢鏐散金帛以賞將士開倉以賑貧乏六月李克用攻魏博朱全忠遣其將葛從周救之還擊兖鄆破之李克用攻魏博朱全忠召葛從周於鄆州使將兵營洹水以救魏博克用引兵擊之汴人多鑿坎於陳前戰方酣克用馬躓幾為汴人所獲顧射其將一人斃之乃得免引軍還從周復擊兖鄆兵破之兖鄆屬城皆為汴人所據克用發兵赴之輒為魏人所拒不得前兖鄆由是不振秋七月李茂貞舉兵犯闕帝如華州初李克用屯渭北李茂貞韓建憚之事朝廷禮甚恭克用去二鎮貢獻漸疏表章驕慢上自石門還置殿後四軍選補數萬人使延王戒丕等將之茂貞遂表言延王無故稱兵討臣臣今勒兵入朝請罪上告急于河東茂貞遂兵逼京畿覃王嗣周與戰敗績七月茂貞進逼京師戒丕曰今關中藩鎮無可依者不若自鄜州濟河幸太原上至渭北韓建奉表請幸華州不許既而上復憚逺適至富平復遣人召建面議去留建至頓首言今藩臣跋扈者非止茂貞陛下若逺巡邊鄙臣恐無復還期今華州兵力雖微亦足自固西距長安不逺願陛下臨之以圖興復上乃從之至華州茂貞遂入長安燔燒俱盡崔胤罷以陸扆字祥文贄族孫家陜州同平章事上以胤崔昭緯之黨故罷之而相扆八月李克用發兵入援韓建移檄諸道令供輸資糧詣行在李克用聞之歎曰去嵗從余言豈有今日之患又曰韓建天下癡物為賊臣弱帝室是不為李茂貞所擒則為朱全忠所虜耳因奏與鄰道發兵入援王搏罷以朱朴襄陽人同平章事水部郎中何迎表薦國子博士朱朴材如謝安道士許巖士亦薦朴有經濟材上連日召對朴有口辨上悅之曰朕雖非太宗得卿如魏徴矣上憤天下之亂思得竒傑之士不次用之朴自言得為宰相月餘可致太平上以為然以朴為相朴庸鄙迂僻中外大驚尋兼判户部凡軍吏財賦一以委之九月以崔胤崔逺淡之子同平章事貶陸扆為硤州注見前刺史胤之罷相韓建之志也胤密求于朱全忠且教之營東都宫闕表迎車駕全忠從之仍請以兵迎駕且言崔胤忠臣不宜出外建懼復奏召胤為相遣使諭止全忠胤恨扆代己誣以黨于茂貞而貶之冬十月以孫偓為鳳翔四面行營招討使討李茂貞茂貞上表請罪仍獻助修宮室錢韓建復左右之竟不出師尋罷偓招討使以錢鏐為鎮海鎮東節度使王摶復同平章事先是董昌既誅以摶為威勝節度使鎮浙東至是鏐令兩浙吏民上表請兼領浙東朝廷不得已復以摶同平章事鏐兼領兩鎮改威勝曰鎮東丁巳四年春正月詔罷諸王所領兵及殿後四軍韓建奏睦濟韶通彭韓儀陳八王胡三省注皆嗣王也睦韶韓代宗之後彭肅宗之後陳文宗之後舊史皆佚其名及其世系謀殺臣劫車駕幸河中上大驚召建諭之建稱疾不入令諸王詣建自陳建不之見表請勒歸十六宅妙選師傅教以詩書不令典兵預政上不得已詔諸王所領軍士並縱歸田里建又奏所置殿後四軍顯有厚薄偏黨乞皆罷遣詔亦從之于是天子之親軍盡矣捧日都頭李筠石門扈從功第一建復奏斬之立德王裕為皇太子建既幽諸王于别地上意不悅乃奏請立德王為太子欲以解之本名祐更名裕朱全忠克鄆州執朱瑄進襲兖州克之朱瑾奔淮南龎師古葛從周并兵攻鄆州朱瑄兵少食盡不復出戰引水為深濠以自固師古等為浮梁夜濟瑄棄城走野人執之以獻全忠入鄆州以龎師古為天平留後朱瑾留大將康懷貞後改名懷英兖州人守河東自與河東將史儼李承嗣掠徐境以給軍食全忠遣從周將兵襲兖州懷貞降從周入兖州獲瑾妻子瑾及儼等率其衆奔淮南于是鄆齊曹棣兖沂密齊宿陳許鄭滑濮皆入于全忠惟王師範守淄青亦服于全忠瑾至淮南楊行密躬迎之表領武寧節度使淮南舊善水戰不習騎射及得河東兖鄆兵軍聲大振全忠納瑾之妻引兵還張夫人請見之瑾妻拜夫人答拜且泣曰兖鄆與司空約為兄弟以小故恨望起兵相攻使吾姒辱于此他日汴州失守吾亦如吾姒之今日乎全忠乃出瑾妻而斬瑄二月孫偓朱朴罷朴既秉政所言皆不效外議沸騰故與偓俱罷夏六月貶王建為南州唐置今四川重慶府綦江縣是刺史以李茂貞為西川節度使覃王嗣周為鳳翔節度使王建將兵五萬攻東川李茂貞表其罪故貶之徙茂貞鎮西川覃王鎮鳳翔先是遣宣諭使李恂和解兩川及是建克梓州南寨會恂至建指執旗者曰戰士之情不可奪也茂貞亦不受代圍覃王于奉天韓建移書茂貞覃王乃得歸秋八月韓建劉季述宦者殺通王滋宣宗子帝之弟等十一人韓建奏諸王罷兵尚苞隂計願陛下聖斷不疑制于未亂上不報建乃與知樞密劉季述矯制發兵圍十六宅諸王披髮升屋呼曰宅家唐末宫中率稱天子曰宅家猶言家主也救兒建盡殺之以謀反聞九月李克用攻幽州劉仁恭與戰敗之初李克用取幽州表劉仁恭為節度使留戍兵及腹心將千人典其機要租賦供軍之外悉輸晉陽及上幸華州克用徵兵于仁恭以入援仁恭辭以契丹入寇不出兵克用移書責之仁恭抵書慢罵囚其使者克用大怒自將擊之為仁恭將單可及所敗可及引兵逆戰克用方飲酒前鋒白賊至克用醉曰可及輩何足為敵亟命擊之是日大霧河東兵遇伏大敗克用醒而後知之仁恭遣使謝克用克用復書略曰公仗鉞控兵理民立法擢士則欲其報德選將則望彼酬恩已尚不然人何足信僕料猜防出于骨肉嫌忌生于屏帷持千將而不敢授人捧盟盤而何辭著誓冬十月以韓建為鎮國匡國節度使詔削奪李茂貞官爵姓名發兵討之復以王建為西川節度使王建克梓州顧彥暉自殺建爭東川三年與彥暉五十餘戰至是攻之益急彥暉自殺建入梓州城中兵尚七萬人建以王宗滌本華洪王建更其名姓為留後朱全忠擊楊行密戰于清口在淮安府清河縣西南舊泗水入淮之口今為黃淮交滙處全忠大敗朱全忠既得兖鄆甲兵益盛乃大舉擊楊行密遣龎師古壁清口葛從周壁安豐注見前全忠自將屯宿州行密與朱瑾將兵三萬拒之師古營于清口或曰營地汙下未可久處不聽朱瑾壅淮上流欲灌之或以告師古以為惑衆斬之瑾以五千騎引渡趣其中軍士卒倉皇拒戰淮水大至汴軍駭亂行密督大軍夾攻之汴軍大敗斬師古從周奔還行密瑾乘勝追擊之殺溺殆盡還者不滿千人全忠亦奔還行密六會詣將謂副使李承嗣曰始吾欲趣夀州副使云不如先向清口師古敗從周自走今果如所料賞之錢萬緍表領鎮海節度行密待承嗣史儼甚厚第舍姬妾咸選其尤者賜之故二人皆為密盡力屢立功行密由是遂保據江淮全忠不能與之爭立淑妃何氏為皇后十二月威武節度使乾寧三年升福建為威武軍王潮卒王潮以弟審知為觀察副使有過猶加捶撻審知無怨色潮寢疾舍其子命審知知軍府事潮既卒詔以審知為節度使南詔驃信舜化上書南詔上書朝廷欲以詔書報之王建言小夷不足辱詔書臣在西南彼必不敢犯塞從之黎雅間有淺蠻三部嵗賜繒帛使覘南詔而蠻反受南詔賂詗成都虛實隂與大將相表裏節度使或失大將心則教諸蠻紛擾建絶其賜斬押牙山行章以懲之卭徠之南不置障戌蠻亦不敢侵盜貶張道古青州人為施州司户右拾遺張道古上疏言國家有五危二亂陛下登極十年而曽不知為君御臣之道先朝封域日蹙幾盡臣雖微賤竊傷陛下朝廷宗社始為姦臣所弄終為賊臣所有也上怒貶之仍下罪狀宣示諫官戊午光化元年是年八月還京方改元春正月詔復李茂貞姓名官爵罷諸道兵上下詔罪已息兵復茂貞官爵仍以為鳳翔節度使以韓建為修宫闕使初李茂貞以數出兵救東川不暇東逼乘輿詐稱改過又聞朱全忠營洛陽宫纍表迎駕與建皆懼請修復宫闕奉上歸長安詔以建為修宫闕使建與茂貞皆致書于李克用請和仍乞工匠助修宫室克用許之三月以朱全忠為宣武宣義本義成以全忠父名誠故改宣義天平節度使朱全忠遣副使韋震字東卿萬年人入奏求兼鎮天平朝廷未之許震爭之力不得已從之夏四月朱全忠會幽州魏博兵擊李克用敗之拔洺邢磁州自此晉汴嵗爭三州秋八月車駕至長安遣使宣慰河東宣武上欲藩鎮輯睦以太子賔客張有孚為河東汴州宣慰使和解之克用欲奉詔全忠不從九月魏博節度使羅𢎞信卒軍中推其子紹威字端已為留後尋授節度使冬十二月李罕之據潞州朱全忠表為節度使李克用之平王行瑜也李罕之求帥邠寧克用曰行瑜恃功要君故吾與公討而誅之昨破賊之日吾首奏趣蘇文建赴鎮今遽二三朝野之論必謂吾輩復如行瑜所為也俟還鎮當為公論功耳罕之不悅復求小鎮養疾克用亦不許罕之鬱鬱及是昭義節度薛志勤卒罕之擅引澤州兵夜入澤州據之克用怒遣人讓之罕之遂請降于朱全忠克用遣李嗣昭將兵討之嗣昭先取澤州收罕之家屬送晉陽全忠表罕之為昭義節度使已而罕之死全忠使賀德倫守潞州李嗣昭圍之刈其附城禾黍三十里皆盡德倫宵遁克用表孟遷為留後賀德倫河西人己未二年春正月崔胤罷以陸扆同平章事胤附朱全忠上醜其行而罷之乃復相扆劉仁恭屠貝州三月朱全忠遣兵擊敗之遂攻河東大敗而還先是昌義節度使盧彥威與仁恭爭鹽利仁恭遣其子守文將兵襲之彥威奔汴州仁恭遂取滄景德三州以守文為留後兵勢甚盛有并吞河朔之志至是仁恭發幽滄等十二州兵十萬攻拔貝州城中萬餘口盡屠之由是諸城各堅守不下仁恭進攻魏州節度使盧紹威求救于朱全忠全忠遣李思安陳留人將兵救魏大破幽州兵斬其將單可及可及幽之驍將號單無敵燕軍失之喪氣時葛從周將精騎已入魏州復與仁恭戰仁恭又大敗燒營而遁仁恭自是不振而全忠益橫從周乘勝攻河東拔承天軍故城在真定府井陘縣西北别將氏叔琮氏姓叔琮尉氏人拔遼州唐置今𨽻山西李克用遣周德威字鎮逺朔州馬邑人擊破叔琮從周引還叔琮有驍將陳章號陳夜乂請于叔琮曰河東所恃者周陽五請擒之求一州為賞克用聞之以戒德威德威曰彼大言耳及戰德威微服往挑之謂其屬曰汝見陳夜乂即走章杲逐之德威奮鐵撾擊之墜馬生擒以獻因擊叔琮大破之夏六月保義軍亂殺節度使王珙恭性猜忌雖妻子親近常不自保至是為麾下所殺推都將李璠為留後都將朱簡字德光許州人復殺璠而代之附于朱全忠改名友謙預于子姪全忠于是又兼有陜虢庚申三年春二月李克用治晉陽李克用大治晉陽城塹押牙劉延業諫曰大王聲振華夷宜揚兵以嚴四境不當近治城塹損威望而啓寇心克用謝之賞以金帛夏四月朱全忠遣兵圍滄州全忠遣葛從周將兵擊劉仁恭拔德州圍滄州仁恭復遣使求救于河東李克用遣周德威將五千騎救之既而克用復遣兵攻邢洺以救仁恭汴軍敗會久雨全忠召從周還六月以崔胤同平章事殺司空同平章事王摶王摶明達有度量時稱良相上素嫉樞密使宋道弼景務修專橫崔胤日與上謀去之由是南北司益相憎疾各結藩鎮以相傾摶恐其致亂從容言于上曰人君當務明大體無所偏私宦官擅權之弊誰不知之顧其勢未可猝除宜俟多難漸平以道消息願陛下言勿輕泄以速姦變胤聞之譖摶為道弼輩外應上疑之及胤罷相意摶排己恨之遺朱全忠書使表論之上不得已召胤復相之貶摶崖州司户流道弼歡州務修愛州皆賜自盡于是胤專制朝政勢震中外宦官皆側目秋九月以徐彥若為清海乾寧中賜嶺南節度使號曰清海軍節度使崔胤以彥若位在已上惡之彥若亦自求引去時藩鎮皆為強臣所據惟嗣薛王知柔在廣州乃求代之時崔亦罷以陸贄同平章事裴贄字敬臣坦從子朱全忠攻鎮州朱全忠以王鎔與李克用交通擊之鎔懼遣判官周式詣全忠請和全忠怒謂式曰僕屢以書諭王公皆不之聽今兵已至此期于無捨式曰鎮州密邇太原困于侵暴王公與之連和乃為百姓故也今明公果能為人除害則天下誰不聽命若但窮威武則鎮雖小城堅食足明公雖有十萬之衆未易攻也全忠笑曰與公戲耳乃遣使入見鎔鎔以其子為質全忠引還朱全忠既去判官張澤言于鎔曰河東勍敵也今雖有朱氏之援譬如火發于家安能俟逺水乎彼幽滄易定猶附河東不若説朱公乘勝兼服之使河北合而為一則可以制河東矣鎔復遣周式往説全忠全忠喜遣張存敬擊劉仁恭投瀛景鄭三州張存敬譙郡人冬十月馬殷取桂州靜江軍是年升桂管為靜江軍節度使劉士政遣副使陳可璠屯全義嶺在桂林府興安縣東以備馬殷殷遣李瓊等將兵擊之可璠掠縣民耕牛以犒軍縣民怨之為瓊鄉道以襲秦城在興安縣西南范成大曰秦戍五嶺時築擒可璠遂圍桂州士政出降桂宜巖柳象五州皆降巖州唐置今栁州府來賔縣是餘注俱見前朱全忠遣兵攻定州義武節度使王郜處存子奔晉陽張存敬攻定州王郜遣兵馬使王處直字允明處存母弟將兵數萬拒之處直請依城為柵俟其師老而擊之孔目官梁汶以存敬兵少無用依城示怯郜乃遣處直逆戰大敗郜奔晉陽軍中推處直為留後存敬進圍之朱全忠至城下處直登城呼曰本道事朝廷盡忠于公未嘗相犯何為見攻全忠曰何故附河東對曰封疆密邇且婚姻也今請改圖全忠許之處直以繒帛十萬犒師全忠乃還仍為處直表求節鉞由是河北諸鎮皆服于全忠十一月中尉劉季述幽帝于少陽院而立太子裕自宋道弼景務修死宦官皆懼中尉劉季述王仲先樞密王彥範薛齊偓等隂相與謀曰主上輕佻變詐難奉事専聽任南司官吾輩終罹其禍不若奉立太子引岐華兵控制諸藩誰能害我哉至是上獵苑中夜醉歸手殺黃門侍女數人明旦日加辰已宫門不開季述帥禁兵千人破門而入具得其狀出謂崔胤曰主上所為如是豈可理天下廢昏立明自古有之為社稷大計非不順也胤不敢違季述召百官陳兵殿庭作胤等狀請太子監國胤及百官皆署之將士大呼入思政殿上驚起季述等出狀白之曰此非臣等所為乃南司衆情不可遏也即扶上與何后同輦嬪御才十餘人適少陽院季述以銀撾畫地數上曰某時某事汝不從我言其罪一也如此數十不止乃手鎖其門鎔鐵錮之遣兵圍之穴牆以通飲食上求錢帛紙筆皆不與公主嬪御無衣衾號哭聞于外季述迎太子入宫矯詔立之以上為太上皇加百官爵秩將士優賞凡宫人左右為上所寵信者皆搒殺之進士李愚客遊華州上韓建書曰明公居近關重鎮君父幽辱坐視凶逆而忠勤王之舉僕所未喻也一朝山東侯伯倡義連衡鼓行而西明公欲求自安其可得乎不如馳馹四方諭以順逆軍聲一振則元凶破膽浹旬之間二豎之首傳于天下計無便于此者建雖不能用厚待之愚堅辭而去李愚字子晦無棣人崔胤密致書朱全忠思興兵圖反正全忠在定州聞亂而還季述遣其養子希度詣全忠許以唐社稷輸之全忠猶豫未決副使李振字興緒抱真之孫獨曰王室有難霸者之資也公為唐桓文安危所屬宦豎囚廢天子不能討何以復令諸侯且幼主位定則天下之權盡歸宦官矣全忠大悟即囚希度遣親吏蔣元暉史無里系如京師與崔胤謀之辛酉天復元年春正月朔神策指揮使孫德昭鹽州五原人等討劉季述等皆伏誅帝復位黜太子裕為德王神策指揮使孫德昭自季述等廢立常憤惋不平崔胤聞之遣判官石戩説之曰今反者獨季述仲先爾公誠能誅此二人迎上皇復位則富貴窮一時忠義流千古茍狐疑不決則功落他人之手矣德昭曰相公有命不敢愛死遂結右軍都將董彥弼周承誨謀以除夜伏兵安福門外以俟之正旦仲先入朝德昭擒斬之馳詣少陽院叩門呼曰逆賊已誅請陛下出勞將士何后不信曰果爾以其首來德昭獻其首上乃與何后毁扉而出崔胤引上御長樂門樓帥百官稱賀周承誨擒劉季述王彥範繼至方詰責己為亂挺所斃薛齊偓赴井死出而斬之滅四人之族并誅其黨二十餘人上曰裕幼弱非其罪黜為德王賜德昭姓名李繼昭承誨姓名李繼誨彥弼亦賜姓李皆以使相留宿衛賞賜傾府庫時人謂之三使相上寵待胤益厚朱全忠由是亦益重李振進朱全忠爵為東平王李茂貞為岐王以韓全誨張彥𢎞為中尉袁易簡周敬容為樞密使敇近年宰相延英奏事樞密使侍側爭論紛然撓權亂政自今並依大中舊制俟宰相奏事畢方得升殿承受公事崔胤陸扆上言禍亂之興皆由中官典兵乞令胤主左軍扆主右軍則諸侯不敢侵陵王室尊矣上召李繼昭等謀之皆曰臣等纍世在軍中未聞書生為軍主若屬南司必多所變更不若歸之北司為便于是復以宦者為中尉又徵前樞密使嚴遵美為兩軍中尉觀軍容處置使遵美曰一軍猶不可為況兩軍乎固辭不起胤以宦官終為肘脅之患欲以外兵制之會李茂貞入朝胤諷茂貞留兵宿衛以假子繼筠將之建議大夫韓偓字致光萬年人以為不可曰留此兵則國家兩危不留則家國兩安胤不從二月朱全忠取河中晉絳等州執王珂以歸殺之朱全忠既服河北欲取河中以制河東遣張存敬將兵三萬襲之而自以中軍繼其後晉絳不意其至皆降全忠留兵守之以拒河東援兵之路珂告急于李克用克用兵不得進報曰不若舉族歸朝珂又遺李茂貞書言天子詔藩鎮無得相攻今朱公不顧詔命首興兵相加河中若亡則同華邠岐皆不自保天子神器拱手授人矣公宜急帥關中諸鎮兵固守潼關赴救河中關中安危國祚修短繫公此舉茂貞不報存敬圍河中王珂欲奔京師而人情離二不復能出遂請降全忠馳赴之至虞鄉唐縣今屬蒲州府哭重榮墓盡哀河中人皆悅珂欲面縛全忠止之曰太師舅之恩不可忘若郎君如此使僕異日何以見舅于九泉乃以常禮出迎全忠表張存敬為留後珂舉族遷于大梁全忠竟殺之以王溥字德潤正雅從孫裴樞同平章事溥常在崔胤幕府故胤引之與樞同相三月朱全忠遣兵攻河東取沁澤潞遼等州李克用遣使請好于全忠全忠忿其書辭蹇傲遣氏叔琮等分道攻之沁澤潞遼等州皆降别將白奉國會成德兵自井陘入拔承天叔琮等兵抵晉陽城下克用登城備禦不遑飲食時大雨積旬芻糧不給士卒瘧痢全忠乃召兵還周德威李嗣昭以兵騎躡之殺獲甚衆氏叔琮逼上黨孟遷挈族隨之南徙全忠以丁謂代守潞州夏五月以朱全忠為宣武宣義天平護國節度使全忠奏乞除河中節度使而諷吏民請已為帥李茂貞入朝初楊復恭借度支買麴之利一年以贍軍而不復歸至是崔胤欲抑宦官罷之令酤者自造而月輸錢度支并近鎮亦禁之李茂貞惜其利表乞入朝論奏韓全誨請許之李茂貞至京師全誨深與相結崔胤始懼益厚朱全忠而與茂貞為仇敵矣閏六月解崔胤鹽鐵使上之返正也中書舍人令狐渙綯之子給事中韓偓皆預其謀因擢為翰林學士時上悉以軍國事委崔胤宦官側目胤欲盡除之韓偓曰事禁太甚此輩亦不可全無恐其黨迫切更生他變胤不從上獨召偓問之對曰東內之難敕使誰非同惡處之當在正旦今已失其時矣上曰當是時卿何不為崔胤言之對曰陛下詔書云四家之外餘無所問夫人生所重莫大于信既下此詔則守之宜堅若復戮一人則人人懼死矣然後來所去已為不少此其所以恟恟不安也今不若擇其尤無良者數人明示其罪置之于法然後撫諭其餘擇其忠厚者使為之長有善則奬有過則懲則咸自安矣此曹在公私者以萬數豈可盡誅耶夫帝王之道當以重厚鎮之公正御之至于瑣細機巧機生則彼機應矣終不能成大功所謂理絲而棼之者也況今朝廷之權散在四方茍能先收此權則事無不可為者矣上深以為然曰此事終以屬卿胤復請盡誅宦官但以宫人掌內諸司事宦官乃求美女知書者數人內之宫中隂令詗察其事盡得胤密謀日夜謀所以去胤者時胤領三司户部支度鹽鐵全誨等教禁軍對上喧譁訴胤減損冬衣上不得已解胤鹽鐵使時朱全忠李茂貞各有挾天子令諸侯之意胤知謀泄事急遺全忠書稱被密詔令全忠以兵迎車駕冬十月朱全忠引兵發大梁初韓全誨等懼誅謀以兵制上乃與李繼昭繼誨彥弼及神策指揮使李繼筠深相結繼誨獨不肯從他日韓偓因對及之上曰是不虛矣令狐渙欲朕召胤及全誨等于內殿置酒和解之何如對曰如此則彼凶悖益甚獨有顯罪數人速加竄逐餘者許其自新庶幾可息若一無所問彼必知陛下心有所貯益不自安事終未了耳上曰善既而宦官自恃黨羽已成稍不遵敇旨或使監軍守陵皆不行上無如之何朱全忠得崔胤書自河中還大梁發兵上聞之急召韓偓謂曰聞全忠欲來除君側之惡大是盡忠然須令茂貞共為功恐兩帥交爭則事危矣卿語崔胤速飛書兩鎮使合謀又謂偓曰繼誨彥弼輩驕橫益甚對曰兹事失之于初當其立功之時但應以官爵田宅金帛酬之不應聽其出入禁中也且崔胤本留岐兵欲以制敇使也今敇使衛兵相與為一汴兵若來必與鬭于闕下臣竊寒心十月全忠發兵大梁楊行密遣兵攻杭州擒其將顧全武先是錢鏐使顧全武克蘇州擒淮南將秦裴以歸裴守崑山不下全武引水灌之城壞乃降崑山梁縣今屬蘇州府及是楊行密遣李神福等將兵攻杭州全武等列八寨以拒之神福聲言師還所獲降俘走還者皆不追暮遣羸兵先行而伏兵青山在湖州府長興縣南全武追之伏發被擒錢鏐聞之驚泣曰喪我良將神福久攻不拔欲歸恐為鏐所邀乃遣人守衛鏐祖考邱壟又使顧全武通家信鏐遣使謝之神福受其犒賂而還既而行密遣全武歸以易秦裴行密前所獲鏐將成及亦還之十一月韓全誨等劫帝如鳳翔朱全忠取華州韓全誨等聞朱全忠將至令李繼誨李彥弼等勒兵劫上請幸鳳翔上密詔崔胤曰我為宗社大計勢須西行卿等但東行也是日開延英全誨等復侍側議論政事李繼筠遣兵掠內庫寶貨法物全誨遣人密送諸王宫人先之鳳翔全忠至河中表請車駕幸東都京師大駭上遣中使召百官皆辭不至全誨等陳兵殿前言于上曰全忠欲劫天子幸洛陽求傳禪臣等請奉陛下幸鳳翔收兵拒之上不許拔劒登乞巧樓全誨等逼上下樓李彥弼即于御院縱火上不得已與后妃諸王百餘人皆上馬慟哭而出李茂貞出迎上下馬慰接之遂入鳳翔全忠議引兵還張濬説之曰韓建茂貞之黨不取之必為後患乃引兵逼其城建單騎迎謁全忠以建為忠武節度使以兵送之車駕之在華州也商賈輻輳建重征之得錢九百萬緍至是全忠盡取之是時京師無天子行在無宰相崔胤等列狀請朱全忠西迎車駕全忠復書曰進則懼脅君之謗退則懷負國之慚然不敢不勉朱全忠引兵至鳳翔城東而還朱全忠至長安宰相帥百官班迎至鳳翔軍於城東李茂貞登城謂曰天子避災非臣下無禮讒人誤公至此全忠報曰韓全誨劫遷天子今來問罪迎扈還宫岐王若不預謀何煩陳論上屢詔全忠還鎮全忠乃拜表奉辭全忠移兵趣邠州節度使李繼徽請降繼徽為李茂貞養子及是復姓名楊崇本茂貞以詔命徵兵河東李克用遣李嗣昭將五千騎趣晉州與汴兵戰于平陽北破之昭戎節度使馮行襲亦遣使聽命于全忠韓全誨遣中使二十餘人分道徵兵皆為行襲所殺全誨又徵兵于王建建使王崇信等將兵五萬聲言迎駕實襲山南諸州以盧光啓字子忠參知政務崔胤裴樞罷時宰相皆不扈從光啓以兵部侍郎權勾當中書事參知機務胤樞之罷宦官之意也十二月青海節度使徐彥若卒彥若遺表薦劉隱權留後御批歷代通鑑輯覽卷六十四

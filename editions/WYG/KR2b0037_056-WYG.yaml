front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷五十七唐代宗皇帝
  hash: sha256:d411ee3c3fcd1d154b869b0ed9fda203e61a752f5c9f5141d347ea126ea8375f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_056-1a, image: WYG0337/WYG0337-0252a.png}
body:
  text: 大歴四年春正月郭子儀入朝子儀入朝魚朝恩邀之遊章敬寺元載恐其相結密使告子儀曰朝恩謀不利于公子儀不聽将士請束甲以從子儀曰吾國之大臣彼無天子之命安敢害我若受命而來汝曹欲何為乃從家僮數人而往朝恩驚問其故子儀以所聞告且曰恐煩公經營耳朝恩撫膺流涕曰非公長者能無疑乎夏五月以僕固懐恩女嫁回紇初僕固懐恩死上憐其有功置其女宫中養以為女回紇請以為可敦五月冊以為公主遣兵部侍郎李涵送之涵奏祠部郎中董晉為判官至回紇回紇言唐約我為市馬既入而歸我賄不足我于使人乎取之涵懼不敢對晉曰我非無馬而與爾為市為爾賜不既多乎爾之馬嵗至吾數皮而歸資邉吏請致詰也天子念爾有勞故下詔禁侵犯諸戎畏我大國之爾與也莫敢校焉爾之父子寧而畜馬蕃者非我誰使之于是其衆皆環晉拜既又相帥南面序拜皆舉兩手曰不敢有意大國董晉字混成河中虞鄉人數皮歸資言馬之死者亦計皮而與之直也六月郭子儀徙鎮邠州子儀遷邠州其精兵皆自隨餘兵使裨将将之分守河中時朔方軍士乆居河中頗不樂徙往往自邠逃歸行軍司馬嚴郢領留守悉捕得誅其渠帥衆心乃定華嚴郢字叔敖華州隂縣人冬十月杜鴻漸卒鴻漸病甚令僧削髪遺令為塔以葬以裴冕同平章事十二月卒元載以冕老病易制故舉以為相受命之際舞蹈仆地未㡬而卒庚戍五年春三月魚朝恩伏誅朝恩專典禁兵勢傾朝野陵侮宰相毎奏事以必允為期朝廷政事有不預者輙怒曰天下事有不由我者邪上聞之不懌元載乘間奏朝恩專恣不􅁤請除之上令載為方畧朝恩入殿常使射生将周皓将百人自衛又使陕西節度使皇甫温握兵于外以為援載皆以重賂結之徙温為鳯翔節度使温至京師載因與温及皓密謀誅朝恩既定計白上上以寒食宴貴近于禁中載守中書省宴罷朝恩将出上責其異圖皓與左右縊殺之以尸還其家賜錢以葬罷度支轉運常平鹽鐵等使委宰相領之以楊綰為國子祭酒徐浩字季海越州人為吏部侍郎元載既誅魚朝恩上寵任益厚載遂志氣驕溢自謂有文武才畧弄權舞智政以賄成吏部侍郎楊綰典選平允性介直不附載嶺南節度使徐浩貪佞傾南方珍貨以賂載載以綰為國子祭酒引浩代之載有丈人來從載求官但贈河北一書而遣之丈人不悦行至幽州私發書視之無一言惟署名而已丈人不得已試謁判官聞有載書大驚立白節度使遣大校以箱受書館之上舍贈絹千匹其威權動人如此秋七月京畿饑米斗千錢以李泌為江西觀察判官上悉知元載所為以其任政日乆欲全始終因獨見深戒之載猶不悛上由是稍惡之載以李泌有寵于上忌之㑹江西觀察使魏少遊求参佐上謂泌曰元載不容卿朕今匿卿于魏少遊所俟朕决意除載當有信報卿可束装來乃以泌為江西判官且屬少遊使善待之辛亥六年春二月詔李抱玉專備隴坻注見前河西隴右山南副元帥李抱玉上言凡所掌之兵當自訓練今自河隴逹于扶文二州皆唐置文州今階州文縣是扶州故城在文縣徼外綿亘二千餘里撫御至難若吐蕃兩道俱下臣保固汧隴汧水隴山相連故曰汧隴則不救梁岷二州注俱見前進兵扶文則宼逼關輔首尾不贍進退無從願更擇能臣委以山南使臣得專備隴坻詔從之三月河北旱米斗千錢秋八月以李栖筠為御史大夫元載所擬官多非法恐為有司所駁奏凡别敕除六品以下官乞令吏部兵部無得檢勘上雖從之然益厭其所為思得士大夫之不阿附者為腹心漸收載權内出制書以栖筠為御史大夫宰相不知載由是稍屈徐浩妾弟侯莫陳怤為美原尉浩屬京兆尹杜濟虛以知驛奏優又屬吏部侍郎薛邕擬怤長安尉怤参臺李栖筠劾奏其狀上怒浩怤及濟虚邕皆坐貶朝廷稍肅怤音敷羙原唐縣元省故城在今西安府富平縣以韓滉字太冲休之子判度支自兵興以來所在賦斂無度倉庫出入無法國用虚耗滉為人亷謹精于簿領作賦斂出入之法吏不敢欺亦值連嵗豐穰邊境無㓂倉庫蓄積始充壬子七年春正月回紇使者犯朱雀門回紇使者擅出鴻臚寺掠人子女所司禁之毆擊所司以三百騎犯金光朱雀門上遣中使諭之乃止其後屢出殺人上皆不問至明年使者辭歸回紇自乾元以來歳求和市毎一馬易四十縑動至數萬匹而馬皆駑瘠無用朝廷苦之所市多不能盡其數及使者歸上欲悦其意命盡市之載賜遺及馬價共用車千餘乘秋七月盧龍将吏殺其節度使朱希彩冬十月詔以朱泚代之希彩殘虐孔目官李懐瑗因衆怒伺間殺之衆未知所從經畧副使朱泚弟滔潛使百餘人于衆中大言曰節度使非朱副使不可衆皆從之泚遂權知留後遣使言狀詔以泚為節度使自安禄山反幽州兵未嘗為用及泚為節度明年八月遣其弟滔将兵五千詣涇州防秋上大喜勞賜甚厚癸丑八年春正月昭義節度使薛嵩卒嵩子平字坦途年十二将士脇以為帥平偽許之既而讓其叔父㟧夜奉父喪逃歸鄉里制以㟧知留後二月永平節度使令狐彰字伯陽京兆富平人卒初彰為史思明滑亳二州刺史自㧞歸朝肅宗以為滑亳節度使彰承亂離之後治軍勸農府廪充實時藩鎮率皆跋扈獨彰貢獻未嘗闕嵗遣兵三千詣京西防秋自齎糧食道路供餽皆不受所過秋毫無犯及是疾凾遺表稱倉庫畜牧先已封籍軍中将士安堵待命臣男建等令勒歸東都私第尚書劉晏李勉可委大事願速以代臣及卒将士欲立建建誓死不從舉家西歸詔以勉代彰秋九月召郇模入見晉州男子郇模以麻辮髪持竹筐葦席哭于東市人問其故對曰願獻三十字一字為一事若言無所取請以蓆裹尸置筐中棄于野京兆以聞上召見賜新衣館于客省其言團者請罷諸州團練使也監者請罷諸道監軍使也事見元載傳餘二十八字史不傳吐蕃寇涇邠郭子儀遣渾瑊拒却之吐蕃宼涇邠渾瑊将步騎五千戰于宜禄後魏縣明改長武今屬邠州宿将史抗等不用命官軍大敗馬璘亦敗為虜所隔叚秀實發城中兵出陳東原吐蕃稍却璘乃得還郭子儀謂諸将曰敗軍之罪在我不在諸将然朔方兵精聞天下今為虜敗何以雪耻渾瑊曰今日之事惟理瑊罪不則再見任子儀赦其罪使将兵趣朝那注見前虜欲掠汧隴監州刺史李國臣河曲人曰虜乗勝必犯郊㡬我掎其後虜必返顧乃引兵趣秦原即秦亭注見前鳴鼔而西虜聞之至百城亦曰百里城在今平凉府靈臺縣西返渾瑊邀之于隘盡得其掠馬璘亦出精兵襲虜輜重殺數千人虜遂遁去甲寅九年春二月郭子儀入朝子儀言朔方國之北門戰士耗散存者什一而吐蕃兼河隴之地雜羌渾之衆勢彊十倍願更于諸道各發精卒戍四五萬人則可以制勝矣子儀嘗奏除州縣官一人不報僚佐以為言子儀曰兵興以來方鎮跋扈凡有所求朝廷必委曲從之蓋疑之也今子儀所奏朝廷以其不可行而置之是不以武臣相待而親厚也諸君可賀矣又何怪焉聞者皆服夏六月胡僧不空死贈司空賜爵肅國公諡大辨正廣智三藏和尚京師旱秋七月雨京兆尹黎幹戎州人作土龍祈雨自與巫覡更舞彌月不雨上聞之命撤土龍減膳節用七月雨九月盧龍節度使朱泚入朝初朱泚遣弟滔奉表請入朝自将防秋上喜為築第京師以待之泚至蔚州注見前有疾諸将請還泚曰死則輿尸而前至京師宴犒甚盛泚請留闕下以弟滔知留後許之乙邜十年春正月田承嗣反夏四月發諸道兵討之先是田承嗣為安史父子立祠謂之四聖且求為相上諷令毁祠而加同平章事以慰之己復詔以永樂公主帝之女妻承嗣之子華欲以固結其心而承嗣益驕慢至是承嗣誘昭義兵馬使裴志清使作亂志清逐其留後薛㟧帥衆歸承嗣引兵襲取相州上遣使諭止之承嗣不奉詔遂䧟洺衛二州初李寳臣李正已皆為承嗣所輕及承嗣拒詔皆表請討之于是貶承嗣永州注見前刺史命諸道兵進討之時朱滔方恭順與寳臣及河東節度使薛兼訓攻其北正己與淮西節度使李忠臣攻其南承嗣以諸道兵四合懼奉表請束身以朝既而承嗣遣使説正己正己按兵不進初正己遣使至魏州承嗣囚之及是禮而遣之復遣使盡籍境内户口甲兵榖帛之數以與正己曰承嗣老矣溘死無日諸子不肖今為公守耳豈足以辱帥乎正己遂按兵不進于是諸道兵皆不敢進王武俊亦説寳臣釋承嗣寳臣與昭義節度使李承昭擊擒承嗣将盧子期送京師上嘉其功遣中使馬承倩勞之承倩齎詔至寳臣遺之百縑承倩詬罵擲出道中王武俊説寳臣曰今公在軍中新立功豎子尚爾况冦平之後召歸闕下一匹夫耳不如釋承嗣以為己資寳臣遂有玩冦之志承嗣復遣客紿寳臣同取范陽寳臣遂與承嗣通謀選精騎二千夜襲盧龍軍朱滔敗走承嗣知范陽寳臣鄉里心常欲之因刻石云二帝同功勢萬全将田為侣入幽燕密令瘞寳臣境内使望氣者言彼有王氣寳臣掘而得之又令客説之曰公與朱滔共取滄州得之則地歸固非公所有公能捨承嗣之罪請以滄州歸公而從公取范陽以自効寳臣喜謂事合符䜟遂與承嗣通謀寳臣謂滔使者曰聞朱公儀貎如神願得畵像觀之滔與之寳臣置于射堂命諸将共觀之曰真神人也是夜遂襲其軍戒曰取貎如射堂者滔不虞有變戰敗走免承嗣聞之引軍南還使謂寳臣曰河内有警不暇從公石上䜟文吾戯為之耳寳臣慙怒而退困元載王縉以魏州鹽貴請禁鹽入其境以之上不許曰承嗣負朕百姓何罪冬十月辛酉朔日食貴妃獨孤氏卒妃以姝艶進居常專夜及是卒追諡貞懿皇后上悼念不已殯于内殿累年乃葬丙辰十一年春二月赦田承嗣入朝先是田承嗣請入朝李正己亦屢為之請至是承嗣復遣使上表詔赦其罪聴與家屬入朝夏五月汴宋軍亂秋七月詔發諸道兵討平之汴宋都虞侯李靈曜殺兵馬使孟鑒北結田承嗣為援詔以靈曜為濮州刺史不受遂以為汴宋留後靈曜益驕慢悉以其黨為管内八州刺史縣令欲効河北諸鎮詔淮西李忠臣永平李勉河陽三城馬燧討之淮南陳少游淄青李正己皆進兵擊靈曜燧忠臣與少游前軍合與靈曜大戰敗之先是忠臣燧軍于鄭州靈曜逆戰淮西軍潰忠臣将歸燧曰以順討逆何憂不克奈何自棄功名堅壁不動忠臣收散卒軍勢復振燧忠臣與陳少游軍合大戰于汴州靈曜敗入城固守忠臣等圍之承嗣遣田悦将兵救靈曜敗永平淄青兵乗勝進軍汴州城北忠臣遣禆将李重倩本奚人将精騎數百夜入其營縱横貫穿斬數十人而還營中大駭忠臣燧因以大軍乘之皷譟而入悦衆不戰而潰靈曜夜遁永平将杜如江擒之李勉械靈曜送京師斬之冬十二月涇原節度使馬璘卒璘疾亟以行軍司馬叚秀實知節度事秀實嚴兵以備非常璘卒都虞候史廷幹等謀因喪作亂秀實知之表奏入宿衛分徙其黨補以外職不戮一人軍府晏然璘之卒也軍中奔哭者數千人喧咽門屏秀實悉不聴入命押牙馬頔治喪事于内李漢惠接賔客于外妻妾子孫位于庭将佐位于前牙士卒哭于營伍百姓各守其家有離立偶語于衢路輙執而囚之非䕶喪從行者無得逺送致祭拜哭皆有定節送喪近逺皆有定處逹者以軍法從事丁巳十二年春三月詔復討田承嗣既而釋之承嗣竟不入朝又助李靈曜上復命討之承嗣上表謝罪上亦無如之何復其官爵令不必入朝後二年承嗣死以其姪悦為留後誅元載貶王縉為括州刺史載縉俱納賄賂又以政事委羣吏上欲誅之獨與元舅金吾大将軍呉湊濮陽人肅宗章敬皇后弟謀之㑹有告載縉夜醮圖不軌者上命湊收之命吏部尚書劉晏與御史大夫李涵等同鞫之皆伏罪賜自盡劉晏謂李涵曰故事重刑覆奏况大臣乎且法有首從更宜禀進止涵等從之上乃誅載而貶縉載妻子皆伏誅有司籍載家財胡椒至八百石他物稱是夏四月以楊綰常衮同平章事綰性清簡儉素制下之日朝野相賀郭子儀方宴客聞之減坐中聲樂五分之四京兆尹黎幹騶從甚盛即日省之止存十騎中丞崔寛第舎宏侈亟毁撤之初元載以仕進者多樂京師惡其逼已乃薄其俸于是京官不能自給常從外官乞貸至是綰衮乃奏増之悉罷諸州團練守促使諸使非軍事要急無得擅召刺使又定諸州兵有常數其召募給家糧春冬衣者謂之官徤差㸃土人春夏歸農秋冬追集給身糧醤菜者謂之團給定節度使以下至主簿尉俸禄掊多益寡上下有叙法制粗立開元中詔宰相共食實封三百户謂之堂封及載縉為相日賜御饌可食十人遂為故事衮奏停之又欲辭堂封同列不可而止時人譏衮以為朝廷厚禄所以養賢不能當辭位不當辭禄秋七月司徒楊綰卒諡曰文簡上方倚楊綰使釐弊政㑹綰有疾卒上痛悼之甚謂羣臣曰天不欲朕致太平何奪朕楊綰之速也以顔真卿為刑部尚書楊綰常衮薦之也九月以叚秀實為涇原節度使秀實軍令簡約有威惠奉身清儉室無姬妾非公㑹未嘗飲酒聽樂霖雨度支奏河中有瑞鹽先是秋霖河中府池鹽多敗戸部侍郎韓滉奏雨不害鹽仍有瑞鹽上疑其不然遣諫議大夫􅃽鎮義興人往視之京兆尹黎幹奏秋霖損稼滉奏幹言不實上命御史按視還奏所損凡三萬餘頃渭南苻秦縣今屬西安府令劉澡附滉稱縣境不損御史趙計奏與澡同上曰霖雨溥博豈得渭南獨無更命御史朱敖視之損三千餘頃上歎息久之曰縣令字人之官不損猶應言損乃不仁如是乎貶澡南浦蜀漢縣元省故城在今䕫州府萬縣尉計澧州注見前司戸而不問滉鎮還奏瑞鹽如滉言仍上表賀請置神祠上從之賜號寳應靈慶池時人醜之以李納為青州刺史李正己先有淄青齊海登萊沂密徳棣注俱見前十州之地及李靈曜之亂諸道合兵攻之所得之地各為己有又得曹濮徐兖鄆五州因徙治鄆使子納守青州是時田承嗣據魏博相衛洺貝澶七州李寳臣據恒易趙宋深冀滄七州梁崇義據㐮鄧均房復郢六州相與根據蟠結雖奉事朝廷而不用其法令官爵甲兵租賦刑殺皆自専之上寛仁一聼其所為朝廷或完一城増一兵輙有怨言以為猜貳常為之罷役而自于境内築壘繕兵無虚日以是雖在中國名藩臣而實如蠻貊異域焉陸澶州唐置今大名府清豐縣是復州後周置今安府沔陽州是餘注俱見前戊午十三年春正月回紇冦太原二月代州都督張光晟盩厔人擊破之回紇入冦太原押牙李自良兖州泗水人曰回紇精鋭難與爭鋒不如築二壘于歸路以兵戍之虜至堅壁勿與戰彼師老自歸乃出軍乗之二壘扼其前大軍蹙其後無不㨗矣留後鮑防字子慎㐮陽人不從逆戰敗還回紇縱兵大掠代州都督張光晟擊破之于羊武谷亦曰陽武峪在代州崞縣西今有堡乃引去上亦不問回紇入㓂之故待之如初夏六月隴右獻猫䑕同乳隴右節度使朱泚獻猫䑕同乳不相害者以為瑞常衮帥百官賀中書舍人崔佑甫字貽孫沔之子不賀曰物反常為妖猫捕䑕乃其職也今同乳妖也何以賀為宜戒法吏之不察奸邉吏之不禦㓂者以承天意上嘉之祐甫知選事數以公事與常衮爭衮由是惡之冬十二月郭子儀入朝子儀入朝命判官杜黄裳字遵素京兆萬年人主留務李懐光隂謀代子儀矯為詔書欲誅大将温儒雅等黄裳察其詐以詰懐光伏罪于是諸将之難制者黄裳矯子儀之命皆出之于外軍府乃安子儀嘗以副使張曇剛率輕已孔目官呉曜因而搆之奏曇扇動軍衆誅之掌書記高郢力爭子儀不聴奏貶郢既而僚佐多以病求去子儀悔之悉薦于朝曰呉曜誤我遂逐之高郢字公楚衛州人以路嗣恭為兵部尚書上召李泌入見語以元載事曰與卿别八年乃能除此賊不然㡬不見卿對曰陛下知羣臣有不善含容太過故至于此上因言路嗣恭初平嶺南獻琉璃盤徑九寸朕以為至寳及破載家得嗣恭所遺載盤徑尺當議罪之泌曰嗣恭為人小心善事人精勤吏事而不知大體昔為縣令有能名陛下未暇知之而為載所用故為之盡力陛下誠知而用之彼亦為陛下盡力矣且嗣恭新立大功陛下豈得以一琉璃盤罪之邪上意乃解以嗣恭為兵部尚書己未十四年春正月以李泌為澧州刺史常衮言于上曰陛下久欲用李泌昔漢宣帝欲用人為公卿必先試理人請且以為刺史使周知人間利弊俟報政而用之三月淮西将李希烈遼西人逐其節度使李忠臣詔以希烈為留後李忠臣貪殘好色悉以軍政委副使張惠光惠光挾勢暴横軍州苦之都虞候李希烈其族子也為衆所服因衆心怨怒殺惠光而逐忠臣忠臣奔京師以希烈為留後夏五月帝崩太子即位是為德宗上崩遺詔以郭子儀攝冡宰太子即位動遵禮法食馬齒菜名莧也􅅅不設鹽酪閏月貶崔祐甫為河南少尹時議羣臣䘮服常衮以為禮臣為斬衰三年漢文權制猶三十六日元宗以來始服二十七日古者卿大夫從君而服羣臣當從皇帝二十七日而除其天下吏人三日釋服自遵遺詔崔祐甫以為遺詔無朝臣庻人之别皆應三日釋服相與力爭聲色陵厲衮不能堪乃奏祐甫率情變禮貶之貶常衮為潮州刺史以崔祐甫同平章事初肅宗之世天下務殷宰相常有數人更直决事或休沐歸第詔直事者代置其名而奏之自是踵為故事時郭子儀朱泚雖以軍功為宰相皆不預朝政衮獨居政事堂代二人署名奏貶崔祐甫既而二人表其非罪上問卿曏言可貶何也二人對初不知上以衮為欺罔貶為潮州刺史而以祐甫代之聞者震悚時上居諒隂委政祐甫所言皆聴羣臣䘮服竟用衮議初至徳以後天下用兵官爵冗濫元王秉政賄賂公行及衮為相思革其弊四方奏請一切不與而無所甄别賢愚同滯祐甫欲收時望作相未二百日除害八百人前後相矯終不得其適上嘗謂祐甫曰人或謗卿所用多涉親故何也對曰臣為陛下選擇之百官敢不詳慎茍平生未之識何以諳其才行而用上以為然詔罷四方貢獻又罷梨園樂工留者悉隸太常尊郭子儀為尚父加太尉兼中書令子儀以司徒中書令領河中尹靈州大都督闗内河東副元帥性寛大政令頗不肅代宗欲分其權而難之至是詔子儀為尚父加太尉中書令所領副元帥諸使悉罷之以其禆将李懐光為河中尹常謙光為靈州大都督渾瑊為單于大都䕶分領其任上以山陵近禁屠宰子儀之隸人犯禁金吾将軍諝奏之或謂曰君獨不為郭公地乎諝曰此乃所以為之地也郭公勲高望重上新即位以為羣臣附之者衆吾故發其小過以明郭公之不足畏上簿天子下安大臣不亦可乎詔天下毋得奏祥瑞縱馴象出宫女澤州上慶雲圖上曰朕以時和年豐為嘉祥以進賢顯忠為良瑞如慶雲靈芝珍禽竒獸怪草異木何益于人布告天下自今有此無上獻先是外國累獻馴象上曰象費豢養而違物性将安用之命縱于荆山之陽及豹貀女滑反似貍蒼黒無前足鬭雞獵犬之類悉縱之又出宫女數百人于是中外皆悦淄青軍士至投兵相顧曰明主出矣吾屬猶反乎以李希烈為淮西節度使代宗優寵宦官奉使四方者還問其所得頗少則以為輕我命由是中使所至公求賂遺重載而歸上素知其弊遣中使邵光超賜希烈旌節希烈贈之僕馬及縑七百匹上怒杖光超而流之于是中使之未歸者皆潛棄所得于山谷雖與之莫敢受以馬燧為河東節度使河東騎士單弱燧悉召牧馬厮役得數千人敎之數月皆為精騎造甲必為長短三等稱其所衣以便進趣又造戰車行則載甲兵止則為營陳或塞險以遏奔衝器械無不精利居一年得選兵三萬辟張建封字本立鄧州南陽人為判官署李自良為代州刺史委任之以劉晏判度支先是劉晏韓滉分掌天下財賦晏掌河南山南江淮嶺南滉掌關内河東劒南上素聞滉掊克故罷其利權而以晏兼之初第五𤦺始𣙜鹽以佐軍用及劉晏代之法益精宻初歲入錢六十萬緡末年所入逾十倍而人不厭若計一嵗征賦所人總一千二百萬緡而鹽利居其大半以鹽為漕傭自江淮至渭橋率萬斛傭七千緡自淮以北列置廵院擇能吏主之不煩州縣而集事六月詔寃滯聽詣三司使及撾登聞鼔胡三省注唐時登聞鼔在西朝堂之前詔天下寃滯聽詣三司使以中丞舎人給事中各一人日于朝堂受詞推决尚未盡者聴撾登聞鼔自今無得復奏置寺觀及請度僧尼于是撾鼔者甚衆裴諝上疏曰訟者所爭皆細故若天子一一親之則安用吏理乎上乃悉歸之有司詔六品以上清望官日令二人待制以白志貞太原人為神䇿都知兵馬使宦官王駕鶴典禁兵十餘年權行中外詔以為東都園苑使以白志貞代之志貞本名琇珪至是始賜名恐其生變崔祐甫召駕鶴與語留連久之志貞已視事矣遣使慰勞青淄将士李正己畏上威名表獻錢三十萬緡上欲受之恐其欺郤之則無辭崔祐甫請遣使慰勞淄青将士因以賜之使将士人人戴上恩諸道知朝廷不重貨財上悦從之正己慚服天下以為太平之治庶幾可望焉明年四月上生日四方貢獻皆不受李正己田悦各獻縑三萬匹上悉歸之度支以代租賦秋七月戊辰朔日食罷客省初代宗之世事多留滯四夷使者及四方奏計或連歲不遣乃于右銀臺門置客省以處之及上書言事孟浪者失職未叙者亦置其中動經十歲常有數百人度支廪給其費甚廣上悉命疏理拘者出之事竟者遣之當敘者任之歲省穀萬九千二百斛毁元載馬璘劉忠翼之第天寳中貴戚第舎雖極奢麗而垣屋高下猶存制度及安史亂後法度墮弛将相宦官競治第舎各窮其力而後止時人謂之木妖上素疾之故毁其尤者馬璘家富有治第京師甲于勲貴及是命獻其園隸官司謂之奉誡園璘子孫無行資亦尋盡劉忠翼本宦官恃寵貪縱與黎幹相交結上即位後或言二人勸代宗立獨孤貴妃子韓王逈皆賜死減常貢錦千匹服玩數千事罷𣙜酒以張渉河中人為右散騎常侍上之在東宫也國子博士張渉為侍讀即位之夕召入禁中事皆咨之明日以為翰林學士親重無比至是以為散騎常侍學士如故八月以楊炎喬琳太原人同平章事上方勵精求治不次用人卜相于崔祐甫祐甫薦炎器業上亦素聞其名故自道州司馬用之琳粗率喜詼諧無他長與張渉善涉稱其才可大用上信而用之聞者無不駭愕既而祐甫病不視事是冬喬琳以衰老耳聾罷政事上由是疎張涉涉尋坐贓放歸田里上初即位疎斥宦官親任朝士而涉首以贓敗左丞薛邕亦以為宣歙觀察使時盗隠官物坐貶宦官武将皆曰南牙文臣贓至巨萬而謂我曹濁亂天下豈非欺㒺邪于是上心始疑不知所倚仗矣遣太常少卿韋倫使吐蕃代宗之世吐蕃數遣使求和而冦盜不息悉留其使者俘獲其人皆配江嶺上欲以徳懷之以倫為使悉集其俘五百人各賜襲衣而遣之俘至吐蕃稱新天子出宫人放禽獸威徳洽于中國吐蕃大悦除道迎韋倫發使入貢且致賻贈上復使韋倫報之沈既濟蘓州吴人上選舉議自兵興以來選法益濫及是試協律郎沈既濟上疏議之議曰選舉之法三科曰徳也才也勞也然安行徐言非徳也麗藻芳翰非才也累資積考非勞也今乃以此求天下之士固未盡矣臣謂五品以上及羣司長官宜令宰臣進叙吏部兵部得恭議焉其六品以下或僚佐之屬許州府辟用其或選用非公則吏部兵部察而舉之加以譴黜則衆才咸得而官無不治矣今擇才于吏部而試職于州郡若才職不稱責于刺史則曰命官出于吏曹不敢廢也責于侍郎則曰量書判資考而授之不保其往也責于令史則曰按由歴出入而行之不知其他也若牧守自用則罪将焉逃必州郡之濫獨換一刺史則革矣如吏部之濫雖更其侍郎無益也朝廷雖嘉其言而不能用以曹王臯字子蘭明之元孫為衡州刺史初衡州刺史曹王臯有治行湖南觀察使辛京杲疾之䧟以法貶潮州刺史楊炎知其直及入相復擢為衡州始臯之遭誣在治念太妃老将驚而戚出則因服就辨入則擁笏垂魚即貶于潮以遷入賀及是然後跪謝告實冬十月吐蕃南詔入㓂遣神策都将李晟等擊破之吐蕃與南詔時南詔王閻羅死孫異牟尋立合兵三道入冦一出茂州一出扶文一出黎雅會西川節度使崔寧方入朝上趣之歸鎮尋用楊炎言留寧京師寜在蜀十餘年恃其地險兵彊恣為滛侈朝廷患之而不能易至是楊炎言于上曰蜀地富饒寧據有之貢賦不入與無蜀同若其有功則義不可奪是蜀地敗固失之勝亦不得也不若留寧發范陽戍兵雜禁兵往擊何憂不克因得納親兵于其腹中蜀将必不敢動然後更授他帥使千里沃壤復為國有是因小害而受大利也上從之使神䇿都将李晟将兵四千又發邠隴范陽兵五千使将軍曲環陜州安邑人将之與東川山南兵合擊吐蕃南詔破之遂克維茂注俱見前二州晟追擊于大度河注見前外又破之凡殺八九萬人已而以崔寧為朔方節度使治坊州葬元陵在西安府富平縣西北檀山肅宗代宗皆喜隂陽鬼神事無大小必謀之卜祝故王璵黎幹以左道得進上雅不之信山陵但取七月之期事集而發不復擇日史臣曰代宗之時餘孽猶在平亂守成蓋亦中材之主也十二月立宣王誦即順宗為皇太子詔財賦皆歸左藏舊制天下金帛皆貯于左藏太府四時上其數比部覆其出入及第五𤦺為度支使奏盡貯于大盈内庫使宦官掌之天子亦以取給為便由是以天下公賦為人君私藏有司不復得窺其多少殆二十年宦官蠶食其中盤結根據牢不可動楊炎頓首于上前曰財賦者國之大本生民之命重輕安危靡不由之是以前世皆使重臣掌其事猶或耗亂不集今獨使中人出入盈虚大臣皆不得知政之蠧弊莫甚于此請出之以歸有司度宫中嵗用量数奉入如此然後可以為政上即日下詔從之炎以片言移人主意議者稱之丙寅晦日食遣關播字務元汲人招撫湖南盜賊湖南賊帥王國良阻山為盜國良本湖南牙将觀察使辛京杲以其家富使戍武崗而以死罪加之國良懼據縣聚衆優掠州縣討之不克武岡晉縣今為州屬湖南實慶府上遣都官員外郎關播招撫之播辭行上問以為政之要對曰為政之本必求有道賢人與之為理上曰朕比已下詔求賢又遣使搜訪矣對曰此唯得文詞干進之士耳安有有道賢人肯隨牒舉選乎上悦已而曹王臯為湖南觀察使遺國良書令降國良疑未决臯乃從一騎越五百里扺國良壁大呼曰我曹王也來受降國良大驚趨出迎拜臯執其手約為兄弟盡焚攻守之具散其衆使還農詔赦之賜國良名惟新徳宗皇帝庚申建中元年春正月始作兩税法唐初賦斂之法曰租庸調詳具前元宗末版籍浸壊及至徳兵起所在賦斂迫趣取辦無復常準富民丁多率為官為僧以避課役下戸旬輸月送不勝困弊率皆逃徙其土著者百無四五至是楊炎建議作兩税法先計州縣毎嵗所用及上供之數而賦于人量入以制出戸無主客主土著也客不常居者以見居為簿人無丁中十六為中二十二為丁以貧富為差為行啇者在所州縣税三十之一居人之税秋夏兩徴之夏輸無過六月秋輸無過十一月其租庸調雜徭悉省其總于度支上用其言仍詔兩税外輙率一錢者以枉法論馬氏端臨曰随田之在民者税之而不復問其多寡始于商鞅随民之有田者税之而不復視其下中始于楊炎後之為國者莫不一遵其法茍或變之則必至于煩擾無稽而官民交病蓋以古今異宜故也罷轉運租庸鹽鐵等使貶劉晏為忠州刺史初劉晏為吏部尚書楊災為侍郎不相悦元載之死晏有力焉及上即位晏久典利權衆頗疾之楊炎因欲為載報仇時風言晏嘗密表勸代宗立獨孤妃為事后炎因言晏與黎幹同謀崔祐甫言兹昩况已更大赦不當復究炎乃建言尚書省國政之本比置諸使分奪其權今宜復舊上從之詔天下錢榖皆歸全部倉部罷晏轉運等使尋貶忠州刺史既而省職久廢莫能振舉天下錢榖無所統領乃復以韓洄為户部侍郎判度支杜佑權江淮水陸轉運使皆如舊制韓洄字㓜深滉之弟杜佑字君卿京兆萬年人二月命黜陟使分廵天下貞觀八年設黜陟使後罷至是復置使凡十一人分廵各道是時魏博節度使田悦事朝廷猶恭順河北黜陟使洪經綸不曉時務聞悦軍七萬人符下罷其四萬令還農悦陽順命如符罷之既而集應罷者謂曰汝曹乆在軍中有父母妻子今一旦為黜陟使所罷将何資以自衣食乎衆大哭悦乃出家財以賜之使各還部伍由是軍士皆徳悦而怨朝廷以叚秀實為司農卿初大歴末元載請城原州事未行而載誅載嘗為西州刺史知河西隴右山川形勢言于代宗曰四鎮北庭既治涇州無險要可守隴山高峻南連秦嶺北抵大河今國家西境盡潘原而吐蕃戍摧沙堡原州居其中間當隴山之口其西皆監牧故地草肥水美平凉在其東獨耕一縣可給軍實故壘尚存吐蕃棄而不居毎夏蓄牧靑海去塞甚逺若乗間築之二旬可畢移京西兵戍原州移郭子儀軍戍涇州為之根本分兵守石門木峽漸開隴右進逹安西據吐蕃腹心則朝廷可髙枕矣并圖地形獻之㑹載得罪事遂寢四西州唐置即漢車師前王庭注詳前四鎮即西域鎮時行營兵皆寄治涇州隴山秦嶺注俱見前潘原唐縣元省故城在今平凉府平凉縣摧沙堡在今平凉府鎮原縣西北石門木峽二關名在今平凉府固原州西南及是楊炎秉政欲行載遺䇿先牒涇原節度使段秀實令為之具秀實報曰安邉卻敵宜以緩計且農事方作不可遽興功炎怒徴秀實為司農卿使李懷光兼涇原炎又開豐州陵陽渠發畿縣民役作閭里騷然京兆尹嚴郢上疏言之不報已而渠卒不就豐州唐置治九原故城在今鄂爾多斯右翼後旗陵陽渠在故九原縣以朱泚為涇原節度使夏四月行軍别駕劉文喜據涇州作亂伏誅楊炎将城原州命李懐光居前督作朱泚崔寧各将萬人翼其後詔下涇軍怒曰吾屬始居邠州甫營耕桑有地著之安徙屯涇州披荆榛立軍府坐席未煖又投之塞外吾屬何罪而至此乎又以懷光嚴刻皆懼别駕劉文喜因衆心不安據涇州不受詔復求段秀實或朱泚為帥詔以泚代懷光文喜又不受詔欲自邀旌節四月遂據涇州以叛詔泚及懷光討之泚等圍城久不㧞朝臣上書請赦文喜上曰微孽不除何以令天下乃減御膳以給軍城中将士當受春服者賜予如故已而禆将劉海賔斬文喜獻其首而原州竟不果城自上即位李正己内不自安遣参佐入朝奏事懼㑹涇州㨗奏至上使觀文喜之首而歸正己益六月築奉天城術士桑道茂上言陛下不出數年暫有離宫之厄臣望奉天有天子氣宜髙大其城以備非常上命京兆發丁數千雜六軍之士築奉天城回紇頓莫賀登里之從父兄殺登里可汗而自立遣使冊命之初回紇風土樸厚君臣之等不甚異故衆志專一勁健無敵及有功于唐唐賜遺甚厚登里可汗始自尊大築宫殿以居婦人有粉黛文繡之飾中國為之虚耗而本俗亦壞及代宗崩九姓注見前胡附回紇者説登里以中國富饒今乗䘮伐之可有大利登里從之其相頓莫賀諫不聼乗人心之不欲南冦舉兵擊殺之而自立遣人入見請冊命詔京兆少尹源休相州臨漳人冊頓莫賀為武義成功可汗遥尊帝母沈氏為皇太后上母沈氏吳興人安史之亂䧟賊不知所在代宗即位遣使求之不獲及是具冊遥上尊號上奉冊欷歔左右皆泣于是中書舍人髙彦請分遣諸沈訪求太后詔以睦王述帝之弟為奉迎使諸沈四人為判官分道求之初髙力士有養女嫠居東京頗能言宫中事或意其為沈太后詣使者言狀上喜使宦官宫人驗視年狀頗同髙氏辭實非太后驗視者疑之彊迎入上陽宫上發宫女齎御物往供奉髙氏心動乃自言是驗視者走焉入奏上大喜羣臣入賀詔有司草儀奉迎髙氏弟承悦恐獲罪遽自言本末上命力士􅀢孫樊景超往覆視景超謂曰姑何自置身于俎上因抗聲曰有詔太后詐偽髙氏言曰吾為人所彊非已出也以牛車載還其家上恐後人不敢言皆不之罪曰吾寧受百欺庻幾得之然終上之世無開焉殺忠州刺史劉晏荆南節度使廋準常州人希楊炎指奏晏與朱泚書求營救辭多怨望炎證成之上密遣中使先縊殺晏然後下詔賜自盡天下寃之初安史之亂天下户口什亡八九所在宿重兵其費不貲皆倚辦于晏晏有精力多機智變通有無曲盡其妙常以厚直募善走者置逓相望覘報四方物價不數日皆達食貨輕重之權悉制在掌握國家獲利而天下無甚貴甚賤之憂晏以為辦集衆務在于得人故必擇通敏精懌㢘勤之士而用之常言士䧟賊賄則淪棄于時名重于利故士多清修吏雖潔廉終無顯榮利重于名故吏多貪汚其勾檢簿書出約錢穀事雖至細必委之士類吏惟書符牒不得輕出一言其屬官雖居數千里外奉教令如在目前無敢欺紿權貴屬以親故晏亦應之俸給多少遷次緩速皆如其志然無得親職事晏又以為户口滋多賦税自廣故其理財常以養民為先諸道各置知院官每旬月具雨雪豐歉之狀以告豐則貴糴歉則賤糶或以榖易雜貨供官用而于豐處賣之知院官始見不稔之端先申至某月須如干蠲免某月須如干救助及期晏不俟州縣申請即奏行之不待其困弊流殍然後賑之也由是户口蕃息始為轉運使時天下見户不過二百萬其季年乃三百餘萬非晏所統亦不増也其初財賦嵗入不過四百萬緡季年乃千餘萬緡晏専用𣙜鹽法充軍國之用時自許鄭之西皆食河東池鹽度支主之汴蔡之東皆食海鹽晏主之晏以為官多則民擾故但于出鹽之鄉置官收鹽轉鬻于商人任其所之其去鹽鄉逺者轉官鹽于彼貯之或商絶鹽貴則滅價鬻之謂之常平鹽官獲其利而民不乏鹽其始江淮鹽利不過四十萬緡季年乃六百餘萬緡由是國用充足而民不用弊先是運關東榖入長安者以河流湍悍率一斛得八斗至者則為成勞受優賞晏以為江汴河渭水力不同各随便宜造運船敎漕卒江船逹揚州汴船逹河隂河船逹渭口渭口逹太倉其間縁水置倉轉相受給自是每嵗轉榖或至百餘萬斛無斗升沉覆者船十艘為一綱使軍将領之十運無失授優勞官于揚子置埸造船艘給千緡或言用不及半請損之晏曰不然論大計者不可惜小費凡事必為永久之慮今始置船埸執事者多當先使之私用無窘則官物堅完矣若遽與之屑屑校計安能久行乎異日必有减之者減半以下猶可也過此則不能運矣後有司果減其半及咸通中有司計而給之無復羡餘船益脆薄漕運遂廢晏為人勤力事無聞劇必于一日中決之後來言財用者皆莫能及秋八月振武留後張光晟殺回紇使者九百餘人代宗之世九姓胡常冐回紇之名雜居京師殖貨縱暴上即位命回紇使者董突盡帥其徒歸國輜重甚盛至振武留數月求資給踐禾稼人甚苦之留後張光晟欲殺回紇未發㑹九姓胡怒董突獻策光晟請殺之光晟奏于上上不許光晟乃使副将過其館門故不為禮董突執而鞭之光晟勒兵掩擊并羣胡盡殺之獨留一胡使歸國曰回紇謀襲據振武故先事誅之回紇請復讐上為之貶光晟為睦王傅後上遣源休送董突等䘮還其國回紇相頡子思迦立休等于帳前雪中欲殺者數四留五十日可汗遣人謂之曰國人皆欲殺汝以償怨我意不然汝國已殺董突等我又殺汝如以血洗血汚益甚耳今吾以水洗血不亦善乎竟不得見可汗而還冬十一月詔日引朝集使二人訪逺人疾苦始定公主見舅姑禮先是公主下嫁者舅姑拜之婦不答及是上命禮官定公主拜見舅姑之儀舅姑坐受于中堂諸父兄姊立受于東序如家人禮有縣主将嫁㑹上之從父妹卒命罷之有司奏供張已備上曰爾愛其費我愛其禮卒罷之至徳以來國家多事公主郡縣主多不以時嫁有華髪者上悉嫁之所齎之物必經心目是歲天下兵民之數税户三百八萬五千七十六籍兵七十六萬八千餘人税錢三千八十九萬八千餘緡穀二百一十五萬七千餘斛辛酉二年春正月成徳節度使李寳臣卒子惟岳自稱留後至徳後藩鎮叛服不常今依唐書其入叛臣逆臣傳卒及拒命而未歸誠者卒皆書死餘依綱目原文仍書李寳臣卒孔目官胡震家僮王他奴勸其子惟岳匿䘮詐為寳臣表請繼襲不許乃發䘮自稱留後使将佐共奏求旌節又不許初寳臣與李正己田承嗣梁崇義相結期以土地傳子孫故承嗣之死寳臣力為田悦請繼襲至是悦亦屢為惟岳請上卒不許或曰不與必為亂上曰賊本無資以為亂皆藉我土地假我位號以聚其衆耳曏日因其所欲而命之多矣而亂日益滋是爵命不足以已亂而適足以長亂也竟不許田悦乃與正己各遣使詣惟岳潛謀勒兵拒命魏博節度副使田庭玠謂悦曰爾藉伯父遺業但謹事朝廷坐享富貴奈何無故為叛臣兵興以來逆亂者誰能保其家乎必欲行爾之志可先殺我無使我見田氏之族滅也因稱病卧家悦往謝之閉門不納竟以憂卒成徳判官邵真泣諫惟岳曰先相公受國厚恩大夫遽欲負之此甚不可若執青魏使者送京師而討之則節鉞庶可得矣惟岳然之使作奏胡震與将吏不可惟岳又從之後竟殺真定州刺史谷從政惟岳舅也切諫不納乃稱疾杜門飲藥而卒且死曰吾不憚死哀張氏今族滅矣田庭玠承嗣從父子哀張氏李寳臣本姓張氏故云以楊炎盧把字子良奕之子同平章事把貎醜色如藍有口辨上悦之郭子儀毎見賔客姬妾不離側杞嘗往問疾子儀悉屏侍妾或問其故子儀曰杞貌陋而心險婦人見之必笑他日杞得志吾族無類矣楊炎既殺劉晏朝野側目李正己累表請晏罪炎懼遣心腹分詣諸道宻諭以晏昔嘗請立獨孤后上自殺之上聞而惡之由是有誅炎之志擢把為相不專任炎矣炎素輕把無學多託疾不與㑹食把亦恨之把隂狡欲起勢立威小不附者必欲寘之死地引裴延齡河東人為集賢直學士親任之發京西兵戍闗東發京西防秋兵萬二千戍闗東上御望春樓宴勞之神䇿将士獨不飲上使詰之其将楊惠元平州人對曰臣等發奉天軍帥張巨濟戒之曰此行大建功名凱旋之日相與為歡茍未㨗勿飲酒故不敢奉詔及行有司縁道設酒食獨惠元所部缾罌不發上深歎美賜書勞之夏五月増商税為什一以軍興故也田悦舉兵冦邢洺先是李正己發兵萬人屯曹州田悦亦完聚與梁崇義李惟岳相應河南士民騷然驚駭詔以永平節度使李勉為都統備之至是悦與正己惟岳定計連兵拒命悦欲阻山為境曰邢磁如兩眼在吾腹中不可不取乃遣兵馬使康愔将兵八千人圍邢州自将兵數萬圍臨洺隋縣今為鎮在廣平府永年縣西有關邢州刺史李共臨洺将張伾堅壁拒守悦召承嗣舊将邢曹俊問計曹俊曰兵法十圍五攻尚書以逆犯順勢更不侔今頓兵堅城之下糧竭卒盡自亡之道也不若置萬兵于崞口以遏西師則河北二十四州皆為尚書有矣悦不能用崞口注見前六月梁崇義拒命詔淮寧大歴末改淮西軍為淮寧節度使李希烈督諸道兵討之先是詔加梁崇義同平章事崇義雖與李正己等連結而兵勢寡弱禮數最恭上欲以恩信安之詔加同平章事賜鐡券遣御史張著賫手詔徵之及是著至襄陽崇義懼陳兵而見不受詔上命李希烈督諸道兵討之楊炎諫曰希烈狠戾無親無功猶屈彊不法使平崇義何以制之上不聴荆南牙将呉少誠幽州潞人以取崇義之䇿干希烈希烈以為前鋒以張萬福魏州元城人為濠州隋置今江南鳳陽府是刺史時内自關中西暨蜀漢南盡江淮閩越北至太原所在出兵李正己遣兵扼徐州甬橋一名符離橋亦名永濟橋在鳯陽府宿州北跨汴水渦口渦水入淮之口在鳯陽府懷逺縣東北渦水注見前梁崇義阻兵襄陽運路皆絶人心震恐江淮進奉船千餘艘泊渦口不敢進上以張萬福為濠州刺史萬福既至渦口立馬岸上發進奉船淄青将士停岸睥聣不敢動尚父太尉中書令汾陽王郭子儀卒諡曰忠武子儀為上将擁彊兵程元振魚朝恩讒謗百端詔書一紙徴之無不即日就道由是讒謗不行嘗遣使至田承嗣所承嗣西望拜之曰此膝不屈于人若干年矣李靈曜據汴州公私物過汴者皆留之惟子儀物不敢近遣兵衛送出境校中書令考凡二十四家人三千人八子七壻皆為顯官諸孫數十人每問安不能盡辨頷之而已天下以其身為安危者殆三十年功蓋天下而主不疑位極人臣而衆不疾窮奢極欲而人不非之年八十五而終其将佐為名臣者甚衆秋七月北庭安西遣使詣闕詔賜李元忠本姓曹名令忠至是賜姓名爵寜塞郡王郭昕子儀弟子武威郡王贈袁光庭工部尚書北庭安西自吐蕃䧟河隴隔絶不通伊西北庭節度使李元忠四鎮留後郭昕帥将士閉境拒守數遣使奉表皆不逹聲問絶者十餘年至是遣使間道自回紇中來上嘉之皆賜爵郡王光庭天寳末為伊州注見前刺史吐蕃攻之累年不下糧竭兵盡自焚死昕使至朝廷始知之故贈官楊炎罷以張鎰字季權崑山人同平章事李希烈以久雨未進軍上怪之盧把密言于上曰希烈遷延以楊炎故也陛下何愛炎一日之名而墮大功不若暫免炎相以悦之事平復用無傷也上以為然乃罷炎詔馬燧李抱真李晟討田悦戰于臨洺大破之田悦攻臨洺累月不㧞城中食且盡張伾飾其愛女使出拜将士曰諸軍守戰甚苦伾家無他物請鬻此女為将士一日之費衆皆哭曰願盡死力不敢言賞李抱真告急于朝詔馬燧及神䇿兵馬使李晟将兵討悦又詔朱滔討惟岳燧等軍未出險先遣使持書諭悦為好語悦謂燧畏之不設備燧等進軍至臨洺悦悉衆力戰悦兵大敗斬首萬餘級悦夜遁邢州圍亦解李正己死子納自領軍務與李惟岳遣兵救田悦正己既死子納擅領軍務田悦求救于納及惟岳納及惟岳皆遣兵救之悦收合散卒得二萬餘人軍于洹水注見前淄青軍其東成徳軍其西首尾相應馬燧帥諸軍進屯鄴詔河陽節度使李芃字茂初趙州人将兵會之李納始奏請襲位上不許八月李希烈與梁崇義戰大破之崇義死傳首京師九月以張孝忠為成徳軍節度使初李寳臣奏以張孝忠為易州注見前刺史孝忠歸朝後以兵屬寳臣寳臣奏為易州刺史寳臣晩節多忌刻連殺大将召孝忠孝忠曰諸将何罪連頸受戮孝忠懼死不敢徃亦不敢叛正如公不入朝意耳遂得免至是朱滔将討李惟岳慮孝忠為己患遣判官蔡雄説孝忠曰惟岳乳臭兒敢拒朝命今田悦已破襄陽已平河南諸軍朝夕北向恒魏之亡可佇立而須也使君誠能首舉易州以歸朝廷此轉禍為福之䇿也孝忠然之遣使奉表詣闕上悦以孝忠為成徳節度使孝忠徳滔深相結加李希烈同平章事以李承趙州髙邑人為山南東道節度使初希烈請討梁崇義上亟稱其忠黜陟使李承自淮西還言于上曰希烈必立㣲功但恐立功之後更煩朝廷用兵耳上不以為然希烈既得襄陽遂據之上乃思承言以為山南東道節度使欲以禁兵送之承請單騎赴鎮至襄陽希烈寘之外館廹脇萬方承不屈希烈乃大掠而去承治期年軍府稍完冬十月殺左僕射楊炎初蕭嵩家廟臨曲江亦曰曲江池在西安府咸寜縣東南寰宇記池為漢武帝所造其水曲折有似廣陵之江故名長安志唐秀士每年登科賜宴于此元宗以娯遊之地非神靈所宅命徙之楊炎為相立廟復直其地盧把因言嵩廟地有王氣故元宗徙之炎有異志故取以建廟遂貶崖州司馬遣中使䕶送縊殺之祫于太廟先是太祖既正東向之位獻懿二祖皆藏西夾室不饗至是復奉獻祖東向而饗之其後鴻臚卿王權請遷二祖毎禘祫正大祖東向之位從之劉洽滑州匡城人後賜名元佐唐朝臣等大破青魏兵于徐州先是徐州刺史李洧以州降洧正己從父兄也舉州歸國遣廵官崔程奉表詣闕乞領徐海沂觀察使程先白張鎰盧祀怒不從其請以洧為招諭使于是李納遣其将王温㑹魏博兵共攻徐州洧遣牙官王智興字匡諫温人詣闕告急智興善走不五日而至詔朔方大将唐朝臣将兵五千人與宣武二年改汴宋軍名宣武節度使劉洽神䇿兵馬使曲環滑州刺史李澄遼東襄平人共救之時朔方軍資装不至旗服弊惡宣武人嗤之曰乞子能破賊乎朝臣以其言激怒士卒且曰都統有令先破賊者營中物悉與之士皆爭奮青魏兵大潰洽等乗之斬首八千級溺死過半朔方軍士盡得其輜重旗服鮮華乃謂宣武人曰乞子之功孰與宋多乗勝逐北至徐州城下青魏軍解圍走江淮漕運始通已而劉洽攻李納于濮州克其外城納于城上涕泣求自新李勉亦遣人説之納遣判官房説入見㑹中使宋鳯朝稱納勢窮䠞不可捨上乃囚説等納遂復與田悦等合朝廷以納勢未衰始以李洧兼徐海沂觀察使而海沂已為納所據洧竟無所得壬戌三年春正月馬燧等大破田悦等于洹水博洺州降馬燧等屯于漳濵田悦築月城以守長橋在漳水上燧以鐵鎖連車數百乗實以土囊塞其下流涉淺而渡進屯倉口即黎陽倉口與悦夾洹水而軍乃為三橋逾洹水曰往挑戰悦不出燧令諸軍夜半起食濳師趨魏州令之曰賊至則止為陳留百騎擊鼔鳴角于營中畢發而止伺悦軍畢渡則焚其橋軍行十里所悦聞之帥淄青成徳歩騎四萬踰橋掩其後乘風縱火鼔譟而進燧先除其前草莽百步為戰塲結陣以待之悦軍至火止氣衰燧縱兵擊之悦兵大敗追奔至三橋橋已焚赴水溺死不可勝計斬首二萬級悦收餘兵走魏州于是李再春以博州降田昂悦從兄以洺州降悦士卒不滿數千乃持佩刀立府門召軍民流涕告之欲自殺将士爭前抱持之悦乃與諸将㫁髮為誓悉出府庫及歛富家得百餘萬以賞士卒召邢曹俊使整部伍繕守備軍勢復振時李納為河南軍所逼徵兵于魏悦遣符璘将三百騎送之璘父令竒謂璘曰吾老矣歴觀安史軰叛亂者今皆安在田氏其能久乎汝因此棄逆從順是汝揚父名于後世也齧臂而别璘與其副李瑶遂降于馬燧悦收族其家令奇嫚罵而死悦之奔還魏州也夜至南郭大将李長春閉關不納以俟官軍久天且明長春乃開門悦入殺長春嬰城拒守馬燧與李抱真不協領兵匃餘始至城下攻之不克符令竒臨沂人璘字元毫李瑶長春之子朱滔張孝忠與李惟岳戰大敗之趙州降成徳兵馬使王武俊殺惟岳傳首京師朱滔張孝忠攻㧞東鹿本鹿城縣唐更名今屬保定府李惟岳發兵圍之滔孝忠與戰城下惟岳大敗燒營而遁先是王武俊為左右所搆惟岳疑之束鹿之戰使為前鋒武俊自念今破朱滔則惟岳軍勢大振歸必殺已故戰不甚力而敗惟岳将康日知靈州人以趙州歸國惟岳益疑武俊或曰武俊勇冠三軍今危難之際復加猜阻欲使誰郤敵乎惟岳以為然乃使歩軍衛常寧與武俊擊趙州又使武俊子士真将兵宿府中武俊既出謂衛常寧曰今幸出虎口當北歸張尚書常寧曰大夫暗弱終為朱滔所滅且天子有詔誅之中丞為衆所服倒戈以取之轉禍為福如反掌耳武俊以為然遂引兵還襲惟岳士真納之武俊令曰大夫叛逆将士歸順敢拒者族衆莫敢動遂執惟岳殺之傳首京師自李寳臣據成徳凡二世十九年而滅復𣙜天下酒惟西京不𣙜二月以張孝忠為易定滄州節度使尋名其軍曰義武王武俊為恒冀團練使康日知為深趙團練使以徳棣𨽻幽州時河北畧定惟魏州未下李納勢日蹙朝廷謂天下不日可平以孝忠為易定滄州節度使武俊日知為恒冀深趙團練使以徳棣二州𨽻朱滔令還鎮滔固請深州不許由是怨望留屯深州武俊自以不得為節度使又失定趙不悦復有詔令武俊以糧三千石給朱滔馬五百匹給馬燧武俊以為魏博既下朝廷必取恒冀故分其糧馬以弱之疑未肯奉詔田悦聞之遣判官王侑説朱滔侑曰今上志欲掃清河朔不使藩鎮承襲魏亡則燕趙為之次矣若司徒矜魏博而救之非特得存亡繼絶之義亦子孫萬世之利也滔大喜既遣侑歸報又遣王郅説王武俊郅曰大夫出萬死計誅逆首康日知豈得與大夫同日論功而朝廷褒賞畧同誰不憤絶今聞詔文糧馬與鄰道朝廷之意先欲貧弱軍府俟平魏之日使馬僕射朱司徒共相滅耳朱司徒亦不敢自保使郅等効愚計欲與大夫共救田尚書而以深州與大夫三鎮連衡若耳目手足之相救則他日永無患矣武俊亦喜許諾相與刻日舉兵南向夏四月朱滔王武俊反發兵救田悦冦趙州詔李懷光討之上遣中使發盧龍恒冀易定兵討田悦王武俊執使者送朱滔滔言于衆曰将士有功者吾奏求官勲皆不遂今欲與諸君共擊馬燧以取温飽何如皆不應三問乃曰幽州之人自安史之反從而南者無一人得還今其遺人痛入骨髓况太尉司徒皆受國寵榮将士亦各䝉官勲誠且願保目前不敢復有僥冀滔黙然而罷乃誅大將數十人厚撫循其士卒康日知聞其謀以告馬燧燧以聞上以力未能制賜滔爵通義郡王冀以安之而滔反謀益甚分兵營趙州以逼康曰知武俊亦遣其子士真圍趙州涿州刺史劉怦以書諫滔曰司徒但以忠順自持則事無不濟務大樂戰不顧成敗而家滅身屠者安史是也惟司徒圖之無貽後悔不聴滔恐張孝忠為後患遣蔡雄往説之孝忠曰昔司徒遣人語孝宗曰惟岳負恩為逆孝忠歸國即為忠臣孝忠性直用司徒之教今既為忠臣矣不復助逆也且武俊最喜飜覆司徒勿忘鄙言雄復以巧辭説之孝忠怒欲執送京師雄懼逃歸滔乃使劉怦將兵屯要害以備之孝忠完城礪兵獨居疆冦之間莫之能屈平劉怦昌人滔將步騎二萬五千發深州至束鹿詰旦將行士卒忽大亂諠譟曰天子令司徒歸幽州柰何違勅南救田恱滔大懼蔡雄等謂士卒曰司徒血戰以取深州冀得其絲纊以寛汝曹賦率不意國家無信今兹南行乃為汝曹非自為也衆曰雖知如此終不如且奉詔歸鎮雄曰然則汝曹各歸部伍休息數日相與歸鎮耳衆然後定滔即引軍還深州宻訪首謀者得二百餘人悉斬之餘衆股栗乃復舉兵而南衆莫敢前郤進取寧晉本癭陶縣唐更名今屬趙州武俊將步騎萬五千取元氏注見前遂與滔救魏州詔朔方節度使李懷光將步騎萬五千人東討悦且拒滔等已而懷光與滔等戰于惬山在大名府大名縣北古河堰也敗績朱滔王武俊軍至魏州營于惬山李懷光軍亦至馬燧等盛軍容迎之滔以為襲已遽出陳懐光擊之滔軍崩沮士卒爭取寳貨武俊引騎横衝之懷光擊之為二滔引兵繼之官軍大敗溺死者不可勝數滔復堰水絶官軍歸路燧懼遣使卑辭謝滔求歸武俊以為不可計滔不從燧與諸軍涉水而西保魏縣武俊由是恨滔魏縣漢置舊屬大名府今省括富商錢時兩河用兵月費百餘萬緡府庫不支數月太常博士韋都賔陳京叔明五世孫建議請括富商錢出萬緡者借其餘以供兵上從之判度支杜佑大索長安中商賈所有貨意其不實輙加搒捶人不勝苦有縊死者長安囂然如被冦盜計所得纔八十餘萬緡又括僦櫃質錢凡蓄積錢帛粟麥者皆借四分之一封其櫃窖百姓為之罷市相率遮宰相馬自訴以千萬數盧杞始慰諭之勢不可遏疾驅得免計并借商所得纔二百萬緡人已竭矣淮南節度使陳少遊奏水道税錢毎千増二百詔他道皆増税錢視此又詔鹽毎斗價皆増百錢洺州刺史田昻入朝李抱真馬燧數以事相恨望怨隙遂深不復相見由是諸軍逗撓久無成功上遣中使和解之及王武俊逼趙州抱真分麾下二千人戍邢州燧大怒欲引兵歸李晟説燧曰李尚書以邢趙連壤分兵守之誠未有害今公遽自引去衆謂公何燧悦乃單騎造抱真壘相與釋憾結歡會田昂請入朝燧奏以洺州𨽻抱真李晟軍先𨽻抱真又請兼𨽻燧以示協和召朱泚入朝以張鎰兼鳯翔節度使朱滔遣人以蠟書遺朱泚欲與同反馬燧獲之并使者送長安泚不之知上驛召泚至示之泚頓首請罪上曰相去千里初不同謀非卿之罪也因留之長安賜賚甚厚以安其意上以幽州兵在鳯翔思得重臣代之盧杞忌張鎰忠直為上所重欲出之乃對曰鳯翔将校皆髙班非宰相無以鎮撫臣請自行上俛首未言杞遽曰陛下必以臣貎寢不為三軍所伏固惟陛下神算上乃顧鎰曰無以易卿鎰知為把所排而無辭以免因再拜受命杞又以李揆有才望惡之奏使吐蕃上曰無乃太老把曰使遠夷非諳練故事者不可揆乃行至吐蕃酋長曰聞唐有第一人李揆公是否揆恐留之紿曰彼李揆安肯來耶遂還道卒上初即位崔祐甫為相務崇寛大當時以為有貞觀之及杞為相知上性多忌因以疑似離間羣臣始勸上以嚴刻御下中外失望冬十月以曹王臯為江西節度使臯至洪州隋置今江西南昌府是悉集将佐簡閲其才得牙将伊慎字寡悔兖州人王鍔字昆吾太原人等擢為大将引許孟容字公郢長安人至幕府慎嘗從李希烈希烈愛其才欲留之慎逃歸希烈聞臯用慎恐為己患遺慎七屬甲詐為復書墜之境上上聞之遣中使即軍中斬慎會江賊入冦臯遣慎擊賊自贖慎擊破之由是得免以關播同平章事盧把知上必更立相恐其分已權薦播儒厚可鎮風俗遂以為相政事皆決于杞播但斂袵無所可否上嘗從容與宰相論事播欲有所言杞目之而止出謂之曰以足下端慤少言故相引至此曏者奈何發口欲言邪播自是不敢復言十一月朱滔田悦王武俊李納皆自稱王田悦徳朱滔與王武俊議奉滔為主臣事之滔不可幽州判官李子千等共議請與鄆州為四國俱稱王而不改年號不然則用兵無名将吏無所依歸滔等皆以為然乃自稱冀王為盟主悦稱魏王武俊稱趙王納稱齊王築壇告天而受之各置百官皆倣天朝而易其名初武俊誅李惟岳遣判官孟華入見上問以河朔利害華性忠直有才畧應對慷慨上悦以為恒冀團練副使會武俊有異謀上遣華歸諭㫖華至武俊已出師華諫曰聖意于大夫甚厚何遽自同于逆亂異曰無成悔之何及武俊奪其職及是武俊以華為司禮尚書華不受嘔血而死武俊又以衛常寧為内史監常寧謀殺武俊武俊殺之孟華史不詳何所人十二月李希烈自稱天下都元帥詔以李希烈兼平盧節度使討李納希烈帥所部徙鎮許州遣所親詣納與謀共襲汴州遣使告李勉假道之官勉治橋具饌以待之而嚴為之備希烈竟不至又密與朱滔等交通納亦數遣遊兵度汴迎希烈由是東南轉輸者皆不敢由汴渠自蔡水即沙水自中牟首受汴逕祥符尉氏至陳州府南合于潁謂之小黄河亦曰惠民河而上滔等與官軍相拒累月官軍有度支饋糧諸道益兵而幽趙孤軍深入専仰給于田悦聞李希烈軍勢盛頗相怨望乃相與謀遣使詣許州勸希烈稱帝希烈由是自稱天下都元帥癸亥四年春正月李希烈䧟汝州詔遣顔真卿宣慰之李希烈遣其將李克誠襲䧟汝州執别駕李元平元平本湖南牙將薄有才藝性疎傲敢大言好論兵關播竒之薦于上以為將相之器以汝州近許擢元平為别駕知州事元平至即募工徒治城希烈隂使壯士數百人往應募繼遣李克誠將數百騎突至城下應募者應之于内縳元平馳去元平為人𦕈小無鬚見希烈恐懼便液汚地希烈罵之曰盲宰相以汝當我何相輕也遣别將取尉氏漢縣今屬開封府圍鄭州東都震駭初盧把惡太子太師顔真卿欲出之真卿謂曰先中丞傳首至平原盧奕死東都事具前真卿以舌䑛面血今相公忍不相容乎把瞿然起拜而恨之益深至是上問計于把把對曰誠得儒雅重臣為陳禍福可不勞軍旅而服顔真卿三朝舊臣忠直剛決名重海内人所信服真其人也上以為然遣真卿宣慰希烈詔下舉朝失色真卿乗驛至東都留守鄭叔則曰往必不免宜少留須後命真卿曰君命也將焉避之遂行李勉表言失一元老為國家羞又使人邀之于道不及真卿與其子書但敕以奉家廟撫諸孤而已至許欲宣詔㫖希烈使其養子千餘環繞嫚罵㧞刄擬之真卿色不變希烈麾衆令退館而禮之欲遣還㑹李元平在座真卿責之元平慙以宻啓白希烈遂留不遣朱滔等各遣使詣希烈勸進希烈召真卿示之曰四王見推不謀而同豈吾獨為朝廷所忌無所自容邪真卿曰此乃四凶何謂四王相公不自保功業為唐忠臣乃與亂臣賊子相從求與之同覆滅邪希烈不悦他日又與四使同宴四使曰都統将稱大號而太師適至是天以宰相賜都統也真卿叱之曰汝知有罵安禄山而死者顔杲卿乎乃吾兄也吾年八十知守節而死耳豈受汝曹誘脇乎希烈掘坎于庭云欲阬之真卿怡然見希烈曰死生已定何必多端亟以一劒相與豈不快公心事邪希烈乃謝之是月以哥舒曜為東都汝州節度使討李希烈擊破之遂克汝州子哥舒曜翰之三月曹王臯敗李希烈兵斬其将㧞黄隋置今湖北黄州府是蘄注見前州時希烈兵栅蔡山在黄州府黄梅縣南險不可攻臯聲言西取蘄州引舟師泝江而上希烈之将引兵随戰臯乃復放舟順流而下急攻蔡山㧞之遂進㧞蘄州表伊慎為刺史李希烈引兵歸蔡州即汝南郡注見前希烈遣其都虞候周曽等将兵三萬攻哥舒曜曽等宻謀還軍襲希烈奉顔真卿為節度使希烈知之襲曽等殺之其黨冦鄭州者聞之亦逃歸希烈乃上表歸咎于周曽等引兵還蔡州外示從順實待朱滔等之援也希烈置顔真卿于龍興寺會荆南節度使張伯儀與希烈兵戰于安州大敗亡其所持節希烈使人以示真卿真卿號慟投地絶而復蘇自是不復言夏四月以白志貞為京城召募使志貞請諸嘗為節度觀察都團練使者不問存没並勒其子弟帥奴馬自備資裴從軍授以五品官貧者苦之人心始摇李晟圍清苑後魏縣今為直𨽻保定府治朱滔救之晟軍大敗先是李晟請以所將兵與張孝忠共圖范陽上許之晟趨趙州王士真解圍走遂北畧恒州及是晟謀取涿莫二州以絶幽魏往來之路圍清苑累月不下朱滔自将救之晟軍大敗㑹晟病甚還保定州王武俊以滔未還魏橋遣宋端趣之言頗不遜滔怒曰滔以救魏博之故叛若棄兄如脱屣二兄必相疑惟二兄所為武俊遣使者謝之然以是益恨滔李抱真因使参謀賈林詣武俊詐降説之林見武俊曰吾來傳詔非降也武俊色動林曰天子知大夫登壇建國撫膺顧左右曰我本忠義天子不省故至是諸将亦數表大夫至誠天子語使者曰朕前誤無及矣朋友失意尚可謝况朕為四海主乎武俊曰僕胡人也為将尚知愛百姓况天子豈専以殺人為事乎僕不憚歸國但已與諸鎮結盟不欲使曲在已天子誠能下詔赦諸鎮之罪僕當首唱從化有不從者請奉辭伐之如此則上不負天子下不負同列不過五旬河朔定矣武俊乃使林還報抱真隂相約結初行税間架除陌錢法時河東澤潞河陽朔方四軍屯魏縣神䇿永平宣武淮南浙西荆南江泗沔鄂湖南黔中劒南嶺南諸軍環淮寧之境皆仰給度支月費錢百三十餘萬緡常賦不能供判度支趙贊乃奏行二法所謂税間架者每屋兩架為間上屋税錢二千中税千下税五百敢匿一間杖六十賞告者錢五十緡所謂除陌錢者公私給與及賣買每緡官留五十錢給他物及相貿易者約錢為率敢隠錢百者杖六十罰錢二千賞告者錢十緡賞錢皆出坐者于是愁怨之聲盈于逺近秋八月李希烈㓂㐮城詔發涇原等道兵救之初上在東宫聞監察御史陸贄字敬輿蘇州嘉興人名即位召為翰林學士數問以得失時兩河用兵久不決賦役日滋贄以兵窮民困恐生内變乃上奏論之畧曰克敵之要在乎将得其人馭将之方在乎操得其柄将非其人者兵雖衆不足恃操失其柄者将雖材不為用将不能使兵國不能馭将非止費財翫冦之弊亦有不戢自焚之災今兩河淮西為叛亂者獨四五兇人而已尚恐其中或有詿誤失圖勢不得止者况其餘衆蓋並脇從茍知全生豈願為惡又曰人者邦之本財者人之心心傷則其本傷本傷則枝榦顛瘁矣是以兵貴拙速不尚巧遲若不靖于本而務救于末則救之所為乃禍之所起也又論闗中形勢以為王者蓄威以昭徳偏廢則危居重以馭輕倒持則悖王畿者四方之本也太宗列置府兵分𨽻禁衛諸府八百餘所而在闗中者殆五百馬舉天下不敵闗中則居重馭輕之意明矣承平漸久武備寖㣲故禄山竊倒持之柄一舉滔天乾元之後繼有外虞悉師東討故吐蕃乘虚深入先帝避之東遊是皆失居重馭輕之權忘深根固柢之慮追想及此豈不寒心今朔方太原之衆逺在山東神策六軍之兵繼出闗外倘有賊臣䧟㓂黠虜覷邉未審陛下何以禦之立國之安危在勢任事之濟否在人勢茍安則異類同心勢茍危則舟中敵國陛下豈可不追覽往事惟新令圖修偏廢之柄以靖人復倒持之權以固國乎今輔之間徵發已甚宫苑之内備衛不全萬一将帥之中又如朱滔希烈竊發郊畿驚犯城闕未審陛下復何以備之臣願追還神䇿六軍節将子弟明敕涇隴邠寧更不徵發仍罷間架等税冀已輸者弭怨見處者獲寜則人心不摇而邦本固矣上不能用冬十月涇原兵過京師作亂上如奉天朱泚反據長安上發涇原等道兵救㐮城十月節度使姚令言河中人將兵五千至京城軍士冒雨寒甚多擕子弟而來冀得厚賜遺其家既至一無所賜發至滻水詔京兆尹王翃守宏肱并州晉陽人犒師惟糲食菜餤衆怒蹴而覆之曰吾輩將死于敵而食且不飽安能以微命拒白刄邪聞瓊林大盈二庫金帛盈溢不如相與取之乃擐甲張旗皷譟還趣京城上遽命賜帛人一匹衆益怒射中使殺之遂入城百姓駭走賊大呼告之曰汝曹勿恐不奪汝商貨僦質矣不税汝間架陌錢矣初白志貞募禁兵東征死亡者皆不以聞但受市井富兒賂而補之名在軍籍受給賜而身居市㕓為販鬻至是上召禁兵以禦賊竟無一人至者乃與太子諸王公主自苑北門出王貴妃以傳國寳繋衣中宦官竇文㻛霍仙鳴帥宦官左右僅百人以從後宫諸王公主不及從者什七八翰林學士姜公輔愛州日南人叩馬言曰朱泚嘗為涇帥廢處京師心常怏怏今亂兵若奉以為主則難制矣請召使從行上曰無及矣遂行賊登含元殿讙譟爭入府庫運金帛姚令言曰今衆無主不能持久朱太尉閒居私第請相與奉之衆許諾乃遣騎迎朱泚入宫居白華殿自稱權知六軍百官出見泚或勸迎乗輿泚不悦源休以使回紇還事具前嘗薄怨朝廷休有口辯盧把恐其見上得幸乗其未還先除光禄卿故怨入見泚為陳成敗引符命勸之僭逆羣臣不知乗輿所之盧把白志貞王翃陸贄等追及于咸陽上思桑道茂之言道茂請城奉天見前乃幸奉天金吾大將軍渾瑊繼至瑊素有威望衆心恃之稍安檢校司空李忠臣太僕卿張光晟皆欝欝不得志至是與工部侍郎蔣鎮皆為泚用泚以司農卿叚秀實久失兵柄意其必怏怏遣騎召之不納騎士踰垣入刼之秀實乃謂子弟曰吾當以死狥社稷耳乃往見泚説之曰犒賜不豐有司之過也天子安得知之公宜以此開諭將士示以禍福奉迎乗輿此莫大之功也泚不悦上徴近道兵入援有上言朱泚為亂兵所立且來攻城宜早修守備盧把切齒言曰朱泚忠貞羣臣莫及柰何言其從亂傷大臣心臣請以百口保其不反上亦以為然又聞羣臣勸泚奉迎乃詔諸道援兵至者皆營于三十里外姜公輔諫曰今宿衛軍寡有備無患若泚奉迎何憚兵多上乃悉召援兵入城盧把白志貞請擇大臣入城宣慰金吾將軍吳溆獨請行退而告人曰食其禄而違其難何以為臣吾非不知往必死但舉朝無蹈難之臣使聖情慊慊耳遂奉詔詣泚泚殺之吳溆湊之兄司農卿叚秀實謀誅朱泚不克死之秀實與將軍劉海賔涇原將吏何明禮岐靈岳謀誅朱泚迎乗輿未發泚遣韓旻將鋭兵三千聲言迎駕實襲奉天秀實謂靈岳曰事急矣使靈岳詐為姚令言符令旻且還竊其印未至秀實倒用司農印印符追之旻得符而還秀實謂同謀曰旻還吾屬無類矣我當直搏泚殺之不克則死終不能為之臣也使海賓明禮隂結死士為應旻至泚令言大驚靈岳獨承其罪而死泚召李忠臣源休姚令言及秀實等議稱帝事秀實勃然起奪休象笏前唾泚面大罵曰狂賊吾恨不斬汝萬叚豈從汝反邪因以笏撃泚中其額泚血灑地海賔不敢進而逸忠臣前助泚泚得脱走秀實知事不成謂泚黨曰我不同汝反何不殺我衆爭前殺之海賓捕得見殺明禮從泚攻奉天復謀殺泚亦死上聞秀實之死恨委用不至涕泗久之鳳翔將李楚琳殺節度使張鎰降于朱泚鎰性懦緩好修餙邉幅不習軍事聞上在奉天欲迎大駕具服用貨財獻于行在營將李楚琳嘗事朱泚為泚所厚行軍司馬齊映瀛州高陽人齊抗澣之孫言于鑑曰不去楚琳必為亂首鎰命楚琳出屯隴州楚琳夜與其黨作亂殺鎰自為節度使降于朱泚上始以奉天迫隘欲幸鳯翔户部尚書蕭復曰鳳翔將卒皆朱泚故部曲其中必有與之同惡者臣尚憂張鎰不能久豈得以鑾輿蹈不測之淵乎上曰吾行計已決試為卿留一日明日聞亂乃止齊映齊抗皆詣奉天以映為御史中丞抗為侍御史孫蕭復字履初嵩之朱泚僭號朱泚自稱大秦皇帝改元應天以姚令言李忠臣為侍中源休同平章事蔣鎮樊系張光晟等拜官有差立弟滔為皇太弟泚尋改國號曰漢源休勸泚誅剪宗室以絶人望殺凡七十七人系為泚譔册文既成仰藥而死大理卿蔣沇詣行在為賊所得逼以官流絶食稱病潛竄得免之蔣沇欽緒子李希烈䧟㐮城哥舒曜食盡奔洛陽希烈遂䧟㐮城以馮河清京兆人為涇原節度使姚令言之東出也以馮河清為判官姚况知州事河清况聞上幸奉天集將士大哭激以忠義發甲兵輸行在城中得之士氣大振詔以河清為節度使况為司馬殺左僕射崔寧上至奉天數日崔寧始至上喜甚撫勞有加寧退謂所親曰主上聰明英武從善如流但為盧把所惑以至于此因澘然出涕把聞之與王雄謀䧟之㑹泚下詔以寧為中書令翃詐為寧遺泚書獻之杞譖寧與泚結盟約為内應故獨後至上遣中使縊殺之中外皆稱其寃李懷光帥衆赴長安上遣中使告難于魏縣行營諸将相與慟哭懷光遂赴長安馬燧李芃引兵歸鎮李抱真退屯臨洺朱泚犯奉天詔韓遊瓌靈武人渾瑊拒之泚自将逼奉天軍勢甚盛邠寧留後韓遊瓌奉詔将兵拒泚遇于醴泉遊瓌謂監軍翟文秀曰當急趣奉天以衛天子遂引兵還泚亦随至渾瑊與遊瓌血戰竟日賊乃退上與陸贄語及亂故深自克責贄曰致今日之患皆羣臣之罪也上曰此亦天命非由人事贄退上疏曰陛下志一區宇四征不庭兇渠稽誅逆将繼亂兵連禍結行及三年行者有鋒刃之憂居者有誅求之困非常之虞億兆同慮唯陛下穆然凝邃獨不得聞至使充卒鼓行白晝犯闕陛下有股肱之臣有耳目之任有諌諍之列有備禦之司見危不能竭其誠臨難不能效其死所謂羣臣之罪豈徒言歟臣又聞之天所視聴皆因于人人事理而天命降亂者未之有也人事亂而天命降康者亦未之有也自頃征伐頗繁刑網稍宻物力竭耗人心驚疑上自朝列下達烝黎日夕族黨聚謀咸憂必有變故旋屬涇原叛卒果如衆庶所虞京師之人動逾億計固非為知冥術皆聴古書則明致冦之由未必盡關天命臣聞理或生亂亂或資理有以無難而失守有以多難而興邦今生亂失守之事則既往不可復追矣其資理興邦之業在陛下克勵而謹俢之而已将軍高重㨗及泚兵戰死将軍髙重㨗與泚驍将李日月戰于梁山注見前破之乗勝逐北賊伏兵掩之斬其首而去上哭之盡哀結蒲為首而葬之泚見其首亦哭曰忠臣也束蒲為身而葬之日月亦戰死于城下歸其尸其母不哭罵曰奚奴國家何負于汝而反死已晩矣及泚敗獨日月之母不坐十一月以韋臯字城武京兆萬年人為奉義軍節度使初泚鎮鳯翔遣将牛雲光戍隴州至是欲執留後韋臯以應泚事泄帥衆奔泚遇泚遣中使蘇玉齎詔書加臯中丞玉謂之曰韋臯書生也君不如與我俱之隴州臯不受命君以兵誅之如取孤㹠耳雲光從之臯乃先納蘇玉受其詔書謂雲光曰大使茍無異心請悉納甲兵乃可入雲光易之輸甲兵而入臯伏甲誅之築壇盟将士曰李楚琳賊虐本使既不事上安能恤下宜相與討之遣兄平弇詣奉天詔以隴州為奉義軍擢臯為節度使李晟将兵入援李晟聞上幸奉天帥衆奔命張孝忠遣鋭兵六百與俱晟引兵出飛狐道注見前晝夜兼行上以為行營節度使李懐光以衆五萬入援方雨淖懐光奮厲軍士倍道進屯蒲城今同州府蒲城縣西魏置唐改奉先宋仍復故名此云蒲城蓋史臣追叙之文晟亦自蒲津即蒲津關注見前濟軍于東渭橋其始有卒四千晟善于撫御人樂從之旬月間至萬餘人持神䇿兵馬使尚可孤自㐮陽入援屯藍田鎮國軍兵馬使駱元光襲破泚将何望之軍華州屢敗賊兵賊由是不敢東出上即以元光為節度使馬燧遣其行軍司馬王權及其子彚将兵五千屯中渭橋于是泚黨所據惟長安城而已元尚可孤宇文部别種駱元光本安息人宦官駱奉養以為子遂冒其姓後賜姓名曰李元諒鎮國軍上元初置治華州渾瑊擊破朱泚李懐光敗泚兵于醴泉奉天圍解泚圍奉天經月城中資糧俱盡時供御纔有糲米二斛每伺賊之休息夜縋人于城外采蕪菁根本草注蕪菁北人又名蔓菁其根可食而進之泚百道攻城造雲梯高廣數丈下施巨輪上容壯士五百人城中望之恼懼渾瑊迎其所來鑿地道積薪蓄火以待之泚盛兵鼓譟攻南城韓遊瓌引兵嚴備東北賊果併兵攻之推雲梯上施濕氊懸水囊火炬矢石所不能傷賊有登城者上與渾瑊對泣羣臣惟仰首祝天上以無名告身千餘通授瑊使募敢死士禦之時士卒凍餒又無甲胄瑊撫禦之激以忠義皆鼓譟力戰瑊中流矢進戰不輟㑹雲梯輾地道即渾瑊所鑿一輪偏䧟不能前郤火從地中出亦瑊所書風勢甚盛須臾雲梯及人皆為灰燼賊乃引退于是三門出兵太子督戰賊徒大敗李懐光自蒲城引兵而西先遣兵馬使張韶以蠟韜表随賊攻城乗間逾塹抵城下大呼曰我朔方軍使也乃縋而上上得表大喜即令舁韶至城上懽聲如雷懷光亦敗泚兵于醴泉又敗之于魯店東按魯店在乾州泚聞之懼遂遁歸長安衆以為懐光復三日不至則城不守矣泚退從臣皆賀汴滑兵馬使賈隠林進言曰陛下性太急不能容物若此性未改雖朱泚敗亡憂未艾也上甚稱之侍御史万俟著開金商運路諸道貢賦繼至用度始振泚至長安為城守計不愛金帛以悦将士加以繕完器械日費甚廣及長安平府庫尚有餘蓄見者皆追怨有司之暴斂焉金商金州西魏置今陕西興安刑是商州注見前李懐光至奉天詔引軍還取長安李懐光之赴難也數與人言盧杞趙贊白志貞之姦佞且曰天下之亂皆此曹所為也吾見上當請誅之杞聞之懼言于上曰懐光勲業社稷是頼賊徒破膽皆無守心若使之乗勝取長安則一舉可以滅賊此破竹之勢也今聼入朝留連累日使賊得成偹恐難圖矣上以為然詔懷光直引軍屯便橋與李晟等刻期共取長安懐光自以數千里赴難破泚解圍而咫尺不得見天子意殊怏怏曰吾今已為姦臣所排事可知矣遂引兵行曹王臯遣使貢獻自朱泚作亂南方藩鎮各閉境自守惟曹王臯數遣使間道貢獻十二月貶慮杞白志貞趙贊為逺州司馬李懐光頓兵不進上表暴揚把等罪惡衆論諠騰亦咎把等上不得已皆貶為司馬以陸贄為考功郎中贄辭曰行罰先貴近而後卑逺則令不犯行賞先卑逺而後貴近則功不遺望先録大勞次徧羣臣則臣亦不敢獨辭上不許上問贄以當今切務贄上疏曰當今急務在于審察羣情而已矣羣情之所甚欲者陛下先行之所甚惡者陛下先去之欲惡與天下同而天下不歸者未之有也理亂之本繫于人心况當變故危疑之際乎頃者中外意乖君臣道隔郡國之志不逹于朝廷閭閻之誠不升于軒陛上澤闕于下布下情壅于上聞智事不知知事不實此羣情之所甚惡也夫總天下之以助聰明順天下之心以施教令則君臣同志何有不從逺邇歸心孰與為亂疏奏旬日無所施行贄又上疏曰臣聞立國之本在乎得衆得衆之要在乎見情在易乾下坤上曰泰坤下乾上曰否損上益下曰益損下益上曰損夫天在下而地處上于位乖矣而反謂之泰者上下交故也君在上而臣處下于義順矣而反謂之否者上下不交故也上約已而裕于人人必悦而奉上矣豈不謂之益乎上蔑人而肆諸已人必怨而叛上矣豈不謂之損乎是以古先王之居人上也必以其欲從天下之心而不敢以天下之人從其欲陛下以刑威照臨以嚴法制斷故逺者驚疑而阻命逃死之亂作近者畏懾而偷容避罪之態生人各隠情以言為諱至于變亂将起億兆同憂獨陛下恬然不知方謂大平可致陛下以今日之所覩騐往時之所聞孰真孰虚何得何失則事之通塞備詳之矣人之情偽盡知之矣上乃遣中使諭之曰朕本性甚好推誠亦能納諫将謂君臣一體全不隄防縁推誠信不疑多被姦人賣弄今所致患害反在推誠且諫官論事例自矜􅃷歸過于朕以自取名又多雷同道聼塗説試加質問遽則辭窮所以近來不多對人非倦于接納也贄以書對曰天不以地有惡木而廢資生天子不以時有小人而廢聼納惟信與誠有失無補一不誠則心莫之保一不信則言莫之行陛下所謂失于誠信以致患害者斯言過矣夫馭之以智則人詐示之以疑則人偷上行之則下從上施之則下報若誠不盡于已而望盡于人衆必怠而不從矣不誡于前而曰誠于後衆必疑而未信矣是知誠信之道不可斯須而去身願陛下慎守而力行之非所以為悔也夫仲虺賛揚成湯不稱其無過而稱其改過吉甫歌誦周宣不美其無闕而稱其補闕是則聖賢惟以改過為能不以無過為貴蓋以為智者改過而遷善愚者恥過而遂非遷善則其徳日新遂非則其惡彌積也諫官不宻信非忠厚其于聖徳固亦無虧陛下若納諫不逹則傳之適足增美陛下若違諫不納又安能禁之不傳夫侈言無驕不必用質言當理不必違辭拙而効速者不必愚言甘而利重者不必智考之以實處之以終其用無他惟善所在衆多之議足見人情必有可行亦有可畏恐不宜一様輕侮莫之省納陛下又謂試加質問即便辭窮臣以為陛下雖窮其辭而未窮其理能服其口而未服其心也夫下之情莫不願逹于上上之情莫不求通于下然而下恒苦上之難逹上恒苦下之難知若是者何九弊未去故也所謂九弊者上有其六好勝人恥聞過騁辯給眩聪明厲威嚴恣彊愎是也下有其三謟諛顧望畏慎是也上好勝必甘于侫辭上恥過必忌于直諫如是則下之諂諛者順㫖而忠實之語不聞矣上騁辯必勦説而折人以言上眩明必臆度而疑人以詐如是則下之顧望者自便而切磨之辭不盡矣上厲威必不能降情以接物上恣愎必不能引咎以受規如是則下之畏愞者避辜而情理之説不申矣上情不通于下則人惑而不從其令下情不通于上則君疑而不納其誠誠而不見納則應之以悖令而不見從則加之以刑下悖上刑不亡何待故諫者多表我之能好諫者直示我之能容諫者之狂誣明我之能恕諫者之漏泄彰我之能從有一于斯皆為徽徳諫者有爵賞之利君亦有理安之利諫者得獻替之名君亦得采納之名然猶諌者有失中而君無不美惟恐讜言之不切天下之不聞如此則納諌之徳光矣上頗采用其言李希烈䧟汴滑州希烈攻汴州李勉城守累月外救不至将其衆萬餘人奔宋州滑州刺史李澄以城降賊勉上表請罪上曰朕猶夫守宗廟勉宜自安待之如初希烈遂㧞㐮邑注見前江淮大震陳少遊送欵于希烈遣使結李納于鄆州御批歴代通鑑輯覽卷五十七

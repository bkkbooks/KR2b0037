front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷九十三宋理宗皇帝辛亥淳祐十一年䝉古憲宗元年夏六月䝉古主莽賚扣立是為憲宗
  hash: sha256:65b452ba1aeb773072c62f743d2094f49edb665dc1742f450f91a1e3c4a5bf2c

body:
  text: 初太平公主以太子年少意頗易之既而憚其英武數為流言云太子非長不可立每覘伺其所為纎悉必聞于上與益州長史竇懐貞結黨欲危太子邀韋安石至其第安石固辭不往上嘗宻召安石謂曰聞朝廷皆傾心東宫宜察之對曰陛下安得亡國之言此乃太平之謀耳太子有功於社稷仁明孝友天下所知願陛下無惑上矍然曰朕知之矣卿勿言公主又嘗乘輦邀宰相於光範門内諷以易置東宫衆皆失色宋璟抗言曰東宫有大功于天下真宗廟社稷之主柰何忽有此議與姚元之宻言于上曰宋王陛下之元子豳王髙宗之長孫公主交搆其間将使東宫不安請出宋豳王皆為刺史罷岐薛二王岐王名隆範薛王名隆業皆帝之子左右羽林太平公主武攸暨皆于東都安置上曰朕惟一妹豈可逺置東都諸王惟卿所處頃之上謂侍臣曰術者言五日中當有急兵入宫卿等為朕備之張說曰此必姦人欲離間東宫願陛下早使太子監國則流言自息矣元之曰張說所言社稷之至計也上悅以宋王成器為同州刺史豳王守禮為豳州刺史太平公主蒲州安置命太子監國六品以下官徒以下罪並聽處分已而太平公主聞姚元之宋璟之謀大怒以讓太子太子懼奏二人離間姑兄乃貶元之為申州刺史璟楚州刺史宋豳二王寢刺史之命太平公主亦即還京師以韋安石為中書令李日知為侍中安石日知為政紀綱紊亂復為景龍之世矣夏四月制政事皆取太子處分上召三品以上謂曰朕素懐淡泊不以萬乘為貴今欲傳位太子如何羣臣莫對殿中侍御史和逄堯岐州岐山人太平公主之黨也言于上曰陛下春秋未髙方為四海所依仰豈得遽爾上乃止制凡政事皆取太子處分軍旅死刑及五品除授議定以聞六月置十道按察使劉友益曰按察使之名始此時遣使按察十道分山南為東西兩道分隴右為河西道又分天下置二十四都督楊益州并荆四州為四大都督汴兖魏兾蒲綿秦洪潤越十州為中都督齊鄜涇襄安潭遂通梁䕫十州為下都督各糾察所部刺史以下善惡太子右庶子李景伯舍人盧備等上言都督專生殺之柄權任太重或用非其人為害不細今御史秩卑望重以時廵察姦宄自禁已而竟罷都督惟大大都督府如故但置按察使道各一人開元二年更曰十道按察採訪處置使至四年罷八年復置十年又罷十七年復置秋九月以竇懐貞為侍中懐貞每退朝必詣太平公主第時修金仙玉真二觀帝以西域隆昌二公主為女冠為之造觀改號二公主為金仙玉真羣臣多諫懐貞獨勸成之身自督役懷貞尋同三品有相者謂曰公有刑厄懐貞懼請解官為安國寺奴敕聽之未幾復以為左僕射冬十月韋安石郭元振竇懐貞李日知張說罷以劉幽求魏知古深州陸澤人崔湜並同三品陸象先呉人元方之子同平章事上御承天門引韋安石等宣制責以政務多闕水旱為災輔佐非才並罷政事以劉幽求等同三品象先同平章事皆太平公主之志也象先清慎寡言論髙逺時人所重湜私侍太平公主欲用為相湜請與象先為同升上不欲用湜公主涕泣以請從之召司馬承禎字子微洛州温人至京師尋許還山上召天台道士司馬承禎問以陰陽數術對曰道者損之又損以至於無為安肯勞心以學數術乎上曰理身無為則髙矣如理國何對曰國猶身也順物自然而心無所私則天下理矣上嘆曰廣成之言荘子廣成子居崆峒之山黄帝訪之問至道焉無以過也承禎固請還山上許之尚書左丞盧藏用指終南山謂承禎曰此中大有佳處何必天台承禎曰以愚觀之此乃仕宦之㨗徑耳藏用嘗隠終南武氏時徵為左拾遺故承禎言之壬子太極元年元宗皇帝先天元年八考是年正月改元太極五月改元延和月元宗即位改元先天一嵗三元唐書帝紀通鑑皆于正月即書元宗年號綱目則以太極紀年先天仍用分注今依之春正月祀南郊初武氏時天册萬嵗元年南郊始合祭天地至是上將有事南郊有司議不設皇地祗位諫議大夫賈曾河南洛陽人請合享天地如古制曾言郊之與廟皆有禘禘于廟則祖宗合食于太祖禘于郊則地祗羣望合食于圜丘三輔故事祭于圜丘上帝后土位皆南面則是漢嘗合祭矣詔宰相禮議皆如曾言㑹上欲祭地北郊曽議遂寝考新舊唐書禮樂志及賈曾傳皆云武氏時始合祭天地睿宗太極元年復用分祭賈曾雖建合祭之議而不果行至元宗天寳元年又復合祭記載甚詳通鑑于是年正月書睿宗祀南郊初因諫議大夫賈曾議合祭天地于五月則又書上祭北郊前後似不明晰今因新舊書改輯以蕭至忠為刑部尚書蕭至忠自託于太平公主公主引為尚書華州長史蔣欽緒其妹夫也謂之曰如子之才何憂不達勿為非分妄求至忠不應欽緒退而嘆曰九代卿族一舉滅之可哀也哉左傳術太叔儀之言至忠蕭徳言之曾孫故欽緒引之至忠素有雅望嘗自公主第門出遇宋璟璟曰非所望于蕭君也至忠笑曰善乎宋生之言遽䇿馬而去明年正月至忠拜中書令李自知為刑部尚書夏五月祭北郊是月改元延和秋七月彗星出西方入太微注見前八月帝傳位于太子太子即位尊帝為太上皇太平公主使術者言于上曰彗所以除舊布新又帝座太徹垣中有五帝座及心前星心三星中星為明堂天子位前星為太子皆有變皇太子當為天子上曰傳徳避災吾志决矣公主及其黨皆以為不可太子聞之固辭上曰汝為孝子何必待柩前然後即位邪太子流涕而出制傳位于太子太子又上表辭太平公主勸上自總大政上乃謂太子曰汝以天下事重欲朕兼理之邪昔舜禪禹猶親巡狩朕雖傳位豈忘家國其軍國大事當兼省之太子即位尊帝為太上皇上皇自稱曰朕命曰誥五日一受朝于太極殿皇帝自稱曰予命曰制勅日受朝于武徳殿三品以上除授及大刑政乃奏上皇决之大赦改元曰先天立妃王氏下邽人仁皎之女為皇后流劉幽求于封州唐置明省今廣東肇慶府封川縣是初河内人王琚預于王同皎之謀事具前亡命傭書于江都上之為太子也琚還長安見上至庭中故徐行宦者曰殿下在簾内琚曰何謂殿下今獨有太平公主耳上遽召見與語琚曰韋庶人弑逆人心不服誅之易耳太平公主凶猾無比大臣多為之用琚竊憂之上引與同榻坐泣曰主上同氣唯有太平言之恐傷主上之心不言為患日深為之奈何琚曰天子之孝當以安宗廟社稷為事豈顧小節上悅及即位以為中書侍郎是時宰相多太平公主之黨劉幽求與羽林将軍張暐謀使言于上曰竇懷貞崔湜岑羲皆因公主得進日夜為謀不軌若不早圖一旦事起太上皇何以自安請速誅之上以為然暐洩其謀上大懼遽列上其狀有司奏流幽求于封州張暐于峯州初崔湜坐與譙王重福通書當死張說與幽求營護得免既而湜附太平公主謀罷說政事及幽求得罪湜諷廣州都督周利貞使殺之桂州都督王晙知其謀留幽求不遣由是得免峯州唐置地在今安南國九月丁夘朔日食冬十月沙陁金山遣使入貢沙陁處月西突厥别部之别種也姓朱邪氏考沙陁者北庭之大磧也在金娑山之陽蒲䫉海之東自處月以來世居此磧因以為號以朱邪為姓其後北徙是為後唐沙陁今巴里坤西北路天山之北有大磧綿亘葢沙陁故地十二月刑部尚書李日知致仕日知左官不待捶撻而事集刑部有令史受勅三日忘不行日知怒欲捶之既而謂曰我欲捶汝天下人必謂汝能撩李日知嗔受李日知杖不得比于人妻子亦將棄汝矣遂釋之吏皆感悦無敢犯者元宗明皇帝癸丑開元元年春二月御樓觀燈大酺開門然燈大酺合樂上皇與上御門樓臨觀以夜繼晝凡月餘左拾遺嚴挺之名浚以字行華州華隂人上疏諫以為酺者因人所利合醵為歡今乃損萬人之力營百戯之資非所以光聖徳美風俗也勅以挺之忠直宣示百官厚賞之晋陵尉楊相如上疏言時政畧曰隋氏以縱欲而亡太宗以抑欲而昌人主不可不慎擇也夫人主莫不好忠正而惡邪佞然忠正者常疎佞邪者常親以至于覆國危身而不悟何哉忠正者多忤意佞邪者多順指積忤生憎積順生愛此親疎之所以分也誠能愛其忤以収忠賢惡其順以去佞邪則太宗之業將何逺哉夫法貴簡而能禁罰貴輕而必行小過不察則無煩苛大過不漏則止姦逆使簡而難犯寛而能制則善矣上覽而善之以髙麗大祚榮大姓祚榮名為勃海郡王初髙麗既亡事見前其别種大祚榮徙居營州阻險自固武氏使将軍李楷固討之大敗祚榮遂東據東牟山胡三省注山在挹婁國界地直營州東二千里髙麗靺鞨之人稍稍歸之地方二千里户十餘萬勝兵數萬人附于突厥中宗時遣子入侍至是以為勃海郡王秋七月太平公主謀逆賜死蕭至忠岑羲竇懐貞崔湜伏誅太平公主依上皇之勢擅權用事宰相七人五出其門文武之臣大半附之與竇懐貞岑羲蕭至忠崔湜薛稷僧慧範等謀廢立又與宫人元氏謀于赤箭粉赤箭草部藥名研粉服之延年益氣中寘毒以進中書侍郎王琚言于上曰事廹矣不可不速發左丞張說自東都遣人遺上佩刀荆州長史崔日用入奏事言于上曰太平謀逆有日陛下徃在東宫猶為臣子若欲討之須用謀力今但下一制書誰敢不從萬一姦宄得志悔之何及上曰誠如卿言直恐驚動上皇日用曰天子之孝在于安四海若姦人得志則社稷為墟安在其為孝乎請先定北軍即羽林萬騎後收逆黨則不驚上皇矣上以為然乃與岐王範薛王業二王名避帝諱俱去隆郭元振王毛仲姜皎上邽人謩曾孫李令問靖弟客師之孫王守一后父仁皎子及内給事屬内侍省從五品下髙力士潘州人本馮盎曾孫中人髙延福養以為子遂冒其姓等定計率兵三百餘人入䖍化門召至忠羲斬之懐貞自縊死戮其尸上皇聞變登承天門樓郭元振奏皇帝前奉誥誅竇懐貞等無他也上皇乃下詔自今軍國政刑一取皇帝處分徙居百福殿太平公主賜死諸子及黨與死者數十人崔湜與右丞盧藏用俱坐私侍公主流嶺南尋以湜與逆謀追賜死初太平公主與湜等謀廢立陸象先獨以為不可公主曰廢長立少已為不順且又失徳若之何不去象先曰既以功立當以罪廢今竇無罪象先終不敢從上既誅懐貞等召象先謂曰嵗寒知松栢信哉時窮治公主私黨象先宻為申理所全甚多然未嘗自言時無知者以髙力士為右監門將軍知内侍省事初太宗定制内侍省不置三品官黄衣廪食守門傳命而已中宗時七品以上至千餘人然衣緋者尚寡上在藩邸力士傾心奉之及為太子奏為内給事至是以誅蕭岑功賞之是後宦官増至三千人除三品將軍者寖多宦官之盛自此始范氏祖禹曰中人不可假以威權盖近而易以為姦也明皇不戒履霜堅氷而􅁿變太宗之政崇寵宦官增多其員自是以後寝干國政末流之禍實基于此冬十月引見京畿縣令戒以惠養黎元之意講武于驪山上幸新豐講武于驪山之下徵兵二十萬以軍容不整坐兵部尚書郭元振于纛下將斬之劉幽求張說諫曰元振有大功于社禝不可殺乃流新州而斬給事中知禮儀事唐紹上始欲立威亦無殺紹之意將軍李邈遽宣敕斬之上尋罷邈官廢棄終身時二大臣得罪諸軍震懾失次惟薛納觧琬二軍不動上遣輕騎召之皆不得入其陣上深歎美之解琬魏州元城人以同知刺史姚元之為兵部尚書同中書門下三品上欲以姚元之為相張說疾之使御史大夫趙彦昭彈之上不納又使殿中監姜皎言于上曰陛下常欲擇河東總管而難其人臣今得之矣問為誰皎曰元之文武全才真其人也上曰此張說之意汝何得面欺皎叩頭首服時上方獵渭川即召元之至行在拜以為相元之既至上詢以天下事衮衮不知倦上曰卿宜遂相朕元之知上大度鋭于為治乃先設十事以堅上意一願政先仁恕二願不幸邊功三願法行自近四願宦豎不與政事五願絶租賦外貢獻六願戚屬不事䑓省七願接臣下以禮八願羣臣皆得批逆鱗犯忌諱九願絶佛老營造十願鑒祿莽閻梁之亂為萬代法上曰朕能行之元之頓首謝翌日拜兵部尚書同三品元之三為宰相皆兼兵部尚書縁邊屯戍斥堠士馬儲械無不黙記上每事諮訪應答如響同僚唯諾而已元之常奏請序進郎吏上仰視殿屋再三言之終不應元之懼趨出罷朝髙力士諫曰陛下新總萬幾宰臣奏事當面加可否奈何一無省察上曰朕任元之以庶政大事當奏聞共議之郎吏卑秩乃以煩朕耶㑹力士宣事至省中道上語元之乃安左拾遺張九齡以元之有重望為上所信任奏記勸其逺謟躁進純厚畧曰君候職相國之重持用人之權為時未幾而淺中弱植之徒已延頸接踵而至謟親戚以求譽媚賔客以取容其間豈不有才所失在于無耻元之嘉納其言張九齡字子夀韶州曲江人十一月羣臣請加尊號加號開元神武皇帝命中書侍郎王琚行邊中書侍郎王琚為上所親厚羣臣莫及或言于上曰琚權譎縱横之才可與之定禍亂難與之守承平上由是寖疎之使按行北邊諸軍十二月改官名僕射為丞相中書為紫微省門下為黄門省侍中為監雍州為京兆府洛州為河南府長史為尹司馬為少尹以姚崇為紫微令張說為相州刺史元之避開元尊號復名崇崇既為相張説懼乃潛詣岐王申欵他日崇對于便殿行微蹇上問有足疾乎對曰岐王陛下愛弟張説為輔臣而密乘車入王家恐為所悮故憂之遂左遷説為相州刺史甲寅二年春正月定内外官出入恒式制選京官有才識者除都督刺史都督刺史有政迹者除京官使出入常均永為恒式置左右教坊劉友益曰教坊之名始此舊制雅俗之樂皆𨽻太常上以太常禮樂之司不應典倡優雜伎乃更置左右教坊以教俗樂又選樂工宫女數百人自教之謂之皇帝梨園弟子禮部侍郎張廷珪酸棗尉袁楚客皆上疏以上春秋鼎盛宜崇經術近端士尚路樸素深以悦鄭聲好逰獵為戒上雖不能用欲開言咸嘉賞之沙汰僧尼中宗以来貴戚争營寺度僧富户彊丁削髮避役姚崇上言佛圗澄不能存趙鳩摩羅什不能存秦齊襄梁武未免禍殃何用妄度姦人使壞正法上從之沙汰萬二千餘人禁創寺鑄佛寫經百官之家毋與僧尼道士往還以薛訥同紫微黄門三品將兵擊契丹初營州都督治栁城以鎮撫奚契丹武后之世都督趙文翽失政事其前奚契丹攻陷之或言韎􅞘奚霫以唐不建營州無所依投故且附突厥并州長史薛訥奏請復置營州上亦欲討契丹姚崇等諫不聽遂以訥同三品將兵擊契丹羣臣乃不敢言是秋薛訥及奚契丹戰于灤河敗績詔削訥官爵後奚契丹内附乃復置營州都督于栁城二月庚寅朔太史奏日食不應太史奏太陽應虧不虧姚崇表賀請書史册從之貶劉幽求為睦州隋置今浙江嚴州府是刺史鍾紹京為果州唐置今四川順慶府是刺史或告太子少保劉幽求詹事鍾紹京有怨望語按問不服姚崇盧懐慎等言于上曰幽求等皆功臣乍就閒職不無沮䘮若令下獄慮驚逺聽乃皆貶之時紫微侍郎王琚行邊未還坐黨貶澤州刺史後幽求復徙郴州憤恚道卒紹京屢遷少詹事以夀終三月貶韋安石韋嗣立趙彦昭李嶠為諸州别駕御史中丞姜晦上邽人皎之弟以宗楚客等改中宗遺詔事見前當時宰相韋安石韋嗣立趙彦昭李嶠不能匡正令監察御史郭震奏彈貶之晦又奏安石檢校定陵盗隠官物下州徵贓安石憤恚而卒時又貶武后時酷吏周利貞等放歸草澤終身切齒夏五月罷員外檢校官以歳饑悉罷員外試檢校官自今非戰功及别敇毋得注擬時薛王業之舅王仙童侵暴百姓御史彈奏業為之請敕覆按之姚崇盧懐慎奏御史言是上從之申王成義奏以府録事為叅軍崇等不可事亦寝由是貴戚束手請謁不行魏知古罷知古本起小吏姚崇薦之至為相崇意輕之請知古知東都選事遣吏部尚書宋璟于門下過官唐置凡文武官六品以下必過門下省審定謂之過官知古銜之崇二子分司東都有所請託知古歸悉以聞他日上問崇卿子何官才性何如崇揣知上意對臣三子兩在東都為人多欲而不謹是必以事干知古臣未及問之耳上問安從知之對曰知古微時臣嘗卵而翼之臣子愚以為知古容其為非故敢干之耳上于是以崇為無私而薄知古欲斥之崇固請曰臣子無狀陛下赦之已幸茍逐知古累聖政矣上久乃許之知古竟罷為工部尚書六月以宋王成器等為諸州刺史但領大綱州務皆委上佐長史司馬是後諸王領州並凖此秋七月焚珠玉錦繡于殿前上以風俗侈靡制乘輿服御金銀器玩令有司消毁以供軍國之用其珠玉錦繡焚于殿前后妃以下皆無得服勅百官所服𢃄及酒器銜燈三品以下聽飾以玉四品以金五品以銀餘皆禁之婦人從其夫子自今天下更毋得采珠玉織錦繡等物罷兩京織錦坊其後上以賈人言命監察御史楊範臣往海南求珠翠竒寳範臣奏曰陛下前年焚珠玉錦繡示不復用今所求者何以異于所焚者乎夫御史天子耳目之官必有軍國大事臣雖觸冒炎瘴死不敢辭此特賈人眩惑求媚無益聖徳上遽引咎慰諭而罷之襄王重茂薨于房州諡曰殤皇帝作興慶宫後謂之南内故址在今咸寧縣東南宋王成器等請獻興慶坊宅為離宫許之仍賜成器等宅環于宫側又于宫西南置樓西曰花萼相輝南曰勤政務本八月出宫人初民間訛言上采宫女以充掖庭上聞之命有司具牛車于崇明門選後宫無用者載還其家訛言乃息吐蕃入㓂以薛訥為隴右防禦使擊之吐蕃衆十萬㓂臨洮至渭源後魏縣今屬甘肅蘭州府掠牧馬命薛訥以白衣攝官郭知運字逢時𤓰州晋昌人王晙帥兵擊之是冬訥與吐蕃戰于武街晋縣唐為驛廢城在今蘭州府狄道州東大破之時王晙帥所部與訥㑹擊吐蕃方屯大来谷晙遣勇士七百衣敵衣夜襲之多置鼔角于其後前軍遇敵大呼後人鳴鼓角以應之敵以大軍至驚懼自相殺傷死者萬計遂大潰訥自武街與晙軍㑹追奔至洮水復大敗之前後殺獲數萬豐安軍使王海賔戰死其子忠嗣方九嵗上以為尚輦奉御養之宫中大來谷在渭源界王海賔華州鄭人忠嗣本名訓帝賜名以武后鼎銘頒告中外太子賔客薛謙光以武后鼎銘有云上天降鑒方建隆基為上受命之符獻之姚崇表賀請宣示史官頒告中外敇諸州修常平倉法敇以歳稔令諸州修常平倉法江嶺淮浙劒南下濕不堪貯積不在此例冬十二月立皇子嗣真為鄫王嗣謙為皇太子嗣真上長子母曰劉華妃嗣謙上次子母曰趙麗妃麗妃以倡進有寵故立之置幽州節度經畧大使劉友益曰特書置志禍始也領幽易平媯檀燕六州諸州注俱見前乙卯三年春正月以盧懐慎為黄門監懐慎清謹儉素不營資産俸賜隨散親舊妻子不免饑寒所居不蔽風雨姚崇嘗有子䘮謁告十餘日政事委積懐慎不能决惶恐入謝上曰朕以天下事委姚崇以卿坐鎮雅俗耳崇既出須臾裁决俱盡崇頗有得色顧謂紫微舍人齊澣曰我為相可比何人澣未對崇曰何如管晏對曰管晏之法雖不能施于後猶能沒身公所為法隨復更之似不及也崇曰然則竟何如澣曰可謂救時之相耳崇喜投筆曰救時之相豈易得乎懐慎自以其才不及崇每事推之時人謂之伴食宰相齊澣字洗心定州義豐人夏四月以薛訥為凉州大總管郭䖍瓘齊州厯城人為朔川通鑑作朔州大總管初突厥可汗黙啜衰老昏虐其葛邏禄胡禄屋諸部降唐者前後萬餘帳制皆以河南地處之遣薛訥居凉州郭䖍瓘居并州勒兵以備黙啜秋七月庚辰朔日食九月置侍讀官劉友益曰侍讀之名始見于此上謂宰相曰朕每讀書有疑無從質問可選儒士入内侍讀盧懐慎薦太常卿馬懐素以為左散騎常侍與右散騎常侍禇無量字宏度杭州鹽官人更日侍讀聽肩輿乘馬于宫中以無量羸老為造腰輿使内侍舁之親送迎之待以師傅之禮西域八國請降初監察御史張孝嵩奉使廓州後周置故城在今西寧府而寧縣聽便宜從事拔汗那者古烏孫也内附歳久吐蕃攻之其王奔安西求救孝嵩遂帥旁側戎落兵萬餘人出龜兹西數千里下數百城至是孝嵩傳檄諸國威振西域大食本波斯地東距哭騎施西南屬海等八國請降勒石紀功而還丙辰四年春正月殺尚衣奉御長孫昕昕皇后妹夫也與御史大夫李傑不恊于里巷伺而毆之傑自訴上大怒命于朝堂杖殺以謝百僚以鄫王嗣真為安北大都䕶陜王嗣昇二王皆帝之子嗣昇後屢更名即肅宗也為安西大都䕶二王皆不出閣諸王遥領節度自此始二月以倪若水為汴州刺史上欲重都督刺史選京官才望者為之然當時猶輕外任揚州採訪使班景倩入為大理少卿過大梁若水餞之望其行廛久之謂官屬曰班生此行何異登仙上嘗遣宦官詣江南取鵁鶄鸂􅈑等欲置苑中所至煩擾若水言今農桑方急而羅捕禽鳥水陸傳送道路觀者豈不以陛下賤人而貴鳥乎上手敇謝之縱散其鳥山東大蝗先是山東大蝗三年夏民或焚香設祭而不敢殺姚崇奏遣御史督州縣捕而瘞之盧懐慎以為殺蝗太多恐傷和氣崇曰昔楚莊吞蛭音質水蟲馬蝗也而疾愈賈誼新書楚莊王食葅得蛭恐監食者見誅遂吞之已而王疾令尹入問王告之故令尹賀曰王有仁徳天所輔也是夜嘔而蛭出疾遂愈孫叔殺蛇而致福劉向說苑孫叔敖兒時出見兩頭蛇殺而埋之歸而泣其母問故叔敖曰聞見兩頭蛇者必死母曰蛇安在對曰吾恐後人復見已殺而埋之矣母曰吾聞有隂徳者天報以福汝不死也奈何不忍于蝗而忍人之饑死乎若使殺蝗有禍崇請當之至是山東蝗復大起崇又命捕之倪若水謂蝗乃天災非人力所及宜修徳以禳之劉聰時常捕埋之為害益甚拒不受命崇牒若水曰劉聰偽主徳不勝怪今日聖朝妖不勝徳古之良守蝗不入境若其修徳可免彼豈無徳致然因勅使者察捕蝗之勤惰以聞由是不至大饑召新除縣令試理人䇿或言于上曰今嵗選除太濫縣令非才上悉召至殿庭試理人䇿惟韋濟嗣立之子詞理第一擢為醴泉隋縣今屬西安府令餘二百人不入第且令之官四十五人放歸學問吏部侍郎盧從願李朝隠皆坐左遷從愿朝隠典選稱職髙宗之世馬載裴行儉在吏部最有名時人稱吏部前有馬裴後有盧李夏六月太上皇崩拔曵固斬突厥黙啜以降初突厥黙啜北擊抜曵固大破之恃勝輕歸不復設備拔曵固迸卒散走之卒頡質畧自栁林突出斬之時子将小將也郝靈荃使突厥得其首拔曵固囘紇同羅霫僕固五部皆來降突厥立黙棘連為毗迦可汗闕特勒骨咄禄之子為左賢王專典兵馬黙啜自武氏世為中國患朝廷旰食及是郝靈荃得其首自謂百世之功㑹宋璟為相以天子好武功恐好事者競生心儌倖遂抑其賞逾年始授郎将靈荃痛哭而死秋八月遷中宗于别廟太常博士陳貞節穎川人蘇獻頲從兄以太廟七室已滿請遷中宗神主于别廟奉睿宗神主祔太廟從之已而伊闕人孫平子上言春秋譏魯僖公今遷中宗于别廟而祀睿宗正與魯同願下羣臣博議遷中宗入太廟蘓獻等以為七代之廟不數兄弟今睿宗之室當亞髙宗故為中宗特立别廟非躋睿宗于中宗之上也遂從獻等議平子論之不已貶都城尉都城晋縣故城在今肇慶府徳慶州冬十月葬橋陵在今同州府蒲城縣西北十一月黄門監盧懐慎卒懐慎病亟上表薦宋璟李傑李朝隠盧從愿上深納之既卒家無餘蓄惟老蒼頭請自鬻以辦䘮事以源乾曜同平章事乾曜既相㑹姚崇以病謁告凡大政事上必命乾曜就咨乾曜奏稱㫖上曰此必姚崇畫之或不稱㫖則曰何不問崇乾曜謝乃已崇第賖僻因近舍客廬詔徙寓四方館崇固辭上曰恨不可使卿居禁中此何足辭唐考通鑑作崇無居第寓居罔極寺今依書改輯十二月以宋璟為西京留守姚崇請避位崇子彞昇頗受賂遺又所親信主書趙誨受賂事覺當死崇復營救上不悦㑹曲赦京城特敕杖誨流嶺南由是請避位薦廣州都督宋璟自代上将幸東都以璟為刑部尚書西京留守遣内侍楊思朂夲姓蘇氏羅州石城人迎之璟風度凝逺人莫測其際在途不與思朂交言思朂素貴幸歸訴于上上嗟嘆良久益重璟閏月姚崇源乾曜罷以宋璟為黄門監蘇頲同平章事璟為相務在擇人隨才受任使百官各稱其職刑賞無私犯顔正諫上甚敬憚雖不合意亦曲從之璟與頲相得甚厚璟每論事則頲助之璟嘗謂人曰吾與蘇氏父子同居相府僕射寛厚誠為國器若獻可替否則黄門過其父矣璟與姚崇相繼為相崇善應變成務璟善守法持正二人志操不同然協心輔佐使賦役寛平刑罰清省百姓富庶唐世賢相前稱房杜後稱姚宋他人莫得比焉二人每進見上輙為之起去則臨軒送之及李林甫為相雖寵任過于姚宋然禮遇殊卑薄矣紫㣲舍人髙仲舒博通典藉齊澣練習時務姚宋每坐二人以質所疑既而嘆曰欲知古問髙君欲知今問齊君可以無闕政矣廣州請為璟立遺愛碑璟請禁之以革謟䛕之風于是他州皆不敢立山人范如璿獻所為文璟判之曰觀其良宰論頗涉謟䛕文章若髙宜從孫舉選不可别奏李林甫宗室長平王叔良曾始制郎御史起居遺補不擬舊制六品以下官皆委尚書奏擬是嵗始更此制丁巳五年春正月太廟四室壞行幸東都上将幸東都㑹太廟四室壊上素服避殿以問宋璟蘇頲對曰陛下三年之制未終遽而行幸恐未契天心故災異為戒願且停之姚崇曰太廟屋材皆苻堅時物朽腐而壊適與行㑹何足異也百官供擬已備不可失信但遷神主于太極殿更修太廟耳上大喜從之命崇五日一朝入閣供奉恩禮更厚有大政輙訪焉禇無量言隋文帝富有天下豈取苻氏舊材以立太廟此特諛臣之言願陛下克謹天戒納忠諫逺諛謟上弗聽遂幸東都上過崤谷道隘不治欲免河南尹及知頓使官宋璟曰陛下方事巡幸今以此罪二臣臣恐将來民受其弊上遽命釋之璟曰陛下罪之而以臣言免之是臣代陛下受徳也請令待罪朝堂而後釋之上從之秋七月放太常卿姜皎歸田初上微時與姜皎親善及誅竇懐真等皎預有功由是寵遇特厚出入卧内至與后妃連榻晏飲宋璟言皎權寵太甚非所以安之因下制曰西漢諸將以權貴不全南陽故人以優閒自保皎宜放歸田園勲封如故以明堂為乾元殿太常少卿王仁惠奏則天明堂窮極奢侈不合古制密邇宫掖人神雜擾制復以為乾元殿正至受賀季秋大享復就圜丘十一年冬復以乾元殿為明堂二十五年十二月又復以明堂為乾元殿九月復舊官名令史官隨宰相入侍羣臣對仗奏事貞觀之制中書門下及三品官入奏事必使諫官史官隨之有失則匡正美惡必記之諸司皆正牙唐稱大明宫含元殿為正牙亦謂之南牙奏事御史彈百官服豸冠法冠也一曰柱後惠文對仗讀彈文故大臣不得專君而小臣不得為讒慝及許敬宗李義府用事政多私僻奏事官多俟仗下于御座前屏人密奏監察御史及待制官逺立以俟其退諫官史官皆隨仗出仗下後事不復預聞武后以法制羣下諫官御史得以風聞言事互相彈奏于是多以險詖相傾宋璟欲復貞觀之政制自今事非的須秘密者皆令對仗奏聞史官自依故事冬十二月詔訪逸書秘書監馬懐素奏省中書頗散闕請選學士整比較補從之于是搜訪逸書選吏繕冩命國子博士尹知章翼城人等二十二人于乾元殿前編校刋正以褚無量為之使無量卒國子祭酒元行冲代之九年上其錄凡四萬八千卷戊午六年春正月禁惡錢敇錢重二銖四分以上乃得行斂人間惡錢鎔之更鑄如式宋璟請出太府錢二萬緡以平賈買百姓不售之物可充官用者庶使良錢流布人間其後敇太府及府縣出粟十萬石糶之以歛人間惡錢送少府銷毁徵嵩山處士盧鴻字浩然范陽人徙洛陽為諫議大夫不受夏四月敇度鄭銑郭仙舟為道士河南叅軍鄭銑朱陽後魏縣故城在今陜州盧氏縣丞郭仙舟投匭獻詩敕曰觀其文理乃崇道法至于時用不切事情宜從所好度為道士秋八月令州縣歳十二月行郷飲酒禮始加賦以給官俸唐初州縣官俸皆令富户掌錢出息以給之多破産者秘書少監崔沔字善冲長安人請計州縣官俸于百姓常賦之外微有所加以給之從之冬十一月帝還西京吐蕃請和初武街之㨗事具前上命左驍衛郎将尉廷瓌使吐蕃宣慰金城公主吐蕃亦遣其大臣請和用敵國禮上不許自是連嵗犯邊至是吐蕃奉表請和乞舅甥親署誓文又令彼此宰相皆著名其上以李邕鄭勉為逺州刺史李朝隠為大理卿陸象先為河南尹宋璟奏邕勉並有才畧文詞俱好是非改變若全引進則咎悔必至若長棄捐則才用可惜請以為渝峽刺史大理卿元行冲不稱職請以朝隠代之象先閑于政體寛不容非請以為河南尹皆從之己未七年夏四月祁公王仁皎卒仁皎后父也其子駙馬都尉守一請用竇孝諶例築墳髙五丈一尺上許之宋璟蘓頲以為凖令一品墳髙一丈九尺其陪陵者髙出三丈竇太尉墳議者頗譏其髙大至韋庶人崇其父墳以自速禍豈可復踵為之臣等所以再三進言者欲成中宫之美耳上説曰朕每欲正身率下况于妻子何敢私之卿能固守典禮垂法将來誠所幸也竇孝諶帝之外祖五月己丑朔日食上素服以俟變徹樂減膳命中書門下察繫囚賑饑乏勸農功宋璟奏曰陛下勤恤民隠此誠蒼生之福然臣聞日食修徳月食修刑親君子逺小人絶女謁除䜛慝所謂修徳也君子恥言浮于行茍推至誠以行之不必數下制書也秋八月敇五服並從禮傳右補闕慮履氷范陽人言禮父在為母服周年則天改服三年今請從舊上下其議禇無量是履氷議敕自今五服並依䘮服傳文然士大夫議論猶不息行之各從其意無量歎曰聖人豈不知母恩之厚乎厭降之禮厭損降下也禮子為母服齊衰三年父在則厭降服齊衰期也所以明尊卑也俗情膚淺一紊其制誰能正之庚申八年春正月宋璟蘇頲罷以源乾曜張嘉貞同平章事先是朝集使往往齎貨入京師将還多遷官璟奏一切勒還以革其弊璟又疾負罪而妄訴不已者悉付御史臺治之人多怨之者㑹天旱優人作魃狀魃音跋大雅雲漢詩曰旱魃為虐戱于上前問魃何為出對曰奉相公處分又問何故對曰負寃者三百餘人相公悉以繫獄故不得不出耳上心以為然時江淮間惡錢尤甚璟使監察御史蕭隠之括之隠之嚴急煩擾怨嗟盈路于是貶隠之官罷璟頲弛錢禁而惡錢復行矣夏五月以源乾曜為侍中張嘉貞為中書令乾曜上言形要之家多任京官使俊乂之士沈廢于外臣三子皆在京請出其二上從之于是出者百餘人嘉貞吏事彊敏而剛躁自用引進苖延嗣呂太一員嘉静崔訓與論政事四人頗招權時人語曰令公四俊苖吕崔員六月瀍糓溢朔方大使王晙誘殺突厥降户僕固都督勺磨僕固部之都督名勺磨突厥降户散居受降城側朔方大使王晙言其陰引突厥謀陷軍城誘僕固都督勺磨而殺之拔曵固諸部聞之皆悔懼并州長史張説引二十騎持節即其部落慰撫之因宿其帳下副使李獻以其情難信馳書止之說復書曰吾肉非黄羊出今直𨽻宣化府諸縣皆有之必不畏食血非野馬胡三省注不畜而孳生于野謂之野馬必不畏刺此吾效死之秋也諸部由是遂安冬十月流裴虚已于新州上禁約諸王不使與羣臣交結駙馬都尉裴虗已與岐王範遊晏私挾䜟緯坐流新州離其婚上待範如故謂左右曰吾兄弟自無間但趨競之徒强相托附耳吾終不以此責兄弟也十一月突厥㓂凉州初突厥毘伽可汗既立突騎施蘇禄復立為可汗蘇禄突騎施别将也擁衆二十餘萬據有西方遣使入朝詔以為金方道經畧大使尋立為忠順可汗毘伽患之黙啜時牙將暾欲谷年七十餘多智畧為國人所信服毘伽召以為謀主于是突厥降户處河西者多叛歸之詔薛訥王晙追討毘伽遂謀入㓂暾欲谷以為不可乃止至是王晙奏請西𤼵㧞悉密亦突厥之種姓阿史那氏居北庭東發奚契丹掩毘伽于稽落水上毘伽用暾欲谷謀擊擄拔悉密毘伽初聞晙奏大懼暾欲谷曰不足畏也拔悉宻在北庭與奚契丹相去絶逺勢不相及且拔悉密輕而好利得晙之約必喜而先至晙與張嘉貞不相悦奏請多不得應必不敢出兵拔悉密獨至擊而取之勢甚易耳既而拔悉密果彂兵遇突厥牙帳朔方奚契丹兵不至拔悉密引退毘伽欲擊之暾欲谷曰此屬去家千里將死戰未可擊也不如以兵躡之去北庭二百里暾欲谷分兵間道先圍北庭因縱兵擊拔悉密拔悉密敗走北庭不得入盡為突厥所獲暾欲谷還出赤亭注見前掠凉州河西節度使楊敬述遣禆將盧公利邀之大敗毘伽由是大振盡有黙啜之衆明年毘伽遣使求和上賜書許之于是連嵗貢獻方物辛酉九年春正月改蒲州為河中府置中都二月以宇文融萬年人㢸元孫為勸農使監察御史宇文融上言天下户口逃移巧偽甚衆請加檢括源乾曜賛成之敕有司議招集流移按詰巧偽之法以聞已而置州縣逃亡户口聽百日自首或于所在附籍或牒歸故鄉各從所欲過期不首謫徙邊州以融充使融奏置勸農判官十人分行天下其新附客户免六年賦調使者競為刻急州縣承風勞擾百姓苦之陽翟尉皇甫憬上疏言之坐貶州縣希㫖虚張其數或以實户為客凡得户八十餘萬田亦如之十一年八月敕以儉括逃人慮或煩擾宜令所在州縣安集遂其生業十二年五月制聽逃户自首闢所在間田隨宜收税毋得差科征役租調一皆蠲免復以融為勸農使廵行州縣議定賦役夏四月敕舉縣令敕京官五品以上外官刺史四府京兆河南河中太原上佐舉縣令一人視其政善惡為舉者賞罰六月罷中都復為蒲州時陸象先為蒲州刺史政尚寛簡吏民有罪曉諭遣之嘗謂人曰天下本無事但庸人擾之耳茍清其源何憂不治秋七月蘭池部康待賔反蘭池綱目作蘭也州考元和志神龍三年置蘭池都督府在白池縣北康待賔盖蘭池都督所𨽻之部也唐書帝紀及地志亦俱作蘭池綱目疑有誤今特改正白池廢縣在今寜夏府靈州王晙等擒斬之蘭池部康待賔誘降户同反攻陷六降州元和志調露元年于靈州南界置魯麗含塞依契等六州以處突厥降户謂之六降州有衆七萬命朔方大總管王晙太僕卿王毛仲天兵軍開元五年置鎮并州後廢節度大使張說共討之晙攻待賔擒之集四夷渠長腰斬之先是待賔潜與党項通謀攻銀城本西魏石城縣後周更名故城在今叚州神木縣南連谷隋戍唐置縣故城在今神木縣北張説將歩騎萬人出合河闗亦曰合水闗在今神木縣北黄河上掩擊大破之党項更與之戰衆復潰説安集党項使復其居業阿史那獻夲降人為討擊使以党項翻覆請并誅之説曰王者之師當伐叛柔服豈可殺已降邪因奏置麟州治新秦縣故城在神木縣北以撫其餘衆康待賔之叛也詔隴右節度大使郭知運與王晙合擊晙言朔方兵自有餘力請敕知運還未報知運已至由是與晙不協晙所招降者知運縱兵擊之遂以晙為賣已由是復叛晙坐貶梓州刺史梓州隋置今四川潼川府是也九月乙巳朔日食梁公姚崇卒諡曰文獻崇以開府儀同三司罷政事及是卒年七十二遺令曰佛以清静慈悲為本而愚者冩經造像兾以求福昔周毁經像而修甲兵齊崇塔廟而弛政刑一朝合戰齊滅周興汝曹勿效兒女子終身不悟追薦㝠福道士見僧獲利效其所為尤不可延之于家永為後法以張説同三品以王君㚟字威明𤓰州常樂人為河西隴右節度大使君㚟與郭知運同郡皆以驍勇著名為冦所憚至是知運卒君㚟自麾下代之冬十一月罷諸王都督刺史召還京師新作蒲津橋安州别駕劉子元即劉知幾避帝嫌名以字行卒子元領國史􅂷三十年嘗著史通内外四十九篇譏評今古又言史有三長才學識世罕兼之封居巢縣子以子貺累貶安州卒初著作郎吳兢撰則天寶錄言宋璟激張說使證魏元忠事後説修史見之謬曰劉五殊不相僣兢起對曰此兢所為史草具在不可使明公枉怨死者同僚皆失色其後説隂祈兢改數字兢曰若循公請則此史不為直筆何以取信于後造新厯及黄道遊儀太史言麟徳厯浸疎日食屢不效上命僧一行更造新厯即大衍厯也梁令瓚造黄道逰儀古渾儀止有赤道天體也黄道者日行出入于赤道之路也又有白道月行出入于黄道之路也一行欲知黄道進退而太史無其儀令瓚乃造木逰儀以追列舍之變又施月環以䆒隂陽朓朒以候七政遣太史監南宫説等于河南北平地測日晷及極星北極天樞夏至日中立八尺之表同時候之陽城今河南府登封縣即古陽城縣也東南有測景臺晷長一尺四寸八分弱夜視北極出地髙三十四度十分度之四浚儀注見前岳臺在今開封府祥符縣西晷長一尺五寸微疆極髙三十四度八分南至朗州隋置今湖南常徳府是晷長七寸七分極髙二十九度半北至蔚州注見前晷長二尺二寸九分極髙四十度南北相距三千六百八十八里九十歩晷差一尺五寸三分極差十度半又南至交州晷出表南三寸三分八月海中南望老人星下史記正義老人一星在弧南一曰南極為人主夀長之應常以秋分之曙見于丙春分之夕見于丁衆星粲然皆古所未名集覽乃渾天家以為常沒地中者大率去南極二十度已上皆見壬戌十年夏四月以張説兼知朔方軍節度使置朔方節度使領單于都䕶府夏注見前鹽西魏置故城在今寧夏府靈州銀後周置故城在今綏徳州米脂縣麟注見前豐隋置故城在今鄂爾多斯右翼後旗勝隋置故城在鄂爾多斯左翼後旗等六州定逺故城在今寧夏府新渠縣北豐安故城在今寜夏府靈州北二軍三受降城注見前以宰相張說兼領之五月伊汝水溢六月博州隋置今山東東昌府是河決命蕭嵩瑀從子鈞之孫等治之劉友益書法自王莽辛未書河決至是七百餘年始復一書制増太廟為九室增太廟為九室遷中宗還太廟秋安南亂遣内侍楊思朂討平之真氏徳秀曰唐世中人預國政自元宗任髙力士始中人預軍政自元宗用楊思朂始杖秘書監姜皎流之欽州注見前初上之誅韋氏也王皇后頗預密謀及即位色衰愛弛武惠妃陰懐傾奪之志上密與皎謀以后無子廢之皎洩其言上怒張嘉貞希㫖搆成其罪云皎妄談休咎杖而流之卒于道敕宗戚自非至親無得往還卜相占候之人不得出入百官之家北庭節度使張孝嵩此張孝嵩盖即前破降西域八國耆通鑑誤作張嵩今依唐書改正擊吐蕃大破之吐蕃圍小勃律唐書西域傳大勃律或曰布露直吐蕃西與小勃律接小勃律去京師九千里而嬴東少南三千里距吐蕃贊普牙東南三百里對大勃律今東西布魯特盖即其地也其王沒謹忙求救于孝嵩孝嵩遣副使張思禮将蕃漢歩騎四千倍道合擊大破之斬獲數萬自是累嵗吐蕃不敢犯邊張說巡邊討康待賔餘黨平之奏罷邉兵二十萬人康待賔餘黨康願子反自稱可汗張説發兵追討擒之其黨悉平徙殘部五萬餘口于許汝唐鄧仙豫等州仙州唐置今南陽府之業縣是餘俱見前空河南朔方千里之地先是縁邉戍兵常六十餘萬説以時無彊㓂奏罷二十餘萬使還農上以為疑說曰臣久在疆場具知其情將帥茍以自衛及役使營私而已若遇敵致勝不必多擁冗卒以妨農務上乃從之始募兵充宿衛劉友益曰志府兵所以廢也故特書初諸衛府兵自成丁從軍六十而免其家不免雜徭浸以貧弱逃亡畧盡百姓苦之張説建議請召募壯士充宿衛不問色役謂各色徭役之人皆取不分良賤亦不究其有罪逋逃優為之制逋逃者必争出應募上從之旬日得精兵十三萬分𨽻諸衛更畨上下兵農之分自此始矣冬十一月初令宰相共食實封三百户癸亥十一年春正月帝北巡詔潞州給復五年以并州為太原府置北都二月張嘉貞罷張說與嘉貞不平㑹嘉貞弟嘉佑贓發説勸嘉貞素服待罪于外遂左遷幽州刺史初廣州都督裴伷先下獄上與宰相議其罪嘉貞請杖之説曰刑不上大夫為其近君且所以養亷恥也盖士可殺不可辱臣向廵北邉聞姜皎杖于朝堂皎官登三品亦有微功奈何以皂𨽻待之事往不可追豈宜復蹈前失上深然之嘉貞不悦退謂説曰何論事之深也説曰宰相時來則為之若大臣皆可笞辱行及吾軰矣此言非為伷先乃為天下士君子也嘉貞無以應祭后土于汾陰初上將幸晉陽張説言于上曰汾陰睢上有漢后土祠事具前其禮久廢陛下宜因巡幸修之為農祈糓上從之三月帝至西京夏五月置麗正書院上置麗正書院聚文學之士或修書或侍講以張説為使有司供給優厚中書舍人陸堅洛陽人以為無益徒費欲奏罷之説曰自古君王于無事之時莫不崇宫室廣聲色今天子獨延禮文儒發揮典籍所益者大所損者微陸子之言何不達也秋八月尊獻祖懿祖祔于太廟宣帝名熈神堯皇帝之髙祖為獻祖光帝名天賜宣帝之子為懿祖冬始置長從宿衛命尚書左丞蕭嵩與京兆蒲同岐華州長官選府官兵及白丁一十二萬謂之長從宿衛一年兩畨更代宿衛也州縣毋得役使明年更號長從曰彍騎彍苦郭反滿張弩也其法十人為火五火為團皆有長又擇材勇者為畨頭以習弩射又明年始以彍騎分𨽻十二衛唐十六衛曰左右衛曰驍騎曰武衛曰威衛曰領軍曰金吾曰監門曰千牛每衛各有左右共十六衛凡五府外府之畨上者十二衛受其名簿而配以職除監門千牛左右四衛不須故但十二衛總十二萬為六畨每衛萬人十六年又改彍騎為羽林飛騎考通鑑更令長從為彍騎在十三年二月今依唐書兵制輯二十六年又分羽林置龍武軍十二月改政事為中書門下張說奏改之列五房一吏房二樞機房三兵房四户房五刑禮房于其後分掌庶政甲子十二月春三月以杜暹濮州濮陽人為安西副大都䕶初監察御史杜暹因按事至突騎施突騎施饋之金暹固辭左右曰君寄身異域不宜逆其情乃受之埋之幕下出境移牒令取之敵大驚追之不及及安西都䕶闕暹自給事中居母䘮詔起為之夏六月制選臺閣名臣為諸州刺史上以山東旱命選臺閣名臣出為刺史于是中書侍郎崔沔禮部侍郎韓休京兆長安人等皆出外初張說引崔沔為中書侍郎故事承宣制皆出宰相侍郎署位而已沔曰設官分職上下相維各申所見事乃無失侍郎令之貳也豈得拱黙而已由是事多異同說因是出之秋七月以楊思朂為輔國大將軍劉友益曰宦者稱大将軍始此溪州蠻覃行璋反以思朂為招討使擊擒之故有是命廢皇后王氏姜皎既得罪王皇后愈憂畏不安上猶豫不决者累嵗后兄守一以后無子使僧明悟為后祭南北斗剖霹靂木書天地字及上名佩之事覺廢為庶人守一賜死廢后尋卒後宫思慕不已上亦悔之八月以宇文融為御史中丞融為御史中丞乘驛周流天下事無大小州先牒上勸農使然後申中書省司亦待融指撝然後處决上将大攘四夷急于用度融以嵗終所增緡錢數百萬悉進入官由是有寵議者多言煩擾上令百寮議之公卿皆不敢言户部侍郎楊瑒字瑶光華隂人獨抗議以為括客免税不利居人徵籍外田税使百姓困弊所得不補所失未幾出為華州刺史冬十一月帝如東都羣臣請封禪時張説首建封禪之議而源乾曜不欲為之由是與説不平乙丑十三年春二月以宇文融兼户部侍郎制以所得客户税錢均充所在常平倉本又委使司與州縣議作勸農社使貧富相恤耕耘以時選諸司長官為諸州刺史上自選諸司長官有聲望者十一人為刺史命宰相百官餞于洛濵供張甚盛自書十韻詩賜之左丞楊承令在行中意快快上怒貶睦州别駕夏四月更集仙殿為集賢殿上與中書門下及禮官學士宴于集仙殿上曰仙者慿虗之論朕所不取賢者濟理之具今與卿曹合宴宜更名曰集賢其書院官五品為學士六品以下為直學士以張說知院事右散騎常侍徐堅字元固齊聃之子副之遣使如突厥張説以大駕東巡恐突厥乘間入㓂議加兵守邉召兵部郎中裴光庭字連城行儉子謀之光庭曰封禪者告成也今将升中于天而四夷是懼非所以昭盛徳也突厥屢求和親未許今遣一使徵其大臣從封泰山彼必欣然承命突厥來則四夷君長無不偕來可以偃旗臥鼓矣説即奏行之上遣中書直省袁振諭㫖于突厥小殺毘伽可汗本號小殺者與闕特勒暾欲谷環坐帳下置酒謂振曰吐蕃狗種也奚契丹突厥奴也皆得尚主突厥求婚獨不與何也且吾亦知入蕃宫主皆非天子女今豈問真偽但屢請不獲愧見諸蕃耳振許為之奏請小殺乃遣其大臣阿史徳頡利發阿史徳突厥三字姓頡利發􅋓厥大臣之稱入貢因扈從東巡其後頡利發辭歸厚賜而遣之竟不與婚秋九月禁奏祥瑞上謂宰相曰春秋不書祥瑞惟記有年敇自今州縣毋得更奏祥瑞冬十月作水運渾天成水運渾天上具列宿注水激輪令其自轉晝夜一周别置二輪絡在天外綴以日月逆天而行淹速合度置木匱為地平令儀半在地下又立二木人每刻擊鼓每辰擊鐘機械皆在匱中十一月封泰山車駕發東都百官四夷從行有司輦載供具數百里不絶上備法駕至山足御馬登山與宰相祠官俱登問禮部侍郎賀知章字秀真越州永興人曰前代玉牒之文何故秘之對曰欲密求神仙故不欲人見上曰吾為蒼生祈福耳乃出玉牒宣示羣臣于是親祀昊天上帝于山上羣臣祀五帝百神于山下明日祭皇地祗于社首又明日御帳殿受朝覲赦天下封泰山神為天齊王張説多引兩省吏及所親攝事禮畢推恩往往超入五品而不及百官中書舍人張九齡諫不聽又扈從士卒但加勲而無賜物由是中外怨之以王毛仲為開府儀同三司初隋末國馬皆為盗賊外國所掠唐初纔得牝牡三千匹于赤岸澤在今同州府西南徙之隴右命太僕張萬嵗掌之萬嵗善于其職自貞觀至麟徳馬蕃息至七十萬匹垂拱以後潜耗大半上初即位牧馬有二十四萬匹以王毛仲為閑廐使張景順副之至是馬有四十三萬上之東封以數萬匹從色别為羣望之如雲錦加毛仲開府儀同三司車駕還幸孔子宅至宋州宴從官于宋州上謂張説曰懐州刺史王邱同皎從父兄子餼牽之外一無他獻魏州崔沔供張無錦繡示我以儉濟州裴耀卿字煥之絳州稷山人表數百言莫非規諫且曰人重擾則不足以告成朕常寘之坐隅如三人者不勞人以市恩真良吏矣顧謂刺史宼泚曰比亦屢有以酒饌不豐訴于朕者知卿不借譽于左右也自舉酒賜之由是以邱為尚書左丞沔為散騎侍郎耀卿為定州刺史十二月帝還東都分吏部為十銓親决試判上疑吏部選試不公御史中丞宇文融宻奏請分為十銓以禮部尚書蘇頲等十人掌之試判将畢遽召入禁中决定尚書侍郎皆不得預左庶子吳兢表言陛下曲受讒言不信有司非居上臨人推誠感物之道昔漢之賢相尚不對錢穀之數不問鬬死之人况萬乘之君豈得下行銓選之事乎上雖不即從明年復故大有年東都斗米十五錢青齊五錢粟三錢丙寅十四年春正月命張說修五禮張説奏今之五禮貞觀顯慶兩書不同或未折衷望與學士討論刪改從之夏四月以李元紘同平章事元紘以清儉著故用為相張説罷上召河南尹崔隠甫貝州武城人欲用之張説薄其無文奏擬金吾大将軍說有才智而好賄百官白事有不合者好面折之惡宇文融之為人且患其權重融所建多抑之于是隠甫融及御史中丞李林甫共奏説引術士占星狥私納賂敕源乾曜等于御史臺鞫之事頗有狀上使髙力士視説還奏說蓬首垢面席藁待罪上意憐之力士因言説有功于國上以為然但罷中書令秋七月河南北大水八月魏州河溢以杜暹同平章事冬十月黑水靺鞨今黑龍江地古為肅慎氏隋唐曰黑水靺鞨遣使入見黒水靺鞨遣使入見上以其國為州置長史胡三省注史當作吏勃海王武藝聞之曰黑水不我告而請吏于唐是必與唐攻我也遣其弟門藝将兵擊之門藝曰黑水請吏于唐而我擊之此亡國之勢也武藝疆遣之門藝棄衆來奔武藝表請殺之上密遣門藝詣安西報云已流嶺南武藝知之上表曰大國當示人以信豈得為此欺誑上以鴻臚少卿李道邃等漏洩皆坐左遷暫遣門藝詣嶺南以報之後武藝冦登州上遣門藝發幽州兵討之無功而還武藝怨門藝密遣客刺之不死丁卯十五年春正月吐蕃入㓂王君􅎢追擊至青海西破之初吐蕃自恃其彊致書用敵國禮上怒張説言曰吐蕃無禮誠宜誅夷但連兵十年甘凉河鄯不勝其弊聞其悔過求和願聽欵服以紓邉人上曰俟與君􅎢議之説退謂源乾曜曰君􅎢勇而無謀常思僥倖吾言不必用矣及君􅎢入朝果請深入討之會吐蕃㓂甘州焚掠而歸君􅎢勒兵躡其後及于青海之西乘氷而渡破其後軍獲其輜重羊馬萬計而還君􅎢以功遷左羽林大将上由是益事邉功是秋吐蕃攻䧟𤓰州執刺史田元獻及王君􅎢之父進攻玉門君􅎢西望而泣竟不敢出兵吐蕃毁瓜州城而去𤓰州注見前隋縣宋白曰漢廢玉門關徙屯其人于此故名唐天寳後廢今仍置縣屬西安府夏五月作十王宅百孫院上附苑城為十王宅以居皇子不復出閣雖開府置官屬及領藩鎮惟侍讀時入授書自餘嵗時通名而已及諸孫浸多又置百孫院太子亦不居東宫常在乘輿所幸之别院夏至賜近貴絲人一綟即計反猶言一繚也上命妃嬪以下宫中育蠶以知女功至是以其絲賜貴近秋七月冀州河溢盗殺王君􅎢初囬紇契秘思結渾四部度磧徙居甘凉之間以避黙啜王君􅎢微時往來其間為所輕及為河西莭度以法繩之四部恥怨密遣使詣東都自訴君􅎢遽奏四部謀叛上遣中使往察之諸部竟不得直于是流其部長囘紇承宗等于嶺南承宗族子䕶輸合衆報讐會君􅎢邀擊吐蕃于肅州隋置今𨽻甘肅䕶輸伏兵殺之突厥遣使入貢吐蕃之冦𤓰州也遺突厥毘伽可汗書欲與之俱入㓂毘伽獻其書上嘉之聽于西受降城互市嵗齎縑帛數十萬匹就市戎馬由是國馬益壮綱目誤作耗今依通鑑改冬十月帝還西京以蕭嵩為河西節度副大使時王君􅎢新敗河隴震駭嵩以裴寛聞喜人為判官與君􅎢判官牛仙客涇州鶉觚人俱掌軍政人心寖安仙客本鶉觚小吏以才幹為君􅎢腹心嵩又奏建康軍使張守珪為𤓰州刺史帥餘衆築故城板幹裁立吐蕃猝至守珪于城上置酒作樂蕃疑有備不敢攻而退守珪縱兵擊之蕃敗走守珪乃修復城市收合流散皆復舊業朝廷嘉其功以為𤓰州都督吐蕃大将悉諾邏威名甚盛嵩縱反間于其國云與中國通謀贊普誅之由是少衰建康軍注見前張守珪陜州河北人戊辰十六年春正月以宇文融充九河使融請用禹貢九河故道注見前開稲田并囬易陸運錢先是江淮漕至陜陸運率兩斛計庸錢千今融令先納此錢而囬易之于民也官收其利収其不盡用之餘利興役不息事多不就二月以張說兼集賢學士説雖罷政事專文史之任朝廷每有大事上常遣中使訪之秋八月行開元大衍厯冬十二月立長征兵分番酬勲法敇長征兵無有還期人皆難堪宜分五番嵗遣一番還家洗沐五年酬勲五轉制户籍三嵗一定分為九等己巳十七年春三月朔方節度使信安王禕吴王恪之孫攻吐蕃㧞石堡城在今西寧府西南唐書地理志定戎城南隔澗七里有故石堡城初吐蕃䧟石堡城留兵據之侵掠河右上命朔方節度使信安王禕與河西隴右同議攻取諸將咸以為石堡險逺難攻其城四面懸崖數千仞石路盤曲長三四里禕不聽引兵深入急攻㧞之分兵據要害拓地千餘里上大悦更命曰振武軍限明經進士及第每嵗毋過百人唐取士科有進士明經凡明經先帖文後口試經問大義十條答時務䇿三道分上上上中上下中上凡四等為及第進士試時務䇿五道帖一大經經䇿全通為甲第䇿通四帖過四以上為一第國子祭酒楊瑒奏流外出身自諸衛錄事及五省令史外官諸吏等謂之流外每嵗二千餘人而明經進士不能居其什一則服勤道業之士不如胥吏之得仕也臣恐儒風浸墜亷恥日䘮若以出身人太多則應諸色裁損又奏主司帖試明經取所習經掩其兩端其間惟開一行裁紙為帖凡帖三字隨時增損可否不一或得四得五得六者為通不求大指專取難知問以孤經絶句或年月日請自今並帖平文上甚然之夏四月禘于太廟唐初袷則序昭穆禘則各祀于其室至是太常少卿韋縚安石兄子等奏如此則禘與常饗不異請禘祫皆序昭穆從之五月杜暹李元紘源乾曜罷以宇文融裴光庭同平章事蕭嵩兼中書令嵩于十一年冬同平章事張説張嘉貞李元紘杜暹相繼為相源乾曜以清謹自守唯諾署名而已元紘暹議事異同更相奏列上不悦貶暹荆州長史元紘曹州刺史乾曜罷為左丞相以融光庭平章事嵩兼中書令遥領河西秋八月以帝生日為千秋節八月五日上以生日宴百官于花萼樓下丞相源乾曜張説表請以是日為千秋節布于天下咸令宴樂移社就之古以立秋後五戊為社此不拘戊日移于八月五日也工部尚書張嘉貞卒嘉貞不營家産有勸其市田宅者曰吾貴為宰相何憂寒餒比見朝士廣占良田身沒之曰適足為無頼子弟酒食之資吾不取也禁私賣銅鉛錫敕以人間多盗鑄錢始禁私賣銅鉛錫及以銅為器皿其采銅鉛錫者官為市取貶宇文融為汝州刺史融性精敏應對辯給以治財賦得幸廣置諸吏競為聚歛由是百官浸失其職而上心益侈百姓苦之在相位謂人曰使吾居此數月則海内無事矣信安王禕以軍功有寵融疾之使御史李寅彈之禕聞之先以白上明日寅表果入上怒融坐貶既而國用不足上復思之會有飛状告融贓賄隠匿官錢者坐貶巖州道卒然是後言財利以取貴仕者皆祖之巖州唐置故城在今廣西鬰林州境冬十月戊午朔日食不盡如鈎庚午十八年春二月初令百官休日選勝行樂初令百官於春月旬休選勝行樂自宰相至員外郎凡十二筵各賜錢五千緍或御花萼樓邀其歸騎留飲迭使起舞盡歡而去夏四月以裴光庭兼吏部尚書先是選司注官惟視其人之能否或不次超擢或老於下位有出身二十餘年不得禄者光庭始奏用循資格各以罷官謂罷劇就聞者若干選而集謂罷官之後經選凡幾各以多少為次而集於吏部官髙者選少卑者選多無問能否選滿則注非負譴者有升無降愚庸皆喜謂之聖書而才俊之士無不怨嗟宋璟争之不能得六月以忠王浚即陜王嗣昇更封改名領河北道行軍元帥帥十八總管討奚契丹初契丹王季邵固遣可突干入貢李元紘不禮焉張說曰可突干狡而狠專其國政久矣人心附之今失其心必不來矣至是可突干弑邵固叛降突厥制以忠王浚領元帥御史大夫李朝隠京兆尹裴伷先副之帥十八總管以討奚契丹命浚與百官相見張説謂人曰吾嘗觀太宗畫像雅類忠王此社稷之福也然浚竟不行洛水溢冬十月吐蕃遣使入貢吐蕃兵數敗而懼乃求和親忠王友皇甫惟明因奏事從容言和親之利上曰贊普嘗遺吾書悖慢此何可捨對曰贊普當開元初年尚幼穉安能為此殆邉将詐為之欲以激怒陛下耳夫邉境有事則将吏得以因縁盗匿官物妄述功状以取勲爵此皆姦臣之利非國家之福也兵連不解日費千金河西隴右由兹困弊陛下誠命一使往視公主因與贊普相約結使之稽顙稱臣永息邉患豈非御逺人之長䇿乎上説上即命惟明與内侍張元方使於吐蕃贊普大喜遣其大臣論名悉獵隨惟明入貢遂復欵附是嵗天下奏死罪二十四人辛未十九年春正月王毛仲有罪賜死初毛仲以嚴察幹力有寵百官附之輻輳毛仲嫁女上問何須毛仲頓首謝曰臣萬事已備但未得客上曰知卿所不能致者一人耳必宋璟也朕為汝召客明日詔宰相與諸達官詣之日中璟乃至先執酒西向拜謝飲不盡巵遽稱腹痛而歸其剛直之操老而彌篤如此毛仲驕恣日甚嘗求兵部尚書不得怏怏上由是不悅時上寵任宦官往往為三品將軍門施棨㦸楊思朂髙力士尤貴幸毛仲視之若無人毛仲妻産子三日上命力士賜之甚厚且授兒五品官毛仲抱兒示力士曰此豈不堪三品邪力士歸奏之上大怒曰昔誅韋氏此賊心持兩端今日乃敢以赤子怨我力士因言北門奴官毛仲本帝家奴補萬騎故云太盛不蚤除之必生大患上乃貶毛仲逺州追賜死自是宦官勢甚力士尤為上所寵信表奏皆先呈之小事即决勢傾内外以詩書賜吐蕃吐蕃使者稱公主求毛詩春秋禮記正字于休烈志寧曾孫上疏曰東平王漢之懿親求史記諸子漢猶不與況吐蕃國之宼讐今資之以書使知權畧愈生變詐非中國之利也裴光庭等奏吐蕃久叛新服因以有請賜以詩書庶使漸陶聲教化流無外休烈徒知書有權畧變詐之語不知忠信禮義皆從書出也遂與之上躬耕於興慶宫側三月置太公廟令兩京諸州各置太公廟以張良配享選古名將以備十哲以二八月上戊致祭如孔子禮冬十二月幸東都壬申二十年春正月遣信安王禕將兵擊奚契丹大破之以信安王禕為行軍總管户部侍郎裴耀卿副之分道擊奚契丹大破之可突干逺遁其部李詩𤨏髙帥五千餘帳來降禕乃引軍還二月甲戌朔日食敕裴光庭蕭嵩分押左右廂兵胡三省曰此分押南牙兵也秋八月辛未朔日食九月開元禮成初命張説與諸學士刋定五禮説卒蕭嵩繼之請依上元敕父在為母齊衰三年從之至是書成上之號曰開元禮冬十一月祀后土於汾隂十二月還西京蕭嵩奏自祀后土以來年榖屢豐宜因還京賽祠上從之癸酉二十一年春二月裴光庭卒太常博士孫琬議光庭用循資格失勸奨之道請諡曰克其子訟之賜諡忠獻以韓休同平章事上問蕭嵩可以代光庭者嵩欲薦散騎常侍王邱邱讓于韓休嵩言之上以為相休為人峭直不干榮利始嵩以為恬和易制故引之及與共事守正不阿嵩漸惡之宋璟歎曰不意韓休乃能如是上或宴樂遊獵小有過差輙謂左右曰韓休知否言終疏奏已至左右曰韓休為相陛下殊瘦于舊何不逐之上歎曰吾貌雖痩天下必肥蕭嵩奏事常順指既退吾寝不安休常力争既退吾寝乃安吾用休為社禝耳非為身也有供奉侏儒黄㼐上常慿之以行􅃂賜甚厚一日晩入上怪之對曰曏違捕盗官與臣争道臣掀之墜馬故晚因下階叩頭上曰但使外無章奏汝亦無憂有頃京兆奏其状上即叱出杖殺之夏六月制選人有才行者委吏部臨時擢用時雖有此制而有司以循資格便于已猶踵行之是時官自三師以下一萬七千六百八十六員吏自佐史以上五萬七千四百一十六員而入仕之塗甚多不可勝紀秋七月乙丑朔日食冬十月左丞相宋璟致仕歸東都蕭嵩韓休罷以裴耀卿同平章事起復張九齡同平章事韓休數與嵩争論于上前面折嵩短嵩因乞骸骨上曰朕未厭卿卿何為遽去對曰陛下未厭臣故臣得從容引去若已厭臣首領且不保安能自遂因泣下上亦為之動容乃皆以為丞相罷政事時九齡居母䘮自韶州隋置今為府屬廣東入見求終䘮不許分天下為十五道置采訪使京畿治西京都畿治東都闗内京官遥領河南治汴今開封府河東治蒲今蒲州府河北治魏今大名府隴右治鄯今西寧府山南東治襄今襄陽府西治梁今漢中府劒南治益今成都府淮南治揚今揚州府江南東治蘇今蘇州府西治洪今南昌府黔中治黔今重慶府嶺南治廣今廣州府凡十五道各置采訪使以六條檢察非法兩畿以中丞領之餘皆擇賢刺史領之惟變革舊章乃須報可自餘聼便宜從事先行後聞以楊慎矜知太府出納楊政道隋齊王腖之子之子崇禮為太府卿二十餘年前後莫能及至是以户部尚書致仕上問宰相崇禮之子誰能繼其父者以慎矜對乃擢為監察御史知太府出納上甚悦之慎矜奏諸州所輸布帛有漬汚穿破者皆下本州徴折估錢轉市輕貨徴調始繁矣甲戌二十二年春正月幸東都二月秦州地震夏四月以裴耀卿為侍中張九齡為中書令李林甫同三品林甫柔侫多狡數深結宦官及妃嬪家伺候上動静無不知之由是每奏對常稱㫖時武惠妃寵傾後宫生夀王瑁諸子莫得為比太子浸疎薄林甫乃因宦官言於惠妃願盡力保䕶夀王妃徳之陰為内助上芟麥於苑中上種麥苑中帥太子以下親往芟之謂曰此所薦宗廟不敢不親且欲汝曹知稼穡艱難耳以裴耀卿為江淮河南轉運使置河口汴水入河之口輸埸初上以闗中久雨榖貴將幸東都召耀卿謀之耀卿曰闗中帝業所興當百代不易但地狹榖少故乘輿時幸東都以寛之臣聞貞觀永徽之際禄廪不多嵗漕闗東一二十萬石足以周贍今用度浸廣運數倍于前猶不能給故使陛下數冒寒暑以恤西人今若使司農租米悉輸東都而轉漕以實闗中則闗中有數年之儲而無水旱之憂矣且吳人不習河漕所在停留遂生隠盗臣請於河口置倉使吳船至彼輸米而去官自雇載分入河洛于三門東西各置一倉至者貯納水險而止水通則下或開山路車運而過則無復留滯省費鉅萬矣上深然其言至是以耀卿為江淮河南轉運使於河口置輸埸埸東置河隂倉西置栢崖倉三門東置集津倉西置鹽倉鑿漕渠十八里以避三門之險先是舟運江淮之米至東都含嘉倉僦車陸運三百里至陜率兩斛用千錢耀卿以江淮舟運悉輸河隂倉更用舟運至含嘉倉及太原倉自太原倉入渭至闗中凡三嵗運米七百萬斛省僦車錢三百萬緡或說耀卿獻之耀卿曰此公家贏縮之利耳奈何以市寵乎悉奏以為市糴錢以方士張果晦郷里世系隠中條山為銀青光禄大夫初張果自言有神仙術堯時為侍中多往來恒山中相州刺史韋濟薦之上遣璽書迎入禁中以為光禄大夫號通元先生厚賜遣歸後果卒好事者以為尸解上由是頗信神仙冬十二月戊子朔曰食幽州節度使張守珪斬契丹王屈烈及可突干時可突干連年為邉患守珪屢擊破之可突干困廹遣使詐降守珪使管記王悔就撫之悔至而契丹初無降意宻遣人引突厥謀殺悔悔知之以牙官李過折與可突干争權不恊說使圖之過折夜勒兵斬屈烈及可突干帥衆來降上美守珪之功欲以為相張九齡曰宰相代天理物非賞功之官也上曰假以名而不使任其職可也對曰惟器與名不可以假人君之所司也守珪纔破契丹即以為相若盡滅奚厥將以何官賞之乃以為羽林大將軍兼御史大夫李過折既降即以為契丹王已而過折為其下涅禮所殺上以書責涅禮而赦之因以為松謨都督置病坊禁京城匄者置病坊以廩之乙亥二十三年春正月耕籍田御樓酺宴上耕耤田九推乃止公卿以下皆終畝上御五鳳樓酺宴時命三百里内刺史縣令各率所部音樂集樓下較勝負懐州刺史以車載樂工數百皆衣文繡魯山唐縣今屬汝州令元徳秀字紫芝河南人惟遣樂工數人連袂歌于蒍即徳秀所為歌名其詞不傳上曰懐州之人其塗炭乎立以刺史為散官徳秀性介潔質樸士大夫服其髙三月張瑝張琇殺殿中侍御史楊汪以復父讐敇杖殺之初張審素為嶲州都督或告其贓汚制遣御史楊汪按之總管督下將董元禮以兵圍汪脅令善奏會救至得解汪遂奏審素謀反坐斬二子瑝琇皆幼流嶺表事在十九年至是瑝琇逃歸手殺汪于都城繋表于斧言父寃狀欲之江外殺與汪同謀者為有司所得議者多言二子穉年孝烈宜加矜宥張九齡亦欲活之裴耀卿李林甫以為壊法不可上然之乃下敕曰國家設法期于止殺各伸為子之志誰非狥孝之人展轉相讐何所限極宜付河南府杖殺士民憐之為作哀誄歛錢𦵏之冬閏十月壬午朔日食十二月册夀王妃楊氏胡三省曰為後納妃亂國張本妃故蜀州司户元琰之女也丙子二十四年春二月頒令長新戒皇太子更名瑛諸皇子皆更之忠王浚改曰璵即肅宗故特表之三月敇禮部侍郎掌貢舉舊制考功員外郎掌貢舉有進士陵侮之議者以員外郎位卑不能服衆敇委禮部侍郎夏四月張守珪使討擊使安祿山討奚契丹敗績張守珪使平盧討擊使安禄山討奚契丹敗績守珪奏請斬之禄山臨刑呼曰大夫欲滅奚契丹柰何殺禄山乃更執送京師張九齡批曰昔穰苴誅莊賈司馬穰苴為齊景公将監軍荘賈後期斬之孫武斬宫嬪吴王闔閭使孫武以宫中美人試兵法寵姬二人為隊長美人笑武斬隊長以狥守珪軍令若行禄山不宜免死上惜其才赦之九齡固争曰失律䘮師不可不誅且其貌有反相不殺必為後患上曰卿勿以王夷甫晉王衍之字識石勒事見前枉害忠良竟赦之禄山本營州雜部初名阿犖山母再適安氏冒其姓後其部落破散遂與安氏子思順逃來狡㸃善揣人情守珪愛之養以為子又有史窣干者與禄山同里閈亦以驍勇名聞守珪奏為果毅累遷将軍後入奏上與語悦之賜名思明集覽阿犖山新舊書俱作軋犖山按軋犖山突厥所謂戰鬭神也安禄山夲營州雜部姓康氏其母阿史徳為巫居突厥中禱子于軋犖山及産有光照穹廬鳥獸盡鳴范陽節度使張仁愿搜廬帳欲殺之匿而獲免母以神所命遂字軋犖山父死母再適安延偃故更名安祿山胡氏寅曰祿山敗軍其罪應誅九齡直以軍法争論其理自勝乃言未來之事斷其後患故元宗得以拒之增宗廟籩豆數加母黨服上因耤田赦令有司議增宗廟籩豆之數及服紀未通者太常卿韋縚奏請宗廟每坐籩豆十二兵部侍郎張均説之子職方郎中韋述宏機曾孫太子賔客崔沔等議禮由舊章不必加數上固欲增之縚請每室加籩豆各六實以新果珍饈從之縚又奏請加外祖父母為大功九月姨舅加小功五月堂舅堂姨舅母並加至袒免沔述請依儀禮䘮服為定敕姨舅皆服小功舅母不得全降宜服緦麻堂姨舅宜服袒免秋八月張九齡上千秋金鑑録千秋節羣臣皆獻寳鏡九齡以為以鏡自照見形容以人自照見吉凶乃述前世興廢之源為書五卷謂之千秋金鑑録上之賜書褒美冬十月帝還西京先是敕以來年二月還西京會宫中有怪上召宰相議西還裴耀卿張九齡以農收未畢請俟仲冬李林甫潛知上㫖獨留言曰長安洛陽陛下東西宫耳往來行幸何更擇時借使妨農但應蠲所過租稅而已臣請宣示有司即日西行從之上過陜州以刺史盧奐有異政題贊于聽事而去子盧奐懐慎之十一月賜朔方節度使牛仙客爵隴西縣公仙客前在河西能節用度勤職業倉庫充實器械精利上嘉之欲加尚書張九齡曰不可尚書古之納言唐興以來惟舊相及􅆒厯中外有徳望者乃為之仙客本河湟使典今驟居清要恐羞朝廷上曰然則但加實封可乎對曰封爵所以勸有功也邊将實倉庫修器械乃常務耳不足為功欲賞其勤賜之金帛可也上黙然李林甫曰仙客宰相才也何有于尚書上悦明日上復以仙客實封為言九齡固執如初上怒變色曰卿嫌仙客寒徹如卿有何閥閲九齡曰臣嶺海孤賤不如仙客生于中華然臣出入臺閣典司誥命有年矣仙客邉隅小吏目不知書若大任之恐不愜衆望林甫退而言曰茍有才識何必辭學天子用人何有不可乃賜仙客爵隴西縣公食實封三百户裴耀卿張九齡罷為左右丞相以李林甫兼中書令牛仙客同三品初上欲以李林甫為相問于張九齡九齡對曰宰相繫國安危陛下相林甫臣恐異日為廟社之憂上不從是時上在位嵗久漸肆奢欲怠于政事而九齡遇事無細大皆力争之林甫日夜短九齡于上上由是浸疎九齡林甫引蕭炅為户部侍郎炅素不學嘗讀伏臘為伏獵中書侍郎嚴挺之言于九齡曰省中豈容有伏獵侍郎乃出炅刺岐州故林甫怨挺之上積前事以耀卿九齡阿黨並拜丞相罷政事先是九齡既見疎恐遂為林甫所危因上賜白羽扇乃獻賦自况其末曰茍効用之得所雖殺身而何忌又曰縱秋氣之移奪終感恩于篋中上雖優荅然卒罷之以林甫為中書令牛仙客同三品領節度如故貶挺之為洛州刺史上即位以來所用之相姚崇尚通宋璟尚法張嘉貞尚吏張説尚文李元紘杜暹尚儉韓休張九齡尚直各其所長也九齡既得罪朝廷之上皆容身保位無復直言林甫欲蔽主擅權明謂諸諌官曰今明主在上羣臣将順之不暇烏用多言諸君不見立仗馬乎食三品料一鳴輙斥去悔之何及補闕杜璡嘗上書言事黜為下邽令自是諌諍路絶仙客既為林甫所引進專給唯諾而已林甫城府深宻人莫窺其際好以甘言㗖人而隂中傷之不露辭色凡為上所厚者始則親結之及位勢稍逼輙以計去之雖老奸巨猾無能逃其術者丁丑二十五年春正月置元學博士每嵗依明經舉二月立明經問義進士試經法敕曰進士以聲韻為學多昧古今明經以帖誦為功罕窮㫖趣自今明經問大義十條對時務策三道進士試大經十帖夏四月殺監察御史周子諒汝南人貶張九齡為荆州長史周子諒彈牛仙客非宰相才引䜟書為證上怒甚命㩧于殿庭絶而復蘇仍杖之朝堂流瀼州唐置今南府上思州是至藍田而死李林甫言子諒九齡所薦也乃貶九齡荆州長史廢太子瑛鄂王瑶光王琚而殺之上之在藩也趙麗妃生太子瑛皇甫徳儀生鄂王瑶劉才人生光王琚及即位幸武惠妃生夀王瑁麗妃等皆愛弛太子與瑶琚以母失職有怨望語駙馬都尉楊洄尚咸宜公主武惠妃女常伺三子過失以告惠妃惠妃泣訴于上上大怒欲皆廢之張九齡曰陛下享國長久子孫蕃昌天下方為慶幸今三子不聞大過奈何一旦以無根之語廢之乎且太子天下本不可輕摇陛下必欲為此臣不敢奉詔上不悦惠妃宻使宫奴謂九齡曰有廢必有興公為之援宰相可長處九齡叱之以其語白上上為之動容故迄九齡罷相太子得無動至是楊洄譖太子鄂王光王潛搆異謀上召宰相謀之李林甫對曰此陛下家事非臣等所宜預上意乃决使宦官宣制于宫中廢為庶人尋賜死瑶琚皆好學有才識死不以罪人皆惜之募丁壯長充邊軍敕以方隅底定令中書門下量軍鎮閑劇利害審計兵防定額召募丁壯長充邊軍增給田宅務加優恤詔選宗子補官秋七月大理寺奏有鵲來巢賜李林甫爵晉國公牛仙客豳國公大理少卿徐嶠奏今嵗天下斷死刑五十八獄院由來殺氣太盛鳥鵲不棲今有鵲巢其樹于是百官以刑措表賀上歸功宰輔故有是命行和糴法停江淮運先是西北多宿重兵地租營田皆不能贍始用和糴之法有彭果者獻策請推之闗中敕以榖賤傷農令增時價什二三和糴東西畿粟各數百萬斛停今年江淮運租自是闗中蓄積羨溢車駕不復行東都矣冬十月開府儀同三司廣平公宋璟卒諡曰文貞十二月惠妃武氏薨追諡貞順皇后初上欲以妃為后或上言武氏乃不戴天之讐豈可以為國母且妃既有子若登宸極太子必危上乃止至是薨贈貞順皇后御批歴代通鑑輯覽卷五十四

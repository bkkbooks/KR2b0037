body:
  text: 秦使太尉索稜鎮隴西招撫西秦乞伏乾歸遣使謝罪請降秦拜乾歸河南王太子熾磐平昌公已而西秦復叛攻隴西索稜郡降于西秦秦王興命羣臣舉賢才秦王興命羣臣搜舉賢才右僕射梁喜曰臣纍受詔而未得其人世可謂乏才矣興曰自古帝王之興未嘗取相于昔人待將于將來隨時任才皆能致治卿自識拔不明安得逺誣四海乎羣臣咸悅二月劉藩等克始興斬徐道覆三月劉裕始受太尉中書監之命裕以劉穆之為司馬穆之舉孟昶故吏謝晦字宣明安兄據之曾孫裕以為參軍晦博贍多通裕深加賞愛夏四月盧循寇番禺不克走交州刺史杜慧度交址朱鳶人擊斬之孫處拔番禺事見前城守已固盧循收兵至遂圍之處拒守二十餘日沈田子言于劉藩曰畨禺本賊巢穴恐有內變乃引兵擊之循兵屢敗遂奔交州至龍編津後漢書郡國志交址郡治龍編水經注立州之始蛟龍蟠編于水南北二津故名刺史杜慧度悉散家財以賞軍士與循合戰擲雉尾炬胡三省注束草之一頭施鐡鏃草其尾散開如雉尾然焚其艦以步兵夾岸射之循艦燃衆潰自投于水慧度取尸斬首函送建康秋七月柔然獻馬求昏于燕柔然可汗斛律遣使獻馬求昏于燕燕羣臣議公主不宜下降燕王跋曰朕方崇信殊俗奈何棄之乃以其女妻斛律跋勤于政事勸課農桑省徭役薄賦斂每遣守宰必親引見問為政之要以觀其能燕人悅之壬子八年西秦玉乞伏熾磐永康元年北涼元始元年夏四月以劉毅都督荆寧秦雍軍事荆州刺史劉道規以疾求歸詔以劉毅代之道規在州纍年秋毫無犯及歸府庫帷幕儼然若舊隨身甲士二人遷席于舟中道規刑之于市未幾道規卒毅性剛愎自謂功與裕埒雖權事推裕而心不服及居方嶽常怏怏不得志裕每柔而順之毅驕縱滋甚及敗于桑落事見前知物情去已彌復憤激裕素不學而毅頗涉文雅故朝士有清望者多歸之與僕射謝混丹陽尹郗僧施超從孫深相憑結既據上流隂有圖裕之志求兼督交廣以僧施為南蠻校尉毛修之為南郡太守裕皆許之毅復表求至京口辭墓裕往會之將軍胡藩言于裕曰公謂劉衛軍終能為公下乎裕默然久之曰卿謂何如藩曰連百萬之衆攻必取戰必克毅固以此服公至于涉獵傳記一談一詠自許以為雄豪以是搢紳白面之士咸歸之恐終不為公下不如因會取之裕曰吾與毅俱有克復之功其過未彰不可自相圖也六月西秦乞伏公府國仁之子弒其君乾歸秋八月世子熾磐討殺之而自立乞伏公府弒西秦王乾歸及其子十餘人走保大夏注見前熾磐遣其弟智達討之秦人多勸秦王興乘亂取熾磐興曰伐喪非禮也夏王勃勃欲攻之亦以王買德言而止智達擊破公府獲而轘之熾磐自立為河南王遷都枹罕皇后王氏崩九月葬僖皇后冬十月劉裕帥師襲荆州殺都督劉毅毅至江陵多變易守宰輒割江豫文武兵力萬餘人以自隨會疾篤郗僧施勸毅請從弟兖州刺史藩以自副劉裕偽許之藩自廣陵入朝裕以詔書罪狀毅以藩及謝混共謀不軌賜藩混死遂帥諸軍發建康王鎮惡請給百舸為前驅晝夜兼行揚聲言劉兖州謂劉藩時荆州尚未知藩死故偽言之西上十月至豫章口注見前去江陵城二十里捨船步上舸留一二人對舸岸上立六七旗旗下置鼓語所留人計我將至城便鼓嚴令若後有大軍狀又分遣人燒江津舸艦鎮惡徑前襲城未至五六里毅乃覺之行令閉諸城門未及下關鎮惡已馳入與城內兵鬬兵散毅帥左右突出夜投佛寺寺僧拒之乃縊而死裕至江陵殺郗僧施毛修之素自結于裕特宥之初謝混與毅欵昵混從兄淡常以為憂漸與之疏且謂弟璞曰益壽此性終當破家至是果驗毅從父鎮之間居京口不應辟召嘗謂毅及藩曰汝輩才器足以得志但恐不久耳我不就爾求財位亦不同爾受罪纍每見毅藩導從到門輒詬之毅甚敬畏至是裕奏徵為散騎常侍固辭不至益謝淡字景恆安之孫夀謝混小字北涼遷于姑臧先是北涼拔姑臧至是蒙遜徙都焉大赦改元稱河西王置官僚十二月遣益州刺史朱齡石字伯兒沛郡人帥師伐蜀劉裕謀伐蜀以齡石有武幹練吏職以為益州刺史率將軍臧熹蒯恩字道恩蘭陵人劉鍾字世之彭城人等伐蜀裕與齡石密謀曰往年劉敬宣出黃虎地名近涪城今四川綿州梓潼縣有黃蘆城蓋黃虎之訛也無功而還賊謂我今應從外水往而料我當出其不意猶從內水來也如此必以重兵守涪城以備內道若向黃虎正墮其計今以大衆自外水取成都疑兵出內水此制敵之竒也裕又慮此聲先馳賊審虛實别有函書封付齡石署函邊曰至白帝乃開諸軍雖進而未知處分所由劉裕自加太傅揚州牧復辭不受癸丑九年夏鳳翔元年春二月劉裕還建康三月殺豫州刺史諸葛長民初裕之西征也留長民監留府事而疑其難獨任乃加劉穆之建武將軍置吏給兵以防之既而長民驕縱貪侈懼裕歸按之聞劉毅被誅謂所親曰往年醢彭越今年殺韓信禍其至矣問穆之曰人言太尉與我不平何以至此穆之曰公泝流逺征以老母稚子委節下若一毫不盡豈容如此長民意乃小安長民弟黎民説長民因裕未還圖之長民猶豫未發既而歎曰貧賤常思富貴富貴必履危機今日欲為丹陽布衣豈可得邪因遺冀州刺史劉敬宣書曰盤龍專擅自取夷滅異端將盡世路方夷富貴之事相與共之敬宣報曰下官常懼福過災生方思避盈居損富貴之旨非所敢當且使以書呈裕裕曰阿夀故為不負我也夀盤龍劉毅小字阿劉敬宣小字穆之憂長民為變問參軍何承天東海郯人承天曰公昔年自左里還入石頭甚脫爾猶言輕脫今還宜加重慎穆之曰非君不聞此言至是裕自江陵東還前刻至日而每淹留不進長民與公卿頻日候于新亭二月晦裕乃輕舟徑進潛入東府三月朔長民聞之驚趨至門裕伏壯士丁旿等于幔中引長民郤人密語旿自幔後出拉殺之輿尸付廷尉并殺其三弟詔申土斷之法併省流寓郡縣劉裕上表曰大司馬溫以民無定本傷治為深庚戌土斷事見前以一其業于時財阜國豐實由于此今漸頺弛請申前制于是依界土斷諸流寓郡縣多所並省夏築統萬城今陜西榆林府懷逺縣有夏州故城元和志夏州即赫連勃勃所都其城土色白而牢固夏王勃勃以叱千代北復姓阿利領將作大匠發夷夏十萬人築都城于朔方黑水之南水經注奢延水又東黑水入焉赫連夏于此築城也右奢延水即無定河在榆林黑水在鄂爾多斯翼中旗西南蒙古名庫葛爾黑河曰朕方統一天下君臨萬邦新城宜名統萬阿利性巧而殘忍蒸土築城錐入一寸即殺作者而并築之勃勃以為忠委任之凡造兵器成呈之工人必有死者射甲不入則斬弓人入則斬甲匠由是器物皆精利秋七月朱齡石入成都譙縱走死詔齡石監六郡軍事齡石等至白帝發函書曰衆軍悉從外水取成都臧熹從中水即雒江出什邡縣西北合綿湔牛鞞諸水隨地易名而中水為其通稱下流至瀘州入江取廣漢晉廣漢郡治廣漢故城在今潼川府遂寧縣老弱乘高艦從內水向黃虎于是諸軍倍道兼行譙縱果使譙道福以重兵守涪城備內水齡石至平模即彭模注見前去成都二百里縱遣侯暉夾岸築城以拒之齡石謂劉鍾曰今賊嚴兵固險攻之未必可拔且欲養鋭以伺其隙何如鍾曰不然前聲言大衆向內水道福不敢捨涪城今重軍猝至侯暉之徒已破膽矣所以阻兵守險是其懼不敢戰也因而攻之其勢必克若援兵相守彼將知人虛實涪軍忽來并力拒我求戰不獲軍食無資大事去矣齡石從之七月攻其北城克之斬侯暉南城亦潰于是捨船步進賊營望風相次奔潰譙縱棄城出走齡石遂入成都誅縱宗親餘皆安堵使復其業縱出辭墓其女曰走必不免秪取辱焉死于先人之墓可也不從去投道福不納乃縊而死詔以齡石進監梁秦州六郡諸軍事縱出走時尚書令馬耽封庫以待晉師晉師既入齡石徙馬耽于越嶲耽曰朱侯不送我京師欲滅口也我必不免乃盥洗而卧引繩而死甲寅十年魏神瑞元年是嵗南涼亡大國二秦魏小國五西涼北涼燕夏西秦凡七僭國春三月劉裕廢譙王文思為庶人荆雍都督司馬休之頗得江漢民心子譙王文思繼譙王尚之後在建康性凶暴好通輕俠劉裕惡之有司奏文思擅殺國吏詔誅其黨而宥文思休之上疏謝罪請解所任裕不許而執文思送之令自訓厲欲使殺之休之但表廢文思以書陳謝裕不説使江州刺史孟懷玉兼督豫州六郡以備之夏五月秦尚書令姚弼興庶子有罪免秦廣平公弼有寵于秦王興弼先為雍州刺史薑諂而附之勸弼求入朝興召以為尚書令弼遂結興左右謀傾東宫僕射梁喜等言于興曰父子之際人所難言然君臣之義不薄于父子故臣等不得默然廣平公弼潛有奪嫡之志道路皆言陛下將有廢立之計信有之乎興曰豈有此耶喜曰茍無之則陛下愛弼適所以禍之願去其左右損其威權非特安弼乃所以安宗社也興不應會興有疾弼潛聚衆欲作亂將軍劉羌泣以告興梁喜等復請誅弼興不得已乃免弼尚書令還第久之興有疾弼謀作亂聚兵于第興聞之怒收弼黨唐盛孫元誅之將殺弼太子泓流涕固請乃赦之西秦襲滅南涼以傉檀歸殺之南涼自秃髮烏孤至傉檀亡凡三主合十八年唾契欺訖反汗乙弗通輿乙弗敵在吐谷渾北其西有契翰一部等部叛南涼南涼王傉檀欲討之孟愷諌曰今年飢饉百姓不安不如與熾磐結盟通糴慰撫雜部足食繕兵俟時而動傉檀不從以太子虎臺守樂都自帥騎七千襲乙弗大破之西秦王熾磐聞之帥步騎二萬襲樂都一夕城潰熾磐入城徙虎臺及其文武百姓萬餘户于枹罕傉檀將士聞亂皆逃散傉檀曰四海之廣無所容身吾老矣寧見妻子而死遂歸于熾磐熾磐待以上賓之禮已而鴆殺之并殺虎臺熾磐復稱秦王傉檀子保周賀俱奔河西久之奔魏魏王嗣愛賀之才謂曰卿之先與朕同源賜姓源氏秋八月魏遣于什門名簡代人以字行如燕魏主嗣遣謁者于什門使于燕至和龍不肯入見曰大魏皇帝有詔須馮王出受然後敢入燕王跋使人牽逼令入什門不拜跋使人按其項什門曰馮王若拜受詔則吾自以賓主禮見何苦見逼邪跋怒幽執什門欲降之什門終不屈久之衣冠弊壞略盡機蝨流溢跋遺之衣冠什門不受九月丁巳朔日食冬十一月魏遣使者巡行諸州校閲守宰資財非家所齎者悉簿為贓乙卯十一年春正月劉裕帥師擊荆州三月都督司馬休之拒戰衆潰休之奔秦劉裕收司馬休之次子文寶兄子文祖賜死自領荆州刺史將兵擊之以將軍劉道憐裕中弟監留府事劉穆之兼右僕射事皆決焉雍州刺史魯宗之自疑不為裕所容與其子竟陵太守軌一名象齒起兵助休之休之上表罪狀裕勒兵拒之裕密書招休之録事韓延之延之復書曰辱疏知以譙王前事親帥戎馬逺履西畿長增歎息司馬平日體國忠貞欵懷待物以公有匡復之勳家國蒙賴推德委誠每事詢仰譙王見劾自表遜位又奏廢之所不盡者命耳而公以此遽興兵甲所謂欲加之罪其無辭乎劉裕足下海內之人誰不見足下此心而欲欺誑國士自謂處懷期物自有由來夫劉藩死于閶闔諸葛斃于左右甘言詫方伯襲之以輕兵今又伐人之君啖人于利真可謂處懷期物自有由來乎吾誠鄙劣嘗聞道于君子以平西之至德寧可無授命之臣乎假令天長喪亂九流渾濁當與臧洪遊于地下耳裕視書歎息以示將佐曰事人當如此矣延之以裕父名翹字顯宗乃更其字曰顯宗名其子曰翹以示不臣劉氏人韓延之南陽赭陽裕遂使參軍檀道濟朱超石齡石之弟將步騎出襄陽江夏太守劉虔之彭城吕人世居京口聚糧以待魯軌襲擊殺之裕又使壻徐逵之東海人統蒯恩沈淵子林子之兄出江夏口與軌戰敗皆死裕怒甚帥諸將濟江休之兵臨峭岸裕軍士無能登者裕自被甲欲登諸將諫不從怒愈甚主簿謝晦前抱持裕裕抽劍指晦曰我斬卿晦曰天下可無晦不可無公將軍胡藩以刀頭穿岸劣猶言少容足指騰之而上隨者稍衆直前力戰休之兵稍却裕兵乘之休之兵遂大潰裕克江陵休之宗之皆走軌留石城今安陸府城注見前裕尋遣兵攻破石城休之與宗之軌等俱奔秦宗之素得士民心爭為之衛送出境未幾卒休之未敗時宗室司馬道賜為劉敬宣參軍殺敬宣以應休之為敬宣府吏所殺夏五月劉裕劍履上殿入朝不趨贊拜不名北涼遣使上表內附益州刺史朱齡石遣使詣北涼喻以朝廷威德北涼王蒙遜遣使詣齡石且上表言伏聞車騎將軍裕欲清中原願為右翼驅除戎虜秋七月辛卯晦日食魏荐飢魏比嵗霜旱雲代民多飢死太史令王亮言于魏主嗣曰按讖書魏當都鄴可得富樂嗣以問羣臣博士祭酒崔浩特進周淡京兆酃人以為不可曰遷都于鄴可救今年之飢非長久計也山東人以國家居廣莫之地人畜無涯號曰牛毛之衆今留兵守舊都分家南徙不能實諸州之地情見事露恐四方皆有輕侮之心且百姓不便水土疫死必多而舊都兵少屈丐柔然將有窺窬之心朝廷隔恆代千里之險難以赴救此則聲實俱損也今居北方來春草生湩酪將出兼以菜果得及秋熟則事濟矣嗣曰今倉廪已竭若來秋又飢若之何對曰宜簡飢貧之户使就食山東若來秋復飢當更圖之但方今不可遷都耳屈屈丐即赫連勃勃魏明元帝名勃勃為丐言卑下也嗣從之嗣又躬耕藉田勸課農桑明年大熟民遂富安初浩為嗣講易洪範嗣因問天文術數浩占決多驗由是有寵凡軍國密謀皆預之熒惑不見八十餘日復出東井秦大旱魏太史奏熒惑在匏瓜星名在天津南中忽亡不知所在于法當入危亡之國先為童謠訛言然後行其禍罰魏主嗣召名儒數人與太史議熒惑所詣崔浩曰春秋傳神降于莘以其至之日推知其物國語周惠王十五年有神降于莘內史過曰其丹朱乎神之見也不過其物浩據此為言今熒惑之亡在庚午辛未二日之間庚午主秦辛為西夷熒惑其入秦乎後八十餘日果出東井留守鉤已謂環繞而行如鉤又成已字也久之乃去秦大旱昆明池竭童謠訛言國人不安間一嵗而亡丙辰十二年秦主姚泓永和元年魏泰常元年春正月劉裕自加都督二十二州軍事二月秦姚弼姚愔興庶子作亂伏誅秦王興卒太子泓立秦王興如華隂使太子泓監國興疾篤還長安弼黨侍郎尹沖謀作亂不果興既入宫疾轉篤南陽公愔即與尹沖帥兵攻端門興力疾臨前殿賜弼死禁兵見興喜躍爭進擊賊愔等大敗興乃引東平公紹興之弟及姚讃梁喜等入受遺詔明日卒泓祕不發喪捕愔等誅之乃即位稱皇帝三月劉裕自加中外大都督戒嚴伐秦詔遣琅邪王德文修敬山陵秋八月劉裕督諸軍發建康寧州獻琥珀枕于劉裕裕以琥珀治金瘡命碎之以賜北征將士以世子義符為中軍將軍監留府事劉穆之領軍司入居東府總攝內外司馬徐羡之字宗文東海郯人副之遂發建康遣將軍王鎮惡檀道濟將步軍自淮淝向許洛朱超石胡藩趨陽城沈田子傅𢎞之字仲度北地泥陽人趨武關沈林子田子之弟劉遵考裕疾弟將水軍出石門自汴入河以王仲德督前鋒開巨野入河水經注濟水故瀆又北右合洪水洪水上承巨野桓溫北伐掘渠通濟劉武帝西入長安又廣其功濟水故瀆在今山東曹州府荷澤諸縣界巨野注見前穆之謂鎮惡曰公今委卿以伐秦之任卿其勉之鎮惡曰吾不克關中誓不復濟江穆之內總朝政外供軍旅決斷如流事無壅滯求訴咨稟盈階滿室穆之目覽耳聽手答口酬不相參涉悉皆贍舉又喜賓客談笑無倦性奢豪食必方丈未嘗獨餐嘗白裕曰穆之家本貧賤贍生多闕自叨忝以來朝夕所須微為過豐然此外一毫不以負公裕至彭城王鎮惡檀道濟入秦境所向皆捷秦諸屯守望風欵附道濟遂至許昌沈林子自汴入河克倉垣王仲德入魏滑臺仲德水軍入河將逼滑臺魏兖州刺史尉建棄城北渡仲德遂入城魏主嗣聞之遣叔孫建等引兵濟河斬尉建于城下呼晉軍問以侵寇之狀仲德使人對曰劉太尉使王征虜自河入洛掃清山陵借空城以息兵行當西引無損于好也嗣又使建問裕裕謝之曰晉欲伐秦故假道于魏非敢為不利也冬十月將軍檀道濟克洛陽秦陽城滎陽成臯虎牢相繼來降檀道濟等長驅而進秦陳留公洸鎮洛陽遣將軍趙元守柏谷注見前元戰敗被十餘創其司馬蹇鑒冒刃抱元而泣元曰吾創已重君宜速去鑒曰將軍不濟鑒去安之與之皆死道濟遂進逼洛陽洸出降道濟獲秦人四千餘議者欲盡坑之道濟曰弔民伐罪正在今日皆釋而遣之于是夷夏感悅歸者日衆詔遣司空高密王恢之彭城王紘之子俊嗣高密孝王略恢之其孫也修謁五陵十二月劉裕自加相國揚州牧封宋公備九錫復辭不受裕遣長史王𢎞字休元珣之子還建康諷朝廷求九錫時劉穆之掌留任而旨從北來穆之由是愧懼發病詔以裕為相國總百揆封十郡為宋公備九錫之禮裕辭不受西秦遣使內附西秦王熾磐遣使詣太尉裕求擊秦自效裕以為平西將軍河南公丁巳十三年西涼公李歆嘉興元年是嵗秦亡大國一魏小國五西涼北涼燕夏西秦凡六僭國春正月甲戌朔日食秦朝會前殿君臣相泣劉裕引水軍發彭城二月西涼公李皓卒世子歆字士業立皓寢疾遺命長史宋繇曰吾死之後世子猶卿子也善訓導之及卒官屬奉世子歆為涼公以繇録三府事三月將軍王鎮惡攻潼關與秦太宰姚紹戰大破之王鎮惡進軍潼關檀道濟沈林子自陜北渡河攻蒲坂不克秦王泓進魯公紹東平改封太宰督將軍姚鸞等步騎五萬守潼關遣别將姚驢救蒲坂林子謂道濟曰蒲坂城堅兵多不可猝拔不如還與鎮惡并力以爭潼關若得之則蒲坂不攻自潰矣道濟從之三月至潼關紹引兵出戰道濟等奮擊大破之紹遣姚鸞絶晉糧道林子夜襲殺鸞紹又遣東平公讚屯河上以斷水道林子又擊走之劉裕遣使假道于魏魏遣兵屯河北裕遂引兵入河劉裕將水軍自淮泗入清河自淮入泗自泗入清清即濟水也注見前將泝河西上先遣使假道于魏秦主泓亦遣使求救于魏魏主嗣使羣臣議之皆曰秦婚姻之國不可不救宜發兵斷河上流令勿得西崔浩曰裕圖秦久矣今乘其危而伐之其志必取若遏其上流裕必上岸北侵是我代秦受敵也不若聽裕西上然後屯兵以塞其東使裕克捷必德我之假道不捷吾不失救秦之名此䇿之得者也且南北異俗借使國家棄恆山以南裕必不能以吳越之兵守之安能為吾患議者猶曰裕西入關則恐吾斷其後北上則姚氏必不能出關助我此必聲西而實北也嗣乃遣長孫嵩阿薄干等將兵十萬屯河北岸裕引軍入河魏人隨裕軍西行裕遣兵擊之于河上大破之時晉船有漂渡北岸者輒為魏人所殺掠裕遣軍擊之輒走退則復來裕乃遣丁旿帥仗士七百人車百乘渡北岸去水百餘步為却月陳兩端抱河車置七仗士事畢使豎一白毦裕先命朱超石戒嚴毦舉超石帥二千人馳赴之魏人以三萬騎來薄超石斷矟千餘皆長三四尺以大鎚鎚之一矟輒洞貫三四人魏兵奔潰斬其將阿薄干魏主嗣乃恨不用崔浩之言而白毦績羽為之眊至反𢎞農人送義租給王鎮惡等軍將軍王鎮惡等進攻潼關久之乏食衆心疑懼欲棄輜重還赴大軍沈林子按劍怒曰今許洛已定關右將平事之濟否繫于前鋒奈何沮乘勝之氣棄垂成之功乎鎮惡乃至𢎞農説諭百姓競送義租軍食復振田子遂擊破姚紹軍紹屯河北絶晉糧援紹憤愧嘔血而卒夏四月劉裕入洛陽齊郡太守王懿降魏上書言劉裕在洛宜發兵絶其歸路可不戰而克魏主嗣善之崔浩侍講在前嗣問之曰劉裕伐姚興克乎對曰克之姚興好事虛名而少實用子泓愞弱兄弟乖爭裕乘其危兵精將勇何故不克嗣曰裕才何如慕容垂對曰垂藉父兄之資修復故業國人歸之若夜蟲之就火易以立功裕奮起寒微不階尺土討滅桓元興復晉室北禽慕容超南梟盧循所向無前其才優矣嗣曰裕既入關不能進退我以精騎直搗彭城裕將若之何對曰今屈丐柔然伺我之隙而諸將用兵皆非裕敵興兵逺攻未見其利不如靜以待之裕克秦而歸必篡其主關中華戎雜錯風俗徑悍裕欲以荆揚之化施之函秦此無異解衣包火張羅捕虎雖留兵守之適足資敵耳願且按兵息民以觀其變秦地終為國家之有可坐而守也嗣笑曰卿料之審矣浩曰臣嘗私論近世將相若王猛之治國苻堅之管仲也慕容恪之輔幼主慕容暐之霍光也劉裕之平禍亂司馬德宗之曹操也嗣大悅語至夜半賜御醥醪十觚水精鹽一兩曰朕味卿言如此故欲共饗其美秋八月將軍王鎮惡入長安秦主泓出降九月劉裕至長安送泓詣建康斬之後秦自姚萇據長安至泓亡凡三主合三十四年先是沈田子傅𢎞之入武關進屯青泥城名在西府藍田縣亦曰嶢柳城元和志嶢柳城俗亦謂之青泥城秦主泓自將擊之大敗而還時太尉裕己至闃鄉泓欲自將禦之恐田子等襲其後欲先擊滅田子等然後傾國東出乃帥步騎數萬奄至青泥田子等所領裁千餘人秦兵圍之數重田子慰撫士卒曰諸君逺來正求此戰死生一決封侯之業于此在矣士卒皆踊躍鼓譟執短兵奮擊秦兵大敗泓奔還灞上已裕至潼關王鎮惡請帥水軍自河入渭以趨長安裕許之秦主泓使姚丕守渭橋以拒之鎮惡泝渭而上乘蒙衝小艦行船者皆在艦內秦人但見艦進驚以為神至渭橋鎮惡令軍士食畢皆持仗登岸後者斬既登即密使人解放舟艦渭水迅急倐忽不見乃喻士卒曰此為長安北門去家萬里舟楫衣糧皆已隨流今進戰而勝則功名俱顯不勝則骸骨不返無他岐矣乃身先士卒衆騰踊爭進大破姚丕軍泓引兵救之為敗卒所蹂踐不戰而潰鎮惡入自平朔門泓將出降其子佛念年十一言于泓曰晉人將逞其欲雖降必不免不如引決泓憮然不應佛念登宫牆自投死泓乃將妻子羣臣詣壘門降鎮惡以屬吏城中夷晉六萬餘口鎮惡以國恩撫慰號令嚴肅百姓安堵九月裕至長安收秦彛器鐘鼎之屬渾儀注見前土圭周禮大司徒以土圭之法測土深正日景以求地中記里鼓亦曰大章車所以識道里車上有二層皆有木人行一里下層擊鼓行十里上層擊鐲指南車亦名司南車駕四馬其下制如樓三級四角金龍銜羽葆刻木為仙人立車上車雖回轉手常指南送建康餘金帛珍寶皆以頒將士送姚泓至建康斬之北涼王蒙遜聞裕滅秦怒甚門下校郎劉祥入言事蒙遜曰汝聞劉裕入關敢研研然也斬之夏人進據安定夏王勃勃聞裕伐秦曰裕取關中必矣然不能久留必將南歸若留子弟諸將守之吾取之如拾芥耳乃秣馬養士進據安定嶺北郡縣皆降之裕遣使遺勃勃書約為兄弟勃勃報之冬十月劉裕自進爵為王增封十郡復辭不受十一月劉穆之卒十二月劉裕東還留子義真都督雍梁秦州軍事裕欲留長安經略西北而諸將佐久役思歸多不欲留會聞劉穆之卒裕以根本無托決意東還欲以王𢎞代穆之謝晦曰休元輕易不若羡之乃以徐羡之為丹陽尹管留任而以次子義真時年十三為安西將軍守關中王修京兆人為長史王鎮惡為司馬沈田子毛德祖璩宗人傅𢎞之皆為參軍從事關中人素重王猛而是役也鎮惡功為多故南人忌之沈田子與鎮惡爭功尤不平裕將還田子等屢言鎮惡家在關中不可保信裕曰鍾會不得遂其亂者以有衛瓘故也語曰猛獸不如羣狐卿等十餘人何懼鎮惡邪三秦父老聞裕將還詣門流涕曰殘民不沾王化于今百年始覩衣冠人人相賀長安十陵公家墳墓咸陽宫殿君家室宅捨此欲何之乎裕為之愍然慰喻遣之十二月裕發長安自洛入河開汴渠以歸閏月夏王勃勃遣兵向長安夏王勃勃聞劉裕東還大喜召王買德問計買德曰關中形勝之地而裕以幼子守之狼狽而歸正欲急成篡事不暇復以中原為意此天以關中賜我不可失也青泥注見前上洛漢縣晉為郡今陜西商州是南北之險宜先遣遊軍斷之東塞潼關絶其水陸之路然後傳檄三輔施以恩德則義真在網罟之中不足取也勃勃乃使其子璝帥騎二萬向長安别將屯青泥及潼關而自將大軍為後繼戊午十四年夏昌武元年春正月王鎮惡沈田子帥師拒夏兵田子矯殺鎮惡安西長史王修討田子斬之參軍傅𢎞之擊夏兵卻之夏赫連璝至渭關中民降之者屬路沈田子將兵拒之畏其衆盛不敢進王鎮惡曰公以十歲兒付吾屬當共竭力而擁兵不進虜何由得平遂與田子俱出田子與鎮惡素有相圖之志至是益忿懼軍中又訛言鎮惡欲盡殺南人據關中反田子遂請鎮惡至傅𢎞之營計事因屏人語使人斬之矯稱受太尉令義真與王修被甲登門以察其變修執田子數以專戮而斬之𢎞之破夏兵夏兵乃退以劉義隆即宋文帝為荆州刺史劉裕欲以世子義符鎮荆州張邵字茂宗吳人諫曰儲二之重四海所繫不宜居外乃以義隆為荆州刺史以到彥之楚屈到之後以名為氏彥之字道豫彭城武原人張邵王曇首珣之子王華字子陵曇首從祖弟等為參佐義隆尚幼府事皆決于邵裕謂義隆曰曇首沈毅有器度宰相才也汝每事咨之夏六月劉裕始受相國宋公九錫之命裕既受命崇繼母蕭氏為太妃以孔靖字季恭愈之孫為尚書令王𢎞為僕射傅亮字季友咸之元孫蔡廓字子度濟陽考城人為侍中謝晦為右衛將軍殷景仁陳郡長平人為祕書郎靖辭不受景仁學不為文敏有思致口不談義深達理體至于國典朝儀舊章記注莫不撰録識者知其有當世之志冬十月以西涼公李歆為鎮西大將軍歆遣使來告襲位故有是命仍封酒泉公劉義真殺其長史王修關中大亂十一月夏王勃勃陷長安義真逃歸劉義真賜與無節王修每裁抑之左右皆怨譖修欲反義真殺之于是人情離駭莫相統一義真悉召外兵閉門拒守關中郡縣悉降于夏夏王勃勃進據咸陽長安樵采路絶劉裕聞之使蒯恩召義真東歸而以朱齡石守關中謂曰卿至可敕義真輕裝速發出關然後徐行若關右必不可守可與義真俱歸十一月齡石至長安義真將士大掠而東多載寶貨子女方軌徐行日不過十里傅𢎞之諫不聽赫連璝帥衆追之𢎞之蒯恩斷後力戰連日至青泥大敗為夏兵所禽義真左右盡散獨逃草中參軍段宏追尋得之束之于背單馬而歸勃勃欲降傅𢎞之𢎞之不屈而死長安百姓逐朱齡石齡石焚宫殿奔潼關夏兵追殺之裕聞青泥之敗未知義真存亡怒甚刻日北伐謝晦固諌會得段宏啓知義真得免乃止但登城北望慨然流涕而已夏王勃勃稱皇帝彗星見彗星出天津箕四星一曰天津又曰天漢經尾箕之間謂之漢津入太微經北斗絡紫微太微在北斗南紫微在北斗北八十餘日而滅魏主嗣復召諸儒術士問之曰今四海分裂咎在何國朕甚畏之卿其無隱崔浩曰災異之興皆象人事人事無釁又何畏焉昔王莽將篡異亦如此今國家主尊臣卑民無異望晉室陵夷危亡不逺彗之為異其劉裕將篡之應乎十二月劉裕弒帝于東堂奉琅邪王德文即位是為恭帝裕以讖云昌明之後尚有二帝晉書孝武帝紀初簡文帝見讖云晉祚盡昌明及孝武帝在孕李太后夢神人謂之曰汝生男以昌明為字及産東方始明因以為名簡文後悟乃流涕又安帝紀讖云昌明之後有二帝劉裕將行禪代欲應之乃使中書侍郎王韶之字休泰曽孫與帝左右密謀弒帝而立德文德文常在帝左右韶之不得間會德文有疾出居于外韶之以散衣縊帝于東堂俗因稱遺詔奉德文即位以北涼王蒙遜為涼州刺史蒙遜稱藩故有是命恭皇帝己未元熙元年夏真興元年春正月立皇后禇氏葬休平陵在江寧府上元縣二月夏主勃勃還統萬夏羣臣請都長安夏主勃勃曰朕豈不知長安帝都沃饒險固然統萬距魏境裁百餘里朕在長安統萬必危若在統萬則魏必不敢濟河而西諸卿適未見此耳乃置南臺于長安以赫連璝録尚書事而還勃勃性驕虐視民如草芥常置弓劍于側羣臣忤視者鑿其目笑者抉其唇諫者先截其舌然後斬之宗室司馬楚之字德秀宣帝弟太常􅠤之八世孫據長社漢縣晉因之東魏廢故城在今河南許州長葛縣劉裕誅翦宗室之有才望者楚之叔兄皆死楚之亡匿蠻中及從祖休之奔秦秦亡休之魯軌韓延之俱降魏休之尋卒楚之乃亡之汝潁間聚衆以謀復仇楚之少有英氣折節下士有衆萬餘屯據長社裕使刺客沐謙往刺之楚之待謙甚厚謙未得間乃夜稱疾欲因楚之問疾而刺之楚之果自齎藥往視情意勤篤謙不忍發乃出匕首以狀告曰將軍深為劉裕所忌願勿輕率以自保全遂委身事之為之防衛秋七月劉裕始受進爵之命八月移鎮夀陽復加殊禮進太妃為太后世子為太子冬十一月丁亥朔日食庚申二年宋高祖劉裕永初元年西秦建丑元年西涼永建元年是嵗晉亡宋代西涼亦亡宋魏夏北涼燕秦凡六國夏四月長星出竟天六月劉裕還建康稱皇帝是為宋高祖武帝廢帝為零陵王以兵守之宋王裕欲受禪而難以發言乃集朝臣宴飲從容言曰桓元篡位鼎命已移我倡義興復平定四海功成業著遂荷九錫今年將衰暮崇極如此物忌盛滿非可久安今欲奉還爵位歸老京師羣臣莫喻其意日晚坐散中書令傅亮乃悟叩扉請見曰臣暫宜還都裕解其意無復他言亮出見長星竟天拊髀歎曰我常不信天文今始驗矣亮至建康四月徵裕入輔裕留子義康鎮夀陽以參軍劉湛字𢎞仁南陽涅陽人為長史決府事湛自幼年即有宰物之志常自比管葛博涉書史不為文章不喜談議裕甚重之六月裕至建康亮具詔草使帝書之帝欣然操筆謂左右曰桓元之時晉氏已無天下重為劉公所延將二十載今日之事本所甘心遂書赤紙為詔遜于琅邪第百官拜辭祕書監徐廣字野民邈之弟流涕哀慟裕為壇于南郊即位廣又悲感流涕侍中謝晦曰徐公得無小過廣曰君為宋朝佐命身是晉室遺老悲歡之事固不可同宋主臨太極殿大赦改元奉晉帝為零陵王即宫于故秣陵縣此晉初所置秣陵縣也在秦淮南後徙治鬬場因指此為故使將軍劉遵考將兵防衛宋尊王太后為皇太后宋主事蕭太后素謹及即位春秋已高每旦入朝未嘗失時刻宋改晉封爵封拜功臣子弟有差宋以晉氏封爵當隨運改獨置始興廬陵始安長沙康樂五公奉王導謝安溫嶠陶侃謝元之祀以道憐為太尉封長沙王徐羡之等增位進爵各有差秋七月宋交州刺史杜慧度擊林邑古越裳氏地注見前大破降之初後漢末象林漢縣屬日南郡功曹區連殺令自立為王號曰林邑其後范氏代之區氏傳數世後王無嗣外甥范熊代立有范文者本西卷日南屬縣夷帥范幼家奴為林邑將文以商販常至洛陽後入林邑教其王作城邑宫室及器械王寵任之會其王逸熊之子卒文遂脅國人而篡立文先譖逸諸子或逃或徙及逸卒文詐迎逸子于他國置毒椰酒而殺之椰木出交址樹似檳榔其實大如瓜剖之其中有酒于是旁擊諸國有衆數萬晉咸康永和間屢寇日南九真諸郡殺太子夏侯覽害督護劉雄留屯日南三年而去是後無嵗不至殺傷甚衆交州遂致虛弱文死傳子及孫其國內亂大臣范諸農篡立傳子曰陽邁至是刺史杜慧度率衆南討大破之所殺過半其王陽邁乞降前後鈔掠者皆送還慧度為政緇密一如治家吏民畏而愛之城門夜開道不拾遺北涼王蒙遜誘西涼公歆與戰殺之遂滅西涼北涼王蒙遜欲伐西涼先引兵攻秦浩亹音告門漢縣以浩亹水名故城在西寧府碾伯縣既至潛師還屯川巖在甘州府張掖縣西南西涼公歆欲乘虛襲張掖宋繇張體順切諫不聽太后尹氏謂曰汝新造之國地狹民稀自守猶懼不足何暇伐人蒙遜非汝之敵豈得輕舉僥冀非望以吾觀之非但喪師殆將亡國歆亦不聽遂將步騎三萬東出蒙遜聞之曰歆已入吾術中矣乃引兵邀擊歆歆大敗或勸歆還保酒泉歆曰吾違老母之言以取敗不殺此胡何面目復見吾母遂勒兵復戰為蒙遜所殺蒙遜入酒泉禁侵掠士民安堵初歆弟恂為敦煌太守有惠政及歆被殺恂奔北山郡人招之恂遂入敦煌衆推為刺史蒙遜遣世子德政攻之不克蒙遜乃自帥衆以水灌其城城陷恂自殺蒙遜遂屠敦煌歆有子曰重耳奔于江左後歸魏是為唐之祖主西涼自李皓據敦煌至歆亡凡二合二十二年八月宋立子義符為太子南北朝辛宋永初二年魏泰常六年齊是嵗以後分注紀年南酉朝以宋齊梁陳北朝以魏周餘國仍依前例非建國嗣位改元不備列春正月宋祀南郊大赦夏四月宋毁淫祠宋詔所在淫祠自蔣子文廣陵人漢末為秣陵尉以逐賊死鍾山吳大帝時降神于吳言將大啓孫氏大帝乃為立廟以下皆除之其先賢以勳德祠者不在此例秋九月宋主劉裕弒零陵王于秣陵初宋主劉裕以毒酒一罌授前琅邪郎中令張偉吳人邵之弟使鴆零陵王偉歎曰鴆君以求生不如死乃自飲而卒太常褚秀之侍中褚淡之皆王妃兄也后父爽前義興太守秀之淡之皆爽之子王每生男裕輒令秀之兄弟殺之王深慮禍及與褚妃共處一室自煮食于牀前飲食所資皆出褚妃故宋人莫得伺其隙至是裕令淡之往視妃妃出别室相見兵人踰垣而入進藥于王王不肯飲曰佛教自殺者不復得人身兵人以被掩殺之裕帥百官臨于朝堂三日冬十一月葬晉恭帝于沖平陵在江寧府上元縣十二月宋豫章太守謝瞻字宣逺晦之兄卒初宋臺始建瞻為中書侍郎其弟晦為右衛將軍時晦權遇已重自彭城還都迎家賓客輻湊瞻驚駭謂晦曰汝名位未多而人歸趨乃爾吾家素以恬退為業不願干預時事而汝遂勢傾朝野此豈門户之福邪乃以籬隔門庭曰吾不忍見此後晦以佐命功位任益重瞻愈憂懼至是遇疾不療臨終遺晦書曰吾得啓體幸全亦何所恨弟思自勉勵為國為家壬宋永初三年戌魏泰常七年春正月宋以徐羡之為司空録尚書事羡之起自布衣無學術直以志力局度一旦居廊廟朝野推服咸謂有宰臣之望常與傳亮謝晦宴聚亮晦才學辨博羡之風度詳整時然後言鄭鮮之歎曰觀徐傳言論不復以學問為長鄭鮮之字道子滎陽開封人三月宋以廬陵王義真都督雍豫等州軍事宋主有疾長沙王道憐徐羡之傳亮謝晦檀道濟並入侍醫藥羣臣請祈禱神祗不許唯使侍中謝方明景仁從祖弟以疾告宗廟而已道濟出鎮廣陵監淮南諸軍太子多狎羣小謝晦言于宋主曰陛下春秋既高宜思存萬世神器至重不可使負荷非才上曰廬陵何如晦曰臣請觀焉出造義真義真盛欲與談晦不甚答還曰德輕于才非人主也出義真為都督六州諸軍南豫州刺史鎮厯陽是後大州率加都督多者或至五十州不可復詳載矣夏四月宋封楊盛為武都王五月宋主裕殂太子義符立是為少帝宋主疾甚召太子義符誡之曰檀道濟雖有幹略而無逺志非如兄韶有難御之氣也徐羡之傅亮當無異圖謝晦數從征伐頗識機變若有同異必此人也又為手詔曰後世若有幼主朝事一委宰相母后不煩臨朝羡之亮晦道濟同被顧命遂殂宋高祖清簡寡欲嚴整有法度被服居處儉于布素遊宴甚稀嬪御至少嘗得後秦主興從女有盛寵頗以廢事謝晦微諌即時遣出財帛皆在外府內無私藏嶺南嘗獻入筒細布一端八丈惡其精麗勞人即付有司彈太守以布還之并禁嶺南作此布公主出適遣送不過二十萬無錦繡之物內外奉禁莫敢為侈靡性不信竒怪微時多符瑞及貴史官審以所聞拒而不答義符即位年十七立妃司馬氏為皇后后晉恭帝女海鹽公主也秋七月葬初寧陵魏立子燾即太武帝為太子監國魏主服寒食散頻年藥發災異屢見遣中使密問崔浩曰屬者日食趙代之分朕疾彌年不愈恐一旦不諱諸子並少將若之何浩曰陛下春秋富盛行就平愈必不得已請陳瞽言聖代龍興不崇儲二是以永興之始社稷幾危謂清河王紹之亂事見前今宜早建東宫選賢公卿以為師傅左右信臣以為賓友入總萬機出撫戎政如此則陛下可以優遊無為頤神養夀萬嵗之後國有成主民有所歸姦宄息望禍無自生矣皇子燾年將周星明睿溫和立子以長禮之大經也魏主復以問長孫嵩對曰立長則順置賢則人服燾長且賢天所命也從之立燾為太子使居正殿臨朝為國副主以嵩及奚斤安同為左輔坐東廂西面崔浩與穆觀本邱穆陵氏後改為穆氏邱堆獻帝第五兄曰邱敦氏後孝文改為邱氏為右弼坐西廂東面胡三省曰魏臣出代北者姓多重復及高祖遷洛始皆改之舊史以其煩雜難知故皆從後姓以就簡易今從之百官總己以聽魏主避居西宫時隱而窺之聽其決斷大悅謂侍臣曰嵩宿德舊臣厯事四世功存社稷斤辨捷智謀名聞遐邇同曉解俗情明練于事觀達于政要識吾旨趣浩博聞強識精察天人堆雖無大用然在公專謹以此六人輔相太子吾與汝曹巡行四境伐叛柔服足以得志于天下矣冬十月魏遣司空奚斤督諸將擊宋取青兖諸郡十二月宋遣南兖州刺史檀道濟救之初魏主聞宋高祖克長安大懼遣使請和自是嵗聘不絶及高祖殂沈範等奉使在魏還及河魏主遣人追執之議發兵取洛陽虎牢滑臺崔浩諫曰陛下不以劉裕歘起納其使貢裕亦敬事陛下今乘喪伐之雖得之不足為美且國家今日亦未能一舉取江南也而徒有伐喪之名竊為陛下不取臣謂宜遣人弔祭存其孤弱恤其凶災使義聲布于天下則江南不攻自服矣魏主曰劉裕乘姚興之死而滅之今我乘裕喪而伐之何為不可浩曰不然姚興死諸子交爭故裕乘釁伐之今江南無釁不可比也魏主不從假司空奚斤節使督將軍周幾公孫表伐宋周幾代人公孫表廣陽人斤等帥步騎三萬濟河營于滑臺之東宋司州刺史毛德祖遣翟廣等將步騎三千救之先是司馬楚之聚衆陳留之境聞魏兵濟河遣使迎降魏以為荆州刺史使侵擾宋北境德祖遣將戍召陵雍邱以備之魏尚書滑稽滑姓滑伯之後以國為氏引兵襲倉垣兵吏悉踰城走陳留太守嚴稜馮翊人詣斤降斤等攻滑臺不拔求益兵魏主怒責之自將五萬餘人南出為斤等聲援太子燾將兵出屯塞上斤等急攻滑臺拔之東郡太守王景度出走司馬陽瓚為魏所執不降而死乘勝進逼虎牢毛德祖與戰屢破之魏主别遣將軍于栗磾屯河陽取金墉德祖遣竇晃等拒之魏主至冀州遣叔孫建將兵徇青兖宋豫州刺史劉粹字道沖蕭人遣騎據項城徐州刺史王仲德將兵屯湖陸即湖陵故城在兗州府魚臺縣于栗磾濟河與斤并力攻晃等破之魏主遣領軍娥清代人閭大肥蠕蠕人將兵會周幾叔孫建南渡河軍于碻磝山名在泰安府東阿縣南有關城宋兖州刺史徐琰南走于是泰山高平金鄉注俱見前等郡皆沒于魏叔孫建等入青州宋遣南兖州刺史檀道濟監征討諸軍事與王仲德共救之明年春于栗磾攻金墉克之魏主以栗磾為豫州刺史鎮洛陽癸宋主義符景平元亥年魏泰常八年春正月宋以蔡廓為吏部尚書不受宋以廓為吏部尚書廓謂傅亮曰選事若悉以見付不論不然不能拜也亮以語徐羡之羡之曰黃散謂黃門侍郎及散騎常侍侍郎以下悉以委蔡以上故宜共參同異廓曰我不能為徐干木署紙尾遂不拜干木羡之小字選案黃紙録尚書與吏部尚書連名故廓云然魏以刁雍字淑和晉尚書令協之曽孫為青州刺史初宋高祖誅滅刁氏高祖嘗與刁逵樗蒱不時輸直逵縛之馬栁高祖既建義以嫌故遂誅其族雍奔于秦秦滅雍降魏魏以為將軍使擾徐兖至是魏叔孫建攻青州刺史竺夔聚衆保東陽城不入城者使依據山險芟夷禾稼魏軍至無所得食在東陽城宋高祖毁廣固改築故城益都縣雍見魏主于鄴魏主曰叔孫建等入青州民皆藏避攻城不下彼素服卿威信今遣卿助之乃以為刺史給騎使行雍募兵得五千人撫慰士民皆送租供軍二月魏築長城柔然寇魏邊魏築長城自赤城即今宣化府赤城縣水經注沽水徑赤城東城在山阜之上下抗深隍是也至五原二千餘里置戍以備之三月魏攻宋虎牢不克殺其將公孫表魏奚斤公孫表等共攻虎牢魏主自鄴遣兵助之毛德祖于城內穴地入七丈分為六道出魏圍外募敢死士四百從穴中出襲其後魏兵驚擾斬首數百而還魏兵退散復合攻之益急德祖出兵與表大戰從朝至晡殺魏兵數百會斤别攻許昌還合擊德祖大破之初德祖在北與表有舊表有權略德祖患之乃與交通音問密遣人説奚斤云表與之連謀每答表書輒多所治定表以書示斤斤疑之以告魏主魏主使人夜就帳中縊殺之夏四月魏攻宋東陽城注見前不克而還留刁雍戍尹卯壘名在泰安府東阿縣水經注濟水遇穀城縣西有尹卯壘即此魏叔孫建將三萬騎逼東陽城城中文武才一千五百人竺夔及濟南太守垣苗悉力固守時出竒兵擊魏破之魏步騎繞城列陳十餘里大治攻具夔作四重塹魏人填其三重為撞車以攻城夔遣人從地道中出以大麻絙挽之令折魏人復作長圍進攻愈急厯久城壞戰士多死檀道濟至彭城以司青二州並急而所領兵少不足分赴青州道近竺夔兵弱乃與王仲德等分兵救之已而建墮東陽北城三十許步刁雍請速攻建不許遂不克及聞檀道濟等將至雍又請將所募兵五千據險以邀之時天暑魏軍多疫建曰兵人疫病過半若相持不休兵自死盡何須復戰今全軍而返計之上也道濟軍于臨朐建等燒營及器械而遁道濟以糧盡不能追竺夔以東陽城壞不可守移鎮不其城注見前魏留刁雍鎮尹卯招集民五千餘家置二十七營以領之秦遣使入貢于魏秦王熾磐謂羣臣曰今宋雖奄有江南夏人雄據關中皆不足與也獨魏主奕世英武賢能為用吾將舉國而事之乃遣使入見于魏貢黃金二百斤并陳伐夏方略閏月魏拔虎牢執宋司州刺史毛德祖遂取司豫諸郡先是魏主攻虎牢不克魏兵攻虎牢毛德祖隨方拒守而將士稍零落于是魏主如成臯絶虎牢汲河之路停三日自督衆攻城亦不能下至是叔孫建就奚斤共攻之虎牢被圍二百日無日不戰徑兵殆盡而魏增兵轉多毁其外城德祖于內更築三重城以拒之又毁其二重德祖惟保一城晝夜相拒將士眼皆生創德祖撫之以恩終無離心檀道濟劉粹等皆畏魏兵強不敢進魏人作地道以泄城中井城中人馬渴乏被創者不能復出重以飢疫城遂陷將士欲扶德祖出走德祖曰我誓與此城俱斃義不使城亡而身存也魏主命將士得德祖者必生致之將軍豆代田執以獻將佐皆為所虜唯參軍范道基將二百人突圍南還魏士卒疫死者亦什二三奚斤等悉定司兖豫諸郡縣魏主命周幾鎮河南河南人安之徐羡之傅亮謝晦以亡失境土上表自劾詔勿問毛德祖後卒于魏冬十一月魏主嗣殂太子燾立是為魏世祖太武帝魏主嗣殂太子燾即位自司徒長孫嵩以下普增爵位以盧魯元昌黎徒河人為中書監劉潔長樂信都人為尚書令尉眷魏餘部內入者西方尉遲氏後改尉氏眷代人劉庫仁此又一劉庫仁獨孤部人等八人分典四部以羅結魏餘部內入者有叱羅氏後改羅氏結代人為侍中外都大官魏有內外都大官總三十六曹事時結年一百七精爽不衰魏主以其忠慤親任之使兼長秋卿監典後宫出入卧內年一百十一乃聽歸老朝廷每有大事遣騎訪焉又十年乃卒魏立天師道場魏光祿大夫崔浩研精經術練習制度凡朝廷禮儀軍國書詔無不關掌不好老莊書曰此矯誣之説不近人情老聃習禮仲尼所師豈有為敗法之書以亂先王之治乎尤不信佛法曰何為事此胡神左右多毁之魏主不得已命浩以公歸第然每有疑議輒召問之浩既歸第因修服食養性之術初嵩山道士寇謙之上谷人徙馮翊修張道陵即張魯之祖見前之術自言嘗遇老子命繼道陵為天師授以辟穀輕身之術使之清整道教又遇神人李譜文云老子之元孫也授以圖籙真經使之輔佐北方太平真君謙之奉其書獻于魏主朝野多未之信浩獨師授其術且上書曰聖王受命必有天應河圖洛書皆寄言于蟲獸之文未若今日人神接對手筆粲然辭旨深妙自右無比豈可以世俗常慮而忽上靈之命哉魏主欣然使謁者奉玉帛牲牢祭嵩嶽迎致謙之弟子以崇奉天師顯揚新法起天師道場于平城東南重壇五層月設厨會數千人司馬氏光曰老莊之書欲同生死輕去就而為神仙者服餌修鍊以求輕舉鍊草石為金銀其為術正相戾耳是以劉歆七略敘道家為諸子神仙為方技其後又有符水禁呪之術至謙之遂合而為一至今循之浩不喜佛老而信謙之之言何哉甲宋景平二年太祖文帝義隆元嘉子元年魏世祖太武帝燾始光元年春正月宋廢其廬陵王義真為庶人宋主義符居喪無禮好與左右狎昵遊戲無度特進致仕范泰字伯倫寧之子上書諫之不聽廬陵王義真警悟好文而性輕易與謝靈運元之曽孫襲封康樂公世稱謝康樂顔延之字延年含之曽孫情好欵密靈運性褊傲不遵法度自謂才能宜參權要常懷憤悒延之嗜酒放縱徐羡之等惡義真與兩人遊義真故吏范晏從容戒之義真曰靈運空疏延之隘薄魏文帝所謂古今文人類不護細行者也但性情所得未能忘言于晤賞耳于是羡之等以靈運延之搆扇異同非毁執政皆出為郡守始義真至厯陽多所求索執政每裁量不盡與義真怨之表求還都時羡之等已密謀廢宋主而次立者應在義真與宋主有隙先奏列其罪惡廢為庶人徙新安郡前吉陽晉縣故城在今江西吉安府吉水縣令張約之堂邑人上疏曰廬陵王少蒙先皇優慈之遇長受陛下睦愛之恩今猥加剝辱幽徙逺郡上傷陛下常棣之篤下令逺近恇然失圖書奏見殺夏五月宋徐羡之傅亮謝晦廢其主義符為營陽王遷于吳六月弒之迎宜都王義隆于江陵殺前廬陵王義真以謝晦行都督荆湘等州軍事羡之等將廢義符以檀道濟先朝舊將威服殿省乃召道濟及江州刺史王𢎞入朝以謀告之謝晦聚將士于府內使中書舍人邢安泰潘盛為內應夜邀道濟同宿晦悚動不得眠道濟就寢便熟時義符在華林園為列肆親自沽賣與左右即龍舟而寢道濟引兵入雲龍門安泰等先誡宿衛莫有禦者軍士進殺二使者扶義符出收璽綬羣臣拜辭衛送故太子宫羡之等以宜都王義隆素有令望乃稱皇太后令數義符過惡廢為營陽王以義隆纂承大統遷義符于吳使邢安泰就弒之義符多力突走出昌門追者以門關踣而弒之昌門吳西郭門亦作閭傅亮帥行臺百官備法駕迎義隆于江陵羡之等遣使殺義真以荆州重地恐義隆至或别用人乃亟以録命録尚書自出命也除謝晦都督刺史欲令居外為援精兵舊將悉以配之七月行臺至江陵傳亮率百官上表進璽綬義隆下教時年十八曰猥以不德謬降大命顧已驚悸何以克堪當暫歸朝廷展哀陵寢并與賢彥申寫所懷望體其心勿為辭費時諸將佐聞二王死皆疑不可東下司馬王華曰先帝有大功于天下四海所服雖嗣主不綱人望未改羡之亮受寄崇重未容遽敢背德畏廬陵嚴斷恐不能自容以殿下寬慈越次奉迎冀以見德悠悠之論殆必不然又此五人同功並位孰肯相讓就懷不軌勢必不行廢主若存慮將來或受其禍是以殺害蓋由貪生過深不過欲握權自固耳義隆曰卿復欲為宋昌耶長史王曇首校尉到彥之皆勸行乃命華留鎮荆州欲使彥之將兵前驅彥之曰了彼不反便應朝服順流若使有虞此不足恃更開嫌隙之端會雍州刺史褚叔度卒乃遣彥之權鎮襄陽義隆引見傅亮號泣哀動左右既而問義真及少帝薨廢本末悲哭嗚咽侍側者莫能仰視傅亮汗流不能對乃布腹心于到彥之王華等義隆以府州文武自衛遂發江陵秋八月宋主義隆立是為文帝宜都王義隆至建康羣臣迎拜于新亭徐羡之問傅亮曰王可方誰亮曰晉文景以上人羡之曰必能明我赤心亮曰不然義隆謁初寧陵還止中堂百官奉璽綬義隆辭讓數四乃受之遂即位大赦謁太廟復廬陵王先封迎其柩還建康以行荆州刺史謝晦為真晦將行問蔡廓曰吾其免乎廓曰卿受先帝顧命任以社稷廢皆立明義無不可但殺人二兄而以之北面挾震主之威據上流之重以古推今自免為難晦始懼不得去既發喜曰今得脫矣徐羡之等進位有差有司奏車駕依故事臨華林園聽訟詔曰政刑多所未悉可如先者二公推訊乃以王曇首王華為侍中竟陵王義宣鎮石頭羡之等欲遂以到彥之為雍州不許徵為中領軍委以戎政彥之自襄陽南下謝晦慮彥之不過已彥之至楊口步往江陵深布城欵晦亦厚自結納由此大安柔然寇魏柔然紇升蓋可汗聞魏太宗殂將六萬騎入雲中攻拔盛樂宫魏主帥輕騎討之三日三夜至雲中紇升蓋引騎圍之五十餘重騎逼馬首相次如堵將士大懼魏主顔色自若衆情乃安紇升蓋弟子于涉斤為大將魏人射殺之紇升蓋懼遁去已而魏伐柔然大獲而還冬十一月吐谷渾王阿柴死弟慕璝立初吐谷渾王樹落干自號車騎將軍大單于及卒授國于其弟阿柴阿柴稍用兵侵并旁小種地方數千里遂為強國阿柴有子二十人至是疾病召諸子弟謂之曰先公車騎捨其子拾虔而授孤孤敢私于緯代門柴長子而忘先君之子乎我死汝曹當奉慕璝阿柴母弟為主阿柴又命諸子各獻一箭取一箭授其弟慕利延使折之慕利延折之又取十九箭使折之不能折阿柴乃諭之曰汝曹知之乎孤則易折衆則難摧汝曹當戮力一心然後可以保國寧家言終而卒十二月宕昌西羌别種故國在今鞏昌府岷州南北周以其地為郡唐曰宕州後廢朝貢于魏宕昌羌三苖之裔也羌地東接中國西通西域長數千里各有酋帥部落分地不相統攝而宕昌最盛通考宕昌之界自仇池以西東西千里席水以南南北八百里仇池在同谷郡席水在上邽縣有民二萬餘落諸種畏之至是其王梁彌匆遣子入見于魏乙宋元嘉二年魏始光二年丑夏主赫連昌承光元年春正月宋主始親聽政徐羡之傅亮上表歸政三上許之羡之仍遜位還第徐佩之等並謂非宜敦勸甚苦乃復奉詔視事二月燕有女子化為男燕有女子化為男燕主以問羣臣傳權對曰西漢之末雌雞化雄漢書五行志元帝初元丞相府史家雌雞伏子漸化為雄又後漢靈帝時雌雞化為雄事見前猶有王莽之禍况今女化為男臣將為君之兆也夏四月魏遣使如宋始復通也六月武都王楊盛卒子元立初盛聞晉亡不改義熙年號謂世子元曰吾老矣當終為晉臣汝善事宋帝及卒元自稱武都王遣使告喪于宋始用元嘉年號宋因而封之秋八月夏主勃勃殂世子昌立丙宋元嘉三年寅魏始光三年春正月宋討徐羡之傅亮誅之以王𢎞為司徒揚州刺史録尚書事彭城王義康都督荆湘等州軍事謝晦舉兵反江陵初宋主在江陵孔寧子會稽人為參軍及即位以為步軍校尉與侍中王華並有富貴之願疾徐羡之傅亮專權搆之于宋主宋主欲誅二人并發兵討謝晦以王𢎞檀道濟始不預廢弒之謀𢎞弟曇首又所親委密使報𢎞且召道濟欲使討晦王華等皆以為不可宋主曰道濟止于脅從本非創謀殺害之事又所不關預撫而使之必將無慮道濟至乃下詔暴羡之亮晦殺二王之罪命中領軍到彥之征北將軍檀道濟以時收翦又命雍州刺史劉粹等斷其走伏是日詔召羡之亮謝皭晦之弟遣人報之羡之走至新林自經死亮出走被執宋主使以詔書示之亮曰亮受先帝布衣之眷遂蒙顧託黜昏立明社稷之計也欲加之罪其無辭乎于是伏誅宋主問討晦之䇿于檀道濟對曰臣昔與晦同從北征入關十䇿晦有其九才略明練殆為少敵然未嘗孤軍決勝戎事恐非其長臣悉晦智晦悉臣勇今奉王命以討之可未陳而擒也徴王𢎞為侍中司徒録尚書事揚州刺史彭城王義康為荆湘都督荆州刺史晦聞徐傅等已誅自出射堂勒兵數日間四逺投集得精兵三萬奉表稱羡之亮等忠貞橫被寃酷皆王𢎞王曇首王華險躁猜忌讒搆成禍今當舉兵以除君側之惡閏月宋子劭生初宋袁皇后生子劭后自詳視使馳白宋主曰此兒形貌異常必破國亡家不可舉欲即殺之宋主狼狽至后殿户外禁之乃止以尚在諒暗故祕之至是始言劭生宋主自將討謝晦二月誅之宋主下詔戒嚴諸軍並進以討謝晦晦帥衆三萬發江陵舟艦旌旗甚盛歎曰恨不得以此為勤王之師宋主發建康謝晦下至江口到彥之已至彭城洲在湖南嶽州府巴陵縣東北會霖雨晦停軍十五日乃使孔延秀攻彭城洲及洲口柵陷之諸將欲還夏口到彥之不可乃保隱圻圻亦作磯在嶽州府臨湘縣東北水經注如山北對隱磯即此初晦與徐傅為自全之計以為晦據上流而道濟鎮廣陵各有強兵羡之亮居中秉權可得持久至是聞道濟來惶懼無計道濟既至與彥之軍合晦始見艦數不多不即出戰至晚因風帆上前後連咽連謂連接咽謂填咽西人離沮無復鬬心一時皆潰晦夜還江陵衆散略盡乃擕其弟遁等北走為人所執檻送建康何承天自歸于彥之彥之因監荆州府事于是誅晦皭及其同黨孔延秀周超等宋主還建康三月宋以謝靈運為祕書監顔延之為中書侍郎宋主既還建康徴靈運延之用之又以慧琳道人善談論因與議朝廷大事遂參權要賓客輻湊四方贈賂相屬琳著高屐披貂裘置通呈書佐會稽孔顗字思逺山隂人曰遂有黑衣宰相可謂冠履失所矣夏五月宋遣使巡行郡縣遣散騎常侍袁渝等十六人分行諸州郡縣觀察吏政訪求民隱又使郡縣各言損益宋主親臨聽訟宋主臨延賢堂聽訟自是每嵗三訊六月宋以王華王曇首殷景仁劉湛為侍中謝𢎞微名密以字行景仁從子為黃門侍郎王華以王𢎞輔政王曇首為上所親任與已相埓自謂力用不盡每歎息曰宰相頓有數人天下何由得治是時宰相無常官惟人主所與議論政事委以機密者皆宰相也亦有任侍中而不為宰相者然尚書令僕射中書監令侍中侍郎給事中皆當時要官也華與劉湛王曇首殷景仁俱為侍中風力局幹冠冕一時黃門侍郎謝𢎞微與華等皆宋主所重當時號曰五臣秋八月宋遣使如魏冬十月魏主自將攻夏魏主問公卿今當用兵赫連蠕蠕即柔然魏太武以其無知狀類于蟲因改其號二國何先長孫嵩等請先伐蠕蠕太常崔浩曰蠕蠕鳥集獸逃舉大衆追之則不能及輕兵追之又不足以制敵赫連氏刑政殘虐人神所棄宜先伐之魏主亦聞夏世祖赫連昌尊勃勃為世祖殂諸子相圖勃勃世子璝殺其弟倫倫兄昌討殺璝勃勃以昌為太子勃勃殂遂即位國人不安欲伐之嵩等曰彼若城守以逸待勞大檀蠕蠕紇升蓋可汗之名聞之乘虛入寇此危道也浩力贊其行于是遣奚斤襲蒲坂周幾襲陜城以薛謹字法順河東汾隂人為鄉導魏主欲以李順總前驅之兵崔浩曰順誠有籌略然其為人果于去就不可專委乃止浩與順由是有隙李順字德仁趙郡平棘人十一月魏主入統萬取蒲坂及長安魏主行至君子津在今歸化城西南黃河東岸水經河水于楨陵桐過二縣間濟有君子之名即此會天暴寒氷合帥輕騎濟河襲統萬夏主方燕羣臣魏師奄至上下驚擾夏主出戰而敗退走入城門未及閉魏豆代田帥衆乘勝入西宫焚其西門宫門閉代田踰垣而出魏分兵四掠殺獲數萬魏主謂諸將曰統萬未可得也他年當取之乃徙其民萬餘家而還魏師乘勝長驅遂入三輔蒲坂守將棄城奔長安奚斤遂克蒲坂夏主之弟助興自長安奔安定斤遂入長安秦雍氐羌皆降河西王蒙遜及氐王楊元聞之皆遣使附魏丁宋元嘉四年卯魏始光四年春二月宋主謁京陵初宋高祖命藏微時耕具以示子孫宋主至故宫見之有慚色近侍或進曰大舜躬耕厯山伯禹親事水土陛下不覩遺物安知先帝之至德稼穡之艱難乎夏四月魏遣使如宋六月癸卯朔日食夏主及魏主戰于統萬夏主敗走上邽魏取統萬先是魏主自統萬還平城夏平原公定帥衆向長安與魏奚斤相持魏主聞之欲乘虛再攻統萬遂自將發平城至拔鄰山胡三省注在黑水東北黑水注見前捨輜重以輕騎三萬倍道先行羣臣咸諫曰統萬城堅非朝夕可拔不若與步兵攻具一時俱往魏主曰用兵之術攻城最下必不得已然後用之今以步兵攻具皆進彼必懼而堅守若攻不時拔食盡兵疲外無所掠進退無地不如以輕騎直抵其城彼見步兵未至意必寬弛吾羸形以誘之彼或出戰則成擒矣吾軍去家二千餘里又隔大河所謂置之死地而後生者也及是魏主至統萬分軍伏于深谷以少衆至城下夏將狄子玉降言夏主聞有魏師召平原公定定曰統萬堅峻未易攻拔待我擒奚斤然後徐往內外擊之蔑不濟矣故夏主堅守以待魏主聞而患之乃退軍以示弱魏軍士有亡奔夏者言魏軍糧盡輜重在後步軍未至宜急擊之夏主從之將步騎三萬出城長孫翰等皆言夏兵步陳難陷宜避其鋒魏主曰逺來求賊唯恐不出今既出矣乃避而不擊彼奮我弱非計也遂收衆偽遁引而疲之夏兵為兩翼鼓譟追之行四五里會有風雨從東南來揚沙晦冥宦者趙倪曰今風雨從賊上來我向彼背天不助人願攝騎避之崔浩叱之曰是何言吾千里制勝一日之中豈得變易賊貪進不止後軍已絶宜引軍分出其後掩擊不意風道在人豈有常也魏主曰善乃分騎為左右隊以犄之魏主馬蹶而墜幾為夏兵所獲拓跋齊以身捍蔽魏主騰馬得上身中流矢奮擊不輟夏衆大潰魏人乘勝逐夏主至城北夏主不得入遂奔上邽明日魏主入城獲夏王公卿校及婦女以萬數馬三十餘萬匹牛羊數千萬頭府庫珍寶車旗器物不可勝計頒賜將士有差留常山玉素遵之子鎮統萬遂還平城夏平原公定聞統萬破亦奔上邽魏主詔奚斤班師斤固請益兵滅夏魏主乃遣將益兵以助之初夏世祖性豪侈築統萬城高十仞基厚三十步上廣十步宫墻高五仞其堅可以厲刀斧臺榭壯大皆雕鏤圖畫被以綺繡魏主曰蕞爾國而用民如此欲不亡得乎魏主壯健鷙勇臨城對陳親犯矢石左右死傷相繼神色自若由是將士畏服咸盡死力性儉率服繕取給而已以為財者軍國之本不可輕費賞賜皆死事勳績之家親戚貴寵未嘗濫有所及命將出師指授節度違者多致負敗明于知人唯其所長不論流品聽察精敏下無遁情賞不遺賤罰不避貴常曰法者朕與天下共之何敢輕也然果于殺戮往往已殺而復悔之冬十一月晉徵士陶潛字淵明一字元亮尋陽人晉長沙公侃之曽孫卒潛少有高趣博學不羣以親老家貧為州祭酒少日自解歸召主簿不就躬耕自資遂抱羸疾後復為彭澤令不以家自隨在官八十餘日郡遣督郵至縣吏請曰應束帶見之潛歎曰我豈能為五斗米折腰向鄉里小兒即日解印綬去賦歸去來辭著五柳先生傳以自况徵著作郎不就妻翟氏亦與同志能安勤苦夫耕于前妻鋤于後潛自以先世為晉輔恥復屈身後代自宋高祖王業漸隆不復肯仕是嵗將復徴之會卒世號靖節先生御批厯代通鑑輯覽卷三十六

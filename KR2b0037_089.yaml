body:
  text: 太皇太后移居大內二月以程松為四川宣撫使吳曦副之松移司興元東軍三萬屬焉曦進屯河池西軍六萬屬焉松始至欲以執政禮見曦責庭參曦聞之及境而還松用東西軍一千八百自衛曦抽摘以去松亦不悟尋詔曦兼陜西河東招撫使錢象祖罷韓托胄鋭意用兵象祖執不可遂以懷姦避事罷之尋奪二官信州居住夏四月以薛叔似為京湖宣撫使鄧友龍為兩淮宣撫使追奪秦檜王爵改諡繆醜論檜主和誤國之罪也後以金和議復成復檜爵諡金復命布薩揆㑹兵河南金聞皇甫斌分兵規取唐鄧復命揆領行省于汴河南皆聽節制盡徴諸道籍兵分守要害命彰德守臣護韓琦墳凡宋宗族所居有司提控之吳曦反曦既得志與其從弟晛及徐景望趙富米修之董鎮共為反謀隂遣其客姚淮源獻關外階成和鳯四州于金求封蜀王郭倪遣兵復泗州五月下詔伐金時畢再遇字德卿兖州人為先鋒功第一再遇尅日進兵聞金已有備乃先一日出其不意泗有二城再遇列旗鼓僞為攻西城狀而已率精兵遷趨東城先登殺金兵數百遂破之西城亦降倪以刺史牙牌授之再遇辭曰甫下二城即得刺史繼此何以為賞不受韓托胄聞已得泗州及新息褒信漢縣故城在今河南光州息縣潁上隋縣今屬江南潁州府虹縣唐置宋屬泗州今屬鳯陽府乃議降詔伐金有曰兵出有名師直為壯言乎逺言乎近孰無忠義之心為人子為人臣當念祖宗之憤直學士院李璧之詞也郭倪遣兵攻宿州唐置今屬鳯陽府大敗郭倪遣郭倬李汝翼㑹兵攻宿州敗還至蘄漢縣宋屬宿州元省金人追而圍之倬執馬軍司統制田俊邁以與金人乃得免時建康都統李爽攻夀州亦敗皇甫斌敗績于唐州時江州都統王大節攻蔡州亦不克而潰詔以宗室均大祖九世孫父希瞿為沂王柄孝宗孫父魏惠獻王愷嗣賜名貴和六月鄧友龍免以邱崈為兩淮宣撫使韓托胄以師出無功免友龍而以崈代之駐揚州崈至鎮部署諸將悉以三衙江上軍分守江淮要害于是王大節李汝翼皇甫斌李爽等皆坐貶斬郭倬于鎮江秋七月蘇師旦有罪安置韶州韓托胄既喪師始覺為蘇師旦所誤一日召李璧飲酒酣語及師旦始謀事璧微摘其過以覘之因極言師旦怙勢招權使明公負謗非竄謫此人不足以謝天下托胄然之翌日罷師旦官籍其家旬日除名韶州安置冬十月金布薩揆分兵南侵布薩揆分兵為九道南下揆兵三萬出潁夀完顔匡兵二萬五千出唐鄧赫舍哩子仁兵三萬出渦口赫舍哩呼沙呼一名赫舍哩執中阿蘇之裔兵二萬出清河口清河即泗水在淮安府西少北水經注淮水徑清河縣南與泗水合謂之清口是也完顔充按金史列傳宗韓子名充卒于天眷九年此别是一人兵一萬出陳倉富察貞兵一萬出成紀此宋初移置秦州州始之成紀縣明省入州漢之成紀注别見前完顔綱本名約尼字正甫按約尼舊作元奴今改後仿此兵一萬出臨潭舊洮州治唐置臨潭縣尋廢金仍宋曰洮州此沿唐舊名今鞏昌府洮州衛是舒穆嚕仲溫本名枵鄂懿州呼圖克明安人舊作石抹仲溫楞鄂舊作老幹呼圖克舊作胡土虎今改後仿此兵五千出鹽川注見前完顔璘兵五千出來逺宋寨後廢為鎮在今鞏昌府寧逺縣西南呼沙呼自清河口渡淮遂圍楚州十一月以邱崈簽書樞密院事督視江淮軍馬金人攻淮南日急詔郭杲將兵駐真州以援之又以崈督視江淮軍馬或勸崈棄廬和州為守江計崈曰棄淮則與敵共長江之險吾當與淮南俱存亡乃益增兵防守金人破京西州軍招撫使趙淳焚樊城而遁金完顔匡破光化宋縣今屬湖北襄陽府棗陽隋縣宋為軍今縣屬襄陽府江陵副都統魏友諒突圍奔襄陽趙淳焚樊城金人遂破信陽宋置軍元為州今屬河南汝寧府襄陽隋州唐置今屬湖北德安府進圍德安府本漢江夏郡地宋曰德安府今𨽻湖北金布薩揆破安豐軍宋置治壽春今江南夀州是遂圍和州揆引兵至淮遣人密測淮水惟八疊灘可涉即遣鄂屯襄本名添夀上京路人按鄂屯襄舊作奧屯襄今改後仿此揚兵下蔡聲言欲渡守將何汝勵姚公佐以為誠然悉衆屯花靨鎮名在今夀州西北以備之揆乃遣薩布始祖弟博郭尼之後按薩布舊作賽不博郭尼舊作保活里今改後仿此等潛師渡八疊灘駐于南岸官軍不虞其至遂皆潰走自相蹂踐死者不可勝計揆遂奪潁口禹貢錐指潁水由潁上縣東南流至正陽鎮入淮謂之潁口即春秋之潁尼也下安豐軍及霍邱縣注見前進圍和州整軍列騎張旗幟于沿江上下江表大震金人入西和州本宋長道縣之白石鎮紹興中移岷州來治改曰西和明降為縣今屬甘肅鞏昌府十二月入成州西魏置明降為縣今屬甘肅階州吳曦焚河池退壁青野原注見前曦既遣姚淮源如金因按兵河池韓托胄日夜望其進兵使者相繼曦恐謀泄乃遣兵攻秦隴與金人力戰以堅托胄之心金人許封之約曰若按兵境不為異同使其師東下無西顧之憂則全蜀之地卿所索有當加封冊一依康王故事更能順流東下助為犄角則旄麾所指盡以相付因命完顔綱經略之綱進兵水洛訪得曦族人吳端署為水洛城巡檢使遣人報曦曦得報意動以程松在興元未敢發詐稱枤殺端而隂遣使送欵于綱及金富察貞破和尚原入西和州曦將王喜等方力戰曦忽傳令退保黑谷軍遂潰貞入成州曦因焚河池退壁青野原自是金人無復顧慮金人破真州攻六合郭倪遣兵救之敗績倪棄楊州走金赫舍哩子仁破滁州遂入真州州之士民奔逃渡江者十餘萬知鎮江府宇文紹節字挺臣成都廣都人亟具舟以濟自是淮西縣鎮皆沒于金金人入大散關吳曦還興州時興州都統制母廣韻注云母邱或為母氏思以重兵守關曦聞金兵至因撤驀關之戍金人由板閘谷繞出關後思孤軍不能支遂破曦退屯置口在漢中府略陽縣西完顔綱遣張仔㑹之曦言願附金之情仔請曦告身為報曦盡出以付仔綱乃以金主命遣馬良顯持詔書金印立曦為蜀王曦密受之遂還興州是夜天赤如血光燭地如晝翌日曦召幕屬諭意謂東南失守車駕幸四明今宜從權濟事王翼楊騤之抗言曰如此則相公忠孝八十年門户一朝掃地矣曦曰吾意已决即遣任辛奉表獻蜀地圖及吳氏譜牒于金邱崈遣使如金軍議和金布薩揆還軍下蔡金布薩揆欲通和罷兵購得韓琦五世孫元靚遣之渡淮邱崈獲之詰所以來之故元靚言兩國交兵北朝皆謂韓太師意今相州宗族墳墓皆不可保故來依太師耳崈使畢其說始露講解之意崈密使人護送北歸俾叩其實既而元靚回得金行省文字崈以聞于朝韓托胄方以師出屢敗悔其前謀輸家財二十萬以助軍而諭崈募人持書幣赴金營議和崈乃遣劉佑持書于揆願講好息兵揆曰稱臣割地獻首禍之臣乃可崈復遣王文往言用兵乃蘇師旦鄧友龍皇甫斌等所為非朝廷意今三人皆已貶黜揆曰托胄若無意用兵師旦等豈敢專權文還崈復遣使相繼以往因許還其淮北流移人及今年嵗幣揆始許之自和州退屯下蔡獨濠州尚使一統軍守之薛叔似免叔似夙以功業自期及臨事絶無可稱屬郡多陷故坐免以吳獵為京湖宣撫使以畢再遇權山東京東招撫司自金兵渡淮戍將望風奔潰惟再遇數與抵禦朝命再遇節制淮東軍馬再遇謂六合最為要害引兵赴之適金人大至再遇登城偃旗伏鼓伏兵南門列弩手城上金兵臨濠衆弩齊發伏兵出關金人驚遁既而金赫舍哩都統合兵進攻城中矢盡再遇令人張蓋往來城上金人意其主兵官也爭射之須臾矢集樓墻如蝟獲矢數萬間出奇兵奮擊金人始退去至是除鎮江都統制兼權山東京東招撫司又嘗引金人戰且前且却視日已晚乃以香料煮豆布地上復前摶戰佯敗金人乘勝追逐馬饑聞豆香皆就食鞭之不前反攻之金人馬死者不可勝計又嘗與金人對壘度難與爭鋒一夕拔營去留旗幟于營並縳生羊置其前二足于鼓上擊鼓有聲金人不覺為空營復相持數日及覺欲追之則已逺矣程松自興元逃歸金完顔綽哈舊作完顔抄合今改後仿此攻鳯州松求援于吳曦曦始言當發三千騎往松信不疑及曦受金詔宣言金使者欲得階成和鳯四州以和持書諷松使去松不知所為㑹報金兵至百姓奔走相蹂躪松使趨宋倉山在今漢中府南鄭縣南一名玉女山而遁自閬州順流至重慶以書抵曦丐贐禮稱曦為蜀王曦以匣封致餽松望見大恐疑為劍亟逃奔使者追與之乃金寶也松受而兼程出峽西向掩淚曰吾今始獲保頭顱矣䝉古却特特穆津稱帝于鄂諾舊作斡難今改河即黑龍江上流發源于喀爾喀部西北之肯特山今名額能河元太祖事始此額能舊作敖嫩今改後仿此特穆津之十世祖勃端察爾舊作孛端又兒今改後仿此母為阿倫果斡䝉古語多美之稱按元史太祖本紀阿倫果夢斡嫁托本默爾根生二子而寡居夜寢帳中白光自天中入化為金色神人來趨臥榻阿掄果幹覺遂有娠産一子即勃端察爾也陳桱通鑑續編阿倫果斡生二子寡居夜寢屢有光明照其腹又生三子勃端察爾其季也今考䝉古源流神人語與元史合而生三子則同陳說並注于此奔按阿掄果斡舊作阿蘭果火托本默爾根舊作脫咩哩揵今並改勃端察爾生而狀貌奇異其後子孫蕃衍各自為部居烏桓之北與衛拉特舊作畏羅今改奈曼九姓回鶻故城和林地在今喀爾喀部杭愛山東元太祖初都此後置和寧路按回鶻即今回回唐時昆伽可汗築城于哈喇和林河之東其地本與䝉古接壤自唐末徙居火州回鶻遂散處西域五代宋初常以玉馬入貢其後又稱回回國王始見于遼史天祚紀蓋即回鶻轉音元史所載回回氏族與回鶻亦無分别如昻吉爾傳稱阿哈瑪特回回人而阿哈瑪特傳則稱回鶻人實非有二族也接壤世奉貢於遼金而總隸于韃靼至伊蘇克依勃端察爾九世孫舊作也速該今改并合諸部勢愈盛大已而生子有異徴手握凝血如赤石將卜名適有名特璊者至其地遂以特穆津名之按元史云伊蘇克依攻塔塔爾部獲其部長特穆津還次特哩衮布達拉山而生子因即以命名今依䝉古源流改輯里特哩衮布特拉舊作趺溫盤陀今改後仿此後伊蘇克依卒後追諡烈祖神元皇帝特穆津幼部衆多歸於族人泰楚特舊作泰赤烏今改後仿此部泰楚特合七部人凡三萬攻之特穆津與母諤楞舊作月倫今改後仿此率部人為十三翼大戰泰楚特等敗因得少安時泰楚特部地廣民衆而無紀律其下謀曰特穆津衣人以己衣乘人以己馬真吾主也因悉歸之泰楚特部日以微未幾塔塔爾部叛金特穆津自鄂諾河帥衆㑹金師同滅之以功授特穆津為察罕圖嚕舊作察兀禿魯今改猶中國之招討使也特穆津以奈曼部强盛事之甚謹奈曼反侵掠之特穆津乃大㑹屬部于特默格舊作帖麥垓今改後仿此川在和林西南議伐奈曼奈曼部長迪延汗舊作太陽罕今改營于杭愛舊作沆海今改山在和林北與默爾竒斯舊作蔑里乞今改諸部合兵勢頗盛特穆津與之大戰擒殺迪延汗諸部悉潰未幾泰曼遂滅特穆津益以盛强遂攻西夏破拉吉哩舊作力吉里今改寨方與紀要在揄林北邉外經羅索舊作落思今改城與上同大掠其一路而還至是大㑹諸部長于鄂諾河之源建九斿曰旗自號為成吉斯汗先是金主遣衛王允濟往靜州受特穆津之貢允濟竒其狀貌歸言于金主請以事除之金主不許特穆津聞而憾之北靜州金屬西京路地理志云大定中以天山升置至邉八十里遼史地理志云本秦州地當在今郭爾羅斯之境青吉斯汗舊作成吉斯可汗考䝉古源流云元太祖未起時石上有異鳥向之鳴聲曰青吉斯以為瑞遂取其音為號今依䝉古源流改正丁卯三年金泰和七年春正月罷邱崈以張巖督視江淮軍馬時金已有和意崈上疏乞移書金帥以成前議且言金人既指韓托胄為元謀若移書宜暫免繫銜托胄大怒罷崈吳曦自稱蜀王權大安軍宋置今陜西漢中府寧羌州是楊震仲字革父成都人死之曦遣將利吉引金兵入鳯州以四郡付之表鐵山在漢中府河縣北為界即興州為行宫改元置百官遣董鎮至成都治宫殿欲徙居之稱臣于金分其所統兵十萬為統帥遣祿祈等戍萬州唐置今四川夔州府萬縣是泛舟下嘉陵江即西漢水自漢中府略陽縣北與白水江合又西南合諸水入蜀之廣元界聲言約金人夾攻襄陽下黃榜于成都潼川利州夔州四路以興州為興德府召隨軍轉還使安丙字君卿成州人為丞相長史權行都省事丙度不得脫徒死無益乃陽與而隂圖之曦又召權大安軍楊震仲震仲不屈飲藥而死其他如陳咸字逄儒升卿子自髠其髮史次泰眉山人自瞽其目李道傳鄧性甫等悉棄官去又有權漢州事劉當可簡州守李大全髙橋巡檢郭靖皆不屈而死二月以楊輔為四川制置使吳曦逐之輔知成都嘗言吳曦必反帝意輔能誅曦乃密詔授輔制置使許以便宜從事詔至人勸以倡義輔自以不習兵事且內郡無兵可用遷延不發曦移輔知遂寧府輔遂以印授通判韓植棄成都而去以知建康府葉適兼江淮制置使適上言三國孫氏嘗以江北守江自南唐以來始失之乞兼節制江北諸州詔從之時羽檄旁午而適治事如平時軍需皆從官給民以不擾其防守皆盡法度金平章政事布薩揆卒于下蔡揆有疾金主命左丞相完顔宗浩行省事于汴至是揆卒揆為政多惠人樂為用四川轉運使安丙誅吳曦傳首臨安監興州合江倉楊巨源字子淵其先成都人父信臣家于益昌謀討曦乃隂與曦將張林朱邦寧及忠義士朱福等深相結眉州程夢錫知之以告轉運使安丙丙時稱疾未視事乃屬夢錫以書致巨源延之臥所巨源曰先生而為逆賊丞相長史邪丙號哭曰目前兵將我所知不能奮起必得豪傑乃滅此賊巨源曰非先生不足以主此事非巨源不足以了此事㑹興州中軍正將李好義下邽人亦結軍士李貴進士楊君玉李坤辰李彪等數十人謀誅曦好義曰此事誓死報國救四屬生靈但曦死後若無威望者鎮撫恐一變未息一變復生欲奉安丙主事使坤辰來邀巨源與㑹巨源往與約還報丙丙大喜始出視事君玉與白子申共草密詔乙亥未明好義帥其徒七十四人入僞宫時僞宫門洞開好義大呼而入曰奉朝廷密詔以安長史為宣撫令我誅反賊敢抗者夷其族曦衛兵千餘聞有詔皆棄挺而走巨源持詔乘馬自稱奉使入內户曦啓户欲逸李貴即前執之刃中曦頰好義急呼王換斧其腰貴遂斫其首馳告丙宣詔軍民拜舞聲動天地持曦首撫定城中市不易肆盡收曦黨殺之衆推丙權四川宣撫使巨源權參贊軍事丙陳曦所以反及矯制平賊便宜賞功狀上疏自劾待罪函曦首及違制法物與曦所受金人詔印送朝廷曦僭立凡四十一日時金遣珠格高琪西北路明安人按瑚舊作木虎今改後仿此奉册于曦未至而曦已誅矣先是韓托胄聞曦反大懼與曦書許以茅土之封且召知鎮江宇文紹節問計紹節云安丙非附逆者必能討賊托胄乃密以帛書諭丙云若能圖曦報國以明本心即當不次推賞書皆未逹而誅曦露布已聞朝廷大喜曦首至臨安獻于廟社梟之市三日詔誅曦妻子家屬徙嶺南奪曦父挺官爵遷曦祖璘子孫出蜀存璘廟祀三月安丙使興州將李好義等復西和階成鳯州及大散關楊巨源李好義謂安丙曰曦死敵破膽矣關外四州為蜀要害盍乘勢復取之不然必為後患丙從之于是分遣好義復西和州張林李簡復成州劉昌國復階州張翼復鳯州孫忠鋭復大散關好義進兵次于獨頭嶺㑹忠義及民兵夾擊金人死者蔽路七日至西和人人效死前無留敵金將完顔欽遁去好義整衆而入軍民歡呼迎拜好義籍府庫以歸于官欲乘勢徑取秦隴以牽制江淮宣撫司不許士氣皆沮以楊輔為四川宣撫使安丙副之夏四月召輔知建康府吳曦既誅安丙趣楊輔還成都詔以輔為宣撫使丙副之兼知興州許奕字成之簡州人為宣諭使改興州為沔州即人陜西漢中府略陽縣朝廷察丙與輔異召輔赴闕輔抵建康引咎不進著作佐郎楊簡言輔嘗棄成都不當召遂命輔知建康以方信孺字孚若興化軍人為國信所參議官如金軍韓托胄募可以報使金師者近臣薦信孺可使自蕭山丞召赴都命以使事信孺曰開釁自我金人設問首謀當以何辭對之托胄矍然遂以信孺為奉使金國通謝國信所參議官持張巖書以行程松以罪竄澧州明年再竄賔州以錢象祖參知政事金人復破大散關五月太皇太后謝氏崩諡曰成肅李好義襲秦州與金將珠格高琪戰敗績好義還為吳曦將王喜所毒而卒朝廷慮喜為變授節度使移荆鄂都統制六月安丙殺宣撫司參議官楊巨源初吳曦誅奬諭詔至興州巨源謂人曰詔命一字不及巨源疑有以蔽其功者俄報王喜授節度使而巨源與道判心益不平乃訴功于朝或謂安丙曰巨源謀亂丙令喜鞠其黨皆抵罪時巨源方與金人戰于鳯州之長橋而敗丙密使興元都統制彭輅收巨源械送閬州獄至大安龍尾灘因使將校樊世顯殺之聞者莫不扼腕流涕秋七月大旱蝗蝗飛蔽天食浙西豆粟皆盡詔郡邑賑恤之九月貶方信孺官遣右司郎中王柟字汝良大名人如金軍信孺至濠州赫舍哩子仁止之于獄露刃環守之絶其薪水要以五事信孺曰反俘歸幣可也縛送首謀自古無之稱藩割地則非臣子所敢言子仁怒曰若不望生還邪信孺曰吾將命出國門已置死生度外矣子仁遣至汴見完顔宗浩出就傳舍宗浩使將命者來堅持五說信孺辨對不少屈宗浩不能詰授以報書曰和與戰俟再至决之信孺還朝廷以林拱辰為通謝使與信孺持國書誓草及許通謝百萬緡信孺至汴宗浩怒信孺不曲折建白遽以誓書來有誅戮禁錮之語信孺不為動將命者曰此非犒軍可了别出事目以示之信孺曰嵗幣不可再增故代以通謝錢今得此求彼吾有隕首而已㑹興州遣師復大散關宗浩益疑之乃遣信孺還復書于張巖曰若能稱臣即以江淮之閒取中為界欲世為子國即盡割大江為界且斬元謀姦臣函首以獻及添嵗幣五萬兩匹犒師銀一千萬兩方可議和好信孺還致其書韓托胄問之信孺言敵所欲者五事一割兩淮二增嵗幣三索歸附人四犒軍銀五不敢言伲胄固問之信孺徐曰欲得太師頭耳托胄大怒奪信孺三官臨江軍居住信孺三使金師以口舌折之雖未即和然已有成說及貶欲再遣使顧在廷無可者近臣以王柟薦乃命假右司郎中持書北行葬成肅皇后以趙淳為江淮制置使張巖免韓托胄怒金人欲罪首謀和議遂輟復鋭意用兵乃以淳鎮江淮而免張巖巖聞督府九月費耗縣官錢三百七十萬緡而無成功冬十一月禮部侍郎史彌逺誅韓托胄于玉津園詔暴托胄罪惡于中外自興兵以來蜀口漢淮之民死于兵戈者不可勝計公私之力大絀而托胄意猶未已中外憂懼禮部侍郎兼資善堂翊善史彌逺入對因力陳危迫之勢請誅托胄以安邦皇后楊氏素怨托胄因使皇子榮王曮具疏言托胄再啓兵端將不利社稷帝不答后從旁力贊之帝猶未許后請命其兄楊次山字仲甫越之上虞人擇羣臣可任者與共圖之帝始允可次山遂語彌逺彌逺得密㫖以錢象祖嘗諫用兵忤托胄乃先白象祖象祖許之象祖以告李璧彌逺自懷中出御筆批云韓托胄久任國柄輕啓兵端使南北生靈枉罹凶害可罷平章軍國事陳自强阿附充位可罷左丞相日下出國門仍命主管殿前司公事夏震以兵三百防護象祖欲奏審璧謂事留恐泄乃已翌日托胄入朝至太廟前震呵止之從者皆散震以兵擁托胄至玉津園側殛殺之彌逺象祖以誅托胄聞帝不信越三日猶以為未死後審其果然遂下詔暴托胄罪惡于中外蓋其謀始于彌逺而成于皇后及次山帝初無意也論功進彌逺為禮部尚書加震福州觀察使托胄専政十四年宰執侍從臺諫藩閫皆其門廡之人天子孤立于上威行宫省權震宇內嘗鑿沼于山下瞰太廟出入宫闈無度孝宗疇昔思政之所晏然居之老宫人見之往往垂涕顔棫草制以為得聖之淸易祓撰答詔以元聖褒之余嘉請加九錫趙師乞置平原郡王府官屬托胄皆當之不辭其嬖妾皆封郡國夫人每內宴與妃嬪雜坐恃勢驕倨掖庭皆惡之及籍其家多乘輿御服之飾其僭紊極矣易祓字彥祥潭州人治韓托胄黨竄陳自强于永州斬蘇師旦流郭倪等于嶺南貶李璧等官韓托胄既死錢象祖探懷中堂帖授自强曰有㫖丞相罷政自强即上馬顧曰望大參保全明日奪其三官永州居住尋竄雷州遣使即韶州誅師旦安置郭倪于梅州宋置明廢今廣東嘉應州是鄧友龍于循州唐置明廢今惠州府龍川縣是郭僎于連州貶李璧張巖許及之葉適薛叔似皇甫斌等官秩有差立榮王曮為皇太子更名懤尋更名詢十二月罷山東京東西路招撫司以錢象祖為右丞相兼樞密使衛涇雷孝友參知政事史彌逺同知樞密院事林大中簽書院事初韓托胄欲內交于大中大中不許而上書極論其姦因辭官屏居時事不掛于口托胄當國或勸其通書以免禍大中曰福不可求而得禍可懼而免邪不聼凡十二年而復起戊辰嘉定元年金泰和八年春正月王柟還自汴三月以韓托胄蘇師旦首畀金柟至汴請依靖康故事世為伯姪之國增嵗幣為三十萬犒軍錢三百萬貫蘇師旦等俟和議定後當函首以獻完顔匡具以柟言奏于金主金主命匡移書索韓托胄首以贖淮南地改犒軍錢為銀三百萬兩㑹錢象祖移書金帥府喻以誅托胄事柟未之知也一日匡問柟曰韓托胄貴顯幾年矣柟曰已十餘年平章國事才二年耳匡曰今欲去此人可乎柟曰主上英斷去之何難匡顧之而笑和議始决遣柟持書索韓托胄首以贖淮南柟還言于朝詔百官議吏部尚書樓鑰字大防勤縣人曰和議重事待此而决姦宄已斃之首又何足惜遂命臨安府斫棺取首梟之兩淮仍諭諸路以函首畀金之事遂以托胄及師旦首付王柟送金師以易淮陜侵地臨安大火火凡四日城內外亘十餘里死者甚衆廬舍十燬其七百官多僦舟以居民訛言相驚亡賴因而縱火為姦四年三月臨安復大火焚省部官舍延及太廟詔遷神主于夀慈宫三日火息乃還太廟省部皆寓治驛寺夏六月金人歸大散關及濠州王柟以韓托胄蘇師旦首至金金主御應天門備黃麾立仗受之百官上表稱賀懸二首并畫像于通衢令百官縱觀然後漆其首藏于軍器庫遂命完顔匡等罷兵更元帥府為樞密院遣使歸大散關及濠州秋七月詔邱崈同知樞密院事未至卒諡忠定崈儀狀魁傑機神英悟嘗慷慨曰生無以報國死當為猛將以滅敵其忠義蓋天性也八月以婁機字彥發嘉興人同知樞密院事樓鑰簽書院事續綱目作同知院事今依宋史寧宗紀改正鑰持論堅正忤韓托胄意奉祠纍年機初為太常少卿托胄開邉機曰恢復之名非不美今人才難得財力未裕萬一兵連禍結奈何鄧友龍曰不逐此人則異議無所回遂斥外及入樞府時干戈甫定信使往來機禆贊之功為多尤惜名器守法度進退人物直言可否不市私恩不避嫌怨賑江淮流民出米二十萬石錢一百萬緡命江浙制置司賑之九月金遣使來和議成下詔以和議成諭天下冬十月以錢象祖史彌逺為左右丞相雷孝友知樞密院事樓鑰同知院事婁機參知政事彌逺尋以母憂去位在十一月未幾象祖亦罷在十二月金主璟殂衛王永濟太名允濟後避諱改永世宗第七子立是為衛紹王金主無子疏忌宗室以永濟柔弱鮮智能故愛之欲傳位馬㑹永濟自武定入朝金主已感疾遂留不遣及金主殂元妃李氏黃門李新喜平章政事完顔匡等定策奉永濟即位明年葬金主璟于道陵廟號章宗金章宗陵在順天府房山縣大房山東北贈趙汝愚太師沂國公諡忠定後迫封福王己巳二年金主永濟大安元年夏四月金主永濟殺其故主妃李氏初章宗遺詔內人有娠者二人生男則立為儲二平章政事布薩端本名齊勤中都路和爾和必喇明安人按齊勤舊作七斤和爾和必喇舊作大魯虎必剌今改後仿此承金主永濟意奏先帝承御賈氏當以十一月免乳今已逾期范氏産期合在正月今醫稱胎形已失願削髮為尼金主乃以范氏損其遺腹詔中外而殺元妃李氏承御賈氏以布薩端為右丞相五月起復右丞相史彌逺彌逺歸治母喪太子請賜第行在令就第持服以便咨訪䝉古入靈州夏主安全降夏自是益衰秋八月罷四川宣撫使冬十二月輝和爾舊作畏吾兒今改後仿此國降于䝉古輝和爾國自唐末四遷火州統巴什伯舊作别失八今改里之地臣于契丹至是遂與舉部降于䝉古庚午三年金大安二年夏六月丁巳朔日食續綱目作四月朔今依宋史寧宗紀改正秋八月夏侵金葭州夏自天㑹初與金議和八十餘年未嘗交兵至是為䝉古所攻求救于金金主永濟新立不能出師夏人怨之遂侵葭州金慶善努本內族名承立字獻甫統軍使噶山之子按慶善努舊作慶山奴噶山舊作拐山今改後仿此敗之而去冬十二月婁機免機立朝能正言好稱奬人才不遺寸長訪問賢能疏列姓名及其可用之實以備採取至是以老罷䝉古侵金金主永濟嗣立有詔至䝉古傳言當拜受䝉古主問金使曰新君為誰使曰衛王也䝉古主遽南面唾曰我謂中原皇帝是天上人做此等庸懦亦為之邪何以拜為即乘馬北去金使還言永濟怒欲俟䝉古入貢就害之䝉古主知之遂與金絶益嚴兵為備數侵掠金西北之境其勢漸盛金人皇皇遂禁百姓傳說邉事周禮口自此䝉古與金兵連禍結故特書之辛未四年金大安三年夏四月金使人求和于䝉古䝉古不許初金納哈塔邁珠舊作納合買住今改守北鄙知䝉古將侵邉奔告于金主金主曰彼于我無釁汝何言此邁珠曰近見其鄰部附從西夏獻女而造箭製楯不休非圖我而何金主以其擅生邉隙囚之及䝉古侵擾雲中九原連嵗不休遂破大水濼方輿紀西在大同府西北以進金主始恐釋邁珠而遣西北路招討使鈕祜祿哈達舊作粘合打今改求和蒙古主不許六月遣使如金不至而還賀生辰也時金有䝉古之難不暇延使者至涿州而還尋詔江淮京湖四川制置司謹飭邉備秋八月夏主安全卒族子遵頊立遵頊改元光定號安金曰襄宗䝉古攻金西京留守赫舍哩呼沙呼棄城遁金西北諸州皆降䝉古金通吉遷嘉努舊作獨吉千家奴今改後仿此完顔呼實舊作胡沙今改後仿此至烏舍堡與下烏月營俱在大同府北未及設備䝉古兵奄至拔烏舍堡及烏雲營䝉古主乘勝破白登城本漢白登臺地金置縣元廢故城在今大同府陽高縣南遂攻西京凡七日呼沙呼懼以麾下棄城突圍遁去䝉古主以精騎三千馳之金兵大敗追至翠屏口翠屏山口也在渾源州南遂取西京及桓撫州桓州金置明廢故城在今獨石口外上駟院牧厰北撫州亦金置元為興和路明廢故城在今張家口外鑲黃旗牧厰西南䝉古主復遣其子卓沁䝉古主長子舊作木赤察罕台䝉古主次子舊作察合台烏格台䝉古主第三子即太宗舊作窩閣台今並改後仿此三人帥兵分取雲內東勝武朔豐靖等州注俱見前由是金德興本遼奉聖州金升府元曰保安州今州屬宣化府𢎞州遼置元省故城在今宣化府西寧縣昌平懷來注俱見前縉山唐縣今宣化府延慶州是豐潤金縣今屬遵化州密雲注見前撫寧金縣今屬永平府集寧金縣屬撫州元置路于此明廢故城在今正黃旗牧厰東東過平灤謂平州灤州也續綱目作平欒今改正南至清滄與下欣代注俱見前由臨潢過遼河西南至欣代皆降于䝉古閏九月金兵禦䝉古敗績于㑹河堡名故址在今宣化府萬全縣西䝉古遂入居庸關大掠而去䝉古主既破撫州休士牧馬將遂南向金主復命招討使完顔糾堅監軍完顏萬努舊作萬奴今改後仿此等率其衆號四十萬駐野狐嶺在萬全縣東北勢極髙峻鴈飛過此遇風輒墮以備呼實率重兵為後繼或謂糾堅曰蒙古新破撫州方以所獲賜其下馬牧于野當乘其不虞掩擊之糾堅曰此危道也不若馬步俱進為計萬全䝉古主聞之進兵于獾兒觜在野狐嶺西糾堅遣麾下明安剛里人問䝉古舉兵之故明安反降于蒙古以虛實告之䝉古主遂與糾堅等戰金兵大敗人馬蹂􅏳死者不可勝計䝉古乘鋭而前呼實畏其鋒不敢拒戰引兵南行蒙古兵踵擊之至㑹河堡金兵又大敗呼實僅以身免走入宣德注見前䝉古兵乘勝薄之遊兵至居庸關守將完顔福夀哈斯罕人棄關遁䝉古兵克之金中都戒嚴禁男子不得輒出城䝉古逰奕至都城下金主欲南奔汴㑹衛卒誓死迎戰䝉古兵損折頗多遂襲金羣牧監驅其馬而去金主乃止命秦州刺史珠格高琪屯通元門外尋降呼實為咸平路兵馬總管將士以其罰輕由是益不用命冬十一月己酉朔日食金以圗克坦鎰為右丞相赫舍哩呼沙呼為右副元帥鎰為上京留守聞中都戒嚴曰事急矣乃選兵二萬遣同知烏克遜鄂屯舊作烏古孫兀屯今改後仿此將之入衛金主嘉之徴拜尚書右丞相先是鎰上言曰自國家與韃靼交兵以來彼聚而行我散而守以聚攻散其敗必然不若入保大城併力備禦昌和撫三州素號富貴人皆健勇可內徙之以益兵勢人畜財貨不至亡失參政梁􅚻曰如此是自蹙境土也金主從􅚻謀鎰復奏曰遼東國家根本距中都數千里萬一受兵州府顧望必須報可誤事多矣可遣大臣行省以鎮之金主不悅日無故置行省徒搖人心耳不從及失三州又聞東京不守金主乃大悔曰從丞相之言當不至此我見丞相恥哉呼沙呼之棄西京而還也至蔚州擅取官庫銀五千兩及衣幣諸物奪官民馬與從行人入紫荆關易易州西地記大行八陘其第七為蒲隂即此殺淶水隋縣今屬易州令至中都金主皆不問以為右副元帥呼沙呼益無所忌憚自請兵二萬北屯宣德金主與之三千令屯媯州注見前呼沙呼不悅金益都楊安兒作亂初益都人楊安國少無賴以粥鞍材為業市人呼為楊鞍兒遂自名楊安兒泰和中金人南侵山東無賴往往相聚剽掠命州縣招捕之安兒時為羣盜亦請降隸名軍中纍官至防禦使及䝉古兵薄中都詔招鐵瓦敢戰軍得千餘人以唐古哈達舊作唐括合打今改後仿此為都統安兒副之以戍邉安兒至雞鳴山在今宣化府宣化縣東南一名鳴雞山寰宇記即古磨笄山也每夜冇野雞羣鳴于上故亦名鳴雞也不進亡歸山東與張汝楫聚黨功劫州縣殺掠官吏山東大擾壬申五年金崇慶元年春三月金赫舍哩呼沙呼有罪放歸田里呼沙呼欲移屯南口移文尚書省曰韃靼兵來必不能支一身不足惜三千兵為可憂十二關建春萬寧宮且不保金主惡其言下有司按問詔數其十五罪罷歸田里夏五月安南王李龍翰死其壻陳日煚襲主國事龍翰卒子昊旵嗣尋卒無子以女昭聖主國事其壻陳日煚因襲取之李氏自公藴八傳凡百二十餘年而易姓金河東陜西大饑斗米數千錢流莩滿野金泰安劉二祖作亂掠淄沂州秋七月雷雨太廟屋壞避正殿減膳權直學士真德秀上疏曰臣博觀經史所志自非甚無道之世未聞震霆之驚及乎宗廟者也蓋震霆者上天至怒之威宗廟者國家至嚴之地以至怒之威而加諸至嚴之地其為可畏也明矣古先哲王遇非常之變異則必應之以非常之德政未嘗僅舉故事而已今日避殿損膳之外咸無聞焉或者固已妾議陛下務為應天之文而不完其實矣臣願陛下內揆之一身外察諸庶政勉進君德毋以豢養安逸為心博通下情深求致異召和之本庶幾善祥日應咎徴日消矣真德秀字景元後更為景希建之浦城人癸酉六年金至寧元年九月以後宣宗珣貞祐元年春二月故遼人耶律琉格舊作留哥今改取金遼東州郡自立為遼王琉格契丹人仕金為北邉千户䝉古兵起金人疑遼遺民有他志琉格不自安遁至龍安即黃龍府大定中改隆州貞祐初升府聚衆至十餘萬自為都元帥遣使附于䝉古金遣呼實率兵往攻琉格大敗之遂自立為遼王改元元統盡有遼東州郡遂都咸平金改為咸州後升府明省故城在今奉天府鐵領縣琉格後降䝉古蒙古主以為元帥令居廣寧夏五月夏侵金保安慶陽金主永濟復以赫舍哩呼沙呼為右副元帥秋八月呼沙呼弒永濟而立升王珣顯宗之子原名烏都布是為金宣宗金史作吾暏補今改自為太師尚書令都元帥封澤王金主復用呼沙呼使將兵屯燕城北圖克坦鎰諌不聼呼沙呼與其黨完顏綽諾舊作醜奴今改後仿此富察陸錦烏庫哩道喇舊作烏古論奪剌今改等謀作亂㑹金主以䝉古兵在居庸關呼沙呼日務馳獵不恤軍事遣使責之使者至呼沙呼怒遂妄稱知大興府圖克坦南平謀反奉詔入討使其黨圖克坦金夀召南平南平不知行至廣陽門呼沙呼遇之于馬上手刃殺之完顔實古納舊作石古乃今改後仿此聞亂召兵五百迎戰不勝皆死之呼沙呼至東華門呼衛實哷竒爾舊作斜烈紇兒今改後仿此等納之呼沙呼入宫盡以其黨易宿衛自稱監國都元帥居大興府陳兵自衛召聲伎與親黨㑹飲明日以兵逼金主出居衛邸遣武衛兵二百固守之呼沙呼欲除拜其黨令黃門入宫收璽尚宫左夫人鄭氏掌寶璽拒之曰璽天子所用呼沙呼人臣取將何為黃門曰今天時大變主上且不保况璽乎御侍當思自脫計鄭氏厲聲罵曰若輩宫中近侍恩遇尤隆君難不以死報反為逆豎奪璽邪我死可必璽必不與遂暝目不語黃門乃還呼沙呼復遣人奪取宣命之寶除拜其黨數十人丞相圖克坦鎰時墜馬傷足在告聞難作命駕將入省或告之曰省府皆以軍士守之不可入矣少頃軍士索人于閭巷鎰乃還第呼沙呼欲僭位猶豫不决以鎰人望乃詣訪之鎰從容謂曰翼王珣先封翼王又封升王章宗之兄顯宗長子衆望所屬元帥决䇿立之萬世之功也呼沙呼默然乃遣宦者李思中弒金主于邸時完顔綱將兵十萬行省事于縉山呼沙呼誘而殺之因盡撤沿邉諸軍赴中都平州騎兵屯薊州以自重遣圖克坦銘字國本徒克坦貞之孫等迎升王珣于彰德九月至燕即位立其子守忠為太子追廢永濟為東海郡侯後追復衛王諡曰紹冬十月䝉古大敗金將珠格高琪于懷來進圍燕高琪還殺呼沙呼金主以高琪為左副元帥蒙古兵至懷來金元帥右監軍珠格高琪拒之敗績䝉古乘勝進圍中都方䝉古兵至皂河欲渡高橋呼沙呼病足乘車督戰蒙古兵大敗翌日再戰呼沙呼創甚不能出期高琪以乣軍金史兵志東北路部族乣軍二西北西南二路乣軍十又百官志有密雅里乣等詳衮九處里欽定金國語解乣即糾字糾軍所收之軍也密雅舊作咩詳衰舊作詳長官之稱今改五千距之高琪失期不至呼沙呼欲斬之金主以其有大功特喻令髙琪免死呼沙呼乃益其兵令出戰之曰勝則贖罪不勝斬汝高琪大潰自度必為呼沙呼所殺乃以乣軍入中都圍呼沙呼之第呼沙呼聞難作登後垣欲走衣絓墜而傷股軍士就斬之高琪取其首詣闕請罪金主赦之因詔暴呼沙呼之罪奪其官爵以高琪為左副元帥一行將士論功行賞䝉古以史天倪字和甫永清人為萬户屯霸州時䝉古穆呼哩札拉爾氏崆根郭斡之子按穆呼哩舊作木華黎札拉爾舊作札刺爾崆根郭斡舊作孔溫窟哇今並改後仿此統兵侵金所向殘破永清史秉直聚族謀曰方今國家喪亂吾家百口何以自保既而知降者皆得免乃率里中數千人詣涿州軍門降穆呼哩欲用秉直秉直辭乃以其子天倪為萬户領降人家屬屯霸州天倪拊循有方逺近降者十餘萬家十二月夏取金涇川䝉古分兵拔金河北河東諸州郡䝉古主留竒爾台舊作怯台今改哈斯台舊作哈台今改屯燕城北分降人楊伯遇劉林漢軍四十六都統並韃靼兵為三道命其子卓沁察罕台烏格台為右軍循太行而南破保州山中邢沼磁相衛輝懷孟諸郡徑扺黃河大掠平陽太原之間别將克特卜齊舊作薄察今改等遵海而東破灤薊大掠于遼西之地䝉古主自將與子圖壘䝉古主少子後贈睿宗舊作拖雷今改由中道破雄莫清滄景獻河間濵隸濟南等郡自大口以逼中都時中原諸路之兵皆僉往山後防遏悉僉鄉民為兵上城守禦䝉古盡驅其家屬來攻父子兄弟往往遙呼相認由是人無固志故所至郡邑皆下凡破金九十餘郡兩河山東數千里人民殺戮幾盡金帛子女牛馬羊畜皆席卷而去屋廬焚燬城郭丘墟甲戌七年金貞祐二年春三月詔安丙同知樞密院事未至改知潭州丙使所愛吏安蕃何九齡合官軍夜襲秦州敗歸沔州都統制王大才執九齡等七人斬之而訟丙于朝故有潭州之命金以其故主永濟之女歸䝉古夏四月及䝉古平䝉古主還自山東屯燕城北諸將請乘勝破燕䝉古主不從遣使諭金主曰汝山東河北郡縣悉為我有汝所守惟燕京耳天既弱汝我復迫汝于險天其謂我何我今還軍汝不能犒師以弭我諸將之怒邪金丞相高琪言于金主曰韃靼人馬疲病當决一戰完顏承暉字離明本名福興曰不可我軍身在都城家屬各居諸路其心向背未可知戰敗必散苟勝亦思妻子而去社稷安危在此一舉莫如遣使議和待彼還軍更為之計金主然之遂遣承暉求和䝉古主欲得其公主金主乃以東海郡侯少女及金帛童男女各五百馬三千與之蒙古主引歸出居庸關收所虜山東兩河少壯男女數十萬皆殺之金主以䝉古既和大赦其國內金左丞相圖克坦鎰卒金主將遷都于汴鎰曰鑾輿一動北路皆不守矣今已講和聚兵積粟固守京師䇿之上也南京四靣受兵遼東根本之地依山負海其險足恃備禦一靣以為後圖䇿之次也金主不從鎰尋卒鎰明敏方正學問該貫一時名士皆出其門五月金主徙都汴扈衛乣軍叛降䝉古秋七月䝉古復圍燕金主以國蹙兵弱財用匱乏不能守中都乃議遷于汴諌者皆不納五月命平章政事都元帥完顔承暉左丞穆延盡忠本名博多上京路明安人按穆延舊作抹撚博多舊作彖多今改後仿此奉太子守忠留守中都遂與六宫啓行䝉古主聞之怒曰既和而遷是有疑心而不釋憾特以解和為欵我之計耳復圖南侵金主至良鄉令護衛乣軍元給鎧馬悉復還宮乣軍怨之遂作亂殺其主帥索衮而推卓多必實呼勒札拉爾按索衮舊作素溫卓多舊作斫答必實呼勒舊作比涉兒札拉爾舊作札剌兒今並改三人為帥北還完顏承暉聞變以兵阻盧溝卓多擊敗之軍勢既張遣使乞降于䝉古䝉古主遂遣明安援卓多合其兵圍燕京金主聞之遣人召太子應奉翰林文字完顔蘇哷以為不可平章珠格高琪曰上居此太子宜從且汝能保都城必完乎蘇哷日完固不敢必但太子在彼則聲勢俱重邉隘有守則都城無虞昔唐明皇幸蜀大子實在靈武蓋將以繫天下之心也不從竟召太子太子既行中都益懼按蘇哷舊作素蘭今改後仿此罷金歲幣時金人屢遣使來督歲幣起居舍人真德秀上疏請絶之略曰女真以䝉古侵陵徒巢于汴此吾國之至憂也蓋䝉古之圍滅女真猶獵師之志在得鹿鹿之所在獵必從之既能越三關之阻以攻燕豈不能絶黃河一帶之水以趨汴使䝉古遂能如劉聰石勒之據有中原則疆場相望便為鄰國固非我之利也或如耶律德光之不能即安中土則奸雄必將投隙而取之尤非我之福也今當乘女真之將亡亟圖自立之䇿不可幸女真之未亡姑為自安之計也夫用忠賢修政事屈羣策收衆心者自立之本訓兵戎擇將帥繕城池飭戍守者自立之具以忍恥和戎為福以息兵忘戰為常積安邉之金繒飾行人之玉帛女真尚存則用之女真强敵更生則施之强敵此苟安之計也陛下以自立為規模則國勢日張人心日奮雖强敵驟興不能為我患以苟安為志嚮則國勢日削人心日偷雖弱金僅存不能無外憂蓋安危存亡皆所自取若夫當事變方興之日而示人以可侮之形是堂上召兵户內延敵也微臣區區竊所深慮反覆數千言帝納之遂罷金國嵗幣夏人請㑹師伐金不報夏人以書來四川議夾攻金以恢復故彊時董居誼字仁夫臨川人初入蜀不之報由是邉訊中絶九月壬戍朔日食䝉古穆呼哩攻金遼西州郡下之穆呼哩進兵攻金北京守將伊木沁舊作銀青今改帥其衆二十萬禦于和託戍名方輿紀要在故大寧城西舊作花道今改敗還嬰城自守其禆將完顔實哷舊作昔烈今改髙德玉等殺伊木沁而推音達琿舊作寅答虎今改後仿此為帥穆呼哩命史天祥天倪從兄等趣兵進攻音達琿遂舉城降穆呼哩怒其降緩欲坑之蕭額森舊作蕭也先今改曰北京為遼西重鎮既降而坑之後豈有降者乎穆呼哩從之奏音達琿權北京留守以烏葉爾薩勒珠特氏察克察衮子舊作吾也兒元史作吾也而薩勒珠特舊作珊竹察克察衮舊作察噶察華今改權兵馬帥府事以鎮之于是金順成懿通州注俱見前相繼降于䝉古冬十二月金濰州李全北海農家子作亂全鋭頭蜂目權譎善下人弓馬趫捷能運鐵槍人號李鐵槍開禧中戚拱常結之以復漣水金主遷汴賦斂益橫河北山東遺民保寨守險羣聚為盜寇掠州郡皆衣紅納襖以相識時目為紅襖賊全與仲兄福亦聚數千鈔掠山東劉慶福國安用淄州人後改名用安鄭衍德田四于洋于潭等皆附之金張鯨據錦州自稱臨海王附于䝉古時興中府石天應字瑞之興中永德人亦降䝉古鯨尋為穆呼哩所殺其弟致復據錦州自稱瀛王降金穆呼哩遣將攻破之其下縳致出降遂被殺乙亥八年金貞祐三年春二月金布薩阿哈原名阿海擊楊安兒安兒敗死三月阿哈復破劉二祖斬之布薩阿哈至益都敗安兒于城東安兒奔登州刺史耿格納之安兒僭號置官屬政元天順衆數十萬阿哈復與山東行省完顔霆本姓李氏中都寶坻人經厯洪果舊作黃摑今改按此係姓氏史失其名將花帽軍討敗之殱其衆安兒乘舟入海欲走岠􅀈山在登州府棲霞縣東方輿紀要山舊産金亦名金山舟人曲成擊之安兒墜水死無子其妹四娘子狡悍善騎射劉全收餘黨奉之稱曰姑姑衆尚萬餘掠食至磨旗山在萊州府離縣南李全以其衆附之楊氏因與私通遂以為夫阿哈復遣瓜爾佳錫爾格上京路明安人舊作夾谷石里哥今改後仿此破劉二祖斬之餘黨推霍儀為帥彭義斌石圭泰安新泰人夏全時青滕陽人裴淵葛平楊德廣王顯忠附焉金主遣兵救燕與䝉古兵遇于霸州大潰夏五月中都留守右丞相完顔承暉自殺䝉古遂入燕時金中都被圍既久完顔承暉以穆延盡忠久在軍旅悉以兵付之而自總持大綱又遣人以礬寫奏告急金主命左監軍永錫將中山真定軍左都監烏庫哩慶夀河北西路明安人將大名兵萬八千西南路步騎萬一千河北軍一萬御史中丞李英字子賢遼陽人徙益都運糧大名行省富珠哩舊作孛术今改德裕本名富拉塔隆安路明安人富拉塔舊作蒲剌都今改調遣繼發以救中都英至大明得兵數萬馭衆素無紀律三月英被酒與蒙古兵遇于霸州北大敗盡失所運糧英死士卒殱焉慶夀永錫軍聞之皆潰歸自是中都援絶內外不通承暉與盡忠㑹議期同死社稷盡忠不從承暉怒即起還第然兵柄既皆屬盡忠承暉無如之何乃辭家廟作遺表付尚書省令史師安石字子安清安人本姓尹氏避國諱更焉書之皆論國家大計及平章政事高琪姦狀且謝不能終保都城之罪從容若平日與安石舉白引滿謂之曰承暉于五經皆經師授謹守而力行之不為虛文既被酒取筆與安石訣謂曰子行矣安石出門聞哭聲復還問之則已仰藥死矣家人匆匆瘞庭中是日暮凡在中都妃嬪聞盡忠將南奔皆束裝至通元門盡忠紿之曰我當先出與諸妃啓途諸妃信之盡忠乃與愛妾及所親者先出城不復反顧䝉古兵遂入中都吏民死者甚衆宫室為亂兵所焚火月餘不滅時䝉古主在桓州聞燕陷遣使勞明安等而輦其府庫之實北去于是金祖宗神御及諸妃嬪皆淪沒焉安石奉承暉遺表至汴贈尚書令廣平郡王諡忠肅盡忠至汴金主釋不問仍以為平章政事未幾以謀逆伏誅冬十月夏取金臨洮䝉古攻金潼關不克遂自嵩山趨汴金人敗之乃還䝉古主駐軍魚兒濼在今鑲黃旗厰故興和城西金史地理志柔逺縣有大魚濼即此遣繖格巴圖舊作三哥拔都今改後仿此帥萬騎自西夏趨京兆攻潼關不能下乃由嵩山小路趨汝州遇山澗輒以鐵槍相鎖連接為橋以渡遂赴汴京金主急召花帽軍于山東䝉古兵至杏花營在祥符縣西距汴京二十里花帽軍擊敗之䝉古兵還至陜州適河氷合遂渡而北金人専守關輔時䝉古兵所向皆下金主遣使求和䝉古主欲許之謂薩木哈曰譬如圍場中獐鹿吾已取之矣獨餘一兔盍遂舍之薩木哈恥于無功不從遣人謂金主曰若欲議和可去帝號稱臣常封汝為王議遂不成十一月復遣使如金賀正旦也刑部侍郎劉鑰字晦伯建陽人等及太學諸生上章言其不可不報以真德秀為江東轉運副使德秀朝辭奏五事一曰宗社之恥不可忘言國家之于金人蓋萬世必報之讐高宗孝宗值其方强不得已以太王自處而以勾踐望人後今天亡金近在朝夕誠能以待敵之禮而遇天下之豪傑以遣敵之費而厲天下之甲兵人心奮張士氣自倍何憚而不絶之哉且重于絶之者畏召怨而啓釁也然能不召怨于將亡之金而不啓釁于方興之敵權其利害顧孰重孰輕臣願陛下勉勾踐之良圖懲謝元之失策則王業興隆可冀矣二曰比鄰之道不可輕言䝉古及山東之盜苟得志而鄰於吾奠大之憂也願朝廷毋輕二冦日夜講其攻守之䇿以逆杜窺窬之心三曰幸安之謀不可恃言今之議者大抵以金之存亡為我欣戚聞危蹙之報則冀其非實得安靜之耗則幸其必然是猶以朽壤為垣而望其能障盜盜也願陛下勵自彊之志恢立武之絰則大勢舉矣四曰導諛之言不可聼言今邉事方殷正君臣戒懼之日若乃薦紳大夫工為諛說或以五福足恃為言夫乾象告愆邇日尤甚其可恃䜟緯不經之說而忽昭昭之警戒乎惟陛下鍳天人之相因察諛侫之有害益修其身以格天休宗社之慶也五曰至公之論不可忽言公論國之元氣也元氣痞鬲不可以為人公論湮鬱不可以為國深惟今日實公論屈伸之機朝廷之上若以言者為愛君伸為報國無猜忌之意而有聼用之誠則公論自此愈若以言者為沮事為徼名無聼用之誠而有猜忌之意則公論自此復屈夫公論伸屈乃治亂存亡之所繇分故臣于終篇反復極言惟陛下亮臣愚忠也丙子九年金貞祐四年春二月甲申朔日食東西兩川地大震夏四月金以胥鼎字和之持國子為尚書左丞行省事于平陽鼎知平陽府聞䝉古兵渡潼關即遣必刺阿嚕岱舊作必蘭阿魯帶今改後仿此圖克坦拜札舊作徒單百家今改後仿此等帥兵一萬五千由便道濟河以趨關陜而自以精兵援汴京又遣布薩薩固珠舊作僕散掃吾出今改後仿此帥兵㑹諸將以拒䝉古之自關而東者金主以其忠拜鼎左丞遣還平陽秋七月金郝定稱帝于山東侯摰字華芝東阿人討殺之時摰移行省于東平獲紅襖賊訊之知其渠帥郝定僭號署官改元已攻陷滕充單諸州萊蕪新泰等十餘縣道路不通摯帥師進擊執定送汴京誅之已而摯遣兵擊劉二祖餘黨執霍儀斬之其衆皆散冬十月䝉古克金潼關䝉古兵次嵩汝間金御史臺言敵兵深入重地近坻西郊彼知京師屯宿重兵不復叩城索戰但以逰騎遮絶道路而别兵攻擊州縣是亦困京師之漸也願陛下命陜西兵扼距潼關選在京勇敢之將十數各付精兵隨宜伺察且戰且守復諭河北亦以此待之金主以奏付尚書省平章珠格高琪曰臺官素不習兵備禦方略非所知也遂止高琪以䝉古兵日逼欲以重兵屯駐汴京以自固州郡殘破不復恤金主惑之國勢益衰十一月金胥鼎敗䝉古于平陽復潼關鼎慮䝉古兵扼河乃檄絳解隰吉孟五州經略司相與㑹師為夾攻之勢及䝉古自三門析津北渡至平陽鼎遣兵拒戰䝉古兵敗乃去金人遂復潼關金以苖道潤為中都經略使道潤貞祐初為河北義軍隊長以擊羣盜有功屢遷知中山府至是復有是命道潤有勇略敢戰鬬能得衆士心前後撫定五十餘城署保定張柔字德剛定興人為元帥右監軍行元帥府事丁丑十年金興定元年春正月金主謀伐夏不果金主命選兵三萬五千付圖們呼圖克們舊作他滿胡土門今改統之西征尚書左丞胥鼎馳奏以為非便略曰自北兵經過之後民食不給兵力未完若又出師非獨饋運為勞民將流亡愈至失所或宋人乘隙而動復何以制之此繫國家社稷大計方今勢止當禦備南邉西征未可議也遂止尋進鼎平章政事封莘國公地震二月金尚書省請罷府州學生廪給金主不許尚書省以軍儲不繼請罷州府學生廪給金主曰自古文武並用向在中都設學飬士猶未嘗廢况今日乎其令仍舊給之三月金以武仙威州人同知真定府事金石海據真定叛威州刺史武仙率兵斬海及其黨二百餘人降葛仲趙林張立等軍盡獲海僭擬物故有是命夏四月金人分道來侵詔京湖江淮四川制置使趙方字彥直衡山人李珏字元暉吉水人董居誼飭兵禦之初金有王世安者獻取盱眙楚州之䇿金主以為淮南招撫使遂有南侵之謀珠格高琪復勸金主侵宋以廣彊土金主始猶不然至是命烏庫哩慶夀完顏薩布帥師南侵遂渡淮取光州中渡鎮在光州光山縣淮水旁執𣙜埸官盛允升殺之慶夀分兵攻樊城圍棗陽光化軍别遣完顏阿林本姓郭以功賜姓入大散關以攻西和階成州朝廷聞之詔趙方李珏董居誼俱便宜行事以禦之先是金右司諌許古上疏請遣使與宋議和則韃靼聞將斂跡不宜用兵以益敵金主即命古草議和牒文既成示參政髙汝礪汝礪言有哀祈之意徒示微弱無足取者議遂寢平章政事胥鼎亦切諫南侵有大不可高琪不從金主以南北用兵西夏復擾財匱兵弱為憂集百官議守禦之策高琪心忌之有所言皆不用巖許古字道真獻州交河人髙汝礪字夫應州金城人五月趙方遣統制扈再興字叔起淮人鈐轄孟宗政字德父絳州人等救棗陽金人敗走金人犯襄陽棗陽方語其子范字武仲葵字南仲曰朝廷和戰未定觀此益亂人意吾䇿决矣惟有提兵臨邉決戰以報國爾遂抗疏主戰因親往襄陽檄統制扈再興陳祥鈐轄孟宗政等禦之仍增戍光化信陽均州以聨聲勢金人來自團山在襄陽縣北勢如風雨再興等分三陳設伏以待既至再興中出一陳復郤金人逐之宗政與祥合左右兩翼掩擊之金人三靣受敵大敗血肉枕籍山谷間尋報棗陽圍急宗政午發峴首遲明抵棗陽馳突如神金人大駭宵遁方聞捷大喜以宗政權知棗陽軍未幾京湖將王辛劉世興亦敗金兵于光山隨州六月詔伐金下詔伐金傳檄招諭中原官吏軍民從趙方之請也太白經天秋七月丙子朔日食冬十二月䝉古以穆呼哩為太師經略山南䝉古主以穆呼哩有佐命功拜太師國王承制行事賜誓劵金印分洪吉哩舊作宏吉剌今改等十軍及番漢諸軍並隸其麾下建行省于燕雲且謂之曰太行之北朕自經略太行之南卿其勉之穆呼哩乃自中都南攻遂城及蠡州注俱見前皆下之初蠡州拒守力屠乃降穆呼哩怒將屠其城時州人趙瑨從穆呼哩為署百户泣曰母與兄在城中乞以一身贖一城之命哀懇切至穆呼哩義而許之遂東擊齊定臨淄登萊等州而去蒙古圍夏興州夏州遵頊出奔西涼戊寅十一年金興定二年春正月李全率衆來降詔以全為京東路總管考李全降宋宋史寧宗紀及李全傳俱在嘉定十一年續綱目乃書于十年七月而于分注之末則又仍全傳舊文云東海馬良等輻輳漣水全等生羡心焉似尚未歸附者叙次殊不明晰今依宋史改書并改輯先是知楚州事應純之密奏山東羣盜歸正中原可復李全等出沒島崓寶貨山積而不得食相率食人會鎮江武鋒卒沈鐸亡命山陽誘致米商獲利數十倍知楚州應純之償以玉貨北人至者輒舍之鐸因說純之以歸銅錢為名弛渡淮之禁由是來者莫可遏初楊安未敗有意歸朝定逺民季先者大俠劉佑家厮飬也嘗隨佑部綱客山陽楊安兒見而悅之處以軍職安兒死先至山陽夤緣鐸得見純之道山東豪傑願歸正之意純之命先為譏察諭意羣豪以鐸為武鋒副將與髙忠皎各集忠義民兵分二道伐金先遂以金五千人附忠皎忠皎與合兵攻克海州糧援不繼退屯東海已而全及其兄福襲金莒密青州皆克之純之見北軍屢捷遂密聞于朝時頻嵗小稔朝野無事丞相史彌逺鑒開禧之事不明招納密敕江淮制置李珏及純之慰接之號忠義軍就聼節制給忠義糧于是東海馬良高林宋德珍等萬人輻輳來歸李全等生羡心焉至是全至漣水舉衆歸附遂有是命二月金人圍棗陽孟宗政擊敗之宗政權棗陽初眂事一愛僕犯新令立斬之軍民股栗于是築隄積水修治城堞簡閲軍士至是完顔薩布擁步騎圍城宗政與扈再興合兵角敵厯三月大小七十餘戰宗政身先士卒金人戰輒敗忿甚周城開濠控兵立濠外飛鋒鏑以綯鈴自警鈴響則犬吠宗政厚募壯士乘間突擊金人不能支盛兵薄城宗政隨方力拒隨州守許國援師至白水此棗陽之白水即漢光武所興地非來自南陽之白河也又别名滚河下流入漢鼓聲相聞宗政率諸將出戰金人奔潰金人焚大散關入皂郊堡在秦州西宋置有皂郊搏馬務三月利州統制王逸將兵復之進攻秦州至赤谷即赤峪川在秦州南元統志皂郊堡下視赤峪川即此而潰金完顔阿林入皂郊堡兵死者五萬人逾月王逸帥官軍及忠義人十萬復之追斬金統軍完顔贇進攻秦州至赤谷口沔州都統劉昌祖命退師且放散忠義人軍遂大潰夏四月金人入西和成階州及河池興元都統吳政敗之乃去金人合長安鳯翔之衆復攻皂郊遂趨西和州劉昌祖焚城遁還時西和守臣楊克家成州守臣羅仲甲階州守臣侯頤以昌祖遁皆棄城走金兵遂入諸州前後獲糧九萬斛錢數十萬軍實不可勝計復攻大散關守將王立亦遁又攻黃牛堡注見前吳政拒却之政至大散關執立斬之以徇事聞政進三官昌祖奪官竄韶州克家等並竄逺州五月金中都經略副使賈瑀殺苗道潤道潤將張柔襲之至紫荆關遇䝉古與戰被執遂降䝉古道潤素與瑀有隙互相攻擊既而瑀詐為約和道潤信之瑀遂伏兵刺殺道潤道潤之衆無所依部將靖安民德興府永興縣人代領之瑀不自安遣使告張柔曰吾得除道潤以君不助兵故也柔怒叱使者曰瑀殺吾所事吾食瑀肉且未足快意反以此言相戲邪遂檄召道潤部曲告以復讐之意衆皆羅拜推柔為長柔方㑹兵趨中山而䝉古兵出自紫荆關柔遇之遂戰于狼牙嶺即今狼牙口在正定府阜平縣東北柔馬跌為䝉古兵士所執至軍前見主帥明安柔立而不跪左右强之柔叱曰彼帥我亦帥也大丈夫死即死終不偷生為他人屈明安壯而釋之其潰卒稍來集明安恐柔為變質其二親于燕京柔歎曰吾受國厚恩不意猖獗至此顧忠孝不兩立姑為二親屈遂降䝉古以柔為河北都元帥金國安用降詔以安用同知孟州事秋八月䝉古穆呼哩復攻取金河東諸州郡金元帥烏庫哩德升本名埒爾錦益都路明安人埒爾錦舊作録謹今改等死之穆呼哩圍太原環之數匝金元帥烏庫哩德升力拒之城西北隅壞德升聨車寨之三却三登矢石如雨守陴者不能立城破德升至府署謂其姑及妻曰吾守此數年不幸力窮乃自縊而死行省參政李草字君美河津人守平陽兵少援絶城陷或謂革宜上馬突圍出革嘆曰吾不能保此何面目見天子汝輩可去矣遂自殺節度使完顔恩徹亨隆安府明安人按恩徹亨舊作訛出虎今改後仿此守汾州元帥右監軍納哈塔布拉圖大名路明安人舊作納合蒲剌都今改守潞州城破皆力戰而死冬十二月金主遣使來求和不納遂遣其太子守緒原名寧嘉素金史作寧甲速今改㑹兵來侵金主欲乘勝來議和以開封府治中吕子羽為詳問使至淮中流不納乃去由是和好遂絶金主以布薩安貞為左副元帥輔太子守緒南侵己卯十二年金興定三年春正月金人復侵西和成鳯州入黃牛堡吳政拒戰死之政既死金人乘勝攻武休關注見前都統李貴遁還權興元府事趙希昔棄城走金人遂入興元府沔州都統張威字德逺成州人使石宣邀擊之于大安軍今漢中府沔縣有三泉故城宋于此置大安軍元為州後改縣明省大破之殱其精兵三千人俘其將巴圖魯安舊作巴土魯安今改金人乃遁去金人復大舉圍棗陽趙方使知隨州許國等率師攻唐鄧以救之完顔額爾克舊作訛可今改後仿此圍棗陽塹其外繞以土城方計其空巢穴而來若搗其虛則棗陽之圍自解乃命國及扈再興引兵三萬餘分二道出攻唐鄧二州又命其子范監軍葵為後殿以曽從龍字君錫公亮四世孫同知樞密院事任希夷字伯起眉州人徙郡武簽書院事希夷嘗從朱熹學篤信力行為禮部尚書以朱熹張栻吕祖謙皆已賜諡而周惇頥程皓程頥張載四人為百代絶學之倡尚未贈諡乃上言乞定議賜諡朝廷從之從龍尋參知政事金人入洋州竄董居誼于永州以聶子述為四川制置使守臣蔡晋卿遣兵拒之不克洋州遂破金人焚其城而去居誼自利州遁還詔竄之夏人請㑹師代金詔許之三月金人侵淮西楚州賈涉字濟川天台人使李全救却之詔加全廣州觀察使金人圍安豐軍及滁濠光州遂分兵自光州攻黃州之麻城隋縣今屬湖北黃州府自濠州攻和州之石磧在州東北自盱眙攻滁州之全椒來安南唐縣今屬滁州及掦州之天長真州之六合淮南流民渡江避亂諸城悉閉金逰騎數百至采石楊林渡建康大震時涉以淮東提刑知楚州節制京東忠義慮忠義人兵為金所用乃遣陳孝忠向滁州石圭夏全時青向濠州李先葛平楊德廣趨滁濠李全李福要其歸路李全進至渦口與金左都監赫舍哩約赫德一名志本出親軍按約赫德舊作牙吾答今改後仿此駙馬布薩阿哈連戰于化湖陂在鳯陽府懷逺縣南殺金將數人得其金牌金人乃解諸州之圍而去全追擊之復敗之于曹家莊而還金人自是不敢窺淮東初涉募能殺金太子者賞節度使殺親王者賞承宣使殺駙馬者賞觀察使全因致所得金牌于涉云殺駙馬布阿哈所獲者涉請于朝乞如約受賞遂授全廣州觀察使而阿哈實不死也興元卒張福等作亂夏四月陷利州聶子述走保劍門福遂掠閬果興元軍士張福莫簡作亂以紅巾為號入利州聶子述退保劍門檄醴泉觀使安丙子知果州癸仲兼節制軍馬任討賊之事癸仲召沔州都統制張威等帥兵來㑹福等殺總領財賦楊九鼎遂掠閬果州復以安丙為四川宣撫使張福等作亂四川大震張方魏了翁字華父卭州蒲江人移書宰執謂安丙不起則賊未即平蜀未可定雖賊亦曰須相公作宣撫使事乃定耳李璧李􅐉亦以國事勉丙丙乃至果州㑹詔丙為宣撫知興元府利州路安撫使民心始安金築汴京裏城初珠格高琪請修南京裏城金主曰此役一興民滋病矣城雖完固能獨安乎高琪固請築之既而金主慮擾于民募人能致甓五十萬者遷一官百萬升一等于是平陽判官完顔阿拉舊作阿剌今改後仿此左廂譏察霍定和發蔡京故居得二百萬有竒准格遷賞金主一日問曰人言此役恐不能就高琪曰苟防城有法正使兵來臣等愈得效力金主曰與其臨城曷若不令至此為善高琪無以對及城成高琪受金鼎之賞建碑書功于㑹朝門䝉古張柔侵金獲賈瑀殺之金武仙與戰于滿城敗績河北郡縣多降䝉古蒙古使柔帥兵南下遂克雄易保安諸州柔必欲誅賈瑀而瑀據孔山臺在定州曲陽縣西北孔山上志云山半一孔前後洞徹故名柔攻之不下臺無井泉汲山下柔先斷其汲道瑀窮乃降柔縛瑀剖心以祭苖道潤遂引兵次于滿城武仙㑹鎮定深冀兵數萬攻之柔全軍適出帳下才數百人柔令老弱婦女乘城自率壯士突出仙兵後毁其攻具從數騎策馬枤槊大呼入圍仙衆皆披靡復使緣山多張旗幟聲言救至曵柴揚塵鼓譟以進仙兵大潰柔追擊之尸陳數十里柔乘勝攻完州金置今為縣屬保定府下之于是祁陽金河北西路州縣無祁陽當作祁州曲陽等帥皆降于柔柔遂圍中山府仙遣其將葛鐡槍與柔戰于新樂飛矢中柔頰落其二齒柔拔矢以戰葛鐵槍大敗死者數千人仙復遣劉成攻柔柔又敗之遂南掠金鼓城隋縣明省故城在今正定府晋州深澤漢縣今屬保定府寧晉唐縣今屬趙州諸縣由是深冀以北鎮定以東三十餘城望風降附柔之威名震于河朔六月安丙討張福誅之福衆薄遂寧焚其城遂入普州安丙自果州如遂寧下令諸軍合圍絶其樵汲之路張威兵至福窮請降威執之以獻丙命臠其黨王才以祭楊九鼎而誅福既而張威捕莫簡及賊衆一千三百餘人誅之紅巾賊悉平丙班師還治利州孟宗政扈再興合擊金人于棗陽大敗之追至鄧州而還金完顏額爾克擁步騎傅城宗政囊糠盛沙以覆樓棚列甕瀦水以隄火募炮手擊之一炮輒殺數人金人選精騎二千號弩手擁雲梯天橋先登又募鑿銀壙石工晝夜坎城運茆葦直抵樓下欲焚樓宗政先燬樓掘深坑防地道創戰棚防城隕穿井才透即施毒烟烈火鼓韝以薰之金人窒以濕氊析路以刳土城頺樓陷宗政撤樓益薪架火山以絶其路列勇士以長槍徑弩備其衝距樓陷所數丈築偃月城翼傅正城金人摘强兵披厚鎧氊衫鐵面而前又濕氊濡革䝉火山擁雲梯徑抵西北樓登城城中軍以長戈舂其喉殺之敢勇軍自下夾攻金兵墜死燎焰甚衆金人連不得志㑹扈再興許國兩道並進掠唐鄧境焚其城栅糧儲時金已頓兵八十餘日趙方知其氣已竭乃召國再興還併東師𨽻于再興尅期合戰再興敗金人于瀼河當作滚河即白水注見前又敗之城南宗政自城中出擊內外合勢士氣大振賈勇入金營自晡至三更殺敵三萬金人大潰額爾克單騎遁獲其資糧器甲不可勝計追金人至馬磴寨在棗陽縣西北焚其城入鄧州而還金人自是不敢窺襄漢棗陽中原遺民來歸以萬數宗政發廪贍之給田創屋興居籍其勇壯號忠順軍俾出沒唐鄧間宗政由是威振境外秋九月以賈涉主管淮東制置司節制京東河北軍馬初山東來歸者日衆而石圭以計殺沈鐸于漣水應純之亦罷去權楚州梁丙無以瞻之季先乞預借兩月糧然後帥所部五千并馬良等萬人往密州就食丙不許先請速遣李全代領其衆丙亦不從而以石圭權軍務圭乃奪運糧之舟渡淮大掠至楚州南渡門焚燬幾盡丙遣人諭之不止知盱眙軍賈涉上書言忠義之人源源而來不立定額自為一軍處之北岸則安能以有限之財應無窮之需飢則噬人飽則用命其勢然也朝廷命涉節制忠義人兵涉受命即遣傅翼諭石圭楊德廣等以逆順禍福圭等乃謝罪涉慮其人衆思亂因滁濠之役分石圭陳孝忠夏全為兩屯李全為五寨又用陜西義勇法涅其手合諸軍汰者三萬有竒涅者不滿六萬人正軍尚屯七萬使主勝客朝廷歲省費十三四至是分江淮為三司乃命涉管淮東䝉古伐西域諸國金張林以山東諸郡附李全來降詔以林為京東安撫使初䝉古克益都不守而去府卒張林與其黨復立府歸金以功為治中林遂據益都山東諸郡皆附之林欲歸附以自固而未決㑹李全克齊州比還揣知林意乃薄兵青州城下遣人陳說國家威德勸林早附林恐全誘已猶豫未納全挺身入城惟數人從林乃開門納之相見甚歡謂得所託置酒結為兄弟全既得林要領附表奉青莒密登萊濰淄濵隸寧海濟南十二郡版籍來歸表亂有云舉七十城之全齊歸三百年之舊主詔授林武翼大夫京東安撫使兼京東總管冬十二月趙方使扈再興許國孟宗政帥師分道伐金方以金人屢敗必將同時並攻當先發以制之乃遣再興等帥師六萬分三道而進戒之曰毋深入毋攻城第潰其保甲燬其城寨空其資糧而已李全襲泗州不克而還時大雨雪淮氷合全請于賈涉曰每恨泗州阻水今如平地全請取東西城自效涉許之全以長鎗三千人從夜半渡淮潛向泗之東城將踏濠氷傅城下掩金人不備俄城上荻炬數百齊舉遙謂全曰賊李三汝欲偷城耶天黑故以火燭之全知有備乃引兵還金右丞相珠格高琪以罪伏誅高琪自執政敷固權寵擅作威福與平章政事高汝礪相倡和高琪主機務汝礪掌利權附已者用不附者斥凡言事忤意及負才力或與已頡頏者對金主陽稱其才使幹當于河北隂置之死地又以已為相不得兼樞密元帥以攬兵柄乃與汝礪力勸金主南侵置河北于意外凡精兵皆集河南苟且嵗月不肯輒出一卒以應方面之急至是使奴薩布殺其妻因歸罪于薩布而殺之以滅口事覺金主久知其姦遂下髙琪于獄殺之初金主將遷汴欲置乣軍于平州髙琪難之及發中都金主戒摶多厚撫乣軍而博多輒殺數人且勸金主取其元給器用故有卓多之難而中都以亡金主嘗嘆曰壞天下者髙琪博多二人也博多即模延盡忠蒙古攻髙麗降之䝉古兵襲叛人于契丹經髙麗之境髙麗人洪大宣降且為鄉導共攻其國國王暾降自是交通使命往來不絶庚辰十三年金興定四年春正月扈再興許國攻鄧州皆不克而還孟宗政敗金人于湖陽夏四月金封經略使王福等九人為郡公分河北山東地以隸之初太原為䝉古所有河北州縣不能自立金主詔百官議所以為長久計幹林承㫖圗克坦髙等十六人謂制兵有三曰戰和守今欲戰則兵力不足欲和則彼不肯唯有守耳河朔州郡既殘毁不可一槩守之宜取願就遷徙者屯于河南陜西不願者許自推其長保聚險阻宣徽使伊喇舊作移喇今改光祖字仲禮本名巴噶伊錫部人巴噶舊作八狗今改等謂當募土人威望服衆者假以方面重權能復一道即授以本道總管能捍州郡即授以長佐必能各保一方宰臣欲置公府金主意未決中丞完顔伯嘉字輔之北京路額爾衮必喇明安人按額爾衮必喇舊作訛魯古必剌今改後仿此曰宋人以虛名致李全遂有山東苟能統衆守土雖三公何惜金主曰他日事定公府無乃多乎伯嘉曰若事定以三公就節鎮何不可金主從之乃封滄州經略使王福為滄海公以清觀滄州鹽山無隸樂陵東光寧津吳橋將陵阜城修縣隸之河間招撫使伊喇重嘉努以戰功賜姓完顔氏按伊剌重嘉努舊作移剌衆家奴今改後仿此為河間公以獻蠡安深州河閒肅寧安平武强饒陽六家莊郎山寨𨽻之真定經略使武仙為恆山公以真定府沃冀威鎮寧平定州抱犢寨欒城南宫縣𨽻之中都東路經略使張甫賜姓完顔氏為髙陽公以雄霸莫州髙陽信安文安大城保定靜海寶坻武清安次縣隸之中都西路經略使靖安民為易水公以涿易安肅深州君氏川季鹿三保河北江礬山寨青白口朝天寨水谷歡谷東安寨之遼州刺史行元帥府事郭文振字振之太原人為晉陽公以河北東路皆隸之平陽招撫使胡天作字景山營州人為平陽公以平陽晉安府隰吉州隸之昭義節度使完顏布木凱本張開賜姓按布木凱舊作伯開今改為上黨公以澤潞沁州隸之山東安撫副使燕寧本莒州提控為東莒公以益都府路皆𨽻之九公皆兼宣撫使總帥本路兵馬署置官吏徴斂賦稅賞罰號令得以便宜行之除已畫定所管州縣外如能收復鄰近州縣者亦聼管屬同時九府財富兵强唯武仙耳已而王福降于張林靖安民為其下所殺燕寧與蒙古戰河敗死胡天作降䝉古尋被殺伊庫喇重嘉努不能守間與張甫同保信安久之郭文振亦不能軍徙居衛州張開部曲離散為民家所殺詳武仙事詳具後六月賈涉誘殺漣水忠義軍副都統季先其下推石圭為帥以拒涉李全自化湖陂之捷有輕諸將心以季先威望出已上隂結賈涉所任吏莫凱使譖先欲反涉信之乃以計命先赴樞密院議事于道殺之而遣統制陳選總先衆于漣水先部曲裴淵宋德珍孫武正王義深張山張友六人拒選不納而潛迎石圭于盱眙奉為統帥圭道楚城涉不之覺遂入漣水選還涉恥之謀分圭軍為六請于朝出修武京東路鈐轄印誥各六授淵等以分統先衆淵等陽從命而實不奉涉教令涉恐甚詔以圭為漣水忠義軍統轄秋七月金使人如䝉古求和金使烏庫哩仲端本名博濟字子正博濟舊作卜吉今改如蒙古求和呼䝉古主為兄䝉古主不允八月金嚴實字武叔長清人據青崖崓即青崖山在濟南府長清縣南岡巒綿亘崖谷常清故名以魏博等郡來歸李全遂㑹張林襲東平敗績乃還金長清縣令嚴實為主將所疑挈家壁于青崖崓依益都張林以避之㑹趙拱以朝命諭京東過青崖實因求內附拱奉實欵至楚州賈涉以聞實亦分兵四出所至州縣皆下于是太行之東皆受實節制實乃舉魏博恩德懷衛開相等郡來歸涉因再遣拱往諭配以兵二千李全亦請往涉不能止乃帥楚州及盱眙忠義萬人以行拱說全曰將軍提兵渡河不用而歸非示武也今乘勝取東平可乎全乃合張林軍得數萬襲東平之城南金行省呼爾噶咸平府明安人按呼爾噶舊作胡里綱又作䝉古綱今改後仿此帥師固守全與林夾汶水續綱目誤作汝水今依宋史李全傳改正而寨詰旦金監軍王庭玉以騎兵三百奄至全欣然上馬帥帳前所有騎赴之殺數人奪其馬逐北抵山谷遇金龍虎上將軍鄂博台按瓦布達舊作斡不答今改後仿此盛兵出以旁有繡旗女將馳槍突鬬全幾不免㑹諸將赴救拔全以出乃退保長清精鋭喪失大半全恐所攜鎮江軍百五人懷憤乃使拱先將之以歸而自以餘衆道滄州假鹽利慰贍之尋還楚州太子詢卒諡曰景獻安丙遣兵㑹夏人伐金丙遺夏人書定議同舉約以夏兵野戰我師攻城遂命利州統制王仕信帥師赴熙秦鞏鳯翔委丁焴節制且傳檄招諭陜西五路官吏軍民夏取金㑹州金遣使如夏議和金恆山公武仙以真定降䝉古穆呼哩以史天倪權知河北西路兵馬事仙副之穆呼哩至滿城遂使䝉古布哈舊作䝉古不花今改將輕騎三千出倒馬關即古鴻上關在今保定府唐縣北適武仙所遣將葛鐵槍與之遇葛鐵槍戰敗仙遂舉城降史天倪說穆呼哩曰今中原已粗定而大兵所過猶縱鈔掠非王者弔民伐罪之意且王為天下除暴豈可效他軍所為乎穆呼哩善之即下令禁摽掠遣所俘老幼軍中肅然九月夏人圍金鞏州官軍㑹之不克而還夏遣其樞密使寧子寧率衆二十萬圍鞏州且來趣兵王仕信帥師發宕昌注見前四川宣撫司統制質俊李實帥師發下城在鞏昌府岷州北安丙命諸將分道進兵沔州與下天水注並見前都統張威出天水利州都統程信出長道鎮名在鞏昌府西和縣西北興元都統陳立出大散關統制田昌出子午谷金州都統陳昱出上津注並見前威下令所部諸將毋得擅進兵于是諸將遲疑不進質俊等克來遠鎮敗金人于定逺城宋置軍金為縣元省故城在蘭州府金縣王仕信克鹽川鎮宋置寨後改鎮在鞏昌府漳縣西北程信引兵㑹夏人于鞏州攻城不克遂趨秦州夏人自定遠退師信復邀夏人共攻秦州不從遂自伏羌城注見前引兵還諸將皆罷兵信以宣撫司命斬仕信于西和州罷威官䝉古遣使如金䝉古主遣逹呼舊作塔忽今改報金謂烏古哩仲端曰向欲汝主授我河朔地彼此罷兵汝主不從今念汝逺來河朔既為我有關西數城未下者則割付我令汝主為河南王勿復違也冬十月金以時青為濟州宣撫使封滕陽公青先為紅襖賊及楊安兒劉二祖敗青承赦降隸軍中為濟州義軍萬户後隨李全來歸處之龜山在泗州盱眙縣東北寰宇記禹治淮獲水神無支祁鎖之龜山之足即此有衆數萬至是金元帥赫舍哩納赫德遣人招之青以書乞假邳州以屯老幼當襲盱眙盡定淮南以贖罪金主乃封青為滕陽公本處兵馬總領元帥兼宣撫使而未授以邳十一月蒙古穆呼哩入濟南嚴實復以魏博等郡降䝉古穆呼哩既戢士卒州郡悅附遂以輕騎入濟南嚴實挈所部三府六州户三十萬詣軍門降穆呼哩承制拜實行尚書省事實將李信乘實出殺其家屬來降實攻信殺之復取青崖崓金人襲䝉古穆呼哩于濟南大敗穆呼哩進圍東平時金兵二十萬屯黃陵岡在開封府儀封東北與山東曹縣接界為河防要害遣步卒二萬襲穆呼哩于濟南穆呼哩迎戰敗之遂薄黃陵岡金兵陳河南岸穆呼哩令騎下馬短兵接金兵大敗溺死者衆穆呼哩遂進破楚邱由單州趨東平圍之蒙古耶律楚材字晉卿都木達王托雲八世孫金尚書右丞履之子都木達王托雲舊作遼東丹王突欲今改進庚午元厯楚材貞祐初為中都行省員外郎中都破遂降䝉古䝉古主嘗訪遼宗室召楚材謂之曰遼金世讐吾為汝報之矣楚材對曰臣祖父以來嘗北靣事之既為臣子豈敢復懷二心讐君父耶䝉古主重其言命處左右備訪問楚材通術數之學尤邃于太元時從征西域以金大明厯不應製庚午元厯上之䝉古主每征伐必令楚材預卜吉凶之兆亦自灼羊脾以符之然後行十二月石圭叛降䝉古賈涉命李全併將其軍石圭以入漣水非賈涉本意心懷不安而李全復請討圭于涉涉遂以全所統衆列于楚州之南渡門而移淮隂戰艦于淮岸以示圭有備因命一將招圭軍來者增錢糧不至者罷支給衆心遂散圭技窮乃殺裴淵而挾孫武正宋德珍降于䝉古穆呼哩以圭為元帥圭既去漣水之衆未有所屬李全求併將之涉不能郤遂以付之時青自金來附以為京東鈐轄已而青入泗州西城金人來救青敗乃還事在明年御批歷代通鑑輯覽卷九十

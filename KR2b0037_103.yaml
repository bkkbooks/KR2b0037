front:
  text: 欽定四庫全書御拋厯代通鑑輯覽卷一百四明英宗皇帝丁卯正統十二年春三月徙沙州衛之衆於山東
  hash: sha256:72606562e75fd735a0fe126ae7b9615d6d3253e85cc7bc9bc102db3f542cba02
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_103-1a, image: WYG0339/WYG0339-0316a.png}
body:
  text: 沙州衛都督訥格永樂二年沙州酋長琨濟楞珠率衆來歸命置沙州衛處之尋以琨濟楞衛事進秩都督同知訥格乃琨濟楞之長子襲父職為都督按訥格舊作喃哥琨濟楞舊作困即來今並改後仿此等兄弟乖爭部衆多攜二甘肅總兵官任禮欲乘其機窘遷之內地會訥格亦來言請入居甘肅禮遣使偕訥格撫諭其部衆而親帥兵隨其後比至訥格之意中變其部下多欲奔衛拉特禮進兵迫之收其全部入塞凡一千一百餘人帝命徙之山東居其頭目於東昌平山二衛分其部落為三屯居清平博平二縣自是沙州遂空已為罕東明衛後廢地在今安西府燉煌縣東南所據初成祖置哈密沙州罕東赤金四衛於嘉峪關在肅州西嘉峪山西麓明洪武初置冇城外屏蔽西陲及是沙州先廢而諸衛亦漸不能自立肅州遂多事國子監祭酒李時勉致仕時勉以王振擅權不能諂事屢疏乞休至是始得命朝臣及國子生出餞都門外者幾三千人鼓樂前導觀者塞途商賈為罷市或逺送登舟俟舟發乃還無不淚下先是南京祭酒陳敬宗秩滿入都王振慕其名欲置之門下會應天巡撫周帎亦在京振知其素與敬宗善令致意敬宗不可忱謂振曰陳公崛強未可以勢力致顧善書法公試以禮幣求書彼來謝或可一致耳振乃以文錦羊酒求書程于四針敬宗書之而返其禮終不往見以故在南大學十七年不調後致仕歸與時勉先後卒夏六月奪英國公張輔田太監喜寧本降番侵輔田宅輔不從寧弟勝帥閹奴毆輔家人妻墮孕死輔訴之帝宥寧勝而戍閹奴於邉已而寧嗾青縣本宋清州明改青縣今縣屬天津府知縣奏輔占民田二十頃帝命以田還民而置輔不問輔實未嘗占也時王振視勳戚如奴𨽻諸勳戚亦望塵頓首呼曰翁父惟輔獨與抗禮振亦致敬於輔及是輔既衰老又數為喜寧所侮亦屈節以避禍矣秋八月甲申朔日食冬十一月以宋新為福建左布政使新為福建參政與都指揮僉事鄧安進表至京以萬金饋王振又囑安具疏薦之遂遷布政使新抵任後計所費命縣官驗戶斂錢民不堪命由是盜賊四起以楊洪為總兵官鎮宣府洪威望素著衛拉特使至托克托布哈額森皆致書於洪并遺之馬洪聞於朝敕令受之而報以禮戊辰十三年春二月以宋儒楊時從祀孔子廟廷三月復遣王驥征麓川蠻思機發竄匿孟養屢遣使入貢謝罪朝廷亦屢敕招諭許以不死然心疑畏終不敢出詔總兵官沐斌字文晟之子昻卒代鎮討之未幾以糧盡瘴作引還王振以斌師出無功必欲生致思機發犂其巢穴意乃慊於是復命驥總督軍務都督同知宫聚為平蠻將軍統兵十五萬討之夏四月兩畿山東河南湖廣旱蝗陜西江西水五月禁用銅錢洪武中鈔一貫折錢千文至是止折錢三文帝從御史蔡愈濟言詔交易用錢者以阻鈔論追一萬貫全家戍邉後至天順中始弛其禁秋七月河決一自新鄉隋縣今屬河南衛輝府漫曹濮抵東昌潰夀張沙灣在夀張縣東南永樂初分黃河支流由此至臨清入衛河合大清河入海一自滎澤漫原武經祥符南河舊在城北及是徙於城南又由陳留歷睢亳入渦口注見前至懷逺宋軍元改縣今屬江南鳯陽府界入淮淹地二千餘里壞城垣廬舍溺死男婦不可勝計自黃河全入於淮不復由大清河入海及是復自沙灣分流而東不專向徐吕於是二洪逐膠淺而臨凊以南運道亦益艱阻京師飛蝗蔽天罷保舉宣德朝及正統初保舉得人最盛後漸奔競徇私者有之教諭傅璿上虞人給事中余忭奉化人御史塗謙豐城人屢以為言遂罷之由是進退人才大權一歸王振矣八月福建賊鄧茂七作亂茂七江西人亡命入閩為佃人素無賴其俗佃人輸粟主家例餽少物茂七倡其黨令無餽而田主自往受粟田主訴於縣縣逮茂七不赴下巡檢追躡茂七殺弓兵數人上官聞遣軍三百捕之被殺幾盡巡檢及縣官皆遇害茂七遂大剽掠攻沙縣尤溪二縣俱唐置今屬延平府進圍延平御史張海登城諭賊賊曰吾等皆良民苦富民魚肉有司不我直耳乞貰死免三年徭役即解散海以聞帝遣御史丁瑄史傳無里系勦撫而命都督劉聚僉都御史張楷字式之慈溪人以大軍繼後時福建兵衛久弛及茂七倡亂村氓聞風畏死又皆苦布政使宋新貪虐於是相率從茂七為盜衆至數萬茂七據陳山寨在沙縣西南陳山之麓自稱剷平王設官屬攻陷二十餘縣都指揮范真指揮彭璽等先後被殺東南震動帝以聚等兵少復命寧陽侯陳懋為平夷將軍保定伯梁珤銘之子平江伯陳豫瑄之孫副之尚書金濓參贊軍務率京營江浙兵會討冬十一月幸大興隆寺寺初名慶夀在禁城西金章宗時建王振重修之役軍民萬餘人糜帑數十萬既成壯麗甲京師改賜新額延崇國寺僧主之帝親傳法稱弟子公侯以下趨走如行童焉己巳十四年春正月太白晝見二月御史丁瑄擊斬鄧茂七於延平瑄始至先令人齎敕往撫茂七不肯降瑄馳沙縣圖之賊渠林宗政等攻後坪瑄與都指揮雍野邀擊斬首數百級擒其黨陳阿巖送京師伏誅及是瑄因沙縣民羅汝先誘賊復攻延平瑄督兵分道衝擊賊大敗遁走指揮劉福追之遂斬茂七餘賊在陳山寨者聞茂七死復擁其兄子伯孫聚後洋在陳山之後通寧化攻劫州縣瑄擒斬其渠林子得鄭永祖等會陳懋軍至諸將欲盡殱賊衆懋不可下令招之其黨多降尋進攻賊寨破之伯孫走餘衆潰散懋遣兵分捕獲伯孫送京師誅之先是劉聚張楷至建寧頓兵不進日飲酒賦詩為樂及聞瑄破賊則疾馳至延平攘其功瑄被脅依違具奏劉福心不平訴陳懋奏之詔責瑄具狀楷等皆獲罪瑄有功不問然功亦竟不録當是時浙閩盜所在蜂起皆以誅王振為名諸將帥率玩冦而文吏督民兵拒賊往多斬獲閩則建寧知府張瑛敗賊于建寧城外斬首五百餘級進擢暴政後以逐賊被執死之汀州推官王得仁擊擒賊渠陳景政等餘賊驚潰浙江則金華知府石瑁斬賊蘇牙于蘭溪處州知府張佑擊敗劇賊擒斬千餘人帝數降敕詰讓諸將諸將無以自解乃飾詞委咎文吏王振方欲殺朝士威衆於是栁華已死猶坐前奉詔捕盜措置失當致賊益熾遂籍其家男戍邉婦女入浣衣局御史汪澄坐前帥師會討受賊詐降不進兵御史柴文顯坐前按福建賊起匿不奏俱被極刑而宋新以貪虐致變反得長繫尋遇赦謫驛丞天下咸惡振之橫而咎當時之失刑云建張瑛字彥華浙江建德人王得仁名仁以字行新人汪澄仁和人柴文顯浙江建德人蘭溪唐縣今屬金華府王驥擊思機發再破之思機發遁遂班師驥自騰衝會師直抵金沙江其上流即大盈江出騰越州徼外經隴川芒市諸司界龍川江流入焉又南經孟養東始謂之金沙江下流至緬甸入海考雲南金沙江有二一自東北至四川合大江一自西南至緬甸入南海二江異流而同名賊柵西岸官軍造浮梁濟師大破之賊又柵鬼哭山方輿紀要一名鬼窟山在孟養西南巔驥連破其十餘柵墜死者萬計而思機發竟脫去時官軍已踰孟養至孟那海其地在金沙江西去麓川千餘里諸蠻皆震讋曰自古漢人無渡金沙江者今王師至此豈天威邪驥慮大軍逺涉餽餉不繼謀引還而諸蠻復擁思機發少子思陸發蠻稱其長之號時思機發尚在故思陸不稱發據孟養驥知賊終不可滅乃與思陸約立石金沙江為界誓曰石爛江枯爾乃得渡思陸亦懼而聽命遂班師驥凡三討麓川卒不能得思機發議者皆咎驥老師費財以一隅騷動天下而會川衛注見前訓導詹英貴州人抗疏劾驥掩敗為功奏下法司王振左右之得不問思機發至景泰五年為𬗟人所執送京師誅之夏四月礦盜葉宗留為其黨陳鑑湖所殺巡撫浙江大理寺少卿張驥字仲德安化人招鑑湖降之鄧茂七之亂宗留鑑湖往附之散掠浙江江西福建諸境參議耿定和州人僉事王晟鄆城人敗沒於麗水隋括蒼縣唐改麗水今為處州府治都指揮英剛禦之建陽晉縣今屬建寧府都督陳榮與戰玉山唐縣今屬廣信府皆死監軍都御史張楷檄永豐宋縣今屬吉安府知縣鄧顒樂昌人擊之被執不屈死賊勢日熾逺近皆震及茂七誅二人擁衆如故至是以酒色相角鑑湖遂殺宗留稱大王建偽號進圍處州然是時官軍漸集鑑湖亦頗懼驥遣麗水丞丁寧率老人王世昌等齎榜入其寨招之鑑湖遂降鑑湖至京帝宥其死繫錦衣獄尋釋充衛軍土木之變乘間亡歸被獲伏誅五月命太監金英同法司録囚築壇大理寺英張黃蓋中坐尚書以下左右列坐九卿抑於內官之下遂為永制以翰林侍讀學士張益字士謙江寧人入內閣預機務益博學強記三楊雅重之及是入直文淵閣六月旱熒惑入南斗南京謹身等殿災是夜大風雨明日殿基生荆棘髙二尺詔修省大赦秋七月衛拉特分道入寇按元自順帝北去阿裕錫哩違喇特古斯特穆爾皆其子孫承緒國號尚存故凡南北交兵以興復為辭其名甚正至郭勒齊布尼雅錫哩等以逺族相繼篡立改號韃靼後衛拉特漸強諸部相攜日尋攻擊如托克托布哈額森及小王子等皆弒逐吞併無復君臣之分自與順帝嫡裔有殊今自特古斯特穆爾被弒以前既改書南侵以正其義而於額森火舉則仍書入冦以别之後並倣此自正統初以來衛拉特遣使入貢王振以藻飾太平為名賞賚金帛無算凡所請乞亦無不豫已而額森以二千人貢馬號三千振怒其詐令禮部計口給餼虛報者皆不與而所請又僅得五之一額森恚怒遂誘挾諸部分道大舉入冦初額森欲舉兵內犯托克托布哈勸止之額森弗聽其部衆有來歸者言之帝不報及是額森遂借核貢使為兵端托克托布哈以烏梁海冦遼東阿拉舊作阿喇今改後仿此知院寇宣府并圍赤城注見前又遣别將冦甘肅額森自擁衆從大同入至貓兒莊在大同府陽髙縣北有堡參將吳浩迎戰敗死西寧侯宋瑛晟之子武進伯朱冕榮之子與璞俱練兵大同與額森戰於陽和明衛今陽髙縣是為監軍太監郭敬所制遂敗歿敬伏草中得免諸邉守將俱逃匿先是熒惑入南斗侍講徐珵語其友劉溥日禍不逺矣及是珵遣其妻子南歸妻重遷有難色珵怒日汝欲為衛拉特婦邪妻遂行徐珵字元玉吳人後改名有貞帝親征命郕王祁鈺居守邉報日數十至王振勸帝親征兵部尚書鄺野侍郎于謙力言六師不宜輕出不聽吏部尚書王直率百官再三諌亦不納遂下詔令郕王居守越三日車駕即發京師振及英國公張輔諸公侯伯尚書侍郎以下官軍私屬五十餘萬人從行倉卒就道軍中常夜驚過居庸關羣臣請駐蹕不允至宣府風雨大至邉報益急羣臣交章請留振虓怒成國公朱勇等白事皆膝行聽命尚書王佐鄺野忤振意跪草中至暮不得請欽天監正彭德清振私人也告振曰象緯示警再前恐危乘輿振曰倘有此亦命也學士曹鼐曰臣子不足惜主上係宗社安危豈可輕進振終不從至陽和伏尸滿野衆益危懼八月師還潰於土木舊驛有堡在宣化府懷來縣西額森以帝北去帝至大同王振尚欲北行郭敬密止之始班師振初議從紫荆關道由蔚州邀帝幸其家既恐蹂其鄉禾復改道宣府鄺野再上章請疾驅入關嚴兵為殿不報又詣行殿申請振怒曰腐儒安知兵事再言必死叱左右掖出之及發宣府額森兵襲軍後恭順侯吳克忠本蒙古人其父巴圖特穆爾永樂中降賜姓名吳允誠按巴圖特穆爾舊作把都帖木見今改及其弟都督克勤禦之力戰死後軍潰散略盡成國公朱勇永順伯薛綬本蒙古人其祖薛台洪武中降賜姓帥師四萬往援次鷂兒嶺在宣化縣東全軍俱覆次日次土木日未晡去懷來僅二十里衆欲入保城中振輜重未至留待之即駐營土木掘井二丈餘不得水人馬飢渴敵分道自旁近口入都指揮郭懋拒戰終夜敵益增明日圍御營不得發額森遣使請和帝詔曹鼐草勑許之敵佯退振遽令移營回旋間行列已亂敵大呼四面蹂躪入衆裸袒蹈藉死帝與親軍突圍不得出下馬據地坐敵擁之去中官喜寧從振等皆死官軍死傷者數十萬英國公張輔泰寧侯陳瀛圭曽孫駙馬都尉井源尚宣宗女嘉興公主都督梁成王貴尚書王佐鄺野直內閣學士曹鼐張益等五十餘人皆死帝既人敵營敵以校尉袁彬字文質江西新昌人來侍額森擁帝至宣府傳諭楊洪羅亨信開門出迎城上人對曰所守者陛下城池日暮不敢奉詔乃復擁帝至大同索金幣廣寧伯劉安榮之子都督郭登字元登英之孫出謁登謀奪駕入城不果額森遂擁帝北行皇太后命郕王監國敗報聞帝入敵營之次日遣千户梁貴以袁彬書示懷來守臣言被留狀且索金帛守臣送至京師以是夜三鼓從西長安門入太后遣使賫金寶文綺載以八騎皇后錢氏盡括宫中物佐之詣額森營請還車駕羣臣聚哭於朝議戰守時京師疲卒羸馬不滿十萬人情洶洶侍講徐珵言驗之天象稽之歷數天命已去莫若且幸南京尚書胡濙首言不可侍郎于謙曰欲遷者可斬京師天下根本一動則大事去矣獨不見宋南渡事乎請速召勤王兵誓以死守學士陳循是謙言力贊之太監興安厲聲曰若去陵廟將誰與守金英因叱珵出之議遂定中外始有固志越三日太后遣額森使不得報太后命郕王總百官大小事俱啓王始行運通州糧入京時議欲焚通州倉以絶冦資會應天巡撫周忱在京言倉米數百萬可充京軍一嵗餉令自往取則立盡何至遂付灰燼于謙以為然王乃令京官及軍有能運通州糧至京者官以腳值給之都御史陳鎰總其事徴兩畿山東河南江北軍入衛令羣臣直言時事舉人才皇太后立皇子見深英宗長子即憲宗為皇太子以于謙為兵部尚書謙上言京營兵械且盡宜亟遣官募義勇繕兵甲修戰具分兵九門列營郭外附郭居民皆徙入內文臣如軒輗武臣如石亨渭南人楊洪栁溥皆宜倚任至軍旅之事臣請以身當之不效則治臣之罪王深納焉亨前戰陽和兵敗奔還降官及是以謙薦授後軍右都督尋封武清伯籍王振家夷其族郕王攝朝羣臣請族誅王振振黨馬順叱羣臣退給事中王竑字公度河州人捽順髮罵曰汝倚振作威今尚敢爾邪與衆共擊之立斃朝班大亂衛卒聲洶洶王懼欲起于謙直前掖王止請王宣諭百官允其請衆乃定尋執王山至令縛赴市磔之振族無少長皆斬籍其家得金銀六十餘庫玉盤百珊瑚髙六七尺者二十株他珍玩無算已而郭敬自大同逃歸亦籍其家下獄錮之方于謙之止王諭衆也既定謙徐步出掖門吏部尚書王直最篤老執謙手曰國家正賴公耳今日雖百王直何益于是朝廷益倚重謙封楊洪為昌平伯仍鎮宣府額森以帝命誘洪開門者三洪皆不聽又令帝為書遺洪洪封上之王遣使報洪曰此書偽也自今有書悉拒毋受於是洪一意堅守以羅通為兵部員外郎提督守備居庸關初通自交址還通拒守清化事見前改户部員外郎尋以事謫廣東河泊所官掌收魚稅未入流及是于謙薦之遂復以員外郎守備居庸通上言聞敵送駕回京恐因之入寇大小關口宜各增兵口凡三十有六可通人馬者七宜各增人千可通人不可通馬者二十九宜各增人百仍命大將一人統兵三萬分駐十營于關外從之通尋進郎中又擢副都御史月晝明召前大理寺少卿薛瑄以翰林院修撰商輅宏宏載淳安人彭時字純道安逼人入內閣預機務以陳循髙榖舉也輅鄉會試及廷試皆第一士子艷稱三元明代惟輅一人而已九月廣寧伯劉安以罪下獄安以額森欲與帝結姻啓王王切責之尋自大同馳至京師言帝已進已為侯廷臣劾安擅離守地自加侯爵宜正典刑王令禁錮之尋得釋雲南鹽課提舉司吏目胡仲綸坐事入都奏言今日之事不可屈者有七萬乘之主壻於冦敵此不可屈者一也敵假議和使我無備二也和親之後驕尊自大三也索我金帛使我坐困四也以送駕為名乘機人犯五也過上乎詔誘取邉城六也欲求山後之地七也七者稍從其一則大事去矣今宜急命大同宣府守將固守城池整肅軍伍使敵不敢輕進果其送駕還京密敕楊洪邀其歸路石亨據其險厄俟駕至關堅閉勿出則戰無不勝而聖駕得還矣若不戰而和非計之得也事下禮部議行之皇太后命郕王即位是為景帝廷臣合辭請太后曰車駕北狩皇太子幼沖古云國有長君社稷之福請定大計以安宗社太后允之羣臣以太后旨告王王驚讓再三避歸郕邸羣臣復固請會都指揮嶽謙使衛拉特還口傳帝旨以王長且賢令繼統以奉祭祀王始受命以明年為景泰元年遙尊帝為太上皇帝巡撫山西副都御史朱鑑字用明晉江人請罷內官監軍不從鑑上言竊見王振亂天下江南冦發俱以誅振為名夫事歸朝廷則治歸宦官則亂况今額森詭詐百端往來覘伺宜專將帥事權悉罷監軍中貴重懸賞格鼓勸義旅庶大駕可還敵兵自退帝雖嘉納不能從也已而山東布政使裴綸湖廣監利人言山東既有巡撫又設內官鎮守有司供應以一科十實為擾民請下廷議凡內地已有巡撫者鎮守內官悉召還京疏入責綸陳狀綸服罪乃已時臨洮府同知田㿩聽選知縣單字陜西舉人段堅工部辦事吏徐鎮俱上言請召還監軍鎮守中官詔以為祖宗舊制不可更皆不納其後南京軍匠餘丁華敏上書言宦官十害略曰內官家積金銀珠玉動以萬計從何而至非內盜府藏即下朘民膏害一也怙勢矜寵􅿫公侯邸舍興作工役勞擾軍民害二也家人外親皆市井無賴縱橫豪悍任意為姦納栗補官貴賤洐雜害三也建造佛寺耗費不資營一已之私破萬家之産害四也廣置田莊不入糧稅寄户府縣不受征徭阡陌聨亘而民無立錐害五也家人中鹽虛占引數轉售他人倍支巨萬壞國家之法奪商人之利害六也奏求塌房邀接商旅恃強賖買經嵗不還行賈坐敝莫敢誰何害七也賣放軍匠俾月錢致內府乏人工役煩重捶楚不堪害八也置買物科以一料十虧官損民害九也監工所至非法酷刑軍匠塗炭害十也事下禮部寢不行減浙江福建銀場課以郭登為總兵官鎮大同時大同壁壘蕭條城門晝閉登慷慨奮勵修城堞繕器械拊循士卒弔死問傷親為裹創傅藥曰吾誓與此城存亡不令諸君獨死也登初至士卒堪戰者才數百馬百餘匹不數年馬至萬五千精卒數萬大同兵遂為天下最以楊信民名誠以字行浙江新昌人為僉都御史討廣東賊黃蕭養南海人蕭養以行劫被獲繫都司獄獄禁不嚴蕭養潛使人納斧飯中至夜與囚百七十人皆破械出劫軍器局收兵仗嘯聚海濵旬日間衆至萬餘人進圍廣州總兵官張安敗死指揮僉事王清被殺圍三月不解鄉民避賊至城者皆不納歸則盡為賊殺從賊者益衆帝以信民為僉都御史往討信民先為廣東參議有惠政士民聞其來皆喜信民至開城門發倉廪奬勸士卒招降脅從者數萬人賊勢漸衰蕭養尅期請降會信民暴卒賊聞之曰楊公死吾屬何望遂復大掠明年四月都督董興討定之帝命興充副總兵督軍討蕭養興至廣州賊列千餘艘勢甚張興縱兵奮擊殺死者無數餘多就撫蕭養中流矢死函首以獻冬十月額森奉上皇至大同遂入紫荆關先是都指揮僉事季鐸奉皇太后命詣上皇所告帝即位及立皇太子鐸還帝復命鐸奉書上皇并致書額森言即位之故額森以帝立會衆議欲大舉入冦帝必南遷大都可有也叛閹喜寧從上皇北狩叛附額森為間諜復盡以中國虛實告之教額森奉上皇至邉脅諸將開關召總兵鎮守官出見則留之可以得志額森以為然乃詭言奉上皇還京至大同總兵官郭登不納遂由陽和進陷白羊口一作白楊在大同府天鎮縣北少西守備通政使謝澤死之澤督兵扼山口會大風揚沙兵潰被殺抵紫荆關喜寧與額森弟大同王夾攻關城守備都御史孫祥都指揮韓青戰死敵遂入關長驅而東詔諸王遣兵入衛以于謙提督各營軍馬詔諸將皆受謙節制都指揮而下不用命者先斬以徇然後奏聞京師戒嚴廷議禦敵之䇿石亨請毋出師第堅壁以老之于謙曰敵張甚矣如此則示弱令敵益輕我乃即分遣諸將帥師二十二萬列陳九門外謙自與亨帥副總兵范廣遼東人等陳德勝門當額森悉閉諸城門絶士卒返顧下令臨陳將不顧軍先退者斬其將軍不顧將先退者後隊斬前隊於是將士知必死皆用命詔宣府遼東總兵官山東山西河南陜西巡撫皆入援額森犯京師于謙督諸將擊却之額森自紫荆關奉上皇過易州至良鄉父老進茶果羊酒進次盧溝橋官進果上皇作書三一奉皇太后一致帝一諭文武羣臣額森列陳至西直門上皇止德勝門外是日都督髙禮毛福夀敗敵彰義門北殺數百人奪還所掠千餘口明日額森擁上皇登土城在德勝門西北亦曰土城關即古薊門遺址亦謂之薊邱喜寧嗾額森邀大臣迎駕帝以通政司參議王復為右通政中書舍人趙榮字孟仁其先西城人後家閩縣為太常少卿出城朝見喜寧又嗾額森以二人官小邀于謙石亨胡濙王直出見索金帛萬萬計復榮不得見上皇而還廷臣欲議和遣人至軍中問謙曰今日止知有軍旅他非所敢聞已額森遣騎窺德勝門謙亨設伏空舍令數騎誘敵敵遂以萬騎來薄伏兵出范廣發火器擊之額森弟博囉及平章茂諾海舊作卯那孫今改中炮死敵轉至西直門都督孫鏜字振逺東勝州人斬其前鋒數人逐之敵益兵圍鏜鏜力戰不解會石亨分兵至敵引退欲還土城居民皆升屋呼號爭投磚石擊敵囂聲動地王竑毛福夀亦來援敵遙見旗幟不敢復前額森初輕中國既至相持五日邀請既不應戰又輒不利其别部攻居庸者復為羅通所敗敵五萬攻居庸會天大寒通汲水灌城水堅不得近七日敵遁走追擊之三戰三捷斬獲無算額森氣大沮喪又聞勤王師且至乃夜拔營由良鄉而西大掠所過州縣擁上皇出紫荆關去帝以謙亨功大進封亨武清侯加謙少保謙固辭不允敵之退也焚毁長獻景三陵寢殿而餘冦之未出關者分屯畿內四出剿掠諸降人亦乘間並起帝以昌平伯楊洪充總兵官帥孫鏜范廣討捕之遣官修復陵寢詔止勤王兵衛拉特托克托布哈遣使入貢時衛拉特君臣鼎立額森專國兵最多托克托布哈雖為汗兵較少阿拉知院兵又少三人外親內疏其合衆南犯利多歸額森而害則均受至是托克托布哈遣使入貢帝從胡濙王直等議厚賞賜以間之十一月修沿邉關隘上皇至衛拉特額森以上皇至老營惟袁彬哈銘蒙古人幼隨其父為通事從彬同上皇寢天寒以脅溫上皇足銘日侍左右初上皇入敵營之夕額森有異志會雷震死其所乘馬而上皇寢幄復有異彩乃止及是上皇所居毳帳每夜有赤光奕奕繞其上若龍蟠額森見之大驚異尋欲以妹進上皇上皇却之愈敬服自是五七日必進宴置酒為夀稽首行君臣禮以左都督朱謙夏邑人鎮宣府僉都御史王竑鎮居庸關先是楊洪奉詔入援宣府人心危懼欲棄城走都御史羅亨信仗劍軍門諭止之衆始定至是學士陳循以洪善戰請帥所部留京羅通曉暢兵事請召還參洪軍務帝從之于謙言宣府京師之藩籬居庸京師之門户今洪既留京通復召還宜更選重臣鎮守乃以朱謙鎮宣府紀廣楊俊洪之子副之王竑及夏忠魯瑄守居庸十二月尊皇太后為上聖皇太后以王驥充總兵官討貴州叛苖初驥自麓川還會湖廣貴州諸苖所在蜂起圍平越明衛後置軍民府今府屬貴州清平明衛今為縣屬都勻府諸衛貴州東路閉驥至民遮道訴驥曰吾受命征麓川不受命討苖也去之軍無紀律苗前後截擊死亡數萬比至武昌詔還軍討苗會土木難作羣臣劾王振兼及驥朝議以驥方在軍且倚之平苗置弗問至是苗益熾命驥佩平蠻將軍印充總兵官討之尊生母賢妃吳氏丹徒人為皇太后立妃汪氏順天人為皇后慧星見凡二十日始滅額森犯寧夏喜寧勸額森西犯寧夏掠苑馬直趨江表居上皇南京袁彬謂上皇曰天寒道逺陛下又不能騎徙取凍飢且至彼而諸將不納奈何額森聞之怒欲殺彬上皇力解乃止額森遂自冦寧夏掠人畜期月始退仍留數千人於河套明史地理志大河自寧夏衛東北流過榆林衛北至廢勝州東北乃折而南所謂河套也一統志今為鄂爾多斯地時入寧夏為冦景皇帝庚午景泰元年春正月朔罷朝賀以上皇在衛拉特也築城天夀山南名曰永安以居陵衛官軍並移昌平縣治於內今順天府昌平州治即永安城也明正德元年升縣為州始令輸納者給冠帶户部議令軍民輸納者給冠帶官吏罪廢者輸草於邉得復職帝用給事中翟敬議止給冠帶其輸納者或米或粟或豆或草或鞍馬或牛驢或銀始於宣府大同其後兩畿及諸布政司遼東皆行之而米之輸尤多已而監生郭佑言昨以國用耗乏謀國大臣欲紓一時之急令民納粟者賜冠帶今軍旅稍寧而行之如初是以空乏啓冦心也章下議終不行閠月郭登敗衛拉特於栲栳山在朔平府平魯縣西北冦入大同至沙窩在朔平府東北即沙楞河口登奮擊破之追奔四十餘里又敗之栲栳山盡奪所掠而還自土木敗後邉將無敢與冦戰登以八百騎破寇數千軍氣益振捷聞封定襄伯後冦數至登屢擊却之二月帝耕藉田遣武清侯石亨都指揮同知楊能字文敬洪從子巡邉帝用于謙議遣石亨率京軍三萬巡大同楊能統京軍一萬五千巡宣府時有敵三人至大同欲朝廷通好參將許貴字用和江都人以聞事下兵部于謙言前遣指揮季鐸嶽謙往敵而敵隨入冦通政王復少卿趙榮不見上皇而還和不足恃明矣且我與敵不共戴天理固不可和萬一和而彼肆無厭之求從之則坐困不從則速變勢亦不得和貴居邉疆重地恇怯如此何以敵愾移檄切責之自是邉將無敢言和者三月衛拉特復分道入冦陽和大同偏頭關五季北漠寨元改為關明置偏關所今為縣屬寧武府野狐嶺注見前萬全衛皆被冦時邉將禦敵互有殺傷惟寧夏慶陽朔州被敵殺掠甚衆叛閹喜寧伏誅寧數誘額森入邉冦掠郭登諜知之聞於朝會上皇以寧欲殺袁彬額森嘗謂上皇曰中朝若遣使來皇帝歸炎上皇曰汝自送我則可欲中朝遣使徒費往返爾寧聞怒曰欲急歸者彬也乃欲殺彬患之言於額森使寧還寧索禮物而令彬以密書報宣府寧於獨石參將楊俊預伏兵城下具酒勞寧酒半伏發遂擒之送京師羣臣雜治磔於市上皇聞寧誅曰自此邉境稍寧吾南歸有日矣録土木死事諸臣後夏四月旱五月總督侍郎侯璡字廷玉澤州人破貴州苖時羣苗西至龍里明衛今為縣屬貴陽府東至沅州注見前北至武岡晉縣明初為府後改州今屬湖南寶慶府南至播州注亦見前不下二十萬平越被圍已九月城中食盡掘草根煮弩革食之而王驥頓兵辰沅不進巡按御史黃鎬字叔髙候官人置疏竹筒中募土人乞援於朝乃更命保定伯梁珤都督方瑛會湖廣總督侯璡帥師往討時副總兵田禮已解平越圍璡遣兵攻敗水西諸賊女土官阿推等作亂貴州道始通又調雲南兵開畢節注見前諸路而自率兵攻破紫塘蠻寨在平越府境等數十餘寨至重安江在平越府黃平州南源出苗境經湖南靖州界為黔楚要津與王驥兵會鎮逺道亦通已而璡復檄方瑛攻賞改苗寨名諸寨擒偽王王阿同及阿趙等而驥亦俘獲剗平王苗富蟲皆送京師伏誅是秋梁珤亦破湖廣苗會璡卒以王來代之明年春來與方瑛分兵連破二百餘寨苗衆縳其酋以降朱謙敗衛拉特兵于宣府衛拉特二千騎屯賈家營謙與參將紀廣等力戰却之封謙撫寧伯額森擾宣府大同意二城可旦夕下而謙與郭登數以羸師挫其徑騎額森由是氣益沮衛拉特遣使請和喜寧既誅額森失問諜所部兵多死傷而托克托布哈王阿拉知院又皆擕二于是額森決意請和又恥自屈乃先令阿拉知院遣參政旺札勒托歡舊作完者脫歡今改後仿此等至懷來議和邉將以聞帝用陳循言賚使令還而以敕諭阿拉未行額森忽擁上皇至大同遣使賫文書以講和為言而自率衆至城下郭登仍欲謀奪上皇登朝服立月城內潛令人伏城上俟上皇入即下月城閘板敵覺遂擁上皇去登以使及書奏帝厚賚使令與旺扎勒托歡偕還廷臣皆言宜遣使往報太監興安出呼羣臣曰公等欲報使孰為富弼文天祥者詞色交厲尚書王直面折之安始語塞乃以給事中李實字孟誠合州人為禮部侍郎大理寺丞羅綺為少卿及指揮馬顯等令齎璽書往諭衛拉特君臣未幾托克托布哈額森所遣使丕勒瑪尼舊作皮兄焉哈瑪爾舊作黑麻今並改後仿此等復至言於館伴云昨知院使來朝廷遣人偕往今吾等乃可汗及太師所命若不報使事必不濟尚書胡濙奏其言廷議請簡四人往帝命俟李實還議之秋七月遣右都御史楊善字思敬大興人等使衛拉特先是阿拉知院使來吏部尚書王直首疏請迎上皇及衛拉特君臣使相繼至直與廷臣復交章言之帝不懌曰吾非貪此位而卿等強樹焉今復作紛紜何衆不知所對于謙從容言曰天位已定寧復有他顧理當奉迎萬一彼果懷詐我有辭矣帝意始釋會丕勒瑪尼等將還乃命善及侍郎趙榮為正使以都指揮同知王息錦衣衛千户湯胤績字公讓東甌王和之曾孫等副之賫金銀書幣往衛拉特而李實適以額森使至述額森語云迎使夕來大駕朝發廷議請更遣大臣帝曰楊善既去不必更遣但以奉迎意敕諭額森足矣八月上皇發衛拉特楊善奉使時賫賜額森金幣外餘無他賜善乃捐已資揣彼中所需者多市以往既至館伴田氏亦中國人留飲帳中善與語相得因以所賫遺之館伴喜明日善謁額森亦大有所遺額森亦喜善因詰之曰太上皇帝朝太師遣貢使必三千人嵗必再賚金幣載途背盟見攻何也額森曰奈何削我馬價子帛多剪裂前後使人往多不歸又減嵗賜善曰馬價非削也太師馬嵗增而不忍拒故微省之太師自度價比前孰多帛剪裂者通事為之即太師貢馬有劣弱貂或敝豈太師意邪貢使多至三四千人有為盜或犯他法故自亡去中國留之何用賞賜惟據現在數浮於人則不與非減也額森屢稱善善見額森辭色和因曰太師再攻我屠戮數十萬太師部曲寧無損今還上皇和好如故中國金帛日至不亦美乎額森曰上皇歸何以處之善曰天位已定難以再移知院巴延特穆爾勸額森留善而遣使要復上皇位額森懼失信不可乃引善見上皇設宴奉餞額森自彈琵琶妻妾奉酒令善坐善辭上皇曰太師命坐則坐善叩頭少坐即起周旋其間額森頁左右曰有禮巴延等亦各設宴畢額森築土臺坐上皇臺上率妻妾部長羅拜臺下上皇行額森送數十里遣知院帥兵衛送而自下馬伏地慟哭良久去詔議迎上皇禮禮部尚書胡濙具儀以上禮部堂上官迎龍虎臺錦衣具法駕迎居庸關百官迎土城外諸將迎教場門上皇自安定門入進東安門於東北門南面坐皇帝謁見畢百官朝見上皇入居南城大內前龍虎臺注見傳旨以一輿二馬迎於居庸關至安定門易法駕給事中劉福言禮太薄帝曰昨得上皇書具言迎駕禮宜從減省朕豈得違之羣臣乃不敢言會千户龔遂榮淮安人為書投高榖而匿其名言奉迎宜厚主上當避位懇辭而後受命如唐肅宗迎上皇故事榖袖之入朝與王直胡濙等共觀之直曰此禮失而求諸野也濙欲以聞王文不可而給事中葉盛字與中崑山人已奏之有詔索書濙等因以書進且言肅宗迎上皇禮正可倣行帝不悅曰第從朕命無事紛更乃遣太常少鄉許彬字道中寧陽人至宣府翰林侍讀商輅至居庸迎上皇時帝索遂榮書所從得甚急遂榮自縛詣闕言之下詔獄坐遣久之得釋上皇至京師入居南宫赦上皇至自東安門入帝迎拜上皇答拜相持泣各述授受意推遜良久帝遂送上皇至南宫百官隨入行朝見禮赦天下詔詞有曰禮惟有隆而無替義則以卑而奉尊雖未酬復怨之私庶稍遂厚倫之願先是李實使上皇言于上皇曰南歸後當引咎自貴上皇滋不悅及至宣府僅命許彬草敕諭羣臣而已復辟後實竟斥為民以刑部侍郎江淵字世用江津人兼翰林學士入內閣預機務時苖衷罷以淵代之初淵與徐珵同宫侍講珵倡議南遷為太監金英叱出跟蹌過左掖門淵適至迎問之珵曰以吾議南遷不合也于是淵入具陳固守之䇿遂見知超擢刑郆侍郎及是參預機務九月御經筵御史許士達歙縣人言經筵舊典每月不過三日如遇寒暑又輒停止一暴十寒聖學何以有成願陛下于經筵之外日召儒臣講論經史驗之于古會之于心以應無方之變帝優詔褒答南京吏部尚書魏驥字仲房蕭山人致仕初驥為吏部侍郎端慎徑直王振方陵虐公卿獨嚴重驥稱先生尋調南京進尚書至是以請老至京大學士陳循驥門生也請間曰公雖位冡宰未嘗立朝願少待事在循輩而已驥正色曰君為輔臣當為天下進賢才不得私一座主退語人曰渠以朝廷事如一已事祗為私謀安得善終竟致仕去驥家居二十年布衣糲食不殖生産事兄教諭騏雖益恭教子弟力田以理學朂後進時戴笠行田間過錢塘主簿𨽻呵之對曰魏驥復叱之曰蕭山魏驥簿倉皇謝驥慰而遣之後至成化中驥年九十有八朝廷以御史梁昉言遣行人存問賜羊酒命未至而驥已卒賜祭葬如禮諡文靖其子寬以驥遺言詣闕辭營葬乞以其金振飢民詔曰驥臨終遺命猶恐勞民可謂純臣矣其如所請冬十一月禮部尚書胡濙請令百官賀上皇生日不許未幾濙又請明年正旦百官朝上皇於延安門亦不許自是嵗以為請詔皆免行給事中林聰欲上疏言之葉盛謂曰今上孝弟上皇盛德兩宫帖然安靜若益以言則涉衆易疑恐無中生有反為非便聰乃止御史盛昶目盛曰已不為而又阻人為之邪盛曰此大事當熟慮惟安與靜久長之道也林聰字季聰寧德人盛昶吳江人辛未二年眷正月令軍民輸納者世襲武職都給事中金達疏諌不聽其後給事中曹凱字宗元益都人言近輸豆四千石以上得授指揮彼受祿十餘年費已償矣復令世襲是以生民膏血養無功子孫而彼取息長無窮也乞自今惟令帶俸不得任事帝然之命已授者如故未就者悉如凱言度天下僧道先是僧道三年一度帝特詔停之至是太監興安以皇后旨度僧道五萬餘人于謙上言今四方多流徙之民三邉缺戰守之士度僧道太多恐乖本末帝不省二月吏部郎中李賢字原德鄧州人上中興正本䇿其目有十曰勤聖學顧針警戒嗜欲絶玩好慎舉措崇節儉畏天變勉貴近振士風結民心帝深嘉納命翰林寫置左右備省覽夏四月遣都督僉事孫安守備獨石初額森入犯獨石等八城獨石馬營雲州雕鶚赤城龍門李家莊長安嶺凡八城俱殘毁議者欲棄之于謙曰棄之則不但宣府懷來難守京師不免動搖乃薦安授以方略率兵守之安招士卒修城堡飭戰具弔死問傷流亡復業八城遂完五月遺衛拉特托克托布哈書上皇歸後托克托布哈及額森屢使致貢上皇所亦有獻帝意欲絶衛拉特不復使使額森以為請尚書王直金濓胡濙等皆言絶之恐啓釁帝曰遣使有前事適以滋釁爾曩入冦時豈無使邪因敕額森曰前者使往小人言語短長遂致失好朕今不復遣而太師請之甚無益也太師使朕皆優禮厚給之顧亦須少人賞賚乃得從厚至是托克托布哈使又至送還所掠招撫使高能等請通好直等復相繼言之帝曰使臣不遣朕志素定乃享其使而以書報之復以楊洪鎮守宣府洪奏言臣一門父子俱握重兵洪子俊為右都督管三千營兄子能都督同知信都督僉事俱充參將盛滿難居乞賜休致不許居數月以疾召還卒諡武襄洪久居宣府御軍嚴肅士馬精強為一時邉將冠秋七月京師地震南京亦震八月復午朝自永樂初舉午朝事見前後漸罷不行至是復之舊制凡常朝內閣五府六部及諸司以次奏事及是定午朝議帝用學士陳循言命翰林院奏事在五府六部之前冬十二月廣通王徽煠岷王楩第三子陽宗王徽焟楩第五子謀逆廢為庶人徽煠惑家人假友洪致仕都事干利賔等語謂徽煠有異相當王天下作偽敕分遣友洪及蒙能陳添仔等以銀印金幣誘諸苗為亂封苗酋楊文伯等為侯令發兵來攻武岡文伯不敢受陽宗王徽焟亦與通謀友洪歸為鎮南王徽煣楩第二子所執有司以聞帝廢徽煠徽焟為庶人幽徽煠京師而錮徽焟於鳯陽蒙能率苗兵二千至武岡聞事敗叛入廣西稱蒙王紏生苗為亂久之能始誅事詳後立團營明初京營兵𨽻五軍都督府成祖北征分中軍左右掖左右哨既旋師仍之謂之五軍營兼馬步隊專教陳法已又置三千營掌車輦旗纛扈從出入隊皆騎後征交址得火器法置神機營隊皆步各提督以勳臣內臣所謂三大營也其五都督府亦自名五軍掌府者治常行文書而已非特命不預營事及是于謙以營政久弛兵將不相習請選三營軍十萬分五營團操名曰五團營其法五十人為隊隊有長百人兩隊有領隊官千人冇把總五千人有都指揮體統相維兵將相識量敵多寡以為調法既而謙又請益兵五萬並前五營為十團營都指揮三十把總一百五十管隊官一千五百仍各統以武臣內臣而謙及石亨內臣劉永成曹吉祥往來提督其餘軍不在團營者歸本營訓練以衛京師名曰老營由是京軍之制一變已而謙繪陳圖上進依古法而變通之其為論甚悉帝然之命依法訓練謙號令明審日視指屈口奏悉合機宜石亨雖大將受成而已以禮部侍郎王一寧台州仙居人祭酒蕭鎡字孟勤泰和人並兼翰林學士入內閣預機務鎡先代李時勉為祭酒帝即位初以老疾辭國子生三千人叩闕請留帝允之至是與一寧並以本官兼學士入內閣額森弒其主托克托布哈托克托布哈娶額森姊生子額森欲立之托克托布哈不從額森亦疑其通中國將害已遂相攻托克托布哈敗走額森追殺之收其妻子遣使獻捷且貢馬于謙上言額森雖悔過攄誠遣使入貢而罪大惡極終不可容今其君臣自相仇殺是天授我復仇之機臣請統團操軍馬分往宣府大同討賊帝不從壬申三年春二月户部尚書金濓有罪下獄尋釋之舊制秋糧輸米有折收銀布者夏稅輸麥有折收絲絹者帝即位詔免景泰二年稅糧三之一濓檄有司但減米麥其銀布絲絹徴如舊學士江淵以告帝詰責户部濓言絲絹銀布詔書未載今國家多用若概免國用何資言官交章劾之遂下都察院獄三月釋之削太子太保改工部吏部尚書何文淵言理財非濓不可遂復還户部三月詔錦衣衛官訪事夏五月廢皇太子見深為沂王立子見濟為皇太子帝即位後久欲以見濟代太子而難于發言會廣西土目黃􅎫以私怨戕其兄思明土知府􅒿并滅其家􅎫先以功屢擢都指揮使􅒿其庶兄也􅒿老子均襲官非􅎫意隂令其子率悍卒夜馳破府城滅􅒿家支解􅒿父子瘞之後圃即引還明日􅎫佯不知走思明驚哭發喪而􅒿僕福童于􅎫子殺􅒿時已見之并識其從人脫走訴憲司巡撫李棠以聞下有司治其事捕􅎫父子入獄􅎫急使其黨至京師行賂有教其迎合帝意者乃上疏請易太子疏曰太祖百戰以取天下期傳之萬世往年上皇輕身禦冦駕陷北庭冦至都門幾喪社稷不有皇上臣民何歸今且踰二年皇儲未建臣惟人心易搖多言難定爭奪一萌楇亂不息皇上即循遜讓之美復全天敘之倫恐事機叵測反覆靡常萬一羽翼長養權勢轉移委愛子於他人寄空名於大寶階除之下變為冦讐肘腋之間自相殘蹙此時悔之晚矣乞與親信文武大臣密定大計以一中外之心絶覬覦之望疏入帝曰萬里之外乃有此忠臣即下廷臣議且令釋􅎫罪明日禮部尚書胡濙集羣臣會議衆相顧莫敢發言惟都給事中李侃林聰御史朱英字時傑桂陽人以為不可尚書王直亦有難色太監興安厲聲曰此事不可已即以為不可者勿署名毋得首鼠持兩端羣臣皆唯唯署議於是濙等上言陛下膺天明命中興邦家統緒之傳宜歸聖子黃􅎫奏是制曰可禮部具儀擇日以聞即日簡置東宫官越九日更封太子為沂王立見濟為太子詔曰天佑下民作之君實遺安於四海父有天下傳之子斯本固於萬年大赦天下命百官朔望朝太子先是帝有易儲意恐文武大臣不從乃賜陳循髙榖白金各百兩江淵王一寧蕭鎡商輅半之以緘其口及太子立又加賜黃金各五十兩并賞諸親王公主及邉鎮文武內外羣臣有差而東宫公孤官皆兼支二俸廢皇后汪氏立妃杭氏為皇后帝初易太子獨汪后不可曰如監國之稱何帝不從從后以太子杭妃所生遂讓焉封上皇子二人為王見清上皇第二子萬宸妃出榮王天順復辟後改封德王居德州復改濟南見淳上皇第四子王惠妃出許王明年薨官顔孟二氏子孫各一人六月建大隆福寺時太監興安用事佞佛甚於王振請帝建大隆福寺費數十萬踰年始成帝尅期臨幸禮部郎中章綸字大經樂清人諌河東鹽運判官楊浩濟南人除官未行亦上章言之帝乃止秋七月殺內使王瑶御用監阮浪侍上皇於南宫上皇賜浪鍍金繡袋及鍍金刀各一浪以與瑶錦衣指揮盧忠見之醉瑶酒而竊之上變言浪傳上皇命以袋刀結瑶圖復位帝震怒下浪瑶詔獄窮治之忠筮於術者同寅安邑人寅以大義折之且曰此大凶兆死不足贖忠懼佯狂以冀免商輅及中官王誠言於帝曰忠病風無足信不宜聽妄言傷大倫帝意少解乃並下忠獄坐以他罪謫廣西立功錮浪於獄而瑶竟磔死江淵以母喪起復初侍讀學士倪謙字克謙錢塘人遭喪淵薦謙為講官謙遂奪哀至是御史周文言淵引謙正為今日地帝以事既處分不問詔自今羣臣遭喪毋濫保冬十月以左都御史王文入內閣預機務時閣中已有五人陳循最寵任髙穀與循不相能以文強悍欲引文自助乃請增閣員循舉其鄉人蕭維禎榖舉文文方巡視江淮以中官王誠助遂召入閣二品大臣入閣自文始文既居政府反與循比而不附榖人謂榖自生一敵云遣諸將分鎮大同宣府孫鏜石彪亨從子協守大同衛潁楊能協守宣府從于謙請也謙又議上禦冦安邉十一事詔悉行之十一月己未朔日食于謙辭總督軍務不許帝知謙深凡所陳奏無不從而謙亦每事抒忠直陳無隱由是人多忌之方敵初退都御史羅通劾謙上功不實且言韓信起自行伍穰苴拔于寒微宜博搜將士中如信苴者與議軍事若今腰玉珥貂皆苟全性命保爵祿之人未足與議也意蓋詆謙與石亨輩謙疏辨且乞罷請通指薦韓信穰苴其人者廷臣共留謙又謂通志在滅賊無他帝兩解之及設團營謙與石亨同事謙議論斷制亨不能贊一辭銜之亨貪縱自恣謙每事裁抑亨不得逞益恨謙疏辭總兵官不許謙上言祖宗朝本無總督邇因邉事孔棘命臣兼領此一時之宜非經久之法即今敵情未定將任宜專臣見石亨纍奏辭職以臣為之軒輊也豈可以臣之駑鈍使亨不得行其志乞解臣總督軍務俾亨專任其事帝亦不允通與亨皆謙所薦舉顧前後齮齕之而言者復捃托不已諸御史屢以深文彈劾賴帝力持之謙略得盡其所施設然謙故性剛負才氣遇事有不如意輒拊膺嘆曰此一腔熱血竟灑何地視諸選耎大僚勳臣貴戚意頗輕之故憤怨者益衆德勝之捷石亨功不如謙而得世侯內愧疏薦謙子冕詔赴京師謙辭不允冕至謙言國家多事臣子不得顧私恩且亨為大將不聞舉一幽隱拔一行伍微賤以禆軍國而獨薦臣子於公議亦不協臣於軍功立杜徼幸決不敢以子監功亨復大恚帝嘗賜謙第謙辭每日留宿直廬器具蕭然素病痰疾作帝遣興安舒良往視還奏謙服用過薄詔尚方製賜至醯菜皆備帝又親幸萬嵗山伐竹取瀝賜之或言龍謙太重興安曰彼日夜分國憂不問家産即彼去令朝廷何處更覔此人于冕字景華十二月額森使來廷臣請遣使報之不許額森自弒托克托布哈後屢貢馬至是復遣使賀來年正旦尚書王直等請遣使答之詔兵部議于謙言臣職司馬知戰而已行人事非所聞帝從謙言遣使議乃罷既而洗馬劉定之言北庭遣使宜敕羣臣公議不當但委兵部蓋和戰皆所以待敵而兵部必不以和為請猶巫醫皆所以治病而巫者必不以藥為言各護其所短而欲見其所長也詔下羣臣更議給事中路璧以遣使有五不可帝以璧議為是使卒不遣劉定之字主靜永新人癸酉四年春二月以黃􅎫為前軍都督府同知敕􅎫馳驛至京召見便殿以􅎫有機謀勇略命治前府事賜第居京師後太子卒􅎫即仰藥死三月鳯陽淮徐飢巡撫僉都御史王竑賑之鳯陽淮安徐州大水道殣相望竑不待報輒開倉賑之山東河南飢民亦相率就食竑以徐州廣運倉有餘積欲發以賑典守中官不可竑曰民旦夕且為盜若不吾從脫有變吾先斬若然後自請死耳中官憚竑名不得已從之竑乃自劾專擅罪因言廣運所儲僅支三月請令死罪以下得入栗贖帝從其議復命侍郎鄒幹齎帑金馳赴聽竑便宜竑乃躬自巡行散賑不足則令沿淮上下商舟量其大小出米作粥以食飢民又勸冨民出米麥榖粟而以銀錢絹布參之分給被災之家全活二百一十餘萬賦牛種及招撫復業者七萬九千餘户他境流移安輯者萬六百餘家病者給藥死者具槥鬻子女者贖而歸之還籍者豫道里費民忘其飢頌聲大作歌曰生我者父母活我者巡撫初竑奏淮揚飢帝憂甚及得竑自劾疏喜曰好都御史不然飢死我百姓矣于是尚書金濓大學士陳循等頌竑功就進左副都御史時濟寧亦飢帝命南京户部尚書沈翼賫帑三萬往賑散給僅五千金餘歸之京庫竑劾翼奉使無狀請以銀易米備賑從之夏四月始令生員納粟入國子監先是元年六月命生員納糧倒馬關者給冠帶至是命輸粟八百石於臨清東昌徐州賑濟者入監讀書循資出身尋減三百石行未幾以胡濙言遂罷共武中監生與薦舉人材參用故其時太學生最盛逮薦舉既廢進士日重而監生漸輕至是納粟例開開封教授黃鑾首言其不可户部請俟倉庫稍實停之于是不久即止然其後或遇嵗荒或因邉警或大興工作率據前例行之而軍民子弟亦得援生員之例以入監謂之民生亦謂之俊秀或竟謂之例監而監生日益輕矣秋八月額森自立為汗額森以兵力迫脅諸部東踰烏梁海西及赤斤哈密等遂自立為汗以其次子為太師遣使致書稱大元特克紳汗舊作田盛可汗解云田盛猶言天聖也蓋當時禾通音譯以其與天聖相近遂以為解今改正并訂之末曰添元元年詔廷臣議報書所稱或以為但敕諭來使不必賜書給事中林聰或以為宜仍稱太師安逺侯栁溥或以為可稱衛拉特主郎中章綸而府部大臣則僉言宜從北俗稱為汗帝從大臣議書稱衛拉特汗賜之冬十月以徐有貞為左僉都御史治沙灣決河有貞即徐珵以倡議南遷為太監興安金英所叱久不得遷因諂事陳循以玉帶遺之且用星術言公帶將玉矣無何循果加少保大喜會太子立因引為右諭德尋復薦為國子監祭酒帝曰是議南遷者邪為人傾邪將壞諸生心術他大臣亦屢薦珵輒不用循具以告珵曰若第更名無為內家習知也珵從之遂改名有貞時河決沙灣已七年矣隨築隨決前後治者皆無功廷臣共舉有貞乃擢僉都御史治之十一月皇太子見濟卒諡懷獻甲戌五年春正月命平江侯陳豫以平賊功進封侯學士江淵撫輯山東河南兩淮軍民時山東河南兩淮大寒人畜多凍死巡撫都御史王竑以為言故有是命竑言頃冬春之交淮河氷抵海四十餘里人畜僵死萬餘弱者鬻妻子強者肆劫敓民困若此陛下端居九重大臣身處廊廟何由見之使目擊其狀未有不太息流涕者也陛下即位以來非不敬天畏民而天變民窮特甚者恐聖德雖修而未至人倫雖正而未篤賢才用而未收其效邪佞去而未盡其類仁愛施而實惠未溥財用省而上供未節刑罰寬而寃獄未伸工作停而匠未息法制頒而尚有更張賦稅免而或仍牽制生是干和遂召災變臣願陛下修厥德以圖厥治欽天命法祖宗正倫理篤恩義戒逸樂絶異端廣仁愛釋猜疑修德必致其誠進忠良逺邪佞公賞罰寬賦稅節財用戒聚斂却貢獻罷工役圖治必盡其實如是而災變不息未之有也帝褒納之因敕內外臣工同加修省彌災之道三月減國子生額監生二千餘人俱仰給官廪以户部侍郎孟鑑言留年深者千餘人餘放歸命學士王文撫恤揚州及蘇常諸府尚書儀銘字子新髙密人智之子以江南北積雪沍寒死亡載道奏請賑恤帝得奏即馳敕江淵王竑賑淮北而命文賑揚州及蘇常諸府先是正統以來蘇松常鎮四府糧自兑運外每四石折白金一兩即金花銀事具前民以為便後户部仍徴米輸淮徐凡一百餘萬石率三石而致一石民多破家文以便宜停之又發廪賑飢民三百六十餘萬夏四月壬午朔日食五月下禮部郎中章綸御史鍾同字世京永豐人於錦衣衛獄先是懷獻太子既卒綸與同偕朝語及沂王皆泣下因與約疏請復儲會定州獲北諜言額森使偵京師將以秋初大舉深入同聞之上疏抗論時政因及復儲事曰父有天下固當傳之於子乃者太子薨逝足知天命有在今皇儲未建國本猶虗臣竊以為上皇之子即陛下之子沂王天資厚重足令宗社有託伏望擴天地之量敦友于之仁擇日具儀復還儲位實祖宗無疆之休疏入帝不懌然猶下廷臣集議雖銜同甚未發也越三日綸復陳修德彌災十四事其言惇孝弟云孝弟者百行之本願陛下退朝後朝謁兩宫皇太后修問安視膳之儀上皇君臨天下十有四年是天下之父也陛下親受册封是上皇之臣也上皇傳位陛下是以天下讓也陛下奉為太上皇是天下之至尊也願陛下於朔望或節日一幸南官率羣臣朝見以展友于之情極尊崇之道又請復汪后於中宫正天下之母儀還沂王於儲位定天下之大本帝得疏遂大怒時日已暝宫門閉傳旨自門隙中出立執綸繫詔獄未幾并及同逼引主使拷掠備至會大風揚沙天地晝晦獄得稍緩令錮之烏梁海三衛乞居大寧城不許額森虐使三衛逼徙其部落於黃河穆納地穆納山名注見前三衛不能堪其酋竒里瑪舊作乞克蠻格根特穆爾舊作革干帖木兒今並改後仿此等亡歸請得近邉屯駐因乞居大寧廢城于謙以為不可乃止秋八月減兩京課鈔時以鈔法不行令兩京市肆園場稅悉納鈔户部按月征之商民以為病或閉户不敢市易拔園蔬伐果木以避之給事中陳嘉猷餘姚人言兩京根本重地軍民尤宜加恤豈可當嵗歉之時興擾民之政縱使鈔法通而民已不聊生矣詔蔬果等暫免納鈔冬十月額森為阿拉所殺額森恃強日益驕恣荒於酒色阿拉求為太師不許且殺其二子阿拉怒遂率衆攻額森因數其三罪曰漢兒血在汝身托克托布哈王血在汝身烏梁海血亦在汝身天道好還今日汝當死額森無以應遂殺之未幾韃靼部保喇舊作索來今改後仿此復殺阿拉奪額森母妻並其玊璽求托克托布哈子穆爾格爾舊作麻兒可兒今改後仿此立之號小王子自是衛拉特遂衰額森弟及諸子往依哈密部衆分散而保喇與其屬瑪拉噶舊作毛里孩今改後仿此等皆雄視部中韃靼勢復熾額森本托歡太師子額森既亡數傳至博汗其世次不可考博汗生子曰烏林台巴丹太師遂統部落是為準噶爾之始按博汗舊作孛汗烏林台巴丹舊作烏林台巴靼今並改正十二月貶都給事中林聰為國子監學正聰遇事敢言為執政大臣所疾王文尤惡之會聰甥陳和為教官欲得近地便養文嗾御史黃溥劾聰下廷訊坐專擅選法當斬胡濙不肯署稱疾不朝者數日帝遣興安問疾濙曰老臣本無疾前日議事驚悸至今不寧耳安問何為曰諫官有小罪而欲殺之所以悸也安入告髙榖亦力言之聰遂得釋貶國子監學正乙亥六年春正月改工部尚書石璞字仲玉臨漳人為兵部以學士江淵為工部尚書淵在內閣好議論每為同官所抑意忽忽不樂會于謙以病在告詔推一尚書協理部事衆佯推淵淵欣然不辭屬商輅草奏陳循王文密示以石兵江工四字淵在旁不知也比詔下淵大失望二月雨木氷彌旬不解録囚時中外繫囚有至十餘年者帝以災變命法司審録之由是得減免死甚衆夏四月丙子朔日食韃靼遣使入貢禮部言迤北未有君長請量減賞賜詔從舊給之以慰其心五月帝禱雨南郊以兩畿及各省旱蝗也豫太監王誠等錦衣衛世職六月以宋儒朱子九世孫挺為翰林院五經博士世襲尋復以宋儒程頤後克仁周敦頤十二代孫冕俱為世襲博士秋七月徐有貞治沙灣決口成有貞至張秋鎮名在泰安府東阿縣西南運河所經與夀張陽榖二縣接界上治河三䇿一置水門略言水性可使通流不可使堙塞故漢武堙瓠子終弗成功漢明疏汴河踰年著績古言治水者甚衆獨樂浪王景所述冶水門之法可取今請依景法損益其間置閘門於水而實其底令髙常水五尺小則枸之以濟運大則疏之使趨海則有通流之利無堙塞之患矣一開支河略言凡水勢火者宜分小者宜合分以去其害合以取其利今黃河勢大故恆衝決運河勢小故恆乾淺必分黃水入運河則可去其害而取其利請度黃河可分之地開河一道使水大不至泛溢為害小亦不至乾淺以阻漕運一濬運河議既定督漕都御史王竑以漕渠淤淺滯運請急塞決口帝敕有貞如竑言有貞守便宜言臨清河淺舊矣非因決口未塞也漕臣但知塞決口為急不知秋冬雖塞來春必復決徒勞無益臣不敢邀近功詔從其言有貞乃治渠起張秋金堤注見前之首引而西南百里經濮陽濼博陵陂至夀張之沙河及東西影塘白嶺灣李􅕞凡五十里由李􅕞而上至竹口蓮花池抵火潴潭又五十里踰范暨濮又上而西北經澶淵以接河沁內倚古金堤以為固外恃梁山泊以為泄又置上下二閘以節宣之凡河流之旁出而不順者築九堰以障之堰各長萬丈崇三十有六尺厚什之柵木絡竹實之石而鍵以鐵凡五百五十餘日而工成賜其渠名廣濟由是河水不東衝沙灣而北出濟漕乃濬漕渠北至臨清南抵濟寧建閘於東昌者八水道以平先是有貞始興工有謂河決宜塞不宜疏者帝遣中使即問有貞出二壺而穿其一為五竅注水其中五竅者先涸中使還報乃決用其䇿及工將竣江淵請遣中官偕文武大臣督京軍五萬人往助役有貞言京軍一出日費不資今泄口已合決隄已堅但用沿河民夫自足集事乃止蓋自沙灣之決垂十年至有貞治之而決口始塞阿鄄曹濮間田出沮洳者百數十萬頃山東河患少息然亦會黃河南趨徐吕東流漸殺故有貞得奏厥功云有貞初築決口下木石則皆若無者有貞思數日忽悟曰此下殆有龍窟耶吾有以制之矣乃鎔鐵下之不移時而決口塞有貞事竣還帝厚勞之尋復命巡視漕河明年杕山東大水河隄多壞惟有貞所築如故冇貞乃修舊隄決口自臨清至濟寧水患悉平還朝帝召見奬勞有加進左副都御史太白晝見帝即位後太白常晝見至是御史倪敬字汝敬無錫人以災異頻仍請罷齋僧輟遊宴止興作疏入帝不懌未幾都御史蕭維禎考察其屬諭令去之遂黜敬為典史八月杖南京大理少卿廖莊字安止吉水人於闕下謫為驛丞復杖禮部郎中章綸御史鍾同於獄同死綸仍錮獄先一年莊在南京疏言臣曩見上皇遣使册封陛下每遇慶節必命羣臣朝謁東廡今上皇在南宫願陛下時時朝見或講論家法或商確治道嵗時令節命羣臣朝見以慰上皇之心又言太子者天下之本上皇諸子陛下之猶子也宜令親儒臣督書䇿以待皇嗣之生使天下臣民曉然知陛下有公天下之意疏入不報及是莊以事至京詣東角門朝見帝憶前疏大怒命杖八十謫定羌驛丞左右言事皆由鍾同倡實罪魁帝乃封巨梃就獄中杖同及綸各百同竟死綸死而復蘇繫如故是年刑科給事中徐正請間言事亟詔入乃言上皇臨御嵗久沂王嘗位儲副天下臣民仰戴不宜居於南宫宜遷置所封之地以絶人望别選親王子育之宫中帝驚愕大怒立叱出之命謫逺任已復得其淫穢事遂謫戍鐵嶺衛又御史高平亦言城南多樹事叵測遂盡伐之時盛署上皇常倚樹憩息及伐樹得其故大懼至天順復辟後正平皆伏誅冬十一月以方瑛為平蠻將軍討湖廣叛苖初庶人徽煠既廢其家人蒙能竄入苗中為亂事具前詐作妖書紏生苗三萬餘攻龍里注見前新化明守禦所今為長官司屬黎平府銅鼓明衛今為錦屏縣屬黎平府諸城官軍屢𠞰不能克至是帝命瑛為平蠻將軍尚書石璞總督軍務率京軍討之時諸苗酋多與能相應合衆攻平溪衛明置今為玉屏縣屬思州府都指揮鄭泰以火鎗擊能能被創走泰追斬之事在明年四月餘賊流劫武岡分陷藕塘諸寨勢尚熾已而瑛進駐沅州分三道一自清浪明衛今為清溪縣屬思州府一自平溪一自鎮逺會于賊境破鬼板等一百六十餘寨在明年十二月蒙能餘黨以次平丙子七年春二月皇后杭氏崩諡肅孝三月天鼓鳴夏四月慧星見慧東北見於胃其光芒或長數尺或長丈餘自是月至于六月凡兩月餘及十二月又復見于畢宿五月敕內外羣臣修省以星變也六月葬肅孝皇后河決開封秋七月兩畿山東河南大水自夏至秋大雨不止諸水並溢髙地丈餘以工匠蒯祥陸祥為工部侍郎蒯祥以木工陸祥以石工俱纍擢太僕寺少卿至侍郎仍督工匠時稱為匠官八月浙江江西湖廣旱九月賜大學士王文陳循子俱明年會試自設科以來輔臣子弟少登第者是秋文子倫循子瑛應順天鄉試被黜文循搆考官劉儼黃諫欲殺之臺省譁然髙穀言於帝曰大臣子與寒士競進已不可况又不安於命欲殺考官可乎帝命翰林院禮部覆閲貢士卷有優於倫瑛者有相等者亦有不及者勉徇二人意命其子一體會試而心薄之冬十一月蠲天下景泰以前逋賦十二月帝有疾罷明年元會御批厯代通鑑輯覽卷一百四

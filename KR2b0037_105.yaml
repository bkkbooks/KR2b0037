  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_105-1a, image: WYG0339/WYG0339-0378a.png}
body:
  text: 刑部主事張鼎河南信陽人言延綏甘肅寧夏三邊鎮撫不相統一宜推文武重臣一人總制詔從其請因設制府于固原即以越為之巡撫總兵而下並聽節制三邊設總制自此始三月罷總督兩廣右都御史韓雍中官黃沁鎮守廣西雍不為禮又自奉尊嚴三司皆長跪白事布政使何宜福清人副使張斆皆銜之會栁潯蠻陷懷集注見前兵部劾雍失機沁亦訐雍濫賞費財帝遣官往勘宜斆因釀成其罪帝命致仕去雍用兵兩廣躬親矢石軍門設銅鼓十儀節詳密禆將以下繩押無所假令行禁止冦盜寢息鎮守中官素驕恣亦惕息無敢肆既去粵人念其功立祠祀焉雍歸五年卒于家正德中追諡襄毅夏閠六月築邊墻初余子俊上言三邊惟延慶地平易利馳突冦屢入犯獲邊人為導徑入河套自是冦顧居內我反屯外急宜於沿邊築墻置堡况今舊界石所在多高山陡崖依山形隨地勢以成邊墻於事為便時尚書白圭以陜民方困奏緩其役既而冦入孤山堡在葮州府谷縣西北復犯榆林據河套嵗發兵征討卒無功八年秋子俊復言曰今征套士馬屯延綏者八萬芻茭煩內地若今冬冦不北去又須備來年軍資約八百二十五萬公私煩擾至此安得不變計請於明年春夏冦馬疲乏時役陜西運糧民夫給食興工期兩月畢事帝從之會王越襲虜紅鹽池事具前患少息子俊得一意興役東起清水營在府谷縣東北西抵花馬池注見前延袤千七百七十里鑿崖築墻掘塹其下連比不絶每二三里置敵臺崖寨備巡警又于崖寨空處築短墻橫一斜二如箕狀以膫敵避射凡築城堡十一邊墩十五小墩七十八崖寨八百十九役軍四萬人不三月而成墻內地悉分屯墾嵗得糧六萬餘石秋九月癸丑朔日食冬十月都督同知李文等進兵討土魯番不克引還李文等引兵至布隆吉爾川在今西安府淵泉縣西北流徑敦煌縣入于哈喇諾爾按布隆吉爾川舊作卜隆吉爾川今改諜報阿里集衆抗拒且結别部謀掠罕東赤斤二衛文等不敢進令二衛還守本土哈髙及默克里輝和爾之衆明史哈密傳哈密種落有三一曰回回一曰輝和爾一曰哈勒琿其頭目各不相統屬按哈拉琿舊作哈喇琿今改退居苦峪注見前文等亦引還肅州土魯番知中國不足憚遂久據哈密朝廷因令邊臣築苦峪城移和密衛于其地給米布賜榖種命哈商主國事焉事在十三年十二月罷採金時內費日侈帑金不足用命湖廣寶慶宋以邵陽郡置府元為路明仍為府今府屬湖南等郡開採嵗役五十五萬人死者無算僅得金三十餘兩乃從撫臣言已之乙未十一年春三月少保文淵閣太學士彭時卒諡文憲時與萬安同在閣帝怠于政大臣希得見安結中官戚畹上下壅隔時頗懷憂每上言或留中或下所司多不見用時悒悒不得志屢請疾在告至是力懇放還不許加少保未幾卒贈太師時立朝三十年孜孜奉國持正存大體有所論薦不使人知燕居無惰容非其義不取有古大臣風以吏部左侍郎劉珝字叔溫夀光人禮部右侍郎劉吉字祐之博野人並兼翰林學士入內閣預幾務珝先以舊宫僚晉官直經筵日講每進講反覆開導詞氣侃侃劉定之稱為講官第一帝亦重愛之入閣後每呼東劉先生珝性疏直吉則多智數與萬安比乾清宫門災夏五月始召見皇子子西內帝自悼恭太子薨常鬱鬱不樂一日召太監張敏櫛髮照鏡嘆曰老將至而無子敏伏地曰萬嵗已有子也帝愕然曰安在敏叩頭對曰奴言即死萬嵗當為皇子主于是太監懷恩髙密人頓首曰敏言是皇子潛養養西內今已六嵗匿不敢聞耳帝大喜即日幸西內遣使迎皇子紀妃拘皇子泣曰兒去吾不得生兒見黃袍有鬚者即兒父也衣以小緋𫀆乘小輿擁至階下髮披地時胎髮猶未剪走投帝懷帝置之膝撫視良久悲視泣下曰吾子也類吾使懷恩赴內閣具道其事羣臣皆大喜懷恩並傳帝意欲宣示外廷商輅曰當降敕禮部以定名為辭于是廷臣相率稱賀帝即命皇子出見廷臣越數日帝復召閣臣問曰皇子既出將何以處之輅頓首曰陛下踐阼十年儲副未立天下引領望久矣當即立為皇太子安中外心帝頷之遂定名祐樘頒詔中外六月皇子母紀氏暴卒先是帝召見皇子留宫中而紀妃仍居西內大學士商輅恐有他患而難以顯言偕同官上諫曰皇子聰明岐嶷國本攸繫重以貴妃保護恩踰已出但外議謂皇子母因病别居久不得見宜移就近所俾母子朝夕相接而皇子仍藉撫育于貴妃宗社幸甚紀妃遂移居永夀宫數召見萬貴妃日夜怨泣曰羣小紿我至是妃暴薨或曰萬貴妃遣使賜死或曰自縊太監張敏懼亦吞金死秋八月浚通惠河通惠河即元大通河郭守敬所鑿事具前亦名潞河洪武時廢永樂中修治復湮前五年漕運總兵明史職官志漕運總兵官一人統領官軍專督漕運楊茂言自張家灣在通州南為南北水陸要道舍舟車轉至都下顧值不資通州至京舊有通惠河水道石閘尚存修閘瀦水用小舟剝運便帝遣尚書楊鼎字宗器陜西咸寧人相度上言舊閘二十四通水行舟但元時水在宫墻外舟得入城今水由皇城金水河出故道不可復行請濬玉泉注見前龍泉及月兒栁沙諸泉水使入西湖在宛平縣玉泉山下水經注西湖渌水澄淡川亭望逺為遊矚之勝所閉分水青龍閘引諸水從髙裝河注見前分其半由金水河出餘從都城外濠流轉會正陽門併流大通橋閘河隨旱潦啓閉則糧艘可近倉甚便帝善其議以災異工未及舉至是命平江伯陳鋭等督漕卒疏浚明年六月訖工濬泉三增閘四漕舟稍通是時于元所引昌平白浮諸泉俱遏不行獨引一西湖又僅分其半河窄易盈涸不二載淺塞如故門都勒伽嘉色凌遣使入朝初伽嘉色凌以女妻們都埒故立為汗及是俱遣使入貢已而伽嘉色凌專恣日甚們都埒部陀羅該舊作脫羅干伊斯瑪音舊作亦思馬音今並改後倣此等謀殺之未幾們都亦死諸強酋相繼略盡邊人稍得息肩九月丁未朔日食冬十一月立子祐樘為皇太子時皇太后居仁夀宫語帝曰以兒付我太子遂居仁夀一日貴妃召太子食太后謂曰兒去無食也太子至貴妃治食曰已飯進羮曰疑有毒貴妃曰是兒數嵗即如是他日魚肉我矣因恚成疾以朱英字時傑桂陽人總督兩廣軍務自韓雍大征諸蠻以來將帥喜邀功利俘掠名為雕勦英至鎮以寧靜飭約將士毋得張賊聲勢妄請用師招撫猺獞效順者定編户給復三年于是馬平隋縣今屬柳州府陽朔亦隋縣以陽朔山得名今屬桂林府蒼梧注見前諸縣蠻悉望風附而荔波明洪武中置縣今屬慶逺府賊李公主有衆數萬久負固亦遣子納欵為置永安州本唐蒙州今州屬平樂府處之俾其子孫世為吏目自是歸附日衆凡為户四萬三千有竒口十五萬有竒帝甚嘉之十二月改諡郕戾王為景皇帝初荆門州訓導髙瑶字庭堅閩縣人上言正統己巳之變先帝北狩宗社危如一髮使非郕王繼統國有長君則禍亂何由平鑾輿何由返六七年間海宇寧謐厥功不小逮先帝復辟貪天功者遂加厚誣使不得正其終節惠躋祀未稱典禮望敕禮官追加廟號以盡親親之恩章下廷議久不決左庶子黎淳湖廣嶽州人言昌邑既廢不聞復為漢某帝更始既廢不聞復為漢某王瑶此言有死罪二一誣先帝為不明一陷陛下于不孝此必有小人主之者不然彼草茅疏逺安敢妄言帝曰景泰往事朕未嘗介意淳又欲獻媚希恩邪切責之議亦遂寢其後御史楊守隨字維貞鄞人亦言郕王有功社稷請改諡帝下廷議大學士輅極言當復至是乃下詔曰朕叔郕王踐阼戡亂保邦姦臣讒搆請去帝號先帝旋知其枉深懷悔恨以次抵諸姦于法不幸上賓未及舉正朕敦念親親用成先志郕王可仍舊皇帝號尋上尊諡曰恭仁康定景皇帝令所司修飾陵寢丙申十二年春正月南京隂霾地震敕羣臣修省二月己亥朔日食夏五月命副都御史原傑撫治荆襄流民初白圭既平劉通荆襄流民屯結如故通黨李原等冦掠南漳內鄉注俱見前諸縣帝命項忠討之忠遣人入山招諭流民先後來歸者九十萬原等亦以次就擒忠户選一丁充戍湖廣邊衛餘令歸籍給田民有自洪武中占籍者有司一切驅迫不前即殺之其發戍者舟行多疫死言官劾忠妄殺尚書白圭亦言流民宜隨在著籍帝皆不聽至是流民復聚朝廷以為憂祭酒周洪謨字堯弼長寧人著流民説略言東晉時廬松之民流至荆州乃僑置松滋縣于荆南舊唐書地理志荆州松滋本漢縣名屬廬江郡晉時松滋人避亂至此乃僑立松滋縣因而不改陕西雍州之民流聚襄陽乃僑置南雍州于襄西其後松滋遂𨽻于荆州南雍遂併于襄陽今襄陽府南北朝時為南雍州今當增置郡縣聽附籍為編氓可實襄鄧户口都御史李賓順義人善其説聞于帝帝然之遂命傑出撫傑遍歷山溪宣朝廷德意諸流民欣然附籍于是大會湖廣河南陕西撫按官籍之得户十一萬三千有竒口四十三萬八千有竒其初至無産及頑梗不率者驅還其鄉附籍者用輕則定田賦民大悅因相地勢以襄陽所轄鄖縣舊曰鄖鄉元改鄖縣明初屬均州居竹即竹山明初省尋復置房即房縣注見前上津西魏縣今省商即商州注見前洛即洛南隋縣今屬商州諸縣中道路四達且去府治逺山林深阻將吏鮮到猝有盜賊難遙制乃拓其城置鄖陽府以縣附之置湖廣行都司增兵設戍析竹山置竹溪析鄖置鄖西析漢中之泃陽置白河與竹山上津房咸𨽻新府又于西安增山陽南陽增南召桐柏汝州增伊陽各𨽻其州府制既定薦鄧州知州吳逺為鄖陽知府諸縣皆擇鄰境良吏為之流人得所四境乂安洵陽漢縣今與白河俱屬興安州山陽今屬商州吳逺安福人將還以地界湖廣河南陜西事無統紀因薦御史吳道宏宜賔人自代詔即擢道宏大理寺少卿撫治鄖陽襄陽荆州南陽西安漢中六府鄖陽有撫治自此始傑以功進右都御史踰年卒部民為立祠秋七月黑眚見有物金睛修尾狀如大貍負黑氣夜入民家至則人昏迷遍城驚擾男女露處帝常朝奉天門侍衛見之而譁頃之乃定帝于禁中祭告天地以四事自責一用度不節二工役勞民三忠言不聞四仁政不施大學士商輅疏弭災八事曰番僧國師法王毋濫賜印章四方常貢外勿受玩好許諸臣直言分遣部使録囚省寃獄停不急營造實三邊軍儲守沿邊關隘設雲南巡撫帝優詔褒納九月令太監汪直刺事妖人李子龍以符術結太監韋舍私入大內事發伏誅帝心惡之鋭欲知外事太監汪直故大藤峽猺獞初給事萬妃于昭德宫遷御馬監為人便黠帝因令易服將校尉一二人密出伺察人莫知也獨都御史王越與結歡冬十月京師地震十一月四川巡撫張瓚字宗器孝感人討灣溪蠻寨名地在今平越府黃平州重安廢司境蠻破之尋命瓚兼督松潘等諸軍務討叛番先是播州致仕宣慰楊輝言所屬天壩干蠻寨名地在今遵義府播州廢司境地及重安長官司所轄灣溪等寨屢被生苗竊據請王師進討詔瓚親至播州諭還侵地不服即征之事在十年至是瓚督兵攻敗諸苗奏設安寧宣撫司即以輝子友為之詔從其請會松潘畨冦邊西鄙繹騷令瓚兼督松茂安綿建昌諸軍務瓚至軍審度形勢令副總兵堯彧軍松潘參將孫皓軍威疊為夾攻計修河西舊路作浮梁治月城避偏橋棧道軍獲安行轉餉無阻既而瓚自率兵攻白草壩番寨在龍安府平武縣西南唐吐蕃遺種最為強悍等數大寨斬獲無算徇茂川疊溪所過降附賊魁皆殱先後破滅五十二寨其他一百五寨悉獻馬納欵諸番盡平留兵戍要害乃班師在十四年大學士商輅等進續資治通鑑綱目初景泰中詔纂宋元綱目會英宗復辟事遂寢及帝即位復命商輅等修之至是書成輅等奉表以進凡二十七卷帝為之序以户部侍郎王恕巡撫雲南大學士商輅先已請設雲南巡撫又以鎮守中官錢能縱恣不法議遣大臣有威望者往鎮壓之乃以恕為右都御史以行先是能遣指揮郭景奏事京師詐言安南捕盜兵入境帝即命景齎敇戒約之舊制使安南必由廣西而景直自雲南往能因遺安南王玉帶綵繒珍竒諸物紿其貢使改道雲南邊吏格之不得入能又遣景交通干崖注見前孟密亦曰猛密本𨽻木邦土司後為思柄所竊據事詳後諸土官納其金寶至是恕皆亷得之遣騎執景景懼自殺因劾能私通外國及諸貪暴不法狀帝宥能而致其黨九人于法恕上言昔交址以鎮守非人致一方陷沒今日之事殆又甚焉陛下何惜一能以安邊徼能大懼急屬貴近請召恕還恕遂改掌南京都察院事在明年能事立解恕居雲南九月威行徼外黔國公沐琮以下咸惕息奉命疏凡二十上直聲聞天下沐琮宇廷芳昻之孫南京大雷雨丁酉十三年春正月置西厰以太監汪直領之初成祖置東厰令宦官訪緝逆謀大姦與錦衣衛均權勢至是尚銘領東厰又别設西厰刺事以汪直督之所領緹騎倍東厰勢逺出衛上時南京鎮監覃力明進貢還以百艘載私鹽武城典史詰之力明擊折其齒射殺一人直廉得以聞帝謂直能摘姦益近幸直直乃任錦衣百户韋瑛為心腹屢興大獄寃死者相屬自諸王府邊鎮及南北河道所在校尉羅列民間鬬詈雞狗瑣事輒置重法人情大擾大學士商輅率同官上言陛下委聽斷于直直又寄耳目于羣小如韋瑛輩皆自言承密旨得專刑殺擅作威福賊虐良善陛下若謂摘姦禁亂為有益則前此數年何以帖然無事且曹欽之變由逯杲刺事激成可為懲戒自直用事卿大夫不安其職商賈不安于途庶民不安于業若不亟正天下安危未可知也帝得疏愠曰用一內豎何遽危天下誰主此奏者命太監懷恩覃吉至閣詰責輅正色曰朝臣無大小有罪皆請旨逮問直擅抄沒三品以上京官大同宣府邊城要害守備俄頃不可缺直一日械數人南京祖宗根本地直擅收捕留守大臣諸近侍在帝左右直輒易置直不去天下安得無危輅等同心一意為朝廷除害無有先後兵部尚書項忠亦倡九卿劾之帝不得已令直歸御馬監調韋瑛邊衛散諸旗校還錦衣中外大悅然帝眷直不衰仍令密出外刺事御史戴縉南海人者性險躁干進探知帝意乃假災異建言頌直功德遂詔復開西厰于是直焰愈熾夏六月斥兵部尚書項忠為民謹身殿大學士商輅引疾歸初忠倡九卿劾汪直既為奏令郎中姚璧浙江椆廬人持詣諸尚書署名先詣吏部尹旻山東厯城人郤曰奏出項尚書兵部宜為首璧對曰公六卿之長也旻怒曰今日乃知六卿長邪既署名即遣報直直銜之搆忠下獄初錦衣千户吳綬從忠討荆襄盜忠劾其罪綬深恨之及是西厰復設直以綬為腹心綬遂挾前憾誣忠受太監黃賜請屬用劉江為江西都指揮司詔者庭鞫之忠抗辨不少屈然衆知出直意無敢為之白遂斥為民直又譖輅納指揮楊協金輅乞罷聽歸戴縉乞令兩京大臣自陳欲以傾直所不悅者于是大臣以次陳免者數十人士大夫益俯首事直矣秋八月錦衣衛執工部尚書張文質昌黎人下獄東厰官校發雲南百户左升私事詞連掌通政使工部尚書張文質錦衣衛遂執下獄帝不知也左通政何琮浙江仁和人等以掌印請帝乃知而釋之九月京師地震戊戌十四年春二月皇太子出閣就學太子雖出閣老奄覃吉朝夕侍左右口授四書章句及古今政典帝賜太子莊田勸勿受曰天下皆太子有也太子偶從內侍讀佛經吉入太子曰老伴來矣急手孝經時太子方九嵗端本正始吉有力焉三月復開遼東馬市遼束巡撫陳鉞河間獻縣人請開三衛馬市通事劉海姚安肆侵牟朵顔諸部懷怨擾廣寧不復來市尚書王越請令參將布政司各一員監之母有所侵克遂治海安二人罪尋令海西朵顔三衛入市以互市之稅充撫賞夏六月太白嵗星同晝見汪直行遼東邊遼東巡撫陳鉞以掩殺冒功激變直欲自往定之而帝命馬文升字負鈞州人往安撫直不悅文升馳至鎮宣璽書撫慰無不聽撫者事定直欲攘其功請于帝挾其私黨王英日馳數百里箠撻守令各邊都御史服櫜鞬迎謁供帳百里外至遼東陳鉞郊迎蒲伏厨傳尤盛左右皆有賄直大悅至開原再下令招撫文升乃推功與直直內慚心益不喜而陳鉞益諂事直日夜譛文升思有以中之秋九月河決開封壞護城堤五十丈河南巡撫李衍直𨽻真定人上言河南纍有河患皆下流壅塞所致宜疏開封西南新城隄下抵梁家淺舊河口以泄杏花營注見前上流又自八角河口即八字溝在陳州府淮寧縣東南直抵南頓注亦見前分導散漫以免祥符鄢陵睢陳歸德之災乃敇衍酌行之明年正月遷滎澤縣城于河北以避水患而開封隄不久即塞己亥十五年春正月修開國功臣墓無後者置守冢一人夏四月以方士李孜省南昌人為太常寺丞孜省以江西吏就選京師贓事發匿不歸時帝好方術孜省乃學五雷法厚結中官梁芳錢義以符籙進中旨授太常寺丞御史楊守隨劾孜省贓吏不宜典祭祀帝改為上林苑監丞然寵幸日盛許密封奏請益獻淫邪方術與梁芳等表𠂻為姦干亂政事五月下兵部侍郎馬文升于獄謫戍汪直勘事遼東還劾文升行事乖方逮下獄謫戍重慶衛并詰責諸言官容隱不劾奏廷杖李俊字子英岐山人等五十六人庚子十六年春二月王越襲韃靼于威寧海子在今正黃旗察哈爾南一統志其西南舊有威寧城金時故縣也破之時汪直怙恩用事思以邊功自樹王越朱永附之會延綏守臣奏冦渡河入靖虜注見前越勸直奏請出師詔以永為平虜將軍直監軍越提督軍務越説直令永率大軍由南路已與直將輕騎循塞垣而西至大同聞敵帳在威寧海子則盡選宣大兩鎮兵二萬出孤店關名在大同縣東北潛行至貓兒莊注亦見前分數道進值大風雨雪晦冥進至威寧冦猶不覺掩擊破之斬首四百餘級獲馬駝牛羊六千永所出道迂不見敵無功由是越封威寧伯直增祿三百石辛丑十七年夏四月旱風霾命司禮監同法司録囚命太監懷恩同三法司録囚自是每五嵗內臣審録以為常謂之大審南京則命內守備行之初成祖定熱審之例仁宗會閣臣會審英宗命三法司同公侯伯朝審至帝罷不行而內臣大審所矜疑放遣嘗倍于熱審于大理寺為三尺壇中坐齎敕張蓋三法司左右坐御史郎中以下奉牘立唯諾趨走惟謹三法司有所出入輕重俱視中官意不敢忤五月冦犯宣府汪直王越率師禦之秋七月雷震郊壇承天門冬十月以道士鄧常恩為太常卿壬寅十八年春二月罷西厰小中官阿丑工俳優一日于帝前為醉者謾罵狀人言駕至謾如故言汪太監至則避走曰今日但知汪太監也又為直狀操兩鉞趨帝前曰吾將兵仗此兩鉞耳問何鉞曰王越陳鉞也帝欣然而笑稍稍悟會東厰尚銘獲賊得厚賞直怒其不先告已銘懼乃廉得其所泄禁中祕語奏之且盡發王越交通不法事帝心始惡直時直越方在宣府以敵退請班師不許陳越居兵部代為請帝切責之兩人始懼至是悉召還京營將士移直越鎮大同寵日衰言者交章請罷西厰許之尋罷陳越調王越鎮延綏降直南京御馬監罷西厰不復設中外欣然夏四月哈商復哈密城哈商寄居苦峪十年至是率所部兵萬人糾罕東赤斤二衛夜襲哈密城破之伊蘭遁乘勢連復八城遂還居故土帝喜進哈商左都督六月韃靼冦延綏官軍擊敗之伊斯瑪音入冦延綏指揮劉寧字世安山陽人敗之于塔兒山在葭州西北上有小塔因名巡撫何喬新字廷秀文淵之子指揮同知支玉山西聞喜人敗之于天窊梁中觜在山西保德州河曲縣西北千户白道山敗之于木瓜園在葭州府谷縣北總兵許寧敗之于三里塔在榆林府榆林縣北參軍董升周璽字廷玉遷安人敗之黑石崖在保德州西南下臨黃河時冦扼于邊墻不得出遂大衄秋八月大水衛漳滹沱並溢又河南霪雨自六月至于是月民居漂沒者無數淹死數萬人癸卯十九年夏六月韃靼冦大同官軍敗績小王子伊斯瑪音既死其入冦者復稱小王子率兵三萬冦大同連營五十里殺掠人畜數萬總兵許寧知敵勢盛欲持重俟隙乃斂兵守而遣别將劉寧董升與周璽相犄角寇大掠焚代王别堡王趨戰使衆哭于轅門寧憤與巡撫郭鏜恩縣人等營城外寇以十餘人為誘太監蔡新部騎馳擊寧將士爭赴之遇伏大敗死者千餘人會璽等援至寇乃退尋復入寧等掩其敗以捷聞敵既得利長驅入順聖川宣府巡撫秦紘總兵周玉力戰郤之已而巡按程春震發寧敗狀寧與鏜新俱下獄鏜降六官新以初任降三官寧降指揮同知間住玉順聖川在宣化府西寧縣東秦紘字世纓單人周字廷壁滁人程春震雲夢人秋八月汪直以罪貶王越死言官交劾汪直王越交結罪詔從末減直降奉御越奪誥劵編管安陸州三子以功廕得官者皆削籍並斥直黨右都御史戴縉為民後韋瑛亦坐他事誅人皆快之然直竟良死九月召陳獻章字公甫新會人為翰林檢討尋乞歸獻章以舉人家居讀書晝夜不輟廣東布政使彭韶總督朱英交章薦乞以禮徴聘吏部尚書尹旻謂獻章向聽選京師非隱士比安用聘檄召至京令就試吏部獻章稱疾不試乞歸奉母乃授檢討以歸自是屢薦不起獻章之學以靜為主其教學者但令端坐澄心于靜中養出端倪或勸之著述不答其所居曰白沙村學者因稱白沙先生旌表僧繼曉江夏人母朱氏繼曉以祕述因梁芳進封國師日誘帝為法事建大永昌寺于西市逼徙居民數百家縻帑數十萬其母朱氏本娼家女也繼曉自陳乞旌詔不必勘覆旌其門甲辰二十年春正月京師地震夏六月以思柄為孟密宣慰司孟密雲南土司本邦部內地也初木邦宣慰使罕揲法死其孫罕落法襲職罕揲法有女曰曩罕弄自以分尊不受節制襲據公署自稱天娘子其子思柄自稱宣慰使竊據孟密與木邦二分兵侵掠黔國公沐琮以聞委三司官往撫曩罕弄驕蹇不服且欲外結交趾逼脅木邦八百諸部琮等復奏聞兵部尚書張鵬鵬于成化初復官纍進尚書主用兵下廷臣議皆以孟密與木邦仇殺並未侵邊境宜撫因遣御史程宗等常熟人往撫事在十八年曩罕弄畏鄰境不平遣人從間道至京因進金寶乞别立孟密安撫司開設治所直𨽻布政司下內閣議萬安欲許之劉珝劉吉曰孟密乃木邦之叛屬欲許之是周天子命三晉大夫為諸侯也土官誰不解體安曰不從則當伐之往日麓川之敗不可不戒珝對曰何以伐為但令守臣嚴邊備而敕鄰境土官合兵蹙之彼奚能為事將寢而程宗受安風旨復奏言曩罕弄與木邦仇殺已久勢難再合乞如前請遂設孟密安撫司以思柄為宣慰使思柄先後奪據木邦地二十七所自是諸部擾攘侵奪中國用兵且數十年旱京畿山東湖廣陕西河南山西俱大旱道殣相望秋九月乙酉朔日食冬十月下刑部員外郎林俊字待用莆田人及都督府經歷張黻吉水人于獄尋釋之並謫官俊上疏請斬妖僧繼曉并劾太監梁芳罪帝大怒下俊詔獄考訊後府經歷張黻救之並下獄帝欲誅二人司禮太監懷恩力爭帝怒投以硯曰若助俊訕我恩免冠伏地號哭帝叱出恩遣人告鎮撫司曰汝曹諂芳傾俊俊死汝曹何以生遂稱疾不起帝亦尋悟獄遂解俊謫雲南姚州注見前判官黻師宗本蠻地元置州今州屬澄江府知州時言路久塞兩人直聲震都下為之語曰御史在刑曹黃門出後府乙巳二十一年春正月甲申朔星隕有聲詔羣臣言闕失申刻有光自中天墜化白氣曲折上騰踰時復有赤星如碗自中天西行轟然如雷震帝頗懼詔羣臣陳闕失于是吏部尚書尹旻等論傳奉官過多吏科給事中李俊率科臣上疏略曰今之弊政最大且急者曰近幸千紀也大臣不職也爵賞太濫也工役過煩也進獻無厭也流亡未復也天變之來率由于此夫內侍之設國初皆有定制今或一監而叢十餘人一事而參六七輩或分布藩郡享王者之俸或總領邊疆專大將之㩲援引憸邪投獻奇巧司錢穀則法外取財貢方物則多端責賂殺人者見原僨事者逃罪如梁芳韋興陳喜輩不可枚舉惟陛下大施剛斷無令干紀奉使于外者悉為召還用事于內者嚴加省汰則近幸戢而天意可回矣今之大臣非夤緣內臣則不得進其既進也非憑依內臣則不得安此以財貿官彼以官鬻財無怪其賂受四方而計營三窟也如尚書殷謙張鵬侍郎艾福杜銘尚書李本侍郎劉俊皆老而懦尚書張鎣大理卿田景㿩南京尚書張瑄侍郎尹直皆清論不愜惟陛下大加黜罰勿為姑息則大臣知警而天意可回矣夫爵以待有德賞以待有功今或無故而爵一庸流或無功而賞一貴幸方士獻煉服之書伶人奏曼衍之戲掾吏胥徒皆叨官祿俳優僧道亦玷班資一嵗而傳奉或至千人數嵗而數千人矣數千人之祿嵗以數十萬計是皆國之租稅民之膏脂不以養賢才乃以飽姦蠹誠可惜也如李孜省鄧常恩輩尤為誕妄此招天變之甚者乞盡罷傳奉官毋令汚玷朝列則爵賞不濫而天意可回矣都城佛剎迄無寧工京營軍士不復遺力如國師繼曉假術濟私糜耗特甚中外切齒願陛下內惜資財外惜人力不急之役姑賜停罷則工役不煩而天意可回矣近來規利之徒率假進奉為名或録一方書市一玩器購畫圖製簪珥所費不多獲利十倍願陛下留府庫之財為軍國之備則進獻息而天意可回矣陜西河南山西赤地千里尸骸枕藉流亡日多萑苻可慮願陛下體天心之仁愛憫生民之困窮追録貴幸鹽課暫假造寺資財移賑飢民俾苟存活則流亡復而天意可回矣殷謙字文撝涿州人杜銘成都金堂人李本四川富順人劉俊河南新錦人張鎣華亭人田景㿩保定人奏入帝優詔答之降左通政李孜省上林丞太常卿鄧常恩本寺丞繼曉革國師為民斥罷傳奉官五百餘人中外大悅時兩京諸臣爭應詔陳言給事中盧瑀鄞人御史汪奎字文燦婺源人主事張吉字克修餘干人南京員外郎彭綱字性仁清江人等言尤愷直帝以方修省不罪然心忌之密令尹旻出俊瑀等且書六十人姓名于屏俟奏遷則貶逺惡地未幾俊瑀等相繼貶斥或以他事下吏孜省常恩等仍復官有寵愈甚三月泰山震太監梁芳韋興糜帑藏為竒技淫巧結萬貴妃歡纍朝金七窖俱盡帝一日視內藏詰芳及興曰糜費帑金實由汝二人興不敢對芳曰建顯靈宫及諸祠廟為陛下祈萬年福耳帝曰吾不汝瑕後之人將與汝計矣芳大懼遂説貴妃勸帝廢太子而立興王名祐杬帝第四子時興王猶未封此言興王乃史臣追敘之文太監懷恩固爭帝不懌斥居鳯陽會泰山連震占者謂應在東宫帝心懼寢其事夏四月以康永韶字用和祁門人為禮部右侍郎永韶故為御史有直聲謫知縣中旨召還進太常少卿掌欽天監時陜西大飢永韶言今春星變當有大咎賴秦民飢死足當之誠國家無疆福帝悅擢禮部右侍郎秋八月己卯朔日食九月劉珝罷萬安與南人相黨附珝及尹旻王越又與北人為黨互相傾軋珝自以宫僚舊臣遇事無所回護林俊下獄珝于帝前解之李孜省輩左道亂政故動搖東宫珝密疏諫帝皆不悅珝常斥安負國無恥安忿日夜思中珝汪直寵衰安揣知西厰可罷邀珝同奏珝辭不與安遂獨奏之隂使人訐珝與直有連帝疑未發會珝子鎡縱誕日邀妓狎飲安乃使人為劉公子曲增飾穢語雜教坊院本奏之帝怒遣中官持手封書一函詣閣乃人訐珝書安與劉吉佯驚救且言當令乞休以全始終翌日珝遂具疏乞休其實排珝使去者安吉兩人也冬十一月召馬文升為兵部尚書汪直敗後文升復官都御史巡撫遼東尋總督漕運及是召長兵部李孜省方怙寵文升時有所言孜省深嫉之十二月以彭華安福人時族弟為吏部左侍郎兼翰林學士入內閣預機務華深刻多計數善伺人短與萬安李孜省相結得入閣素嫉尹旻與安等伺得旻子侍講龍諸隂事下龍詔獄執訊午門多所株連侍郎李裕黎濟皆得罪康永韶亦斥為民李裕字資德豐城人旻致仕去龍除名由是人皆畏華而惡之踰年以風疾罷丙午二十二年秋九月罷南京兵部尚書王恕出馬文升代之恕先後應詔陳言凡五十餘奏皆力阻權幸天下傾心慕之時為謡曰兩京十二部獨有一王恕于是貴近皆側目帝亦頗厭苦之是年起用傳奉官恕諫尤切帝愈不悅令恕致仕調文升南京以李孜省譖也朝野大駭逮廣東布政使陳選字士賢臨海人道卒選于天順中巡按江西盡斥貪殘吏成化初督學河南汪直出巡御史以下皆拜謁選獨長揖久之進按察使決遣輕繫數百人重囚多所平反囹圄為空治尚簡易獨于贓吏無所假厯廣東左右布政時詔減省貢獻而市舶中官韋眷肆橫奏乞均徭户六十人添辦方物選持詔書爭帝命與其半由是怒選番人馬力麻詭稱蘇門答剌使臣欲入貢私市易眷利其厚賂將許之選聞立逐之番禺令髙瑶發眷通番事沒其資巨萬入官都御史宋旻淳安人不敢詰選移檄奬之且聞于朝眷恨選益甚遂誣奏選瑶朋比為貪墨遣刑部郎中李行新喻人及巡按御史徐同愛常山人勘之眷賄選所黜吏張褧令誣證褧堅不從拷掠無異辭行等畏眷竟以誣獄上與瑶俱被逮士民數萬號泣遮留使者辟除乃得出至南昌疾作行阻其醫藥竟卒張褧聞選死哀悼乃上書曰竊見故罪人選孑處羣邪之中獨立衆憎之地太監韋眷通番敗露知縣瑶按法持之選移文奬勸以激貪懦固賢監司事也都御史宋旻及同愛納賄養姦致眷橫行胸臆穢滅清流勘官李行頤指煆煉竟無左證臣厚本小吏詿誤觸法被選黜罷實臣自取眷謂臣憾選賂噉臣臣雖胥役敢昧素心行等逮臣致理拷掠百端臣忍死籲天終無異口行等乃文致其罪選故剛直不堪屈辱憤悶旬日身嬰重疾行等幸其隕身阻其醫療訖命之日密走報眷小人佞毒一至于此臣擯黜罪人秉耒田野百無所圖誠痛忠良銜屈而為聖朝纍也不報選後追諡忠愍遣刑部侍郎何喬新勘播州土司訟播州宣慰使楊輝欲立庶子友為嗣長官張淵阿順之安撫宋韜等諫乃止輝致仕嫡子愛嗣輝與淵謀割地授友巡撫張瓚受輝賂為奏設安寧宣撫司以友為之事具前至是輝死友誣愛謀逆聞于朝遣喬新往勘將行請曰楊氏主播州五百餘年蠻夷服從久矣歷代寬以文法蓋治之以不治也今但宜二人面質真偽無令驚疑喬新至盡得其始末白愛誣奪友官安置他府斬張淵播州遂安以尹直為户部左侍郎兼翰林學士入內閣預機務直官南京八年鬱鬱不得志以李孜省力召為兵部侍郎至是取中旨入閣丁未二十三年春正月皇貴妃萬氏卒妃服用器物窮極僭擬中官佞幸錢能覃勤汪直梁芳韋興輩皆假貢獻苛斂民財傾竭府庫以結妃歡四方進奉異物皆歸之父兄弟姪皆授都督指揮千百户等官性嫉妬掖庭御幸有身飲藥傷墜者無數至是卒帝震悼輟朝七日諡曰恭肅端慎榮靖皇貴妃二月以李孜省為禮部右侍郎孜省中廢復用益作威福搢紳進退多出其口前年冬擢通政使至是進禮部掌通政如故秋七月封子五人為王祐杬興王已見前祐楠帝第五子岐王後之藩德安祐檳帝第六子益王後之藩建昌祐楎帝第七子衡王後之藩青州祐橒帝第八子雍王後之藩衡州八月帝崩先是帝不豫命皇太子視朝于文華殿及是崩九月太子祐樘即位是為孝宗赦以明年為𢎞治元年太監梁芳都督萬善萬貴妃弟及李孜省等有罪減死謫戍言官劾孜省及其黨鄧常恩趙玉芝番禺人交結太監芳外戚喜等諸不法事論死上以宅憂謫芳南京少監喜指揮使孜省常恩玉芝等戍陕西邊冬十月罷傳奉官奪僧道封號帝用科道言降黜傳奉官通政任傑侍郎蒯綱指揮僉事王榮等二千餘人罷遣禪師真人等二百四十餘人法王佛子國師等七百八十餘人並追誥敕印仗遣歸本土尊皇太后為太皇太后皇后為皇太后立皇后張氏興濟人先是孝穆太后薨即紀妃內廷藉藉指萬貴妃帝即位魚臺丞徐頊疏請上母妃尊諡遷葬並追究薨故廷臣議逮萬氏親下錦衣鞫治萬安懼不知所出曰我久與萬家不往來劉吉亦有連自危與尹直共擬旨寢之帝仁厚恐傷先帝意不問安吉得無事帝生西宫時吳后往來保抱惟謹帝命服膳皆如太后禮萬安罷帝于宫中得疏一小篋皆論房中術末署曰臣安進帝令太監懷恩持至閣曰此大臣所為邪安愧汗伏地不能出聲庶吉士鄒智字汝愚合州人御史薑洪字希範廣德人文貴湘鄉人交章列安罪狀復令恩就安讀之安數跪起求哀無去志恩直前摘其牙牌曰可去矣始惶遽歸第乞休去安時年七十餘尚于道上望三台星冀復用云追諡母紀氏為孝穆皇太后帝悲念太后遣人求太后家先是太后在宫中嘗自言家賀縣姓紀幼不能知親族也于是有妄冒太后戚畹以希寵貴者十數輩後訪得實皆謫戍而太后家終不可得其後禮臣上言可倣太祖封徐王故事定擬太后父母封號立祠桂林致祭帝詔曰孝穆太后早棄朕躬每一思念惄焉如割初謂宗親尚可旁求寧受百欺冀獲一是卿等謂歲久無從物色請加封立廟以慰聖母之靈皇祖既有故事朕心雖不忍又奚敢違遂封后父慶元伯后母伯夫人立廟桂林府有司歲時祀焉大學士尹直撰册文有云覩漢家堯母之門增宋室仁宗之慟帝燕間念誦輒欷歔泣下也以禮部侍郎徐溥字時甫宜興人兼翰林學士入內閣預機務尋進禮部尚書兼文淵閣大學士溥在閣務守成法鎮以安靜嘗言國家法度所以惠元元者備矣但患不能守耳十一月召王恕為吏部尚書以馬文升為左都御史時恕致仕家居言官論萬安者輒薦恕禮部監懷恩亦素重之力勸帝故即家起用之尹直罷以劉健字希賢洛陽人為禮部侍郎兼翰林學士入內閣預機務健自為編修即練習典故有經濟志入閣後正色無所依違以身任天下之重逮梁芳李孜省下獄十二月孜省死于獄芳等既謫戍遇赦當還印綬監太監蔣琮大興人言芳等罪大不當赦復逮下獄孜省不勝搒掠死常恩玉芝坐交結近侍律斬妻子流三千里詔免死仍徙邊芳卒廢死葬茂陵在昌平州聚寶山東少南諡曰純皇帝廟號憲宗明史贊曰憲宗踐阼之後上景帝尊號恤于謙之寃時際休明朝多耆彥蠲賦省刑閭里充足仁宣之治庶幾復見顧以任用汪直盜竊威柄為所蔽惑久而後覺宦寺之禍固可畏哉禮部侍郎邱濬進大學衍義補濬以真德秀大學衍義止述修身齊家事而治國平天下闕焉乃博採羣書以補之至是表上其書帝稱善進濬尚書賚金帛下詔刋行既而濬以書中所載皆可見之行事請摘其要者下內閣議行之帝報可孝宗皇帝戊申𢎞治元年春正月以何喬新為刑部尚書喬新以剛正為萬安劉吉所忌帝嗣位初由刑部侍郎晉南京刑部尚書借升秩以逺之中官懷恩詣閣正色曰新君宜用正人胡為出何公安等默然會刑部尚書杜銘罷羣望屬喬新而吉代安為首輔終忌之久不補帝以王恕薦召用之二月帝耕藉田禮畢宴羣臣教坊以雜伎進馬文升厲色曰新天子當知稼穡艱難豈宜以此瀆亂宸聰邪斥去之罷選淑女中官郭鏞請豫選妃嬪以廣儲嗣庶子謝遷字子喬餘姚人上言山陵之工未畢諒暗之痛猶新此必宦豎巧為諛詞以動陛下非本心也陛下富于春秋俟祥禫之後徐議未晚願亟寢前命從之封哈密衛左都督哈商為忠順王從其國人請也三月帝視國子監揭文武大臣等姓名于文華殿壁兩京文武大臣外官知府守備以上吏兵二部並疏其姓名揭于殿壁如有遷罷即以新除者易之御經筵命儒臣日講謝遷為講官務積誠開帝意每進講敷詞詳切帝數稱善起用言事謫降諸臣主事張吉餘干人王純仙居人中書舍人丁機進士李文祥字天瑞麻城人敖育元新喻人並以言事逺謫南京吏部主事儲巏字靜夫泰州人上言五人者既以直言徇國必不變節辱身乞擢置風紀論思之地則言論風采必有可觀帝命吏部起用之夏四月釐祀典依洪武舊制凡祀典所無者悉罷之韃靼求貢小王子上書求貢自稱大元汗時朝廷方務優容許之自是與巴延蒙克王舊作伯顔猛可王今改等屢入貢漸往來套中出沒為寇六月癸巳朔日食冬十月妖僧繼曉伏誅法司擬繼曉罪以犯在赦前免死科臣陳璚長洲人等劾曉罪大惡極不當宥命棄市土魯番殺忠順王哈商復據哈密土魯番阿里死子阿哈瑪特舊作阿黑麻今改後倣此嗣為蘇勒坦聞哈啇封忠順王怒曰哈商非忠順族安得封乃偽與結婚誘而殺之仍令伊蘭據其地已而哈密都指揮阿穆呼朗覘伊蘭單弱請援于邊臣調赤斤罕東兵夜襲破其城伊蘭遁入以力薄不能守引還阿穆呼朗舊作阿木朗今改後倣此己酉二年春二月下監察御史湯鼐字用之夀州人于獄戍之帝即位後更新庶政言路大開庶吉士鄒智進士李文祥交章論劾當路智疏論萬安持祿怙寵劉吉附下罔上尹直狹詐懷姦文祥疏言登極詔書不許風聞言事昔李林甫持此以禍唐王安石持此以禍宋逺近驟聞莫不驚駭請再頒旨詔廣求直言庶不墮姦謀足彰聖德鼐意氣尤鋭其所抨擊間及人望王恕以盛暑請暫輟經筵鼐三疏論駁又嘗劾尚書周洪謨馬文升等大臣多畏惡之劉吉尤剌骨使人啖御史魏璋鄢陵人曰君能去鼐行僉院事矣璋欣然日夜伺鼐短會夀州知州劉槩濟寧人嘗餽鼐白金遺之書云夢一人騎牛幾墮君手挽之引就道因解之曰人犄牛國姓意者國將傾君扶之引君當道也鼐喜以書示客璋得間適帝遣官賑四川中書舍人吉人長安人薦鼐及劉槩可任璋遂嗾同官陳景隆長樂人劾吉人私立朋黨因及槩貽書狀劉吉從中主之並竄入智與文祥等名悉下詔獄欲盡置之死何喬新彭韶力持之王恕亦上疏救于是鼐槩戍邊吉人削籍鄒智李文祥貶官璋遂擢大理丞以馬文升為兵部尚書兼提督團營時承平久兵政廢弛西北部落不時窺塞下文升嚴覆諸將黜貪懦三十餘人姦人大怨夜持弓矢俟其門作謗書射入東長安門內帝聞詔錦衣衛緝捕給騎士十二人衛出入文升因乞休慰諭之夏五月河決開封入沁河河決自原武由開封東北入沁河舊時黃沁交會于武涉正統中河決滎澤而南不與沁合其後鑿渠引之時疏時塞至是自祥符東北翟家口決掃頭五處入于沁河溢流為二一自于家店在陽武縣東經蘭陽縣南東至歸德由徐邳入淮一自封邱縣之荆隆口在縣東亦曰金龍口漫祥符潰儀封縣之黃陵岡注見前東經曹濮入張秋運河郡邑多被害汴梁尤甚議者請遷開封城以避其害布政使徐恪字公肅常熟人力持不可乃止命所司役夫五萬人治之已而命户部侍郎白昻武進人總理其事昻築陽武長隄濬宿州古汴河即古蒗蕩渠注已見前其故道在宿州者自河南永城縣流入又東南經靈璧入泗州界今河已湮塞有故隄尚存又濬歸德睢河注見前使河流入汴汴入睢睢入泗泗入淮以達海水患稍寧秋七月詔求直言京師霪雨南京風雷故有是詔冬十二月甲申朔日食賜故少保于謙諡加贈光祿大夫上柱國諡忠愍立祠墓所賜額曰旌功後萬歷中改諡忠肅庚戌三年春三月令天下設預備倉每十里預積粟萬石及數為稱職過者旌擢不及者罰之府州縣及軍衛官視此升黜冬十一月有星孛于天津晉書天文志天津九星橫河中主四瀆津梁詔羣臣言闕失大學士劉吉等言邇者妖星見天津厯杵臼天文志杵三星在箕南逼營室注見前其占為兵為飢為水旱今兩畿河南山西陕西旱蝗四川湖廣嵗不登倘明年復然恐盜賊竊發禍亂將作願陛下節用度罷宴遊屏讒言斥異教留懷經史講求治道沙河在昌平州南曰南沙河下流與北沙河合至義順縣入白河修橋江西造磁器南海子繕垣墻俱非急務宜悉停止帝嘉納之初吉在成化時無所規正及帝即位見帝仁明同列徐溥劉健皆正人而吉于閣臣居首兩人凡有論建吉每署名于前竊時譽以自蓋焉京師地震辛亥四年春三月逮兩廣總督秦紘尋免歸初紘涖鎮劾總兵官安逺侯栁景溥之孫貪暴不法景逮下獄法司論當死以連姻周太后家有奧援反訐紘不已命逮紘并鞫詔宥景死紘亦罷歸紘被逮時方議討後山賊治軍事畢從容就道儀衛騶從不貶損既踰嶺囚服就繫謂官校曰兩廣蠻夷雜處總制體尊遽就拘執恐損國威既踰嶺真囚矣人服其得體夏六月地復震秋八月封弟五人為王祐榰憲宗第九子夀王初封保寧後以岐王世絶之籓德安祐梈憲宗第十一子汝王之籓衛輝祐蕣憲宗第十二子涇王之籓沂州祐匱憲宗第十三子榮王正德中始之藩常德祐楷憲宗第十四子申王未之藩卒罷刑部尚書何喬新喬新執法不阿每重王恕輕劉吉吉銜之會喬新外家與鄉人訟御史鄒魯當塗人劾奏喬新受賄曲庇吉取中旨下諸人詔獄喬新乃拜疏乞歸先是魯覬為大理丞喬新薦郎中魏紳曲阜人補之魯狹怨故有是奏頃之窮治無驗魯停俸喬新亦遂致仕吉每因事傾異已御史薑洪出按湖廣與總漕都御史爭文移吉奏貶洪官又與中官蔣琮比誣南京給事中方向私墾後湖田并御史薑綰等俱逮繫論罪洪等皆嘗劾吉者也故中之中外側目方向字與義桐城人薑綰字玉卿弋陽人後湖即南北朝元武湖在上元縣北宋以後多淤為田明時置黃册庫其中以官守之九月以彭韶為刑部尚書先是韶由刑部侍郎遷吏部與王恕甄人才覆功實仕路為清及是何喬新既罷帝以韶代之冬十月以禮部尚書邱濬兼文淵閣大學士預機務自景泰中王文以尚書入閣至是濬復繼之初內閣職任雖重敘官仍以尚書為尊濬在禮部時王恕亦在吏部雖同為尚書而位居恕下既入閣恕以已長六卿弗讓也濬不悅既而內宴在六年二月濬徑居恕上其後由侍郎詹事入閣者班皆列六部尚書上矣十二月土魯番獻還哈密城阿哈瑪特既破哈密殺哈商而貢使頻至帝仍善待之阿哈瑪特遣使偕賽瑪爾堪貢獅子甘肅鎮守中官傅德先圖形進帝納之比使還遣中官護行命內閣萆敕劉吉等言畨戎不宜優寵太過使輕中國事遂寢賽瑪爾堪古罽賓國注見前按賽瑪爾堪舊作撤馬兒罕今改由是阿哈瑪特以中國易與益桀傲已而帝用馬文升耿裕字好問九疇子言拘留使臣郤貢物敕責令悔罪阿哈瑪漸警懼遣使叩關願獻還哈密及阿里所掠金印事具前邊臣以聞許之至是果以城印獻還乃釋所拘使臣而還之鳯陽陵火延九十餘里召秦紘為南京戶部尚書言官論紘無罪詔起之户部奏是歲天下户口之數户九百十一萬三千四百四十六口五千三百二十八萬一千一百五十八壬子五年春二月減陜西織造絨毼之半巡按御史張文泰州人言陜西歲歉之後民病未蘇司禮監近下帖子降圖式織造數百事並宜停止以其價振業貧民命減所織之半三月立子厚照帝長子張皇后出為皇太子夏五月求遺書六月下御史彭程字萬里鄱陽人于獄尋遣戍程巡視光祿寺見造皇壇祭器皇壇者憲宗修齋行法之所也程疏言光祿金錢皆民膏血用之得當猶恐病民况投無益之地先帝篤信李孜省繼曉輩意在求福今二人已伏辜不能自保焉能福人陛下如有此舉宜遏之將萌如無此舉論臣下逢迎之罪帝得疏以程暴掦先帝過失下錦衣獄令刑部定罪詰責光祿卿停其俸已而刑部擬程贖杖帝不許命與家屬並戍邊秋八月劉吉罷帝即位初吉與萬安尹直並為言路所劾未幾安直皆去而吉獨留柄政既久權勢烜赫帝初頗加委任後眷亦漸衰而吉終無去志及是帝欲封后弟伯爵命吉撰誥劵吉言必盡封二太后家子弟方可帝不懌遣中官至其家諷令致仕賜驛歸憲宗末有紙糊三閣老泥塑六尚書之謡以吉與萬安劉珝同在內閣尹旻殷謙周洪謨張鵬張鎣劉昭等長六部于君德闕失政事汚濁俱無一語故以此譏之及吉為首輔言者攻之不已而吉自如人因呼為劉棉花以其耐彈也吉疑其言出下第舉子因請舉人三試不第者不得復會試時適當會試期舉子已羣集都下禮部為請詔姑許入試後如令已而吉罷令亦不行吉歸踰年卒冬十月更中鹽法洪武時于各邊開中令商人募民墾種築臺堡自相保聚邊儲以充成化中始以銀易米然未嘗著為令至是户部尚書葉淇字本清山陽人召商納銀令運司類解太倉分給諸邊每引輸銀三四錢有差視國初直加倍而商無守支之苦一時太倉銀纍至數百萬然赴邊開中之法廢商屯撤業菽粟翔貴邊儲日虛矣十一月停納粟例初成化末開納米事例賑陜西河南諸省飢及是尚書王恕言永樂宣德正統間天下亦有災傷各邊亦有軍餉當時無納粟例糧不聞不足軍民不聞困弊比年來一遇災歉輒行捐例人既以財進身欲其砥亷隅為循吏豈可得也帝即命止之癸丑六年春二月録常遇春李文忠鄧愈湯和裔世襲指揮使遇春元孫復文忠元孫璿愈五世孫炳和六世孫紹宗皆軍民雜處無職命世襲指揮使以奉先祀河決張秋以劉大夏字時雍華容人為副都御史治之河決張秋戴家廟在東平州西掣漕河與汶水合而北行遣工部侍郎陳政新昌人督治政尋卒命廷臣會薦才識堪任者時大夏為浙江左布政使以王恕薦賜敕遣之時河流湍悍決口濶九十餘丈大夏行視之曰是下流未可治當治上流于是即決口西南開月河三里許屬之舊河使通漕乃濬黃陵岡南賈魯舊河由曹出徐以殺水勢又濬孫家渡口在榮澤縣東南正統中河嘗決此别鑿新河導使南行由中牟穎川東入淮又濬祥符四府營淤河由陳留至歸德分為二一由宿遷小河口一由亳州渦河俱會于淮然後沿張秋兩岸築臺立表貫索網聯巨艦穴而窒之實以土至決口去窒沉艦壓以大掃且合且決隨決隨塞連晝夜不息功乃成帝遣行人往勞改張秋名安平鎮大夏又言安平決口既塞下流已治黃陵岡居安平鎮之上流河口廣九十餘丈荆隆等口又居黃陵岡之上流其廣四百三十餘丈黃河至此寬漫奔放必築塞諸口導河上流使南下徐淮庶可為運道久安之計廷議如其言大夏乃興工在八年正月築塞黃陵岡及荆隆等口七處五旬而畢于是上流河勢復歸蘭陽考城徑歸德徐州入運河會淮水東注于海南流故道以復又築長隄亘三百六十里起胙城注見前抵徐州復築荆隆口等隄凡一百六十里起于家店歷銅瓦箱在蘭陽縣西北初名銅牙城元嘗置縣後廢大小二隄相翼潰決之患始息水大治乃召大夏還黃河自金明昌中南北分流其後南流盛而北流漸微明正統景泰間嘗東決大清河入海雖時即修治而支渠猶有存者至黃陵岡既塞于是黃河始全入于淮而北流遂絶夏四月土魯番復據哈密初土魯番既獻還哈密城馬文升言番人重種類且素服蒙古非得蒙古後裔鎮之不可乃求故忠順王托都從孫善巴舊作陜巴今改後仿此襲封為王以昻克波賴哈森之弟舊作奄克孛剌今改後仿此為都督同知阿穆呼朗為都督僉事輔之已而諸番索善巴財幣不得皆怨阿穆呼朗又引訥克里人掠土魯番牛馬阿哈瑪怒至是潛兵夜襲哈密執善巴支解阿穆呼朗仍令雅闌據守其地事聞命兵部侍郎張海德州人都督同知緱謙前往經略先是哈密變聞邱濬謂馬文升日西陲事重須公一行文升曰西域嗜利自古未有能為中國患者徐當靖之濬復以為言文升請行廷臣僉言北冦方強本兵不宜遠出乃推海謙以往二人本庸才但遣土魯番人歸諭其主令還侵地身駐甘州待之已而阿哈瑪遣使叩關求貢詭言願還善巴及哈密廷議以番人譎詐欲棄善巴閉嘉峪關不通貢使海等聞之大喜不俟命遽逐土魯番使者封嘉峪關而還言官劾其罪並下吏貶秩閏五月免應天蘇松田租以水災蠲租一百八十餘萬石吏部尚書王恕罷邱濬與恕不相能恕考察天下庶官已黜而濬調旨留之者九十餘人恕屢爭不能得因力求罷不許太醫院判劉文泰者求遷官為恕阻銜之文泰故往來濬家知濬忮恕因劾恕變亂選法且言恕里居時屬人作傳鏤版行之歷數先帝之失無人臣禮恕知文泰受旨于濬乃奏辨乞賜廷鞫于是下文泰錦衣獄訊狀詞果連濬文泰疏中有云沽直謗君濬筆也濬亦疏辨帝心不悅恕乃貶文泰御醫責恕沽名令焚所鏤版置濬不問恕遂連章求去聽馳驛歸恕揚歷中外五十餘年天下稱名臣必首推恕濬顧尼之由是衆論大不直濬六月蝗秋八月京師大雨雹禮部尚書倪嶽字舜咨上元人疏弭災急務勸帝勤聖學開言路止無功之賞停不急之役黜姦貪進患直帝嘉納之先是四方所報災異禮部于歲終類奏率為具文嶽在部乃以日月先後彚分條析末復援證經史為帝懇切言之刑部尚書彭韶罷韶昌言正色與王恕何喬新稱三老然每為貴戚近臣所疾故致仕去甲寅七年春二月詔羣臣言闕失去冬雷雹風雨拔孝陵樹故有是詔三月巡撫貴州都御史鄧廷讚字宗器巴陵人討平都勻苖都勻苖乜富架長腳等作亂命廷讃提督軍務討之廷讃與兵偹副使吳倬淳安人遣熟苖詐降富架誘入寇伏兵擒之乘勝抵其巢連破百餘寨生擒長腳以歸初成化中設程番府即貴陽府注詳前廷讃知府事政平令和苖蠻悅服及是復平苖亂乃上言都勻清平舊設二衛注俱見前九長官司日都勻曰平浪曰邦水曰平州陸洞曰九名九姓曰豐寧曰樂平曰平定曰陳蒙爛土其人皆世祿恣虐激變致亂垂數十年今始克定請于二衛改設流官與土官兼治于是設府一曰都勻即治衛城州二曰獨山即九名九姓長官司及是升為州屬都勻府麻哈元麻峽縣明初為麻哈長官司及是升為州屬都勻府縣一曰清平即治衛城苖患始息命兩畿捕蝗民捕蝗一斗給米倍之秋七月京師地震命工部侍郎徐貫字源一淳安人經理蘇湖水利時三吳大水命貫疏濬水道貫上言東南財賦所出而水患為多永樂初命夏原吉濬治時以吳淞江灔沙浮蕩未克施工事具前逮今九十餘年港浦愈塞臣督官相度地勢濬吳江長橋即垂虹橋在縣東凡七十二洞蘇舜欽詩長橋跨空古未有俗因名長橋導太湖散入澱山在松江府清浦縣西與蘇州府崑山縣接界水利志湖中有澱山故名陽城在蘇州府長洲縣東北東接崑山縣界崑承在蘇州府常熟縣東南一名隱湖等湖又開大石在崑山縣東南趙屯在青浦縣西北等浦泄澱山湖水由吳淞江入海開白魚洪鮎魚口在吳江縣西北即婁江上源也等處泄崑承湖水由白茆港注見前入海開斜堰在崑山縣西北接常熟縣界七浦在昭文縣東南鹽鐡在常熟縣北等塘泄陽城湖水由七丫港一名七鴉浦七浦諸塘下流也入海下流既通于是開湖州之漊涇在烏程縣西南泄天目安吉注俱見前諸山水自西南入太湖吳興志郡有七十二漊在烏程者三十八在長興者三十四導苕霅之水注于太湖開常州之百瀆在宜興縣通志昔人于震澤之口開瀆百條故名後多埋塞其在縣西南者曰上瀆在縣東北者曰下瀆泄溧陽鎮江練湖在丹陽縣西北即古曲阿後湖今名開家湖之水自西北入太湖又開諸斗門以泄運河之水由江陰入大江上流亦通不復堙塞初奉命奏以主事祝萃自隨及事竣凡修濬河涇港瀆湖塘斗門隄岸百三十五所役夫二十餘萬萃之功居多寧祝萃字維貞海人八月以李東陽字賔之茶陵人以戍籍居京師為禮部侍郎兼翰林學士典誥敕東陽官太常少卿兼侍講學士甚負文名及是大學士徐溥等以誥敕繁請如先朝王直故事設官専領乃擢東陽入閣典之九月南京地震乙卯八年春正月甘肅總兵官劉寧敗寇于涼州韃靼北部伊布賴穆王舊作亦卜剌因王今改後仿此等入套駐牧于是小王子及托爾干之子霍什舊作火節今改後仿此居賀蘭山注見前後與之相倚數為邊患及是入犯涼州寧與戰相持數日擒其長一人寇乃遁去二月乙卯朔日食武英殿大學士邱濬卒諡文莊濬先以目疾免朝參及是卒贈太傅濬在位時以寬大啓上心忠厚變士習顧性褊隘著書議論亦多偏激嘗譏范仲淹多事謂嶽飛未必能恢復秦檜有再造功聞者無不駭其言以禮部侍郎李東陽少詹事謝遷俱兼翰林學士入內閣預機務東陽與遷同日並用遷時居憂力辭服除始拜命東陽工古文辭閣中疏草必屬之疏出多為人傳誦秋七月以宋儒楊時從祀孔子廟廷定國子監生分撥厯事期初洪武中國子監設六堂曰率性修道誠心正義崇志廣業以課諸生行積分法司業二員分為左右各提調三堂凡通四書未通五經者居正義崇志廣業一年半以上文理調暢者升修道誠心又一年丰經史兼通文理俱優乃升率性升至率性乃積分其法孟月試本經義一道仲月試論一道詔誥表內科一道季月試經史策一道判語二條每試文理俱優者與一分經優文劣者與半分紕繆者無分歲內積八分者為及格與出身不及者仍坐堂肄業又命諸生于各司分習吏事六部九卿皆有之謂之厯事又謂之撥厯其期以入監年月為先後送吏部選用其超異者奏請上裁多擢顯官其常調者為府州縣六品以下官已而進士日重監生日輕雖積分歷事不改初法而監生漸多淹滯撥厯或至十餘年之久景泰以後乃頻減撥歷歲月以疏通之每歲揀選優者輒與撥厯坐監有未及一年者及是監生在監者少而吏部聽選至萬餘人又不得官禮部尚書倪嶽乃定議監生諸司厯事一依舊制必須日月滿後方許分撥由是諸生在監稍久而選人亦不至壅塞時林瀚為祭酒以監生不敷撥歷請增貢額嶽亦議行之瀚典國學垂十年饌銀歲以百數計悉貯之官以次營立署舍師儒免僦居自瀚始瀚少子廷機廷機子燫三世俱官祭酒有學行為時所稱林瀚字亨大閩人廷機字利仁燫字貞恆冬十二月復哈密阿哈瑪特既據哈密僣稱汗侵沙州迫罕東諸部附已馬文升言此寇桀驁不大創終不知畏宜用漢陳湯故事襲斬之以指揮楊翥熟番情召詢方略翥偹陳哈密可取狀文升請于帝敕發罕東赤斤苦峪兵命副將彭清字源潔榆林人將之𨽻巡撫許進字季升靈寶人往討進令清統精騎出嘉峪關前行總兵官劉寧繼之越八日諸軍俱會額濟乃川舊作羽集乜川今改夜半大雨雪及明冒雪倍道而進又六日奄至哈密城下拔之雅闌已先遁去乃斬其遺卒撫降餘衆而還先是張海等既閉嘉峪關永絶貢道諸番咸歸阿哈瑪特及是許進等復潛師直貢搗哈密阿哈瑪特益懼乃于十年冬送還善巴欵關求朝廷許之仍命善巴為忠順王哈密復安丙辰九年夏四月以周經字伯常陽曲人為户部尚書時帝寬仁而户部尤姦蠧所萃挾勢行私者不可勝紀少不如意讒毀隨之經悉按祖宗成憲略無所顧寬逋緩征裁節冗濫虛冒苛切之風少衰下給事中龎泮字元化天台人御史劉紳掖縣人等于獄岷王奏劾武岡知州劉遜安福人命錦衣官校逮之泮等率科道官上言錦衣不宜輕遣遜所坐微而王奏牽左證百人勢難盡逮請敕撫按官體勘帝以親王劾一州官輒交章奏阻下泮等給事中四十二人紳等御史二十人于獄六科署空吏部尚書屠滽鄞縣人請命尚寶司及中書代收部院封事侍讀學士楊守址字維立鄞人貽書責滽滽乃率九卿申救泮等得釋遜亦無事六月詔舉將才冬十二月刑部吏徐圭應城人請革東厰黜為民刑部郎中丁哲嵊縣人員外郎王爵安福人斷獄忤東厰法司承太監楊鵬指擬哲等罪徒先是千户吳能以女付媒者鬻于樂婦張後轉鬻樂工袁璘能殁妻聶訪得之女怨母鬻已詭言非己母聶與子劫女歸璘往贖不從訟于刑部哲與爵同訊得情璘語不遜哲笞璘數日死御史已驗瘞東厰中官楊鵬從子嘗與女淫遂教璘妻訟寃于鵬且令前媒者證聶非女母鎮撫司論擬奏下法司廷訊女及媒者具吐實法司奏哲等因公杖人死罪當徒而女止豫杖圭不平抗疏曰臣在刑部三年每見鞫問盜賊多東厰鎮撫司緝獲或校尉挾私誣陷或為人報讐或受首惡贓令旁人抵罪刑官洞見其情莫敢改正以致多枉殺人臣願陛下革去東厰以絶禍原則太平可致臣一介微軀自知不免與其死于虎口孰若死于朝廷願陛下斬臣首行臣言雖死無恨帝以其狂誕發原籍為民哲等放歸已而觀政進士孫磐遼陽人上疏曰近者言官劾人率乘勢敗而排觸姦幸反出胥吏議者羞之請定建言為四等最上彈劾權貴其次補拾闕遺又其次建白時政有禆國家皆分别擢敘其粉飾文具循默不言者則罷黜之時不能用後圭以薦纍擢知州有平盜功磐為主事請盡撤還鎮守內臣不從纍官至河南僉事御批歷代通鑑輯覽卷一百六

body:
  text: 帝不豫百官問安左順門太監興安出謂曰公等皆朝廷股肱耳目不能為社稷計日日徒問安何益衆嘿然都御史蕭維禎副都御史徐有貞退語諸御史曰若皆知安意否僉曰安謂早請建儲耳維禎有貞曰然乃謀請復沂王為太子議于朝大學士王文曰今只請立東宫焉知上意誰屬學士蕭鎡曰沂王旣退不可再也乃共請建元良為太子維禎舉筆曰我欲更一字因更建為擇笑曰吾帶亦欲更也越四日上之詔曰朕偶有寒疾十七日當早朝所請不允武清侯石亨右副都御史徐有貞等以兵迎上皇于南宫遂復位以有貞入内閣預機務下少保兵部尚書于謙及大學士王文于獄先是帝輿疾宿南郊齊宫十三日戊寅召石亨至榻前命攝行祀事亨見帝疾甚退與都督張軏玉次子及曹吉祥謀立太子不如復上皇可邀功賞軏吉祥然之以告太常卿許彬彬曰此不世功也彬老矣無能為盍圖之徐元玉有貞字翼日亨䡄夜至有貞家有貞文喜曰須令南城知此意軏曰已隂達之矣有貞曰必審報乃可越二日亨軏與吉祥矯太后制夜復㑹有貞所軏曰報得矣計將安施有貞升屋步乾象亟下曰時在今夕不可失㑹明日帝將視朝門早啟有貞以三鼓即至朝房亨軏等率羣從子弟家兵混同守禦官軍並入明舊史云有貞令輒等詭言備非常勒兵入大内亨掌門鑰夜四鼓聞門納之旣入復閲以遇外軍考明制皇城門鑰内監掌之石亨乃總兵官不應掌門鑰且是曰早朝百官咸集若門啟復閉何由得待漏闕下邪説本祝允明蘇材纂不足據今依天順實録羅通奏輯天色晦𡨕軏等惶惑有貞趣行軏顧曰事濟否有貞大言曰必濟進薄南宫城毁垣壞門而入見上皇于燭下上皇問故衆俯伏請登位乃呼進轝兵士惶遽不能舉有貞等助挽以行上皇顧問諸人姓名至東華門門者拒弗納上皇曰朕太上皇帝也遂入至奉天門升座時百官咸待漏闕下忽聞南城呼譟震地咸失色須臾鳴鐘鼓有貞出號于衆曰太上皇帝復位矣趣入賀百官震駭入謁上皇曰卿等以景泰皇帝有疾迎朕復位其各任事如故羣臣呼萬歳紀事本末云景帝間鐘鼓聲大驚問左右曰于謙耶旣知為上皇連聲曰好好遂命有貞以右都御史兼學士入内閣預機務命陳循與有貞草詔諭羣臣日中御奉天殿即位于謙甫聴宣諭畢即班執之與大學士王文太監王誠舒良張永王勤同下獄以許彬薛瑄為禮部侍郎兼翰林學士入内閣預機務彬以石亨薦瑄楊善所薦也改元大赦詔改景泰八年為天順元年大赦天下詔辭曰魏拉特之變乘輿被遮文武羣臣已立皇太子奉之豈期監國之人遽攘當宁之位又曰旋易皇儲而立巳子惟天不佑未乆而亡矧失徳之良多致沈疾之難瘵徐有貞所撰也録奪門功封石亨忠國公張軏太平侯輗文安伯楊善興濟伯進徐有貞兵部尚書予太監曹吉祥等錦衣衛世職有貞意慊數請于亨曰願得冠側注武并也從兄後亨入言之尋封武功伯太監興安見有貞等俱邀封賞言于帝曰當日若附和南遷不知置陛下于何地又安有奪門功也帝不應後數日言官爭劾安黨逆宜斬帝宥之第罷其司監而已殺于謙王文籍其家戍陳循江淵于鐵嶺衛斥蕭鎡商輅為民先是徐有貞石亨等旣定議迎復有貞恐亨等中變乃于次日詭辭以激亨曰于謙王文已遣人迎襄世子矣又曰帝已知君謀將于十七日早朝執君亨大懼謀遂决及是謙文已下獄有貞與亨等嗾言官劾謙文謀迎外藩入繼大統命鞫于廷文抗辯曰召親王須用金牌信符遣人必有馬牌内府兵部可驗也辭氣俱壯謙曰亨等意如此辯何益都御史蕭維禎曰事出朝廷不承亦難免遂文致其詞以謀逆律定讞坐極刑奏上帝猶豫未忍曰于謙實有功有貞曰不殺謙此舉為無名乃棄謙等于市籍其家家屬戍邊以千户白琦言榜謙等罪示天下于是一時希㫖取寵者率以謙為口實云謙性忠孝才畧開敏自遭冦變忘身憂國敵先後入犯卒不得逞皆謙功也為徐有貞石亨輩所嫉遂及于難死之日隂霾翳天朝野寃之太后聞謙死亦嗟悼累日指揮多喇者本䝉古降人款曹吉祥麾下以酒酹誅死所慟哭吉祥怒抶之明日復酹慟如故謙之籍也家無餘貲惟正室鐍鑰甚固啟之則皆上賜物也都督同知陳逵收謙遺骸殯之踰年始歸葬杭州逵故舉將林出李時勉門下者也多喇舊作朶兒今改罷巡撫提督軍務石亨惡文臣節制武臣言于帝寵之時王竑廵撫江北改浙江參政石亨等追論其擊殺馬順事除名編管江夏後于帝宫中得竑疏見正理篤恩義語顧左右曰竑所奏多為朕也命還河敕有司善視之尚書王直胡濙致仕直濙皆以年老乞休直年七十有八濙年八十有一並賜金弊給傳歸初直為侍郎以次富入閣楊士竒不欲也及長吏部凡十四年乃告歸時從諸佃耕蔣擊鼓唱歌諸子孫更迭奉觴上夀直嘆曰曩西楊郝我令不得共事我不能無望然使我在今當不免遼陽之行安得與汝曹為樂哉後六年卒年八十有四謚文端濙歴事六帝立朝幾六十年甔歸三弟年皆七十餘鬚眉皓白燕樂一堂遂名其堂曰夀愷又七年卒年八十有九謚忠安二月廢景泰帝仍為郕王遷之西内以太后制廢之制曰無次子郕王祁鈺性本事雄遄矢位人神共怒旣絶其子又殃其身疾病彌留朝政旣廢吾雖母子之至情于大義而難宥其廢祁鈺仍為郕王如漢昌邑王故事辭亦徐有貞所撰也送歸西内皇太后呉氏復號宣廟賢妃削肅孝皇后杭氏位號改稱懷獻太子為懷獻世子欽天監監正湯序請革除景泰年號帝不從初正統二年京師旱街巷小兒為土龍禱雨拜而歌曰雨帝雨帝城隍土地雨若再來還我土地説者謂雨帝者與弟也帝弟同音城隍者郕王再來還土地者當復辟也及是果驗罷團營從石亨言也都督范廣素驍勇為于謙信任石亨嫉之張軏尤不相能乃誣廣與謙同謀為逆殺之軓又諧殺前昌平侯楊俊以額叔奉帝時俊不國迎納也後軓入朝于路得暴疾輿歸楚痛不堪而死時皆以范廣為崇云高穀罷王文陳循等皆誅竄穀謝病帝以穀長者語廷臣曰穀在内閣議迎駕及南内事嘗左右朕其賜金帛給驛舟以歸穀歸杜門絶省客有問景泰天順間事輒不應居四年卒榖位至台司敝廬瘠田僅足衣食而已成化朝賜文義以吏部侍郎李賢兼翰林學士入内閣預機務賢入閣位許彬薛瑄上與徐有貞共事帝深眷之未幾進吏部尚書郕王薨謚日戾毁所營夀陵葬金山與殀殤諸王公主墳相屬妃唐氏等俱殉葬并欲令汪妃殉李賢以為不可乃止妃尋出居舊府時沂王已復儲位以妃前不欲廢立請于帝令妃得盡攜宫中所有而出一日帝問太監劉桓曰記有玉玲瓏繫腰今安在桓言當在妃所帝命索之妃投諸井而對使者曰無之已而告人曰七年天子不堪消受此數片玉邪後有言妃出所携鉅萬帝命檢取之立盡明史贊曰景帝當倥􅘓之時奉命居攝旋正大位以繋人心事之權而得其正者也篤任賢能勵精政治强冦深入而宗社又安再造之績良云偉矣而乃汲汲易儲南幽閉朝謁不許恩誼恝然終于與疾齊宫小人乘竊發不克以令名終惜夫三月以袁彬為錦衣衛指揮同知初帝在迤北彬周旋左右一年之内帝視彬猶骨肉也南還後景泰帝授彬錦衣試百户至是進指揮同知賜予優渥時召入曲宴叙患難時事歡洽如故時復立沂王見深為皇太子封子四人為王見潾即見渚改名徳王景㤗中封榮王至是改封後之藩徳州又徒濟南見㴻帝弟五子與下二王俱在南宫時所生秀王後之藩汝寧見澤帝第六子崇王後秀王薨無子即就藩汝寧見浚帝第七子吉王後之藩長沙韃靼保喇冦邊帝復位即遣都督馬政等使迤北賜故巴延特穆爾妻金弊以帝在北時巴延特穆爾敬䕶尤至也保喇遮政等執之而使使入賀且請獻玉璽帝敕之曰璽已非真即真亦秦不祥物獻否由爾第母留我使以速爾禍保喇不受命遂冦延綏都督李懋等敗死犯寧夏參將种興戰歿又遣千騎屯大同邊外窺偏頭關帝命石亨為將軍討之亨至邊無功而還已而保喇勢益熾邊警迭至帝憂形于色恭順侯呉瑾侍進曰使于謙在當不令敵至此帝嘿然乃後命安逺侯溥禦之溥戰輒敗而飾小捷以開呉瑾克勤之子夏四月帝露禱于上帝以災異數見也復命廷臣列軍民利病以聞襄王聸墡來朝初帝之北狩也諸王中聸墡最長且賢衆望頗屬太后命取襄國金符入宫不果召而聸墡上書太后請立太子命郕王監國書至景泰帝已立數日矣及帝還京師居南内聸墡復上書景泰帝宜朝夕省問率羣臣朝朔望毋忘恭順帝旣復辟石亨等誣戮于謙王文以迎立外藩帝頗疑聸墡尋于宫中得聸墡所上二書而金符固在太后閣中乃賜書召聸墡比二書于金縢比至宴便殿特命百官朝王于館尋請還帝親送至午門外聸墡伏地不起帝問叔父欲何言頓首曰萬方望治如饑渴願省刑薄歛帝拱謝曰敬受教賑北畿山東饑侍郎周瑄字廷玉陽曲人賑北畿僉都御史林聰賑山東帝恐瑄聰巡歴不能周徧復遣侍郎黄仕儁四川富順人繼往聰屢請發帑帝召徐有貞李賢議有貞曰發帑賑濟徒為里書乾没耳賢曰慮乾沒而不貸坐視民困是因噎而廢食也帝卒從賢議時方遣使通西域忠義前衛吏張昭上疏曰畿輔山東仍嵗災歉小民鬻賣子女無有售者轉死溝壑未及埋瘞即成市臠望陛下用和番之費遣使急賑庶猶可救報聞五月彗星見是月始見至八月餘芒尚存十月復見下御史張鵬字驣霄淶水人楊瑄字廷獻豐城人等于獄并逮繫都御史耿九疇字禹範氏人羅綺瑄印馬畿内至河間民遮訴曹吉祥石亨奪其田瑄以聞并列二人怙寵専權狀帝語閣臣徐有貞李賢曰真御史也遂遣官往覆而令吏部識瑄名將擢用吉祥聞而大懼訴于帝請罪之不許未幾石亨自延綏還㑹彗星見掌遒御史張鵬周斌字國用昌黎人等將劾亨吉祥諸違法事給事中王鉉間之洩于亨亨乃先與吉祥泣訴于帝誣鵬為已誅内監張永從子結黨排陷欲為報仇明日疏入帝大怒遂收鵬及瑄御文華殿悉召諸御史擲彈章俾自讀斌且讀且對神色自若至冒功濫職帝曰彼率將士迎駕朝廷論功行賞何冒何濫斌曰此輩皆貪天功當時迎駕止數百人光禄賜酒饌名數具在今超遷至數千人非冒濫而何帝黙然竟下瑄鵬及諸御史于獄榜掠備至且詰主使者瑄等無所引乃坐九疇綺主謀并逮繫之六月下大學士徐有貞及學士李賢于獄有貞為曹石石亨曹吉祥攬權恣肆時謂曹石所引用旣得志則思自異窺帝意亦微厭二人乃稍稍裁抑之亨吉祥不能平數毁有貞于帝帝方寵有貞嘗屏人與語亨吉祥令小䜿竊聴故洩之于帝帝驚問輒對曰受之有貞且曰外間無弗聞帝由是始疏有貞及楊瑄張鵬獄起亨吉祥論諸御史論劾皆有貞主之因并疑賢二人遂同至帝前具陳迎駕奪門功因曰今内閣専權欲先除臣等不然諸御史安敢爾相與悲哭不已帝心動乃諭言官劾有貞賢圖擅威權排斥勲舊遂並下獄大風雷雨雹大風震雷發屋抜木雨雹大如雞卵擊毁奉天門東吻正陽門下馬牌飛擲郊外都人震恐以災變釋有貞李賢及耿九疇等降謫有差風雹之變曹石二家尤甚大木盡技雹深尺餘欽天監正湯序本亨黨亦言上天示警宜恤刑獄帝感悟乃出有貞賢綺為參政有貞廣東賢福建綺廣西九疇布政使冮西御史周斌等十二人為知縣楊瑄張鵬戍邊賢未行以尚書王翺薦留為吏部侍郎楊瑄張鵬初戍遼東尋遇還或謂二人當詣曹石謝二人不可乃復戍南丹以通政司參議兼侍讀吕原字逄源秀水人入内閣預機務原内端外和石亨曹吉祥皆敬之每大議事有不可據理爭未嘗諛言媚色徇人禮部侍郎兼學士薛瑄致仕瑄在内閣數月見石亨等用事嘆曰君子見幾而作寧俟終日遂致仕去以翰林院修撰岳正字季方漷縣人入内閣預機務薛瑄旣去帝謀代者尚書王翺以正薦帝亦素知正名召對文華殿稱㫖正長身美鬚髯帝遥見色喜就登陛問年幾何家安在何年進士正具以對帝連稱善曰爾年正强仕畿縣人又吾所取士正可輔朕遂命入内閣以官小欲擢為吏部侍郎兼學士㑹石亨進見帝語之亨曰陛下旣得人俟稱職加秩未晚乃即以原官入閣秋七月承天門災下詔罪已勅羣臣修省進李賢吏部尚書兼翰林學士復入内閣預機務石亨知帝嚮賢雖恨賢無如何乃佯與交驩賢亦深自匿非宣召不入而帝益親賢顧問無虚日時帝亦厭亨吉祥驕横屏人語賢曰此輩于政四方奏事者先造其門朕今一斷之至公趨附者當自息賢曰願陛下制之以斬時享吉祥猶用事賢顧忌不敢盡言每從容論對所以裁都之者甚至改許彬為南京禮部侍郎彬性坦率好交游不能擇人浮蕩士多出其門及參大政欲杜門謝客舊游惡之競相騰謗遂不安其位而出謫岳正為欽州同知尋下獄杖戍肅州正負氣敢言旣為帝親㧞益感激思自劾或為匿名書列曹吉祥罪狀吉祥怒請出榜購之帝令撰榜格正與吕原入見曰為政有體盜賊責兵部奸宄責法司豈有天子自出榜購募者且事緩之則自露急之則愈匿帝是其言遂不究石彪鎮大同遣使獻㨗下内閣問狀使者言捕斬無算不能悉致皆梟林木間正按地圖詰之曰此地皆沙漠汝梟何所其人語塞時亨吉祥恣甚正言于帝二人權太重恐乆不可制請以計間之帝曰即可以朕意告二人正出見吉祥曰閒忠國公欲伺公所為使至宜謝遣之因勸吉祥辭兵柄又詣亨諭令自戢且云上使我告公如此二人揣知正意因詣帝前免冠請死帝内媿慰諭之而責正漏言正對曰臣觀二家必以謀叛滅臣欲全上恩故令早自為計耳二人聞益怒㑹承天門災帝命正草罪已詔因歴數弊政無所避亨吉祥遂搆蜚語謂正賣直訕上帝怒謫正欽州同知入閣僅二十八日耳旣行道漷以母老留家月餘復為尚書陳汝言潼人所劾汝言亨黨正嘗言其不宜為尚書逮繫詔獄杖戍肅州方正被謫時或有讓正以未信而諫者正曰上顧我厚懼岳無以報稱子奈何以諫官處我後在戍所帝念之曰正倒好只是大膽正聞自為像贊述帝前語而末云臣嘗聞古人之言葢將之死而憾也其自信不回如此然意廣才疎欲以縱横之術之離問權倖反為所誣人皆迂而惜大赦以承天門災也放徐有貞于金齒有貞旣出石亨等憾未已必欲殺之令人投匿名書指斥乗輿因奏云此有貞怨望所為追執之徳州下詔獄榜治無騐㑹肆赦亨等慮有貞見釋乃言于帝曰有貞自撰武功伯劵辭云纘禹成功禹受禪為帝武功曹操始封也有貞志圖非望帝出示法司法司言罪當棄市帝以犯在赦前免死發金齒為民九月以太常寺少卿彭時兼翰林學士入内閣預機務景泰初時入閣事具前尋丁繼母憂力辭不允明年兵事稍息得請終制及除服景泰帝命供事翰林院不復與閣事至是帝特召見仍命入閣閣臣為帝親擢者時與岳正二人而已然帝方嚮用李賢數召賢獨對而賢雅推重時退必咨之時引義爭可否或至失色賢初小忤久之心折曰彭公真君子也冬十月詔為故太監王振立祠帝憫念振復其官刻香木為振形招魂以葬建祠祀之賜額曰旌忠羅綺赴廣西過家未行㑹州同知龍約自京還與綺言天子為王振建祠賜葬事綺嘆曰朝政如此吾輩自應降黜怨家聞而告之帝大怒立捕綺下獄籍其家成化初始釋為民釋建庶人文奎文奎建文帝少子永樂初幽中都號為建庶人帝憐其無罪久繫釋之帝先李賢賢頓首曰此堯舜用心也天地祖宗實式慿之帝意遂決即鳯陽賜室宇奴婢月給薪米聽婚娶出入文奎繫時方二嵗至是已五十七出見牛馬亦不能識未幾卒十二月封太監曹吉祥養子欽為昭武伯戊寅天順二年春正月兵部尚書陳汝言有罪下獄汝言附曹石由郎中驟進尚書隂險貪墨邊將皆出其門得賄無算始善徐有貞尋與曹石共擠之旣而又欲去曹石以自固亟于帝前陳二人過惡二人聞之大怒嗾言官劾之遂下獄籍其家職數十百萬帝召大臣入視曰于謙終始景泰朝被遇若一身死無餘貲汝言官未乆何多耶因連稱好于謙者三亨等俛首流汗不能對上皇太后尊號初岷王徽煣請上皇太后尊號禮部以非本朝故事乃止已而錢溥謂陳汝言曰復辟之初非奉太后詔誰敢提兵入禁今論功行賞無虚日而母后徽號末加寧非闕典汝言以間帝大悦㑹汝言敗未及行至是帝問李賢賢曰此莫大之孝也遂上尊號曰聖烈慈夀皇太后明代宫闈徽號自此始夏四月太子始講學于文華殿自後日在殿之東廂即所謂左春坊也帝退朝御文華殿閲章奏故令太子居此復設巡撫官時廷議復設巡撫乃命户部侍郎年富字大有懷逺入巡撫山東僉都御史程信字彦實其先休寕人家河間葉盛李秉字執中曹縣人巡撫遼東兩廣大同秉持法公正總兵官不樂言其専擅帝召還尋以諧下獄斥為民五月徴江西處士呉與弼至授左諭徳不拜石亨知衆論不容欲引賢者為已重謀于李賢賢盛稱與弼學行亨即屬賢草疏薦之帝遣行人齎璽書加束帛徴與弼赴闕比至帝問賢與弼宜何官賢曰宜以宫僚侍太子講學遂授左春坊左諭徳召見文華殿與弼辭曰臣草茆賤士本無高行陛下垂聴虚聲臣不幸有犬馬疾今年且六十八矣實不堪供職帝曰宫僚優閒不必辭賜文綺酒牢遣中官送館㳄謂賢曰此老非迂濶者務令就職與弼三辭不允乃請以白衣假讀秘閣書帝曰欲觀秘書且勉受職居二月與弼遂稱病篤賢請曲從放還始終恩禮以光曠舉帝然之賜勅慰勞齎銀幣遣行人送還初與弼在正統景泰朝屢薦不趣曰宦官釋氏不除欲天下治平難矣及是以勅書崇重意當大用而宫僚無事慮不得即行其志故卒辭歸方與弼之至也李賢以賓師禮事之推其上座編修尹直至令坐于側直大愠出即謗與弼作瑣綴録言與弼嘗為其弟所訟又言與弼為石亨跋族諸自稱門下士由是士大夫多訾典弼而亨諎世固未有見之者後儒為辨其云尹直字正言泰和人秋八月詔修一統志李賢等為總裁官書成凡九十卷冬十月李賢請罷錦衣官校刺事不許帝慮廷臣黨比欲知外事倚錦衣官校為耳目由是指揮使門達豐潤人僉事逯杲安平人俱得幸而杲更强鷙帝尤委任之杲遣校尉偵事四方所至官吏震恐多進聲伎貨賄以祈免雖親藩亦然無賄者輒被逮每逮一人必破數大家四方奸民詐稱校尉乘傅縱横無所忌賢請撤還帝不許于是其勢益張己夘三年春正月保喇犯安邊營在榆林府定邊縣東北有新舊二營相去六十里今以新營併入舊營設都司駐守石彪及楊信擊敗之先是彪備敵大同擊斬巴圖王舊作把秃王今改搴其旗封定逺伯旣而充總兵官禦冦寧夏至是保喇以二萬騎犯安邊營彪與楊信擊之連戰皆捷斬其平章郭勒齊追出塞復大敗之斬馘數百獲馬駝牛羊二萬餘㨗聞進彪為侯彪旣屢立戰功與亨並封公侯勢盛而驕多行不義馴至于敗二月遣御史同内官採珠廣東幸太監曹吉祥宅夏四月方瑛大破東苖即白苖在貴陽府貴筑龍里諸縣界東苗千把諸等攻都勻諸衛命瑛率川湖雲貴軍分四道撃之所向皆㨗生擒千把諸送京師磔之瑛前後討川湖貴州諸苗克寨幾二千俘斬四萬餘平苖之功前此莫與比者秋八月石彪有罪下獄彪自陜西召還謀鎮大同與亨表裏握兵柄令千户楊斌等奏保帝覺其詐收斌等拷訊得實大怒下彪詔獄令門達鞫之得其繡蟒龍衣及違式寢牀諸不法事罪當死遂籍彪家并逮其黨治之彪事旣發言官將于朝班劾之有泄于彪者帝聞之大怒乃勅文武大臣無故不得相往來給事中御史及錦衣官不得與文武大臣交通違者依太祖鐵榜例治罪冬十月石亨以罪罷先是亨以彪下獄大懼請罪帝慰諭之亨請盡削弟姪官放歸田里不許至是法司再鞫彪因交章劾亨招權納賄肆行無忌私與術士講論天文妄談休咎宜寘重典乃罷閑住絶其朝參詔自今章奏勿用奪門字諸冒功者黜之石亨旣得罪帝以奪門事問李賢賢曰迎駕則可奪門豈可示後天位乃陛下固有奪即非順彼時亦幸成功耳萬一事機先露亨等不足惜不審置陛下何地帝悟曰然賢曰若景泰果不起羣臣表請復位此輩雖欲陞賞以何為功老成耆舊依然在職何至有殺戮降黜事致干天象招權納賄何自而起國家太平氣象豈不益盛今為此輩損削過半矣帝深然之乃詔自今章奏勿用奪門事諸冒功得官者自首更正黜四千餘人朝署為清詔霜降後録囚著為令每嵗霜降後三法司㑹同廷臣審録重囚謂之朝審遂為永制庚辰四年春二月石亨及其從子彪皆伏誅逯杲奏亨怨望愈甚與從孫後等日造妖言且蓄養無賴専伺朝廷動靜不軌迹已著廷臣亦言不可輕宥乃下亨詔獄坐謀叛律應斬没其家貲未幾亨瘐死彪僇于市帝初縁亨復位徳之亨無日不入見即不召必假事以進出則張大其言在亨門下者得亨語即揚于衆以為聲勢朝臣奔走恐後亨乃以貨之多寡為授職美惡入之先後為得官遲早時有朱三千龍八百之謠謂郎中龍文朱銓輩俱以賄被顯擢也久之干請愈甚帝不能堪以語李賢賢曰惟獨斷乃可因勅左順門非宣詔母納總兵官亨燕見遂稀所請亦漸有不從者而亨猶不悟恣横如故逯杲本亨所揠密受帝㫖同亨所為以報而亨亦不知彪本以戰功起家不藉父兄蔭然一門二公侯所蓄材官猛士不下數萬中外將帥半出其門又謀鎮大同為天下精兵處故人皆疑其有異志遂及于禍夏四月大雨雪月餘乃止秋七月乙亥朔日食下工部侍郎翁世資莆田人于獄貶知衡州府蘇杭等府織染局嵗造有定數帝遣内使増造綵縀七千疋世資請減之帝怒下錦衣衛獄貶衡州知府八月韃靼分道入冦保喇與瑪拉噶等分三道自大同威逺西擁衆南行總兵官李文西番人不敢出保喇直抵雁門至代朔忻諸州肆掠帝遣都督顔彪率師至紫荆關馮宗至倒馬闗禦之㓂稍引去冬十二月釋徐有貞還里有貞在金齒三年石亨敗帝謂李賢曰有貞何大罪為石亨輩所陷耳其釋歸田里有貞旣歸猶冀復召仰觀天象謂將星在吳益自負常以鐵鞭自隨數起舞及聞韓雍平兩廣有功乃投鞭太息曰孺子亦應天象邪遂放浪山水間十餘年而死人韓雍字永熙長洲辛巳五年春二月巡撫廣東都御史葉盛請罷採珠池從之夏五月殺弋陽王奠壏寧獻王權之孫逯杲誣奠壏母子亂帝遣官往勘事已白帝怒責杲杲執如初帝竟賜奠壏母子死焚其尸方舁尸出大雷雨平地水深數尺人咸以為寃下南雄知府劉實字嘉秀安福人于獄尋死實居官三十餘年亷介愛民中官過郡多邀索弗與中官折辱之郡民大呼擁實去中官慚忿誣以罪逮下詔獄瘐死郡民哀而祠之六月遣尚書馬昂懷寧伯孫鏜撃保喇保喇衆萬餘屯莊浪攻掠州諸衛副總兵仇亷禦之敗績敵渡河摽掠官軍莫敢攖其鋒闗中震恐帝以昂總督軍務鏜充總兵官率軍擊之彗星見秋七月太監曹吉祥及其養子欽反懷寧伯孫鏜討之欽敗死吉祥伏誅正統間吉祥屢出監軍輒選達官善騎射者隸帳下師還畜于家故家多藏甲石亨敗吉祥不自安漸蓄異謀日犒諸達官金錢穀帛恣所取結為死黨千户馮益客欽所欽問曰古有宦官子弟為天子者乎益曰君家魏武其人也欽大喜㑹言官劾欽不法事跡帝命逯杲按之降敕徧諭羣臣欽驚曰前降敕遂捕石將軍今復爾殆矣反謀遂決㑹孫鏜西征師未發欽令其黨欽天監正湯序擇庚子昧爽臨朝遣將謀以是時擁兵入廢帝而吉祥以禁兵應之計定召諸達官夜飲時孫鏜及恭順侯呉瑾俱宿朝房指揮馬亮恐事敗逸出走告瑾瑾趨告鏜鏜由門隙投疏入帝即收吉祥敕皇城及京師諸門俱勿啟欽知事泄夜馳往杲家殺杲砍傷李賢于朝房以杲頭示賢曰杲激我也逼草奏釋已罪賢佯諾乃獲免欽遂率衆攻長安門不得入賊往來呌呼門外鏜急召西征軍二千人擊之走攻東安門殺呉瑾天漸曙其黨方稍稍散欽率數騎走突安定諸門門盡閉奔歸家㑹大雨如法鏜督諸軍大呼入欽投井死其家無大小盡誅之帝出吉祥與欽尸同磔于市諸從逆者皆伏誅進孫鏜為侯河決開封城中大水丈餘官舍民居漂没者過半周王及諸守土官乗舟筏避于城外軍民死者不可勝計罷孫鏜西征遣都督馮宗充總兵官代之孫鏜等旣不行邊報益急因命宗充總兵官禦之起副都御史王竑于家與兵部侍郎白圭字宗玉南宫人參贊軍務八月保喇三上書乞和帝遣指揮使唐昇齎敕諭之自是每嵗入貢而冦掠如故明年白圭王竑巡邊遇敵皆敗之時穆爾格爾與保喇相仇殺未幾穆爾格爾死衆共立䝉古勒克哷青吉斯亦號小王子自是韃靼部長益各専擅固䝉古勒克哷青吉斯舊作馬可兒吉思今改後仿此九月京師地震有聲冬十一月丁酉朔日食壬午六年夏五月都督僉事顔彪擊廣西猺破之自元年春大藤峽在潯卅府桂平縣西北四山環繞綿亘數百里跨潯桞二府之間為猺獞窟穴猺為亂兩廣苗獞蠭起廣西殘燬殆徧前年帝命彪為總兵官討之彪㑹兩廣兵攻破七百餘寨駐軍大藤峽進擊龍山在州府貴縣北為藤峽左臂直抵潯梧所向皆㨗而彪多冒殺濫功勦捕不能盡賊故不久即發明年賊夜入梧州城刼官庫放罪囚執副使周璹殺家居布政使宋欽總兵官陳涇㩲兵自衛不敢發一矢乃縱賊出城而與之和賊亦尋遣璹還事聞帝降㫖切責而已秋九月皇太后孫氏崩謚孝恭皇后廣錦衣衛獄初逯杲給事門達左右達倚為心腹及杲得志達反為之用至是杲已死達欲踵其所為益布旗校于四方告訐者日盛尋以囚多獄舍不能容請城西武庫隙地增置之及達敗始毁去冬十一月葬孝恭皇后吕原罷原丁母憂詔葬畢即起視事原乞終制不允及抵家寢苫哀毁甫襄事而卒原佐李賢秉政賢通達遇事立斷原守正濟以持重㑹彭時亦入三人相得甚歡庶攻稱理原卒年止四十五人皆惜之癸未七年春二月以陳文字安簡廬陵人為禮部侍郎兼翰林學士入内閣預機務文自廣東左布政使丁母憂特召為詹事侍東宫講讀吕原卒帝問李賢誰可代者對曰柯潛字孟時莆田人可出告王翺翺曰陳文年資皆深舉潛置文何地明日賢入見固請用文帝乃許之文旣入閣每事與賢爭曰吾非若所舉也夏四月殺巡按御史李蕃雲南河陽人蕃巡按宣大錦衣衛偵事者言其擅撻軍職逮治之又遼東巡按御史楊璡山西巡按御史韓祺並以中官誣奏相次被逮蕃與祺並荷校死五月己丑朔日食冬十一月下錦衣衛指揮同知袁彬于獄尋釋之彬與門達同掌錦衣衛事彬恃帝舊恩不為達下達深銜之乃誣彬罪且言其嘗受曹石賄奏下彬于獄軍匠楊塤撃登聞鼓為彬訟寃語侵逹詔并下逹治時大學士李賢方被寵任數陳逹罪逹恨次骨欲并去之乃搒塤究主使塤知逹意即謬曰此李學士導我也逹大喜即奏聞請法司㑹鞫于門外帝遣中官裴當監視逹欲執賢與質當曰大臣不可辱乃止及訊塤仰曰吾小人何由見李學士門錦衣實教我言之逹色沮不能言彬亦歴數逹納賄狀法司畏逹不敢聞坐彬絞輸贖塤斬帝命彬贖畢調南京錦衣而禁錮塤甲申八年春正月帝不豫命太子視事文華殿有間太子于帝者帝卧文華殿密召李賢告之賢頓首伏地曰此國本也願陛下三思帝曰然則必傳位太子乎賢又頓首曰宗社幸甚帝起立召太子至賢扶太子令謝太子抱帝足泣帝亦泣讒竟不行帝崩遺詔罷宮妃殉𦵏初太祖崩宫人多従死者歴成祖仁宣二宗皆用殉多者至數十人景泰帝以郕王薨猶用其制至是帝遺詔罷之太子見深即位是為憲宗以明年為成化元年赦侍讀學士錢溥以罪貶官溥嘗授内使書東宫内侍王綸従受學英宗疾篤綸私詣溥計事陳文與溥比舍居密覘之已而英宗崩李賢當草詔文起奪其筆曰無庸已有草者因言溥綸定計欲以溥代賢而以兵部侍郎韓雍代尚書馬昂賢怒發其事會大斂時綸衰服襲貂帝惡之因數綸罪執下獄詞所連者十餘人謫溥順徳景泰中置縣今屬廣州府知縣降雍為浙江㕘政二月指揮僉事門達有罪下獄戍邉達先以王綸必柄用預為結納及綸敗調貴州都司衛甫行言官交章論其罪逮繋論斬後貸死謫戍廣西南丹衛始以内批授官帝命中官𫝊旨用工人為文思院副使自後相繼不絶一傳旨姓名至百十人謂之𫝊奉官文武僧道濫恩者以千數三月尊皇后為慈懿皇太后貴妃周氏為皇太后帝命議上兩宫尊號中官夏時欲獨尊貴妃為太后李賢彭時持不可頃之中官𫝊貴妃㫖曰子為皇帝母當為皇太后豈有無子而稱太后者宣徳間有故事彭時曰今日事與宣徳異胡后上表讓位故正統初不加尊今名分固在安得為比中官曰如是何不草讓表時曰先帝時未嘗行今誰敢草中官復厲聲怵之時拱手面天曰太祖太宗神靈在上敢有二心且錢皇后無子何所規利而為之争不忍黙者欲全主上聖徳爾若推大孝之心則兩宫並尊為宜賢亦極言之議遂定將上册寶彭時曰兩宫同稱則無别錢皇后請加二字以便稱謂従之越數日中官覃包至内閣曰上意固如是但迫於太后不敢自主非二公力爭㡬誤大事陳文初黙無一語聞包言大愧放宫人時日黯無光李賢偕同官上言日者君象君德明則日光盛惟陛下敬以脩身正以御下剛以斷事明以察微持之不怠則天變自弭又言天時未和由陰氣太甚自宣徳至天順間選取宫人太多浣衣局没官婦女愁怨尤甚皆宜放還帝従之中外大恱召岳正還詔正以原官直經筵正自謂當大用而李賢欲用為南京祭酒正不恱㑹有忌者偽為正劾賢疏草賢嗛之未㡬出為興化知府正至官為政具有條理而卿士大夫多不樂之正亦厭吏後以入覲遂乞罷卒于家復立團營明年正月復罷又明年復立夏四月癸未朔日食不見五月大風雨雹李賢上言天威可畏陛下當凛然加省無狎左右近幸帝納之葬裕陵謚曰睿皇帝廟號英宗明史賛曰英宗承仁宣之業朝野清宴大臣輔政綱紀未弛獨以王振擅權開釁遂至乘輿播遷乃復辟而猶追念不已抑何惑也然如釋建庶人之幽繋罷宮妃之殉𦵏則盛徳之事可法後世者矣秋七月立皇后吳氏順天人八月廢之冬十月立妃王氏上元人為皇后帝居東宫時萬貴妃諸城人已擅寵吳后既立摘其過杖之帝怒廢居别宫乃册王氏為后貴妃寵冠後宫妃時年三十冇五帝寵之耑房王后處之澹如也以是得安致仕禮部侍郎兼學士薛瑄卒諡文清瑄告歸凡七年及得疾危坐正寢而逝贈禮部尚書瑄學一本程朱其脩已敎人以復性為主嘗言自考亭以還斯道大明無煩著作直須躬行耳有讀書録二十卷皆自言其所得學者宗之隆慶中従祀孔廟始置皇莊以没入曹吉祥地為宫中莊田皇莊之名自此始給事中齊莊言天子以四海為家何必與民爭利弗聴自是戚里及中貴家多奪民地為莊田矣立武舉法直省舉諸武藝人兵部同總兵官考其䇿畧弓馬分别甲乙武舉廢已久至是復立之指揮以下子弟皆令入學憲宗皇帝乙酉成化元年春正月遣都督趙輔字良佐鳯陽人僉都御史韓雍討廣西猺守臣奏廣西猺獞流剽廣東又越湖廣江右日益蔓延乞選將征討兵部尚書王紘亦言賊非大創不止薦雍統兵乃命輔為征夷將軍召雍為僉都御史贊理軍務開納粟例開納粟例以備兩廣兵餉二月詔雪于謙冤御史趙敔武進人言于謙等為石亨輩誣陷榜示天下竊思正統十四年虜犯京城謙一人保守其功甚鉅乞收囘前榜死者䘏贈生者錄用帝曰朕在東宫時即聞謙冤謙有社稷之功而受無辜之慘所司其急如敔言施行釋子冕還家明年八月復冕官冕先授副千户遣行人往祭謙墓制辭有云當國家之多難保社稷以無虞惟公道之獨特為權奸所並嫉在先帝已知其枉而朕心實憐其忠天下傳誦馬帝耕耤田彗星見三月帝視國子監荆㐮盜起荆㐮上游為鄖陽古麇庸二國地元至正間流賊聚此為亂終元世不能制洪武初鄧愈以兵𠞰除空其地禁流民不得入然地界秦豫楚之間又多曠土山谷院塞林箐蒙昧中有草木可採掘以食正統二年嵗饑民徙入不可禁其中巧黜者稍稍相雄長漢中守臣以聞請誅之英宗曰小民為饑寒迫耳奈何即用兵命御史往撫輯謫戍數人餘陽聴撫而大奸潛伏不出尋復縦三省長吏又多諉非已境因循不治至是有劉通者河南西華人有膂力縣治門有石獅重千斤通手舉之因號劉千斤糾其黨石龍號石和尚劉長子等聚衆數萬為亂偽稱漢王建元徳勝冦襄鄧境指揮陳昇等二十四人死焉已而朝廷命朱永字景長謙之子白圭討之至南漳隋縣今屬㐮陽府連敗賊在是年冬偵知賊巢在豆沙河在鄖陽府保康縣西北下流入筑水萬山之中列為七屯諸軍分道進賊據險下木石如雨官軍四面仰攻蟻附而登遂擒通送京師俘斬無算在明年春石龍劉長子逸去轉掠四川燬巫山注見前太昌後周縣今屬䕫州府圭分兵蹙之賊被圍食盡長子縛龍以降賊小熄在明年冬夏六月奪張瑾楊宗襲爵瑾父太平侯軏宗父興濟伯善俱以奪門功封時以迎復襲爵者皆革奪惟瑾宗尚襲封指揮同知董源等援例乞復遂并革瑾宗秋八月兩畿湖廣浙江河南饑給事中袁芳等上言比来救荒無術老弱轉死丁壯流移南陽荆襄流民十餘萬兩京浙豫或水或旱禾麥絶收乞敇官司賑濟于是命王恕字宗貫三原人及浙豫撫按各賑其屬旋遣工部侍郎沈義往保定僉都御史吳琛繁昌人往淮陽内外諸臣請緩征鹽鈔逋賦等皆従之義琛無他策惟條上納粟事例既而皆以不恤民瘼斥罷冬十一月韃靼瑪拉噶冦延綏敵衆甚盛詔大同總兵楊信寧夏總兵李杲陜西巡撫項忠字藎臣秀水人等率所部兵禦之官軍力戰乃引去初韃靼来攻或在遼東宣化大同或在寧夏莊浪甘肅去来無常為患不久景泰初始犯延綏然部落少不敢深入天順間有阿勒楚爾舊作阿羅出今改者率屬潜居河套遂逼近西邉河套古朔方地唐張仁愿築三受降城處也地在黄河南自寧夏至偏頭闗延袤至二千里饒水草外為東勝衛即古東勝州注見前明初于此置左右二衞永樂後廢東勝而外土地平衍敵来不能隠明初守之後以曠絶内徙至是保喇與小王子瑪拉噶等先後繼至擄中國人為嚮導抄掠延綏無虚時矣韓雍破猺于大藤峽初國子監生封登奏潯州夾江諸山險峻中有大藤如斗延亘兩崖勢如徒杠蠻衆蟻度號大藤峽登峽巔數百里顧盼可盡諸蠻倚為奥區中産猺人藍胡侯槃四姓為渠魁又有獞人善傅毒弩矢中人無不立斃四姓猺亦憚之自景泰以来嘯聚為亂隳城殺吏所至邱墟乞調兵𠞰滅報聞及朝議用兵編脩邱濬字仲深瓊山人上書李賢言賊在廣東者宜驅在廣西者宜困賢善之獻于朝詔錄示諸將諸將多主其說欲分兵兩廣韓雍曰不然賊已蔓延數千里而所至與戰是自敗也大藤峽賊之巢穴我以前師搗之心腹既潰餘迎刃解耳趙輔知雍才足辦賊軍謀一聴於雍雍乃倍道馳全州注見前破陽洞叛苗又自桂林破脩仁唐縣今屬平樂府荔浦漢縣今亦屬平樂府諸賊尋長驅至峽口儒生里老數十伏道左願為嚮導雍見即罵曰賊敢紿我叱左右縛斬之左右皆愕既縛袖中利刃出推問果賊也悉支解刳腸胃分掛林箐間纍纍相屬賊大驚曰韓公天神也雍督諸軍水陸並進連破山南石門林峒古營諸巢焚其室廬積聚賊皆奔潰追躡至九層崖在大藤峽北等山先後破賊三百二十四塞生擒賊渠侯大狗及其黨七百餘人斬首三千二百有竒墜溺死者不可勝紀先是峽中大藤晝沈夜見賊以為神及是雍用斧斷之改名斷藤峽勒石紀功而還捷聞帝賜勅嘉勞召輔還封武靖伯雍進右副都御史提督兩廣軍務明年餘賊鄭昂等攻陷洛容北流諸縣流刦至廣東境雍發兵撲滅之林各容唐縣今屬柳州府北流隋縣今屬鬱州丙戌二年春三月遣右都督李震南陽人討靖州苗破之湖廣靖州銅鼓五開武崗注俱見前等苗為患巡撫王儉不能討乃以命震震督諸軍由銅鼔天柱明守禦所後改縣今縣屬貴州鎮逺府諸境分道入破八百餘塞又大破猺獞于桂陽威名著西南苗獠畏懾呼為金牌李南畿大饑發淮徐倉米四十萬石賑之夏五月李賢以父喪起復脩撰羅倫字彜正吉安永豐人疏諫貶福建市舶司副提舉百官志市舶司掌海外諸番朝貢市易之事提舉秩従五品副提舉従六品賢丁父憂令馳驛歸葬即還視事賢再疏乞終制不許及還京脩撰羅倫詣賢沮之不聴倫遂上疏諫畧曰臣聞朝廷援楊溥故事起復李賢竊謂賢大臣起復大事綱常風化繋馬昔子夏問三年之喪金革無避禮與孔子曰魯公伯禽有為為之也今陛下于賢以金革之事起復之與則未之有也以大臣起復之與則禮所未見也且陛下必欲賢身任天下之事則賢身不可留而口實可言或降温旨使賢于天下事知必言言必盡陛下于賢之言聞必行行必力賢雖不起復猶起復也苟知之而不能盡言言之而不能力行賢雖起復無益也又何必逆先王之禮經捐大臣之名節哉疏入黜為福建市舶副提舉王翺以文彦博救唐介事諷賢賢曰潞公市恩歸怨朝廷吾何可效之竟不従後賢卒商輅復入閣以為請倫始復官尋乞歸以金牛山人跡罕至築室讀書其中四方従學者甚泉稱為一峰先生久之卒嘉靖中贈左諭徳諡文毅萬金牛山在吉安府安縣南秋七月封弟見治英宗第八子為沂王未之藩薨見沛英宗第九子徽王後之藩鈞州冬十二月少保華葢殿大學士李賢卒諡文達閣臣得君自三楊以後無如賢者而賢亦自以受知人主所言無不盡及是卒帝震悼贈太師賢常言内帑餘財不以賉荒濟軍則人主必生侈心而移之于土木禱祠聲色以故頻請發帑賑貸恤邉前後不可勝計故事方面官三品大臣保舉行之既久營競成風賢令吏部每缺舉二人請帝簡用並推之例始此當時翕然稱為賢相然自郎署受知景泰帝超擢侍郎而所著書詆帝荒淫多過其實而其抑葉盛擠岳正不救羅倫尤為世所惜云以太常寺少卿兼侍讀學士劉定之入内閣預機務李賢既卒故有是命定之以文學名一時嘗冇中旨命元宵詩内使却立以俟據案伸紙立成七言絶句百首又嘗一日草九制筆不停書人咸服其敏捷云鎮守開原太監韋朗有罪赦不問時内侍梁芳韋興詔事萬貴妃日進美珠珍寶錢能韋眷王敬鄭忠等爭假採辦名先後出監大鎮皆縦恣帝以妃故不問也朗鎮開原坐失律當逮治其同官鎮守太監李良上言昔武侯失律街亭韓琦喪師西夏兵家之常未嘗以一𤯝遂棄朗請戴罪立功兵部議勿許内批允之丁亥三年春二月丁酉朔日食瑪拉噶三上書求貢許之時韃靼諸部内爭保喇弑䝉古勒克哷青吉斯瑪拉噶殺保喇更立他汗史無名阿勒楚爾復與瑪拉噶仇殺瑪拉噶殺其所立汗逐阿勒楚爾使使入貢尋渡河掠大同帝命撫寧侯朱永等征之㑹瑪拉噶再乞通貢而别部長頗羅鼐舊作字魯乃今改後仿此亦遣人入京帝許之詔永等駐軍塞上給事中程萬里上言瑪拉噶窺伺邉彊其情叵測然臣度其有可敗者三近我邉地止二三日程彼客我主一也兼并諸部馳驅不息既驕且疲二也比来散逐水草部落四分兵力不一三也宜選精兵一萬統以驍將使探瑪拉噶所在潛師𢷬之破可必也帝壯其言而不能用御經筵故事經筵講畢辭退帝必口宣賜酒饌閣臣講官並承旨叩謝出及是劉定之請以例賜毋煩玉音自是君臣之間無一辭相接時咸以定之巽順為過云三月召商輅復入内閣驛召至京以故官入閣夏四月四川地震四川自去年六月至於是月地三百七十五震勅所在官吏脩省遣使祭其山川雷震南京午門詔羣臣脩省言官劾罷户部尚書張睿南京禮部侍郎俞綱等于是陳文彭時商輅劉定之姚䕫字大章桐廬人並乞免上皆慰留六月遣㐮城伯李瑾隆之子尚書程信等討四川山都掌蠻今四川叙州府興文縣本西南蠻地名大壩都掌元置戎州明降為縣後又改縣曰興文即今縣是也通志蠻有山都六鄉水都四鄉而山都尤為强悍叛服不常山都掌蠻叛陷合江注見前等九縣朝議大發兵討之以瑾佩將軍印充總兵官信進尚書信先為兵部侍郎提督軍務師至永寕明宣撫司今改縣為叙永㕔治分道進所向克捷先後焚賊塞二千斬首三千有竒獲鎧仗孳畜無算又討平九姓苗明史地理志永寧有九姓長官司地今在叙永㕔界之不奉化者改大壩為太平川長官司今廢為大壩營在叙永㕔西北分都掌地設官建治山都水都分地以治控制之師還瑾進為侯信亦進秩兼大理卿與白圭同涖兵部秋八月増江西督賦官巡按御史趙敔言江西賦繁官少催徴不力逋負者多請増設司府佐貳官俾專督理乃增布政使㕘政一南昌吉安撫袁臨江饒瑞七府同知各一冬十二月杖謫翰林院編修章懋字徳懋谿人黄仲昭名潛以字行莆田人檢討莊㫤字孔暘江浦人以明年上元張燈命詞臣撰詩詞進奉懋仲昭㫤同疏進諫畧曰今川廣未靖遼左多虞三楚豫章赤地千里正陛下宵旰焦勞之日不宜更耽宴樂至翰林以論思為職宣宗皇帝御製翰林箴曰啟沃之言惟義與仁堯舜之道魯以陳張燈豈堯舜之道詩詞非仁義之言乞停止烟火移此視聽明目達聰省此貲財賑饑恤困則災祲可銷太平可致帝以元夕張燈祖宗故事責懋等妄言杖之謫懋仲昭知縣㫤通判時以懋等與羅倫同稱翰林四諫懋等在道以言官論救懋仲昭改南京大理評事㫤改南京行人司副戊子四年春三月禁勲戚請民田夏四月慶雲伯周夀昌平人周太后弟求涿州田許之先是番僧扎實巴勒舊作創實巴今改乞静海地為常住田嘉善公主英宗女下嫁王增求文安地數百頃德王請夀張地四千餘頃皆予之給事中邱𢎞字寛叔上杭人等言洪武永樂年間以畿輔山東土曠人稀聴民開墾永不科稅邇者權豪怙勢率指為閒田奏乞至數十百頃夫地踰百頃古者百家恒産也豈可徇一人之私而奪百家恒産帝然之詔自今請乞皆不許扎實巴勒等所乞還之於民未㡬夀以太后弟冒禁求琢州田六十餘頃帝不得已許之自是翊聖夫人劉氏求通州武清地三百餘頃夀弟彧求武强武邑地六百餘頃皆予之給事中李森字時茂歴城人疏諫不省加番僧封號西僧札巴置勒木燦舊作劄巴堅參今改以祕密敎進封萬行莊嚴功徳最勝智慧圓明能仁感應顯國光敎𢎞妙大悟法王西天至善金剛普濟大智慧佛其徒封國師錫誥命者不可勝計服食器用僣擬王者出入乘椶輿衛卒執金吾仗前導其他羽流加號真人高士者亦盈都下而佞倖由兹進矣陳文卒文素以才自許在外頗著績效及居宫端行事鄙猥既㕘大政無所建明子弟家人大通賄賂羅倫論李賢奪情文内媿文為詹事時方丁母憂陰助賢逐倫益為時論所鄙六月慈懿皇太后錢氏崩諡孝莊皇后九月塟孝莊皇后初英宗大漸遺命曰錢皇后干秋萬嵗後與我同葬方英宗北狩后傾中宫貲佐迎駕夜哀泣籲天倦即卧地損一股以哭泣復損一日及在南宫英宗不自得后曲慰解故遺命如是大學士李賢退而書之冊及營裕陵賢請營三壙中旨不可事遂寢至是周太后不欲后合葬帝召大臣議彭時曰合葬裕陵主祔廟定禮也翌日又問時對如前帝曰朕豈不知慮他日妨母后耳時與商輅劉定之合辭言曰皇上大孝當以先帝心為心今若安厝于左而虚右以待將来則兩全其美矣帝頷之是夕時等復疏言漢文帝尊生母薄太后而吕后仍葬長陵宋仁宗追尊生母李宸妃而章獻劉后仍袝太廟今若陵廟之制未合則有乖前美貽譏束葉下禮官及羣臣集議皆請如時言帝曰乖禮非孝違親亦非孝其議别卜明日廷臣百四十七人並上疏諫又明日禮部尚書姚夔合諸大臣疏言天下者祖宗之天下皇上當守祖宗成法豈可阿順母后顯違前典帝猶豫未決給事中毛𢎞字士廣鄞人倡言此大事吾輩當以死争合羣臣伏哭文華門外帝命退衆叩頭曰不得旨不敢退自已至申帝與太后皆感動乃許之羣臣呼萬嵗出冬十一月都督劉玉字仲璽磁州人副都御史項忠討開城今平凉府固原州明初為開城縣叛酋滿俊平之滿俊亦名滿四其祖自洪武初即率所部歸附世以千户畜牧為雄長仍其故俗無科徭地在開城縣固原里俊素獷悍藏匿奸盗㑹有獄辭連俊有司跡捕至其家多要索遂激衆為亂據石城在固原州西北石城即唐吐蕃石堡城在山巔四壁削立惟一徑可縁而上最稱險固官軍討之屢為所敗不數月衆至數萬闗中震動乃以玉為平虜副將軍忠總督軍務討之既抵石城前軍已屢敗賊乘勝逐之玉中流矢被圍衆欲退忠斬一千户以徇親當矢石不少避玉得出復連戰數十賊大衂會天寒甚忠慮賊乘凍渡河與套冦合乃督兵直薄城下列圍困之有賊夜出汲被獲忠貰其死賜之金帶鈎縦歸使誘俊出戰伏兵擒焉賊盡殱於是毁石城送俊京師伏誅己丑五年夏五月以禮部侍郎萬安字循吉眉州人兼翰林學士入内閣預機務安由編修累遷禮部左侍郎外寬而中深同年生詹事李泰中官永昌養子也齒少於安安兄事之得其歡泰毎當遷必推安出已上至是議簡閣臣復推安曰子先之我不患不至故安得入閣而泰忽暴病死安無學術既柄用惟日事請託結諸閹為内援時萬貴妃寵冠後宫安使内使致殷勤自稱子姪行妃嘗自媿無門閥聞則大喜妃弟錦衣指揮通遂以族屬數過安家兩家婦女日相往來通妻著籍禁中恣出入安得備知宫中動静益自固六月癸丑朔日食秋八月吏部侍郎兼學士劉定之卒諡文安下刑部郎中彭韶字鳳儀莆田人監察御史季琮于獄太后弟周彧奏乞武强武邑民田不及賦額者籍為閑田彧已乞二縣地六百頃此又欲于其外籍民田也帝遣官按視皆民所墾闢輸賦者因據籍步之毎畝百步餘没入為閒田得七十餘頃彧不滿復言于帝改命韶琮覆視韶琮往不復步田周視徑歸上疏自劾曰真定田自祖宗時許民墾種即為恒産除租賦以勸力農功臣戚里家與國咸休豈當與爭尺寸地臣誠不忍奪小民衣食附益貴戚請伏奉使無狀罪疏入詔以田歸民而責韶琮方命下詔獄言官爭論救乃釋冬十一月起復韓雍總督兩廣先是雍以兩廣地大事殷請於東西各設巡撫帝可之而命雍總理軍事未㡬雍以憂歸賊復熾僉事陶魯字自强鬱林人言兩廣地勢錯互當如臂指相使不可離析近賊入廣西臣與廣東三司議調兵匝月未決以是賊得大肆刼掠乞仍命大臣一人總之庶事權歸一而責有所歸乃起雍為總督開府梧州庚寅六年春二月遣使分巡州郡兵部尚書白圭等言陜西屢遭冦掠川廣盗攘未息疫癘行於閩越災異見於淮南兩畿齊豫雨雪愆期二麥槁死荆襄流民動數十萬姦盜由之乞簡大臣循行天下便宜興革于是遣大理寺少卿宋旻浙江淳安人侍郎曾翬字時叔泰和人原傑字子英陽城人黃琮副都御史滕昭巡視畿南大名諸府浙江河南四川福建勅遣之奏斥貪殘吏甚衆其南直𨽻陜西山西山東湖廣荆㐮兩廣貴州有巡按者江西有撫民按察使者及雲南多土官皆不遣使責所在司恤民察吏三月命撫寧侯朱永都御史王越字世昌濬人等禦敵延綏先是瑪拉噶雖求貢而屢犯延綏守將許寧字志道貴之子撃退之事在四年尋復糾三衛入冦榆林大擾大同巡撫王越遣寧及楊信等連敗之事在五年至是頗羅鼐與阿勒楚爾合别部伽嘉色凌舊作癿加思蘭博勒呼舊作孛羅忽今並改亦入據河套伽嘉色凌舊居土魯番在哈密西今屬闢展其東為火州即唐髙昌縣又東為栁陳即唐栁中縣其西有交河即唐交河縣治天順間嘗遣使朝貢朝廷使往撫諭之已乃稍引而東與諸部相雄長遂竊入套中為久逺計延綏告急帝命永為將軍以越㕘贊軍務往禦之永至數以捷聞越等皆論功陞賞而敵據套自如既而帝以兵部尚書白圭言命廷議大發兵捜套乃以武靖侯趙輔為將軍節制諸路王越仍督師敵大入延綏輔不能禦未㡬召還以寕旨伯劉聚代之聚亦未有功而瑪拉噶頗羅鼐稍衰敗伽嘉色凌繋殺阿勒楚爾結元裔們都埒居套中稱漢伽嘉色凌為太師事在八年按們都埒舊作滿都魯今改後倣此夏四月旱北畿山東河南大旱陜西四川山西兩廣雲南並饑六月戊申朔日食大水順天河間永平諸府大水時旱澇相仍民食草木㡬盡従吏部尚書姚夔請遣使賑恤秋七月皇子即孝宗生於西内皇子母紀氏賀縣人本土官女征蠻俘入掖庭警敏通文字命守内藏時萬貴妃專寵而妒後宫有娠者皆墮之帝偶行内藏妃應對稱旨恱幸之遂有娠萬貴妃知而恚甚命婢鈎治之婢謬報曰病痞乃謫居安樂堂久之皇子生使門監張敏同安人溺焉敏驚曰上未有子奈何棄之稍哺粉餌飴密藏之他室貴妃日伺無所得時吳后廢居西内近安樂堂密知其事往来哺養帝與妃不知也辛卯七年春正月以余子俊字子英青神人巡撫延綏時冦數入邉兵部尚書白圭請罷延綏巡撫王銳遷安人推陜西布政余子俊代之先是延綏鎮治綏徳州屬縣米脂宋砦元為縣今屬綏徳州吳堡亦宋砦元為縣今屬葮州孤懸鎮外冦以輕騎入掠鎮兵覺而追之輒不及往往得利去子俊既至乃徙鎮榆林増益兵衛攻守器畢具榆林遂為重鎮冦抄漸稀軍民得安耕牧始立漕粟長運法初宣徳間従平江伯陳瑄請立兊運法事具前至是應天巡撫滕昭又變為長運令運軍徑赴江南水次交兊曰改兊加耗外復石增米一斗後數年命淮徐臨徳四倉之米悉改水次交兊而官軍長運遂為定制二月增設蕪湖荆州杭州鈔闗初抽分竹木止取鈔後易以銀冬十月命刑部侍郎王恕總督河道英宗初命官督漕分濟寧南北為二侍郎鄭辰字文樞浙江西安人治其南副都御史賈諒字子信嶧縣人治其北至是河道淤塞廷議分漕河沛縣以南徳州以北及山東為三道各委曹郎及監司專理且請簡風力大臣一人總理其事于是始命恕為總河十一月立子祐極柏賢妃出為皇太子祐極以五年四月生至是立為太子明年二月卒諡悼恭傳者謂萬貴妃害之也十二月彗星犯紫微光長竟天正晝猶見帝避正殿撤樂勅羣臣修省條時政得失彗至明年正月乃滅見閣臣于文華殿彗星久見羣臣多言君臣否隔宜時召大臣議政大學士彭時商輅力請中官約以御殿日召對且曰初見時情未洽勿多言姑俟他日將入復約如初比見時言天變可畏帝曰已知卿等宜盡心時又言昨御史有疏請減京官俸薪武臣不免觖望乞如舊便帝可之萬安遂頓首呼萬嵗欲出時輅不得已皆叩頭退中官戲朝臣曰若輩嘗言不及時召見及見止知呼萬嵗耳一時傳笑謂之萬嵗閣老帝自是不復召見大臣其後尹直入閣欲請見計事安止之曰君不聞彭公邪請召對一語不合輒叩頭呼萬嵗今吾輩每事盡言太監擇而聞之上無不允者勝面對多矣壬辰八年春二月預征山西河南陜西明年賦時議發兵搜套事見前于是内地騷然兵科給事中梁璟字廷英崞縣人言山西預征草豆毎夫科銀或至二十兩嵗旱民饑逃亡載路太原一縣五月内已有三百八十餘家人心駭懼乞發帑補買以甦民困事下戸部議格不行夏四月旱京畿連月不雨運河水涸五月占城遣使告難占城自洪武二年遣使奉表入貢代著恭順前年安南國王黎灝攻破占城擄其王盤羅茶全王弟盤羅茶恱逃山中遣使告難兵部言安南并吞與國若不為處分非惟失占城歸附之心亦恐啟安南跋扈之志宜遣官齎敕宣諭還其國王及家屬帝慮安南逆命欲俟其貢使至賜敇責之至是以盤羅茶恱請封命遣給事中陳俊俊明史作俊按同時有兩陳俊一為户部侍郎一即此等齎詔往而占城已為黎灝所據不克入秋南畿浙江大水癸巳九年春正月土魯番據哈密初哈密忠順王布拉噶舊作卜别革今改卒無子王母主國事伽嘉色凌見哈密無主乘隙侵掠謀據其地成化二年其頭目奏謂以都督同知巴圖穆爾舊作巴塔木兒今改後仿此襲封王爵詞極哀切帝乃擢巴圖穆爾為都督攝行國王事又卒其子哈商舊作罕慎今改後仿此請襲都督帝許之而不命其主國事政令無所出時土魯畨酋阿里舊作阿力今改後仿此自稱蘇勒坦舊作速檀今改乘機襲破哈密城虜王母及金印去留其妹婿伊蘭舊作牙蘭今改後仿此鎮之兵部言哈密實西域咽喉棄而不救恐赤斤䝉古苦峪城名今在西安府淵泉縣東南沙州等亦為所脅則我之藩籬盡撤而甘肅之患方殷使套冦不退闗中供億愈難矣乃遣都督同知李文學通政劉文四川榮縣人往甘肅經略文學檄哈商及赤斤罕東黙克埒畨部名在哈密北舊作也克力今改後仿此諸部集兵進討三月畿南山東大饑民相食山東境内忽黑暗如夜又大饑死者相枕籍骼無餘胔乃命免今年租夏四月辛酉朔日食閱武臣騎射帝以武備廢弛乃御西苑命將官騎射黜指揮李勝等四十六人已而重閱西苑罷定㐮伯郭嵩登之子等四人秋九月鎮守浙江太監李義殺指揮馬璋不問義至寧波指揮馬璋饋白金二十兩意不慊遂杖殺之璋母訟于朝上命義自陳言因公事杖璋璋病死非斃杖也帝命宥之總督延綏軍務王越襲冦于紅鹽池在榆林府西北與寧夏府接界破之自成化初以来邉患日熾至是們都埒博勒呼伽嘉色凌大舉深入直抵秦州安定諸邑總督延綏軍務王越策冦盡銳西出而不備東偏乃率總兵官許寧遊擊將軍周玉字廷壁滁人各將兵四千六百人従榆林紅兒山在榆林府北出境盡夜兼行涉白鹽灘即白鹽池在定邉縣西北北又百餘里探知賊老弱俱在紅鹽池乃分兵為十覆而身率寧玉張兩翼直薄其營伏兵又従後夾撃大破之焚其廬帳而還及冦飽掠歸則妻子畜産已蕩盡相對痛哭自是逺徙北去不復居河套間盜邊不敢大入亦數遣使通貢西陲得息肩者數年御批歴代通鑑輯覽卷一百五

body:
  text: 世忠聞汝為入建州曰建居閩嶺上流賊沿流而下七郡皆血肉矣亟率步卒三萬水陸並進直抵鳳凰山一名茶山在建寜府建安縣束五日破之汝為自焚死斬其二弟岳吉以徇擒其謀主謝嚮施逵及禆將陸必彊等五百餘人世忠初欲盡誅建民李綱自福州馳見世忠曰建民多無辜世忠乃令軍士駐城上聴民自相别農給生穀商賈弛征禁脇従者汏遣獨取附賊者誅之民感更生家為立祠捷聞帝曰雖古名将何以加世忠因進討江西湖廣諸盗帝如臨安從吕頤浩之請也二月以李綱為湖廣宣撫使置御前忠銳軍分降盗崔増李捧邵青趙延夀李振單徳忠徐文字彦武莱州掖縣人等所部兵為七將名御前忠銳軍隸歩軍司非樞宻奉㫖不許調遣徐文勇力過人揮刀重五十斤所向無前衆呼為徐大刀以功為沿海水軍都統制諸将忌之諧其将叛朝廷遣兵襲之文遂以所部海舟及官軍自明州浮海扺鹽城降于劉豫帝初御講殿自播遷以来經筵乆輟至是復之三月桑仲請合諸鎮兵復中原許之知郢州霍明襲殺仲仲將李横擊明走之仲上疏願協力收復京師乞朝廷舉兵為聲援吕頤浩信之乃命仲節制軍馬復劉豫所陷州郡仍命翟興解潜王彦陳規字元期宻州安邱人孔彦舟王亨等諸鎮撫使相為應援仲至郢州調兵知郢州霍明疑仲有逆謀誘而殺之襄鄧統制李横擊走明復其州河南鎮撫使翟興為其下所殺詔以其子琮代之劉豫將遷汴以興屯伊陽山憚之遣蒋頤持書誘興以王爵興斬頤而焚其書豫復隂㗖興禆将楊偉以利偉遂殺興擕其首奔豫興在河南累年軍少食乏而能激以忠義士莫不自奮金人畏之諸陵得不侵犯及死詔以其子琮嗣職夏四月以翟汝文字公巽丹陽人參知政事初汝文知宻州秦檜為州文學汝文薦其才故檜引以輔政汝文雖為檜所薦然性剛不為檜屈至對案相詬目檜為金人奸細未㡬即罷詔吕頤浩都統江淮荆浙諸軍事開府鎮江頤浩信桑仲之言屢請出師身自督軍北向秦檜因諷人言周宣王内修外攘故能中興今二相宜分任内外于是帝諭頤浩及檜曰頤浩治軍旅檜理庶務如種蠡分職可也乃命頤浩開府鎮江頤浩辟文武士七十餘人以神武後軍及御前忠銳崔増趙延夀二軍従行韓世忠張俊劉光世岳飛王􅊅楊沂中等皆隸焉已而頤浩次常州趙延夀兵叛于吕城犯金壇殺知縣胡思忠頤浩聞桑仲死已悔出師及延夀叛遂稱疾不進王徳追延夀至建平誅之頤浩尋召還行在鎮吕城鎮名在鎮江府丹陽縣東南金壇唐縣今屬江府建平宋縣今屬廣徳州劉豫徙居汴豫至汴尊其祖考為帝置于宋太廟是日暴風捲旂屋瓦皆振士民大懼豫分置河南汴京淘沙官兩京塜墓發掘殆盡賦歛煩苛民不聊生岳飛追曹成大敗之成走邵州成既陷道州復陷賀州帝命岳飛權荆湖東路安撫都總管付金字牌黄旗招成成聞飛至驚曰岳家軍来矣即遁飛追至賀州力戰大破之成乃自桂嶺即古萌渚嶠五嶺之第四嶺也注詳前置砦至北藏嶺與下蓬頭嶺俱桂嶺之支連控隘道以衆十餘萬守蓬頭嶺飛部纔八千人一鼓登嶺破其衆成奔連州唐置今𨽻廣東飛謂部將張憲徐慶王貴曰成黨散去追而殺之則脇従者可憫縦之則復聚為盗今遣若等誅其首而撫其衆慎勿妄殺累上保民之仁于是憲自賀連慶自邵道貴自彬桂招降者二萬與飛㑹連州進討成走入邵州金尼瑪哈為都元帥烏珠副之五月以權邦彦簽書樞宻院事邦彦獻圖中興十議遂有是命邦彦與政碌碌無所建明常助吕頤浩以排李綱士論少之未踰年卒育太祖後子偁之子伯琮于宫中賜名瑗元懿太子卒帝未有後范宗尹嘗造膝請建太子帝曰太祖以神武定天下子孫不得享之遭時多艱零落可憫朕若不法仁宗為天下計何以慰在天之靈于是詔知南外宗正事令廣選太祖後將育宫中㑹上虞縣丞婁寅亮上書曰先正有言太祖舍其子而立弟此天下之大公周王薨章聖取宗室育之宫中此天下之大慮仁宗感悟其說召英宗入繼大統文子文孫宜君宜王遭罹變故不㫁如帶今有天下者獨陛下一人而已屬者椒寝未繁前星不耀孤立無助有識寒心天其或者深戒陛下追念祖宗公心長慮之所及乎崇寧以来諛臣進說獨推濮王子孫以為近屬餘皆謂之同姓遂使昌陵之後寂寥無聞僅同民庶藝祖在上莫肻顧歆此金人所以未悔禍也望陛下于伯字行内選太祖諸孫有賢德者視秩親王俾牧九州以待皇嗣之生退處藩服庶幾上慰在天之靈下繫人心之望書奏帝讀之大感歎周王事見前婁寅亮字陟明永嘉人至是選秦王徳芳五世孫左朝奉大夫子偁之子伯琮入宫命張婕妤鞠之生六年矣尋以伯琮為和州防禦使賜名瑗其後吴才人亦請于帝乃復取秉義郎子彦之子伯玖命才人鞠之亦太祖後也尋賜名璩張浚以劉子羽知興元府時吴玠戍河池注見前王彦戍金州二鎮皆饑興元帥臣閉糴玠彦皆願得子羽守漢中浚乃承制拜子羽為經畧使知興元通商輸粟二鎮遂安韓世忠招曹成降之世忠既平范汝為旋師永嘉若将休息者忽由處信至豫章連營江濵數十里羣賊不虞其至大驚世忠因使董􅌈招成成方為岳飛所追乃率衆降得戰士八萬遣詣行在六月頒戒石銘于州縣以黄庭堅所書戒石銘頒于州縣令刻石文曰爾俸爾禄民膏民脂下民易虐上天難欺秋八月召朱勝非兼侍讀胡安國罷帝初即位召安國為給事中黄潛善惡之遂罷潛善去復召為中書舎人兼侍講安國因上時政論二十一篇畧言保國必先定計定計必先建都建都擇地必先設險分土必先制國制國以守必先恤民夫國之有民猶人之有元氣不可不恤也除亂賊選縣令輕賦歛更弊法省官吏皆恤民事也而行此有道必先立政立政有經必先覈實而後賞罰當賞罰當而後號令行人心順従惟上所命以守則固以戰則勝以攻則服天下定矣然欲如此顧人主志尚何如耳尚志所以立事也正心所以决事也養氣所以制敵也宏度所以用人也寛隠所以明徳也具此五者帝王之能事畢矣論入改給事中入對帝曰聞卿大名渇于相見何為累召不至安國辭謝居旬日再見以疾力求去帝曰聞卿深于春秋方欲講論遂以左氏傳付安國㸃句正音安國言春秋經世大典見諸行事非空言比方今思濟艱難左氏繁碎不宜虚費光隂耽翫文采莫若潛心聖經帝善之命兼侍讀専習春秋先是秦檜欲傾吕頤浩而專政乃多引知名士布列清要以自助安國嘗聞游酢論檜人材可方荀文若故力言檜賢于張浚諸人及頤浩自常州還憾檜欲去之問計于席益益日目為黨可也今黨魁胡安國在瑣闥宜先去之㑹頤浩薦知紹興府朱勝非代已都督帝從之命下安國奏勝非與黄潛善汪伯彦同在政府緘黙附㑹馴致渡江尊用張邦昌結好金人淪滅三綱天下憤鬱及正位冢司苗劉肆逆貪生苟容辱逮君父今强敵憑陵叛臣不忌用人得失繫國安危深恐勝非上誤大計帝為罷都督之命改兼侍讀安國復持録黄不下頤浩特命檢正黄龜年字徳卿福州人書行安國言有官守者不得其職則去臣今待罪無補既失其職當去甚明况勝非既臣論列之人今朝廷乃稱勝非處苗劉之變能調聖躬昔公羊氏言蔡仲廢君為行權先儒力排其說盖權宜廢置非所施于君父春秋大法尤謹于此建炎之失節者今雖特釋而不問又加進擢習俗既成大非君父之利臣以春秋入侍而與勝非為列有違經訓遂卧家不出頤浩勸帝降㫖曰安國屢召偃蹇不至今始造朝又數有請初論勝非不可同都督及改命經筵又以為非豈不以時艱不肯盡瘁乃欲求微罪而去其自為謀則善如國計何落職提舉仙都觀秦檜三上章留之不報侍御史江躋字元夀衢州常山人左司諫吴表臣字正仲永嘉人論勝非不可用安國不當責于是與張燾字子公饒州徳興人考宋有兩張燾一字景元神宗時給事中一即此程瑀字伯㝢饒州浮梁人胡世將字承公馬陵人劉一止字行簡歸安人林待聘樓炤等二十餘人皆坐檜黨並落職罷官臺省為之一空以孟庾同都督江淮荆浙諸軍事秦檜免榜其罪于朝堂先是起居郎王居正字剛中揚州人與秦檜善及檜執政與居正論天下事甚銳既相所言皆不酬居正疾其詭言于帝曰秦檜嘗語臣中國之人唯當著衣㗖飯共圖中興臣時心服其言檜又自謂為相數月必聲動天下今為相設施止是願陛下以臣所言問檜所行檜聞而憾之出居正知婺州及胡安國罷吕頤浩諷侍御史黄龜年劾檜等専主和議沮止國家恢復逺圖且植黨専權漸不可長乃罷檜相仍榜朝堂示不復用初檜所陳二䇿欲以河北人還金中原人還劉豫帝曰檜言南人歸南北人歸北朕北人将安歸檜語乃塞至是帝召直學士院綦崇禮語以是事及居正所言崇禮即以帝意載于制辭播告中外人始知檜之姦宻綦崇禮字叔厚髙人彗星見赦求直言九月韓世忠大敗劉忠于蘄陽今蘄州是本蘄春晉改名後雖復舊並得蘄陽之稱猶夀春之兼稱夀陽也忠走降劉豫世忠自豫章移師討劉忠駐兵岳州之長樂渡在岳州府平武縣西大敗之忠走淮西尋以衆數萬據白面山營柵相望世忠至與賊對壘奕棋張飲堅壁不動衆莫能測一夕與蘇格聮騎穿賊營候者訶問世忠先得賊軍號隨聲應之周覽以出喜曰此天賜也夜伏精兵三千于山下與諸将拔營而進賊方迎戰伏兵已馳入中軍奪望樓植旗盖傳呼如雷賊回顧驚潰世忠麾將士夾擊之破之忠走降豫宋史世忠傳作斬忠首與本紀不同今從本紀又解元傳元周覽賊砦得其形勢歸告世忠世忠遣元以兵薄賊賊衆莫支遂平與世忠傳五異今従世忠傳安解元字善良保軍人王倫還自金倫既被留乆之尼瑪哈使烏凌阿思謀見倫語及契丹時事倫乆困懐歸倡為和議謂思謀曰海上之盟兩國約為兄弟萬世無變雲中之役我實饋師賛成厥功上國之臣嘗欲稱兵南来先大聖恵顧盟好不許厥後舉兵以禍吾國果先大聖意乎况亘古自分南北主上恭勤英俊並用期必復古盍思乆逺之謀歸我二帝太母復我疆土使西北赤子無致塗炭亦足以慰先大聖之靈幸執事賛之思謀沉思曰君言是也歸當盡達之已而尼瑪哈至曰比上國遣使来問其意指多不能對思謀傳侍郎語欲議和决非江南情實特侍郎自為此言耳倫曰使事有指不然来何為哉人定者勝天天定者亦能勝人惟元帥察之尼瑪哈不答及是尼瑪哈忽至館中與倫議和縱之歸報倫至入對言金人情偽甚悉帝優奬之時方議討劉豫和議中格乆之乃以潘致堯為通問使復如金復以朱勝非為尚書右僕射同平章事兼知樞宻院事以王似為川陜宣撫處置副使張浚在闗陜三年訓新集之兵當方張之敵以劉子羽為上賔任趙開為轉運擢吴玠為大將子羽慷慨有才畧開善理財而玠每戰輙勝西北遺民歸附者衆故闗陜雖失而全蜀安堵且以形勢牽制東南江淮亦賴以安朝廷疑浚殺趙哲曲端為無辜任子羽開玠為非是乃以似為副使浚始不安金耶律伊都謀反伏誅遂大殺遼宗室冬十月遣官祫享于温州十一月王彦復秦州彦守金州數立竒功以捍蜀桑仲既死劇盜王闢董貴祁守忠等悉阻兵窺蜀彦皆擊平之至是敗劉豫將郭振于白石鎮在秦州清水縣西北亦曰白石堡復秦州張浚承制以彦節制商虢陜華州軍馬十二月罷湖廣宣撫使李綱綱至潭州湖湘羣盜先後就降綱上言荆湖自昔用武之地今朝廷保有東南制馭西北當于鼎澧荆鄂皆宿重兵使與四川襄漢相接乃有恢復中原之漸㑹吕頤浩言綱縦暴無善狀而諫官徐俯劉斐亦劾綱遂罷提舉崇福宫初取江浙湖南月樁錢吕頤浩朱勝非以軍用不足議令漕臣計月樁辦大軍錢物謂之月樁錢其錢許取經制錢充數不足取上供錢又不足取諸司封樁錢又并添酒錢瞻軍酒息錢常平錢淨制錢諸窠名皆許移用惟茶鹽錢不得用當時漕司不量州軍之力一例均科既有偏重之弊又所樁不給十之一二一月未畢而後月之期已逼于是郡邑多横賦大為東南民患召張浚知樞宻院事浚聞王似来上疏求解兵柄且論似不可任吕頤浩不恱朱勝非又以宿憾日短浚故召之而以盧法原為川陜宣撫副使與王似同治司事癸丑三年金天㑹十一年春正月李横舉兵侵金復潁昌府横屢敗劉豫及金兵詔以横為襄陽府鄧隨郢州鎮撫使詔春秋望祭諸陵二月劉子羽吴玠兵潰于饒風闗在興安州石安縣西金人入興元子羽玠還擊破之金人乆窺蜀以吴璘駐兵和尚原扼其衝不得逞將出竒取之乃以叛將李彦琪駐秦州睨仙人闗在漢中府鳳縣西南以綴吴玠河池之師復令游騎出熙河以綴闗師古時師古新復熙鞏諸州薩里罕自商於直𢷬上津隋縣故城在今鄖陽府鄖陽縣攻金州王彦以三千人迎敵而敗退保石泉薩里罕遂乗勝而進長驅趨洋漢劉子羽聞王彦敗亟命田晟守饒風闗而遣人召吴玠入援玠自河池日夜馳三百里至饒風以黄柑遺金将曰大軍逺来聊用止渇薩里罕大驚以杖擊地曰爾来何速耶遂悉力仰攻一人先登二人擁後先者既死後者代攻玠軍弓弩亂發大石推壓如是者六晝夜死者山積金乃更募死士由間道自祖溪闗在饒風闗北入繞出玠後乗髙以闞饒風諸軍不支遂潰金入洋州玠邀子羽去子羽不可而留玠同守定軍山注見前玠難之遂退保西縣注亦見前子羽亦焚興元退保三泉薩里罕遂入興元至金牛鎮本唐金牛縣後廢為鎮在今漢中府沔縣西南四川大震子羽従兵不滿三百與士卒取草芽木甲食之遺玠書訣别玠得書未有行意其愛將楊政大呼軍門曰節使不可負劉待制不然政輩亦舎節使去矣玠乃間道㑹子羽楊政字制天原州臨涇縣人子羽邀玠共守三泉玠曰闗外蜀之門戸不可輕棄復往守仙人闗子羽以潭毒山在沔縣西南形斗拔其上寛平有水乃築壁壘方成而金人已至距營十數里子羽據胡床坐壘口諸将泣告曰此非待制坐處子羽曰子羽今日死于此金人尋亦引去時張浚欲移守潼川子羽遺書言已在此金人必不南浚乃止金兵由斜谷北去子羽謀邀之于武休不及武休闗名在鳳縣東南薩里罕既至鳳翔遣十人持書招子羽子羽皆斬之而縱其一還曰歸語爾帥欲来即来吾有死爾何可招也初子羽聞有金兵預徙梁洋之積及金人深入饋餉不繼殺馬及兩河所僉軍士以食而子羽玠因腹背要擊之死傷十五六疫癘且作乃引衆還子羽玠因出師掩其後金人墮溪澗死者不可勝計盡棄輜重而走餘兵不能自拔者悉降子羽遂還興元金人始謀本謂玠在西邊故渉險東来不虞玠馳至雖入三州而得不償失未㡬王彦復金州金人遂棄均房三月李横傳檄收復東京劉豫以金人来戰于牟駞岡横師敗績潁昌復失横軍本羣盜無紀律勝則爭取子女玉帛故至于敗夏四月劉豫將董震以虢州来歸李成復冦陷之成欲降統制謝臯開封人臯指腹示之曰此吾赤心也自剖其心以死五月以韓肖胄字似夫琦曽孫簽書樞宻院事遣使金潘致堯還言金欲再遣重臣以取信遂寢出師之議而遣肖胄及胡松年字茂老海州懐仁人往金議和至齊劉豫欲以臣禮見肖胄無以應松年曰均為宋臣遂長揖不拜豫不能屈詔李横等班師還鎮禁邊兵侵齊以與金議和也仍禁諸路招納淮北及中原人来歸者六月岳飛討江廣羣盜悉平時䖍吉盗連兵冦掠循海廣恵英韶南雄南安建昌邵武宋軍名今福建邵武府是餘注俱見前汀諸州帝専命飛平之飛至䖍固石洞固石山洞也在雩都縣北雩都漢縣今屬贛州府賊彭友悉衆至雩都迎戰躍馬馳突飛揮兵即馬上擒之餘黨退保固石洞洞髙峻環水止一徑可入飛列騎山下令皆持滿黎明遣死士疾馳登山賊衆亂棄山而走騎兵圍之賊呼丐命飛令勿殺受其降因授徐慶等方畧捕諸郡餘賊皆破降之初帝以隆祐太后震驚之故宻令飛屠䖍城飛請誅首惡而赦脇從帝許焉䖍人感其徳繪像祠之及入見帝手書精忠岳飛四字製旗以賜之秋七月復置博學宏詞科八月翟琮棄軍奔襄陽劉豫遂陷伊陽劉豫盡有梁衛之地琮不能孤立乃棄伊陽􅋓圍奔襄陽沂王㮙有罪金人殺之㮙與駙馬劉文彦告二帝謀變金人按問無狀㮙等被誅九月吕頤浩免頤浩屢請興師復中原謂太祖取天下兵不過十萬今有兵十六七萬矣然自金人南牧莫敢攖其鋒比年韓世忠張浚陳思恭張崇屢奏人有戰心天将悔禍又金人以中原付劉豫三尺童子知其不能立國願睿斷早定決策北向今之精兵皆中原人恐乆而消磨他日難以舉事帝方主和議不従至是以水旱不時蘇湖二州地震下詔罪已求言頤浩連章待罪帝一日謂大臣曰國朝四方水旱無不上聞近蘇湖地震泉州大水輙不以奏何也㑹侍御史辛炳字如晦侯官人殿中侍御史常同字子政臨卭人論頤浩過惡遂罷為鎮南節度使提舉洞霄宫頤浩有膽畧善弓馬當國步艱難之日人倚為重然其再相也胡安國勸其法韓忠獻以至公無我為先報復恩讐為戒頤浩不能用以劉光世韓世忠為江東兩浙宣撫使王􅊅岳飛為荆湖江西制置使分屯沿江諸州時諸将擁重兵而無分地劉光世在鎮江月費至二十萬緡每聞易鎮則設辭不奉詔有急復遷延以避之朝廷無如之何故命四人易鎮光世為江東淮西宣撫使屯池州世忠為淮南東路宣撫使屯鎮江􅊅為荆湖制置使屯鄂州飛為江南西路制置使屯江州冬十月李成陷京西諸郡成陷鄧州復陷襄陽據之李横奔荆南知隨州李道及郢州李簡俱遁十一月復元祐十科取士法從朱勝非之言也金烏珠破和尚原于是宣撫司分陜西之地自秦鳳至洋州以利州制置使吴玠主之屯仙人闗金房至巴達鎮撫使王彦主之屯道州今四川違州本西魏通州宋改達州通川郡此云通州盖通川之誤文龍至威茂統制劉錡主之屯巴西洮岷至階成統制闗師古主之屯武都十二月韓肖胄偕金使來帝自即位屢遣使如金多見拘留而金未甞遣一介報聘至是尼瑪哈使李永夀王翊来請還劉豫之俘及西北士民之在南者且欲畫江以益劉豫與秦檜前議脗合識者益知檜與金人共謀矣殿中侍御史常同言先振國威則和戰常在我若一意議和則和戰常在彼靖康以来分為兩事可為鑒戒帝因語及武備曰今養兵已二十萬有竒同曰未聞二十萬兵而畏人者也帝不聴復遣樞宻都承㫖章誼字宜叟浦城人為金國通問使請還兩宫及河南地肖胄與朱勝非不合尋罷甲寅四年金天㑹十二年春三月吴玠吴璘與金烏珠戰于仙人闗大敗之先是璘守和尚原饋餉不繼玠慮金人必復深入且其地去蜀逺乃命璘别營壘于仙人闗右名曰殺金平移兵守之至是烏珠薩里罕劉䕫帥步騎十萬由和尚原進攻仙人闗自鐵山注見前鑿崖開道循嶺東下玠以萬人守殺金平以當其衝璘自武階路入援先以書扺玠謂殺金平之地濶逺前陣散漫後陣阻隘宜益修第二隘示必死戰然後可以必勝玠従之急治第二隘璘冒圍轉戰七晝夜始得與玠㑹于仙人闗金人首攻玠營玠擊走之又以雲梯攻壘壁楊政以撞竿碎其梯以長矛刺之諸將有請别檡地以守者璘㧞刀畫地謂諸将曰死則死此退者斬金軍分為二烏珠陣于東韓常陣于西璘率銳卒介其間右繞左縈隨急而後戰戰乆璘軍少憊急屯第二隘金生兵踵至人被重鎧鐵鈎相連魚貫而上璘以駐隊矢迭射矢下如雨死者層積金軍踐而登薩里罕駐馬四視曰吾得之矣翌日金攻西北樓姚仲登樓酣戰樓傾以帛為繩挽之復正金人用火攻樓仲以酒缶撲滅之玠即遣統領田晟以長刀大斧左右擊明炬四山震鼔動地明日大出兵統領王喜王武率銳士分紫白旗入金營金陣亂奮擊射韓常中左目金人始宵遁玠遣統制官張彦刦横山砦王浚伏河池扼其歸路又敗之是役也烏珠以下皆擕妻孥来劉䕫乃劉豫腹心本謂蜀可圖既不得逞度玠終不可犯乃還據鳳翔授甲士田為乆留計自是不輕動矣以趙鼎參知政事鼎既輔政與簽書樞宻院事徐俯議不合俯尋罷朱勝非薦胡松年代之召孟庾還罷都督府以其兵屬張浚張浚至臨安罷為資政殿大學士居之福州浚雖被召以劉子羽等軍敗秘其事未行及是浚至臨安中丞辛炳與殿中侍御史常同等劾浚䘮師失地跋扈不臣遂落職奉祠福州居住安置劉子羽於白州唐置今廣西鬱林州愽白縣是浚即日行詔以王似為川陜宣撫使盧法原吴玠副之法原尋卒夏四月闗師古兵敗降于劉豫師古遣兵拔金寨數十金人大衂至是慕洧與金人合兵攻之師古戰不勝遂以洮岷二州降豫續綱目作降金考師古後為劉豫将入冦是降豫非降金也今依宋史改輯以范沖字元長祖禹子直史館重修神宗哲宗實録先是隆祐太后生辰置酒宫中從容謂帝曰宣仁太后之賢古今母后未有其比昔姦臣肆為謗誣雖嘗下詔明辨而國史尚未刪定豈足傳信吾意在天之靈不無望于帝也帝悚然至是召沖直史館重修神宗哲宗實録沖乃為神宗考異明示去取舊文以墨書刪去者以黄書新修者以朱書世號朱墨史又為哲宗辨誣録由是二史得其正而姦臣情狀益著其後論詆誣罪追貶章惇蔡卞等官五月以岳飛兼荆南制置使時楊太與劉豫通欲順流而下李成既據襄陽又欲自江西陸行趨浙與太㑹帝命飛為之備朱勝非言襄陽國之上流不可不急取飛亦奏襄陽等六郡為恢復中原基本今當先取六郡以除心膂之病李成逺遁然後加兵湖湘以殄羣盜帝以語趙鼎鼎曰知上流利害無如飛者除飛兼荆南制置使飛渡江中流顧幕屬曰飛不擒賊不渉此江秋七月岳飛復襄陽等六郡先是飛至郢偽齊將京超號萬人敵乗城拒飛飛鼓衆而登超投崖死飛復郢州遂趨襄陽李成迎戰左臨襄江飛笑曰步兵利險阻騎兵利平曠成左列騎江岸右列歩平地雖衆十萬何能為舉鞭指王貴曰爾以長槍步卒擊其騎兵指牛臯曰爾以騎兵擊其步卒合戰賊馬應槍而斃餘騎皆擁入江步卒死者無數成夜遁飛遂復襄陽齊人收成餘衆益兵駐新野飛與别將王萬夾擊大敗之又使牛臯復隨州王貴張憲復唐鄧州信陽軍襄漢悉平飛移屯德安軍聲大振捷聞帝喜曰朕素聞飛行軍有紀律未知其能破敵如此飛因奏金人所愛惟子女金帛志已驕惰劉豫僣偽人心終不忌宋如以精兵二十萬直搗中原恢復故疆誠易為力襄陽隨郢地皆膏腴苟行營田其利甚厚臣候糧足即過江北勦敵時方重深入之舉而營田之議自是興矣八月以趙鼎知樞宻院事都督川陜荆襄諸軍事徐俯既去言者謂當國者不知兵乞令參政通知由是鼎為朱勝非所忌除鼎樞宻都督鼎辭以非才帝曰四川全盛半天下之地盡以付卿黜陟専之可也鼎條奏便宜復為勝非所抑乃上疏言頃者陛下遣張浚出使川陜國勢百倍于今浚有補天浴日之功陛下有礪山帶河之誓君臣相信古今無二而終致物議以被竄逐夫䘮師失地浚則有之然未必如言者之甚也大扺専黜陟之典受不御之權則小人不安其分謂爵賞可以苟求一不如意便生觖望是時蜀士至于醵金募人詣闕訟之以無為有何以自明故有志之士欲為國立事者毎以浚為戒今臣無浚之功當此重責去朝廷逺恐好惡是非行復紛紛于聰明乏下矣望憫臣孤忠使得展布四體少寛陛下西顧之憂又言臣所請兵不滿數千半皆老弱所齎金帛至微薦舉之人除命甫下彈墨已行臣日侍宸扆所陳已艱難况在萬里之外乎遣吏部員外郎魏良臣使金初章誼至雲中論李永夀所需三事金人互有可否獨畫疆一事未定而尼瑪哈答書又約以淮南毋得屯兵盖欲畫江以益劉豫誼等還至淮陽為豫所留以計得免帝嘉勞乆之又命良臣奉表通問時金人已定議出兵而帝未之知也楊太敗官軍于鼎江在常徳府武陵縣北源出梁山下流至龍陽縣入沅謂之鼎口朗陵地志昔有神鼎出其間故名詔岳飛移兵討之先是詔都統制王􅊅㑹兵討楊太至是􅊅遣忠銳統制崔増等討太于鼎江師敗皆没太乘大水出兵攻破鼎州社木寨在武陵縣東守將許筌戰没官軍死者甚衆于是授飛清逺軍節度使代王􅊅討太飛時年三十二中興諸将建節未有如飛之年少者九月朱勝非罷先是勝非以母䘮去位詔起復之㑹乆雨勝非累章乞免且自論當罷者十一事帝未許侍御史魏矼字邦逹和州厯陽人劾其過勝非亦請解官持餘服許之劉豫使乞師于金遣其子麟入冦先是金主與尼瑪哈議南侵㑹烏珠還力言不可曰江南卑濕今士馬困憊糧儲未豐恐無成功尼瑪哈曰都監務偷安耳金主以議不合乃止至是劉豫聞岳飛復襄鄧遂乞師于金金主乃命鄂爾多達蘭調渤海漢軍五萬以應豫謂烏珠知地險易使将前軍豫遣其子麟姪猊各将兵㑹金兵南下騎兵自泗攻滁步兵自楚攻承州今揚州府髙郵州宋為軍建炎中改承州尋復舊以趙鼎為尚書右僕射同平章事兼知樞宻院事沈與求參知政事時邊報驟至舉朝震恐鼎将赴川陜陛辭帝曰卿豈可逺去當遂相朕制下朝士相慶冬十月詔韓世忠進屯揚州詔辭懇切世忠感泣曰主憂如此臣子何以生為遂濟師進屯揚州召張浚于福州初浚至福州慮金齊必併力窺東南而朝廷己議講解因上疏極言其状至是帝思其言㑹趙鼎勸帝親征帝從之喻樗字子才南昌人謂鼎曰六龍臨江兵氣百倍然公自度此舉果出萬全乎或姑試一擲也鼎曰中國累年退避不振敵情益驕義不可更屈故賛上行耳若事之濟否則非鼎所知也樗曰然則當思歸路耳張徳逺有重望若便宣撫江淮荆浙福建俾以諸道兵赴闕則其来路即朝廷歸路也鼎然之入言于帝遂召浚以資政殿學士提舉萬夀觀兼侍讀韓世忠大敗金人于大儀鎮名在揚州府甘泉縣西與泗州天長縣接界追至淮而還世忠至揚州使統制解元守承州候金歩卒親提騎兵駐大儀以當金騎伐木為柵自斷歸路㑹魏良臣使金過之世忠撤炊爨紿良臣有詔移屯平江良臣疾馳去世忠度良臣已出境即上馬令軍中曰眂吾鞭所嚮于是移軍向大儀勒五陣設伏二十餘所約聞鼓即起擊良臣至金軍中金前将軍聶哷貝勒舊作聶兒孛堇今改後仿此問官軍動息具以所見對聶哷貝勒大喜引兵至江口距大儀五里别将托卜嘉擁鐵騎過五陣東世忠傳小麾鳴鼓伏兵四起旗色與金人旗雜出金軍亂官軍迭進世忠令背嵬軍北人呼酒瓶為嵬大将之酒瓶必令親信人負之故韓岳皆取為親隨軍之名當時最號健銳見趙彦衛雲麓漫抄各持長斧上揕人胷下斫馬足金兵多陷泥淖世忠麾勁騎四面蹂躪人馬俱斃擒托卜嘉等二百餘人而世忠所遣董􅌈亦擊敗金兵于天長之鵶口橋解元至承州設伏以待又決河以遏之一日十三戰相拒未決世忠遣成閔将騎士往援復大戰俘獲甚多世忠復親追至淮金人驚潰相蹈藉溺死者甚衆論者以此舉為中興武功第一帝自將禦金次于平江金齊之兵日迫羣臣勸帝他幸散百司以避之張俊曰避将安之惟進禦乃可耳趙鼎曰戰而不捷去未晚也帝因曰朕為二聖在逺屈已和議而彼復肆侵陵朕當親總六師臨江決戰沈與求復力賛之鼎喜曰累年退怯敵志益驕今聖㫁親征将士必奮成功可必臣願効區區以圖報國于是以孟庾為行宫留守命百司不預軍旅之務者従便避兵以張俊為浙西江東宣撫使王􅊅為江西沿江制置使胡松年詣江上㑹諸将議進兵劉光世自建康移軍太平州時光世與韓世忠有私隙帝命御史魏矼等往諭解之光世始移軍為援太平州今安徽太平府是後宫自温州泛海如光州光世遣人諷鼎曰相公自入蜀何事為他人任患韓世忠亦曰趙丞相真敢為者鼎聞之恐上意中變乗間言陛下養兵十年用之正在今日若少加退沮即人心渙散長江之險不可復恃矣帝遂發臨安劉錫楊沂中以禁兵扈従韓世忠捷奏至帝次平江欲自渡江決戰鼎曰敵之逺来利在速戰遽與爭鋒非䇿也且逆豫猶遣其子豈可煩至尊耶帝乃止及胡松年自江上還云北兵大集然後知鼎之有先見也十一月詔暴劉豫罪逆于六師自豫僭逆朝廷以金故至名為大齊至是始聲其罪以厲六師以張浚知樞宻院事視師江上浚至見趙鼎執其手曰此行舉措皆合人心鼎笑曰喻子才之功也復命浚知樞宻院事以其盡忠竭莭詔諭中外浚既受命即日赴江上視師時達蘭烏珠擁兵十萬約日渡江決戰浚長驅臨江召劉光世韓世忠張俊議事将士見浚勇氣十倍浚既部分諸将身留鎮江以節度之十二月金人圍廬州岳飛使牛臯救之金兵敗走金齊合兵圍廬州守臣仇悆嬰城固守求援于飛飛遣牛臯徐慶援之臯至遥語金将曰牛臯在此爾輩胡為見犯衆愕然不戰而潰飛謂臯曰必追之去而復来無益也臯乃追擊三十餘里金人相踐及殺死者不可勝計魏良臣還自金良臣至金尼瑪哈言當割建州以南王爾家為小國索銀絹十萬犒軍仍約良臣等再使侍御史魏矼請罷講和二字以攻守代之飭厲諸将力圖攘敵遂不復遣金兵自淮引還達蘭屯泗州烏珠屯竹墪鎮在泗州東南路通天長六合為韓世忠所扼以書幣約戰世忠遣麾下王愈及兩伶人以橘茗報之且言張樞宻已在鎮江烏珠曰張樞宻貶嶺南何得乃在此愈出浚所下文書示之烏珠色變遂有歸意㑹雨雪餽道不通野無所掠殺馬而食蕃漢軍皆怒又聞金主病篤乃夜引還烏珠等既去劉麟劉猊不能獨留亦棄輜重遁帝謂趙鼎曰近将士奮勇爭先諸路守臣亦翕然自効乃朕用卿之力也鼎謝曰皆出聖斷臣何力之有或問鼎曰金人傾國来攻衆皆洶懼公獨言不足畏何也鼎曰敵雖衆然以劉豫邀而来非其本心戰必不力是以知其不足畏也帝語張浚曰趙鼎真宰相天使佐朕中興可謂宗社之幸鼎奏金人遁歸尤當博采羣言為善後之計于是詔宰執議攻戰備禦措置綏懐之方提舉臨安府洞霄宫李綱上疏曰陛下勿以退敵為可喜而以大仇未報為可憤勿以東南為可安而以中原未復為可恥勿以諸将屢捷為可賀而以軍政未修士氣未振為可虞議者或以敵馬既退當遂用兵為大舉之計臣竊以為生理未固而欲浪戰以僥倖非制勝之術也今朝廷以東南為根本苟不大修守備先為自固之計何以能萬全而制敵議者又謂敵人既退當且保據一隅以求目前之安臣謂祖宗境土豈可坐視淪陷不務恢復若今嵗不征明年不戰使敵勢益張而吾之所糾合精銳士馬日以耗損何以圖敵唯宜于防守既固軍政既修之後即議攻討乃為得計其守偹之宜則先料理東南屏蔽當于淮之東西及荆襄置三大帥屯全兵以臨之分遣偏師進守支郡加以戰艦水軍上連下接自為防守則藩籬之勢成然後可議攻戰之利分責諸路大帥因利乗便收復京畿以及故都㫁以必為之志而勿失機㑹則以弱為强取威定亂逆臣可除彊敵可滅若夫萬乗所居必擇形勢莫若權于建康駐蹕治城池修宫闕立官府創營壁使粗成規模以待巡幸至于西北之民皆陛下赤子荷祖宗涵養之深其心未嘗忘宋特制于彊敵不能自歸宜優加撫循使陷溺之民知所依怙臣竊觀近年以來所用之臣閒暇則以和議為得計而以治兵為失䇿倉卒則以退避為愛君而以進禦為誤國國勢益弱職此之由今天啟宸衷悟前日和議退避之失親臨大敵天威所加使北軍數十萬之衆震怖不敢南渡潜師宵奔則和議之與治兵退避之與進禦其效槩可見矣然敵兵雖退未大懲創安知其秋髙馬肥不再来擾我疆埸使疲于奔命哉且退避之䇿可暫而不可常可一而不可再退一步則失一步退一尺則失一尺往時自南都退至維揚則河北河東闗陜失矣自維揚退至江浙則京東西失矣萬一敵騎南牧将復退避不知何所適而可乎航海之䇿萬乗冒波濤之險此又不可之尤者臣願陛下自今以往勿復為退避之計天古者敵國善隣則有和親仇讐之邦鮮復遣使今金人造釁之深知我必報其指意為何如而我方且卑辭厚幣屈體以求之其不推誠以見信决矣器幣禮物所費不貲使軺往来坐索士氣而又邀我以必不可従之事制我以必不敢為之謀是和卒不成而徒為此擾擾也臣願自今以往勿復遣和議之使二者既定擇所當為者一切以至誠為之俟吾之政事修倉廩實府庫充器用備士氣振力可有為乃議大舉則兵雖未交而勝負之勢決矣惟陛下正心以正朝廷百官使君子小人各得其分則是非明賞罰當自然藩方協力将士用命雖彊敵不足畏逆臣不足憂此特在陛下方可間耳疏奏帝賜詔褒諭然卒不能用乙夘五年金熙宗亶仍稱天㑹十三年春正月乙巳朔日食召張浚還浚既還乃命韓世忠屯鎮江劉光世屯太平張俊屯建康俊嘗以其軍従上行至是始軍于外金主晟殂兄之孫亶本名哈喇太祖第二子勝額之子勝額後改名宗峻按哈喇舊作合剌勝額舊作繩果今改後仿此立是為金熙宗初尼瑪哈烏珠等㑹朝上京金以㑹寧府為上京金寧古塔東南有和碩城即其遺址以安班貝勒之位乆虚請立太祖之孫哈喇金主不得已許之哈喇即亶也至是金主殂廟號太宗葬恭陵後改葬大房山亶立進尊其考豐主勝額為景宣皇帝妣富察氏為恵昭皇后又追帝其先祖函普曰始祖烏嚕曰徳帝巴哈曰安帝綏赫曰獻祖阿庫納曰景祖和哩布曰世祖頗拉淑曰肅宗英格曰穆宗烏雅舒曰康宗妣皆為后復定景祖世祖太祖太宗廟皆不祧按巴哈舊作跋海終赫舊作綏可今改後仿此二月帝如臨安以趙鼎張浚為尚書左右僕射並同平章事兼知樞宻院事都督諸路軍馬鼎浚相得甚歡人知其将並相史館校勘喻樗獨曰二人宜且同在樞府他日趙退則張繼之立事任人未甚相逺則氣脈長若同處相位萬一不合而去則必更張是賢者自相背戾矣尋命浚如江上議邊防浚以建康東南都㑹而洞庭據上流恐揚太滋蔓為害請乗其急討之已而浚視師潭州至醴陵釋邑囚數百皆太諜者給以文榜俾招諭諸砦皆讙呼而去于是相率来降醴陵後漢縣今屬湖南長沙府吴玠復泰州吴玠聞金侵湖南遣吴璘楊政乗機牽制璘等出竒兵自天水至秦拔其城薩里罕聞秦州被圍集諸道兵来援政復擊敗之作太廟于臨安時太廟神主寓温州嵗時委守臣薦享司封郎中林待聘言神主禮宜在都今新邑未奠請考古師行載主之義還之行闕以彰聖孝于是始就臨安建太廟遣太常少卿張銖迎神主奉安帝行欵謁禮侍御史張致逺字子猷南劍州沙縣人言創建太廟甚失興復大計殿中侍御史張絢亦言去年建明堂今年立太廟是将以臨安為乆居之地不復有意中原不報閏月置總制司命户部尚書章誼措置財用以孟庾提領總制司先是帝在揚州四方貢賦不以期至吕頤浩葉夢得等言宣和間陳亨伯為陜西轉運使創經制錢大率添酒價増嵗額官賣契紙與凡公家出納每千收頭子錢二十三文其後行之東南及京東西河北嵗入數百萬緡所補不細今邊事末寧費用日廣請復行之諸路一嵗無慮數百萬計賢于緩急暴歛多矣帝従之至是又因經制之額増析為總制錢總制錢窠名甚多其數之可考者如酒務不論上下每升各増五文田宅契稅之外又令得産人出勘合錢十文又凡稅賦畸零如絹至二寸亦收一尺米至一秒亦收一升之類並令折納又常平錢物舊毎貫收頭子錢五文今依諸錢例亦收二十三文又免役寛剰錢並令發付行在嵗收錢至七百八十餘萬緡夏四月罷諸州鎮撫使先是陳規守徳安七年賊不敢犯召入朝乞罷鎮撫使帝從之不復除至是盡罷封周後柴叔夏為崇義公上皇卒于金遺言欲歸葬内地金主不許時兵部侍郎司馬朴與奉使朱弁在燕山聞之服斬衰朝夕哭金人義之而不責洪浩在冷山聞之北面泣血操文以祭其詞激烈聞者揮涕史臣曰徽宗之失國也疎斥正士狎近奸諛蔡京以儇薄巧佞之資濟其驕奢淫佚之志溺信虚無崇飾㳺觀君臣逸豫怠棄國政及童貫用事又勤兵于逺稔禍速亂遂致國破身辱豈得諉諸數哉自古人君玩物䘮志縱慾敗度鮮不亡者徽宗特甚焉爾龍圖閣直學士致仕楊時卒諡文靖時奉祠致仕優游林泉以著書講學為事及是卒年八十三初時為蕭山令博羅主簿羅従彦聞時得程氏之學慨然慕之徒步往學見時三日即驚汗浹背曰不至是㡬虚過一生矣既卒業歸築室山中絶意仕進學者稱為豫章先生延平李侗初従從彦學従彦令于靜中㸔喜怒哀樂未發前氣象而求所謂中者乆之于天下之理該攝洞貫以次融釋従彦甚重之侗嘗曰學問之道不在多言但黙坐澄心體認天理自見學者稱為延平先生蕭山唐縣今屬浙江紹興府博羅秦縣今屬廣東恵州府羅従彦字仲素李侗字愿中皆南劍州人五月遣忠訓郎何蘚使金罷中書舍人胡寅寅上疏言女真驚動陵寢戕毁宗廟刦質二帝塗炭生民乃陛下之大讐也自建炎丁未至紹興甲寅卑辭厚禮以問安迎請為名而遣使者不知㡬人矣知二帝所在見二帝之面得女真之要領因講和而能息兵者誰歟但見通和之使歸未息肩而黄河長淮大江相繼失險矣夫女真知中國所重在二帝所恨在刦質所畏在用兵則常示欲和之端増吾所重平吾所恨匿吾所畏而中國坐受此餌既乆而後悟也天下其謂自是改圖矣何為復出此謬計邪苟曰姑為是豈有修書稱臣厚費金帛而成就一姑息之事也苟曰以二帝之故不得不然則前效可考矣况嵗月益乆敵情益閟必無可通之理也適觀何蘚之事恐和說復行國論傾危士氣沮䘮所繫不細疏入詔褒諭之㑹張浚奏言使事兵家機權後將闢地復土終歸于和未可遽絶乃遣蘚行寅因乞外知邵州封瑗為建國公就學資善堂趙鼎請以行宫新作書院為資善堂命建國公聴讀且薦徽猷閣待制范冲兼翊善起居郎朱震字子發荆門軍人兼賛讀朝論二人極天下之選帝命瑗見之皆設拜行統元厯常州布衣陳得一所造也六月岳飛大破楊太于洞庭太死湖湘平飛奉命討太而所部皆西北人不習水戰飛曰兵何常顧用之何如耳乃先遣使招諭之其黨黄佐曰岳節使號令如山若與戰萬無生理不如往降節使誠信必善遇我遂降飛表授佐武義大夫單騎按其部拊佐背曰子知順逆者果能立功封侯豈足道欲復遣子歸湖中視其可乗者擒之可勸者招之如何佐感泣誓以死報時張浚至潭州席益疑飛玩冦欲以聞浚曰岳侯忠孝人也兵有深機胡可易言益慙而止黄佐襲周倫砦殺之飛上其功遷武功大夫㑹朝㫖召張浚還防秋飛袖小圖示浚浚欲俟来年議之飛曰已有定畫都督能少留八日可破賊浚曰何言之易飛曰王四廂謂王􅊅以王師攻水冦則難飛以水冦攻水冦則易水戰我短彼長以所短攻所長是以難若因敵将用敵兵奪其手足之助離其腹心之托使孤立而以王師乗之八日之内當俘諸囚浚許之飛遂如鼎州黄佐招楊欽来降飛喜曰楊欽驍悍既降敵腹心潰矣表授欽武義大夫禮遇甚厚乃復遣歸湖中兩日欽說全琮劉說来降飛詭罵欽曰賊不盡降何来也杖之復遣之是夜掩賊營降其衆數萬太負固不服方浮舟湖中以輪激水其行如飛旁置撞竿官舟迎之輙碎飛伐君山木為巨筏塞諸港汊又以腐木亂草浮上流而下擇水淺處遣善罵者挑之且行且罵賊怒来追則草木壅積舟輪礙不行飛急擊之賊奔港中為筏所拒官軍乗筏張牛革以蔽矢石舉巨木撞其舟盡壊太技窮赴水死宋史牛臯傳么先舉鍾子儀投于水繼乃自仆臯投水擒么與此所載不同飛入賊壘餘酋驚曰何神也俱請降衆凡二十餘萬飛親行諸砦慰撫之縦老弱歸田籍少壮為軍果八日而捷音至潭浚嘆曰岳侯神算也黄誠斬楊太首牛臯傳飛斬么首函送都督行府與此所載亦異挾鍾子儀詣浚降湖湘悉平初太恃其險官軍自陸襲則入湖水攻之則登岸因曰欲犯我者除是飛来至是人以其言為䜟云冬十月張浚還自潭州浚奏遣岳飛屯荆襄以圖中原乃自鄂岳轉淮東已而帝賜詔召還浚進中興備覽四十一篇帝嘉嘆置之坐隅冬十一月徵和靖處士尹焞于涪州初金人破洛焞闔門被害焞死復甦門人舁至山谷中而免劉豫聘之不従以兵恐之焞自商州奔蜀至閬得程頤易傳拜受之因止于涪闢三畏齋以居州人不識其面至是范沖舉以自代明年焞至建康以疾辭詔趨召入見命為秘書郎兼崇政殿說書以李綱為江西安撫制置大使張浚薦其忠也金伐䝉古䝉古在女真之北唐為䝉兀部亦號䝉古索其人勁悍善戰夜中能視以鮫魚皮為甲可捍流矢此續綱目所載皆本大金國志志又云金之初起常假兵于䝉古及得國不償元約由是䝉古遂有怨言金主命萬戸呼沙呼舊作胡沙虎今改按呼沙呼金國志作宋王宗磐考金史呼沙呼大定八年始充東宫䕶衛則此伐䝉古者又别一呼沙呼也將兵擊之乆之呼沙呼糧盡而還䝉古追襲之大敗其衆于海嶺萌事在紹興九年䝉古舊作骨今改丙辰六年金天㑹十四年春二月韓世忠圍淮陽金烏珠救之世忠還世忠聞劉豫聚兵淮陽即引軍渡淮旁去聲符離漢縣元省入宿州今州屬鳳陽府而北至其城下為賊所圍奮戈潰圍而出不遺一鏃呼延通與金將葉赫貝勒舊作牙合孛堇今改後仿此摶戰扼其吭而擒之乗銳掩擊金人敗去遂進兵圍淮陽賊約受圍一日則舉一烽至六烽具舉烏珠與劉猊皆引兵至世忠求援于張俊俊以世忠有見吞意不從世忠勒陣向敵遣人諭之日錦衣驄馬立陣前者韓相公也或危之世忠曰不如是不足以致敵敵果至殺其導戰二人遂引去世忠復還楚州淮陽之民従而歸者以萬計張浚㑹諸將于鎮江遣張俊屯盱眙韓世忠屯楚州張浚每稱二人可倚大事故並命之世忠至楚披草莱立軍府與士卒同力役夫人梁氏親織箔為屋将士有怯戰者世忠遺以巾幗設樂大宴俾婦人粧以恥之故人人奮厲撫集流散通商恵工山陽遂為重鎮夏六月張浚撫師淮上浚命劉光世屯合肥以招北軍楊沂中領精騎以佐張俊岳飛屯襄陽以圖中原且謂飛曰此君素志也先是飛以母䘮扶櫬還廬山起復為京湖宣撫使飛累表求終制不許地震求直言秋七月以郭浩為永興路經畧安撫使知金州金州殘弊浩撫輯流亡開營田他軍以匱急仰給朝廷浩獨積贏錢十餘萬緡以給戸部朝廷嘉之以陳公輔為左司諫公輔召還為吏部員外郎上言今口之禍實由公卿大夫無氣節忠義不能維持天下國家平時既無忠言直道緩急詎肯仗莭死義豈非王安石學術壊之耶安石政事壊人才學術壊人心三經字說詆誣聖人破碎大道非一端也春秋正名分定褒貶俾亂臣賊子懼安石使學者不治春秋史漢載成敗安危存亡理亂為世龜鑑安石使學者不讀史漢揚雄不死王莽之簒而著劇秦美新之文安石乃曰合于孔子無可無不可之義馮道事四姓八君安石乃曰善避難以存身使公卿皆師安石之言宜其無氣節忠義也疏入帝大喜授左司諫賜三品服已而公輔復請禁程氏學詔従之公輔疏言今世取程頤之說謂之伊川之學相率従之狂言怪語深辭鄙說曰此伊川之文也幅巾大袖髙視濶步曰此伊川之行也為伊川之文行伊川之行則為賢士大夫舍此皆非也乞禁止之時方召尹焞焞頤門人也公輔之意盖有所指云劉光世復夀春八月四川都轉運使趙開罷吴玠為宣撫副使専治戰守于財計不問盈虚一切以軍期趣辦于趙開數以饋餉不繼訴于朝開亦自劾老憊求去朝廷為之交解乃以席益為制置大使位宣撫副使上州軍兵馬並隸大使司邊防重事仍令宣撫司處置益至四川頗侵用軍期錢開復訴于朝又數増錢引而軍計猶不給朝廷以開益不協乃召開赴行在而以李迨東平人徙開封代之自金人侵陜蜀開職饋餉軍用無乏其後計臣屢易于開經盡無敢變更然茶鹽𣙜酤竒零絹布之征遂為蜀常賦開作俑之責不能逃焉益尋以母䘮亦去以秦檜為行營留守孟庾副之並參決尚書省樞宻院事張浚奏東南形勢莫重于建康實為中興根本且使人主居此北望中原常懐憤惕不敢暇逸而臨安僻在一隅内則易生安肆外則不足以召號逺近繫中原之心請臨建康撫三軍以圖恢復㑹諜報劉豫將南冦趙鼎議幸平江帝従之遂命檜庾留守並參決尚書省樞宻院事檜自被斥㑹與金議和稍復其官知温州紹興府又以張浚薦授醴泉觀使兼侍讀至是漸用事岳飛復蔡州飛累戰皆捷遣牛臯復鎮汝軍楊再興復河南長水縣注見前張浚曰飛措畫甚大今已至伊洛則太行一帶山砦必有響應者已而忠義社梁興等果歸之飛復及偽齊李成孔彦舟連戰至蔡州克其城九月帝如平江岳飛遣兵敗劉豫之衆于唐州上疏請進軍恢復中原帝不許飛乃還鄂飛遣王貴郝晸董先復虢州盧氏縣獲糧十五萬石降其衆數萬㑹劉豫屯兵唐州飛遣貴等攻破之焚其營飛因奏進取中原不許于是召貴等引還鄂州冬十月劉豫使劉麟劉猊分道冦淮西楊沂中等大敗猊于藕塘鎮名在鳳陽府定逺縣東追麟至南夀春今鳳陽府夀州本秦夀春縣唐為夀州治五代周顯徳中徙州治下蔡因以故治為南夀春至宋乾道中復還故治置安豐軍元為路明仍改夀州以縣省入而還劉豫聞張浚㑹諸将于江上榜其罪逆将進兵討之告急于金請先出師南侵而乞師救援金主召諸将相議之以富勒呼言富勒呼曰先帝所以立豫者欲其開疆保境我得安民息兵也今豫進不能取又不能守兵連禍結愈無休期従其請則豫收其利敗則我受其弊况前年因豫出師嘗不利于江上矣奈何許之遂不許豫而遣烏珠提兵黎陽以觀釁于是豫僉鄉兵三十萬分三道入冦麟率中路兵由夀春以犯合肥猊率東路兵由紫荆山在夀州東北出渦口注見前以犯定逺蕭梁縣今屬鳳陽府孔彦舟率西路兵由光州以犯六安時張浚楊沂中韓世忠岳飛劉光世分屯諸州而沿江上下無兵趙鼎深以為憂移書張浚欲令俊與沂中同保合肥浚以為然乃遣沂中張宗顔字希賢延安人等分道禦之且令沂中趣濠州注見前以與張俊合因謂沂中曰上待統制厚宜及時立功㑹邊報日急張俊劉光世皆張大賊勢以聞浚以書戒二將曰賊豫之兵以逆犯順若不𠞰除何以立國平日亦安用養兵為哉今日之事有進戰無退保及劉麟進逼合肥趙鼎曰今賊渡淮當急遣張俊合光世之軍盡掃淮南之冦然後議去留帝善之帝猶慮俊光世不足任因命岳飛盡以兵東下而手札付浚令俊光世沂中等還保江浚上言若諸將渡江則無淮南而長江之險與賊共之江南其可保乎今正當合兵掩擊可保必勝若一有退意則大事去矣且岳飛一動襄漢有警何所恃乎願朝廷勿專制于中使諸将有所觀望也帝手書報浚曰非卿識髙慮逺何以及此由是異議乃息沂中至濠光世已舎廬州将趣采石淮西大震浚聞之令吕祉字安老建陽人馳往光世軍諭之曰有一人渡江即斬以徇光世不得已復還廬州與沂中俊等相應劉猊軍至淮東為韓世忠所阻乃引趨定逺劉麟従淮西繫三浮橋而渡次于濠夀之間張俊以兵拒之猊率衆犯定逺欲趨宣化以冦建康沂中以兵進禦與猊前鋒遇于越家坊在定逺縣東南敗之猊恐孤軍深入為王師所襲乃欲趨合肥與麟合而後進至藕塘沂中復遇之猊據山列陣矢下如雨沂中急擊之使統制吴錫率勁兵五千突入其軍猊衆潰亂沂中縦大軍乗之而自以精騎衝其脇大呼曰賊破矣賊衆錯愕駭視張宗顔自泗来乘背擊之張俊大軍復與戰于李家灣在鳳陽縣南賊衆大敗横屍遍野猊以首扺謀主李愕曰適見髯將軍銳不可當果楊殿前也即與數騎遁去沂中躍馬叱之餘衆皆怖遂降麟在順昌聞猊敗亦拔砦去沂中及王徳乗勢追麟至南夀春而還孔彦舟亦解光州圍而去北方大恐金人聞豫敗来詰其狀始有廢豫之意已而韓世忠復敗金人于淮陽西遼耶律達實死達實死子伊哷幼遺命其后蕭氏權國稱制號感天皇后十二月張浚還自鎮江趙鼎罷初張浚在江上遣參議軍事吕祉入奏事所言誇大鼎每抑之帝謂鼎曰他日浚與卿不和必吕祉也既而浚因論事語意微侵鼎鼎言臣初與浚如兄弟因吕祉離間遂爾暌異今浚成功當使展盡底藴浚當留臣當去帝曰俟浚還議之及浚還鼎與折彦質請帝回蹕臨安浚乞乗勝攻河南而車駕幸建康又言劉光世驕惰不戰請罷其軍政鼎言得河南固易耳能保金人不内侵乎且光世累世為將將卒多出其門無故而罷之恐人心不安浚滋不悦而帝多從浚議鼎求退益力遂罷知紹興府鼎興浚為相政事先後及人才所當召用者條而置之座右次第奏行之故列要津者多一時之望人號為小元祐帝嘗親書忠正徳文四字及尚書一帙賜之曰書載君臣相戒飭之言所以賜卿欲共由斯道鼎頊首謝丁巳七年金天㑹十五年春正月以陳與義字去非洛陽人參知政事沈與求同知樞宻院事先是張浚欲復出視師不告同列既得㫖與求退日此大事而吾不與聞何以居位遂乞祠至是除同知樞宻院事與求被遇知無不言帝以其淹練通達克己聴納未㡬卒以張浚兼知樞宻院事自元豐改官制樞宻院不置使至是復置以浚兼之何蘚還自金始聞上皇及太后之䘮帝成服何蘚還始知道君皇帝及寧徳皇后鄭氏相繼崩帝成服百官七上表請遵以日易月之制知嚴州胡寅上疏請服䘮三年衣墨臨戎以化天下帝欲遂終䘮張浚言天子之孝不與士庶同必思所以奉宗廟社稷今梓宫未還天下塗炭願陛下揮淚而起斂髪而趨一怒以安天下之民帝乃命浚草詔告諭羣臣外朝勉從所請宫中仍行三年之䘮上太上皇廟號曰徽宗太后尊諡曰顯肅浚又請命諸大将率三軍發哀成服俾中外感動退而上疏曰陛下思慕兩宫憂勞百姓臣毎感歎誓殱敵讐念昔陜蜀之行陛下命臣曰我有大隙于北刷此至恥惟爾是屬而臣終隳成功使敵無憚今日之禍端自臣致乞賜罷㸃帝詔浚起視事浚再疏待罪不許時帝遇朔望猶率羣臣遥拜淵聖中丞廖剛言禮有隆殺兄為君則君之已為君則兄之可也但嵗時行家人禮于内庭從之昌廖剛字用中南劍州順人金初用大明厯司天楊級所造也二月癸巳朔日食遣王倫如金詔以倫為奉迎梓宫使陛辭帝命謂達蘭曰河南之地上國既不有與其付劉豫曷若見歸三月帝如建康遥尊宣和皇后韋氏為皇太后帝嘗謂輔臣曰宣和皇后春秋髙朕朝夕思之不遑寧處屈已講和正謂此爾至是從翰林學士朱震之請遥尊為皇太后劉光世免張浚命吕祉節制其軍光世在淮西素無紀律張浚言其沈酣酒色不恤國事語以恢復意氣怫然乞賜罷黜㑹光世引疾請解兵柄乃拜少師萬夀觀使奉朝請以其兵隸都督府浚因分為六軍命吕祉往節制之張守曰必欲改圖須得聞望素髙能服諸将之心乃可吕祉不可用也浚不從夏四月岳飛乞終養遂還廬山張浚以張宗元監其軍飛自鄂入見拜太尉繼除宣撫使以王徳酈瓊兵隸之帝謂徳瓊曰聴飛號令如朕親行飛見帝數論恢復之畧疏言金人所以立劉豫盖欲荼毒中原以中國攻中國彼得以休息觀釁耳臣願陛下假臣月日提兵趨京洛據河陽陜府潼闗以號召五路叛將叛將既還遣王師前進豫必棄汴而走河北京畿陜右可以盡復然後分兵濬滑經畧兩河如此則逆豫成擒金人知畏社稷長乆之計實在此舉帝曰有臣如此朕復何憂復召至寢閣命之曰中興之事一以委卿飛方圖大舉㑹秦檜主和議忌之遂不以徳瓊兵隸飛而請詔飛詣張浚議事浚謂飛曰王徳淮西軍所服浚欲以為都統而命吕祉以督府參謀領之如何飛曰徳與酈瓊素不相下一旦揠之在上則必爭吕尚書不習軍旅恐不足服衆浚曰張俊楊沂中如何飛曰張宣撫飛之舊帥也其人暴而寡謀沂中視徳等耳亦豈能御此軍哉浚艴然曰固知非太尉不可飛曰都督以正問飛飛不敢不盡其愚豈以得軍為念哉飛既與浚忤即日上章乞終䘮服以張憲攝軍事步歸廬山廬母墓側浚怒遂以張宗元權宣撫判官監其軍五月召胡安國提舉萬夀觀兼侍讀未至而罷張浚薦安國帝召之將行聞陳公輔乞禁程頤之學乃上疏論之畧曰孔孟之道不傳乆矣自頤兄弟始發明之然後知其可學而至今使學者師孔孟而禁從頤學是入室而不由戸也夫頤于易因理以明象而知體用之一原于春秋見于行事而知聖人之大用諸經語孟皆發其微㫖而知其入徳之方則狂言怪語豈其文哉孝弟顯于家忠誠動于鄉非其道義一介不以取予則髙視濶步豈其行哉自嘉祐以来頤與兄顥及邵雍張載皆以道徳行世著書立言公卿大夫所欽慕而師尊之及王安石蔡京等曲加排抑故其道不行望下禮官討論故事加之封爵載在祀典仍詔館閣裒其遺書羽翼六絰使邪說者不得作而道術定矣公輔與中丞周秘侍御史石公揆交章論安國學術頗僻除知永州安國辭遂復與祠六月岳飛奉詔入朝遂遣還鎮累詔趣飛還職飛不得已趨朝待罪帝慰遣之既而張宗元還言将和士恱人懐忠孝皆飛訓養所致帝大恱飛至鎮奏言比者寝閣之命咸謂聖斷已堅何至今尚未决臣願提兵進討順天道因人心以曲直為老北以順逆為彊弱萬全之效可必錢塘僻在海隅非用武地願建都上游用漢光武故事親率六軍往来督戰庶㡬将士知聖意所向人人用命金誅其尚書左丞相高慶裔秋七月尼瑪哈以憂死初金主召尼瑪哈為相以鄂爾多代守雲中尼瑪哈遂失兵柄至是富勒呼欲挫尼瑪哈因其所善髙慶裔以贓敗下獄尼瑪哈乞免官為庶人以贖其罪金主不許慶裔臨刑尼瑪哈哭與之别慶裔曰公早聴我言豈有今日盖慶裔嘗教之反也凡尼瑪哈之黨連坐者甚衆尼瑪哈恚悶絶食縦飲而死八月召淮西副統制酈瓊赴行在瓊以衆叛降劉豫執吕祉殺之時以王德為淮西都統制酈瓊副之瓊與徳素等夷不相下及吕祉還朝徳瓊列狀交訴于都督府及御史臺乃召徳還建康而命楊沂中為淮西制置使劉錡副之往屯廬州祉復至廬州瓊又訟徳祉諭之曰張丞相但喜人向前倘能立功雖大過亦濶畧况小嫌邪當為諸公辯之保無他虞瓊等感泣事小定祉乃宻奏乞罷瓊兵權書吏漏語于瓊瓊令人遮祉所遣郵置盡得祉所言大怨怒㑹聞朝廷命楊沂中等為大帥而召已赴行在大懼遂謀叛諸将晨謁祉瓊袖出文書示中軍統制張璟曰諸兵官有何罪張統制乃以如許事聞之朝廷邪祉大驚欲走不及為瓊所執璟及兵馬鈐轄喬仲福統制劉永衡皆死瓊遂率全軍四萬人渡淮降劉豫擁祉北去距淮三十里祉下馬立謂瓊曰劉豫逆賊我豈可見之衆逼祉上馬祉罵曰死則死于此又諭其衆曰劉豫逆臣爾軍中豈無英雄乃隨酈瓊去乎衆頗感動凡千餘人環立不行瓊恐揺動衆心急策馬先渡祉遂遇害時有得祉括髮之帛歸吴中者祉妻吴氏持帛自縊以殉葬聞者哀之于是張浚始悔不用岳飛言飛乞進討瓊不許詔駐師江州為淮浙援九月張浚免罷都督府浚總中外之政㡬事叢委以一身任之毎奏對必言讐恥之大帝未嘗不改容涕洟事無巨細必以咨浚賜諸將詔往往命浚草之及酈瓊叛吕祉死浚因引咎力求去帝問誰可代者且曰秦檜何如浚曰近與共事方知其闇帝曰然則用趙鼎耳浚曰得之矣檜由是憾浚浚遂奉祠而都督府亦罷以趙鼎為尚書左僕射同平章事兼樞宻使冬十月安置張浚于永州浚既去位言者論之不已至引漢武誅王恢為比欲逺竄之㑹趙鼎乞降詔安撫淮西帝曰俟行遣張浚朕當下罪已之詔鼎曰浚母老且有勤王功帝曰功過自不相掩已而内批出浚謫嶺南鼎留不下詰旦約同列救解帝怒未釋鼎力懇曰浚罪不過失䇿爾凡人計慮豈不欲萬全倘因一失便寘之死地後有竒謀秘計誰復敢言者此事自闗朝廷非獨私浚也張守亦以為言帝意解遂以秘書少監分司西京永州居住李綱聞之馳奏曰浚措置失當誠為有罪然其區區殉國之心有可矜者願少寛假以責来效不報閏月張俊棄盱眙還建康十一月金人襲汴執劉豫廢為蜀王立行臺尚書省于汴韓世忠岳飛請收復中原不報初豫由尼瑪哈髙慶裔得立故奉二人特厚烏珠及諸将多憾之豫兵敗藕塘金人欲廢豫及尼瑪哈死岳飛因遣間齎蠟書與豫約同誅烏珠烏珠得書大驚馳白金主于是廢豫之意益決㑹豫請立麟為太子金主曰徐當咨訪河南百姓豫雖意沮而猶日遣使乞師南侵至是尚書省奏豫治國無状金主遂令達蘭烏珠偽稱南侵以襲之將至汴遣人召劉麟渡河議事麟至烏珠麾騎翼而擒之遂馳入汴豫方射講武殿烏珠従三騎突入東華門下馬逼豫出見因執其手偕至宣徳門彊乗以羸馬露刄夾之囚于金明池翌日集百官宣詔廢之其詔有曰建爾一邦建兹八稔尚勤兵戍安用國為仍以鐵騎數千圍宫門遣小校巡閭巷間宣言曰自今不僉汝為軍不取汝免行錢請汝舊主少帝来由此人心稍安置行臺尚書省于汴以張孝純權行臺左丞相呼沙呼為汴京留守李儔副之諸軍悉令歸農聴宫人出嫁得金一百二十餘萬兩銀一千六百餘萬兩米九十餘萬石緡二百七十萬匹錢九千八百七十餘萬緡豫求哀于二帥達蘭謂之曰昔趙氏少帝出京百姓燃頂煉臂號泣今汝廢無一人憐者汝何不自責也豫語塞十二月與家屬徙臨潢岳飛奏乗廢豫之際𢷬其不備長驅以取中原韓世忠亦上疏言機不可失請全師北討皆不報十二月王倫還自金復遣之倫將還達蘭送之曰好報江南自今道塗無壅和議可成倫至言金人許還梓宫及太后且許歸河南地帝喜曰若金人能従朕所求其餘一切非所較也逾五日復遣倫奉迎梓宫于金金以烏頁為尚書左丞同平章事烏頁好學問平汴京還惟載書數車既掌修國史事在天㑹六年採摭遺言舊事自始祖以下十帝締為三卷凡與契丹往来及征伐諸部宻謀秘計悉載無隠詳畧得體書成賞賚有差是月金主詔改明年為天眷元年大赦御批歴代通鑑輯覽卷八十五

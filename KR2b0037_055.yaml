front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷五十六唐肅宗皇帝丁酉至德二載春正月上皇以李麟懿祖之後同平章事命崔圓赴彭原安慶緒殺祿山
  hash: sha256:4c7b965e6ebf187f024ca043ade22aa63418275f8fc03a0c630c51f3ba972a35
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_055-1a, image: WYG0337/WYG0337-0213a.png}
body:
  text: 祿山自起兵以來目漸昏至是不復睹物又病疽性益躁暴左右使令小不如意輒加箠撻時或殺之閹宦李豬兒被撻尤多左右人不自保既而嬖妾生子慶恩欲以代慶緒慶緒懼嚴莊為之謀夜持兵立帳外使豬兒執刀直入帳中斫祿山腹祿山捫枕旁刀不獲曰必家賊也已流出數斗遂死莊宣言祿山疾亟立慶緒為太子襲偽號然後發喪慶緒性昏懦言辭無序莊不令見人慶緒曰縱酒為樂兄事莊以為御史大夫事無大小皆取決焉殺建寧王倓初李輔國本飛龍內廄名小兒廄牧閹奴皆謂之小兒粗間書計給事東宫上委信之輔國外恭謹而內狡險上即位後見張良娣有寵隂附會之與相表裏建寧王倓數于上前詆訐二人罪惡二人因譖之曰倓恨不得為元帥謀害廣平王上怒遂賜倓死先是上謂李泌曰廣平為元帥踰年今欲命建寧專征又恐勢分立廣平為太子何如對曰戎事交切須即區處至于家事當俟上皇不然後代何以辨陛下靈武即位之意邪泌出以告廣平王俶俶入固辭曰陛下猶未奉晨昏臣何心敢當儲二上賞慰之及建寧死俶內懼謀去輔國及良娣泌曰王不見建寧之禍乎但盡人子之孝良娣婦人委曲順之亦何能為史思明等冦太原李光弼擊破之史思明等引兵十萬寇太原李光弼拒之月餘不下思明乃選驍鋭為遊兵戒之曰我攻其北則汝潛趨其南有隙則乘之光弼軍令整嚴雖寇所不至警邏亦不少懈賊不得入先是光弼麾下精兵皆赴朔方餘衆不滿萬人諸將皆懼光弼先帥士民于城外鑿壕以自固作墼數十萬衆莫知所用及賊攻城光弼用以增壘城壞輒補至是募軍中有小技皆取之人盡其用得錢工三善穿地道賊為梯衝土山以攻城光弼為地道以迎之近城輒陷又作大炮飛巨石一發輒斃二十餘人賊死者仆二三乃退營于數十步外墼音吉土磚也光弼遣人詐為約降而穿地道周賊營中搘之以木至期遣禆將將數千人出如降狀賊皆屬目俄而營中地陷死者千餘人賊衆驚亂官軍鼓譟乘之俘斬萬計會安祿山死慶緒使思明歸守范陽留蔡希德等圍太原光弼復出擊之斬首七萬希德遁去賊將尹子竒寇睢陽張巡入睢陽與許逺拒郤之安慶緒以子竒為河南節度使子竒以歸胡三省注當作為媯州也檀州名注見前兵十二萬趣睢陽許逺告急于張巡巡自寧陵引兵入睢陽巡有兵三千人與許逺兵合合六千八百人賊悉衆逼城巡督勵將士晝夜苦戰一日或二十合凡十六日擒賊將六十餘人殺士卒二萬餘衆氣自倍逺謂巡曰逺懦不習兵公智勇兼濟逺為公守請公為逺戰自是逺但調軍糧修戰具居中應接而已戰鬭籌畫一出于巡賊遂夜遁二月帝至鳯翔上至鳯翔旬日隴右河西安西西域之兵皆會江淮庸調亦至長安人聞車駕至從賊中自拔而來者日夜不絶李泌請如前䇿遣安西西域之衆並塞東北取范陽上曰今大衆已集當乘兵鋒搗具腹心而更引兵東北數千里先取范陽不亦迂乎對曰今所恃者皆西北及諸塞之兵性耐寒而畏暑若乘其新至之鋭攻祿山已老之師其勢必克兩京然春氣已深賊收其餘衆遁歸巢穴關東地熱官軍必困而思歸賊俟官軍之去必復南來然則戰征之勢未有涯也不若先用之于寒鄉除其巢穴則賊無所歸根本永絶矣上曰朕切于晨昏之戀不能待此決矣郭子儀平河東賊將崔乾祜敗走綱目是條載在正月考通鑑二月戊子上至鳯翔己丑郭子儀平河東其事在帝至鳯翔後今依之改輯初郭子儀以何東居兩京之間扼賊要衝得河東則兩京可圖時賊將崔乾祐守之子儀潛遣人入河東與唐官陷賊者謀俟官軍至為內應至是子儀引兵趣河東司户韓旻等翻城迎官軍乾祐踰城得免發城北兵拒官軍子儀擊之斬首四千級遂平河東江南採訪使李成式討永王璘璘敗走死成式與河北招討官李鋭合兵討璘季廣琛召諸將謂曰吾屬從王至此天命未集人謀已隳不如及兵鋒未交早圖去就否則死于鋒鏑永為逆臣矣諸將皆然之于是廣琛以麾下奔廣陵璘黨皆散憂懼不知所出成式將趙侃等濟江璘兵遂潰璘奔鄱陽江西採訪使皇甫侁遣兵擒殺之三月上皇遣中使祭始興文獻公張九齡上皇思張九齡之先見為之流涕遣中使至曲江漢縣今為廣東韶州府治祭之厚恤其家尹子竒復寇睢陽張巡擊走之子竒復兵攻睢陽張巡謂將士曰吾受國恩所守正死耳但念諸君捐軀力戰而賞不酬勳以此痛心耳將士皆激勵請奮巡乃椎牛饗士盡軍出戰賊望見兵少笑之巡執旗帥諸將直衝賊陳賊乃大潰明日賊又合兵至城下巡出戰晝夜數十合屢摧其鋒而賊攻圍益急巡于城中夜鳴鼓嚴隊若將出擊者賊聞之逹旦警備既明巡乃寢兵絶鼓賊以飛樓瞰城中無所見遂解甲休息巡與南霽雲魏州頓邱人雷萬春史不詳里系等十餘將各將五十騎開門突出直衝賊營斬賊將五十餘人殺士卒五千餘人子竒乃走巡欲射子竒而不識剡篙為矢中者善謂巡矢盡走白子竒乃得其狀使霽雲射之中其左目幾復之夏四月以郭子儀為司空天下兵馬副元帥與賊戰于清渠在長安縣西綱目誤作溝今依唐書通鑑改敗績先是關內節度使王思禮軍武功賊安守忠等攻之兵馬使郭英乂戰不利思禮退軍扶風賊遊兵至太和關在今鳯翔府東去府五十里鳯翔大駭上以郭子儀為司空副元帥子儀將兵赴鳯翔賊將李歸仁以鐵騎五千邀之子儀使其將僕固懷恩等伏兵擊之殺傷略盡子儀與王思禮進屯潏西潏水之西也潏水出南山至長安入渭安守忠李歸仁軍清渠相守七日官軍不進守忠偽遁子儀悉師逐之賊以驍騎九千為長蛇陳官軍擊之首尾為兩翼夾擊官軍大潰子儀退保武功是時府庫無蓄積朝廷專以官爵賞功諸將出征皆給空名告身聼臨事注名有至開府特進異姓王者諸軍但以職任為統攝不復計官爵高下及是復以官爵收散卒由是官爵輕而貨重大將軍告身一通才易一醉凡應募入軍者一切衣金紫名器之濫至是而極焉子儀既敗詣闕請自貶以為左僕射房琯罷以張鎬同平章事琯性髙簡時國家多難而琯不以職事為意日與劉秩李揖高談釋老或聼門客董庭蘭鼓琴庭蘭因是大招權利御史劾之罷為太子少師以鎬同平章事上常使僧𢾗百人為道場于內張鎬諌曰帝王當修德以弭亂未聞飯僧可致太平也上然之房琯既失職頗怏怏多稱疾不朝而賔客常盈門上惡之貶邠州刺史久之召拜刑部尚書道卒山南東道節度使魯炅幽州薊人奔襄陽魯炅守南陽賊將武令珣田承嗣相繼攻之城中食盡餓死者相枕藉凡周嵗晝夜苦戰力竭不能支夜開城帥餘兵數千突圍奔襄陽承嗣追之轉戰二日不克而還時賊欲南侵江漢賴炅扼其衝要南夏得全秋七月以張鎬兼河南節度使鎬兼節度採訪等使代賀蘭進明賊將蔡希德寇上黨執節度使程千里賊屢攻上黨常為節度使程千里所敗蔡希德復引兵圍之以輕騎至城下挑戰千里帥百騎開門突出欲擒之會救至退還橋壞墜塹中反為希德所擒仰謂從騎曰吾不幸至此天也歸語諸將善為守備寧失帥不可失城希德攻城竟不克送千里于洛陽囚之九月廣平王俶郭子儀收復西京上勞饗諸將遣攻長安謂郭子儀曰事之濟否在此行也對曰此行不捷臣必死之回紇懷仁可汗遣其子葉護等將精兵四千餘人來至鳳翔廣平王俶將朔方等軍及回紇西域之衆十五萬發鳳翔俶見葉護約為兄弟葉護大喜謂俶為兄至長安城西陳于香積寺在長安縣東神禾原上北澧水注見前之東李嗣業為前軍郭子儀為中軍王思禮為後軍賊將十萬陳于其北李歸仁出挑戰官軍逐之逼于其陳賊軍齊起官軍郤李嗣業曰今日不以身餌賊軍無子遺矣乃肉袒執刀大呼奮擊殺數十人陳乃稍定于是嗣業帥前軍各執長刀如墻而進身先士卒所向摧靡賊伏精騎于陳東欲襲官軍之後偵者知之僕固懷恩引回紇就擊盡殺之李嗣業又與回紇出賊陳後與大軍夾擊自午至酉斬首六萬級賊遂大潰餘衆走入城逮夜囂聲不止僕固懷恩言于廣平王俶曰賊棄城走矣請以三百騎追之縳取安守忠李歸仁等俶曰將軍戰亦疲矣且休息俟明日圗之懷恩曰戰尚神速何明日也俶固止之遲明諜至守忠歸仁與張通儒田乾真等皆已遁矣大軍遂入西京初上欲速得京師與回紇約曰克城之日土地士庶歸唐金帛子女歸回紇至是葉護欲如約廣平王俶拜于葉護馬前曰今始得京師若遽俘掠則東京之人皆為賊困守不可復取矣願至東京乃如約葉護驚躍下馬答拜曰當為殿下徑往東京即與僕固懷恩引回紇西域之兵自城南過營于滻水之東軍民蕃部見俶拜者皆泣曰廣平王真華夷之主上聞之喜曰朕不及也俶整衆入城百姓老幼夾道歡呼悲泣俶留長安鎮撫三日引大軍東出遣使請上皇還京師捷書至鳳翔上即日遣中使啖庭瑶奏上皇命左僕射裴冕入京師告郊廟及宣慰百姓召李泌曰朕已表請上皇東歸朕當還東宫復修人子之職泌曰上皇不來矣上驚問故泌曰理勢自然上曰為之奈何泌曰今請更為羣臣賀表言自馬嵬請留靈武勸進及今成功聖上思戀晨昏請速還京師就教養之意則可矣上即使泌草表立命中使奉以入蜀是夜上就泌飲酒同榻而寢泌曰臣今報德足矣復為間人何樂如之上曰朕與先生久同憂慮今方同樂何遽云去泌曰臣有五不可留願陛下聽臣去免臣于死上曰何謂也對曰臣遇陛下太早任臣太重寵臣太深臣功太髙亦太竒此其所以不可留也上曰且眠矣異日議之對曰陛下今就臣榻卧猶不得請况異日香業之前乎陛下不聼臣去是殺臣也上曰不意卿疑朕如此豈朕而辦殺卿耶對曰陛下不辦殺臣故臣求歸若其既辦臣何敢復言且殺臣者非陛下也乃五不可也陛下嚮日待臣如此臣于事猶有不敢言者况天下既安臣敢言乎上良久曰卿以朕不從卿北伐之謀乎對曰非也乃建寧耳曰建寧為小人所教欲害其兄圗繼嗣朕以社稷大計不得已而除之卿不知邪對曰若有此心廣平當怨之廣平每與臣言其寃輒流涕嗚咽且陛下昔欲用建寧為元師臣請用廣平建寧若有此心當深憾臣而以臣為忠益相親善陛下以此可察其心矣上乃泣曰先生言是也然既往不咎朕不欲聞之泌曰臣非咎既往乃欲陛下慎將來耳昔天后有四子長曰太子𢎞天后方圗稱制惡其聰明鴆殺之立次子賢賢內憂懼作黃臺瓜辭冀以感悟天后天后不聽賢亦廢死其辭曰種瓜黃臺下瓜熟子離離一摘使瓜好再摘使瓜稀三摘猶為可四摘抱蔓歸今陛下已一摘矣慎無再摘上愕然曰安有是哉朕當書紳對曰陛下但識之于心何必形于外也是時廣平王有大功張良娣忌而譖之故泌言及之冬十月尹子竒陷睢陽張巡許逺死之劉友益曰巡逺之死異時異地此並書之所以破千載之惑也先是子竒徴兵數萬復攻睢陽城中食盡饋救不至士卒消耗至千六百人皆飢病不能鬭遂為賊所圍張巡修守具賊為雲梯勢如半虹置精卒二百于其上推之臨城欲令騰入巡預于城潛鑿三穴候梯將至一穴中出大木末置鐵鈎鈎之使不得退一穴中出一木拄之使不得進一穴中出一木末置鐡籠盛火焚之賊又鈎車鈎城上棚閣巡以大木置鐵鎖大環拔其鈎而截之賊又造木驢攻城巡鎔金汁灌之賊又以土囊積柴為磴道欲登城巡潛以松明乾蒿投之積十餘日使人順風持火焚之巡所為皆應機立辨賊服其智不敢復攻遂于城外穿三重壕立木柵以守巡巡亦于其內作壕以拒之士卒死傷之餘才六百人時許叔冀在譙郡尚衡在彭城賀蘭進明在臨淮唐郡今江南泗州是皆擁兵不救城中日蹙張巡使南霽雲犯圍而出告急于臨淮臨淮兵不至霽雲至臨淮進明愛其勇壯其食延之霽雲泣曰睢陽之人不食月餘矣霽雲雖欲獨食且不下咽大夫坐擁強兵曽無分災救患之意豈忠臣義士之所為乎因囓落一指以示進明曰霽雲既不能逹主上之意請留一指以示信歸報座中皆為泣下霽雲去至寧陵與城使亷坦同將步騎三千人且戰且行僅得千人入城城中將吏知無救皆痛哭賊圍益急至是張巡許逺謀曰睢陽江淮之保障若棄之去賊必乘勝長驅是無江淮也且吾衆飢羸走必不逹古者戰國諸侯尚相救恤况密邇羣帥乎不如堅守以待之先是將士人廩米日一合雜以茶紙樹皮為食至食茶紙既盡遂食馬馬盡羅雀掘鼠雀鼠又盡巡出愛妾殺以食士逺亦殺其奴城中知必死莫有叛者所餘才四百人將士病不能戰巡西向再拜曰臣力竭矣生既無以報陛下死當為厲鬼以殺賊城遂陷巡逺俱被執子竒問曰聞君每戰皆裂齒碎何也巡曰吾志吞逆賊但力不能耳子竒以刀抉視之抉視其齒所餘才三四并南霽雲雷萬春姚誾崇曾孫等皆被殺巡且死顔色不亂生致許逺于洛陽尋死偃師巡初守睢陽時卒僅萬人城中居人亦𢾗萬巡一見問姓名無不識者前後大小戰凡四百餘殺賊卒二十萬人巡行兵不依古法教戰陳令本將各以其意教之人或問其故巡曰今與逆賊戰雲合鳥散變態不恆𢾗步之間勢有同異臨期應猝在于呼吸之間而動詢大將事不相及非知兵之變者也故我使兵識將意將識士情投之而往如手之使指兵將相習人自為戰不亦可乎器械甲仗皆取之于敵未嘗自修推誠待人無所疑慮臨危應變出竒無窮號令明賞罰信與衆共甘苦寒暑故下爭致死力先是張鎬聞睢陽圍急倍道亟進且檄譙郡太守閶邱曉救之曉不受命鎬至睢陽城已陷三日矣鎬召曉杖殺之廣平王俶郭子儀等收復東京張通儒等收餘衆走保陜安慶緒悉發洛陽兵使嚴莊將之就通儒以拒官軍步騎猶十五萬子儀等與賊遇于新店在陜州西賊依山而陳回紇自南山襲其背于黃埃中發十餘矢賊驚顧曰回紇至矣遂潰郭子儀等與回紇夾擊之賊大敗走僕固懷恩等分道追之慶緒帥其黨走河北殺所獲唐將哥舒翰程千里等三十餘人而去廣平王俶入東京回紇縱兵大掠意猶未厭俶患之父老請率羅錦萬匹以賂回紇乃止李泌歸衡山泌屢請還山上不許會成都使還言上皇初得上表倣徨不能食欲不歸及羣臣表至乃大喜命食作樂下誥定行日上召泌告之曰皆卿力也于是泌求歸不已上固留之不能得乃聼歸衡山敕郡縣為築室于山中給三品料帝發鳯翔遣韋見索奉迎上皇賊將嚴莊來降以為司農卿陳留人殺尹子竒舉城降帝入西京上皇發蜀郡上入西京百姓出國門奉迎二十里不絶舞躍呼萬嵗有泣者上入居大明宫御史中丞崔器安平人令百官受賊官爵者皆脫巾徒跣立于含元殿前頓首請罪環之以兵使百官臨視之太廟為賊所焚上素服向廟哭三日是日上皇發蜀郡安慶緒走保鄴郡慶緒走保鄴步騎不過千餘人旬日間蔡希德自上黨田承嗣自頴川武令珣自南陽各帥所部兵歸又召募河北諸郡人衆至六萬軍聲復振以甄濟字孟成定州無極人家汲郡為祕書郎蘇源明字弱夫武功人知制誥初汲郡人甄濟有操行隱居青巖山在衛輝府淇縣西南亦曰蒼峪山安祿山為採訪使奏掌書記濟察祿山有異志詐得風疾舁歸家祿山反使蔡希德引刑者二人封刀召之濟引首待刃希德以實病白祿山乃免後慶緒又使強舁至洛陽會官軍平東京濟超詣軍門上謁廣平王俶遣詣京師上命館之于三司令受賊官爵者列拜以愧其心以濟為祕書郎國子司業蘇源明亦稱病不受祿山官上擢為考功郎中知制誥制士庶受賊官祿者令三司條件奏聞宴回紇葉護于宣政殿葉護自東京還上命百官迎之與宴于宣政殿葉護奏以軍中馬少請留兵沙苑自歸取馬還為陛下掃除范陽餘孽上賜而遣之以葉護為忠義王嵗遺回紇絹二萬匹使就朔方軍受之朝享于長樂殿上在彭源更以栗為九廟主至是朝享于長樂殿十二月上皇還西京上皇至咸陽上備法駕迎于望賢宫上皇在宫南樓上著紫袍望樓下馬趨進拜舞于樓下上皇降樓撫上而泣索黃袍自為上著之上伏地頓首固辭上皇曰天數人心皆歸于汝使朕得保養餘齒汝之孝也上乃受之上皇不肯居正殿上自扶登殿尚食進食嘗而薦之將發行宫上親為上皇習馬而進之執鞚行數步上皇止之上乘馬前引不敢當馳道上皇謂左右曰吾為天子五十年未為貴今為天子父乃貴耳入御含元殿慰撫百官乃詣長樂殿謝九廟主慟哭久之即日出居興慶宫上纍請避位還東宫上皇不許以傳國寶授上上始涕泣受之赦天下上御丹鳯樓赦天下惟與安祿山同反及李林甫王鉷楊國忠子孫不在免例先是廣平王俶入東京按百官受祿山父子官者陳希烈等三百餘人皆素服悲泣請罪俶以上旨釋之尋勒赴西京崔器令謁朝堂請罪如前西京百官之儀然後收繫大理京兆獄至是命禮部尚書李峴兵部侍郎吕諲與器共接之峴以侍御史李栖筠為詳理判官栖筠多務平恕故人皆恕諲器而峴獨得衆譽李峴吳王恪孫吕諲河中河東人立廣平王俶為楚王尋復徙為成王加郭子儀司徒李光弼司空功臣進階賜爵有差追贈死節之士李憕盧奕顔杲卿袁履謙許逺張巡張介然蔣清龎堅等皆加追贈官其子孫戰亡之家給復三載議者或罪張巡以守睢陽不去與其食人曷若全人其友人李翰為之作傳表上之曰巡以寡擊衆以弱制強保江淮以待陛下之師其功大矣且巡所以固守者以待諸軍之救也救不至而食盡既盡而及人豈其素志哉設使守城之初已有食人之計損數百人以安天下臣猶曰功過相掩況非其素志乎衆議由是始息李翰贊皇人蠲來載租庸三分之一復郡名官名以良娣張氏為淑妃劉友益曰書此志亂始也賊將史思明高秀巖各以所部來降史思明遣其將竇子昂以所部十三郡及兵八萬來降河東節度使高秀巖亦以所部降上大喜以思明為歸義王范陽節度使初安慶緒之北走也其大將李歸仁及精兵𢾗萬人皆潰歸范陽慶緒忌思明之強遣阿史那承慶安守忠往徴兵因密圖之判官耿仁智説思明曰大夫所以盡力于安民者迫于凶威耳今唐室中興天子仁聖大夫誠率所部歸之此轉禍為福之計也禆將烏承玼亦曰慶緒葉上露耳大夫奈何與之俱亡思明以為然承慶守忠以五千徑騎自隨至范陽思明引入內廳樂飲别遣人收其甲兵諸郡兵皆給糧縱遣之囚承慶等奉表降至是上遣內侍李思敬與烏承恩往宣慰使將所部兵討慶緒承恩所至宣布詔旨滄瀛安深德棣等州皆降雖相州未下河北率為唐有矣掖烏承玭字德潤張人承恩承玭族兄制陷賊官以六等定罪崔器吕諲上言諸陷賊官背國從偽準律皆應處死李峴以為賊陷兩京天子南巡人自逃生此屬皆陛下親戚或勳舊子孫今一概以叛法處死恐乖仁恕之道且河北未平羣臣陷賊者尚多若盡誅之是堅其附賊之心也上從峴議以六等定罪重者刑之于市次賜自盡次杖一百次三等流貶斬逹奚珣等十八人陳希烈等七人賜自盡上欲免張均張垍死上皇不可上叩頭流涕曰臣非張説父子無有今日若不能活均垍死何面目見説于九泉上皇曰垍為汝長流嶺南均為賊毁我家事決不可活上泣而從命頃之有自賊中來降者言羣臣在鄴者聞赦希烈等皆自悼失身賊庭及聞希烈等誅乃止上甚悔之司馬氏光曰陳希烈等或貴為卿相或親連肺腑承平之日迎合取容禍亂既作偷生茍免至乃媚賊稱臣為之陳力此乃犬馬之不如六等議刑斯亦可矣又何悔焉置左右神武軍置神武軍取元從子弟胡三省注謂從帝馬嵬北行及自靈武還京師者充其制皆如四軍左右羽林左右龍武總謂之北牙六軍神武亦置左右共為六軍又擇善騎射者十人為殿前射生手分左右廂號曰英武軍戊戌乾元元年是年二月改元復以載為年春正月上皇加帝尊號帝復上上皇尊號二月以李輔國兼太僕卿輔國依附張淑妃勢傾朝野免天下今年租庸以改元故有是詔三月立淑妃張氏為皇后夏五月停採訪使改黜陟使為觀察使胡三省曰觀察使始此張鎬罷張鎬性簡淡不事中要聞史思明請降上言思明凶險因亂竊位人面獸心難以德懷願勿假以威權又言滑州防禦使許叔冀狡猾多詐臨難必變請徴入宿衛時上已寵納思明會中使自范陽及白馬來皆言思明叔冀忠懇可信上以鎬為不切事機罷為荆州防禦使立成王俶為皇太子更名豫張后生興王紹才數嵗欲以為嗣上疑未決從容謂知制誥李揆字端卿淮陽王道元之元孫曰成王長且有功朕欲立為太子卿意何如揆再拜賀曰此社稷之福臣不勝大慶上意始決崔圓李麟罷以王璵方慶六世孫同平章事上頗好鬼神太常少卿王璵專依鬼神以求媚每議禮儀多雜以巫祝俚俗上悅之遂以璵同平章事璵在開元時為祠祭使祈禱或焚紙錢有類巫現習禮者羞之至是復以祠禱見寵乃奏置太乙壇上嘗不豫卜云山川為祟與請中使與女巫乘驛分禱所過煩耰黃州有巫盛年美色從無賴少年數十為蠧尤甚刺史左震悉收斬之籍其贓𢾗十萬以狀聞請以其贓代貧民租遣中使回京上無以罪也贈顔杲卿太子太保諡曰忠節杲卿之死也以張通幽之譛杲卿初起常山與張通幽同謀通幽賊將通儒弟也會杲卿遣其子泉明獻俘京師通幽請偕行以救宗族杲卿許之至太原通幽欲自託于王承業殺之更表毁短杲卿留泉明别遣使獻之杲卿尋死難竟無褒贈及是顔真卿為御史大夫泣訴于上上為之言于上皇杖殺幽通而贈杲卿泉明既留太原王承業遣還使壯士翟喬賊之于路喬不平告之故乃免比至常山城已陷為史思明所獲至是思明降泉明乃得歸求其父尸於東京得之遂并袁履謙尸棺斂以歸杲卿姊妹女及泉明之女皆流落河北泉明號泣求訪哀感路人久乃得之詣親故乞索贖之先姑姊妹而後其子遇父時將吏妻子流落者皆與之歸凡五十餘家均減資糧一如親戚真卿悉加贍給隨其所適而資送之袁履謙妻疑履謙衣衾斂薄發棺視之與杲卿無異乃始慙服初行新厯山人韓頴所造史思明反殺范陽副使烏承恩李光弼以史思明終當叛亂而烏承恩為思明所親信隂使圗之又勸上以承恩為范陽節度副使賜阿史那承慶鐵劵令共圗思明上從之承恩多以私財募部曲又數衣婦人服詣諸將説誘之思明聞而疑之會承恩入京師上使內侍李恩敬與俱宣慰范陽謀泄思明執承恩索其裝囊得鐡劵及光弼牒思明乃集將佐吏民西向大哭曰臣以十三萬衆降朝廷何負陛下而欲殺臣遂殺承恩及其黨二百人囚思敬表言之上遣中使慰諭思明曰此非朝廷與光弼之意皆承恩所為殺之甚善思明表求誅光弼命耿仁智張不矜為表云陛下不為臣誅光弼臣當自引兵就太原誅之不矜以示思明及將入函仁智削去之思明聞之命執二人斬之仁智事思明久思明憐欲活之仁智大呼言曰人生會有一死得盡忠義死之善者也今從大夫反不過延嵗月豈若速死之愈乎思明怒捶殺之秋七月初鑄大錢鑄當十大錢文曰乾元重寶從御史中丞弟五琦之請也明年更鑄大錢加以重輪一當五十與乾元錢開元錢三品並行已而民爭盜鑄貨輕物重穀價騰踊餓殍相望言者皆歸咎于琦乃貶琦忠州長史忠州唐置今𨽻四川上元元年敕小錢一當十其重輪者當三十三品錢行浸久屬嵗荒米斗至錢七千人相食京兆捕私鑄者𢾗月間榜死至八百餘人尚不能禁故有是敕至寶應元年敕大小皆當一民始安之册回紇英武可汗以寧國公主歸之册命回紇可汗曰英武威逺毗伽闕可汗以上幼女寧國公主妻之以漢中王瑀為册禮使右司郎中李巽字令叔趙州贊皇人副之上送至咸陽公主辭決曰國家事重死且無恨上流涕而還瑀等至回紇牙帳可汗衣赭袍坐帳中引瑀等立帳外瑀不拜可汗曰我與天可汗兩國之君君臣有禮何得不拜瑀對曰天子以可汗有功自以所生女妻可汗恩禮至重可汗奈何以子壻傲婦翁坐榻上受册命道邪可汗改容起受册明日立公主為可敦舉國皆喜騎三千助討安慶緒後回紇以公主無子聽歸京師郭子儀李光弼入朝八月以子儀為中書令光弼為侍中命郭子儀等九節度討安慶緒以宦官魚朝恩瀘州人為觀軍容使安慶緒之初至鄴也猶據七郡兵糧豐備專以繕臺沼酣飲為事髙光張通儒等爭權不協無復剛紀蔡希德有才略好直言通儒譖而殺之諸將怨怒不為用上命朔方郭子儀及淮西魯炅興平李奐滑濮許叔冀鎮西北庭李嗣鄴鄭蔡季廣琛河南崔光逺靈昌人七節度討之又命河東李光弼澤潞王思禮二節度使將所部兵助之上以子儀光弼皆元勳難相統屬故不置元帥但以宦官魚朝恩為觀軍容宣慰處置使觀軍容之名自此始冬十月郭子儀等拔衛州遂圍鄴城子儀引兵濟河東至獲嘉破安太清太清走保衛州慶緒悉舉鄴中之衆七萬救衛州子儀使善射者三千人伏于壘垣之內令曰我退賊必逐我汝乃登壘鼓譟而討之既而與慶緒戰偽退賊逐之至壘下伏兵起射之賊還走子儀復引兵逐之慶緒大敗遂拔衛州慶緒走子儀等追至鄴慶緒入城固守慶緒窘急遣薛嵩求救于史思明且請以位讓之思明發范陽觀望未進會崔光逺拔魏州思明遂引兵大下光逺使將軍李處崟拒之連戰不利還趣城賊追至城下揚言曰處崟召我來何為不出光逺信之斬處崟處崟驍衆所恃也既死衆無鬪志光逺脫身走思明陷魏州所殺三萬餘人薛嵩訥之從子以侯希逸營州人為平盧節度副使平盧節度使王元志卒初元志既鴆殺劉正臣祿山以親將徐歸道為節度使元志復與侯希逸襲殺之遣使上聞詔拜元志平盧節度使至是卒劉正臣事具前上遣中使往撫慰將士因就察軍中所欲立者授以旌節髙麗人李懷玉為禆將殺元志之子推侯希逸為軍使朝廷因以希逸為節度副使節度使由軍士廢立自此始己亥二年春正月史思明自稱燕王史思明自稱大聖燕王周摯為行軍司馬李光弼曰思明得魏州而按兵不進此欲使我懈惰而以精鋭掩吾不備也請與朔方軍同逼魏城求與之戰彼懲嘉山之敗必不敢輕出得曠日引久則鄴城拔慶緒死而彼無辭以用其衆矣魚朝恩以為不可乃止嘉山之敗事具前二月壬子月食既胡三省曰春秋之法書日食不書月食此因張后專橫故特書先是百官請加皇后尊號上以問中書舍人李揆對曰自古皇后無尊號惟韋后有之豈足為法上驚曰庸人幾誤我會月食事遂寢后與李輔國相表裏干預政事上頗不悅而無如之何三月九節度之兵潰于相州郭子儀等九節度圍鄴城壅漳水灌之慶緒堅守以待思明城中食盡淘馬矢以食馬而官軍無統御進退無所稟城久不下上下解體思明引兵趨鄴選精騎日于城下抄掠官軍出則散歸其營晝備之則夜至夜備之則晝至又多遣壯士竊官軍裝號督趣運者妄殺戮人舟車所聚則密縱火焚之往復聚散自相辨識而官軍不能察也由是諸軍乏食思明乃大引軍直抵城下刻日決戰官軍步騎六十萬陳于安陽河北李光弼王思禮許叔冀魯炅先戰殺傷相半郭子儀承其後未及布陳大風忽起吹沙拔木天地晝晦咫尺不辨兩軍大驚官軍潰而南賊潰而北子儀斷河陽橋保東京戰馬萬匹惟有三千甲仗十萬遺棄殆盡東京士民駭散留守崔圓等奔襄鄧諸道兵潰歸所過剽掠惟李光弼王思禮整軍而歸子儀至河陽周摯引兵爭之不得都虞侯張用濟築南北兩城而守之諸將各上表請罪上皆不問史思明殺安慶緒還范陽史思明知官軍潰去還屯鄴南不與慶緒相聞慶緒窘蹙不知所為上表稱臣于思明思明乃手疏唁慶緒願為兄弟之國慶緒大悅以三百騎詣思明營思明陳兵待之引入再拜思明忽震怒曰爾為子殺父天地所不容吾為太上皇討賊豈受爾佞媚乎命左右牽出并髙尚孫孝哲崔乾佑皆殺之勒兵入鄴城收其士馬留其子朝義守之引兵還范陽苖晉卿王璵罷以李揆吕諲第五琦同平章事上于李峴恩意尤厚峴亦以經濟為己任軍國大事多獨決之以郭子儀為東畿等道元帥夏四月史思明僭號稱大燕皇帝制停口敕處分初李輔國自上在靈武侍直帷幄宣傳詔命四方文奏寶印符契晨夕軍號一以委之及還京師專掌禁兵常居內宅制敕必經輔國押署然後施行宰相百司皆因輔國關白口為制敕付外施行御史臺大理寺重囚或推斷未畢輔國一時縱之莫敢違者李揆見之執子弟禮謂之五父輔國行第五及李峴為相于上前叩頭論制敕應出中書具陳輔國專權亂政之狀上感悟制停口敕處分諸務各歸有司或有追攝須經臺府輔國由是忌峴以李抱玉為鄭陳潁亳節度使抱玉安興貴之後也興貴于武德初襲執李軌事具前為李光弼禆將屢有戰功自陳恥與安祿山同姓賜姓李氏五月貶李峴為蜀州刺史御史中丞崔伯陽等以鞫獄坐貶鳯翔馬坊押官為劫天興尉謝夷甫捕殺之其妻訟寃李輔國素出飛龍廄敕監察御史孫鎣鞫之無寃又使中丞崔伯陽等鞫之與鎣同又使侍御史毛若虛鞫之若虛希輔國意歸罪夷甫伯陽怒召若虛詰責欲劾奏之若虛先自歸于上上匿若虛簾下伯陽尋至言若虛附會中人鞫獄不直上怒叱出之貶嶺南尉鎣流播州押官管押馬坊之官天興本雍縣至德初更名金改鳯翔今為鳯翔府治毛若虛絳州太平人峴奏伯陽等無罪上以為黨貶蜀州刺史謂散騎常侍韓擇木昌黎人曰李峴專權朕自覺用法太寬對曰李峴言直非專權陛下寬之袛益聖德耳若虛尋除御史中丞威振朝廷久之以罪貶死秋七月召郭子儀還京師以李光弼為朔方節度使兵馬元帥魚朝恩惡郭子儀因其敗短之于上上召子儀還京師以李光弼代之士卒涕泣遮中使請留子儀子儀紿之曰我餞中使耳未行也因躍馬而去光弼以騎五百馳赴東都夜入其軍光弼治軍嚴整始至號令一施士卒壁壘旌旗精彩皆變是時朔方將士咸樂子儀之寬憚光弼之嚴兵馬使張用濟屯河陽與諸將謀以精鋭突入東京逐光弼請子儀命其士皆披甲上馬以待朔方節度副使僕固懷恩曰鄴城之潰郭公先去朝廷責帥故罷其兵柄今逐李公而強請之是反也其可乎康元寶曰君以兵請郭公朝廷必疑郭公諷君為之是破其家也郭公百口何負于君乎用濟乃止光弼以數千騎東出汜水用濟單騎來謁光弼責而斬之命部將辛京杲代領其衆人辛京杲蘭州金城賜僕固懷恩爵大寧郡王懷恩從郭子儀為前鋒勇冠三軍前後戰功居多故賞之冬十月李光弼與史思明戰于河陽大敗之史思明分軍四道濟河會于汴州李光弼方巡諸營聞之入汴州謂節度使許叔冀曰大夫能守汴十五日我則將兵來救許叔冀諾思明至汴州叔冀與戰不勝遂降之思明乘勢西攻鄭州光弼整衆徐行至洛陽留守韋陟請退守潼關光弼曰兩敵相當貴進忌退今無故棄五百里地則賊勢益張矣不若移軍河陽北連澤潞利則進取不利則退守表裏相應使賊不敢西侵此猿臂之勢也判官韋損曰東京帝宅奈何不守光弼曰守之則汜水有虎牢崿嶺在登封縣東南即箕山也龍門即伊闕皆應置兵子為兵馬判官能守之乎遂牒河南尹帥吏民避賊而帥軍士詣河陽遂入三城有衆二萬糧才支十日光弼按閲守備部分士卒無不嚴辦思明入洛陽城空無所得遂引兵攻河陽光弼斬其將劉龍仙獲良馬千餘匹思明使龍仙挑戰嫚罵光弼光弼顧諸將曰誰敢取彼僕固懷恩請行光弼曰此非大將所為禆將白孝德請挺身取之光弼撫其臂而遣之孝德挾二矛䇿馬亂流而進半涉懷恩賀曰克矣光弼曰何以知之對曰觀其攬轡安間是以知之龍仙易之嫚罵如初孝德瞋目大呼運矛躍馬斬之以歸思明存良馬千餘匹每日出于河渚浴之循環不休光弼命索軍中牝馬得五百匹縶其駒而出之思明馬見之悉浮渡河盡驅入城白孝德安西人思明屯兵河清唐縣今為鎮在今懷慶府孟縣光弼軍于野水渡在孟縣西南以備之賊將髙庭暉李日越降光弼還河陽留兵千人使部將雍希皓守其柵曰賊將髙庭暉李日越皆萬人敵也至勿與之戰降則與之俱來諸將莫喻既而思明果謂日越日光弼長于慿城今出在野此成擒矣汝以鐡騎宵濟為我取之不得則勿返日越將五百騎晨至柵下問曰司空在乎希皓曰夜去矣日越曰失光弼而得希皓吾死必矣遂請降希皓與之見光弼光弼厚待之任以心腹髙庭暉聞之亦降或問光弼降二將何易也光弼曰思明常恨不得野戰聞我在外以為必可取日越不獲我勢不敢歸庭暉才勇過于日越聞日越𬒳寵任必思奪之矣思明復攻河陽光弼使李抱玉守南城自將屯中灘賊將周摯攻南城不克抱玉出竒兵夾擊殺傷甚衆摯引却乃攻中灘光弼令鎮西行營節度使荔非元禮荔非關西復姓元禮寧州人拒戰羊馬城胡三省曰城外更築短垣謂之羊馬城賊大潰時光弼城外置柵柵外穿塹賊填塹八道開柵為門光弼使問元禮曰中丞視賊填塹開柵晏然不動何也元禮曰司空欲守乎戰乎光弼曰欲戰元禮曰欲戰則賊為吾填塹何為禁之光弼曰善吾所不及勉之元禮俟柵開帥敢死士突出奮擊破之摯復收兵趣北城光弼登城望曰賊兵多而不整不足畏也不過日中保為諸君破之乃命出戰及期不決召諸將問曰賊陳何方最堅曰西北隅命郝廷玉當之又問其次曰東南隅命論惟真論姓自吐蕃來降當之令諸將曰爾輩望吾旗而戰吾颭旗緩任爾擇利吾急颭旗三至地則萬衆齊入死生以之少退者斬又以短刀置鞾中曰戰危事吾國之三公不可死賊手萬一不利諸君死敵吾自剄不令諸君獨死也再戰廷玉奔還光弼驚命取其首廷玉曰馬中箭非敢退也易馬遣之僕固懷恩小却光弼又命取其首懷恩更前決戰光弼連颭其旗諸將齊進致死呼聲動天地賊衆大敗思明及摯皆遁去庚子上元元年春正月以李光弼為太尉兼中書令賊將安太清走懷州光弼再破之復擊破史思明於河陽西渚已而光弼拔懷州擒太清送之京師以郭子儀領邠寧鄜坊坊州唐置今鄜州中部縣是餘注俱見前節度使黨項等羌吞噬邉鄙將逼京畿乃分邠寧為鄜坊節度以邠州刺史桑如圭鄜州刺史杜冕領之分道招討而以郭子儀領兩道節度留京假其威名以鎮之既而或上言天下未平不可置子儀散地乃命出鎮邠州黨項散去夏四月以韋倫京兆人為山南東道節度使尋以來瑱代之先是襄州將康楚元等作亂商州刺史韋倫討平之楚元等攻破荆州衆至萬餘倫發兵生擒楚元得其所掠租庸二百萬緡至是襄州將張維瑾曹玠殺節度使史翽據州反制以倫為節度使時李輔國用事節度使皆出其門倫既朝廷所除又不謁輔國尋改秦州防禦使以來瑱鎮襄陽瑱至維瑾等降閏月以王思禮為司空武德以來不為宰相而拜三公自此始追諡太公望為武成王五月以苖晉卿行侍中晉卿練逹吏事而謹身固位時人比之胡廣以劉晏字士安曹州南華人為户部侍郎充度支鑄錢鹽鐡等使晏善治財利故用之興王紹卒紹張后之子也張后數欲危太子太子以恭遜取容會紹卒后幼子定王侗幼太子位遂定秋七月李輔國遷太上皇于西內即太極宫隋大興宫也故址在今西安府西北上皇愛興慶宫自蜀歸即居之上時自夾城往起居上皇亦時至大明宫陳元禮高力士侍衛上又命玉真公主上皇之妹如仙媛上皇舊宫人及梨園弟子往娛侍之上皇多御長慶樓父老過者往往瞻拜呼萬嵗上皇常于樓下置酒食賜之又嘗召將軍郭英乂等上樓賜宴李輔國言于上曰上皇居興慶宫日與外人交通元禮力士謀不利于陛下今六軍將士盡靈武勳臣皆反仄不安臣不敢不以聞上泣曰聖皇慈仁豈容有此對曰上皇固無此意其如羣小何陛下當為社稷大計消亂于未萌豈得徇匹夫之孝且興慶淺露非至尊所宜居大內深嚴奉迎居之有何不可又令六軍將士叩頭請之上泣不應會上不豫輔國矯稱上語迎上皇遊西內輔國將射生五百騎露刃遮道奏曰皇帝以興慶宫湫隘迎上皇遷居西內上皇驚幾墜馬髙力士曰李輔國何得無禮叱令下馬力士因宣上皇語曰諸將士各好在將士皆納刃再拜呼萬嵗力士又叱輔國共執上皇馬鞚侍衛如西內侍衛兵才尫老數十人元禮力士皆不得留左右輔國遂與六軍大將素服見上請罪上曰卿等防微杜漸以安社稷何所懼也刑部尚書顔真卿首率百寮上表請問上皇起居輔國惡之奏貶蓬州後周置今屬四川順慶府長史髙力士流巫州唐置後改沅州今湖南沅州府是陳元禮勒致仕更選後宫百餘人以備灑掃令萬安咸宜二公主皆上皇之女視服膳上皇日以不懌因不茹葷辟穀浸以成疾上初猶往問安既而上亦有疾但遣人起居其後上稍悔悟惡輔國欲誅之畏其握兵竟不能決制郭子儀統諸道兵取范陽定河北不果行制下旬日為魚朝恩所沮事竟不行冬十一月江淮都統劉展反李銑劉展皆領淮西節度副使銑貪暴不法展剛強自用節度使王仲升奏誅銑又使監軍邢延恩入奏展罪請除之延恩因説上請除展江淮都統代李峘峴之弟俟其釋兵赴鎮中道執之上從之以展為江淮都統密敕李峘及淮東節度使鄧景山曹州人圖之延恩以制書授展展疑之請先得印節延恩懼即馳詣廣陵解峘印節授展展乃上表謝恩牒追江淮親舊置之心膂悉與宋州兵七千趣廣陵延恩奔還廣陵與李峘鄧景山發兵拒之移檄州縣言展反展亦移檄言峘反州縣莫知所從峘引兵渡江屯京口鄧景山將萬人屯徐城注見前展素有威名江淮人望風畏之使其將孫待封擊景山景山衆潰展遂入廣陵展軍白沙洲名在今揚州府儀徴縣南唐于此置鎮馮智舒釋為鳯陽府之白沙山謬甚設疑兵若將趣北固山名在今鎮江府丹徒縣北者李峘悉兵拒守展乃自上流濟襲下蜀鎮名在今江寧府句容縣北峘軍潰奔宣城本宛陵縣隋更名今為寧國府治展遂陷升今江寧府唐乾元初曰升州潤及蘇湖濠隋置今江南鳯陽府是楚等州所向摧靡橫行江淮間時平盧兵馬使田神功冀州南宫人將兵三千屯任城注見前鄧景山奏乞敕神功救淮南且遣人趣之許以淮南金帛子女為賂神功及所部皆喜悉衆南下展懼選精兵渡淮擊神功連戰皆敗神功入廣陵明年二月神功遣其將分道擊展將軍賈隱林射展中目遂斬之餘黨皆平平盧軍大掠十餘日安史之亂兵不至江淮至是民始罹荼毒矣辛丑二年春二月李光弼與史思明戰于邙山敗績河陽懷州皆陷史思明據東京思明入洛陽畏光弼掎其後不敢入宫退屯白馬寺及河陽再敗遂入城或言其將士皆燕人久戍思歸上下離心急擊之可破也魚朝恩以為信然屢言之上敕光弼等進取東京光弼奏賊鋒尚鋭未可輕進僕固懷恩附朝恩亦言東都可取懷恩勇而愎麾下皆蕃漢徑兵恃功多不法郭子儀寬厚曲容之每用兵倚以集事光弼一裁之以法懷恩不悅故附會朝恩由是中使相繼督光弼出師光弼不得已將兵會朝恩等攻洛陽陳于邙山光弼命依險而陳懷恩陳于平原光弼曰依險則可進可退若陳平原戰而不利則盡矣思明不可忽也命移于險懷恩復止之史思明乘其未定薄之官軍大敗走保聞喜河陽懷州皆沒于賊朝廷聞之大懼益兵屯陜光弼既敗上表求自貶詔以為開府儀同三司未幾復為太尉統八道行營鎮臨淮貶李揆為袁州長史以蕭華嵩之子同平章事荆南節度使呂諲以善政聞揆與諲不相悅服恐其復入相隂使人求諲過失諲上疏自訟乃貶揆而相華三月史朝義殺史思明史思明猜忌好殺羣下人不自保朝義其長子也無寵愛少子朝清使守范陽常欲殺朝義立朝清為後既破李光弼欲乘勢西入關使朝義襲陜自將大軍繼之朝義數進兵皆敗思明詬怒欲斬之朝義憂懼部將駱悅蔡文景説之曰悅等與王死無日矣古有廢立請召曹將軍思明大將為宿衛史失其名謀之王茍不許今歸李氏矣朝義召曹將軍告之遂以兵入射思明殺之朝義即偽位使人至范陽殺朝清并不附已數十人諸部舊將皆思明故等夷召之多不至略相羈縻而已秋七月癸未朔日食既大星皆見八月加李輔國兵部尚書輔國求為宰相上曰以卿之功何官不可為其如朝望未孚何輔國乃諷僕射裴冕使薦已冕曰吾臂可斷宰相不可得上大悅輔國銜之九月置道場于三殿即麟德殿在大明宫中殿有三面故謂之三殿上以天成地平節帝生于九月三日遂以為天成地平節于三殿置道場以宫人為佛菩薩北門武士為金剛神王召大臣膜拜圍繞制去尊號及年號以建子月為嵗首制除五品以上官令舉一人自代江淮大飢建子月受朝賀如正旦儀以元載字公輔鳯翔岐山人為度支鹽鐡轉運等使度支郎中元載敏悟善奏對上愛其才委以江淮漕運數月會劉晏貶司農卿嚴莊怨晏告晏道禁中語矜功怨上晏遂與莊俱坐貶載遂代晏掌財利載以江淮雖經兵荒其民猶有資産乃按籍舉八年租庸之違負及逋逃者計其大數而徴之擇豪吏為縣令督之不問負之有無察民有粟帛者發徒圍之籍其所有而中分之甚者取八九謂之白著有不服者嚴刑以威之民聚山澤為羣盜州縣不能制上朝太上皇于西內先是山人李唐見上上方抱幼女謂唐曰朕念之卿勿怪也對曰太上皇思見陛下計亦如陛下之念公主也上泫然泣下然畏張后尚不敢詣西內至是始往朝壬寅寶應元年春建辰月賜郭子儀爵汾陽王知諸道行營時河東軍亂殺其節度使鄧景山諸將請以兵馬使辛雲京京杲從兄為節度使景山有禆將抵罪當死諸將請之不許其弟請代死亦不許請入一馬以贖罪乃許之諸將怒曰我輩曽不及一馬乎遂殺景山上以景山撫御失所以致亂遣使慰諭以安之諸將請以兵馬使辛雲京為節度使從之既而絳州行營隨方征討不居本鎮謂之行營兵乏食突將王元振激怒士卒殺其都統李國貞國貞淮安王神通元孫本名若幽上以為河中節度使朔方諸道行營都統鎮絳州因賜名絳州素無儲蓄糧賜不充國貞屢以狀聞朝廷未報軍中咨怨又以國貞治軍嚴思郭子儀之寬王元振因矯命于衆曰來日修都統宅具畚鍤待命士卒皆怒曰朔方健貌豈修宅夫耶元振帥之執國貞置卒食于前曰食此而後其力可乎國貞曰修宅則無之軍食則屢奏未報諸君所知也衆欲退元振曰今日都統不死則我輩死矣遂殺之鎮西北庭行營兵屯翼城隋縣今屬平陽府亦殺其節度使荔非元禮推禆將白孝德為帥于是諸軍剽掠不已朝廷憂其合從連賊非新進諸將所能鎮服乃以郭子儀為汾陽王知諸道節度行營兼興平定國等軍副元帥發京師粟帛數萬以給絳軍時上不豫羣臣莫得進見子儀請曰老臣受命將死于外不見陛下目不瞑矣王召入卧內謂曰河東之事一以委卿子儀至軍王元振自以為功子儀曰吾為宰相豈受一卒之私耶收元振及其黨四十人皆殺之辛雲京聞之亦按誅殺鄧景山者數十人由是河東諸鎮率皆奉法蕭華罷以元載同平章事領度支轉運使如故李輔國以求宰相不得怨蕭華言華専權請罷之而相載上不許固請不已上乃從之建巳月楚州得寶玉十三枚楚州言尼真如恍惚登天見上帝賜以寶玉十三枚云中國有災以此鎮之羣臣表賀太上皇崩年七十八上自仲春寢疾聞上皇登遐疾轉劇乃命太子監國時髙力士遇赦自巫州還在道聞上皇崩號痛嘔血而卒復以建寅為正月帝崩李輔國弒皇后張氏初張后與輔國相表裏専權用事晚更有隙內射生使程元振京兆三原人黨于輔國上疾篤后召太子謂曰輔國久典禁兵隂與程元振謀作亂不可不誅太子泣曰陛下疾甚危不告而誅必致震驚恐不能堪也太子出后召越王係帝次子選宦官授甲以誅輔國元振知其謀密告輔國以兵送太子于飛龍廄勒兵收係遷后于别殿時上在長生殿使者逼后下殿宦官宫人驚散明日上崩輔國等弒后并係太子即位是為代宗輔國引太子素服與宰相相見遂即位輔國恃功益橫明謂上曰大家但居禁中外事聼老奴處分上內不能平以其方握禁兵外尊禮之號為尚父而不名事無大小皆咨之羣臣出入皆先詣輔國輔國亦晏然處之以李輔國為司空兼中書令李光弼使田神功擊史朝義大破之史朝義自圍宋州數月城中食盡果毅劉昌字公明開封人曰倉中猶有麴數千斤請屑食之不過二十日李太尉必救我李光弼至臨淮諸將以朝義兵尚強請南保掦州光弼曰朝廷倚我以為安危我復退縮朝廷何望徑趣徐州使兖鄆唐置鄆州今曹州府鄆城縣是節度使田神功進擊朝義大破之光弼在徐州惟軍旅之事日決之衆務悉委判官張傪傪吏事精敏區處如流諸將事之如事光弼由是軍中肅然東夏以寧先是田神功見官屬皆平受其拜及見光弼與傪抗禮乃大驚遍拜官屬曰神功出于行伍不知禮儀諸君亦胡為不言成神功之過乎六月進李輔國爵博陸王劉友益曰宦官封王唯此程元振謀奪李輔國權密言于上請稍加裁制解輔國行軍司馬及兵部尚書出居外第于是道路相賀輔國始懼上表遜位詔罷中書令而進其爵以劉晏為度支轉運鹽鐡等使秋七月郭子儀入朝時程元振用事忌子儀功髙任重數譖之子儀不自安奏請解副元帥節度使遂留京師以程元振為驃騎大將軍九月以來瑱同平章事初瑱為山南東道節度使肅宗召赴京師瑱樂在襄漢諷將士上表留已復得還鎮尋有詔徙瑱淮西行軍司馬裴茙謀奪瑱位密表瑱倔強難制請以兵襲取之肅宗以為然徙瑱淮西河南節度使外示寵任實欲圖之密敕裴茙為防禦使肅宗崩上即位復留瑱山南東道瑱聞徙淮西大懼又諷將吏請留上欲姑息許之裴茙先得密敕即帥麾下趣襄陽瑱以兵迎之且曰吾已蒙恩復留鎮此因取敕告示之茙驚惑瑱縱兵擊之擒送京師賜死至是瑱入朝遂拜兵部尚書同平章事貶裴冕為施州注見前刺史左僕射裴冕為山陵使議事與程元振相違遂坐貶回紇舉兵入援冬十月以雍王適帝長子即德宗為天下兵馬元帥討史朝義大敗之取東京及河陽賊將薛嵩張忠志本范陽內屬奚後賜名李寶臣字為輔以州降上遣中使劉清潭使于回紇修舊好且徴兵討史朝義時回紇毗伽闕可汗死子登里可汗立已為史朝義所誘云唐室繼有大喪中原無主可汗信之清潭至謂曰先帝雖棄天下今皇帝即廣平王與葉護共收兩京者也回訖乃起兵至三城見州縣邱墟有輕唐之志乃困辱清潭清潭遣使言狀京師大駭初肅宗以僕固懷恩女妻登里可汗至是上令懷恩往見之懷恩為言唐家恩信不可負可汗悅遣使上表請助國討賊制以雍王適為天下兵馬元帥會諸道節度及回訖于陜州進討史朝義上欲以郭子儀為適副程元振魚朝恩等沮之而止加僕固懷恩同平章事領諸軍節度行營以副適適至陜州回紇屯于河北適與僚屬往見之可汗責適不拜舞兵馬使藥子昻對以禮不當然回紇將車鼻曰唐天子與可汗約為兄弟可汗與雍王叔父也何得不拜舞子昻曰安有中國儲君向外國可汗拜舞乎且兩宮在殯不應拜舞力爭久之車鼻遂引子昻等各鞭一百遣適歸營行軍司馬韋少華等遂死諸軍發陜州僕固懷恩與回紇為前鋒郭英乂魚朝恩為殿李抱玉自河陽入李光弼自陳留入會于洛陽陳于橫水地名胡三省注金人強域圖孟津有橫水店懷恩遣驍騎及回紇並南山出賊柵東北表裏合擊大破之朝義悉其精兵十萬救之官軍擊之不動鎮西節度使馬璘扶風人曰事急矣遂單騎奮擊奪賊兩牌突入萬衆中賊左右披靡大軍乘之而入賊衆大敗斬首六萬級捕獲二萬朝義將輕騎數百東走懷恩進克東京及河陽城懷恩留回紇營河陽使其子瑒帥步騎萬餘逐朝義至鄭州再戰皆捷汴州降回紇入東京肆行殺掠死者萬計朝義自濮州北渡河懷恩及㻛復再敗之于是朝義鄴郡節度使薛嵩以相衛洛邢四州降于李抱玉恆陽節度使張忠志以恆趙深定易即今易州武德中置五州降于辛雲京抱玉等入其營嵩等皆受代居無何僕固懷恩皆令復位由是抱玉雲京各表懷恩有二心朝廷宜密為備懷恩亦上疏自理上慰勉之張忠志之未降也禆將王武俊謂曰吾今以寡當衆以曲遇直戰則必離守則必潰公其圖之忠志乃降詔名其軍曰成德即拜節度使賜姓名曰李寶臣寶臣擢武俊為先鋒兵馬使王武俊字元英本契丹怒皆部入居薊盜殺李輔國上在東宫以李輔國専權心甚不平及即位以輔國有殺張后功不欲顯誅之夜遣盜入其室竊輔國首及一臂而去敕有司捕盜遣中使存問其家仍贈太傅以僕固懷恩為河北副元帥郭子儀以懷恩有平河朔功請以副元帥讓之代宗皇帝癸卯廣德元年春正月以劉晏同平章事度支等使如故流來瑱于播州殺之初來瑱在襄陽程元振有所請託不從及為相元振譖瑱言涉不順與賊合謀坐削官爵流播州賜死由是藩鎮皆切齒于元振賊將田承嗣以莫州本鄭縣唐置州改莫宋省故城在今河間府任邱縣降李懷仙柳城蕃人殺史朝義傳首京師史朝義走莫州諸軍圍之朝義屢戰皆敗田承嗣説朝義令往幽州發兵朝義從之承嗣即以城降時朝義范陽節度使李懷仙已請降朝義至不得入獨與賊騎數百東奔欲入奚契丹懷仙兵追及之朝義窮蹙縊于林中懷仙取其首以獻僕固懷恩與諸軍皆還以薛嵩田承嗣李懷仙為河北諸鎮節度使尹起莘曰此志唐失河北之始以史朝義降將薛嵩為相衛邢洛貝磁六州節度使田承嗣為魏博德滄瀛五州都防禦使李懷仙仍故地為盧龍節度使時河北諸州皆已降嵩等迎僕固懷恩拜于馬首乞行間自效懷恩恐賊平寵衰故奏留嵩等及李寶臣分帥河北自為黨援朝廷亦厭苦兵革茍冀無事因而授之承嗣舉管內户口壯者皆籍以兵惟使老弱耕稼數年有兵衆十萬奏請名其軍曰天雄又選其驍健者萬人自衛謂之牙兵范氏祖禹曰唐失河北實自此始由任僕固懷恩為制將也使李郭為將肯如是乎回紇歸國回紇部衆所過抄掠廪給小不如意輒殺之無所忌憚陳鄭節度使李抱玉欲遣官屬置頓人人辭憚趙城隋縣今屬平陽府尉馬燧獨請行比回紇將至燧先遣人賂其渠帥約無暴掠帥遺之旗曰有犯令者君自戮之燧取死囚為左右小有違令立斬之回紇相顧失色涉其境者皆拱手遵約束燧説抱玉曰燧與回紇言頗得其精僕固懷恩恃功驕蹇其子㻛好勇而輕今內樹四帥外交回紇必有窺河東澤潞之志宜深備之抱玉然之以梁崇義長安人為山南東道節度留後劉友益曰留後始此初梁崇義從來瑱鎮襄陽纍遷右兵馬使有勇力能卷鐡舒鈎沈毅寡言得衆心瑱死自鄧州引戍兵歸衆推為帥上不能討因以為留後崇義奏改葬瑱三月辛酉葬泰陵元宗陵在同州府蒲城縣東北金粟山史臣贊曰元宗初立勵精政事開元之際幾至太平何其盛也及侈心一動窮天下之欲不足為其樂而溺其所甚愛忘其所可戒至于竄身失國而不悔始終之異至于如此可不慎哉庚午葬喬陵肅宗陵唐書作建在西安府醴泉縣東北武將山賀善贊曰肅宗趣取大物而子道悖制于張后而夫道奪脅于輔國而君道失殺齊王倓而父道虧倘微郭李唐之克復未可知矣夏四月李光弼遣將擒台州賊袁朝浙東平初台州賊袁朝攻陷浙東諸州民疲于賦斂者多歸之聚衆二十萬光弼使部將張伯儀魏州人將兵討平之分河北諸州節度以幽莫媯檀平薊為幽州管恆定趙深易為成德軍管相貝邢洺為相州管魏博德為魏州管滄棣冀瀛為青淄管懷衛河陽為澤潞管敕議舉孝亷禮部侍郎楊綰字公權華隂人上疏略曰古之選士必取行實自隋焬帝始置進士科猶試䇿而已至髙宗時考功員外郎劉思立始奏進士加雜文明經加帖括從此成俗公卿以此待士長老以此訓子其明經則誦帖括以僥幸又令舉人投牒自應如此欲其返淳朴崇亷讓何可得也請置孝亷科令縣令取行著鄉閭學知經術者薦之于州刺史考試升之于省任占一經問經義二十條對䇿三道上第注官中第出身下第罷歸其道舉謂學老莊者亦非理國所資望與明經進士並停上命諸司通議給事中李栖筠左丞賈至曾之子京兆尹嚴武字季鷹挺之之子並是綰議仍請兼廣學校保桑梓者鄉里舉焉在流寓者庠序推焉敕禮部具條目以聞綰奏國子監舉人令博士薦于祭酒祭酒試通者升之于省如鄉貢法明法委刑部考試或以為明經進士行之已久不可遽改事雖不行識者是之後綰又奏孝弟力田無實狀及童子科皆僥幸悉罷之秋七月羣臣上尊號九月遣使徴僕固懷恩入朝不至初僕固懷恩受詔與回紇可汗相見于太原河東節度使辛雲京恐其合謀襲軍府閉城自守亦不犒師懷恩怒具表其狀不報中使駱奉仙至太原雲京厚結之使言懷恩反狀已露懷恩亦奏請誅雲京奉仙詔和解之懷恩自以兵興以來所在力戰一門死王事者四十六人女嫁絶域説諭回紇再收兩京平定河南北功無與比而為人搆陷憤怨殊深上書自訟書曰臣罪有六昔同羅叛亂臣為先帝掃清河曲一也男玢陷賊亡歸臣斬之以令衆士二也二女逺嫁為國和親三也身與男㻛為國效命四也河北新附撫安反側五也説喻回紇使赴急難六也臣既負六罪誠合萬誅思得一奉天顔又以來瑱之死深畏中官讒口虛受陛下誅夷臣奏奉仙非不托實陛下竟無處置寵任彌深竊聞四方遣人奏事陛下皆云與驃騎議之曽不委宰相可否或留數月不遣逺近無不疑沮儻不納愚懇且務因循臣實不敢保家陛下豈能安國唯陛下圖之同羅鐡勒别部安祿山反同羅叛冦朔方郭子儀遣懷恩討平之驃騎謂程元振上遣裴遵慶字少良聞喜人詣懷恩喻旨諷令入朝懷恩抱遵慶足號泣訴寃然以懼死為詞竟不奉詔冬十月吐蕃入冦上如陜州吐蕃入長安關內副元帥郭子儀擊之吐蕃遁去吐蕃入冦陷蘭廓河鄯洮岷秦成渭注俱見前等州唐自武德以來開拓邊境地連西域皆置都督府開元中置朔方隴右河西安西北庭諸節度使以統之嵗發山東丁壯為戍卒繒帛為軍資開屯田供糗糧設監牧畜馬牛軍城戍邏萬里相望及安祿山反邊兵精鋭者皆徴發入援謂之行營留兵單弱數年之間強者蠶食自鳯翔以西邠州以北相繼淪沒至是吐蕃入大震關盡取河西隴右之地邉將告急程元振皆不以聞十月冦至涇州刺史髙暉降之為之鄉導既過邠州上始聞之至奉天唐縣故城在今陜西乾州武功京師震駭詔以雍王適為關內元帥郭子儀副之出鎮咸陽以禦之子儀間廢日久部曲離散及是召募得二十騎而行至咸陽吐蕃帥吐谷渾黨項氐羌二十餘萬衆渡渭循山而東子儀使判官王延昌入奏請益兵程元振遏之竟不召見吐蕃渡便橋上倉猝不知所為出幸陜州官吏六軍逃散吐蕃入長安立廣武王承宏邠王守禮之孫為帝縱兵焚掠長安中蕭然一空苖晉卿病卧家輿入脅之晉卿閉口不言冦不敢殺子儀引三十騎自御宿川在咸寧縣南漢書揚雄傳武帝開上林至昆吾御宿即此循山而東謂王延昌曰大軍逃潰多在啇州速往收之延昌徑入啇州撫諭之諸將方縱兵暴掠聞子儀至皆大喜聼命得四千人軍勢稍振子儀乃泣諭將士以共雪國恥取長安皆感激受約束上恐吐蕃出潼關徵子儀詣行在子儀表曰臣不收京城無以見陛下若兵出藍田冦亦不敢東向上許之鄜坊節度判官假秀實説白孝德引兵赴難孝德即日大舉南趨京畿與蒲陜啇華合勢進擊子儀使羽林大將軍長孫全緒將二百騎出藍田又令寶應軍使張知節將兵繼之全緒至韓公堆在西安府藍田縣橫嶺北晝則擊鼓張旗幟夜則多燃火以疑吐蕃吐蕃懼百姓又紿之曰郭令公自啇州將大軍至矣吐蕃惶駭悉衆遁去髙暉東走潼關守將李日越擒殺之詔以子儀為西京留守白孝德與邠寧節度使張藴琦將兵屯畿縣子儀召之入城京畿遂安吐蕃還圍鳳翔鎮西節度使馬璘將精騎千餘人赴難轉鬬至城丅持滿外向突入城中不解甲兵戰單騎奮擊俘斬千計明日冦復請戰璘開懸門以待之冦引退曰此將軍不惜死宜避之遂去是冬吐蕃陷松維保三州于是劍南西山諸州皆陷松維保三州皆唐置松州今四川松潘衛是維保二州故城俱在荗州保縣西山即大雪山亦名蓬婆山在今松潘衛疊溪營西諸州謂松茂雅嶲等都督府所隸諸羌羈縻州十一月削程元振官爵放歸田里程元振專權自恣人畏之甚于李輔國諸將有大功者元振皆忌嫉欲害之吐蕃入冦元振不以時奏致上狼狽出幸上發詔徴諸道兵李光弼等皆忌元振莫有至者中外切齒莫敢言太常博士栁伉上疏以為吐蕃犯關度隴不血創而入京師武士無一人力戰此將帥叛陛下也陛下疏元功委近習日引月長在廷無一人犯顔回慮此公卿叛陛下也陛下始出都百姓填然奪府庫相殺戮此三輔叛陛下也自十月朔召諸道兵盡四十日無隻輪入關此四方叛陛下也陛下必欲存宗廟安社稷獨斬程元振首馳告天下悉出內使隸諸州持神䇿兵付大臣然後削尊號下詔引咎如此而兵不至人不感天下不服臣請闔門寸斬以謝陛下上猶以元振有保護功削官爵放歸田里元振歸三原聞上還宫衣婦人服私入長安復規任用京兆擒之以聞敕流溱州上念其功復命江陵安置府溱州唐置地在今貴州思南界十二月上還長安車駕發陜州左丞顔真卿請上先謁陵廟然後還宫元載不從真卿怒曰朝廷豈堪相公再壞耶載由是銜之上至長安郭子儀帥百官諸軍奉迎伏地待罪上勞之曰用卿不早故及于此廣武王承宏逃匿草野上赦不誅放之華州以魚朝恩為天下觀軍容宣慰處置使總禁兵苖晉卿裴遵慶罷以李峴同平章事遵慶既去元載權益盛以貨納內侍董秀上意所屬載必先知之承意探微言無不合上以是愈愛之甲辰二年春正月詔刑部尚書顔真卿宣慰朔方行營上之在陜也真卿請奉詔召僕固懷恩不許至是命真卿宣慰朔方行營諭懷恩入朝對曰陛下在陕臣往以忠義責之使之赴難彼猶有可來之理今陛下還宫彼進不成勤王退不能釋衆召之庸肯至乎且言懷恩反者獨幸雲京駱奉仙李抱玉魚朝恩四人耳陛下不若以郭子儀代懷恩可不戰而服也時抱玉從弟抱真字太原為邠州别駕知懷恩有異志脫身歸京師召見問計對曰此不足憂也朔方將士思郭子儀如父兄陛下誠以子儀鎮朔方彼皆不召而來矣上然之已而真卿竟不果行立雍王適為皇太子僕固懷恩反冦太原以郭子儀為河中節度等使懷恩使其子㻛寇太原不克懷恩謀取太原辛雲京覺之乘城設備㻛攻之大敗而還遂圍榆次漢縣今屬太原府上謂郭子儀曰懷恩父子負朕實深聞朔方將士思公如枯旱之望雨公為朕撫河東汾上之師必不為變乃以子儀為關內河東副元帥河中節度等使懷恩將士聞之皆曰吾輩從懷恩為不義何面目見汾陽王僕固㻛為其下所殺懷恩走靈州綱目作雲州今依唐書通鑑改僕固㻛圍榆次旬餘不拔十將官名也焦暉白玉攻殺之懷恩聞之入告其母母曰吾語汝勿反國家待汝不薄今衆心既變禍必及我將如之何懷恩不對而出母提刀逐之曰吾為國家殺此賊取其心以謝三軍懷恩疾走得免遂與麾下三百渡河北走靈州子儀傳㻛首詣闕羣臣入賀上慘然不悅曰朕信不及人致勳臣顛越深用為愧又何賀焉命輦懷恩毋至長安給待優厚月餘以夀終以禮葬之功臣皆感嘆子儀如汾州懷恩之衆數萬悉歸之咸鼓舞涕泣喜其來而悲其晚也劉晏李峴罷以王縉字夏卿太原祁人杜鴻漸同平章事晏坐與程元振交通元振獲罪峴有力焉由是為宦官所疾故與晏皆罷三月以劉晏為河南江淮轉運使自喪亂以來汴水堙廢漕運者自江漢抵梁洋迂險勞費兵大之後中外艱食關中米斗千錢百姓挼奴未反以手摩也穗以給禁軍宫厨無兼時之積晏乃疏浚汴水遺元載書具陳漕運利害令中外相應自是每嵗運米數十萬石以給關中唐世稱漕運之能者推晏為首後來者皆遵其法度云夏五月初行五紀厯六月罷河中節度及耀德軍乾元初置于河中郭子儀以安史昔據洛陽故諸道置節度使以制其要衝今大盜已平而所在聚兵耗蠧百姓表請罷之仍自河中為始從之秋七月稅青苖錢給百官俸苖一畝稅錢十五以國用怠不及秋方苗青則征之號青苗錢臨淮王李光弼卒諡曰武穆上之幸陜也李光弼竟遷延不至吐蕃退除光弼東都留守光弼辭以就江淮糧運引兵歸徐州光弼母在河中上恐遂成嫌隙數遣使存問已復迎至長安厚加供給使其弟光進掌禁兵遇之加厚光弼治軍嚴重指顧號令諸將莫敢仰視謀定而後戰能以少制衆與郭子儀齊名及在徐州擁兵不朝諸將田神功等不復稟畏公弼愧恨成疾而卒僕固懷恩引回紇吐蕃入冦詔郭子儀出鎮奉天懷恩至靈武收合散亡其衆復振上厚撫其家下詔曰懷恩勳勞著于帝室疑隙之端起自羣小君臣之義情實如初但當詣闕更勿有疑懷恩竟不從遂引回紇吐蕃十萬衆入寇京師震駭會郭子儀自河中入朝詔子儀出鎮奉天召問方略對曰懷恩勇而少恩士心不附所以能入寇者因思歸之士耳懷恩本臣偏裨其麾下皆臣部曲必不忍以鋒創相向無能為也已而懷恩進逼奉天子儀出兵懷恩退懷恩與回紇吐蕃進逼奉天諸將請戰子儀曰冦深入利速戰吾堅壁以待之彼必以吾為怯而不戒乃可破也若遽戰而不利則衆心離矣敢言戰者斬既而夜出陳于乾陵之南冦始以子儀為無備欲襲之忽見大軍驚愕不戰而退至邠州攻之不克遂遁先是子儀使其子晞將兵救邠州晞縱士卒為暴節度使白孝德患之而不敢言假秀實自請補都虞候晞軍士入市取酒刺酒翁壞釀器秀實列卒盡取其首注塑上植市門晞一營大譟盡甲孝德恐秀實曰無傷也請住解之選老躄者一人持馬至晞門甲者出秀實笑且入曰殺一老卒何甲也吾戴吾頭來矣晞出秀實讓之曰副元帥勳塞天地當念始終今常待恣卒為暴行且致亂亂則罪及副元帥郭氏功名其存者幾何言未畢晞再拜曰公幸教晞以道敢不從命叱左右皆鮮甲敢譁者死秀實因留宿軍中且俱至孝德所謝九月關中蟲蝗霖雨冬十二月加郭子儀尚書令不受子儀以太宗為此官近皇太子亦為之不敢當遂不受還鎮河中戶部奏是嵗戶口之數戶二百九十餘萬口一千六百九十餘萬乙巳永泰元年春正月以李抱真為澤潞節度副使抱真以山東有變上黨為兵衝而荒亂之餘土瘠民困無以贍軍乃藉民每三丁選一壯者免其租徭給弓失使農隙習射嵗暮都試行其賞罰比二年得精兵二萬既不費稟給府庫充實遂雄視山東步兵為諸道最三月命文武之臣十三人于集賢殿待制命僕射裴冕郭英乂等十三人于集賢殿待制左拾遺獨孤及上疏曰陛下召冕等以備詢問此盛德也然恐陛下難容其直而不録其言有容下之名而無聼諌之實則臣之所恥也今師興不息十年矣人之生産空于杼軸擁兵者第館亘街陌奴婢厭酒肉而貧人嬴餓就役剝膚及髓長安城中白畫椎剽吏不敢詰民不敢訴有司不敢以聞茹毒飲痛窮而無告陛下不思所以救之臣實懼焉今天下惟朔方隴西有吐蕃僕固之虞邠涇鳯翔之兵足以當之矣東南泊海西盡巴蜀無鼠竊之盜而兵不為解傾天下之貨竭天下之穀以給不用之兵臣不知其故假仒居安思危自可厄要害之地俾置屯禦悉休其餘以糧儲屝屨之資充疲人貢賦嵗可減國租之半陛下豈可遲疑于改作使率土之患日甚一日乎上不能用獨孤及字至之洛陽人吐蕃遣使請和吐蕃遣使請和詔元載等與之盟上問郭子儀子儀對曰吐蕃利我不虞若不虞而來則國不可守矣乃遣兵戍奉天旱斗米千錢夏四月以裴諝字士明寬之子為左司郎中河東租庸使裴諝入奏事上問𣙜酷之利嵗入幾何諝不對復問對曰臣自河東來所過見菽粟未種農夫怨愁臣以為陛下見臣必先問人之疾苦乃責臣以營利臣是以未敢對也上謝之拜左司郎中劒南節度使嚴武卒武三鎮劒南厚賦斂窮奢侈專殺戮母數戒之武不從及死母曰吾今始免為官婢矣然吐蕃畏之不敢犯其境五月畿內麥稔尹起莘曰上書旱此書麥稔飢荒之急幸有是耳然稔止幾內四方萬里未知若何也自春不雨至四月乃雨及是麥稔京兆尹第五琦請稅百姓田十畝收其一曰此古什一之法也上從之已而京兆用琦稅法民多流亡久乃罷之平盧將李懷玉逐其節度使侯希逸詔以懷玉為留後賜名正已先是侯希逸自平盧拔其軍浮海入青州據之朝廷即以為平盧淄青節度使自是淄青常以平盧冠使希逸好遊畋營塔寺兵馬使李懷玉得衆心希逸忌之因事解其軍職至是希逸宿于城外軍士閉門奉懷玉為帥希逸奔滑州召還京師以鄭王邈帝之子為節度使懷玉知留後賜名正己時成德李實臣魏傅田承嗣相衛薛嵩盧龍李懷仙收安史餘黨各擁徑卒數萬治兵完城自署將吏不供貢賦與山南東道梁崇義及正已皆結為婚姻互相表衆朝廷専事姑息不能復制秋九月置百髙座講仁王經內出仁王經二寶輿以人為菩薩鬼神之狀導以音樂鹵簿百官迎從至資聖西明寺講之僕固懷恩誘回紇吐蕃雜部入冦懷恩道死召郭子儀屯涇陽冬十月回紇受盟而還吐蕃夜遁僕固懷恩誘回紇吐蕃吐谷渾黨項奴剌盧逹反吐谷渾别種數十萬衆俱入寇令吐蕃趨奉天黨項趨同州吐谷渾奴敕趨盩厔回紇繼吐蕃之後懷恩又以朔方兵繼之郭子儀奏冦皆騎兵其來如飛不可易也請使鳯翔滑濮邠寧鎮西河南淮西諸節度各出兵以厄其衝要上從之懷恩中塗遇暴疾死大將范志誠領其衆懷恩拒命三年再引外冦為國大患上猶為之隱曰懷恩不反為左右所誤耳吐蕃十萬至奉天始列營朔方兵馬使渾瑊帥驍騎二百衝之賊衆披靡瑊夾賊一將躍馬而還士氣大振夜復引兵襲之殺千餘人京師聞冦至奉天始罷百高座講召郭子儀使屯涇陽上自將六軍屯苑中下制親征百官入朝魚朝恩從禁軍操白刃宣言曰吐蕃攻犯郊畿車駕欲幸河中何如公卿皆錯愕不知所對有劉給事者獨出班抗聲曰敕使反邪今屯軍如雲不戮力捍冦而遽欲脅天子棄宗社非反而何朝恩驚沮事遂寢會大雨旬日冦不能進大掠而去所過焚廬舍蹂禾稼殆盡十月復講經吐蕃退至邠州遇回紇復相與入寇合兵圍涇陽子儀嚴備不戰時二冦聞懷恩死已爭長不相睦子儀使牙將李光瓚説回紇欲與共擊吐蕃回紇不信曰郭公在此可得見乎光瓚還報子儀曰今衆寡不敵難以力勝昔與回紇契約甚厚不若挺身説之可不戰而下也諸將請選鐡騎五百衛從子儀曰此適足為害耳郭晞扣馬諫曰大人國之元帥奈何以身為冦餌子儀曰今戰則父子俱死而國家危往以至誠與之言或幸而見從則四海之福也不然則身沒而家全以鞭擊其手曰去遂與數騎出使人傳呼曰令公來回紇大驚大帥藥葛羅可汗之弟也執弓注矢立於前郭子儀免胄釋甲投鎗而進諸部長相顧曰是也皆下馬羅拜子儀亦下馬前執藥葛羅手讓之曰汝回紇有大功于唐唐之報汝亦不薄奈何負約深入吾地棄前功結後怨背恩德而助叛臣乎且懷恩叛君棄母於汝何有今吾挺身而來聽汝殺之我之將士必致死與汝戰矣藥葛羅曰懷恩欺我言天可汗已晏駕令公亦捐館中國無主我是以來今皆不然懷恩又為天所殺我曹豈肯與令公戰乎子儀因説之曰吐蕃無道所掠之財不可勝載馬牛雜畜長數百里此天之賜汝也全師而繼好破敵以取富為汝之計孰便于此不可失也藥葛羅曰吾為懷恩所誤負公誠深今請為公盡力以謝過然懷恩之子可敦兄弟也願勿殺之子儀許之回紇觀者為兩翼稍前子儀麾下亦進子儀揮手却之因取酒與其部長共飲藥葛羅使子儀先執酒為誓子儀酹地曰大唐天子萬嵗回紇可汗亦萬嵗兩國將相亦萬嵗有負約者身隕陳前家族滅絶杯至藥葛羅亦酹地曰如令公誓于是諸部長大喜曰軍中筮言此行安穩不與唐戰見一大人而還今果然矣遂與定約而還吐蕃聞之夜遁回紇遣其部長入見天子藥葛羅帥衆追吐蕃殺獲萬計詔罷親征京城解嚴初肅宗以陜西節度使郭英乂領神䇿軍使魚朝恩監之英乂入為僕射朝恩専將之及上幸陜朝恩舉在陜兵與神䇿軍迎扈悉號神䇿軍天子幸其營及京師平朝恩遂以軍歸禁中自將之然尚未得輿北軍齒至是從上屯苑中其勢寖盛分為左右廂居北軍之右矣閏月以路嗣恭字懿範京兆三原人為朔方節度使子儀以靈武初復百姓雕弊戎落未安請以嗣恭鎮之嗣恭披荆棘立軍府威令大行郭子儀還河中子儀在河中以軍食常乏乃自耕百畝將校以是為差于是士卒皆不勸而耕野無曠士軍有餘糧漢州注見前刺史崔旰安平人徙衛州殺西川節度使郭英乂初嚴武在蜀奏崔旰為漢州刺史旰將兵擊吐蕃連拔其數城攘地數百里武作七寶舉迎旰入成都以寵之武卒行軍司馬杜濟等共請郭英乂為節度使旰與所部亦請大將王崇俊會朝廷已除英乂英乂至即誣殺崇俊遣使召旰旰辭不至英乂怒自將兵攻之敗還旰聞英乂裁損士卒稟賜下皆怨怒又毁元宗鑄金真容初元宗離蜀以所居行宫為道觀仍鑄金為真容英乂愛其竹樹茂美奏為軍營因徙去真容自居之旰因宣言英乂反發兵襲之英乂奔簡州隋置今屬成都府為普州注見前刺史韓澄所殺于是卭州注見前牙將柏茂琳瀘州梁置今𨽻四川牙將楊子琳劒州注見前牙將李昌夔各舉兵討旰蜀中大亂明年詔以杜鴻漸為劒南東西川副元帥旰卑辭重賂以迎之鴻漸貪其利見旰無一言責其干犯反薦之于朝請以節制讓旰上不得已以旰為成都尹西川節度行軍司馬鴻漸又表柏茂琳楊子琳李昌夔各為本州刺史以和解之又明年鴻漸還朝以旰為西川節度使鴻漸薦旰才堪寄任上亦務姑息乃留鴻漸復知政事以旰為節度使旰厚斂以賂權貴元載擢其兄弟皆至大官久之旰入朝會楊子琳襲成都詔旰還鎮賜名寧先是寧弟寬為留後數與子琳戰不利寧妾任氏出家財募兵得數千人帥以擊子琳破走之丙午大厯元年春正月敕復補國子學生自安史之亂國子監室堂頽壞軍士多借居之祭酒蕭昕上言學校不可遂廢故有是詔以户部尚書劉晏侍郎第五琦分理天下財賦二月釋奠于國子監釋奠于國子監命宰相帥常參官魚朝恩帥六軍諸將往聽講子弟皆服朱紫為諸生謂朝恩之子弟朝恩既貴顯乃學講經為文僅能執筆辨章句遽自謂才兼文武莫敢與之抗貶顔真卿為峽州注見前别駕元載専權恐奏事者攻訐其私乃請百官論事皆先白宰相然後奏聞顔真卿上疏論之疏曰諌官御史陛下之耳目今使論事者先白宰相是自掩其耳目也李林甫為相深疾言者蒙蔽喑嗚卒成幸蜀之禍陵夷至于今日夫人主大開不諱之路羣臣猶莫敢盡言况令宰相大臣裁而抑之則陛下所聞見者不過三數人耳天下之士從此鉗口結舌陛下見無復言者以為天下無事可論是林甫復起於今日也昔林甫雖擅權猶托他事隂中言者不敢明令百司奏事皆先白宰相陛下儻不早寤漸成孤立後悔無及矣以馬璘兼邠寧節度使璘以假秀實為都虞侯璘處事或不中理秀實爭之璘或甚怒秀實曰秀實罪若可殺何以怒為無罪殺人恐涉非道璘攝衣起秀實徐步而出良久璘置酒召秀實謝之自是事皆咨秀實而後行聲稱甚美秋八月以魚朝恩判國子監事命魚朝恩判國子監中書舍人常衮京兆人言成均之任當用名儒不宜以宦者領之不聽命宰相百官送上朝恩執易升髙座講鼎折足以譏宰相王縉怒元載怡然朝恩曰怒者常情笑者不可測也冬十月上生日諸道節度使上夀上生日諸道節度使獻金帛珍玩為夀共直緡錢二十四萬常衮言節度使非能男耕女織必取之於人斂怨求媚不可長也請却之上不聽以陳少逰博平人為宣歙今寧國徽州二府是觀察使少逰為吏強敏而好賄善結權貴以是得進除桂管元和志桂管領州十二治桂州桂州今廣西桂林府是觀察使惡其道逺多瘴癘宦官董秀掌樞密少逰請嵗獻五萬緡又納賄于元載子仲武內外引薦遂改宣歙丁未二年春二月郭子儀入朝上禮重子儀嘗謂之大臣而不名子儀之子曖尚升平公主嘗與爭言曖曰汝倚乃父為天子邪我父薄天子而不為公主恚奔車奏之上曰此非汝所知彼誠如是使彼欲為天子天下豈汝家所有邪慰諭令歸子儀聞之囚曖入待罪上曰鄙諺有之不癡不聾不為家翁兒女閨房之言何足聽也子儀歸杖曖數十後盜發子儀父冢人以為魚朝恩使之子儀見上上語及之子儀流涕曰臣久將兵不能禁暴軍士多發人冡今日及此乃天譴非人事也子儀禁無故軍中走馬南陽夫人乳母之子犯禁都虞候杖殺之諸子泣訴子儀叱遣之明日以事語僚佐而歎息曰子儀諸子皆奴才也不賞父之都虞候而惜母之乳母子非奴才而何魚朝恩作章敬寺魚朝恩以賜莊為章敬寺以資太后帝母吳氏𡨕福窮壯極麗奏毁曲江及華清宫館以給之衛州進士髙郢乃上書曰先太后聖德不必以一寺增輝國家永圖無寧以百姓為本捨人就寺何福之為且古之明主積善以致福不費財以求福修德以消禍不勞人以攘禍今徇左右之過計傷皇王之大猷臣竊為陛下惜之不報始上好祠祀未甚重佛元載王縉杜鴻漸皆好佛縉尤甚上嘗問曰佛言報應果有之邪載等對曰國家運祚靈長非宿值福業何以致之福業已定雖時有小災終不能為害所以安史皆有子禍懷恩出門病死二冦不戰而退此皆非人力所及豈得言無報應也上由是深信之常於禁中飯僧百餘人有冦至則令僧講仁王經以禳之寇去則厚加恩賜番僧不空官至卿監爵為國公出入禁闥勢移權貴良田美利多歸僧寺載等侍上多談佛事由是臣民承化皆廢人事而奉佛政刑日紊矣戊申三年春正月帝幸章敬寺度僧尼千人二月乙巳朔日食夏四月徵李泌于衡山泌既至復賜金紫為之作書院于蓬萊殿側上時過之除拜方鎮給舍以上軍國大事皆與之議欲以泌為相泌固辭追諡齊王倓倓于是春追贈齊王為承天皇帝上與李泌語及齊王倓欲厚加褒贈泌請用岐薛故事贈太子上泣曰吾弟首建靈武之議成中興之業岐薛豈有此功乎竭誠忠孝乃為讒人所害嚮使尚存朕必以為太弟今當崇以帝號成吾夙志乃追諡倓曰承天皇帝六月幽州將朱希彩殺其節度使李懷仙詔以希彩知留後幽州兵馬使朱希彩經略副使朱泚幽州昌平人及弟淹共殺節度使李懷仙希彩自稱留後成德節度使李寶臣遣將討希彩不克朝廷不得己宥之以王縉領盧龍節度使希彩知留後縉至幽州希彩盛兵以逆之縉晏然而行希彩迎謁甚恭縉度終不可制勞軍而還秋七月遣右散騎常侍蕭昕使回紇回紇可敦死以昕為弔祭使回紇庭詰昕曰我於唐有大功唐奈何失信市我馬不時歸其直昕曰回紇之功唐已報之矣僕固懷恩之叛回紇助之與吐蕃連兵入寇逼我郊畿及懷恩死吐蕃走然後回紇懼而請和我唐不忘前功加惠而縱之不然匹馬不歸矣乃回紇負約豈唐失信邪回紇慙厚禮之內出盂蘭盆釋經佛作盂蘭盆會于七月望日異百味五果著盆中供養十方大德梵語盂蘭猶華言救倒懸盆器也華梵共舉賜章敬寺內出盂蘭盆賜章敬寺設七廟神座書尊號于幡上百官迎謁於光順門自是嵗以為常八月吐蕃寇靈武九月鳯翔都將李晟字良器洮州臨潭人屠吐蕃定秦堡胡三省注吐蕃志吞秦士築堡于洮州以定秦為名吐蕃遁還吐蕃寇靈武鳯翔節度使李抱玉使其將李晟將兵五千擊之晟曰以力則五千不足用以謀則太多乃將千人兼行出大震關至臨洮屠吐蕃定秦堡焚其積聚而還吐蕃聞之釋靈州之圍而去冬十二月以馬璘為涇原原州唐置今乎涼府固原州是節度使元載以吐蕃連嵗入寇馬璘以四鎮兵屯邠寧力不能拒而郭子儀以朔方重兵鎮河中深居腹中無事之地乃與子儀及諸將議徙璘鎮涇州而使子儀以朔方兵鎮邠州日若以邊土荒殘軍費不給則以內地租稅金帛助之諸將皆以為然乃徙璘為涇原節度使璘先往城涇州以都虞候段秀實知邠州留後初四鎮北庭兵久羈旅數遷徙勞弊怨兵馬使王童之謀作亂期以辛酉旦警嚴而發前夕有告之者秀實陽召掌漏者怒之以其失節令每更來白輒延之數刻遂四更而曙童之不果發告者又云今夕欲焚馬坊草因救火作亂中夕火果發秀實命軍中行者皆止坐者勿起各整部伍嚴守要害童之白請救火不許及旦捕童之及其黨八人皆斬之下令日後徙者族流言者刑遂徙于涇御批厯代通鑑輯覽卷五十六

body:
  text: 欽定四庫全書御批厯代通鑑輯覽卷一百二十附明唐桂二王本末桂王三壬辰我大清世祖章皇帝順治九年春二月孫可望劫遷桂王由榔于安隆所可望遣兵遷由榔入居安隆所改為安龍府可望嵗以銀八千兩米百石為供從官皆取給焉宫室庳陋服御粗惡守護將承可望意無復人臣禮由榔不堪其憂時馬吉翔掌戎政龎天夀督勇衛營俱諂事可望惡大學士吳貞育不附已令其黨冷孟銋吳象元方祈亨交章彈擊且語孟銋等曰秦王宰天下我具啓以內外事盡付戎政勇衛二司大權歸我公等為羽翼貞育何能為吉翔遂遣門生郭璘説主事胡士瑞進賢人擁戴秦王士瑞怒厲聲叱退之他日吉翔遣璘求郎中古其品畫堯舜禪受圖以獻可望其品拒不從吉翔譖于可望杖殺其品而可望果以朝事盡委吉翔天夀于是士瑞與給事中徐極江西人貟外郎林青陽新寧人蔡縯九江人主事張鐫寧國人連章發其姦謀由榔大怒兩人求救于太妃乃免夏五月李定國犯湖南定南王孔有德率輕兵出河池向貴州以大軍駐栁州接應孫可望乃謀入犯使李定國馮雙禮由黎平出靖州馬進忠由鎮逺出沅州會於武岡以圖桂林劉文秀張先璧由永寧出敘州白文選由遵義出重慶會於嘉定以圖成都可望言於由榔封定國西寧王文秀南康王定國進攻靖沅武岡俱陷之有德還守桂林我大清兵襲桂王由榔總督尚書揭重熙於廣信殺之先是金聲桓既伏誅江西諸軍盡散獨總兵張自盛衆數萬走閩重熙入其軍約廣信曺大鎬刻期竊發兵部侍郎傅鼎銓亦往來兩家軍中自盛掠邵武戰敗就擒鼎銓為廣信守將所執繫南昌獄諭降不從死事在順治八年至是重熙率數十人赴大鎬於百丈磜適大鎬還軍鉛山惟空營在衆就營炊食大兵偵得之率衆至射重熙中項執至建寧下之獄重熙覔死具不得日整衣冠拜呼祈死及就刑昻首受刃顔色不改大鎬尋亦敗死自是江右之阻兵抗命者盡矣重熙初賜諡忠烈鼎銓以曽降流賊節有虧廷議不豫諡六月我大清兵克髙雷亷瓊諸府我大兵自雷州進抵亷州遣將攻欽州靈山桂王由榔南陽伯李元允為土兵執送軍前不順命與弟建捷俱斬于市遂克瓊州杜永和來降巡撫髙雷亷瓊四府右僉都御史張孝起走避龍門島島破就執不食七日死之孝起忠節賜諡秋七月李定國陷桂林李定國由西延大埠疾趨而進大兵遇於全州不利定國薄桂林驅象來攻城遂陷定王孔有德自經定國獲陳邦傅及其子曽禹去其皮而殺之傳尸安隆桂王由榔御史李如月劾孫可望不請旨擅殺勛鎮罪同莽操而請加邦傅惡諡以懲不忠由榔知可望必怒留其疏召如月入諭以諡本褒忠無惡諡理小臣妄言亂制杖四十除名意將解可望而可望大怒遣人至由榔所執如月至朝門外抑使跪如月憤甚極口大罵其人遂剔其皮斷其手足及首實草皮內紉之懸于通衢如月東管人賜諡烈愍定國分兵犯廣西郡縣梧州栁州相繼陷又遣白文選攻陷辰州總兵徐勇戰歿冬十月孫可望遣兵犯四川可望遣劉文秀等入四川進據成都大兵退守保寧文秀等悉衆來攻直薄城下連營十五里大兵迎擊大敗之斬其將王復臣十一月我大清兵擊敗李定國于衡州定逺大將軍敬謹親王尼堪等帥師南征次湘潭馬進忠等遁去大兵遂進去衡山縣三十里擊退其衆兼程趨衡州方列陳定國兵已至大兵奮力衝擊定國兵敗走斬獲無算敬謹親王自率精騎追之遇伏歿于陳定國乃收兵退屯武岡癸巳我大清世祖章皇帝順治十年春二月李定國自湖南遁走廣西定國既連陷楚粵諸郡兵力益強不復稟孫可望約束可望忿甚會定國敗于衡州可望使人召之赴沅州議事將以為罪而殺之定國覺其意辭不行至是定國率馬進忠等犯永州定逺大將軍多羅貝勒吞齊等帥師自衡州進擊未至定國已遁度龍虎關而去遂入廣西時大軍已克復桂林府定國乃據栁州三月我大清兵擊敗孫可望於寶慶可望自率兵追李定國由靖州進次寶慶大兵偵知之自永州迎擊與馮雙禮等遇於周家坡雙禮營山頂據地險與大兵相拒可望帥前軍乘夜至與雙禮合明日率衆下山來犯大兵分路奮擊可望大敗斬馘甚衆可望遁還貴州盡殺明宗室之在黔者夏李定國犯廣東孫可望憾李定國益甚然以其將兵在外不敢輕樹敵仍厚養其妻子於雲南定國亦防可望襲之益思據地自固乃與馬寶由懷集犯廣東攻圍肇慶大兵自廣州來救敗之四會河口定國移兵犯平樂陷之府江道周永緒平樂知府尹明廷等遇害又攻髙州雷州諸府亦俱為所陷秋桂王由榔遣使於李定國先是由榔在安隆塗葦薄以自蔽日食脫粟窮困備至而前御史任僎中書方于宣等屢勸進於孫可望可望遂自設內閣六部等官可望初欲設六部翰林官慮人議其僭乃以范礦馬兆義任僎萬年䇿為吏戶禮兵尚書並加行營之號後又以程源代年䇿而僎最寵屢勸可望僭號可望令待由榔入黔議之由榔久駐安隆可望乃自設內閣六部官以文安之為東閣大學士安之不為用走川東依劉體仁等以居立太廟定朝儀改印文為八疊盡易其舊由榔聞之憂懼密謂中官張福祿全為國曰聞李定國已定廣西軍聲大振欲密下一敕令統兵入衛若等能密圖乎二人言徐極林青陽張鐫蔡縯胡士瑞曽疏劾馬吉翔龎天夀宜可與謀由榔即令告之五人許諾引以告大學士吳貞育貞育曰主上憂危正我輩報國之秋諸君中誰能充此使者青陽請行乃令佯乞假歸葬而使貟外郎蔣乾昌晉江人撰豫定國敕主事朱東旦四川人書之福祿等持入用寶青陽于嵗盡間道馳至定國所定國接敕感泣許以奉迎然以兄事可望久未敢經發事在順治九年至是青陽久未還由榔將擇使往促貞育以翰林孔目周官臨川人對都督鄭允元歙縣人曰吉翔晨夕在側假他事出之外庶有濟由榔乃令吉翔奉使祭桂王常瀛及太妃墓于梧州南寧而遣周官詣定國時青陽亦已還至南寧為守將常榮所留密遣親信劉吉告由榔由榔喜改青陽給事中諭貞育再撰敕鑄屏翰親臣金印令吉還付青陽至亷州周官與青陽遇偕至髙州賜定國定國拜受命甲午我大清世祖章皇帝順治十一年春三月孫可望遣人劫桂王由榔殺其大學士吳貞育等馬吉翔之出使也在道微知林青陽密敕事遣人至李定國營偵之主事劉議新者道遇吉翔意其必預謀也告以兩使齎敕狀吉翔驚駭啓報孫可望可望大怒并疑吉翔預謀遣其將鄭國赴南寧逮之會張鐫胡士瑞李元開善化人以由榔親試蔡縯徐極朱東旦及御史林鍾湖廣人以久次皆豫美官龎天夀及吉翔弟都督雄飛忌甚與其黨郭璘方謀陷之而鍾縯極鐫士瑞亦知事泄倉皇劾吉翔天夀表裏為姦由榔見事急即下廷臣議罪天夀懼與雄飛馳赴貴陽告可望而鄭國亦已械吉翔至安隆與諸臣面質貞育謝不知國怒因挾貞育直入由榔所居迫脅由榔索主謀者由榔懼不敢正言謂必外人假敕寶為之國遂努目出械貞育并允元鍾縯元開極鐫士瑞東旦蔣乾昌及太僕少卿趙賡禹袁州人御史周允吉錢塘人朱議尿南昌人貟外郎任斗墟鄞縣人主事易士佳廬陵人繫私室又入由榔所居擒福祿為國而出其黨冷孟銋蒲纓宋德亮朱企鋘等迫由榔速具主名由榔悲憤而退翊曰國等嚴刑拷掠獨貞育以大臣免衆不勝楚大罵時日已暮風雷忽震烈縯厲聲曰今日縯等直承此獄稍見臣子報國苦衷由是衆皆自承國又問曰主上知否縯大聲曰未經奏明乃復收繫以欺君誤國盜寶矯詔為罪報可望可望請由榔親裁由榔不勝憤下諸臣議吏部侍郎張佐辰及纓德亮孟銋企鋘蔣御曦等謂國曰此輩盡當處死倘留一人將為後患於是御曦執筆佐辰擬旨以鐫福祿為國為首罪凌遲餘為從罪斬由榔以貞育大臣言於可望罪絞諸臣就刑神色不變各賦詩大罵而死其家人合瘞於安隆北關之馬場已而青陽逮至亦被殺獨周官走免貞育極賜諡忠節青陽鐫士瑞元開縯東旦鍾允元乾昌賡禹允吉議尿斗墟士佳俱賜諡烈愍冬十月李定國陷髙明李定國兵猝至陷髙明進圍新城城中糧盡殺馬為食平南王尚可喜靖南王耿繼茂率師往援次三水靖南將軍珠瑪喇等亦至合兵進擊敗之于珊州斬其副將一人既抵新會定國據險以拒大兵奮擊奪其山殱獲甚衆定國大敗遁去乙未我大清世祖章皇帝順治十二年春三月李定國遁走南寧定國自新會敗走大兵追擊及于興業縣境又蹙之橫州江屢敗之定國焚橋而去大兵躡之定國率殘兵自賓州走南寧廣東髙雷亷等三府三州十八縣及廣西橫州等二州四縣悉平夏六月孫可望遣兵犯常德敗走可望遣劉文秀盧明臣馮雙禮等率衆六萬船千餘艘分兵由常德攻嶽州武昌而文秀自留攻常德大兵設伏邀擊之焚獲戰艦甚多賊衆大敗明臣赴水死雙禮被重創走降其將四十餘人文秀遁還貴州丙申我大清世祖章皇帝順治十三年春二月李定國走安隆以桂王由榔奔雲南大兵至南寧李定國戰敗將由安隆走滇孫可望偵知之使白文選促由榔移黔文選雖為可望用然心不直其所為因以情告由榔曰姑遲行候西府至西府謂定國也定國至安隆文選歸之共奉由榔自安南衛走雲南時守滇者為劉文秀王尚禮王自竒賀九儀文秀數怨可望遂私迓定國迎由榔入滇居可望署中由榔封定國晉王文秀蜀王文選鞏昌王尚禮等皆封公令文選還黔慰諭可望可望銜其二於定國也悉奪所部兵羈之軍中然以妻子在滇未敢遽與由榔為難也桂王由榔以其文安侯馬吉翔入閣辦事李定國既奉由榔至滇即捕馬吉翔及其家人令步將靳統武收繫將殺之吉翔曰媚統武定國客詣統武吉翔復媚之因相與譽吉翔於定國而微為辨寃定國召吉翔入謁即叩頭言王再造功千古無兩吉翔幸望見顔色死且不朽他是非何足辨也定國乃大喜吉翔因日諂定國客令説定國薦已入內閣遂與定國客蟠結盡握中外權龎天夀亦復用事定國與劉文秀時詣二人家光祿少卿髙績字無功紹興人御史塢昌期都勻人患之合疏言二王功髙望重不當往來權幸之門恐滋姦弊復蹈秦王轍疏上定國文秀遂不入朝吉翔激由榔怒命各杖一百五十除名定國客金維新走告定國曰績等誠有罪但不可有殺諫官名定國即偕文秀入救乃復官丁酉我大清世祖章皇帝順治十四年秋九月孫可望以兵攻桂王由榔于雲南與李定國戰可望敗走遂降于我大清是年春由榔遣張虎送可望妻子還黔可望遂舉兵反由榔然人心多不直可望部下諸將皆願歸李定國馬進忠等説可望請以白文選為大將可望從之乃留馮雙禮守貴州而以文選統諸軍前行李定國劉文秀帥師禦之是月至三坌河與可望夾水而軍文選輕騎奔定國可望遣張勝馬寶由尋甸間道襲雲南而自將徑卒擊定國戰方合其將馬惟興先走一軍瓦解可望狼狽奔回定國恐會城有失遣文秀文選追之而自引兵先還遇張勝于渾水塘擒而殺之馬寶亦歸定國可望至貴州馮雙禮紿言追兵且至可望知人已散遣其將程萬里赴大軍納欵可望行至沙子嶺總兵楊武追襲幾殆賴大兵馳援方免可望遂挈妻子至長沙來降雙禮截其子女玉帛與文秀同歸雲南由榔封雙禮慶陽王進忠漢陽王惟興等進爵為公臣等謹案孫可望本獻忠餘孽既乃臣事桂王邀求爵命而又稱兵挾制反戈相向及為李定國所敗始以窮蹙來歸迹其反覆不常實為險賊之尤者當日因其新附量行封賞近史館以可望列傳呈進特命削除世職好惡之至公足知稔惡者雖及身幸免權衡豫奪實協而王鈇所被大義必伸於千古也夫戊戌我大清世祖章皇帝順治十五年夏五月我大清兵平貴州寧南靖冦大將軍宗室羅託等由湖南平西大將軍平西王吳三桂等由四川征南將軍趙布泰等由廣西分兵三路入黔時劉文秀已死李定國使劉正國揚武守三坡紅關諸要隘以防蜀馬進忠守貴州會其將王自竒關有才二於定國定國自將擊之楚師自鎮逺入定國不及援粵師亦盡下南丹那地獨山諸州會於貴陽進忠遁去貴州平六月我大清兵克遵義蜀師至三坡劉正國拒戰大敗自水西奔回雲南大兵遂克遵義初李定國既敗孫可望兵自以為無他患武備盡弛髙績與郎官金簡進諫曰今內難雖除外憂方大而我酣歌漏舟之中熟寢爇薪之上能旦夕安耶二王老于兵事胡泄泄如此定國訴之桂王由榔語頗激由榔欲杖二臣以解之諸臣多爭不可移時未決而三路敗書至定國始逡巡引謝二臣獲免人金簡字萬藏山陰冬十二月我大清兵入雲南李定國敗走桂王由榔奔永昌時三路大兵俱集貴州安逺大將軍信郡王多尼至軍會于平越府之楊老堡戒期入滇李定國與馮雙禮等扼雞公背圖侵貴州使白文選守七星關立營窺遵義以牽蜀師蜀兵出遵義趨天生橋由水西直取烏撤文選懼棄關走霑益州粵兵至盤江敵據險沈船不得渡泗城土知府岑繼祿獻䇿流下流潛師宵濟遂入安隆定國使其將吳子聖拒戰潰走定國以全軍據雙河口大兵擊之破其象陳又連敗之羅炎涼水井定國大營妻子俱散失諸將各敗走不相顧定國撒寨遁歸桂王由榔將出奔行人任國璽福建人獨請死守由榔合諸臣議定國等言行人議是但前途尚寬今暫移蹕捲土重來再圖恢復未晚也由榔遂走永昌臣等謹案桂王入滇以後已無地自存李定國等釜底遊魂尚敢抗我王師冀稽因史文之舊書之為賊乃蒙我天討臣等皇上中正持衡俾殷餘頑梗不與闖獻同科特命改書敵字筆削公平折𠂻至當地同符矣大聖人之心真與天己亥我大清世祖章皇帝順治十六年春正月我大清兵克雲南桂王由榔奔騰越是月三日大兵自普安州入雲南省城永昌警報日至由榔復走騰越二月我大清兵克永昌桂王由榔奔緬甸白文選自霑益追及李定國定國留之斷後至玉龍關大兵追擊之文選戰敗由右甸遁走木邦大兵克永昌渡潞江定國設伏於磨盤山大兵覺之分精甲先蹂伏處定國不能支退走騰越遣總兵靳統武率兵四千從由榔時李國泰馬吉翔輜重多恐遭劫奪促由榔夜走南甸兵馬過去火光燭天右轉左旋天明仍在故處統武棄由榔仍歸定國由榔抵囊木河是為緬界緬人勒從官盡去兵器方許入境至蠻暮土司緬人以四舟迎之從官皆自覔江舟隨行者六百四十餘人陸行者自故岷王子而下九百餘人期會於緬甸昆明諸生薛大觀聞由榔入緬甸歎息曰不能背城戰君臣同死社稷顧欲走蠻邦以苟活不重可羞耶遂與其妻及子之翰夫婦偕赴城北黑龍潭死其侍女抱幼子從之次日諸尸相牽浮水上幼子在侍女懷中兩手堅抱如故大觀次女已適人避兵山中相去數十里同日赴火死夏五月緬人置桂王由榔于赭硜以兵防之初由榔至井亘其羣臣沐天波等謀奉之走戶臘二河不聽緬人邀大臣過河面議以册寶視神宗時差小疑以為假天波出黔國公印對同乃信因請由榔敕關上無得納漢兵是月四日緬復以舟迎由榔明日發井亘行三日至阿瓦阿瓦者緬酋所居城也又五日至赭硜始知前陸行者盡被緬人掠為奴多自殺為岷王子等八十人流入暹羅緬人於赭硜置草屋居由榔以竹為城從行諸臣或短衣跣足與緬婦相貿易為笑樂大為緬人嗤秋八月我大清兵定四川初李赤心養子來亨等久竄廣西其衆食盡且懼大兵進討率衆走川東分據川湖間耕田自給川中舊將王光興談宏等附之衆猶數十萬桂王由榔大學士文安之因率來亨及劉體仁袁宗第等十六營由水道襲重慶會談宏談詣殺談文諸將不服安之欲討二人二人懼率所部降於大兵諸鎮遂散安之亦卒至是大兵進取川南克敘州馬湖二府總兵杜之香降成都餘黨聞風逃遁大兵追至新津斬溺無算全川底定於是獻忠餘孽之擾蜀者亦盡矣桂王由榔令其黔國公沐天波以臣禮見緬酋緬俗以中秋日大會羣蠻其酋欲誇示諸國請天波過河令椎髻跣足用臣禮見天波不得已從之歸泣告衆曰我所以屈辱者懼驚憂主上耳否則彼將無狀我罪益大任國璽與禮部侍郎楊在餘姚人劾奏之時龎天夀已死李國泰代掌司禮吉翔復與表裏為姦一日吉翔奏大臣有三日不舉火者桂王由榔不應明日吉翔國泰合奏由榔怒以御寶擲下吉翔即鑿而碎之散給諸臣其凶悖如此任國璽集宋末大臣賢姦事為一書進之由榔吉翔恨之由榔覽止一日國泰即竊去國璽又疏論時事三不可解中言禍急燃眉當思出險吉翔不恱即令國璽獻出險策國璽忿然曰時事至此猶抑言官使不言耶臣等謹案桂王倚任宦豎寵用王坤龎天夀復蹈北都覆轍至緬地流離託身無所而李國泰猶代天夀掌司禮監與馬吉翔表裏為姦在若輩宵人惟知縱情網利取快目前遑顧其主而桂王受制羣閹至於流播蠻方尚不知悟明代宦寺流毒積漸之勢遂至此極亦良可浩歎耳冬十一月我大清兵克沅江桂王由榔之走永昌也道過沅江土知府那嵩與其子燾迎謁供奉甚謹設宴皆用金銀器宴畢悉以獻曰此行上供者少聊以佐缺乏耳由榔既走緬甸李定國不敢深入聞白文選在木邦就之謀與文選計不合定國乃引兵自孟定耿馬抵猛緬孟艮不附定國移兵滅之據其地遣使號召諸土司兵嵩亦於沅江起兵應之至是大兵進討城破嵩登樓自焚合家皆死其士民亦多巷戰死嵩烈賜諡愍庚子我大清世祖章皇帝順治十七年秋九月白文選攻緬甸不克文選自木邦至錫箔所至縱兵大掠進攻阿瓦索桂王由榔阿瓦有新舊二城新城緬酋所居文選急擊之城且破為緬人所紿退兵十里城中備禦復固反為所敗文選乃引兵赴孟艮會李定國定國復同文選赴阿瓦辛丑我大清世祖章皇帝順治十八年夏五月李定國白文選會兵攻緬甸不克桂王由榔久居赭硜從官資用盡竭錦衣趙明鑑謀竊其世子以出為馬吉翔等所阻李定國以三十餘疏迎由榔俱不達白文選復密遣人告由榔言不敢速進者恐有他害必得緬人送出為上䇿由榔即以書答之文選乃陰造浮橋將迎由榔為緬人所覺事不果至是定國文選會兵阿瓦使人入緬求由榔緬人不許以象兵與定國戰定國前隊稍失利文選引兵橫擊之緬人大敗退保新城然終不肯出由榔定國文選復議以舟師攻之遣人於上流造船為緬人所燒定國文選移兵洞烏未幾文選兵潰走錫箔定國亦引還秋七月桂王由榔從官盡為緬人所殺時緬酋弟弒兄自立欲盡殺由榔諸臣乃遣人告由榔曰蠻俗貴詛盟請與天朝諸公飲呪水馬吉翔李國泰邀諸臣盡往至則以兵圍之令諸臣以次出外出輒殺之凡殺四十二人吉翔國泰及黔國公沭天波華亭侯王維恭綏寧伯蒲纓將軍魏豹都督馬雄飛吏部侍郎鄧士亷禮部侍郎楊在御史塢昌期任國璽光祿少卿髙績兵部郎中金簡等預焉天波節賜諡忠維恭豹士亷在昌期國璽績簡俱不賜諡節愍吉翔纓雄飛以朋姦誤主豫諡惟都督同知鄧凱以傷足不行獲免緬人復以兵圍由榔所居其左右被殺及自縊者不可勝數惟存由榔與其眷屬二十五人冬十二月我大清兵至緬甸緬人執桂王由榔獻之於軍前平西大將軍平西王吳三桂定西將軍內大臣公愛星阿等帥師征緬兩路進兵於十一月初八日會師木邦李定國先奔景線白文選據錫箔憑江為險大兵自木邦晝夜行三百餘里臨江造筏將渡文選復奔茶山總兵馬寧等率偏師追之及於猛養文選降大兵直趨緬城先遣人傳諭緬酋令執送由榔否則兵臨城下後悔無及是月初一日大兵至緬城緬酋懼初三日遣數十人至由榔所連坐擁之去遂并其眷屬送軍前大兵凱旋明年四月由榔死於雲南六月李定國走死猛臘其子嗣興與劉文秀子劉震等俱來降臣等謹案征緬之役愛星阿分路督師吳三桂實主其事當時三桂叛形未著方以擒渠服逺為功臣等編纂初稿以三桂凶狡不終削其姓名但書愛星阿等仰惟我皇上神謨燭照桂悖亂性成爾時已包藏禍心其統兵親加指示謂三臨緬傳諭執送由榔不足為三桂之功轉足以正三桂之罪蓋三桂非果能戮力本朝也正欲藉我天威盡剪明宗枝葉而李定國白文選又皆其比肩委質之人勢難並立亦因此盡事殱除而後可以營窟滇南不虞後患然時方鼎革宿將猶存未敢顯然肆逆也逮中朝素有威望如睿親王鰲拜諸人者相繼淪沒然後三桂􅍀然自以為無一人能制其死命遂假撤藩之事乘機背叛此三桂之畜姦已非一日正與曹操司馬懿之用心相似而其逆迹先露於握兵征緬之時彼既不能盡忠明代又不思效節本朝反覆狙詐實千古亂賊之尤正宜據事直書用彰元惡臣等恭聆宸諭炳若日星真足禠姦回既死之魄明春秋誅隱之義謹闡繹訓詞詳悉録載以正罪狀俾千萬世永為定案云御批厯代通鑑輯覽卷一百二十

body:
  text: 帝姓趙氏名匡𦙍涿郡人父𢎞殷周檢校司徒岳州防禦使𢎞殷曽祖朓唐幽都令朓生珽唐御史中丞珽生敬涿州刺史敬生𢎞殷母杜氏後唐天成二年帝生於洛陽夾馬營赤光繞室異香經宿不散人謂之香孩兒營夾馬營在洛陽縣東北既長容貌雄偉器度豁如識者知非常人仕周從世宗征伐屢立大功事具前人望歸之及世宗殂恭帝立陳橋兵變事具前遂踐周位而有天下定國運以失徳王色尚赤臘用戌乙亥開寶八年是嵗江南亡唯北漢至太宗太平興國四年乃亡續綱目依朱子綱目唐髙祖武徳七年例於宋用大書紀年今依之春二月曹彬大敗江南兵于秦淮注見前進圍金陵彬連破江南兵於白鷺洲在江寕縣西南江中新林港即新林浦注見前遣田欽祚潁州汝隂人攻溧水隋縣今属江寕府江南統軍使李雄淮人一作張雄謂諸子吾必死於國難爾曹勉之父子八人皆沒於陳欽祚遂克溧水彬大軍進次秦淮江南兵水陸十萬陳于城下時舟楫未具潘美率兵先赴遂涉水大軍隨之江南兵大敗馬軍都虞候李漢瓊洛陽人率所部取巨艦寔以葭葦因風縱火拔其城南水寨又拔闗城守陴者爭遁溺死千計初陳喬張洎為江南主謀請所在堅壁以老宋師江南主弗憂也日於後苑引僧及道士誦經講易髙談不恤政事軍書告急非徐元楀䓁莫得通宋師駐城下累月江南主猶不知時兵事皆属神衞統軍都指揮使皇甫繼勲繼勲素貴驕初無效死意但欲其主速降而口不敢發毎與衆言輙云北軍強勁誰能敵之聞兵敗則喜曰吾固知其不勝也偏禆有募死士欲夜出邀宋師者繼勲必杖其背拘囚之一日江南主自出巡城見宋師列柵旌旗滿野知為左右所蔽始驚懼収繼勲付獄殺之皇甫繼勲暉之子三月遼遣使來通好先是遼涿州刺史耶律琮貽書宋知雄州孫全興請通好全興以聞帝命答書許之至是遼遣使來結成復遣人告北漢以通好於宋無妄侵伐北漢主聞命慟哭謀出兵攻遼宣徽使馬峯固諫乃止考宋史太祖紀問寶七年十一月命知雄州孫全興答契丹修好書八年三月契丹遣使格什古星什以書來講和七月遣太常丞吕端使契丹職官分紀所載畧同是通和乃遼之意而遼史景宗紀則書未遣使請和以涿州刺史耶律禪珠喇加侍中與宋議和復不書格什古星什之聘宋葢諱之也至耶律琮遼作耶律禪珠喇二史所書之名又各不同沙吕端字易直餘慶之弟朮按格什古星什舊作克骨慎思禪珠喇舊作昌今並改正夏四月呉越王俶取江南常州俶既受宋命以沈承禮湖州烏程人權知軍務而自率兵五萬攻常州丞相沈虎子一作沈倫諫曰江南國之藩蔽今大王自撤其藩蔽將何以衛社稷乎不聴進兵拔其闗城又敗其軍於北界遣兵攻江隂梁縣今属常州府宜興注見前皆下之遂拔常州江南主貽俶書曰今日無我明日豈有君一旦明天子易地酬勲王亦大梁一布衣耳俶不答以書進帝優詔褒之彗星見東方秋七月辛未朔日食遣使如遼冬十月江南主使徐鉉來乞緩師不許江南都虞候劉澄以潤州降江南主危迫遣學士承㫖徐鉉求緩師鉉至言于帝曰李煜無罪陛下出兵無名煜以小事大如子事父未有過失奈何見伐帝曰爾謂父子為两家可乎鉉不能對而還踰月江南主復遣鉉乞緩師以全一邦之命鉉見帝論辨不已帝按劍怒曰不須多言江南亦有何罪但天下一家卧榻之側豈容他人鼾睡耶鉉皇恐辭歸曹彬將王明字如晦大名成安人大破江南兵於皖口注見前獲其都虞候朱令贇舒城人延夀之孫先是江南主遣使召令贇以上江兵入援令贇衆號十五萬自湖口南唐縣今属九江府鄱陽湖由此入江故名順流而下將焚采石浮梁彬聞之遣戰櫂都部署王明宻令人樹長木于洲渚間若帆檣之狀令贇望見疑有伏逗撓不敢進明因移檄諸將掎角襲之及是令贇乗大航建大將旗鼔至皖口明合步軍將劉遇滄州清池人急攻之令贇勢促因縱火拒戰㑹北風甚火反及之衆大潰遂擒令贇金陵獨恃此援由是孤城愈危蹙矣十一月曹彬克金陵江南主煜降門下侍郎陳喬死之彬遣人謂江南主曰事勢如此所惜者一城生聚耳若能歸命䇿之上也某日城必破宜早為之所江南主不聴一日彬忽稱疾不視事諸將皆来問疾彬曰余之疾非藥石所能愈惟須諸君誠心自誓以克城之日不妄殺一人則自愈矣諸將許諾共焚香為誓明日彬即稱愈又明日城䧟初陳喬張洎約同死社稷然洎實無死志至是喬徑入白江南主曰今日國亡願加顕戮以謝國人江南主曰此乃厯數卿死無益也喬曰縱不殺臣臣何面目以見士人乎遂自經死勤政殿學士鍾舊朝服坐於家兵及門亦舉族死之鍾舊字徳林豫章人江南主率臣僚詣軍門請罪彬慰安之待以賔禮請煜入宫治装彬以數騎待宫門外左右宻謂彬曰煜入或不測奈何彬笑曰煜素愞無㫁既已降必不能自引決煜治装畢遂與其宰臣湯悦等四十五人赴汴京彬自出師至凱旋士衆畏服無敢輕肆克城之日兵不血刄凡州十九軍三縣一百八十㨗至羣臣稱賀帝泣曰宇縣分割民受其禍攻城之際必有横罹鋒刄者實可哀也命出米十萬賑䘏之丙子九年十二月太宗皇帝太平興國元年春正月曹彬振旅還詔賜李煜爵違命侯彬俘江南主李煜還汴帝御明徳門以煜嘗奉正朔命勿宣露布止令煜君臣白衣紗帽至樓下待罪詔並釋之賜冠帶器幣鞍馬有差授煜檢校太傅右千牛衛上將軍封違命侯子姓從官皆録用之因赦天下帝責張洎曰汝教煜不降使至今日因出洎所草召上江援兵蠟丸書示之洎謝曰書實臣所為大吠非其主此其一耳他尚多今得死臣之分也帝竒之以為太子中允二月以曹彬為樞宻使初彬之伐江南也帝謂曰俟克李煜當以卿為使相潘美預以為賀彬曰不然夫是行也仗天威遵廟謨乃能成事吾何功哉况使相極品乎美曰何謂也彬曰太原未平耳及還帝謂曰本授卿使相然劉繼元未下姑少待之美視彬㣲笑帝詰之美以實對帝亦大笑乃賜彬錢五十萬彬退曰人生何必使相好官不過多得錢耳未㡬乃拜樞宻使呉越王俶來朝帝謂呉越使者曰元帥克毘陵今常州府治漢為毘陵縣有大功竢平江南可暫来與朕一相見以慰延想即當復還朕三執玉帛以見上帝豈食言乎至是俶與妻孫氏子惟濬字禹川入廟帝賜禮賢宅以居親幸宴之賞賚甚厚賜俶劍履上殿書召不名命與晋王叙昆弟之禮俶固辭乃止留兩月遣還賜以一黄袱封識甚固戒俶曰途中宜宻觀及啟之則皆羣臣乞留俶章疏也俶益感懼三月帝如西京夏四月郊大赦帝以江表底定方内大同欲西幸以行郊禮三月如西京次鞏縣遂拜安陵宣祖陵賜河南今年田租之半奉陵户復一年至洛陽四月祭天地於南郊都民垂白者相謂曰我輩少經離亂不圖今日復觀太平天子儀衛有泣下者祭畢大赦宴賜親王羣臣有差還宫帝欲留都洛陽羣臣咸諫弗聴晋王光義言其非便帝曰遷河南未巳終當居長安耳光義問其故帝曰吾欲西遷據山河之勝以去冗兵循周漢故事以安天下也光義曰在徳不在險力請還汴帝不得已從之因嘆曰不出百年天下民力殚矣曹翰屠江州殺江南守將胡則江南州郡皆降獨江州指揮使胡則殺刺史謝彦賔集衆固守曹翰圍之四月餘則力屈被執翰殺之因縱其兵悉取貲財而屠其民秋八月遣侍衞都指揮使党進率兵伐漢九月敗漢兵于太原遼救之帝命党進潘美楊光美并州人後避太宗舊諱更名美牛思進祁州無極人米文義率兵分五道以攻太原又遣郭進深州博野人等分攻忻代汾沁遼石等州所向克㨗進敗北漢兵於太原城北漢主急求救於遼遼主遣其相耶律沙字安隠其先嘗相要尼氏救之帝幸晋王光義第帝友愛光義數幸其第恩禮甚厚光義嘗有疾帝為灼艾光義覺痛帝亦取艾自灸毎對近臣言光義龍行虎步他日必為太平天子福徳非吾所及也冬十月帝崩晋王光義即位是為太宗癸丑夕帝崩於萬嵗殿帝孝友節儉質任自然不事矯飾一日罷朝坐便殿不樂者乆之左右請其故曰爾謂為天子容易耶早作乗快誤决一事故不樂耳宫中葦簾縁用青布常服之衣澣濯至再永康公主帝之女嘗衣貼繡鋪翠􅃭帝曰汝服此衆必相傚禁之一日勸帝以黄金飾肩輿帝曰我以四海之富宫殿飾以金銀力亦可辦但念我為天下守財耳豈可妄用尤注意刑辟嘗讀二典嘆曰尭舜之罪四凶止從投竄何近代法網之宻耶故定為折杖法以逓減流徒杖笞之刑自開寶以来犯大辟非情理深害者多得貸死惟贓吏棄市則未嘗貰及是崩晋王在南府宦者王繼恩中夜馳詣府邸召王入薛應旂通鑑宋后見晋王遽呼日吾母子之命俱託於王王泣曰共保富貴無憂也考宋史宋后傳不載此語今不取甲寅王遂即位號宋后曰開寶皇后明年遷之西宫李燾長編云壬子帝不豫夜召晋王属以後事左右皆不得聞但遥見燭影下晋王時或離席若有所避遜之状既而上引柱斧戳地大聲謂晋王曰好為之已而帝崩考長編所載出吴僧文瑩湘山野録山僧野史説本無稽且燾書作于孝宗之世去開寶時㡬二百年傳聞暧昧豈足為據乃竟采而録之於是元陳桱通鑑續編胡一桂史纂通要皆依其説明邱濬程敏政深辨其非商輅等修續綱目削而不書别於圈外畧摘數語以示傳疑李東陽等通鑑纂要因之今據宋史宦者王繼恩傳太祖崩夕太宗在南府繼恩中夜馳於府邸請太宗入是太祖崩後太宗方入何来燭影斧聲之事長編又以太祖崩於壬子夜而宋史太祖紀大書癸丑夕帝崩今一依正史為㨿餘説皆不取冄攷宋后傳后遷西宫在太平興國二年續綱目諸書皆係之晋王即位之下今亦依正史因史無日月仍係於此而以明年别之以弟廷美即光美為開封尹封齊王兄子徳昭封武功郡王徳芳太祖第四子為興元尹尋詔太祖廷美子女並稱皇子皇女以示一體以盧多遜同平章事楚昭輔為樞宻使内外官俱各進秩有差十一月進封劉鋹衛國公李煜隴西郡公十二月大赦改元改是嵗為太平興國元年詔羣臣論列者即時引對初詔諸道轉運使糾察官吏能否第為三䓁嵗終以聞罷河東兵太宗皇帝丁丑太平興國二年續綱目發明非元年而書號正其始也春正月賜禮部進士吕䝉正字聖功河南人等及第初太祖幸洛陽張齊賢曺州寃句人以布衣獻䇿條陳十事一下并汾二富民三封建四敦孝弟五舉賢六太學七籍田八選良吏九懲奸十恤刑内四説稱㫖齊賢堅執其餘䇿皆善太祖怒令武士拽出之及還語帝曰我幸西都惟得一張齊賢我不欲爵之以官異時可使輔汝為相也至是齊賢亦在選中有司失於掄擇寘之下第帝不悦故一榜自吕䝉正以下一百九人又覆試諸科二百人盡賜及第又閲貢籍十舉至十五舉一百八十四人並賜出身擢邢昺九經及第九絰七人不中格憐其老特賜同三傳出身凡五百餘人皆賜緑袍鞾笏錫宴開寶寺帝自為詩一章賜之謂侍臣曰朕􅁒博求俊彦於科埸中非望拔十得五止得一二亦可為致治之具矣隂邢昺字叔明濟人置江南𣙜茶埸二月帝更名炅夏四月𦵏永昌陵在河南府鞏縣西南史臣曰太祖得國視晋漢周亦豈甚相絶哉及其發號施令名藩大将俯首聴命四方列國次苐削平建隆以来釋藩鎮兵權䋲賍吏重法務農興學慎罰薄歛與世休息迄於丕平治定功成制禮作樂傳之子孫世有典則規模可謂逺矣冬十月初𣙜酒酤十一月丁亥朔日食既戊寅三年春二月立崇文院初置三館宋史職官志史館昭文館集賢院為三館于長慶門北謂之西館帝臨幸惡其陋命有司於昇龍門東北剏立三館至是成賜名崇文院遷西館書貯焉凡八萬卷夏四月陳洪進獻漳泉二州縣十四詔授洪進武寕節度使同平章事留之汴京奉朝請諸子皆授要郡遣之官五月呉越王俶以其地來歸詔封俶為淮海國王俶朝於汴㑹陳洪進納土而懼上表乞罷所封呉越國王及觧天下兵馬大元帥並書詔不名之命歸其兵甲求還帝不許其臣崔仁冀字子遷錢塘人曰朝廷意可知矣大王不速納土禍且至俶遂决䇿上表獻其境内十三州一軍八十六縣詔封俶為淮海國王授俶弟儀信並觀察使俶子惟濬惟治字世和並節度使惟演字希聖惟灝及族属僚佐授官有差又授其将校孫承祐錢塘人沈承禮崔仁冀並為節度使賜賚待遇冠絶當時尋令两浙發俶緦麻以上親及管内官吏悉至汴京凡千四十四艘以范旻字貴参質長子權知兩浙諸州軍事旻上言俶在國日徭賦煩苛乞盡蠲其弊從之定難節度使李克叡卒子繼筠嗣秋七月隴西公李煜卒初曹彬令煜治装煜方以亡國為念不及多取留汴貧不自給帝命増給月俸仍賜錢三百餘萬至是卒追封呉王帝命煜故臣徐鉉撰神道碑鉉泣請曰陛下容臣存故主之義乃敢奉詔帝許之鉉撰碑但推言厯數有盡天命有歸而已其警句云東隣遘禍南箕扇疑投抒致慈親之惑乞火無里婦之辭始營因壘之師終後塗山之㑹又云孔明罕應變之畧不成近功偃王躬仁義之行終於亡國帝覽之稱善畢考薛應旂通鑑煜誕辰帝遣使賜宴宴暴卒葢本龍衮江南野史今不取以孔宜字不疑孔子四十四世孫襲封文宣公宜知星子縣南唐鎮宋升為縣今為江西南康府治回獻所為文帝召問孔子世嗣遂命襲封宜因言歴代以聖人之後不預庸調周顯徳中遣使均田遂抑為編户召特復其家冬十月置内藏庫帝幸左藏庫語薛居正曰此金帛如山用何能盡先帝毎焦心勞慮以經費為念何其過也詔改為内藏庫并以封樁庫属焉己卯四年春正月以潘美為北路都招討使帝議伐漢薛居正等多以為不可惟曹彬力贊之帝意遂决乃以潘美為北路都招討使帥崔彦進李漢瓊劉遇曹翰米信本溪族田重進幽州人軍分四面攻太原城又以判邢州郭進為太原石嶺闗注見前都部署以斷燕薊援師遼遣塔瑪遼扈從官長夀來言曰何名而伐漢也帝曰河東逆命所當問罪若北朝不援和約如故不然惟有戰耳初以石熙載字凝績洛陽人僉書樞宻院事僉書之名始此新渾儀成司天監生張思訓巴中人本唐李淳風梁令瓚之法創式以獻製于禁中日月行度成于自然不假人運比舊制尤為精妙命置文明殿東南鼓樓擢思訓為渾儀丞二月帝自將伐漢帝欲以齊王廷美掌留務開封判官吕端言于廷美曰上櫛風沐雨以申弔伐王地處親賢當表率扈從若掌留務非所宜也廷美遂請行帝許之以沈倫為東京留守王仁贍為大内都部署三月遼救漢都部署郭進邀擊于白馬嶺在忻州西南大敗之漢求救于遼遼遣耶律沙為都統冀王廸里字巴爾斯濟斯大宗子巴按巴爾斯濟斯舊作速堇今改正為監軍帥師赴之至白馬嶺與郭進遇沙欲阻澗以待後軍迪里不從渡澗迎戰未成列進薄之迪里敗死㑹耶律色珍字韓隠裕恱赫嚕孫按裕恱遼貴官象公師坐而論議作色珍舊作斜軫裕恱舊作于越赫嚕舊曷魯今並改兵至進引師退沙得免田欽祚䕶石嶺屯軍恣為姦利進不能禁屢形于言欽祚憾之進武人剛烈戰功髙欽祚數加陵侮進不能堪遂縊而死欽祚以卒中風眩聞帝悼惜良久贈安國節度使左右皆知而無敢言者尋詔以牛思進代之夏四月行營都監折御卿徳扆子取漢岢嵐軍今太原府岢嵐州宋曰岢嵐軍太平五年置此書取岢嵐軍乃史臣追敘之文御卿分兵攻岢嵐軍下之遂取嵐州注見前漢城隆州注見前威勝軍宋置今沁州是使解暉洺州臨洺人等攻破之漢人于隆州依險築城以拒帝遣解暉折彦贇等先發兵圍之繼遣尹勲開封浚儀人徃城遂陷帝至太原督諸軍圍城五月漢主繼元降詔賜爵彭城郡公潘美等屢敗漢兵進築長連城圍太原漢外援不至餉道又絶城中大懼帝至督戰益急城無完堞帝慮城陷殺傷者衆詔諭繼元降使者至城守陴者不納帝親督諸將士進薄城下列陣于前蹲甲交射矢集城上如蝟毛五月漢指揮使郭萬超踰城出降繼元親信之臣多亡城中危急帝復詔諭繼元速降當保終始富貴詔雖入城而諸將銳攻不可遏帝尤慮城陷害良民麾兵少却繼元乃夜遣客省使李勲奉表乞降詔許之因至城北張樂宴從臣于城臺明日繼元率官屬縞衣紗帽待罪臺下帝釋之賜襲衣玉帶召使升臺繼元叩首謝罪詔授特進檢校太師右衛上將軍封彭城郡公賜賚甚厚命祠部郎中劉保勛字修業河南人知太原府凡得州十軍一縣四十一帝作平晉詩命從臣和又授漢相李惲字孟深陽武人續綱目宋元通鑑俱誤作李揮今依宋史改正以下官有差劉繼文奔遼遼封為彭城郡王久之卒徙太原民於并州詔毁太原舊城改為平晉縣以榆次縣漢置今屬太原府為并州遣使分部徙太原民居之縱火焚太原廬舍老幼趨城門不及焚死者甚衆帝發太原六月遂伐遼圍幽州秋七月與遼耶律休格字遜寧南院額勒金烏蘇之子作按休格舊作休哥額勒金舊作夷离堇烏蘇舊綰思今並改正大戰于高梁河在順天府宛平縣西水經注高梁水出薊城西北即此今為玉泉山水所經上有橋敗績乃還帝既滅漢欲乗勝取燕薊諸將以師罷餉匱不欲行崔翰字仲文京兆萬年人獨曰所當乗者勢也不可失者時也取之易帝意決遂發太原六月次東易州宋史太宗紀丙寅次金臺頓丁夘次東易州金臺頓今清苑縣金臺驛也東易州當在定興安肅界遼史不載無考遼刺史劉宇以城降留千兵守之涿州判官劉原徳亦以城降進次幽州城南遼將耶律希達孟父楚國王之後按希達舊作奚底今改正軍于城北帝攻走之命宋渥崔彦進劉遇孟元喆昶之子分兵四面攻城圍之三周以潘美知幽州行府事遼將多降七月遼順州薊州皆降耶律學古字伊遜伊爾裕恱佳之庶孫正按伊遜伊爾舊作乙辛隠今改時守燕悉力禦之不能支城中大懼遼遣耶律休格救燕時帝與遼將耶律沙大戰于高梁河沙敗將遁休格兵適至與耶律色珍分左右翼以進復戰帝大敗死者萬餘人帝引師南還休格追至涿州帝急乗驢車走免䘮資械不可勝計乃命孟元喆屯定州崔彦進屯闗南劉廷翰開封浚儀人李漢瓊屯真定而還以石守信劉遇從征失律貶之自是遼好遂絶定難留後李繼筠卒弟繼捧嗣八月皇子武功王徳昭自殺初徳昭從帝征幽州軍中嘗夜驚不知帝所在有謀立徳昭者帝聞不悅及還以征北不利久不行太原之賞徳昭以為言帝大怒曰待汝自為之賞未晚也徳昭退而自刎帝聞之驚悔往抱其尸哭曰癡兒何至此耶追封魏王諡曰懿九月遼寇鎮州都鈐轄劉廷翰等合擊大破之遼遣南京留守韓匡嗣延徽之子與耶律沙耶律休格侵鎮州報圍燕之役軍于滿城本後周永樂縣隋改滿城今屬保定府西方陳官軍詐降匡嗣欲納之休格曰彼氣甚銳疑誘我也可整衆待之匡嗣不聴俄而劉廷翰陳于前崔彦進潛師躡其後李漢瓊崔翰趙延進澶州頓邱人兵繼至合擊之遼軍大潰追至遂城注見前斬獲萬計匡嗣棄旗鼓遁去獨休格整兵而退以楊業為代州刺史業即漢建寧節度使劉繼業帝克太原聞其勇召見復姓揚氏止名業以其老于邉事拜代州刺史業善戰號楊無敵冬十月進封齊王廷美為秦王論平漢功也文武諸臣進秩有差庚辰五年春二月定差役法太祖因前代之制以衙前主官物以里正户長鄉書手課督賦稅以耆長工手壯丁逐捕盜賊以承符人力手力散從官給使令自衙前至手力等皆第户髙下以充所謂職役也續綱目以人力之人係承符去手力之力為力手殊誤今依宋史食貨志及文獻通考改至是從京西轉運使程能請定諸州户為九等上四等充役下五等免之後有貧富隨時升降三月魏公劉鋹卒鋹有口辯帝之將伐北漢也宴近臣于禁中鋹進言曰朝廷威靈及逺四方僣偽之主今日盡在坐中旦夕平太原劉繼元又至臣率先來朝願得執梃為諸國降王長帝大笑至是卒追封南越王楊業敗遼兵于鴈門殺其將蕭綽里特舊作咄李今改正遼兵十萬寇鴈門業領麾下兵百騎自西陘闗名在代州西北即鴈門闗西口出至鴈門北口南向擊之遼兵大敗殺其節度使駙馬侍中蕭綽里特自是遼畏業望見旌旗即引去主將多嫉之或潛上謗書帝皆不問封其書付業交州亂秋七月命蘭州團練使孫全興等將兵討之交州丁部領及其子璉相繼死璉弟璿權行軍府事年尚㓜大將黎桓幽璿别館而代領其衆時知邕州侯仁寶益之子趙普女弟之夫也盧多遜與普有隙出仁寶於邕九年不代仁寶恐因循死嶺外乃上言陳取交州之䇿帝喜將驛召仁寶多遜遽奏曰交州内擾此實天亡之秋但先召仁寶其謀必泄蠻寇預為之備未易取也不如密令仁寶經度其事發兵長驅勢必萬全帝以為然以仁寶為交州水陸轉運使孫全興劉澄賈湜等並為部署將兵討之全興等由邕州澄湜等由亷州進桓聞乃遣使為璿上表求襲位帝不許冬十月遼寇瓦橋闗十一月帝自將禦之次於大名遼軍退乃還遼主賢圍瓦橋闗耶律休格帥精騎渡水而戰官軍大敗休格追至莫州十一月帝自將禦之時闗南諸將已破遼兵帝次大名諸將復戰于莫州敗績㑹遼主引去帝欲遂取幽州李昉力陳其未可乃詔曹翰部署諸將而還帝既還京議者皆言宜速取幽薊張齊賢上疏曰聖人舉事動在萬全百戰百勝不若不戰而勝自古疆場之難非盡由戎狄亦多邉吏擾而致之若縁邉諸將撫御得人但使峻壘深溝畜力養銳以逸自處則邉鄙寧而河北之民獲休息矣臣又聞家六合者以天下為心豈止争尺寸之土角戎狄之勢而已是故聖人先本而後末安内以養外民既安利則戎狄斂袵而至矣十二月遼以耶律休格為裕恱休格智畧宏逺料敵如神毎戰勝讓功諸將故士卒樂為之用辛巳六年春三月皇子興元尹徳芳卒贈中書令岐王諡康惠罷交州兵交州行營破賊于白藤江口在今安南國海東府界江之入海處亦曰白藤海口獲戰艦二百于是知邕州侯仁寳率軍先進孫全興等頓兵不行仁寶戰死㑹炎暑軍士多死轉運使許仲宣字希粲青州人以聞詔班師斬劉澄賈湜于軍徴全興下獄已而棄市一考宋史孫全興于是年三月徴下獄十月棄市續綱目于三月即書徴孫全興棄市非是今依宋史改夏六月薛居正卒居正輔相十八年寛簡不苛察衆論賢之及卒帝親臨其喪為之流涕居正子惟吉素無行帝存問其家因曰不肖子安在頗改節否不克負荷先業奈何惟吉伏喪側懼赧不敢起自是盡革故態讀書親賢士修飭為善其後帝數委以大藩所至稱治秋七月遣使如渤海初遼取渤海扶餘城置東丹府事具前至是帝將大舉伐遼遣使賜其王詔書令發兵以應約滅遼之日幽薊土宇復歸中朝朔漠之外悉與渤海然渤海無至者帝又以詔賜定安國王定安本馬韓別種其王烏元明數苦遼侵侮得詔令張掎角之勢王大喜㑹女真遣使入貢持表來上帝優詔答之付女真使者令賫以賜焉九月乙未朔日食左拾遺田錫字表聖嘉州洪雅人上疏言事詔嘉奬之錫好言時務既居諌官即上疏獻軍國要機者一朝廷大體者四其畧曰王師平太原軍功猶有未賞願因郊禋錫賚駕馭戎臣此要機也交州瘴海得之如獲石田願罷屯兵此大體之一今諫官不聞廷争給事中不聞封駁左右史不聞升陛記言動御史不敢彈奏中書舍人未嘗訪以政事集賢院雖有書籍而無職官秘書省雖有職官而無圖籍願擇才任之使各司其局此大體之二邇者㝢縣平寧京師富庶軍營馬監靡不恢崇佛寺道宫皆為輪奐尚書無㕔事九寺三監寓天街之兩廊貢院就武成王廟是豈太平之制度願别修省寺用列職官此大體之三按獄官令枷杻鉗鍞皆有定式今以鐵為枷于法所無去之可也此大體之四帝覽疏優詔褒答賜錢五十萬續綱目盧多遜専政羣臣章奏必先白多遜然後敢通又必干閤門署狀云不敢妄陳利便希望恩榮錫遺書多遜乞免署狀多遜不恱出錫為河北南路轉運副使錫因入辭直進封事宋元通鑑同考宋史太宗紀及錫本傳錫上事在為拾遺時非轉運使入辭所奏其貽書宰相乃趙普非多遜也今依帝紀書綱採傳作目以趙普為司徒兼侍中普奉朝請累年盧多遜益毀之謂普初無立上意普鬱鬱不得志㑹晉邸舊僚柴禹錫字元圭大名人趙鎔字化釣滄州樂陵人楊守一字象先其先洛陽人後徙宋鄭間告秦王廷美驕恣將有隂謀竊發帝疑以問普普因言願備樞軸以察奸變且自陳曰臣忝舊臣為權倖所沮遂備道預聞昭憲太后顧命及前朝上表自訴等事帝發金匱得誓書及覽普前表因召見謂曰人誰無過朕不待五十已知四十九年非矣乃拜普司徒兼侍中封梁國公初田錫既以上疏受賜或勸少晦以逺讒忌錫日事君之誠惟恐不竭矧天植其性豈為一賞奪耶及趙普復相令有司受羣臣章奏必先白普錫遺普書以為失至公體普引咎謝已而錫出為河北轉運副使置京朝官宋史職官志凡一品以下常參者謂之朝官秘書郎以下未常參者謂之京官差遣院舊制京朝官屬吏部國初以來皆出中書至是詔京朝官奉使從政于外受代而歸者並令中書舍人考校勞績品量材器以中書所下闕員引對而授之謂之差遣院壬午七年春三月癸巳朔日食罷秦王廷美為西京留守夏四月以柴禹錫為樞宻副使或又告廷美欲因帝幸西池為亂遂罷廷美開封尹以上變進禹錫樞密副使楊守一樞密都承㫖趙鎔東上閤門使初昭憲太后遣命以次傳位事具前故帝即位之初命廷美尹開封而徳昭徳芳等皆稱皇子及徳昭不得其死徳芳相繼夭没廷美始不自安他日帝以傳國意訪之趙普普對曰太祖已誤陛下豈容再誤廷美遂得罪以竇偁字日章儀之弟郭贄字仲儀開封襄邑人參知政事初帝尹開封偁為判官以推官賈琰佞䛕于坐叱之曰賈氏子巧言令色豈不愧于心哉衆皆失色帝因重偁之直至是謂偁曰賞卿之叱賈琰也勒秦王廷美就第流盧多遜于崖州沈倫罷趙普既復相多遜不自安普屢諷令引退而多遜貪固權位不能決㑹普㢘得多遜交通秦王事帝大怒責授兵部尚書越二日下御史獄命翰林承㫖李昉等雜治之多遜具狀屢遣中書守當官趙白以機事密告廷美且云願宫車晏駕盡力事大王廷美亦遣小吏樊徳明告多遜云承㫖言正㑹我意因遺之弓箭多遜受之獄上詔文武集議王溥等奏廷美多遜詛咒顧望大逆不道宜正刑章詔削奪多遜官爵流崖州并徙其家屬期親于逺裔趙白樊徳明等悉斬于都門外廷美勒歸私第復其子為皇姪女落皇女公主之號沈倫坐與多遜同列不能覺察降授工部尚書五月貶秦王廷美為涪陵隋縣今重慶府涪州是縣公安置房州注見前趙普又以廷美居西京非便諷知開封府李符字徳昌大名内黄人上言廷美不悔過而怨望乞徙逺郡以防他變詔降封廷美為涪陵縣公房州安置以閻彦進知房州袁廓劒州梓潼人通判州事以伺察之普又恐符言泄乃坐符他事貶寧國司馬定難留後李繼捧入朝獻銀夏綏宥四州注俱見前六月繼捧弟繼遷叛走地斤澤此夏州叛宋之始夏地斤澤在榆林府懐逺縣故州東北夏州自李思恭即拓跋思恭具見前以來未嘗親朝中國至是繼捧率其族入朝帝嘉之賜賚甚厚繼捧陳其諸父昆弟多相懟怨乞納其境内銀夏綏宥四州留京居之帝為遣使如夏州䕶緦麻以上親赴闕以曹光實字顯忠雅州百丈人為四州都巡檢使時繼捧族弟定難軍都知蕃落使繼遷其高祖思忠思恭之弟也從討黄巢戰殁賜祠留居銀州聞使至乃詐言乳母死出𦵏於郊遂與其黨數十人奔入地斤澤出其祖像以示戎人戎人拜泣從者日衆帝尋以繼捧為彰徳節度使問曰汝在夏州何道以制諸部對曰羌人悍騺但羈縻而己非能制也秋九月遼主賢卒說具前子隆緒小字文殊努立復國號曰契丹是後遼復稱契丹今按文殊努舊作文殊奴改正遼主賢如雲州至焦山在今朔平府左雲縣東南有疾命韓徳讓匡嗣之子耶律色珍受遺詔立長子梁王隆緒遂卒隆緒嗣位諡賢曰孝成皇帝廟號景宗尊母蕭氏為太后専國事復國號曰大契丹改元統和后以徳讓為政事令兼樞密使總宿衛兵耶律博郭濟字布尼雅六院額勒金布格齊之後總領山西諸州事耶律休格為南面行軍都統按博郭濟舊作勃古哲布尼雅舊作蒲奴隠布格齊舊作蒲古只今並改冬十二月戊午朔日食癸未八年春正月罷樞宻使曹彬以王顯字徳明開封人弭徳超氏族畧弭氏望出新豐徳超滄州清池人為樞宻副使酒坊使弭徳超有寵于帝覬代曹彬之位乃自鎮州乗傳以急變聞曰彬秉政久得士心將為不利且誣以事為徴帝信之郭贄極言救解不聴遂出彬為天平節度使而以顯徳超並為副使二月戊子朔日食三月宴進士于瓊林苑瓊林宴之名始此帝親試禮部貢士于講武殿始分三甲錫宴于瓊林苑寵之以詩遂為定制夏四月弭徳超有罪流瓊州徳超以不得樞密使怨望居常怏怏一日詬王顯柴禹錫曰我言國家大事有安社稷功止得綫許大官汝等何人反在吾上我實恥之言頗侵帝顯奏之詔鞫問徳超具狀遂奪官秩禁錮瓊州而死帝始悟曹彬之誣待之加厚徳超始因李符薦得事上符貶寧國司馬徳超屢稱其寃徳超貶帝惡其朋黨令徙符嶺表初盧多遜之貶崖州也符白趙普曰春州雖近至者必死不若令多遜處之普不答至是以處符嵗餘卒春州注見前五月河決滑州東南入于淮此河決入准之始河大决滑州之韓村泛澶濮曹濟諸州壊民田廬東南流至彭城入于淮詔發丁夫十餘萬塞之時多隂雨河久未塞帝憂之遣樞密直學士張齊賢乗傳詣白馬津用太牢加璧以祭明年春滑州復言房竹河决帝曰韓村隄久不成安可重困吾民當以諸軍代之及發卒五萬以侍衛都指揮使田重進領其役又命翰林學士宋白祭于白馬津已而役成帝作河平歌賜近臣蠲水所及州縣田租宋白字太素大名人六月大水江河漢睢榖洛瀍澗水溢溺死者以萬計秋七月郭贄免以李昉參知政事贄嘗因論事奏曰臣遭不次之遇誓以愚直上報帝曰愚直何益于事贄對曰雖然猶勝奸邪至是以入對宿酲未解出知荆南府宋以荆州為江陵府又改荆南府尋復舊冬十月以姚坦字明白曹州濟隂人為益王名元傑本名德和字明哲帝第五子府翊善宋東宮官太平興國中置秩從七品王作假山召僚屬置酒衆皆褒美坦獨俛首王彊使視之坦曰但見血山安得假山王驚問故坦曰坦在田舎時見州縣督税上下相急父子兄弟鞭笞苦楚血流滿身此假山皆民税所出非血山而何時帝亦為假山未成聞之亟毁焉王每有過失坦輒盡言規正左右教王稱疾帝憂甚召乳母問狀乳母曰王本無疾徒以姚坦檢束不得自便耳帝怒曰吾選端士輔王為善今乃欲使我逐正人王年少豈解此也必爾輩教之杖乳母于後園召坦慰諭之趙普罷普罷為武勝軍後周置今南陽府鄧州是節度使帝作詩餞之賜宴長春殿普奉詩泣曰陛下賜臣詩當刻石與臣朽骨同𦵏泉下帝為之動容翌曰帝謂宰相曰普有功國家朕昔與遊今齒髪衰矣不欲煩以樞務擇善地處之因詩以道意普感激泣下朕亦為之墮淚宋琪對曰昨普至中書執御詩涕泣謂臣曰此生餘年無階上答庶幾來世得効犬馬力臣昨聞普言今復聞宣諭君臣終始可謂兩全寶宋琪字俶幽州薊人十一月以宋琪李昉同平章事李穆吕蒙正李至字言幾真定人參知政事昉初與盧多遜善多遜屢譖昉及多遜敗帝嘗語及其事昉頗為解釋帝由是重之遂與琪並相帝謂琪等曰世之治亂在賞當其功罰當其罪即無不治謂為飾喜怒之具即無不亂卿等慎之又謂䝉正曰古所謂君臣道合者情無間耳凡士未逹見當世之務戾于理者則怏怏于心及列于位得以獻可替否當盡其所藴言或未中亦當僉議而更之俾協于道朕固不以崇髙自恃使人不敢言也䝉正初入朝堂冇朝士指之曰此子亦參政耶䝉正佯為不聞而過之同列不能平詰其姓名䝉正遽止之曰若一知其姓名則終身不能忘不若弗知之為愈時人服其量以吕文仲字子臧歙州新安人為翰林侍讀宋置掌經筵講讀備顧問秩正七品王著字知微京兆渭南人為侍書亦翰林官宋置帝勤于讀書自己至申然後釋卷詔史官修太平御覽一千卷日進三卷宋琪以勞瘁諌帝曰開卷有益不為勞也朕欲周嵗讀遍是書耳毎暇日則問文仲以經義著以筆法明年命宋白李昉纂輯文苑英華一千卷甲申雍熈元年春正月求遺書時三館所貯遺帙尚多乃詔募中外有以書來上及三百卷當議甄録酧奬餘第卷帙之數等級優賜不願送官者借其本寫之由是四方之書間出矣涪陵公廷美以憂卒廷美至房州憂悸成疾卒追封涪王諡曰悼以其子德恭德隆為刺史李穆卒穆謹言慎行無有矯飾及是卒帝臨其喪哭謂侍臣曰穆操履純正真不易得朕方倚任遽爾淪没非穆之不幸乃朕之不幸也贈工部尚書夏四月羣臣請封禪許之五月乾元文明殿災六月詔求直言罷封禪先是泰山父老詣闕請封禪羣臣三上表帝許之詔以十一月有事于泰山命翰林學士扈䝉字曰明幽州人等詳定儀注五月乾元文明二殿災詔求直言遣使按察淮浙蜀廣獄遂罷封禪知睦州田錫上疏畧曰給事中不得其人左右補遺不舉其職致陛下有朝令夕改舎近謀遠之事又言時久升平天下混一故左取右奉致陛下以功業自多然臨御九年四方雖寜而刑罰未甚措水旱未甚調陛下謂之太平誰敢不謂之太平陛下謂之至理誰敢不謂之至理又言宰相不得用人而委員外差遣近臣不專受責而求令録封章又言聽用太廣則條制必繁條制既繁則依從者少自今凡有奏陳當令大臣議而行之毋使垂之空言示之寡信又言宰相若賢當信而用之宰相非賢當擇而任之何以置之為具臣而疑之若衆人也冬十月華山隱士陳摶入朝帝之即位也召摶入見待之甚厚至是復至帝謂宰臣曰摶獨善其身不干勢利方外之士也遣中使送至中書宋琪等從容問曰先生得元黙修養之道可以教人乎摶曰摶山野之人于時無用亦不知神仙黄白之事吐納養生之理非有方術可傳假令白日上升亦何益于世今聖上龍顔秀異有天曰之表博逹古今深究治亂真有道仁聖之主也正君臣協心同德興化致治之秋勤行修煉無出于此琪等以聞帝益重之賜號希夷先生還華山知夏州尹憲并州晉陽人襲李繼遷破走之憲與曹光實襲繼遷于地斤澤大破之斬首五百級焚四百餘帳繼遷與其弟繼冲遁免獲其母妻而還十二月立妃李氏處耘女為皇后賜京師大酺三日乙酉二年春二月李繼遷誘殺都廵檢使曹光實遂襲銀州據之繼遷自地斤澤敗轉徙無常漸以彊大西人以李氏世著恩德多歸之于是率衆攻麟州使人紿都廵檢曹先實曰我數奔北勢窘願講甥舅之禮期日㑹于葭蘆川在今葭州西源出榆林縣下流入黄河以岸多葭葦故名納降光實信之且欲擅其功故不與人謀至期繼遷設伏止領數十人近城迎光實光實從百騎赴之繼遷前道北行至其地忽舉手揮鞭伏兵盡起光實被害遂襲據銀州禁増置寺觀京城外有僧積薪將自焚帝聞之惡其惑衆令配流惡處仍毀其所居因謂宰相曰近多請建置寺觀屋才數十間輒求名額大抵誑惑閭閻藏隱姦弊耳詔天下寺觀非籍所存無得建置遣知秦州田仁朗大名元城人等將兵討李繼遷夏四月江南饑遣使賑之宴羣臣于後苑先是帝詔宰相近臣賞花于後苑謂之曰春風暄和萬物茂暢四方無事朕以天下之樂為樂宜令侍從詞臣賦詩至是召輔臣三司使翰林樞密直學士尚書省四品兩省五品以上三館學士宴于後苑賞花釣魚命羣臣賦詩因習射水心殿賞花曲宴自此始徵田仁朗還五月副將王侁字秘權開封浚儀人擊李繼遷走之銀麟夏州蕃内附繼遷既殺曹光實遂圍三族砦與下悉利諸砦皆羌戎所居今在綏德州米脂縣界砦將折裕木舊作遇也今改殺監軍使者與繼遷合繼遷乗勝攻撫寜砦本隋縣後廢為砦故城在今綏德州西時仁朗行及綏州注見前方請益兵俟報聞之喜曰戎人常烏合冦邊勝則進攻則走不可窮其巢穴今繼遷嘯聚數萬盡鋭以攻孤壘撫寜小而固非浹旬所能破我俟其困以大兵臨之分遣彊弩三百邀其歸路虜成禽矣部署已定仁朗欲示閑暇縱酒摴蒱侁等因媒糵之帝聞三族已陷大怒徵仁朗還下御史獄問狀仁朗對曰臣已定擒繼遷䇿㑹詔至不果因言繼遷得𦍑戎情願優詔懷來或以厚利啖部落酋長令圖之不爾他日大為邊患帝愈怒特貸死竄商州是月侁等出銀州北破悉利諸砦梟其酋折羅遇麟州諸蕃皆請納馬贖罪助討繼遷侁遂與所部兵入濁輪川在葭州神木縣西北下流入黄河考宋史夏國傳繼遷築堡于石州濁輪谷石州今山西永寜州是與葭綏接壤川水蓋出谷中流逕神木以入于河斬首五千級擒裕木繼遷遁去時詔郭守文并州太原人與侁同領邊事守文復與知夏州尹憲擊鹽城在榆林府定邊縣今曰鹽埸堡諸蕃焚千餘帳由是銀麟夏三州蕃百二十五族悉内附戸萬六千餘繼遷降于契丹契丹以為定難節度使尋以義成公主妻之秋九月廢楚王元佐字惟吉初名德榮帝長子為庶人元佐少聰警貌類帝帝鍾愛之廷美遷房州元佐嘗力救及廷美死遂發狂疾至以小過操梃刃傷侍人疾少間帝為赦天下遇重九詔諸王宴射苑中元佐以新瘥不預及諸王宴歸暮過元佐元佐恚曰若等侍上宴我獨不預是棄我也因發忿被酒夜縱火焚其宫帝大怒廢為庶人均州安置宋琪率百官三上表請留之京師帝許之行至黄山一名蘘山在南陽府南陽縣北召還居于南宫遣使如髙麗時議伐契丹以髙麗與之接壤數為所侵命御史韓國華字光弼相州安陽人齎詔諭令發兵西㑹髙麗遷延未即奉詔國華屢移檄督之得報發兵乃還冬十二月庚子朔日食宋琪柴禹錫免初詔廣宫城禹錫有别第在表識内上言願易官邸帝不悦禹錫又陰結琪為琪請盧多遜舊第帝益鄙之廣南轉運使王廷範江陵人琪妻髙氏親也將謀不軌知廣州徐休復字廣初濮州甄城人密奏之帝因琪禹錫入對問廷範何如人琪禹錫未知其端盛言廷範彊明忠幹帝意其交通不欲暴其狀詔琪詼諧無大臣體罷守刑部尚書降禹錫為左驍衛大將軍廷範及其黨與皆伏誅南康軍今江西南康府宋為南康軍大雨雪江水氷雪厚三尺江水氷合可勝重載丙戌三年春正月以曹彬田重進潘美等為都部署將兵伐契丹初賀懷浦開封陳留人太祖孝惠皇后兄將兵屯三交城名在太原府陽曲縣北好議邊事與其子知雄州令圖上言契丹主少母后專政寵倖用事請乗其釁以取燕薊帝信之以曹彬為幽州道行營都部署崔彦進副之米信為西北道都部署杜彦圭定州安喜人副之出雄州田重進為定州路都部署出飛狐此飛狐縣也隋置明改廣昌今縣屬易州潘美為雲應朔等州都部署楊業副之出鴈門李至罷至上疏諫伐契丹因固請解機務帝許之三月曹彬取涿州田重進敗契丹兵于飛狐北潘美取寰朔應雲州注俱見前彬遣先鋒將李繼隆字覇圖處耘子破契丹兵取固安注見前新城唐縣今屬保定府二縣進攻涿州克之殺其相賀浙虜兵復集米信獨以麾下三百人接戰被圍數重信持大刀大呼突圍而出㑹彬遣兵至遂敗契丹兵于新城東北田重進出飛狐南契丹西南面招安使大鵬翼率衆來拒重進命部將荆嗣罕儒子以五百騎禦之契丹兵二萬餘力不敵時譚延美大明朝城人屯小沼地名在廣昌縣東南嗣請延美列隊平川别遣二百人執白幟于道側嗣以所部疾驅往鬭契丹兵見旗幟綿亘疑大軍繼至欲遁去重進乗之契丹兵奔潰生擒大鵬翼飛狐靈邱漢縣今屬大同府皆降潘美自西陘入與契丹兵遇追至寰州破之刺史趙彦章以城降進圍朔州節度副使趙希贊亦舉城降遂轉攻應雲州皆克之已而重進再破契丹于飛狐北至蔚州其左右都押衙李存彰許彦卿執監城使耿紹忠以城降夏五月曹彬引兵退與契丹耶律休格戰于岐溝注見前敗續初諸將陛辭帝謂曰潘美但先趨雲州卿等以十萬衆聲言取幽州且持重緩行不得貪利虜聞大兵至必悉衆救范陽不暇援山後矣及彬等乗勝而前所至克㨗每㨗奏聞帝訝其進軍之速彬既次􅃰契丹南京留守耶律休格兵少不敢出戰夜則令輕騎掠其單弱以脇餘衆晝則以精鋭張其勢又設伏林莽以絶糧道彬居涿旬日食盡退師雄州以援糧餉帝聞之曰豈有敵人在前反退軍以援芻糧失策之甚也亟遣使止彬勿前急引師縁白溝河即拒馬河新城以下通稱白溝亦曰界河以宋遼于此分界也與米信軍接潘美盡畧山後地㑹重進東下合勢以取幽州彬部下諸將聞美重進累㨗恥握重兵不能有所攻取謀議蜂起彬不得已乃褁糧與米信復趨涿州休格聞之以輕兵來薄伺蓐食則擊離伍單出者由是軍士自救不暇結方陣塹地兩邊而行時方炎暑軍渴乏井漉淖而飲凡四日始得至涿士卒困乏糧又將盡㑹契丹主與其太后自駞羅口在涿州東北將大兵應援趨涿州彬信復引還休格因出兵躡之戰于岐溝闗彬信敗走無復行伍夜渡拒馬河休格引精兵追及溺者不可勝計彬信南趨易州方瀕沙河此易水也亦曰北濡源出易州西北逕定興縣為沙河合中易水入拒馬河而㸑聞休格引兵復至驚潰死者過半沙河為之不流棄戈甲如邱山休格請乗勝畧地至河為界太后不從引兵還燕封休格為宋國王帝聞之召彬信及崔彦進等還令田重進屯定州潘美還代州徙雲應朔寰四州吏民及吐谷渾部族分寘河東京西初議興兵獨與樞密院議中書不與聞及敗帝悔謂張齊賢等曰卿等共睹朕自今復作如此事否契丹復陷蔚寰州契丹耶律色珍將兵十萬至定安遼縣明省故城在今宣化府蔚縣西賀令圖遇之敗績南奔色珍追及戰于五臺死者數萬人明日攻陷蔚州令圖與潘美帥師往救與色珍戰于飛狐又敗于是渾源唐縣今為州屬大同府應州將皆棄城走色珍乗勢入寰州殺其守城吏卒千餘潘美副將楊業進兵擊契丹敗績轉戰至陳家谷在朔平府朔州南死之契丹復陷雲應朔諸城潘美既敗于飛狐議引兵䕶雲應寰朔吏民内徙時耶律色珍已陷寰州兵勢甚盛楊業欲避其鋒但領兵出大石路即今大石口在大同府應州南路通代州繁畤縣直入石碣谷即今石佛谷在代州崞縣西北䕶軍王侁等以為畏懦欲從鴈門北川中而往業不可侁曰君侯素號無敵今逗撓不進得非有他志乎業曰業非避死蓋時有未利徒殺士卒而功不立今責業以不死當為諸公先乃引兵自石跌路即今石硤口在崞縣東北趨朔州將行泣謂美曰此行必不利業太原降將分當死上不之殺寵以連帥授之兵柄非縱敵不擊蓋欲伺便以立尺寸功報國家耳今諸君責業避敵尚敢自愛乎因指陳家谷口曰諸君幸于此張歩兵彊弩以相援也業轉戰當至此可夾擊之不然無遺類矣美遂與侁帥麾下陣于谷口色珍聞業且至遣副部署蕭達蘭遼史作達蘭字托紐思温再從侄按達蘭五代史作撻覽遼史作撻凜俱誤托紐舊作駞寜今並改正伏兵于路業至色珍擁衆為戰勢業麾幟進色珍佯敗伏兵四起色珍還兵前戰業大敗退趨狼牙村在朔州西南亦曰洪崖村侁自寅至已不得業報使人登托邏臺在朔州南望之無所見以為契丹敗走欲争功即領兵離谷美不能制乃縁交河即馬邑川水亦曰灰河出寧武縣西逕朔州南下流入桑乾水西南而進行二十里聞業敗即麾兵卻走賀懷浦敗沒業且戰且行自午至暮至谷口望見無人撫膺大慟再率麾下力戰身被數十創士卒殆盡猶手刃數十百人馬重傷不能進匿深林中耶律希達望見袍影射之業墮馬被擒其子廷玉死焉考遼史蕭達蘭傳宋楊繼業率兵自代州來達蘭從耶律色珍敗之擒繼業于朔州耶律希達傳希達射繼業墮馬先是軍令須生擒繼業希達以故不能為功似射業者希達擒業者達蘭與此所載不同業因太息曰上遇我厚期討賊捍邊以報而反為姦臣所迫致王師敗績何面目求活耶乃不食三日死業既敗麾下尚百餘人業謂曰汝等各有父母妻子與我俱死無益也可走還報天子衆感激皆戰死無一生還者于是雲應朔州及諸城將吏聞業死悉棄城走色珍復陷其地事聞帝深痛惜詔贈太尉削美三任除侁名六月戊戌朔日食以辛仲甫參知政事先是仲甫奉使契丹太平興國二年葬太祖永昌陵契丹遣使來㑹葬帝命仲甫報謝之契丹主問曰聞中朝有党進者真驍將如進比凡幾人仲甫曰名將甚多如進鷹犬之材何可勝數契丹主欲留之仲甫曰信以成命義不可留有死而已乃厚禮遣還帝曰仲甫逺使絶域不辱君命更得數人如此朕何患也以為刑部郎中知成都府至是擢參知政事秋七月貶曹彬為右驍衛上將軍治其違詔失律罪也崔彦進米信以下貶官有差初米信軍潰獨李繼隆所部成列而還田重進亦全軍不敗詔以重進為馬步軍都虞候繼隆為馬軍都虞候知定州以張齊賢知代州帝以楊業死訪近臣可知代州者時齊賢以言争頗忤帝意因請行乃命與潘美同領縁邊兵馬冬十二月契丹大舉入寇瀛州部署劉廷讓即劉光業注見前與戰敗績契丹誘執知雄州賀令圖遂掠邢深徳州契丹主及蕭太后率兵南下以耶律休格為先鋒都統時劉廷讓帥師數萬並海而北與李敬源合兵將趨燕休格聞之以兵扼要害逆戰于君子館在河間府河間縣西北天方甚寒士卒皆不能彀弓弩㑹契丹兵大至圍廷讓數重廷讓先分精兵屬李繼隆為後援而繼隆退保樂夀注見前廷讓力不敵一軍盡沒以數騎脱走李敬源楊重進太原人皆死之先是休格諜紿賀令圖曰我獲罪本國旦夕願歸南朝令圖信之私遺重錦十兩兩匹也左傳重錦三十兩注以二丈雙行故曰兩申豐從女賈以幣錦二兩注二丈為一端二端為一兩所謂匹也及廷讓敗休格宣言願見雄州賀使君令圖意其來降欲擅其功即引數十騎逆之既至帳下休格據胡牀罵曰汝常好經度邊事今乃送死來耶令左右殺其從騎而執之自是河朔戍兵無復鬬志契丹乗勝長驅而南遂陷深邢徳三州殺官吏俘士民輦金帛而去魏博之北民尤苦焉帝聞之下詔自悔而釋潰敗將士之罪且蠲河北逋租給復三年令圖貪功生事輕而無謀初與其父懷浦首謀北伐一嵗中父子皆敗天下笑之張齊賢敗契丹于代州契丹薄代州城副部署盧漢贇畏懦保壁自固齊賢選廂軍宋制諸州之鎮兵曰廂軍二千出禦之誓衆感慨無不一當百契丹少郤先是齊賢遣使約潘美以并師來㑹戰使為契丹所執俄而美使至云師出至柏井鎮名一作百井在太原陽曲縣北得密詔云東路王師敗衂并之全軍不許出戰已還州矣時契丹兵塞川齊賢曰敵知美來而不知美退乃閉美使室中夜發兵二百人持一幟負一束芻距州西南三十里列幟然芻契丹遥見火光中有旗幟意謂并師至駭而北走齊賢先伏步卒二千于土鐙砦在代州掩擊大破之殺其國舅詳衮特爾格宫使蕭達哩斬首數百獲馬二千器㭜無算爾詳衮遼諸官府監治長官按詳衮舊作詳穩特格舊作撻烈哥達哩舊作打里今並改正丁亥四年夏四月張宏字巨卿青州益都人三年八月拜樞密副使免以趙昌言字仲謨汾州孝義人為樞密副使時河朔用兵宏循黙備位而御史中丞趙昌言數上邊事乃免宏左遷御史中丞而以昌言代之遣使募兵于諸州帝將大發兵討契丹遣使募兵于河南北四十餘郡凡八丁取一以充義軍京東轉運使李維清字直臣下邑人曰若是天下不耕矣三上疏争之李昉等亦相率言河南之民罔知戰鬭或慮人情揺動因而為盜非計之得乃詔獨選河北而諸路悉罷戊子端拱元年春正月親耕耤田赦二月改補闕拾遺為司諫正言舊制臺諫有名而不得行其職帝以失諫官本意故更以新名李昉罷布衣翟頴性險誕以傭書與知制誥胡旦字周公濵州渤海人狎旦為作大言使頴上之且改頴名曰馬周以為唐馬周復出也于是頴擊登聞鼓訟昉居宰相位當北方有事之時不為邊備徒知賦詩宴樂帝由是厭昉遂罷為右僕射昉和厚多恕在位小心醇謹毎有求進用者雖知其材可取必正色絶之已而擢用或不足用必和顔温語待之子弟問其故昉曰用賢人主之事若受其請是市私恩也故峻絶之使恩歸于上若不用者既失所望又無善辭取怨之道也以趙普為太保兼侍中吕䝉正同平章事帝欲相吕䝉正以其新進藉趙普舊徳為之表率㑹普以耤田入朝帝遂留為太保兼侍中䝉正質厚寛簡有重望以正道自持遇事敢言每論時政有未允者必固稱其不可帝嘉其無隠故與普並命普開國元老䝉正以後進歴官一紀進同相位普雅重之三月趙昌言有罪貶為崇信軍名注見前行軍司馬昌言素與知制誥胡旦善翟頴既訟罷李昉與旦益相得頴益肆誕毁斥時政上書自薦且歴舉所善數十人為公輔令昌言為内應事覺頴流海島貶昌言為行軍司馬旦坊州團練副使夏五月作秘閣詔就崇文院中堂建秘閣分三館書籍置其中以吏部侍郎李至兼秘書監帝謂至曰人君當淡然無欲勿使嗜好形見于外則奸佞無自入朕無他好但喜讀書多見古今成敗善者從之不善者改之如斯而已矣至每與李昉王化基字永圖真定人觀書閣下帝必遣使賜宴且命三館學士與焉以李繼捧為定難節度使賜姓名趙保忠李繼遷侵擾日甚趙普請復命繼捧鎮夏州帝召見加賜而遣之且謂曰若繼遷歸欵當授以官也鄭州團練使侯莫陳利用益州成都人有罪賜死利用以幻術得幸驕恣不法居處服御僭擬乗輿趙普按其十罪既命配商州普復力請誅之帝曰豈有萬乗之主不能庇一人乎普曰陛下不誅則亂天下法法可惜此一豎子何足惜哉帝不得已命誅之已而復遣使貸之使至新安注見前馬旋濘而踣及出濘易馬至商州已磔于市矣聞者快之秋八月鄧王錢俶卒追封秦國王諡忠懿自俶以地歸朝四徙大國初封漢南國王尋改南陽俶固讓國王之封改封許王又改鄧王善始令終窮極富貴福履之盛近代無比九月契丹復陷涿州冬十一月遂入祁州唐置治無極宋景徳中徙治蒲隂即今州也屬保定府契丹主攻涿州射帛書諭城中降不聴縱兵四面攻之城破乃降遂進攻長城在保定府安肅縣西北戰國時燕趙分界處今其地名長城口士卒潰圍南走契丹邀擊之殺獲殆盡因攻滿城注見前祁州及新樂注見前皆陷之己丑二年春正月契丹陷易州遷其民于燕時契丹屢寇邊詔羣臣上備戎䇿張洎請于沿邊建三大鎮各統十萬衆鼎峙而守仍令親王出臨魏府今大名府以控其要宋琪請令大軍于易州循孤山今曰孤山口在順天府房山縣南涿易二州分道處涉涿水在涿州西源出宣化府涿鹿山逕州境又南為俠河抵桑乾河源出山西朔平府馬邑縣由大同宣化逕順天府界下流入于淀即古濕水亦名蘆溝河俗名渾河今名永定河出安禮寨在宛平縣西南東瞰燕城纔及一舍此周徳威取燕之路事具前下視孤壘取燕必克琪又言兵凶器聖人不得已而用之若選使通好弭戰息民此亦䇿之得也李昉王禹偁字元之濟州鉅野人亦多以修好為言帝嘉納之自二月不雨至于夏五月詔録繫囚遣使分諸路決獄秋七月以張齊賢為樞密副使齊賢復入樞密趙普薦之也彗星出東井八月赦司天言妖星為滅契丹之象趙普上疏謂此邪佞之言不足信帝避殿減膳大赦作開寳寺塔藏佛舍利注見前也髙三百六十尺費億萬計踰八年始成知制誥田錫嘗上疏云衆謂金碧熒煌臣以為塗膏釁血帝亦不怒都巡檢使尹繼倫浚儀人勲之子襲契丹耶律休格于徐河源出易州五迴嶺逕滿城清苑入安州界為依城河下流入淀大敗之朝廷聞契丹復至遣李繼隆發鎮定兵萬餘䕶送糧饋數千乗趨威虜軍名宋置後改信安治遂城故城在今保定府安肅縣休格聞之帥精騎數萬邀諸塗北面都巡檢使尹繼倫適領兵徼巡路遇之休格不顧而南繼倫曰寇蔑視我耳彼㨗還則乗勝驅我北去不㨗亦且洩怒于我將無遺類矣為今日計當卷兵銜枚以躡之彼鋭氣前趨不虞我之至力戰而勝足以自樹縱死猶不失為忠義衆皆憤激從命繼倫令秣馬俟夜人持短兵潛躡其後行數十里至徐河天未明休格去大軍四五里㑹食訖將戰繼隆方陣於前以待繼倫從後急擊殺契丹一大將衆皆驚潰休格方食失箸為短兵中其臂創甚乗善馬先遁餘衆引出契丹為之奪氣自是不敢大入寇每相戒曰當避黒面大王以繼倫黒面故云大旱自秋徂冬不雨田錫上言此實隂陽失和調燮倒置上侵下之職而燭理未盡下知上之失而規過未能疏入帝及宰臣皆不悦出錫知陳州庚寅淳化元年春正月趙普罷普自再相帝每優禮之免朝謁止日赴中書視事有大政則召對至是以疾力求致仕帝不得已授太保兼中書令西京留守夏四月詔貸江州義門陳兢江州徳安人粟兢陳宜都王叔明之後九世同居長幼凡七百口不置僕妾上下婣睦人無間言每食必羣坐廣堂未成人者别為一席有犬百餘共一牢食一犬不至羣犬亦皆不食唐僖宗及南唐時旌其門開寳初免徭役至兢子姪益衆嘗苦乏食知州康戩言于朝詔本州每嵗貸粟二千石後兢卒從弟旭止受貸粟之半㑹嵗歉粟貴或勸旭全受而糶可得善價旭曰朝廷軫旭家乏食貸以公粟豈可見利忘義耶帝聞深加嘆奬冬十二月契丹封李繼遷為夏國王考宋史夏國傳以雍熙三年契丹冊繼遷為夏國王今依遼史辛卯二年春旱蝗時連嵗旱蝗是年尤甚禱雩無應帝手詔宰相曰朕將自焚以答天譴翌日大雨蝗盡死閏二月辛未朔日食夏四月以張齊賢陳恕字仲言南昌人參知政事張遜博州髙唐人温仲舒字秉陽河南人寇準字平仲華州下邽人為樞密副使初準為樞密直學士嘗奏事殿中語不合帝怒起準輒引帝衣請復坐事決乃退帝嘉之及旱蝗帝召近臣問以得失衆以天數對準曰洪範天人之際應若影響大旱之證葢刑有所不平也帝怒起入禁中頃之復召準問以不平狀凖曰願召二府宋以中書樞密為二府至臣即言之二府入準乃曰頃者祖吉王淮皆侮法受賕吉贓少乃伏誅淮以參政沔王沔字楚望濟州人端拱元年二月參知政事之弟盜主守財至千萬止杖之仍復其官非不平而何帝以問沔沔頓首謝于是切責沔而以凖為可大任遂有是命五月以謝泌字宗源歙州人為左司諫上修正殿頗施綵繪泌為右正言因對陳其事即日命代以赭堊賜泌金紫拜左司諫泌入謝曰陛下從諫如流故臣得以盡誠如唐末孟昭圖者事具前朝上諫疏暮不知所在如此安得不亂帝動容久之置諸路提刑官秋七月李繼遷請降以為銀州觀察使賜姓名趙保吉先是趙保忠至夏州言繼遷悔過歸欵詔授繼遷銀州刺史然實無降心也至是與保忠戰于安慶澤在故夏州北繼遷中流矢遁去轉攻夏州保忠乞師禦之乃遣翟守素濟州任城人帥兵往援守素至繼遷歸欵奉表謝罪遂有是命且以其子徳明小字阿移為管内蕃落使行軍司馬八月置審刑院帝慮大理刑部吏舞文巧詆乃置審刑院于禁中以李昌齡字天錫宋州楚邱人知院事置詳議官六員凡獄上奏先達院印訖付大理刑部斷復以聞乃下院詳議申覆裁決訖以付中書省行之其未允者宰相覆以聞始命論決九月王沔陳恕吕䝉正罷䝉正為首相以寛簡居位政事多決于沔沔聰察敏辯有適時才然性苛刻少誠謁見者必㗖以甘言既而進退非允人胥怨之又素與張齊賢陳恕不協及二人參知政事沔不自安慮僚屬有以中書舊事告齊賢恕者㑹司諫王禹偁言宰相樞密不得于本㕔見客許于都堂延接以杜私情沔喜即奏行之司諫謝泌以為如此是疑大臣以私也疏駁之帝追還前詔沔遂罷沔見帝涕泣不願離左右未幾髪鬚皆白帝怒户部使樊知古所部不治恕聞密以語之覬其修舉知古訴于帝帝怒恕漏言亦坐免度支判官宋沆長安人伏閣奏疏請立太子詞意狂率帝怒貶沆沆䝉正妻族也遂罷䝉正為吏部尚書時三日之間連罷三相因有奏毁者帝語之曰蒙正有大臣體沔甚明敏毁者慙而止以李昉張齊賢同平章事賈黄中字媧氏滄州南皮人李沆字太初洺州肥鄉人參知政事初黄中再典貢部多拔寒畯及掌吏部選除擬精當沆嘗侍曲宴上目送之曰風度端凝真貴人也至是並拜以張遜知樞密院事温仲舒寇準同知院事知樞密院同知樞密院自此始冬十月趙保忠叛降契丹契丹封為西平王彭城公劉繼元卒追封彭城郡王女真請伐契丹不許自是不復入貢遂屬契丹十一月以畢士安字仁叟代州雲中人為翰林學士先是翰林學士承㫖蘇易簡字太簡梓州銅山人續翰林志二卷以獻帝嘉之賜詩二章又飛白張懷瓘書斷飛白者後漢蔡邕所作本以題署宫闕字宜輕㣲不滿書玉堂之署四字令榜於㕔額曰永為翰林美事于是知制誥范杲字師回質兄子獻玉堂記請備其職帝惡其躁競出知濠州乃以士安為學士執政欲用諫議大夫張洎帝曰洎文學資任不下士安第徳行不及爾壬辰三年春二月乙丑朔日食夏六月置常平倉于京師時京畿榖賤帝遣使増價以糴于近倉貯之俟嵗饑則減價糶名曰常平倉遂為永制秋七月趙普卒諡忠獻普卒帝聞之震悼謂近臣曰普盡忠國家真社稷臣也因出涕廢朝五日追封真定王普性深沉有岸谷少習吏事寡學術及為相太祖勸以讀書逐手不釋卷每歸私第闔戸啓篋取書誦之竟日及次日臨政處決如流既卒家人發篋視之則論語二十篇也普嘗謂帝曰臣有論語一部以半部佐太祖定天下以半部佐陛下致太平史臣曰陳橋之事人謂普及太宗先知其謀理勢或然事定之後未嘗以勲舊自伐及其當揆獻可替否偃武修文厥功偉矣獨廷美盧多遜之獄大為太宗之累豈其學力有限而尚有患失之心歟君子惜焉召終南隠士种放字名逸洛陽人不至放沉黙好學隠居終南以講習為業從學者衆資以養母母亦能樂道薄滋味轉運使宋惟幹言其才行詔使召之其母恚曰嘗勸汝勿聚徒講學果為人知不得安處我將棄汝深入窮山矣放乃稱疾不起其母盡取其筆硯焚之與放轉居窮僻人迹罕至帝嘉其節命有司時加存問癸巳四年春二月己未朔日食置審官院初帝慮中外官吏清濁混淆命官考課號磨勘院至是改為審官院掌審京朝官其幕職州縣官别置考課院主之交州黎桓入貢詔封為交阯郡王桓遣使來貢并上丁璿讓表朝廷懲孫全興之敗許之以桓為静海節度使封交阯郡王尋進封南平王丁氏據安南凡三傳為黎桓所簒青神後周縣今屬眉州民王小波作亂初蜀亡其府庫之積悉輸汴京後任事者競起功利于常賦外更置博買務禁商賈不得私市布帛蜀地狹民稠耕稼不足以給由是小民貧困兼并者益糴賤販貴以規利青神民王小波因聚衆為亂且曰吾疾貧富不均今為汝均之貧者争附遂攻青神掠彭山唐縣今屬眉州殺縣令齊元振剖其腹實之以錢惡其誅求無厭也賊黨由是愈熾旁邑響應已而小波死其黨李順擁衆寇掠州縣多陷西川都巡檢使張玘與小波戰射中之玘為小波所殺小波亦病創死其黨推小波妻弟李順為帥衆至數十萬三月以何承矩字正則繼筠之子為河北屯田制置使考宋史何承矩傳端拱元年承矩請開河北屯田詔以為制置使河渠志淳化四年春詔何承矩等督戍兵開屯田食貨志承矩建議連年沮者頗衆㑹臨津令黄懋亦上書言之乃以承矩為屯田使二志畧同與傳互異續綱目依志而採録不詳宋元通鑑依傳而以黄懋上書并記于端拱元年與志不合今依續綱目書綱節採食貨志作目而以河渠志所載塘濼諸水并注于後先是承矩上疏請于順安砦即順安軍宋置今保定府安州是西引易河即易水築堤為屯田承矩以為自順安西導水東注于海資其陂澤築堤貯水可遏敵騎之奔軼俟期嵗間闗南諸泊播為稻田收地利以實邊設險固以防塞此禦戎之要䇿也既而河朔連年大水承矩知雄州又言宜因積潦蓄為陂塘大作稻田以足食㑹臨津唐縣金改寧津今屬河間府令黄懋閩人上書言河北州軍多陂塘引水溉田功省易就詔以承矩為屯田使懋為判官發河北諸州戍兵萬八千人給其役于是開塘濼種稻田凡雄莫霸州平戎順安等軍平戎軍宋置後改保定今順天府保定縣是興堰六百里取江南早稻種課令種之初承矩建議沮者頗衆及稻熟承矩輦送闕下議乃息而莞蒲蜃蛤之饒民頼其利河渠志塘濼緣邊諸水所聚因以限遼其水東起滄州界拒海岸黒龍港西至乾寧軍沿永濟河合淀為一水東起乾寧軍西信安軍永濟渠為一水又西合諸淀為一水東起永濟渠西至霸州莫金口合淀為一水東北起莫金口西南保定軍父母砦合淀為一水東南起保安軍西北雄州合淀為一水東起雄州西至順安軍合淀為一水東起順安軍西邊吳淀至保州合諸淀為一水起安肅廣信軍之南保州西北畜沈苑河為塘曰沈河泊自保州西合雞距尚泉為稻田方田曰西塘泊自何承矩黄懋開置其後益増廣之河黒龍港在今天津府青縣西乾寧軍注見前永濟即今衛河信安軍宋置今為鎮在順天府永清縣東南永濟渠在霸州東莫金口在霸州南父母砦在保定縣西北保安軍注見前邊吳淀在安州西南今堙沈苑河今清苑河古沈水也水經注沈水出蒲城西又東南入徐即此雞距泉在滿城縣東尚泉亦曰一畝泉在雞距泉北二泉合流為竒村河夏五月以錢若水字澹成一字長卿河南新安人為翰林學士帝謂侍臣曰學士之職親切貴重非他官可比朕常恨不得為之又曰士之學古入官遭時得位紆朱拖紫足以為榮矣得不竭誠以報國乎若水對曰髙尚之士不以名位為光寵忠正之士不以窮達易志操其或以爵禄位遇之故而效忠于上中人以下者之所為也帝然之六月張齊賢罷以吕端參知政事殿中丞朱貽業與李沆有姻婭嘗為其同僚王延徳大名人求補郡沆言于齊賢齊賢以聞帝以延徳嘗事晉邸怒其不自陳而干執政召見詰責延徳言未嘗有請齊賢不欲援沆為證即自引咎遂坐免以向敏中字常之開封人張詠字復之濮州甄城人同知銀臺通進司職官志知司官二人兩制以上充二司舊隸樞密院至是始以敏中詠同知司事隸門下主視章奏案牘以稽出入葢給事中之職也張遜寇準免以柴禹錫知樞密院事劉昌言字禹謨泉州南安人同知院事遜素與準不協一日準與温仲舒並轡晚歸有狂民迎馬首呼萬嵗街使王賔許州許田人與遜雅相厚因奏民迎準拜呼萬嵗準自辨云實與仲舒同行而遜令賔獨奏臣因互發其私帝惡之乃左降遜為右領軍衛將軍出準知青州秋八月丙辰朔日食十月河決澶州李昉賈黄中李沆温仲舒罷自七月初雨至是不止京城盧舍多壞陳潁宋亳間盜賊並起商旅不行帝以隂陽愆和罪由公府切責昉等曰卿等盈車受俸豈知野有餓莩乎昉等慚懼拜伏遂罷之以吕䝉正同平章事蘇易簡趙昌言參知政事趙鎔向敏中同知樞密院事䝉正嘗因召對論及征伐帝曰朕比年征伐葢為民除暴苟好功黷武則天下之人熸亡盡矣蒙正對曰治國之要在内修政事則逺人來歸自致安静帝然之易簡在翰林八年帝待之若賔友易簡嘗直禁中以水試欹器小黄門奏之帝召問即令取至便殿親試之易簡進曰臣聞日中則昃月盈則虧器滿則覆物盛則衰願陛下持盈守成慎終如始帝納之舊制欲授台輔必使天下稔其名望而後正位易簡以親老急于進用因亟言時政得失遂入政府自是帝不復有欵接意但正色責吏事而已易簡悔之時西北用兵樞機之任専主謀議敏中明辨有才略遇事敏速凡二邊道路斥堠走集之所莫不周知帝器之閏月以陳恕為三司總計使時復置三司使而罷鹽鐵户部侍郎三使分天下郡縣為十道曰河南河東闗西劍南淮南江南東西浙東西廣南以京東為左計西為右計恕為總計使魏羽字垂天歙州婺源人為左計使董儼字望之洛陽人為右計使中分十道以𨽻焉而各道則署判官以領其事凡涉計度者三使通議之恕言官司各建政令互出難以經乆帝不聴周太后符氏卒甲午五年春正月王小波黨李順䧟成都以宦者王繼恩為西川招安使討之李順攻䧟蜀卭州永康軍宋置今成都府灌縣是又䧟漢彭州乗勝攻成都轉運使樊知古知府郭載字咸熙浚儀人及官屬斬關出奔梓州順入城據之僭號大蜀王遣其黨四出攻刦州縣兩川大震帝議遣大臣撫諭趙昌言獨請發兵急討無使滋蔓帝從之遣繼恩等分路進討以雷有終字道成徳驤子為峽路轉運使宋以夔萬等州為峽路續綱目通鑑俱誤作陜路今依宋史改趙保吉冦靈州以李繼隆為河西都部署討之保吉徙綏州民于平夏即夏州唐時党項居夏州者號平夏部因名部將髙文岯等因衆不樂反攻敗之保吉復圍堡砦掠居居焚積聚遂攻靈州詔繼隆帥師討之饑先是京西浙饑民相率持杖投劵富室取其粟皆坐彊盜棄市知秦州張榮獨取為首者杖脊餘悉從杖以其事聞帝感悟下詔褒之至是遣使十七人分詣諸道巡撫帝謂之曰彼皆平民因饑取餱糧以圖活命耳宜悉從末減不可與彊盜同科三月李繼隆入夏州執趙保忠赴京師保忠聞繼隆將至先挈其母與妻子壁野外乃上言與保吉解怨獻馬乞罷兵帝覽奏立遣中使督繼隆進軍及師壓境保吉因夜襲保忠營欲併其衆保忠方寢聞難作單騎走還城其指揮使趙光嗣閉之别室開門迎繼隆繼隆執保忠送汴保志遁去保忠至汴詰責釋之封宥罪侯夏四月削趙保吉姓名墮夏州城帝以夏州深在沙漠奸雄因以竊據欲墮其城吕䝉正曰自赫連築城以來頗為關右之患若遂廢之萬世利也乃詔墮之遷其民於綏銀置起居院宋沿唐制起居郎隸門下舍人隸中書至是始置院于禁中初李昉監修國史復時政記至是右諫議大夫張佖請起居院修左右史之職為起居注與時政記逐月終送史館以備修日厯上嘉之乃置院于禁中命梁周翰字元褒鄭州管城人等掌其事周翰請以所撰先進御後付史館從之起居注進御始此時政記先進御自昉始起居注先進御自周翰始五月王繼恩復成都獲李順誅之先是李順分遣數萬衆寇劍門上官正字常清開封人為都監麾下有疲卒數百因激以忠義勇氣百倍力戰以守㑹成都監軍宿翰兵至正與之合迎擊賊衆大敗之斬馘幾盡時朝廷聞蜀寇甚盛深以棧道為憂正以孤軍破賊于是閣道無壅王師得以長驅而進順又遣其黨率衆二十萬圍梓州知州事張雍徳州安徳人都巡檢使盧斌開封人悉力禦之初雍聞賊起集城中三千人又募強勇千餘守城斌適還州雍命之監軍輦綿州金帛以寔帑藏守械悉備及賊至攻之不克凡八十日王繼恩過綿州遣石知顒亦宦者真定人來援賊不戰而潰斌乗勝追斬二萬餘尋領千兵觧閬州圍至蓬州復敗賊衆繼恩遣内殿崇班曹習破賊于老溪綿州巡檢使胡正逺又進擊之江老溪即閬溪在保寧府閬中縣西入嘉陵遂復綿閬巴蓬劍州五月繼恩至成都破賊十萬衆斬首三萬級獲李順遂復成都捷聞詔以雷有終知成都府尋降為益州磔順等八人于鳳翔市順黨張餘復䧟嘉戎諸州開州知州秦傳序死之餘轉攻夔州為白繼贇所敗上官正又屢破之遂復雲安軍餘亡走明年都監宿翰獲餘于嘉州蜀盜悉平秦傳序江寧人秋七月李繼遷遣使來貢繼遷獻馬謝罪又遣弟延信入覲言違叛事出保忠帝召見慰諭之髙麗請伐契丹詔諭止之髙麗數為契丹侵掠請擊之帝以北邉甫寧不欲為外夷開隙詔撫慰之自是不復入貢八月以王繼恩為宣政使中書以繼恩討蜀寇功欲除宣徽使帝曰朕讀前代史不欲令宦官預政宣徽使執政之漸也止可授以他官宰相力言繼恩有大功非此不足以賞帝怒深責之乃命學士張洎錢若水議别立宣政使以授之張雍盧斌以守梓州功皆進秩斌考張雍盧斌同守梓州續綱目宋元通鑑録雍削今依本傳增輯以張詠知益州蜀當冦掠之際民多脇從詠至諭以恩義使各歸田里且曰前日李順脇民為賊今日吾化賊為民不亦可乎有牒訴者詠灼見情偽立為判决人皆厭服其為政恩威並用蜀民畏而愛之先是城中屯兵尚三萬人無半月之食詠知民間舊苦塩貴而廩有餘積乃下其估聽民以粟陜易塩未踰月得米數十萬斛詠度有二嵗備乃奏罷西運糧帝聞之喜日此人何事不能了吾無憂矣以趙昌言為川陜都部署尋罷知鳳翔府王繼恩在蜀不能戢衆郡縣多叛帝意頗厭兵召昌言謂曰西川本是一國太祖平之今三十年矣昌言知帝指即前畫攻取之䇿帝喜命昌言為川峽招安行營都部署自繼恩以下並受節制昌言既行或奏昌言有反相不宜握兵入蜀恐後難制乃詔昌言駐鳳翔時昌言已至鳳州詔追及之因留候館不復進尋罷知鳳翔府九月以襄王元侃帝第三子即真宗為開封尹進封夀王帝在位乆儲貳未立馮拯字道濟河陽人等上疏言之帝怒斥之嶺南中外無敢復言者寇準自青州召還入見帝曰朕諸子孰可以付神器者寇準曰陛下為天下擇君謀及婦人中官不可也惟陛下擇所以副天下望者帝俛首乆之屏左右曰襄王可乎準曰知子莫若父聖意既以為可願即决定遂以元侃為開封尹進封夀王以寇準參知政事先是準既罷知青州帝念之不置謂左右曰寇準在青州樂乎左右揣帝意且復召用因對曰陛下思準不少㤀聞準日縱酒未知亦念陛下否帝黙然至是召還遂拜參知政事冬十二月戊寅朔日食是日隂雪羣臣以不食稱賀以陳恕為鹽鐵使總計使果不便乃罷之復以三司兩京十道歸三部各置使以恕為塩鐵使時帝留意金榖召三司吏李溥河南人等詢以計司利害溥等上七十一事詔以四十四事付有司行之餘下恕等議賜溥等金錢悉補侍禁殿直帝語恕等曰漙等于錢穀利病自幼至長寢處其中必周知之卿等但假以顔色引令剖陳必有所益復賜三司錢百萬募吏能言本司不便者令恕等量事大小賞之恕将立茶法召茶商數十人俾各條利害恕閲之第為三等語副使宋太初字永初澤州晉城人曰吾觀下等固滅裂無取上等取利太深不可行於朝廷惟中等公私皆利吾裁損之可以經乆于是始為三法行之恕有心計釐去宿弊帝深器之親題殿柱曰真塩鐵陳恕恕每便殿奏事帝或未察至形誚譲恕踧踖退至殿壁俟帝意稍解復進慤執前論終不易帝亦多從之御批歴代通鑑輯覽卷七十二

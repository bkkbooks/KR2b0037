body:
  text: 武陵王紀帥諸軍東下留蕭撝守成都梁主甚懼與魏書曰子糾親也請君討之左傳語宇文泰曰取蜀制梁在茲一舉諸將咸難之大將軍尉遲迥泰之甥也獨以為可克泰問以方畧迥曰蜀與中國隔絶百有餘年恃其險逺不虞我至若以鐵騎兼行襲之無不克矣泰乃遣迥自散闗注見前伐蜀至涪水潼州刺史楊乾運以州降迥分兵守之進襲成都蕭撝嬰城自守迥圍之紀聞有魏兵遣梁州刺史譙淹還救蜀迥撃破之初紀世子圓照鎮巴東啟紀云侯景未平荆鎮已為所破宜急進討紀信之趣兵東下及至巴東知景已平乃悔召圓照責之對曰侯景雖平江陵未服紀亦以既稱尊號不可復為人下欲遂東進將卒日夜思歸皆以為宜救根本更思後圖圓照及劉孝勝固言不可紀從之遂至西陵䕶軍陸法和拒之于峽口先是法和既擒任約還請梁主曰侯景平矣蜀賊將至請守險以待之乃引兵屯峽口及是紀至軍勢甚盛法和築二城于峽口兩岸運石填江鐵鎖斷之梁主拔侯景故將任約謝答仁于獄配兵使助法和夏六月梁復以王琳為湘州刺史陸納降先是王僧辯及蕭循進攻陸納拔其二城納衆大敗走保長沙僧辯進圍之至是梁主遣使送王琳令説諭納僧辯使送示之納衆悉拜且泣使謂僧辯曰朝廷若赦王郎乞聽入城梁主從之納遂降梁主復琳官爵使將長沙兵西援峽口秋七月梁武陵王紀衆潰梁主殺之及其諸子武陵王紀遣將軍侯叡與陸法和相拒梁主遣使與紀書許其還蜀専制一方紀不從梁主復與紀書曰吾年為一日之長屬有平亂之功膺此樂推事歸當璧倘遣使乎良所希也如曰不然于此投筆兄肥弟瘦無復相見之期讓棗推梨永罷懽愉之日心乎愛矣書不盡言紀頓兵日久頻戰不利又聞魏寇深入成都孤危憂懣不知所為乃遣樂奉業詣江陵求和奉業啟梁主曰蜀軍乏糧士卒多死危亡可待梁主遂不許其和巴東民斬峽口城主降于王琳謝答仁任約進攻侯叡破之于是兩岸十四城俱降紀不獲退順流東下將軍樊猛字智武南陽湖陽人追撃之紀衆大潰赴水死者八千餘人猛圍而守之梁主密敕猛曰生還不成功也猛遂斬紀及其幼子圓滿陸法和收圓照兄弟三人送江陵梁主絶紀屬籍曰饕餮氏下圓照等于獄絶其食至囓臂啖之十二日而死逺近聞而悲之八月成都降魏魏以尉遲迥為益州刺史魏尉遲迥圍成都五旬蕭撝屢戰皆敗乃請降諸將欲不許迥曰降之則將士全逺人悦攻之則將士傷逺人懼遂受之吏民皆復其業唯收奴婢及儲積以賞將士軍無私焉魏以迥為益州刺史已而魏命迥自劍閭以南得承制封拜黜陟迥明賞罰布威恩綏輯安民經畧未附華夷懐之九月梁遣王僧辯還建康陳霸先還京口梁主下詔將還建康將軍宗懔字元懔湼陽人黄羅漢皆楚人不願移胡僧祐亦以為不可梁主令朝臣議之㑹者五百人梁主曰勸吾去者左袒左袒者過半朱買臣言于梁主曰建康舊都山陵所在荆鎮邊疆非王者之宅願陛下勿疑以致後悔臣家在荆州豈不願陛下居此但恐是臣富貴非陛下富貴耳梁主使術士杜景豪卜之不吉對曰未吉退而言曰此兆為鬼賊所留也梁主以建康凋殘江陵全盛意亦安之卒從僧祐等議乃詔王僧辯還鎮建康陳霸先復還京口梁以陸法和為郢州刺史法和為政不用刑獄専以沙門法及西域幻術教化部曲數千人已而法和上表自稱司徒梁主怪之僕射王褒曰法和既有道術容或先知梁主乃就拜之曾王褒字子深儉之孫齊納蕭退鄱陽王恢之子于梁不克齊主使郭元建治水軍于合肥將襲建康納梁湘潬侯退梁主使南豫州刺史侯瑱與戰于東闗注見前敗之齊師退是冬齊宿預民東方白額以城降梁梁江西州郡皆起兵應之冬十一月突厥攻柔然齊主撃之遷柔然于馬邑川注見前突厥請降先是突厥伊利可汗死弟木杆俟斤立木杆剛勇多智數善用兵鄰國畏之至是木杆攻柔然柔然舉國奔齊齊主撃突厥迎納柔然廢其可汗庫提立阿那瓌子菴羅辰為可汗置之馬邑川給其廩餼繒帛親追突厥突厥請降許之而還自是貢獻相繼甲梁承聖三年魏恭帝戍廓元年齊天保五年春正月齊主撃山胡敗之齊主討山胡大破之男子十三以上皆斬女子及幼弱皆賞軍遂平石樓山名在山西汾州府石樓縣東南水經注蒲川水出石樓山即此石樓絶險自魏世所不能至于是逺近山胡莫不懾服有都督戰傷其什長不能救齊主命刳其五蔵令九人食之肉及穢惡皆盡自是始為威虐魏作九命九秩之典宇文泰始作九命之典以叙内外官爵改流外品為九秩内命三公九命三孤八命六卿七命上大夫六命中大夫五命下大夫四命上士三命中士再命下士一命外命諸公九命諸侯八命諸伯七命諸子六命諸男五命公之孤卿四命侯之孤卿公之大夫三命子男之孤卿侯伯之大夫公之上士再命公之中士侯伯之上士一命公之下士侯伯之中士下士子男之士不命其禄下士一百二十五石中士以上至于上大夫各倍之上大夫是為四千石卿二分孤三分公四分各益其一公為一萬石其九秩一百二十石八秩至于七秩毎二秩六分而下各去其一二秩俱為四十石凡頒禄視年之上下上年頒全中年頒半下年頒一無年不頒具見隋書百官志魏宇文泰廢其主欽而立齊王廓文帝第四子是為恭帝復姓拓跋氏先是魏尚書元烈謀殺宇文泰事覺泰殺之魏主有怨言密謀誅泰泰諸子皆幼以諸壻為心膂清河公李基字仲和逺之子義城公李暉弼之子常山公于翼字文若謹之子分掌禁兵至是魏主謀泄泰廢魏主置之雍州立其弟齊王廓去年號稱元年復姓拓跋氏魏初統國三十六大姓九十九後多滅絶泰乃以諸將功髙者為三十六國次者為九十九姓所將士卒亦改從其姓魏遣使如梁魏侍中宇文仁恕聘于梁㑹齊使者亦至梁主接仁恕不及齊使仁恕歸以告宇文㤗梁主又請據舊圖定疆境辭頗不遜泰由是有圖江陵之志梁主詧聞之益重其貢獻魏荆州刺史長孫儉嵩五世孫屢陳攻取之策泰徴儉入朝問以經畧復命還鎮密為之備馬伯符本梁將降于魏密使告梁主梁主弗之信齊主殺其尚書左丞盧斐字子章同之子李庶諧之子齊中書令魏收字伯起子建之子撰魏書頗用愛憎為褒貶毎謂人曰何物小子敢與魏收作色舉之則使升天按之則使入地既成中書舍人盧潛左丞盧斐李庶皆言其誣罔不直收啟齊主云臣既結怨彊宗將為刺客所殺齊主怒于是斐庶皆坐謗史鞭二百配甲坊潛亦坐繋獄斐庶死獄中然時人終不服謂之穢史夏四月魏宇文泰弑其故主欽五月梁以王琳為廣州刺史廣州刺史蕭勃自以非梁主所授内不自安啟求入朝梁主徙勃為晉州梁于同安郡置豫州後改曰晉州同安故城在今安慶府桐城縣刺史以琳部衆彊盛又得衆心故使代勃以逺之琳私謂主書廣漢李膺曰琳小人也蒙官拔擢至此今天下未定遷琳嶺南如有不虞安得琳力竊揆官意不過疑琳琳分望有限豈與官争為帝乎何不以琳為雍州刺史鎮武寜琳自放兵作田為國禦捍膺然其言而弗敢啟六月齊冀州刺史段韶伐梁拔宿預先是梁侵齊陳覇先圍廣陵嚴超達圍涇州梁置今泗州天長縣是侯瑱張彪俱出石梁晉戌後周置縣隋省故城在今天長縣杜僧明將兵助東方白額至是齊冀州刺史段韶討白額留兵圍之而自引兵倍道趣涇州撃破超逹迥趣廣陵覇先觧圍走僧明瑱彪等皆還韶至宿預使人説白額白額出迎執而斬之秋九月梁主講老子于龍光殿冬十月魏遣柱國于謹帥師伐梁十一月入江陵十二月執梁主繹殺之魏遣柱國于謹中山公宇文䕶字薩保泰兄子大將軍楊忠將兵五萬伐梁長孫儉問謹曰為繹計將何如謹曰耀兵漢沔還據丹陽上策也退保子城以待援軍中策也難于移動據守羅郭下策也儉曰繹出何策謹曰下策儉曰何故謹曰繹懦而無謀多疑少斷愚民難于慮始皆戀邑居所以知其用下策也武寧太守宗均告魏兵且至領軍胡僧祐黄羅漢曰二國無隙必應不爾乃復遣侍中王琛使魏去年琛先使魏于謹至樊鄧梁王詧帥衆㑹之梁主乃停講戒嚴琛至石梵杜佑曰在沔州沔口上沔州今安陸府沔陽州是馳報羅漢曰境上帖然前言皆兒戲耳梁主乃復講百官戎服以聽徵王僧辯為大都督命陳霸先徙鎮揚州僧辯遣侯瑱帥程靈洗字元條新安海寜人為前軍杜僧明帥吴明徹字通昭秦郡人為後軍陸法和聞魏師至將赴江陵梁主使逆止之曰此自能破賊法和還州堊其城門著衰絰坐莘席終日乃脱之十一月魏軍濟漢于謹令宇文䕶楊忠帥精騎先據江津斷東路梁主出城行柵插木為之周六十里以將軍胡僧祐僕射王褒分督城東西軍事魏軍至柵下梁主乃徵王琳為湘州刺史使引兵入援于謹令築長圍中外遂絶梁主巡城猶口占為詩羣臣皆有和者梁主又裂帛為書趣王僧辯曰吾忍死待公可以至矣胡僧祐等出戰皆敗朱買臣按劍進曰惟斬宗慄黄羅漢可以謝天下梁主曰曩實吾意宗黄何罪王琳軍至長沙長史裴政請問道先報江陵至百里洲為魏人所獲梁王詧謂政曰我武皇帝之孫也不可為爾君乎若從我計貴及子孫不然腰領分矣政詭曰惟命詧鎖之至城下使言曰僧辯已自為帝王琳不復能来政乃言曰援兵大至各思自勉詧怒命殺之㕘軍蔡大業諫曰此民望也殺之則荆州不可下矣乃釋之裴政邃之孫蔡大業大寳之弟魏人百道攻城胡僧祐親當矢石晝夜督戰奬勵將士朋行賞罰衆咸致死所向摧殄魏不得前俄而僧祐中流矢死内外大駭魏悉衆攻柵反者開西門納魏師梁主退保金城子城也諸將皆散梁主乃焚古今圖書十四萬卷以寳劍撃柱折之歎曰文武之道今夜盡矣命御史中丞王孝祀作降文謝答仁諫曰城中兵衆猶彊乗闇突圍而出賊必驚因而薄之可渡江就任約梁主素不便走馬曰事必無成祇增辱耳答仁求自扶梁主王褒曰答仁侯景之黨豈可信答仁又請守子城收兵梁主然之褒以為不可答仁歐血而死于謹徵太子為質梁主使王褒送之謹子以褒善書給之紙筆褒乃書曰柱國常山公家奴王褒梁主遂白馬素衣出門詧使鐵騎擁之入營囚于烏幔之下十二月魏人殺梁主及太子元良等于謹收府庫珍寳及宋渾天儀梁銅晷表及諸法物盡俘王公以下及選百姓男女數萬口為奴婢分賞三軍小弱者皆殺之梁主性殘忍魏師圍城獄中死囚且數千人有司請釋之以充戰士梁主不許悉令棓殺之事未成而城陷性好書晝夜不釋嘗曰我韜于文士愧于武夫及城陷焚書或問何意梁主曰讀書萬卷猶有今日故焚之被害後詧以布帊纒尸𦵏于津陽門外魏取襄陽徙梁主詧使稱帝于江陵屯兵守之魏立詧為皇帝取雍州之地而資以荆州延袤三百里又置防主將兵居西城名曰助防實以制詧也初魏師未還詧將尹徳毅説詧曰江東之人塗炭至此咸謂殿下為之人盡讎也誰與為國今魏之精鋭盡萃于此若殿下為設享會預伏武士因而斃之分命諸將掩其營壘大殱羣醜俾無遺類取江陵百姓撫而安之文武羣僚隨材銓授魏人懾息未敢送死王僧辯之徒折簡可致然後朝服濟江入踐皇極晷刻之問大功可立古人云天與不取反受其咎願殿下恢𢎞逺畧勿懐匹夫之行詧曰卿此策非不善也然魏人待我厚若遽為此人將不食吾餘至是闔城繋虜又失襄陽乃恨不用徳毅之言尹徳毅天水人正之子梁王僧辯陳霸先奉晉安王方智元帝少子承制梁敬帝方智紹泰元年魏恭帝二年齊天保六年後梁中宗宣帝蕭詧天定元年凡四國春正月梁王詧始稱帝梁王詧即位改元于江陵賞刑制度並同王者唯上疏于魏則稱臣奉其正朔以蔡大寳為侍中尚書令王操字子髙太原晉陽人為五兵尚書大寳嚴整有智謀雅達政事文辭贍速操亦亞之梁廣州刺史王琳救江陵弗及次于長沙遣兵伐後梁琳將兵北下至蒸城後漢臨蒸縣故城也隋省入衡陽衡陽今湖南衡州府治聞江陵已陷為世祖發哀三軍縞素遣别將侯平帥舟師攻後梁琳屯兵長沙傳檄州郡為進取之計長沙王韶字徳茂懿之子及上游諸將皆推琳為盟主齊遣梁貞陽侯淵明還梁稱帝以兵納之二月梁王方智立是為敬帝晉安王方智自尋陽入建康即梁王位時年十三以王僧辯為中書鑑録尚書事驃騎大將軍都督中外軍事加陳霸先征西大將軍僧辯居石頭霸先在京口僧辯推心待之子顗屢諫不聽夏五月梁王僧辯奉淵明歸建康以梁王方智為太子先是齊主遣殿中尚書邢子才詣建康與僧辯書令迎淵明書曰嗣主冲藐未堪負荷彼貞陽侯梁武猶子長沙之嗣以年以望堪保金陵故置為梁王卿宜迎接僧辯不從已而淵明至東闗注見前散騎常侍裴之横字如岳之髙弟禦之敗死僧辯大懼乃出屯姑孰遣使奏啟于淵明定君臣之禮因求以梁王為太子淵明許之自采石濟江齊師還淵明入建康望朱雀門而哭道逆者以哭對入即位以方智為太子王僧辯為大司馬陳霸先為侍中六月齊人歸郢州于梁魏師之圍江陵也齊主遣清河王岳救之至義陽江陵已陷岳因進軍臨江梁郢州刺史陸法和以州降長史王珉不從殺之齊主遣儀同三司慕容儼字恃徳清都成安人戍之儼始入州王僧辯遣侯瑱攻之奄至城下儼隨方備禦瑱等攻之不克城中食盡煮草木根葉及靴皮帶角食之堅守半歲人無異志至是淵明立命瑱還豫章齊人以地逺難守割以予梁凡梁民亦還之秋八月齊以道士為沙門齊主以佛道二教不同欲去其一集二家學者論難于前遂敇道士皆剃髪為沙門有不從者殺四人乃奉命九月梁陳霸先殺王僧辯廢淵明冬十月復立方智稱藩于齊王僧辯之納淵明也陳霸先遣使争之不從霸先歎曰武帝子孫甚多唯孝元是年四月追諡廟號世祖能復讐雪恥其子何罪而忽廢之吾與王公並處託孤之地而王公一旦改圖外依戎狄援立非次其志欲何為乎乃密謀襲建康會有告齊師至者僧辯遣人告霸先使為備霸先部分將士使徐度侯安都等水陸俱進人皆以為將禦齊師不之怪也至石頭安都先帥衆踰北城而入霸先軍入自南門僧辯方視事外白有兵俄而兵自内出僧辯與子頠帥左右苦戰敗走就執霸先曰我有何辜公欲與齊賜討而乃無備如此僧辯曰委公北門何謂無備霸先殺之既而竟無齊兵淵明遜位就邸十月方智即皇帝位告齊以僧辯隂圖簒逆仍請稱藩于齊封淵明為建安公梁陳霸先自為尚書令都督中外諸軍事梁吴興太守杜龕叛梁遣陳倩霸先兄道譚子即陳文帝討之杜龕素恃王僧辯之勢不禮于陳霸先龕僧辯之壻霸先深怨之及僧辯死龕據吴興以拒霸先義興太守亦載字徳基叡之孫以郡應之僧辯弟僧智為吴郡太守亦據城拒守先是霸先將圖僧辯密遣兄子蒨還長城晉縣五代吴越改長興今屬湖州府立柵以備龕及是蒨至長城收兵纔數百人龕遣其將杜泰攻之數旬不克而退霸先使周文育攻義興不利自表東討至義興拔其水柵以書諭韋載載降霸先還建康使周文育討杜龕裴忌字無畏聞喜人攻吴郡忌輕行夜至城下皷譟薄之僧智奔吴興忌入據郡明年蒨克吴興獲龕殺之龕勇而無謀嗜酒常醉其將杜泰隂與蒨等通説龕使降龕然之其妻王氏曰讐隙如此豈復可和周出私財賞募復擊蒨等破之既而泰出降龕尚醉未覺遂見殺王氏截髪出家僧智及弟僧愔奔齊梁譙今滁州秦今六合縣刺史徐嗣徽南豫州刺史任約襲建康不克入于石頭以叛齊遣兵援之敗還嗣徽約奔齊徐嗣徽從弟嗣先王僧辯之甥也僧辯死亡就嗣徽嗣徽以州入于齊㑹陳霸先東討義興嗣徽密結任約將兵乗虚襲建康據石頭游騎至闕下時侯安都杜稜字雄盛錢塘人居守安都閉門示弱下令城中登陴窺賊者斬及夕嗣徽等還安都夜為戰備將旦嗣徽等又至安都出戰大破之嗣徽等奔還石頭霸先卷甲還自義興引韋載與共謀議十一月齊遣兵渡江據姑孰以應嗣徽又遣兵渡糧馬入石頭城霸先用韋載計霸先問計于載載曰齊若分兵先據三吴之路畧地束境則時事去矣今可急于淮南築城以通東道轉輸分兵絶彼糧路使進無所資則齊將之首旬日可致霸先從之淮南秦淮之地也秦淮源出凓水縣西北流貫江寜府城又西北入大江秦時所鑿故名使侯安都夜燒齊船千餘艘周鐵虎斷齊運輸仍遣載于大航築壘使杜稜守之齊人亦立柵與相拒使都督蕭軌北齊書蕭軌事行史闕其傳將兵屯江北十二月霸先帥諸軍攻嗣徽柵齊將栁達摩等渡淮置陳霸先疾戰燒柵齊兵大敗溺死者以千數嗣徽與任約引齊兵頓浦口此秦淮之口非江北浦口也霸先遣侯安都襲破之嗣徽等單舸脱走霸先攻石頭城中無水達摩請和且求質子時建康虚弱糧運不繼乃與齊和以霸先從子曇朗及永嘉王莊方等之子等為質而與齊盟嗣徽約皆奔齊齊失亡馬仗船米不可勝計齊王乃誅栁逹摩齊主殺其清河王岳初齊平秦王髙歸彦字仁英髙祖族弟幼孤髙祖令清河王岳養之情禮甚薄歸彦心銜之岳屢將兵立功有威名而性豪侈好酒色起第城南歸彦譖之言其僭擬齊主惡之齊主納倡婦薛氏有寵既而知其嘗與岳通益怒使歸彦鴆岳殺之久之齊主無故斬薛氏藏首于懷出東山宴飲勸酬始合忽出其首投于枰上一座大驚復命收取對之流涕載尸以出被髪步哭而隨之魏降其宗室王者為公突厥滅柔然可汗鄧叔于奔魏突厥取而殺之突厥木杆可汗撃柔然滅之柔然主鄧叔子收其餘燼奔魏時木杆西破嚈噠注見前東走契丹北幷契骨胡三省注即唐之結骨唐書黠戛斯古堅昆國或曰結骨威服塞外其地東自遼海西至西海即靑海長萬里南自漠北五六千里皆屬焉木杆恃其疆請盡誅鄧叔子等于魏宇文泰收叔子以下三千餘人付其使者盡殺之于青門外長安東南霸城門民見門色青因曰青門即漢召平種𤓰處丙梁太平元年魏㳟帝三年齊天保七年改綱目以後子梁為北朝附庸歲首不書年號唯嗣位元乃書今依之春正月魏初建六官以宇文泰為大冡宰初宇文泰以漢魏官繁令蘇綽及尚書令盧辯字景先同兄子依周禮定六官至是行之以泰為太師大冡宰李弼為太傅大司徒趙貴為太保大宗伯獨孤信為太司馬于謹為大司寇侯莫陳崇為大司空自餘百官皆倣周禮梁遣兵擊侯瑱于湓城江州刺史侯瑱本事王僧辯擁兵據豫章及江州不附陳霸先霸先使周文育將兵撃湓城又遣侯安都周鐵虎立柵于梁山以備之已而瑱為王琳將侯平所敗霸先使記室蔡景歴説瑱令降瑱乃詣闗歸羅霸先以為司空蔡景歴字茂世濟陽考城人三月齊儀同三司蕭軌侵梁次于蕪湖齊遣蕭軌等與任約徐嗣徽合兵十萬侵梁出柵口柵江之口注見前向梁山即天門山注亦見前陳霸先帳内盪主主勇士以突盪敵人者黄叢逆撃破之齊師退保蕪湖夏五月梁建安公淵明卒六月陳霸先及齊師戰敗之殺蕭軌及徐嗣徽齊人召建安公淵明詐許退師陳霸先具舟送之㑹其病卒齊兵遂至秣陵陳霸先令周文育與徐度杜稜禦之齊人跨淮立橋柵度兵自方山注見前進及兒塘在上元縣東南建康震駭霸先拒嗣徽等于白城即白下城注見前適與文育㑹將戰風急霸先曰兵不逆風文育曰事急矣何用古法抽槊上馬先進衆軍從之風亦尋轉安都帥十二騎突嗣徽陳破之六月齊兵至幕府山在江寜府西北輿地紀勝晉元帝渡江王導建幕府其上因名霸先遣别將撃其糧運盡獲之齊兵殺馬驢以食轉至元武湖注見前西北連日大雨平地水大餘晝夜坐立泥中懸鬲以爨而臺中及潮溝在上元縣西吴時鑿引潮以扺秦淮故名北路燥梁軍每得番易然四方糧運不至士卒皆饑疲㑹陳蒨饋米三千斛鴨千頭霸先命炊米煮鴨裹以荷葉未明蓐食出幕府山與吳明徹等首尾齊舉縱兵大戰侯安都自白下引兵横出其後齊師大潰死者不可勝計擒徐嗣徽斬以狥追奔至于臨沂晉僑置屬南琅邪郡故城在今句容縣北諸軍相次克㨗虜蕭軌等斬之齊軍士縛荻筏以濟溺死甚衆唯任約王僧愔得免梁軍士以賞俘貿酒一人裁得一醉齊人聞蕭軌等被殺亦殺陳曇朗梁王琳遣使奉表于魏于齊侯平頻破後梁軍以王琳兵威不振不受指麾琳遣將討之平收其衆奔江州侯瑱與結為兄弟琳軍勢益衰遣使奉表于齊江陵之陷琳妻子没于魏琳又獻欵于魏以求之亦稱臣于梁齊大治宫室齊發丁匠三十餘萬修廣三臺宫殿齊主之初立也留心政術内外肅然軍國檅策獨决懐抱毎臨行陣親當矢石所向有功數年之後漸以功業自矜遂嗜酒滛佚肆行狂暴袒露形體銜坐巷宿髙氏婦女不問親疎往往亂之或以賜左右不從者手刃之作大長鋸剉䧺之屬陳之于庭每醉輒手殺人以為戲樂楊愔乃簡死囚置仗内謂之供御囚齊主欲死人輙執以應命三月不殺則宥之開府㕘軍裴謂之上書極諫齊主謂楊愔曰此愚人何敢如是對曰彼欲陛下殺之以成名于後世齊主曰我且不殺爾焉得名一日泣謂羣臣曰黒獺不受我命奈何都督劉桃枝曰臣得三千騎請擒之以来齊主壯之賜帛千匹趙道徳進曰桃枝妄言應誅陛下奈何濫賞齊主即回絹賜之典御丞李集面諫比之傑紂齊王令縳置流中久之引出謂曰吾何如傑紂集曰彌不及矣又令沉之引出更問如此數四集對如初齊主大笑曰天下有如此癡人方知龍逢比干未是後物遂釋之頃之入見似有所諫竟斬之由此内外憯憯各懐怨毎而能委政楊愔總攝機衡百度修敕是以主昏于上政清于下秋七月梁陳霸先自為司徒揚州刺史進爵長城公九月梁陳霸先自為丞相録尚書事魏及突厥襲吐谷渾敗之突厥木杆可汗假道于涼州以襲吐谷渾魏宇文泰使涼州刺史史寜字永和建康袁氏人帥騎隨之吐谷渾奔南山木杆將追之寜曰樹敦吐谷渾所敗故城在今西寜府遷外曼頭山北賀真與樹敦相近二城吐谷渾之巢穴也拔其本根餘衆自敗木杆從之與寜分道破二城復與會于青海注見前歎寜勇决贈遺甚厚明年吐谷渾寇涼鄯河三州秦州都督遣渭州刺史于翼赴援翼曰攻取非夷俗所長寇来不過抄掠耳掠無所獲勢將自走數日問至果如其言冬十月魏太師大冡宰安定公宇文泰卒書法與髙歡同例説見前世子覺泰第三子後代魏為周愍帝嗣泰北巡度河還至牽屯山即雞頭山注見前而病驛召中山公䕶至涇州謂曰吾諸子皆幼外寇方彊天下之事屬之于汝宜努力以成吾志遂卒泰能駕馭英豪得其力用性好質素不尚虚餙明達政事崇僑好古凡所施設皆倣三代而為之及卒諡曰文公世子覺嗣位時年十五為太師柱國大冡宰安定公出鎮同州䕶名位素卑及是輔政羣公莫服䕶問計于大司寇于謹曰今日之事謹必以死争之若對衆定策公必不得讓矣明日會議謹曰昔帝室傾危非安定公無復今日一旦違世嗣子雖幼中山公親其兄子兼受顧託軍國之事理須歸之辭色抗厲衆皆悚動謹素與泰等夷䕶常拜之至是謹起再拜羣公亦拜于是衆議始定同州西魏置今為府屬陜西胡三省曰宇文泰由也輔政常居此以其地扼闕河齊人後軼所心齊併省州縣齊主詔以魏末豪傑糾合鄉部因縁請託各立州郡公私煩費丁口減于疇日守令倍于昔時于是併省三州一百五十三郡五百八十九縣三鎮三十六戍十二月魏宇文覺自為周公齊築長城先是齊自黄櫨嶺在今汾州府永寜州西北起長城北至社平戍在今朔平府左雲縣廢武州境四百餘里置三十六戍事在天保三年已而發民一百八十萬自幽州夏口胡三省注夏當作下即居庸下口也居庸注見前西州恒州注見前築長城九百餘里在天保六年至是復自西河總秦戍在今大同府西北與陜西延安府界築長城東至于海前後所築東西凡三千餘里率十里一戍其要害置州鎮凡二十五所明年又于長城内築重城四百餘里丁梁太平二年魏恭帝四年齊天保八年陳高祖武帝丑陳霸先永定元年周孝愍帝宇文覺元年九月以後世宗明帝毓元年是歲梁魏皆亡陳周代并齊三大國後梁一小國凡四國春正月周宇文覺稱天王是為愍帝廢魏主為宋公宇文䕶自為大司馬魏自太祖道武帝建元至孝武帝入闗凡十三主一百五十年而分為東西魏西魏自孝武後至恭帝亡又三主合二十二年東魏孝静帝一主在位十七年先亡魏宇文䕶以周公覺幼弱欲早使正位以定人心以魏主詔奉册璽禪位于周遷魏主出居大司馬府覺即天王位追尊文公為文王妣為文后封魏帝為宋公以木徳承魏水行夏之時服色尚黒以李弼為太師趙貴為太傅大冡宰獨孤信為太保大宗伯中山公䕶為大司馬周主宇文自稱天王綱目以春秋為天王乃天子之稱不得以此予之僅書王則又非實故仍書周主汪克寛以主當作王非是祀圜丘定郊廟之制周主祀圜丘自謂先世出于神農宇文氏自謂炎帝為黄帝所滅子孫遯居朔野其後有葛烏免者鮮卑奉以為主至普回遂以宇文為氏以神農配二丘始祖獻侯莫那普回子自隂山始徙遼西配南北郊文王配明堂廟號太祖仍用鄭康成義立太祖與二昭二穆為五廟禮記王制天子七廟鄭康成注此周制七者太祖及文王武王之祧與親廟四殷則六廟契及湯與二昭二穆夏則五廟無太祖禹與二昭二穆而已其有徳者别為祧廟不毁二月梁蕭勃起兵廣州次于南康今贛州府注見前陳霸先遣將軍周文育撃之獲其將歐陽頠傅泰勃為其下所殺勃起兵于廣州遣歐陽頠及其將傅泰蕭孜勃從子為將軍南江州刺史余孝頃余氏由余之後以名為氏以兵會之孝頃先據新吴因就置南江州以為刺史新吴漢縣南唐改奉新今屬南昌府陳霸先遣周文育帥諸軍進討頠出南康屯苦竹灘亦曰苦竹州在南昌府豐城縣西南泰據蹠口城在東昌府南昌縣西南孝頃在豫章據石頭此非建康之石頭乃豫章之渚口在南昌府新建縣西北水經注贛水西岸有磬石謂之石頭津步處也文育于豫章立柵分遣老弱乗故船沿流俱下燒豫章柵偽若遁去者孝頃望之大喜設備文育由間道兼行據頠及孜泰孝頃之間築城饗士頠等大駭文育遣周鐵虎等襲頠擒之文育盛陳兵甲與頠乗船而宴巡蹠城下使其徒丁法洪攻泰擒之孜孝頃退走勃軍聞之忷懼遂殺勃文育送頠泰于建康霸先與頠有舊釋之以為衡州刺史使討嶺南遂克廣州孜孝頃猶據石頭霸先遣侯安都助文育攻之孜出降孝頃逃歸己而從王琳屯臨州故城明年兵敗擒送建康為臨川吴郡齊廢故曰故城隋于此置撫州今府屬江西周宇文䕶殺冡宰趙貴大宗伯獨孤信周楚公趙貴衛公獨孤信故皆與太祖等夷及晉公䕶専政皆怏怏不服貴謀殺䕶信止之䕶聞之遂殺貴免信官自為大冡宰未幾復殺信周宇文䕶弑宋公夏六月梁陳霸先遣兵撃王琳于郢城先是陳霸先徵王琳為司空琳不就徵大治舟艦將攻霸先霸先遣侯安都周文育將舟師㑹武昌以撃之齊大蝗河南北大蝗齊主以問魏郡丞崔叔瓚季舒之兄對曰五行志土功不時蝗虫為災今外築長城内興三臺殆以此乎齊主大怒使左右毆之擢其髮以溷沃之曳足以出秋八月周人歸故梁主繹之喪于王琳琳請之也後四年琳敗奔齊陳人始𦵏之九月梁陳霸先自為相國封陳公加九錫周宇文䕶弑其君覺及其柱國李逺而立寜都公毓小名統萬突太祖長子是為明帝周主覺性剛果見宇文䕶執政深惡之司會周官大冡宰屬後周為中大夫李植逺之子軍司馬周官大司馬屬後周為中大夫孫恒以先朝佐命入左右亦疾䕶之専乃與宫伯周官掌王宫後周亦為中大夫乙弗伐北複姓鳯賀拔提潛謀請周主誅䕶周主然之植等又引宫伯張光洛同謀光洛以告䕶䕶乃出植恒于外鳯等益懼更請周主召羣公入讌因執䕶誅之光洛又以告䕶時領軍尉遲剛字婆羅迥之弟總統禁兵䕶召之共謀廢立因遣入宫執鳯等罷散宿衛兵周主方悟獨在内殿令宫人執兵自守䕶遣柱國賀蘭祥其先為賀蘭莫何弗因以為氏祥字盛樂武川人逼周主遜位幽于舊第召公卿議廢周主為畧陽公迎立岐州刺史寜都公毓鳯恒等皆被殺時李植父柱國逺鎮𢎞農䕶召逺及植還朝既至植自陳初無此謀䕶令畧陽公與相質植辭窮乃曰本為此謀欲安社稷利至尊耳今日至此何事云云于是䕶乃害植并逼逺令自殺尋弑畧陽公黜其后元氏為尼寜都公至自岐州即天王位後䕶誅追諡略陽公為孝愍皇帝冬十月梁陳霸先自進爵為王遂稱皇帝是為武帝廢梁主為江隂王梁自武帝代齊至敬帝亡凡四主合五十五年梁主禪位于陳陳王使中書舍人劉師知沛國相人引將軍沈恪字子恭武康人勒兵入宫衛送梁主如别宫恪排闥見王叩頭謝曰恪經事蕭氏今日不忍見此分受死耳决不奉命王嘉其意更以王僧志代之王遂即位于南郊奉梁主為江隂王陳以蔡景歴為中書通事舍人是時政事皆由中書省置二十一局各當尚書諸曺總國機要尚書唯聽受而已陳主祠蔣帝廟注見前梁王琳及陳人戰敗之獲其將周文育侯安都遂克江州侯安都至武昌王琳將樊猛棄城走周文育自豫章會之安都聞陳主受禪歎曰今兹必敗戰無名矣時兩將俱行不相統攝部下交争稍不相平軍至郢州圍之未克而王琳至安都乃悉衆詣沌口在漢陽府漢陽縣西南水經注沌水逕沌陽縣南注于江謂之沌口沌枉兖反合戰大敗安都文育及禆將周鐵虎程靈洗皆被擒鐵虎辭氣不屈琳殺之囚安都等總以長鎖繋之移湘州軍府就郢城遣樊猛襲據江州陳以蕭乾字思惕齊豫章王嶷之孫為建安吴郡今福建建寕府是太守時熊曇朗在南昌曇朗南昌人世為郡著姓侯景之亂聚衆據豐城為柵梁元帝以為巴山太守江陵陷曇朗兵力浸彊紹泰末領豫章太守豐城晉縣今屬南昌府巴山梁郡隋廢故城在今撫州府崇仁縣周迪在臨川迪臨川南城人侯景之亂迪宗人續起兵臨川尋為其部將所殺迪勇冠軍中遂推為主紹泰末授臨川内史留異在東陽侯景之陷會稽以異為東陽太守及景平王僧辯使異慰勞東陽異糾合鄉閭保據巖阻其徒日盛江陵陷僧辯以異仍守東陽紹泰末封永興縣侯陳寳應在晉安寳應晉安侯官人父羽為郡雄豪侯景之亂梁晉安太守蕭雲以郡讓羽羽令寳應典兵士衆彊盛侯景平元帝以羽為晉安大守紹泰元年羽求傳郡于寳應許之福晉安晉郡今福建州府是往往立砦以自保陳主患之使侍郎蕭乾諭以禍福豪帥皆降即以乾為建安太守已而曇朗據新淦以應王琳迪攻之曇朗敗走為村民所殺迪後進號南安將軍陳徵之令出鎮湓城不至隂與留異相結寳應亦潜與異合于是陳遣兵討迪異迪衆潰異戰敗俱奔晉安陳遂進軍討寳應破之擒寳應并異送建康㐲誅迪竄山谷間久之潜出臨川太守駱牙誘而斬之傳首京師初會稽虞寄流寓閩中依寳應常從容諭以順逆寳應輒引他語亂之及迪異奔晉安寄復以書切諫寳應不從後寳應敗謂其子曰早從虞公言不至今日縣新淦漢縣故城在今江西臨江府清江縣今新淦隋開皇中徙置駱牙字旗門臨安人虞寄字次安會稽餘姚人周以令狐整字延保敦煌人為豐州梁置興州後周為豐州隋改為均州今州屬襄陽府刺史初梁興州刺史席固字子堅安定人居襄陽以州降魏魏以為豐州刺史久之固不遵北方制度周人密欲代之乃以司憲中大夫後周置貳秩官以左右刑罰令狐整權鎮豐州整傾身撫接人情遂洽于是除整刺史徙固湖州西魏置故城在今南陽府唐縣整遷州于武當漢縣明省故城在今均州旬日之間府城周備遷者如歸固曲部多願留為整左右整諭以朝制弗許莫不流涕而去十二月齊主幽其弟永安王浚字定樂髙祖第三子上黨王渙字敬夀髙祖第七子于地牢初齊有術士言亡髙者黒衣齊主因問左右何物最黒對曰無過于漆齊主以上黨王渙于兄弟第七執之渙殺使者而逃為人所獲送鄴齊主又與永安王浚有舊怨齊主少雌懦與浚皆見世宗有時洟出浚責左右曰何不為二兄拭鼻因深銜之及即位浚為青州刺史聰明矜恕吏民悦之浚以齊主嗜酒敗徳欲乗驛至鄴面諌或密以白齊主齊主益銜之已浚入朝從幸東山齊主裸裎為樂浚進諌曰此非人主所宜又于屏處召楊愔譏其不諌時齊主不欲大臣與諸王交通愔懼奏之齊主大怒浚尋還州又上書切諫詔徵浚浚懼禍謝疾不至齊主遣馳驛収之老幼泣送者數千人至鄴與上黨王渙皆盛以鐵籠置于地牢飲食溲穢共在一所後齊主如北城因視浚渙于地牢臨穴謳歌令浚渙和之浚渙悲怖聲顫齊主愴然泣下將赦之長廣王湛素與浚不睦進曰猛虎安可出穴齊主黙然使左右刺之浚渙號哭呼天乃燒殺之逺近痛憤長廣王湛髙祖第九子後為武成帝戊陳永定二年周明帝寅二年齊天保九年春正月梁王琳伐陳次于白水乞師于齊王琳引兵十萬下至湓城屯于白水浦今曰白水港在九江府徳化縣西以魯悉達為將軍陳主亦以悉逹為將軍各送鼓吹女樂悉逹兩受之而無所就琳不敢下乃遣使求援于齊且請納永嘉王莊前質于齊以主梁祀琳在白水周文育侯安都賂守者逃歸陳主遣尚書謝哲往諭琳琳請還湘州陳軍亦還已而魯悉逹部將引齊兵入北江州悉達遂奔陳州謝哲字穎豫朏之子北江注見前周宇文䕶自為太師二月齊北豫州刺史司馬消難字道融子如之子叛入于周消難以齊主昏虐滋甚隂為自全之計曲意撫循所部上黨王渙之亡也鄴中大擾疑其赴成臯御史中丞畢義雲遣御史詣北豫州先禁消難典籖家客等消難懼密請降于周周遣柱國達奚武大將軍楊忠帥騎士迎之武等從間道馳入齊境三遣使消難皆不報武疑有變欲還忠曰有進死無退生獨以千騎夜趣城下城四面峭絶但聞擊拆聲武親至麾數百騎西去忠勒餘騎不動俟門開而入馳遣召武武以消難及其屬先歸忠以三十騎為殿至洛南皆觧鞍而卧齊衆来追至洛北忠謂將士曰今在死地賊必不敢渡水已而果然乃徐引還武歎曰奚達武自謂天下健兒今日服矣齊納梁永嘉王莊于梁軍以王琳為梁丞相琳遂以莊稱帝改元天啟夏四月陳主霸先弑江隂王諡曰梁敬帝五月陳主捨身干大莊嚴寺冬齊以常山王演髙祖第六子即孝昭帝録尚書事初常山王演以齊主沈湎憂憤形于顔色齊主覺之謂曰但令汝在我何為不縱樂演雖啼泣拜伏竟無所言齊主亦大悲抵盃于地曰自今敢進酒者斬未幾沈湎益甚演又密撰事條將諫其友王友也諸王宫僚有師有友王晞字叔朗北海劇人以為不可演不從因間極言齊主大怒召演于前以刀鐶擬脇求演之過不得乃釋之及演録尚書事除官者皆詣演謝去必辭晞言于演曰受爵天朝拜恩私第自古以為不可宜一切約絶演從之久之演從容謂晞曰主上起居不恒吾豈可以前逢一怒遂爾結舌卿宜為撰諌章吾當伺便極諌晞遂條十餘事以呈因謂演曰今朝廷所恃唯殿下乃欲學匹夫耿介輕一朝之命一旦禍至奈家業何演欷歔不自勝即焚之後復乗間苦諌齊主使力士亂捶之㑹醉得觧齊主䙝黷之遊遍于宗戚唯至常山之第則不適而去太子殷自幼温裕開朗甚有美名齊主以其不似已欲廢之使手刃囚太子惻然不斷其首齊主大怒親以馬鞭撞之太子由是氣悸語吃精神昏擾齊主因酣宴屢云太子性懦社稷事重終當傳位常山太子少傅魏収謂楊愔曰太子國之根本不可動摇此言非所以為戲愔白収言齊主乃止齊主既殘忍有司莫不嚴酷或燒犁耳使囚立其上或燒車釭使以臂貫之惟郎中蘇瓊所至皆以寛平為治有人告反者事或付瓊多得申雪强蘇瓊字珍之武人齊減百官禄齊主北築長城南助蕭莊士馬死者以數十萬計重以修築臺殿賜與無節府藏之積不足以供乃減百官禄撤軍人常廩併省州郡縣鎮戍之職以節費用焉十二月陳髙涼太守馮寳卒時海隅擾亂寳妻洗氏懐集部落數州宴然其子僕生九年是歲遣帥諸酋長入朝詔以為陽春守梁置陽春郡隋改為縣今屬廣東肇慶府巳陳永定三年周武成夘元年齊天保十年春正月周主始親政宇文䕶上表歸政周主始親萬機軍旅之事䕶猶總之是月周改都督為總管夏四月齊主殺其膠州刺史杜弼閏月復殺其僕射髙徳政齊主之為魏相也弼為長史齊主將受禪弼諌止之僕射高徳政用事弼又不為之下徳政數短之齊主因飲酒遣使斬弼既而悔之驛追不及徳政以齊主酣飲數彊諌齊主不悦謂左右曰高徳政恒以精神陵逼人徳政懼稱疾楊愔素忌徳政因謂齊主曰若用徳政為冀州病當自差從之徳政即起齊主大怒殺之先是崔暹卒齊主親往哭謂其妻曰頗思暹乎對曰思之齊主曰然則往省之乃手斬其妻擲首墻外五月丙辰朔日食六月霖雨周以霖雨詔羣臣極諌左光禄大夫樂遜字遵賢河東猗氏人上言時宜其尤切于政要者凡四事其一以為比来守令代歸期促責其成效専務威猛今闗東之民淪陷塗炭若不布政優優何以使彼勞民歸就樂土其二以為頃者魏都洛陽一時殷盛貴勢競為侈靡終使禍亂交興比来朝貴器服稍華百工造作務盡竒巧臣誠恐物逐好移有損政俗其三以為選曺補擬宜與衆共衆心明白然後呈奏其四以為高洋據有山東未易猝制譬猶碁刼相持争行先後若一行不當或成彼利誠應捨小營大先保封域不宜貪利邉陲輕為興動周主賜處士韋夐字敬逺孝寛兄號逍遥公徵魏將軍寇儁字祖儁上谷昌平人入見夐志尚夷簡魏周之際十徵不屈太祖重之不奪其志周主禮敬尤厚號曰逍遥公晉公䕶延之至第訪以政事夐仰視歎曰酣酒嗜音峻宇雕墻有一于此未或不亡䕶不悦驃騎大將軍開府儀同三司寇儁少有學行家人嘗賣物多得絹五匹儁知之曰得財失行吾所不取訪主還之敦睦宗族與同豐約教訓子孫必先禮義自大統中稱老疾不朝謁周主欲見之儁不得已入見周主引與同席問以舊事以御輿送之陳主霸先殂兄子臨川王蒨立是為文帝先是陳主詔臨川王蒨築城于南皖即皖口鎮皖水入江之口也在今安慶府懐寜縣西及是陳主以疾殂陳主臨戎制勝英謀獨運而為政務崇寛簡非軍旅急務不輕調發性儉素常膳不過數品私宴用瓦器蚌盤殽核充事而已後宫無金翠之餙不設女樂時子昌字敬業姪頊始興王道譚次子即宣帝皆江陵之陷没于長安内無嫡嗣外有彊敵宿將在外朝無重臣唯中領軍杜稜典宿衛兵章皇后召稜及中書侍郎蔡景歴入禁中定議急召臨川王蒨于南皖侯安都軍還適至遂與王俱還至建康羣臣奉王嗣位王謙讓不敢當后以昌故未肯下令羣臣猶豫不能决安都曰今四方未定何暇及逺臨川王有大功于天下今日之事後應者斬即按劍上殿曰皇后出璽是日蒨即位諡陳主曰武皇帝廟號髙祖𦵏萬安陵以侯瑱為太尉安都為司空秋八月周主始稱皇帝周御正中大夫崔猷字宣猷挺之孫建議以為聖人沿革因時制宜今天子稱王不足以威天下請遵秦漢舊制稱皇帝建年號從之冬十月齊主洋殂太子殷立是為廢帝齊主嗜酒成疾自知不能久謂李后曰人生必有死何足致惜但憐正道尚幼人將奪之耳又謂常山王演曰奪則任汝慎勿殺也召尚書令楊愔領軍平秦王歸彦侍中燕子獻字季則廣漢下洛人侍郎鄭頥字子黙彭城人受遺詔輔政十月殂于晉陽諡文宣皇帝廟號髙祖後改顯祖𦵏武寜陵羣臣無下泣者唯楊愔涕泗嗚咽太子殷即位詔諸雜作一切停罷庚陳世祖文帝蒨天嘉元年周武成二年齊辰主殷乾明元年肅宗孝昭帝演皇建元年春二月梁丞相琳伐陳敗績與梁主莊皆奔齊王琳聞陳髙祖殂乃以孫㻛字徳璉吴人為郢州刺史總留任奉梁主莊出屯濡須口齊行臺慕容儼帥衆臨江為之聲援琳攻大雷陳遣侯瑱侯安都及徐度將兵禦之吴明徹夜襲湓城琳遣兵撃敗之因引兵東下二月琳至柵口侯瑱出屯蕪湖相持百餘日周人聞琳東下遣荆州刺史史寜將兵數萬乗虚襲郢州孫㻛嬰城自守琳恐衆潰乃帥舟師去蕪湖十里而泊齊軍屯于西岸軍勢盛甚時西南風急琳引兵直趣建康瑱等徐躡其後風反為瑱用琳擲火炬皆反燒其船瑱發拍拍竿也以拍敵船撃艦以牛皮冐蒙衝小船觸之琳軍大敗齊軍自相蹂踐陳軍乗之斬獲萬計琳走奔齊梁主莊左右皆散獨侍中袁泌字文洋昻之子以輕舟送莊達于齊境拜辭而還遂奔陳御史中丞劉仲威之遴之子奉莊奔齊樊猛及其兄毅字智烈帥部曲降陳孫㻛固守郢州周人圍之不能克及琳敗周人聞陳師將至乃觧圍去㻛集將佐謂曰吾與王公同奬梁室勤已至矣時事如此豈非天乎遂以州降陳齊太傅常山王演殺尚書令楊愔等自為丞相都督中外諸軍事齊顯祖之喪常山王演居禁中䕶喪事婁太后欲立之而不果齊主殷立演乃居東館事皆咨決楊愔等以演與長廣王湛位地親逼恐不利于嗣主忌之居頃之演出歸第自是詔敕多不闗預齊主將發晉陽時議謂演必留守本根楊愔疑之使與長廣王湛俱從還鄴外朝駭愕先是領軍將軍可朱渾天和元之子每曰若不誅二王少主無自安之理及是燕子獻謀處婁太后于北宫使歸政李太后楊愔又以爵賞多濫悉加澄汰由是失職之徒歸心二王平秦王歸彦初與楊燕同心既而中變歸彦總知禁衛愔留從駕兵五千于西中不闗白歸彦歸彦由是怨愔盡以其謀告二王侍中宋欽道廣平人弁之孫向侍東宫面奏齊主曰二王權重宜速去之齊主不許愔等乃奏李太后出二王為刺史宫人李昌儀即高仲密之妻也李太后以啟示之昌儀密啟婁太后愔等又議不可令二王俱出乃奏以湛鎮晉陽演録尚書事二王拜職于尚書省大會百僚愔等將赴之鄭頥止之愔不聽湛伏家僮數十人干後室及宴與賀拔仁斛律金等于坐執愔及天和欽道子獻歐之愔大言曰諸王反逆欲殺忠良邪尊天子削諸侯赤心奉國何罪之有使人執頥頥曰不用智者言至此命也二王與歸彦等擁愔等突入雲龍門至昭陽殿婁太后出坐殿上李太后及齊主側立演叩頭曰臣與陛下骨肉至親楊遵彦等欲獨擅朝權威福自己若不早圖必為宗社之害臣與湛等已共執之未敢刑戮専輒之罪誠當萬死時衞士二千餘人皆被甲待詔武衛􅨩永樂武力絶倫素為顯祖所厚叩刀仰視齊主素吃訥倉猝不知所言婁太后令却仗不退又厲聲曰奴軰即今頭落乃退永樂内刀而泣婁太后乃讓齊主曰此等懐逆欲殺我二子次將及我爾何為縱之齊主不能言婁太后怒且悲曰豈可使我母子受漢老嫗斟酌李太后拜謝齊主乃曰天子亦不敢為叔惜况此漢輩但匄兒命自下殿去此屬任叔父處分遂皆斬之以中書令趙彦深代楊愔總機務演為大丞相都督中外諸軍録尚書事演遂如晉陽齊主詔軍國之政皆申晉陽禀大丞相規算陳衡陽王昌自周歸于陳陳主殺之初陳髙祖以其子昌姪頊在長安屢請于周周不遣至是乃遣昌還昌致書陳主辭甚不遜陳主召侯安都謂曰太子將至須别就一藩歸老安都曰自古豈有被代天子臣愚不敢奉詔請自迎之于是陳主遂以昌為衡陽王昌濟江安都于中流殞之以溺告安都因進爵清逺公陳遣使如周初髙祖遣毛喜字伯武陽武人從安成王頊詣江陵梁元帝以喜為侍郎沒于長安至是與昌俱還因進和親之策陳主乃使周𢎞正通好于周夏四月周宇文䕶進毒弑其君毓毓弟魯公邕太祖第四子立是為武帝周主明敏有識量宇文䕶憚之使膳部中大夫後周置屬冡宰胡三省曰唐尤禄寺之職也李安寘毒于糖䭔丸餅也䭔都回反而進之周主覺之口授遺詔五百餘言且曰朕子年幼未堪當國魯公邕朕之介弟寛仁大度海内共聞能𢎞我周家必此子也遂殂諡明皇帝廟號世宗𦵏昭陵邕即位邕初為世宗所親愛大事多與之㕘議性深沉有逺識非因顧問未嘗輙言秋八月齊常山王演廢其主殷為濟南王而自立是為孝昭帝演以王晞為司馬嘗密謂曰比諸勲貴敦迫言我違天不祥恐當有變吾欲以法繩之何如晞曰比者殿下倉猝所行非復人臣之事上下相疑何由可久殿下雖欲謙退恐墜先帝之基演曰卿勿多言晞又密以問趙彦深彦深曰我比亦驚此聲論毎欲陳聞則口噤心悸弟既發端吾亦當昧死一披肝胆因勸演演遂言于婁太后趙道徳曰相王不效周公輔成王而欲骨日相奪不畏後世謂之簒邪未幾演復啟太后以人心未定恐奄忽變生須早定名位太后從之八月下令廢齊主殷為濟南王出居别宫以常山王演入纂大統且戒之曰勿令濟南有他也演遂即位于晉陽詔封功臣禮賜耆老延訪直言褒賞死士追贈名徳齊主演識度沈敏少居臺閭明習吏事即位尢自勤勵大革顯祖之弊嘗問舍人裴澤得失對曰陛下聴明至公而頗傷細帝王之度頗為未𢎞齊主笑曰朕初臨萬幾慮不周悉故致如此但恐後又嫌疎漏耳羣臣進言皆從容受納性至孝太后不豫容色貶悴衣不觧帶食飲藥物皆手親之齊主欲以王晞為侍郎苦辭不受或勸之曰我少年以来閲要人多矣得志少時鮮不顛覆人主私恩何由可保萬一狓猖求退無地非不好作要官但思之爛熟耳陳太尉侯瑱攻湘州周遣軍司馬賀若敦代人救之江陵之陷也巴湘之地皆入于周周使梁人守之至是陳太尉侯瑱等將兵逼湘州周遣軍司馬賀若敦將歩騎救之又遣獨孤盛將水軍與敦俱進㑹秋水汎溢糧援斷絶敦恐瑱知之乃于營内多為土聚覆之以米召旁村人陽有訪問隨即遣之瑱以為實瑱又増修營壘為久留之計先是土人多乗輕船載米肉以餉瑱軍敦乃偽装餉船伏甲士于中瑱軍望見逆来争取甲士出而擒之又敦軍數有棄馬投瑱者敦乃别取一馬牽以趣船令船中逆以鞭鞭之如是再三馬畏不上然後伏兵江岸使人乗畏船馬詐降瑱軍瑱遣兵迎接馬畏船不上伏發盡殺之後實有餽餉及亡降者瑱皆拒擊之已而瑱襲破獨孤盛于楊葉洲胡三省注在湘江口盛収兵登岸築城自保是冬巴陵降陳獨孤盛將餘衆潜遁侯瑱與賀若敦相持日久明年正月敦拔軍北歸于是巴湘遂入于陳冬十一月齊以盧叔虎柔從叔為太子庶子齊主問時務于叔虎叔虎請伐周曰我彊彼弱我富彼貧其勢相懸然未能併吞者此失于不用彊富也宜立重鎮于平陽與彼蒲州相對深溝髙壘運糧積甲彼閉闗不出則蠶食其地若彼出兵則費損必多我軍士年别一代一年一更戍也榖食豐饒彼来求戰我則不應彼若退去我乗其弊與我相持農業且廢不過三年彼自破矣齊主深善之十二月陳制春夏不斷死刑齊置屯田初齊境糴貴左丞蘇珍芝建議修石鼈城名在揚州府寳應縣鄧艾所築等屯自是淮南軍防足食平州刺史嵇曄建議開督亢陂注見前置屯田歲収稻粟四十萬石北境周贍又于河内置懐義等屯湖三省注齊分河内汲郡為懐州置懐義等屯以給河南之費自是稍止轉輸之勞辛陳天嘉二年周髙祖武帝邕保定巳元年齊世祖武成帝湛太寜元年春正月周宇文䕶自加都督中外諸軍事又詔五府總于天官事無巨細皆先斷後聞齊以王琳為揚州刺史齊主使王琳出合肥召募更圖進取陳合州刺史裴景徽請為鄉導齊主使琳與盧潜將兵赴之琳沈吟不决景徽恐事泄挺身奔齊齊主以琳為驃騎開府揚州刺史鎮夀陽已而琳與潜有隙齊徵琳還鄴以潜為揚州刺史二月周以韋孝寛為勲州刺史周人以韋孝寛嘗立勲于玉壁乃置勲州于玉壁以孝寛為刺史孝寛有恩信善用間諜故齊之動静皆先知之齊境生胡數為抄掠不可誅討孝寛欲築城于險要以制之遣開府姚岳監之岳以兵少不敢前孝寛曰此城距晉州四百餘里築之十日可畢吾一日創手三日敵境始知晉州徵兵三日方集謀議之間自稽二日計其軍行二日不到我之城隍辦矣乃築之齊人果至境上疑有大軍停留不進其夜孝寛使諸村縱火齊人以為軍至収兵自固岳卒城而還三月周制十二丁兵周改八丁兵境内丁兵分為八番以八節代役為十二丁兵率歲一月役分為十二畨毎月一代夏四月丙子朔日食秋七月周更鑄錢文曰布泉一當五與五銖並行九月齊主演弑濟南王濟南王在鄴望氣者言鄴中有天子氣平秦王歸彦恐王復立勸齊主除之齊主乃使歸彦詣鄴徵濟南王至晉陽殺之初齊主之誅楊燕也許以長廣王湛為太弟既而立太子百年湛心不平及齊主徵濟南王湛方守鄴問計于散騎常侍髙元海元海曰有三策請殿下如梁孝王故事從數騎入晉陽見太后主上請去兵權不干朝政此上策也不然表請青齊刺史沈靖自居此中策也更問下策曰發言即恐族誅固逼之元海曰濟南世嫡主上奪之今集文武示以徵濟南之敇斬髙歸彦尊立濟南號令天下以順討逆此萬世一時也湛大悦然未能用髙元海髙祖從孫冬十月甲戍朔日食十一月齊主演殂弟長廣王湛立是為武成帝廢太子百年為樂陵王齊主演出畋馬驚墜地絶肋婁太后視疾問濟南所在者三齊主不對太后怒曰殺之邪不用吾言死其宜矣遂去不顧齊主乃徵湛立之又與書曰百年無罪可以樂處置之勿效前人遂殂諡孝昭皇帝𦵏文靖陵遺命至鄴湛猶疑其詐使所親先詣殯所發視使者復命乃喜馳赴晉陽即位立百年為樂陵王周遣使如陳周人許歸陳安成王頊使司㑹上士杜杲字子暉杜陵人如陳陳主遣使報之并貽以黔中地及魯山郡注俱見前十二月陳立鹽賦𣙜酤法庶子虞荔字山披寄之兄中丞孔奐字休文會稽山隂人以國用不足奏立之壬陳天嘉三年齊河清元年周保午定二年後梁世宗巋天保元年春閏二月齊以高歸彦為冀州刺史和士開字彦通清都臨漳人為黄門侍郎平秦王歸彦為肅宗所厚恃勢驕盈至是侍中髙元海等言其必為禍亂齊主亦尋其反覆之跡漸忌之以為冀州刺史齊主之為長廣王也和士開以善握槊彈琶琶有寵及即位累遷黄門侍郎高元海及中丞畢義雲黄門郎高乾和皆疾之將言其事士開乃奏元海等交納朋黨欲擅威福乾和由是被疎義雲納賂得為兗州刺史歸彦至冀州内不自安欲待齊主如晉陽秉虚入鄴事覺齊主遣段韶等討之歸彦閉城拒守已而城破擒送鄴並其子孫皆棄市陳改鑄五銖錢梁末喪亂鐵錢不行民間私用鵝眼至是改鑄五銖錢一當鵝眼之十後梁主詧殂太子巋立是為文帝後梁主安于儉素不好酒色以封疆褊隘邑居殘毁鬱鬱不得志疽發背而殂諡曰宣帝廟號中宗三月陳安成王頊自周歸于陳周遣杜杲送頊南歸陳以為中書監陳主謂杲曰家弟今䝉禮遣實周朝之恵然魯山不返亦恐未能及此杲對曰安成長安一布衣耳而陳之介弟也其價豈止一城而已哉本朝敦睦九族恕己及物上遵太祖遺㫖下思繼好之義是以遣之南歸今乃云以尋常之土易骨肉之親非使臣之所敢聞也陳主甚慚曰前言戲之耳待杲有加頊妃栁氏及子叔寳即後主猶在穰城陳主復遣毛喜如周請之周人皆歸之夏四月齊太后婁氏殂齊主不改服服緋袍登三臺置酒作樂宫女進白袍和士開請止樂齊主怒撾之齊青州言河水清齊主遣使祭之改元周始命貴臣食邑先是周之羣臣受封爵者皆未給租賦至是詔聽寄食他縣癸陳天嘉四年周保定未三年齊河清二年春正月齊以高元海為兗州刺史齊主終日酣飲朝事専委高元海又以元海庸俗輕之兖州刺史畢義雲作書與元海論時事給事中李孝貞得而奏之齊主由是疎元海以孝貞兼中書舍人徵義雲還朝和士開復譛元海齊主以馬鞭箠元海責曰汝昔教我反以弟反兄不義也以鄴城抗并州無智也出之兗州二月周頒大律周主命司憲大夫拓跋廸周令諸元從本姓事具前造大律二十五篇行之其制罪一曰杖刑自十五至五十二曰鞭刑自六十至百三曰徒刑自一年至五年四曰流刑自二千五百里至四千五百里五曰死刑磬懸而縊之絞綳而殺之斬梟懸首示衆裂車裂也凡二十五等五刑之屬各有五三月乙丑朔日食齊城軹闗在今懷慶府濟源縣西北述征記太行八陘第一曰軹闗陘齊詔司空斛律光督步騎二萬築勲掌城以通勲掌谷故名于軹闗仍築長城二百里置十二戍夏四月周主養老于太學周主將視學以太傅燕國公于謹為三老仍賜以延年杖遂幸太學謹入門周主迎謹答拜有司設席于中楹大師䕶設几謹升席南面憑几而坐大司馬豆盧寜豆盧代北複姓寜字永安徒河人正舄周主立于斧扆之前西面有司進饌周主跪設醬豆袒割謹食畢周主跪受爵以酳有司徹周主北面立而訪道謹起立于席後以對言曰木受繩則正后從諌則聖明王虚心納諫以知得失天下乃安又曰去食去兵信不可去願陛下守信勿失又曰有功必賞有罪必罸則為善者曰進為惡者曰止又曰言行者立身之基願陛下三思而言九慮而行勿使有過天子之過如日月之食人莫不知願陛下慎之周主再拜受言謹答拜禮成而出六月陳殺其司空侯安都初安都鎮京口恃功驕横陳主銜之安都弗之覺嘗陪樂遊園禊飲謂陳主曰何如作臨川王時陳主曰此雖天命抑亦明公之力宴訖啟借供帳水飾明日載妻妾入宴安都坐御座賔客居羣臣位陳主惡之舍人蔡景歴希㫖稱安都謀反陳主慮其不受召故以為江州刺史安都過建康陳主與宴又集其將帥會于朝堂于坐悉収之下詔暴其罪惡明日賜死初高祖與諸將宴杜僧明周文育侯安都各稱功伐高祖曰卿等忠良將也而皆有所短杜公志大而識誾狎于下而驕于上周侯交不擇人而推心過差侯郎傲誕而無厭輕佻而肆志並非全身之道卒皆如其言曇僧明病死江州文育為能朗所殺安都至是被誅齊主殺其河南王孝瑜字正徳文襄長子齊侍中和士開有寵姦諂百端賞賜不可勝計每侍左右言辭容止極諸鄙䙝無復君臣之禮士開嘗謂齊主曰自古帝王盡為灰土堯舜桀紂竟復何異陛下宜及少壯極意為樂縱横行之一日取快可敵千年國事盡付大臣何慮不辦齊主大悦于是委趙彦深掌官爵元文遥掌財用唐邕掌外兵白建掌騎兵馮子琮胡長粲掌東宫三四日一視朝書數字而已國白建字彦舉太原陽邑人馮子琮信都人胡長粲珍從曽孫齊主使士開與胡后握槊河南王孝瑜諌曰皇后天下之母豈可與臣下接手趙郡王叡髙祖弟琛之子及士開共譖孝瑜奢僭山東唯聞有河南王不聞有陛下齊主酖殺之諸侯在宫中者莫敢舉聲唯河間王孝琬文襄第三子大哭而出秋九月周及突厥侵齊初周人欲與突厥連兵伐齊許納其女為后遣楊荐字承畧秦郡寜夷人及王慶字興慶太原祁人往結之齊人懼亦遣使求昏于突厥木杆貪齊幣重欲執荐等送齊荐知之責木杆背恩周太祖以蠕蠕降衆付突厥事具前木杆慘然良久乃許為周出師然後送女于是周遣楊忠將歩騎出北道與突厥伐齊又遣達奚武出南道期㑹于晉楊忠拔齊二十餘城突厥以十萬騎會之三道俱入時大雪平地數尺齊主自鄴倍道赴晉陽斛律光將步騎三萬屯平陽周師及突厥逼晉陽齊主欲走避之趙郡王叡河間王孝琬叩馬諌齊主命六軍進止皆取叡節度而使并州刺史段韶總之甲陳天嘉五年周保定申四年齊河清三年春正月齊主及周師戰于晉陽周師敗績齊主登北城軍容甚整突厥咎周人曰爾言齊亂故来伐之今齊人眼中亦有鐵何可當邪周人以步卒為前鋒從西山下去城二里許諸將咸欲逆撃之段韶曰步卒力勢有限今又積雪逆戰非便不如陳以待之彼勞我逸破之必矣既至齊悉其鋭兵鼓譟而出突厥震駭引上西山不肯戰周師大敗而還突厥引兵出塞比至長城馬死且盡逹奚武至平陽聞忠退亦還二月庚寅朔日食三月齊頒律令制田賦初齊顯祖命刋定齊律久而不成決獄者罕依律文相承謂之變法從事及齊主即位思革其弊乃督修者至是而成其刑名有五一曰死轘即車裂梟斬絞二曰流投邉裔為兵三曰刑自五歲至一歲四曰鞭自百至四十五曰杖自三十至十凡十五等其流内官及老小閹癡并過失應贖者皆以絹代金是後為吏者始守法令又令民十八受田輸租調二十充兵六十免力役六十六還田免租調一夫受露田注見前八十畝婦人四十畝奴婢依良人牛受六十畝牧牛一頭受田六十畝限四年大率一夫一婦調絹一匹綿八兩墾租二石義租五斗奴婢準良人之半牛調二尺墾租一斗義租五升墾租送臺義租納郡以備水旱周初令百官執笏禮記玉藻笏度二尺有六寸其中博三寸其殺六分而去一唐㑹要笏制上圓下方五品以上並用象九品以上任用竹木夏六月白虹貫日齊主殺其兄之子樂陵王百年時白虹圍日再重又横貫而不達赤星見齊主欲以百年厭之百年嘗作數敕字教書者封奏之齊主怒使召百年百年知不免割帶决留與其妃斛律氏而入齊主遣左右亂捶之氣息將盡乃斬之棄諸池池水盡赤妃把玦哀號不食月餘亦卒玦猶在手拳不可開其父光自擘之乃開秋八月丁亥朔日食九月周封李昞為唐公胡三省曰李氏有天下國號曰唐本此昞虎之子也以追録佐命元功封後昞卒子淵襲爵即唐髙祖齊人歸宇文䕶之母于周初周太祖之從賀拔岳在闗中也遣人迎䕶于晉陽䕶母閻氏及周主之姑皆留晉陽齊人以配中山宫及䕶用事遣間使入齊求之莫知音息及是周人謀與突厥再伐齊齊主懼許歸䕶母且求通好先遣其姑歸令人為䕶母作書言䕶幼時數事又寄其所著錦袍以為信騐䕶得書悲不自勝齊人復使其母與書邀䕶重報往返再三乃遣之閻氏至周舉朝稱慶周主為之大赦時段韶拒突厥軍于塞下齊主將還䕶母遣使乗傳問韶韶以周人反覆本無信義䕶名為相其實主也既為母請和不遣一介之使若據移書即送其母恐示之以弱不如且外許之待和親堅定遣之未晚齊主不聽冬十月周宇文䕶會突厥侵齊十二月齊人及䕶戰于洛陽大敗之突厥自幽州還留屯塞北更集諸部兵遣使告周欲與共撃齊如前約宇文䕶新得其母未欲伐齊又恐負突厥約更生邉患不得已徵内外諸軍凡二十萬人遣尉遲迥將前鋒趣洛陽權景宣字暉逺天水顯親人趣懸瓠楊􅋆字顯進正平髙凉人出軹闗景宣克齊二州􅋆輕敵深入為齊兵所敗遂降十一月周人攻洛陽不克䕶命諸將塹斷河陽路遏齊救兵諸將以為齊兵必不敢出唯張斥堠而已齊主遣蘭陵王長恭一名孝瓘文襄第四子及大將軍斛律光救洛陽又召并州刺史段韶督精騎繼進齊主亦自晉陽赴之韶至洛陽與諸將觀周軍形勢至太和谷即太谷注見前與周軍遇馳告諸營追集騎士結陳以待韶為左軍長恭為中軍光為右軍周人不意其至皆忷懼韶遥謂曰汝宇文䕶纔得其母遽来為寇豈欲送死邪周人以步兵上山逆戰韶且戰且却以誘之待其力弊然後下馬撃之周師大敗死者甚衆在城下者亦觧圍遁去委棄資械彌滿川澤唯齊公憲字毗賀突太祖第五子達奚武王雄字胡布頭太原人在後拒戰雄馳馬衝斛律尤陳光退走雄追之按稍不及光者丈餘欲生擒之光唯餘一矢射雄中額雄走至營而卒軍衆益懼齊公憲拊循督勵衆心小安至夜収軍憲欲待明更戰武曰洛陽軍散人情震駭若不因夜速還明日欲歸不得矣乃還䕶本無將畧是行又非本心故敗周滅宕昌置宕州治宕昌郡唐為交河戍故城在今鞏昌府岷州宕州王梁彌定屢寇周邉周討滅之一其地置宕州乙陳天嘉六年周保定五酉年齊後主緯天統元年夏四月陳侍中安成王頊免頊以帝弟之重勢輕朝野直兵鮑僧叡恃頊勢為不法御史中丞徐陵為奏彈之從南臺御史臺為南臺官屬引奏案而入陳主為斂容正坐陵進讀奏版時頊侍殿上流汗失色陵遣殿中御史引頊下殿陳主為之免頊侍中朝廷肅然彗星見齊主以湛傳位于太子緯是為後主自稱太上皇帝以祖珽為秘書監珽有文無行齊主以為中書侍郎遷散騎常侍初珽嘗為髙祖功曺因宴失金叵羅于珽髻上得之又坐詐盜官栗鞭配甲坊又嘗坐賍當絞除名顯祖愛其才復令直中書省齊主為長廣王珽言殿下有非常骨法及即位遂擢拜之珽與和士開共為姦諂私説士開曰君之寵幸振古無比宫車一日晚駕欲何以克終士開因從問計珽曰宜説主上云文㐮文宣孝昭之子俱不得立今宜令皇太子早踐大位以定君臣之分若事成中宫少主必皆徳君此萬全計也請君徵説主上令粗觧珽當自外上表論之士聞許諾㑹彗星見太史奏云除舊布新之象珽于是上書言陛下雖為天子未為極貴宜傳位東宫且以上應天道齊主從之傳之于緯以太子妃斛律氏為后于是羣公上尊號為太上皇帝軍國大事咸以聞使侍郎馮子琮左丞胡長粲輔導少主珽拜秘書監大被親寵秋七月辛巳朔日食冬十月周殺其中州周置今河南府新安縣是刺史賀若敦周以函谷闗城為通洛防猶塞也以賀若敦為中州刺史鎮之敦恃才負氣以湘州之役全軍而返謂宜受賞翻得除名對臺使出怨言宇文䕶怒徵還逼令自殺敦臨死謂其子弼曰吾志平江南今而不果汝必成吾志吾以舌死汝不可不思因引錐刺弼舌出血以誠之隋弼字輔伯後為将丙陳天康元年周天和戊元年齊天統二年春正月己卯朔日食通鑑綱日俱不書朔武今依北史帝紀秿書夏四月陳以孔奐為太子詹事陳主不豫尚書孔奐與安成王頊僕射到仲舉字徳言冾之子等入侍醫藥陳主以太子伯宗字奉業柔弱謂頊曰吾欲遵太伯之事頊拜泣固辭陳主又謂仲舉奐等曰今三方鼎峙四海事重宜須長君卿等宜遵此意孔奐流涕對曰皇太子聖徳日躋安成王足為周旦若有廢立之心臣誠不敢奉詔陳主曰古之遺直復見于卿乃以奐為太子詹事陳主蒨殂太子伯宗立是為廢帝陳主疾甚遂殂諡文皇帝廟號世祖𦵏永寜陵遺詔太子即位世祖起自艱難知民疾苦性明察儉約每夜刺閨取外事分判者前後相續敕傳更籖于殿中者必投籖于階石之上令鎗然有聲曰吾雖眠亦令驚覺外刺閨以錐薾物曰刺閨宫中小門也就閨中刺取事故曰刺閨五月陳以安成王頊為司徒録尚書事徐陵為吏部尚書陵以梁末以来選授多濫乃為書示衆曰永定之時聖朝草創白銀難得黄札薄木板也用以書詔易營權以官階代于錢絹致令員外常侍路上比肩諮議㕘軍市中無數今衣冠禮樂日富年華何可猶作舊意非理望也衆咸服之冬十二月齊始用士人為縣令魏末以来縣令多用厮役由是士流恥為之齊僕射元文遥以為縣令治民之本遂請革選密擇貴遊子弟發敇用之悉召集神武門令趙郡王叡宣㫖慰諭而遣之齊之士人為縣令自此始丁陳主伯宗光大元年周亥天和二年齊天統三年春正月癸酉朔日食二月陳安成王頊殺中書舍人劉師知又殺僕射到仲舉師知與安成王頊到仲舉同受世祖遺詔輔政師知見頊為朝野所屬忌之謀出頊于外東宫舍人殷不佞字李卿不害之弟素以名節自任馳詣相府矯敇謂頊曰今四方無事王可遷東府經理州務掦州刺史治東府頊時居尚書省故不佞令遷中記室毛喜馳語頊曰此必非太后意須更聞奏領軍將軍吴明徹亦賛之頊乃稱疾召師知與語使喜入言于太后太后曰伯宗幼弱政事並委二郎此非我意陳主亦曰此自師知等所為朕不知也喜以報頊頊因囚師知入見太后以師知付廷尉賜死以仲舉為光禄大夫不佞少有孝行頊雅重之免官而已自是國政盡歸于頊右衛將軍韓子髙會稽山隂人與仲舉通謀事未發仲舉廢心不自安子髙亦自危求出或告其謀頊召文武議立皇太子仲舉子髙入皆執之下獄賜死夏四月陳湘州刺史華皎晉陵暨陽人叛附于周皎與韓子髙俱為世祖所親任子髙死皎内不自安遣使潛引周兵又自歸于梁陳安成王頊遣吴明徹等襲之皎使至長安梁主亦上書言狀宇文䕶遣襄州總管衛公直字立羅突太祖子等帥師助皎周司會崔猷曰前歲東征死傷過半比雖循撫瘡痍未復今陳氏保境息民共敦鄰好豈可利其土地納其叛臣違盟約之信興無名之師乎䕶不從九月梁遣其柱國王操將兵二萬會之周衛公直總水陸軍與皎俱下與吴明徹戰于沌口西軍以艦載薪因風縱火俄而風轉自焚西軍大敗皎直俱奔江陵是月陳将程靈洗以舟師襲周沔州刺史裴寛拒戰靈洗擒之明年吴明徹乗勝進攻江陵以水灌之梁王操晝夜拒守撃明徹敗之陳師乃退裴寛字長寛聞喜人秋八月齊以東平王儼字仁威齊主之弟為司徒儼有寵于上皇及胡后為司徒領御史中丞魏故事中丞出與太子分路王公皆遥駐車去牛頓于地以待其過少遲則前驅以赤棒棒之白遷鄴後此儀廢絶上皇欲尊寵儼一遵舊制儼性剛决嘗言于上皇曰尊兄懦何能帥左右上皇每稱其才有廢立意胡后亦勸之既而中止儼尋徙封為琅邪王冬十一月戊戍朔日食齊流祖珽于光州魏置隋改莱州今為府屬山東珽與黄門侍郎劉逖友善珽欲求宰相乃疏僕射趙彦深元文遥及和士開罪狀令逖奏之逖不敢通彦深等聞之先詣上皇自陳上皇大怒執珽詰之珽因陳士開等朋黨㺯權賣官鬻獄事上皇曰爾乃謗我鞭配甲坊尋徙光州桎梏置地牢中夜以蕪菁子詩經疏陸璣曰葑蕪菁幽州人或謂之芥為燭眼為所熏由是失明戊陳光大二年周天和子三年齊天統四年秋七月周隨公楊忠卒忠子堅即隋文帝為小宫伯後周置宫伯之貳宇文䕶欲引以為腹心忠曰兩姑之間難為婦汝其勿往堅乃辭之至是忠卒堅襲爵楊堅始見此冬十一月壬辰朔日食陳安成王頊廢其主伯宗為臨海王而殺始興王伯茂字鬱之世祖第二子始興王伯茂以安成王頊専政不平肆惡言頊遂以太后令誣陳主云與劉師知華皎等通謀廢為臨海王以安成王入簒又下令黜伯茂為温麻晉縣隋改曰連江今屬福州府侯置諸别館使盜殺之齊主湛殂先是齊上皇有疾僕射徐之才善醫療之既愈和士開欲得次遷乃出之才為兗州刺史而代之及是上皇疾復作驛追之才未至疾亟以後事屬和士開握其手曰勿負我遂殂士開秘喪三日不發黄門侍郎馮子琮謂曰升遐之事行路皆傳久而不舉恐有後變士開乃發喪諡上皇曰武成皇帝廟號世祖𦵏永平陵世祖驕奢滛佚役繁賦重吏民苦之御批歴代通鑑輯覽卷四十五

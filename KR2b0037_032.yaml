front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷三十三晉孝宗穆皇帝戊申永和四年秋八月加桓溫征西大將軍
  hash: sha256:31cafa40a28b9758f1a455defc3ba76c3227d02fdbc3fec15f8d3f69a5a02041
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_032-1a, image: WYG0336/WYG0336-0167a.png}
body:
  text: 朝廷論平蜀之功欲以豫章郡封溫左丞荀蕤字令逺嵩之子曰溫若復平河洛將何以賞之乃加溫征西大將軍開府儀同三司封臨賀郡注見前公溫既滅蜀威名大振朝廷憚之會稽王昱以殷浩夙有盛名朝野推服乃引為心膂與參綜朝權欲以抗溫由是與溫寖相疑二浩以王羲之字逸少導從子為護軍將軍羲之以內外和協然後國家可安勸浩不宜與溫搆隙浩不從九月燕王皓卒世子俊字宣英嗣皓有疾召俊屬之曰今中原未平方資賢傑以經世務恪智勇兼濟才堪任重汝其委之陽士秋陽騖字騖北平人志行髙潔忠幹貞固可託大事汝善待之遂卒趙立子世為太子初趙太子邃驍勇趙王虎愛之謂羣臣曰司馬氏父子兄弟自相殘滅故朕得至此如朕有殺阿鐡邃小字理否未幾邃謀逆虎誅之虎荒耽酒色喜怒無常使邃省可尚書事誚責笞捶月至再三邃私謂中庶子李顔等曰官家難稱吾欲行冒頓之事卿能從我乎顔等伏不敢對邃因稱疾不視事虎使女尚書往覘邃抽劍擊之虎大怒收顔等推問顔具言其狀遂殺顔等并誅邃立子宣為太子既而宣弟韜有寵于虎宣使人殺之事覺虎復殺宣虎聞韜死哀驚氣絶久之方蘇已知為宣所殺乃囚宣殺之鄴北窮極慘酷宣少子方數歲虎素愛欲赦之大臣不聽取殺之兒挽虎衣大呌至于絶帶虎因此發病至是議立太子劉昭儀方有寵昭儀故趙主劉曜女有殊色虎嬖之乃立其子世以昭儀為后虎謂羣臣曰吾欲以純灰三斛自滌其腸何為專生惡子年踰二十輒欲殺父今世方十歲比其二十吾已老矣己酉五年趙太寧元年石鑒青龍元年燕慕容俊元年春正月趙主虎稱皇帝夏四月趙主虎卒太子世立其兄遵弒之及其太后劉氏而自立趙主虎病甚以彭城王遵虎第三子為大將軍鎮關右燕王斌勒之子為丞相張豺為鎮衛大將軍並受遺詔輔政劉后恐斌不利于太子與張豺矯詔免斌歸第尋殺之遵自幽州至鄴敕朝堂受拜遣之遵涕泣而去虎卒世即位尊劉后為皇太后劉氏臨朝稱制遵至河內聞喪會姚弋仲蒲洪及石閔虎飬子本姓冉字永曽內黃人等討梁犢還梁犢故東宫髙力督石宣既誅犢及髙力萬餘人謫戍梁州虎稱帝大赦髙力不在赦例犢遂反戍卒皆隨之比至長安衆十餘萬遂出潼關趣洛陽所向奔潰虎以弋仲為征西大將軍與洪閔等討斬之號東宫髙力石宣簡多力之士以衛東宫曰髙力置督將領之遇遵于李城在懷慶府溫縣水經注奉溝水徑李城北即此共説遵曰殿下長且賢先帝亦有意以為嗣末年惛惑為張豺所誤張豺勸虎立世今若聲豺之罪鼓行而討之其誰不開門倒戈以迎殿下者遵然之遂舉兵趣鄴以石閔為前鋒耆雋羯士皆出迎之豺惶怖亦出迎遵命執之擐甲耀兵入升前殿劈踊盡哀斬豺于市夷其族假劉氏令以遵嗣位封世為譙王廢劉氏為太妃尋皆殺之世在位三十三日以石閔為都督中外諸軍事時沛王沖鎮薊聞遵殺世起兵討遵遵遣石閔擊之獲沖賜死蒲洪遣使來降石閔言於趙主遵曰蒲洪人傑也今以鎮關中洪以討梁犢功拜雍州刺史都督雍秦諸州單事恐秦雍之地非復國家之有宜改圖之遵遂罷洪都督洪怒歸枋頭洪先為流民督帥諸氐居枋頭淇枋頭城名在今河南衛輝府濬縣水經注魏武于水口下大枋木以成堰遏其水入白溝以通漕運時人號其處曰枋頭遣使來降秋七月征討都督褚裒率師伐趙不克而還桓溫聞趙亂遣諸將經營北方趙揚州刺史王浹舉夀春降西中郎將陳逵進據之征北大將軍褚裒上表請伐趙朝議以裒事任貴重不宜深入宜先遣偏師裒執奏乃加裒征討大都督帥衆三萬徑赴彭城北方士民降者日以千計朝野皆以為中原可復獨蔡謨憂之人問其故謨曰夫能順天乘時濟羣生于艱難者非上聖與英雄不能為也其餘則莫若度德量力觀今日之事殆非時賢所及必將經營分表疲民以逞既而才略踈短不能副心財殫力竭智勇俱困恐更貽朝廷之憂矣魯郡民五百餘家起兵來附裒遣部將以鋭卒迎之與趙將李農遇敗歿陳逵毁夀春奔還裒退屯廣陵未幾還鎮京口時河北大亂遺民二十餘萬渡河欲來歸附會裒已還威勢不振皆不能自拔死亡略盡裒慙憤發病而卒詔以荀羡監徐兖軍事是時梁州刺史司馬勳帥衆出駱谷破趙戍三輔毫傑多應之勳兵少不敢進遂向南陽拔宛城殺趙太守而還司馬勳濟南王遂之曽孫九月張重華自稱涼王先是朝廷授重華涼州刺史西平公至是遂自稱王冬十一月趙石鑒虎庶子弒其主遵而自立初趙主遵之發李城也謂石閔曰努力事成以爾為太子既而立太子衍故燕王斌之子閔不平閔素驍勇屢立戰功復總內外兵權中書令孟凖勸遵誅之遵召鑒密議鑒出告閔閔遂弒遵及衍推鑒即位鑒以閔為大將軍遵在位一百八十三日秦雍流民立蒲洪為王秦雍流民相帥西歸石虎先破劉胤徙氐羌十五萬落于司冀州後破石生徙秦雍民及氐羌十餘萬户于關東今因趙亂故西歸路由枋頭共推蒲洪為主衆至十餘萬鑒懼其逼欲以計遣之乃以洪為雍州牧洪會官屬議應受與否主簿程朴請與趙連和分境而治洪怒曰吾不堪為天子耶引朴斬之庚戌六年趙主石祗永寧元年魏主冉閔永興元年舊大國一趙小國三涼燕代新大國一魏凡五僣國春閏正月趙石閔弒其主鑒而自立改國號魏先是趙主鑒隂使樂平王苞虎之子等攻石閔不克鑒懼夜殺苞將軍孫伏都劉銖等復攻閔為閔所殺閔乃以兵守鑒于御龍觀下令城中曰同心者留不同者各任所之于是趙人百里內悉入城胡羯去者填門閔知胡之不為己用遂帥趙人以誅胡羯無貴賤男女少長皆斬之死者二十餘萬其屯戍四方者皆命趙人為將帥者誅之或髙鼻多鬚濫死者半至是汝隂王琨亦虎之子起兵討閔諸將張沈張賀度等亦皆擁衆數萬不附于閔閔擊琨敗之遂擊賀度鑒密使宦者召沈乘虛襲鄴宦者以告閔閔馳還廢鑒弒之并殺虎之孫二十八人盡滅石氏鑒在位一百三日謂衆曰吾屬故晉人也請與諸君分割諸州郡奉迎天子還都洛陽何如尚書胡睦曰陛下聖德應天宜登大位晉氏衰微豈能混一四海乎閔曰尚書可謂識機知命矣乃即皇帝位國號大魏閔未弒鑒時欲滅去石氏之迹託以讖文有繼趙李改國號曰衛易鑒姓為李氏及已僣位更號其國曰魏復姓冉氏以殷浩督揚豫等州軍事朝廷聞中原大亂復謀進取故以浩為中軍將軍督揚豫徐兖青州蒲洪為征北大將軍督河北諸軍事是夏廬江太守袁真攻魏合肥克之明年鮮卑段龕以青州來降詔以為征北將軍龕蘭之子也蒲洪自稱三秦王改姓苻時姚弋仲據灄書陟反頭在今直𨽻冀州棗強縣東北元和志棗強縣外城即姚弋仲故壘蒲洪據枋頭各有西據關右之志弋仲遣其子襄字景國擊洪洪迎擊破之自稱大都督大將軍大單于三秦王以讖文有草付應王乃改姓苻氏以雷弱兒南安人梁楞安定人魚遵馮翊人段陵京兆人為將相二月燕王俊擊趙拔薊城徙都之先是慕容霸字道業皓第五子後更名垂上書于燕王俊請伐趙俊猶豫未決將軍封奕慕輿根復言之俊乃以慕容恪慕容評陽騖為三輔將軍恪為輔國評為輔弼騖為輔義謂之三輔慕容霸為前鋒都督選兵二十萬講武戒嚴為進取之計至是俊與霸及慕輿于三道並出趙守將皆走俊遂拔薊入都之中州士女降者相繼燕兵至范陽太守李産欲為趙拒燕衆莫為用乃降俊擢用之于是悉置幽州郡縣守宰遂循冀州取章武河間至渤海趙故殿中督賈堅擁衆不降慕容評與戰擒之以為樂陵太守樂范陽章武河間皆晉國趙為郡范陽治涿河間治城注俱見前章武治東平舒故城在今順天府大城縣渤海晉郡沒于趙治南皮注亦見前李産字子喬范陽人賈堅渤海人故趙將麻秋殺苻洪洪子健字建業洪第三子斬秋遣使來請命麻秋為苻洪所獲洪以為軍師將軍秋説洪先取關中然後東爭天下洪深然之既而秋因宴鴆洪欲并其衆洪世子健收秋斬之洪將死謂健曰吾所以未入關者以為中州可定今不幸為孺子所困中州非汝兄弟所能辦我死汝急入關言終而卒健代統其衆乃去王號稱晉官爵告喪請命趙石祗虎之子稱帝于襄國祗先以新興王鎮襄國冉閔既篡立趙公卿出奔者多歸之于是祗遂稱帝改元永寧六夷胡三省注胡羯氐羌段氏及巴蠻是為六夷據州郡者皆稱兵以應祗以姚弋仲為右丞相待以殊禮弋仲子襄雄勇多才略祗以為驃騎將軍又以苻健為鎮南大將軍夏魏主閔徴故散騎常侍辛謐字叔重隴西狄道人為太常謐不食而卒謐有髙名歷劉石之亂徴辟皆不就及是閔徴為太常謐移閔書以為物極則反致至則危君王宜歸身晉朝必有由夷許由伯夷之廉享松喬赤松子王子喬之夀因不食而卒冬十一月苻健入長安遣使來獻捷先是趙將王朗聞冉閔之亂自長安赴洛其司馬杜洪據長安自稱晉征北將軍關西夷夏皆應之至是苻健謀據關中乃率兵入潼關健欲取洪恐洪知之乃沿宫室于枋頭課民種麥示無西意已自稱晉征西大將軍悉衆而西以魚遵為前鋒治浮橋以濟孟津既濟焚橋自帥大衆與其弟雄俱進子苻雄字元才洪季洪遣將迎戰健敗之遂長驅至長安洪不能守奔司竹園名元和志園在盩厔縣東有監丞掌之十二月免蔡謨為庶人謨除司徒三年不就職謨謂所親曰我若為司徒將為後代所哂義不敢拜也詔書屢下終不受于是帝臨軒遣黃門侍中徴之使者十餘反稱疾不至時帝方八歲自旦至申甚倦問左右曰所召人何至今不來臨軒何時當竟太后乃詔罷朝會稽王昱等以謨違命無人臣禮請送廷尉謨懼素服自到廷尉待罪殷浩欲加以大辟荀羡曰蔡公今日事危明日必有桓文之舉浩乃止詔免謨為庶人辛亥七年秦主苻健皇始元年是歲趙亡舊大國一魏小國三涼燕代新大國一秦凡五僣國春正月苻健自稱秦天王是為前秦健長史賈元碩等請依劉備稱漢中王故事表健為都督關中諸軍事大單于秦王健怒曰吾豈堪為秦王耶且晉使未返我之官爵非汝曺所知也既而密使梁安諷元碩等上尊號遂即天王大單于位國號大秦健分遣使者問氏疾苦拽羅雋異凡趙之苛政不便于民者皆罷之夏四月趙劉顯弒其主祇而自立先是魏主閔攻襄國趙主祇遣使乞師于燕及姚弋仲弋仲遣其子襄救之弋仲誠襄曰冉閔棄仁背義屠滅石氏我當為復讐老不能自行汝才十倍于閔若不梟擒不必復來見也燕王儶亦遣兵來會閔軍大敗奔還鄴姚襄歸弋仲怒其不擒閔杖之一百已而祇遣其將劉顯攻鄴閔大破顯軍顯懼密使請降求弒祗以自效顯還遂弒祗祗在位一年而亡後趙自石勒建國至祗亡凡七主合二十三年未幾顯自稱帝明年魏克襄國殺顯遷其民于鄴趙故汝陰王琨奔建康斬之于是石氏遂絶秋八月魏徐兗荆豫洛即晉司州五州來降姚弋仲遣使來降詔以弋仲為車騎大將軍六夷大都督子襄為平北將軍督并州冬十二月桓溫移軍武昌尋復還鎮初桓溫請經略中原事久不報知朝廷仗殷浩以抗已甚忿之然素知浩之為人亦不之憚以國無他釁遂得相持彌年雖有君臣之迹羈縻而已八州士衆資調殆不為國家用屢求北伐不聽至是拜表輒行帥衆四五萬順流而下軍于武昌朝廷大懼浩欲去位以避溫吏部尚書王彪之字叔武彬之子言于會稽王昱曰若浩去職人情離駭必有任其責者非殿下而誰乎又謂浩曰彼若抗表問罪卿為之首欲作匹夫豈有全地邪且當靜以待之令相王謂會稽王手書為陳成敗彼必旋師若不從則遣中詔又不從乃當以正義相裁奈何無故匆匆先自猖獗乎撫軍司馬髙嵩字茂璞廣陵人乃為昱草書曰冦難宜平時會宜接能𢎞斯會駭非足下而誰然異常之舉衆之所遊聲想足下亦少聞之茍或望風震擾一時崩散則望實並喪社稷之事去矣吾與足下雖職有內外安社稷保國家其致一也天下安危繫之明德當先寧國而後圖其外區區誠懷豈可顧嫌而不盡哉溫即上疏惶恐致謝回軍還鎮壬子八年燕主慕容俊元璽元年是嵗魏亡大國二燕秦小國二涼代凡四僭國春正月辛卯朔日食秦王健稱皇帝健以單于統臺百蠻非天子所宜領以授太子萇二月殷浩使督統謝尚荀羡進屯夀春張遇據許昌叛降于秦尚書左丞孔嚴字彭祖愈從子謂浩曰韓彭専征伐蕭曺守管籥君宜思廉藺屈身之誼平勃交歡之謀令穆然無間然後可以保大定功浩不從上疏請北出許洛使尚羡進屯夀春張遇者故魏將以州來降七年八月遇以許昌降尚等不能撫慰遇仍據許昌叛降于秦浩軍不能進命羡鎮下邳三月姚弋仲卒子襄率衆來歸詔屯譙城此漢譙縣故城也今賴州府亳州是考譙有三一在河南夏邑祖逖所據一在江南滁州晉僑置曰南譙梁又曰北譙一即此弋仲有子四十二人臨卒謂諸子曰石氏待吾厚本欲為之盡力今已滅矣汝亟歸于晉當執臣節無為不義也及卒襄與秦兵戰敗遂帥衆來歸單騎見謝尚尚聞其名命去仗衛幅巾見之歡若平生襄博學善談論江東人士皆重之夏四月燕慕容恪等擊魏大破之執其主閔以歸殺之燕王儶遣慕容恪擊魏魏主閔時在常山閔克劉顯因遊食常山諸郡燕兵及之閔戰大敗為燕兵所執閔素有勇名所將兵精鋭燕人憚之慕容恪曰閔勇而無謀一夫敵耳不足破也乃分其君為三部擇鮮卑善射者五千人以鐵鎖連其馬為方陳而前閔乘千里馬名曰朱龍左操兩刃矛右執鈎戟以擊燕兵斬首三百餘級望見大幢知其為中軍直衝之燕兩軍從旁夾擊大破之圍閔數重閔潰圍東走朱龍忽斃遂被執送于龍城斬之遣慕容評攻鄴閔將軍蔣幹及太子智閉城拒守遣使求救于謝尚魏建國三年而亡六月謝尚得傳國璽獻之初謝尚使建武將軍戴施據枋頭施聞蔣幹求救乃帥壯士百餘人入鄴助守三臺紿幹得傳國璽宣言使督護何融迎糧陰令懷璽送于枋頭謝尚迎致建康百僚畢賀是秋慕容評克鄴留鎮之戴施奔倉垣謝尚攻張遇于許昌秦人救之尚等敗績殷浩退屯夀春秋九月浩復進屯泗口泗水之口今徐州府境黃河所經本泗水故道謝尚姚襄共攻張遇秦苻雄等救之尚等戰敗奔還淮南殷浩自許昌還屯夀春秦徙張遇及陳頴許洛之民五萬餘戶于關中已而浩復謀再舉中軍將軍王羲之遺浩書曰今以區區江左天下寒心固已久矣力爭武功非所當作自頃處內外之任者未有深謀逺慮而疲竭根本各從所志竟無一功可論遂令天下將有土崩之勢今莫若還保長江督將各復舊鎮自長江以外羈縻而已引咎責躬更為善治省其賦役與民更始庶可以救倒懸之急也若猶以前事為所未工復求之于分外宇宙雖廣自容何所此愚智不解也浩不從遂進屯泗口十月謝尚攻克許昌會朝廷徴尚為給事中尚還戍石頭罷遣太學生徒浩以軍興罷遣太學生徒學校由此遂廢冬十一月燕王俊稱皇帝燕羣僚共上尊號燕王俊許之始置百官即皇帝位先是慕容評克鄴送冉閔后董氏及太子智于薊俊詐言董氏以傳國璽獻之賜璽號奉璽君及是稱帝因改元元璽時晉使適至燕儶謂曰汝還白汝天子我承人乏為中國所推巴為帝矣癸丑九年秋七月殷浩遣兵襲姚襄不克冬十月遂率諸軍北伐襄邀敗之浩走譙城姚襄屯厯陽以燕秦方強未有北伐之志乃夾淮廣興屯田訓厲將士浩惡其強盛屢遣刺客刺之客皆以情告襄浩潛遣將軍魏憬襲襄襄斬憬并其衆浩愈惡之遷襄蠡臺在河南歸德府商邱縣水經注睢陽城內有臺甚秀廣謂之蠡臺亦曰升臺表授梁國內史襄益疑懼初浩遣人誘秦梁安雷弱兒使殺秦主健許以關右之任弱兒等偽許之且請兵應接會張遇作亂遇入秦為司空秦主健納其繼母遇恥之陰結關中豪傑欲滅苻氏來降事覺被誅浩聞之以為安等事成遂自夀春帥衆北伐欲進據洛陽修復園陵以襄為前驅襄引兵北行度浩將至偽遁而陰伏甲以邀之浩大敗走保譙城浩將北伐吏部尚書王彪之上會稽王昱箋以為秦人容有詐偽未應輕進及浩敗昱謂彪之曰君言無不中張陳無以過也姚襄收浩資仗濟淮屯盱眙遣使建康陳浩罪狀并自陳謝詔以謝尚督江西淮南軍鎮厯陽十一月西平公張重華卒諡敬烈子曜靈字元舒嗣十二月涼州廢其主曜靈立張祚字太伯重華庶兄祚有勇力善事內外與重華嬖臣趙長等結異姓兄弟及重華卒曜靈方十嵗以世子嗣位長等乃廢之而立祚祚尋自稱涼王于是改元置百官郊祀天地尚書馬岌切諫免官郎中丁琪復諫殺之甲寅十年涼王張祚和平元年春正月殷浩以罪免為庶人徙信安本後漢新安縣晉改名今曰西安為浙江衢州府治以王述為揚州刺史浩師徒屢敗糧械都盡桓溫因朝野之怨上疏請廢之朝廷不得已免浩為庶人徙信安自此內外大權一歸于溫矣浩既廢黜雖愁怨不形辭色常書空作咄咄怪事字久之溫謂掾郗超曰浩有德有言向使作令僕足以儀型百揆朝廷用違其才耳將以浩為尚書令以書告之浩欣然許馬將答書慮有謬誤開閉者十數竟逹空函溫大怒由是遂絶卒于徙所二月桓溫帥師伐秦夏四月大敗秦兵于藍田注見前進軍灞上三輔皆降溫統步騎四萬發江陵水軍自襄陽入均口在襄陽府光化縣西北水涇注均水南注于沔謂之均口至南鄉漢縣唐省故城在今南陽府浙川縣步兵自浙川即故浙縣注見前今浙川乃西魏置趣武關命司馬勳出子午道以伐秦秦主健遣太子萇等帥衆五萬拒溫戰於藍田秦兵大敗溫轉戰而前進至灞上萇等退屯城南健與老弱六千固守長安小城三輔郡縣皆來降溫撫諭居民使安堵復業民爭持牛酒迎勞男女夾路觀之耆老有垂泣者曰不圖今日復覩官軍北海王猛少好學倜儻有大志隱居華陰間溫入關被褐詣之捫虱而談當世之務旁若無人溫異之問曰吾奉命除殘而三秦豪傑未有至者何也猛曰公不逺千里深入敵境今長安咫尺而不渡灞水百姓未知公之心所以不至溫默然徐曰江東無卿比也乃署猛軍咨祭酒劇王猛字景略北海人姚襄叛降于燕五月桓溫與秦兵戰不利六月師還溫與秦丞相雄等戰于白鹿原即灞上注見前溫兵不利死者萬餘人初溫指秦麥以為糧既而秦人悉芟麥清野以待之溫軍乏食徙關中三千餘户而歸溫欲與王猛俱還猛還山咨師師曰君與桓溫豈並世哉乃辭不就秦東海王苻雄卒雄位兼將相權侔人主而謙恭泛愛遵奉法度故秦主健重之及是卒子堅字永固襲爵堅性至孝博學多能交結英豪吕婆樓略陽氐人強汪梁平老略陽人皆與之善胡三省曰苻堅事始此乙卯十一年秦主苻生夀光元年涼王張元靚太始元年春二月秦大蝗百草無遺牛馬相噉毛夏六月秦主健卒太子生字長生健第三子立先是秦太子萇拒桓溫中流矢死秦主健乃立子生為太子生幼少一目性粗暴其祖洪嘗戲之曰吾聞瞎兒一淚信乎生怒引佩刀自刺出血曰此亦一淚也洪大驚鞭之生曰性耐刀槊不堪鞭捶洪之謂健曰此兒狂悖宜早除之不然必破人家健將殺健弟雄曰兒長自當改何可遽爾及長力舉千鈞走及奔馬擊刺騎射冠絶一時健以讖文有三羊五眼遂立之至是健寢疾引魚遵雷弱兒毛貴王墮梁楞梁安假純等受遺詔輔政謂生曰六夷酋帥及大臣執權者若不從汝命宜漸除之遂卒生即位生欲改元羣臣奏曰未踰年而改元非禮也生怒窮推議主得僕射假純殺之中書監胡文言有星孛于大角熒惑入東井不出三年國有大喪大臣戮死願修德以讓之生曰皇后與朕對臨天下可以應大喪矣毛太傳梁車騎梁僕射受遺詔輔政可以應大臣矣乃殺皇后及毛貴梁楞梁安已又殺丞相雷弱兒司空王墮并段弱兒九子二十七孫生雖諒隂遊飲自若彎弓露刃以見朝臣錘鉗鋸鑿備置左右即位未幾后妃公卿下至僕𨽻凡殺五百餘人秋閏九月涼州弒其君祚立張元靚字元安為涼王涼王祚淫虐上下怨憤河州刺史張瓘將軍宋混舉兵攻祚弒之及趙長等瓘先欲復立曜靈會曜靈已為祚所殺乃推其弟元靚為涼王時方七嵗丙辰十二年春三月以桓溫為征討大都督督諸軍討姚襄先是姚襄所部多勸北還襄遂進據許昌至是桓溫請移都洛陽修復園陵章十餘上不許詔溫討襄夏四月秦太后強氏以憂卒長安大風發屋拔木秦宫中驚擾或稱賊至宫門晝閉五日乃止秦主塵推告賊者刳出其心強太后弟平諫生怒鑿其頂而殺之太后以憂恨卒已而生下詔曰朕受天命君臨萬邦有何不善而謗讟之音扇滿天下殺不過千而謂殘虐行者比肩未足為希方當峻刑極罰復如朕何時潼關以西至長安自去春以來虎狼為暴不食六畜専務食人羣臣謂禳之生曰野獸飢則食人飽當自止何禳之有且天豈不愛民哉正以犯罪者多故助朕殺之耳秋八月桓溫敗姚襄于伊水注見前遂入洛陽修謁諸陵置戍而還襄北走據襄陵漢縣今屬山西平陽府桓溫自江陵北伐與僚屬登平乘樓大船之樓望中原歎曰遂使神州陸沉百年邱墟王夷甫諸人不得不任其貴記室袁宏曰運有廢興豈必諸人之過溫作色曰昔劉景升有千斤大牛噉芻豆十倍于常牛負重致逺曾不若一羸挬魏武入荆州殺以享軍徒袁宏字彥伯陳郡陽夏人胡三省曰溫以牛况宏縻廪祿而無用也先是姚襄圍周成于洛陽成本魏將降晉復叛據洛陽踰月不克及是溫軍至伊水襄撤圍拒之匿其精鋭遣使謂溫曰襄今奉身歸命願敕三軍小却當拜伏路左溫曰我自開復中原無豫君事欲來便前何煩使人襄拒水而戰大敗奔北山即北邙山溫追之不及周成帥衆出降溫屯金墉謁諸陵修毁壞各置陵令表謝尚鎮洛陽令頴川太守毛穆之字憲祖寶之子等戌之襄奔平陽其故將尹赤為秦并州刺史以衆降之襄遂據襄陵冬十月癸巳朔日食十一月燕慕容恪攻廣固克之假龕降燕初龕與燕主俊書抗中表之儀俊假氏出非其稱帝俊怒遣慕容恪擊之龕弟羆驍勇有智謀請先帥精鋭拒之于河龕不從羆固請不已龕怒遂殺之事在十一年已而恪引兵濟河龕拒戰恪大破其軍進圍廣固為髙墻深塹以守之龕樵采路絶城中人相食乃面縳出降恪撫安新民悉定齊地龕尋為俊所殺遣司空車灌如洛陽修五陵宣景文武惠五帝陵詔遣灌等持節之洛陽修五陵帝及羣臣皆緦服臨于太極殿三日丁巳升平元年秦主苻堅永興元年燕光夀元年春正月朔帝冠太后歸政徙居崇德宫二月太白入東井秦有司奏太白罰星東井秦分當有暴兵起京師秦主生曰太白入井自為去聲渴耳何足怪乎夏四月姚襄據黃落即今黃堡鎮在西安府同官縣南長安志秦苻黃眉討姚襄于此秦遣兵擊斬之弟萇字景茂弋仲第二十四子以衆降秦襄將圖關中進屯杏城在鄜州中部縣西南羌胡及秦民歸之者五萬餘户遂據黃落秦遣廣平王黃眉東海王堅將軍鄧羌禦之羌以騎三千壓襄壘門而陳襄怒出戰羌陽敗走襄追至三原宋白曰苻秦于嶻㠔山置三原護軍嶻㠔山亦曰嵯峨山在今西安府三原縣西北羌回騎擊之黃眉等以大衆繼至襄兵大敗擒而斬之弟萇帥其衆降秦以公禮葬襄六月秦苻堅弒其君生自立為天王秦主生殘虐滋甚生夢大魚食蒲又長安謡曰東海大魚化為龍男皆為王女為公生乃誅太師魚遵及其子孫又自以眇目諱言殘缺偏隻少無不具之類誤犯而死者不可勝數或剝人面皮使之歌舞以為樂羣臣得保一日如度十年東海王堅素有時譽與故姚襄參軍薛讚太原人權翼略陽人善讚翼密説堅宜早為計勿使他姓得之堅以問尚書吕婆樓婆樓曰僕刀環上人耳不足以辦大事里舍有王猛者謀略不世出宜請而咨之堅因婆樓以招猛一見如舊友語及時事堅大悅自謂元德之遇孔明也太史令康權言于生曰昨夜三月並出孛星入太微連東井自去月上旬沉隂不雨以至于今將有下人謀上之禍生怒以為妖言撲殺之先是特進梁平老勸堅及早舉事堅未敢發及是生夜對侍婢言曰阿法兄弟亦不可信明當除之婢以告堅及堅兄清河王法法與梁平老帥壯士潛入雲龍門堅與吕婆樓帥麾下繼進宿衛將士皆舍仗歸堅生猶醉寐堅兵殺之堅以位讓法法曰汝適嗣且賢宜立堅乃去帝號稱大秦天王大赦改元立子宏為太子法為丞相弟融字博休為陽平公子丕字永叔為長樂公李威茍太后姑子為左僕射融明辨過人耳聞則誦目過不忘力敵百夫堅愛重之丕亦有文武才幹治民斷獄皆亞于融威知王猛賢勸堅以國事任之堅謂猛曰李公知君猶鮑叔牙之于管仲也猛以兄事之法尋為茍太后所忌后乃與李威謀賜法死堅慟哭嘔血封其子陽為東海公敷為清河公秋八月立皇后何氏散騎常侍準之女準字幼道灊人冬十一月燕徒都鄴燕主俊自薊徙都于鄴復作銅雀臺燕主嘗夢石虎齧其臂乃發虎墓求尸不獲購以百金得于東明觀下僵而不腐俊數其殘暴之罪而鞭之投諸漳水東明觀在故鄴城南秦以王猛為尚書左丞秦王堅行至尚書以文案不治免左丞陳卓官以王猛代之舉異才修廢職課農桑恤困窮禮百神立學校旌節義繼絶世秦民大恱戊午二年秋八月以謝萬監司豫等州軍事會稽王昱欲以桓溫弟雲字子初為豫州刺史僕射王彪之曰溫居上流已割天下之半其弟復處西藩兵權萃于一門非深根固蒂之道也昱乃更以謝萬代之王羲之與溫箋曰謝萬才流經通使主廊廟固是後來之秀今以撫順荒餘則違才易務矣又遺萬書曰以君邁往不屑之韻而俯同羣辟誠難為意然所謂通識當隨事行藏耳願君與士卒之下者同甘苦則盡善矣萬不能用秦大旱秦王堅減膳徹樂命后妃以下悉去羅紈開山澤之利息兵飬民旱不為災冬荀羡伐燕不克而還以郗曇字重熙鑒之字督徐兖軍事燕泰山太守賈堅屯山茌漢茌縣晉曰山茌隋省故城在今濟南府長清縣荀羡引兵擊之擒堅遂拔山茌羡謂堅曰君祖父世為晉臣奈何背本不降堅曰晉自棄中華非吾叛也氏既無主強則托命既已事人安可改節遂憤惋而卒已而慕容塵遣司馬恱明救泰山羡兵大敗燕復取山茌會羡疾篤徴還以郗曇督徐兖軍鎮下邳燕使慕容垂守遼東燕吳王垂本名霸燕王俊素惡之因為更名初燕王皓竒霸之才故名曰霸將以為世子羣臣諌而止然寵遇猶踰于世子由是俊惡之以其嘗墮馬折齒更名曰缺尋以其應讖文更名曰垂徙鎮龍城大得東北之和俊愈惡之遂召還垂娶假氏假末柸女才髙性烈自以貴姓不尊事俊后可足渾代北三字姓氏后銜之中常侍涅浩涅姓浩姓希旨告假氏為巫蠱欲以連汚垂收下廷尉考驗終無撓辭故垂得免禍而假氏竟死獄中出垂為平州刺史鎮遼東己未三年秋泰山太守諸葛攸伐燕敗績冬十月謝萬郗曇復伐之曇病引還萬衆潰免為庶人攸將水陸二萬擊燕入自石門山名在兗州府曲阜縣西北屯于河渚文河之渚荀羡傳羡引汶通渠至于東阿燕上庸王評帥步騎五萬與戰東阿注見前攸大敗十月詔萬軍下蔡注見前曇軍髙平晉侯國後為縣北齊廢故城在今兗州府鄒縣以擊燕萬矜豪傲物但以嘯詠自髙未嘗撫衆兄安謂曰汝為元帥宜數接對諸將以恱其心豈有傲誕如此而能濟事也萬乃召集諸將一無所言直以如意指四座云諸將皆徑卒諸將益恨之安慮萬不免乃自隊帥以下無不親造厚相親託萬帥衆入渦潁以援洛陽郗曇以病退屯彭城萬以為燕兵大盛故曇退即引兵還衆遂驚潰萬狼狽單歸諸將欲圖之以安故而止詔廢萬為庶人降曇號建武將軍于是許昌潁川譙沛諸城皆沒于燕十二月秦以王猛兼司𨽻校尉先是堅以鄧羌為御史中丞又以猛領京兆尹強太后弟德酗酒豪橫掠人財貨子女猛下車收德奏未及報已陳尸于市堅馳使數之不及猛與羌同志疾惡糾案無所顧忌數旬之間權豪貴戚殺戮刑免者二十餘人朝廷震栗姦猾屏氣路不拾遺堅歎曰吾今始知天下之有法也既而以猛為吏部尚書尋遷太子詹事左僕射至是以猛為輔國將軍司𨽻校尉居中宿衛餘官如故猛嵗中五遷權傾內外人有毁之者堅輒罪之于是羣臣不敢復言庚申四年燕慕容暐建熙元年春正月燕主俊卒太子暐字景茂立初燕主俊寢疾謂太原王恪曰今二方未平景茂沖幼社稷屬汝何如恪曰太子雖幼臣何敢干正統俊怒曰兄弟之間豈虛飾邪恪曰陛下若以臣能荷天下之任者豈不能輔少主乎俊喜曰汝能為周公吾復何憂李績字伯陽産之子清方忠亮汝善遇之召吳王垂還鄴至是疾篤召恪及司空陽騖司徒評將軍慕輿根受遺詔輔政乃卒太子暐即位慕輿根自恃勳舊心不服恪欲為亂已又思戀舊土謀欲還東恪乃密奏根罪狀誅之時新遭大喪誅夷狼籍內外恟懼恪舉止如常人不見其有憂色每出入一人步從或説以宜自嚴備恪曰人情方懼當安重以鎮之奈何復自驚擾恪雖綜大任而朝廷之禮兢兢嚴重每事必與司徒評議之虛心待士咨詢善道愚才授任人不踰位朝臣或有過失不顯其狀隨宜他敘時人以為大愧莫敢犯者或有小過自相責曰爾復欲望宰公遷官邪朝廷初間俊卒皆以為中原可圖桓溫曰象容恪尚在憂方大耳秋八月辛丑朔日食既桓溫以謝安為征西司馬安少有重名前後徴辟皆不就寓居會稽以山水文籍自娛雖為布衣時人皆以公輔期之士大夫至相謂曰安石不出當如蒼生何安弟萬廢黜始有仕進之志時年已四十餘桓溫請為司馬安乃赴召溫深禮重之辛酉五年夏五月帝崩琅邪王丕成帝長子即位是為哀帝帝崩無嗣皇太后命曰琅邪王丕中興正統義望情地莫與為比其以王奉大統于是百官備法駕迎入即位秋七月葬永平陵在江寧府上元縣九月立皇后王氏濛之女尊何皇后為穆皇后涼張雍殺宋澄冬十月張天錫字純嘏駿少子誅之詔以張元靚為涼州刺史西平公先是涼宋混誅張瓘混素忠鯁瓘欲殺之因廢張元靚而自立混以太后令誅之請張元靚去王號復稱涼州牧既而混卒元靚以混弟澄為領軍將軍輔政右司馬張雍惡之至是雍攻殺澄自為中護軍驕縱専權多所刑殺元靚叔父天錫殺之盡滅其族元靚以天錫為大將軍輔政始奉升平年號故有是命秦滅張平平故趙并州刺史趙亡降秦又降燕復請降于建康欲中立以自固既而秦王堅擊之擒其養子張蚝本姓弓上黨人多力趫捷能曳牛却走超越髙城堅募人生致之鄧羌擒之以獻蚝七吏反平衆大潰乃降秦王以蚝為虎賁中郎將常置左右稱羌蚝皆萬人敵未幾燕擊平平復降燕尋又叛燕至是秦攻之謝罪于燕以求救燕人惡其反覆弗救也遂為秦所滅秦舉四科秦王堅命牧伯守宰各舉孝弟廉直文學政事察其所舉得者賞之非其人者罪之由是人莫敢妄舉請託不行士皆自勵雖宗室外戚無才能者皆棄不用官皆稱職田疇修闢倉庫充實賊盜屏息哀皇帝壬戌隆和元年春正月減田租畝收二升二月以庾希字始彥氷之子為徐兗刺史袁真監豫司等州軍事希鎮下邳真鎮汝南燕吕護攻洛陽桓溫遣兵救之秋七月燕師引還先是護遣使來降拜冀州刺史燕討之復奔還燕事在升平五年至是護攻洛陽守將陳祐告急桓溫遣庾希竟陵太守鄧遐字應逺嶽之子帥師助守因上疏請遷都洛陽朝廷畏溫不敢為異著作郎孫綽字興公楚之孫上疏爭之疏曰自喪亂以來六十餘年士民播流江表已經數世存者老子長孫亡者邱壠成行雖北風之思感其素心目前之哀實為交切溫今此舉誠為遠圖而百姓震駭豈不以反舊之樂賖趨死之憂促哉臣愚以為宜遣將帥有威名資實者先鎮洛陽掃平梁許清河南豺狼逺竄中夏小康然後可徐議遷徙耳溫見綽表不悅曰致意興公何不尋君遂初賦綽少慕高尚嘗著遂初賦以見志而知人家國事邪時朝廷憂懼將遣侍中止溫王述曰溫欲以虛聲威朝廷耳但從之自無所至詔從其計溫果不行溫又議移洛陽鐘虡述曰永嘉不競暫都江左方當蕩平區宇旋軫舊京若其不爾宜改遷園陵不應先事鐘虡溫乃止七月護退希等亦還明年燕略地河南陷許昌汝南陳郡及河南諸城遂通洛陽秦王堅臨太學秦王堅親臨太學考第諸生經義與博士講論自是每月一至冬十二月戊午朔日食癸亥興寧元年夏五月加桓溫大司馬都督中外諸軍録尚書事溫以王坦之字文度述之子為長史又以郗超為參軍王珣字元琳導之孫為主簿每事必與二人謀之府中為之語曰髯參軍短主簿能令公喜能令公怒溫氣槩高邁罕有所推與超言常自謂不能測傾身待之超亦深自結納與謝元皆為溫掾溫俱重之曰謝掾年四十必擁旄仗節王掾當作黑頭公皆未易十也謝元字幼度安兄奕之子秋八月有星孛於角亢涼張天錫弒其君元靚而自立天錫弒元靚自稱涼州牧西平公遣司馬奉章詣建康請命甲子二年涼西平公張天錫元年春三月大閲户口令所在土斷令西北士民僑寓東南者所在以土著為斷嚴其法禁稱為庚戌制以是月庚戌日行之故稱帝寢疾皇太后臨朝攝政帝信方士言斷穀餌藥以求長生侍中高嵩諌不聽尋以藥發不能親萬幾太后攝政夏五月以王述為尚書令述每受職不為虛讓其所辭必於不受及為尚書令子坦之白述故事當讓述曰汝謂我不堪邪曰非也但克讓自美事耳述曰既謂堪之何為復讓人言汝勝我定不及也加桓溫揚州牧時召溫入參朝政辭不至秋七月詔復徴溫溫至赭圻嶺名在太平府繁昌縣西詔止之溫遂城赭圻城在嶺下臨江居之遙領揚州牧乙丑三年秦建元元年春正月皇后王氏崩諡曰靖桓溫移鎮姑孰以弟豁朗之子監荆揚等州軍事三月帝崩琅邪王奕帝之弟即位是為廢帝帝崩無嗣皇太后詔以奕承大統燕陷洛陽將軍沈徑字世堅充之子死之初沈充之子徑以其父死於逆亂志欲立功以雪耻年三十餘以刑家不得仕及燕人逼洛陽陳祐守之徑自表求配祐效力詔以為長史令自募兵得千人以行至洛陽屢破燕軍祐自度不能守乃以救許昌為名留徑以五百人守之徑喜曰吾志欲致命今得之矣至是燕太宰恪吳王垂共攻克洛陽執徑徑神氣自若恪將宥之將軍慕輿虔曰徑雖竒士觀其志度終不為用遂殺之朝廷嘉徑之忠贈東陽太守司馬氏光曰沈徑耻父之惡致死以滌之變凶逆之族為忠義之門可謂能為子矣葬安平陵在江寧府上元縣夏六月益州刺史周撫卒撫在益州三十餘年甚有威惠詔以其子楚字元孫代之梁州刺史司勳久有據蜀之志憚撫不敢發及撫卒遂舉兵反自稱成都王引兵入劍閣圍成都桓溫遣江夏相朱序會楚討斬之朱序字次倫義陽人秋七月立皇后庾氏氷之女帝奕丙寅太和元年夏五月皇后庾氏崩秋七月葬孝皇后冬十月以會稽王昱為丞相録尚書事加殊禮入朝不趨贊拜不名劍履上殿丁卯二年春二月燕太宰慕容恪卒恪疾病燕主暐親視之問以後事恪曰吳王垂文武兼資管蕭之亞若任以政國家可安不然秦晉必有覬覦之計言終而卒秋九月以郗愔都督徐兗等州軍事冬代王什翼犍擊胸奴劉衛辰鐵弗劉虎之曽孫走之先是衛辰降秦入居塞內已叛秦降代未幾又叛代至是什翼犍擊之河氷未合命以葦絙約流澌俄而氷合然猶未堅乃散葦於其上氷草相結有如浮梁兵乘以渡衛辰不意兵猝至遂西走什翼犍收其部落什六七而還衛辰奔秦秦送還朔方遣兵戍之戊辰三年春三月丁巳朔日食冬十二月加桓溫殊禮位在諸侯王上己巳四年夏四月桓溫帥師代燕秦人救之秋九月溫及燕人戰於枋頭不利而還袁真以夀春叛降於燕溫帥步騎五萬發姑孰自兗州伐燕六月至金鄉後漢縣今屬兗州府天旱水絶使將軍毛虎生穆之小字名紀王靖后諱故行字字又同桓溫母名更稱小字鑿巨野注見前三百里引汶注見前會於清即今大清河古濟水也自泰安府東平州南東北流至武定府利津縣入于海通典東平濟南北海界中有水流入海謂之清河即此溫引舟師自清水入河舳艫數百里郗超謂溫曰清水入河難以通運若寇不戰運道必絶因敵為資復無所得此危道也不若舉衆趨鄴彼必望風逃潰北歸遼碣若能出戰則事可立決若恐勝負難必務欲持重則莫若頓兵河濟控引漕運俟資儲充備來夏乃進捨此二䇿而運軍北上進不速決退必愆乏賊因此勢以日月相引漸及秋冬水更澀滯北方早寒三軍裘褐者少恐於時所憂非獨無食而已溫不從燕主暐使下邳王厲逆戰敗還前鋒鄧遐朱序亦敗燕兵七月溫至枋頭暐及太傳評大懼謀奔和龍吳王垂曰臣請擊之若其不捷走未晚也暐乃使垂率衆五萬以拒溫又遣樂嵩請救於秦許賂虎牢以西之地秦羣臣議曰昔桓溫伐我燕不我救今溫伐燕我何救焉王猛曰燕雖強大慕容評非溫敵也若溫舉山東進屯洛邑收幽冀之兵引兗豫之粟觀兵崤澠則陛下大事去矣不如與燕合并以退溫溫退燕亦病矣然後我承其敝而取之不亦善乎堅從之八月秦王堅遣茍池鄧羌率步騎二萬以救燕初溫使袁真攻譙梁開石門以通水運不克九月燕范陽王德字元明皓少子帥騎屯石門李邽帥兵斷溫糧道德使慕容宙帥騎一千為前鋒與晉兵遇宙使二百騎挑戰分餘騎為三伏挑戰者兵未交而走晉兵追之宙帥伏擊之晉兵死者甚衆溫戰數不利糧儲復竭又聞秦兵將至焚舟棄輜重鎧仗自陸道奔還自東燕晉郡即春秋南燕注見前出倉垣鑿井而飲胡三省注恐燕追兵毒汴濟上流也行七百餘里燕將爭欲追之吳王垂曰溫初退必嚴設警備簡精鋭為後拒不如緩之彼幸吾未至晝夜疾趨俟其氣衰擊之無不克矣乃帥八千騎行躡其後溫果兼道而進數日垂曰可矣乃急之追及於襄邑注見前德先帥徑騎伏於東澗中與垂夾擊溫大破之斬首三萬級秦茍池邀擊溫于譙又破之溫收散卒屯於山陽深耻喪敗乃歸罪袁真奏免為庶人真不服表溫罪狀朝廷不報遂據壽春叛降燕冬十一月燕慕容垂出奔秦秦以為冠軍將軍燕吳王垂自襄邑還鄴威名益振太傅評愈忌之垂奏將士功賞皆抑而不行太后可足渾氏素惡埀與評謀誅之太宰恪之子楷知之以告且曰先發制人但除評及樂安王臧餘無能為矣垂曰骨肉相殘吾不忍為也寧避之於外耳十一月請畋於大陸注見前因微服將趨龍城至邯鄲少子麟素不為垂所愛逃還告狀燕主暐遣精騎追之重散騎滅迹得免世子令請給數騎襲鄴垂曰不可乃與假夫人前妃假氏之女弟及令楷並諸子俱奔秦初秦王堅聞恪卒隂有圖燕之志憚垂不敢發及聞垂至大喜郊迎執手曰天生賢傑必相與共成大功此自然之數也要當與鄉共定天下告成岱宗然後還卿夲邦世封幽州使卿去國不失為子之孝歸朕不失事君之忠不亦美乎子猛曰垂父子譬如龍虎非可馴之物若借以風雲將不可復制不如早除之堅曰吾方收攬英雄以清四海奈何殺之且其始來吾已推誠納之矣匹夫猶不棄言况萬乘乎乃以垂為冠軍將軍時燕遣梁琛使秦及歸言于評曰秦人曰閲軍旅聚糧陕東和必不久今吳王人往宜為之備評曰秦主何如人琛曰明而善斷問王猛曰名不虛得既又以告燕主暐皆不然之惟皇甫真深以為憂上疏請選將益兵以防未然不聽秦遣王猛等伐燕十二月取洛陽初燕人許割虎牢以西賂秦晉兵既退燕人謂曰行人失辭有國有家者分災救難理之常也秦王堅大怒遣猛及將軍梁成鄧羌帥步騎三萬伐之攻洛陽洛陽降桓溫徙鎮廣陵溫發徐兖州民系廣陵城徙鎮之時征役既頻加之疫癘死者什四五百姓嗟怨祕書監孫盛字安國太原中都人作晉春秋直書時事溫見之怒謂盛子曰枋頭誠為失利何至乃如尊君所言若此史遂行自是關若門門户事其子遽拜謝請改之時盛年老居家性方嚴有軌度子孫雖班白待之愈峻至是諸子號泣稽顙請為百口計盛大怒不許諸子遂私改之盛先已寫别本傳之外國及孝武帝購求異書得之于遼東人與見本不同遂兩存之庚午五年是歲燕亡大國一秦小國二涼代凡三僭國春正月慕容令自秦奔燕王猛之發長安也請慕容令參其軍事以為鄉導既至洛陽猛賂垂所親使詐為垂使者謂令曰吾父子來此以逃死也今王猛疾人如仇秦王心亦難知聞東朝比來悔悟吾今還東汝可速發令疑之躊躇終日又不可審覆乃奔燕軍猛表令叛狀垂懼而出走為追騎所獲秦王堅待之如舊堅謂垂曰卿家國失和委身投朕賢子心不忘本亦各行其志然燕之將亡非令所能存惜其徒入虎口耳且父子兄弟罪不相及卿何為過懼而狼狽如是乎燕人以令叛而復還疑為反間徙之沙城令自度終不能免帥沙城戌卒數千人襲龍城不克為其下所殺沙城在龍城東北夏六月秦王猛督諸軍復伐燕猛督將軍楊安等十將步騎六萬以伐燕燕主暐命太傅評將中外精兵三十萬拒之評畏猛不敢進猛克壺關所過郡縣皆望風降附燕人大震司徒長史申胤歎曰鄴必亡矣然越得歲而吳伐之卒受其禍今福德在燕燕雖得志燕之復建不過一紀耳入晉陽楊安攻晉陽久未下猛引兵助攻為地道使將軍張蚝帥壯士數百潛入城中大呼斬關納秦兵及慕容評戰于潞川水經注濁漳水過潞縣北闞駰曰潞為冀州浸即濁漳也潞縣故城在今潞安府潞城縣濁漳注見前敗之評屯潞川猛進兵與相持評為人貪鄙障固山泉鬻樵及水積錢帛如邱陵士卒怨憤莫有鬬志猛聞之笑曰慕容評真奴才雖億萬之衆不足畏况數十萬乎燕主暐讓評且趣使戰評大懼請戰于猛俄而交兵秦將鄧羌張蚝等馳赴還燕陳出入數四旁若無人燕兵大敗評單騎走遂長驅圍鄴猛號令嚴明軍無私犯法簡政寬燕民各安其業更相謂曰不圖今日復見太原王猛聞之嘆曰慕容元恭可謂古之遺愛矣設太牢以祭之秋七月癸酉朔日食冬十一月秦王堅入鄴執燕主暐以王猛為冀州牧都督關東六州軍事秦兵圍鄴秦王堅詔猛曰朕今親帥六師星言電赴將軍其休養士卒以俟朕至然後取之于是堅留李威輔太子自率精鋭十萬赴鄴燕主暐與慕容評等奔龍城堅使將軍郭慶追之及于髙陽執暐以詣堅堅釋之令還宫帥文武出降評奔髙句麗髙句麗執送于秦前燕自慕容廆據大棘至俊僣號及暐亡凡四主合八十六年堅以猛為使持莭都督關東六州諸軍事冀州牧鎮鄴守令有闕令以便宜補授將士封賞各有差州縣守長皆因其舊以燕申紹韋儒俱為繡衣使者循行關東觀省風俗勸課農桑賑恤窮困收葬死亡旌顯莭行燕政有不便于民者皆變除之遷暐及鮮卑四萬户于長安封暐為新興事侯以評為給中皇甫真為奉車都尉燕故太史黃泓嘆曰燕必中興其在吳王乎恨吾老不及見耳辛未六年簡文帝咸安元年春正月桓溫拔夀春獲袁瑾誅之先是袁真死子瑾代領其衆燕秦皆以兵助瑾桓溫擊破之遂圍夀春至是燕已亡瑾求救于秦秦遣將軍王鑒張蚝帥步騎二萬救之溫遣桓伊字叔夏宣族子等大破鑒蚝于石橋在肥水北遂拔夀春擒瑾送建康斬之代世子實卒後魏追諡獻明帝初代將長孫拓拔鬱律長子沙莫雄之後為長孫氏斤謀弒代王什翼犍實格之傷脅至是卒實娶東部大人賀野干賀蘭部酋長魏書官氏志北方賀蘭後改為賀氏之女有遺腹子什翼犍名之曰涉圭即魏太祖道武皇帝後名圭秦伐仇池克之執楊纂以歸初朝廷以楊世楊初曾孫為秦州刺吏世亦稱臣于秦世卒子纂立始與秦絶至是秦將楊安等伐纂克之遂執以歸秦王堅命安留鎮仇池冬十一月桓溫入朝廢帝為東海王迎會稽王昱入即位是為簡文帝溫恃其才略隂蓄不臣之志嘗撫枕嘆曰男子不能流芳百世亦當遺臭萬年溫欲先立功河朔以收時望還受九錫及枋頭之敗威名頓挫既克夀春謂郗超曰足以雪枋頭之恥乎超曰未也久之超就溫宿中夜謂曰眀公不為伊霍之舉無以立大威權鎮壓四海溫遂與定議以帝素無過而牀第易誣乃揚言帝早有痿疾嬖人朱靈寶等參侍內寢三美人生三男將移皇基人莫能審其虛實乃詣建康諷褚太后請廢帝而立會稽王昱並作令草呈之太后集百官于朝堂宣皇太后令廢帝為東海王迎昱即帝位帝既即位溫有足疾詔乘輿入殿溫撰辭欲陳述廢立本意帝引見便泣下數十行溫兢懼竟不能一言而出溫威勢翕赫侍中謝安見溫遙拜溫驚曰安石卿何事乃爾安曰未有君拜于前臣揖于後溫遂還姑孰秦王堅聞溫廢立謂羣臣曰溫前敗灞上後敗枋頭不能思愆自貶以謝百姓方更廢君以立威六十之叟舉動如此將何以容于四海乎諺曰怒其室而作色于父溫之謂矣十二月降封東海王為海西縣公桓溫奏廢放之人不可以臨黎元東海王宜依昌邑故事太后詔封海西縣公尋遷于吳縣溫威震內外帝雖處尊位拱默而已帝美風儀善容止留心典籍凝塵滿席湛如也雖神識恬暢然無濟世大略謝安以為惠帝之流但清談差勝耳太宗簡文皇帝壬申咸安二年春三月秦命關東禮送經藝之士秦王堅詔關東之民學通一經才成一藝者所在郡縣以禮送之在官百石以上學不通一經才不成一藝者罷遣還民秋七月帝崩太子昌眀即位是為孝武帝帝不豫急詔桓溫入輔一日一夜發四詔溫辭不至詔立皇子昌明為皇太子道子為琅邪王領會稽國以奉帝母鄭太妃之祀遺詔溫依周公居攝故事又曰少子可輔者輔之如不可君自取之侍中王坦之持詔入于帝前毁之帝曰天下儻來之運卿何所嫌坦之曰天下宣元之天下陛下何得專之帝乃使改詔曰家國事一稟大司馬如諸葛武侯王丞相故事是日帝崩羣臣曰當須大司馬處分王彪之正色曰天子崩太子代立大司馬何容得異朝議乃定太子即位太后欲令溫居攝彪之曰此異常大事大司馬必當固讓使萬幾停滯稽廢山陵未敢奉令事遂不行溫望簡文臨終傳位不爾便當居攝既不副所望與弟沖書曰詔使吾依武侯王公故事耳疑王坦之謝安所為心銜之八月秦加王猛都督中外諸軍事先是秦王堅以猛為丞相苻融為冀州牧猛至長安復加都督中外諸軍事辭章三四上堅不許猛為相堅端拱于上百官總己于下軍國之事無不由之猛剛眀清肅善惡著白放黜尸素顯拔幽滯勸課農桑練習軍旅官必當刑刑必當罪由是國富兵強戰無不克秦國大治陽平公融在冀州坐擅起學舍為有司所糾使燕尚書郎髙泰至長安見猛曰昔魯僖公以泮宫發頌齊宣王以稷下垂聲今陽平公開建學宫乃煩有司舉劾明公懲勸如此下吏何以逃罪乎猛曰是吾過也事遂釋冬十月葬髙平陵在江寧府上元縣三吳大飢烈宗孝武皇帝癸酉寧康元年春二月桓溫來朝溫來朝詔吏部尚書謝安侍中王坦之迎于新亭時都下恟恟云欲誅王謝因移晉祚坦之甚懼安神色不變曰晉祚存亡決于此行溫既至百官拜于道側溫大陳兵衛延見朝士坦之流汗沾衣倒執手板安從容就席謂溫曰安聞諸侯有道守在四鄰眀公何須壁後置人邪溫笑曰正自不能不爾遂命撤之與安笑語移日溫令郗超卧帳中聽其言風動帳開安笑曰郗生可謂入幕之賓矣時天子幼弱外有強臣安奭坦之盡忠輔衛卒安晉室三月溫有疾還姑孰秋七月桓溫死以桓沖都督揚豫江州軍事溫疾篤諷朝廷求九錫屢使人趣之謝安王坦之故緩其事使袁宏具草安見其草輒改之由是歷旬不就溫弟江州刺史沖問溫以安坦之所宜任溫曰渠等不為汝所處分也溫以世子熙才弱使沖領其衆溫卒沖代溫居任盡忠王室或勸誅除時望沖不從始溫在鎮死罪皆專決沖以為生殺之重當歸朝廷須報後行熙及弟濟謀殺沖沖徙之長沙稱溫遺令以少子元為嗣襲封南郡公時方五歲桓元字敬道一名靈寶皇太后臨朝攝政以王彪之為尚書令謝安為僕射謝安以天子幼沖欲請崇德太后臨朝褚太后居崇德宫簡文即位尊后為崇德太后彪之曰上年垂及冠婚反令從嫂臨朝豈所以光揚盛德乎安不欲委任桓沖故請太后臨朝已得專決遂不從其言彪之與共掌朝政安每歎曰朝廷大事衆所不能決者以咨王公無不立決冬秦寇梁益陷之秦取二州卭筰夜郎皆附之梓潼太守周虓固守涪城遣步騎送母趣江陵為秦將所獲虓遂降秦秦王堅欲以虓為尚書郎虓曰蒙晉厚恩老母見獲失莭于此母子獲全秦之惠也雖公侯之貴不以為榮遂不仕每見堅或箕踞而坐呼為氐賊秦人以虓不遜屢請殺之堅待之彌厚威周虓字孟楚之孫彗星見彗星出于尾箕晉書天文志尾九星亦為九子箕四星亦曰天津長十餘丈經太微掃東井自四月見及冬不滅秦太史令張孟言尾箕燕分天文志自尾十度至南斗十一度為析木燕之分野東井秦分自東井十六度至栁八度為鶉首秦之分野也今彗起尾箕而掃東井十年之後燕當滅秦二十年之後代當滅燕胡三省曰按天文志雲中入東井一度定襄入東井八度代郡入東井二十八度皆拓拔氏地也所以知代當滅燕者天道好還秦已滅矣代乘天運反而滅燕自然之數也慕容氏布列朝廷臣竊憂之宜剪其魁傑以消天變堅不聽陽平公融亦上疏言之堅報曰朕方混六合為一家視夷狄為赤子汝宜息慮勿懷耿介夫惟修德可以禳災茍能內求諸己何懼外患乎甲戌二年春二月以王坦之都督徐衮等州軍事詔謝安總中書安好聲律期功之慘不廢絲竹士大夫效之遂以成俗坦之屢書苦諫曰天下之寶當為天下惜之安不能從又嘗與王羲之登冶城在江寧府沿北金陵記即今朝天宫悠然遐想有髙世之志羲之謂曰夏禹勤王手足胼胝文王旰食日不暇給今四郊多壘宜思自效而虛談廢務浮文妨要恐非當世所宜安曰秦任商鞅二世而亡豈清言致患耶乙亥三年夏五月徐兖都督藍田侯王坦之卒諡曰獻坦之臨終與謝安桓沖書惟以國家為憂言不及私以桓沖為徐州刺史謝安領揚州刺史沖以安素有重望以揚州讓之自求外出桓氏族黨莫不苦諌沖處之淡然秋七月秦丞相清河侯王猛卒諡曰武猛寢疾秦王堅親為祈郊廟社稷分遣近臣遍禱河嶽疾少瘳為之赦殊死以下猛上疏曰不圖陛下以臣之命而虧天地之德開闢以來未之有也臣聞報德莫如盡言謹以垂歿之命竊獻遺欵夫善作者不必善成善始者不必善終古先哲王知功業之不易戰戰兢兢如臨深谷伏惟陛下追蹤前聖天下幸甚堅覽之悲慟七月堅親至猛第視疾訪以後事猛曰晉雖僻處江南然正朔相承上下安和臣沒之後碩勿以晉為圖鮮卑西羌我之仇敵終為大患宜漸除之以便社稷言終而卒堅比斂三臨哭謂太子宏曰天不欲使吾平一六合耶何奪吾景略之速也葬之如漢霍光故事八月立皇后王氏濛女孫九月以徐邈東莞姑幕人家京口為中書舍人晉官掌呈奏案帝講孝經始覽典籍延儒士謝安薦邈補中書舍人每被顧問多所匡益帝或宴集酣樂之後好為詩章文詞穢雜邈應時收斂還省刋削經帝重覽然後出之冬十月癸酉朔日食秦置聽訟觀遣太子入學禁老莊圖讖之學秦王堅詔曰新喪賢輔百司或未稱朕心可置聽訟觀五日一臨以求民隱今天下雖未大定權可偃武修文以稱武侯謂王猛雅旨其增崇儒教禁老莊圖讖之學犯者棄市妙簡學生太子及羣臣之子皆就學受業尚書郎王佩讀讖堅殺之讖學遂絶丙子太元元年是歲涼代皆亡僣國一秦春正月朔帝冠太后歸政以謝安為中書監録尚書事秋七月秦遣兵擊涼州八月敗其兵涼將掌據死之張天錫降秦王堅以天錫雖稱藩受位而臣道未純遣將軍茍萇梁熙等將兵臨西河尚書郎閻負梁殊奉詔徴之若有違命即進師撲討負殊至姑臧天錫會官屬謀之皆曰河西天險若悉境內精兵右招西域北引胸奴何遽知其不捷也天錫攘袂大言曰孤計決矣言降者斬乃縛負殊射殺之使將軍馬建帥衆二萬拒秦八月秦師濟河天錫遣掌據軍于洪池嶺名在今涼州府武威縣東南自帥餘衆屯金昌城在今涼州府永昌縣茍萇使姚萇為前驅馬建迎降掌據戰死據兵敗就帳免胄西向稽首伏劍而死天錫出城自戰城內又反乃奔還姑臧秦兵至天錫面縛出降涼州郡縣悉下封天錫歸義侯前涼自張軌據涼州至天錫亡凡九主合六十九年詔除度田收租之制初哀帝減田租畝收二升至是除之王公以下口稅米三斛蠲在役之身冬十一月己巳朔日食秦遣兵擊代敗之十二月代實君弒其君什翼犍秦討殺之遂分代為二部劉衛辰為代所逼求救于秦秦王堅遣行唐公洛鄧羌朱彤等將兵擊代以衛辰為鄉導代王什翼犍使南部大人劉庫仁一名洛垂衛辰之族什翼犍之孫將兵拒戰大敗什翼犍病不能自將乃奔隂山之北聞秦兵稍退復還雲中初什翼犍世子實早卒實子圭尚幼慕容妃諸子皆長繼嗣未定至是庶長子實君遂殺諸弟並弒什翼犍秦兵趨雲中部衆逃潰國中大亂圭母賀氏以圭走依賀納野干之子秦王堅召代長史燕鳳字子章代人問代亂故鳳具以對堅曰天下之惡一也乃執實君至長安車裂之堅欲遷圭于長安鳳固請曰代王遺孫沖幼莫相統攝庫仁勇而有智衛辰狡猾多變皆不可獨任宜分諸部為二令此兩人統之兩人素有深讐而勢莫敢先發俟其孫稍長立之是陛下有存亡繼絶之德于代使其子孫永為不侵不叛之臣此安邊之良䇿也堅從之分代為二部自河以東屬庫仁自河以西屬衛辰使統其衆賀氏以圭依庫仁庫仁招撫離散恩信甚著奉事拓拔圭恩勤周偹不以廢興易意常謂諸子曰此兒有髙天下之志必能恢隆祖業汝曹當謹遇之丁丑二年春三月以朱序為梁州刺史鎮襄陽冬十月以桓沖都督江荆等州軍事謝元監江北軍事桓沖以秦人強盛欲移阻江南奏自江陵徙鎮上眀城名在荆州府松滋縣水經注江水東徑上眀城北即此使劉波字道則隗之子守江陵楊亮𢎞農華隂人漢太尉震之後守江夏時朝廷方以秦寇為憂詔求文武良將可鎮禦北方者安以兄子元應詔初中書郎郗超自以其父愔位遇應在謝安之右而優遊散地常憤悒形于辭色由是與謝氏有隙及聞安舉元嘆曰安之明乃能違衆舉親元之才足以不負所舉衆咸以為不然超曰吾嘗與元共在桓公府見其使才雖復屐問未嘗不得其任是以知之元鎮廣陵募驍勇之士得劉牢之字道堅彭城人等數人以牢之為參軍常領精卒為前鋒戰無不捷時號北府兵敵人畏之散騎常侍王彪之卒諡曰簡初謝安欲增修宫室彪之曰中興之初即東府在臺城之東為宫殊為儉陋蘇峻之亂成帝止蘭臺即御史臺都坐猶言都堂不蔽風雨是以更營新宫比之漢魏則為儉比之初過江則為侈矣今寇敵方強豈可大興工役勞擾百姓耶安曰宫室敝陋後人謂人無能彪之曰凡任天下之重者當保國寧家緝熙政事乃以修屋室為能耶安不能奪故終彪之之世無所營造彪之既卒眀年春遂作新宫至秋乃成戊寅三年春二月秦寇梁州夏四月陷南陽秦王堅遣長樂公丕等攻襄陽至沔北梁州刺史朱序以秦無舟楫不以為虞既而秦軍浮馬以渡序惶駭固守中城丕督諸將攻之先是序母韓氏聞秦兵將至自登城履行至西北隅以為不固帥百餘婢及城中女丁築斜城于其內及秦兵敗城西北隅果潰衆移守新城襄陽人謂之夫人城丕欲急攻襄陽茍萇曰吾衆十倍于敵糗糧山積但稍遷漢沔之民于許洛塞其運道絶其援兵譬如網中之禽何患不獲而多殺將士急求成功哉丕從之縣元和志夫人城在襄陽西北慕容垂拔南陽執太守鄭裔與丕會己卯四年春二月秦陷襄陽執刺史朱序以歸苻丕久圍襄陽秦御史中丞李柔劾丕師老無功請徴下廷尉秦王遣使持節切讓丕等丕等惶恐命諸軍并力進攻朱序屢破秦兵守備稍懈督護李伯護為秦內應丕遂克襄陽執序送長安堅以序能守節拜度支尚書以伯護為不忠斬之秦將慕容越拔順陽執太守丁穆堅欲官之穆固辭不受丁穆字彥逺譙國人夏四月秦陷魏興太守吉挹字祖沖馮翊遵芍人死之秦韋鍾拔魏興吉挹引刀欲自殺左右奪其刀會秦人至執之挹不言不食而死秦王堅嘆曰周孟威不屈于前丁彥逺潔已于後吉祖沖閉口而死何晉氏之多忠臣也挹參軍史穎逃歸得挹臨終手疏詔贈益州刺史五月秦陷盱眙進圍三阿今曰北阿鎮在揚州府髙郵州西北謝元連戰敗走之先是秦陷彭城淮隂謝元救彭城軍泗口欲遣問使報太守戴逮部將田泓請沒水潛往元遣之為秦人所獲厚賂之使云南軍已敗泓偽許之既而告城中曰南軍垂至我單行來報為賊所執勉之秦人殺之彭城遂陷至是秦將俱難彭超拔盱眙遂圍田洛于三阿去廣陵百里朝廷大震臨江列戌謝元自廣陵救三阿難超戰敗退保盱眙六月元進攻之又敗退屯淮隂元遣何謙等帥舟師乘潮而上夜焚淮橋難超退屯淮北元謙等共追之戰于君川胡三省注盱眙縣北有君山此蓋君山之川也復大破之難超北走僅以身免元還廣陵加領徐州刺史秦王堅大怒徴超下廷尉自殺難削爵為民秦大飢御批歷代通鑑輯覽卷三十三

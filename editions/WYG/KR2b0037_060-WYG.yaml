front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷六十一唐文宗皇帝丁未太和元年夏四月韋處厚請避位不許
  hash: sha256:77080b7958129a80f61ffa7f94e06ce303853ad497bd162e2b6bd5bac2c32fe6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_060-1a, image: WYG0337/WYG0337-0401a.png}
body:
  text: 上雖虚懷聽納而不能堅决與宰相議事已定尋復中變韋處厚于延英極論之因請避位上再三慰勞之以高瑀冀州蓚人為忠武貞元十年以陳許節度為忠武軍節度使自大歴以來節度使多出禁軍大将皆以倍稱之息貸錢以賂中尉動踰億萬然後得之未嘗由執政至鎮則重斂以償所負及是忠武帥王沛許昌人卒裴度韋處厚始奏用高瑀中外相賀曰自今債帥鮮矣六月以王播同平章事播入朝力圖大用所獻銀器以千計綾絹以十萬計遂得宰相秋七月𦵏莊陵在西安府三原縣西北八月兖海節度使李同㨗叛詔削其官爵發諸道兵討之初横海節度使李全畧本王日簡賜姓名卒其子同㨗擅領留後朝廷經嵗不問全畧卒於寳歴二年三月敬宗持詔不下及上即位同㨗冀易世之後或加恩貸遣使奉表請遵朝旨乃移同㨗鎮兖海朝廷猶慮河南北諸鎮構扇同㨗使拒命乃悉加檢校官已而同㨗託為將士所留不受詔詔削官爵命烏重𦙍王智興等各帥本軍討之同㨗遣其子弟以珍玩女妓賂河北諸鎮李載義執其姪并所賂獻之史憲誠與全畧為婚獨以資財助同㨗裴度不之知以憲成為無二心㑹憲成遣吏至中書請事韋處厚謂曰晉公于上前以百口保汝使處厚則不然但仰俟所為自有朝典耳憲誠懼不敢復與同㨗通時烏重𦙍屢破同㨗兵王智興亦奏㧞棣州㑹重𦙍卒以李寰代之寰所過殘暴至則擁兵不進但坐索供饋詔改寰夏綏以李祐為横海節度使戊申二年春三月親䇿制舉人自元和之末宦官益横建置天子在其掌握威權出人主之右人莫敢言賢良方正劉蕡字去華昌平人對䇿極言其禍畧曰陛下宜先憂者宫闈將變社稷將危天下將傾海内將亂又曰陛下將杜簒弑之漸則居正位而近正人逺刀鋸之賤親骨鯁之直輔相得以専其任庶職得以守其官奈何以䙝近五六人總天下之政禍稔蕭牆姦生帷幄臣恐曹節侯覽復生于今日又曰忠賢無腹心之寄閽寺持廢立之權䧟先君不得正其終致陛下不得正其始又曰威柄陵夷藩臣䟦扈或有不逹人臣之節首亂者以安君為名不究春秋之微稱兵者以逐惡為義則政刑不由乎天子征伐必自乎諸侯又曰陛下何不塞陰邪之路屏䙝狎之臣制侵陵迫脅之心復門户掃除之役戒其所宜戒憂其所宜憂既不能治于前當治于後既不能正其始當正其終則可以䖍奉典謨克承丕構矣昔秦之亡也失于强暴漢之亡也失之微弱强暴則賊臣畏死而害上微弱則奸臣竊權而震主伏見敬宗皇帝不虞亡秦之禍不剪其萌伏惟陛下深軫亡漢之憂以杜其漸又曰臣聞昔漢元帝即位之初更制七十餘事其心甚誠其稱甚美然而綱紀日紊國祚日衰奸宄日彊黎元日困者以其不能擇賢明而任之失其操柄也又曰陛下誠能揭國權以歸相持兵柄以歸將則心無不逹行無不孚矣又曰法宜畫一官宜正名今分外官中官之員立南司北司之局戎犯禁于南則亡命于北或正刑于外則破律于中法出多門人無所措實由農兵勢異而中外法殊也又曰今夏官不知兵籍六軍不主兵事軍容合中官之政戎律附内臣之職首一戴武弁疾文吏如仇讐足已蹈軍門視農夫如草芥謀不足以剪除兇逆而詐足以抑掦威福勇不足以鎮衛社稷而暴足以侵軼里閭覊綫藩臣下臨宰輔隳裂王度汩亂朝經張武夫之戒上以制君父假天子之命下以御英豪有藏姦觀釁之心無仗節死難之義豈先王經文緯武之旨邪又曰臣非不知言發而禍應計行而身戮葢病社稷之危哀生人之困豈忍姑息時忌竊陛下一命之寵哉考官散騎常侍馮宿字拱之婺州東陽人等見蕡䇿皆歎服而畏宦官不敢取裴休字公美濟源人李郃字子元道州延唐人杜牧字牧之佑之孫崔慎田字敬止融之孫等二十二人中第皆除官物論囂然稱屈諌官御史欲論奏執政抑之李郤曰劉蕡下第我輩登科能無厚顔乃上疏曰蕡所對䇿漢魏以來無與為比今有司以蕡指切左右不敢以聞恐忠良道窮綱紀遂滅况臣所對不及蕡逺甚乞回臣所授以旌蕡直不報蕡由是不得仕于朝終于使府節度幕府御史秋九月詔削王庭凑官爵命諸軍討之庭凑陰以兵助李同㨗乃下詔罪狀庭凑削官爵命諸軍四面討之時同㨗軍勢日蹙庭凑不能救乃遣人説魏博大將开志紹使殺史憲誠父子取魏博志紹遂作亂引所部兵二萬人還逼魏州義成節度使李聴討破之志紹奔鎮州亓音牽舊書作亓音其皆姓也未知孰是冬十二月中書侍郎同平章事韋處厚卒以路隋同平章事隋言於上曰宰相任重不宜兼金穀瑣碎之務如楊國忠元載皇甫鎛皆姦臣所為不足法也上以為然於是裴度辭度支上許之己酉三年春二月横海節度使李祐帥諸道兵擊李同㨗破之夏四月同㨗降滄景平李祐帥諸道兵擊李同㨗㧞徳州同㨗請降祐遣大將萬洪守滄州宣慰使栢耆疑同㨗之詐自將數百騎馳入滄州以事誅洪取同㨗詣京師或言王庭湊欲以竒兵簒之耆斬同㨗傳其首諸道兵攻同㨗三年僅能下之而耆取為己功諸將疾之爭上表論貶耆為循州司户初祐病聞耆殺洪大驚遂劇上曰祐若死是耆殺之也祐尋卒賜耆自盡六月魏州軍亂殺其節度使史憲誠推何進滔靈武人知留後以拒命秋八月以進滔為魏博節度使初憲誠聞滄景將平而懼使其子唐字得仁後更名孝章奉表請入朝且以所管聴命詔徙憲誠鎮河中而以李聴鎮魏博憲誠竭府庫以治行將士怒殺憲誠奉兵馬使何進滔知留後聴至魏州不得入七月進滔出兵擊聴走之時河北久用兵饋運不給八月遂以進滔為節度使以殷侑陳州人為齊徳滄景節度使是年始以齊州𨽻横海滄州乗喪亂之餘骸骨蔽地户口存者十無三四侑至鎮與士卒同甘苦招撫流散勸之耕桑三年之後户口滋殖倉廪充盈赦王庭湊復其官爵庭湊因鄰道㣲露請服之意遂赦之以李宗閔同平章事徵李徳裕為兵部侍郎裴度薦以為相㑹宗閔有宦官之助遂以宗閔同平章事宗閔惡徳裕逼已出之滑洲九月命宦官毋得衣紗縠綾羅上性儉素聴朝之暇惟以書史自娯聲樂遊畋未嘗留意駙馬韋處仁著夾羅巾上謂曰朕慕卿門地清素故有選尚如此巾服聴其他貴戚為之卿不湏爾冬十一月禁獻竒巧及織纎麗布帛南詔冦成都入其郛西川節度使杜元頴以文雅自髙不曉軍事減削士卒衣糧戍卒皆入蠻境鈔盜自給蠻人反以衣食資之由是蜀中虚實動靜蠻皆知之南詔嵯巔遂謀入寇初南詔勸龍晟淫虐不道弄棟節度使嵯巔殺之立其弟勸利勸利死立其弟豐祐豐祐趨敢善用其下㑹杜元潁為治無􅃺嵯巔遂謀入寇曰勸龍晟異牟尋之孫弄棟漢縣南詔于此置府今姚州為姚安府治以蜀卒為鄉𨗳襲䧟嶲戎卭州戎州唐置今四川叙州府是餘注俱見前詔發近鎮兵救之嵯巔自引兵徑抵成都䧟其外郭大掠子女百工數萬人及珍貨而去嵯巔遣使上表曰杜元穎不恤軍士軍士競為鄉𨗳祈誅虐帥誅之不遂無以慰蜀士之心願陛下誅之詔貶元穎循州司馬庚戍四年春正月以牛僧孺同平章事李宗閔引僧孺為相相與排擯李徳裕之黨稍稍逐之二月興元軍亂殺節度使李絳三月以温造為山南西道節度使討平之南詔之冦成都也詔山南西道發兵救之節度使李絳募兵千人赴之蠻退而還詔悉罷之絳召新軍諭旨賜以廪麥而遣之皆怏怏而退監軍楊叔元素惡絳不奉己以賜物薄激之衆怒大譟掠庫兵趨使牙絳方宴走登北城或勸絳縋而出絳曰吾為元帥豈可逃去麾推官趙存約令去存約曰存約受明公知何可茍免牙將王景延戰死絳存約等皆遇害叔元奏絳收新軍募直以致亂三省官上疏共論絳寃及叔元激怒亂軍之罪上始悟以温造為山南西道節度使討亂兵造行至褒城遇興元都將衛志忠征蠻歸宻與之謀以其兵八百人為牙隊五百人為前軍入府分守諸門既視事饗士卒志忠宻以牙兵圍新軍殺之八百人皆死楊叔元起擁造靴求生造命囚之詔流康州唐置今肇慶府徳慶州是以栁公綽為河東節度使陘北沙陀沙陀保神武川在陘嶺之北素驍勇為九姓六州胡所畏伏公綽至鎮奏以其酋長朱邪執宜為陰山都督使居雲朔塞下捍禦北邊執宜入謁神彩嚴整進退有禮公綽謂僚佐曰執宜外嚴而内寛言徐而理當福禄人也使夫人與其母妻飲酒饋遺之執宜感恩為之盡力自是虜不敢犯塞夏六月以裴度為司徒平章軍國重事度以老疾辭位故有是命仍詔三五日一入中書秋七月以宋申錫字慶臣史不詳何所人同平章事上患宦官彊盛元和寶歴逆黨猶在而中尉王守澄尤專横常宻與申錫言之申錫請漸除其偪上以申錫沈厚忠謹可倚以事擢為宰相九月以裴度為山南東道節度使初裴度征淮西奏李宗閔為判官由是漸獲進用至是宗閔怨度薦李徳裕因其謝病出之冬十月以李徳裕為西川節度使蜀自南詔入寇一方殘弊徳裕至鎮作籌邊樓圖蜀地形南入南詔西逹吐蕃日召老于軍旅習邊事者訪以山川城邑道路險易廣狹逺近未踰月皆若身嘗涉歴上命徳裕修塞清溪闗在今雅州府清溪縣南以斷南詔入冦之路徳裕上言通蠻細路至多不可塞惟重兵鎮守可保無虞時北兵皆歸本道惟河中陳許三千人在成都有詔來年亦歸蜀人恟懼徳裕奏乞鄭滑五百人陳許千人以鎮蜀且言蜀兵脆弱新為蠻冦所困皆破膽不堪征戍若北兵盡歸則與杜元穎時無異朝庭建言罷兵葢由禍不在身望人責一狀留入堂案他日敗事不可令臣獨當國憲朝廷皆從其請徳裕乃練士卒葺堡鄣積糧儲以備邉蜀人粗安辛亥五年春正月盧龍將楊志誠逐其節度使李載義二月以志誠為留後上聞志誠作亂召宰相謀之牛僧孺曰范陽自安史以來非國所有劉總暫獻其地朝廷費錢八十萬緡而無絲毫所獲今日志誠得之猶前日載義得之也因而撫之使捍北狄不必計其逆順上從之以載義恭順有功拜太保以志誠為留後三月貶漳王湊帝之弟為巢縣公宋申錫為開州司馬上與申錫謀誅宦官申錫引王璠字魯玉元和初進士為京兆尹以宻旨諭之璠泄其謀王守澄鄭注知之使人誣告申錫謀立漳王上以為信然甚怒守澄欲遣騎屠申錫家飛龍使馬存亮固爭曰如此則京城自亂矣守澄乃止上命捕所告品官宴敬則等于禁中鞫之皆自誣服獄成左常侍崔元亮字晦叔磁州昭義人給事中李固言字仲樞趙人諌議大夫王質字華卿通五世孫補闕盧鈞字子和藍田人等請以獄事付外覆按上曰吾已與大臣議之矣元亮叩頭流涕曰殺一匹夫猶不可不慎重况宰相乎上意稍解復召宰相入議牛僧孺曰人臣不過宰相申錫復欲何求且申錫殆不至此注恐覆按詐覺乃勸守澄請止行貶黜存亮即日致仕坐死徙者數十百人中錫竟卒于貶所開成初詔復官爵秋八月以崔郾為鄂岳觀察使鄂岳多盜剽行舟郾訓卒治兵作䝉衝戰船也追討悉誅之初郾在陜以寛仁為治或經月不笞一人及至鄂嚴峻刑罰或問其故郾曰陜土瘠民貧吾撫之不暇尚恐其驚鄂地險民雜慓狡為奸非用威刑不能致治政貴知變盖謂此也九月吐蕃將悉怛謀以維州注見前來降吐蕃維州副使悉怛謀請降盡帥其衆奔成都李徳裕遣兵據其城維州城本姜維故壘在髙碉山上具奏其狀事下尚書省集百官議皆請如徳裕䇿牛僧儒曰土蕃之境四面各萬里失一維州未能損其勢比來修好約罷戍兵中國禦戎守信為上彼若來責失信養馬蔚茹川亦曰葫蘆河出今固原州西南北流至寜夏府入黄河元和志蔚茹水在蕭闗縣西一名葫蘆河上平凉版萬騎綴回中怒氣直辭不三日至咸陽橋此時西南數千里外得百維州何所用之上以為然詔徳裕以其城及悉怛謀悉歸之吐蕃吐蕃誅之于境上極其慘酷徳裕由是怨僧孺益深尹起莘發明曰維州之降司馬氏光既是僧孺而胡氏寅又復非之此如訟牒紛拏孰從而折􅇆邪夫維州唐之故壤吐蕃盗而有之幸而徳裕展布方畧悉怛謀帥衆來降固非其他招納叛降之此胡乃拒而不納萬一河湟故土盡復版圖亦將却而絶之乎審此則牛李之是非決矣壬子六年春正月羣臣上尊號不受右補闕韋温字宏育貫之兄綬之子言今水旱為灾恐非崇飾徽稱之時上善之辭不受冬十月立魯王永帝長子為太子十二月牛僧孺罷西川監軍王踐言入知樞宻數為上言縳送悉怛謀以快虜心絶降者非計也上亦悔之尤僧孺失䇿僧孺内不自安㑹上謂宰相曰天下何時當太平卿等亦有意于此乎僧孺對曰太平無象今四夷不至交侵百姓不至流離雖非至理亦謂小康陛下若别求太平非臣所及退謂左右曰主上責望如此吾曹豈得久居此地乎因累表請罷乃出為淮南節度使昭義節度使劉從諫入朝以李徳裕為兵部尚書初李宗閔與徳裕有隙及徳裕還自西川上注意甚厚朝夕且為相宗閔百方沮之不能深以為憂京兆尹杜悰謂曰徳裕有文學而不由科第常用此為慊慊若使之知舉則可以平宿憾矣宗閔曰更思其次悰曰不則用為御史大夫宗閔曰可矣悰乃詣徳裕告之徳裕驚喜泣下寄謝重㳫宗閔復與給事中楊虞卿謀之事遂中止癸丑七年春正月加劉從諌同平章事遣歸鎮初從諌以忠義自任入朝欲請他鎮既至見朝廷事柄不一心輕朝廷故歸而益驕二月以李徳裕同平章事徳裕入朝上與之論朋黨事時給事中楊虞卿與從兄中書舍人汝士字慕巢等善交結依附權要上聞而惡之故與徳裕言首及之徳裕因得以排其所不悦者他日又復言及朋黨李宗閔曰臣素知之故虞卿輩臣皆不與美官李徳裕曰給舍非美官而何宗閔失色夏六月以李載義為河東節度使先是回鶻毎入貢所過暴掠州縣不敢詰但嚴兵防衛而已載義至鎮回鶻使者李暢入貢載義謂之曰可汗遣將軍入貢修好非遣將軍陵踐上國也將軍不戢部曲使之侵盜載義亦得殺之勿謂中國之法可忽也于是悉罷防衛兵但使二卒守其門暢畏服不敢犯令以鄭覃珣瑜子為御史大夫初李宗閔惡覃在禁中數言事奏罷其侍講上從容謂宰相曰殷侑經術頗似鄭覃宗閔對曰覃侑經術皆可尚然論議不足聴李徳裕曰覃侑議論他人不欲聞惟陛下欲聞之幸甚後旬日宣出不由宰相進擬從中宣出除覃御史大夫宗閔謂樞宻使崔潭峻曰事皆宣出安用中書潭峻曰八年天子聴其自行事亦可矣宗閔愀然而止未㡬宗閔罷為山南東道節度使秋七月以王涯同平章事兼度支鹽鐡轉運使八月詔諸王出閤停進士試詩賦上患近世文士不通經術李徳裕請依楊綰議罷詩賦又言昔元宗以臨淄王定内難疑忌宗室不令出閤議者以為幽閉骨肉虧損人倫天寶之末建中之初所以悉為安禄山朱泚所魚肉者由聚于一宫故也陛下誠能聴其年髙屬疎者出閤又除諸州上佐使携其男女出外婚嫁此則百年弊法一旦去之海内孰不欣悦上曰兹事朕久知其不可今諸王豈無賢才無所施耳于是下詔并停詩賦然諸王出閤竟以議所除官不決而罷既而徳裕罷相進士復試詩賦加盧龍節度使楊志誠右僕射初以志誠為吏部尚書志誠怒不得僕射留官告使朝廷不得已加志誠僕射别遣使慰諭之杜牧憤河朔三鎮之桀驁而朝廷議者専事姑息乃作書名罪言大畧以為上策莫如先自治中策莫如取魏最下䇿為浪戰不計地勢不審攻守是也又傷府兵廢壞作原十六衛畧曰貞觀中内以十六衛蓄飬戎臣外開折衝果毅府五百七十四以儲兵伍有事則戎臣提兵居外無事則放兵居内其居内也所部之兵散舍諸府三時耕稼一時治武籍藏将府伍散田畝力解勢破人人自愛其居外也縁部之兵被檄乃來斧鉞在前爵賞在後暴交捽豈暇異圖自開元末愚儒請罷府兵武夫請搏四夷于是府兵内剷邉兵外作尾大中乾而天下掀然根萌燼然矣葢兵居外則叛居内則簒使外不叛内不簒其置府立衛乎又作戰論以為河北視天下猶珠璣也天下視河北猶四支也河北氣俗渾厚果于戰耕加以土息健馬便于馳敵是以出則勝處則饒不窺天下之産自可封殖亦猶大農之家不待珠璣然後以為富也國家無河北則精甲鋭卒良弓健馬無有也河東盟津滑臺大梁彭城東平盡宿厚兵不可他使六鎮之師低首仰給咸陽西北戎夷大屯赤地盡取纔能應費是猶四支盡解頭腹兀然其能以是久為安乎誠能治其五敗則一戰可定四支可生戰士離落兵甲鈍弊是不蒐練之過其敗一也百人荷戈千夫仰食此不責食之過其敗二也小勝則張皇邀賞貴極富濫則不肯搜竒出死此厚賞之過其敗三也多䘮兵士顛翻大都跳身而來刺邦而去回視刀鋸氣色甚安此輕罰之過其敗四也大將兵權不得自専恩臣敕使迭來揮之此不専任之過其敗五也今誠欲調持干戈灑掃垢汙以為萬世安而乃踵前非是不可為也又作守論以為今之議者皆曰倔强之徒吾以良将勁兵為衝䇿髙位美爵充飽其膓安而不撓外而不拘亦猶豢擾虎狼而不拂其心剛忿氣不萌此大歴貞元所以宁邦也亦何必疾戰焚煎吾民然後以為快也愚曰生人油然多欲欲而不得爭亂隨之是以教笞于家刑罰于國征伐于天下此所以裁其欲而塞其爭也大歴貞元之間盡反此道提區區之有而塞無涯之爭是以首尾指支㡬不能相運掉也不知非此而反用以為經愚見為盗者非止于河北而已又注孫子為之序曰兵者刑也刑者政事也不知自何代分為二道縉紳之士不敢言兵豈知自古主兵者必聖賢才能多聞博識之士乃能有功議于廊廟之上兵形已成然後付之于将耳彼為相者安得曰兵非吾事吾不當知哉跳身謂逃至京師也刺邦謂貶為刺史也九月以鄭注為右神䇿判官注依倚王守澄權勢燻灼上深惡之侍御史李欵字言源長慶初進士閤内奉彈注請付法司旬日之間章數十上守澄匿注于右軍左軍中尉韋元素惡注軍將李宏楚説元素召而殺之因見上請罪元素從之注至蠖屈鼠伏佞辭泉湧元素不覺執手欵曲以金帛厚遺而遣之宏楚怒解職去王涯為相注有功焉且畏王守澄遂寢李欵之奏守澄言注于上而釋之尋奏為侍御史充右神䇿判官朝野駭歎後注守太僕卿兼御史大夫舉欵自代曰加臣之罪雖于理而無辜在欵之誠乃事君而盡節人皆哂之冬十二月羣臣上尊號不受羣臣上尊號㑹中使薛季稜自同華還言閭閻彫弊上歎曰闗中小稔百姓尚爾况江淮比年大水其人何如吾無術以救之敢崇虗名乎因以通天犀帶賞季稜羣臣四上表竟不受上有疾上始得風疾不能言王守澄薦鄭注上飲其藥頗有騐遂有寵然上自是神識耗減不能復故甲寅八年春正月壬午朔日食夏六月旱上以久旱詔求致雨之方司門員外郎李中敏字藏之隴西人上表曰仍嵗大旱直以宋申錫之寃濫鄭注之姦邪今斬注而雪申錫天必雨矣不從中敏乃謝病歸東都冬十月幽州軍亂逐節度使楊志誠推史元忠主留務志誠伏誅元忠獻志誠所造衮衣僭物詔流嶺南道殺之已而以元忠為盧龍節度使以李宗閔同平章事李徳裕罷為山南西道節度使李仲言為翰林侍讀學士初李仲言流象州仲言以武昭事獲罪具見前遇赦還東都㑹留守李逢吉逢吉由山南節度留守東都思復入相仲言自言與鄭注善逢吉使仲言厚賂之注引仲言見王守澄守澄薦于上言其善易仲言儀狀秀偉倜儻尚氣頗工文辭有口辯多權數上見之大悦欲以為諌官置之翰林李徳裕曰仲言曏所為計陛下必盡知之豈宜寘之近侍上曰然豈不容其改過對曰仲言之惡著于心本猶言心根安能悛改上曰逢吉薦之朕不欲食言對曰逢吉身為宰相乃薦姦邪以誤國亦罪人也上曰然則别除一官對曰亦不可上顧王涯涯對曰可徳裕揮手止之上回顧適見不懌而罷始涯聞上欲用仲言草諌疏極憤激既而見上意堅且畏其黨盛遂中變尋以仲言為四門助教給事中鄭肅韓佽封還敕書徳裕出中書王涯謂二人曰李公􅂈留語令二閣老不用封敕二人即行丁徳裕聞之大驚曰有司封駁豈當禀宰相意邪長鄭肅字乂敬滎陽人韓佽字相之安人閣老唐兩省官相呼之稱仲言及注皆惡徳裕以宗閔與徳裕不相悦引宗閔以敵之及是上遂相宗閔而出徳裕于興元以仲言為翰林侍讀學士仲言尋改名訓十一月王庭湊死子元逵自知成徳留後元逵改父所為事朝庭甚謹已而以元逵為節度使以李徳裕為鎮海節度使先是徳裕見上請留京師上以為兵部尚書及是李宗閔言徳裕制命已行不宜自便詔復以徳裕鎮浙西時徳裕宗閔各有朋黨互相擠援上患之每歎曰去河北賊易去朝中朋黨難以王璠為尚書左丞鄭注深徳璠泄宋申錫之謀事見前李訓亦與之善共薦之乙夘九月春正月浚曲江及昆明池鄭注言秦地有灾宜興役以禳之也夏四月以李徳裕為賓客分司路隋罷初徳裕為浙西觀察使漳王傅母杜仲陽坐宋申錫事放歸金陵詔徳裕存處之㑹徳裕已離浙西牒留後李蟾使如詔旨至是王璠等奏徳裕厚賂仲陽陰結漳王圖為不􅁤上怒甚路隋曰徳裕不至此果如所言臣亦應得罪乃以徳裕為賓客分司而以隋代為鎮海節度使不得靣辭而去徳裕尋復貶袁州長史制以上初得疾王涯呼徳裕問起居不至又在蜀徵逋懸錢百姓愁苦貶之以賈餗字子美河南人同平章事餗性褊躁輕率與李徳裕有隙而善于李宗閔鄭注故上用之五月以仇士良循州興寧人為神䇿中尉初宋申錫獲罪宦官益横上不能堪李訓鄭注揣知上意數以㣲言動上上意其可與謀大事遂宻以誠告之訓注遂以誅宦官為己任二人言無不從聲勢烜赫注多在禁中或時休沐賓客填門賂遺山積外人但知訓注倚宦官作威福不知其與上有宻謀也上之立也仇士良有功王守澄抑之由是有隙訓註為上謀進擢士良以分王守澄之權六月貶李宗閔為明州刺史秋七月以李固言同平章事京城訛言鄭注為上合金丹須小兒心肝民間驚懼鄭注素惡京兆尹楊虞卿與李訓共搆之云此語出于虞卿家人上怒下虞卿獄注求為兩省官李宗閔不許注毁之于上㑹宗閔救虞卿上怒叱出貶之虞卿亦貶䖍州司馬州䖍州唐置今江西贛府是以李固言為相訓注為上畫太平之䇿以為當先除宦官次復河湟次清河北開陳方畧如指諸掌上以為信寵任日隆連逐三相李徳裕路隋李宗閔威震天下于是平生絲恩髪怨無不報者時人皆言注朝夕且為相侍御史李甘揚言于朝曰白麻出我必壊之于庭遂貶封州司馬然訓亦忌注不欲使為相事竟寢今李甘字和鼎長慶末進士封州唐置肇慶府封川縣是以鄭注為翰林侍讀學士貶李珏為江州刺史注好服鹿裘以隠淪自處上以師友待之注之初得幸上嘗問翰林學士李珏曰卿知有鄭注乎對曰臣豈不知其人姦邪陛下寵之恐無益聖徳至是以注為工部尚書翰林侍讀學士珏貶江州時注訓所惡皆目為二李宗閔徳裕之黨貶逐無虛日班列殆空陳宏志伏誅時宏志為興元監軍李訓為上謀討元和之亂憲宗之崩當時皆言陳宏志弑逆事具前召之至青泥驛在漢中府畧陽縣西北青泥嶺上封杖殺之李固言罷以鄭注為鳯陽節度使初注求鎮鳯翔固言不可乃出固言鎮興元而以注為鳯翔師李訓雖因注得進及勢位俱盛心頗忌注託以中外協勢以誅宦官故出注于鳯翔其實俟既誅宦官并圖注也注請禮部員外郎韋温為副使温不可或曰拒之必為患温曰擇禍莫若輕拒之止于逺貶從之有不測之禍卒辭之以舒元輿李訓同平章事元輿為中丞凡訓注所惡者則為之彈擊由是得為相上懲二李朋黨以賈餗及元輿皆孤寒新進故擢為相庶其無黨訓起流人期年致位宰相天子傾意任之天下皆决于訓王涯輩承順其風指惟恐不逮冬十月以王涯為𣙜茶使先是涯請改江淮嶺南茶法増其税及是上問鄭注以富人之術注無以對乃請榷茶以涯為使其法籍民茶園而量給之直官自造作人甚苦之後注敗遂罷殺王守澄尹起莘曰按唐書王守澄陳宏志二人之罪維均然宏志之死封杖殺之故綱目書伏誅至王守澄則陰遣酖逼之而又加贈其官故綱目書殺今依綱目訓注為上謀誅守澄先授守澄神䇿觀軍容使尊以虚名實奪之權至是遣中使就第賜酖殺之訓注本因守澄以進卒謀而殺之人皆快守澄之受佞而疾訓注之陰狡于是元和之逆黨畧盡矣加裴度兼中書令李訓所奨㧞率皆狂險之士然亦時取天下重望以順人心如裴度令狐楚鄭覃皆累朝耆俊久在散地訓皆引居崇秩由是士大夫亦有望其真能致太平者不惟天子惑之然識者見其横甚知將敗矣十一月李訓舒元輿鄭注等謀誅宦官不克以鄭覃李石同平章事仇士良殺訓註元輿及王涯賈餗等始鄭注與李訓謀至鎮選壯士數百為親兵奏請入䕶王守澄𦵏仍請令内臣盡集送之因令親兵殺之使無遺類約既定訓與其黨謀如此事成則注専有其功乃以郭行餘元和中進士鎮邠寜王璠鎮河東使多募壯士為部曲以羅立言宣州人知京兆府事韓約郎州武陵人為金吾衛大將軍又與御史中丞李孝本宗室子謀并注去之宰相惟舒元輿與其謀他人莫知也及是日上御紫宸殿百官班定韓約奏左金吾聴事後石榴夜有甘露因蹈舞再拜宰相亦帥百官稱賀訓元輿勸上往觀以承天貺上許之先命宰相視之訓還奏非真未可宣布上顧仇士良帥諸宦者往視之宦者既去訓召行餘璠受敕璠股栗不敢前獨行餘拜殿下時二人部曲數百皆執兵立丹鳯門外訓召之入士良等至左仗韓約變色流汗士良怪之俄風吹幕起執兵者甚衆士良等驚走詣上告變訓呼金吾衛士上殿衛乗輿者人賞錢百緡宦官即舉軟輿迎上决殿後罘罳疾趣北出羅立言帥京兆邏卒三百李孝本帥御史臺從人二百皆登殿縱擊宦官死傷者十餘人訓知事不濟脱從吏緑衫衣之走馬而出王涯賈餗舒元輿還中書士良等知上豫其謀怨憤出不遜語上慙懼不復言士良等命左右神䇿兵五百人露刃出討賊殺金吾吏卒六百餘人諸司吏卒及民酤販在中者皆死又千餘人擒舒元輿王涯王璠羅立言等皆繫兩軍涯年七十餘不勝苦自誣服與李訓等謀行大逆禁兵及坊市惡少年乗勢剽掠塵埃蔽天明日百官入朝上御紫宸殿問宰相何為不來仇士良曰王涯等謀反繫獄因以涯手狀呈上上召左右僕射令狐楚鄭覃示之悲憤不自勝謂曰是涯手書乎對曰是也命楚覃參决機務使楚草制宣告中外楚叙涯等反事浮沉仇士良等不悦由是不得為相而以鄭覃李石同平章事擒獲賈餗李孝本李訓為人所殺傳其首左右神䇿出兵以訓首引涯璠立言餗元輿孝本獻于廟社狥于兩市命百官臨視腰斬于獨栁之下親屬皆死孩穉無遺數日之間殺死除拜皆决于中尉上不豫知也鄭注將親兵至扶風知訓已敗復還鳯翔監軍伏甲斬之滅其家僚屬皆死右軍獲韓約斬之士良等進階遷除有差自是天下事皆决于北司宰相行文書而已宦官自是氣益盛毎延英議事士良等動引訓注折宰相鄭覃李石曰訓注誠為亂首但不知訓注始因何人得進宦者稍屈縉紳賴之十二月召六道巡邊使還京師初王守澄惡宦者田全操等六人李訓鄭注因遣分詣鹽靈等道巡邊詔六道使殺之㑹訓注敗六道得詔皆廢不行至是召之全操等追忿訓注之謀在道揚言我入城凡儒服者盡殺之乗驛疾馳而入京城訛言冦至民驚走諸司奔散鄭覃李石在中書覃謂石曰耳目頗異宜出避之石曰宰相位尊望重人心所屬不可輕也今事虚實未可知堅坐鎮之庶㡬可定若宰相亦走則中外亂矣且果有禍亂避亦不免覃然之石坐視文案沛然自若至晡乃定以薛元賞為京兆尹時禁軍暴横京兆尹張仲方不敢詰以薛元賞代之元賞嘗詣李石第聞石方坐聴事與一人爭辯甚喧元賞使覘之云有神䇿軍將訴事元賞趣入責石曰相公紀綱四海不能制一軍將使無禮如此何以鎮服四夷即命左右擒出其黨訴于仇士良士良召之元賞曰屬有公事行當至矣乃杖殺之而白服以見士良曰中尉宰相皆大臣也宰相之人若無禮于中尉如之何中尉之人無禮于宰相庸可恕乎中尉與國同體為國惜法元賞已囚服而來惟中尉死生之士良無可如何乃呼酒與元賞歡飲而罷丙辰開成元年春二月加劉從諌檢校司徒昭義節度使劉從諌上表請王涯等罪名且言涯等荷國榮寵安肯搆逆訓等實欲討除内臣兩中尉仇士良魚宏志遂誣以反逆若其實有異圖亦當委之有司正其刑典豈有内臣擅領甲兵恣行剽刦延及士庶横被殺傷臣欲身詣闕庭面陳臧否恐并䧟拏戮事亦無成謹當修飭封疆訓練士卒如姦臣難制誓以死清君側仇士良等懼乃加從諌檢校司徒從諌復表讓曰臣之所陳繫國大體可聴則涯等宜䝉湔洗不可聴則賞典不可妄加安有死寃不申而生者荷禄因暴揚士良等罪惡士良等憚之由是鄭覃李石粗能秉政天子倚之亦差以自彊三月詔京兆收𦵏王涯等令狐楚從容奏王涯等身死族滅遺骸棄捐請收􅄟之上慘然久之命京兆收𦵏涯等十一人仇士良潛使人發之棄骨渭水夏四月以李固言同平章事固言薦崔球李宗閔之黨為起居舍人鄭覃以為不可上曰公事莫相違覃曰若宰相盡同則事必有欺陛下者矣上與宰相語患四方表奏華而不典李石對曰古人因事為文今人以文害事上又嘗與宰相論詩覃曰詩之工者無若三百篇皆國人作之以刺美時政王者采之以觀風俗耳不聞王者為詩也陳後主隋煬帝皆工于詩不免亾國陛下何取焉覃篤于經術上甚重之秋七月以魏謩字申之徵五世孫為補闕李孝本二女配没右軍上取之入宫拾遺魏譽上疏曰竊聞數月以來教坊選試以百數莊宅收市猶未已又召李孝本女不避宗姓大興物論臣竊惜之上即出之擢謩為補闕謂曰朕選市女子以賜諸王耳憐孝本女孤露故收養宫中謩于疑似之間皆能盡言可謂愛我不忝厥祖矣命中書優為制辭以賞之謩後為起居舍人上就取記注觀之謩不可曰記注兼書善惡所以儆戒人君陛下但力為善不必觀史上曰朕曏嘗觀之對曰此曏日史官之罪也若陛下自觀史則史官必有所諱避何以取信于後上乃止又嘗命謩獻其祖文貞公笏鄭覃曰在人不在笏上曰亦甘棠之比也丁巳二年春三月彗星見彗星出于張長八丈餘詔撤樂減膳以一日之膳分充十日夏四月以栁公權為諌議大夫上對中書舍人栁公權等于便殿上舉衫袖示之曰此衣已三澣矣時衆皆美上之儉徳公權獨無言上問其故對曰陛下貴為天子富有四海當進賢退不肖納諌諍明賞罰乃可以致雍熙服澣濯之衣乃末節耳上曰中書舍人不應復為諌議以卿有諍臣風采湏屈卿為之故有是命以陳夷行字周道其先江左諸陳世家潁川同平章事夷行性介直同位多相牴牾獨與鄭覃善每議政事嘗助之是冬李固言罷為西川節度使冬十月國子監石經成在今西安府學内初鄭覃奏經籍訛繆請令儒臣校正凖後漢熹平故事蔡邕書石經事見前勒石太學從之既而覃以宰相判國子監奏以起居郎周墀字徳升汝南人等勘定文字旋令上石至是始成考舊唐書鄭覃所立石經官校字體有乖師法立後數十年名儒皆不窺之即今西安府學石經是也天祐中韓建改築長安新城石皆委棄城外宋元祐中吕大防始移今學年嵗久逺剥泐殘闕後人别為摹補刻立小石于碑旁開成舊本所存什之五六而已戊午三年春正月以楊嗣復字繼之於陵子李珏同平章事李石罷為荆南節度使上自甘露之變意忽忽不樂或徘徊眺望或獨語歎息嘗為宰相曰朕毎讀書恥為凡主然與卿等論天下事有勢未得行者退但飲醇酒求醉耳時宦官恣横李石􅁯身狥國故綱紀粗立仇士良深惡之潛遣盜殺之不果石入朝盜射之微傷馬驚馳歸又有盜邀擊于坊門斷其馬尾僅而得免上大驚詔中外捕盜甚急竟無所獲石懼辭位上深知其故而無如之何從之以李宗閔為杭州刺史楊嗣復欲援進宗閔恐為鄭覃所沮乃先令宦官諷上上以語宰相覃果對曰陛下若憐宗閔只可量移若欲用之臣請避位陳夷行亦曰宗閔纎人曏以朋黨亂政陛下奈何愛之楊嗣復曰事貴得中覃等因與嗣復互相詆訐上曰與一州無傷覃等退上謂魏謩曰宰相諠爭如此可乎對曰誠為不可然覃等盡忠憤激不自覺耳李固言素與嗣復珏善固言既罷引二人居大政以排鄭覃陳夷行毎議政之際是非蜂起上不能决也夏五月禁諸道言祥瑞太和之末杜悰鎮鳯翔時有詔沙汰僧尼㑹有五色雲見于岐山近法門寺民間訛言佛骨降祥以僧尼不安之故監軍欲奏之悰曰雲物變色何常之有未㡬獲白兎監軍又欲奏之悰曰野獸未馴且宜蓄之旬日而斃監軍不悦畫圖獻之已鄭注代悰奏紫雲見又獻白雉是嵗遂有甘露之變及悰判度支河中奏騶虞見百官稱賀上謂悰曰李訓鄭注皆因瑞以售其亂乃知瑞物非國之慶卿在鳯翔不奏白兎真先覺也對曰昔河出圖伏羲以畫八卦洛出書大禹以叙九疇皆有益于人故足尚也至于禽獸草木之瑞何時無之劉聰桀逆黄龍三見季龍暴虐得蒼麟白鹿以駕紫葢以是觀之瑞豈在徳願陛下専以百姓富安為國慶自餘不足取也上善其言遂詔諸道皆勿以祥瑞聞秋八月詔神䇿將吏改官皆先奏聞開成以來神䇿將吏遷官多不奏聞直牒中書令覆奏施行遷改殆無虚日至是始詔皆先奏聞狀至中書然後檢勘施行冬十月太子永卒初太子永之母王徳妃無寵為楊賢妃所譖而死太子頗好遊宴昵近小人賢妃日夜毁之上召宰相及兩省御史郎官議廢之皆言太子年少容有改過國本至重豈可輕動中丞狄兼謩論之尤切至于流涕給事中韋温曰陛下惟一子不教䧟之至是豈獨太子之過乎翰林及神䇿六軍使數十人復表論之上意稍解宦官宫人坐流死者數十人至是暴薨通鑑考異曰太子永非良死也但宫省事秘外人莫知其詳故第云暴薨吐蕃􅉓泰贊普死弟逹磨立􅉓泰多病委政大臣僅能自守故不為邊患逹磨荒滛殘虐國人不附灾異相繼吐蕃益衰己未四年春三月司徒中書令晉公裴度卒謚曰文忠度鎮河東以疾求歸東都詔入知政事正月至京師不能入見勞賜旁午至是卒上怪度無遺表問其家得半藁以儲嗣未定為憂言不及私度身貎不踰中人而威望逺逹四夷四夷見唐使輙問度老少用捨以身繫國輕重如郭子儀者二十餘年夏五月鄭覃陳夷行並罷上與宰相論政事陳夷行言不宜使威權在下李珏曰夷行意疑宰相中有弄陛下威權者耳臣屢求退茍得王傅臣之幸也鄭覃曰陛下開成元年二年政事殊美三年四年殆不如前楊嗣復曰元年二年覃夷行用事三年四年臣與李珏同之罪皆在臣因叩頭曰臣不敢更入中書遂趨出上召還勞之覃起謝曰此乃嗣復不容臣耳嗣復曰覃言政事一年不如一年非獨臣應得罪亦上累聖徳退三表辭位上召出之而罷覃及夷行覃性清儉夷行亦耿介故嗣復等深疾之秋七月以崔鄲郾之弟同平章事鄭覃陳夷行既罷鄲以太常卿入相冬十月立陳王成美為皇太子楊妃請立皇弟安王溶穆宗第八子為嗣上謀于宰相李珏非之乃立敬宗少子成美為皇太子上幸㑹寜殿有童子縁一夫往來走其下如狂上怪之左右曰其父也上泫然流涕曰朕貴為天子不能全一子召教坊劉楚材宫人張十十等數人責之曰搆害太子皆爾曹也付吏殺之因是感傷舊疾遂増十一月疾少間坐思政殿召當直學士周墀問曰朕可方前代何主對曰陛下堯舜之主也上曰朕豈敢比堯舜所以問卿者何如周赧漢獻耳墀驚曰彼亡國之主豈可比聖徳上殆曰赧獻受制于彊諸侯今朕受制于家奴以此言之不如也因泣下沾襟墀伏地流涕自是不復視朝回鶻相掘羅勿弑彰信可汗掘羅勿引沙陀兵共攻可汗可汗自殺國人立㕎馺特勒為可汗㑹嵗疫大雪羊馬多死囬鶻遂衰庚申五年春正月帝不豫宦官仇士良魚𢎞志矯詔立潁王瀍穆宗第五子為皇太弟廢太子成美為陳王帝崩瀍殺成美遂即位是為武宗目考太弟之立仇士良魚宏志所為也綱于提綱不書士良等矯詔而分注載之綱與目義例不符今依唐書帝紀改書上疾甚命知樞宻劉宏逸薛季稜引楊嗣復李珏至禁中欲奉太子監國中尉仇士良魚宏志以太子之立功不在已乃言太子㓜且有疾矯詔立瀍為太弟成美復封陳王越二日上崩士良説太弟賜楊賢妃安王溶陳王成美死太弟遂即位時敕大行以十四日殯成服諫議大夫裴夷直上言期日太逺不聴士良等追怨文宗凡樂工及内侍得幸者誅貶相繼夷直復上言陛下繼統宜速行喪禮早議大政以慰天下而未及數日屢誅戮先帝近臣驚率土之視聴傷先帝之神靈國體至重若使此輩無罪固不可刑若其有罪旬日何晩又不聴裴夷直字禮卿河東人秋八月𦵏章陵在西安府富平縣西北天乳山文臣曰文宗恭儉儒雅大和之初政事修飭號為清明然仁而少斷宦官撓權制之不得其術故其終困以此云九月以李徳裕同平章事初上之立非宰相意于是楊嗣復李珏相繼罷去五月嗣復罷以崔珙同平章事八月李珏亦罷崔珙博陵人召徳裕而相之徳裕入謝言于上曰致理之要在于辨羣臣之邪正夫邪正二者勢不相容正人指邪人為邪邪人亦指正人為邪人主辨之甚難臣以為正人如松柏特立不倚邪人如藤蘿非附他物不能自起故正人一心事君而邪人競為朋黨先帝深知朋黨之患然所用卒皆朋黨之人良由執心不定故姦邪得乗間而入也夫宰相不能人人忠良或為欺罔主心始疑于是旁詢小人以察執政如徳宗末年所聴任者惟裴延齡輩宰相署敕而已此政事所以日亂也陛下誠能慎擇賢良以為宰相有姦㒺者立黜去之常令政事皆出中書推心委任堅定不移則天下何憂不理哉又曰先帝于大臣好為形迹小過皆含容不言日累月積以至禍亂兹事大誤願陛下以為戒臣等有罪陛下當面詰之小過則容其悛改大罪則加之誅譴如此君臣之際無疑間矣上嘉納之冬十月黠戞斯注見前攻回鶻破之回鶻嗢没斯欵塞求内附黠戞斯部落即古堅昆唐初結骨也注俱見前乾元中為囬鶻所破不通中國其人悍勇吐蕃回鶻常賂遺之假以官號回鶻既衰其酋長阿熱始自稱可汗回鶻擊之連兵三十餘年反為所敗㕎馺破殺諸部逃散可汗兄弟嗢没斯等及其相赤心那頡啜各帥其衆抵天徳塞下貿穀食且求内附天徳軍使温徳􅉓奏回鶻潰兵侵逼西城詔振武節度使劉沔字汪彭城人屯雲迦闗唐書地理志單于府有雲迦闗單于府今歸化城是以備之魏博節度使何進滔卒子重順知留後重順尋為節度使賜名宏敬十一月以李中敏為婺州刺史内謁者監仇士良請以開府蔭其子為千牛給事中李中敏判云開府階誠宜蔭子謁者監何由有兒士良慙恚李徳裕亦以中敏為楊嗣復之黨惡之出為刺史武宗皇帝辛酉㑹昌元年春三月殺知樞宻劉宏逸薛季稜貶楊嗣復李珏逺州刺史裴夷直驩州司馬劉宏逸薛季稜有寵于文宗仇士良惡之上之立非二人及宰相意故楊嗣復李珏既罷士良屢勸上除宏逸等于是賜二人死仍遣中使就誅嗣復及珏杜悰奔馬見李徳裕曰天子年少新即位兹事不宜手滑時陳夷行方復相是月夷行以御史大夫同平章事徳裕乃與夷行及崔珙崔鄲三上奏請開延英賜對遂入泣涕極言上命之坐者三徳裕等曰臣等願陛下免嗣復珏二人死勿使既死而衆以為寃今未奉聖㫖臣等不敢坐久之上乃曰特為卿等釋之徳裕等躍下堦舞蹈上召升坐歎曰朕嗣位之際宰相何嘗比數李珏季稜志在陳王嗣復𢎞逸志在安王陳王猶是文宗遺意安王専附楊妃曏使安王得志朕那復有今日徳裕等曰兹事曖昩虚實難知遂追還二使更貶嗣復等夏六月詔羣臣言事毋得乞留中詔臣下言人罪惡並應請付御史臺按問毋得乞留中以杜讒邪其後上復謂宰相曰文宗好聴外議諫官言事多不著名有如匿名書李徳裕曰臣頃在中書文宗猶不爾此乃李訓鄭注教文宗以術御下遂成此風人主但當推誠任人有欺㒺者威以明刑孰敢哉上善之上受法籙于趙歸真拾遺王哲切諌坐貶秋九月詔河東振武備回鶻先是回鶻諸部奉烏介特勒為可汗及是天徳軍使田牟布之弟欲擊回鶻以求功奏稱回鶻叛將嗢没斯等侵逼塞下請自出兵驅逐上命朝臣議之議者以為擊之便李徳裕曰窮鳥入懷猶當活之况回鶻屢建大功今為鄰國所破逺依天子未嘗犯塞奈何乗其困而擊之宜遣使者鎮撫賜以糧食此漢宣帝所以服呼韓邪也上問徳裕嗢没斯降可保信乎對曰朝中之人臣不敢保况敢保數千里外戎狄之心乎然嗢没斯自去年九月至天徳今年二月烏介始立自無君臣之分豈可謂之叛將願且詔河東振武嚴兵保境以備之仍詔田牟毋得邀功生事從之已而嗢没斯誘殺赤心擊走那頡啜率所部來降詔以嗢没斯為懐化郡王賜姓李氏名思忠以其所部為歸義軍赤心那頡啜俱見上盧龍軍亂冬十月雄武軍使張仲武范陽人討平之詔以仲武知留後初盧龍軍亂殺節度使史元忠推牙將陳行泰主留務表求節鉞李徳裕曰河朔事勢臣所熟諳比來朝廷遣使太速故軍情遂固若置之數月不問必自生變今請勿遣使以觀之既而軍中果殺行泰立張絳復求節鉞朝廷亦不問雄武軍使張仲武起兵擊絳且遣軍吏呉仲舒奏表以聞詔宰相問狀仲舒言行泰絳皆遊客故人心不附仲武幽州舊將性忠義通書習事人心向之計今軍中己逐絳矣李徳裕問雄武士卒㡬何對曰軍士土團合千餘人徳裕曰兵少何以立功對曰在得人心不在兵多徳裕又問萬一不克如何對曰幽州糧食皆在媯州及北邊七鎮萬一不能入則據居庸闗絶其糧道幽州自困矣七鎮唐書地理志檀州有大王北來保要鹿固赤城邀虜石子䴚七鎮居庸闗亦曰軍都闗在今順天府昌平州西北即吕氏春秋九塞之一于是李徳裕奏行泰絳皆使大將上表脇朝廷邀節鉞故不可與今仲武表請討亂與之有名乃以仲武知盧龍留後仲武尋克幽州已而以仲武為盧龍節度使十二月遣使慰問太和公主公主下嫁回鶻事具前回鶻烏介可汗先是黠戞斯自謂李陵之後與唐同姓既破回鶻得太和公主遣逹干十人奉以歸唐時朝廷未之知李徳裕請遣使齎詔詣嗢没斯訪問公主所在從之及是回鶻烏介可汗引兵邀擊黠戞斯逹干殺之刼公主南渡磧屯天徳軍境上公主遣使上表為可汗求册命烏介又使其相上表借振武一城以居上乃遣使慰問賑米二萬斛上賜烏介可汗敕書喻以宜率部衆漸復舊疆漂寓塞垣殊非良計借城未有此比或欲但求聲援亦湏且于漠南駐止朕當許公主入覲親問事宜倘湏接應必無所吝尋遣使行冊命而烏介屢擾邉境遂不果行壬戌二年春二月以李紳同平章事先是崔鄲罷為西川節度使及是紳由淮南入朝遂相以栁公權為太子詹事散騎常侍栁公權素與李徳裕善崔珙奏為集賢學士徳裕以恩非已出因事左遷之三月以劉沔為河東節度使初上以回鶻近塞遣兵部侍郎李拭鄘之子巡邊察將帥能否拭還稱沔有威畧可任大事遂以沔鎮河東夏四月羣臣上尊號上信任李徳裕仇士良惡之㑹上受尊號將御樓宣敕士良揚言于衆曰宰相與度支議減禁軍衣糧芻粟如此則軍士必于樓前諠譁徳裕聞之自訴于上上怒遽遣中使宣諭兩軍初無此事且赦出朕意非由宰相士良乃惶愧稱謝秋七月以李讓夷字逹心隴西人同平章事陳夷行罷遂以讓夷同平章事八月回鶻入冦詔諸道出兵禦之先是屢詔烏介可汗帥衆北還烏介不奉詔至是突入大同川注見前驅掠河東雜虜牛馬數萬轉鬬至雲州唐置今山西大同府是詔諸州發兵俟來春討之九月以白敏中字用晦居易從弟為翰林學士上聞白居易名欲相之以問李徳裕徳裕素惡居易乃言居易病衰不任朝謁其從弟敏中辭學不減居易且有器識故有是命冬十一月以髙少逸渤海人為給事中鄭朗字有融覃之弟為諌議大夫初上頗好畋獵及武戲五坊小兒賞賜甚厚嘗謁太后從容問為天子之道太后勸以納諌上退閲諌䟽多以遊獵為言自是出畋稍希五坊無復横賜至是復幸涇陽校獵諌官髙少逸鄭朗諌曰陛下比來遊畋稍頻出城太逺侵星夜歸萬㡬曠廢上改容謝之謂宰相曰本置諌官使之論事朕欲時時聞之宰相皆賀乃遞遷以賞之吐蕃逹磨贊普死初逹磨普贊有佞幸之臣史闕其名以為相逹磨卒無子佞相立其妃綝氏兄子乞離胡纔三嵗首相結都邪見之不拜曰贊普宗族甚多而立綝氏子國人誰服其令鬼神誰饗其祀國必亡矣因㧞刀􅋇面慟哭而出佞相殺之國人憤怨其將論恐熱悍忍多詐以誅綝妃佞相為名舉兵大破其國兵有衆十餘萬癸亥三年春正月劉沔大破回鶻迎太和公主以歸回鶻烏介可汗侵逼振武劉沔遣石雄徐州人帥沙陀朱邪赤心執宜子後賜姓名曰李國昌三部襲其牙帳沔自以大軍繼之雄至振武登城望回鶻見氊車數十乗從者類華人使諜問之曰公主帳也雄使諜告之曰公主至此當求歸路今將出兵擊可汗請公主駐車勿動雄乃鑿城為十餘穴引兵夜出真攻可汗牙帳可汗大驚棄輜重走雄追擊大破之于殺虎山即黒山在今歸化城界可汗被創遁去保黒車子族室韋别種在突厥北善作車帳故以為號雄迎公主以歸已而公主至京師詔宰相百官迎謁公主詣光順門去盛服脱簪珥詡和親無状之罪上遣中使慰諭然後入宫二月庚申朔日食三月以太僕卿趙蕃為安撫黠戞斯使先是黠戞斯遣使獻名馬二詔太僕卿趙蕃飲勞之上欲令蕃就求安西北庭李徳裕等言安西去京師七千餘里北庭五千餘里借使得之當復置都䕶戍兵萬人不知此兵于何處追發饋運從何道得通此乃用實費以易虗名非計也上乃止黠戞斯求册命上恐其不修臣禮復求嵗遺及賣馬李徳裕曰回鶻有平安史之功故有嵗賜和市黠戞斯未嘗有功於中國豈敢遽及賂遺若慮其不臣當與之約必稱臣叙同姓執子孫禮乃行冊命上以為然乃以趙蕃為安撫使命徳裕草書賜之曰貞觀中黠戞斯先君身自入朝朝貢不絶回鶻陵虐諸蕃可汗能復讐雪怨茂功壯節近古無儔今其殘兵不滿千人湏盡殱夷勿留餘燼又聞可汗與我同族國家承北平太守謂李廣之後可汗乃都尉謂李陵苗裔以此合族尊卑可知今欲册命可汗且遣趙蕃喻意自回鶻至塞上及黠戞斯入貢毎有詔敕上多命徳裕草之徳裕請委翰林上曰學士不能盡人意湏卿自為之贈悉怛謀右衛將軍李徳裕追論維州悉怛謀事上言維州㨿髙山絶頂三面臨江在戎虜平川之衝是漢地入兵之路初河隴盡没惟此獨存吐蕃潜以婦人嫁此州門者三十年後兩男長成竊開壘門引兵夜入遂為所䧟號曰無憂城從此憑陵近甸旰食累朝臣到西蜀外揚國威中緝邉備維州熟臣信令空璧來歸南蠻震懾山西八國皆願内屬可減八處鎮兵坐收千餘里舊地且維州末降前一年吐蕃猶圍魯州豈顧盟約當時不與臣者望風疾臣詔執送悉怛謀等今彼自戮臣累表陳論答詔嚴切竟令執還蕃帥即以此降人戮于境上絶忠欵之路快兇虐之情乞追奨忠魂各加褒贈魯州河曲六胡州之一在宥州西故有是命夏四月李徳裕乞罷不許徳裕乞閑局上曰卿每辭位使我旬日不得所今大事皆未就卿豈可求去昭義節度使劉從諌卒其子稹自為留後詔諸道發兵討之初從諌累表言仇士良罪惡遂與朝廷相猜恨及疾病與幕客張谷等謀效河北諸鎮以弟之子稹為都知兵馬使至是卒稹秘不發喪逼監軍崔士康奏稱從諌疾病請命其子稹為留後上謀于宰相多以為回鶻餘燼未滅復討澤潞國力不支李徳裕獨曰澤潞事與河朔三鎮不同河朔習亂已久人心難化是故累朝以來置之度外澤潞近處腹心一軍素稱忠義如李抱真成立此軍徳宗猶不許承襲敬宗不恤國務宰相又無逺略劉悟之死因授從諌使其䟦扈垂死之際復以兵權擅付豎子若又因而授之則諸鎮誰不思效其所為天子威令不復行矣上曰卿以何術制之果可克否對曰稹所恃者三鎮但得鎮魏不與之同則稹無能為也若遣重臣往諭王元逵何宏敬以河朔傳襲已成故事與澤潞不同今將加兵澤潞不欲更出禁軍其山東三州謂邢洛磁委兩鎮攻之賊平之日將士並厚加官賞茍兩鎮聴命不從旁沮撓官軍則稹必成禽矣上喜曰吾與徳裕同之保無後悔遂决意討稹命徳裕草詔賜元逵宏敬略曰澤路一鎮與卿事體不同勿為子孫之謀欲存輔車之勢但能顯立功效自然福及後昆上稱其語切要曰當如此直告之也又賜張仲武詔令専禦回鶻元逵宏敬得詔悚息聴命先是崔士康表至上遣供奉官薛士幹往諭從諌使就東都療疾遣稹入朝士幹入境不問從諌之疾直為己知其死者都押牙郭誼兖州人等大出兵迎之請用河朔事體遂扶稹出見將士發喪不受敕命徳裕又以議者多言劉悟有功稹未可亟誅請下百官議上曰悟迫于救死耳非素心狥國也藉使有功父子為將相二十餘年國家報之足矣稹何得復自立朕以為凡有功當顯貴有罪亦不可茍免也於是制削奪從諌及稹官爵以王元逵何宏敬為招討使與河東節度使劉沔河陽節度使王茂元栖曜子合力攻討先是河北諸鎮有自立者朝廷必先有弔祭使冊贈使宣慰使繼往商度然後用兵故常及半嵗軍中得以為備至是宰相亦欲遣使上即下詔討之元逵受詔即日出師屯趙州詔又以李彦佐為晉絳行營招討使五月以崔鉉字台碩元畧子同平章事上夜召學士韋琮字禮玉萬年人以鉉名授之令草制宰相樞宻皆不之知時樞宻使劉行深楊欽義皆愿慤不敢預事老宦者尤之曰皆由楊劉懦怯墮敗舊風故也築望仙觀於禁中六月内侍監仇士良致仕上外尊寵士良内實忌之士良頗覺遂以老病致仕其黨送歸私第士良教之曰天子不可令閑常宜以奢靡娯其耳目使日新月盛無暇更及他事然後吾輩可以得志慎勿使之讀書親近儒生彼見前代興亾心知憂懼則吾輩踈斥矣其黨拜謝而去吐蕃論恐熱攻尚婢婢姓没盧名贊心牙羊同國人于鄯州本唐地没于吐蕃吐蕃鄯州節度使尚婢婢好讀書不樂仕進國人敬之年四十餘􅉓泰贊普彊起之使鎮鄯州婢婢寛厚沈勇有謀畧論恐熱謀纂國恐婢婢襲其後舉兵擊之婢婢謂其下曰恐熱之來以我為不足屠也不如迎伏以驕之然後可圖也乃遣使犒師且致書深自卑屈恐熱喜曰婢婢惟把書卷不知用兵待吾得國當位以宰相坐之于家無所用也乃引兵歸婢婢笑曰我國無主則歸大唐豈能事此犬䑕乎已而婢婢擊恐熱大破之恐熱單騎走歸尋復擊婢婢又大敗于是婢婢傳檄河湟曰汝輩本唐人吐蕃無主則相與歸唐無為恐熱所獲也秋七月以盧鈞為昭義節度使朝廷以鈞在襄陽有恵政得衆心故使領昭義以招懷之遣御史中丞李回字昭度新興王徳良六世孫宣慰河北三鎮詔遣御史中丞李回宣慰河北令幽州早平回鶻鎮魏早平澤潞回至河朔宏敬元逵仲武皆具櫜鞬郊迎立于道左不敢令人控馬讓制使先行自兵興以來未之有也回明辯有膽氣三鎮無不奉詔以石雄為晉絳行營節度副使李徳裕言曏日河朔用兵諸道利于出境仰給度支或陰與賊通借一縣一柵據之自以為功坐食轉輸延引嵗時今請詔諸軍令王元逵取邢州何𢎞敬取洺州王茂元取澤州李彦佐劉沔取潞州毋得取縣上從之彦佐行甚緩徳裕請賜詔切責仍以石雄為副因以代之已而雄代彦佐為節度使受代之明日即踰烏嶺破五寨上得㨗書喜甚謂宰相曰雄真良將徳裕因言比年潞州市有男子磬折唱曰石雄七千人至矣劉從諌以為妖言斬之破潞州者必雄也詔賜雄帛雄悉置軍門自取一匹餘分將士故士卒樂為致死烏嶺山名在平陽府翼城縣東北與澤州府沁水縣接界八月詔忠武節度使王宰智興子趨磁州何宏敬㧞肥鄉三國魏縣今屬廣平府平恩漢縣故城在今廣平府曲周縣先是王元逵擊敗昭義兵㧞宣務柵在今順徳府唐山縣東北以宣務山名詔加元逵同平章事及是元逵前鋒入邢州境已踰月何宏敬猶未出師元逵宻表宏敬懷兩端李徳裕言忠武累戰有功軍聲頗振王宰年力方壯謀畧可稱請詔宰將忠武全軍徑魏博抵磁州以分賊勢宏敬必懼此攻心伐謀之術也從之宏敬聞宰將至蒼黄出師㧞肥鄉平恩殺賊甚衆上曰宏敬已㧞兩縣可釋前疑既有殺傷雖欲持兩端不可得矣九月以王宰兼河陽行營攻討使時劉稹使牙将薛茂卿攻䧟河陽科斗寨㑹河陽節度使王茂元有疾李徳裕請以王宰為河陽行營攻討使使亟以軍援河陽兼可臨制魏博從之茂元尋卒宰遂進克天井闗忠孝軍素號精勇王宰治軍嚴整賊甚憚之薛茂卿以科斗寨之功劉稹不加重賞怨之宻進欵于宰宰引兵攻天井闗茂卿小戰遽走遂克之茂卿入澤州遣諜知宰許為内應事覺為稹所殺冬十月以劉沔為義成節度使李石為河東節度使沔與張仲武有隙沔破回鶻獨迎太和公主以歸故仲武疾之朝廷恐其以私憾敗公故徙之甲子四年春正月河東都將楊弁作亂討平之初河東行營兵馬使王逢沛之子奏乞益榆社隋縣今属山西遼州詔河東以兵二千赴之時河東無兵李石召横水戌在大同府西北卒千五百人使楊弁将之詣逢舊制軍士出征人給絹二匹劉沔之去自河東徙義成竭府庫以自隨石初至時軍用乏以已絹益之人纔得一匹時已歳盡軍士求過正旦而行監軍吕義忠趨之弁遂作亂石奔汾州弁據軍府使其侄詣劉稹約為兄弟朝議喧然言兩地皆應罷兵李徳裕上言太原人心從來忠順止是貧虚賞犒不足况千五百人何能為必不可縱且用兵未罷深慮所在動心望詔李石還赴太原召兵討亂上從之詔王逢留太原兵守榆社以易定汴兖兵還討弁又遣中使馬元實至太原曉諭且覘之元實受弁賂還于衆中大言相公湏早與之節徳裕曰何故元實曰身牙門至栁子列十五里曵地光明甲若之何取之徳裕曰李相正以無兵故發横水兵赴榆社弁何能遽至如此之衆乎元實曰召募所致耳徳裕曰召募湏有貨財李相正以欠軍士絹一匹故致此亂弁何從得之元實辭屈徳裕曰縱其有十五里光明甲必湏殺此賊府栁子即栁林在太原太原縣東南河東兵戍榆社者聞朝廷令客軍取太原恐妻孥為所屠滅乃擁監軍呂義忠自取太原擒楊弁盡誅亂卒送弁京都并其黨斬之三月甲寅朔日食以劉沔為河陽節度使李徳裕言于上曰事固有激發而成功者陛下命王宰趨磁州而何𢎞敬出師遣客軍討太原而戍卒先取楊弁令王宰久不進軍請徙劉沔鎮河陽仍令以義成精兵二兵直抵萬善鎮名在懐慶府河内縣北處宰肘腋之下若宰識此意必不敢淹留若宰進兵沔以重兵在南聲勢亦壯上從之以劉濛字仁澤晏之孫為巡邊使朝廷以回鶻衰微吐蕃内亂議復河湟四鎮即西安四鎮見前十八州謂太原河渭蘭鄯階成洮岷臨廓壘宕甘凉𤓰沙十八州乃遣給事中劉濛巡邊使先備器械糗糧令天徳振武河東訓卒礪兵以俟今秋以趙歸真為道門教授先生上好神仙歸真得幸李徳裕諌曰歸真敬宗朝罪人不宜親近上曰朕宫中無事時與之談道滌煩耳至于政事朕必問卿等與次對官雖百歸真不能惑也徳裕曰小人見勢所在則奔趣之旬日以來歸真之門車馬輻輳願陛下深戒之夏六月減州縣冗員李徳裕以州縣佐官太冗奏令吏部郎中栁仲郢字諭䝉公綽子裁減凡一千二百一十四員詔削仇士良官爵籍没家貲宦官有發士良宿惡于其家得兵仗數千故有是命秋七月以杜悰同平章事上聞揚州倡女善為酒令敕監軍選而獻之監軍請節度使杜悰不從監軍怒表其狀左右因請敕悰同選上曰敕藩方選倡女入宫豈聖天子所為杜悰得大臣體朕甚愧之遽敕勿選召悰入相勞之曰卿不從監軍之言朕知卿致君之心今相卿如得一魏徵矣悰既相李紳罷為淮南節度使八月邢洺磁三州降郭誼斬劉稹以降稹少年懦弱押牙王恊兵馬使李士貴用事専聚貨財府庫充溢而將士有功無賞由是人心離怨邢州將裴問請降于王元逵洺州守將王釗磁州守將安玉請降于何宏敬李徳裕曰昭義根本盡在山東三州降則上黨不日有變矣上曰郭誼必梟劉稹以自贖徳裕曰誠如聖料上曰于今所宜先處者何事徳裕曰萬一鎮魏請占三州朝廷難于可否請以給事中盧宏止字子彊蒲州人為三州留後上從之并詔盧鈞乗驛赴鎮鈞先領昭義節度潞人聞三州降大懼郭誼與王協謀使人説稹以兵授誼束身歸朝稹許之誼遂殺稹滅其族函首遣使奉表降于王宰宰以狀聞宰相入賀上曰郭誼宜如何處之徳裕對曰劉稹騃孺子耳阻兵拒命皆誼為之謀主及勢孤力屈又賣稹以求賞此而不誅何以懲惡宜及諸軍在境并誼等誅之上曰朕意亦以為然乃詔石雄將七千人入潞州以應謡言事見前昭義五州給復一年諸道將士等級加賞雄至潞州盡執誼等送京師皆斬之盧鈞素寛厚愛人及是赴鎮散卒歸之者皆厚撫之人情大洽昭義遂安加李徳裕太尉賜爵衛國公加李徳裕太尉衛國公徳裕辭上曰恨無官賞卿耳初徳裕以比年將帥出征屢敗其弊有三一者詔令下軍前者日有三四宰相多不預聞二者監軍各以意見指揮軍事將帥不得専進退三者每軍各有宦者為監使悉選軍中驍勇數百為牙隊其在陳戰鬬者皆怯弱之士每戰視事勢小却輙引旗先走陳從而潰徳裕乃與樞宻使楊欽義劉行深議約敕監軍不得預軍政每兵千人聼取十人自衛有功隨例霑賞二樞宻皆以為然白上行之自禦回鶻至澤潞罷兵皆守此制自非中書所草詔更無他詔自中出者號令既簡將帥得以施其謀畧故所向有功元和後數用兵宰相或不休沐或繼火乃得罷徳裕從容裁決率午漏下還第休沐輙如令沛然若無事時河北三鎮毎遣使者至京師徳裕常面諭之曰河北兵力雖彊不能自立湏藉朝廷官爵威命以安軍情歸語汝使與其使大將邀敕使以求官爵何如自奮忠義立功立事結知明主乎由是三鎮不敢有異志冬十一月貶牛僧孺為循州長史流李宗閔于封州注見前李徳裕言于上曰劉從諌據上黨十年太和中入朝僧孺宗閔執政不留之加宰相縱去以成今日之患又使昭義孔目官鄭慶言從諌每得二人書疏皆自焚毁河南少尹李述與徳裕書言僧孺聞稹破失聲歎恨徳裕奏之上大怒貶僧孺等初甘露之變李訓王涯賈餗等子弟數人皆歸從諫至是皆為郭誼所殺徳裕復下詔稱逆賊涯餗已就昭義誅其子孫識者非之乙丑五年羣臣上尊號李徳裕等請上尊號上不受凡五上表乃許義安太后王氏敬宗母崩謚恭僖𦵏光陵東園夏五月以李回同平章事杜悰崔鉉罷回以户部侍郎同平章事判户部如故册黠戞斯為英武誠明可汗詔以陜虢觀察使李拭充册使拭未行㑹帝崩事遂寢大中初復遣使册之秋七月丙午朔日食詔毁天下佛寺僧尼並勒歸俗上惡僧尼耗蠧天下欲去之道士趙歸真等復勸之乃先毁山野招提有常住之寺蘭若釋氏靜室至是敕上都東都各留二寺每寺留僧三十人天下節鎮各留一寺寺分三等留僧有差餘僧及尼並勒歸俗寺皆立期毁撒仍遣御史分道督之財貨田産並没入官寺材以葺公廨驛舍銅像鐘磬以鑄錢凡天下所毁寺四千六百餘區招提蘭若四萬餘區歸俗僧尼二十六萬五百人收良田數千萬頃奴婢十五萬人九月置備邊庫李徳裕請置備邊庫令户部嵗入錢帛十二萬緡匹度支鹽鐵嵗入錢帛十三萬緡匹明年減其三之一凡諸道所運助軍財貨皆入焉以度支郎中判之冬十月以衡山道士劉元靜為崇元舘學士元靜固辭還山許之十二月貶給事中韋宏質官劉友益曰不言所貶之官史失之也失之而書病徳裕也李徳裕秉政日久好狥愛憎人多怨之左右言其太専上亦不悦給事中韋宏質上疏言宰相權重不應更領三司錢穀徳裕奏曰制置職業人主之柄宏質受人教道所謂賤人圖柄臣非所宜言宏質貶官由是衆怒愈甚詔罷來年正旦朝㑹初上餌方士金丹性加躁急喜怒不常問李徳裕以外事對曰陛下威斷不測外人頗驚懼天下既平願陛下以寛理之使得罪者無怨為善者不驚則天下幸甚上自秋來已覺有疾而道士以為換骨至是詔罷正旦朝㑹丙寅六年春三月帝崩光王忱本名怡憲宗子帝之叔即位是為宣宗綱目作立光王忱為皇太叔帝崩太叔即位徐昭文考證曰武宗疾篤旬日不言宦官定策禁中立光王忱為皇太叔是忱之立非由武宗乃宦官也且太叔之號于古無之考周懿王崩父共王弟辟方立是為孝王當依此例據事直書曰帝崩光王忱即位以著藩王入承大統之義而去宦官所定不正之名今從之上疾久未平以為唐土徳不可以王氣勝君名上名瀍瀍旁從水土所勝也乃改名炎初憲宗納李錡妾鄭氏生光王怡㓜時宫中皆以為不慧太和之後益自韞匿羣居遊處未嘗發言文宗好誘其言以為戲笑上性豪邁尤所不禮及上疾篤旬日不能言諸宦官宻于禁中定䇿下詔以皇子㓜冲立怡為皇太叔更名忱令權勾當軍國政事太叔見百官哀戚滿容裁决庶務咸當于理人始知有隠徳焉上崩以李徳裕攝冢宰太叔即位徳裕奉册既罷上宣宗謂左右曰適近我者非太尉邪毎顧我使我毛髪灑淅夏四月尊母鄭氏為皇太后李徳裕罷為荆南節度使徳裕秉權日久位重有功衆不謂其遽罷聞之莫不驚駭徳裕既罷遂以白敏中同平章事趙歸真等伏誅五月詔上京增置八寺復度僧尼六月定太廟為九代十一室復祀代宗以敬文武宗自為一代為九代十一室既而禘于大廟禮院奏祝文于穆敬文武但稱嗣皇帝臣某昭告從之秋七月回鶻弑烏介可汗烏介之衆降散餒死所餘不及三千人其相弑之而立其弟遏捻遏捻裒殘部仰食于奚後張仲武擊奚破之遏捻走窒韋餘衆為黠戞斯所虜回鶻浸耗滅八月𦵏端陵在西安府三原縣東賀善贊曰武宗天姿英果善屬賢相故能外降黠戞内平劉稹然雖知惡釋氏而仍信道流則亦未得為卓然者以牛僧孺為衡州長史李宗閔為郴州司馬僧孺宗閔及崔珙楊嗣復李珏等五相皆武宗所貶逐至是同日北遷宗閔未行而卒九月以李景讓名後已登之孫為浙西觀察使景讓在浙西有牙將忤意杖之而斃軍中憤怒將為變其母鄭氏聞之出坐聽事立景讓于庭而責之曰天子付汝以方靣豈得以國家刑法為喜怒之資而妄殺無罪之人乎萬一致一方不寕豈惟上負朝廷使垂老之母銜羞入地何以見汝之先人哉命左右禠其衣坐之將撻其背將佐皆為之請久乃釋之軍中遂安鄭氏性嚴明早寡家貧子㓜每自教之宅後墻䧟得錢盈船母祝之曰吾聞無勞而獲身之災也天必以先君餘慶矜其貧而賜之則願諸孤學問有成此不敢取遽命掩而築之景讓宦達髪已斑白小有過不免捶楚冬十月帝受三洞法籙于道士劉元靜十二月戊辰朔日食御批厯代通鑑輯覽卷六十一

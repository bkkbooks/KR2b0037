body:
  text: 欽定四庫全書御批厯代通鑑輯覽卷一百十七附明唐桂二王本末唐王乙酉我大清世祖章皇帝順治二年臣等謹案明自北都淪覆宗社已墟洪惟我天順國家應區宗薄海內外咸歸正福王以敗亡餘燼偷息人光宅皇上金陵首尾才及一嵗我域堪慿可從建炎南渡偏安之量同覆載念其尚有疆特命例輯覽明紀末分注附編盡袪前代史家偏陋之習大於公至正洵足上配麟經垂訓萬古至唐桂二王閩滇轉徙已無尺土一民草莽苟延尤不足登諸記載乃䝉聖謨指示等於宋是昺之流離海島謂事蹟尚有可稽宜著其危亡窮蹙之形以益凛夫天命難諶之戒且當時遺臣故老茹苦間關蹈死如飴貞心不二亦宜詳加闡録母使湮沒無傳大哉匡言仁至義盡用示有邦之炯鑒而立臣道之大防至公至平更從來史策所莫及臣等凜遵實諭㫖謹案明史列傳所載參以王鴻緒史稿諸書採撮編次録紅本及本朝紀年大書提綱凡竊據事實俱分條系月臚叙其下國家底定鴻謨與二王務衷確核以訂傳訛至其時殉莭諸臣均已于乾隆四十一年䝉恩賜諡今隨時隨事各加詮次掇其大者咸著於篇而逐一恭載賜諡庶上副忠義之盛心而與勝朝殉節諸臣録亦可以互聖天子表章相考證云夏六月我大清兵克杭州故明唐王聿鍵明太祖八世孫唐端王碩熿之孫世子器墭之子奔福建時大兵已定南京故明鎮江守將總兵官鄭鴻逵等擁衆還閩沿道焚掠大兵進徇常州蘇州皆下之蘇州鄉官右庶子徐汧作書戒二子肅衣冠投虎邱新塘橋下死舉人楊廷樞聞變遁跡入鄧尉山中尋受唐王命為檢討時四方弄兵者咸指目廷樞當事者執廷樞好言慰之廷樞嫚罵不已殺之蘆墟泗洲寺徐汧字九一楊廷樞字維斗長洲人汧廷樞俱諡忠賜莭留兵二千駐蘇州大軍悉趨杭州故明潞王常淓明穆宗孫潞簡王翊鏐之子方流寓於杭諸臣聞福王見執請常淓監國不受不數日大兵至常淓從巡撫張秉貞及陳洪範等計率衆開門迎降錢塘知縣顧咸建字漢石崑山人臨安知縣唐自綵達州籍江陵人邵武同知王道焜字昭平錢塘人皆死之時監司及郡邑長吏多逋竄獨咸建守官不去潞王既降咸建不至見執死自綵與從子偕豫逃山中有言其隂部署為變者遂被捕獲與偕豫同死道焜投繯死賜咸建自綵俱賜諡忠莭道焜諡忠愍紹興諸郡悉望風納欵故明左都御史劉宗周以與馬阮不合退居山隂聞杭州破即慟哭不食移居郭外有勸以文謝故事者宗周曰北都之變可以死可以無死以尚有望於中興也南都之變主上自棄其社稷尚曰可以死可以無死以俟繼起有人也今吾越又降矣老臣不死尚何待乎若曰身不在位不當與城為存亡獨不當與土為存亡乎此江萬里所以死也出辭祖墓舟過西洋港躍入水中水淺不得死舟人扶出之竟絶粒二十三日而卒宗周趾㑹賜諡忠介其門人殉義者有諸生王育蓍字元稽人方宗周絶粒未死育蓍上書曰願先生早自裁毋為王炎午所弔育蓍之友勸以陶淵明故事育蓍曰不然吾輩聲色中人久則難持及今早死為愈召故交奏樂歡飲酒罷携燈出門投栁橋下死舉人祝淵字開美海寧人方葬母趣工人速竣還家設祭投繯死故明文淵閣大學士髙宏圖應天巡撫右僉都御史祁彪佳行人陸培字鯤庭錢塘人亦先後殉莭死宏圖逃野寺中絶粒死彪佳紿家人先寢端坐池中死培以繩授三僕從容自縊死宏圖賜諡忠直彪佳培賜諡忠惠賜諡忠莭嘉興已歸附而士紳屠象美等復集衆據城拒守大兵還攻之半月而破故明吏部尚書徐石麒死焉石麒時移居郭外聞居城大兵至曰吾大臣也城亡與亡豈宜苟活復入中城破朝服自縊死石麒忠賜諡懿時唐王聿鍵以被赦出髙墻聿鍵先于崇禎間以倡義勤王得罪禁錮福王命移居廣西平樂府行至杭州遇鄭鴻逵及户部侍郎何楷字元子漳州人户部郎中蘇觀生字宇霖東莞人等遂奉以入閩國臣等謹案明自崇禎之季流賊攻破亰師我家誕膺眷命光宅萬邦就蕩平彼唐桂二王竄走閩滇流離瑣尾天戈所指立無尺土之慿而為之臣者尚思螳臂當車阻兵負固跡其不知天命敢拒顔行終膏斧鑕實所自取我皇上擴天地為公之量念其各忠所事蹈死如飴在當日而事後追思究無愧六師所届不得不行逆命之誅於疾風徑草即其潛踪草澤從容引决者亦為克盡綱常特沛恩綸曲加崇奬俾一體易名以勵臣莭伏讀勝朝殉莭諸臣録內其在唐桂二王時效莭者計得專諡八人通諡三百十有一人祀忠義祠者二百三十四人渥典覃加漏泉普被冊所未有臣褒闡隆施實從來史等纂次二王本末謹賜諡採托諸臣莭槩尤著者臚具簡編其所得隨條恭載以昭聖天子大中至正之盛心俾天下萬世共凜然於教忠之彛訓云故明兵部尚書張國維等以魯王以海明太祖九世孫魯肅王夀墉之子稱監國於紹興時浙江屬郡多歸降寧波惟一同知治府事已齎圖籍迎附故明刑部員外郎錢肅樂字希聲鄞縣人力議拒守士民集者數萬人肅樂乃建牙行事郡中總兵王之仁既納欵而悔入城與肅樂締盟共守心王之仁大興人崇禎時太監王之之弟聞魯王以海在台州遣舉人張煌言鄞縣人奉表請監國㑹諸生鄭遵謙㑹稽人山西僉事鄭之尹之子殺招撫使於江上與兵部尚書張國維等舉兵紹興給事中熊汝霖字雨殷餘姚人九江兵備僉事孫嘉績字碩膚餘姚人等自餘姚應之國維自迎以海於台州以海即日赴紹興用方逢年遂安人崇禎間大學士議稱為魯監國以國維為太傅兵部尚書武英殿大學士督師江上畫錢塘而守以熊汝霖孫嘉績為右僉都御史錢樂為右副都御史並督師防江總兵官方國安貴陽人亦自金華至與王之仁等皆加封爵國安荆國公之仁武寧伯鄭遵謙義興伯張鵬翼永豐伯樹木城於緣江要害聮合諸營為持久計時之仁國安兵食用寧波紹興台州三郡田賦而肅樂兵資富室助餉不能繼恆缺食汝霖戰亦屢敗國維督兵連陷富陽於潛會王師至國維來拒戰於草橋門敗還遂不敢出閏六月故明禮部尚書黃道周等以唐王聿鍵稱號於福州鄭鴻逵等擁唐王聿鍵至閩道周與福建巡撫都御史張肯堂字載寧松江華亭人南安伯鄭芝龍等奉聿鍵稱監國鴻逵請急正位不然無以厭衆心諸臣皆以監國名正候出關建號未遲而擁立者豔推戴功不數日即定議稱號於福州改年隆武以福州為天興府即布政司署為行宫大赦進芝龍鴻逵為侯鄭芝豹鄭彩為伯兵事機宜悉芝龍為政以天興建寧延平興化四府為上游汀州邵武漳州泉州四府為下游各設撫按議簡戰守兵自仙霞關而外宜守者一百七十處計兵十萬戰兵如之閩浙兩粵之餉不支其半乃請預借兩稅一年令羣下捐俸勸紳士輸助徴府縣銀榖未解者官吏督迫閭里騷然遣給事中楊應期入粵督餉參遲誤官數十員提問無一至者廣開事例倡優僕𨽻並列冠裳拜謁官府鞭撻鄰里晋江令金允治聽訟兩造皆稱職官挺立而語互毆于庭不可制小民不勝其擾臣等謹案唐桂二王雖明之支派然唐王本疏族桂王亦神宗庶孽當宗邦淪覆草竊邉隅苟延旦聖訓夕實不成其為國乃仰䝉是昺竄身閩粵者事例謂其流離失據正與宋之詔纂相同凡國史傳之書僞者概令更正兹奉次二王本末又䝉特筆改書稱號其諸臣仍書所授原官仰見公而非向大聖人執中權度進退豫奪一出千古之大來史家拘陋偏私者所能窺見萬一云唐王聿鍵以黃道周為武英殿大學士參贊機務餘授官有差唐王聿鍵素重道周學行禮敬備至時召何吾騶蔣德璟等未至道周為首輔又以張肯堂為吏部尚書何楷為户部尚書郭維經字亦修江西龍泉人為吏部侍郎蘇觀生為翰林學士禮部侍郎設儲賢館分十一科招四方士令觀生領之至者多庸流聿鍵亦厭而罷其事尋超􅕥觀生東閣大學士參預機務鄭芝龍鴻逵兄弟橫甚一日聿鍵賜宴芝龍以侯爵欲位道周上道周與爭衆議抑芝龍文武大不睦有諸生上書詆道周迂不可居相位聿鍵知出芝龍意下督學御史撻之聿鍵將郊天芝龍兄弟稱􅍚不出何楷言禮莫大於郊二勳臣不陪祀無人臣禮聿鍵奬其風節命掌都察院事鴻逵扇殿上楷呵止之兩人益怒楷知不為所容請告去途遇盜截其一耳則芝龍使部將楊耿為之也秋七月我大清兵定江西先是大兵至九江故明寧南侯左良玉子夢庚率所部三十六營來降江西巡撫曠昭遂寧人棄南昌走瑞州列城望風奔潰故明益王由本明憲宗六世孫益敬王常遷之子在建昌與布政使夏萬享字元禮崑山人副使王飬正字聖功泗州人知府王域字元夀松江華亭人推官劉允浩掖縣人南昌推官史夏隆宜興人等舉兵拒守南昌諸生鄧思銘集其儕數十人為庠兵後城破俱死閲三日有客兵為內應城即破由本奔旗塘佛舍尋歸唐王聿鍵於福州萬亨等械至南昌俱死之萬亨等五人俱賜諡烈愍新城知縣談夢開迎降民潛導守關兵殺之夢開餘黨與民互相殘彌月不靖唐王聿鍵以李翔邵武人為新城知縣禽殺餘黨率民兵出城拒敵大兵自間道入城民兵皆散翔與御史徐伯昌新城人俱死之翔伯昌俱愍賜諡莭大兵進克袁州廣信袁州同知署府事李時興自縊於萍鄉官舍廣信同知胡甲桂見執自經死山時興福清人甲桂字秋卿崑入俱賜諡莭愍遂收吉安長驅至萬安曠昭見執死知縣梁于涘死之莭于涘興化人昭于涘俱賜諡愍㑹故明益宗永寧王慈炎招連子峒土兵數萬復陷建昌入撫州考功主事揭重熙字祝萬臨川人文選主事曾亨應字于嘉臨川人皆舉兵與相掎角南贛巡撫李永茂遣副將徐必逹扼泰和未幾戰敗永茂奔贛州慈炎亦以糧盡退保建昌大兵追獲殺之曽亨應一日方宴客避石大兵至宗族死者二十餘人亨應室其從弟指示之遂見執並執其長子筠亨應顧筠曰勉之一日千秋無自負筠曰諾受刑先死釋亨應縳諭之降不答遂戮之又總兵謝上逹副總兵王坤恭將賴明標游擊蕭奠邦都司王一貴守備杜有聲都督蔡欽金世任副將林引等俱見執死欽亨應引俱賜諡烈愍上達坤明標奠邦一貴有聲世任賜諡莭愍江西諸郡皆平惟贛州未下適唐王聿鍵手書至贛加左庶子楊廷麟兵部尚書修撰劉同升字晋卿吉水人國子祭酒廷麟同升乃與永茂集士大夫於明倫堂勸輸兵餉協謀舉事立忠誠社招致四方之士各率家丁自賫糧入社者幾三萬人唐王聿鍵遣其大學士黃道周以兵出江西唐王聿鍵好學通典故然國勢衰微兵食困乏政歸鄭氏諸大帥多選愞觀望聿鍵不能有所為鄭芝龍鴻逵屢薦其私人為清要官聿鍵不從以是懷怨望大清遣御史黃熙允晋江人招撫福建熙允與芝龍同里芝龍密使通欵聿鍵屢促出兵輒以餉詘辭道周知芝龍終無意出關乃自請募兵江西號召羣帥聿鍵給空劄百函以七月二十二日啓行僅齎一月糧以虛聲鼓動得卒九千餘人從廣信出衢州聿鍵以周定礽為右僉都御史巡撫廣信詹兆恆為兵部侍郎萬文英為兵部員外郎監道周諸軍胡竒偉為湖東副使與兵科給事中胡夢泰同守廣信竒定礽南昌人兆恆字月如永豐人文英亦南昌人偉進賢人夢泰字友蠡鉛山人道周所至撫安遺黎聮絡聲勢逺近頗響應八月我大清兵克松江先是南亰既亡列城俱下而州縣多聚兵自保者嘉定士民推左通政侯峒曾字豫瞻給事中震𤾉之子為主與進士黃淳耀字藴生等誓死固守江隂諸生許用亦倡言城守以典史陳明遇主兵出戰不勝乃請前典史閻應元字麗亨通州人已遷英德主簿道阻不赴寓居江隂入城屬以兵事大兵力攻城應元守甚固而松江在籍兵部右侍郎兩廣總督沈猶龍字雲升偕中書舍人李待問字存我羅源知縣章簡字坤能等亦募壯士數千人守城㑹吳淞總兵官吳志葵自海入江結水寨於泖湖總兵官黃蜚擁千艘自無錫至猶龍聮絡二帥而參將侯承祖字懷玉金山衛人世襲指揮使守金山衛遙相應援大兵至嘉定峒曾乞師於志葵志葵遣遊擊蔡祥以七百人赴之戰敗而遁外援遂絶城中矢石俱盡天雨城圯大兵入峒曾等並死峒曾拜家廟率二子元演元潔沈于池淳耀入僧舍索茟書絶命詞自縊死其弟淵耀從之舉人張錫眉董用諸生馬元調唐全昌夏雲蛟俱死之峒曾淳耀並賜諡忠莭至是大兵進取松江志葵蜚敗於春申浦城遂被圍未幾而破猶龍出走中矢死待問守東門簡守南門俱見執死之猶龍賜諡忠烈待問賜諡忠莭簡諡莭賜愍大兵遂攻金山承祖與子世祿猶固守城破巷戰踰時父子俱死承祖見獲說之降曰吾家食祿二百八十年今日不當以死報國哉遂戮之世祿中四卜矢見獲同死馬承祖賜諡忠烈志葵蜚亦就執至江隂城下令說城中人降蜚不語志葵說之迄不應大兵悉衆攻圍四面發大炮城中死傷無算堅守自如八月二十一日大兵從祥符寺後城入衆猶巷戰男婦投池井皆滿明遇用及中書舍人戚勳字伯屏江隂人皆舉家自焚應元赴水被曵出斬之應元烈愍賜諡忠烈明遇勳俱而縣賜諡時崑山人亦議拒守丞閻茂才已遣使迎降用為知縣縣人共執殺茂才推前狼山副總兵王佐才為主與貢生陶集璜及儀封知縣周室瑜諸生陶琰陳大任等共舉兵縱民大兵至迎戰敗還遊擊孫志尹戰殁城破佐才出走而已冠帶坐帥府見殺集璜投東禪寺後河死室瑜琰大任同死之事在是年七月又有故明瑞昌王誼氻者結衆謀犯江寧事泄與經略常爾韜總兵楊三貫夏含章等俱死又有崇陽王者率兵來寇歙縣為我兵所敗其總兵閔士英鄭鵬逺俱見執死又髙安王常淇與監軍道江于東等據婺源之小坑遂平王紹鯤職方主事楊謨等擁衆太湖遙應魯王亦先後見執而死事俱在順治三年佐才志尹俱賜諡烈愍室瑜爾韜三貫舍章士英鵬逺于東謨俱賜諡莭愍唐王聿鍵以黃景昉吕大器路振飛朱繼祚莆田人曾櫻字仲含峽江人俱為大學士初振飛總督漕運謁明鳯陽皇陵唐王聿鍵方以罪錮守陵中官虐之振飛捕治其尤甚者以私錢助之而上疏乞概寬罪宗竟得罪聿鍵甚德之及稱號福州即拜振飛左都御史振飛赴召道拜文淵閣大學士至則大喜與宴扺夜分撤燭送歸解玉帶賜之聿鍵每責羣臣怠玩振飛因進曰上謂臣僚不改因循必致敗亡臣謂上不改操切亦未必能中興也上有愛民之心而未見愛民之政有聽言之明而未收聽言之效喜怒輕發號令屢更見羣臣庸下而過於督責因博覽史書而務明備凡上所長者皆臣下所甚憂也其言曲中聿鍵之短云櫻嘗為福建參政力保鄭芝龍芝龍感次骨薦之聿鍵起為工部尚書兼東閣大學士無何令掌吏部而移張肯堂於都察院聿鍵所置閣臣至多前後幾三十人然不令票旨皆聿鍵親為之時肯堂請出募舟師由海道抵江南倡義旅而聿鍵由仙霞趨浙東與相聲援聿鍵乃加肯堂少保給敕印便宜從事擢文選郎中朱永祐為吏部右侍郎福州推官徐孚逺為兵科給事中從行二人皆肯堂里人也鄭芝龍懷異心隂沮之不成行故明靖江王亨嘉靖江王守謙十世孫自稱監國唐王聿鍵執殺之亨嘉世封桂林聞南亰破招集諸蠻起兵自稱監國謀僭號召廣西巡撫瞿式耜字起田常熟人式耜拒不往而檄思恩𠫭將陳邦傅助防止狼兵勿應亨嘉調亨嘉下梧州執式耜幽之桂林遣人取其敕印初式耜議立桂王常瀛子安仁王及唐王聿鍵監國式耜以為倫序不當立不奉表勸進至是為亨嘉所囚乃遣使賀聿鍵因乞援聿鍵喜而亨嘉為兩廣總督丁魁楚永城人所攻勢窘乃釋式耜式耜與中軍官焦璉召邦傅共執亨嘉械送福州廢為庶人殺之聿鍵封魁楚平粵伯留鎮兩廣擢式耜兵部右侍郎協理戎政以晏日曙代之式耜不入閩退居廣東魯王以海遣兵犯杭州敗還魯王將方國安王之仁自富陽渡江犯杭州總督張存仁遣將督兵迎擊斬首四千級其餘衆尚據富陽大兵進敗之於關頭追奔二十餘里斬國安子士衍初馬士英擁殘兵渡江欲謁魯王以海以海諸臣力拒之乃投方國安軍尋復與國安聮兵謀窺杭州為大兵所敗溺江死者無算士英國安乃聚衆江東赭山杭州朱橋范村等處所在肆掠大兵進勦國安水軍數萬盡殱焉九月我大清兵入湖廣流賊李自成竄死其衆降於唐王聿鍵初李自成既走陜西大兵攻潼關僞伯馬世耀迎戰敗死潼關破自成遂棄西安由龍駒寨走武岡入襄陽復走武昌大兵兩道追躡連蹙之鄧州承天德安武昌富池口桑家河九江窮追至賊老營大破之者八當是時左良玉東下武昌虛無人自成屯五十餘日衆尚五十餘萬改江夏曰瑞符縣尋為大兵所迫部衆多降或逃散自成走延寧蒲圻至通城竄於九宫山是月自成留李過守寨而自率二十騎略食山中為村民所困不能脫自縊死或曰村民方築堡見賊少爭前擊之人馬俱陷泥淖中自成腦中鋤死剝其衣得龍衣金印眇一目村民乃大驚疑為自成也時大軍遣識自成者驗其尸朽莫辨獲自成兩從父僞趙侯僞襄南侯及自成妻妾二人金印一又獲僞汝侯劉宗敏僞總兵左光先等斬自成從父及宗敏於軍其將劉體仁郝搖旗等以衆無主議歸故明湖廣總督何騰蛟宇雲從貴州黎平衛人率四五萬人驟入湘隂長沙人不知其歸降也懼甚攝偏沅巡撫傅上瑞武定人請騰蛟出避騰蛟曰死於左死於賊一也何避焉長沙知府固二南請往偵之以千人護行賊謂其迎敵也射殺之從行者盡死城中益懼二南䝉化人騰蛟與監軍荆西道僉事章曠字于野松江華亭人謀遣部將萬大鵬等往撫致騰蛟手書召之曰公等歸朝誓永保富貴搖旗等大喜與大鵬至長沙騰蛟開誠撫慰宴飲盡歡搖旗招其黨袁宗苐藺飬成王進才牛有勇皆歸騰蛟驟增兵十餘萬未幾自成兄子錦即李過改名奉自成妻髙氏及髙氏弟一功復擁衆三十萬驟至灃州乞降故明湖南巡撫堵允錫字仲緘無錫人議撫之騰蛟亦馳檄至允錫乃躬入其營開誠慰諭稱詔犒軍皆踴躍拜謝允錫即軍中宴之導以忠孝大義數千言明日髙氏出拜謂錦曰堵公天人也汝不可負别部田見秀劉汝魁等亦降唐王聿鍵大喜加允錫兵部右侍郎兼右僉都御史總制其軍手書奬勞錦等皆賜名授官號其營曰忠貞置之荆州授錦前部左軍一功右軍並掛將軍印封列侯賜錦名赤心一功名必正封髙氏貞義夫人有司建坊題曰淑贊中興騰慮赤心跋扈他日過其營請見髙氏冉拜執禮恭髙氏悅戒其子母忘何公赤心自是無異志允錫亦深相結倚以自强然赤心書疏猶稱自成先帝稱髙氏太后云自成亂天下二十年陷帝都覆廟社其衆數十萬悉歸騰蛟一時詫異事而騰蛟上聿鍵疏但言元凶已除稍泄神人憤宜告謝郊廟卒不言已功聿鍵拜騰蛟東閣大學士兼兵部尚書封定興伯仍督師騰蛟固辭封爵不允令規取江西冬十月我大清兵克徽州先是徽州聞南亰破故明知府秦祖襄及僚屬皆遁推官溫璜初名以介字于石烏程人歎曰城無主民且自相屠乃盡攝其印召士民慰諭之故明左僉都御史休寧金聲紏集義勇保績溪黃山分兵扼六嶺璜與相掎角且轉餉給其軍前山東巡撫邱祖德字念修成都人職方郎中尹民興字宣子時流寓涇縣監紀推官吳應箕字次尾貴池人等多聚兵應之聲乃遣使通表唐王聿鍵聿鍵授聲右都御史兼兵部右侍郎總督諸道軍聲遣兵取旌德寧國諸縣㑹故御史黃澍降於大清導王師間道襲破之執聲至江寧聲語門人江天一字文石歙縣人曰子有老母不可死對曰天一從公起兵可不同公殉義乎總督洪承疇諭降天一朗誦明莊烈帝諭祭承疇文以誚之遂與中軍吳國楨副將陳有功守備萬全遊擊余元寅俱死總兵范雲龍及聲弟經亦死於旌德應箕見獲死祖德退還山中大兵攻拔其寨不降磔死民興走免唐王聿鍵以為御史事敗卒於家諸生舉兵者有寧國麻三衡字孟璿布政使溶之孫沈夀蕘字景山都督有容之子等亦俱敗死宣城諸生吳漢超復舉兵連陷句容淉水髙淳涇溧陽太平諸縣夜襲寧國兵潰城中按首事者漢超已出城念母在且恐纍族人入見曰首事者我也剖其腹膽長三寸璜猶嚴兵自守黃澍復以城獻璜闔門死之璜趨歸村舍先刃其長女語妻茅同殉茅匿其幼子遂整衣卧璜以刀截其喉少頃茅呼曰未也再刃乃絶璜自刎不殊絶粒五日以手自抉其創而死賜諡忠莭邱祖德溫璜俱金聲吳應箕俱楨賜諡忠烈吳國陳有功萬全余元寅范雲從俱賜諡莭愍唐王聿鍵遣使於魯王以海魯王以海不受唐王聿鍵使給事中劉中藻福安人頒詔浙東時求富貴者爭欲應之魯王以海下令將返台州熊汝霖獨出檄嚴拒不納張國維馳疏上聿鍵略言國當大變凡為髙皇帝子孫臣庶所宜同心併力共圖興復成功之後入關者王且監國當人心渙散之日鳩集為勞一旦南拜正朔鞭長不及悔莫可追臣老矣豈敢朝秦暮楚有所左右于其間哉聿鍵乃召中藻還自是閩浙如水火矣臣等謹案唐王假息閩海魯王竊據紹興其地正相唇齒乃不能同心協力各圖擅地竊號稱尊而其臣又復懷挾私心自分畛域一則拒其使命一則戮及使臣彼此猜嫌竟成水火以敗逃窮蹙之天兵時蠻觸紛爭偷安旦夕宜乎飛渡越閩不旋踵而削平也唐王聿鍵妃曾氏至福州曾氏警敏頗知書每羣臣奏事妃於屏後聽之共決進止聿鍵頗嚴憚焉我大清兵攻吉安還屯峽江先是大兵屯泰和故明副將徐必逹戰敗楊廷麟乃大享士於贛州城西與劉同升乘虛復取吉安臨江唐王聿鍵命加廷麟兵部尚書兼東閣大學士賜劍便宜從事是月大兵進攻吉安必逹迎戰大敗赴水死必達莭愍賜諡㑹廣東援兵至大兵還屯峽江聿鍵召南贛巡撫李永茂為兵部右侍郎以張朝綖代甫任事復擢萬元吉兵部右侍郎總督江西湖廣諸軍召朝綖還以劉同升代之元吉至贛同升已卒遂以元吉兼巡撫十二月唐王聿鍵自福州駐於建寧時楊廷麟等請聿鍵出江右何騰蛟請出湖南浙中諸將請出衢州蘇觀生以事權悉為鄭氏所握請聿鍵出贛州聿鍵遣觀生先行赴贛州募兵以曾櫻鄭芝龍留守福州司轉餉十二月聿鍵發福州駐建寧廣東布政使湯來賀運餉十萬由海道至聿鍵擢來賀户部侍郎然兵食匱乏人心離散迄不能成軍也唐王聿鍵督師大學士黃道周兵敗於婺源死之道周進至婺源遇大清兵戰敗其將程嗣聖陳亡道周見執諸軍潰走大兵追至開化總兵曾德黃光輝副將蔡璋龍勝陳辰等俱死嗣聖德光輝璋勝辰俱賜諡莭愍道周至江寧幽别室中從容著詩文數卷聞當刑書絶命詞衣帶間過東華門坐不起曰此與高皇帝陵寢近可死矣監刑者從之幕下士中書賴雍平和人蔡紹謹龍溪人本考二人姓名紅作蔡雍賴繼謹兵部主事趙士超閩縣人廣信通判毛玉潔六合人考毛玉潔紅本作毛至潔遊擊朱家第等皆死之廣信尋亦為胡大兵所破夢泰自縊死萬文英赴水死周定礽胡竒偉及都司劉芳伯黃國治恭將謝良才王之樞監紀官李竒餘干知縣楊時秀兵部員外郎戴伍偶守備陳夀陳傑總兵江天衢推官王象乾胡佩遊擊胡接輝廣信同知胡嘉桂等俱死之詹兆恆奔懷玉山聚衆數千人自保已進犯開化縣兵敗殁於陳攝撫州事同知髙飛聲遣人懷印走謁唐王聿鍵而身守城死焉士飛聲字充正長樂人道周賜諡忠端雍紹謹超玉潔家第俱之樞賜諡烈愍夢泰文英定礽竒偉芳伯國治良才竒時秀伍俊夀傑天衢象乾佩接輝嘉桂俱愍兆恆賜賜諡莭諡忠烈時唐王聿鍵又以大學士傅冠字元甫進賢人為督師辦湖東兵事瀘溪告警冠不能救為給事中揭重熙所劾或又言其嗜酒乃許致仕久之大兵至冠死之冠寓居門人泰寧汪亨龍家亨龍執以獻有司不屈僇于汀州血漬地久而猶鮮汀人歎其忠冠賜諡忠烈丙戌我大清世祖章皇帝順治三年春正月唐王聿鍵遣將分道出兵不果行鄭芝龍知物論不平不出關無以弭衆議乃請以鄭鴻逵為左先鋒出浙江鄭彩為右先鋒出江西築壇行推轂禮鴻逵出城馬蹶仆地各擁衆數千號數萬既出關託候餉仍駐不行鴻逵駐仙陽鎮慮有上書言事者嚴禁仙霞關不聽四方儒人入聿鍵檄催孔亟不應彩行百里而還稱餉缺留如故時芝龍已通欵于我陳謙朝聿鍵不知也㑹魯王以海遣都督使閩趦䞡不敢入芝龍與謙有舊以書招之謙入見書稱叔父而不稱陛下聿鍵大怒下謙于獄芝龍疏救不聽有御史錢邦芑者為聿鍵言謙與芝龍至交不急除恐有內患聿鍵即命誅謙或以告芝龍芝龍曰刑人于市必過我門我且命停刑願以我官職贖謙罪當不死聿鍵命移謙别所斬之芝龍奔赴哭極哀由此怏怏不悅益懷異志矣邦芑鎮江人二月唐王聿鍵移駐延平聿鍵決意出汀州入贛與湖南為聲援鄭芝龍不欲聿鍵行令軍民數萬人遮道呼號擁聿鍵不得行遂駐延平吏部司務王士和字萬育金溪人疏陳時政闕失凡數千言聿鍵命刋賜文武諸臣且召士和入對嘉奬備至擢兵部主事未一月擢延平知府聿鍵以事殺建陽知縣施㷾邵武知府吳炇煒推官朱健曽櫻力救不聽人情惴恐原任兵部郎中王期升御史彭遇􅀈自浙中遁至聿鍵加期升總督遇􅀈僉都御史路振飛等封還內降謂遇􅀈依附馬士英期升在太湖奉朱盛徴稱通城王派餉苛不可用聿鍵乃止三月唐王聿鍵遣使勞魯王軍於紹興魯王以海復遣柯夏卿曹惟才聘於唐王聿鍵聿鍵加夏卿兵部尚書惟才光祿寺卿手書報以海曰吾無子王為皇太子姪同心戮力共拜孝陵吾有天下終致於王浙東所用職官盡列朝籍無分彼此遣僉都御史陸清源平湖人齎餉銀十萬兩犒勞浙東軍士方國安縱兵盡奪其餉留清源軍中後國安敗清源自沉于江賜清源莭諡忠且出檄數聿鍵罪張國維歎曰曲在我矣時以海兵力孱弱武將橫甚競營髙爵請乞無厭未兵部尚書余煌上言今國勢愈危朝政愈紛尺土復戰守無資諸臣請祭則當思先帝蒸嘗未備請葬則當思先帝山陵未營請封則當思先帝宗廟未享請䕃則當思先帝子孫未保請諡則當思先帝光烈未昭時以為名言煌字武曽㑹稽人我大清兵克吉安遂圍贛州楊廷麟自吉安赴贛將朝唐王聿鍵以萬元吉代守吉安初崇禎末命中書舍人張同敞江陵人居正之孫調雲南兵及抵江西而南京已破因退還吉安廷麟留與共守其將趙印選胡一青頻立功而元吉約束甚嚴諸將漸不悅時有廣東兵亦以赴援至而張安者汀贛間峒賊四營之一驍勇善戰為廷麟招降有取撫州功且招他營盡降唐王賜名龍武新軍元吉以安等為足恃也蔑視滇粵軍滇粵軍解體然安卒故為賊淫掠自如廷麟遣援湖西所過無不殘破至大兵攻吉安諸軍皆內携新軍又先往湖西不時至城中不戰潰城遂破元吉退屯皂口檄諭贛州極言雲南兵棄城罪其衆遂西去大兵進至皂口元吉不能禦退入贛城大兵乘勝進圍之唐王兵部侍郎劉士楨促新軍張安赴援安宵遁廷麟遣使調廣西狼兵而身往雩都召新軍來救戰於梅林再敗廷麟乃散其兵入贛與元吉憑城守給事中楊文薦元吉門生也奉使往湖南過贛見事急自任守禦城中賴之江西巡撫劉逺生自出城召其將張琮於雩都贛人曰撫軍遁矣怒焚其舟拘其妻子俄逺生率琮兵至贛人乃大悔逺生憤甚渡河再戰皆敗見獲復逃歸援軍皆不敢前㑹李永茂遣廣東兵五千至大兵為解圍屯于水西未幾圍復合城中拒如初時贛困守久唐王聿鍵奬勞之賜名忠誠府加元吉兵部尚書文薦右僉都御史命郭維經為吏兵二部尚書兼右副都御史總理湖廣江西廣東浙江福建軍務督師往援維經與御史姚竒允募兵八千八入贛州與廷麟元吉同守時東鄉安仁貴溪瑞州餘千萬年諸郡縣俱聚兵遙應閩中衆其大兵分道進勦先後克捷擒斬故明文武官甚死于東鄉者有副將傅潛龍𠫭將黃騰都司文而武守備劉威振等在安仁則有𠫭將傳鼎乾都司徐德守備洪士邦等在貴溪則有總兵陳輝汪碩畫副將汪洋監紀知縣廖汝健等在瑞州雞公嶺棠山一帶則有副將黃英都司敖髙參將晏性等在餘千萬年則有都司趙祖參謀舒竒謀等姚竒允字有僕錢塘人自傅潛龍以下十六人俱諡莭賜烈夏六月我大清兵克紹興魯王以海遁入海征南大將軍貝勒博洛等以五月二十日扺杭城魯王以海諸軍列營錢塘江東岸綿亘二百餘里艤舟江上以待大兵未具舟楫不能渡忽江沙暴漲水淺可涉二十七日大兵策馬徑渡方國安盡棄戰艦拔營走紹興劫以海南行江上各營聞報一時俱潰走六月一日大兵入紹興國安決計獻以海來降遣人守之㑹守者病以海得脫至台州航海走命張國維防遏四邑圖後舉國維還守東陽知勢不可支作絶命詩三章赴水死國維忠敏賜諡兵部尚書余煌等皆死之煌赴水舟人拯起之居二日復投深處乃死大理少卿陳潛夫走山隂化龍橋偕妻妾二孟氏同赴水死職方主事髙岱偕其子朗躍入海死兵部主事葉汝與妻王氏同死禮部侍郎陳函輝從以海航海已而相失哭入雲峯山投水死諸生諸暨𫝊日炯鄞縣趙景麟浦江張君正瑞安周欽堯永嘉鄒之琦等皆殉義死潛夫字元倩錢塘人岱字魯瞻汝􅀢字衡生俱㑹稽人函輝字木叔臨海人煌潛夫函輝俱賜諡忠莭岱汝􅀢俱莭愍賜諡大兵進克金華督師大學士朱大典闔門死大典烈愍賜諡時以海至石浦定西侯張名振從之至舟山守將黃斌卿不納乃浮海至厦門遂走南澳方國安方逢年俱來降尋以蠟丸書通閩搜得誅死阮大針在方國安軍亦偕謝三賓宋之晋等赴江干降從大兵攻仙霞關僵仆石上死士英擁殘兵欲入閩唐王聿鍵不許㑹大兵勦湖賊士英與吳易俱禽獲斬之事具國史而野乘載士英遁台州山寺為僧為下大大兵搜獲尋得其與大鋮通閩疏斬之延平城鋮方遊山自觸石死仍僇尸云自吳易字曰生吳江人與舉人孫兆奎諸生沈自駉炳吳福之等聚兵長蕩唐王聿鍵授為兵部尚書魯王以海封為長興伯曼倩大兵至俱被獲死總兵程槐沈茂職方主事倪監軍道朱世昌通判馮時敏評事馮一鷺與易等俱死時太湖中阻兵者甚衆有鎮南伯金公玉安撫許耕竒徐明道𠫭將李世忠總兵王元震史宏弼田希成毛濟字同知吳任蘭藩鎮汪碩德𠫭謀陸美初副將施子昭及朱大定曹辰沈君晦等俱先後被獲死兵科給事中陳子龍方遁跡為僧魯王以海授以兵部侍郎銜潛謀結太湖兵舉事事露被獲乘間赴水死易槐茂曼倩世昌時敏一鷺公玉耕竒明道世忠元震宏弼希成濟宇任蘭碩德美初子昭俱賜諡莭愍子龍賜諡忠裕閩中大震鄭芝龍假言海寇入犯須往備禦拜疏即行盡撤兵回安平鎮守關將士皆隨之仙霞嶺二百里間遂空無一人大臣等謹案魯王竊據紹興方恃錢塘為天險及兵壓境天心助順江水斷流頃刻畢濟不數月浙閩盡平與元兵至臨安江潮三日不至者神應尤異至張國維等援立監國擁戴旁支稱名本為不正乃以其抒忱效命亦得䝉恩賜諡同荷表章臣等編纂唐桂二玉本末謹以魯王諸臣事實隨條附載俾天下後世咸知聖代褒忠之典甄録無遺實為至公且溥云秋七月我大清兵克衢州唐王聿鍵巡按金衢二府兼視學政御史王景亮字武侯吳江人衢州知府伍經正安福人推官鄧巖忠江陵人皆不屈死魯王以海所遣鎮將張鵬翼及伯吳凱總兵項鳴斯等亦死之江山知縣方召宣城人集父老告之曰兵且至吾義不當去然不可以一人故致闔城被誅若輩可迎附遂封其印冠帶自縊死景亮經正巖忠召凱鳴斯俱賜諡莭愍鵬翼賜諡烈愍初楊文驄走處州唐王聿鍵以在鎮江時與之有舊拜為兵部侍郎兼右僉都御史提督軍務令圖南亰至是聞衢州告急命與誠意伯劉孔昭共援衢大兵至文驄不能禦退走為追騎所獲與監紀職方主事孫臨字武公桐城人俱不降戮死臨馬士賜諡莭愍文息以英黨廷議不與諡八月我大清兵克建寧鄭鴻逵駐關外聞兵至徒跣疾走三日而抵浦城唐王聿鍵聞之削鴻逵爵王師至仙霞嶺關門無一守兵遂從容過嶺長驅直入然大兵入閩者或由建或由汀或由福寧俱走山谷間不必仙霞嶺也唐王巡撫上游四府兼領關務鄭為虹字天玉江都人亟還浦城縱士民出走自守空城無何城破為虹與給事中黃大鵬字文若建陽人並死之為虹故浦城知縣唐王聿鍵聞其廉召為御史部民相率乞留乃令以御史巡關尋擢巡撫鄭芝龍步將奪民舟為梁為虹叱責之芝龍訴於聿鍵聿鍵為諭解乃已至是殉難又巡撫楊廷清李暄亦俱為大兵所獲死之為虹烈賜諡忠烈大鵬愍廷清暄俱賜賜諡愍諡莭唐王聿鍵奔汀州我大清兵克延平閩中自鄭芝龍去後羣情益離沮唐王聿鍵視朝命內侍出一篋示羣臣曰吾賴諸卿擁戴越在海隅布衣蔬食曉夜焦勞正是上為祖宗下為百姓惟恐負卿等立君之意昨關上主事搜得閩中出閩迎降書二百餘封今具在此吾不欲知其姓名令錦衣衛官對衆焚之卿等宜無負初終也唐王聿鍵决計赴贛何騰蛟亦遣郝永忠即郝搖旗改名來迎將至韶州㑹仙霞關敗問至聿鍵遂以八月二十一日自延平倉卒出走留兵部侍郎曹履泰偕延平知府王士和居守猶載書十餘簏自隨扺順昌聞追兵且至騎而奔數日方至汀州延平警報叠至士和召父老曰吾雖一月郡守當與城存亡若等可速出毋使數萬生靈盡膏斧鑕衆泣士和亦泣退入內署謂友人曰吾一介書生數月而忝二千石安敢偷生其友勸止之正色曰君子愛人以德姑息何為從容正衣冠閉户投繯死士和莭愍賜諡大兵遂克延平臣等謹案唐王自擅號福州不能裁抑鄭氏以致孱削日甚上下離心逮我王師深入閩南寸土實無地可以潛踪乃當汀劍﨑嶇覆亡不暇猶載書簏以自隨此與梁湘東王之焚書江陵稱文武道盡者如出一轍尤可嗤鄙也我大清兵至汀州獲唐王聿鍵福建平唐王聿鍵在汀州大兵奄至從官奔散聿鍵與妃曾氏俱就執給事中熊緯聞難奔赴遇謂家大兵死之總兵官都督僉事胡上琛奔還福州人曰吾世臣不可苟活為我採毒草來與妾劉氏共飲藥酒而死衛熊緯字文江南昌人賜諡賜諡烈愍胡上琛福州人世襲指揮使莭愍曾氏至九瀧投於水聿鍵死於福州陽曲王盛渡西河王盛泉松滋王演漢西城王通簡等俱死故明總兵姜正希率兵二萬復來襲汀州乘夜登城大兵擊敗之斬萬餘級又破總兵師福於分水關入崇安縣巡撫楊文忠見執死文忠莭愍賜諡遂襲克福州唐王禮部尚書曹學佺字能始侯官人等並死之通政使馬思理自縊死太僕少卿王瑞柟避之山中有欲薦令出者乃拜辭家廟從容入室自經死兵科給事中郭符甲戰敗身被數創死王馬思理長樂人郭符甲晋江人俱諡莭愍瑞柟字聖木永嘉人與曹學泉俱賜賜諡忠節大軍駐福州分兵徇漳泉諸郡縣相繼下閩地悉平鄭芝龍自安平奉表來降其子成功成功初名森唐王聿鍵賜以國姓改名成功不從芝龍既入朝成功與鄭鴻逵鄭彩等各率所部叛入海冬十月我大清兵克贛州故明總督萬元吉素有才蒞事精敏及失吉安士不用命昏然坐城上對將吏不交一言隔河大兵營遍麓元吉指為空營兵民從大兵營中至者言軍勢甚盛輒叱為間諜斬之贛州受圍既久諸道援兵稍集元吉部將汪起龍率師數千雲南援將趙印選胡一青率師三千大學士蘇觀生遣兵亦如之兩廣總督丁魁楚亦遣兵四千楊廷麟又收集散亡得數千諸將欲戰元吉欲待水師至并力而中書舍人袁從鶚一作來從鶚彬州人募砂兵三千吏部主事龔棻南昌人兵部主事黎遂球字美周畨禺人募水師四千皆屯南安不敢下兵部主事王其宖安福人謂元吉曰水師帥羅明受海盜也桀鷔難制棻遂球若慈母之奉驕子且今水涸巨舟難進豈能如約不聽大兵聞水師將至即夜截諸江焚巨舟八十死者無算明受遁還舟中火藥戎器盡失於是兩廣雲南軍皆不戰而潰他營亦稍稍散去會聞汀州破人情益震懼守者亦疲甚大兵用嚮導夜登城鄉勇猶巷戰黎明兵大至城上發炮炮炸城遂破部將擁元吉出城元吉歎曰為我謝贛人使闔城塗炭者我也我何可獨存遂赴水死楊廷麟走西城投水死按紅本作城上殺死郭維經入嵯峨寺自焚死姚竒允自縊於文廟楊文薦病困不能起執送南昌絶粒而死維經俱賜賜諡忠莭廷麟元吉文薦諡忠莭竒允賜諡莭愍一時同殉者太常寺卿管湖西兵備僉事彭期生字觀我海鹽人而下凡數十人期生冠帶自縊死職方生事周瑚不屈磔死龔棻王其宖黎遂球袁從鶚通判王朝汲編修兼兵科給事中萬發祥户部主事林琦兵部主事栁昻霄曽嗣武錢謙亨中書舍人劉孟鍧劉應試推官署府事吳國球監紀通判郭寧登臨江推官胡縝贛縣知縣林逢春皆不屈就戮鄉官盧觀象盡驅男婦大小入水乃自沈死舉人劉日佺偕母妻弟婦子侄同日死𠫭將陳烈大清數力戰衆以其弟已降于執其弟勸之降不聽顧謂疑之烈益奮勇疾鬪及見贛人曰今日方知我無二心也乃就戮又通判淦君導鼎副總兵馬觀鵬𠫭將朱永盛兵部主事於斯昌訓程必進中書龍嘉震湖東道姚生文推官吳世安亦俱不降死周瑚大名人王明汲金壇人萬發祥新喻人林琦閩縣人曽嗣武寧都人劉孟鍧劉應試俱安福人胡縝桐城人淦君鼎建昌人馬觀鵬順德人朱永盛汀州人於斯昌黃岡人程必進松陽人龍嘉震太和人姚生文仁和人吳世安歸安人期生棻觀象必進嘉震生文世安俱武謙賜諡莭愍其宖遂球從鶚明汲發祥琦昻霄嗣亨孟應試國球寧登縝逢春烈君鼎觀鵬永盛斯昌俱賜諡烈愍御批厯代通鑑輯覽卷一百十七

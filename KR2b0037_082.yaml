body:
  text: 帝名構徽宗第九子初封康王二帝北行遂即位于南京後遷都臨安本餘杭郡南渡後开臨安府為行在所丁未建炎元年夏五月康王構即皇帝位于南京是為髙宗大赦改元吕好問謂邦昌曰天命人心皆歸康王相公先遣人推戴則功無在相公右者若撫機不發他人聲罪致討悔可追邪宗室子崧字伯山燕懿王德昭五世孫知淮寧府聞二帝北遷與江淮經制使翁彦國等誓衆登壇㰱血同奬王室康王遣使擢為大元帥府叅議官子崧又移書訶斥邦昌使其反正並曉王時雍等辭指激切邦昌乃復遣謝克家往奉迎王時雍曰騎虎者勢不得下所宜熟慮他日噬臍悔無及矣徐秉哲從旁贊之邦昌不聽克家至濟州勸進王不許張俊曰大王皇帝親弟人心所歸當早正大位既而邦昌又遣蔣思愈等持書詣濟州自陳所以勉循金人推戴者欲權宜一時以紓國難爾非敢有他也王復書與之而諭宗澤等以為邦昌受偽命之人義當誅討然慮事出權宜未可輕動合移師近都接甲觀變澤復書謂邦昌簒亂蹤跡已無可疑今二聖諸王悉渡河而北惟大王在濟天意可知宜急行天討興復社稷不可不㫁好問亦遣人來言大王不自立恐有不當立而立者邦昌又遣謝克家及王舅忠州防禦使韋淵韋賢妃之弟奉大宋受命寳詣濟州復以手書號太后曰元祐皇后入居禁中垂簾聴政以俟復辟以馮澥為奉迎使邦昌自稱權尚書左僕射率百官勸進而退居于資善堂克家䓁至濟州王慟哭受之命克家還京辦儀物皇后命太常少卿汪藻草手書告中外俾王嗣統畧曰比以敵國興師都城失守侵纒宮闕禍及宗祊緬惟藝祖之開基實自髙穹之眷命厯年二百人不知兵傳序九君世無失徳雖舉族有北轅之釁而敷天同左袒之心乃眷賢王越居近服漢家之厄十世宜光武之中興獻公之子九人惟重耳之尚在兹惟天意夫豈人謀濟州父老詣軍門言州四旁望見城中火光属天請王即皇帝位㑹宗澤及權應天府朱勝非字藏一蔡州人来言南京藝祖興王之地取四方中漕運尤易王遂决意趨應天府既發濟州鄜延副總管劉光世自陜州來㑹王以光世為五軍都提舉西道都總管王㐮宣撫司統制官韓世忠皆以師來㑹王至應天邦昌來見伏地慟哭請死王撫慰之王時雍䓁奉秉輿服御至羣臣勸進者益衆王命築壇于府門之左五月庚寅朔王登壇受命畢㗢哭遥謝二帝遂即位于府治改元建炎大赦張邦昌及應干供奉金國之人一切不問惟蔡京童貫朱勔李彦孟昌齡梁師成譚禎子孫更不收叙是日元祐皇后在東京撤簾遥上靖康帝尊號曰孝慈淵聖皇帝以黄潛善為中書侍郎汪伯彦同知樞密院事張時㤗曰髙宗即位伊始而用非其人初政盖可知矣尊哲宗廢后孟氏為元祐太后遥尊母韋氏為宣和皇后遥立夫人邢氏為皇后以張邦昌為太保封同安郡注見前王五日一赴都堂㕘决大事帝問宰執何以處邦昌黄潛善等曰邦昌罪在不貸然為金人所脅今已自歸惟陛下所處帝曰朕欲馭以王爵異時金人有詞使邦昌以天下不忘本朝而歸寳避位之意告之遂有是命尋詔邦昌宜如文彦博故事一月兩赴都堂参决大事又加太傅耿南仲免召李綱為尚書右僕射兼中書侍郎綱再貶寕江今四川夔州府宋為寕江軍金兵復至淵聖悟和議之非召綱為開封尹行次長沙被命即帥湖南勤王師入援未至而京城失守及是召拜右相趣赴行在所中丞顔岐字夷仲魯人復之子奏曰張邦昌為金人所喜雖已為三公郡王宜更加同平章事増重其禮李綱為金人所惡雖已命相宜及其未至罷之章五上帝曰如朕之立恐亦非金人所喜岐語塞而退岐又遣人封其章示綱覬沮其來右諫議大夫范宗尹論綱名浮于實有震主之威帝亦不聴汪伯彦黄潛善自謂有攀附之勞擬必為相及召綱于外二人不悦遂與綱忤綱行至太平上疏曰興衰撥亂之至非英哲不足以當之英則用心剛足以蒞大事而不為小故之所揺哲則見善明足以任君子而不為小人之所間願陛下以漢之髙光唐之太宗國朝之藝祖太宗為法遣馬忠追撃金軍尼瑪哈等既去留萬戸尼楚赫屯太原副統素赫原作韶合今改後仿此屯真定羅素圍河中䝉克旧作䝉哥今改後仿此進據磁相托卜嘉圍河間帝命忠及忻州觀察使張換将所部合萬人自恩兾趋河間以襲之馮澥免以呂好問為尚書右丞元祐太后遣好問奉手書詣應天帝勞之曰宗廟獲全卿之力也除尚書右丞李綱以羣臣在圍城中不能執莭欲悉按其罪好問曰王業艱難政宜含垢䋲以峻法懼者衆矣綱乃止置御營司時王淵楊惟忠以河北兵劉光世以陜西兵張俊苖傅以帥府及降盗兵皆在行朝不相統一乃置御營司主行幸總齊軍政命黄潜善兼御營使汪伯彥副之而以王淵為都統制劉光世提舉一行事務韓世忠為左軍統制張俊為前軍統制楊惟忠主管殿前公事竄李邦彥呉敏蔡懋李税宇文虚中鄭望之李鄴等于逺州詔以靖康大臣主和誤國安置邦彥于潯州徙敏桞州懋英州棁虚中望之鄴皆以請割地安置廣南諸州又以宣仁聖烈皇后保祐哲廟有大功而姦臣造言誣謗著于史牒令國史院據實修正播告天下于是蔡確蔡卞邢恕皆追貶之已而御史中丞張澂復論耿南仲誤國罪帝曰南仲誤淵聖天下共知朕嘗欲手劍擎之遂安置南雄州而死續綱目于南仲之竄與邦彦等連名並書考宋史南仲安置南雄在是年八月不可合為一事今于綱内削南仲名而附注其事實于目之後簽書樞密院事張叔夜在金軍不食死叔夜既北遷道中惟時飲水義不食其粟至白溝御者曰過界河矣叔夜乃矍然起仰天大呼遂不復語明日扼吭而死事聞贈開府儀同三司諡忠文何㮚孫傅後從淵聖帝至燕山亦相繼卒金人破河中府及解綘慈隰諸州時馬忠張換追襲金人于河間黄潛善等復主和議請遣宣義郎傅雱為祈請使又令張邦昌作書貽二帥仍用靖康誓書畫河為界且下令不得下赦文于河東北及河中府詔止追襲兵屯大河之南應機進止至是金羅索以重兵壓河中權府事郝仲連昌元人力戰外援不至度不能守先自殺其家人已而城破與其子致厚皆死之金人復破單密二州以宗澤知襄陽府澤見帝應天陳興復大計帝欲留澤黄潛善等沮之故出安置監察御史張所貴州人于江州靖康中所以蠟書冒圍募河北兵士民得書喜曰朝廷棄我猶有一張察院能㧞而用之應募者十七萬人由是所聲振河北帝即位遣所按視陵寢所還上言曰河東河北天下之根本昨者誤用姦臣之謀始割三鎮繼割兩河其民怨入骨髓至今無不扼􅀢若因而用之則可籍以守否則兩河兵民無所繫望陛下之事去矣且請帝亟還京城因具言有五利奉宗廟保陵寝一也慰安人心二也繫四海之望三也釋河北割地之疑四也早有定處而一意于邊防五也夫國之安危在乎兵之強弱與将之賢不肖而不在乎都之遷與不遷也誠使兵弱而将士不肖雖渡江而南安能自保帝欲以其事付所㑹所言黄潜善姦邪不可用恐害新政潜善引去帝留之乃罷所言職安置江州六月李綱至行在固辭相位不許綱至入見涕泗交集帝為動容因奏曰今日内修外攘還二聖撫萬邦責在陛下與宰相臣自視缺然不足以副委任且臣在道顔岐嘗對示論臣章謂臣為金所悪不當為相因力辭帝命岐奉祠併出范宗尹綱猶力辭帝曰朕知卿忠義智略久矣其勿辭綱頓首泣謝且言昔唐明皇欲相姚崇崇以十事要説皆中一時之病今臣亦以十事仰干天聴陛下度其可行者賜之施行臣乃敢受命一曰議國事謂中國之御四夷能守而後可戰能戰而後可和而靖康之未皆失之今莫若先自治専以守為䇿俟吾政事修士氣振然後可議大舉二曰議廵幸謂車駕不可不一至京師見宗廟以慰都人之心度未可居則為廵幸之計天下形勢長安為上襄陽次之建康又次之皆當詔有司預為之俻三曰議赦命謂祖宗登極赦令皆有常式前日赦書乃以張邦昌偽赦為法如赦悪逆及罪廢官盡復官職皆不可行宜悉改正四曰議僭逆謂張邦昌為國大臣不能臨難死莭而挾金人之勢易姓改號宜正典刑垂戒萬世五曰議偽命謂國家更大變鮮有死節死義之士而受偽官者不可勝數昔肅宗平賊汚偽命者以六等之罪宜倣之以厲士風六曰議戰謂軍政乆廢士氣怯惰宜一新紀律信賞必罰以作其氣七曰議守謂敵情狡獪勢必復來宜于沿河江淮措置控禦以扼其衝八曰議本政謂政出多門綱紀紊亂宜一歸之中書則朝廷尊九曰議乆任謂靖康開進退大臣太速功效蔑著宜慎擇而久任之以責成功十曰議修徳謂上始膺天命宜益修孝悌恭儉以副四海之望而致中興翌日班綱議于朝惟僭逆偽命二事留中不出安置張邦昌于潭州貶放其黨有差李綱以僭逆偽命二事留中言于帝曰二事乃今日刑政之大者邦昌當道君朝在政府者十年淵聖即位首擢為相方國家禍難金人為異姓之謀邦昌如能以死守節推明天下戴宋之義以感動其心敵人未必不悔禍而存趙氏而邦昌方以為得計偃然正位號處宮禁擅降偽詔以止四方勤王之師及知天下之不與乃不得已請元祐太后垂簾聴政而議奉迎邦昌僣逆始末如此而議者不同臣請以春秋之法㫁之夫春秋之法人臣無将将則必誅趙盾不討賊則書以弑君今邦昌已僭位號敵退而止勤王之師非持將與不討賊而已劉盆子以漢宗室為赤眉所立其後以千萬衆降光武但待之以不死邦昌以臣易君罪大于盆子不得已而自歸朝廷既不正其罪又尊崇之此何理也陛下欲建中興之業而尊崇僣逆之臣以示四方其誰不解體又偽命臣僚一切置而不問何以厲天下士大夫之節時執政中有議不同者帝召黄潛善等語之潛善主邦昌甚力帝顧呂好問曰卿昨在圍城中知其故以為何如好問附潜善持兩端綱言邦昌僭逆豈可留之朝廷使道路指目曰此亦一天子哉因泣拜曰陛下必欲用邦昌苐罷臣帝頗感動汪伯彥乃曰李綱氣直臣䓁所不及帝乃出綱奏責授邦昌昭化軍節度副使潭州安置並安置王時雍徐秉哲吳幵莫儔李擢孫覿于髙梅永全栁歸州而顔博文王紹以下論罪有差左右言鄧肅請分三等定罪博文紹以撰勸進文及赦書坐貶贈李若水霍安國劉韐官詔諸路訪死節之臣以聞李綱言近世士大夫寡亷恥不知君臣之義靖康之禍能伏莭死義者在内惟李若水在外惟霍安國願加贈䘏帝從其請遂贈若水觀文殿學士諡忠愍安國延康殿學士韐資政殿學士仍詔有死節者諸路詢訪以聞以李綱兼御營使綱既受命有㫖兼充御營使入對言曰今國勢不及靖康間逺甚然而可為者陛下英㫁于上羣臣輯睦于下庶幾中興可圖然非有䂓模而知先後緩急之序則不能以成功夫外禦彊敵内銷盗賊修軍政變士風裕邦財寛民力改弊法省冗官誠號令以感人心信賞罸以作士氣擇帥臣以任方面選監司郡守以奉行新政俟吾所以自治者政事已修然後可以問罪金人迎還二聖此謂規模也至于當急而先者則在于料理河北河東葢兩路之屏蔽已料理稍就然後中原可保而東南可安今河東所失者恒代太原澤潞汾晉河北所失者真定懷衛濬其餘諸郡皆為朝廷守兩路士民兵将皆推豪傑以為首領多者数萬少者不下萬人朝廷不因此時置司遣使以大慰撫之分兵以援其危急臣恐糧盡力疲坐受金人之困雖懐忠義之心危廹無告必且憤怨朝廷金人因得撫而用之皆精兵也莫若于河北置招撫司河東置經制司擇有才畧者為之使宣諭天子恩徳所以不忍棄兩河于敵國之意有能復一州復一郡者以為節度防禦團練使如唐之方鎮使自為守非惟絶其從敵之心又可資其禦敵之力使朝廷永無北顧之憂最今日之先務也帝善其言問誰可任者綱薦張所傅亮亮西人習古兵法綱與語謂可為大将因奏用之綱又立軍法五人為伍伍長以牌書同伍四人姓名二十五人為甲甲正以牌書伍長五人姓名百人為隊隊将以牌書甲正四人姓名五百人為部部将以牌書隊将正副十人姓名三千五百人為軍統制官以牌書部長正副十人姓名招置新軍及御營司兵以此法圑結又詔陜西山東諸路帥臣並依此法互相應援有所呼召使令按牌以遣子旉生大赦皇子生故事當肆赦李綱言陛下登極曠蕩之恩獨遺河北河東及勤王之師夫兩河為朝廷堅守而赦令不及人皆謂已棄之何以慰忠臣義士之心勤王之師在道路半年擐甲荷戈冒犯霜露雖未效用亦已勞矣加以疾病死亡恩䘏不及後有急難何以使人願因今赦廣示徳意帝從之于是人情翕然間有以捷書至者金人圍守諸郡之兵往往引去還元祐黨籍及元符上書人官爵遣宣義郎傅雱使金軍通問二帝初黄潛善白遣雱為祈請使又遣太常少卿周望為通問使俱未行李綱上言堯舜之道孝弟而已今日之事當枕戈嘗膽内修外攘使刑政修而中國彊則二帝不俟迎請而自歸不然雖冠葢相望卑辭厚禮恐亦無益今所遣使但當奉表通問致思慕之意可也帝從之遂命綱草表付雱以往且致書于尼瑪哈是時尼瑀哈専權金主不能令守虚位而已斡里雅布聞帝即位議歸上皇以􅊰好尼瑪哈未之許㑹斡里雅布卒事遂中輟立沿河江淮帥府從李綱請也凡十有九府要郡三十九次要郡三十八帥府兼都總管守臣兼鈐轄都監總置軍九十六萬七千五百人别置水軍七十七將帥府置水兵二軍要郡一軍立軍號曰凌波樓船軍造舟江淮諸州以張慤守誠伯河間樂夀人同知樞密院事兼提舉戸部財用初慤為計度都轉運使帝為大元帥募諸道兵勤王慤飛輓踵道建議印給鹽鈔以便商旅不閲旬得緡錢五十萬以佐軍帝即位以為戸部尚書至是除同知樞密院事兼提舉戸部財用慤建言三河之民怨敵深入骨髓恨不殱殄其類以報國家之仇請因唐人澤潞歩兵雄邊子弟遺意募民聨以什伍而寓兵于農使合力抗敵謂之廵社其法五人為甲五甲為隊五隊為部五部為社皆有長五社為一都社有正副二都社有都副總首甲長以上免身役所結五百人以上借補官有差有功或藝彊及都總首滿三年無過者並補正官論者以其法精詳前此言民兵者皆莫之及詔集為書行之𨽻安撫司慤善理財錢榖利害猶指諸掌在朝諤諤有大臣風節然議論可否未嘗失歡同列時論善之明年卒吕好問罷知宣州侍御史王賓論好問嘗汚偽命不可立新朝帝曰邦昌僭號之初好問募人賫帛書道京師内外之事金人甫退又遣人勸進考其心迹非他人比好問自慙力求去且言邦昌僣號之時臣若閉門潔身實不為難徒以世被國恩所以受賢者之責冐圍賫書于陛下疏入除資政殿學士知宣州以恩封東萊郡侯以宗澤為東京留守澤累表請帝還京師不報澤在㐮陽聞黄潛善復倡和議上疏曰自金人再至朝廷未嘗命一将出一師但聞奸邪之臣朝進一言以告和暮入一説以乞盟終至二聖北遷宗社䝉恥臣意陛下赫然震怒大明黜陟以再造王室今即位四十日矣未聞有大號令但見刑部指揮云不得謄播赦文于河之東西陜之蒲解是禠天下忠義之氣而自絶其民也臣雖駑怯當躬冐矢石為諸将先得捐軀報國恩足矣帝覽其言而壯之及開封尹闕李綱言綏復舊都非澤不可乃以為東京留守知開封府時敵騎留屯河上金鼓之聲日夕相聞而京城樓櫓盡廢兵民雜居盜賊縦横人情洶洶澤威望素著既至首捕誅舍賊者數人下令曰為盜者贓無輕重悉從軍法由是盜賊屏息因撫循軍民修治樓櫓屢出師以挫敵上疏請帝還京師俄有詔荆襄江淮悉備廵幸澤又上疏言開封物價市肆漸同平時将士農工商旅士大夫之懷忠義者莫不願陛下急歸京師以慰人心其倡為異議者不過如張邦昌輩隂與金人為地爾既而金人遣使以使偽楚為名至開封澤拘其人乞斬之有詔延置别館澤奏曰金人假使偽楚來覘虚實臣愚乞斬之以破其奸而陛下惑于人言優加禮遇臣愚不敢奉詔以彰國弱帝乃手札諭澤竟縦遣之真定懷衛間敵兵甚盛方密修戰具為入攻之計澤以為憂乃渡河約諸將共議事宜以圖收復而于京城四壁各置使以領招集之兵造戰車千二百乗又據形勢立堅壁二十四所于城外沿河鱗次為連珠砦連結河東河北山水砦忠義民兵于是陜西京東西諸路人馬咸願聼澤節制澤又開五丈河以通西北商旅守禦之具既備累表請帝還京而帝用黄潛善計決意幸東南不報秉義郎岳飛犯法将刑澤一見竒之曰将材也㑹金人攻汜水以五百騎授飛使立功贖罪飛大敗金人而還陞飛為統制而謂之曰爾智勇材藝古良将不能過然好野戰非萬全計因授飛陣圖飛曰陣而後戰兵法之常運用之妙存乎一心澤是其言飛由此知名詔諸路募兵買馬勸民出財李綱言熙豐間内外禁旅五十九萬今禁旅單弱何以捍彊敵而鎮四方莫若取財于東南募師于西北若得數千萬付諸将以時練之不乆皆成精兵此最為急務于是詔陕西河北京東西路募兵十萬更番入衛河北西路括買官民馬勸民出財助國綱又言歩不足以勝騎騎不足以勝車請以戰車之制頒于京東西路使製造而教習之車製兩竿雙輪上設皮籬以捍矢石下施鐵裙以衛人足旁施鐵索聯可為營四人推竿以運車一人登車以發矢二十人執兵器發車兩旁毎車用二十五人以張所為河北招撫使李綱欲用所以其前論黄潛善因從容與潛善言之使所冐死立功抵罪潛善許諾乃借所直龍圖閣宋南渡後以直閽為庶官任藩閫監司者貼職亦謂之借職充河北招撫使賜内府錢百萬緡給空名告身千餘道以京西卒三千自衛將佐官屬許自辟置一切以便宜從事所入對條上利害且乞置司北京俟措置有緒乃渡河河北轉運副使張益謙附黄潛善意奏招撫司之擾且言自置司河北盜賊益熾李綱言張所尚留京師益謙何以知其擾河北民無所歸聚而為盜豈由置司益謙非理沮抑如此必有使之者上乃命益謙分析命下樞密院汪伯彥猶用其奏詰責招撫司綱與伯彥力爭伯彥語塞所招徠豪傑擢王彥字子才上黨人為都統制時岳飛上書言勤王之師日集宜乗敵怠而擊之黄潛善汪伯彥輩不能承聖意恢復奉車駕日益南恐不足繫中原之望願陛下乗敵穴未固親率六軍北渡則將士作氣中原可復坐越職言事奪官歸詣所所以飛為中軍統領問之曰爾能敵幾何飛曰勇不足恃用兵在先定謀欒枝曵柴以敗荆莫敖采樵以致絞皆謀定也所矍然曰君殆非行伍中人飛因説所曰國家都汴恃河北以為固苟憑據要衝峙列重鎮一城受圍則諸城或擾或救金人不能窺河南而京師根本之地固矣招撫誠能提兵壓境飛唯命是從所大喜借補飛武經郎秋七月以王􅊛為河東經制使傅亮副之又以錢葢為陜西經制使右諫議大夫宋齊愈以罪棄市齊愈附黄潛善汪伯彦上疏論李綱募兵買馬括財三事之非不報章擬再上其鄉人嗛齊愈者竊其草示綱時方論潛逆附偽之罪而齊愈實書邦昌姓名以示衆者于是逮齊愈于獄齊愈不承獄吏曰王尚書輩所坐不輕然但遷嶺南爾齊愈引伏遂命戮于東市以范致虚知鄧州李綱嘗言車駕廵幸之所闗中為上㐮陽次之建康為下陛下縱未能行上策猶當且適㐮鄧示不忘故都以繫天下之心不然中原非復我有車駕還闕無期矣帝乃諭兩京以遷都之意讀者感泣既而有詔欲幸東南避敵綱極言其不可且曰自古中興之主起于西北則足以據中原而有東南起于東南則不能復中原而有西北葢天下精兵健馬皆在西北若委中原而棄之豈惟金人將乗間以擾内地盜賊亦將蠭起為亂跨州連邑陛下雖欲遷闕不可得矣况欲治兵勝敵以歸二聖哉夫南陽光武之所興有髙山峻嶺可以控扼有寛城平野可以屯兵西隣闗陜可以召將士東達江淮可以運穀粟南通荆湖巴蜀可以取財貨北距三都可以遣救援蹔議駐蹕乃還汴都策無出于此者今乗舟順流而適東南固甚安便第恐一失中原則東南不能必其無事雖欲退保一隅不可得也況嘗降詔許留中原人心悦服柰何詔墨未乾遽失大信帝乃許幸南陽以范致虚知鄧州修城池繕宫室輸錢穀以實之而汪伯彦黃潛善隂主揚州之議或謂綱曰外論洶洶咸謂東幸已決綱曰國之存亡于是焉分吾當以去就争之罷西道都總管閤門宣贊舍人曹勛字公顯陽翟人以上皇手書至自金上皇在燕山謂閤門宣贊舍人管幹龍徳宫曹勛曰我夢四日並出此中原争立之象不知中原之民尚肯推戴康王否因出御衣絹半臂親書其領中曰便可即真來救父母又諭勛曰如見康王第言有清中原之策悉舉行之毋以我為念又言藝祖有舊約藏之太廟不殺大臣及言事官違者不祥康王夫人邢氏聞勛南遷亦脱所御金環使内侍持付勛曰幸為我白大王願如此環得早相見也勛遂間行至南京以御衣進帝泣以示輔臣勛因建議募死士入海至金東境奉上皇由海道歸執政難之出勛于外命都統制王淵等分討江淮羣盜自宣和末羣盜蠭起至是祝靖薛廣党忠閻僅王存之徒皆招安赴行在李綱言今日正當因其力而用之如銅馬綠林黄巾之比然不移其部曲則易叛而徙之則致疑正當以術制之使由而不知乃命御營司分揀凡潰兵願歸營與良農願歸業者皆聴所發至數萬其他以新法團結分𨽻諸將由是無叛去者獨淮寧之杜用山東之李昱河北之丁順皆擁兵數萬而拱單州皆有潰卒數千為亂綱以招安則彼無畏憚勢難遽平乃白遣淵與韓世忠劉光世張俊分討之而光世遣部將擊李昱斬之淵殺杜用丁順赴河北招討司自效盜自是少衰時又有闗中賊史彬僭號稱帝進犯興州又趙萬張遇皆以潰軍為盜萬襲常州執守臣何衮遂陷鎮江知府趙子崧遁保𤓰洲遇自淮西渡江縱掠池州驅丁壯以益其軍未㡬王淵誘萬誅之明年淵復招降張遇以其兵萬人屬韓世忠史彬冦漢中不克引兵欲取長安曲端遣吳玠擊斬之永曲端字正甫鎮戎人呉玠字晉卿隴千人徙洛金初税牛具續綱目繫于靖康元年十二月今依金史太宗紀每牛三頭為一具毎具賦粟五斗八月杭州軍亂軍校陳通作亂執帥臣葉夢得殺轉運判官吳昉等命御營統制辛道宗討之兵潰于秀州尋以王淵為制置賊盜使淵入杭州執通等誅之陳通之叛也知秀州權兩浙提刑趙叔近以數騎入城中諭以禍福衆感服叔近因請赦之臺諫不可事遂寢已而王淵兵至淵與叔近有宿憾既誅通遂誣叔近通賊奪職拘于州以朱芾代之芾殘虐軍民怨憤明年小校徐明囚芾奉叔近領郡事叔近撫定之請擇守臣于朝奏未達朝廷命張俊致討後淵部將也希淵㫖以叔近從賊遽殺之明等見叔近死乗城縱火俊斬闗入捕明送行在後臺臣有訟叔近寃者詔贈官趙叔近奏悼王廷美五世孫元祐太后如揚州帝從黄潛善汪伯彦言將幸揚州以避敵詔副都指揮使郭仲荀奉太后先行六宫及衛士家屬皆從遣使詣汴京迎奉太廟神主赴行在以李綱黃潛善為尚書左右僕射兼門下中書侍郎綱嘗侍帝論及靖康時事帝曰淵聖勤于政事省覽章奏終夜不寐然卒至播遷何也綱對曰人主之職知人進君子退小人則大功可成否則衡石程書無益也因勉帝以明恕盡人言恭儉足國用英果斷大事帝納之綱之所論諫其言切直帝初無不容納至是惑于黃潛善汪伯彦之言常留中不報更號元祐太后曰隆祐太后尚書省言元字犯后祖諱請易以所居宫名從之召河東經制副使傅亮還行在罷李綱提舉洞霄宫傅亮軍行十餘日黃潛善等以為逗遛令東京留守宗澤節制亮軍即日渡河亮言措置未就而渡河恐誤國事李綱為之請潛善等不以為然綱言招撫經制二司臣所建明而張所傅亮又臣所薦用今黃潛善汪伯彦沮所亮所以沮臣臣每鑑靖康大臣不和之失事未嘗不與潛善伯彦議而後行而二人設心如此願陛下虚心觀之既而召亮赴行在綱言聖意必欲罷亮乞付黃潛善施行臣得乞身歸田里綱退而亮竟罷綱乃再疏求去帝曰卿所争細事胡乃爾綱言方今人材將帥為急恐非小事臣昨議遷幸與潛善伯彦異宜為所嫉然臣東南人豈不願陛下東下為安便哉顧一去中原後患有不可勝言者願陛下以宗社為心以生靈為意以二聖未還為念勿以臣去而改其議臣雖去左右不敢一日忘陛下泣辭而退或曰公決于進退于義得矣如讒者何綱曰吾知盡事君之道不可則全進退之節患禍非所恤也㑹侍御史張浚劾綱以私意殺宋齊愈且論其買馬招軍之罪潛善伯彦等復力排綱請帝去之遂罷綱為觀文殿大學士浚論綱不已乃落職止提舉洞霄宫綱在相位凡七十七日綱罷而招撫經制司廢車駕遂東幸兩河郡縣相繼淪陷凡綱所規畫軍民之政一切廢罷金兵益熾闗輔殘毁而中原盜賊蠭起矣殺太學生陳東布衣歐陽澈字徳明崇仁人東自丹陽召至未得對㑹李綱罷乃上書乞留綱而罷黃潛善汪伯彦不報又上疏請帝親征以還二聖治諸將不進兵之罪以作士氣車駕宜還京師勿幸金陵又不報潛善揭示綱請幸金陵舊奏東言綱在途中不知事體宜以後説為正會撫州布衣歐陽澈徒步詣行在伏闕上書極詆用事大臣潛善遽以語激怒帝言若不亟誅將復鼓衆伏闕書獨下潛善所府尹孟庾召東議事東請食而行手書區處家事字畫如平時已乃授其從者曰我死爾歸致此于吾親食已如厠吏有難色東笑曰我陳東也畏死即不敢言已言肯逃死乎吏曰我亦知公安敢相迫頃之東具冠帶出别同邸乃與澈同斬于市四明李猷贖尸瘞之東初未識綱特以國故為之死識與不識皆為流涕許翰罷李綱既罷翰言綱忠義英發舍之無以佐中興今罷綱臣留無益力求去帝不許及陳東見殺翰謂所親曰吾與東皆争李綱者東戮于市吾在廟堂可乎乃為東澈著哀辭而八上章求罷遂以資政殿大學士提舉洞霄宫九月封子為魏國公安置河北招撫使張所于嶺南都統制王彦等渡河敗金人于新鄉注見前進次太行太行第三陘曰白陘在衛輝府輝縣西金人圍之彦兵潰走保共城注見前彦帥岳飛等十一將部七千人渡河至新鄉金兵盛彦不敢進飛獨引所部鏖戰奪其纛而舞諸軍争奮遂復新鄉明日戰于侯兆川亦曰侯趙川在輝縣西北有關重山四障險隘天成飛身被十餘創士皆死戰又敗之會食盡詣彦壁乞糧彦不許飛引兵益北與金人戰于太行山擒其將托卜伊勒呼舊作耶烏今改後仿此居數日又與敵遇飛單騎持丈八鐵鎗刺殺其將黑風大王金人敗走飛知彦不悦已遂率所部復歸宗澤澤復以為統制彦以屢勝因傳檄州郡金人以為大軍至率騎數萬薄彦壘圍之數匝彦以衆寡不敵潰圍出走諸將敗去彦獨保共城西山即太行山遣腹心結兩河豪傑圖再舉金人購求彦急彦慮變夜寢屢遷其部曲覺之相率刺面作赤心報國誓殺金賊八字文獻通考王彦聚兵太行山皆湼其面目誓殺金人不負趙王故號八字軍與此稍異以示無他意彦益感勵撫愛士卒與同甘苦未幾兩河響應忠義民兵首領傅選孟徳劉澤焦文通等皆附之衆十餘萬綿亘數百里皆受彦約束金人患之召其首領俾以大兵破彦壘首領跪而泣曰王都統砦堅如鐵石未易圖也金人乃間遣騎兵撓彦糧道彦勒兵待之斬獲甚衆張邦昌伏誅初邦昌僭居禁中華國靖恭夫人李氏數以果實奉邦昌邦昌亦厚答之一夕邦昌被酒李氏擁之曰大家事已至此尚何言因以赭色半臂加邦昌身掖入福寧殿夜飾養女陳氏以進及邦昌還東府李氏私送之語斥乗輿至是事聞下李氏于獄詞伏詔馬伸如潭數邦昌之罪賜死併誅王時雍等金盡陷河北州郡金棟摩破河間府雄州達蘭後改名昌穆宗之子舊作達賚今改破祈保州永寧順安軍二軍皆宋置永寧今保定府蠡縣是順安今保定府髙陽縣是餘注俱見前惟慶源府邢洺冀磁相州乆之乃破冬十月帝如揚州先是黃潛善汪伯彦力主幸東南㑹金人攻河陽氾水軍許景衡字少伊温州遂安人亦言建康天險可據帝從之詔淮浙沿海諸州増修城壁招訓民兵以備海道又命揚州守臣吕頤浩繕修城池至是諜者言金人欲犯江浙詔蹔駐淮甸捍禦稍定即還京闕有敢妄議惑衆沮巡幸者許告而罪之不告者斬宗澤上疏極言京師不可棄黃潛善汪伯彦贊議南幸之非澤前後建議輒為黃汪所抑二人每見澤奏至皆笑以為狂於是帝決意下揚州十月朔帝登舟時兩河雖多破于金而其民懐朝廷恩所在結為紅巾出攻城邑皆用建炎年號金人稍稍引去及聞帝南幸無不解體澤復上疏言欲遣閭勍王彦各統大軍盡平敵壘望陛下早還京闕臣之此舉可保萬全或姦謀蔽欺未即還闕願陛下從臣措畫勿使姦臣沮抑以誤社稷大計陳師鞠旅盡掃烟塵然後奉迎鑾輿還京以塞姦臣之口以快天下之心帝優詔答之十一月竄故相李綱于鄂州尋責授單州團練使安置于萬安軍今瓊州府萬州宋為萬安軍遣朝奉郎王倫使金詔選能専對者使金問二帝起居倫出應詔乃假倫刑部侍郎充大金通問使閤門舍人朱弁字少章徽州婺源人副之至雲中見尼瑪哈議事時金方大舉南下倫邀説百端尼瑪哈不聴使就館守之以兵先是淵聖自雲中徙燕山始與太上皇相見居于愍忠寺至是並遷于霫郡霫古溪國也在燕山北千里既至居相府院嗣濮王仲理等千八百人尚在燕金人計口給糧監視嚴宻死者甚衆知密州趙野棄城走為其下所殺野見山東盜賊充斥帝如淮甸乃攜其家棄城走軍校杜彦等乗間作亂自為知州遣人追野殺之十二月金人分道南下遂破西京留守孫昭逺走死河東經制使王􅊅引兵遁蜀金人聞帝如揚州起燕京等八路民兵分三道南侵尼瑪哈自雲中下太行由河陽渡河攻河南分遣尼楚赫等攻漢上鄂爾多後改名宗輔金太祖之子世宗之父按鄂爾多舊作訛里多今改後仿此烏珠後改名宗弼太祖第四子按烏珠舊作兀术今改後仿此自燕山由滄州渡河攻山東分阿里富埒琿海蘭路烏勒呼多懽山人舊作蒲盧渾海蘭路烏勒呼多懽山舊作曷懶路烏古敵昬山今改後仿此軍趨淮南羅索與薩里罕和勒博散之子後改杲舊作撒里里喝和勒博散舊作瑚魯補善今改後仿此哈富舊作黒鋒今改自同州渡河攻陜西尼瑪哈至氾水闗孫昭逺南走為叛兵所害宗澤聞金人將謀侵汴遣劉衍趨滑州劉達趨鄭州以分其勢戒諸將保獲河梁以俟大兵之集烏珠乃不敢向汴夜斷河梁而去羅索至河中官軍扼河西岸不得渡乃自韓城履氷過破同華州沿河安撫使鄭驤字潛翁信州玉山人赴井死遂破潼闗王􅊅棄陜州引兵遁入蜀中原大震戊申二年金天會六年春正月帝在揚州金人破鄧州范致虚出奔安撫使劉汲字直夫眉州丹稜人死之京西州郡皆破尼瑪哈諜知鄧州將為行在所命尼楚赫急攻之致虚遁汲分兵守要害自以牙兵四百登陴敵至皆死鬭矢如雨下軍中請汲去汲不聴遂死之初議南陽備巡幸儲偫甚多悉為金人所有又分兵破襄陽均房唐汝陳蔡鄭州潁昌府悉遷其民于河北通判鄭州趙伯振太祖八世孫知潁昌府孫黙知汝陽縣郭贊宋史忠義傳作汝陽丞皆不屈而死金將烏珠侵東京宗澤敗之金烏珠自鄭抵白沙鎮名在開封府中牟縣西去汴京密邇都人震恐僚屬入問計宗澤方對客圍棊笑曰何事張皇劉衍等在外必能禦敵乃選精鋭數千使繞出敵後伏其歸路金人方與衍戰伏兵起前後夾擊之金人果敗尼瑪哈據西京與澤相持澤遣部將閻中立郭俊民李景良等帥兵趨鄭遇敵大戰兵敗中立死之俊民降景良遁去澤捕景良斬之既而俊民與金將史姓者持書來招澤澤皆斬之劉衍還金人復入滑澤部將張撝往救之撝至滑衆寡不敵或請少避之撝曰避而偷生何面目見宗公力戰而死澤聞撝急遣王宣往援已不及因與金人大戰破走之澤以宣知滑州金自是不犯東京澤得金將遼臣王策于河上解其縛問金之虚實得其詳遂決大舉之計召諸將謂曰汝等有忠義心當協謀勦敵期還二聖以立大功言訖泣下諸將皆聴命金人屢戰不利悉引去澤復上疏請帝還京臣為陛下保䕶京師自去年秋至今春又三月矣陛下不早回則天下之民何所依戴不報澤威聲曰著敵聞其名常尊憚之金人破永興軍經畧使唐重字聖任眉州彭山人死之羅索既破同華諸州遂圍永興時京兆兵皆為經制使錢蓋調赴行在重度勢不可支以書别其父克成克成報之曰汝能殉國吾含笑入地矣及金兵圍城重與守臣會盟死守而經制副使傅亮以精鋭數百奪門出降重遂與副總管楊宗閔存中之祖提舉軍馬程迪字惠老開封人提㸃刑獄郭忠孝字立之河南人逹之子轉運副使桑景詢判官曽謂經略主管機宜文字王尚等七人俱死東平軍校孔彦舟字巨濟相州林慮人作亂渡淮寇黃州彦舟聞金兵將至山東遂帥所部刦殺居民燒廬舍掠財物而南渡淮犯黃州乆之彦舟犯荆南詔諭降之以為湖北捉殺使事在明年十二月金人破濰州知州事韓浩琦之孫死之鄂爾多使棟摩攻濰州知州韓浩率衆死守城破與通判朱廷傑皆力戰死金又入青州尋棄去竄内侍邵成章于南雄州時所在盜起汪伯彦黃潛善匿不以聞成章上疏言二人必誤國帝怒除名編管南雄州以劉豫字彦游景州阜城人知濟南府豫為河北提刑金人南侵豫棄官避地真州注見前張慤薦之起知濟南時盜起山東豫不願行請易東南一郡執政不許豫忿而去金人侵熙河都監劉惟輔涇州人逆擊於新店地名在秦州西破之考宋史髙宗紀新店之戰在是年正月張嚴之敗在四月續綱目併書于二月而于三月尼瑪哈焚西京條目云尼瑪哈道閒嚴已死則嚴之死又似在四月以前本紀所書恐不足據然新店之戰已在正月無疑今依之書綱而以張嚴之死分注目下羅索既破永興鼓行而西秦州帥臣李績降兵勢益張引兵犯熙河經略使張深遣惟輔以精騎二千人禦之夜趨新店金人恃勝不慮黎明軍進惟輔舞矟刺其帥合鋒洞胸墮馬死金人奪氣既而深更檄隴右都䕶張嚴往追之嚴追羅索至鳳翔境上鋭意擊敵至五里坡羅索伏兵坡下嚴與曲端期不至徑前遇伏戰不利死之鳳五里坡在翔縣西二月河北盗楊進等降于宗澤楊進聚衆三十萬丁進王再興李貴王大郎等擁衆各數萬往來京西淮南河南北侵掠澤遣人諭以禍福悉招降之有王善者河東巨寇也擁衆七十萬車萬乗欲據京城澤單騎至善營泣謂之曰朝廷危難之時使有如公一二輩豈復有敵患乎今日乃汝立功之秋不可失也善感泣曰敢不効力遂解甲降金人破淮寧府知府向子韶字和卿開封人死之金人晝夜攻城子韶率軍民固守遣人詣宗澤乞援未至城破金人欲降之子韶罵不屈遂為所殺闔門皆遇害事聞賜諡忠毅初金兵至淮寧楊時聞之曰子韶必死矣蓋知其素守云和州防禦使馬擴聚兵于真定五馬山在正定府贊皇縣東山有五馬石因名奉信王榛徽宗第十八子以總制諸砦擴奔五馬山砦聚兵得信王榛于民間奉之以總制諸砦兩河遺民聞風響應三月金尼瑪哈焚西京而去總制官翟進字先之河南伊陽人復之詔以進為京西北路安撫使尼瑪哈聞張嚴東出自河南西入闗以援羅索盡焚西京廬舍擄其民而北時韓世忠以所部萬人受詔赴西京捉殺盗賊尼瑪哈復留烏珠屯河陽以待之翟進得以其衆復京西宗澤奏進為京西北路安撫使詔從之尼瑪哈在道聞張嚴已死遂自平陸渡河還雲中既而烏珠來攻西京進與韓世忠迎戰而敗世忠収餘兵南歸進復集鄉兵與戰屢敗之殺其將翟海乗勝遂入洛陽金帥益至斧門而入進與巷戰金人引去時烏珠等聞尼瑪哈渡河亦留兵戌河陽北還知中山府陳遘為其下所殺金人遂破中山中山受圍三年城中糧絶人皆羸困不能執兵知府陳遘欲盡括城中兵力戰部將沙振潛衷刃入府害遘及其子錫等十七人振出為帳下卒所殺捽裂之身首無餘城破金人見遘尸曰忠臣也歛而葬之夏四月金羅索侵經原經略使曲端使吳玠擊之羅索敗走同華羅索既破張嚴勢益張引兵侵涇原曲端使吳玠逆擊於青溪嶺在平凉府涇州西南士殊死鬬大敗之金人遂東走同華石壕鎮名在陜州東南唐杜甫詩暮投石壕村即此尉李彦仙復陜州金人得陜用降者守之使招集散亡時彦仙保三砦屢敗金師破其五十餘壁以計復陜州及絳解諸縣事聞詔彦仙知陜州兼安撫使工部侍郎兼侍講楊時罷帝初即位除時工部侍郎陛對言古聖賢之君未有不以典學為務者除兼侍講以老連章丏外遂以龍圖閣直學士提舉洞霄宫既而以本官致仕初時在東郡先達陳瓘鄒浩皆以師禮事之既渡江東南學者推為程氏正宗以信王榛為河外兵馬都元帥五月下詔還京師不果時宗澤招撫羣盜聚城下又募兵儲糧召諸將約日渡河諸將皆掩泣聴命澤乃上疏大約言祖宗基業可惜陛下父母兄弟䝉塵沙漠日望救兵西京陵寢為敵所占今年寒食節未有祭享之地而兩河二京陜右淮甸百萬生靈陷于塗炭乃欲南幸湖外蓋姦邪之臣一為仇敵方便之計二為姦邪親屬皆已津置在南故也今京城以増固兵械已足備人氣已勇鋭望陛下毋沮萬民敵愾之氣而循東晉既覆之轍奏至或言信王榛有渡河入汴之謀帝乃降詔擇曰還京既而不果許景衡罷尋卒諡忠簡時朝廷有大政事景衡必請間極諫黃潛善汪伯彦以為異已因共以渡江南幸之議為景衡罪罷之景衡行至𤓰州得暍疾卒景衡得程頤之學志盧忠純議論不與時俯仰既卒帝思之曰朕自即位以來執政忠直遇事敢言惟許景衡爾定詩賦經義試士法元祐中科舉以經義詩賦兼取紹聖以來罷試詩賦至是命叅酌元祐科舉條制定試士法中書省請習詩賦舉人不兼經義習經義人止習一經解試省試並記數各取通定髙下故事廷試上十名内侍先以卷奏定帝曰取士當務至公豈容以己意升降自今勿先進卷以宇文虚中充金國祈請使虚中降金虚中時竄韶州㑹詔求使絶域者虚中應詔乃復資政殿大學士充祈請使稱臣奉表于金時金人方興兵南侵已留王倫朱弁矣虚中至金人遣之歸虚中曰奉命北來求請二帝二帝未還虚中不可歸遂留時金國初建制度草創頗愛虚中有才藝每加官爵虚中即受之遂與韓昉字公美燕京人俱掌制詔御營統制韓世忠㑹宗澤以禦金王彦引兵屯滑州時得報金人分道渡河詔世忠與澤率所部迎敵澤聞王彦聚兵太行山欲大舉趨太原澤即以彦為忠州防禦使制置河北軍事恐彦孤軍不可獨進召彦計事彦悉召諸寨指授方畧以俟㑹合乃以萬餘人先發金人以重兵躡其後而不敢擊既至汴澤令宿兵近甸以衛根本彦遂屯滑州之沙店澤上疏曰臣欲秉此暑月遣彦等自滑州渡河取懷衛濬相州等王再興等自鄭州趨䕶西京陵寢馬擴等自大名取洺相真定楊進王善丁進等各以所領兵分路並進既渡河則山寨忠義之民相應者不啻百萬願陛下早還京師臣當躬冐矢石為諸將先中興之業必可立致疏入黄潛善等忌澤成功從中沮之沙店城名在衛輝府滑縣西南金羅索大掠而東遂破絳州初宗澤承制以王庶字于尚慶源人為陜西制置使曲端為河東經制使未幾錢葢聞金破長安檄庶兼節制環慶涇原兵既而金人東還庶以金人重載可襲取勝移文兩路協力更戰而環慶帥王似涇原帥席貢不欲受庶節度遂具文以報而實不出兵金人至清溪為吳玠所扼至咸陽望渭南義兵滿野不得渡遂循渭而東其支軍入鄜延攻康定金史地理志鄜州宋置康定軍節度庶急遣兵斷河橋又令劉延亮屯神水峽在西安府同官縣東北兩岸峻削道從石峽中行至為險阻舊設金鎖闗于此斷其歸路金人遂去曲端乗其退復下秦州端雅不欲屬庶㑹延亮自鳯翔歸端斬之庶猶以書約似貢欲逼餘衆渡河復限大河自守似貢竟不應時絳州猶為國拒守羅索還軍破之既而詔以王庶節制陜西諸軍曲端為都統制㑹陕西撫諭使謝亮持詔賜夏國庶遺書曰大夫出疆有可以安社稷利國家専之可也夏人之患小而緩金人之禍大而紀迫方此敵挫銳于熈河奔北于本路子女玉帛不知極占據同華畏暑休兵閤下能仗節督諸路協同義舉争先並進亦可以驅逐渡河全秦奠枕徐圖恢復亮不聽六月京畿淮甸蝗秋七月東京留守宗澤卒諡忠簡以杜充字公美相人代之澤前後請帝還京二十餘奏每為潛善汪伯彦所抑潛善伯彦又疑澤為變以郭仲荀為副留守以察之澤憂憤成疾疽發于背諸將入問疾澤矍然曰吾以二帝䝉塵憤憤至此汝等能殱敵則吾死無恨衆皆流涕曰敢不盡力諸將出澤歎曰出師未㨗身先死長使英雄淚滿襟無一語及家事但連呼過河者三而卒都人號慟訃聞贈觀文殿學士澤子頴居戎幕素得士心都人請以頴繼父任時已命杜充代澤不許充酷而無謀至汴悉反澤所為于是豪傑離心降盗聚城下者復去剽掠矣未幾楊進丁進王善等相繼皆叛楊進掠汝洛間衆至數萬翟進擊之追奔數十里馬驚墜塹為賊所害已而楊進南走翟興邀擊于魯山進中流矢死餘衆悉潰丁進寇淮西劉正彦誘降之尋為王淵所誅王善與叛將張用駐京西兵馬連亘光夀千里不斷所至擄掠一空彦翟興字公祥進之兄劉正法之子八月作御寳金之入汴也九寳惟大宋受命寳及定命寳在于是帝作寳三一曰皇帝欽崇國祀之寳二曰天下合同之寳三曰書詔之寳後紹興元年復作大來中興寳貶殿中侍御史馬伸監濮州酒稅卒于道伸自湖南還上疏言黄潛善汪伯彦不法十七事乞速罷二政柄别選賢者共圖大事疏入留中明日改授衛尉少卿伸辭不拜録其疏申御史臺且言臣論可采即乞施行非是合坐誣罔之罪因移疾待命詔伸言事不實送吏部責監濮州酒稅趣使上道伸怡然襆被而行竟卒道中聞者寃之伸學于程頤勇于為義毎曰吾志在行道以富貴為心則為富貴所累以妻子奪念則為妻子所奪道不可行也以趙子砥太祖後令珦之子知台州子砥至燕山遁歸命輔臣問北事甚悉子砥大畧言金人講和以用兵我國斂兵以待和吾國與金勢不兩立昔契丹主和議女真主用兵十餘年間竟滅契丹今復蹈其轍譬人畏虎以肉餧之食盡終于噬人若設陷穽以待之然後可以制虎矣遂命知台州河北京東捉殺使李成字伯友雄州歸信人叛詔江淮制置使劉光世討之光世至光州大破成衆招降二萬餘人成遁去已而成黨郭仲威攻陷淮陽成轉掠淮北陷泗州遂據其城帝向降詔撫諭命成知泗州事未幾成復䧟滁州殺安撫子伋及官屬時又有淮盗劉忠攻陷舒州通判孫知㣲被執不屈忠怒臠而食之事俱在明年金主廢宋上皇為昬德公靖康帝為重昬侯徙之韓州遼置元省故城在今奉天府開原縣東北二帝赴上京金主命以素服見金太祖廟遂見金主于乾元殿金主封太上皇為昬德公靖康帝為重昬侯未幾徙之韓州令下之日盡空其城命晉康郡王孝騫等九百餘人至韓州同處給田十五頃令種蒔以自給惟秦檜不與徙依達蘭以居達蘭亦厚待之九月金將鄂爾多襲破信王榛于五馬山砦遂㑹尼瑪哈南侵初馬擴自五馬山詣行在黄潛善汪伯彦疑其非真及行授密㫖使稽察信王榛且令擴聽諸路節制擴知事不成遂留大名不進金鄂爾多恐擴以援兵至急發兵攻五馬山諸砦斷其汲路諸砦皆陷榛亡走不知所終鄂爾多既破諸砦探知擴兵南來使人馳㑹尼瑪哈未至鄂爾多敗擴軍于清平尼瑪哈聞之遂由黎陽渡河與鄂爾多㑹兵以攻澶濮冬十月隆祐太后如杭州侍御史張浚請先定六宫所居地詔孟忠厚字仁仲隆祐太后兄子奉太后及六宫皇子如杭州以苖傅劉正彦為扈從都副統制知濮州楊粹中正定府人襲破金尼瑪哈軍十一月金人破濮州粹中死之尼瑪哈鄂爾多合兵圍濮州以濮州小易之至城下知州楊粹中固守命將姚端夜𢷬其營尼瑪哈跣足走僅以身免遂攻城益急凡三十三日而破粹中被執竟不屈而死是月金烏珠破開德府守臣王棣死之又破相州守臣趙不試死之趙不試太宗六世孫金羅索破延安王庶使曲端將兵救之端次于襄樂漢縣屬上郡後魏徙置于北地郡故城在今慶陽府寧州不進庶至京兆端不欲屬庶凡有命多託辭不行庶無如之何令還端涇原時金羅索渡河諜知庶端不協乃併兵攻鄜延庶調兵自沿河至馮翊據險以守金人先已乗氷渡河犯晉寧今陜西葭州宋元符初置晉寧軍侵丹州注見前又渡清水河注亦見前破潼闗秦隴皆震庶傳檄諸路㑹兵禦之時端盡統涇原精兵駐淳化宋縣今屬邠州庶日移文趣端進端不聽而遣其副將吳玠復華州自引兵迂道自邠之三水漢縣屬安定郡後親徙置于栒邑今縣屬邠州與玠㑹于襄樂金攻延安急庶自坊州收散亡往援知興元府王􅊛亦將所部兵赴之比庶至甘泉唐縣今屬延安府延安已破通判魏彦明不屈而死彦明開封人庶無所歸以兵付􅊛自將百騎與官屬馳赴襄樂勞軍猶以節制望端欲倚以自副端彌不平見庶問延安失守狀謀殺之不果乃拘其官屬奪其節制使印㑹庻自劾得詔罷守京兆乃去時王􅊛將兩軍在慶陽端使其統制張中孚往召之曰􅊛若不聽則斬以來㑹􅊛已去追之不及張張中孚字信甫義堡人金始撰國史女真初未有文字尼瑪哈好訪問女真老人多得其祖宗遺事及金主嗣位韓昉輩皆在左右文學之士稍見抜擢至是詔採摭遺言舊事以備國史命烏頁後改名朂字勉道穆宗英額第五子按烏頁舊名烏野今改後仿此與耶律迪延舊作廸越今改掌之以魏行可建州建安人假禮部侍郎使金軍行可應募使金軍見金人于澶淵金人知其布衣借官待甚薄因留不遣行可嘗貽書金人警以不戢自焚之禍竟卒于金朝享祖宗神主于夀寧寺郊大赦金人侵晉寧軍知軍事徐徽言字彦猷衢州建安人拒却之知府州折可求叛降金先是徽言隂結汾晉土豪約以復故地則奏官為守長聽其世襲㑹朝論與金結和抑其所請金忌徽言欲速拔晉寧以除其患既破延安遂自綏德渡河圍之三月徽言屢破郤之至是徽言約可求出兵夾攻金人羅索聞之執可求子彦文使為書招可求可求遂以所屬麟府豐三州降金可求與徽言連姻金人使招徽言于城下徽言引弓射之可求走徽言引兵擊金人大敗之斬羅索之子十二月劉豫叛降金達蘭圍濟南劉豫遣子麟禦郤之達蘭遣人啗豫以利豫懲前忿遂殺濟南驍將闗勝率百姓降金百姓不從豫縋城納欵金鄂爾多破北京提刑郭永元城人死之鄂爾多攻大名急守臣張益謙欲遁永曰北門所以遮梁宋敵得志則朝廷危矣因自率兵晝夜乗城且縋死士告急于行在㑹大霧四塞城遂破益謙與轉運判官裴億迎降鄂爾多問曰城破乃降何也二人以永不從為辭鄂爾多遣騎召永謂曰沮降者誰永曰不降者我鄂爾多以富貴啗之永罵曰無知犬豕恨不醢爾以報國何說降乎鄂爾多怒併其家屬皆殺之以黄潛善汪伯彦為尚書左右僕射兼門下中書侍郎顔岐朱勝非為門下中書侍郎潛善伯彦入謝帝曰潛善作左相伯彦作右相朕何患國事不濟時金兵横行山東羣盗蜂起而潛善伯彦既無謀畧専權自恣東京委之御史南京委之留臺泗州委之郡守言事者不納其說請兵者不以上聞金兵日南而潛善等以為李成餘黨無足慮者金尼瑪哈破襲慶府今兖州府宋政和中為襲慶府軍士有欲發孔子墓者尼瑪哈問其通事髙慶裔曰孔子何人曰古之大聖人尼瑪哈曰大聖人墓安可發遂殺軍士以禮部侍郎張浚參贊御營軍事浚極言金人必來請豫為備黄潛善汪伯彦以為過計而笑之命浚參贊軍事與吕頤浩教習河朔民兵御批歴代通鑑輯覽卷八十三

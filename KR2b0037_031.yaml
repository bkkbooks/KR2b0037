body:
  text: 石勒遣長史王修獻捷于漢漢主曜遣使授勒太宰進爵趙王修舍人曹平樂留仕漢言于曜曰勒遣修來實覘彊弱俟其復命將襲乘輿曜乃遣使斬修勒大怒曰孤事劉氏于人臣之職有加矣彼之基業皆孤所為今既得志還欲相圖趙王趙帝孤自為之何待于彼耶由是曜勒交惡三月合祭天地于南郊帝親祀南郊以未有北郊并地祇合祭之詔尊琅邪恭王為皇考既而罷之詔琅邪恭王宜稱皇考賀循曰禮子不敢以已爵加于父乃止夏四月將軍陳川以浚儀注見前叛降石勒初蓬陂即春秋蓬澤注見前塢主陳川自稱寧朔將軍陳留太守祖逖之攻樊雅也事具前川遣其將李頭助之頭力戰有功逖厚遇之頭每嘆曰得此人為主吾死無恨川聞而殺之大掠豫州諸郡逖遣兵擊破之遂叛降石勒南陽王保自稱晉王保既稱王改元建康置百官時上邽大饑士衆困迫復為陳安所逼陳安叛保事具前張實遣兵救之安乃退既而保為諸將張春楊次所殺保體肥大重八百斤喜腫好讀書而暗弱無斷故及于難先是陳安自稱秦州刺史降于漢又降于成及聞保被殺奉表劉曜以討賊執楊次斬之以天子禮葬保于上邽諡曰元張春奔枹罕安尋叛曜有衆十餘萬自稱凉王踰年曜擊斬之安善撫士卒及死隴上人思之為作壯士之歌六月祖逖討陳川石勒遣兵救之逖退保淮南勒兵守蓬關蓬陂之關逖攻陳川于蓬關石勒遣石虎桃豹救之逖兵敗退屯淮南虎徙川部衆于襄國留豹守川故城即蓬陂塢以周訪為荆州刺史王敦自領之表加訪安南將軍初王敦患杜曽難制謂周訪曰若擒曽當相論為荆州至是訪破斬曽并得第五猗送敦斬之而敦不用王廙在荆州多殺陶侃將佐士民怨怒帝徵為散騎常侍而以訪代之從事郭舒說敦曰荆州雖荒弊乃用武之國不可以假人宜自領之訪為梁州足矣敦從之乃加訪安南將軍餘如故訪大怒敦手書譬解並玉環玉碗遺之訪抵之于地曰吾豈賈豎可以寶悅耶訪在襄陽務農訓兵隂有圗敦之志守宰有缺輒補然後奏敦不能制漢改號趙漢主曜徙都長安立宗廟社稷南北郊改國號為趙冬十一月石勒稱趙王是為後趙勒即趙王位稱元年以將軍支雄等主胡人辭訟禁胡人不得陵侮華族遣使循行州郡勸課農桑朝㑹始用天子禮樂加張賔大執法専總朝政禮遇優顯羣臣莫及呼曰右侯而不名以石虎為驃騎將軍督諸軍賜爵中山公勒悉召武鄉耆舊詣襄國歡飲勒微時與李陽鄰居數爭漚麻池相毆陽由是獨不敢來勒曰孤方兼營天下豈讐匹夫乎遽召與飲引陽臂曰孤往日嚴卿老拳卿亦飽孤毒手因拜都尉漚麻池在遼州榆杜縣北有李陽村庚辰三年春以慕容廆為平州武帝置統昌黎遼東等五郡刺史初平州刺史崔毖以士民多歸慕容廆心不平隂說髙句麗段氏宇文氏使共攻廆廆大敗之遂取遼東遣長史裴嶷來獻捷嶷至建康盛稱廆之忠欵朝廷始重之帝欲留嶷嶷曰舊京淪沒名臣宿將莫能雪恥獨龍驤竭忠王室使臣萬里歸誠今臣不返必謂朝廷以其僻陋而棄之孤其嚮義之心使懈于討賊此臣之所甚惜也帝然之遣使隨嶷拜廆為安北將軍平州刺史崔毖已奔髙句麗故以廆為刺史廆尋進爵平州牧遼東郡公凉州殺其刺史張實實弟茂代領州衆京兆人劉𢎞客居凉州以妖術惑衆張實左右皆事之𢎞自言天與神璽應王凉州于是帳下閻涉等謀殺實而奉之實弟茂知其謀告之實遣收𢎞未至涉等遂殺實實所遣兵執𢎞轘之誅其黨數百人左司馬隂元等以實子駿尚幼推茂為刺史茂以駿為世子趙立太學選民之可教者千五百人擇儒臣以教之趙主曜作酆明觀及西宫陵霄臺又營夀陵侍中喬豫和苞諫曰前營酆明市道細民咸譏其奢今又欲擬阿房而建西宫法瓊臺而起陵霄其為勞費億萬酆明又營夀陵周圍四里槨金飾殆非國內之所能辦也昔秦始皇下錮三泉土未乾而發毁奈何踵其事乎曜下詔曰二侍中懇懇有古人之風可謂社稷之臣矣其悉罷諸役夀陵一遵霸陵之法以豫苞領諫議大夫秋七月後趙兵退走祖逖進屯雍邱詔加號鎮西將軍祖逖將韓潜與後趙將桃豹分據陳川故城相守四旬逖以布囊盛土使千餘人運以饋潜又使數人擔米息于道豹兵逐之即棄而走豹以為逖士衆豐飽大懼後趙運糧饋豹逖又使潜邀擊獲之豹宵遁逖使潜進屯封邱以逼之逖鎮雍邱後趙鎮戍歸者甚衆詔加逖鎮西將軍逖與將士同甘苦約已務施勸課農桑撫納新附雖踈賤者皆結以恩禮河上諸塢先有任子在後趙者皆聽兩屬時遣遊軍僞抄之明其未附塢主皆感恩後趙有異謀輒密以告由是多所克獲自河以南多叛後趙歸晉逖練兵積穀為取河北之計後趙王勒患之乃下幽州為逖修祖父墓置守冡因與逖書求通使及互市逖不報書而聽其互市收利十倍逖牙門童建降于後趙勒斬送其首曰叛臣逃吏吾之深仇將軍之惡猶吾之惡也逖亦禁諸將不使侵暴後趙之民邉境之問稍得休息八月梁州刺史周訪卒諡曰壯詔以甘卓代之訪善于撫納士衆皆為致死知王敦有不臣之心私常切齒敦由是終訪之世未敢為逆及卒敦遣郭舒監其軍帝以甘卓鎮襄陽徴舒為右丞敦留不遣後趙定九品舉六科後趙王勒用法嚴峻使張賔領選定九品命公卿及州郡嵗舉秀才至孝亷清賢良直言武勇之士各一人冬十二月以譙王氶為湘州刺史帝之始鎮江東也王敦與從弟導同心翼戴帝亦推心任之敦統征討導専機政羣從子弟布列顯要時人為之語曰王與馬共天下後敦恃功驕恣帝畏而惡之乃引劉隗刁協等為腹心稍抑損王氏權導亦漸見疏外中書郎孔愈字敬康山隂人言導有佐命勳宜加委任帝出愈為長史敦益不平其參軍沈充字士居吳興武康人錢鳯皆巧諂凶狡知敦有異志隂為畫䇿敦上疏為導訟屈辭語怨望左將軍譙王氶忠厚有志行帝親信之夜召氶以敦疏示之隗亦為帝謀出心腹以鎮方面㑹敦表充為湘州刺史帝謂氶曰敦奸逆已著朕為惠皇帝以惠帝自比言當受制于彊臣也其勢不逺湘州據上流控三州之㑹欲以叔父居之氶曰臣奉詔命何敢有辭然湘州經蜀冦之餘民物雕弊茍未及三年雖灰身無益也詔以氶為刺史時湘土困弊氶躬自儉約傾心綏撫甚有能名辛巳四年春三月日中有黑子是月四日日出髙六七丈精光潜昧色都赤中有異物大如雞子又有青黑之氣共相搏擊良久乃解著作佐郎郭璞字景純河東聞喜人上疏以為隂陽錯繆皆繁刑所致赦不欲數然子産知鑄刑書非政之善不得不作者須以救弊故也今之宜赦理亦如之後趙陷幽冀并州撫軍將軍幽州刺史假匹磾死之先是匹磾為後趙所攻奔依冀州刺史卲續已而後趙石虎攻續執以歸虎執續使降其城續呼兄子竺謂曰吾志欲報國不幸至此汝等努力奉匹磾為主勿有二心虎送續襄國勒以為忠釋而禮之時匹磾與弟文鴦方進攻薊州歸而與續子緝等續被執朝廷不能救乃以續任授其子緝固守至是虎復攻匹磾于厭次漢縣明省故城在今山東武定府陽信縣孔萇攻其統內諸城悉拔之文鴦出戰力盡被執匹磾欲單騎歸朝續弟洎不聽并欲執臺使晉朝所遣使者送虎匹磾正色曰卿不能遵兄志逼吾不得歸朝已甚矣復欲執天子使者乎泊與緝竺等出降匹磾見虎曰我受晉恩志在滅汝不幸至此不能為汝敬也虎素與匹磾結為兄弟即起拜之于是幽冀并三州皆入于後趙匹磾不為勒屈常持晉節久之與文鴦邵續皆見殺夏五月終南山注見前崩秋七月以戴淵都督司豫劉隗都督青徐諸軍事王導為司空録尚書事以淵為征西將軍督六州鎮合肥隗為鎮北將軍督四州鎮淮隂名為討胡實備王敦也隗雖在外而朝廷機事進退士大夫帝皆與之密謀帝以敦故以導為司空録尚書事而實疏忌之御史中丞周嵩上疏以為不宜聽孤臣之言放逐舊德帝頗感悟導由是得全八月常山即恆山注見前崩九月豫州刺史祖逖卒以其弟約字士少代之逖以戴淵吳士雖有才望無宏致逺識且已剪荆棘收河南地而淵一旦來統之意頗怏怏又聞王敦與劉刁搆隙將有內難知大功不遂感激發病然猶志圗進取不輟營繕虎牢使諸將築壘未成而卒豫州士女若喪父母譙梁間皆為立祠敦由是益無所憚約無綏御之才不為士卒所附代弒其君鬱律子賀傉魏惠帝立拓跋猗㐌妻惟氏忌代王鬱律之彊恐不利其子乃殺鬱律而立子賀傉鬱律之子什翼犍魏昭成帝幼在襁褓其母王氏匿于袴中祝之曰天茍存汝則勿啼久之不啼乃得免壬午永昌元年春正月王敦舉兵反譙王氶甘卓移檄討之敦分兵寇長沙初敦既與朝廷乖離乃羈録朝士有時望者置已幕府以羊曼字祖延祐從孫謝鯤為長史至是舉兵武昌上疏稱劉隗佞邪讒賊威福自由臣輒進軍致討隗首朝懸諸軍夕退昔太甲顛覆厥度幸納伊尹之忠殷道復昌願陛下深垂三思則四海乂安社稷永固矣沈充亦起兵于吳興以應敦敦至蕪湖漢縣今屬江南太平府乂上表罪狀刁協帝大怒下詔曰王敦憑恃寵靈敢肆狂逆方朕太甲欲見幽囚是可忍也孰不可忍今親帥六軍以誅大逆有殺敦者封五千户侯時譙王氶起兵移檄逺近列敦罪惡州內皆應之惟敦姊夫鄭淡為湘東吳郡今湖南衡州府是太守不從命氶討斬之遣主簿鄧騫字長真長沙人說甘卓曰劉大連雖驕蹇失衆心非有害於天下大將軍以私憾稱兵向闕此忠臣義士竭節之時也先是敦亦恐卓于後為變約共舉事卓許之至是復遣參軍樂道融丹陽人往邀之道融憤敦悖逆說卓僞許敦而馳襲武昌卓遂露檄數敦逆狀帥所統致討遣參軍至廣州約陶侃侃遣參軍髙寶帥兵北下武昌城中傳卓軍至人皆奔散敦遣魏乂帥兵攻譙王氶於長沙時城池不完資儲又關人情震恐或說氶南投陶侃或退據零桂氶曰吾之志欲死忠義豈可貪生茍免為奔敗之將乎事之不濟令百姓知吾心耳乃嬰城固守司馬虞望戰死甘卓遺氶書勸之且云當以兵出沔口斷敦歸路則湘圍自解矣氶復書曰足下能卷甲電赴猶有所及若其狐疑則求我于枯魚之肆矣卓不能從虞望字子都臨湘人三月敦據石頭殺驃騎將軍戴淵尚書僕射周顗甘卓還襄陽夏四月敦還武昌帝徴戴淵劉隗入衛隗與刁協勸帝盡誅王氏帝不許王導帥宗族每旦詣臺待罪周顗將入導呼之曰伯仁以百口纍卿顗直入不顧既見帝言導忠誠申救甚至帝納其言顗出導又呼之顗不與言顧左右曰今年殺諸賊奴取金印如斗大繫肘後徑出又上表明導無罪言甚切導不知恨之帝命還導朝服召見之導稽首曰逆臣賊子何代無之不意今者近出臣族帝跣而執其手曰茂𢎞方寄卿以百里之命是何言耶以為前鋒大都督詔曰導以大義滅親可以吾為安東時節假之將軍周札陽羡人處之子素矜險好利帝使隗軍金城在江寧府句容縣北札守石頭敦至石頭欲攻隗杜𢎞曰隗死士多未易克周札少恩兵不為用攻之必敗札敗則隗走矣敦從之以𢎞為前鋒札開門納𢎞敦據石頭嘆曰吾不復得為盛德事矣謝鯤曰何為其然也但使自今以往日忘日去耳謂日忘前忿則君臣猜疑自去帝命協隗淵導顗等分道出戰皆大敗太子紹𣣔自帥將士决戰溫嶠執鞚諫曰殿下國之儲副奈何以身輕天下抽劍斷鞅乃止敦擁兵不朝放士卒劫掠宫省奔散惟將軍劉超案兵直衛及侍中二人侍帝側帝遣使謂敦曰公若不忘本朝于此息兵則天下尚可共安如其不然朕當歸琅邪以避賢路協隗敗還帝流涕執其手勸令避禍給人馬使自為計協素無恩紀募從者皆去為人所殺隗奔後趙帝令百官詣石頭見敦敦謂淵曰前日之戰有餘力乎淵曰豈敢有餘但力不足耳敦曰吾今此舉天下以為何如淵曰見形者謂之逆體誠者謂之忠敦大笑曰卿可謂能言又謂周顗曰伯仁卿負我顗曰公戎車犯順下官親帥六軍不能其事使王旅奔敗以此負公敦以太子有勇略為朝野所嚮欲誣以不孝廢之大㑹百官問溫嶠曰皇太子以何德稱聲色俱厲嶠曰鈎深致逺蓋非淺局所量以禮觀之可謂孝矣衆皆以為信然敦謀遂沮帝召周顗謂曰近日大事二宫無恙諸人平安大將軍固副所望耶顗曰二宫自如明詔臣等尚未可知或勸顗避敦顗曰吾備位大臣朝廷喪敗寧可革問求活外投胡越邪敦參軍吕猗素以姦諂為淵所惡因說敦曰周戴皆有髙名足以惑衆公若不除之恐必有再舉之憂敦然之以問導曰周戴南北之望當登三司無疑也導不答又曰止應令僕邪又不答敦曰若不爾正當誅爾又不答敦遂遣部將收之顗被收路經太廟大言曰賊臣王敦傾覆社稷枉殺忠臣神祇若有靈當速殺之收者以㦸傷其口血流至踵容止自若遂並淵殺之帝使敦從弟彬勞敦彬素與顗善先往哭之然後見敦敦怪其容慘問之彬曰向哭伯仁情不能已敦怒曰伯仁自致刑戮何哀而哭彬勃然數敦曰兄抗旌犯順殺戮忠良圖為不軌禍及門户矣辭氣慷慨聲淚俱下敦大怒曰爾以吾為不能殺汝邪導時在坐勸彬起謝彬曰腳痛不能拜且此復何謝敦曰腳痛敦若頸痛彬殊無懼容竟不肯拜導後檢中書故事乃見顗救已之表執之流涕曰我雖不殺伯仁伯仁由我而死幽冥之中負此良友彬字世儒正之子初敦聞甘卓起兵大懼卓兄子卬為敦參軍敦遣卬歸說卓使旋軍卓雖慕忠義性多疑少決聞周戴死流涕謂卬曰吾之所憂正為今日若徑據武昌敦勢逼必劫天子以絶四海之望不如更思後圖吾據敦上流敦亦不敢遽危社稷也即命旋軍樂道融曰今分兵斷彭澤使敦上下不得相赴其衆自然離散可一戰擒也將軍起義兵而中止竊為將軍不取也卓不從道融憂憤而卒卓徑還襄陽敦改易百官及諸軍鎮惟意所欲將還武昌謝鯤曰公若朝天子使君臣釋然則物情皆悅服矣敦竟不朝而去甘卓還鎮家人皆勸卓備敦卓不從悉散兵佃作襄陽太守周慮承敦意襲殺之傳首于敦敦兵陷長沙湘州刺史譙王氶死之魏乂等攻湘州百日拔之執譙王氶將殺長史虞悝望之兄子弟對之泣悝曰人生㑹當有死今閻門為忠義鬼亦復何恨遂被害乂以檻車載氶送武昌主簿桓雄長沙人書佐韓階長沙人從事武延陽翟人毁服為僮從氶不離左右乂殺雄王廙承敦旨殺氶于道階延送氶喪至都葬之而去秋七月後趙拔泰山初泰山太守徐龕以郡叛降石勒龕與下邳內史劉遐同討沛賊周撫龕部將擊斬撫及論功而遐先之龕怒故叛劉遐字正長廣平易陽人周撫一名堅沛人詔以羊鑒字景期泰山人為都督及徐州刺史蔡豹字士宣陳留圉城人等討之王導以鑒為龕之州里冠族必能制之鑒深辭才非將帥郗鑒亦表鍳不可使導不從事在太興二年鑒至下邳不敢前豹敗龕于檀邱胡三省注在魯國卞縣東南見卞縣注前石勒遣兵救龕龕疑而殺之龕求救于勒勒遣其將王伏都以兵救之伏都淫暴龕疑其襲已乃斬伏都及其衆三百餘人因請降朝廷不許敕鑒進兵鑒猶疑憚不進于是詔除鑒名刁協劾鑒免死除名王導以失舉乞貶不許以豹代領其衆㑹石虎以兵擊龕龕送妻子乞降于虎虎許之將擊豹豹軍退為龕所敗詔收豹送建康斬之事在三年已而龕復以郡來降事在四年及是虎攻拔之執龕送襄國殺之命王伏都等妻子刳而食之冬十月後趙冦譙祖約退屯夀春祖逖既卒後趙屢寇河南及是圍譙祖約不能禦退屯夀春後趙遂取陳留後趙之拔泰山也兖州刺史郗鑒退屯合肥既而後趙寇下邳彭城徐州刺史卞敦退保盱眙後石虎復陷青州石瞻取東莞東海石生攻河南司州刺史李矩潁川太守郭默軍屢敗乃附于趙趙主曜自將擊生大敗還長安郭默南奔建康李矩亦率衆南歸卒于道于是司豫青徐兖之地皆入于後趙州卞敦字仲仁壼從兄東莞晉郡治莒今山東沂府莒州是閏十一月帝崩司空導受遺詔輔政太子紹即位是為明帝帝以憂憤成疾而崩太子即位後趙右長史張賔卒賔謙虛敬慎屏絶阿私入則盡規出則歸美後趙主勒倚重之及是卒勒哭之慟曰天不欲成吾事邪何奪吾右侯之早也程遐代為右長史勒每與遐議有不合輒嘆曰右侯捨我去豈非酷乎因流涕彌日肅宗明皇帝癸未太寧元年春二月葬建平陵在江寧府上元縣史臣曰元帝恭儉有餘而明斷不足故大業未復而禍亂內興夏四月敦移屯姑孰即今太平府當塗縣晉時置城戍守後遂為重鎮元和志姑孰城以姑孰溪名溪在今當塗縣南自領揚州牧以王導為司徒敦謀篡位諷朝廷徴已帝手詔徴之敦移鎮姑孰屯于湖晉縣隋廢故城在今當塗縣以導為司徒自領揚州牧敦欲為逆王彬諌之甚苦敦變色目左右收之彬正色曰君昔嵗殺兄今又殺弟郭敦乃止六月立皇后庾氏軍咨祭酒琛之女以后兄亮為中書監秋八月敦表江西都督郗鑒為尚書令帝畏王敦之逼以鑒為外援使督揚州江西軍事鎮合肥敦忌之表鑒為尚書令鑒還臺遂與帝謀討敦趙擊凉州張茂降封茂為凉王是為前凉趙主曜自隴上西擊凉州茂力屈乃遣使稱藩曜拜茂太師封凉王加九錫冬十一月敦以其兄含字處𢎞督江西軍敦欲彊其宗族陵弱帝室乃徙兄含督揚州江西諸軍事含先督荆州從弟舒字處明彬為荆江刺史初舒子允之方總角敦愛其聰警每以自隨敦常夜飲允之辭醉先卧敦與錢鳯謀為逆允之悉聞其言即于卧處大吐衣面並汚鳯出敦果照視見允之卧于吐中不復疑之會舒拜廷尉允之求歸省悉以其謀白舒舒與王導俱啓帝隂為之備焉王允之字深猷甲申二年凉王張駿太元元年夏五月趙凉王張茂卒世子駿字公庭嗣茂疾病執駿手泣曰吾家世以孝友恭順著稱晉室雖微汝奉承之不可失也且下令曰吾官非王命茍以集事死之日當以白帢入棺勿以朝服斂及卒趙以駿為凉州牧凉王六月加司徒導大都督揚州刺史督諸軍討敦敦復反至江寧帝親征破之敦死衆潰其黨錢鳯沈充伏誅敦無子飬兄含子應字安期為嗣至是疾甚矯詔拜為武衛將軍以自副錢鳯曰脫有不諱便當以後事付應郭敦曰非常之事非常人所能為且應年少豈堪大事我死之後釋兵歸朝保全門户上計也退還武昌收兵自守貢獻不廢中計也及吾尚存悉衆而下萬一僥幸下計也鳯謂其黨曰公之下計乃上䇿也遂與沈充定謀以宿衛尚多奏令三畨休二帝親任中書令溫嶠敦惡之請為左司馬嶠乃繆為勤敬綜其府事時進密謀以附其欲深結錢鳯為之聲譽每曰錢世儀精神滿腹嶠素有藻鑑之名鳯甚恱㑹丹陽尹缺漢丹陽治宛陵三國吳移治建業晉初因之東晉于此建都改曰丹陽尹宋齊梁陳皆同隋廢陽考丹陽之在江南者有四一為秦故縣亦曰小丹今太平府當塗縣是一為漢故郡今寧國府宣城縣是一為晉京尹今江寧府是一為唐所置縣今鎮江府丹陽縣是嶠言于敦曰京尹咽喉之地公宜自選敦然之問誰可者嶠薦錢鳯鳯亦推嶠嶠僞辭敦不聽遂表用之使覘伺朝廷嶠恐既去而鳯于後間之因敦餞别起行酒至鳯鳳未及飲嶠僞醉以手版擊鳯幘墜作色曰錢鳯何人溫太真行酒而敢不飲敦以為醉兩釋之嶠與敦别涕泗橫流出閣復入者再三行後鳯謂敦曰嶠于朝廷甚密而與庾亮深交未可信也敦曰太真昨醉小加聲色何得便爾相讒嶠至建康盡以敦逆謀告帝與亮畫計討之敦聞之大怒曰吾乃為小物所欺與王導書曰太真别來幾日作如此事當募人生致之自拔其舌帝加導大都督領揚州刺史使嶠與將軍卞敦應詹郗鑒分督諸軍鑒請召臨淮太守蘇峻字子髙掖人兖州刺史劉遐等入衛帝屯于中堂胡三省注在建康定陽門外導聞敦疾篤帥子弟為之發哀衆以為敦信死咸有奮志于是尚書騰詔下敦府曰敦輒立兄息以自承代不由王命頑凶相奬志窺神器天不長姦敦以隕斃鳯復煽逆今遣司徒導等討之諸為敦所授用者一無所問敦之將士從敦彌年違離室家朕甚愍之其單丁遣歸終身不調餘皆與假三年休訖還臺當與宿衛同例三畨敦見詔甚怒而病轉篤將舉兵使郭璞筮之璞曰無成復間璞曰吾夀幾何璞曰明公起事禍必不久若住武昌夀不可測敦大怒曰卿夀幾何璞曰命盡今日日中乃收璞斬之使王含錢鳯鄧嶽陳郡人周撫訪之子等帥衆向京師鳯問曰事克之日天子云何敦曰尚未南郊何稱天子便盡卿兵勢耳含水陸五萬奄至江寧今縣晉太康初置南岸司徒導遺含書曰大將軍已不諱兄此舉謂可如昔年之事乎昔年佞臣亂朝人懷不寧如導之徒心思外濟今則不然大將軍來屯于湖漸失人心臨終之日委重安期諸有耳者皆知將為禪代非人臣之事也導門戶大小受國恩厚今日之事明目張膽為六軍之首寧為忠臣而死不為無賴而生矣含不答或以為含鳯衆力百倍苑城孫吳築晉置臺省于此亦曰臺城在今上元縣治北小而不固宜及軍勢未成大駕自出拒戰郗鑒以為非萬全計不從帝乘駿馬微行出覘敦軍敦方晝寢夢日環其營驚起曰黃鬚鮮卑兒來邪亟遣騎追之不及帝母荀氏代人帝類外氏鬚黃敦故云帝乃帥諸軍出屯南皇堂在中堂之南夜募壯士遣將軍假秀匹磾弟等率千人渡水掩其未備平旦戰于越城在今江寧府聚寶門外俗呼為越臺大破之敦聞含敗大怒曰我兄老婢耳門户衰事去矣我當力行因作勢而起困乏復卧乃謂應曰我死汝便即位先立朝廷百官然後營葬敦尋死應祕不發喪帝使人說沈充許以為司空充不奉詔遂舉兵與含合劉遐蘇峻等帥精兵萬人至擊充鳯大破之尋陽太守周光亦訪之子帥千餘人赴敦求見應辭以疾已而光見其兄撫曰王公已死兄何為與錢鳯作賊衆皆愕然含等遂燒營夜遁明日帝還宫含奔荆州王舒遣軍迎之舒時為荆州刺史沈其父子于江周光斬鳯詣闕自贖充為故將吳儒所殺傳首建康敦黨悉平有司發敦瘞焚其衣冠跽而斬之與充首同懸于南桁即朱雀桁在江寧縣南桁與航同列航為橋故亦曰朱雀橋在國之南故又曰南桁郗鑒曰前朝誅楊駿等皆先極官刑後聽私殯臣以為王誅加于上私義行于下宜聽敦家收葬帝許之導等皆以討敦功受封賞有司奏王彬等當除名詔曰司徒導以大義滅親猶將百世宥之况彬等皆其近親乎悉無所問有詔敦綱紀除名參位禁錮溫嶠上疏曰敦剛愎不仁忍行殺戮為其屬者恆懼危亡原其私心豈遑安處必其贊導凶悖自當正以典刑如其枉陷姦黨謂宜施之寬貸郗鑒以為先王立君臣之教貴于仗節死義王敦佐吏雖多逼迫然進不能止其逆謀退不能脫身逺遊凖之前訓宜加義責帝卒從嶠議乙酉三年春二月贈故譙王氶戴淵周顗等官有差詔故譙王氶戴淵周顗及甘卓虞望郭璞等贈官有差初周札為㑹稽內史敦以札宗强盛使沈充襲之札拒戰而死至是札故吏為札訟寃尚書卞壼議以為札開門延寇不當贈諡王導以為往年之事敦姦逆未彰自臣等有識以上皆所未悟與札無異既悟其姦札便以身許國尋取梟夷臣謂宜與周戴同例郗鑒謂周戴死節周札延冦事異賞均何以勸沮如司徒議則譙王周戴皆應受責何贈諡之有今三臣既褒則札宣貶明矣導曰札與譙王周戴所見有異同皆人臣之節也鑒曰敦之逆謀履霜日久若以往年之舉義同桓文則光帝可為幽厲邪然卒用導議立子衍為皇太子夏五月以陶侃都督荆湘等州軍事侃復鎮荆州士女相慶侃性聰敏恭勤終日斂膝危坐軍府衆事檢攝無遣未嘗少閒常語人曰大禹聖人乃惜寸隂至于衆人當惜分隂豈可逸遊荒醉生無益于時死無聞于後耶諸參佐以談戲廢事者命取其酒器蒱博蒱樗蒱博局戲也博物志云老子入胡作說文以為古者烏曹作之具悉投于江將吏則加鞕撲曰樗蒱者牧猪奴戲耳老莊浮華非先王之法言無益實用君子當正其威儀何有蓬頭跣足自謂宏達邪侃嘗造船其木屑竹頭侃皆令籍而掌之人咸不解後正㑹積雪始晴聽事前猶濕乃以木屑布地及桓溫伐蜀又以所貯竹頭作丁裝船其綜理微密皆此類也秋閏七月帝崩司徒導中書令庾亮尚書令卞壼受遣詔輔政太子衍即位是為成帝尊皇后為皇太后臨朝稱制右衛將軍虞𦙍濟陽外黃人元敬皇后弟左衛將軍南頓王宗字延祚汝南王亮之子俱為帝所親任典禁兵直殿內多聚勇士以為羽翼王導庾亮頗以為言帝待之愈厚宫門管鑰皆委之帝寢疾亮夜有所表從宗求鑰宗不與叱亮使曰此汝家門户邪亮益忿之及帝疾篤羣臣無得進者亮疑宗𦙍有異謀排闥入見請黜之帝不納引太宰西陽王羕司徒導及尚書令卞壼將軍邪鑒庾亮陸昱字士光吳郡人丹陽尹溫嶠並受遺詔輔太子更以亮為中書令而崩太子即位生五年矣羣臣進璽導疾不至壼正色于朝曰王公非社稷臣大行在殯嗣皇未立豈人臣辭疾時邪導閬之輿疾而至太后臨朝以導録尚書事與亮壼參輔朝政然大要皆决于亮尚書召樂謨為郡中正庾怡為廷尉評謨廣之子怡珉之子各稱父命不就壺曰人非無父而生職非無事而立若父各私其子則王者無民而君臣之道廢矣廣珉受寵聖世身非已有况後嗣乎謨怡不得已就職葬武平陵賀善贊曰明帝即位三年獨能奮發剛斷躬殄大憝可謂明矣使歷年久而復能以仁武濟之晋祚其庶幾乎冬十一月癸巳朔日食十二月假遼弒其君牙而自立假氏自務勿塵以來日益彊盛其地西接漁陽東至遼水所統胡晉三萬餘户控弦四五萬騎末柸卒弟牙代立至是就陸眷之孫遼攻牙殺而代之代王賀傉卒其弟紇那魏煬帝立顯宗成皇帝丙戌咸和元年夏六月以郗鑒為徐州刺史司徒導稱疾不朝而私送鑒卞壼奏導虧法從私無大臣之節請免官雖事寢不行舉朝憚之壼儉素亷潔裁斷切直當官幹實性不茍同時好故為諸名士所少阮孚字遙集咸之子謂曰卿常無閒泰如含瓦石不亦勞乎壼曰諸君子以道德恢𢎞風流相尚執鄙吝者非壼而誰時貴遊子弟多慕王澄謝鯤為放達壼厲色於朝曰悖禮傷教罪莫大焉中朝傾覆實由于此欲奏劾之導及庾亮不聽乃止秋八月以溫嶠都督江州軍事王舒為㑹稽內史初王導以寬和得衆及庾亮用事任法裁物頗失人心祖約自以名輩不後郗卞而不預顧命遺詔褒進大臣又不及約與陶侃二人皆疑亮刪之歷陽內史蘇峻有功于國峻前率兵擊破沈充錢鳯等威望漸著卒鋭器精有輕朝廷之志招納亡命衆力日多皆仰食縣官稍不如意輒肆忿言亮既疑峻約又畏陶侃之得衆乃以嶠鎮武昌舒守㑹稽以廣聲援又修石頭以備之丹陽尹阮孚謂所親曰江東創業甚淺主幼時艱庾亮年少德信未孚以吾觀之亂將作矣遂求出為廣州刺史冬十月殺南頓王宗降封西陽王羕為弋陽縣王宗自以失職怨望又素與蘇峻善庾亮欲誅之宗亦欲廢執政中丞鍾雅字彥胄潁川人劾宗謀反亮收殺之降封其兄羕為弋陽縣王宗宗室近屬羕先帝保傅亮一旦剪黜由是愈失衆心宗之死也帝不之知久之問亮曰常日白頭公何在亮對以謀反伏誅帝泣曰舅言人作賊便殺之人言舅作賊當如何亮懼變色十一月後趙攻夀春歷陽蘇峻擊走之石聰攻夀春祖約屢表請救朝廷不為出兵聰遂進冦阜陵注見前建康大震蘇峻遣其將韓晃擊走之朝議欲作涂塘涂讀曰滁今江寧府六合縣有滁河上自滁州流入下至瓜步入大江三國吳于此築塘曰堂邑涂塘以淹北道以遏胡寇約曰是棄我也益懷憤恚十二月後趙始定九流立孝秀試經之制丁亥二年夏五月甲申朔日食冬徴蘇峻為大司農峻與祖約舉兵反庾亮以蘇峻在歷陽終為禍亂欲下詔徴之司徒導曰峻必不奉詔不若且包容之亮曰今縱不順命為禍猶淺若復經年不可復制猶七國之于漢也卞壼曰峻擁彊兵逼近京邑一旦有變易為蹉跌宜深思之溫嶠亦以書止亮亮皆不聽峻聞之遣司馬詣亮辭亮不許徴為大司農以其弟逸代領部曲峻上表辭復不許峻遂不應命溫嶠即欲帥衆下衛建康三吳亦欲起義兵亮報嶠書曰吾憂西陲謂陶侃在荆州過于歷陽足下無過雷池即大雷水在安慶府望江縣南寰宇記大雷水至望江縣積而為池謂之雷池又東入江謂之大雷口一步也亮復遣使諭峻峻曰臺下云我欲反豈得活邪我寧山頭望廷尉不能廷尉望山頭峻知祖約亦怨朝廷乃請共討亮約大喜譙國內史桓宣曰使君助國討峻則威名自舉今乃與俱反安得久乎約不從宣絶之約遣兄子沛渙壻許柳以兵㑹峻十二月峻襲陷姑孰詔庾亮督諸軍討之宣城內史桓彞起兵赴難尚書左丞孔坦司徒司馬司徒屬有司馬陶回丹陽人言于司徒導請及峻未至急斷阜陵注見前守江西當利浦名在江南和州東諸口導然之庾亮不從至是峻使其將韓晃等襲陷姑孰亮方悔之京師戒嚴假亮節都督征討諸軍使左將軍司馬流將兵據慈湖在太平府當塗縣北以拒之宣城晉郡今江南寧國府是內史桓彞欲起兵赴朝廷長史禆惠謂郡兵寡弱山民易擾宜且案甲以待之彞厲色曰見無禮于君者若鷹鸇之逐鳥雀今社稷危逼義無宴安遂進屯蕪湖韓晃擊破之因攻宣城彞退保廣德吳郡今江南廣德州是徐州刺史郗鑒欲帥所領赴難詔以北冦不許戊子三年後趙太和元年春正月溫嶠以兵赴難至尋陽晉郡治柴桑今江西九江府是漢尋陽在黃州注詳前尚書令成陽公卞壼督軍討峻戰敗死之庾亮奔尋陽峻兵犯闕溫嶠欲救建康軍于尋陽韓晃襲司馬流于慈湖流敗死峻濟自橫江臺兵屢敗陶回謂庾亮曰峻知石頭有重戍必向小丹陽南道步來宜伏兵邀之可一戰擒也亮不從峻果如回言而夜迷失道無復部分亮始悔之朝士多遣家人入東避難左衛將軍劉超獨遷妻孥入居宫內詔以卞壼都督大桁即朱雀航以秦淮諸航此為之最故名東諸軍及峻戰于西陵在江寧縣西大敗峻攻青溪柵在今上元縣東北寰宇記溪泄元武湖水南入秦淮壼又拒擊之峻因風縱火燒臺省諸營皆盡壼背癰新愈瘡猶未合力疾戰死二子眕盱亦赴敵死其母撫尸哭曰父為忠臣子為孝子夫何恨乎丹陽尹羊曼黃門侍郎周導廬江太守陶瞻侃之子力戰死亮及郭默趙𦙍俱奔尋陽亮將行顧謂侍中鍾雅曰後事深以相委雅曰棟折榱崩誰之咎也峻兵入臺城即苑城注見前司徒導謂侍中禇翜色洽切字謀遠陽翟人曰至尊當御正殿翜即入閣抱帝登太極前殿導及光祿大夫陸曄荀嵩尚書張闓共登御牀衛帝劉超鍾雅及翜侍立左右太常孔愈朝服守宗廟峻兵既入叱翜令下翜呵之曰蘇冠軍來覲至尊軍人豈得侵逼峻兵不敢上殿突入後宫宫人皆見掠奪府藏一空或謂鍾雅曰君性亮直必不容于寇盍早為計雅曰國亂不能匡君危不能濟各遁逃以求免何以為臣峻以王導有德望猶使以本官居己之右以祖約為太尉峻自録尚書事弋陽王羕詣峻稱述功德峻復以為太宰西陽王溫嶠聞建康不守號慟人有候之者悲哭相對庾亮至尋陽宣太后詔以嶠為驃騎將軍開府儀同三司嶠曰今日當以減賊為急未有功而先拜官何以示天下遂不受嶠素重亮亮雖奔敗嶠愈推奉分兵給之三月皇太后庾氏以憂崩峻南屯于湖葬明穆皇后夏五月溫嶠以陶侃入討峻峻遷帝于石頭郗鑒王舒來赴難溫嶠將討峻與庾亮互相推為盟主嶠從弟充曰陶征西位重兵彊宜共推之嶠乃遣督護王愆期詣荆州邀侃同赴國難侃猶以不預顧命為恨嶠屢說之乃遣督護襲登帥兵詣嶠嶠有衆七千於是列上尚書陳峻約罪狀移告征鎮灑泣登舟侃復追登還嶠遺書曰近已移檄逺近言于盟府惟須仁公軍至便齊進耳今乃反追軍還或者遂謂仁公緩于討賊此聲難追願深察之愆期亦謂侃曰峻豺狼也如得遂志公寧有容足之地乎侃感悟乃戎服登舟兼道而進郗鑒在廣陵得詔書即流涕誓衆入赴國難鑒遣將軍夏侯長等間行謂嶠曰或聞賊欲挾天子東入會稽當先立營壘屯據要害既防其逸又斷賊糧運然後清野堅壁以待賊賊攻城不拔野無所掠必自潰矣嶠深以為然侃至尋陽議者謂侃欲誅亮以謝天下亮甚懼用嶠計詣侃拜謝侃止亮曰庾元規乃拜陶士行邪亮引咎自責侃乃釋然曰君侯修石頭以擬老子今日反見求邪遂同趣建康戎卒四萬峻聞之自姑孰還遷帝于石頭司徒導固爭不從帝哀泣升車時大兩泥濘劉超鍾雅步侍左右峻給馬不肯乘而悲哀慷慨峻惡之峻以倉屋為帝宫日肆醜言超雅與荀嵩華恆丁潭等不離帝側時饑饉峻問遺超一無所受繾綣朝夕臣節愈恭雖居幽厄之中猶啓帝授孝經論語華恆字敬則平原髙唐人丁潭字世康㑹稽山隂人導密令張闓以太后詔諭三吳使起義兵會稽內史王舒使庾氷字季堅亮之弟將兵一萬西渡浙江于是吳興太守虞潭字思奧餘姚人吳國內史蔡謨字道明考城人義興太守顧衆字長始吳郡人榮族弟等皆應之峻遣其將管商等拒之嶠以南兵習水峻兵便步令將士有上岸者死㑹峻送米萬斛饋祖約毛寶字碩真陽武人為嶠前鋒告其衆曰兵法軍令有所不從今視賊可擊乃不上岸擊之邪率衆襲取之約由是饑乏嶠表寶為廬江太守侃表舒潭監浙東西軍事郗鑒都督揚州八郡軍事鑒遂帥衆渡江與侃等㑹舟師直指石頭峻望之有懼色侃部將李根請築白石壘在上元縣西北本名白石陂後于此設城因曰白下城侃使庾亮守之峻攻之不克舒等數戰不利侃乃令鍳退據京口立大業里名在鎮江府丹陽縣北曲阿注見前庱亭在常州府武進縣西三國吳志孫權射虎于庱亭即此三壘以分峻兵勢祖約遣祖渙桓撫襲湓口湓水入江之處在江西九江府德化縣西亦曰湓浦毛寶中流矢貫髀徹鞍寶使人踏鞍拔箭血流滿鞾還擊破走之六月峻分兵陷宣城內史桓彞死之桓彛聞京城不守進屯涇縣注見前禆惠勸彛與峻通使以舒交至之禍彝曰吾受國恩義在致死焉能忍耻與逆臣通問如其不濟此則命也彝遣將軍俞縱宣城人守蘭石地名在寧國府涇縣東韓晃攻之將敗左右勸退軍縱曰吾受桓侯恩厚當以死報吾之不可負桓侯猶桓侯之不可負國也力戰而死晃遂進軍至是城陷執彞殺之秋九月陶侃溫嶠討峻于石頭峻伏誅峻弟逸領其衆西軍與峻相持久不決溫嶠軍食盡貸于陶侃侃怒欲西歸嶠曰師克在和古之善教也峻約小豎凶逆滔天何憂不滅奈何捨垂立之功設進退之計乎且天子幽逼社稷危殆乃臣子肝腦塗地之日今之事勢義無旋踵譬如騎虎安可中下哉公若違衆獨返人心必沮義旗將回指於公矣毛寶及竟陵太守李陽亦皆說侃侃乃分米五萬石以餉嶠軍寶燒峻句容漢縣今屬江寧府湖孰漢縣隋廢故城在今上元縣積聚峻軍乏食侃遂不去韓晃等急攻大業壘侃將救之長史殷羡字洪喬陳郡長平人曰吾兵不習步戰不如急攻石頭則大業自解侃從之督水軍向石頭亮嶠帥步兵萬人從白石南上峻逆戰乘醉突陳不得入將回馬躓侃部將斬之三軍皆稱萬嵗餘衆大潰峻司馬任讓等共立峻弟逸為主閉城自守嶠乃立行臺布告逺近凡故吏二千石以下皆令赴臺于是至者雲集冬十二月後趙王勒大破趙兵于洛陽獲趙主曜以歸殺之先是後趙石虎攻趙蒲坂趙主矅擊破之遂攻石生于金墉襄國大震至是勒欲自將救洛陽程遐等固諌勒大怒按劍叱遐等出謂臣下曰庸人之情皆謂曜鋒不可當曜帶甲十萬攻一城而百日不克師老卒怠以我初鋭擊之可一戰擒也若洛陽不守曜席捲而來吾事去矣乃使內外戒嚴命石堪等㑹滎陽石虎進據石門在開封府河隂縣西北水經注漢靈帝于敖城西北壘石為門以遏浚儀渠口謂之石門勒自統步騎濟河至成臯勒見趙無守兵大喜卷甲銜枚詭道兼行出于鞏訾注俱見前之間曜專與嬖臣飲博不撫士卒左右或諌曜以為妖言斬之俄聞勒自來色變使釋金墉之圍陳于洛西衆十餘萬南北十餘里勒望見曰可以賀我矣帥步騎四萬入洛陽城虎引步卒攻趙中軍堪以精騎擊其前鋒大戰于西陽門勒躬擐甲胄出閶闔門夾擊之曜素嗜酒至是將戰飲數斗至西陽門揮陳就平地堪因而乘之趙兵大潰曜昏醉墜馬為堪所執勒乃下令班師曜至襄國勒嚴兵圍守使曜與其太子熙書諭令速降曜但敕熙與諸大臣匡維社稷勿以吾易意勒乃殺之己丑四年是嵗趙亡大國一後趙小國二成凉凡三僣國春正月冠軍將軍趙𦙍拔歷陽約奔後趙先是後趙攻夀春約衆潰奔歷陽至是歷陽為𦙍所拔約率其左右奔後趙明年後趙主勒誅約夷其族初祖逖有胡奴曰王安甚愛之在雍邱謂曰石勒是汝種類厚資遣之安仕趙為左衛將軍及約誅安嘆曰豈可使祖士雅無後乎乃往觀刑竊取逖庶子道重匿之及石氏亡復歸江南趙太子熙奔上邽後趙取長安熙與南陽王𦙍奔上邽關中大亂蔣英擁衆數十萬據長安遣使降于後趙石生率衆赴之二月諸軍討逸誅之及西陽王羕初蘇逸使任讓將兵入官收右衛將軍劉超侍中鍾雅帝抱持悲泣曰還我侍中右衛讓奪而殺之至是諸軍攻石頭建威長史滕含南陽西鄂人修之孫大破其兵獲蘇逸韓晃斬之含部將曹據抱帝奔溫嶠船羣臣見帝頓首號泣請罪殺西陽王羕陶侃與任讓有舊為請其死帝曰是殺吾侍中右衛者不可赦也乃殺之司徒導入石頭令取故節侃笑曰蘇武節似不如是導有慙色以禇翜為丹陽尹時宫闕灰燼嶠欲遷都豫章三吳之豪請都㑹稽導曰孫仲謀劉元德俱言建康王者之宅古之帝王不必以豐儉移都茍務本節用何憂凋敝且北寇遊魂伺我之隙一旦示弱竄于蠻越懼非良計今特宜鎮之以靜羣情自安由是不復徙都而以翜為丹陽尹翜收集散亡京邑遂安三月以陶侃為太尉郗鑒為司空溫嶠為驃騎將軍開府儀同三司庾亮為豫州刺史論平蘇峻功侃鑒嶠以下封拜有差諡卞壼曰忠貞其二子眕盱及桓彝劉超鍾雅羊曼陶瞻皆加贈諡侃以江陵偏逺移鎮巴陵朝議欲留嶠輔政嶠以導先帝所任固辭又以京邑荒殘留資蓄具器用而後還藩庾亮泥首謝罪欲闔門投竄山海帝手詔慰諭曰此社稷之難非舅之責也亮乃求外鎮自效遂以為豫州刺史出鎮蕪湖侃之討也獨湘州刺史卞敦擁兵不赴又不給軍糧侃奏請檻車收付廷尉司徒導以喪亂之後宜加寬宥乃以敦為廣州刺史敦憂愧而卒夏四月驃騎將軍始安公溫嶠卒諡忠武嶠卒以嶠軍司劉𦙍為江州刺史陶侃郗鑒皆言𦙍非方伯才王導不從𦙍矜豪縱酒不恤政事將軍郭默襲殺之誣以大逆傳首京師陶侃聞江州亂即日舉兵討默默將縳默以降斬之秋八月後趙石虎攻拔上邽殺趙太子熙遂取秦隴趙南陽王𦙍帥衆數萬自上邽趣長安石生拒守虎救之大破趙兵乘勝追擊上邽潰虎執熙及𦙍等以下三千餘人皆殺之于是蒲洪姚弋仲俱降于虎秦隴悉平前趙自劉淵僣號至曜亡凡五主合二十一年是後後趙止稱趙代王紇那出奔宇文部翳槐魏烈帝立翳槐鬱律之子也既立遣其弟什翼犍為質于趙以請和庚寅五年趙建平元年春二月趙王勒稱趙天王以石虎為太尉封中山王趙羣臣勸勒即皇帝位勒乃稱大趙天王行皇帝事立妃劉氏為皇后世子𢎞字大雅為太子子宏為大單于中山公虎為太尉進爵為王虎私謂其子邃曰吾身當矢石二十餘年以成大趙之業大單于當以授我乃與黃吻婢兒念之令人氣塞不能寢食待主上宴駕後不足復留種也中書令徐光以虎雄暴多詐勸勒漸奪其權程遐亦以為言勒心然之而未能從秋九月趙王勒稱皇帝時趙將郭敬陷襄陽遷其民于沔北城樊城注見前以戍之辛卯六年春三月壬戍朔日食夏趙舉賢良方正起明堂辟雍靈臺壬辰七年春正月趙大饗羣臣趙主勒謂徐光曰朕可方自古何等主對曰陛下神武謀略過于漢髙勒笑曰人豈不自知卿言太過朕若遇髙祖當北面事之與韓彭比肩若遇光武當並驅中原未知鹿死誰手大丈夫行事宜礌礌落落如日月皎然終不效曹孟德司馬仲逹欺人孤兒寡婦狐媚以取天下也勒雖不學好使諸生讀書而聽之時以其意論古今得失聞者悅服嘗使人讀漢書聞酈食其勸立六國後驚曰此法當失何以遂得天下及聞留侯諫乃曰賴有此耳秋太尉陶侃遣南中郎將桓宣攻拔襄陽遂留鎮之趙郭敬南掠江西陶侃遣桓宣乘虛攻樊城悉俘其衆敬旋救樊宣與戰破之敬遁去遂拔襄陽侃使宣鎮之宣招懷初附簡刑罰略威儀勸課農桑或載鋤耒于軺軒親帥民藝穫在襄陽十餘年趙再攻之宣以寡弱拒守趙不能勝時人以為亞于祖逖周訪癸巳八年春趙遣使來修好詔焚其幣夏五月遼東公慕容廆卒世子皓字元真嗣皓初嗣位用法嚴峻國人不安先是皓庶兄翰字元雍母弟仁皆有勇略有寵于廆皓忌之至是翰與其子出奔假氏仁據平郭漢縣晉省縣城存在今奉天府蓋平縣以叛盡有遼東之地後皓攻克遼東襲仁殺之舊海水無氷自仁叛後凍合者三皓乃從昌黎東踐氷而進輕騎趣平郭遂禽仁賜死事在咸康二年翰依假遼已復奔宇文氏久之逃還宇文逸豆歸忌翰才名翰乃佯狂乞食歸信而不禁翰得往來自任遂竊歸名馬擕其二子逃歸皓大喜厚遇之事在咸康六年秋七月趙主勒卒太子𢎞立趙主勒寢疾中山王虎入侍矯詔羣臣親戚皆不得入時秦王宏彭城王堪將兵在外皆召使還勒疾小瘳見宏驚曰吾使王處藩鎮正偹今日有召王者邪當按誅之虎懼曰秦王思慕暫還耳今遣之仍留不遣至是勒疾篤遺命曰大雅兄弟宜善相保司馬氏汝曹之前車也中山王宜深思周霍勿為將來口實遂卒虎劫太子𢎞使收程遐徐光下廷尉召其子邃使將兵入宿衛𢎞大懼讓位于虎虎曰若不堪重任天下自有大義何足豫論𢎞乃即位殺遐光夜以勒喪潜瘞山谷乃備儀衛虛葬于髙平陵石勒冡在順德府邢臺縣之西南甲午九年趙主石𢎞延熙元年春二月以張駿為征西大將軍先是趙拜駿凉州牧駿耻為之臣不受㑹趙破休屠王羌羌部落名駿懼乃稱臣入貢已而駿遣從事張淳假道于成來上表成人欲留淳謂曰卿體豐大天熱可且遣下吏先往須凉淳曰寡君以皇輿播越生民塗炭故遣淳通誠上都所論事重非下吏所能傳雖火山湯海猶將赴之豈寒暑之足論哉成主雄知不可奪厚為禮而遣之卒致命于建康至是詔以駿為征西大將駿遣使報謝自是每嵗使者不絶夏六月太尉長沙公陶侃卒諡曰桓侃晚年深以滿盈自懼不預朝權屢欲告老歸國佐吏等苦留之至是疾篤上表遜位以後事付司馬王愆期輿車就船將歸長沙顧謂愆期曰老子婆娑猶徘徊謂未及早歸去也正坐諸君未幾卒侃在軍四十一年明毅善斷識察纎密人不能欺自南陵迄于白帝數千里中路不拾遺尚書梅陶嘗謂人曰陶公機神明鑒似魏武忠順勤勞似孔明陸抗諸人不能及也謝安每言陶公雖用法而恆得法外意南陵晉戍梁置郡隋以後為縣今屬寧國府其故城在今縣西北謝安字安石鯤從子成主雄卒太子班字世文立以庾亮都督江荆等州軍事亮鎮武昌辟殷浩字深源羡之子為記室參軍浩與禇裒字季野陽翟人杜乂字𢎞理京兆人皆以識度清逺善談老易擅名江東而浩尤為風流所宗桓彛嘗謂裒曰季野有皮裏春秋言其外無臧否而內有褒貶也謝安曰裒雖不言而四時之氣亦備矣冬十月成李越弒其主班而立其弟期字世運雄第四子初成主雄立兄蕩之子班為太子羣臣皆諫雄曰吾兄先帝之嫡統有竒材大功事垂克而早世朕常悼之且班仁孝好學必能負荷先烈遂立之及雄病痬諸子皆惡而逺之惟班晝夜侍側雄卒班即位雄子越先屯江陽奔喪歸成都與弟期弒班于殯宫奉期而立之期以越為相國十一月趙石虎弒其主𢎞自立為居攝天王先是石虎自為丞相弒太后劉氏石生石朗起兵討之皆被殺至是趙主𢎞自齎璽綬詣虎請禪虎曰帝王大業天下自當有議何為自論邪尚書請依禪讓故事虎曰便當廢之何禪讓也遂廢而弒之自稱居攝天王姚弋仲稱疾不賀纍召乃至正色謂虎曰弋仲嘗謂大王命世英雄奈何把臂受託而反奪之邪虎心雖不平然察其誠實亦不之罪乙未咸康元年趙石虎建武元年成李期玉恆元年春三月幸司徒導府時帝委政于導導辟王濛字仲祖太原晉陽人王述字懷祖承之子為掾屬濛與沛國劉惔字真長相人友善當時稱風流者以惔濛為首濛不修小廉而以清約見稱惔嘗謂濛性至通而自然有節濛曰君知我勝我自知述性沈靜年三十尚未知名人謂之癡導以門第辟之既見唯問江東米價述張目不答導曰王掾不癡導每發言一坐莫不贊美述正色曰人非堯舜何得每事盡善導改容謝之秋九月趙遷都鄴初趙主勒以天竺僧佛圖澄豫言成敗數有竒驗甚敬信之及虎遷鄴奉澄尤謹于是國人化之相競事佛澄之所在無敢向其方靣涕唾者冬十月乙未朔日食代王紇那復入翳槐奔趙已趙納翳槐于代紇那奔燕張駿遣使上疏請北伐駿勤修庶政總御文武咸得其用民富兵彊西域諸國皆詣姑臧朝貢駿有兼秦雍之志遣使上疏以為勒雄已死虎期繼逆元老消落後生不識慕戀之心日逺日忘乞敕司空鑒征西亮等泛舟江沔首尾齊舉丙申二年春正月彗星見奎婁西方奎十六星天武庫婁三星為天獄二月立皇后杜氏預女孫趙作太武殿東西宫趙作太武殿于襄國作東西宫于鄴皆甃以文石以漆灌瓦金璫銀楹珠簾玉壁窮極工巧選士民之女以實之服珠玉被綺縠者萬餘人教宫人占星氣馬步射以女騎千人為鹵簿皆著紫綸巾熟錦袴執羽儀鳴鼓吹逰宴以自隨于是境內大旱金一斤直粟二斗百姓嗷然而虎用兵不息百役並興徙洛陽鍾虡九龍翁仲銅駝飛亷皆魏明帝時物于鄴又于鄴南投石于河以作飛橋功費數千萬億竟不成既而虎復作臺觀四十餘所于鄴又營長安洛陽二宫役者四十餘萬人後又造獵車千乘刻期較獵自靈昌津南至滎陽數千里為獵場犯其禽獸者罪至死丁酉三年是歲前燕始建國號舊大國一趙小國二成凉新小國一燕凡四僣國春正月趙王虎稱趙天王虎依殷周之制稱大趙天王即位於南郊大赦先是左枝令成公假作庭燎于杠末髙十餘丈上盤置燎下盤置人虎試而悅之至是文武五百餘人入上尊號庭燎油灌下盤死者二十餘人虎惡之腰斬成公假立太學國子祭酒袁瓌字山甫陽夏人等以江左寖安請興學校帝從之立太學徴集生徒而士大夫習尚老莊儒術終不振慕容皓自稱王是為前燕初慕容皓既立詔以為鎮軍大將軍遼東公至是鎮軍長史封奕等勸皓稱王皓從之以奕為國相戊戌四年是嵗成改號漢李夀漢興元年代昭成帝什翼犍建國元年舊大國一趙小國三漢凉燕新小國一代凡五僣國春趙王虎燕王皓合兵攻假氏破之虎拔令支漢縣晉假氏都此故城在今直𨽻永平府遷安縣悉取其地先是燕王皓欲伐假氏遣使稱藩于趙乞師㑹討趙王虎大悅與定師期至是虎使桃豹等將舟師十萬出漂渝一作榆津在今天津府天津縣北水經清河東北遇漂渝邑入于海即此支雄等帥步騎七萬為前鋒燕王皓引兵攻掠令支以北假遼弟蘭悉衆追之皓設伏邀擊大破蘭兵掠五千户而歸虎進屯金臺亦曰黃金臺燕昭王築寰宇記臺在易縣東南易縣今易州是支雄長驅入薊降四十餘城遼聞蘭敗遂棄令支奔密雲山水經注鮑邱水南徑禦􅉓鎮東南密雲戍西胡三省曰據成帝紀遼奔平岡密雲山蓋在漢平岡縣界禦彛平岡注俱見前虎徙其民二萬餘户于司雍兖豫四州夏四月成李夀字武考驤之子弒其主而自立改國號漢成主期驕虐日甚多所誅殺大臣多不自安尤忌漢王夀威名使出屯涪夀懼不免遂襲成都夀世子勢為翊軍校尉開門納之廢期為縣公幽之期縊而卒夀遂稱帝改國號曰漢五月趙王虎擊燕不克燕慕容恪字元恭皓第四子追擊大敗之燕王皓之破假蘭也不待趙師之至遂還于是趙王虎以燕不㑹攻而自専其利謂掠令支以北伐之下三十餘城遂進攻棘城注見前皓欲出亡帳下將慕輿慕容同祖别為氏根諫曰趙彊我弱大王一舉足則趙之氣勢遂成今固守堅城其勢自倍事之不濟不失于走奈何望風委去為必亡之理乎皓乃止然猶懼形于色元莬太守劉佩河間人曰事之安危繫於一人大王當自强以厲將士事急矣臣請出擊之縱無大捷足以安衆乃將死士數百騎出衝趙兵大捷而還于是士氣百倍根等力戰十餘晝夜趙兵不能克而退皓遣其子恪帥二千騎追之趙兵大敗斬獲三萬餘級悉復所失城虎益造船運榖謀再擊燕是冬假遼自密雲遣使求迎于趙已中悔復遣使于燕趙王虎遣麻秋率衆迎遼燕王皓自將迎之遼密與燕謀覆趙軍皓遣慕容恪伏精騎于密雲山大敗秋兵盡得其衆遂以遼歸初趙之入薊也軍北平相陽裕保燕山以自固既而降趙及迎遼裕為司馬兵敗被執皓素聞裕名釋其囚以為郎中令待遼以上賔之禮久之遼謀叛皓誅之陽裕字士倫右北平無終人燕山注見前以司徒導為太傅都督中外諸軍事郗鑒為太尉庾亮為司空六月更以導為丞相罷司徒官導性寬厚委任諸將趙𦙍賈寧等多不奉法大臣患之亮與鑒箋曰人主春秋既盛不稽首歸政甫居師傅之尊多養無賴之士公與下官並荷托付大奸不掃何以見先帝于地下乎欲共起兵廢導鑒不聽或勸導密為之備導曰吾與元規休戚是同如君言吾便角巾還第復何懼哉參軍孫盛字安國楚之孫諫亮曰王公常有世外之懷豈肯為凡人事邪此必佞邪之徒欲間內外耳亮乃止是時亮雖居鎮而遙執朝權趨勢者多歸之導內不能平嘗遇西風塵起舉扇自蔽徐曰元規塵汚人冬十月光祿勳顔含字𢎞都琅邪莘人致仕含以老遜位時論者以王導帝之師傅百僚宜為降禮太常馮懷以問含含曰王公雖貴重禮無偏敬降禮之言或是諸君事宜鄙人老矣不識時務既而告人曰吾聞伐國不問仁人向馮祖思問佞于我我豈有邪德乎致仕二十餘年而卒初郭璞嘗遇含欲為之筮含曰年在天位在人修己而天不與者命也守道而人不知者性也自有性命無勞蓍龜代王翳槐卒弟什翼犍立翳槐弟什翼犍質于趙翳槐病命諸大人立之翳槐卒諸大人以什翼犍在逺來未可必謀立次弟孤孤不可自詣鄴迎什翼犍請身留為質趙王虎義而俱遣之什翼犍即位分國之半以與孤代自猗盧卒後國多內難部落離散什翼犍雄勇有智略能修復舊業始置百官分掌衆務號令明白政事清簡百姓安之于是東自濊貉西及破落那唐書西域傳寧逺者本拔汗那或曰鏺汗元魏時謂破落那去長安八千里居西鞬城在真珠河之北南距隂山北盡沙漠率皆歸服有衆數十萬人什翼犍求婚于燕燕王皓以其妹妻之己亥五年春三月庾亮表請伐趙詔諭止之亮欲開復中原表以桓宣鎮襄陽弟懌字叔豫鎮魏興注見前翼字稚恭鎮江陵毛寶樊峻戍邾城在今湖北黃州府黃岡縣戰國時楚遷邾人于此故名上疏欲帥大衆十萬移鎮石城今湖北安陸府治是水經注沔水徑石城西城因山為固晉大傅羊祜立元康九年置竟陵郡冶此考石城胡三省注甚明馮智舒以為信陽州之石城山誤遣諸軍羅布江沔為伐趙之規帝下其議丞相導請許之太尉鑒議以為資用未備不可大舉太常蔡謨議曰時有否泰道有屈伸茍不計彊弱而輕動則亡不終日何功之有為今之計莫若養威以俟時朝議多與謨同乃詔亮不聽移鎮已而趙兵入冦沔南邾城皆陷寶峻灾圍赴江死江夏義陽皆降于趙秋七月丞相始興公王導卒諡文獻以何充為護軍將軍庾氷為中書監揚州刺史參録尚書事復改丞相為司徒導簡素寡欲善因事就功輔相三世倉無儲穀衣不重帛初導與庾亮共薦丹陽尹何充于帝及導卒徴庾亮為丞相亮固辭遂以充及亮弟氷參録尚書事氷經綸時務不舍晝夜賔禮朝賢升擢後進朝野翕然稱為賢相初導輔政每從寬恕至氷頗任威刑丹陽尹殷融諌之氷曰前相之賢猶不堪其宏况如吾者哉殷融羡之弟八月太尉南昌公郗鑒卒諡文成以蔡謨都督徐兖軍事鑒疾篤上疏曰臣所統率多北人人思歸本臣宣國恩量與田宅漸得少安聞臣疾篤衆情駭動太常臣謨平簡貞正素望所歸可為徐州鑒卒即以謨代之庚子六年春正月司空庾亮卒諡文康以何充為中書令庾翼都督江荆等州軍事時人疑翼年少不能繼其兄翼悉心為治戎政嚴明數年之間公私充實二月有星孛于太微三月代始徙都雲中魏書昭成帝紀三年徙都于雲中之盛樂宫水經注白渠水西徑魏雲中宫南考白渠水即今歸化城之黑河雲中宫蓋即雲中之盛樂宫也秋漢大閲于成都遣使如趙趙人報之趙王虎遺漢主夀書欲連兵入寇中分江南夀大喜集士卒為舟師大閲于成都遣使如趙致書署曰趙王石君虎不恱中書監王波曰夀既僣大號而以制詔與之彼必酬返不若復為書與之會挹婁國注見前獻楛矢石砮于趙波因請以遺之曰使其知我能服逺也虎從之遣漢亡將李閎歸報閎至成都夀下詔曰羯使來庭貢其楛矢虎聞之怒黜波以白衣領職初蜀處士龔壯以父叔皆為李特所害志在復讐而力弱不能及特孫期立與李夀有隙壯欲假夀以報因說夀西取成都稱藩于晉夀然之由是殺期欲官壯壯誓不仕而屢勸夀事晉至是夀遣使于趙壯諌曰與其與胡通孰若與晉通夀不從壯乃詐稱耳聾辭歸終身不至成都龔壯字子瑋巴西人冬趙大發兵以伐燕燕人襲之入趙髙陽漢縣今屬直𨽻保定府趙師還趙王虎合兵五十萬具船萬艘自河通海運穀千一百萬斛于樂安城在今直𨽻永平府樂亭縣水經注濡水東徑樂安亭北即此自幽州以東至白狼漢縣以白狼山名故城在今熱河八溝界大興屯田括取民馬凡得四萬餘匹大閲于宛陽今河南彰德府臨彰縣西有趙王閲馬臺水經注漳水東徑閲馬臺即此欲以擊燕燕王皓謂諸將曰虎自以樂安城防守重椱薊城南北必不設備今若詭路出其不意可盡破也遂帥諸軍入自蠮螉塞胡三省注自龍城取西道入蠮螉塞據此塞當在龍城之西襲趙戍將直扺薊城破武遂津在保定府安肅縣易水徑其南入髙陽所至焚燒積聚掠三萬餘家而去趙兵乃還辛丑七年春二月甲子朔日食封慕容皓為燕王皓自以稱王未受晉命遂遣長史劉翔來獻捷破趙之捷且言權假之意翔至建康為皓求大將軍燕王章璽朝議以為故事大將軍不處邉異姓不封王翔曰自劉石搆亂未聞中華公卿有能摧破凶逆者獨慕容鎮軍心存本朝屢殄彊敵功烈如此而惜北海之地不以封邑何哉吾非茍尊所事竊惜聖朝踈忠義之國使四海無所勸慕耳經年衆議不決㑹皓上表罪狀庾氏兄弟又與氷書責其當國不能雪恥氷懼乃與何充奏從其請以皓為大將軍幽州牧大單于燕王以翔為代郡太守翔不受翔疾江南士大夫以奢縱相尚嘗謂充等曰四海板蕩奄踰三紀宗社為墟黎民塗炭此乃廟堂焦慮之時而諸君晏安江沱以奢靡為榮以傲誕為賢將何以尊主濟民乎充等甚慙及翔北還公卿餞之翔曰今石虎李夀志相吞噬王師縱未能澄清北方且當從事巴蜀一旦石虎先併夀據形便之地以臨東南雖有智者不能謀矣中護軍謝廣曰是吾心也三月皇后杜氏崩夏四月葬恭皇后壬寅八年春正月己未朔日食夏六月帝崩琅邪王嶽即位是為康帝帝不豫或詐為尚書符敕宫門無得納宰相衆皆失色庾氷曰此必詐也推問果然帝二子丕即哀帝奕字延齡即海西公皆在襁褓氷請以母弟琅邪王嶽為嗣帝許之中書何充曰父子相傳先王舊典且今將如孺子何氷不聽帝乃詔氷充及武陵王晞字道叔元帝子㑹稽王昱元帝少子即簡文帝尚書令諸葛恢字道明陽都人並受顧命而崩琅邪王即位委政于氷充已而封丕琅邪王奕東海王秋七月葬興平陵史臣曰成帝幼冲嗣位不親庶政及長留心萬幾務在簡約雄武之度雖有愧于前王恭儉之德兄追蹤于往烈矣冬十月燕遷都龍城地在今熱河塔子溝東北遼于此立興中府所建三塔猶存蒙古謂三為古爾板塔為蘇巴爾漢故名曰古爾板蘇巴爾漢城燕王皓使陽裕等築城于桞城之北龍山胡三省注山在龍城東之西立宗廟宫闕命曰龍城遂徙都焉十一月燕王皓擊髙句麗入丸都高句麗所都故城在今朝鮮國城東北丸都山下慕容翰說燕王皓伐髙句麗翰曰宇文屢為國患今逸豆歸篡竊得國羣情不附伐之必克然髙句麗去國密邇𠂻虛掩吾不備此腹心之疾也宜先除之還取宇文如反掌耳皓善其言乃分兵二道伐之高句麗有二道北道平濶南道險狹翰曰虜必重北而輕南王宜帥鋭兵從南道擊之而别遣偏師出從北道皓從之自將徑兵四萬出南道以翰為前鋒别遣長史王寓等出北道髙句麗王釗戰敗釗果以精兵拒北道而自以羸兵備南道翰先至合戰皓以大衆繼之釗遂大敗燕軍乘勝遂入丸都釗單騎走會燕北道兵戰沒遂不窮追乃虜釗妻子發釗父墓載其尸毁丸都城而還明年釗朝貢于燕皓還其父尸留母為質數年而後歸之十二月立皇后禇氏時徴后父豫章太守禇裒為侍中裒以后父不願居中任事乃除江州刺史鎮半洲城名在江西九江府德化縣趙徴兵入寇濟南平陵即漢東平陵注見前城北石虎一夕移于城東南有狼狐千餘迹隨之迹皆成蹊趙王虎喜曰石虎者朕也自西北而東南天意欲使朕平蕩江南也其敕諸州兵明年悉集于是諸州兵集者百餘萬會虎享羣臣于大武殿有白雁百餘集馬道之南太史令趙攬曰白雁集庭宫室將空之象不宜南行虎乃臨宣武觀大閲而罷事在建元二年康皇帝癸卯建元元年秋七月詔議經略中原庾翼表遣梁州刺史桓宣伐趙翼為人慨慷喜功名與琅邪內史桓溫字元子彛之子相友善溫尚南康公主豪爽有氣槩翼嘗薦于成帝曰溫有英雄之才願勿以常壻畜之宜委以方召之任必有宏濟之勳時杜乂殷浩並才名冠世翼獨弗之重也曰此輩宜束之髙閣俟天下太平然後徐議其任耳浩屢辭徵辟屏居十年時人以比管葛謝尚王濛至伺其出處以卜江左興亡嘗曰深源不起當如蒼生何翼請浩為司馬浩不應翼遺之書曰王夷甫立名非真實長華競明德君子遇會處際寧可然乎浩猶不起之謝尚字仁祖鯤子翼以滅趙取蜀為己任遣使約燕凉刻期大舉朝議多以為難唯庾氷意與之同溫及譙王無忌字公夀氶之子皆贊成之至是詔議經略中原翼欲悉衆北伐表桓宣督諸軍趣丹水注見前桓溫為先鋒小督帥衆入臨淮既而桓宣擊趙李羆于丹水為羆所敗宣慙憤而卒漢主夀卒太子勢立庾翼移鎮襄陽詔以翼都督征討軍事庾氷都督荆江等州軍事徴何充為揚州刺史録尚書事翼欲移鎮襄陽恐朝廷不許乃奏移鎮安陸帝遣使譬止之翼遂違詔北行至夏口復請鎮襄陽翼時有衆四萬詔加翼都督征討軍事遣氷出鎮武昌以為繼援徴充輔政明年氷卒翼移鎮夏口留子方之戍襄陽甲辰二年漢李勢太和元年春燕王皓擊滅宇文部逸豆歸走死皓還殺其兄翰皓自將擊逸豆歸以慕容翰為前鋒逸豆歸遣南羅大涉夜干南羅城名大城之長涉夜干長之名也將精兵逆戰涉夜干勇冠三軍宇文所賴翰直出衝陳斬之宇文士卒不戰而潰燕兵乘勝逐之遂克其都城宇文氏都遼西紫川逸豆歸走死漠北宇文氏由是散亡皓遷其部衆于昌黎翰為流矢所中卧病積時後漸差于其家試騁馬或告翰欲為變皓雖藉翰勇略然終忌之乃賜翰死秋九月帝崩太子聃即位是為移帝尊皇后曰皇太后太后臨朝稱制帝疾篤庾翼庾氷欲立㑹稽王昱為嗣何充建議立聃為太子帝崩太子即位由是翼氷深恨充時太子方三嵗太后臨朝稱制設白紗帷于太極殿太后抱帝臨軒充薦禇裒宜綜朝政裒固請居藩改督徐兖鎮京口尚書奏裒見太后在公庭則如臣禮私覿則嚴父從之冬十月葬崇平陵孝宗穆皇帝乙巳永和元年燕王慕容皓稱十二年舊大國一趙小國三漢凉代新小國一燕凡五僣國夏四月以㑹稽王昱為撫軍大將軍録尚書六條事通典晉初有吏部三公客曹駕部屯田度支六曹太康有吏部殿中五兵田曹度支左民六曹蓋六條也昱清虛寡欲尤善元言常以劉惔王濛韓伯字康伯潁川人為談客又辟郗超字景興鑒之孫為撫軍掾謝萬字萬石安之弟為從事中郎超少卓肇不羈父愔簡默冲退而嗇于財積錢數千萬嘗開庫任超所取超施散親故一日都盡萬清曠秀邁亦有時名郗愔字方回二龍見于燕之龍山燕有黑白二龍見于龍山交首逰戲解角而去燕王皓祀以太牢命所居宫曰和龍是嵗始不用晉年號稱十二年秋七月江州都督庾翼卒諡曰肅以桓溫都督荆梁等州軍事翼病表子爰之翼第二子為荆州刺史委以後任及卒朝議以諸庾世在西藩人情所安欲從其請何充曰荆楚國之西門户口百萬北帶彊胡西鄰徑蜀豈可以白靣少年當之哉桓溫英略過人有文武器幹西夏之任無出溫右者丹陽尹劉惔每竒溫才然知其有不臣之志謂會稽王昱曰溫不可使居形勝之地其位號常宜抑之勸昱自鎮上流以已為軍司馬昱不聽遂以溫代翼又以惔監沔中軍代庾方之翼長子冬十二月張駿自稱凉王初凉州僚屬勸駿稱王駿曰此非人臣所冝言也然境內皆稱之為王至是駿分其境內二十二郡三營為凉統武威等十一郡河統金城等八郡沙統敦煌等三郡及西域都護三營州自稱大都督大將軍假凉王督攝之始置百官車服旌旗擬于王者丙午二年漢嘉寧元年凉王張重華永樂元年春正月揚州刺史都鄉侯何充卒諡曰文穆充有器局臨朝正色以社稷為己任所選皆以功效不私親舊三月以顧和為尚書令殷浩為揚州刺史禇裒薦顧和殷浩詔以和為尚書令浩為揚州刺史和有母喪固辭不起謂所親曰古人有釋哀絰從王事者以其才足幹時故也如和者正足以虧孝道傷風俗耳浩亦固辭㑹稽王昱與浩書曰屬當厄運危弊理極足下沈識淹長足以經濟若復深存挹退吾恐天下之事於此去矣足下去就即時之廢興也家國不異宜深思之浩乃就職夏五月凉王張駿卒世子重華字泰臨嗣冬十一月桓溫帥師伐漢桓溫將伐漢將佐皆以為不可江夏相袁喬字彥叔陽夏人曰今為天下患者胡蜀二寇而已蜀雖險固比胡為弱將欲除之宜先其易者李勢無道臣民不附且恃其險逺不修戰備宜以精卒萬人輕齎疾趨比其覺之我已出其險要可一戰擒也蜀地富饒户口繁庶諸葛武侯用之抗衡中夏若得而有之國家之大利也溫拜表即行委長史范汪字元平順陽人以留事使袁喬帥二千人為先鋒朝廷以蜀道險逺溫衆少而深入皆以為憂惟劉惔以為必克或問其故惔曰以博知之溫善博者也不必得則不為但恐克蜀之後溫終專制朝廷耳丁未三年是嵗漢亡大國一趙小國三凉燕代凡四僣國春三月桓溫敗漢兵于笮橋在成都府西南華陽國志萬里橋西上曰夷星橋亦曰笮橋笮疾各反進至成都漢主勢降詔以為歸義侯溫軍至青衣漢縣後漢改陽嘉故城在今四川雅州府雅安縣縣有青衣水亦曰平羌江出縣之濛山至嘉定府樂山縣入江漢大發兵趨合水青衣水入江之處水經注江水東南遇武陽縣青衣水沫水從西南來合注之即此以拒之漢諸將從江北向犍為注見前溫軍自江南出彭模軍中議者欲分為兩軍異道俱進以分漢兵之勢袁喬曰今懸軍深入當合勢力以取一戰之捷萬一偏敗大事去矣不如全軍而進齊三日糧以示無還心勝可必也溫然之注彭模即彭亡山後漢岑彭被刺處見前乃留參軍孫盛將羸兵守輜重溫自將步卒直指成都進遇漢將李權三戰三捷漢兵走散溫軍於成都之十里陌勢悉衆出戰于笮橋溫前鋒不利矢及溫馬首衆懼欲退鼓吏誤鳴進鼓袁喬拔劍督士卒力戰遂大破之溫乘勝長驅至成都縱火燒其城門漢人惶懼無復鬬志勢輿櫬靣縳詣軍門溫送勢於建康引漢司空譙獻之等以為參佐舉賢旌善蜀人悅之留成都三十日振旅還江陵詔封勢歸義侯後蜀自李特據成都至勢亡凡六主合四十六年夏四月趙攻凉州張重華遣謝艾將兵擊破之先是趙遣王擢麻秋攻凉為凉將謝艾所破至是復遣麻秋攻枹罕帥衆八萬圍塹數重雲梯地突百道皆進城中禦之秋衆死傷數萬退保大夏漢縣唐廢故城在今甘肅蘭州府河州張重華遣謝艾帥步騎三萬進軍臨河艾乘軺車戴白幍鳴鼓而行秋望見怒曰艾年少書生冠服如此輕我也命黑稍龍驤三千人馳擊之艾左右大懮艾踞胡床指麾處分趙人以為有伏兵懼不敢進别將張瑁自間道引兵截趙軍後趙軍退艾乘勢進擊大破之趙王虎復遣孫伏都帥步騎二萬會秋軍長驅濟河艾又破之虎嘆曰吾以偏師定九州今九州之力困于枹罕彼有人焉未可圖也趙築華林園在臨漳縣西本魏所築復廣之趙王虎據十州之地聚斂財物不可勝記猶以為不足悉發前代陵墓取其金寶沙門吳進言于虎以趙運將衰晉當復興宜苦役晉人以厭其氣虎遂發近郡男女十六萬人車十萬乘運土築華林園及長墻于鄴北然燭夜作暴風大雨死者數萬人郡國前後獻蒼麟十六白鹿七虎命司虞調之以駕芝蓋命太子宣祈福于山川因行逰獵宣乘大輅羽葆華蓋建天子旌旗戎卒十八萬出自金明門虎升凌霄觀望之笑曰我家父子如此自非天崩地陷當復何愁但抱子弄孫曰為樂耳冬十月楊初遣使稱藩詔以為雍州刺史仇池公初楊難敵降劉曜曜封為武都王已降于成旋復叛成難敵卒子毅嗣遣使來稱藩族兄初襲殺之附于趙石虎至是初復通使詔以為征南將軍雍州刺史仇池公御批歷代通鑑輯覽卷三十二

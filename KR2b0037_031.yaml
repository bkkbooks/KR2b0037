front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷三十二晉中宗元皇帝己卯太興二年漢定號趙後趙髙祖石勒元年趙舊大國一趙國二成凉新大國一後凡四僣國春二月石勒獻捷于漢勒拔平陽事具前漢斬其使
  hash: sha256:47f1ad9fd9045465e6347de9283437423241f30e6c7dbc984cb7be52c3aab92f

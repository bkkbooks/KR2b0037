front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷五十四唐睿宗皇帝辛亥景雲二年春二月命太子監國以宋王成器為同州刺史豳王守禮故太子賢之子為豳州刺史安置太平公主于蒲州
  hash: sha256:6342b0b079b0583c0a31c17c6c92c5127f7b17f0fb77d21f3b811b2abd5bfb77

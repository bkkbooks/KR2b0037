body:
  text: 帝姓李氏名淵字叔德隴西成紀人西凉武昭王皓七世孫祖虎仕西魏賜姓大野氏與李弼等八人佐周代魏有功皆為柱國號八柱國家父昞周世封唐公周代魏虎已卒追録其功封唐公使昞襲帝生於長安日角龍庭體有三乳隋初襲父爵大業末為太原留守㑹隋亂起兵入關代隋稱帝因始封國建號曰唐遂平羣雄而一天下甲申武德七年綱目於是年以諸僭國已盡唯梁師都北附突厥乃正唐統特用大書今依之春正月置大中正依周齊舊制州置中正一人掌知州內人物品量望第以門望高者領之無品秩二月封高麗王建武元之子為遼東王帝以隋末戰士多沒於高麗賜建武書令悉遣還乃索高麗人在中國者歸之建武奉詔遣還前後萬數又請頒厯乃遣使册封之置州縣鄉學詔州縣鄉皆置學有明一經以上者咸以名聞帝詣國子學釋奠於先聖先師詔王公子弟皆就學三月初定官制以太尉司徒司空為三公次尚書門下中書祕書殿中內侍為六省次御史臺次太常至太府為九寺太常光祿衛尉宗正太僕大理鴻臚司農太府凡九寺次將作監次國子學次天策上將府次左右衛至左右領衛為十四衛親勳翊驍武威及領軍各衛皆有左右凡十四宫置三師太師太傅太保三少少師少傅少保詹事及兩坊門下典書三寺家令率更僕十率府左右衛率左右宗衛率左右虞候率左右監門率左右內率王公置府佐國官公主置邑司並為京職事官州縣鎮戍為外職事官自開府儀同三司至將仕郎二十八階從一品至正四品六階從四品至從九品正從皆有上下凡二十二階共為二十八階為文散官驃騎大將軍至陪戎副尉三十一階從一品至從二品三階正三品至從九品正從皆有上下凡二十八階共為三十一階為武散官上柱國至武騎尉十二等十二轉上柱國十一轉柱國十轉上護軍九轉護軍八轉上輕車都尉七轉輕車都尉六轉上騎都尉五轉騎都尉四轉驍騎尉三轉飛騎尉二轉雲騎尉一轉武騎尉為勳官夏四月頒新律令比開皇舊制增新格五十三條初定均田租庸調法前已定租庸調法今因均田而又定之丁中之民謂十六以上給田一頃篤疾減什之六寡妻妾減七皆以什之二為世業八為口分每丁嵗入租粟二石新唐志丁嵗輸粟二斛稻三斛謂之租調隨土地所宜綾絹絁式支反絲經枲緯曰絁布新唐志隨鄉所出絹二匹綾絁二丈布加五之一綿三兩麻三斤非蠶鄉則輸銀十四兩嵗役二旬不役則收其傭日三尺新唐志用人之力嵗二十日閏加二日不役者日為絹三尺有事而加役者旬有五日免其調三旬租調俱免水旱蟲霜為災什損四以上免租損六以上免調損七以上課役俱免凡民資業分九等百户為里五里為鄉四家為鄰四鄰為保在城邑者為坊田野者為村食祿之家無得與民爭利工商雜類無與士伍男女始生為黃四嵗為小十六為中二十為丁六十為老嵗造計帳三年造户籍六月慶州即𢎞化郡唐仍為州注見前都督楊文幹反遣秦王世民討平之初齊王元吉勸太子建成除秦王世民曰當為兄手刃之世民從上幸元吉第元吉伏甲欲刺之建成止之元吉愠曰為兄計耳于我何有建成擅募驍勇二千餘人為東宫衛士發幽州突驍三百置宫東諸坊慶州都督楊文幹嘗宿衛東宫建成與之親厚私使募壯士送長安至是上幸仁智宫新唐志坊州宜君縣有仁智宫武德七年置建成居守世民元吉皆從建成使元吉就圖世民又使郎將以甲遺文幹使之舉兵表裏相應郎將至中途告變上怒召建成建成懼不敢赴詹事主簿趙𢎞智河南新安人勸其貶損車服屏從者詣上謝罪建成乃詣仁智宫見上叩頭謝罪奮身自擲上怒不解置之幕下以兵守之馳召文幹文幹遂發兵反上召秦王世民告之曰文幹事連建成恐應之者衆汝宜自行還立汝為太子吾不能效隋文帝自誅其子當封建成為蜀王蜀兵脆弱他日茍能事汝汝宜全之不能事汝汝取之易耳世民既行元吉與妃嬪更迭為建成請封德彛復為營解於外上意遂變遣建成還守京師惟責以兄弟不睦歸罪于王圭韋挺冲之子杜淹並流嶲州即漢越嶲郡注見前文幹陷寧州西魏置隋大業中改北地郡唐仍為州今屬甘肅慶陽府世民軍至其黨殺之傳首京師秋閏七月突厥入寇遣秦王世民將兵禦之或說上曰突厥所以屢寇關中者以子女玉帛皆在長安故也若焚長安而不都則强冦自息矣上欲從之秦王世民諫曰外侮為患自古有之奈何為此以貽四海羞願假數年之期臣請繫頡利之頸致之闕下若其不效遷都未晚上曰善建成與妃嬪因共譖世民曰突厥犯邊得賂則退秦王外託禦冦之名內欲總兵權成其篡奪耳上大怒召世民責之㑹有司奏突厥內冦上乃改容勞勉詔世民元吉將兵出豳州西魏置隋廢唐仍為州後改為邠今州𨽻陜西以禦之八月突厥受盟而還時頡利突利二可汗舉國入寇世民遇于豳州元吉懼不敢出世民帥騎馳詣敵陳告之曰我秦王也可汗能鬭獨出與我鬭若以衆來我直以此百騎相當耳頡利不能測笑而不應世民又前遣騎告突利曰爾往與我盟有急相救今乃引兵相攻何無香火之情也頡利聞之疑突利與世民有謀乃遣使謂世民曰王不須進我但與王申盟約耳乃引兵稍却㑹大雨世民曰敵所恃者弓矢耳今積雨彌時筋膠俱解吾刀槊犀利此而不乘將復何待乃潛師冒雨而進突厥大驚頡利欲戰突厥不可乃請和親世民許之突利因自託于世民世民亦以恩意撫之與盟而去突利本始畢子名什鉢畢頡利立以為可汗使居東上每有寇盜輒命世民討之事平之後猜嫌益甚命韋仁夀萬年人檢校南寧州注見前都督仁夀性寬厚有識度初為蜀郡司法書佐所論囚至市猶西向為仁夀禮佛然後死時西南夷內附朝廷遣使撫之類皆貪縱逺民患之上聞仁夀名命檢校南寧州都督仁夀既受命將兵五百人至西洱河注見前周厯數千里逺人望風歸附仁夀承制置七州十五縣各以其豪帥為刺史縣令法令清肅逺人悅服各遣子弟入貢乙酉八年春正月以張鎮周為舒州唐以同安郡置同安注見前都督鎮周舒州人也到州就故宅召親故酣宴十日贈以金帛泣與之别曰今日張鎮周猶得與故人歡飲明日之後則舒州都督治百姓耳自是犯法者一無所縱境內肅然詔許突厥吐谷渾互市突厥吐谷渾各請互市詔皆許之先是中國喪亂民乏耕牛至是資于兩地雜畜被野秋七月突厥寇邊詔右衛大將軍張瑾禦之敗績先是上與突厥書用敵國禮至是上謂侍臣曰突厥貪婪無厭朕將征之自今勿復為書皆用詔敇突厥遂寇靈相潞沁韓朔潞州後周置今山西潞安府是沁州唐以義寧郡置今州𨽻山西韓州後周置今潞安府襄垣縣是餘注俱見前等州張瑾與戰太谷隋縣今屬太原府全軍皆沒瑾僅以身免長史溫彥博為敵所執敵以彥博職在機近問以國家兵糧虛實彥博不對敵遷之隂山注見前靈州都督任城王道宗擊破敵兵頡利遣使請和而退後突厥歸欵彥博乃得還九月令太府檢校諸州權量丙戌九年春二月初令州縣里閈各祀社稷初令州縣祀社稷士民里閈亦相從立社各申祈報用洽鄉黨之歡夏沙汰僧道太史令傅奕上疏請除佛法疏曰佛在西域言妖路逺漢譯梵書恣其假託使不忠不孝削髮而揖君親游乎游食易服以逃租賦僞啓三途謬張六道遂使愚迷妄求功德不憚科禁輕犯憲章且生死夭夀由于自然刑德威福關之人主貧富貴賤功業所招而愚僧矯詐皆云由佛竊人主之權擅造化之力其為害政良可悲矣自漢以前初無佛法君明臣忠祚長年久自立畨神羌戎亂起主庸臣佞政虐祚短梁武齊襄足為明鏡今天下僧尼數盈十萬請令匹配即成十萬餘户産育男女十年長養一紀教訓可以足兵途三塗六道胡三省注釋氏以地獄餓鬼畜生為三言為惡者必墮此也又添阿修羅天神地祇為六道詔百官議之惟太僕卿張道源是奕言蕭瑀曰佛聖人也而奕非之非聖人者無法當治其罪奕曰人之大倫莫如君父佛以世嫡而叛其父釋典謂佛以王太子出家以匹夫而抗天子釋氏之法不拜君親蕭瑀不生于空桑昔有莘氏女採桑于伊川得嬰兒于空桑中是為伊尹說見列子乃遵無父之教非孝者無親瑀之謂矣瑀不能對但合手曰地獄之設正為是人上亦惡沙門道士茍避征徭不守戒律詔命有司沙汰天下僧尼道士女冠其精勤練行者遷大寺觀庸猥粗穢者勒還鄉里京師留三寺二觀諸州各留一所已而復罷是命六月太白經天秦王世民殺太子建成齊王元吉立世民為皇太子决軍國事世民既與建成元吉有隙以洛陽形勝之地恐一朝有變欲出保之乃以行臺尚書溫大雅鎮洛陽建成夜召世民飲酒而鴆之世民暴心痛吐血數升上謂世民曰首建大謀削平海內皆汝之功吾欲立汝為嗣而汝固辭且建成為嗣日久吾不忍奪也觀汝兄弟似不相容不可同處當遣汝居洛陽自陜以東皆主之仍建天子旌旗如漢梁孝王故事世民泣辭不許將行建成元吉相與謀曰秦王若至洛陽不可復制不如留之長安則一匹夫取之易矣乃密令數人上封事言秦王左右聞往洛陽無不喜躍觀其志趣恐不復來上乃止元吉密請殺世民秦府僚佐皆惶懼不知所出行臺郎中房元齡謂長孫無忌曰今嫌隙已成一旦禍機竊發豈惟府朝塗地乃實社稷之憂莫若勤王行周公之事以安家國存亡之機正在今日無忌以告世民召杜如晦謀之亦勸世民如元齡言建成元吉以秦府多驍將欲誘之使為己用密以金銀器一車贈尉遲敬德敬德辭不受以告世民世民曰公心如山嶽雖積金至斗知公不移元吉乃譖敬德于上將殺之世民固請得免又譖程知節出為康州刺史知節謂世民曰大王股肱羽翼盡矣身何能久知節以死不去願早决計建成謂元吉曰秦府智略之士可憚者獨房元齡杜如晦耳皆譖之于上而逐之長孫無忌與其舅高士亷名儉以字行齊清河王嶽之孫將軍侯君集豳州三水人及尉遲敬德等日夜勸世民决計世民猶豫問于李靖及李世績皆辭世民由是重二人㑹突厥入塞建成薦元吉將兵擊之元吉請尉遲敬德等與之俱又悉簡秦府精卒以益其軍率更丞王晊密告世民曰太子語齊王吾與秦王餞汝于昆明池使壯士拉殺之因遣人說上授我以國而立汝為太弟世民以告長孫無忌無忌等請先事圖之世民歎曰骨肉相殘古今大惡吾誠知禍在朝夕欲俟其發然後以義討之不亦可乎敬德曰大王不用敬德之言敬德將竄身草澤不能留居大王左右交手受戮也無忌曰不從敬德之言無忌亦當相隨而去世民訪之府僚衆曰大王以舜為何如人曰聖人也衆曰使舜浚井而不出塗廩而不下則井中之泥廩上之灰耳安能澤被天下法施後世乎世民命卜之幕僚張公謹字宏慎魏州繁水人自外來見之取龜投地曰卜以决疑不疑何卜世民意乃決于是太白再經天傅奕密奏太白見秦分秦王當有天下上以其狀授世民于是世民密奏建成元吉淫亂後宫且曰兄弟專欲殺臣似為世充建德報讎臣今永違君親亦實耻見諸賊于地下上驚報曰明當鞠問汝宜早參明日世民率長孫無忌等伏兵于元武門建成與元吉俱入先是張媫妤竊知世民表意馳語建成建成召元吉謀之元吉曰宜勒兵不朝以觀形勢建成曰兵偹已嚴當俱入參自問消息也乃俱入至臨湖殿覺有變欲還世民追射建成殺之尉遲敬德射殺元吉于是東宫齊府將帥薛萬徹等帥衆大至攻元武門敬德以二人首示之乃頗散去上方泛舟海池在太極宫中世民使敬德入侍敬德貫甲持矛直至上所奏曰太子齊王作亂秦王兵已誅之矣恐驚動陛下遣臣宿衛上謂裴寂等曰不圖今日乃見此事當如之何蕭瑀陳叔達曰建成元吉本不預義謀又無功于天下疾秦王功高望重共為姦謀今秦王已討而誅之陛下若處以元良委之國務無復事矣上曰此吾之夙心也時秦府兵與二宫左右戰猶未巳敬德請降手敕令內外諸軍一受秦王節度衆然後定上召世民撫之世民跪吮上乳號慟久之建成元吉諸子皆坐誅遂立世民為皇太子軍國庶事悉委太子處决然後奏聞太子命縱禁苑鷹犬罷四方貢獻聽百官各陳治道政令簡肅中外大悅司馬氏光曰立嫡以長禮之正也然高祖所以有天下皆太宗之功隱太子以庸劣居其右地嫌勢逼必不相容鄉使高祖有文王之明隱太子有泰伯之賢太宗有子臧之節則亂何自而生哉既不能然太宗始欲俟其先發然後應之如此則事非獲已猶為愈也既而為羣下所逼遂至喋血禁門推刃同氣貽譏千古惜哉以魏徵王圭為諫議大夫初洗馬魏徵常勸建成早除秦王及建成敗太子召徵謂曰汝何離間我兄弟徵舉止自若對曰先太子早從徵言必無今日之禍太子改容禮之引為詹事主簿亦召王圭韋挺于嶲州皆以為諫議大夫帝自稱太上皇廬江王瑗字德圭太祖之孫反幽州將軍王君廓殺之初上以瑗為幽州都督又以其懦怯非將帥才使王君廓佐之君廓故羣盜勇悍險詐瑗推心倚仗之太子建成謀害秦王密與瑗相結建成死詔遣使馳驛召瑗瑗心不自安謀于君廓君廓欲取瑗以為功乃曰大王若入必無全理瑗曰我今以命託公舉事決矣乃發驛徵兵又召燕州刺史王詵計事欲除君廓以詵代之君廓知之往見詵斬之持其首告衆曰李瑗與王詵同反汝何故從之取族滅乎遂帥麾下踰城而入執瑗縊之詔以君廓為幽州都督以瑗家口賜之建成元吉之黨亡在民間雖更赦令猶不自安徼幸者爭告捕以邀賞諫議大夫王圭以啓太子太子令事連東宫齊王及李瑗者並不得告違者反坐遣魏徵宣慰山東聽以便宜從事徵至磁州遇州縣錮送前太子千牛李志安齊王護軍李思行詣京師徵曰前宫齊府左右已赦不問今復送思行等則誰不自疑遂皆解縱之太子聞之甚喜秋八月太子即位詔傳位于太子太子固辭不許乃即位放宫女三千餘人立妃長孫氏晟之女為皇后后少好讀書造次必循禮法上為秦王后奉事高祖承順妃嬪甚有內助及為后務崇節儉服御取給而已上深重之嘗與之議賞罰后辭曰牝雞之晨惟家之索妾婦人安敢預聞政事固問之終不對突厥入寇至便橋即西渭橋在咸陽縣西南三輔決録長安城西門曰便門門北與橋對因號便橋帝出禦之突厥請盟而退梁師都所部離叛國寖衰弱乃朝于突厥勸令入寇于是頡利突利二可汗合兵十餘萬騎寇涇州注見前頡利進至渭水便橋之北遣其心腹執失思力入見以觀虛實執失思力盛稱二可汗將兵百萬今至矣上讓之曰吾與汝可汗靣結和親贈遺無算今汝可汗背盟入寇全忘大恩自誇彊盛我今先斬汝矣執失思力懼乃囚之上與高士亷房元齡等六騎徑詣渭水上與頡利隔水而語責以負約突厥大驚皆下馬羅拜俄而諸軍繼至旌甲蔽野頡利見執失思力不返而上輕出軍容甚盛有懼色上麾諸軍使郤而布陳獨留與頡利語蕭瑀叩馬固諫上曰突厥所以敢傾國而來者以我國內有難朕新即位謂我不能抗禦也我若示之以弱敵必放心大掠不可復制故朕輕騎獨出示若輕之震曜軍容使知必戰敵既深入必有懼心與戰則克與和則固制服突厥在此舉矣是日頡利來請和詔許之斬白馬與盟于便橋之上突厥引兵退蕭瑀請曰突厥未和之時諸將爭欲戰陛下不許而敵自退其策安在上曰突厥之衆多而不整君臣之志惟賄是求昨其達官皆來謁我我若醉而縛之因擊其衆伏兵邀其前大軍躡其後覆之如反掌耳然吾即位日淺國家未安一與敵戰結怨既深彼或懼而修備則吾未可以得志也故卷甲韜戈啖以金帛彼既得所欲志必驕惰然後飬威俟釁一舉可滅也將欲取之必固與之此之謂也瑀謝不及九月引諸衛將卒習射于顯德殿上日引諸衛將卒數百人習射殿庭諭之曰朕不使汝曹穿池築苑專習弓矢居閒無事則為汝師突厥入寇則為汝將庶幾中國之民可以少安羣臣多諫曰于律以兵刃至御在所者絞今使將卒習射殿庭萬一狂夫竊發出于不意非所以重社稷也上曰王者視四海為一家封域之內皆朕赤子朕一一推心置其腹中奈何宿衛之士亦加猜忌乎由是人思自勵數年之間悉為精鋭上嘗言吾自少經略四方頗知用兵之要每觀敵陳則知彊弱嘗以吾弱當其彊彊當其弱彼乘吾弱逐奔不過數十百步吾乘其弱必出其陳後反而擊之無不潰敗所以取勝多在此也定勳臣爵邑上靣定勳臣爵邑命陳叔達唱名示之且曰所叙未當宜各自言于是諸將爭功不已淮安王神通曰臣舉兵關西首應義旗今房元齡杜如晦等專弄刀筆功居臣上臣竊不服上曰叔父雖首倡舉兵蓋亦自營脫禍及竇建德吞噬山東叔父全軍覆沒劉黑闥再合餘燼叔父望風奔北元齡等運籌帷幄坐安社稷論功行賞固宜居叔父之先諸將乃相謂曰陛下至公淮安王尚無所私吾儕何敢不安其分遂皆悅服房元齡嘗言秦府舊人未遷官者皆嗟怨上曰王者至公無私故能服天下之心設官分職以為民也當擇賢才而用之豈以新舊為先後哉其後或請追秦府舊兵入宿衛上曰朕以天下為家惟賢是與豈舊兵之外皆無可信者乎汝之此意非所以廣朕德于天下也置𢎞文館上于𢎞文殿聚四部書分為四類曰經史子集以甲乙丙丁為次二十餘萬卷置𢎞文館于殿側選天下文學之士虞世南褚亮姚思亷歐陽詢字信本紇之子蔡允恭蕭德言字文行系出蘭陵徙關中等以本官兼學士令更日宿直聽朝之隙引入內殿講論前言往行商確政事或至夜分乃罷上謂侍臣曰朕觀煬帝文辭奧博亦知是堯舜而非桀紂然行事何其相反也魏徵對曰人君雖聖哲猶當虛己以受人故智者獻其謀勇者竭其力煬帝恃其俊才驕矜自用故口誦堯舜之言而身為桀紂之行曽不自知以至覆亡也上曰前事不逺吾屬之師也問上問給事中孔穎逹曰論語以能問于不能以多于寡有若無實若虛何謂也穎達具釋其義以對且曰非獨匹夫如是帝王內藴神明外當元默若位居尊極炫耀聰明以才陵人飾非拒諫則下情不通取亡之道也上曰朕每臨朝欲發一言未嘗不三思恐為民害是以不多言知起居事杜正倫曰臣職在記言陛下之言失臣必書之豈徒有害于今亦恐貽譏于後上謂裴寂曰比多上書言事者朕皆黏之屋壁得出入省覽數思治道或深夜方寢公輩亦當恪勤職事副朕此意與有上書請去佞臣者上問佞臣謂誰對曰願陛下羣臣言或陽怒以試之彼執理不屈者直臣也畏威順㫖者佞臣也上曰君源也臣流也濁其源而求其流之清不可得矣君自為詐何以責臣下之直乎朕方以至誠治天下卿策雖善朕不取也上與羣臣論止盜或請重法以禁之上曰朕當去奢省費輕徭薄賦選用亷吏使民衣食有餘則自不為盜安用重法邪自是數年之後海內升平路不拾遺外户不閉商旅野宿焉以上嘗曰君依于國國依于民刻民以奉君猶割肉充腹腹飽而身斃君富而國亡矣然人君之患不自外來常由身出蓋欲盛則費廣費廣則賦重賦重則民愁而國危朕常以此思之不敢縱欲也同上謂公卿曰昔禹鑿山治水而民無謗讟者與人利故也秦始皇營宮室而民怨叛者病人以利己故也夫美麗珍竒固人之所欲若縱之不已則危亡立至朕欲營一殿材用已具鑒秦而止王公以下宜體朕此意由是二十年間風俗素朴衣無錦繡公私富給上謂侍臣曰吾聞西域賈胡得美珠剖身以藏之有諸侍臣曰有之上曰人皆知笑彼之愛珠而不愛其身也吏受賕抵法與帝王狥奢欲而亡國者何以異于胡之可笑邪朕與公輩宜戮力相輔庶免為人笑也上患吏多受賕密使左右試賂之有司門令史受絹一匹上欲殺之民部尚書裴矩諫曰為吏受賂罪誠當死但陛下使人遺之而受乃陷人于法也上悅告羣臣曰裴矩能當官力爭不為靣從儻每事皆然何憂不治杜正倫相州洹水人冬十月丙辰朔日食詔追封故太子為息隱王齊王為海陵刺王改葬之後詔復息隱王為隱太子海陵刺王號巢刺王立子承乾字明德長孫皇后出為皇太子承乾生八年矣十一月降宗室郡王為縣公初上皇欲彊宗室自三從昆弟以上皆為王至是上問羣臣遍封宗子于天下利乎封德彝對曰前世唯皇子及兄弟乃為王今封爵太廣恐非所以示天下至公上曰然朕為天子所以養百姓也豈有勞百姓以養已之宗族乎降宗室郡王皆為縣公惟有功者數人不降十二月遣使㸃兵上勵精求治數引魏徵入卧內訪以得失徵知無不言上皆欣然嘉納上遣使㸃兵封德彝奏中男雖未十八其壯大者亦可并㸃上從之敇出徵固執以為不可上怒召而讓之對曰夫兵在御之得其道耳何必多取細弱以增虛數乎且陛下每云吾以誠信御天下今即位未幾失信者數矣上愕然曰何也對曰陛下初詔悉免負逋官物謂負缺官物而逃逋者免追償也有司以為負秦府國司者非官物徵督如故陛下以秦王升為天子國司之物非官物而何又曰關中免二年租調關外給復一年既而繼有敕云已役已輸者以來年為始散還之後方復更徵百姓固已不能無怪今復㸃為兵何謂來年為始乎又陛下所與共治天下者在于守宰至于㸃兵獨疑其詐豈所謂以誠信為治乎上悅從之以張元素蒲州虞鄉人為侍御史上聞景州録事參軍張元素名召見問以政道對曰隋主自專庶務不任羣臣以一人之智決天下之務借使得失相半乖謬已多下諛上蔽不亡何待陛下誠能擇羣臣而分任以事考其成敗何憂不治上善其言擢為侍御史以張藴古洹水人為大理丞前幽州記室張藴古上大寶針其略曰聖人受命拯溺亨屯故以一人治天下不以天下奉一人又曰壯九重于內所居不過容膝彼昏不知瑶其臺而瓊其室羅八珍于前所食不過適口惟狂罔念邱其糟而池其酒又曰勿汶汶而暗勿察察而明雖冕旒蔽目而視于未形雖黈纊塞耳而聽于無聲上嘉之賜以束帛除大理丞太宗文武皇帝帝名世民高祖次子方四嵗有書生見之曰龍鳳之姿天日之表其年幾冠必能濟世安民書生去高祖使人追之不見乃採其語為名年十八首勸高祖起兵初封趙公進爵秦王高祖平定天下皆帝之功也建成元吉既斃高祖立為太子遂傳位焉丁亥貞觀元年春正月宴羣臣上宴羣臣奏秦王破陳樂上曰朕昔受委專征民間遂有此曲雖非文德之雍容然功業所由不敢忘也封德彝曰陛下以神武平海內文德豈足比乎上曰勘亂以武守成以文文武之用各隨其時卿謂文不及武斯言過矣制諫官隨宰相入閣太極殿東西兩廡之間也議事中書門下及三品以上入閣議事皆命諫官隨之有失輒諫更定律令命吏部尚書長孫無忌與法官更議定律令寬絞刑五十條為斷右趾上曰肉刑廢已久宜有以易之于是有司請改為加役流流三千里居作三年從之以戴胄為大理少卿上以選人多詐冒資䕃敕令自首不首者死未幾有詐冒事覺者上欲殺之胄奏據法應流上怒曰卿欲守法而使朕失信乎對曰敇者出于一時之喜怒法者國家所以布大信于天下也陛下忿選人之多詐故欲殺之既而知其不可復斷之以法此乃忍小忿而存大信也上曰卿能執法朕復何憂胄前後犯顔執法言如泉湧上皆從之天下由是無寃獄將軍長孫順德受人餽絹事覺上于殿庭賜絹數十匹大理少卿胡演以為不可上曰彼有人性得絹之辱甚于受刑如不知愧一禽獸耳殺之何益長孫順德無忌族叔二月分天下為十道隋末豪傑據地自相雄長唐興相帥來歸上皇割置州縣以寵祿之上以民少吏多大加併省因山川形便分為十道曰關內領雍華同商岐邠隴涇原寧慶鄜坊丹延靈㑹鹽夏綏銀豐勝等州河南領洛汝陜虢鄭滑許穎陳豫汴宋亳徐泗豪鄆齊曹濮淄青萊棣兗海沂密等州河東領蒲晉絳汾隰并南汾箕沁嵐石欣代朔蔚澤潞等州河北領懷魏博相衛貝邢洺恆冀深趙滄德易定幽瀛燕北燕檀營平等州山南領荆峽歸䕫澧朗忠涪萬襄唐隨鄧均房郢復金梁洋利鳯興成扶文集壁巴蓬通開隆果渠等州隴右領秦渭河鄯蘭武洮岷廓疊宕涼瓜沙甘肅等州淮南領揚楚徐和壽廬舒光蘄黃安申等州江南領潤常蘇湖杭睦越衢婺括台福建泉宣歙池洪江鄂嶽饒信䖍吉袁撫潭衡永道郴邵黔辰夷思南等州劍南領益嘉眉卭簡資嶲雅南㑹翼維松姚戎梓遂綿始合龍普渝陵榮瀘等州嶺南領廣韶循潮康瀧端新封潘春羅南石高東合崖振雍南方南簡淳欽南尹象藤桂梧賀連南昆靜樂南恭融容牢繡南扶越南義交陸峯愛歡等州三月皇后帥內外命婦親蠶閏月癸丑朔日食命京官五品以上更宿中書內省上謂太子少師蕭瑀曰朕少得良弓十數自謂無以加近以示弓工乃曰皆非良材木心不正則脉理皆邪弓雖徑而發矢不直朕以弓矢定四方識之猶未能盡况天下之務乎乃命京官五品以上更宿中書內省數延見問民疾苦政事得失夏五月苑君璋降初君璋數引突厥入寇至是見頡利政亂知其不足恃遂帥衆來降六月僕射封德彝死初上令封德彝舉賢久無所舉上詰之對曰非不盡心但于今未有竒才耳上曰君子用人如器各取所長古之致治者豈借才于異代乎正患己不能知安可誣一世之人德彝慙而退及是病死德彞險佞隱刺之亂數進忠䇿于上又白太子曰為四海不顧其親乞羹者謂何及上皇議廢立德彞復諫止當時語祕無知者及德彞死後事寖聞侍御史唐臨追劾奸狀詔削德彞官爵改其諡明曰繆唐臨字本德京兆長安人以蕭瑀為左僕射初瑀與德彝有隙瑀薦德彝于上皇以為中書令及上即位瑀為僕射每議事已定德彞至上前輒反之由是有隙時房元齡杜如晦新用事皆疏瑀而親德彜瑀不能平遽上封事論之由是忤㫖㑹瑀及陳叔達忿爭于上前皆坐不敬免官至是復以瑀為左僕射上與侍臣論周秦修短瑀對曰紂為不道武王征之周及六國無罪始皇滅之得天下雖同立心則異上曰公知其一未知其二周得天下增修仁義秦得天下益尚詐力此修短之所以殊也蓋取之或可以逆而守之不可以不順也瑀謝不及山東旱詔所在賑恤蠲其租賦秋七月以長孫無忌為右僕射無忌與上為布衣交加以外戚有佐命功上委以心腹欲相者數矣皇后固請曰妾備位椒房貴寵極矣誠不願兄弟執國政吕霍上官可為切骨之戒上不聽卒用之九月庚戌朔日食冬十月嶺南酋長馮盎遣子入朝初盎與諸酋長迭相攻擊諸州皆奏盎反上欲發兵討之魏徵諫曰嶺南瘴癘險遠不可以宿大兵且告者已數年而盎兵未嘗出境此不反明矣若遣信臣示以至誠可不煩兵而服上乃遣使諭之盎遣其子智戴隨使者入朝上曰魏徵一言勝十萬之師不可不賞乃賜絹五百匹後盎入朝㑹諸洞獠反詔盎討平之上美其功前後賞賜不可勝數十二月詔殿中侍御史崔仁師定州安喜人按獄青州青州有謀反者逮捕滿獄詔崔仁師等覆按之仁師至止坐魁首十餘人孫伏伽謂仁師曰足下平反者多恐人情貪生見其徒侶得免未肯甘心耳仁師曰凡治獄當以仁恕為本豈可自規免罪知其寃而不為伸耶萬一誤有所縱以一身易十囚之死亦所願也及敇使至更訊諸囚皆曰崔公平恕無枉請速就死無一人異辭者以孫伏伽為諫議大夫上好騎射孫伏伽諫曰天子居則九門行則驚蹕非欲茍自尊嚴乃為社稷生民計也夫走馬射的乃少年諸王所為非今日天子事業也既非所以安養聖躬又非所以儀刑後世臣竊為陛下不取上悅以伏伽為諫議大夫上神采英毅羣臣進見皆失舉措上知之每假以辭色嘗謂公卿曰人欲自見其形必資明鏡君欲自知其過必待忠臣茍其君愎諫自賢其臣阿諛順旨君既失國臣豈能獨全如隋煬帝虞世基者亦足以觀矣公輩宜用此為戒事有得失無惜盡言也命吏部四時選集併省吏員隋世選人十一月集至春而罷人患其期促至是吏部侍郎劉林甫魏州觀城人奏四時聽選隨闕注擬人以為便唐𥘉士大夫以亂離之後不樂仕進官員不充州府多以赤牒補官至是皆勒赴省選集者七千餘人林甫隨材銓敘各得其所時人稱之時關中米貴始分人于洛陽選上謂房元齡曰官在得人不在員多遂併省之留文武總六百四十三員徵隋祕書監劉子翼字小心常州晉陵人不至子翼有學行性剛直朋友有過常靣責之李百藥字重規德林子常稱劉四雖復罵人人終不恨是嵗有詔徵之辭以母老不至以李乾祐長安人為侍御史鄃注見前令裴仁軌私役門夫上怒欲斬之殿中侍御史李乾祐諫曰法者陛下所與天下共也今仁軌坐輕罪而抵極刑臣恐人無所措手足矣上悅從之以乾祐為侍御史上嘗語及關中山東人意有同異殿中侍御史張行成曰天子以四海為家今有東西之異示人以隘上善其言厚賜之張行成字德立定州義豐人鴻臚卿鄭元璹還自突厥初突厥既彊敕勒諸部分散有薛延陀先與薛種雜居後滅延陀部有之號薛延陀姓一利嘻氏回紇先曰袁紇亦曰烏紇至隋始稱回紇姓藥葛羅氏都播亦曰都波南接回紇骨利幹居浣海北多濫葛亦曰多濫葛在薛延陀東同羅在薛延陀北僕固亦曰僕骨在多濫葛東拔野古或為拔曵固東鄰靺􅞘思結存延陀故邪渾在諸部最南斛薛處多羅葛北奚結處同羅北阿跌亦曰訶嘻契苾在馬耆西北白霫居鮮卑故地等十五部皆居磧北頡利政亂薛延陀回紇等叛之頡利不能制㑹大雪羊馬多死民大饑鴻卿鄭元璹使還言于上曰突厥之興衰專以羊馬為候今突厥民饑畜瘦將亡之兆也羣臣多勸上乘間擊之上曰背盟不信利災不仁乘危不武縱其種落盡叛六畜無餘朕終不擊必待有罪然後討之戊子二年春正月長孫無忌罷時有密表稱無忌權寵過盛者上以表示之曰朕于卿洞然無疑故以示卿若各懷所聞而不言則君臣之意有不通無忌自懼滿盈固求遜位皇后又內為之請上乃許之置六司侍郎副六司尚書左右司郎中三月戊寅朔日食詔自今大辟並令兩省四品及尚書議之大理進每月囚帳上命自今大辟皆令中書門下四品以上及尚書議之庶無寃濫既而引囚至岐州刺史鄭善果上曰善果官品不卑豈可使與諸囚為伍自今三品以上犯罪聽于朝堂俟進止關內旱饑赦天下上嘗謂侍臣曰古語有之赦者小人之幸君子之不幸一嵗再赦善人喑啞夫養稂莠者害嘉榖赦有罪者賊良民故朕即位以來不欲數赦恐小人恃之輕犯憲章故也至是以連年水旱赦天下且曰使年豐穀稔天下乂安移災朕身是所願也㑹所在有雨民大悅夏四月突厥突利可汗請入朝初突厥頡利可汗以薛延陀回紇等叛遣突利討之敗還拘而撻之突利由是怨表請入朝上謂侍臣曰嚮者突厥方彊憑陵中夏由是驕恣以失其民今困窮如是朕聞之且喜且懼何則突厥衰則邊境安故喜然朕或失道亦將如此卿曹不惜苦諫以輔不逮遣右衛大將軍柴紹等討梁師都其下殺之以降以其地為夏州師都自起兵至滅凡十二年夏州注見前六月祖孝孫幽州范陽人奏唐雅樂初上皇命孝孫定雅樂孝孫以為梁陳之音多吳楚周齊之音多邊徼于是考古聲作唐雅樂凡八十四調每律皆具七音十二律共成八十四調三十一曲平調清調房中樂遺音也皆用前代歌辭十二和曰豫和順和永和肅和雍和壽和舒和太和昭和休和正和承和皆樂曲之名至是奏之上曰禮樂者聖人緣物以設教治之隆替豈由于此杜淹曰齊之將亡作伴侣曲陳之將亡作玉樹後庭花其聲哀思聞者悲泣豈可謂治不在樂乎上曰悲喜在心非由樂也將亡之政民必愁苦故聞樂而悲矣今二曲俱存為公奏之公豈悲乎魏徵曰樂在人和不在聲音也畿內蝗上入苑中見蝗掇數枚祝之曰民以穀為命而汝食之寧食吾之肺腸欲吞之左右諫曰惡物或成疾上曰朕為民受災何疾之避遂吞之是嵗蝗不為災秋九月詔非大瑞不得表聞上曰比見羣臣屢上祥瑞夫家給人足而無瑞不害為堯舜百姓愁怨而多瑞不免為桀紂後魏之世吏焚連理木煮白雉而食之豈足為至治乎乃詔自今大瑞聽表聞餘申所司而已嘗有白鵲巢于寢殿槐上合歡如腰鼓左右稱賀上曰我嘗笑隋煬帝好祥瑞瑞在得賢此何足賀命毁其巢出宫女三千餘人天少雨中書舍人李百藥言往年雖出宫人無用者尚多隂氣鬱積亦足致旱上命簡出之前後三千餘人冬十月殺瀛州刺史盧祖尚字季良光州樂安人上以盧祖尚亷平公直欲遣鎮撫交趾祖尚既謝而復悔之以疾辭上遣杜如晦等諭旨祖尚固辭上大怒曰我使人不行何以為政命斬于朝堂尋悔之他日與侍臣論齊文宣帝之人魏徴對曰齊文宣狂暴然人與之爭事理屈則從之有青州長史魏愷使梁還除光州注見前長史不肯行文宣怒而責之愷曰臣先任大州使還有勞無過更得小州所以不行文宣赦之此所以長也上曰然曩者盧祖尚雖失人臣之義朕殺之亦為太暴由此言之不如文宣矣命復其官廕徵容貌不逾中人而有膽略善回人主意每犯顔苦諫或逢上怒甚卒亦為之霽威上嘗得佳鷂自臂之望見徵來匿懷中徴奏事故久鷂竟死懷裝中嘗謁告上冡還言于上曰人言陛下欲幸南山嚴已畢而意不行何也上笑曰初實有此心畏卿嗔故中輟耳十一月以王圭為侍中故事軍國大事則中書舍人各執所見雜署其名謂之五花判事中書侍郎中書令省審之給事中黃門侍郎駁正之至是上謂圭曰國家本置中書門下以相檢察正以人心所見互有不同茍論難往來務求至當捨己從人亦復何傷比來或護己短遂成怨隙或避私怨知非不正順一人之顔情為兆民之深慮此乃亡國之政煬帝之世是也當時羣臣如此必皆自為有智禍不及身及天下之亂家國兩亡其幸免者亦為時論所貶終古不磨卿曹各當徇公忘死勿雷同也後又謂侍臣曰中書門下機要之司詔敇有不便者皆應論執比來惟覩順從不聞違異若但行文書則誰不可為何必擇才也房元齡等皆頓首謝上嘗謂圭曰開皇中旱隋文帝不許賑給而令百姓就食山東比至末年天下儲積可供五十年煬帝恃之卒亡天下但使倉庾之積足以備凶年其餘何用哉上又嘗問圭曰近世治不及古何也對曰漢世尚經術宰相多用儒士故風俗淳厚近世重文輕儒參以法律此治化之所以益衰也上然之上閒居與圭語有美人侍側指示圭曰此廬江王瑗之姬也瑗殺其夫而納之圭避席曰陛下以廬江納之為是邪非邪上曰殺人而取其妻卿何問是非對曰昔齊桓公知郭公之所以亡由善善而不能用然棄其所言之人管仲以為無異于郭公今此美人尚在左右臣以為聖心是之也上悅即出之上使祖孝孫教宫人樂不稱㫖者責之圭與溫彥博諫曰孝孫雅士今乃使之教宫人又從而譴之臣竊以為不可上怒曰卿等當竭忠直以事我乃為孝孫遊說邪彥博拜謝圭不拜曰陛下責臣以忠直今臣所言豈私曲邪上默然而罷明日謂房元齡曰自古帝王納諫誠難朕昨責二公至今悔之卿等勿為此不盡言也廬江王瑗唐宗室前反幽州為王君廓所殺詔舉堪縣令者上曰為朕養民者惟在都督刺史朕嘗疏其名于屏風坐卧觀之得其在官善惡之跡皆注于名下以備黜陟縣令尤為親民不可不擇乃命五品以上各舉堪為縣令者以名聞詔自今奴告主者斬之上曰比有奴告主反者夫謀反不能獨為何患不發何必使奴告之邪自今奴告之勿受仍斬之遣使立薛延陀夷男為真珠可汗突厥北邊多叛頡利歸薛延陀共推其俟斤夷男為可汗夷男不敢當上方圖頡利乃遣使閒道册拜夷男為真珠毗伽可汗賜以鼓纛夷男建牙于大漠之鬱督軍山下在漠北今哈爾哈地考是山唐厯以為即都尉犍山後入回紇又謂之烏德鞬山回紇拔野古阿跌同羅僕骨白霫諸部皆屬焉己丑三年春正月耕藉東郊裴寂卒司空裴寂坐與妖人交通免官上數之曰計公勳庸安得至此武德之際貨賂公行紀綱紊亂皆公之由也尋復有罪流靜州唐置今廣西平樂府昭平縣是將詔還㑹卒二月以房元齡杜如晦為僕射魏徵守祕書監參預朝政上謂元齡如晦曰公為僕射當廣求賢人隨才授任比聞聼訟日不暇給安能助朕求賢乎因敕尚書細務屬左右丞惟大事當奏者乃關僕射上嘗謂元齡等曰為政莫若至公昔諸葛亮竄廖立李嚴于南夷亮卒而二人哭泣有死者非至公能如是乎又高熲相隋公平識治體隋之興亡繫熲存沒朕慕前世之明君卿等不可不法前世之賢相也元齡明逹吏事輔以文學夙夜盡心惟恐一物失所用法寬平聞人有善若已有之不以求備取人不已以長格物與如晦引拔士類常如不及上每與元齡謀事必曰非如晦不能決及如晦至卒用元齡之䇿蓋元齡善謀如晦能斷也二人同心徇國故唐世稱賢相推房杜焉無或告魏徴私其親戚上使御史大夫溫彥博按之狀言于帝曰徵不存形跡以避嫌疑亦有可貴上因讓徴曰自今宜存形跡徴曰君臣同體宜相與盡誠若但存形跡則國之興喪未可知也臣不敢奉詔上曰吾已悔之徴再拜曰臣幸得奉事願使臣為良臣勿使臣為忠臣上曰忠良有異乎對曰稷契臯陶君臣協心俱享尊榮所謂良臣龍逢比干靣折廷爭身誅國亡所謂忠臣上悅則上問魏徵曰人主何為而明何為而暗對曰兼聽明偏聽則暗昔堯清問下民舜明目逹聰故共鯀歡苗不能蔽也秦二世偏信趙高以成望夷之禍梁武帝偏信朱异以取臺城之辱隋煬帝偏信虞世基以致彭城閣之變是故人君兼聽廣納則貴臣不得壅蔽而下情得上通也上曰善上謂魏徵曰齊後主周天元皆重斂百姓厚自奉養力竭而亡譬如饞人自噉其肉肉盡而斃何其愚也然二主孰為最劣對曰齊後主懦弱政出多門周天元驕暴威福在己雖同為亡國齊主尤劣也上謂侍臣曰人言天子至尊無所畏憚朕則不然上畏皇天之鑒臨下憚羣臣之瞻仰兢兢業業猶恐不合天意未副人望魏徴曰此誠至治之要願陛下謹終如始則善矣夏六月以馬周字賔王博州荏平人為監察御史周客遊長安舍于中郎將常何之家㑹以旱求言何武人不學周代之陳便宜二十餘條上怪問之何對曰此臣家客馬周為臣具草耳上即召見與語甚悅除監察御史以何為知人賜絹三百匹秋八月己巳朔日食冬十一月以荀悅漢紀賜都督李大亮上遣使至梁州都督李大亮有佳鷹使者諷使獻之大亮密奏曰陛下久絶畋遊而使者求鷹若陛下之意深乖昔旨如其自擅乃是使非其人上悅手詔褒美賜以荀悅漢紀以李靖為定襄道行軍總管統諸軍討突厥初薛延陀真珠可汗遣其弟入貢突厥頡利可汗大懼始遣使稱臣請尚公主代州都督張公謹上言突厥可取之狀曰頡利縱欲逞暴誅忠良昵姦佞一也諸部皆叛二也突利諸設皆得罪無所自容三也塞北霜旱餱糧乏絶四也疏其族類親委諸部大軍一臨必生內變五也華人入北所在嘯聚大軍出塞自然響應六也上以頡利既請和親復援梁師都命李靖為行軍司馬將軍總管討之以張公謹為副復以李世績柴紹薛萬徹為諸道總管衆合十餘萬皆受靖節度分道出擊突厥十二月突厥突利可汗入朝上曰往者太上皇以百姓之故稱臣于突厥朕嘗痛心馬今單于稽顙可雪前恥上䇿朕今治安中國而四夷自服豈非上策乎閏月蠻酋謝元深東謝蠻也又有南謝蠻皆南蠻别種在黔州之西等來朝時逺方諸國來朝貢者甚衆服裝詭異中書侍郎顔師古請作王㑹圖汲冡周書有王㑹篇以示後從之是嵗户部表中國人自塞外歸及四夷前後附降者男女一百二十餘萬口庚寅四年春二月李靖襲破突厥于陰山頡利可汗遁走李靖帥驍騎三千自馬邑進夜襲定襄破之頡利不意靖倉卒至大驚徙牙于磧石靖復遣諜離其心腹頡利所親康蘇密以隋蕭后及楊政道來降李世績出雲中此古雲中城也注見前唐于恆安鎮置雲州亦曰雲中郡今大同府是戰于白道在今歸化城北水經注芒干水西南徑白道南谷口即此亦大破之頡利既敗竄于鐡山在陰山之北衆尚十餘萬遣執失思力入見謝罪求朝上遣鴻臚卿唐儉等慰撫之又詔李靖將兵迎之頡利外為卑辭內實猶豫謀走磧北靖引兵與世績㑹白道謀襲頡利靖等謀曰頡利雖敗其衆猶盛走度磧北則難圖矣今詔使至彼敵必自寬若選萬騎襲之不戰可擒矣張書公曰詔書許降使者在彼奈何擊之靖曰此韓信所以破齊也唐儉輩何足惜遂勒兵夜發世績斷之頡利見儉來大喜靖前鋒去牙帳七里頡利始知之乘千里馬先走其衆遂潰唐儉脫身得歸靖殺義成公主斬首萬餘級係男女十餘萬世績軍磧口酋長皆帥衆降世績虜五萬餘口而還三月四夷君長詣闕請帝為天可汗許之四夷君長詣闕請上為天可汗上曰我為大唐天子又下行可汗事乎羣臣及四夷皆稱萬嵗是後以璽書賜西北君長皆稱天可汗蔡公杜如晦卒諡曰成如晦疾篤上遣太子問疾又自臨視之及卒上語及必流涕謂房元齡曰公與如晦同佐朕今獨見公不見如晦矣夏四月行軍副總管張寶相擒突厥利可汗以獻頡利敗走往依沙鉢羅設突厥官名蘇尼失啓民之弟部落任城王道宗引兵逼之使蘇尼失執頡利軍行副總管張寶相取之以獻蘇尼失舉衆來降漠南遂空上御樓受俘館之太僕上皇聞之歎曰漢高祖困白登不能報今吾子能滅突厥吾付託得人復何憂哉突厥既亡其部落或北附薛延陀或西奔西域其降唐者尚十萬餘口詔羣臣議區處之宜溫彥博請漢建武故事置于塞下順其土俗以實空虛之地使為中國扞蔽魏徵以為突厥弱則請服彊則叛亂若留之中國數年之後蕃滋倍多必為腹心之疾西晉之禍前世之明鑑也宜縱之使還故土便上卒用彥博策處突厥降衆東自幽州西自靈州分突利故地為四州又分頡利故地為六州左置定襄右置雲中二都督府以統其衆以突利為順州都督頡利為右衛大將軍其餘拜官有差因而入居長安者近萬家定襄都督僑治寧朔雲中都督僑治朔方順州都督僑治營州南五栁戍詔訟不決者聽于東宫上啓詔訟者經尚書省判不服聽于東宫上啓委太子裁決然後聞奏六月修洛陽宫給事中張元素上書曰陛下初平洛陽凡隋氏宫室之宏侈者皆令毁之曾未十年復加營繕何前日惡之而今日效之也且以今日財力何如隋氏陛下役瘡痍之人襲亡隋之弊恐又甚于煬帝矣上即為之罷役魏徴聞之歎曰張公論事有回天之力可謂仁人之言矣已而復命將作大匠竇璡修之璡鑿池築山雕飾華靡大怒遂令毁之免璡官秋七月甲子朔日食敕百司詔敕未便者皆執奏上問房元齡蕭瑀曰隋文帝何如主也對曰文帝勤于為治臨朝或至日昃五品以上引坐論事衛士傳餐而食雖性非仁厚亦勵精之主也上曰公得其一未知其二文帝不明而喜察不明則照有不通喜察則多疑于物事皆自決不任羣臣一日萬幾豈能一一中理羣臣既知其意唯取決受成雖有愆違莫敢諫諍此所以二世而亡也朕則不然擇天下賢才置之百官天下之事關由宰相審熟便安然後奏聞有功則賞有罪則刑誰敢不竭心力以修職業乎因敕百司自今詔敕行下有未便者皆應執奏母阿從以李大亮為西北安撫大使西突厥種落散在伊吾注見前詔以李大亮為安撫大使貯糧磧口以賑之大亮言欲懷逺者必先安近中國如本根四夷為枝葉疲中國以奉四夷猶拔本根以益枝葉也今招致西突厥但有勞費未見有益不如罷之其或自立君長求內屬者羈縻受之使居塞外為中國藩蔽上從之未幾伊吾來降以其地置西伊州唐伊州故城在今哈密境詔定常服差等三品以上服紫四品五品服緋六品七品服緑八品服青婦人從其夫色九月以張儉字師約京兆新豐人檢校代州都督思結部落饑貧張儉招集之其不來者仍居磧北親屬私相往還儉亦不禁及儉代去思結將叛詔儉往察之儉單騎說諭徙之代州即以儉撿校代州都督儉因勸使營田嵗大稔儉又恐其蓄積多有異志奏請和糴以充邊儲部落喜營田轉力而邊備實焉冬十一月除鞭背刑上讀明堂針灸書云人五臟之系咸附于背故有是命高昌王麴文泰入朝文泰入朝西域諸國皆因文泰請朝上令文泰使人迎之魏徴諫曰昔光武不聽西域送侍子置都護以為不以蠻夷勞中國前者文泰之來緣道供億甚苦若諸國皆來將不勝其弊姑聽其商賈往來與邊民交市則可矣倘以賔客遇之非中國之利也時所使人已行上遽止之大有年先是元年關中饑米斗直絹一匹二年天下蝗三年大水上勤而撫之民雖東西就食未嘗嗟怨是嵗天下大稔流散者咸歸鄉里米斗不過三四錢終嵗斷死刑才三十九人東至海南及五嶺皆外戶不閉行旅不齎糧取給于道路焉上之初即位也嘗與羣臣語及教化上曰今承大亂之後恐斯民未易化也魏徵對曰不然久安之民驕佚驕佚則難教經亂之民愁苦愁苦則易化譬飢者易為食渴者易為飲也上深然之封德彞曰三代以還人漸澆訛故秦任法律漢雜霸道蓋欲化而不能豈能之而不欲耶魏徵書生不識時務信其虛論必敗國家徵曰五帝三王不易民而化湯武皆承大亂之後身致太平若謂古人淳朴漸至澆訛則至于今日當悉化為鬼魅矣人主安得而治之上卒從徵言至是上謂長孫無忌曰貞觀之初言者皆云人主當獨運威權不可委之臣下又云宜震耀威武征討四夷惟魏徵勸朕偃武修文中國既安四夷自服朕用其言今頡利成擒其酋長并帶刀宿衛皆襲衣冠徵之力也但恨不使封德彝見之耳徴爯拜謝曰此皆陛下威德臣何力之有焉帝曰朕能任公公能稱朕所任則其功豈獨在朕乎上又謂侍臣曰朕有二喜一懼比年豐稔斗粟三錢一喜也北方久服邊鄙無虞二喜也治安則驕侈易生驕侈則危亡立至此一懼也房元齡奏閲府庫甲兵逺勝隋世上曰甲兵武備誠不可闕然煬帝甲兵豈不足邪卒亡天下若公等盡力使百姓乂安此乃朕之甲兵也辛卯五年春正月詔僧道致拜父母皇太子冠有司言皇太子冠用二月吉請造兵備儀仗上曰東作方興宜改用十月少傅蕭瑀奏據陰陽書不若二月上曰吉凶在人若動依陰陽不顧禮義吉可得乎循正而行自與吉㑹農時急務不可失也詔諸州剗削京觀加土為墳以金帛賜突厥贖男女八萬口秋八月殺大理丞張藴古河內人李好德有心疾妄為妖言大理丞張藴古按之奏好德實被疾不當坐治書侍御史權萬紀京兆萬年人劾奏藴古相州人而好德兄厚德為其刺史故藴古阿意縱之上怒斬之既而悔之因詔自今有死罪雖令即決仍三覆奏乃行刑萬紀與李御史李仁發俱以告訐有寵大臣數被譴怒魏徵諫曰此等小人不識大體以訐為直以讒為忠陛下非不知其無堪但取其無所避忌欲以警䇿羣臣耳而彼挾恩依勢逞其姦謀凡所彈射皆非有罪陛下縱未能舉善以厲俗奈何昵姦以自損乎上默然既而萬紀等皆得罪九月帝獵于後苑上逐兔于後苑將軍執失思力本突厥酋長諫之曰天命陛下為華夷父母奈何自輕上又將逐鹿執失思力脫巾解𢃄跪而固諫上為之止冬十月詔議封建初上問公卿以享國久長之策蕭瑀對曰三代封建而長久秦孤立而速亡上以為然至是令羣臣議之魏徵以為京畿稅少多資畿外若盡以封建經費頓闕又燕秦趙代俱帶外夷若有警急追兵內地難以奔赴李百藥以為勳戚子孫皆有民社易世之後將驕淫自恣攻戰相殘害民尤深不若守令之迭居也顔師古以為不若分王宗子勿令過大間以州縣雜錯而居互相維持足扶京室為置官僚皆省司選用法令之外不得擅作威刑朝貢禮儀具為條式一定此度萬代無虞于是詔宗室勳賢宜令作鎮籓部貽厥子孫所司明為條例定等級以聞十一月林邑新羅辨韓苗裔居漢樂浪地今為朝鮮慶尚道入貢先是林邑獻大珠石珠也日中以艾藉珠輒火出有司以其表辭不順請討之上不許至是林邑復獻五色鸚鵡新羅獻美女魏徵以為不宜受上曰林邑鸚鵡猶能自言其苦寒思歸其國况女逺别親戚乎各付使者歸之十二月開党項注見前之地為十六州党項內屬者前後三十萬口制自今決死刑者皆覆奏決日徹樂減膳上謂侍臣曰朕以死刑至重故令三覆蓋欲思之詳熟也而有司須臾之間三覆已訖又斷獄者惟據律文雖情在可矜而不敢違法其間豈能盡無寃乎古者刑人君為之徹樂減膳朕庭無常設之樂然常為之不啖酒肉但未有著令耳于是制決死囚者二十中五覆奏下諸州者三覆奏行刑之日尚食勿進酒肉內教坊武德中置以𨽻散樂及太常不舉樂皆令門下覆視有據法當死而情可矜者録狀以聞由是全活甚衆上嘗與侍臣論獄魏徵曰煬帝時嘗有盜發捕得拷訊服罪者二千餘人悉令斬之大理丞張元濟尋其狀惟五人嘗為盜餘皆平民竟不敢執奏盡殺之上曰此豈惟煬帝無道其臣亦不盡忠君臣如此何得不亡公等宜戒之上又嘗謂執政曰朕常恐因喜怒妄行賞罰故欲公等極諫公等亦宜受人諫不可以已之所欲惡人違之茍自不能受諫安能諫人康國西域國其王姓溫本月支氏居祁連北為突厥所破稍南依蔥嶺即有其地支數分為九國康其一也求內附康國求內附上曰前代帝王好招來絶域以求逺服之名無益于用而糜弊百姓今康國內附儻有急難于義不得不救師行萬里豈不疲勞勞百姓以取虛名朕不為也遂不受上謂侍臣曰治國如治病病雖愈猶宜將護儻遽自放縱病復作則不可救矣今中國幸安四夷俱服誠自古所稀然朕日甚一日惟懼不終故欲數聞卿輩諫爭也魏徵曰內外治安臣不以為喜惟喜陛下居安思危耳壬辰六年春正月乙卯朔日食羣臣請封禪不許初羣臣數請封禪上曰卿輩皆以封禪為帝王盛事朕意不然若天下乂安家給人足雖不封禪庸何傷乎昔秦始皇封禪而漢文帝不封禪後世豈以文帝不若始皇邪且事天掃地而祭何必登泰山之巔封數尺之土然後可以展其誠敬乎已而羣臣固請不已上亦欲從之魏徵獨以為不可上曰公不欲朕封禪者以功未髙邪德未厚邪中國未安四夷未服邪年穀未豐符瑞未至邪對曰今雖有此六者然戶口未復倉廩尚虛車駕東巡供頓勞費又伊洛以東灌莽極目而逺夷君長皆當扈從此乃引戎狄入腹中而示之以虛弱也况賞賚不資未厭逺人之望給復連年不償百姓之勞崇虛名而受實害陛下將焉用之㑹河南北數州大水事遂寢明年羣臣復以為請上喻以舊有氣疾恐登髙增劇乃止范氏祖禹曰封禪實自秦始古無有也太宗方明而佞者猶倡其議獨魏徵以為時未可而亦不以為非也後議其禮徵亦與焉髙宗明皇遂踵而行之終唐之世惟栁宗元以封禪為非世俗之惑可勝歎焉三月如九成宫即隋仁壽宫帝修之因更名上幸九成宫避暑監察御史馬周上疏曰大安宫太上皇所居在城西制度卑小而車駕獨為避暑之行是太上皇留暑中而陛下居凉處也溫凊之禮臣竊有所未安且太上皇春秋已髙陛下宜朝夕視膳今九成宫去京師三百餘里太上皇或時思念陛下陛下何以赴之然今行計已成不可復止願速示返期以解衆惑上深納之以長樂公主帝第五女長孫皇后所生嫁長孫冲長樂公主將出降敕有司資送倍于永嘉長公主髙祖女唐制姑為大長公主姊妹為長公主女為公主魏徴諫曰昔漢明帝欲封皇子曰我子豈得與先帝子比皆令半楚淮陽今奈何資送公主反倍于長主乎上入告皇后后歎曰妾數聞陛下稱重魏徵不知其故今觀其引禮義以抑人主之私情乃知真社稷之臣也因請遣中使厚賜徵且語之曰聞公正直乃今見之願公常秉此心勿轉移也上嘗罷朝怒曰會須殺此田舍翁后問謂誰上曰魏徵每廷辱我后退具朝服曰妾聞主明臣直今魏徵直由陛下之明故也妾敢不賀上乃悅秋閏七月宴近臣于丹霄殿上宴近臣于丹霄殿長孫無忌曰王圭魏徵昔日仇讎不謂今日得同此宴上曰徵圭盡心所事故我用之然徵每諫我不從我與之言輒不應何也魏徵對曰臣以事為不可故諫若陛下不從而臣應之則事遂施行故不敢應上曰應而復諫何傷對曰昔舜戒羣臣爾無面從退有後言臣心知其非而口應陛下乃面從也豈稷契事舜之意邪上大笑曰人言魏徵舉止疏慢我視之更覺嫵媚正為此耳徵起拜謝曰陛下開臣使言故臣得盡其愚若陛下拒而不受臣何敢數犯顔色乎上謂王圭曰元齡以下卿宜悉加品藻且自謂與數子何如曰孜孜奉國知無不為臣不如房元齡才兼文武出將入相臣不如李靖敷奏詳明出納唯允臣不如彥博處繁治劇衆務畢舉臣不如戴胄耻君不及堯舜以諫諍為己任臣不如魏徵至于激濁揚清嫉惡好善臣于數子亦有徵長上深以為然衆亦服其確論勿上指殿屋謂侍臣曰治天下如建此屋營構既成數改移茍易一欀正一瓦踐履動搖必有所損若慕竒功變法度不恆其德勞擾實多上曰人主惟一心而攻之者甚衆或以勇力或以辨口或以諂諛或以奸詐或以嗜欲輻輳攻之各求自售以取寵祿人主稍懈而受其一則危亡隨之此其所以難也事丄嘗臨朝謂侍臣曰朕為人主常兼將相之事給中張行成退而上書以為禹不矜伐而天下莫與之爭陛下撥亂反正羣臣誠不足望清光然不必臨朝言之以萬乘之尊乃與羣臣校功爭能臣竊為陛下不取上甚善之九月如慶善宫元和志在武功縣南臨渭水慶善宫上生時故宅也因宴賦詩被之管絃命曰功成慶善樂使童子八佾為九功之舞大宴㑹與破陳舞偕奏于庭同州刺史尉遲敬德與坐者爭長毆任城王道宗目幾眇上不懌而罷謂敬德曰朕欲與卿等共保富貴然卿居官數犯法乃知韓彭葅醢非髙祖之罪也敬德由是始懼而自戢癸巳七年春正月宴元武門奏七德九功舞更名破陳樂曰七德舞太常卿蕭瑀以為形容未盡請并寫武周仁杲建德世充擒獲之狀上曰彼皆一時英雄朝臣或嘗北面事之覩其故主屈辱之狀能不傷乎瑀謝不及魏徵欲上偃武修文每侍宴見七德舞輒俯首不視見九功舞則諦觀之王圭罷以魏徵為侍中上與侍臣論安危之本溫彥博曰願陛下常如貞觀初則善矣上曰朕比來怠于為政乎魏徵曰貞觀之初陛下節儉求諫不倦比來營繕微多諫者頗有忤㫖此所以異耳帝欣然納之上問魏徵曰羣臣上書可采及召對多失次何也對曰臣觀百司奏事常數日思之及至上前三分不能道一况諫者拂意觸忌非陛下借之辭色豈敢盡其情哉上由是接羣臣辭色愈溫嘗曰煬帝多猜忌對羣臣多不語朕則不然君臣相親如一體耳上謂侍臣曰朕比來決事或不能皆如律令公輩以為事小不復執奏夫事無不由小以致大此乃危亡之端也昔龍逄忠諫而死朕每痛之焬帝驕暴而亡公輩所親見也公輩常宜為朕思焬帝之亡朕常為公輩念龍逄之死何患君臣不相保乎子上謂魏徵曰為官擇人不可造次用一君子則君皆至用一小人則小人競進對曰然天下未定則専取其才不考其行喪亂既平則非才行兼備不可用也造渾天儀直太史李淳風岐州雍人以靈臺候儀後魏斛蘭所作制度疏略但有赤道更請造渾天黃道儀至是奏之淳風上言自漢洛下間作渾儀其後賈逵張衡皆有之而推驗七曜並循赤道蓋渾儀無黃道久矣上因詔為之儀表裏三重一曰六合儀二曰三辰儀三曰四游儀皆用銅為之秋九月山東四十餘州水遣使賑之赦死囚三百九十人先是上親録繫囚見應死者憫之縱使歸家期以來秋來就死仍敕天下死囚皆縱遣使至期來詣京師至是皆如期自詣朝堂上皆赦之冬十一月以長孫無忌為司空無忌固辭曰臣忝預外戚恐天下謂陛下為私上曰吾為官擇人惟才是與茍不才雖親不用如有才雖讐不棄今日之舉非私親也十二月帝奉太上皇置酒未央宫上從上皇宴故漢未央宫上皇命頡利可汗起舞馮智戴盎之子詠詩既而笑曰胡越一家古未有也帝捧觴上壽曰此皆陛下教誨非臣智力所及昔漢髙祖亦從太上皇宴此宫妄自矜大臣不取也上皇大悅賜太子庶子于志寧孔頴達等金帛帝謂志寧曰朕年十八猶在民間民之疾苦情僞無不知之及區處世務猶有差失况太子生長深宫百姓艱難耳目所未涉能無驕逸乎卿等不可不極諫太子好嬉戲頗虧禮法志寧與頴達數直諫上聞而嘉之各賜金一斤帛五百匹削工部尚書段綸階綸奏徵巧匠上令試之綸使造傀儡木偶戲也列子周穆王時偃師為木人能歌舞即此上曰求巧工以供國事今先造戲具豈百工相戒毋作淫巧之意邪乃削綸階甲午八年春正月以李靖等為黜陟大使分行天下上欲分遣大臣循行黜陟未得其人李靖薦魏徵上曰徵針規朕失不可一日離左右乃命靖等十三人分行天下察長吏賢不肖問民間疾苦禮髙年賑窮乏褒善良起淹滯俾使者所至如朕親覩夏五月辛未朔日食秋七月山東河南大水冬十月以李靖為特進先是靖拜右僕射靖性沉厚每與時宰議政恂恂如不能言既而以疾辭位上曰朕嘉公意欲以公為一代楷模故不相違乃拜特進俟疾小瘳間三二日一至中書門下平章政事歐陽修曰平章事之名始于此吐蕃本西羌屬姓勃窣野居析支水西在吐谷渾西南今西藏地是遣使入貢劉友益曰此吐蕃通中國之始吐蕃自隋以來未嘗通中國其王稱贊普俗不言姓王族皆曰論官族皆曰尚近世浸彊勝兵數十萬贊普棄宗弄讚有勇略四鄰畏之遣使入貢仍請昏詔遣使者往慰諭之吐谷渾寇凉州以李靖為大總管帥諸軍討之吐谷渾可汗伏允老耄其臣天柱王用事數入塞侵盜詔大舉討之上欲以李靖為將為其老重勞之靖聞之請行上大悅以靖為西海道行軍大總管節度諸軍討之聘鄭氏為充華唐婦官九嬪之一既而罷之帝聘鄭仁基女為充華冊使將發魏徵聞其嘗許嫁士人陸爽遽上表諌帝大驚自責命停冊使房元齡等奏許嫁無顯狀爽亦表言初無此議帝謂徵曰羣臣或容希合爽亦自陳何也對曰彼以陛下為外雖捨之或隂加罪譴故爾帝笑曰朕之言不能使人必信如此邪以皇甫德參為監察御史中牟丞皇甫德參上言修洛陽宫勞人收地租厚斂俗好髙髻蓋宫中所化上怒謂房元齡等曰德參欲國家不役一人不收斗租宫人皆無髮乃可其意邪欲罪之魏徵曰言不激切不能動人主之心陛下擇焉可也上曰朕罪此人則誰復敢言者乃賜絹二十匹他日徵奏言陛下近日不好直言雖勉强含容非曩時之豁如上乃更加優賜拜監察御史中書舍人髙季輔上言外官卑品猶未得祿饑寒切身難保清白宜量加優給然後可責以不貪比見帝子拜諸叔叔皆答拜紊亂昭穆宜訓之以禮上善之髙季輔名馮以字行德州蓚人乙未九年夏五月太上皇崩先是上皇徙居大安宫在三年及是崩于垂拱殿李靖伐吐谷渾破之任城王道宗擊破吐谷渾其可汗伏允悉燒野草輕兵走入磧諸將以為馬無草未可深入侯君集曰虜一敗之後鼠逃鳥散取之易于拾芥此而不乘後必悔之李靖從之中分其軍為兩道靖與薛萬均李大亮由北道君集與道宗由南道靖等敗吐谷渾于牛心堆在今西寧邊外湟河西水經注牛心川水東北流徑牛心堆又東北入湟水又敗諸赤水源在今青海南隋于此置赤水縣君集道宗引兵行無人之境二千餘里盛夏降霜人齕氷馬噉雪追及伏允于烏海在青海漢哭山西與戰大破之靖督諸軍經積石河源唐書吐谷渾傳君集道宗次星宿川望積石山覽觀河源星宿川即元史所云星宿海積石山即唐人所云大積石注俱詳見前窮其西境襲破伏允牙帳斬首數千級獲雜畜二十餘萬伏允子順斬天柱王來降伏允脫身走衆散稍盡為左右所殺國人立順為可汗詔以為西平郡王順未能服其衆順久質中華國人不附命李大亮將精兵數千為其聲援既而順竟為國人所殺上復使侯君集將兵立其子諾曷鉢為可汗總管髙甑生後軍期李靖按之甑生誣靖謀反按驗無狀甑生坐減死徙邉或言甑生秦府功臣宜寬其罪上曰國家功臣多矣若甑生獲免則人人犯法安可復禁乎靖自是闔門杜絶賓客雖親戚不見秋七月詔禮官議廟制諫議大夫朱子奢請立三昭三穆而虛太祖之位于是增修太廟附𢎞農府君名重耳涼武昭王之孫及髙祖并舊神主四為六室房元齡等議以凉武昭王為始祖于志寧以為武昭王非王業所因不可為始祖上從之冬十月葬獻陵在今西安府三原縣東南初詔山陵依漢長陵漢髙祖陵故事祕書監虞世南上疏以為陛下聖德度越唐虞葬親乃以秦漢為法臣竊為陛下不取願依白虎通為三仞之墳節損制度刻石陵旁藏書宗廟用為子孫之法疏奏不報世南復奏上乃詔有司議之房元齡等以為漢長陵九丈原陵光武陵髙六丈今九丈則太崇三仞則太卑請依原陵之制從之又詔太原立髙祖廟祕書監顔師古以為寢廟應在京師漢世郡國立廟非禮乃止史臣曰髙祖之興因時特起其有天下年幾三百可謂盛哉豈非人厭隋亂而䝉德澤繼以太宗之治紀綱法度後世有以憑藉扶持而能永其天命歟十一月以蕭瑀為特進參預政事上曰武德季年髙祖有廢立之心而未定我不為兄弟所容實有功髙不賞之懼斯人也不可以利誘不可以死脅真社稷臣也因賜瑀詩曰疾風知徑草板蕩識誠臣丙申十年春二月以荆王元景髙祖之子等為諸州都督諸王之藩上與之别曰兄弟之情豈不欲常共處邪但以天下之重不得不爾諸子尚可復有兄弟不可復得因流涕嗚咽不能止魏王泰為相州都督不之官上以泰好文學特命于其府别置文學館聽自引召學士泰有寵于上或言諸大臣多輕之上怒召諸大臣讓之曰隋文帝時大臣皆為諸王所頓躓我若縱之豈不能折辱公輩邪房元齡等皆謝魏徵正色曰若綱紀大壞固所不論聖明在上魏王必無頓辱羣臣之理隋文帝驕其諸子卒皆夷滅又足法乎上悅曰朕以私愛忘公義及聞公言方知理屈人主發言何得容易乎夏六月皇后長孫氏崩后性仁孝儉素好讀書常與上從容啇略古事因而獻替禆益𢎞多撫視庶孽逾于所生妃嬪以下無不愛戴訓諸子常以謙儉為先及疾篤與上訣時房元齡以譴歸第后曰元齡事陛下久小心慎密茍無大故不可棄也妾之本宗因緣葭莩以致祿位既非德舉易致顛危欲保全之慎勿處之權要更願陛下親君子逺小人納忠諫屏讒慝省作役止遊畋則妾死不恨矣后嘗采自古婦人得失事為女則三十卷及崩宫司奏之上覽之悲慟以示近臣曰皇后此書足以垂範百世朕非不知天命而為無益之悲但入宫不復聞規諫之言失一良佐故不能忘懷耳乃召元齡使復其位秋禁上書告訐者上謂羣臣曰朕開直言之路以利國也而比來上封事者多訐人細事自今復有為是者朕當以讒人罪之冬十一月葬文德皇后帝念后不已于苑中作層觀以望昭陵嘗引魏徵同登使視之徵熟視之曰臣昏眊不能見上指示之徵曰臣以為陛下望獻陵若昭陵則臣固見之矣上泣為毁觀十二月朱俱波甘棠皆西域國名遣使入貢朱俱波亦曰朱俱槃即漢子合國在蔥嶺之北去瓜州三千八百里甘棠在大海南在西海之南崑崙人也上曰中國既安四夷自服然朕不能無懼昔秦始皇威振胡越二世而亡惟諸公匡其不逮耳黜治書侍御史權萬紀萬紀上言宣饒唐宣州今江南寧國府是饒州注見前銀大發采之嵗可得數百萬緡上曰朕貴為天子所乏者非財也但恨無嘉言可以利民耳與其得數百萬緡何如得一賢才卿未嘗進一賢才而専言銀利昔堯舜抵璧于山投珠于谷漢之桓靈乃聚錢為私藏卿欲以桓靈俟我邪是日黜萬紀使還家更命統軍别將為折衝果毅都尉統軍為折衝都尉别將為果毅都尉凡十道置府六百三十四而關內二百六十一皆𨽻諸衛及東宫六率注見前凡上府兵千二百人中府千人下府八百人三百人為團團有校尉五十人為隊隊有正十人為火火有長每人兵甲糧裝各有數輸之庫征行給之二十為兵六十而免能騎射者為越騎其餘為步兵每嵗季冬折衝都尉帥以教戰當給馬者官與直當宿衛者番猶班也上兵部以逺近給番逺疏近數皆一月而更御批厯代通鑑輯覽卷五十

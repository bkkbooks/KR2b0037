front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷四周平王辛未元年東遷成王營洛邑平王徙都之謂之王城是為東周始命秦為諸侯錫晉侯仇命
  hash: sha256:99690ca7b75f63870f63339ad870f513c54d1d9b3ee6eff5fd7fc1d55cfd173a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_003-1a, image: WYG0335/WYG0335-0087a.png}
body:
  text: 王避犬戎難東徙洛邑秦襄公以兵送王王封襄公為諸侯爵為伯賜之岐以西之地秦於是始國與諸侯通使聘享之禮又䇿命晉侯書序平王錫晉侯秬鬯珄瓚作文侯之命賜以河內今河南懷慶府附庸晉于是始大吕氏祖謙曰由此而上則為成康為文武由此而下則為春秋為戰國乃消長升降之交會秦祀上帝於西畤畤音市封土而祀也秦伯既封居西垂自以為主少昊之神乃作西畤祠白帝其牲用駵赤馬黑鬛駒黃牛羝羊詩傳牡羊各一司馬氏遷曰秦襄公始封為諸侯遂焉作西畤用祀上帝僭端見矣君子懼癸酉三年以鄭伯掘突為司徒鄭桓公為司徒死犬戎之難王于是復命其子掘突纘乃父之職國人愛之為作緇衣之詩詩序鄭風緇衣美武公也己卯九年秦東徙汧渭注俱見前之會今陜西鳳翔府隴州有秦城元和志秦文公徙此秦襄公卒子文公嗣文公東獵至汧渭之會曰昔周邑我先秦嬴于此考非子封秦地在今秦州此云邑我先秦嬴蓋非子息馬時食邑也後卒獲為諸侯乃卜居之于是秦初有史以紀事已而作鄜音孚畤用三牢祠白帝史記封禪書秦文公夢巨蛇自天下屬地其口止于鄜衍公問史敦敦曰此上帝之徵君其祠之于是作鄜畤索隱曰鄜地名後為縣屬馮翊衍山陵間癸未十有三年衛公和卒諡曰武公史記衛武公平戎有功王命為公卒于莊公揚立衛公年九十五猶針警于國曰自卿以下至於師長士茍在朝者無謂我耄而舍我必恪恭於朝夕以交戒我於是作懿戒以自警懿讀作抑即大雅抑之詩及其殁也謂之睿聖武公己丑十有九年戊申申國注見前王以母家申國迫近強楚數被侵伐遣兵逺戊戍者怨思作揚之水詩以刺詩序王風揚之水刺平王也不撫其民而逺屯戍于母家周人怨思焉朱子曰申侯與犬戎攻宗周弒幽王則申侯者平王不共戴天之讐也今平王知有母而不知有父知其立已為有德而不知其弒父為可怨至使復讐討賊之師反為報施酬恩之舉其忘情逆理已甚矣且不能行威令於天下無以保其母家乃勞民逺戍其衰懦微弱又可見矣詩亡而後春秋作其不以此也哉辛卯二十有一年秦伯獻戎捷秦伯以兵伐戎戎敗走於是秦伯收周餘民有之地至岐岐以東獻之王時宗周宗廟宫室盡為禾黍大夫行役過之閔宗周之顛覆倣徨不忍去作黍離之詩詩序王風黍離閔宗周也丙申二十有六年晉侯文侯子昭侯名伯封其叔父成師穆侯子文侯弟是為桓叔於曲沃漢書地理志河東郡聞喜故曲沃今聞喜縣屬山西絳州晉大夫師服曰國家之立也本大而末小是以能固故天子建國諸侯立家卿置側室衆子也得立此一官大夫有二宗次子為二宗以輔適子士有𨽻子弟自以其子弟為傼𨽻今晉甸侯也而建國本既弱矣其能久乎後曲沃強盛晉室微弱國內大亂昭侯七年晉潘父弒昭侯而納桓叔不克晉人立昭侯子平是為孝侯孝侯八年桓叔卒子鱓氏是為曲沃莊伯莊伯弒孝侯于翼國人攻之立孝侯子郤是為鄂侯鄂侯卒莊伯復伐晉王使虢公伐曲沃立鄂侯子光是為哀侯戊午四十有八年魯侯惠公弗涅孝公之子請郊廟之禮魯侯使宰讓請郊廟之禮於王王使史角往魯侯止留也之路史角後在魯于是有墨翟之學羅氏泌曰劉原父謂使魯郊者必周而非成王蓋平王之世也使成王已與魯則惠公不請矣孔子曰魯之郊禘非禮也周公其衰矣魯之郊豈所以尊公哉魯侯弗涅卒諡惠公適子軌少庶長子息姑攝國行君事是為隱公左傳惠公元妃孟子卒繼室以聲子生隱公宋武公生仲子有文在其手曰為魯夫人故仲子歸于魯生桓公而惠公薨是以隱公立而奉之仲宋武公名司空徴于弟徴八世孫己未四十有九年時天子微弱諸侯放恣賞罰不行後孔子修魯史作春秋立百王之大法托始於是年是年為魯隱公元年金氏履祥曰此年以後編年紀事自有春秋左氏經傳今特舉其事係王室與關于天下之故者而後書鄭伯克段于鄢今河南開封府鄢陵縣春秋鄭鄢邑縣西北有古鄢城初鄭武公娶申侯女薑氏是為武薑生太子寤生及叔段薑氏惡寤生愛段欲立之亟請於武公弗許武公卒寤生立是為莊公薑氏為段請居京京邑故城在今河南開封府滎陽縣東南謂之京城大叔祭仲鄭大夫與周祭伯别為一祭今河南開封府鄭州有祭城仲食邑也曰都城過百雉國之害也公曰薑氏欲之焉辟害詩序鄭風將仲子刺莊公也不勝其母以害其弟小不忍以致大亂也大叔完聚繕甲兵具卒乘詩序叔于田叔虔于京繕甲治兵多才而好勇不義而得衆將襲鄭夫人薑氏將啓之公聞其期以車二百乘伐京京叛大叔段段入於鄢公伐諸鄢大叔出奔共古共國今河南衛輝府輝縣治遂置薑氏於城潁即臨潁故城在今河南許州臨潁縣西北而誓之曰不及黃泉無相見也既而悔之潁考叔為潁谷在今河南河南府登封縣潁水所出封人聞之有獻於公公賜之食食舍肉公問之對曰小人有母請以遺之公曰爾有母遺繄我獨無語之故且告之悔對曰闕同掘地及泉隧而相見其誰曰不然公從之遂為母子如初今許州襄城縣有鄭莊公城相傳為鄭莊公見母處使宰咺歸魯侯仲子之賵撫鳯反公羊傳宰者何官也咺者何名也仲子者何桓之母也何以不稱夫人桓未君也賵者何喪事有賵車馬曰賵貨財曰賻衣被曰禭此王室下交諸侯之始金氏履祥曰左氏傳于隱公之篇多誤如仲子之賵誤以隱妻子氏之薨為仲子故此以仲子為未薨而王賵之為豫凶事也考文之四年成風薨五年王使榮叔歸含且賵以此例之歸賵當是惠公仲子俱殁之後其殁在春秋之前左氏蓋誤解矣祭伯鄭樵氏族略周公第七子封祭杜預左傳注陳留長垣縣有祭城今直𨽻大名府長垣縣有祭城村如魯非王命也此王臣私交之始辛酉五十有一年春二月己巳日有食之三月王崩孫林立是為桓王鄭祭足帥師入寇鄭伯為平王卿士武公莊公世為王室卿士平王二於虢此南虢也平王東遷虢仲之後徙于上陽是為南虢上陽城在今河南陜州考路史虢有四一曰西虢仲所封一曰東虢叔所封後為鄭滅一曰南虢仲之後所徙其留岐者為小虢後為秦滅不在四虢之數一曰北虢亦仲之後别為男爵班固曰北虢在大陽是也大陽漢縣故城在今解州平陸縣鄭伯怨平王於是周鄭交質及是平王崩王即位將畀虢公政四月鄭祭足帥師取溫今河南懷慶府溫縣有古溫城周畿內溫邑之麥秋又取成周注見前之禾武氏子求賻於魯武氏周世卿吳氏啓曰子者父老而以子攝行卿之事齊侯僖公祿父獻公五世孫鄭伯盟於石門在今山東濟南府長清縣西南水經注水瀆流移久已淪圮此諸侯特相盟之始桓王壬戌元年衛州吁弒其君完莊公子桓公衛人殺州吁立晉是為宣公初衛莊公娶齊女為夫人是為莊薑無子左傳莊薑美而無子衛人為之賦碩人又娶陳女是為屬媯生子蚤死陳女之娣是為戴媯生子完莊公立為世子公有嬖人生子曰州吁有寵而好兵公弗禁石碏衛大夫姬姓衛靖伯之後諫公又弗聽碏子厚與州吁遊碏禁之不可莊公薨世子完立是為桓公石碏乃請老至是州吁弒桓公而自立未能和其民史記州吁新立好兵衛人皆不愛厚問於石碏碏曰王覲為可陳侯桓公鮑胡公滿十世孫方有寵于王若朝陳使請必可得也厚從州吁如陳石碏使告于陳曰此二人者實弒寡君敢即圖之陳人執之而請涖於衛請衛人自臨討之衛人使右宰醜涖殺州吁於濮史記索隱濮曹衛之間賈逵言陳地非也石碏使其宰獳羊肩涖殺石厚於陳迎桓公弟晉於邢周公之後今直𨽻順德府邢臺縣是而立之甲子三年京師飢告飢於魯魯為請糴於宋衛齊鄭鄭伯入朝鄭伯朝王王不禮焉怒其取麥禾故弗禮周公桓公黑肩言於王曰我周之東遷晉鄭焉依善鄭以勸來者猶懼不蔇其器反至也况不禮焉鄭不來矣乙丑四年使凡伯周公後為周卿士封凡故城在今衛輝府輝縣聘於魯戎氐羌别種居中國者杜預左傳注陳留濟陽縣有戎城今山東曹州府荷澤縣故戎城是伐之楚邱衛地今曹州府曹縣有楚邱亭以歸初戎朝於周發幣於公卿發陳財幣於公卿凡伯弗賓至是凡伯聘魯還戎伐之於楚邱以歸丙寅五年鄭以祊注見前易魯許田近許之田今河南許州有魯城本許田後置邑鄭伯請釋泰山之祀天子有事於泰山諸侯皆從泰山之下諸侯各有湯沐邑鄭之邑在祊而祀周公成王營東都賜周公許田為魯朝宿之地後世因立公别廟焉鄭欲易許田恐魯公以别廟為疑故請已廢泰山之祀而為魯祀周公以泰山之祊易許田祊近於魯許近于鄭鄭以天子不能復巡狩故各以其近者相易遂歸祊於魯後魯侯軌桓公即位鄭復以璧假許田乃卒易之左傳桓公元年修好于鄭卒易祊田范氏寧曰王室微弱無復方嶽之會諸侯驕慢亦廢朝覲之事故鄭以湯沐之邑易魯朝宿之田也以虢公忌父為卿士金氏履祥曰鄭伯爭政之由桓王伐鄭之故宋公齊侯衛侯盟於瓦屋周地今開封府洧川縣有瓦屋里此參盟之始榖梁傳諸侯之參盟於是始胡氏傳春秋謹參盟戊辰七年鄭伯以王命會齊侯魯侯伐宋宋公不王不共王職鄭伯為王左卿士以王命告於齊魯伐宋魯敗宋師於菅古頑反宋地鄭取郜宋邑在今曹州府城武縣是為南郜及防今山東兖州府金鄉縣西防城是歸於魯是秋宋人衛人入鄭鄭不設備二國乘虗入之蔡人從之伐戴今河南歸德府考城縣有故戴城周戴國鄭伯圍戴克之取三師程子鄭戴合攻取三國之衆復以齊人入郕公羊作盛文王子叔武封注見前以郕不會王命也不會伐宋之命明年鄭以齊魯入許許莊公奔衛見許四嶽後封注前使許大夫百里奉許叔莊公弟後復入子許居許東偏公孫獲鄭大夫居許西偏今許州長葛縣有東西二城即許叔與公孫獲分處地李氏廉曰傳言鄭伯為王左卿士鄭之所以周旋王室不過為矯假報復之私非有夾輔之誠也敗宋入郕入許志得意滿而有繻葛之戰矣己巳八年魯公子翬弒其君息姑而立軌是為桓公翬字羽父請殺公子軌將以求太宰公曰為其少故也吾將授之矣使營莵裘邑名今兖州府泗水縣有菟裘城吾將老焉羽父懼反譖公於軌而請弒之公祭鍾巫公為公子時為鄭所獲禱於尹氏之主鍾巫遂與尹氏歸而立其主館於寪氏魯大夫羽父使賊弒公立軌而討寪氏辛未十年宋督華父督宋戴公孫弒其君與夷殤公及其大夫孔父孔子六世祖初宋宣公名力武公子卒舍其子與夷而立弟和是為穆公後穆公疾召大司馬孔父而屬與夷焉使奉之孔父曰羣臣願奉馮也馮穆公子公曰不可使馮出居於鄭遂卒與夷立孔父為司馬督為太宰十年十一戰民不堪命督宣言曰司馬則然遂殺孔父並弒殤公召公子馮於鄭而立之是為莊公公羊傳督將弒殤公以孔父生而存殤公不可得而弒于是先攻孔父之家殤公救之皆死焉魯侯會齊侯陳侯鄭伯於稷宋地以成宋亂成平也宋有亂故為會欲以平之宋以郜國名文王之後是為北郜注見前大鼎賂魯侯齊陳鄭皆有賂於是立華氏督遂相宋公魯取郜大鼎納於太廟臧孫達魯孝公子彄字子臧是為僖伯其後以臧為氏子達是為哀伯諫不聽蔡侯鄭伯會於鄧今許州郾城縣鄧城是始懼楚也壬申十有一年晉曲沃敗晉師於汾隰汾水之邊左傳疏汾水出太原故汾陽縣東南至河東汾陰縣入河州故汾陽今山西欣州靜樂縣汾陰今山西蒲府滎河縣獲晉侯哀侯光晉欒成靖侯孫欒賓子賓食采於欒以邑為氏故城在今直𨽻趙州西北死之晉侯侵陘庭今山西平陽府翼城縣東南有熒庭城志云即陘庭也之田陘庭南鄙啓曲沃伐翼即翼城晉所都曲沃伯稱即武公莊伯子逐晉侯於汾隰夜獲之及欒成諡共叔稱止之曰茍無死吾以子見天子令子為上卿制晉國之政辭曰民生於三事之如一父生之師教之君食之惟其所在則致死焉遂鬬而死時晉人立哀侯子小子為君是為小子侯小子侯元年曲沃武公使韓萬弒哀侯四年武公誘小子侯而殺之虢公林父以王命立哀侯之弟緡于晉是為侯緡韓萬曲沃桓叔孑食采韓原因以為氏秋七月壬辰朔日有食之既甲戌十有三年蔡人衛人陳人從王伐鄭王奪鄭伯政鄭伯不朝王以蔡人衛人陳人伐鄭鄭伯禦之為魚麗之陳先偏後伍伍承彌縫司馬法車戰二十五乘為偏以車居前以伍次之承偏之隙而彌縫闕漏也五人為伍此蓋魚麗陳法戰於繻葛鄭地或云即長葛也今長葛縣屬許州蔡衛陳皆奔王卒亂鄭師攻之王卒大敗祝聃射王中肩王亦能軍殿而不奔祝聃請從之鄭伯曰君子不欲多上人況敢陵天子乎夜鄭伯使祭足勞王且問左右乙亥十有四年北戎即山戎伐齊鄭世子忽帥師救之遂敗戎師先是北戎侵鄭鄭人敗之鄭為三覆以侍戎戎人之前遇覆者奔祝聃逐之𠂻戎師前後擊之戎師大敗及是戎復伐齊齊侯使乞師於鄭鄭世子忽帥師救齊大敗戎師獲其二帥大良少良甲首被甲者首三百以獻於齊初魯侯未昏於齊齊侯欲以其女即文薑魯桓公夫人妻忽忽辭人問其故忽曰人各有耦齊大非吾耦也及敗戎師齊侯又請妻之固辭人問其故忽曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師昏也人其謂我何祭仲曰君多內寵子無大援將不立三公子子突子亹子俵皆君也弗從丙子十有五年遷盟左傳注盟津也盟津即孟津注見前向今懷慶也濟源縣向城是之民於郟即郟鄏陌注亦見前盟向求成於鄭王之八年以蘇忿生之田十二邑易鄭田盟向其二邑也不肯即鄭至是而始求成焉既而背之背鄭歸王鄭人齊人衛人伐盟向王遷其民於郟丁丑十有六年楚僭稱王楚自熊梁八傳為若敖若敖再傳為蚡冒蚡冒之弟熊通弒蚡冒子而自立始僭號稱王楚子熊通伐隨姬姓侯爵今湖北德安府隨州春秋隨國俾請王室尊其號隨為固請王不許熊通怒曰吾先鬻熊文王之師也成王舉我先公令居楚蠻夷率服而王不加位我自尊耳乃自立為王是為楚武諸考金氏前編於楚僭號以後君始立之初則書是為某分注之處則書楚某皆削王存諡以别于周天子今依之其引用左國史記諸書則仍從原文稱王與隨人盟而去後周召隨侯莊王七年數以立楚為王楚以隨背已伐隨熊通卒於師子熊資立是為楚文左傳楚武王伐隨卒於橘木之下令尹鬪祁莫敖屈重除道梁溠營軍臨隨隨人懼行成莫敖以王命入盟隨侯而還楚橘木山名在今湖北安陸府鍾祥縣東令尹莫敖官名鬪氏屈氏皆楚公族以邑為氏溠水名出今湖北德安府隨州西北下流入溳水庚辰十有九年鄭伯寤生卒鄭莊公卒嫡庶爭立逾二十年今依俞氏臯敘説彚輯而以左傳作注鄭莊公娶鄧曼鄧國曼姓今湖北襄陽府襄陽縣有鄧縣故城春秋鄧國地生世子忽是為昭公又納宋雍氏女曰雍姞生子突是為厲公又生子亹子儀莊公卒忽立甫四月突自宋入於鄭忽出奔雍氏宗有寵于朱誘祭仲而執之使之立突祭仲乃以厲公歸而立之昭公奔衛後祭仲逐突祭仲專厲公使其壻雍糾殺之雍姬告仲仲殺糾厲公奔蔡尋入居於櫟事在王二十三年櫟鄭邑即陽翟注見前忽復立高渠彌弒之立子亹初莊公將以高渠彌為卿昭公固諌及昭公立渠彌懼其殺已遂弒之與祭仲共立子亹事在莊王二年齊人殺子亹齊侯師于首止子亹會之高渠彌從祭仲稱疾不往齊人殺子亹而轘高渠彌事在莊王三年首止衛地今歸德府睢州有首鄉劉昭曰首止也祭仲立子儀子儀立十四年祭仲已死突使傅瑕殺之而復入厲公自櫟侵鄭獲傅瑕傅瑕請納公遂與之盟傅瑕殺子儀及其二子而納厲公厲公入遂殺傅瑕事在僖王二年甲申二十有三年使家父如魯求車公羊傳王者無求求車非禮也王崩子他立是為莊王莊王乙酉元年衛侯朔出奔齊初衛宣公蒸於夷薑宣公庶母生急子急詩序史記俱作汲屬諸右公子為之娶於齊而美公取之是為宣薑詩序弼風新臺衛宣納汲之妻作新臺於河上而要之國人惡之而作是詩生壽及朔屬夀於左公子左傳汪左右媵之子因以為號疏左右公子蓋宣公之兄弟也夷薑縊夫人即宣薑與朔搆急子公使諸齊使盜待諸莘今山東東昌府莘縣有莘亭故城春秋衛地壽告急子使行不可夀飲以酒載其旌以先史記宣公與伋白旄告盜曰見執白旄者殺之盜殺之急子至曰我之求也請殺我盜又殺之詩序弼風二子乘舟思伋夀也宣公之二于交相為死國人傷而思之作是詩也左右公子故怨朔宣公卒朔立是為惠公四年左公子泄右公子職攻衛侯立公子黔牟衛羣公子衛侯奔齊丁亥三年魯侯與夫人薑氏如齊齊人殺魯侯魯侯及薑氏如齊齊侯襄公諸兒僖公子通焉史記襄公故嘗私通魯夫人及與桓公來襄公復通焉詩序齊風南山刺襄公也鳥獸之行淫乎其妹又敝笱刺文薑也齊人惡魯桓公微弱不能防間文薑使至淫亂為二國患焉公謫之以告齊侯享公使公子彭生乘公公薨於車史記齊襄公享公公醉使公子彭生抱公因摺其脅公死于車魯人告於齊曰寡君來修舊好禮成而不反無所歸咎惡於諸侯請以彭生除之齊人殺彭生魯立桓公子同是為莊公薑氏會齊侯於禚齊地於防魯地注見前於穀齊地今山東泰安府東阿縣穀城故縣是又享之於祝邱魯地今山東沂州府蘭山縣即邱城是詩序齊風載驅齊人刺襄公無禮義盛其車服疾驅於通道大都與文薑淫播其惡于萬民焉又猗嗟刺魯莊公也不能以禮防間其母失子之道人以為齊侯之子焉周公黑肩謀弒王伏誅周公欲弒王而立王子克莊王弟子儀辛伯周大夫告王遂與王殺周公王子克奔燕南燕姞姓今衛輝府延津縣南燕故城是初子儀有寵於桓王桓王屬諸周公辛伯諫曰並后妾如后匹嫡庶如嫡兩政臣擅命耦國都如國亂之本也周公弗從故及戊子四年使榮叔周大夫榮氏叔字錫魯桓公命追命以褒之王姬歸於齊王使單伯文獻通考單姬姓伯爵國在畿內世為王卿士送王姬送公羊榖梁作逆以單伯為魯大夫與左傳異魯築王姬之館於外天子嫁女于諸侯使諸侯同姓者主之魯侯奉命主王姬之婚方在諒暗故築舍于外王姬歸於齊尋卒孫氏覺曰齊為魯世讐而魯主其婚又在衰絰之中不書王姬之歸無以見魯之失禮王之失命也辛卯七年紀侯大去其國左傳注大去者不反之辭齊人遷紀郱漢書作瓶今山東青州府臨朐縣瓶縣故城是鄑今山東萊州府昌邑縣訾亭社是郚今青州府安邱縣郚城故城是紀季以酅户圭反今青州府臨淄縣酅亭是入於齊左傳疏釋例齊侯鄭伯詐朝於紀以襲之紀人大懼謀難於魯請王命以求成於齊魯告不能齊遂逼之遷其三邑紀有旦夕之危故分季以酅請事於齊紀侯不能下齊以與紀季於是大去其國釋例紀侯自以列國不忍屈臣于齊以國與季脫身外寓社稷有奉故不言滅不見迫逐故不言奔違齊難也違去也陸氏淳曰失國而曰大去何也紀侯賢而無罪怙力者并之故力不足者君子不咎之不曰出奔所以怙紀惡齊也不書滅不絶其祀也壬辰八年冬齊人宋人魯人陳人蔡人伐衛衛侯朔居齊八年至是齊侯會諸侯以納之癸巳九年春王使子突救衛王人子突救衛弗克朔遂入於衛殺左右公子泄職而復立黔牟奔於周甲午十年夏四月辛卯夜恆星不見夜中星隕如雨左傳注日光不匿恆星不見疏夜者自昏至旦之總名但此經下言夜中則上言夜者夜未至中謂初昏之後耳非竟夜不見星也乙未十有一年齊無知弒其君諸兒齊侯使連稱管至父二人皆齊大夫戍葵邱此齊葵邱在青州府臨淄縣西瓜期而往曰及瓜而代期戍公問不至請代又弗許二人怒因公孫無知以作亂僖公母弟夷仲年生無知有寵於僖公衣服禮秩如適襄公絀之故二人因之作亂遂弒襄公公逰姑棼遂田貝邱見大豕從者曰公子彭生也公怒射之豖人立而啼公懼墜於車傷足喪屨誅屨于徒人費鞭之見血費走出遇賊于門賊劫之費袒而示之背請先入伏公而出鬬死于門中賊遂入見公之足於戶下遂弒之姑棼即薄姑注見前貝邱齊地今青州府博興縣南有貝中衆而立無知丙申十有二年齊人殺無知公子小白立是為桓公無知嘗虐於雍廩史記作雍林賈逵曰渠邱大夫也今臨淄縣有渠邱亭既立雍廩殺無知初襄公立無常政令無常鮑叔牙齊大夫以邑為氏曰君使民慢亂將作矣奉公子小白僖公庶子奔莒嬴姓國子爵注見前亂作管夷吾史記潁上人氏族略夷吾出自周穆王召忽奉公子糾小白庶兄奔魯魯聞無知死伐齊納子糾小白已自莒先入史記齊大夫高徯先陰召小白于莒魯納子糾使管仲遮莒道射中小白帶鈎小白佯死管仲便人馳報魯魯送糾者行益遲至齊則小白已入高徯立之高徯齊文公子高之孫以名為氏發兵拒魯戰於乾時乾音干齊地左傳注時水支流旱則竭涸故曰乾時時水在今青州府博興縣南魯師敗走鮑叔牙帥師言於魯曰子糾親也請君討之管召讐也請受而甘心焉乃殺子糾於生竇史記作笙瀆賈逵曰句瀆也地在今曹州府荷澤縣北召忽死之管仲請囚國語齊桓公使請管仲於魯魯莊公以問施伯施伯曰管子天下之才也所在之國必得志于天下請殺而以尸授之莊公將殺仲齊使者請生致之莊公遂束縳以與齊鮑叔受之及堂阜齊地在今沂州府蒙陰縣西北而稅同脫之左傳注蒙陰有夷吾亭鮑叔解夷吾縳于此齊以管夷吾為相鮑叔以管仲至齊三釁以香薰之曰釁三沐之齊侯親逆於郊與之坐而問焉對輒稱善乃以為相號曰仲父仲為政四民不使雜處國語管子對桓公曰四民者雜處則其言哤其事易聖王之處士就間燕處工使就官府處商就市井處農就田野少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成子弟之學不勞而能制國為二十一鄉國語管子制工商之鄉六士鄉十五公帥十一鄉國子帥五鄉高子帥五鄉士鄉管子作士農之鄉作內政國政也以寄軍令軍令寄託于國政若有征伐鄰國不知也國語管子制五家為軌軌為之長十軌為里里置有司四里為連連為之長十連為鄉鄉有良人焉以為軍令五家為軌故五人為伍軌長帥之十軌為里故五十人為小戎里有司帥之四里為速故二百人為卒連長帥之十連為鄉故二千人為旅鄉良人帥之五鄉一帥故萬人為一軍五鄉之帥帥之伍之人世同居少同逰故夜戰聲相聞足以不乖晝戰目相視足以相識其歡欣足以相死居同樂行同和死同哀是故守則同固戰則同強官山海以準輕重管子書桓公曰何以富國對曰惟官山海可耳謹鹽策與鐵官之數其餘輕重準此而行立三選以擇賢國語鄉長進賢公親見之遂使役官官長期而書伐以告且選擇其賢者而用之公訾相其質觀其所能升以為上卿之贊是為三選分五屬以布憲管子書五屬立五大夫各治一屬正月之朝君乃出令布憲五屬大夫皆受憲於君重農以勸穀帛管子書粟重則萬物輕粟輕則萬物重兩者不衡立故殺去商賈之利而益農夫之事則田野闢而農勸其事又曰榖為君幣為下故五榖粟米者民之司命黃金力布者民之通貨贖罪以備器械管子書因罰備器械制重罪贖以犀甲一戟輕罪贖以鞼盾一戰小罪謫以金美金以鑄劒戟惡金羡以鑄鉏夷斤欘厚聘幣反侵地國語桓公曰吾欲從事于諸侯管仲曰審吾封疆而反其侵地重為之皮幣以驟聘俯于諸侯則四鄰之國親矣以親諸侯齊侯悉從之故仲得盡其才而伯功立丁酉十有三年魯敗齊師於長勺魯地春秋彚纂路氏曰成王以商民六族錫魯公有長勺氏此商民所居也齊伐魯魯侯將戰曹劌魯人請從公與之乘戰於長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之楚敗蔡師於莘蔡地在今河南汝寧府汝陽縣以蔡侯獻舞哀侯蔡仲十世孫歸蔡侯娶於陳息侯今河南光州息縣有古息里即息侯國亦娶焉息媯將歸過蔡蔡侯止而見之弗賓息侯聞之怒使告楚曰伐我我求救於蔡而伐之楚子從之敗蔡師於莘執蔡侯以歸史記楚世家文王伐蔡虜哀侯已而釋之蔡侯繩譽也息媯以語楚子楚子如息以食入享遂滅息而納息媯息媯不言楚子問之對曰吾一婦人而事二夫縱不能死又奚言楚子以蔡侯滅息遂復伐蔡入之邵子經世書自是江漢之國皆服于楚齊師滅談今山東濟南府厯城縣有談城古談國齊侯之出也過談談不禮焉及其入也諸侯皆賀談又不至齊師滅談談子奔莒陳氏傳良曰滅國始于此春秋滅國三十六五伯為之也己亥十有五年王崩子胡齊立是為僖王宋萬弒其君捷莊公馮之子閔公及其大夫仇牧初宋伐魯戰於乘邱魯地故城在今山東兖州府滋陽縣西北魯侯以金僕姑矢名射南宫長萬米大夫公右歂孫生摶之摶取也宋人請萬萬歸宋公靳之戲而相愧曰靳曰始吾敬子今子魯囚也萬病之遂弒閔公於蒙澤今河南歸德府商邱縣蒙縣故城是遇仇牧於門批而殺之公羊傳萬與閔公博婦人皆在側萬曰甚矣魯侯之美也天下諸侯宜為君者魯侯耳閔公矜此婦人妬其言顧曰此虜也爾虜焉故魯侯之美惡乎至萬怒搏閔公絶其脰仇牧聞君弒趨而至遇之于門手劒而叱之萬臂摋仇牧碎其首齒著乎門闔遇太宰督於東宫之西又殺之立于遊宋之公子羣公子奔蕭宋邑今江南徐州府蕭縣故蕭城是公子御説莊公子奔亳即亳城注見前南宫牛萬之子猛獲萬之黨帥師圍亳蕭叔大心蕭大夫及戴武宣穆莊之族以曹師伐之武王弟振鐸封曹注見前殺南宫牛於師殺子遊於宋立御説是為桓公猛獲奔衛萬奔陳宋人請猛獲於衛亦請萬於陳以賂歸皆醢之陳使婦人飲萬酒而以犀革裹之比及宋手足皆見僖王庚子元年齊侯宋人蔡人邾人邾國曹姓注見前會於北杏齊地在今山東泰安府東阿縣北宋有弒君之亂齊侯欲修伯業會於北杏以平之齊桓公衣裳之會一胡氏安國曰春秋之世以諸侯而主天下會盟之政自北杏始其後宋襄晉文楚莊秦穆交主夏盟迹此而為之者也齊人滅遂舜之後今兖州府寧陽縣北有遂鄉春秋遂國北杏之會遂人不至齊滅遂而戍之後遂人飲戍者酒醉而殺之齊人殱焉魯侯會齊侯盟於柯左傳注此柯濟北東阿齊之阿邑猶祝柯今為祝阿今兖州府陽殺縣東北有阿城鎮即春秋齊阿邑魯侯將盟曹沫左傳疏曹劌史記作曹沫以匕首劫齊侯於壇上曰反魯之侵地公許之曹沫去匕首北面就臣位公後悔欲無與魯地而殺曹沫管仲曰棄信於諸侯不可於是歸地於魯諸侯聞之皆信齊而欲附焉公羊傳齊桓之信著于天下自柯之盟始辛丑二年命單伯會諸侯齊陳曹伐宋宋人背北杏之會諸侯伐宋齊侯請師於王王命單伯會之取成於宋而還單伯會齊侯宋公衛侯鄭伯於鄄衛邑今曹州府濮州鄄城故城是宋服故也齊桓公衣裳之會二壬寅三年齊侯宋公陳侯衛侯鄭伯會於鄄齊始霸故諸侯復會焉齊桓公衣裳之會三癸卯四年命曲沃伯稱為晉侯曲沃伯伐晉侯緡滅之盡以其寶器賂王王使虢公命曲沃伯以一軍為晉侯自桓叔始封曲沃至是凡六十七年夏宋人齊人衛人伐鄭冬齊侯宋公魯侯陳侯衛侯鄭伯許男莊公弟穆公新城滑伯今河南河南府偃師縣有緱氏故城春秋滑國滕子文王子叔繡封滕注見前同盟於幽宋地在今河南歸德府考城縣界鄭人侵宋諸侯為宋故伐鄭冬同盟於幽鄭成也齊桓公衣裳之會四楚滅鄧鄧國注見前初楚子伐申過鄧鄧侯曰吾甥也止而享之騅甥聃甥養甥皆鄧之甥仕于舅氏請殺楚子曰亡鄧國者必此人也若不早圖後君噬臍何及若嚙腹臍喻不可及鄧侯弗從還年伐申還之年楚子伐鄧至是滅之蒍國周大夫以晉師殺夷詭諸亦周大夫夷亦地名周公忌父出奔虢初曲沃伯伐夷執夷詭諸蒍國請而免之既而弗報詭諸不報施于蒍國故蒍國作亂謂晉人曰與我伐夷而取其地遂以晉師伐夷殺夷詭諸周公忌父出奔虢避蒍國之難後惠王立復之甲辰五年王崩太子閬立是為惠王秦徙都雍今陜西鳳翔府鳳翔縣有雍縣故城元和志春秋時秦都初秦寧公文公孫自汧渭之間徙居平陽今鳳翔府岐山縣平陽故城是至是德公立寧公子武公弟徙雍居大鄭宫以犧三百牢祠鄜畤初作伏祠孟康曰六月伏日也周時無至此乃行之師古曰伏者謂陰氣將起迫于殘陽而未得升故為獻伏因名伏日也立秋後以金代火金畏于火故至庚日必伏庚金也磔狗邑四門以禦蠱蠱者熱夀惡氣狗陽畜故磔以禦之惠王乙巳元年春三月日有食之虢公晉侯來朝王饗禮命之宥宥助也命之幣物以助勸敬皆賜玉五玨音角亦作珏雙玉也馬三匹左傳非禮也王命諸侯名位不同禮亦異數不以禮假人使原伯文王第十六子封原今懷慶府濟源縣古原城是也其後世為王室卿士逆后於陳陳媯歸於京師是為惠后虢晉朝王鄭伯以齊執其卿鄭不朝齊齊人執鄭詹求王為援亦在周倡義為王定昏使原伯逆王后於陳陳媯歸於京師金氏履祥曰三年之喪自天子達虢晉不能以禮導王而亟為迎昏非禮矣丙午二年蒍國邊伯詹父子禽祝跪五大夫以王子頽作亂初王姚莊王妾嬖於莊王生子頽子頽有寵蒍國為之師及王即位取蒍國之圃以為囿邊伯之宫近於王宫王取之又奪于禽祝跪與詹父田而收膳夫石逹也之秩故蒍國邊伯石速詹父子禽祝跪作亂因蘇氏司寇蘇忿生食采於溫亦曰蘇城其後為王卿士桓王八年以蘇之十二邑與鄭故怨秋五大夫石速為士不在五大夫數奉子頽以攻王不克出奔溫蘇子奉子頽奔衛衛人燕人南燕也來寇立子頽丁未三年王居於櫟注見前鄭伯和王室不克執燕仲父南燕伯遂以王歸王處於櫟秋王及鄭伯入於塢桓王時所取鄭邑今河南府偃師縣塢聚是遂入成周取其寶器而還戊申四年虢公鄭伯奉王歸於王城誅子頽及五大夫虢公鄭伯胥命於弭鄭地在今開封府密縣界同伐王城鄭伯將王自圉門入虢叔自北門入殺子頽及五大夫王與鄭伯武公之略界也自虎牢以東鄭武公傅平王平王賜之虎牢以東後失其地故王復與之而虎牢即制邑周穆王時有高奔戎生捕虎于葭中獻之王王命之為柙畜之東虞是為虎牢後名成臯故城在今開封府汜水縣五月鄭伯卒子捷立是為文公王巡虢守巡守于虢虢公為王宫於玤虢地在今河南府澠池縣界王與之酒泉春秋彚纂酒泉周邑今陜西同州有甘泉水出匱谷中造酒尤美名酒泉己酉五年陳人殺其公子禦寇公子完奔齊是為田齊之祖初陳厲公名他桓公弟生完周史有以周易見陳侯者陳侯使筮之遇觀之否曰是謂觀國之光利用賓于王此其代陳有國乎不在此其在異國非此其身在其子孫光逺而自他有耀者也若在異國必薑姓也薑大嶽之後也山嶽則配天物莫能兩大陳衰此其昌乎至是陳人殺太子禦寇史記陳宣公有嬖姬生子欵欲立之故殺禦寇陳宣公名杵臼桓公子禦寇素愛完完懼禍及已乃奔齊齊侯使為卿辭曰羈旅之臣幸若獲宥君之惠也敢辱高位乃使為工正完之奔齊始易陳氏為田氏史記正義完既奔齊不欲稱本國故號故改陳為田完卒諡敬仲楚熊惲弒其君囏即杜敖楚文子而自立是為楚成杜敖欲殺其弟熊惲惲奔隨遂與隨襲殺杜敖而代其位庚戌六年楚人入獻賜楚子胙熊惲初即位布德施惠結好於諸侯春秋書荆人來聘公羊傳始能聘也使人入獻於天子天子賜胙曰鎮爾南方夷越之亂無侵中國壬子八年夏六月辛未朔曰有食之晉侯武公子獻公詭諸盡殺其羣公子晉桓莊之族逼曲沃桓叔莊伯之子孫晉侯患之士蒍周杜伯子隰叔之後隰叔為晉士師以官為氏曰去富子二族之富強者則羣公子可謀也已晉侯曰爾試其事士蒍與羣公子謀譛富子而去之又使殺遊氏之二子亦桓莊族告晉侯曰可矣不過二年君必無患士蒍使羣公子盡殺遊氏之族城聚晉邑即南絳故城在今山西絳州絳縣亦曰車箱城而處之於是晉侯圍聚盡殺羣公子以士蒍為大司空城絳武公所都故城在今絳州北以深其宫羣公子或亡奔虢虢以故再侵晉晉侯欲伐之士蒍曰不可虢公驕若驟得勝於我必棄其民無衆而後伐之欲禦我誰與且亟戰將飢癸丑九年冬十有二月癸亥朔日有食之甲寅十年齊侯宋公魯侯陳侯鄭伯同盟於幽陳鄭服也齊桓公衣裳之會五乙卯十有一年齊人伐衛衛人及齊人戰衛人敗績王使召伯廖王卿士錫齊侯命命為方伯且使伐衛以其立子頺也於是齊侯伐衛戰敗衛師數之以王命取賂而還髙氏閌曰衛助子頽篡王齊為伯主不能奔救及鄭伯既納王王錫齊侯命使討之于是乎伐衛曰伐者討得其罪也然既敗衛乃取賂而還嗟夫齊桓以能奬王室霸諸侯而所為乃若是秋楚伐鄭齊人宋人魯人救鄭楚令尹子元楚文弟伐鄭入於桔柣之門鄭逺郊名子元鬭禦疆鬬梧取之不比為斾子元自與三子特建斾以居前鬭班若敖孫王孫遊王孫喜殿衆軍入自純門鄭外郭門及逵市鄭郭內市縣門不發楚言而出鄭示楚間暇故不閉城門出兵而效楚言子元曰鄭有人焉諸侯救鄭楚師夜遁丁巳十有三年命虢公討樊注見前執樊皮以歸樊皮叛王王命虢公討之夏四月虢公入樊執樊仲皮歸於京師秋九月庚午朔日有食之齊人伐山戎山戎伐燕北燕召公之後注見前燕告急於齊齊侯救燕遂伐山戎至於孤竹注見前而還燕君送齊侯遂入齊境齊侯曰非天子諸侯相送不出境吾不可以無禮於燕於是分溝割燕君所至與燕史記正義滄州長蘆縣有燕留城即齊桓公分溝割燕君所至地長蘆今直𨽻天津府天津縣命燕君復修召公之政納貢於王如成康之時諸侯聞之皆從齊管子書桓公未至卑耳之溪十里見人長尺而人物具冠右袪衣公問管仲仲曰登山之神有俞兒者伯王興則見袪衣示前有水也右袪示從右涉也至卑耳之溪有贊水者曰從左方涉其深及冠從右方涉其深及膝乃右涉韓非子桓公自孤竹反迷失道管仲曰老焉之智可用也乃放老馬而隨之遂得道山中無水隰朋曰蟻冬居山之陽夏居山之隂蟻壤一寸而仞有水乃掘地得水楚人殺令尹子元以鬬穀奴走切於菟音烏徒為令尹即子文鬬伯比子楚人謂乳曰榖謂虎為於菟子文初生于鄖虎乳之故云初子元欲蠱文夫人即息媯蠱謂惑以淫事為館於其宫側而振萬焉振動萬舞也夫人聞之泣曰先君以是舞也習戎備也今令尹不尋諸仇讐而於未亡人之側不亦異乎御人以告子元於是子元伐鄭既歸而處王宫鬬射師即鬪亷若敖子諫執而牿之申公鬬班遂殺子元鬬穀於菟為令尹自毁其家以紓楚國之難己未十有五年魯侯同卒慶父弒其君之子般而立啓方史記作開莊公少子是為閔公初魯侯築臺臨黨氏魯大夫見孟任黨氏女從之閟音祕不從公也以夫人許之割臂盟公生子般雩祭名首夏祭天祈雨講於黨氏女公子般之妹觀之圉人犖自墻外與之戲子般鞭之公曰不如殺之犖有力焉公疾問後於叔牙史記莊公有三弟長曰慶父次曰叔牙次曰季友對曰慶父材問於季友對曰臣以死奉般公曰鄉者牙曰慶父材季友以君命鴆叔牙曰飲此則有後於魯國不然死且無後飲之卒立叔孫氏公薨子般即位次於黨氏慶父使圉人犖賊子般于黨氏季友奔陳慶父立啓方史記莊公娶齊女曰哀薑無于其娣曰叔薑生子開慶父與哀薑通欲立其姊之子故殺般而立子開庚申十有六年晉滅耿周同姓國漢書地理志河東郡皮氏有耿鄉故耿國度氏今絳州河津縣霍即霍叔邑注見前魏亦周同姓國元和志古魏城在芮城縣北今山西解州芮城縣東北有河北故城即魏城也封趙夙造父之後於耿畢萬畢公之後以畢為氏於魏晉侯作二軍公將上軍太子申生將下軍趙夙御戎畢萬為右以滅耿滅霍滅魏還為太子城曲沃賜趙夙耿賜畢萬魏以為大夫士蒍曰太子不得立矣分之都城而位以卿先為之極又焉得立不如逃之為吳泰伯不亦可乎卜偃晉掌卜之大夫曰畢萬之後必大萬盈數也魏大名也以是始賞天啓之矣萬之後為戰國魏夙之後為戰國趙辛酉十有七年魯慶父弒其君啓方季友立公子申是為僖公誅慶父魯侯立請於齊召季友季友自陳來歸公之傅奪卜齮魯大夫田公弗禁慶父使卜齮賊公于武闓宫中門謂之闈季友以子申適邾申閔公庶兄莊公子慶父奔莒史記魯人欲誅慶父慶父恐奔莒乃入立之以賂求慶父於莒莒人歸之及密左傳注密魯地琅玡費縣北有密如亭費縣今屬山東沂州府乃縊其後為仲孫氏亦曰孟氏閔公之死哀薑興知之史記閔公二年慶父與哀薑通益甚哀薑欲立之故使弒公故孫於邾齊人殺之於夷魯地以其尸歸魯人請而葬之狄入衛狄史記作翟黃帝之裔處北地後徙西河上黨中山其種有赤狄白狄狄人伐衛衛侯懿公弟惠公子好鶴有乘軒者將戰國人受甲者皆曰使鶴戰於滎澤左傳注此滎澤當在河北衛師敗績遂滅衛宋公桓公御説迎衛之遺民渡河立昭伯之子申是為戴公以廬於曹詩作漕通典滑州白馬縣衛漕邑城按滑州今衛輝府滑縣有白馬故齊侯使公子無虧帥車三百乘甲士三千人戍曹史記自惠公朔讒殺太子伋至于懿公衛人不服嘗欲敗之狄殺懿公衛人思立伋後伋子已死伋同母弟二人其一曰黔牟嘗立八年又去其二曰昭伯頑昭伯黔牟皆已死故立昭伯子申壬戌十有八年齊師宋師曹師次於聶北今山東東昌府聊城縣有聶城齊西界近邢地救邢邢遷於夷儀故城在今直𨽻順德府邢臺縣西俗謂之隨宜城諸侯城邢狄伐邢諸侯救邢邢人潰出奔師師遂逐狄人具邢器用而遷之師無私焉夏邢遷於夷儀諸侯城之楚人伐鄭春秋于是年荆始書楚鄭即齊故也齊侯宋公魯侯鄭伯曹伯昭公班叔振鐸十二世孫邾人會於柳左傳作犖春秋彙纂柳即犖也今河南陳州府淮寧縣西北有犖城亦作潦謀救鄭也齊桓公衣裳之會六癸亥十有九年諸侯城楚邱今衛輝府滑縣東有衛南廢縣即齊桓公為衛所築地非戎伐凡伯之楚邱也齊侯率諸侯城楚邱以封衛衛戴公卒齊侯立其弟燬為衛君是為文公齊侯既遷邢於夷儀又封衛於楚邱邢遷如歸衛國忘亡詩序衛風木瓜美齊桓公也衛國有狄人之敗出廬于漕桓公救而封之遺之車馬器服衛人思厚報之而作是詩也衛侯大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能元年革車三十乘季年乃三百乘詩疏文公徙居楚邱始建城使民安處建市使民交易營造宫室得其時節制度民既富饒官亦充足百姓美之為作定之方中詩齊侯宋公江人左傳注江國在汝南安陽縣陽安陽故城在今河南汝寧府正縣黃人今河南光州春秋黃國有古黃城盟於貫今山東曹州府曹縣有蒙澤故城古貰邑貫與貰字相似故蒙澤城亦曰貰城江黃楚與國始來服故為合諸侯明年又會於陽穀今兖州府陽穀縣陽穀故城是謀伐楚厯代年表貫及陽穀之會不在九合之數甲子二十年楚人伐鄭先是楚人侵鄭鬬章楚大夫囚鄭聃伯至是復伐鄭鄭伯欲成孔叔鄭大夫曰不可齊方勤我棄德不祥乙丑二十有一年春齊侯宋公魯侯陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次於陘今許州偃城縣陘亭是楚屈完楚大夫來盟於師盟於召陵今偃城縣東有召陵故城即屈完來盟地齊侯以諸侯之師侵蔡史記桓公與蔡姬戲舟中蔡姬習水蕩公公懼止之不止公怒歸蔡姬未絶蔡嫁其女桓公聞之興師往伐蔡潰遂伐楚楚子使問師故管仲對曰昔召康公命我先君太公曰五侯九伯女實征之以夾輔周室爾貢苞茅不入荆州之貢包􅬥青茅王祭不共無以縮酒束茅而灌之以酒為縮酒寡人是徵昭王南征而不復寡人是問對曰貢之不入寡人之罪也敢不共給昭王之不復君其問諸水濱師進次於陘楚子使屈完如師師退次於召陵齊侯陳諸侯之師與屈完乘繩證反共載也而觀之曰以此衆戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君若以力楚國方城山名在河南南陽府葉縣以為城漢水注見前以為池雖衆無所用之屈完及諸侯盟齊人執陳轅濤塗陳公族諸侯侵陳陳轅濤塗謂鄭申侯鄭大夫曰師出於陳鄭之間國必甚病若出於東方觀兵於東夷循海而歸其可也申侯曰善濤塗以告齊侯許之申侯見曰師老矣若出於東方而遇敵懼不可用也若出於陳鄭之間供其資糧屝屨其可也齊侯悅與之虎牢執轅濤塗秋齊伐陳冬諸侯之師侵陳陳成歸轅濤塗丙寅二十有二年晉侯殺其世子申生晉侯蒸於齊薑武公妾生太子申生同母女弟為秦穆公夫人娶二女於戎大戎唐叔子孫别在戎者狐姬生重耳小戎允姓之戎子生夷吾伐驪戎今陜西西安府臨潼縣有驪戎城故驪戎國驪戎男女以驪姬歸生奚齊其娣生卓子驪姬嬖欲立其子賂外嬖梁五在閨闥之外者與東關嬖五别在關塞外者使言於晉侯曰曲沃君之宗也蒲今山西隰州有古蒲城春秋晉蒲邑與二屈今山西吉州有北屈廢縣晉屈邑君之疆也不可以無主若使太子主曲沃而重耳夷吾主蒲與屈則可以威民而懼戎且旌君伐乃使太子居曲沃重耳居蒲夷吾居屈晉侯使士蒍築蒲與屈不慎置薪焉公使讓之對曰詩云懷德惟寧宗子惟城君其修德而固宗子何城如之三年將尋師焉焉用慎退而賦曰狐裘尨茸一國三公吾誰適從晉侯又使太子伐東山臯落氏赤狄别種今山西平定州樂平縣有臯落山寰宇記即東山臯落氏地里克晉大夫諌曰君之嗣適不可以帥師且臣聞臯落氏將戰君其舍之晉侯曰寡人有子未知其誰立焉不對而退及將立奚齊既與中大夫成謀謂里克也驪姬將殺太子而難里克使優施飲之酒而告之故里克聽其謀從中立以自免遂稱疾不朝姬謂太子曰君夢齊薑必速祭之太子祭於曲沃歸胙於公公田姬置諸宫六日公至毒而獻之公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由太子太子奔新城即曲沃晉侯殺其傅杜原款重耳謂太子曰盍言子之志於君太子曰君安驪姬是我傷君之心也曰然則盍行乎太子曰君謂我欲弒君也天下豈有無父之國哉吾何行如之使人辭於狐突曰申生有罪不敢愛其死雖然君老矣子少國家多難伯氏不出而圖吾君伯氏茍出而圖吾君申生受賜而死乃縊於新城姬又譖二公子曰皆知之重耳奔蒲夷吾奔屈晉侯使寺人披伐蒲重耳曰君父之命不校乃徇曰校者吾讐也踰墻而走披斬其袪遂出奔翟又使賈華伐屈夷吾不能守將奔翟郤芮夷吾臣曰後出同走罪也不如之梁今陜西同州府澄城縣有夏陽故城古梁國梁近秦而幸焉乃奔梁齊侯宋公魯侯陳侯衛侯鄭伯許男穆公子僖公業曹伯會王世子於首止注見前諸侯盟於首止鄭伯逃歸不盟齊桓公衣裳之會七王后陳媯生太子鄭及叔帶叔帶有寵於后欲立之齊侯帥諸侯盟於首止會王太子謀寧周也左傳注王以惠后故將廢太子而立叔帶故齊桓帥諸侯會太子以定其位諸侯盟王使周公召鄭伯曰吾撫汝以從楚輔之以晉可以少安左傳注王恨齊桓定太子之位故召鄭伯以叛齊鄭伯喜於王命而懼其不朝於齊也故逃歸不盟孔叔止之不聽楚人滅弦今河南光州光山縣春秋弦國地於是江黃道漢書地理志汝南陽安道國縣陽安故城在今汝寧府確山柏漢書地理志汝南西平故柏子國西平縣今屬汝寧府方睦於齊皆弦姻也弦子恃之而不事楚又不設備故亡秋九月戊申朔日有食之晉滅虢注見前執虞公仲雍後注見前初晉侯使荀息晉之公族食采於荀因以為氏以屈産之乘屈産何休曰泉名在今山西汾州府石樓縣垂棘之璧垂棘晉地出良璧假道於虞以伐虢水經注虞城北對長坂二十里謂之虞坂寰宇記春秋晉假道於虞以伐虢即此路虞公許之宫之奇諫不聽晉里克荀息帥師會虞師伐虢滅下陽故城在今平陸縣至是晉復假道伐虢宮之奇諫曰一之已甚其可再乎諺所謂輔車相依唇亡則齒寒者輔頰輔車牙車輔為外表車是內骨故曰相依其虞虢之謂也弗聽宫之奇以其族行曰虞不臘矣在此行也晉不更舉矣十二月晉滅虢虢公醜奔京師師還館於虞遂襲虞滅之執虞公而修虞祀且歸其職貢於王榖梁傳獻公舉虞荀息牽馬操璧而前曰璧則猶是也而馬齒加長矣丁卯二十有三年齊侯宋公魯侯陳侯曹伯伐鄭楚人圍許諸侯遂救許諸侯伐鄭以其逃首止之盟故也楚子圍許以救鄭諸侯救許乃還戊辰二十有四年齊侯宋公魯侯陳世子欵鄭世子華盟於寧母今山東兖州府魚臺縣有泥母亭即春秋寧母地泥讀如寧齊人伐鄭鄭孔叔請下齊以救國公曰吾知其所由來矣夏殺申侯以説於齊秋盟於寧母管仲言於齊侯曰招攜以禮懷逺以德齊侯修禮於諸侯諸侯官受方物鄭伯使太子華聽命於會子華言於齊侯請去泄氏孔氏子人氏三族皆鄭大夫以鄭為內臣齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子父不姦之謂禮守命共時之謂信違此二者姦孰甚焉會而列姦何以示後嗣夫子華既為太子而求介於大國以弱其國亦必不免齊侯辭焉子華由是得罪於鄭齊桓公衣裳之會八己巳二十有五年王人齊侯宋公魯侯衛侯曹伯昭公子共公襄陳世子欵盟於洮今曹州府濮州洮城是謀王室也鄭伯乞盟請服也齊桓公兵車之會一王崩太子鄭立是為襄王王崩於二十四年之閏月太子惡太叔𢃄之難懼不得立不發喪而告難於齊洮之盟位既定而後告喪於諸侯通志春秋書惠王之崩于是年十二月從告也襄王庚午元年宰周公宰孔也天子三公不字會齊侯魯侯宋子桓公子襄公兹父桓公卒未葬故書子衛侯鄭伯許男曹伯於葵邱宋地今河南歸德府考城縣有葵邱聚其地有盟臺亦名盟臺鄉齊侯會諸侯於葵邱王使宰孔賜齊侯胙史記王賜桓公文武胙彤弓矢大路曰天子有事於文武使孔賜伯舅胙齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越於下以遺天子羞敢不下拜下拜登受諸侯盟陳牲而不殺讀書加於牲上一猶專也明天子之禁初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育才以彰有德三命曰敬老慈幼無忘賓旅四命曰士無世官官事無攝取士必得無専殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人既盟之後言歸於好宰孔先歸遇晉侯史記晉獻公病行後未至日可無會也齊侯不務德而勤逺略故北伐山戎南伐楚西為此會也東略之不知西則否矣其在亂乎在察也徴誡晉公言晉將有亂君務靖德無勤於行晉侯乃還齊桓公衣裳之會九汪氏克寬曰葵邱之會乃桓霸盛哀之幾鄭康成所謂桓德極而將衰也蓋自再盟幽而諸侯協存邢衛却狄盟召陵帖楚而列國安盟首止于洮而王室寧及乎葵邱而極盛矣自是而後城把之功不若城邢救徐之師緩于救許伐黃不恤謀鄫無成而霸葉於是遂衰論者謂葵邱以前自朔至望之月而葵邱以後猶自望至之月蓋由其心有勤怠之殊故其功有盛衰之漸也晉侯詭諸卒里克殺其君之子奚齊殺公羊作弒初晉獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫其若之何稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公卒里克丕鄭晉大夫以三公子之徒作亂三公子申生重耳夷吾里克告荀息曰三怨將作秦晉輔之子將何如荀息曰死之里克曰無益也荀息曰吾與先君言矣不可以二公羊傳獻公死奚齊立里克謂荀息曰君殺正而立不正廢長而立幼如之何願與子慮之荀息曰君嘗訊臣矣臣對曰使死者及生生者不愧乎其言則可謂信矣里克知其不可與謀遂殺奚齊於次喪次也宋以公子目夷桓公庶子為左師宋官名初宋桓公疾太子兹父固請曰目夷字子魚長且仁君其立之公告目夷目夷曰能以國讓仁孰大焉且又不順遂走而退公卒兹父立是為襄公使目夷為左師以聽政於是宋治目夷之後以魚為氏世為左師辛未二年狄滅溫注見前蘇子叛王即狄又不能於狄狄人伐之王不救故滅蘇子奔衛晉里克殺其君卓及其大夫荀息里克既殺奚齊荀息將死之人曰不如立卓子而輔之荀息立卓子以葬獻公里克殺公子卓於朝荀息死之家氏鉉翁曰奚齊死於喪次君臣之分未明卓子死於既葬君臣之位已定故書法不同秦人納晉公子夷吾於晉周公忌父周卿士王子黨周大夫會齊隰朋齊莊公贖四世孫而立之里克及邳鄭使屠岸夷告重耳於狄曰國亂民擾子盍入乎重耳辭重耳告舅犯舅犯曰不可夫堅樹在始始不固本終必稿落大喪大亂之剡不可犯也重耳見使者曰父生不得供備灑掃之臣死又不敢涖喪以重其罪且辱在大夫敢辭舅犯即狐偃字子犯突之子吕甥姓瑕吕名飴甥及郤稱晉之公族食采于郤以邑為氏亦使蒲城午告夷吾於梁曰重賂秦以求入吾主子夷吾許諾夷吾告郤芮芮曰不可失也盍盡國以賂外內無愛虛以求入入而後圖聚吕甥出告大夫里克丕鄭使請君於秦其辭曰天降禍於晉國喪亂並臻以君之靈罪人克伏其辜羣臣莫敢寧處將待君命君若不忌先君之好辱收其逋遷裔胄而建立之晉國其誰非君之羣𨽻臣也秦伯德公子穆公任好使公子縶弔重耳曰喪不可久時不可失公子其圗之重耳告舅犯舅犯曰喪人無以為寶仁親以為寶父死之謂何又因以為利天下其孰能説之重耳見使者曰父死之謂何或敢有他志以辱君義稽顙而不拜哭而起起而不私公子縶退弔夷吾如弔重耳之命夷吾告郤芮芮曰公子勉之狷潔不行重賂配德子無愛財夷吾見使者再拜稽首起而不哭私於公子縶曰里克與我矣吾命之田百萬丕鄭與我矣吾命之田七十萬君茍輔我入且入河外列城五為君之東遊津梁之上無有難急也黃金四十鎰白玊之珩六雙不敢當公子請納之左右公子縶反致命秦伯曰吾與重耳重耳仁公子縶曰不如置不仁以滑擾也其中可以進退秦伯乃發兵送夷吾於晉時齊侯聞晉亂以諸侯之師討晉及高梁晉地在今山西平陽府臨汾縣有高梁都亦名梁墟而還使隰朋帥師會秦師周公忌父王子黨會齊隰朋立夷吾為晉侯是為惠公晉侯使丕鄭聘秦且謝緩賂史記晉使丕鄭謝秦曰始夷吾以河西地許君今幸得入立大臣曰地者先君之地君亡在外何得擅許秦寡人爭之弗得故謝殺里克以説將殺里克使謂之曰微子不及此雖然子弒二君與一大夫為子君者不亦難乎對曰不有廢也君何以興欲加之罪其無辭乎伏劍而死丕鄭在秦聞里克死請秦伯重問厚幣也以召吕甥郤稱冀芮即郤芮别邑于冀即以為氏出晉君入重耳秦伯許之鄭先歸秦使泠至秦大夫報問且召三子冀芮曰幣重而言甘誘我也遂殺丕鄭及鄭與里克之黨祁舉及七輿大夫左行共華右行賈華叔堅騅歂纍虎特宫山祁七輿申生下軍之衆大夫也丕鄭子豹奔秦壬申三年王子𢃄以戎入冦揚拒泉臯皆戎邑今河南府洛陽縣南有戎城又縣西南有泉亭亦曰前城服虔曰前讀為泉即泉戎也伊洛之戎諸雜戎居伊水洛水之間者同寇京師入王城王子帶召之也秦晉伐戎以救周晉侯平和也戎於王王以戎難故討王子帶王子帶奔齊事在四年齊使仲孫湫齊大夫入聘且宫王子帶事畢不與王言歸復命曰王怒未怠不十年王弗召也事在五年癸酉四年春三月庚午日有食之楚人滅黃黃人恃諸侯之睦於齊不共楚職曰自郢今湖北荆州府江陵縣有紀南城楚熊資徙都此一名郢城及我九百里焉能害我楚遂滅之榖梁傳貫之盟管仲曰江黃逺我而近楚楚為利之國也若伐而不能救無以宗諸侯矣桓公不聽及楚滅黃桓公不能救齊侯使管夷吾入聘齊侯使管仲平戎於王王以上卿之禮饗仲仲辭曰臣賤有司也有天子之二守國高在國氏高氏皆齊公族世為齊上卿高傒見前國懿仲之子曰歸父若節時也春秋來承王命何以禮焉陪臣敢辭乃受下卿之禮而還甲戌五年齊侯宋公魯侯陳侯宣公子穆公衛侯鄭伯許男曹伯會於鹹衛地今直𨽻大名府開州鹹城是諸侯會於鹹齊桓公兵車之會二淮夷病把故杞初都雍邱今河南開封把縣雍邱故城是後東徙淳于今山東青州府安邱縣淳于故城是且謀王室也於是諸侯戍京師為戎難故齊仲孫湫致之遂城緣陵即營陵故城在今青州府昌樂縣遷杞事在六年杞於是遷緣陵其後復徙淳于晉飢秦輸粟於晉晉薦飢麥禾皆不熟乞糴於秦秦伯問百里奚史記晉滅虞虞其大夫百里奚為秦穆公夫人媵百里亡秦走宛楚鄙人執之穆公聞百里奚賢以五羖羊皮贖之以歸時百里奚年已七十餘穆公與語國事三日大悅授之國政號曰五羖大夫與諸乎對曰天災流行國家代有救災恤鄰道也丕鄭子豹在秦請伐晉秦伯曰其君是惡其民何罪於是輸粟於晉自雍秦都及絳晉都注俱見前相繼左傳疏雍臨渭絳臨汾渭水自雍而東至華隂入河從河逆流而上從汾陰入汾又逆流東行而通絳命之曰泛舟之役明年秦飢乞糴於晉晉人弗與慶鄭晉大夫諫弗聽乙亥六年沙鹿崩沙鹿山名在今直𨽻大名府元城縣其西有沙鹿城晉卜偃曰期年當有大咎幾亡國丙子七年楚人伐徐徐國注見前徐即諸夏故也齊侯宋公魯侯陳侯衛侯鄭伯許男曹侯盟於牡邱在今山東東昌府荏平縣東北遂次於匡今直𨽻大名府長垣縣有故匡城春秋衛邑諸侯之大夫救徐盟於牡邱齊桓公兵車之會三尋葵邱之盟且救徐也魯公孫敖慶父子孟穆伯帥師及諸侯之大夫救徐諸侯次於匡以待之齊師曹師伐厲讀作賴楚與國伐之以救徐今湖北德安府隨州有厲鄉在厲山下古厲國地不克楚敗徐於婁林徐邑今江南鳳陽府虹縣有古婁亭春秋婁林地齊又為徐伐英氏英國注見前以報婁林之役事在九年夏五月日有食之左傳不書日朔官失之也齊大夫管夷吾卒管仲病齊侯問曰羣臣誰可相者仲曰知臣莫若君公曰易牙即雍巫如何對曰殺子以適君非人情不可公曰開方衛公子去其國適齊如何對曰背親以適君非人情難近公曰豎刁即寺人貂如何對曰自宫以適君非人情難親仲卒齊侯不用其言卒近用三子管子仲寢疾桓公問曰仲父之疾不幸不起政將安移仲未對公曰鮑叔何如對曰鮑叔君子也其為人好善而惡惡已甚見一惡終身不忘公曰然則孰可曰隰朋可朋之為人好上識而下問居其家不忘公門居公門不忘其家事君不二其心亦不忘其身其朋乎公又問仲曰臣聞之消息盈虛與百姓詘信然後能以國寧朋其可乎言終喟然歎曰天之生朋以為夷吾舌也其身死舌焉得生哉史記是歲管仲隰朋皆卒晉侯及秦伯戰於韓韓原在今陜西同州府韓城縣獲晉侯秦伯伐晉及韓晉侯謂慶鄭曰冦深矣若之何對曰君實深之晉侯之入許賂秦以河外列城五既而不與晉飢秦輸之粟秦飢晉閉之糴故秦伐晉可若何公曰不孫卜右慶鄭吉弗使乘小駟鄭入也慶鄭諫弗聽慶鄭曰古者大事必乘其産生其水土而知其人心安其教訓而服習其道唯所納之無不如志今乘異産及懼而變將與人易進退不可周旋不能君必悔之遂逆秦師使請戰戰於韓原晉戎馬還濘而止公號慶鄭慶鄭曰愎諫違卜固敗是求又何逃焉遂去之梁山靡御韓簡虢射為右輅秦伯將止之慶鄭以救公誤之遂失秦伯輅五嫁反迎也止獲也秦獲晉侯以歸晉大夫反首亂髮下埀拔舍拔草舍止以示憂戚也從之秦伯使辭焉曰二三子何其戚也寡人之從君而西也亦晉之妖夢是踐惠公初立狐突適下國遇共太子與載而告之曰夷吾無禮余得請于帝矣將以晉卑秦秦將祀余對曰神不歆非類民不祀非族君祀無乃殄乎君其圖之太子曰吾將復請七日新城西偏有巫者而見我焉許之遂不見及期而往告之曰帝許我罰有罪矣敝于韓杜預曰狐突匆如夢而見太子故曰妖夢豈敢以至晉大夫三拜稽首曰君履后土而戴皇天皇天后土實聞君之言羣臣敢在下風史記秦穆公亡善馬岐下野人共得而食之者三百餘人吏逐得欲法之公曰君子不以畜産害人吾聞食善馬肉不飲酒傷人乃皆賜酒而赦之三百人者聞秦擊晉皆求從穆公馳追晉君不能得反為所圍于是食善馬三百人馳冒晉軍以解其圍遂脫穆公而反生得晉君王命秦伯釋晉侯晉侯歸國王聞秦獲晉侯曰晉我同姓為請於秦秦伯夫人夷吾姊聞晉侯將至乃以太子與女登臺而履薪焉使人以免音問服衰絰逆且告曰若晉君朝以入婢子夕以死夕以入則朝以死唯君裁之秦伯謂其大夫曰我得晉君以為功今天子為請夫人是憂且晉人戚憂以重我天地以要我不圗晉憂重其怒也我食吾言背天地也重怒難犯違天不祥必歸晉君公孫枝秦大夫子桑曰歸之而執其太子必得大成乃許晉平十月晉陰飴甥即吕甥食采于陰故曰陰飴甥會秦伯盟於王城秦地在今陜西同州府朝邑縣東秦伯曰晉國和乎對曰不和小人恥失其君而悼喪其親不憚征繕以立圉也圉惠公太子曰必報讐君子愛其君而知其罪不憚征繕以待秦命曰必報德以此不和秦伯曰國謂君何對曰小人戚謂之不免君子怒以為必歸二而執之服而舍之德莫厚焉刑莫威焉此一役也秦可以霸納而不定廢而不立以德為怨秦不其然秦伯曰是吾心也改館晉侯饋七牢焉十一月晉侯歸殺慶鄭而後入是歲晉又飢秦伯又餼之粟曰吾怨其君而矜其民晉侯獻秦以河西之地使太子圉為質于秦秦妻以宗女後惠公病子圉棄其妻亡歸晉丁丑八年春正月戊申朔隕石於宋五星隕為石數之則五是月六鷁鷁水鳥退飛過宋都過迅風而退飛時內史叔興聘於宋宋公問曰是何祥也對曰今兹魯多大喪公子季友公孫兹卒明年齊有亂齊桓公卒君將得諸侯而不終事具後齊侯宋公魯侯陳侯衛侯鄭伯許男邢侯曹伯會於淮左傳注臨淮郡左右諸侯會於淮謀鄫左傳注鄫為淮夷所病故鄫鄫城在今兖州府嶧縣東故國且東略也齊桓公兵車之會四城鄫役人病有夜登邱而呼曰齊有亂不果城而還齊桓公主會盟自北杏始迄會淮終衣裳之會九于北杏于鄄二于幽二于柳于首止于寧母于葵邱是也貫及縣縠不在此數兵車之會四于洮于鹹于北邱于淮是也召陵不在此數戊寅九年魯滅項今河南陳州府項城縣有故項城春秋項國淮之會魯侯師未還而取項齊人以為討止公夫人薑氏會齊侯於卞今山東兖州府泗水縣有卞城故城春秋魯卞邑以為請乃歸齊侯小白卒齊侯之夫人三王姬徐嬴蔡姬皆無子齊侯好內內嬖如夫人者六人長衛姬生無虧史記作無詭即武孟少衛姬生元即惠公鄭姬生昭即孝公葛嬴生潘即昭公密姬生商人即懿公宋華子生雍公與管仲屬昭於宋公以為太子雍巫即易牙有寵於長衛姬因寺人貂即豎刁以薦羞於公亦有寵公許之立無虧冬十月乙亥桓公卒易牙與寺人貂因內寵以殺羣吏而立無虧太子昭奔宋十二月乙亥赴辛巳夜殯史記桓公病五公子各樹黨爭立及桓公卒遂相攻桓公尸在床六十七日尸蟲出於户御批厯代通鑑輯覽卷四

front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷一百十五明莊烈帝丁丑崇禎十年春正月辛丑朔日食賊犯安慶
  hash: sha256:8856d4a53aa58f0140e9e25cb7bb147c7a2e631611e183aa607cb8a4a51d421a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_114-1a, image: WYG0339/WYG0339-0668a.png}
body:
  text: 張獻忠糾羅汝才馬守應劉國能即射塌天等自襄陽東下與江北賊革裏眼左金王合烽火達淮揚南京兵部尚書范景文操江都御史王道直總兵陽御分汛固守安池道史可法親率兵當賊衝賊遂從間道犯安慶連營百里詔左良玉馬爌劉良佐合兵往援皆大破賊賊走潛山太湖山中巡撫張國維字玉笥東陽人檄良玉搜山不應尋北去賊復出太湖敗官軍於酆家店殺參將程龍陳于王等四十餘人遂陷和州含山定逺六合攻天長破盱眙良玉令河南士民合疏留已竟不赴援已而總兵牟文綬偕良佐來赴賊始遁獻忠入湖廣二月我大清兵下朝鮮先是我大清往征朝鮮攻克義州渡嘉山江進薄平壤朝鮮空城遁去國王李倧遣使請受盟因許其通和而還既而朝鮮復屢背約隂持兩端我太宗文皇帝乃親統大軍征之長驅直入遂克王城國王李倧逃于南漢山城大軍圍之其妻子羣臣盡被俘獲已而漢江口濵海之地及江華島城在朝鮮國開州東北海中復為大軍所取倧勢益窮蹙乃上明所給敕印奉表出降朝鮮既降皮島益孤孔有德耿仲明尚可喜夾攻之副總兵金日觀力戰死皮島遂為大清所取三月起楊嗣昌為兵部尚書嗣昌以父憂在籍會尚書張鳯翼卒帝顧廷臣無可任者乃以嗣昌為之嗣昌博涉文史多識先朝故事有口才酬對敏捷帝以為能所奏請無不從嗣昌議大舉平賊分各省官軍為四正六隅謂之十面之網總督總理二臣隨賊所向征討因議增兵十二萬增餉二百八十萬措餉之䇿有四曰因糧因舊額量加畝輸六合石折銀八錢傷地不與嵗得銀一百九十二萬九千有竒曰溢地土田溢原額者核實輸賦嵗得銀四十萬六千冇竒曰事例富民輸資為監生曰驛遞前此郵驛裁省之銀以二十萬充餉議上帝下詔有暫纍吾民一年除此腹心大患語改因糧為均輸布告天下尋以武臣驕惰逮戮失事總兵王忠張全昌惟左良玉以六合破賊功戴罪自贖夏四月以熊文燦為兵部尚書兼都察院右副都御史總理南畿河南山西陜西湖廣四川軍務文燦官閩廣久帝未識其為人因遣中使假廣西采辦名往覘之既至文燦甚有所贈遺留飲十日中使喜語及中原寇亂文燦方中酒擊案罵曰諸臣誤國耳若文燦往詎令鼠輩至是中使起立曰吾非往廣西采辦也銜上命覘公公信有當世才非公不足辦此賊吾今還公旦夕且召文燦出不意悔失言隨言有五難四不可中使曰我見上自請之若上無所吝即公不得辭矣文燦辭窮應曰諾中使還朝果言之于帝初文燦自貴州徙家蘄水與邑人姚明恭為姻明恭官詹事與楊嗣昌相善嗣昌握兵柄得帝眷以帝急欲平賊規引一人自助明恭因薦文燦且曰此有內援可引也嗣昌遂薦之至是帝以文燦總理南畿五省軍務文燦拜命即請左良玉所將六千人為己軍而大募粵人及烏蠻精火器者一二千人以自護弓刀甲胄甚整次廬山謁所善僧空隱僧迎謂曰公誤矣文燦屏人問故僧曰公自度所將兵足制賊死命乎曰不能曰諸將有可屬大事當一面不煩指揮而定者乎曰未知何如也曰二者既不能當賊上特以名使公厚責望一不效誅矣文燦却立良久曰撫之何如僧曰吾測公必撫然流寇非海冦比公其慎之文燦乃辭去抵安慶良玉桀驁不受節制其下與粵軍不和大詬文燦不得已遣還南兵然良玉軍實不為用嗣昌言于帝乃以邉將馮舉苗有才兵五千人𨽻焉已而京營將黃得功字虎山開元衛人連破賊兵威甚振當是時嗣昌建四正六隅之䇿增兵餉大半期滅賊賊頗懼及文燦至京軍屢捷益懼文燦顧決計招撫刋檄遍懸通都帝聞之怒嚴旨譙責嗣昌為救乃解六月溫體仁罷體仁在閣八年日與異已者為仇帝以為朴忠恩禮無與比體仁自念排擠者衆恐衆怨歸已倡言密勿不宜宣泄閣揭皆不發亦不存録故所中傷人不能盡知廷臣劾之者先後不可勝計布衣楊光先至輿櫬上奏帝益謂其孤立罪責言者或至杖死至是常熟人張漢儒訐錢謙益瞿式耜居鄉不法事先是庶吉士張溥知縣張采倡為復社與東林相應和里人陸文聲者輸資為監生求入社不許因詣闕言風俗之弊皆原于士子溥采為主盟倡復社亂天下體仁下其事于提學御史倪元珙兵偹參議馮元揚皆言復社無可罪失體仁意俱被降謪于是復有張漢儒事人張溥字天如張采字受先俱太倉人倪元珙上虞馮元揚字爾賡慈溪人體仁故讐謙益擬旨逮下詔獄嚴訊謙益危甚求解于司禮太監曹化淳化淳故王安門下也德謙益嘗為安作碑文頗為營求漢儒偵知之與其黨告體仁體仁密奏帝請并坐化淳罪帝以示化淳化淳懼自請案治乃盡得漢儒等姦狀及體仁密謀獄上帝始悟體仁有黨詔下漢儒等立枷死體仁乃佯引疾意帝必慰留及得旨竟放歸體仁輔政數年念朝士多與為怨不敢恣肆用亷謹自結於上苞苴不入門然當是時流冦踰畿輔擾中原邊境雜沓民生日團未嘗建一策惟日與善類為仇其所引與同列者皆庸材苟以充位且藉形已長固上寵帝每訪兵餉事輒遜謝曰臣夙以文章待罪禁林上不知其駑下擢至此位盜賊日益衆誠萬死不足塞責顧臣愚無知但票擬勿欺耳兵食之事惟聖明裁決有詆其窺帝意旨者體仁言臣票擬多未中窽要每經御筆批改頌服將順不暇詎能窺上旨帝愈親信之及得旨放歸體仁方食失七箸歸踰年死兩畿山西大旱山東河南蝗秋八月以劉宇亮綿竹人宇烈弟傅冠字元甫進賢人為禮部尚書薛國觀韓城人為禮部侍郎並兼東閣大學士預機務國觀為人隂鷙溪刻不學少文溫體仁因其素讐東林密薦于帝遂致柄用時體仁雖去國而國觀與張至發並效其所為蔽賢植黨國事日壞冬十月李自成犯四川自成窺蜀中空虛乘間陷寧羌破七盤關在保寧府廣元縣北七盤嶺上分三道入蜀總兵官侯良柱禦之于綿州戰死遂連陷昭化劍州梓潼江油黎雅青神進逼成都未幾洪承疇督曹變蛟來援自成乃由洮州入番地官軍轉戰千里不解甲者二十七晝夜自引殘卒竄入岷州及西河宋置州明改縣今縣屬秦州禮縣元置禮店縣明初改千户所成化中置禮縣今縣屬秦州山中以中官曹化淳提督京營復以李明哲提督五軍營杜勳提督神樞營閻思印提督神機營鄭良輔總理京城巡捕戊寅十一年春正月裁南京冗官夏四月張獻忠偽降總理軍務熊文燦受之當是時河南湖廣賊十五家惟獻忠最狡黠驍勍次則曹操獻忠嘗偽為官兵欲紿宛城左良玉適至獻忠倉皇走前鋒羅岱射之中額良玉馬亦及刀拂獻忠面馬馳以免會熊文燦為總理刋檄撫賊闖拓天與獻忠有卻詣文燦降獻忠創甚不能戰心內恐至是偵陳洪範𨽻總理麾下為總兵大喜獻忠當死洪範救之事具前因遣間齎重幣獻洪範曰獻忠蒙公大恩得母死公豈忘之耶願率所部降以自效洪範亦喜為告文燦受其降巡按御史林銘球廣東海豐人分巡道王瑞柟永嘉人與良玉謀俟獻忠至而執之文燦不可乃止張至發罷至發嘗疏詆黃道周頌溫體仁屢為言者所劾至是中書舍人黃應恩以賕請得罪詞連至發至發憤甚連疏請勘帝優旨褒答而下應恩獄至發乃乞休自引三當去未嘗稱疾也忽得旨回藉調理時人傳笑以為遵旨患病云至發頗清強起外僚諸翰林多不服又始終惡異已不能收物情帝亦以其望輕即聽之去後十四年帝思用舊臣特敕召周延儒賀逢聖及至發獨至發四疏辭十五年四月卒于家五月熒惑逆行至秋乃滅帝素服減膳諭諸臣修省六月孔貞運罷貞運先與黃士俊賀逢聖同相已而兩人相繼罷去士俊十年十二月罷逢聖是年三月罷及是貞運代張至發為首輔會帝親自考選諸臣卷下輔臣再閲貞運及薛國觀頗有所更及命下閣擬悉不從而帝以所擇十八卷下部議行適新御史羣謁朝房貞運言諸卷説多難行新御史遂有劾之者貞運即引歸國變後貞運哭臨慟絶不能起未幾卒貞運至聖六十三代孫也以楊嗣昌程國祥蔡國用金溪人為禮部尚書方逢年遂安人范復粹黃縣人為禮部侍郎並兼東閣大學士預機務嗣昌兼掌兵部初國祥掌户部議借都城賃舍租一年可得五十萬勛戚內官多匿不奏得僅十三萬然國祥由是得帝眷至是與嗣昌等並入閣兩畿山東河南大旱蝗秋七月謫少詹事黃道周官初遷安郭鞏以逆桉謫戍其鄉人為訟寃楊嗣昌時巡撫永平聞于朝及奪情入閣又起復逆案陳新甲長夀人為總督于是言官相繼論之道周上三疏一劾嗣昌奪情一劾新甲走邪徑一劾遼東巡撫方一藻歙縣人主和議時道周已充日講官遷少詹事會廷推閣臣道周名在列帝不用用嗣昌等帝疑道周怨望嗣昌復托拾道周前辭諭德疏中有文章氣節不如鄭鄤字峚陽武進人振先子語鄤方以逼父杖母為時詬病鄭鄤者故庶吉士與文震孟同建言相友善溫體仁憾震孟因劾鄤假乩仙判詞逼父振先杖母言出其從母舅大學士吳宗達帝震怒不俟佐證磔死嗣昌因言鄤杖母飛走不如今道周又不如鄤何用談綱常為且其意徒欲庇凶徒遮前言之謬立心可知因自乞罷免帝優旨慰之及是召內閣及諸大臣于平臺并及道周帝與諸臣語所司事久之問道周曰凡無所為而為者謂之天理有所為而為者謂之人欲爾三疏適當廷推不用時果然無所為乎道周對曰臣三疏皆國家綱常自信無所為帝曰先時何不言對曰先時猶可不言至簡用後不言更無當言之日帝曰清固美德但不可傲物遂非且惟伯夷為聖之清若小廉曲謹是廉非清也時道周對不稱旨帝屢駁詰道周曰今日獨立敢言之人少讒諂面諛之人多臣不得不言帝曰昔孔子誅少正卯當時亦稱聞人止因言偽而辨行僻而堅故不免聖人之誅今人多類此道周曰少正卯欺世盜名心術不正故聖人誅之臣心正所行事皆正無一毫私帝曰向以爾偏稍示裁抑後聞爾有操守旋復官不圖恣肆乃爾本當按問念列講官姑出侯旨遂叱之退是時帝憂兵事謂可屬大事者惟嗣昌破格用之道周守經失帝意及奏對又不遜帝怒甚欲加以重罪念其名高乃傳諭數百言戒廷臣毋為道周劫持相朋黨貶道周六秩為江西按察司照磨八月傳冠罷時有章奏發自御前者冠以為揭帖援筆判其上既知誤惶恐引罪帝即放歸九月我大清兵入塞燕京戒嚴大清兵分路入墻子嶺青山口薊遼總督吳阿衡裕州人敗死監視中官鄧希詔遁走遂深入抵半闌山總監高起潛兵敗遂由盧溝橋趣良鄉下畿輔城四十有八前大學士高陽孫承宗賜專本朝定諡忠一門殉節死子舉人鉁尚寶丞鑰官生鈰生員􅀈鎬從子鍊及孫之沅之滂之澋之浩之瀗從孫之徹之渼之泳之澤之渙之瀚皆戰死又同時死節者知州則有深州知州孫士美及父訥一家從死者十三人知縣則有任邱知縣白慧元亦一門俱死餘如慶都知縣黃承宗靈夀知縣馮登鰲文安知縣王鑰蠡縣知縣王采新河知縣崔賢鹽山知縣陳志固城知縣王九鼎青縣知縣張文煥興濟知縣錢珍慶雲知縣陳緘等教官則有巨鹿教諭唐一中蠡縣訓導馮大緯吳橋訓導劉廷訓臨城訓導張純儒等鄉官則有喬若雯李禎寧李崇德董祚魏克家諸生則有桑開基等皆以殉節死孫士美青浦人白慧元凊澗人馮登鰲膚施人王鑰武功人王采澤州人崔賢弋陽人唐一中全州人馮大緯登鰲從父劉廷訓順天通州人張純儒新安人喬若雯臨城人歷兖州知府罷歸李禎寧任邱人歷山西按察使罷歸李崇德青縣人歷户部員外郎董祚隆平舉人魏克家高陽人知鄒平縣又自德州渡河下山東州縣十有六事在明年正月執德王由樞莊王見潾六世孫布政使張秉文字含之桐城人等死之先是楊嗣昌檄山東巡撫移師德州于是濟南府空虛巡按御史宋學朱方行部章邱聞警馳還與秉文及副使周之訓參議鄧謙鹽運使唐世熊等議守城達章告急于朝嗣昌無以應及濟南被圍秉文等分門死守晝夜不解甲援兵竟無至者及城潰秉文巷戰被箭力不能支死妻方妾陳俱投大明湖死學朱子訓謙世熊與濟南知府苟好善同知陳虞允通判熊烈獻歷城知縣韓承宣臨邑知縣宋希堯博平知縣張烈宿茌平知縣黃建極武城知縣李承芳邱縣知縣髙重光及恩縣鄉官李應薦歷城舉人劉光化子漢儀皆死焉時又有劉大年者官兵部主事奉使南京還朝道歷城城破亦死之人宋學朱字用晦長洲人周之訓黃岡人鄧謙孝感唐世熊灌陽人苟好善醴泉人熊烈獻黃陂人韓承宣爌之孫髙重光字秀恆保定縣人劉大年江西廣昌人詔盧象升督兵勤王象升遭父喪請守制未行詔督山西總兵楊國柱王朴虎大威諸軍入援時楊嗣昌奪情任中樞與總監中官高起潛陰主和議象升心非之會召對平臺帝慰勞之咨以方略對言命臣督師臣意主戰帝色變良久曰和乃外廷議耳象升因奏備禦形勢甚悉帝壯之而戒象升持重命與嗣昌起潛等議當是時帝心知大清兵鋭甚力不敵而恥言和故委廷議以答象升象升出與兩人議不合即日陛辭嗣昌送之屏左右欲有言久而不能出口第丁寧毋輕戰而已象升念帝意頗鋭而事多為起潛撓憤甚疏請分兵嗣昌定議宣大山西三帥屬象升關寧諸路屬起潛象升名督天下兵實不及二萬越數日嗣昌至軍象升責以阻師且曰公等堅主和議獨不思城下之盟春秋所恥長安口舌如鋒恐袁崇煥之禍立見嗣昌頰赤曰公直以尚方劍加我矣象升曰既不奔喪又不能戰尚方劍當先加已頸安得加人嗣昌曰公毋以長安蜚語陷人象升曰周元忠赴邉講和往來數日其事始薊鎮監督受成本兵通國共聞誰可諱也嗣昌語塞而去元忠本瞽人嘗賣卜于遼多相識故嗣昌遣之然議和事大不得要領而止又數日會起潛安定門象升大言非血戰無以盡臣職起潛曰恐野戰非我所長耳兩人始終各持一議洪承疇大破李自成于潼關先是自成復謀犯蜀諸將馬科賀人龍拒之乃走漢中又為左光先所扼其黨皆降惟自成東遁承疇命曹變蛟窮追設伏于潼關之南原大破之自成妻女俱失從十八騎遁商洛時關中賊略盡張獻忠已降惟羅汝才等十餘部往來豫楚窺陜西亦以求撫紿熊文燦孫傅庭復引兵敗之于閿鄉靈寶賊窘甚忽得文燦止兵檄謂無妬我撫功縱部下戕殺傳庭怏怏而還未幾承疇傳庭皆入衛北行賊遂不可制冬十二月方逢年罷時刑科奏摘參未完疏逢年以犯贓私者人亡産絶瓜蔓親戚遂輕議以上而帝意欲罪刑部尚書劉之鳯責逢年疏忽逢年引罪即罷歸督師侍郎盧象升敗于巨鹿死之是時大清兵分三路深入一由淶水攻易州一由新城攻雄縣一由定興攻安肅象升聞之從涿州進據保定令將分道出禦大戰慶都猶未敗衄而一時列城多望風失守嗣昌乃奏落象升尚書銜以侍郎督師象升自擢兵備與流賊角大小數十戰賊雖強盛俱烏合之衆一敗即散走故所向催破及是大軍在前又為嗣昌所扼兵力單餉久乏將士飢甚自知必死晨出帳四面拜曰吾與將士同受國恩患不得死不患不得生衆皆泣不能仰視旋進至巨鹿南賈莊中官髙起潛擁關寧兵相距五十里象升遣贊畫主事楊廷麟字伯祥清江人往乞援因與訣曰死西市何如死疆場吾苐以一死報君猶為薄耳廷麟詣起潛起潛不應象升卒僅五千行至嵩水橋與大清兵遇總兵王朴先引兵逃去惟虎大威楊國柱從象升勒麾下卒居中大威帥左國柱帥右大戰移時乃休兵夜半被圍明日騎益大至圍三重象升麾兵力戰炮盡矢窮大威請潰圍出象升不許猶奮鬬身中四矢三刃手格殺數十人乃死一軍盡亡惟大威國柱得脫起潛聞敗遂倉皇星遁嗣昌既夙惡象升而起潛懼坐罪誅諱象升死狀嗣昌疑不死詔驗視廷麟遣將得其尸麻衣猶被體一卒遙見即號泣曰此吾盧公也肅拜衆皆拜畿民皆奔走而泣曰盧公死誰恤我者競立祠祀之順德知府于頴金壇人核其狀以上事始白嗣昌故靳之踰兩月乃得殮象升嘗三賜劍未嘗戮一偏禆愛才恤下如恐不及沒後羣臣多為請恤帝先中嗣昌言不納及嗣昌敗乃加贈恤福王時追諡忠烈忠本朝賜専諡肅己卯十二年春正月以洪承疇總督薊遼軍務孫傳庭總督保定山東河北軍務尋下傳庭于獄朝議移承疇薊遼帥秦兵東守傳庭言秦兵不歸則流賊勢張且軍士家在秦久留于邉非諽則逃無益帝不能用尋又移傳庭于保定傳庭疏請召見為楊嗣昌所阻愠甚引疾乞休嗣昌復劾之詔斥為民逮繫論死二月劉宇亮罷初宇亮自請督察軍情抵保定聞盧象升敗懼甚急趨晉州不敢戰尾大清兵而北至天津乃劾總兵劉光祚逗遛詔斬光祚軍前而光祚適有武清之捷宇亮復具疏乞宥帝責其前後矛盾削籍三月我大清兵出青山口帝逮治失守封疆諸臣巡撫陳祖苞總兵吳國鎮等三十六人同日棄市夏四月總兵官左良玉敗賊于鎮平關在南陽府鎮平縣初賊渠馬士秀等降良玉處其衆于許郊外許大州諸將寄孥處會良玉率諸將入援士秀等假良玉軍號紿入城縱火殺官吏殱良玉家至是良玉南還擊賊馬進忠于鎮平關降之復遣降將劉國能擊降士秀等于是熊文燦上言兵威大震賊嵗月可平帝優詔報之程國祥罷初國祥之相也帝御中極殿召廷臣七十餘人發䇿親試之時天大兩諸臣面對後漏已深終考者三十七人然帝意前定第假是為名居數日國祥遂與楊嗣昌等同相時先後居政府者八人劉宇亮傳冠薛國觀楊嗣昌方逢年蔡國用范復粹及國祥凡八人而嗣昌薛國觀獨用事國祥委蛇其間自守而已至是召對國祥無一言帝傳諭責其緘默大負委任國祥遂乞休去尋卒于家未幾蔡國用亦卒五月以姚明恭張四知費縣人魏照乘滑縣人並為禮部尚書兼東閣大學士預機務三人皆庸劣四知尤甚薛國觀力援入閣張獻忠叛于榖城獻忠在榖城擁兵索餉不奉調遣且日肆劫奪人咸知其必叛知縣阮之鈿字實甫桐城人力言于熊文燦文燦不省洪承疇等入衛羅汝才諸賊疑見𠞰亦乞降文燦益自喜至是獻忠復叛殺之鈿毀榖城進陷房縣知縣郝景春字和滿江都人及其子鳴鸞皆死之鳴鸞力敵萬夫擊傷獻忠左足殺其所愛善馬又用間入賊壘陰識獻忠臥帳將襲擒之會指揮張三擒開門納賊入守備楊道選巷戰死景春鳴鸞及主簿朱邦聞皆被執不屈死左良玉羅岱追擊之至羅􅀈山遇伏岱被執不屈死良玉軍大敗喪士卒萬人時李自成亦出收餘衆往依獻忠獻忠欲圖之遁去時議者以李自成之遁車箱峽張獻忠之叛榖城為明所由亡而陳竒瑜與文燦其罪首云六月畿內山東河南山西旱蝗加征練餉廷臣多請練邉兵帝命楊嗣昌定議邉鎮及畿輔山東河北凡四總督十三總兵官各抽練額兵總三十七萬有竒又汰郡縣佐二設練備練總專練民兵干是𠞰餉外復增練餉七百三十萬秋八月削熊文燦官命楊嗣昌督師討賊文燦尋逮下獄帝聞榖城之變大驚逐削熊文燦官以軍中不可無帥令戴罪視事及聞左良玉敗益怒遂命嗣昌往代逮文燦下獄論死明年十月棄市嗣昌既受代乃大誓師左良玉陳洪範等畢會嗣昌以良玉有大將才其兵亦可用請拜良玉平賊將軍報可良玉既佩將軍印志寖驕遣使以書謝嗣昌嗣昌不悅庚辰十三年春二月官兵大敗張獻忠于太平明縣今屬四川逺州是時賊分為三西則張獻忠踞楚蜀界東則革裏眼左金王等四營分擾隨應麻黃南則曹操過天星等十營伏漳房興逺間楊嗣昌駐襄陽而令左良玉專𠞰獻忠及是良玉合諸軍至枸平關亦曰溝平關在興安州西南與四川接界與賊遇擊之獻忠敗走良玉乃請從漢陽西鄉入蜀追之嗣昌謀以陜西總督鄭崇儉字大章寧鄉人率賀人龍李國安從西鄉入蜀而令良玉駐兵興平别遣偏將追𠞰良玉不從時獻忠營太平縣大竹河在縣東北亦曰大竹渡其上流即北江下流至陜西紫陽縣入漢良玉駐魚溪渡未幾崇儉引其兵來會賊移軍九滚坪與下瑪瑙山俱在太平縣境見瑪瑙山險峻將據之官軍始抵山下賊已踞山巔乘髙鼓譟良玉下馬周覽者久之曰吾知所以破賊矣分所進道為三已當其二秦兵當其一曰聞鼓聲而上兩軍夾攻賊陳堅不可動鏖戰久之賊大潰墜崖澗者無算追奔四十里良玉兵斬掃地王曹威白馬鄧天王等渠魁一十六人獻忠妻妾亦被擒遁入興歸山中勢大戚夏四月逮江西巡撫解學龍字石帆楊州興化人及黃道周下獄尋遣戍道周貶江西按察司照磨時巡撫解學龍薦所部官推奬道周備至故事但下所司大學士魏照乘素惡道周擬旨責學龍濫薦帝怒立削二人籍逮下刑部獄責以黨邪亂政並廷杖八十究黨與欲置之死尚書李覺斯東莞人讞輕嚴旨切責再議謫戍煙瘴帝猶以為失出除覺斯名尚書劉澤深扶溝人言二人罪至永戍至矣過此惟論死論死非封疆則貪酷未有以建言者道周無封疆貪酷之罪而有建言蒙戮之名于道周得矣非聖主覆載之量也仍以原擬請乃謫戍廣西以謝升陳演井研人為禮部尚書並兼東閣大學士預機務演庸才寡學工結納初入館即與內侍通帝簡用閣臣每親發䇿觀所條對覘能否演結中官探得帝所問數事密授演條對獨稱旨遂被擢用五月石砫女官秦良玉敗羅汝才于夔州汝才犯夔州遇官軍屢捷會良玉至以兵邀擊連敗之斬千餘級奪汝才大纛擒其渠六人汝才走大寧宋縣今屬夔州府姚明恭罷明恭出趙興邦之門公論素不與柄用後鄉人詣闕訟之明恭不自安請告歸遂罷六月薛國觀以罪免尋遣使逮入都賜死國觀柄政一踵溫體仁所為而才智逺不逮操守亦弗如帝初甚信嚮之後意亦漸移帝憂國用不足國觀請借助于戚畹因以武清侯李國瑞為言國瑞孝定太后兄孫帝曾祖母家也國瑞薄庶兄國臣國臣憤詭言父資四十萬臣當得其半今請助國為軍資故國觀言之帝因欲盡借所言四十萬不應則勒期嚴追或教國瑞匿資勿獻拆毁居第陳什器通衢鬻之示無所有嘉定伯周奎與友連代為請帝怒奪國瑞爵國瑞悸死有司追不已戚畹皆自危會皇子病宦官宫妾倡言孝定太后已為九蓮菩薩降神言帝薄外家諸皇子盡當夭俄皇子卒帝大恐封國瑞七嵗兒存善為侯盡還所納金銀而追恨國觀待隙而發初帝嘗燕見國觀語及朝士貪婪國觀曰使厰衛得人安敢如是時東厰太監王德化在側汗出沾背于是專察國觀陰事悉以上聞國觀不知也及是行人吳昌時吳江人當考選恐國觀抑已因其門人以見國觀偽許第一當得吏科逮命下乃得禮部主事昌時大恨以為賣已與所善東厰謀盡發國觀受賄不法事以逹于帝帝遂借票擬發怒時楊嗣昌有所陳奏帝令國觀處旨下五府九卿科道會議革國觀職放歸帝怒猶未已會國觀出都重車纍纍偵事者以聞而東厰所遣伺國觀邸者值中書王陛彥至國觀向與交關執之得其平日招搖通賄狀詞所連及甚衆尚書傳永淳侍郎蔡奕琛等皆與焉詔下陛彥詔獄窮治頃之給事中袁愷聊城人復上疏再劾國觀帝以陛彥行賄有據不俟獄具即命棄市而遣使往逮國觀國觀遷延不赴久始入都遂賜死事在明年八月秋七月張獻忠與羅汝才合陷四川諸州縣初賀人龍屢破賊楊嗣昌私許人龍代左良玉而良玉適有瑪瑙山之捷嗣昌顧人龍曰須後命由是兩人皆不為用獻忠遣間説良玉曰獻忠在故公見重良玉乃圍而不攻賊得與民市鹽米芻酪收潰散西走白羊山與羅汝才合時曹操過天星方窺大昌注見前巫山欲渡江為官兵所扼獻忠至遂與之合獻忠雖纍敗氣益甚立馬江岸有不前者輒斬之賊爭死鬭官軍退走賊畢渡屯萬頃山歸巫大震先是嗣昌以川地扼塞合羣賊而蹙之可盡殄及是聞羣賊已聚蜀界乃自彛陵溯舟而上而獻忠勢已張甚曹操過天星等東西奔突官軍往來追逐不能及獻忠遂陷大昌進屯開縣宋州明為州今縣屬夔州府張令永寧降將戰死秦良玉亦敗賊遂北陷劍州將入漢中總兵趙光逺賀人龍扼之平陽百丈俱關名注見前賊不得過乃走巴西屠綿州越成都陷瀘州復至開縣嗣昌在重慶三檄人龍會師又九檄召良玉兵皆不至九月李自成走鄖均遂入河南先是楊嗣昌在彛陵檄自成出令降自成出嫚語官軍圍之魚復山中古魚復縣因山為城所謂赤岬山也在夔州府奉節縣東自成大困時賊將多出降自成欲自經以養子雙喜勸而止有劉宗敏者藍田煆工也最驍勇亦欲降自成知之與步入叢祠顧而歎曰人言我當為天子盍卜之神不吉若斷我頭以降宗敏諾遂三卜三吉宗敏還殺其兩妻謂自成曰吾死從若矣軍中壯士聞之亦多殺妻子願從者會巡撫邵捷春移置戍兵圍者懈自成乃自焚輜重輕騎由鄖均走河南河南大旱斛榖萬錢飢民從自成者數萬遂自南陽出攻宜陽殺知縣唐啓泰移攻永寧殺知縣武大烈臨潼人拒守三晝夜城陷與主簿魏國輔教諭任維清守備王正已百戶孫世英皆死之戕萬安王采􅀈伊王支屬居永寧攻偃師一日而陷知縣徐日泰金溪人罵賊死自成于是勢大熾祀縣舉人李信者逆案中尚書李精白子也嘗出粟賑飢民民德之曰李公子活我會繩伎紅娘子反虜信強委身焉信逃歸官以為賊囚獄中紅娘子來敕飢民應之共出信往歸自成約為兄弟改名巖盧氏舉人牛金星磨勘被斥私入自成軍為主謀議金星又薦卜者宋獻䇿獻策長三尺餘上讖記曰十八子主神器自成大悅自成猜忍好殺巖因説曰取天下以人心為本請勿殺人收天下心自成從之屠殺為減又散所掠財物賑飢民民受餉者不辨巖自成也雜呼曰李公子活我巖復造謡詞曰迎闖王不納糧使兒童歌之以相煽動民方被𠞰餉練餉之苦從自成者日益衆矣冬十一月南京地震十二月兩畿山東河南陜西山西飢人相食辛巳十四年春正月官軍追張獻忠于開縣敗績獻忠遂東犯先是楊嗣昌駐重慶監軍評事萬元吉字吉人南昌人知左良玉跋扈不可使又慮賊或東突不可無備勸嗣昌令前軍躡賊後軍繼之分中軍從間道出梓潼扼其歸路嗣昌不聽時嗣昌下令赦羅汝才罪降則授官惟獻忠不赦擒斬者賞萬金爵侯翊日自堂皇至庖湢遍題有斬督師者賚白金三錢嗣昌駴愕疑左右皆賊勒三日進兵會雨雪道斷遂復戒期乃自統舟師下雲陽令諸將陸行追賊及開縣之黃陵城在縣東總兵猛如虎參將劉士杰迎戰士杰深入所當披靡獻忠登髙望見無秦人旗幟而良玉前部無鬬志乃密選壯士潛行箐谷口乘髙大呼馳下良玉兵先潰如虎突圍出士杰與逰擊郭開皆戰死嗣昌方悔不用元吉言而獻忠已席捲出川下夔門抵興山絶新開驛置楚蜀消息中斷李自成陷河南府殺福王常洵先是援兵過洛陽者喧言先帝困天下以肥王今王府金錢山積乃令吾輩枵腹死賊尚書吕維祺方家居勸王散財餉士不從及是賊大至總兵陳紹禹等入城守禦紹禹親軍從城上呼賊相笑諾揮刀殺守堞者燒城樓開北門納賊常洵縋城出匿迎恩寺明日賊迹而執之遂遇害世子由嵩裸而逃維祺被執不屈死同時以鄉官死難者待詔郭顯星推官黨克念知縣劉方奕皆洛陽人以舉人死難者洛陽張民表嵩縣王翼明以布衣死難者孟津孫挺生新安馬明山李登英賊既殺王勺其血雜鹿肉以食曰福祿酒火王宫散金以賑飢民乘勝圍開封周王恭枵定王橚十世孫急發庫金募死士與巡按髙名衡沂水人及副將陳永福等固守自成攻七晝夜不克解去本朝按吕維祺賜諡忠敬二月張獻忠陷襄陽殺襄王翊銘憲王瞻墡六世孫嗣昌以襄陽為軍府餉金甲器各數十萬皆聚焉每門設副將防守啓閉甚嚴及是獻忠令羅汝才綴鄖陽兵自率輕騎一日夜馳三百里殺嗣昌使者于道取其兵符以二十八騎紿入襄陽城時襄陽未知敗問合符信遂納之夜半火從中起城陷賊縳翊銘屬巵酒曰吾欲借王頭使嗣昌以陷藩伏法遂與貴陽王常法同遇害參議張克儉字禹型屯留人推官鄺曰廣南海人逰擊黎民安金溪人等死之獻忠因得其所失妻妾居二日乃去陷樊城當陽復與羅汝才合入光州殘商城知縣盛以恆竭力守禦城陷及其孫覺教諭曹惟禎典史吕維顯皆不屈死邑紳士殉難者則有削籍副都御史楊所修副使洪引徵行取知縣馬綱中侯選教官段增輝舉人余容善諸生盧詔德黃焯陳廷對廷璋鄭光啓劉澤長楊士琦皆罵賊死所修黨魏忠賢麗名逆案及是死節盛以恆潼關衛人三月楊嗣昌自殺嗣昌旋師至荆州沙市鎮名注見前聞襄陽洛陽皆陷憂懼不食死以丁啓睿為督師啓睿本庸才憚李自成不敢討聞張獻忠在固始稍弱請專𠞰獻忠從之夏五月范復粹罷薛國觀罷後復粹為首輔御史魏景琦劾其與張四知學淺才疏伴食中書貽譏海內帝以妄詆下之吏至是洛陽陷帝詔對廷臣語及福王被害泣下復粹曰此天數帝曰雖天數亦賴人事挽回復粹等慚不能對尋致仕去秋七月洪承疇援錦州次松山我大清兵圍錦州久環城列炮刈附近禾稼復分兵義州屯田城中屢出兵皆敗還前後斬獲無算太宗文皇帝以書諭祖大夀降大夀不答洪承疇調馬科吳三桂等凡八大將兵十三萬進次松山我太宗文皇帝聞之親率大軍陳于松山杏山之間橫截大路承疇等懼以數千騎略陳旋敗走伺大軍還則遣兵從後追襲相距百步我太宗文皇帝復令轉戰張黃蓋率數人指揮布陳士卒望見皆披靡王朴吳三桂等遂夜遁去大軍往來截擊承疇等軍士皆奔竄四出自杏山迤南沿海至塔山一路赴海死者不可勝計曹變蛟走入松山與承疇堅守帝命順天巡撫楊繩武總督遼東寧逺諸軍往援臨清運河涸京師大疫八月左良玉敗張獻忠于信陽獻忠自商城疾趨犯信陽知州尚孝志訓導李逢旭陳所聞邑進士張應宿皆死之羅山固始泌陽諸州縣羣盜附者萬計遂東肆略獻忠自瑪瑙山之敗心畏良玉及屢勝頗有驕色至是良玉追擊至信陽大破之降賊衆數萬獻忠被重創乘夜東奔良玉急追之會大雨江溢道絶官兵不能進獻忠走免已復出商城將向英山又為副將王允成所破衆散且盡所從止數十騎時羅汝才以先與自成合獻忠遂因以投自成自成欲以部曲遇之獻忠不從自成欲殺之汝才曰不如留之使擾漢南分官軍兵力陰與獻忠五百騎曰急東走此地非若所當留也因遁去道糾土賊一斗榖瓦罐子等勢復盛九月陜西總督傳宗龍字仲綸昆明人軍潰于新蔡死之以汪喬年字嵗星遂安人為總督自成陷河南勢大盛帝以故尚書傅宗龍總督陜西别敕保定總督楊文嶽字斗望南充人會師宗龍馳入關與巡撫汪喬年調兵兵已發盡乃檄河南大將李國竒賀人龍兵𨽻麾下急出關次新蔡遇伏人龍先走國竒及虎大威繼之宗龍與文嶽合兵結營保兵宵潰走陳州宗龍穿塹守八日矢石俱盡夜半潰圍走被執死賊屠項城商水扶溝陷葉縣圍左良玉于郾城帝乃擢喬年為總督召周延儒賀逢聖復入閣初延儒里居頗從東林逰善姚希孟字孟長吳縣人羅喻義既陷錢謙益遂讐東林及主會試所取士張溥馬世竒字君常無錫人等又皆東林也歸後失勢心內慙而體仁益橫比體仁去後張至發薛國觀相繼當國與楊嗣昌等並以媢嫉稱一時正人若劉宗周鄭三俊黃道周等皆得罪漙等憂之説延儒曰公若再相易前轍可重得賢聲延儒以為然溥友吳昌時為交關近侍馮銓復助為謀會帝亦頗思延儒而國觀適敗至是因與賀逢聖復召入閣溥等因以數事要之延儒慨然曰吾當鋭意行之以謝諸公既入朝悉反體仁輩弊政首請釋漕白糧欠戶蠲民間積逋凡近兵殘嵗荒地減見年兩稅蘇松常嘉湖諸府大水許以明年夏麥代漕糧及召還言事遷謫諸臣李清字映碧春芳五世孫等帝皆欣然從之冬十月癸卯朔日食十一月李自成陷南陽殺唐王聿鏌聿鍵弟總兵猛如虎死之如虎隨楊嗣昌下荆州詔移駐南陽自成來攻如虎慿城拒戰殺賊數千及城陷猶短兵大呼衝擊血盈𫀆袖北面叩頭謝帝自稱力竭遂被害參政艾育初字孩如米脂人知府邱懋素知縣姚運熙館陶人等皆死之參將劉士傑逰擊郭開主簿門迎思訓導楊氣開俱死賊連陷鄧州等十四城再攻開封髙名衡及陳永福竭力拒守永福射中自成一目自成退屯朱仙鎮初汪喬年撫陜西奉詔發自成先塜米脂令邉大綬調得其族人為縣吏者掠之言去縣二百里為李氏村在亂山中十六塜聚葬中一塜自成始祖也相傳穴為仙人所定壙中有鐵燈檠曰鐵燈不滅李氏當興如其言發之有螻蟻數石火光熒熒然斫棺骨青黑色黃毛被體腦後一穴大如錢中蟠赤蛇長三四寸有角見日而飛髙丈許口吞日色咋咋者六七反乃伏喬年函顱骨并臘蛇以聞及是自成被射中目邉大綬任邱人壬午十五年春正月起孫傳庭為兵部侍郎督京軍援開封李自成圍開封益急開封故宋汴都金人重築厚數丈賊用火攻法于城壞處實藥甕中火然藥發當輒糜碎名曰放迸城土堅火迸皆外擊賊騎多殱自成駭而去南陷西華尋屠陳州副使關永傑字人孟鞏昌衛人知州侯君耀字際明成安人鄉官崔泌之鹿邑人舉人王受爵俱罵賊死歸德睢州寧陵太康數十郡縣悉被殘燬商邱知縣梁以梓全家殱焉已復還攻開封為持久計詔釋傅庭于獄特召見奬勞甚至命督京軍赴援二月陜西總督汪喬年軍潰于襄陽死之初秦中精鋭盡沒于項城喬年集散亡得馬步三萬使賀人龍等分將之攻賊老寨于襄陽自成解郾圍來救人龍等不戰而走軍大潰喬年收步卒二千入城拒守賊盡鋭攻五晝夜城陷喬年被執罵賊死賊惡諸生劉漢臣等助城守劓刖幾二百人時左良玉藉口勦張獻忠不赴援帝方命孫傳庭救開封傳庭兼程馳赴會喬年敗沒人龍潰入關中帝即命傳庭往代且密諭誅人龍傳庭至乃數其開城譟歸新蔡襄城連喪二督罪斬之而撫定其部曲我大清兵克松山洪承疇降遂下錦州松山圍久食盡督師范志完虞城人不能救吳三桂遣卒尾大軍後復敗走會松山副將夏承德遣子為質約日獻城大軍如期攻之城遂拔巡撫邱民仰字長白渭南人總兵官曹變蛟等死之承疇與總兵祖大樂皆降寧縣關門徑卒盡喪錦州城內糧亦盡人相食祖大夀戰守計窮又聞松山已失遂率所部以城降杏山塔山皆下大夀尋以病卒帝論諸逃將罪誅王朴鐫吳三桂三秩時諸將多擁厚資賂權要故朴以外皆獲宥時敗書聞或傳承疇已死帝驚悼甚詔設壇都城賜承疇祭十六民仰六尋命建祠都城外承疇民仰並列將親臨奠已聞承疇降乃止三月魏照乘罷照乘居位四年御史徐殿臣劾其昵妾棄妻縱壻為姦諸醜迹照乘猶欲辨御史劉之勃字安侯鳯翔人復論之遂引疾而歸夏四月謝升罷初我太宗文皇帝屢遺書議和兵部尚書陳新甲以國內困敝亦請主和以紓患密遣職方郎中馬紹愈等持書乞和我太宗文皇帝宴勞有加禮仍授以書令還報遣人送至連山而還其事甚密一日新甲私告傳宗龍宗龍以語謝升升後見疆事大壞于帝前述宗龍之言帝慙升進曰倘肯議和和亦可恃帝默然已而言官謁升升言上帝主和于是言官交章劾升帝怒其泄漏削籍去新甲亦由此得罪初帝密以和議委新甲手招往返者數十皆戒以勿泄一日馬紹愈以密語報新甲視之置几上其家僮悮以為塘報付之抄傳于是言路譁然論劾新甲不引罪反詡已功遂詔下獄尋棄市五月以鄭三俊為吏部尚書周延儒言于帝以老成名德不可輕棄請召三俊復故官會吏部尚書李日宣字晦伯吉水人以會推閣臣得罪日宣等列蔣德璟黃景昉等名以上帝命再推復上房可壯等三人大僚不獲推者為流言入內帝深惑之特御中左門召日宣及與推諸臣責日宣徇情濫舉命錦衣官褫冠帶就執羣臣皆股栗失色遂下日宣刑部擬戍與推之臣亦有被罪者人蔣德璟字申葆黃景昉字太䙙俱晉江即命三俊代之延儒又請以劉宗周長都察院范景文長工部倪元璐左兵部皆起自廢籍其他李邦華張國維徐石麟字寶摩嘉興人等皆復官布滿九列中外翕然稱延儒為賢延儒嘗偕同列燕侍帝語及黃道周時道周方謫戍辰州延儒曰道周氣質少偏然學與守皆可用同列因請移戍道周近地延儒曰上欲用即用之耳何必移戍帝頷之即日復道周官張獻忠陷廬州起馬士英貴陽人總督廬鳯軍務初汴圍急督師丁啓睿及左良玉往援獻忠乘間陷亳州入英霍至是復糾别賊陷舒城據之教諭楊廷璧與在籍編修胡守恆協力嚴守至三晝夜城陷被執罵賊死廷璧字荆璞江都人守恆字見可連陷廬州通判趙興其經歷程元綬指揮趙之璞皆力戰死興基太和人含山巢廬江無為六安諸州縣南京大震詔逮鳯陽總督髙斗光起馬士英代之士英初巡撫宣府取公帑饋朝貴坐遣戍至是禮部侍郎王錫衮祿豐人薦其知兵周延儒力贊之遂自戍所起用六月賀逢聖張四知罷以蔣德璟黃景昉吳甡並為禮部尚書兼東閣大學士預機務先是李日宣雖被譴德璟景昉甡三人已先有旨入閣德璟等以日宣故叩辭新命因言臣等並在會推中若諸臣有罪臣等豈能安及是三人召對稱旨遂並入直秋七月左良玉兵潰于朱仙鎮諸鎮皆潰開封圍急帝命良玉赴援楊文嶽合虎大威楊德政方國安及良玉四鎮兵次朱仙鎮良玉見賊盛一夕拔營走襄陽諸軍皆潰九月李自成決河灌開封城陷髙名衡議決朱家寨口在開封府城西北十七里河灌賊賊偵知之遂營髙阜亦驅難民數萬決河河水自北門而入貫東南門出奔聲如雷城中百萬户皆蕩盡得脫者惟周王妃世子及撫安以下不及二萬人賊亦漂沒萬餘乃拔營去時孫傅庭方治軍關中帝以開封急屢趣之出關傅庭言秦兵新募不堪用不聽不得已抵關而開封既陷急攻賊于南陽敗之追奔三十里至郟縣三塜頭賊棄甲仗軍資于道官軍趨利遂為所乘大潰傳庭乃走入關是役也天大雨糧不至士卒採青柿以食凍且餒故大敗豫人因謂之柿園之敗冬十一月我大清兵入薊州連下畿南山東州縣時關內外並建二督又設二督于昌平保定又有寧逺永平順天保定密雲天津六巡撫寧逺山海中協西協昌平通州天津保定八總兵星羅碁布無地不防而事權反不一警報至急徴諸鎮入援而我大清兵已克薊州分道南嚮河間以南多失守至山東連下兖州等府凡攻克八十八城魯王以派荒王檀十世孫自殺樂陵陽信東原安邱等諸郡王皆死當是時畿輔山東列城官吏或望風遁走或獻金帛迎降其死于戰守及紳士之殉節者畿輔則霸州副使趙輝督守給事中周而淳同知丁師羲鄉官參政李時茪河間參議趙珽知府顔允紹同知姚汝明知縣陳三接解職知府傅梅順德知府吉孔嘉趙州知州王端冕教諭陳廣心訓導王一統定州知州唐鉉阜城知縣吕大成永清知縣髙維岱典吏李時正教諭邱飬性鄉官劉維蕙清豐教諭王一貞鄉官郎中李其汜等山東則臨清總兵官劉源清𣙜關主事陳興言同知路如瀛州判徐應芳吏目陳龍翔鄉官侍郎張宗衡少卿張振季員外郎邢泰告知縣尹任天津參將賀乘鉞兖州魯府長史俞起蛟副使王維新知府鄧藩錫副總兵十文明鄉官給事中范淑泰登萊僉事邢國璽萊陽鄉官宋玫沈迅臨淄知縣文昌時陽信知縣張卿滕縣知縣吳良能豐縣知縣劉光先等並附注于此人趙輝字黃如河津人周而淳掖縣人丁師羲楚雄趙珽慈溪人顔允紹字廣明曲阜人姚汝明夏縣人陳三接文水人傅梅邢臺人吉孔􅖤洋縣人王端冕字服先江陵人陳廣心元城人王一統成安人唐鉉字節玉睢州人髙維岱昌邑人劉源清劉澤弟路如瀛陵川人徐應芳臨州人陳龍翔蕭山人俞起蛟錢塘人鄧藩錫字晉伯金壇人范淑泰字通也滋陽人邢國璽長葛人文昌時全州人吳良能益州人閏月李自成陷汝寧前總督侍郎楊文嶽等死之自成并合羣賊先是馬守應稱老􅉰􅉰賀一龍稱革眼賀錦稱左金王劉希光稱爭世王養成稱亂世王號革左五營至是俱歸自成連營五百里再屠南陽進攻汝寧總兵虎大威中炮死城遂陷文嶽被執大罵賊賊縳之城南以大炮擊殺之兵備僉事王世宗字仲發逹州人知府傅汝為字于宣江陵人通判朱國寶成都人副將賈悌參將馮名聖汝陽知縣文師頤全州人等亦俱不屈死時河南郡邑無不殘破朝廷不復設官遺黎多結寨自保大者洛陽李際遇汝寧沈萬登南陽劉洪起兄弟衆各數萬諸小寨附之或降賊或受朝命復互相吞併中原禍亂于是為極逮明年帝下詔蠲租赦罪已不可為矣下給事中薑埰字如農萊陽人行人司副熊開元字魚山嘉魚人于錦衣獄尋遣戍先是有造為二十四氣之説以指朝士二十四人其言直達御前及是帝適下詔戒諭百官責言路尤切埰疑帝已入其説乃上言陛下視言官獨重故責之獨嚴如聖諭所云代人規卸為人出缺者臣豈敢謂盡無其事然陛下何所見而云然倘如二十四氣蜚語騰播清禁此必大姦巨憝欲激至尊之怒箝言官之口將來誰復為陛下言天下事者臣區區之愚不獨為言官職掌更為朝廷清治亂之源也是時帝憂勞天下至默告上帝戴罪省愆所頒戒諭詞旨痛切而埰顧反覆詰難若深疑于帝者帝遂大怒曰埰敢詰問詔旨藐玩特甚立下詔獄考訊而時又有熊開元事開元欲論周延儒屢請召對及入見延儒同在不敢言一日帝御德政殿秉燭獨坐開元從輔臣入奏言易稱君不密則失臣臣不密則失身請輔臣暫退延儒等引退帝不許帝疑開元意有所為詰問者久之開元但言小臣面奏而大臣皆在左右誰敢為異同之論以速禍帝不懌命之退延儒等請令補牘從之開元本欲盡發延儒罪以其在側不敢言而延儒慮其補牘陰令吳昌時沮之昌時開元令吳江時所拔士及奏上不更及延儒他事帝大怒命錦衣衛逮治衛帥駱養性開元鄉人也素怨延儒令盡發延儒之隱以聞帝益怒甚令養性潛斃埰及開元于獄飬性懼商之同官不敢即奉命已而語泄有奏之帝者會帝意已漸解逮埰開元至午門並杖一百移刑部定罪已皆遣戍埰宣州開元杭州方埰開元下獄時或謂延儒當救不從既而劉宗周以救二人削籍徐石麟又以救宗周罷去延儒竟無一言癸未十六年春正月李自成陷承天自成初無逺圖所得城邑輒焚燬棄去及灌開封敗秦軍羣賊咸附乃脅崇王由匱簡王見澤六世孫使從軍陷荆襄諸郡殺湘陰王儼􅀈遼王支屬遂犯承天焚獻陵陵中有聲震山谷自成懼而止巡撫宋一鶴宛平人總兵錢中選留守孫夀崇宣城人有容子副使張鳯翥知府王璣扶風人鍾祥令蕭漢字雲濤南豐人等皆死之徇下旁近州縣自號奉天倡義大元帥稱羅汝才代天撫民威德大將軍初自成善攻汝才善戰兩人相須若左右手及是自成兵強士附有専制心顧獨忌汝才乃召汝才所善賀一龍宴縳之晨以二十騎斬汝才于帳中悉并其衆于是謀以荆襄為根本改襄陽曰襄京修襄王宫殿居之僭號新順王又以牛金星言創設官爵名號置五營二十二將上相左輔右弼六政府有侍郎郎中從事等官要地設防禦使府曰尹州曰牧縣曰令崇王由匱等俱封伯官吏降者並授偽職自成每陷城邑令軍士母得室處寢興悉用單布幕綿甲堅厚矢炮不能入一兵倅馬三四匹冬則以裀褥藉其蹄剖人腹為馬槽見人輒鋸牙思噬騰山巔直上水惟憚黃河若淮泗涇渭則萬衆翹足馬背或抱鬛緣尾呼風而渡臨陳列馬三萬名三垜墻前者返顧後者殺之戰久不勝馬兵佯敗誘官軍步卒長鎗三萬擊刺如飛騎兵回擊無不大勝攻城迎降者不殺守一日殺十之一二二日殺十之七三日屠之凡殺人尸束為燎謂之打亮城將陷步兵環堞下馬兵巡徼無一人得脫者獻忠雖至殘忍不逮也二月乙丑朔日食夏四月我大清兵北還周延儒自請督師許之時大清兵自山東還至近畿帝憂甚大學士吳甡方奉命辦流寇延儒度不得已遂自請視師帝大喜奬以召虎裴度賜章服白金文綺上駟給金帛賞軍延儒駐通州不敢戰惟與幕下客飲酒娛樂而日騰章奏捷及大清兵至懷柔趙光抃字彥清德化人合唐通白廣恩等八鎮兵邀戰于螺山在懷柔縣北皆潰總兵張登科和應薦敗沒延儒偵大清兵已還乃言兵退請下兵部議將吏功罪遂歸京師五月以魏藻德順天通州人為少詹事兼東閣大學士預機務藻德時官修撰庚辰殿試第一長于辨説應對捷給先是都城戒嚴疏陳兵事又召對稱旨帝意其有抱負遂擢至政府去釋褐甫四年也既入閣一無建白但倡議令百官捐助而已吳甡罷初帝以襄陽荆州承天連陷召對廷臣隕涕謂甡曰卿向歷巖疆可往督湖廣師甡請得精兵三萬自金陵趨武昌扼賊南下帝以所需兵多猝難得集南京隔逺不必退守甡奏言左良玉跋扈甚前督師楊嗣昌九檄徴兵一旅不發臣不如嗣昌而良玉踞江漢甚于曩時臣節制不行徒損威重南京從襄陽順流而下窺伺甚易宜兼顧非退守也帝乃令兵部速議發兵尚書張國維請以總兵唐通馬科及京營兵共一萬吳甡又言此兵方北征俟撤備後始可調帝命姑俟之甡屢請帝曰徐之撤備則兵自集卿獨往何益踰月周延儒出督師朝受命夕啓行蔣德璟等譏甡畏賊遲回而兵部所撥唐通兵陳演又以關口不可無備請留之甡不得已以五月辭朝先一日帝猶命中官賜銀牌給賞越宿忽下詔責其逗遛命輟行入直甡惶恐引罪遂許致仕既行陳演等復搆之徴至議罪遣戍金齒周延儒罷延儒自通州回帝大加奬勞居數日掌錦衣衛事駱養性盡發所刺軍中事養性本延儒所薦背延儒與中官結及是以軍中事與中官並發之帝大怒責廷儒蒙蔽推諉下廷臣察議延儒席藳待罪自請戍邉帝猶降溫旨許馳驛歸自延儒再相帝尊禮特重嘗于嵗首日東向揖之曰朕以天下聽先生因遍及諸閣臣然延儒實庸駕無他材略當邉境喪師李自成殘掠河南張獻忠蹂躪楚蜀天下大亂延儒一無所謀盡任其自敗而已性故貪黷會張溥已卒馬世竒以逺嫌不至左右無正言所信用惟吳昌時與門下客盛順董廷獻輩因緣為姦利故敗張獻忠陷武昌沉楚王華奎于江前文淵閣大學士賀逢聖等死之獻忠方襲陷太湖聞左良玉避自成東下盡撤湖廣兵自從遂趨陷黃梅連陷廣濟蘄州蘄水入黃州黃民盡逃乃驅婦女剷城尋殺之以填塹又西陷漢陽武昌及旁近屬邑執楚玉華奎籠而沉諸江長史徐學顔字君復永康人參將崔文榮海寧衛人俱戰死逢聖方家居載家人至墩子湖鑿舟沉之妻危氏子覲明光明子婦曾氏陳氏孫三人皆從死福王時追贈逢聖少傳諡文忠賊乃盡殺楚宗室録男子二十以下十五以上者為兵餘皆殺之由鸚鵡洲至道士洑浮胔蔽江踰月人脂纍寸魚鱉不可食見鸚鵡洲道士洑注俱前獻忠遂僭號改武昌曰天授府江夏曰上江縣據楚王第鑄西王之寶偽設尚書都督巡撫等官開科取士下令發楚邸金賑飢民蘄黃等二十一州縣悉附時官紳士庶死節者通判李育英武昌衛經歷汪文熙巡檢戴良瑄及黃岡諸生馮雲路汪延升江夏諸生明睿熊雯大冶尹如翁嘉魚知縣王良鑑蒲圻知縣曾栻等又巡江都司朱士鼎者城陷被執戟守罵賊賊斷卒其兩手不死賊退令人縳筆于臂能作楷字招集舊訓練如常鼎李育英固安人王良鑑霍山人曾栻臨川人朱士字玉節休寧人按賀逢聖本朝賜諡忠慤六月雷震奉先殿遣官告太廟敕羣臣修省秋七月京師大疫自二月至是月死者無算詔釋輕犯發帑療治瘞五城暴體八月張獻忠陷湖南諸郡左良玉遂復武昌獻忠既僭號武昌李自成在襄陽聞之忌且怒貽書譙責會左良玉復西上偽官吏多被擒殺獻忠乃悉衆趨湖南于是沔陽蘄黃漢陽諸州府皆反正良玉乃乘間入武昌立軍府以駐師獻忠遂陷嶽州欲渡洞庭湖卜于神不吉投珓而詢將渡風大作獻忠怒連巨舟千艘載婦女焚之水光夜如晝騎而逼長沙巡按劉熙祚字仲緝武進人奉吉王名慈煃簡王見浚七世孫惠王名常潤走衡州長沙衡州繼陷吉王惠王桂王名常瀛俱走永州獻忠乃拆桂王府殿材載至長沙造偽殿而自追三王于永熙祚命中軍護三王入廣西身入永死守城陷見殺獻忠又陷寶慶常德發故督師楊嗣昌祖墓斬其尸見血欲攻辰州土司以兵塞辰龍關名在沅陵縣乃移攻道州守備沈至緒戰殁其女再戰奪父尸還城獲全遂東犯江西陷吉安袁州建昌撫州諸府及廣東南韶屬城官民盡逃時賊有獻計取吳越者獻忠忌良玉在不聽乃決䇿入川中冬十月李自成寇潼關總督孫傳庭死之遂陷西安延安諸郡當是時十三家七十二營諸大賊降死殆盡惟自成與張獻忠存而自成在襄陽尤徑議兵所向從事顧君恩言關中山河百二宜先取之建立基業然後旁略三邉資其兵力攻取山西以向京師此上䇿也自成從之初孫傅庭之敗于柿園而歸也力主固守潼關控扼上遊益募壯士繕器積粟置火車三萬輛俟賊間而擊之適關中嵗飢苦征繕士大夫日望其出關咸上章催戰帝亦屢詔趣之傅庭不得已率師東出拔寶豐唐縣至郟縣自成以萬騎迎戰大敗幾獲之會天大雨道濘糧車不進自成遣輕騎出汝州要截糧道傅庭乃分軍為三令白廣恩從大道髙傑親隨從間道迎糧陳永福守營傳庭既行永福兵亦爭發不可禁遂為賊所躡至南陽傅庭還戰賊陳五重官軍克其三已而稍却火車奔騎兵亦大奔賊縱鐵騎踐之傅庭大敗自成空壁逐利一日夜踰四百里官軍死者四萬餘人失亡兵器輜重數十萬傅庭奔河北轉趨潼關傑廣恩從之賊遂至傑曰我軍家屬悉在關中不如徑入西安慿堅城固守傅庭曰賊一入關則全秦糜沸秦人尚為我用乎不聽已而自成攻關廣恩戰敗傳庭登陴固守賊分兵從山後繞出其背關城遂陷傅庭躍馬揮刀大呼衝入賊陳與監軍副使喬遷髙定襄人同戰死賊遂陷華陰渭南知縣楊暄死之鄉官尚書南企仲年八十二罵賊不絶口遂遇害企仲族子尚書居益子主事居業皆被執不屈加炮烙而死居楊暄髙平人南益字思受連破華商商雒道黃世清一門遇害其僕唐世鳯罵賊不屈死海黃世清字澄滕縣人臨潼攻西安守將王根子開門降自成入秦王宫執秦王存樞愍王樉九世孫授偽官授權將軍妃劉氏死之巡撫馮師孔字若魯原武人以下死者十餘人師孔及按察使黃絅俱投井死秦府長史章尚絅自經死長安知縣黃從義指揮崔爾逹亦皆赴井死鄉官都御史焦源溥罵賊支解死其兄都御史源清不屈死僉事王徴絶食死參政祝萬齡投繯死時傳庭妻張氏在西安率三妾二女同赴井死強黃絅字季侯光州人章上絅會稽人吳從義字裕浙江山隂人焦源漙字涵一原清字湛一皆三原人王徴字葵心涇陽人祝萬齡咸寧人布政使陸之祺平湖人等皆降自成屢陷名城大吏未有降者自之祺始自成乃改西安曰長安稱西京賜顧君恩女樂一部賞入關䇿也大發民修長安城開馳道閲兵渭橋鉦鼓震天地諸將白廣恩陳永福等皆降永福以先射中自成目據山巔不敢下自成折箭為誓招之乃降惟髙傑以竊自成妻故走延安為李過所追折而東復渡宜川河絶蒲津以守自成兵所至屬城風糜乃詣米脂祭墓向為官軍所發焚棄其遺胔自成乃築土封之改延安府曰天保府米脂曰天保縣清澗曰天波府鳯翔不下屠之以偽檄誘降榆林亦不下自成大發兵攻之兵備副使都任字宏若祥符人督餉員外郎王家祿黃岡人里居總兵官王世欽尤世威世祿等集衆城守血戰七晝夜婦人孺子皆發屋瓦擊賊城陷無一降者忠烈為天下最賊遂乘勝降寧夏屠慶陽韓王稟塉憲王松十世孫被執副使段復興字仲芳陽榖人一門死之知府董琬里居少卿麻禧皆不屈死移攻蘭州巡撫林日瑞字浴元詔安人等亦皆死同時死節者副將郭天吉總兵官馬爌中軍哈維新姚世儒同知藍臺鄉官羅俊傑趙官等進陷西寧甘肅于是三邉皆沒又遣别將渡河陷平陽殺宗室三百餘人帝遣副將熊通往援通至降于賊并為賊説總兵周遇吉遇吉斬之傳首京師周遇吉錦州衛人按孫傳庭諡忠靖尤世諡忠剛俱本朝賜十一月以吏部侍郎李建泰曲沃人副都御史方嶽貢榖城人並以原官兼東閣大學士預機務建泰先官祭酒頗著聲望尋佐吏部及是黃景昉罷九月致仕命與嶽貢俱以本官入直嶽貢以督漕參議召對稱旨時授副都御史故事閣臣無冠都御史者嶽貢一人而已十二月周延儒以罪逮至賜死初延儒薦用侯恂商邱人范志完督師皆僨事又任選郎吳昌時交通內侍把持朝局延儒既去山東僉事雷縯祚太湖人劾志完縱兵淫掠御史蔣拱辰劾昌時贓私巨萬交通中官漏泄機密詞皆連延儒帝親鞫志完昌時于中左門折昌時脛察其事皆有迹乃下獄論死始有意誅延儒初薛國觀賜死人皆謂昌時致之其門人魏藻德新入閣有寵恨昌時甚因與陳演共排延儒駱養性復騰蜚語帝遂命盡削延儒職遣提騎逮入京師時舊輔王應熊被召延儒知帝怒甚宿留道中俟應熊先入冀為請帝知之應熊既抵京命之歸未幾應熊請老許之延儒至安置正陽門外古廟上疏乞哀不許法司以戍請同官申救皆不許及是志完昌時棄市勒延儒自盡籍其家御批歷代通鑑輯覽卷一百十五

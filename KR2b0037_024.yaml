  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_024-1a, image: WYG0335/WYG0335-0650a.png}
body:
  text: 初固自知不免遣三子歸鄉里幼子燮年十三姊文姬為同郡趙伯英妻密與二兄基兹基字憲公兹字季公並為長吏聞固䇿免並棄官亡歸巴漢謀豫匿夑託言還京師人不之覺有頃難作州郡收基兹于郾城皆死獄中文姬乃告父門生王成曰君執義先公有古人之節今委君以六尺孤李氏存滅其在君矣成乃將夑乘江東下入徐州界變姓名為酒家傭而成賣卜於市各為異人隂相往來夑從受業專精經學積十餘年梁冀既誅大赦天下求固後嗣夑乃還鄉里追行喪服姊弟相見悲感旁人姊戒夑曰吾家血食將絶弟幸而得濟宜杜絶衆人勿妄往來慎無一言加于梁氏加梁氏則連主上禍重至矣燮從其誨後成卒燮以禮葬之每四節為設上賔之位而祠焉燮後為議郎擢河南尹卒於位單超卒劉友益書法超宦者書卒病漢也故削其官賜超東園祕器棺中玉具及葬發五營騎士將作大匠起冡塋其後四侯轉橫天下為之語曰左回天具獨坐徐卧虎唐兩墮章懷注持兩端而任意為兩墮皆競起第宅以華侈相尚兄弟姻戚宰州臨郡辜較集覽辜罪較與𣙜通專也言已自專之他人取者輒罪也百姓與盜無異虐遍天下民不堪命故多為盜賊焉左悺兄為河東太守皮氏長趙岐恥之即日棄官西歸唐兄炫為京兆尹收岐家屬宗親陷以重法盡殺之岐逃難四方自匿姓名賣餅北海市中孫嵩見而異之載與俱歸藏於復壁中及諸唐死遇赦乃敢出故趙岐字邠卿京兆長陵人初名嘉字臺卿後避難改名字孫嵩字賔石北海安邱人閏月西羌寇張掖段熲破降之先是燒當等八種羌叛寇隴右護羌校尉段熲擊破之至是餘衆復與燒何大豪寇張掖晨薄熲軍熲下馬大戰至日中刀折矢盡虜亦引退熲追之且鬬且行晝夜相攻割肉食雪四十餘日遂至積石山注見前出塞二千餘里斬燒何大帥降其餘衆而還是年冬羌圍允街熲又破之府允街漢縣故城在今甘肅凉州平番縣允音鉛夏五月漢中山崩泰山賊殺都尉以皇甫規為太守討平之時泰山賊勞丙等復叛其黨叔孫無忌攻殺都尉侯章遣中郎將宗資字叔都南陽安衆人討之未服規到官廣設方略寇賊悉平辛丑四年春二月武庫火夏四月以劉矩字叔方沛國蕭人為太尉黃瓊免以矩代初矩為雍邱令以禮化民民皆感悟自革有訟者常引之於前提耳訓告以為忿恚可忍縣官不可入使歸更思訟者感之輒各罷去五月有星孛於心六月地震岱山即泰山及博後漢縣故城在今山東泰安府泰安縣尤來山即徂徠山在泰安府東南裂秋七月減百官俸貣集覽貣本作貸音待從人求物也王侯半租賣關內侯以下官九月以劉寵字榮祖東萊牟平人為司空寵嘗為㑹稽太守除煩苛禁非法郡中大治被徵有五六老叟人齎百錢送寵曰山谷鄙生未嘗識郡朝郡㕔事也他守時吏發求民間至夜不絶民不得安自明府下車以來狗不夜吠民不見吏年老遭值聖明今聞當見棄去故自扶奉送寵曰吾政何能及公言邪勤苦父老為人選一大錢受之冬諸羌復叛徵段熲下獄遣中郎將皇甫規擊破降之先是零吾羌與先零諸羌寇三輔至是復寇并涼段熲將湟中義從討之涼州刺史郭閎貪共其功稽固熲軍使不得進義從役久叛歸閎歸罪於熲熲坐徵下獄輸作左校後西州吏民守關為熲訟寃㑹羌益熾乃復以熲為校尉羌遂陸梁寇患轉盛皇甫規上疏曰臣生長邠岐年五十九昔為郡吏再更叛羌豫籌其事有悮中之言願乞冗官備單車一介之使勞來三輔宣國威澤以所習地形兵勢佐助諸軍且臣觀郡捋已數十年矣力求猛敵不如清平明孫未若奉法前變未逺臣誠戚之是以越職盡其區區詔以皇甫規為中郎將監關西兵擊羌破之明年春沆氏羌寇張掖酒泉規發先零諸種羌共討隴右而道路隔絶軍中大疫死者十三四規親入庵廬巡視將士三軍感恱東羌遂降涼州復通規條奏牧守貪暴殺降老不任職倚恃權貴者數人或免或誅羌人聞之翕然反善十萬餘口皆詣規降庵廬庵草屋廬寄含也壬寅五年夏五月京師地震冬十月以馮緄為車騎將軍討諸蠻降之時長沙零陵漢縣今為湖南永州府治賊起攻桂陽後漢郡冶郴今湖南郴州是等郡遣御史中丞盛修討之不克艾縣漢縣故城在今江西南昌府寧州賊遂焚燒長沙寇益陽漢縣今屬湖南長沙府零陵蠻亦叛至是武陵蠻寇江陵南郡太守李肅棄城走主簿胡爽扣馬諫曰蠻夷見郡無備故敢乘間而進明府為國大臣連城千里奈何委符守之重而為逃逋之人乎肅殺爽而走徵肅棄市復爽門閭拜家一人為郎乃以太常馮緄討之先是所遣將帥宦官多陷以折耗軍資往往抵罪緄請中常侍一人監軍財費尚書朱穆奏緄以財自嫌失大臣節有詔勿劾緄請前武陵太守應奉字世叔汝南南頓人與俱十一月至長沙賊悉降進擊武陵蠻夷斬四千級受降十餘萬荆州平定緄推功于奉薦以為司隸校尉而緄上書乞骸骨不許監軍使者張敝承宦官意奏緄將婢二人戎服自隨又輒于江陵刻石紀功請下吏案尚書令黃俊議以為無罪明年長沙賊復起攻桂陽太守陳奉破降之緄遂坐免下皇甫規獄論輸左校皇甫規持節還督鄉里既無私惠而多所舉奏又惡絶宦官不與交通于是遂共誣規貨賂羣羌令其文降璽書誚讓規上疏自訟略曰臣前奏李翕等五臣支黨半國交搆豪門競流謗讟云臣私報諸羌謝以錢貨者臣以私財則家無擔石如物出于官則文簿易考就臣愚惑信如言者前世尚遺胸奴以宫姬鎮烏孫以公主今臣伹費千萬以懷叛羌何罪之有帝乃徵規還拜議郎論功當封而徐璜左悺欲從規求貨規終不答璜等陷以前事下吏官屬欲賦斂請謝規誓不聽遂論輸左校諸公及太學生張鳳等三百餘人詣闕訟之㑹赦歸家癸卯六年冬十月上校獵廣成苑名在河南汝州西遂至上林苑陳蕃上疏諫曰安平之時遊畋宜有節况今有三空之厄哉田野空朝廷空倉庫空加以兵戎未戢四方離散是陛下焦心毁顔坐以待旦之時也豈宜揚旗耀武騁心輿馬之觀乎且時當種麥豈可勞民書奏不省十一月以周景字仲饗舒人榮之孫為司空劉寵免景代時宦官方熾景與太尉楊秉上言內外吏職多非其人舊典中臣子弟不得居位諸皆斥罷帝從之于是條奏牧守以下五十餘人或死或免天下肅然以張奐為度遼將軍皇甫規為使胸奴中郎將初奐坐梁冀故吏免官禁錮規薦之前後七上乃拜武威太守至是規復徵為度遼將軍到營數月上書薦奐才略兼優宜正元帥自乞冗官以為奐副從之尚書朱穆卒朱穆疾宦官恣橫上疏曰案漢故事中常侍參選士人建武以後乃悉用宦者自延平以來浸益貴盛權傾海內寵貴無極放濫驕溢漁食百姓臣以為可悉罷省更選海內清淳之士明達國體者以補其處不納後復口陳曰臣聞漢家舊典置侍中中常侍各一人省尚書事黃門侍郎一人傳發書奏皆用姓族自和熹太后以女主稱制不接公卿乃以閹人為常侍小黃門通命兩宫自此以來權傾人主窮困天下宜皆罷遣博選耆儒宿德與參政事帝怒不應穆伏不肯起左右傳出良久乃趨而去自此中官數因事稱詔詆毁之穆素剛憤悶發疽卒穆仕數十年蔬食布衣家無餘財公卿共表穆立節忠清追贈益州太守蔡雍與門人諡為文忠先生蔡雍字伯喈陳留圉人甲辰七年春二月邟鄉章懷注即周承休侯國承休注見前侯黃瓊卒諡曰忠瓊卒四方名士㑹葬者六七千人初瓊教授于家徐稚從之咨訪大義及瓊貴稚絶不復交至是往弔進酹哀哭而去稚常于家豫炙一雞以絮漬酒中暴乾以裹雞徑到冢外以水漬綿使有酒氣用斗米飯白茅為藉以雞置前釃酒畢留謁去不見喪主人莫知者諸名士曰必徐孺子也于是選能言者茅容字季偉陳留人輕騎追及為沽酒市肉稚為飲食容問國家事不答更問稼穡乃答之容還以語諸人郭泰曰孺子為人清潔髙廉飢不可得食寒不可得衣而為季偉飲食此為已知季偉之賢故也所以不答國事者是其智可及其愚不可及也泰博學善談論初逰洛陽符融字偉明陳留浚儀人少師事李膺不仕終一見嗟異因以介於河南尹李膺膺與為友後歸鄉里諸儒送之河上車數千輛膺惟與泰同舟而濟衆賓望之以為神仙焉㦯問范滂曰郭林宗何如人滂曰隱不違親貞不絶俗天子不得臣諸侯不得友我不知其他泰舉有道不就或勸之仕泰曰吾夜觀乾象畫察人事天之所廢不可支也吾將優遊卒歲而已然猶周旋京師徐稚以書戒之曰夫大木將顛非一繩所維何為栖栖不遑寧處泰感悟曰敬拜師言以為師表泰性明知人好奬訓士類因以成名者甚衆茅容年四十餘耕於野與等輩避兩樹下衆皆夷踞客獨危坐泰見而異之因請寓宿旦日容殺雞食母餘半庋置自以草蔬與客同飯泰曰郭林宗猶减三牲之膳以供賓客而卿如此乃吾友也勸令從學巨鹿孟敏字叔達荷甑墮地不顧而去泰見問之曰甑已破矣視之何益泰知其有分決亦勸令游學遂知名當世陳留仇香字季智至行純默年四十為蒲亭長勸人生業令子弟就學賑恤窮寡期年大化民有陳元獨與母居母詣香告元不孝香到元家為陳人倫孝行譬以禍福之言元感悟卒為孝子考城令王奐署香為主簿謂之曰聞在蒲亭陳元不罰而化得無少鷹鸇之志耶香曰以為鷹鸇不若鸞鳳故不為也奐曰枳棘非鸞鳯所集百里非大賢之路乃使香入太學符融勸以交結香曰天子設太學豈但使人游談其中耶泰就房謁之嗟歎起拜牀下曰君泰之師非泰之友也陳國童子魏盻請於泰曰經師易遇人師難逢願給灑掃泰許而善之自餘或出于屠沽卒伍因泰奬進竝以成名三月隕石于鄠漢縣今屬陜西西安府夏五月雨雹秋九月荆州刺史度尚度以官為氏尚字博平山陽湖陵人擊桂陽艾縣賊平之先是陳奉破桂陽賊李研而餘黨卜陽潘鴻等逃入深山至是合艾縣賊復叛尚募諸蠻夷進擊之破其三匝多獲珍寶而士卒驕富莫有鬭志尚乃宣言兵少未可進當須諸郡所發悉至乃并力攻之申令軍中恣聽射獵兵喜皆出尚乃密使人焚其營獵者還營莫不涕泣尚人人慰勞深自咎責因曰陽等財寶足富數世諸卿但不并力耳所亡少少何足介意衆感憤踊尚敕令秣馬蓐食明旦徑赴賊屯陽等自以深固不復設備吏士乘鋭遂破平之尚出兵三年羣寇悉平封右鄉侯冬十月帝如章陵十二月遝宫時公卿貴戚車騎萬計徵求費役不可勝極護駕從事胡騰字子升桂陽人言天子無外乘輿所幸即為京師臣請以荆州刺史比司隸校尉臣自同都官從事帝從之自是肅然莫敢干擾詔書多除人為郎太尉楊秉上疏曰太微積星名為郎位太微宫五帝座後聚二十五星是為郎位入奉宿衛出牧百姓宜割不忍之恩以斷求欲之路於是乃止乙巳八年春正月遣中常侍左悺之苦縣本楚邑漢置縣唐曰真源故城在今河南歸德府鹿邑縣祠老子太康地記苦縣有賴鄉祠老子所生地也賴一作丙申晦日食中常侍侯覽免左悺自殺貶具瑗為都鄉侯侯覽弟參為益州刺史殘暴貪婪纍贓億計楊秉奏檻車徵參于道自殺秉因奏曰臣按舊典宦官本任給使省闥而今執政操權中常侍侯覽弟參貪殘凶惡自取禍滅覽知釁重必有自疑之意臣愚以為覽宜急屏斥送歸本郡書奏尚書召秉掾屬詰之曰三公統外御史察內今越奏近官經典漢制何所依據秉使對曰春秋傳曰除君之惡惟力是視鄧通懈慢申屠嘉召詰責之漢世故事三公之職無所不統尚書不能詰帝不得已免覽官司𨽻韓縯因奏左悺罪惡及其兄太僕稱皆自殺又奏具瑗兄恭贓罪瑗貶都鄉侯廢皇后鄧氏幽殺之帝多內寵鄧氏驕忌廢送暴室以憂死詔李膺馮緄劉祐字伯祖中山安國人輸作左校宛陵宛當作苑後漢縣故城在今河南開封府新鄭縣羊元羣罷北海郡贓汚狼籍郡舍溷軒有竒巧亦載以歸河南尹李膺表按其罪元羣行賄宦官膺竟反坐單超弟遷為山陽太守以罪繫獄廷尉馮緄考致其死中官飛章誣緄以罪中常侍蘇康管霸固猶强占也天下良田美業州郡不敢詰大司農劉祐移書所在依科品沒入之帝大怒三人俱坐輸作左校夏五月太尉楊秉卒以劉瑜字季節廣陵人為議郎秉為人清白寡欲嘗言我有三不惑酒色財也既歿所舉賢良劉瑜上書言中官不得裂土傳爵嬖女冗食傷生州郡賄賂公行民愁鬱結去入賊黨貧民或賈首級以要賞陛下又好微行近習暴縱惟逺斥邪佞政和災弭矣拜為議郎桂陽賊攻零陵度尚擊斬之時荆州兵朱蓋等徵戍役久財賞不贍忿恚作亂與桂陽賊胡蘭等復反攻零陵太守陳球拒之掾吏白球遣家避難球怒曰太守分國虎符受任為一邦豈顧妻孥而沮國威乎復言者斬乃弦大木弓羽矛為矢引機發之多所殺傷賊激流灌城球輒於內因地勢反決水淹賊相拒十餘日不能下尚時徵還京師詔以為中郎將討擊斬之餘黨南走蒼梧交趾刺史張磐又破之賊復還荆州至靈帝時為零陵太守楊璇所平張磐字子石丹陽人楊璇字機平㑹稽烏程人閏月段熲擊西羌破之段熲擊破西羌進兵窮追展轉山谷自春及秋無日不戰虜遂敗散封熲都鄉侯明年春正月當煎諸種復反熲又大破之西羌遂定秋七月以陳蕃為太尉蕃讓曰不愆不忘率由舊章臣不如太常胡廣齊七政訓五典臣不如議郎王暢暢先為南陽太守奮厲威猛功曹張敞諫曰懇懇用刑不如行恩孶孳求姦未若禮賢化人在德不在用刑暢深納具言于是更崇寬政慎刑簡罰教化大行文武兼資折衝萬里臣不如李膺上不許八月初斂田畝稅錢九月立貴人竇氏為皇后采女田氏有寵帝將立以為后時竇武字游平扶風平陵人融之元孫有女亦為貴人陳蕃及司隸應奉皆以田氏卑微竇氏良家爭之甚固帝不得已立竇氏拜武為特進城門校尉封槐里侯武在位多辟名士清身疾惡禮賂不通妻子衣食裁足而已得兩宫賞賜悉散與大學諸生及胸施貧民由是衆譽歸之以李膺為司隸校尉陳蕃數言李膺馮緄劉祐之枉請加原宥誠辭懇切以至流涕帝不聽應奉上疏乞原膺等以備不虞乃悉免其刑久之膺復拜司隸校尉時小黃門張讓弟朔為野王令貪殘無道畏膺威嚴逃還京師匿于兄家合柱中膺率吏卒破柱取朔付獄受辭畢即殺之自此諸宦官皆鞠躬屏氣休沐不敢出宫省帝問其故並叩頭泣曰畏李校尉時朝廷日亂紀綱頺廢而膺獨持風裁以聲名自髙云以劉寬字文詔𢎞農華隂人為尚書令寬由東海相徵拜尚書令未幾出為南陽太守歷典三郡溫仁多恕雖在倉卒未嘗疾言遽色吏民有過但用蒲鞭罰之示辱而已終不加苦有功善推之于下有災異則引躬自責每見父老慰以農里之言年少勉以孝弟之訓人皆悅而化之丙午九年春正月辛亥朔日食詔舉至孝太常趙典所舉至孝荀爽對䇿曰禮者所以興福祥之本止禍亂之源也衆禮之中昏禮為首陽性純而能施隂體順而能化以禮濟樂節宣其氣故能豐子孫之祥致老夀之福也臣竊聞後宫采女六千侍使復在其外空賦不辜之民以供無用之女百姓困窮于外隂陽隔塞于內故感動和氣災異屢臻臣愚以為諸未幸御者一皆遣出使成配合此誠國家之大福也詔拜郎中夏四月河水清濟隂東郡濟北平原帝親祠老子于濯龍宫以文罽毳布也織毛為之為壇飾淳金扣器以金飾器之口也設華蓋之坐用郊天樂殺南陽太守成瑨字功平𢎞農人太原太守劉瓆字文理髙唐人捕司隸校尉李膺太僕杜密字周甫潁川陽城人部黨二百餘人下獄遂䇿免太尉蕃初帝為蠡吾侯受學于甘陵周福及即位擢福為尚書時同郡房植有名當朝鄉人為之謡曰天下規矩房伯武因師獲印周仲進伯武植之字仲進福之字二家賓客互相譏揣遂成尤隙由是甘陵有南北部黨人之議自此始矣汝南太守宗資見前以范滂為功曹南陽太守成瑨以岑晊字公孝南陽棘人為功曹皆使之褒善糾違悉心聽政二郡又為謡曰汝南太守范孟博南陽宗資主諾南陽太守岑公孝𢎞農成瑨但坐太學諸生三萬餘人郭泰賈彪字偉節熲州定陵人彪嘗為新息長小民貧困多不養子彪嚴其制與殺人同罪數年間人養子者以百數曰此賈父之所生也皆名之為賈為其冠與李膺陳蕃王暢更相褒重學中語曰天下模楷李元禮不畏彊禦陳仲舉天下俊秀王叔茂于是中外承風競以臧否相尚自公卿以下莫不畏其貶議宛有富賈張泛帝美人之外親善雕鏤玩好以遺中官因得顯位恃勢縱橫晊勸瑨收捕既而遇赦瑨竟誅之後乃奏聞小黃門晉陽趙津貪橫放恣太原太守劉瓆亦於赦後殺之于是侯覽使泛妻上書訟寃宦官因緣譖訴瑨瓆帝大怒徵下獄有司承旨奏當棄市山陽太守翟超以張儉字元節山陽髙平人為督郵郡官監屬縣侯覽家在防東後漢縣故城在今兗州府今鄉縣殘暴百姓大起塋冡儉舉奏覽破其冡宅籍沒資財徐璜兄子宣為下邳令求故汝南太守李皓女不得遂將吏卒至皓家載其女歸射殺之東海相黃浮收宣家屬無少長悉案棄市于是宦官欣寃帝又大怒超浮並坐髠鉗輸作陳蕃與司空劉茂字叔盛愷之子共諫請四人罪帝不悅茂不敢復言蕃乃上疏曰今寇賊在外四支之疾內政不理心腹之患臣憂左右日親忠言月疏內患漸積外難方深劉瓆成瑨誠心去惡而令伏歐刀翟超黃浮奉公不撓並蒙刑坐陛下深宜割塞近習與政之源引納尚書朝省之士斥黜邪侫則天和于上地洽于下矣帝不納宦官由此疾蕃彌甚輒以詔譴襄楷襄氏魯莊公子襄仲之後以諡為氏楷字公矩平原隰隂人上疏曰劉瓆成瑨志除奸邪而逺加考逮三公乞哀而嚴被譴讓漢興以來未有拒諫誅賢用刑太深如今日者也書奏不省復上書曰黃門常侍天刑之人陛下愛待兼倍常寵繼嗣未兆豈不為此又聞宫中立黃老浮屠魏志浮屠正號曰佛陀與浮屠聲相近轉為二言以華言譯之則曰淨覺之祠黃老清虛好生惡殺省欲去奢浮屠不三宿桑下陳壽正誤曰沙門受道法者日中一食樹下一宿慎莫再宿矣莫再宿即不三宿之意也不欲久生恩愛今陛下淫女艷婦極天下之麗甘肥飲美殫天下之味嗜欲不去殺罰過理奈何欲如黃老浮屠乎時帝篤好浮屠術由是其法浸盛故楷及之尚書奏楷違經誣上司寇論刑瑨瓆竟死獄中岑晊逃竄獲免晊之亡也親友競匿之賈彪獨閉門不納曰𫝊言相時而動無纍後人公孝要君致釁自道其咎吾何容隱之乎後晊終于江夏山中河內張成者善風角推占當赦教子殺人李膺為司隸收捕逢宥竟案殺之成素以方技交通宦官宦官教成弟子牢修上書告膺等養太學遊士共為部黨誹訕朝廷于是天子震怒班下郡國逮捕黨人布告天下使同忿疾案經三府陳蕃郤之曰今所案者皆海內人譽憂國忠公之臣此等猶將十世宥也豈有罪名不章而致收掠者乎不肯平署帝愈怒遂下膺等北寺獄辭連太僕杜密密素與李膺名行相次時人謂之李杜密嘗為北海相去官還家每謁守令多所陳請同郡劉勝亦自蜀郡告歸閉門掃軌太守王昱謂密日劉季陵清高士公卿多舉之者密曰劉勝知善不薦聞惡無言隱情惜已自同寒蟬今志義力行之賢而密達之違道失節之士而密糾之使明府賞刑得中令聞休揚不亦萬分之一乎昱乃服及陳實范滂之徒二百餘人或遁逃不獲皆懸金購募陳實曰吾不就獄衆無所恃乃往請囚范滂至獄獄吏白祭臯陶滂曰臯陶古之直臣知滂無罪將理之于帝如其有罪祭之何益于是諸人皆不祭陳蕃復上書極諫帝諱其言切託以辟召非人策免之時黨獄所染皆天下名賢皇甫規自以西州豪傑恥不得與乃自言臣前薦故大司農張奐是附黨也臣昔論輸左校太學生張鳯等訟臣是為黨人所附也臣宜坐之朝廷不問胸奴烏桓降鮮卑走出塞時徵張奐為大司農鮮卑聞奐去招結南胸奴及烏桓同叛數道入塞寇掠九郡諸羌亦共寇武威張掖乃復拜奐為中郎將以九卿秩督幽并涼三州及度遼烏桓二營胸奴烏桓聞奂至皆降唯鮮卑出塞去朝廷患檀石槐不能制遣使持印綬封為王欲與和親檀石槐不肯受而寇抄滋甚自分其地為三部從右北平以東至遼來接夫餘滅貊為東部從右北平以西至上谷為中部從上谷以西至烏孫為西部各置大人領之丁未永康元年夏五月地裂京師反上黨壬子晦日食六月赦黨人歸田里禁錮終身陳蕃既免朝臣震栗莫敢復為黨人言者賈彪曰吾不西行大禍不解乃入洛陽說竇武霍諝字叔知魏郡鄴人等使訟之武上疏曰近者奸民牢修造設黨議遂收前司隸校尉李膺等連及數百人曠年拘録事無效驗膺等建忠抗節志經王室此陛下稷卨與契通伊吕之佐而虛為姦臣賊子所誣枉惟陛下留神澄省時謂即時也見理出以厭人鬼喁喁之心書奏因以病上還印綬諝亦表請帝意稍解使中常侍王甫就獄訊黨人范滂等皆三木囊頭暴于階下甫曰卿等更相拔舉迭為脣齒其意如何滂曰滂欲使善善同其清惡惡同其汙謂王政之所願聞不悟更以為黨身死之日願埋于首陽山側上不負皇天下不愧夷齊甫愍然為改容乃得並解桎梏膺等又多引宦官子弟宦官懼請帝以天時宜赦六月赦天下改元黨人二百餘人皆歸田里書名三府禁錮終身滂候諝而不謝或讓之滂日昔叔向不見祁奚吾何謝焉滂歸汝南南陽士大夫迎之者車數千兩鄉人殷陶黃穆侍衛于旁應對賓客滂曰是重吾禍也遂遁還初詔下鈎黨郡國所奏多至百數唯平原相史弼無所上詔書迫切州郡髠笞掾吏從事坐傳舍貴曰青州六郡其五有黨平原何治而獨無弼曰先王疆理天下畫界分境水土異齊風俗不同他郡自有平原自無胡可相比若承望上司誣陷良善則平原之人户可為黨相有死而已所不能也從事大怒即舉奏弼㑹黨禁中解弼以俸贖罪所脫者甚衆竇武所薦㑹稽楊喬容儀偉麗數言政事帝愛其才貌欲妻以公主喬固辭不聽遂不食而死秋八月巴郡言黃龍見初郡人欲就池浴見池水濁因相戲曰此中有黃龍語遂流行太守欲上之郡吏𫝊堅諫曰此走卒戲語耳不聽時政化衰缺郡國多言瑞應是年八月魏郡言嘉禾生甘露降十一月西河言白兔見皆黃龍類也大水渤海溢冬十二月帝崩年三十六尊皇后曰皇太后太后臨朝初竇后既立御見甚稀惟采女田聖等有寵后素忌忍帝梓宫尚在前殿遂殺田聖遣使迎解瀆亭在今直隸保定府祁州侯宏肅宗子河間孝王開之曽孫祖淑父萇世封解瀆亭侯詣京師竇武召侍御史河間劉倏問以國中宗室之賢者倏稱宏武白太后以倏持節奉迎宏時年十二孝靈皇帝戊申建寧元年春正月以竇武為大將軍陳蕃為太尉與司徒胡廣參録尚書事是時國嗣未立諸尚書多託病不朝蕃移書責之曰今帝祚未立諸君奈何委荼蓼之苦息偃在牀乎諸尚書惶怖皆起視事解瀆亭侯宏至入即位定為孝靈帝二月葬宣陵在雒陽縣東北史臣曰桓帝初誅梁冀奮怒威天下猶企其息肩而五邪嗣虐流衍四方自非忠賢力爭屢折姦鋒雖願依斟流彘亦不可得已追尊祖為孝元皇夫人為孝元后考為孝仁皇尊母董氏為愼園章懷注在瀛州樂壽縣樂壽故城在今直隸河間府獻縣貴人夏五月丁未朔日食六月京師大水録定策功封竇武為聞喜漢縣今屬山西絳州侯盧植字子幹涿郡涿人說武宜辭大賞以全身名武不能用植身長八尺二寸音聲如鐘性剛毅有大節少事馬融融性豪侈列女倡歌舞于前植未嘗轉眄融敬之封陳蕃為高陽鄉馮智舒質實高陽鄉疑即高陽城注見前侯不受太后以蕃舊德特封之蕃固讓不受秋九月太傅陳蕃大將軍竇武奏誅宦者曹節等節殺之遂遷太后于南宮初竇太后之立也陳蕃有力焉及臨朝政無大小皆委于蕃蕃與竇武同心戮力以奬王室徵天下名賢李膺杜密尹勳字伯元河南人劉瑜等列於朝廷共參政事於是天下延頸想望太平而帝乳母趙嬈及諸女尚書旦夕在太后側中常侍曹節王甫等共相朋結諂事太后太后信之數出詔命有所封拜蕃武疾之㑹有日食之變蕃謂武曰昔蕭望之困一石顯况今石顯數十輩乎可因此斥罷宦官以塞天變武乃白太后曰故事黃門常侍但當給事省內門户今乃使與政事任重權子弟布列專為貪暴天下洶洶宜悉誅廢以清朝廷太后曰故事世有宦官但當誅其有罪者可盡廢邪時中常侍管霸頗有才略專制省內后先白收霸及蘇康等皆坐死武復數白誅節等太后冘音由與尤同豫不定也未忍蕃上疏言侯覽曹節公乘昕王甫鄭颯等與趙夫人即趙嬈諸尚書並亂天下今不急誅必生變亂願出臣章宣示左右并令天下諸姦知臣疾之太后不納八月太白犯房之上將入太微晉書天文志房四星為明堂天子布政之宫亦四輔也第一星上將也太微天子庭也劉瑜惡之上書太后曰案占書宫門當閉將相不利姦人在主傍願急防之又勸武蕃速斷大計于是武奏免黃門令魏彪以所親小黃門山周有山師之官子孫以為氏氷代之收鄭颯送北寺獄蕃曰此曹子便當收殺何復考為武令氷與勳雜考辭連曹節王甫勳氷即奏收節等使劉瑜內讀日納奏九月武出宿歸府典中書者先以告朱瑀瑀盜發武奏罵曰放縱者自可誅耳我曹何罪而當盡見族滅因大呼曰陳蕃竇武奏白太后廢帝為大逆乃夜召所親共音龔姓也商諸侯之國晉有左行共華普等十七人歃血共盟節請帝御前殿拔劒踊躍趙嬈等擁衛左右閉諸禁門召尚書官屬脅以白刃使作詔版拜王甫為黃門令持節至北寺獄收勳氷殺之出颯使持節收武等武馳入步兵營召㑹北軍五校士數千人屯都亭下令軍士曰黃門常侍反盡力者封侯重賞蕃聞難將官屬諸生八十餘人並拔刃突入尚書門攘臂呼曰大將軍忠以衛國黃門反逆何云竇氏不道邪甫使劒士收蕃送北寺獄殺之時張奂徵還節等以奂新至不知本謀矯制使奂率五營士討武甫將千餘人出與奂合使其士大呼武軍曰竇武反汝皆禁兵當宿衛宫省何故隨反者乎營府素畏服中官于是武軍稍稍歸甫自旦至食時兵降略盡武自殺梟首都亭收捕宗親賔客悉誅之及劉瑜馮述皆夷其族遷皇太后于南宫徙武家屬于日南門生故吏皆免官禁錮議郎巴肅始同謀節等不知伹坐禁錮後乃知而收之肅自載詣縣縣令解印綬欲與俱去肅曰為人臣者有謀不敢隱有罪不繞刑遂被誅巴肅字恭祖勃海髙城人曹節遷長樂衛尉與甫等六人皆封列侯蕃反朱震收葬蕃尸匿其子逸事覺繫獄震受考掠誓死不言逸由是得免掾胡騰殯斂武尸行喪亦坐禁錮武孫輔年二尸騰詐以為己子與令史張敞共匿之亦得免朱震字伯厚陳留人張奂遷大司農封侯奂深病為節等所賣固辭不受冬十月甲辰晦日食己酉二年春三月尊慎園貴人董氏為孝仁皇后置永樂宫如桓帝尊匽貴人禮夏四月青蛇見御座上大風雨雷電詔公卿言事張奂上疏曰昔周公葬不如禮天乃動威今武蕃忠貞未被明宥妖眚之來皆為此也宜急為改葬徙還家屬其從坐禁錮一切蠲除又皇太后雖居南宫而恩禮不接宜思大義顧復之報上深嘉其言而為宦者所制不得從也奂又與尚書劉猛等共薦王暢李膺可參三公之選節等疾其言遂下詔責之奂等皆自囚廷尉數日得出以俸贖罪郎中謝弼字輔宣東郡武陽人上封事曰皇太后幽隔空宫如有霧露之疾陛下何面目以見天下禮為人後者為之子今以桓帝為父豈得不以太后為母哉臺宰重器國命所繫今之四公太尉司徒司空并太傅為四公惟劉寵斷斷守善餘皆素餐致寇之人必有折足覆餗之凶可因災異並皆罷黜徵王暢李膺並居政事庶災變可消國祚惟永左右惡之以他罪收弼掠死于獄光祿勳楊賜字伯獻震之孫秉之子曰王者心有所想雖未形顔色而五星以之推移隂陽為其變度夫皇極不建則有龍蛇之孽詩云惟虺惟蛇女子之祥惟陛下思乾剛之道别內外之宜抑皇甫之權割艷妻之愛則蛇變可消禎祥立應六月以劉囂字重寧長沙人為司空囂素附諸常侍故致位公輔秋七月段熲大破東羌平之封熲新豐注見前侯初熲既定西羌事在桓帝延熹八年而東羌先零等種猶未服永康元年春先零圍祋祤掠雲陽是夏冦三輔攻沒兩營祋祤漢縣故城在今陜西西安府耀州祋丁外反祤音詡雲陽漢縣故城在今陜西邠州淳化縣皇甫規張奐招之連年既降又叛永康元年張奐遣司馬董卓擊破先零奐當封以不事宦官不果拜卓為郎中董卓字仲頴隴西臨洮人桓帝詔以問熲熲上疏具對略曰東羌降於皇甫規者已二萬落今所餘三萬餘落近居塞內路無險折久亂井涼纍侵三輔是為癰疽伏疾留滯脅下如不加誅轉就滋大若以騎五千步萬人車三千輛三冬二夏足以破定伏計永初中諸羌反叛十有四年用二百四十億永和之末復經七年用八十餘億費耗若此猶不誅盡餘孽復起於兹為害今不暫疲民則永寧無期臣庶竭駑劣伏待節度桓帝悉聽如所上熲於是將兵萬人齎十五日糧從彭陽漢縣故城在今甘肅平涼府鎮原縣直指高平注見前與先零諸種戰時虜兵盛熲皆恐熲令軍士長鏃利刃長矛三重挾以彊弩列輕騎為左右翼謂將士曰今去家數千里進則事成走則盡凡努力共功名因大呼馳騎突擊大破之於逢義山今平涼府固原州有須彌山或以為即逄義擊虜衆奔潰斬首八千餘級太后下詔褒美以熲為破羌將軍事在建寧元年二月熲乘勝晨夜兼行連破之羌餘寇四千落悉散入漢陽山谷間張奂上言東羌雖破餘種難盡宜以恩降可無後悔詔書下熲復上言張奂說虜强難破宜用招降聖朝明鑑信納瞽言臣謀得行奂計不用遂懷猜恨潤辭意言羌一氣所生不可誅盡血流汙野傷和致災臣伏念先零雜種纍經反覆臣奉大漢之威建長久之䇿欲絶其本恨不使能殖本規三嵗今適明年而餘寇殘燼向殄滅願一以任臣臨時量宜不失權便事在建寧元年七月至是詔遣謁者馮禪說降漢陽散羌熲以羌雖暫降而縣官無廪必當復為盜賊不如乘虛放兵藝必殄滅乃進營去羌所屯四五十里遣司馬田宴夏育先將兵進擊羌衆潰東奔熲遣千人于西縣注見前結木為柵遮之分遣宴育等將七千人銜枚夜上西山結營穿塹去虜一里許又遣司馬張愷將三千人上東山虜乃覺之熲因與愷等挾東西山縱兵奮擊窮山深谷之中處處破之斬其渠帥以下萬九千級馮禪等所招降四千人于是東羌悉平更封熲為新豐縣侯尋徵為侍中熲在邊十餘年未曾一日蓐寢與將士同甘苦故皆樂為死戰所向有功凡百八十戰斬三萬八千餘級費四十四億軍士死者四百餘人冬十月復治鉤黨殺前司隸校尉李膺等百餘人初李膺等雖廢錮天下士大夫皆高尚其道更相標榜為之稱號上曰三君竇武陳蕃劉淑為三君者言一世之所宗也劉淑字仲承河間樂成人次曰八俊李膺荀昱杜密王暢劉祐魏朗趙典朱寓為八俊俊者言人之英也朱趙典范書止名見寓沛人餘俱見前次曰八顧郭泰宗慈巴肅夏馥范滂尹勳蔡衍羊陟為八顧顧者言能以德行引人者也蔡宗慈字孝初南陽安衆人夏馥字子治陳留圉人衍字孟喜汝南項人羊本晉羊舌氏春秋末始獨從羊陟字嗣祖泰山梁父人餘見前次曰八及張儉岑晊劉表陳翔孔昱苑康檀敷翟超為八及及者言其能導人追宗者也劉表字景升山陽高平人陳翔字子麟汝南邵陵人孔昱字元世魯國人檀敷字文有山陽瑕邱人翟超字及郡縣范書闕餘見前次曰八厨度尚張邈王孝劉儒胡母班秦周蕃嚮王章為八厨厨者言能以財救人者也度尚注見前張邈字孟卓東平人王孝字文祖夀張人劉儒字叔林東郡陽平人胡母班字季友泰山人秦周字平王平邱人蕃嚮字嘉景魯國人王章字伯儀東萊人方古之入元八愷陳竇用事舉拔膺等及陳竇被誅膺等復廢宦官疾惡之而侯覽怨張儉尤甚儉破覽冢宅事見前儉鄉人朱並承覽意指上書告儉與同鄉二十四人别相署號共為部黨圖危社稷詔刋章捕儉等曹節因諷有司奏諸鉤黨者下州郡考治是時上年十四問節等曰黨人何用為惡而欲誅之邪對曰相舉羣輩欲為不軌上曰不軌欲如何對曰欲圖社稷上乃可其奏或謂膺曰可去矣對曰事不辭難罪不逃刑臣之節也吾年已六十死生有命去將安之乃詣詔獄考死門生故吏並被禁錮時御史蜀郡景毅子顧為膺門徒未有録牒不及於譴毅慨然曰本謂膺賢遣子師之豈可以漏脫名籍茍安而已遂自表免歸汝南督郵吳導受詔捕范滂至征羌後漢候國故城在今河南許州郾城縣抱詔書閉傳舍伏牀而泣一縣不知所為滂聞之曰必為我也即自詣獄縣令郭揖解印綬引與俱亡滂曰滂死則禍塞何敢以罪纍君又令老母流離乎其母就與之訣曰汝今與李杜齊名死亦何恨既有令名復求夀考可兼得乎滂跪受教再拜而辭顧其子曰吾欲使汝為惡則惡不可為使汝為善則我不為惡行路聞之莫不流涕凡黨人死者百餘人妻子皆徙邊天下豪傑及儒學有行義者宦官一切指為黨人有怨隙者因相陷害睚眦之忿濫入黨中或有未嘗交關亦罹禍毒其死徙廢禁者又六七百人郭泰聞黨人之死私為之慟曰詩云人之云亡邦國殄瘁大雅瞻卬之辭漢室滅矣但未知瞻烏爰止于誰之屋小雅正月之辭耳泰雖好臧否人倫而不為危言核論故能處濁世而怨禍不及焉張儉亡命困迫望門投止莫不重其名行破家相容後流轉東萊止李篤家外黃令毛欽操兵到門篤引欽就席曰張儉負罪豈得藏之若審在此此人名士明廷寧宜執之乎欽起撫篤曰蘧伯玉耻獨為君子足下如何專取仁義篤曰今欲分之明廷載半去矣欽歎息而去篤導儉出塞其所經歷連引收考遍天下儉與魯國孔褒有舊亡抵褒不遇褒弟融年十六匿之事泄儉亡走國相收褒融送獄未知所坐融日保納舍藏者融也褒曰彼來求我非弟之過吏問其母母曰家事任長妾當其辜一門爭死郡縣疑不能決乃上讞之詔獨坐褒及黨禁解儉乃還鄉里夏馥聞儉亡命歎曰孽自已作空汙良善一人逃死禍及萬家何以生為乃自翦須變形入林盧山中隱姓名為冶家傭親突烟炭形貌毁瘁積二三年人無知者馥弟靜載縑帛追餉之馥不受曰弟奈何載禍相餉乎初中常侍張讓父死歸葬潁川雖一郡畢至而名士無往者讓耻之陳實獨弔焉及誅黨人讓以實故多所全宥袁閎聞黨事起欲投迹深林以母老不宜遠遁乃築土室四周於庭不為户自牖納飲食母思閎時往就視母去便自掩閉兄弟妻子莫得見也潛身十八年卒于士室二孔褒字文禮弟融字文舉魯國人孔子十世孫袁閎注見前張讓熲川人初范滂等非訐朝政自公卿以下皆折節下之太學生爭慕其風以為文學將興處士復用申屠蟠字子龍外黃人獨歎曰昔戰國之世處士橫議列國之君至為擁篲先驅卒有坑儒燒書之禍今之謂矣乃絶迹於梁碭之間因樹為屋自同傭人居二年滂等果罹黨錮之禍惟蟠起然免於評論司馬氏光曰天下有道君子揚於王庭以正小人之罪而莫敢不服天下無道君子囊括不言以避小人之禍而猶或不免黨人生昏亂之世不在其位四海橫流而欲以口舌救之以至身被淫刑禍及朋友士類殱滅而國隨以亡不亦悲乎夫惟郭泰既明且哲以保其身申屠蟠見幾而作不俟終日卓乎其不可及已庚子晦日食庚戌三年春二月丙寅晦日食辛亥四年春正月帝冠赦唯黨人不赦二月地震海溢三月辛酉朔日食大疫立貴人宋氏為皇后帝朝太后于南宫帝以太后有援立之功率羣臣朝南宫親饋上壽黃門令董萌因此數為太后訴寃帝深納之供養資奉有加于前曹節王甫疾之誣萌以謗訕永樂宫下獄死壬子熹平元年春正月帝謁原陵注見前司徒掾蔡雍曰古不墓祭朝廷有上陵之禮始謂可損今見威儀察其本意乃知孝明皇帝至孝惻隱不易奪也禮有煩而不可省者此之謂也三月胡廣卒廣周流四公一履司空再作司徒三登太尉又為太傅三十餘年歷事六帝禮任極優罷免未嘗滿嵗輒復升進練達故事明解朝章京師諺曰萬事不理問伯始胡廣字天下中庸有胡公然溫柔謹慤常遜言恭色以取媚于時無忠直之風天下薄之宦者候覽有罪自殺覽為長樂太僕太后宫官坐專權驕奢䇿收印綬自殺夏六月大水皇太后竇氏崩秋七月葬桓思皇后竇太后母卒于比景太后憂思感疾崩于雲臺曹節王甫欲用貴人禮殯帝曰太后親立朕躬統承大業豈冝以貴人終乎于是發喪成禮節等欲别葬太后而以馮貴人配祔詔公卿大㑹朝堂太尉李咸字元卓汝南西平人時病扶輿而起搗椒自隨謂妻子曰若皇太后不配食桓帝吾不生還矣既議坐者瞻望中官莫肯先言廷尉陳球曰皇太后以盛德良家母臨天下遭時不造援立聖明因遇大獄遷居空宫家雖獲罪事非太后今若别葬誠失天下之望且馮貴人無功于國何宜上配至尊李咸曰臣本謂宜爾誠與意合公卿以下皆從球議節甫猶爭之咸復上疏曰太后以陛下為子陛下豈得不以太后為母子無黜母臣無貶君合葬宣陵一如舊制帝從之葬桓思皇后于宣陵詔司隸校尉劉猛論輸左校有人書朱雀闕南司馬門闕在宫門外言曹節王甫幽殺太后詔司隸劉猛逐捕猛以其言直不肯急捕月餘主名不立詔以段熲代之熲乃四出逐捕及太學游生繫者千餘人又以他事奏猛論輸左校殺渤海王悝質帝立梁太后徙封帝父鴻為渤海王薨無子以悝為嗣悝恆帝之弟也初渤海王悝以不道貶為癭陶漢縣故城在今直隸趙州寧晉縣王因王甫求復國許謝錢五千萬既而桓帝遺詔復之悝知非甫功不與甫以中常侍鄭颯等與悝交通乃使假熲收諷等而奏颯等謀迎立悝詔冀州刺史收悝迫令自殺妃妾子女𫝊相以下百餘人皆被誅甫等十二人以功封列侯癸丑二年春正月大疫夏六月地震海水溢秋七月以唐珍潁川人為司空珍中常侍衡之弟故得拜冬十二月癸酉晦日食甲寅三年冬十一月吳郡注見前司馬孫堅字文臺吳郡富春人討㑹稽賊許生三國志作許昌斬之孫堅始見此先是㑹稽妖賊許生起句章後漢縣故城在今浙江寧波府慈溪縣自稱陽明皇帝衆以萬數事在元年至是堅召募精勇得千餘人與州郡合討生破斬之乙卯四年春三月立石經于太學門外雒陽記曰太學在雒陽城南開陽門外堂前石經四部碑凡四十六枚詔諸儒正五經文字命議郎蔡雍為古文篆隸顔師古曰古文謂孔子壁中書篆隸皆秦程邈所作篆有大篆小篆隸書以邈徒隸故謂之隸書也三體書之刻石立于太學門外使後儒晚學咸取正焉碑始立其觀視及摹寫者車乘日千餘兩夏四月大水鮮卑寇幽州鮮卑屢寇幽并大為邊患是時朝議以州郡相黨人情比周乃制昏姻之家及兩州人士不得對相監臨已復立三互法謂昏姻之家及兩州人士不得交互為官也禁忌轉密選用艱難幽冀二州久缺不補蔡雍上疏曰幽冀舊壤鎧馬所出比年兵饑漸至空耗今者闕職經時萬里蕭條無所管繫臣願蠲除近禁其諸州刺史器用可换者無拘日月三互以差厥中不從六月螟說文蟲食榖葉者丙辰五年夏殺永昌太守曹鸞更考黨人禁錮五屬五服內之親也永昌太守曹鸞上書曰夫黨人者或耆年淵德或衣冦英賢皆冝股肱王室左右大猷者也而久被禁錮辱在塗泥所以災異屢見水旱洊臻宜加沛宥以副天心帝大怒檻車收鸞送獄掠殺之于是詔州郡更考黨人門生故吏父子兄弟在位者悉免官禁錮爰及五族光和二年上祿長和海上言黨人錮及五族有乖訓典万詔黨錮後祖以下皆釋之威上祿漢縣故城在今甘肅階州縣和氏堯時和仲和叔之後丁巳六年夏四月大旱蝗以旱蝗詔令三公條奏長吏苛酷貪汙者罷免之平原相陽球周景王封少子于陽樊因邑命氏球字方正漁陽泉州人坐嚴酷徵詣廷尉帝以球前討賊有功九江山賊起球為九江太守設方略凶賊殄破特赦之拜議郎以宣陵孝子為太子舍人市賈小民相聚為宣陵孝子者數十人詔皆除太子舍人初帝好文學自造皇羲篇五十章引諸生能為文賦者並待制鴻都門下後諸為尺牘木簡以書辭賦也長一尺故曰尺牘及工書鳥篆字為蟲鳥形六體之一也者皆加引召至數十人侍中祭酒樂松賈護多引無行趣藝之徒置其間喜去聲好也陳閭里小事帝甚悅之待以不次之位蔡雍因上封事略曰古者取士必使諸侯嵗貢孝武之世郡舉孝亷又有賢良文學之選于是名臣輩出文武並典漢之得人數路而已夫書辭賦才之小者匡國治政未有其能陛下聽政餘暇觀省篇章聊以游意非以為教化取士之本而諸生競利作者鼎沸連偶俗語有類俳優或竊成文虛冒名氏皆見拜擢既加之恩難復收改但不可復使治民及在州郡宣陵孝子虛僞小人本非骨肉羣聚山陵假名稱孝義無所依至有姦軌之人通容其中太子官屬宜搜選令德豈有但取邱墓凶醜之人其為不祥莫大焉宜遣歸田里以明詐僞書奏帝乃詔宣陵孝子為舍人者悉改為丞尉秋八月遣校尉夏育等擊鮮卑敗績護烏桓校尉夏育上言鮮卑寇邊自春以來三十餘發請徵幽州諸郡兵出塞擊之一冬二春必能禽滅先是護羌校尉田晏坐事論刑欲立功自贖因請王甫求得為將乃拜晏破鮮卑中郎將大臣多不同者乃召百官議蔡雍議曰自胸奴遁逃鮮卑彊盛據其故地稱兵十萬才力徑健意智益生加以關塞不嚴禁網多漏精金良鐡皆為賊有漢人逋逃為之謀主兵利馬疾過于胸奴今育晏虛計二載自許有成者褐結兵連豈得中休當更徵發轉運無已就如其言猶已危矣况得失不可量邪帝不從八月遣育出高柳晏出雲中各將萬騎出塞二千餘里檀石槐命三部大人逆戰育等大敗喪其節傳輜重各以數十騎奔還死者什七八育晏檻車徵下獄贖為庶人冬十月癸丑朔日食地震鮮卑寇遼西太守趙苞字威豪甘陵東武城人破之遼西太守趙苞到官遣使迎母道經柳城漢縣故城在今熱河界值鮮卑萬餘人入塞寇鈔苞母及妻子遂為所劫質載以擊郡苞出戰對陳賊出母示苞悲號謂母曰為子無狀欲以微祿奉養朝夕不圖為母作禍昔為母子今為王臣義不得顧私恩毁忠節唯當萬死無以塞罪母遙謂曰威豪人各有命何得相顧以虧忠義爾其勉之苞即進戰賊悉摧破其母妻為賊所害苞歸葬訖謂鄉人曰食祿而避難非忠也殺母以全義非孝也如是有何面目立于天下遂歐血而死程子曰以君城降賊而求生其母固不可矣然亦當求所以生母之方奈何不顧而遽戰乎徐庶于此蓋得之矣方氏孝孺曰苞善守官矣然而未知義也彼鮮卑者衆多而可以計取性貪而可以利誘苞若賂之而以母為請彼樂得吾之利未必不從緃使利未足以盈具心吾猶可以計勝之奈何不此之圖而使母死于寇乎夫義者合乎道而宜乎人心之謂棄母以全城與全母而棄郡其非義則一也權其輕重使上不失職惟逹于義者能之惜乎苞之不足以及此也戊午光和元年春二月辛亥朔日食地震置鴻都門學鴻都門學諸生皆敕州郡三公舉用辟召或出為刺史太守入為尚書侍中有封侯賜爵者士君子耻與為列既而詔為樂松等圖像立贊以勸學者尚書令陽球諫曰松等皆出于微蔑斗筲小人俯眉承睫徼進明時而形圖丹青有識掩口願罷鴻都之選以銷天下之謗書奏不省以張皓字智明常山人為太尉皓為中常侍奉弟因永樂宫門史霍玉以進未幾罷夏四月地震侍中寺雌雞化為雄秋七月青虹見玉堂殿庭中時又有異氣墮溫德殿東氣如龍長十餘丈上以災異詔問消復之術光祿大夫楊賜對曰今妾媵閹尹共專國朝鴻都羣小並各拔擢而令縉紳之徒委伏畎畝口誦堯舜之言身蹈絶俗之行委捐溝壑不見逮及冠履倒易陵谷代處幸賴皇天垂象譴告周書曰天子見怪則修德唯陛下斥逺佞巧抑止槃遊冀上天還威衆變可弭蔡雍對曰臣伏思諸異皆亡國之怪也天于大漢殷勤不已故屢出􅀈與妖同變以當譴責欲令人君感悟改危即安霓墮雞化皆婦人干政之所致也前者乳母趙嬈讒諛驕溢門史霍玉永樂門史董太后宫官城社為姦今道路紛紜復云有程大人宫官耆宿皆稱中大人者將為國患宜明設禁令深惟趙霍以為至戒聖朝既自約厲左右亦宜從化人自抑損以塞咎戒則天道虧滿鬼神福謙矣帝覽而歎息因起更衣曹節于後竊視之悉宣語左右中常侍程璜使人飛章言雍私事下雒陽獄劾大不敬棄市中常侍吕强成臯人愍雍無罪力為伸請詔減死一等與家屬髠鉗徙朔方璜女夫陽球又與雍叔父有隙遣客刺雍客威其義反以其情告之由是得免八月有星孛于天市冬十月廢皇后宋氏幽殺之后無寵而渤海王悝妃即后之姑也王甫恐后怨之因譖后挾左道祝詛帝信之䇿收璽綬后自至暴室以憂死父酆及兄弟並被誅以袁逢字周陽安曽孫為司空初太尉袁安子敝為司空見前孫湯字仲河復為太尉湯三子長成早卒次逢次隗字次陽逢以三公子著稱于時至是為司空隗亦顯官熹平元年先逢為司徒時中常侍袁赦用事以逢隗相家與之同姓推崇以為外援故袁氏貴寵于世成子紹字本初壯健有威容愛士養名賓客輻輳逢子術字公路亦以俠氣聞先是逢從兄子閎見時方險亂而家門富盛常對兄弟歎曰先公福祚後世不能以德守之而競為驕奢與亂世爭權此即晉之三郤矣丙子晦日食尚書盧植上言黨錮多非其罪可加赦宥宋后家屬無辜不得斂葬宜敕收拾以安遊魂郡守刺史一月數遷縱不九載可滿三嵗請謁希求一宜禁塞選舉之事責成主者天子無私宜宏大務蠲略細微帝不省以橋元黃帝葬橋山子孫守冢因以為氏元字公祖睢陽人為太尉元幼子十嵗遊門次為人所劫登樓求貨元不與司隸校尉河南尹圍守元家不敢迫元瞋目呼曰姦人無狀元豈以一子之命而縱國賊乎促令攻之元子亦死元因上言天下凡有劫質者皆並殺之不得贖以財寶開張姦路由是劫質遂絶元居位數月以疾罷初開西邸賣官開邸舍于西園賣官二千石二千萬四百石四百萬其以德次應選者半之或三分之一令長隨縣好醜豐約有賈富者先入錢貧者到官然後倍輸又私令左右賣公卿公千萬卿五百萬桓帝之初京都童謡曰城上烏尾畢逋公為吏子為徒一徒死百乘車車班班入河間河間姹女工數錢以錢為室金為堂石上慊慊舂黃梁梁下有縣鼓我欲擊之丞相怒及帝即位每笑桓帝不能作家曾無私錢董太后乃使帝賣官求貨以為私藏后亦自納金錢盈滿堂室于是童謠始驗帝問侍中楊奇曰朕何如桓帝對曰陛下之于桓帝亦猶虞舜比德唐堯帝不悅曰卿强項真楊震子孫死後必復致大鳥矣大鳥事見前奇震之曾孫也己未二年春大疫地震夏四月甲戌朔日食宦者王甫伏誅太尉段熲有罪自殺王甫曹節等姦虐弄權段熲以輸貨得太尉阿附之節甫父兄子弟為卿校牧守者布滿天下所在貪暴甫養子吉為沛相尤殘酷視事五年凡殺萬餘人尚書令陽球常拊髀發憤曰若陽球作司隸此曹子安得容乎既而果遷司隸甫使門生于京兆界辜𣙜與辜較同注見前官物七千餘萬京兆尹楊彪字文先賜之子發之球奏甫熲等罪惡悉收送雒陽獄及甫子萌吉自臨考之五毒備極父子悉死杖下熲亦自殺乃磔甫尸于夏城門雒陽城南門名大署榜曰賊臣王甫盡沒入其財産妻子皆徙比景球遂欲以次表誅節等乃敕中都官從事曰且先去權貴大猾若公卿豪右從事自辦之何須校尉邪節等聞之不敢出沐㑹送虞貴人順帝母葬節見磔甫尸慨然抆淚直入省白帝曰陽球故酷暴吏不宜使在司隸以騁毒虐帝乃徙球為衛尉于是曹節朱瑀等權勢復盛梁人審忠上書極言瑀等罪惡請與考驗有不如言願受湯鑊之誅不報封中常侍吕强為都鄉侯不受强清忠奉公帝以衆例封為都鄉侯强固辭不受因上疏曰宦官品卑人賤妄授茅土開國承家小人是用陰陽乖剌罔不繇兹蔡雍對問毀刺貴臣譏呵宦官陛下不密其言令羣邪咀嚼致雍刑罪今羣臣皆以雍為戒臣知朝廷不復得聞忠言矣宜徵雍更加授任則忠貞路開衆怨可弭帝知其忠而不能用殺司徒劉郃字季承河間人是年二月為司徒少府陳球尚書劉納衛尉陽球初郃兄倏死于陳竇之難至是陳球說郃曰曹節等放縱為害可表徙陽球為司隸以次收節等誅之郃曰凶豎多耳目恐事未㑹先受其禍劉納曰公為國棟梁傾危不持焉用彼相邪郃許諾與陽球結謀球小妻程璜之女由是節等聞知共白帝曰郃等交通書疏謀議不軌帝大怒郃及陳球劉納陽球皆下獄死庚申三年秋地震冬有星孛于狼弧晉書天文志狼一星在東井東南弧九星在狼東南十二月立貴人何氏為皇后徵后兄進字遂高為侍中后本南陽屠家以選入掖庭生皇子辨故立之後王美人生皇子協后鴆殺美人帝怒欲廢后中官固請乃止作罼圭靈昆苑罼圭苑有二東罼圭苑周一千五百步西罼圭苑周三千三百步並在雒陽宣平門外司徒楊賜諌曰先王造囿裁足以修三驅之禮薪萊芻牧皆悉往焉今廢田園驅居人畜禽獸殆非若保赤子之義帝欲止侍中任芝樂松曰文王之囿百里人以為小今與百姓共之無害也帝悅遂為之五年帝起四百尺觀于阿亭道六年帝又置囿署以宦者為令辛酉四年夏六月雨雹秋九月庚寅朔日食鮮卑檀石槐死子和連代立才力不及父而貪淫出攻北地人射殺之子騫曼幼兄魁頭立後騫曼與魁頭爭國衆遂離散魁頭死弟步度根立作列肆于後宫帝作列肆于後宫使諸采女販賣更相盜竊爭鬭帝著啇賈服從之飲宴為樂又于西園弄狗著進賢冠帶綬又駕四驢躬自操轡京師轉相倣效驢價遂與馬齊好為私稸與蓄同收天下珍貨每郡國貢獻先輸中署名為導行費貢獻外别有所入以為所獻導引也呂强諫曰天下之財莫不生之陰陽歸之陛下豈有公私今中尚方斂諸郡之寶中御府積天下之繒中尚方中御府皆私藏也西園引司農之藏中廄聚太僕之馬時帝置騄驥廄丞領受天下調馬而所輸之府輒有導行之財調廣民困費多獻少姦吏因其利百姓受其敝又阿媚之臣好獻其私容諂姑息自此而進書奏不省壬戌五年春正月詔公卿舉刺史二千石為民害者太尉許􅖢司空張濟字元江陽人承望內官受取貨賂其宦者子弟賓客貪穢皆不敢問而虛糾邊遠小郡淸修有惠化者二十六人吏民詣闕陳訴司徒陳耽字漢公東海人上言公卿所舉率黨其私所謂放鴟梟而囚鸞鳳帝以讓􅖢濟由是諸坐謠言徵者悉拜議郎二月大疫夏四月旱秋七月有星孛于太微注見前以桓典字公雅榮之元孫為侍御史典為御史宦官畏之典常乘驄馬京師為之語曰行行且止避驄馬御史癸亥六年夏大旱秋金城河溢五原山岸崩甲子中平元年春二月黃巾賊張角等起初巨鹿張角事黃老以妖術教授號太平道呪符水以療病遣弟子遊四方轉相誑誘十餘年間徒衆數十萬自青徐幽冀荆揚兗豫八州之人莫不畢應郡縣反言角以善道教化為民所歸楊賜上言宜敕州郡簡别流民護歸本郡以孤弱其黨然後誅其渠帥可不勞而定事留中司徒掾劉陶復上疏申賜前議帝殊不為意角遂置三十六方方猶將軍也大方萬餘人小方六七千各立渠帥訛言蒼天已死黃天當立嵗在甲子天下大吉以白土書京城寺門及州郡官府皆甲甲子字大方馬元義等先收荆揚數萬人以中常侍封諝徐奉等為內應約以三月五日內外俱起至是角弟子唐周告之于是收元義車裂詔三公司隸案驗宫省直衛及百姓事角道者誅殺千餘人角等知事已露馳敕諸方一時俱起皆著黃巾為識角自稱天公將軍弟寶稱地公將軍梁稱人公將軍時人謂之黃巾賊亦名為蛾賊所在燔劫旬月之間天下響應以何進為大將軍屯都亭自函谷秦故關在今河南陜州靈寶縣南漢故關在今河南府新安縣東北武帝元鼎中徙置太谷在今洛陽縣東張東都賦太谷通其前即此廣成即廣成苑注見前伊闕在今洛陽縣南即春秋周闕塞轘轅在今河南府偃師縣東南元和志山路險阻凡十二曲將去復還故名旋門在今河南開封府汜水縣西南孟津注見前小平津在今河南府孟津縣北皆置都尉官是為八關都尉以備黃巾赦黨人遣中郎將盧植討張角皇甫嵩字義真規兄子朱俊字公偉㑹稽上虞人討潁川黃巾安平後漢國治信都注見前甘陵注見前人各執其王安平王續甘陵王忠應賊京師震動帝召羣臣㑹議北地大守皇甫嵩以為宜解黨禁益出中藏錢西園廄馬以班軍士吕强曰黨錮久積人情怨憤若不赦宥與角合謀為變滋大請先誅左右貪濁大赦黨人料簡牧守能否則盜無不平矣帝懼而從之發天下精兵遣植討張角嵩俊討潁川黃巾殺中常侍吕强侍中向栩字甫興朝歌人郎中張鈞中山人時趙忠張讓等貴寵上常言張常侍是我公趙常侍是我母由是宦官無所憚第宅擬則宫室上嘗欲登永安宫候臺宦官恐望見其居處乃使人諌曰天子不當登高登高則百姓虛散上自是不敢復升臺榭及諝奉事發上詰責諸常侍曰汝曹常言黨人欲為不軌皆令禁錮今黨人更為國用汝曹反與角通為可斬未皆叩頭求退徵還宗親在州郡者已而趙忠夏惲共譖吕强云與黨人共議朝廷數讀霍光傳言其欲謀廢立也帝使中黃門持兵召强强怒曰丈夫欲盡忠國家豈能對獄吏乎遂自殺侍中向栩上便宜譏刺左右讓誣栩與角為內應殺之郎中張鈞上書曰張角所以能興兵作亂萬民所以樂附之者皆由十常侍宗親賓客典據州郡辜𣙜財利侵掠百姓百姓寃無所訴故聚為盜賊宜斬十常侍縣頭南郊以謝百姓遣使者布告天下可不須師旅而大寇自消帝以鈞章示諸常侍皆免冠徒跣頓首乞自致雒陽詔獄並出家財以助軍費有詔皆冠履視事如故帝怒鈞曰此直狂子也十常侍固當有一人善者不御史遂誣奏鈞學黃巾道收掠死獄中太尉楊賜免帝問賜以黃巾事賜所對切直帝不悅坐寇賊免五月皇甫嵩朱俊與騎都尉曹操字孟德沛國譙人父嵩宦者曹騰養子或曰嵩夏侯氏之子也合軍討三郡黃巾破平之胡三省曰曹操事始此俊與賊波才波姓才名王莽有波水將軍其後以波為氏戰敗賊遂圍嵩于長社注見前依草結營㑹大風嵩敕軍士皆束苣乘城使鋭士間出圍外縱火大呼城上舉燎應之嵩從城中鼓譟而出奔擊賊陳賊驚亂奔走會騎都尉曹操將兵適至合軍與戰大破之斬首數萬遂討汝南陳國黃巾皆破之三郡悉平操少機警有權數而任俠放蕩不治行業時人未之奇也唯橋元及何顒字伯求南陽襄鄉人異焉元謂操曰天下將亂非命世之才不能濟也能安之者其在君乎顒見操歎曰漢家將亡安天下者必是人也時汝南許劭字子將平輿人與從兄靖字文休有高名好核論鄉黨人物每月輒更其題品故汝南俗有月旦評焉操往造劭問之曰我何如人劭鄙其為人不答操劫之劭曰子治世之能臣亂世之姦雄操喜而去後舉孝廉為郎至是平賊遷濟南相奏免長吏阿附贓汙者八人朱俊護軍司馬𫝊燮上疏曰臣聞天下之禍不由于外皆興于內今張角起趙魏黃巾亂六州此皆釁發蕭牆而禍延四海者也臣奉辭伐罪戰無不克黃巾雖盛不足為憂臣之所懼在于治水不自其源未流彌增其廣誠使張角梟夷黃巾變服臣之所憂甫益深耳何者夫邪正不宜共國猶之氷炭不可同器彼知正人之功顯而危亡之兆見皆將巧辭飾說共長虛僞若不詳察忠臣將復有杜郵之戮矣陛不宜速行讒佞之誅則善人思進姦凶自息趙忠惡之夑功當封忠譖之帝猶識燮言不之罪然亦竟不封也傅燮字南容靈州人交趾吏民作亂以賈琮字孟堅東郡聊城人為刺史平之交趾多珍貨前後刺史無清行故吏民怨叛琮到部訊其反狀咸言賦斂過重百姓莫不空單京師遙逺告寃無所故聚為盜賊琮即移書告示各使安其資業招撫荒散蠲復徭役誅斬渠帥為大害者簡選良吏試守諸縣嵗間蕩定百姓以安巷路為之歌曰賈父來晚使我先反今見清平吏不敢飯言吏不敢過民家而飯也盧植圍張角于廣宗後漢縣故城在今直𨽻廣平府威縣今順德府廣宗縣元時所置檻車徵還遣中郎將董卓代之植連破張角斬獲萬餘角走廣宗植築圍鑿塹埀當拔之帝遣小黃門左豐視軍求賂不得還言于帝曰廣宗賊易破耳盧中郎固壘息軍以待天誅帝怒檻車徵植還減死一等遣卓代之秋八月遣皇甫嵩討張角角死與角弟梁寶戰皆破斬之以嵩為車騎將軍領冀州牧董卓以無功抵罪乃詔遣嵩時角已死嵩與其弟梁戰破之斬梁剖角棺傳首京師復攻梁弟寶于下曲陽後漢縣故城在今直隸正定府晉州斬之嵩能溫恤士卒每軍行頓止須營幔修立然後就舍軍士皆食爾如此也乃嘗飯故所向有功先零羌及涼州羣盜北宫北宫氏衛公族以所居為氏伯玉等反北地先零羌及枹罕河關羣盜反共立湟中義從胡北宫伯王為將軍金城人邊章韓遂字文約素著名西州羣盜誘而劫之使專任軍政殺太守燒州郡初武威太守恣行貪暴深州從事蘇正和案致其罪刺史梁鵠懼欲殺正和以自解訪于漢陽長史蓋勳勳與正和有仇或勸勳報之勳曰謀事殺良非忠也乘人之危非仁也乃諫鵠曰畜鷹欲其鷙也鷙而欲烹之將何用哉鵠乃止正和詣勳求謝勳不見曰吾為使君謀非為正和也怨之如初至是叛羌圍校尉夏育于畜官勳與州郡救育為羌所敗勳餘衆不及百人身被三創堅坐不動羌滇吾以兵扞衆曰蓋長史賢人汝曹殺之為負天勳仰罵之滇吾下馬與勳勳不肯上羌服其義勇不敢加害送還漢陽蓋勳字元固敦煌人畜官漢書音義右扶風畜牧所在朱俊擊南陽黃巾連破之南陽黃巾餘黨更以趙宏為帥衆十餘萬據宛城朱俊圍之不拔有司奏徵俊司空張溫字伯愼穰人曰臨軍易將兵家所忌宜假日月責其成功帝乃止俊擊宏斬之賊帥韓忠復據宛拒俊自將精卒乘城而入忠乃退保小城乞降諸將欲聽之俊曰兵固有形同而藝異者昔秦項之際民無定主故賞附以勸來耳今海內一統惟黃巾造逆納降無以勸善而更開逆意使賊利則進戰鈍則乞降縱敵長寇非良計也因急攻不克俊登土山望之顧謂司馬張超曰吾知之矣賊今外圍周固內營逼急乞降不受欲出不得所以死戰也萬人一心猶不可當况十萬乎不如撤圍并兵八城忠見圍解藝必自出自出則意散易破之道也既而解圍忠出戰俊因擊大破斬之餘衆復奉孫夏為帥屯宛俊急攻之司馬孫堅率衆先登拔城夏走俊追破之于是黃巾破散其餘州郡所誅一郡數千人豫州刺史王允字子師太原祁人討黃巾破之徵下獄減死論允破黃巾得張讓賔客書與黃巾交通上之帝責怒讓竟不能罪也讓由是以事中允下獄會赦還故官旬日間復以他罪捕既至廷尉大將軍進與楊賜袁隗共請之得減死論乙丑二年春正月大疫二月南宫雲臺災張讓趙忠說帝斂天下田畝十錢以修宫室鑄銅人樂安太守陸康字季寧吳郡人續之孫諌曰昔魯宣稅畝而蝝災自生哀公增賦而孔子非之豈有聚奪民物以營無用之銅人捐捨聖戒自蹈亡王之法哉內幸譖康援引亡國以譬聖明大不敬檻車徵詣廷尉侍御史劉岱字公山東萊人寵從子表陳解釋得免歸田里又詔發州郡材木文石黃門常侍輒令譴呵不中者因强折賤買僅得本價十一復貨之中者亦不即受材木腐積宫室連年不成刺史太守復增私調百姓呼嗟又令西園騶分道督趣恐動州郡多受賕賂牧守茂才孝亷遷除皆責助修宫錢當之官者皆先至西園諧價謂平定其價也然後得去巨鹿太守司馬直以有淸名減責三百萬直悵然曰為民父母而反割剝百姓以稱時求吾不忍也辭疾不聽行至孟津上書極言吞藥自殺書奏帝為暫絶修宫錢黑山在今直隸順德府沙河縣北賊褚燕降自張角之亂所在盜賊並起不可勝數其大聲者稱雷公騎白馬者為張白騎多鬚者號于氏棖大眼者為大目如此稱號各有所因大者二三萬小者六七千常山褚燕輕勇趫捷故軍中號曰飛燕山谷寇賊多附之部衆寖廣殆至百萬號黑山賊河北諸郡縣並被其害朝廷不能討燕乃遣使奏書乞降遂拜燕平難中郎將使領河北諸山谷事已燕寇河內詔遣朱俊擊却之其後諸賊多為袁紹所定燕衆稍散至建安十年燕復率其衆降封安國亭侯三月以崔烈博平人實從兄為司徒時三公往往因常侍阿保入錢西園而得之段潁張溫等雖有功勤然皆先輸貨財乃登公府烈本冀州名士至是因傅母入錢五百萬故得為司徒而聲譽頓衰烈拜日帝謂親幸者曰悔不少靳可至十萬程夫人于傍應曰崔公名士豈肯買官賴我得是反不知姝耶姝美也言反不知斯事之美也北宫伯玉等寇三輔遣皇甫嵩討之時涼州兵亂不解崔烈以為宜棄涼州詔會公卿議之議郎傅燮厲言曰斬司徒天下乃安尚書劾之帝召問狀燮對曰涼州天下要衝國家藩衛今牧御失和使一州叛逆烈為宰相不思所以弭之之䇿乃欲割棄萬里之土若使虜得居此地士徑甲堅因以為亂此社稷之深憂也帝從之夏四月大雨雹封宦者張讓等十三人為列侯以討張角功也秋七月螟罷皇甫嵩遣車騎將軍張溫代之嵩之討張角也過鄴見趙忠舍宅踰制奏沒入之又張讓私求錢不與二人奏嵩無功費多徵還收印綬以溫討北宫伯玉拜董卓為破虜將軍統于溫嵩既罷邊章韓遂等大盛張溫將兵十餘萬與之戰輒不利十一月董卓等攻破之章遂走榆中溫因使卓討羌卓糧絶乃于所度水中僞立堰以捕魚而潛從堰下過軍北賊追之決水已深不得度遂還屯扶風溫以詔書召卓良久乃至溫讓之卓應對不順孫堅前耳語謂溫曰卓不怖罪而鴟張火語宜陳軍法斬之溫曰卓素著威名殺之西行無依堅曰明公親率王師威震大下何賴于卓卓輕上無禮一罪也沮軍疑衆二罪也受任無功應召稽留三罪也古之名將未有不斷斬以成功者今明公不即誅卓虧損威刑于是在矣溫不忍發肅榆中後漢縣故城在今甘蘭州府金縣司空臨晉注見前侯楊賜卒諡文烈賜既免帝閲故事得賜與劉陶所上張角奏乃封賜臨晉侯陶中陵鄉侯至是復以賜為司空司空張溫出討以賜代居位一月卒殺諫議大夫劉陶前司徒陳耽陶上疏陳八事大較言天下大亂皆由宦官宦官共讒陶收下黃門北寺獄掠按日急陶謂使者曰恨不與伊吕同疇而以三仁為輩遂閉氣而死耽為人忠正宦官怨之亦誣陷死獄中造萬金堂帝造萬金堂于西園引司農金錢繒帛牣積堂中復藏寄小黃門常侍家錢各數千萬又買田起第于河間明年帝修南宫玉堂殿鑄銅人四鐘四又鑄天祿蝦蟇轉水入宫復作翻車渴烏灑南比郊路以為可省百姓灑道之費如天祿章懷注獸名渴烏受水之器烏之渴飲也丙寅三年春二月遣使就拜張溫為太尉三公在外始于溫是冬徵溫還京師以宦者趙忠為車騎將軍帝使忠論討黃巾之功忠遣弟延致殷勤于傅燮曰南容傳燮字少答我常侍萬户侯不足得也燮正色拒之曰遇不遇命也有功不論時也傅燮豈求私賞哉忠愈恨然憚其名不敢害出為漢陽太守夏五月壬辰晦日食丁卯四年夏四月韓遂圍隴西涼州殺刺史以應之遂圍漢陽太守傅燮與戰死之韓遂殺邊章及北宫伯玉擁兵十餘萬進圍隴西太守李相如反與遂連和殺涼州刺史耿鄙初鄙任治中程球球通姦利士民怨之至是鄙率六郡兵討賊行至狄道别駕反應賊殺球及鄙鄙司馬扶風馬騰字夀成援之後亦擁兵反又漢陽王國自號合衆將軍皆與韓遂合共推國為主進圍漢陽城中兵少糧盡太守傅燮固守燮子幹年十三言于燮曰國家昏亂遂令大人不容于朝今兵不足以自守宜還鄉里徐俟有道而輔之言未終燮嘆曰汝知吾必死邪聖建節次守節殷紂暴虐伯夷不食周粟而死吾遭世亂不能養浩然之志食人之祿又欲避其難乎吾行何之必死于此汝有才志勉之勉之主簿楊㑹吾之程嬰也幹字彥林亦知名王國使人說燮曰天下已非漢有府君寧有意為吾屬帥乎燮按劒叱之遂麾左右進兵臨陳戰殁諡曰壯節前太邱長陳實卒實在鄉閭平心率物其有爭訟輒求判正曉譬曲直退無怨者至乃歎曰寧為刑罰所加不為陳君所短楊賜陳每拜公卿羣僚畢賀輒歎實未登大位愧于先之及卒海內赴弔者三萬餘人諡為文範先生御批歷代通鑑輯覽卷二十五

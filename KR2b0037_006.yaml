body:
  text: 甘人甘大夫襄與晉閻嘉閻大夫爭閻田晉梁丙張趯率陰戎即陸渾戎伐潁今河南府登封縣有陽城廢縣周潁邑王使詹伯辭于晉曰我自夏以后稷魏駘即邰芮岐畢吾西土也及武王克商蒲姑商奄吾東土也巴濮楚鄧吾南土也肅慎燕以上諸國注俱見前亳春秋釋例亳小國與燕近吾北土也吾何邇封之有文武成康之建母弟以蕃屏周亦其廢墜是為豈如弁髦弁冠也童子垂髦始冠而因以敝之謂既冠而三加成禮則棄其始冠我在伯父猶衣服之有冠冕水木之有本源民人之有謀主也伯父若裂冠毁冕拔本塞源專棄謀主雖戎狄其何有余一人羊舌肸謂韓起曰文之霸也翼戴天子而加之以共自文以來世有衰徳而暴滅宗周以宣示其侈諸侯之貳不亦宜乎且王辭直子其圗之起乃使趙成如京師致閻田反潁俘王亦使賓滑周大夫執甘大夫襄以說于晉晉人禮而歸之己巳十有三年齊欒施子雅之子子欒之孫以字為氏髙彊子尾之子子高之孫亦以字為氏奔魯齊欒高氏多怨彊于陳鮑氏而惡之有告陳無宇曰子旗欒施字子良髙彊字將攻陳鮑亦告鮑氏無宇授甲以如鮑氏鮑國謚文子叔牙元孫亦授甲矣遂伐欒髙氏髙彊曰先得公陳鮑焉往遂伐虎門晏嬰端委立于虎門之外四族召之無所往齊侯召之而後入齊侯使王黒齊大夫以靈姑銔齊侯旗名率戰于稷齊有稷門欒髙敗又敗諸荘城内之里國人追之又敗諸鹿門齊東南門欒施髙彊奔魯陳鮑分其室晏嬰謂無宇必致諸公譲徳之主也義利之本也藴利生孽姑使無藴乎無宇盡致諸齊侯而請老于莒齊邑本取于莒故亦曰莒初晏嬰如晉羊舌肸問曰齊其何如嬰曰齊其為陳氏矣齊舊四量豆區釡鍾四升為豆各自其四以登于釡四豆為區區斗六升四區為釡釡六斗四升登成也釡十則鍾六斛四斗陳氏三量皆登一焉豆區釡各加舊量之一鍾乃大矣陳氏亦以十釡為鍾三量既加則鍾自大以家量貸而以公量收之貸厚而收薄國之諸市踊則足者屨貴屨賤民人疾痛而或燠休之欲無獲民将焉辟之至是無宇于公子公孫之無禄者私分之邑國之貧約者私與之粟由是益得齊衆心穆孟姬景公母為之請髙唐故城在今山東濟南府禹城縣西南陳氏始大庚午十有四年楚子虔誘蔡侯般殺之于申楚師滅蔡執蔡世子有以歸用之楚子在申召蔡侯蔡侯將往蔡大夫曰楚貪而無信惟蔡于憾今幣重而言甘誘我也不如無往蔡侯不可楚子伏甲而饗蔡侯于申醉而殺之刑其士七十人公子棄疾帥師圍蔡晉韓起問于叔向曰楚其克乎對曰克哉蔡侯獲罪于其君天將假手于楚以斃之何故不克然肸聞之不信以幸不可再也楚討于陳曰將定而國陳人聽命而遂縣之今又誘蔡而殺其君以圍其國雖幸而克必受其咎于是晉㑹諸侯之大夫于厥憖左傳注地闕以謀救蔡王使單子㑹之晉人請蔡子楚楚弗許遂滅蔡用𨼆太子于岡山左傳注闕申無宇曰不祥五牲牛羊豕犬雞不相為用况用諸侯乎王必悔之楚子城陳蔡不羹有二其一在河南許州襄城縣是為西不羹其一在南陽府舞陽縣是為東不羹使棄疾為蔡公問申無宇曰棄疾在蔡何如對曰臣聞親不在外覊不在内今棄疾在外鄭丹即鄭子革以子孔之難奔楚事在靈王十八年在内君其少戒楚子曰國有大城何如對曰鄭京櫟實殺曼伯左傳注檀伯也櫟大夫厲公殺之得櫟又并京宋蕭亳實殺子㳺齊渠邱即雍廩實殺無知衛蒲戚實出獻公事俱見前由是觀之則害于國末大必折尾大不掉君所知也後楚平即位蔡遂復事具後辛未十有五年原伯絞奔郊周之郊甘人弑甘公過原伯絞虐原輿人衆人也逐絞立公子跪尋絞之弟絞奔郊甘公過即悼公欲去成景之族廿成公景公之後成景之族遂殺甘公而立成公之孫鰌是為平公魯公子憖奔齊季孫意如悼子紇之子謚平子不禮于南蒯季氏邑宰南遺之子蒯謂公子憖字子仲曰吾出季氏而歸其室于公子更代也其位我以費為公臣憖許之告魯侯遂從魯侯如晉晉平公卒子夷立是為昭公魯侯如晉朝嗣君晉辭之至河乃復憖遂如晉南蒯懼不克以費季氏邑今山東沂州府費縣有故城在縣西北叛如齊憖還及郊聞費叛遂奔齊初南蒯將適費飲鄉人酒鄉人或歌之曰我有圃生之把乎從我者子乎去我者鄙乎倍其鄰者耻乎已乎已乎非吾黨之士乎後二年費人叛南蒯南蒯奔齊侍飲于齊侯齊侯曰叛夫對曰臣欲張公室子韓晳齊大夫曰家臣欲張公室罪莫大焉齊侯歸費于魯使鮑國致之壬申十有六年楚公子比自晉歸于楚弑其君䖍于乾谿在今江南潁州府亳州公子棄疾殺公羊作弑公子比楚師伐徐以懼呉楚子次于乾谿為之援時蔡公棄疾主方城之外有觀從者觀起子楚共轘觀起從奔蔡事在靈王二十一年在蔡事朝呉故蔡大夫聲子之子㑹薳氏之族楚子殺薳掩而取其室掩蒍賈曽孫及薳居掩之族楚子奪其田許圍許大夫遷許而質之蔡洧洧仕楚楚滅蔡其父死焉蔓成然字子旗鬬韋龜子楚子奪其邑為楚子所不禮因羣喪職之族啟越大夫常夀過申之㑹常壽過戮焉殺正義曰徇之于軍而不故猶在楚作亂從乃召公子比即子于前奔晉公子黒肱即子晳時在鄭襲蔡見蔡公脅而盟之蔓成然故事蔡公蔡朝呉亦欲復蔡于是公子比公子黒肱公子棄疾蔓成然蔡朝呉帥陳蔡不羹許葉之師入楚殺大子禄及公子罷敵比為王黒肱為令尹棄疾為司馬使觀從從師于乾谿令曰先至者復其田里師潰而歸楚子聞二子死自投于車下既而曰余殺人子多矣能無及乎遂㳂夏左傳注漢別名將欲入鄢即鄢郢今襄陽府宜城縣是芋尹申無宇之子亥求得之史記靈王獨徬徨山中野人莫敢入不食三日飢不能起以歸尋縊于申亥氏觀從謂比曰不殺棄疾雖得國猶受禍比曰余不忍也從曰人將忍子吾不忍俟乃行國毎夜駭時不知楚靈死畏其復來曰王入矣乙夘夜棄疾使周走而呼曰王至矣國人大驚使蔓成然走告比及黒肱曰王至矣君早自圗可以無辱又有呼而走至者二子皆自殺棄疾即位名曰熊居是為楚平左傳楚共王有寵子五人無適立乃以璧見于羣望曰請神擇于此五人者使主社稷當璧而拜者神所立也既與巴姬宻埋璧于大室之庭使五人齋而入拜康王跨之靈王肘加焉子干子晳皆逺之平王弱抱而入再拜皆壓紐葬比于訾楚地在今汝寜府信陽州曰訾敖殺囚衣之王服而流諸漢以靖國人使蔓成然為令尹初楚靈卜曰余尚得天下不吉投龜詬天而呼曰是區區者而不余畀余必自取之民患其無厭故從亂如歸是冬吳因楚亂遂滅州來劉子獻公摯晉侯齊侯宋公魯侯衛侯鄭伯簡公子定公寜曹伯莒子邾子滕子薛伯把伯小邾子㑹于平邱今河南開封府陳留縣北有平邱故城同盟魯侯不與盟晉成虒祁晉平公築虒祁之宫鄭伯及魯叔弓如晉賀事在王十一年虒祁宫故址在今山西絳州南魯叔弓諡敬子叔肸曽孫諸侯朝而歸者皆有貳心羊舌肸曰諸侯不可以不示威乃並徴㑹遂合諸侯于平邱晉人將尋盟齊人不可晉侯使羊舌肸告劉子劉子曰盟以底信君茍有信諸侯不貳何患焉告之以文辭董之以武師雖齊不許君庸多矣天子之老請帥王賦元戎十乘以先啟行遲速惟命羊舌肸告于齊齊人聽命肸曰諸侯有間矣不可以不示衆乃治兵建而不斾既而斾之諸侯畏之同盟鄭公孫僑爭承貢賦之次曰昔天子班貢輕重以列列尊貢重周之制也鄭伯男也鄭爵列伯子男而使從公侯之貢懼弗給也自日中以爭至于昏晉人許之是㑹晉以邾莒之愬魯季孫伐莒取郠用人于亳社事在王十二年辭魯侯故魯侯不與盟晉執季孫意如以歸子服湫從即子服惠伯湫私于荀呉曰魯兄弟也若為夷棄之使事齊楚其何瘳于晉子其圗之呉以告韓起且曰楚滅陳蔡不能救而為夷執親將焉用之乃歸季孫蔡侯廬隱太子之子是為平公歸于蔡陳侯吳悼太子之子是為惠公歸于陳楚子既以詐自立恐國人及諸侯叛之乃復陳蔡之地而立其後歸鄭之侵地施惠百姓存恤國中甲戌十有八年呉子夷末公羊作夷昧史記作餘昧卒夷末之初立使屈狐庸申公巫臣子留呉為行人聘于晉趙文子趙武問曰延州來季子季札封延陵故曰延陵季子今常州府武進縣也後吳滅州來復以封札故又曰延州来狐庸聘晉吳尚未滅州来曰延州来者後人追記之辭其果立乎對曰不立今嗣君甚徳而度有呉國者必此君之子孫季子守節者也雖有國不立至是夷末卒欲授季札季札讓逃去呉人曰先王時呉亦僭號有命兄卒弟代必致季子季子今逃位則王夷末後立今卒其子當代乃立夷末之子僚夏六月丁巳朔日有食之晉荀呉帥師伐鮮虞白狄别種今直隸正定府新樂縣有新市故城春秋鮮虞國初荀呉假道于鮮虞遂入昔陽今正定府藁城縣有昔陽城滅肥今藳城縣西南有肥累城春秋肥國以肥子緜臯歸事在王十五年至是荀呉復以師伐鮮虞圍鼓今正定府晉州春秋鼔國州西有鼔聚鼔人或請以城叛呉弗許使鼔人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城鼓人告食竭力盡而後取之克鼓而反不戮一人以鼓子䳒恱全反鞮歸明年荀寅又滅陸渾之戎以其貳于楚也丙子二十年夏六月甲戌朔日有食之郯子今山東沂州府郯城縣春秋郯子國少昊後嬴姓朝于魯郯子朝魯魯侯與之宴叔孫婼叔孫豹之子謚昭子問曰少皥氏鳥名官何故也郯子曰吾祖也昔者黄帝氏以雲紀炎帝氏以火紀太皥氏以龍紀俱見前我髙祖少皥摯之立也鳳鳥適至故紀于鳥為鳥師而鳥名鳯鳥各氏已見前自顓頊以來不能紀逺乃紀于近為民師而命以民事孔子聞之見于郯子而學之既而告人曰吾聞之天子失官學在四夷猶信楚人及呉戰于長岸今江南太平府當塗縣有天門山在縣西南寰宇記楚獲吳餘皇于此與和州梁山相對時人呼為東梁山西梁山呉伐楚陽匄楚穆曾孫字子瑕為令尹卜戰不吉公子魴司馬子魚曰我得上流何故不吉請改卜之吉戰于長岸魴以其屬先死楚師繼之大敗呉師獲其乗舟餘皇呉舟名使隨人與後至者守之環而塹之及泉呉公子光諸樊子即闔閭使長鬛者三人潛伏于舟側曰我呼餘皇則對師夜從之三呼皆迭對楚人從而殺之楚師亂呉人大敗之取餘皇以歸丁丑二十有一年宋衛陳鄭災二十年之冬有星孛于大辰爾雅大辰房心尾也西及漢左傳注夏之八月辰星見在天漢西今孛星出辰西光芒東及天漢魯申須魯大夫曰彗以除舊布新今除于火大辰為大火之次火出火尚伏當須火出必布焉諸侯其有火災乎梓慎亦魯大夫曰若火作當在宋衛陳鄭宋大辰之虚陳太皥之虚鄭祝融之虚皆火房也衛顓頊之虚星為大水水火之牡也火房火之舍衛星營室營室水也牡雄也水畏火故丁為壬妃至是夏五月火即心星始昏見越七日壬午宋衛陳鄭皆火鄭子産使徙大龜徙主祏于周廟使府人庫人各儆其事司馬司冦列居火道行火所焮城下之人伍列登城明日書焚室而寛其征與之材三日哭國不市使行人告于諸侯宋衛皆如是惟陳不救火初鄭禆竈鄭大夫言于公孫僑曰宋衛陳鄭將同日火若我用瓘斚玉瓚欲以禳火鄭必不火僑弗與既火竈曰不用吾言鄭又將火鄭人請用之僑不可曰天道逺人道邇竈安知天道是亦多言矣豈不或信謂多言者或時有中遂不與亦不復火明年鄭大水龍鬬于時門之外洧淵國又請為禜焉子産于弗許曰我鬬龍不我覿也龍鬬我獨何覿焉我無求龍龍亦無求于我乃止故時門鄭南城門洧淵水經注洧水逕新鄭城又東為洧淵水鑄大錢韋昭國語注大錢者大于舊其賈重唐尚書云大錢重十二銖王將鑄大錢單子穆公名旗單靖公之曽孫曰不可古者天災降戾于是量資幣權輕重以振救民民患輕則為之作重幣以行之于是乎有母權子而行重曰母輕曰子民皆得焉若不堪重則多作輕而行之亦不廢重于是乎有子權母而行小大利之今王廢輕而作重民失其資能無匱乎若匱王用將有所乏乏則將厚取于民民不給將有逺志是離民也王其圗之弗聽戊寅二十有二年許世子止弑其君買悼公許男瘧飲太子止之藥卒止曰我與夫殺者不立乎其位以與其弟虺哭泣歠飦粥嗌不容粒未踰年而死胡氏安國曰君有疾飲藥臣先嘗之父有疾飲藥子先嘗之蓋言慎也止不擇醫而輕用其藥藥不先甞而悮進于君是有忽君父之心而不慎矣此簒弑之萌堅氷之漸加之以大惡而不得辭也己夘二十有三年孔子至京師既而反魯孔子將適京師南宫适言于魯侯魯侯與之乗車两馬俾适俱往孔子既至問禮于老子史記老子姓李氏名耳字伯陽謚聃周守蔵室之史也孔子將問禮于老子老子曰君子得其時則駕不得其時則蓬累而行吾聞之良賈深藏若虚君子盛徳容貌若愚孔子去謂弟子曰吾見老子其猶龍乎問樂于萇𢎞周大夫樂記賔牟賈侍坐于孔子言及樂孔子曰我所聞于萇𢎞亦如是歴郊社之所考明堂之則家語孔子觀于明堂覩四門墉有堯舜與桀紂之象孔子曰明鏡可以察形往古者所以知今人主不務襲迹于其所以安存而急急于所以危亡是無異于却走而欲求及前人也察廟朝之度家語孔子入后稷之廟廟堂右階之前有金人焉三緘其口而銘其背曰古之慎言人也孔子顧謂弟子曰行身如此豈以口過患哉于是反乎魯弟子稍益進焉楚世子建奔宋楚殺其傅伍奢伍舉子及子尚伍員亦曰伍胥奔吳楚子生太子建使伍奢為之師費無極為少師建聘于秦無極與逆勸王取之請大城城父楚邑漠為父城縣故邑在今河南汝州寳豐縣考楚城父有二一以遷許具見後一即此而寘太子焉無極曰太子通北方王收南方是得天下也王悅從之故建居城父無極譖建于楚子曰建與伍奢將以方城之外叛齊晉輔之其事集矣楚子信之執伍奢使城父司馬奮揚殺太子未至而使遣之知太子寃故遣令去太子奔宋無極曰奢之子材若在吳必憂楚國盍以免其父召之楚子使召之曰来吾免爾父棠君尚尚為棠邑大夫棠今江南江寜府六合縣謂其弟員曰吾知不逮我能死爾能報爾其勉之伍尚歸奢聞員不来曰楚君大夫其旰食乎楚人皆殺之員如呉言伐楚之利于吳子公子光曰是宗為戮而欲反其讎不可從也員曰彼將有他志知其欲弑僚余姑為之求士而鄙以待之乃見鱄設諸史記作專諸堂邑人焉而耕于鄙盗殺衛侯之兄縶衛靈公同母兄以足疾不立事見前衛公孟縶狎齊豹衛大夫齊惡子奪之司冦與鄄衛邑注見前有役則反之無則取之故齊豹作亂衛侯在平夀衛下邑縶有事于蓋獲衛郭門之門外齊子氏帷于門外而伏甲焉縶出齊氏擊殺之衛侯聞亂遂如死鳥衛郭門外地北宫氏之宰北宫喜先與齊豹同謀及是豹使人召喜其宰不知殺之喜佗之子謚貞子攻齊氏滅之衛侯遂入初齊豹見宗魯于縶為骖乗將作亂謂之曰勿與乗吾將殺之對曰吾由子事公孟子行事乎吾將死之以周猶終竟也事子而歸死于公孟及難作宗魯死焉孔子弟子琴牢衛人字子開一字張故亦曰琴張聞之將往弔孔子曰齊豹之盗而孟縶之賊言齊豹所以為盗孟縶所以見賊皆由宗魯女何弔焉君子不食姦不受亂不為利疚于囬不以囬待人不蓋不義不犯非禮齊侯與其大夫晏嬰適魯問禮齊侯獵魯郊因入魯與晏嬰俱問魯禮舍于公館迎孔子至與語齊侯曰秦穆公國小處僻其霸何也孔子對曰秦國雖小其志大處雖僻其政中首㧞五羖爵之大夫與語三日授之以政雖王可也其霸小矣齊侯說鄭大夫公孫僑卒公孫僑有疾謂㳺吉即子太叔公孫蠆子曰我死子必為政惟有徳者能以寛服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而翫之則多死焉故寛難疾數月而卒孔子聞之出涕曰古之遺愛也庚辰二十有四年鑄無射左傳注無射鐘名其聲于律中無射之管故以律名鐘王將鑄無射而為之大林韋昭國語註大林無射之之覆也作無射而以大林覆其律中林鍾也單子穆公旗曰不可先王之制鐘也大不過鈞鈞所以鈞音之法以木長七尺有弦繫之以為鈞法重不過石百二十斤為石今作鐘不度不中鈞石之數無益于樂而鮮民財將焉用之王弗聽問之伶州鳩伶司樂官州鳩名也對曰臣聞政象樂樂從和八音克諧和從平細大不踰故曰樂政今細抑大陵不容于耳細無射大林鍾大聲陵之細聲抑而不聞非和也聽聲越言迃也逺無射之聲為大林所陵聽之㣲細迃逺非平也妨正匱財聲不和平非宗官宗伯樂官屬焉之所司也亦不聽秋七月壬午朔日有食之辛巳二十有五年宋華亥華合比弟王九年合比奔衛亥代為右師向寧向戌子華定華椒孫奔楚宋公平公子元公佐惡華向華氏向氏華定華亥與向寜謀曰亡愈于死先諸華亥乃誘羣公子而殺之公子寅公子御戎公子朱公子固公孫援公孫丁遂刼宋公取太子即景公欒及公母弟公子辰及地以為質宋公亦質華向之子亥子無慼寕子羅定子啟與華氏盟時公子城與華氏戰不勝遂奔晉既而宋公殺華向之質而攻之向寕將殺太子華亥曰千君而出又殺其子其誰納我使華牼歸太子及二公子華亥向寜華定奔陳事在王二十三年先是宋公將攻華氏請于華費遂華氏之族時為大司馬費遂曰敢不聽命及華向奔費遂子貙為少司馬多僚為御士多僚惡貙譖諸宋公宋公將逐貙貙家臣張匄殺多僚刼費遂而召亡人華亥向寜華定自陳入于宋以南里宋里名叛華登費遂之子先奔在呉以呉師救之齊烏枝鳴齊大夫方戍宋及宋厨人濮厨邑大夫名濮敗呉師于鴻口左傳注梁國睢陽縣有鴻口亭睢陽今河南歸徳府啇邱縣遂敗華氏齊烏枝鳴請皆用劍從之華氏北復即之厨人濮以裳裏首而荷以走曰得華登矣遂敗之新里于是公子城以晉師至曹翰胡曹大夫㑹晉荀呉齊苑何忌齊大夫衛公子朝與華氏戰大敗之圍諸南里華登如楚乞師事在王二十四年至是楚薳越以師逆華氏且告于宋諸侯之戍請出華氏以為楚功宋人從之華亥向寕華定華貙華登俱出奔楚王崩王室亂王穆后生太子夀先卒在王十五年次子猛及母弟匄無寵庶子朝有寵于王王欲立之未果王殺下門子子猛傅也時子朝之傅賓起適郊見雄雞自斷其尾問之侍者曰憚其犧也遽歸告王曰雞憚其犧信畜矣人犠實難已犠何害王弗應犧人犧喻子猛難去聲言寵異他人易致禍難也已喻子朝言寵異在已自無患害也至是王田北山即北邙山亦曰郟山在河南府洛陽縣東北有心疾崩于榮錡氏河南府鞏縣有榮錡澗周榮公食邑劉子時劉獻公摯卒單穆公立其庶子劉蚠亦曰劉卷是為文公單子穆公旗奉王子猛攻賔起殺之盟羣王子于單氏葬景王王子朝因舊官百工之喪職者與靈景之族靈王景王之子孫作亂逐劉子劉子奔揚春秋彚纂注揚周邑即揚拒泉臯之揚單子逆王猛于莊宫莊王之廟以歸王子還子朝之黨夜取王猛以如莊宫單子出奔于平畤左傳注周地羣王子追之單子殺王子還及姑發弱鬷延定稠八子皆靈景之族因戰而殺之子朝奔京劉子單子欲告急于晉以王猛居于皇今河南府鞏縣西有皇亭即皇也晉籍談荀躒荀盈之子謚文子帥九州之戎即陸渾戎州鄉屬也五州為鄉及焦瑕温原之師納王猛于王城王子猛卒左傳註未即位故不言崩母弟匄立是為敬王王猛雖立未及即位故不成喪後追謚為悼王冬十二月癸夘朔日有食之敬王壬午元年王居狄泉註見前尹氏立王子朝地震王子朝入于尹尹圉即尹文公誘劉佗劉子族殺之召伯奐南宫極以成周人戍尹單子劉子樊齊以王如劉王子朝入于王城是秋地震南宫極震為屋所壓而死萇𢎞私謂劉子曰周之亡也其三川震事見前今西王王子朝在王城故曰西王之大臣亦震天棄之矣東王王居狄泉在王城東故曰東王必大克癸未二年王在狄泉晉侯使士彌牟文伯匄之子諡景伯涖問王室之故彌牟立于乾祭王城北門而問于介大也衆晉人乃辭王子朝不納其使衆言子朝曲故徴㑹諸侯期以明年明年晉趙鞅宋樂大心魯叔詣衛北宫喜鄭㳺吉曹人邾人滕人薛人小邾人㑹于黄父謀王室也趙鞅令諸侯之大夫輸王粟具戍人曰明年將納王魯趙鞅武之孫謚簡子樂大心樂喜族孫叔詣叔弓之孫黄父注見前夏五月乙未朔日有食之呉滅巢先是呉伐州来吳縣州来楚復取而城之楚薳越以諸侯之師救之呉用公子光謀光請分師先犯胡沈與陳必先奔諸侯之師摇楚必大奔呉子從之敗頓胡沈蔡陳許之師于雞父今江南鳯陽府夀州有雞備亭即春秋雞父至是楚子為舟師以略呉疆及圉陽左傳注楚地而還呉人踵楚邊人不備遂滅巢及鍾離沈尹戍楚公子貞封于沈其後以邑為氏今陳州府沈縣有沈城是其地也非沈國之沈曰王一動而亡二姓之帥幾如是而不及郢甲申三年魯侯攻其大夫季孫意如不克出奔齊魯侯欲去季氏季孫意如以季姒之譖殺申夜姑季公若為之請不得因謀于公子務人欲去季氏務人使其弟告公曰季姒意如庶叔公鳥妻申夜姑公鳥家臣公若亦公亥公鳥弟公子務人即公為昭公子以告臧孫臧昭伯名賜臧為之子臧孫以難先是賜之從弟㑹為讒于臧氏而逃于季氏臧氏執旃季氏怒拘臧氏老告郈孫郈昭伯名惡惠公之後郈孫以可勸先是季郈之雞鬬季氏介其雞郈氏為之金距季孫怒益宫于郈氏且讓之故郈孫怨意如告子家覊公子遂之子歸父别為子家氏覊謚懿伯公羊作駒覊曰讒人以君徼幸事若不克君受其名不可為也公羊傳昭公將殺季氏告子家駒駒曰牛馬維婁委已者也而柔焉季氏得民衆乆矣君無多辱焉維婁繋馬曰維繫牛曰婁委食也言牛馬之于食已者則柔順之魯侯不從遂伐季氏殺季堅意如弟亦曰公之于門意如請待于沂上此魯沂水源出尼山逕曲阜縣入于泗今曰西沂河以察罪弗許請囚于費弗許請以五乗亡弗許子家覊曰許之日入慝作弗可知也弗聽叔孫氏之司馬鬷戾以其衆救季氏孟氏從之殺郈孫伐公徒魯侯與臧孫賜如墓謀遂奔齊臧孫賜子家覊從齊侯唁于野井今山東濟南府齊河縣有野井亭取鄆魯有二鄆此為西鄆在曹州府鄆城縣其東鄆在沂州府沂水縣與莒近以居之先是有鸜鵒巢于魯師已魯大夫曰吾聞文武之世童謡有曰鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯徴褰與襦鸜鵒之巢逺哉遥遥裯父喪勞宋父以驕鸜鵒鸜鵒往歌来哭童謡如是其將及乎未幾魯侯遂出時叔孫婼在闞及歸謂季孫曰人誰不死子以逐君成名子孫不忘不亦傷乎季孫曰茍使意如得改事君所謂生死而肉骨也叔孫從公于齊與公言于幄内曰將安衆而納公公使歸季孫有異志叔孫齊于其寢使祝宗祈死遂卒縣叔孫婼謚昭子豹之庶子闞魯地今兖州府汶上南旺湖中有闞亭孔孑子適齊孔子以魯亂適齊史記為高昭子家臣通乎景公高昭子名張偃之子齊侯問政于孔子說欲封以尼谿之田晏嬰不可齊侯惑之孔子遂行反乎魯乙酉四年王入于成周尹氏召氏左傳注召伯當言召氏疏曰召氏族出奔召伯身不奔也毛伯以王子朝奔楚先是王三年尹氏渉于鞏由鞏渉洛焚東訾今河南府鞏縣有東訾聚俗呼訾店及是單子如晉告急晉知躒即荀躒趙鞅帥師納王使女寛晉大夫守闕塞即伊闕亦曰龍門山在河南府洛陽縣南王師起于滑今河南府偃師縣有緱氏故城本滑國秦滅之周鄭分有其地次于尸今偃師縣有尸鄉晉師克鞏召伯盈奐之子諡簡公逐王子朝朝及召氏之族毛伯得尹氏固南宫嚚極之子奉周之典籍以奔楚召伯逆王于尸及劉子單子盟王入于成周即周下都在王城之東敬王徙都于此今洛陽故城是也晉師使成公般晉大夫戍之而還七年尹氏固自楚歸京師京師殺之并殺召伯盈及原伯魯之子十五年楚亂王人殺王子朝于楚丙戌五年呉弑其君僚吳子因楚喪楚平卒子壬立是為楚昭使公子掩餘燭庸皆僚母弟伐之復使季札聘于上國以觀諸侯公子光告鱄設諸曰我王嗣也吾欲求之事若克季子雖至不我廢也鱄設諸曰王可弑也光乃伏甲于堀室而享呉子光偽足疾入于堀室鱄設諸寘劍于魚中以進遂弑呉子鱄設諸鈹交于胷而死光遂自立是為闔閭以鱄設諸子為卿季札至曰茍先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也吾誰敢怨復命哭墓復位而待掩餘奔徐燭庸奔鍾吾晉士鞅宋樂祁犂樂喜孫字子梁衛北宫喜曹人邾人滕人㑹于扈諸侯之大夫㑹于扈令戍成周且謀納魯侯晉士鞅取貨于季孫而為之辭魯侯遂不得復先是齊侯將納魯侯季氏家臣申豐以錦賂梁邱據據言于齊侯乃止是冬晉籍談致諸侯之戍于成周楚殺費無極初無極以讒去蔡朝吳朝呉在蔡無極欲去之謂蔡人曰王惟信呉故處之蔡二三子莫之如也而在其上弗圗必及于難蔡人逐朝呉楚子怒無極曰呉在蔡蔡必速飛去呉所以翦其翼也事在景王十八年出蔡侯朱即平公無極取貨于平公之弟東國謂蔡人曰楚王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國是為悼公事在景王二十八年逐太子建殺連尹奢即伍奢事俱在前國人惡之既又與鄢將師比譖郤宛字子惡于令尹囊瓦公子囊子字子常殺之無極謂令尹曰子惡欲飲子酒又謂子惡令尹欲飲酒于子子惡五曰我賤人無以酬之無極曰令尹好甲兵取五甲兵寘諸門令尹必觀從以酬之及饗日無極謂令尹曰吾幾禍子甲在門矣令尹使視郤氏則有甲焉召鄢將師而告之遂攻郤氏爇之盡滅其族黨事在王四年國人莫不謗令尹沈尹戌言于囊瓦曰無極殺不辜以興大謗幾及子矣呉新有君疆埸曰駭國若有大事子其危哉囊瓦乃殺無極與鄢將師盡滅其族以說于國丁亥六年晉殺其公族祁盈奚之孫午之子及楊食我字伯石羊舌肸子肸食邑子楊為楊氏晉祁勝與鄔臧勝與臧皆祁氏家臣通室易其妻祁盈執之勝賂荀躒躒言于晉侯晉侯執祁盈盈之臣殺勝與臧晉遂殺祁盈及楊食我食我盈之黨也于是滅祁氏羊舌氏分其田以為縣祁氏之田七縣羊舌氏之田三縣祁氏晉獻侯之後羊舌氏靖侯之後既滅晉之公族殆盡己丑八年呉滅徐徐子章羽左傳公羊俱作禹奔楚呉子伐徐防山以水之壅山之水以灌于是滅徐徐子斷其髪携其夫人以逆呉子呉子唁而送之遂奔楚呉子問于伍員曰初而言伐楚余知其可而恐其使余往也又惡人之有余之功也今余將自有之伐楚何如對曰楚執政衆而乖莫適任患若為三師以肄猶勞也焉一師至彼必皆出彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之既罷而後以三軍繼之必大克之闔閭從之楚于是始病庚寅九年魯季孫意如㑹晉荀躒于適歴左傳注晉地先是魯侯如晉事在王六年次于乾侯今直𨽻廣平府成安縣有斥邱故城春秋晉乾侯邑既而歸鄆在王七年至是復在乾侯晉侯時晉頃公卒子午立是為定公將以師納之范鞅請召季孫而使私焉鞅私告季孫曰子必来我受其無咎于是意如遂㑹荀躒于適歴從荀躒如乾侯荀躒以晉侯之命唁魯侯且請入魯侯卒不肯見意如荀躒退謂意如曰君怒未怠子姑歸祭謂其歸攝君事冬十有二月辛亥朔日有食之辛夘十年呉伐越呉始用師于越晉史黒晉太史蔡墨曰不及四十年越其有呉乎越得嵗而呉伐之必受其凶左傳注是年嵗在星紀星紀呉越之分也嵗星所在其國多福呉先用兵故反受其殃晉韓不信韓起孫謚簡子齊髙張宋仲幾仲氏宋公子成之後幾江之孫為左師魯仲孫何忌衛世叔申太叔儀孫鄭國㕘公孫僑子曹人莒人薛人把人小邾人城成周王使富辛與石張俱王大夫如晉請城成周晉范鞅謂魏舒曰與其戍周不如城之于是晉魏舒韓不信来京師合諸侯之大夫于狄泉尋盟且令城成周己丑士彌牟營成周計丈數揣高卑度厚薄仞溝洫物土方議逺邇量事期計徒庸慮財用書餱糧以令役于諸侯屬役賦文書以授帥左傳疏既號令下役之事以告諸侯令諸國國各出若干之役各築若干之文故曰屬役賦文書以授帥帥諸侯之大夫也而效諸劉子韓不信臨之以為成命城三旬而畢乃歸諸侯之戍是役宋仲㡬不受功齊高張後晉人執宋仲幾歸諸京師魯侯卒于乾侯季孫意如廢世子而立公子宋昭公之弟是為定公魯侯出奔在外凡八年至是卒卒于十二月明年叔孫不敢婼之子謚成子逆昭公之喪于乾侯叔孫請見子家覊覊辭叔孫使告之曰若公子宋主社稷羣臣之願也凡從君出而可以入者惟子是聽子家氏禾有後季孫願與子從政對曰若立君則有卿大夫與守龜在覊弗敢知若從君者則貎而出者以義從公與季氏無怨入可也冦而出者與季氏為冦行可也若覊也則君謂昭公知其出未知其入覊將逃也喪及壊隤注見前公子宋先入從昭公者皆自壞隤反公子宋即位季孫葬昭公于墓道南孔子為司冦溝而合諸墓魯羣公墓在闞昭道公墓别葬先君墓之外孔子自昭公墓道為溝使與先君墓合明臣無貶君之義也癸巳十有二年盗殺鞏伯簡公鞏伯棄其子弟而好用逺人鞏氏之羣子弟賊鞏伯乙未十有四年劉子晉侯宋公元公子景公頭曼魯侯蔡侯悼公弟昭公申衛侯陳子陳惠公卒子懐公桞立未葬書子鄭伯定公子獻公蠆許男悼公子斯曹伯隱公通莒子邾子頓子胡子滕子薛伯把伯小邾子齊國夏國佐子諡惠子㑹于召陵侵楚初蔡侯如楚令尹囊瓦三年止之蔡侯為两佩两裘獻其一于楚子而自服其一令尹欲之弗與故止之及歸時唐侯如楚有两肅爽馬令尹欲之弗與亦三年止之唐人竊馬以獻乃歸唐侯蔡人聞之因請獻佩蔡侯遂歸遂如晉請伐楚于是劉子合諸侯于召陵謀伐楚晉荀寅荀呉子謚文子求貨于蔡侯弗得言于范鞅曰國家方危諸侯方貳將以襲敵不亦難乎吾自方城以来靈王十五年晉敗楚侵方城楚未可以得志祗取勤焉乃辭蔡侯晉人假羽旄于鄭鄭人與之明日或斾以㑹晉于是失諸侯盟于皋鼬今河南許州臨潁縣有城皋亭即鄭皋鼬邑將長蔡于衛劉子以衛祝佗衛大祝子魚言與范鞅謀之長衛侯是夏蔡滅沈沈人不㑹于召陵晉使蔡人滅之秋劉子卷卒謚曰文公蔡侯以呉子及楚人戰于柏舉名勝志麻城縣東北有柏子山縣東有舉水柏舉之名蓋合山水而得之今麻城縣𨽻湖北黄州府楚師敗績吳入郢自楚子即位無嵗不有呉師伍員為呉行人伯州犂之孫嚭為呉太宰同謀楚蔡侯因之質其子于呉以呉子及唐侯今湖北徳安府隨州有古唐城亦有上唐郷故唐國伐楚楚令尹囊瓦禦之陳于柏舉呉子之弟夫槩以其屬五千擊囊瓦之卒卒奔楚師亂呉師大敗之囊瓦奔鄭呉從楚師五戰及郢楚子取其妹季芊以出呉入郢穀梁傳壊宗廟徙陳器撻平王之墓以班處宫榖梁傳君居其君之寢而妻其君之妻大夫居其大夫之寢而妻其大夫之妻蓋有欲妻君之母者楚子濟江入于雲中盗攻之奔鄖鄖公鬬辛之弟懐以平王殺其父曼成然將弑楚子辛曰君討臣誰敢讐之必犯是余將殺汝陸縣雲中即雲夢澤在今湖北徳安府安遂奔隨呉人從之謂隨人曰周之子孫在漢川者楚實盡之天誘其衷致罰于楚而君又竄之周室何罪隨人卜之不吉辭呉呉人乃退丙申十有五年春三月辛亥朔日有食之於越入呉呉師在楚越遂入呉楚申包胥楚大夫姓公孫封于申故號申包胥以秦師救楚呉師敗還楚子入于郢初伍員與申包胥友其亡也謂申包胥曰我必復楚國申包胥曰子能復之我必能興之及楚子在隨史記申包胥亡于山中使人謂伍子胥曰子之報讐其已我甚乎吾聞之人衆者勝天天定亦能勝人子胥曰為謝申包胥吾日暮途逺吾故倒行而逆施之申包胥如秦乞師秦伯使辭焉曰子姑就館將圗而告對曰寡君越在草莾下臣何敢即安立依于庭墻而哭日夜不絶聲勺飲不入口七日秦伯景公子哀公為之賦無衣詩秦風篇杜預曰取其修我戈矛與子同仇與子偕作與子偕行九頓首而坐秦師乃出于是申包胥以秦師至楚使楚人先與呉人戰而自稷春秋彚纂注稷楚地在今河南南陽府桐柏縣境㑹之呉師敗呉子乃歸楚公子結滅唐呉夫槩歸自立與闔閭戰而敗奔楚楚封為棠谿氏地棠谿城在今汝寕府西平縣即古房子國楚子入于郢賞申包胥申包胥曰吾為君非為身也君既定矣又何求遂逃賞明年楚公子申為令尹遷郢于鄀以定楚國公子申即子西楚昭弟鄀亦作若漢書地理志南郡若楚昭王自郢徙此今襄陽府宜城縣有若縣故城丁酉十有六年鄭㳺速帥師滅許以許男斯歸許白文叔受封至斯十八傳而為鄭滅後楚又立元公成至戰國初復滅初許畏鄭偪遷葉許靈公畏鄭偪請遷于楚楚遷之于葉今河南南陽府葉縣是也事在簡王十年後又遷夷楚公子棄疾遷許于夷即城父今江南潁州府亳州有城父故城即陳夷邑事在景王十二年遷白羽楚以左尹勝言遷許于白羽即析也今河南南陽府内鄉縣析縣故城是事在景王二十一年遷容城在今業縣西事在王十四年几四遷皆依于楚至是楚為吳敗鄭遂滅之儋翩靈王弟儋季之後作亂儋翩率子朝之徒因鄭人以作亂于是鄭伐馮左傳注周邑滑注見前胥靡今河南府偃師縣有胥靡城負黍今河南府登封縣有負黍聚狐人後漢書郡國志潁陰有狐宗鄉古狐人亭也潁隂今河南許州闕外伊闕外之邑在洛陽晉閻沒戍京師且城胥靡王處于姑蕕左傳注周邑以避亂明年儋翩據儀栗左傳注周邑以叛單子穆公子謚武公劉子文公子諡桓公敗尹氏儋翩之黨于窮谷遂逆王于慶氏守姑蕕大夫晉籍秦談之子送王王入于王城館于公族黨氏周大夫而後朝于莊宫又明年單子伐榖城簡城劉子伐儀栗盂以定王室榖城在洛陽縣西北簡城杜註闕孟即䢴今懷慶府河内縣有邗臺左傳王取邗蒍之田是也戊戌十有七年齊侯鄭伯盟于鹹諸侯始復特盟齊侯鄭伯盟于鹹徴㑹于衛衛侯欲叛晉諸大夫不可使北宫結如齊而私于齊侯曰執結以侵我齊侯從之陳氏傅良曰此特相盟也特相盟自齊桓以来未之有于是再見諸侯無主盟矣是故石門志諸侯之合也于鹹志諸侯之散也己亥十有八年盗竊魯寳玉大弓榖梁傳寳玉者封圭也大弓者武王之戎弓也魯陽虎季氏家臣亦曰陽貨欲去三桓以季寤桓子之弟桓子名斯意如之子更季氏代桓子叔孫輒叔孫氏庶子更叔孫氏代武叔州仇武叔不敢之子已更孟氏代懿子何忌將享季氏于蒲圃魯東門外塲圃而殺之孟氏先備公歛處父知虎欲為亂請孟孫先備乃選圉人之壯者三百人偽為築室于門外虎以季孫將如蒲圃季孫謂御者騁而入孟氏築者闔門射殺虎之弟越陽虎遂刼魯侯與叔孫州仇伐孟氏成宰公歛陽即處父帥成人自上東門入與陽氏戰于南門之内又戰于棘下城内地名陽氏敗陽虎說甲如公宫取寳玉大弓以出入于讙陽關今山東泰安府肥城縣有下讙亭即魯讙地陽闗在兖州府寜陽縣以叛明年陽虎歸寳玉大弓奔齊請師以伐魯齊侯將許之鮑國諫曰陽虎有寵于季氏而將殺季孫以不利魯國君富于季氏而大于魯國兹陽虎所欲傾覆也魯免其疾而君又收之無乃害乎齊侯執陽虎囚諸西鄙虎逃奔晉適趙氏孔子曰趙氏其世有亂乎陽虎既奔公山不狙以費叛季氏召孔子孔子欲往亦卒不行不狃季氏宰即費子洩論語作弗擾庚子十有九年魯以孔子為中都宰孔子初仕為中都宰制為養生送死之節長㓜異食強弱異任男女别塗路無拾遺器不彫偽為四寸木之厚之棺五寸之槨因邱陵為墳不封不樹行之一年四方之諸侯則焉辛丑二十年魯以孔子為大司冦孔子由中都宰為司空乃别五土之性一曰山林二曰川澤三曰邱陵四曰墳衍五曰原隰而物各得其所生之宜由司空為大司冦設法而不用無姦民魯侯㑹齊侯于夾谷今山東泰安府莱蕪縣有夾谷峪肇域記魯定公會齊侯于此齊侯使使告魯為好㑹㑹于夾谷孔子相告魯侯曰臣聞有文事者必有武備古者諸侯出疆必具官以從請具左右司馬魯侯從之及㑹獻酢既畢齊有司請奏四方之樂于是旍旄羽祓音弗舞者所執周禮有祓舞矛㦸劍撥音伐大楯也鼓噪而至孔子趨而進曰吾两君為好㑹夷狄之樂何為于此請命有司齊侯心怍麾而去之有頃齊有司請奏宫中之樂優倡侏儒為戱而前孔子趨而進曰匹夫熒惑諸侯者罪當誅請命有司齊侯懼而動知義不若乃歸謂晏嬰曰寡人獲過于魯君如之何嬰曰君子謝過以質小人謝過以文齊嘗侵魯邑請皆還之齊乃歸魯鄆讙注俱見前龜陰田在龜山之北龜山在今泰安府新泰縣田今泰安府泰安縣有謝過城寰宇記齊人歸魯田以謝過後人因名考夾谷之會春秋彚纂削去左傳不録今採史記輯癸夘二十有二年魯墮郈今山東㤗安府東平州有郈城魯叔孫氏邑及費注見前圍成注見前弗克孔子言于魯侯曰臣不藏甲大夫無百雉之城使仲由弁人字子路亦曰季路為季氏宰將墮三都于是叔孫氏墮郈季氏將墮費公山不狃叔孫輙帥費人以襲魯孔子使申句須樂頎皆魯大夫伐之敗諸姑蔑括地志姑蔑故城在泗水縣東東泗水縣今隸山兖州府不狃輒奔齊遂墮費將墮成公歛陽謂孟孫曰墮成齊人必至于北門且成孟氏之保障無成是無孟氏也子偽不知吾將不墮冬魯侯圍成弗克甲辰二十有三年晉趙鞅入于晉陽今山西太原府大原縣有晉陽故城春秋晉邑屬趙氏以叛茍寅士吉射士鞅子諡昭子入于朝歌以叛趙鞅歸于晉趙鞅謂邯鄲午趙勝子别邑邯鄲因以為氏邯鄲今縣屬直隸廣平府曰歸我衛貢五百家吾舍諸晉陽二十年趙鞅圍衛衛懼貢五百家鞅置之邯鄲今欲徙置晉陽午許諾歸告其父兄皆曰不可鞅怒殺午圍邯鄲邯鄲午荀寅之甥寅士吉射之姻也相與睦故不與圍邯鄲將作亂董安于趙氏家臣聞之告鞅曰先備諸鞅不可范氏中行氏伐趙氏鞅奔晉陽晉人圍之荀躒韓不信魏曼多魏舒孫諡襄子與寅吉射相惡欲逐之躒言于晉侯曰君命大夫始禍者死今三臣始禍而獨逐鞅刑不均矣請皆逐遂奉晉侯伐范氏中行氏寅與吉射將伐晉侯齊髙彊前奔魯適晉曰三折肱知為良醫唯伐君為不可我以伐君在此矣弗聽遂伐晉侯國人助晉侯寅吉射敗奔朝歌韓魏以趙氏為請鞅入于絳盟于公宫明年荀躒告于趙氏請殺董安于恐其為政于趙氏也趙孟患之安于曰吾死而晉國寕趙氏定焉用生乃縊而死趙氏祀安于于廟魯以孔子攝相事孔子由魯司冦攝行相事七日而誅少正夘戮之两觀之下荀子門人問孔子曰少正夘魯之聞人夫子為政而始誅之得無失乎孔子曰人有大惡者五而竊盗不與焉一曰心逆而險二曰行僻而堅三曰言偽而辨四曰記醜而博五曰順非而澤此五者有一于人不得免于君子之誅而少正夘兼有之故不可不誅也與聞國政三月政化大行男女行者别于塗道不拾遺男尚忠信女尚貞順四方客至不求有司有司常供其職客至不求有司存焉皆如歸焉家語魯之販羊有沈猶氏者常朝飲其羊以詐市人有公慎氏者妻滛不制有慎潰氏者奢侈踰法魯之鬻六畜者飾之以儲價及孔子為政沈猶氏不敢朝飲其羊公慎氏出其妻慎潰氏越境而徙鬻牛馬者不儲價賣羔豚者不加飾齊人歸女樂于魯孔子適衛孔子相魯齊人懼欲敗其政乃選好女子八十人衣以文飾而舞容璣舞曲名史記作康樂及文馬三十駟遺魯君陳于魯城南髙門魯南門本曰稷門僖公更髙大之因改名外季孫斯㣲服往觀之再三將受焉乃語魯君為周道㳺觀之終日怠于政事仲由言于孔子曰夫子可以行矣孔子曰魯今且郊如致膰于大夫則吾猶可以止季孫既受女樂三日不聽政又不致膰俎孔子遂行適衛主于顔濁鄒孟子作顔讎由乙巳二十有四年楚公子結即子期陳公孫佗人帥師滅頓以頓子牂歸頓子欲事晉背楚而絶陳好于是楚滅頓明年楚又滅胡以胡子豹歸於越敗呉于檇李公羊作醉李今浙江嘉興府秀水縣有檇李故城即呉越戰處吳子光卒吳伐越越子勾踐禦之越至允常始彊勾踐允常之子陳于檇李越子使罪人三行屬劍于頸而自剄吳師屬之目越人因而大敗之靈姑浮越大夫以戈擊闔閭闔閭傷將指足大指還卒于陘去擕李七里子夫差立夫差使人立于庭茍出入必謂己曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越使石尚歸脤于魯公羊傳石尚者何天子之士也脤者何俎實也腥曰脤熟曰膰石尚言于王曰乆矣周之不行禮于魯也自定王八年王季子聘魯後未嘗行禮于魯請行脤于是歸脤于魯王室與魯之交止此衛世子蒯聵出奔宋衛侯為夫人南子宋女也召宋朝宋公子舊通于南子在宋故呼之太子蒯聵適齊適宋野野人歌之曰既定爾婁豬豕子豬喻南子盍歸吾艾豭牡豕喻宋朝太子羞之歸而朝夫人戲陽速從太子三顧夫人見其色啼而走曰蒯聵将殺余蒯聵奔宋後如晉盡逐其黨公孟彄奔鄭又奔齊人之考劉氏敞曰蒯聵聞野歌其心慙焉則以謂夫人夫人惡其斥已滛則啼而走言太子殺余以誣之靈公惑于南于言必聽從故逐蒯聵此其真也不當如左氏所記今依其說節刪左傳輯孔子自衛適陳復反于衛孔子居衛十月将適陳過匡注見前匡人以為陽虎而拘之史記陽虎嘗暴匡人孔子狀類陽虎拘焉既解家語子路将戰孔子止之曰歌予和汝子路彈琴而歌孔子和之曲三終匡人解甲而罷還衛主蘧瑗見南子史記靈公夫人南子願見孔子孔子辭謝不得已而見之明年去適宋宋司馬桓魋即尚魋尚戍孫欲殺之史記孔子去曹適宋與弟子習禮大樹下桓魋欲殺孔子㧞其樹遂去適陳主司城貞子是嵗魯定公卒子蔣立是為哀公孔子居陳三嵗史記孔子至陳嵗餘有隼集于陳庭而死楛矢貫之石砮長尺有咫陳湣公使使問孔子孔子曰隼来逺矣此肅慎氏之矢也昔武王克商肅慎氏貢楛矢石砮長尺有咫王以矢分大姬配虞胡公而封諸陳試求之故府果得之居三嵗陳常被冦于是去陳反于衛家語孔子適衛出于蒲㑹公叔氏以蒲叛止孔子曰茍無適衛吾出子乃盟而出之遂適衛子貢曰盟可負乎孔子曰要盟非義也衛侯聞孔子来郊迎問伐蒲孔子曰可哉衛侯卒不果伐蒲衛邑今大名府長垣縣是衛侯不能用史記靈公老怠于政不用孔子晉趙氏家臣佛肸趙鞅邑宰以中牟史記趙簡子攻范中行伐中牟佛肸畔鄭中牟史記索隱此趙之中牟在河北非中牟畔召孔子孔子欲往亦不果將西適晉見趙鞅至河而反史記孔子至于河聞竇鳴犢舜華之死也臨河而嘆曰羙哉水洋洋乎余之不濟此命也夫乃還息于陬鄉作陬操以哀之琴操孔子作息陬操辭曰乾澤而漁蛟龍不㳺覆巢毁卯鳯不翔留慘余心悲還原息陬竇鳴犢舜華皆賢大夫趙簡子未得志時須以為政及得志皆殺之復處于衛仍主蘧伯玉丙午二十有五年秋八月庚辰朔日有食之丁未二十有六年吳子敗越于夫椒通典包山一名夫椒山即西洞庭山也在今江南蘇州府呉縣西南太湖中呉夫差敗越于夫椒報檇李也遂入越越子以甲楯五千保于㑹稽注見前使大夫種文種字子禽先為楚宛令後仕越因呉太宰嚭以行成呉子將許之伍員曰不可臣聞之樹徳莫如滋去疾莫如盡勾踐與我同壤而世為仇讎于是乎克而弗取將又存之違天而長冦讎後雖悔之不可食已食消已止也弗聽退而告人曰越十年生聚十年教訓二十年之後呉其為沼乎越及呉平夫差既克越乃修怨于陳遂侵陳國語勾踐棲于㑹稽召范蠡而問焉對曰持盈者與天定傾者與人節事者與地勾踐曰與人柰何對曰卑辭尊禮玩好女樂尊之以名如此不已又身與之市勾踐乃令大夫種行成于呉来而復往曰請委管籥屬國家以身隨之呉許諾乃令大夫種守于國與范蠡入宦于呉三年而呉人遣之戊申二十有七年衛侯元卒晉趙鞅帥師納衛世子蒯聵于戚初衛侯將立公子郢字子南靈公庶子郢辭及是衛侯卒夫人命公子郢為太子曰君命也郢曰亡人之子輙在乃立輙是為出公于是晉趙鞅納故太子蒯聵于戚宵迷陽虎曰右河而南必至焉水經注大河故瀆東北逕戚城西此定王後河徙道也時晉軍自西来渡河不知戚處陽虎欲逆河之右而南行使蒯聵絻始發喪之服八人衰絰偽自衛逆者告于門哭而入遂居之時晉荀寅士吉射在朝歌齊人輸之粟鄭罕達送之與趙鞅遇于戚鞅以蒯聵與罕逹戰于鐡鄭師敗績罕逹字子姚虎之孫鐡邱名在大名府開州北蔡遷于州来先是楚以柏舉之故圍蔡使疆于江汝漢書地理志髙陵山汝水所出至新蔡入淮汝髙陵山即伏牛山在今河南府嵩縣新蔡今縣隸寜府此汝水故道自元時作堨舞陽其流遂北合于潁之間而還左傳注楚欲使蔡徙國于江水之北汝水之南蔡權聽命故楚師還蔡于是請遷于呉楚既還蔡叛而就吳至是吳洩庸吳大夫如蔡納聘而稍納師蔡不即遷故因聘襲之師畢入衆知之蔡侯告大夫殺公子駟以說哭而遷墓遂遷于州来後二年蔡侯將如呉諸大夫恐其又遷公孫翩射而弑之文之鍇殺翩立昭侯子朔是為成侯己酉二十有八年殺大夫萇𢎞劉氏王室卿士范氏晉大夫世為婚姻萇𢎞事劉文公劉子卷故與范氏右士吉射晉趙鞅以為討于是殺萇𢎞是冬趙鞅圍朝歌荀寅犯師而出奔邯鄲明年趙鞅圍邯鄲邯鄲降荀寅奔鮮虞齊國夏伐晉㑹鮮虞納荀寅于柏人今直隸順徳府唐山縣有柏人故城又明年晉圍柏人荀寅士吉射奔齊庚戌二十有九年晉人執戎蠻子赤今河南汝州有蠻城亦曰鄤鄉春秋戎蠻子國歸于楚楚人既克夷虎蠻夷叛楚者乃謀北方左司馬眅申公夀餘葉公諸梁皆楚大夫諸梁字子髙沈尹戌子為一昔之期夜結期明日即襲襲梁今汝州有梁縣故城及霍汝州有霍陽聚以霍陽山名單浮餘亦楚大夫圍蠻氏蠻氏潰蠻子赤奔陰地河南山北自上雒以東至陸渾楚人使謂晉陰地之命大夫特命總監陰地之大夫士蔑曰晉楚有盟好惡同之若將不廢寡君之願也不然將通于少習山名在今陜西商州其下即武關以聽命士蔑請諸趙鞅鞅許之士蔑乃執蠻子與其五大夫以畀楚人楚誘其遺民盡俘以歸景王十九年楚誘戎蠻子嘉殺之遂取蠻氏既而復立其子至是蠻氏遂亡御批歴代通鑑輯覽卷七

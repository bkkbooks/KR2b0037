front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷六十八五季壬唐長興三年是辰歲凡四國三鎮春二月唐始刻九經即唐開成中石壁九經也注見前板
  hash: sha256:2ad55c391cf4aab5d192ac1d916b164482e204ef8669b7dd090060c47de08a44
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_067-1a, image: WYG0337/WYG0337-0643a.png}
body:
  text: 唐馮道李愚等請令判國子監田敏淄州鄒平人校正九經刻板印賣是年始刻俟板成而印賣之以一文義去舛訛唐主從之王應麟曰古未有板木唐末益州始有墨板多術數字學小書至後唐長興中始詒儒臣校九經鏤本于國子監唐賜髙從誨爵勃海王三月吳越王錢鏐卒諡武肅子元瓘嗣鏐寢疾謂將吏曰吾疾必不起諸兒皆愚懦誰可為帥者衆泣曰兩鎮令公傅瓘先代鏐兼領兩鎮故云仁孝有功孰不愛戴鏐乃悉出印鑰授傳瓘曰將士推爾宜善守之又曰子孫善事中國勿以易姓廢事大之禮遂卒年八十一傅瓘與兄弟同幄行喪內牙指揮使陸仁章曰令公嗣先王霸業將史旦暮趨謁嘗與諸公子異處乃令主者更設一幄扶傳瓘居之禁諸公子從者無敢妄入鏐末年左右皆附傳瓘仁章數以事犯之至是傳瓘勞之仁章曰先王在位仁帝不知事令公今日盡節猶事先王也傳瓘既襲位更名元瓘以遺命去國儀用藩鎮法除民田荒絶者租稅置擇能院掌選舉殿最中外有上書告訐者皆置不問由是將吏輯睦契丹遣使如唐初契丹舍利契丹官名掌軍政萴士力反剌來達反人名與惕隱注見前皆為趙德鈞所擒契丹屢遣使請之唐主謀于羣臣德鈞等皆曰契丹所以數年不犯邉數求和者以此輩在南故也縱之則邉患復生冀州刺史楊檀字德明沙陀人後賜名光逺亦曰萴剌契丹之騎將在朝廷數年知中國虛實若得歸為患必深恐悔之無及既而契丹使者辭歸唐主曰朕志在安邉不可不稍副其求乃遣萴骨亦人名舍利與之俱歸契丹以不得萴刺自是數寇雲州及振武夏四月董璋襲西川五月孟知祥擊敗之董璋為其下所殺知祥遂取東川孟知祥三遣使説董璋以主上加禮于兩川茍不奉表謝罪恐復致討璋不從三月遣李昊詣梓州極論利害璋詬怒不許至是璋會諸將謀及成都皆曰必克王暉曰劔南萬里成都為大時方盛夏師出無名必無成功璋不從自將破白楊林鎮在漢州東聲勢甚盛知祥以趙廷隱為都部署將三萬人拒之五月璋克漢州知祥自將兵八千人趣之廷隱陳于雞蹤橋在成都府新都縣北張公鐸陳于其後璋退陳于武侯廟下在新都縣北彌牟鎮八陳圖旁璋帳下驍卒大譟曰日中曝我輩何為何不速戰璋乃上馬前鋒始交指揮使張守進降于知祥言璋兵盡此無復後繼當急擊之知祥登高冡督戰趙廷隱三戰不利知祥懼以馬箠指後陳張公鐸師衆大呼而進東川兵大敗死者數千人璋與數騎遁去餘衆七千人降知祥引兵追璋至赤水在漢州東南而還命廷隱攻梓州璋還至府第方食王暉帥兵三百大譟而入璋引妻子登城呼指揮使潘稠使討亂兵稠斬璋首以授暉暉舉城迎降趙季良帥將吏請知祥兼領東川許之唐主聞璋敗死知祥已據全蜀乃遣供奉官李存瓌克寧之子知祥之甥賜知祥詔知祥拜泣受詔上表謝罪自是復稱藩然益驕倨矣知祥令李昊草表請行墨制補兩川刺史以下又表請趙季良等為節度使皆從之秋七月唐武安節度使馬希聲卒八月弟希範字寶規殷第四子嗣唐以李從珂為鳯翔節度使九月唐城三河縣唐置以地近泃洳鮑邱三水而名今屬順天府初契丹既強寇抄盧龍諸州皆遍每自涿州運糧入幽州敵多伏兵于閻溝即今鹽溝河在良鄉縣南掠取之及趙德鈞為節度使城閻溝而戍之為良鄉縣漢縣故城在房山縣東今良鄉縣即趙德鈞所罝糧道稍通于州東五十里城潞縣漢縣明省故城在今通州而戍之近州之民始得稼穡至是又于州東北百餘里城三河縣以通薊州運路敵騎來爭德鈞擊却之冬十月唐大理少卿康澄上疏論事唐主優詔答之澄上疏曰國家有不足懼者五有深可畏者六隂陽不調不足懼三辰失行不足懼小人訛言不足懼山崩川涸不足懼蟊賊傷稼不足懼賢人藏匿深可畏四民遷業深可畏上下相徇深可畏廉耻道消深可畏毁譽亂真深可畏直言蔑聞深可畏不足懼者願陛下存而不論深可畏者願陛下修而靡忒優詔奬之十一月唐以石敬瑭為河東節度使秦王從榮喜為詩聚浮華之士高輦等于幕府與相唱和頗自矜伐唐主語之曰吾雖不知書然喜聞儒士講經義開益人智思吾見莊宗好為詩將家子文非素習徒取人竊笑汝勿效也從榮為人鷹視輕佻峻急既參朝政驕縱不法安重誨死王淑妃孟漢瓊宣傳制命范延光趙延夀為樞密使從榮皆輕侮之石敬瑭兼六軍諸衛副使其妻永寧公主與從榮異母素相憎疾從榮以宋王從厚聲名出已右尤忌之從厚善以卑弱奉之故嫌隙不外見敬瑭不欲與從榮共事常思外補以避之延光延夀亦慮及禍屢辭機要會契丹欲入冦唐主命擇河東帥延光延夀先言石敬瑭康義誠可往既而欲專用敬瑭李嵩曰非石太尉不可敬瑭亦願行即命除之敬瑭至晉陽以部將劉知逺周瓌晉陽人為都押衙委以腹心軍事委知逺帑藏委瓌癸唐長興四年閩王延鈞龍巳啓元年是嵗凡四國三鎮春正月閩王王延鈞稱帝更名璘閩人有言真封宅龍見者閩王延鈞更命其宅曰龍躍宫遂詣寶皇宫事見前受册備儀衛入府即皇帝位自以國小地僻常謹事四鄰由是境內差安二月唐定難節度使李仁福卒軍中立其子彛超為留後唐以孟知祥為蜀王三月唐以李彛超為彰武後唐延州軍號留後安從進為定難留後彛超拒命先是河西諸鎮皆言李仁福潛通契丹併吞河右南侵關中會仁福卒以其子彛超為彰武留後安從進為定難留後仍命靜難節度使藥彥稠將兵五萬以宫苑使安重益為監軍送從進赴鎮敕諭夏銀綏宥將吏彛超年少未能扞禦故徙之延安從命則有富貴之福違命則有覆族之禍四月彛超上言為軍民擁留未得赴鎮詔遣使趣之夏四月唐以劉瓉為秦王傅言事者請為秦王置師傅宰相畏秦王從榮請令自擇秦府判官王居敏薦兵部侍郎劉瓉于從榮從榮請以為傅王府參佐皆新進少年輕脫諂諛瓉獨從容規諷從榮不悅概以僚屬待之瓉有難色從榮戒門者勿為通月聽一至府或竟日不召亦不得食五月唐立李從珂為潞王子從益為許王閩地震閩主璘避位修道命福王繼鵬璘之子權總萬機初王審知性節儉府舍皆庳陋至是大作宮殿極土木之盛吳徐知誥營宫城于金陵宋齊邱勸知誥徙吳主都金陵知誥乃營宫城于金陵秋七月唐安從進討李彛超不克引還安從進攻夏州州城赫連勃勃所築堅如鐡石劚鑿不能入又黨項萬餘騎徜徉四野抄掠糧餉官軍無所芻牧山路險狹關中民輸斗粟束藳錢數緡民間困竭不能供彛超登城謂從進曰夏州貧瘠非有珍寶蓄異可以充朝廷貢賦也但以祖父世守此土不欲失之幸與表聞許其自新詔從進引兵還自是夏州輕朝廷每有叛臣必陰與之連以邀賂遺已而彜超上表謝罪唐以為節度使唐賜在京諸軍優給唐主暴得風疾久未平征夏州無功軍士頗有流言于是賜在京諸軍優給有差賞賚無名士卒益驕唐以錢元瓘為吳王元瓘于兄弟甚厚其兄元璙自蘇州入見元瓘以家人禮事之奉觴為夀曰此兄之位也而小子居之兄之賜也元璙曰先王擇賢而立之君臣位定元璙知忠順而已因相與對泣閩以薛文傑為國計使文傑性巧佞以聚斂求媚及是閩主璘復位避位六十五日親任之文傑陰求富民之罪籍沒其財被榜捶者胸背分受仍以銅斗火尉之建州土豪吳光入朝文傑利其財將治之光怨怒帥其衆且萬人叛奔吳八月唐主加尊號賜內外將士優給時一月之間再行優給用度益窘唐以秦王從榮為天下兵馬大元帥太僕少卿致仕何澤表請立從榮為太子唐主覽表泣下私謂左右曰羣臣請立太子朕當歸老太原舊第耳不得已詔宰相樞密議之從榮見唐主言曰臣幼少且願學治軍民不願當此名也退見范延光趙延夀曰執政欲奪我兵柄幽之東宫耳延光等知上意且懼從榮之言即以白唐主制以從榮為天下兵馬大元帥位宰相上九月唐以趙延夀為宣武節度使朱宏昭為樞密使秦王從榮請嚴衛本左右羽林今改捧聖注見前步騎兩指揮為牙兵每入朝從數百騎張弓挾矢馳騁衢路不快于執政私謂所親曰吾一日南面必族之范延光趙延夀懼屢求外補以避之唐主以為見已病而求去甚怒曰欲去自去奚用表為齊國公主唐主女嫁趙延夀復為延夀言于禁中乃以延夀為宣武節度使以朱𢎞昭為樞密使同平章事𢎞昭復辭唐主叱之𢎞昭乃不敢言唐遣使如吳越吏部侍郎張文寶泛海使杭州船壞水工以小舟濟之風飄至天長注見前吳主厚禮之資以從者儀服錢幣數萬文寶獨受飲食餘皆辭之曰唐朝與吳久不通問今既非君臣又非賓主若受此物何辭以謝吳主嘉之竟達命于杭州而還冬十月唐以范延光為成德節度使馮贇為樞密使延光屢因孟漢瓊王淑妃以求出以為成德節度使以馮贇代之唐主以親軍都指揮使康義誠為朴忠親任之時要近之官多求出以避秦王之禍義誠度不能自脫乃令其子事秦王務持兩端冀得自全唐主餞范延光曰卿今逺去事冝盡言對曰朝廷大事願陛下與內外輔臣參決勿聽羣小之言遂相泣而别時孟漢瓊用事附之者共為朋黨以蔽惑上聽故延光言及之十一月唐主疾病秦王從榮作亂伏誅唐主疾作大漸秦王從榮入問疾唐主俯首不能舉從榮出聞宫中皆哭意唐主已殂明旦稱疾不入從榮自知不為時論所與恐不得為嗣與其黨謀欲以兵入侍先制權臣遣都押衙馬處鈞謂朱𢎞昭馮贇曰吾欲帥牙兵入宫中侍疾且備非常二人曰主人萬福王冝竭心忠孝不可妄信浮言從榮怒復遣謂曰公輩殊不愛家族耶何敢拒我二人患之入告王淑妃孟漢瓊召康義誠謀之義誠竟無言從榮將步騎千人陳于天津橋遣馬處鈞至馮贇第語之曰吾今日決入公輩禍福在須臾耳贇馳入右掖門見𢎞昭義誠漢瓊及三司使孫嶽贇讓義誠曰公勿以兒在秦府左右顧望主上拔擢吾輩自布衣至將相茍使秦王兵得入此門置主上何地乎義誠未對監門白秦王已將兵至端門外漢瓊拂衣起入殿門𢎞昭贇隨之義誠不得已亦隨之入時唐主病小愈漢瓊等入見曰從榮反兵已攻端門矣唐主指天泣下謂義誠曰卿自處置勿驚百姓控鶴指揮使李重吉從珂之子也時侍側唐主曰吾與爾父冒矢石定天下從榮輩得何力今乃為人所教為此悖逆當呼爾父授以兵柄耳重吉即帥控鶴兵守宫門漢瓊召馬軍指揮使朱洪實使將五百騎討從榮從榮走歸府僚佐皆竄匿牙兵潰去皇城使安重益斬從榮并其子以獻唐主悲駭絶而復蘇由是疾復劇時宋王從厚為天雄節度使遣漢瓊徵之追廢從榮為庶人初從榮失道六軍判官趙逺諫曰大王勿謂父子至親為可恃獨不見恭世子戾太子乎從榮怒出為涇州判官及從榮敗逺以是知名人趙逺字上交涿州范陽唐主亶殂明宗性不猜忌與物無競登極之年已踰六十每夕于宫中焚香祝天曰某胡人因亂為衆所推願天早生聖人為生民主在位年榖屢豐兵革罕用校于五代稍為小康十二月唐主從厚立是為後唐閔帝唐主自終易月之制即召學士讀貞觀政要太宗實録有致治之志然不知其要寬柔少斷李愚私謂同列曰吾君延訪鮮及吾輩位高責重事亦堪憂衆不敢應孟知祥聞明宗殂亦謂僚佐曰宋王幼弱為政者皆胥吏小人其亂可坐而俟也甲唐閔帝從厚應順元年四月以後唐潞王從珂清泰午元年蜀孟知祥明德元年是歲蜀建國凡五國三鎮春正月唐以高從誨為南平王馬希範為楚王錢元瓘為吳越王唐以李重吉為亳州團練使潞王從珂與石敬瑭少從明宗征伐有功各得衆心朱𢎞昭馮贇位望素出二人下逺甚一旦執朝政皆忌之及明宗殂從珂辭疾不來使臣至鳯翔者或自言伺得從珂陰事于是朱馮不欲重吉典禁兵出為亳州團練使從珂女為尼洛陽亦召入禁中從珂由是疑懼吳人攻閩建州先是閩吳光請兵于吳吳信州刺史蔣延徽不俟朝命引兵會攻建州閩主璘遣使求救于吳越及是延徽敗閩兵于浦城唐縣今屬建寧府遂圍建州閩主璘遣兵救之軍及中途士卒不進曰不得薛文傑不能討賊軍中以聞國人震恐太后及福王繼鵬泣謂璘曰文傑盜弄國權枉害無辜上下怨怒久矣今吳兵深入士卒不進社稷一旦傾覆留文傑何益文傑亦在側互陳利害璘曰吾無如卿何卿自為謀文傑出繼鵬伺之門外以笏擊之仆地檻車送軍前士卒臠食之初文傑以古制檻車疏潤更為之形如木匱攢以鐵鋩內向動輒觸之既成而酋自入焉延徽攻建州垂克徐知誥以延徽吳太祖楊溥稱帝尊行密為太祖之壻與臨川王濛溥之兄素善恐其克建州奉濛以圖興復遣使召之延徽亦聞閩兵及吳越兵將至引兵歸閩人追擊敗之知誥貶延徽為右威衛將軍遣使求好于閩唐以唐汭陳乂為樞密直學士唐主即位舊鎮將佐之有才者朱馮皆斥逐之汭以文學從歷三鎮而性迂疏故朱馮引置密近又以其黨陳乂監之蜀主孟知祥稱帝是為後蜀知祥以趙季良為司空平章事吳徐知誥黜其押牙周宗為池州刺史尋復召之吳人多不欲遷都吳主遣宋齊邱如金陵諭知誥罷之先是知誥久有傳禪之志以吳主無失德恐衆心不悅欲待嗣君宋齊邱亦以為然一旦知誥臨鏡鑷白髭歎曰國家安而吾老矣奈何周宗知其意請如江都微以傳禪諷吳主齊邱以宗先己心疾之手書切諫以為未可請斬宗以謝吳主乃黜宗為池州副使久之節度副使李建勳司馬徐玠等屢陳知誥功業宜早從民望召宗復為都押牙知誥由是疏齊邱唐以潞王從珂為河東節度使石敬瑭為成德節度使從珂舉兵鳯翔唐遣兵討之官軍降潰朱𢎞昭馮贇不欲石敬瑭久在太原徙潞王從珂鎮河東敬瑭鎮成德皆不降制書但各遣使臣持宣監送赴鎮從珂既與朝廷猜阻朝廷又命洋王從璋權知鳯翔從璋性粗率樂禍前代安重誨而殺之事具前從珂謀于將佐皆曰主上富于春秋政事出于朱馮大王功名震主離鎮必無全理不可受也觀察判官馮胤孫字慶光棣州商河人曰君命召不俟駕今道過京師臨喪赴鎮而已諸人凶謀不可從也衆哂之從珂乃移檄鄰道言朱𢎞昭等専制朝權懼傾社稷今將入朝以清君側而力不能獨辦願乞靈鄰藩以濟之以西都留守王思同當東出之道尤欲與之相結遣使詣長安説以利害餌以美妓思同謂將吏曰吾受明宗大恩今與鳯翔同反借使事成而榮猶為一時之叛臣况事敗而辱流千古之醜迹乎遂執其使以聞他使亦多為鄰道所執惟隴州防禦使相里金相里氏以地為氏金字國寶并州汾陽人五代史作字奉金今依相里氏墓碑傾心附之遣判官薛文遇往來計事朝廷議討鳯翔康義誠不欲出請以王思同為統帥嚴衛指揮使尹暉魏州大名人羽林指揮使楊思權等皆為偏禆護國節度使安彥威字國俊代州崞縣人為都監思同雖有忠義之志而御軍無法從珂老于行陳將士徼幸富貴者心皆向之三月彥威與山南西道張虔釗武定孫漢韶李存進之子時存進已復本姓彰義張從賓靜難康福等五節度使合兵討鳯翔鳯翔城塹卑淺守備俱乏衆心危急從珂登城泣謂外軍曰吾未冠從先帝百戰出入生死金創滿身以立今日之社稷汝曹目睹其事今朝廷信任讒臣猜忌骨肉我何罪而受誅乎因慟哭聞者哀之虔釗褊急以白刃驅士卒登城士卒怒大詬反攻之虔釗走免楊思權因大呼曰大相公吾王也遂帥諸軍解甲投兵請降于從珂思權以幅紙進曰願王克京城日以臣為節度使從珂即書思權可邠寧節度使授之王思同猶未之知趣士卒登城尹暉大呼曰城西軍已入城受賞矣衆爭棄甲投兵而降其聲震地日中亂兵悉入外軍亦潰思同等六節度使皆遁去潞王悉斂城中之財以犒軍至于鼎釡皆估直以給之思同等至長安副留守劉遂雍鄩之子閉門不納乃趣潼關唐潞王從珂至長安唐主以康義誠為招討使將兵拒之殺馬軍指揮使朱洪實從珂建大將鼓旗整衆而東以孔目官劉延朗宋州虞城人為腹心劉遂雍悉出府庫之財于外軍士前至者即給賞令過皆不入城從珂至長安遂雍迎謁率民財以充賞都監王景從等奔還中外大駭唐主不知所為謂康義誠等曰先帝棄萬國朕外守藩方當是之時為嗣者在諸公所取耳既承大業國事皆委諸公諸公以社稷大計見告朕何敢違今事至于此何方可以轉禍朕欲自迎潞王以大位讓之若不免于罪亦所甘心朱𢎞昭馮贇大懼不敢對康義誠欲悉以宿衛兵迎降為已功乃曰侍衛諸軍尚多臣請自往扼其衝要招集離散以圖後效幸陛下勿以為憂唐主乃召將士慰諭親至左藏給將士金帛義誠與朱洪實共論用兵利害洪實欲以禁軍固守洛陽曰如此彼亦未敢徑前然後徐圖進取可以萬全義誠怒曰洪實欲反邪洪實曰公自欲反乃謂人反其聲漸厲唐主聞召而訊之竟不能辨遂斬洪實軍士益憤唐主殺李重吉于宋州又殺從珂女尼惠明唐潞王從珂執西京留守王思同殺之從珂至昭應聞前軍獲王思同曰思同雖失計然盡心所奉亦可嘉也至靈口即零口鎮在西安府臨潼縣南前軍執思同以至從珂責讓之對曰思同起行間先帝擢之位至節將常愧無功以報大恩非不知附大王立得富貴助朝廷自取禍殃但恐死之日無面目見先帝于泉下耳敗而釁鼓固所宜也請早就死王為之改容曰公且休矣欲宥之而楊思權之徒耻見其面尹暉盡取思同家資妓妾屢言于劉延朗曰若留思同慮失士心屬從珂醉不待報擅殺之及其妻子從珂醒怒延朗嗟惜者纍日唐潞王從珂至陜諸將及康義誠皆降從珂至閿鄉朝廷前後所發諸軍遇之皆迎降無一人戰者康義誠引兵發洛陽詔以安從進為京城巡檢從進已受從珂書潛布腹心矣從珂至靈寶安彥威安重霸皆降惟保義節度使康思立山陰諸部人謀固守陜城從珂前鋒至城下呼曰禁軍十萬已奉新帝爾輩數人奚為徒纍一城人塗地耳于是士卒爭出迎思立不能禁亦出迎從珂至陜移書諭洛陽文武士庶惟朱𢎞昭馮贇兩族不赦義誠所部自相結百什為羣棄甲兵爭先詣陜降義誠麾下才數十人亦因候騎請降既而興元張虔釗武定孫漢韶俱以鎮降蜀唐主出奔夏四月石敬瑭入朝遇于衛州殺其從騎唐主憂駭不知所為急遣中使召朱𢎞昭謀所向𢎞昭赴井死安從進殺馮贇于第傳二人首于從珂唐主欲奔魏州召孟漢瓊使為先置漢瓊單騎奔陜唐主乃以五十騎出門馮道等入朝及端門聞變道及劉昫涿州歸義人乃歸至天宫寺安從進遣人語之曰潞王倍道而來且至矣相公宜帥百官至穀水奉迎乃止于寺中召百官中書舍人盧導字熙化范陽人至馮道曰勸進文書宜速具草導曰潞王入朝百官班迎可也設有廢立當俟太后教令豈可遽議勸進乎道曰事當務實導曰安有天子在外人臣遽以大位勸人者邪若潞王守節北面以大義見責將何辭以對公不如帥百官詣宫門進名問安取太后進止則去就善矣道未及對從進屢遣人趣之道等即紛然而去既而從珂未至三相馮道李愚劉昫息于上陽門外盧導過前道復召而語之導對如初李愚曰舍人之言是也吾輩之罪擢髮不足數矣從珂上箋于太后取進止遂自陜而東四月唐主至衛州東數里遇石敬瑭大喜問以大計敬瑭聞義誠叛去俯首長嘆數四乃見衛州刺史王𢎞贄問之𢎞贄曰前代天子播遷多矣然皆有將相侍衛府庫法物使羣下有所瞻仰今獨以五十騎自隨雖有忠義之心將若之何敬瑭還以其言告弓箭庫使沙夙沙氏之後為沙氏守榮奔史照曰古有賁姓音奔後遂為奔洪進洪進前責敬瑭曰公明宗愛壻富貴相與共之憂患亦宜相恤今天子播越委計于公冀圖復興乃以此四者為辭是直欲附賊賣天子耳抽佩刀欲刺之敬瑭親將陳暉救之守榮鬭死洪進亦自刎敬瑭牙內指揮使劉知逺引兵入盡殺唐主左右及從騎獨置唐主而去敬瑭遂趣洛陽唐孟漢瓊詣潞王從珂降從珂誅之初從珂罷河中歸私第王淑妃數遣孟漢瓊存撫之漢瓊自謂于從珂有舊恩至澠池西見從珂大哭欲有所陳從珂曰諸事不言可知即命斬于路隅唐潞王從珂入洛陽廢其主從厚為鄂王而自立是為後唐廢帝從珂至蔣橋百官班迎傳教以未拜梓宫未可相見馮道等皆上箋勸進從珂入謁太后太妃詣西宫伏梓宫慟哭自陳詣闕之由馮道帥百官班見拜從珂答拜道等復上箋勸進從珂曰豫之此行事非獲已俟皇帝歸闕園寢禮終當還守藩服羣公遽言及此甚無謂也明日太后下令廢少帝為鄂王以潞王知軍國事又明日太后令潞王宜即帝位乃即位于柩前唐主從珂弒鄂王從厚于衛州磁州刺史宋令詢死之王𢎞贄遷唐鄂王于州廨唐主從珂遣𢎞贄之子巒往鴆之王不飲巒縊殺之王性仁孝于兄弟敦睦雖遭秦王忌疾坦懷待之卒免于患及嗣位于潞王亦無嫌而朱𢎞昭孟漢瓊之徒橫生猜問王不能違以至禍敗孔妃尚在宫中唐主使人謂之曰重吉輩何在遂殺之并其四子鄂王之在衛州也惟磁州刺史宋令詢遣使問起居聞其遇害慟哭半日自經死既而唐葬明宗于徽陵乃并葬鄂王于陵城之南封才數尺觀者悲之後晉主石敬瑭立追諡王為閔帝唐康義誠伏誅夷其族唐主之在陜也義誠至陜待罪唐主責之曰先帝晏駕立嗣在諸公今上亮隂政事在諸公何為不能始終陷吾弟至此義誠大懼叩請死唐主素惡其為人未欲遽誅且宥之至是唐主斬義誠而滅其族唐賜將士緡錢有差初唐主發鳯翔許軍士以入洛人百緡及至洛陽三司使金帛不過三萬而賞軍之費計須五十萬緡于是有司百方以斂民財僅得六萬唐主怒下軍巡使獄晝夜督責囚繫滿獄貧者至自經赴井而軍士遊市肆皆有驕色市人聚詬之曰汝曹為主力戰言其為主盡力亦所當然反使我輩鞭胸杖背出財為賞汝曹猶揚揚自得不愧天地乎是時竭左藏舊物及諸道貢獻乃至太后太妃器服簪珥皆出之才及二十萬緡唐主患之學士李専美夜直唐主讓其不能為謀専美曰自長興之季賞賚亟行卒以是驕雖有無窮之財終不能滿驕卒之心夫國之存亡不専繫于厚賞亦在修法度立紀綱今財力盡此宜據所有均給之何必踐初言乎唐主以為然詔禁軍在鳯翔歸命者賜錢七十緡至二十緡在京者各十緡軍士無厭猶怨望為謠言曰除去菩薩扶立生鐵以閔帝仁弱唐主剛嚴有悔心故也五月唐復以石敬瑭為河東節度使唐主與石敬瑭皆以勇力善鬭事明宗然素不相悅至是敬瑭不得已入朝不敢言歸時敬瑭久病羸瘠太后及魏國公主即敬瑭妻永寧公主是年進封魏國後又進封晉國屢為之言而鳯翔舊將佐皆勸留之惟韓昭胤李専美以為趙延壽在汴不宜猜忌敬瑭唐主亦見其骨立不以為虞乃復遣之河東六月吳徐知誥幽其主之弟臨川王濛于和州知誥將受禪忌臨川王濛遣人告濛藏匿亡命擅造兵器降封歷陽公幽于和州命控鶴軍使王宏將兵二百衛之後濛以間殺王宏奔廬州欲依周本本將見之其子宏祚合扉不聽本出執濛逆江都知誥遣人殺之秋七月唐以盧文紀字子持簡求之孫姚顗字伯真京兆長安人同平章事劉昫苛察李愚剛褊論議多不合至相詬罵事多凝滯唐主患之欲更命相問所親信皆以尚書左丞姚顗太常卿盧文紀祕書監崔居儉清河人蕘之子對論其才行互有優劣唐主不能決乃置其名于琉璃瓶夜焚香祝天以筯挾之得二人乃有是命蜀主知祥殂子昶立蜀主得疾踰年至是增劇立子仁贊為太子召司空趙季良節度使李仁罕趙廷隱樞密使王處回受遺詔輔政是夕殂祕不發喪王處回夜過趙季良告之涕泣不已季良正色曰今強將握兵專伺時變宜速立嗣君以絶覬覦泣無益也處回遂與季良立仁贊而後發喪仁贊即位更名昶不改元昶初立大臣驕騫多踰法度李仁罕自恃宿將有功復受顧託求判六軍昶不得已許之既而或告仁罕有異志昶與趙季良趙廷隱謀因仁罕入朝執而殺之李肇自鎮來朝杖而入見稱疾不拜及聞仁罕死始釋杖而拜昶以為太子太傅致仕徙卭州八月唐詔蠲逋租三百三十八萬劉昫判三司命判官高延賞鉤考窮核皆積年逋欠之數姦吏利其徵責丐取故存之昫具奏其狀且請察其可徵者急督之必無可償者悉蠲之韓昭胤極言其便八月詔長興以前户部及諸道逋租三百三十八萬咸免勿徵貧民大悅而三司吏怨之既而昫與李愚同罷相三司吏皆相賀無一人從昫歸第者冬旱是歲秋冬旱民多流亡同華蒲絳尤甚乙唐清泰二年吳天祚元年蜀孟昶明德未二年閩永和元年是歲凡五國三鎮春二月唐夏州節度使李彛超卒兄彛殷代之三月唐詔開言路太常丞史在德性狂狷上書極詆內外文武之士請遍加考試黜陟能否執政大怒盧文紀及補闕劉濤字德潤徐州彭城人皆請加罪唐主謂學士馬胤孫曰朕新臨天子宜開言路若朝士以言獲罪誰敢言者卿為朕作詔書宣朕意乃下詔略曰昔魏徵請賞皇甫德參今濤等請黜史在德事同言異何其逺哉在德情在傾輸安可責也夏六月契丹寇邉唐北面總管石敬瑭將兵屯欣州敬瑭既還鎮隂為自全之計唐主好咨訪外事常命端明殿學士李夀美翰林學李嵩知制誥吕琦薛文遇翰林天文趙廷人等更直于中興殿庭與語或至夜分時敬瑭二子為內使賂太后左右令伺其密謀事無巨細皆知之敬瑭對客常稱羸瘠不堪為帥冀朝廷不之忌翰林天文居翰林院以候天文者時契丹屢寇北邉禁軍多在幽州敬瑭與趙鈞求益兵運糧朝夕相繼詔借河東人菽粟鎮州輸絹五萬匹于總管府科𣲖也鎮冀車千五百乘運糧于代州時水旱民飢敬瑭遣使督促嚴急山東流散亂始兆矣敬瑭將大軍屯欣州朝廷遣使賜軍士夏衣傳詔撫諭軍士呼萬歲者數四敬瑭懼募僚段希堯河內人請誅其唱者敬瑭命劉知逺斬三十六人以徇唐主聞之益疑敬瑭唐詔竊盜不計贓并縱火強盜並行極法秋七月唐遣北面副總管張敬達字志通代州人將兵屯代州唐以敬達為北面行營副總管將兵屯代州分石敬瑭之權也唐主深以時事為憂嘗從容讓盧文紀等無所規贊文紀等上言臣等每五日起居與兩班旅見侍衛滿前雖有愚慮不敢敷陳竊見前朝置延英殿或宰相欲有奏論天子欲有咨度皆非時召對旁無侍衛故人得盡言望復此故事詔以舊制五日起居百僚俱退宰相獨升若常事自可敷奏或事應嚴密聽于閣門奏榜子當畫屏侍臣于便殿相待何必襲延英之名也唐以房皓為樞密使劉延朗及學士薛文遇等居中用事皓與趙延夀雖為使長啓奏除授一歸延朗州鎮自外入者先賂延朗後議貢獻賂厚者先得內地賂薄者晚得邉陲由是諸將帥皆怨憤冬十月閔李倣弒其主璘而立福王繼鵬更名昶初閩主璘嬖其父婢陳金鳯立以為后后陋而淫會璘得風疾后與璘嬖臣歸守明及百工院使李可殷私通國人皆惡之璘令錦工作九龍帳國人歌之曰誰謂九龍帳惟貯一歸郎歸郎謂守明也可殷常譖皇城使李倣于璘后族陳匡勝無禮于福王繼鵬倣及繼鵬皆恨之璘疾甚倣使人殺可殷后訴之璘力疾視朝詰可殷死狀倣懼而出俄引步兵鼓譟入宫璘匿帳下亂兵刺殺之倣遂與繼鵬殺陳后陳守恩陳匡勝皆陳后族歸守明及繼鵬弟繼韜璘次子常欲殺繼鵬故并殺之繼鵬即位更名昶既而自稱權知福建節度事遣使奉表于唐立父婢李春燕為德妃以李倣判六軍諸衛事倣專制朝政隂養死士昶患之因大享軍伏甲擒殺之梟首朝門暴其罪告諭中外內宫宣徽使葉翹初為福王友博學質直昶以師傅禮待之多所禆益宫中謂之國翁昶既嗣位驕縱不與翹議國政一日昶方視事翹衣道士服趨出昶召還拜之翹頓首曰臣輔導無狀致陛下即位以來無一善可稱願乞骹骨昶曰政令不善公當極言奈何棄孤去厚賜金帛慰諭復位翹以昶嬖李春燕諌之昶不悅未幾復上書言事昶批其紙尾曰一葉隨風落御溝遂放歸永泰以夀終葉翹福州永泰人永泰唐縣宋改永福今屬福州府荆南梁震退居土洲在荆州府江陵縣九十九洲之一也荆南節度使高從誨性明達親禮賢士委任梁震以兄事之楚王希範好奢靡遊談者共誇其盛從誨謂僚佐曰如馬王可謂大丈夫矣孫光憲對曰天子諸侯禮有等差彼乳臭子驕侈僣法取快一時不為逺慮危亡無日何足慕乎從誨悟曰公言是也他日謂梁震曰吾自念平生奉養固已過矣乃捐去玩好以經史自怡省刑薄賦境內以安震曰先王待我如布衣交以嗣王屬我今嗣王能自立不墜其業吾老矣不復事人矣遂固請退居從誨不能留乃為之築室于土洲震披鶴􅌁自稱荆臺隱士每詣府跨黃牛至廳事從誨時過其家四時賜與甚厚自是悉以政事屬孫光憲吳加徐知誥大元帥封齊王備殊禮十二月唐以馮道為司空時久無正拜三公者朝議擬其職事盧文紀欲令掌祭祀掃除隋制三公參議國事祭祀則司空行掃除盧文紀不深考遂以為司空職事道聞之曰司空掃除職也吾何憚焉既而文紀自知不可乃止丙唐清泰三年十一月以後晉高祖石敬瑭天福元申年闌王昶通文元年是歲唐亡晉興凡五國三鎮春正月唐以吕琦為御史中丞唐主以千春節置酒晉國長公主上夀畢辭歸晉陽唐主醉曰何不且留遽歸欲與石郎反邪石敬瑭聞之益懼盡收其貨之在洛陽及諸道者歸晉陽託言以助軍費人皆知其有異志唐主夜與近臣從容語曰石郎于朕至親無可疑者但流言不息萬一失勸何以解之皆不對端明殿學士李嵩退謂同僚吕琦曰吾輩受恩深厚豈得自同衆人一概觀望邪計將安出琦曰河東若有異謀必結契丹為援契丹屢求和親但求萴刺等未獲故未成耳今誠歸萴刺等歲以禮幣千餘萬緡遣之彼必歡然承命如此則河東雖欲陸梁無能為矣嵩曰此吾志也他夕二人密言其策唐主大喜久之以告樞密直學士薛文遇文遇對曰以天子之尊屈身夷狄不亦辱乎又虜若循故事求尚公主何以拒之唐主意遂變一日急召嵩琦盛怒責之曰卿輩皆知古今欲佐人主致太平今乃為謀如是朕一女尚乳臭卿欲棄之沙漠邪且欲以養士之財輸之虜廷其意安在二人懼拜謝無數琦氣竭拜少止唐主曰吕琦強項肯視朕為人主邪既而怒解各賜巵酒罷之自是羣臣不敢復言和親之策遂以琦為御史中丞蓋疏之也夏五月唐以石敬瑭為天平節度使敬瑭拒命唐發兵討之初石敬瑭欲嘗唐主之意纍表自陳羸疾乞解兵柄移他鎮帝與執政議從其請移鎮鄆州房皓李嵩吕琦等皆力諌以為不可五月薛文遇獨直唐主與之議文遇曰河東移亦反不移亦反在旦暮間耳不若先事圖之唐主大喜曰卿言殊豁吾意成敗吾決行之即為除目徙敬瑭鎮天平宋審虔鎮河東制出兩班聞呼敬瑭名相顧失色以張敬逹為西北都部署趣敬瑭之鄆州敬瑭疑懼謀于將佐判官趙瑩字元暉華陰人勸敬瑭赴鄆州劉知逺曰明公久將兵得士卒心今據形勝之地士馬精強若稱兵傳檄帝業已成奈何以一紙制書自投虎口乎掌書記桑維翰字國僑河南人曰主上初即位明公入朝主上豈不知蛟龍不可縱之深淵邪然卒以河東復授公此乃天意假公以利器也明宗遺愛在人主上以庶孽代之羣情不附公明宗之愛壻今主上以反逆見待此非首謝可免但力為自全之計契丹主素與明宗約為兄弟公誠能推心屈節事之朝呼夕至何患不成敬瑭意遂決表唐主養子不應承祀請傳位許王唐主手裂其表抵地以詔答之曰卿于鄂王固非疏逺衛州之事天下皆知謂敬瑭盡段閔帝從騎許王之言何人肯信制削奪敬瑭官爵以張敬達為太原四面兵馬都部署楊光逺為副先鋒指揮使安審信金全弟子雄義指揮使安元信馬邑人帥衆奔晉陽敬瑭委以軍事振武巡檢使安重榮朔州人亦帥步騎五百奔晉陽秋七月石敬瑭遣使求救于契丹敬瑭令桑維翰草表稱臣于契丹主且請以父禮事之約事捷之日割盧龍一道及鴈門關以北諸州與之劉知逺諫曰稱臣可矣以父事之太過厚以金帛賂之自足致其兵不必許以土田恐異日大為中國之患悔之無及敬瑭不從表至契丹主大喜復書許俟仲秋傾國赴援八月唐張敬達攻晉陽不克張敬達築長圍以攻晉陽石敬瑭以劉知逺為馬步都指揮使降兵皆𨽻焉知逺用法無私撫之如一由是人無二心敬瑭親乘城坐卧矢石下知逺曰觀敬達輩無他竒策不足慮也願明公四出間使經略外事守城至易知逺獨能辦之敬瑭執知逺手撫其背而賞之唐主聞契丹許敬瑭以仲秋赴援屢督敬達急攻不能下每有營搆多直風雨長圍復為水潦所壞竟不能合晉陽城中亦日窘糧儲浸乏九月契丹主德光將兵救石敬瑭唐兵大敗契丹圍之唐主自將次懷州契丹主將五萬騎自陽武谷在代州崞縣南而南至晉陽陳于虎北口在太原城汾水北質實釋為密雲之古北口誤與唐騎將高行周符彥卿即李彥卿復本姓合戰敬瑭遣劉知逺出兵助之張敬達楊光逺安審琦以步兵陳于城西北山下契丹遣輕騎三千不被甲直犯其陳唐主逐之至汾曲契丹伏兵起衝唐兵斷而為二縱兵乘之唐兵大敗死者近萬人敬達等收餘衆保晉安寨名在太原府太原縣晉祠南契丹亦引兵歸虎北口敬瑭出見契丹主引兵會圍晉安寨置營于晉安之南長百餘里厚五十里多設鈴索吠犬人跬步不能過敬達等士卒猶五萬人馬萬匹四顧無所之遣使告敗唐主大懼遣符彥饒將兵屯河陽詔天雄范延光盧龍趙德鈞耀州潘環共救晉安下詔親征唐主本不欲行張延朗劉延皓勸之唐主不得已發洛陽遣符彥饒軍赴潞州為大軍後援唐主至河陽心憚北行盧文紀希旨言國家根本在河南敵兵倐來忽往不能久留晉安大寨甚固況已發三道兵救之河陽天下津要車駕宜留此鎮撫南北且遣近臣往督戰茍不能解圍進亦未晚張延朗曰文紀言是也唐主議近臣可使北行者延朗與翰林學士和凝字成績鄆州須昌人等皆曰趙延夀父德鈞以盧龍兵來赴難宜遣延夀會之乃遣延夀將兵二萬如潞州唐主至懷州問策于羣臣吏部侍郎龍敏字欲訥永清人請立李贊華為契丹主令天雄盧龍二縣分兵送之自幽州趣西樓朝廷露檄言之契丹主必有內顧之憂然後選募軍中精鋭以擊之此亦解圍之一策也唐主深以為然而執政恐其無成議竟不決唐主憂沮日夕酣飲悲歌羣臣或勸其北行則曰卿勿言石郎使我心膽墮地冬十月唐括民馬籍義軍以拒契丹詔大括天下將吏及民間馬又發民為兵每七戶出征夫一人自備鎧仗謂之義軍期以十一月俱集用張延朗之謀也凡得馬二千餘匹夫五千人實無益于用而民間大擾十月唐以趙德鈞為行營都統初趙德鈞陰蓄異志欲因亂取中原自請救晉安寨唐主以德鈞為諸道行營都統及是其子延夀遇于西陽即西唐店在澤州府北悉以兵屬焉時范延光受詔將兵屯遼州德鈞志在併延光軍逗留不進詔書屢趣之德鈞乃引兵北屯團柏谷口即團柏鎮在太原府祁縣東南契丹立石敬瑭為晉皇帝是為後晉高祖敬瑭割幽薊等十六州以賂之契丹主謂石敬瑭曰吾三千里來赴難必有成功觀汝器貌識量真中原之主也吾欲立汝為天子敬瑭辭讓數四將吏復勸進乃許之契丹主作策書命敬瑭為晉大皇帝自解衣冠授之築壇即位割幽薊瀛莫涿檀順新媯儒武雲應寰朔蔚十六州順州唐置今順天府順義縣是儒州後唐置今宣化府延慶州是應州後唐置今屬大同府寰州亦後唐置故城今朔平府馬邑縣注俱見前以與契丹仍許歲輸帛三十萬匹制改長興七年為天福元年敇命法制皆遵明宗之舊以趙瑩為翰林學士承旨桑維翰為翰林學士權知樞密使事劉知逺為侍衛馬軍都指揮使客將景延廣字航川陜州人為步軍都指揮立晉國長公主為皇后唐趙德鈞降契丹契丹不受契丹主雖軍柳林即桞子注見前其輜重老弱皆在虎北口每日暝輒結束以備遁逃而趙德鈞欲倚契丹取中國至團柏踰月按兵不戰去晉安才百里聲問不能相通德鈞纍表為延夀求成德節度使唐主怒曰趙氏父子能郤賊寇雖欲代吾位吾亦甘心若玩寇要君但恐犬兔俱斃耳德鈞不悅密以金帛賂契丹主云若立已為帝請即以見兵南平洛陽與契丹為兄弟仍許石氏常鎮河東契丹主自以身入敵境晉安未下德鈞兵尚強范延光在其東又恐山北諸州邀其歸路欲許德鈞之請晉主聞之大懼亟使桑維翰説契丹主曰趙北平父子素蓄異志何可信其誕妄之辭棄垂成之功乎且使晉得天下將竭中國之財以奉大國豈此小利之比乎跪于帳前自旦至暮涕泣爭之契丹主乃從之指帳前石謂德鈞使者曰我已許石郎此石爛可改矣唐將楊光逺殺招討使張敬達降于契丹晉安被圍數月高行周符彥卿數引騎兵出戰無功芻糧俱竭馬死則食之援兵竟不至張敬達性剛時謂之張生鐡楊光逺安審琦勸敬達降于契丹敬達曰吾受明宗及今上厚恩為元帥而敗軍其罪已大況降敵乎今援兵旦暮至且當俟之必若力盡勢窮諸軍斬我出降未為晚也光逺目審琦欲斬敬達審琦未忍髙行周知光逺欲圖敬達常引壯騎尾而衛之敬達不知其故謂人曰行周每踵余後何意也行周乃不敢隨之諸將旦集行周未至光逺斬敬達首帥諸將降于契丹契丹主嘉敬達之忠命收葬而祭之謂其下及晉諸將曰汝曹為人臣當效敬達也馬軍都指揮使康思立憤惋而死晉以趙瑩桑維翰同平章事契丹主謂晉主曰桑維翰盡忠于汝宜以為相故有是命契丹以晉主南下破唐兵于團柏唐主還河陽趙德鈞降契丹晉主與契丹主引兵而南晉主欲留一子守河東契丹主令晉主盡出諸子自擇之晉主兄子貴重父敬儒早卒晉主養以為子貌類晉主而短小契丹主指之曰此大目者可也乃以重貴為北京留守重貴即出帝契丹以其將高謨翰一名松川勃海人為前鋒與降卒皆進至團柏與唐兵戰趙德鈞趙延夀先遁諸將繼之士卒大潰死者萬計劉延朗劉在明至懷州唐主始知晉主即位楊光逺降衆議車駕宜幸魏州唐主召李嵩謀之薛文遇不知而繼至唐主怒嵩躡其足文遇乃去唐主曰我見此物肉顫適幾欲抽佩刀刺之嵩曰文遇小人淺謀誤國刺之益醜嵩因勸唐主南還唐主從之至洛陽命諸將分守南北城晉主與契丹主至潞州趙德鈞父子迎謁于南河鎮名在潞安府長治縣西契丹主鎖之送歸國德鈞見述律太后太后問曰汝近者何為往大原德鈞曰奉唐主之命大后指天曰汝從吾兒求為天子何妄語邪又自指其心曰此不可欺也又曰吾兒將行吾戒之曰趙大王若引兵北向渝關亟須引歸太原不可救也汝欲為天子何不先擊退吾兒徐圖亦未晚汝為人臣阮負其主不能擊敵又欲乘亂遨命所為如此何面目復求生乎德鈞俯首不能對踰年而死張礪與延夀俱入契丹契丹主以為翰林學士晉主發潞州契丹北還晉主將發上黨契丹主舉酒屬之曰我若南回河南之人必大驚駭汝宜自引漢兵南下我令太相溫契丹將名考異曰即高謨翰也將五千騎衛送汝至河梁餘且留此俟汝音聞有急則下山救汝又曰劉知逺趙瑩桑維翰皆創業成功無大故勿棄也唐主還洛陽符彥饒張彥琪言于唐主曰今契丹大下河水復淺人心已離此不可守唐主命河陽節度使萇從簡與趙州刺史劉在明守河陽南城遂斷浮梁歸洛陽殺李贊華于其第既而晉主至河陽從簡迎降舟楫已具唐主從珂自焚死晉主入洛陽後唐自莊宗至廢帝亡凡四主合十三年唐主議復向河陽將校皆已飛狀迎晉主晉主慮唐主西奔遣契丹千騎扼澠池唐主與曹太后劉皇后雍王重美唐主之子及宋審虔等擕傳國寶登元武樓自焚皇后欲燒宫室重美諫曰新天子至必不露居他日重勞民力死而遺怨將安用之乃止王淑妃與許王從益匿于毬場獲免是日晚晉主入洛陽唐兵皆解甲待罪晉主命劉知逺部署京城知逺分漢軍使使還營館契丹于天宫寺城中肅然無敢犯令初判三司張延朗不欲河東多積蓄凡財賦應留使之外盡收取之晉主以是恨之收付御史臺劉延皓匿于龍門數日自經死劉延朗將奔南山捕得殺之斬張延朗既而選三司使難其人晉主甚悔之十二月晉追廢唐主從珂為庶人以馮道同平章事既而晉以王禮葬從珂于徽陵南或取從珂膂及髀骨以獻詔以王禮葬之晉以張希崇字德峰幽州薊人為朔方節度使初朔方節度使張希崇為政有威信民夷愛之與屯田以省漕運徙為靜難節度使至是晉主與契丹修好恐其又取靈武遂復以希崇鎮朔方唐安逺節度使盧文進奔吳文進聞晉主為契丹所立自以本契丹叛將棄鎮奔吳所過鎮戍召其主將告之故皆拜辭而退高麗擊破新羅百濟注俱見前高麗王建初唐滅高麗開元後其地為大氏所據為渤海國至天祐時大氏衰有眇僧躬又聚衆據開州號大封國王遂有高麗故地五代後梁龍德二年高麗人王建襲段躬又自稱高麗王渤海注見前開州在今朝鮮國城西南用兵擊破新羅百濟于是東夷諸國皆附之有二京以開州為東京平壤為西京六府九節度百二十郡丁晉天福二年南唐徐誥升元元年酉是年關亡南唐代凡五國三鎮春正月乙卯日食考異曰晉主實録正月甲寅朔乙卯日日食十國紀年屬乙卯朔日食蓋晉人避三朝日食而改之也晉以李嵩同平章事充樞密使桑維翰兼樞密使時晉新得天下藩鎮多未服從或雖服從反仄不安兵火之餘府庫殫竭民間困窮而契丹徵求無厭維翰勸晉主推誠棄怨以撫藩鎮卑辭厚禮以奉契丹訓卒繕兵以修武備務農桑以實倉廪通商賈以豐貨財數年之間中國稍安吳徐知誥建齊國于金陵徐知誥以太尉李德誠中書令周本位望隆重欲使之帥衆推戴本曰我受先王大恩自徐溫父子用事恨不能救楊氏之危又使我為此可乎其子宏祚勸之不得已與德誠帥諸將詣江都表吳主陳知誥功德請行册命又詣金陵勸進宋齊邱謂德誠之子建勳曰尊公太祖元勳今日掃地矣吳太子璉納齊王知誥女為妃知誥始建太廟社稷改金陵為江寧府以宋齊邱徐玠為左右丞相周宗周廷玉為內樞使知誥尋更名誥二月契丹攻雲州判官吳巒字寶川鄆州盧縣人拒之契丹主歸過雲州節度使沙彥珣出迎契丹主留之判官吳巒在城中衆推巒領州事閉城不受命契丹攻之不克應州指揮使郭崇威金城人亦耻臣契丹挺身南歸張礪逃歸為追騎所獲契丹主責之對曰臣華人飲食衣服皆不與此同生不如死願早就戮契丹主顧通事高彥英曰常戒汝善遇此人何故使之失所而亡去若失之安可復得邪笞彥英而謝之礪遇事輒言無所隱避契丹主甚重之契丹攻雲川半嵗不能下吳巒遣使問道求救晉主以為請契丹解圍去乃召巒歸以為寧武節度使夏四月晉遷都汴州天雄節度使范延光聚卒繕兵將作亂延光微時有術士張生語之云必為將相延光既貴信重之嘗夢蛇自臍入腹以問張生生曰蛇者龍也帝王之兆延光由是有非望之志唐潞上素與延光善及敗延光雖奉表請降內不自安故欲作亂會晉王謀徙都大梁桑維翰曰大梁北控燕趙南通江淮水陸都會資用富饒今延光反形已露大梁距魏不過十驛彼若有變大軍尋至所謂疾雷不及掩耳也下詔託以洛陽漕運有闕東巡汴州五月吳與契丹通使修好徐誥用宋齊邱策欲結契丹以取中國遣使以美女珍玩泛海修好契丹主亦遣使報之六月晉范延光舉兵反遣楊光逺等討之范延光素以軍府之政委元隨押牙孫鋭鋭恃恩專橫會延光病鋭密召澶州刺史馮暉逼延光反延光亦思張生之言乃從之遣兵渡河焚草市詔馬軍指揮使曰奉進雲州人屯白馬津都軍使楊光逺屯滑州護聖都指揮使杜重威朔州人屯衛州延光遣馮暉孫鋭將步騎二萬抵黎陽口晉以和凝為端明殿學士張誼襄邑人為左拾遺凝署其門不通賓客耀州推官張誼致書于凝以為切近之職為天子耳目宜知四方利病奈何拒絶其客雖安身為便如負國何凝竒之薦于桑維翰除左拾遺誼上言北方有援立之功宜外敦信好內謹備邉不可自逸以啓戎心晉主深然之晉魏府部署張從賓反河陽人東都張從賔擊范延光延光使人誘之從賓遂與同反殺晉主子河陽節度使重信引兵入洛陽殺晉主子東都留守重又引兵東扼汜水關將逼汴州羽檄縱橫從官恟懼獨桑維翰從容指畫軍事神色自若接對賓客不改常度衆心差安已而從賔攻汜水晉主戎服嚴輕騎將奔晉陽維翰叩頭苦諫曰賊鋒雖盛勢不能久請少待之乃止嚴輕騎謂敕辦也閩作白龍寺方士言于閩主云有白龍夜見閩主作白龍寺時百役繁興用度不足有司除官皆令納賂籍而獻之以貨多寡為差又以空名堂牒賣官于外民有隱年者杖背隱口者死逃亡者族果菜雞豚皆重征之秋七月晉義成節度使符彥饒舉兵反指揮使盧順密討平之白奉進在滑州軍士有夜掠者捕獲五人三隸奉進二隸符彥饒奉進皆斬之彥饒怒明日奉進從數騎詣彥饒謝彥饒曰軍中多有部分奈何無客主之義乎奉進曰軍士犯法何有彼我僕已謝公而公怒不解豈非欲與延光同反邪拂衣而起彥饒不留帳下甲士大譟擒奉進殺之諸軍喧譟不可禁止奉國左廂指揮使馬萬帥步兵欲從亂遇右廂指揮使盧順密帥部兵出營厲聲謂萬曰符公擅殺白公必與魏城通謀此去行宫才二百里奈何不思報國乃欲助亂自求滅族乎今日當共擒符公送天子立大功軍士從命者賞違命者誅萬部兵尚有呼躍者順密殺數人衆莫敢動萬不得已與攻牙城執彥饒送大梁斬之楊光逺士卒聞亂欲推光逺為主光逺曰天子豈汝等販弄之物晉陽之降出于窮逼今若改圖真反賊也其下乃不敢言時三鎮繼叛人情大震晉主問計于劉知逺對曰陛下昔在晉陽糧不支五日俄成大事今天下已定內有徑兵外結強虜鼠輩何能為乎願陛下撫將相以恩臣請戢士卒以威恩威並著京邑自安本根深固則枝葉不傷矣知逺乃嚴設科禁有軍士盜紙錢一幞被擒左右請釋之知逺曰吾誅其情不計其直竟殺之由是衆皆畏服晉楊光逺敗魏兵杜重威等克汜水張從賓伏誅馮暉孫鋭引兵至六明鎮在衛輝府滑縣東北光逺引之渡河半渡而擊之暉鋭衆敗多溺死暉鋭走還杜重威侯益汾州平遙人引兵至汜水遇張從賔衆萬餘人與戰俘斬殆盡遂克汜水從賓走渡河溺死獲其黨張延播繼祚全義之子送大梁斬之史館修撰李濤字信臣同從曽孫上言張全義有再造洛邑之功乞免其族乃止誅繼祚妻子范延光知事不濟歸罪于孫鋭而族之遣使奉表待罪不許吳徐誥稱帝國號唐是為南唐奉吳主為讓皇吳自楊行密據揚州至溥禪唐凡四王合四十六年吳司徒王令謀老病或勸之致仕令謀曰齊王大事未畢吾何敢自安病亟力勸徐誥受禪吳主下詔禪位于齊李德誠等復詣金陵帥百官勸進宋齊邱不署表九月令謀卒十月齊王誥即帝位于金陵國號唐遣丞相玠奉册詣吳主稱受禪老臣誥謹拜稽首上尊號曰高尚思元𢎞古讓皇立王后宋氏為皇后子景通為吳王更名璟唐王宴羣臣于天泉閣李德誠曰陛下應天順人惟齊邱不樂因出齊邱止德誠勸進書唐主執書不視曰子嵩三十年舊交必不相負加齊邱大司徒齊邱以不得預政事心愠懟聞制詞云布衣之交抗聲曰臣為布衣時陛下為刺史今日為天子可不用老臣矣還家請罪唐主手詔謝之亦不改命久之齊邱不知所出乃更上書請遷讓皇于他州及斥逺吳太子璉絶其昏唐主不從賜璉妃號永興公主妃聞人呼公主則流涕而辭周本以不能存吳未幾愧恨而卒契丹改號遼契丹改遼之後通鑑及綱目仍書本號考拓跋氏魏國既建綱目大書曰魏契丹號遼與拓跋魏略同而綱目異書體例未為畫一今改書其當時各國詔諭文表書疏則仍依原文稱謂契丹是歲契丹改元會同國號大遼公卿庶官皆倣中國參用中國人以趙延夀為樞密使尋兼政事令戊晉天福三年蜀廣政元戌年是歲凡五國三鎮春正月己酉日食二月晉詔求直言晉主樂聞讜言詔百官各上封事置詳定院以考之無取者留中可者行之數月應詔者無十人復降御札趣之左散騎常侍張允上駮赦論以為帝王遇天災多肆赦謂之修德借有二人坐獄遇赦則曲者幸免直者銜寃寃氣升聞乃所以致災非所以弭災也諫議大夫薛融以河南奏修洛陽宫諫曰今宮室雖經焚毁猶侈于帝堯之茅茨所費雖寡猶多于孝文之露臺請俟海內平寧營之未晚詔皆褒納之平薛融汾州遙人三月晉禁民作銅器初唐世天下謂後唐之世鑄錢有三十六冶喪亂以來皆廢絶錢日益耗民有銷錢為銅器故禁之晉制諸州奏補將校員數中書舍人李祥上書曰十年以來赦令屢降諸道職掌皆許推恩而藩方薦論動踰數百乃致優伶奴僕初命則至銀青階被服皆紫袍象笏名器僭濫貴賤不分請自今諸道節度州謂節鎮所治之川聽奏朱記大將不給銅印給木朱記以為印信以上十人他州止聽奏都押牙都虞候孔目官而已從之夏五月唐主誥遷故吳主于潤州吳讓皇固請徙居李德誠等亦亟以為言五月唐主改潤州牙城為丹陽宫徙讓皇居之或獻毒酒方于唐主唐主曰犯吾法者自有常刑何用此為羣臣爭請改府寺州縣名冇吳及楊者判官楊嗣請更姓羊徐玠曰陛下自應天順人事非逆取而諂邪之人専事更改或非急務不可從也唐主然之晉制民墾田三年外乃聽徭役金部郎中張濤字司化洛陽人奏鄉村浮戶種木未盈十年墾田未及三年未成生業已為縣司收供徭役責之重賦威以嚴刑故不免捐功捨業更思他適乞自今民墾田及五頃以上三年外乃聽縣司徭役從之秋七月晉作受命寶以受天明命惟德允昌為文八月晉上尊號于遼上尊號于遼主及太后以馮道劉昫為册禮使遼主大悅晉主事遼甚謹奉表稱臣謂遼主為父皇帝每遼使至即于别殿拜受詔敇歲輸金帛三十萬之外吉凶慶弔歲時贈遺相繼于道乃至太后元帥太子諸王大臣皆有賂遺小不如意輒來責讓多不遜語朝野咸以為耻而晉主事之曾無倦意然所輸金帛不過數縣租賦其後遼主屢止晉主上表稱臣但令為書稱兒皇帝如家人禮初遼主既得幽州命曰南京以唐降將趙思溫為留守思溫子延照在晉晉主以為祁州刺史思溫密令延照言敵情終變請以幽州內附晉主不許遼遣使如唐遼遣使詣唐宋齊邱勸唐主厚賄之俟至淮北潛遣人殺之欲以間晉九月范延光復降于晉晉以為天平節度使楊光逺奏馮暉來降言范延光食盡窮困時光逺攻廣晉唐莊宗以魏州為興唐府明宗改為廣晉歲餘不下晉主以師老民疲遣內職朱憲汴州人入城諭范延光許移大藩曰若降而殺之白日在上吾無以享國范延光曰主上重信云不死則不死矣乃撤守備九月遣牙將奉表待罪詔釋之光逺表乞入朝制以延光為天平節度使仍賜鐵劵將佐皆除防團刺史牙將皆升為侍衛親軍已而延光屢請致仕居于大梁冬十月遼加晉主尊號晉以汴州為東京開封府東都為西京晉主以大梁舟車所會便于漕運故定都焉晉樞密使桑維翰罷初郭崇韜既死宰相罕有兼樞密使至是維翰李嵩兼之宣徽使劉處讓字德謙滄州人及宦官皆不悅楊光逺圍廣晉處讓數以軍事銜命往來光逺奏請多踰分維翰獨以法裁折之光逺有不平語處讓曰是皆執政之意光逺由是怨執政范延光降光逺密表論執政過失晉主不得已罷嵩維翰而以處讓代之河決鄆州劉友益曰自朱梁決河為二以疏河漲後又決河以限唐兵唐雖塞之未幾復壞至是而河決鄆州其後二十二年之間河決者九梁之罪也考是年河決明年復決博州六年至開運元年再決滑州三年決楊劉漢乾祐元年決魚池二年決鄭州周廣順二年決鄭滑顯德六年決原武凡九決其詳具後十一月晉册閩主昶為閩國王不受晉以閩主昶為閩國王以散騎常侍盧捐為册禮使賜昶赭𫀆昶聞之遣進表官自執政以既襲帝位辭册命既而捐至福州閩主不見命弟繼恭主之遣使奉繼恭表隨捐入貢有士人林省鄒私謂捐曰吾主不事其君不愛其親不恤其民不敬其神不睦其鄰不禮其賔其能久乎閩諫議大夫黃諷以昶淫暴與妻子辭訣入諫昶欲杖之諷曰臣若迷闕不忠死亦無怨直言被杖臣不受也乃黜為民晉建鄴都置彰德永清軍徙澶州城楊光逺為天雄節度使晉主患其跋扈難制桑維翰請分天雄之衆加光逺西京留守兼河陽節度使光逺由是怨望密以賂自訴于遼養部曲千餘人常蓄異志晉遂建鄴都于廣晉府置彰德軍于相州以澶衛隸之置永清軍于貝州以博冀隸之澶州舊治頓邱晉主慮遼為後世之患遣劉繼勳徙澶州城跨德勝津注見前以高行周為鄴都留守王廷胤處存之孫為彰德節度使王周鄴都人為永清節度使晉聽公私自鑄錢敇聽公私自鑄銅錢無得雜以鉛鐡每十錢重一兩以天福元寶為文惟禁私作銅器既而私錢多用鉛錫小弱缺薄敇皆禁之專令官司自鑄故吳主楊溥卒唐主廢朝二十七日追諡曰睿皇帝已晉天福四年閩王曦永隆元年是亥嵗南唐復姓李氏凡五國三鎮春正月唐主徐誥復姓李氏更名忭皮變反唐羣臣屢表請唐主復姓李立唐宗廟唐主從之又請上尊號唐主曰尊號虗美且非古遂不受其後子孫皆踵其法又不以外戚輔政宦官不得預事皆他國所不及也倉吏歲終獻羡餘萬石唐主曰出納有數茍非掊民刻軍安得羡餘邪改太祖廟號曰義祖為李氏考妣發哀斬衰居廬如初喪禮朝夕臨凡五十四日詔國事委齊王璟詳決惟軍旅以聞唐主更名忭詔百官議二祖合享禮宋齊邱等議以義祖居七室之東唐主命居高祖于西室太宗次之義祖又次之皆為不祧之主羣臣言義祖諸侯不宜與高祖太宗同享請于太廟正殿後别建廟祀之唐主曰吾自幼託身義祖向非義祖有功於吳朕安得啓比中興之業羣臣乃不敢言唐主欲祖吳王恪或曰恪誅死不若祖鄭王元懿唐主命有司考二王苗裔以吳王孫禕有功禕子峴為宰相遂祖吳王云自峴五世至父榮其名率皆有司所撰超考歐陽修五代史忭自言唐憲宗子建王恪生超生志為徐州判司志生榮乃自為建王四世孫與通鑑所載不同今并注于此三月晉加劉知逺杜重威同平章事知逺自以有佐命功重威起外戚重威妻晉主女弟無大功耻與之同制制下數日杜門不受晉主怒謂趙瑩曰知逺堅拒制命可落軍權令歸私第瑩拜請曰陛下昔在晉陽兵不過五千為唐兵十餘萬所攻危于朝露非知逺心如金石豈能成大業奈何以小過棄之竊恐此語外聞非所以彰人君之大度也晉主意乃解命和凝詣知逺第諭旨知逺惶恐起拜受夏四月晉廢樞密院梁以來軍國大政天子多與崇政樞密使議之宰相受成命行制敕講典故治文事而已晉主懲安重誨專橫即位之初但命桑維翰兼樞密使及劉處讓為樞密使奏對多不稱旨會處讓遭母喪廢樞密院以印付中書院事皆委宰相分判然勳臣近習不知大體習于故事每欲復之晉加楚王希範為天策上將軍唐主遷故吳主楊氏之族于泰州本海陵縣南唐升泰州今屬揚州府唐人遷讓皇之族于泰州號永寧宫防衛甚嚴故太子璉自請退居永寧一夕大醉卒于舟中唐主追封𢎞農郡王秋七月庚子朔日食晉以桑維翰為彰德節度使楊光逺疏平章事桑維翰遷除不公與民爭利晉主不得已出維翰鎮相州晉以王廷胤為義武節度使初王處直子威避王都之難奔遼至是遼主遣使來言請使威襲父土地晉主辭以中國之法必自刺史團防序遷乃至節度請遣威至此漸加進用遼主怒曰爾自節度使為天子亦有階級邪晉主恐其滋蔓不已厚賂之請以處直兄孫廷胤鎮易定遼主怒稍解閩王曦本名延羲審知少子弒其主昶而自立稱藩于晉初閩以太祖閩王審知廟號太祖元從為拱宸控鶴都及閩主昶立更募壯士為腹心號宸衛都祿賜甚厚二都怨望將作亂昶好為長夜之飲強羣臣酒醉則令左右伺其過失從弟繼隆醉失禮斬之叔父延羲陽為狂愚以避禍昶賜以道士服幽于私第數侮拱宸控鶴軍使朱文進永泰人連重遇光山人二人怨之會北宫火求賊不獲昶命重遇將兵掃除餘燼士卒苦之又疑重遇知縱火之謀欲誅之內學士陳郯私告重遇重遇帥二都兵迎延羲共攻昶昶與李后如宸衛都比明宸衛戰敗奉昶及李后出北關至梧桐嶺在福州府候官北九峯山之一嶺也衆稍逃散延羲使兄子繼業將兵追之及于村舍醉而縊之并李后及諸子皆死延羲自稱閩國王更名曦遣商人間道奉表稱藩于晉八月晉以馮道守司徒兼侍中詔中書知印止委上相由是事無巨細悉委于道晉主嘗訪以軍謀對曰征伐大事在聖心獨斷臣書生惟知謹守歷代成規而已晉主然之寵遇無比晉以吳越王元瓘為天下兵馬元帥晉以唐許王從益為郇國公從益尚幼李后晉主后即唐明宗女養于宫中奉王淑妃唐明宗妃如事母冬十二月晉禁造佛寺庚晉天福五年是子歲凡五國三鎮春二月楚平羣蠻立銅柱于溪州唐置今湖南永順府是初溪州刺史彭士愁其先本吉水人後徙溪州遂世官其地引羣蠻寇辰灃楚王希範遣兵討平之自是羣蠻服于楚希範自謂伏波之後馬援立銅柱于交址事見前以銅五千斤鑄柱高一丈二尺入地六尺銘誓狀于上立之溪州馬希範銅柱在今永順府永順縣東與辰州府沅陵縣分界閩王曦遣兵擊其弟延政于建州敗績吳越遣兵救建州夏五月延政擊郤之曦驕淫苛虐猜忌宗族其弟建州刺史延政積相猜恨欲殺曦所遣監軍鄴翹鄴通鑑作業史照曰當作鄴風俗通漢有梁令鄴鳯翹奔南鎮延政發兵就攻敗之曦遣統軍使潘師逵吳行真將兵擊延政延政求救于吳越吳越王元瓘遣寧國節度使仰仁詮湖州人都監使薛萬忠將兵救之丞相林鼎候官人諫不聽三月師逵分兵出戰延政遣兵敗之殺師逵其衆皆潰行真將士棄營走延政乘勝取永平唐鎮南唐改延平軍今福建延平府是順昌唐縣今屬延平府二城自是建兵始盛仁詮等兵至延政奉牛酒犒之請班師仁詮等不從延政懼復遣使乞師于曦曦發兵救之遣輕兵絶吳越糧道吳越軍食盡延政以兵出擊大破之唐主遣使如閩和閩王曦及延政延政遣牙將及女奴持誓書及香爐至福州與曦盟于宣陵審知墓然猜恨如故晉安逺節度使李金全吐谷渾人叛降于唐晉遣馬全節字大雅元城人討之唐師敗績先是金全以親吏胡漢筠為中門使漢筠貪殘不法晉主遣廉吏賈仁沼代之且召漢筠漢筠教金全留已而毒殺仁沼至是晉以馬全節代金全漢筠紿金全曰進奏吏遣人來言朝廷俟公受代即按賈仁沼死狀金全大懼漢筠因説金全自歸于唐金全從之晉主命馬全節討之安審暉審琦之兄為之副金全奉表請降于唐唐主遣鄂州屯營使李承裕段處恭將兵逆之金全詣唐軍承裕入據安州馬全節進軍與戰大破之承裕南走全節入安州審暉追敗唐兵段處恭戰死虜承裕及其衆悉斬之送唐監軍杜光業等于大梁晉主曰此曹何罪皆歸之光業等至唐唐主以其違命而敗不受遺晉主書曰邉校貪功乘便據壘軍法朝章彼此不可晉主復遣之唐主令以戰艦拒之乃還晉主悉授唐諸將官以其士卒為顯義都命舊將劉康領之金全至金陵唐主待之甚薄晉贈賈仁沼官秋七月晉西京留守楊光逺殺太子太傅范延光延光請歸河陽私第許之延光重載而行光逺利其貨且慮為子孫之患奏延光叛臣恐其逃入敵國宜早除之不許請敇延光居西京從之光逺使其子承貴以軍士圍其第逼令自殺延光曰天子賜我鐵劵爾父子何得如此承貴以白刃驅延光擠于河奏云自赴水死晉主知其故憚光逺之強不敢詰九月晉罷翰林學士學士李浣字日新濤之弟輕薄多酒失晉主惡而罷之併其職于中書舍人晉以楊光逺為平盧節度使光逺入朝帝欲徙之他鎮謂光逺曰圍魏之役卿左右皆有功尚未之賞今當各除一州以榮之因以其將校數人為刺史徙光逺鎮青州冬十二月晉以閩王曦為閩國王辛晉天福六年是丑歲凡五國三鎮春正月吐谷渾降晉不受初晉主割鴈門之北以賂遼由是吐谷渾皆屬遼苦其貪虐思歸中國成德節度使安重榮復誘之于是部落千餘帳來奔遼主大怒遣使來讓晉主遣兵逐之使還故土閩以王延政為富沙王胡三省曰建州有富沙驛延政請于閩王曦欲以建州為威武軍自為節度使曦以建州為鎮安軍延政為節度使封富沙王延政改鎮安曰鎮武而稱之夏四月唐遣使如晉唐主遣通事舍人歐陽遇如晉求假道以通遼不許自黃巢以來天下血戰數十年然後諸國各有分土兵革稍息及唐主即位江淮豐稔兵食有餘羣臣爭言北方多難宜出兵恢復舊強唐主曰吾少長軍旅見兵之為民害深矣不忍復言使彼民安則吾民亦安矣又何求馬漢主遣使如唐謀共取楚分其地唐主不許六月晉成德節度使安重榮執遼使者上表請伐遼重榮耻臣遼見其使者必箕踞慢罵或潛遣人殺之遼以為讓晉主為之遜謝六月重榮執遼使拽刺遣輕騎掠幽州南境上表稱吐谷渾等各帥部衆歸附黨項等亦納契丹詔表疏奏仍因當日原文稱契丹説具前告牒言為虜所陵暴願自備十萬衆與晉共擊之表數千言大抵斥晉主父事契丹竭中國以媚無厭之虜又為書遺朝貴及移藩鎮云已勒兵必與契丹決戰晉主以重榮方握強兵不能制甚患之時鄴都留守劉知逺在大梁秦寧節度使桑維翰密上疏曰陛下免于晉陽之難而有天下皆契丹之功不可負也今重榮恃勇輕敵吐谷渾假手復讐皆非國家之利不可聽也今天下粗安瘡痍未復靜而寧之猶懼不濟其可妄動乎契丹與國家恩義非輕信誓甚著彼無間隙而自啓釁端就使克之後患愈重萬一不克大事去矣議者以歲輸繒帛謂之耗蠧有所卑遜謂之屈辱殊不知兵連禍結財力將匱耗蠧孰甚焉武吏功臣過求姑息屈辱孰大焉臣願陛下訓農習戰養兵息民俟國無內憂民有餘力然後觀釁而動則動必有成矣又鄴都冨盛國家藩屏今主帥赴闕軍府無人乞陛下略加巡幸以杜姦謀晉主謂使者曰朕比日以來煩悶不久今見卿奏如醉醒矣閩王曦殺其兄子繼業閩王曦以書招泉州刺史繼業還賜死殺其子于泉州自是宗族勳舊相繼被誅人不自保諌議大夫黃俊舁櫬詣朝堂極諫曦曰老物狂發矣貶之曦宴羣臣于九龍殿從子繼柔不能飲強之繼柔私減其酒曦怒并其贊者殺之曦又嘗宴侍臣皆以醉去獨翰林學士周維嶽在曦曰維嶽身甚小何飲酒之多左右曰酒有别腸不必長大曦欣然命捽維嶽下殿欲剖視其酒腸或曰殺維嶽無人復能侍陛下飲者乃捨之秋七月晉以劉知逺為北京留守晉主憂安重榮跋扈以知逺為北京留守知逺微時為晉陽李氏贅壻嘗牧馬犯僧田僧執而笞之知逺至首召其僧命之坐慰諭贈遺衆心大悅閩王曦自稱大閩皇曦自稱大閩皇領威武節度與王延政治兵相攻互有勝負鎮武判官潘承祐晉江人屢請息兵修好延政不從閩主使者至延政對使者語悖慢承祐長跪切諌延政怒顧左右曰判官之肉可食乎承祐不顧聲色愈厲八月晉以杜重威為御營使馮道李嵩屢薦重威以為御營使代劉知逺知逺由是恨二相重威所至黷貨民多逃亡嘗出過市謂左右曰人言我驅盡百姓何市人之多也晉主如鄴都晉主至鄴都以詔諭安重榮曰吾因契丹得天下爾因吾致富貴吾不敢忘德爾乃忘之何邪今吾以天下臣之爾欲以一鎮抗之不亦難乎宜審思之無取後悔重榮得詔愈驕聞山南東道節度使安從進有異志陰遣使與之通謀吳越王錢元瓘卒子佐字元祐嗣元瓘諸子名今從歐史輯先是吳越大火焚燒宫室殆盡元瓘驚懼遂發狂疾或勸唐主乘弊取之唐主曰奈何利人之災遣使唁之且賙其乏及是元瓘卒將吏以元瓘遺命承制以佐為節度使佐好書禮士躬勤政務發摘姦伏人不能欺民有獻嘉禾者佐問倉吏今蓄積幾何對曰十年王曰然則軍食足矣可以寬吾民乃命復其境內稅三年河決滑州冬十月晉劉知逺招納吐谷渾白承福等徙之內地知逺遣親將郭威以詔指説吐谷渾酋長白承福令去安重榮歸朝廷威曰敵惟利是嗜安鐡胡止以袍袴賂之今欲其來莫若重賂乃可致耳知逺從之承福帥衆歸知逺知逺處之太原嵐石嵐州唐置今大原府嵐縣是石州亦唐置今分州府永寧州是之問表領大同節度使收精騎以𨽻麾下達靼契苾亦不附安重榮重榮勢大沮閩王曦稱帝十一月晉山南東道節度使安從進舉兵反晉主之發大梁也和凝請曰車駕已行安從進必反請密留空名宣敕十數通付留守鄭王重貴聞變則書諸將名遣擊之從之十一月從進舉兵重貴遣高行周宋彥筠滑州人張從恩討之從進攻鄧州節度使安審暉拒之從進退至花山在南陽府唐縣南質實釋為安陸之花山誤遇張從恩兵不意其至之速合戰大敗奔還襄州唐定田稅唐主分遣使者按行民田以肥瘠定其租民間稱其平允自是江淮調兵興役及他賦斂皆以稅錢為率久而用之唐主性節儉常躡蒲履盥頮用鐵盎暑則寢于青葛惟左右使令惟老醜宮人服飾粗略死國事者雖士卒皆給祿三年勤于聽政以夜繼晝先如江都及還不復宴樂頗傷躁急內侍王紹顔上書以為今春以來羣臣獲罪者衆中外疑懼唐主手詔釋其所以然令紹顔告諭中外十二月晉安重榮反晉遣杜重威擊敗之安重榮聞安從進反遂集境內飢民數萬南向鄴都聲言將入朝晉主聞之以杜重威為招討使馬全節副之重威與重榮遇于宗城西南再擊之不動懼欲退指揮使王重胤曰兵家忌退鎮之精兵盡在中軍請公分鋭士擊其左右翼重胤為公直衝其中軍彼必狼狽重威從之鎮人稍却官軍乘之鎮人大潰重榮走還嬰城自守鎮人戰及凍死者二萬餘人已而晉師入鎮州執重榮斬之晉主函其首送于遼御批歷代通鑑輯覽卷六十八

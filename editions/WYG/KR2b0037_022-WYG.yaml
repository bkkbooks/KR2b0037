front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷二十三後漢肅宗孝章皇帝甲申元和元年夏六月詔議貢舉法
  hash: sha256:7bf2f77c0612fbda27bb778227dd422909a5c02a5bdfe94591b25eb64259aa27
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_022-1a, image: WYG0335/WYG0335-0587a.png}
body:
  text: 陳事者多言郡國貢舉率非功次故守職益懈而吏事寖疎咎在州郡有詔下公卿朝臣議大鴻臚韋彪字孟達平陵人賢之元孫上議畧曰以簡賢為務賢以孝行為首是以求忠臣必于孝子之門夫人才行少能相兼是以孟公綽優于趙魏老不可以為滕薛大夫忠孝之人持心近厚鍛錬之吏持心近薄士宜以才行為先不可純以閥閲然其要歸于選二千石二十石賢則貢舉皆得其人矣彪又上疏言天下樞要在于尚書而間者多從郎官超升此位雖曉習文法畏于應對然察察小慧類無大能宜鑒夫捷給之對深思絳侯木訥之功帝納之秋七月詔禁治獄慘酷者八月帝南廵詔所經道上州縣母得設儲跱命司空自將徒支拄橋梁有遣使奉迎探知起居二千石當坐冬十月至宛以朱暉字文季南陽宛人為尚書僕射九月幸章陵十月進幸江陵還幸宛召前臨淮太守宛人朱暉拜尚書僕射暉在臨淮有善政民歌之日彊直自遂南陽朱季吏畏其威民懷其惠時坐法免家居故上召而用之後尚書張林上言縣官經用不足宜自煮鹽修均輸法暉固執以為不可曰王制天子不言有無諸侯不言多寡食禄之家不得與百姓争利均輸之法與賈販無異鹽利歸官則下民窮怨誠非明主所宜行帝怒切責諳尚書暉等皆自繫獄三日詔勅出之暉因稱病篤不肯復署議尚書令以下惶怖謂暉曰今臨得譴讓奈何稱病暉曰行年八十蒙恩得在機宻當以死報若心知不可而順㫖雷同負臣子之義遂閉口不復言諸尚書並劾奏暉帝寝其事詔直事郎間暉起居太醫視疾太官賜食暉乃起謝十一月還宫以孔僖為蘭臺令史秩六百石掌奏及印工文書魯國孔僖字仲和涿郡崔駰字亭伯同遊太學相與論武帝始崇聖道號勝文景及後恣已忘其前善鄰房生上書告駰僖誹謗先帝譏刺當世事下有司駰詣吏受訊僖以書自訟畧曰凡言誹謗者謂實無此事而加虚誣之也至如孝武皇帝政之美惡顯在漢史是為直說書傳實事非虚謗也陛下即位以來政教未過徳澤有加臣等獨何譏刺哉假使所非實是則固應悛改儻其不當亦宜舍容又何罪焉書奏詔勿問拜僖蘭臺令史賜毛義字少卿廬江人鄭均字仲虞東平任城人穀各千斛廬江毛義東平鄭均皆以行義稱于鄉里帝下詔褒美賜義均榖各千斛常以八月長吏存問賜羊酒均兄為縣吏頗受禮遺均諫不聴乃脫身為傭嵗餘得錢帛歸以與兄曰物盡可復得為吏坐終身捐棄凡感其言遂為廉潔均仕為尚書免歸後帝東巡過任城幸均舍勅賜尚書禄以終其身時號為白衣尚書南陽張慕義名往候之坐定而府段適至以義守安邑令義捧檄而入喜動顔色奉心賤之辭去後義死徴辟皆不至奉乃歎曰賢者固不可測往日之乃為親屈也安邑東觀漢記作安陽今從范書詔除妖惡禁錮者詔曰往者妖言大獄所及廣遠一人犯罪禁至三屬如有賢才没齒無用朕甚憐之諸以前妖惡禁錮者皆蠲除之乙酉二年春正月詔賜民胎養穀戒俗吏矯飾者詔曰諸懷􅗖者賜胎養穀人三斛復其夫勿算一嵗著為令又詔三公曰俗吏矯飾外貌似是而非揆之人事則悅耳論之陰陽則傷化朕甚厭之甚苦之安静之吏悃愊無華日計不足月計有餘如襄城注見前令劉方字伯况平原人吏民同聲謂之不煩雖未有他異斯亦殆近之矣夫以苛為察以刻為明以輕為徳以重為威四者或興則下有怨心吾詔書數下冠蓋接道而吏不加理人或失職其咎安在勉思舊令稱朕意焉行四分歴太初歴施行百餘年歴稍後天謂七曜之行在歴家所推步躔之前晦朔弦望不合也上命治歴編訢人姓名李梵等綜校其狀作四分歴施行之二月帝東巡耕于定陶幸㤗山柴告岱宗進幸奉高注見前宗祀五帝于汶上明堂注亦見前赦天下帝之為太子也受尚書于東郡太守汝南張酺帝幸東郡引酺及門生掾吏㑹庭中先備弟子之禮使酺講尚書一篇然後修君臣之禮張酺字孟侯汝南細陽人三月至魯祠孔子帝祠孔子及七十二弟子于闕里作六代之樂大㑹孔氏男子六十二人謂孔僖曰今日之㑹寧于卿家有光榮乎對曰臣聞明王聖主莫不尊師貴道今陛下親屈萬乗辱臨敝里此乃崇禮先師増輝聖徳非臣家之私榮也帝曰非聖者子孫馬有斯言乎拜僖郎中至東平祠獻王陵今泰安府東平州東北峗山上有後漢東平獻王冢帝至東平追念獻王謂其諸子曰思其人至其鄉其處在其人亡因泣下霑襟遂幸獻王陵祠以太牢獻王之歸國也驃騎府吏丁收周栩以王愛賢下士不忍去遂為王家大夫數十年事祖及孫帝聞之皆引見擢為議郎已事祖及孫時獻王子懷王忠卒忠子敞嗣王夏四月還宫秋七月詔定律毋以十一月十二月報囚謂立春陽氣至可以施生故不論囚也丙戌三年春正月詔嬰兒無父母親屬及有子不能養食者稟給如律律本有此條今舉行之也帝北巡三月還宫帝耕于懷勅侍御史司空曰方春所過無得有所伐殺車可以引避引避之騑馬可輟解輟解之進幸中山還幸元氏復幸趙賜從行者各有差夏四月收太尉鄭𢎞印綬𢎞于元和元年為太尉𢎞自繋獄出之卒以宋由字叔路長安人為太尉綱目凡例三公策拜卒免安帝以後因事乃書今于章帝時即依此例其事無足錄者皆不具書𢎞數陳竇憲權勢太盛言甚切至憲因奏𢎞泄漏密事憲黨張林楊光貪殘𢎞奏之吏與光舊因以告光帝責讓𢎞收印綬𢎞自詣廷尉詔勅出之因乞骸骨尋卒𢎞病篤復上書極言憲姦惡當誅帝省章遣醫視病比至已卒司空倫罷以袁安為司空第五倫以老病乞身賜策罷以二千石俸終其身倫奉公盡節言事無所依逹性質慤少文采在位以貞白稱或問倫曰公有私乎對曰昔人有與吾千里馬者吾雖不受每三公有所選舉心不能忘而亦終不用也吾兄子病一夜十往退而安寢吾子有病雖不省視而竟夕不眠若是者豈可謂無私乎疏勒王忠詐降班超斬之先是超發疏勒于窴兵擊莎車莎車以賂誘疏勒王忠忠遂反從之西保烏即城超乃更立其府丞成大為疏勒王悉發其不反者以攻忠使人說康居王執忠以歸其國烏即城遂降至是忠說康居王借兵還據楨中疏勒地名密與龜兹謀遣使詐降于超超知其姦縛忠斬之因擊破其衆南道遂通詔侍中曹褒字叔通魯國薛人定漢禮博士曹褒上疏以為宜定文制著成漢禮班固以為宜廣集諸儒共議得失帝曰諺言作舍道旁三年不成㑹禮之家名為聚訟互生疑異筆不能下昔堯作大章一䕫足矣見吕氏春秋乃拜褒侍中授以叔孫通漢儀十二篇曰此制散畧多不合經今宜依禮條正使可施行褒乃依準舊典雜以五經䜟記之文撰次天子至于庶人冠婚吉㐫終始制度凡百五十篇奏之帝以衆論難一故但納之不復令有司平奏丁亥章和元年以嘉瑞屢見故改元夏六月以袁安為司徒桓虞免安代桓虞字仲春馮翊人任隗字仲和光之子為司空隗清静寡欲帝素稱其行及是拜司空以沈正見重于時秋七月䕶羌校尉張紆擊羌斬其帥迷吾羌豪名先是燒當羌迷吾及其弟號吾冦隴西郡督烽掾李章追獲之號吾曰誠得生歸必悉罷兵不復犯塞太守張紆遣之羌即解散各歸故地迷吾退居河北歸義城已而䕶羌校尉𫝊育北地人募人鬬諸羌胡募人間搆諸羌使之自鬬羌胡不肯遂叛出塞更依迷吾育發諸郡兵數萬人共擊羌未及㑹育獨進軍迷吾襲擊大破之殺育及吏士八百餘人㑹諸郡兵到羌遂引去詔以張紆為校尉將萬人屯臨羌漢縣故城在今西寧府西寧縣迷吾復與諸種冦金城塞紆遣從事司馬防與戰迷吾敗走欲降紆納之迷吾率衆至臨羌紆設兵大㑹施毒酒中伏兵殺其酋豪八百餘人斬迷吾頭以祭傅育冢復放兵擊其餘衆斬獲數千人迷吾子迷唐與諸種解仇結婚交質據大小榆谷以叛張紆不能制榆谷在今蘭州府河州西八月乙未晦日食北匈奴五十八部來降北匈奴衰耗黨衆離叛南部攻其前丁零冦其後鮮卑擊其左西域侵其右不復自立乃遠引而去南單于與戰于涿邪山斬獲而還至是鮮卑復大破之斬優留單于北庭大亂于是屈蘭儲等五十八部口二十萬勝兵八千人詣雲中五原朔方北地降班超發諸國兵擊莎車降之超發于窴諸國兵二萬人撃莎車龜兹王發温宿等兵合五萬人救之超曰今兵少不敵可各散去須夜鼔聲而發陰緩所得生口使生口得歸言超兵將散去龜兹王聞之大喜自以萬騎于西界追超温宿王將八千騎于東界徼于窴超知二虜已出密召諸部勒兵鷄鳴馳赴莎車營胡大驚亂犇走追斬五千餘級莎車遂降龜兹等因各退散自是威震西域戊子二年春正月濟南王康中山王焉來朝上篤于親親故二王入朝特加恩寵及諸昆弟不遣就國賞賜過度倉帑為虚太尉掾何敞奏記宋由請勅諸王就國節省浮賣由不能用平何敞字文高陵人尚書宋意字伯志均族子上疏曰陛下隆寵諸王禮敬過度春秋之義諸父昆弟無所不臣所以尊尊卑卑彊幹弱枝者也西平王羡等久磐京邑驕奢僭擬損上下之序失君臣之正宜割情不忍以義斷恩發遣歸藩以塞衆望帝崩年三十一遺詔無起寝廟一如先帝法制太子肇即位年十嵗是為孝和帝尊皇后曰皇太后三月葬敬陵在河南府洛陽東南史臣曰章帝素知人厭苛切事從寛厚平徭簡賦民賴其慶嗚呼懋哉太后臨朝竇憲以侍中内幹機密出宣詔命弟篤為虎賁中郎將篤弟景瓌並為中常侍兄弟皆在親要之地崔駰以書戒憲日傳曰生而富者驕生而貴者傲生富貴而能不驕傲者未之有也昔馮野王稱為賢臣近陰衛尉克已復禮終受多福外戚所以獲譏于時埀愆于後者葢在滿而不挹位有餘而仁不足漢與外家二十保族全身四人而已書曰鑒于有殷可不慎哉以鄧彪字智伯禹之宗為太傅録尚書事百官總已以聽竇憲以彪有義讓彪父邯中興初有功封鄳鄉侯邯卒彪讓國于異母弟先帝所敬建初中彪拜太尉元和初乞罷詔給二千石奉嵗時存問而仁厚委隨故尊崇之其所施為輒外令彪奏内白太后事無不從彪在位修身而已不能有所匡正憲性果急睚眦之怨莫不報復以韓紆嘗劾父勲獄令客斬紆子以首祭勲冡諸王始就國夏四月以遺詔罷鹽鐵之禁五月京師旱冬十月侍中竇憲殺都鄉侯暢齊殤王石之子石武王縯孫太后以憲為車騎將軍使北擊匈奴以贖罪都鄉侯暢來弔國憂太后數召見之竇憲懼暢分宫省之權遣刺客殺暢于屯衛中而歸罪于暢弟剛使侍御史與青州刺史雜考剛等尚書韓稜以為賊在京師不宜捨近問逺恐為奸臣所笑太后怒切責稜稜固執其議韓稜字伯師潁川舞陽人太尉掾何敞請獨奏案之敞説宋由曰暢宗室肺腑土藩臣來弔大憂上書須報親在或衛致此殘酷奉憲之吏莫適討捕蹤跡不顯主名不立敞數備股肱職典賊曹欲親至發所以糾其變而二府執事以為三公不與賊盗公縱姦慝莫以為咎敞請獨奏案之由乃許焉二府司徒司空也聞敞行皆遣主者主知賊盜之曹隨之于是推舉具得事實太后怒閉憲于内宫先是南單于上言請伐北匈奴時北匈奴饑亂降南部者嵗數十人南單于上言宜出兵討伐破北成南令漢家長無北念太后以示耿秉秉言可討太后欲從之尚書宋意上書諫不報及是憲懼誅因自求擊匈奴以贖死乃以憲為車騎將軍執金吾耿秉為副發兵北伐以鄧訓為䕶羌校尉擊迷唐破之諸羌來降公卿舉鄧訓代張紆迷唐率兵萬騎來至塞下未敢攻訓先脅小月氏胡訓擁衛胡令不得戰議者咸以羌胡相攻縣官之利不宜禁䕶訓曰張紆失信衆羌大動今因其廹急以徳懷之庶能自用開城悉驅羣胡妻子内之嚴兵守衛羌即解去湟中詣胡皆言漢家常欲鬬我曹鄧使君待伐以息信乃是得父母也咸歡喜叩頭曰唯使君所命訓遂賞賂諸羌使相招誘迷唐叔父號吾將其種人八百户來降訓因發秦胡羌兵掩擊迷唐破之迷唐乃去大小榆衆悉離散明年春迷唐欲復歸故地訓發湟中六十人縫革船置箄上渡河掩擊大破之一種殆盡迷唐收餘衆西徙千餘里燒當豪帥稽顙歸死餘皆欵塞納質孝和皇帝己丑永元元年春下尚書僕射郅壽字伯孝惲之子吏壽自殺竇憲嘗使門生齎書詣尚書僕射郅壽有所請託壽送詔獄上書陳憲驕恣引王莽以誡國家又因朝㑹厲音正色譏憲等以伐匈奴起第宅事憲怒陷壽以買公田誹謗下吏當誅侍御史何敞上疏言之疏曰壽幾宻近臣匡救為職若黙懷不言其罪當誅今壽衆正議以安宗廟豈其私邪忠臣盡言以死為歸臣誠不欲聖朝行誹謗之誅以杜塞忠直垂譏無窮書奏壽得減死徙合浦未行自殺時竇憲將行公卿詣朝堂上書諫以為匈奴不犯邊塞而無故勞師遠涉損費國用徼㓛萬里非社稷之計書連上輒寝宋由諸卿稍自引止唯袁安任隗免冠固事前後十上衆皆危懼安隗正色自若侍御史魯恭上疏曰萬民者天之所生天愛其所生猶父母愛其子一物有不得其所者則天氣為之舛錯况于人乎今匈奴逺藏去塞數千里而欲乘其虚耗利其微弱是非義之所出也書奏不省魯恭字仲康平陵人夏六月竇憲擊北匈奴大破之登燕然山注見前刻石勒功而還竇憲耿秉出朔方塞南單于出滿夷谷度遼將軍鄧鴻出稒陽塞皆㑹􅃰邪山與北單于戰于稽落山在漠北胡三省注唐置稽落州盖因山以名大破之單于遁走斬獲甚衆降二十餘萬人出塞三千餘里登燕然山命中䕶軍班固刻石勒功紀漢威徳而還憲又遣司馬吳汜奉金帛遺北單于于西海上以詔致賜單于稽首拜受遣其弟右温禺鞮王奉貢入侍憲以單于不自身到奏還其侍弟秋九月以竇憲為大將軍封憲武陽胡三省注郡國志泰山郡有南武陽侯國憲盖封此南武陽故城在今山東沂州府費縣侯食邑二萬户憲固辭封爵詔許之舊大將軍位在三公下至是詔憲位在太傅下三公上竇氏兄弟驕縱而景尤甚奴客奪人財貨篡取罪人妻略婦女擅發緣邊突騎袁安劾景不報瓌獨好經書節約自修何敞上封事曰伏見大將軍憲兄弟専朝虐用百姓奢侈僭偪誅戮無罪臣誠不欲上令太后損文母之號陛下有誓泉之譏下使憲等得長保其福佑駙馬都尉瓌比請退身願抑家權可與參謀聽順其意誠宗廟至計竇氏之福時濟南王康尊貴驕甚憲乃白出敞焉濟南太傅康有違失敞輒諫争康雖不能從然素敬重敞無所嫌牾焉大水郡國凡九庚寅二年春二月壬午日食東觀記史官不覽涿郡言之月氏遣使貢獻初月氏求尚公主班超拒還其使由是怨恨遣其副王謝將兵七萬攻超超衆少皆大恐超曰月氏兵雖多然數千里踰葱嶺來非有運輸何足憂邪但當收穀堅守彼饑窮日降不過數十日决矣不下抄掠無所得超度其必從龜兹求食乃遣兵數百于東界要之謝果遣騎賂龜兹伏兵遮擊盡殺之持其首示謝謝大驚請罪由是嵗奉貢獻秋七月竇憲出屯凉州辛夘三年春正月帝冠始用曹褒新禮權褒監羽林左騎二月竇憲遣兵擊北匈奴于金微山在漠北章懷注去朔方五千餘里大破之單于走死先是北單于遣使欵塞欲入朝見憲遣班固迎之㑹南單于求滅北庭憲復遣中郎將耿譚將騎出塞襲擊北單于單于被創僅而得免事在二年至是憲以北匈奴㣲弱欲遂滅之遣左校尉耿夔字定公秉之弟圍北單于金微山大破之獲其母閼氏名王以下五千餘級單于逃走不知所在出塞五千餘里而還自漢出師所未嘗至也憲又遣兵擊北匈奴之守伊吾者復取其地車師震慴前後王各遣子入侍竇憲殺尚書僕射樂恢字伯竒京兆長陵人竇憲以耿夔任尚為爪牙鄧疊郭璜為心腹班固傅毅字武仲茂陵人典文章刺史守令多出其門賦歛吏民共為賂遺袁安任隗舉奏諸二千石并所連及貶秩免官四十餘人竇氏大恨以安隗素行高未有以害也尚書僕射樂恢上疏曰陛下富于春秋纂承大業諸舅不宜幹正王室示天下之私若上能以義自割下能以謙自引則四舅可保爵土之榮而皇太后永無慙負宗廟之憂矣書奏不省恢乞骸骨歸憲風州郡廹脅恢飲藥死于是朝臣震慴無敢違者袁安以天子㓜弱外戚擅權每朝㑹進見及與公卿言國家事未嘗不喑鳴流涕自天子及大臣皆恃頼之冬十月帝如長安竇憲來㑹帝幸長安詔憲與車駕㑹憲至尚書以下議欲拜之伏稱萬嵗尚書韓稜正色曰夫上交不謟下交不黷禮無人臣稱萬嵗之制議者皆慙而止尚書左丞王龍私奏記上牛酒于憲稜舉奏論為城旦以班超為西域都䕶龜兹姑墨温宿諸國皆降復置西域都䕶騎都尉戊巳校尉官以班超為都䕶徐幹為長史十二月帝還宫壬辰四年春正月立北匈奴於除鞬為單于初北單于既亡其弟於除鞬自立遣使欵塞竇憲請立為單于置中郎將領䕶如南單于故事事下公卿議宋由等以為可許袁安任隗以為光武招懷南虜非謂可永安内地正以權時之算可得扞禦北狄故也今宜令南單于反北庭領降衆無緣復更立於除鞬以増國費事奏未以時定安懼憲計遂行又獨上封事言之略曰南單于屯先父舉衆歸徳四十餘年屯又首大謀空盡北虜今更立新降是失信所養建立無功况烏桓鮮卑新殺北單于今立其弟豈不懷怨詔下其議安與憲更相難折憲負勢驕訐至詆毁安稱光武誅韓歆戴涉故事事俱見前安終不移然上竟從憲策初廬江周榮辟袁安府安舉奏竇景及爭立北單于事皆榮所具革竇氏客脅榮曰竇氏悍士刺客滿城中謹備之矣榮曰榮江淮孤生得備宰士縱為所害誠所甘心因敕妻子若卒遇飛禍無得殯殮冀以區區腐身覺悟朝廷三月司徒安卒以丁鴻為司徒安卒朝野咸為痛惜後數月竇氏竟敗夏六月戊戌朔日食丁鴻上疏曰昔諸吕擅權統嗣幾移哀平之間廟不血食今大將軍雖欲勅身自約然而天下遠近皆惶怖承㫖背王室向私門人道悖于下效騐見于天去事之徴未然之明鏡也夫天不可以不剛不剛則三光不明王不可以不彊不彊則宰牧縱横宜因大變改正匡失以塞天意地震郡國凡十三旱蝗大將軍竇憲伏誅竇氏父子兄弟並為卿校充滿朝廷鄧疊及弟磊母元與憲壻郭舉舉父璜共相交結舉得幸太后遂謀為逆帝知其謀而外臣莫由親接以鉤盾令典諸近池苑囿遊觀之處宦者為之鄭衆南陽犨人謹敏有心幾不事豪黨遂與定議誅憲㑹憲自凉州還京師帝將發其謀使清河王慶私從千乘王伉帝長兄也求得外戚𫝊章懐注前書外戚𫝊也夜獨内之又令慶𫝊語鄭衆求索故事謂文帝誅薄昭武帝誅竇嬰故事明日幸北宫詔執金吾五校尉兵屯衛南北宫閉城門捕璜舉疊磊誅之收憲大將軍印綬更封冠軍侯與篤景瓌皆就國選嚴能相迫令自殺初張酺為河南尹數以正法繩景及竇氏敗酺上疏曰方憲等寵貴羣臣阿附唯恐不及今嚴威既行皆言當死不復顧其前後伏見陽夏侯瓌每存忠善未嘗犯法宜加貸宥以厚徳帝感其言由是瓌獨得全竇氏宗族賓客皆免歸故郡初班固奴醉罵洛陽令至是令收捕固死獄中固嘗著漢書未就詔固女弟曹壽妻昭踵成之以宦者鄭衆為大長秋帝策勲班賞衆每辭多就寡帝由是賢之常與議事中官用權自此始秋七月太尉由以罪策免自殺以黨于竇氏也八月司空隗卒以尹睦河南人為太尉錄尚書事劉方即前襄城令為司空初議立北單于惟宗正劉方大司農尹睦同袁安任隗議及竇氏敗帝追思前議故策免宋由㑹隗病卒以睦為太尉方為司空鄧彪以老病上還樞機職詔以睦代之睦尋卒于位方後坐事免歸自殺䕶羌校尉鄧訓卒迷唐復反鄧訓卒吏民羌胡旦夕臨者日數千人前烏桓吏士訓前任烏桓校尉皆犇走道路至空城郭吏執不聽以状白校尉徐傿傿歎曰此為義也乃釋之遂家家為訓立祠聶尚蜀郡太守代訓為校尉欲以恩懷諸羌乃招迷唐使還居大小榆谷迷唐遣祖母詣尚尚自送之塞下令譯䕶送之迷唐遂與諸種屠譯屠其譯使也以盟復宼金城塞尚坐免明年校尉友攻迷唐于大小榆谷夹逢留大河築城塢作大航造河橋欲以渡共迷唐逺徙依賜支河曲至永元八年史充代友為校尉遂發湟中羌胡出塞而迷唐近擊充兵殺數百人九年充坐徵是秋迷唐復率衆宼隴西詔遣征西将軍劉尚等将兵討之迷唐懼棄老弱犇入臨洮南尚等追至高山大破之迷唐引去不能復追十年劉尚坐畏懦免謁者耿譚設購賞諸種頗來附迷唐恐乃降詣闕獻逢留大河胡三省注即黄河也河水至此有逢留之名賜支即禹貢析支地理今釋在陜西河州西河曲司馬彪曰河水屈而東北逕析支之地是為河曲矣臨洮注見前癸巳五年春二月隴西地震秋九月北單于叛遣兵追斬滅之於除鞬聞竇憲誅自遁還北詔討斬之破滅其衆先是耿夔既破北匈奴鮮卑遂徙據其地至是匈奴餘種十餘萬落皆自號鮮卑鮮卑由此漸盛以張酺為太尉酺與尚書張敏字伯逹河間鄭人等奏曹褒制漢禮亂聖術宜加刑誅帝寝其奏而漢禮遂不行甲午六年春正月使匈奴中郎将杜崇等殺南單于安國立左賢王師子為單于單于屯屠何死弟安國立安國初為左賢王無稱譽及為單于單于適之子左谷蠡王師子以次轉為左賢王師子素勇黠多智數将兵擊北庭受賞賜國中盡敬師子而不附安國安國欽弑之與諸新降胡同謀議師子覺其謀乃别居五原界安國與中郎将杜崇不相平乃上書告崇崇斷其章因與度遼将軍朱徽上言安國親近新降欲殺左賢王世子起兵背叛下公卿議皆以為宜遣有方畧使者之單于庭與崇徽并力貴其部衆為邊害者共平罪誅若不從命令為權時方畧亦足以威示百蠻帝從之于是徽崇遂發兵造其庭安國奔走舉兵欲誅師子師子先知乃悉将廬落入曼栢城後漢縣屬五原郡地在今吳喇或黄河北安國追到城下門閉不得入乃引兵屯五原崇徽因發諸部騎追赴之安國舅喜為等􅂲并誅乃殺安國而立師子師子既立諸胡不服北匈奴降者夜襲師子脅立前單于屯屠河子逄侯為單于叛走出塞詔遣将軍鄧鴻等擊之逢侯逺遁漢兵不能追而還明年鴻坐逗遛失利朱徽杜崇坐失胡和致胡反皆徴下獄死秋京師旱班超發八國兵討焉耆斬其王廣初龜兹諸國既降焉耆猶懷二心至是討之斬廣及尉犂王汛于陳睦故城𫝊首京師更立元孟為焉耆王于是西域五十餘國悉納質内屬至于海濱四萬里外皆重譯貢獻封班超為定逺侯邑千户以陳寵為廷尉寵性仁矜數議疑獄每附經典務從寛恕乙未七年夏四月辛亥朔日食秋七月易陽漢縣故城在今直𨽻廣平府水年縣地裂九月京師地震丙申八年春二月立貴人陰氏為皇后識之曾孫也夏蝗河内陳留丁酉九年春三月隴西地震夏六月京師旱蝗詔除田租及山澤稅秋閏八月皇太后竇氏崩諡章徳合葬敬陵初梁貴人既死宫省事秘莫有知帝為梁氏出者至是舞陰公主子梁扈奏記三府太尉張酺言狀帝感慟良久㑹貴人姊樊調妻上書自訟乃知貴人寃殁之狀三公奏請貶竇太后尊號不宜合葬先帝帝手詔臣子無貶尊上之文其勿復議追尊梁貴人為恭懷皇太后葬西陵封梁竦子三人為侯崇為樂平侯雍為乘氏侯翟為單父侯位皆特進梁氏自此盛清河王慶始敗求上母宋貴人冢帝許之並詔宋氏悉歸京師除慶舅皆為郎戊戌十年夏五月京師大水冬十月雨水凡五州十二月以劉愷字伯豫為郎初居巢注見前侯劉般字伯興宣帝元孫薨子愷當嗣稱父遺意讓其弟憲遁逃十餘年有司奏請絶其國賈逵上書曰孔子稱能以禮讓為國乎何有有司不原樂善之心而繩以循常之法非所以長克讓之風成含宏之化也詔聽憲嗣爵徴愷為郎己亥十一年春二月遣使循行廩貸令郡國被災害不能自存者得漁采山林池澤不收假稅尋又詔曰吏民踰僭是以舊令制之節度頃者貴戚近親莫肯率從有司不舉怠放日甚竒巧靡貨流積公行在位犯者當先舉正申明憲綱庚子十二年夏四月秭歸後漢縣今湖北宜昌府歸州是山崩秋七月辛亥朔日食辛丑十三年春正月帝幸東觀漢聚書之所帝覽書林閲篇籍召見諸儒魯丕字叔陵恭之弟賈逵黄香字文彊江陵安陸人京師號曰天下無雙江夏黄童等相難數事帝善丕說特賜衣冠丕因上疏曰說經者𫝊先師之言非從已出若䂓矩權衡之不可枉也難者必明其據說者務立其義浮華無用之言不陳于前故精思不勞而道術愈章法異者各令自說師法博觀其義無令幽遠獨有遺失也迷唐復叛宼金城郡兵擊破之初迷唐既入朝事具前其餘種人不滿二千饑窘不立帝令還大小榆谷迷唐以故地不可復居辭不肯出校尉呉祉等促使出塞迷唐復叛宼鈔而去吳祉等皆坐徵至是迷唐復還賜支河曲將兵向塞金城太守侯覇等擊之種人瓦解迷唐遂弱遠踰賜支河首依發羌羌之别種居久之病死其子來降冬詔邊郡舉孝亷詔曰幽并凉州户口率少邊役衆劇束修良吏進仕路狹撫接夷狄以人為本令綠邊郡口十萬以上嵗舉孝亷一人不滿十萬二嵗一人五萬以下三歲一人以魯恭為司徒初恭為中牟令専以徳化為理不任刑罰時郡國螟傷稼獨不入中牟河南尹袁安聞之疑其不實使掾往亷之恭随行阡陌有雉履止傍有兒童掾曰兒何不捕雉兒曰雉方雛掾瞿然起曰所以来者欲察君政今蟲不犯境一異也化及鳥獸二異也童子有仁心三異也遂還府白安安因上書言状帝異之徴拜侍御史累遷光禄勲選舉清平貴戚不能枉其正至是為司徒十六年七月免壬寅十四年春安定羌反郡兵擊滅之復置西海郡安定降羌燒何種反郡兵擊滅之自是西海及大小榆谷左右無復羌宼隃麋後漢侯國故城在今鳯翔府汧陽縣相曹鳯上言燒何種居大小榆谷土地肥美有西海魚鹽之利阻大河以為固又近塞内諸種故犯法者常從此起宜及此時建復西海郡縣䂓固二榆廣設屯田隔塞羌胡交闗之路遏絶狂狡窺欲之源又殖榖富邊省委輸之役國家可以無西方之憂上從之乃繕修故西海郡拜鳯為金城西部都尉戍之後増廣屯田列屯河合三十四部其功垂立㑹永初中諸羌叛乃罷皇后陰氏廢死陰皇后多妬忌寵遇寖衰數懷恚恨有言后與外祖鄧朱挾巫蠱道者后坐廢以憂死朱考死獄中大水凡三州徴班超還京師班超久在絶域超自永平十六年出西城至是凡三十一年年老上書乞歸書言臣不敢望列酒泉郡但願生入玉門闗久之未報超妹曹大家讀作姑上書為超求哀帝感其言乃徴超還八月至雒陽拜為射聲校尉九月卒超之被徴也任尚代為都尉謂超曰小人猥承君後仕重慮淺宜有以誨之超曰塞外吏士本非孝子順孫皆以罪過徙補邊屯而蠻夷懷鳥獸之心難養易敗今君性嚴急水清無大魚察政不得下和宜蕩佚簡易寛小過總大綱而已超去後尚私謂所親曰我以班君當有竒策今所言平平耳尚後竟失邊和如超言立貴人鄧氏為皇后初鄧禹嘗謂人曰吾將百萬之衆未嘗妄殺一人後世必有興者其子訓有女曰綏性孝友好書𫝊常晝修婦業暮誦經典家人號曰諸生選入宫為貴人恭肅小心動有法度承事陰后接撫同列常克已以下之雖宫人𨽻役皆加恩恤帝深嘉焉嘗有疾帝特令其母兄弟入視醫藥貴人辭曰宮禁至重而使外舍久在内省上令陛下有私幸之譏下使賤妾獲不知足之謗上下交損誠不願也每有讌㑹諸姫競自修飾貴人獨尚質素其衣有與隂后同色者即時解易若並時進見則不敢正坐離立每有所問常逡巡後對帝數失皇子貴人數選進才人以博帝意及是立為皇后郡國貢獻悉令禁絶歲時但供紙墨而已帝每欲官爵鄧氏后輒哀請謙讓故后兄隲終帝世不過中郎將鄧隲字昭伯以徐防字謁卿沛國銍人為司空防上疏以為漢立博士十有四家漢官儀曰光武中興恢宏稽古易有施孟梁邱賀京房書有歐陽和伯夏侯勝建詩有申公轅韓嬰春秋有嚴彭祖顔安樂禮有戴徳戴聖凡十四博士設甲乙之科前書嵗課甲科四十人為郎中乙科二十人為大子舍人丙科四十人為文學掌故以勉學者今太學試博士弟子皆以意說不修家法不依章句妄生穿鑿輕侮道術寖以成俗誠非詔書實選本意改薄從忠三代常道専精務本儒學所先臣以為博士策試宜從其家章句開五十難以試之解釋多者為上第引文明者為高說若不依先師義有相伐皆正以為非上從之封宦者鄭衆為鄛鄉章懷注南陽郡棘陽有鄛鄉􅁄陽故城在今河南南陽府新野縣侯宦者封侯自此始癸夘十五年夏四月甲子晦日食時帝遵肅宗故事兄弟皆留京師有司以日食陰盛奏遣諸王就國詔曰甲子之異責由一人諸王幼穉早離顧復常有蓼莪小雅詩篇凱風􅆁風詩篇之哀選懦音軟之恩知非國典且復宿留宿先就反留力就反猶言停待也秋九月雨水凡四州冬十月帝如章陵十一月還宫幸章陵祠舊宅祠園廟㑹宗室于舊廬勞賜作樂進幸雲夢臨漢水進幸江陵時太尉張禹字伯逹襄國人畱守禹于十二年代張為太尉聞之以為不宜冐險遠遊驛馬上諌詔報口祠謁既訖當南禮大江今得君奏臨漢囘輿及還禹特蒙賞賜詔大官勿受遠國珍羞嶺南舊貢生龍眼交州記樹高五六丈子似荔枝而小七月熟荔枝大如桂樹實如難子至日禺中翕然俱赤食之甘而多汁十里一置馬遞曰置五里一候司望曰候書夜傳送臨武漢縣今屬湖南桂陽州長唐羌字伯游汝南人上書曰臣聞上不以滋味為徳下不以貢膳為功伏見交阯七郡獻生龍眼等鳥驚風發南州土地炎熱惡蟲猛獸不絶于路觸犯死亡不可勝數死者不可復生來者猶可救也詔曰遠國珍羞本以薦奉宗廟茍有傷害豈愛民之本其敇大官勿復受獻甲辰十六年秋七月旱乙巳元興元年冬十二月帝崩年二十七皇后迎子隆即位是為孝殤帝初帝失皇子十數後生者輒隠秘養于民間羣臣無知者及帝崩皇后乃收皇子于民間長子勝有痼疾少子隆生始百餘日迎立以為太子即位尊皇后曰皇太后太后臨朝雒陽令王渙字稚子廣漢都人卒渙居身平正能以明察發擿姦伏外猛内慈人皆悅服至是卒官百姓莫不流涕為立祠作詩弦歌以祭太后詔曰夫忠良之吏國家所以為治也求之甚勤得之至寡故洛陽令王渙秉清修之節盡心奉公務在惠民其以渙子石為郎中以勸勞勤孝殤皇帝丙午延平元年春正月以張禹為太傅徐防為太尉參録尚書事太后以帝在襁褓欲令重臣居禁内乃詔禹舍宫中五日一歸府每朝見特贊與三公絶席封兄勝為平原王三月葬慎陵在洛陽東南賀善贊曰和帝早發莫斷收攬權綱而又尊儒納諌動無大過惜乎始謀不遠權奸雖除宦豎用事遂為東漢禍基之主清河王慶就國特加殊禮慶子祜年十三太后以帝幼弱遠慮不虞留祜與嫡母耿姫居清河邸姫况孫也夏四月罷祠官不在禮典者太后以鬼神難徴淫祀無福乃詔有司罷之又詔赦建武以來諸犯禁錮者皆復為平人減大官導官尚方内署服御珍膳靡麗難成之物自非陵廟米不得導擇朝夕一肉飯而已郡國所貢皆減過半斥賣上林鷹犬離宫别館儲峙米炭悉令省之又詔免遣掖庭宫人及宗室之沒入者皆為庶民以鄧隲為車騎將軍儀同三司胡三省注三司三公也晉職官志儀同二司之名始此五月河東垣山章懷注垣縣山也垣縣故城在今山西絳州垣曲縣崩雨水詔實覈傷害除其田租郡國三十七大水詔曰間者水災害稼朝廷憂懼而郡國欲獲虚譽遂多張墾田競増户口掩匿盗賊奸惡無懲署用非次選舉乖宜貪苛慘毒延及平民刺史垂頭塞耳阿私下比不畏于天不愧于人自今以後将糾其罰二千石長吏其各實覈所傷害為除田租秋八月帝崩年二嵗太后迎清河王子祜入即位是為孝安帝太后猶臨朝后與兄隲定策禁中迎祜拜長安侯立以為和帝嗣詔檢勅鄧氏賓客詔司𨽻校尉河南尹南陽太守曰每覽前代外戚賓客濁亂奉公為民患苦咎在執法怠懈不輒行其罰故也今宗門廣大姻戚不少賓客姦猾多干憲禁其明加檢勅勿相容䕶自是親戚犯罪無所假貸九月大水凡六州葬康陵以連遭大水百姓苦役方中陵中也秘藏及諸工作減十之九隕石于陳留冬十月大水雨雹凡四州清河王慶卒清河王病篤上書求葬宋貴人冢旁遂薨年二十九太后使掖庭丞送左姬左姬名小娥安帝生母也喪與王合葬使司空持節弔祭車騎將軍鄧隲䕶喪事詔舉隱逸選博士尚書郎樊準字幼陵南陽湖陽人以儒學陵替乃上疏曰臣聞人君不可以不學光武皇帝受命中興不遑啟處然猶投戈講藝息馬論道孝明皇帝庶政萬幾無不簡心而垂情古典游意經藝正坐自講諸儒並聽化自聖躬流及蠻荒今學者益少遠方尤甚博士倚席不講儒者競論浮麗宜博求幽隱寵進儒雅以俟聖上講習之期太后深納其言詔公卿中二千石各舉隱士大儒務取高行以勸後進妙簡博士必得其人孝安皇帝丁未永初元年春正月蜀郡徼外羌内屬徼外𦍑龍橋等六種慕義降附于是分犍為南部為屬國都尉時永昌徼外僬僥種夷及九真徼外夜郎蠻皆貢獻内屬三月癸酉日食夏四月封鄧隲及弟悝𢎞閶皆為列侯隲辭不受先是隲兄弟常居禁中隲不欲久在内連求還第太后乃許之至是封隲及諸弟皆為列侯隲辭讓不獲遂逃避使者上疏自陳至于五六乃許之𢎞性儉素治歐陽尚書授帝禁中後卒有司奏贈驃騎將軍太后追𢎞雅意不許但賜錢布隲辭不受五月以魯恭為司徒恭先罷至是再為司徒恭奏舊制立秋乃行薄刑自永元以來改用孟夏上逆時氣下傷農業按月令孟夏斷薄刑者謂輕罪以上不欲久繫故時斷之也孟夏之制可從此令其決獄案考皆以立秋為斷恭又奏章帝定令斷獄皆以冬至之前而小吏入十一月得死罪賊不問曲直便即格殺雖有疑罪不復讞正可令大辟之科盡冬月乃斷從之六月封太后母隂氏為新野君罷西域都䕶及伊吾盧柳中注俱見前屯田先是西域諸國叛攻都䕶任尚于疏勒尚上書求救㑹朝廷以梁慬為西域副校尉即敕慬發兵赴之慬未至而尚已得解梁懂字伯威北地弋居人詔徴尚還以段禧為都䕶保龜兹禧先守它乾城梁慬以為不可固乃詭説龜兹王白覇而以兵擊破其衆遂保龜兹道路隔塞檄書不通公卿議者以為西域阻逺數有背叛吏士屯田其費無已于是罷之諸羌復叛詔将軍鄧隲校尉任尚討之鄧隲任尚討羌范書安帝紀載在永初元年六月西羌傳載在是冬通鑑從西羌𫝊考隲本傳云其夏凉州羌叛詔隲討之與帝紀同今依之改輯于六月初諸羌布在郡縣皆為吏民豪右所徭役積以愁怨㑹罷西域都䕶發羌數千騎迎之郡縣迫促發遣羣羌頗有㪚叛諸郡發兵邀遮或覆其盧落于是諸種勤姐當煎大豪東岸等愈驚同時奔潰先是燒當東號子麻奴降居安定及是麻奴兄弟與先零别種滇零及諸羌俱叛鍾羌續漢書曰居隴西臨洮谷大為冦掠斷隴道隴坻之道時羌歸附已乆無復器甲或持竹竿木枝以代戈矛或負板案以為楯或執銅鏡以象兵郡縣畏懦不能制詔遣車騎将軍鄧隲征西校尉任尚将五營北軍五校營及諸郡兵討之隲至漢陽諸郡兵未至明年春鍾羌數千人擊敗隲軍于冀西㑹梁慬自西域還至敦煌逆詔慬留為諸軍援懂至張掖破諸羌萬餘人羌大豪三百餘人詣慬降並慰譬遣還故地是漢陽後漢郡治冀今鞏昌府伏羌縣冀西冀縣之西也秋九月以冦賊雨水䇿免太尉防司空勤徐防尹勤三公以災異免自此始仲長統昌言曰光武慍數世之失權忿彊臣之竊命矯枉過直政不任下雖置三公事歸臺閣自此以來三公之職備員而已至于中世權移外戚寵被近習用其私人殘擾百姓使隂陽失和水旱為災此皆戚宦之臣所致然也反以䇿讓三公至于死免足為呌呼蒼天號咷泣血者矣郎仲長統字公理山陽髙平人建安時舉尚書著書十萬餘言名曰昌言冬十一月司空周章字次叔南陽随人自殺章于九月代尹勤為司空鄭衆蔡倫等皆乗勢豫政周章數進直言太后不能用初太后以平原王勝有痼疾而貪殤帝孩抱養為己子故立焉及殤帝崩羣臣以勝疾未痼意咸歸之太后以前不立勝恐後為怨乃迎帝而立之周章以衆心不附宻謀誅隲兄弟及衆倫等癈太后及帝而立勝事覺自殺劉友益書法周章不書謀逆葢清河之立太后之私章位在三公與其他謀廢立者異矣然后無大過隲又近賢章不量時而出此計其死自取之而已矣地震大水大風雨雹是嵗郡國十八地震四十一大水二十八風雹戊申二年春遣使稟貸冀兖流民御史中丞樊準上疏請减無事之物省官吏作者被灾之郡百姓凋殘恐非賑給所能勝贍可遣使持節慰安尤困乏者徙置荆揚孰與熟同郡太后從之悉以公田賦與貧民即擢準為光禄大夫使冀州遣議郎吕倉使兖州稟貸流民咸為蘇息夏五月旱太后親録囚徒太后幸雒陽寺官之所止曰寺及若盧獄屬少府主鞫将相大臣録囚徒雒陽有囚實不殺人而被考自誣羸困輿見畏吏不敢言将去舉頭若欲自訴太后呼還問状具得枉實即収雒陽令抵罪行未還宫澍雨大降六月大水大風雨雹京師及郡國凡四十秋七月太白入北斗冬任尚與先零羌滇零戰大敗詔遣謁者龎參字仲逹緱氏人督諸軍屯鄧隲使任尚與滇零等戰于平襄漢縣為隴西郡治故城在今甘肅鞏昌府通渭縣尚軍大敗羌衆遂大盛朝廷不能制湟中粟石萬錢死亡不可勝數而轉運難劇故左校令官名掌工工屬将作大匠龎參先坐法輸作若盧使其子俊上書曰萬里運糧以就羌戎不若總兵養衆以待其疲鄧隲宜且振旅留任尚使督凉州士民轉居三輔休徭役以助其時止煩賦以益其財令男得耕種女得織絍然後蓄精鋭乗懈沮出其不意攻其不備則邊民之讐報奔北之恥雪矣書奏㑹樊準上疏薦參太后即擢參于徒中召拜謁者使西督三輔諸軍屯滇零僭稱天子招集諸雜羌斷隴道冦鈔三輔南入益中殺漢中太守董炳梁懂受詔當屯金城聞賊冦三輔即引兵赴擊連破走之羌稍退㪚徴鄧隲為大将軍詔鄧隲還京師任尚留屯漢陽隲拜為大将軍既至使大鴻臚親迎中常侍郊勞王主以下候望于道寵靈顯赫光震都鄙地震郡國凡十二己酉三年春正月帝冠京師大饑民相食司徒恭罷恭再在公位選辟髙第胡三省注此謂公府掾屬至列卿郡守而門下耆生或不䝉舉薦有怨望者恭聞之曰學之不講是吾憂也諸生不有鄉舉者乎章懷注言自有鄉里之舉何待三公之辟終無所言亦不借之議論夏四月令吏民入錢穀拜爵有差以國用不足從三公之請也得為闗内侯虎賁羽林郎五官大夫各有差冬十月南匈奴反通鑑係于六月今依范書帝紀十二月地震郡國凡九有星孛于天苑天苑十六星在􅄧畢南雨水并凉大饑人相食庚戌四年春正月元㑹徹樂不陳充庭車以年飢故不令陳列遣御史中丞王宗青州刺史法雄字文彊扶風郿人齊襄王法章之後秦滅齊子孫不敢稱田姓故以法為氏後徙三輔討海賊張伯路先是海賊張伯路等冦濵海九郡事在三年遣侍御史龎雄督州郡兵擊之伯路等乞降尋復屯聚黨衆浸盛至是詔遣御史中丞王宗持節發幽冀諸郡兵合數萬人徴法雄為青州刺史并力討之宗雄與伯路連戰破走之㑹赦到賊以為軍解甲不敢降議者皆以為當遂擊之雄曰不然兵凶器戰危事勇不可恃勝不可必賊若乘船入島攻之未易也及有赦令可且罷兵以慰誘其心勢必解哉然後圖之可不戰而定也宗善其言即罷兵賊乃還所掠人而東萊郡兵獨未解甲賊復驚走海島上已乏食東掠明年雄破斬之詔以凉州牧守子弟為郎龎參説鄧隲徙邊郡不能自存者入居三輔隲然之欲棄凉州并力北邊乃㑹公卿集議隲曰譬若衣敗瓌一以相補猶有所完若不如此将兩無所保郎中虞詡字升卿陳國武平人言于太尉張禹詡曰大将軍之䇿不可者三先帝開拓土宇劬勞後定今憚小費舉而棄之一也凉州既棄即以三輔為塞園林單外二也諺曰闗西出将闗東出相烈士武臣多出凉州士風壮猛便習兵事今羌胡所以不敢入據三輔為心腹之害者以凉州在後故也凉州士風所以推鋒執鋭父死子戰無反顧之心者為臣屬于漢故也今割而棄之民庶安土重遷必引領而怨曰中國棄我于戎狄若卒然起謀因天下林之饑敝驅氐羌以為前鋒席卷而東則函谷以西園舊京非復漢有三也議者喻以補衣猶有所完詡恐其疽食浸滛而無限極也禹曰㣲子之言幾敗國事詡因説禹網羅凉上豪傑引其牧守子弟于朝外以勸厲答其功勤内以拘致防其邪計禹善其言乃更集四府皆從詡議于是辟西川豪傑為掾屬拜牧守長吏子弟為郎以慰安之以虞詡為朝歌長討縣境郡盗平之鄧隲以前議惡詡欲以法中之㑹朝歌賊數千人攻殺長吏屯聚連年州郡不能禁乃以詡為朝歌長故舊皆弔之詡笑曰事不避難臣之職也不遇盤根錯節無以别利器此乃吾立功之秋也始到謁河内太守馬稜扶風茂陵人援之族孫稜曰君儒者當謀謨廟堂乃在朝歌甚為君憂之詡曰此賊犬羊相聚以求温飽耳願明府不以為憂稜問其所以詡曰朝歌背太行臨黄河去敖倉不過百里而青冀之民流亡萬數而賊不知開倉招衆刼庫兵収成臯斷天下右臂此不足憂也今其衆新盛難與爭鋒兵不厭權願寛假轡䇿勿令有所拘閡而已詡到官設三科以募求壯士自掾吏以下各舉所知攻擊者為上傷人偷盗者次之不事家業者為下収得百餘人貰其罪使入賊中誘令刦掠乃伏兵以待之殺數百人又潛遣貧人能縫者傭作賊衣以綵線縫其裾有出市里者吏輙擒之賊由是駭㪚縣境皆平三月南匈奴降初漢人韓琮隨南單于入朝既還説南單于云闗東水潦人民饑餓死盡可擊也單于信其言遂反詔以大司農何熙行車騎将軍事中郎将龎雄為副将五營及邊郡兵二萬餘人又詔遼東太守耿夔率鮮卑及諸郡兵共擊之以梁懂行度遼将軍事懂等屢破匈奴兵連營稍前單于恐怖顧讓韓琮曰汝言漢人死盡今是何等人也乃遣使乞降許之先零羌冦漢中太守鄭勤戰死滇零遣兵冦褒中注見前漢中太守鄭勤欲擊之主簿叚崇諫不聼出戰大敗叚崇與門下史王宗原展以身扞办與勤俱死地震郡國凡九夏蝗司𨽻豫兖徐青冀六州秋七月大水凡三郡九月地震益州郡太后母新野君卒新野君病太后幸其第連日宿止三公上表固爭乃還宫及薨使司空䕶喪事儀比東海恭王鄧隲等乞身行服太后欲不許曹大家勸后許之辛亥五年春正月庚辰朔日食地震郡國凡十羌冦河内三月詔徙縁邊郡縣遣侍御史任尚擊羌破之羌冦河東至河内百姓多南奔渡河使北軍中侯掌監屯騎越騎步兵長水射聲五營朱寵将五營士屯孟津詔魏郡趙國常山中山繕作塢候六百一十六所羌既轉盛而緣邊二千石令長多内郡人並無戰守意皆爭上徙郡縣以避冦難詔並從之隴西自狄道徙襄武安定自臨涇徙美陽北地自冨平徙池陽上郡自膚施徙治衙臨涇漢縣今日鎮原屬平凉府富平漢縣故城在寕夏府靈州今西安府富平縣三國魏徙置衙即春秋彭衙漢于此置縣餘注俱見前百姓戀土不樂去舊遂刈其禾稼發撤屋室夷營壘破積聚時連旱蝗饑荒而驅蹙刦掠流離分㪚隨道死亡或棄捐老弱或為人僕妾喪其大半時任尚坐無功徴免詔復以為侍御史擊羌于上黨羊頭山在今潞安府長子縣東南破之乃罷孟津屯漢陽賊杜季貢冦陷上邽漢縣注見前漢陽人杜琦及弟季貢同郡王信等與羌通謀聚衆據上邽城琦自稱安漢将軍漢陽太守趙博遣客杜習刺殺琦明年侍御史唐信討信斬之季貢亡從滇零是嵗滇零死子零昌立以季貢為将軍季貢别據丁奚城丁奚城在今寧夏府靈州蝗九州雨水郡國八壬子六年春正月省薦新物二十三種詔曰凡供薦新味多非其節或鬱養彊孰或穿掘萌芽味無所至而夭折生長豈所以順時育物乎自今皆須時乃上凡所省二十三種三月蝗凡十州詔封建武功臣夏五月旱六月豫章員谿原山章懐注闕崩癸丑七年春正月太后率大臣命婦謁宗廟二月地震郡國十八夏四月丙申晦日食秋蝗甲寅元初元年春二月日南地坼長百八十二里廣五十六里三月癸酉日食夏旱蝗京師及郡國五六月河東地陷羌豪號多掠漢中校尉侯覇與戰破之羌豪號多與諸種鈔掠武都漢中巴郡板楯蠻後漢書南蠻𫝊髙祖為漢王發夷人以定三秦復其渠帥七姓不輸租賦世號板楯蠻夷葢挾板楯而戰因以為名救之漢中五官掾程信率郡兵與蠻共擊破號多號多走還斷隴道與零昌合侯覇馬賢與戰于枹䍐大破之明年侯覇病卒龎參代為校尉以恩信招誘諸羌號多等帥衆降參始自張掖還治令居通河西道冬十月戊子朔日食十一月地震郡國凡十五乙夘二年春零昌冦益州遣中郎将尹就討之零昌種衆復分冦益州遣尹就将南陽兵並發益部諸郡屯兵撃零昌黨吕叔都等蜀人陳省羅横應募刺殺叔都皆封侯賜錢夏四月立貴人閻氏為皇后后母鄧𢎞妻之同産也故得立后性妬忌後宫李氏生皇子保后鴆殺李氏五月旱蝗京師及郡國凡十九秋九月壬午晦日食校尉班雄超之子等撃零昌大敗遣中郎将任尚屯三輔詔班雄屯三輔司馬鈞督闗中兵龎參将羌胡兵分道並撃零昌參兵至勇士後漢縣故城在今蘭州府金縣東為杜季貢所敗引退鈞等獨進攻㧞丁奚城季貢率衆偽逃鈞令右扶風仲光等収羌禾稼光等違鈞節度㪚兵深入羌設伏要擊之光等兵敗並沒鈞遁還龎參既失期稱病引還皆坐徵下獄鈞自殺詔以中郎将任尚代班雄屯三輔虞詡説尚曰兵法弱不攻彊走不遂飛自然之勢也今虜皆馬騎日行數百里來如風雨去如絶絃以步追之勢不相及所以雖屯兵二十餘萬曠日而無功也為使君計莫如罷諸郡兵各令出錢數千二十人共市一馬以萬騎之衆逐數千之虜追尾掩截其道自窮便民利事大功立矣尚即上言用其計遣輕騎撃杜季貢于丁奚城破之明言度遼将軍鄧遵率南單于擊零昌于靈州任尚又遣兵擊羌于丁奚城並破之以虞詡為武都太守擊羌破之太后聞虞詡有将帥之略以為武都太守羌衆數千遮詡于陳倉崤谷胡三省注此崤谷即在陳倉大散鳳闗非𢎞農崤谷也大散闗在今翔府寳雞縣西南詡即停車不進乃宣言上書請兵須到當發羌聞之乃分鈔旁縣詡因其兵㪚日夜進道兼行百餘里令吏士各作兩竈日増倍之羌不敢逼或問詡曰孫臏減竈而君増之兵法日行不過三十里以戒不虞而今日且二百里何也詡曰虜衆多吾兵少徐行則易為所及速進則彼所不測虜見吾竈日増必謂郡兵來迎衆多行速必惮追我孫臏見弱吾今示强勢有不同故也既到郡兵不滿三千而羌衆萬餘攻圍赤亭在今甘肅階州成縣西南數十日詡設竒掩擊詡令軍中强弩勿發而潛發小弩羌以為矢力弱不能至并兵急攻詡于是使二十强弩共射一人發無不中羌大震退詡因出城奮擊多所傷殺明日悉陳其兵衆令從東郭門出北郭門入貿易衣服囘轉數周羌不知其數更相恐動詡計賊當退乃遣五百餘人于淺水設伏候其走路虜果大犇連破之斬獲甚衆賊由是敗㪚詡乃占相地勢築營壘百八十所招還流亡假賑貧民開通水運始到郡穀石千盐石八千見户萬三千視事三年米石八十盐石四百民増至四萬餘户人足家給一郡遂安冬十一月地震郡國凡十丙辰三年春地震郡國凡十三月辛亥日食夏四月京師旱初聽大臣行三年喪舊制公卿二千石刺史不得行三年喪司徒劉愷以為非所以師表百姓宣美風俗乃詔聽大臣行三年喪地震郡國凡九丁巳四年春二月乙巳朔日食武庫灾夏四月䇿免司空袁敞字叔平安之子敞自殺敞亷勁不阿權貴失鄧氏㫖尚書郎張俊有私書與敞子怨家封上之敞坐䇿免自殺俊等下獄當死俊上書自訟臨刑太后詔以減死論五月以李郃字孟節漢中南鄭人為司空郃初為郡户曹時竇憲納妻郡國皆有禮慶漢中亦當遣吏郃謂太守曰竇将軍椒房之親不修徳禮而專權驕恣危亡可翹足而待願明府一心王室勿與交通太守固遣之郃不能止因請自行許之郃遂所在遲行至扶風而憲敗凡交通者皆坐免官漢中太守獨不與尋辟孝亷屢遷至太常及是代袁敞為司空數陳得失有大臣節居位四年免延光末復為司徒六月雨雹凡三郡秋七月雨水郡國凡十任尚募羌殺零昌先是任尚遣兵撃零昌殺其妻子又遣羌榆鬼等刺殺杜季貢詔封榆鬼破羌侯至是尚募効功種羌號封刺殺零昌封號封為羌王尚復将兵與馬賢並進北地擊狼莫零昌謀主大破之于是西河䖍人種羌萬人詣鄧遵降隴右平地震郡國凡十三戊午五年春旱京師及郡國凡五秋八月丙申朔日食鄧遵募羌殺狼莫封遵為武陽鄧騭𫝊作舞陽侯徴任尚棄市自羌叛十餘年間軍族之費凡用二百四十餘億死者不可勝數并凉二州遂至虚耗及零昌狼莫死諸羌瓦解三輔益州無復冦警詔封鄧遵為武陽侯遵以太后從弟故爵封優大任尚與遵争功檻車徵棄市地震郡國凡十四己未六年春二月地震京師及郡國凡四十二夏四月大風雨雹沛國渤海五月京師旱冬十二月戊午朔日食既地震郡國凡八益州夷降初越嶲夷封離等反永昌益州蜀郡夷皆叛應封離衆至十餘萬破壊二十餘縣殺長吏焚掠百姓益州刺史張喬遣從事楊竦将兵進撃大破之封離等乞降竦厚加慰納其餘三十六種皆來降附竦因奏長吏姦猾侵犯蠻夷者九十人皆減死論庚申永寧元年春三月北匈奴車師後王共殺漢吏詔復置都䕶屯兵初西域諸國既絶于漢北匈奴復以兵威役屬之與共為邉冦敦煌太守曹宗患之乃上遣行長史上謂上奏遣行長史之事也索班将千餘人屯伊吾以招撫之于是車師前王及鄯善王復來降至是北匈奴率車師後王軍就共殺索班擊走前王畧有北道曹宗請出兵擊匈奴以報之因復取西域公卿多以為宜閉玉門闗太后聞軍司馬班勇字宜僚超之子有父風召問之勇上議曰昔孝武皇帝開通西域論者以為奪匈奴府藏㫁其右臂光武中興未逞外事故匈奴驅率諸國河西城門晝閉孝明皇帝深維廟䇿命将出征然後匈奴逺遁邊境得安間者羌亂西域復絶北虜遂遣責諸國備其逋租髙其價儘嚴以期㑹鄯善車師皆懐憤怨思樂事漢其路無從然今曹宗徒欲報雪匈奴而不尋出兵故事要功荒外萬無一成兵連禍結悔無所及况今府車未充師無後繼臣愚以為不可許也宜于敦煌復置營兵三百人及䕶西域副校尉遣長史将五百人屯樓蘭西當焉耆龜兹徑路南彊鄯善于寘心膽北扞匈奴東近敦煌既為胡虜節度又禁漢人侵擾如此誠便公卿難曰前所以棄西域者以其無益而難供也令欲通之班将能保北虜不為邊害乎勇對曰今置州牧以禁盗賊若州牧能保盗賊不起者且亦願以腰斬保匈奴之不為邊害也今通西域則虜勢必弱為害微矣孰與歸其府藏續其㫁臂哉若棄而不立則西域望絶屈就北虜恐河西域門必将復有晝閉之儆矣今不廓開朝廷之徳而拘屯戍之費豈安邊乆長之䇿哉難者又曰西域遣使求索無厭一旦為匈奴所迫當復求救則為役大矣勇曰設以西域歸匈奴而使其恩徳大漢不為鈔盗則可矣如其不然則是富仇讐之財増暴夷之勢且西域來者不過稟食今若拒絶勢歸北虜夷虜并力以冦并凉則中國之費不止十億置之誠便于是從勇議復營兵置副校尉居敦煌雖以覊糜西域然亦未能出屯其後匈奴果數與車師入冦西河大被其害夏四月立太子保為皇太子秋七月乙酉朔日食大水郡國凡三十三冬十二月以楊震字伯起𢎞農華隂人為司徒震孤貧好學通逹博覽諸儒為之語曰闗西孔子楊伯起教授二十餘年不答州郡禮命衆人謂之晚暮而震志愈篤有冠雀銜三鱣魚飛集講堂前都講取魚進曰蛇鱣者卿大夫服之象也數三者法三台也先生自此升矣鄧隲聞其賢而辟之時震年已五十餘累遷荆州刺史東萊太守當之郡道經昌邑故所舉荆州茂才王宻為令夜懐金遺震震曰故人知君君不知故人何也宻曰暮夜無知者震曰天知地知我知子知何謂無知者宻愧而出已徵入為太常至是代劉愷為司徒震性公亷子孫長疏食歩行故舊或欲令為産業震曰使後世稱為清白吏子孫以此遺之不亦厚乎地震郡國凡三十三免越騎校尉鄧康官遣就國康紹封夷安侯太后從兄康以太后乆臨朝政宗門盛滿數上書諫言甚切至太后不從康謝病不朝太后使内侍者問之時宫婢出入其耆宿者皆稱中大人所使乃康家先婢亦自道中大人康怒詬之婢恚怒還白康詐疾而言不遜太后大怒免康官遣歸國絶屬籍辛酉建光元年春三月皇太后鄧氏崩諡和熹合葬慎陵封鄧隲為上蔡侯太后自臨朝以來水旱十載四夷外侵盗賊内起每聞民饑或逹旦不寐躬自減撤以救災戹故天下復平嵗仍豐穰太后嘗徵濟北河間王子男女五嵗以上四十餘人及鄧氏近親子孫三十餘人為開邸第教以經書躬自監試詔從兄豹康等曰末世貴戚食禄之家温衣羙食乘堅驅良而面墻弗學不識臧否斯故禍敗所從來也然帝已年長乆不還政郎中杜根嘗上書言之太后大怒盛以縑囊撲殺之載出城外得蘇逃竄為宜城山中酒家保積十五年平原成翊世亦坐諫太后不歸政抵罪至是尚書陳忠薦之帝拜根侍御史翊世尚書郎吏杜根字伯堅潁川定陵人成翊世字季明平原郡陳忠字伯始寵之子宜城漢縣今屬湖北襄陽府追尊清河孝王曰孝徳皇妣曰孝徳后祖妣宋貴人曰敬隠后初長樂太僕蔡倫受竇后諷㫖誣陥宋貴人帝敕使自致廷尉倫飲藥死髙句麗鮮卑冦遼東太守蔡諷戰殁功曹掾龍端兵馬掾公孫酺以身扞諷俱殁于陳尊母耿姬為甘陵後漢縣為清河孝王陵邑晉以後廣故城在今直𨽻廣平府清河縣大貴人詔舉有道之士尚書陳忠以詔書既開諫争慮言事者必多激切致不能容乃上疏豫廣帝意畧曰臣聞仁君廣山藪之度納切直之謀忠臣盡蹇諤之節不畏逆耳之害今明詔引咎克躬諮訪羣吏言者見杜根成翊世等新蒙表録顯列二䑓必承風響應争為切直嘉謨異䇿宜輙納用如其管穴妄有譏刺雖苦口逆耳不得事實且優㳺寛容以示聖朝無諱之羙大管穴謂言事者所見不遠而言或妄誕也書御道也有詔拜有道髙第士沛國施延字君子蘄人為侍中以薛包字孟嘗汝南人為侍中不拜初汝南薛包少有至行父娶後妻而憎包分出之包日夜號泣不忍去至被毆撲不得已廬于外旦入灑掃父怒又逐之乃廬于里門昏晨不廢積嵗餘父母慙而還之及父母亡弟子求分財異居包不能止乃中分其財奴婢引其老者田廬取其荒頓者器物取其朽敗者弟子數破其産輙復賑給帝聞其名令公車特徵至拜侍中包以死自乞有詔賜告歸加禮如毛義徙封鄧隲為羅漢縣枚城在今湖南長沙府湘隂縣侯遣就國隲自殺貶平原王翼為都鄉侯帝少號聰明故鄧太后立之及長多不徳稍不可太后意太后徵濟北河間王子語京師以河間王子翼為平原懷王勝後留京師帝乳母王聖慮有廢置常與中黄門李江京侯伺左右共毁短太后帝每忿懼及太后崩宫人有誣告太后兄弟悝𢎞閭謀立平原王帝怒令有司奏悝等大逆無道遂廢其子西平侯廣宗等為庶人隲以不與謀徒封羅侯遣就國宗族免官歸故郡没入貲産廣宗等皆自殺隲與子鳯皆不食而死徵鄧康為太僕貶平原翼為都鄉侯遣歸河間翼謝絶賔客閉門自守由是得免初鄧封之立也三公欲共奏追封后父訓司空陳寵以無故事不從故寵子忠不得志于鄧氏數上疏陷成其惡大司農朱寵痛騭無罪乃肉􅃝與櫬上疏言和熹皇后聖善之徳為漢文母兄弟忠孝同心􅁨國功成身退攘國遜位歴世外戚無與為此而利口傾陥反亂國家遂令隲等羅此酷濫逆天惑人率土喪氣宜収還冢次寵樹遺孤奉承血祀以謝亡靈因自致廷尉忠復劾寵免官衆庶多為隲稱枉者帝意頗悟乃還葬隲等從昆弟皆得歸京師朱寵字仲威杜陵人以耿寶耿貴人兄監羽林車騎封宋楊宋貴人父四子及宦者江京李閏皆為列侯帝以耿貴人兄寶監羽林車騎宋氏封侯為卿校侍中者十餘人閻氏兄弟顯景耀並典禁兵江京李閏皆封列侯與中常侍樊豐劉安陳逹及乳母王聖聖女伯榮扇動内外競為侈虐出入宫掖𫝊通姦賂司徒楊震上疏曰臣聞政以得賢為本治以去穢為務方今九徳未事嬖倖充庭王聖㣲賤奉養聖躬雖有推燥居濕之勤前後賞惠過報勞苦而外交屬託損辱清朝宜速出阿母令居外舍㫁絶伯榮莫使往來令恩徳兩隆上下俱羙奏御帝以示聖等内倖皆懐忿恚伯榮驕淫尢甚通于故朝陽侯劉䕶從兄瓌瓌遂以為妻官至侍中得襲䕶爵震復上疏曰經制父死子繼兄亡弟及以防簒也故朝陽侯劉䕶同産之威今猶見在而以其再從瓌瓌襲爵為侯且天子專封封有功諸侯專爵爵有徳瓌無他功行但以配阿母女既位侍中又至封侯不稽舊制不合經義陛下宜鑒既往順帝之則尚書翟酺上疏曰告寳鄧之寵傾動四方兼官重紱盈金積貨及其破壞頭顙墮地願為孤豚豈可得哉夫致貴無漸失必暴受爵非道殃必疚今外戚寵幸未有寧比禄去公室政移私門覆車重尋寧無摧折昔文帝躬行節儉有譏之者帝曰朕為天下守財耳豈得妄用之哉今欽天下之財積無功之家帑蔵單盡民物彫傷卒有不虞危亂可待願陛下勉求忠貞誅遠佞諂割情欲罷私宴心存仕國所以失之鑒觀興王所以得之庶災害可人息豐年可招矣書奏皆不省翟酺字子超廣漢雒秋八月燒當羌麻奴入冦馬賢追撃破之燒當羌忍良等以麻奴兄弟本燒當世嫡而校尉馬賢撫䘏不至常有怨心遂冦湟中攻金城諸縣賢将先零種擊之不利麻奴等又敗武威張掖郡兵于令居因冠武威賢追到鸞鳥後漢縣故城在今甘肅凉州府武威縣招之諸衆降者數千麻奴南還湟中明年賢至湟中麻奴出塞渡河種衆散遁麻奴等孤弱饑困将種衆三千餘户請漢陽太守耿种降以劉愷為太尉居延都尉范邠犯􅂍罪吏議欲増錮二世章懐注謂父子俱禁錮劉愷以為春秋之意善善及子孫惡惡止其身所以進人于善也以輕從重懼及罪人非先王祥刑之意詔從之鮮卑冦居庸闗在今順天府昌平州淮南子天下九塞之一殺雲中太守鮮卑冦居庸闗雲中太守成嚴擊之兵敗功曹楊穆以身捍嚴與俱戰殁鮮卑既攻殺郡守膽氣轉盛控弦萬騎明年復冦雁門定襄遂攻太原掠殺百姓帝幸衛尉馮石府留飲十日賞賜甚厚拜其子世為黃門侍郎世弟二人皆為郎中石陽邑侯魴之孫父柱尚顯宗女獲嘉公主石襲爵為獲嘉侯能取悦當世故為帝所寵雨水郡國凡二十七冬十一月地震郡國凡三十五復斷大臣行三年喪尚書令祋丁外反姓也諷等奏孝文定約禮之制光武絶告寧李斐曰休謁之名吉言告凶曰寕之典貽則萬世誠不可改宜復大臣行三年喪從之尚書陳忠上疏曰髙祖創制大臣有寕告之科建武之初政趨簡易禮義之方實為彫損孟子曰老吾老以及人之老㓜吾㓜以及人之㓜天下可隨于掌臣故陛下登島北望以甘陵之思揆度臣子之心則海内咸得其所時宦官不便之竟寝忠奏御批歴代通鑑輯覽卷二十三

front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷八十一宋徽宗皇帝己亥宣和元年春正月詔更寺院為宫觀
  hash: sha256:9de20d28cacec07e8c6823e54c90477321a4183669f2c817cb795e8a40699b75

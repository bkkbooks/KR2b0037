front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷四十一南北朝辛齊和帝寶融中興巳元年魏明帝二年春正月齊南康王寶融稱相國蕭衍發襄陽
  hash: sha256:187cbd18fde4c8b88f47d5aa5c5c719f44aac8eaec53b6624deda079143f2b98

body:
  text: 元太尉納克楚擁衆數十餘萬屯金山明史地理志遼東三萬衛西北有金山方輿紀要山東南距衛三百五十里考明三萬衛今為奉天府開原縣金山蓋在縣邊門外數侵遼東帝以勝為大將軍傅友德藍玉為副帥師二十萬征之諭曰納克楚詭詐爾等且駐師通州先遣人覘其出沒彼若在慶州遼置後廢故城在今巴林西北宜以輕騎掩其不備慶州既克全師徑搗金山出彼不意必成擒矣復遣前所獲之元將鼐喇固舊作乃剌吾今改後仿此北還以書諭納克楚等既而勝至通州聞敵騎有屯慶州者藍玉乘大雪帥輕騎襲破之斬平章郭勒舊作果來今改擒其子布喇竒勝出松亭關築大寧寬河會州富峪四城方輿紀要自喜峯口而北一百二十里有故松亭關遼金戍守處也其相近者曰寬河城自是而東北曰會州城由會州而東曰富峪城又東北為大寧新城俱洪武時築駐兵大寧焚錦衣衛刑具時天下重罪逮至京者多收繫錦衣衛斷治適有富民繫衛獄用事者非法凌虐帝聞之怒曰訊鞫法司事也或令錦衣衛審之欲先得其情耳豈令其鍛鍊邪執用事者治之悉焚其刑具以囚送刑部既而復申明其禁詔內外獄毋得上錦衣衛大小咸經三法司事在二十六年夏六月馮勝至金山納克楚降勝自大寧帥師趨金山遣使送鼐喇固還至松花河即松花江注見前納克楚見之大驚相勞問鼐喇固述帝恩德納克楚心動遣左丞劉特默齊舊作劉探馬赤今改等來獻馬勝受之而引兵徑踰金山降全國公和通舊作觀童今改後仿此進壓納克楚營而軍初納克椘分兵為三營一曰榆林深處一曰養鵝莊一曰龍安伊圖河流龍安即金隆安府注見前伊圖河在龍安城東下入松花江按伊圖河舊作一秃河今改畜牧蕃盛及是為大軍所逼又已先入鼐喇固言意猶豫不決因遣使陽為請降以覘兵勢勝遣藍玉往受之納克楚所遣使亦還報極言大將軍兵盛納克楚乃仰天歎曰天弗使吾有此衆矣遂率數百騎詣玉玉大喜飲以酒納克楚酌酒酬玉玉解衣衣之納克楚不肯服玉亦不飲爭讓久之納克楚取酒澆地顧其下咄咄語鄭國公常茂在坐其麾下有解蒙古語者密告茂納克楚將遁矣茂直前搏之納克楚驚起欲就馬茂拔刀斫傷其臂不得騎都督耿忠擁以見勝勝重禮之使忠與同寢食納克楚將士妻子十餘萬衆在松花河北聞納克楚傷驚潰有欲來追者勝遣和通諭降之先後凡二十餘萬人所獲輜重馬畜亘百餘里勝之趨金山也臨江侯陳鏞失道戰殁及師還都督濮英以兵三千殿後為潰卒所邀襲馬踣被執英絶食不言乘間引佩刀刺腹死初帝聞捷即馳諭勝留兵五萬于大寧防後患散處降衆瀋陽崖頭間與遼東兵參住耕牧而勝以常茂驚潰敵衆懼不測乃盡俘其衆內徙大寧兵亦悉拔歸時納克楚潰卒散匿者尚數萬聞之設伏于途謀竄取大軍過不敢發英後至猝為所乘三千人殲焉事聞詔追封英金山侯以米帛給鏞家納克楚至京帝召見慰勞甚至封海西侯鼐喇固亦授千戶賜金帛秋七月太白三辰晝見八月收馮勝大將軍印召還以藍玉攝軍事勝奏常茂激變狀茂勝女壻也其在軍以不得任偏禆將意邑邑不樂勝每誚責之茂應之慢勝益怒未有以發也會有納克楚事故多增飾其狀械繫至闕會有言勝多匿良馬使閽者行酒于納克楚妻求大珠異寶王子死二日強娶其女失降附心茂亦訐奏勝諸不法事且言勝無以自解故委罪于茂帝怒下詔切責勝收其大將軍印以藍玉代之尋命勝就第鳯陽奉朝請安置茂于龍州宋置元為萬户府明仍為州土官趙氏世襲今改下龍上龍二司屬廣西太平府九月置大寧都指揮使司司治大寧義置大寧中左右及會州等衛皆隸焉明年改為北平行都司詔商稅無定額户部言天下稅課視舊有虧宜以洪武十八年所收為定額帝曰商稅多寡嵗有不同限以定額豈不病民不從以藍玉為大將軍帥師北伐帝以故元特古斯特穆爾尚在終為邊患乃即軍中拜玉為大將軍延安侯唐勝宗濠人武定侯郭英興之弟副將都督耿忠孫恪興祖之子為左右參將明初設無品級亦無定員多以勳戚充之其後秩在副總兵下逰擊次之率師十五萬往征之是冬元將托克托等降于王冬十一月命湯和築瀕海城防倭先是帝以倭患命和巡視浙江福建沿海諸城事在十七年既而又命江夏侯周德興于福建濵海四郡福漳泉興化四府築城練兵以備之德興往四郡相視形勢築城十有六民户三丁取一以充戍卒事在是年四月至是和已請老會倭冦上海元縣今屬松江府帝召和謂曰卿雖老強為朕一行和請與方鳴謙俱鳴謙國珍從子也習海事帝訪以禦倭䇿鳴謙曰倭海上來則海上禦之耳請量地逺近置衛所陸聚步兵水具戰艦寨壘錯置其間則倭不得入入亦不得傅岸其兵則籍近海民四丁取一以充無煩客兵也帝以為然命和董其事和乃度地淅東西置衛所並海築城五十有九選壯丁五萬八千餘人戍之始和選壯丁三萬五千人築城盡發州縣錢及籍罪人資給役役夫往往過望而民不能無擾浙人頗苦之或謂和曰民讟矣奈何和曰成逺算者不恤近怨任大事者不顧細謹國無備及于戈鋋井里將墟餘何有焉復有讟者齒吾劍踰年而城成海防大飭其後嘉靖間東南苦倭患和所築城堅緻久而不圮民多賴以相保咸歌思之請于朝立廟祀焉戊辰二十一年春正月詔治有司匿災者罪青州飢有司匿不以聞詔逮治之且著為令三月沐英討思倫發破走之先是思倫發誘羣蠻冦馬龍他郎甸今雲南元江府新平縣西北有故新花州舊為馬龍他郎二甸地明并為州今裁之摩沙勒寨名在故新化州東南其地羣山夾江險隘如峽沐英遣將擊敗之至是思倫發悉舉其衆復冦定邊明縣屬楚雄府今併入蒙化府置巡司于此號三十萬英選騎三萬馳救置火炮徑弩為三行蠻驅百象被甲翼以標鎗鋭甚英分軍為三都督馮誠居前都督同知寧正左湯昭右英與將士約有功者賞退衄者斬因乘風大呼炮弩並發象皆反走賊殊死鬬左軍少却英登髙望之取佩刀命左右斬帥首來左帥見一人握刀馳下恐奮呼突陳大軍乘之無不一當百蠻大敗斬馘四萬餘生獲象三十七賊師各被百餘矢伏象背死思倫發遁去明年思倫發遣使入貢謝罪麓川平緬遂平夏四月藍玉襲破元特古斯特穆爾于捕魚兒海在今克什克騰西北周數十里獲其子迪保努舊作他保奴今改後仿此玉以大軍出大寧至慶州聞特古斯特穆爾在捕魚兒海遂間道馳進至百眼井不見敵玉欲還定逺侯王弼曰吾等提十萬衆深入至此無所得何以復命玉曰然令軍士穴地而㸑毋使見煙火乘夜馳至捕魚兒海黎明去敵營八十餘里時大風揚沙晝晦軍行無知者敵不設備弼為先鋒大破之斬太尉曼濟等降其衆特古斯特穆爾以其太子添保努舊作天保奴今改後仿此等數十騎遁獲其次子迪保努及妃主以下百餘人官屬三千男女七萬馬牛駝羊十五萬奏捷京師帝大悅遣使齎敕勞玉比之衛青李靖云迪保努及妃主至京帝命有司給第宅廩餼既有言玉私元主妃事帝怒玉無禮切貴玉妃聞而自縊迪保努由是有怨言帝聞之曰朕嘗與儒臣議欲封之以盡待亡國之禮迪保努乃若是豈可使復居內地于是遣使送往琉球仍厚資遣之時元四大王久匿山中其下逃散略盡四大王窮蹙詣晉王府降帝命徙之雲南是年納克楚亦卒以其子察罕為瀋陽侯後坐藍黨死髙麗李成桂囚其王禑而立禑之子昌禑欲冦遼東使成桂繕兵成桂遣兵屯艾州以糧不繼而退禑怒殺成桂之子成桂還兵攻之囚逼使遜位于其子昌既而又以禑本辛肫子禑之子亦不可為王氏後乃廢昌别求王氏疏屬定昌國院君瑶立之事在二十二年五月甲戌朔日食六月信國公湯和歸鳯陽帝春秋寖髙不欲諸將久典兵未有以發也和以間從容乞骸骨帝大悅賜鈔治第鳯陽並為諸公侯治第至是第成和築城海上還率妻子陛辭帝褒諭之賜賚甚厚秋七月以解縉字大紳吉水人為監察御史縉為中書庶吉士甚見愛重一日帝在大庖西室諭縉曰朕與爾義則君臣恩猶父子當知無不言縉即上封事萬言略曰臣聞令數改則民疑刑太繁則民玩國初至今將三十載無幾時不變之法無一日無過之人臣聞陛下鋤根剪蔓誅其姦逆矣未聞褒一大善賞延于世始終勿替者也或朝賞而暮戮或忽罪而忽赦陛下每多自悔之時輒有無及之嘆是非私意使然存養之功少加密耳若夫祀天宜復掃地之規尊祖宜備七廟之制奉天不宜為筵宴之所文淵猶未備館閣之隆太常非俗樂可肄官妓非人道所為禁絶倡優易置寺閹執戟墀陛皆用俊良勿興土木之工勿貪四裔之地減細縣省冗官痛懲法外威刑永革禁城工役婦女非帷簿不修母令逮繫大臣有過惡當誅不宜加辱近嵗臺綱不肅以刑名輕重為能事以問囚多寡為勳勞御史糾彈皆承密旨每聞上有赦宥則必過為執持意謂如此則上恩愈重此皆小人趨媚效勞之細術陛下何不肝膽而鏡照之哉陛下進人不擇賢否授職不量輕重椎埋嚚悍之夫闒茸下愚之輩朝捐刀鑷暮雍冠裳左棄筐篋右綰組符雖日立賢無方亦盍忱詢有德古者善惡鄉鄰必記今互知之法雖嚴而訓告之方未備臣欲求古人治家睦鄰之法若古藍田吕氏鄉約今義門鄭氏家範布之天下世臣大族率先以勸將見作新於變至子比屋可封不難矣臣聞地有盛哀物有盈虛而商稅之徴專皆定額既稅于所産之地又稅于所過之津何奪民之利如此密也且多貧下之家不免拋膏荒之咎無前日之生植有前日之稅糧或腴而稅反輕瘠鹵而稅反重此里胥之弊也或拯困而革弊莫若行授田均田之法兼常平義倉之舉積之以漸至有九年之食無難者夫連坐起于秦法孥戮本于偽書今為善者妻子未必蒙榮有過者里胥以陷其罪况律以人倫為重而有給配婦女之條聼之于不義則又何取夫節義哉同寅協恭相倡以禮今內外百司捶楚屬官甚于奴𨽻是使柔懦之徒蕩無亷恥甚非所以勵風節也臣但知罄竭愚衷急于陳獻所奏略無次序惟陛下垂鑒書奏帝稱其才尋改為御史縉未授御史時嘗入兵部堂索皂𨽻語嫚尚書沈溍以聞帝曰縉以沉自恣遂命為御史既而縉復代郎中王國用草疏為李善長申雪又嘗為同官夏長文草疏劾都御史袁泰于是大臣皆惡之會有詔近臣父皆得入覲縉父開至帝召謂曰大器晚成若以而子歸益令進學後十年來用未晚也遂罷歸九月勑天下衛所屯田嵗得糧五百餘萬石越州本苦麻蠻部元時內屬因置越州明改衛今裁故城在曲靖府南寧縣苦麻元史作普麼今依明史土司傳蠻叛命沐英傅友德討之越州土酋阿資故知州龍海子也沐英南征時駐兵其地諭降龍海奏以為知州未幾即叛英以計擒之徙遼東阿資襲父職益桀驁至是反帝命英友德會兵討之友德道過平彛以其山險峻留兵千人守之進擊阿資于普安大破之蠻衆攀崖緣壁墜死者不可勝數阿資遁還越州初阿資之叛也揚言曰國家有萬軍之勇我地有萬山之險豈能盡滅我輩英乃請置越州馬龍二衛距其險要又分兵勦捕阿資窮蹙遂請降平彛明衛今改縣屬曲靖府馬龍明初為衛後改州今州亦屬曲靖府以卓敬字惟恭瑞安人為户科給事中敬鯁直無所避時制度未備諸王服乘擬天子敬乘間言京師天下視效陛下于諸王不早辨等威而使服飾與太子埓嫡庶相亂尊卑無序何以令天下帝笑曰爾言是朕未慮及此益器重之他日敬與同官進見適八十一人帝命改官為元士尋以六科為政事本源又改日源士巳復稱給事中冬十月元伊遜岱爾舊作也速迭兒今改弒其主特古斯特穆爾特古斯特穆爾既遁將依丞相耀珠舊作咬住今改于和林行至圖拉河為其下伊遜岱爾所襲衆遂散獨與十六騎俱耀珠來迎欲共往依庫庫特穆爾舊作濶濶帖木兒與前卷係兩人會大雪不得發伊遜岱爾兵猝至遂遇害并殺添保努自是不復紀年五傳至堒特穆爾被弒有郭勒齊者篡立稱汗去國號遂稱韃靼云郭按堒特穆爾舊作坤帖木兒勒齊舊作鬼力赤今並改十二月安南黎季犛廢其王煒尋弒之陳叔明立三嵗傳其弟煓煓死弟煒代立其相黎季犛竊柄廢煒殺之立叔明子曰焜主國事己巳二十二年春正月改大宗正院洪武初設為宗人府府設令一人左右宗正宗人各一人並以親王領之其後以勳戚大臣攝府事不備官二月禁武臣預民事湖廣千户夏得忠作亂靖寧侯葉升合肥人討之得忠伏誅得忠誘九溪即九渡溪在湖南澧州慈利縣西南水經注九渡水南出九渡山山下有溪亦以九渡為名洞蠻為冦升同胡海等討之潛兵出賊後掩擊擒得忠斬之置九溪永定二衛九溪故衛在州安福縣北永定故衛在安福縣西今俱廢夏五月置泰寧朵顔福餘三衛三衛之地本烏梁海舊作兀良哈按元史蘇布特傳稱為兀良哈氏即現今喀喇沁旗之以烏梁海為姓氏是也今一改正後文俱仿此所居在元時為大寧路迤北境洪武初元遼王惠寧王朵顔元帥府內附已數為韃靼所抄乃即其地置三衛曰泰寧今土默特阿嚕科爾沁等部為泰寧衛故地曰朵顔今喀喇沁漢奈曼翁牛特巴林等部及熱河五廳為朵顔衛故地曰福餘今科爾沁郭爾羅斯杜爾伯特札賚特等部為福餘故地俾部長各領其衆互為聲援獨朵顔地險而強秋九月丙寅朔日食冬十二月遷周王橚于雲南尋止之橚擅棄其國來居鳯陽帝怒命遷之雲南尋止勿徙使居京師至二十五年復敕歸藩庚午二十三年春正月命晉王棡燕王棣帥師北伐命傅友德等以北平兵從燕王王弼等以山西兵從晉王征耀珠及鼐爾布哈二月河決歸德決歸德東南鳯池口徑夏邑永城諸縣發十三衛士卒與歸德民并力築之及秋又決開封三月燕王棣至迤都山名舊作迤都今改元太尉鼐爾布哈等降棣出古北口偵知鼐爾布哈營迤都冒大雪馳進去敵一磧先遣指揮和通往和通故善鼐爾布哈至則相持泣頃之大軍壓其營鼐爾布哈及耀珠等驚欲遁和通止之引見棣賜酒食慰諭遣還鼐爾布哈喜過望遂偕耀珠等來降既而命元降軍赴北平聼燕王調用棣兵自此益強夏四月潭王梓自焚死梓英敏好學嘗會府僚設醴賦詩品其高下而賚豫之妃於氏都督顯女也顯與子琥坐胡惟庸黨誅梓不自安帝遣使召之大懼與其妃自焚死梓無子國除先是魯王楦薨檀善詩歌好餌金石藥毒發而死帝命禮臣議喪禮曰父子天性諡法公議朕不得以私恩廢公議特諡曰荒閏月詔期服不得奔喪初百官聞祖父母伯叔兄弟喪俱奔赴吏部言一人或連遭五六期服或道路數千則居官日少更易繁數曠官廢事莫此為甚請自今期年服不許奔喪從之五月以楊靖字仲寧山陽人為刑部尚書時詔在京官三年皆遷調著為令靖以戶部尚書改刑部帝諭曰愚民犯法如啖飲食嗜之不知止設法防之犯益衆惟推恕行仁或能感化靖承旨治獄明察而不事深文在部多所平反帝嘉納之靖嘗鞫一武辨門卒檢其身得大珠僚屬驚異靖徐曰偽也安有珠大如此者立碎之帝聞歎曰靖此舉有四善焉不獻朕以求容悅一也不究其所投獻息大獄二也不奬門卒杜小人僥幸三也千金之珠猝然至前斥以為偽而碎之有過人之智應變之才四也賜韓國公李善長死先是善長弟存義安置崇明善長不謝帝銜之至是善長年七十七耄不檢下嘗欲營第從信國公湯和假衛卒三百人和以聞四月京民有坐罪應徙邊者善長數請免其私親丁斌等帝怒按斌斌故給事胡惟庸家因言存義等往時交通惟庸狀命逮存義鞫之詞連善長于是御史交章劾善長坐以大逆會星變言者謂其占當移大臣遂賜善長死并殺其家屬七十餘人子祺尚臨安公主免死徙江浦吉安侯陸仲亨延安侯唐勝宗平涼侯費聚南雄侯趙庸河南侯陸聚宜春侯黃彬豫章侯胡美滎陽侯鄭遇春等皆同時坐惟庸黨死帝條列其罪作姦黨録布告天下既而虞部郎中王國用上言善長與陛下同心出萬死以取天下勳臣第一生封公死封王男尚公主親戚拜官人臣之分極矣藉令欲自圖不軌尚未可知而今謂其欲佐胡惟庸使善長佐惟庸事成不過勳臣第一而已寧復有加于今日且善長豈不知天下之不可幸取當元之季欲為此者何限莫不身為􅐽粉覆宗絶祀善長胡乃以衰倦之年身蹈之也凡為此者必有深讎急變大不得已或至相挾以求脫禍今善長子祺托陛下骨肉親無纖介嫌何苦而忽為此若謂天象告變大臣當災殺之以應天象則尤不可臣恐天下聞之謂功臣且如此四方因之解體也臣亦知善長已死言之無益願陛下作戒將來耳帝覽之亦不罪也秋七月崇明海門注俱見前海溢詔遣官賑之發民二十五萬築堤八月詔毋以吏卒充選舉九月庚寅朔日食冬十二月罷天下嵗織文綺辛未二十四年春三月戊子朔日食夏四月河決原武河水暴溢決原武黑洋山在縣北與陽武接界東經開封城北又東南由陳州項城隋縣今屬陳州府太和宋泰和縣明改泰為太今縣屬潁州府潁州潁上東至壽州正陽鎮在州西與潁上縣之西正陽夾淮相對亦名東正陽全入于淮而賈魯河故道遂淤又由曹州鄆城漫東平之安山注見前元會通河故道亦淤明年復決陽武汜陳州中牟等十一州縣詔發民丁及十七衛軍士修築河堤會其冬大寒役遂罷封子十人為王栴帝第十六子余妃出為慶王封寧夏權帝第十七子楊妃出寧王封大寧楩帝第十八子周妃出岷王封岷州尋徙雲南橞帝第十九子郭惠妃出谷王封宣府松帝第二十子周妃出韓王封開原模帝第二十一子趙妃出瀋王封潞州楹帝第二十二子安王封平涼桱帝第二十三子李賢妃出唐王封南陽棟帝第二十四子劉惠妃出郢王封安陸㰘帝第二十五子葛麗妃出伊王封洛陽秋八月命皇太子巡撫陜西帝念天下形勢在西北欲徙都關中先遣太子相宅故有是命秦王樉聞帝欲徙都有怨言帝怒召至京錮之及太子還始令歸藩冬十月以馮堅為僉都御史堅南豐縣典史上書言九事一曰養聖躬清心省事以為民社之福二曰擇老成輔導諸王使正色直言以圖匡救三曰務農講武屯戍邊圉以備不虞四曰精選有司旌别屬吏使人勇于自治五曰褒祀典俾末俗有所興勸六曰省宦寺以防內權七曰調易邊將以防外患八曰採廉能以懲貪墨九曰會關防以革姦弊書奏帝嘉之稱其知時務達事變又謂侍臣曰堅言調易邊將則未然邊將數易則兵力勇怯敵情出沒山川形勢無以備知倘得趙充國班超者又何以數易為哉乃擢堅僉都御史堅在院頗持大體尋卒于官十一月皇太子還京師太子還上陜西地圖遂病病中猶上言經略建都事壬申二十五年夏四月皇太子標卒諡懿文帝御東角門召羣臣曰太子不幸至此古云國有長君社稷之福朕意欲立燕王何如學士劉三吾名如孫以字行茶陵人進曰皇孫年富世嫡之子子歿孫承嫡統禮也即立燕王置秦晉二王于何地帝大哭而罷然以三吾言立孫之意遂決太子初師事宋濂通經史大義帝命裁決庶務寬仁明敏于刑獄多所減省天性友愛秦周諸王數有過輒調獲之使歸國或告晉王有異謀者太子陜西還偕之至京為涕泣以請帝乃感悟王亦更以恭慎聞建昌衛今四川寧逺府明為建昌衛指揮使伊嚕特穆爾叛命藍玉討誅之伊嚕特穆爾合德昌元路明為千戶所今曰西昌縣為寧逺府治會川元路明改衛今為會理州屬寧逺府等諸畨攻建昌轉攻蘇州元置明改衛今為冕寧縣屬寧逺府玉遣四川指揮瞿能合肥人討之至雙狼寨一作雙浪寨在西昌縣水寨關西北擒其將賊衆大潰伊嚕特穆爾遁去能督兵追捕進至達崇河又敗之伊嚕特穆爾乃走柏興州州當作府今寧逺府鹽源縣元為柏興府明初因之後改鹽井衛玉遣百戶毛海誘縛其父子送京師誅之盡降其衆六月西平侯沐英卒諡昭靖英先後雲南十年威惠並著嘗入朝帝勞之曰使我高枕無南顧憂者汝英也及是卒軍民巷哭逺夷皆為流涕追封黔寧王英沈毅寡言笑好賢禮士撫卒伍有恩未嘗妄殺在滇百務具舉簡守令課農桑墾屯田百餘萬畝滇池隘浚而廣之通鹽井之利以來商旅民以便安子春字景春晟字景茂昂字景髙相繼鎮守秋七月高麗李成桂逐其君瑶而自立成桂在國威權日盛瑶雖為所立慮禍必將及已與近臣圖之事泄成桂遂逐瑶而自立王氏自五代時得國傳數百年至是遂絶尋以國人表請命帝以高麗僻在海隅非中國所治詔聽之既而成桂又請更國號帝命仍古號曰朝鮮改詹事院為府先是東宫官設詹事院多以大臣領之不置僚屬至是改院為府設詹事秩正三品及少詹事正四品等官左右春坊各設大學士庶子及諭德中允贊善司經局設洗馬其外又有司直司諫清紀隨時設之不常置竄岢嵐州學正吳從權山陰縣教諭張恆于逺方從權恆給由至京明史百官志凡內外官給由吏部考功司掌之三年初考六年再考並引請九年通考奏請綜其稱職不稱職而黜陟之帝召問民間疾苦從權恆皆言職在課士民事無所知帝曰宋胡瑗教授蘇湖設經義治事二齋兵農水利無不兼之當時得人稱盛爾二人既不通世務罔識民情則平日所教何事生徒中縱有人材亦為爾輩所壞矣遂命竄之逺方且榜示天下學校以為鑒戒八月給公侯嵗祿初帝賜勳臣公侯丞相以下莊田多者百頃又賜諸武臣公田以其租入充祿勳臣莊佃多倚威干禁帝每召諸臣戒諭之至是給嵗祿歸賜田于官九月立孫允炆為皇太孫允炆太子第二子也繼妃吕氏出既立為太孫帝命裁決庶務寬厚亦如太子緣其意而有加焉中外莫不頌德帝嘗大怒有所誅譴退朝怒未已太孫從容進曰如得其情哀矜勿喜是或一道也帝意解邏者獲盜七太孫目之言于帝曰六人者盜其一非是訊之果然帝問何以知之對曰周禮聽獄色聽為先此人眸子瞭然顧視端詳必非盜也帝喜曰治獄貴通經信然詔求精曉厯數之士其數往知來試無不驗者爵封侯山東國子生周敬心上言臣聞國祚修短在德厚薄不在厯數陛下但當修德皇祚自傳萬世何必問諸小技之人又言陛下連年北征臣民皆以為欲得傳國寶臣聞傳國寶出自楚平王秦始皇名之曰璽易曰聖人之大寶曰位何以守位曰仁是知仁乃人君之寶玉璽非寶也昔者三代聖王不知有璽天下治安享國長久秦始制璽不旋踵而亡陛下奈何忽大璽而求小璽也又言方今户口雖多而勞民者衆倉廩雖實而民窮者多教化博而民不悅法度嚴而民不從昔汲黯言于漢武帝曰陛下內多欲而外施仁義奈何欲效唐虞之治乎今國則願富兵則願強土地則願廣人民則願衆于是多取軍卒廣積稅糧征伐不休營造無極如之何其可治也又言洪武十二年欽録天下官吏十三年連坐胡黨十九年逮官吏積年為民害者二十三年大戮京民妄立罪名不分臧否豈無善良偶入詿誤之中者昔漢時誤殺一孝婦東海枯旱三年方今四方水旱未臻大稔未必不由殺戮無辜感傷和氣之所致也疏入帝頗採納其言以方孝孺字希直一字希古寧海人克勤之子為漢中教授孝孺少好學恆以明王道致太平為己任十五年以沈薦召見帝喜其舉止端正謂太子曰此莊士當老其才禮遣還至是又以薦召至帝曰今非用孝孺時除漢中教授蜀王椿聞其賢聘為世子師名其讀書之廬曰正學冬十二月徵安陸知州余彥誠德興人下吏尋釋之彥誠以徵稅愆期逮州民楊么等伏闕乞留帝賜宴遣還么等亦預宴時帝操重典繩羣下守令坐小過輒逮繫其部民走闕下乞留旋遣還且加賞賚有因以超擢者癸酉二十六年春二月涼國公藍玉以罪誅玉有勇略數總大軍多立功帝遇之厚寖驕蹇自恣多畜莊奴假子乘勢漁獵嘗占東昌民田御史按問玉捶逐御史北征還夜叩喜峯關關吏不即納玉縱兵毁關入帝聞之不樂又以私元主妃事事見前鐫其過于券玉猶不悛及西征歸皇太孫立以玉兼太子太傅而馮勝傅友德俱兼太子太師玉攘袂大言曰我固不當為太師邪比奏事多不聼益怏怏語所親曰上疑我矣至是錦衣衛指揮蔣瓛告玉謀反廷鞫之獄詞云玉與鶴慶侯張翼臨淮人普定侯陳桓濠人景川侯曹震舳艫侯朱夀東莞伯何榮真之子及吏部尚書詹徽字資善同之子户部侍郎傅友文等謀為變將伺帝出藉田舉事獄具族誅之列侯以下當黨夷滅者萬五千人于是元功宿將相繼盡矣玉常遇春妻弟懿文太子元妃常氏遇春女也以遇太子遇玉厚玉初征納克楚還言于太子曰臣觀燕王在國隂有不臣心又聞望氧者言燕有天子氣殿下宜審之太子曰燕王事我甚恭謹玉曰殿下遇臣厚故敢怖悃忱燕王聞而銜之及太子薨燕王來朝帝問曰民間近謂朕若何對曰諸公侯縱恣無度不誅將有尾大不掉憂帝由此愈疑忌功臣王歸不數月而玉禍作三月命晉王棡燕王棣節制山西北平軍事詔二王軍中事大者方以聞宋國公馮勝潁國公傳友德並受節制夏四月詔有司賑飢毋俟報旱詔羣臣言事理獄囚秋七月甲辰朔日食九月以鄭濟浦江人宋鄭綺七世孫為左庶子王勤浦江人澄之孫為右庶子初東宫官屬缺命廷臣舉孝義篤行之士尚書嚴震直字子敏烏程人以浦江鄭氏對義門鄭氏見前帝曰朕素知鄭更聞其里王氏力行鄭氏家法初浦江王澄慕義門鄭氏家法命其子效之澄卒子三人能承父志同居無間言可用以勵天下乃徵兩家子弟詣闕濟勤遂並拜官鄭氏自其七世祖綺至濟兄弟纍世同居幾三百年胡惟庸之獄有告鄭氏交通者濟兄濓湜爭入獄帝聞特召見立棹湜福建參議命舉所知是舉王澄孫應以對亦棕參議應勤從兄也及是濟勤又並授東宫官天下榮之王氏之名遂與鄭氏埓云十二月户部奏是嵗天下户口之數户一千六百五萬二千八百六十口六千五十四萬五千八百十二甲戌二十七年春正月發天下預備倉穀貸貧民三月命工部藏兵甲帝以四方底定命工部收兵甲裹而藏之示弗復用秋八月遣使修天下水利帝諭工部湖堰陂塘可蓄泄以備旱潦者皆因地勢修治之乃分遣國子生遍詣天下督修水利凡開塘堰四萬九百八十七處九月命禮部議旌表例日照縣金置今縣屬山東沂州府民江伯兒母病割脅肉以療不愈禱岱嶽祠誓以母病愈當殺子祀神已而母病果愈竟殺其三嵗子山東守臣以聞帝怒曰父子天性小民無知滅倫害理亟宜治罪遂逮伯兒杖之百遣戍海南因下禮官議旌表例議曰卧氷刲股前古未聞皆由愚昧之徒務為詭異希求旌表割股不已至于割肝割肝不已至于殺子違道傷生莫此為甚自今卧氷割股聽人子所為不在旌表之例制曰可冬十一月賜潁國公傅友德死友德身冒百死自偏禆至大將每戰必先士卒以故所至立功二十五年友德請懷逺田千畝帝不悅曰祿賜不薄矣復侵民利何居爾不聞公儀休事邪及是竟賜死未幾定遠侯王弼亦賜死友德與藍王先後同統兵俱有功及玊誅友德內懼玉弼曰上春秋髙旦死夕且盡我輩奈何帝聞之故友德弼皆乙亥二十八年春正月越州蠻復叛西平侯沐春討平之阿資屢降屢叛春與都督何福鳯陽人率師營越州城北伏精兵道左以羸卒誘賊賊悉衆出伏起大敗之阿資亡出谷中春詷知所在樹壘斷其糧道已出不意搗其巢遂擒阿資斬之俘其黨越州平二月賜宋國公馮勝死勝自金山歸不復將大兵數以細故失帝意藍玉誅之月與傅友德山西召還至是亦賜死勝嘗築稻埸瘞甔其下以碌碡碾之取有鞺鞳聲走馬其旁以為樂邑有樊父者勝兄國用妻家也有所干索于勝勝不豫樊父遂告勝家居不法場下悉瘞兵器帝召勝賜之酒曰朕不問也勝至夕暴卒秋八月命都督楊文等討龍州龍州土司也洪武初其酋趙貼堅歸附詔以為知州許世襲貼堅死無子從子宗壽當嗣會常茂以罪戍州貼堅妻黃以愛女豫茂為小妻擅州事無何茂病死黃與宗壽相告訐帝以逺人釋不問宗壽卒得嗣已而或搆蜚語言茂匿龍州實不死宗壽知狀帝怒命宗壽捕茂并諭都督府檄宗壽詣闕宗壽懼遷延不敢出廣西守臣奏宗壽抗命且言奉議諸蠻奉議州宋置明改衛今仍為州屬廣西鎮安府皆梗化乃以文為征南將軍指揮使韓觀字彥賓虹人都督僉事宗晟字景陽定逺人為副發江西湖廣諸衛兵討之復命致仕尚書唐鐸往諭宗壽文等師未至鐸還奏茂實前死宗壽亦伏罪請朝乃罷征龍州令文等移師討奉議諸蠻平之信國公湯和卒諡襄武和晚年益為恭慎入聞國論一語不敢外泄當時公侯諸宿將先後麗法稀得免者和獨享壽考以功名終卒年七十追封東甌王九月頒皇明祖訓初帝命儒臣編祖訓録其目十有三曰針戒持守嚴祭祀謹出入慎國政禮儀法律內令內官職制兵衛營繕供用既成帝自為之序事在洪武六年至是更定名曰皇明祖訓頒示內外諸司且諭曰後世有敢言更制者以姦臣論毋赦丙子二十九年春二月命燕王棣帥師巡邊先是寧王權言近者騎兵巡塞得北寇蹤迹恐有邊警帝乃命燕王棣揀精騎巡大寧全寧沿河南北覘敵所在掩擊之既而棣至察察爾山舊作徹徹兒山今改遇敵大敗之擒其將布琳特穆爾舊作孛林帖木兒又追敗哈拉固舊作哈剌兀今並改後仿此于烏梁海城而還秋九月大賚致仕武臣凡二千五百人悉召入朝大賚之復命各晉秩一級丁丑三十年春二月白虹亘天貫日夏五月壬子朔日食命楚王楨湘王柏帥師討古州叛蠻先是古州蠻林寬作亂陷龍里元塞置長官司今司屬貴州黎平府守將吳得井孚戰死事聞詔皆恤贈帝以齊讓為平羌將軍討之既而寬犯新化明初置府後廢今為長官司屬黎平府攻平茶明守禦所今廢故城在黎平府東勢益熾乃命楚王楨帥師湘王柏副之由黔陽注見前辰溪隋縣今屬湖南辰州府進勦二王不臨軍而請餉三十萬帝屢詰責之以讓逗遛不進命都督楊文充總兵官往代文未至讓俘寬以獻帝卒誅讓命文討寬餘黨悉平之時貴州水西土司酋居宗必登等亦叛帝命顧成會何福等討之成擊斬數千人必登逺遁成以討擒其黨魁並誅之水西平水西注見前六月䇿試禮部下第舉人是春會試北士多黜落既廷試諸生上言考官劉三吾白信蹈皆南人私其鄉帝怒命侍讀張信等覆閲下第卷得六十一人以進不稱旨或又言三吾信蹈囑信等故以陋卷呈帝益怒親試䇿問擢武城人韓克忠為第一餘皆北士信蹈及信等論死三吾以老戍邊先是會試榜發泰和宋琮為第一琮善易學既登第官檢討悵然語人曰翰苑當有厄吾其竄乎既而考官禍作琮亦遣戍秋八月沔縣吏髙福興作亂命征西將軍耿炳文討誅之福興及縣民田九成等謀為亂教諭王朴知之言于衛衛發兵捕之次陽平關賊大集逆戰官軍敗賊遂入略陽殺知縣吕昌焚徽州殺學正顔敘彬陜蜀番民皆響應炳文時練兵陜西帝命移軍討之炳文駐文縣遣將分道追勦未幾福興就擒并獲其黨悉誅之九月平緬蠻刀幹孟逐其宣慰使思倫發詔沐春討之平𬗟部長刀幹孟叛平𬗟俗不好佛會有僧自雲南至思倫發尊信之又有金齒成卒逃入其境思倫發喜其技能俾繫金帶與僧俱位諸部長上刀幹孟恕故叛攻騰衝思倫發走雲南沐春送至京師帝憫之命春與何福等討幹孟遣思倫發還諭春先以兵送之金齒􅊾幹孟來迎不應乃遣何福等將兵五千踰髙良公山亦曰髙黎共山又名崑崙岡在永昌府騰越州東蒙氏時階封西嶽直搗南甸元路明置府又改州今為宣撫司屬永昌府大破之斬其酋刀名孟回軍繫景罕寨在永昌府路江安撫司西南賊慿髙堅守官兵糧且盡福告急春帥五百騎救之乘夜渡潞江亦曰怒江以波濤洶湧故名源出吐蕃西南流經麗江永昌諸府界下流至緬甸入南海蒙氏僭封四瀆之一連破二寨幹孟乞降帝不許既而春卒幹孟竟不降何福帥兵討之擒斬幹孟思倫發始歸平𬗟事在明年戊寅三十一年夏五月帝不豫臨朝決事如平時命都督楊文從燕王棣武定侯郭英從遼王植備邊開平俱聼燕王節制考明太祖實録是年五月命燕王棣遼王植備邊開平成祖實録則云是年五月太祖不豫造中官召王已至淮敕令歸藩二書一言令王北行一言召王南來俱在是年五月矛盾殊甚益成祖實録所載皆舉兵後之飾辭其後史官遂筆而書之不足為據今依太祖實録特書此條以證成祖實録之妄皆顛此閏月帝崩遺詔皇太孫允炆仁明孝友天下歸心宜登大位諸王臨國中毋至京師太孫允炆即位以明年為建文元年詔行三年喪羣臣請以日易月帝曰朕非效古人亮陰不言也朝則麻冕裳退則齊衰杖絰食則饘粥郊社宗廟如常禮遂命定儀以進葬孝陵在江寧府上元縣東北朝陽門外當鍾山之陽今設陵户守衛禁樵牧七日而葬遵遺詔也諡曰高皇帝廟號太祖時諸王尚未聞喪遂援遺詔止毋會葬明史贊曰太祖崛起布衣奄奠海宇西漢以後所未有也懲元政廢弛治尚嚴峻而能禮致耆儒考禮定樂昭揭經義尊崇正學修人紀重風教五府六部官職相維置衛屯田兵食俱足武定禍亂文致太平太祖實身兼之詔文臣五品以上及州縣正官各舉所知非其人者坐之六月省州縣汰冗費户部侍郎卓敬請徙封燕王棣于南昌不聽敬密疏言燕王知慮絶人酷類先帝北平形勝地士馬精強金元所由興也宜徙封南昌萬一有變亦易控制疏入翌日帝召謂敬曰燕王朕骨肉至親卿何得及此敬叩頭曰臣所言天下大計願陛下察之帝曰卿休矣事遂寢召方孝孺為翰林院侍講帝在東宫時素聞孝孺賢及即位自漢中馳驛召還日侍左右備顧問讀書有疑即使講解臨朝奏事臣僚面議可否或命孝孺就扆前批答之以齊泰溧水人初名德太祖賜名泰為兵部尚書黃子澄名湜以字行分宜人為太常寺卿參預國事泰習邊事初為兵部侍郎太祖嘗問邊將姓名泰歷數無遺又問諸圖籍出袖中手册以進簡要詳密大奇之子澄先以翰林院修撰充東宫伴讀時帝方立為太孫一日坐東角門謂曰諸王尊屬擁重兵奈何對曰諸王護衛兵僅足自守倘有變臨以六師其誰能支漢七國非不強卒底滅亡順逆之理異也至是遂命泰與子澄同參國政時燕周齊湘代岷諸王相煽動流言聞于朝帝謂子澄曰先生憶昔東角門之言乎對曰不敢忘秋七月長星西隕詔行寬政赦有罪蠲逋稅周王橚有罪廢為庶人橚子有㷲告橚謀不軌辭連燕齊湘三王帝問齊泰黃子澄泰欲先圖燕子澄曰不然周齊湘代岷諸王在先帝時多不法今告變者已在周矣莫若先取之周燕之母弟削周是剪燕之手足而燕可圖也謀定乃命曹國公李景隆文忠子小字九江以備邊為名猝至開封圍王宫執之以歸帝尋欲釋之泰子澄不可未決出相語曰上婦人之仁耳事勢如此安可不斷明日復言之乃廢橚為庶人竄蒙化諸子皆别徙八月詔天下衛所軍單丁者放為民冬十月熒惑守心前都督府斷事百官志五軍都督府俱設斷事官秩從五品高巍遼州人上書言時政巍在洪武時以孝行旌試都督府斷事尋謫戍貴州及帝即位赦還遼州知州王欽辟巍應詔時用事者方議削諸藩巍獨上書請加恩略曰高皇帝分封諸王比之古制既皆過當諸王又率多驕逸不法違犯朝制不削則朝廷紀綱不立削之則傷親親之恩賈誼曰欲天下治安莫若衆建諸侯而少其力力少則易使以義國小則無邪心今盍師其意勿施鼂錯削奪之謀而效主父偃推恩之䇿如此則藩王之權不削而自削矣臣又願益隆親親之禮嵗時伏臘使人餽問賢者下詔褒賞之驕逸違制者初犯容之再犯赦之三犯不改則告太廟廢處之豈有不順服者哉書奏帝頗嘉之然不能用後燕師起巍請使燕軍説令休兵歸藩代朝廷十萬師帝壯其言許之巍至燕自稱國朝處士上書燕王極陳禍福且言大喪未終毒興師旅其與夷齊秦伯讓國求仁之義不大徑庭乎雖大王有肅清朝廷之心天下不無篡奪嫡統之議即幸而不敗謂大王何如人哉書屢上不報遂自拔南歸頒示御史尹昌隆字彥謙泰和人諫疏于天下帝有疾晏朝昌隆疏諌略曰昔太祖高皇帝雞鳴而起昧爽而朝百官戒懼不敢稍怠陛下嗣膺大業宜追繩祖武未明求衣日旰忘食今乃即于晏安日上數刻猶未臨朝恐自此上下懈弛曠職廢業非社稷福也左右請以疾諭之帝曰直諌難得何可沮也其以疏宣示天下使咸知朕過十二月賜天下明年田租之半以工部侍郎張昺澤州人為北平布政使都指揮使謝貴張信臨淮人掌北平都司事自帝為太孫中外屬望獨燕王棣心不平常懷窺覬及即位削藩議起僧道衍勸棣為逆棣曰民心向彼奈何道衍曰臣知天道安問人心乃進相士袁珙鄞人善相術棣召見珙諦視曰龍行虎步日角插天太平天子也年四十鬚過臍即登大寶矣已見藩邸諸校卒皆許以公侯將帥棣由此益自喜逆謀遂決及卜者金忠鄞人善易卜自是棣陰事一切與道衍謀棣居元故宫道衍練兵後苑穴地作重屋周繚厚垣密甃瓴甋瓦缶日夜鑄軍器畜鵝鴨亂其聲久之事益露上變者日甚帝問齊泰黃子澄子澄曰先發者制人請討之泰曰方今有邊報但當以防邊為名發軍戍開平護衛精鋭悉調出塞羽翼既除雖欲為變不能矣帝然之乃更置守臣並受密命伺察燕事尋命都督宋忠督兵屯開平以燕護衛卒隸之又調北平二衛于彰德諸處惠皇帝己卯建文元年春正月修太祖實録以禮部侍郎兼翰林院學士董倫字安常恩縣人等為總裁官侍講方孝孺副之徵布衣楊士奇名寓以字行泰和人等充編纂官二月追尊皇考曰孝康皇帝廟號興宗妣常氏為孝康皇后尊母吕氏壽州人太常卿本之女為皇太后立妃馬氏光祿少卿全之女為皇后子文奎皇后出為皇太子封弟三人為王允熥吳王允熞衡王允熙徐王俱不之藩更定官制用方孝孺等議內外品官階勳悉仿周禮更定殿閣大學士並去大字升六部尚書為正一品設左右侍中位侍郎上改都察院為御史府都御史為御史大夫罷十二道為左右兩院通政使司為寺大理寺為司詹事府增置資德院翰林院復設承旨改侍讀侍講學士為文學博士設文翰文史二館文翰以居侍讀侍講文史以居修撰編修檢討餘內外大小諸司悉有所更定又撰禮制頒行天下然無濟實事徒為燕王棣藉口命刑部侍郎暴昭潞州人戶部侍郎夏原吉字維哲其先德興人徙湘隂等充採訪使分巡天下凡使二十四人敕奬廉平黜貪墨便宜行事昭至北平得燕王棣諸不法狀密奏之請預為備三月京師地震夏四月湘王柏自焚死齊王榑代王桂有罪廢為庶人柏膂力過人握刀槊弓矢馳馬若飛至是有告其反者帝遣使即訊柏焚其宫室彎弓躍馬投火中死柏纍歷塞上以武功自喜時與燕通為府中人所告會代邸亦上變乃廢二王為庶人錮榑京師幽桂大同户部侍郎郭任以朝廷不先圖燕而徒削奪諸藩乃上言天下事先本後末則易成今日北討周南征湘舍其本而末是圖非䇿也且兵貴神速苟曠日持久鋭氣既竭姑息隨之所謂強弩之末勢不能穿魯縞徒坐自困耳帝不能從郭任丹徒人遣燕世子高熾及其弟高煦高燧還北平太祖崩時燕王棣遣三子入臨京師高煦勇悍無賴其舅徐輝祖達之子燕王妃徐氏達女也切戒之不聽至是棣因稱病乞三子歸齊泰欲遂收之黃子澄曰不若遣歸使彼不疑因遣還棣喜曰吾父子復得相聚天贊我也高煦瀕行入輝祖廏盜善馬徑去輝祖追之已渡江矣途中輒殺吏民至涿州又殺驛丞于是朝臣舉以責燕燕謀益急六月岷王楩有罪廢為庶人西平侯沐晟奏楩不法廢為庶人徙漳州秋七月燕王棣舉兵反棣以僧道衍為謀主護衛張玉字世美祥符人朱能懷逺人為爪牙選將校勾軍卒部署已定問道衍師期對曰未也棣始稱病既稱病篤或佯狂赴市奪飲食或臥土壤中大暑圍火爐猶搖首顫曰寒甚會燕山衛百戶倪諒告變帝下詔讓棣遣中官逮王府僚屬北平都指揮使謝貴布政使張昺以軍士列九門防守都指揮張信叛附于棣以情輸之信與貴昺同受密敕擒棣信母知之以為不可信乃三造棣府辭不見于是乘婦人輿入拜床下棣佯為病瘋不言信曰王果有恙耶今朝廷敕臣執王宜早為計棣聞信言覺其誠呼為恩張下拜曰生我一家者子也棣乃用道衍計令張玉朱能潛納勇士八百人入府守衛及朝使至棣偽縛官校置庭中紿貴昺入執殺之張玉等率勇士奪九門燕府長史葛誠護衛指揮盧振初皆與貴昺謀誅棣至是並遇害夷其族伴讀余逢辰字彥章宣城人泣諫殺之參政郭資武安人副使墨麟僉事吕震字克聲臨潼人並降棣棣乃上書于朝指齊泰黃子澄為姦臣請入清君側遂自署官屬稱其兵曰靖難尋陷薊州奪居庸關破懷來都督宋忠戰敗死之于是通州遵化永平密雲諸守將皆以城叛衆至數萬谷王橞自宣府奔京師宣府地近北平燕兵既破懷來宣府震恐橞棄其國走還京師詔削棣屬籍命長興侯耿炳文帥兵討之棣反書聞帝告太廟削棣屬籍廢為庶人詔示天下以炳文太祖時宿將拜征虜大將軍時開國勳臣多已物故獨炳文尚在朝廷倚重然年已六十五矣駙馬都尉李堅都尉寧忠副之帥師討燕尋命安陸侯吳傑江陰侯吳高良之子都督耿瓛炳文子都指揮盛庸史無里系等分道並進設平燕布政于真定以暴昭掌之棣既反齊泰黃子澄益慷慨任事請聲其罪以致討或難之泰曰名其為賊敵乃可克名正言順又何疑焉自是命將興師皆二人主之八月耿炳文及棣戰于滹沱河北敗績炳文次真定使先鋒九千人駐雄縣值中秋不設備燕將張玉夜半疾驅襲陷之又陷鄚州炳文部將張保叛降于棣時大兵號三十萬先至者十三萬分營滹沱河南北棣欲與北軍戰懼南軍乘之乃縱保歸揚言燕王率兵且至誘炳文移軍盡北渡河棣率張玉談淵清流人等循河蹴擊炳文軍不得成列大敗喪師三萬副將李堅寧忠都督顧成皆被執炳文退保真定棣圍之三日以炳文老將未可克乃引去召耿炳文還以李景隆代之炳文敗帝商代者黃子澄薦曹國公李景隆景隆讀書通典故與方孝孺友善有名公卿間故子澄薦之齊泰極言不可帝不聽賜景隆通天犀帶親為推輪餞之江滸景隆至德州收集炳文將卒并調諸路兵五十萬進營河間當是時帝傾國兵以畀景隆謂燕可旦夕破棣聞之顧大喜曰昔漢高止能將十萬景隆何才乃以五十萬付之是自坑其衆也吾破之必矣會吳高耿瓛楊文方圍永平棣語諸將曰景隆知我在此必不敢至不若往援永平以致其師吳高怯不敢戰聞我至必走是我一舉解永平圍而破景隆也遂帥師援永平吳高盡棄輜重走退保山海關景隆知燕兵出果引軍趨北平直薄城下築壘九門燕世子高熾堅守夜遣勇士縋城出斫營營中驚擾驟退都督瞿能攻張掖門即今西直門見方輿紀要垂克景隆忌能功令止之燕人夜汲水沃城明日冰凝不能上御史韓郁上言諸王親則太祖遺體貴則孝康皇帝手足尊則陛下叔父乃豎儒偏見病藩封太重疑慮太深于是周王既廢湘王自焚齊代相繼被摧為計者必曰兵不加則禍必稔今燕舉兵兩月矣前後調兵不下五十萬而一矢無獲將不效謀士不效力徒使中原赤子困于轉輸民不聊生日甚一日臣恐陛下之憂方深也諺曰親者割之不斷疏者屬之不堅此言深有至理願陛下少垂鑑察興滅繼絶釋代王之囚封湘王之墓還周王于京師迎楚蜀為周公俾各命世子持書勸燕罷兵守藩慰宗廟之靈明詔天下篤厚親親宗社幸甚不聽冬十月誘執寧王權奪其衆及朵顔三衛歸北平權國大寧大寧東連遼左西接宣府為巨鎮所屬朵顔三衛騎皆驍勇善戰燕兵起朝廷慮權與燕合召權及遼王植歸京師植泛海還權不至坐削護衛棣聞之喜為書遺權至是以單騎入大寧詭言窮蹙求救執權手大慟求代草表謝罪而陰令吏士結三衛部長及諸戍卒及辭去權祖之郊外伏兵起擁權行三衛彍騎及諸戍卒一呼畢集守將朱鑑不能禦力戰死王府妃妾世子皆隨入松亭關歸北平棣以其衆分隸各軍大寧城為空十一月李景隆及棣戰于鄭村壩在順天府大興縣東敗績奔德州諸軍方圍北平燕兵乘勝抵城下城中兵鼓譟出內外夾攻諸軍皆潰亡士卒十餘萬明年春棣兵陷蔚州注見前攻大同使景隆疲于奔命景隆自紫荆關在易州西即太行蒲陰陘也地記太行第七陘為蒲陰宋時謂之金陂關金元以來始名紫荆赴援燕兵已旋居庸官軍多凍餒死者不見敵而還罷兵部尚書齊泰太常寺卿黃子澄棣以前所上書不報再上書請去泰子澄帝為罷二人以謝燕陰留之京師仍參密議庚辰二年春正月均江浙田賦初太祖時屢蠲蘇松嘉湖極重田賦事具前至是帝復下詔減免畝不得過一斗後永樂中盡革帝政浙西賦復重夏四月李景隆敗棣于白溝河再戰景隆敗績奔德州景隆大誓師于德州會武定侯郭英安陸侯吳傑等合軍六十萬進次白溝河列陳數十里棣先營蘇家橋在霸州東文安縣北已由西北循河而進都督平安滁人預伏兵河側棣至伏發安挺矛直前瞿能父子亦奮擊所向披靡戰至暝棣以三騎遁迷失道下馬伏地視河流辨東西始知營壘所在是日也棣幾殆安失馬百餘匹而已明日再戰能及安搗燕將房寬陳敗之景隆揮騎繞出棣後大戰良久景隆軍飛矢如雨棣三易馬矢盡揮劍劍折阻于堤幾為瞿能所獲力走登隄佯引鞭招後繼者景隆疑有伏不敢前會高煦救至棣乃得免比日晡能復引衆搏戰大呼殺賊指揮俞通淵通海之弟滕聚俱以兵赴之會旋風起折景隆大將旗陳動棣以徑騎繞其後乘風縱火煙焰漲天能父子及通淵聚皆死安與朱能戰亦敗官軍大亂奔聲如雷郭英潰而西景隆潰而南盡棄其所賜璽書斧鉞走德州五月棣陷德州進攻濟南燕兵乘勝進攻德州未至景隆先奔燕兵入城得糧儲百餘萬石勢益張參政鐵鉉鄧州人趨濟南時高巍自燕還與鉉遇臨邑值五日誓酒同盟遂偕入城臨邑漢置今屬濟南府與都督盛庸等誓以死守景隆往依之燕兵遂攻濟南時景隆兵在城下者尚十餘萬棣乘其未陳馳擊之景隆大敗南走帝用齊泰黃子澄計遣使議和以緩之棣不聽帝命尚寶司丞李得成如棣軍諭罷兵棣不從得成遂附于棣尚實司洪武初置掌符璽卿秩正五品少卿從五品丞正六品射書城中諭降不下棣堰水灌之鉉乃佯令守陴者皆哭撤守具出居民于城外伏地請降預懸鐡板城門上伏壯士闉堵中候棣入下板擊之别設伏斷城外橋棣聞濟南降大喜以其地當要會得之斷南北道則江淮可圖也遂下令受降翌日乘馬張蓋鼓吹徐行至城門軍士失約棣未入板驟下傷棣馬首急易從馬奔及橋伏兵起橋倉卒不可斷遂得逸棣憤甚築長圍晝夜攻之鐵板詐降之説出明李賢古穰雜録國史考異以為文皇善用兵不應妄信輕率若此明舊史例議深以為然考賢在天順朝去革除時未逺功臣尚有在者見聞必非無據考異之説為成祖諱耳何足為深信今仍依遜國記中諸書採輯秋八月承天門災方孝孺建議改謹身殿為正心殿午門為端門端門為應門承天門為臯門前門為路門從之都督盛庸參政鐡鉉擊敗棣兵于濟南復德州時平安營單家橋在河間府獻縣南為南北通途滹沱河之分流黑龍港河經其下謀出御河奪燕餉舟又選水卒五千人渡河攻德州鉉與庸乘夜出兵掩擊燕衆大敗解國去鉉等乘勝復德州帝聞擢鉉山東布政使參贊軍務尋進兵部尚書封盛庸厯城侯拜平燕將軍于是庸進駐德州吳傑平安守定州徐凱屯滄州相犄角以困北平九月詔録洪武功臣罪廢者後冬十月詔李景隆還赦不誅御史大夫練子寧名安以字行新淦人宗人府經厯宋徵御史葉希賢松陽人並言景隆失律喪師懷二心宜誅黃子澄亦請正其罪以謝天下皆不聽子澄拊膺曰大事去矣薦景隆誤國萬死不足贖罪十二月盛庸大敗棣于東昌斬其將張玉棣遁還先是棣襲滄州執徐凱斬萬餘級降三千人談淵一夜盡殺之棣自長蘆渡河至德州遣人至城下招盛庸庸堅壁不出燕兵掠臨清大名越汶上至濟寧庸與鐡鉉屯兵東昌以邀之棣率兵薄營庸開陳縱棣入圍之數重斬其驍將張玉已而朱能率番騎來救殊死鬭翼棣潰圍出以百騎出館陶引還北平庸軍勢大振自燕人犯順轉鬬兩年鋒鋭甚至是失將燕軍奪氣其後定計南下皆由徐沛不敢復道山東辛巳三年春正月復齊泰黃子澄官以東昌捷告太廟命泰子澄任職如故三月盛庸敗棣于夾河在冀州武邑縣南漳水分流也又東入滹沱斬其將談淵復戰敗績棣恥東昌之敗意殆欲稍休道衍力趣之謂棣曰臣前言師行必克但費兩日兩日者昌字也自此全勝矣棣遂復率衆南出保定盛庸營夾河棣將輕騎來覘掠陳過庸遣千騎追之斬其將談淵燕軍大挫而朱能張武溂陽人等殊死鬬棣自以鐡騎貫陳與能合官軍稍却日暮各斂兵棣以十餘騎逼庸營野宿及明起視以在圍中乃從容引馬鳴角穿營而去庸與諸將皆以帝有詔毋使朕負殺叔父名倉卒相顧愕眙不敢發一矢明日復戰棣軍東北庸軍西南自辰至未勝負略相當忽大風東北起飛埃蔽天庸軍面迎砂礫咫尺不辨物棣兵縱左右翼橫擊斬首數萬庸大敗走德州時吳傑平安自真定引軍來會聞庸敗引還棣以計誘之出戰傑安列陳滹沱河南棣率驍騎循河繞出陳後安發強弩射燕兵矢集棣旗如蝟毛死者甚衆亦遇大風拔樹聲如雷安遂敗仍走入真定庸之斬談淵也其麾下驍將皂旗張楚智亦皆陷沒皂旗張者名張能力援千斤每戰揮皂旗先登輒勝軍中故以皂旗為之名戰死時猶執皂旗不仆云智被執棣欲降之不屈而死貶齊泰黃子澄諭棣罷兵棣不奉詔帝聞庸軍敗大懼詔竄泰子澄于外密令為募兵計棣聞二人已竄上書請罷盛庸吳傑平安兵帝以問方孝孺孝孺曰燕兵久頓大名天暑雨當不戰自疲急令遼東諸將入山海關攻永平真定諸將度盧溝搗北平彼必歸救我以大兵攝其後可成擒也今其奏事適至宜且與報書往返踰月使彼將士心懈我謀定勢合進而蹴之不難矣帝以為然乃遣大理寺少卿薛嵓閿鄉人往報詔赦燕罪令罷兵歸藩棣不奉詔未幾盛庸吳傑平安分道斷燕餉道棣患之復遣其指揮使武勝上書伸前請帝將許之孝孺曰兵罷不可復聚願毋為所惑帝乃誅勝以絶燕夏六月棣將李逺懷逺人冦沛縣焚糧艘官軍駐德州資糧皆道徐沛棣遣李逺以輕兵六千詐為官軍袍鎧由濟寧至沛焚糧艘數萬河水盡熱魚鱉皆浮死盛庸遣都督袁宇帥三萬騎追之為逺伏兵所敗秋七月都督僉事平安攻北平不克燕兵掠彰德陷林縣安在真定度北平空虛帥萬騎攻之棣方軍大名遣將馳救安戰不利引還時大同守將房昭引兵入紫荆關據易州西水寨以窺北平棣引兵圍之都指揮花英等往援大敗棣勒兵還北平冬十二月詔駙馬都尉梅殷字伯殷夏邑人汝南侯思祖從子鎮淮安殷尚寧國公主太祖春秋髙諸王強盛嘗受密詔輔皇太孫至是命充總兵官鎮淮安棣大舉南犯棣稱兵三年親戰陳冒矢石屢瀕于危所陷城邑兵去旋復為朝廷守故不敢決意南下無何有以中官奉使侵暴為言者詔所在有司繫獄于是中官密遣人赴燕言京師空虛可取狀棣慨然曰頻年用兵何時已乎要當臨江一決不復返顧矣遂大出兵明年春連陷東平濟陽諸州縣斷徐州餉道破蕭沛及宿州時州縣官以城陷先後死難者獻縣知縣向朴集兵民兵與燕將戰被執懷印死濟陽教諭王省為燕所執詞義慷慨衆舍之省歸坐明倫堂伐鼓集諸生謂曰若等知此堂何名今日君臣之義何如因大哭以頭觸柱死東平州吏目鄭華由行人司貶官燕兵至長吏皆棄城走華獨固守城破與其妻蕭氏皆死之沛縣知縣顔伯瑋守沛指揮王顯開門降伯瑋冠帶升堂自經死其子有為伯瑋先遣歸侍父不忍去亦自刎伯瑋旁主簿唐子清典史黃謙俱被執諭之降皆曰願隨顔公地下俱死蕭縣知縣鄭恕亦以城破不屈死籍其家二女俱死焉伯向朴慈溪人王省字子職吉水人鄭華臨海人顔瑋名瓌以字行廬陵人唐魯公真卿後鄭恕仙居人壬午四年春正月命魏國公徐輝祖帥師禦棣兵于山東召故周王橚還京師夏四月官軍連敗棣兵于淮北尋召輝祖還棣軍小河即古睢水舊自河南永城縣流徑宿州靈璧至宿遷入泗後宿州以上已成平陸其在睢寧宿遷者謂之小河都督何福擊敗之斬其將陳文平安轉戰至北阪幾獲棣番騎王騏躍入陳掖棣去適輝祖來會戰于齊眉山在鳯陽府靈璧縣西南山開八字如列眉然斬其將李斌時王師再捷燕人大懼會淮土盛暑濕蒸諸將請旋師觀釁棣不從棣集諸將下令曰欲渡河者左諸將從左棣怒曰任汝曹所之乃不敢復請而帝聞訛言謂燕兵已北召輝祖還福軍遂孤五月遼東兵潰于直沽先是帝命楊文帥遼東兵十萬赴濟南與鐵鉉合以斷棣後及是至直沽軍潰無一人至濟南者棣兵渡淮陷揚州何福移營靈璧欲持久老燕師而糧運為燕所阻平安分兵往迎棣帥精鋭橫擊斷其軍為二福開壁往援俱敗走諸將請移駐淮河就糧夜令軍中聞三炮即走翼日燕兵猝薄壘亦發炮三福軍以為己炮也爭趨門出燕兵乘之遂大亂人馬墜壕塹俱滿福單騎走安及都督陳暉侍郎陳性善名復初以字行山陰人等三十七人皆被執棣尋釋性善歸令説朝臣性善朝服躍馬入于河以死盛庸獨軍而南以兵數萬戰艦數千列淮南岸棣兵不得渡遣使至淮安假道于駙馬都尉梅殷殷劓其使棣先以進香為名殷答曰進香皇考有禁不遵者為不孝棣復書言今興兵誅君側惡天命有歸非人力所能沮殷乃割其使耳鼻縱之歸曰留汝口還為而王言君臣大義棣氣沮鳳陽守徐安亦拆浮橋絶舟楫以遏燕棣乃令邱福鳳陽人朱能等帥驍勇數百人潛自上流以漁舟濟猝薄庸軍鳴炮庸軍驚突擊之庸敗走盡獲其戰艦遂渡淮下泗州出天長進陷揚州都指揮使崇剛巡按御史王彬攖城固守指揮王禮江都知縣張本縳剛彬開門以降剛彬見棣皆不屈死王彬字文質東平人徵天下兵勤王帝遣御史大夫練子寧侍郎黃觀字伯澖一字尚賓貴池人修撰黃叔英字原采黃巖人等分道徵兵蘇州知府姚善字克一安陸人首以兵入衛請召還齊泰黃子澄帝從之時寧波知府王璡徽州知府陳彥回樂平知縣張彥方前永清典史周縉各帥兵入援後彥回彥方皆被誅縉遣戍璡獨得免又有松江同知榜募勤王義勇斥燕兵乖恩悖道後磔于市王璡字器之日照人陳彥回字士淵莆田人張彥方龍泉人周縉字伯紳武昌人松江同知或曰周繼瑜然史無可考下罪已詔遣慶成郡主詣燕軍時棣兵往來江上江南北郡縣俱密已輸欵詔下京師內外臣民慟哭而已方孝孺曰事急矣可遣人許以割地稽延數日俟募兵漸集然後決戰江上乃遣慶成郡主往燕軍請割地罷兵郡主棣從姊也見棣述太后及帝意棣曰吾此來欲得姦臣不在土地郡主默然遂辭歸帝命諸將集舟師江上為守禦計兵部侍郎陳植監戰植慷慨誓師部將殺之以降棣殺部將具棺殮植瘞之植廬江人六月棣兵渡江犯京師谷王橞及李景隆迎降京師陷帝不知所終盛庸徐輝祖等敗棣兵于浦子口在江寧府江浦縣東為南北津要有城今設守備駐此會高煦引番騎來援殊死鬭庸軍退駐高資港在鎮江府丹徒縣西北通大江接儀徵都督僉事陳垣字彥純合肥人以舟師叛附于棣棣率兵自瓜洲渡江庸敗走鎮江守將童浚率衆降棣進軍龍潭帝命諸王分守都城遣景隆及兵部尚書茹瑺衡山人都督王佐詣燕師講和棣曰吾無罪而削為庶人今救死何以地為景隆等不能發一語遽還帝復令谷王橞安王楹往棣卒不奉詔左右或勸帝他往以圖復興方孝孺請堅守京城待四方援兵即事不濟當死社稷棣尋進兵屯金川門左都督徐增壽謀內應帝手劍斬之橞景隆守金川門登城望見棣麾蓋開門迎降御史連楹襄垣人叩馬欲刺棣被殺都城陷宫中火起帝不知所終棣遣中使出后尸于火詭云帝尸越八日用學士王景字景彰松陽人言備禮葬之然葬地所在後無聞焉或曰帝由地道出亡其後滇黔巴蜀間皆傳有帝為僧時往來迹世遂以帝為遜國云遜國之説明舊史例議力辨其妄且言建文帝闔宫自焚身殉社稷死之正也後人心惡成祖誅夷忠烈之慘而不忍建文之遽殞故詭言削髮出亡以明帝之不死于火耳此其言誠是但據王鏊陸樹聲薛應旗鄭曉朱國楨等所載諸書皆歷歷可考雖有舛訛或未必悉由附會且史傳稱黃觀募兵未還或謂曰宫中火帝已失後神宗時嘗命閣臣録帝在滇詩以進似又非盡無稽者第事難徵核姑從闕疑今故附録出亡之略而復辨之如此明史贊曰惠帝天資仁厚踐阼之初親賢好學召用方孝孺等典章制度鋭意復古其除軍衛單丁減蘇松重賦皆惠民之大者乃革命而後紀元復稱洪武嗣是子孫臣庶以紀載為嫌草野傳疑遂多訛謬矣棣自立為皇帝棣入京編修楊榮字勉仁建安人迎謁馬首曰殿下先謁陵乎先即位乎棣遽趨謁陵畢羣臣備法駕迎謁奉天殿即皇帝位茹瑺入賀迎謂曰瑺吾今日得罪天地祖宗奈何瑺頓首曰陛下應天順人何謂得罪乃大悅削魏國公徐輝祖爵輝祖當燕師渡江猶引兵力戰京師陷諸武臣咸迎附勸進輝祖獨守父祠於是下吏命引罪不屈削爵幽私第永樂五年輝祖卒帝乃命輝祖長子欽嗣封神宗時録建文忠臣以輝祖為首追贈太師諡忠貞殺兵部尚書齊泰太常卿黃子澄文學博士方孝孺皆夷其族坐黨死者數百人初帝發北平僧道衍以孝孺為囑曰城下之日彼必不降幸勿殺之殺孝孺天下讀書種子絶矣帝頷之及陷京師即大索孝孺等五十餘人鎮撫伍雲縛孝孺至帝以道衍言顧左右收之曰勿令遽死及是召草登極詔孝孺悲慟聲徹殿陛帝降榻勞曰先生無自苦朕欲法周公輔成王耳孝孺曰成王安在帝曰彼自焚死曰何不立成王之子帝曰國賴長君曰何不立成王之弟帝曰此朕家事顧左右授筆札孝孺投筆于地哭且罵復強之乃大書燕賊篡位四字帝大怒命繫獄會泰子澄亦至秦自廣德往他郡收兵有識其馬者曰此齊尚書馬也遂執之子澄至太倉亦為人所執械至京帝親詰之抗辨不屈遂命與孝孺同磔于市孝孺慷慨就戮賦絶命詞而死詞曰天降亂離兮孰知其由姦臣得計兮謀國用猶忠臣發憤兮血淚交流以此徇君兮抑又何求嗚呼哀哉庶不我尤其門人廖鏞永忠之孫廖銘鏞之弟檢遺骸瘞聚寶門外山上尋被逮與胡子昭字仲常榮縣人刑部侍郎盧原質字希魯寧海人太常少卿鄭公智字叔貞寧海人御史林嘉猷名升以字行寧海人陜西僉事鄭居貞閩人河南參政俱坐死泰從兄弟俱坐死子澄族人無少長皆斬孝孺弟孝友亦死妻鄭氏及二子中憲中愈先自經二女投秦淮河宗族親友及門下士坐誅者廖鏞等而外復數百人遜國名臣傳云孝孺大書數字投筆于地曰死即死詔不可草帝大怒曰汝焉能遽死朕當滅汝十族紀事本末採其説改作文皇大聲曰汝獨不顧九族乎孝孺曰便十族奈我何乃收其門生廖鏞林嘉猷等為一族並坐然後詔磔孝孺于市舊史例議以鏞嘉猷逮論在孝孺死後十族之説非實今亦不採附注于此殺御史大夫練子寧戶部侍郎卓敬夷其族子寧縛至語不遜磔于市夷其族姻戚俱戍邊敬先建議徙燕帝責以離間骨肉猶憐其才命繫獄使人諷以管仲魏徵事敬曰人臣委質有死無二先皇帝曽無過舉一旦橫行篡奪恨不即死見故君地下乃更欲臣我耶僧道衍故與敬有隙進曰敬言誠見用上寧有今日乃斬之夷三族時殉難者太常少卿廖升襄陽人最先死燕師渡江朝廷遣使請割地不許升聞而慟哭自縊死珣難諸臣升死最先後追戮詔下亦首及升未幾修撰王艮字敬止吉水人飲鴆死城陷前一日艮與胡廣解縉俱集司業吳溥舍縉陳説大義廣亦奮激慷慨艮獨流涕不言三人去溥子與弼尚幼歎曰胡叔能死節大佳溥曰不然獨王叔死耳言未畢聞廣呼家人謹視豬溥曰一豬尚不舍能舍生乎須臾艮舍哭飲鴆死矣胡廣字光大吉水人吳溥崇仁人與弼字子傳都給事中龔泰義烏人投城下死宫中火起泰馳赴燕軍被縛以非姦黨釋不殺自投城下死葉福侯官人守門死福守金川門燕兵入死之衡府紀善周是修名德以字行泰和人江西副使程本立字原道崇德人大程子之後自經死是修為衡府糾善王未之藩留京師城陷具衣冠為贊繫衣帶間入應天府學拜先師畢自經于尊經閣本立由僉都御史改官未行燕兵入亦自經大理寺丞鄒瑾永豐人御史魏冕瑾之甥同自殺燕兵至金川門徐增壽徘徊殿庭有迎納意冕帥諸御史毆之幾死惠帝倉皇罷朝冕與瑾大呼請速加誅明日宫中火起冕自殺瑾亦死之同邑鄒朴秦府長史聞瑾死憤激不食卒皆在帝未即位前嗣是相繼死者禮部尚書陳迪字景道宣城人督運軍儲聞變趨京師帝已即位召迪責問迪抗聲不屈與子六人同􅣭于市户部主事巨敬與迪同執亦不屈死敬平涼人刑部尚書暴昭昭自真定召還金川門陷出亡被執不屈磔死侯泰字順懷南和人督餉淮安聞京師陷行至髙郵被執不屈死户部侍郎郭任任與同官盧迥主調兵食燕師入二人同被執不屈死盧迥仙居人禮部侍郎黃觀觀募兵至安慶京師陷或告曰宫已焚帝失所在新天子即位三日矣觀命舟至羅剎磯朝服東向拜投湍急處死觀妻翁及二女在京先投秦淮河死觀同官有黃魁者燕師入亦不屈死羅剎磯在池州府東流縣西濵江方輿紀要巖石森立舟帆艱險副都御史茅大芳名誧以字行泰興人京城陷與僉都御史周璿同被執皆不屈死大芳子二人亦死大理少卿胡閏字松友鄱陽人燕師起晝夜畫軍事帝即位召閏不屈死籍其家長子論死幼子戍邊女郡奴方四嵗或提入功臣家稍長識大義日以㸑灰汚面髮長二寸即剪之洪熙初赦還猶處女誓不嫁人鄉人敬之皆曰此真忠臣女也修撰王叔英叔英募兵至廣德聞京城不守沐浴具衣冠書絶命辭藏衣裾聞自經死待御史林英亦募兵經廣德知事無成亦自經死左拾遺戴德彛奉化人由翰林侍講改官帝即位召見不屈死之給事中陳繼之莆田人韓永西安人京師破二人俱不屈死御史髙翔朝邑人帝即位被召欲用之翔喪服入見語不遜族之發其先冢親黨徙極邊髙氏産皆加稅曰今世世罵翔也謝升諸城人與同官懷寧甘霖聊城丁志方皆以被逮不屈誅又有董鏞者諸御史時時會其家誓以死報國城破後坐逆黨死宗人府經厯宋徵嘗疏請削罪藩屬籍燕師入不屈死刑部主事徐子權新淦人聞練子寧死痛哭賦詩自經死浙江按察司王良字天性祥符人建文中官刑部侍郎未減燕府人罪不當上指出為浙江按察使帝即位頗德良遣使召之良將斬使者衆劫之去良集諸司印九于私第積薪自焚印俱毁帝以良毁印徙其家于邊蘇州知府姚善善督五府兵勤王未及戰燕師入索黃子澄急子澄匿善所約共航海起兵善曰公可去善守土與城存亡耳子澄去善為麾下縳以獻不屈死漳州教授陳思賢茂名人帝即位詔至痛哭不出迎帥生員伍性原陳應宗林珏鄒君默曾廷瑞吕賢即明倫堂為建文帝哭臨有司執送京師思賢及六生皆死先後死不一時既而給事中黃鉞字叔揚常熟人赴水死建文中鉞丁父憂聞變杜門不出明年以户科召鉞自投于水其家以溺死聞故得不坐御史曾鳯韶廬陵人自剄死鳯韶以御史歸里帝即位起原官不赴又以侍郎召鳯韶刺血書衣襟為絶命辭自殺王度字子中歸善人謪戍死度素與方孝孺善以逆黨戍廣西坐語不遜族谷府長史劉璟誠意伯基次子下獄死燕師起璟隨谷王歸京師尋參李景隆軍事景隆敗歸青田帝即位召之以疾辭逮至京猶稱殿下且云殿下百世後逃不得一篡字下獄自經死死皆在後他若御史葉希賢以姦黨被戮牛景先走死蕭寺或又以二人為不死希賢或曰從帝為僧出亡名應賢或又曰後為雪菴和尚景先或曰帝出亡後往來帝所號東湖樵夫並附録存疑方燕師入金川門朝臣棄位去者四十餘人世遂有相傳程濟及河西傭補鍋匠之屬濟朝邑人建文末官編修金川門啓濟亡去或曰惠帝為僧出亡濟從之莫知所終河西傭為傭莊浪魯氏冬月常披葛衣久之有京朝官至識傭欲與語走避之後莊浪補鍋匠往來川中業補鍋一日于夔州市遇一人相顧愕然已相持哭其人曰馮翁能為詩後題馬二子或馬公或塞馬先生二人者後皆不知所終又有會稽雲門寺僧若耶溪樵及金華玉山樵者或皆謂建文遺臣然姓名爵里莫可得而考也他若樂清臨海二樵夫聞惠帝崩投水死儲福為燕山衛卒北平兵起逃去復勾入籍中不食死龔翊為金川門軍門慟哭遂隱而死雖正史未為詳載而遜國諸書所録節烈凜然有禆名教今並注于此以備稽考秋七月革建文年號以是年為洪武三十五年明年為永樂元年凡建文中所更政令條格悉罷復舊革除之説議論紛如考當時成祖不欲用惠帝年號又不欲季夏改元故于即位之初仍以洪武三十五年為紀説者遂謂止改是年不知詔內所云止就現在而計遂舉是嵗六月為例以便遵循實則前三年皆以並從改革故當時欽天監所進厯日直書洪武三十二年至三十五年其後史官修永樂實録于洪武三十五年六月以前但書元二三四年而無號蓋其子孫曲為遷就以掩其非而不知其轉相矛盾夫紀年必有號自漢武帝以來厯代皆然若去其號而但紀其年則所謂元二三四年者將于何屬雖欲不為之革除而不得也在從前王世貞申時行輩諱其祖宗朝事故多飾詞偏護而舊史例議乃據其説而力辨當時並無革除之事又安足為定論乎遷孝康皇帝主于園陵仍稱懿文太子太后吕氏仍稱太子妃徙居園陵吳衡徐三王俱降封尋廢允熥允熞為庶人錮鳳陽允熙奉太子祀未幾暴卒召陳瑛滁人為左副都御史建文初瑛為北平按察使受燕府金錢通密謀僉事湯宗字正傳浙江平陽人白于朝逮謫廣西至是召為副都御史署院事瑛天性殘忍受寵任益務深刻言廷臣效死建文者如黃觀廖升王叔英周是修王良顔伯煒輩其心與叛逆等請追戮之帝不聽後瑛閲方孝孺等獄詞遂簿觀叔英等家疏族外親莫不連染胡閏之獄所籍數百家號寃聲徹天兩列御史皆掩泣瑛謂人曰若不以叛逆處此輩則吾為無名于是諸忠臣無遺種矣八月以侍讀解縉編修黃淮字宗豫永嘉人入直文淵閣侍讀胡廣修撰楊榮編修楊士竒檢討金幼孜名善以字行新淦人胡儼字若思南昌人同入直預機務縉在建文中以董倫薦縉先入臨太祖為有司所劾謫河州衛吏上書于倫故倫薦之官翰林待詔秩九品不常設帝即位擢侍讀與淮常立御榻左備顧問或至夜分帝就寢猶賜坐榻前語機密至是命七人同入直預機務謂之內閣內閣之名自此始參預機務亦自此始執兵部尚書鐡鉉至不屈殺之初燕兵渡江鉉屯淮上師亦潰髙巍聞京城陷經死驛舍至是執鉉至反背坐廷中令其一回顧終不可遂磔于市以鉉非朝臣故不族其父母年皆八十餘安置海南殺御史大夫景清夷其族清倜儻尚大節燕師入諸臣死者甚衆清獨委蛇班行人怪之一日早朝衣緋懷刃入先是欽天監奏異星赤色犯帝座甚急帝故疑清及朝搜得所藏刃詰責之清奮起曰欲為故王報讐耳遂磔于市族之籍其鄉轉相攀染謂之瓜蔓抄村里為墟考王鏊守溪筆記載景消事云文皇至金川門百官迎拜江次清獨直立罵不已乃命左右抉其齒且抉且罵含血直噀上衣乃命醢之罪及九族久之上晝寢夢清入殿追之上曰清猶能為厲邪乃籍其鄉轉相攀謂之瓜蔓抄其説與遜國記表忠録諸書不同然以清死難在成祖未即位之前較之緋衣行刺似為近理今附注于此九月論邱福等三十人功封爵有差邱福淇國公朱能成國公張武封成陽侯等侯者十四人陳圭泰州人封泰寧侯鄭亨合肥人封武安侯孟善海豐人封保定侯火真蒙古人封同安侯顧成字景韶江都人封鎮逺侯王忠孝感人封靖安侯王聰蘄水人封武城侯徐忠合肥人封永康侯張信臨淮人封隆平侯李逺封安平侯鄭亮合肥人封成安侯房寬陳州人封思恩侯王寧封永春侯徐祥大冶人封興安伯等伯者十四人徐理西平人封武康伯李濬和州人封襄城伯張輔字文弼玉長子封信安伯唐雲封新昌伯談忠淵子封新寧伯孫巖鳯陽人封應城伯房勝景陵人封冨昌伯趙彛虹人封欣城伯陳旭全椒人封雲陽伯劉才字子才霍邱人封廣恩伯茹瑺封忠誠伯王佐封順昌伯陳瑄封平江伯又追封張玉榮公公談淵崇安侯徐增夀武陽侯陳亨涇國公王真金鄉侯亨夀州人真咸寧人冬十月重修太祖實録以建文中所修是非失實乃重修之命李景隆茹瑺監修前纂修官知府葉惠仲臨海人先以知縣充修實録書成遷南昌知府以直書帝起兵事族誅十一月立妃徐氏為皇后御批厯代通鑑輯覽卷一百一

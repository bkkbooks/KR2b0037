front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷六十三唐僖宗皇帝己乾符六年春正月高駢遣將分道擊黄巢大破之巢趣廣南
  hash: sha256:6432508784c184a20a736973718c0f61e36c69b185c42373ad315b85006fc61c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_062-1a, image: WYG0337/WYG0337-0470a.png}
body:
  text: 高駢遣其將張璘梁纘分道擊黄巢屢破之降其將秦彦徐州人畢師鐸寃句人李罕之項城人等巢遂趣廣南夏四月庚申朔日食以王鐸為行營招討都統上以羣盜為憂王鐸曰臣在朝不足分陛下之憂請自督諸將討之詔以鐸為荆南節度使行營都統鐸奏以李係為副使將精兵五萬屯潭州隋置今湖南長沙府是以拒黄巢係晟之曽孫也有口才而實無勇畧鐸以其家世良將故奏用之秋七月黄巢陷廣州節度使李迢死之黄巢上表求廣州節度使上命大臣議之左僕射于琮以為廣州市舶寶貨所聚豈可令賊得之宰相請除巢率府率唐置左右衛率府率各一人掌東宮兵仗羽衛從之巢得告身大怒詬執政急攻廣州陷之執節度使李迢使草表迢曰予代受國恩親戚滿朝腕可斷表不可草巢殺之高駢奏請遣兵馬使張璘將兵五千于彬州守險留後王重任將兵八千于循潮二州邀遮自將萬人自大庾嶺趣廣州擊巢巢必逃遁乞敇王鐸以兵三萬守梧昭桂永四州之險不許大庾嶺即梅嶺注見前梧州唐置今廣西梧州府是昭州亦唐置今廣西平樂府是永州隋置今湖南永州府是餘注並見前冬十月以高駢為淮南節度使充鹽鐵轉運使周寶字上珪平州盧龍人為鎮海節度使綱目于是條提綱高駢為淮南節度使下不書周寶為鎮海節度使而書崔安潛為西川節度使考唐書崔安潛傳乾符初安潛代高駢領西川節度使又高駢傳駢自西川徙荆南再授鎮海是安潛之領西川在高駢徙節鎮海之前不在是年也提綱所書似安潛于是年始受西川之命與本傳不符今依通鑑書周寶為鎮海不書安潛為西川再考通鑑是年三月有記安潛置黄頭軍事綱目移載于此今補注于後陳敬瑄為西川節度使條目黄巢陷潭州遣其將尚讓逼江陵王鐸走守將劉漢宏兗州人作亂黄巢在嶺南士卒罹瘴疫死者什三四其徒勸之北還以圖大事巢乃自桂州編筏沿湘而下抵潭州李係不敢出巢攻陷之係奔朗州遣尚讓進逼江陵衆號五十萬江陵兵不滿萬王鐸留其將劉漢宏守江陵自帥衆趣襄陽漢宏大掠北歸為盜後數日賊乃至漢宏尋寇宋兗遂掠申光詔諸道兵討之漢宏乃降十一月山南東道節度使劉巨容大破黄巢于荆門注見前黄巢趣襄陽劉巨容與江西招討使曹全晸合兵屯荆門闗以拒之賊至巨容伏兵林中全晸逆戰陽敗以誘賊伏發大破之俘斬什七八賊渡江東走或勸巨容窮追巨容曰國家喜負人有急則撫存將士不愛官賞事寧則棄之或更得罪不若留賊以為富貴之資衆乃止全晸渡江追賊㑹朝廷除代亦還由是賊勢復振陷鄂州掠饒今饒州府信今廣信府等十五州衆至二十萬十二月王鐸罷以盧攜同平章事初盧攜嘗薦高駢可為都統至是駢將屢破賊乃復以攜為相凡王鐸鄭畋所除將帥多易置之庚子廣明元年春二月殺左拾遺侯昌業昌業以盜賊滿關東而上專務遊戲賞賜無度田令孜專權無上社稷將危上疏極諫上大怒召昌業至内侍省賜死上善騎射劍槊法算至于音律蒱博無不精妙好蹴鞠鬬雞尤善擊毬甞謂優人石野猪曰朕若應擊毬進士舉須為狀元對曰若遇堯舜作禮部侍郎恐陛下不免駁放上笑而已改楊子院為發運使從高駢之請也度支以用度不足奏借富戸胡商貨財之半駢上言天下盜賊蜂起皆出于饑寒獨富户胡商未耳乃止三月以陳敬瑄為西川節度使崔安潛之鎮許昌也安潛先為忠武節度使田令孜為其兄陳敬瑄令孜本姓陳氏冒宦者姓為田敬瑄素微賤為餅師求兵馬使不得既而安潛代高駢鎮蜀蜀兵怯弱安潛募陳許壯士與蜀人相雜訓練得三千人皆戴黄帽號黄頭軍又奏乞洪州弩手教蜀人用弩走丸而射之選得千人號神機營蜀兵由是浸彊敬瑄因緣令孜得隸神策累遷大將軍至是令孜見關東羣盜日熾隂為幸蜀之計奏以敬瑄及其腹心楊師立王勗羅元杲鎮三川上令四人擊毬賭之敬瑄得第一籌即以為西川節度使代安潛師立鎮東川勗鎮興元以鄭從讜字正求餘慶之孫乾符五年九月同平章事為河東節度使河東軍屢亂乾符六年軍亂殺節度使崔季康是年正月復亂殺節度使康傳圭兵益驕故以宰相鎮之從讜奏以王調劉從龜字子長崇魯字郊文皆政會七世孫趙崇為參佐時人謂之小朝廷言名士之多也從讜貌温而氣勁多謀而善斷將士欲為惡者輙先覺誅之知張彦球有方畧本心非欲為亂乃獨推首亂者殺之慰諭彦球委以兵柄彦球為盡死力卒獲其用以高駢為諸道行營都統盧攜奏以駢為都統駢乃傳檄徵天下兵且廣召募得兵七萬威望大振攜病風不能行内挾田令孜外倚高駢寵遇甚厚貨賂公行豆盧瑑無他才附之崔沆時有啓陳常為所阻夏五月以李順融為樞密使始降白麻與將相同六月黄巢别將陷睦婺州睦州注見前婺州隋置今浙江金華府是黄巢屯信州遇疾疫卒徒多死張璘急擊之巢以金啗璘且致書請降于高駢駢欲誘致之許為之求節鉞時昭義感化義武等軍皆至淮南駢恐分其功乃奏賊不日當平不煩諸道兵悉遣歸之賊知之乃告絶請戰駢怒令璘擊之兵敗璘死巢勢復振陷睦婺兩州尋復陷宣州注見前遣宗正少卿李龜年使南詔與和親初南詔遣使求和親事具前比使還西川節度使崔安潛表以崔澹之議為是澹以和親不可許亦具前上命宰相議之盧攜豆盧瑑曰蠻數犯邊天下疲弊致百姓困為盜賊皆蠻故也不若且遣使臣報復縱未得其稱臣奉貢且不使之懐怨犯邊亦可矣乃詔陳敬瑄許其和親而不稱臣以宗正少卿李龜年充使賜以金帛中和初南詔上表欵附後遂以宗女妻之秋七月黄巢渡江黄巢自采石渡江圍天長唐縣今屬泗州六合即古堂邑隋置縣今屬江寧府兵勢甚盛淮南將畢師鐸言于高駢曰朝廷倚公為安危今賊數十萬衆乘勝長驅若不據險擊之使踰長淮必為大患駢以諸道兵已散張璘復死自度力不能制不敢出兵且上表告急先是盧攜謂駢有文武長才若悉委以兵柄黄巢不足平及表至人情大駭詔書責駢駢遂稱風痺不復出戰巢衆號十五萬副都統曹全晸以六千人與之戰顧有斬獲以衆寡不敵退屯泗上以候援軍而駢竟不之救賊遂擊破全晸悉衆渡淮李可舉幽州節度使討李克用大破之李琢蔚朔節度使討李國昌敗之國昌克用亡走達靼靺鞨别部居于隂山靼當割反劉友益曰逹靼始見此先是李琢與李可舉及吐谷渾都督赫連鐸共討沙沱沙沱大將高文集以朔州降至是李克用引兵擊文集可舉遣兵邀之于藥兒嶺胡三省注在雄武軍西雄武軍注見前大破之殺萬七千餘人李盡忠程懐信皆死琢及赫連鐸進攻蔚州李國昌戰敗部衆皆潰獨與克用及宗族北入達靼後數月赫連鐸隂賂達靼使取之克用知之時與其豪帥遊獵置馬鞭木葉或懸針射之無不中豪帥心服又置酒與飲酒酣克用言曰吾得罪天子願效忠而不得今聞黄巢北來必為中原患一旦天子若赦吾羅得與公輩南向共立大功不亦快乎人生幾何誰能老死沙磧邪達靼知無留意乃止冬十一月黄巢陷東都黄巢既渡淮所過不虜掠惟取丁壯以益兵遂陷申州入潁宋徐兗之境自稱天補大將軍轉牒諸軍云各宜守壘勿犯吾鋒吾將入東都即至京邑自欲問罪無預衆人胡三省注言已欲問罪于朝廷與衆人無預也京師聞之大恐盧攜稱疾不出豆盧瑑崔沆請發闗内及神策軍守潼闗上對宰相泣下田令孜陳幸蜀之計瑑和之上不懌令且發兵守潼闗令孜薦張承範等使將兵以令孜為都指揮制置招討等使巢入東都境汝鄭把截使齊克讓收軍退保潼闗奏乞早遣糧援上命選兩神䇿弩手得二千八百人令張承範等將以赴之巢陷東都留守劉允章帥百官迎謁巢入城勞問閭里晏然田令孜奏募坊市數千人以補兩軍以周岌為忠武節度使秦宗權上蔡人為蔡州刺史初忠武節度使薛能遣牙將秦宗權調發至蔡州會許州亂大將周岌逐能而殺之時詔諸道發兵屯溵水徐州兵過許昌大譟能慰撫之乃定時周岌亦引兵赴溵水聞之遽還襲殺徐卒以能待徐卒厚并殺之溵水注見前自稱留後宗權託云赴難選募蔡兵遂逐刺史據其城及是詔以岌帥忠武岌即表宗權為刺史十二月黄巢入潼闗張承範等發京師神䇿軍士皆長安富家子賂宦官竄名軍籍厚得廩賜未嘗更戰陳聞當出征父子聚泣多以金帛雇病坊貧人代行往往不能操兵是日上御章信門樓臨遣之承範進言聞黄巢擁數十萬之衆鼓行而西齊克讓以饑卒萬人依托闗下今遣臣以二千餘人屯於闗上而未聞為饋餉之計以是觀之臣竊寒心願陛下趣諸道精兵早為繼援上曰卿輩第行兵尋至矣十二月承範等至潼闗與克讓軍皆絶糧黄巢軍抵闗下不見其際呼聲振河華克讓力戰自午至酉士卒饑甚遂潰克讓走入闗賊急攻潼闗承範悉力拒之賊自闗左禁阬即峪口也在潼闗南平時禁人往來以榷征税謂之禁阬入夾攻潼闗闗上兵潰承範變服脱走巢入華州留其將喬鈐守之以黄巢為天平節度使先是巢將渡淮豆盧瑑請以天平節鉞授巢俟其到鎮討之盧攜以為不可乃止及是復下制授之以王徽字昭文京兆人裴澈休従子同平章事盧攜自殺田令孜聞巢已入闗恐天子責己乃歸罪于攜貶為賓客分司而薦徽澈為相攜仰藥死黄巢入長安帝走興元鳯翔博野長慶初李寰以博野兵三千歸京師留戍鳯翔名博野軍援兵至渭橋見新軍田令孜所募衣裘温鮮大怒掠之更為賊鄉導以趣長安既入城令孜帥神䇿兵五百奉帝自金光門出惟福穆澤夀四王夀王即昭宗餘無考及妃嬪數人従行百官皆莫之知晡時賊前鋒入長安金吾將軍張直方帥文武數十人迎于灞上巢入城數日其徒各出大掠巢不能禁尤憎官吏得皆殺之上趣駱谷鳯翔節度使鄭畋謁于道次請留鳯翔上曰朕不欲密邇巨寇且幸興元徵兵以圖收復卿可糾合鄰道勉建大勲畋曰道路梗澁奏報難通請得便宜從事許之黄巢僭號巢殺唐宗室在長安者無遺類遂入宫自稱大齊皇帝改元金統唐官三品以上悉停四品以下如故以尚讓為太尉命朱温屯東渭橋温碭山人少孤貧與兄昱存依萧縣劉崇家崇數笞辱之崇母獨憐之戒家人曰朱三非常人也汝曹善遇之胡三省曰朱温始此豆盧瑑崔沆于琮劉鄴匿民間巢搜獲皆殺之廣徳公主曰我唐室之女誓與于僕射俱死賊并殺之將作監鄭綦庫部郎中鄭係義不降賊舉家自殺張直方多納亡命匿公卿于複壁巢殺之鳯翔節度使鄭畋合鄰道兵討賊鄭畋還鳯翔召將佐議拒賊皆曰賊勢方熾且宜従容以俟兵集乃圖收復畋曰諸君勸畋臣賊乎因悶絶仆地不能言會巢使者以詔書至監軍與之宴樂奏將佐以下皆哭使者怪之幕客靳儲曰以相公風痺不能來故悲耳民間聞者莫不泣畋聞之曰吾固知人心尚未厭唐賊授首無日矣乃刺指血為表遣使詣行在召將佐諭以逆順皆聴命刺血與盟完城塹繕器械訓士卒密約鄰道合兵討賊鄰道皆許諾時禁軍分鎮闗中者尚數萬畋使人招之皆至軍勢大振巢遣人齎詔召畋畋斬之車駕至興元詔諸道出兵收復京師義成節度使王處存京兆萬年人舉兵入援處存聞長安失守號哭累日不俟詔命舉軍入援遣千人間道詣興元衛車駕黄巢遣朱温攻河中節度使王重榮太原祁人與戰大破之遂入援黄巢之入闗也王重榮為河中留後請降于巢既而巢遣使調發河中吏民不勝其苦重榮謂衆曰始吾屈節以紓患今調發不已亡無日矣悉驅巢使者殺之巢遣朱温擊河中重榮與戰大破之獲糧仗四十餘船遣使與王處存結盟引兵營于渭北辛丑中和元年春正月帝幸成都陳敬瑄遣兵奉迎請幸成都田令孜亦勸上上従之以蕭遘字得聖寘之子王鐸同平章事上次綿州以遘同平章事及至成都以鐸守司徒復同平章事時裴澈亦自賊中奔詣行在二月加高駢東面都統上遣使趣駢討黄巢道路相望駢終不出兵三月以鄭畋為京城四面諸營都統詔以畋為都統蕃漢將士赴難有功者並聴其墨敕除官畋奏以涇原節度使程宗楚為副都統黄巢遣尚讓帥衆五萬寇鳯翔畋使司馬唐𢎞夫伏兵要害自以兵數千陳于高岡賊以畋書生輕之鼓行而前伏發大敗于龍尾陂斬首二萬餘級東龍尾陂在鳯翔府岐山縣赦李克用遣李友金召之友金克用族父也前與高文集同降及是代北監軍陳景思帥之入援至絳州以賊勢方盛乃俱還代州募兵得三萬人屯于崞西崞縣之西也崞縣注見前友金因説景思曰吾兄司徒父子勇畧遇人為衆所服請奏天子赦其罪召以為帥則代北之人一麾響應賊不足平也景思遣使言之詔如所請友金以五百騎迎之克用帥達靼諸部萬人來赴鄭畋傳檄天下合兵討賊宥州注見前刺史拓䟦思恭本党項羌也紏合夷夏兵㑹鄜延節度使李孝昌同盟討賊奉天鎮使齊克儉遣使詣鄭畋求自效畋乃傳檄天下合兵討賊時天子在蜀詔令不通天下謂朝廷不能復振及得畋檄爭發兵應之賊懼不敢復窺京西而諸道并四夷貢獻行在不絶蜀中府庫充實賞賜不乏士卒欣悅夏四月官軍入長安黄巢走還襲之殺副都統程宗楚鳯翔司馬唐𢎞夫復據長安是時唐𢎞夫屯渭北王重榮屯沙苑王處存屯渭橋拓䟦思恭屯武功鄭畋屯盩屋𢎞夫乘龍尾之捷進薄長安黄巢帥衆東走程宗楚先入𢎞夫繼至處存帥鋭卒五千夜入城民讙呼出迎爭以瓦礫擊賊軍士釋兵入第舎掠金帛妓妾賊露宿灞上詢知官軍不整還襲之大戰長安中宗楚𢎞夫死軍士死者什八九處存收餘衆還營巢復入長安縱兵屠殺流血成川謂之洗城諸軍皆退五月高駢移檄討賊出屯東塘即茱萸灣在今掦州府江都縣東北亦曰灣頭有雙雉集廣陵府舎占者以為城邑將空之兆駢惡之乃移檄四方云將入討黄巢發兵八萬舟二千艘出屯東塘諸將數請行期駢託風濤為阻竟不發忠武監軍楊復光克鄧州黄巢之陷長安也周岌降之甞以夜晏急召監軍楊復光左右曰周公臣賊將不利於内侍不可往復光曰事已如此義不圖全即詣之酒酣岌言及本朝復光泣下良久曰丈夫所感者恩義耳公自匹夫為公侯奈舎十八葉天子而臣賊乎岌亦流涕曰吾不能獨拒戰故貌奉而心圖之今日召公正為此耳因瀝酒為盟分軍八千人為八都遣牙將鹿晏𢎞晉暉皆許州人王建字光圖舞陽人韓建字佐時長社人張造李師泰亦皆許州人龎從曹州人後更名師古等考異曰上書八都而下止有王建等七人姓名諸書無可考也將之時朱温方陷鄧州復光帥八都以擊温敗之遂克鄧州胡三省曰王建始見此六月以鄭畋為司空同平章事都統如故李克用陷忻代州克用牒河東稱奉詔將兵討黄巢令具頓遞鄭從讜閉城設備而犒給之克用累日不發縱沙陀剽掠城中大駭尋引兵還陷忻代留居代州既而克用復寇蔚州秋七月西川黄頭軍作亂討平之田令孜為行在都指揮處置使頒賜從駕諸軍無虚日不及蜀軍頗有怨言令孜宴土蜀軍客従駕軍都頭唐中業以後一部之軍謂之一都其部帥呼為都頭以金杯行酒賜之都頭皆拜受黄頭軍使郭琪獨不受起言曰蜀軍與諸軍同宿衛而賞賜懸殊頗有觖望恐萬一致變願軍容減諸將之賜以均蜀軍使土客如一則上下幸甚令孜黙然有目琪曰汝有功邪答曰琪生長山東征戍邊鄙甞與党項契丹數十戰又甞征吐谷渾傷脇腸出線縫復戰乃自酌酒于别樽以賜琪琪知其毒不得已飲之歸殺一婢吮其血以解毒吐黑汁數升遂帥所部作亂令孜奉天子保東城閉門登樓命諸軍擊之琪夜突圍出奔高駢于廣陵琪至江岸兵衆皆散唯一吏從琪解印劍授之令齎詣陳敬瑄且教之曰汝見陳公言郭琪渡江我以劍擊之墜水尸隨湍流下矣陳公必據汝言懸榜安衆汝得厚賞吾家亦可保無恙也遂逸去敬瑄果免其家殺左拾遺孟昭圖上日夕專與宦官同處議天下事待外臣殊薄左拾遺孟昭圖上疏曰治安之代遐邇猶應同心多難之時中外尤當一體去冬車駕西幸不告南司遂使宰相以下悉為賊所屠前夕黄頭軍亂陛下亦不召宰相朝臣至今未知聖躬安否夫天下者高祖太宗之天下非北司之天下天子者九州四海之天子非北司之天子北司未必盡可信南司未必盡無用若天子與宰相了無闗涉朝臣皆若路人恐收復之期尚勞宸慮疏入令孜屏不奏矯詔貶昭圖嘉州後周置今四川嘉定府是司户遣人沉於蟇頤津在眉州東蟇頤山下山臨江津即玻璃江也聞者氣塞八月星交流如織或大如杯椀感化牙將時溥彭城人殺節度使支詳詔以溥為留後支詳遣時溥陳璠將兵入闗討黄巢至東都矯稱詳命還師而東及彭城詳迎勞甚厚溥説詳曰衆心見迫請公解印以相授詳不能制璠謂溥曰支僕射有惠于徐人不殺必成後悔溥不許送詳歸朝璠伏甲于七里亭亭去徐州七里因名并其家屬殺之詔以溥為留後溥表璠為宿州刺史尋殺之溥甞因食中毒疑判官李凝古殺之凝古父損為散騎常侍在成都溥奏凝古父同謀田令孜受其賂令御史臺鞫之蕭遘奏曰李凝古行毒事出曖昧父損相别數年安得誣以同謀溥恃功亂法欲殺天子侍臣若狥其欲朝廷何以自立損乃得免時令孜專權羣臣莫敢迕視惟遘屢與爭辨朝廷倚之夀州人王緒作亂陷光州夀州屠者王緒與妹夫劉行全聚衆五百盜據本州月餘復陷光州有衆萬餘人秦宗權表為光州刺史固始縣佐唐制諸縣丞簿尉以下有司功司户諸佐王潮字信成光州固始人及弟審邽字次都審知字信通皆以材氣知名緒以潮為軍正信用之胡三省曰王潮事始此九月高駢罷兵還府駢與鎮海節度使周寳俱出神策軍駢以兄事寳及封壤相鄰數爭細故遂有隙駢檄寳入援寳治舟師以俟之怪其久不行幕客或曰高公有併吞江東之志聲云入援未必非圖我也㑹駢使人約寳面㑹𤓰洲在揚州府江都縣南江濱有城為南北襟要地議軍事寳辭疾不往由是遂為深仇駢留東塘百餘日詔屢趣之駢上表託以寳將為後患復罷兵還府駢召董昌至廣陵錢鏐説昌曰觀高公無討賊心不若去之昌従之自石鐃引兵入據杭州周寳表為杭州刺史冬十月鳯翔行軍司馬李昌言作亂鄭畋赴行在李昌言將兵屯興平時鳯翔倉庫虚竭犒賞稍薄昌言因激怒其衆引軍還襲府城鄭畋登城謂之曰行軍茍能戢兵愛人為國滅賊亦可以順守矣乃以留務委之即日西赴行在詔以畋為太子少𫝊分司昌言為鳯翔節度使壬寅二年春正月以王鐸為諸道行營都統王鐸以高駢無心討賊自以身為首相發憤請行懇欵流涕至于再三上許之以鐸充都統罷高駢但領鹽鐵轉運使驛召崔安潛為副都統以周岌王重榮為司馬諸葛爽青州博昌人康寔為先鋒使又以王處存李孝昌拓䟦思恭為京城三面都統以楊復光為南面營都監使二月以鄭畋為司空同平章事軍事一以咨之夏四月王鐸以諸道兵逼長安鐸將兩川興元之軍屯靈感寺在西安府富平縣涇原屯京西易定河中屯渭北邠寧鳯翔屯興平保大定難屯渭橋忠武屯武功官軍四集巢勢日蹙號令所行不出同華時長安城中斗米直三十緡賣人為糧以肥瘠論價五月加高駢侍中罷鹽鐵轉運使駢既失兵柄復解利權攘袂大詬上表自訴言辭不遜上命鄭畋草詔切責之駢臣節既虧貢賦遂絶駢好神仙寵信方士吕用之用之引其黨張守一等共蠱惑駢駢與鄭畋有隙用之謂曰宰相有遣劍客來刺公者今夕至矣惟張先生可以禦之駢請于守一守一乃使駢衣婦人服潛于他室而代駢居寢中夜擲銅器于堦令鏗然有聲又密以彘血灑庭宇如格鬬之狀及旦笑謂駢曰幾落奴手駢泣謝之用之刻青石為竒字曰玉皇授白雲先生髙駢密令左右置道院香案駢得之驚喜用之曰玉皇以公焚修功著将補真官計鸞鶴不日當降是後駢于道院庭中刻木鶴時著羽服跨之用之又欲以兵威脅制諸将請募驍勇二萬人號莫邪都駢即以張守一及用之為軍使置将吏如帥府又慮人泄其姦謀乃言于駢曰神仙不難致但恨學道者不能絶俗累故不肯降臨耳駢乃悉去姬妾謝絶人事賓客将吏皆不得見有不得已見之者皆先令沐浴齋祓拜起纔竟已復引出由是用之専行威福無所忌憚而境内亦不復知有駢矣六月蜀中羣盗起先是卭州牙官阡能西蜀夷有阡姓因公事違期亡命為盗踰月衆至萬人横行卭雅于是羣盗並起羅渾擎句胡僧羅夫子韓求各聚衆數千人應之官軍與戰大敗官軍恐獲罪多執村民為俘陳敬瑄不問悉斬之其中亦有老弱婦人或問之皆曰我方治田續麻官軍忽繫虜以來不知何罪既而峽賊韓秀昇唐書作故涪州刺史屈行從以兵㫁峽江路即三峽之路為盗陳敬瑄遣兵討之復為所敗江淮貢賦㫁絶雲安淯井路不通乏鹽鹽雲安後周縣今曰雲陽属四川夔州府縣有井淯井在四川叙州府長寧縣北産鹽敬瑄乃以押牙髙仁厚史傳不詳里系為都招討指揮使先討阡能等平之仁厚獲阡能謀者温言慰問謂曰汝歸潜語諸寨我明日且戰有能釋甲迎者當署背為歸順字遂縱之去命諸將毁柵鼓而前羅渾擎設伏詐降仁厚遣將不持兵入諭其衆皆真降渾擎窮而走衆執之仁厚曰愚人不足語乃署降衆背令前驅過諸寨則大呼曰羅渾擎已降大軍至矣因示以背字寨中皆爭出降執句胡僧斬韓求羅夫子奔阡能寨謀決戰會前驅者至衆皆不應羅夫子自到衆挈其首縛阡能以獻仁厚出兵凡六日五賊皆平餘衆悉降明年敬瑄復奏以仁厚為行軍司馬討峽路羣盜仁厚攻焚賊寨鑿沉其舟賊精兵盡在舟中而資糧子女則皆在寨仁厚訪知之乃揚兵江上久之不戰潛遣千人直薄賊寨火而譟之賊率舟兵救火仁厚令善泅者鑿其舟皆沉衆惶懼多潰仁厚遣兵于要路遮擊且招之賊衆執秀昇行従以降仁厚問狀秀昇曰自大中皇帝晏駕天下無復公道紐解絶今日反者豈獨秀昇杋上之肉惟所烹醘仁厚愀然械送行在斬之秋七月以鍾傳為江西觀察使初王仙芝寇掠江西高安唐縣今為江西瑞州府治人鍾傳聚蠻獠依山為堡衆至萬人仙芝陷撫州唐置今為府屬江西而不能守傳入據之詔即以為刺史至是又據洪州注見前朝廷遂以傳為觀察使傳既去撫州南城漢縣今為江西建昌府治人危全諷復據之遣其弟存昌據信州傳尋拜鎮南節度使攻撫州久不下傳自率兵圍之會城中夜起火諸將請急攻傳曰君子不迫人之危乃掃地祭天嚮城再拜祝曰全諷不降非民之罪願天止火全諷聞之即降傳居江西三十年累拜太保中書令封南平王八月劉漢宏寇杭州董昌擊破之先是劉漢宏既降以為宿州刺史漢宏怨朝廷賞薄乃復以為浙東觀察使至是漢宏遣其弟漢宥將兵二萬營于西陵注見前謀併浙西董昌遣兵馬使錢鏐拒之鏐夜濟江襲其營大破之九月朱温以華州降王鐸以為同華節度使朱温見黄巢兵勢日蹙知其將亡遂舉州降冬十月以朱温為河中行營招討副使賜名全忠以王敬武青州人為平盧留後平盧大將王敬武逐其節度使安師儒自稱留後朝廷因而授之時諸道兵皆㑹關中獨平盧不至王鐸遣判官張濬字禹川河間人往説之敬武已受黄巢官爵不出迎濬見而責之曰公為藩臣侮慢詔使不能事上何以使下敬武愕然謝之既宣詔將士皆不應濬徐諭之曰人生當先曉逆順次知利害黄巢販鹽虜耳公等捨累葉天子而臣之果何利哉今天下勤王之師皆集京畿而淄青獨不至一旦賊平天子返正公等何面目見天下之人乎將士皆改容引咎曰諫議濬以諫議大夫為判官之言是也敬武即發兵従濬而西十一月李克用將沙陀趣河中黄巢兵勢尚彊王重榮謀于都監楊復光復光曰鴈門李僕射驍勇有彊兵素有徇國之志所以不來者以與河東結隙耳若以朝旨諭鄭公而召之必來則賊不足平矣時王鐸在河中乃以墨敕召克用諭鄭從讜克用遂將沙陀萬七千人趣河中不敢入太原境獨以數百騎過晉陽城下别從讜從讜厚贈之十二月以李克用為鴈門節度使克用將兵四萬至河中皆衣黑賊憚之曰鵶軍至矣皆避其鋒癸卯三年春正月李克用敗賊將黄揆巢之弟于沙苑王鐸以克用為東北面行營都統以王鐸為義成節度使田令孜欲歸重北司稱鐸討黄巢久無功卒用楊復光策召沙陀而破之故罷鐸兵柄以悅復光以田令孜為十軍十二衛觀軍容使令孜自以建議幸蜀收傳國寳列聖真容散家財犒軍為已功令宰相請加賞故有是命魏博節度使韓簡寇鄆州及河陽其將樂行逹殺之自韓允中據魏博至簡凡二世十二年詔以為留後賜名彦禎尋以為節度使成徳節度使王景宗卒以其子鎔為留後鎔生方十嵗三月李克用圍華州黄巢遣尚讓救之克用逆戰破之巢兵數敗食復盡陰為遁計發兵三萬搤於革反藍田道所以通武闗南走之路遣尚讓救華州李克用及王重榮引兵逆戰破之克用進軍渭橋毎夜令其將薛志勤康君立潛入長安焚積聚斬虜而還賊中大驚以楊行愍字化源合肥人後更名行密為廬州刺史行愍本廬州牙將勇敢屢有戰功都將忌之屢遣戍行愍過辭都將陽為好言問所乏對曰唯少公頭耳即斬之自稱八營都知兵馬使刺史不能制薦於高駢高駢以為押牙知廬州事朝廷因而命之行愍聞州人王勗賢召欲用之固辭問其子弟曰子潛好學愼密可任以事弟子稔有氣節可為將行愍召潛置門下以稔及定逺人季章為騎將胡三省曰楊行密事始此夏四月李克用破黄巢收復長安李克用與忠武將龎従河中將白志遷等引兵先進與黄巢軍戰于渭南一日三捷義成義武諸軍繼之賊衆大奔克用等入京師巢焚宫室遁去多遺珍寳于路官軍爭取之不急追賊遂逸去詔克用同平章事斬巢相崔璆克用時年二十八于諸將最少而兵勢最彊破黄巢復長安功第一諸將皆畏之克用一目微眇時人謂之獨眼龍六月黄巢取蔡州節度使秦宗權降之合兵圍陳州巢使其驍將孟楷擊蔡州宗權逆戰而敗遂稱臣于巢初陳州刺史趙犨陳州宛邱人謂將佐曰巢不死長安必東走陳其衝也不可不為之備乃完城塹繕甲兵積芻粟六十里之内民有資糧者悉徙之入城多募勇士使子弟分將之楷果移兵擊陳犨先示之弱伺其無備襲擊殺獲殆盡擒楷斬之巢聞之怒與宗權合兵圍城掘塹五重百道攻之陳人大恐犨諭之曰忠武素著義勇陳州號為勁兵况吾家久食陳禄誓與此州存亡且徇國而死不愈于臣賊而生乎有異議者斬數引鋭兵開門擊賊破之巢益怒營于州北為持久之計時民間無積聚賊掠人為糧生投碓磑并骨食之號其處曰舂磨塞已而犨求救于鄰道朱全忠救之敗賊于鹿邑全忠遂據亳州鹿邑隋縣今屬河南歸徳府以劉謙一名知謙字徳光其先上蔡人後家南海為封州刺史初謙為嶺南小校節度使韋宙竒之妻以兄女及是謙屢擊盜有功故有是命胡三省曰劉謙事始此秋七月以朱全忠為宣武節度使時汴宋荐饑驕軍難制外有大敵衆心危懼而全忠勇氣益振左驍衛上將軍楊復光卒于河中尹起莘曰復光宦者而其爵予其忠于王室也復光慷慨善忠義善撫士卒及卒軍中慟哭累日八都將各以其衆散去田令孜素忌復光聞其卒甚喜因擯斥其兄樞密使復恭為飛龍使令孜專權人莫與之抗惟復恭數與之爭得失故令孜惡之鄭畋罷為太子太保畋雖當播越猶謹法度田令孜為判官呉圓求郎官畋不許陳敬瑄欲立于宰相之上畋以故事使相唐時節度使帶平章事及三公者謂之使相品秩雖高皆居首相之下固爭之二人乃令鳯翔節度使李昌言上言軍情猜忌不可令畋扈從過此乃罷之冬十月李克用取潞州昭義節度使孟方立邢州人以潞州地險人勁屢簒主帥欲遷治所于邢州潞人不悦潛乞師于李克用克用遣其弟克修字崇逺擊之取潞州是後克用每嵗出兵爭山東三州邢洺磁之人半為俘馘野無稼穡矣十二月忠武將鹿晏𢎞楊復光八都將之一據興元晏𢎞帥所部自河中南掠襄鄧金洋所過屠滅聲云西赴行在至興元遂逐節度使牛勗自稱留後時楊復光既卒故晏𢎞散而謀割據甲辰四年春二月東川節度使楊師立舉兵反三月詔以高仁厚為留後將兵討之高仁厚之討韓秀昇也陳敬瑄語之曰成功而還當奏以東川相賞楊師立聞之怒令孜恐其為亂徵為右僕射師立得詔書不受代殺官告使奉僕射告身于師立者及監軍使舉兵進屯涪城移檄行在及諸道數陳敬瑄十罪自言集本道將士十五萬人長驅問罪詔仁厚討之夏四月李克用會許汴徐兗之軍于陳州黄巢退走黄巢兵尚彊周岌時溥朱全忠等求救于李克用克用將蕃漢兵五萬救之巢圍陳州幾三百日趙犨兄弟與之大小數百戰雖兵食將盡而衆心益固克用㑹許汴徐兗之軍于陳州攻尚讓于太康㧞之巢聞之懼解圍而去五月黄巢趣汴州李克用等追擊大破之尚讓帥衆降巢收餘衆奔兗州五月大雨平地深三尺許巢營為水所漂且聞李克用將至遂引兵東北趣汴州至尉氏尚讓以驍騎五千進逼大梁全忠復告急于克用克用追之及于中牟北至滿渡胡三省注汴河津濟之地乘其半濟奮擊大破之殺萬餘人賊遂潰尚讓帥其衆降巢踰汴而北克用追擊之于封邱又破之巢收餘衆近千人東奔兗州克用追至寃句騎能屬者纔數百人晝夜行二百餘里以糧盡還汴州獲巢幼子及乘輿服器等物得所掠男女萬餘人縱遣之李克用至汴州朱全忠襲之克用走還李克用至汴州全忠固請入城館于上源驛在開封府城南就置酒甚恭克用乘酒使氣語頗侵之全忠不平薄暮罷酒從者皆醉宣武將楊彦洪密與全忠謀連車塞路發兵圍驛而攻之克用醉不之聞侍者郭景銖扶克用匿床下以水沃其面而告之克用始張目援弓而起須臾烟火四合㑹大雨震電天地晦冥親兵薛志勤扶克用隨電光縋城得出全忠誤射彦洪殪之克用還軍中克用妻劉氏多智畧左右先歸者以變告劉氏神色不動立斬之險召大將約束謀保軍以還比明克用至欲勒兵攻全忠劉氏曰此當訴言朝廷若擅舉兵相攻則天下孰能辨其曲直且彼得以辭矣克用從之引兵去移書責全忠全忠復書曰前夕之變僕不之知朝廷自遣使者與楊彦洪為謀彦洪既伏其辜惟公諒察克用乃歸晉陽克用養子嗣源年十七從克用自上源出矢石之間獨無所傷嗣源本胡人名邈佶烈無姓克用擇軍中驍勇者皆養為子韓嗣昭張嗣本駱嗣恩張存信孫存進王存賢安存孝皆以養子冒姓李氏所謂義兒也李嗣源即後唐明宗始見此韓嗣昭汾州太谷縣民家子張嗣本鴈門人駱嗣恩吐谷澤部人張存信回鶻張政子孫存進振武人王存賢本名賢許州人安存孝本名敬思代州飛狐人六月東川將吏斬楊師立降詔以高仁厚為東川節度使先是高仁厚至徳陽此唐所置徳陽縣也今屬綿州漢故縣在今潼川府射洪縣楊師立遣其將鄭君雄等據鹿頭闗以拒仁厚擊敗之仁厚陳于闗下君雄等悉衆出戰仁厚設伏于陳後陽敗走君雄等追之伏發大敗遁還遂進圍梓州東川節度所治久之不下仁厚乃為書射城中遺其將士諭降及是鄭君雄大呼于衆曰天子所誅者元惡耳他人無預也衆大譟突入府師立自殺君雄挈其首出降詔以仁厚為東川節度使後仁厚為陳敬瑄所殺尚讓敗黄巢于瑕邱注見前賊黨斬巢以降尚讓追黄巢至瑕邱敗之巢衆殆盡巢甥林言斬巢兄弟妻子首將詣時溥沙陀軍奪之并斬言首以獻于溥天平節度使朱瑄新舊書五代史俱作朱宣宋州下邑人徐無黨曰俗以宣為瑾兄于名加玉非也今從通鑑作瑄擊秦宗權敗之秦宗權縱兵四出侵噬鄰道天平節度使朱瑄瑄先為天平牙將署濮州刺史留後曹存寔戰死瑄守鄆州有功拜節度使有衆三萬從父弟瑾勇冠三軍朱全忠為宗權所攻勢甚窘求救于瑄瑄遣瑾將兵救之敗宗權于合鄉馮智舒曰在徐州沛縣即古互鄉全忠徳之與瑄約為兄弟秋七月時溥獻黄巢首時溥遣使獻黄巢首并其姬妾上御樓受之宣問姬妾汝曹皆勲貴子女何為從賊其居首者對曰狂賊㓙逆國家以百萬之衆失守宗祧播遷巴蜀今陛下乃以不能拒賊責一女子置公卿將帥于何地乎上皆戮之李克用表乞討朱全忠詔諭解之李克用之還晉陽也大治兵甲奉表自陳為朱全忠所圖將佐三百餘人并牌印皆没不返乞遣使按問發兵討之朝廷方務姑息得表大恐但優詔和解之克用前後八表稱全忠隂狡禍賊異日必為國患惟乞下詔削其官爵臣自帥本道兵討之上累遣楊復恭等諭旨稱吾深知卿寃方事之殷姑存大體克用終鬱不平時藩鎮相攻者朝廷不復為之辯曲直由是互相吞噬惟力是視皆無所稟受矣八月進李克用爵為隴西郡王李克用請以其弟克修鎮潞從之由是昭義分為二澤潞為一鎮邢洺磁為一鎮九月以王徽知京兆事上以長安宫室焚毁故久留蜀未歸以徽為京兆尹招撫流散繕治宫室冬十一月鹿晏𢎞據許州詔以為忠武節度使晏𢎞之去河中也王建韓建張造晉暉李師泰各帥其衆與之俱晏𢎞猜忍衆心不附田令孜密遣人誘之二建與張造晉暉李師泰帥衆數千奔行在令孜養以為假子拜諸衛將軍使各將其衆號隨駕五都又遣諸將討晏𢎞晏𢎞棄興元䧟襄州劉巨容奔成都巨容能燒藥為黄金田令孜求其方不與後遂殺之滅其族轉掠房鄧還據許州節度使周岌棄城走晏𢎞遂自為留後朝廷不能討因以為節度使後二年秦宗權陷許州殺晏𢎞田令孜殺内常侍曹知慤初宦者曹知慤華原人有膽畧黄巢陷長安知慤集壯士據嵯峨山注見前數遣人變服夜入長安攻賊營賊驚疑不自安朝廷聞而嘉之就除内常侍田令孜惡之矯詔使邠寧將王行瑜邠州人襲殺之令孜由是益驕横禁制天子不得有所主斷上時語左右而流涕十二月以陳巖為福建觀察使初黄巢轉掠福建建州人陳巖聚衆數千保鄉里號九龍軍觀察使鄭鑑表以自代巖為治有威惠閩人安之盜殺中書令王鐸先是鐸以朱全忠驕悍難制表請還朝詔徙鐸義昌節度使太和中置治滄州鐸厚于奉養及是過魏州侍妾成列服御鮮華魏博節度使樂彦禎之子從訓圍而殺之掠其侍妾彦禎以遇盜聞朝廷不能詰乙巳光啓元年春正月詔招撫秦宗權黄巢雖平宗權復熾寇掠焚剪其殘暴又甚于巢軍行未始轉糧車載鹽屍以從北至衛滑西及關輔東盡青齊南出江淮極目千里無復烟火上將還長安畏宗權為患詔招撫之車駕發成都王緒陷汀漳二州皆唐置今俱為府屬福建秦宗權責租賦于光州刺史王緒不能給宗權怒發兵擊之緒懼悉舉光夀二州兵五千人渡江轉掠江洪䖍州是月陷汀漳然皆不能守也三月車駕至京師京師荆棘滿城狐兎縱横上凄然不樂時朝廷號令所及惟河西山南劍南嶺南數十州而已秦宗權僭號詔以時溥為行營都統討之李可舉王鎔寇易定王處存擊破之盧龍節度使李可舉成徳節度使王鎔惡李克用之彊而義武節度使王處存與克用親善又河北唯義武尚屬朝廷可舉等慮其害己約共滅而分之可舉遣其將李全忠范陽人攻易州鎔亦遣將攻無極漢縣今屬正定府盧龍裨將劉仁恭深州人穴地入城陷易州李克用自將救無極大敗成徳兵拔新城處存夜遣兵䝉羊皮襲盧龍軍復取易州夏六月盧龍將李全忠殺李可舉而代之全忠既喪師恐獲罪還襲幽州李可舉自焚死全忠自為留後秦宗權遣將孫儒河南人陷東都留守李罕之與儒相拒數月兵少食盡棄城西保澠池儒據東都月餘焚掠而去城中寂無雞犬秋七月殺右補闕常濬濬上疏曰陛下姑息藩鎮太甚是非功過駢手并足致天下紛紛若此猶未之寤宜稍振典刑以威四方田令孜曰此疏傳于藩鎮豈不致其猜忿貶濬萬州唐置今屬廣東瓊州府司户尋賜死八月以趙犨為蔡州節度使秦宗權攻鄰道二十餘州陷之唯陳距蔡百餘里兵力甚弱刺史趙犨日與宗權戰宗權不能屈詔以犨為蔡州節度使犨徳朱全忠之援凡所調發無不立至王緒前鋒將擒緒奉王潮為將軍王緒至漳州以道險糧少令軍中毋得以老弱自隨犯者斬唯王潮兄弟挾其母以從緒責之曰軍皆有法未有無法之軍汝違吾令而不誅是無令也潮等曰人皆有母未有無母之人將軍奈何使人棄其母乎緒怒命斬其母潮等曰潮等事母如事將軍既殺其母安用其子請先母死將士皆為之請乃舎之有望氣者謂緒曰軍中有王者氣于是緒見將卒有勇畧及氣質魁岸者皆殺之衆皆自危行至南安隋縣今属福建泉州府潮説其前鋒將伏壯士篁中擒緒反縛以徇遂奉潮為將軍引兵將還光州約其屬所過秋毫無犯行及沙縣唐縣今屬福建延平府泉州人張延魯等以刺史廖彦若貪暴帥耆老奉牛酒請潮為州將潮乃引兵圍泉州既而潮拔泉州殺廖彦若聞觀察陳巖威名不敢犯福州境遣使降之巖表潮為泉州刺史潮沈勇有智畧招懐離散均賦繕兵吏民悦服王緒自殺冬十月田令孜遣朱玫邠州人李昌符昌言之弟攻河中李克用救之十二月進逼京城先是田令孜自兼兩池榷鹽使安邑解縣兩池舊隷鹽鐵中和以來河中節度使王重榮專之嵗獻三千車以供國用令孜奏復舊制自兼兩池使收其利以贍軍徙河中節度使王重榮為泰寧節度使方鎮表昭宗乾寜四年始賜號沂海節度使為泰寧軍此云泰寧葢史臣追叙之文也重榮自以有復京城功為令孜所擯不肯之兖州表數令孜十罪令孜結邠寧節度使朱玫鳯翔節度使李昌符李昌言卒表以昌符為節度使以抗之重榮求救于李克用克用方怨朝廷不罪朱全忠選兵市馬聚結諸胡議攻汴州報曰待吾先滅全忠還掃鼠輩如秋葉耳重榮曰待公自關東還吾為虜矣不若先除君側之惡退擒全忠易矣時玫昌符亦陰附于全忠克用乃上言玫昌符與全忠相表裏欲共滅臣臣不得不自救已集蕃漢兵十五萬決以來年濟河北討二鎮不近京城保無驚擾還滅全忠以雪讐耻上遣使者諭釋冠蓋相望玫欲朝廷討克用數遣人潛入京城燒積聚殺近侍聲云克用所為于是京師震恐令孜遣玫昌符將本軍及神策等軍合三萬人屯沙苑以討重榮重榮發兵拒之告急于克用克用引兵赴之與重榮俱壁沙苑表請誅令孜及玫昌符詔和解之克用不聽十二月合戰玫昌符大敗克用進逼京城令孜奉天子幸鳯翔長安宫室為亂兵焚掠無孑遣矣丙午二年春正月田令孜刦帝如寳雞即漢陳倉唐改名陳倉注見前李克用還軍河中與王重榮同表請上還宫因罪狀田令孜請誅之令孜引兵入宫刦上幸寳雞從者纔數百人宰相朝臣皆不知翰林承旨杜讓能字羣懿審權子獨追及之明日乃有太子少保孔緯字化文戣之孫等數人繼至太廟神主皆失之上以緯為御史大夫使還召百官時田令孜弄權再致播遷天下共忿疾之朱玫李昌符亦恥為之用且憚蒲晉之彊更與之合蕭遘召玫亟迎車駕玫引歩騎五千至鳯翔孔緯詣宰相宣詔蕭遘裴澈以令孜在上側辭疾不見緯令臺史趣百官赴行在皆辭以無袍笏緯召三院御史泣謂曰布衣親舊有急猶當赴之豈有天子䝉塵而臣子累召不徃邪御史請辦裝數日而行緯拂衣而起曰吾妻病垂死且不顧諸君善自為謀請從此辭遂復走行在朱玫李昌符追逼車駕帝復走入大散關注見前邠岐兵追逼乘輿鉦鼓之聲聞于行宫田令孜奉上發寳雞神策軍使王建以長劍五百前驅奮擊乘輿乃得前上以傳國寳授建使負之以從登大散嶺李昌符焚閣道丈餘將摧折矣王建挾上自煙焰中躍過夜宿板下上枕建膝而寢既覺始進食解御袍賜建曰以其有淚痕故也比明車駕纔入散關玫至攻不能克嗣襄王煴肅宗元孫以疾留遵塗驛唐書煴本傳驛在石鼻石鼻城在寳雞縣東為玫所得與之俱還鳯翔克用還太原重榮與玫昌符復表請誅田令孜三月帝至興元朱玫李昌符使山南西道節度使石君渉柵險要燒郵驛上由他道以進山谷﨑嶇邠軍迫其後危殆者數四僅得達山南君渉棄鎮走歸朱玫鳯翔百官蕭遘等罪狀田令孜及其黨韋昭度字正己京兆人因供奉僧澈結宦官得同平章事請誅之詔加王重榮應接糧料使調其榖十五萬斛以繼國用重榮表稱令孜未誅不奉詔詔遣王建帥部兵戍三泉唐縣故城在今陜西漢中府寧羌州遥領璧州唐置今四川保寧府通江縣是刺史將帥遥領州鎮自此始以孔緯杜讓能同平章事上之在寳雞也孔緯度朱玫必反請速幸梁州翌日車駕已發而玫兵至微緯言幾殆及是以緯與杜讓能俱同平章事讓能從上在險難中未甞暫去左右上勞之曰古謂忠于所事卿無負矣讓能謝曰臣世蒙國恩陛下不以臣不肖使扞牧圉臨難苟免臣之恥也夏四月朱玫奉襄王煴權監軍國事還京師以鄭昌圖字光業餘慶從孫同平章事朱玫以田令孜在天子左右終不可去言于蕭遘曰主上播遷六年將士冒矢石百姓供饋餉戰死餓死十減七八僅能復京城主上更以勤王之功為敇使之榮委以大權使墮綱紀騷擾藩鎮召亂生禍玫昨奉尊命來迎大駕不䝉信察反類脅君吾輩報國之心極矣戰賊之力殫矣安能垂頭弭耳受制于閽寺之手哉李氏子孫尚多相公盍改圖以利社稷乎遘曰主上無大過惡正以令孜專權肘腋致坐不安席近日初無行意令孜陳兵帳前迫脅以行足下盡心王室止有引兵還鎮拜表迎鑾廢立重事遘不敢聞命玫出宣言曰我立李氏一王敢異議者斬遂逼鳯翔百官奉襄王煴權監軍國事承制封拜帥百官奉煴還京師使遘為册文遘不從乃使兵部侍即鄭昌圖為之以昌圖同平章事玫以蕭遘為太子太保遘稱疾辭其弟蘧為永樂令往從之在永樂唐縣宋省故城今山西蒲州府田令孜自為西川監軍田令孜自知不為天下所容力薦楊復恭為中尉自除西川監軍往依陳敬瑄復恭斥令孜之黨出王建為利州刺史五月朱玫自加侍中以裴澈判度支高駢兼中書令吕用之為嶺南東道節度使朱玫承制大行封拜以悦藩鎮受其命者什六七高駢仍奉牋勸進吕用之建牙開幕一與駢同凡駢之腹心及將校能任事者皆逼以從已不復咨稟駢頗疑之欲收其權而無如之何用之亦懼訪于其黨鄭杞杞曰寧我負人無人負我六月詔扈蹕都將楊守亮曹州人本姓訾為楊復光養子冒姓楊氏與王重榮李克用共討朱玫初李昌符與朱玫謀立襄王既而玫自為宰相昌符怒更通表興元玫遣王行瑜將兵五萬追乘輿屯鳯州後周置明為縣今屬陜西漢中府是時諸道貢賦多之長安興元從官衛士皆乏食上涕泣不知為計杜讓能曰楊復光與王重榮同破黄巢相親善復恭其兄也若遣重臣往諭重榮以大義且致復恭之意宜有回慮上從之重榮即聴命表獻絹十萬匹且請討朱玫以自贖襄王煴遣使者至晉陽賜李克用詔言上已晏駕吾為藩鎮所推今已受册克用大怒其大將葢寓蔚州人因説曰鑾輿播遷天下皆歸咎于我今不誅朱玫黜李煴無以自湔洗克用從之燔詔書囚使者遣使上表移檄進討詔以扈蹕都將楊守亮將兵二萬出金州與重榮克用共討朱玫先是山南之人皆言克用與朱玫合人情恟懼表至上出示從官并諭山南諸鎮由是帖然然克用表猶以朱全忠為言上使楊復恭以書諭之云俟三輔事寧别有進止秋七月朱玫遣王行瑜寇興州即後魏武興郡注見前詔神策都將李茂貞深州博野人本姓宋名文通以功賜姓名拒之胡三省曰李茂貞始此以周岳為武安軍節度使初江西將閔勗唐書作頊戍安南還過潭州逐觀察使自為留後詔以為欽化軍節度使時武陵蠻雷滿據朗州滿本漁師高駢在荆南擢領蠻軍從駢廣陵逃歸聚衆據州陬溪武陵地人周岳據衡州岳嘗與滿鬬欲殺之及聞滿已得志遂陷衡州逐刺史石門隋縣今屬澧州蠻向瓌據澧州集夷獠數千攻陷州城詔皆授為刺史至是岳發兵攻潭州勗招淮西將黄皓入城共守皓遂殺勗岳攻㧞州城擒皓殺之詔更欽化軍曰武安以岳為節度使八月盧龍節度使李全忠卒以其子匡威為留後冬十月朱玫立襄王煴稱帝改元改元建貞遙尊上為太上元皇聖帝十一月董昌取越州董昌謂錢鏐曰汝能取越州吾以杭州授汝鏐遂將兵攻克之劉漢宏走台州刺史杜雄執送昌斬之昌遂徙鎮越州以鏐知杭州事已而詔以昌為浙東觀察使鏐為杭州刺史十二月王行瑜還長安斬朱玫煴奔河中王重榮殺之傳首行在楊復恭傳檄關中曰得朱玫首者以靜難節度使賞之王行瑜戰數敗與其下謀曰今無功歸亦死曷若與汝曹斬玫首定京城迎大駕取邠寧節鉞乎衆從之遂引兵還長安玫怒責之曰汝欲反邪行瑜曰吾不反欲誅反者耳遂擒斬之并殺其黨數百人諸軍大亂裴澈鄭昌圖奉襄王奔河中重榮詐為奉迎執煴殺之百官死者殆半函煴首送行在刑部請御南門獻馘百官畢賀太常博士殷盈孫曰煴為賊臣所逼正以不能死節為罪耳禮公族罪在大辟君為之素服不舉今煴已就誅宜廢為庶人而葬其首其獻馘稱賀之禮請俟朱玫首至而行之従之殷盈孫侑之孫也孫儒陷河陽初忠武決勝指揮使孫儒與龍驤指揮使劉建鋒字鋭端蔡州朗山人戍蔡州拒黄巢馬殷字覇圖許州鄢陵人隸軍中以材勇聞及秦宗權叛儒等皆屬焉宗權遣儒將兵攻陷鄭州進陷河陽儒自稱節度使張全義字國維濮州濮縣人本名言後賜名據懐州李罕之據澤州以拒之胡三省曰馬殷始見此天平牙將朱瑾逐泰寧節度使齊克讓而代之瑾將襲兖州乃求昏于克讓而盛飾車服私蔵兵甲以赴之親迎之夕甲士竊發逐克讓而代之丁未三年春正月以王行瑜為靜難軍節度使李茂貞領武定節度使時以洋州為武定節鎮楊守亮為山南西道節度使二月流田令孜于端州令孜依陳敬瑄竟不行代北節度使李國昌卒三月誅偽宰相蕭遘鄭昌圖裴澈時朝士受煴官者甚衆法司皆處以極法杜讓能力爭之免者什七八胡寅曰蕭遘之罪固可以死然有拒朱玫之言有罪狀田令孜之奏有不撰偽册棄官歸永樂之節若裴鄭則身相襄王事有間矣杜讓能為餘人力爭而不為遘區别惜哉車駕至鳯翔李昌符恐車駕還京雖不治前過恩賞必踈乃以宫室未完固請駐蹕府舎従之鎮海軍亂節度使周寳奔常州寳募親軍千人號後樓兵倍其廩給軍中皆怨而後樓兵浸驕不可制寳溺于聲色不親政事有言軍中怨望者寳曰亂則殺之軍將劉浩帥其黨作亂後樓兵亦叛寳奔常州浩迎度支催勘使薛朗入為留後高駢聞寳敗遣使饋以虀粉寳怒投于地曰若有吕用之在難方作毋誚我已而錢鏐迎寳至杭州寳尋卒鏐遂取常潤擒薛朗以歸殺之利州刺史王建襲閬州而據之山南西道節度使楊守亮忌王建驍勇屢召之建懼不往周庠許州人説建曰唐祚將終藩鎮互相吞噬皆無雄材逺畧不能戡濟多難公勇而有謀得士卒心立大功者非公而誰然葭萌四戰之地難以久安閬州地僻人富刺史楊茂實不修職貢若表其罪興兵討之可一戰而擒也建從之召募溪洞酋豪有衆八千沿嘉陵江即古西漢水源出秦州嶓冢山逕階州寧羌又南逕四川之保寧順慶諸府下流入于涪水而下襲閬州逐茂實自稱防禦使招納亡命軍勢益盛部將張處裕説建遣使奉表天子仗大義以行師綦毋諫復説建養士愛民以觀天下之變建皆從之州張處裕綦母諌皆許人夏四月淮南都將畢師鐸等發兵討呂用之克揚州用之亡走師鐸執高駢而幽之高駢遣畢師鐸將兵屯高郵備秦宗權師鐸與吕用之有隙疑懼不自安謀于腹心皆勸師鐸起兵誅用之師鐸以淮寧軍使鄭漢章亦素切齒于用之乃夜與百騎潛詣之漢章大喜發兵千餘人從師鐸至高郵與鎮遏使張神劒淮南人名雄善用劒故謂之神劒割臂瀝酒飲之推師鐸為行營使移書境内言誅用之及張守一諸葛殷亦用之黨之意神劒請留高郵師鐸漢章以兵前至廣陵城中驚擾用之不以白駢駢登聞喧譟聲左右乃以變告駢驚急召用之詰之用之徐對曰己隨宜區處倘或不已止煩元女一力士耳駢曰近者覺君之妄多矣君善為之勿使吾為周侍中用之慚懼而退師鐸以廣陵城堅兵多遣其屬孫約詣宣州乞師于觀察使秦彦且許以克城之日迎彦為師彦遣其將秦稠將兵三千助師鐸攻羅城克之用之亡走駢保子城師鐸縱兵大掠駢命撤備與師鐸相見交拜如賔主之儀署節度副使承制加左僕射鄭漢章等遷官有差都虞候申及説駢曰逆黨不多諸門尚未有守者令公及此夜出發諸鎮兵還取府城此轉禍為福之計也若一二日事定恐浸艱難及亦不得在左右矣駢猶豫不從明日師鐸果分兵守諸門捜捕用之親黨悉誅之遣使趣秦彦過江或説師鐸曰僕射曏者舉兵葢以用之輩姦邪暴横高令公不能區理故順衆心為一方去害今用之既敗軍府廓然僕射宜奉高公而佐之但總其兵權以號令誰敢不服用之乃淮南一叛將耳移書所在立可梟擒如此則外有推奉之名内得兼并之實使高公聰明必知内愧如其不悛乃杌上肉耳奈何以此功業付之他人不若亟止秦司空彼必未敢輕進就使他日責我以負約猶不失為高氏忠臣也師鐸不從以告鄭漢章漢章曰此智士也求之不復見既而師鐸獲諸葛殷杖殺之迎駢入道院并收其親黨十餘人幽之秦宗權攻汴州朱全忠拒擊大破之秦宗權悉力攻汴州朱全忠患兵少以朱珍徐州豐人為淄州唐置今濟南府淄川縣是刺史募兵于東道珍至淄青旬日得萬餘人又襲青州獲馬千匹還至大梁全忠喜曰吾事濟矣時蔡兵數萬還汴城列三十六寨全忠謂諸将曰彼未知朱珍之至宜出其不意擊之乃自引兵攻之連㧞四寨斬萬餘級蔡人大驚以為神宗權自引精兵會之全忠求救于兖鄆朱瑄朱瑾皆引兵赴之義成軍亦至時全忠已併義成軍全忠以四鎮兵攻宗權大破之宗權宵遁蔡人之守東都河陽許汝懐鄭陜虢者聞宗權敗皆棄去宗權之勢自是稍衰宣州觀察使秦彦入揚州廬州刺史揚行密引兵攻之畢師鐸之攻廣陵也呂用之詐為髙駢牒署廬州刺史楊行密行軍司馬遣兵入援廬江人袁襲說行密曰高公昏惑用之姦邪師鐸悖逆凶徳參㑹而求兵于我此天以淮南授明公也趣赴之行密從之至天長用之及張神劍皆以其衆歸之時神劍求貨于師鐸不得故怒而歸行密㑹秦彦將兵三萬入廣陵自稱權知節度事行密遂帥諸軍抵廣陵彦閉城自守遣秦稠出戰敗死士卒死者什七八已而秦彦悉出城中兵使畢師鐸鄭漢章將之陳于城西延衺數里行密積金帛糧米于一寨伏兵其傍自將衝陳兵始交行密陽敗廣陵兵追之入寨縱掠伏兵四起俘斬殆盡六月李昌符作亂敗走以李茂貞為招討使討之天威都頭楊守立本姓胡楊復恭養子與李昌符爭道麾下相毆帝命中使諭之不止昌符遂擁兵燒行營守立與戰昌符敗走保隴州詔遣李茂貞討之河中軍亂殺節度使王重榮詔以王重盈代之重榮用法嚴末年尤甚牙將常行儒作亂攻重榮殺之制以其弟重盈為䕶國節度使執行儒殺之以李罕之為河陽節度使張全義為河南尹孫儒既去河陽李罕之召張全義于澤州與之收合餘衆罕之據河陽全義據東都共求救于河東李克用表罕之為河陽節度使全義為河南尹初東都洊經寇亂居民不滿百户全義選麾下十八人材器可任者人給一旗一榜謂之屯將使詣十八縣故墟落中植旗張榜招懐流散勸之樹藝蠲其租税由是民歸之者如市又選壯者教之戰以禦寇盜數年之後都城坊曲漸復舊觀諸縣户口率皆歸復桑麻蔚然野無曠土其勝兵者大縣至七千人小縣不減二千人為之置令佐以治之全義明察人不能欺而為政寛簡出見田疇美者輒下馬與僚佐共觀之召田主勞以酒食有蠶麥善收者或親至其家悉呼出老幼賜以茶綵衣物民間言張公不喜聲伎見之未嘗笑獨見佳麥良繭則笑耳有田荒穢者則集衆杖之或訴以乏人牛則召其鄰里責使助之由是鄰里有無相助比户豐實凶年不饑遂成富庶焉秋八月李茂貞平隴州李昌符伏誅詔以茂貞為鳯翔節度使朱全忠取曹州全忠欲兼兖鄆而以朱瑄兄弟有功于己攻之無名乃誣瑄招誘宣武軍士遣其將朱珍葛從周字通美濮州鄄城人襲曹州拔之又攻濮州與兖鄆兵戰于劉橋在曹州府范縣西南殺數萬人瑄瑾僅以身免朱珍尋拔濮州進攻鄆州朱瑄遣其將詐降于珍珍引兵赴之瑄開門納汴軍閉而殺之珍走瑄復取曹州九月以張濬同平章事初李克用素薄濬之為人及聞其作相私謂詔使曰張公好虛談而無實用朝廷採其虛名而用之異日交亂天下必是人也濬聞而銜之秦彦殺高駢高駢在道院左右無食秦彦與畢師鐸出師屢敗疑駢為厭勝外圍益急恐駢黨為内應乃殺駢并其子弟甥姪同坎瘞之楊行密聞之帥士卒縞素向城大哭三日初駢之在成都殺突將也有一婦人臨刑㦸手大罵曰我必訴于上帝使汝他日舉家屠滅如我今日至是卒如其言冬十月楊行密克揚州廣陵城中無食草根木實皆盡以菫泥黏土也為餅食之餓死者大半宣軍掠人詣肆賣之驅縛屠割流血滿市部將張審威師麾下登城啓關納外兵守者皆不鬭而潰先是彦師鐸信重妖尼奉仙至是問計奉仙曰走為上策乃奔東塘行密入城改殯駢及其族城中遺民纔數百家饑羸非復人狀行密輦西寨米以賑之自稱淮南留後十一月秦宗權遣孫儒攻揚州屠高郵秦宗權遣其弟宗衡將兵萬人渡淮與楊行密爭揚州以孫儒為副張佶長安人劉建鋒馬殷及宗權族弟彦暉皆從抵廣陵城西據行密故寨秦彦畢師鐸引兵與合未幾宗權召宗衡等還蔡拒朱全忠孫儒知宗權勢不能久稱疾不行宗衡屢促之儒怒殺之傳首于全忠分兵掠鄰州衆至數萬以揚州城下乏食還襲高郵屠之張神劍逃歸揚州行密殺之而阬其衆秦彦畢師鐸鄭漢章尋為孫儒所殺閏月以朱全忠兼淮南節度使朝廷以淮南久亂以全忠兼節度使感化節度使時溥自以先進為都統顧不得淮南而全忠得之意甚恨望全忠以書假道于溥溥不許徐汴始搆怨全忠多權數將佐莫測其所為惟館驛廵官敬翔能逆知之往往助其所不及全忠大悅自恨得翔晩凡軍機民政悉以咨之馮敬翔字子振同州翊人王建攻成都不克退屯漢州王建既據閬州東川節度使顧彦朗豐州人畏之數遣使問饋陳敬瑄恐其合兵圖已謀于田令孜令孜曰建吾子也今折簡召之可致麾下遣使召之建大喜留其家于梓州帥麾下精兵一千與從子宗鐬假子宗瑶本姜郢燕人宗弼本魏𢎞許人宗侃本田師侃許人宗弁本鹿弁俱西至鹿頭關西川參謀李乂謂敬瑄曰王建虎也奈何延之入室彼安肯為公下乎敬瑄悔遣人止之建怒破關而進拔漢州敬瑄遣使讓之對曰十軍阿父召我來及門而拒之重為顧公所疑進退無歸矣令孜登樓慰諭之建與諸軍羅拜曰今既無歸且辭阿父作賊矣彦朗發兵助之急攻成都三日不克退屯漢州敬瑄告難于朝詔遣中使和解之不從楊行密斬呂用之呂用之之在天長也紿楊行密曰用之有銀五萬鋌埋于所居克城之日願備麾下一醉之資至是行密閲士卒顧用之曰僕射許此曹銀何食言邪因牽下腰斬之怨家刳割立盡發其中堂得桐人書駢姓名于胸桎梏而釘之張守一亦歸行密復為諸將合仙丹又欲干軍府之政行密怒而殺之戊申文徳元年春正月以朱全忠為蔡州四面行營都統蔡將石璠寇陳亳朱全忠遣朱珍葛從周將兵擊擒之詔以全忠為都統代時溥諸鎮兵皆受節制二月以楊行密為淮南留後朱全忠之兼淮南節度也使其將張廷範本優人致朝命于行密以行密為副使又以李璠為留後廷範至廣陵行密厚禮之及聞李璠來怒有不受之色廷範密使人白全忠宜自以大軍赴鎮全忠從之至宋州廷範逃歸曰行密未可圖也乃奏以為留後時李璠為時溥所襲不得至廣陵帝至長安魏博軍亂逐其節度使樂彦禎推牙將羅𢎞信字徳孚貴鄉人知留後事彦禎驕泰不法子從訓凶險聚亡命為親兵牙兵疑之籍籍不已從訓逃出彦禎以為相州刺史從訓遣人至魏運甲兵金帛交錯于路牙兵益疑彦禎懼請避位為僧衆推牙將羅𢎞信知留後事既而𢎞信殺彦禎及従訓詔以𢎞信為魏博留後張全義襲河陽李罕之奔澤州初罕之與全義割臂為盟相得歡甚罕之勇而無謀性復貪暴意輕全義聞其勤儉力穡笑曰此田舎一夫耳屢求穀帛全義皆與之小不如所欲輙械主吏杖之河南將佐皆憤怒全義竭力奉之罕之益驕罕之所部不耕稼專以剽掠為資至是悉衆攻降絳州進攻晉州全義潛發屯兵夜襲河陽黎明入城罕之踰垣走全義盡俘其家遂兼領河陽節度使罕之奔澤州求救于李克用已而克用遣兵攻河陽朱全忠救却之以丁㑹壽春人為留後全義復為河南尹全義徳全忠援已盡心附之罕之據澤州日事寇鈔懐孟晉絳數百里間州無刺史縣無令長田無麥禾邑無煙火者殆將十年三月戊戌朔日食既立壽王傑懿宗第七子為皇太弟帝崩太弟即位是為昭宗上疾大漸皇弟吉王保長而賢羣臣屬望十軍觀軍容使楊復恭請立其弟夀王傑是日下詔立傑為皇太弟監軍國事中尉劉季述遣兵迎傑入居少陽院宰相以下就見之上崩遺制太弟即位更名敏後復更名太弟體貌明粹有英氣喜文學既踐阼以僖宗威令不振朝廷日卑有恢復前烈之志尊禮大臣夢想賢豪中外忻忻焉夏四月孫儒襲揚州陷之孫儒陷揚州自稱節度使楊行密將奔海陵袁襲勸行密歸廬州再為進取之計從之行密畏孫儒之逼欲襲洪州袁襲曰鍾傳定江西已久兵彊食足未易圖也趙鍠新得宣州怙亂殘暴衆心不附公宜卑禮厚幣説和州孫端上元張雄使自采石濟江侵其境彼必來逆戰公自銅官濟江㑹之破鍠必矣行密從之孫端和州刺史張雄泗州漣水人先據蘓州後屯上元趙鍠秦彦赴揚州時補為宣歙觀察使銅官山名在池州府南陵縣西元和志作利國山出銅以郭禹本成汭青州人因亡命更姓名為荆南留後禹初為荆南節度使陳儒江陵人牙將㑹荆南叛將張瓌滑州人襲江陵逐儒而代之時雷滿屢攻掠荆南儒以瓌為行軍司馬使擊滿瓌因還兵攻逐儒欲殺禹禹亡走襲歸州據之既而秦宗權遣兵攻江陵久之凡二年死者相枕城陷瓌死至是禹擊荆南守將王建肇棄城走朝廷以禹為留後荆南荒亂之餘民版無幾禹撫集彫殘通商務農未再朞自占者萬餘户時鎮國節度使韓建勸課農桑亦以治顯人謂之北韓南郭其後詔以禹為節度使禹奏復姓名為成汭五月朱全忠擊蔡州克其外城全忠既得洛孟無西顧之憂乃發兵擊秦宗權大破之克北關門宗權守中州蔡州中城也全忠分諸將為二十八寨以環之六月以韋昭度為西川節度使兼西川招撫使陳敬瑄與王建相攻貢賦中絶建以成都尚彊欲罷兵周庠綦母諫以為不可請據卭州為根本建曰吾在軍中久觀用兵者不倚天子之重則衆心易離不若疏敬瑄之罪表請朝廷命大臣為帥而佐之則功庶可成乃使周庠草表請討敬瑄以贖罪因求卭州顧彦朗亦表請赦建罪移敬瑄他鎮以靖兩川初黄巢之亂上為夀王従幸蜀徒行疲乏卧磻石上田令孜自後至以鞭抶之使前上心銜之及即位使人監西川軍令孜不奉詔上方憤藩鎮跋扈欲以威制之㑹得彦朗建表以令孜所恃者敬瑄耳乃以昭度兼兩川招撫制置等使徵敬瑄為龍武統軍尋詔割卭蜀黎雅置永平軍以建為節度使削敬瑄官爵冬十月葬靖陵在陜西乾州東北史臣曰懿僖昏庸相繼乾符之際嵗大旱蝗民愁盗起其亂遂不可復支蓋亦天人之㑹歟昭宗皇帝己酉龍紀元年春二月秦宗權伏誅先是蔡將申叢執宗權以降朱全忠檻送京師至是伏誅京兆尹孫揆監刑宗權于檻車中引首謂揆曰尚書察宗權豈反者邪但輸忠不效耳觀者皆笑遂斬于獨栁人孫揆字聖圭武水三月進朱全忠爵為東平郡王夏六月李克用拔磁洺殺孟方立李克用大發兵遣李罕之李存孝攻孟方立拔磁洺方立遣大將馬溉將兵數萬拒之大敗克用乘勝進攻邢州方立性猜忌諸將不為用慙懼飲藥死弟遷素得士心衆舉為留後求援于宣武宋全忠遣大將王䖍裕琅琊臨沂人將精兵赴之以楊行密為宣歙觀察使先是行密自糝潭鎮名在廬州府無為州南濵江濟江孫端張雄為趙鍠所敗鍠將蘇塘將兵屯曷山亦名四合山在太平府當塗縣西南行密擊之塘大敗行密遂圍宣州至是城中食盡人相啗指揮使周進思據城逐趙鍠鍠將奔廣陵田頵字徳仁合肥人追擒之未幾城中執進思以降行密入宣州諸將爭取金帛徐温字敦美海州朐山人獨據米囷為粥以食餓者胡三省曰徐温始見此鍠將周本宿松人勇冠軍中行密以為裨將鍠之敗也左右皆散惟李徳誠西華人不去行密以宗女妻之詔以行密為觀察使朱全忠與鍠有舊遣使求之袁襲勸行密斬首還之未幾襲卒行密哭之曰天不欲成吾大功邪何為折吾股肱也秋七月朱全忠攻徐州不克引兵還先是全忠遣兵攻徐州大破其兵宿州降至是全忠復遣朱珍拔蕭縣據之時溥與相拒全忠欲自往臨之珍命諸軍皆葺馬廐李唐賓陜州人部將嚴郊獨惰慢軍吏責之唐賓怒見珍訴之珍怒斬唐賓白全忠云唐賓謀叛敬翔恐全忠乘怒倉猝處置違宜故留使者逮夜然後白之全忠果大驚翔因為畫策收唐賓妻子繫獄遣騎往慰撫軍中始安七月全忠至珍出迎執而誅之進擊時溥會大雨引兵還冬十月平盧節度使王敬武卒軍中推其子師範為留後十月帝祀圜丘上將祀圜丘故事中尉樞密皆䙆暌桂反衣裾分也衫侍從僖宗之世已具襴袍下施横幅緋紫各視其品笏至是又令有司制法服謂冕服佩劍孔緯及諫官禮官皆以為不可上出手札諭之曰卿等所論至當事有從權勿以小瑕遂妨大禮于是宦者始服劒佩侍祠上在藩邸素疾宦官及即位楊復恭恃援立功所為皆不上意不平政事多謀于宰相孔緯張濬勸上舉大中故事抑宦者權復恭常乘肩輿至太極殿是日上與宰相言及四方反者孔緯曰恭陛下左右有將反者况四方乎上矍然問之緯指復曰復恭陛下家奴乃肩輿造前殿多養壯士為假子使典禁兵或為方鎮非反而何復恭曰子壯士欲以收士心衛國家豈反邪上曰然則何不使姓李而姓楊乎復恭無以對復恭假子天威軍使守立勇冠六軍上欲討復恭恐守立為亂謂復恭曰朕欲得守立在左右復恭見之上賜姓名李順節使掌六軍管鑰不朞年擢至天武都頭俄加平章事及謝日臺吏申請班見百僚孔緯判不集順節不悦他日語微及之緯曰宰相師長百僚故有班見相公職為都頭而于政事堂班見百僚于意安乎順節不敢復言天武都頭田令孜募新軍為五十四都天武其一也判不集謂判臺申不使集百官御批歴代通鑑輯覽卷六十三

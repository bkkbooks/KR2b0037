body:
  text: 正月朔帝御大慶殿受朝暴感風昡趣行禮而罷翌日文彥博召內侍都知史志聰問狀對曰禁密不敢漏言彥博叱曰爾曹出入禁闥不令宰相知天子起居欲何為邪自今疾勢增減必以告不爾當行軍法又與劉沆富弼謀啓醮于大慶殿因留宿殿廬志聰白無故事彥博曰此豈論故事邪因赦死罪以下令輔臣禱天地宗廟社稷北京留守賈昌朝素惡富弼陰結內侍武繼隆令司天官二人言國家不當穿河于北方致上體不安後數日二人又上言請皇后同聽治赤繼隆所教也志聰以其狀白執政彥博視而懷之徐召二人詰之曰天文變異汝職所當言也何得輒預國家大事汝罪當族二人懼變色彥博曰觀汝直狂愚耳未忍治汝罪自今無得復然二人退乃出狀示同列同列皆憤怒曰奴敢爾僭言何不斬之彥博曰斬之則事彰灼于中宫不安衆皆曰善既而議遣司天官定六塔方位復使二人往繼隆白請留之彥博曰彼本不敢妄言有教之者耳繼隆默不敢對二人至六塔恐治前罪更言六塔在東北非正北也二月帝疾愈御延和殿文彥博等還私第當是時京師業業賴彥博弼持重衆心乃安先是彥博等在禁中有言禁卒告都虞侯欲為亂劉沆欲捕治彥博召都指揮許懷德問都虞侯何如人懷德稱其願可保彥博曰然則卒有怨誣之耳當亟誅之以靖衆乃請沆判狀尾斬卒于軍門及帝疾愈沆白帝曰陛下違豫時彥博擅斬告反者彥博以沆判呈帝乃解許懷德字師古祥符人閏三月以王堯臣參知政事程戡為樞密副使戡以文彥博親故改授副使以唐介知諫院御史吳中復請召還唐介文彥博因言于帝曰介頃言臣事多中臣病其間雖有風聞之誤然當時責之太深請如中復奏乃召介知諫院時稱彥博長者夏五月罷知諫院范鎮帝性寬仁言事者競為激訐鎮獨務引大體非關朝廷安危生民利疚則未嘗言及帝暴疾文彥博因請帝建儲帝許之㑹疾瘳而止至是鎮奮然曰天下事尚有大于此者乎即上疏曰方陛下不豫海內皇皇莫知所為陛下獨以祖宗後裔為念是為宗廟社稷之慮至深且明也昔太祖舍其子而立太宗天下之大公也真宗以周王薨王名祐真宗次子生九年薨追封周王後追册悼獻太子養宗子于宫中天下之大慮也願以太祖之心行真宗故事拔近屬賢者優其禮秩而試以政事俟有聖嗣復遣還邸章纍上不報執政諭之曰今間言已入為之甚難鎮曰事當論其是非不當問其難易諸公謂今日難于前日安知異日不難于今日乎凡見帝面陳者三因泣下帝亦泣曰朕知卿忠當更俟二三年鎮前後章凡十九上待命百餘日鬚髮皆白朝廷知不可奪乃罷知諫院改糾察在京刑獄時并州通判司馬光亦言建儲事且勸鎮以死爭之翰林學士歐陽修殿中侍御史包拯吕景初字冲之開封人趙抃知制誥吳奎劉敞等皆上疏力請于是文彥博富弼王堯臣等相繼勸帝早定大計皆不聽六月大水社稷壇壞詔求直言京師自四月大雨水注安上門門關折壞官私廬舍數萬區諸路言江河決溢河北尤甚至是雨壞太社太稷壇詔羣臣實封言闕失而分遣使賑恤被傷者秋七月彗出紫微垣至八月始滅八月庚戌朔日食罷狄青判陳州以韓琦為樞密使青在樞府每出入士卒輒指目以相矜誇至擁馬足不得行又其家數有光怪㑹大水青避于相國寺行止殿上人情頗疑翰林學士歐陽修言青掌國機密而得軍情非國家之利知制誥劉敞出知揚州陛辭亦言陛下幸愛青不如出之以全其終帝然之乃以使相判陳州冬十一月王德用罷以賈昌朝為樞密使德用將家子習知軍中情僞善以恩撫下故多得士心雖屢臨邊境未嘗親矢石督戰而名聞四夷閭閻婦女小兒亦呼為黑王相公十二月劉沆免以曾公亮參知政事沆初以附張貴妃得進數為御史論列沆深疾之因上言自慶厯後臺諫官用事朝廷命令之出事無當否悉論之必勝而後己專務抉人陰私莫辨之事以中傷士大夫執政畏其言進擢尤速請行御史遷次之格滿二嵗者與知州帝從之㑹御史范師道字貫之仲淹之姪趙抃嵗滿求補郡沆引格出之中丞張忭曰天子耳目之官而宰相挾私斥之可乎上疏極言沆遂出知應天沆長于吏事然任數善刺探權近過失陰持之以軒輊取事以包拯知開封府拯立朝剛毅貴戚宦官為之斂手聞者皆憚之以其笑比黃河清童稚婦女亦知其名呼曰包待制京師為之語曰關節不到有閻羅包老丁酉二年春二月祁公杜衍卒諡正獻衍臨終作遺疏略曰無以久安而忽邊防無以既富而輕財用宜早建儲以安人心語不及私以翰林學士歐陽修知貢舉帝切于求士進士諸科一舉而獲選者至千三百餘人士子習尚險怪竒澀之文號太學體張方平嘗言文章之變與政通邇來文格日失其舊各出新意相勝為奇驅扇浮薄重虧雅俗非取賢斂才備治具之意雖下詔揭示而士習不改翰林學士歐陽修知貢舉痛抑新體凡為時所推譽者皆被黜榜出澆薄之士俟修晨朝聚譟于馬前街司邏卒不能禁止然自是場屋之習遂為之變是科程皓張載朱光庭蘇軾蘇轍曾鞏皆及第程皓字伯淳西洛人張載字子厚長安人朱光庭字公掞河南偃師人蘇軾字子瞻眉山人蘇轍字子由軾之弟曾鞏字子固南豐人三月護國節度使同平章事狄青卒諡武襄青為人慎密寡言其計事必審中機㑹而後發行師先正部伍明賞罰與士卒同饑寒勞苦雖敵猝犯之無一士敢後先者故數有功嘗有持狄梁公畫像及告身詣青獻之以為青之逺祖青謝之曰一時遭際安敢自附梁公厚贈其人而遣之夏四月幽州地大震壞城郭覆壓死者數萬人秋八月詔諸州置廣惠倉初天下沒入户絶田官自粥之至是韓琦請留勿粥募人耕而收其租别為倉貯之以給州縣之老幼貧疾不能自存者謂之廣惠倉以提刑領其事嵗終具出納之數上三司每干户留田租百石以是為差戶寡而田有餘則粥如舊九月契丹來聘遣翰林學士胡宿報之初契丹興宗遣使來求御容會卒乃已至是洪基復遣使來求欲成先志帝遣張忭報聘且諭之曰昔文成興宗尊號中字弟也弟先面兄于禮為順況今南朝為伯父之尊當先致恭于是復使其臣蕭扈以洪基像來宿乃奉御容如契丹契丹主具儀仗迎謁及瞻視驚肅再拜謂左右曰我若生中國不過與之執鞭持蓋一都虞侯耳冬十二月詔間嵗一舉士置明經科進士諸科待試京師者恆六七千人一不幸有故不應詔往往沈淪十數年以此多毁行干進者王洙侍邇英閣講周禮至三年大比帝曰古者選士如此今率四五嵗一下詔故士有抑而不得進者孰若裁其數而屢舉也下有司議咸請易以間嵗之法詔從之于是進士諸科悉解舊額之半增設明經試法凡明兩經或三經五經各問大義十條兩經通八三經通六五經通五為合格兼以論語孝經策時務三條出身與進士等未幾以登第者驟致顯擢復下詔定其遷次之格以裁抑之戊戌三年夏六月文彥博賈昌朝罷彥博以老求罷以使相判河南封潞國公知諫院陳旭字暘叔建陽人後避神宗嫌名改升之等恐昌朝遂代為相乃率僚屬上言昌朝交通女謁建大第别創客位以待宦者宦官有矯制者樞密院釋不治昌朝竟出判許州昌朝在侍從中多得名譽及執政始不為正人所與以韓琦同平章事宋庠田況為樞密使張忭為副使時羣臣皆以建儲為言帝依違不決琦既相乘閒進曰皇嗣者天下安危之所繫自昔禍亂之起皆由不早定陛下何不擇宗室之賢以為宗廟社稷計帝曰後宫將有就館者姑待之已而又生女琦懷漢書孔光傳以進曰成帝無嗣立弟之子彼中材之主猶能如是況陛下乎願以太祖之心為心則無不可者帝不答以包拯為御史中丞拯言東宫虛位日久天下以為憂夫萬物皆有根本而太子者天下之根本也根本不立禍孰大焉帝曰卿欲誰立拯曰臣非才備位所以乞豫建太子者為宗廟萬世計爾陛下問臣欲誰立是疑臣也臣年七十且無子非邀後福者帝喜曰徐當議之拯之知問封也以威嚴御下名震都邑及是歐陽修以龍圖閣學士權知府事簡易循理不求赫赫之譽冇以包政勵之者修曰凡人才性不一用其所長事無不舉彊其所短勢必不逮吾亦任吾所長耳開封亦大治秋八月己亥朔日食己亥四年春正月丙申朔日食用牲于社二月更𣙜茶法自茶為官𣙜民私蓄盜販皆有禁臘茶建州片茶也宋制茶有二類曰片曰散片茶惟建劒最為精潔之禁尤嚴園户困于征取官司並緣侵擾因陷罪戾至破産逃匿者嵗比有之著作佐郎何鬲三班奉職王嘉麟皆上書請罷給茶本錢縱園户貿易而官收租錢與所在征算歸𣙜貸務以償邊糴之費可以疏利源寬民力富弼韓琦曾公亮然其策請于帝行之下三司議三司言茶課給本收利所獲甚微而煩擾為患園戶輸納侵害日甚小民趨利犯法益繁宜約嵗入息錢之數均賦于民恣其買賣所在收算而不給本錢遂詔弛舊禁俾通商利凡嵗輸緡錢三十三萬八千有奇謂之租錢與諸路本錢悉儲以待邊糴自是惟臘茶禁如舊餘茶肆行天下矣論者又謂茶戶困于輸錢良民賦不時入刑亦及之商賈利薄販鬻者少必至嵗額不登經費日蹙翰林學士歐陽修知制誥劉敞皆請除前令帝不聽夏四月封周世宗後柴詠為崇義公給田十頃以奉周祀從著作佐郎何鬲請也五月除猜防大臣條約前兩制不許至執政私第執政所薦士不得充臺官詔並除之秋七月放宫人帝以月食幾盡修陰教以應天變前後出宫女幾五百人時後宫得幸者十人謂之十閣而劉氏黃氏在十閣中尤驕恣通請謁御史中丞韓絳密以聞帝曰非卿言朕不知也當審驗之遂并出二人田況罷況寬厚明敏有文武材好論天下事言甚明切以疾罷冬十月大夾于太廟帝將親夾下禮官集議東向之位同判宗正寺趙良規字元甫洛陽人請正太祖東向之位而知太常禮院韓維字持國億第五子請如故事虛東向之位便時禮官不敢決乃與待制以上及臺諫官同議太祖為受命之君然僖祖以降四廟在上故大夾止列昭穆而虛東向魏晉以來已用此禮詔從之十一月汝南王允讓卒追封濮王諡安懿允讓天資渾厚內寬外莊知大宗正寺二十年宗子有好學者勉進之以善若不率教則勸戒之至不變始正其罪故皆畏服及薨以其子宗實育宫中故恤典有加召河南處士邵雍字堯夫河南人不至雍少時自雄其才慷慨欲樹功名于書無所不讀始為學即堅苦刻勵寒不爐暑不扇夜不就枕者數年既而踰河汾涉淮漢周流齊魯宋鄭久之幡然來歸曰道在是矣遂不復出初北海李之才受易于河南穆修修受于种放而放受之于陳搏源流最逺之才攝共城令雍時居母憂于蘇門山躬爨以養父之才叩門來謁勞苦之曰好學篤志果何似雍曰簡䇿迹外未有適也之才曰君非迹簡策者其如物理之學何他日則又曰物理之學學矣不有性命之學乎雍再拜願受業之才遂授以河圖洛書伏羲八卦六十四卦圖象雍由是探賾索隱妙悟神契玩心高明深造曲暢遂衍伏羲先天之旨著書十餘萬言李之才字挺之青社人共城注見前蘇門山在衛輝府輝縣西北寰宇記俗名五巖山富弼司馬光吕公著字晦叔夷簡子諸賢居洛中雅敬雍恆相從游為市園宅雍德器粹然人無貴賤少長一接以誠故賢者悅共德不賢者服其化一時洛中人才特甚而忠厚之風聞天下留守王拱辰薦雍遺逸授將作主簿後復舉逸士補潁州團練推官皆固辭乃受命竟稱疾不之官庚子五年夏四月程戡免以孫抃為樞密副使戡與宋庠不合數爭議于帝前臺諫以為言帝不悅殿中侍御史吕誨字獻可端之孫復論戡結貴幸以致位乃免置寬恤民力司詔置于三司遣官分路訪寬恤民力事五月召王安石字介甫臨川人為三司度支判官安石好讀書善屬文曾鞏攜其所撰以示歐陽修修為之延譽擢進士上第授淮南判官故事秩滿許獻文求試館職安石獨否調知鄞縣本漢鄮縣五代吳越更名今為浙江寧波府治通判舒州文彥博為相薦其恬退乞不次進用以激奔競之風歐陽修薦為諫官安石皆以祖母年高辭修以其須祿養復言于朝召為羣牧判官改度支判官安石議論高奇能以辨博濟其說果于自用慨然有矯世變俗之志于是上萬言書其大要以為今天下之財力日以困窮風俗日以衰壞患在不知法度不法先王之政故也法先王之政者法其意而已法其意則無所改易更革不至乎傾駭天下之耳目囂天下之口而固以合先王之政矣因天下之力以生天下之財取天下之財以供天下之費自古治世未嘗以財不足為患也患在治財無其道耳先是館閣之命屢下安石輒辭不起士大夫謂其無意于世恨不識其面朝廷每欲畀以美官惟患其不就也及赴是職聞者莫不喜悅吕祖謙曰安石變法之藴亦略見于此特其學不用于嘉祐而盡用于熙寧世道升降之機識者于此三致意焉六月契丹新置國子監契丹主自即位求直言者再復詔設學養士頒五經傳疏置博士助教各一人秋七月歐陽修等上新唐書先是帝以劉昫等所撰唐史卑弱淺陋命翰林學士歐陽修端明殿學士宋祁刋修之曾公亮提舉其事十有七年而成凡二百二十五卷事增于前文省于舊修撰紀志表祁撰傳故事每書首止列官尊者一人修以祁為先進且于唐書功多故各著其名以自異浚二股河商胡決河之别派也以其自決河岐出故名二股續綱目于是年正月書鑿二股河考宋史河渠志是年河決二股七月韓贄疏請修浚非正月也今改正自李仲昌治商胡決河塞而復決事見前至是河流派别于魏之第六掃在今大名府南樂縣界曰二股河行魏恩德博之境亦曰四界首河自決河至四界首行百三十里河北都轉運使韓贄字獻之齊州人言四界首古大河即王莽河水經注謂之大河故瀆注見前所經今宜浚二股于此分流入赤金河五季周顯德初李榖治楊劉決河其不復故道者離而為赤河及游金二河故道在東平平原間今湮沒不可考為利可必商胡決河北自乾寧入海是為北流二股河東至德滄入海是為東流分而為二則上流不壅可無決溢之患詔如其䇿浚二股入赤金役三千人幾月而畢考宋史河渠志是年韓贄請浚二股至英宗治平元年始命都水監浚治并浚五股河與韓琦傳所載不同續網目從贄傳今依之又河渠志神宗熙寧元年河決恩冀二年從都水監丞宋昌言內侍程昉議開二股以導東流才及六分而北流閉既而河自其南四十里東決泛濫大名恩德滄永靜五州軍境三年令河北轉運使開修二股上流至五年四月河始成續綱目宋元通鑑但載恩冀之決而東北流開閉俱不載今并注于此宋昌言字仲謨綬族子冬十一月宋庠免以曾公亮為樞密使張忭孫抃參知政事歐陽修陳旭趙概為樞密副使庠前後所至以慎靜為治然愛信幼子縱其與小人遊殿中侍御史吕誨論庠昏惰乃罷判鄭州辛丑六年春三月起復富弼同平章事弼固辭許之弼以母喪去位詔為罷春宴故事執政遭喪皆起復帝虛位五起之弼固請終制且曰起復金革之變禮不可施于平世帝乃許之夏四月陳旭罷以包拯為樞密副使知諫院唐介趙抃御史范師道吕誨上疏論旭陰結宦者故得大用帝曰朕選用執政豈容內臣預議邪乃兩罷之旭知定州介等亦外補六月壬子朔日食司天言當食六分之半食四分而雨羣臣欲援至和例稱賀同判尚書禮部司馬光言日之所照周遍華夷雲之所蔽至為近狹雖京師不見四方必有見者天意若曰人君為陰邪所蔽災慝甚明天下皆知其憂危而朝廷獨不知也食不滿分者乃厯官術數不精當治其罪亦非所以為賀也帝從之以司馬光知諫院光以三劄子上其一論君德有三曰仁曰明曰武以為仁者非嫗煦姑息之謂興教化修政治養百姓利萬物此人君之仁也明者非煩苛伺察之謂知道誼誐安危别賢愚辨是非此人君之明也武者非彊亢暴戾之謂惟道所在斷之不疑奸不能惑佞不能移此人君之武也陛下天性慈惠子育元元雖古聖王無以過然踐阼垂四十年而朝廷紀綱猶有虧缺閭里窮民猶有怨歎意者羣臣不能宣揚聖化將陛下之于三德萬分一亦有所未盡歟臣伏見陛下推心御物羣臣有所敷奏陛下不復詢訪利害一皆可之誠使臣皆忠正則善矣或有一姦邪在焉豈可不為寒心哉其二論致治之道有三曰任官曰信賞曰必罰以為國家御羣臣之道纍日月以進秩循資塗而授任苟日月積久則不問共人之賢愚而置高位資塗相值則不問其人之能否而居重職非特如是而已國家采名不采實誅文不誅意夫以名行賞則天下飾名以求功以文行罰則天下巧文以逃罪願陛下慎選在位之士而用之有功則增秩加賞而勿徙其官無功則降黜廢棄而更求能者有罪則流竄刑誅而勿加寬貸其三言養兵之術務精不務多帝以其一留中其二下中書其三下樞密院光又進五規曰保業惜時逺謀謹微務實又言故事凡臣僚上殿奏事悉屏左右內臣今內臣不過去御坐數步君臣對問之言皆可聽聞恐漏泄機事非便帝皆嘉納詔自今止令御藥侍臣及扶侍四人立殿角以備宣喚餘悉屏之以王安石知制誥安石自度支判官改同修起居注辭之纍日閣門吏賫敕就付之拒不受吏隨而拜之則避于厠吏置敕于案而去又遣還之上章至八九乃受及徑除知制誥遂不復辭秋八月以曾公亮同平章事張忭為樞密使胡宿為副使宿為人清慎忠實臨事不妄發既發亦不可回其當重任尤能顧惜大體羣臣多務更張革弊宿曰變法古人所難不務守祖宗成法而徒紛更無益于治也閏月策賢良方正直言極諫之士王介字仲父衢州人蘇軾蘇轍皆在舉中轍對切直胡宿力請黜之帝不許曰以直言召人奈何以直棄之乃收入第四等王安石意轍右宰相專攻人主比之谷永不肯撰詞韓琦曰此人謂宰相不足用欲得婁師德郝處俊而用之尚以谷永疑之乎改命沈遘字文通錢塘人為之詞時有詔舍人院無得申請改除文字安石爭之曰審如是則舍人不得復行其職而一聽大臣所為今大臣之弱者不敢為陛下守法而彊者則挾上旨以造令諫官御史無敢逆其意者臣實懼焉語皆侵執政執政者不悅會以母喪遂去職以歐陽修參知政事時韓琦為首相法令典故問曾公亮文學之事問修三人同心輔政百官奉法循理朝廷稱治修以兵民官吏財利之要中書所當知者集為總目遇事取視之不復求諸有司冬十月起復宗實知宗正寺固辭不拜羣臣以儲位未建為憂言者雖切而帝未之允司馬光上疏曰向者臣進豫建太子之說意謂即行今寂無所聞此必有小人言陛下春秋鼎盛何遽為此不祥之事小人無逺慮特欲倉卒之際援立其所厚善者耳定策國老門生天子之禍可勝言哉帝大感動曰送中書光見韓琦等曰諸公不及今定議異日禁中夜出半寸紙以某人為嗣則天下莫敢違琦等拱手曰敢不盡力時知江州吕誨亦上疏言之及琦入對以光誨二疏進讀帝遽曰朕有意久矣誰可者琦皇恐對曰此非臣輩所能議當出自聖擇帝曰宫中嘗養二子小者甚純近不慧大者可也琦請其名帝曰宗實琦等遂力贊之議乃定宗實天性篤孝好讀書不為燕嬉䙝慢服御儉素如儒者時居濮王喪乃起復知宗正寺琦曰事若行不可中止陛下斷自不疑乞內中批示帝意不欲宫人知曰只中書行足矣命下宗實固辭乞終喪帝復以問琦琦對曰陛下既知其賢而選之今不敢遽當蓋器識逺大所以為賢願固起之帝曰然壬寅七年春三月孫抃罷以趙槩參知政事吳奎為樞密副使抃年老善忘于事無所可否御史韓縝言之遂罷為觀文殿學士夏四月樞密副使包拯卒諡孝肅拯性峭直耿介與人不苟合不一毫妄取平居無私書故人親黨干謁一切絶之然惡吏苛刻務敦厚于人未嘗不恕其飲食服用喜儉朴雖貴如布衣時卒贈禮部尚書秋八月立宗實為皇子賜名曙九月進封巨鹿郡公宗實既終喪韓琦言宗正之命初出外人皆知必為皇子不若遂正其名帝從之琦至中書召翰林學士王圭字禹玉華陽人草詔圭曰此大事也非面受旨不可明日請對曰海內望此舉久矣果出自聖意乎帝曰朕意決矣圭再拜賀始退而草詔詔下宗實復稱疾固辭章十餘上記室周孟陽請其故宗實曰非敢徼福以避禍也孟陽曰今已有此迹設固辭不受中人别有所奉遂得燕安無患乎宗實始悟周孟陽字春卿海陵人司馬光言于帝曰皇子辭不資之富至于旬月其賢于人逺矣然父召無諾君命召不俟駕願以臣子大義責之宜必入帝從之宗實遂受命將入宫戒其舍人曰謹守吾舍上有適嗣吾歸矣因肩輿赴召良賤不滿三十人行李蕭然唯書數㕑而已中外相賀冬十月賜諸路錢助糴常平倉詔天下常平倉多所移用而不足以支凶年其令內藏庫三司共出緡錢一百萬下諸路助糴之癸卯八年春三月帝崩夏四月朔皇子巨鹿公曙即位是為英宗尊皇后為皇太后赦先是二月帝不豫中書樞密奏事于福寧殿之西閣至是辛未夜帝崩于福寧殿帝恭儉仁恕有司嘗請以王清舊址為苑帝曰吾奉先帝苑囿猶以為廣何以是為燕私常服浣濯帷帟衾裯多用繒絁嘗中夜飢思燒羊戒勿宣索曰恐膳夫自此戕賊物命以備不時之需大辟疑者皆令上讞嵗活千餘人每諭輔臣曰朕未嘗詈人以死況敢濫用刑乎及崩遺制皇子即皇帝位于是皇后悉斂諸門鑰置于前黎明召皇子入以遺詔令嗣位皇子驚再言曰曙不敢為因反走韓琦等共掖留之四月朔皇子即位欲諒陰三年令琦攝冢宰宰臣不可乃止帝有疾詔請皇太后權同聽政帝得暴疾詔請皇太后權同處分軍國事后乃御內東門小殿垂簾宰臣日奏事后性慈儉頗涉經史多援以決事中外章奏日數十上一一能記綱要有疑未決者則曰公輩更議之未嘗出已意檢柅曹氏及左右臣僕毫分不以假借宫省肅然立皇后高氏后侍中瓊之曾孫母曹氏太后姊也少育宫中既長出宫婚于濮邸封京兆郡君至是册為皇后五月以富弼為樞密使秋七月帝疾瘳帝疾甚舉措或改常度遇宦者尤少恩左右多不悅乃共為讒間兩宫遂成隙內外恟懼知諫院吕誨上書兩宫開陳大義詞旨深切多人所難言者而兩宫猶未釋然一日韓琦歐陽修奏事簾前太后嗚咽流涕具道所以琦曰此病故爾疾已必不然子疾母可不容之乎后意不解修進曰太后事先帝數十年仁德著于天下昔溫成之寵太后處之裕如今母子間反不能容邪后意稍和修復曰先帝在位久德澤在人故一日晏駕天下奉戴嗣君無敢異同者今太后一婦人臣等五六措大耳非先帝遺意天下誰肯聽從后默然久之琦進曰臣等在外聖躬若失調護太后不得辭其責后驚曰是何言我心更切也同列聞者莫不流汗後數日琦獨見帝帝曰太后待我少恩琦對曰自古聖帝明王不為少矣獨稱舜為大孝豈其餘盡不孝哉父母慈而子孝此常事不足道惟父母不慈而子不失孝乃為可稱但恐陛下事之未至耳父母豈有不慈者哉帝大感悟帝自六月不御殿至是初御紫宸殿見百官琦因請乘輿禱兩具素服以出人情大安帝命侍臣講讀于邇英閣翰林侍讀學士劉敞進讀史記至堯授舜以天下拱而言曰舜至側陋堯襌之以位天下享之百姓戴之非有他道惟孝友之德光于上下耳帝悚然改容太后聞之亦大喜兩宫之疑盡釋契丹耶律重元反兵敗自殺契丹主尊寵其叔重元甚至賜以金劵免拜不名而重元陰懷異圖是月契丹主如太子山方輿紀要山在故大寧衛西南重元子楚王尼嚕古小字伊囉斡尼嚕古舊作涅魯古伊囉斡舊作耶律綰今改與樞密同知蕭呼敦字伊遜孝穆之姪呼敦舊作胡覩伊遜舊作乙辛今改等四百人謀作亂敦睦宫使耶律良上變契丹主召南院樞密使耶律仁先語之且急召尼嚕古仁先曰此曹凶逆臣固疑之陛下宜謹為備臣請帥衛士討之尼嚕古聞召知事泄遂誘脅弩手軍犯帷殿仁先使北院樞密使耶律伊遜字呼圖克五院部人伊遜舊作乙辛呼圖克舊作胡覩衮今改等率宿衛士卒數千人與尼嚕古戰賊衆多降尼嚕古躍馬突出近侍渤海阿蘇舊作阿厮今改等射殺之重元被傷退其黨遂奉重元僭位以呼敦為樞密使率奚人二千薄行宫會五院部節度蕭塔喇舊作塔剌今改聞召領兵至仁先俟賊氣阻背營而陳乘便奮擊塔喇自外擾之賊大奔追殺二十餘里重元走大漠自殺黨與皆伏誅契丹主執仁先手曰平亂皆卿之力也加尚父進封宋王伊遜等加賞有差冬十月葬永昭陵在河南府鞏縣西南定陵西北史臣曰仁宗在位四十二年之間吏治若偷惰而任事蔑殘刻之人刑法似縱弛而決獄多平允之士國未嘗無弊幸而不足以纍治世之體朝未嘗無小人而不足以勝善類之氣君臣上下惻怛之心忠厚之政所以培壅國基者厚矣子孫一矯其所為遂馴致于亂傳曰為人君止于仁帝無愧焉英宗皇帝甲辰治平元年夏五月太后還政于帝加韓琦尚書右僕射帝疾大瘳琦欲太后撤簾還政乃取十餘事稟帝帝裁決悉當琦即詣太后覆奏后每事稱善琦因白后求去后曰相公不可去我當居深宫耳遂起琦即厲聲命鑾儀司撤簾簾既落猶于御屏後見后衣也帝親政加琦右僕射六月增置宗室學官舊制諸王宫教授無定員至是封皇子頊為潁王以王陶字樂道萬年人邵亢字興宗丹陽人等為翊善記室因增置教授官以教皇族年十四以下者别置小學教授凡二十七員先是司馬光言于帝曰王陶等雖為皇子伴讀若不旬日得見或見而遽退語言不洽志意不通教者止于供職學者止于備禮而左右前後侍御僕從或有佞邪讒巧之人雜處其間雖皇子資性端慤難移然親近易習積久易遷雖有碩儒端士為之師傅終無益也臣願陛下博選學行之士使日與皇子居處燕游講論道義其侍御僕從邪佞讒巧之人誘導為非者委伴讀官糾舉即時斥逐若皇子自有過失規誨不從亦聽以聞如此則進德修業日就月將善人益親邪人益疏天下之幸也帝嘉納之遂有是命秋八月內侍任守忠有罪竄蘄州初莊獻太后臨朝守忠與都知江德明等交通請謁仁宗親政謫監英州酒稅復纍遷至宣政使入內都知仁宗以未有儲嗣屬意于帝守忠建議欲援立昏弱以邀大利及帝即位又乘帝疾交搆兩宫知諫院司馬光論守忠離閒之罪國之大賊乞斬于都市吕誨亦上疏論之帝納其言翌日韓琦出空頭敕一道歐陽修己簽趙槩難之修曰第書之韓公必自有說既而琦坐政事堂召守忠立庭下曰汝罪當死遂責蘄州安置取空頭敕填與之即日押行琦意以為少緩則中變也其黨史昭錫等悉竄南方中外快之九月詔日開經筵重陽節當罷講吕公著司馬光言先帝時無事常開經筵近以聖體不安遂于端午及冬至後盛暑盛寒權罷數月今陛下初政清明宜親近儒雅講求治術願不惜頃刻之間日御講筵從之復武舉冬十一月刺陜西民為義勇軍韓琦言唐置府兵最為近古今之義勇河北幾十五萬河東幾八萬勇悍純實若稍加簡練亦唐之府兵河東北陜西三路當西北控禦之地事當一體今若于陜西諸州刺手背以為義勇甚便乃命徐億等往籍陜西主户三丁之義刺之凡十五萬六千餘人人賜錢二千民情驚擾而紀律疏略不可用知諫院司馬光上疏力諫不聽光至中書與韓琦辨琦曰兵貴先聲諒祚方桀驁使驟聞益兵二十萬豈不震懾光曰兵貴先聲為其無實也獨可欺于一日之間耳今吾雖益兵實不可用不過十日彼將知其詳尚何懼琦曰君但見慶厯間鄉兵刺為保捷事見前憂今復然已降敕與民約永不充軍遣戍邊矣光曰朝廷嘗失信于民未敢以為然琦曰吾在此君無憂光曰公長在此地可也異日他人當位用以運糧戍邊反掌間耳琦不從竟為陜西之患十二月吳奎罷以王疇字景彞濟陽人為樞密副使奎居父喪毁瘠廬墓固辭起復疇厲風操喜言事未幾卒吐蕃瑪爾戩宋史英宗紀作瞎沁密藏舊作瞎欺米征今改乞內附續綱目作瑪爾戩以河州內附宋元通鑑同考宋史吐蕃傳及王韶傳瑪爾戩叛服不常此雖乞附並未舉州內屬至熙寧六年始復河州七年瑪爾戩來降今依本紀于此止書乞附以著其實初嘉勒斯賚娶李立遵女生轄藏舊作瞎氊今改及瑪津嘉賚舊作磨氊角今改又娶喬氏生棟戩舊作董氊今改李氏寵衰斥為尼于廓州而錮其二子二子乃結母黨李巴全竊母奔宗噶爾舊作宗哥今改城嘉勒斯賚不能制瑪津嘉賫因撫有其衆寶元中瑪津嘉賚死部人立其子轄薩䇿丹舊作瞎撤欺丁今改李氏懼孤弱不能守乃復屬嘉勒斯賚轄藏仍居龕谷宋初吐蕃地後于此置寨金為縣元省故城在今蘭州府金縣而死有二子長曰瑪爾戩居河州少曰轄鄂特且舊作瞎吳叱叱今改居銀川在蘭州府河州西北棟戩與母别居哩正在河州西舊作歷精今改城號令嚴明人憚服之冇衆六萬日以盛彊獨有河北之地嘉勒斯賚所部由是遂分至是瑪爾戩率其衆求內附以內侍為陜西諸路鈐轄帝遣王昭明等四人體量軍情治其詞訟有賞罰則與其帥議大事以聞各許嵗乘驛奏事諫官吕諱言唐舉兵不利未有不自監軍者我朝因循未革奈何又增置此員其權與安撫使均矣乞罷之精選帥臣專制閫外傅堯俞字欽之濟原人趙瞻字大觀永城人皆有論列不聽乙已二年春二月罷三司使蔡襄帝自濮邸立為皇子聞近臣中有異議先是皇太后聽政為輔臣言先帝既立皇子宦妾更加熒惑而近臣知名者亦然幾敗大事近已焚其章矣人疑為襄及是帝問襄為何如人韓琦等為救解帝意不回襄請罷遂命出知杭州襄精吏事談笑剖決史不能欺嘗知泉州距州二十里萬安渡絶海而濟襄立石為梁長三百六十丈又植松七百里以庇道路閩人賴之仁宗愛其書法常令書碑版而溫成后父碑則辭不書後卒乾道中諡忠惠襄萬安橋一名洛陽橋在今泉州府晉江縣東北有手書碑三月行明天厯判司天監周琮等所造也夏四月詔議崇奉濮王典禮初知諫院司馬光以帝必將追隆所生嘗因奏事言漢宣帝為孝昭後終不追尊衛太子史皇孫光武上繼元帝亦不追尊巨鹿南頓君此萬世法也既而韓琦等言禮不忘本濮安懿王德盛位隆所宜尊禮請下有司議王及夫人王氏韓氏仙遊縣君任氏令行典禮用宜稱情帝令須大祥後議之至是詔禮官與待制以上議翰林學士王圭等相視莫敢先發司馬光獨奮筆立議略云為人後者為之子不得顧私親若恭敬之心分于彼則不得專于此秦漢以來帝王有自旁支入承大統者或推尊其父母以為帝后皆見非當時取譏後世臣等不敢引以為聖朝法況前代入繼者多宫車晏駕之後援立之䇿或出臣下非如仁宗皇帝年齡未衰深惟宗廟之重于宗室中簡推聖明授以大業陛下親為先帝之子然後繼體承祧光有天下濮安懿王雖于陛下有天性之親顧復之恩然陛下所以負扆端冕子孫萬世相承皆先帝德也臣等竊以為濮王宜準先朝封贈期親尊屬故事尊以高官大國譙國襄國仙遊並封太夫人考之古今為宜稱于是圭即命吏具以光手藁為據議上中書奏圭等所議未見詳定濮王當稱何親名與不名圭等議濮王于仁宗為兄于皇帝宜稱皇伯而不名歐陽修引喪服大記以為為人後者為其父母降服三年為期而不沒父母之名以見服可降而名不可沒也若本生之親改稱皇伯厯考前世皆無典據進封大國則又禮無加爵之道請下尚書集三省御史臺議而太后手詔詰責執政帝乃詔曰聞典禮集議不一權宜罷之令有司博求典故以聞詔皇子及宗室卑屬勿授師傅官時封皇子並除檢校師傅中丞賈黯以為子為父師于義未安故有是詔秋七月富弼張升罷嘉祐中韓琦與弼同相或中書有疑事往往與樞密謀之自弼使樞密非得㫖合議琦未嘗詢弼弼頗不懌及太后還政弼大驚曰弼備位輔佐他事固不可預聞此事韓公獨不能共之邪或以咎琦琦曰此事當如出太后意安可顯言于衆弼愈不懌及帝親政加弼戶部尚書弼辭曰制詞取嘉祐中嘗議建儲推恩此特絲髮之勞何足加賞仁宗太后于陛下有天地之恩尚末聞所以為報可謂倒置再奏不聽乃受至是以足疾力求解政章二十餘上遂以使相鄭國公判揚州未幾徙判汝州升請老帝曰太尉勤勞王家詎可遽去但命五日一至院進見毋蹈舞司馬光亦疏升忠謹清直請留于朝而升求去益力乃判許州先是韓琦曾公亮欲遷歐陽修為樞密使將進擬修覺其意謂之曰今天子諒陰母后垂簾而二三大臣自相位置何以示天下琦等服其言而止以文彥博為樞密使吕公弼為副使彥博自河南入覲帝曰朕之立卿之功也彥博竦然對曰陛下入繼大統乃先帝意皇太后協贊之力臣何功之有且其時臣方在外皆韓琦等承聖志受顧命臣無預焉因避謝不敢當帝曰暫煩卿西行即召還矣乃改判永興軍遂召為樞密使公弼先為羣牧使時帝居藩得賜馬頗劣欲易不可至是帝謂公弼卿曩嵗不與朕馬固已知卿矣乃以權三司使進副樞密八月京師大水詔求直言京師大雨平地涌水壞官私廬舍漂人民畜産不可勝計是日帝御崇政殿宰相而下朝參者十數人而已詔開西華門以泄宫中積水水奔激東殿侍班屋皆摧沒人多溺死官為葬祭其無主者千五百八十人下詔責躬求言且命罷晏減膳禱于山川司馬光上疏極論時事略云陛下即位以來災異甚衆日有黑子江淮之水或溢或涸去夏霖雨涉秋不止老弱流離積尸成邱今夏疫癘大作彌數千里秋收未穫暴雨大至都城之大道路乘桴官府民居覆沒殆盡死于壓溺者不可勝計陛下安得不側身恐懼思其所以致此者乎又曰先帝擢陛下于衆人中升為天子惟以一后數公主託陛下而梓宫在殯已失大后歡心長公主數人屏居閒宮此陛下所以失人心之始也又日凡百奏請不肯與奪知人之賢不能舉知人不肖不能去知事之非不能改知事之是不能從此天下所以重失望也又曰臺諌天下之耳目其有所言當以聖意察其是非不宜一付之大臣帝嘉納之冬十一月吐蕃嘉勒斯賚死以其子棟戩為保順節度使丙午三年春正月翰林學士范鎮罷韓琦求去鎮草批答引周公不之魯為辭帝不悅鎮遂請外罷知陳州時論或謂鎮以議濮王追崇事忤歐陽修修為帝言鎮以周公待琦是以孺子待陛下鎮之出修之為也契丹復改國號曰遼此後契丹復改書遼詔稱濮王為親立園廟謫侍御史吕誨等于州縣濮王崇奉之議久而未定侍御史吕誨范純仁字堯夫仲淹子監察御史吕大防字微仲長安人引義固爭以為王圭議是乞從之章七上而不報遂劾韓琦專權導諛罪又共劾歐陽修首開邪議以枉道說人主以近利負先帝陷陛下于過舉而韓琦曾公亮趙槩附㑹不正乞皆貶黜不報時中書亦上言請明詔中外以皇伯無稽決不可稱今所欲定者正名號耳至于立廟京師干亂統紀之事皆非朝廷本意帝意不能不嚮中書然未即下詔也既而皇太后手詔中書宜尊濮王為皇夫人為后皇帝稱親帝下詔謙讓不受尊號但稱親即園立廟以王子宗朴為濮國公奉祠事仍令臣民避王諱時論以為太后之追崇及帝之謙讓皆中書之謀也于是吕誨等以所論奏不見聽用繳納御史敕告家居待罪帝命閣門以告還之誨力辭臺職且言與輔臣勢難兩立帝以問執政琦修等對曰御史以為理難並立若臣等有罪當留御史帝猶豫久之命出御史乃下遷誨知蘄州純仁通判安州大防知休寧縣本休陽隋更名今屬徽州府時趙鼎趙瞻傅堯俞使遼還以嘗與吕晦言濮王事即上疏乞同貶乃出鼎通判淄州瞻通判汾州帝眷注堯俞獨進除侍御史堯俞曰誨等已逐臣義不當止帝不得已命知和州知制誥韓維及司馬光皆上疏乞留誨等不報逐請與俱貶亦不許侍讀吕公著言陛下即位以來納諌之風末彰而屢詘言者何以風天下帝不聽公著乞補外乃出知蔡州諱等既出濮議亦寢三月彗星見西方如太白長有五尺又孛于畢如月夏四月胡宿罷以郭逵字仲通邢州人同簽書樞密院事逵少隸范仲淹麾下逵嘗議取靈武非計已而任福果戰殁又論葛懷敏必敗人皆服其先見纍功遷檢校太保同簽書樞密院事知諫院邵亢等交章言祖宗朝樞府參用武臣如曹彬父子馬知節王德用狄青勳勞為天下所稱則可逵黠佞小才豈堪大用不報夏人寇邊環慶經略使蔡挺字子政宋城人擊走之先是夏主諒祚遣吳宗來賀即位宗語不遜詔諒祚懲約宗諒祚不奉詔而出兵秦鳯涇原抄熟户擾邊塞殺掠人畜以萬計遂寇大順城并下柔逺金湯注俱見前環慶經略使蔡挺使蕃官趙明擊之諒祚衷銀甲氊帽督戰挺先遣彊弩列壕外注矢下射諒祚中流矢遁去徙寇柔逺挺又使副總管張玉字寶臣保定人以三千人夜出擾營賊驚潰退屯金湯聲言益發十萬騎圍大順㑹朝廷發嵗賜銀幣知延州陸詵字介夫餘杭人曰朝廷積習姑息故敵人侵擾不稍加折誚則國威不立因留止不與移牒宥州問故諒祚遂大沮盤桓塞下因遣使謝罪言邊吏擅興兵行且誅之初諒祚入寇韓琦議停其嵗賜絶其和市遣使問罪文彥博難之舉寶元康定時事琦曰諒祚狂童非有元昊智計而吾邊備過昔逺甚亟詰之必服㑹陸詵䇿與琦合而諒祚果歸欵帝顧琦曰一如卿料也秋九月壬子朔日食詔宰臣舉館職帝謂中書曰水潦為災言事者云咎在不能進賢何也歐陽修曰近年進賢路狹往時進士五人以上皆得試館職第一人及第不十年即至輔相今第一人兩任方得試而第二人以下無復得試往時大臣薦舉即召試今止令上簿候闕人乃試唯有因差遣例除者半是年勞老病之人此所謂進賢路狹也帝因命韓琦等舉士得二十人皆令召試琦等以人多難之帝曰苟賢豈患多也乃先召試十人餘須後試時士人以登臺閣升禁從為顯官而不以官之遲速為榮滯故為之語曰寧登灜不為卿寧抱槧不為監冬十月以郭逵為陜西四路宣撫使自吕餘慶以參知政事知成都其後見任執政無守藩者至逵始以同簽書樞密院事出鎮兼判渭州詔禮部三嵗一貢舉十一月帝有疾十二月立子頊為皇太子大赦時帝久疾韓琦入問起居因進言曰陛下久不視朝願早建儲以安社稷帝頷之琦請帝親筆指麾帝乃書曰立大大王為皇太子琦曰必潁王也煩聖躬更親書之帝又批于後曰潁王頊琦即召學士承㫖張方平至福寧殿草制帝憑几言言不可辨方平復進筆請書其名帝力疾書之丁未四年春正月帝崩太子即位是為神宗大赦帝崩于福寧殿年三十六太子即位赦天下常赦所不原者尊皇太后曰太皇太后皇后曰皇太后以韓琦為司空兼侍中二月立皇后向氏后太尉敏中之曽孫定國留後經之女帝為潁王時納焉至是冊為后始命公主行見舅姑禮英宗嘗謂帝曰舊制帝女出降輒皆升行以避舅姑之尊義甚無謂朕嘗思此寤寐不平豈可以富貴之故屈人倫長幼之序也可詔有司革之㑹疾不果至是始詔令公主行見舅姑禮著為令三月歐陽修罷修既以議濮王典禮為吕誨所詆惟蔣之竒字潁叔常州宜興人以修議為是及誨等斥而修薦之竒為御史衆因目為姦邪之竒患焉思所以自解㑹修婦弟薛良孺有憾于修誣修以帷薄不根之謗達于中丞彭思永字季常廬陵人思永以告之竒之竒即上章劾修修杜門請推治帝使詰所從來皆辭窮乃黜思永知黃州之竒監道州酒稅修因力求退乃以觀文殿學士知亳州以吳奎參知政事奎終制以故職還朝踰月拜參知政事進治說三篇又嘗言帝王所職惟在判正邪使君子常居要近小人不得以近之則自治矣帝因言堯時四凶猶在朝奎曰四凶雖在不能惑堯之聰明聖人以天下為度未有顯過固宜包容但不可使居近要地耳帝然之以司馬光為翰林學士固辭不許光力辭帝曰古之君子或學而不文或文而不學惟董仲舒揚雄兼之卿有文學何辭為光對曰臣不能為四六帝曰如兩漢制誥可也且卿能進士取髙第而云不能四六何邪光乃就職閏月以王安石知江寧府終英宗之世安石被召未嘗起安石本楚士未知名于中朝以韓吕二族為巨室欲藉以取重乃深與韓絳及其弟維吕公著交三人更稱揚之帝在潁邸維為記室每講說見稱輒曰此非維之說維友王安石之說也維遷庶子又薦安石自代帝由是想見其人及帝即位召之安石不至帝謂輔臣曰安石歷先帝朝召不赴頗以為不恭今又不至果病邪有所要邪曽公亮曰安石真輔相材必不欺罔吳奎曰臣嘗與安石同領羣牧見其護非自用所為迂闊萬一用之必紊綱紀帝不聽命知江寧府衆謂安石必辭及詔至即起視事夏四月以司馬光為御史中丞中丞王陶謀欲易置大臣自規重位因劾韓琦不押文德殿常朝班為跋扈琦閉門待罪吳奎以陶言為過詔陶與光兩易其任奎又言唐德宗疑大臣信任羣小斥陸贄而以裴延齡等為腹心至今稱為至暗之主今陶排抑端良不黜無以責大臣展布陶遂言奎附宰相欺天下帝以陶過毁大臣出知陳州陶始受知于琦驟加奬拔及以論琦出人謂其反覆帝薄其為人更不復用而奎亦議調外州光言陶論宰相不押班未行而罷則中丞不可復為請俟琦押班然後就職復言吳奎名望素重于陶今與並黜恐大臣皆不自安各求引去陛下新即位于四方觀聽非宜帝從之奎乃復還中書秋八月葬永厚陵在鞏縣西南昭陵之西史臣曰以英宗明哲之姿膺繼統之命執心固讓而卒踐帝位及其臨政每有裁決皆出羣臣意表雖以疾疢不克大有所為然使後世咏歎至德何其盛也京師地震九月召王安石為翰林學士罷司空侍中韓琦琦執政三朝或言其專帝頗不悅曽公亮因力薦安石覬以閒琦琦求去益力帝不得已以琦為鎮安武勝軍節度使司徒兼侍中判相州入對帝泣曰侍中必欲去今日已降制矣然卿去誰可屬國者王安石何如琦對曰安石為翰林學士則有餘處輔弼之地則不可帝不答琦早有盛名識量英偉臨事喜愠不見于色居相位再決大䇿以安社稷當是時朝廷多故琦處危疑之際知無不為或曰公所為誠善萬一蹉跌豈惟身不自保恐家無所處矣琦嘆曰是何言邪人臣當盡力事君死生以之至于成敗天也豈可豫憂其不濟遂輟不為哉聞者愧服吳奎陳升之即陳旭注見前罷韓琦既罷奎出知青州明年卒奎喜奬善少甚貧既貴買田為義莊以賙族黨沒之日諸子至無屋以居以吕公弼為樞密使張方平趙抃參知政事韓絳邵亢為樞密副使抃自知成都召知諫院故事近臣召自外州將大用者必更省府及命下大臣以為疑帝曰吾賴其言耳苟欲用之無傷也及入謝帝曰聞卿匹馬入蜀以一琴一鶴自隨為治簡易亦稱是乎遂拜參知政事抃感顧知遇朝政有未協者必密啓聞帝嘉其忠恆褒答之亢前與王陶比詆吳奎以撼韓琦琦奎既去亢遂由樞密直學士進副使復以司馬光為翰林學士冬十月張方平罷光論張方平不協物望難居政府帝不從命徙光翰林知通進銀臺司吕公著封還除目曰光以舉職賜罷是為有言責者不得盡其言也詔以告直付閣門公著又言制命不由閣下則封駁之職因臣而廢願正臣罪乞解銀臺司不報未幾方平以父喪亦罷青澗守將仲諤字子正世衡子襲虜夏監軍威名山遂復綏州威名山部落在故綏州名山弟夷山請降于知青澗城种諤諤使人因夷山以誘名山賂以金盂名山小吏李文喜受之隂許歸欵而名山未之知也諤即以聞且欲因取河南地知延州陸詵言以衆來降情僞未可知戒諤毋妄動諤持之力詔詵召諤問狀且與轉運使薛向字師正京兆長安人議撫納乃共書三策令幕府張穆之入奏穆之因受向指詭言必可成帝意詵不協力徙之秦鳳諤不待命悉起所部兵長驅而進圍名山帳名山不得已舉衆從諤而南得首領三百户萬三千兵萬人遂城其地夏人來爭諤擊敗之詵劾諤擅興之罪欲捕治之未果而徙秦之命至西方用兵自此始十一月夏人誘殺知保安軍楊定等詔韓琦經略陕西竄种諤于隨州种諤既受威名山降夏主諒祚乃詐為㑹議誘知保安軍楊定等殺之邊釁復起朝廷以諤生事欲棄綏誅諤㑹郭逵由鄆州徙鎮鄜延用其屬趙卨字公才卭州依政人言上疏以為虜既殺王官而又棄綏不守示弱己甚且名山舉族來歸當何以處又移書執政請存綏以張兵勢規度大理河川即大力川在綏德州西北源出榆林下流入無望河建堡畫稼穡之地三十里以處降者考此疏及書續綱目通鑑俱作趙卨言而宋史則載郭逵傳蓋卨為逵屬吏謀出卨而主之者逵也今依宋史改輯乃命韓琦判永興軍經略陜西琦初言綏不當取及定等被殺復言綏不可棄樞密以初議詰之琦具論其故卒存綏州時言者交論种諤乃下吏貶其官安置隨州十二月夏主諒祚卒子秉常立郭逵詗得殺楊定等首領姓名為李崇貴韓道善諒祚乃錮崇貴等以獻既而諒祚卒于秉常立遣其臣薛宗道等來告哀帝問殺楊定事宗道言殺人者已執送之矣初定奉使諒祚常拜稱臣且許以歸沿邉熟户諒祚遺之寶劒寶鑑及金銀物定歸時以劒鑑上而匿其金銀且言諒祚可刺帝喜遂擢知保安軍既而夏人失綏州以為定賣已故殺之至是崇貴等至具言其事帝薄責崇貴等而削定官沒其田宅萬計遣劉航魏人冊秉常為夏國主遼遣使冊為夏國王諒祚之世當請去蕃禮從漢儀服中國衣冠往往以漢官命其臣且數上表求九經唐史冊府元龜正旦朝賀儀仁宋以九經賜之神宗皇帝戊申熙寧元年春正月甲戌朔日食帝不受朝詔宰相極言闕失帝嘗謂文彥博曰天下敝事至多不可不革彥博對曰譬如琴瑟不調必更張之韓絳曰為政之事當有大小先後之序帝曰大抵威克厥愛乃能有濟又謂彥博曰當今理財最為急務養兵備邊府庫不可不豐大臣共宜留意節財趙槩罷槩秉心和平與人無怨惡在官如不能言然隂以利物者為多時議比之劉寬婁師德以老求罷知徐州以唐介參知政事先是宰相省閲所進文書于待漏院同列不得聞介謂曽公亮曰身在政府而事不預知上或有所問何辭以對乃與同視後遂為常夏四月詔王安石越次入對安石受命厯七月始至京師詔越次入對帝問為治所先安石對曰擇術為先帝曰唐太宗何如曰陛下當法堯舜何以太宗為哉堯舜之道至簡而不煩至要而不迂至易而不難但末世學者不能通知以為髙不可及耳帝曰卿可謂責難于君一日請席羣臣退帝留安石坐因言唐太宗必得魏徵漢昭烈必得諸葛亮然後可以有為二子誠不世出之人也安石曰陛下城能為堯舜則必冇皋夔稷契誠能為髙宗則必有傅說彼二子者何足道哉以天下之大常患無人可以助治者以陛下擇術未明推誠未至雖有皋夔稷契傅說之賢亦將為小人所蔽卷懷而去耳帝曰何世無小人雖堯舜之時不能無四凶安石曰惟能辨四凶而誅之此其所以為堯舜若使四凶得肆其讒慝然則皋夔稷契亦安肯苟食其祿以終身乎秋七月以陳升之知樞密事升之前與文彥博同爭楊定不可使上不聽定既被殺上思其言于是復召用之京師地震自七月至十一月京師地震者六河朔地亦大震八月復行崇天厯以月食不效詔厯官雜候星晷重造新厯至是上之占驗亦差遂復行崇天厯削奪司天少監周琮等一官九月初封太祖曽孫從式秦王德芳孫為安郡王帝謂創業垂統實自太祖顧無以稱乃下詔封太祖諸孫行尊者一人奉太祖祀世世勿絶同知太常禮院劉攽字貢父新喻人言禮諸侯不得祖天子太祖傳天下于太宗繼體之君皆太祖子孫不當别為天子置後若崇德昭德芳之後世世勿降爵宗廟祭祀使之在位則所以褒揚藝祖者著矣帝從之遂有是命冬十一月郊執政以河朔旱傷國用不足乞南郊勿賜金帛詔學士議司馬光曰救災節用當自貴近始可聽也王安石曰常衮辭堂饌時以為衮自知不能當辭職不當辭祿且國用不足以未得善理財者故也光曰善理財者不過頭㑹箕斂漢書注以人頭數出榖以箕斂之爾安石曰不然善理財者不加賦而國用足光曰天下安有此理天地所生財貨百物不在民則在官彼設法奪民其害乃甚于加賦此蓋桑𢎞羊欺武帝之言太史公書之以見其不明耳爭議不已帝曰朕意與光同然姑以不允答之㑹安石草制引常衮事責兩府兩府不敢復辭己酉二年春二月以富弼同平章事王安石參知政事初弼自汝川入覲詔許肩輿至殿門令其子掖以進且命毋拜坐語從容訪以治道弼知帝果于有為對曰人君好惡不可令人窺測可測則姦人得以傅㑹當如天之監人善惡皆所自取然後誅賞隨之則功罪皆得其實矣又問邊事弼對曰陛下臨御未久當布德惠願二十年口不言兵帝默然留之力辭赴郡至是召拜司空兼侍中賜甲第悉辭之乃詔以左僕射同平章事時帝以災變避殿減膳撤樂王安石言災異乃天數非關人事得失所致弼在道聞之嘆曰人君所畏者天耳若不畏天何事不可為者此必小人欲進邪說以搖上心使輔弼諌諍之臣無所施其力是治亂之機不可以不速救即上書數千言力論之及入對又曰君子小人之進退繫王道之消長願深加辨察勿以同異為喜怒喜怒為用舍陛下好使人伺察外事故姦憸得志又今中外之務漸有史張此必小人獻讒于陛下也大抵小人惟喜動作生事則其間有所希覬若朝廷守靜則事有常法小人何望哉願深燭其然無使有悔帝欲用安石唐介言安石難大任帝曰文學不可任邪經術不可任邪吏事不可任邪介對曰安石好學而泥古故議論迂闊若使為政必多所更變介退謂曽公亮曰安石果大用天下必困擾諸公當自知之帝問侍讀孫固字和甫管城人曰安石可相否固對曰安石文行甚髙處侍從獻納之職可矣宰相自有度安石狷狹少容必欲求賢相吕公著司馬光韓琦其人也帝不以為然竟以安石參知政事帝問安石曰人皆以卿但知經術不曉世務安石對曰經術正所以經世務帝曰然則卿設施以何為先安石對曰變風俗立法度正方今之所急也帝深納之創制置三司條例司議行新法命陳升之王安石領其事王安石言周置泉府之官以𣙜制兼併均濟貧乏變通天下之財後世惟桑𢎞羊劉晏粗合此意學者不能推明先王法意更以為人主不當與民爭利今欲理財則當修泉府之法以收利權帝納其說安石猶恐帝不能決意任之乃復言人才難得亦難知今使十人理財其中容有一二敗事則異論乘之而起堯與羣臣共擇一人治水尚不能無敗事況所擇而使非一人豈能無失要當計利害多少不為異論所惑帝曰有一人敗事而遂廢所圖此所以少成事也乃立制置三司條例司掌經畫邦計議變舊法以通天下之利命升之安石領其事初吕惠卿字吉甫泉州晋江人自真州宋置今揚州府儀徵縣是推官秩滿入都與安石論經義意多合遂定交因言于帝曰惠卿之賢雖前世儒者未易比也學先王之道而能用者獨惠卿而已遂以惠卿及蘇轍並為檢詳文宇事無大小安石必與惠卿謀之凡所建請章奏皆惠卿筆也又以章惇字于厚浦城人為三司條例司曽布字子寅鞏之弟檢正中書五房凡有奏請朝臣以為不便者布必上疏條析以堅帝意使專任安石以威脅衆俾勿敢言由是安石信任布亞于惠卿而農田水利青苗均輸保甲免役市易保馬方田諸役相繼並興號為新法頒行天下安石與劉恕字道原筠州人友善欲引置三司條例恕以不習金榖為辭且曰天子方屬公以大政宜恢張堯舜之道以佐明主不應以利為先安石遂與之絶先是治平中邵雍與客散步天津橋上聞杜鵑聲慘然不樂客問其故雍曰洛陽舊無杜鵑今始至天下將治地氣自北而南將亂自南而北今南方地氣至矣禽鳥飛類得氣之先者也不數年當有南士作相多引南人專務變更天下自此多事也至是雍言果驗矣縣天津橋在河南府洛陽城外夏四月旱續綱目宋元通鑑于是月書河決地震考宋史神宗紀俱不書惟河渠志載是年北流閉而復决然在七月後非四月也又按地震應書在某地神宗紀及五行志皆不載是年四月有地震之事惟滕元發傳言京師地震元發上疏言事又河北地大震命元發為安撫使還知開封府傳雖不明著某月然本書上年七月有京師地震一條下文有罷知之開封府滕元發一條則二書所載河決二字必河北訛也附辨于此達滕元發本名甫字道東陽人參知政事唐介卒諡質肅介簡伉敢言居政府數與王安石爭辨而安石彊解帝主其說介不勝其憤遂疽發背而卒以薛向為浙江荆淮發運使初仁宗時范祥制置解鹽事具前公私便之祥卒以向繼領向請兼以鹽易馬王安石時領羣牧主其說請久任向至治平末向坐與种諤開邊始罷去㑹淮南轉運使張靖言向壞鹽法且有欺隱帝召向與靖對錢公輔字君倚武進人范純仁皆言向罪安石排羣議扺靖于法以向代之已而向請置賣鹽場于永興軍官自鬻之罷通商法罷知開封府滕元發元發以翰林學士知開封府在帝前論事如家人父子言無文飾洞見肝膈帝知其誠藎事無巨細人無親疏輒問之元發隨事解答不少嫌隱王安石嘗與元發同考試語言不相能深惡元發㑹議新法恐元發言而帝信之因極力排元發出知鄆州初元發同修起居注帝召問治亂之道對曰治亂之道如黑白東西所以變色易位者朋黨汨之也帝曰卿知君子小人之黨乎曰君子無黨譬之草木綢繆相附者必蔓草非松柏也朝中無朋黨雖中主可以濟不然雖上聖亦殆帝以為名言遣使察農田水利賦役于天下從三司條例司之請遣劉彝字執中福州人謝卿材侯叔獻程皓盧秉字仲甫德淸人王汝翼曽伉王廣廉大名人八人行諸路相度農田水利稅賦科率徭役利害已而頒農田水利約束由是進計者紛然數年間諸路凡得廢田萬七百九十三處三十六萬一千一百七十八頃有竒而民給役勞擾五月罷翰林學士鄭獬字毅夫安陸人宣徽北院使王拱辰知制誥錢公輔獬權開封府斷謀殺獄不依新法事見後拱辰與王安石議新法不合公輔言滕元發不宜去薛向變法當黜安石惡之出獬知杭州拱辰判應天府公輔知江寧府御史中丞吕誨上疏言三人者無罪被黜甚非公議上出奏示執政安石曰此三人者出臣但愧不能盡理論情暴其罪狀使小人知所忠憚不意言者乃更如此六月罷御史中丞吕誨王安石既執政士大夫多以為得人吕誨獨不以為然上疏言大姦似忠大詐似信安石外示朴野中藏巧詐驕蹇慢上隂賊害物誠恐陛下說其才辨久而倚毗亂由是生臣究安石本無逺略惟務改作立異于人文言飾非罔上欺下誤天下蒼生必斯人也疏奏帝方眷注安石還其章疏誨遂求去乃出誨知鄧州先是誨將對學士司馬光亦將詣經筵相遇並行光密問今日所言何事誨曰袖中彈文乃新參也光愕然曰衆喜得人奈何論之誨曰君實亦為是言邪安石雖有時名然好執偏見輕信姦回喜人佞已聽其言則美施于用則疏置諸宰輔天下必受其禍及誨斥安石益橫光由是服誨之先見自以為不及也秋七月乙丑朔日食行均輸法條例司言諸路上供嵗有常數年豐可以多致而不能贏餘年歉難于供億而不敢不足逺方有倍蓰之輸中都有半價之鬻徒使富商大賈乘公私之急以擅輕重斂散之權今浙江荆淮發運使實總六路賦入宜假以錢貨貴其用度凡上供之物皆得徙貴就賤因近易逺預知在京倉庫所當辦者得以便易蓄買而制其有無庶幾國用可足民財不匱詔以發運使薛向領均輸平凖專行于六路賜內藏錢五百萬緡上供米三百萬石時議者多言非便劉琦字公玉宣城人錢覬字安道無錫人蘇軾先後論列皆坐貶向復請設置官屬從之權開封推官蘇軾言今先設官置吏簿書廩祿為費已厚非良不售非賄不行是官買之價比民必貴及其賣也弊復如前此錢一出恐不可復縱使其間薄有所獲而征商之額所損必多矣帝方惑于安石不納其言然均輸法亦迄不能就改蘇軾續綱目作蘇轍今依宋史食貨志及軾本傳八月罷判國子監范純仁初純仁自陜西轉運副使召還帝問陜西城郭甲兵糧儲如何對曰城郭粗全甲兵粗修糧儲粗備帝愕然曰卿之材朕所倚信何為皆言粗對曰如是足矣願陛下且無留意邊功若邊臣觀望將貽他日意外之患拜起居舍人同知諫院純仁奏言王安石變祖宗法度棓克財利民心不寧書曰怨豈在明不見是圖願陛下圖不見之怨帝曰何謂不見之怨對曰杜牧所謂不敢言而敢怒者是也時帝切于求治多延見疏逖小臣咨訪闕失純仁言小人之言聽之若可采行之必有纍蓋知小忘大貪利昧逺願加深察及薛向行均輸法于六路純仁言臣嘗親奉德音欲修先王補助之政今乃使小人棓克生靈斂怨基禍安石以富國强兵之術啓迪上心欲求近功忘其舊學鄙老臣為因循乘公論為流俗異已者為不肖合意者為賢人在廷之臣方大半趨附陛下又從而驅之其將何所不至道逺者理當馴致事大者不可速成人才不可急求積弊不可頓革儻欲事功急就必為憸佞所乘宜速還言者而退安石留章不下純仁求去不許未幾罷諫職改判國于監純仁求去愈力安石使諭之曰已議除知制誥矣純仁曰是以利訹我也言不用萬鍾何加焉遂録所上章申中書安石大怒乞加重貶帝曰宜與一善地命知河中府尋徙成都轉運使以新法不便戒州縣未得遽行安石怒其沮格以事左遷知和州以程皓權監察御史裏行初皓舉進士再調晉城唐縣今曰鳳臺為山西澤州府治令民以事至縣者必告以孝弟忠信度鄉村逺近為伍保使之力役相助患難相恤凡孤煢殘廢行旅疾病皆有所養鄉必有校暇時親至召父老與之語兒童所讀書親為正句讀鄉民為社㑹為立科條旌其善惡在縣三年民愛之如父母用薦改著作佐郎至是吕公著薦為御史帝素知其名數召見每退必曰頻求對欲常常見卿一日從容咨訪報正午始趨出庭中人曰御史不知上未食乎皓前後進說甚多大抵以正心窒欲求言育才為言務以誠意感悟人主嘗勸帝防未萌之欲及勿輕天下事帝俯躬曰當為卿戒之定謀殺傷首原法貶判刑部劉述字孝叔湖州人等六人初知登州許遵字仲塗泗州人上州獄有婦謀殺夫傷而未死婦人阿云許嫁未行嫌壻陋伺其寢田舍懷刀斫之不死斷一指而去及按問遂自承法因犯殺傷而自首者得免所因之罪請從減論帝命司馬光與王安石議安石以遵言為是光謂因他罪致殺傷者他罪得首原豈可以謀與殺分為兩事而謂謀為所因得以首原乎帝意方嚮安石而文彥博富弼等多主光議踰年不決至是詔從安石議凡謀殺已傷按問自首者減罪二等著為令侍御史知雜事兼判刑部劉述封還詔執奏不已安石白帝詔開封府推官王克臣字子難遼西人劾述罪述遂率侍御史劉琦錢覬共上疏論安石略曰安石執政以來未踰數月操管商權詐之術與陳升之合謀侵三司利權開局設官分行天下驚駭物聽去年因許遵妄議按問自首之法安石任偏見而立新議陛下不察而從之遂害天下大公先朝所立制度自宜世守勿失乃事更張廢而不用姦詐專權之人豈宜處之廟堂以亂國紀願早罷退以慰天下曽公亮畏避安石隂自結援以固寵趙抃則括囊拱手但務依違皆宜斥免疏上安石奏貶琦監處州鹽酒務覬監衢州鹽稅殿中侍御史孫昌齡始以附安石得進覬將出臺罵昌齡而去于是昌齡亦言王克臣阿奉當權欺蔽聰明遂黜昌齡通判蘄州安石欲置述于獄司馬光范純仁爭之乃貶知江州同判刑部丁諷審刑院詳議官王師元皆以附述忤安石諷貶通判復州師元貶監安州稅龍圖閣學士祖無擇先與安石同知制誥或饋安石潤筆物辭不獲取置院梁上安石憂去無擇用為公費安石聞而惡之及得政乃諷監司求無擇罪㑹御史王子韶使兩漸按知明州苗振貪狀子韶迎安石意遂連無擇逮赴秀州以巧抵無所得誣以他事謫之無擇言語政事為時名卿被誣放棄士論惜焉是王子韶字聖美太原人明州唐置今浙江寧波府秀州五季吳越置今浙江嘉興府是罷條例司檢詳文字蘇轍轍與吕惠卿論多不合㑹遣人使于四方求遺利轍以書抵王安石力陳其不可安石怒將加之罪陳升之止之乃以為河南府推官九月行青苗法初陜西轉運使李參字清臣鄆州須城人以部內多戍兵而糧儲不足今民自隱度麥粟之贏先貸以錢俟榖熟還官號青苗錢經數年廩有餘糧至是條例司請以諸路常平廣惠倉錢榖依陜西青苗錢例民願豫借者給之令出息二分隨夏秋稅輸納願輸錢者從其使如遇災傷許展至豐熟日納非惟足以待凶年之患民既受貸則兼并之家不得乘新陳不接以邀倍息又常平廣惠之物收藏積滯必待年儉物貴然後出糶所及者不過城市游手之人今通一路有無貴發賤斂以廣蓄積平物價使農人有以赴時趨事是亦先王散惠興利以為耕斂補助之意也欲量諸路錢榖多寡分遣官提舉每州選通判幕職官一員典幹轉移出納乃先自河北京東淮南三路施行俟有緒推之諸路詔曰可乃出內庫緡錢百萬糴河北常平粟而常平廣惠倉之法遂變為青苗矣先是王安石既與吕惠卿議定出示蘇轍等曰此青苗法也冇不便以告勿疑轍曰以錢貸民本以救民然出納之際吏緣為姦雖有法不能禁錢入民手雖良民不免妄用及其納錢雖富民不免踰限如此恐鞭箠必用州縣之事煩矣安石曰君言誠有理當徐思之由是逾月不言青苗㑹京東轉運使王廣淵言春農事興而民苦乏兼并之家得以乘急要利乞留本道錢帛五十萬貸之貧民嵗可獲息二十五萬從之其事與青苗法合安石始以為可用召廣淵至京師與之議于是決意行焉王廣淵字才叔大名人以吕惠卿為崇政殿說書王安石薦惠卿為太子中允崇政殿說書司馬光諫曰惠卿憸巧非佳士使王安石負謗于中外者皆其所為安石賢而愎不間世務惠卿為之謀主而安石力行之故天下並指為姦邪近者進擢不次不厭衆心帝曰惠卿進對明辨亦似美才光對曰惠卿誠文學辨捷然用心不正願陛下徐察之江充李訓若無才何以動人主帝默然帝嘗御過英閣聽講光讀曹參代蕭何帝曰漢帝守蕭何之法不變可乎光對曰寧獨漢也使三代之君守禹湯文武之法雖至今存可也漢武取髙帝約束紛更之盜賊半天下元帝改孝宣之政漢業遂衰由此言之祖宗之法不可變也惠卿言先王之法有一年一變者正月始和布法象魏是也有五年一變者巡狩考制度是也有二十年一變者刑罰世輕世重是也光言非是帝問光光對曰布法象魏布舊法也諸侯變禮易樂者王巡狩則誅之不自變也刑新國用輕典亂國用重典是為世輕世重非變也且治天下譬如居室敝則修之非大壞不更造也公卿侍從皆在此願陛下問之三司使掌天下財不才而黜之可也不可使執政侵其事今以制置三司條例司何也宰相以道德佐人主安用例苟用例則胥吏矣今為看詳中書條例司何也惠卿語塞乃以他語扺光帝曰相與語是非耳何至是光又言青苗之弊曰平民舉錢出息尚能蠶食下户至飢寒流離況縣官督責之威乎惠卿曰青苗法願則與不願不彊也光曰愚民知取債之利不知還債之害非獨縣官不彊富民亦不彊也太宗平河東立糴法時斗米十錢民樂與官為市其後物貴而和糴不解遂為河東世世患臣恐異日之青苗亦猶是也帝曰陜西行之久民不為病光曰臣陜西人也見其病不見其利朝廷初不許有司尚能以病民況法許之乎他日人對帝曰今天下洶洶者孫叔敖所謂國之有是衆之所惡也光曰陛下當論其是非今條例司所為獨安石韓絳惠卿以為是耳陛下豈能獨與此三人共為天下邪冬十月富弼罷王安石用事雖不與弼合弼度不能爭稱疾求退章數十上帝曰卿即去誰可代卿者弼薦文彥博帝默然良久曰王安石何如弼亦默然遂出判亳州弼恭儉孝敬好善嫉惡常言君子與小人並處其勢必不勝君子不勝則奉身而退樂道無悶小人不勝則交結構扇千岐萬轍必勝而後已逮其得志遂肆毒于良善求天下不亂不可得也以陳升之同平章事升之既相帝問司馬光曰近相升之外議何云對曰閩人狡險楚人輕易今二相皆閩人二參政皆楚人必將援引鄉黨之士充塞朝廷風俗何以更得淳厚帝曰升之有才智曉民政光曰但不能臨大節不可奪耳凡有才智之士必得忠直之人從旁制之此明主用人之法也帝又曰王安石何如對曰人言安石姦邪則毁之太過但不曉事又執拗耳城綏州先是夏人冦秦州殺守將范願死者不可勝計既而秉常復上誓表請納安逺塞門二寨以乞綏州詔將許之鄜延宣撫郭逵上言此商於六百里之䇿非先交二寨不可與綏朝議以為然賜以誓詔秉常遣剛明鄂特舊作罔萌訛今政來言欲先得綏逵命趙卨等如夏交所納二寨且定地界剛明鄂特曰朝廷本欲得二寨地界非所約卨曰然則塞門安逺二墻墟耳安用之二寨之北舊有三十六堡且以長城嶺亦曰長城門橫山之麓也又曰眚嶺在榆林府廢夏州西南為界西平王祥符之書固在也剛明鄂特語塞卨以夏人渝盟請城綏州不以易二寨從之改名綏德城十一月命韓絳制置三司條例初陳升之欲傅㑹王安石以固其位安石亦患正論盈廷引升之為助升之知其不可而竭力為之用安石德之故先使正相位升之既相乃時為小異陽若不與之同者由是二人遂判安石乃薦絳共事安石每奏事絳必曰臣見安石所陳非一皆至當可用陛下宜省察安石恃以為助署諸路提舉官條例司上言民間多願借貸青苗錢乞遍下諸路轉運使施行仍詔諸路各置提舉二員管當一員掌行青苗免役農田水利諸路凡四十一人提舉官既置往往迎合王安石意務以多散為功富民不願取貧者乃欲得之即令隨户等髙下品配又令貧富相兼十人為保首王廣淵在京東一等户給十五千等而下之至五等猶給一千民間喧然以為不便廣淵入奏謂民皆歡呼感德諌官李常御史程皓論廣淵抑配掊克迎朝廷旨意以困百姓㑹河北轉運使劉庠不散青苗錢奏適至安石曰廣淵力主新法而遭劾劉庠欲壞新法而不問舉事如此安得人無向背由是常皓之言皆不行劉李常字公釋南康軍建昌人庠字希道彭城人增置宫觀官帝以監司郡守有老不任職者則與閒局王安石亦欲以處異議者遂增置三京留司御史臺國子監及諸州宫觀官使不限員以張載為崇文院校書尋辭歸載少喜談兵至欲結客取洮西之地年二十以書謁范仲淹仲淹謂之曰儒者自有名教可樂何事于兵因勸之讀中庸載讀其書猶以為未足又訪諸釋老纍年究極其說知無所得反而求之六經與程皓程頤字正叔皓之弟論道學之要涣然自信曰吾道自足何事旁求于是盡棄異學淳如也舉進士調雲巖後魏縣宋熙寧後廢故城在今延安府宜川縣令以敦本善俗為先帝初即位思得才哲之士吕公著薦載有古學召見問治道載對曰為政不法三代者終苟道也帝悅以為崇文校書已而移疾屏居南山下先是明州苗振獄起令載往按程皓疏言治獄可試諸能吏非所以盡儒者之事業王安石曰淑問如皋陶猶獻囚此何傷竟命之往比還乃辭歸御批厯代通鑑輯覽卷七十六

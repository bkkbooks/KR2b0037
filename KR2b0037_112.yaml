body:
  text: 欽定四庫全書御批厯代通鑑輯覽卷一百十三明熹宗皇帝辛酋天啓元年春二月遼陽有數日並出閏月孫如游罷如游入閣言者詆其不由廷推交章論列如游亦屢乞去帝輒慰留至是疏十四上乃許之後四年卒贈少保謚文恭三月我大清兵取瀋陽遼陽經畧袁應泰巡按御史張銓字子衡泌水人等死之應泰議三路出師復清河撫順未行我大清兵已薄瀋陽縂兵賀世賢等嬰城固守大軍奮勇縱擊城外兵七萬人皆潰世賢戰死縂兵尤世功㕘將夏國卿張綱知州段展同知陳柏皆死世功榆林衛人城遂㧞總兵陳䇿李秉誠等聞警赴援大兵分路擊敗之䇿死焉秉誠等遁去䇿與總兵童仲揆赴援時次渾河聞世賢敗沒欲旋師遊擊周敦吉不可乃與副將戚金叅将張名世吳文傑都司袁見龍鄧起龍石砫都司秦邦屏守備雷安民等皆死焉石砫四川土司今屬夔州府大兵乘勝直趨遼陽應泰撤奉集威寧諸軍並力守禦引水注壕沿壕列火器兵環四面大兵掘城西閘以洩壕水分兵塞城東水口擊敗諸將總兵梁仲善陣亡侯世禄姜弼皆負重傷潰圍出遂渡壕薄城應泰與銓等分陴固守我大清左四旗兵先登城城中拒戰達旦守城官牛維曜髙出等俱縋城遁城中大亂翌旦右四旗兵亦登城應泰居城北鎮逺樓知事不濟太息謂銓曰吾當死于此公無城守責宜急去退保河西時以遼河之東為河東遼河之西為河西圖後舉銓不可應泰遂佩劍印自經死婦弟姚居秀從之僕唐世明慿屍大慟縱火焚樓死銓被執諭之降不屈令還署北向拜闕遥辭父母乃縊死我大清命禮葬之副使何廷魁懷印綬卒其妾髙氏金氏投井死婢僕死者六人僉事崔儒秀戎服自經于都司署轉餉同知陳輔堯段展及都司徐國全皆自到死何廷魁字汝謙大同人崔儒秀字儆初陜州人陳輔堯揚州人段展涇陽人遼陽既下遼東之三河等五十寨及河東大小七十餘城皆望風降時沿海居民奔竄者皆航海走山東其不能達者棲止各島間援遼都司毛文龍率師至皮島島在登萊大海謂之東江地廣衍有險可恃文龍招集逃民為兵分布哨船聯接登州為犄角計朝議是之授文龍叅將文龍仁和人夏五月壬申朔日食以王化貞諸城人巡撫廣寧化貞前以叅議分守廣寧頗得西部心及遼瀋繼失廷議推化貞為巡撫時廣寧止孱卒千餘化貞招集散亡復得萬人激厲士民聯絡西部人心稍定然化貞素無大略不習兵事欲恃西部為援遂以登萊天津兵可不設諸鎮入衛兵可止時謂其才可倚議悉従之立皇后張氏祥符人太監魏忠賢即魏進忠賜名矯詔殺司禮太監王安忠賢與客氏忌安持正嗾給事中霍維華東光人劾之矯㫖充南海子浄軍絶食三日不死遂撲殺之客氏淫而狠忠賢不知書頗强記猜忍隂毒好諛帝深信之兩人愈相結用司禮監王體乾昌平州人及李永貞通州人石元雅涂文輔等為腹心凡章奏永貞等先閲視鈐識窽要白忠賢議可否然後行帝性機巧好親斧鋸椎鑿髹漆之事毎引繩削墨忠賢輒奏事帝厭之謬曰朕已悉矣汝軰好為之忠賢因得擅威福六月起熊廷弼經略遼東以張鶴鳴字元平潁水人為兵部尚書初廷弼雖罷帝念其守遼功仍議起用及瀋陽遼陽繼失京師大震劉一燝曰使廷弼在當不至此帝乃貶馮三元等而削姚宗文籍召廷弼于家廷弼至建三方布置策廣寧用馬步兵列壘三岔河亦曰三㲼河在奉天府海城縣西南遼河至此合太子河入海即古遼澤也上天津登萊各置舟師設登萊巡撫如天津而山海特設經略節制三方以一事權遂命廷弼駐山海闗經略軍務賜尚方劍及行四宴之郊外命文武大臣陪餞異數也先是王化貞部署諸將沿河設六營營置叅將守備分守諸要害議已上廷弼謂今日但當固守廣寧不宜分兵防河兵分則力弱倘一營不支則諸營皆潰又焉能守化貞議遂不行愠甚盡委軍事于廷弼廷弼請申諭化貞不得籍口節制坐失機宜由是經撫不和廷弼又言三方建置須聯絡朝鮮與登萊聲息相通乞給臣空名劄付百道募山東礦徒有能結聚五百人以上者即署守備都司如此則一二萬勁兵可立致帝即従之未幾我大清鎮江注見前守將陳良策潛通于毛文龍文龍遂引兵取其城王化貞遽以大㨗奏舉朝皆喜亟命發天津登萊水師二萬援文龍化貞督廣寧軍四萬進據河上合諸蒙古軍乘機進取廷弼遺書中朝言兵力未集文龍發之太早亂三方並進之謀誤屬國聯絡之算時朝士方以鎮江為竒㨗聞廷弼言多不服而化貞再疏請出師且言勢在必克兵部尚書張鶴鳴深以為然奏言時不可失請令廷弼進駐廣寧薊遼總督王象乾注見前移鎮山海化貞即渡河進師廷弼不得已出闗次右屯明置廣寧右屯衛今廢故城在錦州府錦縣東南化貞無功而還化貞為人騃而愎妄意降將李永芳可倚為内應又信西部言許助兵四十萬遂欲以不戰取全勝一切士馬甲仗糗粮營壘俱置不問務為大言以罔中朝尚書鶴鳴深信之所請無不允而于廷弼奏輒従中阻格廷弼憤甚抗疏言臣有經畧名而無其實遼左事惟樞臣與撫臣共為之鶴鳴益恨當是時廷弼主守力言永芳必不可信西部必不可恃而化貞一切反之絶口不言守且謂仲秋之月可高抌而聽㨗音已而廣寧人見河氷合紛傳兵至奔竄四出化貞乃始議守而鶴鳴請勑廷弼出闗䇿應廷弼上言樞臣第知經畧一出足鎮人心而不知徒手之經畧一出其動搖人心更甚言甚切至鶴鳴促之廷弼乃議以重兵内䕶廣寧令劉渠守鎮武秉忠守閭陽羅一貫守西平而已復出闗駐右屯金鎮武堡名在廣寧縣東閭陽城名在廣寧縣西南元時置縣于此明廢今為驛西平亦堡名在鎮武東羅一貫丼州衛人秋九月𦵏慶陵在昌平州天夀山西峯之右諡曰貞皇帝廟號光宗明史賛曰光宗潛徳久彰海内屬望而天不假年措施未展三案搆争黨禍益熾可哀也夫四川永寧注見前土司奢崇明反永寧奢氏自洪武後世為宣撫司傳至奢崇周無子崇明以疎屬襲外恭内隂鷙其子寅尤驍桀好亂時朝廷方遣官募川兵援遼崇明父子請行先遣土目樊龍張彤等領兵詣重慶巡撫徐可求衢州西安人議汰其老弱龍等遂反殺可求及道府總兵官二十餘人據重慶分兵攻合江納溪破瀘州陷遵義興文故九絲蠻地萬厯中置縣事見前知縣張振徳字季修崑山人死之崇明統所部與徼外雜蠻凡數萬播州遺孽及諸亡命奸人蠭起附之全蜀震動乃進圍城都偽號大梁設丞相以下官左布政使朱爕元字懋和浙冮山隂人將入覲蜀王以亂留治軍事爕元急趣近道兵赴援偕右布政使周著南昌人按察使林宰漳浦人等分陴固守賊攻城急四靣立望樓髙與城齊又潜納其黨城中為内應爕元捕獲之斬二百餘人又命死士突出斬三賊帥焚其樓賊少懾已而援兵漸集石砫女土官秦良玉忠州人嫁宣撫使馬千乘千乘死代領其衆先遣其弟民屏發兵四千倍道潛度重慶自統精兵鼓行而西復新都他路援兵亦連勝賊然賊亦日益增怱有賊數千自林中大譟而出推物如大舟一人披髪仗劍上載羽旗中數百人各挟機弩毒矢旁翼兩雲樓曵以牛俯瞰城中城中人皆哭爕元曰此吕公車也乃用巨木為機闗轉索發礟飛千釣石擊之又以大礟擊牛牛返走賊大敗去相持百餘日㑹賊將羅乾象遣人輸欵願殺賊自效爕元許之令誘崇明至城下伏起崇明跳免乾象即于是夜縦火焚營賊兵亂崇明父子倉皇走瀘州乾象以衆來歸成都圍解以下事俱在明年爕元亦已授四川巡撫帥師追崇明乘勢復州縣衛所四十餘惟樊龍扼重慶不下爕元督良王等奪二郎闗在重慶府巴縣西北據其險佛圖闗在巴縣西即李嚴欲鑿通涪汶二江處亦為總兵杜文煥所破諸將廹重慶而軍城中乏食爕元以計擒樊龍殺之張彤亦為亂兵所戮遂復重慶瀘州尋亦復冬十二月罷吏部尚書周嘉謨神宗末齊楚浙三黨為政黜陟之權吏部不能舉及嘉謨為尚書大起廢籍向稱三黨之魁者漸自引去惡霍維華傾狡出之外魏忠賢怒嗾給事中孫杰錢塘人劾嘉謨受劉一燝屬為王安報仇嘉謨遂罷歸壬戌二年春正月我大清兵取西平堡王化貞棄廣寧與熊廷弼走入闗先是化貞凡五出師輙引還八九十月皆一出十一月則再出李永芳不應西部亦不至廷弼乞𠡠化貞慎重舉止化貞上言臣願領兵六萬一舉蕩平時葉向高當國化貞座主也頗右之廷臣惟少卿何喬逺字穉孝晉江人御史江秉謙字兆孫歙人周宗建字季侯吳江人等與廷弼合餘皆右化貞令母受廷弼節制廷弼抗疏言臣以東西南北所欲殺之人適遘事機難處之㑹諸臣能為封疆容則容之不能為門户容則去之何必内借閣部外借撫道以相困又言經撫不和恃有言官言官交攻恃有樞部樞部佐鬬恃有閣臣今無望矣帝令羣臣議兩人去留時中外俱知經撫不和必誤封疆大事而張鶴鳴篤信化貞請撤廷弼他用帝不従責再議議未上而我大清兵已西渡遼河攻西平堡招副將羅一貫降不従布梯楯進攻克之一貫死㑹化貞遣遊擊孫得功叅將祖大夀合總兵祁秉忠赴援廷弼亦檄總兵劉渠㑹師前進與大清兵遇乘機急戰大兵飛馳突入奮射衝擊得功遽奔呼曰兵敗矣諸軍皆走大兵追擊至平陽橋祁秉忠及副將劉徴叅將黑雲龍等皆死之全軍盡没大夀走覺華島得功請降得功素為化貞心腹及是欲生縳化貞以為功時大清兵頓沙嶺在廣寧縣東未進得功揚言兵已薄城居民驚竄叅政高邦伍字以道襄陽人禁之不能止化貞方闔署理軍書不知也叅將江朝棟排闥入大呼曰事急矣請公速去化貞莫知所為朝棟掖之出上馬僕二人徒歩従遂棄廣寧踉蹌西走先是廷弼已離右屯次閶陽驛聞敗叅議邢慎言孟都人請馳救為僉事韓初命所阻遂退還及是與化貞遇大凌河化貞哭廷弼微笑曰六萬衆一舉蕩平竟如何化貞慚議守寧逺注見前及前屯明以元瑞州置廣寧前屯衛今廢故城在寧逺州西南廷弼曰已晚惟䕶難民入闗可耳乃以己所將五千人授化貞為殿盡焚積聚與副使髙出萊陽人胡嘉棟西華人等先後入闗獨邦佐留松山自經死我大清兵入廣寧凡四十餘城皆下遂進克義州而還敗聞至京師鶴鳴懼罪因自請視師給事中侯震𤾉字得一嘉定人少卿馮従吾字仲好長興人董應舉字崇相閩人何喬逺請並逮廷弼化貞以伸國法獄具二人並論死鶴鳴尋亦罷歸二月貴州水西土目安邦彦反邦彦水西宣慰使安堯臣族子堯臣死子位㓜位母奢社輝攝事社輝奢崇明女弟也常與崇明子寅争地相仇而邦彦素懷異志與崇明合及崇明反或傳其已陷成都邦彦遂挟位以叛為崇明聲援自稱羅甸大王率兵首襲畢節明衛今為縣屬貴州大定府陷之諸部頭目蠭起為助乃分兵西破安順注見前霑益元州今屬雲南曲靖府東下甕安明縣今屬貴州平越府偏橋明長官司今屬貴州鎮遠府而邦彦自統水西軍渡陸廣河在貴陽府修文縣境其上源出安順府曰滴澄河下流入遵義府為烏江直趨貴陽當是時永寧未平水西復起貴陽城中藩臬守令咸入覲巡撫李橒字長儒鄞人方受代已乞休得請聞變與巡按御史史永安武定人提學僉事劉錫元長洲人悉力拒守學官及諸生亦督民兵分堞以守賊攻不能克則沿巖置柵㫁城中出入鎮將張永芳率兵二萬赴援隔龍里注見前不得進諸將馬一龍白身强皆戰殁外援遂絶賊攻城益急城中粮盡人相食先食糠覈草木敗革皆盡遂食死人肉後乃生食人至親属相噉里居參政潘潤民一女被食知縣周思稷至自殺以饗軍而死守不遺餘力中朝方亟遼事不能顧久之新撫王三善字彭伯永城人始分兵三道進奪龍里城擊殺安邦俊水西别部頭目與邦彦同反者邦彦駭走遂乘勝抵貴陽城下先以五騎傳呼曰新撫至矣舉城懽呼更生貴陽被圍十餘月城中户十餘萬至是僅存二百人而孤城卒全皆橒及永安錫元功也時議與朱爕元之守成都並稱焉以孫承宗字稚繩高陽人為兵部尚書兼東閣大學士預機務承宗以知兵名廣寧既失東事益急遂進大學士又從御史左光斗請命承宗以閣臣理兵部承宗疏言邇年兵多不練餉多不核以將用兵而以文官招練以將臨陣而以文官指發以將備邉而日增置文官于幕以邉任經撫而日問戰守于朝此極弊也今當重將權擇沉雄有氣略者授之節鉞如唐任李郭自辟置偏禆以下邉事小勝小敗皆不必問要使守闗無闌入而徐為開復計因列上撫西部恤遼民減京軍増永平大將修薊鎮亭障開京東屯田數事帝嘉納焉三月劉一燝罷先是言官交章論沈㴶㴶疑一燝主之與魏忠賢比而齮一燝及周嘉謨罷一燝屢疏乞休許之葉向高言客氏既出復入一燝顧命大臣乃不得比保姆致使人揣摩于奥不可知之地其漸當防不納先是客氏已遣出宫帝思念不食遂宣諭復入給事中侯震𤾉上言禮有慈母猶恩以義絶况么麽里婦何可出而復入宫闈禁地内外鈎連借叢煬竈有不忍言者昔王聖寵而煽江京李閏之奸趙嬈寵而搆曹節王甫之變禍移宗社良可寒心帝不省故向髙以為言一燝後坐誤用熊廷弼削奪崇禎初復官至八年卒贈少師福王時追諡文端舉内操魏忠賢勸帝選武閹鍊火器又日引帝為倡優聲伎狗馬射獵給事中惠世揚周朝瑞御史江秉謙等劾沈㴶交通閹人弄兵大内中㫖切責侯震𤾉黄尊素字真長餘姚人等先後疏諫皆不聴明年内操増至萬人衷甲出入鉦礟喧震内外夏四月禮部尚書孫慎行追論前輔方從哲進紅丸罪慎行召為禮部尚書既至即追劾李可灼進紅丸事斥從哲為弑逆疏言可灼紅丸乃首輔從哲所進夫可灼官非太醫紅丸不知何藥乃敢突然以進昔許悼公飲世子藥而卒世子即自殺春秋猶書之為弑然則從哲宜何居速引劍自裁以謝先帝義之上也合門蓆藁以待司㓂義之次也乃悍然世不顧至舉朝共攻可灼僅令回籍調理是誠何心許子以死愛父猶不能自明従哲之愛先帝於何處明乎臣以為從哲縱無弑之心却有弑之事欲辭弑之名難免弑之實恐百口無能為天下萬世解也從哲久居京師近習多為之地慎行疏上帝以舊輔素慎事係傳聞下廷臣集議都御史鄒元標主慎行疏従哲奏辨自請削官階投四裔帝慰諭之給事中魏大中字孔時嘉善人以九卿議久稽趣之時議者一百十有餘人紛紛俱欲罪從哲獨刑部尚書黃克纉字紹夫晉江人及給事中汪慶百等數人右之希内廷意也于是大學士韓爌述進藥始末尚書張問達等合奏言慎行論可灼進紅丸事可灼先見内閣臣等初未知及先帝召見乾清宫輔臣與臣等言俱慎重未敢決及宣臣等入宫先帝問可灼安在可灼至進紅丸少頃復進一丸先帝服藥㣲汗身温熱就寢臣等所共聞見輔臣視皇考疾急廹倉皇弑逆二字何忍言但可灼非醫官且非知醫知脉者以藥嘗試先帝龍馭即上昇非但從哲未能止臣等亦未能止均有罪焉乃従哲反賚可灼及御史王安舜有言先止罰俸繼令養疾失之太輕何以慰皇考服中外冝如従哲請削其官階為法任咎至可灼罪不容誅而崔文昇當皇考哀感時妄進大黄凉藥罪又在可灼上法皆宜顯戮以洩公憤議上可灼遣戍文昇放南京而従哲不罪未幾慎行引疾去大雨雹御史周宗建謂隂盛陽衰之徴疏陳四事一攻大學士沈漼一請寛建言廢黜諸臣一言熊廷弼已有成獄不當因此羅織朝士一專詆魏忠賢言忠賢目不識丁隂賊險狠陛下用人行政一切墮于其術恐離間之漸將起于蠅營讒搆之釁必生于長舌忠賢見疏恨刺骨五月有星隨日晝見山東白蓮賊徐鴻儒作亂初薊州人王森得妖狐異香森常救一妖狐狐㫁尾令藏之招人人聞異香多歸附之倡白蓮教自稱聞香教主其徒有大小傳頭及㑹主諸號蔓延畿輔山東山西河南及陜西四川後森為有司所攝斃于獄其子好賢及鉅野徐鴻儒武邑于宏志軰踵其教徒黨益衆至是好賢見遼東盡失四方奸民思逞與鴻儒等約是年中秋並進兵㑹謀洩鴻儒遂先期反自號中興福烈帝稱大成興勝元年用紅巾為識遂陷鄆城俄復陷鄒滕嶧三縣鄒縣五經博士孟承光字永觀亞聖裔被執不屈死滕縣知縣姬文允字士昌華州人視事甫三日城破登堂自經死以印畀小吏魏顯照及家僮李守務賊掠顯照索印顯照潜授其父而與守務並罵賊死時承平久郡縣無守備山東故不置重兵巡撫趙彦膚施人練民兵増諸要地請留京操班軍及廣東援遼軍以備征調薦起故大同總兵官楊肇基統山東軍討賊賊乘肇基未至襲兖州為滋陽知縣楊炳及都司楊國棟所敗已而犯夏鎮韓莊刼掠漕艘官軍連破之運道始通賊又攻曲阜知縣孔聞禮率民兵拒守賊不能克引去時賊精鋭聚鄒滕間彦欲攻鄒縣副使徐従治字仲華海鹽人曰攻鄒滕難下不如𢷬其中堅兩城可圖也彦乃與肇基令游兵綴賊鄒城而以大軍擊賊精鋭蹙而殪之嶧山遂圍鄒大小數十戰城未下乃令天津僉事来斯行蕭山人及國棟乘間復滕縣國棟又大破賊沙河乃築長圍困之賊食盡其黨皆出降鴻儒單騎走擒之送京師磔於市鴻儒臨刑嘆曰我與王好賢父子經營二十年徒黨不下二百萬事不成天也鴻儒舉事凡七月而滅方鴻儒未滅時于宏志亦起兵武邑應之為諸生葉廷珍所獲王好賢亦捕得皆伏誅論平賊功趙彦加兵部尚書餘晉秩有差復以言官請修復孟廟恤孟氏子孫六月以毛文龍為平遼總兵官先是文龍襲取鎮江報廵撫王化貞而不及經略熊廷弼兩人隙始開用事者方主化貞遂授文龍副總兵累加左都督至是掛將軍印賜尚方劍設軍鎮皮島如内地東江雖踞形勢而文龍素無大略惟務廣招啇賈販易禁物無事則鬻参販布為業有事亦罕得其用秋七月沈㴶罷刑部尚書王紀字維理芮城人再疏劾㴶比之蔡京㴶亦劾紀庇熊廷弼獄廷弼薦遼陽佟卜年為監軍僉事張鶴鳴行邊以卜年嘗通李永芳欲因以甚廷弼之罪鎮撫司獄具移刑部紀輿員外郎顧大章辨其誣改輕比故㴶劾之顧大章字伯欽常熟人詔兩解之未㡬紀削籍去葉向高言紀㴶交攻俱失大臣體獨斥紀如公論何㴶不自安乃引去自㴶首進募兵之説結交閽寺遂開内操朝議惡之歸後逾年卒八月以孫承宗經略薊遼初廣寜既失關外五城七十二堡悉為喀爾沁諸部所據聲言助邊實懐窺伺經略王在晉字明初太倉州人與薊遼總督王象乾請給月糧嵗費百萬又請築重關于八里舖在山海關外設守兵四萬人寧前兵備僉事袁崇煥字元素東莞人以為非策白之葉向高向高不能決承宗請身徃定之乃馳詣關門相度還奏築重城不若築寜逺要害與覺華島相掎角因言在晉不足任自請督師帝許之賜尚方劍御門臨遣以寵其行承宗既至關定軍制申明職守以馬世龍字蒼元寜夏人為總兵官令遊擊祖大壽等守覺華島副將趙率教陜西人守前屯前後築城堡數十練兵十一萬造鎧仗數百萬開屯田五千頃㑹我大清兵不深入而承宗防守嚴亦不致敗衂軍聲頗振初承宗之督師也辟職方主事鹿善繼為贊畫薦監軍副使閻鳴泰為遼東廵撫帝皆從之及至關命善繼治軍儲而以鳴泰無實畧軍事多不與議鳴泰怏怏求去承宗亦引疾帝乃罷鳴泰諭留承宗以張鳯翼為廵撫鳯翼怯力主守闗議承宗不可復出闗抵寜逺集將吏議所守衆多如鳯翼指獨崇煥善繼請守寜逺承宗然之議乃定命大興工崇煥及滿桂守之承宗將圖大舉請餉二十四萬帝即命所司給之兵工二部相與謀曰餉足渠即妄為矣故用文移徃復緩之師竟不果出鹿善繼字伯順定興人張鳯翼代州人滿桂蒙古人幼入中國居宣府九月増田賦時増州縣兵計畝加餉從御史馮英請也封弟由檢為信王即莊烈帝冬十月左都御史鄒元標副都御史馮從吾罷初神宗時元標從吾以建言削籍里居講學垂數十年泰昌初兩人始召用已而同官都察院乃共建首善書院於京師御史周宗建董其事大學士葉向高為之記朝暇與同志高攀龍等講學其中名望日重而諸不附東林者咸忌之㑹明年當京察給事中朱童蒙郭允厚曹州人郭興治慮為元標所黜童蒙乃首劾之以講學為門户元標疏辨求去帝已慰留允厚復繼劾語尤妄誕而魏忠賢方竊政傳㫖謂宋室之亡由於講學將加嚴譴從吾言宋之不競以禁講學故非以講學故也葉向高亦力為解且乞同去乃得温㫖而興治復力攻比元標於山東妖賊元標從吾遂並引歸先是書院方建御史黄尊素謂元標曰都門非講學地徐文貞已叢議於前矣謂徐階元標不能用及是尊素言果騐元標從吾既歸羣小擊碎其碑暴於門外先師木主委棄路隅經史典籍盡被焚燬而院獨存後崇禎中禮部尚書徐光啟率西洋人湯若望等借院修厯署曰厯局徐光啟字子先上海人癸亥三年春正月以顧秉謙崑山人朱延禧聊城人朱國楨字文寕烏程人魏廣㣲南樂人允貞子並為禮部尚書兼東閣大學士預機務廷推閣臣首列孫慎行盛以宏字子寛潼闗衛人皆不用時魏忠賢用事謀結外廷諸臣秉謙廣微率先諂附遂援二人入閣時閣中已有葉向高韓爌何宗彦朱國祚史繼偕又驟增四人直房幾不容坐秉謙廣微庸劣無恥忠賢得為羽翼勢益張而二人曲奉忠賢儼如奴役紅毛夷即荷蘭明史謂之和蘭在西南海中地近佛郎機其人深目長鼻髪眉鬚皆赤故又日紅毛夷據澎湖島名在今泉州府東海中與金門所相對宋史泉州東有海島曰澎湖煙火相望即其地也神宗末紅毛夷侵奪臺灣地在福建東南海中古曰東番今為府屬福建布政司築室耕田乆留不去後又出據澎湖犯漳州海澄明縣今屬漳州府已復入厦門在泉州府同安縣西南海中嘉禾嶼有城提督總兵官分廵道及府同知同駐此官軍禦却之仍築城澎湖以居已而廵撫南居益字思受渭南人請于朝發兵出擊事在四年迄數月番人始揚帆去而渠帥高文律十二人據高樓自守諸將破擒之澎湖之警始熄其據臺灣者自若也明史外國傳荷蘭本國去中華絶逺華人未嘗至其所恃惟巨舟大礟舟長三十丈廣六丈厚二尺餘樹六桅桅下置二丈巨鐡礟發之可洞裂石城震數十里世所稱紅夷礟即其製也柁後置照海鏡大徑數尺能照數百里云遣中官刺邊事帝好察邊情常遣中官詣關門具事狀奏報名曰較事及魏忠賢竊柄遣其黨劉朝等四十五人賫甲仗弓矢白金文綺先後至山海關頒賚將士實覘軍也孫承宗疏言中使觀兵自古有戒帝不省三月太白晝見夏四月朱國祚罷國祚在閣素行清慎事持大體及是十三疏乞休遂許之未㡬史繼偕亦致仕先是刑部尚書王紀為魏忠賢所逐國祚疏救復具掲争之紀為禮部侍即嘗以事忤國祚者也人以是稱國祚長者歸後家無餘貲踰年卒贈太𫝊諡文恪五月四川總督朱燮元克永寜奢崇明走龍場在四川叙永㕔永寧縣東南與貴州大定府畢節縣接界今為營有守備駐此考又一龍塲非王守仁所謫之龍場驛也驛已註前先是川兵既克重慶貴州兵亦復遵義已而遵義再為賊所䧟推官馮鳯雛被殺朝議加燮元兵部侍即為四川總督討賊至是燮元謀直取永寜集將佐曰我乆不得志于賊者我以分賊以合也乃盡撤諸軍㑹長寜註見前連破賊砦與秦良玉合兵搏戰賊大敗遂入青崗坪在叙永㕔西亦曰青崗關抵城下㧞之降賊二萬副總兵秦衍祚等亦克遵義崇明父子逃入舊蘭州城唐置州宋廢故城在今叙永㕔東尋為恭將羅乾象所攻克賊勢益蹙乃率餘衆走水西龍場借兵安邦彦邦彦遣二軍窺遵義永寜燮元敗走之諸將乘勝鏖入龍場生擒崇明妻安氏及其弟崇輝斬獲萬計崇明父子竄深箐得免時燮元以永寜既㧞蜀中已靖遂不窮追而貴州廵撫王三善以崇明竄入水西㑹師六萬進討屢戰皆㨗遂渡渭河在大定府黔西州北東南流㑹于陸廣河直抵大方即今大定府治舊時安民據為巢穴入居安位第位與其母社輝走火灼城名在黔西州北安邦彦匿織金亦城名在黔西州西北地最深阻皆不敢出三善既連破賊有輕敵心謂賊不足平駐大方乆之㑹糧盡不得已退師乃焚大方廬舎而東事在明年賊躡之副總兵秦民屏參將王建中戰殁三善遂為降賊陳其愚所害其愚者賊腹心先詐降三善信之令随行遇賊其愚衝三善墜馬三善大呼罵賊遂遇害監軍副使岳具仰同知梁思泰主事田景猷等四十人皆死之岳具仰延安人田景猷貴州思南人於是賊勢復張客氏魏忠賢殺光宗選侍趙氏幽裕妃張氏于别宫殺之客魏肆惡慮妃嬪白其罪矯㫖賜趙選侍自盡選侍以光宗賜物列案上西向禮佛痛哭自經幽裕妃别宫絶其飲食天雨妃匍匐承檐溜飲之而死皇后數于帝前刺客魏過失是年后有娠客氏以計堕之帝用此乏嗣又以帝郊祀日掩殺帝所寵馮貴人左右無敢言者范慧妃以讒失寵李成妃為之乞憐客魏知之亦幽成妃别宫妃預儲食物簷瓦間半月不死斥為宫人冬十月以趙南星為吏部尚書先是南星為左都御史與吏部尚書張問達掌京察黜去亓詩教趙興邦等天下快之至是問逹罷南星代為吏部鋭意澄清獨行已志政府及中貴憚其剛嚴不敢有所干請魏忠賢雅慕南星名遣其甥傅應星謁見拒不納大學士魏廣㣲南星犮允貞子也素以通家子畜之廣㣲入内閣三至南星門謝弗見又嘗嘆曰見泉無子見泉允貞别號也廣㣲恨次骨與忠賢比而齕南星然是時東林勢盛葉向高韓爌方輔政南星掌銓李騰芳字子實湘潭人陳于廷字孟諤宜興人佐之高攀龍楊漣左光斗秉憲魏大中袁化中字民諧武定人長科道鄭三俊字用章池州建徳人李邦華孫居相饒伸王之寀輩悉居卿貳而即官鄒維璉字徳耀瑞州新昌人夏嘉遇字正甫松江華亭人張光前字爾荷澤州人程國祥字仲若上元人劉廷諌順天通州人等亦皆民譽衆正盈朝激揚諷議忠賢頗憚之於外事未敢大肆十二月地震兩京鳯陽蘓松淮揚泗滁同日俱震魏忠賢提督東厰初神宗末刑罰弛縱而厰衛緝捕亦漸稀簡詔獄至生青草及是忠賢以司禮秉筆領東厰事車馬儀衛僣擬乘輿已而任用田爾耕任邱人掌衛事許顯純定興人為鎮撫理刑羅織無遺鍜鍊殘酷厰衛之毒于斯而極括天下庫藏輸京師葉向高言郡邑庫藏已竭藩庫稍餘今盡括之猝有亂將何以應不納甲子四年春正月何宗彦卒諡文毅宗彦清修有執神宗末齊黨勢盛非同類即排去之宗彦方攝禮部事獨無所附麗遂不安其位而去光宗立以素望即家起入閣及是卒官贈太𫝊二月京師地震宫殿動搖有聲帝遂不豫至三月始愈地復屢震夏六月左副都御史楊漣劾魏忠賢二十四大罪中㫖切責漣忠賢肆惡日甚漣抗疏列其大罪二十有四畧曰太監魏忠賢者本市井無頼中年浄身夤入内地初猶謬為小忠小佞以倖思繼乃敢為大奸大惡以亂世今列其罪狀為陛下言之祖制擬㫖專責閣臣自忠賢擅權多出傳奉或徑自内批壊祖宗政體大罪一劉一燝周嘉謨顧命大臣也忠賢令其黨論去急于剪己之忌不容陛下不改父之臣大罪二先帝賔天實有隐憾孫慎行鄒元標以公義發憤忠賢悉排去顧于黨䕶選侍之沈㴶曲意綢繆終加蟒玉親亂賊而讎忠義大罪三王紀為司寇執法如山鍾羽正為司空清修如鶴忠賢搆黨斥逐必不容盛時有正色立朝之臣大罪四國家最重枚卜忠賢一手握定力阻首推之孫慎行盛以宏更為他事以錮其出豈真欲門生宰相乎大罪五爵人於朝莫重廷推去嵗南太宰北少宰俱用陪推一時名賢不安其位顛倒銓政掉弄機權大罪六聖政初新正資忠直乃滿朝薦文震盂江秉謙侯震𤾉等抗論稍忤立行貶黜屢經恩典竟阻賜環長安謂天子之怒易解忠賢之怒難調大罪七然猶曰外廷臣子也去嵗南郊日傳聞宫中有一貴人以徳性貞静見寵忠賢恐其露已驕横託言急病置之死地是陛下不能保其貴幸矣大罪八猶日無名封也裕妃以有娠傳封中外方為慶幸忠賢惡其不附己矯㫖勒令自盡是陛下不能保其妃嬪矣大罪九猶曰在妃嬪也中宫有慶已經成男忽焉告殞虹流電繞之祥變為飛星墮月之惨傳聞忠賢與奉聖夫人實有謀焉是陛下且不能保其子矣太罪十先帝青宫四十年䕶持孤危者惟王安即陛下倉猝受命擁衛防維安亦不可謂無勞忠賢以私忿矯㫖殺之是不但仇王安而實敢仇先帝之老奴畧無顧忌大罪十一塋地擅用朝官䂓制僣擬陵寢近又於河間毀人居室建立牌坊鏤鳯雕龍干雲挿漢大罪十二今日廕中書明日廕錦衣金吾之堂口皆乳臭誥勅之舘目不識丁如魏良弼魏良卿及傅應星等濫襲㤙廕褻越朝常大罪十三用立枷之法戚畹家人駢首畢命意欲誣䧟國戚動搖中宫若非閣臣力持言官紏正椒房之戚又興大獄矣大罪十四良鄉生員章士魁以争煤窑傷忠賢墳脉遂託言開礦而致之死趙髙鹿可為馬忠賢煤可為礦大罪十五王思敬等牧地細事責在有司忠賢乃幽置檻穽恣意搒掠視士命如草菅大罪十六科臣周士樸執紏織監忠賢竟停其陞遷使吏部不得專銓除言官不敢司封駁大罪十七北鎮撫劉僑不肯殺人媚人忠賢以不善鍜鍊遂致削籍示大明之律令可不守而忠賢之律令不可不遵大罪十八魏大中為吏科遵㫖蒞任怱傳㫖詰責及大中回奏臺省交章又再褻王言煌煌綸綍朝夕紛更大罪十九東厰之設原以緝奸自忠賢任事日以快私讐行傾陷為事投匭告宻日夜未已勢必興同文館獄而後已大罪二十邊警未息内外戒嚴東厰緝紡何事前韓宗功潜入長安偵探虗實寔主忠賢司房之邸事露始去假令天不悔禍宗功事成未知九廟生靈安頓何地大罪二十一祖制不蓄内兵原有深意忠賢與奸相沈㴶創立内操藪匿奸宄安知無大盗刺客潜入其中一旦變生肘掖可為深慮大罪二十二忠賢進香涿州警蹕傳呼清塵墊道人以為大駕出幸及其歸也改駕駟馬羽幢青葢夾䕶環遮則儼然乗輿矣大罪二十三夫寵極則驕㤙多成怨聞今春忠賢走馬御前陛下射殺其馬貸以不死忠賢不自伏罪進有傲色退有怨言朝夕隄防介介不釋從來亂臣賊子只争一念放肆遂至不可収拾柰何養虎兕于肘腋間乎此又寸臠忠賢不足蔽其辜者大罪二十四凡此逆跡昭然在人耳目乃内廷畏禍而不敢言外廷結舌而莫敢奏間或奸狀敗露又有奉聖夫人為之彌縫更相表裏迭為呼應伏望陛下大奮雷霆集文武勲戚隐勅刑部嚴訊以正國法并出奉聖夫人於外用消憂臣死且不朽人鍾羽正字叔濓益都人文震孟字文起呉縣劉僑魏大中事類叙在後疏上忠賢懼甚求解於韓爌爌不應遂趨帝前泣訴且辭東厰而客氏從旁為剖析王體乾等贊之帝懵然不辨也遂温諭留忠賢而於次日下漣疏嚴㫖切責先是漣疏就欲早朝靣奏値次日免朝恐再宿機洩遂於㑹極門上之忠賢乃得為計漣愈憤擬對仗復劾之忠賢詗知遏帝不御朝者三日及帝出羣閹數百人衷甲夾陛立勅左班官不得奏事漣乃止中書舎人呉懐賢讀漣疏擊節稱嘆注其旁日宜如韓魏公治任守忠故事即時遣戍其奴告之忠賢即逮懐賢下獄拷掠死藉其家懐賢休寜人呉秋七月杖殺工部郎中萬燝字闇夫南昌人自楊漣上書被責廷臣益憤交章論忠賢不法給事中則魏大中許譽卿等御史則劉業楊玉珂帥衆等京卿則太常卿胡世賞祭酒蔡毅中等勲戚則撫寜侯朱國弼南京列卿則兵部尚書陳道亨侍即岳元聲等凡七十餘人許譽卿松江華亭人蔡毅中字宏甫光山人陳道亨字孟起新建人大學士葉向高及禮部尚書翁正春請遣忠賢歸私第以塞謗帝不許未幾燝疏復至言忠賢盡竊大權生殺予奪在其掌握致内廷外朝止知有忠賢不知有陛下豈可一日尚留左右忠賢得疏大怒當是時忠賢方惡廷臣交章劾已無所發憤思借燝立威乃矯㫖廷杖一百令羣閹先至燝邸捽而毆之比至闕下氣息纔屬杖已絶而復甦羣閹更肆蹴踏越四日即卒御史黄尊素上言律例非叛逆十惡無死法今以批肝瀝膽之忠臣竟殞於磨牙礪齒之㐫䜿千載而下史筆書之豈不上累聖徳乞復其故官破格賜卹時禁中方失火李應昇復言部即之杖血方腥祝融之烈𦦨旋作天譴甚明伏冀矜恤俱不報是年檢討丁乾學典江西郷試發䇿刺忠賢忠賢怒矯㫖除其名已使人詐為校尉徃逮挫辱之乾學憤鬱而卒揚州知府劉鐸憤忠賢亂政書扇贈遊僧有隂霾國是非句寔歐陽暉詩也邏者得之遂逺治事白矣㑹鐸家人夜醮都督張體乾誣以咒詛竟斬西市他若御史夏之令以劾毛文龍呉裕中以熊廷弼姻考功即蘓繼歐以楊漣黨後軍都督府經歴張汶以被酒詆忠賢或下獄或被杖死皆在燝後崇禎初燝贈光祿卿官一子乾學等皆贈䘏丁乾學字天行浙江山隂人寄籍京師劉鐸廬陵人夏之令光山人呉裕中江夏人蘓曽孫繼歐許州人張汶邯鄲人尚書國彦葉向高罷御史林汝翥福清人向高甥也方廵城有内二竪争奪人財物闘于塗汝翥笞之時萬燝甫杖死魏忠賢矯㫖命杖汝翥如燝汝翥懼逃之城外羣閹疑匿向高第聚而圍之大肆詬辱向高上言國家二百年來無中使圍閣臣第者臣今不去何靣目見士大夫帝優㫖慰留盡収回中使汝翥尋出受杖竟不死向高以時事不可為乞歸已二十餘疏至是請益力乃命行人䕶歸向高為人光明忠厚有徳量好扶植善類自再入相輔冲主閹人逞煬計時事日非向高亦稍刓方為員然猶數有匡救老成持重為清流所倚頼惟庇門生王化貞不能決議致壊封疆事為時所咎焉後三年卒崇禎初贈太師諡文忠河決徐州決魁山即奎山在銅山縣東南隄城中水深丈餘遷州治于雲龍山在銅山縣南常有雲氣蜿蜒如龍故名而治河事無言及者封光宗選侍李氏為康妃魏忠賢請加選侍封號帝從之㫖與前移宫諭相背時咸謂前諭出自王安後㫖出自忠賢故彼此牴牾帝實不辨也冬十月罷吏部尚書趙南星左都御史髙攀龍御史崔呈秀薊州人按淮陽私贓狼籍比還朝攀龍循故事考察故事廵按御史回道考覈稱職始復任盡發其貪穢狀南星議戍之詔革職聽勘呈秀窘夜走魏忠賢所叩首涕泣乞為義子且言不去南星攀龍等吾輩未知死所忠賢大以為然遂與定謀㑹山西缺廵撫南星以太常卿謝應祥安福人有清望前列以請既得㫖而御史陳九疇厯城人受魏廣㣲㫖言應祥嘗知嘉善魏大中出其門大中以師故謀于選郎夏嘉遇而用之狥私當斥先是孟冬享廟且頒朔廣㣲偃蹇後至大中抗疏劾廣㣲廣㣲恨甚故嗾九疇斥之大中嘉遇疏辨南星攀龍極言應祥以人望推舉大中嘉遇無私九疇妄言不可聽忠賢大怒矯㫖黜大中嘉遇并黜九疇而責南星等朋謀結黨南星遂引罪去忠賢復矯㫖切責放之歸明日攀龍亦引去初南星里居時名日髙海内仰慕與顧憲成鄒元摽並稱三君及召起為吏部嘗與忠賢並坐宏政門正色語忠賢曰主上冲齡我輩内外臣子宜各努力為善忠賢黙然怒形于色至是罷去忠賢與其黨恨不已毎矯敕諭必目為元㐫云十一月削吏部侍郎陳于廷副都御史楊漣僉都御史左光斗籍先是萬燝杖死黄尊素語漣曰可以去矣漣曰苟濟國死生以之卒不去至是廷推吏部尚書漣注籍不預于廷等推喬允升字吉甫洛陽人馮從吾汪應蛟字潛夫婺源人上之中㫖責漣大不敬又以允升等為趙南星私人責于廷光斗與漣朋比並削籍而擢徐兆魁吏部侍郎喬應甲副都御史王紹徴僉都御史皆素為南星所擯者也由是天下大權一歸忠賢矣韓爌罷葉向髙既去爌為首輔故事閣中止首輔秉筆魏廣微欲分爌權囑魏忠賢傳㫖諭爌同寅協恭而責次輔毋伴食爌即抗疏乞休中㫖責爌歸非于上悻悻求去遂聽罷爌毎事持正為善類所倚然向髙有智籠軍羣閹爌惟亷直自持勢不能敵而魏廣㣲又深結忠賢偏引邪黨故卒齮齕而去已而忠賢黨劾爌除名又假他事坐贓二千爌鬻田宄貸親故以償而棲止于先墓十二月逮内閣中書汪文言歙人下鎮撫司獄文言初以布衣任俠有智術神宗末遊京師輸貲為監生用計破齊楚浙三黨先是三黨諸魁交甚宻後齊與浙漸相貳文言習知本末多方設竒間之諸人果相疑而浙黨鄒之麟以求吏部不得見惡齊黨亦交闘其間于是齊浙之黨大離因交結東宫伴讀王安與談當世流品安悦之光宗初立外廷倚劉一燝而安居中以次行諸善政文言交關力為多及魏忠賢殺安文言亦下吏得末減益游公卿間葉向高用為内閣中書韓爌趙南星楊漣左光斗魏大中俱與徃來㑹給事中阮大鋮懐寧人居桐城與光斗大中有隙大鋮與光斗同里倚為重㑹吏科缺都給事中大鋮次當遷方家居光斗招之趙南星髙攀龍揚漣以察典近大鋮輕躁不可任擬用大中大鋮至光斗意中變使補工科大鋮心恨之囑其同官傳櫆臨川人劾文言與光斗大中交通為奸利㫖下文言詔獄葉向高以舉用文言引罪求去忠賢終憚向髙舊臣不深䆒而御史黄尊素語鎮撫劉僑曰文言無足惜不可使祸延縉紳僑頷之獄上止坐文言廷杖除名無株及者事在是年四月方忠賢得櫆疏喜甚欲藉是羅織東林而獄遽解志不得逞乃以劉僑不任事削其籍而用許顯純代欲再伺釁而動至是御史梁夢環廣東順徳人知忠賢恨未已復劾文言詔立逮之下北鎮撫司獄即命顯純鞫治而大理丞徐大化亦希忠賢指劾漣光斗黨同伐異招權納賄於是東林之禍遂作朱國楨罷國楨繼韓爌為首輔魏廣㣲視之蔑如給事中李蕃日照人三疏劾國楨遂引疾求去忠賢語其黨曰此老亦邪人但不作惡可令善去乃加少傅遣行人䕶歸崇禎中卒諡文肅乙丑五年春正月復聴勘御史崔呈秀官魏忠賢既得呈秀恨相見晚遂用為腹心日與計畫至是給事中李恒茂邢臺人為呈秀訟寃忠賢即以中㫖復其官時中旨頻出朝端以為憂給事中李魯生獨上言執中者帝用中者王旨不中出而誰出舉朝大駭李魯生霑化人尋督三殿工忠賢以閲工故日至外朝呈秀必屏人密語移時先是顧秉謙魏廣微以己意㸃縉紳便覽一册若葉向髙韓爌趙南星髙攀龍楊漣左光斗等百餘人目為邪黨而以黄克纉王永光長垣人徐大化賈繼春霍維華等為正人進之忠賢俾據是為黜陟已而王紹微編東林一百八人繫以宋時淮南盜宋江等諸名目為㸃將録令忠賢按名黜汰及是呈秀復進同志諸録皆東林黨人又進天鑒録皆不附東林者由是羣小無不登用善類為之一空呈秀不二嵗即晉兵部尚書兼左都御史出入吉烜赫勢傾朝野于時忠賢門下文臣則呈秀田呉淳夫李夔龍倪文煥主謀議號五虎武臣則田爾耕許顯純孫雲鶴楊寰崔應元主殺僇號五彪他若尚書周應秋太僕少卿曹欽程等號十狗此外又有十孩兒四十孫之號而呈秀尤為之魁暮夜乞憐者莫不縁之以進蠅集蟻附其門如市或不附己及勢位相軋者輒令其黨排去諸所傾陷不可悉數雖其黨亦深畏之倪田吉故城人呉淳夫晉江人李夔龍福建南安人文煥江都人孫雲鶴覇州人楊寰呉縣人崔應元大興人周應秋金壇人曹欽程江西徳化人三月我大清建都瀋陽先是太祖髙皇帝命築城界藩營建宫室尋自界藩遷于薩爾滸遼陽既克乃于城東五里築城備宫闕之制建為東京至是以瀋陽形勢之地復自東京遷都之是為盛京夏四月太白晝見重修光宗實録御史楊維垣文登人首翻三案給事中霍維華繼之痛詆劉一燝韓爌孫慎行張問逹周嘉謨王之寀楊漣左光斗而譽范濟世濟源人王志道漳浦人等請改光宗實録中旨允之免李可灼戍擢濟世廵撫志道等京卿時魏忠賢特恨東林諸人數論其罪實于三案及京察辛酉癸亥封疆熊廷弼事無與也羣小欲藉忠賢力為報仇凡異己者概指為東林黨而去之清流之禍遂不可解未幾楊左諸人皆坐封疆事被禍而御史石三畏追論京察事力詆孫丕揚王圖等于是生者除名死者追奪已又極論三案請以其疏付史館三畏交河人忠賢門下十孩兒之一也六月朱延禧罷中㫖令閣票稱魏忠賢為元臣延禧執不可御史田景新阿忠賢意攻去之逮前副都御史楊漣僉都御史左光斗給事中魏大中御史袁化中太僕少卿周朝瑞陜西副使顧大章下詔獄尋斃之削前吏部尚書趙南星等籍考明史漣等逮問在三月下獄在六月今并書以省文先是讞汪文言獄詞連趙南星李三才及漣光斗等二十餘人許顯純坐漣等以移宫罪徐大化獻策于魏忠賢曰但坐移宫則無贓可指若坐納楊鎬熊廷弼賄則封疆事重殺之更有名忠賢以為然乃令顯純復鞫文言五毒備至使引漣等納廷弼賄文言仰天大呼曰世豈有貪贓楊大洪哉至死不承大洪者漣别字也顯純乃手作文言供狀文言復張目謂曰爾莫妄書異時吾當與面質顯純遂即日斃之而具獄詞以上漣光斗各坐二萬大中三千化中六千朝瑞一萬大章四萬餘復多所牽引中㫖漣光斗六人逮下獄詔南星三才等俱削籍下所在撫按追贓漣光斗等先後逮至顯純非法拷掠血肉狼籍贓不肯承光斗私計曰被殺我有二法因我不承而酷刑以斃之一也夜半令獄卒潜殺之二也承則當下法司庶有見天之日諸人然其言俱自誣服忠賢乃矯㫖仍令顯純五日一追比不下法司諸人始悔失紏至七月漣光斗大中同夕為獄卒所斃漣之死土囊壓身鐡釘貫耳最為慘毒光斗大中亦皆體無完膚越數日始報三人屍俱已潰敗不可識又踰月化中朝瑞亦斃惟大章未死羣小謂諸人潜斃無以厭人心乃移付法司定罪布告天下仍移鎮撫司大章曰吾安可再入此獄呼酒與其弟大韶訣投繯而卒初漣等被逮秘獄中忽生黄芝光彩逺映及六人畢入適成六瓣或以為祥大章嘆曰芝瑞物也而辱於此吾輩庸有幸乎已而果然時以六人為六君子方漣之被逮也士民數萬擁道攀號所厯村市悉焚香建醮祈祐生還既死産入官不及千金母妻止宿譙樓二子至乞食以養徵贓令急鄉人競出貲助之至賣菜傭亦為輸助光斗前畿輔永利尋督學政士民徳之容城孫奇逢者節俠士也與定興鹿正倡義醵金諸生争應之得金數千謀代輸緩獄而光斗已前斃正即善繼父世所稱鹿太公者也光斗死而贓未竟撫按嚴追兄光霽坐累死母以哭子死家族盡破大中長子學洢以父被逮欲隨行大中止之乃㣲服間行探刺起居既抵都邏卒四布變姓名匿旅舍晝伏夜出稱貸以完父贓未竟而大中斃學洢慟哭幾絶扶襯歸晨夕號泣水漿不入口遂死化中前佐髙攀龍發崔呈秀贓私呈秀惧之又繼漣疏劾忠賢有鋌而走險横逞之毒將不在搢紳而即在陛下等語忠賢益大恨因竄名獄中朝瑞常請宥廷弼戴罪令守山海徐大化與之相訐大章在刑部時讞廷弼獄援議能議勞例從寛遣戍楊維垣劾其受賄故二人並坐而大章贓尤多崇禎初漣贈兵部尚書諡忠烈光斗贈右都御史福王時追諡忠毅大中贈大常卿諡忠節子學洢旌孝行化中贈太僕卿福王時追諡忠愍朝瑞贈大理卿福王時追諡忠毅大章贈太僕卿福王時追諡裕愍秋八月毁天下書院御史張訥閬中人上疏力詆鄒元標孫慎行馮從吾余懋衡字特國婺源人等請毁其講學書院于是元標慎行從吾懋衡俱削奪東林關中江右徽州及天下一切諸書院皆毁訥為忠賢鷹犬最効力忠賢深徳之書院既毁未幾逆祠建矣時元標已前卒追論奪官崇禎初贈尚書諡忠介慎行尋復以紅丸事遣戍具詳後從吾以病卒崇禎初復官謚恭定穆衡亦于崇禎初復官以周如磐莆田人丁紹軾貴池人黄立極字中五元成人為禮部尚書馮銓涿州人為禮部侍郎並兼東閣大學士預機務輔臣缺詔推老成幹濟者禮部尚書周如磐以年老推用侍即黄立極與忠賢同鄉故援之熊廷弼之獄紹軾與銓謀居多紹軾索憾廷弼以御史呉裕中為廷弼姻言于忠賢而杖殺之銓亦與廷弼有隙家居時曽遺書魏良卿勸興大獄及侍講筵出市刋遼東傳譖于帝曰此廷弼所作希脱罪耳帝大怒于是廷弼死遂决銓資淺年未及四十忠賢黨李魯生上言成即為老而非必老乎年幹乃稱濟而即有濟于國銓遂柄用如磐閲三月即罷歸紹軾未踰年亦卒魏廣微罷初楊左之獄廣微預謀吏部尚書崔景榮字自強長垣人懼諸人立斃亟請廣微諌止廣微不自安乃疏言漣等在今日誠為有罪之人在前日實為卿寺之佐縱使贓私果真亦當轉付法司據律論罪無令鎮撫嚴刑追比疏入大忤忠賢意廣㣲懼急出景榮手書自明忠賢怒已不可解遂連疏乞歸景榮亦罷殺前遼東經畧熊廷弼傳首九邊先是法司論廷弼獄與王化貞俱論死已而楊左諸人俱坐贓斃獄忠賢黨門克新汝陽人石二畏等趣殺廷弼及是遂棄市傳首九邊化貞竟不誅御史梁夢環謂廷弼侵盜軍資十七萬劉徽清苑人謂廷弼家資百萬宜籍以佐軍中㫖從之罄産不足償其子兆珪自刎死姻族家俱破武弁蒋應陽為廷弼稱寃立誅死太倉人孫文豸顧同寅作詩誄之為邏者所得二人坐誹謗俱斬連及其同郡編修陳仁錫修撰文震孟並削籍陳仁錫字明卿長洲人冬十月罷孫承宗以髙第字登之灤州人代為經畧初忠賢以承宗功髙欲親附之㑹帝遣内官王應坤犒邊賜承宗蟒玉忠賢即令應坤申意承宗不與交一言忠賢大憾趙南星等被逐承宗方西巡薊邊念抗疏帝弗省往在講筵每奏對間有入乃請以賀聖壽入朝面奏機宜欲因是論其罪魏廣㣲聞之奔告忠賢曰承宗擁重兵清君側公立虀粉矣忠賢悸甚繞御床哭帝亦心動令内閣擬㫖顧秉謙奮筆曰無㫖離信地非祖制違者法不宥夜啓禁門諭兵部發三道飛騎止之又諭九門守奄孫閣老入齊化門者反接以入承宗抵通州聞命而還事在四年忠賢遣人偵之一襥被置輿中後車惟鹿善繼而已忠賢意漸解而其黨李蕃徐大化等至詆為王敦李懐光承宗遂累疏求罷不許㑹馬世龍有栁河亦曰楊栁河在奉天府海城縣南西北流入三岔河之敗有降人劉伯漒自耀州来言州城内虚可襲世龍信之遣副将魯之甲等率師往檄水軍遊擊金冠以舟濟師冠違令不至師次栁河不得渡軍陷泥淖中敗沒於是臺省交章劾世龍并及承宗承宗求去益力遂許之以兵部尚書髙第代為經畧第素恇怯以闗外必不可守欲盡撤錦謂錦州右廣寧右衛故屯也諸城守禦移闗内袁崇煥力爭謂兵法有進無退錦右動揺則寧前震驚闗内亦失保障第意堅且欲并撤寕前二城崇煥曰我寧前道也官此當死此我必不去第不能奪乃撤錦州右屯大小凌河及松山杏山注俱見前塔山堡名在錦縣西南守具盡驅入闗委棄米粟十餘萬軍民死亡載途哭聲震野民怨而軍益不振十二月榜東林黨人姓名示天下御史盧承欽餘姚人上言東林自顧憲成李三才趙南星而外如王圖髙攀龍等謂之副帥曹于汴陽兆京史記事魏大中袁化中謂之先鋒丁元薦沈正宗李朴字繼白朝邑人賀烺謂之敢死軍人孫丕揚鄒元標謂之土木魔神宜一切榜示海内俾奸慝無所容忠賢大喜悉刋黨人名示天下凡黨人已罪未罪悉編名其中丙寅六年春正月作三朝要典先是給事中楊所修商城人請集梃擊紅丸移宫三案章疏倣明倫大典編輯為書頒示天下霍維華亦以為言至是作三朝要典起乙夘至辛酉以顧秉謙黄立極馮銓為總裁施鳯來平湖人楊景辰晉江人孟紹虞曽楚卿副之極意詆諆東林暴揚罪惡其論梃擊以王之寀間釁骨肉誣皇祖負先帝雖碎骨不足贖論紅丸以孫慎行創不嘗藥之説妄疑先帝不得正其終更附不討賊之論輕詆皇上不得正其始為罔上不道論移宫以楊漣等内結王安故重選侍之罪以張擁戴之功于是遂以之宷慎行漣為三案罪首時方重修光宗實録凡事闗三案命即據要典以改及書成忠賢令顧秉謙擬御製序文冠其首刋布中外二月髙第罷以王之臣潼闗衛人代為經畧袁崇煥巡撫遼東先是我大清兵圍寧逺髙第與總兵楊麒擁兵不救寧前参政袁崇煥集将士誓死守盡焚城外民居攜守具入城檄前屯及山海闗凡将士逃至者悉斬人心始固大軍戴楯穴城矢石不能退崇煥令閩卒羅立發西洋巨礟圍遂解時督屯通判金啟俕以燃礟死事聞擢崇煥僉都御史削髙第楊麒職以之臣代第以前屯總兵趙率教代麒鎮闗門尋命崇煥巡撫遼東駐寧逺逮前左都御史髙攀龍吏部員外郎周順昌字景文呉縣人蘇松巡撫周起元字仲先海澄人諭徳繆昌期字當時江隂人御史李應㫒周宗建黄尊素攀龍自沈于池順昌等俱下獄死攀龍雖削籍崔呈秀恨不已亟言于魏忠賢必欲殺之順昌家居魏大中被逮過吳順昌出餞與同起卧者三日許以女聘大中孫旗尉屢趣行順昌瞋目曰若不知世間有不畏死男子周順昌邪因㦸手呼忠賢名罵不絶口旗尉歸以告忠賢大怒倪文煥即希指劾順昌與罪人婚削籍昌期前典湖廣鄉試程文論中引趙髙仇士良寓規諷忠賢嗛之楊漣劾忠賢二十四罪疏或言昌期代草而髙趙諸人去國昌期率送之郊外執手太息忠賢益大恨昌期知勢不可留其疏乞假有小璫至閣曰此人尚可留之送客耶遂傳㫖落職宗建首劾忠賢目不識丁事具前應昇尊素皆繼漣抗疏力攻忠賢應昇疏有云忠賢之罪千真萬真無可復辨千罪萬罪又不勝辨臣為陛下計莫若聴忠賢亟自引退以全旦夕之命為忠賢計又莫若早自引决以乞帷葢之恩不然惡稔貫盈他日欲保首領而不可得末又切責閣臣謂君側不清焉用彼相一時寵利有盡千秋青史難欺不欲為劉健謝遷者恐并不能為李東陽倘投䇿求歡不幾與焦芳同傳邪時魏廣㣲方深結忠賢知應昇譏已調㫖責之應昇復疏論曰廣微父允真為言官得罪輔臣以去聲施至今乞陛下戒諭廣㣲退讀父書保其家聲毋倚三窟庶可見乃父地下廣㣲益切齒而尊素尤有智慮為羣小所深忌曹欽程希指劾宗建應昇尊素為東林䕶法皆削籍㑹吳中訛言尊素欲效楊一清誅劉瑾用蘇杭織造李實為張永授以秘計忠賢大懼遣刺事者至吳凡數輩侍郎烏程沈演㴶之弟家居奏記忠賢曰事有跡矣于是忠賢益遣使譙訶實知實與前巡撫起元起元先已削籍素有隙起元撫吳公亷愛民絲粟無所取實素貪横妄増定額恣誅求又惡同知楊姜不屈已具疏誣劾起元為姜辨寃而劾實不法數事實以此斂威而銜起元不置乃索取實空印白疏令李永貞偽為實奏誣劾起元為巡撫時乾沒帑金十餘萬日與攀龍輩往來講學因行居間竄入順昌等名矯㫖並逮之攀龍聞旗尉將至謁道南祠即楊龜山祠為文以告歸與二門生一弟飲後園池上及暮書遺表訖具衣冠自沈於池表云臣雖削奪舊為大臣大臣受辱則辱國謹北向叩頭從屈平之遺則逺近聞其死莫不傷之順昌故有徳於鄉士民聞其被逮憤怒號寃開讀日不期而集者數萬咸執香為周吏部請命旗尉厲聲罵曰東厰逮人䑕輩敢爾大呼囚安在手擲銀鐺于地聲琅然衆益憤曰始吾以為天子命乃東厰魏太監邪遂蠭擁上勢如山崩旗尉東西竄衆縦横毆擊立斃一人餘負重傷踰垣走巡撫毛一鷺不能發一語知府冦慎吳縣知縣陳文瑞素得民曲為解諭衆始散順昌乃自詣吏是日旗尉往浙江逮尊素者泊舟胥門外市人知城中有變擊其舟而沈之旗校泅水以遁失駕帖不敢往尊素聞即囚服自投詔獄順昌既就逮一鷺飛章告變東厰刺事者言吳人謀㫁水道刦漕舟忠賢大懼已而一鷺言縛得倡亂者顔佩韋楊念如周文元馬傑沈揚亂已定忠賢乃安然自是緹騎不敢復出國門矣方諸臣之被逮也顧秉謙忽持正請付法司論罪忠賢不從已而昌期先至慷慨對簿詞氣不撓坐賍三千備受五毒不勝刑而斃四月晦日槖饘中傳出片紙自此而絶至五月二日獄卒以死報終莫知為何日其殮也十指堕落掬置兩袖中葢以其為漣代草故云順昌宗建應昇尊素繼至許顯純各坐贓數千宗建至一萬三千五日一酷掠順昌輒大罵忠賢顯純椎落其齒順昌噀血唾顯純面罵益厲遂於夜中潛斃之時六月十七日及領埋已越三日皮肉皆腐僅存鬚髮宗建為顯純酷訊偃卧不能出聲顯純罵曰尚能詈魏公一丁不識否以沙囊偃之而死六月十八日尊素知獄卒将害己叩首謝君父賦詩一章時獨應昇尚在尊素隔牆呼之曰仲達我先行矣遂死閏六月朔日明日應昇亦死起元道逺至則順昌等已俱斃顯純酷加榜掠竟如疏懸贓十萬罄貲不足親故多為破家及九月亦斃之獄中時以順昌等惨死詔獄與前楊左諸人先後畧同遂與髙攀龍並稱為後七君子以配楊左等共十有三人為逆閹時死節之最著者云攀龍學本濓洛操履篤實涵養䆳宻粹然為一代大儒既死呈秀憾未釋矯詔下其子世儒吏刑部坐世儒不能防閑其父謫為徒順昌就逮時諸生朱文祖間行詣都為納饘粥湯藥及啟贓令急奔走稱貸諸公間順昌櫬歸文祖哀慟發病死其所捕顔佩韋等五人比臨刑語知府冦慎曰公好官知我等好義非為亂也延頸就刄而死後吳人合塟之虎邱傍題日五人之墓昌期應昇至常州開讀知府曽櫻咸助之貲應昇師吳鍾巒詣府署與應昇語竟日謂應昇曰昔蔡元定竄道州晦翁餞之蕭寺微視元定不異平時何圖今日親見此景真一夕千古已而忽聞署外有數千人閧聲皆言忠臣何故被逮櫻素有惠政得民力為勸諭始觧散而諸挍方怖蘇州事有越垣而仆者適賣蔗童子過之曰我恨極惜不能殺汝即取削蔗刀割片肉而去宗建死後所親蔣英代為輸贓亦坐削籍尊素家貧坐贓雖不及三千同年門舊及郷人咸助之始得完起元方撫吳罷歸順昌為父送之指斥無所諱議者謂起元順昌之禍已伏于此及兩人死吳中士民無不垂涕者崇禎初攀龍贈兵部尚書諡忠憲授其子世儒官順昌贈太常卿諡忠介其子茂蘭刺血詣闕愬寃詔以所贈官推及其祖父起元贈兵部待郎福王時追贈忠惠昌期贈詹事福王時追諡文貞宗建尊素應昇俱贈太僕寺鄉福王時宗建應昇皆追諡忠毅尊素追諡忠端吳周茂蘭字子佩順昌長子曽櫻字仲金峽江人鍾巒字巒雅武進人蔣英嘉善人夏五月王恭厰災王恭厰火藥局也是日雷震火藥自焚地中霹霍聲不絶煙塵障空白晝晦㝠軍民暈仆死者無算六月地震先是五月薊州密雲連震三日及是京師天津宣大山東河南皆震閏月建魏忠賢生祠浙江巡撫潘汝楨桐城人疏請建忠賢生祠于西湖織造太監李實請令杭州衛百户守祠詔賜祠額曰普徳勒石記功徳閣臣撰文書丹自是諸方效尤㡬遍天下薊遼總督閻鳴泰部内建祠七所費數十萬其頌忠賢有民心依歸即天心向順語開封毁民舍一千餘間創宫殿九楹儀如帝者巡撫朱童䝉建祠綏延用琉璃瓦劉詔把縣人建祠薊州金像玉旒其諸祠務極工作之巧像皆以沈香木為之眼耳口鼻宛轉如生人腹中腸肺俱以金玉珠寶為之髻空穴其一以簪四時香花一祠木像頭梢大小䜿上冠不能容匠人恐急削而小之以稱冠小䜿抱頭慟哭責匠人疏辭揄揚一如頌聖稱以堯天舜德至聖至神閣臣輙用駢語褒答督餉尚書黄運泰永城人迎忠賢像五拜五稽首稱九千嵗都城内外祠宇相望有建于東華門外者工部郎中葉憲祖字美度餘姚人曰此天子臨辟雍道也土偶能起立乎忠賢聞之即削其籍初汝楨請建祠巡按御史劉之待興國州人㑹稿遲一日即削籍而薊州道胡士容黄州廣濟人以不具建祠文遵化道耿如杞字楚材館陶人以入祠不拜皆下獄論死時海内望風獻媚自督撫巡按而外宗室若楚王華煃勲戚若武清侯李誠銘保定侯梁世勲等廷臣若尚書邵輔忠詞臣若庶吉士李若琳部郎若郎中魯國楨諸司若通政司經歴孫如冽上林監丞張永祚等亦皆建祠恐後下及武夫賈䜿諸無賴子莫不攘臂争先洶洶若不及後忠賢敗諸祠悉廢凡建祠者概入逆案李誠銘慈聖太后姪梁世勲珤之後邵輔忠定海人李若琳大興人魯國禎臨川人馮銓罷銓以媚事魏忠賢登宰輔素與崔呈秀䁥呈秀欲入閣其黨孫杰霍維華嗾職方郎中吳淳夫力攻罷銓又慮王紹徽為吏部不肯推呈秀令御史袁鯨湖廣龍陽人攻罷紹徽而杰等慮忠賢意變復以計沮之自是羣小擕貳京師水江北山東旱蝗秋七月以施鳯來張瑞圖晋江人李國􅕠高陽人俱為禮部尚書兼東閣大學士預機務鳯來素無節概及在閣惟以和柔自媚于世瑞圖于諸事務迎合魏忠賢意忠賢建祠碑文多出其手書詔㫖褒美忠賢詞極駢麗皆瑞圖筆也國􅕠去釋褐纔十四年忠賢以同鄉故援之九月我太宗文皇帝嗣位以明年為天聰元年顧秉謙罷自秉謙為首輔凡魏忠賢傾害忠良皆屬其票擬三朝要典之作秉謙為總裁是非舛謬特甚及是羣小各有所左右同黨中日夜交軋秉謙不自安遂乞歸崇禎初削籍尋入逆案論徒家居又為鄉黨所惡聚衆僇辱之屋室貲財焚掠殆盡秉謙竄漁舟得免久之寄居他縣以死冬十月進魏忠賢爵上公從子良卿寧國公三殿告成先是皇極殿成帝御殿受賀忽有聲如怒濤自殿中出羣臣班亂太監李永貞奏魏忠賢功吏部尚書周應秋亦奏如永貞言忠賢遂進上公加恩三等良卿前已封肅寧伯晉侯是年春遼陽男子武長春逰妓家有妄言東厰擒之許顯純掠治故張其辭云長春謀間不獲且為亂賴厰臣忠智立竒勲詔封良卿為肅寧伯賜鐵券尋晉為侯至是復進封公已而諸邊築隘口成南京孝陵工竣甘肅奏㨗法司捕盗並言忠賢區畫方略詔書褒美閣臣皆擬九錫文半嵗中廕錦衣指揮使十七人同知三人僉事一人擢其族孫希孟希孔等世襲都督同知甥傅之琮馮繼先俱都督僉事章奏無巨細輙頌忠賢稱厰臣不名山東奏産麒麟太學士黄立極等票㫖言厰臣修徳故仁獸至其誣罔若此故事内官為司禮秉筆非公事不得出忠賢每嵗必数厯畿甸坐文軒駕四馬笙鼔鐃吹之聲轟隠黄埃中錦衣玉帶鞾袴而握刀者夾車左右而馳自厨傳優伶蹴鞠與皂隨者動以萬數嘗自琉璃河祭水還厯西山碧雲寺士大夫皆遮道拜伏凡有章奏其黨遣急足馳請然後下客氏既朝夕侍帝所而毎數日必出至私第輿過乾清宫前竟不下客氏盛服倩粧儼同妃后侍衛赫奕照耀衢路至宅則老祖太太千嵗之聲喧呼震賢地犒賚銀幣無算或一日不返忠賢促之始入凡忠濁亂朝廷毒痡海内皆客氏為内主也丁夘七年春正月以太監崔文昇總督漕運河道文昇先侍光宗藥為廷臣所論已放南京事具前魏忠賢作三朝要典遂召還至是命兼督河漕二月召王之臣還先是袁崇煥與滿桂不協請移之他鎮乃召桂還既而廷臣奏留桂崇煥又與不協中朝慮僨事命之臣専督闗内以闗外屬崇煥畫闗而守至是朝議以二人既不相能召之臣還罷經畧不設令崇煥盡統闗内外軍崇煥與趙率教巡厯錦州大小凌河議大興屯田漸復髙第所棄舊土㑹大清兵方討朝鮮渡鴨緑江崇煥乗間遣将繕錦州中左大凌三城未畢朝鮮及毛文龍同告急朝命崇煥發兵往援崇煥以水師援文龍又遣率教等九将將精兵逼三岔河為牽制之勢而朝鮮已為大清所服諸將遂引還勒太康伯張國紀回籍國紀皇后父也后性嚴明見魏忠賢及客氏亂政數於上前言之客魏交恨一日帝至后宫后方讀書帝問何書對曰趙髙傳也帝嘿然而出忠賢聞之益恨㑹有張匿名榜於厚載門者列忠賢反狀及其黨七十餘人忠賢疑國紀為之邵輔忠孫杰欲因此興大獄借國紀以揺中宫事成則立魏良卿女為后草一疏募人上之諸人慮禍不敢承順天府丞劉志選年老而嗜進無厭志選與葉向髙同舉進士由主事謫知縣復以大計罷歸三十年不得起㑹向髙再召道杭州志選與逰讌彌月還朝用為南京主事即上疏追論紅丸事力詆孫慎行忠賢大喜累擢至府丞時年已七十餘矣惑家人言謂已老必先忠賢死也竟上之疏中極論國紀罪末言毋令人訾及丹山之穴藍田之種葢忠賢嘗誣后非國紀女故云疏上事叵測帝無所問但令國紀自新而已忠賢意大沮梁夢環偵知之復申論志選疏且故詰丹山藍田二語忠賢將從中究其事大學士李國􅕠及王體乾交沮之事乃止而國紀竟勒歸故郡三月遣瑞王常浩及恵王常潤桂王常瀛之藩三王皆帝叔父魏忠賢潛懐逆謀不利其在内御史張訥希指即疏趣之藩于是三王以次就國瑞王先之漢中恵王繼之荆州踰月後桂王之衡州儀物禮數刻意貶損羣小反盛稱忠賢節費為國帝即下詔褒美夏四月逮前刑部侍郎王之寀之寀於天啓初累遷刑部侍郎後以要典成削籍下獄死劉志選疏頌要典言命徳討罪無微不彰即堯舜之放四凶舉元愷何以加焉且云慷慨憂時力障狂瀾于既倒者魏廣微也當還之揆席以繼五臣之盛事赤忠報國弼成巨典于不刋者厰臣也當增入簡端以揚一徳之休風又言王之宷宜正典刑孫慎行宜加遣戍之寀于天啟初上復仇疏中言挺擊之謀變而為用藥之術葢挺不中而藥捉之是文昇之藥慘于張差之挺也而慎行辨折紅丸有曰由前則過信可灼有輕進之罪由後則曲庇可灼有不討賊之罪兩者皆無可逃其言峻直故羣小恨之次骨忠賢矯㫖逮之寀下詔獄坐以贓八千竟瘐死慎行亦遣戍寧夏知府曽櫻故緩之未行而忠賢敗五月監生陸萬齡請祠魏忠賢于國子監許之萬齡請以忠賢配孔子忠賢父配啟聖公其疏曰孔子作春秋厰臣作要典孔子誅少正夘厰臣誅東林黨人禮宜並尊持疏詣司業林釪字實甫同安人釪援筆塗抹即夕掛冠櫺星門而去司業朱之俊為奏請從之釪坐削籍秋七月罷袁崇煥以王之臣代之時我太宗文皇帝親督兵至大凌河守城士卒皆遁遂進圍錦州太監紀用總兵趙率教遣使請和我大清遺書責之袁崇煥令祖大壽等統精兵四千繞出大清兵後别遣水師東出相牽制大壽等未至大清已分兵抵寧逺城下崇煥督將士登陴列營濠内用礟拒擊而滿桂亦率尤世威以兵来赴我大兵疾馳進擊大敗之追至城下尸填壕塹皆滿尋解寧逺圍復益兵攻錦州以溽暑不能克毁大小凌河二城而還時稱寧錦大捷魏忠賢使其黨劾崇煥不救錦州崇煥乞休去以王之臣代之及論功文武冒濫增秩賜廕者數百人崇煥止増一秩尚書霍維華嘗進仙方靈露飲于帝帝飲而甘之已漸厭及得疾體腫忠賢以賢咎維華惟華懼甚慮帝不測有後患欲先自貳于忠㑹寧錦敘廕維華維華請以讓崇煥忠賢覺其意降㫖頗厲封魏忠賢從孫鵬翼為安平伯加少師從子良棟東安侯加太子太保良卿加太師良棟鵬翼尚在襁褓鵬翼以寕錦奏㨗封良棟以殿工封從吏部尚書周應秋請也良卿至代天子享南郊祭太廟于是天下皆知忠賢欲竊神器矣八月帝崩遺詔皇五弟信王嗣位先是帝不豫召閣部科道諸臣于乾清宫諭以魏忠賢王體乾皆恪謹忠貞可計大事黄立極等對曰陛下任賢勿貳諸臣敢不仰體越數日大漸遂崩遺詔以弟信王嗣位王即夕入居宫中羣臣于比明始至方入臨内使十餘人傳呼崔尚書甚急呈秀入與忠賢宻謀久之語秘不得聞或云忠賢欲簒位呈秀以時未可止之也信王由檢即位是為莊烈帝赦以明年為崇禎元年九月追諡母賢妃劉氏海州人籍宛平為孝純皇后立皇后周氏蘇州人生員奎之女奎後封嘉定伯追尊光宗選侍李氏即東李見前為莊妃以撫育恩也冬十月南京地震十一月放魏忠賢於鳯陽道死詔磔其屍帝素稔忠賢惡深自儆備及即位其黨自危楊所修楊楊維垣先劾崔呈秀先以嘗帝呈秀先丁母憂奪情視事不用縗纆及是所修請令呈秀守制維垣繼攻之呈秀罷歸于是主事陸澄源平湖人錢元慤歸安人員外史躬盛鳥程人遂交章並論忠賢而嘉興貢生錢嘉徵更劾忠賢十大罪一並帝二蔑后三弄兵四無二祖列宗五尅削藩封六無聖七濫爵八掩邊功九朘民十通闗節疏上帝召忠賢使内侍讀之忠賢震恐喪魄急以重寳啗信邸太監徐應元求解應元故忠賢博徒也帝知之斥應元安置忠賢於鳯陽榜其罪示天下尋命錦衣衛逮治忠賢行至阜城聞之與其黨李朝欽偕縊死乃磔其屍懸首河間呈秀聞忠賢死亦自縊明年追戮其屍言者劾呈秀為五虎之首宜肆市朝有詔逮治籍其家呈秀聞之列姬妾羅諸珍寳呼酒痛飲盡一巵即擲壊之飲已自縊詔開棺戮屍子弟皆遺戍罷諸邊鎮守中官免天啟時逮死諸臣贓釋其家屬黄立極罷山隂監生胡煥猷上疏論黄立極施鳯來張瑞圖李國􅕠等身居揆席一意媚閹並宜斥罷帝除煥猷名立極不自安乞休去十二月以錢龍錫字稚文松江華亭人李標字汝立高邑人來宗道蕭山人楊景辰黄道登吳江人劉鴻訓字黙成長山人並為禮部尚書兼東閣大學士預機務帝以施鳯來輩皆忠賢所用不足倚詔廷推閣臣倣古枚卜典召九卿科道入乾清宫貯名金甌焚香肅拜以次探之得龍鍚標宗道景辰輔臣以天下多故請益一二人復得道登鴻訓並命入閣客氏及魏良卿侯國興等伏誅先是熹宗崩客氏出外宅氏于五更赴梓宫前出一小凾用黄色龍袱包裹皆熹宗胎髪痘痂及累年落齒剃髪等痛哭焚化而去及是詔赴浣衣局掠死籍其家良卿國興與客光先等皆棄市家屬無少長皆斬嬰孩赴市有盹睡未醒者人以為慘毒之報中外快之方客氏之籍也于其家得宫女八人葢將效吕不韋所為帝大怒命悉笞殺之御批厯代通鑑輯覽卷一百十三

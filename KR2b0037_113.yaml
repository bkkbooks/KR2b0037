body:
  text: 諡曰悊皇帝廟號熹宗明史贊曰明自嘉靖而後綱紀日以陵夷神宗末廢壞極矣雖有剛明英武之君已難復振而重以帝之昏庸婦寺竊柄濫賞滛刑忠良慘禍億兆離心雖欲不亡何可得哉贈䘏寃䧟諸臣諸忤逆璫逮死若楊漣左光斗魏大中周順昌等皆贈䘏有差既而鄒元標馮從吾高攀龍諸人亦俱贈廕施鳯來張瑞圖罷御史羅元賔㑹稽人疏糾鳯來等以為綸綍之重任總歸閹宦之權衡欲尚公則尚公欲封爵則封爵欲建祠則建祠欲誅殺削奪則誅殺削奪情面多而擔當少爵禄重而謀國輕遂使黄扉為置郵之所輔臣若執簿之官誤國徇私莫此為甚帝是其言鳯來瑞圖遂俱乞罷陜西天赤如血是月二十五日陜西全省天赤如血至巳刻漸黄日始出占主大旱有暴兵夏四月以袁崇煥督師薊遼初崇煥以忤魏忠賢去忠賢既伏誅廷臣爭請召崇煥至是進兵部尚書督師薊遼崇煥尋至都帝召見平臺即後右門明代亦名曰平臺咨以方畧對曰臣受陛下特眷願假便宜計五年全遼可復帝退少憇時廷臣咸在給事中許譽卿叩以五年之畧崇煥言聖心焦勞聊以是相慰耳譽卿曰上英明安可漫對異日按期責效奈何崇煥憮然自失頃之帝出即奏言東事本不易竣陛下既委臣臣安敢辭難但五年内户部轉軍餉工部給器械吏部用人兵部調兵選将須中外事事相應方克有濟帝為飭四部臣如其言崇煥又言以臣之力守全遼有餘調衆口不足一出國門便成萬里忌能妬功夫豈無人即不以權力掣臣肘亦能以意見亂臣謀帝起立傾聴諭之曰卿勿疑慮朕自有主持大學士劉鴻訓等復請賜崇煥尚方劍假之便宜帝悉從之崇煥復上言恢復之計不外臣昔年以遼人守遼土以遼土養遼人守為正著戰為竒著和為旁著之説法在漸不在驟在實不在虚此臣與諸臣所能為至用人之人與為人用之人皆至尊司其柄何以任而勿貳信而勿疑葢馭邊臣與廷臣異軍中可驚可疑者殊多但當論成敗之大局不必摘一言一行之㣲瑕事任至重為怨實多諸有利于封疆者皆不利于此身者也況圖敵之急敵亦從而間之是以為邊臣實難臣非過慮但中有所危不得不告帝優詔答之五月李國􅕠罷國􅕠雖魏忠賢同鄉然每持正論至是乞歸薦韓爌孫承宗自代旋卒于家諡文敏毁三朝要典魏忠賢既誅其黨楊維垣等䕶持舊局上疏力詆東林與崔魏並指為邪黨編修倪元璐字玉汝上虞人再疏攻駁柄國者兩解之元璐尋上言請毀三朝要典略曰梃擊紅丸移官三議開于清流而三朝要典一書成于逆豎其議可兼行其書必當速毀葢當事起議興盈廷互訟主挺擊者力䕶東宫爭梃擊者計安神祖主紅丸者仗義之言爭紅丸者原情之論主移宫者弭變于機先爭移宫者持平于事後數者各有其是不可偏非總在逆璫未用之先雖甚水火不害塤箎此一局也既而楊漣二十四罪之疏發魏廣微此輩門户之説興于是逆璫殺人則借三案羣小求富貴則借三案經此二借而三案面目全非矣故凡椎慈歸孝于先皇正其頌徳稱功于義父此又一局也綱自宻而猶疑有遺麟勢已重而或憂其反局崔魏諸奸始創立私編標題要典已之批根今日則衆正之黨碑以之免死他年即上公之鐵劵又一局也由此而觀三案者天下之公議要典者魏氏之私嘗三案自三案要典自要典今為金石不刋之論者誠未深思臣謂翻即紛囂改亦多事惟有毁之而已夫以豎之權而役史臣之筆亘古未聞當毀一未易代而有編年不直書而加論斷若云彷彿明倫規模大典則是魏忠賢欲與肅皇帝爭聖崔呈秀可與張孚敬比賢悖逆非倫當毀二矯誣先帝偽撰宸篇既不可比司馬光資治通鑑之書亦不得援宋神宗手製序文為例假竊誣妄當毀三況史局將開館抄具備七載非難稽之世實録有本等之書何事留此駢枝供人唾詈當毁四疏上帝從之遂焚其板六月來宗道楊景辰罷宗道代李國􅕠為首輔事多詭隨編修倪元璐屢言時事宗道笑曰渠何事多言詞林故事止香茗耳時謂宗道為清客宰相景辰先與宗道為要典副總裁一徇奸黨指及朝局已變乃請毀要典言官交章劾之遂與宗道同罷秋七月浙江海溢海㓂鄭芝龍泉州南安人降閩海故多盗芝龍尤猖獗據海島截商㑹閩中洊飢求食者多歸之勢益熾然嘗敗官軍不追獲將士不殺當事者遣使撫諭遂降㑹福建巡撫熊文燦貴州永寧衛人至善遇之使為己用芝龍先後擊殺羣盜李魁竒鍾斌等擢授逰擊後又平巨冦劉香閩素有紅之患香乘之連犯閩廣沿海諸邑文燦令㕘政洪雲蒸往賊舟宣諭被執芝龍乃合廣東兵擊香于逺洋香脅雲蒸止兵雲蒸大呼曰我矢死報國急擊勿失遂遇害芝龍兵進香勢遂自焚死其家屬詣浙江降洪雲蒸長沙人海氛漸息芝龍尋擢副總兵數以海利交通權要寖以責顯革廣寧及薊鎮塞外諸部歳賞先是廣寧塞外綽哈納木圖古雲舊作貴英今改及薊鎮喀爾沁三十六家歳授撫賞至是盡革去之㑹歳饑諸部請粟復不許因是攜貳我大清悉收用之寧逺兵變川湖兵戌寧逺者缺餉四月大譟餘十三營起應之縳巡撫畢自肅總兵官朱梅于譙樓自肅上疏自劾脱走中左所自經督師袁崇煥聞變馳至捕斬首亂餘撫定之請令祖大壽遼東人仍駐錦州中軍副将何可綱遼東人隨己駐寧逺而移薊鎮趙率教于闗門遂羅寧逺及登萊巡撫時度支大拙錦州薊鎮兵相繼譁户部尚書畢自嚴字錦曽淄川人言一歳之出浮于所入一百一十三萬有竒而内供召買不與焉帝命羣臣各陳所見自嚴擇其可者先後列上増鹽引議鼔鑄括雜税覈隠田增闗課皆瑣屑權宜之計民以重困九月京師地震冬十月劉洪訓免尋遣戍先是魏忠賢雖敗其黨猶滿朝言路新進者羣起擊之諸執政李國􅕠等故嘗事忠賢不敢有所别白鴻訓至閣毅然主持次第斥楊維垣李恒茂楊所修孫之獬之獬為侍講間要典将毀詣閣力爭且慟哭天下笑之之獬淄川人阮大鋮等人情大快而羣奸餘黨恨刺骨帝數召見廷臣鴻訓應對獨敏謂民困由吏治失請帝久任責成帝嘉納之至是惠安伯張慶瑧偉曽孫總督京營敕内有兼轄捕營語提督鄭其心以非舊例舊例督京營者不轄尋捕軍論之命覈中書改敕之故下舍人田嘉璧獄而給事中李覺斯廣州東莞人言事由兵部具稿送輔臣審定中書繕寫兵部及輔臣皆當問帝心疑其事乃御便殿問諸閣臣皆云不知帝怒令廷臣劾奏于是覺斯言慶臻納賄御史吳玉壽陽人言鴻訓主使而帝閱兵部揭有鴻訓批西司房語帝意謂事已大著即令内閣擬旨閣臣合詞申辨不納遂落鴻訓職謫戍代州兵部尚書王在晉削籍慶臻以世臣停禄三年後鴻訓卒于戍所福王時復官十一月召對廷臣于文華殿禮部侍郎錢謙益字受之常熟人以罪削職都給事中章允儒南昌人等降謫有差詔㑹推閣臣廷臣列吏部侍郎成基命字靖之大名人及謙益等名以上時同推者鄭以偉李騰芳孫慎行何如寵薛三省盛以宏羅喻義王永光曹于汴凡十一人三鄭以偉字子器上饒人何如寵字康侯桐城人薛省字魯淑定海人羅喻義益陽人禮部尚書温體仁字長卿烏程人以無素望不與侍郎周延儒字玉䋲宜興人方奏對稱㫖先是錦州兵譁袁崇煥請給餉帝召問諸大臣皆請發内帑延儒獨進曰闗門昔妨敵今且防兵寧逺譁餉之錦州譁復餉之各邊效尤帑将安給帝曰卿謂如何延儒曰事不得不發但當求經久之策帝悦曰卿言是也降㫖責羣臣越數日復召問延儒曰餉莫如粟山海積粟不缺也缺銀月何故譁安知非驕弁搆煽以脅崇煥邪帝方疑邊将要挾延儒言復悦曰卿言是由此屬意延儒亦弗及體仁揣帝意必疑遂上疏訐謙益前典試浙江闗節受賄不當與閣臣選謙益于天啟三年典試浙江有奸人金保元徐時敏偽作闗節俚俗詩一朝平歩上青天句分置七義結尾授舉子錢千秋遂中式千秋本能文本房薦擬第二主司抑置第四知為保元時敏所賣與之事傳京師為部科庻勘者所發謙益大駭即具疏劾二奸及千秋俱下吏論戌謙益亦奪俸二奸尋斃千秋遇赦釋還事已七年矣至是體仁以枚卜不與疑謙益實沮之遂復發其事帝果心動次日召對閣部科道諸臣于文華殿命體仁謙益皆至謙益不虞體仁之劾己也辭頗屈而體仁盛氣詆謙益言如泉湧因進曰臣職非言官不可言㑹推不與宜避嫌不言但枚卜大典宗社安危所係謙益結黨受賄舉朝無一人言者臣不忍見皇上孤立于上是以不得不言帝久疑廷臣植黨聞體仁言輒稱善而執政皆言謙益無罪吏科都給事中章允儒爭尤力且言體仁熱中􅔵望如謙益當糾何俟今日體仁曰前此謙益皆閒曹今者糾之正為朝廷慎用人耳如允儒言乃真黨也允儒曰黨之説小人以䧟君子天啟朝可鑒帝怒命禮部進千秋卷責謙益謙益引罪帝嘆曰微體仁朕㡬誤遂叱允儒下獄並切責諸大臣時大臣無助體仁者獨延儒奏曰㑹推名雖公主持者止一二人餘皆不敢言即言徒取禍耳且千秋自有成案不必復問帝乃即日罷謙益官議罪坐杖論贖允儒及給事中瞿式耜字起田常熟人御史房可壯益都人等皆坐謙益黨降謫有差千秋復逮問荷校死十二月韓爌復入閣先是五月詔遣行人召爌及是始至㑹帝以錢謙益事悉置廷推者不用遂命爌復為首輔時劉鴻訓方被重譴爌至即疏救不聴温體仁既訐錢謙益御史毛九華任贊化亦疏訐體仁帝再召内閣九卿質之體仁力詆九華贊化為謙益私黨帝以為然秉燭召爌等于内殿謂進言者不憂國而植黨當重䋲以法爌退具揭言人臣不可以黨事君人君亦不可以黨疑臣但當論其才品臧否職業修廢而黜陟之若戈矛妄起于朝堂畛域横分于宫府非國之福也不納毛九華掖縣人任贊化聞喜人陜西饑流賊大起流賊始此先是閹黨喬任甲巡撫陜西朱童䝉巡撫延綏皆貪黷不恤民又連嵗大䘲白水賊王二府谷賊王嘉允宜川賊王左掛等一時並起攻城堡殺官吏安塞馬賊髙迎祥自稱闖王饑民王大梁自稱大梁王聚衆應之三邊饑軍亦羣起為盜大吏惡聞賊曰此饑氓徐自定耳已而帝從給事中劉懋臨潼人議裁驛站冗卒事在明年山陜游民仰驛糈者無所得食皆從賊己巳二年春正月周道登罷道登嘗召對帝問宰相須用讀書人何解對曰容臣至閣中檢閲囬奏帝有愠色又問章奏内多有情面二字何也對曰情面者面情之謂左右皆匿笑道登前在禮部多有爭執及柄政後排正人庇私交屢為言路所劾帝悉下其章廷議尚書王永光等言所劾有據遂放歸三月定逆案詔定魏忠賢逆案閣臣韓爌等不欲廣搜樹怨列上者少帝不懌令以贊導擁戴頌美謟附為目因曰忠賢一内豎耳苟非外廷助虐何遽至此且内廷同惡者亦當入廣等以不知内侍為對帝曰豈皆不知特畏任怨耳閲日召入便殿案有布囊盛章奏甚夥指之曰此皆奸黨頌疏可按名悉入爌等知帝意不可囬乃曰臣等職在調旨三尺法非所習帝召吏部尚書王永光問之以不習刑名為對召刑部尚書喬允升左都御史曹于汴同審定于是案所羅列㡬無脱至是上之帝親加裁定自魏賢忠客氏依謀反大逆律磔死外以六等定罪曰首逆同謀崔呈秀及魏良卿侯國興等六人俱立斬曰交接近侍劉志選梁夢環倪文煥許顯純等十九人俱斬秋後處决曰交接近侍次等魏廣微周應秋閻鳴泰楊維垣等十一人及孽魏志德等三十五人俱充軍曰諂附擁戴太監李實等十五人亦俱充軍曰交接近侍又次等顧秉謙馮銓王紹徽等一百二十八人俱坐徒三年贖為民曰交結近侍減等黄立極等四十四人俱革職閒住又于諸人姓名下各注所犯刋布中外知之方案初定張瑞圖來宗道及賈繼春皆不與帝召見問臣及允升于汴平臺詰之閣臣等以瑞圖宗道無實状對帝曰瑞圖工書為忠賢所愛宗道為崔呈秀父請恤典中有在天之靈語非實状邪又問繼春對曰繼春雖反覆然持論亦有可取帝曰惟反覆故為真小人三人遂俱論徒以楊鶴字修齡武陵人總督三邊軍務捕流賊鶴初官僉都御史忤魏忠賢罷去帝即位復官進左副都御史上言自大兵大疫加派頻仍小民之元氣傷遼左黔蜀喪師失律封疆之元氣傷縉紳搆黨彼此相傾逆黨乘之誅鋤善類士大夫之元氣傷譬如重病初起百脈未調風邪易入急當培養而陛下事事厲精臨軒面質或問之而未必盡知事下六曹或呼之而未必立應致千聖怒數取譴訶竊以為過矣今一切民生國計吏治邊防宜取祖宗成法委任責成嚴為之程寛為之地之以漸鎮之以靜何慮不臻太平哉報聞闗中冦熾總督缺人乃拜鶴兵部尚書總督軍務討賊先是王大梁由畧陽逼漢中餘賊犯洛川淳化等十餘州縣固原迯兵周大旺等掠涇陽富平及鶴至商洛道㕘政劉應遇已先擊斬王二于白水又追斬大梁于漢南餘衆逃入山中殱之㡬盡督糧道㕘議洪承疇泉州南安人亦擊破王左掛幾擒之㑹雷雨遁去副将賀虎臣保定人捕斬周大旺等賊渠多就誅滅鶴不能撫綏于是繼起者益衆延安榆林間隨處皆賊故事總督大臣率用邊撫知兵者鶴素不膺軍旅之任廟堂遽用之備禦防畧莫知為計後遂一意主撫致敗夏五月乙酉朔日食帝以日食失騐欲罪臺官時大統歴推食三分二十四秒囘囘歴推食五分五十二秒徐光啟依西法預推順天府食二分有竒應天食六分有竒瓊川食既大寜以北不食至期光啟法騐大統囘囘歴皆疏與囘囘厯出西域洪武中置科𨽻欽天監大統法叅用禮部尚書徐光啟言臺官測候本郭守敬法元時嘗當食不食無怪今日之失宜及時修治㕘用西法光啟以嵗差環轉歳實㕘差天有緯度地有經度列宿有本行月五星有本輪日月有真㑹視㑹皆古所未聞惟西法有之宜取其厯法㕘互考訂與大統法㑹同歸一從之詔西洋人龍華民推步光啟為監督華民卒更徵湯若望代之西法之行自此始西洋新法其初大約與囘囘厯相同周天三百六十度度六十分分六十秒一日十二時時八刻刻十五分有閏日無閏月迨入中國又通融中法始復置閏月之類窮推詳測益加精宻于是授時大統之説漸絀六月袁崇煥殺總兵官毛文龍于雙島在今奉天府寧海縣西南海中崇煥素不善文龍大學士錢龍錫以崇煥召對時有五年復遼語因造寓詢方畧崇煥曰恢復當自東江始文龍可用則用之不可用則處之易易耳比崇煥莅鎮文龍來謁接以賔禮文龍不譲崇煥益不悦遂决意誅之至是以閲兵為名泛海扺雙島文龍來㑹崇煥與相燕飲每至夜分文龍不覺也崇煥議更營制設監司文龍怫然崇煥以歸鄉動之文龍曰向有此意但惟我知東事東事畢朝鮮衰弱可襲而有也崇煥滋不懌遂以六月五日邀文龍觀将士射先設幄山上令𠫭將謝尚政等伏甲士幄外文龍至其部卒不得上崇煥曰予詰朝行公當海外重寄受予一拜拜畢登山因詰文龍違令數事文龍抗辨崇煥厲聲叱之命去冠帯縶縛文龍猶倔强崇煥數以十二罪當斬數畢文龍不能言但叩頭乞免崇煥召諭其從官曰文龍罪狀當斬否皆惶怖唯唯中有稱文龍數年勞苦者崇煥叱退之乃頓首請㫖出尚方劍斬文龍于帳前然後出諭其部卒曰誅止文龍餘無罪皆不敢動分其兵為四協以文龍子承祚及副将陳繼盛等領之遂還具状以上帝驟聞意殊駭既念文龍已死方任崇煥乃優旨褒答崇煥又上言東江不能更置師即以副将繼盛帥之于計便又慮部下為變請増餉銀至十八萬帝皆報可自文龍專閫海外前後章奏或多虚張失實部下健兒勁卒不下二萬餘崇煥恐其跋扈難制故必欲殺之然東江屹然巨鎮自文龍死勢日衰弱且島弁失主師心漸㩦益不可用其後致有叛去者明年㕘将劉興治殺陳繼盛等十一人以叛秋八月總督雲貴川湖廣西軍務朱燮元平水西蠻先是王三善遇害貴州官軍屢為安邦彦所敗廷議以川師不協助宜令一人統之蔡復一為貴州總督但轄雲貴湖廣而不及四川復一嘗遣總理魯欽搗織金賊巢鑿山開道攀藤穿竇而入斬首千餘級窮搜不得邦彦而還復一以鄰境不協討致賊未滅請敕四川出兵為犄角詔可之已而欽為賊所乗兵潰復一自劾遂罷去安蔡復一字敬夫同人魯欽長清人乃晉燮元兵部尚書總督五省軍駐遵義事在天啟五年明年燮元賂賊黨殺奢寅寅凶淫日甚有阿引者受燮元金乗寅醉殺之崇明年老無能為邦彦亦乞撫燮元聞于朝許之未㡬燮元以父喪去賊復熾帝元年起燮元故官兼撫貴州至是燮元徵雲南兵下烏撒四川兵永寧下畢節而自率大兵駐陸廣逼大方貴州總兵許成名由永寧復赤水明衞在大定府畢節縣西與四川叙永㕔接界以赤水河名今廢邦彦與崇明合衆十餘萬來攻燮元令成名佯退誘賊而遣兵三路搗其巢四川縂兵侯良柱字朝石永寧衛人副使劉可訓澧州人遇賊于永寧與成名合擊大破之斬崇明邦彦俘數十人積年巨冦始盡自崇明邦彦相繼作亂雲貴諸苗出殁為患副使朱家民與許成名等討平盤江以外諸蠻相度要害築城置戍廬井畢備道涂晏然又以盤江居雲貴交兩岸壁立水深無底廣三十餘丈乃仿瀾凔橋制置鐵索鐵柱横木為板橋建度樓築月城以䕶之遂為永利籠朱家民字同人曲靖人盤江注見前盤江橋在南府安南縣東亦曰鐵索橋冬十一月我大清兵下遵化我太宗文皇帝親督大軍入龍井闗以䝉古喀爾沁台吉布爾噶圖曽受賞入邊用為嚮導遂攻克洪山口在遵化州少北東有關城别將克大安口在遵化州西北亦有關城㑹于遵化山海闗總兵官趙率教入援戰死全軍覆没率教馳抵三屯營總兵朱國彦不令入遂戰死已城將破國彦冠帶西向稽首與妻張氏並投繯死三屯營在遵化州東今設副將駐守巡撫王元雅太原人及保定推官李獻明時獻明以察核官庫在城或曰此邑非君所轄去無罪獻明正色曰莫非王土安敢見危避難獻明字思皇夀光人永平推官何天球廣東人理遵化軍餉遵化知縣徐澤字兑若㐮陽人前任知縣武起潛字用潛進賢人等憑城拒守城破皆死之教諭曲毓齡中軍彭文炳守備徐聨芳並死焉太宗文皇帝嘉元雅忠命賜棺殮閲日燕京始得報帝召見廷臣于平臺諮方畧侍郎周延儒言本兵備禦疎忽調度乖張檢討項煜秀水人繼之且曰世宗斬一丁汝䕫將士震悚彊敵宵遁帝頷之遂下尚書王洽臨池人于獄洽雅負時望而應變非所長帝方惡廷臣玩愒故于洽不少貸未幾竟瘐死以成基命為禮部尚書兼東閣大學士預機務召孫承宗復為兵部尚書兼中極殿大學士視師通州基命請速召還故輔承宗任以兵事帝然之乃即命基命入閣而立召承宗至入對具陳方畧帝稱善曰卿且為朕保䕶京師承宗出漏下二十刻矣即周閲都城五鼓而畢復出閲重城明日夜半忽傳㫖守通州時烽火徧郊承宗從二十七騎疾馳抵通州門者幾不納既入城與保定巡撫解經傳韓城人御史方大人桐城人總兵官楊國棟登陴固守而以間復馬蘭在遵化州西北有闗城今為馬家鎮設總兵官三屯二城總兵官滿桂督師袁崇煥先後入援時大清兵越薊州而西徇三河擊走宣大援兵遂下順義我太宗文皇帝命傳諭各城諭曰爾國庇葉赫而戕害我大恨有七我知終不相容告天興師國賜我河東地我天直我太祖皇帝猶願和好爾國不從和而爾主頻加欺陵故今日天又賜我河西地我復累次願興師而來順者撫逆者誅天運循環得天者興人豈能為非我恃强逞兵也因進軍薄京城營于城北土城闗之東總兵官滿柱入援以五十騎先至屯徳勝門外大兵至桂進戰城上發大礟佐之誤傷桂軍桂亦負傷帝遣中官勞以羊酒令入休甕城崇煥聞警即帥祖大夀何可綱等入衛所過諸城皆留兵以守既至京師帝甚喜命盡統諸道援軍與桂大夀俱召見平臺慰勞備至崇煥請入城休兵不許請屯兵外城如滿桂例亦不許詔天下鎮巡官勤王于是宣大總督及宣府保定河南山東山西各巡撫皆奏帥師入衛詔應天陜西鳯陽鄖陽浙江巡撫俱勤王已而山西援兵潰于良鄉逮巡撫耿如把縂兵官張鴻功下獄十二月下督師袁崇煥于獄總兵官祖大夀擁衆奔出外闗初崇煥嘗建議請和欲藉此援師以修理故疆我大清方有事朝鮮亦欲假是以阻其兵因得一意東討乃遣使以書相往来已而崇煥奉㫖戒諭言路亦以為非計事尋止後崇煥復以書詢錢龍錫龍錫亦沮之及大清兵深入所破隘口皆薊遼總督劉策字范董武定人所轄崇煥千里赴援自謂有功無罪然都人驟遭兵怨謗紛起謂崇煥擁兵坐視朝士因前通和議誣其召兵脅和將為城下之盟帝頗聞之不能無惑㑹崇煥營沙窩門外伏兵隘口我大軍分道夾擊盡殱之崇煥復移營城東南隅豎立柵木大軍列陣逼營不戰而還㑹我大清設間令所獲宦官知之時令大軍先獲明宦官二人副將髙鴻中等守之太宗文及是鴻中等承宦官前作耳語于今日撤兵乃皇帝密計于二上計也頃見敵有二人來見語良久乃去意袁巡撫有宻約上單騎向敵事可立就矣時楊太監者佯卧竊聴悉志其言遂隂縱使去其人奔告于帝帝遂信之不疑召見崇煥及大夀于平臺詰崇煥以殺毛文龍故且責其援兵逗遛縳付詔獄成基命叩頭請慎重者再帝曰慎重即因循何益基命復叩頭曰兵臨城下非他時比帝不省大夀在旁股慄懼并誅出即與何可綱擁衆東走毁山海闗去逺近大震大夀先嘗坐事當死賴崇煥救免基命言于帝就獄中取崇煥手書招之督師孫承宗亦遣馬世龍追撫世龍先以罪繫獄時已釋出立功自劾密令上章自列且立功贖督師罪大夀如其言帝優㫖答之命承宗移鎮闗門大夀斂兵待命可綱亦歸我大清兵薄永定門武經畧滿桂及總兵官孫祖夀字必之昌平人俱戰殁我大清兵既薄京城諸貝勒大臣等咸請進攻太宗文皇帝不許兩遣使齎書議和遂自徳勝門移營南苑已而分兵下固安克良鄉知縣党還醇字于貞三原人死之諭安上達訓導李廷表典史史之棟驛丞揚其禮皆死焉囘軍至盧溝橋副總兵申甫結車營以拒大清兵繞出其後盡殱之申甫者僧也好談兵私製戰車火器庶吉士金聲薦之帝立召見取其車入覽即擢副總兵令募新軍改聲御史監之甫倉卒召募皆市井㳺手軍裝戎器又不時給及戰御車者皆惶懼不能轉殱戮殆盡甫亦陣亡金聲字正希休寜人遂南薄永定門時以袁崇煥下獄特設文武兩經畧以尚書梁廷棟鄢陵人及滿桂為之屯西直安定二門帝趣桂出師桂言衆寡勢殊未可輕戰中使趣之急不得已乃督孫祖夀等移營南城外二里許立柵以待明日昧爽大清以精騎四面蹙之桂及祖夀等戰不支遂俱殁京師大震時帝不視朝傳㫖辦布囊八百中官競獻馬騾又令百官進馬順天府尹劉宗周曰是必有以遷幸動上者乃疏言國勢强弱視人心安危乞延見百僚諭以固守外無待計俯伏待報自晨迄暮中宫傳㫖乃退隂劉宗周字起東山人錢龍錫罷御史髙㨗寧晉人史􅒇清苑人本閹黨王永光引用之頗為龍錫所扼兩人因是大恨方袁崇煥之殺毛文龍也報疏有輔臣龍錫為此一事低徊過臣寓語而崇煥欲成和議又嘗以書商于龍錫及是崇煥已下獄㨗􅒇遂上言以通欵殺將皆龍錫發蹤指示宜與崇煥並罪帝以龍錫忠慎戒無過求龍錫抗章申辨捷􅒇再疏力攻詞益危切帝意頗動龍錫再辨引疾乃即放歸時兵事方棘未暇竟也以周延儒何如寵錢象坤字宏載㑹稽人並為禮部尚書兼東閣大學士預機務延儒性機警並伺意指以㑹推不預與温體仁比數為言者所劾帝不聴特命入閣時都人桀黠者請以私財聚衆助官軍如寵力言其叵測㑹帝得偵事者報與如寵言合由是受知象坤奉命守城祁寒不懈帝覘知之遂並命入閣庚午三年春正月韓爌罷中書舍人加尚寳卿原抱竒故由輸貲進以爌為袁崇煥座主遂合廣主和誤國宜與錢龍錫並罷帝重去爌貶抱竒秩無何庶子丁進上虞人以遷擢愆期怨爌亦劾之而工部主事李逢申上海人劾疏復繼上爌三疏引疾歸爌先後作相老成慎重引正人抑邪黨天下稱其賢初熊廷弼既死傳首九邊屍不得歸塟後其子詣闕疏詣爌言于帝曰廷弼之死由逆閹欲殺楊漣左光斗誣以行賄因盡殺漣等復懸坐廷弼銀刑及妻拏此寃之甚者帝乃許収塟兵部侍郎劉之綸字元誠宜賔人引兵至遵化敗歿之綸以庶吉士上書陳方畧帝壯之㑹金聲薦其才帝即召見奏對稱㫖超擢兵部侍郎協理京營戎政之綸未受任時已貸數百金製木為西洋大小礟又製獨輪火車偏廂車獸車皆輕捷利用而所請弓矢器甲主者不以時應所招死士又不得衣装賞犒費之綸以為言且請精兵一萬為進取計帝亦不能盡從時滿桂方戰殁朝廷大震之綸冒風雪誓師前進越通州而東大清兵亦已由通州東渡克香河進拔永平副使鄭國昌自縊死知府張鳳竒推官盧成功諭趙允殖副總兵焦延慶指揮張國翰守備程應𤦺皆死而鄉官廖汝欽及武舉唐之俊等死者復數十人鄭國昌邠州人張鳯竒曲陽人援兵皆觀望獨之綸奮前約總兵官馬世龍吳自勉趨永平牽制而親率所部直扺遵化距城八里屯娘娘廟山世龍等違約大清以三萬騎迎戰兵交之綸發火礟頗有所擊傷再發則礟炸軍亂左右請結陣徐退之綸慨然曰吾受天子厚恩誓捐軀以報戰不捷死耳敢言退者斬乃再戰自辰至酉士殊死力鬭矢盡短兵接之綸知不可為大呼曰死死負天子恩解佩印付家人曰持此歸報朝廷俄身被兩矢遂死全軍盡殁世龍等在薊州竟擁兵不救二月立子慈烺為皇太子三月李標罷標在閣稍久頗能隨事匡益然時方爭門户帝亦深疑朝臣有黨遂連疏乞休去家居五年卒贈少傳諡文節夏五月我大清兵東歸先是我大清兵既取遵化永平復拔遷安灤州知州楊爌死之皆留兵守之遂分兵向山海闗守將官惟賢力戰乃還攻撫寧昌黎皆不下當是時京師道梗孫承宗祖大夀在東馬世龍及四方援軍在西承宗募死士沿海達京師始知闗城尚無恙承宗遣将戌開平營名在灤州西南與豐潤縣接界明永樂初移關平衛于此復建昌營名今改路在遷安縣東北有城聲援方接我大清復遺書議和遂旋師取道冷口闗名在遷安縣東北而歸承宗始復四城先取灤州尋復遷安遂入永平復遵化六月流賊䧟府谷先是陜西五鎮兵入援延綏兵中道逃歸甘肅兵譁而懼誅皆合于賊巡撫張夢鯨憂憤死詔以洪承疇代之起前總兵官杜文煥督延綏固原兵便宜討賊時王左掛等方攻宜川為官軍所蹙文煥檄諭之左掛及其黨王子順苗美等皆請降獨王嘉允不受撫其别賊從神木渡河入山西䧟蒲縣以下注俱見前分道東犯趙城洞洪汾西及霍西掠石樓永和吉隰及是嘉允襲破黄甫川清水木瓜三堡遂䧟府谷據其城總督楊鶴方主撫匿不奏遣官四出招賊于是賊黨王虎小紅狼一丈青掠地虎混江龍等並就撫給免死牌安置延綏河曲間雖不焚殺而淫掠如故又有神一元不沾泥可天飛郝臨菴紅軍友㸃燈子李老柴混天猴本名張應金獨行狼諸賊所在蠭起官軍東西奔擊旋撲旋熾終莫能盡而延安賊張獻忠膚施縣栁樹澗人嘗從軍𨽻延綏總兵王威麾下犯法當斬他將陳洪範竒其狀貎請釋之已乃逃去亦聚衆據十八寨稱八大王已而降賊王左掛謀以綏徳叛承疇誅之尋又與文煥等破獻忠于清澗獻忠遁去以禮部尚書温體仁吳宗達武進人中行從子並兼東閣大學士預機務體仁以訐錢謙益為時論所惡多發其隂事或言體仁嘗通賂崔呈秀杭州建逆祠體仁作詩贈魏忠賢又或言體仁娶娼受金奪人産帝愈信體仁無黨周延儒復援之遂與宗達並入閣秋八月磔前督師尚書袁崇煥逮前文淵閣大學士錢龍錫下獄尋遣戍史􅒇疏言龍錫主張崇煥賣國欺君秦檜莫過其出都時以崇煥所畀重賄轉寄姻家巧為營脱帝怒勅刑官五日内具獄讞上以斬帥為崇煥擅殺議和則龍錫未許帝召諭廷臣于平臺置崇煥極刑籍其家無餘貲天下寃之逮龍錫下獄令廷臣議罪時羣小麗名逆案者方日為翻案計􅒇等以龍錫故附東林欲借崇煥以及龍錫因龍錫以及諸異己者指崇煥為逆首龍錫等為逆黨更立一逆案與前案偶謀既定温體仁王永光主之欲發自兵部尚書梁廷棟憚帝英明不敢任而止乃議龍錫大辟决不待時且用夏言故事設厰西以待帝以龍錫無逆謀令長繫中允黄道周字幼平漳浦人復上疏申救道周忤㫖貶秩調外而帝頤感動久之帝意亦寖解乃減死戍定海衛冬十二月増田賦兵部尚書梁廷棟以兵食不足疏言民窮之故惟在官貪使貪風一息即再加𣲖民亦懽然帝命户部協議尚書畢自嚴請畝加三釐于是増百六十五萬有竒合舊所増凡六百八十餘萬海内愁怨明年給事中魏呈潤字中嚴龍溪人疏言驛站所裁未足充餉十一而郵傳益困勢必再編之于民山海闗中外兵舊額十八萬今只十萬八千合薊門援兵非溢原額而餉乃日増不可不稽撫按諸臣捐貲助餉大率索之于民不可不禁帝不能用辛未四年春正月延綏兵遣御史吳甡字鹿友興化人賑之秦洊饑至是大祲山西以防河閉糶斗米值銀六錢米清澗延長綏徳之民流亡從賊者十之七邑㡬空帝特發帑金十萬命甡徃賑且撫因荒從賊者甡用西安推官史可法字憲之大興人如詔書從事人便之三月賊神一魁等請降楊鶴受之一魁尋叛先是神一元䧟保安副總兵張應昌等敗之一元死弟一魁領其衆圍慶陽䧟合水唐縣今屬慶陽府鶴聞移駐寧州一魁求撫别賊金翅鵬過天星獨頭虎上天龍等亦先後降鶴設御座于城樓賊跪拜呼萬歳因宣聖諭令設誓或歸伍或歸農賊佯許之立赦其罪鶴以一魁最强致其壻帳中與同卧起一魁果至數以十罪一魁伏謝即宣詔赦之處其衆于寧塞鶴以賊黨茹成名桀驁令一魁所善劉金誘誅之其黨懼復挾一魁以叛而别賊李老柴田近菴等攻䧟中部上天龍獨行狼等復掠鄜州勢大熾一魁後為張應昌部将所𫉬誅死夏四月旱敕羣臣修省六月副總兵曹文詔大同人敗賊于河曲自秦冦初起延綏以北為逃軍為邊盜延綏以南為土冦為饑民邊盜則王嘉允土冦則王左掛為羣賊魁已而左掛伏誅嘉允復敗嘉允自黄甫川勾西人入犯洪承疇杜文煥擊破之竄而入晉山西自河曲至蒲津千五百里與中接壤河身最賊渡河徃來倐忽無定久據河曲文詔絶其餉道困之嘉允遁去已復自岳陽突犯澤潞為左右所殺其黨共推王自用號紫金梁者為首自用結羣賊老􅉰􅉰曹操八金剛埽地王射塌天閻正虎滿天星破甲錐邢紅狼蝎子塊混世王等及高迎祥張獻忠皆聚山西而上天龍過天星亦來㑹共三十六營衆二十餘萬米脂人李自成世居李繼遷寨幼牧羊長充驛夫善騎射鬬狠無賴數犯法知縣晏子賔将置諸死為屠迎祥甥也偕兄子過徃依之號闖将與獻忠等合錢象坤罷象坤温體仁門生也體仁入遂譲而處其下然無所附和及是御史水佳允鄞縣人劾兵部尚書梁廷棟廷棟不待旨即奏辨廷棟故出象坤門佳允疑象坤洩之語侵象坤周延儒惡廷棟並惡象坤象坤遂引疾歸廷棟落職秋八月我大清兵圍大淩城遼東巡撫邱禾嘉貴州新添衛人議築廣寜義州右屯三城孫承宗謂廣寧道逺當先據右屯築城大淩河以漸而退遂以七月興工築甫竣我大清兵已抵城下掘濠樹柵四面合衛别遣一軍截錦州大道城外堠臺皆下城中兵出悉敗還禾嘉聞之與總兵官呉㐮遼東中後所人宋偉合軍赴援敗還復夜渡小淩河次長山在錦州府錦縣東南峯巒綿亘四山錯列因名連戰大潰監軍道張春字泰字同州人及副将祖大樂等被執諸将張吉甫等戰殁總兵官祖大夀堅守不敢出城援自此絶至冬大淩糧盡食人馬大清屢移書招之大夀許諾副将何可綱不從大夀遂殺可綱與副将張存仁等降于我大清大夀言妻子在錦州請歸設計誘降守者遂衆歸大夀入錦州未得間而禾嘉知其納欵状具奏聞于朝帝于大壽欲羈縻之弗究也張春見執諭降不屈久之乃死何如寵罷如寵官禮部時貧宗婚嫁格于有司者千餘人用如寵言獲婚姻者過千帝欲族袁崇焕以如寵言得免及入閣為周延儒温體仁所扼連疏乞罷歸久之卒九月復遣中官王應朝等監視諸邊軍餉張彛憲總理户工二部帝初盡撤鎮守中官委任大臣既見廷臣競門户不足倚乃復遣王應朝鄧希詔等監視闗寧宣大山西軍馬以彛憲有心計令鈎校户工二部如涂文輔故事文輔魏忠賢黨天啟中總督太倉節慎二庫名其署曰户工總部吏部尚書閔洪學烏程人珪曽孫率延臣力爭帝曰諸臣若殫心為國朕亦何藉内臣衆不能對然諸監率多侵尅軍貲臨陣先走戎務益壞下楊鶴獄遣戌以洪承疇總督三邊軍務御史謝三賔鄞縣人及巡按御史吳甡劾鶴主撫誤國逮下獄戌袁州以承疇代冬十月辛丑朔日食十二月孫承宗罷長山之敗言者論禾嘉及承宗築城起釁承宗遂引疾歸禾嘉先已調南京太僕卿遂還京引疾歸閏月登州遊擊孔有徳等反有徳與耿仲明李九成皆毛文龍部曲文龍死走入登州登萊巡撫孫元化字初陽嘉定縣人官遼久孫承宗袁崇煥俱辟為贊畫以前兵備推巡撫素言遼人可用乃以有徳仲明為逰擊九成亦為偏裨大凌圍急元化遣有徳等赴援抵吳橋天大雨雪衆無所得食一卒與諸生角有徳笞之衆大譁九成先賫銀市馬塞上用盡無以還適至聞衆怨遂與其子應元帥部卒刦有徳有徳從之還兵大掠䧟陵縣臨邑商河殘齊東圍徳平既而舎去䧟青城元縣今属武定府新城亦元縣今屬濟南府而新城受禍尤酷知縣秦三甫訓導王協中禦之並死初新城邑紳王象春冇莊在吳橋有徳屯兵其地卒或攫雞犬以食王氏子怒訴之有徳笞卒以徇遂以激變及賊至人新城以釁由王氏焚殺甚慘秦三輔三原山東巡撫余大成江寜人聞變遣兵往禦連敗乃移兵追賊而元化軍亦至與大成皆力主撫檄賊所過郡縣無邀擊于是賊佯許元化降遂抵登州元化遣將張燾率遼兵駐城外總兵官張可大字觀甫世襲南京羽林衛指揮發南兵拒賊戰方勝燾遽退可大兵遂敗燾兵半降賊遣歸為内應士民争請弗容入元化不從中軍耿仲明都司陳光福等夕舉火導賦自東門入城遂䧟事在明年正月元化自刎不殊與同城各官俱執惟可大死之殺其妾陳氏自縊于署有徳乃推九成為主已次之仲明又次之用巡撫闗防􅊾州縣兵餉而令元化移書大成求撫大成聞于朝為言官所劾帝革大成元化職候勘元化尋為賊縱航海歸與大成俱下獄大成論戍元化棄市元化故與徐光啟善光啟與周延儒圖執之卒不得壬申五年春正月延綏賊䧟宜君鄜州先是降賊夜襲甘泉河西道張允登漢川人遇害允登與知縣郭永固嬰城拒守城䧟俱死之及是混天猴偽為米商至宜君知縣不知聴之入城遂䧟尋復䧟鄜州兵備僉事郭應饗死之時曹文詔方于稷山擊斬㸃燈子即趙四兒名勝往来秦晉沿河州縣進犯沁水之竇莊莊有城故殉難副使張銓里居也時銓于道濬道澤皆官京師衆將棄去銓妻霍氏曰避賊而出家不保出而遇賊身不保等死死于家不愈死于野乎躬率僮僕共守殺賊甚衆賊不能克而退冀北道王肇生表曰夫人城㸃燈子尋為文詔所敗遁去被獲伏誅師還擢臨洮總兵官乃與巡撫練國事字君豫永城人總兵官楊嘉謨等分道擊賊混天猴尋為守備馬科部卒所斬夏五月以禮部尚書鄭以偉徐光啟並兼東閣大學士預機務以偉讀書過目不忘而不能票擬章疏中有何況二字誤以為人名也擬㫖提問帝駁改始悟自是詞臣為帝所輕遂諭館員須厯外僚而閣臣自是不専用翰林光啟雅負經濟才有志用世及入閣年已老周延儒温體仁專政不能有所建白明年以偉光啟相繼卒御史以二人葢棺之日家無銓貲請優䘏以愧貪墨以偉得謚文格光啟得謚文定六月京師大雨水秋七月以太監曹化淳提督京營戎政八月總兵官曹文詔等連敗賊于平凉慶陽先是文詔與逰擊左光先等分勦綏徳宜君清澗米脂諸賊皆大捷掃地王授首神一魁餘黨紅軍友等都司杜三楊老柴等屯鎮原将犯平凉巡撫練國事檄甘肅兵楊嘉謨副将王性善扼之賊走慶陽文詔從鄜州間道至與嘉謨性善合大戰西濠砦名在平涼府鎮原縣北斬千級生擒杜三楊老柴餘黨糾他賊破華亭隋縣今屬平凉府攻荘浪注見前文詔嘉謨掩擊縱反間紿其黨殺紅軍友蹙敗之水落城在平凉府荘浪縣東南金置縣于此原省追至靜寧州注見前賊奔據唐毛山在延安府保安縣西北與慶陽府安化縣接界遊擊曹變蛟文詔從子先登殄其衆至是可天飛郝臨菴劉道江獨行狼李都司等連兵圍合水注見前文詔往救賊匿精鋭以千騎逆戰誘抵南原伏大起城上人驚疑相告曰将軍殁矣而文詔馳矛左右突匹馬縈萬衆中諸軍望見夾擊賊大敗僵屍蔽野餘衆走銅川橋在安化縣西大敗之越日文詔復與寧夏總兵賀虎臣固原總兵楊騏破賊于甘泉之虎兕凹㑹總督洪承疇師次平凉擊斬可天飛李都司降白廣恩餘賊分竄者文詔追蹙之耀州錐子山其黨殺獨行狼郝臨菴以降承疇戮四百人餘皆散遣闗中巨冦畧盡文詔在陜大小數十戰巡撫范復粹諭奏首功第一而洪承疇抑不敘巡按御史吴甡推奨甚至復粹復為上疏兵部抑其功卒不敘復粹登州府黄縣人以朱大典字延之金華人督軍討登萊賊初余大成孫元化既論罪朝廷以余從治為山東巡撫謝璉字君實監利人為登萊巡撫並駐萊州詔先命璉駐萊州從治駐青州調兵食從治以駐青不足鎮萊人心駐萊足係全齊命乃與璉並受事于萊時賊先已破黄縣知縣吳世揚被執罵賊死世揚洛陽人䧟平渡知州陳所聞拒守城破不屈死所聞文安人還益兵攻萊從治璉與總兵楊御蕃肇基子分陴固守久之外圍日急諸援兵俱屯昌邑不敢進從治時以間出兵掩擊頗有斬獲而兵部尚書熊明遇惑撫議以主事張國臣為贊畫往撫諭從治毋遽出兵壞撫局從治力言不可三上疏于朝語極切至朝議以兩撫臣並困圍中乃議設總督以侍郎劉宇烈綿竹人任之統馬步軍二萬五千勢甚盛而宇烈素無籌畧日遣使講撫賊亦以撫愚之已而賊用元化所製西洋大礟攻城從治中礟死萊城益圍越兩月璉復為賊所誘出城被執時萊城已圍六月賊偽約降期請文武出城開讀即解圍去璉不得已與知府朱萬年同出獨御蕃不往賊見璉佯叩頭涕泣據擁以去即攻城令萬年呼降萬年厲聲曰吾死矣汝等宜固守且呼御蕃急以大礟擊賊萬年遂遇害御蕃連發礟傷賊頗多賊稍退朱萬年黎平人于是舉朝痛憤詔逮宇烈下獄罷尚書明遇遂絶撫議罷總督及登萊巡撫不設專任大典督主客兵數萬及闗外勁旅四千八百餘人合勦之總兵金國竒副将靳國臣叅将祖寛及前總兵吴襄子三桂皆屬焉以中官高起潛監䕶軍餉抵徳州副将牟文綬馳救平度殺賊魁陳有時至昌邑靳國臣祖寛為前鋒有徳逆戰于沙河有二一在黄縣一在即墨下流俱入海寛殊死鬬國臣繼之賊大敗諸軍乘勝追至城下賊夜半東遁萊州圍解守者疑賊誘以礟拒起潛遣中使入諭闔城相慶越日國竒等進兵黄縣斬賊首萬三千俘八百有竒逃散及墜海死者無筭賊竄歸登州官軍築長圍守之九月流賊連䧟山西州縣先是賊将高迎祥羅汝才即曹操張獻忠等分道四出連䧟大寧隰州澤州夀陽諸州縣與下注並見前全晉震動部議令宜大總督張宗衡臨清人駐平陽巡撫許鼎臣武進人駐汾州分地守禦已而李卑字侍平榆林人賀人龍米脂人艾萬年米脂人将闗中兵至鼎臣檄以自從宗衡怒其不從已􅊾之還三將莫之適從賊乘間入據磨盤山一名連枝山在汾州府臨縣東分其衆為三閻正虎據交城窺太原邢紅狼上天龍據吳城在汾州府孝義縣西南戰國時魏吳起為西河守築此以拒秦因名窺汾州紫金梁張獻忠突沁州武鄉䧟遼州癸酉六年春正月命曹文詔節制山陜諸将討賊闗中賊稍盡悉走入山西御史張震極言文詔威名夙著今秦賊滅且盡宜勅令入晉協勦帝從之遂有是命文詔東渡河抵霍州敗賊汾河盂縣追及于夀陽巡撫許鼎臣遣謀士張宰先大軍嘗賊賊驚潰文詔追擊之斬混世王餘黨為遊擊猛如虎本塞外降人家榆林遂走遇文詔兵于方山在夀陽縣東北壁立千仞頂方一里有池周百步復敗五臺盂定㐮夀陽賊盡平鼎臣令文詔軍平定備太原東張應昌軍汾州備太原西文詔連敗賊太谷范村榆社太原賊幾盡已而文詔復破賊澤州又襲潤城斬賊千五百有竒紫金梁老􅉰􅉰自榆社走武鄉過天星走髙澤山文詔皆擊敗之賊避其鋒多流入河北二月流賊犯畿南河北賊自山西分道踰太行掠濟源清化鎮名在懷慶府河内縣東北為豫晉襟要地修武為懷慶官軍擊之遁走别賊復闌入西山大掠順徳真定間大名兵備副使盧象昇字建斗宜興人力戰却之賊遂自邢臺摩天嶺在彰徳府武安縣西北與山西遼州接界西下抵武安先是副将左良玉字昆山臨清人敗賊于涉縣之西陂及是與賊戰武安良玉大敗河北三府所屬縣焚劫殆遍潞王名常汝間王鏐子上疏告急詔遣總兵倪寵王樸率京營兵六千赴河南而以中官楊進朝盧九徳等監諸将軍命曹文詔自山西移師㑹討文詔敗賊懷慶馘其魁滚地龍又追破老􅉰􅉰于濟源而諸将李卑艾萬年湯九州石埭人鄧玘四川人及良玉等㑹文詔兵先後與賊戰皆勝之未㡬帝勅諸将速平賊限以三月而文詔為巡撫御史劉令譽所劾調大同總兵初文詔在洪洞與里居御史劉令譽忤及是令譽按河南文詔與見語復相失令譽遂摭他事劾之部議文詔怙勢而驕調之大同賊所憚惟文詔既去益無忌矣官軍復登州山東平登州城三面拒山一面拒海其北有水城與大城相接開水門以通海舶賊恃此可走故不下及被圍久李九成出城摶戰官軍馘之于陣賊渠五以殱其二五人者李九成孔有徳耿仲明毛永禄陳有時也有時先已耗戮及是九成亦死氣大沮至是祖寛等奪其水門外䕶墻益大懼有徳載子女財帛先出海仲明以單舸繼之皆遁官軍遂入大城攻水城不下遊擊劉良左獻轟城䇿匿人永福寺中穴城置火藥發之城崩官軍遂入賊退保蓬萊閣在府城北牙犀山下臨海岸宋治平中建朱大典招之始釋甲俘千餘人自縊及投海死甚衆有徳等走旅順島帥黄龍遼東人邀擊擒毛承禄陳光福等斬九成子應元惟有徳仲明逸去乃獻承禄于朝磔之有徳仲明俱降于我大清夏六月周延儒罷延儒為首輔温體仁欲奪其位務為柔佞取悦于帝帝漸向之復曲謹以媚延儒而陰伺其隙延儒不知也體仁與王永光欲起逆案王之臣吕純如帝以之臣問延儒對曰用之臣亦可雪崔呈秀矣帝悟而止體仁益大恨㑹延儒子弟家人暴邑中邑中民爇其廬所用巡撫孫元化復䧟登州于是言路交章劾延儒並謂其受巨盜神一魁賄帝意頗動體仁復嗾給事中陳贊化劾延儒昵武弁李元功招揺㒺利且謂延儒至謂陛下為羲皇上人語悖逆帝大怒下元功詔獄窮治延儒覬體仁為援體仁不應延儒大窘引疾歸體仁遂為首輔延儒既罷廷臣惡體仁當國勸帝復召何如寵如寵固辭給事中王紹桀言君子小人不並立如寵瞻顧不前體仁宜思自處帝為謫紹桀于外如寵卒辭不入如寵操行恬雅與物無兢後卒福王時追諡文端秋七月我大清兵取旅順總兵官黄龍死之孔有徳耿仲明怒龍邀擊必欲報之㑹鴨緑江有警龍遣水師往援旅順空虚有徳等遂導大清兵襲其城龍數戰皆敗火藥矢石俱盡自刎死部将李惟鸞項祚臨樊化龍張大祿尚可義俱死焉廣鄜島在奉天府寧海縣西北海中副将尚可喜故與龍相掎角龍既死亦降于大清自是島上勢益孤久之將士多敗殁諸島雖有殘卒不能成軍朝延亦不更置帥以登萊總兵遥領之而已九月以錢士升字抑之嘉善人為禮部尚書兼東閣大學士預機務士升故出錢龍錫門下龍錫出獄周延儒詣之極言上怒甚挽救殊艱龍錫深徳延儒未㡬温體仁至龍錫述延儒語且謝曰非公等安得生體仁佯曰上故不甚怒也聞者直體仁而惡延儒士升以座主故因歸心體仁體仁亦以士升鄉人遂引與共政冬十一月以王應熊字非能巴縣人何吾騶廣州香山人並為禮部尚書兼東閣大學士預機務應熊熟諳典故而性剛狠温體仁力援之遂與吾騶同入閣賊渡河䧟澠池諸縣分掠南陽汝寧遂犯湖廣賊盡集河北高迎祥李自成張獻忠羅汝才等俱至左良玉湯九州扼其前京營兵蹙其後賊連戰皆敗欲逸沮于河大困乃詭辭乞降監軍内臣楊進朝信之為入奏㑹天寒氷合賊從毛家寨徑渡河南軍無扼之者遂䧟渑池伊陽盧氏巡撫元黙靜海人督軍禦之賊竄盧氏山中由間道入内鄉大掠南陽汝寧直走湖廣所在告急賊始起陜西高迎祥最强李自成屬焉及渡河自成始别為一軍甲戌七年春正月以陳竒瑜字玉鉉保徳州人總督河南山陜川湖軍務討流賊初竒瑜巡撫延綏分遣諸将擒斬諸賊渠金翅鵬一條龍等諸頭目凡一百七十餘人最後又克延水闗一名永寧闗在延安府延州縣東南賊鑚天哨開山斧闗負絶險下臨黄河賊恃其扼塞屢攻不下竒瑜潛師出賊不意焚其巢二賊俱馘境内劇盜盡平竒瑜威名大著至是賊躪豫楚廷議以諸撫鎮事不一請設大臣統之乃進竒瑜兵部侍即總督五省軍務専辦流賊時又以大名道盧象昇知兵命撫鎮鄖陽賊自鄖渡漢遂入四川䧟䕫州賊渡漢薄榖城集六路諸賊老􅉰􅉰過天星等犯㐮陽分䧟紫陽明縣正徳中治平利唐縣今與紫陽俱屬興安州南入四川掠歸巴彛陵等六州縣遂䧟䕫州署府事同知何承光貴州鎮逺人死之時副使以下皆逃承光督吏民城守力竭無援城遂䧟承光整冠帶危坐賊入殺之自賊起陜西轉冦山西河南湖廣四川摧䧟州縣數十未有破大郡者䕫州地稱天險及是失守逺近震動賊既䧟夔州又犯大寧知縣髙日臨被執罵賊不屈賊碎其體而焚之訓導髙錫及妻女巡檢陳國俊及妻皆遇害又䧟巫山通江巡檢郭贊化陣殁指揮王永年田實守備郭震辰皆力戰死惟梁山以里居中書涂原集鄉勇伏宻箐間用竹畚囊石乘髙擊之傅毒弩矢血濡縷輒斃賊多死傷遂退去髙日臨字儼若鄱陽人三月丁亥朔日食夏四月山西陜西饑山西自去年八月不雨至于是月大饑人相食陜西亦大旱詔發帑賑之六月陳竒瑜圍賊于車相峽峽在興安州界非華陰縣南之車箱谷也賊偽降竒瑜縱遣之賊復叛䧟所過州縣先是張獻忠等十三營流突漢南而别賊之入四川者亦以阻險復還鄖陽分其軍為三一往河南一趨浙川一向商南竒瑜乃馳至均州檄陜西練國事鄖陽盧象昇河南几黙湖廣唐暉歛人四巡撫以兵遏其四面而竒瑜偕象昇督将士由竹谿至平利之烏林闗十餘戰大破之斬三千餘級别将鄧玘等分道擊賊復連勝擒其魁十餘人又令㕘将賀人龍等追至紫陽凡八晝夜賊死者萬餘賊見官軍盛大懼獻忠奔商雒高迎祥李自成等悉遁入興安州之車箱峽峽四山巉立中亘四十里易入難出賊誤入其中山上居民下石擊或投以炬火且用石塞其口路絶無所得食困甚又大雨二旬弓矢盡脱馬乏芻死者過半自成急用其黨顧君恩以重寳賂竒瑜左右及諸将帥偽請降竒瑜意輕賊有驕色遂遽許之先後籍三萬餘人悉遣歸農每百人以一安撫官䕶之􅊾所過州縣具糗糧傳送賊甫出峽即大譟盡殺安撫五十餘人屠所過七州縣略陽賊數萬亦來㑹闗中大震秋七月我大清兵入上方堡至宣府京師戒嚴我太宗文皇帝親征察哈爾其宰桑巴圖魯噶爾瑪濟農等率衆降因旋師入邊四路並進自宣府趨應州進略大同克靈邱保安攻下城堡無數總督張宗衡總兵曹文詔張全昌等不敢戰我大清兵下萬全左衛始班師宗衡及全昌文詔皆坐遣戍以巡撫吳甡言留全昌文詔為援勦總兵討流賊冬十一月逮陳竒瑜下獄以洪承疇代之給事中顧國寳御史傅永淳交章劾竒瑜受賄縱賊詔錦衣官逮訊而以洪承疇代時賊以蔓延不可樸滅大學士温體仁謂山西巡撫吳甡曰流賊癬疥疾足憂也竒瑜罪當死有庇之者未㡬謫戍邊賊自陜西出犯河南賊聚陜西至二十餘萬高迎祥李自成蹂鞏昌平涼臨洮鳯翔諸府數十州縣敗賀人龍張天禮軍殺固原道陸夢龍䧟隆徳夢龍率遊擊賀其勲都司石崇徳禦之所将止三百餘人被圍數重賊矢石如雨突圍不得出夢龍大呼奮擊手馘數人與二将俱戰死時隆徳令費彦方以城䧟被執不屈死浙費彦方字爾英江崇徳人圍隴州四十餘日洪承疇􅊾總兵左光先與人龍合擊大破之㑹朝廷命豫楚晉蜀之兵四道入陜迎祥自成遂竄入終南山已而東出䧟靈寳汜水滎陽時左良玉扼新安澠池坐甲自保而賊傳其且至乃移畢梅山在開封府新鄭縣西北溱水注見前間良玉實不至也賊每營數萬因糧宿飽馬一日夜馳數百里官軍饋餉不繼且馬少故多畏賊良玉前在懷慶與督撫議不協因是生心緩追養冦督撫􅊾調亦不時而應乙亥八年春正月詔洪承疇出潼闗討賊賊聞承疇出闗大㑹于滎陽老􅉰􅉰曹操革裏眼左金王改世王射塌天横天王混十萬過天星九條龍順天王及高迎祥李自成時尚與迎祥合張獻忠共十三家七十二營議敵官軍未决李自成進曰匹夫猶奮况十萬衆乎官兵無能為也宜分定所向利鈍聴之天皆曰善乃議革裏眼左金王當川湖兵横天王混十萬當陜兵過天星扼河上綴河南兵迎祥獻忠及自成畧東方老􅉰􅉰九條龍徃來策應陜兵鋭益以射塌天改世王所破城邑子女玉帛惟均衆如自成言始迎祥與獻忠並起比肩而自成乃迎祥支黨及是遂相頡頏與俱東掠江北兵單弱霍邱先䧟縣丞張有俊教諭倪可大訓導何炳若皆死穎州繼之知州尹夢鰲雲南太和人通判趙士寛字汝良掖縣人皆拒賊不敵投水死夢鰲有膂力賊上城夢鰲持大刀殺賊數十賊至益多遂投城下烏龍潭死弟姪七人從之士寛于城䧟後率家衆巷戰力竭亦投烏龍潭死妻李攜三女登樓自焚僕主丹亦罵賊死致仕尚書張鶴鳴及其弟副使鶴騰子大同一門皆死賊執鶴鳴兄弟而倒懸鶴鳴于樹皆罵賊不絶口死其他官紳士庶死難者共一百三人衛指揮李從師王廷俊千户孫陞田三震羅元慶田得民王之麟及中書舍人田之穎知縣劉道逺光祿寺丞李生白訓導丁嘉遇舉人白精忠郭三杰諸生劉廷博廷石韓光祖及子定策孫日曦皆死之有檀之槐者䕶母柩不去與賊格鬬殺數人被磔死城中婦人殉節者二十七人烈女八人一時忠烈稱獨盛城破後亦無一人向賊乞憐者賊怒遂屠之賊䧟鳯陽留守朱國相榆林衛人等戰死先是南京兵部尚書吕維祺注見前懼賊南下請防䕶鳯陽陵寢不報及是賊自夀州犯鳯陽國相師指揮袁瑞徵吕承廕等以兵三千迎戰頗有斬獲俄賊數萬至官軍敗國相自刎死餘皆陣殁賊遂犯皇陵大肆掠焚知府顔容暄推官萬文英死之容暄漳浦人文英南昌人漕運都御史楊一鵬在淮安逺不及救帝聞變素服避殿逮一鵬下獄棄市賊合樂大飲自成從獻忠求皇陵小閹善鼓吹者獻忠不與自成怒偕迎祥西趨歸徳復謀入闗獻忠獨東䧟廬江里居㕘政盧謙命服危坐中門賊至不動遂殺之舉人張受畢尹周亦皆不屈死屠巢無為潛山太湖知縣金應元自經死訓導扈永寧亦死焉宿松夏五月吳宗達罷宗達在閣值温體仁専政充位而已及是乞歸六月賊復走陜西總督官曹文詔戰死初洪承疇出闗至信陽諸將畢㑹賊見河南兵盛復分路奔還陜西張獻忠由英霍取道麻城入陜㑹髙迎祥李自成于鳯翔與官軍遇副將艾萬年栁國鎮等戰殁文詔聞信急詣承疇喜曰非將軍不能滅此賊顧吾兵已分無可策應者將軍行吾將由涇陽趨淳化為後勁文詔乃以三千人自寧州進遇賊真寧今屬慶陽府改正寧之湫頭鎮在縣東即九域志之顕聖鎮也從子變蛟先登斬首五百追三十里文詔率步兵繼之賊伏數萬騎合圍矢蝟集賊不知為文詔也有小卒縳急大呼曰將軍救我賊中叛卒識之惎賊曰此曹總兵也賊喜圍益急文詔左右跳盪手擊殺數十人轉闘數里力不支拔刀自刎死遊擊平安以下死者二十餘人賊乘勝掠地火照西安城中承疇力遮之涇陽三原間賊不得過文詔忠勇冠時稱良将第一其死也賊中為相慶帝聞之深為痛悼賜祭塟世廕指揮僉事有本司建祠春秋致祭朝賜專忠果秋七月以文震孟張致發注見前並為禮部侍郎兼東閣大學士預機務震孟在講筵每因事規諌帝數逮繫大臣震孟講魯論君使臣以禮反覆陳説帝為出尚書喬允升侍郎胡世賞于獄帝嘗足加于膝適講五子之歌至為人上者奈何不敬以目視帝足帝即袖掩之徐為引下賊焚鳯陽陵寢震孟厯陳致亂之源謂當事諸臣不能憂國奉公一統之朝强分畛域又言陛下宜行撫綏實政先收人心以遏冦盜徐議濬財之源毋徒竭澤而漁語多切中時弊至是帝将増至閣臣以翰林不習世務思用他官㕘之召廷臣數十人各授一疏令票擬震孟引疾不入至發所擬獨當帝特命至發與震孟並入閣初至發由玉田遵化知縣行取授禮部主事累遷光禄卿精覈精弊多所釐正遂受帝知旋陞刑部右侍郎明代自世宗朝許讚後由外僚入閣自至發始賊復東犯總兵官尤世威榆林人敗績賊為洪承疇所遮獻忠将由藍田走盧氏復扼于世威仍入商雒山中㕘将徐來朝所部三千人不肯入山大譟賊至來朝逃一軍盡殁世威軍暴露久大疫與賊戰失利敗走賊遂出闗分十三營東犯惟高迎祥李自成留陜西事聞命解世威任復宣大總督盧象昇言世威善撫士曉軍機徒以數十客旅久戍荒山水土失調疾疫大作遂致失利今當用兵時棄之可惜乃命赴象昇軍自八月以盧象昇總理江北河南山東湖廣四川軍務討流賊賊已蔓延半天下洪承疇一人不能顧乃擢象昇總理承疇辦西北象昇辦東南尋進象昇兵部侍郎加總督山西陜西賜尚方劍九月洪承疇破賊于渭南象昇既加總督詔令督闗外而承疇督闗中時迎祥自成亦分兵迎祥畧武功扶風以西自成畧富平三原以東承疇遣将追自成小捷至醴泉賊将高傑脂人通于自成妻邢氏邢氏趫武多智掌軍資每日支糧㐲傑則過氏營分合符騐氏偉傑貎與之私通懼誅挾之來降承疇復身追自成大戰渭南臨潼自成大敗東走迎祥亦屢敗東逾華陰南原絶嶺與自成偕出朱陽闗在陜州盧氏縣西與獻忠合王應熊罷應熊為楊一鵬所取士一鵬得罪言者并劾應熊遂引罪乞歸冬十一月何吾騶文震孟罷震孟與温體仁不合給事中許譽卿以鳯陽皇陵被焚劾體仁誤國體仁憾甚㑹有劾譽卿為人營求遷擢者體仁擬㫖斥譽卿為民吾騶震孟力爭帝責二人徇私撓亂並罷之體仁横而中阻深所欲推薦陰令人發端而已承其後欲排䧟則故為寛假中上所忌激使自怒帝往往為之移初未嘗有迹賊䧟陜州攻洛陽賊薄閿鄉左良玉祖寛禦之不克遂䧟陜州攻洛陽良玉從巡撫陳必謙赴援獻忠走嵩縣迎祥自成走偃師鞏縣略魯山葉縣䧟光州㑹象昇自湖廣帥師至合寛等擊敗之于確山丙子九年春正月盧象昇敗賊于滁州是時賊勢猖獗諸将帥畏懼不前象昇每慷慨灑泣激以忠義軍中嘗絶三日餉象昇亦水漿不入口以是得将士心戰則有功時師次鳯陽諸将來㑹象昇乃上言曰賊横而後調兵賊多而後増兵是為後局兵至而後議餉兵集而後請餉是為危形况請餉未敷兵将從賊而為冦是八年來所請之兵皆賊黨所用之餉皆盜糧也又言總督總理宜有專兵專餉請調咸寧甘固之兵屬總督薊遼闗寧之兵屬總理又言各直省撫臣俱有封疆重任毋得一有賊警即求援求調不應則秦越也分應之何以支持又言臺諫諸臣不問難易不顧死生専一求全責備雖有長材從何展布臣與督臣有勦法無堵法有戰法無守法其言皆切中事宜而朝廷不能盡用也㑹迎祥圍廬州不能破分道䧟含山和州和州黎宏業訓導唐正諫在籍御史馬如蛟皆死之宏業順徳人如蛟字騰仲州人進圍滁州象昇聞警即率總兵祖寛逰擊羅岱軍馳抵滁城下鏖戰賊大潰追斬無數伏屍蔽野滁水赤流數里賊乃趨鳯陽圍夀州突頴霍蕭碭靈璧虹窺單曹總兵劉澤清曹州人拒河乃掠考城儀封而西其犯亳者折入歸徳永寧總兵官祖大樂邀擊之賊乃北向開封陳永福敗之朱仙鎮賊遂走登封與他賊合分趨裕州南陽象昇合寛大樂岱兵大戰七頂山亦曰七峯山在裕州北殱自成精騎殆盡以前禮部侍郎林釬原官兼東閣大學士預機務初釬以忤魏忠賢去忠賢誅起官至禮部侍郎謝病歸至是與劉宗周同召見帝問人才兵食及流寇狀宗周言陛下求太太急用法太嚴佈令太煩進退天下士太輕故有人而無人之用又問兵事宗周言禦外以治内為本願陛下以堯舜之心行堯舜之政則天下自平矣帝迂其言命釬以原官入閣二月山西饑人相食寧夏兵亂殺巡撫王楫泰安人寧夏兵苦饑楫不能措餉兵譟而殺之副使丁啟睿永城人捕斬首惡六人乃定以武舉陳啟新淮安人為給事中啟新上書言天下有三大病士子作文高談孝弟仁義及服官恣行奸慝此科目之病也國初典史授御史秀才授尚書嘉靖時猶三途並用今惟一途一舉進士横行放誕此貲格之病也舊制給事御史教官得為之今惟用進士知縣監司郡守承奉不暇此行取考選之病也請停科目罷行取考選以除積弊蠲災傷田賦以蘇民困專拜大将以便宜行事帝大悦擢吏科給事中朝士深惡之紛然論劾帝皆不聴後啟新以受贓匿喪削籍下撫按追贓竟逃去三月賊高迎祥李自成復入陜迎祥自成自敗于象昇後分部再入陜迎祥由鄖㐮趨興安漢中自成由南山穿商雒走延綏犯鞏昌北境諸将左光先曹變蛟破之自成走環縣未㡬軍官敗于羅家山在興寧縣東盡亡士馬器仗總兵俞翀霄被執自成勢復振夏四月我太宗文皇帝建國號曰大清改元崇徳元年我太宗文皇帝纘承丕緒厲精圖治規模宏逺伐叛撫降平定察喀爾先是遼東有䲽鳩來集此鳥乃西北䝉古所産人皆謂䝉古順歸之兆既而我大兵西征察哈爾至西喇朱爾格索訥本台吉等率衆請降遂進至林丹汗子額哲所居之托里圖按兵不動遣人往諭額哲之母遂偕其子舉圖歸附并獲元代所遺傳國璽及薩哈勒察卦勒察瓦爾喀呼爾哈暨䝉古各部落靡不懷徳畏威禀承教令攻城畧地所向成功國勢滋隆人心嚮附諸貝勒大臣等請尊號太宗文皇帝固辭不允諸臣再三陳請乃受寛温仁聖皇帝尊號建國號曰大清改元為崇徳元年時制度大備營建天壇悉如典禮復定宫殿名正殿為崇正殿後為清寧宫臺太廟東樓為翔鳯樓臺西樓為飛鳯閣大殿為篤恭殿建制壯麗規模宏逺百司官舍皆以次備列一日太宗御翔鳯樓召諸王大臣入令従官讀金世宗本紀因諭之曰金太祖太宗法度詳明可埀久逺至熙宗赫拉及完顔亮之世廢之盤樂無度效漢人之陋習世宗即位勤求治理屢以無忘祖宗為訓衣服言語悉遵舊制時時練習騎射以備武功雖埀訓如此後世之君漸至懈廢忘其騎射至于宗國遂滅亡乃知為為君者耽于酒色未有不亡者也爾等其謹識者罷錢士升削御史詹爾選字思吉撫安人籍時温體仁以劾覈導帝士升獻四箴大指謂寛以御衆簡以臨下虚以宅心平以出政帝優㫖報聞而意不悦有武生李璡者請括江南富戶令報名輸官士升擬㫖下刑部提問上疏言郡邑有富家固貧民衣食之資未嘗無益于國周禮荒政十二保富居一今秦晉楚豫已無寧宇獨江南數郡稍安此議一倡無賴亡命相率而與富家為難矣帝報曰即欲沽名前疏己足前疏謂四箴也士升引罪乞罷許之爾選謂輔臣不當以進言去因言帝行一切苟且之政帝面加詰責命錦衣提下爾選叩頭曰臣死不足惜願陛下姑留臣言以為他日思帝大怒諸臣力救乃斥為民六月林釬卒以孔貞運池州建徳人賀逢聖字克繇江夏人黄士俊廣東順徳人並為禮部尚書兼東閣大學士預機務逢聖性亷靜初官翰林湖廣建魏忠賢生祠或傳上梁文出逢聖手忠賢詣謝逢聖曰無之借銜陋習爾翼日遂削籍帝即位召還至是與孔貞運士俊俱入閣三人皆不能有所匡益秋七月我大清兵入塞大清兵入喜峯口巡闗御史王肇坤拒戰死肇坤字亦資蘭谿人由間道至昌平總兵官巢丕昌降督餉主事王桂趙悦署州事通判王禹佐學正解懷亮訓導常時守備咸貞吉皆死之人王桂黄岡連下畿内州縣下順義知縣上官孟自繼遊擊治國器指揮蘇時而訓導陳所皆死之下寳坻知縣趙國鼎與主簿樊樞典史張六師訓導趙士秀同死下定興在籍太常少卿鹿善繼不屈死教諭熊嘉志亦死之下安肅知縣鄭延任與妻同珣教諭耿三麟亦死之上官叢字忠赤曲沃人趙國鼎山西樂平人熊嘉志灤州人鄭延任臨清人耿三麟靈夀人乃召諸鎮兵入援給事中王家彦莆田人以陵寢驚動劾兵部尚書張鳯翼鳯翼自請督師命與中官羅維寧宣大總督梁廷棟相掎角然皆不敢戰陜西巡撫孫傳庭字伯雅振武衛人擊高迎祥于盩厔擒之送京師伏誅傳庭代洪承疇為巡撫鋭意滅賊賊首整齊王據商雒傳庭􅊾副将羅尚文擊斬之又督賀人龍等擒迎祥于黒水峪一名芒谷在盩厔縣東北獻俘闕下磔死賊黨乃共推李自成為闖王諭廷臣助餉未㡬又括勛戚文武諸臣馬開銀鐵銅鉛諸礦八月唐王聿鍵太祖九世孫起兵勤王廢為庶人錮之先是流賊起王蠲金築南陽城又援潞藩例乞増兵三千人不許至是京師戒嚴王昌義勤王詔切責之行至裕州與流賊遇亡其内豎二人事定下部議廢為庶人幽之鳯陽我大清兵東歸九月以盧象昇總督宣大山西軍務象昇奉詔入衛至已解嚴㑹梁廷棟卒命代為總督宣大率苦缺餉象昇乃大興屯利行二年積穀至二十萬帝諭九邊奉以為式冬十一月削前工部侍郎劉宗周籍宗周累疏陳時政語多激切為温體仁所忌請告去至天津聞京師被兵留不行上疏極言體仁奸邪致刑政乖舛及宦官不宜總軍務凡數百言帝怒斥為民御批歴代通鑑輯覽卷一百十四

body:
  text: 初莊敬大子薨廷臣言裕王次當立不報帝晩年信方士語二王皆不得見載圳年少既與裕王同出邸居處衣服無别左右頗懐覬覦至是之國徳安居四年薨無子國除三月太白晝見秋七月己丑朔日食冬十一月以袁煒字懋中慈谿人為户部尚書兼武英殿大學士預機務先是二月日食㣲陰欽天監言日食不見即同不食嚴嵩以為天眷趣禮部急上賀煒亦以為言尚書呉山仰首視天曰日方虧將誰欺邪仍救䕶如常儀帝怒山引罪去遂以煒代山及七月又日食欽天監言食止一分五杪例免救䕶煒乃阿帝意上言陛下以父事天以兄事日是以太陽晶明氛䘲銷鑠食止一分與不食等臣等不勝欣汴疏入帝大喜及是遂入閣煒本以青詞進與李春芳字子實揚州興化人嚴訥字敏卿常熟人郭樸並號青詞宰相煒才思敏捷毎撰青詞援筆立就遇中外獻瑞輒極詞頌美帝畜一猫死命内直諸臣撰詞以醮煒詞冇化獅作龍語帝大喜悦其詭阿媚上多類此以故帝急枋用之恩賜稠疊他人莫敢望萬壽宫災萬壽宫在西苑成祖舊宫也帝自二十一年宫婢之變即徙居此是夜火作禁衛不及救乘輿服御及先世寶物盡燬乃暫御玉熙宫壬戊四十一年夏五月嚴嵩以罪免其子世蕃下獄帝居西苑大臣希得進見惟嵩獨承顧問御札一日或數下雖同列不獲聞以故嵩得逞志徧引私人居要地士大夫奔走輻輳皆惴惴事嵩然攬權既久帝亦寖厭之而漸親徐階初帝所下手詔語多不可曉惟世蕃一覽了然答語無不中世蕃頗通國典曉暢時務嘗自負為天下才嵩既耄昏且旦夕值西内諸司白也事輒曰以質東樓東樓者世蕃别號及嵩妻歐陽氏死世蕃居喪不得入直所代票擬嵩受詔多不能答每遣人持問世蕃值其方縱淫樂不以時答中使相繼促嵩嵩不得已自為之往往失指所進青詞又多假他人手不能工以此積失帝歡㑹萬壽宫災嵩請徙南城離宫南城英宗為太上皇時所居也帝不悦而階營萬壽宫甚稱旨帝居玉熙宫隘甚欲有所營建以間階階請以三殿餘材營之可計月而就帝悦命階子尚寶丞璠兼工部主事十旬而工成帝即日徙居之由是帝益向階顧問多不及嵩即及嵩祠祀而已未幾方士藍道行假乩仙語言嵩奸罪道行以扶鸞得幸故惡嵩帝問天下何以不治道行詐為乩語具道嵩父子弄權狀帝問山仙何不殛之答曰留待皇帝自殛帝心動欲逐嵩御史鄒應龍字雲卿長安人避雨内侍家偵知之因抗疏極論嵩父子不法應龍將具疏夜夢出獵見一高山射之不中東有培塿其下甚壯一注矢拉然覺而悟曰此小兒東樓之兆也遂専劾世蕃罪狀因及嵩溺愛惡子招賄市權亦宜亟放歸田且曰如臣言不實乞斬臣首以謝嵩世蕃帝遂罷嵩下世蕃詔獄嵩為世蕃求釋不聴法司奏論世蕃及其子錦衣鵠鴻客羅龍文俱戍邊詔從之特宥鴻為民使侍嵩而錮其奴嚴年于獄龍文官中書與世蕃交闗為奸利而年最黠惡士大夫無恥者競稱蕚山先生擢應龍通政司叅議侍郎魏謙吉栢鄉人等皆坐姦黨黜謫有差土黙特即韃靼小王子後嘉靖初徙幕東方按土黙特舊作土蠻今改後倣此冦遼東總兵官黑春戰死土黙特入撫順城名在奉天府承徳縣東與興京接界復攻鳯凰城在奉天府東南鴨緑江經此入朝鮮國春與把總田耕等力戰三日夜死之秋八月加戸部尚書高燿清苑人太子少保初大内災宦官有密收龍涎香者至是帝索之急燿從禁中購得八兩用聖壽建醮日獻之大稱旨賜銀幣尋加太子少保燿初賄嚴世蕃蠟戸部尚書事在三十九年四月以貪穢著及世蕃敗知不為公論所容乃要結為固位計九月三殿成更奉天殿曰皇極華葢殿曰中極謹身殿曰建極冬十一月分遣御史求方書帝晩年求方術益急陶仲文死乃命御史姜儆南昌人王大任陜西保安人分行天下訪求方士及符籙祕書閲二年還朝上所得法祕數千冊薦方士唐秩劉文彬等數人儆大任俱擢侍講學士秩等賜第京師時嚴嵩既罷藍行道亦被譴宫中數見妖孽帝春秋高意邑邑不樂中官因設詐以娯之嘗夜坐庭中獲一桃御幄後左右言自空中下帝喜曰天賜也修迎恩醮五日明日復獲一桃是夜白兔生二子帝益喜謝元告廟未幾壽鹿亦生二子廷臣表賀帝以竒祥三錫天眷非常手詔褒答事在四十三年癸亥四十二年夏四月總兵官俞大猷副總兵戚繼光字元敬世襲登州衛指揮僉事等擊倭于福建破之自倭去柯梅注見前淅東江北漸寕而患盡移于福建倭泊泉州之浯嶼掠同安惠安攻福寕寕徳進圍福州經月不解蔓延興化奔突漳州迄無寕日浯嶼即金門在泉州府同安縣東南海中廣袤數十里同安五季閩縣惠安宋縣今俱屬泉州府福寕元州今升府屬福建寕徳亦五季閩縣今屬福寕府閩人在朝者爭劾胡宗憲嫁禍帝不問既而宗憲以罪被逮宗憲初因趙文華結歡嚴嵩父子文華死又因羅龍文以進賂及嵩敗言官劾其黨嵩罪得旨逮問既至帝以平汪直功釋之後復坐交通龍文罪下獄瘐死倭尋䧟興化府焚掠一空移據平海衛明置今裁故城在興化府莆田縣東不去自倭躪東南破州縣衛所以百數未有及府城者興化故名郡最繁富既䧟逺近震動詔急徴大猷充總兵官繼光為副合兵往討時劉顯自廣東赴援以兵少壁城下不敢戰大猷至亦不欲攻俟大軍之集乃與顯别邀賊于長樂唐縣今屬福州府殱之至是繼光以浙江兵來㑹繼光先破倭于横嶼還浙江横嶼在寕徳縣東南海中巡撫譚綸字子理宜黄人令繼光將中軍顯左大猷右合攻賊于平海繼光先登左右軍繼之斬級二千二百有竒還被掠者三千人倭遁去遂復興化其侵犯他州縣者亦為諸將所破閩患少熄倭起二十餘載攻破城邑殺傷官吏軍民不可勝紀轉漕増餉天下騷然至是大而去其後繼光大猷復連敗之東南始得安枕無憂矣冬十月錫林阿巴圖爾舊作把都兒今改後仿此入冦京師戒嚴虜數犯遼塞總督楊選囚縶三衛長托干舊作通罕今改令其子更迭為質托干錫林阿妻父也冀以牽制鍚林阿三衛皆怨至是錫林阿巴圖爾等潰牆子嶺關名在密雲縣北入大掠順義三河諸將趙溱孫臏戰死京師戒嚴詔諸路兵入援虜駐内地八日大同總兵官姜應熊敗之于密雲乃退詔誅選初冦之入也帝方祠釐兵部尚書楊博不敢奏謀之徐階檄宣府總兵官馬芳等入援㑹帝見城東火光知冦已逼大驚諭階議逐㓂而芳兵已先至階請亟賞之令専䕶京師及冦退帝怒博不早聞欲與楊選同論罪階力為救解乃選而不罪博馬芳字徳馨蔚州人甲子四十三年春二月伊王典楧厲王㰘六世孫有罪廢為庶人國除典楧在國多不法常奪民舍以廣其宫索郎中陳大壯宅不與使人絶大壯飲食斃之築崇臺連城擬帝闕强取民間子女七百飲留其姝麗者餘令以金贖巡撫張永明烏程人等上言狀詔壊所造宫室歸民間女執羣小付有司典楧無藩臣禮宜禁高牆除世封從之夏五月壬辰朔日食乙丑四十四年春三月袁煒以病免煒疾篤請假歸道卒煒貴倨鮮淟故出徐階門直以氣凌階館閣士出門下者斥辱尤不堪人皆畏而惡之及卒諡文榮嚴世蕃伏誅世蕃論戍雷州未至而返初嵩歸至南昌值萬壽節使道士藍田玉為帝建醮鐡柱宫田玉善召鶴嵩取其符籙并已祈鶴文上之因乞移世蕃近地以便就養詞甚哀帝不許而世蕃遽返以鐡柱宫在南昌城内中有鐡柱相傳許旌陽所鑄鎮蛟螭之害明嘉靖後改名妙濟萬壽宫羅龍文一詣戍所即逃還徽州數徃來江西與世蕃計事世蕃大治園亭勢熖不少衰其監工奴見袁州推官郭諫臣長洲人不為起㑹南京御史林潤字若雨莆田人按視江防因與諫臣謀馳疏盡發其罪疏言臣巡視上江備訪江洋羣盗悉竄入逃軍羅龍文嚴世蕃家龍文卜築深山乘軒衣蟒隂有不臣之心而世蕃日夜與龍文誹謗時政摇惑人心近假名治第招集勇士至四千餘人道路洶洶咸謂變且不測帝得疏大怒即詔潤逮捕世蕃子紹庭官錦衣聞命急報世蕃使詣戍所方二日潤已馳至世蕃猝不及赴乃械以行龍文亦捕得于梧州既至京潤復劾嵩世蕃罪甚且且及寃殺楊繼盛沈錬狀世蕃喜謂其黨曰無恐獄且解刑部尚書黄光昇晉江人等以獄詞白徐階階曰諸公欲生之乎僉曰必欲死之階曰若是適所以生之也夫楊沈之獄嵩皆巧取上旨今顯及之是彰上過也必如是諸君且不測嚴公子騎欵段出都門矣為手削其草獨按羅龍文與汪直交通賄世蕃求官世蕃用日者言以南昌倉地有王氣取以治第制擬王者又結宗人典楧陰伺非常多聚亡命南通倭北通虜共相響應即日令光昇等疾書奏之世蕃聞詫曰死矣遂棄市籍其家黄金可三萬餘兩白金三百餘萬兩他珍寶服玩所值又數百萬嵩及諸孫皆為民後二年嵩老病寄食墓舍以死夏四月以吏部尚書嚴訥禮部尚書李春芳並兼武英殿大學士預機務袁煒去後徐階當國屢請增閣臣故有是命帝眷侍直諸臣厚凡遷除皆出特旨春芳自學士至柄政凡六遷未嘗一由廷推冬十一月嚴訥罷訥仍掌吏部晨理部事暮直西苑供奉青詞積勞成疾遂罷歸訥既歸里父母皆在晨夕備物孝養人以為榮訥嘗語人曰銓臣與輔臣必同心乃有濟吾秉銓二年適華亭當國諸事無阻且所任選郎賢舉無失人華亭謂徐階選郎則陸光祖也陸光祖字與繩平湖人丙寅四十五年春二月下户部主事海瑞于獄帝久不視朝專意齋醮廷臣自楊最楊爵得罪後無敢言者至是瑞獨上疏論之畧曰陛下即位初年敬一箴心冠履分辨天下欣然望治未久而妄念牽之謬謂長生可得一意修元二十餘年不視朝政法紀弛矣推廣事例名器濫矣二王不相見人以為薄于父子以猜疑誹謗戮辱臣下人以為薄于君臣樂西苑而不返人以為薄于夫婦吏貪官横民不聊生水旱無時盗賊滋熾陛下試思今日天下為何如乎古者人君有過頼臣工匡弼今乃修齋建醮相率進香仙桃天藥同詞表賀建宫築室則將作竭力經營購香市寶則度支差求四出陛下誤舉之而諸臣誤順之無一人肯為陛下言者諛之甚也自古聖賢垂訓未聞冇所謂長生之説陛下師事陶仲文仲文則既死矣彼不長生而陛下何獨求之誠一旦翻然悔悟日御正朝與諸臣講求天下利病洗數十年之積誤使諸臣亦得自洗數十年阿君之恥天下何憂不治萬事何憂不理此在陛下一振作間而已帝得疏大怒抵之地顧左右趣執之無使遁宦官黄錦在側曰聞此人上疏時市一棺訣妻子待罪于朝童僕亦奔散無留者是不遁也帝黙然少頃復取讀之為感動太息留中者數月曰此人可方比干第朕非紂耳㑹帝有煩懣疾召徐階議内襌因曰海瑞言俱是朕今病久安能視事又曰朕不自謹致此疾困使朕能出御便殿豈受此人詬詈耶遂逮瑞下詔獄論死獄上階力救奏遂留中三月以吏部尚書郭樸兼武英殿大學士禮部尚書高拱字肅卿新鄭人兼文淵閣大學士並預機務樸拱皆由徐階薦召入直廬至是同入閣夏四月壬戍朔日食六月旱秋七月冦犯萬全右衛總兵官馬芳擊敗之鍚林阿以十萬騎入西路芳迎之馬蓮堡堡圮衆請塞之不可請登臺亦不可開堡四門偃旗鼓寂若無又比暮野燒燭天囂呼逹旦芳卧日中不起敵騎窺者相屬莫測所為明日芳蹶然起乘城指示衆曰彼軍多反顧且走勒兵追擊大破之時冦屢犯東西諸塞及冬犯固原總兵官郭江敗死又犯大同叅將崔世榮禦之與其子大朝大賓俱力戰死冬十一月帝有疾先是帝以久病忽欲南幸興都即承天府取藥徐階力諌乃止既而服方士王金等所獻丹藥病遂甚時方士至者日衆帝知其妄無殊錫金思所以動帝乃偽造諸品仙方與所製金石藥同進其方詭秘藥性燥非服食所宜帝御之稍稍火發不能愈十二月帝崩帝大漸自西苑還大内遂崩徐階草遺詔召用建言得罪諸臣死者卹録方士付法司論罪一切齋醮工作及政令不便者悉罷之詔下朝野號慟感激時高拱郭樸以階不與共謀不樂樸曰徐公謗先帝可斬也兩人遂與階有隙裕王載垕即位是為穆宗赦以明年為隆慶元年釋海瑞于獄先是瑞在獄猶未聞大行狀提牢主事先知之以瑞且見用設酒饌欵之瑞自疑當赴西市恣飲噉不顧主事因附耳語宫車適晏駕先生今即出大用矣瑞曰信然乎即大慟盡嘔出所飲食隕絶于地終夜哭不絶聲及是既釋復故官俄再遷大理丞穆宗皇帝丁卯隆慶元年春正月罷睿宗配享明堂禮部尚書高儀字子象錢塘人上言先帝肇祀明堂奉睿宗配享今陛下踐阼睿宗已為皇祖若仍配享上帝似非周人宗祀文王之義請罷大享禮從之未幾給事中王治字本道忻州人上言獻皇帝雖為天子父實未嘗君臨天下雖為武宗叔嘗北面事武宗今位武宗之右揆諸古典終為未協臣以為獻皇祔太廟不免遞遷若尃祀世廟則億世不改乞敇廷臣博議疏入報聞而已追尊母杜氏為孝恪皇太后二月立皇后陳氏通州人以陳以勤字逸甫南充人為禮部尚書兼文淵閣大學士張居正字叔大江寕人為吏部侍郎兼東閣大學士並預機務以勤居正俱時裕邸講讀至是並參大政時徐階以宿老居首輔與李春芳皆折節下士居正最後入獨引相體倨見六卿無所延納間出一語輒中旨人以是嚴憚之重于他相三月𦵏永陵諡曰肅皇帝廟號世宗明史贊曰肅皇帝御極之初力除一切弊政天下翕然稱治顧迭議大禮與論沸騰倖臣假托尋興大獄夫天性至情追尊立廟禮亦宜之然升祔太廟而躋于武宗之上不己過乎若其時紛紜多故將疲于邊賊訌于内而崇尚道教享祀弗經營建繁興府藏告匱雖翦剔權奸威柄在御要亦中材以下之主也己夏四月御經筵五月夏鎮在徐州府沛縣東北新河成初嘉靖七年河溢阻運總河都御史盛應期請于昭陽湖有大小二湖相連北屬山東滕縣南屬江南沛縣亦名山陽湖東别鑿新渠以通漕廷議從之㑹應期罷役中止至四十四年河大决沛縣飛雲橋在縣南為徃來津要分為十數股潰入昭陽運道淤塞百餘里督理河漕尚書朱衡字士南萬安人循行應期舊迹請開南陽鎮名在兖州府魚臺縣東北留城在沛縣東甫即古留邑漢張良封此上下總河都御史潘季馴字時良烏程人不可衡言是河直秦溝在徐州府銅山縣東北有所束隘伏秋黄水盛昭陽受之不為壑也乃决計開濬身自督工重懲不用命者至是河成西去舊河三十里舊河自留城以北經穀亭而至南陽新河亦自留城而北經夏鎮而至南陽與舊河合謂之夏鎮河凡百四十里有竒又引鮎魚諸泉在滕縣南源出寶峯山滙諸泉而為淵西經薛山因名薛河沙河有二俱在滕縣在縣北者曰北沙河源出鄒縣嶧山在縣南者曰南沙河即古漷水源出縣之述山下流俱入運注之築馬家橋隄在沛縣遏黄水入秦溝使不東侵運道乃大通方工未成㑹河復決論者紛然謂衡故興難成之役以倖功及工竣羣議乃息未幾山水驟溢新河決壊漕艘給事中呉時來言新河受費嶧鄒滕諸水以一隄捍羣流豈能不潰宜分之以殺其勢乃開支河四洩其水入赤山湖滕呉時來以遺詔復故官赤山湖在縣西南與微山韓莊諸湖相連高拱罷初徐階甚親拱及拱驟貴負氣頗忤階世宗疾亟拱方直西苑遽移具出拱無子移家近直廬時竊出㑹世宗不豫誤傅非常拱遂移直廬器用于其家為給事中胡應嘉沭陽人所劾拱疑出階指大憾之及帝即位階為首輔拱自以舊臣數與抗郭樸復助之因事削應嘉籍應嘉掌吏科佐部院考察以吏部尚書楊博庇鄉里劾之帝責其牴牾下閣臣議罰樸奮然曰應嘉無人臣禮當編氓階旁晲拱見拱方怒勉從之言路大譁給事中歐陽一敬字司直彭澤人等劾拱以私怨逐諫臣拱疏辯階擬旨慰留而不甚譴言者拱益怒相與忿詆閣中御史齊康永平人為拱劾階坐黜于是論拱者無虚日拱不自安乞罷歸六月霪雨傷稼帝素服修省避殿御皇極門視事秋七月遣使招撫山東河南流民給復五年八月帝視國子監九月諳逹冦山西諳逹數犯山西時邱富已死趙全在虜益用事尊諳逹為帝治宫殿期日上棟忽大風棟墜傷數人諳逹懼不敢居全乃為諳逹言大同兵弱亭障稀可以逞故屢入犯至是復率衆數萬分道入井坪在朔平府平魯縣南有城明成化中建置守禦所于此朔州偏頭闗老營堡名在寕武府偏闗縣東亦成化中建諸處邊將不能禦遂長驅破石州今汾州府永寕州本唐宋石州明因之不改隆慶後始更名永寕殺知州王亮采大掠孝義後魏永安唐改名今縣屬汾州府介休漢界休晉改界為介今縣屬汾州府平遥漢平陶後魏更名今縣屬汾州府文水隋縣今屬太原府交城亦隋縣今屬太原府太谷漢陽邑隋改名今縣屬太原府隰州注見前問男女死者數萬而三衛勾土黙特注見前同時入宼薊鎮昌黎注見前撫寧注見前樂亭金縣今屬永平府盧龍皆被蹂躪遊至灤河京師震動三日乃引去諸將追之敵出義院口在撫寧縣東北有闗㑹大霧迷失道墮棒棰崖中人馬枕籍死者甚衆郭樸罷初言官劾高拱者多及樸拱歸樸亦求去帝固留之御史龎尚鵬字可南南海人凌儒泰州人等攻不止遂乞歸樸家居二十年卒諡文簡冬十月以王崇古字學甫蒲田人總督三邊時濟農據河套為西陲諸部長别部賓都舊作賓土今改後仿此駐牧大小松山大松山在凉州府平番縣東北接蘭州界小松山在其北為邊陲要地南擾河湟番族環四鎮延綏寕夏固原甘肅是為陜西四鎮皆冦乃擢崇古兵部侍郎總督陜西延寕甘肅軍務戊辰二年春正月杖給事中石星字拱辰東明人于廷黜為民星上疏言陛下為鼇山之樂從長夜之飲極聲色之娯朝講久廢章奏遏抑一二内臣威福自恣肆無忌憚天下將不可救帝大怒詔杖六十黜為民中官滕祥者以造作竒巧得幸㑹監杖星大詬之祥怒予重杖星絶而復甦其妻鄭誤聞星已死遽觸柱死聞者哀之二月命廷臣舉邊才三月立子翊鈞帝第三子為皇太子即神宗京師地震夏五月以都督同知戚繼光鎮薊州繼光俞大猷均稱名將而繼光屢摧大冦平浙閩倭又平江西賊名更出大猷上給事中呉時來以薊門多警請召大猷繼光尃訓邊卒部議獨用繼光乃命以都督同知總理薊州平昌保定三鎮總兵事尋以薊州既有總兵官又設總理事權不一乃召還總兵官郭琥而以繼光為之鎮守薊州永平山海諸處繼光建敵臺千二百坐臺高五丈睥睨四逹虚中為三層臺宿百人鎧仗糗糧具備精堅雄壯二千里聲勢聨接又立車營每車一輛用四人推輓戰則結方陣而馬步軍處其中製拒馬器遏冦騎衝突冦至火器先發稍近則步軍持拒馬器排列面前間以長鎗筤筅兵器名以大毛竹為之粗二尺長一丈五六尺刀在其頂長一尺用為行伍藩籬見戚繼光武藝篇冦奔則騎兵逐北又置輜重營隨其後而以南兵為選鋒時邊卒木彊律以軍法多不堪用繼光請募浙人為一軍用倡勇敢許之浙兵三千至陳郊外天大雨自朝至日昃植立不敢動邊卒大駭自是始知軍令入衛兵主策應本衛兵尃戍守節制精明器械犀利薊門軍容遂為諸邊冠秋七月徐階罷帝即位以來階所持諍多宫禁事伸者十八九中官多側目帝欲命中官分督團營階力陳不可而止羣小璫歐御史于午門都御史王廷將糾之階曰不得主名劾何益且慮彼先誣我乃使人以好語誘大璫先録其主名庭疏上乃分别逮治冇差王庭字子正南充人給事中張齊長安人前奉命犒軍宣大納鹽商金因疏請恤邊商革餘鹽為階所格至是上疏攻階階引疾求退帝意亦漸移許之冬十月遼王憲㸅莊王致格子有罪廢為庶人國除憲㸅在嘉靖時以奉道被寵賜真人號至是巡按御史郜光山西長治人劾其淫虚僭擬諸罪狀遣侍郎洪朝選字舜臣同安人等徃勘得實免為庶人國除初張居正家荆州與憲㸅有隙及朝選在勘諷令坐以謀反朝選不從居正怒屬巡撫勞堪江西徳化人羅織朝選死獄中十一月宣府總兵官馬芳襲冦于長水海子即曰海子注見前又敗之鞍子山亦曰馬鞍山在獨石口東北先是或為錫林阿謀以五萬騎犯蔚州誘芳出而以五萬騎襲宣府可得志芳預伐木環城冦不得上乃解去頃之芳率參將劉潭等出獨石塞外襲其帳于長水海子還至塞追者及鞍子山芳迎戰又大敗之芳有膽智諳敵情所至先士卒一嵗數出師搗巢或躬督戰或遣禆將家畜健兒得其死力嘗命三十人出塞四百里多所斬獲冦大震芳乃帥師至大松林頓舊興和衛登高四望耀兵而還興和衛注見前己巳三年夏四月以海瑞為僉都御史巡撫應天諸府瑞威望久著屬吏聞其至墨者多自免去中官監織造者為減輿從有勢家朱丹其戸恐瑞見即黝之瑞鋭意興革請濬呉淞白苑通流入海民頼其利素疾大户兼并力摧豪彊撫窮弱下令飈發凌厲所司惴惴奉行富家巨室或竄他郡以避其見憚如此瑞撫呉甫半嵗再為言路所論遂改督南京糧儲小民聞瑞當去號泣載道家繪像祀之秋八月以禮部尚書趙貞吉兼文淵閣大學士預機務初帝幸太學㑹祭酒胡杰論罷貞吉以禮部侍郎攝事貞吉在嘉靖朝由謫籍屢擢戸部侍郎罷歸帝即位復起禮部講大禹謨稱旨命充日講官貞吉年踰六十而議論侃直進止有儀帝深注意及是遂以尚書參機務貞吉入謝奏言朝綱邊務一切廢弛臣欲捐軀任事惟陛下主之帝益大喜廣東海賊曾一本伏誅一本初與大盜黄平聚衆數萬剽掠惠潮間與倭相掎角已而總兵官俞大猷以次殱倭畧盡平為副將湯克寛邳州衛人所敗逹竄去一本降而復叛突犯雷州執叅將繆印又犯廣州殺知縣劉師顔尋復䧟碣石衛在惠州府海豐縣東南明洪武中置今裁禆將周雲翔殺參將耿宗先叛附于賊勢益熾時大猷已改鎮廣西詔止勿赴令與廣東福建總兵官李錫歙人郭成四川叙南衛人同討一本鍚出海與大猷遇擊賊三戰皆㨗㑹成亦敗賊執周雲翔率參將王詔等以師來㑹分三哨進一本駕大舟力戰諸將連破之燬其舟詔生擒一本及其妻斬首七百餘死水火者萬計時閩廣隨在皆盗而一本最彊既平患漸息冬十一月京師地震有聲十二月命厰衛刺部院事帝以災異頻仍由部院政事不平所致令厰衛密訪以聞于是尚書毛愷字逹和江山人侍郎萬士和字思節宜興人等皆自劾求去帝慰留給事中舒化字汝徳臨川人等上言祖宗設厰衛令捕盜詰奸非以察百官也制馭百官乃天子之權而奏核諸司責在臺諌今陛下委之厰衛厰衛必托之番校此輩貪殘恐開羅織之門不可不慎帝不從已而事竟寢召高拱復入閣兼掌吏部拱性彊直自遂頗快恩怨及再入閣盡反徐階所為凡先朝得罪諸臣以遺詔録用贈䘏者一切報罷且言明倫大典頒示已久今褒顯議禮諸臣將使獻皇在廟之靈何以為享先帝在天之靈何以為心而陛下嵗時入廟何以對越二聖帝深然之時拱尃與徐階修隙所論皆欲以中階重其罪㑹帝仁柔弗之竟階子弟頗横鄉里郡邑有司希拱指簿其子弟皆編戌盡奪其田所以扼階者無不至杖尚寶司丞鄭履淳字叔初海鹽人尚書曉之子下獄履淳上疏極言時政畧曰頃年以來萬民失業四方多故天鳴地震災害洊臻臣等當痛哭涕流于殿庭陛下亦當卧薪嘗膽于宵肝今最急莫如用賢陛下御極三禩矣曽召問一大臣面質一講宫賞納一諌士以共畫思患豫防之策乎高亢孤暌乾坤否隔忠言重折檻之罰儒臣虚納牖之功宫闈違脱珥之規朝陛拂同舟之義閽守潛為厲階善類漸以短氣童牛羸豕無先事之圖社䑕城狐有難施之計患豈在明前車不逺伏願奮英㫁以决大計勿為小故之所淆𠂻濬哲以任君子勿為嬖眤之所惑移羙色珍竒之玩而保瘡痍分昭陽細務之勤以和庶政萬幾之裁理漸熟人才之邪正自知察變謹微囘天開秦計無踰此疏入帝大怒杖之百繫刑部獄數月刑科舒化等以為言乃釋為民淳父曉通經術明習國家典故為都御史禦倭有功遷刑部尚書與嚴嵩不合罷歸卒嵩敗履淳訟于廟帝即位曉贈官𤾉諡至神宗初履淳復起光禄少卿尋卒庚午四年春正月己巳朔日食罷元㑹是月月復食給事中陳吾徳字懋修歸善人疏言嵗首日月並食天之大災陛下宜屏斥一切玩好應天以實報聞五月罷京營總督分設三大將領之趙貞吉言先朝禁軍列三大營營各有帥令以一人總三營權重難制因極論其弊請分五營各統以大將稍復祖宗之舊帝善之令兵部㑹廷臣議尚書霍冀與貞吉不協不然其言廷臣亦多言彊兵在擇將不在變法冀等乃上議三大營宜如故惟以一人為總督權大重宜三營各設一大將而罷總督以文臣為總理報可未幾復置總督協理大臣貞吉不能爭夏四月京師地震秋七月禁章奏浮詞髙拱言比來章奏鋪綴連牘言多意晦端緒難尋反可竄匿名實請嚴加禁約從之陳以勤罷初以勤入閣徐階為首輔而髙拱方嚮用朝士各有所附交相攻以勤中正無所比及拱再入與趙貞吉相軋張居正復中搆之以勤與拱舊僚貞吉其鄉人而居正則所舉士也度不能解引疾乞休去以勤歸六年卒贈太保諡文端八月宣大告警敇備邊時李春芳雖為首輔而政皆自高拱出邊警猝至拱請命侍郎曹邦輔邦輔于帝即位初起謫籍屢進兵部侍郎王遴字繼津覇州人督師列陳以待以都御史栗永禄守昌平䕶陵寢起劉燾于天津守通州儲命總督王崇古譚綸主進勦機宜戴才理糧餉邊境得無事拱練習政事有才畧凡所建白多可行然居位頗尃横其門生韓楫輩並居言路日夜奔走其門專務搏擊尚寶卿劉奮庸上疏陰斥之給事中曹大埜劾拱不忠十事皆謫外巴韓楫蒲州人劉奮庸洛陽人曹大埜縣人罷户部尚書劉體乾字子元東安人時内供寖多數下户部取太倉銀又趣市珍珠黄緑玉諸物體乾屢疏積忤帝意遂罷先是御史詹仰庇諌市珠寶言寶石珠璣多藏中貴家何必求之于外不報已而仰庇巡視十庫疏請嚴覈内官監出納嵗數并節省一切無益浮費㑹疏中有再照人主語内官摘出激帝怒以為大不敬杖之百斥為民并罷科道之巡視庫藏者至是給事中陳吾徳李已復上疏言比買玉市珠傳帖數下人情惶惑謂内官崔敏等獻謟營私罪不可宥乞即斥譴以清左右帝震怒杖已百錮刑部獄斥吾徳為民已久之始得釋詹仰庇字汝欽安溪人李已字子復磁州人九月河决邳州初新河既成南北諸支河悉併流秦溝河勢益大漲三年七月决沛縣漕艘不得進至是復决邳州自睢寕白浪淺至宿遷小河口淤百八十里漕道復阻河道侍郎翁大立字傳參餘姚人言邇來河患不在豐沛而在徐邳臣以為權宜之計在棄故道而就新衝經久之策在開泇河有東西二泇東泇出沂州府西北箕山西泇出嶧縣東北抱犢山東南流至三合村與東加合又南入泗謂之泇口以避洪水帝命大立躬自相度條利害以聞已而大立以誤漕削籍復以朱衛經理河道遂罷泇河議尃事徐邳築長隄自徐州至宿遷小河口三百七十里并繕豐沛大黄隄正河安流運道復通事在六年正月以李成梁字汝器世鐡嶺衛指揮僉事為遼東總兵官錫林阿入遼東總兵王治道戰死擢成梁署都督僉事代之時諳逹諸部屢窺塞下十年間大將死者數人成梁乃大修戎備甄㧞將校收召健兒給以厚餼用為選鋒軍聲始振冬十月諳逹孫巴噶奈濟舊作把漢那吉今改後仿此内附詔授指揮使尋遣歸巴噶奈濟者諳逹第三子塔木台吉舊作鐡背台吉今改之子也㓜孤育于諳逹妻伊克哈敦舊作一克哈屯今改所既長娶必濟舊作比吉今改不相得復自聘鄂爾多斯舊作襖兒都司今改女號三娘子即諳逹外孫女也諳逹見其羙奪之巴噶恚率其屬十餘人來歸大同巡撫方逢時字行之嘉魚人告總督王崇古崇古于四年正月改督山西宣大曰機不可失也率五百騎往受之崇古上言巴噶來歸非擁衆内附者可比宜給官爵豐館餼餙輿馬以示諳逹諳逹急則令縛送拜牲諸叛人不聴即脅誅巴噶牽沮之又不然因而撫納之如漢置屬國居烏桓故事使招其故部徙近塞諳逹老且死黄台吉立則令巴噶還以衆與台吉抗我按兵助之此誠安邊之良策也奏至朝議紛然高拱張居正力主崇古議詔授巴噶指揮使諳逹方西掠土番聞之急引還約諸部入冦崇古檄諸道嚴兵禦之敵不得利伊克哈敦思其孫日夜哭諳逹患之使來請命逢時遣譯者鮑崇徳往令縛送拜甡諸叛人以易巴噶崇徳入其營諳逹盛氣待之崇徳曰朝廷待而孫甚厚今稱兵是速其死也諳逹疑巴噶已死聞言心動使使詗之崇古令巴噶緋袍金帶見使者諳逹喜過望崇徳因説之曰趙全等旦至巴噶夕歸諳逹因屏人語曰我不為亂亂由全等天子若封我為王長北方諸部孰敢為患即死吾孫當襲封彼衣食中國忍背徳乎遂遣使致書逢時而全方慫惥用兵諳逹又惑之全嘗投書達時欲歸中國逢時以示諳逹始有執全意錫林阿奄至大同時逢時以巴噶箭示之錫林阿執箭泣曰此吾弟塔本台吉故物也我來求巴噶巴噶既受官當更計之㑹諳逹召錫林阿還錫林阿乃引去諳逹遂遣使與崇徳來乞封請互市隨執趙全等九人來獻詔磔于市崇古亦以帝命遣巴噶歸十一月趙貞吉罷高拱掌吏部貞吉亦掌都察院拱以私憾考察科道欲去貞吉所厚者貞吉亦持拱所厚以解于是斥者二十七人而拱所惡者咸與拱猶以為憾嗾門生給事中韓楫劾貞吉庸横貞吉疏辯言臣掌風憲目睹拱壊亂選法噤口不能一言有負任使真庸臣也若拱者斯可謂横也已臣放歸之後幸仍還拱内閣毋令久尃吏部權廣樹衆黨疏入帝竟允貞吉去而拱掌吏部如故貞吉好剛使氣動與物忤人多怨之歸十餘年卒贈少保諡文肅以禮部尚書殷士儋字正甫歴城人兼文淵閣大學士預機務士儋本裕邸舊僚高拱惡其不親已不為援士儋遂藉太監陳洪力取中旨入閣辛未五年春二月命廷臣及朝覲官謁皇太子于文華左門封皇子翊鏐帝第四子為潞王後之藩衛輝三月封諳逹為順義王巴噶奈濟既歸諳逹及其妻撫之泣遣使報謝誓不犯大同王崇古上言朝廷許諳逹封貢諸邊有數年之安可乘時修備設敵背盟吾以數年蓄養之力從事戰守愈于終嵗奔命自救不暇者矣復條封貢八事以請詔下廷臣議議各不同㑹帝御經筵閣臣面請外示覊縻内修守備乃封諳逹順義王名所居城曰歸化昆都埒赫即老巴噶諳逹弟舊作昆都力今改鍚林阿等授都督同知等官有差封巴噶奈濟昭勇將軍指揮如故已而套部濟農亦如約請命詔授官如昆都埒赫由是西塞諸部嵗來貢市自宣大至甘肅邊陲晏然不用兵革者二十餘載夏五月李春芳罷初春芳代徐階為首輔務以安静稱帝意同列陳以勤故端謹張居正恃才凌物視春芳蔑如也方階罷春芳歎曰徐公尚爾我安能久容旦夕乞身耳居正遽曰如此庶保令名春芳愕然三疏乞休不允既而趙貞吉入代以勤剛而負氣及高拱再入直凌春芳出其上春芳不能與爭自飭而已㑹拱逐貞吉勢益張修階故怨春芳常從容為階解拱益不悦言官希拱意疏詆春芳乃罷歸後數年卒諡文定六月京師地震冬十月河南山東水十一月殷士儋罷御史趙應龍涇陽人劾士儋進由内侍不堪大任給事中韓楫復揚言脅之士儋遂乞休去士儋家居十餘年卒諡文通久之改諡文莊壬申六年春閏三月帝有疾帝御皇極門疾作遽還宫夏四月以禮部尚書高儀兼文淵閣大學士預機務初儀掌禮部秉禮循法居職甚稱為言路所劾遂引疾歸已用高拱薦以故官侍東宫講讀掌詹事府及是遂入閣五月帝崩帝疾稍平將視朝登陛忽眩幾仆亟召高拱張居正至帝執拱手欵語備至居正在旁帝弗顧也帝令拱扶掖還宫尋命宿乾清門拱與居正同止焉未幾帝大漸召拱居正及高儀同受顧命遂崩六月乙夘朔日食太子翊鈞即位是為神宗赦以明年為萬厯元年詔祀建文朝盡節諸臣于鄉有苖裔者䘏録罷中極殿大學士高拱始拱與張居正友善既而内離猜防日甚中人馮保深州人次當掌司禮監拱薦陳洪及孟冲保以是怨拱而居正與保深相結穆宗疾再作居正處分十餘事使小吏投保拱知而跡之吏已入拱恚甚面詰居正曰密封謂何天下事不以屬我曹而屬之内豎何也居正面發赤乾笑而已穆宗崩保矯遺詔與閣臣同受顧命及帝登極保升立御座旁不下舉朝大駭保遂掌司禮監又督東厰總兼内外勢益張拱以主上㓜冲懲中官尃政疏請詘司禮權又屬言官合疏攻保而已從中擬旨逐之使人報居正居正陽諾之而私以語保保訴于太后謂拱擅權不可容太后頷之明日召羣臣入宣兩宫及帝詔拱意必逐保也急趨入比宣詔則數拱罪而逐之拱伏地不能起居正掖之出拱急僦騾車出宣武門居正乃與高儀請留拱弗許請得乘傳許之拱既去居正遂為首輔高儀卒諡文端儀性簡靜寡嗜好入閣兩月卒貧無以殮以禮部尚書吕調陽字和卿廣西臨桂人兼文淵閣大學士預機務高儀既卒張居正以調陽弱薦代之居正尃决調陽不敢有所持諍然内不甚附之秋七月尊皇后為仁聖皇太后貴妃李氏漷縣人帝生母為慈聖皇太后舊制天子立尊皇后為皇太后若有生母稱太后者則加徽號以别之馮保欲媚帝生母李貴妃風張居正以並尊居正不能違也慈聖移居乾清宫撫視帝内任保而大柄悉以委居正焉帝御文華殿講讀張居正請定三六九日視朝餘日御文華殿講讀九月塟昭陵在昌平州大峪山東北明史贊曰穆宗端拱寡營許諳逹封貢陲寕謐繼體守文可稱令主矣第柄臣相軋門户漸開而帝未能振肅乾綱矯除積習盖亦寛恕有餘而剛明不足者歟冬十月彗星見東北方至二年四月乃滅十二月以宋儒羅從彦李侗從祀孔廟神宗皇帝癸酉萬歴元年春正月男子王大臣入乾清宫尋伏誅大臣京師傭奴偽為内侍服入乾清宫被獲下東厰馮保欲縁此以䧟高拱令家人飲食之納刃其袖中俾言拱怨望與太監陳洪拱先薦洪掌司禮故保怨之謀大逆遂發緹騎馳械高氏奴圍拱里第張居正亦請詰主事舉朝洶洶謂且逮拱吏部尚書楊博左都御史葛守禮字與立徳平人詣居正力解居正奏緩其獄博陰囑錦衣怵大臣吐實又以拱僕雜稠人中令大臣識别茫然莫辨也㑹帝命守禮偕都督朱希孝成國公朱能五世孫㑹訊大臣疾呼曰許我富貴乃搒掠我邪且我何處識高閣老希孝不敢鞫而罷保懼以生漆酒瘖大臣移付法司坐斬拱得白二月御經筵三月詔舉將才張居正進講因言今承平日久武偹廢弛文吏箝制弁員不啻奴𨽻平日不能養其鋒鋭臨敵何以責其折衝嗣後將帥忠勇可任者宜假以事權俾得展布故有是命秋九月以方逢時總督宣大軍務始逢時與王崇古共决貢市之議及崇古入理京營張居正薦逢時代之至則申明約信邊境以安四川都掌蠻注見前平成化初都掌蠻亂尚書程信襄城伯李瑾討平之事具前隆慶末復亂其酋阿大阿二方三等據九縣山在叙州府興文縣東南上有城為蠻巢穴僭稱王剽逺近其山修廣而四隅峭仄方輿紀要九絲山周圍三十餘里上冇九崗四水極廣可以播種下惟一徑鳥道可通東北則鷄冠嶺上有砦都都寨地袤廣為九絲左臂凌霄峯最高險有城為九絲門戸鼎峙相連峻壁皆數千仞有阿苟者居凌霄城為賊耳目威儀出入如王者巡撫曾省吾鍾祥人屬總兵官劉顯以軍事顯被劾當罷省吾奏留之又起故將郭成為之副成亦被劾充為事官督軍往討至是諸軍集叙州誘執阿苟拔凌霄鑿灘通餉進逼都都寨克之斬賊黨阿墨于是顯分兵為五哨盡壁九絲城下乘夜賊無備腰絙而上斬闗入賊驚潰郭成復破鷄冠三酋阿大阿二方三以次就擒凡克寨六十餘獲賊魁三十六拓地四百餘里蠻塞既平得銅鼓九十三銅鐡鍋各一阿大泣曰鼓聲宏者為上可易千牛次者七八百得鼓二三便可稱王鼓山巔羣蠻畢集今已矣鍋狀如鼎大可函牛刻畫有文彩相傳諸葛亮以鼓鎮蠻鼓失則蠻運終矣冬十一月立章奏考成法初諸司章奏部院覆行撫按勘者常稽不報張居正請以大小緩急為限立文簿月終註銷閣科部院逓相糾舉誤者抵罪自是政體為肅十二月朶顔察克圖舊作朶顔長秃今改後仿此犯塞總兵官戚繼光擊之自諳逹欵塞西鄙烽火寂然獨土黙特徙居察罕地今察哈爾明時曰察罕在遼東口外等本朝移其部衆于宣大近地分為八旗設佐領官管轄控弦十餘萬常為薊門憂泰寕朶顔諸部皆與交通時叛時服是年春朶顔部長董呼哩舊作董狐狸及兄子長安舊作長昂今並改後仿此入犯喜峯口繼光擊敗之呼哩乃欵闗請貢至是呼哩之弟察克圖復入冦繼光擒之于是呼哩長安率部長親族三百人叩闗請死乞赦察克圖繼光遣將受降皆羅拜獻還所掠人攢刀設誓乃釋察克圖許通貢如故繼光在鎮十六年邊備修飭薊門守甚固敵無由入盡轉而之遼故李成梁獨擅戰功甲戌二年春正月召見朝覲亷能官于皇極門太祖時外官奏事輒召見賜食訪民間疾苦佐貳雜職有亷能愛民者常特遣行人齎勅奬賚宣順成𢎞朝亦間行之張居正以考察届期倣舊典具儀以上帝乃召見浙江布政使謝鵬舉蒲圻人等二十人特加奬勵並賜銀幣夏四月詔内外官行久任法吏部尚書張瀚字子文仁和人請諸司久任張居正善而行之由是藩臬守令皆得自展秋七月淫雨昭陵地䧟八月淮揚徐河海並溢冬十月决囚嘉靖季年崇奉元修又好祥瑞遇事輒停刑至是審録重囚至四百餘人張居正言縱釋有罪無以懲惡請如祖宗舊制每嵗一決囚從之時承平久羣盗蝟起至入城市刦府庫有司恒諱之居正嚴其禁匿弗舉者雖循吏必黜得盗即斬决有司莫敢餙情盗賊為衰止乙亥三年春正月徙遼東六堡遼陽鎮東二百餘里舊有六堡其地不毛與遼陽聲援不接李成梁請移建孤山堡于章齊喀喇舊作張其哈剌今改甸在遼陽東南亦曰新甸險山堡于寛甸亦在遼陽東南沿江新安等四堡于長甸長嶺俱在寛甸南諸處仍以孤山險山二叅將戍之其地並據膏腴扼要害可拓境七八百里益收耕牧之利廷議從之二月始命日講官記注起居太祖初設起居注給事中尋罷至是始命日講官分直記注起居簒輯章奏臨朝侍班時編修張位以前代皆有起居注而本朝獨無乃上言臣備員簒修竊見先朝政事自非出于詔令形諸章疏悉湮没無考鴻猷茂烈鬱而未章徒使野史流傅用偽亂真今史官充位無以自効宜日分數人入直凡詔旨起居朝端政務皆據見聞書之為他年實録之助張居正善其議遂有是命張位字明臣新建人夏四月己巳朔日食既秋八月以張四維字子維蒲州人為禮部尚書兼東閣大學士預機務張居正當國四維嵗時饋問居正不絶居正請增置閣臣引薦四維遂入贊機務故事入内閣者曰同某人等辦事至是直曰隨元輔居正等辦事于是四維恂恂若屬吏然不敢以僚自處隨居正後拜賜進官而已河決碭山江浙頻嵗水潦為災是年五月淮揚又大水詔察二府有司貪酷老疾者罷之至是河決碭山而北淮決高家堰注見前而東高郵湖在高郵州西北天長以東之水皆滙此逹于運河亦決清水潭口在高郵州北三十里淮城幾没徐邳山陽南北漂蕩千里河道淤淺阻漕者數年孝宗初漕臣白昻以運舟經甓社湖觸岸輒壊乃開復河于高郵隄東以避其險長四十里名曰康濟至是湖水決漕臣呉桂芳改挑康濟越河修復老隄河成名曰宏濟遂為永利見甓社湖與高郵湖相連亦名珠湖宋孫覺于湖上大珠光燭天因名呉桂芳字子實新建人九月禮部尚書萬士和罷士和初官庶吉士以忤嚴嵩改部曹累任按察布政使並著清節及官尚書多所條奏時張居正欲越例贈朱希忠王爵馮保為方士求官士和俱力持不可又給事中余懋學字行之婺源人以言事得罪懋學請行寛大之政而居正方務綜覈以為風已遂斥為民及居正殁復故官士和言直臣不當斥由是積忤居正給事中朱南雍浙江山陰人承風劾之遂謝病歸後居正殁屢召不起卒諡文恭地震冬十月再震丙子四年春正月下巡按遼東御史劉臺字子畏安福人于獄除名為民時御史在外每凌巡撫張居正欲痛抑之事小不合詰責隨下又飭其長加考察以故言路多不平㑹臺奏遼東大㨗居正以巡按不得報軍功劾臺違制妄奏引故事繩督之臺遂抗章劾居正尃擅威福如逐大學士高拱私贈成國公朱希忠王爵引用張瀚先是吏部尚書楊博罷廷推葛守禮朱及瀚瀚資望最淺居正惡守禮戅厭驕乃㧞用瀚張四維為黨斥逐言官余懋學傅應禎應禎疏陳重君徳蘇民困開言路三事居正以疏中有王安石誤宋之語怒其侵己調旨切責下獄杖戌未幾召還應禎字公善安福人等罔上行私横黷無厭居正怒甚具疏辭政入見帝言言者謂臣擅威福而臣所行正威福也將巽順以悦下耶則誤國將竭忠以事上邪無以逃尃擅之譏因俯伏泣不肯起帝為下御座以手掖居正曰先生起吾逮臺竟其事遂下臺詔獄命廷杖百逺戌之居正具疏救乃除名為民久之復用他事戌潯州臺按遼東時與巡撫張學顔不相得至是學顔為戸部誣臺私贖錢居正屬御史于應昌巡按遼東覈之而令王宗載巡撫江西亷臺里中事應昌載宗希居正意實其事以聞張學顔字子愚肥鄉人未幾飲于戌主所歸而暴卒後御史江東之訟臺寃詔復官天啟初追諡毅思江東之字長信歙人二月開草灣河注見前督漕侍郎呉桂芳上言淮揚洪潦奔衝縁海汊港久湮入海止雲梯闗在山陽縣東北二百里大河北岸一徑致海擁横沙河流汎濫而鹽鹽城安安東高高郵注俱見前寶寳應唐縣令屬揚州府屢成巨浸國家轉運惟知急漕而不暇急民故朝廷設官亦主治河而不知海今黄河衝決駸駸欲奪安東以入海請于草灣低窪之地挑新口以迎大溜安東衆流滙圍其勢垂䧟不如委之以拯全淮廷議安東未可棄而命開草灣閲七月工竣水患稍平其後通塞不時至十七年大河復由此分流奪正流十分之七凡六十里至安東南赤宴廟仍合正河夏五月命司禮太監馮保同法司録囚秋七月詔户部明年漕糧折收十之三從張居正請也先是漕舟以河決不時至已而漕運通居正以嵗嵗逾春發水横溢非決即涸乃采漕臣議督糧卒以孟冬兑運及嵗初畢發少罹水患行之久太倉粟充盈可支十年八月帝視國子監河決崔鎮在桃源縣西北是年二月以後江北旱河水㫁流至是徐豐沛睢寕金鄉魚臺單曹八州縣河又大決田廬漂没無算河流齧宿遷城呉桂芳請遷縣治築土城以避之明年復决而北清口淤墊全淮南徙瀰漫山陽高寶間㑹河向桃源元置桃園縣明曰桃源今縣屬淮安府三義鎮在縣東舊名三汊鎮入老黄河故道明史河渠志黄河目桃源三義鎮歴清河縣北至大河口㑹淮入海是為老黄河至嘉靖初三義鎮口淤而黄河改趨清河縣南與淮㑹于是大河口故道遂廢淮水乘虚入清口老黄河復塞丁丑五年春二月廣東羅旁叛猺今廣東羅定州明為瀧水縣屬徳慶州其南有廢瀧水鎮舊為羅旁地猺人盤據于此平羅旁在徳慶州上下江界上江謂西江下江謂南江西江即鬱水南江即瀧水也鬱水注見前瀧水在羅定州西飛瀑驚湍最為險阨東西兩山間東山在肇慶府封川縣東西山在羅定州東安縣西南延袤七百里成化中韓雍經略西山頗安輯惟山東猺深箐剽掠有司嵗發卒戌守兩廣總督殷正茂字養實歙人建議大征㑹遷去侍郎凌雲翼字洋山太倉州人代至是雲翼乃大集兵令總兵官張元勲字世臣浙江太平人李錫將之四閲月克巢五百六十俘斬招䧏四萬二千八百有竒鄰境猺獞皆懼求撫雲翼奏改瀧水縣為羅定州又設東安西寕二縣設監司叅將積患頓平先是殷正茂令總兵官俞大猷討平廣西古田獞韋銀豹等改古田為永寕州及是雲翼既平羅旁復勦捕諸山賊之不靖者由是嶺表畧定夏四月兵部尚書譚綸卒諡襄敏綸沉毅知兵初守台州禦倭有功累擢巡撫朝廷倚以辦賊遇警輒調居官無寧嵗先撫福建繼撫四川進撫兩廣前後積首功二萬一千有竒後督師薊遼集兵三萬更徵浙兵三千專屬戚繼光訓練相度邊隘衝緩道里逺近分薊鎮為十二路路置一將互為犄角邊備大飭敵不敢入犯帝即位初進兵部尚書三疏乞歸不允至是卒綸始終兵事垂三十年與戚繼光共事齊名稱譚戚秋閏八月乙酉朔日食不見九月張居正以父喪起復冬十月杖編修呉中行字子道武進人等謫戍有差居正父卒帝與兩宫遣中使慰問絡繹道路然未嘗有意留之而居正自以握權久恐一旦去他人且謀已㑹户部侍郎李幼孜應城人欲媚居正首倡奪情議馮保亦不欲居正去中旨令吏部尚書張瀚諭留居正居正乃陽上書請守制而陰以牘風瀚覆㫖瀚謬為不喻謂政府奔喪宜予殊典禮部事也何闗吏部居正復令客説之不為動乃傳旨責瀚久不奉詔無人臣禮勒致仕瀚先附居正得掌吏部見非于世至是忤之去士論皆重瀚于是請留者相繼編修呉中行檢討趙用賢字汝師常熟人上疏爭之已而員外郎艾穆字和父平江人主事沈思孝字純父秀水人亦合疏言居正貪位忘親居正大怒謀于馮保欲廷杖之學士王錫爵字元馭太倉人等求解于居正不得錫爵獨造喪次切言之居正勃窣下拜索刀作刎頸狀曰爾殺我爾殺我徑入不顧侍講于慎行字無垢東阿人田一㒞字徳萬大田人張位趙志臯字汝邁蘭谿人修撰習孔教廬陵人沈懋學字君典宣城人皆疏救格不入遂杖中行等四人謫戌進士鄒元標字爾瞻吉水人復上疏爭亦坐杖戍南京御史朱鴻模字文甫益都人馳疏救中行等五人并斥為民于是錫爵慎行一㒞懋學先後移病歸詔遣居正子編修嗣修與司禮太監魏朝馳傳往代司喪禮部主事唐詰治祭工部主事徐應聘治喪居正請無造朝以青衣素服角帶入閣治事許之彗星見從東南方起長亘天人情洶洶指目張居正至懸謗書通衢帝詔諭羣臣再及者誅無赦謗乃已兵部尚書王崇古罷初諳逹諸部嘗越甘肅掠西番境既通欵其從孫徹辰台吉舊作乞盡台吉今改後仿此連嵗盗番不得志求諳逹西援崇古每作書止之是年諳逹請赴青海迎佛崇古上言西行非諳逹意且以迎佛為名不可阻宜飭邊鎮嚴守備而陰洩其謀于番族以示恩給事中劉鉉鄱陽人尹瑾東莞人等交章劾崇古弛防徇敵崇古奏辯因乞休去崇古身歴七鎮勲著邊陲封貢之初廷議紛呶有為危言以撼帝者閣臣力持之乃得成功自順義歸欵後二十年崇古乃殁諡襄毅十一月考察百官張居正自奪情後知天下不與己思以威權劫之時因星變考察百官趙志臯張位習孔教相繼遷謫南京僉都御史張岳字汝宗餘姚人請令居正奔喪坐考察自陳貶秩禮部尚書何維栢維栢于嘉靖時以劾嚴嵩得罪隆慶初復官累遷尚書亦以自陳免先是奪情議起張瀚叩維栢維栢曰天經地義何可廢也翰從之居正怒奪維栢俸因追論羅倫議李賢奪情斥為小豎子聞者莫不訝之戊寅六年春二月以潘季馴總理河漕先是總河傅希摰衡水人欲塞决口呉桂芳主開老黄河故道議未决有言宜多濬海口以分水勢者㑹桂芳卒以季馴代之季馴相度水勢言海口自雲梯闗四套以下濶七八里至十餘里深三四丈欲别議聞鑿必須深濶相類方可注放工力甚難且未至海口乾地猶可施工其將入海之地潮汐往來與舊口等耳舊口皆係積沙人力雖不可濬水力自能衝刷海無可濬之理惟當導河歸海則以水治水即濬海之策也河亦非可以人力導惟當繕治隄防俾無旁决則水由地中沙隨水去即導河之策也頻年以來日以繕隄為事顧卑薄而不能支迫近而不能容雜以浮沙而不能久是以河決崔鎮水多北潰為無隄也淮決高家堰黄浦口水多東潰隄弗固也不咎制之未備而咎作隄為下策豈通論哉上流既旁潰又岐下流而分之其趨雲梯入海口者譬猶强弩之末耳水勢益分則力益弱安能導積沙以注海故今日濬海急務必先塞決以導河尤當固隄以杜决而欲隄之不決必真土而勿雜浮沙高厚而勿惜鉅費讓逺而勿與爭地則隄乃可固也沿河隄固而崔鎮口塞則黄不旁决而衝漕力專高家堰築朱家口塞則淮不旁決而㑹黄力専淮黄既合自有控海之勢又懼其分而力弱也必暫塞江浦河而嚴司啟閉以防内奔姑置草灣河而尃復雲梯以還其故道仍接築淮安新城長隄以防其末流使淮黄力全涓滴悉趨于海則力强且尃下流之積沙自去海不濬而闢河不挑而深所謂固隄即以導河導河即以濬海也又言黄水入徐歴邳宿桃清至清口㑹河而東入海淮水及鳯歴盱泗至清口㑹河而入海此兩河故道也元漕江南粟則由揚州直北廟灣入海未嘗遡淮陳瑄始隄管家諸河通淮為運道慮淮水漲溢則築高家堰隄以捍之起武家墩經大小澗至阜寕湖而淮不東侵又慮黄河漲溢則隄新城北以捍之起清江浦沿鉢池山栁蒲灣迤東而黄不南侵其後隄岸漸傾水從高堰决入淮郡直同魚鼈而當事者未考其故謂海口壅閉宜急穿支渠詎知草灣一開西橋以上正河遂致淤阻夫新河濶二十餘丈深僅丈許較故道僅三十之一豈能受全河之水下流既壅上流自潰此崔鎮諸口所由決也今新河復塞故道漸已通流雖深濶未及原河十一而兩河全下沙隨水刷欲其全復河身不難也河身既復濶者七八里狹者亦三四百丈滔滔東下河水不容非惟不必别鑿他所而草灣亦可勿濬矣故為今計惟修復陳瑄故蹟高築南北兩隄以㫁兩河之内灌則淮揚昏墊可免塞黄浦口築寶應隄濬東闗等淺修五閘復五壩則淮南運道無虞堅塞桃源以下崔鎮口諸決則全河可歸故道黄淮既無旁決並驅入海則沙隨水刷海口自復而桃清淺阻又不足言此以水治水之道也廟灣注見前武家墩在山陽縣西南鉢池山在山陽縣西北栁蒲灣在山陽縣東北因條上六議曰塞決口以挽正河曰築隄防以杜潰決曰復牐壩以防外河曰創滚水壩以固隄岸曰止濬海工程以省糜費曰寢開老黄河之議以仍利涉帝悉從其請乃塞崔鎮等決口百三十築高家堰隄六十餘里歸仁集在徐州府宿遷縣南隄四十餘里栁蒲灣隄東西七十餘里自徐沛至淮揚間遥隄縷隄滚水減水壩牐無不修築逾年工成自後數年河道無大患立皇后王氏餘姚人先是帝大婚届期慈聖太后將歸慈寕宫諭張居正曰吾不能視皇帝朝夕師保之責尃恃先生尋以居正充納采問名副使吉服從事給事中李淶字源甫雩都人言大婚重典而使居正變服從吉于觀聽不宜乞别簡用不聽三月以禮部尚書馬自强字體乾同州人兼文淵閣大學士吏部侍郎申時行字汝黙長洲人兼東閣大學士並預機務張居正請增置閣臣居正將歸塟父恐高拱殷士儋復出故有是請令居正推擇居正以自强有人望而時行又其所厚遂薦用之自强負伉直名素忤居正不自意得之頗徳居正既入閣守位而已是冬十月自强卒張居正葬父歸夏六月還朝帝大婚後居正乞歸葬父許之賜帝賚忠良銀章如楊士竒張孚敬例得密封言事敕吕調陽等有大事勿尃決馳驛之荆州聽居正處分㑹遼東奏大㨗帝復歸功居正使使馳諭俾定爵賞居正為條列以聞既畢葬且還朝居正上言母老不能冒炎暑請俟秋涼就道帝遣錦衣指揮翟汝敬馳傳往趣之而令中官䕶其母由水道行居正所過守臣率長跪撫按長吏越界迎送身為前驅道經襄陽南陽襄王唐王出候設宴具賓主禮及抵京兩宫慰勞懇篤賞賚有加母至亦如之秋七月吕調陽罷張居正歸後閣事皆送裁决調陽内慚堅卧累疏乞休不出及居正還遂致仕詔選内豎三千五百人冬十二月高拱卒復其官諡文襄拱家居數年及是卒張居正請復其官與祭葬如例馮保憾未釋中旨給半葬祭文仍寓貶詞云拱初在吏部遍識諸司賢否倉卒舉用皆得人又以時方棘邊事請増置兵部侍郎由侍郎而總督而本兵中外迭居邊材自裕更取名邊地之人以備司屬如銓司分省故事皆報可及諳逹封貢拱力主王崇古議邊得休息卒後久之廷議頌其功乃贈太師賜諡封李成梁寕逺伯土默特與從父哈斯垣舊作黒石炭弟大小衛徴舊作委政從弟諾木圖舊作煖土恭圖舊作拱土子布延台珠爾舊作卜言台周從子黄台吉及泰寕部長蘇巴爾噶舊作把速亥綽哈舊作炒花今並改等頻入犯成梁屢擊却之論功世廕思賚稠叠至是蘇巴爾噶綽哈糾土黙特黄台吉等以三萬餘騎壁遼河攻東昌堡方輿紀要堡在海州衛東南海州衛今奉天府海城縣是深入耀州遼置今廢故城在海城縣西南成梁遣諸將分屯要害以遏之而親提鋭卒出塞二百餘里斬其長九人餘首級八百四十㨗聞帝告謝郊廟封成梁寕逺伯成梁故驍悍善戰㑹張居正當國毎奏㨗輒張大其功遂得封伯戸部奏是嵗天下户口之數戸一千六十二萬一千四百三十六口六千六十九萬二千八百五十六己夘七年春正月毁天下書院時士大夫競講學張居正特惡之盡改各省書院為公廨夏四月張居正上肅雝殿箴帝漸備六宫多宣索太倉銀購珠寳居正言嵗入則減于舊嵗出則浮于前請量入為出罷節浮費因進肅雝殿箴帝嘉納焉一日帝御文華殿居正侍講讀畢以給事中所上災傷疏聞因請賑復言上愛民如子而在外諸司營私背公剥民罔上宜痛鉗以法而上亦當加意撙節于宫中一切用度服御賞賚布施裁省禁止帝首肯之秋八月減均徭加派國初役法有里甲均徭雜泛三等以戸計曰甲役以丁計曰徭役上命非時曰雜役皆有力役有雇役府州縣騐冊丁口多寡事産厚薄以均適其力自嘉靖以來行一條鞭法其法總括一州縣之賦役量地計丁丁糧畢輸于官一嵗之役官為僉募力差則計其工食之費量為増減銀差則計其交納之費加以贈耗凡額辦派辦京庫嵗需與存留供億諸費以及土貢方物悉併為一條皆計畆徵銀折辦于官故謂之一條鞭頗稱簡便然諸役冗費名罷實存有司追徴如故百姓苦之至是詔減銀一百三十萬有竒庚辰八年春二月辛未朔日食三月帝奉兩宫太后謁陵天壽山張居正乞罷詔慰留之居正扈帝謁陵歸具疏乞休中云拜手稽首歸政帝顧居正益重賜札稱元輔或稱先生或又稱元輔少師先生待以師禮而居正奏謝亦儼然自負為帝者師凡再上帝慰留懇切最後手書稱慈聖口諭先生親受先帝付託豈忍言去俟輔爾嵗至三十而後商處先生母復興此念居正乃出初居正子敬修嗣修懋修先後領鄉薦帝改元之二年敬修㑹試不第居正怒因停是科館選至五年嗣修遂以第二人及第是年復當㑹試懋修敬修皆中式㑹居正方乞休遂特擢懋修第一人及第自居正私其子連舉上第而他輔臣吕調陽張四維申時行之子亦皆先後成進士御史魏允貞疏陳時弊請自今輔臣子弟中式俟致政後始許廷對帝以允貞言過當謫于外然自是輔臣居位其子無復登第者矣魏允貞字懋忠南康人夏四月迤東都督王烏塔舊作兀堂今改冦邊李成梁擊敗之烏塔通市寛甸怨邊將强抑市價數遣零騎侵邊犯靉陽堡名在鳯凰城北及黄岡嶺指揮王宗義戰死遂入永佃堡在鳯凰城東成梁擊走之追出塞斬首八百餘級盡毁其營壘至秋復犯寛甸副將姚大節又破之烏塔由是不振六月南畿大水秋七月後軍都督府僉事俞大猷卒諡武襄先是大猷以平古田獞功進世廕已為巡按御史所劾囘籍聽調久之復以都督僉事起僉書後府事領車營訓練三疏乞歸卒贈左都督大猷少好易嘗以易推衍兵家竒正虚實之權謂兵法之數起五猶一人之身有五體雖將百萬可使合為一人也初為汀漳守備涖武平作讀易軒與諸生為文㑹而日教武士擊劍及為大將持身亷馭下有恩數建大功威名振南服其用兵先計後戰不貪近功忠誠許國老而彌篤譚綸嘗與書曰節制精明公不如綸信賞必罰公不如戚精悍馳騁公不如劉然此皆小知而公則堪大受戚謂戚繼光劉謂劉顯也其為綸所推重如此冬十月汰冗官先是詔南京職務清簡官不必備至是盡汰内外冗員並覈各省徭賦及諸司冒濫冗費皆從張居正請也十一月度民田初建昌知府許孚逺字孟中徳清人始為歸戸冊以田從人法簡而密後張居正議天下田畝通行丈量遂用開方法以徑圍乘除畸零截補于是豪猾不得欺隠里甲免賠累而小民無虛糧總計田七百一萬三千九百七十六頃視孝宗時贏三百萬頃居正頗以溢額為功有司短縮步弓以求田多或掊克見田以充虚額後遂按溢額增賦詔内官並自陳斥逐有差帝即位初慈聖太后遇帝嚴太監馮保倚太后勢數挾持帝帝甚畏之已而小璫孫海客用導帝戯游二人屢誘帝夜游别宫小衣窄袖走馬持刀又數進竒巧之物帝深寵幸保言于太后后召帝切責帝長跪受教惶懼甚保屬張居正草帝罪已手詔頒示閣臣詞過抑損帝年已十八覽之内慚然迫于太后不得不下居正乃上疏切諫又縁保意劾去司禮巨璫孫徳季温泰等而令諸内侍俱自陳凡保所不悦者斥退殆盡帝由是漸惡保并亦嗛居正矣保竊權肆横間亦時引大體内閣産白蓮翰林院有雙白燕居正以為瑞進之保使使語居正曰主上冲年不可以異物啟其玩好又頗能約束其子弟不敢肆惡人亦以是稱之然保性貪其私又錦衣指揮徐爵内官張大受恃勢權利居正使蒼頭游七與爵結為兄弟交闗語言凡有所謀皆縁以逹焉辛巳九年春正月命翰林官分番入直以張居正請日用翰林官四人入直應制詩文及備顧問帝初政居正嘗纂古今治亂事百餘條繪圖以俗語解之使帝易曉至是復屬儒臣紀太祖列聖寳訓實録分類成書凡四十類請以經筵之暇進講帝從之三月大閲夏四月戎政尚書方逢時罷逢時才畧明練處置邊事悉協機宜先是五年以宣大總督召理戎政時議者爭言貢市利害逢時疏言北部輸誠效貢莫敢渝約嵗時請求隨宜與之輒稽首歡笑有掠人要賞者告諳逹討治即俛首聴命而異議者或曰敵使充斥日益耗費或曰與冦益狎隠憂叵測均未覩事機之論也今計三鎮嵗費二十七萬較之向時十纔二三而民間耕穫之人市價之利不與焉方隆慶庚午以前三軍暴骨萬姓流離邊臣首領不保朝廷為之旰食七八年來幸無此事矣所不可知者諳逹老且死數年之後諸部無所統一狡黠爭搆或行侵擾在我亦惟罷貢市固壁壘以待仍禁邊將無輕舉使曲常在彼直常在我因機處宜顧方畧何如耳封疆之事無常形何必貢市非而戰守是哉至是以老病乞休去其功名與王崇古相亞世稱方王土黙特犯遼陽副總兵曹簠敗績先是土黙特以二萬餘騎入攻錦州叅將熊朝臣固守而遣部將出戰皆殁敵乃分掠小凌河在錦州府錦縣東亦名錦川松山在錦縣南杏山在錦縣西南㑹李成梁馳援始出境已而土黙特復與諸酋聚兵塞下謀入廣寕成梁率輕騎從大寕堡在錦州府義州東北出塞四百餘里擊之敵大敗走至是復入遼陽簠出禦之遇伏失千總陳鵬以下三百十七人馬死者四百六十匹土黙特遂大掠人畜而去京師旱南畿饑張居正上言淮鳯蘇松連被災傷徐宿間至以樹皮充饑或聚為盗昔元末之亂亦起于此當破格賑之陛下宜撙節宫中耗費嘉靖朝用最浩繁内庫尚有餘積今已增額猶稱缺乏有限之財安能供無窮之用帝嘉納之居正以江南貴豪怙勢及諸奸猾吏民善逋賦乃選大吏精悍者嚴行督責賦以時輸國藏乃日益充裕五月盡賣民間種馬國初馬有官牧有民牧官牧給邊鎮民牧給京軍皆有孳生駒給草塲以資芻牧後尃牧于民視丁田授馬始曰戸馬既曰種馬按嵗徴駒種馬死孳生不及數輒賠補自豪右莊田占草塲馬戸漸多逃竄穆宗從太僕少卿武金議賣種馬之半金言種馬之設尃為孳生備用備用馬既别買則種馬可遂省今備用馬既足三萬宜令每馬折銀三十兩解太僕種馬盡賣輸兵部一馬十兩則直𨽻山東河南十二萬匹可得銀百二十萬且收草豆銀二十四萬御史謝廷傑謂祖制所定闗軍機不可廢兵部是廷傑言而是時内帑乏竭方分使括天下逋賦穆宗遂可金奏下部議請養賣各半從之至是以互市饒馬盡賣之上馬八兩下至五兩又折徴草塲地租銀以供圑營買馬及各邊之請迨帝末年師役繁興往往借支太僕銀久之銀與馬兩竭冏政大壞御批歴代通鑑輯覽卷一百十

front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷四十四南北朝丁梁大清元年魏大統十卯三年東魏武定五年春正月己亥朔日食
  hash: sha256:0299db58a18f89baa24f346ad2e11dca6d0a656e01562efb0a23ba31f77d31cf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_043-1a, image: WYG0336/WYG0336-0484a.png}
body:
  text: 不盡如鈎梁以湘東王繹為荆州刺史初繹為荆州有微過廬陵王續代之以狀聞至是續卒繹聞之喜入閣而躍屧為之破梁主復以繹刺荆州東魏大丞相勃海王髙歡卒綱目于髙歡宇文泰之卒俱具官爵與曹操司馬懿同例今依之先是髙歡病使太原公洋鎮鄴而徴世子澄赴晉陽至是病篤謂澄曰侯景専制河南十四年矣常有飛揚跋扈之志顧我能畜養非汝所能駕馭也今四方未定勿遽發哀庫狄千斛律金並性遒直終不負汝堪敵侯景者惟有慕容紹宗我故不貴之留以遺汝又曰假孝先忠亮仁厚智勇兼備軍旅大事宜共籌之遂卒歡性深密終日儼然人不能測馭軍嚴肅聽斷明寮雅尚儉素刀劒鞍勒無金玉之飾及卒澄祕不發喪惟行臺丞陳元康知之東魏大行臺侯景以河南降魏二月景復以河南叛附於梁梁封景為河南王遣兵援之景聞歡病篤用其行臺郎王偉潁川人計擁兵自固歡卒遂以河南降魏景右足偏短弓馬非其長而多謀算諸將高敖曹彭樂等皆勇冠一時景常輕之睿言於髙歡願得兵三萬橫行天下要須濟江縛取蕭衍老公以為太平寺主歡使將兵十萬専制河南景素輕髙澄嘗曰高王在吾不敢有異王沒吾不能與鮮卑小兒共事矣及歡疾篤澄詐為歡書以召景先是景與歡約曰今握兵在逺人易為詐所賜書背請加微㸃至是景得書無㸃辭不至遂叛魏以景為太傅大行臺景執豫襄廣州注俱見前刺史潛遣兵襲西兖州魏置治定陶刺史邢子才掩捕獲之因散檄東方諸州各為之備高澄遣韓軌字伯年太安狄那人督諸軍討之二月景又遣郎中丁和奉表於梁請舉河南十三州豫廣預荆襄兖南兖濟東豫洛陽北荆北揚魏北荆州治陸軍北揚州治項城餘注俱見前內附梁主召羣臣廷議僕射謝舉字言揚朏弟渝之子等皆曰頃與魏和邊境無事不宜納其叛臣梁主曰機會難得豈宜膠柱先是正月乙卯梁主夢中原牧守皆以地來降旦見朱异告之异曰此宇內渾一之兆也及丁和至稱景定訃寶以正月乙卯梁主愈神之然意猶未決嘗獨言我國家如金甌無一傷缺今忽受景地詎是事宜脫至紛紜悔之何及朱异揣知梁主意對曰今景分魏土之半以來自非天誘其𠂻何以至此若拒而不納恐絶後來之望願陛下無疑梁主從之梁主以景為大將軍封河南王都督河南北諸軍事遣司州刺史羊鴉仁字孝穆泰山巨平人督兖州桓和仁州梁置治赤坎故城在今鳯陽府靈壁縣湛海珍等將兵三萬趣懸瓠以應之平西咨議周𢎞正吾占侯前此謂人曰國家數年後當有兵起及聞納景曰亂階在此矣三月梁主復捨身於同泰寺梁主至是三捨身矣羣臣奉贖如大通故事夏四月東魏髙澄如鄴澄慮諸州有變乃自出巡撫因朝于鄴東魏主與之宴澄起舞識者知其不終胡氏三省曰昔周景王喪太子及后以喪賓宴叔向知其不終今高澄喪父死由未寒忘哀從欒尚為有人心乎六月東魏遣兵討侯景魏遣兵救之徴景入朝景不受命魏師乃還東魏髙澄遣將軍元柱等將兵數萬襲景大敗景以梁羊鴉仁等軍猶未至乃退保頴川東魏復遣韓軌等兵圍之景懼割東荆北兖胡三省注當作北荆魯陽長社四城賂魏以求救僕射于謹曰景姦詐難測未可遣兵荆州刺史王思政以為不若因機進取即引兵自魯陽向陽翟宇文泰聞之遣太尉李弼儀同趙貴將兵赴潁川韓軌等聞魏師將至引兵還鄴景欲因會執弼與貴而奪其軍貴疑之不往欲誘景入營執之弼止之羊鴉仁遣兵至汝水弼等引兵還長安王思政入據潁川景引軍出屯懸瓠復使乞兵於魏宇文泰遺同軌西魏郡隋廢故城在今河南府永寧縣防主韋法保名祐以字行京兆山北人等將兵助之召景入朝景因叛計未成厚撫法保等辭不赴先是左丞王悅言于泰曰景既能背德于髙氏豈肯盡節于朝廷今益之以兵竊恐朝廷貽笑將來也法保長史裴寬亦曰侯景狡詐必不入關欲托欵于公恐未可信若伏兵斬之亦一時之功也不爾即應深為之備法保然之遂辭還鎮王思政亦覺其詐分布諸軍據景各州鎮至是景果辭不入朝王悅字衆喜藍田人泰召諸軍還以思政都督河南諸軍事景遂決意降梁羊鴉仁遂入懸瓠高澄以書諭景使還許以豫州刺史還其妻子景不聼秋七月梁遣貞陽侯淵明字靖通長沙王懿之子督諸將侵東魏梁主下詔大舉伐東魏欲以鄱陽王範字世儀忠烈王恢之子為元帥朱异曰鄱陽雄豪蓋世得人死力然所至殘暴非弔民之才且陛下昔登北顧亭在今鎮江府丹徒縣北固山上謂江右有反氣骨肉為戎首今冝詳擇梁主曰會理字長才南康王續之子何如對曰陛下得之矣遂以會理與貞陽侯淵明分督諸將會理庸懦驕倨不禮淵明淵明密告朱异追還代之東魏髙澄還晉陽自為都督中外諸軍録尚書事勃海王髙澄將歸晉陽以其弟洋為京畿大都督留鄴遂歸發喪東魏主贈歡相國齊王備九錫殊禮諡曰獻武以澄為大丞相督中外録尚書事澄辭丞相許之澄虛葬歡于漳水之西而潛鑿山石窟佛寺之旁為穴納其柩而塞之殺羣匠及齊亡一匠之子知之發石取金而逃宇鼓山在彰德府武安縣南寰記山有石鼓二鳴則兵起東魏髙澄入鄴幽其主於宫中殺侍講荀濟字子通潁川人等而還東魏主多力善射好文學時人以為有孝文風烈髙澄深忌之使崔季舒察魏主動靜始髙歡自病逐君之醜事魏主禮甚莽事無大小必以聞可否聼㫖每侍宴俯伏上夀魏主設法會乘輦行香歡執香爐步從鞠躬屏氣承望顔色及澄當國倨傲特甚澄嘗侍宴舉大觴屬魏主魏主不勝忿曰自古無不亡之國朕亦何用此生為澄怒罵使季舒拳毆魏主奮衣而出魏主不堪憂辱詠謝靈運詩曰韓亡子房奮秦帝魯連恥侍講荀濟知魏主意乃與祠部郎中元瑾華山王大器鷙之子等謀誅澄於宫中作土山開地道向北城至於秋門門者覺之以告澄澄勒兵入宫見魏主不拜而坐曰陛下何意反魏主正色曰自古惟聞臣反君未聞君反臣必欲弒逆緩速在王澄乃下牀叩頭大啼謝罪居三日幽魏主於含章堂烹濟等於市遂還晉陽濟少居江東博學能文與梁主有布衣之舊知梁主有大志然負氣不服常謂人曰會於盾鼻上磨墨檄之梁主甚不平及即位或薦之梁主曰亂俗好反不可用也濟上書諫梁主崇信佛去塔寺奢費梁主大怒欲斬之未异密告之濟逃奔東魏澄以為侍講及敗下辨曰自傷年紀摧頺功名不立故欲挾天子誅權臣澄欲宥其死親問之曰荀公何意反濟曰奉詔誅髙澄何反邪逐烹之九月梁堰泗水及東魏彭城冬十一月東魏行臺慕容紹宗擊敗之獲蕭淵明梁主命侍中羊侃與淵明堰泗水于寒山在今徐州府銅山縣東南以灌彭城俟得彭城乃進軍與侯景掎角東魏遣大都督髙嶽救彭城欲以潘樂字相貴廣寧石門人為副陳元康曰樂緩於機變不如慕容紹宗且先王之命也乃以紹宗為東南道行臺與嶽偕行景聞紹宗來叩鞍有懼色曰誰教鮮卑兒解遣紹宗來若然髙王定未死邪紹宗帥衆十萬據槖駝峴在銅山縣北羊侃勸淵明乘其逺來擊之不從侃乃帥所領出屯堰上紹宗至攻營淵明醉不能起諸將皆不敢出兖州刺史胡貴孫獨帥麾下與戰斬首二百東魏兵敗走初景常戒梁人曰逐北不過二里紹宗將戰以梁人輕悍恐其衆不能支引將卒謂之曰我當陽退誘吳兒使前爾擊其背至是梁人不用景言乘勝深入東魏將卒以紹宗之言為信掩擊之梁兵大敗淵明貴孫皆為所虜失亡士卒數萬人羊侃結陳徐還梁主聞之驚駭幾欲墮牀歎曰吾得無復為晉家乎高澄使軍司杜弼作檄移梁朝略曰侯景以鄙俚之夫遭風雲之會位班三事邑啓萬家而離披不已意亦可見彼乃授之以利器誨之以慢藏使其勢得容奸時堪乘便終恐倔彊不掉狼戾難馴橫使江淮士子荆揚人物死亡矢石之下天折霧露之中彼梁主者輕險有素老耄及之用舍乖方廢立戾所矯情動俗飾智驚愚毒螫滿懷妄敦戒業災異降于上怨讟興于下傳險躁之風俗任輕薄之子孫朋黨路開兵權在外必將禍生骨肉釁起腹心外奔中潰今實其時其後梁室禍敗皆如弼言杜弼字輔元中山曲陽人十二月梁立元貞魏故咸陽王禧之孫為咸陽王侯景遣王偉說梁主曰髙澄幽元善見於金墉殺諸元六十餘人河北物情俱念其主請立元氏一人以從人望則陛下有繼絶之名臣景有立功之效梁主然之乃以太子舍人元貞為咸陽王初貞父樹南奔已而北還被殺貞遂留梁資以兵力貞渡江即位儀衛以乘輿之副給之侯景敗東魏兵於渦陽慕容紹宗既敗淵明遂引軍擊侯景景退保渦陽紹宗士卒十萬鳴鼓長驅而進景命戰士皆被短甲執短刀入東魏陳但低視斫人脛馬足東魏兵遂敗紹宗奔譙城裨將斛律光字明月金之子張恃顯復進軍渦水亦不利而還戊梁太清二年魏大統十辰四年東魏武定六年春正月東魏慕容紹宗擊侯景景衆潰走襲據夀春南史作夀陽考夀陽本夀春晉更名魏復舊故南北朝二名每互稱梁以為南豫州牧慕容紹宗以鐵騎五千夾擊侯景景誑其衆曰汝家屬己為高澄所殺衆信之紹宗遙呼曰汝家屬並完若歸官勳如舊景士卒不樂南渡遂大潰景與數騎自硤石濟淮稍收散卒得步騎八百人晝夜兼行追軍不敢逼使謂紹宗曰景若就擒公復何用紹宗乃縱之景奔至夀春紿梁監南豫州事韋黯字務直睿之子開門納之遂據其城馬頭戊主劉神茂素為黷所不容聞景敗將至故往侯之景問曰夀陽去此不逺欲往投之韋黯其納我乎神茂曰黯監州耳王若至黯必出迎因而執之可以集事得城之後徐以啓聞朝廷喜王南歸必不責也景執其手曰天教也遂行夜至城下黯授甲登陴不納景謂神茂曰事不諧矣對曰黯懦而寡智可說下也乃遣夀陽人徐思玉入說黯黯不許思玉曰國家付君以閫外之略若魏兵追至河南王見殺君豈得獨存縱存何顔以見朝廷邪黯乃開門納景景遣其將分守四門詰責黯將斬之既而撫手大笑置酒極歡梁朝聞景敗咸以為憂詹事何敬容言於太子曰得景遂死深為朝廷之福太子失色問其故敬容曰景翻覆叛臣終當亂國景遣使以敗聞乞自貶梁主不許以景為南豫州牧光祿大夫蕭介諌曰侯景以凶狡之才荷髙歡卯翼之遇歡墳土未乾即還反噬逆力不逮乃復逃死關西宇文不容故復投身于我陛下前者所以受之正欲比屬國降胡冀獲一戰之效耳今既亡師失地直是境上之匹夫陛下愛匹夫而棄與國臣竊不取若猶待其歲暮之效則彼棄鄉國如脫屣背君親如遺芥豈知逺慕聖德為江淮之統臣乎梁主歎其忠而不能用蕭介字茂鏡思話之孫正月東魏求成於梁高澄數遣書求好于梁梁主未之許澄乃令蕭淵明奉啓于梁先是淵明至鄴送于晉陽髙澄待之甚厚至是澄謂淵明曰若梁主不忘舊好諸人並即遣還侯景家屬亦當同遣于是淵明遣人奉啓還梁梁主與朝臣議之朱异等皆以為便司農卿傅岐字景平北地靈州人獨曰此髙澄設間欲令侯景自疑而作亂耳若許通好正墮其計中异等固執宜和梁主亦厭用兵乃許之使還過夀陽侯景知之攝問具服乃啓梁主曰髙澄忌賈在翟惡會居秦春秋晉靈公時隋會在秦賈季在翟晉人患之見左傳求盟請和冀除其患若臣死有益萬殞無辭惟恐千載有穢良史又致書於异餉金三百兩异納金而不通其啓梁主遂遣使弔澄景又啓曰臣與髙氏釁隙已深今陛下復與連和使臣何地自處梁主報之曰朕與公大義已定豈有成而相納敗而相棄乎景乃詐為鄴中書求以淵明易景梁主以朱异言復書曰貞陽旦至侯景夕返景謂左右曰我固知吳老公薄心腸王偉說景曰今坐聼亦死舉大事亦死唯王圖之於是始為反計夏五月梁遣散騎常侍徐陵字孝穆摛之子如東魏復修好也六月天裂於西北長十丈濶二丈光出如電其聲若雷秋七月庚寅朔日食八月梁侯景反夀春梁主遣邵陵王綸督諸軍討之侯景聞徐陵等使魏反謀益甚元貞知景有異志纍啓還朝景謂曰河北事雖不果江南何慮失之貞懼逃歸建康具以事聞梁主不問景知臨賀王正德屢以貪暴得罪隂養死士幸國家有變乃遣徐思玉致箋曰天子年尊姦臣亂國大王屬當儲二景雖不敏實思自效正德大喜報之曰僕為其內公為其外何有不濟機事在速今其時矣合州刺史鄱陽王範密啓景謀朱异以為必無此理梁主乃報範曰景孤危寄命安能反乎範復請自以合肥之衆討之梁主不許朱异謂其使曰王遂不許朝廷有一客耶自是不復通範啓景邀羊鴉仁同反鴉仁執其使以聞异曰景何能為以使者付獄俄解遣之景益無所憚啓梁主乞都督江西如不許即帥甲騎向閩越梁主遣使喻解之合州梁置治合肥景遂反于夀陽以誅中領軍朱异少府卿徐驎太子右衛率陸驗制局監周石珍為名驎驗皆吳郡人石珍丹陽人時謂之三蠧异等皆以驕佞驕貪蔽主弄權為時所疾故景託以興兵梁主聞景反笑曰是何能為吾折箠笞之耳詔以鄱陽王範封山侯正表臨川王宏子司州刺史柳仲禮慶逺之孫散騎常侍裴之高字如山邃兄子為四道都督邵陵王綸持節兼督衆軍以討景冬十月梁臨賀王正德叛引侯景兵渡江梁主命宣城王大器字仁宗太子綱長子將軍羊侃督軍禦之侯景聞臺軍討已問策於王偉偉曰邵陵若至必為所困不如决志東向直掩建康臨賀反其內大王攻其外天下不足定也兵貴神速今宜即進乃詐稱出獵十月襲譙州梁置今江南滁州是執刺史蕭泰攻歷陽太守莊鐵以城降說景速趨建康景乃以鐡為導引兵臨江梁主問䇿于尚書羊侃侃以一千人急據采石令邵陵王襲取夀陽使景進不得前退失巢穴烏合之衆自然瓦解朱异曰景必無渡江之志遂寢其議侃曰今兹敗矣梁主以正德督諸軍屯丹陽正德遣大船數十艘詐稱載荻密以濟景景遂自橫江濟於采石有馬數百匹兵八千人是夕梁朝始命戒嚴景分兵襲姑孰至慈湖建康大駭梁主悉以內外軍付太子以宣城王大器都督城內諸軍事羊侃為軍師將軍副之是時梁興四十七年境內無事賊至猝迫公私駭震軍旅指撝一決于侃侃膽力俱壯太子深仗之蕭正德引侯景圍梁臺城十一月景以正德稱帝景至朱雀桁南太子猶未知正德之情使守宣陽門庾信字子山肩吾子守朱雀門欲開大桁以挫賊鋒正德止之俄而景至信乃帥衆開桁見景軍皆鐵面遂棄軍走正德之黨復閉桁渡景正德帥衆迎之先是大同中童謡曰青絲白馬夀陽來至是景乘白馬青絲為轡欲以應謡云景軍乘勝至闕下城中恟懼羊侃詐稱得射書云邵陵王綸西昌侯淵藻援兵已至近路衆乃少安石頭降景景遣于子悅守之列兵繞臺城百道俱攻羊侃隨機禦之景作木驢數百攻城城上投石碎之景更為尖頂石不能破侃使作雉尾炬灌以膏蠟業擲焚之景攻既不克士卒死傷多乃築長圍以絶內外侃子鷟為景所獲執以示侃侃曰我傾宗報主猶恨不足豈計一子幸早殺之數日復持來侃引弓射之景以其忠義亦不之殺十一月朔正德即帝位以景為丞相景攻東府三日克之聲言梁主已殂雖城中亦以為然太子請梁主巡城衆心粗安先是景之濟江也南津校尉江子一欲以舟師邀景會其衆潰于一奔還梁主責之子一拜謝曰臣以身許國常恐不得其死今所部皆棄臣去臣以一夫安能擊賊若賊遂能至此臣誓當碎身以贖前罪至是與弟左丞子四東宫主帥子五帥所領百餘人開門出戰子一直抵賊營徑前刺賊從者不繼賊解其肩而死子四子五相謂曰與兄俱出何面獨旋皆免胄赴賊死臨川太守陳昕奉敕守采石未至而景濟已為景所擒欲用之昕不可景使其黨范桃棒囚之昕因說桃棒使殺王偉宋子仙而降桃棒從之潛遣昕夜縋入城梁主大喜鐫銀券賜桃棒許以封王即有景衆太子恐其詐召公卿會議不即開門俄而桃棒事泄景拉殺之陳昕不知如期而出景逼使射書城中言桃棒今入因𠂻甲隨之昕不肯期以必死景乃殺之之江子一字元亮濟陽考城人陳昕字君章慶之子梁荆州刺史湘東王繹移檄遣兵赴援荆州刺史湘東王繹移檄所督湘州刺史河東王譽雍州刺史嶽陽王察江州刺史當陽公大心字仁恕大器之弟郢州刺史南平王恪字敬則偉之子等發兵入援繹自將鋭卒三萬發江陵先是侯景募人奴降者悉免為良得朱异奴以為儀同三司使乘良馬衣錦袍于城下仰詬异曰汝五十年仕官方得中領軍我始事侯王已為儀同矣于是三日之中羣奴出就景者以千數景皆厚撫之爭為之致死至是异遺景書為陳禍福景報書并告城中士民曰梁至近歲以來權幸用事割剝齊民以供嗜欲公等試觀今日國家池苑王公第宅僧尼寺塔及在位庶僚姬姜百室僕從數千不耕不織錦衣玉食不奪百姓從何得之僕所以趨赴闕庭指誅權佞非傾社稷今城中指望四方入援吾觀王侯諸將志在全身誰能竭力致死與吾爭勝負哉梁邵陵王綸還軍赴援侯景擊之大潰邵陵王綸行至鍾離聞侯景已渡采石晝夜兼道旋軍入援遂率步騎三萬自京口西上景遣軍拒之前譙州刺使趙伯超曰若從黃城大路必與賊遇不如徑指鍾山在今江寧府上元縣東北亦曰蔣山吳孫權避祖諱更名突據廣莫門出賊不意城圍必解矣綸從之夜行失道迂二十餘里旦營于蔣山景見之大駭悉送所掠婦女珍寶于石頭具舟欲走分兵攻綸綸與戰破之景陳兵於覆舟山北綸進軍元武湖在上元縣北亦曰後湖相持不戰至暮景更約明日會戰綸許之安南侯駿字德潁長沙王懿之子見景軍退以為走即與壯士逐之景旋軍擊之駿敗走趣綸軍景乘勝追擊之諸軍皆潰綸奔朱方景擒西豐公大春主帥霍俊等還至城下使言曰邵陵已為亂兵所殺俊獨曰王小失利己全軍還京口城中但堅守援軍尋至賊以刀毆其背俊辭色彌厲正德殺之時鄱陽王範將兵入援軍於蔡州封山侯正表鎮鍾離叛附侯景景以為郡王正表乃于歐陽立栅以斷援軍帥衆欲襲廣陵廣陵令劉詢以告南兖州刺史南康王會理十二月會理使詢帥兵夜襲正表破之弟朱方歐陽注俱見前西豐公大春字仁經大心之封山侯正表正德之弟梁將軍羊侃卒先是侯景於臺城東西起二土山以臨城城中亦起土山以應之㑹大雨城內土山崩賊乘之垂入羊侃令多擲火為火城以斷其路徐於內築城賊不能進至是侃以疾卒城中益懼已而景土山稍逼城中右衛將軍柳津命作地道以取其土外山崩壓賊且盡景乃棄土山自焚其攻具引元武湖水以灌城中闕前皆為洪流桞津字元舉仲禮之父梁散騎常侍韋粲字長倩放之子及東西道都督裴之高桞仲禮等各以兵入援推仲禮為大都督梁主徴衡州刺史韋粲為散騎常侍以歐陽頠字靖世長沙臨湘人監州事粲至廬陵漢縣吳置郡今仍為縣為江西吉安府冶聞亂簡閲部下得精兵五千倍道赴援至豫章聞景已渡江內史劉孝儀名潛以字行勔之孫置酒粲怒以杯抵地曰賊已渡江便逼宫闕韋粲今日何情飲酒即馳馬出行至南洲外弟司州刺史桞仲禮亦率步騎至橫江粲即送糧仗併散私財以賞其戰士裴之髙自張公州即蔡洲遣船渡江粲仲禮及羊鴉仁等合軍屯新林粲議推仲禮為大都督裴之髙自以年位耻居其下粲單舸至之髙營切讓之曰今二宫危逼猾冦滔天臣子當戮力同心豈可自相矛楯豫州必欲立異鋒鏑便有所歸之髙垂泣致謝遂推仲禮為大都督景囚之髙弟姪子孫列于陳前以鼎鑊刀鋸隨其後謂曰裴公不降今即烹之之高召善射者使射其子不中仲禮以晦夜入粲營部分軍衆旦日會戰諸將各有據守仲禮謂粲曰青塘即青溪塘青溪注見前要地非兄不可乃令粲頓青塘已梁太清三年魏大統十已五年東魏武定七年春正月侯景襲梁援軍韋粲死之柳仲禮擊景敗之正月朔桞仲禮徙營大桁會大霧韋粲軍迷失道比及青塘夜已過半立栅未合侯景亟帥鋭卒攻之粲使軍主鄭逸逆擊之命直閣將軍劉叔允以舟師截其後叔允不敢進逸遂敗景乘勝入粲營左右牽粲避賊粲不動叱子弟力戰遂與子尼及弟助警搆從弟昻皆戰死親戚死者數百人仲禮方食投箸被甲與其麾下百騎馳往救之與景戰大破之斬首數百級溺死千餘人仲禮矟將及景賊將自後斫仲禮中肩景得免自是不敢復濟南岸仲禮亦氣索不復言戰矣邵陵王綸復收散卒自東道至列營桁南亦推桞仲禮為大都督梁中領軍朱异死朝野以侯景之禍共尤朱异异慚憤而死梁主痛惜特贈僕射初侯景叛傳岐以所聞責异异曰外間謗讟知之久矣心茍無愧何惜人言岐謂人曰朱彥和將死矣恃諂以求容肆辨以拒諌聞難而不懼知惡而不改天奪其鑒其能久乎及景圍臺城梁主登南樓望賊顧謂异曰四郊多壘誰之罪歟异流汗不能對遂發病死梁北徐州刺史蕭正表以州叛降東魏梁援軍擊侯景天門注見前太守樊文皎戰死臺城與援軍信命久絶時有羊車兒獻䇿作紙鳶載敕因風放之賊以為厭勝射下之援軍募人能入城送啓者李朗請先受鞭詐為得罪叛投賊因得入城城中方知援兵四集舉城鼓譟諸軍渡淮攻東府前栅焚之高州刺史李遷仕及樊文皎帥鋭卒五千獨進深入所向摧靡至菰首橋在青溪上東景將宋子仙伏兵擊之文皎戰死遷仕遁還仲禮神情傲狼陵蔑諸將邵陵王綸每日執鞭至門亦移時不見由是與綸及諸將有隙互相猜阻莫有戰心援軍初至建康士民扶老携幼以侯之才過淮即縱兵剽掠由是士民失望賊中有謀應官軍者聞之亦止二月梁以侯景為大丞相與之盟敕止援軍湘東王繹次于武城在今湖北漢陽府黃陂賖水經注武口水南至武城入大江即此時援軍四集王偉因勸景僞表求和初臺城之閉也公卿以食為念男女貴賤並出負采取諸府藏錢帛聚德陽堂而不備薪芻魚鹽至是壞尚書省為薪徹薦銼以飼馬軍士或煮鎧熏鼠捕雀而食之屠馬於省殿間雜以人肉食者必病侯景衆亦饑抄掠無所獲東城有米可支一年援軍斷其路景甚患之王偉請僞求和以緩其勢運米入石頭然後休士息馬繕修器械伺其懈怠擊之景乃拜表求和太子白梁主請許之梁主怒曰和不如死太子固請梁主遲回久之乃曰汝自圖之勿令取笑千載遂報許之景乞割江右四州之地并求宣城王大器出送然後濟江中領軍傅岐固爭曰豈有賊舉兵圍宫闕而復與之和乎此特欲却援軍耳且宣城嫡嗣之重國命所繫豈可為質梁主乃以大器之弟石城公大款質于景敕諸軍不得復進詔以景為大丞相豫州牧設壇門外遣僕射王克彧之曽孫與王偉等盟既盟而景圍不解專修鎧仗了無去志南康王會理等至馬卭洲景請敕還南岸太子從之景又啓曰永安侯確直閣趙威方頻隔栅見垢云天子自與汝盟我終當破汝乞召確及威方入即當引路梁主召確確纍辭不入邵陵王綸泣謂確曰圍城既久聖主憂危臣子之情切於湯火故且盟而遣之更申後計成命已決何得拒違確曰侯景雖云欲去而不解長圍其意可見入城何益綸大怒故斬之確乃流涕入城梁主常蔬食至是蔬茹皆絶乃食雞子綸乃因使上雞子數百枚侯馬卭州在江寧府上元縣西北永安確字仲正邵陵王綸子湘東王繹軍於郢州之武城與河東王譽湘洲刺史軍青草湖巴湖在今湖北嶽州府陵縣西南洞庭之南溪也桂陽王慥字元貞簡王融孫為信州刺史軍西峽口梁信州今四川䕫州府是西峽即西陵峽也皆託言四方援兵未集淹留不進參軍蕭賁骨鯁士也以繹不早下心非之常與繹雙六食子未下賁曰殿下都無下意繹深銜之會得梁主敕繹徙旋師賁曰景以人臣舉兵向闕今若放兵童子能斬之矣必不為也大王以十萬之衆未見賊而退奈何繹不悅未幾因事殺之故雙六古博戲之雙子宜雙行邊宜得六名曰雙六三月侯景陷梁臺城自稱大都督録尚書事邵陵王綸奔會稽柳仲禮等叛降景景廢蕭正德以為大司馬已而殺之侯景既運東府米入石頭援軍復不相統一王偉乃說景背盟景遂啓陳梁主十失梁主覽啓慚怒三月朔城內設壇告天地以景違盟舉烽鼓譟初閉城之日男女十餘萬擐甲者二萬餘人被圍既久死者十八九乘城不滿四千人率皆羸喘衆心猶望外援桞仲禮唯聚妓置酒作樂諸將日往請戰仲禮不許安南侯駿說邵陵王綸曰城危如此而都督不救若萬一不虞殿下何顔自立於世今宜分軍為三道出賊不意攻之可以得志綸不從仲禮父津登城謂仲禮曰汝君父在難不能竭力百世之後謂汝為何仲禮亦不以為意梁主問策於津對曰陛下有邵陵臣有仲禮不忠不孝賊何由乎南康王會理與羊鴉仁趙伯超等進營於東府城北約夜渡軍為景所敗於是景復攻城晝夜不息邵陵世子堅屯太陽門終日蒱飲不恤吏士其書佐董勛華白曇朗通鑑作熊曇朗今依南史侯景傳夜引景衆登城永安侯確力戰不能却乃排闥入啓梁主云城已陷梁主安卧不動歎曰自我得之自我失之亦復何恨因謂確曰速去語汝父勿以二宫為念景入見於太極東堂以甲士五百人自衛稽顙殿下典儀引就三公榻梁主神色不變問曰卿在軍中日久無乃為勞景不敢仰視汗流被面復至永福省見太子太子亦無懼容侍衛皆驚散惟俆摛殷不害字長卿陳郡長平人侍側摛謂景曰當以禮見景乃拜退謂其黨曰吾常跨鞍對陳矢刃交下而意氣安緩了無怖心今見蕭公使人自懾豈非天威難犯吾不可以再見之于是悉撤兩宫侍衛縱兵掠乘輿服御宫人皆盡收朝士王侯送永福省矯詔大赦自加大都督中外諸軍録尚書事以詔命解外援軍桞仲禮召諸將議之邵陵王綸曰今日之命委之將軍仲禮熟視不對裴之髙王僧辨曰將軍擁衆百萬致宫闕淪沒正當悉力决戰何所多言仲禮竟無一言諸軍乃散綸奔會稽仲禮及羊鴉仁王僧辨趙伯超並開營降賊軍士歎憤仲禮等入城先拜景而後見梁主梁主不與言見津津慟哭曰汝非我子何勞相見景遣仲禮歸司州僧辨歸竟陵初臨賀王正德與景約平城之日不得全二宫及城開正德率衆揮刃欲入景先使其徒守門乃不果入景更以正德為大司馬正德入見梁主拜且泣梁主曰啜其泣矣何嗟及矣已而正德怨景賣己密書召鄱陽王範使以兵入景遮得其書縊殺之梁湘東王繹歸江陵殺桂陽王慥初梁張纘字伯緒𢎞策之子為湘州刺史梁主以河東王譽代之徙纘代嶽陽王察刺雍州纘素恃才輕譽譽深銜之及至州留纘不遣纘輕舟夜遁將之雍部復慮察拒之纘與湘東王繹有舊欲因之以殺譽兄弟乃如江陵及臺城陷諸王各還州鎮譽歸湘州信州刺史桂陽王慥留軍江陵欲待繹至拜謁乃還纘遺繹書曰河東欲襲江陵嶽陽共謀不逞江陵軍士朱榮亦遣使告繹云桂陽留此欲應譽察繹懼自蠻中步道馳歸江陵囚慥殺之荆湘由是搆隙繹厚資遣纘赴鎮察初不赴援聞臺城已陷遂執纘纘後為守門者所殺梁宣城吳興起兵拒侯景侯景遣董紹先至廣陵南康王會理以州授之遣于子悅略吳郡太守袁君正昻之子以郡降紹先子悅所將皆羸兵數百廣陵僚佐說會理殺紹先發兵拒守與魏連和會理不能用新城戍主戴僧逖勸君正閉關拒賊賊乏食立可饑死君正亦不從杭新城吳縣晉以後因之今屬浙江州府景又遣來亮入宛陵宣城太守楊白華一名華魏將大眼子奔于梁胡三省注華讀作花誘而斬之景遣其將李賢明攻之不克御史中丞沈浚字叔源武康人避難東歸與吳興太守張嵊字四山魏之子起兵討景景號令所行唯吳郡以西南陵注見前以北而起後景攻宣城白華力屈乃降景以其北人釋之東魏攻魏頴川魏人擊之殺其將慕容紹宗劉豐生東魏髙嶽及慕容紹宗劉豐生等攻魏王思政於潁川踰年不克豐生違䇿堰洧水注見前以灌之城多崩頺王思政身當矢石與士卒同勞苦城中泉涌懸釜而炊宇文泰遣趙貴督東南諸州兵救之阻水不得前東魏人使善射者乘大艦臨城射之城垂陷紹宗豐生臨堰視之暴風忽至飄船向城城上人以長鈎牽船弓弩亂發二人俱死夏五月梁主衍殂太子綱立梁主為侯景所制飲膳亦為裁節憂憤成疾口苦索蜜不得再曰荷荷遂殂年八十六景祕不發喪太子嗚咽流涕不敢泄聲既而發喪遂即位立宣城王大器為太子是冬葬武帝於修陵廟號髙祖初髙祖之末建康士民爭尚豪華糧無半年之儲常資四方委輸及侯景亂道路斷絶人至相食不免餓死存者百無一二貴戚豪族皆自出採稆填委溝壑不可勝紀六月梁湘東王繹殺太常卿劉之遴字思貞南陽涅陽人初侯景將使之遴授臨賀王正德璽綬之遴剃髮僧服而逃之遴博學能文嘗為湘東王繹長史將歸江陵行至夏口繹素嫉其才密送藥殺之而自為志銘厚其賻贈東魏髙澄克潁川以王思政歸魏師還東魏髙嶽既失慕容紹宗等志氣沮喪不敢復逼長社潁川郡冶陳元康言於髙澄曰王自輔政以來未有殊功今潁川垂陷願王自以為功澄從之自將攻長社親臨作堰堰三决澄怒推負土者及囊并塞之城中無鹽孿腫死者什八九水入城壞澄令城中曰有能生致王大將軍者封侯若有損傷左右皆斬王思政帥衆據土山告之曰吾力屈討窮惟當以死謝國因仰天大哭西向再拜欲自刎衆共執之不得引决澄遣趙彥深執手申意延而禮之潁川既陷宇文泰以侯景所獻諸城道路阻絶令諸將授軍還髙澄遇思政甚重祭酒盧潛曰思政不能死節亦何足重澄曰我有盧潛乃是更得一王思政潛度世之曽孫也梁湘東王繹自稱假黃鉞大都督中外諸軍承制梁永安侯確謀討侯景不克而死景愛永安侯確之勇常置左右邵陵王綸潛遣人呼之確曰景輕佻一夫力耳我欲手刃之恨未得其便卿還啓家王勿以確為念景與確逰鍾山確引弓射鳥因欲射景弦斷不發景覺而殺之梁湘東王繹使其世子方等字實相攻湘州刺史河東王譽譽擊之方等敗死秋七月繹復遣信州刺史鮑泉字潤嶽東海人擊譽梁湘州刺史河東王譽驍勇得士心湘東王繹將討侯景遣使督其糧衆譽不受令繹世子方等請討之方等徐妃所出妃多失行故方等亦無寵侯景圍臺城方等將兵入援每戰親當矢石以死節自任及城陷還江陵收集士馬甚得衆和繹始歎其能繹乃以少子方矩字德規代譽使方等將兵送之至麻溪在今長沙府長沙縣北水經注湘水又東合麻溪水口即此譽擊之方等軍敗溺死方矩收餘衆還先是繹以方等之能入告徐妃妃不對垂泣而退繹怒疏妃穢行榜于大閣方等見之益懼及方等敗死繹無戚容會寵妃王氏生子而卒繹疑徐妃為之逼令自殺妃赴井死繹復遣竟陵太守王僧辨信州刺史鮑泉擊譽刻日就道僧辨請申期繹怒斫之幾死仍送獄泉遂將兵獨行梁合州刺史翻陽王範以州附於東魏以乞師範聞臺城陷戒嚴欲入僚佐咸說之曰今魏人已據夀陽大王移足則虜必窺合肥範乃止會髙澄遣李伯穆逼合肥範方謀討侯景藉東魏為援乃以合州輸伯穆送二子於鄴以乞師出屯濡須以待上遊之軍久之不至東魏亦不為出師範糧乏進退無計乃西軍樅陽範遣信告江州刺史尋陽王大心大心以湓城處之既至興大心相猜大心築壘以備之市糴不通範衆無所得食多餓死範憤愧而卒樅陽溢賊注俱見前盜殺東魏大將軍髙澄於鄴先是髙澄如鄴封齊王加殊禮將佐請受之陳元康以為未可至是澄復詣鄴澄謂濟隂王暉業曰比讀何書暉業曰數尋伊霍之傳不讀曹馬之書澄前獲梁衡州刺史蘭欽字休明中昌魏人子京以為膳奴欽請贖之不許京屢自訴澄杖之曰更訴當殺汝京遂與其黨六人謀作亂會澄與陳元康楊愔崔季舒屏左右謀受禪京進食置刀盤下殺之愔季舒走匿元康以身蔽澄亦被傷是夕卒初澄以太原公洋次長忌之洋深自晦匿每退朝閉閣靜坐雖對妻子或竟日不言及變起洋聞之神色不動入討羣賊斬而臠之祕不發喪勳貴以重兵皆在并州勸洋早如晉陽洋從之夜召督護唐雍字道和晉陽人使部分將士鎮遏四方須叟而畢東魏主聞澄死竊謂左右曰大將軍死似是天意威權當復歸帝室矣洋留高嶽高隆之司馬子如楊愔守鄴入謁東魏主從甲士八千人登階者二百餘人皆攘袂扣刀若對嚴敵令主者傳奏曰臣有家事須詣晉陽再拜而出東魏主失色目送之曰此人又似不相容朕不知死在何日九月侯景陷吳興梁太守張嵊御史中丞沈浚死之景使侯子鑒寇吳興吳興兵力寡弱張嵊書生不間軍旅或勸嵊效袁君正迎降嵊歎曰袁氏世濟忠貞不意君正一旦隳之吾豈不知此難久全但以身許國有死無二耳戰敗還府整服安坐子鑒執送建康景欲活之嵊曰吾忝任專城朝廷傾危不能匡復速死為幸景猶欲存其一子嵊曰吾一門已在鬼録不就爾虜求恩景怒盡殺之并殺沈沒初景既背盟又復請和高祖遣浚詣景所浚見景無去志發憤責之景橫刀於膝嗔目叱之浚曰負恩亡義逢棄詛盟固天地所不容沈浚五十之年常恐不得死所何為以死相懼邪因徑去不顧景以其忠直捨之及是卒被殺梁嶽陽王察攻江陵湘東王繹遣兵襲襄陽察遁還繹使竟陵太守王僧辨攻湘州鮑泉攻湘州河東王譽迎戰而敗退保長沙泉圍之嶽陽王察留參軍蔡大實字敬位濟陽考城人守襄陽帥衆伐江陵以救湘州湘東王繹大懼時新興晉僑郡隋改縣曰安興唐省故城在今荆州府江陵縣大守杜崱杜陵人懷寶之子在察軍繹與之有舊密邀之崱帥所部降其兄岸請以五百騎襲襄陽距城三十里城中始覺蔡大寶奉察母登城拒戰察聞之遁還岸亦走繹出王僧辨于獄代泉攻長沙邵陵王綸致書于繹曰今社稷危耻創巨痛深惟應剖心嘗膽泣血枕戈其餘小忿或宜容貰若外難未除家禍仍搆料今訪古未或不亡夫征戰之理唯求克勝至於骨由之戰愈勝愈酷勞兵損義虧失多矣弟若陷洞庭不戢兵刃雍州疑迫何以自安必引魏軍以求形援弟若不安國家去矣繹不從綸流涕曰天下之事一至於斯湘州若敗吾亡無日矣冬十一月梁湘東王繹遣兵攻襄陽嶽陽王察乞師於魏魏遣開府楊忠率師救之察既與湘東王繹為敵恐不能自存遣使求援於魏請為附庸繹使桞仲禮鎮竟陵以圖察察懼遣其妃王氏及世子嶚字道逺為質於魏宇文泰欲經略江漢以楊忠都督三荆注見前諸軍鎮穰城仲禮帥衆趣襄陽泰遣忠及僕射長孫儉本名慶明嵩五世孫將兵擊仲禮以救察十二月侯景陷錢塘㑹稽執梁刺史南郡王大連字仁靖大欵之弟宋子仙陷錢塘乘勝渡浙江至會稽邵陵王綸奔鄱陽時會稽豐沃勝兵數萬糧伏山積東人懲侯景殘虐咸樂為用而大連朝夕酣飲不恤軍士司馬留異東陽長山人凶狡殘暴為衆所患大連悉以軍委之子仙至大連棄城走異以兵衆降為子仙鄉導追及大連執送建康大連猶醉不之知於是三吳吳郡吳興會稽是為三吳盡沒於景梁始興太守陳霸先起兵討侯景先是梁廣州刺史元景仲法僧之子謀應侯景景以景仲元氏之族遣信許奉為主陳霸先以兵討之景仲敗死霸先迎定州注見前刺史蕭勃吳平侯景之子鎮廣州勃以霸先監始興郡事至是霸先結郡中豪傑將討景遣杜僧明將二千人頓於嶺上勃遣人止之霸先曰京都覆沒君辱臣死君侯體則皇枝任重方嶽不能赴援遣僕一軍猶賢乎已而更止之乎乃遣使間道詣湘東王繹受節度霸先至大庾嶺南康土豪蔡路養以兵拒之其黨蕭摩訶年十三單騎出戰無敢當者霸先擊之路養敗走摩訶降霸先遂進軍南康湘東王繹承制以霸先為交州刺史大庾領南康注俱見前蕭摩訶字元允蘭陵人東魏取梁司州先是梁東徐北青州梁於下邳郡置東徐州又於東海懷仁縣置南北二青州下邳注見前懷仁廢縣在今海州贑榆縣皆降於東魏東魏遂取梁青州郎南青州及山陽郡今懷安府是已而又取淮隂注見前至是復取司州於是東魏盡有淮南之地庚梁太宗簡文帝綱大寶元年魏大統十六年東魏武午定八年齊顯祖文宣帝高洋天保元年是嵗東魏亡齊代春正月東魏高洋自為丞相都督中外諸軍録尚書事封齊王梁邵陵王綸至江夏自稱都督中外諸軍承制綸自鄱陽進至九江尋陽王大心以江州讓之綸不受引兵西上至江夏南平王恪以郢州讓之亦不受乃推綸為假黃鉞都督承制梁祖皓暅之之子起兵廣陵殺侯景將董紹先二月景陷廣陵皓死之廣陵人來嶷字德山說前太守祖皓曰董紹先輕而無謀人情不附襲而殺之此壯士之任耳今欲糾帥義勇奉戴府君若其克捷可立桓文之勳必天未悔禍猶足為梁室忠臣皓曰此僕所願也乃相與糾合勇士百餘人襲廣陵斬董紹先馳檄逺近推蕭勔勃之弟為刺史景遣郭元建攻之皓嬰城固守未幾城陷皓被執景車裂之遂屠廣陵嶷闔門皆被害一子逃免後仕於陳魏師進次石城注見前梁湘東王繹請盟魏師還先是魏楊忠圍梁安陸栁仲禮馳還救之兵敗被執安陸竟陵皆降於忠於是漢東盡入於魏至是忠乘勝至石城欲進逼江陵梁湘東王繹遣舍人庾恪說忠曰察來伐叔而魏助之何以使天下歸心忠遂停湕北湕一作建今荆門州有建水亦曰建陽河繹請送質求和魏人許之乃盟而還梁旱蝗時江南連年旱蝗江楊尤甚百姓流亡草根木葉食之皆盡富室或衣羅綺懷金玉而死白骨成聚如邱隴焉夏四月梁王僧辨克湘州殺河東王譽初湘東世子方等之死湘州將周鐵虎陳書本傳不知何許人南史同功最多譽委遇甚重至是僧辨得鐵虎命烹之呼曰侯景未滅奈何殺壯士僧辨竒其言而釋之梁湘東王繹移檄討侯景繹聞高祖之喪以長沙未下匿之至是始發喪刻檀為高祖像事之甚謹動靜必咨焉以天子制於賊臣不肯從大寶之號猶稱太清四年下令大舉討侯景移檄遠近五月東魏髙洋稱皇帝廢東魏主善見為中山王東魏主在位十七年而亡東魏徐之才丹陽人宋景業廣宗人善圖䜟因髙德政字七貞勃海蓚人勸齊王洋受魏禪先是童謡曰一束藁兩頭然河邊羖䍽飛上天藁然兩頭於文為髙河邊羖䍽為水邊羊齊王名也於是之才等勸洋受禪洋以告婁太妃太妃曰汝父如龍汝兄如虎猶以天位不可妄據終身北面汝獨何人欲行舜禹之事乎洋以告之才之才曰正為不及父兄故宜早升尊位耳洋使德政如鄴未還郎擁兵而東至平都城召諸勳貴議之莫敢對長史杜弼曰關西國之勍敵今若受禪彼必挾天子稱義兵而東王何以待之乎徐之才曰彼亦欲為王所為縱其屈彊不過隨我稱帝耳弼無以應德政至鄴公卿莫有應者司馬子如逆洋於遼陽固言未可洋遂還居常不悅景業復勸之平都城在今山西遼州和順縣遼陽今遼州是洋乃發晉陽東魏進洋位相國總百揆備九錫洋至鄴使侍中張亮等見東魏主逼以禪位魏主斂容曰推挹已久今當遜避乃下御座步就東廊詠後漢書獻帝贊求入與六宮别舉宮皆哭直長趙道德以故犢車一乘送出雲龍門百僚拜辭遂遷於北城遣彭城王韶等奉璽綬禪位於齊齊王洋郎皇帝位於南郊封東魏主為中山王追尊獻武王文襄王皆為皇帝獻武廟號高祖文襄廟號世宗尊王太妃為皇太后降魏朝封爵有差是月齊主立趙郡李后宗女為皇后后子殷為太子梁武陵王紀遣其世子圖照字明周將兵赴援次於白帝時梁境唯荆益所部尚完實益州刺史武陵王紀移告征鎮使世子圓照帥兵受湘東王節度繹授以信州刺史令屯白帝未許東下魏立蕭察為梁王察朝於魏魏人欲令嶽陽王察發哀嗣位察辭乃遣使命察為梁王建臺置百官察遂入朝於魏察自是為北朝附庸梁高州刺史李遷仕反高涼後漢郡梁為高州治故城在今肇慶府陽江縣太守馮寶妻洗氏討敗之梁高涼太守馮寶故北燕主𢎞之族也初北燕主𢎞奔髙麗使其族人馬業以三百人浮海奔宋因留新會自業至孫融世為羅州刺史融子寶為高涼太守新會宋郡隨改為縣今屬廣州府羅州梁置治石龍故城在今高州府化州娶高涼洗氏氏多籌略善用兵部衆皆服之高州刺史李遷仕遣使召寶寶欲往洗氏止之曰刺史無故不應召太守此必欲詐君共反耳且無往以觀其變數日遷仕果反遣主帥杜平虜將兵逼南康陳霸先使周文育擊之洗氏謂寶曰平虜今與官相拒勢不得還遷仕在州無能為也君宜遣使卑辭厚禮告以欲遣婦參彼必喜而無備我將千餘人步擔雜物唱言輸賧蠻人以貨為賧得至柵下破之必矣寶從之遷仕果不設備洗氏襲擊大破之遷仕走保寧都吳新都縣宋改名今為州𨽻江西文育亦擊走平虜據其城洗氏與霸先會於贛石還謂寶曰陳都督非常人也甚得衆心必能平賊宜厚資之明年二月霸先擊斬遷仕進兵江州湘東王以為江州刺史贛石郎今贛江之十八灘難多臣石陳書髙祖紀所云南康贛石是也秋七月侯景陷江州及豫章初東魏遣牒云洛牒云代北復姓洛武川人等迎鄱陽世子嗣字長𦙍使鎮皖城未行侯景遣任約將兵寇江州洛等引去嗣失援敗死約遂略地至湓城尋陽王大心出兵戰敗遂以州降鄱陽將侯瑱字伯玉巴西人據豫章景遣于慶略地南至瑱力屈亦降景以瑱同姓待之甚厚質其妻子遣隨慶狥蠡南彭蠡之南諸郡齊定律始立九等户户有上中下三等每等又分上中下是為九等齊主初立勵精為治趙道德以事屬黎陽太守房超清河人超不發書棓殺其使齊主善之命守宰各設棓以誅屬請之使久之中郎宋軌奏曰若受使請賕猶致大戮身為枉法何以加罪乃罷之尋詔僕射薛淑等取魏麟趾格討論損益以為齊律簡練六坊之人每一人必當百人任保任也其臨陳必死然後取之謂之百保鮮卑又簡華人勇力者謂之勇士以備邊要始立九等之户富者稅其錢貧者役其力九月梁湘東王繹取郢州邵陵王綸奔齊昌南齊郡今黃州府蘄州是侯景兵襲之綸遂奔齊齊以為梁王邵陵王綸大修鎧仗將討侯景湘東王繹惡之遣王僧辨鮑泉帥舟師襲之至鸚鵡洲在今武昌府江夏縣西南江中綸遣其子礩將兵擊之且以書責僧辨曰將軍前年殺人之姪今歲伐人之兄以此求榮恐天下不許僧辨送書於繹繹命進軍綸乃集其麾下於西園涕泣言曰我本無他志在滅賊湘東常謂與之爭帝遂爾見伐今日欲守則交絶糧儲欲戰則取笑千載不容無事受縛當於下流避之麾下壯士爭出請戰不從綸與礩登舟北出僧辨入據郢州繹以其世子方諸字明智為刺史綸與左右輕舟奔武昌已稍收散卒屯於齊昌遣使請降於齊齊以綸為梁主任約進寇西陽注見前武昌綸引齊兵未至移營馬柵在今黃州府黃岡縣北距西陽八十里任約聞之遣叱羅通叱羅代北復姓通名等襲之綸不為備策馬亡走至汝南晉僑郡故城在今武昌府江夏縣水經注晉咸和中户口南渡因置斯郡魏城主李素綸故吏也開城納之任約遂據西陽武昌綸在汝南修城池集士辛將圖安陸魏字文泰遣楊忠攻拔汝南執綸殺之投尸江岸嶽陽王察迎葬襄陽侯景自稱漢王景又自加宇宙大將軍都督六合諸軍事梁主驚曰將軍乃有宇宙之號乎冬十月魏宇文泰伐齊不戰而還洛陽平陽皆降於齊泰以齊主稱帝伐之自恆農為橋濟河至建州此西魏僑置之州今絳州絳縣是齊主自將出頓東城今在太原府太原縣汾水東泰聞其軍容嚴盛歎曰高歡不死矣㑹久雨畜産皆死乃還於是河南自洛陽河北自平陽以東皆入於齊梁寧州注見前刺史徐文盛字道茂彭城人敗侯景兵於貝磯水經注江水東過邾縣南又東徑貝磯邾縣今黃州府黃岡縣是初梁寧州刺史徐文盛募兵討侯景湘東王繹使將兵東下與任約遇軍貝磯任約逆戰文盛大破之進軍大舉口舉水入江之口舉水出黃州府麻城縣今黃岐亭河至黃岡入江侯景以約守西陽久不能進自出屯晉煕晉郡唐改舒州今安慶府是侯景殺南康王㑹理武林侯咨字世恭鄱陽王範之子南康王㑹理以侯景既出建康空虛與栁敬禮仲禮之弟西鄉侯勸東鄉侯勔皆吳平候景之子謀起兵誅王偉建安侯賁正德弟正立之子中宿世子子雍中宿世子中宿侯之世子子雍始興王憺之孫以告偉偉收㑹理等殺之錢塘禇冕以會理故舊捶掠千計終無異言會理隔壁謂之曰卿雖忍死明我我心實欲殺賊冕不服景乃宥之梁主既立景防衛甚嚴唯武林侯咨及僕射王克舍人殷不害並以文弱得出入卧內講論而已及是克不害懼禍稍自疏咨獨不去景惡之使人殺之封賁為竟陵王子雍為隨王賜姓侯氏魏初作府兵胡三省曰唐府兵本此魏宇文泰始籍民之才力者為兵府身租庸調一切蠲之凡受田之丁歲輸粟謂之租隨鄉所出輸絹綾絲麻布無則輸銀謂之調用民之力嵗二十日閏加二日不役則折絹謂之庸既籍為兵則皆免之以農隙講閲戰陳馬畜糧備六家供之合為百府每府一郎將主之分屬二十四軍凡十二大將軍每大將軍各統開府二人開府各領一軍齊行天保歷宋景業所造也辛梁大寶二年魏太統未十七年齊天保二年春三月魏主寶炬殂太子欽立是為廢帝齊以梁湘東王繹為梁相國承制閏月梁除文盛伐侯景敗之文盛攻克武昌任約告急侯景自帥衆西上以太子大器為質留王偉居守至西陽與徐文盛夾江築壘文盛擊破之景遁還營夏四月侯景陷梁郢州執刺史蕭方諸徐文盛奔江陵方諸年十五恃文盛在近不設備日以蒱酒為樂侯景使宋子仙任約襲之入其城方諸迎拜鮑泉匿牀下擒以送景景因風便中江舉帆遂越文盛等軍直入江夏文盛衆懼而潰逃歸江陵梁湘東王繹遣大都督王僧辨伐侯景次巴陵景攻之不克六月繹使胡僧佑字願果南陽冠軍人擊景敗之獲其將任約景遁還湘東王繹以王僧辨為大都督帥諸將東擊景至巴陵聞郢州陷因留戍之繹遺僧辨書曰賊既乘勝必將西下不勞逺擊但守巴邱山名在今嶽州府城內以逸待勞無不克矣繹又謂僚佐曰景若水步兩道直指江陵此上䇿也據夏首積兵糧中䇿也悉力攻巴陵下䇿也巴陵城小而固僧辨可任景攻不拔野無所掠暑疫時起食盡兵疲破之必矣夏首夏水之首江之汜也在武昌江中乃命徐嗣徽自嶽陽杜崱自武陵引兵㑹僧辨景使丁和守夏首宋子仙為前驅趣巴陵分遣任約直指江陵景帥大兵水步繼進於是緣江戍邏望風請服僧辨乘城固守偃旗臥鼓安若無人先是巴陵刺史王珣降景至是景濟江執珣至城下使說其弟宜州刺史琳琳曰兄受命討賊不能死難曾不內慚反欲陽誘取弓射之珣慚而退王琳字子珩會稽山隂人景百道攻城城中鼓譟矢石雨下殺賊甚衆景乃退僧辨著綬乘輿奏鼓吹巡城景軍飢疫死傷大半繹遣胡僧祐援巴陵戒之曰賊若水戰以大艦臨之必克若步戰鼓棹就巴陵不須交鋒也僧祐至湘浦亦曰三江浦在巴陵縣北景遣任約帥鋭卒據白塉亭名在嶽州府華容縣西南待之僧佑由他路西上潛引兵至赤沙亭即赤亭城在華容縣南㑹信州刺史陸法和北齊書本傳不知何許人至與之合軍法和有異術隱於百里洲在荆州府枝江縣東豫言多中人莫能測至是以任約向江陵請行既至與僧祐縱兵擊之約兵大潰殺溺甚衆擒約送江陵景焚營遁約至繹赦之繹復遣王僧辨引兵東下至漢口攻魯山擒賊將支化仁至郢州四面攻之宋子仙等困蹙乞輸城而還僧辨僞許之命結船百艘以安其意子仙將發僧辨命杜龕帥精勇千人攀牒而上鼓譟奄進水軍士宋遙帥樓船暗江雲合子仙走至白楊浦大破之周鐵虎生擒子仙送江陵斬之杜龕崱兄子暗江雲合言船多如雲江為之暗也梁湘東王繹誘江安侯圓正字明允武陵王紀之子執之江安侯圓正為西陽太守寬和好施歸附者衆有兵一萬湘東王繹欲圖之署為平南將軍及至囚之分其部曲使告其罪荆益之釁自此起秋八月侯景廢梁主綱殺太子大器而立豫章王棟字元吉安王歡之子初景既克建康常言吳兒怯昜取須定中原然後為帝後納溧陽公主梁主之女景甚愛之妨於政事王偉屢諫景以告主主怒偉恐為所讒因說景除梁主及景自巴陵敗歸猛將多死自恐不能義存偉因說以廢立景從之遣彭俊等帥兵入殿廢梁主為晉安王幽於永福省殺太子大器及王侯在建康者二十餘人迎豫章王棟立之已而景欲迎梁主復位以棟為太孫王偉曰廢立大事豈可數改耶乃止冬十月侯景弒梁主綱王偉說侯景殺梁主綱以絶衆心景從之使偉與彭俊王修纂進酒梁主知將殺己盡醉而寢俊進土囊修纂坐其上而殂十一月侯景廢梁主棟自稱漢帝景即位於南郊還登太極殿其黨數萬皆吹脣呼譟而上封梁主棟為淮隂王鎖於密室景居禁中非故舊不得見由是諸將多怨望十二月齊主洋弒中山王齊主每出入常以中山王自隨王妃太原公主恆為之嘗飲食護視之至是齊主飲公主酒使人鴆王殺之并其三子諡曰魏孝靜帝葬於鄴西後忽掘而投之漳水齊主殺美陽公元暉業彭城公元韶以高氏壻寵遇異於諸元美陽公元暉業以位望隆重志氣不倫尤為齊主所忌嘗於宫門外罵韶曰爾不及一老嫗負璽與人何不擊碎之謂漢元皇后投璽缺角詔何故奉璽與齊我出此言知即死爾亦詎得幾時齊主聞而殺之齊主剃韶鬚髯施粉黛衣婦人衣以自隨曰我以彭城為嬪御久之太史奏當除舊布新齊主問韶曰漢光武何故中興韶曰為誅諸劉不盡於是齊主誅諸元二十五家韶幽於地牢而死未幾齊主盡滅元氏之族唯元文遙等數家得免元文遙字德遠魏常山王遵五世孫壬梁世祖孝元帝繹承聖元年申魏主欽元年齊天保三年春正月突厥土門襲柔然殺頭兵可汗自號伊利可汗劉友益曰突厥始稱可汗突厥土門襲擊柔然大破之頭兵可汗自殺土門自號伊利可汗號其妻為可賀敦子弟謂之特勒别將兵者皆謂之設二月梁湘東王繹遣王僧辨陳霸先討侯景先是王僧辨乘勝下湓城陳霸先引兵來會侯景將于慶自鄱陽還豫章侯瑱閉門拒之䖍走江州及僧辨至慶棄城走湘東王繹命僧辨且頓尋陽以俟諸軍之集至是繹始命僧辨督諸軍東發舳艫數百里陳霸先帥甲士三萬舟艦二千自南江即贛水也自南來注彭蠡北入於江故謂之南江出湓口㑹僧辨於白茅灣在九江府德化縣北築壇歃血其讀盟文流涕慷慨三月梁王僧辨陳霸先擊敗侯景景亡走吳王僧辨等至蕪湖景聞之懼侯子鑒據姑孰南洲以拒西師僧辨至子鑒帥步騎挑戰又以鵃䑠音鳥了長船也兩旁著棹往來如飛千艘載戰士僧辨麾細船皆退留大艦夾泊兩岸子鑒之衆謂水軍欲退徑出趣之大艦斷其歸路鼓譟大呼合戰中江子鑒大敗僅以身免先是景戒子鑒曰西人善水戰勿與爭鋒若步騎一交必當可破及聞子鑒敗大懼涕下覆面引衾而臥良久方起曰誤殺乃公僧辨督諸軍乘潮入淮景塞淮口緣淮作城十餘里中樓堞相接僧辨問計於陳霸先霸先曰前栁仲禮數十萬兵隔水而坐韋粲在青溪竟不渡岸賊登高望之表裏俱盡故能敗我今圍石頭須度北岸諸將若不能當鋒霸先請往乃進於石頭西落星山在上元縣東北築柵僧辨進軍招提寺北景帥衆萬餘人鐵騎八百餘匹陳於西州六朝時楊州治所之西霸先命諸將分處置兵以分其勢景衝官軍官軍小縮霸先遣將軍徐度字孝節安陸人將弩手二千橫截其後景兵却霸先與王琳杜龕等以鐵騎乘之僧辨以大軍繼進景兵敗入柵其將盧暉略以石頭降僧辨入據之景與霸先殊死戰景帥百餘騎棄矟執刀左右衝陳不動衆遂大潰景至闕下不敢入臺與其黨百餘騎東走入吳僧辨不戢軍士剽掠居民號泣滿道是夜軍士遺火焚大極殿及東西堂寶器羽儀輦輅無遺明日乃命侯瑱等帥精甲追景王克等帥臺內舊臣迎僧辨於道僧辨問克璽綬何在克良久曰趙平原持去僧辨曰王氏百世鄉族一朝墜矣趙平原景侍中趙思賢也僧辨迎太宗梓宫升朝堂帥百官哭踊如禮上表勸進於湘東王且迎都建業不許景黨侯子鑒等皆降齊獲王偉送建康僧辨啓陳霸先鎮京口梁湘東王繹殺豫章王棟王僧辨之發江陵也啓湘東王曰平賊之後嗣君何以為禮王曰六門之內自極兵威僧辨曰討賊之謀臣為己任成濟之事請别舉人王乃密諭朱買臣使為之所及景敗豫章王棟及二弟橋樛相扶出於密室逢杜崱於道為去其鎖二弟曰今日始免橫死矣棟曰倚伏難知吾猶有懼買臣呼之就船並沈於水夏四月梁武陵王紀稱帝於成都紀頗有武略在蜀十七年南開寧州越雋西通資陵西域國吐谷渾內修耕桑鹽鐵之政外通商賈逺方之利故能殖其財用器甲殷積有馬八千匹聞候景陷臺城湘東王繹將討之謂僚佐曰七官文士豈能匡濟長史劉孝勝孝儀之弟等勸紀稱帝會內寢殿柱繞節生花紀以為己瑞遂即帝位立子圓照為太子司馬王僧略僧辨之弟參軍徐怦勉從子固諫不從初臺城之圍怦勸紀速入援紀意不欲行內銜之會人告悍反紀謂曰以舊情當使諸子無恙對曰生兒悉如殿下留之何益紀乃盡誅之亦殺僧略水侯撝嘆曰王事不成矣吾人國之基也今先殺之不亡何待永候僞字智遐安成王秀之子侯景伏誅侯瑱追及景於松江今日吳淞江自太湖分流徑蘇州府之吳江長洲諸縣界至太倉州寶山縣含黃浦入海進擊敗之斬彭俊等景與腹心數十人單船走將入海羊侃之子鵾為景都督殺之送尸建康傳首江陵截其手送於齊暴景尸於市士民爭取食之并骨皆盡溧陽公主亦豫食焉景五子在北齊皆殺之是月始葬蕳文帝廟號曰太宗盜竊梁傳國璽歸之於齊侯景之敗也以傳國璽自隨使其侍中趙思賢掌之曰若我死宜沈於江思賢濟江遇盜從者棄之草間至廣陵以告郭元建元建取之送鄴梁以王僧辨為司徒陳霸先為征虜將軍開府儀同三司賞平侯景之功也王偉等伏誅王僧辨送王偉等於江陵偉於獄中上詩湘東王愛其才欲宥之有言於王者曰偉作檄文甚佳王求得之見其有湘東一目之語乃怒誅之偉檄云項羽重瞳尚有烏江之敗湘東一目寧為赤縣所歸王大怒釘其舌於柱剜腹臠肉而殺之梁以魯悉逹字志通扶風人為北江州梁置治鹿城鹿城注見前刺史扶風晉僑郡治筑口在今襄陽府榖城縣魯悉逹糾合鄉人以保新蔡是為南新蔡郡晉置故城在今黃州府黃梅縣力田蓄榖時江東饑亂餓死者什八九遺民携老幼歸之悉逹分給糧廪全濟甚衆招集晉熙注見前等五郡盡有其地使其弟廣逹字遍覽將兵從王僧辨討侯景故因而命之齊人侵梁圍秦郡梁置今江寧府六合縣是陳霸先擊敗之齊主遣潘樂郭元建將兵圍秦郡行臺辛術字懷哲狄道人諫曰朝廷與湘東王信使不絶陽平齊郡梁移置安宜故城在今揚州府寶應縣侯景之土取之可也今王僧辨已遣嚴超逹守秦郡何得爭之且水潦方降不如班師不從陳霸先命徐度引兵助守齊衆七萬攻之甚急僧辨使杜崱救之霸先亦自毆陽來㑹與戰破之斬首萬餘級是時齊政煩賊重江北之民不樂屬齊廣陵僑人朱盛等聚黨謀襲殺齊刺史遣使求援霸先因進圍廣陵齊主使告霸先曰若釋圍必歸廣陵歷陽兩城霸先乃引還江北之民從濟江者萬餘口齊以辛術為吏部尚書自魏遷鄴以來大選之職知名者數人互有得失高澄少年高朗所弊者疏袁叔德名聿修魏中書令翻之子沉密謹厚所傷者細楊愔風流辨給取士失於浮華惟術性尚貞明取士必以才器循名責實新舊參舉管庫必擢門閥不遺考之前後最為折衷梁秦梁刺史蕭循南史作修字世和武林侯咨弟封宜豐侯以州降魏已復歸於梁先是魏將軍逹奚武侵梁南鄭梁秦梁二州刺史蕭循遣參軍劉璠字寶義沛人請救於武陵王紀是時侯景方逼江陵湘東王求援於魏令循以南鄭輸魏循不可故魏伐之紀遣潼州梁置今四川綿州是刺史楊乾運敕之至劍北大劍山之北乾運戰敗璠被執送長安循守南鄭武圍之久不下遣行臺左丞栁帶韋字孝孫河東人入城說曰足下所固者險所恃者援所保者民今險不足固援不可恃民不可保而宗國喪亂社稷無主欲誰為去聲為忠乎循乃降於是劍北皆入於魏循至長安宇文泰待之甚厚未幾遣還江陵循之降也劉璠先已至魏宇文泰遇之如舊交泰許循南還久而未遣從容問璠曰我於古誰比對曰璠常以公為湯武今日所見曽桓文之不如泰曰何也對曰齊桓存三亡國晉文不失信於伐原語未竟泰撫掌曰我解爾意乃厚禮循而遣之循以文武千家自隨湘東王疑之遣使覘察命劫竊其財循啓輸馬仗王乃安之冬十月梁湘州刺史王琳下獄其長史陸納入於湘州以叛琳本㑹稽兵家其姊妹皆入湘東王宫故琳少在王左右琳好勇傾身下士所得賞賜不以入家麾下萬人多江淮羣盜從王僧辨平侯景與杜龕功居第一在建康恃寵縱暴僧辨不能禁乃密啓王請誅琳王以琳為湘州琳自疑及禍使長史陸納帥部曲赴州身詣江陵謂納等曰吾若不返子將安之咸曰請死之相泣而别至江陵王下琳吏以子方略代琳以黃羅漢為長史使與太舟卿本梁都水使者天監中改位列卿之末張載至巴陵據琳軍載有寵於王御下峻刻荆人疾之如讐至軍陸納及士卒並哭不受命殺載以羅漢清謹而免之與諸將引兵襲據湘州十一月梁主繹立是為元帝梁公卿藩鎮數勸進於湘東王王遂即位於江陵是日不升正殿公卿陪位而已侯景之亂州郡大半入魏自巴陵以下至建康以長江為限荆州界北盡武寧西拒硤口嶺南復為蕭勃所據詔令所行千里而近民户著籍不盈三萬在武寧晉郡隋廢故城今安陸府荆門州梁以蕭循為湘州刺史陸納襲巴陵循擊敗之梁主徴王僧辨等與蕭循共討陸納循軍巴陵以待之頃之納請降求送妻子循曰此詐也必將襲我乃密為之備納果夜以輕兵繼至鼓譟軍中皆驚循坐胡牀於壘門望之略無懼色徐部分將士擊之獲其一艦納退保長沙御批歷代通鑑輯覽卷四十四

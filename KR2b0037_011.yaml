body:
  text: 沛公至霸上秦王子嬰素車白馬係頸以組應劭曰組天子韍也係頸言欲自殺封皇帝璽始皇藍田玉璽文曰受天之命皇帝壽昌子嬰上之漢代傳受號傳國璽符玉符以發兵將節號令賞罰之節以毛為之上下相重取象竹節降軹道亭名在今咸陽縣東北旁諸將請誅之沛公曰始懷王遣我固以能寬容且人已服降殺之不祥乃以屬吏沛公入咸陽還軍霸上除秦苛法沛公西入咸陽諸將皆爭走金帛財物之府分之蕭何獨先入收秦丞相府圖籍藏之以此得具知天下厄塞戶口多少強弱之處沛公見秦宫室帷帳寶貨婦女欲留居之樊噲沛人張良諫噲曰沛公欲有天下耶將為富家翁耶凡此奢麗之物皆秦所以亡也沛公何用焉願急還霸上沛公不聽張良曰忠言逆耳利于行良藥苦口利于病願聽樊噲言乃封秦重寶府庫還軍霸上悉召父老豪傑謂曰父老苦秦苛法久矣諸侯約先入關者王之吾當王關中與父老約法三章耳殺人者死傷人及盜抵罪抵當也隨其輕重立法餘悉除去凡吾所以來為父兄除害非有所侵暴毋恐乃使人與秦吏行縣鄉邑告喻之秦民大喜唯恐沛公不為秦王尹氏起莘曰沛公仗義入關除秦苛法如救焚拯溺雖三代之得天下亦不過如是而已項籍坑秦降卒于新安今縣屬河南河南府項羽既定河北率諸侯兵欲西入關秦降卒多怨言先是諸侯吏卒繇戍過秦中秦人遇之多無狀及章邯以秦軍降楚諸侯吏卒乘勝折辱奴虜使之故多怨羽計衆心不服至關必危于是夜擊坑秦卒二十餘萬人新安城南而獨與章邯及長史欣都尉翳入秦沛公遣兵守函谷關項籍攻破之遂屠咸陽殺子嬰掘始皇冡在臨潼縣東俗呼當陵大掠而東有鯫生臣瓚曰鯫姓服虔曰鯫小也説沛公距關無內諸侯秦地可盡王沛公從之項羽至關關閉不得入又聞沛公已定關中大怒使黥布等擊破關進至戲沛公左司馬曹無傷使人言于羽曰沛公欲王關中令子嬰為相珠寶盡有之羽益大怒饗士卒期旦日擊沛公時羽兵四十萬號百萬在鴻門坂名在臨潼縣東今曰項王營沛公兵十萬號二十萬在霸上范增謂羽曰沛公居山東時貪財好色今入關財物無所取婦女無所幸此其志不小吾令人望其氣皆為龍虎成五采此天子氣也急擊勿失羽季父項伯素善張良伯在秦時嘗殺人良救之夜馳告之欲與俱去良曰臣為韓王送沛公今有急亡去不義因固要項伯入見沛公公奉巵酒為夀約為婚姻曰吾入關秋毫不敢有所近籍吏民封府庫而待將軍所以遣將守關者備他盜耳日夜望將軍至豈敢反乎願伯具言臣之不敢背德項伯許諾曰旦日不可不早自來謝遂去具以告羽因言曰沛公不先破關中公豈敢入乎今人有大功而擊之不義不如因善遇之羽曰諾沛公旦日從百餘騎來見羽鴻門沛公曰臣與將軍戮刀而攻秦將軍戰河北臣戰河南不自意先入關能破秦得復見將軍于此今者有小人之言令將軍與臣有隙項羽曰此沛公左司馬曹無傷言之不然籍何以至此羽因留沛公飲范增數目羽舉所佩玉玦示之者三羽不應增出使項莊請以劍舞因擊沛公殺之莊入為夀畢拔劍起舞項伯亦拔劍起舞常以身翼蔽沛公莊不得擊于是張良出見樊噲曰今項莊拔劍舞其意常在沛公也噲曰此迫矣即帶劍擁盾兵器所以捍身入瞋目視羽頭髮上指目眥盡裂羽按劍曰客何為者張良曰沛公驂乘樊噲也羽曰壯士賜之斗巵酒一生彘肩噲立而飲酒拔劍切彘肩盡啖之羽曰壯士能復飲乎噲曰臣死且不避巵酒安足辭夫秦有虎狼之心天下皆叛懷王與諸將約曰先入咸陽者王之今沛公先破秦入咸陽勞苦功髙未有封爵之賞而將軍聽細人之説欲誅有功之人此亡秦之續耳竊為將軍不取也羽未有以應須臾沛公起如厠招噲出與亡去沛公曰今者出未辭也噲曰大行不顧細謹大禮不辭小讓今人方為刀俎我為魚肉何辭為沛公獨騎噲步從間行趨霸上至軍立誅曹無傷留張良使謝羽羽問沛公安在曰聞將軍有意督過之脫身獨去已至軍矣因以白璧一雙獻羽玉斗一雙與增羽受璧增拔劍撞破玉斗曰唉音哀嘆恨發聲之辭豎子不足與謀奪將軍天下者必沛公也吾屬今為之虜矣居數日羽引兵西屠咸陽殺秦降王子嬰燒秦宫室火三月不滅掘始皇帝冡以三十萬人運物三十日不能窮收寶貨婦女而東秦民大失望韓生説羽曰關中阻山帶河四塞之國東函谷南武關西散關北蕭關地肥饒可都以霸羽見秦殘破又思東歸曰富貴不歸故鄉如衣繡夜行誰知之者韓生退曰人言楚人沐猴而冠果然羽聞之烹韓生項籍尊楚懷王為義帝羽使人致命懷王懷王曰如約言如前約羽怒曰懷王者吾家所立耳非有功伐何以得専主約乃陽尊懷王為義帝徙之長沙都郴今湖南郴州項籍自立為西楚孟康曰江陵為南楚吳為東楚彭城為西楚霸王王梁楚地九郡都彭城立沛公為漢王項羽與范增疑沛公而業已講解又惡負約以巴蜀道險秦之遷人皆居之乃曰巴蜀亦關中也立沛公為漢王王巴蜀漢中注見前都南鄭今縣陜西漢中府治而三分關中王秦降將以距塞漢道章邯為雍王王咸陽以西都廢邱即今興平縣屬西安府司馬欣故為櫟陽獄掾有德于項梁為塞韋昭曰即桃林塞王王咸陽以東至河都櫟陽注見前董翳勸章邯降楚為翟春秋白翟之地王王上郡注見前都髙奴故城在今陜西延安府霄施縣東復分天下以王諸將徙魏王豹為西魏王項羽欲自取梁地故徙之王河東都平陽注見前韓王成因故都都陽翟注見前申陽張耳嬖臣先下河南迎楚為河南王都洛陽司馬卭趙將定河內有功為殷殷故墟王都朝歌注見前徙趙王歇為代王居代注見前立張耳為趙相從入關為常山王王趙都襄國今直𨽻順德府英布為楚將常冠軍為九江王都六注見前吳芮率百越佐諸侯又從入關為衡山王都邾故城在湖北黃州府黃岡縣東南芮將梅鋗封十萬户侯共敖共以邑為氏敖義帝柱國擊南郡功多為臨江王王江陵今縣荆州府治徙燕王廣為遼東王都無終尋為臧荼所殺無終注見前臧荼臧魯臧氏之别荼燕將從楚救趙入關為燕王都薊注見前徙齊王市為膠東王都即墨注見前立田都齊將從楚救趙入關為齊王都臨淄田安王建孫下濟北引兵降楚為濟北王都博陽今山東泰安府泰安縣有博縣故城漢曰博陽諸侯罷兵就國田榮數負項梁又不肯從楚擊秦故不封陳餘棄將印去又不從入關然素賢羽不得已封之南皮三縣二人由是皆怨羽漢以蕭何為丞相遣張良歸韓漢王以項羽背約怒欲攻之蕭何諫曰夫能詘于一人之下而信于萬乘之上者湯武是也臣願大王王漢中養其民以致賢人收用巴蜀還定三秦天下可圖也王曰善乃就國以何為丞相項王使卒三萬人從漢王之國楚與諸侯之慕從者數萬人張良送至褒中今漢中府褒城縣漢曰褒中王遣良歸韓良因説王燒絶所過棧道在褒城縣北接鳳縣東北統名連雲棧以備盜兵且示羽無東意齊田榮自立為齊王田榮聞楚立田都為齊王大怒發兵擊走都都亡走楚因留市不令之膠東市畏項王竊之國榮追殺之時彭越在巨野有兵萬人無所屬榮與越將軍印使擊殺田安榮遂自立盡王三齊謂齊及濟北膠東之地西楚殺韓王成張良復歸漢項王以張良從漢王韓王又無軍功廢以為侯已又殺之張良遂間行歸漢良多病未嘗獨將嘗為畫䇿臣時時從漢王項王既殺韓王成乃以故吳令鄭昌為韓王漢王以韓信為大將還定三秦韓信淮隂秦縣故城在今江南淮安府清河縣東南人家貧無行不得推擇為吏又不能治生商賈嘗數從下鄉南昌亭長食亭長妻苦之乃晨坎蓐食食時信往不為具食信知其意遂絶去至城下釣有漂母哀之飯信信曰吾必重報母母怒曰大丈夫不能自食吾哀王孫而進食豈望報乎準隂少年或衆辱之曰若雖長大好帶刀劍中情怯耳能死刺我不能出跨下信熟視之俯出跨下一市皆笑項梁渡淮信仗劍從之後數以䇿干羽羽弗用亡歸漢坐法當斬信仰視適見滕公即夏侯嬰夏侯氏杞之後以國爵為氏嬰沛人初為滕令故號滕公曰上不欲就天下乎何為斬壯士滕公竒其言貌釋不斬與語説之言于王以為治粟都尉秦官掌榖貨數與蕭何語何竒之王至南鄭將士歌謳思歸多道亡者信亦亡去何不及以聞自追之人或言丞相何亡王怒如失左右手居一二日何來謁王且怒且喜罵曰若亡何也曰臣不敢亡追亡者耳王曰所追者誰曰韓信王復罵曰諸將亡者以十數公無所追追信詐也何曰諸將易得如信國士無雙王欲長王漢中無所事信必欲爭天下非信無足與計事者顧王䇿安決耳王曰吾亦欲東耳安能鬱鬱久居此乎何曰計必欲東能用信信即留不能用信終亡耳王乃欲拜信為大將何請擇日齋戒設壇具禮王許之諸將皆喜人人自以為得大將至拜乃信也一軍皆驚信已拜上坐王曰丞相數言將軍將軍何以教寡人信謝因問王曰今東鄉爭權天下非項王耶王曰然信曰大王自料勇悍仁強孰與項王王默然良久曰不如也信再拜賀曰信亦以為不如也然臣嘗事項王請言項王之為人也項王喑噁叱吒喑烏鴆反噁烏路反懷怒氣也叱尺栗反吒卓嫁反發怒聲也千人皆廢然不能任屬賢將此匹夫之勇耳見人慈愛言語嘔嘔與姁通至人有功當封爵印刓烏丸反無廉鍔也敝忍不能豫此婦人之仁也雖霸天下不居關中而都彭城背約而以親愛王諸侯不平逐義帝置江南所過殘滅民不親附名雖為霸實失天下心故其強易弱今大王誠能反其道任天下武勇何不誅以天下城邑封功臣何不服以義兵從思東歸之士何不散言敵無不敗散且三秦王將秦子弟數嵗所殺亡不可勝計又欺其衆降諸侯及項王坑秦卒惟此三人得脫秦父兄怨之痛入骨髓而楚強以威王之秦民莫愛也大王入關秋毫無所害除秦苛法秦民無不願大王王秦于諸侯之約大王當王關中民户知之而失職入漢中秦民無不恨者今大王舉而東三秦可傳檄尺書以責所伐者而定也王大喜自以為得信晚遂部署諸將留蕭何收巴蜀租給軍糧食八月引兵從故道秦縣故城在今漢中府鳳縣西北出襲雍章邯迎戰敗走廢邱明年漢兵引水灌廢邱邯自殺漢王至咸陽塞王欣翟王翳皆降張良遺項王書曰漢王失職欲得關中如約即止不敢復東又以齊梁田榮彭越反書遺之羽以故無西意而北擊齊王陵以兵屬漢陵沛人漢王微時常兄事之及起沛陵亦聚黨數千人居南陽至是始以屬漢項王執陵母欲以招之母因使者語陵曰漢王長者終得天下無以我故持二心遂伏劍而死漢王使將軍薛歐王吸因陵兵從南陽迎太公吕后于沛項王發兵拒之不得前丙西楚二年漢二年申是嵗楚義帝亡項籍弒義帝于江中項籍使人趣義帝行其大臣稍稍叛之籍乃密使吳芮黥布共敖擊殺之江中陳餘以齊兵襲常山王耳走漢代王歇復為趙王立餘為代王陳餘在南皮今縣屬直𨽻天津府聞田榮已王齊乃使夏説夏杞之别不得封者為夏氏往説榮假齊兵擊常山復趙王榮許之遂共襲常山張耳敗走欲之楚甘公齊人善説星者曰漢王之入關五星聚東井東井秦分也先至必王楚雖強後必屬漢耳乃走漢餘已敗耳收趙地迎代王歇復王趙歇德餘立以為代王餘留傅趙王而使夏説以相國守代漢立韓王孫信為韓王信韓襄王孽孫張良下韓故地得之以為韓將從漢王入關又從入漢中漢王既定三秦拜信為韓太尉使略韓地漢王東出關至陜今河南陜州鎮撫關外父老于是河南王申陽韓王鄭昌皆降乃立信為韓王漢王都櫟陽注見前漢王自陜還遂都櫟陽故秦苑囿園池皆令民得田之楚擊齊王榮敗死田橫立榮子廣為齊王項王至城陽齊王榮會戰敗走平原平原民殺榮項王乃復立田假為齊王燒夷齊城郭所過盡屠破齊人相聚叛之于是榮弟橫收齊散兵得數萬人擊走假假亡走楚楚殺之立榮子廣為王而相之漢王渡河魏王豹降虜殷王卭以陳平為護軍中尉陽武人陳平家貧好讀書治黃帝老子之術平與兄伯居伯常耕田縱平使遊學平為人長大美色人或謂平貧何食而肥若是其嫂疾平不治生産乃曰亦食粳核耳有叔如此不如無有伯聞之即逐其婦之王慎中曰史臣先載伯逐其婦事為平明盜嫂誣里中社平為宰主割肉也分肉甚均里父老曰善陳孺子之為宰平曰嗟乎使平得宰天下亦如是肉矣初事魏王咎説不聼去事項王拜都尉及漢下殷乃渡河歸漢先是殷王反楚項王使平擊之殷降項王拜平都尉賜金二十鎰無何漢王攻下殷項王怒將誅定殷者平懼乃封其金與印使使還項王而挺身間行仗劍亡渡河船人見其美丈夫疑為亡將當有金玉寶器目之欲殺平平覺乃解衣裸而佐刺船船人知其無有乃止平遂至修武降漢因魏無知求見漠王與語悅之問居楚何官曰為都尉是日即拜平都尉使驂乘典護軍諸將盡歡音喧譁也王聞之益厚平周勃沛人灌嬰灌氏夏斟灌氏之後嬰睢陽販繒者言于王曰陳平雖美如冠玉其中未必有也居家時嘗盜其嫂今為護軍多受諸將金反覆亂臣也願王察之王召讓魏無知無知曰臣所言者能也王所問者行也今有尾生一作微生或曰即微生髙也孝已殷髙宗子有孝行之行而無益勝負之數王何暇用之乎王又召平而問烏平曰臣居楚聞王能用人故來歸然裸身來不受金無以為資誠臣畫計有可采者願大王用之使無可用金具在請封輸官得乞骸骨王乃謝平厚賜之拜護軍中尉盡護諸將諸將不敢復言漢王至洛陽為義帝發喪告諸侯討項籍漢王至洛陽新城注見前三老秦制縣十里一亭十亭一鄉鄉置三老有秩掌教化董公楚漢春秋董公八十二嵗秦世隱士名未詳漢封成侯遮説橫道自言曰臣聞順德者昌逆德者亡兵出無名事故不成故曰明其為賊敵乃可服項羽為無道放弒其主天下之賊也夫仁不以勇義不以力大王宜率三軍為之素服以告諸侯而伐之則四海之內莫不仰德此三王之舉也漢王曰善非夫子無所聞于是為義帝發喪哀臨三日發使告諸侯曰天下共立義帝北面事之今項羽放弒之江南大逆無道寡人親為發喪兵皆縞素悉發關中兵收三河河南河東河內士願從諸侯王擊楚之弒義帝者初張耳走漢漢王厚遇之及是漢使者至趙陳餘曰漢殺張耳乃從于是漢王求人類張耳者斬之待其頭遺陳餘餘乃遣兵助漢許氏衡曰董公順德逆德之辭昭然與日月爭光人心稍知義者從順去逆已于此決矣當日漢王仗義而東天下為之響應者董公力也漢王以五諸侯韋昭曰塞翟韓殷魏也兵伐楚入彭城項籍自齊還破漢軍以漢太公吕后歸項王雖聞漢東既已連齊兵田橫距楚城陽楚連戰未下欲遂破之而擊漢漢王以故得率五諸侯兵凡五十六萬人東伐楚至外黃故城在今河南開封府杞縣彭越將三萬人歸漢越收魏地十餘城請立魏後漢王曰西魏王豹真魏後乃以越為魏相國使略魏地漢王遂入彭城收其寶貨美人日置酒髙會項王聞之令諸將擊齊而自以精兵三萬人從魯出胡陵亦曰湖陵故城在山東兖州府魚臺縣東南至蕭注見前大破漢軍漢軍入榖睢水分流也亦曰碭水在碭山縣東南泗注見前及睢水故睢水分流也舊日河南開封歸德至江南徐州入泗今上流俱堙其在宿遷縣者謂之小河死者二十餘萬人睢水為之不流圍漢王三匝會大風從西北起折木發屋揚沙石晝晦楚軍大亂漢王乃得與數十騎遁去過沛使人求家室家室已亡不相得道逢子盈即孝惠帝及女即魯元公主載以行楚騎追漢王王惠推墮二子滕公下收載遂得脫而太公吕后竟為楚所獲審食其從太公吕后間行反遇楚軍項王置軍中以為質時吕后兄周吕侯名澤將兵居下邑故城在碭山縣東漢王間往從小道而往從之諸侯見漢敗復背漢與楚殷王卭死塞王欣翟王翳皆降楚陳餘聞張耳詐死亦背漢魏王豹請歸視親疾至國即絶河津反為楚漢王遣隨何隨氏隨侯之後以國為氏使九江初項王擊齊徴兵九江黥布稱疾遣將將數千人往漢入彭城布又不佐楚項王由是怨之至是漢王西過梁地問羣臣曰吾欲捐關以東棄之誰可與共功者張良曰九江王布與楚有隙彭越與齊反梁地此兩人可急使而漢將獨韓信可屬大事當一面捐之此三人則楚可破也王謂左右曰孰能為我使九江令之發兵背楚留項王數月我之取天下可以百全謁者隨何請使與二十人俱漢王至滎陽注見前漢王收集散卒屯滎陽蕭何發關中老弱未傅音附著也未傅未著名籍者者悉詣軍韓信亦以兵與漢王會軍復大振與楚戰滎陽南京即春秋鄭京邑秦為縣故城在開封府滎陽縣東南索今滎陽縣治即古大索城又有小索城在縣北間破之楚以故不能過滎陽而西漢遂築甬道屬之河以取敖倉敖山在開封府滎澤縣西北水經注山上有城秦置倉其中故曰敖倉粟漢王還櫟陽立子盈為太子大赦罪人令諸侯子在關中者皆集櫟陽為衛關中大飢米斛萬錢人相食令民就食蜀漢漢王如滎陽命蕭何守關中立宗廟社稷王如滎陽命蕭何侍太子守關中為法令約束立宗廟社稷事有不及奏決者輒以便宜施行上來以聞應劭曰俟主上來還乃以奏聞計關中户口轉漕調兵以給軍未嘗乏絶漢王在滎陽數使使勞苦何鮑生謂何曰王暴衣露蓋數使使勞苦君者有疑君心也為君計莫若遣君子孫昆弟能勝兵者悉詣軍所王必益信君何從之漢王大悅漢韓信擊魏虜王豹遂北擊趙代魏王豹叛漢漢王謂酈食其曰緩頰徐言也往説之酈生往豹謝曰漢王慢侮人罵詈諸侯羣臣如奴耳不忍復見也酈生還漢王以韓信為左丞相與曺參灌嬰俱擊魏魏盛兵蒲坂塞臨晉信乃益為疑兵陳船欲渡臨晉而伏兵從夏陽即魏少梁故城在陜西同州府韓城縣南以木罌渡軍以木押縳罌缶以渡也襲安邑魏王豹驚引兵迎信信遂虜豹傳詣滎陽後漢王使豹與周苛守滎陽楚圍之急苛曰反國之王難與共守遂殺豹信請益兵三萬人北舉燕趙東擊齊南絶楚糧道王遣張耳與俱九月破代兵禽夏説丁西楚三年酉漢三年十月韓信大破趙軍禽王歇斬代王餘遣使下燕韓信張耳擊趙趙聚兵井陘口注見前號二十萬廣武君李左車謂陳餘曰信耳乘勝逺鬬其鋒不可當臣聞千里餽糧士有飢色樵蘇後爨師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在後願假臣竒兵三萬從間道絶其輜重足下深溝髙壘勿與戰彼前不得戰退不得還野無所掠不十日而兩將之頭可致麾下否則必為二子所禽矣餘嘗自稱義兵不用詐謀竒計不從左車策信間視知之大喜乃引兵遂下未至井陘口止舍夜半傳發選輕騎二千人人持一赤幟從間道萆山萆音蔽藏隱山間使敵不見而望趙軍戒曰趙空壁逐我即疾入趙壁拔趙幟立漢赤幟令禆將傳餐小飯曰餐立駐而傳食曰今日破趙會食乃使萬人先行出背水陳趙望見皆大笑平旦信建大將旗鼓出井陘口趙開壁擊之大戰良久于是信耳佯棄旗鼓走水上軍趙果空壁逐之水上軍殊死戰不可敗信所遣二千騎者馳入趙壁拔趙幟立漢幟趙軍已不能得信耳欲還壁壁皆漢赤幟大驚遂亂遁走漢兵夾擊大破之斬陳餘禽趙王歇諸將畢賀因問曰兵法右倍山陵前左水澤今背水而勝何也信曰兵法不云陷之死地而後生投之亡地而後存乎且信非得素拊循士大夫所謂驅市人而戰之也非置死地使人自為戰彼將皆走尚可得而用之乎諸侯皆服信以千金募生得李左車者解其縳而師事之問伐燕齊何若左車謝曰敗軍之將不可以語勇臣何足以權大事信固請左車曰足下虜魏王禽夏説不旬朝破趙二十餘萬衆名聞海內威震諸侯衆庶莫不傾耳以待命然而衆勞卒罷其實難用今舉倦疲之兵頓之燕堅城之下曠日持久燕若不破齊必自強二國相持則劉項之權未有所分也為將軍計不如按甲休兵北有燕路發一乘一使奉尺書以使燕燕必不敢不聽從燕而東臨齊雖有智者不知為齊計矣兵固有先聲而後實者此之謂也信遂用左車䇿發使燕燕從風而靡乃遣使報漢而與張耳行定趙地是月甲戍晦日食十一月癸卯晦日食隨何以九江王布歸漢隨何至九江説黥布歸漢何謂布曰大王與楚同為諸侯而北鄉臣事之者必以楚為強可托國也夫楚雖強背盟約而殺義帝天下負之以不義之名今漢王收諸侯守滎陽下蜀漢之粟堅守而不動楚人深入敵國老弱轉糧進不得攻退不得解楚不如漢亦易見矣大王不與萬全之漢而自托于危亡之楚竊為大王不取也布隂許之未敢泄楚使者在傳舍方急責布發兵何直入曰九江王已歸漢楚何以得發兵因説布殺楚使者而攻楚楚使龍且擊破之布乃間行與何歸漢十二月至漢漢王方踞床洗足召布入見布悔怒欲自殺及出就舍帳御食飲從官皆如漢王居布又大喜過望漢益其兵與俱屯成臯布使人至九江楚已收布兵盡殺其妻子漢遣酈食其立六國後未行而罷楚數侵奪漢甬道漢軍乏食漢王與酈食其謀橈楚權食其曰昔湯放桀武王伐紂皆封其後秦伐諸侯滅其社稷今誠能立六國後其君臣百姓必皆戴德慕義願為臣妾大王南面稱霸楚必斂衽而朝王曰善趣刻印酈生未行張良來謁王方食具以告良良曰臣請借前箸為大王籌之昔湯武封桀紂之後者度能制其死生之命也今大王能制項籍之死命乎武王入殷發粟散錢偃革為軒革兵車軒朱軒謂廢兵車而用乘車也休馬放牛示不復用今大王能之乎且天下遊士離親戚棄墳墓從大王遊者徒欲望咫尺之地今復立六國從遊士各歸事其主大王誰與取天下乎且夫楚惟無強言無強于楚者六國復橈而從之若六國立必復屈橈而從楚大王焉得而臣之誠用客謀大事去矣漢王輟食吐哺罵曰豎儒幾敗乃公事令趣銷印楚圍漢王于滎陽范增死漢王謂陳平曰天下紛紛何時定乎平曰項王骨鯁之臣亞父項羽尊范增為亞父鍾離昧楚伯州犁居鍾離其後以邑為氏之屬不過數人耳項王為人意忌信讒誠能捐金行間以疑其心破楚必矣王乃與平黃金四萬斤不問其出入平多縱反間言昧等功多不得裂地欲與漢滅楚而分其地項王果疑昧等及楚圍滎陽急漢王請和割滎陽以西為漢項王使使至漢陳平使為太牢具舉進見楚使佯驚曰吾以為亞父使也乃項王使即持去更以惡草具進楚使歸具以告項王果大疑亞父亞父欲急攻下滎陽項王不聽亞父怒曰天下事大定矣君王自為之願賜骸骨歸未至彭城疽發背死漢王走入關彭越擊楚楚還兵擊之漢王復軍成臯楚圍滎陽益急將軍紀信紀為齊所滅其復以國為氏曰事急矣臣請誑楚可以間出于是陳平夜出女子二千餘人楚四面擊之紀信乃乘王車黃屋天子車以黃繒為蓋裏是以為黃屋左纛毛羽幢在車衡左方上注之故曰左纛曰食盡漢王降楚楚皆呼萬嵗之城東觀以故漢王得與數十騎出西門遁令周苛守滎陽項王燒殺紀信漢王自成臯入關收兵欲復東轅生轅氏陳大夫轅塗之後亦或從袁説王曰願君王出武關羽必南走王深壁勿戰令滎陽成臯間且得休息而韓信等亦得安輯趙地連燕齊王然後復還滎陽則楚備多而力分復與之戰破之必矣王從之出兵宛葉間與黥布行收兵羽果引兵南王不與戰會彭越破楚軍初漢王破彭城越盡亡其所下梁地往來為漢遊兵至是度睢破楚軍下邳殺薛公楚將項王東擊越漢王于是復軍成臯楚破彭越還拔滎陽及成臯漢王走渡河奪韓信軍遣信擊齊項王既破走彭越乃引兵西拔滎陽烹周苛項王生得周苛欲降之苛罵曰若不趨降漢當為虜矣若非漢王敵也羽怒烹之遂圍成臯漢王跳徒雕反獨出也出成臯玉門獨與滕公共車玉門成臯北門北渡河宿小修武今河南衛輝府獲嘉縣有小修武聚獲嘉古修武也自稱漢使者晨馳入趙壁張耳韓信未起即卧內奪其印符以麾召諸將易置之信耳起乃知漢王來大驚即令耳守趙信收趙兵未發者擊齊楚逐拔成臯欲西漢使兵距之鞏注見前漢王欲捐成臯以東而屯鞏洛以距楚酈生曰王者以民為天民以食為天夫敖倉天下轉輸久矣聞其下藏粟甚多楚拔滎陽不堅守敖倉乃引而東此天所以資漢也願即進兵收取滎陽據敖倉之粟塞成臯之險杜太行之道距蜚狐之口蜚狐口在今直𨽻易州廣昌縣北守白馬之津注見前以示諸侯形制因地形以制敵之勢則天下知所歸矣王乃復謀取敖倉時漢王已得韓信軍復大振屯小修武欲復與楚戰郎中鄭忠説止王乃使劉賈盧綰渡白馬津入楚地佐彭越燒楚積聚以破其業劉賈漢王從父兄盧綰豐人與漢王同里有星孛于大角漢書天文志房南衆星曰騎官左角理右角將大角者天王帝坐廷彭越下梁十七城楚復擊取之彭越攻徇梁地下外黃等十七城項王聞之令大司馬曹咎守成臯而自引兵東擊越所下城圍外黃數日乃降項王欲盡坑之外黃令舍人兒年十三説項王曰彭越強擊外黃外黃恐故且降以待大王今又坑之百姓安所歸心哉且從此以東十餘城皆恐莫肯下矣羽從之梁地俱復為楚戊西楚四年戍漢四年漢韓信襲破齊齊王廣走髙密今縣屬山東萊州府先是漢王遣酈食其説齊王曰王知天下之所歸乎王曰天下何所歸酈生曰歸漢漢王先入咸陽項王負約王之漢中項王遷殺義帝漢王聞之起兵出關而責義帝之處義帝弒于江中不知處所故責之立諸侯之後與天下同其利豪英賢才皆樂為之用項王有背約之名有殺義帝之負記人之過忘人之功賢才怨之而莫為之用故天下之事歸于漢王可坐而䇿也今又已據敖倉塞成臯守白馬距蜚狐天下後服者先亡矣齊王納之遂與漢平而罷守備與酈生日縱酒為樂韓信引兵至平原聞酈生已説下齊欲止蒯徹曰將軍受詔擊齊而漢發間使下之寧有詔止將軍乎且酈生一士伏軾掉三寸之舌下齊七十餘城將軍以數萬之衆嵗餘乃下趙五十城為將數嵗反不如一豎儒之功乎信遂渡河襲破齊齊王以為酈生賣已烹之東走髙密使使請救于楚漢王復取成臯與楚皆軍廣武山名在河南開封府河隂縣北東連滎澤西接汜水項王之擊彭越戒曹咎曰謹守成臯即漢欲戰慎勿與戰項王已東漢數挑楚戰曹咎不出漢使人辱之數日咎怒渡兵汜水在開封府汜水縣西源出方山注于河半渡漢擊破之盡得楚金玉寶貨咎及司馬欣俱自剄汜水上漢王乃引兵渡河復取成臯軍廣武項王聞咎等破亦還軍廣武廣武有二城西城漢所築東城項羽所築夾城之間有絶澗斷山曰廣武澗與漢相守楚軍食少項王患之乃為髙俎置太公其上告漢王曰今不急下吾烹太公漢王曰吾與羽俱北面受命懷王約為兄弟吾翁即若翁必欲烹而翁幸分我一杯羮項王怒欲烹之項伯曰天下事未可知且為天下者不顧家雖殺之無益祇益禍耳項王從之乃使人謂漢王曰天下胸胸徒以吾兩人願與王挑戰決雌雄毋徒苦天下父子為也漢王笑謝曰吾寧鬭智不鬬力項王三令壯士出挑戰漢有善射者樓煩輒射殺之項王怒乃自披甲持戟出樓煩欲射項王瞋目叱之樓煩目不能視手不能發走還入壁漢王使間視之乃項王也大驚因與項王臨廣武澗而語項王欲與漢王獨身挑戰漢王數之曰懷王命先定關中者王之羽負約王我蜀漢罪一矯殺卿子冠軍罪二救趙不還報擅劫諸侯入關罪三燒秦宫室掘始皇帝冡私其財罪四殺秦降王子嬰罪五詐坑秦子弟新安二十萬罪六王諸將善地而徙逐故王罪七出逐義帝自都彭城奪韓梁地罪八使人隂殺義帝罪九為政不平主約不信天下所不容大逆無道罪十吾以義兵從諸侯誅殘賊使刑餘罪人擊公何苦乃與公挑戰項王大怒伏弩射漢王傷胸王乃捫足曰虜中吾指因病創卧張良強請起行勞軍以安士卒王從之疾甚因馳入成臯楚救齊漢韓信擊破之殺其將龍且虜齊王廣田橫自立為齊王戰敗走信遂定齊地韓信東追齊王楚使龍且將兵二十萬救齊或説龍且曰漢兵逺鬬窮戰其鋒不可當齊楚自居其地戰兵易敗散顔師古曰近其家室懷顧望也不如深壁令齊王使其信臣招所亡城亡城聞主在楚來救必反漢漢兵客居其勢無所得食可不戰而降也且曰吾知韓信為人易與耳寄食于漂母無資身之䇿受辱于跨下無兼人之勇不足畏也且救齊不戰而降之吾何功今戰而勝齊半可得何為而止遂進與漢軍夾濰水注見前而陳信夜令人為萬餘囊盛沙壅水上流旦半渡擊且陽不勝還走且喜曰我固知信怯遂追渡水信使決壅囊水大至且軍大半不得渡即急擊殺且楚軍散走齊王廣亡去信追北至城陽虜廣田橫以廣死自立為王灌嬰擊走之橫走梁歸彭越越時居梁地中立且為楚且為漢盡定齊地漢立張耳為趙王初韓信破趙請立張耳為王以撫其國漢王許之至是乃立耳為趙王耳子敖尚漢魯元公主耳王一年卒敖嗣立漢立韓信為齊王韓信使人言于漢王曰齊邊楚反覆之國請為假王以鎮之漢王大怒罵曰吾困于此旦暮望若來乃欲自立耶張良陳平躡王足附耳語曰漢方不利寧能禁信之自王乎不如因而立之使自為守不然變生王悟復罵曰大丈夫定諸侯即為真王耳何以假為遣張良操印立信為齊王徴其兵使擊楚項王聞龍且死大懼使武涉盱眙人説信欲與連和三分天下涉謂信曰漢王興兵擊楚其意非盡吞天下不休且漢王不可必身居項王掌握中數矣然得脫輒背約復擊項王其不可親信如此足下雖以與漢王為厚交為之盡力然項王今日亡次即取足下足下與項王有故何不反漢與楚連和三分天下王之信謝曰臣事項王官不過郎中位不過執戟言不聽計不用故背楚而歸漢漢王授我上將軍印豫我數萬衆解衣衣我推食食我言聽計用故吾得至于此夫人深親信我我倍之不祥雖死不易幸為信謝項王武涉去蒯徹知天下權在信乃以相人之術相信曰相君之面不過封侯相君之背貴不可言信曰何謂也徹曰天下初發難也憂在亡秦而已今楚漢分爭智勇俱困兩主之命懸于足下足下為漢則漢勝與楚則楚勝莫若兩利而俱存之三分天下鼎足而居其勢莫敢先動足下據強齊從燕趙因民之欲西向為百姓請命則天下風走而響應矣蓋聞天與不取反受其咎時至不行反受其殃願足下熟慮之信曰漢王遇我甚厚豈可鄉利而倍義乎徹曰臣聞勇略震主者身危功蓋天下者不賞今足下戴震主之威挾不賞之功欲持是安歸乎信謝曰先生休矣吾方念之數日徹復説曰夫功者難成而易敗時者難得而易失時乎時乎不再來信猶豫不忍背漢又自以功多漢終不奪我齊遂謝徹徹去佯狂為巫漢立英布為淮南王漢立布使擊楚布徇九江得數縣仍都六漢初為算賦民年十五以上至五十六出賦錢人百二十為一算治庫兵車馬北貉顔師古曰貉在東北方三韓之屬皆是也燕人致梟騎助漢胡三省注貉人及燕皆來歸漢是月漢王令軍士死者吏為棺斂轉送其家四方歸心焉楚與漢約中分天下歸太公吕后于漢解而東歸時漢關中兵益出食益多楚軍食盡韓信又進兵擊之項王恐會漢遣侯公説項王請歸太公項王乃與漢約中分天下鴻溝即河溝注見前以西為漢以東為楚九月歸太公吕后解而東歸漢王欲西歸張良陳平曰漢有天下大半楚兵飢疲今釋弗擊此養虎自遺患也王從之己漢五年是嵗西楚亡今商周受命之年皆亥以一嵗而分繫兩代于楚漢之際亦然漢王追項籍至固陵故城在河南陳州府淮寧縣西北籍擊敗之漢王追項王至夏陽南止軍與齊王信魏相國越期會擊楚至固陵不會楚擊漢軍大破之漢王復入壁深塹而守謂張良曰諸侯不從奈何良曰楚兵且破未有分地其不至固宜君王能與共天下可立致也信之立非君王意不自堅且其家在楚欲得故邑越本定梁地亦望王而君王不早定今能出捐此地以許兩人取睢陽以北至穀城王彭越從陳以東傅海與齊王信使各自為戰則楚易破也漢王從之漢王以齊王信魏相國越及淮南王布等兵圍項籍垓下今江南鳳陽府靈璧縣東南有垓下聚即漢髙祖圍項羽處籍走自殺楚地悉定漢王發使使韓信彭越至皆引兵來劉賈入楚地圍夀春漢亦遣人誘楚大司馬周殷殷畔楚舉九江兵迎黥布隨劉賈皆會項王壁垓下軍少食盡漢帥諸侯兵圍之數重項王聞四面皆楚歌乃驚曰漢皆已得楚乎是何楚人之多也起飲帳中悲歌慷慨有美人姓虞氏常幸從駿馬名騅常騎乃自為歌詩曰力拔山兮氣蓋世時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何歌數曲美人和之泣下數行左右皆泣莫能仰視于是項王乘其駿馬從八百餘騎直夜潰圍南出馳走渡淮至隂陵山名今在江南和州北迷失道問一田父田父紿曰左左乃陷大澤中漢騎將灌嬰追及之項王引而東至東城故城在今鳳陽府定逺縣東南乃有二十八騎漢追者數千人項王引騎依四潰山在和州北石上有馬迹亦稱四馬山為陳謂其騎曰吾起兵八嵗七十餘戰未嘗敗北遂霸天下今卒困此天亡我非戰之罪也今日固決死願為諸君決戰必三勝斬將艾旗乃後死于是分其騎為四隊四鄉漢騎圍之數重項王大呼馳斬一將復斬一都尉殺數十百人諸騎皆服項王欲東渡烏江今和州有烏江浦在烏江故縣東亭長艤船待曰江東雖小地方千里亦足王也今獨臣有船願大王急渡項王笑曰籍與江東子弟八千人渡江而西今無一人還縱江東父老憐而王我我獨不愧于心乎乃以所乘騅馬賜亭長自刎而死漢將王翳取其頭楊喜吕馬童吕勝楊武各得其一體漢封五人皆為列侯楚地悉定獨魯不下漢王欲屠之至城下猶聞絃誦聲為其守禮義之國為主死節因持項王頭示之乃降漢王以魯公號葬項王于榖城山名在今山東泰安府東阿縣東北親為發喪哭之而去封項伯等四人為列侯賜姓劉氏遣劉賈擊臨江王共尉虜之初西楚所立臨江王共敖前死子尉嗣為王漢既定楚尉不降乃遣劉賈擊虜尉更立齊王信為楚王魏相國越為梁王漢王至定陶馳入齊王信壁奪其軍已下令曰楚地已定義帝無後齊王信習楚風俗更立為楚王王淮北都下邳謂相國建成侯越勤勞魏民數破楚軍其以魏故地王之號曰梁王都定陶韓信至楚召漂母賜千金與下鄉亭長錢百曰公小人為德不竟召辱己少年以為中尉告諸將相曰此壯士也方辱我時寧不能死死之無名故忍而就此赦令曰兵不得休八年萬民與劉攽曰讀曰歟助辭苦甚今天下事畢其赦天下殊死以下御批厯代通鑑輯覽卷十二

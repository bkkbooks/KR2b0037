body:
  text: 姓楊氏名堅小名那羅延𢎞農華隂人漢太尉震之後震九世孫元夀為後魏武鎮司馬因家焉父忠元夀之元孫仕魏及周以功封隋國公事具前母吕氏生帝於馮翊般若寺有尼來自河東將帝舍于别館躬自撫養母嘗抱帝忽見頭上出角遍體鱗起大駭墜帝于地尼自外見曰已驚我兒致令晚得天下周天和中襲爵隋公及靜帝立以太后父秉政自進為王遂移周祚滅梁并陳而一天下己酉開皇九年春正月總管賀若弼韓擒虎進軍滅陳獲其主叔寶陳自高祖至後主亡凡五主合三十三年正月朔陳主會朝大霧四塞是日賀若弼自廣陵引兵濟江陳人不覺韓擒虎將五百人自橫江宵濟采石守者皆醉遂克之采石戍主馳啓告變乃內外戒嚴以蕭摩訶樊毅魯廣達並為都督施文慶為大監軍遣樊猛帥舟師入白下即白石城注見前已而賀若弼拔京口以敕書分道宣諭所至風靡韓擒虎進攻姑孰半日拔之于是弼自北道擒虎自南道並進緣江諸戍望風盡走弼進據鍾山即蔣山注見前晉王廣使總管杜彥雲中人與韓擒虎合軍屯于新林陳人大駭降者相繼時建康甲士尚餘十萬人陳主唯晝夜啼泣臺內處分一以委施文慶蕭摩訶以弼懸軍深入壘塹未堅請出兵掩襲不許任忠自吳興入援言宜固守臺城緣淮立柵勿與交戰請給精兵一萬徑掩六合揚聲欲往徐州斷彼歸路則諸軍不擊自去陳主又不能從明日歘然曰兵久不決令人腹煩可呼蕭郎一出擊之任忠叩頭苦請勿戰孔範奏曰請作一決當為官勒石燕然陳主從之使魯廣達陳於白土岡在上元縣東即鍾山南蔍任忠樊毅孔範蕭摩訶諸軍以次而北亘二十里首尾進退不相知賀若弼登山望之馳下勒陳以待蕭摩訶初無戰意魯廣達以其徒力戰與弼相當弼更引兵趣孔範範兵暫交即走諸軍亂潰不可復止擒蕭摩訶釋而禮之任忠馳見陳主言敗狀曰官好住臣無所用力矣陳主令出募人更戰會韓擒虎自新林進軍至石子岡在江寧懸南亦曰長陵忠遂迎降引擒虎自南掖門入陳文武百官皆散走唯僕射袁憲在殿中陳主遑遽將避匿憲正色曰大事如此去欲安之不若正衣冠御正殿依梁武帝見侯景故事陳主不從曰吾自有計乃從宫人十餘出景陽殿自投於井即景陽井在故臺城內一名胭脂井又名辱井既而軍人窺井欲下石乃聞呌聲以繩引之驚其太重及出乃與張貴妃孔貴嬪同束而上沈后居處如常太子深年十五閉閣而坐舍人孔伯魚侍側軍士叩閣而入深安坐勞之軍士咸致敬焉賀若弼乘勝至樂遊苑在上元縣東北魯廣達猶督餘兵苦戰不息會日暮乃解甲面臺再拜慟哭遂就擒入隋後未幾得疾不療而卒弼夜燒北掖門入聞擒虎已得叔寶恥功在擒虎後與之相詬挺刃而出欲令叔寶作降箋歸已不果越二日晉王廣入建康以施文慶沈客卿及陽惠朗徐哲暨慧景五人皆為民害斬之以謝三吳使髙熲與記室裴矩字𢎞大聞喜人收圖籍封府庫資財一無所取聞者賢之廣以賀若弼違令先期收以屬吏帝驛召之且詔廣曰平定江表弼與擒虎之力也賜物萬段别詔褒美廣之至建康也髙熲先入廣使人馳告之命留張麗華熲曰昔太公蒙面以斬妲己此豈可留也斬之廣聞之變色曰昔人云無德不報吾必有以報髙公矣由是恨熲以許善心字務本高陽北新城人為散騎常侍先是陳使許善心入聘帝留之遂伐陳至是帝使以陳亡告善心善心衰服號哭于西階之下藉草東向坐三日敕書唁焉明日就館拜散騎常侍善心哭盡哀改服垂泣再拜受詔又明日乃朝伏泣于殿下悲不能興上顧左右曰我平陳國惟獲此人既能懷其舊君即我之誠臣也陳水軍都督周羅㬋降初羅㬋守江夏秦王俊不得進相持逾月陳南康內史吕忠肅據巫峽鑿巖綴鐵鎖橫截上流以遏隋船竭其私財以充軍用楊素擊之四十餘戰忠肅守險力爭隋兵死者五千餘人既而隋師屢捷忠肅棄柵而遁復據荆門之延州素大破之于是巴陵以東無復城守者及建康平諸城皆解甲羅㬋乃與諸將大臨三日放兵散然後詣俊降上江皆平王世積闡熙人在蘄口蘄水入江之口在蘄州西移書告諭江州豫章諸郡皆降是月將軍宇文述拔吳州擒刺史蕭瓛東揚州刺史蕭巖以會稽降皆送長安斬之宇文述字伯通盛之子二月置鄉正里長蘇威奏請五百家置鄉正使治民間辭訟李德林以為本廢鄉官判事為其里閭親識剖斷不平今令鄉正治民為害最甚上竟用威議乃以百家為里置里長一人里長之名始此陳湘州刺史陳叔慎字子敬髙宗第十六子起兵長沙敗死楊素之下荆門也遣别將龎暉略地南至湘州城中將士刻日請降刺史嶽陽王叔慎年十八置酒會僚吏酒酣歎曰君臣之義盡于此乎長史謝基伏而流涕助防遂興侯正理陳宗室起曰主辱臣死諸君獨非陳國之臣乎今天下有難實致命之秋也縱其無成猶見臣節青門之外有死不能今日之機不可猶豫後應者斬衆咸許諾乃刑牲結盟遣人詐奉降書于龎暉暉入叔慎伏甲執之以徇并其衆皆斬之叔慎坐於射堂招合士衆數日之中得五千人衡陽太守樊通武州梁置隋改朗州今湖南常德府是刺史塢居業塢氏晉塢大夫之後以邑為氏皆舉兵助之隋刺史薛胄字紹元汾隂人將兵適至擊之叔慎遣陳正理樊通拒戰兵敗胄乘勝入城擒叔慎居業送秦王俊斬之陳馮魂以嶺南降陳地悉平嶺南未有所附數郡共奉髙涼郡太夫人洗氏為主詔遣柱國韋洸字世穆敻之子等安撫嶺外陳豫章太守徐璒據南康拒之洸等不得進晉王廣遣陳叔寶遺夫人書諭以國亡使之歸隋夫人集首領數千人盡日慟哭遣其孫馮魂帥衆迎洸洸擊斬徐璒嶺南皆定表魂為儀同三司册洗氏為宋康郡宋置故城在今廣東肇慶府陽江縣夫人衡州司馬任瓌字瑋忠之弟子勸都督王勇據嶺南求陳氏子孫立以為帝勇不能用以所部來降瓌棄官去于是陳國皆平得州三十郡一百縣四百詔夷建康城邑宫室更以石頭城置蔣州夏四月晉王廣班師俘陳叔寶至京師獻于太廟論功行賞有差帝坐廣陽門觀引陳叔寶于前使納言宣詔勞之內史令宣詔責以羣臣不能相輔乃至滅亡叔寶及其羣臣並愧懼伏地屏息不能對既而宥之帝給賜叔寶甚厚叔寶願得一官號帝曰叔寶全無心肝既而以陳氏子弟多恐其在京城為非乃分置邉州給田業使為生歲時賜衣服以安全之進楊素爵為越公賀若弼宋公弼與韓擒虎爭功于帝前弼曰臣在蔣山死戰破其鋭卒擒其驍將震揚威武遂平陳國擒虎曰臣以輕騎五百直取金陵執陳叔寶弼夕方至臣啓關納之安得與臣比帝曰二卿俱為上勳于是進擒虎上柱國有司劾擒虎士卒淫汙陳宫坐此不加封邑髙熲爵齊公從容命熲與弼論平陳事熲曰弼苦戰破賊臣文吏耳焉敢與之論功帝大笑嘉其有讓弼撰其所畫䇿上之謂之御授平陳七䇿帝弗省曰我不求名公宜自載家傳龎晃等短髙熲帝怒皆黜之親禮逾密因謂熲曰公猶鏡也每被磨瑩皎然益明龎洗字元顯榆林人投陳孔範等于邉裔先是晉王廣戮陳五佞施文慶等未知孔範王瑳王儀俱琅邪人沈瓘武康人之罪故免至是始暴其惡投之邉裔以謝吳越以陳江總袁憲等為開府儀同三司以江總袁憲蕭摩訶任忠為開府儀同三司帝嘉袁憲雅操下詔以為江表稱首帝謂羣臣曰平陳之初我悔不殺任蠻奴受人榮祿兼當重寄不能橫尸徇國乃云無所用力與𢎞演納肝何相去也見周羅㬋慰諭之許以富貴羅㬋泣對曰臣荷陳氏厚遇本朝淪亡無節可紀得免于死陛下之賜也何富貴之敢望初陳散騎常侍韋鼎聘于周遇帝而異之謂曰公當大貴貴則天下一家嵗一周天老夫當委質于公矣及歸盡賣田宅或問其故鼎曰江東王氣盡于此矣至是召為上儀同三司任蠻奴忠小字𢎞演納肝衛懿公為狄所殺盡食其肉而舍其肝𢎞演使還自出其肝而納公之肝焉韋鼎字超盛睿之孫詔除毁兵仗詔曰今率土大同含生遂性禁衛之餘鎮守之外戎旅軍器皆宜停罷武力之子俱可學經民間甲仗悉皆除毁秋七月羣臣請封禪不許八月以左衛大將軍廣平王雄初名惠帝族子後改封觀王為司空綱目作以王雄為司空今依隋書及通鑑改雄貴寵特盛與髙熲盧慶則蘇威稱為四貴雄寬容下士朝野傾屬帝隂忌之以為司空實奪之權雄乃杜門不通賔客冬十二月詔定雅樂帝踐阼之初柱國鄭譯請修正雅樂詔太常卿牛𢎞國子祭酒辛彥之博士何妥等議之積年不決譯言古樂十二律旋相為宫一律之中自備五音皆以宫聲為首各用七聲宫商角徵羽變宫變徵世莫能通譯因龜兹人蘇祗婆善琵琶始得其法推演為十二均七音之外又有五均共成十二律八十四調每律七音音立一調共成此數以校太樂所奏例皆乖越又于七音之外更立一聲謂之應聲編懸鏜磬例皆有八七音用七更立其一故以為應聲與邳公世子蘇夔議纍黍定律一千二百黍為黃鐘之律時人以音律久無通者非譯夔一朝可定帝素不説學而牛𢎞不通音律何妥自恥不逮常欲沮壞其事乃立議非之或欲令各造樂而擇其善者妥又恐樂成善惡易見乃請張樂試之先白帝云黃鐘象人君之德及奏黃鐘之調帝曰滔滔和雅與我心會妥因奏止用黃鐘一宫不假餘律上悅及平陳獲宋齊樂器工人上廷奏之歎曰此華夏正聲也乃調五音為五夏韶夏皇夏諴夏需夏肆夏二舞文舞武舞登歌升歌堂上房內帝自作地厚天髙二曲等十四調賔祭用之太常置清商署以掌之至是牛𢎞又奏中國舊音盡在江左今得梁陳舊樂請加條緝以備雅樂其後魏後周之樂雜有邉裔之聲請悉停之乃詔𢎞與許善心姚察字伯審吳興武康人及虞世基字茂世荔之子參定以辛公義隴西狄道人為岷州西魏置今屬鞏昌府刺史岷俗畏疫一人病闔家避之病者多死公義命皆輿置廳事暑月廳廊皆滿公義設榻晝夜處其間以秩祿具醫藥身自省問病者既愈乃召其親戚諭之曰死生有命豈能相染若相染者吾死久矣皆慙謝而去其後人有病者爭就使君其家親戚固留養之始相慈愛風俗遂變後公義遷并州刺史下車先至獄中露坐驗問十餘日間決遣咸盡還領新訟事皆立決有須禁者公義即宿廳事終不還閎或諌曰公事有程何自苦公義曰刺史無德不能使民無訟豈可某人在獄而安寢于家乎罪人聞之咸自欵服後有訟者鄉閭父老遽曉之曰此小事何忍勤勞使君訟者多兩讓而止庚戌十年春二月以李德林為湖州刺史德林恃才好勝同列疾之由是以佐命元功十年不徙級數與蘇威異議髙熲常助威上多從威議初帝賜德林莊店使自擇之德林請髙阿那肱店店人欣本髙氏強奪民田所為威因奏德林誣罔自入上由是惡之德林又稱父為太尉咨議以取贈官侍郎陳茂言德林父實終于校書上益銜之陳茂河東猗氏人虞慶則等奉使關東還奏鄉正專理詞訟黨與愛憎公行貨賂帝令廢之德林曰兹事臣本以為不可然始置即停朝成暮毁非帝王設法之義自今羣臣于律令輒欲改張願陛下即以軍法從事不然紛紜不已帝怒大詬曰爾欲以我為王莽邪面數其罪出為湖州刺史已而德林轉懷州病死慶懷州隋以河內郡置今河南懷府是殺楚州隋以山陽郡為楚州今江南淮安府是參軍李君才于殿內帝性猜忌不説學既任智以獲大位因以文法自矜明察臨下恆令左右覘視內外有過失則加以重罪又患令史贓汙使私人以錢帛遺之得犯立斬每殿廷捶人揮楚不甚即命斬之髙熲栁彧等諫不納熲等乃盡詣朝堂請罪帝不懌乃令殿內去杖後李君才言帝寵髙熲過甚帝怒命杖之而殿內無杖遂以馬鞭捶殺之因復置杖未幾怒甚又于殿廷殺人兵部侍郎馮基固諌不從尋悔宣慰基而怒羣臣之不諫者夏五月詔軍人悉屬州縣詔曰魏末喪亂軍人權置坊府元魏之末兵制有方坊北齊為六府南征北伐居處無定今可悉屬州縣其墾田籍帳一與民同軍府統領宜依舊式仍罷緣邉新置軍府六月制民年五十免役收庸不役其身取其庸即丁法至六十并除其庸冬十一月江南亂以楊素為行軍總管討平之江表自東晉以來刑法疏緩平陳之後盡反其政蘇威復作五教使民誦之士民嗟怨民復訛言隋欲徙之入關逺近驚駭于是越州隋以會稽郡置今淅江紹興府是髙智慧蘇州隋以吳郡置今為府屬江南沈元懀皆舉兵反自稱天子攻陷州縣陳之故境大抵皆反執縣令殺之曰更能使儂誦五教邪詔遣楊素討之素將濟江使麥鐵杖戴束藁夜浮渡江覘賊還而復往為賊所擒遣兵三十人防之鐵杖取賊刀亂斬防者盡殺之而歸素大竒之奏授儀同三司孟麥鐵杖字才始興人素率舟師自揚子津今曰揚子橋在揚州府江都縣南入擊賊元懀敗走追擒之智慧據浙江東岸為營周亘百餘里船艦被江子總管禆將猶言小總管也來護兒來氏商支孫食采于郲因以為氏後去邑護兒字崇善江都人以輕舸數百直登江岸襲破其營因縱火煙焰漲天素縱兵奮擊大破之智慧逃入海走保閩越素遣總管史萬歲帥衆二千踰嶺越海攻破溪洞不可勝數前後七百餘戰轉鬬千餘里寂無聲問者十旬逺近皆謂已沒萬嵗置書竹筒中浮之于海得者以告素上其事上嗟歎厚賜其家人史萬嵗京兆杜陵素追智慧泛海奄至泉州唐置今為府屬福建此云泉州者史臣追敘之詞賊衆皆散素分兵追捕賊黨執送智慧斬之江南遂定番禺隋分南海置今縣與南海俱為廣州府治夷反遣給事郎隋宮階正八品上裴矩討平之以馮盎為髙州刺史洗氏為醮國夫人番禺夷王仲宣反嶺南首領多應之引兵圍廣州韋洸中流矢死詔以其副慕容三藏檢校軍事又詔裴矩巡撫嶺南矩至南康得兵數千人擊斬仲宣别將進至南海髙涼洗夫人遣其孫盎會三藏等合擊仲宣仲宣衆潰洗氏親被甲乘介馬張錦繖引彀騎衛從裴矩巡撫二十餘州蒼梧首領陳坦等皆來謁見矩承制署為刺史縣令使還統其部落嶺表定上以矩為民部侍郎拜盎髙州刺史贈馮寶醮國公册洗氏為譙國夫人開幕府置官屬給印章聽便宜行事先是夫人遣其孫馮暄將兵攻廣州逗留不進夫人大怒遣使執暄繫州獄及賊平詔赦暄罪拜刺史辛亥十一年春二月以劉曠為莒州後周置治東莞今沂州府沂水縣是今莒州全大定中置刺史平鄉魏置今屬順德府令劉曠有異政以義理曉諭訟者皆引咎而去獄中草滿庭可張羅髙熲薦之故有是命辛巳晦日食秋八月殺滕王瓚字恆生帝母弟初帝微時與瓚不協帝為周相瓚恐為家禍隂欲圖帝其妃周髙祖妹順陽公主也亦與獨孤后不平帝命出之瓚不可至是從幸栗園在長安南遇鴆暴死壬子十二年秋七月蘇威以開府就第尚書盧愷字長仁柔之子除名何妥與蘇威爭議事積不相能威子夔與妥議樂復不同議者以威故同夔者什八九妥恚曰吾席間函丈四十餘年反為昨暮兒言夔生之晚所屈邪遂奏威與盧愷薛道衡王𢎞李同和等共為朋黨帝大怒威免官爵以開府就第盧愷除名知名之士得罪者百餘人自周以來選無清濁及愷攝吏部與薛道衡等甄别士流故涉朋黨之謗以至得罪未幾上曰蘇威德行者但為人所誤耳命復通籍威好立條章每嵗責民間五品不遜答者或云管內無五品之家其不相應領類如此乂為餘糧簿欲使有無相贍民部侍郎郎茂以為煩迂不急皆奏罷之茂嘗為衛國令有民張元預兄弟不睦丞尉請加嚴刑茂曰元預兄弟本相憎疾又坐得罪彌益其忿非化民之意也乃徐諭之以義元預等各感悔頓首請罪遂相親睦郎茂字蔚之恆山新市人壬申晦日食八月制諸州死刑悉移大理奏裁帝以天下用律者多蹖駁罪同論異故有是命冬十二月以楊素為僕射與髙熲等掌朝政領軍大將軍賀若弼除名楊素性踈辨髙下在心唯頗推髙熲敬牛𢎞厚接薛道衡視蘇威以下蔑如也其才藝風調優于熲至于推誠體國處物平當則不如熲逺矣賀若弼自謂功名出朝臣之右當為宰相及素為僕射不平形于言色由是免官怨望愈甚久之上下弼獄謂之曰我以髙熲楊素為宰相汝每昌言毁之何也弼曰熲是臣之故人素臣之舅子臣知其為人誠有此語公卿奏弼罪當死上曰臣下守法不移公可自求活理弼曰臣將八千兵擒陳叔寶竊以此望活上曰此已格外重賞弼曰臣今還格外望活上低回者數日特令除名嵗餘復其爵位詔免河北河東功兵受田計畝為功以其所出修器械備糗糧調丁出調注見前減田租有司言府藏皆滿無所容積于廊廡于是更辟左藏院以受之上乃詔曰寧積于人無藏府庫河北河東今年田租三分減一兵減半功調全免遣使均田時天下户口嵗增京輔及三河河東河南河北地少而人衆衣食不給帝乃發使四出均天下之田其狹鄉每丁才至二十畝老少又少焉癸丑十三年春二月作仁夀宫故址在今鳳翔府麟遊縣西天台山上詔楊素營仁夀宫于岐州之北素奏宇文愷封德彜名倫以字行隆之之子為土木監于是夷山堙谷以立宫殿崇臺纍榭宛轉相屬役使嚴急丁夫多死推填坑谷覆以土石因而築為平地死者以萬數十五年三月宫成帝幸之見制度壯麗大怒曰楊素為吾結怨天下素聞之恐獲譴封德彜曰公勿憂俟皇后至必有恩詔明日帝果召素入對后勞之曰公知吾夫婦老無以自娛盛飾此宫豈非忠孝賜賚甚厚素薦德彜于帝遂遷內史舍人禁藏讖緯秋七月戊辰晦日食詔議明堂制度帝命禮部尚書牛𢎞等議明堂制度宇文愷獻木樣重簷復道五房四達帝命有司度地立之諸儒議久不決乃罷突厥突利可汗莫何可汗之子請婚許之帝之滅陳也以陳叔寶屛風賜突厥大義公主公主以其宗國之覆心常不平書屏風為詩敘陳亡以自寄詩有余本皇家女飄流入虜廷一朝覩成敗懷抱忽縱橫之句帝聞而惡之禮賜漸薄公主遂煽惑都藍可汗先是突厥莫何可汗死兄子雍虞閣立是為都藍可汗頗為邉患帝遣將軍長孫晟使突厥因發公主私事廢之內史侍郎裴矩請説都藍使殺公主時處羅侯即莫何可汗之子染干號突利可汗居北方遣使求婚帝使矩謂之曰能殺大義公主乃許婚突利遂譖公主於都藍都藍因發怒殺公主更表求婚朝議將許之長孫晟曰雍虞閭反覆無信直以與玷厥即達頭可汗有隙故欲依倚國家雖與為婚終當叛去今若尚主承藉威靈玷厥染干必受其徴發強而更反後恐難圖且染干者處羅侯之子素有誠欵前嘗乞婚不如許之招令南徙兵少力弱易以撫馴使敵雍虞閭以為邉扞上曰善復遣晟慰諭染干許尚公主十七年七月突利來逆女帝舍之太常教習六禮妻以宗女安義公主帝欲離間都藍故特厚其禮令長孫晟説之使帥衆南徙居度斤舊鎮居度斤即都斤山舊沙鉢略所甲寅十四年夏四月行新樂協律郎祖孝孫范陽人從陳陽山梁郡今廣東連州是太守毛爽受京房律法牛𢎞使孝孫參定雅樂布管飛灰順月皆驗又每律生五音十二律為六十音因而六之為三百六十音分直一嵗之日以配七音而旋相為宫之法由是著明𢎞等乃奏請復用旋宫法帝猶記何妥之言于是𢎞等復附帝意銷毁前代金石以息異議又作武舞以象功德至是樂成詔行之乃禁民間所造繁聲先是樂工萬寶常妙達鍾律帝令造諸樂器其聲雅淡不為時人所好竟寢不行及是新樂成寶常聞之泫然泣曰淫厲而哀天下不久盡矣寶常竟餓死且死悉取其書燒之曰用此何為六月始給公卿以下職田先是臺省府寺及諸州皆置公廨錢收息取給工部尚書蘇孝慈扶風人以為官司出舉興生謂出錢舉貨興利生息煩擾百姓敗損風俗請皆禁止給地以營農于是始詔公卿以下皆給職田毋得治生與民爭利關中旱飢秋八月帝如洛陽上遣左右視民食得豆屑雜粳以獻上流涕以示羣臣深自咎責為之不御酒食殆將一月八月帥民就食于洛陽敕斥候不得驅迫男女參厠于仗衛之間遇扶老擕幼者輒引馬避之至艱險處見負擔者命左右扶助冬閏十月詔髙仁英齊武成帝第六子蕭琮陳叔寶修其宗祀官給器物詔以齊梁陳宗祀廢絶命髙仁英蕭琮陳叔寶以時修祭所須器物有司給之叔寶常侍宴賦詩曰日月光天德山河壯帝居太平無以報願上東封書及出帝目之曰此敗豈不由酒以作詩之功何如思安時事當賀若弼度京口彼人密啓告急叔寶飲酒遂不之省髙熲至日見啓在床下猶未開封誠可笑也劉氏友益曰歷敘三族而不及宇文氏非以盡滅其族乎綱目言外之意深矣齊州刺史盧賁有罪除名賁坐民飢閉糶除名皇太子為言賁有佐命功不可棄帝曰微劉昉鄭譯盧賁栁裘皇甫績等則我不至此然此等皆反覆子也當周宣帝時以無賴得幸及帝大漸此輩行詐顧命于我我將為政又欲亂之昉謀為逆譯為巫蠱自為難信非我棄之衆人見此謂我薄于功臣斯不然矣賁遂廢死于家乙卯十五年春正月帝東巡祀天于泰山以嵗旱謝愆咎也禮如南郊三月還宫夏六鑿底柱注見前焚相州所貢綾文布于朝堂秋七月納言蘇威免威以十四年七月為納言尋復其位威坐從祠不敬免俄而復位帝謂羣臣曰世人言蘇威詐清家纍金玉此妄言也然其性狠戾不切世要求名太甚從已則説違之必怒此其大病耳冬十月以韋世康洸之兄為荆州總管世康和靜謙恕為吏部尚書十餘年時稱亷平常有止足之志謂子弟曰祿豈須多防滿則退年不待暮有疾便辭因懇乞骸骨不許使鎮荆州時天下惟有四總管并揚益荆以晉秦蜀三王及世康為之丙辰十六年夏六月初制工商不得仕進秋八月詔死罪三奏然後行刑丁巳十七年春二月遣太平公史萬嵗討南寧蠻南寧本漢建寧郡晉改寧州梁以復曰南寧今雲南曲靖府是蠻通鑑作羌胡三省曰南寧爨蠻非羌也今依其説改平之初梁睿平王謙夷獠皆附唯南寧州酋帥爨震爨夷姓東爨曰烏蠻西爨曰白蠻不服睿上疏乞因平蜀之衆略定之帝未之許至是乃以史萬歲為行軍總管帥衆擊之入自蜻蛉川在今姚安府姚州南漢書地理志越嶲郡青蛉應劭曰有青蛉水在西東入江即此過諸葛亮紀功碑背有銘曰萬嵗之後勝我者度西過此萬歲令仆其碑而進洱河即葉榆水注見前入渠濫州在大理府境行千餘里破其三十餘部虜獲男女二萬餘口諸夷大懼遣使請降獻明珠徑寸于是勒石頌隋德萬嵗請將其酋長爨玩入朝玩賂萬嵗萬嵗捨之已而爨玩復反蜀王秀奏萬嵗受賂縱賊致生邉患萬嵗于是除名桂州梁置今廣西桂林府是亂遣軍討平之以令狐熙字長熙整之子為總管桂州俚帥李光仕作亂遣周法尚討斬之上以夷越數反以令狐熙為桂州總管許以便宜從事承制補授熙至部大𢎞恩信其溪洞渠帥更相謂曰前時總管皆以兵威相脅今者乃以手教相諭我輩其可違乎于是相率歸附先是州縣生梗長吏多寄治于總管府熙悉遣之為建城邑開學校華夷感化焉三月詔諸司論屬官罪聽律外決杖帝以所在屬官不敬憚其上事難克舉故有是詔于是上下相驅迭行捶楚以殘暴為幹能守法為懦弱又以盜賊繁多命盜一錢以上皆棄市或三人共盜一瓜事發即死于是行旅皆宴起早宿天下凛凛有數人劫執事而謂之曰吾豈求財者邪但為枉人來耳而為我奏至尊自古立法未有盜一錢而死也而不以聞吾更來而屬無類矣帝聞乃為停之帝晚節用法益峻不復依準科律嘗乘怒欲以六月杖殺人大理少卿趙綽固爭帝曰六月雖曰生長此時必有雷霆我則天而行有何不可遂殺之掌固來曠告綽濫免徒囚推驗無實帝怒命斬之綽又固爭帝拂衣入閣綽託奏他事復入再拜曰臣有死罪三不能制馭掌固使觸天刑一也囚不合死不能死爭二也本無他事妄言求入三也帝意解會獨孤后在坐命賜綽酒及二金杯曠因免死蕭摩訶子世略在江南作亂摩訶當從坐綽固爭上命綽退綽曰臣奏獄未決不敢退帝乃釋之刑部侍郎辛亶常衣緋禈帝以為厭蠱斬之綽曰法不當死臣不敢奉詔帝怒甚命引綽斬之綽曰寧殺臣不可殺亶至朝堂解衣就刑上復使人問之對曰執法一心不敢惜死帝乃釋之帝以綽誠直前後賞賜萬計與大理卿薛胄俱名平恕然胄原情而綽守法俱為稱職寺趙綽字元方河東人掌固官名臺省監皆有之夏四月頒新歷初張賔歷既行劉孝孫廣陵人及劉焯字士元信都昌亭人並言其失賔方有寵劉暉附之斥罷孝孫等後賔卒孝孫復上其事詔直太史纍年不調乃抱其書使弟子輿櫬詣闕下伏哭執法拘而奏之帝以問何妥妥言其善使與張胄元渤海蓚人校賔厯久之不定上令參問日食事楊素等奏太史奏日食二十有五皆無驗而胄元所刻妙中孝孫驗之過半于是上引孝孫胄元等親勞之孝孫請先斬劉暉乃可定歷帝不懌又罷之孝孫尋卒已而楊素牛𢎞等復薦胄元歷術帝令素與術數人立議六十一事皆舊法久難通者令劉暉與胄元辨析之暉一無所答胄元通者五十四拜太史令令參定新術至是歷成頒之暉等除名并州總管秦王俊有罪免俊幼仁恕喜佛教及為并州總管奢侈好內其如進毒妃崔氏𢎞度女性妒因俊好內于瓜中進毒得疾徴還免官廢妃賜死楊素諫曰秦王之過不至此願陛下詳之帝曰若如公意何不别制天子兒律周公尚誅管蔡况我不及周公安敢虧法卒不許久之俊疾不能起遣使奉表陳謝帝謂其使者曰我戮力創業作訓垂範汝為吾子而欲敗之不知何以責汝俊慚怖疾益篤遂卒帝哭之數聲而已俊子浩崔妃所生庶子曰湛羣臣希旨奏二子母皆有罪不合承嗣帝從之國遂除冬十二月殺魯公虞慶則先是桂州人李世賢反帝遣虞慶則討之時諸將數人請行帝顧慶則曰位居宰相爵乃上公國家有賊遂無行意何也慶則恐懼請行慶則以婦弟趙什住為長史什住通于慶則愛妾恐事泄乃宣言慶則不欲行帝聞之禮賜甚薄及慶則平桂州還至臨桂嶺在潭州今湖南長沙府是曰此誠險固加以足糧若得其人攻不可拔什住入奏事因告慶則謀反按驗坐死拜什住為柱國時宜陽公王世積為涼州總管其親信皇甫孝諧有罪吏捕之亡抵世積不納孝諧因上變告世積嘗令道人相其面有惡言世積坐誅以孝諧為上大將軍吐谷渾弒其可汗世伏夷吕之子先是吐谷渾夷吕可汗死子世伏立遣獻方物帝以光化公主妻之至是國內大亂國人殺世伏立其弟伏允為主遣使陳謝且請依俗尚主從之自是朝貢嵗至戊午十八年春二月髙麗寇遼西遣漢王諒將兵討之劉友益曰隋伐髙麗始此先是髙麗王湯卒湯位宫之後開皇初封髙麗王及聞陳亡大懼治兵積榖為拒守之計帝賜璽書責之會病卒位宫事具前子元嗣帝使拜為遼東王至是元帥靺鞨即古肅慎氏地注見前萬餘人寇遼西營州注見前總管韋沖字世沖洸之弟擊走之帝聞而大怒以水陸三十萬伐髙麗以髙熲為諒長史已而諒軍出臨榆關值水潦餽運不繼軍中飢疫元亦遣使謝罪于是罷兵臨臨渝關即今山海關在永平府榆縣夏五月禁畜貓鬼蠱毒厭魅野道者獨孤后之弟延州西魏置今陜西延安府是刺史陀有婢事貓鬼能使之殺人會后與楊素妻鄭氏俱有疾醫皆曰貓鬼疾也上意陀所為令髙熲等雜治之具得其實詔陀夫婦皆賜死后為之請曰陀若蠱政害民者妾不敢言今為妾身敢請其命陀弟整亦詣闕求哀于是免陀死詔自今有犯者投四裔己未十九年春二月遣楊素等分道代突厥都藍可汗未至都藍擊突利可汗敗之夏四月突利來奔諸軍遂破都藍及達頭部先是突厥都藍可汗聞突利可汗尚主賜賚優厚怒曰我大可汗也反不如染干乎于是朝貢遂絶亟掠邉鄙突利伺知輒遣奏聞至是突利奏都藍欲攻大同城在今吳喇忒旗故天德軍城西南唐書地理志天德軍乾元後徙屯永濟柵故大同城也詔以漢王諒為元帥髙熲出朔州道楊素出靈州道燕榮字貴公華隂人出幽州道以擊都藍皆取諒節度然諒竟不行都藍聞之與達頭可汗結盟合兵掩襲突利大敗之突利部落散亡夜與長孫以五騎南走比旦收得數百騎與其下謀奔玷厥晟知之密遣使者入伏逺鎮在今大同府西北令速舉烽突利見四烽俱發以問晟紿之曰隋法賊少舉二烽來多舉三烽大逼舉四烽彼見賊多而近耳突利大懼投城晟留其達官執室領其衆自將突利馳驛入朝四月至長安帝大喜厚待之以晟為左勳衛驃騎將軍持節護突厥髙熲使柱國趙仲卿洛陽人剛之子將兵三千為前鋒與突厥都藍兵戰大破之突厥復大舉而至仲卿為方陳四面拒戰凡五日會髙熲大兵至合擊之突厥敗走追奔七百餘里而還楊素軍與達頭遇先是諸將與突厥戰慮其騎兵奔突皆以戎車步騎相參設鹿角為方陳騎在其內素曰此自固之道未足以取勝也于是更為騎陳達頭喜曰天賜我也下馬仰天而拜帥騎兵十萬直前周羅㬋曰賊陳未整請擊之先帥精騎逆戰素以大兵繼之突厥大敗殺傷不可勝計秋八月除左僕射髙熲名獨孤后性妒忌後宫莫敢進御尉遲迥女孫沒宫中得幸后隂殺之帝大怒單騎入山谷間二十餘里髙熲楊素等追及扣馬苦諫帝告之故熲曰陛下豈以一婦人而輕天下帝意解還宫后流涕拜謝熲素等和解之因置酒極歡先是后以熲父客甚親禮之至是聞熲謂己為一婦人遂銜之時太子勇失愛帝潛有廢立之志從容謂熲曰有神告晉王妃言王必有天下若之何熲曰長幼有序其可廢乎后知熲不可奪隂欲去之會弟令選東宫衛士入上臺熲奏曰若盡取強者恐東宮宿衛太劣帝作色曰太子左右何須壯士我熟見前代公不須仍踵舊風熲子表仁娶太子女故帝以此言防之熲夫人卒后請為之娶帝告之熲謝曰臣今已老退朝惟齋居讀佛經而已納室非所願也帝乃止既而愛妾生男帝聞之喜后不悅曰陛下尚復信髙熲耶始陛下欲為熲娶而熲心存愛妾面欺陛下今其詐已見矣帝由是疏熲伐遼之後帝以漢王諒年少專委軍事于熲諒所言多不用甚衒之及還泣言于后曰兒幸免為髙熲所殺帝聞之彌不平及王世積誅推核之際有宫禁中事云于熲得之有司奏熲與世積交通賀若弼宇文弼字公輔洛陽人弼古弼文薛胄斛律孝卿太安人栁述字業隆解人機之子等明熲無罪上愈怒皆以屬吏自是朝臣莫敢言熲遂坐免以齊公就第頃之熲國令隋制王公國皆有令尉言熲子表仁謂熲曰司馬仲達託疾不朝遂有天下公今遇此焉知非福于是帝大怒囚熲鞠之有司請斬之帝曰去年殺虞慶則今兹斬王世積如更誅熲天下其謂我何于是除名為民熲初為僕射其母誡之曰汝富貴已極但有一斫頭耳爾其慎之熲由是常恐禍變至是歡然無恨色先是國子祭酒元善言于帝曰楊素粗疏蘇威懦怯可付社稷唯髙熲耳帝初然之及熲得罪帝深責之善憂懼而卒元善魏侍中乂之孫九月以牛𢎞為吏部尚書𢎞選舉先德行而後文才務在審慎雖致停緩而所進用多稱職侍郎髙孝基名構以字行渤海人鑑賞機悟清慎絶倫然爽俊有餘迹似輕薄時宰多以此疑之𢎞獨推心任委隋之選舉得人于斯為最冬十月以突厥突利為啓民可汗妻以義成公主處之朔州突厥歸啓民者男女萬餘帝命長孫晟于朔州築大利城在今歸化城西以處之時安義公主已卒復以宗女義成公主妻之晟奏請徙五原注見前以河為固于夏勝之間夏州魏置故城在今榆林府懷逺縣勝州隋置故城在今鄂爾多斯左翼後旗東西至河南北四百里掘為橫塹令處其內使得畜牧帝從之又令趙仲卿屯兵二萬為啓民防達頭十二月帝遣楊素史萬歲等分道擊都藍未出塞都藍為其下所殺達頭自立為步迦可汗其國大亂長孫晟請遣染干部下分道招慰帝從之降者甚衆明年四月步迦犯塞詔晉王廣等擊之史萬嵗出塞與虜遇虜問將為誰候騎報曰史萬嵗也步迦懼而引去萬嵗馳追大破之逐北入磧數百里而還庚申二十年春三月賀若弼坐事下獄赦出之弼復坐事下獄帝數之曰公有三太猛嫉妒心太猛自是非人心太猛無上心太猛既而釋之冬十月廢太子勇為庶人初帝使太子勇參決政事時有損益帝皆納之勇性寬厚率意無矯飾帝素節儉而勇服用侈靡嘗飾蜀鎧帝見而不悅戒之曰自古帝王未有好奢侈而能久長者汝當以儉約為先乃能奉承宗廟後遇冬至百官皆詣勇勇張樂受賀帝不悅下詔停之自是恩寵始衰勇好內寵昭訓雲氏尤幸其妃元氏無寵遇疾而薨獨孤后意其有他深以責勇然昭訓自是遂專內政生長寧王儼及平原王裕安成王筠諸姬子又數人后彌不平遣人伺求勇過晉王廣知之彌自矯飾後庭有子皆不育后由是數稱廣賢大臣用事者廣皆傾心與交帝及后每遣左右至廣所廣必與蕭妃厚禮之往來者無不稱其仁孝帝與后嘗幸其第廣悉屏匿美姬于别室唯留老醜者衣以縵綵給事左右屏帳改用縑素故絶樂器之絃不令拂去塵埃帝見之喜由是帝與后愛廣特異諸子廣自揚州入朝將還入宫辭后伏地流涕曰臣性識愚下不知何罪失愛東宫恆畜盛怒欲加鴆毒后忿然曰睍地伐漸不可耐我為之娶元氏女竟不以夫婦之禮待之專寵阿雲使有如許豚犬前新婦遇毒而夭我亦不能窮治何故又于汝發如此意我在尚爾我死後當魚肉汝乎每思東宫竟無正嫡至尊千秋萬嵗之後遣汝等兄弟向阿雲兒前再拜問訊此是幾許苦痛耶廣又拜嗚咽不能止后亦悲不自勝自是后決意欲廢勇立廣矣廣問計于安州總管宇文述述曰廢立大事未易謀也能移主上意者唯楊素耳素所與謀者唯其弟約字惠伯述雅知約請朝京師與約圖之廣大悅多齎金寶資述入關約時為大理少卿述請約與飲博陽不勝以所齎金寶盡輸之因説之曰此晉王之賜令述與公為歡樂耳約驚問故述因道廣意且説之曰公兄弟當塗用事有年矣朝臣為足下家所屈辱者可勝數哉又儲后以所欲不行每切齒于執政主上一旦棄羣臣公亦何以取庇哉今太子失愛于皇后主上素有廢黜之心請立晉王在賢兄之口耳誠能因此時建大功王心永銘骨髓斯則去纍卵之危成泰山之安矣約然之約遂白素素聞之大喜後數日入侍宴微稱晉王孝悌恭儉有類至尊后泣曰公言是也阿嬤廣小字大孝愛睍地伐常欲潛殺之素因盛言太子不才后遂遺素金使贊帝廢立帝使素觀勇所為素至東宫還言勇怨望恐有他變帝益疑之后又遣人伺覘東宫纎芥事皆奏聞因加誣飾以成其罪廣又令段達武威姑臧人私賂東宫幸臣姬威令伺太子動靜密告楊素于是外內喧謗過失日聞段達因脅威告之九月詔執左庶子唐令則等數人付所司訊鞫命楊素陳東宫事狀以告近臣左衛大將軍元旻諌曰廢立大事詔旨若行後悔無及讒言罔極惟陛下察之帝不應命姬威悉陳太子罪惡威對曰嘗令師姥卜吉凶語臣云至尊忌在十八年此期促矣帝泫然曰誰非父母生乃至于此于是禁勇及諸子黨與楊素鍛鍊以成其獄居數日有司奏元是嘗曲事勇在仁夀宫勇以書與之題云勿令人見帝乃執旻十月帝戎服陳兵御武德殿集百官諸親引勇及諸子列于殿庭宣詔廢勇及其男女並為庶人勇再拜泣下舞蹈而去左右莫不閔默遂詔元旻唐令則鄒文騰等誅戮有差移勇于內史省賞楊素物三千段初勇嘗宴宫臣唐令則自彈琵琶歌嫵媚娘洗馬李綱起白勇曰令則身為宫卿職當調護乃于廣坐自比倡優進淫聲穢視聼事若上聞豈不為殿下之纍邪臣請速治其罪勇曰我欲樂耳君勿多事綱遂趨至是帝召東宫官屬切責之皆惶懼無敢對者綱獨曰廢立大事今文武大臣皆知其不可而莫敢發言臣何敢畏死不一為陛下别白言之乎太子性本中人可與為善可與為惡鄉使陛下擇正人輔之足以嗣守鴻基今乃以唐令則為左庶子鄒文騰為家令二人惟知以弦歌鷹犬娛太子安得不至于是邪此乃陛下之過非太子之罪也因伏地流涕嗚咽帝慘然良久曰李綱責我非為無禮然我擇汝為宫臣而勇不親任雖更得正人何益哉對曰臣之所以不被親任者良由姦臣在側故也陛下但斬令則文騰更選賢才以輔太子安知臣之終見疏棄也自古國家廢立冢嫡鮮不傾危願陛下深留聖意無貽後悔帝不悅罷朝左右皆為之股栗會尚書右丞缺有司請人帝指綱曰此佳右丞也即用之殺太平公史萬嵗萬嵗使突厥還楊素忌之奏寢其功會廢太子萬嵗方與將士在朝堂稱寃帝問萬嵗何在素曰謁東宫矣帝以為然召之既見帝言將士有功為朝廷所抑詞氣憤厲帝大怒令左右㩧弼角反擊也殺之既而追之不及天下共寃惜之十一月立晉王廣為皇太子是日天下地震廣請降章服宫官不稱臣許之以宇文述為左衛率郭衍字彥文太原介休人為左監門率亦豫奪宗之謀也帝囚故太子勇于東宫付廣掌之勇頻請見上申寃廣遏之不得聞初帝之克陳也天下皆以為將太平監察御史房彥謙私謂所親曰主上忌刻而苛太子卑弱諸王擅權天下雖安方憂危亂其子元齡亦密言于彥謙曰主上本無功德以詐取天下諸子皆驕奢不仁必自相誅夷今雖承乎其亡可翹足待髙孝基名知人見玄齡歎曰僕閲人多矣未見如此郎者異日必為偉器恨不見其大成耳見杜杲之兄孫如晦謂曰君有應變之才必任棟梁之重俱以子孫託之字房彥謙字孝沖清河繹幕人元齡名喬以行杜果字子暉杜陵人如晦字克明禁毁佛天尊及神像帝晚年深信佛道鬼神故有是詔徴同州刺史蔡王智積帝弟整之子入朝智積性修謹門無私謁自奉簡素帝甚憐之智積有五男止教讀論語孝經不令交通賔客或問其故智積曰卿非知我者其意恐諸子有才能以致禍也以王伽河間章武人為雍漢縣唐改鳯翔今為陜西鳯翔府治令齊州行參軍王伽送流囚李參等七十餘人詣京師行至滎陽謂曰卿輩自犯國刑身嬰縲紲固其職也重勞援卒沿途護送之卒豈不愧心參等辭謝伽乃悉脫其枷鎖停援卒與約曰某日當至京師如致前却謂或前或却不如期至吾當為汝受死遂捨之而去流人感悅如期而至一無離叛帝聞而驚異召見與語稱善久之于是悉召流人宴而赦之因下詔曰使官盡王伽民皆李參刑厝其何逺哉乃擢伽為雍令辛酉仁夀元年春正月改元先是太史令袁充字德符君正之子表稱隋興以後晝日漸長蓋日去極近則景短而日長去極逺則景長而日短行內道則去極近行外道則去極逺開皇元年冬至之景長一丈二尺七寸二分自爾漸短至十七年短于舊三寸七分謹案京房别對曰太平日行上道升平行次道霸代行下道伏惟大隋啓運景短日長振古希有上臨朝謂百官曰日長之慶天之祐也今當改元宜取此意以為號仍命百工作役並加程課丁匠苦之二月乙卯朔日食夏六月遣十六使巡省風俗廢太學及州縣學改國子為太學詔以學校生徒多而不精唯簡留國子學生七十人太學四門及州縣學並廢劉炫字光國河間景城人上表切諫不聼尋改國子為太學冬十一月祀南郊初帝受周禪恐民心未服故多稱符瑞以耀之其偽造而獻者不可勝計散騎侍郎王邵上表言上受命符瑞甚衆又探歌謡識緯捃托佛書曲加誣飾撰皇隋靈感志三十卷奏之上令宣示天下賞賜優洽王邵字君懋太原晉陽人至是郊祀板文備述以報謝云以馮盎為漢陽本成州大業初改郡唐仍為州今階州成縣是考漢陽郡置于大業此云漢陽者史臣追敘之辭太守潮成潮州隋改陳瀛州置今為府屬廣東成州梁置隋後改封州今肇慶府封川縣是等五州獠反髙州酋長馮盎馳詣京師請封之帝敕楊素與盎論賊形勢素歎曰不意蠻夷中有如是人即遣盎發江嶺兵擊之事平除盎漢陽太守壬戌二年春三月突厥入寇楊素擊破走之突厥思力俟斤思力人名俟斤突厥大臣之稱俟渠之反等南渡河大掠啓民人畜而去行軍元帥楊素帥諸軍追擊轉戰六十餘里大破之悉得人畜以歸啓民自是突厥逺遁磧南無復冦抄秋八月皇后獨孤氏崩后崩太子對帝及宫人哀慟絶氣若不勝喪者其處私室飲食言笑如平常又每朝令進二溢米而私取肥肉脯鮓置竹筒中以蠟封口衣襆裹而納之冬閏十月詔修定五禮詔楊素蘇威與牛𢎞等修之葬獻皇后徐昭文考證獻上漏文字考隋書髙祖紀仁夀二年冬閏月葬獻皇后于泰陵並無文字蓋文為髙祖之諡煬帝即位後始以后從髙祖諡稱曰文獻猶後漢之稱光烈明德諸后是也葬時髙祖現存安得即以其諡加之綱目一本隋書並非有漏考證自誤帝令上儀同三司蕭吉字文休梁長沙王懿之孫為皇后擇葬地得吉處云卜年三千卜世二百帝曰吉凶由人不在于地然竟從吉言吉退告人曰皇太子遣宇文左率深謝余云公前稱我當為太子竟有其驗今卜山陵令我早立當以富貴相報吾語之曰後四載太子御天下然太子得政隋必亡矣吾前紿云三千者三十也二百者二傳也汝其識之十二月廢蜀王秀為庶人除治書侍御史栁彧名配懷逺鎮唐書地理志營州有懷逺鎮營州治栁城注見前先是詔徴益州總管蜀王秀還京師秀容貌瓌偉有膽氣好武藝在益州頗奢僭聞晉王廣為太子意甚不平太子恐其為後患隂令楊素求其罪而譖之帝遂徴秀還及是秀至帝不與語使使切讓之秀謝罪帝曰頃者秦王糜費財物我以父道訓之今秀蠧害生民當以君道繩之于是付執法者開府慶整慶氏齊大夫慶父之後以字為氏諫曰庶人勇既廢秦王已薨陛下見子無多何至如是蜀王性甚耿介今被重責恐不自全帝大怒欲斷其舌因謂羣臣曰當斬秀于市以謝百姓乃命楊素等推治之太子隂作偶人縛手釘心枷鎖杻械書帝及漢王姓名密埋之華山下楊素發之又云秀妄述圖讖并作檄文置秀集中以聞帝曰天下寧有是邪乃廢秀為庶人幽之內侍省秀嘗從治書侍御史栁彧求李文博所撰治道集文博博陵人好學能文著治道集十卷行于世彧與之秀遺彧奴婢十口及秀得罪楊素以夙憾素嘗以小譴送臺命彧治之彧據案坐立素于庭辨詰事狀素由是銜之奏彧以內臣交通諸侯除名為民配戍懷逺鎮久之貝州長史裴肅遣使上書曰髙熲以天挺良才元勳佐命為衆所疾以至廢棄願陛下録其大功忘其小過又二庶人得罪已久寧無革心願陛下𢎞君父之慈顧天性之義各封小國觀其所為若能遷善漸更增益如或不悛貶削非晚書奏帝謂楊素曰裴肅憂我家事此亦至誠也于是徴肅入朝太子聞之謂左庶子張衡曰使勇自新欲何為也衡曰觀肅之意欲令如吳太伯漢東海王耳肅至帝面諭而罷之神貝州後周置今廣平府清河縣是裴肅字封俠之子張衡字建平河內人詔楊素三五日一入省論大事楊素既廢太子及蜀王威權愈盛兄弟諸父並為尚書列卿諸子位至柱國刺史廣營資産家僮數千妓妾亦數千第宅華侈制擬宫禁違忤者誅夷附會者進擢朝廷靡然莫不畏附大理卿梁毗字景和安定烏氏人上封事曰臣聞臣無有作威作福其害于而家凶于而國今楊素幸遇謂寵幸知遇愈重權勢日隆所私皆非忠讜所進咸是親戚子弟布列兼州連縣天下無事容息異圖四海有虞必為禍始陛下若以素為阿衡臣恐其心未必伊尹也伏願揆鑒古今量為處置俾鴻基永固率土幸甚書奏帝大怒收毗繫獄親詰之毗極言素擅寵弄權殺戮無道又太子及蜀王罪廢之日百僚無不震悚惟素揚眉奮肘喜見容色利國家有事以為身幸帝乃釋之其後帝亦寢疏忌素乃下敕曰僕射國之宰輔不可躬親細務三五日一向省評論大事外示優崇實奪之權也素由是不復通判省事出楊約為伊州隋置今河南府嵩縣是刺史于是吏部尚書栁述遂益用事參掌機密素深惡之癸亥三年秋龍門王通字仲淹河東龍門人獻䇿不報通詣闕獻太平十二䇿帝不能用罷歸通遂教授于河汾之間弟子自逺至者甚衆纍徴不起楊素甚重之勸之仕通曰通有先人之敝廬足以庇風雨薄田足以供􅊡粥讀書談道足以自樂願明公正身以治天下使時和年豐通也受賜多矣不願仕也或譖通于素曰彼實慢公公何敬焉素以問通通曰使公可慢則僕得矣不可慢則僕失矣得失在僕公何預焉素待之如初弟子賈瓊問息謗通曰無辨問止怨曰不爭通嘗稱無赦之國其刑必平重斂之國其財必削又曰聞謗而怒者讒之囮五戈反烏媒也見譽而喜者佞之媒也絶囮去媒讒佞逺矣大業末卒于家門人諡曰文中子考隋書王通無傳其行事略見于唐書王績王勃傳績通之弟勃通之孫也通鑑所載多採于中説文中子世家然據中説唐初魏徴杜淹皆通弟子隋書為徴奉敕所撰何竟不為通立傳或曰王績嘗持杜淹所撰文中子世家授陳叔逹欲上史館時長孫無忌不悅學叔達弟叔恬嘗糾無忌淹又與無忌有隙故其書遂不得上宋龍川陳氏曰房魏諸公雖嘗往來河汾而師友之義實未成且智又不足以盡知其道故當時朝論有所不及説或然歟並録之以備考突厥啓民可汗歸國突厥步迦可汗所部大亂鐵勒僕骨鐵勒别部在獨洛河北等十餘部皆叛降于啓民步迦西奔吐谷渾長孫晟送啓民置磧口啓民于是盡有步迦之衆甲子四年春正月帝如仁夀宫秋七月太子廣弒帝于大寶殿在仁夀宫而自立遂殺故太子勇流尚書栁述侍郎元巖于嶺南四月帝不豫七月疾甚僕射楊素兵部尚書栁述黃門侍郎元巖考隋書元巖傳巖為蜀王秀長史開皇十三年卒此侍疾者或又是一元巖皆入閣侍疾召太子入居殿中太子慮帝有不諱須預防擬手自為書封出問素素條録事狀以報宫人誤送帝所帝覽而大恚帝所寵宣華陳夫人陳髙宗女旦出更衣為太子所逼拒之得免上怪其神色有異問故夫人泫然曰太子無禮上恚抵牀曰畜生何足付大事獨孤誤我乃呼栁述元巖曰召我兒述等將呼太子上曰勇也述巖出閣為敕書素聞以白太子矯詔執述巖繫獄追東宫兵帖上臺宿衛門禁出入並取宇文述郭衍節度令右庶子張衡入殿侍疾盡遣後宫出就别室俄而上崩陳夫人聞變戰慓失色晡後太子封小金盒遣使者賜夫人夫人以為鴆毒懼甚發之乃同心結也夫人患而却坐不肯致謝諸宫人共逼之乃拜使者其夜太子蒸焉明日發喪即位會楊約自伊州來朝太子遣約入長安矯稱髙祖之詔賜故太子勇死縊殺之然後陳兵集衆發凶問追封勇為房陵王不為置嗣除述巖名徙之嶺南令蘭陵公主與述離絶欲改嫁之公主以死自誓表請與述同徙帝大怒公主憂憤而卒貶許善心為給事中袁充奏皇帝即位與堯受命年合諷百官表賀禮部侍郎許善心以為國哀甫爾不宜稱賀宇文述素惡善心諷御史劾之左遷降品二等并州總管漢王諒起兵晉陽遣楊素擊虜以歸殺之諒有寵于髙祖為并州總管自以所居天下精兵處見太子勇蜀王秀得罪常不自安乃言于髙祖以突厥方強宜修武備于是繕治器械招集私人殆將數萬咨議參軍王頍苦委反者僧辨之子倜儻好竒略與蕭摩訶俱不得志鬱鬱思亂皆為諒所親善及髙祖崩帝即位以髙祖璽書徴之先是髙祖與諒密約若璽書召汝敕字旁别加一點又與玉麟符刻玉為符作麟形并揚益三總管用後惟東西兩都留守用之合則就徴及發書無驗諒知有變遂發兵晉陽唱言楊素反將誅之遣諸將分道四出余公理出太谷綦良出滏口劉建出井陘喬鍾葵出雁門太谷隋縣今屬山西太原府署兵曹裴文安為柱國與紇單貴紇姓單貴名王𣆀等直指京師諒簡精鋭數百騎戴羃莫狄反離通作㒿即惟帽婦人著之以蔽面及身後其製漸短短名曰蓋頭稱宫人還長安徑入蒲州城中豪傑頗有應之者文安等未至蒲津百餘里諒忽改圖令紇單貴斷河橋守蒲州而召文安還帝以楊素為并州道行軍總管河北安撫大使帥衆討諒素先以五千騎襲蒲州紇單貴敗走王𣆀以城降綦良攻黎州塞白馬津余公理自太行下河內帝以史祥為行軍總管軍河隂公理逆戰祥擊敗之進趣黎陽良軍不戰而潰喬鍾葵攻代州總管李景拒守月餘帝遣朔州刺史楊義臣救之鍾葵悉衆以拒義臣擊破之休黎州後周置治黎陽今衛輝府濬縣是史祥字世寧之子李景字道興天水休官人楊義臣代人本姓尉遲父崇與突厥戰死髙祖以其誠節賜姓楊氏諒遣其將趙子開擁衆十萬屯據髙壁嶺名在平陽府靈石縣東南上有韓信墓亦名韓信嶺布陳五十里素令諸將以兵臨之自引竒兵潛入霍山在平陽府霍州東南即古太嶽今為中鎮緣崖谷而進馳出北軍之北直指其營鳴鼓縱火北軍不知所為自相蹂踐殺傷數萬諒聞之大懼自將兵十萬拒素會大雨欲引還王頍諌曰楊素懸軍深入士馬疲斃王以鋭卒自將擊之其勢必克今乃望敵而退是阻戰士之心而益西軍之氣也願王勿還諒不從頍謂其子曰氣候不佳兵必敗矣楊素進擊諒大破之擒蕭摩訶諒退保晉陽素進兵圍之諒窮蹙請降頍自殺羣臣奏諒當死帝不許除名為民竟以幽死所部吏民坐死徙者二十餘萬家初髙祖與獨孤后甚相畏重誓無異生之子嘗謂羣臣曰前代天子溺于嬖幸嫡庶分爭或至亡國朕旁無姬侍五子同母可謂真兄弟也豈有此憂耶又懲周室諸王微弱故使諸子分據大鎮及其晚節迭相猜忌五子皆不以夀終冬十月葬泰陵在乾州武功縣西南史臣曰髙祖以外戚之尊受託孤之任乘兹機運遂遷周鼎樓船南邁則金陵失險驃騎北指則單于欵塞于是躬節儉平徭賦倉廪實法令行開皇二十年間天下晏如也然無寬仁之度有刻薄之資暨乎暮年此風愈煽又雅好符瑞暗于大道聽妒婦之言惑邪臣之説溺寵廢嫡付託失所滅父子之道開兄弟之隙縱其尋斧翦伐根本墳土未乾子孫為戮惜哉十一月帝如洛陽章仇太翼章仇本章氏因避仇遂加仇為章仇氏太翼字協昭河間人後賜姓盧氏言于帝曰陛下木命通鑑作酉命考隋書煬帝紀開皇元年立為晉王時年十三是年嵗在辛丑是則煬帝乃己丑生非酉命也通鑑有誤但己丑亦非木命太翼傳不載其事未知綱目何據雍州為破木之衝雍州酉位故曰破木不可久居又讖云修治洛陽還晉家帝以為然遂幸洛陽留晉王昭守長安塹龍門注見前達上洛注亦見前以置關防發丁男數十萬掘塹自龍門東接長安注見前汲郡隋置唐改衛州今河南衛輝府是抵臨清關在衛輝新鄉縣東北今曰臨清鎮度河至浚儀漢縣故城在今開封祥祥縣襄城注見前達于上洛以置關防陳叔寶卒贈長城公諡曰煬以洛陽為東京大業五年又改東京為東都煬帝乙丑大業元年春正月立皇后蕭氏廢諸州總管府立晉王昭為皇太子二月以楊素為尚書令敕有司大陳金寶器物錦彩車馬引楊素及諸將討并州有功者于前使竒章公牛𢎞宣詔賜賚有差以素為尚書令詔天下公除謂已成服除之以從公事惟帝服淺色黃衫鐵裝帶三月命楊素營東京宫室詔楊素營東京役丁二百萬人徙洛州郭內居民及諸州富商大賈數萬户以實之敕將作大匠宇文愷與內史舍人封德彛等營顯仁宫在今河南府宜陽縣西南北跨洛濵南接皂澗發江嶺之間竒材異石輸之洛陽又求海內嘉木異草珍禽竒獸以實苑囿開通濟渠即蒗蕩渠注見前引汴水蒗蕩渠南出為汴水今故道已為黃河所奪開邗溝注亦見前置離宫造龍舟詔曰古者聽採輿頌謀及庶民故能審刑政之得失今將巡厯淮海觀省風俗遂命尚書右丞皇甫議發丁百萬開通濟渠自西苑引榖洛水達于河復自板渚在開封府汜水縣東北水經注河水徑板城北有津謂之板城渚口引河入汴引汴入泗以達于淮又發民十萬開邗溝入江溝廣四十步傍築御道樹以栁自長安至江都置離宫四十餘所遣黃門侍郎王𢎞等往江南造龍舟及雜船數萬艘官吏督役嚴急役丁死者什四五夏四月劉方京兆長安人大破林邑注見前還卒于師先是羣臣有言林邑多珍寶者乃令劉方為歡州漢九真郡隋置歡州今為安南國地寰宇記州南至環王國十日程環王即林邑也道行軍總管經略林邑至是方出海口林邑王梵志遣兵守險方擊走之師度闍黎江在占城國北唐時林邑改號環王後徙國于占更號占城林邑兵乘巨象四面而至方戰不利乃多掘小坑草覆其上與戰偽北林邑逐之象多顛躓以弩射之象却走蹂其陳因以鋭師繼之林邑大敗引兵追之過馬援銅柱南越志日南郡西有屠夷國馬援至其地立二銅柱以表漢界南八日至其國都梵志走入海方入城獲其廟主十八皆鑄金為之刻石紀功而還士卒腫足死者十四五方亦得疾卒于道五月築西苑在洛陽縣西亦名芳華苑苑周二百里其內為海周十餘里為方丈蓬萊瀛洲諸山髙百餘尺臺觀宫殿羅絡山上海北有渠縈注海內緣渠作十六院門皆臨渠每院以四品夫人主之窮極華麗宫樹凋落剪綵為花葉綴之沼內亦剪綵為荷芰菱芡色渝則易以新者十六院競以殽羞精麗相髙求市恩寵上好以月夜從宫女數千騎遊西苑作清夜遊曲于馬上奏之秋七月廢滕王綸字斌籀瓚之子衛王集字文會爽之子徙之邉郡綸集俱于開皇中嗣爵綸以父瓚故瓚被鴆事見前每不自安及帝即王與集時呼術者問吉凶及章醮求福或告其怨望呪詛除名徙邉八月帝如江都上幸江都龍舟四重髙四十五尺長二百尺上重有正殿內殿朝堂中二重有百二十房皆飾以金玉下重內侍處之皇后乘翔螭舟制度差小别有浮景九艘三重皆水殿也餘數千艘有漾彩朱鳥倉螭白虎元武飛羽青鳬凌波五樓道壇元壇板􅀈黃篾等名後宫諸王公主百官僧尼道士蕃客乘之共用挽士八萬餘人其漾綵以上九千餘人謂之殿腳皆以錦綵為袍衛兵所乘又數千艘有平乘青龍艨艟艚􅀈艇􅀈等名舳艫相接二百餘里騎兵翊岸而行所過州縣五百里內皆令獻食多者一州至百輿極水陸珍竒後宫厭飫將發棄埋之契丹寇營州遣謁者隋書百官志大業初改內史省通事舍人為謁者韋雲起京兆萬年人以突厥兵討平之契丹寇營州詔通事謁者韋雲起護突厥兵討之啓民可汗發騎二萬授其處分雲起分為二十營四道俱引營相去一里不得交雜聞鼓聲而行聞角聲而止自非公使勿得走馬三令五申擊鼓而發有紇干突厥官名犯約斬以徇于是突厥將帥入謁皆膝行股栗莫敢仰視契丹本事突厥不相猜忌雲起既入其境使突厥詐云向栁城與髙麗交易敢漏泄事實者斬契丹不為備去其營五十里馳進襲之虜獲甚衆以女子及産畜之半賜突厥餘皆收之以歸帝大喜擢為治書侍御史鐵勒叛西突厥自立為莫何可汗初西突厥阿波可汗為莫何汗處羅侯所虜事具前國人立鞅素特勒之子是為泥利可汗泥利卒子達漫立號處羅可汗處羅多居烏孫故地撫御失道國人多叛復為鐵勒所困鐵勒胸奴遺種族類最多有僕骨同羅契苾薛延陀等部其酋長皆號俟斤分屬東西兩突厥是嵗處羅引兵擊鐵勒諸部厚稅其物又忌薛延陀集其酋長數百人盡殺之于是鐵勒皆叛立俟利發俟斤契苾歌楞為莫何可汗又立薛延陀俟斤字也嘻為小可汗與處羅戰屢敗之莫何勇毅絶倫甚得衆心為鄰國所憚伊吾髙昌焉耆皆附之丙寅二年春二月新作輿服儀衛詔牛𢎞等議定輿服儀衛制度以何稠字桂林妥兄子為太府少卿使之營造送江都稠參會古今多所損益衮冕晝日月星辰皮辨以漆紗為之大抵務為華盛以稱上意課州縣送羽毛民求捕之殆無遺類烏程注見前有髙樹踰百尺上有鶴巢民欲取之不可乃伐其樹鶴恐殺其子自拔氅毛投于地時人或稱以為瑞夏四月還東京二月上發江都四月自伊闕陳法駕備千乘萬騎入東京御端門大赦制五品以上文官乘車在朝并服佩玉武官馬加珂螺屬生海中其色白用為勒飾戴幘巾幘起于秦服袴褶騎服也文物之盛近世莫及也秋七月制百官不得計考增級制百官不得計考增級必有德行功能灼然顯著者進擢之帝頗惜名位羣臣當進職者多令兼假而已時牛𢎞為吏部尚書不得專行其事蘇威宇文述張瑾虞世基裴藴陳尚書忌之子裴矩參掌選事而與奪之筆世基獨專之受納賄賂黜陟任意太子昭卒太子昭自長安來朝數月將還欲乞少留不許拜請無數昭體素肥因致疾薨帝哭之數聲而止尋奏聲伎無異平日也楚公楊素死越公楊素雖有大功特為帝所猜忌外示殊禮內情甚薄太史言隋分野有大喪乃徙素為楚公意楚與隋同分欲以厭之素寢疾不肯餌藥謂弟約曰我豈須更活耶八月封孫倓為燕王侗為越王侑為代王皆元德太子昭之子也冬十月置洛口回洛倉置洛口倉于鞏東南原上城周二十餘里穿三千窖置回洛倉于洛陽北七里城周十里穿三百窖窖皆容八千石徴天下散樂初齊髙緯之世有魚龍山車等戲謂之散樂周宣帝時鄭譯奏徴之及髙祖受禪牛𢎞定樂悉放遣之帝以啓民可汗將入朝欲以富樂誇之太常少卿裴藴希旨奏括天下前世樂家子弟皆為樂戶其六品以下至庶人有善音樂者皆直太常帝從之于是四方散樂大集東京課京兆河南製其衣錦綵為空帝多製艷篇令樂正白明達造新聲播之音極哀怨始建進士科隋書北史俱無建立進士科之文唯唐書楊綰傳云進士起于隋大業中然亦不言年月故通鑑不載綱目以設科之始特為增入但紀于太子昭卒之下楊素卒之前未知何據考煬帝紀大業二年七月甲戌太子薨乙亥楊素薨兩日相連末恐其間無暇建科取士也今因改輯于是年之御批歷代通鑑輯覽卷四十七

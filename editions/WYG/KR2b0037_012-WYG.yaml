front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷十三漢起高帝五年己亥至孺子嬰初始元年戊辰凡十二帝二百一年附新莽十四年更始二年共二百二十六年太祖髙皇帝
  hash: sha256:5073df9d9c7a4c6d9304f378fd2306051aebfc017fff50430039d395022dc6d9

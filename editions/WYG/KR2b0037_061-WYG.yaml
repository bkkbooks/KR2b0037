body:
  text: 上以旱故減膳徹樂出宫女縱鷹隼止營繕命同平章事盧商字為臣范陽人帝即位初相與御史中丞封敖字碩夫冀州蓚人疎理京城繫囚大理卿馬植字存之扶風人奏曰官典犯贓及故殺人大赦所不免今因疎理而原之使貪吏無所懲畏死者銜寃無告恐非所以消旱災致和氣也詔兩省議之諫議大夫張鷺等言所原死罪無寃可雪宜如植奏詔從之以植為刑部侍郎植素以文學政事有名于時李德裕不之重及是白敏中秉政凡德裕所薄者皆不次用之以李德裕為太子少保分司初德裕引白敏中入翰林及德裕失勢敏中竭力排之使其黨訟德裕罪故有是命閠月敕復廢寺是時君臣務反㑹昌之政故僧尼之弊皆復其舊積慶太后文宗母居積慶殿故以是稱之蕭氏崩諡貞獻葬光陵側夏六月以令狐綯字子直楚之子為考功郎中知制誥上謂白敏中曰朕昔從憲宗之喪道遇風雨百官皆散惟山陵使長而多髯攀靈駕不去誰也對曰令狐楚上曰有子乎敏中以綯對且稱其有才器上即擢綯知制誥問以元和故事綯條對甚悉上悦遂有大用之意秋八月作雍和殿上敦睦兄弟作雍和殿於十六宅數臨幸置酒作樂擊毬盡歡諸王有疾常親至臥内存問憂形于色冬十二月貶李德裕為潮州司馬初淮南節度使李紳案奏江都令呉湘贓罪盗用官錢彊取所部百姓女當死湘武陵兄子也議者多言其寃詔御史崔元藻字襄華武城人李稠晉江人覆之與前獄異李德裕素惡武陵貶元藻稠湘獄不復更推即如紳奏處死至是湘兄汝納言湘罪不至死為德裕所枉殺御史鞫之奏狀如汝納言于是貶德裕潮州司馬有丁柔立者方德裕秉政時或薦其清直可任諫官德裕不能用至是柔立為右補闕上疏訟德裕寃坐阿附貶南陽尉明年再貶德裕厓州司户德裕竟卒于貶所戊辰二年春正月羣臣上尊號二月以令狐綯為翰林學士上嘗以太宗所撰金鏡書名金鏡録授綯使讀之至亂未嘗不任不肖治未嘗不任忠賢止之曰凡求致太平當以此言為首又書貞觀政要于屏風每正色拱手而讀之上欲知百官名數綯曰六品以下吏部注擬五品以上政府制授各有籍名曰具員上命宰相作具員御覽五卷寘于案上作五王院上欲作五王院以處皇子之㓜者召術士柴嶽明使相其地嶽明對曰臣庻遷徙不常故有禍福之説隂陽書本不言帝王家也上善其言賜以束帛夏五月己未朔日食以周墀馬植同平章事初墀為義成節度使辟韋澳字子斐貫之之子為判官及為相謂澳曰何以相助澳曰願相公無權墀愕然澳曰官賞刑罸與天下共其可否勿以已之愛憎喜怒移之天下自理何權之有墀深然之太皇太后郭氏暴崩于興慶宫諡懿安葬景陵側初憲宗之崩上疑郭太后預其謀又鄭太后本郭太后侍兒有宿怨故上即位待郭太后禮殊薄郭太后意怏怏一日登勤政樓欲自隕上聞之大怒是夕暴崩外人頗有異論上不欲以郭太后附葬憲宗有司請葬景陵外園禮院檢討官王皥奏宜合葬祔廟上大怒白敏中召皥詰之皡曰太皇太后汾陽王之孫憲宗在東宫時正妃母天下歴五朝豈得以曖昧之事遽廢正嫡之禮乎敏中甚怒皥氣愈厲周墀見之舉手加顙歎其孤直皥竟坐貶句容漢縣今屬江寧府令後咸通中皥復為禮官伸前議乃始以太后配饗憲宗冬十一月萬壽公主適起居郎鄭顥絪之孫顥以文雅著稱公主上之愛女故選尚之舊制以銀装車上曰吾欲以儉約化天下當自親者始令依外命婦以銅装車仍詔公主執婦禮皆如臣庻之法戒以毋得輕夫族預時事顥弟顗嘗得危疾上遣使視之還問公主何在曰在慈恩寺觀戲塲上怒歎曰我怪士大夫家不欲與我家為昏良有以也亟召公主責之曰豈有小郎病不往省視乃觀戲乎由是貴戚皆守禮法如衣冠之族己巳三年春正月以韋宙為御史上與宰相論元和循吏孰為第一周墀曰臣嘗守土江西聞觀察使韋丹功德被于八州沒四十年老穉歌思如丹尚存詔史館修撰杜牧撰丹遺愛碑仍擢其子宙為御史夏四月周墀罷為東川節度使王宰入朝以貨結貴倖求以使相領宣武周墀上書論之宰遂還鎭駙馬都尉韋讓求為京兆尹墀言京兆尹非才望不可為讓議竟􅃦墀又諫上開邉忤㫖遂罷鄭顥言于上曰周墀以直言入相亦以直言罷上深感悟加檢校右僕射盧龍節度使張仲武卒子直方為留後直方尋授節度使暴忍喜遊獵軍中將作亂直方知之舉族逃歸京師軍中推牙將周綝為留後明年綝卒軍人復立張允仲為留後張充伸字逄昌范陽人五月武寜軍亂逐其節度使李廓程之子詔以盧𢎞止代之初李廓在鎭不治右補闕鄭魯上言其狀且曰臣恐新麥未登徐師必亂速命良帥救此一方上未之省徐州果亂逐廓上思魯言擢為起居舍人以盧𢎞止為節度使武寧士卒素驕有銀刀都唐末藩鎮親軍多謂之都銀刀注詳後尤甚屢逐主帥𢎞止至鎭都虞侯胡慶方復謀作亂𢎞止誅之撫循其餘訓以忠義軍府遂安秋七月克復河湟先是吐蕃三州秦原安樂三州注具見前七闗石門驛藏制勝石峽木峽六盤蕭七關俱在平涼府界來降詔諸道皆出兵應接至是涇原節度使康季榮取原州及六闗靈武節度使朱叔明取安樂州邠寧節度使張君緒取蕭闗八月改安樂州為威州河隴老㓜千餘人詣闕上御延喜門樓見之歡呼舞躍解胡服襲冠帶詔募百姓墾闢三州七闗土田五年不收租稅將吏能為營田者官給牛及種糧温池唐縣故城在今寧夏府靈州鹽利靈州有大小二鹽池委度支制置戍卒倍給衣糧二年一代餘没蕃州縣亦令量力收復是冬西川節度使杜悰取淮州冬閠十一月加順宗憲宗諡號宰相以克復河湟請上尊號上曰憲宗嘗有志復河湟未遂而崩今乃克成先志耳其議加順憲二宗尊號以昭功烈庚午四年夏四月貶馬植為常州刺史上之立也中尉馬元贄有力焉由是有寵植與之叙宗族上賜元贄寳帶元贄以遺植植服之以朝上見而識之收其親吏鞫之盡得交通之狀故貶冬十月以令狐綯同平章事先是周墀旣罷以崔鉉魏扶字相之盈之孫同平章事既而馬植貶魏扶復卒于是崔龜從字元告武城人及綯相繼為相龜從于是年六月先相辛未五年春二月以裴休為鹽鐡使自太和以來歳運江淮米不過四十萬斛吏卒侵盗沈舟逹渭倉者什不三四大墮劉晏之法休窮究其弊立漕法十條歳運百二十萬斛以李福字能之石之弟為夏綏節度使党項屢為邉患上頗知由邉帥利其羊馬數欺奪之或妄誅殺虜不勝憤怨故反乃以右諫議大夫李福節度夏綏自是繼選儒臣以代邉將之貪暴者行日復靣加戒勵党項遂安三月以白敏中充招討党項都統制置使上以南山平夏党項党項在銀夏以北居川澤者為平夏党項在安以南居山谷者為南山党項乆而未平頗厭用兵崔鉉建議遣大臣鎮撫乃以白敏中為制置使兼邠寧節度使軍于寧州定遠城注見前使史元破党項九千餘帳敏中奏党項平詔南山党項猶行抄掠宜于銀夏境内授以閒田或復入山林不受敎令則誅討無赦若邉將貪鄙致其怨叛當先罪邉將後討冦虜南山党項尋以請降赦之制以党項既平罷敏中都統以平章事充邠寧節度使夏五月吐蕃論恐熱入朝先是恐熱擊尚婢婢遂掠河西五千里間皆成赤地旣而所部以其殘虐多叛恐熱勢孤乃揚言曰吾今入朝借兵于唐求誅不服者至是入朝求為河渭節度使上不許召對遣還恐熱怏怏而去衆稍散纔有二百餘人奔于廓州注見前冬十月以魏謩同平章事時上春秋已高太子未立羣臣莫敢言謩入謝因言今海内無事惟未建儲副使正人輔導臣竊以為憂且泣時人重之十一月以張義潮沙州人為歸義節度使先是義潮以沙州降時吐蕃大亂義潮隂結豪傑一旦帥衆被甲譟於州門唐人皆應之吐蕃守將驚走義潮送攝州事奏表來降發兵畧定其旁瓜伊西甘肅蘭鄯河岷廓十州𤓰州唐置今安西府是餘注俱見前至是遣其兄義澤奉圖籍入見於是河湟之地盡入于唐詔置歸義軍於沙州以義潮鎮之壬申六年春二月雞山胡三省注在蓬果二州之界蓬果二州注俱見前羣盜寇掠果州刺史王贄𢎞討平之初蓬果羣盜依阻雞山宼掠三州胡三省注渭東西川及山南西道詔果州刺史王贄𢎞討之山南西道亦奏巴南妖賊言辭悖慢上怒其崔鉉曰此皆陛下赤子廹于饑寒盜弄兵于谿谷間不足辱大軍但遣一使者可平矣乃遣京兆少尹劉潼字子因晏兄子招諭之潼言今使羣賊歸命其勢甚易所慮者武臣恥不戰之功議者貴欲速之效耳潼之山中盜彎弓待之潼直前曰我靣受詔赦汝罪使汝復為平人汝眞欲反可射我賊皆投弓列拜請降潼歸館而贄𢎞引兵已至山下竟擊滅之三月詔大將軍鄭光丹陽人鄭太后之弟賜莊免税役尋罷之敇先賜鄭光鄠縣等莊並免税役中書門下奏税役之法天下皆同鄭光獨免似乖法意敇曰朕以鄭光元舅初不細思親戚之間人所難議卿等茍非愛我豈進嘉言庻事能盡如斯天下何患不理有始有卒當共守之並依所奏夏六月以畢諴字存之搆從曽孫為邠寕節度使党項復擾邉上欲擇帥而難其人從容與翰林學士畢諴論邉事諴援今據古具陳方畧上悦曰不意頗牧近在禁庭卿其為朕行乎諴欣然奉命既而諴招諭党項平之閠月以盧鈞為河東節度使河東節度使李業縱吏民侵掠雜虜由是北邉擾動詔以鈞代之業内有所恃謂恃宦官人莫敢言魏謩獨請貶黜上不許鈞奏韋宙為副使遣詣塞下諭以禍福禁其侵掠雜虜遂安掌書記李璋杖一牙職明日牙將百餘人訴于鈞鈞杖其為首者謫戊外鎮曰邊鎮百餘人無故橫訴不可不抑也李璋字仲禮絳之字秋八月以裴休同平章事休既相上命休極言時事休請早建太子上曰若建太子則朕遂為閒人休由是不敢復言冬十二月復禁私度僧尼先是進士孫樵字可之闗東人上言百姓男耕女織不自温飽而羣僧安坐華屋羙衣精饌率以十户不能飬一僧武宗憤其然髪十七萬僧是天下百七十萬户始得蘇息也陛下即位以來修復廢寺度僧幾復其舊縱不能如武宗除積弊奈何興之于已廢乎願早降明詔罷之庻幾百姓猶得以息肩也至是中書門下奏度僧不精則戒法堕壊造寺無節則損費過多請自今仍嚴禁私度僧尼從之癸酉七年冬十二月以鄭光為右羽林統軍上事鄭太后甚謹不居别館朝夕奉養鄭光鎭河中入朝上與論政光對鄙淺上不悦留為統軍太后數言其貧上輒厚賜金帛終不復任以民官度支奏歳入之數錢九百二十五萬緍内五百五十萬緍租税八十二萬緍𣙜酤二百七十八萬餘緍鹽利甲戌八年春正月丙戌朔日食罷元㑹先是左補闕趙璘以日食請罷元㑹止御宣政宰相曰天下無事元㑹大禮不可罷也上曰近華州有賊闗中有賊皆朕之憂何謂無事雖宣政亦不可御也二月以牛叢字表齡僧孺子為睦州刺史中書門下奏諫官闕員請補上曰諫官要在舉職不必人多如張道符牛叢趙璘輩數人使朕日聞所未聞足矣乆之叢出為刺史入朝上賜之紫叢曰臣所服緋刺史所借也上遽曰且賜緋上重惜服章有司常具緋紫衣數襲從行以備賞賜或半歳不用其一故當時以緋紫為榮秋九月以高少逸為陜虢觀察使有敇使過硤石唐縣宋省故城在今陜州怒餅黒鞭驛吏見血少逸以聞上責敕使謫配恭陵其後上召翰林學士韋澳屏左右問之曰近日内侍權勢如何對曰陛下威㫁非前朝之比上閉目摇首曰全未全未尚畏之在策將安出對曰若與外廷議之恐有太和之變不若就其中擇有才識者與之謀上曰此乃末策朕已試之矣自衣緋以下皆感恩纔衣紫則相與為一矣上又與令狐綯謀盡誅宦官綯恐濫及無辜密奏曰但有罪勿捨有闕勿補自然漸耗至于盡矣宦者竊見其奏由是益與朝士相惡南北司如水火矣冬十月以李行言為海州刺史上獵于苑北遇樵夫問其縣曰涇陽令為誰曰李行言為政如何曰性執有彊盗數人軍家謂北軍宦者索之竟不與盡殺之上歸帖其名于寝殿之柱尋除行言刺史入謝上賜之金紫取柱帖示之詔雪王涯賈餘等上以甘露之變惟李訓鄭注當死餘人無罪詔雪其寃乙亥九年春正月成德節度使王元逵卒軍中立其子紹鼎為留後紹鼎尋授節度使二年而卒軍中立其弟紹懿二月以李君奭為懐州刺史初上校獵渭上有父老十數聚于佛祠上問之對曰醴泉百姓也縣令李君奭有異政考滿當罷詣府乞留故此祈佛冀諧所願耳及懐州刺史闕上手筆除君奭宰相莫之測君奭入謝上以此奬勵衆始知之上聰明彊記天下奏獄吏卒姓名一覽皆記之度支奏誤漬為清樞密承㫖孫隠中足成之上怒推按謫罰之嘗密令翰林學士韋澳纂次州縣境土風物及諸利害為一書號曰處分語他日鄧州刺史薛𢎞宗入謝出謂澳曰上處分本州事驚人澳詢之皆處分語中事也鄧州注見前夏閏四月詔州縣作差科簿詔以州縣差役不均自今每縣據人貧富及役輕重作簿送刺史檢署訖鎻于令㕔每有役事委令據簿輪差秋七月浙東軍亂逐觀察使李訥遜弟違之子訥性卞急遇將卒不以禮故亂作事聞貶朗州注見前刺史杖監軍王宗景配恭陵仍詔自今戎臣失律并坐監軍崔鉉罷為淮南節度使淮南饑民多流亡節度使杜悰荒于遊宴政事不治上聞之罷悰以鉉代之冬十一月以柳仲郢為鹽鐡轉運使有醫工劉集交通禁中上敇鹽鐡補塲官仲郢上言醫工術精宜補醫官若委務銅鹽何以課其殿最且塲官賤品非特敇所宜親上遽賜絹遣之他日見仲郢勞之曰卿論劉集事甚佳上嘗有疾醫工梁新治之良已自陳求官上不許但一月給錢三十緍而已丙子十年春正月以鄭朗同平章事朗以御史大夫拜工部尚書同平章事内使李敬實遇朗不避馬朗奏之上責敬實對曰供奉官例不避上曰汝衘敇命横絶可也豈得私出而不避宰相乎命剝色配南牙其橫絶謂橫度而過剝色禠服色也南牙注見前夏五月以韋澳為京兆尹澳為人公直既視事豪貴歛手鄭光莊吏恣横積年租税不入澳執而械之具奏其狀欲寘于法上曰鄭光甚愛之何如對曰如此則是陛下之法獨行于貧户耳臣不能奉詔上曰然則痛杖而貸其死可乎澳歸即杖之督租數百斛足乃釋六月裴休罷休屢以疾辭位遂罷為宣武節度使冬十月以鄭顥為秘書監顥營求作相甚切其父祇德聞之祇德先為江西觀察使以顥尚主通顯固求散地為太子賔客分司東都與顥書曰聞汝已判户部是吾必死之年又聞欲求宰相是吾必死之日也顥懼表辭劇務遂以為秘書監十一月册回鶻龎特勒為懐建可汗先是詔以回鶻有功于國世為婚姻㑹昌姦臣遽加殘滅近聞已龎歴即龎特勒今為可汗尚寓安西回鶻前為黠戞斯所虜遺帳居山林間稍歸龎特勒特勒自稱可汗居甘州有磧西諸城俟歸牙帳當加册命至是回鶻遣使入貢遣衛尉少卿王端章充使册拜可汗端章在道為黒車子所塞不至而還後回鶻復屢求册命乾符初遣使詣其國㑹回鶻為吐谷渾嗢末所敗逃遁不知所之遂還合黒車子注見前嗢末本吐蕃奴部論恐熱之亂嘯數千人居甘肅瓜沙間以嗢末為號詔議遷穆宗以下出太廟吏部尚書李景讓上言穆宗乃陛下兄敬宗文宗武宗乃兄之子陛下拜兄尚可拜姪可乎宜遷四主出太廟還代宗以下入廟詔百官議不决而止時人以是薄景讓十二月以崔慎由字敬止融元孫同平章事上命相左右無知者前此今樞密宣㫖以蕭鄴字啟之梁長沙王懿九世孫為相樞密使王歸長等覆奏鄴所判度支應罷否上以為歸長等佑之即手書愼由名付學士院仍罷判度支丁丑十一年春正月以韋澳為河陽節度使澳嘗奏事上欲以澳判户部以心力衰耗難處繁劇為辭上不悦及歸其甥柳玭仲郢子尤之澳曰主上不與宰相僉議私欲用我人必謂我以他岐淂之何以自明且爾知時事浸不佳乎由吾曹貪名位所致耳遂出鎮河陽二月魏謩罷為西川節度使上樂聞規諌凡諌官論事門下封駁茍合于理多屈意從之得大臣章疏必焚香盥手而讀之宰相議事上前他相或委曲規諷魏謩獨正言無所避上每歎曰謩綽有祖風我心重之然竟以剛直為令狐綯所忌而出之秋七月以蕭鄴同平章事魏謩旣出鄴遂相尋罷判度支流祝漢貞于天德軍教坊使祝漢貞滑稽敏給寵冠諸優一日抵掌詼諧頗及外事上正色謂曰我畜養爾曹止供戯笑耳豈得輙預國政耶㑹其子坐贓流之樂工羅程善琵琶有寵殺人繫獄衆工為請曰程負陛下萬死然臣等惜其絶藝不復奉宴遊矣上曰汝曹所惜者羅程藝朕所惜者高祖太宗之法竟杖殺之冬十月遣使迎道士軒轅集于羅浮山在惠州府博志羅西北元和羅山之西有浮山葢蓬萊之一阜海而至與羅浮山並體故曰羅浮上好神仙迎軒轅集至長安問曰長生可學乎對曰王者屏欲而崇德則自然受天遐福何處更求長生留數月求還山乃遣去戊寅十二年春正月以王式播弟起之子為安南都䕶式有才畧至安南樹艻音力木為栅徐昭文曰交趾有此木葉似青楊本生而直木理堅如中國櫟木最耐乆深塹其外宼不能肙選教士卒甚鋭頃之南蠻大至去城半日式意思安閒遣譯諭之中其要害蠻夜引去都校羅行恭乆專府政麾下精兵二千都䕶中軍纔羸兵數百式杖而黜之以劉瑑字子全仁􅁤五世孫同平章事瑑與崔愼由議政于上前慎由曰惟當甄别品流上酬萬一瑑曰昔王夷甫祖尚浮華妄分流品致中原邱墟今當循名責實使百官各稱其職而遽以品流為先臣未知致理之日愼由無以對二月崔慎由罷上欲御樓肆赦令狐綯曰御樓所費甚廣事須有名且赦不可數上不悦曰遣朕于何得名愼由曰陛下未建儲宮四海屬望若舉此禮雖郊祀亦可况于御樓時上餌方士藥已覺躁渴疑忌方深聞之俛首不復言旬日愼由罷相夏四月嶺南軍亂詔以李承勛光弼之孫為節度使討平之嶺南都將王令寰作亂囚節度使楊發字至之素之裔上命李燧鎭嶺南已命中使賜之節給事中蕭倣字思道俛從父弟封還制書上方奏樂不暇别召中使使優人追之節及燧門而返改授承勛討亂平之以夏侯孜字好學亳州譙人同平章事崔愼由既罷孜以兵部侍郎拜同平章事五月同平章事劉瑑卒瑑病篤猶手疏論事上之六月蠻冦安南初安南都䕶李涿通鑑考異曰涿或作琢新書有李琢傳聴之子也不云曽為安南都䕶疑作都䕶者别一李涿非琢也為政貪暴彊市蠻中馬牛羣蠻怨怒導南詔侵盗邉境自是安南始有蠻患秋七月宣州軍亂逐觀察使鄭薰先是湖南江西軍皆亂逐觀察使湖南都將石載順等逐觀察使韓琮江西都將毛鶴等逐觀察使鄭憲及是宣州復亂都將康全飬作亂右補闕張潛上疏言諸鎮致亂之故畧曰蕃府代移之際皆奏倉庫羡餘以為課績朝庭因而甄奬夫蕃府財賦所出有常茍非賦斂過差及停廢將士減削衣糧則羡餘何從而致比來南方諸鎭數有不寜皆此故也一朝有變所蓄之財悉遭摽掠又發兵致討費用百倍然則朝廷竟有何利乞自今藩府長吏不増賦歛不减糧賜獨節遊宴省浮賢能致羨餘者然後賞之上嘉納之已而崔鉉以淮南節度兼宣歙觀察使討亂軍平之山南東道節度使徐啇遣兵討平湖南韋宙為江西觀察使以山南兵討平江西徐啇字義聲有功五世孫河南北淮南大水徐泗水深五丈流没數萬家冬十月以于延陵為建州唐置今福建建寜府是刺史延陵入辭上曰建州去京師㡬何對曰八千里上曰卿到彼為政善惡朕皆知之勿謂其遠此階前則萬里也卿知之乎延陵到官竟以不職貶令狐綯擬李遠杭州刺史上曰吾聞遠詩云長日惟消一局棋安能理人綯曰詩人寄此為高興耳未必實然上曰且令徃試觀之上詔刺史毋得外徙必令至京師靣察其能否然後除之令狐綯嘗徙其故人為鄰州刺史便道之官上見其謝表以問綯對曰以其道近省送迎耳上曰朕以刺史多非其人為百姓害故欲一一訪問知其優劣以行黜陟而詔命既行直廢格不用宰相可謂有權時方寒綯汗透重裘上臨朝接對羣臣如賔客雖左右近習未嘗見其有惰容每宰相奏事旁無一人立者威嚴不可仰視奏事畢忽怡然曰可以閒語矣因問閭閻細事或談宫中遊宴無所不至一刻許復整容曰卿輩善為之朕常恐卿軰負朕後日不復得再相見乃起入宫令狐綯謂人曰吾十年秉政最承㤙遇每延英奏事未嘗不汗沾衣也李逺字求古蜀人十二月以蔣伸字大直乂之子同平章事伸從容言于上曰近日官頗易得人思徼倖上驚曰如此則亂矣對曰亂則未亂但徼倖者多亂亦非難上稱歎再三伸起上三留之曰異日不復得獨對卿矣次對官獨對宰相則同入對伸不諭尋拜相己卯十三年夏四月以廣德公主適校書郎于琮初上欲以于琮尚永福公主既而中寢宰相請其故上曰朕近與此女子食對朕輙折七筯情性如是豈可為士大夫妻乃更命琮尚廣德公主二公主皆帝女武寧軍亂詔以田牟為節度使武寧軍節度使康季榮不恤士卒士卒譟而逐之士以田牟嘗鎭徐州有能名復以為帥一方遂安秋八月帝崩鄆王漼即位是為懿宗初上長子鄆王温無寵愛第三子䕫王滋欲以為嗣為其非次故乆不建東宫上餌李元伯等藥疽發于背宰相不得見上密以䕫王屬樞密使王歸長等三人使立之獨左軍中尉王宗實素不同心三人相與謀出宗實為淮南監軍宗實已授敕將出左軍副使丌元實謂曰聖人不豫踰月今日除改未可辦也中尉何不一見聖人而出乎宗實悟復入至寢殿上已崩東首環泣矣宗實叱歸長等責以矯詔皆捧足乞命乃迎鄆王立為太子權勾當軍國政事更名漼取歸長等殺之太子即位尊皇太后為太皇太后冬十一月蕭鄴罷十二月以杜審權字殷衡元穎弟子同平章事令狐綯罷以白敏中同平章事綯執政歳乆忌勝己者中外側目其子滈頗招權受賄宣宗崩言事者競攻其短至是罷復以敏中為相南詔僭號宼陷播州初韋臯開清溪道以通羣蠻使入貢又選羣蠻子弟聚之成都教以書數以覊縻之既而軍府厭于廪給又蠻使入貢利于賜與所從傔人浸多杜悰奏減其數南詔豊祐怒入貢不時頗擾邉境祐死子酋龍立朝廷以名近元宗諱遂不行册禮酋龍乃自稱皇帝改國號大禮遣兵陷播州懿宗皇帝庚辰咸通元年春正月浙東賊裘甫孫愐曰裘本仇氏因避仇改作裘作亂初裘甫攻陷象山唐縣今屬浙江寕波府官軍屢敗觀察使鄭祇德遣兵討之大敗甫遂陷剡縣漢縣今改曰崍今屬紹興府開府庫募壯士衆至數千人時二浙乆安人不習戰甲兵朽鈍見卒不滿三百祇德更募新卒遣以擊賊又大敗于是諸盗雲集衆至三萬小帥有謀畧者推劉暀乎曠反勇力推劉慶劉從簡甫自稱天下都知兵馬使改元曰羅平鑄邱曰天平聲震中原葬貞陵在西安府涇陽縣西北司馬氏光曰宣宗性明察沈㫁用法無私從諌如流重惜官賞恭謹節儉忠愛民物故大中之政訖于唐亡人思詠之謂之小太宗賀善贊曰宣宗勵精求治樂聞正言用人惟已徃徃有可述者然嫡母以曖昧而不令終國本以貪吝而不早建議者每深病之三月以王式為浙東觀察使發諸道兵討裘甫破之鄭祇徳累表告急朝廷議選將代之夏侯孜曰浙東山海幽阻可以計取難以力攻西班中唐制凡朝㑹文官班于東武官班于西無可語者王式雖儒者子前在安南有功可任也乃以為浙東觀察使召入問以方畧對曰但得兵賊必可破有宦者侍側曰發兵所費甚大式曰兵多賊速破其費省矣若兵少不能勝延引歳月賊勢益張江淮不通則上至九廟下及十軍羽林龍武神武神威神䇿各分左右為北門十軍皆無以供給其費豈可勝計哉上顧宦官曰當與之兵乃發諸道兵授之式至西陵注見前甫遣使請降式曰是必欲窺吾所為且欲使吾驕怠耳乃謂其使曰甫靣縳以來當免而死式入越州送鄭祇德樂飲而歸始修軍令式令諸縣開倉廪以賑貧乏或曰軍食方急不可散也式曰非汝所知或請為烽燧以詗賊式笑而不應選懦卒使乘健馬少給之兵以為候騎衆怪之不敢問于是閲諸營見卒及土團子弟得四千人使導諸軍分路討賊令之曰母爭險易毋焚廬舍毋殺平民以増首級脇從者募降之得賊金帛官無所問自是諸軍與賊十九戰賊連敗先是式除書下裘甫聞之不樂劉暀曰宜急引兵取越州慿城郭據府庫遣兵過大江掠揚州逺修石頭城而堅守之宣歙江西必有響應者遣劉從簡以萬人循海而南襲取福建如此國家貢賦之地盡入于我矣有進士王輅在賊中説甫曰劉副使謀乃孫權所為未易成也不如擁衆聚險陸耕海溴急則逃入海島此萬全策也甫猶豫不决及是戰敗暀曰曩從吾謀寧有此困耶收輅等進士數人悉斬之時輅等皆衣緑暀曰亂我謀者即此青蟲也式謂諸將曰賊窘且饑必逃入海命羅鋭軍海口以拒之賊皆棄船走山谷已復入剡式曰賊來就擒耳命趣諸軍圍之賊守城甚堅三日凢八十三戰賊請降式曰賊欲少休耳益謹備之賊杲復出又三戰官軍斷其後遂擒之式斬暀等械甫送京師斬之諸將還越式大置酒諸將請曰公之始至軍食方急而遽散之何也式曰此易知耳賊聚榖以誘饑人我給之食則彼不為盗矣且諸縣若無守兵賊至則倉榖適足資之耳不置烽燧何也式曰烽燧所以趣救兵也今兵盡行無以繼之徒驚士民使自潰亂耳使懦卒為候騎而少給兵何也式曰彼勇卒操利兵遇敵且不量力而鬬鬬死則賊至不知矣皆拜曰非所及也先是上每以盗賊為憂夏候孜曰玉式才有餘不日告㨗矣與式書曰公專以執裘甫為事軍須謂行軍所須細大此期悉力謂常盡力應戰故式所奏無不從由是能成其功已而孜罷相以畢諴同平章事夏五月禁州縣税外科率左拾遺薛調言兵興以來賦歛無度所在羣盗半是逃户固須翦滅亦可閔傷望敕州縣税外無得科率從之冬十月追復李德裕官爵贈左僕射右拾遺劉鄴字漢藩句容人上言李德裕父子為相有聲迹功效竄逐以來血屬將盡生涯已空宜賜哀憫贈以一官從之鄴父三復以文章受知于德裕歴官臺省故鄴言之十二月南蠻引南詔攻陷交趾考咸通初南詔再陷交趾一在是年一在四年綱目于是年不載今依通鑑補輯先是安南都護李鄠殺蠻酋杜守澄已而鄠越境收取播州大中十三年䧟南詔非安南廵屬也杜氏宗黨遂誘羣盗導引南詔乗虛攻交趾䧟之鄠奔武州唐書地理志邕管所領有武州後廢省明年鄠收集土兵擊羣蠻復取安南朝廷責鄠失守坐貶以王寛為經畧使是秋蠻復攻陷邕州初廣桂容三道共發兵三千人戍邕三年一代經畧使段文楚詣以三道衣糧自募土軍朝廷許之所募纔得五百人文楚入為金吾將軍李蒙代為經畧使利其闕額衣糧以自入悉罷遣三道戍卒止以所募兵戍守左右江比舊什減七八故蠻人乘虛入冦遂䧟邕州邕州注見前左右江南寧江上源之左右江也按明史地理志南寧府鬰江在城西南有左右二小江來自交趾界流合馬其合處曰合江鎮考左右江之名始于唐時盖指南寧江上流之二江而言今則以南寕之大江為左江柳州之黔江為右江叚文楚秀實孫辛巳二年春正月白敏中罷以杜琮同平章事一日兩樞密使詣中書宣徽使楊公慶繼至獨揖琮出斜封文書以授琮發之乃宣宗大漸時宦官請鄆王監國奏也曰當時宰相無名者當以反法處之悰曰此非臣下所宜窺復封以授公慶曰主上欲罪宰相當于廷英靣示聖㫖明行誅譴公慶去悰謂兩樞密曰内外之臣事猶一體今主上新踐阼未熟萬機當以仁愛為先豈得遽贊成殺宰相事若習以性成則中尉樞密豈得不自憂乎既而事寢是時上大夫深疾宦官事有小相涉則衆共棄之建州進士京嘗預宣武軍宴識監軍之靣既而及第遇之于塗馬上相揖因之謗議諠然遂沈廢終身其不相悦如此秋九月以孟穆為南詔弔祭使杜悰上言南詔彊盛西州兵食單寡未可輕與之絶且應遣使弔祭諭以親王名犯廟諱故未行册命待其更名謝恩然後遣使庻全大體上從之㑹南詔宼嶲州遂不行壬午三年春正月羣臣上尊號二月南詔復宼交趾以蔡襲為經畧使發兵禦之南詔復寇交趾經畧使王寛累表告急朝廷以襲代之仍發許滑徐汴荆襄潭鄂等道兵合三萬人以授襲兵勢既盛蠻遂引去夏四月置戒壇度僧尼上奉佛太過怠于政事于禁中設講席自唱經手録梵夾又數幸諸寺施與無度吏部侍郎蕭倣上疏言之畧曰元祖之道儉為先素王之風仁義為首垂範百代必不可加佛之為道殊異于此非帝王所宜慕也願陛下時開延英接對曰輔力求人瘼䖍奉宗祧罷去講筵躬勤政事上不能從五月分嶺南東西二道以韋宙蔡京為節度使左庻子蔡京性貪虐多詐時相以為有吏才奏遣制置嶺南事嶺南舊分五管廣桂邕容安南皆𨽻嶺南蔡京奏請分為兩道以廣州為東道邕州為西道使韋宙及京分領之蔡襲將諸道軍在安南蔡京忌之恐其立功奏稱南蠻逺遁邉徼無虞請罷戍兵從之襲屢奏羣蠻伺隙不可無備乞留兵五千不聼襲作十必死狀申中書時相信蔡京之言終不之省京為政苛慘設炮烙之刑闔境怨之為軍士所逐貶崖州司户不肯之官賜死秋七月徐州軍亂逐節度使温璋造之子詔以王式代之初王智興既得徐州募勇悍之士三千人以自衛􅃅銀刀雕旗門槍挾馬等七軍常令露刅坐兩廡夾幕之下其後節度使多儒臣其兵浸驕小不如意一夫大呼其衆和之節度使即自後門逃去田牟至與之雜坐飲酒犒賜日以萬計猶時喧嘩邀求不已牟卒璋代之驕兵素聞璋性嚴憚之璋開懷慰撫而驕兵終猜忌竟聚譟而逐之時忠武義成兩軍從王式討裘甫者猶在浙東詔式帥以赴徐州驕兵益懼式至視事三日饗兩鎭將士遣還既而擐甲執兵命圍驕兵盡殺之數千人皆死敕改武寜為徐州團練使𨽻兗海以濠州歸淮南更置宿泗觀察使留二千人守徐州餘皆分𨽻兖宿委式分配將士赴諸道訖然後將兩道兵至汴滑遣歸本道身詣京師癸未四年春正月南詔陷交趾經畧使蔡襲死之先是南詔率羣蠻宼交趾蔡襲告急敕發荆湖桂管兵赴之未至南詔已圍交趾襲嬰城固守至是城陷襲左右皆盡徒歩力戰身集十矢欲趣監軍船船已離岸遂溺海死荆南將士四百餘人走至城東水際虞候元惟徳等謂衆曰吾輩無船入水者死不若還與蠻鬪人以一身易二蠻亦為有利遂還向城縱兵殺蠻二千餘人而死南詔兩陷交趾所殺虜且十五萬人留兵二萬使其將楊思縉據交趾城谿洞夷獠皆降之詔諸道兵悉召還保嶺南上遊晏無節左拾遺劉蜕上疏曰今西涼築城南蠻侵軼陛下不形憂閔何以責其死力弗聼夏四月畢諴罷為兵部尚書諴以同列多徇私不法稱疾辭位以康承訓字敬辭日知孫為嶺南西道節度使先是蔡京既誅以鄭愚節度嶺南西道既而蠻寇左右江侵逼邕州愚懼自言儒臣無將畧請任武臣詔以承訓代之五月以楊收字藏之發之弟同平章事收與中尉楊元价叙宗相結故得為相閠六月以曹確字剛中河南人同平章事杜審權杜悰相繼罷審權為鎮海節度使悰為鳳翔節度使確以兵部侍郎同平章事秋七月辛邜朔日食八月以閤門使内官掌朝會賛引呉德應為館使臺諫上言故事御史廵驛不應忽以内臣代之上諭以敕命已行不可復改左拾遺劉蜕上言自古明君所尚者從諫如流豈有已行而不改且敕自陛下出之自陛下改之何為不可弗聼甲申五年春正月貶起居注張雲為興元少尹拾遺劉蜕為華隂令初詔以令狐滈為左拾遺蜕上言滈專家無子弟之法布衣行公相之權雲復言滈父綯用李涿為安南致南蠻至今為梗由滈納賄陷父于惡綯執政時人號滈白衣宰相滈亦引避乃改詹事府司直東宫官秩正七品至是綯為其子訟寃于是雲蜕皆坐貶三月彗星出彗出于婁婁三星魯分野長三尺司天監掌天文秩三品奏按星經是名含譽瑞星也晉書天文志瑞星三日含譽光曜如彗喜則含譽射上因大喜于是羣臣請宣示中外編諸史策從之夏四月南詔㓂邕州官軍敗没加康承訓檢校右僕射承訓至邕州不設斥候南詔帥六萬人將入境承訓遣六道兵凡萬人拒之敵至不設備五道八千人皆没惟天平軍後至得免承訓不知所為副使李行素帥衆治濠栅甫畢蠻軍已合圍諸將請夜分道斫蠻營承訓不許有天平小校再三力争乃許之將勇士三百夜縋而出散燒蠻營斬五百餘級蠻大驚解圍去承訓騰奏告㨗中外皆賀加承訓檢校右僕射子弟親昵皆奏功受賞燒營小校不遷一級由是軍中怨怒聲流道路秋七月以康承訓為將軍分司高駢字千里崇文孫為嶺南西道節度使韋宙具知承訓所為以書白宰相乃罷承訓而以張茵代之茵不敢進夏侯孜薦驍衛將軍高駢代之駢頗讀書好談今古兩軍宦官多譽之冬十一月夏侯孜罷以路巖字魯瞻魏州寇氏人同平章事孜復出為河東節度使巖以兵部侍郎同平章事時年三十六乙酉六年春三月以杜宣猷為宣歙觀察使宦官多閩人宣猷先為福建觀察使毎寒食遣吏分祭其先壟宦官德之故有是命時人謂之敇使墓户冬十二月太皇太后鄭氏崩諡孝明葬景陵之側祔于别廟丙戌七年春正月成德節度使王紹懿卒紹懿在鎮十年為政寛簡軍民便之疾病召兄子景崇告之曰吾兄以汝之㓜以軍政授我今汝長矣我復以歸汝努力為之上忠朝廷下和隣藩勿墜吾兄之業言竟而卒既而朝廷以景崇為留後夏六月魏博節度使何𢎞敬卒高駢大破南詔蠻復取交趾先是高駢治兵于海門未進監軍李維周惡駢欲去之屢趣駢進軍駢以五千人先濟約維周發兵進援駢既行維周擁餘衆不發駢至南定漢日南郡峯州唐置漢麊泠縣地蠻衆近五萬方穫田駢掩擊大破之取其所穫以食軍進撃南詔屢破之㨗奏至海門維周皆匿之奏駢統軍不進上怒召駢詣闕以王晏權智興子代之是月駢復大破南詔殺獲甚衆遂圍交趾城十餘日蠻困蹙甚城且下㑹得王宴權牒即以軍事授監軍韋仲宰與麾下百餘人北歸先是駢遣小校曽衮入告交趾之㨗至海中望見旌旗東來云新經畧使與監軍也衮意維周必奪其表乃匿于島間維周過即馳詣京師上得奏大喜加駢檢校工部尚書復鎮安南駢至海門而還晏權闇懦維周􅇯貪諸將不為之用遂解重圍蠻遁去者大半駢至復督勵將士攻城克之斬首三萬餘級南蠻率衆歸附者萬七千人冬十月楊收罷楊元价兄弟受方鎭之賂屢有請託收不能盡從元价怒出之後收以受賂事發長流驩州賜死吐蕃拓䟦懐光斬輪恐熱傳首京師吐蕃自是衰絶乞離胡即吐蕃佞相所立贊普事見前君臣不知所十一月以高駢為静海軍節度使自李􅃰侵擾群盗為安南患殆將十年至是始平乃置静海軍于安南以駢為節度使丁亥八年春二月歸義節度使張義潮入朝先是義潮克復凉州至是入朝命其族子惟深守歸義三月以李可及為左威衛將軍上好音樂宴遊供奉樂工常近五百人每月宴設不減十餘水陸皆備每行幸内外諸司扈從十餘萬人所費不可勝紀可及善為新聲上以為將軍曹確諫曰太宗定文武官六百餘員謂房元齡曰朕以待天下賢士工啇雜流不可處也太和中文宗欲以樂工為王府率拾遺竇洵直諫即改光州長史乞别除可及官不從戊子九年秋七月桂州戍卒作亂判官龎勛將之北還冬十月䧟宿徐州囚觀察使崔彦曽慎由從父弟十一月詔遣康承訓發諸道兵討之初南詔陷交趾敇徐泗募兵二千赴援分八百人别戍桂州約三年而代至是戍桂者已六年屢求代還徐泗觀察使咸通五年復置崔彥曽性嚴刻押衙尹戡等用事以軍帑空虛不能發兵請令更留戍一年戍卒聞之怒都虞候許佶等作亂殺都將王仲甫推糧料判官龎勛為主刼庫兵北還所過剽掠州鎭莫能禦至湖南監軍誘輸其兵甲勛等更出私財造之以山南東道節度使崔鉉嚴兵守要害不敢入其境乃泛舟沿江而東下自浙西入淮南節度使令狐綯遣使慰勞都押衙李湘曰徐卒擅歸勢必作亂雖無敕令誅討藩鎮大臣當臨事制宜高郵岸峻而水深狹請將竒兵㐲于其側焚荻舟以塞其前以勁兵促其後可盡擒也縱之度淮為患必大綯素懦怯彼在淮南不為暴聼其自過餘非吾事也浙西唐浙西節度治潤州賊沿江而下由潤州而上廣陵故云廣陵淮南節度治高郵漢縣明為州今州屬揚州府先是朝廷聞亂遣中使赦其罪部送歸徐復敕崔彥曽慰撫彥曽遣使喻以敕意道路相望勛等行及徐城縣名注見前乃言于衆曰吾輩擅歸思見妻子耳今聞已有密敕下本軍至則滅族與其自投羅網曷若相與戮力同心赴湯蹈火豈徒脱禍富貴可圖也衆皆呼躍稱善遂于遞中申狀乞停尹戡等職任仍請戍還將士别置營將彥曽乃數勛罪命都虞候元密將三千人討之仍令宿泗州出兵邀擊密至任山在徐州府銅山縣西南頓兵不進欲俟賊至撃之賊詷知乃詭道趣符離漢縣故城在今宿州宿州兵出戰望風奔潰賊遂攻城陷之勛自稱兵馬留後夜掠船順流而下沿汴入淮欲入江湖為盗比明官軍始覺狼狽追之大敗密及士卒死者殆千人餘皆降于賊賊遂還趣彭城時城中無備或歡彥曽奔兖州彥曽怒曰吾為元帥城陷而死職也立斬言者俄而賊至城陷囚彥曽殺尹戡等分遣其黨屯據要害縣鎭遠近羣盗皆倍道歸之由是賊衆益熾詔以康承訓為行營都招討使王晏權戴可師為南北靣招討使大發諸道兵以𨽻之承訓奏乞沙陀三部落沙陀薩葛安慶三部使朱邪赤心執宜之子帥以自隨詔許之既而承訓至新興諸道兵集者纔萬人以衆寡不敵退屯宋州可師將兵渡淮轉戰而前恃勝不為設備賊衆數萬奄至縱擊官軍大敗可師及監軍皆死晏權兵數退衂朝廷以曹翔代之新興鎮名在歸德府永城北十二月龎勛遣其黨陷滁和州攻泗州不克滁州隋置今𨽻安徽和州泗州注俱見前初辛雲京之孫讜寓居廣陵喜任俠年五十不仕與泗州刺史杜慆悰之弟有舊及龎勛亂讜詣慆勸避之慆曰安平享其禄位危難棄其城池吾不為也誓與將士共死此城讜曰公能如是僕當與公同死乃還廣陵與其家訣復入泗州先是龎勛以泗州當江淮之衝遣其將李圓攻之慆預完守備賊不能克及是勛益發兵使呉逈代圓進攻晝夜不息時敇使郭厚本將淮南兵救泗州至洪澤湖名在淮安府山陽縣西南與泗州盱眙接界湖東舊有鎭為南北要衝後因全淮滙注乆已湮廢畏賊彊不敢進讜夜乘小舟潛度説厚本往還者再厚本將許之都將袁公弁唐書作异曰賊勢如此何暇救人讜㧞劍瞋目謂公弁曰泗州䧟在旦夕君受詔救援乃逗留不進上辜國恩雖生可羞且泗不守則淮南為冦塲君尚能獨存耶吾今當殺君而去直前撃之厚本急抱止之公弁僅免讜乃回望泗州慟哭終日士卒皆為之流涕厚本乃分五百人與之讜帥以濟慆亦出兵表裏撃賊賊遂敗走已而賊陷都梁城執部厚本南都梁城在今盱眙縣東都梁山丄據淮口分兵南寇舒廬北侵沂海攻陷滁州殺刺史高錫望又掠和州刺史崔雍引賊入城賊遂大掠泗州援絶糧盡讜夜帥敢死士十人執長柯斧乘小舟破賊水寨而出明旦賊以衆追之讜力鬪三十餘里乃得免至揚州淮南節度治見令狐綯至潤州浙西節度治見杜審權時皆傳泗州已陷及讜至審權乃遣兵二千人與淮南共輸鹽米以救之明年正月讜以浙西軍至楚州賊水陸布兵鏁㫁淮流讜募敢死士先以四舟乘風直進死戰斧㫁其鏁乃至州後軍為賊所阻讜轉迎之揚旗鼔譟而前賊見其勢猛避之軍乃入已而讜復帥驍勇四百迎糧于揚潤賊夾岸攻之讜轉戰百餘里乃得至廣陵止于公館不敢入家舟載鹽米二萬石錢萬三千緡還至斗山賊將帥衆萬餘密布戰艦以拒之自卯戰至未官軍不利讜令勇士乘小舟入賊艦旁戰棚之下以槍火牛焚之賊皆潰走官軍所載乃淂入城曰楚州注見前斗山在盱眙縣東北改臨淮水故亦山戰棚縳木于艦旁出四五尺謂之戰棚火牛團草以爇其形若牛故名是嵗江淮旱蝗己丑十年春正月同昌公主適右拾遺韋保衡字蘊用京兆人公主郭淑妃之女上特愛之傾宫中珍玩以為資送賜第牕户皆餙以雜寳井欄藥臼亦以金銀為之賜錢五百萬緡他物稱是二月康承訓敗賊于鹿塘寨名在歸徳府永城縣東南承訓將諸道兵七萬餘人屯柳子此鳳陽之柳子鎮也在今宿州西之西自新興至鹿塘三十里壁壘相屬使朱邪赤心將沙陀三千騎為前鋒䧟陳却敵十陣之兵服其驍勇承訓數與賊戰敗之賊將自矜淮口之㨗謂破可師令三萬人夜襲鹿塘寨黎明圍之自謂功在漏刻沙陀左右突圍出入如飛賊紛擾移避沙陀縱騎蹂之賊遂大敗官軍蹙之于濉水注見前溺死者不可勝計自鹿塘至襄城襄當作相今宿州北有相城古相縣也去永城縣鹿塘塞數十里而近伏屍五十里斬首二萬餘級初龎勛募人為兵人利其剽掠皆㫁鋤首而鋭之執以應募已而官軍大集宋州應募者少勛乃驅人為兵斂富室及商旅財十取八九民不聊生始厭苦之會有敕諸軍破賊得農民皆釋之由是賊毎與官軍遇其驅掠之民先自潰夏四月龎勛殺崔彥曽自稱天册將軍與官軍戰大敗康承訓進與賊將姚周戰一日數十合沙陀以精騎邀之屠殺殆盡周奔宿州勛守將梁丕斬之勛聞之大懼議自將出戰周重素以才畧自負勛迎為上客曰不若遂建大號悉兵四出決死力戰殺崔彦曽以絶人望勛以為然殺崔彦曽及募僚温庭皓博裔孫筠弟監軍郭厚本等初勛陷彭城召庭皓草表求節鉞庭皓請還家草之明日庭皓見勛曰昨所以不即拒者歸與妻子訣耳今僅來就死勛笑曰書生敢爾不畏死耶龎勛能取徐州何患無人草表乃使周重為之及是庭皓逆遇害選丁壯得三萬人給以精兵許佶等推勛為天册將軍勛以父舉直為大司馬留守徐州或曰將軍方耀兵威不可以父子之親失上下之節乃令舉直趨拜于庭勛據案而受之先是魏博何全皥遣兵助官軍討賊屯于豊及是勛撃敗之約諸寨兵合五六萬人乘勝攻柳子本賊所屯賊敗官軍守之康承訓設伏以待之賊兵先至者遇伏敗走勛所將皆不戰而潰承訓命諸將急追之賊狼狽自相蹈藉死者數萬人勛走歸彭城馬舉將兵救泗州賊衆大敗泗州圍解先是戴可師戰死詔以前天雄將本魏博軍號自田悦拒命遂削罷之咸通四年復置天雄軍于秦州節度使馬舉代為南靣招討使通鑑不載馬舉官爵今依唐書帝紀補輯再考康承訓傳舉作士舉又令狐綯傳舉以右衛大將軍代綯鎭淮南呉縝糾繆以名與官號紀傳不同莫知孰是今接紀傳原文盖舉以節度使罷為將軍後出為招討使故紀稱前也至于舉作士舉乃傳錄之説耳至是舉將精兵三萬救泗州分軍三道渡淮至中流大譟聲聞數里賊大驚歛兵屯城西寨舉就圍之縱火燒柵賊衆大敗呉迥退保徐城泗州之圍始解泗州被圍凡七月守城者不得寐面目皆生瘡已而呉迥竄據濠州馬舉攻破之迥走死六月陜民作亂逐觀察使崔蕘蕘以器韻自矜不親政事民訴旱荒蕘指庭前樹曰樹尚有葉何旱之有杖之民怒逐之蕘走渴求飲民以溺飲之先是懐州刺史劉仁規亦以民訴旱揭榜禁之民遂作亂逐仁規後光州民復逐其刺史李弱翁右補闕楊等上言刺史不道百姓負􅁈黨新于朝廷寘諸典刑豈得羣聚擅自斥逐此風不可長宜加嚴誅以懲來者以劉瞻字㡬之桂陽人同平章事先是蕭寘復之孫五年四月相高璩字瑩之少逸兄元裕子六年四月相徐啇六年六月相于琮八年七月相相繼同平章事寘璩在位皆不乆卒啇至是出為荆南節度使瞻素有清節劉瑑作相以宗人遇之薦為翰林學士啇既罷瞻遂相秋八月賊將張元稔以宿州降引兵進平徐州初龎勛怒梁丕殺姚周使張元稔代之以其黨張儒張實等將城中兵數萬拒官軍至是康承訓乘勝進抵宿州攻之不能克遣辯士招諭之元稔嘗戍邉有功雖脇從于賊心常憂憤召所親數十人謀歸國衆多從之乃勒兵斬儒等開門出降承訓即宣敇拜御史中丞賜遺甚厚元稔復言今舉城歸國四遠未知請詐為城陷引衆趣符離及徐州賊黨不疑可盡擒也承訓許之元稔復入城暮發平安火明日積薪數千束縱火焚之如城陷軍潰之狀直趣符離符離納之斬其守將收其兵北趨徐州圍之喻城上人曰朝廷唯誅逆黨不傷良人汝曹奈何為賊城守于是守城者稍稍棄甲投兵而下崔彦曽故吏路審中開門納官軍龎舉直許佶自北門出元稔遣兵追斬之悉誅戍桂州者親屬皆死徐州遂平勛將兵二萬自石山即石佛山在徐州府銅山縣南出承訓引歩騎八萬西撃之使朱邪赤心將數十騎為前鋒勛襲宋州陷其南城南掠亳州沙陀追之時官軍亦大集縱撃殺賊近萬人餘皆溺死勛亦死數日乃獲其屍賊諸寨皆殺其守將而降賊既平張元稔入為右驍衛大將軍康承訓為河東節度使加同平章事杜惂為義成節度使冬十月以朱邪赤心為大同軍節度使賜姓李名國昌辛讜為亳州刺史上加赤心之功置大同軍于雲州注見前以赤心為節度使召見賜姓名賞賚甚厚讜先在泗州犯圍出迎兵糧往返凢十二及除亳州上表言臣之功非杜惂不能成也國昌尋徙鎭振武流陳蟠叟于愛州注見前上荒宴不親庻政委任路巖巖奢靡頗通賂遺至德唐縣五代呉改建德今屬池州府令陳蟠叟上書言事召對請破邉咸一家可贍軍二年上問咸為誰對曰路巖親吏上怒流之自是無敢言者庚寅十一年春正月羣臣上尊號貶康承訓為恩州唐置令肇慶府恩平縣是司馬路巖韋保衡上言承訓討龎勛時逗撓不進又貪虜獲不時上功貶之二月南詔攻成都初鳳翔少尹李師望請置定邉軍師望言嶲州當南詔要衝成都道遠難以節制請建定邉軍屯重兵于嶲州以卭州為理所詔從之即以師望為節度使師望建議徙利專制方靣其實卭距成都百六十里嶲距卭尚千里其欺罔如此已而南詔驃信蠻語君也酋龍傾國入宼䧟嘉今四川嘉定府是黎雅注俱見前州李福之鎮西川也南詔遣清平官董成等詣成都故事南詔使見節度使拜伏于庭成等以南詔已僣號欲抗禮福怒囚之已劉潼代福奏遣還國于是南詔遣使來謝李師望欲激怒南詔以求功遂殺之定邉將士怒師望貪殘欲生食之隂遣人致意南詔敦使入寇師望以計免詔以竇滂代之滂貪殘更甚于師望定邉大會蠻寇至陷嘉州滂禦之大渡河諸將結陳將戰滂單騎宵遁蠻遂䧟黎雅至是西川民聞蠻宼將至爭走入成都市里皆滿人所占地不過一席許雨則戴箕自庇城中井為之竭取摩訶池泥汁澄而飲之摩訶池舊在成都府城内今堙節度使盧耽與前瀘州唐置今𨽻四川刺史楊慶復共修守具選將校募驍勇之士厚給糧賜得三千人號曰突將蠻進軍定邉北境耽遣使致書其用事之臣杜元忠問所以來之意蠻以耽待之恭為之盤桓由是成都守備粗完蠻進陷雙流隋縣今屬成都府扺成都時興元鳳翔援軍已至漢州會竇滂奔漢州自以失地欲西州相繼陷没以分其責毎遇援軍輙説以蠻衆多于官軍數十倍諸將皆不敢進都漢州唐置今屬成府越數日蠻合梯衝四靣攻城楊慶復等悉力拒守帥突將出戰俘斬二千餘人焚其攻具蠻稍郤蜀人素怯突將利于厚黨勇氣自倍其不得出者皆憤鬰求奮朝廷以顔慶復為東川節度使援蜀諸軍皆受節制貶竇滂亷州司户顔慶復至新慶都漢縣今屬成都府蠻分兵來拒復撃破之將軍宋威繼至㑹戰蠻軍又大敗威遂進軍距成二十里方成都圍急盧耽請遣使與蠻和詔以大僕卿支詳為宣諭通和使詳至蠻遣使答之詳謂曰受詔約和冀不犯成都也今矢石晝夜相交何謂和乎既而蠻屢敗數遣使請和城中依違答之蠻益急攻城會官軍已至城下蠻夜燒攻具遁去比旦官軍乃覺威飯士欲追之顔慶復忌其功朝廷使顔慶復救成都命威為後繼威乘勝先至城下故慶復疾之牒威還漢州蠻至雙流阻水狼狽造橋三日乃得過蜀人甚恨之然自是成都有備成都舊無壕塹顔慶復始教築壅門城穿塹引水滿之又植鹿角分營舖壅門城門之外别築墻以遮城門謂之壅門鹿角斬木為之環列于城外以限衝突營士卒所居舖候望所守蠻亦不復來犯矣西川牙將以功補官者堂帖人輸常例錢三百緡貧者苦之堂帖沈括曰唐中書指揮事謂之堂帖夏四月以韋保衡同平章事曹確罷保衡代保衡以左拾遺尚主尋遷翰林學士至是纔歳餘遂相秋八月魏博殺其節度使何全皥全皥年少驕暴好殺軍中作亂全皥單騎走追殺之自何進滔得魏博至全皥傳三世四十二年而滅推大將韓君雄魏州人為留後成德節度使王景崇為請旌節詔許之君雄後賜名允中乾符初卒子簡為留後同昌公主卒貶劉瞻為驩州司户温璋為振州唐置治寧遠故城在今崖州司馬同昌公主卒諡文懿上痛悼不已殺醫官二十餘人收其親族三百餘人繋獄宰相劉瞻召諫官言之莫敢進乃自奏之畧曰修短之期人之定分昨公主有疾醫官非不盡心而禍福難移竟成蹉跌械繫老㓜物議沸驕奈何以逹理知命之君涉肆暴不明之謗上覽奏不悦瞻又與京兆尹温璋等力諌上大怒叱出之瞻尋罷為荆南節度使璋貶振州司馬璋歎曰生不逢時死何足惜仰藥卒韋保衡又與路巖共譖瞻云與醫官通謀投毒藥貶康州刺史翰林學士承㫖鄭畋草制曰安數畝之居仍非已有卻四方之賂惟畏人知巖謂畋曰侍郎乃表薦劉相也坐貶梧州刺史鄭畋字台文滎陽人巖素與瞻議論不恊既貶猶不快意閲十道圖以驩州去長安萬里再貶之明年正月葬同昌公主服玩每物皆百二十輿錦珠玉煇煌三十餘里樂工李可及作歎百年曲舞者數百人以雜寳為首飾絁八百匹為地衣舞罷珠璣覆地冬十一月以王鐸字昭範播從子同平章事鐸韋保衡及第時主文也唐禮部校文主司謂之主文保衡縁恩倖輔政以由鐸得進士事之甚謹然鐸素薄保衡保衡亦病鐸在政府持其事不得肆遂譖之鐸後出為宣武節度使鐸罷相在十四年六月復以徐州為感化軍先是徐州賊平置徐泗都團練防禦使既而餘賊相聚閭里為羣盗上用廷臣議太子少保李膠等言使名雖降兵額尚存以為支郡則糧餉不給分𨽻别藩則人心未服宜有更張庻為兩便從之徐州仍為觀察使統徐濠宿三州泗州别為團練使割𨽻淮南至是復以徐州為節度使名感化軍辛卯十二年夏四月路巖罷巖與韋保衡素相表裏勢傾天下時目其黨為牛頭阿旁言如鬼隂惡可畏也既而爭權有隙保衡遂短巖于上出鎭西川巖出城路人以瓦礫擲之巖謂權京兆尹薛能曰臨行煩以瓦礫相餞能曰向來宰相出府司無例發人防衛巖甚慙汾薛能字大拙州人五月上幸安國寺賜寺僧沈檀講坐二各髙一丈設萬人齋冬十月以劉鄴同平章事鄴素附韋保衛路巖巖既罷鄴以禮部尚書相仍判度支壬辰十三年春正月幽州節度使張允伸卒允伸鎭幽州二十三年勤儉恭謹邉鄙無警上下安之得疾請委軍就醫許之以其子簡會為留後允伸病甚表納旌節而卒已而平州刺史張公素范陽人以兵來會喪公素素有威望為幽州人所服簡會懼奔京師詔以公素為留後尋授節度使二月于琮罷以趙隠字大徳京兆奉天人同平章事夏五月貶琮為韶州刺史琮為韋保衡所譖罷相再貶韶州琮妻廣德公主上之妹也與琮偕之韶行則肩輿門相對坐則執琮之帶琮由是得全時諸公主多驕縱惟廣德動遵法度事于氏宗親無不如意内外稱之秋七月以李璋為宣歙觀察使韋保衡欲以其黨裴條為郎官憚左丞李璋方嚴恐其不放上郎官除授非人丞得糾劾不令上官先遣人逹意璋曰朝廷遷除不應見問保衡怒出之八月歸義節度使張義潮卒以其長史曹義金代之是後中原多故朝命不及回鶻陷甘州餘州亦為羌胡所據癸巳十四年春正月遣使迎佛骨夏四月至京師上遣敇使詣法門寺迎佛骨羣臣諫者甚衆至有言憲宗迎佛骨尋宴駕者上曰朕生得見骨死亦無恨及至京師儀衛之盛過于郊祀上降數膜拜流涕霑臆迎入禁中宰相以下競施金帛因下德音降中外繫囚秋七月帝崩普王儼帝第五子即位是為僖宗上疾大漸中尉劉行深韓文約立上少子普王儼為皇太子權勾當軍國政事帝崩太子即位時年十二八年關東河南大水九月貶韋保衡為賀州刺史尋賜死冬十月以蕭倣同平章事倣前鎭義成治滑州河患民頼以安入為兵部尚書至是遂相僖宗皇帝甲午乾符元年春正月關東旱饑翰林學士盧攜字子升鄭州人上言曰國家之有百姓如草木之有根柢若秋冬培溉則春夏滋榮今關東旱災所至皆饑人無依投待盡溝壑其蠲免餘税實無可徴而州縣督趨甚急動加捶撻雖撤屋代木雇妻鬻子止可供所由謂督催之吏卒酒食之費未得至于府庫也朝廷儻不撫存百姓實無生計乞敇州縣一切停徴仍發義倉亟加賑給敇從其言而有司竟不能行賜路巖死巖先貶新州注見前刺史巖喜聲色逰晏在西川委政于親吏邉咸郭籌軍中不安坐貶在道削官長流儋州注亦見前尋賜死巖之為相也宻奏三品以上賜死皆令使者剔取結喉三寸以進騐其必死至是自罹其禍所死之處乃楊收賜死之榻也邉咸郭籌皆伏誅初巖自淮南崔鉉幕府入為御史不出長安十年至宰相其入翰林也鉉聞之曰路十已入翰林如何得老果如其言二月葬簡陵在西安府富春縣西北賀善贊曰懿宗即位十四年無一善可紀是以内盗迭興南詔再亂民逐其上而唐室大壤矣夏五月以劉瞻同平章事秋八月卒贍之貶也人無賢愚莫不痛惜及還長安兩市人率錢雇百戱迎之瞻聞之改期由他道而入初瞻南遷劉鄴短之于韋路至是鄴懼延瞻置酒瞻歸而卒人以為鄴鴆之也以崔彥昭字思文羣從子同平章事自楊收路巖韋保衡皆以朋比受賂得罪及是蕭倣秉政彦昭輔之頗革前弊彦昭察而不煩時論稱之冬十月劉鄴罷以鄭畋盧攜同平章事蕭倣崔彦昭素惡鄴故罷畋攜同時並相十一月羣臣上尊號濮州人王仙芝作亂自懿宗以來奢侈日甚用兵不息賦斂愈急闗東連年水旱州縣不以實聞百姓流殍無所控訴相聚為盗所在蜂起州縣兵少人不習戰毎與盗遇官軍多敗是歳王仙芝聚衆數千人起于長垣漢縣今屬丈名府乙未二年春正月以高駢為西川節度使先是南詔宼大渡河遂陷黎州入卭崍闗在雅州府榮經縣西寰宇記闗約山據險控扼蕃夷要害成都大震驃信遣節度使牛叢書云欲入見天子靣訢寃抑今假道貴府留止數日叢素懦怯欲許之楊慶復以為不可斬使者留二人遣還授以書詈辱之蠻兵乃退詔高駢詣西川制置蠻事尋以為節度使駢至劍州先遣使開成都門或諌曰蠻寇逼近萬一豨突奈何駢曰蠻聞我來逃竄不暇何敢輙犯成都今春氣向暖數十萬人藴積城中將成癘疫不可緩也使者至縱民出城各復常業民大悦蠻方攻雅州聞之遣使請和引去駢發兵追至大渡河殺獲甚衆擒其酋長數十人修復卭崍闗大渡河諸城栅各置兵數千戍之自是蠻不復入宼蠻之宼大渡河也防河兵馬使黄景復再戰再勝會蠻發國中兵繼至景復力戰無救軍遂潰至是高駢責景復失守斬之楊慶復所募突將以守成都功優給右職駢悉令納牒停其廩給突將皆憤怨駢好妖術每發兵焚紙畫人馬散小豆曰蜀人懦怯今遣元女助兵軍士耻之駢又停省吏官刑罰嚴酷由是突將因之作亂大譟入府駢走匿厠間監軍遣人招諭許復職名廩給乃肯還營駢牓謝突將而隂籍其名尋使人掩捕殺之老㓜無遺死數千人以田令孜蜀人本姓陳氏為中尉上之為普王也小馬坊使田令孜有寵及即位使知樞密遂擢為中尉上專事遊戱政事一委令孜呼為呵父令孜頗讀書多巧數納賄除官不復闗白毎見常自備果食與上對飲㗖上與内園小兒狎昵賞賜動以萬計府庫空竭令孜説上籍兩市啇貨悉輸内庫有陳訴者付京兆尹杖殺之宰相下鉗口不敢言浙西鎭遏使王郢作亂先是趙隠出鎭浙西在元年二月鎭遏使王郢等有戰功隠賞以職名而不給衣糧郢等遂刦庫兵作亂收衆萬人攻陷蘇常州泛江入海轉掠二浙南及福建大為人患後裴璩為浙西節度使密招郢黨降之散其徒六七千人郢収餘衆走明州鎮遏使劉巨容射殺之餘黨皆平州裴璩諝從曽孫劉臣容徐人夏五月同平章事蕭倣卒六月以李蔚字茂休隴西人同平章事時天下盗起宦官持兵柄倣以鯁直見忌及卒蔚代之王仙芝陷濮曹州寃句漢縣金廢故城在今曹州府荷澤縣人黄巢聚衆應之仙芝及其黨尚君長攻陷濮曹州天平節度使薛崇出兵撃之不利寃句人黄巢善騎射喜任俠麄渉書傳屢舉進士不第遂與仙芝共販私鹽至是聚衆應之攻剽州縣民之困于厚歛者爭歸之數月之間衆至數萬秋七月大蝗飛蝗蔽日所過赤地京兆尹楊知至汝士之子奏蝗不食稼皆抱荆棘而死宰相以下皆賀冬十月貶董禹為桞州司馬右補闕董禹諫上遊畋撃毬上賜金帛以褒之邠寧節度使李侃奏為假父求贈官侃為宦者假子禹上疏論之語侵宦官樞密使楊復恭本姓林氏為楊欽義養孫等訴于上遂坐貶十二月以宋威為諸道行營招討使王仙芝宼沂州平盧節度使宋威請帥兵討之故有是命仍詔諸道兵並取處分丙申三年春正月天平軍亂詔本軍宣慰之天平軍遣將士張晏等救沂州還聞北境有盗使留扞禦晏等不從諠譟趣府都將張思恭出城慰諭然後定詔本軍宣慰無得窮詰胡三省曰唐自中葉以來姑息藩鎮至其末也姑息亂軍遂陵夷以至于亡二月令天下鄉材各置弓刀鼓板以備羣盗三月崔彦昭罷以王鐸同平章事彦昭罷為太子太傅鄭畋數推鐸遂以左僕射復相夏五月以李可舉為盧龍節度使初可舉父茂勲囘鶻阿布思之裔以軍功賜姓名逐張公素而代之至是茂勲致仕請以軍授可舉從之六月雄州唐置後廢故城在寜夏府靈州地震裂水涌出壊公城及公私廬舍皆盡秋七月宋威撃王仙芝于沂州大破之宋威撃王仙芝大破之仙芝亡去威奏仙芝已死縱遣諸道兵百官皆入賀居二日州縣奏仙芝尚在攻剽如故時兵始休詔復發之士皆憤怨思亂仙芝尋陷汝州又陷陽武鄭州後攻唐鄧諂忠武節度使崔安潛字進之慎由弟發兵討仙芝九月乙亥朔日食冬十二月王仙芝宼淮南諸州鄭畋上言自沂州奏㨗之後仙芝愈肆猖狂屠䧟五六州瘡痍數千里宋威衰病殊無進討之意曽元裕望風退縮崔安潛威望過人張自勉驍勇良將宮苑使李琢西平王晟之孫嚴而有勇請以安潛為行營都統琢為詔討使代威自勉為副使代元裕上頗采其言以王仙芝為神策押牙不受王仙芝攻蘄州以書與刺史裴渥約歛兵不戰渥許為之奏官開城延仙芝及黄巢輩入置酒厚贈之表陳其狀詔以仙芝為左神策軍押牙仙芝大喜黄巢以官不及已大怒曰始者共立大誓横行天下今獨取官而去使此五千人衆安所歸乎因毆仙芝傷首其衆諠譁不已仙芝遂不受大掠蘄州分其軍三千餘人從仙芝及尚君長二千餘人從巢分道而去丁酉四年春二月南詔酋龍死子法立請和許之酋龍為邉患殆二十年及是死子法立好畋獵酣飲委國事于大臣嶺南西道節度使辛讜奏南詔請和且言諸道兵戍邕州歳乆餽餉疲弊請許其和使嬴瘵息肩詔許之但留荆南宣歙數軍餘减六七先是高駢奏遣僧景仙託遊行入南詔説諭酋龍許以公主妻之時駢方築成都羅城恐蠻寇驚役又以蠻俗尚浮屠故遣景仙往酋龍禮之信用其言已而法立請和親無表但令督夷牒中書請為弟而不稱臣禮部侍郎崔澹等言南詔驕僭無禮高駢不逹大體因一僧呫蘄卑辭誘致其使若從其請恐垂笑後代也駢上表與澹等辨詔諭解之後辛讜復攝廵官徐雲䖍如南詔牒使稱臣奉表貢方物法見雲䖍與抗禮謂曰南詔已與唐約為兄弟不則舅甥何表貢之有雲䖍曰驃信之先由大唐之命得合六詔為一恩德深厚中間小忿罪在邉鄙今驃信欲修舊好豈可違祖考之故事乎順祖考孝也事大固義也息戰争仁也審名分禮也四者皆令德也可不勉乎驃信待雲䖍甚厚比還授以木夾二一上中書門下一牒嶺南西道然猶未肯奉表稱貢務崔澹博陵人督爽南詔有幕爽爽等官分理諸其相督之木夾所以夾文書者夏四月壬申朔日食秋七月王仙芝黄巢圍宋州仙芝陷鄂州巢䧟鄆州沂州至是合軍圍宋威于宋州將軍張自勉將忠武兵三千救之殺賊二千餘人賊解圍遁去王鐸盧攜欲使自勉以所將兵受宋威節度鄭畋以為威與自勉素有疑忿若在麾下必為所殺不肯署奏遂皆求罷免不許鹽州作亂逐刺史王承顔詔貶承顔象州唐置今屬栁州府司户時承顔素有政聲以嚴肅為驕卒所逐朝廷與貪暴致亂者同貶時人惜之冬十一月王仙芝遣尚君長請降宋威執之以獻斬之招討副都監楊復光閩人宦官楊元价養子遣人説諭王仙芝仙芝遣尚君長等請降宋威遣兵刧取以獻奉與戰生擒復光奏君長實降詔御史鞫之竟不能明遂斬之江州刺史劉秉仁斬賊帥柳彦璋彦璋王仙芝别將襲䧟江州執刺史陶祥使上表請降敇以彦璋為將軍令衆散以劉秉仁為刺史彦璋擁衆剽掠如故至是秉仁乘驛之官單舟入賊水寨彦璋出不意即迎拜秉仁斬之而散其衆戊戌五年春正月王仙芝宼荆南王仙芝宼荆南節度使楊知温知至之兄不設備賊䧟羅城知温猶賦詩山南東道節度使李福自將救之時有沙陀五百在襄陽福與之俱至荆門唐縣五代高氏于此置軍元改為州今屬安陸府遇賊沙陀縱騎奮撃破之仙芝聞之焚掠而去死者什三四招討副使曽元裕大破王仙芝于申州詔以為招討使張自勉副之先是鄭畋與王鐸盧􅂝爭論用兵于上前畋不勝退上奏曰自王仙芝俶擾崔安潜首請討之賊不敢犯其境又以兵授張自勉解宋州圍使江淮漕運流通不輸宼手今罷自勉而以所將兵七千人𨽻宋威餘復奏加誣毁若勍宼忽至何以枝梧臣請以四千人授威餘三千人使自勉將之守衛其境盧攜不以為然上不能决畋復上言宋威欺㒺朝廷敗衂狼籍宜正軍法不從至是元裕大敗仙芝殺萬人招降散遣者亦萬人乃罷威而以元裕為招討使自勉副之大同軍亂殺防禦使段文楚推李克用為留後振武節度使李國昌之子克用為沙沱副兵馬使戍蔚州時河南盗賊蜂起雲州沙陀兵馬使李盡忠與牙將康君立興唐人薛志勤即薛鐵山奉誠人程懐信李存璋字徳璜雲州人等謀曰今天下大亂朝廷號令不復行于四方此乃英雄立功名取富貴之秋也李振武功大官高名聞天下其子勇冠諸軍若輔以舉事代北不足平也衆以為然㑹代北薦饑漕運不繼防禦使段文楚頗减軍士衣米軍士怨怒盡忠遣君立潛詣蔚州説克用起兵除文楚而代之克用曰吾父在振武俟我禀之君立曰今機事已泄緩則生變于是盡忠夜執文楚繋獄克用率其衆趣雲州行收兵衆且萬人盡忠送符印請克用為留後而殺文楚克用遂入府視事表求敇命朝廷不許國昌上言請速除防禦使若克用違命臣請帥本道兵討之終不愛一子以負國家朝廷乃以盧簡方為防禦使詔國昌語克用令迎候如常儀除克用官必令稱愜李克用始此二月曽元裕大破王仙芝于黄梅隋縣今屬黄州府斬之元裕大破仙芝殺五萬餘人斬仙芝首傳京師餘黨散去黄巢自稱衝天大將軍陷沂濮掠宋汴巢方攻亳州未下尚讓帥仙芝餘衆歸之推巢號衝天大將軍改元王覇署官屬攻陷沂濮掠宋汴尋又陷䖍吉饒信等州州信州今廣信府是唐置䖍吉州饒州注俱見前夏四月以李國昌為大同節度使國昌不奉詔朝廷以克用據雲中以李國昌為大同節度使以為克用必無以拒也國昌欲父子并據兩鎭得制書毁之殺監軍與克用合兵進撃寕武軍名今寕武府是及岢嵐軍今太原府岢嵐州是詔河南貨啇税富人錢穀除官有差詔以東都軍儲不足貸啇旅富人錢榖以供數月之費仍以空名告身賜之時連歳旱蝗宼盗充斥耕桑半廢租賦不足故有是命五月鄭畋盧􅂝罷鄭畋盧􅂝議南詔事時南詔遣使請和􅂝欲和親畋不可􅂝怒拂衣起袂罥硯墮地破之上聞之曰大臣相詬何以儀型四方遂皆罷之以豆盧瑑字希眞河南人崔沆字内鉉之子同平章事是日宣麻大風雷雨㧞樹識者知其不終云時宰相有好施者嘗囊錢自随行施匄者毎出襤䄛盈路有朝士以書規之曰今百姓疲弊寇盗充斥相公宜舉賢任能紀綱庻務損不急之杜私謁之門使萬物各得其所何必如此行小惠乎六月以高駢為鎭海節度使王仙芝餘黨剽掠浙西朝廷以高駢先在天平有威名仙芝黨多鄆人乃徙駢鎮浙西秋七月黄巢宼宣州入浙東注見前黄巢宼宣州觀察使王凝字成庻翃曽孫拒之巢攻城不克乃引兵入浙東開山路七百里攻剽福建諸州冬十月河東昭義合兵討沙陀大敗昭義節度使李鈞業之子戰死十二月曹師雄宼掠二浙王仙芝餘黨曹師雄宼掠二浙杭州募兵使石鏡鎮名在臨安縣南以石鏡山名後改為衣錦山都將量昌臨安人等將以討之臨安人錢鏐字具美以驍勇事昌為兵馬使錢鏐事始此御批歴代通鑑輯覽卷六十二

front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷九十三宋理宗皇帝辛亥淳祐十一年䝉古憲宗元年夏六月䝉古主莽賚扣立是為憲宗
  hash: sha256:b9f8251f89d0b82367f1de7c4d10253e8db9fc6ea84f2e26266efea4f1749e00

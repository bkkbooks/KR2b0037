  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_038-1a, image: WYG0336/WYG0336-0341a.png}
body:
  text: 初尋陽既平宋主遣沈文秀之弟文炳以詔書喻文秀又遣將軍劉懷珍宇道玉平原人將三千人與之偕行未至值張永等敗退先是散騎侍郎明僧皓起兵攻沈文秀以應建康至是文秀攻僧皓僧皓走保東萊人明僧皓平原鬲衆情恟懼欲且保郁洲懷珍不可遂進至黔陬漢縣隋省故城在今萊州府州會文秀所置高密注見前平昌晉郡今青州府安邱縣是二郡太守棄城走唯長廣注見前太守劉桃根守不其城注見前懷珍遣百騎拔之文秀聞諸城皆敗乃遣使請降宋主復以為青州刺史時崔道固已先請降宋主亦復其位魏將軍慕容白曜燕太祖皓之元孫侵宋青州魏遣將軍長孫陵肥之子等將兵赴青州慕容白曜以五萬騎為之繼援時宋申纂坦從子為東平太守守無鹽注見前劉休賓字處幹懷珍族弟為幽州刺史守梁鄒漢縣隋改鄒平今屬濟南府房崇吉東淸河繹幕人為并州刺史守升城宋東太原郡治齊省故城在今濟南府長清縣張讜清河人輔國將軍守團城今沂州府沂水縣是王整兖州刺史桓欣蘭陵太守等守肥城漢縣隋省元復置今屬泰安府麋溝垣苗二城俱在長清縣諸戍白曜至無鹽欲攻之將佐皆以攻具未備不宜遽進司馬酈範字世則范陽人曰輕軍深入豈宜淹緩且申纂必謂我軍來速不暇攻圍將不為備今出其不意可一鼓而克白曜從之引兵僞退夜進攻之遂拔無鹽殺纂將攻肥城範曰肥城雖小攻之引日勝之不益軍勢不勝足挫軍威彼見無鹽之破不敢不懼若飛書喻之不降即散矣白曜從之肥城果潰白曜謂範曰此行得卿三齊不足定也遂取麋溝垣苗二戍一旬中拔四城威震齊土升城不下白曜築長圍攻之三月乃克白曜欲盡坑之參軍韓麒麟昌黎人諌曰如此則自此以東諸城皆人自為守不可攻矣白曜乃止崇吉脫身走其毋及申纂妻與魏濟州刺史盧度世有中表親然已疏逺及為魏所虜度世奉事甚恭贍給優厚已而崇吉及張讜王整桓欣等俱降于魏魏遂拔厯城崔道固出降劉休賓亦降盧度世字子遷元之子秋八月宋遣中領軍沈攸之擊彭城將軍蕭道成鎮淮隂宋主復遣沈攸之等擊彭城攸之以清泗方涸固執以為不可宋主怒彊遣之而使行徐州事蕭道成鎮淮隂道成收養豪俊賓客始盛魏之入彭城也垣崇祖將部曲奔朐山道成以為戍主垣榮祖亦自彭城奔朐山依于道成劉僧副以二千人避魏居海島道成亦召而撫之朐山注見前垣崇祖字敬逺一字僧寶護之弟子榮祖崇祖從父兄劉僧副懷珍族弟魏人拒擊宋師走之遂取下邳魏尉元表言彭城宋之要藩而宋向彭城必由清泗過宿豫厯下邳趨青州亦由下邳沂水經東安漢縣晉為郡後廢故城在今沂州府沂水縣此皆要地宜先平之會沈攸之將兵北出尉元遣兵拒攸之又以攸之前敗所喪士卒瘃墮膝行者還之以沮其氣宋主尋悔遣攸之等復召使還不及攸之至濉清口濉水入泗之口魏人擊之攸之大敗退屯淮隂委棄資械以萬計先是攸之使王元載字彥休元謨從弟守下邳宿豫淮陽諸城皆以將戍之及是攸之既敗尉元以書喻元載元載棄下邳走宿豫淮陽諸戍將亦皆棄城奔潰魏以辛紹先為下邳太守紹先不尚苛察務舉大綱教民治生禦寇而已由是下邳安之辛紹先隴西狄道人魏主始親政事魏主李夫人中山安喜人惠之女生子宏即孝文帝馮太后自撫養之乃還政于魏主魏主始親國事勤于為事賞罰嚴明拔清節黜貪汚于是魏之牧守始有以亷潔著聞者冬十月宋以金贖義陽王昶于魏昶奔魏事見前宋主遣使以金千兩贖義陽王昶于魏魏人不許魏使昶與宋主書為兄弟之儀宋主責具不稱臣不答魏主復使昶作書與宋主昶曰臣本彧兄未經為臣若改前書是為二敬茍或不改彼所不納臣不敢奉詔乃止魏人愛重昶凡三尚公主戊宋泰始四年申魏皇興二年春正月魏侵宋宋豫州刺史劉勔擊却之斬其將關于拔魏侵宋武津宋縣齊廢故城在今汝寧府上蔡縣宋劉勔擊破之斬其將于都公關于拔魏復寇義陽勔擊却之已而勔又敗魏兵于許昌淮西民賈元友上書陳伐魏取陳蔡之䇿宋主以其書示勔勔上言元友所陳率多誇誕言之甚易行之甚難臣竊見元嘉以來愴荒逺人多干國議負擔歸闕皆勸討虜從來信納皆貽後悔境上之人唯視彊弱王師至彼必壺漿候塗裁見軍退便抄截蜂起此前後所見明驗非一也宋主乃止夏四月宋減民田租之半魏以李惠為征南大將軍馮熙字晉昌朗之子為太傅惠李夫人之父熙馮太后之兄也冬十月癸酉朔日食十二月宋以阮佃夫為游擊將軍先是中書侍郎舍人皆用名流為之太祖始用寒士世祖猶雜用士庶而巢戴尚之法興遂用事及是宋主盡用左右細人佃夫及中書舍人王道隆吳興烏程人散騎侍郎楊運長宣城懷安人並參預政事權亞人主巢戴所不及也佃夫尤恣橫納貨賂作威福朝士貴賤莫不自結僕𨽻皆不次除官捉車人至中郎將馬士至員外郎巳宋泰始五年酉魏皇興三年春正月魏拔宋青州執其刺史沈文秀先是魏長孫陵攻沈文秀于東陽文秀請降魏兵入城暴掠文秀悔怒閉城拒守魏人圍之三年外無救援士卒晝夜拒戰甲胄生蟣蝨無離叛之志至是魏人拔東陽文秀解戎服正衣冠持節坐齊內魏兵交至問文秀何在文秀厲聲曰身是也遂執之去其衣縛送慕容白曜使之拜文秀曰各兩國大臣何拜之有白曜還其衣為之設饌鎖送平城魏主數其罪而宥之待為下客給惡衣疏食既而重其不屈稍嘉禮之拜外都下大夫于是青冀之地盡入于魏矣二月魏以慕容白曜為青州刺史都督青齊東徐魏得宋冀州改曰齊州又置東徐州三州諸軍事白曜撫御有方東人安之已而魏主以白曜前附乙渾追以為憾誅之魏立三等輸租法除其雜調魏自天安以來比嵗旱饑重以青州用兵山東之民疲于賦役魏主命因民貧富分為三等輸租之法等為三品上三品輸平城中輸他州下輸本州舊制常賦之外有雜調十五至是罷之民稍贍給時魏徙青齊民于平城桑乾立平齊郡以居之沙門統曇曜奏平齊户及諸民有能嵗輸穀六十斛入僧曹者即為僧祗户粟為僧祇粟遇凶嵗賑給饑民又請民犯重罪及官奴以為佛圖户以供諸寺灑掃並許之于是僧祇寺户遍于州鎮矣郡桑乾魏郡隋廢為鎮在今大同府山隂縣平齊廢在今大同府大同縣沙門統胡三省注猶今之僧録夏六月魏立子宏為太子宋主殺其兄廬江王禕禕宋主兄而宋主輕之以廢帝謂之驢王因徙封廬江禕銜之會河東柳欣慰等謀反欲立禕禕與通謀事覺欣慰等伏誅禕降車騎將軍出鎮宣城遣兵防衛已而宋主令有司奏禕忿懟有怨言詔免官爵遣使逼令自殺冬十月丁卯朔日食十一月魏遣使如宋修好自是信使嵗通十二月宋以桂陽王休範文帝第十八子為揚州刺史宋司徒揚州刺史建安王休仁與宋主素相友愛景和之世宋主賴其力以脫禍及泰始初四方兵起休仁親當矢石克成大功任總百揆親寄甚隆由是朝野輻湊宋主漸不悅休仁悟其㫖表解揚州宋主以休範代之庚宋泰始六年戌魏皇興四年春正月宋定南郊明堂嵗祀間二年一祭南郊間一年一祭明堂夏六月宋以王景文為尚書左僕射揚州刺史景文王皇后之兄也宋主宫中大宴裸婦人而觀之王皇后以扇障面宋主怒曰外舍寒乞今共為樂何獨不視后曰為樂之事其方自多豈有姑姊妹集而以此為笑乎外舍之樂雅異于此宋主大怒遣后起景文聞之曰后在家劣弱今段遂能剛正如此宋以南兖州刺史蕭道成為黃門侍郎尋遣鎮淮隂道成在軍中久民間或言道成有異相道成姿表竒異龍潁鐘聲鱗文遍體宋主疑之徴為黃門侍郎道成懼不欲內遷而無計得留參軍荀伯玉字弄璋廣陵人勸道成遣數十騎入魏境安置標榜魏果遣遊騎行境上道成以聞宋主乃使道成遷鎮淮隂道成先鎮淮隂後為南兖州鎮廣陵至是復還鎮淮隂宋立總明觀置祭酒一人儒元文史學士各十人柔然侵魏魏主自將擊敗之柔然侵魏魏主引羣臣議之僕射南平公目辰桓帝之後曰車駕親征京師危懼不如持重固守虜懸軍深入糧運不繼不久自退遣將追擊破之必矣給事中張白澤衮之孫字鐘葵魏王賜名白澤曰蠢爾荒愚輕犯王略若鑾輿親行必望麾奔散豈可坐而縱敵以萬乘之尊嬰城自守非所以威服四夷也魏主從之分道出擊柔然大敗乘勝逐北降斬數萬所獲不可勝計時魏百官不給祿少能以亷白自立者魏主詔吏受所監臨羊一口酒一斛者死與者從坐有能糾告者即以所告之官授之白澤諌曰昔周之下士尚有代耕之祿今皇朝貴臣服勤無報若使受禮者刑身糾之者代職臣恐姦人窺望忠臣懈節求事簡而民安不可得也請依律令舊法仍班祿以酬亷吏魏主乃罷新法辛宋泰始七年魏髙祖亥孝文帝宏延興元年春二月宋主殺其弟晉平王休祐以巴陵王休若文帝第十九子為南徐州刺史宋主寢疾以太子幼弱深忌諸弟晉平王休祐剛狠數忤㫖宋主積不能平因其從出射雉隂遣夀寂之等拉殺之陽言落馬贈葬如禮民間訛言荆州刺史巴陵王休若有貴相宋主因召為南徐州刺史休若將佐皆謂還朝必不免禍參軍京兆王敬先曰荆州帶甲十萬地方數千里上可以匡天子除姦臣下可以保境土全一身孰與賜劍邸第使臣妾飲泣而不敢葬乎休若以白宋主而誅之夏五月宋主殺其弟建安王休仁晉平王既誅休仁益不自安宋主亦病與楊運長等為身後之計運長等亦慮宋主晏駕後休仁秉攻已不得專權彌贊成之於是召休仁入宿尚書下省遣人齎藥賜死休仁罵曰上得天下誰之力邪孝武以誅鋤兄弟子孫滅絶今復為爾宋祚其得久乎宋主慮有變力疾乘輿出端門休仁死乃入下詔稱休仁謀反懼罪引決降為始安縣王聽其子伯融襲封宋主與休仁素厚雖殺之每謂人曰我與建安年時相鄰少便欵狎艱難之中勳諴實重事計交切不得不除痛念之至不能自已因流涕不自勝宋以袁粲為尚書令褚淵為左僕射初宋主在藩與褚淵相善既即位深委仗之及寢疾淵守吳郡急召入見宋主流涕曰吾近危篤故召卿著黃􅘼耳黃􅘼者乳母服也因與淵謀誅休仁淵以為不可宋主怒曰卿癡人不足與計事淵懼而從命秋七月宋主殺其弟巴陵王休若以桂陽王休範為江州刺史休若至京口聞建安王死益懼宋主以休若和厚能得物情恐其將來傾奪幼主欲遣使殺之慮不奉詔乃以手書召之使赴七月七日宴及至賜死而以桂陽王休範刺江州休範素凡劣少知解不為諸兄齒遇宋主嘗指謂左右曰休範人材不及此以我弟故生便富貴釋氏願生王家良有以也及是宋主諸弟俱盡惟休範以凡劣不見忌得全史臣曰太祖之于義康以呵訓之微行成滅親之大禍開端樹隙垂之後人太宗因易隙之情據已行之典翦落洪枝不待顧慮既而幼主孤立神器傾移履霜堅冰其所由來逺矣宋以蕭道成為散騎常侍八月魏主𢎞傳位于太子宏自稱太上皇帝魏主聰睿夙成剛毅有斷而好黃老浮屠之學嘗有遺世之心以京兆王子推景穆帝子沈雅仁厚欲禪以位乃會公卿大議皆莫敢言任城王子雲子推之弟對曰陛下方隆太平臨四海豈得上違宗廟下棄兆民必欲委棄塵務則皇太子宜正大統太尉源賀尚書陸馛俟之子皆附子雲議魏主怒變色時太子宏生五年矣魏主以其幼故欲傳位子推中書令高允曰臣不敢多言願陛下上思宗廟付託之重追念周公抱成王之事魏主乃曰然則立太子羣公輔之又曰陸馛直臣也必能保吾子以為太保與源賀持節奉璽綬傳位于太子宏宏有至性前年魏主病癰親吮之及是悲泣不自勝魏主問其故對曰代親之感內切于心宏即位為孝文帝羣臣奏曰漢高祖稱皇帝而尊其父為太上皇明不統天下也今皇帝幼沖萬幾大政陛下猶宜總之謹上尊號曰太上皇帝從之上皇徙居北苑崇光宫來椽不斫土階而已又建鹿野浮圖于苑中與禪僧居之鹿野浮圖胡三省注尸迦國波羅城東北有鹿野苑本辟支佛住此常有野鹿故名今魏倣此而建浮圗也冬十月宋人侵魏魏擊却之宋主命北琅邪蘭陵太守垣崇祖琅邪蘭陵已沒于魏崇祖遙領二郡未有其地也經略淮北崇祖自郁洲將數百人入魏境七百里據䝉山在今沂州府費縣西北禹貢䝉羽其藝即此魏人擊之崇祖引還宋作湘宫寺宋主以故第為湘宫寺備極壯麗新安太守巢尚之罷還宋主謂曰卿至湘宫寺未此是我大功德散騎侍郎虞願字士恭餘姚人侍側曰此皆百姓賣兒貼亦賣也婦錢所為佛若有知當慈悲嗟愍罪高浮圖何功德之有侍坐者皆失色宋主怒使人驅下殿願徐去無異容宋主好圍棊甚拙與第一品彭城丞王抗對奕抗每假借之曰皇帝飛棊臣抗不能斷宋主不悟好之愈篤願日堯以此教丹朱非人主所宜好也宋主雖怒甚以其舊臣每優容之壬宋泰豫元年子魏延興二年春正月宋蠻酋桓誕以沔北降魏宋大陽胡三省注宋置大陽城于蘄陽西北蘄陽今黃州府蘄州是蠻酋桓誕據沔北八萬餘落降魏自云桓元之子魏以為東荆州刺史使起部郎通典晉宋有起部工部也取虞書百工起哉為義韋珍字靈智京兆人與誕安集新附區處皆得其所珍至桐柏窮淮源舊有祠蠻俗恆以人祭之珍乃曉告令自今悉以酒䀯代羣蠻從約名淮源自胎簮山伏流數十里湧出三泉因浚為井曰淮井在桐柏縣西二月宋殺其揚州刺史江安侯王景文景文常以盛滿為憂屢表辭位宋主不許及是宋主疾篤慮晏駕之後皇后臨朝景文必為宰相或有異圖遣使齎手敕並藥賜死敕至景文正與客棊叩函看已復置局下神色不變局竟斂子納奩畢徐曰奉敕見賜以死方以敕示客乃作墨啓致謝飲藥而卒先是宋主惡屯騎校尉夀寂之勇健因事殺之既又以豫州都督吳喜多計數得人情恐其不能事幼主召入賜死至是王景文死宋主又夢有人告曰豫章太守劉愔及既寤遣人就郡殺之夏四月宋主彧殂太子昱立是為後廢帝宋主疾篤以桂陽王休範為司空褚淵為護軍將軍劉勔為右僕射與尚書令袁粲荆州刺史蔡興宗郢州刺史沈攸之並受顧命淵素與蕭道成善薦之詔以為右衛將軍共掌機事宋主遂殂諡曰明皇帝廟號太宗葬髙寧陵太宗末年益猜虐好鬼神多忌諱文書有禍敗凶喪疑似之言應回避者數千百品有犯必戮改騧字為以其似禍字故也左右忤㫖往往刳斫時泗用兵府藏空竭百官斷祿而奮費過度每造器用必為正御副御次副各三十枚嬖佞用事貨賂公行民不堪命太子昱即位時方十嵗袁粲等秉政承奢侈之後務崇節儉欲救其弊而阮佃夫等用事不能禁也宋以安成王準即順帝為揚州刺史準實桂陽王休範之子太宗以為第三子秋七月宋以沈攸之都督荆襄八州軍事宋荆州刺史蔡興宗被徵還都右將軍王道隆以其彊直不欲使居上流改為中書監而以沈攸之代之興宗固辭不拜道隆每詣興宗躡履到前不敢就席良久去興宗竟不呼坐未幾興宗卒攸之自以材略過人隂蓄異志擇郢州士馬器仗精者多以自隨到官以討蠻為名大發兵力招聚才勇重賦斂以繕甲器舊應供臺者皆割留之舉措專恣不復永用符敕朝廷疑而憚之攸之為政刻暴或鞭撻士大夫然吏事精明人不敢欺盜賊屏息夜户不閉冬十月宋以劉秉字彥節長沙王道憐之孫為左僕射秉和弱無幹能以宗室清令故袁褚引之時阮佃夫為綸事中欲用其所親為郡袁粲等不從佃夫稱敕施行衆不敢執癸宋主昱元徽元丑年魏延興三年春正月魏詔守令勸農事除盜賊魏詔守令勸課農事同部之內貧富相通家有兩牛通借無者縣令能靜一縣劫盜者兼治二縣即食其祿能靜二縣者兼治三縣三年遷為郡守郡守二郡至三郡亦如之三年遷為刺史二月魏以孔乘為崇聖大夫乘孔子二十八代孫也秋七月魏制河南六州賦法户收絹一匹綿一斤租三十石冬十月武都王楊僧嗣卒弟文度立降魏初楊文德據葭蘆城名蜀漢姜維置在今階州東南為魏所破宋太祖免其官削爵土後太祖伐魏起文德為將軍使擾汧隴文德攻叛氐不兗劉秀之執送荆州使文德從祖兄頭戌葭蘆時故氐王楊保宗之子元和在宋保宗為魏所殺事具前世祖以其為楊氏正宗保宗故氐王元之子立之未幾元和棄國奔魏其從弟僧嗣立有功于宋時蕭惠開遣兵出梁州應尋陽僧嗣斷其道間使以聞太宗遂以為武都王至是僧嗣卒從弟文度自立遣使降魏已而文度襲陷魏讐池魏遣將軍皮歡喜破斬之以其弟文𢎞為武都王皮歡喜豹子之子十二月癸卯朔日食甲宋元徽二年寅魏延興四年夏五月宋江州刺史桂陽王休範舉兵反攻建康右衛將軍蕭道成擊斬之宋桂陽王休範謹澀無才不為物情所向自太宗晏駕嗣主年在幼沖休範自謂尊親無二應入為宰輔既不如志怨憤彌結典籖許公輿新蔡人為之謀主令休範折節下士由是逺近歸之收養勇力繕治器械朝廷知之隂為之備會夏口闕鎮以其地在尋陽上流欲使腹心居之乃以晉熙王燮為刺史而以王奐為長史行事燮方四嵗恐其過尋陽為休範所留使自太洑徑去休範聞之大怒密與公輿謀襲建康即晉熙王明帝第五子王奐字道明景文兄子太洑太子洑在今黃州府黃梅縣南至是休範遂舉兵反尋陽晝夜取道太雷戍主馳下告變朝廷惶駭蕭道成曰昔上流謀逆皆因淹緩致敗休範必懲前失輕兵急下乘我無備今宜頓兵新亭白下堅守宫城東府石頭以待賊至千里孤軍復無委積求戰不得自然瓦解我請頓新亭以當其鋒破賊必矣袁粲方以母喪去職聞難扶曵入殿由是內外戒嚴蕭道成出屯新亭張永出屯白下沈懷明戍石頭道成治壘未畢休範前軍已至新林浦名在江寧縣西南休範捨舟步上自以大衆攻新亭道成拒戰移時外勢愈盛衆皆失色道成曰賊雖多而亂尋當破矣休範白服乘肩輿登城以數十人自衛校尉黃回竟陵郡軍人張敬兒南陽冠軍人謀詐降以取之乃白于道成出城放仗大呼稱降休範信之置于左右休範方飲醇酒回目敬兒奪休範防身刀斬其首持還左右並散先是休範自新林分遣其將杜黑騾丁文豪等直趨朱雀門及是休範雖死黑騾等不知休範之死也道成遣送首詣臺送者道遇南軍棄首于水挺身得逹唱云已平而無以為驗人莫之信休範將士亦莫之知進至朱雀桁王道隆帥羽林軍在門內聞賊至急召劉勔勔自石頭來赴戰死之勔欲撤朱雀桁以折南軍之勢道隆怒曰賊至但當急擊寧可開桁示弱邪勔不敢言遂戰死黑騾乘勝渡淮道隆走黑騾追殺之于是中外大震白下石頭之衆皆潰撫軍長史褚澄字彥道淵之弟開東府門納賊賊擁安成王準據東府稱休範教曰安成王吾子也勿得侵官省恇擾衆莫有鬬志俄而丁文豪之衆知休範已死稍欲退散許公輿詐稱休範在新亭士民惶惑詣壘投刺者以千數道成皆焚之登城謂曰劉休範已就戮尸在南岡下我乃蕭平南道成時加平南將軍諸軍諦視之刺皆已焚勿懼也即遣陳顯逹南彭城人等將兵入衛袁粲慷慨告語諸將披甲上馬將驅之顯逹等引兵出戰大破黑騾文豪皆斬之餘黨悉平休範之反也沈攸之謂僚佐曰桂陽必聲言我與之同若不顯沛勤王必增朝野之惑乃與徐郢湘雍同討尋陽殺休範二子而還六月宋以蕭道成為中領軍道成與袁粲褚淵劉秉更日入直決事號為四貴魏罷門房之誅詔曰下民凶戾不顧親戚一人為惡殃及闔門朕為民父母深所愍悼自今非謀反大逆外叛罪止其身于是始罷門房之誅魏上皇勤于為治尤重刑獄大刑多令覆鞫或囚繫積年羣臣頗以為言上皇曰滯獄仍非善治不猶愈于倉猝而濫乎夫人幽苦則思善故智者以囹圄為福堂朕特苦之欲其改悔而加矜恕耳由是囚繫雖滯而所刑多得其宜秋七月柔然侵魏柔然侵魏敦煌尉多侯擊破之尚書奏敦煌僻逺介居彊寇之間謂吐谷渾柔然恐不能自固請內徙涼州羣臣集議僉以為然給事中韓秀字白武昌黎人獨執不可秀曰敦煌之置為日已久雖鄰彊寇而兵人素習尋常置戍足以自全若徙就姑臧慮人懷異意或貪留重遷情不願徙引寇內侵深為國患且捨逺就近遙防有闕是啓戎心二虜交搆互相往來關右荒擾邊役煩興不可不慮于是遂從秀議冬十一月宋主冠初宋主在東宫時喜怒乖節太宗屢敕陳太妃痛捶之及即位內畏太后太妃外憚諸大臣未敢縱逸自加元服內外稍無以制自以李道兒之子故每微行自稱李將軍常著小袴衫營署巷陌無不貫穿或夜宿客店或晝卧道旁排突厮養與之交易或遭慢辱悅而受之乙宋元徽三年卯魏延興五年春三月宋以張敬兒都督雍梁二州軍事敬兒請為雍州蕭道成以其人位俱輕不許敬兒曰沈攸之在荆州欲何所作不出敬兒制之恐非公之利也道成乃以敬兒鎮襄陽攸之恐敬兒襲已隂為之備敬兒既至奉事攸之甚至攸之以為誠然敬兒由是得其事迹皆密白道成丙宋元徽四年辰魏承明元年夏六月魏太后馮氏弒其主宏復稱制魏馮太后內行不正怨于上皇初尚書李敷之弟奕得幸于太后敷故與尚書李欣相善欣出為相州刺史受納貨賂為人所告敷隱蔽之上皇聞之檻車徵欣考驗當死時敷兄弟將見疏斥有司以中㫖諷欣告敷等隂事可免欣意不欲其壻裴攸勸之欣乃與范􅋆列敷兄弟事狀三十餘條有司以聞上皇大怒誅敷兄弟欣得減死未幾復為尚書太后以此怨上皇李敷字景文順之子李欣字元盛范陽人至是密行鴆毒上皇遂殂諡曰獻文皇帝廟號顯祖葬金陵太后大赦改元復臨朝稱制以馮熙為太師中書監熙於外戚固辭乃除洛州刺史太后性聰察知書訐曉政事被服儉素膳修減于故事什七八而猜忍多權數魏主宏性至孝能承顔順志事無大小皆仰成焉太后所幸宦者髙平王琚略陽苻承祖等皆依勢用事官至僕射爵為王公賞賜巨萬太卜令王睿得幸超遷尚書祕書令李沖雖以才進亦由私寵又外禮人望東陽王丕游明根等每褒賞睿寧輒以丕等參之自以失行畏人議己羣下語言稍涉疑忌輒殺之寵臣小過捶笞或至百餘尋復待之如初王睿字洛誠太原晉陽人李沖字恩順寶之子東陽王丕烈帝之元孫秋七月宋南徐州刺史建平王景素宣簡王宏之子起兵京口不克而死景素孝友清令好學禮士由是有美譽時太祖諸子俱盡諸孫唯景素為長宋主凶狂失德朝野咸屬意景素楊運長阮佃夫等欲專權勢不利立長君隂欲除之會有人告景素欲反景素腹心多勸舉兵參軍江淹獨諫之淹字文通濟陽考城人楊阮將發兵東討蕭道成袁粲以為不可景素亦遣世子詣闕自陳乃奪景素征北將軍而楊阮猜忌益甚景素亦謀為自全之計遣人往來建康將軍黃回羽林監垣祇祖皆隂與通謀至是祇祖率數百人奔京口云京師已潰勸令速入景素信之即據京口起兵楊阮遣將軍黃回李安民蘭陵人等討之蕭道成知回有異志故使安民與之偕行回不得發遂拔京口禽景素斬之黨與皆伏誅丁宋元徽五年順帝準巳明元年魏太和元年秋七月宋中領軍蕭道成弒其主昱而立安成王準是為順帝自為司空録尚書事宋主昱自京口既平驕恣尤甚無日不出從者並執鋋矛逄無免者民間擾門户晝閉行人殆絶針椎鑿鋸不離左右一日不殺則慘然不樂殿省憂惶食息不保阮佃夫等謀因其出執而廢之事覺被誅太后數訓戒昱昱欲鴆之未果嘗直入領軍府時盛暑蕭道成晝卧裸袒昱令起立畫腹為的引滿將射之道成斂板曰老臣無罪左右王天恩曰領軍腹大是佳射堋補登反射垜也一箭便死後無復射不如以骲箭骲蒲交反骨鏃箭也射之昱乃更以骲箭射中其臍投弓大笑道成憂懼密與袁粲褚淵謀廢立粲曰主上幼年其過易改伊霍之事非季世所行縱使功成亦終無全地淵默然越都校尉王敬則潛自結于道成道成命敬則陰結昱左右楊玉夫楊萬年陳奉伯等使伺機便至是昱乘露車與左右于臺岡在臺城東賭跳往青園尼寺晚至新安寺偷狗飲酒醉還仁夀殿熟寢玉夫萬年取千牛刀刎昱首奉伯袖之稱敕開門出與敬則敬則馳詣領軍府大呼事平道成戎服乘馬出敬則等從入殿中殿中驚怖及聞昱已死咸稱萬嵗道成以太后令召諸大臣入議道成謂劉秉曰此使君家事何以斷之秉未答道成鬚髯盡張目光如電秉曰尚書衆事可以見付軍旅處分一委領軍道成讓袁粲粲不敢當王敬則拔刃跳躍曰天下事皆應關蕭公敢有開一言者血染敬則刃仍手取白紗帽加道成首令即位曰事須及熱道成正色可之褚淵曰非蕭公無以了此道成乃下議迎立安成王劉秉出逄從弟韞問曰事當歸兄邪曰已讓領軍矣韞拊膺曰兄肉中詎有血邪今年族矣遂以太后令數昱之罪惡追廢為蒼梧王儀衛至東府門安成王令門者勿開以待袁司徒粲至乃入即位年十一以道成為司空録尚書事驃騎大將軍出鎮東府劉秉為尚書令袁粲鎮石頭秉始謂尚書政本以宗室居之則天下無變既而道成兼總軍國布置心膂與奪自專禇溯素相憑附秉粲閣手仰成矣粲性沖靜每有朝命常固辭不得已乃就職至是知道成有不臣之心隂欲圖之即日就命九月宋封楊玉夫等爵有差冬十月魏殺其徐州刺史李欣先是欣為尚書信用范􅋆欣弟瑛諫曰􅋆輕德義而重勢利不早絶之必貽後悔不從欣與尚書趙黑有隙發其罪黑坐黜為門士黑恨之踰年黑復入領選白馮太后稱欣専恣出為徐州􅋆知太后怨欣欣告李敷事具前至是乃告欣謀外叛太后徵欣問狀引􅋆證之欣曰汝受我恩何忍誣我􅋆曰􅋆受公恩何如公于李敷公忍之于敷􅋆何為不忍于公欣嘆曰吾不用瑛言悔之何及黑復于中搆成其罪欣遂見誅十一月宋荆襄都督沈攸之舉兵討蕭道成初沈攸之與蕭道成同直殿省相善至是以道成名位素出己下一旦專制朝權心甚不平其長子元琰自建康至攸之謂曰吾寧為王陵死不為賈充生㑹太后賜攸之燭十挺割之得太后手令曰國家之事一以委公于是勒兵移檄遣使邀張敬兒及諸州鎮敬兒斬其使諸鎮亦懷兩端遺書道成以為少帝昏狂宜與諸公密議共白太后下令廢之奈何交結左右親行弒逆移易朝舊布置親黨宫閣管籥悉關家人吾不知子孟孔明遺訓固如此乎足下既有賊宋之心吾寧敢捐包胥之節朝廷聞之忷懼初道成使其世子賾即齊武帝行郢州事以備攸之已徵賾為左衛將軍賾乃薦司馬柳世隆字彥緒元景從子自代賾謂世隆曰攸之一旦為變焚夏口舟艦沿流而東不可制也若留攻郢城未必能猝拔君為其內我為其外必破之矣及攸之起兵賾行至潯陽衆欲倍道趨建康賾曰潯陽地居中流密邇畿甸留屯湓口內藩朝廷外援夏口保據形勝控制西南今日㑹此天所置也左中郎將周山圖字季寂義興人復力言之賾乃奉晉熙王燮鎮湓口宋中書監袁粲尚書令劉秉謀誅蕭道成不克而死袁粲劉秉密謀誅蕭道成會湘州刺史王藴字彥深王太后兄子以母喪還至東府欲因道成出弔作難道成不出乃更與粲秉共圖之將帥黃回卜伯興天與之子等皆與通謀道成初聞沈攸之事起自往詣粲粲辭不見道成乃召褚淵與之連席每事必引淵共之淵故憾粲初溯遭憂去職朝廷敦迫不起粲往譬說淵乃從及粲遭憂淵譬說懇至粲終不起淵由是恨之乃謂道成曰西夏事必無成公當先備其內耳時劉秉從弟韞為領軍入直門下省卜伯興為直閣黃回等諸將皆出屯新亭粲謀矯太后令使韞伯興帥宿衛兵攻道成于朝堂回等帥所領為應劉秉等共赴石頭謀既定將以告淵衆謂不可粲曰淵雖與彼善豈得大作同異乃告之淵即以告道成道成乃遣軍主蘇烈薛淵安都從子等助粲守石頭淵曰不審公能保袁公共為一家否道成曰所以遣卿正為能盡臨事之宜使我無西顧之憂耳但努力無多言又以王敬則為直閣與伯興共總禁兵粲與秉等本期夜發秉恇擾不知所為晡後即束裝盡室奔石頭粲驚曰何事遽來今敗矣丹陽丞王遜僧綽之子走告道成道成密遣人告王敬則使殺韞及伯興蘇烈等據倉城拒粲王藴聞之謂粲已敗即散走道成遣軍主戴僧靜會稽永興人助烈等攻粲秉踰城走粲下城謂其子最曰本知一木不能止大厦之崩但以名義至此僧靜踰城進最以身衛粲僧靜直前斫之粲謂最曰我不失忠臣汝不失孝子遂父子俱死百姓哀之為之謡曰可憐石頭城寧為袁粲死不作褚淵生秉父子亦為亂兵所害黃回以事泄遂不敢發王藴逃匿捕得見殺黃回後為南兖州刺史道成慮其終為禍亂殺之宋以楊運長為宣城太守運長出守宣城于是太宗嬖臣無在禁省者矣運長後為蕭道成所殺史臣曰孝建泰始主威獨運而刑政糾雜理難遍通耳目所寄事歸近習及太宗晚運慮經盛衰權幸之徒懾憚宗戚欲使幼主孤立永竊國權造同異興樹禍隙帝弟宗王相繼屠勦寶祚夙傾實由于此矣宋蕭道成假黃鉞出頓新亭戊宋升明二年午魏太和二年春正月宋沈攸之軍潰走死攸之至夏口自恃兵彊有驕色以郢城弱小不足攻欲以偏師守之而自帥大衆東下㑹柳世隆遣人挑戰肆罵穢辱之攸之大怒遂悉鋭攻城世隆隨宜拒應屢破之攸之素失人情但劫以威力及城久不拔逃者稍多司馬劉攘兵射書入城請降世隆納之攘兵燒營而去攸之軍遂大潰先是張敬兒既斬攸之使者即勒兵偵攸之下遂襲江陵殺其子及孫至是攸之收散卒將還江陵聞敬兒已據城士卒皆散乃縊而死張敬兒之襲江陵也金陵邊榮為攸之留府司馬城潰見執敬兒曰邊公何為同人作賊榮曰沈荆州舉義匡社稷不可謂賊身本不求生何須見問敬兒曰死何難命斬之榮歡笑而去榮客泰山程雍之抱持榮顧謂敬兒曰君入人國不聞仁惠之聲而先戮義士三楚之人寧蹈江漢死耳豈肯與君同日而生敬兒曰求死甚易乃先殺雍之而後及榮軍士皆為垂涕攸之軍潰時諸將皆走功曹臧寅曰幸其成而棄其敗吾不忍為也乃投水死臧寅字士若燾之曾孫宋蕭道成自為太尉都督十六州諸軍事建康解嚴蕭道成還鎮東府加太尉都督南徐等十六州諸軍事以其子賾為江州刺史嶷字宣儼道成第二子為中領軍褚淵為中書監司空吏部郎王儉神彩淵曠好學博聞有宰相之志道成以為長史待遇隆密事皆委之道成以大明以來公私奢侈奏罷御府省尚方雕飾器玩又奏禁民間華僞雜物凡十七條秋九月乙巳朔日食宋蕭道成自為太傅揚州牧加殊禮道成欲傾宋室夜召長史謝朏字敬沖莊之子屏人與語久之朏無言時二小兒捉燭道成疑朏難之乃取燭遣兒出朏又無言道成乃呼左右他日王儉知其㫖請間說之儉曰功高不賞古今非一以公今日位地欲終北面可乎道成正色裁之而神彩內和儉因曰儉䝉公殊盼所以吐所難吐何賜拒之深也宋氏失德非公豈復寧濟但人情澆薄不能持久若小復推遷則人望去矣豈惟大業永淪七尺亦不可保道成曰卿言不無理儉又謂公宜禮絶羣后微示變革儉即倡議加道成太傅假黃鉞道成所親任遐字景逺樂安博昌人曰此大事應報褚公道成曰褚公不從奈何遐曰彥回惜身保妻子非有竒才異節遐能制之淵果無違異詔進道成假黃鉞大都督中外諸軍事太傅領楊州牧劍履上殿入朝不趨贊拜不名冬十二月魏太后殺其青州刺史南郡王李惠馮太后忌李惠惠為李夫人之父誣以南叛殺之并其妻子太后以猜嫌所夷滅者十餘家而惠所厯皆有善政魏人尤寃惜之宋定音樂尚書王僧䖍僧綽之弟奏朝廷以宫縣合和鞞拂鼙舞拂舞之曲也宋書樂志鼙舞漢代施于宴享舊曲有五篇拂舞出自江左舊云吳舞亦陳于殿庭歌詩五篇節數雖會慮乖雅體又今之清商一曰清樂絲竹相和之曲實由銅爵銅爵臺也魏武建臺自作樂府被之管絃置清商令掌之郭茂倩曰晉室播遷舊樂亡散苻堅滅涼得之傳于後秦宋武定關中遂入江南中庸和雅莫近于斯而情變聽移亡者將半民間競造新聲煩淫無極宜令有司悉加補綴從之己宋升明三年齊太祖高帝蕭道成建未元元年魏太和三年是嵗宋亡齊代春正月宋以謝朏為侍中蕭道成以朏有重名欲引參佐命以為左長史嘗與論魏晉故事因曰石苞不早勸晉文死方慟哭晉文王薨石苞自揚州奔喪慟哭曰基業如此而以人臣終乎見石苞傳方之馮異馮異勸光武即尊位事具前非知幾也朏曰晉文世事魏室必將終身北面借使魏行唐虞故事亦當三讓彌高道成不悅以朏為侍中更以王儉為長史三月癸卯朔日食宋蕭道成自為相國封齊公加九錫以十郡為齊國官爵禮儀並倣朝廷道成初議封梁公員外郎崔祖思啓曰䜟書云金刀利刃齊刈之今宜稱齊實應天命從之崔祖思字敬元清河東武城人宋蕭道成以王儉為齊尚書右僕射褚淵引何曾自魏司徒為晉丞相故事何曾𫝊咸熙初拜司徒時武帝方襲王位以曾為晉丞相求為齊官道成不許以王儉為齊尚書右僕射領吏部儉時年二十八夏四月宋蕭道成自進爵為齊王遂稱皇帝是為齊太祖高帝廢其主準為汝隂王徙之丹陽殺宋奉朝請裴顗宋自高祖至順帝凡八主合五十九年道成進爵為王增封十郡令宋主下詔禪位宋主不肯臨軒匿于佛蓋下王敬則勒兵入迎太后懼自率閹人索得之敬則啓譬令出宋主收淚謂曰欲見殺乎敬則曰遷居别宫耳官先取司馬家亦如此宋主泣而彈指曰願後身世世勿復生天王家宫中皆哭宋主又拍敬則手曰必無過慮當餉輔國敬則為輔國將軍十萬錢是日百僚陪位侍中謝朏在直當解璽綬陽為不知曰有何公事傳詔中書舍人屬宣傳詔㫖云解璽綬授齊王朏曰齊自應有侍中乃引枕卧傳詔懼使朏稱疾朏曰我無疾何所道遂朝服步出乃以王儉為侍中解璽綬禮畢宋主出就東邸光祿大夫王琨在晉世已為郎中至是攀車慟哭曰人以夀為歡老臣以壽為戚既不能先驅螻蟻乃復頻見此事嗚咽不自勝百官雨泣琨華從父弟司空褚淵等奉璽綬詣齊宫齊王即皇帝位大赦改元奉宋主為汝隂王築丹陽宫置兵守衛之奉朝請河東裴顗上表數齊主過惡掛冠徑去齊主怒殺之太子賾請殺謝朏齊主曰殺之遂成其名正應容之度外耳久之因事廢于家齊以禇淵為司徒辭不受淵從父弟照字彥宣素非淵所為淵詣齊宫勸進時照謂淵子賁字蔚先曰不知汝家司空將一家物與一家亦復何謂及淵拜司徒賀者滿座照歎曰彥回少立名行何意披猖至此門户不幸遂有今日之拜使彥回作中書郎而死不當為一名士邪名德不昌乃復有期頤之夀淵固辭不受齊主令羣臣言事齊主問為政于參軍劉瓛字子圭沛國相人對曰政在孝經凡宋氏所以亡陛下所以得者皆是也陛下若戒前車之失加以寬厚雖危可安循其覆轍雖安必危矣齊主歎曰儒者之言可寶萬世于是復命羣臣各言得失淮南宣城太守劉善明請除宋大明泰始以來苛政以崇簡易給事黃門郎崔祖思言人不學不知道此悖逆禍亂所由生宜開文武二學令限外官各從所樂依方習業會稽太守閒喜公子良以臺使所在競作威福公私勞擾宜悉停止員外散騎郎劉思效言宋自大明以來漸見周弊徵賦有加乃至山澤之民不敢采食水草宜一新王度革正其失二劉善明懷珍族弔聞喜公子良字雲英太子賾第子齊主皆加褒賞或付有司詳擇所宜奏行之魏罷候官太祖置事具前魏詔候官千數罪重受賄不列輕罪吹毛發舉宜悉罷之更置謹直數百人使防邏街術執喧鬭者而已自此吏民始安其業齊褚淵王儉等進爵有差賞佐命之功也處士何㸃字子晳尚之之孫戲謂人曰我作齊書已竟其贊曰淵既世族儉亦國華不賴舅氏遑恤國家淵儉母皆宋公主故㸃云然五月齊主蕭道成弒汝隂王滅其族或走馬過汝隂王之門衛士恐有為亂者奔入殺王以疾聞齊主賞之遂殺宋宗室無少長皆死劉澄之遵考之子與褚淵善淵為之固請故遵考之族得免齊立世子賾為太子諸子皆封王冬十月魏遣梁郡王嘉太武帝之孫奉丹陽王劉昶伐齊先是齊主謂垣崇祖曰我新得天下索虜必以納劉昶為辭侵犯邊鄙夀陽當敵衝非卿無以制乃以崇祖為豫州刺史至是魏遣梁郡王嘉督兵奉昶伐齊許昶以克復舊業世胙江南稱藩于魏已而魏師攻齊夀陽不克魏步騎號二十萬攻夀陽垣崇祖于夀陽城西北堰肥水堰北築小城周為深塹使數千人守之曰虜見城小以為一舉可得必悉力攻之以謀破堰吾縱水衝之皆為流尸矣魏人果攻小城崇祖著白紗帽乘肩輿上城决水下堰魏人馬溺死千數遂退又攻朐山齊擊敗之魏使高允議定律令允先以老疾告歸尋以安車徵至平城拜中書監詔乘車入殿朝賀不拜復命允議定律令允時年九十餘而據律評刑志識無損允以獄者人命所係常歎曰臯陶至德也其後英六先亡劉項之際英布黥而王經世雖久猶有刑之餘釁况凡人能無咎乎詔以允家貧養薄令樂部十人五日一詣允以娛其志朝晡給膳朔望致牛酒月給衣服綿絹入見備几杖問以政事契丹東胡種其先軻比能為魏所殺衆遂微保潢水之南黃龍之北至後魏時自號曰契丹入附于魏劉友益曰契丹始見此契丹莫賀弗勿干帥部落萬餘口入附于魏居白狼水東水經注白狼水出右北平白狼縣東南流徑龍城西南又東南至遼東入于遼水考白狼水即今之老河源出喀喇沁之明安山由故大寧城東徑古柳城黃龍之北與潢河合潢河即遼水之西一源古所稱饒欒水也庚齊建元二年申魏太和四年春二月齊檢定民籍宋自孝建以來政綱弛紊簿籍訛謬至是詔黃門郎虞玩之字茂瑶餘姚人等更加檢定玩之上表以為元嘉中故光祿大夫傅隆字伯祚亮族兄年出七十猶自手書籍躬加隱校隱審校核也今欲求治取正必在勤民令長愚謂宜以元嘉二十七年籍為正更立明科一聽首式又反悔迷而不返依制必戮若有虛昧州縣同科從之齊以蕭鸞即明帝為郢州刺史西昌侯鸞齊主兄道生字孝伯之次子也早孤齊主飬之恩過諸子秋九月甲午朔日食冬十月齊以何戢字惠景偃之子為吏部尚書齊太子詹事何戢領選齊主以戢資重欲加侍中禇淵曰聖㫖每以蟬冕漢以後侍中中常侍冠加黃金璫附蟬為飾插以貂侍中插左中常侍插右不宜過多臣與儉己左珥若復加戢則八座令僕與列曹尚書為八座遂有三貂帖以驍遊驍騎將軍遊擊將軍足矣乃加戢驍騎將軍十一月齊制病囚診治之法丹陽尹王僧䖍上言郡縣獄相承有上湯殺囚謂囚或有病宜汗每上湯殺之名為救疾實行寃暴愚謂囚病宜先刺郡關白于郡也求職司與醫對診逺縣家人省視然後處治從之魏封王睿為中山王睿幸于馮太后進爵為王置王官二十二人皆當時名士明年睿卒贈諡立廟文士作誄者百餘人及葬自稱姻舊縗絰哭送者千餘人辛齊建元三年酉魏太和五年春正月齊敗魏師于甬城即角城魏書水經注作角隋書作甬故城在今淮安府清和縣西南魏侵齊淮陽晉郡唐省故城在今清和縣東南圍軍主成買于甬城齊遣將軍李安民周盤龍北蘭陵人等救之買力戰而死盤龍子奉叔以二百人陷陳深入魏以萬餘騎張左右翼圍之或言奉叔已沒盤龍馳馬奮矟直突魏陳所向披靡奉叔已出復入求盤龍父子兩騎縈擾魏數萬之衆莫敢當者遂敗退李安民等復追破之又敗之于淮陽夏五月鄧至羌入貢于魏鄧至者白水注見前羌也因地名自稱鄧至今階州文縣西徼外有鄧至山下有鄧至城元和志鄧艾所至故名羌遂以為號也國于宕昌注見前之南秋七月己未朔日食齊遣使如魏齊使參軍車僧朗于魏魏主問曰齊輔宋日淺何故遽登大位對曰虞夏登庸身陟元后魏晉匡輔貽厥子孫時宜不同耳先是宋遣使如魏因齊受禪遂留至是魏主宴羣臣坐僧朗于宋使下僧朗不肯就席宋使遂與忿詈劉昶隂使人刺殺僧朗魏人厚送其喪并歸宋使九月魏以薛虎子代人為徐州刺史淮北四州民不樂屬魏常思歸江南齊主多遣間諜誘之于是徐兖之民所在蜂起聚保五固城名在兖州府滕縣薛河南今謂之堌城推司馬朗之為主魏遣尉元薛虎子討之遂克五固斬朗之朗之等先請援于齊齊主遣李安民以兵迎之安民赴救遲留五固遂陷東南諸州悉平尉元徵還虎子為徐州刺史虎子表請屯田表曰國家欲取江東必先須積穀彭城今在鎮之兵不減數萬資糧之絹人十二匹用度無準公私捐費今徐州良田十餘萬頃水陸肥沃清汴通流足以灌溉若以兵絹市牛可得萬頭興置屯田一嵗之中具給官食且耕且守不妨捍邊一年之收遇于十倍之絹暫時之耕足充數載之食五稔之後穀帛俱非直戍卒豐飽亦有吞敵之勢矣魏主從之虎子為政有惠愛兵民懷之會沛郡下邳太守以贓汚為虎子所案告虎子與江南通魏主曰虎子必不然推案果虛二人皆賜死壬齊建元四年戊魏太和六年春正月齊以張緒字思曼岱兄子為國子祭酒晉武帝置後因之置學生二百人齊主道成殂太子賾立是為武帝齊主有疾召褚淵王儉受遺詔輔太子遂殂諡曰高皇帝廟號太祖葬武進泰安陵太子即位太祖深沉有大量性清儉即位後身不御精細之物主衣中有玉導曰留此正長病源命碎之嘗言使我治天下十年當令黃金與土同價玉導南史作玉介導冠簪也夏六月齊主立子長懋字雲喬為太子秋齊南康公褚淵死初齊主在東宫嘗宴朝臣右衛率沈文季與淵語相失文季怒曰淵自謂忠臣不知死之日何以見宋明帝淵入朝以腰扇障日征虜功曹劉祚曰作如此舉止羞面見人扇障何益淵曰士不遜祥曰不能殺袁劉安得免寒士孫劉祥字顯徵穆之之及是死世子賁恥其父失節服除遂不仕以爵讓其弟蓁字茂緒屏居墓下終身魏以李崇字繼長文成元皇后兄子為荆州魏置荆州于上洛領上洛上庸等郡刺史魏以荆州巴氐擾亂以李崇為刺史發兵送之崇曰邊人失和本怨刺史今奉詔代之自然安靖但須一詔而已不煩發兵自防使之懷懼也遂輕將數十騎馳至上洛宣詔慰諭民夷帖然崇命邊戍掠得齊人者悉還之由是齊人亦還其生口二境交和無復烽燧之警崇後徙兖州刺史兖土舊多劫盜崇命村置一樓樓皆懸鼓盜發之處亂擊之旁村始聞者以一擊為節次二次三俄頃之聞聲布百里皆發人守險由是盜無不獲其後諸州皆效之冬十一月魏主始親祀七廟命有司具儀法依古制備牲牢器服及樂章自是四時常祀皆親之癸齊世祖武帝賾水明亥元年魏太和七年春齊復郡縣官田秩遷代以小滿為限詔以邊境寧宴治民之官普復田秩宋元嘉末以軍興郡縣丞尉並斷俸祿至是復之先是宋以治民之官六年過久乃以三年為斷謂之小滿遷秩去來又不能依三年之制至是乃詔自今一以小滿為限夏四月齊殺其尚書垣崇祖散騎常侍荀伯玉齊主之為太子也自以年長與太祖同創大業朝事率皆專斷所信任左右張景真驕侈僭擬內外莫敢言司空咨議荀伯玉素為太祖所親厚密以啓聞太祖怒命檢校東宫宣敕詰責收景真殺之齊主憂懼稱疾月餘太祖怒不解王敬則叩頭啓曰官有天下日淺太子無事被執人情恐懼願官往東宫解之因宣㫖裝束太祖不得已至東宫召諸王宴盡醉乃還伯玉由是愈見親信而齊主深怨之豫州刺史垣崇祖亦不親附太子其破魏兵還太祖召與密謀齊主疑之及即位遷崇祖五兵尚書伯玉散騎常侍加意撫慰至是誣崇祖招結江北荒人猶言荒野之人南朝以楚人為傖荒沔北為荒中欲與伯玉作亂皆收殺之五月齊殺其車騎將軍張敬兒垣崇祖死敬兒內自疑㑹有人告敬兒貨易蠻中齊主疑其有異志時華林園設齊南史作八齊受釋氏戒也朝臣皆預于坐收敬兒敬兒脫冠貂投地曰此物誤我遂殺之敬兒好信夢初為南陽守妻尚氏夢一手熱為雍州夢一脾熱為開府夢半身熱敬兒意欲無厭謂所親曰吾妻復夢舉體熱矣齊主聞而惡之故見誅敬兒女為征北咨議謝超宗子婦超宗謂丹陽尹李安民曰往年殺韓信今年殺彭越尹將何計安民具啓之齊主數惡超宗輕慢收付廷尉賜死超宗靈運之孫也秋七月齊以王僧䖍為特進光祿大夫初齊主以侍中王僧䖍為光祿大夫開府儀同三司僧䖍固辭開府謂兄子儉曰汝行登三事我若受此是一門二台司也吾實懼焉纍年不拜至是齊主許之加特進初𢎞與兄弟集會任子孫戲適僧逹跳下地作虎子僧綽正坐采蠟燭珠為鳯凰僧逹奪取打壞亦復不惜僧䖍纍十二博棊既不墜落亦不重作𢎞嘆曰僧達俊奭當不減人然恐終危吾家僧綽當以名義見吳僧䖍必為長者位至三公已而皆如其言冬十月熒惑逆行入太微齊有司請讓之齊主曰應天以實不以文我克己求治思隆惠政災若在我讓之奚益十二月乙巳朔日食甲齊永明二年子魏太和八年春正月齊以竟陵王子良為司徒子良少有清尚傾意賓客居雞籠山開西邸聚古人器服以充之范雲字彥龍南鄉舞隂人蕭琛字彥瑜惠開從子任昉字彥升遐兄遙之子王融字元長僧達孫蕭衍字叔達齊太祖族子此胡三省曰蕭衍事始謝朓字元暉述孫沈約字休文璞之子陸倕字佐公吳郡吳人並以文學見親號曰八友柳惲字文暢世隆子王僧孺字僧孺雅曾孫江革字休映濟陽考城人范縝字子真雲從兄孔休源字慶緒會稽山隂人亦預焉子良篤好釋氏召致名僧講論佛法於邸閣營齊造經唄新聲或親為賦食行水世以為失宰相體縝或稱無佛子良曰子不信因果何得有富貴貧賤縝曰人生如樹花同發隨風而散或拂簾幌墜茵席之上或關籬牆落糞溷之中墜茵席者殿下是也落糞溷者下官是也貴賤雖殊因果何在縝又著滅神論以為形者神之質神者形之用神之于形猶利之于刀未聞刀沒而利存豈容形亡而神在哉子良使王融謂之曰卿才美何患不至中書郎而故乖剌為此甚可惜也縝笑曰使縝賣論取官已至令僕矣蕭衍好籌略有文武才幹王儉深器之曰蕭郎出三十貴不可言後子良啓以范雲為郡齊主曰聞其恆相賣㺯朕不復窮法當宥之以逺子良曰雲動相規諫諫書具存遂取以奏凡百餘紙辭皆切直齊主太息曰不謂雲能爾方使弼汝何宜出守太子嘗出東田觀獲顧謂賓客曰刈此亦殊可觀衆皆唯唯雲獨曰三時之務實為長勤伏願殿下知稼穡之艱難無狗一朝之宴逸東田在上元縣東夏六月齊以茹法亮吳興武康人為中書舍人時中書舍人四人各住一省謂之四户以法亮及吕文顯臨海人等為之權傾朝廷餉遺嵗數百萬法亮語人曰何須求外祿此一户中年辦百萬後天文有變王儉極言文顯等專權徇私所致齊主不能改秋魏始班祿魏舊制户調帛二匹絮二斤絲二斤榖二十斛又入帛一匹二丈委之州庫以供調外之費所調各隨土所出至是始班俸祿戶增調帛三匹榖二斛九斗以給之調外亦增二匹舊律枉法十匹義贓謂私情餉遺雖非乞取亦計所受論贓二十匹罪死至是祿行之後義贓一匹枉法無多少皆死秦益州刺史李洪之本名文通恆農人以外戚貴顯首以贓敗賜死餘守宰死者四十餘人受祿者無不局蹐賕賂殆絶然吏民犯他罪者魏主悉寬之疑罪奏讞多減死徙邊都下決大辟嵗不過五六人州鎮亦簡久之淮南王他道武帝孫陽平王熙子奏請依舊斷祿太后詔羣臣議中書監高閭字士漁陽雍奴人言饑寒切身慈母不能保其子今給祿則亷者無濫貪者勸慕不給則貪者得肆其姦亷者不能自保詔從之又表請依秦漢故事于六鎮之北築長城擇要害地開門造城置兵捍守計六鎮東西不過千里一夫一月之功可城三步之地用卜萬人一月可就雖有暫勞可以永逸几長城有五利罷防之兵一也北部放牧無抄掠之患二也登城勸敵以逸待勞三也息無時之備四也嵗常逰運永得不匱五也魏主優詔答之禦六鎮武川撫宜懷朔懷荒柔元彜杜佑曰並在馬邑雲中界冬十月齊以長沙王晃字宣明高帝第四子為中書監初太祖臨終以晃屬齊主使處輦下近藩勿令逺出且曰宋氏若非骨肉相殘他族豈得乘其弊汝深誡之舊制諸王在都惟得置捉刀執刀以衛左右者四十人晃自南徐州刺史罷還私載數百人仗齊主怒將糾以法豫章王嶷叩頭流涕曰晃罪誠不足宥陛下當憶先朝齊主垂泣而罷然終不被親寵武陵王宣昭嘗侍宴醉伏地貂抄肉拌齊主笑曰肉汗貂對曰陛下愛羽毛而疏骨肉齊主不悅十一月齊以始興王鑑字宣徹高帝第十子為益州刺史益州大度獠大度即今大渡河也古曰渽水出四川茂州徼外徑稚州寧逺至嘉定府入江獠竹絞反西南夷别種恃險驕恣刺史陳顯達遣使責其租賧吐濫反夷人以財贖罪曰賧獠殺其使顯達夜襲斬之益州自晉氏以來俱用名將為刺史至是齊主以鑑為之徵顯達為中護軍時劫帥夷帥也韓武方聚黨為暴郡縣不能禁鑑至武方出降長史請殺之鑑曰殺之無以勸善乃啓請宥之于是蠻夷為寇者望風降附鑑在州喜文學器服如素士蜀人悅之鑑之至蜀也或云顯逹不肯就徵鑑曰顯逹立節本朝必自無此居二日顯逹移家出城矣顯達以門寒位重每遷官常有愧懼之色戒其子勿以富貴凌人而諸子多事豪侈顯達曰塵尾蠅拂王謝家物汝不須捉此取而燒之乙齊永明三年丑魏太和九年春正月魏禁䜟緯巫卜詔曰圖䜟之興出于三季既非經國之典徒為妖邪所憑今皆焚之留者以大辟論又嚴禁諸巫覡及委巷卜筮非經典所載者齊復立國學先是齊以國恤罷國子學在建元四年至是復立之釋奠先師用上公禮三月魏主封諸弟為王太后置學館選師傅以教諸王始平王協字彥和最賢敏而好學魏主尤愛之後徙封為彭城王夏五月齊以王儉領國子祭酒初宋太祖置總明觀以集學士齊主以國學既立乃省之時王儉領國子祭酒詔于儉宅開學士館以總明四部書儒道文史之書分為甲乙丙丁四部充之儉少好禮學及春秋言論造次必于儒者撰次朝儀國典晉宋故事無不諳憶當朝理事斷決如流發言下筆皆有音彩十一日還學監試諸生巾卷巨員反武冠也在庭劍衛令史儀容甚盛作解散髻斜插簪朝野多慕效之儉曰江左風流宰相惟有謝安意以自比秋七月魏以梁彌承為宕昌王初宕昌王梁彌機死子彌博立為吐谷渾所逼奔仇池魏仇池將穆亮代人羆之弟以彌承為衆所附擊走吐谷渾立之而還後齊亦以彌承為河涼二州刺史冬十月魏詔均田初魏民多䕃附附于豪强之家以求䕃庇䕃附者無官役而豪强徵斂倍于公賦給事中李安世趙郡平棘人孝伯兄子上言嵗饑民流田業多為豪右所占雖桑井難復宜更均量使力業相稱又所爭之田宜限年斷事久難明悉歸今主以絶詐妄魏主善之由是始議均田十月詔諸男夫十五以上受露田不種樹之地四十畝婦人二十畝奴婢依良丁良人成丁者牛一頭受田三十畝限止四牛所授之田率倍之三易之田不易之地嵗嵗可種一易之地兩嵗一種再易之地三嵗一種再倍之以供耕作及還受之盈縮人年及課則受田老免及身沒則還田奴婢牛隨有無以還受初受田者男夫給二十畝課種桑五十株桑田皆為世業終身不還恆計見口有盈者無受無還不足者受種如法盈者得賣其盈諸宰民之官各隨給公田有差更代相付賣者坐如律丙齊永明四年寅魏太和十年春正月朔魏主朝㑹始服衮寃齊討富陽即漢富春縣晉改名今屬浙江杭州府賊唐㝢之平之初齊太祖命虞玩之等檢定黃籍編户之文以黃表之事見前齊主即位别立校籍官置令史收括嚴切又以外監吕文度會稽山隂人言上籍被却者悉充逺戍民多逃亡避罪富陽民唐㝢之因以邪術倡亂衆至三萬稱帝于錢塘攻陷東陽注見前殺太守齊發禁兵擊斬之進平諸郡時禁兵乘勢縱掠軍還軍主陳天福坐棄市天福齊主寵將也既伏誅內外皆震肅遣使慰勞遭賊郡縣百姓被驅逼者悉無所問後永明九年詔免前却籍戌邊者武都王楊後起卒種人集始立集始文𢎞之子也先是文𢎞既卒齊以其從子後起難當之孫為武都王後起亦受命于魏及是後起卒集始為白水楊氏所置郡太守齊授以父爵如故後集始朝魏魏以為南秦州刺史武興王今陜西漢中府略陽縣本晉武興戌後為楊氏所據自號武興國魏置三長定民户籍魏無鄰黨之法惟立宗主督護民多隱冒三五十家始為一户內祕書令李沖請定民籍略曰宜準古法五家立鄰長五鄰立里長五里立黨長擇鄉人彊謹者為之鄰長復一夫里長二夫黨長三夫三載無過則升一等其民調一夫一婦帛一匹粟二石大率十匹為公調二匹為調外費三匹為百官俸此外復有雜調八十一子不從役孤老貧病不能自存者三長迭養食之詔百官議中書令鄭羲字幼鄰滎陽開封人等以為不可沖力持之遂從其議民始皆愁苦豪彊者尤不願既而課調省十餘倍上下安之夏四月魏制五等公服胡三省注公服朝廷之服五等朱紫緋緑青也已復給尚書五等爵以上朱衣玉佩大小組綬秋九月魏作明堂辟雍改中書學為國子學魏分置州郡凡三十八州二十五州在河南十三州在河北御批厯代通鑑輯覽卷三十九

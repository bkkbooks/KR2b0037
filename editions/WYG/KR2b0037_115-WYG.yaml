body:
  text: 欽定四庫全書御批歴代通鑑輯覽卷一百十六明莊烈帝甲申崇禎十七年是年三月流賊陷京師五月福王由崧稱帝于南京以明年為𢎞光元年我大清世祖章皇帝順治元年臣等謹按厯代史家書法義例攸殊率于厯朝代嬗時意多偏私曲徇進退失宜如續網目于元至正十五年後即標元國號大書明我年臣等學識凡猥嘗擬崇禎甲申即應仿沿前例欽䝉皇上折衷至義昭示大公明統猶存仍當大書紀嵗即福王面諭臣等以崇禎十七年稱號尚可比于宋代建炎之例必俟蕪湖被執始書明亡因以掦萬世之閧綱祛百家之私議辨統系而必存其實垂法戒而永著為程睿製煌煌為自古史臣發凡起例所未有以視春秋謹嚴後先一揆臣等謹首登卷端用彰盛美自是以次編排悉敬遵能仰測宸衷筆削洵非管牑之見所髙深于萬一云春正月朔李自成僭號于西京自成僭稱王改名自晟國號順改元永昌追尊其曽祖以下加諡號以李繼遷為太祖設天佑殿大學士以牛金星為之増置六政府尚書設𢎞文館以下等官復五等爵大封功臣侯劉宗敏以下九人伯劉體純以下七十二人子三十人男五十五人草檄傳布逺近有云君非甚暗孤立而焬蔽恒多臣盡行私比黨而公忠絶少又云獄囚累累士無報禮之心征斂重重民有偕亡之痛見者扼腕是日大風霾黄霧四塞有邱從周者都司吏也長不滿三尺素懷義憤伺自成出乘醉直至其前㦸手罵曰若一貧賤細民今妄據王僭稱偽號逆天背理吾見汝屍之萬段也自成大怒立斫殺之李建泰自請督師勦賊許之帝聞自成僭號大驚召廷臣集議欲親征決戰建泰家曲沃富于貲請以私財餉軍率師西討帝曰卿若行朕當倣古推轂禮遂賜建泰敕幸正陽門樓親餞行數里建泰所乘肩輿忽折衆以為不祥建泰以宰輔督師兵食並絀所携止五百人甫出都聞曲沃已破驚悸稱病日行三十里至定興吏民閉城不納建泰攻破之笞其長吏抵保定賊鋒已逼知府何復字見元平度人同知邵宗元字景康碭山人方城守建泰叩城求入宗元等不許建泰以尚方劒恐之或曰金御史毓峒保定衛人監軍亟推出視信乃納之遂屯城中以工部尚書范景文禮部侍郎邱瑜宜城人並兼東閣大學士預機務李建泰既出督師景文遂與瑜同入閣輔政帝謂景文曰朕知卿久今急而用卿恨晚卿尚勉之景文請釋繫獄張國維郭景昌等帝立從其言李自成漸逼有請帝南幸者命集議閣中景文言固結人心堅守待援而已此外非臣所知帝是其言張獻忠入四川獻忠自荆州趨蜀陷䕫州石砫土官秦良玉馳援兵寡敗歸先是秦良玉自夔州敗歸慷慨語其衆曰吾兄弟二人皆死王事吾以一孱婦人䝉國恩二十年今不幸至此其敢以餘生事逆賊哉悉召所部約曰有從賊者族無赦乃分兵守四境後賊招土司蜀無敢至石砫者獻忠至萬縣水漲留屯三月已破涪州進陷佛圖闗注見前時四川巡撫陳士竒字平人漳浦人已謝事駐重慶或勸之去士竒不可與副使陳纁知府王行儉字質行宜興人知縣王錫新建人等竭力拒守賊穴地轟城遂陷士竒等皆被執瑞王常浩亦與焉王避闖賊自漢中來奔指揮顧景泣告獻忠曰寧殺吾無害帝子賊怒遂害王幷殺景天忽無雲而雷者三賊有震者獻忠大怒曰我殺人何與天事乃發巨礮與天角而盡殺士竒等二月李自成陷太原别遣將犯畿南陷真定自成渡河連破蒲州汾州知府侯君招汾陽縣劉必逹俱死之遂陷太原執晉王求桂恭王棡十世孫賊脅入北京後不知所終巡撫蔡懋徳字公虞崑山人恪本朝賜諡忠等死之中軍副總兵應時盛與懋徳同擊賊懋徳死遂與標丁王永魁等自刎官吏則有布政使趙建極副使毛文炳及妻趙氏妾陳氏參議藺剛中僉事畢拱辰知府孫康周同知李一清長史范志泰副將惠光祚都司張宏業及妻趙氏子凝秀指揮韓似雍千户王徳新司鼎晉府典仗官樊子英等皆不屈死人應時盛遼東人趙建極河南永寧人毛文炳鄭州藺剛中陵縣人畢拱辰字星伯掖縣人孫康周字魯侯安邱人范志泰虞城人張宏業忻州人遂連陷黎城臨晉潞安執潘世子進攻代州總兵周遇吉力拒食盡退守寧武賊遂扺固闗分兵趨真定􅊾總督徐標臨清人降標斬其使率衆拒守真定知府邱荗華與中軍謝加福害之以城降賊攻彰徳趙王常決亦降下詔罪已發帑金五十治守具詔天下勤王左都御史李邦華請南遷及太子撫軍江南皆不報賊勢急復遣内臣高起潛杜勲等分監邊鎮及近畿要害陳演罷演在閣一無籌畫惟以賄聞賊入山西薊遼總督王永言請移寧逺總兵吳三桂于關門選士卒策應京師演持不可後帝決計行之演始不自安引疾求罷入辭自言佐理無狀當死帝怒曰汝死不足蔽辜叱之出演貲多不能遽行遂留京師李自成陷寧武闗總兵官周遇吉力戰死之初遇吉駐代州憑城固守食盡退守寧武賊踵至大呼五日不降即屠遇吉發大礮殺賊萬人設伏城中誘賊入復殺數千人城毁復完者再自成悉力攻破之遇􅁻巷戰徒歩跳盪手殺數十人矢集如蝟毛被執罵賊死諡本朝賜忠武遇吉妻劉氏率婦女登屋射賊賊縱火焚之闔家俱死城中士民無降者自成集衆計曰此去厯大同陽和宣府居庸皆有重兵倘盡如寧武奈何不如且還俟再舉而大同總兵姜瓖宣府總兵王承允降表相繼至自成大喜遂長驅而東三月大同總兵官姜瓖宣府監視太監杜勲俱降于李自成自成將至大同廵撫衛景瑗字仲玉韓城人不知瓖已降賊歃血要與共守瓖訛言謂廵撫秦人將應賊代州王果疑之不與相見及自成至瓖開門迎降自成殺代王傳㸄簡王桂十世孫宗室殆盡景瑗被執自成欲官之景瑗㨿地以頭觸階石血淋漓尋自縊死賊嘆為忠臣而去分廵副使朱家任盡驅妻妾子女入井而已從之一家死者十六人督儲郎中徐有聲山隂知縣李倬亦死之人朱家仕河州人徐有聲金壇李倬陜西人至宣府杜勲蟒玉鳴騶郊迎三十里外廵撫朱之馮字樂三大興人登城誓守將士皆散走嘿無應者之馮撫膺嘆曰不意人心至此俄賊入城之馮南向叩頭縊死城樓下同時死難者督粮通判朱敏泰諸生姚時中投繯死副將寗龍駡賊死繫獄總兵宫董用文副將劉元卿及里居知縣申以孝並不屈死其他婦女死義者十餘人蔣徳璟罷李建泰自保定疏請南遷帝召廷臣于平臺諭曰國君死社稷朕將焉往徳璟與少詹事項煜請命太子往江南帝不答給事中光時亨追論練餉之害徳璟擬㫖有向來小人倡為練餉致民窮禍結等語帝不悦責其朋比罷之徳璟移寓外城無何都城陷得逸去而李建泰在保定賊亦尋至其部下為賊内應城遂陷知府何復同知邵宗元御史金毓峒及中官方正化郷官張羅俊等皆不屈死建泰竟降賊封總兵官吳三桂唐通左良玉黄得功俱為伯李自成犯居庸守將唐通太監杜之秩以闗降通先以兵入衛命與杜之秩同守居庸已而自成至通與之秩俱降賊遂入闗陷昌平焚十二陵總兵官李守鑅力戰死始自成欲知京師虗實往往遣其徒輦重貲賈販都市又令充部院掾吏探刺機密朝廷有謀議千里立馳報及是昌平已陷兵部發騎偵探輒被勾去無一還者賊遊騎至平則門都人猶未知也帝召問羣臣莫對有泣者頃之賊環攻九門門外先設三大營賊至悉降守陴者寥寥益以内侍内侍專守城事百司皆不敢問丙午十八日自成設座彰儀門外降賊太監杜勲侍呼城上人請入城見帝監視太監曹化淳等縋之入内勲盛稱賊勢請帝自為計帝怒叱之出手書親征詔召駙馬都尉鞏永固字洪圖宛平人尚光宗女樂安公主以家丁䕶太子南行永固叩頭曰親臣不藏甲臣安敢有家丁相向涕泣而已京師陷帝崩于煤山杜勲既叱出曹化淳等復縋之下城勲顧謂曰吾輩富貴固在也及日晡化淳遂啓彰儀門賊盡入帝出宫登煤山望見烽火徹天嘆息曰苦我民耳徘徊久之還宫命分送太子永定二王于周奎田宏遇陜西人田貴妃父時貴妃已卒第以劒斫長平公主嘆曰汝何故生我家太子投奎家不得入匿侍奄外舎後為奄獻于自成永定二王亦被執皆不屈自成羈之宫中尋封太子為宋王挾之西去不知所終長平公主絶而復甦至本朝順治二年命前所選駙馬周顯復尚故主土田邱第賜予有加主涕泣逾年病卒趣皇后自盡后即承㫖自經又斫殺妃嬪數人翌日昧爽内城亦陷鳴鍾集百官無至者帝乃復登煤山書衣襟為遺詔曰朕凉徳藐躬上干天咎致逆賊直逼京師皆諸臣誤朕朕死無面目見祖宗自去冠冕以髪覆面任賊分裂無傷百姓一人以帛自縊于山亭遂崩太監王承恩縊于側李自成氊笠縹衣乘烏駁馬入承天門偽丞相牛金星尚書宋企郊乾州人以吏部員外郎家居降賊等騎而從登皇極殿下令大索帝后期百官三日朝見已知帝后崩自成命以宫扉載出盛桞棺置東華門外百姓過者皆掩泣尋遷殯昌平州州之士民率錢募夫葬之田妃墓内靳蓬藋而封之一切簡率田妃墓在鹿馬山妃前率葬此時羣臣殉難者文臣則大學士范景文景文趨至宫門遇宮人曰駕出矣復趨朝房賊已塞道從者請易服還邸景文曰駕出安歸赴雙塔寺旁古井死其妾聞之即自經死忠本朝賜諡文尚書倪元璐元璐聞難北向拜父南向拜母自縊而絶一門殉節者十三人正本朝賜諡文左都御史李邦華邦華走文丞相祠北向再拜三揖信國作絶命詞自經此本朝賜諡忠肅協理京營兵部右侍郎王家彦城陷家彦向闕叩頭投城下不死緼于民舎而絶本朝賜諡忠穀家彦字聞美莆田人刑部右侍郎孟兆祥兆祥奉命守正陽門賊至自縊門下子進士章明亦縊死兆祥妻吕氏章明妻王氏亦同日並縊字本朝賜兆祥諡忠靖章明諡貞孝兆祥允吉交河人左副都御史施邦曜邦曜閏城陷自縊僕觧之復蘇邦曜叱曰若知大義母阻我死遂仰藥而絶本朝賜諡忠愍人邦曜字爾韜餘姚大理寺卿凌義渠義渠聞難以首觸柱流血被面乃取平生所閲書盡焚之曰無被賊手汙也服緋正笏向拜後南向稽首作書辭父闔户自經本朝賜諡忠介人義渠字騣甫烏程太常少卿吳麟徴麟徴奉命守西直門賊詐為勤王兵請入中官欲納之麟徴不可以土石塞其門募死士縋城襲擊多所斬獲及城陷入道旁祠作書訣家人自經死主本朝賜諡忠肅麟徵字聖海鹽人右庶子周鳯翔都城陷或有傳帝南幸者鳯翔趨入朝見魏藻徳陳演等羣入而自成方據御座鳯翔至殿前大哭急從左掖門出賊亦不問歸至邸作書辭二親題詩壁間自經死本朝賜諡文忠鳯翔字儀伯山隂人左諭徳馬世竒城陷世奇方早食投筯起帝安在或言已出城明日知帝崩東宫二王被執作書别母肅衣冠捧所署司經局印望闕再拜自經妾李氏朱氏並先縊死本朝賜諡文肅左中允劉理順城陷理順與妻萬氏妾李氏子孝亷并婢僕十八人闔門縊死羣盜多中州人聞其死入唁曰此吾鄉之劉狀元也居鄉多厚徳何遽死羅拜號泣而去本朝賜諡文烈理順字復禮把縣人檢討汪偉京城陷偉語繼妻耿氏善撫幼子耿泣日我獨不能從公死乎因以幼子屬其弟衣新衣上下縫引刀自到不死復投繯而絶偉欣然曰是成吾志移其屍于堂援筆書于壁曰日講官翰林院撿討汪偉同繼妻耿氏死節處乃自經本朝賜諡文毅偉字叔度休寧人太僕寺丞申佳允佳允出近畿閲馬聞李自成破居庸關流涕曰京師必不守矣疾馳入都貽子涵光書曰吾受國恩當以死報城陷冠帯辭母䇿馬至王恭厰將投井從者持之下馬旁見灌畦巨井急躍入僕號呼欲出之佳允亦呼曰告太安人有子作忠臣勿過傷也遂死本朝賜諡端愍佳允字孔嘉永年人給事中呉甘來甘來聞變疾走皇城不得入返作絶命詞盡取疏草焚之曰賊寇縱横徒持議論無益毫末留之罪彌大正衣冠北向拜投繯死本朝賜諡莊介甘來字受和江西新昌人御史王章章與給事中光時亨守阜成門賊入城時亨要章走俄賊突至疾呼下馬時亨倉皇下跪乞降章罵賊不顧賊攢槊刺死本朝賜諡節愍章字漢臣武進人陳良謨良謨母老已求有子而妾時氏方乃謂之曰吾且死汝幸妊身急歸父母家時泣曰公殉國妾不當殉公耶倘不幸有他不如無子良謨曰能如是乎時乃先就縊既死良謨整衣冠望拜亦自縊本朝賜諡恭㓗良謨字士亮鄞人時氏京師人陳純徳奉命督學畿輔因賊警還都及城陷慟哭作書别父母遂自經福王時諡恭節純徳字靜生零陵人趙譔廵視中城城陷罵賊被殺兵部郎中成徳徳聞帝崩慟哭持雞酒奔奠梓宫前觸地流血賊露刃脅之不為動奠畢歸家有妹年二十餘因家難未嫁徳顧之曰我死汝何依妹請先死徳稱善哭而視其縊繼室霍氏請繼之徳痛不及視入别其母哭盡哀出而自縊母見子女及子婦皆死亦投繯死闔門死難本朝賜諡恭愍徳字元升霍州人郎中周之茂需次都下賊搜得之不屈被害之茂字松如黄麻人吏部員外郎許直直聞帝崩一慟幾絶客以七十老父為觧直曰不死辱及所生乃作書寄父賦絶命詩六章闔户自經死如本朝賜諡忠愍直字魯若臯人兵部員外郎金鉉鉉廵視皇城京師陷慟哭急趨入朝見宫人狂奔出知帝已崩觧牙牌北向四拜投金水河從者力挽之鉉怒奮臂躍入死母章妻王弟錝並同日死之本朝賜諡忠㓗鉉字伯玉武進人占籍順天大興員外郎寗丞烈管太倉銀庫城陷自經于官廨丞烈字飬純大興人中書宋天顯被執自經亭天顯松江茟人光禄寺署丞于騰雲賊至語其妻曰我為朝臣汝亦命婦不可賊夫婦並衣命服從容自縊騰雲順天人兵馬司指揮姚成城陷自經餘成字孝成姚人知州馬象乾居京師賊入率妻及子女五人並縊凡數十人又布衣湯文瓊者慟哭自殺書其衣曰位非文丞相之位心則文丞相之心賊徒見者皆歎其忠勲戚則宣城伯衛時春時春掌後府京師陷懷鐵劵闔門十七人皆赴井死時春穎六世孫惠安伯張慶臻都城陷慶臻召親黨盡散貲財闔門自焚死福王時諡忠武新城侯王國興城陷自焚死弟國興熹宗母孝和太后昇之子新樂侯劉文炳文炳以孝純皇太后弟子嗣封侯太后帝生母也文炳素與太學生申湛然布衣黄尼麓講明忠義賊攻西直門勢益急尼麓踉蹌告文炳宜自為計時太后母瀛國太夫人尚在文炳與其母杜氏計太夫人篤老不可俱燼請匿之湛然家杜氏曰太夫人得所我與若妻妹俱死耳外城陷文炳馳至崇文門殺賊數十人馳歸第母妻及其妹已俱縊死家人共焚樓火烈不得入至後園與叔繼祖俱投井死弟文耀守外城城破奔還覔文炳死所大書牌井旁曰左都督劉文耀同兄文炳畢命報國處亦投井死闔門死者四十二人而湛然以匿瀛國太夫人為賊栲掠終不言體糜爛以死劉文炳字湛筠宛平人申湛然黄尼麓亦俱宛平人駙馬都尉鞏永固都城陷時公主已毫未葬永固以黄繩縳子女五人繫柩旁曰此帝甥不可汙賊手舉劒自刎闔室焚死福王時諡貞愍及錦衣衛指揮同知李若珪賊陷作絶命詞自縊死千户高文采一家十七人皆自殺等皆同時死宫人魏氏臨御河大呼曰有志者當自為計遂投河死頃刻間從死者一二百人又有宫人費氏者自投眢井中賊鈎出見其姿容爭奪之費紿曰我長公主也羣賊不敢過擁見自成自成命中官審視非是以賞部將羅某費復紿羅曰我天潢義難苟合將軍宜擇吉成禮羅喜置酒極歡費懷利刀俟羅醉斷其喉立死因自詫曰我一弱女子殺一賊帥足矣遂自刎自成聞大驚令收葬之越三日己酉昩爽成國公朱純臣能七世孫大學士魏藻徳陳演等率百官入賀演首勸進自成不許大改官制六部曰六政府司官曰從事六科曰諫議十三道曰直指使翰林院曰𢎞文館廵撫曰節度使其餘改者甚多召見朝官以大僚多誤國概囚繫之庶官則或用或否用者下吏政府銓除不用者榜掠取貲繫純臣藻徳演及諸勲戚大臣等悉付劉宗敏營藻徳與馬世竒家人泣曰我不能為若主人求死不得矣拷掠責賕賂至灼肉折脛備諸慘毒金足輒殺之是時畿内府州縣俱降山東河南亦多附自成謂真得天命令牛金星等撰登極儀諏吉日及自成升座忽若有神人擊之者座下龍𤓰鬛俱動自成恐亟下鑄金璽及永昌錢皆不就聞山海闗吳三桂兵起益大沮喪謀歸西安夏四月我大清兵破李自成于山海闗自成奔還京師僭號于武英殿遂奔山西初吳三桂奉詔入援至山海闗聞京師陷猶豫不進自成執其父襄令作書招之三桂欲降至灤州聞愛姬陳沅被劉宗敏掠去憤甚疾歸山海襲破賊将自成怒部親賊十餘萬執吴㐮于軍東攻山海闗以别将從一片石關名在永平府撫寕縣東北越闗外三桂懼乞降于我大清求共討賊時統兵睿親王師次翁後得三桂書即遣使報之大略言聞明崇禎帝滅于流賊不勝髪指故率仁義之師沉舟破釡誓不返旌期必滅賊出民水火伯遣使致書深為喜悦若率衆來歸必封以故土晉為藩王國讐可報身家可保三桂復請速進兵遂疾馳至沙河三桂報賊已出邊立寨柵大軍迎擊之敗賊將唐通于一片石至山海關三桂開關出迎我大清令三桂兵繫白布為識使之先驅遂入關時賊衆皆多厯戰陳殊剽悍陣于關内自北山亘海大軍布陣不能横及海岸乃令軍士鱗次布列對賊陣尾伺其氣衰奮擊之且戒勿越伍躁進違節制陣既列三桂居右翼之末先悉其衆博戰賊力鬬圍開復合戰良久大軍從三桂陣右突出衝賊中堅萬馬奔騰飛矢雨墮天大風沙石飛走撃賊如雹自成方登高岡觀戰知為大清兵急䇿馬下岡走賊衆大潰自相殘踏死者無算僵屍遍野溝水盡赤自成奔永平大軍追之三桂先驅至永平自成殺吳襄走還京師時牛金星居守諸降人往謁執門生禮甚恭金星曰訛言方起諸軍宜簡出由是降者始懼多竄伏矣乃悉鎔所拷索金及宫中帑藏器皿鑄為餅毎餅千金約數萬餅騾車載歸西安二十九日僭帝號于武英殿追尊七代皆為帝后立妻高氏為皇后自成被冠冕列仗受朝金星代行郊天禮是夕焚宫殿及九門城樓詰旦挾太子二王西走而使偽將軍左光先谷可成為後衛自成勒諸璫悉取其金玉珠寳及出宫令羣賊各執守城白楊杖逐之不分貴賤皆號泣徒跣敗靣流血走出京城門外五月大軍定京師自成既西奔我大軍所至諭以定亂安民共享太平之意百姓竄匿山谷者悉還鄉里迎降恐後遂整兵入京城故明諸臣迎于五里外下令安輯百姓民間安堵如故命以禮改𦵏崇禎帝后建碑亭殿廡悉如典制並𦵏帝妃袁氏兩公主及熹宗后張氏神宗妃劉氏皆如禮令臣民服䘮三日尋議加諡曰荘烈愍皇帝陵曰思陵明史賛曰帝承神熹之後慨然有為沉機獨斷刈除奸逆天下想望治平惜乎大勢已傾積習難挽在廷則門户紏紛疆塲則将驕卒惰兵荒四告流冦蔓延遂至潰爛而莫可救可謂不幸也已然在位十有七年不邇聲色憂勤惕厲殫心治理而用非其人益以憤事乃復信任宦官布列要地舉措失當制置乖方祚訖運移身罹禍變豈非氣數使然哉迨至大命有歸妖氛盡掃而帝徳加諡建陵典禮優厚是則聖朝盛徳度越千古亦可以知帝之䝉難而不辱其身為亡國之義烈矣明兵部尚書史可法等奉福王由崧神宗孫福恭王常洵長子初封徳昌王崇禎十六年嗣封福王監國于南京北都既陷荘烈帝殉社稷四月己巳報至南京人心惶懼時參贊機務兵部尚書史可法方督師勤王在浦口諸大臣議立君而福王由崧與潞王常淓穆宗孫潞簡王翊鏐之子俱以避賊至淮安倫序當屬福王諸臣慮福王立或追怨妖書及梃擊移宫等案潞王立則無後患且可邀功隂主之者廢籍禮部侍郎錢謙益及郎中周鑣字仲馭金壇人僉事雷縯祚注見前力持其議者兵部侍郎吕大器字儼若遂寧人而右都御史張慎言字金銘陽城人詹事姜曰廣字居之新建人皆然之移牒可法大略言福王倫序當立而有七不可貪淫酗酒不孝下不讀書干預有司也潞王神宗之姪賢明當立可法遂還南京而鳯陽總督馬士英利福王昏庸欲立之密與操江誠意伯劉孔昭基之十二世孫總兵高傑劉澤清黄得功劉良佐等結而致書于可法可法意未决甲申守備南京魏國公徐𢎞基逹之十世孫等户部尚書高𢎞圖字研文膠州人等南京守備太監韓贊周等集議于朝大器署禮兵二部印不肯下筆吏科給事中李沾松冮革亭人厲聲言今日冇異議者死之孔昭亦面斥大器而士英握兵于外與諸將送福王至儀真連營江北勢甚張可法不得已福王名告廟時文武官俱集内官宅韓贊周令各署名籍姜曰廣曰無悤遽請祭告奉先殿而後行明日至奉先殿諸勲臣語侵史可法曰廣呵之于是羣小咸月懾曰廣焉乙酉迎王于江浦丁亥百官迎見于龍江闗在江寕縣西儀鳯門外王素服角帯哭五月戊子朔王謁孝陵奉先殿出居内守備府羣臣入朝王色赧欲避可法曰王母避宜正受既朝議戰守可法曰王宜素服郊次發師北征示天下以必報讐之義王唯唯明日再朝出議監國事張慎言曰國虚無人可遂即大位可法曰太子存亡未卜倘南來若何劉孔昭曰今日既定誰敢復更可法曰徐之乃退又明日王監國明福王以史可法高𢎞圖姜曰廣王鐸孟津人竝為東閣大學士入閣辦事馬士英為東閣大學士仍總督鳯陽等處軍務時廷推閣臣劉孔昭攘臂欲並列衆以勲臣無入閣例遏之孔昭勃然曰即我不可馬士英何不可乃并推士英又議起廢競舉鄭三俊劉宗周徐石麒孔昭舉阮大鋮可法曰先帝欽定逆案母復言越二日拜可法𢎞圖士英竝為大學士可法仍掌兵部事士英仍督師鳯陽姜曰廣先以曽有異議不用及再推詞臣乃以曰廣及王鐸等名上遂與鐸並命又以張慎言為吏部尚書起劉宗周為左都御史宗周聞京師陷方召募義旅討賊未發而福王立遂起故官徐石麒為右都御史尋改吏部尚書兵部尚書張國維以原官回部協理京營戎政莊烈帝令國維赴冮浙督餉出都十日而城陷至是召還餘皆遷擢有差明福王稱帝于南京以史可法督師江北召馬士英入閣辦事史可法定京營制如北都故事侍衛及錦衣衛諸軍悉入伍操練錦衣東西兩司房及南北兩鎮撫司官不備設以杜告密安人心時馬士英旦夕冀入相及督師鳳陽命下大怒以可法所與士英七不可書奏之王且令髙傑等疏趣可法視師而自擁兵入覲拜表即行可法遂請出師督鎮淮揚王命以便宜行事各鎮並聽節制十五日壬寅王稱帝于南京癸丑士英即入閣佐理仍掌兵部尚書事乙巳可法陛辭請以總兵劉肇基字鼎維遼東人于永綬李棲鳯卜從善金聲桓字虎夫東衛人等隨征從之可法啟行即遣使訪崇禎帝后梓宫及太子二王所在復奉命祭告泗鳯二陵祭畢上疏言鳯泗境中今蓬厲蒿滿目陛下見之當益悲憤願慎終如始戰兢惕無時怠二祖列宗必黙祐中興若不思逺畧威斷不靈東南一隅未可保也王嘉答之時李自成棄京師西走青州諸郡縣並殺偽官據城自保未知南都擁立事可法請頒監國登極二詔慰山東河北軍民心開禮賢館招四方才智下僚有才被棄者亦悉舉任用之以監紀推官應廷吉領其事幕府稱得人明分淮揚鳯廬為四鎮以黄得功劉良佐劉澤清髙傑領之時議分江北為四鎮劉澤清轄淮海駐淮北經理山東一路髙傑轄徐泗駐泗水經理開歸一路劉良佐轄鳯夀駐臨淮經理陳把一路黄得功轄滁和駐廬州經理光固一路仍進得功靖南侯封傑興平伯澤清東平伯良佐廣昌伯時得功澤清傑爭欲駐揚州傑先至固欲入城揚州民畏傑不納傑攻城急日掠村廂婦女民益惡之知府馬鳴騄褒城人推官湯來賀南豊人堅守月餘進士鄭元勲家城中身詣傑營責以大義傑頗感悟為欽兵五里外城西北得暫啟門以進薪而守城者負約數以矢石中傑兵傑兵復進揚人兢以元勲通傑遂遇害鄭元勲歙縣人傑知不可攻意稍怠而澤清亦大掠淮上臨淮不納良左軍亦被攻王命可法往解得功良佐澤清皆聽命乃詣傑營傑憚可法夜掘坎十百埋骸骨旦日謁可法帳中詞色俱變汗浹背可法坦懐待之接偏禆以温語傑大喜過望然傑亦自是易可法用已甲士防衛文檄必取視而後行可法夷然為具疏屯其衆于𤓰州傑又大喜可法乃開府揚州職方主事萬元吉請奉詔宣諭四鎮且發萬金犒髙傑令保江淮乃渡江詣将營約共奬王室諸将嫌漸解廷議以元吉能輯諸鎮擢太僕少卿監視江北軍務明進封左良玉為寧南侯先是荘烈帝詔封良玉寧南伯許功成世守武昌命給事中左懋第字蘿石萊陽人便道督戰事在是年正月良玉乃條日月進兵狀以聞疏入未奉㫖而京師陷福王立詔至其部下有異議不欲開讀廵撫何騰蛟字雲従黎平衛人急至良玉所爭之而良玉以從正紀良玉所置官名盧鼎言開讀如禮諸将尚洶洶欲引兵東下良玉慟哭不許盡出所蔵金銀綵物散之諸将曰此皆先帝賜也受國厚恩禍變至此良玉何心獨有之乎于是諸将噭然皆哭副将馬士秀奮曰有不奉公令復言東下者吾擊之以巨艦置礮斷江衆乃定㑹王命進良玉爵為侯廕一子錦衣千户以上流之事專委良玉制書到楚而良玉賀表亦至時李自成敗于闗門良玉得以其間稍復楚西境之荆州德安承天而騰蛟及總督袁繼咸字季通宜春人居江西皆與良玉善南都倚為屏蔽良玉兵八十萬號百萬前五營為親軍後五营為降軍每春秋肄兵武昌諸山一山幟一色山谷為滿軍法用兩人夾馬馳曰過對馬足動地殷如雷聲聞數里諸鎮兵惟髙傑最强不及良玉逺甚然良玉自朱仙鎮之敗精鋭畧盡其後歸者皆烏合軍容雖壮法令不復相攝而是時良玉亦老且病無出兵之意矣明分置應天蘇松巡撫以左懋第為應天安徽巡撫祁彪佳字宏吉浙江山陰人為蘇松巡撫時蘇州諸生檄討其鄉官從賊者奸民和之少詹事項煜及大理寺正錢位坤通政司參議宋學顯吳縣人禮部員外郎湯有慶長洲人之家皆被焚刦常熟又焚給事中時敏家彪佳請議從逆諸臣罪而治焚掠之徒以加等從之時高傑駐𤓰洲跋扈甚彪佳尅期往㑹至期風大作傑意彪佳必無來彪佳擕數卒衝風渡傑大駭異盡撤兵衛㑹彪佳于大觀樓彪佳披肝膈勉以忠義共奬王室傑感泣曰傑人多矣如公傑甘為死公一日在吳傑一日遵公約矣共飯而别明以忻城伯趙之龍永樂功臣彝八世孫總督京營戎政明淮揚巡撫路振飛字見白曲周人擊賊黨董學禮于宿遷走之先是流賊陷山西振飛遣將十七人分道防河由徐泗宿遷至安東沭陽且團練鄉兵犒以牛酒得兩淮間勁卒數萬至是河南副使吕弼周鄒平人為賊節度使進逼淮上武愫涇陽人為賊防禦使招撫徐沛軍而賊所遣偽制將軍董學禮等據宿遷振飛擊擒弼周愫走學禮竿弼周法場命軍士人射三矢乃解磔之縳愫徇諸市鞭八十檻車送南京誅之㑹馬士英欲用所親田仰廬陵人為淮揚廵撫乃罷振飛振飛亦遭母䘮無家可歸遂流寓蘇州振飛在淮安與廵按御史王燮頗號召義士同心戮力自振飛既去王燮亦陞右僉都御史巡撫山東而劉澤清來居淮城福自擅散遣義士其桀驁者籍之部下刦掠村落一空又大興土木造宅壯僭擬皇居與田仰日肆歡飲士民憤怨時山東郡縣已歸我大清王燮亦不能往但逡巡河上而已六月明追上崇禎帝后諡號命諡崇禎帝曰烈皇帝廟號思宗趙之龍欲傾高𢎞圖以思非美諡上疏糾駁尋改曰毅宗周后曰孝節皇后又追諡其祖母鄭貴妃曰孝寧太后考福恭王曰恭皇帝尋改諡孝皇帝尊其墓曰熙陵别立專廟上嫡母鄒氏尊號曰恪貞仁壽皇太后時太僕少卿萬元吉請修建文實錄復其尊稱并還懿文追尊故號把之寢園以建文既而速褒靖難死事諸臣以作忠義之氣命從之乃追復懿文太子廟號追諡建文帝曰惠宗譲皇帝復封其弟允熥等為王并上景帝廟號曰代宗改諡孝宗張后曰孝成皇后方孝孺等皆為贈謚立祠又聞崇禎太子及永定二王皆為李自成所害乃追諡太子曰獻愍定王曰哀永王曰悼明召阮大鋮陛見大鋮名掛逆案失職久廢崇禎末以避流賊居南京頗招納遊俠為談兵説劒覬以邉才召無錫顧杲吴縣楊廷樞等皆復社中名士方聚講南京惡大鋮甚作留都防亂掲逐之大鋮懼乃閉門謝客獨與馬士英深相結福王既立士英秉政招權罔利日事報復時高𢎞圖姜曰廣張慎言等皆以宿徳在位將以次引海内人望而士英必欲起大鋮因薦大鋮知兵初大鋮在南京與守備太監韓贊周暱及北都既陷中官悉南奔大鋮因贊周遍結之為羣奄言東林當日所以危貴妃福王者以潛傾史可法等羣奄更極口稱大鋮才士英亦言大鋮從山中致書與定䇿謀為白其附璫贊導無實跡遂命大鋮冠帶陛見大鋮乃上守江䇿陳三要兩合十四隙疏并自白孤忠被陷痛詆孫慎行魏大中左光斗且指大中為大逆于是大學士姜曰廣侍郎吕大器懷逺侯常延齡開平王遇春十一世孫等並言大鋮逆案巨魁不可召給事中羅萬象應天府丞郭維經字六修江西龍泉人大理寺丞詹兆恒字月如廣信永豐人亦各言逆案不可翻兆恒疏畧言先皇手定逆案芟刈羣凶第一美政今者大讐未報乃怱召大鋮還之冠帶豈不上傷先帝靈下短忠義氣哉疏奏命取逆案進覽兆恒卽上進而士英亦以是日進三朝要典乃切責萬象等𢎞圖復請下九卿㑹議亦不聽明吏部尚書張慎言罷時大起廢籍慎言薦前大學士吳甡前尚書鄭三俊王命召甡陛見一日朝罷誠意伯劉孔昭忻城伯趙之龍羣詬于廷指慎言及甡為奸邪叱咤徹殿陛給事中羅萬象言慎言平生具在甡素有清望安得指為奸邪孔昭等伏地痛哭謂慎言舉用文臣不及武臣囂爭不已孔昭至欲手刃慎言韓贊周呵之乃止既退又疏劾慎言極詆三俊且謂慎言當迎立時阻難懷二心乞寢甡陛見命且議慎言欺蔽罪慎言疏辨因乞休時兩解之萬象又言首膺封爵者四鎮也新改京營又加二鎮銜何嘗不用武年來封疆之法先帝多寛武臣武臣報先帝者安在祖制以票擬歸閣臣參駁歸言官不聞委勲臣以糾劾也使勲臣得兼糾劾文臣可勝逐哉史可法奏慎言疏薦無不當諸臣痛哭喧呼滅絶法紀恐驕弁悍卒益輕朝廷御史王孫蕃言用人吏部職掌奈何廷辱冡宰𢎞圖等亦以不能戢和文武各疏請罷俱不允而吳甡亦竟不復召慎言乃再疏乞休遂許其請且諭之曰晉疆未復卿已無家可歸沿途僑寓需召慎言遂流寓蕪湖宣城間至國亡後疽發于背戒勿藥卒明總兵劉澤清入朝于南京吏部侍郎吕大器罷先是諸臣議擁立時大器主錢謙益雷縯祚言欲立潞王事具前及馬士英等推戴福王因遷大器吏部左侍郎大器以異議絀自危乃上疏劾士英言其擁兵入朝靦留政地翻先皇手定逆案欲躋阮大鋮中樞其子以銅臭為都督女弟夫未履行陣授總戎婣婭越其杰田仰楊文驄字龍友貴陽人先朝罪人盡登膴仕亂名器夫吳甡鄭三俊臣不謂無一事失而端方諒直終為海内正人之歸士英大鋮臣不謂無一技長而奸回邪慝終為社稷無窮之禍至是澤清入朝疏糾大器縯祚懐異圖面薦逆案張㨗丹陽人鄒之麟武進人張孫振霍山人等時武臣名占分地賊入不以上供恣其所用置封疆兵事一切不問與廷臣互分黨援干預朝政擠排異已奏牘紛如紀綱盡裂而澤清所言尤狂悖擁立之初即援靖故事請以五月改元又請宥故輔周延儒助餉贓銀又請禁巡按不得拏訪追贓請法司嚴緝故總督候恂及其子方域時皆曲意從之及是入朝復阿士英指力糾大器等侯方域字朝宗大器遂乞休去以手書監國告廟文送内閣明無他士英憾未巳令太常少卿李沾劾之遂削大器籍復命法司逮治之尋以蜀地盡失無可蹤跡而止大器既去沾得超擢左都御史而謙益亦以附士英大鋮得為禮部尚書協理詹事府事明鎮江軍亂時史可法部將于永綬等四人駐京口浙江入衛都司黄之奎亦部水陸兵四千戍其地之奎御軍嚴四將兵恣横刃傷民浙兵縳而投之江遂有隙已而守備李大開統浙兵斫鎮兵馬鎮兵與相擊遂有隙射殺大開亂兵大焚掠死者四百人㑹巡撫祁彪佳至永綬等遁去彪佳劾治四將罪賙䘏被難家民大悦前給事中熊汝霖赴召途中上言臣自丹陽來知浙兵為邉兵所擊火民居十餘里邉帥有言四鎮以殺掠獲封賞我何憚不為臣意四鎮必毅然北征一雪此恥今戀戀淮揚何也况一鎮之餉多至六十萬勢必不能供即倣古藩鎮法亦當在大河以北開屯設府曾與窔之内而遽以藩籬視之疏奏不省熊汝霖字而殷餘姚人明馬士英乞罷慰留之士英當國畏東林倚左良玉為難謾語修好而陰忌之良玉不自安屬承天守備太監何志孔廵按御史黄澍入賀陰伺朝廷動靜澍挾良玉勢當陛見靣數士英奸貪不法且言嘗受張獻忠偽官周文江麻城人重賄為題授參將罪當斬志孔亦論士英罔上行私諸罪司禮太監韓贊周叱志孔退士英跪乞處分澍舉笏直擊其背曰願與奸臣同死士英大號呼贊周即執志孔候命時有内諭贊周欲令士英引避士英佯引疾請罷而賂福邸舊奄田成張執中等泣愬曰上非馬公不得立逐馬公天下將議上背恩矣且馬公去誰念上者明日即慰留士英士英亦畏良玉請釋志孔而命澍速還湖廣未幾復以他事奪澍官故都督掌錦衣衛劉僑者嘗遣戍由周文江賄張獻忠受偽命為錦衣指揮使及良玉復蘄黄僑削髪逃去澍持之急而士英納僑賄令訐澍遂復僑官削澍職尋以朱盛濃楚府中尉言逮澍良玉留澍不遣良玉令部將羣譁欲下南京索餉因保救澍袁繼咸亦為上疏代澍申理士英不得已乃免逮澍遂匿良玉軍中良玉與士英由此有隙明封福府千戸常應俊為襄衛伯應俊本革工福王值宼出亡時應俊嘗負行以免于難王初立即授左都督至是封襄衛伯世襲太監韓贊周盧九徳及福府内臣屈尚忠田成張執中等亦以翊戴功各廕其弟姪有差明命魯王以海魯荒王檀之九世孫居處州時山東殘破以海棄藩南奔泊舟京口命暫駐處州明年南京破兵部尚書張國維等迎以海居于紹興號魯監國順治三年六月大兵克紹興以海遁入海國維及禮部尚書余煌侍郎陳函輝等皆死六年吏部尚書張肯堂復迎以海居舟山八年大兵襲舟山以海復航海肯堂自經死鄭成功奉以海居金門禮待頗恭既而懈以海不能平將往南溪成功使人沉之海中時順治十一年也堂余煌字武貞㑹稽人陳函輝字本叔臨海人張肯字載寧松江華亭人鄭成功芝龍子南澳在廣東潮州府饒平縣東南海中中有三澳延袤三百里為閩粤門户今設南澳鎮總兵駐此按國維諡忠敏張肯堂諡忠誠俱本朝賜秋七月明遣兵部侍郎左懋第等求成于我大清我大清兵連破李自成河北郡縣亦相繼歸附時議遣使通好而難其人懋第母陳殁于燕欲因是返匶葬請行乃拜懋第兵部右侍郎兼右僉都御史與左都督陳洪範太僕少卿馬紹愉偕而令懋第經理河北聨絡闗東諸軍務馬紹愉者故兵部郎官也嘗為陳新甲通使事見前新甲既誅紹愉以督戰致衂為懋第劾罷及是紹愉已起官郎中乃進為少卿副懋第懋第請罷紹愉勿遣畧言臣此行致祭先帝后梓宫訪東宫二王蹤跡臣既充使勢不能兼理封疆且紹愉臣所劾罷不當復與臣共事必用臣經理則乞命洪範同紹愉出使而假臣一旅偕山東撫臣收拾山東以待不敢復言北行如用臣與洪範北行則去臣經理但銜命而往而勿遣紹愉閣部議止紹愉改遣原任薊督王永吉高郵州人命仍遵前諭懋第瀕行言臣此行死生未卜請以辭闕之身效一言願陛下以先帝讐恥為心瞻高皇之弓劍則思成祖列祖之陵寢何存撫江上之殘黎則念河北山東之赤子誰䘏更望時時整頓士馬必能渡河而戰始能扼河而守必能扼河而守始能畫江而安衆韙其言時令齎白金十萬兩幣帛數萬匹以兵三千人䕶行命王永吉時以永吉總督山東軍務暫駐河上料理戰守候北使回時史可法鋭意進兵河南以懋第等方行兵不宜繼進諭止之懋第等以十月朔至張家灣我大清令以百人從行入都館之鴻臚寺懋第請祭告諸陵及崇禎帝不許乃陳太牢旅所哭而奠之旋以是月二十八日遣還出都陳洪範于途次陳密啓請身往江南招諸將劉澤清等降附而留懋第等勿遣于是自滄州追還懋第改館太醫院而縱洪範南歸至明年五月南京破懋第聞之慟哭其從弟懋泰先為吏部郎降賊後歸我大清授官矣來謁懋第曰此非吾弟也叱出之尋與從行兵部司務陳用極游擊王一斌部司張良佐劉統王廷佐俱死之惟馬紹愉降按左懋第本朝賜諡忠貞李自成遁歸西安初自成西走至定州我大清兵追敗之斬賊黨谷可成自成西走真定益悉衆迎戰大兵復擊之賊不能支漸却自成中流矢創甚西踰故闗入山西㑹大兵東返自成乃得鳩合潰散走平陽以讒殺其黨李巖巖故勸自成以不殺收人心及陷京師保䕶懿安皇后令自盡又獨于士大夫無所拷掠牛金星等大忌之定州之敗河南州縣多殺偽官自保巖請率兵往金星隂告自成曰巖雄武有大略非能久下人者河南巖故鄉假以大兵必不可制因譖其欲反自成令金星與巖飲殺之賊衆俱解體至是自成復遁歸西安遣别賊陷漢中降總兵趙光遠進略保寧張獻忠以兵拒之乃還自成既屢敗益強狠自用偽尚書張第元耿始然皆以小忤死製銅鏌官吏坐賕即鏌斬民盜一雞者死西人大警懼張第元汾陽人耿始然猗氏人明以張有譽江陰人為户部尚書内批特用户部侍郎張有譽為尚書高𢎞圖封還力諫不聼葢有譽素有清望馬士英欲借以開傳陞倖門為阮大鋮地也未幾又以張㨗為吏部侍郎㨗因薦逆案吕純如得罪公論士英方欲用大鋮故亦以中㫖起之明釋高墻罪宗為庻人前唐王聿鍵等三百餘人俱釋為庻人禮臣請復聿鍵王爵不許尋命徙居廣西平樂府明年南京破聿鍵方行次杭川遇總兵鄭鴻逵户部主事蘇觀生奉之入閩總兵鄭芝龍廵撫都御史張肯堂與禮部尚書黄道周等定議奉聿鍵監國閏六月遂自立于福州號隆武改福州為天興府進芝龍鴻逵為侯觀生道周俱大學士餘拜官有差時權在鄭氏聿鍵不能有所為屢促芝龍出兵以餉絀辭竟不行道周請自往江西圖恢復以七月啓行由廣信出衢州進至婺源遇大清兵戰敗執至江寕不屈死于是侍郎楊廷麟等請聿鍵出江右總督何騰蛟請出湖南原任知州金堡言騰蛟可恃芝龍不可恃宜棄閩就楚聿鍵從之十二月自福州起行至建寕明年二月至延平六月大清兵克紹興閩中大震鄭芝龍航海去仙霞嶺空無一人七月大兵抵閩關守蒲城御史鄭為虹給事中黄大鵬延平知府王士和死進克興化副使知府事劉永祚仰藥死八月聿鍵出走數日方至汀州大兵繼至從官奔散與妃曾氏俱就執妃至九瀧投于水聿鍵死于福州給事中熊緯尚書曹學佺通政使馬思禮等俱死時順治三年也江蘇觀生字宇霖東莞人金堡仁和人仙霞嶺在浙衢州府江山縣南福建建寧府浦城縣北即古泉山之嶺為浙通鄭為虹字天玉江都人黄大鵬字文若建陽人王士和字金谿人劉永祚字叔遠武進人九瀧即九龍灘在清流縣南險峻為七閩最熊緯字文江南昌人曹學佺字能始侯官人按黄道周本朝賜諡忠端八月明設厰衛緝事官尋罷之刑科給事中袁彭年公安人疏言厰衛之盛衰闗世運之治亂不可不革命責以狂悖沽名謫浙江按察司照磨蘇松巡撫祈彪佳亦上疏極論其弊大學士姜曰廣擬俞㫖羣奄共撓之曰廣曰緝事不除宗社且不可知何厰衛之有乃改命五城御史體訪而罷緝事官不設張獻忠䧟成都明蜀王至澍蜀獻王椿九世孫及巡撫都御史龍文光雒容人巡按御史劉之勃等死之初成都聞賊急蜀王至澍謀遷于滇劉之勃持不可内江王至沂與之力爭王將行而守門卒洶洶亂輜重有被掠者事遂寢已而新撫龍文光是年春莊烈帝命文光代陳士竒總兵劉佳引率兵三千從川北來謀設守諸王大姓逸去者半華陽知縣沈雲祚謁蜀王陳守禦䇿不聽聞太平王至淥賢往說之曰成都危在旦夕而王府貨財山積不及今募士殺賊疆場淪䘮誰為王守至淥言于王亦不聽沈雲祚字子凌太倉人至是賊逼成都文光等分陴拒守佳引出戰而敗賊穴城實以火藥又刳大木長數丈者合之纒以帛貯藥向城樓之勃厲衆奮擊賊郤二三里皆喜以為將去也初九日黎明火發北樓陷木石飛蔽天守陴者皆散賊遂入城蜀王率妃妾自沈于井之勃文光等皆被執賊以之勃同鄉欲用之之勃大罵賊攢箭射殺之復盡驅文武將吏及軍民男婦于東門之外將戮之忽有龍尾下垂賊以為瑞遂停刑文光佳引卒不屈死文光見殺于濯錦橋佳引自投于浣花溪副使張繼孟字伯功扶風人陳其赤字石文崇仁人僉事劉士斗字瞻甫南海人張孔敎字魯生㑹稽人蜀府左長史鄭安民浙江人成都同知方堯相字紹虞黄岡人華陽知縣沈雲祚等皆死之士斗被執見劉之勃與張獻忠語大呼曰此賊也公不可少屈獻忠怒命捽以上士斗返顧語如前遂闔門被殺其赤投百花潭死堯相死于萬里橋下賊幽雲祚于大慈寺遣其黨饋食以刃脅降不從遇害後獻忠復欲用諸人備百官繼孟等不為屈遂並見殺明南京修興寧宫慈禧殿先是洛陽之陷福王母妃與王相失居于河南人郭守義家王既立始遣總兵王之綱奉迎及是至南京命于三日内搜括萬金以充賞賜又諭工部以行宫湫隘亟修興寧宫慈禧殿剋期告成以居母妃尋又封母妃弟鄒存義為大興伯時土木並興賜予無節御用監内官請給工料銀置龍鳯几榻諸器物及宫殿陳設金玉諸寶封貲數十萬工部侍郎髙倬奏請裁省光禄寺辦御用器至萬五千七百有奇倬又以為言皆不納髙倬字枝樓忠州人明以前大學士王應熊為兵部尚書督師專討蜀寇起前寧夏巡撫樊一蘅字君帶宜賓人為兵部侍郎總督川陜軍務時張獻忠已據全蜀惟遵義保境自守應熊與一蘅避其地命應熊督師一蘅總督軍務討之又遣御史米夀圖昆明人廵按四川命吏部簡堪任監司守令者從壽圖西行應熊等乃縞素誓師開幕府傳檄諸郡舊將㑹師大舉㑹廵撫馬乾昆明人復重慶副將朱化龍等復龍安荗州一蘅乃起舊將甘良臣為總統合叅將楊展等所携潰卒得三萬人尋復叙州而副將曾英福建人連敗賊軍聲大振亦受一蘅節制其他據城奉征調者洪雅則曹勛黎州叅将范文光内江人松荗則詹天顔龍巖人䕫萬則譚宏譚詣一蘅遂移駐納溪注見前與應熊㑹瀘州檄諸路刻期並進獻忠頗懼事皆在明年至順治三年我大清兵入蜀誅獻忠餘賊南奔至重慶曾英戰歿應熊避之畢節衛尋卒㑹大兵北旋一蘅復駐江上為收復計時蜀中大亂諸将各據地自擅一蘅令不行順治八年大清兵南征一蘅遁山中遘疾卒蜀中将士俱盡而壽出奔沅州至順治十一年城破亦死明以越其􅇐為右僉都御史廵撫河南時河南諸將各結寨自固其最大者開封汝寧間則劉洪起南陽則蕭應訓洛陽則李際遇諸帥中獨洪起勇而好義數殺賊有功嘗與巡按御史陳潛夫大破賊將陳徳于桞園潛夫因請予掛印為將軍馬士英不聴前僉事越其􅇐本坐贓遣戍赦居南京以士英姻婭特起為河南巡撫老憊不知兵潛夫所建白皆不用諸鎮兵無至者㑹其杰以事譖潛夫于士英蕭應訓復南陽及泌陽舞陽桐栢遣子三傑獻㨗潛夫授告身飲之酒鼓吹前導出三傑喜過望往謁其􅇐其杰覬其賄故為尊嚴厲詞詰責詆為賊三傑泣而出萌異心潛夫過諸寨皆鐃吹迎送其杰問過之諸寨皆閉門不出其杰恚故譖之士英竟調潛夫還以凌駉歙縣人代之明選淑女時以母妃命選淑女羣奄借端肆擾隠匿者至鄰里連坐兵科給事中陳子龍字卧子松江華亭人哲王時死節本朝賜諡忠裕言中使四出搜巷凡有女之家黄紙貼額持之而去閭井騷然明㫖未經有司中使私自搜採甚非法紀御史朱國昌臨安衛人亦以為言乃命禁訛傳誑惑者尋復使太監李國輔等分詣蘇杭採訪民間婚娶一空明賜北京死節諸臣贈諡北京文武臣殉難者並子贈諡世廕立廟于雞鳴山賜額曰旌忠其列于正祀者文臣二十四人范景文倪元潞李邦華王家彦孟兆祥施邦曜凌義渠吳麟徵周鳯翔馬世竒劉理順汪偉申佳允吳甘來王章陳純徳陳良謨成徳許直金鉉及大同廵撫衛景瑗宣府廵撫朱之馮布衣湯文瓊諸生許琰范景文等事具前許琰字玉仲吳縣人聞京師破趨古廟自經為人所解及哀詔至竟不食死武臣七人新樂侯劉文炳惠安伯張慶臻襄城伯李國楨駙馬都尉鞏永固左都督劉文擢山西總兵官周遇吉遼東總兵官呉襄前文炳等事具内臣一人王承恩事具前婦人九人成徳母張氏金鉉母章氏汪偉妻耿氏劉理順妻萬氏妾李氏馬世竒妾朱氏李氏陳良謨妾時氏吳襄妻祖氏事具前附祀者文臣七人進士孟章明及郎中徐有聲給事中顧鋐彭琯御史俞志虞總督徐標副使宋廷煥川孟章明徐有聲徐標事具前顧鋐成都人彭琯永人俞志浙江人朱廷煥單縣人以副使分廵大名流賊陷城被執死武臣十五人成國公朱純臣鎮逺候顧肇迹定逺候鄧文明武定候郭培民陽武候薛濓永康候徐錫登西寧候宋裕徳懐寜候孫維瀋彰武伯楊崇猷宣城伯衛時春清平伯呉遵周新建伯王先通安鄉伯張光燦右都督方履泰錦衣衛千户李國祿時春事具前純臣東平王能入世孫肇迹夏國公成十一世孫文明寧河王愈十世孫培民營國公英九世孫濓鄞國公禄七世孫錫登蔡國公忠十世孫裕徳晟十世孫維藩鏜八世孫崇猶信七世孫遵周梁國公成七世孫光通守仁曾孫光燦興六世孫履泰南和伯一元子内臣六人李鳯翔王之心高時明禇憲章方正化張國元掌方正化事貝前鳯翔司禮秉筆太監時明故司禮印太監憲章國元皆提督諸監局太監並殉難而之心家最富降賊拷掠死命有司春秋致祭然顧鋐彭琯愈志虞輩特為賊拷死皆濫與其列而郎中周之茂等並以不屈死事具前顧未邀贈䘏他如御史馮恒登新昌人員外郎鄭逢所行人謝于宣鄞縣人郎中李逢申知縣鄒逢吉湖口人等皆拷死亦並獲贈諡時南北阻絶多未能核實也又子前大學士孫丞宗太常少卿鹿善繼祠諡又湖廣殉難巡按御史劉熙祚參政許文岐推官蔡道憲等並予贈諡禮部尚書顧錫疇又言温體仁得君行政最專且久其負先帝罪大且深乞削其文忠之諡而補文震孟羅喻義姚希孟吕維祺諸臣諡庶天下有所勸懲王亦從之仁孫承宗鹿善繼劉熙祚等事具前許文岐字我西和人蘄州陷被執賊繫之後營文岐陰與同繫舉人奚鼎鉉等數十人相結圖賊謀洩被害蔡道憲字元白晉江人為長沙推官城陷被執賊㗖以官嚼齒大罵賊磔之健卒林國俊等九人殉焉顧錫疇字九疇崑山人明封鄭芝龍為南安伯尋命為總兵官鎮守福建復令其弟鴻逵帥舟師駐鎮江防守明以阮大鋮為兵部侍郎巡閲江防大鋮之召大學士高𢎞圖以去就爭馬士英意稍折遲囘月餘至是復用安遠侯柳祚昌并八世孫薦起大鋮兵部添註右侍郎仍禁廷臣不得把持阻諫左都御史劉宗周疏言大鋮昔爭吏垣不得致魏大中死詔獄殺大中者魏璫大鋮其主使也即才果足用臣慮黨邪害正之才終病世道且祖宗故事九列必用廷推乃者中㫖頻降司農之後繼之少宰司農張冇譽少宰張提也未幾而大鋮司馬又繼之其為墨勅斜封之漸有不待問者大鋮進退實係江左興亡乞寢成命給事中熊汝霖亦言大鋮以知兵擢當置有用之地若止優游司馬則樞輔已優為之何必增置命切責宗周而格汝霖疏不聴尋命大鋮兼右僉都御史巡閲江防九月明黄得功趨揚州高傑以兵襲儀真不克初史可法置得功儀真與傑陰相牽制及是登萊總兵黄蜚將之任蜚與得功同姓稱兄弟移書請兵備非常得功率騎三百由揚州往高郵迎之傑素忌得功又疑圖已乃伏精卒道中邀撃之得功行至土橋方作食伏起出不意上馬舉鐡鞭飛矢雨集馬踣騰他騎馳有驍騎舞槊直前得功大呼反鬬挾其槊而抶之人馬皆糜復殺數十人跳入頽垣中哮聲如雷追者不敢進遂疾馳至其軍得免方鬬時傑潛師𢷬儀真得功兵頗傷而所俱行三百騎皆沒遂訴於南京願與傑决一死戰命太監盧九徳及可法遣監軍萬元吉和解之不可㑹得功有母䘮可法往弔語之曰土橋之役無智愚皆知傑不義今將軍以國故捐盛怒而歸曲于髙是將軍収大名于天下也得功色稍和終以所殺亡多為恨可法令傑償其馬復出千金為母􅈖得功不得已聽之明大學士姜曰廣罷曰廣與髙𢎞圖協心輔政而馬士英挾擁戴功内結勛臣朱國弼保國公永五世孫劉孔昭趙之龍外連諸鎮劉澤清劉良佐等謀擅朝權深忌二人沮阮大鉞進用益為所疾曰廣遂抗疏乞休大畧言前旯文武交競既慚無術調和近賭逆案忽翻又愧不能寢弭先帝善政雖多而頻出口宣職為亂階所得閣臣則貪滛巧猾之周延儒等所得部臣則隂邪貪狡之王永光等所得勲臣則力阻南遷盡撤守禦狂穉之李國楨等所得大將則紈絝支離之倪寵王樸等所得言官則貪横無頼之史莖陳啟新等後效亦可賭矣今又創一秘方但求面對立談取官同登場之戲劇下殿得意類贏勝之販夫决亷恥之大防長便侫之惡習此豈可為訓哉臣待罪綸扉半壁東南有同幕雀愧死無地終夜膺願乞骸骨還鄉里疏入慰留之士英大鋮等滋不悦國弼孔昭遂以誹謗先帝誣衊忠臣李國楨為言交章攻之曰廣又與士英面詆曰廣言上以親以序自應立汝何功士英聲曰臣無功汝輩欲立潞藩故臣成功耳爭辨久之宗室朱統􅠳新建人者素無行士英啖以官使擊曰廣疏不由通政司為禮科所駁通政司劉士楨萬安人亦劾其違制俱不問劉澤清復假諸鎮疏攻曰廣以三案舊事及迎立異議為詞請執下法司正謀危君父之罪頃之統􅠳復劾曰廣五大罪一引用東林死黨把持朝政二交聨江湖大俠日窺南都聲息非謀刧遷則謀别戴三庇從賊諸臣四納賄五奸媳曰廣既連被誣衊屢疏乞休至是始得請曰廣入辭諸大臣威在列曰廣言微臣觸忤權奸自分萬死上恩寛大猶許歸田但臣歸後當還以國事為重士英勃然曰吾權奸汝且老而賊也因叩頭言臣從滿朝異議中擁戴陛下願以犬馬餘生歸老貴陽如陛下留臣臣亦但多一死曰廣叱之曰擁戴是人臣居功地耶士英曰汝謀立潞藩功安在爭論久之時不能㫁但諭以叔父賢明當立二先生無傷國體也既出復于朝堂相詬詈而罷曰廣遂還江西其後故將全聲桓者初在史可法麾下後𨽻左良玉良玉死聲桓降于我大凊為南昌副總兵既而復叛附桂王由榔迎曰廣以資號召聲桓敗曰廣投偰家池死本朝賜諡忠確偰家池在新建縣西北偰家樓下明左都御史劉宗周罷宗周初聞召命以大讐未報不敢受職自稱草莾孤臣疏陳時政言今日大計舍討賊復讐無以表陛下渡江之心非毅然決䇿親征無以作天下大義之氣因進四䇿一曰據形勢以窺進取江左非偏安之業請進圖江北以鳳陽駐親征之師一曰重藩屏以資彈壓劉澤清髙傑倡逃可斬一曰慎爵賞以肅軍情分别各師封賞孰嘗孰濫一曰核舊官以立臣紀受偽官叛逃者宜分别定罪命納其言宣付史館而馬士英高傑劉澤清恨甚滋欲殺宗周宗周請告不許遂抗疏劾士英大畧言陛下龍飛淮甸天實予之乃以扈蹕微勞晏然入内閣進中樞者非士英乎于是李沾劉孔昭等譁然聚訟而羣隂且翩翩然矣高傑一逃將而奉若驕子劉黄諸將各有舊汎地而置若奕棋京營自祖宗以來皆勲臣為之陛下立國伊始即有内臣盧九徳之命士英不得辭其責惟陛下首辯隂陽消長之機出士英仍督鳯陽聨絡諸鎮史可法即不還中樞亦當自淮而北厯河以南别開幕府與士英相犄角京營提督獨斷寢之書之史冊為𢎞光第一美政優㫖答之而促其速入士英大怒即日具疏辭位且揚言曰劉公自稱草莾孤臣不書新命明示不臣天子也其私人朱統􅠳遂劾宗周疏請移蹕鳯陽高墻所在欲以罪宗處皇上而與史可法擁立潞王其兵已伏丹陽當急備而澤清傑日夜謀所以殺宗周不得乃遣客十輩往刺之宗周時在丹陽終日危坐未嘗有惰客客前後至者皆不忍加害而去適京口軍亂事具前士英以統􅠳言為信亦震恐于是澤清疏劾宗周隂撓恢復欲誅臣等激變士心劉良佐亦言宗周力持三案為門户主盟倡義親征圖晁錯之自為居守疏未下澤清復草一疏署傑良佐及黄得功名上之言宗周勸上親征謀危君父陰結死黨迫刦乘輿如宗周入都臣等即渡江赴闕正春秋討賊之義疏入舉國大駭傳諭和衷集事初澤凊疏出遣人録示傑傑曰我輩武人乃預朝事耶得功疏辨臣不與聞士英寢不奏可法不平遣使徧詰諸鎮咸云不知遂據以入告澤清輩由是氣沮宗周不得已以七月十八日至南京㑹阮大鋮進用宗周復請告王許其乘傳歸里將行疏陳五事一曰修聖政毋以近娛忽逺猷一曰振王綱母以主恩傷臣紀一曰明國是毋以邪鋒危正氣一曰端治術毋以刑名先教化一曰固邦本毋以外釁釀内憂亦但優㫖報聞而已明年六月杭州破宗周不食死本朝賜諡清介明史可法遣諸將分守要地髙傑移駐徐州初可法出巡淮安閲劉澤清士馬返揚州請餉為進取資馬士英靳不發可法疏趣之因言今事勢更非昔比必專主討賊復讐舎籌兵籌餉無議論舎治兵治餉無人才優㫖褒答而不能行至是可法議分布諸將奏請以總兵李成棟鎮徐州賀大成鎮揚州王之綱鎮河南李本身胡荗楨𨽻高傑麾下為前鋒而令劉肇基駐高家集李棲鳯駐睢寧以防河用張天禄為閣標前鋒駐𤓰洲高傑故䟦扈可法日以君臣之大義曉示之傑感其忠奉約束可法因與謀恢復調黄得功劉澤清二鎮赴邳宿防河傑自提兵直趨開歸且瞰宛洛荆襄以為根本傑遂具疏上之且曰得功與臣介介前事臣知報君雪耻而已安能與同列較短長哉然得功終不欲為傑後勁而澤清尤狡横難任可法不得已乃移得功廬州以防桐皖調劉良佐赴邳徐進復黄汝與傑相聲援傑遂帥兵移鎮徐州以左中允衛允文字祥趾韓城人兼兵科給事中監其軍徐州土賊程繼孔崇禎末被擒至京乘亂逃歸傑至徐州擒斬之明逮前浙江巡撫御史左光先下獄阮大鋮既得志專務報復既排去劉宗周等于是盡召逆案楊維垣虞廷陛嘉興人等十餘人及所善蔡奕琛唐世濟烏程人張孫振袁宏勲慈谿人等布列要路浙江廵按御史左光先者光斗之弟故與大鋮世讐又嘗首劾士英大鋮益恨刺骨光先在浙嘗平許都亂都東陽人家富任俠知縣姚孫榘索賄不得誣其結黨謀逆都遂反光先以撫標兵討之都乞降遂殺之姚孫榘桐城人至是光先已去而都餘黨復叛大鋮因坐以激變逮下獄蘇松廵撫祁彪佳疏救士英大鋮并恨彪佳嗾張孫振論其奸貪彪佳遂移疾去明年杭州破彪佳即不食尋端坐池中而死本朝賜諡忠恵明吏部尚書徐石麒罷石麒初入朝上疏陳七事省庻官慎破格行久任重名器嚴起廢明保舉交堂亷褒納之時當考選石麒與都御史劉宗周矢公甄别擬莊元辰鄞縣人等十三人為科道馬士英庇其私人更易殆半御史黄耳鼎蘄水人給事中陸郎上元人有物議石麒以年例出之朗賄奄人内傳留用耳鼎尋亦復官石麒發其罪朗恚疏詆石麒耳鼎亦兩疏劾石麒并言其枉殺陳新甲石麒疏辯求去益力士英擬嚴㫖不許令馳驛歸石麟剛方清介值權奸用事欝鬱不得志士英挾定策功將圖封石麒議格之中田成輩請囑石麒拒不應由是中外皆怨搆之去明年南京破大軍至浙江麒方居城外曰吾大臣也城亡與亡復入居城中朝服自縊死本朝賜諡忠懿冬十月明以前兵部尚書張縉彦總督北直山西河南軍務時馬士英掌中樞絶不銳厲恢復日以鋤正人引兇黨為務初舉朝以逆案攻阮大鋮大鋮憾甚及見北都從逆諸臣頗多附㑹清流者因倡言曰彼攻逆案吾作順案相對以李自成偽號曰順也士英因疏糾光時亨桐城人陳名夏溧陽人周鍾從弟項煜等以諸人皆附東林故重劾之其他大僚降賊者反不之及賄入輒復其官縉彦以本兵首先開門從賊自成敗走縉彦竄歸河南至是自言集義勇擒偽官収復列城士英主之即授原官總督軍務許便冝行事給事中李維樾言縉彦闇曶失機寸斬莫贖逆賊入宫青衣候㸃賊敗竄歸安能復收河北總督何官顧畀賊臣士英等勿恤也時北都降賊諸臣多以賊敗南遷史可法言北都之變臣子皆當有罪若在北者始應從死豈在南者獨非人臣卽臣可法謬典南樞臣士英叨任鳯督未能疾趨北援鎮臣澤清傑以兵力不支折而南走是首應重論者臣等罪也乃鈇鉞未加且恩榮叠被獨于在北諸臣毛舉而槩繩之豈散秩閑曹責反重于南樞鳯督哉宜摘其罪状顯著者重懲示儆若偽命来汚當置不問其逃避後至者許戴罪討賊赴臣軍前酌用時不能盡從也明大學士高𢎞圖罷初阮大鋮入見以𢎞圖不附東林引為証𢎞圖顧力言逆案不可翻大鋮及馬士英並怒一日閣中言及故庶吉士張溥士英曰吾故人也死酹而哭之姜曰廣笑曰公哭東林亦東林耶士英曰我非叛東林東林拒我耳𢎞圖因慫惥之士英意解㑹劉宗周劾疏上大鋮宣言曰廣實使之于是士英怒不可止力薦張㨗謝陞朝端益水火矣𢎞圖因乞休請召還史可法皆不許至是凡四疏乞休乃許之𢎞圖旣致仕無家可歸流寓㑹稽及南京破逃野寺中絶粒而死木朝賜諡忠貞明鳯陽地震明遣太監孫元徳督賦浙江先是命太監王肇基即王坤督催浙閩金花銀以給事中羅萬象執奏而止及是復遣司禮太監孫元徳往浙督催内庫及户工二部錢糧尋以高起潛請餉又于浙閩増𣲖二十萬亦令元徳催觧軍前明以張㨗為吏部尚書楊維垣為通政使馬士英獨握國柄一聼阮大鋮計朝政濁亂賄賂公行時徐石麒既去士英欲用張國維掌吏部而大鋮結内奄取中㫖特授張㨗士英􅌓􅇇良久楊維垣力謀起官禮部尚書錢謙益因上疏薦維垣及蔡奕琛且頌士英功而盡雪逆案賈繼春等維垣遂得授通政使未幾進左副都衘史奕琛亦授吏部侍郎我大清兵西討李自成分兵下江南先是我睿親王多爾衮令南來副將韓拱薇參將陳萬春等齎書致史可法書曰于向在潘陽即知燕京物望咸推司馬後入關破賊得與都人士相接識介弟於清班曽託其手靮平安奉致𠂻緒末審以何時得逹比道路紛紛多謂金陵有自立者夫君父之不共戴天春秋之義有賊不討則故君不得書葬新君不得書即位所以防亂臣賊子法至嚴也賊李自成稱兵犯闗手毒君親中國臣民不聞加遺一矢平西王吳三桂介在東陲獨效包胥之哭朝廷感其忠義念累世之宿好棄近日之小嫌爰整貔貅驅除狗䑕入京之日崇懐宗帝后諡號卜𦵏山陵悉如典禮親郡王將軍以下一仍故封不加改削無勲戚文武諸臣咸在朝列恩禮有加耕市不驚秋毫擾方擬秋高氣爽遣将西征傳檄江南聫兵河朔陳師鞠旅戮力同心報乃君國之讐彰我朝廷之徳豈意南州諸君子苟安旦夕弗審事機聊慕虗名頓忘實害予甚惑之國家之撫定燕都乃得之於闖賊非取之於明朝也賊毁明朝之廟主辱及先人我國家不憚征繕之勞悉索敝賦代為雪耻孝子仁人當如何感恩圖報兹乃乘逆寇稽誅王師暫息遂欲雄據江南坐享漁人之利揆諸情理豈可謂平将以為天塹不能飛渡投鞭不足斷流耶夫闖賊但為明朝得耳未嘗罪於我國家也徒以薄海同讐特仲大義若擁號稱尊便是天有二日儼為勍敵于将簡西行之鋭轉斾東征且擬釋彼重誅命為前導夫以中華全力受制潢池而欲以江左一隅兼支大國勝負之数無待蓍龜矣予君子之爱人也以徳細人則以姑息諸君子果識時禄知命第念故主厚爱賢王宜勸今削號歸藩永綏福朝廷當得以虞賔統承禮物帯礪山河位在諸王候上庻不負朝廷伸義討賊興滅繼絶之初心至南州羣彦翩然來儀則爾公爾候列爵分土有淮西之典例在惟執事實圖利之輓近士大夫好高樹名義而不顧國家之急每有大事輒同築舍昔宋人議論未定兵已渡河可為殷鍳先生領䄂名流主持至計必能深維終始寕忍随俗浮沉取舍從違應早審定兵行在即可西可東南國安危在此一舉願諸君子同以討賊為心母貪一身瞬息之榮而重故國無窮之祸為亂臣賊子所笑予實有厚望焉記有之惟善人能受盡言散布腹心佇聞明敎江天在望延跂為勞書不宣意可法旋遣人答書書曰南中向接好音法随遣使問訊吳大将軍未敢遽通左右非委隆誼于草莽也誠以大夫無私交春秋之義今倥偬之際忽捧琬琰之章真不啻從天而䧏也循讀再三殷殷至意若以逆賊尚稽天討煩貴國憂法且感且愧懼左右不察謂南中人民媮安江左竟㤀君父之怨敬為貴國一詳陳之我大行皇帝敬天法祖勤政爱民真堯舜之主也以庸臣悮國致有三月十九日之事法待罪南樞救援無及師次淮上凶問遂來地坼天崩山枯海泣嗟乎人孰君雖肆法于市朝以為泄泄者之戒亦奚疋謝先皇帝于地下哉爾時南中臣民哀慟如䘮考妣無不拊膺切齒欲悉東南之甲立剪兇讐而二三老臣謂國破君亡宗社為重相與迎立今上以繋中外之心今上非他神宗之孫光宗猶子而大行皇帝之兄也名正言順天與人歸五月朔日駕臨南都萬姓夾道歡呼聲聞數里羣臣勸進今上悲不自勝讓再讓三僅允監國迨臣民伏闕屢請始以十五日正位南都從前鳯集河清瑞應非一即告廟之日紫雲如盖祝文升霄萬目共瞻欣𫝊盛事大江湧出柟梓數十萬章助修宫殿豈非天意也哉越數日遂命法視師江北刻日西征忍傳我大将吴三桂借兵貴國破走逆成為我先皇帝后發䘮成禮掃清宫闕撫輯羣黎且罷薙髪之令示不􅁯本朝此等舉動振古鑠今凡大明臣子無不長跽北向頂禮加額又豈但如明諭所云感恩圖報已乎謹于八月薄治筐篚遣使犒師兼欲請命鴻裁連兵西討是以王師旣發復次江淮乃辱明誨引春秋大義來相詰責善哉乎推言之然此又為列國君薨世子應立有賊未討不忍死其君者止説耳若夫天下共主身殉社稷請宫皇子慘變非常而猶拘牽不即位之文坐昧大一統之義中原鼎沸倉猝出師將何以維繫人心號召忠義紫陽綱目踵事春秋其間特書如莽移漢鼎光武中興丕廢山陽昭烈踐阼懐愍亡國晉元嗣基徽欽蒙塵宋髙纘統是皆于國讐未剪之日亟正位號綱目未嘗斥為自立率以正統與之甚至如元宗幸蜀太子即位靈武議者疵之亦未嘗不許以行權幸其光復舊物也本朝傳世十六正統相承自治冠帯之族繼絶存亡仁恩遐被貴國在先朝夙膺封號載在盟府寧不聞乎今痛心本朝之難驅除亂逆可謂大義復著于春秋矣昔契丹和宋止嵗輸以金繒回紇助唐原不利其土地况貴國篤念世好兵以義動萬代瞻仰在此一舉若乃乘我䝉難棄好崇讐規此幅􅊷為徳不卒是以義始而以利終為賊人所竊笑也貴國豈其然往先帝軫念潢池不忍盡戮勦撫互用貽悞至今今上天縱英明刻刻以復讐為念廟堂之上和􅇆體國介胄之士涕泣枕戈忠義民兵願為國死竊以為天亡逆闖當不越于斯時矣語曰樹徳務滋除惡務盡今逆成未服天誅諜知捲土西秦方圖報復此不獨本朝不共戴天之恨抑亦貴國除惡未盡之憂伏乞監同讐之誼全始終之徳合師進討問罪秦中共梟逆賊之頭以洩敷天之憤則貴國義問焒燿千秋本朝圖報惟力是視從此兩國世通盟好傳之無窮不亦休乎至于牛耳之盟則本朝使臣久已在道不扺燕奉盤盂從事矣法北望陵廟無涕可揮身蹈大戮罪應萬死所以不即從先帝者實為社稷之故傳曰竭股肱之力繼之以忠貞法處今日鞠躬致命克盡臣節所以報也惟殿下實昭鍳之至是山西山東郡縣已次第撫定我大清乃命英親王阿濟格為靖逺大将軍帥師西討李自成豫親王多鐸為定國大將軍帥師下江南明定諸鎮兵額江北督撫四鎮額兵三萬楚撫額兵一萬京營額兵一萬五千時九江總兵袁繼咸為馬士英等所惡因汰其軍餉六萬軍中有怨言繼咸爭之不聼繼咸又議造戰艦檄九江僉事葉士彦截置材木士彦封還其檄繼咸劾之士彦同年御史黄耳鼎亦劾繼咸且言繼咸嘗勸左良玉立他宗而良玉不從良玉聞之疑懼上疏明與繼咸無隙耳鼎受指使而言由是南京籍籍益為良玉脅制朝廷矣葉士彦巢縣人十一月鳯陽陵災松栢皆燼張獻忠僭號于成都獻忠既有全蜀遂僭號大西國王偽稱大順元年修蜀王府居之設丞相尚書五軍都督府等官用汪兆麟命為左右丞相王麟冮鼎鎮龔完敬為尚書養子孫可望艾能竒劉文秀李定國等皆為將軍賜姓張氏鼎鎮完敬尋以小過刲剔死脅川中士大夫受偽職前布政使尹伸給事中吳宇英皆不屈死江鼎鎮南充人龔完敬彭縣人尹伸敘州人吳宇英廣元人遣諸偽將分屠各府州縣詭開科取士集于青羊宫盡殺之筆墨成邱塚坑成都民于中園殺各衛籍軍九十八萬偽官朝㑹呼獒數十下殿獒所齅者引出斬之名天殺又創生剝人法皮未去而先絶者刑者抵死將卒以殺人多少敘功共殺男女六萬萬有竒㑹諸郡義兵並起獻忠憤怒誅殺益毒川中人跡殆絕列城内至雜樹成拱云後二年獻忠盡焚成都宫室鏟其城率衆出川北又欲盡殺川兵偽將劉進忠率川兵一軍盡逃會我大清兵至漢中進忠降乞為嚮導至鹽亭界大霧獻忠曉行猝遇大兵中矢墜馬蒲伏積薪下擒出斬之鹽亭魏縣今屬四川潼川府明史可法帥師進次清江浦可法聞李自成敗還陜西決䇿北行高傑旣赴徐州可法遂帥師進次清江浦遣官屯田開封為經畧中原計時諸將各分汛地擇便利者自王家營在清河縣東北黄河北岸而北至宿遷最衝要諸鎮不敢任可法自任之令幕下文武築壘縁河南岸可法以自成未滅上疏請頒討賊詔書大畧言偏安者恢復之退歩未有志在偏安而遽能自立者也大變之初黔黎灑泣紳士悲哀猶有朝氣今則兵驕餉絀文恬武嬉頓成幕氣矣河上之防百未經理人心不肅威令不行復讐之師不聞及闗陜討賊之詔不聞逹燕齊君父之讐置諸膜外憶臣等迎駕時陛下言及先帝則泣下沾襟㳟謁孝陵則淚㾗滿袖皇天后土實式鑒臨曽幾何時頓忘斯志先皇帝死于賊恭皇帝亦死于賊此千古未有之痛國家變出非常在北諸臣死節者無多在南諸臣討賊者復少此千古未有之恥夫庶民之家父兄被殺尚思穴胸斷脛得而甘心况在朝廷顧可置臣恐恢復無期即偏安亦未可保也今宜速發討賊之詔責臣與諸鎮悉簡精銳直指秦關庶海内忠臣義士聞而感憤且陛下嗣登大寳原與先朝不同諸臣但有罪當誅曽無功足録臣于登極詔藁特將加恩一欵刪除不意後來仍復開載致貽笑天下今恩外加恩紛紛未已武臣腰玉名器濫觴自後尤宜慎重專待有功庶猛將武夫有所激厲至行兵討賊最苦無糧搜括不可行勸輸亦難繼請將不急之工程可已之繁費一切報罷朝夕之燕衎左右之進獻一切謝絶即事關典禮萬不容已者亦槩從節省蓋賊一日未滅即有深宫曲房豈能安處錦衣玉食豈能安享必刻意在雪恥報讐振舉朝精神萃萬方物力盡并于選將練兵一事庶人心可鼓天意可囘疏奏不省時諸鎮位秩已崇咸逡巡無進師意可法悔之語其客欲斬已及馬士英高𢎞圖姜曰廣四人頭為任事不忠之戒因上疏請責成諸鎮進戰可法每繕疏循環諷誦聲涙俱下聞者無不感泣士英第取優㫖報之而已我大清兵入宿遷我大清兵取海州遂取宿遷史可法舟次鶴鎮聞報遣總兵劉肇基往援復其城越數日大清兵圍邳州軍城北肇基援之軍城南相持半月而解復分兵㧞贛榆豐沛等縣皆降可法以聞馬士英大笑不止坐客楊士聰問故士英曰君以為誠有是事耶此史公妙用也歳將暮防河人將吏應敘功耗費軍資應稽算此特為敘功稽算地耳楊士聰濟寧明命𣙜酒稅馬士英請𣙜酒助餉下部議從之士英又請免童生府州縣試分上中下户納銀即赴院試又奏開助工等例暴斂益甚民間因有掃盡江南金填塞馬家口之謡明逮治前昌平巡撫何謙崑山人等御史沈宸荃慈谿人言經畧山東河南者王永吉張縉彦也先帝㧞永吉為總督不救國危擢縉彦典中樞率先從賊即加二人極刑不為過陛下屈法用之而永吉觀望逗遛縉彦狼狽南竄死何以對先帝生何以對陛下昌平巡撫何謙失陷諸陵罪亦當按都城既陷守土臣宜皆厲兵秣馬以報國讐乃賊塵未揚輒先去以為民望如河道總督黄希憲山東巡撫邱祖徳字念修成都人尚可容偃臥家園乎疏入永吉縉彦釋勿問逮謙祖德等付法司治之明桂王常瀛卒于梧州常瀛初封衡州張獻忠陷湖南常瀛走廣西遂居梧州至是以憂悸致疾卒常瀛世子先次子安仁王由未幾亦月卒次由榔初封永明王至順治三年八大兵下汀州執唐王聿鍵干是兩廣總督丁魁楚廣西廵撫瞿式耜等迎由榔監國十一月自立于肇慶號永厯㑹大兵克廣州式耜請駐軍峽口太監王坤不從奉由榔走梧州至順治四年正月大兵向肇慶由榔復走之桂林又走武岡柳州㑹大兵東還由榔旋返桂林順治五年南京總兵金聲桓等叛降于由榔復還肇慶順治六年大兵下湘潭總督何騰蛟死之尋入桂林大學士瞿式耜亦死由榔大懼自梧州奔南寧時孫可望已據滇黔受封為秦王順治八年遣兵至南寧殺其大學士嚴起桓等順治九年可望迎由榔入安隆所改曰安龍府日益窮促聞李定國與可望有隙遣使密召定國以兵來迎可望偵知之殺其大學士吳貞毓等數人順治十三年定國至乃奉由榔走雲南由榔封定國晉王順治十四年可望舉兵與定國戰大敗挈妻子降于我大清順治十五年由榔走永昌順治十六年大兵三路入雲南大兵克雲南由榔走騰越定國敗于潞江由榔走南甸遂入緬緬以四舟迎由榔隨行者六百餘人緬人于赭陘置草屋居由榔遣兵防之順治十七年定國等與緬戰索其主連敗緬兵緬終不肯出由榔時平西大將軍吳三桂以由榔尚在請進兵緬甸以靖根株為一勞永逸之計我大清命定西將軍愛星阿率師會之三桂遂傳檄緬甸諭以擒獻由榔順治十八年正月三桂遣二土官至緬示師期三月師至猛卯㑹瘴發撤兵而緬酋莽猛白屢得三桂檄欲生致由榔乃密使人防守誘其從官沐天波等渡河盟盡殺之惟存由榔與其屬二十五人九月三桂及愛星阿帥師自南甸隴川猛卯進别遣兵取道姚闗鎮康孟定十一月㑹于木邦遂趨緬十二月次舊挽坡去緬城六十里緬使人請兵百人進蘭鳩江濱為扞衛遂執由榔及其親屬送三桂軍前明年四月由榔死于雲南嚴起桓浙江山隂人安隆所本元普安路地明設守禦所今為南籠府屬貴州吳貞毓字元聲冝興人按何騰蛟諡忠誠瞿式耜諡忠宣俱本朝賜十二月我大清兵克河南府高傑至徐州沿河築墻專力備禦且遣人通好許定國太康人為聨絡河南計張縉彦亦奏定諸將分地王之綱自永城至寧陵許定國自寧陵至蘭陽劉洪起自祥符至汜水㑹大清兵至孟津先追精兵渡河沿河十五寨堡俱望風歸附大兵入河南府總兵李際遇迎降縉彦等並走沈邱河南撫鎮飛章告急命傑率兵進屯歸徳為備已而大兵别由濟寕南下至夏鎮復自洛陽圍鄧州可法傑及劉澤清等各具疏告警馬士英言北兵雖在河上然賊勢尚張不無後慮豈遂投鞭問渡乎況彊弱何常赤壁三萬淝水八千惟在諸將䇿厲之而已卒不應明命馬士英閲兵將大閲京軍適有疾不出因命士英代之時工費無度荒酒漁色閹人田成等擅寵士英輩亦因之竊權固位政以賄成識者皆知其不堪旦夕阮大鋮嘗以烏絲闌寫已所作燕子箋雜劇進之時嵗将暮福王一日居興寕宫憮然不樂韓贊周請其故王曰梨園殊少佳者贊周泣曰奴以陛下或思望考乃作此想耶明重頒三朝要典命追卹逆案諸臣楊維垣追論三朝黨局力詆王之寀楊漣等而為劉廷元霍維華等訟寃乃命求三朝要典宣付史館尋復令删定刋行吏部尚書張㨗力稱維華等忠請表章三案諸臣因盡追賜卹典贈廕祭𦵏諡全者維華等六人贈廕祭𦵏不予諡者徐大化等二人贈祭𦵏者徐掦先等三人復官不賜卹者王紹徽等三人他若王徳完黄克纘王永光章光岳等雖名不麗于逆案而為清論所不予者亦賜卹有差徐掦先江寕人章光岳臨川人袁宏勲復請追論焚要典諸臣罪袁繼咸疏言要典已經先帝焚毁何必復理其説未進宜寢之已進宜毁之不聼明妖僧自稱齊王伏誅有狂僧大悲自稱齊王又稱潞王為趙之龍所捕下鎮撫司勘訊阮大鋮與張孫振謀欲假以誅東林及素所不合者令大悲引諸臣擁潞王可一網盡也因造十八羅漢五十三參之目書史可法高𢎞圖等名一時人望無不備列納大悲袖中錢謙益先已上疏頌士英且為大鋮訟寃修好矣大鋮憾不釋亦列焉將窮治其事獄詞詭秘廷臣皆自危而士英不欲興大獄乃第當大悲妖言律而斬止乙福王由崧𢎞光元年王是年五月我酉大清兵下江南福就執明亡春正月明以南京宫殿成推恩諸臣有差加史可法太保馬士英少師王鐸少保予廕仍以士英掌文淵閣印充首輔辦事可法力辭太保許之可法為督帥行不張葢食不重味夏不箑冬不裘寢不解衣年四十餘無子其妻欲置妾太息曰王事方殷敢為兒女計乎在軍中絶飲除夕遣文牒至夜半倦索酒殽肉分給將士已盡乃取塩豉下之思先帝泫然淚下凭几卧比明將士集轅門外門不啟左右遥語其故知府任民育曰相公此夕卧不易得也令鼓人仍撃四鼓可法寤怒曰誰犯吾令左右述民育意乃免任民育字時澤濟寧人明定北都從逆諸臣罪削刑部尚書解學龍籍先是命治從賊諸臣獄倣唐制六等定罪學龍議定為爰書分别上之一等應磔者十一人吏部員外郎宋金郊舉人牛金星平陽知府張嶙然太僕少卿曹欽程御史李振聲喻上猷山西提學叅議黎志陞陜西布政使陸之祺給事中髙翔漢潼闗道僉事楊王休檢討劉世芳首嶙然烏程人振聲米脂人上猷石人志陞華容人世芳膚施人二等應斬秋決者四人給事中光時亨河南提學政事鞏焴庶吉士周鍾兵部主事方允昌允焴真寕人昌浙江人三等應降擬贖者七人翰林院修撰兼都給事中陳名夏等四等應戍擬贖者十五人禮部主事王孫蕙等孫蕙無錫人五等應徒擬贖者十人通政使叅議宋學顯等六等應杖擬贖者八人工部員外郎潘同春等同春餘姚人其留北俟後定奪者十九人少詹事何瑞徴等瑞徴信陽人另存冄議者二十八人給事中翁元益等人元益上海又已經録用者十人兵部尚書張縉彦等奏入諭以周鍾等不當緩决陳名夏等未蔽厥辜宋學顯潘同春等擬罪未合令冄議惟方拱乾名在五等以結納馬阮減其罪拱乾桐城人至是學龍更擬周鍾光時亨等各加一等潘同春諸臣皆候補小臣受偽無據仍執前律時馬阮急欲殺周鍾學龍欲緩其死謀之王鐸乘士英注籍上之且請停刑鐸即擬諭㫖褒以詳慎平允士英大怒然事已無及大鋮暨張㨗楊維垣等聲言欲劾學龍學龍引疾命未下保國公朱國弼御史張孫振等詆其曲庇行私遂削籍後周鍾光時亨既死大鋮等即傳㫖二等罪斬者謫雲南金齒軍三等罪絞者充廣西邉衛軍四等以下俱為民永不叙用然學龍所定案亦多漏綱而所擬一等諸犯皆隨賊西行實未嘗正刑辟也周鍾等被戮事俱詳後明總兵許定國誘殺高傑于睢州傑帥兵進次歸徳定國方駐睢州故與傑有怨嘗上書詆傑為賊故傑恨之而定國亦已遣使納欵于我大清且送其二子渡河為質乞濟師往援傑微聞之招定國相㑹不應傑復邀廵撫越其􅇐等同往睢州定國始郊迎毁其軍而以羸見且故為屈服狀傑心輕定國遂入城其􅇐止之不聼十一日定國置酒享傑傑飲酣為定國刻行期且微及送子事定國益疑無離睢意傑固促之行定國怒夜伏兵傳礟大呼其杰等亟遁走傑醉臥未起衆擁至定國所殺之先是傑以定國将去睢盡發兵戍開封所留親卒止數十人定國為恭順多選妓侍傑而以二妓偶一卒寢卒盡醉及聞礟欲起為二妓所掣不得脱皆死明日傑部將回軍攻城自東門入老弱無孑遺定國奔考城尋走降于大清軍黄得功間傑死復引兵襲揚州將盡殺其妻子以報城中大懼史可法急命同知曲從直諭解之乃引兵去人曲從直遼東明以吏部侍郎蔡奕琛兼東閣大學士入閣辦事尋復以唐世濟為右都御史皆阮大鋮援之也明以衛允文為兵部侍郎總督開歸防勦軍務高傑既死部下兵將大亂互為雄長睢州旁近二百里殺戮無遺史可法聞之流涕曰中原不可為矣遂馳之徐州以總兵李本身乃傑甥請用為提督代統其衆又立傑子元爵為世子撫定其軍黄得功劉澤清良佐聞可法欲以本身將傑軍連章劾之而監軍衛允文希馬士英指亦論可法督師為贅士英喜即擢允文兵部右侍郎總督興平標下兵馬經畧開歸防勦軍務以分其權可法益不得展布矣尋傑兵回揚州改命劉良佐防歸徳我大清兵克西安李自成走襄陽我大兵至潼關賊將劉芳亮迎戰奮擊敗之俘斬無算自成親率馬歩兵至復大破之遂克潼關偽伯馬世耀以七千人來降斬之進克西安自成已焚宫室由龍駒寨走武岡入襄陽復走武昌我大兵兩道追躡蹙之于鄧州承天徳安武昌等處窮追至賊巢連破走之自成至湖廣衆尚五十餘萬尋為我大兵所廹部衆多降或逃散自成走咸寕蒲圻至通城竄于九宫山率二十騎略食山中為村民所困自縊死或曰陷泥淖中村民擊之腦中鉏死時我大兵遣識自成者驗其尸朽莫辨獲自成兩從父偽趙候偽襄南候及偽汝侯劉宗敏等皆斬之其兄子過偕諸賊帥奉自成妻高氏降于唐王聿鍵未㡬亦死蒲圻晉縣通城宋縣今俱屬武昌府二月明以阮大鋮為兵部尚書命大鋮以尚書恊理部事仍廵閲江防大鋮雖長中樞置一切兵事不問顧時時撓六部權任劉應賔沂水人為文選濁亂銓政冄舉考選擢其私人二十餘人為給事御史嘗欲罷撫按紏薦令納金于官糾者免薦者予其謬誕如此中書舍人林翹善星術以嘗决士英必大用半嵗間遂躐授左都督銜蟒服趨事總督袁繼咸請以陳麟鄧林竒為總兵大鋮索賄始給勅印諸白丁𨽻役輸重賂立躋大師時人為之語曰職方賤如狗都督滿街走林翹江浦人三月明人有自稱崇禎太子者下獄治之北都之變李自成刦太子慈烺西走不知所終或傳其已遇害至是有自北來稱太子者召勲臣朱國弼等閣臣馬士英等翰林劉正宗安邱人等入見武英殿靣諭同府部九卿科道辨驗真偽日午羣臣奏係故駙馬都尉王昺高陽人尚穆宗女延慶公主姪孫王之明曾侍衛東宫家破南奔鴻臚少卿高夢箕河間人家丁穆虎敎之詐稱太子乃下之明中城兵馬司獄越四日復逮夢箕穆虎鞫于午門外皆具服亦下刑部獄時都下士民皆以太子為真衆論籍籍謂士英等朋奸導上滅絶倫理黄得功即抗疏爭之疏略言東宫未必假冐先帝子即上子未有了無證明混然雷同者臣恐在廷諸臣諂徇者多抗顔者少即明白識認亦不敢抗論取禍矣命三法司覆訊王之明等遂令燬得功原疏以絶奸謀左良玉亦疏請保全東宫且斥士英等為奸臣以王之明自供甚明将審明畧節諭之而已明河南婦人有自稱王妃者下獄治之河南有婦人童氏自稱藩邸王妃劉良佐信之廵撫越其􅇐具儀從送至京以為假冐下童氏錦衣衛獄以前廵按御史陳潛夫嘗于途次稱臣朝謁亦逮治之中外譁然良佐因言王之明童氏兩案未恊輿論懇求曲全兩朝彝倫毋為天下口實命將獄詞刋布以息羣疑我大清兵定河南我大軍既定關陜復移師下江南出虎牢關口分兵自龍門關及南陽三路同趨歸徳克郾城上蔡諸縣所過城邑皆望風欵附遂進取歸徳廵按御史凌駉及其從子潤生死之南陽副將李好降河南悉定明左良玉舉兵反良玉既與馬士英有隙士英謀築板磯為西防良玉歎曰今西何所防殆防我耳而黄澍匿其軍中與諸將日以清君側為請良玉躊躇弗應㑹王之明事起良玉爭不聼心甚不平澍欲借此激衆以報已怨召三十六營大將與之盟良玉亦以士英裁其餉益大憾反意遂决乃傳檄逺近以討士英為名復上疏請誅之疏言自先帝之變士英利災擅權事事為難逆案先帝手定士英首翻之要典先帝手焚士英復修之又募死士伏皇城詭名禁軍動曰廢立由我陛下即位之初恭儉明仁士英百計誑惑進優童艶女傷損盛徳復引用阮大鋮睚眦殺人借三案為題凡平生不快意人必一網打盡令天下士民裹足解體目今皇太子至授受分明士英一手握定抺殺識認之方拱乾而信朋謀之劉正宗忍以十七年嗣君付諸幽囚凡有血氣皆思寸磔士英大鋮以謝先帝乞立肆士朝傳首抒憤疏上遂引兵而東自漢口逹蘄州列舟三百餘艘士英大懼急命阮大鋮劉孔昭率兵㑹黄得功趨上江堵禦袁繼咸請赦太子以遏止之不聼良玉之發武昌邀總督何騰蛟偕行不可則盡殺城中人刦之騰蛟解印付家人令速走将自剄良玉部将擁去置之别舟乘間躍入江漂十餘里漁舟救之起則漢前将軍關忠義侯廟前也家人懐印者亦至相視大驚覔漁舟忽不見人謂騰蛟忠誠得神祐云夏四月明周鍾光時亨伏誅遂殺前禮部郎中周鑣山東按察司僉事雷縯祚先是馬士英以鑣縯祚嘗主立潞王議指為姜曰廣私黨令朱統􅠳劾奏逮治及周鍾光時亨下獄士英復言二人罪應族誅而請以鑣從坐阮大鋮亦與鑣有夙憾于是御史羅萬爵蕪湖人王懩等連疏詆鑣縯祚至比縯祚為成濟請亟正西市至是左良玉稱兵人情洶洶而良玉檄中復斥其搆陷鑣縯祚狀士英等益怒因謂鑣實召良玉兵遂戮鍾及時亨而賜鑣縯祚自盡故事小臣無賜自盡者因良玉兵東下故大鋮輩急殺之明徴劉良佐等將兵入援左兵將至馬士英徴良佐等入衛劉澤清亦以勤王為名大掠而東時史可法以大兵將及淮南連疏告警時召對羣臣大理少卿姚思孝歙縣人御史喬可聘寳應人成友謙南通州人請毋撤江北兵亟守淮揚士英厲聲叱曰若輩東林猶籍口防江欲縱左逆入犯耶北兵至猶可議欵左逆至則若輩高官我君臣獨死耳力排思孝等議淮揚備禦益弱明左良玉死于九江良玉至九江邀袁繼咸入舟中語及太子下獄事大哭因袖出密諭邀諸將盟繼咸正色曰先帝舊徳不可忘今上新恩亦不可負良玉色變乃改檄為疏駐軍侯㫖繼咸歸方謀拒守而部將郝效忠陰約良玉兵入城殺掠縱火殘其城而去良玉已疾篤夜望城中火光太息曰吾負臨候繼咸别號嘔血數升遂死其子夢庚秘不發喪諸將共推為帥留七日而東兵勢尚盛自彭澤以下皆陷黄得功方駐軍荻港在繁昌縣西進拒夢庚于銅陵破之解其圍阮大鋮等曰虚張㨗音以邀爵賞得功尋復敗其衆于板子磯乃封得功靖國公命移家太平一意辦賊良玉後營總兵惠豋相本降冦過天星感良玉恩有忠實心方諸將自九江東下連陷郡縣獨池州不破貽書言留待後軍登相大詬曰若此則反不如我前為流賊時矣如先師未命何撤其軍返夢庚索輕舸追之相見大慟登相以夢庚不足事遂引兵絶大江去諸将乃議還軍而執袁繼咸及安慶廵撫張亮清兵已至江北夢庚遂偕黄澍率衆歸附亮乘間赴水死繼咸北行亦不屈死張亮四川人按袁繼咸本朝賜諡忠毅我大清兵克泗州大軍自歸徳起行潁州太和悉下兵未至泗州二十里將先奪泗北淮河橋守將焚橋遁走我大兵遂夜渡淮翌日追五十餘里不及我大清兵克揚州明督師兵部尚書兼大學士史可法等死之可法初聞大兵日南下將移軍泗州防䕶祖陵輜重已發而左良玉稱兵召之入援渡江抵燕子磯黄得功已破良玉軍可法乃趨天長檄諸將救盱眙俄報盱眙已降大清泗州援將侯方巖敗歿可法一日夜奔還揚州訛傳許定國兵將至殱高氏部曲城中人悉斬關出舟楫一空可法檄各鎮兵無一至者獨總兵劉肇基目白洋河在桃源縣西白洋鎮即潼水之下流也趨赴請背城一戰可法持不許十八日大清兵大至屯斑竹園招諭可法及衛允文等降不從明日總兵李棲鳯監軍副使高岐鳯㧞營出降城中勢益單諸文武分陴拒守舊城西門險要可法自守之作書寄母妻且曰死𦵏我高皇帝陵側越二日大清兵薄城下用巨􅀈擊城西北隅城遂破可法自刎不死一參將擁可法出小東門既就執可法大呼曰我史督師也乃殺之可法死覔其遺骸天暑蒸變不可識踰年家人以袍笏招魂𦵏于揚州郭外之梅花嶺一梅花嶺在揚州府新城廣儲門外名土山劉肇基率所部四百人巷戰力不支與副將乙邦才青州人馬應魁字守卿貴池人莊子固字憲伯遼東人汪思誠等皆死衛允文赴水死及囬籍侍郎張伯鯨自經死知府任民育著緋衣安坐堂上就殺同知曲從直王纘爵鄞人知縣周志畏亦鄞人羅伏龍新喻人吳道正餘姚人運使楊振熙臨海人縣丞王志端孝豐人幕客盧渭字渭生長洲人歸昭崑山人等皆死之員外郎何剛字慤人上海人庻吉士吳爾壎崇徳人皆叅可法軍事城破亦投井死其他諸生高孝纘王士琇王纘王續王續又有武生戴之藩醫者陳天㧞畫士陸愉義兵張有徳市民馮應昌舟子徐某及婦女死節者不可勝紀時福王命劉澤清往援揚州而澤清已潛謀輸欵我大清惡其反覆磔誅之忠按史可法本朝賜諡正五月我大清兵渡江我大清兵臨江總兵鄭鴻逵鄭彩以水師守𤓰洲副使楊文驄駐金山扼大江而守㑹王擢文驄常鎮廵撫兼督沿海諸軍文驄乃還駐京口合鴻逵等兵南岸與大清兵隔江相持大清兵編大筏置燈火夜放之中流南岸軍發礮石以為獲勝也日奏㨗己丑夜大清兵乘霧而濟廹岸諸軍始知倉皇列陣甘露寺鐡騎蹙之悉潰蘇松廵撫霍逹長安人及文驄俱走蘇州鴻逹等縱兵大掠遁還閩中明福王出奔太平京口敗軍奔還南京大震福王荒宴至夜半跨馬自通濟門出走遂奔太平劉孔昭斬關遁馬士英以黔兵自衛挾福王母妃走浙江亂兵入獄擁王之明立之時黄得功方收兵屯蕪湖福王潛入其營得功驚泣曰陛下死守京城臣等猶可盡力奈何聴奸人言倉卒至此且臣方對敵安能扈駕王曰非卿無可仗者得功泣曰願效死士英道廣徳知州趙景和閉門拒守士英攻殺之遂走杭州阮大鋮亦自上江逃至未幾大兵至杭州潞王常淓開門降士英與大鋮俱走嚴州方國安營明年大兵勦湖賊擒士英誅之大鋮乞降從大兵攻仙霞關僵仆石上死我大清兵定南京大軍營城北總督京營忻城伯趙之龍奉表納欵勲戚自魏國公徐州爵宏基之子駙馬都尉齊賛元尚光宗女遂平公主靈璧侯湯國祚安逺侯柳祚昌等大臣自大學士王鐸禮部尚書錢謙益等文武數百員并城内官民迎降高傑子元爵及廣昌伯劉良佐等亦于沿途歸附得馬歩兵二十三萬大兵遂入屯城中時刑部尚書高倬吏部尚書張㨗副都御史楊維垣皆死之而庻僚殉難者則有儀制司主事黄端伯不屈死户部郎中劉成治自縊死户部主事吳嘉允謁方孝孺祠從容投繯死中書舍人龔廷祥投武定橋下死欽天監博士陳于階自經于公署其諸生布衣死者則有吳可箕金璽陳士逹等允端伯字元公建昌新城人成治字廣如漢陽人嘉字純如松江華亭人廷祥字伯興無錫人于階上海人可箕徽州人璽士逹俱南京人我大清兵至蕪湖明總兵田雄宣府人刦福王由崧以降靖國公黄得功死之明亡南京既定我大清遣官兵及降將劉良佐等襲太平福王登舟欲渡江走大兵據江口截其去路黄得功以戰荻港時傷臂衣葛衣以帛絡臂佩刀坐小舟方督麾下入總兵結束前迎戰而良佐大呼岸上招降得功怒叱曰汝乃降乎忽飛矢至中其喉左偏得功知不可為擲刀拾所㧞箭刺吭死本朝賜謚忠桓其妻聞之亦自經總兵翁之琪投江死田雄遂挾福王以降所屬總兵及部衆俱降我大兵執福王至南京改南直𨽻為布政使以應天府為江寕府分徇郡縣無不歸附江南悉定王師遂進平浙江御批歴代通鑑輯覽卷一百十六

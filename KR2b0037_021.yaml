body:
  text: 五官中郎將張純字伯仁杜陵人安世元孫與太僕朱浮奏議禮為人子事大宗降其私親當除今親廟四以先帝四廟代之大司徒涉等時關內侯戴涉為大司徒奏立元成哀平四廟上自以昭穆次第當為元帝後遂追尊宣帝曰中宗始祠昭帝元帝于太廟成帝哀帝平帝于長安舂陵節侯以下于章陵其長安章陵皆太守令長侍祠胡氏寅曰王莾篡時漢祚既絶光武掃平禍亂奮然崛起雖祖髙祖而帝四親非與衰朝尊崇藩統同事于義未有大不可者一聞純等建議斷然從之章陵四祠蔑有異等寡恩之譖不聞于當年失禮之議不生于後代以是較之宣哀過舉益明而禮所載為人後者為其父母降而不得祭豈可違而不守哉妖賊單臣等據原武漢縣今屬河南開封府夏四月臧宫破斬之妖賊單臣傅鎮等相聚入原武城自稱將軍詔大中大夫臧宫將兵圍之數攻不下帝召公卿諸侯王問方略皆曰宜重其購賞東海王陽獨曰妖巫相劫勢無久立其中必有悔欲亡者但外圍急不得走耳宜小挺猶言寬也緩令得逃亡逃亡則一亭長足以禽矣帝然之即敕宫撤圍緩賊賊衆分散遂拔原武斬臣鎮等夏六月廢皇太子強為東海王立東海王陽為皇太子改名莊郭后既廢太子強意不自安郅惲説太子曰久處疑位上違孝道下近危殆不如辭位以奉養母氏太子從之數因左右及諸王陳其懇誠願備藩國上不忍遲回者數嵗六月戊申詔曰春秋之義立子以貴東海王陽皇后之子宜承大統皇太子強崇執謙退願備藩國父子之情重久違之其封強為東海王立陽為皇太子改名莊帝以極榮為議郎使授太子經車駕幸太學會諸博士論難于前榮辨明經義每以禮讓相厭不以辭長勝人儒者莫及又詔諸儒生雅歌擊磬盡日乃罷帝復使左中郎將鍾興授皇太子及宗室諸侯春秋賜興爵關內侯興辭以無功帝曰生教訓太子及諸王侯非大功邪興曰臣師少府丁恭于是復封恭而興遂固辭不受文桓榮汝字春卿沛國龍亢人習歐陽尚書鍾興字次汝南陽人丁恭字子然山陽東緡人俱習公羊嚴氏春秋賜雒陽令董宣字少平陳留圉人錢三十萬董宣為雒陽令湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行以奴驂乘宣候之駐車叩馬以刀畫地大言數主之失叱奴下車因格殺之主即還宫訴帝帝大怒召宣欲箠殺之宣叩頭曰願乞一言而死帝曰欲何言宣曰陛下聖德中興而縱奴殺人將何以治天下乎臣不須箠請自殺即以頭擊楹流血被面帝令小黃門持之使叩頭謝主宣不從強使頓之宣兩手據地終不肯俯主曰文叔為白衣時藏亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同因敕強項令出賜錢三十萬宣悉以班諸吏由是能搏擊豪強京師莫不震栗歌之曰桴鼓不鳴董少平宣在縣五年卒秋九月帝如南頓賜復二嵗上幸南陽進幸汝南南頓縣舍置酒會賜吏民復南頓田租一嵗父老前叩頭言願賜復十年帝曰天下重器常恐不任日復一日安敢逺期十嵗乎吏民又言陛下實惜之何言謙也帝大笑復增一嵗甲辰二十年夏四月大司徒涉下獄死大司空融坐免戴涉坐入故太倉令奚涉罪下獄死帝以三公連職策免竇融五月大司馬廣平漢縣故城在今直𨽻廣平府雞澤縣今廣平縣金大定中置侯吳漢卒諡曰忠漢病篤車駕親臨問所欲言對曰臣愚無所知識願陛下慎無赦而已及薨詔送葬如大將軍霍光故事漢性強力每從征伐帝未安常側足而立諸將見戰陳不利或多惶懼漢意氣自若方整厲器械激揚吏士每當出師朝受詔夕則引道初無辦嚴之日及在朝廷斤斤謹質形于體貌故能任職以功名終六月以蔡茂字子禮河內懷人為大司徒朱浮為大司空太子太傅張湛字子孝平陵人為人矜嚴敢直諫常乘白馬帝每見之趣曰白馬生且復諫矣自郭后之廢稱疾不朝帝強起之欲以為大司徒湛固辭疾篤不能復任朝事遂罷之而用茂浮冬十二月遣馬援屯襄國漢縣故城在今直𨽻順德府邢臺縣馬援自交址還平陵孟冀迎勞之援曰方今胸奴烏桓尚擾北邊欲自請擊之男兒當死於邊野以馬革裹尸還葬耳何能卧牀上在兒女手中邪冀曰諒為烈士當如是矣十二月胸奴冦天水扶風上黨援自請擊帝使出屯襄國詔百官祖道援謂黃門郎梁松字伯孫統之子竇固字孟孫融弟友之子曰凡人富貴當可復使賤也如卿等欲不可復賤居高堅自持勉思鄙言乙巳二十一年秋鮮卑冦遼東太守祭彤字次孫遵從弟擊走之先是烏桓鮮卑注見前與丐奴連兵入冦代郡以東尤被其害至是鮮卑萬餘騎寇遼東太守祭彤率數千人迎擊之自被甲陷陳虜大奔投水死者過半遂窮追出塞虜急皆棄兵裸身散走是後鮮卑震怖不敢復窺塞冬西域十八國遣子入侍請都護不許先是莎車王賢遣使奉獻願屬漢復置都護帝不許旋復遣使為請因賜賢西域都護印綬及車旗黃金錦繡敦煌太守裴遵上言戎狄不可假以大權且令諸國失望因詔收還都護印綬更賜賢漢大將軍印綬賢由此始恨至是浸以驕橫欲兼并西域數攻諸國諸國愁懼車師前王鄯善等十八國俱遣子入侍願得都護帝以中國初定北邊未服皆還其侍子厚賞賜之諸國聞都護不出而侍子皆還大憂恐乃與敦煌太守檄願留侍子以示莎車言侍子見留都護尋至冀且息其兵裴遵以狀聞帝許之既而侍子久留敦煌皆愁思亡歸莎車王賢知都護不出擊破鄯善攻殺龜兹音鳩慈前書國治延城去長安七千四百八十里王鄯善王安上書願復遣子入侍更請都護帝仍不許于是鄯善車師復附胸奴丙午二十二年夏五月乙未晦日食秋九月地震冬十月大司空浮免以杜林為大司空以劉昆字桓公陳留東昏人為光祿勳初昆為江陵令縣有火災昆向火叩頭火尋滅後為𢎞農太守虎皆負子渡河帝聞而異之徴昆為光祿勳帝問昆曰前在江陵反風滅火後守𢎞農虎北渡河行何德政而致是事對曰偶然耳左右皆笑帝嘆曰此乃長者之言也顧命書諸策丐奴求和親許之胸奴單于輿死子蒲奴立時胸奴連年旱蝗赤地數千里人畜飢疫死耗大半單于畏漢乘其敝乃遣使詣漁陽求和親帝遣中郎將李茂報命烏桓乘胸奴之弱擊破之胸奴北徙數千里幕南地空詔罷諸邊郡亭候吏卒以幣帛招降烏桓丁未二十三年夏五月大司徒茂卒以玉況姓名玉音肅况字文伯京兆人為大司徒秋八月大司空林卒冬十月以張純為大司空武陵漢郡今湖南常德府是蠻盤瓠之後散居溪洞今湖南諸苗是也反遣將軍劉尚擊之敗沒尚泝沅水出貴州黎平府苗地徑湖南之沅州辰州至常德入洞庭湖九江之一也入武溪即武陵溪出武陵縣武山入沅水輕敵深入蠻乘險要之尚一軍悉沒戊申二十四年春正月胸奴南邊八部立日逐王比為南單于欵塞內附初胸奴呼韓邪單于約諸子皆以次立至單于輿有弟曰知牙師王昭君之子為右谷蠡王以次當為左賢王左賢王次即當為單于輿欲傳其子遂殺知牙師故烏珠留單于之子比為右薁於六反鞬紀言反日逐王領南邊八部見知牙師死內懷猜懼多出怨言庭會稀濶單于疑之乃遣兩骨都侯監領比所部兵及輿死子蒲奴立比益恨望密遣漢人郭衡奉丐奴地圖詣西河太守求內附兩骨都侯頗覺其意勸單于誅比比弟斬將王胸奴日逐王溫禺鞮王斬將王皆有左右是為六角在單于帳下聞之馳以報比比遂聚八部兵四五萬人待兩骨都侯還欲殺之骨都侯且到知其謀亡去單于遣萬騎擊之見比衆盛不敢進而還八部大人乃共議立比為呼韓邪單于欵五原塞願永為藩蔽扞禦北虜事下公卿議者皆以為天下初定中國空虛不可許五官中郎將耿國字叔憲弇之弟獨以為宜如孝宣故事受之令東扞鮮卑北拒胸奴率屬四夷完復邊郡帝從之是冬十月比遂立為南單于奉藩稱臣于是分為南北胸奴秋七月遣馬援征武陵蠻武陵蠻冦臨沅漢縣今曰武陵為常德府治遣謁者李嵩中山太守馬成討之不克馬援請行帝愍其老未許援曰臣尚能披甲上馬帝令試之援據鞍顧盼以示可用帝笑曰矍鑠輕健貌哉是翁遂遣率中郎將馬武耿舒弇之弟等將四萬餘人征五溪水經注武陵有五溪謂雄溪樠溪西溪潕溪辰溪悉是蠻夷所居援謂友人杜愔曰吾受厚恩年迫日索常恐不得死國事今獲所願甘心瞑目但畏長者家兒謂權要子弟或在左右與從事殊難得調介介獨惡是耳己酉二十五年春正月貊人鮮卑烏桓並入朝貢遼東徼外貊人冦邊大守祭彤招降之彤又以財利撫約鮮卑大都護偏何使招致異種絡繹欵塞彤曰審欲立功當擊胸奴斬送頭首乃信耳偏何等即擊胸奴斬二千餘級持首詣郡其後嵗嵗相攻輒送首級受賞賜自是胸奴衰弱邊無冦警鮮卑烏桓並入朝貢是冬遼西烏桓大人郝旦等率衆內屬詔封其渠帥為侯王君長者八十一人使居塞內緣邊諸郡以司徒掾班彪言置烏桓校尉以領之嵗時互市三月戊申晦日食夏新息漢縣後漢侯國故城在今河南光州息縣侯馬援卒于軍詔收其印綬援軍至臨鄉水經注沅南縣城馬援討臨鄉所築今沅南故城在武陵縣古城山上蠻方攻縣迎擊破之斬獲三千餘人餘皆散走先是軍次下雋漢縣故城在今湖南辰州府沅陵縣考元和志續通典俱以下雋故縣在湖北蒲圻今依章懷注有兩道可入從壺頭山名在沅陵縣東水經注壺頭山高一百里廣圓三百里其中紆折千灘則路近而水險從充漢縣故城在今湖南灃州安福縣則塗夷而運逺耿舒欲從充道援以為棄日費糧不如從壺頭扼其咽喉充賊自破事上帝從援策至是進營壺頭賊乘高守隘水疾船不得上會暑甚士卒多疫死援亦中病乃穿岸為室以避炎氣賊每升險鼓譟援輒曵足以觀之左右哀其壯意莫不為之流涕耿舒與兄弇書曰前舒言當先擊充糧雖難運而兵馬得用今壺頭竟不得進大衆拂鬱行死誠可痛惜當賊在臨鄉若夜擊之即可殄滅伏波類西域賈胡到一處輒止以是失利弇得書奏之帝乃使中郎將梁松乘驛責問援因代監軍會援卒松因宿恨遂搆陷援初松嘗候援獨拜牀下援自以松父友不答松意不平援兄子嚴敦並喜譏議通輕俠援在交址還書戒之曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得而言也龍伯高敦厚周慎口無擇言吾愛之重之願汝曹效之杜季良豪俠好義父喪致客數郡畢至吾愛之重之不願汝曹效也效伯高不得猶為謹敕之士所謂刻鵠不成尚類鶩者也效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也伯高山陽長龍述季良越騎司馬杜保也會保仇人上書訟保亂羣惑衆伏波將軍萬里還書以誡兄子而梁松竇固與之交結帝召松固以訟書及援誡書示之松固叩頭流血乃得不罪詔免保官擢拜龍𫐠為零陵太守松由此恨援及是上書搆之帝大怒追收援新息侯印綬初援在交址常餌薏苡實能輕身勝瘴氣軍還載之一車及卒後有譖之者以為昔所載還皆明珠文犀帝益怒援妻孥惶懼詣闕請罪帝乃出松書以示方知所坐賓客故人莫敢弔者前雲陽令朱勃字叔陽援同郡人詣闕上書訟之帝意稍解冬十月監軍謁者宗均矯制告諭羣蠻降之宗均范書列傳作宋南蠻傳作宗袁紀與范書列傳同通鑑因兩據之于此作宗于後均為尚書令則作宋考章懷黨錮傳注引謝承後漢書曰宗資家世為漢名臣祖父均自有傳胡三省亦引趙明誠金石録及宗資墓碑為證謂自均以下姓俱作宗而列傳轉寫為宋誤也據此則後宋均當改作宗但范書袁紀傳世己久通鑑兩據亦存疑之意今依之而具其説于此馬援既卒軍士疫死者大半蠻亦飢困均與諸將議欲權承制降之諸將莫敢應均曰忠臣出境有可以安國家專之可也乃矯制調伏波司馬吕种以詔書入虜營告以恩信因勒兵隨其後羣蠻震怖遂降均為置長吏而還均未至先自劾矯制之罪上嘉其功迎賜以金帛庚戌二十六年春正月詔增百官奉千石以上減于西京舊制六百石以下增于舊秩初作夀陵帝曰古者帝王之葬皆陶人瓦器木車茅馬使後世之人不知其處太宗識終始之義景帝能述遵孝道遭天下反覆而霸陵獨完受其福豈不美哉今所制地不過二三頃無為山陵陂池裁令流水而已使迭興之後與邱隴同體冬徙南單于居西河美稷漢縣故城在今卾爾多斯左翼中旗先是遣中郎將段郴副校尉王郁使南胸奴立單于庭詔聽南單于入居雲中置使胸奴中郎將以領之至是復詔單于徙居西河美稷因使郴郁留西河擁護之令西河長史嵗將騎二千弛刑五百人助中郎將衛護單于冬屯夏罷自後以為常南單于既居西河亦列置諸部王助漢扞戌北地朔方五原雲中定襄鴈門代郡皆領部衆為郡縣偵邏耳目辛亥二十七年夏四月大司徒況卒五月詔三公去大名改司馬曰太尉以趙喜為太尉馮勤為司徒北胸奴求和親不許北胸奴遣使詣武威求和親帝詔公卿廷議不決皇太子言曰南單于新附而反交通北虜臣恐南單于將有二心帝然之告武威太守勿受其使臧宫馬武上書曰虜今人畜疫死旱蝗赤地疲困乏力不當中國一郡今命將臨塞厚縣購賞北虜之滅不過數年詔報曰今國無善政災變不息百姓驚惶人不自保而復欲逺事邊外乎誠能舉天下之半以滅大寇豈非至願茍非其時不如息民自是諸將莫敢言兵事者壬子二十八年夏六月沛太后郭氏薨劉友益書法王太后卒未有書者此其書何廢后也廢后以善終者鮮矣故特書之郭后既廢為中山太后以中山王徙封沛遂復為沛太后后弟況為大鴻臚帝數幸其第賞賜金錢縑帛豐盛莫比京師號况家為金穴至是薨葬北邙詔郭況子璜尚南陽公主帝又以東海王強去就有禮以魯益封之賜虎賁旄頭設鐘虞之樂擬于乘輿秋八月遣諸王就國先是諸王在京師競修名譽招遊士馬援兄子壻王磐莽從兄平阿侯仁之子以遊俠名京師與諸貴戚相友善援決其必敗後果坐事死有子肅出入王侯邸第援謂吕种曰國家諸子並壯交通賔客大獄起矣卿曹戒慎之至是有上書告肅等受誅之家為諸王賔客慮因事生亂會更始子夀光侯鯉得幸于沛王怨劉盆子結客殺故式侯劉恭帝怒沛王坐繫詔獄三日乃得出詔下郡縣收捕諸王賔客相引者以千數吕种亦與禍嘆曰馬將軍真神人也于是諸王俱遣就國以張佚為太子太傅桓榮為少傅上大會羣臣問誰可傅太子者羣臣承望上意皆言太子舅執金吾原鹿後漢侯國即春秋鹿上注見前侯隂識可博士張佚正色曰今陛下立太子為隂氏乎為天下乎即為隂氏則隂侯可為天下則固宜用天下之賢才帝稱善曰欲置傅者以輔太子也今博士不難正朕况太子乎即拜佚為太子太傅以博士桓榮為少傅賜以輜車乘馬榮大會諸生陳其車馬印綬曰今日所蒙稽古之力也可不勉哉北胸奴復乞和親許之北胸奴遣使貢馬及裘更乞和親并請音樂又求率西域諸國胡客俱獻見帝下三府議酬答之宜司徒掾班彪曰北胸奴見南單于來附懼謀其國故數乞和親又逺驅牛馬與漢合市重遣名王多所貢獻臣見其獻益重其國益虛歸念愈數為懼愈多然今既未獲助南則亦不宜絶北羈縻之義禮無不答謂可頗加賞賜略與所獻相當答報之辭令必有適猶當也彪因立藁草並上帝悉納從之癸丑二十九年春二月丁巳朔日食甲寅三十年春二月帝東巡羣臣上言即位三十年宜封禪泰山詔曰即位三十年百姓怨氣滿腹吾誰欺欺天乎曾謂泰山不如林放乎何事汙七十二代封禪書管仲曰古者封泰山襌梁父者七十有二君之編録若郡縣逺遣吏上夀盛稱虛美必髠令屯田于是羣臣不敢復言閏月帝還宫有星孛于紫宫膠東侯賈復卒諡曰剛復從征伐未嘗喪敗數與諸將潰圍解急帝以復敢深入希令逺征而壯其勇節常自從之故少方面之勳諸將每論功伐復未嘗有言帝輒曰賈君之功我自知之乙卯三十一年夏五月大水癸酉晦日食丙辰建武中元元年春正月以第五倫齊諸田徙園陵以次為氏曰第五倫字伯魚長陵人為會稽太守京兆掾第五倫領長安市公平亷介市無姦枉後補淮陽王醫工長王入朝倫隨官屬得會見帝問以政事大悅明日復特召入與語至夕以倫為扶夷漢縣故城在今湖南寶慶府武岡州長未到官追拜會稽太守為政清而有惠百姓愛之二月帝東巡封泰山禪梁隂梁父山之北上讀河圖會昌符讖記之書名曰赤劉之九會命岱宗上感此文乃詔虎賁中郎將梁松等按索河洛讖文言九世當封禪者凡三十六事于是張純等復奏請封禪上乃許焉二月辛卯登封泰山事畢乃下甲午禪于梁父三月司空純卒夏四月帝還宫赦改元六月以馮魴字孝孫南陽湖陽人為司空司徒勤卒京師醴泉出赤草生郡國言甘露降羣臣奏言靈物仍降宜令太史撰集以傳來世帝不納常自謙無德每郡國所上輒抑而不賞故史官罕得而記焉冬十月以李欣東萊人為司徒尊薄太后曰高皇后遷吕太后主于園薄后配食地祗吕后四時上祭十一月甲子晦日食起明堂禮圖建武三十二年作明堂上圓下方十二堂九室室八窗十有二户四面起土作塹上作橋塹中無水去平城門二里所靈臺漢宫閣疏靈臺髙六丈十二門辟雍漢官儀辟雍去明堂三百步水周其外三月九月皆于中行鄉射禮宣布圖讖于天下初上以赤伏符即帝位由是信用讖文多以決定嫌疑給事中桓談上疏諫曰凡人忽于見賢遍反事而貴于異聞觀先王之所紀述咸以仁義正道為本非有竒怪虛誕之事今諸小慧伎數之人增益圖書矯稱讖記其事雖有時合譬猶卜數隻偶之類陛下宜垂明聽發聖意屏羣小之曲説述五經之正義疏奏帝不悅會議靈臺所處帝曰吾欲以讖決之談復極言讖之非經帝大怒曰桓談非聖無法將下斬之談叩頭流血良久乃得解出為六安郡丞道病卒丁巳二年春正月初立北郊祀后土二月帝崩帝崩于南宫前殿年六十三帝每旦視朝日昃乃罷數引公卿郎將講論經理夜分乃寐皇太子見帝勤勞不怠承間諫曰陛下有禹湯之明而失黃老養性之福願頤愛精神優遊自寧帝曰我自樂此不為疲也雖以征誅濟大業及天下既定乃退功臣而進文吏明慎政體總攬權綱量時度力舉無過事故能恢復前烈身致太平時太尉趙喜典喪事會經王莽之亂舊典不存皇太子與諸王雜坐同席藩國官屬出入宫省與百僚無别喜正色橫劍殿階扶下諸王以明尊卑奏遣謁者將護官屬分止他縣諸王並令就邸唯朝晡入臨整禮儀嚴門衛內外肅然山陽王荆作飛書令蒼頭詐稱大鴻臚郭况書與東海王強言其無罪廢黜及郭后黜辱勸令東歸舉兵以取天下且曰寧為秋霜無為檻羊強得書惶怖即執其使上之太子以荆母弟祕其事既即位徙荆為廣陵王後荆以罪自殺國除太子莊即位是為孝明帝尊皇后曰皇太后三月葬原陵在河南府孟津縣西賀善贊曰世祖即位之初首以卓茂為太傳封褒德侯而當時多循吏天下略定即起太學親臨視之而東都盛儒學徴三處士而未造多節義之士其所以祀漢配天以垂二百年之基者蓋在于此然以私愛廢皇后太子信圖讖競事封禪獨此二者不能不為盛德之纍至其加恩廢后母子親黨則又後世人主所難能也夏四月以鄧禹為太傅東平王蒼為驃騎將軍詔曰方今上無天子下無方伯若涉淵水而無舟楫夫萬乘至重而壯者慮輕實賴有德左右小子高密侯禹元功之首東平王蒼寬博有謀其以禹為太傅蒼為驃騎將軍顯宗孝明皇帝戊午永平元年春正月朝原陵帝率公卿以下朝于原陵如元會儀乘輿拜神坐退坐東廂侍衛官皆在神坐後太官上食太常奏樂郡國上計吏以次前當神軒占其郡榖價及民所疾苦是後遂以為常夏五月太傅高密侯鄧禹卒諡曰元東海王強卒劉友益書法廢太子書卒善強之能處廢也帝從太后出幸津門一名津陽門洛陽城南面西門亭發哀使司空持節護喪事贈送以殊禮詔諸王及京師親戚皆會葬秋七月將軍馬武擊燒當羌羌自無弋爰劍之後五世至研研最豪健自後以研為種號又十三世至燒當復豪健子孫遂更號燒當破之初燒當豪滇良羌豪姓名擊破先零奪居其地滇良卒子滇吾與弟滇岸率衆寇隴西于是守塞諸羌皆叛詔謁者張鴻擊之鴻軍敗沒乃遣馬武將四萬人討之事在建武中元二年至是武擊破燒當餘羌皆散走遼東太守祭彤討烏桓大破之罷緣邊屯兵彤使偏裨討赤山後漢書烏桓傳赤山在遼東西北數千里烏桓大破之斬其魁帥塞外震讋西自武威東盡元菟皆來內附野無風塵乃悉罷緣邊屯兵己未二年春正月宗祀宗尊也尊而祀之以配上帝光武皇帝于明堂東平王蒼以為中興三十餘年宜修禮樂乃與公卿共議定南北郊冠冕車服制度胡三省注光武已立南北郊今定其冠冕車服制度及光武廟登歌八佾舞數上之至是宗祀明堂帝及公卿列侯始服冠冕玉佩以行事胡三省注漢承秦敝未能有所制立及中興後明帝始采周官禮記尚書及諸儒記説備哀冕車服之制禮畢登靈臺望雲物三月臨辟雍行大射禮冬十月行養老禮上幸辟雍初行養老禮以李躬為三老老人知天地人之事者桓榮為五更老人知五行代更者三老服都紵績紵以為美布故曰都紵大袍冠進賢古緇布冠也儒者之服扶玉杖長九尺刻玉為鳩置之杖端曰鳩杖亦曰玉杖五更亦如之不杖乘輿到辟雍禮殿御坐東廂遣使者安車迎三老五更于太學講堂天子迎于門屏交禮道自阼階三老升自賓階至階天子揖如禮三老升東面三公設几九卿正履天子親袒割牲執醬而饋執爵而酳祝哽在前祝饐在後五更南面三公進供禮亦如之禮畢引桓榮及弟子升堂上自為下説章懷注謂下語而講説也諸儒執經問難于前冠帶縉紳之人圜橋門而觀聽者蓋億萬計于是下詔賜榮爵關內侯三老五更皆以二千石祿養終厥身賜天下三老酒人一石肉四十斤上自為太子受尚書于桓榮及即帝位猶尊榮以師禮常幸太常府令榮坐東面設几杖會百官及榮門生數百人上親自執業諸生或避位發難上謙曰太師在是既罷悉以大官供具賜太常家榮每疾病帝輒遣使者存問太官太醫相望于道及篤上疏謝恩讓還爵土帝幸其家問起居入街下車擁經而前撫榮垂涕賜以牀茵帷帳刀劔衣被良久乃去自是諸侯將軍大夫問疾者不敢復乘車到門皆拜牀下榮卒帝親自變服臨喪送葬賜冢塋于首山之陽子郁當嗣讓其兄子泛帝不許郁乃受封而悉以租入與之帝以郁為侍中首山即首陽山在河南府偃師縣西北縣有桓榮墓庚申三年春二月太尉喜司徒欣免以郭丹字少卿南陽穰人為司徒虞延字子大陳留東昏人為太尉立貴人馬氏為皇后子炟為皇太子后援之女也光武時以選入太子宫能奉承隂后傍接同列禮則修備上下安之遂見寵異及帝即位為貴人時后前母姊女賈氏亦以選入生皇子炟帝以后無子命養之謂曰人未必當自生子但患愛養不至耳后于是盡心撫育勞悴過于所生太子亦孝性淳篤母子慈愛始終無纖介之間后常以皇嗣未廣薦達左右若恐不及後宫有進見者每加慰納若數所寵引輒增隆遇及有司奏立長秋宫帝未有所言皇太后曰馬貴人德冠後宫即其人也后既正位宫闈愈自謙肅好讀書常衣大練裙不加緣朔望諸姬主朝請望見后袍衣疏粗以為綺縠就視乃笑后曰此繪特宜染色故用之耳羣臣奏事有難平者帝數以試后后輒分解趣理各得其情然未嘗以家私干政事帝由是寵敬始終無衰焉圖畫中興功臣于雲臺在河南府洛陽縣束水南堡帝思中興功臣乃圖二十八將于南宫雲臺以鄧禹為首次馬成吳漢王梁賈復陳俊耿弇杜茂寇恂傅俊岑彭堅鐔馮異王霸朱祐任光祭遵李忠景丹萬修蓋延邳彤銚期劉植耿純臧宫馬武劉隆又益以王常李通竇融卓茂合三十二人馬援以椒房之親獨不與焉夏六月有星孛于天船天官書天船有九星在大陵北一曰舟星北大起北宫既而罷之時天旱尚書僕射鍾離意字子阿會稽山隂人詣闕免冠上疏曰昔成湯遭旱以六事自責切見北宫大作民失農時自古非苦宫室小狹但患民不安寧宜且罷止以應天心帝䇿詔報曰湯引六事咎在一人其冠履勿謝又敕大匠止作諸宫減省不急詔因謝公卿百僚遂應時澍雨帝性𥚹察好以耳目隱發為名公卿大臣數被詆毁近臣尚書以下至見提曵常以事怒郎藥嵩以杖撞之嵩走入牀下帝怒甚疾言曰郎出嵩乃曰天子穆穆諸侯皇皇未聞人君自起撞郎帝乃赦之秋八月壬申晦日食詔曰昔楚莊無災以致戒懼説苑楚莊王曰天不見妖天其忘豫能求過于天也魯哀禍大天不降譴春秋感精符魯哀公政亂而不曰食告之不悟也今之動變倘尚可救有司勉思厥職以匡無德冬十月帝奉皇太后如章陵車駕從皇太后幸章陵荆州刺史郭賀字喬卿雒陽人官有殊政上賜以三公之服黼黻冕旒敕行部去襜帷使百姓見其容服以彰有德辛酉四年春帝如河內不至而還帝近出觀覽城第欲遂校獵河內東平王蒼上書諫帝覽奏即還宫冬十月司徒丹司空魴免以范遷字子廬沛國人為司徒伏恭字叔齊湛兄子為司空梁松以罪下獄死松坐怨望縣讀曰懸飛書誹謗下獄死初上為太子大中大夫鄭興子衆以通經知名太子及山陽王劓因梁松以縑帛請之衆曰太子儲君無外交之義漢有舊防藩王不宜私通賓客松曰長者意不可逆衆曰犯禁觸罪不如守正而死遂不往至是松敗賔客多坐之惟衆不染于辭經衆字仲師以明給事中壬戌五年春正月驃騎將軍蒼罷歸藩東平王蒼自以至親輔政聲望日重意不自安前後纍上疏稱自漢興以來宗室子弟無得在公卿位者乞上驃騎將軍印綬退就藩國辭甚懇切至是帝乃許蒼還國而不聽上將軍印綬以驃騎長史為東平太傅掾為中大夫令史為王家郎安豐侯竇融卒諡曰癸亥六年春二月王雒山胡三省注據本紀山在廬江郡雒或作雄出寶鼎詔禁章奏浮詞詔曰祥瑞之降以應有德方今政化多辟何以致兹易曰鼎象三公豈公卿奉職得其理邪其賜三公帛五十匹九卿二千石半之先帝詔書禁人上事言聖而間者章奏頗多浮詞自今若有過稱虛譽尚書皆宜抑而不省示不為諂子嗤也甲子七年春正月皇太后崩諡尤烈合葬原陵以宋均字叔庠南陽安衆人為尚書令此宋均即前矯制降蠻之宗均也説已具前初均為九江守五日一聽事悉省掾史閉督郵府內屬縣無事百姓安業九江舊多虎暴常募設檻穽而猶多傷害均下記屬縣曰夫江淮之有猛獸猶北土之有雞豚也今為民害咎在殘吏而勞勤張捕非憂恤之本也其務退姦貪思進忠善可一去檻穽除削課制其後無復虎患民傳言虎皆渡江而東去時楚沛多蝗其至九江境者輒東西散去由是逺近益稱之帝聞均名故任以樞機均謂人曰國家喜文法亷吏以為足以止姦也然文吏習為欺謾亷吏清在一已無益百姓均欲叩頭爭之時未可改久乃可言耳會遷司隸校尉未及言後帝聞而善之乙丑八年春正月司徒遷卒三月以虞延為司徒趙喜行太尉事始置度遼營以中郎將吳棠行將軍事北單于求合市帝許之遣越騎司馬鄭衆往報命南胸奴須卜骨都侯知漢與北虜交使內懷嫌怨欲叛密使人詣北庭令遣兵迎之鄭衆出塞疑有異伺候果得須卜使人乃上言宜更置大將以防二虜交通先是大司農耿國請置度遼將軍屯五原朝廷不從至是乃置度遼營以中郎將吳棠行將軍事將黎陽虎牙營士漢官儀光武以幽冀兵定天下故于黎陽立營屯五原鄭衆北使時單于欲令衆拜衆不肯屈單于脅之衆拔刀自誓單于恐而止乃更發使隨衆還京師帝欲復遣衆報之衆因上言臣前奉使不拜單于恚恨今復銜命必見陵折帝不聽衆不得已既行連上書固爭之詔追還繫廷尉會故歸家後帝見胸奴來使聞衆與單于爭禮之狀乃復召衆為軍司馬秋雨水郡國凡十四始遣使之天竺即身毒國注見前求佛法得其書及沙門至京師汪克寬考異漢明帝始求佛法綱目闕不書綱朱子所云未及細看者此也今依汪氏説補書初帝聞西域有神其名曰佛因遣使之天竺求其道得其書及沙門以來其言大抵以虛無為宗貴慈悲不殺以為人死精神不滅隨復受形生時所行善惡皆有報應故所貴修練精神以至為佛善為宏闊勝大之言以勸誘愚俗精于其道者號曰沙門于是中國始傳其術圖其形像而王公貴人獨楚王英最先好之袁宏曰浮屠者佛也佛者漢言覺言將覺悟羣生也沙門者漢言息謂息意去欲而歸于無為也魏收曰漢武帝獲休屠王金人列于甘泉宫不祭祀但焚香禮拜此則佛道流通之漸哀帝元夀元年博士弟子秦景憲受大月氏王使伊存口授浮屠經中國聞之未盡了也後明帝夜夢金人頂有白光飛行殿底乃訪羣臣傅毅始以佛對帝遣郎中蔡愔等使天竺寫浮屠遺範仍與沙門攝摩騰竺法蘭東還洛陽中國有沙門跪拜之法自此始愔之還以白馬負經而至因立白馬寺于洛城雍關西冬十月壬寅晦日食既詔羣司極言復以示百官詔羣司勉修職事極言無諱于是在位者皆上封事各言得失帝覽章深自引咎以所上班示百官丙寅九年夏四月詔司隸刺史歲考長吏殿最以聞詔司隸校尉部刺史歲上墨綬長吏秩四百石至二百石是為長吏皆銅印墨綬視事三歲以上治狀尤異者各一人與計偕上及尤不治者亦以聞大有年劉友益曰書大有年始此胸奴遣子入學帝崇尚儒學自皇太子諸王侯及大臣子弟功臣子孫莫不受經又為外戚樊氏郭氏陰氏馬氏諸子立學于南宫號四姓小侯置五經師搜選髙能以授其業自期門羽林之士悉令通孝經章句胸奴亦遣子入學丁卯十年夏閏四月帝如南陽上幸南陽召校官弟子作雅樂奏鹿鳴帝自御塤音喧亦作塤箎音池皆樂器孔頴逹曰土曰塤竹曰箎和之以娛賔客以丁鴻字孝公潁川定陵人為侍中初陵陽漢縣故城在今江南池州府石埭縣侯丁綝字幼春卒子鴻當襲封上書稱病讓國于弟盛不報既葬乃挂衰絰于冢廬而逃去友人九江鮑駿遇鴻于東海讓之曰昔伯夷吳札亂世權行故得伸其志耳今子以兄弟私恩而絶不滅之基可乎鴻感悟垂涕乃還就國鮑駿因上書薦鴻經學至行上徴為侍中戊辰十一年春正月東平王蒼來朝蒼與諸王俱來朝月餘還國帝臨送歸宫悽然懷思乃遣使手詔賜東平國中傅曰辭别之後獨坐不樂因就車歸伏軾而吟瞻望永懷實勞我心誦及采菽小雅詩篇名詩序刺幽王于諸侯來朝不能錫命以禮也以增歎息日者問東平王處家何等最樂王言為善最樂其言甚大副是要讀為腰腹矣今送列侯印十九枚諸王子年五歲以上能趨拜者皆令帶之己巳十二年春正月哀牢今雲南永昌府古哀牢國內附哀牢夷者九隆種也後漢書南蠻傳哀牢之先有婦人曰沙一居牢山捕魚水中觸沈木有感懷妊産子男十人後沈木化為龍出水上九子驚走小子不能去背龍而坐龍因舐之其母鳥語謂背為九謂坐為隆因名子曰九隆後牢山下有一夫一婦生十女九隆兄弟娶以為妻後漸滋長牢山即九隆山在今永昌府保山縣西絶域荒外山川阻深未嘗通中國至是其王柳貌率衆五萬餘户內屬以其地置哀牢故城在今保山縣博南故城在今永昌府永平縣二縣帝既立二縣乃罷益州西部都尉置永昌郡始通博南山度蘭倉水行者苦之歌曰漢德廣開不賓度蘭倉為他人後漢永昌郡治不韋故城在今保山縣博南山在今永平縣西南一名金浪巔山俗訛為丁當丁山蘭倉水即今蘭滄江源出西蕃鹿石山由麗江府流入徑大理永昌順寧蒙化景東諸府境其下流徑車里至交址入南海明李元陽等所指為禹貢黑水者也夏四月修汴渠隄章懷曰汴渠即蒗蕩渠也自滎陽首受河宋張洎曰禹于滎澤下分大河為隂溝引注東南以通淮泗至大梁西北復分為二渠一渠徑陽武中牟為官渡水一渠謂之鴻溝亦曰蒗蕩渠渠兼邲之稱祕音汳古人避反字故改從汴曰考汴河源出滎陽為蒗蕩渠東流曰官渡水曰隂溝汳水其在大梁城南分流者為鴻溝鴻溝南流兼沙水之目沙水支津又為睢水渦水名雖不一實則委别而源同也王莽詩河決入汴勢並東侵永平中治汴渠河汴遂各分流至隋大業初開通濟渠引榖洛水逹于河自板渚引河逹淮通濟渠即蒗蕩渠也由是黃河復與汴通宋都大梁歲漕江淮湖浙之粟全藉汴以逹京師故諸水莫此為重其後黃河屢決至元泰定初河徙陽武而南奪汴入泗以逹于淮于是汴河之故道遂不復可考至正時賈魯引滎陽京索諸水由鄭州中牟至開封之朱仙鎮此本宋京水河建隆時所開其流亦與汴通日久淤塞魯復開之後遂名為賈魯淮河今河下流至陳州入潁以逹于初平帝時河汴決壞久而不修建武十年光武欲修之浚儀漢縣注見前令樂俊上言民新被兵革未宜興役乃止其後汴渠東浸日月彌廣兖豫百姓怨歎會有薦樂浪王景字仲通樂浪邯人能治水者夏四月詔發卒數十萬遣景與將作謁者王吳修汴渠隄自滎陽東至千乘海口胡渭曰此大河之所經也不言河者蓋建都洛陽東南之漕全資汴渠故惟此為急河汴分流則進道無患治河所以治汴也千有餘里景啇度地勢鑿山開澗防遏衝要疏決壅積十里立一水門令更相洄注無復潰漏之患雖簡省費役然猶以百億計明年夏隄成河汴分流復其舊迹胡渭曰河雖徙自周定王時然入海猶是禹河故道至王莽時始改從千乘入海而王景遂因之蓋景啇度地勢然後興工不復禹河則必用新河也秋七月司空恭罷以牟融字子優北海安邱人為司空庚午十三年冬十月壬辰晦日食十一月楚王英有罪廢徙丹陽後漢丹陽郡治宛陵今江南寧國府宣城縣是楚王英與方士作金龜玉鶴刻文字為符瑞男子燕廣告英與漁陽王平顔忠等造作圖書有逆謀事下案驗有司奏英大逆不道請誅之帝不忍廢英徙丹陽涇縣漢縣今屬寧國府辛未十四年春三月司徒延有罪自殺先是有私以英謀告司徒虞延者延以英藩戚至親不然其言及英事覺詔書切讓延延自殺夏四月以邢穆字綏公兒人為司徒故楚王英自殺英至丹陽自殺詔以諸侯禮葬于涇封燕廣為折姦侯是時窮治楚獄遂至纍年其辭語相連自京師親戚諸侯州郡豪傑及考案吏阿附坐死徙者以千數而繫獄者尚數千人吳郡太守尹興及門下掾陸續等微詣廷尉就考續備受五毒終無異辭其母自吳來雒陽作食以饋續對食悲耳泣不自勝治獄者問其故續曰母來不得見故泣問何以知之續曰母截肉未嘗不方斷蔥以寸為度故知之使者以狀聞帝乃赦興等禁錮終身陸續字智初吳人時上怒甚吏皆惶恐諸所連及率一切陷入無敢以情恕者侍御史寒朗寒氏出周武王子寒侯之後朗字伯奇魯國薛人心傷其冤言之于帝帝怒朗曰臣見考囚在事者咸言妖惡大故臣子所宜同疾今出之不如入之可無後責是以考一連十考十連百又公卿朝會陛下問以得失皆長跪言舊制大罪禍及九族陛下大恩裁止于身天下幸甚及其歸舍口雖不言而仰屋竊歎莫不知其多寃無敢牾陛下言者臣今所陳誠死無悔帝意解詔遣朗出後二日車駕自幸洛陽獄録囚徒理出千餘人時天旱即下雨馬后亦以楚獄多濫乘間為帝言之帝惻然感悟夜起倣徨由是多所降宥詔有司有能治劇者以袁安為楚郡太守安到郡不入府先至獄所理其無明驗者條上出之府丞掾史皆叩頭爭以為阿附反虜法與同罪不可安曰如有不合太守自當坐之不以相及也遂分别具奏帝感悟即報許得出者四百餘家𡊮安字邵公汝南汝陽人壬申十五年春二月帝東巡耕于下邳至魯詣孔子宅帝親詣講堂命皇太子諸王説經封子六人為王封皇子恭為巨鹿王黨為樂成即樂城故城在今直𨽻河間府獻縣王衍為下邳王暢為汝南王昞為常山王長為濟陰巨鹿下邳汝南常山濟隂注俱見前王帝親定其封域裁令半楚淮陽馬后曰諸子食數縣于制不巳儉乎帝曰我子豈宜與先帝子等嵗給二千萬足矣癸酋十六年春二月遣太僕祭彤都尉竇固等伐北胸奴固取伊吾盧地今哈密是唐于此置伊州為伊吾郡彤不見虜而還下獄免遂卒先是謁者僕射耿秉字伯初國之子數上言請擊胸奴帝令顯親侯竇固太僕祭彤等議之乃以秉為駙馬都尉固為奉車都尉以騎都尉秦彭字伯平茂陵人為秉副耿忠弇之子為固副皆置從事司馬出屯涼州後漢涼州刺史治隴縣故城在今秦州清水縣至是諸將分四道出塞祭彤出髙開竇固出酒泉耿秉出居延來苗出平城伐北胸奴竇固破呼衍王胸奴南部王于天山此北祁連也注詳前取伊吾盧地置宜禾都尉留兵屯之耿秉擊胸林王胡三省注胸當作句胸奴嘗遣句林王迎盧芳絶幕六百里乃還來苗至胸河水前書陳瓚注水去令居千里上虜皆奔走無所獲祭彤與南胸奴左賢王信期至涿邪山注見前信有嫌於彤出塞九百里得小山妄以為涿邪不見虜而還彤坐逗留下獄免彤自恨無功出獄數日歐血死後烏桓鮮卑使至京師過彤冡皆拜謁號泣遼東吏民為立祠四時祭之夏五月司徒穆有罪下獄死淮陽王延性驕奢而遇下嚴烈有上書告延與姬兄謝弇及姊壻韓光招姦猾作圖讖祠祭祝詛事下案驗弇光及司徒邢穆皆坐死所連及死徙者甚衆戊午晦日食以王敏字叔公并州隰城人為司徒秋七月徙淮陽王延為阜陵後漢縣故城在今江南滁州全椒縣王有司奏請誅延上以延罪薄于楚王英徙封阜陵食二縣北胸奴寇雲中太守亷范字叔度杜陵人擊却之北胸奴大入雲中太守亷范率士卒拒之虜衆盛范兵不敵會日暮范令軍士各交縳兩炬三頭爇火營中星列虜謂漢兵救至大驚待旦將退范令軍中蓐食晨往赴之斬首數百級虜自相轔藉死者千餘人由是不敢向雲中范後遷蜀郡太守成都邑宇逼隘舊制禁民夜作以防火災范至毁削先令嚴使儲水百姓便之歌曰亷叔度來何暮不禁火民安作平生無檽今五袴甲戌十七年春正月謁原陵上當謁原陵夜夢先帝太后如平生歡既寤悲不能寐即于明旦率百官上陵其日甘露降于陵樹上令百官采取以獻二月司徒敏卒三月以鮑昱字文泉永之子為司徒白狼等國入貢益州刺史朱輔梁國人宣示漢德威懷逺夷自汶山今四川茂州是以西前世所不至正朔所未加白狼槃木皆西南逺夷國名等百餘國皆舉種稱臣奉貢白狼王唐菆作詩三章歌頌漢德輔使掾田恭譯而獻之詔下史館録其歌焉西域諸國遣子入侍後漢書明帝紀西域諸國遣子入侍係于十七年三月通鑑載在十六年綱目因之今依范書竇固使假司馬班超字仲升彪之少子與從事郭恂俱使西域超行到鄯善鄯善王廣奉超禮敬甚備後忽更疏懈超謂其官屬曰此必北虜使來狐疑未知所從故也乃召侍胡詐之曰胸奴使來數日今安在乎侍胡惶恐曰到已三日去此三十里超乃閉侍胡悉會其吏士三十六人與共飲酒酣因激怒之超曰卿曹與我俱在絶域今虜使到裁數日而王廣禮敬即廢如令鄯善收吾屬送胸奴骸骨長為豺狼食矣奈何衆曰危亡之時死生從司馬超曰丈夫不入虎穴不得虎子為今之計獨有因夜以火攻虜使彼必大震怖可殄盡也滅此虜則鄯善破膽功成事立矣衆皆曰善初夜共奔虜營殺胸奴使者會天大風超令十人持鼓藏虜舍後約曰見火燃皆當鳴鼓大呼餘人悉持兵弩夾門而伏超乃順風縱火前後鼓譟虜衆驚亂超手格殺三人吏兵斬其使及從士三十餘級餘患燒死明日告郭恂恂始大驚已乃悅召鄯善王以虜使首示之一國震怖超曉告撫慰遂納子為質還白竇固固大喜具上超功效帝以超為軍司馬今遂前功當是時于闐王廣德攻破莎車莎車王賢以女妻廣德廣德攻莎車誘賢而殺之雄張南道胸奴遣使護其國龜兹王建攻殺疏勒王而立其臣兜題為王倚恃虜威據有北道超將其前所從三十六人先至于聞廣德禮意甚疏且信其巫言求取超騧馬超佯許之令巫自來取巫至超即斬其首以示廣德且責讓之廣德素聞超在鄯善誅滅虜使大惶恐即攻殺胸奴使者而降超重賜之因鎮撫焉巳從間道至疏勒遣吏田慮先往降之敕慮曰兜題本非疏勒種國人必不用命若不即降便可執之慮既到兜題見慮輕弱無降意慮因其無備遂前劫縳兜題左右出不意皆驚走慮馳報超超即赴之悉召疏勒將吏説如字以龜兹無道之狀因立其故王子忠釋兜題而遣之國人大悅由是諸國皆遣子入侍西域與漢絶六十五載至是復通冬十一月遣竇固等擊車師降之復置西域都護戊巳校尉竇固耿秉擊西域定車師車師前王即後王之子其庭相去五百里耿秉先擊後王斬數千級後王安得震怖脫帽抱馬足降前王遂亦歸命于是固奏復置西域都護及戊巳校尉以陳睦為都護司馬耿恭字伯宗國弟廣之子為戊校尉屯後王部金蒲城通典金蒲城即車師後王所治務塗谷今庭州蒲類縣是也五唐庭州在今土魯番北百里謁者關寵為巳校尉屯前王部桞中城明史西域傳柳城一名魯城即後漢桞中地西域長史所治唐于此置柳中縣東去哈密千里乙亥十八年春二月北胸奴擊殺車師後王安得遂攻戊校尉耿恭恭擊却之北單于遣左鹿蠡王率二萬騎擊車師耿恭遣其司馬救之軍盡沒胸奴遂殺車師後王安得而攻金蒲城恭以毒藥傳矢語胸奴曰漢家箭神中創者必有異因發弩射之虜應弦而倒視創若沸大驚相謂曰漢兵神可畏也遂解去恭以疏勒城胡三省曰此疏勒城在車師後部非疏勒國城也傍有澗水可固引兵據之已而胸奴復來攻擁絶澗水恭于城中穿井十五丈不得水吏士渴乏恭整衣服向井再拜為吏士禱身自挽籠有頃飛泉湧出恭令吏士揚水以示虜虜益大驚復引去夏六月有星孛于太微注見前秋八月帝崩帝崩于東宫前殿年四十八遺詔無起寢廟藏主于光烈皇后更衣别室帝遵奉建武制度無所變更后妃之家不得封侯與政館陶公主為子求郎不許而賜錢千萬謂羣臣曰郎官上應列宿出宰百里茍非其人則民受其殃是以難之公車以反支日潛夫論注反支日用月朔日為正戌亥朔一日反支申酉朔二日反支午未朔三日反支辰巳朔四日反支寅卯朔五日反支子丑朔六日反支不受章奏帝聞而怪曰民廢農業逺來詣闕而復拘以禁忌豈為政之意乎于是遂蠲其制故吏稱其官民安其業逺近畏服户口滋殖焉太子炟即位是為孝章帝尊皇后曰皇太后葬顯節陵在河南府洛陽縣東南史臣曰明帝濁令分明日晏坐朝幽枉必逹內外無幸曲之私在上無矜大之色斷獄得情號居前代十二故後之言事者莫不先建武永平而鍾離意宋均之徒常以察慧為言夫豈度之未優邪冬十月以趙喜為太傅牟融為太尉並録尚書事總領衆事也尚書有録名蓋始于此猶冢宰總已之羲十一月以第五倫為司空倫為蜀郡太守在郡公清所舉吏多得其人故帝自逺郡用之西域攻沒都護陳睦北胸奴圍己校尉關寵車師叛與胸奴共圍耿恭詔酒泉太守段彭將兵救之焉耆居南河城東去洛陽八千二百里龜兹攻沒都護陳睦北胸奴圍關寵于桞中會中國有大喪救兵不至車師復叛與胸奴共攻耿恭恭率厲士卒禦之數月食盡窮困乃煮鎧弩食其筋革恭與士卒推誠共死生故皆無二心而稍稍死亡餘數十人單于知恭已困遣使招恭恭誘其使上城手擊殺之單于怒益兵圍恭不能下寵上書求救詔公卿會議司空倫以為不宜救司徒昱曰今使人于危難之地急而棄之胸奴如復犯塞為寇陛下將何以使將帝乃遣段彭將兵救之以馬廖字敬平為衛尉防字江平為中郎將光為越騎校尉三人皆馬子太后兄弟終明帝世未嘗改官帝以廖為衛尉防為中郎將光為越騎校尉廖等輕身交結冠蓋之士爭赴趣之第五倫上疏曰臣聞傳曰大夫無境外之交束修之饋榖梁傳文竊聞衛尉廖私贍三輔衣冠知與不知莫不畢給臣皇恐不敢不以聞臣今言此誠欲上忠陛下下全后家也肅宗孝章皇帝丙子建初元年春正月詔廩贍飢民時京師及兗豫徐三州大旱詔以見榖賑給實核其尤貧者計所貸並與之上問司徒鮑昱何以消復旱災對曰陛下始踐天位雖有失得未能致異臣前為汝南太守典治楚事繫者千餘人恐未能盡當其罪夫大獄一起寃者過半又諸徒者骨肉離分孤魂不祀宜一切還諸徙家蠲除禁錮使死生獲所則和氣可致帝納其言明年詔還坐楚及淮陽事徙者四百餘家詔二千石勸農桑慎選舉時承永平故事政尚嚴切尚書陳寵字昭公沛國洨人上疏曰臣聞先王之政賞不僭刑不濫與其不得已寧僭無濫往者斷獄嚴切所以威懲姦慝姦慝既平必宜濟之以寬夫為政猶張琴瑟大絃急者小絃絶陛下宜隆先王之道以濟羣生全廣至德帝深納寵言第五倫亦疏言郡國所舉類多辦職俗吏殊未有寬博之選以應上求宜務進仁賢以任時政則風俗自化又聞諸王主貴戚驕奢踰制京師尚然何以示逺故曰其身不正雖令不行以身教者從以言教者訟上善之車師復降罷都護及戊巳校尉官段彭等擊車師斬獲數千北胸奴驚走車師復降會關寵已沒謁者王蒙等欲引兵還耿恭軍吏范羌時在軍中先是恭遣羌至敦煌迎兵士寒服因隨王蒙軍出塞固請迎恭諸將不敢前乃分兵二千人與羌迎恭俱歸吏士飢困發疏勒時尚有二十六人隨路死殁三月至玉門惟餘十三人中郎將鄭衆奏恭以單兵守孤城當胸奴數萬之衆鑿山為井煮弩為糧殺傷醜虜數百千計卒全忠勇不為大漢恥宜蒙顯爵以勵將帥詔拜恭騎都尉悉罷戊巳校尉及都護官徴還班超超將發還疏勒憂恐其都尉黎弇曰漢使棄我我必為龜兹所滅耳因以刀自剄至于置王侯以下皆號泣抱超馬腳不得行超亦欲遂其本志乃還疏勒疏勒兩城已降龜兹而興尉頭連兵超斬捕反者擊破尉頭疏勒復安尉頭國名前書國治尉頭谷去長安八千六百五十里南接疏勒三月山陽東平地震詔舉賢良方正直言極諌之士秋七月詔以上林池籞田賦與貧人八月有星孛于天市天官書房為天駟東北曲二星曰旗旗中四星曰天市丁丑二年春三月詔三公糾非法詔曰貴戚奢縱無度有司莫舉三公並宜明糾非法在事者備為之禁夏四月大旱上欲封爵諸舅太后不聽會大旱言事者以為不封外戚之故太后下詔曉諭詔曰昔王民五侯同日俱封黃霧四塞不聞澍雨之應夫外戚貴盛鮮不傾覆故先帝防慎舅氏不令在樞機之位又言我子不當與先帝子等今有司奈何欲以馬氏比隂氏乎吾為天下母而身服大練食不求甘左右但著帛布無薰香之飾者欲身率下也以為外戚見之當傷心自敕但笑言太后素好儉前過濯龍門上見外家問起居者車如流水馬如遊龍蒼頭衣緑褠領袖正白顧視御者不及逺矣故不加譴怒但絶嵗用冀以默愧其心猶懈怠無憂國忘家之慮知臣莫若君況親屬乎吾豈可上負先帝之旨下虧先人之德重襲西京敗亡之禍哉帝省詔悲歎復重請之太后曰吾豈徒欲獲謙讓之名而使帝受不外施之嫌哉髙祖約無軍功不侯今馬氏無功于國豈得與陰郭中興之后等邪嘗觀富貴之家祿位重疉猶再實之木其根必傷吾計之熟矣勿有疑也夫至孝之行安親為上今數遭變異榖價數倍憂惶晝夜不安坐卧而欲先營外封違慈母之拳拳乎若陰陽調和邊境清寧然後行子之志吾但當含飴弄孫不能復關政矣上乃止太后嘗詔三輔諸馬昏親有屬託郡縣于亂吏治者以法聞其有謙素義行者輒假借溫言賞以財位其美車服不遵法度者便絶屬籍遣歸田里于是內外從化被服如一置織室蠶于灈龍中數往觀視以為娛樂常與帝言政事及教授小王論語經書述敘平生雍和終日冬十二月有星孛于紫宫戊寅三年春三月立貴人竇氏為皇后后勳之女也竇勳融之孫后母即東海恭王女沘陽公主馬防耿恭擊燒當羌大破之詔徴防還下恭獄燒當羌反遣將軍馬防校尉耿恭擊之第五倫疏言貴戚可封侯以富之不可任以職事何者繩以法則傷恩私以親則違憲馬防今當西征卒有纖介難為意愛帝不從遂降燒當羌防還京師拜車騎將軍留恭擊諸未服者斬降凡十三種數萬人恭嘗以言事忤防初恭出隴西上言薦竇固鎮撫涼部由是大忤于防監營謁者李談承旨奏恭不憂軍事被詔怨望坐徴下獄免官夏四月罷治滹沱注見前石臼河亦曰濊河舊自直隸正定府平山縣北東流入滹沱今堙初顯宗之世治滹沱石臼河從都慮音閭水經注作盧地闕至羊腸倉今山西太原府交城縣東南有羊腸坂水經注羊腸在晉陽西北漢積粟在斯謂之羊腸倉石磴縈委如羊腸然故名欲令通漕才效反水運也吏民苦役連年無成帝以鄧訓字平叔禹第六子為謁者使監領其事訓考量隱括考究量度隱括撮其要也知其難成具以上言詔罷其役更用驢輦嵗省費億萬計全活數千人己邜四年夏四月立子慶為皇太子五月封馬廖等為列侯有司連據舊典請封諸舅帝以天下豐稔方垂無事遂封三舅廖防光為列侯廖順陽侯防潁陽侯光許侯太后聞之曰吾少壯時但慕竹帛志不顧命言慕古人書名竹帛不顧命之長短今雖已老猶戒之在得故日夜惕厲思自降損不負先帝所以化導兄弟共同斯志何意老志不從萬年之日長恨矣廖等辭讓不許乃受爵而辭位皆以特進就第六月皇太后馬氏崩諡明德合葬顯節陵帝既為太后所養専以馬氏為外家故賈貴人不登極位親族無受寵榮者及太后崩乃䇿書加賈貴人王赤綬輿服志諸侯王赤綬貴人緣綬今加貴人以王之綬也安車一駟宫人二百御府雜帛二萬匹大司農黃金千斤錢二千萬而已冬十一月詔諸儒會白虎觀議五經同異校書郎楊終字子山蜀郡成都人言章句之徒破壞大體宜如宣帝石渠故事事具前永為後世則于是下詔太常將大夫博士議郎郎官及諸生諸儒會白虎觀講議五經同異使五官中郎將魏應字君伯任城人承制問侍中淳于恭字孟孫北海淳于人奏帝親稱制臨決作白虎議奏今白虎通丁鴻鴻難最明時人歎曰殿中無雙丁孝公樓望字次子雍邱人成封時為少府桓郁字仲恩榮之子班固字孟堅彪之子賈逵字景伯平陵人兼通諸經尤明左氏傳及廣平王羡明帝子後徙封陳皆與焉庚辰五年春二月庚辰朔日食舉直言極諫夏五月以直言士補外官詔曰上天降異憂心慘切公卿以下各舉直言極諌能指朕過失者其以巖穴為先勿取浮華夏五月復詔曰朕思遲直士側席異聞其先至者各以發憤吐悶略聞子大夫之志矣皆欲置于左右顧問省納建武詔書又曰堯試臣以職不直以言語筆札今外官多曠並可以補任遣弛刑弛刑徙也義從胡三省注自奮願從行者或曰義從胡也就班超平西域初超率疏勒康居於置拘彌居寧彌城去洛陽萬二千八百里兵十萬人攻姑墨前書國治南城去長安八千一百五十里石城破之斬首七百級超欲因此叵猶遂也平諸國乃上疏請兵曰西域諸國莫不向化唯焉耆龜兹獨未服從今宜拜龜兹侍子白霸為其國王以步騎數百送之因與諸國連兵嵗月之間龜兹可禽以夷狄攻夷狄計之善也莎車疏勒田地肥廣草木饒衍不比敦煌鄯善間兵可不費中國而糧食自足且姑墨溫宿前書國治溫宿城去長安八千三百五十里二王特為龜兹所置既非其種更相厭苦其勢必有降者若二國來降則龜兹自破願下臣章參考行事臣超區區特蒙神靈竊計未便僵仆目見西域平定陛下舉萬年之觴薦勳祖廟布大喜於天下書奏帝知其功可成議欲給兵會平陵人徐幹素與超同志上疏願奮身佐超遂以幹為假司馬將弛刑及義從千人就超先是莎車以漢兵不出遂降于龜兹而疏勒都尉番辰亦叛超遂與幹擊畨辰大破之欲進攻龜兹以烏孫兵強宜因其力乃上言烏孫大國控弦十萬可遣使招慰輿共合力帝納之辛巳六年夏六月辛未晦日食壬午七年春正月沛王輔等來朝帝以諸王將入朝遣謁者賜貂裘食物珍果又使大鴻臚持節郊迎帝親自循行邸第豫設帷牀錢帛器物無不充備既至詔沛名輔濟南名康東平名蒼中山名焉王皆光武子贊拜不名升殿乃拜上親答之每入宫輒以輦迎至省閣乃下上為之興席改容皇后親拜于內皆鞠躬辭謝不自安三月諸王歸國詔留東平王蒼于京師已而有司復奏遣蒼歸國手詔蒼曰骨月天性誠不以逺近為親疏然數見顔色情重昔時念王久勞思得還休欲署大鴻臚奏不忍下筆顧授小黃門中心戀戀惻然不能言于是車駕親送流涕而别夏六月廢太子慶為清河王立子肇為皇太子初帝納扶風宋楊宋昌七世孫楊姑即明德皇后之外祖母也二女為貴人大貴人生太子慶梁竦字叔敬松之弟二女亦為貴人小貴人生皇子肇竇皇后無子養肇為子宋貴人有寵于馬太后太后崩竇皇后寵盛謀陷宋氏誣言欲為厭勝之術乃廢慶為清河王以肇為皇太子出宋貴人使小黃門蔡倫桂陽人按之皆承風旨傅致其事二貴人皆飲藥自殺慶時雖幼亦知避嫌畏禍言不敢及宋氏帝憐之敕皇后令衣服與太子齊等太子亦親愛慶入則共室出則同輿太子肇既立梁氏私相慶皇后以是忌梁貴人數譛之陷竦以惡逆死獄中家徙九真兩貴人皆以憂死秋九月帝如偃師遂至河內詔曰車駕行秋稼觀收穫因陟郡界皆精騎輕行無他輜重不得輒修道橋逺離城郭遣吏逢迎刺探起居出入前後以為煩擾動務省約但患不能脫粟瓢飲耳所過欲令貧弱有利無匿詔書是冬十月帝幸長安封蕭何末孫熊為酇侯十二月還宫癸未八年春正月東平王蒼卒諡曰獻鑑范書作憲今依通從袁紀初帝欲為原陵顯節陵注俱見前起縣邑蒼上疏切諫以為園邑之興始自強秦古者邱隴且不欲其著明况築郭邑建都郛哉虛費國用動搖百姓非所以致和氣祈豐年也帝乃止自是朝廷每有疑政輒使咨問蒼悉心以對皆見納用至是薨詔告中傅封上王自建武以來章奏並集覽焉馬廖馬防有罪免官就國馬廖謹篤自守而性寬緩不能教敕子弟皆驕奢不謹楊終與書戒之曰黃門郎年幼血氣方盛既無長君退讓之風而要結輕狡無行之客鑒念前世可為寒心廖不納防光大起第觀食客常數百人防又多牧馬畜賦斂羌胡帝數加譴敕禁遏甚備由是權勢少損賔客亦衰廖子豫投書怨誹于是有司并奏防光兄弟悉免就國光比防稍為謹密帝特留之後復有詔還廖京師諸馬既得罪竇氏貴益盛皇后兄憲弟篤喜交通賓客第五倫上疏曰竇憲椒房之親典司禁兵出入省闈年盛志美卑謙樂善然諸出入貴戚者類多瑕釁禁錮之人尤少守約安貧之節更相販賣雲集其門蓋驕佚所從生也三輔論議者至云以貴戚廢錮當復以貴戚浣濯之猶解酲當以酒也臣願陛下中宫嚴敕憲等閉門自守無妄交通士大夫防其未萌令憲永保福祿此臣之至願也憲以賤直奪沁水公主園田後發覺帝大怒召憲切責曰深思前過奪主園田時何用愈趙髙指鹿為馬久念使人驚怖國家棄憲如孤雛腐鼠耳憲大懼皇后為毁服深謝良久乃得解使以田還主雖不繩其罪然亦不授以重任雒陽令周紆下車先問大姓主名吏數閭里豪強以對紆厲聲曰本問貴戚若馬竇輩豈能知賣菜傭乎于是貴戚局蹐京師肅清竇篤常從宫中歸夜至止姦亭亭長遮止之篤蒼頭與爭亭長拔劍肆詈詔遣劍戟士收紆送廷尉詔獄數日貰出之竇憲字伯度沁水公主明帝女周紆字文通下邳徐人以班超為西域將兵長史帝拜班超為將兵長史以徐幹為軍司馬别遣衛候李邑護送烏孫使者邑到于填值龜兹攻疏勒恐懼不敢前因上書陳西域之功不可成又盛毁超擁愛妻抱愛子安樂外國無內顧心超聞之歎曰身非曽參而有三至之讒恐見疑于當時矣遂去其妻帝知超忠乃切責邑令詣超受節度超即遣邑將烏孫侍子還京師幹謂超曰邑前毁君欲敗西域今何不緣詔書留之更遣他吏送侍子乎超曰是何言之陋也以邑毁超故今遣之內省不疚何恤人言快意留之非忠臣也以鄭𢎞字巨君會稽山隂人為大司農舊交址貢獻皆從東冶本閩越地漢置冶縣後漢曰東侯官故城在今福建福州府閩縣泛海而至風波艱阻沉溺相繼𢎞奏開零陵桂陽注俱見前嶠嶺也道自是夷通遂為常路在職二年所省以億萬計遭天下旱邊方有警民食不足而帑藏殷積𢎞又奏宜省貢獻減徭費以利飢民帝從之御批歷代通鑑輯覽卷二十二

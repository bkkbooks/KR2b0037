body:
  text: 初定宗殂久未立君中外洶洶至是諸王穆格舊作木哥大將烏特哩哈逹蘇布特之子舊作兀良合台今並改等議所立時定宗后所遣使在坐曰昔太宗命以皇孫錫哩瑪勒為嗣諸王百官皆與聞之今錫哩瑪勒故在而議他屬將置之何地邪烏特哩哈逹等不聽共推莽賚扣即位于奎騰敖拉舊作濶帖兀阿蘭今改之地追尊考圖類為帝廟號睿宗錫哩瑪勒及諸弟心不平莽賚扣因察諸王有異同者並羈縻之取主謀者誅之遂頒便宜事于國中罷不急之役凡諸王大臣濫發牌印詔㫖宣命盡收之政始歸一秋七月䝉古主命其弟呼必賚總治漠南開府金蓮川在宣化府赤城縣獨石口北方輿紀要金世宗納涼之地産黃花狀若芙渠而小川故以名詔凡軍民在漠南者聼呼必賚總之遂開府于金蓮川時姚樞𨼆居蘇門呼必賚遣趙璧字寶仁雲中懷仁人召之樞至大喜待以客禮樞乃為書數千言上之首陳帝王之道與治國平天下之大經彚為八目曰修身力學尊賢親親畏天愛民好善遠佞次及救時之弊為條三十呼必賚竒其才動必召問樞因言于呼必賚曰今土地人民財賦皆在漢地王若盡有之則天子何為後必有間之者矣不若惟持兵權凡事付之有司則勢順理安呼必賚從之元世祖事始此䝉古遣察罕等將兵分道侵淮蜀冬十一月鄭清之卒清之以老病固求解政遂以太𫝊充體泉觀使奉朝請越六日而卒清之不好立異自與史彌遠議廢立得至宰輔然端平之初召用正人清之之力也其再相則年齒衰暮政歸妻子間廢之人或因緣以賄進為世所少以謝方叔字德方威州人為左丞相吳潛為右丞相並兼樞密使是時二揆虛席嵩之貨逰士上書薦已喧傅麻制已下衆心洶洶及聼宣制則方叔潛也始帝欲相嵩之中夜忽悟召學士改相二人䝉古呼必賚置經略司于汴分兵屯田自庫騰取漢上諸郡因留軍戍境上繼而襄樊夀泗復降而夀泗之民盡為軍官分有由是降附路絶雖嵗侵淮蜀軍將唯利剽殺城無居民野皆榛莾至是呼必賚從姚樞之請置經略司于汴以孟克史天澤楊惟中趙璧為使俾屯田唐鄧等州授之兵牛敵至則戰退則耕田西起襄鄧東連清口注見前桃源本桃源鎮元置縣後訛園為源今縣屬淮安府列障守之䝉古號西域僧納摩舊作那摩今改為國師納摩西域竺乾國人與兄鄂多齊舊作斡脫赤今改俱學浮屠定宗嘗命鄂多齊佩金符奉使省民瘼至是䝉古主復尊禮納摩令總天下釋教鄂多齊亦貴用事壬子十二年春二月乙卯朔日食䝉古主莽賚扣徙諸王于邉殺定宗后烏拉海額實竄徙實勒們于摩多齊地名方輿紀要在和林西北舊作沒脫赤今改䝉古主莽賚扣以諸王欲立實勒們乃徙太宗后克勒竒呼塔納舊作乞里吉匆帖尼今改于奎騰傲拉地之西分遷諸王于各邉以太宗后妃家資分賜諸王定宗后及實勒們母以厭禳並賜死禁錮實勒們于摩多齊之地夏六月閩浙大水嚴衢婺信台處建劍邵同日大水冒城郭漂室廬人民死者以萬數詔遣使分行賑恤之徐清叟言漢時關中大水翼奉以為后親舊之故今宜少抑宦官戚畹以回天意䝉古分漢地封宗屬䝉古主以中州封同姓命弟呼必賚于汴京關中自擇其一姚樞曰南京河徙無常土薄水淺㵼鹵生之不若關中呼必賚遂請于䝉古主䝉古主曰關中戶寡河南懷孟地狹民夥可取自益由是盡有關中河南之地呼必賚遂分遣使戌興元諸州又奏割河東解州鹽池以供軍立從宜府于京兆屯田鳳翔募民受鹽入粟轉漕嘉陵秋八月䝉古使呼必賚將兵擊大理冬十月䝉古兵入嘉定府䝉古汪德臣將兵掠成都薄嘉定四川大震守將俞興元用等夜開關力戰始解去議者謂余玠出師之誤有以召之十一月詔求直言時臨安火三日乃熄詔求直言帝又諭輔臣曰近來早朝多奏臣下辭免等細事而事體大者乃從繳進甚非臨朝聼政之意自今宜就早朝靣奏癸丑寶祐元年春正月詔以與芮子禥為皇子封永嘉郡王時帝在位嵗久無子羣臣屢以為言至是下詔以母弟嗣榮王與芮子孜為皇子賜名禥封永嘉郡王明年進封忠王二月己酉朔日食䝉古城利州䝉古汪德臣先城沔州至是又城利州且耕且守蜀土不可復矣夏五月召余玠還六月以余晦為四川宣諭使初利州都統王䕫素殘悍號王夜義恃功驕恣桀驁不受節度所至劫掠蜀人苦之玠至嘉定䕫帥所部兵迎謁班聲如雷江水如沸旗幟精明舟中皆戰掉失色而玠自若也徐命吏班賞䕫退謂人曰儒者中乃有此人玠久欲誅䕫獨患其握重兵居外謀于親將楊成成曰今縱弗誅養成其勢後一舉足西蜀危矣玠意遂决夜召䕫計事潛以成代領其衆䕫才離營而新將已單騎入矣䕫至玠斬之㑹戎州帥欲舉統制姚世安為代玠素欲革軍中舉代之弊以三千騎至雲頂山下在潼川府三臺縣南迤邐層叠有若雲盤遣都統金某往代世安世安閉關不納而世安素結丞相謝方叔子姪至是求援于方叔方叔遂倡言玠失戎利心帝惑之世安乃與玠抗玠鬱鬱不樂玠専制西蜀凡有奏疏詞氣不謹帝不能平㑹徐清叟入對語及玠因言玠不知事君之禮陛下何不出其不意而召之帝不答清叟曰陛下豈以玠握大權召之或不至耶臣度玠素失士心必不敢帝然之乃以資政殿學士召而以知鄂州余晦為宣諭使尋授制置使秋七月資政殿學士余玠暴卒玠之治蜀也任都統張實治軍旅安撫王惟忠字肖曽鄞人治財賦監簿朱文炳接賔客皆有常度自寶慶以來蜀閫未有及之者然久假便宜之權不顧嫌疑昧于勇退遂來讒賊之口又置機捕官雖足以亷得事情然寄耳目于群小故人多懷疑懼至是聞召不自安一夕暴疾卒或謂仰藥死蜀人莫不悲之明年侍御史吳燧等劾玠聚斂罔利七罪詔籍録玠家財以犒師賑邉其子如孫認錢三千萬徴之纍年始足冬十二月䝉古呼必賚滅大理遂入吐蕃降之呼必賚以烏蘭哈逹總諸軍事分三道以進自臨洮今鞏昌府洮州衛金元時屬臨洮府蓋由此取道自洮岷而松潘以逹雲南也經行山谷二千餘里至金沙江即古麗水以産金沙故名源出西番流徑雲南江諸府墝下流至四川馬湖入大江乘革囊及筏以濟摩莎蠻主今麗江府唐宋時為摩莎蠻地迎降進薄大理城大破其兵虜其王假智興假氏自石晉天福初建國曰大理至宋熙寧中假氏絶高氏代之元符初段氏復興號後理國至是始亡分兵取附都鄯善當作鄯闡滇記䝉氏名都曰苴咩别都曰鄯闡苴咩今大理府鄯闡今雲南府也烏爨注詳後等部進入吐蕃其酋索和爾圖舊作唆火脫今改懼出降兵威所加鮮不欵附呼必賚遂班師留烏蘭哈逹攻諸夷之未附者甲寅二年春正月䝉古呼必賚以姚樞為京兆勸農使樞從呼必賚征大理嘗遇夜宴陳宋太祖遣曺彬取南唐不殺一人市不易肆事明日呼必賚據鞍呼曰汝昨夕言曺彬不殺事吾能為之吾能為之及師至大理呼必賚命樞裂帛為旗書止殺之令分號街陌由是民得相完呼必賚既還京兆以樞為勸農使教民耕植二月余晦遣兵城紫金山在潼川府鹽亭縣北䝉古襲取之紫金山蜀之要地余晦遣都統甘閏以兵數萬城之䝉古汪德臣選精卒銜枚夜進大破之閏僅以身免城遂為䝉古所據夏六月加賈似道同知樞密院事召余晦還閏月以李曽伯為四川宣撫使置司䕫州初晦帥蜀制下徐清叟奏曰朝廷命令不甚行于西蜀者十有二年今者天斃余玠乃陛下大有為之機也今以素無行檢輕儇浮薄不堪任重如余晦者當之臣恐五十四州軍民不特望而輕鄙之䝉古聞之亦且笑中國之無人矣伏乞收回所除內批帝不聼及晦在蜀屢敗邉事日急帝乃召晦還而以李曽伯代晦秋九月殺利州西路安撫使王惟忠惟忠以余晦鎮蜀心輕之呼其小字曰余再五來也晦怒誣奏惟忠潛通北國詔下大理獄勘官陳大方煆成其事遂斬于市血上流而色不變且謂大方曰吾死訴于天未幾大方亦死冬十一月䝉古呼必賚以亷希憲字善用輝和爾人博囉哈雅子博囉哈雅舊作布魯海牙今改為京兆宣撫使希憲篤好經書一日方讀孟子聞召因懷以進呼必賚問其說希憲以性善義利仁暴之㫖為對呼必賚善之目為亷孟子又一日與諸貴臣校射連發三中衆驚服曰真文武材也呼必賚自大理還以京兆分地置宣撫司命希憲為使京兆控制隴蜀諸王貴藩分布左右民雜戎羌尤號難制希憲講求民病抑强扶弱境內大安䝉古張柔城亳州柔以連歲動兵兩淮艱于糧運奏請據亳之利䝉古主乃召柔率山前八軍城而戌之柔又以渦水北隘淺不可舟軍既病涉曺濮魏博粟皆不至又以百丈口在亳州南為宋往來之道俱築甬路一自亳而汴一自亳而南置堡立栅密為偵邏由是糧無不逹乙卯三年春正月迅雷罷元夕張燈起居郎牟子才字存寥井砢人上疏言元夜張燈侈靡倡優下賤竒技獻笑媟汙清禁上纍聖德今震霆示威願聖明覺悟天意可回帝納其言二月治全子才等喪師罪罷其祠祿䝉古侵漢蜀荆淮帝深憂之給事中王野字子文金華人言國家與䝉古本無深仇而兵連禍結皆原于入洛之師輕而無謀遂致隻輪不返乞罷全子才劉子澄祠祿以為喪師誤國之戒從之䝉古呼必賚徴許衡字平仲河內人徙河南為京兆提學衡幼有異質稍長嗜學如饑渴然遭世亂且貧無書嘗從日者家得書疏義避難徂徠山在泰安府東南水經注山多松柏詩所謂徂徠之松也得王弼易略例夜思晝誦言動必揆諸義既而亂少定往來河洛間從姚樞得程朱氏書益大有得尋居蘇門與樞竇默字子聲初名傑字漢卿廣平肥鄉人相講習慨然以道自任嘗與人曰綱常不可一日亡于天下苟在上者無以任之則在下之任也是時秦人新脫于兵欲學無師聞衡來人人莫不喜幸于是郡縣皆建學民大化之三月雨土夏五月四川地震閩浙大水以宦者董宋臣幹辦佑聖觀宋臣迎逄上意起梅堂芙蓉閣香蘭亭豪奪民田引倡優入宫招權納賄無所不至人以董閻羅目之監察御史洪天錫字君疇泉州晉江人上疏言天下之患三曰宦官外戚小人蓋指宋臣及謝堂厲文翁字聖錫東陽人帝俾天錫易疏欲自戒飭之天錫又言自古姦人雖憑怙其心未嘗不畏人主之知苟知之而止于戒飭則憑怙愈張不若未知之為愈也不報六月以丁大全字子萬鎮江人為右司諫大全靣藍色為戚里婢壻夤緣閻妃及內侍盧允升董宋臣遂得寵于帝自蕭山尉纍拜右司諫時正言陳大方侍御史胡大昌與大全同除人目為三不吠犬罷監察御史洪天錫秋七月謝方叔徐清叟免天錫以時雨土其異為䝉力言隂陽君子小人之辨又言蜀中地震閩浙大水上下窮空遠近嗟怨獨貴戚宦閹享富貴耳舉天下窮且怨陛下能獨與數十人者共天下乎㑹吳民列訴宦官董宋臣奪其田天錫下其事有司而御前提舉所謂田屬御莊不當白臺儀鸞司亦牒常平天錫謂御史所以雪寃常平所以均役若中貴人得以控之則內外臺可廢猶為國有紀綱乎乃申劾宋臣併盧允升及言修內司止于供膳修比年動曰御前姦贓之老吏逃逋之凶渠一竄名其間則有司不得舉手狡者獻謀暴者助虐其輾轉受害者皆良民也願毋使史臣書之曰內司之橫自今始疏六七上悉留中天錫遂去宗正寺丞趙崇嶓移書責丞相謝方叔不能正救而讒者又曰天錫之論方叔意也于是監察御史朱應元論罷方叔及參知政事徐清叟宋臣允升猶以為未快厚賄人上書力詆天錫方叔且乞誅之使天下明知宰相臺諫之去出自獨斷于內侍初無預焉于是方叔出提舉洞霄宫西南夷盡降䝉古烏蘭哈逹自吐蕃進攻白蠻烏蠻及鬼部諸蠻考唐書南蠻傳蠻有東西㸑西㸑謂之白蠻東㸑謂之烏蠻又有大勃弄有小勃弄蠻俗大都好鬼謂主祭者日鬼主故又謂之鬼蠻也皆在今雲南諸府境所向莫不風靡羅羅司及阿伯兩國與下阿魯俱蠻部名大懼舉國以降又乘勝攻下阿魯諸酋西南夷悉平得五城八府四郡蠻部三十七八月以董槐字廷植濠州定遠人為右丞相兼樞密使槐嘗言于帝有害政者三一戚里不奉法二執法大吏擅威福三皇城司不檢士三害不去政且廢願自上除之于是嫉之者滋甚丙辰四年春三月以蒲擇之為四川制置使置司重慶夏四月加賈似道參知政事職任依舊似道威權日盛臺諫嘗論其二部將即毅然求去孫子秀字元實餘姚人新除淮東總領外人忽傳似道已密奏不可矣執政遂不敢遣子秀以似道所善陸壑字景思㑹稽人代之其見憚如此五月賜禮部進士文天祥字宋瑞又字履善吉水人及第天祥以法天不息為對其言萬餘帝親拔為第一考官王應麟字伯厚慶元府人奏曰是卷古誼若龜鑑忠肝如鐡石臣敢為得人賀六月丁大全逐右丞相董槐詔罷槐提舉洞霄宫竄太學生陳宜中字與權永嘉人等于遠州槐自以為人主所振拔苟可以利國家者無不為時帝年寖高操柄獨斷群臣無當意者漸喜狎佞人丁大全方諂事內嬖得侍御史竊弄威權帝弗覺悟大全嘗遣客私于槐槐曰吾聞人臣無私交吾惟事上不敢私結約幸為謝丁君大全度槐終不容已乃日夜刻求槐短槐入對極言大全姦佞不可近帝曰大全未嘗短卿卿弗疑槐曰臣與大全何怨顧陛下拔臣至此臣知大全姦邪而噤不言是負陛下也且陛下謂大全忠而臣以為姦不可與俱事陛下矣上書乞骸骨不報大全益怨之乃上章劾槐章未下大全夜半以臺檄調隅兵百餘人露刃圍槐第驅迫之出紿令輿槐至大理寺欲以此脅之須臾出北關棄槐嘂呼而散槐徐步入接待寺罷相之制始下物論殊駭三學士屢上書言之乃詔槐以觀文殿大學士提舉洞霄宫大全既逐槐益恣橫用事道路以目太學生陳宜中黃鏞林則祖曽唯劉黻字毅伯樂清人陳宗六人上書攻之大全怒使御史吳衍劾之削其籍編管遠州立碑三學戒諸生勿得妄議國政士論翕然稱冝中等號為六君子秋七月以程元鳳字申甫徽州人為右丞相兼樞密使九月監察御史朱熠溫州平陽人乞汰冗吏不報熠言境土蹙而賦斂日繁官吏增而調度日廣景德慶厯時以三百二十餘郡之財賦共一萬餘員之俸祿今日以一百餘郡之事力贍二萬餘千餘員之冗官邉郡則有科降支移內地則缺經常納解欲寬民力必汰冗員帝嘉之而不能用䝉古城開平府在宣化府獨石口東北本金桓州地元置府後加號上都明改衛永樂中徙衛于獨石故城遂廢初邢臺人劉秉忠字仲晦英爽不羈以家貧為府令史一日因案牘事不愜意嘆曰吾家奕世衣冠今乃汨沒為刀筆吏乎即棄去隱居武安山武安縣之山也武安注見前尋為僧于天寧寺往來雲中值呼必賚遣人召僧海雲邀秉忠與俱既入見應對稱㫖秉忠于書無所不讀尤邃于易及邵氏經世書至于天文地理律厯三式六壬遁甲之屬無不精通論天下事如指諸掌呼必賚大愛之凡征伐謀議皆與至是䝉古主欲建城市修宫室為都㑹之所呼必賚以秉忠薦因命相宅秉忠以桓州注見前東灤水注亦見前北之龍岡即古卧龍山在古開平城北今名巴罕呼喇呼山為吉詔秉忠營之命曰開平府冬十一月以張磻字渭老福州人同知樞密院事丁大全簽書院事馬天驥字德夫衢州人同簽書院事時閻妃怙寵大全天驥用事有無名子書八字于朝門曰閻馬丁當國勢將亡十二月罷知嚴州吳槃帝以御寶黃册催內藏坊場錢槃奏言內庫理財太急督促太峻龍章鳳篆施于帑藏之催科寶册泥封下同官吏之文檄居萬乘之崇高而商財賄之有無事雖至微關係甚大董宋臣諷臺諫邵澤劾罷之丁巳五年春正月加賈似道知樞密院事召吳淵字道父潛之兄參知政事淵未至卒淵有才略所至有能名然政尚嚴酷好興羅織之獄籍入豪橫故時有蜈蚣之謡至是自荆湖制置使召還未至卒䝉古罷呼必賚開府命阿勒逹爾行省事于京兆或讒呼必賚得中土心䝉古主遣阿勒逹爾行省事于京兆劉太平佐之鈎考諸路財賦置局關中推集經略宣撫官吏下及征商煆鍊羅織無所不至曰俟終局日入此罪者惟劉哈瑪爾舊作黑馬今改史天澤以聞餘悉誅之呼必賚不樂姚樞曰帝君也大王為皇弟臣也事難與較遠將受禍莫若盡王邸妃主自歸朝廷為久居謀疑將自釋及呼必賚見䝉古主皆泣下竟不令有所白而止因罷鈎考局而呼必賚所署置諸司皆廢䝉古攻襄陽入其郛䝉古董文蔚字彥華真定藳城人俊次子既城光化棗陽儲餱糧㑹攻襄陽樊城南據漢江北阻湖水卒不得渡文蔚夜領兵于湖水狹隘處伐木拔根立於水實以薪草為橋頃之即成至曉兵悉渡圍已合城中大驚文蔚復統軍前行奪外城襄陽守將高逹力戰于白河乃還夏六月䝉古將烏蘭哈逹入交趾屠其城烏蘭哈逹兵入交趾遣使諭降皆見囚及兵至洮江即㝢良江上流在安南國臨洮府北輿程考雲南入交趾有二道自洮江而分一循江之左一循江之右交人戰敗其王陳日煚走海島䝉古得前所遣使于獄中以破竹束體入膚比釋縛一使死因屠其城留九日以熱不能堪班師秋八月䝉古主莾賚扣分道南侵以其少弟額哷布格守和林䝉古諸王伊遜克舊作亦孫哥駙馬約蘇圖舊作也速兒今並改等請伐宋䝉古主亦怒前使者被囚先是伊拉瑪斯等被囚久之伊拉瑪斯死餘使者至寶祐二年始釋還乃命諸王額哷布格居守和林阿勒逹爾輔之自將南侵軍四萬號十萬分三道而入䝉古主由隴州趨散關諸王摩格由洋州趨米倉山名在保寧府南江縣北與大巴山接舊有闕萬户布爾察克舊作孛里義今改由潼關趨沔州回鶻貢于䝉古回鶻獻水晶盆珍珠傘等物可值銀三萬餘錠䝉古主曰方今百姓疲弊所急者錢爾朕獨有此何為却之賽音鄂德齊舊作賽典赤今改以為言䝉古主稍償其值且禁其勿復有所獻戊午六年春二月以馬光祖為京湖制置使光祖為松江制置辟召僚屬皆極一時之選至是移鎮江陵以汪立信六安人徹從孫吕文德王登字景宋德安人王鑑為參議官蒲擇之率兵復成都及䝉古戰敗績乃還䝉古耨埒沙卜珠岱人舊作璘沙卜珠岱舊作珊竹岱今改將前軍欲㑹都元帥阿逹哈舊作阿答胡今改於成都擇之遣安撫劉整字武仲鄧州穰城人等據遂寧江箭灘渡在潼州府遂寧縣東涪江津濟處以斷東路耨埒軍至不能渡自旦至暮大戰整等軍敗耨埒遂長驅至成都擇之命楊大淵天水人等守劍門及靈泉山在遂寧縣東數峯壁立山項流泉不竭自將兵取成都㑹阿逹哈死耨埒率諸將大破大淵等于靈泉山進圍雲頂山城扼其歸路擇之兵潰城中食盡殺主將以降成都彭漢懷綿等州威茂諸蕃悉降䝉古䝉古入西域平克實密爾方輿記要在拂菻北拂菻在西海上杜佑曰拂西瀕海東南接波斯是也舊作乞石迷今改諸國初䝉古主遣宗王實喇伐西域至是實喇以札木諾延舊作抄馬那類今改郭侃總統諸軍前後平西域克實密爾十餘國轉鬬萬里又西渡海收富浪國遣使獻捷實喇遂留鎮西域夏四月䄇元鳯罷以丁大全為右丞相兼樞密使時大全謀奪相位元鳳謹飭有餘而乏風莭遂力請罷秋九月䝉古主莾賚扣入劔門冬十一月陷鵝頂堡在保寧府昭化縣西南方與紀要項當作項劔州南有鵝項嶺堡蓋以此名諸城耨埒聞䝉古主攻漢中遂留密喇卜和卓舊作蜜里霍者今改劉哈瑪爾等守城都自帥衆渡馬湖金沙江下流也舊置府于此今併入叙州府江由此入于大江獲守將張實考元史耨埒傳耨埒父塔塔爾入重慶推張實與續綱目不同遣招苦竹隘在保寧府劍州北小劍山頂西際斷崖前臨巨壑實入隘遂與守將楊立堅守䝉古主渡嘉陵江注見前至白水即白水江自陕西階州文縣流徑昭化縣西北又東南合嘉陵江命總帥汪德臣造浮橋以濟進次劔門至苦竹隘使其將史樞子明天倪弟天全之子急攻取之楊立迎戰于巷敗死䝉古獲張實殺之因殱其餘衆十一月進圍長寧山在昭化縣西南上平下險守將王佐徐昕戰敗䝉古進攻鵝頂堡知縣王仲降城遂破佐死焉䝉古主入城殺佐之子及徐昕等四千餘人由是青居山名在順慶府南充縣南宋末徙順慶府治此大良注見前運山常作雲山注見前石泉唐縣今屬能安府龍州今龍安府是守將劉淵蒲元圭張大悅趙順等俱以城降惟運山轉運使施擇善不屈死䝉古諸王摩格塔齊爾並略地還引兵來㑹以賈似道為樞密使兩淮宣撫使䝉古將李璮李全子或曰本衢州徐氏子全養為子陷海州漣水軍賈似道上書請罪詔不問璮取漣海拔四城殺官軍幾盡淮揚大震似道抗章引咎詔特與放罪十二月詔馬光祖等進軍歸峽州以援蜀詔光祖移司峽州六郡鎮撫向士璧字君玉常州人移司紹慶今四川黔彭㕔彭水縣宋置紹慶府治此士璧遂進師歸州與光祖迎戰房州䝉古少却䝉古主莽賚扣入閬州守將楊大淵以城降䝉古至大獲山遣王仲入招大淵大淵殺之䝉古王督諸軍力攻大淵懼遂以城降推官趙廣死之已而大淵逃歸䝉古主怒欲屠其城將官李呼喇濟舊作李忽蘭吉今改曰大淵去事未可測亟追之乃單騎至城下門未閉大呼入城曰皇帝使我撫汝軍民即下馬執大淵手曰上方宣諭賞賜不待而來何也大淵曰恐城寨有大變是以亟歸耳因與偕來䝉古主大悅以大淵為都元帥己未開慶元年春正月以賈似道為京湖南北四川宣撫大使移馬光祖為沿江制置使史巖之副之似道尋兼督江西二廣人馬䝉古烏蘭哈逹掠靜江注見前遂圍潭州烏蘭哈逹率兵三千蠻僰萬人破橫山寨名在廣西南寧府東橫山上烏蘭哈達由交址進兵此為孔道狥內地守將陳兵六萬以俟烏蘭哈逹潛自間道衝其中堅大敗之乘勝蹴賔州與下象州俱唐置今並屬栁州府蹂象州入靜江府連破辰沅注見前直扺潭州官軍斷其歸路烏蘭哈逹掠官軍後命其子阿珠舊作阿术今改橫擊于前官軍敗走遂壁城下時向士壁帥漳竭力守禦聞後軍且至遣王輔佑帥五百衆覘之遇于南嶽市大戰䝉古少却南嶽市在長沙府善化縣西嶽麗山南湘江繞異東甇亦曰嶽市鎮二月䝉古主莽賚扣圍合州王堅力戰禦之䝉古主遣降人晉國寶招諭合州王堅執之殺于閲武場蒙古主乃自引兵趨合州自雞爪灘渡灘在合州東北嘉陵江中直抵城下堅力戰以守䝉古㑹師圍之三月以吕文德為四川制置副使蒲擇之在蜀無功詔以文德代之時䝉古軍中大疫將議班師文德乘風順攻涪江浮橋力戰得入重慶即率艨艟千餘泝嘉陵江而上史天澤分軍為兩翼順流縱擊奪戰船百餘艘而還秋七月䝉古主莽賚扣殂于合州餘衆解圍北還王堅固守䝉古主督軍攻之屢戰不克前鋒將汪德臣選兵夜登外城堅率兵逆戰遲明德臣單騎大呼曰王堅宜早降語未既幾為飛石所中因得疾死㑹天大雨攻城梯折後軍不克進䝉古主亦殂于合州城下立凡九年廟號憲宗諸王大臣用二驢䝉以繪槥負之北行合州圍解䝉古主沉斷寡言不樂宴飲自謂遵祖宋之洪然酷信巫覡卜筮之術凡行事必謹叩之殆無虗日其殂也或傳其中飛石云捷聞詔加堅寧遠軍節度使八月䝉古呼必賚將兵渡淮九月渡江遂圍鄂州呼必賚悉兵渡淮呼必賚由大勝關在河南汝寧府羅山縣南張柔由虎頭關注見前分道並進官軍皆遁呼必賚至黃陂北齊縣今屬漢陽府漁人獻舟且為鄉導九月宗王默格自合州遣人以䝉古主凶訃告呼必賚請北還以繫人望呼必賚曰吾奉命南來豈可無功遽還自登香爐山在漢陽府漢陽縣西南俯瞰大江大江之北曰武湖在漢陽府黃陂縣東南亦日黃漢湖元和志黃祖閲武習戰之所武湖之東曰陽邏堡在黃州府黃門縣西北與武昌府江夏縣分界今為鎮其南岸即滸黃州官軍以大舟扼江渡軍容甚盛董文炳言于呼必賚曰長江天險宋所恃以為國勢必死守不奪其氣不可臣請嘗之乃帥死士數十人當其前令其弟文用字彥村等載艨艟鼓棹疾趨士呌呼畢奮鋒既交文炳揮衆走岸搏戰官軍大敗明日遂帥諸軍渡江進圍鄂州中外大震䝉古破臨江宋軍今為府屬江西知軍事陳元桂撫州人死之䝉古遂入瑞州本南唐筠州宋改名今為府屬江西䝉古兵至臨江時制置使徐敏豫在隆興今南昌府是頓兵不進元桂力疾登城坐督戰力不能敵有欲抱而走者元桂曰死不可去左右俱遁兵至元桂瞪目叱罵遂死之䝉古兵入瑞州知州陳昌世治郡有善政百姓擁之以逃詔諸路出師以禦䝉古大出內府銀幣犒師前後出緡錢七千七百萬銀帛各一百六萬兩匹冬十月丁大全有罪免時䝉古侵軼日甚大全當國匿不以聞遂罷相以觀文殿大學士判鎮江府中書舍人洪芹繳適之曽孫言大全鬼蜮之資穿窬之行引用凶惡陷害忠良遏塞言路濁亂朝綱乞追官遠竄以伸國法御史朱貔孫字興甫浮梁人等相繼論大全姦回險狡狠害貪殘假陛下之刑威以箝天下之口挾陛下之爵祿以籠天下之財饒虎臣字宗召寧國人又論其絶言路壞人才竭民力誤邉防四罪詔守中奉大夫致仕以吳潛為左丞相兼樞密使潛入相首言鄂渚被兵湖南擾動推原禍根由近年姦臣憸士設為虗議迷國誤君仁賢空虗名節喪敗天怒而陛下不知人怨而陛下不察稔成兵戈之禍章鑑字文秉分寧人高鑄嘗與丁大全同官傾心附麗躐躋要途蕭泰來等群小噂沓國事日非浸淫至于今日沈炎字若晦嘉興人實其爪牙而任臺臣甘為摶擊奸黨盤據血脉貫穿以欺陛下致危亂望令炎等與祠鑄等羈管州軍帝不聼即拜賈似道右丞相兼樞密使軍漢陽以援鄂內侍董宋臣請遷都不果行時邉報日急臨安團結義勇招募新兵增築平江紹興慶元城壁朝野震恐宋臣請帝遷都四明以避敵鋒軍器太監何子舉言于吳潛曰若上行幸則京師百萬生靈何所依賴御史朱孫亦言鑾輿一動則三邉之將士瓦解而四方之盜賊蜂起必不可㑹皇后亦請留蹕以安人心帝遂止寧海節度判官文天祥乞斬宋臣不報䝉古呼必賚遣使招諭鄂州守將張勝殺其使出戰敗死時䝉古圍鄂州都統張勝權州事以城危在旦夕登城諭之曰城已為汝家有但子女王帛皆在將臺可從彼取䝉古信之遂焚城外民居將退㑹高逹等引兵至賈似道亦駐漢陽為援䝉古乃復進攻遣徹辰巴圗爾竒卜察克人舊作苦徹拔都兒今改領兵同降人諭鄂州使降抵城下勝殺使者出軍襲徹辰巴圖爾戰敗死焉逹恃其武勇殊易似道每見其督戰即戲之曰巍巾者何能為哉將戰必須似道親勞始出否則使兵士譁于其門吕文德諂事似道使人訶曰宣撫在此何敢爾邪曺世雄向士璧皆從在軍事未嘗關白似道由是銜三人而親文德十一月詔賈似道移軍黃州遇䝉古俘卒于蘋草坪一名李坪在黃岡縣北今為驛獲之諸路重兵或聚于鄂䝉古兵由永全至潭江西大震吳潛用御史饒應子言移似道于黃州黃雖下流實當兵衝孫虎臣以精騎七百送之至蘋草坪候騎言前有北兵似道大懼謂左右曰奈何虎臣匿似道出戰似道嘆曰死矣惜不光明俊偉爾及北兵至乃老弱部所掠金帛子女而還者江西降將儲再興騎牛先之虎臣擒再興似道遂入黃州賈似道乞和于䝉古呼必賚引還鄂州圍解䝉古攻城益急城中死傷者至萬三千人似道大懼乃密遣宋京詣䝉古營請稱臣納幣呼必賚不許㑹合州守城王堅使阮思聰踔急流走鄂以䝉古主訃聞似道再遣京往呼必賚亦聞阿勒逹爾等謀立額哷布格遣托果斯舊作脫忽思今改括民兵因召群臣議事郝經字伯常其先潞州人徙陵州曰國內空虗塔齊爾實喇諸王觀望所立莫不覬覦神器一有狡焉或啓戎心先人舉事腹背受敵大事去矣願大王以社稷為念與宋議和率輕騎而歸直造燕都則彼之姦謀氷釋瓦解遣一軍逆大行靈舁收皇帝璽遣使召諸王㑹喪于和林命王子珍戩世祖長子追贈裕宗舊作真金今改鎮守燕都示以形勢則大寶有歸而社稷安矣呼必賚以為然㑹宋京至請稱臣割江南為界歲奉銀絹各二十萬呼必賚許之遂拔寨而去十二月䝉古烏蘭哈逹引兵趨湖北潭州圍解呼必賚既還命張傑閻旺以偏師候烏蘭哈逹而遣特默齊赫魯克氏特默齊舊作邁赤赫魯克氏舊作合魯氏今改將兵迎之至是烏蘭哈逹解潭州之圍引兵趨湖北庚申景定元年䝉古世祖皇帝瑚必賴中統元年春二月䝉古烏蘭哈逹至鄂州引還賈似道使夏貴等殺其殿卒于新生磯在黃田縣西北亦曰新生洲䝉古張傑閻旺作浮橋于新生磯烏蘭哈逹兵至傑等濟師北還賈似道用劉整計命夏貴以舟師攻斷浮橋殺殿卒百七十人三月戊辰朔日食賈似道奏諸路大捷召似道還朝似道匿議和稱臣納幣之事以所殺獲俘卒殿兵上表言諸路大捷鄂圍始解江漢肅清宗社危而復安實萬世無疆之休帝以似道有再造功召還朝高麗王㬚死䝉古呼必賚封其子倎為王倎後更名植白氣如匹練亘天䝉古主呼必賚立是為元世祖先是呼必賚北還諸王哈坦舊作合丹今改默格塔齊爾俱㑹于開平實喇亦自西域遣使勸進惟額埒布格不至亷希憲等力言先發制人後發人制逆順安危間不容髮宜早定大計呼必賚然之遂即位建元中統夏四月出內侍董宋臣于安吉州䝉古主召竇默許衡至開平默于金末避亂轉徙隱于大名與姚樞許衡朝暮講習至忘寢食䝉古主在潛邸嘗召之既至問以治道默首以綱常為對且曰失此則無以自立于世矣又言帝王之道在誠意正心心既正則朝野遠近莫敢不一于正䝉古主敬待加禮久之南還至是復與衡同召吳潛罷初賈似道在漢陽以潛移之黃州為欲殺已銜之至是帝欲立忠王禥為太子潛密奏云臣無彌遠之才忠王無陛下之福帝遂積怒潛似道因陳建儲之䇿令侍御史沈炎劾潛且云忠王之立人心所屬潛獨不然姦謀叵測請速召賈似道正位鼎軸帝從之遂罷潛奉祠加賈似道少師封衛國公將士進官有差似道既至詔百官郊勞如文彥博故事奬眷甚至諸將士悉進官吕文德高逹劉整夏貴孫虎臣范文虎向士璧曹世雄各加轉有差初似道惡逹在軍中嘗侮己言于帝欲殺之帝知其有功不從故論功以文德為第一而逹居其次似道既相權傾中外進用群小變更法制矣䝉古初定官制䝉古自太祖以來諸事草創設官甚簡以斷事官為至重之任位在三公上丞相謂之大筆且齊舊作大筆閒赤今改掌兵權則左右萬戶而已後稍倣金制置行省及元帥宣撫等官至是元主既立大新制作遂命劉秉忠許衡酌古今之宜定內外官制其總政務者曰中書省秉兵柄者曰樞密院司黜陟者曰御史臺其次內則有寺監院司衛府外則有行省行臺宣慰亷訪其牧民則有路府州縣官有常職位有常員食有常祿其長則䝉古人為之而漢人南人二焉于是一代之制始偹䝉古以亷希憲為陜西四川宣撫使商挺字孟卿濟隂人副之䝉古額哷布格稱帝于和林額哷布格聞呼必賚已立命阿勒逹爾發兵于漠北諸部分遣心腹易置將佐散金帛賚士卒又命劉太平霍魯懷拘收關中錢穀時琿塔哈舊作渾都海今改自先朝將兵屯六盤太平等隂相結納琿塔哈復分遣人約成都密喇布和卓青居竒爾台布哈舊作乞台不花今改同舉事額勒布格遂自立于和林䝉古以王文統字以道益都人為中書平章政事張文謙字仲謙邢州沙河人為左丞元史百官志中書省中統初立左右丞各一員秋正二品五月文謙罷文統本李璮幕屬至是有薦其才智者遂得親幸更張庶務悉委裁處文統素忌刻而文謙以安國便民為務屢相可否積不能平思有以陷之文謙遂求出宣撫大名臨發語文統曰民困日久况當大旱不量减稅賦何以慰來蘇之望文統曰上新即位國家興發止仰稅賦苟復减損何以供給文謙曰百姓足君孰與不足至任蠲常賦什之四商酒稅什之二䝉古阿勒逹爾及六盤守將琿塔哈舉兵應和林亷希憲等擊敗斬之劉太平霍魯懷聞希憲將至以五月一日乘急傳入京兆謀為變秦人前被阿勒逹爾太平等威虐聞其來破膽越二日希憲亦至宣示詔㫖遣人馳往六盤宣諭安撫未幾城門候引一急使至云來自六盤希憲訊之得太平魯懷與琿塔哈密喇布和卓竒爾台布哈狀希憲集僚佐謂曰主上命我輩正在今日遂分遣人掩捕太平魯懷等仍遣劉哈瑪爾誅密喇卜和卓于成都汪惟正字公理德臣之子誅竒爾台布哈于青居又命總帥汪良臣德臣之弟帥秦鞏諸軍進討琿塔哈良臣以未得㫖為辭希憲即解所佩虎符銀印授之曰此皆身承密㫖君但辦吾事制符已飛奏矣良臣遂行又摘蜀卒四千命䝉古將巴崇舊作八春今改帥之為良臣聲援㑹有詔赦至希憲命殺太平等于獄尸于通衢方出迎詔琿塔哈知京兆有偹西渡河趙甘州阿勒逹爾自和林帥兵適至遂與琿塔哈合軍而南時諸王哈坦亦率騎兵與巴崇汪良臣兵合分三道以拒之既陳大風吹沙良臣令軍士下馬以短兵突其左繞出陳後潰其右而出巴崇直搗其前哈塔勒精騎邀其出路大戰于甘州東殺琿塔哈阿勒逹爾關隴悉平希憲乃遣使自劾停赦行刑徴調諸軍擅以良臣為帥諸罪䝉古主曰委卿方靣之寄正欲從宜若拘常制豈不坐失事機詔賜希憲金虎符進平章政事行省秦蜀商挺參知省事元史百官志中書省參政二員從二品職亞左右丞䝉古主以王鶚字百一曹州東明人為翰林學士承㫖元史百官志中統初以王鶚為翰林學士未立官署至元元年始置秩六年置承㫖王鶚本傳中統建元首以鶚為翰林學士承㫖傳抵牾讀綱目從傳今仍之而注志以偹考鶚金正大元年進士第一歷官尚書左右司即中金亡將被殺張柔聞其名救之館于保州䝉古主在藩邸召對甚禮重之嘗因見請曰天兵克蔡金主自縊其奉御京錫焚葬汝水之傍禮為舊君有服願往葬祭䝉古主許之至則為河水所沒具牲醴為位而哭至是為翰林學士承㫖制誥典章皆所裁定又薦李治字仁卿樂城人李昶字士都東平須城人王磐字文炳廣平永年人徐世隆字威卿陳州西華人高鳴字雄飛真定人為學士復奏十道提舉學校官䝉古主皆從之熒惑入南斗留五十餘日六月立忠王為皇太子帝家教甚嚴太子雞初鳴問安再鳴回宫三鳴往㑹議所參決庶事退入講堂講經史將晡復至榻前起居問今日講何經答之是則賜坐賜茶否則為之反覆剖柝又不通則繼以怒明日須叟覆講率為常例䝉古撤江上軍以史天澤為江淮經略使䝉古李璮攻淮安主管制置司李庭芝注見前擊敗之秋七月䝉古使翰林侍讀學士郝經來修好賈似道幽之真州似道還朝使其客廖瑩中輩撰福華編稱頌鄂功通國皆不知所謂和也䝉古主既立欲來修好王文統素忌郝經有重名請遣經遂以翰林侍讀學士充國信使來告即位且徴前日請和之議文統復隂屬李璮潛師侵宋欲假手害經經至宿州遣其副請入國日期不報遺書宰相及淮帥李庭芝而似道恐經至謀泄竟拘留于真州之忠勇軍營經上表曰願附魯連之義排難解紛豈如唐儉之徒欵兵誤國又數上書于帝及執政極陳和戰利害且請入見及歸國皆不報驛史棘垣鑰戶晝夜守邇欲以動經經不屈但語其下日死生進退聽其在彼屈身辱命我終不能汝等不幸宜忍無以待揆之天時人事宋祚殆不遠矣帝聞有北使謂宰執曰北朝使來事體當議似道奏和出彼謀豈容一切輕徇倘以交鄰國之道來當令入見䝉古遣官訪問經等所在仍以稽留信使侵擾疆埸來詰淮東制置李庭芝奏䝉古使者久留真州不報以賈似道兼太子太師䝉古行交鈔法王文統立十路宣撫司示以條格欲差發辦而民不擾鹽課不失常額交鈔無致阻滯遂行中書省造中統元寶交鈔立互市于潁州漣水光化軍交鈔法自十文至二貫文凡十等不限年月諸路通行稅賦並聽收受仍申嚴私鹽酒麵貨等禁冬十二月䝉古號西僧帕克思巴舊作入思巴今改為國師帕克思巴吐蕃薩斯嘉舊作薩斯巴今改人足克衮舊作族欵今改氏也相傳自其祖多爾濟舊作朵栗赤今改以其法佐國主霸西海十餘世帕克斯巴年十五謁䝉古主于潛邸與語大悅日見親禮至是尊為國師統釋教辛酉二年䝉古中統二年春正月詔皇太子釋奠孔子加張栻吕祖謙伯爵並從祀帝手詔曰虎圍齒胄太子事也此禮廢久矣如釋奠釋菜之事我朝俱未嘗廢然享師敬道又不可拘舊制可令太子謁拜太子既還上奏曰先聖之道至我朝而後可以續孟氏之傳然諸說並駕未知統一逮朱熹張栻吕祖謙志同道合切思講磨擇精語詳開牖後學人心一正聖道大明今熹已秩從祀而栻祖謙尚未奉明詔臣竊望焉帝從之遂封栻華陽伯祖謙開封伯並列從祀三月壬戌朔日食夏四月以皮龍榮字起霖一字季遠澤州醴陵人參知政事龍榮伉直不肯降志于賈似道未逾年而罷䝉古聽儒士被俘者贖為民時淮蜀士遭俘虜者皆沒為奴翰林學士高智耀河西人世仕夏國奏言以儒為驅古無有也陛下方以古道為治宜除之以風天下䝉古主從之命循行郡縣區别之得數千人貴臣或言其詭濫䝉古主詰之對曰譬則金也金色有淺深謂之非金不可才藝有淺深謂之非士不可䝉古主悅五月䝉古以史天澤為中書右丞相䝉古主問竇默曰朕欲求如唐魏徴者有其人乎默對曰犯顔諫諍剛毅不屈則許衡其人也深識遠慮有宰相才則史天澤其人也䝉古主納之遂相天澤以默為翰林侍讀學士䝉古以姚樞為太子太師竇默為太子太傅許衡為太子太保皆辭不拜時樞自東平宣撫召還與衡等入侍言治亂休戚必以義為主王文統患之默復于䝉古主前力言文統學術不正必禍天下䝉古主曰然則誰可相者默曰以臣觀之無如許衡䝉古主不悅而罷文統亦恨之乃授樞等東宫三師外陽尊之內實不欲其傋顧問也默欲依東宫以避禍衡力以為不可曰此不安于義也且禮師傅與太子位東西鄉師傅坐太子乃坐公等度能復此乎不能則師道自我廢也因相與懷制言太子未立豈宜虗設官稱乃改樞大司農默仍侍讀學士衡國子祭酒未幾衡稱疾還懷孟六月潼川安撫副使劉震以瀘州判降䝉古制置司參謀官許彪孫死之初賈似道之出督也嘗恨高逹曹世雄之輕已令吕文德捃托其罪逼世雄死逹亦廢棄整聞之懼㑹俞興帥蜀整素與興有隙而似道方㑹計邉費興遣吏下整整訴于朝不得逹心益不安遂籍瀘州十五郡戶三十萬降于䝉古䝉古以整為䕫路行省兼安撫使整驍將也䝉古既得之由是盡得國事虗實而似道不以為虞整之將叛也命制置司參謀官許彪孫草表彪孫不屈合門仰藥死秋七月竄吳潛于循州先是詔黨丁大全吳潛者臺諫嚴察舉劾以聞當置于罪以為同惡相濟之戒時賈似道専政凡所惡者無賢否皆斥帝弗悟其姦為是下詔且安置潛于潮州至是復責授化州團練使徙循州八月俞興討劉整敗績詔罷興以呂文德兼四川宣撫使俞興以劉整叛移檄討之㑹䝉古成都經略使劉元振字仲舉哈瑪爾長子將兵來逆整至瀘興進軍圍之晝夜急攻城幾陷未幾援兵至元振與整出城合擊大敗之興退走詔以興妬功啓戎罷任鐫職以文德為四川宣撫使賈似道殺湖南制置副使向士璧先是賈似道忌功欲汚衊一時閫臣且怨士璧嘗侮已諷侍御史孫附鳳等劾罷之送漳州安置又遣官㑹計邉費于是趙葵史巖之等皆坐侵盜掩匿罷官徴償而士璧所費尤多至是逮至行部責償幕屬方元善者極意逢迎似道意士璧坐是死復拘其妻妾徴之潭人聞之有垂涕者信州謝枋得以趙葵給錢粟募民兵守禦及㑹計者至信枋得曰不可以纍宣撫自償萬緍餘不能辦乃上書似道有云千金而募徙木將取信于市人二卯而棄干城豈可闈于鄰國遂得免徴餘者似道又忌王堅出知和州堅鬱鬱而卒謝枋得字君直弋陽人冬十月䝉古主呼必賚擊額哷布格于實默圖漢北地名舊作昔木土今改敗走之䝉古主以額哷布格違命自將討之與戰于實默圖之地諸王哈坦等殺其兵三千人塔齊爾分道奮擊大破之追北五十里䝉古主率諸軍躡其後合三路蹙之其部將多降額哷布格北遁䝉古主引還壬戌三年䝉古中統三年春正月賜賈似道第宅家廟給緡錢百萬建第于集芳園就置家廟吕文德復瀘州劉整率所部入朝于䝉古文德遂入瀘州詔改為江安軍䝉古修孔子廟臨安饑詔賑恤貧民時馬光祖以樞密兼知臨安府知榮王與芮府有積粟三往見之王以他辭光祖乃卧于客次王不得已見焉光祖厲聲曰天下誰不知儲君為大王子今民饑欲死不以此時收人心乎王以廩虗辭光祖探懷中出片紙曰某莊某倉若干王語塞遂許以三十萬光祖遣吏分給活饑民甚衆䝉古江淮大都督李璮以京師來歸詔封璮為齊郡王復其父全官爵三月䝉古誅王文統王文統以通好叛臣伏誅續綱目書殺非是今改璮自䝉古主即位便有南歸之志前後所奏凡數十事皆恫疑虗喝以動䝉古而自為完繕益兵計至是召其子彥簡于開平修築濟南益都等城壁遂殱䝉古戍兵以漣海三城來歸獻京東郡縣請贖父過仍遣總管李毅傳檄列郡詔授璮保信寧武等軍節度使督視京東河北路軍馬封齊郡王改漣水為安東州䝉古王文統使其子蕘通好于璮事覺被誅已而璮引麾下還攻益都入之遂復淄州夏五月䝉古史天澤圍李璮于濟南六月遣提刑青陽夢炎青陽黃帝子名其後以名萬氏將兵救之不至而還䝉古主命諸王哈必齊舊作哈必赤今改總諸道兵以擊璮復命丞相史天澤往仍詔天澤専征諸將皆受節制天澤至濟南謂哈必齊曰璮譎而兵法甚精不宜力角當以歲月斃之乃深溝高壘遏其侵軼朝廷聞璮受圍給銀五萬兩下益都府犒軍遣青陽夢炎帥師援之夢炎至山東不敢進而還封陳光昺為安南王陳日煚以䝉古烏蘭哈逹既還乃反國傳位于其子光昺遣使來告詔封光昺為安南王加日煚為安南大王然光昺實遣人請降于蒙古䝉古亦加封册故相吳潛暴卒于循州賈似道以黃州之事必欲殺潛乃使武人劉宗申守循以毒潛潛鑿井卧榻下自作井銘毒無從入一日宗申開宴以私忌辭再開宴又辭不數日移庖不得辭遂得疾曰吾其死矣夜必風雷大作已而果然循人悲之潛既沒似道歸罪宗申貶之以塞外議乃許潛歸葬秋八月䝉古克濟南獲李璮殺之以董文炳為山東經略使䝉古主命史樞字子明天澤從子阿珠各將兵赴濟南璮帥衆出掠輜重將及城北兵邀擊大敗之璮退保城史天澤命築環圍璮自是不復得出日夜拒守分軍就食民家發其蓋藏以繼知城且破乃手刃妻妾乘舟入大明湖在濟南府歷城縣治西北隅周十餘里自投水中水淺不得死為䝉古所獲史天澤殺之解其體以徇事聞贈璮檢校太師賜廟號曰顯忠時山東尚未靖䝉古主以董文炳為經略使文炳至益都從數騎便服而入至府不設警衛召璮故將吏撫諭于庭下所部大悅山東以安時言者謂璮之變由大藩子弟盡専兵民之權天澤奏行又請自臣家始于是吏民及張柔嚴忠濟子弟皆罷還私第子嚴忠濟一名忠翰字紫芝實之九月䝉古以阿珠為征南都元帥䝉古詔曰前遣使于宋以通和好宋人不務遠圖反啓邉釁諸大臣皆以南征為請重以兩國生靈之故猶待信使南歸庶成和議留而不至者今又半載矣彼嘗以衣冠禮樂之國自居理當如是乎尋置兩統軍司東自宋自亳州西至均州諸萬戶𨽻河南西自宿州東至海州諸萬户𨽻山東冬十月䝉古命阿哈瑪特回鶻人舊作阿哈瑪今改領中書左右部専理財賦䝉古始立左右部分總庶務命阿哈瑪特領之仍兼諸路都轉運使専理財賦阿哈瑪特欲每事得専奏聞不關白中書時張文謙居政府力言分制財用古有是理中書不預則天子將親􅊩之乎䝉古主然之已而阿哈瑪特請興鐵冶于鈞徐諸州又請歲增益解鹽課額䝉古主嘉其能超拜平章政事十一月竄丅大全于新州注見前道死大全安置貴州州將游翁明訴大全隂招游手輩私立將校造弓矢舟楫將通蠻為變廣西經略朱祀孫聞于朝詔改竄新州土牢拘管日具存亡賈似道諷䙫孫殺之䙫孫遣將官畢遷護送舟過藤州唐置明改縣今屬廣西梧州府遷擠大全于水而死癸亥四年䝉古中統四年春正月䝉古以姚樞為中書左丞樞上言自中統至今五六年間外侮內叛相繼不絶然能官離債負民安賦役國用粗足政事更新皆陛下信用先王之法所致今創始治道正宜上答天心下結民心睦親族以固本定大臣以當國開經筵以格心立學校以育才則可以光先烈遺子孫䝉古主納之二月詔買公田置官領之罷翰林學士徐經孫字中立寶慶進士時賈似道以國計困于造楮富民困于和糴思有以變法而未得其說知臨安府劉良貴浙江轉運使吳勢卿獻買公田之策似道乃命殿中侍御史陳堯道右正言曺孝慶監察御史虞毖張希顔上疏請行祖宗限田之制以官品計頃以品格計數將官户田産逾限之數抽三分之一回買以充公田但得一千萬畝之田則每歲可收六七百萬石之米可免和糴可以餉軍可以住造楮幣可平物價可安富室一事行而五利興矣帝從之詔買公田置官田所以劉良貴提領通判陳訔副之獨徐經孫條具其害似道諷御史舒有開劾之罷歸未幾帝手詔曰永免和糴無如買逾限之田為良法然東作方興權俟秋成續議施行似道憤然上疏求去復諷何夢然陳堯道曹孝慶抗章留之且勸帝下詔慰免帝乃趣似道出視事似道復具陳其制帝悉從之二省奉行惟謹似道首以己田在浙江者萬畝為公田倡榮王與芮繼之趙立奎自陳投賣由是朝野無敢言者三月䝉古始建太廟䝉古建太廟于燕京定烈祖太祖太宗卓沁察罕岱時尊二人為皇伯睿宗定宗憲宗為八室又命僧薦佛事七晝夜嵗以為常夏六月論買公田功進知臨安府劉良貴等官初買官田猶有抑強削富之意繼而敷派除二百畝以下者免餘各買三分之一其後雖百畝之家亦不免立價以租一石償十八界㑹子四十而浙西之田石租至有值千緡者亦就此價價錢稍多則給銀絹各半又多則給以度牒告身准直民失實産而得虗告吏又恣為操切浙中大擾民之破家失業者甚衆官吏有奉行不至者劉良貴輒劾之追毁出身永不收叙由是有司爭以多買為功浙西六郡買田三百五十餘萬畝詔進良貴官兩轉餘人進秩有差秋七月置𣙜場于樊城劉整言于䝉古曰南人惟恃吕文德耳然可以利誘也請遣以玉𢃄餽之求置𣙜場于襄陽城外䝉古從之至鄂請于文德文德許之為請于朝開𣙜場于樊城外築土墻于鹿門山在襄陽縣東南襄陽記山舊名蘇嶺後漢習郁建祠山上立二石鹿于廟門後人因以鹿門為山外通互市內築堡壁䝉古又築堡于白鶴山名在襄陽縣南輿地紀勝山有白馬泉亦名白馬山由是敵有所守以遏南北之援時出兵哨掠襄樊城外兵威益熾文德弟文焕知為䝉古所賣以書諫止文德始悟然事已無及惟自咎爾䝉古以亷希憲為中書平章政事商挺參知政事希憲在秦蜀凡宋將家屬之在北者歲給其糧北人仕南者子弟得越界省其親人皆感之李璮反降人費寅譖希憲制關中得民心又得商挺為之輔修城治兵潛蓄異志䝉古主疑之命中書右丞納罕舊作南合今改代希憲且覆視所告事無實狀詔希憲挺還皆進秩希憲首言國初以來凡納土及始受命之臣咸令世守至今將六十年子孫皆奴視部下郡邑長吏皆其皂𨽻僮使前古所無宜更張之乃議行考課黜陟遷轉法䝉古主從之甲子五年䝉古至元元年春三月增公田官于平江諸路似道言公田已成若復以州縣總之恐害不除而利不可久請立四分司以主管公田繫銜平江嘉興安吉各一員鎮常江隂共一員每鄉置官莊一所民為官耕者曰官佃為官督者曰莊官莊官以富饒者充感兩獻一更每租一石明二斗不許多收一時迎合止欲買數之多凡六七斗皆作一石及收租之際元額有虧則取足于田主遂為無窮之害或內有磽瘠及租佃頑惡之處從而責换于田主其禍尤慘秋九月彗星出中外上書乞罷公田賈似道力求去位詔免留之彗星出柳光燭天長數十丈自四更見東方日高始滅詔避殿減膳許中外直言臺諫士庶上書以為公田不便民間愁怨所致于是似道上書力辨乞避位帝曰言事易任事難自古然也卿既任事亦當任怨禮義不愆何恤人言卿宜安心毋孤朕倚毗之重知臨安府劉良貴亦以人言籍籍自陳括田之勞乞從罷免不允由是公論頓沮黥配臨安府學生葉李等于逺州葉李蕭規應詔上書詆賈似道専權害民誤國似道命劉良貴捃托以罪黥配李于漳州規于汀州䝉古額哷布格自歸于上都䝉古主釋不治其黨布拉噶舊作不魯花今改等伏誅額哷布格自實默圖之敗不能復軍至是與諸王玉隴逹實舊作玉龍答失今改三人及其謀臣布拉噶托里齊舊作脫里察今改托果斯等來歸䝉古主以諸王皆太祖之裔並釋不問惟誅布拉噶等楊棟字元極眉州青城人免棟于是年五月參知政事參知政事楊棟以彗星為蚩尤旗非變異也言者論其欺天罔君坐免或謂棟姑為是言隂告于帝謀逐似道似道覺之遂反為所中而去彗星几歷五十餘日始滅八月䝉古以劉秉忠為太保參領中書省事秉忠既受命以天下為己任知無不言凡燕閒顧問輒推薦人物可器使者其所甄拔後皆為名臣䝉古入都于燕劉秉忠請定都于燕䝉古主從之詔營城池及宫室仍號為中都尋更號大都九月竄建寧府教授謝枋得于興國軍枋得考試宣城及建康摘賈似道政事為問目言權姦擅國敵兵必至趙氏必亡漕使陸景思上其藁于似道于是左司諫舒有開劾枋得怨望騰謗大不敬詔竄之行經界推排法賈似道請行推排法于諸路由是江南之地尺寸皆有稅而民力竭矣作銀關賈似道以物貴由于楮賤楮賤由于楮多乃更造銀關每一准十八界㑹之三自製其印如賈字狀行之出奉宸庫珍貨收弊㑹于官廢十七界㑹不用銀關行物益貴楮益賤冬十月帝崩太子即位是為度宗尊皇后曰皇太后大赦帝有疾詔草野有能治療者白衣除節度使有官及願就文資者並與比附推思仍賜錢十萬田五百頃卒無應者遂崩太子即位尊皇后曰皇太后度宗皇帝乙丑咸淳元年䝉古至元二年春正月辛未朔日食三月葬永穆陵史臣曰理宗享國四十年蔡州之役可雪先耻乃貪地棄盟事釁隨起兵連禍結境土日蹙良由中年嗜欲既多怠于政事權移姦臣以致于此然自帝繼統首出王安石而尊濓洛表章朱氏丕變士朁廟號曰理其殆庶乎夏四月加賈似道太師封魏國公帝以似道有定策功每朝必答拜稱之曰師臣而不名朝臣皆稱為周公理宗山陵事竣徑棄官還越而密令吕文德詐報䝉古兵攻下沱急大江至荆州府枝江縣别出為沱下流復合其分處謂之上沱合處謂之下沱今縣東有下沱市朝中大駭帝與太后手詔起之似道乃至欲以經筵拜師而典故須建節乃授鎮東軍節度使似道怒節已出復命反之舊制節出撤關壞屋無倒節理以示不屈至是人皆駭異閏五月以江萬里參知政事初萬里在賈似道幕下最久景定中同簽書樞密院事雖府仰容默為似道用而性峭直臨事不能無言似道嘗惡其輕發故不久而罷至是召拜參知政事秋九月䝉古以安圖穆時哩四世孫舊作安童今改為中書右丞相冬十月命許衡議省事衡辭不許先是䝉古主追録元勳以安圖穆呼哩後召長宿衛及是拜右丞相年二十一矣安圖以年少辭䝉古主曰朕思之熟矣乃召許衡于懷孟俾議中書省事衡至以疾辭䝉古主不許安圖親候其館與語良久既還念之不釋者纍日丙寅二年䝉古至元三年春正月以季可為監察御史初理宗詔置籍中書記諫官御史言事歲終以考成續而賈似道當國忌臺諫言事悉用庸懦易制者為之彈劾不敢自由惟取遠州太守及州縣小官毛舉細過應故事而已江萬里罷賈似道以去要君帝至拜留之萬里以身掖帝云自古無此君臣禮陛下不可拜似道不可復言去似道不知所為下殿因舉笏謝萬里曰微公似道幾為千古罪人然以此益忌之帝在經筵每問經史疑義及古人姓名似道不能對萬里常從旁代對王夫人頗知書帝語夫人以為笑似道聞之積慙怒謀逐萬里萬里亦四上疏求退乃以資政殿大學士奉祠三月䝉古以宋子貞字周臣潞州長子人為中書平章政事子貞初事東平嚴實建學育才齊魯為之一變䝉古主南侵子貞上言本朝威武有餘仁德未洽若投降者不殺脅從者勿治則宋之郡邑可傳檄而定也䝉古主善之纍遷右三部尚書數上言時政便宜凡立法裁制多自子貞發之䝉古主頗悔用子貞之晚入中書未幾致仕卒夏五月以包恢字宏父建昌人簽書樞密院事恢所至以嚴為治破豪猾去姦吏治蠱獄政事赫然理宗朝嘗因輪對曰陛下之心如天地日月其閉而食者外戚近習耳秋七月䝉古以張德輝字輝卿冀寧交城人參議中書省事初德輝在史天澤幕下䝉古主在藩邸聞之召見問曰孔子殁已久其性安在對曰聖人與天地終始無往不在殿下能行聖人之道性即在是矣䝉古主然之自是屢有問對䝉古主問曰祖宗法度具在未蓋設施者甚多將如之何德輝惜銀盤喻曰創業之主如製此器稍選白銀良匠而成之羿付後人傳之無窮常求謹厚者司掌乃永為寶用否則不惟缺壞亦且有竊而去之者矣䝉古主問與兵與牢民者為害孰甚對曰軍無紀律縱使殘暴害固非輕若半民者頭㑹斂以毒天下使民如蹈水火為害尤甚䝉古主皆稱善以字呼之而不名及䝉古主即位以為河東南北路宣撫使考績為諸路最遂入議政丁卯三年䝉古至元四年春正月立皇后全氏㑹稽人后理宗母慈憲夫人姪孫也寶祐中父昭孫沒于王事理宗以母故嘗召后入宫問曰爾父沒于王事每念之令人可哀后對曰妾父可念淮湖之民尤可念也帝異之語大臣曰全氏女言辭甚令宜配冡嗣以承宗祀遂納為太子妃及是立為后帝釋菜于孔子以顔回曽參孔伋孟軻配列邵雍司馬光于從祀又升顓孫師于十哲追封雍新安伯講官監官三學長二及諸生推恩有差䝉古許衡謝病還懷孟衡陳時務五事一曰立國規模言國家當行漢法齊一吾民略曰陸行宜車水行宜舟反之則不能行幽燕食寒蜀漢食熱違之則必有變由是論之今日規模非用漢法不宜也然萬世國俗朝一旦驅之下從臣僕之謀改就亡國之俗其勢有甚難者為思天有寒暑積時而變誠能漸之摩之待以嵗月篤信堅守不雜小人不營小利不責近效不恤浮言則致治之功可成也二曰中書大要在用人立法略曰治人者法也守法者人也人法相上安下順而宰執優游廊廟之上不順不此所謂省也夫立法用人今雖未能盡如古昔己仕者給俸以養亷未仕者寬裕以叙用則可舒失職之怨外設監司以察汙濫內専夾部以定資歷則可息非分之求至于家世襲品官任子以及版籍之數續當議之亦不可緩怠而不行也矣三曰為君難以踐言略曰人君不患出言之難而患踐言之難夫以天下之大兆民之衆事有萬變日有萬載人君以一心一身而酬之欲言之無失豈易能哉故有責之所言而今日忘之者今之所命而後日自違者可否異同分更變易紀綱不得布法度不得立天下無所持循奸人因以為弊此無他為上者多樂舒肆為臣者多事容悅容悅本為私也私心盛則不畏人矣舒肆本為欲也欲心盛則不畏天矣以不畏天之心與不畏人之心感合無聞則其所務皆快心事耳快心則口欲言而言身欲動而動又安肯兢兢業業熟思而寡處之乎此踐言之難也防欺略曰人之情僞有易有險有衆有寡未易使之不見欺也人君惟無喜怒也有則贊其美以市恩鼓其怒以張勢人君惟無愛憎也有則假其愛以濟私藉其憎以復怨甚至本無喜也誑之使喜本無怒也激之使怒本不足愛也而遇譽之使愛本無可憎也而强短之使憎若是則進者未必為君子退者未必為小人豫者未必為有功奪者未必為有纍以至賞罰生殺鮮有得其正者欺而至此尚可防邪是故人君以知人為貴既不能知而欲防其歉雖堯舜不能也任賢略曰賢者遭特不偶務旬晦人君或知之而召之命之泛如厮養賢者不屑也或接之以貌待之以禮而賢不見用或用其言而復使小人參之有用賢之名無用賢之實賢者必不肯尸位素餐以取譏于天下其難進也如此且又有難合者為大扺人君居崇高之地樂聞人過而不樂聞己過務快己心而不務快民心賢者必欲匡正而扶持之使如堯舜而後已故其勢恆難合况奸邪佞幸醜正惡直多方以陷之邪此任賢之難也去邪略曰邪奸之人其為心險其用術巧其諂似恭其奸似直其欺似可信其侫似可近務以窺人主之意㫖而迎合之竊其勢以立己之威濟其欲以結主之憂愛隆于上擅于下毒被生民而下莫之知至是而求去之難矣得民心略曰民之戴君本于天命特由使之失望使之不平然後怨怒生焉必如古者大學之道以紓身為木一言一動舉可以為天下之法一賞一罰舉有以合天下之公則德兆之心不求而自得之豈有先望不平之纍哉順天道略曰三代而下稱盛治者無如漢文帝然當時天象數變而文景克謹天戒一以養民為務故民心得而和氣應臣竊見近年近字迭見議者謂當除舊布新以應天變臣以為曷若直法文景之恭儉愛民為理明義正而可信耶六者為難之目四曰農桑學校略曰今國家但知斂財之巧而不知生財之由徒如防人之欺而不欲養人之善徙患法今之難行而不患無可行之地誠能優重農民勿優勿害驅遊惰之人而歸之南􅒪十年以後倉盈庫積當非今日之比矣自都邑至州縣皆設學校使皇子以下互于庶人之子弟皆從事于學十年之後上知所以御下下知所以事上上下和睦又非今日之比矣能是二者則萬目皆舉否則他皆不可期也五曰慎微略曰天下所以定者道有其宜人君不可不慎也夫審而後發則發無不中否則觸事而懼或喜或怒色見于貌言出于口人皆知之徐考其故必悔其失矣是以先王潛心恭默不易喜怒其未發也雖至近莫能知其既發也雖至親莫能移是以號令簡而無悔則無不中節矣書凡萬餘言既奏䝉古主嘉納之衡多病䝉古主命五日一至中書至是始聽歸懷孟考元史許衡傳衡所上疏列為五條續綱目刪作四事且節録殊不明晰今依本傳及王世貞綱鑑㑹纂改時二月以賈似道平章軍國重事三日一朝治事都堂似道上疏乞歸養帝命大臣侍從傳㫖固留日四五至中使加賜日十數至夜即交卧第外以守之特授平章軍國重事一月三赴經筵三日一朝治事都堂賜第西湖之葛嶺在西湖北相傳葛洪煉丹于此故名使迎養其中似道于是五日一乘湖船入朝不赴都堂治事吏抱文書就第呈署大小朝政一切决于館客廖瑩中堂吏翁應龍宰執充位而已似道雖深居簡出凡臺諫彈劾諸司薦辟及未尹畿一切事不白不敢行正人端士斥罷殆盡更爭納賂求美職圖為帥盟司郡守者貢獻不可勝計一時貪風大肆兵喪于外匿不以聞民怨于下誅責無藝莫敢言者三月以程元鳳為右丞相兼樞密使尋罷賈似道恐元鳳侵權諷陳宜中劾罷之夏五月丁丑朔日食秋八月進封嗣榮王與芮為福王以葉夢鼎字鎮之寧海人為右丞相兼樞密使固辭不許利州路轉運使王價子訴求遺澤夢鼎以為合與似道以恩不出已罷省部吏數人夢鼎怒即求去似道母責似道曰葉丞相安子家食未嘗求進汝强授以相印今乃牽制至此若不從吾言吾不食矣㑹太學諸生亦上書言似道専權固位似道悔悟求解夢鼎請去益力帝不許冬十二月以吕文焕知襄陽府䝉古阿珠劉整城白河口此白河河南南陽府流入襄陽之河也注詳前方輿紀要宋末元築城于白河入漢之處故址尚存劉整言于䝉古主曰襄陽吾故物由棄弗戍使宋得竊築為疆藩若復襄陽浮漢入江則宋可平也䝉古主從之詔徴諸路兵命阿珠與整經略襄陽阿珠駐馬虎頭山在襄陽縣西南顧漢東白河口曰若築壘于此以斷宋餉道襄陽可圖也遂城其地吕文煥大懼遣人以蠟書告文德文德深且罵曰汝夢妄言要功賞亦假城耳襄陽城池堅兵儲支十年今吕六堅守杲整妄作春水至吾往取之比至恐遁去耳議者竊笑之戊辰四年䝉古至元五年夏四月奪觀文殿大學士惠國公謝方叔官爵方叔以嘗為東宫官自豫章以一琴一鶴金丹一爐獻帝似道疑其觀望再相諷諫官趙順孫等論其不當誘人主為聲色之好欲謫之逺郡吕文德請以已官贖方叔罪乃止奪官爵秋九月蒙古阿珠劉整圍襄陽劉整與阿珠計曰我精兵突騎所當者破惟水戰不如宋耳奪彼所長造戰艦習水軍則事濟矣乃造船五千艘日練水軍雖雨不能出亦畫地為船而習之得練卒七萬遂築圍城以逼襄陽冬十月戊寅朔日食十一月行義役法蒙古以和爾果斯舊作和禮霍孫今改為起居注省臣言前代必有起居注故善政嘉謀不致遺失䝉古主即以和爾果斯為之御批厯代通鑑輯覽卷九十三

  text: 欽定四庫全書御批厯代通鑑輯覽卷四十南北朝庚梁晉通元年子魏正光元年春正月丙子月之二日日食秋七月魏侍中元乂殺太傅清河王懌幽太后於北宫
  hash: sha256:884bc3b836c50011981058b8b53dbbd2f9ca4bf9e3afed21efab13d6c87a9307

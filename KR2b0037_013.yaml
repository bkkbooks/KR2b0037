  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_013-1a, image: WYG0335/WYG0335-0324c.png}
body:
  text: 名恒高祖中子母曰薄姫先在魏許負相曰當生天子後入漢高祖内之後宫一曰召幸之姬曰昨夢蒼龍據吾腹高祖曰此貴徵也吾為汝成之遂生帝初封代王大臣既誅諸吕遂迎立之壬戌元年十月帝謁高廟尊太后為皇太后遣車騎將軍薄昭迎于代立趙幽王故趙王友子遂為趙王徙琅邪王澤為燕王初齊王襄起兵紿琅邪王澤留之事具前澤不得反國乃之長安與諸大臣共立帝以功徙為燕王瑯邪復歸齊以陳平為左丞相周勃為右丞相灌嬰為大尉陳平謝病上問之平曰高祖時勃功不如臣及誅諸吕臣功不如勃願以右丞相讓勃上從之于是論誅諸吕功右丞相勃以下益戸賜金各有差勃朝罷趨出意得甚上禮之恭嘗目送之郎中袁盎進曰丞相何如人也上曰社稷臣也盎曰丞相功臣非社稷臣夫社稷臣主在與在主亡與亡方吕氏時劉氏不絶如帶丞相為太尉本兵柄不能正吕后崩大臣共誅諸吕丞相適會其成功今丞相如有驕色而陛下謙讓臣主失禮竊為陛下不取也後朝上益莊丞相益畏袁盎字絲楚人十二月除收孥相坐律令應劭曰秦法一人有罪并坐其室家今除此律詔曰法者治之正也今犯法已論而使無罪之父母妻子同産坐之及為收孥朕甚不取其議之有司皆曰收孥相坐所以累其心使重犯法如故便上曰朕聞法正則民慤罪當則民從且夫牧民而導之善者吏也其既不能導又以不正之法罪之是反害于民為暴者也朕未見其便于是有司奉詔除收孥諸相坐律令春正月立子啟為皇太子即景帝有司請早建太子上曰朕既不徳縱不能博求天下賢聖有徳之人而禪天下焉而曰豫建太子是重吾不徳也其安之有司曰豫建太子所以重宗廟社稷不忘天下也古者殷周有國治安皆且千嵗用此道也立嗣必子所從來逺矣今子啟最長純厚慈仁請建為太子上乃許之三月立太子母竇氏風俗通夏帝相后緡方娠遭寒氏之難逃出自竇生少康其支孫以竇為氏為皇后后觀津人吕后時以良家子選入宫後吕后出宫人分賜諸王后入代生景帝后兄長君弟廣國字少君㓜為人所畧賣傳十餘家聞皇后立乃上書自陳召見驗問得實厚賜田宅家于長安周勃灌嬰等曰吾屬不死命且懸此兩人兩人所出微不可不為擇師傅賓客又復效吕氏也乃選士有節行者與居兩人由此為退讓君子不敢以尊貴驕人詔定振窮養老之令詔曰方春和時草木羣生之物皆有以自樂而吾百姓鰥寡孤獨窮困之人或阽于死亡而莫之省憂為民父母將何如其議所以振貸之又曰老者非帛不煖非肉不飽今嵗首不時使人存問長老又無布帛酒肉之賜將何以佐天下子孫孝養其親哉具為令八十以上月賜米肉酒九十以上加賜帛絮長吏閲視丞若尉致二千石遣都吏循行不稱者督之夏四月齊楚地震山崩二十九山同日崩大水潰出六月令四方毋來獻時有獻千里馬者上曰鸞旗在前屬車在後吉行日五十里師行三十里朕乗千里馬獨先安之於是還其馬與道里費下詔曰朕不受獻也其令四方毋復來獻封宋昌為壯武漢縣故城在今山東萊州府即墨縣西侯帝既施惠天下乃修代來功封昌為壯武侯諸從官張武等六人官皆九卿秋八月右丞相勃免帝益明習國家事問右丞相勃曰天下一嵗决獄幾何勃謝不知又問一嵗錢穀出入幾何勃又謝不知惶愧汗出浹背帝問左丞相平平曰有主者帝曰謂誰平曰陛下即問决獄責廷尉問錢榖責治粟内史秦官漢因之掌穀貨帝曰然則君所主者何事平謝曰陛下不知其駑下使待罪宰相宰相者上佐天子理陰陽順四時下遂萬物之宜外填撫四夷諸侯内親附百姓使卿大夫各得任其職焉帝曰善勃大慚自知能不如平乃謝病免平専為丞相遣大中大夫陸賈使南粤南粤王佗稱臣奉貢初高后時遣隆慮漢縣故城在今河南彰徳府林縣侯周竈擊南粤㑹暑濕大疫兵不能隃嶺佗因此以兵威財物賂遺閩越西甌駱元和志嶺南道邕管貴州本西甌駱越地寰宇記永嘉為東甌鬰林為西甌貴州今廣西潯州府貴縣􅓹林故城在縣南役屬焉東西萬餘里乗黄屋左纛稱制與中國侔至是帝初鎮撫天下使告諸侯四夷以陸賈前使粤召為大中大夫謁者一人為副使賜佗書書曰朕高皇帝側室之子奉北藩于代高皇帝棄羣臣孝恵皇帝即世高后自臨事不幸有疾諸吕為變賴功臣之力誅之朕以王侯吏不釋之故不得不立乃者聞王遺隆慮侯書求親昆弟請罷長沙兩將軍朕以王書罷將軍博陽侯親昆弟在真定者已遣人存問修治先人冢前日聞王發兵于邊為冦不止長沙苦之南郡尤甚雖王之國庸獨利乎必多殺士卒傷良將吏寡人之妻孤人之子獨人父母得一亡十朕不忍為也得王之地不足以為大得王之財不足以為富嶺以南王自治之雖然王號為帝兩帝並立亡一乗之使以通其道是爭也爭而不讓仁者不為也願與王分棄前患通使如故陸賈至佗恐頓首謝罪願奉明詔長為藩臣奉貢職下令國中曰兩賢不並世漢皇帝賢天子自今以來去帝制黄屋左纛因奉書書稱蠻夷大長老夫臣佗昧死再拜上書皇帝陛下老夫故粤吏也高皇帝幸賜臣佗璽以為南粤王孝恵皇帝義不忍絶所賜老夫者甚厚高后用事别異蠻夷出令曰毋與粤金鐡田器馬牛羊老夫僻處馬牛羊齒已長自以祭祀不修有死罪使凡三輩上書謝過終不反又風聞父母墳墓已壞削兄弟宗族已誅論吏相與議曰今内不得振于漢外亡以自高異故更號為帝自帝其國非有害于天下也高皇后聞之大怒削南粤之籍使使不通老夫竊疑長沙王讒臣故發兵以伐其邊老夫處粤四十九年今抱孫焉然夙興夜寐寢不安席食不甘味者以不得事漢也今陛下幸哀憐復故號通使如故老夫死骨不腐改號不敢為帝矣并獻方物召河南守呉公為廷尉賈誼為大中大夫帝謂河南守呉公治平為天下第一召為廷尉呉公薦洛陽人賈誼誼以能誦詩書屬文稱于郡中呉公召置門下帝召以為博士誼時年二十餘帝愛其辭博每詔令議下諸老先生未能言誼盡為之對人人各如其意所出諸生以為能帝悦之一嵗中超遷至大中大夫誼請改正朔易服色定官名興禮樂以立漢制更秦法草具其儀法色上黄數用五為官名悉更奏之帝謙讓未遑也癸亥二年冬十月丞相曲逆侯陳平卒諡曰獻平常言吾多陰謀道家所禁吾世即廢亦已矣終不能復起也後平曽孫何坐法棄市竟不得續封詔列侯之國詔曰古者諸侯各守其地以時入貢民不勞苦上下驩欣靡有違德今列侯居長安邑逺吏卒給輸費苦而列侯亦無由教訓其民其各之國十一月以周勃為丞相癸卯晦日食詔舉賢良方正能直言極諫者詔曰人主不徳天示之災以戒不治朕下不能治育羣生上以累三光之明不徳大矣令至其悉思朕之過失及知見之所不及匄以啟告朕及舉賢良方正能直言極諫者以匡朕之不逮因各敕以職任務省繇費以便民罷衛將軍軍太僕見馬遺財足遺留也財與纔同減而留者纔足充數而已餘皆以給傳置潁陰漢縣故城在河南陳州府淮寧縣西北侯騎侯家之騎從賈山潁川人上書言治亂之道名曰至言其辭曰臣聞雷霆之所擊無不摧折者萬鈞之所壓無不糜滅者今人主之威非特雷霆也勢重非特萬鈞也開道而求諫和顔色而受之用其言而顯其身士猶恐懼而不敢自盡又况于縱欲恣暴惡聞具過乎昔者周葢千八百國以九州之民養千八百國之君君有餘財民有餘力而頌聲作秦皇帝以千八百國之民自養力罷不能勝其後財盡不能勝其求身死纔數月耳天下四面而攻之宗廟滅絶矣秦皇帝居滅絶之中而不自知者何也亡輔弼之臣亡直諫之士天下已潰而莫之告也今陛下使天下舉賢良方正之士天下之士莫不精白以承休徳今已在朝廷矣乃選其賢者使為常侍諸吏與之馳騁射獵一日再三出臣恐朝廷之解弛百官之墮于事也陛下即位親自勉以厚天下振貧民禮高年平獄緩刑天下莫不説喜臣聞山東吏布詔令民雖老羸癃疾扶杖而往聴之願少須臾毋死思見徳化之成也今功業方就名聞方昭四方鄉風詩曰靡不有初鮮克有終臣不勝大願頼以夏嵗二月定明堂造太學修先王之道風行俗成萬世之基定惟陛下所幸耳古者大臣不得與宴遊方正修㓗之士不得從射獵使皆務其方以高其節夫士修之于家而壞之于天子之廷臣竊愍之陛下與衆臣宴遊與大臣方正朝廷議論夫游不失樂朝不失禮議不失計軌事之大者也帝嘉納焉帝毎朝郎從官上書疏未嘗不止輦受其言言不可用置之可用採之未嘗不稱善上從霸陵上欲西馳下峻坂中郎將袁盎攬轡上曰將軍怯耶盎言曰臣聞千金之子坐不垂堂聖主不乗危不徼幸今陛下聘六飛下峻山有如馬驚車敗陛下縱自輕奈高廟大后何上乃止上所幸慎夫人在禁中常與皇后同席坐及幸上林郎署長布席盎引却慎夫人坐慎夫人怒上亦怒盎因前説曰臣聞尊界有序則上下和今陛下既已立后慎夫人乃妾妾主豈可與同坐且陛下獨不見人彘乎上説語慎夫人賜盎金五十觔春正月親耕籍田賈誼説上曰筦子曰倉廩實而知禮節衣食足而知榮辱民不足而治者自古及今未之嘗聞古之人曰一夫不耕或受之饑一女不織或受之寒生之有時而用之無度則物力必屈古之治天下至纎至悉故其畜積足恃今背本而趨末者甚衆淫侈之俗日月以長生之者甚少而靡之者甚多天下財産何得不蹷世之有饑穰天之行也禹湯被之矣即不幸有方二三千里之旱國胡以相恤卒然邊境有急數十百萬之衆國胡以餽之夫積貯者天下之大命也茍粟多而財有餘何為而不成以攻則取以守則固以戰則勝懷敵附遠何招而不至今敺民而歸之農皆著于本使天下各食其力末技游食之民轉而緣南畝則畜積足而人樂其所矣上感誼言于是詔開籍田上親率耕以勸百姓三月立趙幽王子辟疆為河間王治樂成今直𨽻河間府獻縣是朱虚侯章為城陽王治莒今山東沂州府莒州是東牟侯興居為濟北王治盧故城在今山東濟南府長清縣子武為代王參為太原王治晉陽注見前揖為梁王治睢陽今歸德府商邱縣是有司請立皇子為諸侯王詔先立河間憐趙王友幽死故既立其太子遂又復立其少子城陽濟北以平諸吕有功故王三王然後立皇子三皇子同日立後武徙淮陽參徙代并有太原揖好讀書帝愛之異于他子立十年卒無子武遂徙王梁夏五月除誹謗妖言法詔曰古之治天下朝有進善之旌誹謗之木帝堯事見前所以通治道而來諫者也今法有誹謗妖言之罪是使衆臣不敢盡情而上無由聞過失也將何以來逺方之賢良其除之民或祝詛上以相約而後相謾欺也初約祝詛後相欺誑中道而止無實事也吏以為大逆其有他言又以為誹謗此細民之愚無知抵罪朕甚不取自今以來有犯此者勿聼治秋九月賜天下今年田租之半詔曰農天下之本也民所恃以生也而民或不務本而事末故生不遂朕今親率羣臣農以勸之其賜天下民今年田租之半甲子三年冬十月丁酉晦日食十一月丁卯晦日食丞相絳漢縣後漢改絳邑故城在山西平陽府曲沃縣西南侯勃免就國詔曰前遣列侯就國或辭未行丞相朕所重其為朕率列侯之國以灌嬰為丞相罷太尉官淮南王長來朝殺辟陽漢縣故城在今直𨽻冀州東南侯審食其初高祖過趙趙王敖進美人得幸有身及貫高事發美人亦坐繫美人母弟趙兼因審食其言吕后吕后妬弗肯白食其亦不彊爭美人已生子恚即自殺吏奉其子詣高祖高祖悔名之曰長令吕后母之㑹黥布反即封長為淮南王事具前王蚤失母附吕后故吕后時得無恙而常心怨食其弗敢發至是入朝王素驕蹇不奉法上以親故寛假之及入見從上入苑囿獵與上同車常謂上大兄往見食其袖鐵椎椎殺之馳至闕下肉袒謝罪帝傷其志為親赦弗治以此歸國益驕恣出入稱警蹕稱制擬于天子袁盎諫曰諸侯太驕必生患上不聴夏五月匈奴入冦帝如甘泉甘泉宫名也在今陕西西安府涇陽縣西北遣丞相嬰將兵擊走之遂如太原濟北王興居反遣大將軍柴武擊之秋七月還宫八月興居兵敗自殺匈奴入居北地河南注俱見前為寇上幸甘泉遣丞相灌嬰發車騎八萬五千擊之匈奴走出塞上因幸太原見故羣臣皆賜之復晉陽中都民三嵗租留㳺十餘日初誅諸吕時朱虚侯章功尤大大臣許盡以趙地王章以梁地王興居帝既立聞其初欲立齊王故絀其功及王諸子乃割齊二郡王之章興居自以失職奪功常怏怏章立嵗餘卒至是上幸太原興居以為天子且自擊匈奴遂發兵反欲襲滎陽帝聞之詔罷丞相兵以棘蒲今直𨽻趙州侯柴武為大將軍擊之遂還長安八月武擊虜興居興居自殺以張釋之字季堵陽人為廷尉秦官漢因之釋之初為騎郎十年不得調袁盎薦之為謁者朝畢因前言事帝曰卑之無甚高論令今可行也釋之乃言秦漢間得失帝悦拜謁者僕射嘗從行登虎圈在西安府咸寧縣東北上問上林尉漢上林苑有令丞尉屬水衡都尉諸禽獸簿尉不能對虎圈嗇夫漢制縣有鄉嗇夫掌聴訟此其類也從旁代尉對甚悉上曰吏不當若是耶詔釋之拜嗇夫上林令釋之曰陛下以周勃張相如東陽侯何如人上曰長者釋之曰此兩人言曽不出口豈效此嗇夫喋喋利口㨗給哉且秦以任刀筆吏爭亟疾苛察相高其敝徒文具而無實不聞其過陵遲至于土崩今陛下以嗇夫口辨而超遷之臣恐天下隨風而靡矣上曰善乃不拜嗇夫以釋之為宫車令衛尉屬掌司馬門天下上事四方貢獻皆領之頃之太子與梁王共車入朝不下司馬門釋之追止之劾不敬太后聞之帝免冠謝教兒子不謹太后使使承詔赦太子梁王然後得入帝由是竒釋之拜中大夫釋之從行至霸陵時慎夫人從上指示新豐道曰此走邯鄲道也使慎夫人鼓瑟上自倚瑟而歌意慘悽悲懷顧謂羣臣曰嗟乎以北山石為椁用紵絮斮陳漆其間豈可動哉左右皆曰善釋之曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石椁又何戚焉帝稱善至是拜廷尉上行出中渭橋玉海架渭者三橋中渭橋在長樂宫北西渭橋亦曰便橋在長安西東渭橋在萬年東有人從橋下走乗輿馬驚捕屬廷尉釋之奏犯蹕當罰金上怒釋之曰法者天子所與天下公共也今法如是更重之是法不信于民也且方其時上使使誅之則已今已下廷尉廷尉天下之平也壹傾天下用法皆為之輕重民安所措其手足上良乆曰廷尉當是也後有人盗高廟坐前玉環得下廷尉治釋之奏當棄市上大怒曰人盗先帝器吾欲置之族而君以法奏之非吾所以共讀曰恭承宗廟意也釋之曰法如是足也今盗宗廟器而族之有如萬分之一愚民取長陵一抔土陛下何以加其法乎帝乃白太后許之乙丑四年冬十二月丞相潁陰侯灌嬰卒諡曰懿以張蒼陽武人為丞相蒼自秦時為柱下史明習天下圖書計籍尤善律厯髙祖用為計相専主計籍至是以御史大夫代灌嬰為丞相厯有黄帝顓頊夏殷周及魯六家蒼用顓頊厯于六家疏闊中最為微近以高祖十月始至霸上因故秦時本以十月為嵗首而朔晦月見弦望滿虧多非是召河東漢河東郡治安邑安邑注見前守季布至罷歸郡上召季布欲以為御史大夫或言其使酒難近至留邸一月見罷布因進曰臣無功竊寵待罪河東陛下無故召臣此人必有以臣欺陛下者今臣至無所受事罷去此人必有毁臣者夫以一人之譽而召臣以一人之毁而去臣恐天下有識聞之有以闚陛下之淺深也上黙然良乆曰河東吾股肱郡故特召君耳下絳侯周勃廷尉獄既而赦之勃既就國每河東守尉行縣至絳勃自畏常被甲令家人持兵以見之人有告勃欲反下廷尉逮治勃恐不知置辭謂對獄之語吏稍侵辱之勃以千金與吏吏乃書牘背示之曰以公主為證公主者帝女也勃子勝之尚之故獄吏教引為證太后謂帝曰絳侯始誅諸吕綰皇帝璽居北軍不以此時反今居一小縣顧欲反耶帝亦見勃獄辭乃使使持節赦之復爵邑勃既出曰吾嘗將百萬軍然安知獄吏之貴乎作顧成廟在西安府咸寧縣東應劭曰帝自為廟制度卑狭若顧望而成故名自後諸帝皆自立廟景帝廟號徳陽武帝廟號龍淵昭帝廟號徘徊宣帝廟號樂㳺元帝廟號長夀成帝廟號陽池丙寅五年春二月地震夏四月更造四銖錢除盗鑄令初秦用半兩錢文曰半兩重如其文高祖嫌其重更鑄莢錢杜佑曰錢如榆莢重一銖半徑五分于是物價騰踊米石萬錢至是更造四銖錢文亦曰半兩稍輕除盗鑄錢令使民放鑄賈誼諌曰法使天下公得鑄錢敢雜以鉛鐡者罪黥然鑄錢非殽雜為巧則不可得嬴而殽之甚㣲為利甚厚夫事有召禍而法有起姦今令細民人操造幣之勢各隱屏而鑄作因欲禁其厚利微姦雖黥罪日報其勢不止曩禁鑄錢死罪積下今公鑄錢黥罪積下姦數不勝法禁數潰銅使之然也銅布于天下其為禍博矣故不如收之賈山亦上書言錢者亡用器也而可以易富貴富貴者人主之操柄也令民為之是與人主共操柄不可長也上不聴當是時呉王濞以諸侯即豫章銅山韋昭曰豫章當作故鄣今浙江湖州府安吉州漢故鄣縣其東有銅峴山括地志呉採鄣山之銅即此鑄錢富埒天子大中大夫鄧通蜀郡南安人以寵幸賜蜀嚴道銅山今四川雅州府榮經縣漢嚴道其北有銅山使鑄錢財過王者以故呉鄧錢滿天下丁卯六年冬十月淮南王長謀反廢徙蜀道卒淮南王長自作法令逐漢所置吏請自置相帝曲意從之又擅刑殺不辜及爵人至闗内侯數上書不遜帝重自切責之復令薄昭與書引管蔡以為警戒長不悦至是謀反令男子但等與柴武子竒謀以輦車反谷口令人使閩越匈奴事覺召至長安丞相御史大夫等奏長罪當棄市上不忍置法赦長死徙處蜀載以輜車縣次傳之袁盎諫曰上素驕淮南王弗為置嚴傅相以故至此今暴摧折之臣恐卒霧露病死陛下有殺弟之名奈何上曰吾特苦之耳令復之王果恚憤不食死傳者不敢發車封至雍漢縣故城在今陜西鳳翔府鳳翔縣南雍令發之以死聞上哭甚悲逮考諸縣不發封餽侍者皆棄市𦵏長以列侯禮民或歌之曰一尺布尚可縫一斗粟尚可舂兄弟二人不相容上聞而病之後二年封長子安等四人皆為列侯安為阜陵侯勃為安陽侯賜為陽周侯良為東城侯賈誼知上必將復王之也諫曰淮南王悖逆無道天下孰不知其辠今奉尊罪人之子適足以負謗于天下爾此人少壯豈能忘其父哉弗聴十二年追諡長曰厲王匈奴復請和親初冒頓遺漢書請復故約帝報書并遺之繡袷綺衣諸物至是冒頓死子稽粥立號曰老上單于帝遣宗室女翁主為單于閼氏使宦者中行説晉中行氏之别傅翁主説不欲行彊使之説曰必我也為漢患者既至降單于甚親幸于是説教單于左右疏記謂分條而記之以計課其人衆畜物遺漢書牘及印封皆令長大倨傲其辭曰天地所生日月所置匈奴大單于以賈誼為梁王太傅初上議以誼任公卿之位大臣多短之曰年少初學専欲擅權紛亂諸事上于是疏之以為長沙王太傅誼以適去意不自得渡湘為賦以弔屈原至長沙地卑濕有服鳥飛入其舍誼自傷倬為賦以自廣久之上思誼徴之至入見上方受釐音禮顔師古曰福也受釐祭畢而受神之福也坐宣室未央前正室因問鬼神之本誼具道所以然之故至夜半帝前席既罷曰吾乆不見賈生自以為過之今不及也乃拜誼梁王太傅誼上疏曰臣竊惟今之事勢可為痛哭者一可為流涕者二可為長太息者六若其他背理而傷道者難徧以疏舉進言者皆曰天下已安已治矣臣以為非愚則諛皆非知治亂之體者也陛下何不壹令臣得孰數之于前因陳治安之䇿試詳擇焉其畧曰夫樹國固必相疑之勢下數被其殃上數􅐩其憂甚非所以安上而全下也今或親弟謀為束帝親兄之子西向而擊今呉又見告矣天子春秋鼎盛行義未過徳澤有加焉猶尚如是况莫大諸侯權力且十此者乎曩時高皇帝割膏腴之地以王諸侯徳至渥也然其後十年之間反者九起臣竊跡前事大扺彊者先反弱者後反長沙乃二萬五千户耳功少而最完勢疏而最忠非獨性異人也亦形埶然也曩令樊酈絳灌據數十城而王今雖已殘亡可也令信越之倫列為徹侯雖至今存可也然則天下之大計可知己欲諸王之皆忠附莫若令如長沙王欲臣子之勿葅醢亦莫若令如樊酈等欲天下之治安莫若衆建諸侯而少其力力少則易使以義國小則無邪心今海内之勢如身之使臂臂之使指莫不制從割地定制各為若干國國使其子孫以次受之分地衆而子孫少者建以為空而置之須其子孫生者舉使君之一寸之地一人之衆天子亡所利焉誠以定治而已天下之勢方病大瘇一脛之大幾如要一指之大幾如股平居不可屈信失今不治必為痼疾可痛哭者此病是也天下之勢方倒懸今匈奴嫚娒侵掠至不敬也為天下患至亡已也而漢嵗致金絮采繒以奉之夷狄徴令是主上之操也天子共貢是臣下之禮也倒懸如此莫之能解猶為國有人乎可為流涕者此也陛下何忍以帝王之號為戎人諸侯勢既卑辱而禍不息長此安窮臣竊料匈奴之衆不過漢一大縣以天下之大困于一縣之衆甚為執事者羞之陛下何不試以臣為屬國之官主匈奴行臣之計請必繫單于之頸而制其命伏中行說而笞其背舉匈奴之衆惟上之令今不獵猛敵而獵田彘不搏反寇而搏畜兔玩細娯而不圖大患可為流涕者此也今民賣僮者為之繡衣絲履偏諸縁是古天子后服也而庶民得以衣婢妾白穀之表薄紈之裏緁以偏諸美者黻繡是古天子之服而富人大賈召客者以被墻且帝之身自衣皂綈而富民墻屋被文繡天子之后以縁其領者庶人嬖妾縁其履此臣所謂舛也夫俗至大不敬也至亡等也至冒上也進計者猶曰毋為可為長太息者此也啇君遺禮義棄仁恩并心于進取行之二嵗秦俗日敗故秦人家富子壯則出分家貧子壯則出贅借父耰耡慮有徳色母取箕帚立而誶語抱哺其子與公併倨婦姑不相得則反脣而相稽其不同禽獸者無幾耳今其遺風餘俗猶尚未改棄禮義捐亷恥日甚月異而嵗不相同矣而大臣特以簿書期會之間以為大故至于流俗失世壞敗因恬而不知怪以為是適然耳夫移風易俗使天下回心而鄉道類非俗吏之所能為也俗吏之所務在于刀筆筐篋而不知大體筦子曰禮義亷恥是為四維四維不張國乃滅亡可不為寒心哉豈如今定經制令君君臣臣上下有差父子六親各得其宜此業一定世世常安若夫經制不定是猶渡江河亡維楫中流而遇風波船必覆矣可為長太息者此也夏殷周為天子皆數十世秦為天子二世而亡何三代有道之長而秦無道之暴也古之王者太子乃生有司齋肅端冕見之南郊過闕則下過廟則趨故自為赤子而教固已行矣孩提有識三公三少明孝仁禮義以道習之逐去邪人不使見惡行選天下之端士有道術者使與居處出入故太子乃生而見正事聞正言行正道左右前後皆正人也孔子曰少成若天性習貫如自然三代之所以長乆者以其輔翼太子有此具也反秦而不然使趙高傅胡亥而教之獄所習者非斬劓人則夷人之三族也故胡亥今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若艾草菅然豈惟胡亥之性惡哉彼其所以道之者非其理故也鄙諺曰前車覆後車鍳天下之命懸于太子太子之善在于卑諭教與選左右教得而左右正則太子正矣太子正而天下定矣此時務也凡人之智能見己然不能見將然夫禮者禁于將然之前而法者禁于己然之後是故法之所為用易見而禮之所為至難知也若夫慶賞以勸善刑罰以懲惡先生執此之政堅如金石行此之令信如四時據此之公無私如天地豈顧不用哉然而禮云禮云者貴絶惡于未萌起教于微渺使民日遷善逺辠而不自知也世主之欲民善同而所以使民善者異或道之以徳教或敺之令以法令道之以徳教者徳教泠而民氣樂敺之以法者法令極而民風哀哀樂之感禍福之應也夫人之置器置諸安處則安置諸危處則危天下大器也在天子之所置之湯武置天下于仁義禮樂累子孫數十世此天下所共聞也奉皇置天下于法令刑罰禍幾及身子孫誅絶此天下所共見也今或言禮義之不如法令教化之不如刑罰盍引殷周秦事以觀之也人主之尊譬如堂羣臣如陛衆庶如地故陛九級上亷逺地則堂高陛無級亷近地則堂卑高者難攀卑者易陵理勢然也故古者聖王制為等列内自公卿大夫士外有公侯伯子男然後有官司小吏延及庶人等級分明而天子加焉故其尊不可及也諺曰欲投鼠而忌器鼠近于器尚憚不投恐傷其器况于貴臣之近主乎亷恥節禮以治君子是以黥劓之罪不及大夫以其離主上不逺也今自王侯三公之貴皆天子之所改容而禮之者也古天子之所謂伯父伯舅也而今與衆庶同黥劓髠刖棄市之刑然則堂不亡陛乎被戮者不泰迫乎亷恥不行大臣無乃握重權大官而有徒𨽻無恥之心乎夫嘗已在貴寵之位今而有過帝令廢之可也退之可也賜之死可也滅之可也若夫束縛之係緤之輸之司寇編之徒官司寇小吏詈罵而榜笞之非尊尊貴貴之化也古者大臣有坐不亷而廢者曰簠簋不飾坐汙穢淫亂者曰惟簿不修坐罷軟不勝任者曰下官不職故貴大諱臣定有罪矣猶未斥然正以呼之也尚遷就而為之也遇之有禮故羣臣自憙嬰以亷恥故人矜節行化成俗定則為人臣者皆顧行而忘利守節而仗義故可以託不御之權可以寄六尺之孤此勵廉恥行禮誼之所致也主上何䘮焉此之不為而顧彼之乆行故曰可爲長太息者此也上深納其言後梁王揖墜馬死揖無子誼請為梁立後而以淮南地益淮陽帝于是徙淮陽王武為梁王誼自傷為傅無狀常哭泣嵗餘亦卒時年三十三己巳八年夏長星出東方庚午九年春大旱辛未十年冬車騎將軍薄昭有罪自殺昭殺漢使者帝不忍加誅使公卿從之飲酒欲令自引分昭不肯使羣臣䘮服往哭之乃自殺昭初封軹侯既死帝為置後壬申十一年匈奴宼狄道漢縣今為州屬甘肅蘭州府時匈奴數為邊患太子家令秦官漢因之屬詹事鼂錯鼂與朝同王子朝之後以名為氏鍇潁川人上書言兵事曰臣聞用兵臨陣合刃之急者三一曰得地形二曰卒服習三曰器用利步兵之地山林川阜車騎二不當一車騎之地平原曠野步兵十不當一弓弩之地平陵相逺川谷居間仰高臨下短兵百不當一長㦸之地兩陣相近可前可後劔楯三不當一矛鋋之地萑葦竹蕭草木茂接長㦸二不當一劔楯之地曲道相伏險阸相薄弓弩三不當一士不選練卒不服習前擊後懈與金鼓之音相失此不習勒卒之過也百不當十兵不完利甲不堅密弩不及逺射不能中中不能入此將不省兵之禍也五不當一故曰器械不利以其卒予敵也卒不可用以其將與敵也將不知兵以其主與敵也君不擇將以其國與敵也四者兵之至要也今匈奴地形技藝與中國異上下山坂出入溪澗中國之馬弗與猶弗如也險道傾仄且馳且射中國之騎弗與也風雨罷勞饑渇不困中國之人弗與也此匈奴之長技也若夫平原易地輕車突騎則匈奴之衆易撓亂也勁弩長㦸射疏及遠則匈奴之弓弗能格也堅甲利刄長短相雜遊弩往來則匈奴之兵弗能當也材官騶發材官有材力者騶發言驟發其矢也矢道同的言用矢者同中一的則匈奴之革笥以皮作如鎧木薦以木作如楯弗能支也下馬地鬬劔㦸相接去就相薄則匈奴之足弗能給也此中國之長技也匈奴之長技三中國之長技五陛下又與數十萬之衆以誅數萬之匈奴衆寡之計以一擊十之術也雖然兵凶器戰危事帝王之道出于萬全今降胡義渠註見前來歸誼者其衆數千長技與匈奴同可賜之堅甲絮衣勁弓利矢益以邊郡之良騎令明將能知其習俗和輯其心者將之即有險阻以此當之平地通道則以輕車材官制之兩軍相為表裏各用其長技此萬全之術也帝嘉之賜書寵答焉錯初學申商法為人峭直刻深以其辯得幸太子號曰智囊募民徙塞下鼂錯復上言臣聞兵起而不知其勢戰則為人禽屯則卒積死今匈奴數轉牧行獵于塞下以候備塞之卒卒少則入不救則邊民絶望而降敵救之纔到則胡又已去聚而不罷為費甚大罷之則胡復入如此連年則中國貧苦而民不安矣陛下幸憂邊境發卒治塞然令逺方之卒守塞一嵗而更不如選常居者家室田作且以備之以便為之高城深塹要害之處調立城邑毋下千家先為室屋具田器乃募民免罪拜爵復其家予冬夏衣廩食能自給而止初徙予之能自供瞻即止塞下之民利禄不厚不可使乆居危難之地胡人入驅而能止其所驅者以其半與之縣官為贖如是則邑里相救助赴敵不避死非以徳上也欲全親戚而利其財也此與東方之戍卒不習地勢而畏胡者功相萬也上從之錯復言陛下幸募民以實塞下使屯戍益省輸將益寡甚大恵也臣聞古之徙民者相其隂陽之和嘗其水泉之味然後營邑立城制里割宅置器物焉使民至有所居作有所用此民所以輕去其鄉而勸之新邑也為置醫巫以救疾病修祭祀男女有昏生死相恤墳墓相從種樹畜長所以使民樂其處而有長居之心也臣又聞古之制邊縣以備敵也使伍家為伍十伍為里四里一連十連為邑皆擇其邑之賢才習地形知民心者為之長居則習民于射法出則教民于應敵服習以成勿令遷徙㓜則同遊長則共事夜戰聲相知則足以相救畫戰目相見則足以相識驩愛之心足以相死如此而勸以厚賞威以重罰則前死而不旋踵矣癸酉十二年冬十二月河决酸棗漢縣故城在河南衛輝府滑縣北東潰金堤括地志金堤一名千里堤在白馬東白馬漢縣故城在衛輝府滑縣東北于是東郡大興卒塞之劉友益曰書河决始此詔民入粟邊拜爵免罪賜民今年半租鼂錯上言請重農貴粟畧曰聖王在上而民不凍饑者非能耕而食之織而衣之也為開其資財之道也故堯有九年之水湯有七年為之旱而國亡捐瘠者以畜積多而備先具也今海内一亡有水旱之災而畜積未及者何也地有餘利民有餘力生穀之土未盡墾山澤之利未盡出游食之民未盡歸農也人情一曰不再食則幾終嵗不製衣則寒腹饑不得食膚寒不得衣雖慈母不能保其子君安能以有其民哉夫珠玉金銀饑不可食寒不可衣然而衆貴之者以上用之故也粟米布帛一曰弗得而饑寒至是故明君貴五榖而賤珠玉今農夫五口之家耕不過百畮收不過百石春耕夏耘秋穫冬蔵四時之間亡日休息又私自送往迎來弔死問疾養孤長㓜在其中勤苦如此復被水旱之災賦斂不時朝令暮改有者半價而賣無者取倍稱之息于是有賣田宅鬻子孫以償債者矣而商賈大者積眝倍息小者坐列販賣操其竒贏日㳺都市乘上之急所賣必倍故其男不耕耘女不蠶織衣必文采食必梁内因其富厚交通王侯千里㳺教冠盖相望此商人所以兼并農人所以流亡者也方今之務莫若使民務農欲民務農在于貴粟貴粟之道在于使民以粟為賞罰今募天下入粟縣官得以拜爵除罪則富人有爵農民有錢所謂捐有餘補不足令出而民利者也不過三嵗塞下之粟必多矣帝從之令民入粟于邊拜爵以多少級數為差錯復言邊食足支五歳可入粟郡縣郡縣足支一嵗可時赦勿收農民租帝復從之乃下詔曰道民之路在于務本朕親率天下農十年于今而野不加闢嵗一不登民有饑色是從事焉尚寡而吏奉吾詔不勤而勸民不明也且吾農民甚苦而吏莫之省將何以勸焉其賜農民今年田租之半置三老孝悌力田常員詔曰孝悌天下之大順也力田為生之本也三老衆民之師也亷吏民之表也朕甚嘉此二三大夫之行今萬家之縣云無應令謂無孝悌力田可應察舉之令豈實人情是吏舉賢之道未備也其遣謁者勞賜三老孝者帛五匹悌者力田二匹亷吏三匹及問民所不便安而以户口率置三老孝悌力田常員令各率其意以道民焉甲戌十三年春二月詔具親耕桑禮儀詔曰朕親耕以供粢盛皇后親桑以奉祭祀其具禮儀漢書儀春始東耕于籍田以太牢祀先農百官皆從以次耕又春桑生皇后親桑于苑中養蠶于簿以少牢祀蠶神還獻于繭館夏除秘祝初秦時祝官有秘祝即有災祥輙移過于下至是詔曰禍自怨起福由徳興百官之非宜由朕躬今秘祝之官移禍于下朕甚不取其除之五月除肉刑齊太倉令淳于意臨淄人師同郡公乘陽慶受黄帝扁鵲脈書診病知生死有罪當刑詔逮繫長安其少女緹縈意有五女臨行意罵曰生子不生男緩急無可使緹縈傷父言乃隨之西上書曰妾父為吏齊中皆稱其廉平今坐法當刑妾傷夫死者不可復生斷者不可復續雖欲改過自新其道無繇願沒入為官婢以贖父刑罪帝憐悲其意詔曰詩曰愷弟君子民之父母今人有過教未施而刑已加焉或欲改過為善而道無繇至朕甚憐之夫刑至斷支體刻肌膚終身不息何其痛而不徳也豈為民父母之意哉其除肉刑有以易之於是丞相張蒼等定律以上當髠者為城旦舂當黥髠者鉗為城旦舂當劓者笞三百當斬左止者笞五百當斬右止及殺人先自告吏坐受賕枉法守縣官財物而即盗之已論而後有笞罪者皆棄市其城旦舂者各有嵗數以免制曰可是時上既躬修元黙而將相皆舊功臣懲惡亡秦之政論議務在寛厚化行天下吏安其官民樂其業畜積嵗増户口寢息生也風流篤厚禁網疏闊是以刑罰大省斷獄四百有刑措之風焉六月除田之租税詔曰農天下之本務莫大焉今厪與勤同身從事而有租税之賦是謂本末者本謂農末謂商賈無以異也其于勸農之道未備除之乙未十四年冬匈奴入宼遣兵擊之出塞而還匈奴老上單于以十四萬騎入朝那漢縣故城在今甘肅平凉府平凉縣西北蕭關在平凉府固原州東南殺北地都尉卬卬姓孫見功臣表虜人畜甚多使竒兵入燒回中宫注見前候騎至雍甘泉注見前詔發車千乘騎卒十萬上親勞軍勒兵申教令欲自征匈奴羣臣諫不聴皇太后固要上乃止以張相如欒布為將軍撃逐出塞即還赦作徒魏尚槐里人復為雲中守漢雲中郡治雲中縣即趙故城注見前上輦過郎署見郎署長馮唐問曰父老顔師古曰謂年已老也考唐在武帝初年九十餘則此時年當餘六十故帝呼之曰父老何自為郎家安在對曰臣大父趙人父徙代上曰吾居代時吾尚食監高袪數為我言趙將李齊之賢戰于鉅鹿下今吾每飯意未嘗不在鉅鹿也父老知之乎對曰尚不如亷頗李牧之為將也上搏髀曰嗟乎吾獨不得亷頗李牧為將吾豈憂匈奴哉唐曰陛下雖得之不能用也上怒復入禁中良乆召唐卒復問曰公何以知吾不能用亷頗李牧也唐對曰上古王者之遣將也跪而推轂曰閫以内寡人制之閫以外將軍制之軍功爵賞皆决于外歸而奏之要非虚言也李牧為趙將軍市租皆自用饗士賞賜不從中覆委任而責成功故牧得盡其智能而趙幾霸今臣竊聞魏尚為雲中守其軍市租盡以饗士卒私養錢私廪假錢自饗賓客軍吏舍人是以匈奴逺避不敢近塞虜曽一入尚擊之所殺甚衆坐上功首虜差六級秦法斬敵一首拜爵一級今魏尚所上首虜之數差六級因坐罪陛下下之吏削其爵徒作之由此言之陛下賞太輕罰太重雖得頗牧弗能用也上悦是日令馮唐持節赦魏尚復為雲中守拜唐為車騎都尉春増諸祀壇場珪幣詔曰朕獲執犧牲珪幣以事上帝宗廟十四年于今厯日彌長朕甚自愧其廣増諸祀壇場珪幣昔先王逺施不求其報望祀不祈其福右賢左戚先民後己至明之極也今吾聞祠官祝釐皆歸福于朕躬不為百姓夫以朕之不徳而専饗獨美其福百姓不與焉是重吾不徳也其令祠官致敬無有所祈丙子十五年春黄龍見成紀注見前夏四月帝如雍始郊見五帝此五畤之五帝也五畤注詳後景帝中六年初魯人公孫臣上言始秦得水徳漢受之當為土徳應黄龍見宜改正朔色尚黄丞相張蒼以漢乃水徳公孫臣言非是罷之至是黄龍見成紀帝召公孫臣為博士與諸生申明土徳草改厯服色事張蒼由是遂絀下詔禮官議郊祀夏四月帝行幸雍郊見五帝秋九月親策賢良能直言極諫者以鼂錯為中大夫詔諸侯王公卿郡守舉賢良能直言極諌者上親策之時對䇿者百餘人太子家令鼂錯最為高第錯對策大畧以為五帝其臣莫及則自親之三王臣主俱賢則共憂之五伯不及其臣則任使之故各當其世而立功徳焉擢為中大夫錯又上言宜削諸侯及法令可更定者書凡三十篇上雖不盡聴然竒其材丁丑十六年夏四月郊祀五帝于渭陽以新垣平為上大夫趙人新垣平以望氣見上曰長安東北有神氣成五采東北神明之舍天瑞下宜立祠以合符應于是作渭陽五帝廟廟同一宇帝各一殿面五門各如其方之色括地志廟在咸陽東臨渭夏四月帝親祠之貴平至上大夫賜累千金而使博士諸生刺采取之也六經中作王制即今禮記王制篇議巡守封禪事分齊地立悼恵王子六人為王齊王則哀王襄子薨無子國除上乃分齊地立悼恵王肥子將閭為齊王志為濟北注見前王賢為菑川治劇故城在今山東青州府壽光縣王雄渠為膠東治即墨注見前王卬為膠西治高密今縣屬萊州府王辟光為濟南治東平陵今濟南府厯城縣是王分淮南地立厲王子三人為王安為淮南王仍治夀春勃為衡山王治六注見前賜為廬江治舒今江南廬州府廬江縣是王厲王四子東城侯良已卒故不封詔更以明年為元年立汾陰注見前廟新垣平使人持玉杯詣闕下而入言于上曰闕下有寳玉氣已視之果有獻玉杯者刻曰人主延夀平又言臣候日再中居頃之日郤復中于是始更以十七年為元年令天下大酺平復言周鼎在泗水中注見前今河決通于泗而汾隂有金寳氣意鼎出乎于是治廟汾陰欲祠鼎出戊寅後元年冬十月新垣平伏誅人有上書告新垣平所言皆詐也下吏治誅夷平是後上亦怠于改正之成反正朔也服服色也鬼神之事渭陽五帝使祠官領以時致禮不往焉詔議可以佐百姓者詔曰間者數年不登又有水旱疾疫之災朕甚憂之意者朕之政有所失而行有過與將百官之奉養或費無用之事或多與何其民食之寡乏也夫度田非益寡而計民未加益以口量地其于古猶有餘而食之甚不足者其咎安在無乃百姓之從事于末以害農者蕃為酒醪以靡同糜散也榖者多六畜之食焉者衆與細大之義吾未能得其中其與丞相列侯吏二千石博士議之有可以佐百姓者率意逺思無有所隱己夘二年夏復與匈奴和親詔曰間者累年匈奴並暴邊境多殺吏民朕夙興夜寐為之惻怛不安未嘗一日忘于心故遣使者冠葢相望結轍使車徃還故轍如結于道以諭朕志于單于今單于計社禝之安便萬民之利新與朕俱棄細過偕之大道結兄弟之義以全天下元元之命和親以定始于今年時上遺匈奴書匈奴亦使當户報謝復和親當户匈奴官名秋八月丞相蒼免以申屠嘉申侯之後居安定屠原為申屠氏嘉梁人為丞相時張蒼病免蒼罷相口中無齒食乳年百餘嵗乃卒帝以后弟廣國賢有行欲相之曰恐天下以吾私廣國乆念不可而髙帝時大臣餘見無可者御史大夫申屠嘉故以材官蹶張如淳曰有材多力之士能脚蹋强弩張之故曰蹶張從高帝封闗内侯遂以為丞相嘉為人彊直門不受私謁是時大中大夫鄧通方愛幸通初以櫂船為黄頭郎帝嘗夢欲登天不能有黄頭郎推之上顧其衣尻帶穿覺而之漸臺見通其衣後穿夢中所見也召問姓名曰鄧通鄧猶登也帝遂愛幸之嘉嘗入朝通居上旁怠慢嘉奏事畢因言曰陛下愛幸羣臣即富貴之至于朝廷之禮不可不肅上曰君勿言吾私之顔師古曰言當私戒之罷朝嘉坐府中為檄召通不來且斬通恐入言上上曰汝第往吾使人召若通詣丞相免冠徒跣頓首謝嘉坐自如責曰朝廷者高帝之朝廷也通小臣戲殿上大不敬當斬史令史也今行斬之通頓首首盡出血不解上度丞相已困通使使持節召通而謝丞相曰此吾弄臣君釋之通至為上泣曰丞相幾殺臣辛巳四年夏四月丙寅晦日食癸未六年冬匈奴冦上郡雲中詔將軍周亞夫勃次子封條侯等屯兵備之匈奴老上單于死子軍臣單于立絶漢和親大入上郡漢郡治膚施膚施縣今屬延安府雲中所殺畧甚衆烽火通于甘泉長安遣將軍令免顔師古曰姓令名免屯飛狐蘇意屯句注飛狐句注注俱見前張武屯北地漢郡治馬領故城在今甘肅慶陽府環縣東南周亞夫次細栁今西安府咸陽縣西南有細栁倉即亞夫屯兵處劉禮次霸上徐厲次棘門在咸陽縣東北秦故闕門也以備胡上自勞軍至霸上及棘門軍直馳入將以下騎送迎已而至細栁軍軍士吏被甲鋭兵刃彀弓弩持滿先驅至不得入曰天子且至軍門都尉曰將軍令曰軍中聞將軍令不聞天子之詔于是上乃使使持節詔將軍吾欲勞軍亞夫乃𫝊言開壁門門士請車騎曰將軍約軍中不得馳驅于是上乃按轡徐行至營亞夫持兵揖曰介胄之士不拜請以軍禮見上為改容式車使人稱謝皇帝敬勞將軍成禮而去羣臣皆驚上曰嗟乎此真將軍也曩者霸上棘門軍若兒戲耳其將固可襲而虜也至于亞夫可得而犯哉稱善者乆之後月餘匈奴逺塞兵罷拜亞夫為中尉秦官漢因之掌徼循京師夏大旱蝗詔弛利省費振民令諸侯毋入貢弛山澤減諸服御損郎吏員發倉庾在邑曰倉在野曰庾以振貧民民得賣爵富人欲爵貧人欲錢故聴賣買甲申七年夏六月帝崩遺詔短䘮遺詔曰萬物之生靡不有死死者天地之理物之自然奚可甚哀當今之世咸嘉生而惡死厚𦵏以破業重服以傷生吾甚不取且朕既不徳無以佐百姓今崩又使重服乆臨哀人父子損其飲食絶鬼神之祭祀以重吾不徳謂天下何朕獲保宗廟以𦕈𦕈之身託于天下君王之上二十有餘年賴天之靈社稷之福方内安寧靡有兵革朕既不敏常畏過行以羞先帝之遺徳惟年之乆長懼于不終今乃幸以天年得復供養于高廟其奚哀念之有其令天下吏民令到出臨三日皆釋服殿中當臨者皆以旦夕各十五舉音禮畢罷服大紅與功同十五日小紅十四日纎七日釋服大功小功纎皆以衰布言由粗及細大功中祥小功大祥纎則禫也三十六日而釋服以日易月也布告天下使明知朕意霸陵山川因其故無有所改因山為蔵不復起墳就其水名以為陵號歸夫人以下至少使夫人下有美人良人八子七子長使少使皆遣歸家𦵏霸陵在西安府咸寕縣東其西北為霸陵縣即霸上也帝在位二十三年宫室苑囿車騎服御無所増益有不便輙弛以利民嘗欲作露臺史記索隱新豐驪山上有露臺鄉即文帝欲作臺處召匠計之直百金帝曰百金中人十家之産也吾奉先帝宫室常恐羞之何以臺為身衣弋綈弋黒色綈厚繒也所幸慎夫人衣不曵地帷帳無文繡以示敦朴為天下先治霸陵皆瓦器不得以金銀銅錫為飾呉王詐病不朝賜以几杖羣臣袁盎等諫説雖切嘗假借納用之張武等受賂遺金錢覺賜御府錢以愧其心専務以徳化民是以海内安寧家給人足後世鮮能及之太子啟即位是為孝景帝尊皇太后曰太皇太后皇后曰皇太后秋九月有星孛于西方孝景皇帝乙酉元年冬十月尊高皇帝為太祖孝文皇帝為太宗令郡國立太宗廟丞相嘉等奏功莫大于高皇帝徳莫盛于孝文皇帝高皇帝宜為太祖之廟孝文皇帝宜為太宗之廟天子世世獻郡國宜各立太宗廟制曰可復收民田半租初文帝除民田租事具前至是令民出租之半三十而税一也減笞法文帝雖除肉刑而笞五百及三百者率多死至是帝下詔曰加笞與重罪謂死刑無異幸而不死不可為人其定律笞五百曰三百笞三百曰二百然尚有不全者後更減笞三百曰二百笞二百曰一百事在中元六年又定箠令箠以竹為之長五尺其本大一寸末薄半寸皆平其節當笞者笞臀毋得更人謂行笞者不更易人自是笞者得全以張歐沛人字叔高祖功臣安邱侯説少子為廷尉歐事帝于太子宫雖治刑名家為人長者未嘗言案人専以誠長者處官官屬亦不敢大欺丙戌二年冬十二月有星孛于西南春三月立子六人為王徳為河間王故河間哀王福薨無子以其地封徳閼為臨江治江陵注見前王立三年薨無子餘為淮陽注見前王後徙封魯非為汝南治平輿注見前王後徙封江都彭祖為廣川治信都注見前王後徙封趙發為長沙注見前王長沙王呉著薨無子國除故以其地封發夏四月太皇太后崩𦵏南陵在霸陵南六月丞相故安侯申屠嘉卒時鼂錯為内使秦内史掌治京師漢因之數請間言事輙聴寵幸傾九卿漢正九卿奉常郎中令衛尉太僕廷尉典客宗正治粟内史少府是也法令多所更定丞相嘉疾之錯以内史門東出不便乃更穿一門南出南出者太上皇廟堧内垣外游地垣也嘉聞為奏請誅錯客有語錯錯恐夜入宫自歸上自首于上也至朝嘉請上曰錯所穿乃外堧垣故冗官居其中且我使為之錯無罪嘉罷朝曰吾悔不先斬錯乃為所賣歐血而死諡曰節以陶青陶陶唐氏之後青高祖功臣開封侯舍子為丞相鼂錯為御史大夫彗星出東北秋衡山漢國注見前雨雹大者五寸深者二尺熒惑注見前逆行守北辰中宫北極五星亦曰天極月出北辰間月有九行終不能出北辰之間出北辰間失其行也嵗星注見前逆行天廷太微為天廷中丁亥三年冬十月梁王武來朝梁王以竇太后少子故有寵居天下膏腴地北界泰山西至高陽四十餘城皆大縣賞賜不可勝道府庫金錢且百鉅萬珠玉寳器多于京師至是來朝時上未置太子與王宴飲從容言曰千秋萬嵗後傳于王王辭謝雖知非至言然心内喜太后亦然詹事秦官漢因之掌皇后太子家竇嬰字王孫太后從兄子引巵進酒曰天下者高祖之天下父子相傳漢之約也上何以得傳梁王太后由是憎嬰嬰遂病免太后除嬰門籍出入殿門之籍梁王以此益驕廣睢陽城築東苑招延四方㳺士莫不至焉睢陽故城在今河南歸徳府商邱縣南東苑亦曰兔園在商邱縣東長星出東方春正月呉王濞膠西王卬膠東王雄渠菑川王賢濟南王辟光楚王戊元王交之孫趙王遂反以條亦作修今直𨽻河間府景州有南條城故漢縣也侯周亞夫為太尉將兵討之初孝文時呉太子入見得侍皇太子飲博争道不恭皇太子引博局提音抵擲也殺之呉王由是怨望稱疾不朝始有反謀後使人為秋請孟康曰律春曰朝秋曰請如古諸侯朝聘也文帝責問之使者曰察見淵中魚不祥語見韓非子唯上棄前過與之更始于是文帝賜呉王几杖老不朝其謀乃解然以此日益横鼂錯數言呉過可削文帝寛不忍罰及帝即位錯曰呉王不朝于法當誅文帝弗忍徳至厚也當改過自新乃益驕恣公即山鑄錢煮海為鹽誘天下亡人謀作亂逆今削之亦反不削亦反削之其反亟禍小不削其反遲禍大上命列侯公卿宗室雜議莫敢難獨竇嬰争之錯又言楚趙皆有罪請各削一郡膠西以賣爵事削六縣方議削呉呉王恐削地無已因發謀舉事聞膠西王勇好兵使人説之又身至膠西面約呉王使應高徃説膠西王王初不許高説以两分天下乃許之呉王猶恐其不果乃身自為使者至膠西膠西羣臣聞其謀諌王曰今承一帝尚云不易假令事成兩主分爭患乃益生王不聴遂發使約齊菑川膠東濟南皆許諾楚王戊坐削地亦與呉通謀初楚元王與魯申公穆生白生俱受詩于浮邱伯及王楚以三人為中大夫穆生不嗜酒元王每為設醴及孫戊即位常設後乃忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我于市遂稱疾卧申公白生强起之曰獨不念先王之德乎今王一旦失小禮何足至此穆生曰君子見幾不俟終日先王之所以禮吾三人者為道存也今而忽之是忘道也忘道之人胡可與乆處豈為區區之禮哉因謝病去戊稍淫暴太傅韋孟作詩諷諫不聴亦去及與呉通謀申公白生諫戊戊胥靡之衣之赭衣使杵臼碓舂于市穆氏楚穆王之後以謚為氏浮邱複姓伯齊人韋豕韋氏後孟彭城人後徙鄒及削呉㑹稽豫章郡書至呉王遂先起兵殺漢吏膠西膠東菑川濟南楚趙亦皆反齊王孝王將閭後悔背約城守濟北王城壊未完其郎中令刼守王不得發兵膠西膠東菑川濟南共攻齊圍臨淄趙王遂發兵住其西界北使匈奴與連兵呉王悉其士卒二十餘萬閩東越亦發兵從起廣陵西渉淮并楚兵遺諸侯書罪狀鼂錯欲合兵誅之攻破梁棘壁即春秋大棘注見前乗勝而前鋭甚梁王遣將軍擊之皆敗還梁王城守睢陽初文帝且崩戒太子曰即有緩急周亞夫真可任將兵及是七國反書聞上乃拜亞夫為太尉將三十六將軍擊呉楚曲周侯酈寄擊趙將軍欒布擊齊復召竇嬰拜大將軍屯滎陽監齊趙兵殺御史大夫鼂錯帝與錯議出兵事錯欲令上自將兵而身居守又言徐僮之間呉未下者可以予呉錯素與呉相袁盎不善及呉反錯以盎宜知呉計謀欲治之人有告盎盎恐夜見竇嬰為言呉所以反願至上前口對狀嬰入言上乃召盎盎入見上方與錯調兵食問盎曰今呉楚反于公意何如盎曰願屏左右上屏人獨錯在盎曰臣所言人臣不得知乃屏錯錯趨避東廂甚恨卒問盎對曰呉楚相遺書言賊臣鼂錯擅適讀作謫諸侯削奪之地以故反欲共誅錯復故地而罷今獨有斬錯發使赦七國復其故地則兵可無血刃而俱罷上黙然良乆曰顧誠何如吾不愛一人以謝天下乃拜盎為太常密装治行使呉令丞相廷尉劾奏錯曰錯議陛下自出臨兵使錯居守又欲以城邑予呉無人臣禮大逆無道錯當要斬父母妻子同産皆棄市制曰可錯殊不知上使中尉召錯紿載行市錯衣朝衣斬東市初錯建議侵削諸侯其父自潁川來謂曰疏人骨肉何為也錯曰不如此天子不尊宗廟不安父曰劉氏安鼂氏危矣吾不忍見禍逮身遂飲藥死後十餘日呉楚反錯已死謁者僕射鄧公城固人亦曰鄧先為校尉上書言軍事見上上曰道軍所來聞鼂錯死呉楚罷否鄧公曰呉為反計數十嵗矣以誅錯為名意不在錯也夫鼂錯患諸侯彊大不可制故請削之以尊京師萬世之利也計畫始行卒受大戮内杜忠臣之口外為諸侯報仇臣竊為陛下不取也帝喟然曰吾亦恨之盎至呉呉楚兵已攻梁壁因留盎軍中欲刼使將盎不肯使人圍守且殺之盎得間懷節旄夜亡走梁遂歸報二月太尉周亞夫大破呉楚軍濞亡走越越人誅之戊自殺亞夫之將也請于上曰楚兵剽輕難與爭鋒願以梁委之絶其食道乃可制也上許之亞夫乗六乘傳張晏曰欲急馳故乘傳車六乗將㑹兵滎陽發至霸上趙渉遮説曰呉王素富懷輯死士乆矣知將軍且行必置間人于殽澠阸陿之間且兵事尚神密將軍何不從此右去走藍田今縣屬陜西西安府本漢置以藍田山名出武闗扺洛陽間不過差一二日直入武庫擊鳴鼓諸侯聞之以為將軍從天而下也亞夫如其計至洛陽喜曰吾乘𫝊至此不意自全今吾據滎陽滎陽以東無足憂者使吏搜殽澠間果得呉伏兵乃請渉為䕶軍引兵東北走昌邑深壘而守呉攻梁急梁數使使求救亞夫不許梁愬于上上使告亞夫救梁亞夫不奉詔而使輕騎出淮泗口絶呉楚兵後塞其饟道梁使韓安國睢陽人字長孺為梁中大夫張羽楚故相張尚弟楚反尚諫被殺為將軍羽力戰安國持重乃得頗敗呉兵呉兵欲西梁城守不敢西即走亞夫軍亞夫堅壁不與戰亞夫軍中夜驚擾亂至帳下亞夫堅卧不起頃之復定呉奔壁東南陬亞夫令備西北已而呉精兵果奔西北不得入呉楚士卒多饑死叛散乃引而去亞夫出精兵追擊大破之呉王濞棄其軍亡渡淮走丹徒漢縣厯代因之今為江南鎮江府治保東越越人鏦殺之盛其頭馳𫝊以聞大子駒亡走閩越楚王戊軍敗即自殺呉楚反凡三月皆破滅于是諸將皆以亞夫謀為是而梁王由此與亞夫有隙壬子晦日食齊王將閭及卬遂皆自殺雄渠賢辟光皆伏誅徙濟北王志為菑川王先是三國膠西膠東菑川圍齊齊王使路中大夫張晏曰姓路官中大夫氏族畧路出帝擊之後以國為氏告于天子天子復令還報告齊王堅守漢兵今破呉楚矣路中大夫至三國兵圍臨淄數重不得入三國將與路中大夫盟曰若反言漢已破矣齊趣下三國不且見屠路中大夫既許至城下望見齊王曰漢已發兵百萬擊破呉楚方引兵救齊齊必堅守無下三國將遂殺路中大夫齊初圍急隂與三國通謀㑹路中大夫從漢來其大臣乃復勸王無下而欒布等兵至擊破三國兵解圍已聞齊初有謀欲移兵伐之齊王懼飲藥自殺膠西王肉袒詣漢軍叩頭請罪弓高漢縣故城在今直𨽻河間府阜城縣西南侯韓穨當執金皷出詔書讀之卬自殺膠東菑川濟南皆伏誅酈寄攻趙不下欒布破齊還并兵引水灌趙城城壞王遂自殺濟北王亦欲自殺齊人公孫玃為説梁王曰濟北雖墜言于呉而終底節不下使呉失與而無助破敗而無救者未必非濟北之力也梁王以聞濟北王得不坐徙封菑川立故齊王將閭太子夀為齊王楚元王子禮為楚王子端為膠西王勝為中山治盧奴今直𨽻定州王帝以將閭迫刼有謀非其罪也乃召立其太子夀欲續呉楚太后曰呉王首為紛亂奈何續其後不許乃立禮時封平陸侯為宗正奉元王後戊子四年夏四月立子榮為皇太子徹為膠東王即武帝榮栗姬子徹王夫人子王夫人母臧児故燕王臧荼女孫也嫁槐里王仲生男信與兩女仲死臧兒更嫁田氏長女為金王孫婦生女矣臧兒卜金氏婦當貴奪而納之皇太子宫是為王夫人生兒徹徹方在身王夫人夢日入其懷以為貴徴焉冬十月戊戌晦日食劉攽曰是年紀事十月在年終誤胡三省曰通鑑盖承用漢書本紀也考劉胡二氏之説葢亦闕疑之意而徐昭文考證以五年當書于日食之上薛應旂甲子彚紀又以日食紀于四年之首未知孰是今仍通鑑徙衡山王勃為濟北王廬江王賜為衡山王初七國反呉使者至衡山衡山王堅守無二志上以為貞信徙王于濟北以褒之廬江王以邊越數通使徙王衡山己丑五年春正月作陽陵邑豫作夀陵也在今西安府高陵縣西南募民徙居之賜錢二十萬自是諸帝皆豫作夀陵遣公主嫁匈奴單于庚寅六年冬十二月雷大霖雨秋九月廢皇后薄氏上為太子時薄太后以薄氏女為妃及即位為皇后無寵至是遂廢辛卯七年冬十一月廢太子榮為臨江王長公主嫖即館陶公主帝之妺下嫁陳午嫖匹肖反長公主名也有女欲與太子為妃栗姬妬以帝後宫諸美人皆因長公主見得貴幸故怨怒不許長公主欲與王夫人男徹王夫人許之由是長公主日讒栗姫而譽王夫人男之美帝亦自賢之王夫人知帝嗛栗姬陰使人趣大行本典客改大行令掌九儀之制請立栗姬為皇后帝怒曰是乃所宜言邪遂按誅大行而廢太子太傅竇嬰力爭不能得乃謝病免栗姬恚恨而死庚寅晦日食春二月丞相青免以周亞夫為丞相罷太尉官夏四月立夫人王氏為皇后膠東王徹為皇太子以郅都郅商時侯國後以為氏都河東大陽人為中尉都為人勇悍公亷不發私書問遺無所受請謁無所聴及為中尉獨先嚴酷列侯宗室側目而視號曰蒼鷹臨江王榮坐侵太宗廟堧垣為宫徴詣中尉府對簿事在中元二年王欲得刀筆顔師古曰古者著書于簡牘必用刀為書謝上都禁吏不予竇嬰使人間予之王既為書因自殺太后聞之怒後以危法中都殺之壬辰中元年夏地震衡山原都胡三省註原都地名蓋屬衡山雨雹大者尺八寸癸巳二年夏四月有星孛于西北立子越為廣川王彭祖徙趙故立越寄為膠東王徹為太子故立寄秋九月甲戌晦日食梁王武使人殺袁盎梁王以至親有功得賜天子旌旗出蹕入警寵信羊勝公孫詭二人多竒邪計説王求為漢嗣王遂入朝在前七年帝使使持乗輿駟迎于闗外既朝上疏因留王以太后故入則侍帝同輦出則同車遊獵梁侍中郎謁者著籍引出入天子殿門與漢宦官亡異㑹栗太子廢太后因置酒謂帝曰安車大駕用梁王為寄帝跪席舉身曰諾罷酒召諸大臣問曰太后言如是何謂也皆曰太后意欲立梁王為帝太子袁盎曰昔宋宣公不立其子而立弟事具前以生禍亂五世不絶小不忍害大義故春秋大居正請入見太后白之太后議格遂不復言而使梁王歸國梁王由此怨盎與勝詭謀陰使人刺殺盎梁刺者十餘曹先刺者聞盎名不忍刺其後曹遮殺盎安陵郭門外及他議臣十餘人于是天子意猶疑也梁逐賊果梁使之遣田叔往案捕詭勝詭勝匿王後宫内使韓安國見王泣曰大王訹見誘也邪臣浮説犯上禁撓明法天子以太后故不忍置法太后日夜啼哭幸大王自改大王終不覺悟有如太后宫車即晏駕大王尚誰攀乎語未畢王泣數行下令詭勝自殺出之上方怨梁遣使覆按梁事冠葢相望于道王恐使鄒陽入長安見皇后兄王信説曰長君弟得幸于上而長君行迹多不循道理者今梁王即伏誅太后無所發怒切齒側目于貴臣竊為足下憂之長君誠為上言得毋竟梁事太后徳長君入骨髓而長君之弟幸于兩宫金城之固也昔者象日以殺舜為事舜立為天子封之有庳是以後世稱之以是説天子徼幸梁事不奏長君乗間言之帝怒稍解鄒陽齊人時太后憂梁事不食日夜泣不止帝患之田叔等還至霸昌廐括地志在萬年縣東北萬年今咸寜縣治悉燒梁獄辭空手來見帝曰梁有之乎田叔曰上母以梁事為問也今梁王不伏誅是漢法不行也伏法而太后食不甘味卧不安席此憂在陛下也上大然之使叔等謁太后曰梁王不知也為之者幸臣羊勝公孫詭之屬耳謹以伏誅梁王無恙也太后聞之立起坐餐氣平復梁王因上書請朝用茅蘭梁大夫説乗布車從兩騎伏斧質于闕下謝罪太后帝大喜相泣復如故然帝益疏王不與同車輦矣以田叔為賢擢為魯相甲午三年夏四月地震立子乗為清河治清陽故城在今直𨽻廣平府清河縣東王立十二年卒無子國除秋九月蝗戊戌晦日食丞相亞夫免初上廢栗太子亞夫固爭之不得而梁王每與太后言亞夫短太后欲侯王信帝與亞夫議之亞夫曰高帝約非有功不侯信雖后兄無功侯之非約也帝黙然而止後匈奴王徐盧等六人降帝欲侯之以勸後亞夫曰彼背其主而降侯之則何以責人臣不守節者乎帝曰丞相議不可用乃悉侯徐盧等亞夫因謝病免以劉舍桃侯劉襄子嗣為侯為丞相乙未四年冬十月戊午日食丙申五年夏立子舜為常山王常山文帝時併入趙今復為國大水九月詔獄疑者讞之詔曰獄人之大命死者不可復生朕甚憫之諸獄疑若猶言若疑也雖文致于法而于人心不厭謂不服也者輙讞之地震丁酉六年冬十一月改諸官名更命廷尉為大理奉常為太常典客為大行後更為大鴻臚治粟内史為大農後更為大司農將作少府本秦官掌治宫室為將作大匠主爵中尉本秦官掌列侯為都尉後更名右扶風長信詹事掌皇太后宫為長信少府將行本秦宫皇后卿為大長秋大行為行人先是更郡守為太守郡尉為都尉更諸侯丞相為相明年又更中大夫為衛尉春二月行幸雍郊五畤史記封禪書雍五畤索隱曰秦宣公作宻畤祀青帝靈公作上畤祀黄帝下畤祀炎帝獻公作畦畤祀白帝本四畤後漢高祖入闗曰天有五帝今四何也待吾而具遂作北畤祠黒帝于是雍有五畤括地志五畤原俱在雍縣南考秦襄公作西畤文公作鄜畤皆祠白帝以非雍地故不在五畤之數夏四月梁王武卒諡曰孝分梁地王其子五人先是梁王入朝上疏欲留帝不許王歸國意忽忽不樂未幾卒太后哭極哀不食曰帝果殺吾子帝哀懼不知所為與長公主計之乃分梁為五國盡立孝王男五人為王買為梁王明為濟川王彭離為濟東王定為山陽王不識為濟隂王女五人皆食湯沐邑太后乃説為帝加餐梁後五王濟川濟東俱以罪廢山陽濟隂俱無子國皆除惟梁獨存六月匈奴宼鴈門漢郡治善無故城在今山西朔平府右玉縣南上郡匈奴入鴈門上郡李廣成紀人為上郡太守廣初為上谷太守數與匈奴戰公孫毘邪謂上曰李廣材氣天下無雙自負其能數與虜角恐亡之乃徙上郡從百騎出卒遇匈奴數千騎廣騎欲馳還廣曰吾去大軍數十里今走匈奴追射我立盡今我留匈奴必以為大軍之誘不敢擊乃令諸騎前未到匈奴陳二里所皆下馬解鞍以示不走匈奴有白馬將出䕶其兵廣上馬與十餘騎奔射殺之還解鞍令士皆縱馬卧㑹暮匈奴終怪之不敢擊夜引而去秋七月辛亥晦日食以寗成南陽穰人為中尉自郅都死長安宗室多暴犯法上乃召濟南都尉寗成為中尉其治效郅都其亷弗如然宗室豪傑人人惴恐成後遷内史以罪廢已復起為闗都尉吏民出入闗者號曰寧見乳虎無直寗成之怒其暴如此戊戌後元年春正月詔治獄者務先寛詔曰獄重事也人有智愚官有上下獄疑者讞有司有司所不能决移廷尉讞而後不當讞者不為失顔師古曰假令讞訖其理不當所讞之人不為罪失欲令治獄者務先寛夏地震震凡二十二日丞相舍免秋七月乙巳晦日食八月以衛綰大陵人為丞相直不疑直氏楚人直弓之後不疑南陽人為御史大夫初綰以戲車顔師古曰若今弄車之技為郎事文帝遷中郎將醇謹無它無餘志念也上為太子時召文帝左右飲綰稱病不行文帝且崩屬上曰綰長者善遇之故上亦寵任焉不疑為郎有同舍告歸誤持其同舍郎金去同舍郎疑不疑不疑買金償後告歸者至而歸金亡金郎大慙以此稱為長者人或毁不疑以為盗嫂不疑曰我乃無兄然終不自明也下條侯周亞夫獄亞夫不食死上召亞夫食獨置大胾無切肉又不置箸亞夫心不平顧尚席主席者取箸上視而笑曰此非不足君所乎孟康曰此非不足滿于君所乎嫌恨之也亞夫免冠謝上上曰起亞夫因趨出上目送之曰此鞅鞅非少主臣也居無何亞夫子為父買工官尚方工官即尚方之工尚方少府屬掌工作器物甲楯可𦵏者為人所告事連汚亞夫召詣廷尉廷尉責問曰君侯欲反乎亞夫曰臣所買乃𦵏器也何謂反乎吏曰君縱不欲反地上即欲反地下耳侵之益急亞夫不食五日歐血而死己亥二年春正月地一日三動夏四月詔戒二千石漢太守秩二千石修職事詔曰雕文刻鏤傷農事者也錦繡纂組害女紅者也農事傷則饑之本也女紅害則寒之原也饑寒並至而能亡為非者寡矣朕親耕后親桑以奉宗廟粢盛祭服為天下先不受獻減太官少府屬掌膳食省繇賦欲天下務農蠶素有蓄積以備災害彊無攘弱衆無暴寡老耆以夀終㓜孤得遂長今嵗或不登民食頗寡其咎安在或詐偽為吏以貨賂為市漁奪百姓侵牟萬民縣丞長吏也姦法與盗盗謂犯法者直共盗為盗耳甚無謂也其令二千石各修其職不事官職耗讀與眊同不明也亂者丞相以聞請其罪秋大旱庚子三年冬十月日月皆赤凡五日十二月晦雷日如紫五星逆行守太微晉書天文志太微天子庭五帝之座十二諸侯府也月貫天庭注見前中春正月詔勸農桑禁采黄金珠玉詔曰農天下之本也黄金珠玉饑不可食寒不可衣間嵗或不登意為末者衆農民寡也其令郡國務勸農桑益種樹可得衣食物吏發民若取庸韋昭曰發民用其民也取庸因其資以雇庸也采黄金珠玉者坐贓為盗二千石聴者與同罪帝崩太子徹即位是為孝武帝尊皇太后為太皇太后皇后為皇太后二月𦵏陽陵注見前史臣曰漢興掃除煩苛與民休息至于孝文加之以恭儉孝景遵業五六十載之間至于移風易俗黎民醇厚周云成康漢云文景美矣御批厯代通鑑輯覽卷十四

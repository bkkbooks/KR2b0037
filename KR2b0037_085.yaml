body:
  text: 自王安石廢春秋不列干學官安國以為先聖手所筆削之書天下事物無不備于此因潛心二十餘年著春秋傳以成其志至是上之帝謂深得聖人之旨詔進一官命未下而卒安國強學力行以聖人為標的志于康濟斯民見中原淪沒遺黎塗炭常若痛切其身雖數以罪去愛君憂國逺而彌篤風度凝遠視天下萬物無一足攖其心謝良佐嘗語人曰胡康候如大冬嚴雪百草萎死而松柏挺然獨秀及卒賜諡文定帝定都臨安先是車駕將幸平江李綱以為平江去建康不逺徒有退避之名不宜輕動因具奏言之既而議還臨安張守言建康自六朝為帝王都氣象雄偉且據都會以經理中原依險阻以捍禦強敵陛下席未及暖今人巡幸百司六軍有勤動之苦民力邦用有煩費之憂願少安于此以繫中原民心趙鼎不可守遂求去出知婺州至是還臨安始定都矣一日內侍移竹栽入內趙鼎見之貴曰艮嶽花石之擾皆出汝曹今欲蹈前轍邪因奏其事帝改容謝之又有户部官進錢入宫者鼎召至相府切責之翼日問帝曰其又獻錢邪帝曰朕求之也鼎曰其人不當獻陛下不當求遂黜其人于逺郡三月復以秦檜為尚書右僕射同平章事兼樞密使初張浚嘗與趙鼎論人才浚極稱檜善鼎曰此人得志吾輩無所措足矣及鼎再相檜在樞密一惟鼎言是從鼎由是深信之言檜可大任于帝而不知為檜所賣也檜既相制下朝士相賀獨吏部侍郎宴敦復字景初殊曽孫有憂色曰姦人相矣聞者皆以其言為過夏四月詔王庶視師江淮庶素有威望臨發勞師于都教場便服坐壇上自大將以下悉戎服步由轅門趨庭受命而出莫敢仰視淮上遂移張夋下張宗顔軍淮西巨師古屯太平州分韓世忠二軍屯天長泗州緩急為聲援以劉錡軍駐鎮江以固根本五月王倫偕金使來倫至會寧見金主首謝廢劉豫次致使指會逹蘭自河南還言于金主請以廢齊舊地與宋金主命羣臣議烏布力言不可東京留守額爾衮太祖子後改名宗雋按額爾衮舊作訛魯觀今改後仿此曰我以地與宋宋必德我阿蘭金宗室薩拉噶子後改名宗憲按阿蘭舊作阿懶今改後仿此折之曰我俘宋人父兄怨非一日若復資以土地是助讐也何德之有勿與便富勒呼位在烏布上逹蘭額爾衮附之由是富勒呼執議以河南陜西地與宋遣倫及其太原少尹烏陵阿思謀太常少卿石慶充來議事將至帝命吏部侍郎魏矼館伴之矼備論敵情不可信秦檜曰公以智料敵檜以誠料敵矼曰第恐敵不以誠待相公耳檜乃改命吳表臣字正仲永嘉人思謀等至臨安入見帝謂輔臣曰先帝梓宫果有還期雖待二三年尚庶幾惟是太后春秋高朕旦夕思念欲早相見此所以不憚屈已冀和議之速成也朝臣多言其不可帝怒趙鼎曰陛下于金人有不共戴天之讐今屈已講和不憚為之者以梓宫及母后耳羣臣憤悶之辭出于愛君不可以為罪陛下宜諭之曰講和非吾意以親故不得已為之但得母后及梓宫還敵雖渝盟吾無憾帝從其言衆議遂息金以經義詞賦兩科取士六月賜衍聖公孔玠衢州田凡五頃以奉先聖祠事時玠僑于衢也建炎初孔子四十八代孫端友與其子玠從駕南渡居于衢州至是賜田建廟規制視曲阜終宋之世皆襲封爵秋七月彗星見王倫復如金秦檜復遣倫如金定和議及申問諱日左正言辛次膺字起季萊州人以國恥未雪義難講和凡七上疏力諫不報乃以毋疾求補外詔從之八月金始頒行官制初金太祖用漢官賞左企弓等因置中書省摳密院于廣寧本遼顯州金置廣寧府今為縣屬盛京鄧州府而其國用事者未改女真官號含音烏布當國勸用漢官制度略倣中國之制立省寺府司太宗嘗下詔改定而未畢至是置三師三公三省六曹臺院寺監等官宇文虛中為之參定其制金以會寧為上京臨潢府為北京會寧金之舊土初稱為內地至是升為上京會寧府改遼上京臨潢府為北京而東京遼陽西京大同南京大興中京大定府則仍舊云冬十月罷參知政事劉大中大中與趙鼎不主和議秦檜忌之薦蕭振字德起溫州平陽人為侍御史振入臺既劾大中罷之鼎曰振意不在大中也振亦謂人曰趙丞相不待論當自為去就矣鄜延故將李世輔誘執金薩里罕來歸金人追及之乃奔夏世輔綏德青澗人自唐以來世襲蘇尾九族黨項别部都巡檢使世輔年十七隨父永竒出入行陳金人侵鄜延經略王庶募問者世輔往應募有敵人夜宿陶穴世輔絶陶穴中得十七人皆殺之取首二級馬二匹餘馬悉折其足庶大竒之由是知名補充隊將遷副將金人破延安授永竒父子官永竒聚泣曰我宋臣也世襲國恩乃為彼用邪會劉豫令世輔帥馬軍赴東京永竒密戒之曰汝若得乘機即歸本朝無以我故二其志事成我亦不朽矣世輔至東京劉麟喜之授南路鈐轄乃密遣其客雷燦以蠟書赴行在及豫廢烏珠以萬騎馳獵淮上與世輔獨立馬圍場間世輔戒吳俊往探淮水可渡馬處欲執烏珠歸朝俊還世輔馳問之為竹刺傷馬而止烏珠授世輔知同州世輔至鄜省父永竒教世輔曰同州入南山乃金人往來驛路汝可于此擒其帥渡洛渭由虢歸朝第報知我我當以兵取延安而歸世輔赴同州即遣黃士成等持書由蜀至吳報歸朝事金薩里罕來同州世輔以計執之馳出城至洛河舟船後期不得渡與追騎屢戰皆捷世輔憩高原望追騎益多薩里罕搏頰求哀世輔乃與折箭為誓不得殺同州人及害我骨肉薩里罕許之遂推之下山崖追兵爭救得免世輔擕老幼長驅而北至鄜城縣本後魏敷城隋改名元省故城在今鄜州洛川縣急遣人告永竒永竒即潔家出城至馬翅谷在鄜州南亦名馬尾崖為金人所及家屬三百口皆遇害世輔僅以二十六人奔夏趙鼎罷初中書舍人潘良貴字子賤婺州金華人以户部侍郎向子諲奏事久叱之退帝欲抵良貴罪中丞常同字子政臨卭人為之辨帝欲併逐同鼎奏子諲雖無罪而同與良貴不宜逐帝不從命下給事中張致逺字子猷南劒州沙縣人謂不應以一子諲出二佳士不書黃帝怒顧鼎曰固知致逺必繳駁鼎問何也帝曰與諸人善蓋已有先入之言由是不樂鼎秦檜繼留身奏事及出鼎問帝何言檜曰上無他恐丞相不樂耳會殿中侍御史張戒論給事中勾濤勾氏勾芒氏之後濤字景山成都新繁人濤言戒擊臣乃趙鼎意因詆鼎結臺諌及諸將帝聞益疑鼎乃引疾求罷且言劉大中持正論為張惇蔡京之黨所嫉臣議論出處與大中同大中去臣何可留乃出知紹興府入辭言於帝曰臣去後必有以孝悌之説脅制陛下者將行檜率執政餞之鼎不為禮一揖而去檜亦憾之鼎自在相無所施為或以為言鼎曰今日之事如人患羸當靜以養之若復攻砭必損元氣矣後王庶入對帝曰趙鼎兩為相於國有大功再贊親征皆能決勝又鎮撫建康回鑾無虞他人所不及以勾龍如淵勾龍為士正其後以名為氏如淵字行父永康軍道江人為御史中丞先是宰執入見秦檜獨留身言臣僚畏首尾多持兩端此不足以論大事若陛下決欲講和乞專與臣議勿許羣臣預帝曰朕獨委卿檜曰臣恐不便望陛下更思三日檜復留身奏事帝意欲和甚堅檜猶以為未也復進前説又三日檜復留身奏事如初知帝意不移乃始出文字乞決和議然猶以羣臣為患中書舍人勾龍如淵為檜謀曰相公為天下大計而邪説橫起蓋不擇人為臺諫使盡擊去則事定矣檜大喜即擢如淵為中丞劾議者卒成其志金以張通古字樂之易州人為江南招諭使來言歸河南陜西之地王倫至金金主以其右司侍郎張通古簽書宣徽院事蕭哲為江南詔御使許歸河南陜西地與倫偕來通古至泗州要所過州迎以臣禮至平江府向子諲不肯拜且上言和議之非遂乞致仕通古至臨安要帝待以客禮秦檜未見國書疑為封册欲帝屈已以受之帝曰朕嗣守太祖太宗基業豈可受金人封册於是朝論藉藉湯沂中解潛韓世良相率見檜曰軍民洶洶若之何退又白之臺諫中丞勾龍如淵詣都堂與檜詔倫責之曰公為使通兩國好凡事當即於彼中反覆論定安有同使至而後議者倫泣曰倫涉萬死一生往來虎口者數四今日中丞乃責倫如此檜等共解之曰中丞無他亦欲激公了此事耳倫曰此則不敢不勉如淵謂檜曰但取金書納之禁中則禮不行而事定給事中樓照亦舉諒隂三年事以告檜遂以檜攝冢宰詣館受書而倫亦以計説通古通古從之檜至館見通古受其書通古欲百官備禮檜使省吏朝服導從以書納於禁中人情始安通古入見言先歸河南陜西地徐議餘事先是倫使金從趙鼎受使指鼎言問禮數則答以君臣之分已定問地界則答以大河為界二事使者之大指或不從則已倫受命而行至是倫還有詔諭江南之名帝歎息謂王庶曰使五日前得此報趙鼎豈可去邪初檜主和議命韓世忠移屯鎮江世忠言金人詭詐恐以計緩我師乞留此軍蔽遮江淮因力論和議之非願效死節率先迎敵若不勝從之未晚章數上皆慷慨激切且請單騎詣闕面奏帝不許及張通古來以詔諭為名世忠四上疏言不可願舉兵決戰兵勢最重處臣請當之且上言金人欲以劉豫相待舉國士大夫盡為陪臣恐人心離散士氣凋沮不報通古還世忠伏兵洪澤鎮將邀殺之以壞和議不克而罷十一月罷直學士院曾開字天遊河南人詔羣臣議和金得失貶樞密院編修官胡銓字邦衡廬陵人監廣州都鹽倉禮部侍郎兼直學士院曾開當草國書辨視體制非是論之不聽遂請罷改兼侍講秦檜以溫言慰之曰主上虛執政以待開曰儒者所爭在義苟為非義高爵厚祿弗顧也願聞所以事敵之禮檜曰若高麗之於本朝耳開曰主上以盛德登大位公當強兵富國尊主庇民奈何自卑辱至此非開所聞也復引古誼折之檜大怒曰侍郎知故事檜獨不知也開又詣都堂問計䇿安出檜曰聖意已定尚何言公自取大名而去如檜但欲濟國事耳然猶慮羣言乃詔金國遣使入境欲朕屈已受和在朝侍從臺諫其詳思條奏和好得失於是開與從官張燾晏敦復魏矼李彌遜字似之吳縣人尹焞梁汝嘉字仲謨處州麗水人樓照蘇符薛徽言字德老溫州人御史方廷實館職胡珵朱松張擴凌景夏常明范如圭字伯逵建陽人馮時中許欣拱州人趙雍皆言不可和胡銓抗疏極言略曰臣按王倫本一狎邪小人且市井無賴頃緣宰臣無識舉以使金專務詐誕欺罔天聽今者無故訛致金使以詔諭江南為名是欲劉豫我也陛下奈何以祖宗之天下為金人之天下以祖宗之位為金人藩臣之位異時吞噬無厭之求安知不加我以無禮如劉豫也哉今倫之議曰我一屈膝則梓宫可還太后可復淵聖可歸中原可得嗚呼自變故以來主和議者誰不以此説啖陛下哉然而卒無一驗則敵之情偽已可知矣而陛下尚不覺悟竭民膏血而不恤忘國大讐而不報含垢忍耻舉天下而臣之甘心馬可為痛哭流涕長太息矣臣竊謂不斬王倫國之存亡未可知也雖然倫不足道也秦檜以腹心大臣不能致君如唐虞而欲導陛下如石晉孫近傳會檜議遂得參政伴食中書浸不敢可否檜曰可和近亦日可和檜曰天子當拜近亦曰當拜嗚呼參贊大事徒取充位如此有如敵騎長驅尚可折衡禦侮耶臣竊謂檜近亦可斬也臣備員樞屬義不與檜等共戴天區區之心願斷三人頭竿之稿街然後羈留金使責以無禮徐興問罪之師則三軍之士不戰而氣自倍不然臣有赴東海而死寧能處小朝廷求活耶書上檜以銓狂妄凶悖鼓衆劫持詔除名編管昭州仍降詔播中外給舍臺諌及朝臣多救之檜迫于公論翌日改銓監廣州都鹽倉宜典進士吳師古鋟銓疏於本金人募之千金朝士陳剛中以啓事賀銓之謫師古坐流袁州剛中謫知虔州安逺縣皆死馬晏敦復謂人曰頃言檜姦諸君不以為然今方專國便敢爾他日何所不至邪時李剛提舉洞霄宫在福州亦上疏言王倫之歸與金使偕乃以詔諭江南為名不著國號而曰江南不云過問而曰詔諭此何禮也臣在逺方不知曲折然以愚意料之金為此名以遣使其要求有五必降詔書欲陛下屈體降禮以聽受一也必有教文欲朝廷宣布頒示郡縣二也必立約束欲陛下奉藩稱臣稟其號令三也必求我賂廣其數目使我自困四也必求割地以江南為界五也此五者朝廷從其一則大事去矣金人變詐不測貪婪無厭縱使聽其詔令奉藩稱臣其志猶未巳必繼有號召或使親迎梓宫或使單騎入觀或使移易宰相或使改革政事或竭取賦稅或駿削土宇從之則無有紀極一不從則前功盡廢反為兵端以為權時之宜聽其邀求可無後悔者非愚則誣也疏入不省安逺蕭梁縣今贛州府王庶罷庶論金不可和上疏者七見帝言者六秦檜方挾金自重以為功絀其説庶語檜曰公不思東都抗節存趙時邪檜大恨庶因乞免簽書和議文字纍疏求去遂罷為資政大學士知潭州十二月以李光參知政事秦檜既定和議將揭榜以吏部尚書李光有人望欲藉之同押榜以息浮議乃請于帝而用之光既受命遂于尚書省榜諭金國使來盡歸河南陜西故地通好於我許還梓宫及母兄親族餘無需索己未九年金天眷二年春正月大赦以金國通和也張浚在永州上疏言燕雲之舉其鑑不逺金自宣和以來挾詐反覆傾我國家蓋非可結以恩信者借令天屬盡歸河南遂復我德其厚賜謹守信誓數年之後人情益解士氣潛消彼或指瑕造釁肆無厭之欲發難從之請其將何辭以對況于事理可憂又有甚於此者前後凡五上疏皆不報嶽飛在鄂州聞金將歸河南上言金人不可信和議不可恃相臣謀國不臧恐貽後世譏秦檜銜之及赦至鄂飛又上疏力陳和議之非至有願定謀於全勝期收地於兩和唾手燕雲終欲復讐而報國誓心天地尚令稽首以稱藩之語疏入檜益怒遂成讐隙和議成例加爵賞飛加開府儀同三司辭曰今日之事可憂而不可賀可訓兵飭士謹備不虞而不可論功行賞取笑敵人三詔不受帝溫言奬諭之飛乃受命吳璘在熙州其幕為賀表璘愀然曰在朝廷息兵息民誠天下慶璘等叨竊重祿不能宣國威靈亦可愧矣但當待罪稱謝可也三月遣判大宗正事士􅩍字立之邭康孝王仲御之子兵部侍郎張燾詣河南修奉陵寢初史館校勘范如圭以書責檜力建和議忘讐辱國之大罪且曰公不喪心病狂奈何為此必遺臭萬世矣及金人歸河南地檜方自以為功如圭入對言兩京之版圖既入則九廟八陵瞻望咫尺今朝陵之使未遣何以慰神靈萃民志乎帝泫然曰非卿不聞此言即日遣士􅩍等往檜以如圭不先白已益怒如圭遂謁告去以尹焞提舉萬夀觀兼侍講辭不拜先是資善堂翊善朱震疾亟薦焞自代帝慘然曰楊時物故胡安國與震又亡朕痛惜之趙鼎曰尹焞學問淵深可以繼震乃除焞太常少卿兼崇政殿説書至是改命焞以和議為非固辭不拜以王倫為東京留守命倫交割地界又以周聿為陜西宣諭使方庭實為三京宣諭使已而淪至汴金人遂歸河南陜西之地得東西南三京壽春府亳曹單州及京西陜西諸州地廷實至西京先朝陵寢自永昌而下皆遇發掘而哲宗陵至暴露廷實解衣覆之歸以白帝秦檜怒之尋以路允迪為南京留守孟庾兼東京留守李利用權留守西京以吳玠為四川宣撫使玠以金人對疊且十年常苦逺餉勞民屢汰冗員節浮費益治屯田和議之成帝以玠功高授開府儀同三司四川宣撫使陜西階成等州皆聽節制遣內侍奉手扎以賜至則玠病甚扶掖聽命夏四月命樓照宣撫陜西照至鳳翔承制以楊政為熙河經略使吳璘為秦鳳經略使屯內地以保蜀郭浩為鄜延經略使屯延安以守陜照倚秦檜勢妄自尊大且好貨失將士心罷權吏部尚書晏敦復和議之初敦復力詆屈已之非秦檜使人訹之曰公若屈從兩地旦夕可至敦復曰吾終不以身計而誤國家况吾薑桂之性到老愈辣請勿復言檜卒不能屈權吏部甫踰月罷知衢州五月李世輔自夏來歸賜名顯忠世輔至夏夏人問其故世輔泣具言父母妻子之亡切齒疾首恨不即死願得二十萬人生擒薩里罕取陜西五路歸于夏世輔亦得報不共戴天之讐夏主曰爾能立功則不靳借兵時有酋豪號青面夜義者久為夏國患令世輔圖之世輔以三千騎晝夜疾馳奄至其帳擒之還夏主大悅出二十萬騎以文臣王樞武臣伊克為陜西招撫使世輔為延安招撫使世輔至延安總管趙惟清大呼曰鄜延今復歸朝已有赦書世輔取赦文觀之因與官屬列拜大哭乃以舊部八百餘騎往見王樞伊克諭之曰世輔已得延安府見講和赦書招撫可以本部軍歸國伊克不從曰初經略乞兵來取陜西今既到此乃令我歸邪世輔知勢不可乃出斫伊克不及擒王樞縛之夏人以鐡鷂鷂子軍來世輔以所部拒之馳揮雙刀所向披靡夏兵大潰殺死蹂踐無慮萬人獲馬四萬匹世輔揭榜招兵每得一人豫馬一匹旬日間得驍勇少壯者萬人乃擒害其父母弟姪者斬於東市行至鄜州有馬步軍四萬餘吳玠遣張振撫諭之曰兩國見議和好不可生事世輔遂見玠于河池玠遣詣樓照于長安照承詔以為護國軍承宣使樞密行府前軍都統制送之朝世輔乃率部下三千南來帝撫勞再三賜名顯忠夏主乾順卒子仁孝立自是夏受金人册命不復通使于宋仁孝改元大慶號乾順曰崇宗開府儀同三司四川宣撫使吳玠卒諡武安自富平之敗金人專意圖蜀微玠身當其衝無蜀久矣既卒西人思之立祠以祀玠善讀史凡往事可師者録置座右積久牆牖皆格言也用兵本孫吳務遠略不近求小利故能保必勝御下嚴而有恩虛心請受雖身為大將卒伍最下者得以情達故士樂為之死選用將佐視勞能為髙下允後不以親故權責撓之卒贈少師士􅩍張燾還自河南出燾知成都府士􅩍至鄂嶽飛請以輕騎從灑掃實欲觀釁以代謀秦檜白止之士􅩍出蔡潁河南百姓歡迎夾道以喜以泣曰久隔王化不圖今日復為宋民遂入柏城在河南府鞏縣披歷荆榛隨宜葺治禮畢而還詔封士􅩍為齊安郡王張燾奏疏曰金人之禍上及山陵雖懾服之未足以雪此恥復此讐也必不可恃和盟而忘復讐之大事帝問諸陵寢何如燾不對惟言萬世不可忘此恥帝默然秦檜患之出燾知成都府秋七月以胡世將字承公宿之曹孫為四川宣撫副使世將精神明悟間習吏治初除宣撫諸將皆賀世將語之曰世將不習騎射不知敵情朝廷所以遣來者襲國家故事以文臣為制將耳軍事一無改吳宣撫之規各推誠心共濟國事可也諸將皆拜謝金宋王富勒呼等謀反伏誅金富勒呼自以太宗長子跋扈尤甚兖王額爾衮為左丞相復附之逹蘭方持兵柄遂相與謀反事覺富勒呼額爾衮皆伏誅以逹蘭屬尊釋不問已而逹蘭復以謀反伏誅時金以逹蘭與杜充為行臺左右丞相命下逹蘭謂使者日我開國功臣也何罪而使我降與杜充同伍遂復與翼王呼蘭等謀反事覺金主疑達蘭與宋隂結故主割地遂命誺之逹蘭南走追而殺之于祁州其黨皆死呼蘭舊作鶻懶今改王倫如金金人執之烏珠言于金主曰逹蘭富勒呼主割河南與宋必有隂謀今使在汴勿令踰境倫聞之即遣介具言于朝會孟庾至汴倫即解留鑰將使指赴金國議事行至中山會逹蘭諜反金人執之遣副使藍公佐還議嵗貢正朔誓命等事及索河東北士民之在南者而徙倫居于河間以待報命之至時皇后邢氏崩于五國城金人祕之冬十二月李光罷光初謂可因和為自治之計故署䅭不辭及秦檜議撤淮南守備奪諸將兵權光始極言和不可恃備不可撤檜惡之光復折􅝸于帝前曰觀檜之意是欲壅蔽陛下耳目盜弄國柄懷姦誤國不可不察檜大怒光遂求去庚申十年金天眷三年春正月遣工部侍郎莫將等使金初將為司農丞與監察御史施廷臣附秦檜抗章力贊和議檜擢用將為起居郎廷臣為侍御史朝論大駭尚書晏敦復等上疏切諫于是二人皆不敢受命檜患之至是以將為工部侍郎充迎護梓宫奉迎兩宫使故相李綱卒諡忠定綱負天下之望以一身用舍為社稷生民安危雖身或不用用且不久而其忠誠義氣凛然動乎逺邇每使者至今金人必問李綱趙鼎安否其為逺人所畏服如此及是卒於福州贈少師朱子曰綱知冇君父而不知有身知天下之安危而不知身之有禍難雖以讒問竄斥屢瀕九死而愛君憂國之志終有不可奪者可謂一世之偉人矣夏五月金烏珠薩里罕分道南侵復破河南陜西州郡烏珠以歸河南陜西地為非計而張通古又言宋置戍河南請及其部置未定當議收復鳥布然之及達蘭誅遂大閲國中兵于祁州命烏珠自黎陽趨河南右監軍薩里罕出河中趨陜西烏珠率孔彥舟等入汴遣烏祿鄂爾多之子即世宗取歸德李成取河南分兵下諸郡于是東京留守孟庾南京留守路允迪皆以城降權西京留守李利用棄城走河南州縣皆降拱州守臣王慥亳州提轄魏經死之薩里罕入同州趨永興軍權知軍事郝逺開門納之陜西州縣所至迎降逺近震恐秦檜以其言不讐甚懼謂給事中馮楫曰金人敗盟我之去就未可卜前此大臣皆不足慮獨君鄉衮未洌上意君其為我探之機入見曰金人長驅犯順勢必興師如張浚者且須以戎機付之帝正色曰寧至覆國不用此人檜聞之喜詔吳璘同節制陜西諸軍六月璘敗金人于扶風復其城薩里罕走鳯翔初胡世將在河池倉卒召諸將議時吳璘孫渥已在楊政田晟繼至諸將請少退清野以挫其鋒渥言河池不可守璘厲聲折之曰懦語沮軍可斬也璘請以百口保破敵世將壯之指所居帳曰世將誓死于此遂遣諸帥分據渭南尋詔世將移屯蜀口以璘同節制陜西諸路軍馬時金人攻石壁寨在秦州界璘遣姚仲等破走之既而薩里罕使鶻眼郎君以三千騎衝璘軍璘使統制李師顔以驍騎擊敗之金人先于扶風築城既敗入城拒守官軍攻拔其城獲三將及女真百十七人薩里罕怒甚自戰百通坊在鳯翔府扶風縣西南仲力戰破之薩里罕還鳳翔由是金人不敢度隴分屯之軍得全師而還東京副留守劉錡大敗金人于順昌烏珠走汴初錡赴東京率所部自臨安泝江絶淮至渦口方食忽暴風拔坐帳錡曰此惡兆也主暴兵即下令兼程而進聞金人敗盟南下錡與將佐舍舟陸行先趨三百里至順昌城下諜報東京已降知府陳規見錡問計錡曰城中有糧則能與君共守規曰有米數萬斛錡曰可矣乃與規議斂兵入城為守禦計時錡所部多王彥八字軍以將駐于汴皆攜孥以行至是錡召渚將問計諸將皆曰金兵不可敵也請以精鋭遮老稚順流還江南錡曰吾本赴官留司今東京為金所破幸吾全軍至此有城可守奈何棄之吾意決矣敢言去者斬乃鑿舟沉之示無去意置家寺中積薪于門戒守者曰脫有不利即焚吾家母辱敵乎也于是軍士皆奮男子備守戰婦人礪刀劍爭呼躍曰平日人欺我八字軍今日我當興國破敵立功時守偹一無所恃錡于城上躬自督勵取劉豫時所造癡車以輪轅埋城上又撤民户扉周匝蔽之城外有民居數千家悉焚之凡六日粗畢而金兵已涉潁河遂圍城錡預于城下設伏擒金將阿里舊作阿黑今改後仿此等二人詰之云韓將軍謂韓常營白沙窩在潁州府阜陽縣西北距城三十里錡夜遣千餘人擊之連戰殺傷頗衆既而金三路都統葛王烏祿以兵三萬與龍虎大王合而薄城錡令開諸門金人疑而不敢近錡用破敵弓翼以神臂強弩射之敵稍却復以步兵邀擊溺河死者不可勝計破其鐡騎數千時順昌圍已四日金兵益盛乃移寨於李村在阜陽縣北錡遣閻充募壯士五百夜斫其營是夕天欲雨電光四起見辮髮者輒殱之金兵退十五里錡復募百人往或請銜枚錡笑曰無以枚也命折竹為嘂古弔切同呌周禮雞人呼旦以嘂百官如市井兒以為戲者人持一為號直犯金營電所燭則奮擊電止則匿不動金兵大亂百人者聞吹嘂聲即聚金人益不能測終夜自戰積尸盈野退軍老婆灣在穎州府太和縣潁河北岸烏珠在汴聞之即索靴上馬帥十萬衆來援錡會諸將問計或言今已屢捷宜乘此勢具舟全軍而歸規曰朝廷養兵十五年正為緩急之用况已挫敵鋒軍聲稍振雖寡衆不敵然有進無退錡曰府公文人猶誓死守况汝曹耶且敵營甚邇而烏珠又來吾軍一動彼躡其後則前功俱廢使敵侵軼兩淮震驚江浙則平生報國之志反成誤國之罪衆皆感動思奮曰惟太尉命錡募得曹成等二人諭之曰遣汝作間事捷重賞第如我言敵必不殺汝今置汝綽路騎中汝遇敵則作墜馬為敵所得敵帥問我何如人則曰太平邊帥子喜聲伎朝廷以兩國講和使守東京圖逸樂耳已而二人果遇敵被執烏珠問之對如前烏珠喜曰此城易破耳即置鵝車炮具不用而械成等還錡烏珠至城下責諸將喪師衆皆曰南朝用兵非昔之比元帥臨城自見錡遣耿訓約戰烏珠怒曰劉錡何敢與我戰以吾力破汝城直用靴尖躍倒耳訓曰太尉非但請戰且謂太子必不敢濟河願獻浮橋五所濟而大戰烏珠曰諾乃下令明日府治會食遲明錡果為五浮橋于潁河上置毒潁上流及草中戒軍士雖渴死毋飲于河時大暑金人逺來疲敝晝夜不解甲人馬飢渴食水草者輒病往往困乏錡士氣間暇軍皆番休方晨氣清涼按兵不動逮未申時忽遣數百人出西門接戰俄遣數千人出南門戒令勿喊但以鋭斧犯之統制官趙撙韓直身中數矢戰不肯已士殊死鬭入其陳刀斧亂下金兵大敗是夕大雨平地水深尺餘明日烏珠拔營而去錡遣兵追之死者數萬方大戰時烏珠被白袍乘甲馬以牙兵三干出戰兵皆重鎧甲號鐵浮圖戴鐵兜鍪周匝綴長簷三人為伍貫以韋索每進一步即用拒馬擁之進一步拒馬亦進退不可郤錡軍以鎗摽去兜鍪大斧斷其臂碎其首金又以鐵騎分左右翼號拐子馬皆女真為之號長勝軍專以攻堅戰酣然後用之自用兵以來所向無前至是亦為錡軍所殺自辰至申錡以拒馬木為障少休城上鼓聲不絶乃出飯羮坐餉戰士如平時金人不敢近食已復撤拒馬木深入大戰又破之棄尸斃馬血肉枕藉車旗器甲積如山阜烏珠平日所恃以為強者十損七八至陳州數諸將之罪皆鞭之遂還汴既而洪皓自金密奏順昌之捷金人震恐喪魄燕之重寶珍器悉徒而北意欲損燕以南棄之故議者謂是時諸將協心分路追討則烏珠可擒汴京可復而王師亟還自失機會良可惜也嶽飛遣兵敗金人于京西帝賜飛札曰設施之方一以委卿朕不遙度飛乃遣王貴牛臯楊再興李寶河北人等經略西京汝鄭潁昌陳曹光蔡諸郡又命梁興渡河紏合忠義社取河東北州縣又遣兵東援劉錡西援郭浩自以其軍長驅以圖中原將發密奏言先正國本以安人心然後不常厥居以示不忘復仇之意飛將李寶牛臯相繼敗金人于京西閏月金人攻涇州經略田晟破走之薩里罕與吳璘楊政夾渭河而陳璘駐兵大蟲嶺即西平原在鳯翔府寶雞縣東北其原髙峻故謂之嶺薩里罕覘之曰善戰者立于不敗之地此難與爭乃引去趨邠州田晟遣將拒之于青溪嶺在平涼府涇州西南胡世將又遣王彥楊從儀分道而出屢戰敗之薩里罕還屯鳯翔既而復出攻涇州田晟據山為陳乘金師壁壘未定奮兵擊敗之奪其兵馬甚衆薩里罕走還鳯翔嶽飛收復河南州郡飛攻金人于蔡州破之復其城于是遣張憲敗金韓常于潁昌又復淮寧府郝晸復鄭州張應韓清復西京楊遇復南城軍宋置在河南府鞏縣西南喬握堅復趙州他將所至皆捷金人大震河南兵馬鈐轄李興聚兵應飛收復伊陽等八縣及汝州金河南尹李成棄城遁走詔興知河南府飛又使張應李興復永安軍宋初置縣以奉陵寢後改軍故城在今鞏縣西南韓世忠遣兵復海州世忠使王勝等復海州父老裒金帛以犒軍勝不受世忠每出軍必戒以秋毫無犯軍之所過耕夫皆荷鋤而觀張俊使王德復宿州金人棄亳而遁俊入亳遽還夀春俊遣統制王德援潁昌兵還就檄德復宿州德倍道自夀春馳至蘄縣與金遊騎遇遂入城偃旗卧鼓遊騎引去德因潛師趨宿州夜半薄金營金人阻汴水邀戰德䇿馬先濟步騎從之遙謂金人曰吾與爾大小百戰雖名王貴胄莫不糜碎爾何為者金將髙統軍遂投兵降守將馬秦馳入城閉門固守德叱其子順先登秦遂降宿州平德乘勝趨亳州與俊會于城父注見前時酈瓊與葛王烏祿在亳聞德至曰夜乂未易當也即遁去德入亳州請于俊曰今兵威已震請乘勝進取俊不從而還初欽宗時德以十六騎徑入隆德府縛金守臣姚大師獻于朝欽宗間狀姚對曰臣就縳時止見夜乂耳由是人呼為王夜乂安置趙鼎于潮州秦檜惡鼎居越逼已徒知泉州又諷司諌謝祖信等論鼎嘗受張昌邦偽命遂爾奪節提舉洞霄宫鼎自泉還復上書言時政檜忌其復用又諷中丞王次翁字慶曾濟南人論其乾沒都督府錢十七萬謫官居興化軍次翁及右諌議大夫何鑄字伯壽餘杭人論之不已乃貶清逺軍節度副使潮州安置秋七月以王次翁參知政事次翁由秦檜薦為中丞凡可以為檜地者無不力為之及金人敗盟帝下詔罪狀烏珠次翁懼檜得罪因奏曰前日國是初無主議事有小變更用他相後來者未必賢而排黜異黨紛紛纍月不能定願陛下以為至戒帝深然之檜德其言遂引同列由是檜益安據其位公論不能撼搖矣嶽飛擊走金烏珠于郾城追至朱仙鎮在開封府祥符縣西南以朱亥舊里故名大破之遣使修治諸陵先是飛赴西京秦檜力主和議奏遣司農少卿李若虛諸飛營諭旨班師會飛已復河南州郡相繼奏捷至是飛留大軍于潁昌命諸將分道出戰自以輕騎駐郾城兵勢甚鋭烏珠大懼會諸帥欲併力一戰朝廷聞之詔飛審處自固飛曰金人伎窮矣乃日出挑戰且罵之烏珠怒合龍虎大王蓋天大王及韓常之兵逼郾城飛遣子雲領騎兵直貫其陳戒之曰不勝先斬汝雲與金人戰數十合殺傷甚衆烏珠以拐子馬萬五千來飛戒步卒以麻扎刀入陳勿仰視第斫馬足拐子馬相連一馬仆二馬不能行飛軍奮擊遂大破之烏珠大痛曰自海上起兵皆以此勝今已矣因復益兵而前飛自以四十騎突戰敗之烏珠憤甚合師十二萬次于臨潁楊再興以三百騎遇之于小商橋在許州臨潁縣南下臨小激河驟與之戰殺二千人及萬户薩巴舊作撒八今改後仿此千戶百人再興死之獲尸焚焉得箭鏃二升飛痛惜之張憲繼至復戰烏珠夜遁追奔十五里中原大震飛謂子雲曰敵屢敗必還攻潁昌汝宜速援王貴既而烏珠果至貴將遊奕雲將背嵬戰于城西雲以騎兵八百挺前決戰步卒張左右翼繼之殺烏珠壻夏金吾飛又使梁興會太行忠義兩河豪傑敗金人于垣曲又敗之于沁水遂復懷衛州斷金人山東河北之道金人大恐飛進軍朱仙鎮距汴京四十五里與烏珠對壘而陳遣背嵬騎五百奮擊大破之烏珠還汴飛檄陸臺令行視諸陵葺治之嶽飛奉詔班師還鄂河南州郡復入于金兩河豪傑李通等率衆歸飛自是金人動息山川險要飛皆得其實中原盡磁相澤潞晉降汾隰之境皆期日興兵與官軍會其所揭旗以兵為號父老百姓爭挽車牽牛戴糗糧以饋義軍頂盆焚香迎侯者充滿道路自燕以南金人號令不行烏珠欲簽軍以抗飛河北無一人應者乃歎曰自我起北方以來未有如今日之挫衄金將烏陵阿思謀素驍勇桀黠亦不能制其下但曰毋輕動侍嶽家軍來即降金將王鎮崔慶李顗崔虎華旺等率所部降飛龍虎大王之將噶克察舊作忔查今改等亦密受飛旗榜自其國來降韓常亦欲以衆五萬內附飛大喜諭其下曰直抵黃龍府與諸君痛飲爾方指日渡河而秦檜欲畫淮以北與金和諷臺臣請班師飛奏金人鋭氣沮喪盡棄輜重疾走渡河而我豪傑向風士卒用命時不再來機難輕失檜知飛志鋭不可回乃先請張俊楊沂中等歸而後上言飛孤軍不可久留飛一日奉十一金字牌乃憤惋泣下東面再拜曰十年之力廢于一旦乃自郾城引兵還民遮馬痛哭訴曰我等迎官軍金人皆知之相公去我輩無噍類矣飛亦悲泣取詔示之曰我不得擅留哭聲振野飛留五日以待民徙從而南者如市飛亟奏以漢上六郡間田處之初烏珠敗于朱仙鎮欲棄汴而去有書生叩馬曰太子母走嶽少保且退烏珠曰嶽少保以五百騎破吾十萬京城日夜望其來何謂可守生曰自古未有權臣在內而大將能立功于外者嶽少保且不免况欲成功乎烏珠悟遂留不去飛還烏珠遣兵追之不及而河南新復府州皆復為金有飛至鄂力請解兵權不許久而入覲帝問之飛拜謝而已周禮曰飛甫班師河南遂破是固天之所以限南北也或以飛即被詔達而前進競復舊物以功贖罪不亦可乎曰違而前進則是有跋扈不臣之心况十二金牌一日迭至雖功蓋天下罪亦難贖君子其肯蒙首惡之名哉八月貶祕閣修撰張九成字子詒開封人徙錢塘等官九成及喻樗陳剛中凌景夏樊光逺毛叔度元盥等七人嘗不主和議為秦檜所惡至是皆降黜之九成從楊時學紹興初舉進士對䇿直言無隱及為刑部侍郎會金人議和九成言于趙鼎曰金實厭兵而張虛聲以撼中國耳因陳十事云彼誠能從吾所言則與之和使權在朝廷鼎罷相檜誘之曰且成檜此事九成曰九成胡為異議特不可苟安耳檜曰立朝須優遊委曲九成曰未有枉已而能直人者帝問以和議九成對曰敵情多詐不可不察檜尤惡之楊沂中軍潰于宿州走還泗金人屠宿州沂中兵至宿州金遣間告敵騎數百屯桞子鎮注見前沂中自將五百騎夜襲之不見金兵而還金人以精兵伏歸路沂中軍潰遂自夀春走歸泗金人屠宿州九月遣使諭韓世忠罷兵還鎮時諸大帥皆還鎮金殺其左丞相古紳右丞相蕭慶冬十月金薩里罕破慶陽河東經略使王忠植死之忠植本河東步佛山方與紀要在汾州府永寧州忠義人鄉勇之結忠義社者以復石代等十一州功授河東路經略安撫使及薩里罕侵慶陽知府宋萬年拒守胡世將檄忠植以所部救慶陽行次延安叛將趙惟清執忠植詣薩里罕薩里罕使甲士引至慶陽城下諭降忠植呼曰我太行忠義也為金所執使來招降願將士勿負朝廷堅守城壁薩里罕怒詰之忠植披襟曰當速殺我遂遇害萬年以城降後贈忠植奉國軍節度使諡義節臨安火十一月金封孔子後璠為衍聖公時金主興禮樂立孔子廟于上京求孔子後得四十九代孫承奉郎璠遂封之十二月金始置屯田軍于中原金既取河南猶慮中原士民懷二始創屯田軍凡女真奚契丹之人皆自本部徙居中州與百姓雜處計其户口授以官田使自播種春秋量給其衣若遇出師始給錢米凡屯田之所自燕南至淮隴之北俱有之皆築壘于村落之間辛酉十一年金皇統元年春正月金烏珠破夀春入廬州詔張俊等將兵救之二月王德復和州烏珠自敗後留屯京亳出入許鄭之間僉兩河軍與舊部十餘萬以謀再舉及聞秦檜召諸軍還乃攻破夀春遂渡淮入廬州詔張俊楊沂中帥兵赴淮西嶽飛進兵江州尋詔韓世忠引兵往援時烏珠自合肥趨歷陽遊騎至江張俊議分軍守南岸王德曰淮者江之蔽也棄淮不守是謂脣亡齒寒敵數千里逺來餉道決不繼及其未濟急擊之可以奪氣若遲之使少安則淮非吾有矣固請而行即石采石俊督軍繼之宿江中德曰明旦當會食歷陽已而夜拔和州晨迎俊入烏珠退保昭關在和州含山縣北史記伍子胥槖載而入昭關即此尋復來爭和州俊擊敗之既而德又敗韓常于含山縣東唐置今屬和州又敗烏珠于昭關復含山及昭關金人破商州邵隆復之楊沂中劉錡敗金烏珠于柘臯即春秋槖臯槖拓音相近而訛後人又因拓類柘而再訛也遂復廬州劉錡自太平渡江與張俊楊沂中會而廬州已破錡乃與關師古先降劉豫後復來歸據東關注見前之險以遏金兵引兵出清溪在廬州府巢縣東北水經注清溪水東徑清溪城南流注柵水即此兩戰皆捷烏珠以柘臯地坦平利于用騎因駐師錡進兵與烏珠夾石梁河即濡須水之石梁口也注見前而陳河通巢湖廣二丈錡命曵薪壘橋須臾而成遣甲士數隊踰橋卧槍而坐遣人會合張俊楊沂中之師翌日沂中及王德田師中張子蓋字德髙俊從子諸軍俱至惟俊後期錡與諸將分軍為三並進渡河以擊之師中欲俟俊至德曰事當機會復何待即與錡上馬先迎敵沂中繼之烏珠以鐡騎十萬餘分為兩隅夾道而陳德曰敵右陳堅我當先擊之麾軍渡河首犯其鋒一將被甲躍馬而出德引弓一發斃之乘勝大呼馳擊諸軍鼓譟從之金人以拐子馬兩翼而進德率衆鏖戰沂中曰敵恃弓矢吾有以屈之使萬人持長斧如牆而進金遂大敗德與錡等追之又敗于東山在巢縣東金兵望見驚曰此順昌旗幟也即走保紫金山注見前是役也失將士九百人金人死者以萬計既而烏珠復親帥兵逆戰于店步即店埠鎮在廬州府合肥縣東沂中等又敗之乘勝逐北遂復廬州金命致仕官至三品者給半俸金追封昏德公為天水郡王重昏侯為天水郡公又封邪律延禧為豫王金主親祀孔子三月張俊楊沂中劉錡奉詔班師金人破濠州俊使沂中救之敗績張俊楊沂中劉錡奉詔班師才行數里諜報金人攻濠州甚急俊乃復邀沂中錡回會于黃連埠在合肥縣東北同往援拒濠六十里而濠南城已破俊召諸將謀之沂中欲戰錡曰本來救濠今濠已失進無所依不若退師據險徐為後圖諸將皆曰善三師鼎足而營或言敵兵已去錡謂俊曰敵得城遽退必有謀也宜嚴兵備之俊不聽且欲自以為功命錡無往而令沂中與王德將神勇步騎六萬直趨濠州列陳未定煙起城中金人伏騎萬餘分兩翼出沂中以䇿麾軍曰那回諸軍以為令其走也遂潰而南無復紀律金人追之死者甚衆乃皆還鎮俊歸建康錡歸大平沂中歸臨安嶽飛帥兵救濠州不及還次舒州飛將救濠州奏金人舉國南來其內必虛若長驅京洛以搗之後必奔命可坐而敝帝不從飛方苦寒嗽力疾而行又恐帝急于退敵乃奏臣如搗虛勢必得利若以敵方在邇未暇逺圖欲乞親至蘄黃以議攻郤帝乃詔飛會師蘄黃飛至濠而城已破遂還兵舒州以俟命金人渡淮北去夏四月以韓世忠張俊為樞密使嶽飛為副使秦檜力主和議恐諸將難制欲盡收其兵權給事中范同字擇善建康人獻計于檜請除韓世忠張俊嶽飛樞密府則兵柄自解檜喜乃密奏柘臯之捷召三將赴行在論功行賞于是世忠俊皆入朝飛至獨後檜用王次翁計俟之七日既至遂拜世忠俊樞密使飛為副使並宣押至樞府治事加楊沂中開府儀同三司賜名存中王德清逺軍節度使罷三宣撫司五月詔張俊嶽飛如楚州閲軍張俊知秦檜欲罷兵首請以所部𨽻御前且力贊和議檜深喜之遂罷三宣撫司以其兵𨽻御前遇出師臨時取旨又置三總領所于湖北淮東淮西以統諸軍錢糧時更軍制之初將士多不安乃命俊飛往淮東撫世忠之軍初飛在諸軍中年少以列校拔起纍立顯功張俊不能平飛屈已下之淮西之役俊以糧乏怵飛飛不為止帝賜札褒諭有曰轉餉難阻卿不後顧俊疑飛漏言還朝及倡言飛逗遛不進以乏餉為辭至是俊知世忠忤檜欲與飛分其背軍飛義不肯俊大不悅既至楚州俊欲修城為備飛曰當戮力以圖恢復豈可為退保計俊變色會世忠軍吏景著與總領胡昉言二樞密若分世忠軍恐至生事昉上之朝檜捕著下大理將以扇搖誣世忠飛馳書告以檜意世忠見帝白明俊于是大憾飛遂密以飛報世忠事告檜檜大怒俊飛既還飛遂不復出掌兵其僚屬多乞宫祠而去俊每獨出視師害為後俊飛張本秋七月以范同參知政事秦檜德同先進翰林學士不二月遂引為參知政事罷淮北宣撫判官劉錡錡自順昌之捷驟貴張俊楊存中嫉之至是二人言于朝曰淮西之役嶽飛不赴援劉錡戰不力秦檜信之遂罷錡兵命錡知荆南府八月立祚德廟于臨安初神宗熙寧中立晉程嬰公孫杵臼廟于綘州報其存趙孤也至是立廟臨安並祀韓厥罷知溫州王居正居正立朝纍與秦檜忤自兵部侍郎出知溫州知不為檜所容以目疾請祠杜門言不及時事客至談論經史而已檜將忌之諷中丞何鑄劾居正為趙鼎汲引欺世盜名奪職奉祠居正之學根據六經楊時器之出所著三經義解示居正曰吾舉其端子成吾志居正感勵首尾十載為詩書周禮辨學三十九卷與時書同進二書行天下遂不復言王氏學罷嶽飛奉朝請飛以恢復為己任不肯附和議嘗讀檜奏至德無常師主善為師之語恚曰君臣大倫根于天性大臣而忍面欺其主耶烏珠遺檜書曰汝朝夕以和請嶽飛方為河北圖必殺飛始可和檜亦以飛不死終梗和議已必及禍故力謀殺之遂諷中丞何鑄侍御史羅汝楫字彥濟歙縣人諫議大夫万俟卨字元忠開封陽武人等交章論飛奉旨援淮西暫至舒蘄而不進比與張俊按兵淮上欲棄山陽而不守乃罷為萬夀觀使奉朝請九月吳璘等收復陜西諸州詔班師還鎮吳璘進兵拔秦州聞金統軍和珍舊作胡盞今改後仿此與希卜蘇舊作習不視今改後仿此合兵五萬屯劉家圈在奉州東北請于胡世將擊之世將問䇿安出璘曰有新立疊陳法每戰以長鎗居前坐不得起次最強弓次強弩跪滕以俟次伸臂弓約敵相摶至百步內則神臂先發七十步強兵併發次陳如之凡陳以拒馬為限鐡鈎相連俟其傷則更代代則以鼓為節騎兩翼以蔽于前陳成而騎退謂之疊陳世將善之諸將竊議曰吾軍其殱于此乎璘曰此古束伍令也軍法有之諸君不議耳得車戰餘意無出于此戰士心定則能持滿敵雖鋭不能當也遂進次剡家灣在劉家圈南時和珍希卜蘇據險自固前臨峻嶺後控臘家城在劉家圈北謂璘必不敢輕犯先一日璘會諸將問所以攻姚仲曰戰于山上則勝璘以為然乃請戰金人皆笑之夜半璘遣姚仲王彥衝枚渡河陟峻嶺截坡上約二將上嶺而後發火二將至嶺寂無人聲軍已畢列萬炬齊發金人駭愕曰吾事敗矣希卜蘇善謀和珍善戰二人異議璘先以兵挑之和珍果出鏖戰璘以疊陳法更休迭戰輕裘駐馬亟麾之士殊死鬬金人大敗降者萬人瑚占走保臘家城璘聞而攻之城埀破朝廷方主和議以驛書詔班師時璘拔秦州其勢方張陜西河東首領爭來附而楊政拔隴州及破岐下諸屯郭浩復華州入陜州矣詔至瑋即自臘家城引兵還河池浩還延安政還鞏世將惟浩歎而已莫將還自金烏珠欲議和莫將久留于金乃縱之歸以道意秦檜遂奏遣劉光逺為通問使冬十月詔以魏良臣為金國稟議使烏珠遣劉光逺還要官尊望著者為使秦檜乃奏遣良臣秦檜矯詔下嶽飛于大理獄秦檜必欲殺飛乃與張俊謀密誘飛部曲能告飛事者優與重賞卒無應者俊聞飛嘗欲斬統制王貴又嘗杖之乃誘貴告飛貴不肯曰為大將寧免以賞罰用人苟以為怨將不勝其怨俊因劫以私事貴懼而從之檜又聞飛統制王俊善告訐號雕兒以姦貪屢為張憲所抑使人諭之王俊許諾于是檜謀以張憲王貴王俊皆飛部將使其徒自相攻發因以及飛父子庶帝不疑俊時在鎮江乃自為狀付王俊妄言副都統制張憲謀據襄陽還飛兵柄令告王貴使貴執憲赴鎮江行樞密府憲未至俊預為獄以待之屬吏王應求白俊以為樞院無推勘法俊不聽親行鞫錬使憲自誣謂得飛子雲手書命憲營還兵計憲被掠無完膚竟不伏俊手自具獄成告檜械憲至臨安下大理寺獄檜奏召飛父子證憲事帝曰刑所以正亂勿妄追證動搖人心檜矯詔召飛父子使者至飛第飛笑曰皇天后土可表此心遂與雲就獄檜命中丞何鑄大理卿周三畏鞫之鑄引飛至庭詰其反狀飛裂裳以背示鑄有舊涅盡忠報國四大字深入膚理既而閲實俱無驗鑄察其寃白檜檜曰此上意也鑄曰鑄豈區區為嶽飛者強敵未滅無故戮一大將失士卒心非社稷之長計檜語塞乃改命諫議大夫万俟卨卨素與飛有怨遂誣飛令于鵬孫革致書張憲王貴令虛申探報以動朝廷雲與憲書令措置使飛還軍且云其書已焚飛坐繫兩月無可證者或教卨以臺章所指淮西逗遛事為言卨喜白檜簿録飛家取所賜御札與往來道途日月皆可考乃收其御札送官藏之滅迹卨又使鵬革等證飛受詔逗遛命評事元龜年取行軍時日雜定之傅會其獄大理卿薛仁輔寺丞李若朴何彥猷皆言飛無辜判宗正寺士􅩍請以百口保飛無他且曰中原未靖禍及忠義是忘二聖不欲復中原也皆不聽韓世忠心不平詣檜詰其實檜曰飛子雲與張憲書雖不明其事莫須有世忠曰莫須有三字何以服天下也韓世忠罷世忠深以和議為不然及魏良臣使金世忠諌曰中原豪傑莫不延頸以俟弔伐之師若自此與和日月侵尋人情銷弱國勢委靡誰復振之北使之來乞與靣議復抗疏言秦檜誤國之罪檜諷言官論之帝不聽而世忠連疏乞罷遂罷為醴泉觀使封福國公世忠自是杜門謝客絶口不言兵時跨驢攜酒從一二童奴縱遊西湖以自樂淡然若未嘗有權位者平時將佐罕得見其面十一月安置李光于藤州秦檜忌光諷中丞万俟卨論光陰懷怨望與孫近朋比安置藤州藤州守臣以光詩有諷刺者獻于檜檜怒令言者論之再貶瓊州和議成以何鑄簽書樞密院事奉表稱臣于金烏珠以蕭毅邢具瞻為審議使與魏良臣偕來議以淮水為界求割唐鄧二州及陜西餘地歲幣銀絹各二十五萬仍許歸梓宫太后帝悉從其請命宰執告祭天地宗廟社稷命鑄往使誓表略曰臣構言今來畫疆以淮水中流為界西有唐鄧州割屬上國自鄧州西南屬光化軍為敝邑沿邊州城既蒙恩造許備藩方世世子孫謹守臣節每年皇帝生辰并正旦遣使稱賀不絶歲貢銀絹二十五萬兩匹自壬戌年為首每春季差人般送至泗州交納有渝此盟明神是殛墜命亡氏踣其國家臣今既進誓表伏望上國早降誓詔庶使敝邑永為憑馬毅辭帝諭曰若今歲太后果還自當謹守誓約如今歲未也則誓文為虛設鑄至汴見烏珠遂如會寧烏珠等遣人來復求商州及和尚方山二原十二月遣使割唐鄧商秦之地以畀金京西割唐鄧二州陜西割商秦之半棄和尚方上二原以大散關為界于是宋僅有兩浙兩淮江東西湖南北西蜀福建廣東西十五路而京西南路止有襄陽一府陜西路止有階成和鳳四州凡有府州軍監一百八十五縣七百三金既畫界建五京上京會寧府東京遼陽府西京大同府南京大興府中京大定府後改南京為中都以汴京為南京置十四總管府凡十九路上京成平東京北京西京中都南京河北東西山東東西大名河東北南京兆鳳翔鄜延慶原臨洮其間散府九節鎮三十六守禦郡二十二刺史郡七十三軍十有六縣六百三十二初邵隆在商州十年披荆榛瓦礫以為治招來流散屢敗金人終不肯離商而去值和議成割商與金隆常快快徙知金州嘗以兵出境秦檜恨之徙知敘州檜陰使人鴆之也秦檜殺故少保樞密副使武昌公嶽飛歲已暮而飛獄不成一日檜手書小紙付獄即報飛死矣年三十九雲與張憲皆棄市于鵬等從坐者六人籍飛家資徙之嶺南于是薛仁輔李若朴何彥猷皆被黜布衣劉允升上書訟飛寃下大理獄死齊安王王􅩍以救飛尋放之建州凡傅成其獄者皆進秩洪皓在金以蠟書奏金人所畏服者惟飛至以父呼之及聞其死金人酌酒相賀飛事親孝家無姬侍吳玠素服飛願與交歡飾名妹遺之飛曰主上宵旴豈大將安樂時邪郤不受玠益敬服帝欲為飛營弟飛辭曰金兵未退何以家為或問天下何時太平飛曰文臣不愛錢武臣不惜死天下太平矣卒有取民麻一縷以束芻者立斬以徇卒夜宿民開門願納無敢入者軍號凍死不折屋餓死不鹵掠卒有疾飛躬為調藥諸將逺戍飛遣妻問勞其家死事者哭之而育其孤或以子婚其女凡有頒犒均給軍吏秋毫不私善以少擊衆謀定而後戰故有勝無敗猝遇敵不動故敵為之語曰撼山易撼嶽家軍雞張俊嘗問用兵之術飛曰仁信智勇嚴闕一不可飛好賢禮士覽經央雅歌投壼恂恂如書生每辭官必曰將士效力飛何功之有然忠憤激烈議論持正不挫于人卒以此得楇飛死時冇女痛父寃抱銀瓶投井以殉後人因名其井為孝娥井壬戌十二年金皇統二年春二月進封建國公瑗為普安郡王已而封崇國公璩為恩平郡王事在十五年詔諸州修學宫何鑄還自金初蕭毅至臨安帝曰朕有天下而養不及親徽宗無及矣今立信誓明言歸我太后朕不恥和不然朕不憚用兵及何鑄曹勛往帝召至內殿諭之曰朕北望庭闈無淚可揮卿見金主當曰慈親之在上國一老人耳在本國則所繫甚重以至誠説之庶彼有感鑄至金首以太后為請金主曰先朝業已如此豈可輒改曹勛再三懇請金主乃許之遂遺鑄還許歸徽宗及鄭后邢后之喪與帝母韋氏三月四川宣撫副使胡世將卒以鄭剛中字享仲婺州金華人代之剛中節制諸將極嚴每入謁必先庭揖然後就坐吳璘升少師語王閽吏乞講鈞敵之禮剛中曰少師雖尊猶都統制耳倘變常禮是廢軍容璘惶恐聽命夏四月金使人以袞冕來册帝金遣左宣徽使劉筈彥宗之子以袞冕圭册册帝為大宋皇帝五月初置榷場于盱眙金人約各置𣙜場于兩界于是置旴𣅿𣙜場官監與北商貿易淮西京西陜西𣙜場亦如之金亦置𣙜場于夀鄧州鳳翔府後二十年並罷惟存旴𣅿𣙜場此據宋史本紀及食貨志增通鑑下作後又置于光州棗陽安豐軍此乾道間事而同時所置反略不録今改輯六月安置王庶于道州秋八月何鑄罷鑄于是年七月權參知政事秦檜以鑄不傅會嶽飛之獄怨之諷方俟卨論其過欲竄諸嶺表帝不許遂出知徽州後復責授祕書少監徽州居住金人歸徽宗皇帝顯肅皇后鄭氏及懿節皇后邢氏之喪喪至帝易緦服奉安龍德别宫皇太后韋氏至自金后有智慮初聞金人許還三梓宫後恐其反覆呼役者畢集然後起攢宫時方暑金人憚行后慮有他變乃陽稱疾須秋涼進發已而稱貸于金使得黃金三平兩以犒其衆由是途中無虞帝至臨平奉迎見后喜極而泣后至臨安入居慈寧官九月大赦加秦檜太師封魏國公以和好成也尋以大后回鑾推恩進封檜秦魏兩國公檜以封兩國與蔡京同辭不拜遣使如金沈昭逺賀生辰楊願字原仲史不詳何所人賀正旦賀禮俱用金茶器千兩銀茶器萬兩錦綺千匹金循契丹例不欲兩接使人故併遣使歲如之冬十月始聼中外用樂權攢徽宗皇帝及顯肅皇后于永固陵尋改曰永祐在會稽縣東南以懿節皇后祔十一月張俊免初俊贊秦檜和議約盡罷諸將獨以兵權歸俊及和議定諸將罷而俊無去意故檜諷臺臣江邈論之遂罷為鎮洮崇信等軍節度使充醴泉觀使進封清河郡王奉朝請是月劉光世卒光世于諸將中最先進然律身不嚴馭軍無法及秦檜用事早解兵柄與時浮沉故不為檜所忌得竊寵榮以終其身徽猷閣待制致仕尹焞卒焞質直宏毅實體力行程頤嘗以魯許之且曰我死而不失其正者尹氏子也及是卒詔祕書少監秦熺修日厯秦檜無子取妻兄王煥孽子熺養之南省擢為第一檜以為嫌進士陳誠之䇿専主和議乃以為首熺次之歷官祕書少監檜自知不為士論所與乃以熺領國史自檜再相凡詔書章疏稍及檜者率更易焚棄是後紀録皆熺筆無公是非矣又因太后北還頌功德凡二千餘言使著作郎王楊英周執羔上之皆遷秩據檜本傳乃熺頌檜通鑑直以屬檜似誤今改正孟忠厚罷先是忠厚為樞密使充攢宫總護使忠厚始雖以外戚顯貴然能避權勢不以私干朝廷秦檜忠厚之僚壻也未嘗親附世以此重之至是山陵畢檜諷臺諫引故事外戚不預政罷之十二月陜西大旱初陜西連歲不雨至是涇渭灞滻皆竭民無以食多飢死者西遼耶律逹實后蕭氏死子伊哷立改元紹興癸亥十三年金皇統三年春正月作太學以嶽飛宅為之二月作景靈宫遣官自溫州奉迎祖宗神御至遂詣天章閣西殿告遷徽宗及顯恭顯肅二后神御併奉安焉三月築太社太稷壇及圜丘夏閏四月立貴妃吳氏開封人為皇后后年十四選入王邸帝既即位后常以戎服侍左右習書史善翰墨寵遇日隆纍進貴妃帝憐邢氏在金虛中宫以待其還至是秦檜纍表請立后皇太后亦以為言帝從之王次翁罷秦檜當國凡居政府者莫不以微忤斥始終不二于檜者惟次翁一人而已秋七月行人洪皓張邵朱辨還自金自建炎以來奉使如金被拘囚者三十餘人多已物故惟三人以和議成許歸已而金人遣七騎追之及淮而皓等已在舟中矣皓居冷山屢因諜者密奏金事且力言和議非計乞與師進擊嘗求韋太后書遣李微持歸帝大喜曰朕不知太后寧否幾二十年雖遣使百輩不如此一書皓留金凡十五年而還入對內殿求郡養母帝曰卿忠貫日月志不忘君雖蘇武不能過豈可捨朕去邪皓退見秦檜語連日不止曰張和公金人所憚乃不得用錢塘暫居而景靈宫太廟皆極土木之華豈非示無中原意乎檜不懌遂除徽猷閣直學士提舉萬夀觀復以論事忤檜出知饒州邵被囚踰年送劉豫使用之邵見豫長揖而已又呼豫為殿院責以君臣大義詞氣俱厲豫怒械于獄久之復送于金拘之燕山僧寺及還入見除祕書修撰主管祜神觀司諫詹大方論其使事無成改台州崇道觀辨副王倫使金既就館守之以兵久之金將議和當遣一人受書還欲辨與倫探䇿決去留辨曰吾來固自分必死豈應今日覲幸先歸願正使受書歸報天子成兩國之好蚤申四海之養于兩宫則吾雖暴骨外國猶生之年也倫將歸辨謂曰古之使者有節以為信今無節有印印亦信也願留之使辨得抱以死死不腐矣倫解以授辨辨受而懷之卧起與俱金人迫辨仕劉豫不從金人怒絶其餼遺以困之辨固拒驛門忍飢待盡誓不為屈金人感動致禮如初久之復欲易其官辨曰吾官受之本朝有死而已誓不易以辱吾君也人以書訣皓曰殺行人非細事吾曹遭之命也要當舍生以全義耳乃具酒召被掠士夫飲半酣語之曰已得近某寺地一旦畢命報國諸公幸瘞我此地題其上曰有宋通問副使宋公之墓干我幸矣衆皆泣下莫能仰視辨談笑自若及尼馮哈死辨密疏金國虛實曰此不可失之時也遣李發間行歸報上倫還以辨奉送徽宗大行之文為獻其辭有曰嘆馬角之未生魂親消雪窖攀龍髯而莫逮淚灑冰天帝讀之感泣官其屬五人謂丞相張浚曰辨歸日當以禁林處之及還入見便殿辨謝且曰陛下與金人講和上返梓宫次迎太母此皆知時知機之明然盟可守而詭詐之心宜默以待之兵可息而消弭之術宜詳以講之陛下既知于始願圖厥終帝曰善秦檜惡其言奏易宣教郎直祕閣而卒帝書六經刻石于太學碑石今在浙江抗州府學嵌壁中冬十二月癸未朔日食是日陰雲不見秦檜率百官稱賀金人來聘賀正旦也禮物金酒器六事色綾羅紗縠二百假馬六匹自是歲如之復置三館上謂宰執曰人才須素養太宗置三館養天下之士至仁廟人才輩出為用今日若不興學校將來安得人才用邪甲子十四年金皇統四年春正月樂平唐縣今屬江西饒州府水鬬樂平縣何衝里田隴數十百頃田中水類為物所吸聚為一直行髙平地數尺不假隄防而水自行里南程氏家井水溢亦髙數尺夭矯如長虹聲如雷穿墻毁樓二水鬬于杉孰且前且却約十餘刻乃解各復故二月万俟卨罷卨于十二年八月參知政事以樓照簽書樞密院事初卨自金還秦檜假金人譽已數千言屬卨以聞卨難之他日奏事退檜坐殿廬中批上旨輒除所厚者官吏鈐紙尾進卨曰不聞聖語卻不視檜大怒自是不交一語諷言官李文會詹大方論之卨遂求去三月帝謁孔子廟遂視學國學大成殿成司業髙閎表請帝視學從之止輦于殿門外步趨升降退御敦化堂命禮部侍郎秦熺執經髙閎講易泰卦胡宏見閎表移書責之曰大學明人倫之所在也太上皇帝劫制于強敵生往死歸此臣子痛心切骨卧薪嘗膽宜思所以必報之大讐也太母天下之母其縱釋乃在金人此中華之大辱臣子所不忍言也而柄臣乃敢欺天罔人以大讐大辱而為大恩閣下目覩忘讐滅理北靣敵國以苟宴安之事猶晏然為天下師儒之首既不能建大論明天人之理以正君心乃阿諛柄臣希合風旨求舉太平之典人從而為之詞歎罔孰甚焉胡宏字仁仲安國子夏四月初禁野史從秦檜請也後著作郎林機言冇失意之人匿迹近地窺伺朝廷作為私史以舊其邪説請禁絶之復下詔申禁之五月樓照罷以李文會簽書樞密院事文會劾照罷之遂命文會代照自是執政免即以言者代之已而文會為楊願劾去願遂代其位願迎合秦檜意旨以為舉劾人謂之肉簡牌未幾亦斥天下快之閩浙大水內侍右武大夫白鍔從皇太后北歸者因閩浙大水宣言燮理乖盩洪皓名聞華夷顧不用鍔館客張伯麟嘗題太學壁云夫差而忘越人之殺而父乎秦檜怒之俱坐誹謗刺配鍔于萬安軍伯麟于吉陽軍罷皓提舉江州太平觀秋九月徙趙鼎于吉陽軍鼎在湖五年杜門謝客時事不挂口有問者引咎而已先是鼎請正建國公皇子之號檜言鼎欲立皇太子是待陛下終無子也宜俟親子乃立至是中丞詹大方希檜意劾鼎與其黨范中邪謀密計轉相煽惑以徼無妄之福蓋指皇子而沖嘗為翊善故也遂移鼎吉陽鼎謝表冇日白首何歸悵餘生之無幾丹心未泯誓九死以不移檜見曰此老倔強猶昔冬十月何若請黜程頤之學右正言何若指張頤張載遺書為專門曲學請戒內外師儒之官力加禁絶秦檜從之十二月王倫為金所殺金欲以倫為平州路轉運使倫曰奉命而來非降也金脅以威遣使來趣倫拒益力金杖其使俾縊殺之乙丑十五年金皇統五年春正月朔初御大慶殿受朝夏四月朔彗出東方大赦六月乙亥朔日食帝幸秦檜第上賜檜第又賜銀萬兩絹萬匹錢萬緡綵千匹車駕親幸加檜妻兩國夫人子熺學士承旨婦郡夫人孫塤堪坦並除直祕閣賜三品服塤時方九歲尋書一德格天之閣六字賜檜後又命作檜家廟賜以祭器秋七月放張浚于連州浚因星變欲力論時事以其母計氏年髙言之必及禍計氏知之誦其父咸紹聖初制䇿曰臣寧言而死于斧鉞不忍不言而負陛下浚意遂決即上疏言當今事勢即養大疽于頭目心腹之間不決不止遲則禍大而難決疾則禍輕而易治惟陛下謀之于心斷之以獨謹察情偽豫備倉卒庶幾社稷安全不然後將噬臍事下三省秦檜大怒令中丞何若劾之遂貶連州居住尋徙永州檜必欲殺浚以其死黨張柄知潭州與郡丞汪召錫共伺察之寬諸郡雜稅是條續綱目係于十八年宋史高宗紀載在十五年今依宋史改帝曰人知取之為取而不知豫之為取若稍與展免俟家給人足稅斂自然易辨于是蠲廬光二州上貢錢米汀漳二州秋稅處州三縣被水民家綢絹鄂州舊額絹各一年又蠲四川積貨常平錢三十萬緡京西路請佃田租及州縣場務稅錢御批歷代通鑑輯覽卷八十六

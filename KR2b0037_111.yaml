front:
  text: 欽定四庫全書御批厯代通鑑輯覽一百十二明神宗皇帝壬寅萬厯三十年春二月帝不豫召大學士沈一貫具詔除弊政翼日帝廖寢前詔
  hash: sha256:ec7654014a4c15f16a687ebf2a2b0dde6868b34323aa913e73dd922ae2f6a33d

  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_023-1a, image: WYG0335/WYG0335-0618a.png}
body:
  text: 元菟太守姚光幽州刺史馮煥巴郡宕渠人數紏發姦惡怨者詐作璽書譴責煥光賜以歐刀刑人之刀又下龎奮使速行刑奮即斬光收煥煥欲自殺其子緄字鴻卿疑詔文有異止之煥乃上書自訟徴奮抵罪秋七月地震郡國凡十三髙句驪王遂成降初髙句驪王宫率馬韓濊貊注俱見前數千騎圍元菟夫餘今朝鮮東北境古扶餘國地通典扶餘國後漢通焉王遣子尉仇台將二萬餘人與州郡併力討破之事在建建元年已宫死子遂成立時姚光為元菟太守上言欲因其喪發兵擊之議者皆以為可陳忠曰官前桀黠光不能討死而擊之非義也宜遣使弔問責讓前罪赦不加誅取其後善帝從之至是遂成還漢生口詣元菟降其後濊貊率服東垂少事九月地震郡國凡二十七雨水京師及郡國二十七遣宦者及乳母王聖女伯榮詣甘陵尚書僕射陳忠上疏曰竊聞使者所過威動郡縣王侯二千石至為伯榮獨拜車下修道繕亭徵役無度賂遺僕從人數百匹謂縑帛伯榮之威重於陛下陛下之柄在於臣妾水災之發必起於此臣願明主嚴天元之尊正乾剛之位不宜復令女使千錯萬幾書奏不省時機事專委尚書而災變輒免三公忠又上疏曰漢典舊書丞相所請靡有不聽今之三公雖當其名而無其實選舉誅賞一由尚書近以災異切讓三公臣心常獨不安又尚書決事多違故典罪法無例詆欺為先宜割而勿聽上順國典下防威福置方圓於規矩審輕重於街石誠國家之典萬世之法也汝南黃憲字叔慶汝南慎陽人卒憲初舉孝廉又辟公府友人勸其仕憲亦不拒暫到京師而還竟無所就年四十八終天下號曰徴君憲世貧賤父為牛醫憲年十四潁川荀淑遇于逆旅竦然異之楫與語移日不能去謂曰子吾之師表也前見袁閬未及勞問逆曰子國有顔子寧識之乎閬曰見吾叔度邪同郡戴良才髙倨傲而見憲未嘗不正容及歸罔然若有失也其母問曰汝復從牛醫兒來邪對曰良不見叔度自以為無不及既覩其人則瞻之在前忽然在後固難得而測矣陳蕃周舉常相謂曰時月之間不見黃生則鄙吝之萌復存乎心矣太原郭泰少遊汝南過袁閬不宿而退從憲纍曰乃還或問之泰曰奉髙之器譬諸泛濫雖清而昜挹叔度汪汪若千頃陂澄之不清清之不濁不可量也良荀淑字季和潁川潁陰人袁閬字奉髙汝南人戴字叔鸞懷陽人陳蕃字仲舉平輿人周舉字宣光汝陽人郭泰字林宗太原介休人癸亥二年夏四月封王聖為野王君以班勇為西域長史將兵屯柳中注見前北胸奴連與車師冦河西議者欲復閉玉門陽關以絶其患敦煌太守張璫上書陳三䇿略曰北虜呼衍王常展轉蒲類秦海之間專制西域共為冦鈔今以酒泉屬國吏士二千餘人集昆侖塞先擊呼所絶其根本因發鄯善兵五千人臇車帥後部此上計也若不能出兵置軍司馬將士五百人四郡供其犁牛穀食出據抑中此中計也如又不能則宜棄交河城收鄯善等悉使入塞此下計也蒲類國名今已里坤城其東部也城西北有池即古蒲類海唐人亦名婆悉海秦海章懷注大秦國在海西故云交河故城在今土魯番城西漢車師前王庭地唐于此置縣屬西州朝廷下其議陳忠請于敦煌復置校尉增四郡屯兵以撫諸國于是復以班勇為西域長史將兵五百人出屯栁中秋七月丹陽山崩此丹陽今寧國府是九月雨水郡國凡五以楊震為太尉耿寶薦李閏兄于震曰李常侍國家所重欲令公辟其兄寶惟傳上意耳震曰如此則宜有尚書敕寶大恨而去閻顯亦薦所親震又不從司空劉授聞之即辟此二人由是震益見怨時詔使者大為王聖修第樊豐周廣謝惲等傾搖朝廷震上疏曰方今災患滋甚百姓空虛三邊震擾帑藏匱乏而為阿母起第為費巨億廣惲兄弟依倚近幸與之分威屬託州郡傾動大臣招徠貪汙之人受其貨賂復得顯用黑白溷淆天下歡譁臣聞師言上之所取財盡則怨力盡則叛怨叛之人不可復使惟陛下度之上不聽冬十二月地震京師及郡國三聘處士周燮字彥祖汝南安成人馮良字君郎南陽人不至陳忠薦汝南周燮南陽馮良學行深純隱居不仕帝以羔幣聘之燮宗族勸之曰夫修德立行所以為國君獨何為守東剛之坡乎燮曰夫修道者度時而動動而不時焉得亨乎燮與良皆自載至近縣稱病而還甲子三年春正月班勇擊走胸奴田車師者西域復通班勇至樓蘭以鄯善歸附特加三級龜兹王白英猶自疑未下勇開以恩信乃率姑墨溫宿自縛詣勇因發其兵到車師前王庭擊走胸奴于伊和谷于是前部始復開通還屯田栁中後勇擊斬車師後王軍就及胸奴使者傳首京師事在西年二月帝東巡三月還未入宫䇿收太尉震印綬遣歸故郡震自殺樊豐等見楊震連諫不從無所顧忌遂詐作詔書調發司農錢穀大匠見徒見形甸反徒供徭役者材木各起家舍園池震復上疏略曰臣聞台輔不能調和陰陽去年十二月四日京師地動其日戊辰三者皆土位在中宫此中臣近官持權用事之象也陛下以邊境未寧躬自菲薄宫殿垣屋傾倚枝拄而已而親近幸臣驕溢踰法惟陛下奮乾剛之德棄驕奢之臣以承皇天之戒所言轉切帝既不平而豐等憤怨會河間男子趙騰上書指陳得失帝發怒欲誅騰震救之曰殷周哲王小人怨詈則還自敬德乞全騰命以誘芻蕘輿人之言帝不聼竟殺之及帝東巡太尉部掾髙舒得豐等所詐下詔書具奏須行還上之豐等惶怖會太史言星變逆行遂共譛震云自趙騰死後深懷怨懟且鄧氏故吏有恚恨心帝然之及還京師便臨太學即其夜遣使者䇿收震太尉印綬震于是柴門柴塞其門也絶賔客豐等復惡烏路反之令耿寶奏震恚望有詔遣歸故郡震行至城西夕陽亭乃慷慨謂其諸子門人曰死者士之常分吾蒙恩居上司疾姦臣狡猾而不能誅惡嬖女傾亂而不能禁何面目復見日月身死之日以禖木為棺布單被裁足蓋形勿歸冢次勿設祭祀因飲鴆而卒𢎞農太守移良承樊豐等旨遣吏于陜縣留停震喪露棺道側謫震諸子代郵行書道路皆為隕涕移姓齊公子雍于邑于移其後因以為氏代郵行書代驛吏傳行文書也夏四月閬中秦縣今為四川保寧府治山崩以耿寶為大將軍秋九月廢太子保為濟隂王王聖江京樊豐等譛太子乳母王男厨監主飲食者邴吉等殺之太子歎息京豐懼乃與閻后讒太子帝怒召公卿議廢太子耿寶等皆以為當廢太僕來歷字伯珍歙曾孫與太常桓焉字叔元榮之孫廷尉張皓字叔明犍為武陽人留侯良之後議曰經説年未滿十五過惡不在其身且男吉之謀皇太子容有不知宜選忠良保傳輔以禮義廢置事重此誠聖恩所宜宿留不從遂廢太子為濟隂王居德陽殿西鐘下來厯乃要結光祿勳祋諷宗正劉偉將作大匠薛皓侍中閭邱𢎞陳光趙代施延大中大夫朱倀等十餘人俱詣鴻都門證太子無過帝使中常侍詔曰天下一體天性自然以義割恩為天下也厯諷等不識大典而共為歡譁外見忠直而內希後福朝廷廣開言路故且一切假貨若懷迷不決當顯明刑書皓先頓首曰固宜如明詔厯怫然庭詰皓曰屬通諫何言而今復背之大臣處國事固得輾轉若此乎乃各稍自引起厯獨守闕連日不肯去尚書令陳忠劾奏厯等乃免厯兄弟官削國黜厯母武安公主不得令見鐘德陽殿章懷注在北宫掖庭中西鐘下西廂下懸之所也按鴻都門北宮門名閭邱復姓左傳齊有閭邱嬰庚申晦日食地震京師及諸郡國凡二十三大水雨雹郡國凡三十六乙丑四年春二月帝如宛三月戊午朔日食帝崩于葉注見前還宫發喪帝崩于乘輿年三十二皇后與閻顯兄弟江京樊豐等謀以濟隂王在內恐公卿立之乃偽云帝疾甚徙御卧車所在上食問起居如故馳歸四日至洛陽尊皇后曰皇太后太后臨朝以閻顯為車騎將軍儀同三司迎北鄉侯懿入即位太后欲久専國政貪立幼年與顯等定䇿迎濟北惠王名夀章帝子子北鄉濟北國邑侯懿為嗣濟隂王以廢黜不得上殿親臨梓宫悲號不食羣僚莫不哀之樊豐等下獄死耿寶自殺王聖伯榮徙鴈門閻顯忌樊豐耿寶風有司奏貶寶為亭侯遣就國寶自殺豐及謝惲周廣下獄死聖母子徙雁門于是顯以弟景為衛尉耀為城門校尉晏為執金吾並處權要威福自由葬恭陵在洛陽縣東南賀善贊曰安帝即位所書羌夷盜賊災變世道可知徒聞狎佞臣厚保毋疾忠賢望其弭災靖亂尚可得乎冬十月越嶲山崩北鄉侯薨尹起莘發明北鄉侯已即位而不書崩不成乎君也不成乎君而書薨既臨大位異乎羣臣也閻顯白太后祕不發喪更徵諸王子閉宫門屯兵自守十一月地震京師及郡國凡十六中黃門孫程涿郡新城人等迎濟隂王保入即位是為孝順帝誅閻顯等遷太后于離宫封宦者孫程等十九人為列侯初北鄉侯病篤孫程等十九人孫程王康王國與中黃門黃龍彭愷孟叔李建王成張賢史汛馬國王道李元楊他陳子趙封李剛魏猛苖光等皆裁單衣為誓謀立濟隂王至是夜入省門遇江京劉安陳逹斬之以李閠積為省內所服脅與俱迎濟隂王即皇帝位時年十一召尚書令以下從輦幸南宫登雲臺召公卿百寮使虎賁羽林士屯南北宫諸門閻顯時在禁中憂迫不知所為小黃門樊登勸顯以太后詔石越騎校尉馮詩將兵屯平朔門且授之印曰能得濟隂王者封萬户侯詩許諾辭以兵少顯使與樊登迎吏士于門外詩因格殺登歸營屯守顯弟景還外府收兵孫程傳召諸尚書使收景送廷尉獄即夜死明日遣使者入省奪得璽綬乃收顯及其弟耀晏誅之家屬皆徙比景後漢縣屬日南郡遷太后于離宫又明日開門罷屯兵封程等皆為列侯是為十九侯擢程為騎都尉詔以將作大來厯為衛尉祋諷閭邱𢎞等先卒皆拜其子為郎朱倀施延陳光趙代皆見拔用後至公卿徵王男邴吉家屬還京師厚加賞賜初閻顯辟崔瑗為吏瑗以北鄉立不以正知顯將敗欲説令收江京廢少帝而立濟陰王而顯日沉醉不得見乃告長吏陳禆欲與共求見言之禪猶豫未聼從會顯敗瑗坐斥門人蘇祗欲上書言狀瑗遽止之禪謂曰第聼祗上書禪請為證瑗曰此譬猶兒妾屏耳願勿復出口遂辭歸不復應州郡命崔瑗字子玉涿郡安平人駰之子葬北鄉侯以諸王禮改葬故太尉楊震祠以中牢楊震門生虞放陳翼詣闕追訟震事詔除震二子為郎贈錢百萬以禮改葬于華隂潼亭震墓在今陜西潼關西大道北逺近畢至有大鳥髙丈餘集震喪前俯仰悲鳴葬畢乃飛去郡以狀上帝感震忠直復以中牢具祠之時人立石圖鳥象于墓所孝順皇帝丙寅永建元年春正月帝朝太后于東宫初議郎陳襌以為閻太后與帝無母子恩宜徙别館絶朝見周舉謂司徒李郃延光四年為司徒曰瞽瞍常欲殺舜舜事之逾謹鄭莊公秦始皇事具見前怨母隔絶後感潁考叔茅焦之言復修子道書傳美之今諸閻新誅太后幽在離宫若悲愁生疾一旦不虞主上將何以令于天下如從禪議後世歸咎明公宜密表率羣臣朝覲以厭天心以答人望郃即上疏帝從之太后意乃安皇太后閻氏崩合葬恭陵隴西鍾羌反馬賢擊破之賢將七千餘人戰于臨洮斬千餘級羌請率種人降進封賢都鄉侯自是涼州無事秋八月下司𨽻校尉虞詡獄尋赦出之以為尚書僕射左雄字伯豪南郡涅陽人為尚書司𨽻校尉虞詡到官數月奏太傅馮石太尉劉喜阿黨權貴免之又劾中常侍程璜陳秉孟生李閏等百官側目三公劾奏詡盛夏多拘繫無辜為吏民患詡上書自訟曰法禁者俗之隄防刑罰者民之銜轡臣所發舉贓罪非一三府恐為臣所奏遂加誣罪臣將從史魚死即以尸諌耳韓詩外傳史魚將死謂其子曰我言蘧伯玉賢不能進彌子瑕不肖不能退死不當埋殯于室足矣子以父言聞之君立召伯玉而貴之子瑕而退之又案中常侍張防屢寢不報詡不勝憤乃自繫廷尉奏言曰昔樊豐幾亡社稷事見前今張防復弄威柄臣不忍與防同朝謹自繫以聞書奏坐論輸左校防必欲害之二日之中傳考四獄孫程張賢等乞見曰虞詡盡忠更被拘繫張防贓罪明正反搆忠良今客星守羽林古今注曰二月甲午客星入太微李郃上書曰乃月十三日有客星氣象彗孛歷天市梗河招搖槍梧十六日入紫宫迫北辰十七日復過文昌泰陵天船樍水間稍微不見如占恐復有居帝旁耗亂政事者其占宫中有姦臣宜急收防送獄以塞天變時防在帝後程叱防下殿奏曰陛下急收防無令從阿母帝乳母宋娥求請帝問諸尚書賈朗素與防善證詡之罪帝疑于是詡子顗與門生百餘人候中常侍髙梵車訴言枉狀梵入言之防坐徙邊即赦出詡徵拜議郎數日遷僕射詡上疏曰方今公卿以下類多拱默以樹恩為賢盡節為愚伏見議郎左雄有王臣蹇蹇之節宜擢在喉舌之官必有匡弼之益由是拜雄尚書遣孫程等十九侯就國程等坐懷表上殿爭功徙封逺縣程徙封宜城侯因遣十九侯就國促期發遣司徒掾周舉謂司徒朱倀字孫卿夀春人是年二月李郃免倀代曰朝廷非程等不立今忘大德録小過如道路夭折使上有殺功臣名宜急表之倀乃諌帝從之復故爵土三年召程還京師陽嘉元年卒丁卯二年夏六月追尊母李氏為恭愍皇后初帝母李氏為閻太后所害事見前瘞洛陽城北至是左右白之帝發哀親到瘞所更以禮殯恭陵遣敦煌太守張朗與班勇擊焉耆降之徴勇下獄免先是班勇誅斬東且彌西域圗去洛陽九千二百五十里王更立其種人為王又發諸國兵擊胸奴呼衍王呼衍王亡走徙居枯梧河上西域皆服惟焉耆王元孟未降勇請攻之于是遣朗將河西四郡兵與勇兩道擊之朗先有罪欲邀功自贖遂先期至爵離釋氏西域記龜兹國北山上有寺名雀離關元孟乞降朗入受降而還勇以後期徴下獄免後卒于家朗亦免官秋七月甲戌朔日食以許敬字鴻卿平輿人為司徒朱倀罷敬代敬仕于安和之間當竇鄧閻氏之盛無所屈撓三家既敗士大夫多染汙者獨不及敬當世以此重之聘樊英字季齊南陽魯陽人為五官中郎將英善星算推步災異隱于壺山章懷注山在鄧州新城縣即張衡南都賦所云天封大狐是也之陽州郡禮請公卿舉賢良有道皆不行安帝初徴為博士建光元年與孔喬字子松宛人李昺字子然酇人郎宗字仲綏安邱人楊倫字仲理東昏人王輔字公助安陸人等同徵不赴至是帝復以䇿書元纁備禮徵之英固辭疾篤不聽英不得已到京稱疾強輿入殿猶不能屈乃設壇席賜几杖待以師傅之禮延問得失拜五官中郎將數月英稱疾篤詔以為光祿大夫賜告歸令所在送榖以嵗時致牛酒英初被詔命衆皆以為必不降志及後就聘應對無竒謀深䇿談者失望以處士楊厚字仲宣廣漢新都人黃瓊字世英香之子為議郎時又徵楊厚黃瓊厚至豫陳漢有三百五十年之厄以為戒拜議郎瓊將至李固字子堅郃之子以書遺之曰語云嶢嶢者易缺皎皎者易汙盛名之下其實難副是故俗論皆言處士純盜虛聲願先生宏此逺謨令衆人歎服一雪此言耳瓊至亦拜議郎稍遷尚書僕射數上書言事帝頗采用之固少好學以父郃為司徒因改姓名杖䇿驅驢負笈從師不逺千里每到太學密入公府定省不令同業諸生知其為郃子也戊辰三年春正月京師地震漢陽地陷裂己巳四年春正月帝冠夏五月桂陽獻大珠還之詔曰海內頗有災異朝廷修政減膳珍玩不御而桂陽太守文礱逺獻大珠以求幸媚今以還之秋九月詔復安定北地上郡安帝永初五年徙至是復虞詡言安定北地上郡山川險厄沃野千里土宜畜牧水可溉漕頃遭羌亂郡縣兵荒二十餘年矣棄沃壤之饒捐自然之財不可謂利離河山之阻守無險之處難以為固今三郡未復園陵單外言無蔽障宜開聖聼考行所長從之使謁者督徙者各歸本縣繕城郭置候驛又浚渠屯田省費嵗一億計遂令諸郡儲粟周數年辛未六年春二月以沈景吳郡人為河間相河間王政章帝子開封河間王開卒子政嗣傲很不奉法帝以侍御史沈景強能擢為河間相景到國謁王王不正服箕踞殿上侍郎贊拜景峙不為禮問王所在虎賁曰是非王邪景曰王不正服常人何别今相謁王豈謁無禮者邪王慙而更服景然後拜出請王傳責之曰前發京師陛見受詔以王不恭使相檢督諸君空受爵祿曾無訓導之義因捕諸姦人奏按其罪出寃獄百餘人政遂改節悔過自修二月復置伊吾司馬開屯田帝以伊吾膏腴傍近西域胸奴資之以為鈔暴復令開設屯田置司馬一人秋九月起太學初安帝薄于藝文博士不復講習朋徒怠散學舍頽敝鞠為蔬園將作大匠翟酺請更修繕誘進後學左雄亦以為言帝從之凡造二百四十房千八百五十室壬申陽嘉元年春正月立貴人梁氏名妠乘氏侯商次女恭懷皇后弟雍之孫為后帝欲立后而貴人有寵者四人莫知所建㒒射胡廣字伯治南郡華容人等上疏曰岐嶷形於自然俔天必有異表宜參良家簡求有德德同以年年鈞以貌稽之典經斷之聖慮帝從之后少好史書選為貴人常特被引御從容辭曰夫陽以博施為德隂以不専為義願陛下思雲雨之均澤小妾得免於罪帝由是賢之立以為后夏四月以后父商字伯夏為執金吾立孝廉限年課試法尚書令左雄上言孔子曰四十不惑禮稱強仕請自今孝廉年不滿四十不得察舉諸生試家法章懷注儒有一家之學故稱家法文吏課箋奏乃得應選若有茂才異行如顔淵子奇劉向新序子奇齊人年十八齊君使主東阿阿縣大化自可不拘年齒帝從之時廣陵所舉孝廉徐淑年未四十臺郎詰之對曰詔書有如顔淵子竒不拘年齒故本郡以臣充選郎不能屈雄詰之曰昔顔淵聞一知十孝廉聞一知幾邪淑無以對乃罷却之雄公直精明能審核真偽決志行之濟隂太守胡廣先是廣駁雄所奏乞宣下百官參其同異帝卒從雄奏出廣為太守等十餘人皆坐謬舉免黜惟陳蕃李膺字元禮穎州襄城人陳球字伯真下邳淮浦人等三十餘人得拜郎中自是牧守畏栗莫敢輕舉察選清平多得其人雄又上疏曰寧民之道必在用賢用賢之道必在考黜吏數變易則下不安業久于其事則民服教化今典城百里轉動無常謂聚斂整辦為賢能以治已安民為劣弱監司項背相望見非不舉聞惡不察言善不稱德論功不據實虛言者獲譽拘檢者離毁臣愚以為守相長吏有顯效者可就增秩勿移徙其鄉部親民之吏皆用儒生清白任從政者吏職滿嵗乃得辟舉如此虛偽之端絶迎送之役省民各寧其所矣帝悉從之而宦者不便終不能行癸酉二年春正月徵郎顗郎氏魯懿公孫費伯城郎因居之子孫以為氏顗字雅光安邱人為郎中不就上召郎顗問以災異顗因條便宜七事一園陵火災神聖驚動而宫殿官府嵗時未積便更修造願校計繕之費永念百姓之勞罷將作之官二今三宫皆令色足恭外厲內荏無佐國之實宜采納良臣以助聖化三今年春旱夏水宜務節約四去年熒惑出入軒轅宜簡出宫女五去冬有白氣從西方天苑趨參左入玉井恐有羌冦宜為備禦六恭陵大災主名未立多所收捕備經考毒宜恭已內省凡諸考案並須立秋司徒居位隂陽多謬異人同資宜黜司徒以應天意七漢興以來三百二十九嵗于時三期宜大蠲法令去奢儉除煩為簡舉方正徵有道開不諱之路園陵火災陽嘉九年恭陵百丈廡災軒轅十二星后妃所居天苑注見前玉井參星下四小星復上書薦黃瓊李固又言自冬涉春訖無嘉澤朝廷勞心廣為禱祈臣聞皇天感物不為偽動災變應人要在責己若令雨可請降水可禳止則太平可待然而災害不息者患不在此也書奏特拜郎中辭病不就封乳母宋娥為山陽君帝之立也娥與其謀故封之又封梁啇子冀為襄邑侯左雄上書就曰臣案尚書故事無乳母爵邑之制惟先帝時王聖為野王君聖造讒賊廢立之禍生為天下所咀嚼死為海內所為歡快臣請嵗以錢千萬給阿母內可以盡恩愛之歡外可以不為吏民所怪梁冀之封事非機急宜過災厄之運然後平議可否于是啇讓還冀封夏四月京師地震詔公卿直言舉敦朴之士左雄復上疏曰先帝封野王君漢陽地震今封山陽君京城復震專政在隂其災尤大臣前後瞽言封爵至重翼已髙讓山陽君亦宜崇其本節雄言切至娥亦畏懼辭讓而帝卒封之是時大司農劉據以職事被譴召詣尚書傳呼促步加以搖撲雄上言九卿大臣行有佩玉之節孝明皇帝始有撲罰非古典也帝納之京師地坼詔引敦朴士對䇿洛陽宣德亭地坼八十五丈帝引公卿所舉士對䇿李固衛尉賈建舉固對曰漢興三百餘年豈無阿乳之恩然上畏天威俯案經典知義不可故不封也今宋阿母雖有功勤但加賞賜足酬其勞裂土開國實垂舊典梁氏子弟榮顯兼加永平建初故事殆不如此宜令還居黃門之官使權去外戚政歸國家又詔書所以禁侍中尚書中臣子弟不得為吏察孝亷者以其秉威權容請託故也而中常侍在日月之側聲勢震天下子弟祿仕曽無限極諂偽之徒望風進舉今可為設常禁同之中臣尚書為陛下喉舌出納王命權尊勢重宜擇其人以毗聖政刺史二千石外統職事內受法則夫表曲者影必邪源清者流必潔由此言之本朝號令豈可蹉跌又宜罷退宦官去其權重裁置常侍二人方直有德者省事左右小黃門五人才智間雅者給事殿中如此則論者厭塞升平可致也時馬融字季長扶風茂陵人張衡字平子南陽西鄂人皆對䇿上以固為第一即出阿母還舍諸常侍叩頭謝罪朝廷肅然以固為議郎而阿母宦者皆病之詐為飛章以陷其罪大司農黃尚字伯河南郡即人邔音紀僕射黃瓊救之久乃得釋出為雒令棄官居漢中阿母後竟坐搆姦誣罔收印綬還里舍衡善機巧尤致思于天文陰陽厯算為太史令作渾天儀著靈憲造侯風地動儀時皆服其妙宣胡三省注蔡雍曰言天體者三家一曰周髀二曰夜三曰渾天惟渾天者近得其情今史官所用俱臺銅儀則其法也衡靈憲序曰在昔先王將步天路用定靈軌尋緒本原先凖之于渾體是為正儀故靈憲作興又衡本傳侯風地動儀以精銅鑄成圓徑八尺合蓋隆起形以酒樽中有都柱旁行八道外有八龍首銜銅丸下有蟾蜍張口承之如有地動則龍機發吐丸而蟾蜍銜之振聲激響雖一龍發機而七首不動尋其方乃知振之所在書典所紀未之有也秋七月大尉龎參免參在三公中最名忠直數為左右所毁司𨽻乘風案之假恭廣漢上計掾上疏曰太尉參極忠盡節不能曲心孤立羣邪之間自處中傷之地夫以讒佞傷毁忠正此天地之大禁人主之至誡也國以賢治君以忠安願卒寵任以安社稷書奏詔遣小黃門視參疾致羊酒會參夫人疾前妻子殺之雒陽令奏參罪競以災異免甲戌三年夏五月旱時春夏連旱上露坐德陽殿東廂請雨問消變之術周舉對曰隂陽閉隔則水旱成災宜推信革政崇道變惑出後宫不御之女除大官重膳之費慎官人去貪佞帝曰貪佞者為誰對曰公卿大夫數有直言者忠正也阿諛茍容者佞邪也張衡亦曰前年京師地震土裂裂者威分震者民擾也願陛下稽古率舊勿令刑德八柄不由天子然後神望允塞災消不至矣乙亥四年春二月初聼中官得以飬子襲爵御史張綱字文紀皓之子上書曰竊尋文明二帝德化尤甚中官常侍不過兩人近幸賞賜裁滿數金惜費重民故家給人足而頃者無功小人皆有官爵非所以愛民重器承天順道也書奏不省以后父啇為大將軍啇稱疾不起且一年帝使太常桓焉奉䇿就第即拜啇乃詣闕受命啇少通經傳謙恭好士辟巨覽漢陽人陳龜字叔珍上黨弦氏人為掾屬周舉李固為從事中郎固以啇和柔自守不能有所整裁乃奏記曰數年以來災怪屢見天道無親可為祗畏誠令王綱一整道行忠立明公踵伯成之髙莊子天地篇堯治天下伯成子髙立為諸侯堯授舜舜授禹伯成子髙辭為諸侯而耕全不朽之譽豈與外戚凡輩耽榮好位者同日而論哉啇不能用秋閏八月丁亥朔日食冬十二月京師地震丙子永和元年冬十二月以王龔字伯宗山陽髙平人為太尉龔深疾宦官擅權上書極言其狀諸黃門使客誣奏龔罪帝命龔亟自實李固奏記于梁啇曰王公以堅貞之操橫為讒佞所搆衆人聞知莫不歎栗夫三公尊重無詣理訴寃之義王公卒有他變則朝廷獲害賢之名羣臣無救護之節矣語云善人在患飢不及餐斯其時也啇即言之事乃得釋以后兄冀為河南尹冀嗜酒佚遊居職縱暴啇客吕放以告啇讓之冀遣人殺放而恐啇知之乃推疑放之怨仇請以放弟禹為洛陽令使捕之盡滅其宗親賔客百餘人武陵蠻反初武陵太守言蠻夷率服可增租賦虞詡曰自古聖王不臣異俗先帝舊典貢稅多少所由來久矣今猥增之必有怨叛計其所得不償所費帝不從至是蠻果爭貢布非舊約遂殺鄉吏舉種反明年春以李進為武陵太守討平之進簡選良吏撫循蠻夷郡境遂安丁丑二年夏四月地震冬十月帝如長安徵處士法真字髙卿雄之子不至真博通內外學為關西大儒會帝西巡田羽薦之前後四徵終不降屈友人郭正稱之曰法真名可得聞身難得而見可謂百世之師矣十一月京師地震十二月帝還宫戊寅三年春二月京師地震金城隴西山崩夏閠四月京師地震以祝良字邵卿長沙湘人為九真太守張喬南陽人為交趾刺史招降蠻冦嶺外悉平先是象林蠻區姓也豈俱反又烏侯反憐等攻縣寺殺長吏交趾刺史樊演發交趾九真兵萬餘人救之兵士憚逺役反攻其府府雖擊破反者而蠻勢轉盛侍御史賈昌討之嵗餘不克事在二年百官皆議遣大將發荆揚兖豫四萬人赴之李固駁其七不可而請任祝良張喬固曰荆揚盜賊磐結不散長沙桂楊數極徴發如復擾動不可一也兖豫之人逺赴萬里詔書追促必致叛亡不可二也南州溫暑加有瘴氣致死亡者十必四五不可三也逺涉萬里士卒疲勞比至嶺南不堪復鬪不可四也軍行日三十里而兖豫去日南九千餘里三百日乃到計人稟五升用米六十萬斛尚不計將吏驢馬之食致費若此不可五也設使軍致死亡者衆不足禦敵當復更發不可六也九真日南相去千里發其吏氏猶尚不堪何況苦四州之卒赴萬里哉不可七也前中郎將尹就討益州叛羌益州諺曰虜來尚可尹來殺我後就徵還以兵付刺史張喬喬因其將吏日月之間破殄冦虜此發將無益州郡可任之驗也宜更選有勇略仁惠任將帥者以為刺史太守徙日南吏民北依交趾還募蠻夷使自相功轉輸金帛以為其資有能反間致頭首者許以封侯裂土之賞故并州刺史祝良性多勇決張喬前有破虜之功皆可任用四府悉從固議即拜良為九真太守喬為交趾刺史喬至開示慰誘並皆降散良到九真單車入賊中設方略招以威信降者數萬人嶺外復平詔舉武猛任將帥者初左雄薦周舉為尚書至是雄為司𨽻校尉舉馮直故冀州刺史任將帥直嘗坐贓罪舉以此劾雄雄曰進君適所以自伐也舉曰昔趙宣子任韓厥為司馬而厥戮其僕宣子謂諸大夫曰可賀我矣事見晉語今君不以舉之不才誤升諸朝不敢阿君以為君羞不寤君之意與宣子殊也雄悅謝曰是吾過也天下益以此賢之時宦者競賣恩勢惟大長秋良賀春秋鄭穆公子子良後以字為氏清儉退厚無所薦舉帝問其故對曰臣生自草茅長于宫禁既無知人之明又未嘗知交士類昔衛鞅因景監以見有識者知其不終今得臣舉者匪榮伊辱是以不敢冬十二月戊戌朔日食己卯四年春正月中常侍張逵等伏誅梁啇以黃門曹節南陽新野人等用事遣子冀及不疑與交逵等忌其寵反共譖啇及曺騰沛國譙人孟賁圖廢立帝曰必無是但汝曹共妬之耳逵懼矯詔收縳騰賁帝聞震怒收逵等下獄悉伏誅辭所連染延及大臣啇上疏曰春秋之義罪止首惡大獄一起無辜者衆非所以順迎和氣也宜早訖竟以止逮捕之煩帝納之三月京師地震夏四月馬賢擊燒當羌那離等斬之先是鍾羌良封等冦隴西漢陽校尉馬續擊破之事在陽嘉三年時詔拜馬賢為謁者鎮撫諸羌賢復發隴西吏士及羌胡兵擊殺良封又進擊鍾羌且昌等諸種俱詣涼州降事並在陽嘉四年已而燒當那離等冦金城塞賢將兵赴擊斬首四百餘級那離等復西招羌胡殺傷吏民事在永和三年至是賢將湟中義從兵掩擊那離斬之徵賢為𢎞農太守庚辰五年春二月京師地震夏四月南胸奴吾斯車紐左部句龍王名等反詔度遼將軍馬續招降之吾斯車紐等冦西河招誘右賢王合兵圍美稷注見前殺長吏馬續與中郎將梁並烏桓校尉王元發兵掩擊破之帝遣使責讓單于單于本不預謀乃脫帽避帳謝罪中郎將陳龜以單于不能制下迫令自殺降者遂更狐疑龜坐免梁商上表曰馬續素有謨謀典邊日久深曉兵要宜令續深溝髙壘以恩信招降宣示購賞為明約期如此則醜類可服國家無事矣帝乃詔續招降叛虜商又移書與續曰中國安寧忘戰日久交鋒接矢決勝當時戎狄之所長而中國之所短也強弩乘城堅營固守以持其衰中國之所長而戎狄之所短也宜務先所長以觀其變設購聞賞宣示反悔勿貪小功以亂大謀於是右賢王部提鞮等萬三千口皆詣續降是秋九月胸奴吾斯立車紐為單于引烏桓羌胡寇邊冬十二月遣中郎將張耽將兵擊降之五月己丑晦日食辛巳六年春正月馬賢與羌戰敗沒東西羌羌居安定北地上郡西河者為東羌居隴西漢陽金城塞外者為西羌遂大合閏月鞏唐羌冦三輔燒園陵初那離等既平朝廷以來機劉秉為并涼刺史梁商謂之曰戎狄荒忽無常而統領之道亦無常法臨事制宜略依其俗今二君素性疾惡欲分明黑白孔子曰人而不仁疾之已甚亂也况戎狄乎務在防其大故忍其小過機等虐刻多所擾發羌遂復反事在五年帝命馬賢討西羌梁啇以為賢老不如大中大夫宋漢帝不從賢到軍稽留不進馬融時為武都太守上疏曰今雜種諸羌轉相鈔盜宜及其未并亟遣深入破其支黨而賢等處處留滯羌胡百里望塵千里聽聲必侵冦三輔為民大害臣又聞吳起為將暑不張蓋寒不披裘今賢野次垂幕珍肴雜遝兒子侍妾事與古反臣懼其將士將不堪命必有髙克潰叛之變也皇甫規字威明安定朝那人亦見賢不恤軍事審其必敗上書言狀帝皆不從至是果敗賢及二子皆沒封賢孫承光為列侯三月武都太守趙沖擊破鞏唐羌詔沖督河西四郡兵時郡將以皇甫規有兵略乃命為功曹使率甲士八百與羌交戰羌遂退郤規上疏曰羌戎潰叛皆因邊將失于綏御乘常守安則加侵暴茍競小利則致大害微勝則虛張首級軍敗則隱匿不言軍士勞怨困于猾吏進不得快戰以徼功退不能溫飽以全命酋豪泣血驚懼生變是以安不能久叛則經年願假臣屯列坐食之兵五千與趙決共相首尾可不煩方寸之印尺帛之賜髙可滌患下可納降臣不勝至誠沒死自陳帝不能用羌遂冦北地轉冦武威帝以羌冦充斥涼部震恐復徙安定居扶風北地居馮翊命張喬行車騎將軍事將兵屯三輔明年羌降乃罷軍屯秋八月大將軍梁啇卒啇病篤敕冀等曰吾生無以輔益朝廷死何可以耗費帑藏衣衾飯含玉匣珠貝之屬何益朽骨宜皆辭之卒諸子欲從其誨朝廷不聽以梁冀為大將軍不疑冀之弟為河南尹以周舉為諌議大夫初梁啇病篤帝親臨幸問以遺言對曰臣從事中郎周舉清髙忠正可重任也由是用之九月辛亥晦日食冬十一月徙荆州刺史李固為泰山太守荆州盜起彌年不定以李固為刺史固到遣吏勞問境內赦寇盜前釁與之更始于是賊帥自縳歸首固皆原之遣還相招半嵗間餘類悉降固奏南陽太守髙賜等贓穢賜等重賂梁冀冀為之千里移檄而固持之愈急冀遂徙固為泰山太守時太山盜賊屯聚歷年郡兵常千人追討不能制固到悉罷遣歸農但選留任戰者百餘人以恩信招誘之未滿嵗賊皆弭散壬午漢安元年秋八月遣八使分行州郡時盜賊並起殺長吏二千石橫行州郡帝以周舉言遣舉及杜喬字叔榮河丙林慮人周栩馮羡張綱欒巴字叔元魏郡內黃人郭遵劉班分行州郡表賢良顯忠勤其貪汙有罪者刺史二千石驛馬上之墨綬以下輿服志千石六百石墨綬三采便輒收舉喬等受命之郡綱獨埋其車輪于雒陽都亭曰豺狼當道安問狐狸遂劾奏大將軍冀河南尹不疑無君之心十五事京師震悚帝雖知綱言直不能用也他使所劾亦多冀及宦官親黨事皆寢遏侍御史种皓字景伯洛陽人復行按舉乃更考正其罪以李固為將作大匠杜喬奏李固政為天下第一故有是命喬奏梁氏親黨陳留太守梁讓等皆免之以張綱為廣陵太守梁冀恨張綱思有以中傷之時廣陵賊張嬰冦亂揚徐積十餘年乃以綱為廣陵太守綱單車徑詣嬰壘門罷遣吏兵以書喻嬰請與相見嬰出拜謁綱譬之曰前後二千石多肆貪暴故致公等懷憤相聚然為之者非義也今主上仁聖欲以文德服叛不願以刑罰相加故遣太守來誠轉禍為福之時也若聞義不服天子震怒則大兵雲合身首橫分血嗣俱絶二者利害其深計之嬰泣下曰愚民不堪侵枉遂復相聚偷生若魚遊釡中知其不可久且以喘息須臾間耳今聞明府之言乃嬰等更生之辰也明日率所部萬餘人歸降南州晏然綱論功當封冀遏之在郡一嵗卒嬰等五百餘人為之制服送至犍為負土成墳是時二千石長史有能政者雒陽令任峻冀州刺史蘇章膠東相吳祜峻為令能選用人才各盡其用發姦不旋踵民間不畏吏雒陽大治章為冀州刺史有故人為清河太守章行部欲按其姦賊乃請太守為設酒甚歡太守喜曰人皆有一天吾獨有二天章曰今夕蘇儒文與故人飲者私恩也明日冀州刺史案事者公法也遂舉正其罪州境肅然吳枯政從仁簡民不忍欺嗇夫孫性私賦民錢市衣以進其父父得而怒曰有君如是何忍欺之促歸伏罪性慚懼自首具談父言祐曰掾以親故受汙檅之名所謂觀過知仁矣使歸謝其父還以衣遺之字任峻渤海人蘇章字儒文扶風平陵人吳祐季英陳留長垣人癸未二年冬十一月使胸奴中郎將馬實字伯騫扶風茂陵人遣人刺胸奴吾斯斬之元年秋吾斯復反與薁鞬臺耆且渠伯德等掠并州王暢字叔茂龔之子薦實于朝以為中郎將實募人刺殺吾斯送首洛陽明年進擊餘黨烏桓七十餘萬口皆詣實降詔書褒獎賜錢十萬時胸奴兜樓儲先在京師明年遣之歸上親臨軒授璽綬引上殿賜車馬器服金帛甚厚詔太常大鴻臚與諸國侍子于廣陽城門外祖會饗賜作樂角抵百戲立為呼蘭若尸逐就單于地震涼州自九月以來地百八十震山谷坼裂壞敗城寺民壓死者甚衆增孝亷為四科尚書令黃瓊以前左雄所上孝亷之選専用儒學文吏于取士之義猶有所遺乃奏增孝悌及能從政為四科帝從之甲申建康元年春趙沖討羌戰沒先是趙沖為護羌校尉擊燒何羌燒常别種破之于是諸種前後三萬餘户悉降事在漢安元年二年至是沖追叛羌遇伏戰沒而沖前後多所斬獲羌亦由是衰耗封沖子為義陽亭侯明年左馮翊梁並招誘叛羌離湳狐奴等皆降隴右復平夏四月立子炳為皇太子太子居承光宫帝使侍御史种皓監其家中常侍髙梵從中單駕出迎太子時太傅杜喬等疑不欲從而未決皓乃手劍當車曰太子國之儲副今常侍來無詔信何以知非姦邪梵辭屈馳還奏之詔報太子乃得去喬退而歎息愧皓臨事不惑帝亦嘉其持重稱善者良久秋八月掦徐羣盜范容等作亂遣御史中丞馮緄討之帝崩太子炳即位是為沖帝時年二嵗尊皇后曰皇太后太后臨朝以李固為太尉録尚書事九月葬憲陵在雒陽縣東北史臣曰古之人君離幽放而反國祚莫不矯鑑前違審識情偽無忘在外之憂故能中興其業觀夫順朝之政何其效僻之多歟地震詔舉賢良方正之士䇿問之京師及太原雁門地震水涌土裂詔三公特進侯卿校尉舉賢良方正各一人百僚皆上封事皇甫規對曰陛下攝政之初拔用忠貞逺近翕然望見太平而災異不息冦賊縱橫殆以姦臣權重之所致也其常侍尤無狀者宜亟黜遣以答天誡大將軍冀河南尹不疑亦宜增修謙節輔以儒術省去遊娛不急之務割減廬第無益之飾凡諸宿猾酒徒戲客皆宜貶斥以懲不軌冀忿之以規為下第拜郎中託疾免歸冬十一月九江盜馬勉稱帝于當塗注見前勉稱皇帝其黨徐鳳稱無上將軍建年號置百官羣盜發憲陵孝沖皇帝乙酉永嘉元年春正月帝崩太后以揚徐盜賊方盛欲須所徵諸生列侯到乃發喪李固曰帝雖幼小猶天下之父今日崩亡人神感動豈有人子反共掩匿乎秦皇沙邱之謀近日北鄉之事皆天下大忌不可之甚者也太后從之即暮發喪徵清河王蒜孝王慶嗣孫延平之子及渤海王名鴻樂安夷王寵之子考夷王寵之父十乘貞王伉章帝子也伉卒寵嗣封千乘延光中改國樂安卒子鴻嗣鴻生纘即質帝帝既立梁太后始徙封鴻渤海此云渤海者蓋史臣追敘之文子纘至京師大將軍冀白太后迎纘入即位是為孝質帝罷蒜歸國蒜纘皆章帝曾孫蒜父延平亦樂安夷王之子鄧太后以嗣清河蒜為人嚴重有法度公卿皆歸心焉時纘年八嵗李固謂梁冀曰立帝宜擇長年有德任親政事者願將軍審詳大計鑑周霍之立文宣戒鄧閻之利幼弱冀不從與太后定䇿禁中迎纘入南宫即皇帝位蒜罷歸國葬懷陵將卜山陵李固以寇賊軍興費廣帝尚幼小可起陵于憲陵塋內如康陵制度太后從之三月九江都尉滕撫字叔輔北海劇人擊馬勉范容等斬之太后以徐掦盜賊益熾掦州刺史尹耀九江太守鄧顯討賊俱敗沒博求將帥三公舉撫有文武才詔拜九江都尉助馮緄討之廣開賞募錢邑有差遂破斬馬勉及徐鳯范容等拜撫中郎將督徐掦二州事時張嬰復反廣陵厯陽賊茟孟自稱黑帝撫皆破斬之于是東南惌平和厯陽漢縣故城在今江南州詔康陵在恭陵工詔曰殤帝雖不永祚即位踰年君臣禮成安帝承襲統業而前世命恭陵在康陵之上先後相踰失其次序今其正之孝質皇帝丙戌本初元年夏四月詔郡國舉明經詣太學受業者嵗滿課試拜官有差自是公卿皆遣子受業遊學增盛至三萬餘生閠六月梁冀進毒弒帝白太后䇿免太尉固迎蠡吾後漢侯國故城在今直𨽻保定府博野縣侯志章帝曾孫入即位是為孝桓帝太后臨朝帝少而聰慧嘗因朝會目梁冀曰此跋扈將軍也冀深惡之使左右置毒于煮餅以進帝苦煩甚召李固固入前問帝曰食煮餅腹悶得水尚可活冀曰恐吐不可飲水語未絶而崩固伏尸號哭推舉侍醫冀慮其事泄大惡之議立嗣固與司徒胡廣司空趙戒字志伯蜀郡成都人先與冀書曰先世廢立未嘗不詢訪公卿廣求羣議令上應天心下合衆望傳曰以天下與人易為天下得人難至憂至重可不熟慮冀乃召百官入議固廣戒及大鴻臚杜喬皆以為清河王蒜明德著聞又屬最尊親宜立為嗣而中常侍曹滕常謁蒜蒜不為禮由此惡之夜往説冀曰將軍纍世椒房之親秉攝萬幾賔客縱橫多有過差清河嚴明若果立則將軍受禍矣不如立蠡吾侯富貴長可保也章帝生河間王開生平原王翼翼以貶歸河間其父請分蠡吾縣以侯之翼辛子志嗣太后欲以女弟妻志因徵到夏門亭冀然其言明日重會公卿冀意氣凶凶廣戒懾憚曰惟大將軍令獨固喬守本議冀厲聲罷會説太后䇿免固迎蠡吾侯志入南宫即位時年十五太后猶臨朝政大將軍掾朱穆字公叔南陽宛人戒梁冀曰願將軍專心公朝割除私欲廣求賢能斥逺佞惡為皇帝置師傅宜得小心忠厚之士與之參勸講授又薦种皓欒巴等冀不能用秋七月葬靜陵在雒陽縣東南九月追尊河間孝王為孝穆皇蠡吾先侯曰孝崇皇冬十月尊母匽氏匽同偃臯陶之後以姓為氏為博園貴人孝桓皇帝丁亥建和元年春正月辛亥朔日食夏四月京師地震六月以杜喬為太尉自李固之廢中外喪氣羣臣側足而立惟喬正色不撓由是朝野皆倚望焉秋論定䇿功益封梁冀萬三千户又封其子弟及宦者劉廣等皆為列侯杜喬諌曰陛下即位不急忠賢之禮而先左右之封梁氏一門宦者微孽並帶無功之紱裂勞臣之土其為乖濫胡可勝言茍遂斯道豈伊傷政為亂而已喪身亡國可不慎哉書奏不省八月立皇后梁氏初永昌太守劉君世鑄黃金為文蛇以獻梁冀益州刺史种皓紏發其姦冀恨皓因以他事陷之李固上疏伸理太后赦皓免官以金蛇輸官冀從大司農杜喬借觀喬不與冀小女死令公卿會喪喬獨不往冀又屬喬舉汜宫為尚書喬以宫贓罪不用至是立后冀欲以厚禮迎之喬又據舊典不聽由是日忤冀九月京師地震䇿免太尉喬冬十一月貶清河王蒜為尉氏漢縣今屬河南開封府侯徙桂陽蒜自殺後梁冀惡清河名改為甘陵下李固杜喬獄殺之宦者唐衡左悺等共譖杜喬曰陛下前當即位喬與李固抗議言上不堪奉漢宗祀帝亦怨之會劉文甘陵人劉鮪魏郡人謀共立清河王蒜劫其相謝皓殺之蒜坐貶徙桂陽自殺梁冀因誣固喬云與文交通收固下獄門生王調渤海人貫械上書趙承河內人等數十人亦要鐡鑕詣闕通疏太后詔赦之京師市里皆稱萬嵗冀聞之畏固名德終為己害乃更據奏前事長史吳祐爭之不從時馬融為冀作章奏祐謂曰李公之罪成于卿手李公若誅卿何面目視天下人冀怒起入室祐亦徑去固遂死獄中固臨終與胡廣趙戒書曰梁氏逺謬公等曲從漢室衰微從此始矣公等受主厚祿顛而不扶後之良史豈有所私回身已矣于義得矣復何言哉廣戒得書長歎流涕而已冀使人脅杜喬使自引決喬不聽收繫之亦死獄中冀暴固喬尸令有敢臨者加其罪因弟子郭亮年始成童詣闕上書乞收固尸下報與董班俱往臨哭守尸十日不去喬故掾掦匡號泣星行至洛託為夏門亭吏守護尸喪積十二日詣闕上書并乞二公骸骨太后許之匡送喬喪還家葬乞行服遂與亮班皆隱匿終身不仕趙承與固弟子七十二人論固言迹為德行一篇吳祐亦自免歸卒于家郭亮字恆直朗陵人董班字李宛人楊匡字叔康陳留人戊子二年春正月帝冠三月帝從皇太后幸大將軍冀府夏五月丘宫火帝徙居南宫明年三月復還北宫己丑三年夏四月丁卯晦日食六月震顯陵寢屋秋七月亷縣後漢縣故城在今甘肅平涼府原州雨肉續漢志肉似羊肺或如掌五行志法律逐功臣時則有羊禍是時梁冀専權枉誅李固杜喬天下寃之八月有星孛于天市天市垣二十四星在房星東九月地再震山崩前朗陵後漢侯爾故城在今河南汝寧府確山縣侯相荀淑卒淑少博學有髙行李固李膺等皆師宗之安帝時徵拜郎中再遷當塗長後舉賢良光祿勳杜喬少府房植所舉對䇿譏刺貴幸梁冀忌之出為朗陵相涖事明治稱為神君有子八人儉緄靖燾汪爽肅並有名稱時人謂之八龍靖字叔嗣少有俊才弟爽字慈明亦以才顯汝南許章曰慈明外朗叔嗣內潤頴川又為之語曰荀氏八龍慈明年雙陳實嘗詣淑實使于紀將車諶持杖後從孫羣年小載于車中既至淑使靖應門爽行酒餘六龍下食孫彧小坐于膝前是時太史奏五百里賢人聚陳實字仲弓潁川許人紀字元方諶字季方羣字長文荀彧字文若頴隂令苑康字仲直渤海重合人命其里曰髙陽里淑卒年六十七嵗李膺時為尚書自表師喪二縣皆為立祠叔兄子昱為沛相曇為廣陵太守皆正身疾惡志除閹宦昱後共竇武謀誅中官與李膺俱死曇亦禁錮終身昱字伯條曇字元智庚寅和平元年春正月太后歸政二月崩合葬憲陵三月封梁冀妻孫夀為襄城君夀善為妖態夀作愁眉帝粧墮馬髻折腰步齲齒笑冀寵憚之冀愛監奴秦宫出入夀所夀見宫輒屛御者託以言事因與私焉刺史二千石皆謁辭之冀夀對街為宅殫極土木起兔亘數十里移憿調生兔刻毛為職人有犯者罪至死冀用夀言多斥奪諸梁在位者外以示謙讓而孫氏宗親為侍中卿校郡守者十餘人皆貪叨凶淫所在怨毒侍御史朱穆奏記于冀曰將相大臣均體元首豈可去明即昧履危自安宜時易宰守非其人者減省第宅園池之費拒絶郡國諸所奏送內以自明外解人惑則將軍身尊事顯德耀無窮矣冀不納冀雖専朝而猶交結宦官任其子弟以為要職欲以自固穆又奏記極諌冀終不寤冀遣書詣樂安太守陳蕃請託不得通使者詐稱他客蕃笞殺之坐左轉修武令夏五月尊博園匽貴人曰孝崇后辛卯元嘉元年春正月朔尚書張陵字處沖蜀郡成都人劾大將軍冀罪詔以俸贖羣臣朝賀大將軍冀帶劍入省尚書張陵叱出敕羽林虎賁奪劍冀跪謝陵不應即劾奏冀請廷尉論罪有詔以一嵗俸贖百僚肅然河南尹不疑嘗舉陵孝亷謂曰舉君適所以自罪也陵曰明府不以陵不才誤見擢序今申公憲以報私恩不疑有愧色不疑好經書喜待士冀疾之轉為光祿勳不疑自耻兄弟有隙遂辭位歸第興弟蒙閉門自守冀不欲令與賔客交通陰使人變服至門記往來者南郡太守馬融初除過不疑冀諷有司奏融貪濁髠笞徒朔方夏四月帝微行至河南尹梁胤不疑子時年十六府舍是日大風拔樹晝昏尚書楊秉字叔節震中子上疏曰臣聞諸侯如臣之家春秋尚列其誡况以先王法服而私出槃遊降亂尊卑等威無序侍衛守空宫􅌧璽委女妾設有非常之變任章之謀前漢書宣帝時代郡太守任宣坐謀反誅宣子章為公車丞亡在渭城界中夜元服入廟居廊間執戟立於廟門待上至欲為逆發覺伏誅上負先帝下悔靡及帝不納秉以病乞退出為右扶風黃瓊留之拜光祿大夫京師旱任城梁國飢民相食冬十一月地震詔舉獨行之士涿郡崔實字子真一名台字元始駰之孫以獨行舉詣公車稱病不對䇿退而論世事名曰政論其略曰几天下所以不治者常由人主承平日久習亂安危怢不自覩或荒耽嗜欲不恤萬幾或耳蔽針誨厭偽忽真或猶豫岐路莫適所從或見信之佐括囊守祿或疏逺之臣言以賤廢是以王綱縱弛智士鬱伊夫為天下者自非上德嚴之則治寬之則亂何以明其然也近考宣皇帝審于為政之理故嚴刑峻法破姦宄之膽海內肅清天下密如算計見效優于孝文及元帝即位多行寬政卒以墮損威權始奪遂為漢室基禍之主政道得失于司可監蓋為國之法有似治身平則致養疾則攻焉夫刑罰者治亂之藥石也德教者興平之梁肉也以德教除殘是以梁肉治疾也以刑罰治平是以藥石供養也自數世以來政多恩貸馭委其轡馬駘其銜四牡橫奔皇路險傾方將拑勒鞬䩗以救之豈暇嗚和鸞清節奏哉司馬氏光曰漢家之法已嚴矣而實猶病其寬何哉蓋衰世之君率多柔懦凡愚之佐唯知姑息是以權偉之臣有罪不坐豪猾之民犯法不誅仁恩所施止于目前姦宄得志紀綱不立故崔實之論以矯一時之枉非百世之通義也孔子曰政寬則民慢慢則糾之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和斯不易之常道矣詔加大將軍冀殊禮增封四縣賜以甲第帝欲褒崇梁冀使議其禮胡廣等咸稱冀勳德宜比周公錫之山川土田附庸司空黃瓊獨曰可比鄧禹合食四縣於是有司奏冀入朝不趨劍履上殿謁贊不名禮比蕭何增封四縣比鄧禹賞賜金錢奴婢綵帛車馬衣服甲第比霍光每朝會與三公絶席十日一入平尚書事冀猶以所奏禮薄意不恱壬辰二年春正月京師地震夏四月孝崇后匽氏崩合葬博陵帝父蠡吾侯之墓也帝舉哀洛陽西鄉以弟平原王石為喪主王侯以下皆會葬禮儀制度比恭懷皇后是時大將軍梁冀輔政匽氏無在位者秋七月庚辰朔日食冬十月京師地震癸巳永興元年秋七月河溢民飢以朱穆為冀州刺史尋徴下獄輸作左校冀州民飢流亡數十萬户詔以朱穆為刺史令長聞穆濟河解印綬去者四十餘人及到奏劾諸郡貪污者有至自殺或死獄中宦者趙忠喪父歸葬僭為玉匣穆下郡案驗吏發墓剖棺出之帝聞大怒徴穆詣廷尉輸作左校太學生劉陶字子竒穎川定隂人等數千人詣闕上書訟穆曰中官近習竊持國柄手握王爵口含天憲運賞則使餓𨽻富于季孫呼吸則令伊顔化為桀跖而穆獨抗然不顧身害非惡榮而好辱惡生好死也徒感王綱之不振懼天網之久失故竭心懷憂為上深計臣願黥首繫趾代穆校作帝乃赦之陶又上疏稱朱穆李膺履正清平貞髙絶俗斯實中興之良佐國家之柱臣宜還本朝夾輔王室書奏不省甲午二年春二月復聽刺史二千石行三年喪京師地震東海朐山在今江南海州南上有雙峯如削俗呼為馬耳山崩封乳母馬惠子初為列侯秋九月丁卯朔日食冬十一月泰山琅邪盜起時盜賊四起陳留李堅自稱皇帝事在建和元年長平陳景自號黃帝子署置官屬南頓管伯稱真人圗舉兵事俱在建和二年扶風裴優裴氏非子支孫封􅘌鄉因以為氏其後去邑從衣亦稱皇帝事在和平元年俱伏誅至是泰山琅邪賊公孫舉東郭竇等復反叛殺長吏乙未永夀元年春二月司𨽻冀州飢人相食巴郡益州郡山崩秋南胸奴左薁鞬臺耆等反屬國都尉張奂字然明敦煌酒泉人擊破降之南胸奴左鞬臺耆且渠伯德等反東羌復舉種應之安定屬國都尉張奐初到職壁中惟有二百許人聞之即勒兵出軍吏爭止之不聽遂進屯長城收兵遣將王衛招誘東羌使胸奴不得交通東羌諸豪遂相率與奐共擊薁鞬等破之伯德將其衆降羌豪遺奐馬二十匹金鐻八枚奐以酒酬地曰使馬如羊不以入􅕆使金如粟不以入懷悉還之前此八都尉率好資財為羌所苦及奐正身潔巳無不悅服丙申二年秋鮮卑檀石槐寇雲中以李膺為度遼將軍初鮮卑檀石槐勇健有智略部落畏服弛法禁平曲直無敢犯者遂推以為大夫立庭于彈汗山去髙栁注見前北三百餘里東西部大人皆歸焉因南抄緣邉北拒丁零注見前東却夫餘西擊烏孫盡據胸奴故地東西萬四千餘里至是入寇以故烏桓校尉李膺為度遼將軍膺為校尉時鮮卑犯塞膺常蒙矢石每破走之虜甚惲懾膺到邊羌胡望風畏服先所掠男女悉詣塞下還之以韓韶字仲黃潁川舞陽人為嬴漢縣故城在今山東泰安府萊蕪縣長公孫舉等寇青兖徐州討之連年不克尚書選能治劇者以韶為嬴長賊聞其賢相戒不入境流民萬餘户歸縣界韶開倉賑之主者爭不可韶曰長活溝壑之人而以此伏罪含笑入地矣韶與同郡荀淑鍾皓字季明長社人陳實皆嘗為縣長時人謂之潁川四長淑事具前皓少以篤行稱公府辟林慮長不就與荀淑並為士大夫所歸慕李膺嘗歎曰荀君清識難尚鍾君至德可師皓兄子瑾好學慕古有退讓風與膺俱有聲名瑾母膺之姑也應祖太尉修嘗言瑾邦有道不廢邦無道免于刑戮復以膺妹妻之膺謂瑾曰弟何太無皂白瑾以白皓皓曰昔國武子好招人過以致怨本保身全家爾道為貴實為太邱漢縣故城在今河南歸德府永城縣長修德清靜百姓以安本司官行部吏慮有訟者白欲禁之實曰訟以求直禁之理將何申其勿有所拘人亦竟無訟者以沛相賦斂違法乃解印綬去吏民追思之遣中郎將假熲字紀明武威祐臧人擊泰山琅邪羣盜平之帝以東方盜賊昌熾命公卿選將帥有文武才者司徒尹頌字公孫鞏人薦議郎假熲乃拜中郎將擊公孫舉東郭竇等大破斬之餘黨皆散冬十二月京師地震丁酉三年夏四月九真蠻夷反討破之居風漢縣屬九真郡人朱逹誘蠻夷反太守兒式討之戰歿遣九真都尉魏朗子少英會稽上虞人擊破之後延熹三年餘冦後反詔以夏方為文州刺史方威惠素著賊相率降夏方九江人閏月庚辰晦日食京師蝗或言民貧宜鑄大錢事下四府羣僚及太學能言之士議之劉陶曰當今之憂不在于貨在乎民飢蓋民可百年無貨不可一朝有飢議者不逹農殖之本多言鑄冶之便雖以隂陽為炭萬物為銅猶不能足無厭之求也夫欲民殷財阜要在止役禁奪則百姓不勞而足今地廣而不得耕民衆而無所食羣小競怨吞噬無厭誠恐卒有役夫窮匠投斤逺呼使愁怨之民響應雲合雖方尺之錢何能救其危也遂不改錢戊戌延熹元年夏五月甲戌晦日食太史令陳授陳日食之變咎在梁冀冀收考授死于獄中帝由是怒冀京師蝗秋七月雲陽地裂冬十二月南胸奴烏桓鮮卑入寇以陳龜為度遼將軍除并涼一年租賦龜臨行上疏曰臣聞三辰不軌擢士為相蠻夷不恭拔卒為將臣無文武之才而忝鷹揚之任雖歿軀體無所云補西州地瘠民貧數更寇虜屢被災荒雖含生氣實同枯朽陛下以百姓為子焉可不垂撫循之恩哉牧守不良招致災害胡虜凶悍因衰緣隙而將帥不忠聚姦玩寇使倉庫單竭功業無效宜改任收守去斥姦殘更選將校簡練文武除并涼今年祖更更謂卒更錢也漢律更有三品曰卒更曰踐更曰過更寬赦罪𨽻掃除更始則善吏知奉公之祜惡者覺營私之禍胡馬可不窺長城塞下無候望之患矣帝乃更選幽并刺史太守下詔除并涼一年租賦龜到職州郡震栗省息經用嵗以億計後梁冀暴虐日甚冀與龜素有隙徴還龜上疏請誅冀不省遂不食而卒以張奐為北中郎將胸奴烏桓燒軍門屯赤坑煙火相望兵衆大恐奐安坐帷中講誦自若潛誘烏桓使斬胸奴屠各胸奴别種名渠帥襲破其衆諸胡悉降以种皓為度遼將軍皓到營所先宣恩信不服然後加討羌虜質郡縣者悉遣還之誠心懷撫信賞分明由是羌胡皆來順服乃去烽燧除候望邉方晏然己亥二年春三月復斷刺史二千石行三年喪秋七月皇后梁氏崩梁氏恃姊兄勢奢靡妬忌寵衰無子宫人孕育鮮得全者帝益疏之憂恚而崩葬懿陵後梁冀廢懿陵為貴人冢八月大將軍梁冀伏誅太尉胡廣司徒韓縯司空孫朗皆以罪免為庶人梁氏七侯三后六貴人三大將軍卿將尹校五十七人冀専擅威柄凶恣日積宫衛近侍並樹所親禁省起居纎微必知四方貢獻皆先輸上第於冀乘輿乃其次焉百官遷召皆先到門謝恩然後敢詣尚書吳樹為宛令之官辭冀冀以賓客為託樹曰小人姦蠧比屋可誅明將軍處上將之位宜崇賢善以補朝闕而多託匪人非樹所敢聞也到縣遂誅冀客數十人後還謁冀冀鴆之出死車上又遼東太守侯猛初拜不謁冀託以他事要斬之郎中袁著年十九詣闕上書曰臣聞四時之運成功則退髙爵厚寵鮮不至災今大將軍位極功成宜遵懸車之禮若不抑損權盛將無以全其身矣冀聞而密遣掩捕笞殺之太原郝潔胡武與著反善冀遂誅武家死者六十餘人潔知不免仰藥而死帝嫡母耿貴人薨冀從貴人從子承求珍玩不得怒族其家崔琦作外戚針以諷冀殺之冀威行內外百僚莫敢違命帝頗不平鄧香和熹皇后從兄子妻宣生女猛香卒宣更適孫夀舅梁紀夀引其女猛入掖庭為貴人冀欲認猛為己女時猛姊壻邴尊為議郎冀恐尊沮宣乃使刺客殺尊而又欲殺宣遣客登屋宣家覺之馳入白帝帝大怒遂與中常侍單超河南人具漢紀作貝瑗元城人唐衡潁川郡人左悺平隂人徐璜下邳良城人等成謀誅冀冀疑之乃使黃門張惲入宿以防變瑗收惲請帝詣前殿使尚書令尹勳字伯元河南鞏人持節勒丞郎以下皆操兵守省閣斂請符節送省中使瑗將廄騶虎賁羽林都候劒戟士合千餘人與司𨽻張彪共圍冀第收大將軍印綬冀夀皆自殺收梁氏孫氏無長少皆棄市胡廣韓縯孫朗皆坐阿附減死免為庶人故吏賔客免黜者三百餘人朝廷為空百姓稱慶收冀財貨合三千餘萬萬以充王府用減天下租稅之半散其園囿以業窮民立貴人鄧氏為皇后即猛也封宦者單超等五人為列侯超及徐璜具瑗左悺唐衡五人同日受封故世謂之五侯以黃瓊為太尉時新誅梁冀天下想望異政瓊首居公位乃舉奏州郡貪汚死徙十餘人辟汝南范滂字孟博征羌人滂少厲清節嘗為清詔使按察冀州登車攬轡慨然有澄清天下之志守令贓汚者皆望風解印綬去及為太尉掾時詔三府掾屬舉謡言漢官儀曰三公聼採長吏臧否人所疾苦還條奏之是謂舉謡言也奏權豪之黨二十餘人深為民害者徵處士徐稚字孺子豫章南昌人薑肱字伯淮彭城廣戚人韋著字休明扶風平陵人袁閎字夏甫安九孫李曇字雲潁川陽翟人皆不至尚書令陳蕃薦五處士以安車元纁徴之不至稚家貧常自耕稼非其力不食恭儉義讓所居服其德屢辟不起蕃為太守以禮請署功曹稚既謁而退蕃性方峻不接賔客稚來特設一榻去則懸之後舉有道家拜太原太守皆不就肱與二弟仲海季江俱以孝友聞同被而寢嘗詣郡縣遇盜欲殺之肱曰弟年幼父母所憐又未聘娶願殺身濟弟季江曰兄年德在前家之珍寶國之英俊乞自受戮以代兄命盜兩釋焉至郡中見肱無衣服怪問其故肱托以他辭終不言盜盜聞而感悟就肱叩頭謝罪還所掠物肱不受勞以酒食而遣之舉有道方正皆不就著隱居講授不修世務閎家世貴盛苦身守節以耕學為業曇少喪父繼母酷烈事之彌謹身耕農以奉供養得四時珍味必先以進母鄉里宗其孝行帝又徵安陽魏桓其鄉人勸之行桓曰夫干録求進所以行其志也今後宫千數其可捐乎廄馬萬匹其可減乎左右權豪其可去乎皆對曰不可桓慨然歎曰使桓生行死歸于諸子何有哉遂隱身不出封皇后兄子鄧康宦者侯覽山陽防東人等為列侯殺白馬漢縣故城在今河南衛輝府縣令李雲字行祖甘陵人𢎞農掾杜衆袁紀李雲下獄事在三年范書在二年綱目因之今依綱目帝既誅梁冀故舊恩私多受封爵封后親屬皆為列侯侯覽上縑五千匹賜爵關內侯又託以與誅梁冀功進封髙鄉侯又封小黃門劉普趙忠安平人等八人為鄉侯自是權勢全歸宦官五侯尤貪縱傾動內外白馬令李雲露布上書移副三府曰梁冀雖恃權専擅今以罪行誅猶召家臣扼殺之耳而猥封謀臣萬户以上西北列將得無解體帝者諦也今官位錯亂小人諂進財貨公行政化日損是帝欲不諦乎帝震怒逮雲送獄使中常侍管霸考之𢎞農掾杜衆傷雲以忠諌獲罪上書願與雲同死帝愈怒并下獄大鴻臚陳蕃太常楊秉洛陽市長沭茂郎中上官資並上疏請皆坐免黜秉免歸田里茂資貶秩二等管霸亦言雲衆狂戅不足加罪帝曰帝欲不諦是何等語而常侍欲原之耶遂皆死獄中後黃瓊上疏曰陛下即位以來未有勝政諸梁秉權豎宦充朝李固杜喬既以忠言橫見殘滅而李雲杜衆復以直道受誅海內傷懼以忠為諱尚書周永素與梁冀共搆姦臨冀當誅乃陽毁示忠以要爵賞復與忠臣並時顯封四方聞之莫不憤歎書奏不者冬十月以宦者單超為車騎將軍以陳蕃為光祿勳時封賞踰制內寵猥盛蕃上疏曰夫諸侯上象四七謂二十八宿藩屏上國而左右以無功博賞至乃一門之內侯者數人故緯象失度隂陽謬序又比年收斂十傷五六人不聊生而采女數千食肉衣綺脂油粉黛不可資計且聚而不御必生憂悲之感以致水旱之困帝頗采其言為出宫女五百餘人封侯者降為鄉侯以楊秉為河南尹尋坐論作左校單超兄子匡為濟隂太守負勢貪放兖州刺史第五種字興先倫之曾孫使從事衛羽案之得贓五六千萬奏并劾超匡賂客任方刺羽羽覺之捕繫洛陽匡密令突獄亡走尚書詰秉對曰方等無罪釁由單匡乞檻車徴匡考核其事則姦慝蹤緒必可立得秉竟坐論作左校種亦以他罪徙朔方後種以久旱赦出皇甫規等松之冉徵乃到拜太常以爰延字季平陳留外黃人為五官中郎將帝問侍中爰延朕何如主對曰陛下為漢中主帝曰何以言之對曰尚書令陳蕃任事則治中常侍黃門與政則亂是以知陛下可以為善可以為非帝曰敬聞闕矣拜五官中郎將會客星經帝座帝密以問延延曰天子動靜以禮則星辰順序意有邪辟則晷度錯違陛下以河南尹鄧萬世有龍潛之舊封侯引見與之對博上下媟黷有虧尊嚴夫善人同處則日聞嘉訓惡人從遊則日生邪情惟陛下逺讒佞之臣納蹇蹇之士則災變可除矣帝不能用延稱疾免歸御批歷代通鑑輯覽卷二十四

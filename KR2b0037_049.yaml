front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷五十唐起高祖武德元年戊寅至昭宣帝天祐四年丁卯凡二十帝十六世內附武后二十一年共二百九十年唐祖神堯皇帝
  hash: sha256:2fab2e3d8fd7fb48e5f10fbe39cd2615af361dd8922e60a2991c348645a35027

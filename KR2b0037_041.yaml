body:
  text: 魏清河王懌美風儀胡太后逼而幸之然素有才能輔政多所匡益好學禮士時望甚重侍中元乂恃寵驕恣懌每裁之以法衛將軍劉騰權傾內外吏部用其弟為郡懌抑而不奏乂騰皆怨之乃使主食胡定自列云懌貨定使毒魏主魏主時年十一信之乂奉魏主御顯陽殿騰閉永巷門太后不得出懌入乂命宗士執之騰以詔集公卿論懌大逆遂殺懌復詐為太后詔自稱有疾還政魏主幽太后於北宫魏主亦不得省見裁聼傳食而已太后不免饑寒乃嘆曰養虎得噬我之謂矣乂與驣表裏擅權乂為外禦騰為內防常直禁省威振內外先是公卿議懌時衆畏乂騰無敢異者唯僕射新泰公遊肇抗言以為不可終不下署及懌被殺肇憤悒而卒朝野皆為喪氣梁江淮海溢魏相州刺史中山王熙字貞興英之子起兵討元乂不克而死弟略字俊興奔梁梁以為中山王熙與弟略給事黃門侍郎纂字紹興司徒祭酒皆為清河王懌所厚聞懌死起兵于鄴表請誅元乂劉騰長史桞元章等執之元乂遣使斬之於鄴熙首至洛陽親故莫敢視前驍騎將軍刁整獨收而藏之壅刁整字景智之孫略亡與故人司馬始賔河內人依西河太守刁雙字子山雍族孫雙匿之經年時購略甚急略懼雙曰會有一死所難遇者為知己死耳願不以為慮略固求南奔雙乃使從子昌送略渡江梁主封略為中山王梁車騎將軍永昌晋縣隋省故城在今湖南水州府祁陽縣侯韋睿卒諡曰嚴時梁主方崇釋氏士民無不從風而靡獨睿自以位居大臣不欲與俗俯仰所行略如平日至是卒冬十一月魏立阿那瓌伏跋可汗之弟為蠕蠕王先是柔然殺伏跋可汗其弟阿那瓌立伏跋忽亡其幼子祖惠有巫地萬言祖惠今在天上我能呼之乃於大澤中施帳幄祀天神祖惠忽在帳中自云恆在天上伏跋大喜號地萬為聖女納為可賀敦信用其言干亂國政祖惠浸長語其母曰我常在地萬家上天者地萬教我也其母以告伏跋不信既而地萬譖祖惠殺之伏跋母侯吕陵氏遣其大臣具列等殺地萬升殺伏跋立阿那瓌為可汗阿那瓌立十日其族兄示發擊之阿瓌戰敗奔魏示發殺侯吕陵氏至是魏主使京兆王繼侍中崔迎之賜勞甚厚引見置宴立為朔方公蠕蠕王時魏方强盛于洛水橋南御道東作金陵燕然扶桑崦嵫四館道西立歸正歸德慕化慕義四里以處四方降者及阿那瓌入朝以燕然館處之阿那瓌屢求反國朝議異同不决以金百斤賂元乂遂聽北歸魏遣使如梁梁魏始復通好辛梁普通二年丑魏正光二年春正月梁置孤獨園置於建康以收養窮民二月魏元乂殺將軍奚康生以宦者劉騰為司空京兆王繼繼以江陽王徙封京兆為太保崔光為司徒魏胡太后之幽北宫也右衛將軍奚康生預其謀元乂劉騰深相委託三人常俱宿禁中康生性粗武乂稍憚之康生亦微懼不安及是魏主朝太后於西林園文武侍座酒酣迭舞康生乃為力士舞每顧視太后舉手蹈足為執殺之勢太后解其意會曰暮太后欲留魏主宿宣光殿在宮北既入閣康生乘酒勢將出處分元又執而殺之光祿勳賈粲紿大后下殿閉之遂擕魏主還南宮以劉騰為司空八座九卿常旦造騰宅參其顔色然後赴省府公私屬請唯視貨多少刻剝六鎮歲入以巨萬萬計逺近若之京兆王繼自以父子權位太盛請以司徒讓崔光故有是授魏宦者為三公自劉騰始未幾騰死秋七月梁以裴邃為豫州刺史梁義州胡三省注此義州在齊安郡木蘭縣界木蘭故城在今黃州府黃安縣刺史文僧明以州降魏魏軍來援梁以裴邃為信武將軍假節督衆軍往討邃深入魏境魏所署義州刺史封夀據檀公峴水經决水出雲婁縣大别山酈注俗謂之檀公峴雲婁故城在今河南光州商城縣邃擊破之遂圍其城夀請降復取義州魏遣張普惠救之不及梁乃以邃為豫州刺史鎮合肥邃欲襲夀陽隂結夀陽民為內應恐魏覺之先移魏揚州云聞欲修白捺故城稍相侵逼此亦須營歐陽護交境之備魏揚州刺史長孫雅謀于僚佐録事參軍楊侃曰白捺小城本非形勝邃好狡數今集兵遣移恐有他意雅乃命侃報移曰彼之纂兵想别有意何為妄搆白捺他人有心豫忖度之勿謂秦無人也邃得移以為魏人已覺即散其兵史白捺故城在今鳳陽府故馬頭戍東北長孫稚北作幼孝文帝賜名字承業道生之曽孫楊侃字士業播之子冬十月魏分柔然為二國先是魏遣兵送阿那瓌返國會柔然已立婆羅門為可汗阿那瓌之南奔也其從父兄婆羅門討示發破之國人遂推婆羅門為彌偶可社句可汗魏遣使者諜云具仁魏內入諸姓有諜云氏具仁其名也往諭之婆羅門遣其大臣以兵二千迎阿那瓌阿那瓌懼不敢進請還洛陽至是高車王伊匐擊婆羅門大破之婆羅門帥十部落詣凉州請降于魏柔然餘衆相帥迎阿那瓌阿那瓌乞兵送還詔中書門下博議凉州刺史袁翻字景翔陳郡項人以為蠕蠕二主宜並存之居阿那瓌于東處婆羅門於西分其降民各有攸屬此安邉保塞之長計也朝議是之乃置阿那瓌於吐若奚泉胡三省注泉在懷朔鎮北無極山下婆羅門於故西海郡胡三省注此西海非王莽所置郡後漢興平中武威太守張稚請置四海郡于居延蓋即此居延注見前明年冬婆羅門叛魏魏討而執之婆羅門亡歸嚈噠魏平西長史費穆討之簡精騎伏山谷以步兵之嬴者為外營婆羅門至奮擊破之婆羅門為凉州軍之所擒後卒于洛陽嚈噠國名本大月氐種在于闐西其後音訛為悒怛國費穆魏西方費連氏後改為費氏穆字朗興代人又明年春柔然饑魏遣使撫之阿那瓌執魏使者犯魏邊魏遣尚書令李崇僕射元纂者擊之不及而還阿那瓌以其國大饑帥衆入魏境求賑給魏以左丞元孚為行臺持節撫之阿那瓌衆號三十萬隂有異志遂拘留孚引兵而南所過剽掠至平城乃聽孚還有司奏孚辱命抵罪遣李之崇元纂帥騎十萬討阿那瓌阿那瓌驅民北遁崇追三千餘里不及而還纂遣參軍于謹追至郁對原前後十七戰屢破之元孚字秀和臨淮王談之孫于謹字思敬栗磾六世孫郁對原在今歸化城西壬梁普通三年寅魏正光三年夏五月壬辰日食既冬十一月魏行正光歷以壬子為元應魏之水德命曰正光歷行之梁西豐晉縣隨省故城在今江西府州府臨州縣侯正德奔魏既而逃歸初梁主養臨川王宏之子正德為子及太子統生正德還本賜爵西豐侯怏怏不滿意常蓄異謀是歲奔魏魏人待之甚薄正德逃歸梁主泣而誨之復其封爵癸梁普通四年卯魏正光四年夏四月魏沃野鎮注見前民破六韓拔陵南單于之苖裔其先曰潘六奚子孫遂以為氏後音訛為破六韓又曰破洛汗反劉友益曰元魏之亂始此元乂始執政矯情自飾時事得失頗以關懷既得志遂矯愎貪吝嗜酒好色與奪任情紀綱壞亂父京兆王繼尤貪縱受賂遺請囑有司無敢違者牧令守長率皆貪汚由是百姓困窮人人思亂沃野鎮民破六韓拔陵遂聚衆反攻殺鎮將華夷響應拔陵南侵遣别帥衛可孤攻圍武川魏六鎮從西之第三鎮在今歸化城北懷朔注見前六鎮懷朔最西二鎮尖山魏縣屬神武郡故城在今山西寧武府神池縣賀拔度拔魏內八諸姓有賀拔氏與魏同出隂山及其三子允字可泥立字破胡嶽字可斗泥皆有材勇懷朔鎮將楊鈞擢度拔為統軍三子為軍主以拒之冬魏司徒崔光卒光以舊德于忠元乂用事皆尊敬之事多咨決而不能救裴郭清河之死事俱見前時人比之張禹胡廣光且死薦都官尚書賈思伯字仕休齊郡益都人為侍講魏主從思伯受春秋思伯雖貴傾身下士或問思伯公何以能不驕思伯曰衰至便驕何常之有當時以為雅談十一月癸未朔日食十二月梁鑄鐡錢梁初惟揚荆郢江湘梁益用錢交廣用金銀餘州雜以穀帛交易後鑄五銖錢而民間私用古錢禁之不能止乃議罷銅錢鑄鐡錢甲梁普通五年辰魏正光五年春三月魏遣臨淮王彧字文若太武帝元孫討破六韓拔陵夏五月彧兵敗績復遣都督李崇討之魏以臨淮王彧都督諸軍討破六韓拔陵衛可孤攻懷朔鎮經年外援不至楊鈞使賀拔勝詣彧告急勝募敢死少年十餘騎夜伺隙潰圍出見彧說之曰懷朔一陷武川亦危雖有良平不能為計矣彧許為出師勝還復突圍而入未幾武川陷懷朔亦潰勝父子俱為可孤所俘五月彧與拔陵戰于五原注見前兵敗賊勢曰甚魏主引羣臣問計尚書元修義字壽安汝隂王天賜子請遣重臣督軍鎮恆朔以捍寇乃加李崇使持節北討大都督命將軍崔暹字季倫挺族孫廣陽王深魏書作淵字智逺太武帝曽孫皆受節度既而崔暹與拔陵戰于白道在今歸化城北水經注芒干水西南徑白道南谷口即此大敗拔陵并力攻李崇崇不能禦引還雲中詔徵崔暹繫廷尉暹賂元乂卒得不坐已而季崇引祖瑩為長史廣陽王深奏瑩詐增首級盜沒軍資瑩坐除名崇亦免官微還祖瑩字元珍范陽道人六月魏秦州莫折大提莫折關西復姓大提其名也反陷高平大提死子念生代領其衆魏秦州刺史李彥殘虐城內薛珍等執而殺之推其黨莫折大提為秦王南秦州魏置治洛谷故城在今階州成縣人亦殺刺史崔遊以城應大提大提遣其黨襲高平克之殺鎮將行臺大提尋卒子念生自稱天子改元天建魏以雍州刺史元志字猛略河間公齊之孫為征西都督討之念生遣其弟天生將兵下隴志與戰兵敗退保岐州已城陷志被殺魏自破六韓拔陵反冦盜蜂起髙平敕勒部長胡琛反自稱髙平王魏將盧祖遷擊破之琛北走復冦豳夏等州凉州幢帥于菩提反執刺史宋頴頴密求救于吐谷渾伏連籌將兵討平之營州民就德興反自稱燕王黃門侍郎盧同持節慰諭之德興降而復叛朔方蕃反圍夏州刺史源子雍轉戰九旬始平之又汾州諸部亦反邊鎮騷然迄無寧土就德興魏西方諸姓莬賴氏後改為就氏源子雍字靈和懷之子秋八月魏改鎮為州初李崇北征柔然事見前長史魏蘭根字惠卿巨鹿下曲陽人說崇請改鎮為州蘭根曰昔緣邊初置諸鎮地廣人稀或徵發中原強宗子弟或國之肺腑寄以爪牙中年以來有司乖實號曰府户役用厮養官婚班齒致失清流而本宗舊類各居榮顯顧瞻彼此理當憤怨宜改鎮為州分置郡縣凡是府户悉免為民入仕次第悉凖其舊文武兼用威恩並施國家庶無北顧之慮崇為之奏聞事寢不報及破六韓拔陵反臨淮王彧戰敗魏主謂崇前奏聞鎮户非冀之心致有今日之患特以崇貴戚重望故復用之既而崔暹又敗廣陽王深復申崇說深上言自定鼎伊洛邉任益輕唯庇滯凡才乃出為鎮將轉相模習專事聚斂或諸方姦吏犯罪配邉為之指蹤政以賄立邉人無不切齒及阿那瓌背恩縱掠發奔命追之十五萬衆不日而還邉人見之遂輕中國李崇求改鎮為州都亦先覺朝廷未許而拔陵為亂此假之舉指望銷平而崔暹隻輪不反將士之情莫不解體今日所慮非止西北將恐諸鎮等亦如此天下之事何可易量書奏不省至是東西敕勒部皆叛附于拔陵魏主始思崇深之言詔諸州鎮軍貫籍也非有罪配𨽻者皆免為民改鎮為州以酈道元字善長範之子為大使撫慰六鎮時六鎮已盡叛道元不果行魏秀容有二一為北秀容亦曰梁郡城在今山西朔平府朔州寰宇記梁郡城北接朔州即爾朱氏所封是也一為南秀容今名秀容都在太原府嵐縣南水經注秀容護軍治去汾水六十里是也人乞伏莫于反部長爾朱榮字天寶北秀容人羽健之元孫羽健封秀容川事具前討平之榮御衆嚴整以討賊功進封博陵郡公時四方兵起榮隂散其畜牧資財榮父新興畜牧蓄息牛羊馬駝色别為羣彌漫山谷魏每出師新興輒獻馬及資糧以助軍及是榮悉散之招合驍勇結內豪傑于是侯景司馬子如賈顯度顯智之兄假榮字子荗姑城武威人竇泰字世寧太安桿殊人皆往依之爾朱榮事始此冬十月梁取魏建陵漢侯國後魏為縣周廢故城在今海州沐陽縣建陵山下曲木當作曲沭戍名在建陵山西水經注魏正光中立大堨遏沭水西流置城防之曰曲沐戌琅邪等城先是梁徐州刺史成景俊字超范陽人拔魏睢陵漢縣齊廢故城在今徐州府睢寧縣北兖州刺史趙景悅圍荆山城名在今鳳陽府懷逺縣北豫州刺史督征討諸軍事裴邃帥騎襲夀陽克其外郭魏揚州刺史長生稚禦之一日九戰梁後軍不至邃引兵還及是邃攻建陵城克之拔曲木將軍彭寶孫拔琅邪邃復拔狄城亦名狄邱城在鳳陽府夀州南甓城在今頴州府霍邱縣東進屯黎漿亭名在夀州東南水經注芍陵水東徑黎漿亭南即此魏東海太守以司吾城漢縣宋省故城在今徐州府宿遷縣降將軍曹世宗拔曲陽漢侯國後漢曰西曲陽晉省故城在今鳳陽府鳳臺縣秦墟戍名在鳳臺縣水經注洛水徑曲陽故城北厯秦墟即此魏守將多棄城走十二月梁復取三關注見前圍魏郢州注亦見前不克梁將軍李國興等攻魏義陽三關皆克之國興進圍郢州近百日魏援軍至國興引還明年春正月梁取魏南鄉郡及馬圈等城俱南鄉馬圈注見前梁以散騎常侍朱异字彥和錢塘人掌機政劉友益曰梁之禍自朱异始故志之梁太子詹事周捨坐事免朱异代掌機密异多藝能精力敏贍梁主任之乙梁普通六年己魏孝昌元年春正月魏徐州刺史元法僧反魏發兵討之遂降梁法僧素附元乂見乂驕恣恐禍及己將謀為逆魏遣中書舍人張文伯至彭城法僧曰吾欲與卿去危從安能從我乎文伯曰我寧死見文陵孝文帝陵松柏安能去忠義而從叛逆乎法僧殺之遂殺行臺高諒稱帝改元魏發兵擊之法僧遣其子景仲降梁安東長史元顯和與法僧戰被擒法僧執其手慰論之顯和曰與翁皆出皇家一朝以地外叛獨不畏良史乎我寧為忠鬼不能為叛臣法僧殺之帝元顯和麗之子景穆曽孫梁以元略為大都督與將軍陳慶之字子雲義興國小人等將兵應接魏安樂王鑒字長文文成帝曾孫擊元略于彭城南略大敗鑒不設備法僧出擊大破之梁以法僧為司空封始安郡公法僧至建康梁主寵待甚厚元略惡其為人與之言未嘗笑魏行臺蕭寶寅都督崔延伯討莫折天生敗之岐雍隴東皆平先是魏以元修義為西道行臺督諸軍討莫折念生既而修義得風疾乃以蕭寶寅代之至是莫折天生軍于黑水郎古芒水在西安府盩厔縣東南水經注芒水出南山芒谷入于渭長安志芒谷亦名黑水谷其水黑色故名兵勢甚盛魏以崔延伯為西道都督與寶寅俱軍于馬嵬坡名在西安府興平縣西今鎮延伯驍勇寶寅趣之使戰延伯乃選精兵數千西渡黑水揚威脅之徐引兵還天生見延伯衆少開營逐之蹙延伯于水次寶寅望之失色延伯自為後殿不與之戰使其衆先渡部伍嚴整天生兵不敢擊寶寅喜曰崔君之勇關張不如延伯曰此賊非老奴敵也明公但安坐觀老奴破之明日延伯勒兵出戰身先士卒陷其前鋒將士盡鋭競進大破之俘斬十餘萬追奔及小隴郎隴山元和志小隴山在清水縣一名隴底亦曰分水嶺其大隴山在隴城縣東隴城故城在今秦州清水縣東北岐雍及隴東皆平將士稽留採掠天生遂塞隴道由是諸軍不能前進寶寅破苑川俘其民以美女十人賞岐州刺史魏蘭根辭曰縣介彊冦不能自立故附從以救死官軍之至宜矜而撫之奈何助賊為虐乎悉求其父兄而歸之苑川姚秦縣故城今在鳳翔府寶雞縣東非隴西之苑川也梁裴邃敗魏師於夀陽梁裴邃拔魏新蔡郡本漢縣晉置郡隋以後仍為縣今屬河南汝寧府梁主招西昌侯淵藻將衆前驅豫章王綜字世謙武帝第二子與諸將繼進邃拔鄭城在今頴州府頴上縣南舊唐書地理志頴上縣舊治鄭城武德四年移今理王幼學馮智舒俱以為開封之鄭州考鄭州置于後周魏時尚未有州之名集覽質實俱誤汝潁之間所在響應魏河間王琛等憚邃威名軍于城父注見前纍月不進魏主遣使賫齊庫刀胡三省注千牛刀也示以逗留即將斬之趣之琛至夀陽引兵出擊邃為四甄軍號也以待之使將軍李祖憐先挑戰而僞退琛等悉衆追之四甄競發魏師大敗斬首萬餘級琛走入城不敢復出邃深沉有思略為政寬明將吏愛而憚之未幾卒以夏侯亶代之夏侯亶字世龍詳之子二月魏元乂解領軍魏劉騰既死胡太后及魏主左右防衛微緩元乂亦自寬時出遊不返太后對魏主謂羣臣曰今隔絶我母子不聽往來我當出家修道于閒居寺耳因自欲下髮魏主及羣臣涕泣固請太后聲色愈厲魏主乃宿于嘉福殿積數日遂與太后密謀黜乂魏主深匿形迹乂殊不以為疑丞相高陽王雍雖位居乂上而深畏憚之㑹太后與魏主遊洛水雍邀二宫幸其第相與定圖乂之計于是太后謂乂曰元郎若忠于朝廷何故不去領軍以餘官輔政乂甚懼免冠求解領軍許之夏四月魏太后復臨朝誅其尚書令元乂以元順字子和任城王澄之子為侍中鄭儼字季然羲之兄孫徐紇字武伯樂安博昌人李神軌崇之子為中書舍人元乂雖解兵權猶總內外魏主以潘嬪之訴潘嬪有寵于魏主宦官張景嵩說之云乂欲害嬪嬪泣訴于魏主曰又非獨欲殺妾又將不利于陛下魏主信之因乂出宿解乂侍中明旦乂將入宫門者不納太后遂復臨朝攝政詔削劉騰官爵除乂名為民清河國郎中韓子熙上書為清河王懌訟寃乞誅乂等太后命發劉騰墓散其骨盡殺其養子侯剛亦坐黜死于家唯乂以太后妹夫故未忍誅韓子熙字元雍麒麟之孫也先是黃門侍郎元順以剛直忤乂出為齊州魏置今山東濟南府是刺史太后徴還為侍中侍坐于太后乂妻在太后側順指曰陛下奈何以一妹之故不正元乂之罪使天下不得伸其怨憤太后默然未幾有告乂謀誘六鎮降户將反於定州今直𨽻定州本魏置魏主亦以為言乃賜乂死江陽王繼廢於家以病卒初鄭儼為胡國珍參軍得幸於太后徐紇諂事清河王懌為懌所厚李神軌亦得幸於太后皆拜中中舍人鄭儼以徐紇有智數仗為謀主訖以儼有內寵傾身承接共相表裏勢傾內外號為徐鄭儼纍遷至中書令紇纍遷至給事黃門侍郎仍領舍人總攝中書門下之事軍國詔令莫不由之紇粗有文學機辨彊力終日治事略無休息時有急詔造次俱成不失事理然無經國大體見人矯為恭謹逺近輻輳之胡琛遣其將万俟音墨其魏十姓之一醜奴冦魏涇州魏置今屬甘肅平凉府崔延伯敗死胡琛據髙平遣万俟醜奴冦涇州魏將軍盧祖遷討之不克蕭寶寅崔延伯既破莫折天生引兵㑹祖遷等于安定漢縣屬安定郡故城在今涇州醜奴以輕騎挑戰延伯恃勇擊之大敗寶寅退保安定延伯耻其敗獨出襲賊中流矢卒于是賊勢益盛而羣臣自外來者皆言賊弱以求悅媚將帥求益兵者往往不與六月梁豫章王綜叛降魏魏師入彭城立綜為丹陽王更名贊初梁主納齊東昏侯寵姬吳淑媛七月而生綜宫中多疑之淑媛寵衰怨望謂綜曰汝七月生兒安得比諸皇子然汝太子次弟幸保富貴勿泄也因相抱而泣綜由是自疑每夜于靜室私祭齊氏七廟聞俗說割血瀝骨滲則為父子遂潛發東昏侯冢并自殺一男試之皆驗于是常懷異志屢求邊任梁主未之許會魏元法僧降梁主命綜總督諸軍攝徐州事魏臨淮王彧兵逼彭城勝負久未决梁主慮綜敗沒敕引軍還綜恐不復得至北邊乃密送降欵於彧夜投彧軍及旦齊閣不開魏軍呼曰豫章王昨夜已來在我軍中汝等尚欲何為城中求王不獲軍遂大潰魏人入彭城乘勝追擊梁將士死者什七八惟陳慶之率所部還梁主聞之大駭有司奏削綜爵土絶屬籍尋復赦之綜至洛陽見魏主還就館為東昏侯舉哀服斬衰三年拜司空封丹陽王更名贊綜長史江革司馬祖暅之皆為魏所獲安豐王延明聞其才名厚遇之革稱足疾不拜延明使暅之作欹器銘革唾罵之延明令革作寺碑革辭延明將箠之革厲聲曰江革行年六十得死為幸誓不為人執筆延明知其不可屈乃止安豐王延明文成帝之孫西部鐡勒其先丐奴之苗裔種類最多自西海以東依山據谷往往不絶降魏魏廣陽王深擊拔陵破之降其衆二十萬破六韓拔陵圍魏廣陽王深于五原深拔軍向朔州先是賀拔度拔父子為衛可孤所獲度拔與宇文肱糾合鄉里豪傑襲可孤殺之度拔尋與鐵勒戰死其子勝奔恆州為廣陽王深軍主至是深被圍勝開門出戰賊稍退深乃得向朔州朔州魏改懷朔鎮置在今吳喇忒東北今朔平府之朔州乃北齊所置宇文肱豆逸歸之元孫周太祖宇文泰父也參軍于謹以冦盜蜂起非専用武力可勝謹兼通諸國語乃請于深單騎詣叛寇營見其部長開示恩信于是西鐵勒部之長乜母野反北庭姓列河等詣深降深據險要伏兵以待拔陵邀擊乜列河伏發拔陵大敗初阿那瓌為魏討拔陵敗之自稱敕連頭兵豆伐可汗及是頭兵可汗大破拔陵拔陵南徙渡河前後降附者二十萬人深與行臺元纂表乞于恆州北别立郡縣安置降户魏主不從詔分處之于冀定瀛三州就食深謂纂曰此輩復為乞活矣明年拔陵誘殺胡琛未幾拔陵為柔然所殺乞活晉惠帝末吏民就穀冀州謂之乞活事具前秋八月魏柔元鎮胡三省注鎮在漢且如縣西北塞外牆外且如故城在今大同府天鎮縣北邊民杜洛周反于上谷洛周反于上谷改元真王攻沒郡縣高歡蔡俊尉景假榮彭樂安定人皆從之魏以常景字永昌爽之孫為行臺與都督元談趙郡王幹之子討之冬十二月魏荆郢羣蠻叛魏討敗之魏方有事西北二荆胡三省注西荆治上洛北荆治襄城上洛襄城注具見前西郢胡三省注治汝南真陽縣真陽今日正陽屬汝寧府羣蠻皆反魏主以臨淮王彧討之辛雄字世賔隴西狄道人為行臺左丞趣葉城即漢葉縣注見前彧軍屯汝上汝水之上州郡爭來請救彧不欲應之又恐後有得失之責邀雄符下尚書行臺符也雄遂符彧令速赴擊羣蠻聞之皆散走是時魏主欲自出討賊已而不果雄自軍中上疏曰凡人所以臨陳忘身觸白刃而不憚者一求榮名二貪重賞三畏刑罰四避禍難非此數者雖聖主不能使其臣慈父不能厲其子矣明主深知其情故賞必行罰必信使親疏貴賤勇怯賢愚聞鐘鼓之聲見旌旗之列莫不奮激競赴敵場豈厭久生而樂速死哉利害懸于前欲罷不能耳自秦隴逆節蠻左亂常已厯數年擇禦之師敗多勝少跡其所由皆不明賞罰故也陛下雖降明詔賞不移時然將士之勳厯稔不决亡軍之卒晏然在家是故節士無所勸慕庸人無所畏懾進而擊賊死交而賞賖退而逃散身全而無罪比其所以望敵奔沮而莫肯盡力者也陛下誠能號令必信賞罰必行則軍威張賊息矣疏奏不省丙梁普通七年午魏孝昌二年春正月魏五原降户鮮于修禮反鮮于修禮帥北鎮流民反于定州之左城即左人城在今保定府唐縣水經注滱水徑左人城南即此魏以楊州刺史長孫稚為北道大都督討之行至鄴詔復以河間王琛代稚稚表言前在淮南與琛有隙難受其節度不聼至滹沱修禮邀擊之琛不救稚大敗皆坐除名夏四月魏以元順為太常卿城陽王徽字顯順景穆帝之孫與黃門郎徐紇毁侍中元順出為太常卿順奉辭時紇侍側順指之曰此魏之宰嚭魏國不亡此終不死紇脅肩而出順叱之曰爾刀筆小才正堪供几案之用豈應汚辱門下斁我彜倫因振衣而起太后默然五月元略自梁歸于魏魏以為侍中略自至江南晨夕哭泣常如居喪及是元乂死胡太后遣江革祖暅之以豫章王綜叛沒魏事具前南還以求略梁主禮遣之太后拜略侍中賜爵東平王遷尚書令委任之然徐鄭用事略亦不敢違也魏復以廣陽王深為北道大都督先是魏北鎮降户在恆州者欲奉廣陽王深為主深懼上書請還京師詔以左衛將軍楊津字羅漢播之弟代深為都督深故與城陽王徽有隙深通于徽妃于氏故怨之徽因此搆之及深至洛陽魏主敕徽深因晏會令相和解徽銜不已會河間王琛等為鮮于修禮所敗乃復以深為大都督討之使章武王融字永興景穆帝曾孫裴衍字文和叔業兄子為左右都督並受節制徽復譖深恐有異志后敕融衍潛為之備深懼事無大小不敢自決后使問其故對曰徽銜臣次骨朝夕欲陷臣于不測之誅臣何以自安若使徽出臨外州臣無內顧之憂庶可以畢命賊庭展其忠勇太后不聼徽與鄭儼等更相阿黨外似柔謹內實忌克賞罰任情魏政愈亂秋八月賊帥元洪業殺鮮于修禮降魏其黨葛榮復殺洪業自領其衆魏安北將軍爾朱榮執肆州刺史而以爾朱羽生代之魏以榮為安北將軍都督恆朔二州軍事榮過肆州刺史尉慶賓閉城不納榮怒攻拔之乃署其從叔羽生為刺史執慶賓還秀容自是兵威漸盛魏朝不能制初賀拔允及弟勝嶽在恆州已而平城為鮮于阿胡所陷嶽奔榮勝奔肆州至是榮得勝大喜曰得卿兄弟天下不足平也以為别將軍中大事多與之謀葛榮襲殺魏都督章武王融廣陽王深榮以新得大衆上下未安遂北渡瀛州魏廣陽王深引兵躡之榮東攻章武王融殺之自稱天子深聞融敗不進侍中元晏宣言於太后曰廣陽王盤桓不進坐國非望于謹智略通人為其謀主風塵之際非陛下之純臣也太后詔榜省門募能獲謹者有重賞謹聞之謂深曰今女主臨朝信用讒佞茍不明殿下素心恐禍至無日謹請束身歸罪遂詣榜下有司以聞太后引見大怒謹備論深忠欵兼陳停軍之狀太后意解遂捨之既而深引軍還趨定州刺史楊津疑其有異志遣都督毛諡討之深間行至博陵逢葛榮遊騎劫以詣榮賊徒見深頗有喜者榮惡而殺之城陽王徽遂誣深降賊録其妻子深府佐宋遊道敦煌人繇之元孫為之訴理乃得釋冬十一月梁侵魏取夀陽梁主乘淮堰水盛遣豫州刺史夏侯亶等侵魏魏揚州刺史李憲以夀陽降梁陳慶之入據其城凡降城五十二獲男女七萬五千復以夀陽為豫州改合肥為南豫州以亶為二州刺史夀陽久罹兵革民多流散亶輕刑薄賦務農省役頃之民户復充魏幽州民執行臺常景叛降杜洛周先是杜洛周帥衆掠薊南趣范陽魏郡隋廢故城在今順天府涿州行臺常景屢擊破之至是幽州民執景叛降于洛周魏盜賊日滋征討不息國用耗竭預徵六年租調猶不足乃罷百官酒肉稅入市者人一錢百姓嗟怨吏部郎中辛雄上疏曰夷夏之民相聚為亂正以守令不得其人百姓不堪命故也宜及此時早加慰撫但郡縣選舉由來共輕貴遊俊才莫肯居此宜改其弊妙盡才望不拘停年三載黜陟稱職者補在京名官不厯守令不得為內職則人思自勉枉屈可伸彊暴自息矣不聼丁梁大通元年未魏孝昌三年春正月葛榮陷魏殷州刺史崔楷字季則博陵安平人死之榮遂圍冀州葛榮自破章武廣陽二王之後鋒不可當魏分定相二州置殷州領巨鹿等四郡治廣阿平巨鹿注見前廣阿今趙州隆縣是以崔楷為刺史楷表乞兵糧不許或勸楷單騎之官楷曰吾聞食人之祿者憂人之事吾獨往將士誰肯固志哉遂合家赴州榮逼殷州城或勸减弱小避之楷遣幼子及一女夜出既而悔之曰人謂吾心不固虧忠而全愛也遂追還時州既新立了無禦備之具將士爭奮皆曰崔公尚不惜百口吾屬何愛一身連戰半旬死者相枕終無叛志城陷楷執節不屈榮殺之遂圍冀州魏蕭寶寅討莫折念生敗績魏以楊椿字延夀津之兄為行臺寶寅出兵纍年將士疲弊至是大敗于涇陽汧城岐州皆降于賊幽州刺史畢祖暉東平須昌人戰沒關中大擾雍州刺史楊椿募民拒守詔以椿為行臺節度關西諸將右民郎路思令上疏曰比年將帥多寵貴子孫軒眉攘腕以攻戰自許及臨大敵鋭氣頓盡器械不精進止無節以當負險之衆敵數戰之寇欲不敗得乎是以兵知必敗始集而先逃將帥畏敵遷延而不進國家謂官賞尚輕屢加寵賚帑藏空竭民財殫盡遂使賊徒益甚生民凋敝凡以此也夫德可感義夫恩可勸死士今若明賞罰練士卒修器械先遣辨士曉以禍福如其不悛以順討逆何異勵蕭斧而伐朝菌鼓洪爐而燎毛髮哉弗聽平右民郎晉置左右民曹各有郎路思令陽人莫折天生冦魏雍州敗死衆潰天生冦雍州蕭寶寅部將羊侃字祖欣泰山梁父人𨼆身塹中射殺之其衆皆潰是秋秦州人殺莫折念生降魏魏以房景伯字良暉清河東武城人為東清河太守魏東清河郡宋僑置清河郡于般陽後沒于魏為東清河郡般陽注見前山賊羣起詔以房景伯為太守郡民劉簡虎嘗無禮于景伯舉家亡去景伯禽之署其子為掾令諭山賊賊以景伯不念舊惡相帥出降景伯母崔氏通經有明識貝邱婦人列其子不孝景伯白其母母曰民未知禮義何足深責乃召其母與之對榻共食使其子侍立堂下觀景伯供食未句日悔過求還崔氏曰此雖靣慙其心未也且置之凡二十餘日其子叩頭流血母涕泣乞還然後聽之卒以孝聞梁主捨身于同泰寺劉友益曰書捨身始此梁主作同泰寺又開大通門以對之遂幸寺捨身大赦改元夏四月魏復以蕭寶寅為西討大都督寶寅之敗也免為庶人至是楊椿有疾求解復以寶寅代之椿子昱將適洛陽椿謂之曰當今雍州無踰寶寅者但其上佐朝廷應遣心膂重人何得在其牒用且寶寅不藉刺史為榮吾觀其得州喜甚恐有異心汝當以此意啓二聖并白宰輔更遣長史司馬防城都督欲安關中正須三人耳不然必成深憂昱如言啓聞不聽楊昱字元晷秋八月魏李神軌殺高謙之字道讓遼東人初魏侍御史高道穆名恭之以字行奉使相州按前刺史李世哲奢縱不法至是世哲弟神軌用事道穆兄謙之家奴訴良謂壓良為賤神軌執謙之繫廷尉會赦將出神軌啓太后先賜謙之死朝士哀之冬十月梁將湛僧智夏侯䕫字季龍亶之弟圍魏廣陵魏置東豫州治廣陵城今光州息縣是克之湛僧智圍魏東豫州刺史元慶和汝隂王天賜之子于廣陵入其郛魏將元顯伯率軍赴援僧智逆擊破之梁司州刺史夏侯䕫自武陽武陽關也來㑹僧智斷魏軍歸路慶和方築柵以自固聞䕫至遂請降䕫讓僧智僧智曰慶和志欲降公僧智今往必乖其意且僧智所將應募烏合之人不可御以法公持軍素嚴必無侵暴受降納附深得其宜䕫乃登城拔魏幟建梁幟慶和束兵而出吏民安堵顯伯宵遁梁軍追之斬獲萬計梁主以僧智鎮廣陵䕫鎮安陽此為南安陽魏屬義陽郡隋廢故城在今汝南府正陽縣遣别將屠楚城亦曰楚王城在信陽州北由是義陽北道遂與魏絶梁將陳慶之攻魏渦陽注見前克之梁領軍曹仲宗直閣陳慶之攻魏渦陽魏遣征南將軍元昭等率馬步五萬來救前軍去城四十里先是尋陽太守韋放將兵來會魏兵奄至放營未立麾下才二百人放免胄下馬據胡牀處分士皆死戰莫不一以當百魏兵遂退至是放謂慶之曰魏兵前鋒必輕鋭與戰若捷不足為功如其不利沮我軍勢不如勿擊慶之曰魏兵逺來疲倦去我尚逺必不見疑宜及其未集出其不意必無不敗之理放字元直睿之子慶之與麾下二百騎奔擊破其前軍還與諸將連營而進背渦陽城與魏軍相持自春至冬數十百戰將士疲弊聞魏欲築壘于軍後仲宗等恐腹背受敵謀欲還慶之杖節軍門曰吾聞置兵死地乃可求生須敵大合然後與戰審欲班師慶之别有密敕犯者依敇行之乃止魏作十三城欲以控制梁軍慶之銜枚夜出陷其四城渦陽城主王緯乞降所餘九城兵甲猶盛乃陳其俘馘鼓噪而攻之遂大奔潰斬獲略盡尸咽渦流魏蕭寶寅殺關右大使酈道元舉兵反魏遣行臺長孫稚討之蕭寶寅之敗于涇也自念出師纍年糜費不資一旦覆敗內不自安魏主亦疑之中尉酈道元性嚴猛汝南王悅孝文帝之子嬖人弄權道元殺之并劾悅時寶寅反狀已露悅乃奏以道元為關右大使寶寅聞之謂為取已甚懼長安輕薄子弟勸使舉兵寶寅以問河東桞楷楷曰謡言鸞生十子九子毈徒玩反卵壞也齊明帝名鸞寶寅其第六子一子不毈關中亂亂治也大王能治關中何所疑寶寅遂遣將攻殺道元時行臺郎中蘇湛以病卧家寶寅令其姨弟姜儉說之曰道元之來事不可測吾不能坐受死亡不復作魏臣矣生死榮辱與卿共之湛入哭曰王本以窮烏投人朝廷假王羽冀以至於此屬國步多虞不能竭忠報德乃欲秉人問隙守關問鼎魏德雖衰天命未改湛不能以百口為王族滅願賜駭骨歸鄉里庶得病死下見先人寶寅素重湛且知其不為己用聽還武功人蘇湛字景俊武功自稱齊帝改元置官長史毛遐字宏逺北地山原人與弟鴻賓帥氐羌兵拒之魏以長孫稚為行臺討寶寅正平魏郡故城在今山西絳州民薛鳯賢薛修義亦聚衆河東東西連結以應寶寅詔都督宗正珍孫宗正以官為氏珍孫其名也討之十一月葛榮陷魏冀州殺都督源子雍裴衍遂寇相州葛榮久逼信都魏詔加子雍鎮北將軍為北討都督時相州刺史樂安王鑒字紹逹文成帝孫據鄴反敕子雍先討之子雍進圍鄴城與裴衍等攻鑒誅之已而信都城陷乃除子雍冀州刺史使討葛榮先是冀州刺史元孚帥勵將士晝夜拒守糧儲既暍外無救援及城陷與兄祐俱被執榮大集將士議其死生孚兄弟爭相死都督潘紹等數百人皆叩頭請死以活使君榮曰此皆魏之忠臣義士也皆免之衍復表求同行許之子雍言衍行臣請留臣行請留衍若必同行敗在旦夕不聽行至漳水榮率衆十萬擊之果敗俱死時相州聞冀州陷人不自保刺史李神恆農人志氣自若撫勉將士大小致力榮盡鋭攻之卒不能克戊梁大通二年魏孝昌四年敬申宗孝莊帝子攸永安元年春正月杜洛周陷魏定州執行臺楊津遂陷瀛州先是魏津為北道行臺孝昌二年津為北道都督尋改行臺守定州時鮮于修禮杜洛周殘掠州境津孤城獨立在兩寇之間津積貯柴粟修理戰具更營雉堞賊每來攻機械競發又于城中去城十步掘地至泉廣作地道潛兵涌出置爐鑄鐡持以灌賊賊相語曰不畏利槊堅城惟畏楊公鐡星津潛使人以鐡劵說賊黨賊黨有應津者遺津書曰所以圍城正為取北人耳宜盡殺之不然必為患津悉收北人納于城中而不殺衆感其仁及葛榮統衆使人說津津斬其使固守三年洛周圍之魏不能救長史李裔引賊入執津瀛州刺史元寧以城降賊魏長孫稚討蕭寶寅敗之寶寅奔万俟醜奴寶寅圍馮翊長孫稚軍至恆農行臺左丞楊侃謂稚曰賊據潼關守禦已固不如北取蒲坂渡河而西入其腹心則華州魏于馮翊那置華州之圍不戰自解稚從之遣其子子彥與侃率兵北渡據石錐壁石錐山之壁也山在今山西蒲州府虞卿縣時薛修義方圍河東侃乃班告曰若送降名者各自還村俟臺軍舉三烽當亦舉烽相應無應烽者乃賊黨也當進擊屠之以所獲賞軍于是村民轉相告語雖實未降者亦詐舉烽一宿之間火光遍數百里賊圍城者不測各散歸修義亦逃還與薛鳳賢鳳賢時據安邑俱請降稚遂克潼關㑹有詔廢鹽池稅推上表曰臣前違嚴㫖不先討關賊徑解河東者非緩長安而急蒲坂誠以一失鹽池則三軍乏食也鹽稅一年準絹三十萬匹昔高祖升平之年猶創鹽官加典護沉今國用不足徵六年之粟折來歲之資此皆奪人私財事不獲己豈若寶天産之貨而均贍以理乎臣已輒符所部依常收稅寶寅將侯終德因其敗襲寶寅寶寅奔万俟醜奴葛榮殺杜洛周并其衆魏太后胡氏進毒弒其主詡而立臨洮王魏書京兆王愈傳胡太后追封愈為臨洮王子寶月襲明帝紀作寶暉通鑑依帝紀世子釗魏胡太后再臨朝以來嬖幸用事政事縱弛盜賊蜂起封疆日蹙魏主年侵長太后自以所為不謹凡魏主所愛信者輒以事去之務為壅蔽不使知外事由是母子之間嫌隙日深是時車騎將軍爾朱榮兵彊高歡段榮等皆歸之歡與榮等先在杜洛周黨中欲圖洛周不果逃奔爾朱榮并州刺史元天穆髙凉王孤五世孫與榮善榮常與天穆及賀拔嶽密謀舉兵入洛二人皆勸成之遂舉兵塞井陘時魏主亦惡鄭儼徐紇等逼于太后不能去密詔榮舉兵內向欲以脅太后榮以高歡為前鋒初劉貴屢薦高歡于榮榮見其憔悴未之竒也廄有悍馬命歡翦之歡不加羈絆而翦之竟不蹄齧起謂榮曰御惡人亦如是矣榮竒其言坐之牀下屏左右訪以時事歡曰今天子暗弱太后淫亂嬖孽擅命朝政不行以明公雄武乘時奮發討鄭儼徐紇之罪以清帝側霸業可舉鞭而成也榮大悅自是每參軍事至上黨魏主復以私詔止之儼紇恐禍及己隂與太后謀鴆魏主弒之僞立皇子為帝既而下詔曰潘嬪所生實皇女也先是潘嬪生女太后詐言皇子大赦改元臨洮世子釗高祖之孫應立遂迎釗即位生三年矣爾朱榮聞之大怒乃抗表曰大行皇帝背棄萬方海內咸稱鴆毒致禍又立皇女虛行赦宥上欺天地下惑朝野已乃選君于孩提之中實使奸豎專朝隳亂綱紀今羣盜沸騰鄰敵窺窬而欲以未言之兒鎮安天下不亦難乎願聽臣赴闕參預大議問侍臣帝崩之由訪禁衛不知之狀以徐鄭之徒付之司敗雪同天之恥謝逺近之怨然後更擇宗親以承寶祚三月魏爾朱榮舉兵晉陽夏四月至河陽立長樂王子攸彭城王協之子是為孝莊帝沈太后胡氏及幼主釗于河殺王公以下二千人自為都督中外諸軍事封太原王遂入洛陽爾朱榮舉兵發晉陽太后聞之甚懼詔以李神軌為大都督率衆拒之先是榮抗表之始遣從子天光親信奚毅等入洛與從弟世隆字榮宗密議廢立榮與元天穆以彭城王協有忠勳其子長樂王子攸有令望欲立之天光等乃見長樂王子攸具論榮心子攸許之天光等還北榮猶疑所立乃以銅鑄顯祖諸子孫像惟子攸獨成榮乃舉兵及是師次河內遣人密迎子攸時太后遣别將鄭先護滎陽開封人鄭季明先護從弟守河橋四月子攸潛自高渚在孟津縣會榮于河陽乃濟河即位以榮為都督中外諸軍事封太原王先護季明開城納之將軍費穆亦降徐紇鄭儼皆亡走太后落髮出家榮召百官奉璽綬備法駕迎魏主于河橋遣騎執太后及幼主至河陰沈之河榮至陶渚即陶河在今懷慶府孟縣南水經注孟澤又謂之陶河是也引百官集于行宫西北列兵騎圍之責以天下喪亂肅宗暴崩不能匡弼之罪因縱兵殺之自丞相高陽王雍以下死者二千餘人榮令其軍士言元氏既滅爾朱氏興皆稱萬嵗乃命數十人投刀走行宫殺魏主之兄彭城王劭弟始平王子正遷魏主于河橋置之幕下魏主憂憤使人諭榮曰帝王迭興盛衰無常今四方瓦解將軍奮袂而起所向無前此天意非人力也宜以此時早正位號若能存魏社稷亦當更擇賢親而輔之時高歡勸榮稱帝左右多同之賀拔垂進曰將軍首舉義兵志除奸逆大勳未立遽有此謀正可速禍未見其福榮乃自鑄金為像數四不成命參軍劉靈助卜之亦曰未可榮亦精神恍惚不自支持久而方悟深自悔曰惟當以死謝朝廷是夜復迎魏主還營叩頭請死榮所從兵騎殺朝士既多不敢入洛榮乃議欲遷都其將泛禮固諫乃奉魏主入城大赦時百官蕩盡帷散騎常侍山偉一人拜赦洛中士民逃竄值宿空虛官守曠廢榮乃遣使巡城勞問于是朝士稍出人心粗安榮猶執遷都議都官尚書元諶爭之榮忽曰河隂之役君應知之諶曰天下事當與天下論之奈何以河隂之酷恐元諶乎諶國之宗室位居常伯正使今日碎首流腸亦無所懼榮大怒欲扺諶罪諶顔色自若乃赦之榮因入見重謝河橋之事誓言無復二心魏主亦為榮誓言無疑心榮喜求酒飲之熟寐魏主欲誅之左右不可乃止即以牀輿向中常侍省榮夜半方覺自此不復宿禁中矣彭城王劭字子訥協嫡子劉靈助燕郡人山偉字仲才洛陽人元諶字興伯趙郡王幹子魏徐紇奔泰山鄭儼伏誅紇奔泰山依太守羊侃儼與從兄滎陽太守仲明謀據郡起兵為部下所殺已而統勸侃據郡降梁魏遣兵討之紇與侃俱奔梁魏汝南王悅臨淮王彧北海王皓字子明詳之子出奔梁三王以魏室方亂俱出奔梁已而彧以魏主定位求還梁主惜其才而不能違遣之五月魏立肅宗嬪爾朱氏為后劉友益曰書立肅宗嬪深醜之也榮女先為肅宗嬪榮欲魏主納以為后魏主疑之黃門侍郎祖瑩曰昔文公在秦懷嬴入侍事有反經合義陛下有何疑焉遂從之榮大悅爾朱榮還晉陽以元天穆為侍中録尚書事兼領軍將軍榮令元天穆入洛陽朝廷要官悉用其心腹為之魏詔聽民入粟時乘喪亂之後倉廪虛竭始詔入粟八千石者賜爵散侯五百石者賜出身梁遣將軍曹義宗圍魏荆州魏置荆州于穰縣今南陽府鄧州是義宗圍魏荆州堰水灌城不沒者數板時魏方多難不能救城中糧盡刺史王羆字熊羆京兆霸城人煮粥與將士均食每出戰不擐甲胄仰天大呼曰州城孝文皇帝所置天若不祐國家令箭中王羆額不爾王羆必富破賊歷三年前後摶戰甚衆亦不被傷已而魏遣將軍費穆南救獲曹義宗荆州之圍始解魏免其侍郎高乾字乾雍渤海蓚人高昻字敖曹官先是爾朱榮之向洛也高乾與弟昻季武字子通皆逃奔齊州聞河陰之亂遂集流民起兵于河濟之間頻破州軍至是乃降魏主以乾及昻皆有舊俱以為侍郎爾朱榮以乾兄弟前為叛亂不應復居近要魏主乃聽解官歸昻復抄掠榮誘執之秋九月葛榮圍魏相州爾朱榮討擒之冀定滄瀛殷皆平葛榮引兵圍鄴衆號百萬爾朱榮帥精騎七千討之以侯景為前驅號令嚴明戰士同奮身自陷陳出于賊後表裏合擊遂大破之初葛榮聞爾朱榮之來也乃自鄴以北列陳數十里箕張而進爾朱榮潛軍山谷為竒兵分督將已上三人為一處處有數百騎楊塵鼓譟使賊不測多少又以人馬逼逐刀不如棒勒軍士各置袖棒一枚置馬側至戰時不聽斬級以棒棒之分命壯勇所向衝突擒葛榮餘衆悉降縱其所之羣情大喜數十萬衆一朝盡散擢其渠帥量才授任檻車送葛榮赴洛斬之五州皆平初字文肱從鮮于修禮戰死其子泰從葛榮至是爾朱榮愛其才以為統軍泰字黑顔即後周太祖魏爾朱榮自為大丞相冬十月梁立元皓為魏王遣將軍陳慶之將兵納之巳梁中大通元年酉魏永安二年春正月魏主追尊其父協為皇帝魏主追尊彭城武宣王為文穆皇帝廟號肅祖遷神主于太廟而以高祖為伯考臨淮王彧諫曰漢光武至元帝屬踈服絶猶身奉子道入繼大宗别祀南頓君于舂陵况肅祖與高祖親北面為臣乎二后皆將配享此為君臣並筵叔嫂同室臣切以為不可不聼請去帝著皇亦不聼尋復尊兄劭帝號彧又諫亦不聼夏四月魏王皓拔榮城胡三省注當作堂城即春秋沙隨地沙隨注見前稱皇帝皓與慶之進拔榮城有衆七千遂即帝位于睢陽城南攻魏行臺濟隂王暉業景穆帝曽孫于考城後漢縣今屬河南歸德府擒之初河間邢果反元天穆將討之以皓北上乃集文武議之皆曰杲衆彊盛宜以為先尚書薛琡曰邢果鼠竊狗偷非有逺志皓帝室近親來稱義舉其勢難測宜先去之天穆不從皓遂得乘虛深入天穆尋擊果平之五月魏王皓取梁國滎陽虎牢皓克梁國遣陳慶之攻魏滎陽時魏都督楊昱據滎陽慶之攻之未拔元天穆等至梁士卒皆恐慶之諭將士曰君等殺人父兄掠人子女多矣天穆之衆皆仇讐也然我衆才七千寇三十餘萬今日惟有必死乃可得生當及其未盡至急取其城而據之耳乃鼓之將士蟻附而入執楊昱諸將請殺之皓曰我聞梁主數稱袁昻之忠梁主初立袁昻不降事見前今奈何殺昱乎俄而天穆等引兵圍城慶之力戰破之進拔虎牢魏主子攸奔河南皓入洛陽以陳慶之為車騎大將軍魏主子攸將出未知所之或勸之長安中書舍人高道穆曰關中荒殘何可復往皓乘虛深入陛下若親帥宿衛背城一戰臣等竭其死力破皓必矣或恐勝負難期則車駕不若渡河徴天穆及榮引兵進討此萬全之策也子攸遂走河內臨淮王彧安豐王延明帥百僚迎魏王皓皓入洛陽以慶之為車騎大將軍慶之進擊大梁下之先是元天穆拔大梁皓使慶之擊之天穆將北走郎中溫子升曰皓新入人情朱安擊之必克平定京邑奉迎大駕桓文之舉也捨此北渡竊為大王惜之天穆不能用及是費穆攻虎牢將拔聞天穆走遂降魏王皓責以河隂之事而殺之溫子升字鵬舉太原人皓命黃門侍郎祖瑩作書遺子攸曰朕泣請梁朝誓在復耻正欲問罪于爾朱出卿于虎口耳河南州郡多附于皓齊州刺史沛郡王欣字慶樂廣陵王羽之子集文武議所從軍司崔光韶亮從父弟抗言曰元皓受制于梁引冦讐之兵以覆宗國此魏之賊臣亂子也豈惟大王家事所宜切齒下官等皆荷朝眷未敢仰從衆皆是之欣乃斬皓使閏六月魏爾朱榮渡河魏王皓走死陳慶之走歸梁魏王子攸歸洛陽榮自為天柱大將軍魏王皓以數千之衆轉戰尅捷據有都邑號令自己天下人情想其風政而皓遽驕怠近習于政日夜縱飲不惜軍國所統南兵凌暴市里朝野失望高子儒字孝禮道穆兄子自洛陽出從子攸子攸問之子儒曰皓敗在旦夕不足憂也爾朱榮馳見子攸于長子子攸即日南還榮為前驅旬日之間兵衆大集皓既得志謀叛梁以事難未平藉陳慶之兵力故外同內異言多猜忌慶之亦密為之備慶之謂皓曰今逺來至此未服者尚多彼若知我虛實連兵四合將何以禦之宜更請兵于梁皓欲從之安豐王延明曰慶之兵已難制今更增其衆寧肯復為人用乎皓遂不用慶之言軍副馬佛念謂慶之曰將軍功高勢重為魏所疑一旦變生不測可無虞乎不若乘其無備殺皓據洛此千載一時也慶之不從及爾朱榮兵至慶之守北中城今曰下孟鎮在懷慶府孟縣南皓據南岸慶之三日十一戰殺傷甚衆榮議還北圖後舉黃門侍郎楊侃曰用兵者何嘗不散而復合瘡愈更戰况今未有所損豈可以一事不諧而衆謀頓廢乎今四方顒顒視公此舉遽復引歸民情失望不若多為桴筏間以舟楫數百里中皆為渡勢使皓不知所防一旦得渡必立大功榮乃使爾朱兆字萬仁榮從子與賀拔勝縛筏夜渡皓軍潰失據帥麾下南走慶之收衆結陳而還榮追之會嵩高水漲慶之軍士死散略盡乃削鬚髮為沙門間行還建康中軍大都督楊津迎魏主子攸于北邙流涕謝罪子攸遂入洛陽加榮天柱大將軍皓至臨頴為人所殺慶之自魏還特重北人朱异問之慶之曰吾始以為大治以北皆戎羌之鄉比至洛陽乃知衣冠人物非江東所及也奈何輕之秋七月魏以髙道穆為中尉魏主之姊夀陽公主行犯清路道穆擊破其車公主立訴之魏主曰中尉清直豈可以私責之道穆見魏主魏主勞之道穆免冠謝魏主曰朕愧卿卿何謝也魏始鑄永安五銖錢魏多細錢米斗幾直千髙道穆上表曰在市八十一錢得銅一斤私造薄錢斤嬴二百既示之以深利又隨之以重刑抵罪雖多姦鑄彌衆今錢徒有五銖之文而無二銖之實置之水上殆欲不沉此乃朝廷科防不切之故也宜改鑄大錢一斤七十文載年號以記其始則私鑄無利而自息矣楊侃亦乞聽官民並鑄使民樂為而弊自改從之魏巴州此魏巴州州有隆城鎮地在今保寧府東北州治無考其梁巴州隋曰清化郡唐仍為州今屬保定府在府東叛附于梁初魏以梁益荒逺更立巴州以統諸獠凡二十餘萬户以巴渠嚴始欣為刺史始欣貪慕諸獠反圍城行臺魏子建字敬忠巨鹿下曲陽人撫諭之乃散始欣恐獲罪隂請降梁子建囚始欣既而魏以傳豎眼為行臺豎眼初至相賀豎眼先為東益州刺史救元法僧事見前既而病其子敬紹奢淫貪暴始欣賂敬紹得還巴州遂降于梁敬紹隂有保據南鄭之志誘山民圍城欲為內應圍合而謀泄將士殺之豎眼耻恚而卒明年春魏復取巴州九月梁主捨身于同泰寺梁主再幸同泰寺設大㑹釋御服持法衣行清淨大捨素牀瓦器乘小車役私人見為四衆講涅槃經王幼學曰梵語涅槃華言示寂也羣臣以錢一億萬奉贖表請還宫三請乃許魏討葛榮餘黨韓樓于幽州平之先是葛榮餘黨韓樓據幽州反北邊被其患爾朱榮以賀拔勝鎮中山樓畏勝不敢出至是榮復使大都督侯淵神武尖山人討樓淵廣張軍聲多設攻具帥數百騎深入去薊百餘里值賊淵潛伏以乘其背大破之俘五千人皆還其馬縱使入城左右皆諌淵曰我兵少不可力戰為竒計以間之乃可克也度其已至帥騎夜進昧旦叩其城門樓果疑降卒為內應遂走追擒之詔以淵為平州刺史鎮范陽先是淵配卒甚少或以為言榮曰侯淵總大衆未必能用若臨機設變是其所長至是果如其言冬十月乙酉朔日食十二月梁以陳慶之為北兖州齊僑置治淮隂今淮安府清河縣是刺史時有妖賊僧彊自稱天子土豪蔡伯龍起兵應之衆至三萬攻陷北徐州亦齊僑置治鍾離鍾離注見前慶之討斬之庚梁中大通二年魏永安戊三年主曄建明元年春三月魏遣都督爾朱天光榮從兄子討万俟醜奴夏四月獲之遂克髙平獲蕭寶寅皆誅之蕭寶寅之奔万俟醜奴也醜奴以寶寅為太傅醜奴數侵擾關中魏爾朱榮遣賀拔嶽討之嶽私謂其兄勝曰醜奴勍敵也攻之不勝固有罪勝之讒嫉得生願得爾朱氏一人為帥而佐之勝言于榮榮以爾朱天光為都督以嶽及侯莫陳悅侯莫陳代北三字姓悅代人為左右都督配軍士千人嶽擊赤水亦曰小赤水在今同州府華州西蜀賊蜀人之遷關中者相聚為賊得馬二千匹簡其壯健以充軍三月醜奴自將圍岐州遣尉遲魏之别部後以為氏菩薩攻圍趣栅賀拔嶽救之菩薩等已拔栅還嶽故殺掠其吏民以挑之菩薩帥步騎二萬至渭北嶽誘擒之嶽于橫岡設伏以輕騎數十隔水與語明日復引百餘騎與語稍引而東至水淺可涉處嶽即馳馬東出賊以為走棄步卒輕騎渡河追之半渡岡東嶽還擊之賊敗走嶽令賊下馬者勿殺賊悉投馬俄獲三千人馬亦無遺遂擒菩薩仍渡渭北降步卒萬餘收其輜重醜奴聞之棄岐州北走安定四月天光至汧渭之間停車收馬宣言俟秋更進獲覘者縱之醜奴信之散衆歸耕據險立栅天光知其勢分密嚴夜發黎明圍其大栅拔之所得俘囚皆縱遣之諸栅皆降天光徑扺安定醜奴走追及于平凉侯莫陳崇單騎入賊生擒醜奴衆皆披靡後騎益集遂大破之天光進克高平執蕭寶寅皆送洛陽斬醜奴于市賜寶寅死是秋天光討醜奴餘黨滅之于是三秦河渭瓜凉鄯州皆平州三秦秦東秦南秦也河州魏置今屬甘肅蘭州渭魏置今陜西鞏昌府是瓜州漢敦煌地今甘肅安西府是凉州魏置今甘肅凉州府是鄯魏置今甘肅西寧府是梁以元悅為魏王時汝南王悅尚在梁梁主聞皓敗乃復以悅為魏王後爾朱榮入洛悅知事不及遂南還魏以宇文泰為征西將軍行原州魏置今甘肅平涼府固原州是事始宇文泰為爾朱榮統軍後從賀拔嶽討元皓于洛陽以功封寧都子遂從嶽入關平万俟醜奴魏主遷泰為征西將軍行原州事時關隴雕弊泰撫以恩信民皆感悅曰早遇宇文君吾輩豈從亂乎秋九月長星見魏爾朱榮至洛陽與元天穆皆伏誅爾朱榮雖居外藩遙制朝政魏主性勤政事數親覽詞訟理寃獄榮聞之不悅榮使其從弟僕射世隆攝選啓北人為河南諸州魏主未許太宰并州刺史元天穆曰天柱有大功若請普代天下官恐陛下亦不得違魏主正色曰天柱若不為人臣朕亦須代若猶存臣節無代天下百官之理榮聞之大恚恨爾朱后性復妬忌后數忿恚曰天子由我家置立今便如此我父本即自作今亦復决怏復决言今當作天子决計不疑也魏主外逼于榮內迫于后恆怏怏不樂城陽王徽待中李彧字子文冲之孫勸魏主除榮侍中楊侃僕射元羅字仲綱乂之弟膠東侯李侃晞惠之從孫亦預其謀會榮請入朝徽等勸因其入刺殺之魏主疑未定而謀頗泄人懷憂懼爾朱世隆疑有變乃為匿名書云天子欲殺天柱取以白榮榮恃其彊不以為意九月至洛陽魏主即欲殺之以天穆在并州恐為後患故忍未發并召天穆人有告榮以魏主之謀榮具奏之魏主曰外人亦言王欲害我豈可信耶于是榮不自疑及天穆至魏王召中書舍人溫子升告以殺榮狀并問以殺董卓事子升具道本末魏主曰王允若赦凉州人必不至此良久又曰吾寧為高貴鄉公死不為常道鄉公生若殺榮與天穆而赦其黨亦應不動耳乃伏兵明光殿東序聲言皇子生遣徽馳告榮榮與天穆俱入溫子升預作赦文執以出遇榮問之子升色不變曰敕榮不取視入坐李侃晞等抽刀從東户入榮即起趣御坐魏主先橫刀膝下遂手創之天穆亦死內外喜譟百官入賀魏主登門大赦遣武衛將軍奚毅將兵鎮北中城先是魏主謀誅榮以毅為榮所親信不敢與之言情毅曰臣寧死陛下不能事契賊及榮至洛陽毅見魏主請問魏主知其誠乃與之定議是夜爾朱世隆帥榮部曲走屯河隂先是榮黨田怡聞變議攻宫門賀拔勝朱止之及世隆走勝亦不從魏主甚嘉之瑞雖為榮所委而善處朝廷之間魏主亦善遇之故瑞從世隆走而中道逃還朱瑞字元龍代郡桑乾人魏僕射爾朱世隆反與汾州刺史爾朱兆立長廣王曄字華興中山王英之弟子于長子冬十二月入洛陽遷其主子攸于晉陽而弒之世龍將還北司馬子如曰天下恟恟唯彊是視今若北走則示人以弱恐變生肘腋不如分兵守河橋還軍京師出其不意或可成功世隆從其言遂攻河橋殺奚毅據北中城魏朝大懼十月世隆遣爾朱拂律歸將契騎一千皆白衣來郭下魏主遣謂之曰太原王立功不終隂圖釁逆罪止榮身餘皆不問若降官爵如故拂律歸曰願得太原王尸生死無恨因涕泣羣黨皆慟哭聲震城邑魏主募敢死士討世隆一日得萬人與拂律歸等戰于廓外不克魏主集羣臣傳議皆恇懼不知所出散騎常侍李苗請募人從馬渚亦曰河中渚在河南府孟津縣上流乘船夜下縱火船焚橋爾朱氏兵溺死者甚衆南援不至苗赴水死世隆亦收兵北遁詔行臺源子恭鎮太行丹谷在今山西澤州府鳯臺縣西南水經注丹水南流注于丹谷即此築壘防之汾州刺史爾朱兆聞榮死自汾州帥騎據晉陽世隆至長子兆來㑹之共推太原太守長廣王曄即位世隆兄仲逺亦起兵徐州向洛陽魏主以城陽王徽總統內外徽憂怖不知所出性多忌嫉又靳財貨故徒有靡費而恩不感物十一月仲逺陷西兖州注見前賀拔勝戰敗降之兆引兵向洛召高歡歡不至初爾朱榮常從容問左右曰一旦無我誰可主軍衆以兆對榮曰兆雖勇然所將不過三千騎多則亂矣堪代我者惟賀六渾耳因戒兆曰爾非其匹終當為其穿鼻乃以高歡為晉州刺史及兆引兵向洛召歡曰兆狂愚如是而敢為悖逆吾勢不能久事爾朱矣乃以山蜀未平辭不至兆遂輕騎涉河叩宫門宿衛散走魏主步出雲龍門外遇城陽王徽乘馬走屢呼之不顧而去兆執魏主鎖之撲殺王子縱兵大掠殺臨淮王彧等徽齎金百斤馬五十匹以前洛陽令寇租仁一門三刺史皆已所引拔故往投之祖仁私謂子弟曰今日富貴至矣乃怖徽以捕將至令其逃于他所使人于路邀殺之送首于兆兆不之賞既而兆夢徽謂已曰吾有金二百斤馬八匹在祖仁家卿可取之兆捕祖仁依夢徵之不得殺之世隆仲逺皆至洛陽兆責世隆曰叔父在朝如何令天柱受禍按劍瞋目聲色甚勵世隆遜謝然後得已由是深恨之兆遷魏主于晉陽高歡聞之帥騎邀之不及因與兆書為陳禍福兆不納竟弒之三級佛寺初世隆等徵兵于泰寧大守房謨謨斬其使及兆得志其黨是蘭安定執謨繫州獄郡中蜀人聞之皆叛安定給謨弱馬令往慰勞諸賊見謨遙拜謨先所乘馬别給將士戰敗蜀人得之善養之貌童婦女競投草粟曰此房公馬也世隆聞之以為長史泰寧魏郡故城在今山西澤州府心水縣房謨字敬放河南洛陽人是蘭代北復姓魏紇豆陵代北三字姓步蕃大破爾朱兆于晉州兆及晉州刺史高歡擊殺之兆使歡統六鎮先是魏主既殺爾朱榮詔河西賊帥紇豆陵步蕃襲秀容兵勢甚盛爾朱兆自洛陽急還晉陽以禦之至是秀蕃大破兆軍于秀容南逼晉陽兆懼使人召高歡并力賀拔馬過兒請緩行以弊之歡往往逗留步蕃兵日盛兆屢敗告急歡乃往從之與兆進兵合擊大破斬之兆德歡相與誓為兄弟初葛榮步衆流入并肆者二十餘萬為契部陵暴皆不聊生大小二十六反誅夷者半猶謀亂不止兆患之問計于歡歡曰六鎮反殘不可盡殺宜選腹心使統之有犯者罪其帥則所罪者寡矣兆曰善誰可者賀拔允請使歡領之歡毆允折齒曰天下事取捨在王何敢妄言請殺之兆以歡為誠遂以其衆委焉歡遂出宣言受委統州鎮兵可集汾東受號令乃建牙陽曲川漢陽曲縣今欣州定襄縣是也後漢末移縣于太原今為太原府治軍士素惡兆而樂屬歡莫不皆至歡又請以并肆降户就食山東兆從之慕容紹宗諫曰高公雄才蓋世復使握大兵于外譬如借蛟龍以雲雨將不可制矣兆曰有香火重誓何慮耶紹宗曰親兄弟尚不可信何論香火時兆左右已受歡金因稱紹宗與歡有隙兆怒囚紹宗趣歡發歡道逢爾朱榮妻北鄉長公主自洛陽來有馬三百匹盡奪之兆聞之乃釋紹宗而問之紹宗曰此猶是掌握中物也兆乃自追歡至襄垣㑹漳水暴漲歡隔水拜曰借馬非他備山東盜也王信讒來追今不辭度水而死恐此衆便叛兆因輕馬度水謝歡引頸授刀使歡斫之歡大哭曰自天柱之薨賀六渾更何所仰但願大家十萬歲得伸力用耳大家何忍出此言兆乃投刀復斬白馬與歡為誓因留宿夜飯尉景伏壯士欲執兆歡止之曰今殺之其黨必奔歸結聚兵饑馬瘦不可與敞若英雄乘之而起則為害滋甚兆雖驍勇凶悍無謀不足圖也旦日兆歸營復召歡歡將詣之長史孫騰牽歡衣乃止魏齊州亂刺史蕭贊走死齊州附于爾朱兆贊走卒于陽平漢縣隋改白莘今屬山東東昌府梁人竊其柩以歸梁主猶以子禮葬之陵次梁以陳慶之為南北司州南司州治安陸北司州注見前刺史慶之屢破魏兵遂罷義陽鎮兵停水陸漕運江湖諸州並得休息開田六千頃二年之後倉廪充實御批厯代通鑑輯覽卷四十二

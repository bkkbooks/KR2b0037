front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷七十七宋神宗皇帝庚戌熙寧三年春正月罷判尚書省張方平
  hash: sha256:b0c12afdf2c4877acf1e048cc9111b42dd16a9f94b624fcefdaf1cce7a67cb6e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_076-1a, image: WYG0338/WYG0338-0178a.png}
body:
  text: 初帝欲用王安石方平以為不可及是方平服闋還朝以觀文殿學士判尚書省安石言留之不便遂出知陳州及陛辭極論新法之害帝為之撫然未幾召為宣徽北院使留京師安石深沮之方平亦力求去乃復出判應天府二月河北安撫使韓琦請罷青苖法王安石稱疾不朝詔諭起之琦上疏曰臣準散青苖詔書務在惠小民不使兼并乘急以邀倍息而公家無所利其入今所列條約乃令鄉户及坊郭户借錢一千納一千三百是官自放錢取息與初詔相違又條約雖禁抑勒然不抑勒則上户必不願請下户雖或願請請時甚易納時甚難將來必有督索同保均賠之患陛下躬行節儉以化天下自然國用不乏何必使興利之臣紛紛四出以致逺邇之疑哉乞罷提舉官委提㸃刑獄依常平舊法施行帝䄂其疏以示執政曰琦真忠臣雖在外不忘宗室朕始謂可以利民今乃害民如此且坊郭安得青苖而使者亦疆與之王安石勃然進曰苟從其所欲雖坊郭何害因難琦奏曰如桑𢎞羊籠天下貨財以奉人主私用乃可謂興利之臣今陛下修周公遺法抑兼并振貧弱非所以佐私欲安可謂興利之臣乎帝終以琦說為疑安石遂稱疾不出帝諭執政罷青苖法趙抃請俟安石出安石求去帝命司馬光草答詔有士夫沸騰黎民騷動之語安石抗章自辨帝為巽辭謝之且命吕惠卿諭㫖韓絳又勸帝留安石安石入謝因言中外大臣從官臺諫朋比欲敗先王正道以沮陛下此所以紛紛也帝以為然安石乃乃起視事持新法益堅以琦奏付條例司命曾布疏駁刋石頒之天下琦申辨愈切且論安石妄引周禮以惑上聽皆不報時文彥博亦以青苖之害為言帝曰吾遣二中使親問民間皆云甚便彥博曰韓琦三朝宰相不信而信二宦者乎先是安石隂結入內副都知張若水押班藍元振為助帝遣使潛察府界俵錢事適命二人使還極言民情深願無抑配者故帝信之不疑以司馬光為樞密副使固辭不拜光素與王安石厚及行新法貽書開陳再三又與吕惠卿辨論于經筵安石不樂帝欲大用光訪之安石安石曰光所言盡害政之事所與盡害政之人而欲置之左右使預國論則異論之人倚以為重韓信立漢赤幟趙卒氣奪今用光是與異論者立赤幟也及安石稱疾不出帝乃以光為樞密副使光辭曰陛下所以用臣蓋察其狂直庶有補于國家若徒以祿位榮之而不取其言是以天官私非其人也臣徒以祿位自榮而不能救生民之患是盜竊名器以私其身也陛下誠能罷制置條例司追還提舉官不行青苖助役法雖不用臣臣受賜多矣青苗之散使者恐其逋負必令貧富相保貧者無可償則散而之四方富者不能去必責使代償十年之外貧者既盡富者亦貧常平又廢加之以師旅因之以饑饉民之羸者必委死溝壑壯者必聚而為盜賊此事之必至者也疏凡九上㑹安石復起視事乃下詔允光辭收還敕誥知通進銀臺司范鎮封還詔㫖者再帝以詔直付光不由門下鎮奏曰由臣不才使陛下廢法乞解其職許之解韓琦河北安撫使琦以論青苖不見聼上疏請解河北安撫使止領大名府路王安石欲沮琦即從之三月始以策試進士初同知貢舉吕公著在貢院中密奏言天子臨軒策士而用詩賦非舉賢求治之意乞出自宸𠂻以咨訪治道至是上御集英殿試進士遂專用䇿賜葉祖洽字敦初邵武人以下三百人及第出身祖洽策言祖宗多因循苟簡之政陛下即位革而新之考官宋敏求字次道綬之子蘇軾欲黜之吕惠卿擢為第一軾言祖洽詆祖宗以媚時君而魁多士何以正風化乃擬答進士䇿獻之帝以示王安石安石言軾才亦髙但所學不正又以不得逞之故其言遂跌蕩至此數請絀之置刑法科帝因王安石議謀殺刑名疑學者多不通律意遂立刑法科許有官無贓罪者試律令刑統大義斷按取其通曉者補刑法官未幾選人任子亦試律令始出官又詔進士自第三人以下試刑法或言髙科不試人不以為榮乃詔悉試貶知審官院孫覺字莘老髙郵人知廣德軍宋置今為州𨽻江南時青苖法行首議者謂周官泉府民之貸者至輸息二十而五國事之財用取具焉覺條奏其妄曰成周賒貸特以備民之緩急不可徒與也故以國服為之息然國服之息說者不明鄭康成釋經乃引王莾計贏受息無過嵗什一為據不應周公取息重于莾時考周禮臬府民之貸者以國服為之息鄭注貸從官借本也以國服為之息以其于國服事之稅為息也于國事受園㕓之田而貸萬泉者朞出息五百王莾時民貸以治産業者但計贏所得受息無過歲什一孔潁達疏萬泉朞出息五百二十而取一也王莾時與周少異周惟據本微利莾則計本而據所贏多少以取息假令萬泉而贏萬則徵一千贏五千則徵五百無過什一據此周與莾時取息輕重甚明覺奏尚未剖悉詳盡矣泉古與錢通况國用專取具于泉府則冡宰九賦將安用耶聖世宜講求先王之法不當取疑文虛說以圖治安石覽之怒㑹曽公亮言畿縣散青苗錢有追呼抑配之擾安石遣覺行視虛實覺言民實不願與官相交望賜寢罷遂坐奉詔反覆貶知廣德軍初覺為右正言帝語覺欲用陳升之而罷邵亢覺即奏疏如所言帝以為希㫖罷判越州安石卑與覺善特援以為助自知通州召還纍遷知審官院至是以覺不附已遂逐之夏四月貶御史中丞吕公著知潁州青苖法行公著上疏曰自古有為之君未有失人心而能圖治亦未有脅之以威勝之以辨而能得人心者也昔日之所謂賢者今皆以此舉為非而主議者一切詆為流俗浮論豈昔皆賢而今皆不肖乎㑹帝使公著舉吕惠卿為御史公著曰惠卿固有才然姦邪不可用王安石以是積怒公著誣其言韓琦欲因人心如趙鞅興晉陽之甲以逐君側之惡貶知潁州命知制誥宋敏求草制明著罪狀敏求不從但言敷陳失實安石怒命陳升之改其語行之趙抃罷安石持新法益堅抃大悔恨上疏言制置條例司遣使者四十餘輩騷動天下安石彊辨自用詆公論為流俗違衆罔民順非文過近者臺諫侍從多以言不聽而去司馬光除樞密不肯拜且事有輕重體有大小財利于事為輕而民心得失為重青苗使者于體為小而禁近耳目之臣用舍為大今去重而取輕失大而得小懼非宗廟社稷之福也奏入懇求去位乃出知杭州抃長厚清修為政善應俗施教寬猛不同以惠利為本韓琦稱為人中表儀已不及也以韓絳參知政事侍御史陳襄字述古侯官人言王安石參預大政首為興利之謀先與知樞密院事陳升之同領條例司未幾升之用是為相而絳繼之曽未數月遂預政事則是中書大臣皆以利進乞罷絳新命而求道德經術之賢以處之庶不害于王政而足以全大臣之節矣不報襄初由進士厯知縣事留意教化富弼薦之纍官同修起居注改侍御史疏論青苗法不便請斥罷王安石吕惠卿以謝天下及是以言屢不用乞外帝惜其去留修起居注逾年為知制誥安石欲出之帝不許尋直學士院帝嘗訪人材之可用者襄以司馬光韓維吕公著范純仁蘇軾等三十三人對安石益惡之摘其書詔小失出知陳州絳考績綱目是條所載陳襄奏宋史襄本傳不載韓傳亦無之惟于襄本傳云乞罷韓絳政府以杜大臣爭利而進者蓋即括此奏之意而言之也乃續綱目于八年襄罷學士院條又追叙其為御史時乞罷絳政府事屬重復今節録襄本傳附注于此而襄罷學士院條刪不録以李定字資深掦州人考李定有四一蘇舜欽獄已見前一濟南人嘉祐治平中以風采聞一綏州人陜西副都總管浩之父一即此後劾蘇軾為監察御史裏行罷知制誥宋敏求蘇頌字子容南安人李大臨字才元成都人定少受學于王安石舉進士為秀州判官孫覺薦之朝召至京師李常見之問曰君從南方來民謂青苗法如何定曰民便之無不喜者常曰舉朝方共爭是事君勿為此言定即往白安石且曰定但知據實以言不知京師乃不許安石大喜立薦對帝問青苗事定曰民甚便之于是諸言新法不便者帝皆不聼命定知諌院宰相言前無選人除諌官之比遂拜監察御史裏行知制誥宋敏求蘇頌李大臨言定不由銓考擢授朝列不緣御史薦置憲臺雖朝廷急于用才度越常格然隳紊法制所益者小所損者大封還制書詔諭數四頌等執奏不已並坐纍格詔命落知制誥天下謂之三舍人未幾監察御史陳薦字彥升邢州沙河人言定頃為涇縣主簿聞母仇氏死匿不為服定自辨實不知為仇氏所生故疑不敢服而以侍養辭官考仇氏初在民間生子為浮屠曰了元即佛印也後為國子傳士李問妾生定又出嫁郜氏生蔡奴工傳神見陸游老學菴筆記曽公亮謂當行追服安石力主之罷薦御史而改定為崇正殿說書監察御史林旦字次中福州人薛昌朝范育字巽之祥之子復言定不孝之人不宜居勸講之地并論安石之罪安石又白罷三人定亦不自安求解說書乃授檢正中書吏房直舍人院詔百官坐罪免杖黥著為令知全州張仲宣坐枉法法官援例杖脊黥配海島判審刑院蘇頌言于帝曰古者刑不上大夫仲宣官五品今黥之使與徒𨽻為伍雖其人無可矜所重者汙辱衣冠耳帝曰善詔免杖黥而流海外因著為令罷監察御史裏行程皓張戬字天祺大梁人右正言李常以謝景溫字師直富陽人為侍御史知雜事皓言自古興治立事未有中外人情交謂不可而能冇成者況于排斥忠良沮廢公議用賤凌貴以邪姦正者乎正使僥幸小有成事而興利之臣日進尚德之風浸衰尤非朝廷之福帝令皓詣中書議安石方怒言者厲色待之皓徐言曰天下事非一家私事願平氣以聼之安石為之愧屈戬與臺官王子韶論新法不便乞召還孫覺吕公著戬又上疏論王安石亂法曽公亮陳升之依違不能救正韓絳左右徇從李定以邪諂竊臺諫吕惠卿刻薄辨給假經術以文姦言豈宜勸講君側戬又詣中書爭之安石舉扇掩面而笑戬曰戬之狂直宜為公笑然天下之笑公者不少矣陳升之從旁解之戬曰公亦不得為無罪升之有愧色常上言均輸青苖斂散取息傅會經義何異王莾猥析周官片言以流毒天下安石遣所親密諭意常不為止又言州縣散常平錢實不出本勒民出息帝詰安石安石請令常具官吏主名常以非諫官體不奉詔安石既積怒言者而皓等以言不行亦各乞罷乃罷常通判滑州戬知公安縣子韶知上元縣安石素善皓及是雖不合猶敬其忠信但出為京西路提刑皓固辭乃改簽書鎮寧節度判官數日之間臺諫一空安石以外議紛紛請以姻家謝景溫為侍御史知雜事帝從之五月詔罷制置條例歸中書以吕惠卿兼判司農寺先是言者皆請罷條例司帝問安石可併入中書否安石言修條例未畢且臣與韓絳共領是司每請間奏事今絳在密院未可併請緩之至是絳入中書乃降詔以其事還中書又以手札諭安石凡修條例掾屬悉授以官青苖免役農田水利等法付司農寺命吕惠卿掌之遼立賢良科令進是科者先以所業十萬言進分審官東西院六月罷知諌院胡宗愈字完夫宿從子舊制文選屬審官院武選屬樞密院至是帝與王安石議分審官為東西院東主文西主武以奪樞密之權且沮文彥博也彥博言于帝曰若是則臣無由與武臣相接何由知其才而委令之哉帝不聼宗愈亦力言其不可且言李定非才帝惡之手詔宗愈潛伏姦意中傷善良罷通判真州以朱壽昌字康叔揚州天長人通判河中府壽昌生三嵗其父巽守京兆出其母劉氏母子不相聞者五十年考宋史壽昌本傳續綱目通鑑皆言劉氏方娠而出壽昌生數嵗方還父家王稱束都事略則云壽昌既生而出與蘇軾志林魏泰東軒筆録所載略同軾與壽昌同時必不誤今依東都事略改輯夀昌行四方求之不得飲食罕御酒肉與人言輒流涕及知廣德軍續綱目誤作廣州今改正與家人訣棄官入秦誓不見母不還行次同州得焉劉氏時年七十餘矣京兆守臣錢明逸以聞詔夀昌赴闕時言者共攻李定不服母喪王安石力主定因忌夀昌及夀昌至但付審官院折資通判河中府時蘇軾作詩及序贈夀昌且譏世之不養者定見之大恨居數嵗其母卒壽昌居喪幾喪明天下稱其孝秋七月罷吕公弼知太原府以馮京字當世江夏人為樞密副使公弼以王安石變法數勸其務安靜安石不悅公弼具疏將論之從孫嘉問字望之竊其藁以示安石安石先白之帝怒遂罷公弼知太原府吕氏號嘉問為家賊京為御史中丞言薛向總利權無績效近者復除天章閣待制于侍從為最親非向人材所堪處帝不悅以語安石安石請改用京帝從之以為樞密副使八月夏人寇環慶州以韓絳為陜西宣撫使先是夏人築諾和堡知慶州李復圭字審言徐州豐人合蕃漢兵三千遣禆將李信劉甫襲之大敗還復圭斬信等以自解復出兵追夏人殺其老幼二百以功告捷至是夏人大舉入環慶分其軍多者號二十萬少者不下一二萬攻大順城及柔逺等寨游騎至慶州城下九日乃退鈐轄郭慶等數人死焉韓絳請行邊乃以絳為陜西宣撫使授以空名告敕得自除吏尋命兼河東宣撫使九月以曽布為崇政殿說書兼判司農王安石嘗欲置其黨一二人于經筵以防察奏對者吕惠卿遭父喪去職安石遂薦布代之布資序淺人尤不服尋罷山隂陸佃嘗受經于安石至是應舉入京師安石問以制政佃曰法非不善但推行不能如初意還為擾民安石驚曰何乃爾吾與惠卿議之又訪外議佃曰公樂聞善古所未有然外閒頗以為拒諌安石笑曰吾豈拒諌者但邪說營營顧無足聼佃曰是乃所以致人言也明日召佃謂之曰惠卿言私家取債亦須一雞半豚已遣李承之使淮南質究矣既而承之還親言民無不便佃說遂不行之陸佃字農師李承字奉世濮人以劉庠知開封府庠不肯屈事王安石安石欲見之或以為言庠曰安石自執政未嘗一事合人情往將何語邪卒不往上疏極言新法非是帝曰奈何不與大臣協心濟治乎庠對曰臣知事陛下而已不敢附安石也曽公亮罷公亮初嫉韓琦故薦王安石以間之及同輔政知帝方向安石凡更張庶事一切陰助之而外若不與同者嘗遣其子孝寬字令綽參其謀至帝前略無所異由是帝益信任安石安石深德之公亮以老求去遂拜司空侍中集禧觀使蘇軾嘗從容責公亮不能就正公亮曰上與介甫如一人此乃天也然安石猶以公亮不盡阿附已聽其罷相以馮京參知政事吳充為樞密副使河東麟府豐三州此豐州宋嘉祐中以蘿泊川掌地置故城在今葭州府谷縣其唐故豐州前已沒于西夏城壘兵械不治官吏皆受譴京以前帥本道上章自劾優詔不聼進參知政事充性謹密在西府數言王安石之非策賢良方正之士黜台州司户參軍孔文仲字經父新喻人詔舉賢良帝親䇿之太原判官吕陶字元鈞成都人對曰陛下初即位願不惑理財之說不間老成之謀不興疆場之事陛下措意立法自謂庶幾堯舜然以陛下之心如此天下之論如彼獨不返而思之乎及奏第帝顧王安石取卷讀讀未半神色頓沮帝覺之使馮京竟讀稱其言有理台州司户參軍孔文仲策凡九千餘言力論安石所建之法非是宋敏求第為異等安石怒啓帝御批罷文仲還故官齊恢字熙業蒲隂人孫固封還御批范鎮上疏臣所薦孔文仲草茅踈逺不識忌諱且以直言求之而又罪之恐為聖明之纍不聼吕陶亦止授通判蜀州罷翰林學士司馬光光求去上曰王安石素與卿善何自疑光曰安石執政凡忤其意如蘇軾輩者皆毁其素履中以危法臣不敢避削黜但欲苟全素履且臣善安石孰如吕公著安石初舉公著後亦毁之彼一人之身何前是而後非必有不信者矣求益力乃以端明殿學士知永興軍冬十月陳升之罷升之既與安石忤安石數侵辱之升之不能堪稱疾卧家逾十旬乃出㑹母喪去位貶秦鳯經略使李師中字誠之楚邱人知舒州先是建昌軍宋置今江西建昌府是司理王韶字子純江州德安人詣闕上平戎三䇿以為西夏可取欲取西夏當先復河湟欲復河湟當先以恩信招撫沿邊諸種自武威之南至于洮河蘭鄯注俱見前皆故漢郡其地可以耕而食其民可以役而使幸今諸羌瓜分莫相統一此正可并合而兼撫之時也嘉勒氏子孫轄戬棟戬養子額爾古之子亦名本把戬差盛為諸戎所畏若招撫之使糾察宗黨制其部族于漢有肘腋之助且使夏人無所連結策之上也帝異其言召問方略王安石以為竒請以韶管幹秦鳯經略司機宜文字韶請築渭涇上下兩城屯兵以撫納洮河諸部下師中議師中以為不便詔師中罷帥事韶又言渭源西魏縣宋置寨元仍為縣今屬鞏昌府至秦州良田不耕者萬頃願置市易司頗籠商賈之利取其贏以治田乞假官錢為本詔秦鳯經略司以川交子易物貨給之命韶領市易事師中言韶所指田乃極邊弓箭手地耳又將移市易司于古渭宋寨皇祐中置後為鞏州今鞏昌府治是恐秦州自此益多事所得不補所亡安石主韶議為削師中職徙知舒州而以竇舜卿字希元安陽人知秦州與內侍李若愚按問田所在僅得地一頃地主有訟又歸之矣舜卿若愚奏其欺安石又為謫舜卿而命韓縝縝遂附㑹實其事乃進韶太子中允初師中仕州縣邸狀報包拯參知政事或曰朝廷自此多事矣師中曰包公何能為今知鄞縣王安石者眼多白甚似王敦他日亂天下者必斯人也世貴其先識今額爾古舊作阿里骨本把戬舊作邦彪籛改翰林學士范鎮致仕鎮上疏曰臣言青苗不見聼一宜去薦蘇軾孔文仲不見用二宜去李定避持服遂不認母壞人倫逆天理而欲以為御史反為之罷舍人逐臺諌王韶上書肆意欺罔以興造邉事事敗則置而不問反為之罪帥臣及不用蘇軾則掎托其過不悅孔文仲則遣之歸任以此二人況彼二人是非得失能逃聖鑑乎因復極言青苖之害且曰陛下有納諌之資大臣有拒諌之計陛下有愛民之性大臣用殘民之術疏入王安石大怒持其疏至手顫乃自草制極詆之遂以户部侍郎致仕凡所宜得恩典悉不與鎮表謝略曰願陛下集羣議為耳目以除壅蔽之姦任老成為腹心以養中和之福天下聞而壯之蘇軾往賀曰公雖退而名益重矣鎮愀然曰君子言聼計從消悉于未萌使天下隂受其賜無智名無勇功吾獨不得為此使天下受其害而吾享其名吾何心哉十二月改諸路更戌法初太祖懲五代之弊用趙普䇿定兵制天子衛兵以守京師更番戍邊者曰禁軍諸州鎮兵以分給役使者曰廂軍選于户籍或應募使之團結以為所在防守者曰鄉軍具籍塞下以為蕃籬者曰蕃軍大抵四者而已至是議者以更戍法雖無難制之患而兵將不相識緩急不可恃乃部分諸路將兵總𨽻禁旅使兵知其將將練其兵平居知有訓厲而無番戍之勞有事而後遣焉既而分置將副事在七年京畿河北京東西路三十七將河北十七將京畿十將京東九將京西四將陜西五路四十二將鄜延九將涇原十一將環慶八將秦鳳五將熙河九將然禁旅盡屬將官飲食嬉遊養成驕惰又將官遂與州郡長吏爭衡每將各有部將隊將押隊使臣及訓練官等數十人而諸州舊總管鈐轄都監監押設官重復虛破廪祿知兵者皆知其非卒不能奪也立保甲法王安石言先王以農為兵今欲公私財用不匱為宗社長久計當罷募兵用兵乃立保甲其法數十家為保有保長五十家為大保有大保長十大保為都保有都保正副主客户兩丁以上選一人為保丁附兩保丁以上有餘丁而壯勇者亦附之內家資最厚材勇過人者亦充保丁授之弓弩教之戰陳每一大保夜輪五人警盜凡告捕所獲以賞格從事同保犯强盜殺人强姦略人傳習妖教造蓄蠱毒知而不告依律伍保法餘事非干已又非敕律所聼糾皆母得告雖知情亦不坐若于法鄰保合坐罪者乃坐之其居停强盜三人經三日保鄰雖不知情科失覺罪逃移死絶同保不及五家併他保有自外入保者權為同保戶數足則附之俟及十家則别為保置牌以書其户數姓名提㸃刑獄趙子幾迎安石意請先行于畿甸詔從之遂推行于永興秦鳳河北東西五路以達于天下保甲始行特以捕盜賊相保任既而詔畿內保丁肄習武事第一等者天子親閲試之命以官二等至四等加恩有差五年以曽布言詔主户保丁分番𨽻巡檢司十日一更其永興五路肄習如畿內惟母上番餘路止相保任毋習武藝其並邊可肄者令監司度之凡保甲先𨽻司農八年改𨽻兵部其政令則聼乎樞審至元豐二年又立開封府界集教大保長法藝成乃立團教法以大保長為教頭使教保丁其法自府界椎之諸路各置文武官一人提舉禁令苛急民不勝擾往往去而為盜判大名府王拱辰抗言其害曰非止困其才力奪其農時是以法驅之使陷于罪罟也浸淫為大盜其兆已見未能盡罷願裁損下户以紓之主者指拱辰為沮法拱辰曰此老臣所以報國也抗章不已帝悟由是下户得免續考宋史王拱辰傳元豐初判大名抗論保甲之害網目并載是條欽次不清今採兵志及拱辰傳改韓以韓絳王安石同平章事王圭參知政事時絳開幕府于延安詔即軍中拜之尋命安石提舉編修三司令式圭為翰林學士承㫖典內外制十八年嘗因齊宫賦詩有所感歎帝聞而憐之遂拜參知政事行募役法先是詔條例司講立役法條例司言使民出錢募人充役即先王致民財以祿庶人在官者之意命吕惠卿曽布相繼草具條貫踰年始成計民之貧富分五等輸錢名免役錢几官户女户寺觀單丁未成丁者亦等第輸錢名助役錢凡敷錢先視州若縣應用雇直多少隨戶等均取雇直又增取二分以備水旱缺闕謂之免役寬剩錢用其錢募人代役既試用其法于開封府遂推行于諸路既而東明縣本漢東昏王莾改東明晉省宋復置故城在今開封府蘭陽縣今大名府東明縣乃金時所置民數百紛然詣開封府訴帝知之又以臺諌多論奏因謂王安石少裁之安石對曰朝廷制法當斷以義豈須規規恤淺近之人議論邪考是條續綱目及宋元通鑑俱載有司馬光奏今據宋史食貨志及光傳免役初行俱不載光有特奏元祐元年光既秉政疏陳免役五害其文與此奏略同續綱目通鑑既載于此而元祐元年又載光所論五害之言殊屬重復今刪此而録于後辛亥四年春正月韓絳使种諤襲夏人敗之遂城婁在綏德州米脂縣西北沈括曰夏人築城于撫寧故縣之北滴水崔崖石峭拔髙十餘丈下臨無定河謂之婁城舊作囉兀城今改韓絳素不習兵事開幕府于延安措置乖方選蕃兵為七軍復以种諤為鄜延鈐轄知青澗城命諸將皆受其節制蕃兵皆怨望諤謀取橫山乃帥師襲夏人于囉兀大敗之因以衆二萬城焉賜名嗣武寨自是夏人日聚兵為報復計吕公弼言諤啓邊患宜戒之弗聼已而絳言諤入夏之功乞加旌賞詔從之粥廣惠倉田廣惠倉田本絶户業以賑濟者也王安石請鬻之以為河北東西陜西京東四路青苖本錢詔從之二月更定科舉法專以經義論䇿試士考熙寧定科舉宋史選舉志載于前年三月而神宗本紀仍兩年互見蓋前年建議是年始行也今依續綱目書于此初上篤意經學深憫貢舉之弊且以西北人材多不在選遂議更法王安石謂古之取士俱本于學請興建學校以復古其明經諸科欲行廢罷詔近臣雜議監官告院蘇軾曰科舉之法行之百年治亂盛衰初不由此今議者或曰鄉舉德行而略文章或曰專取䇿論而罷詩賦夫欲興德行在于君人者修身以格物審好惡以表俗若欲設科立名以取之則是教天下相率而為僞也上以孝取人則勇者割股怯者廬墓上以亷取人則敝車羸馬惡衣菲食凡可以中上意無所不至矣自文章而言之則䇿論為有用詩賦為無益自政事言之則詩賦䇿論均為無益然自祖宋以來莫之廢者以為設法取士不過如此也且自唐至今以詩賦為名臣者不可勝數何負于天下而必欲廢之近世士人纂類經史綴輯時務謂之策括臨時剽竊以眩有司其弊有甚于詩賦者矣議上帝曰吾固疑此得軾議釋然矣他日王安石言于帝曰進士科試詩賦亦多得人然謂科法已善則未也士少壯時正當講求天下正理乃閉門學作詩賦及其入官世事皆所未習此科法敗壞人材致不如古既而中書門下言今欲追復古制則患于無漸宜先除去聲律偶對之文使學者得専意經術以俟朝廷興建學校然後講求三代所以教育選舉之法施之天下則庶幾可以復古于是改法罷詩賦帖經墨義士各占治易詩書周禮禮記一經兼論語孟子每試四場初本經次兼經大義凡十道次論一道次䇿三道禮部試即增二道中書撰大義式頒行試義者須通經有文采乃為中格不但如明經墨義粗解章句而已其殿試則專以䇿限千字以上分五等第一等二等賜進士及第第三等賜進士出身第四等賜同進士出身第五等賜同學究出身舊制進士入進謝恩銀百兩至是亦罷之仍賜錢三千為期集費三月夏人陷撫寧注見前諸城詔安置种諤于潭州韓絳免諤進築永樂川賞逋嶺二寨永樂城在綏德州米脂縣西後改為銀川寨賞逋嶺寨亦在米脂縣境分遣都監趙璞錐州人振之子燕達字逢辰開封人築撫寧故城及分荒堆三泉吐渾川開光嶺葭蘆川四寨三泉在葭州界吐渾川蓋即吐延川在延安府延川縣北開光城在綏德州西北本西魏縣唐未廢宋于此置寨後改為堡葭蘆寨即今葭州與河東路修築各相去四十餘里已而夏人攻順寧寨注見前遂圍撫寧折繼世御卿孫髙永能字君舉清澗人等擁兵駐細浮圖在綏德州西北與水脂縣接界本夏人寨後入宋改名克戎去撫寧咫尺婁城兵勢尚完諤在綏德節制諸軍聞夏人至茫然失措欲作書召燕達戰悸不能下筆顧運判李南公字楚老鄭州人涕泗不已由是新築諸堡悉陷將士沒者千餘人詔棄婁城並治諤罪責授汝州團練副使潭州安置絳坐興師敗衄罷知鄧州詔察奉行新法不職者先是知山隂縣陳舜俞字令舉烏程人不散青苖錢上疏自劾謫監南康軍鹽酒稅卒于貶所又知長葛縣樂京荆南人不奉助役法知湖陽縣劉䝉字子明渤海人議免役不便俱奪官至是詔察奉行不力者知陳留縣姜潛字至之奉符人到官才數月青苖令下潛印榜于縣門又移于鄉村各三日無人至遂撤榜付吏曰民不願矣即移疾去考宋史陳舜俞傳嘗棄官居秀州已而復出遂貶死蘇軾稱其學術才能兼百人之器一斥不復士大夫惜之績綱目于此乃云舜俞先上書極論新法謫南康軍至是復上書言新法實便識者笑之與本傳不合宋元通鑑于熙寧三年則云舜俞卒于貶所于此則又因襲續綱目之文前後尤抵牾今改輯浚漳河注詳前漳河初由磁洺南入冀州與胡盧河注見前合其後變徙入于大河先是從內侍程昉議詔昉與河北提㸃刑獄王廣亷相視開修至是役兵萬人浚之袤一百六十里帝患財用不足文彥博曰足財用在乎安百姓安百姓在乎省力役且河久不開不出于東則出于西利害一也今發夫開治徙東從西何利之有王安石謂使漳河不由地中行則或東或西為害一也治之使行地中則有利而無害會京東河北風變異常民大恐帝手詔中書令省事安靜以應天變漳河之役妨農來嵗為之末晚王安石格詔不下夏四月以司馬光判西京留臺光在永興以言不用乞判西京留臺不報又上疏曰臣之不才最出羣臣之下先見不如吕晦公直不如范純仁程皓敢言不如蘇軾孔文仲勇決不如范鎮今陛下惟安石是信附之者謂之忠良攻之者謂之讒慝臣今日所言陛下之所謂讒慝者也若臣罪與范鎮同即乞依鎮例致仕若罪重于鎮或竄或誅所不敢逃久之乃從其請光既歸洛自是絶口不論新法出監官告院蘇軾通判杭州考宋史蘇軾傳及王宗稷東坡年譜俱以軾判杭州在熙寧四年而續綱目載于三年七月宋元通鑑據本傳載于是年四月今依之又考軾傳治平二年進直史館明年丁父憂歸熙寧二年服闋還朝監官告院而續綱目于軾出判杭州猶書直史館非是今改正軾自議貢舉與帝合即日召見問方今政令得失軾對曰陛下天縱文武不患不明不患不勤不患不斷但患求治太急聼言太廣進人太鋭願鎮以安靜待時之來然後應之帝竦然曰卿三言朕當熟思之凡在館閣皆當為朕深思治亂無有所𨼆軾退言于同列王安石不悅命權開封推官將困之以事軾決斷精敏聲聞益逺嘗以新法不便上疏極論略曰臣之所言者三言而已願陛下結人心厚風俗存綱紀人主所恃者人心也自古及今未有和易同衆而不安剛果自用而不危者祖宗以來治財用者不過三司今陛下又創制置三司條例司使六七少年日夜講求于內使者四十餘輩分行營幹于外以萬乘之主而言利以天子之宰而治財君臣宵旰幾一年矣而富國之功茫如捕風徒聞內帑出數百萬緡祠部度五千人耳以此為術人皆知其難也汴水濁流自生民以來不以種稻今欲陂而清之萬頃之稻必用千頃之陂一嵗一淤三嵗而滿矣陛下使相視地形所在鑿空訪尋水利隄防一開水失故道雖食議者之肉何補于民自古役人必用鄉户徒聞江浙之間數郡雇役而欲措之天下自楊炎為兩稅租調與庸既兼之矣奈何復欲販庸青苗放錢自昔有禁今陛下始立成法每嵗常行雖云不許抑配而數世之後暴君汚吏陛下能保之乎昔漢武以財力匱竭用桑𢎞羊之說買賤賣貴謂之均輸于時商賈不行盜賊滋熾幾至于亂臣願陛下結人心者此也國家之所以存亡者在道德之淺深不在乎强與弱時數之所以長短者在風俗之厚薄不在乎富與貧臣願陛下務崇道德而厚風俗不願陛下急于有功而貪富彊仁祖持法至寬用人有序專務掩覆過失未嘗輕改舊章考其成功則曰未至言乎用兵則十出而九敗言乎府庫則僅足而無餘徒以德澤在人風俗知義故升遐之日天下歸仁議者見其末年吏多因循事不振舉乃欲矯之以苛察濟之以智能招來新進勇鋭之人以圖一切速成之效未享其利澆風已成欲望風俗之厚豈可得哉臣願陛下厚風俗者此也祖宗委任臺諌未嘗罪一言者縱有薄責旋即超升許以風聞而無官長言及乘輿則天子改容事關廊廟則宰相待罪臺諫固未必皆賢所言亦未必皆是然須養其鋭氣而借之重權者將以折姦臣之萌也臣聞長老之談皆謂臺諌所言常隨天下公議今者物論沸騰怨言交至公議所在亦知之矣臣恐自兹以往習慣成風盡為執政私人以致人主孤立綱紀一廢何事不生臣願陛下存紀綱者此也先是軾見王安石贊帝以獨斷專任軾因試進士發策以晉武平吳獨斷而克苻堅伐晋獨斷而亡齊桓專任管仲而霸燕噲專任子之而敗事同功異為問安石滋怒使侍御史謝景溫論奏其過誣軾丁憂歸蜀乘舟商販詔下六路捕逮篙工水師窮治無所得軾遂請外通判杭州以鄧綰字文約成都雙流人為侍御史判司農事初綰通判寧州注見前知王安石得君專政乃條上時事數十以為宋興百年習安玩治當事更化言陛下得伊周之佐作青苖免役等法民莫不歌舞聖澤願勿移于浮議而堅行之復貽安石書極其佞諛由是安石力薦于帝遂驛召對除集賢校理檢正中書孔目房鄉人在都者皆笑且罵綰曰笑罵從他笑罵好官還我為之尋同知諫院時新法皆出司農曽布不能獨任其事安石欲藉綰以威衆故有是命五月右諫議大夫吕誨卒誨以疾表求致仕曰臣本無宿疾偶值醫者用術乖方妄投藥劑寖成風痺遂艱行步非祗憚􅏓戾之苦又將虞心腹之變勢已及此為之奈何雖然一身之微固未足恤其如九族之託良以為憂蓋以身疾喻朝政也至是病亟司馬光往省之至則目已瞑聞光哭張目彊視曰天下事尚可為君實勉之遂卒髙麗來貢髙麗為遼所阻不通中國者四十二年自仁宗天聖八年入貢至是為四十二年諸書作四十三年者誤至是福建轉運使羅拯字道濟祥符人令商人黃真澠水燕談作慎招接通好髙麗王徽乃因真還移牒福建願備禮朝貢拯以聞朝議謂可結以謀遼乃命拯諭意至是徽遂遣其民官侍郎金悌髙麗史作覲澠水燕談作第及朴寅亮字代天竹州人等由登州入貢後請改由明州從之自是與中國復通聘貢相繼罷知開封府韓維保甲法行鄉民憂無錢買弓矢加以傳惑徙之戍邊父子聚泣維時知開封上言諸縣團結保甲鄉民驚擾至有截指斷腕以避丁者乞候農隙排定帝以問安石安石對曰此固未可知就令有之亦不足怪大抵保甲法不特除盜用可漸習為兵且省財費惟陛下果斷不恤人言以行之帝遂變河東北陜西三路義勇如府畿保甲法安石由此益惡維維力辭安石因言維善附流俗以非上所建立乞允其請㑹文彥博求去帝曰密院事劇當除韓維佐卿明日維奏事殿中以言不用方請外郡帝曰卿東宫舊人當留輔政維對曰使臣言得行賢于富貴若緣攀附舊恩以進非臣之願也乃出知襄州六月知蔡州歐陽修致仕修以風節自持既連被汚衊年六十即乞謝事及守青州上疏請止散青苖錢帝欲復召執政王安石力詆之乃徙蔡州至是求歸益切馮京請留之安石曰修附麗韓琦以琦為社稷臣如此人在一郡則壞一郡在朝廷則壞朝廷留之安用乃以太子少師致仕貶富弼官徙判汝州弼判亳州青苗法行弼謂如是則財聚于上人散于下持不行提舉官趙濟劾弼沮格詔㫖鄧綰乞付有司鞫治乃落弼武寧節度使同平章事以左僕射移判汝州王安石曰弼雖責猶不失富貴昔鯀以方命殛共工以象恭流弼兼二罪止奪使相何由沮姦帝不答弼行過應天謂判府張方平曰人固難知也方平曰謂王安石乎亦豈難知者方平頃知皇祐貢舉或稱其文學辟以考校既至院中之事皆欲紛更方平惡其為人檄之使出自是未嘗與語弼有愧色蓋弼亦素喜安石也秋七月貶御史中丞楊繪字元素綿竹人知鄭州監察御史裏行劉摯字莘老東光人監衡州鹽倉初繪言提舉常平張靚等科配助役錢一户多者至三百千乞少裁損以安民心不聼時賢士多引去以避王安石繪又上疏言老成人不可不惜當今范鎮吕誨歐陽修富弼司馬光王陶等皆引疾致仕或自求散地陛下可不思其故乎安石聞而深惡之摯由檢正中書禮房才月餘拜監察御史裏行摯為安石所器入見時帝褒諭之曰卿從學王安石邪安石極稱卿器識摯曰臣東北人少孤獨學不識王安石也始就職即陳率錢助役十害㑹繪亦言助役之難行者有五于是安石大怒使知諌院張璪初名琥字邃明洎之孫取繪摯所論作十難以詰之璪辭不為曽布請為之且劾繪摯欺誕懷向背詔下其疏于繪摯使各言狀繪録前後四奏以自辨摯奮然曰為人臣豈可壓于權勢使天子不知利害之實即條對所難以伸其說略曰臣待罪言責采士民之說以開職也今乃遽令分析交口相直無乃辱陛下耳目之任哉所謂向背則臣所向者義所背者利所向者君父所背者權臣願以臣章并司農奏宣示百官考定當否不報明日復上疏論之略曰陛下夙夜勵精以親庶政天下未致于安且治者誰致之邪即自以太平為己任得君專政者是也二三年間開闔搖動舉天地之內無一民一物得安其所者其議財則市井屠販之人皆召至政事堂其征利則下至厯日而官自粥之推此以往不可究言輕用名器清混賢否忠厚老成者擯之為無能俠少儇辨者取之為可用守道憂國者謂之流俗敗常害民者謂之通變凡政府謀議經畫除用進退獨與一掾屬曽布者論定然後落筆同列預聞反在其後故奔走乞丐之人布門如市今西夏之疑未入反側之兵未安三邊瘡痍流潰未定河北大旱諸路大水民勞財乏縣官減耗聖上憂勤念治之時而政事如此皆大臣誤陛下而大臣所用者誤大臣也疏奏安石欲竄摯嶺外帝不許詔貶繪知鄭州謫摯監衡州鹽倉璪亦落職遣察訪使遍行諸路促成役書先是衡州倉吏綱兵姦利相市鹽中美惡相雜逺人未嘗食善鹽摯至悉心核視且儲其羡以為賞弊去什七父老目為學士鹽八月以王雱字元澤安石子為崇政殿說書雱為人慓悍隂刻無所顧忌性敏甚年十三時得秦卒言洮河事嘆曰此可撫而有也使西夏得之則敵强而邊患博矣故安石聞王韶開熙河議因力主之未冠已著書數十萬言舉進士調旌德唐縣今屬寧國府尉雱氣豪睥睨一世不能作小官安石執政所用多少年雱亦欲預選乃與父謀曰執政子雖不可預事而經筵可處安石欲帝知而自用乃以雱所作䇿及注道德經鋟板鬻于市遂傳達于帝鄧綰曾布又力薦之召見授太子中允崇政殿說書安石更張政事雱實導之雱嘗稱商鞅為豪傑之士且言不誅異議者則法不行安石一日與程皓語雱囚首跣足携婦人冠以出問父所言何事曰以新法為人所沮故與程君議之雱大言曰梟韓琦富弼之首于市則法行矣安石遽曰兒誤矣皓曰方與參政論國事子弟不可預姑退雱不樂命王韶主洮河安撫司事時議取河湟自古渭寨接青唐注俱見前武勝軍本唐臨州沒于吐蕃號武勝軍今蘭州府狄道州是應招納蕃部市易募人營田等事並令王韶主之韶至秦會諸將以蕃部俞龍珂在青唐最大渭源羌與夏人皆欲羈縻之議先致討詔因按邊引數騎直抵其帳諭以成敗遂留宿明旦兩種皆遣其豪隨韶以東龍珂率其屬十二萬口內附自言平生聞包中丞朝廷忠臣乞賜姓包氏帝如其請賜名順九月粥坊場河渡祠廟冬十月以鮮于侁字子駿閬州人為利州轉運副使初詔監司各定所部助役錢數利州路轉運使李瑜欲定四十萬侁時為判官爭之曰利州民貧地瘠半此可矣瑜不從遂各為奏帝是侁議諭司農曽布使頒以為式因黜瑜而擢侁副使兼提舉常平侁惡王安石沽激要君嘗語人曰是人若用必壞亂天下及安石用事侁乃上書論時政以為逆治體而召民怨者不可概舉其意專指安石安石怒毁短之帝稱其有文學可用安石曰何以知之帝曰有章奏在安石乃不敢言既為副使部民不請青苖錢安石遣吏責之侁曰青苗之法願取則與民不自願豈能彊之哉蘇軾稱侁上不害法中不廢親下不傷民以為三難立太學生三舍法初國子生以京朝七品以上子孫應䕃者為之太學生以八品以下若庶人之俊異者為之試藝如進士法及帝即位尤垂意儒學自京師至郡縣既皆有學至是因言者論太學假錫慶院西北廊甚狹隘乃盡以錫慶院及朝集院西廡廣太學增直講為十二員率二員共講一經生員釐為三等始入太學為外舍定額為七百人外舍升入內舍員三百內舍升上舍員百各執一經從所講官受學月考試其業優等以次升舍上舍免發解及禮部試召試賜第其正録學諭宋史職官志國子監正録各五人秩正九品舉行學規學諭秩亦正九品俱以上舍生為之經各二員學行卓異者主判直講復薦之于中書除官其後增置八十齊齊三十人外舍生至二千人嵗一試補內舍生間嵗一試補上舍生彌封謄録如貢舉法文獻通考真宗景德中始令禮部糊名考校祥符八年制謄録院壬子五年春正月置京城邏卒察謗議時政者收罪之三月南平王李日尊公藴之孫死子乾德嗣日尊既死乾德遣使來告哀詔封乾德為交址郡王判汝州富弼致仕弼至汝州兩月即上言新法臣所不曉不可以治郡願歸洛養疾許之遂請老復授司空武寧節度使致仕弼雖家居朝廷有大利害知無不言帝雖不盡用而眷禮不衰常因王安石有所建明却之曰富弼手疏稱老臣無所告訴但仰屋竊嘆者即當至矣其敬之如此行市易法自王韶倡為緣邉市易之說王安石善之以為與漢平準法同可以制物低昻而均通之遂用草澤魏繼宗議以內藏庫錢帛置市易務于京師凡貨之可市及滯于民而不售者平其價市之願以易官物者聼若次市于官者則度其田宅或金帛為抵當而貸之錢責期使償半嵗輸息十一及嵗倍之過期不輸息外每月更加罰錢以户部判官吕嘉問為提舉嘉問上建置十三事其一欲于律外禁兼并之家輒取利帝去之安石執不可已而帝聞其太煩碎人皆怨讟欲罷之以問安石安石對曰立法當論冇害于人與否不當以煩碎廢也自是諸州上供薦席黃蘆之類六十色悉令計直從民願粥者市之以給用尋改提舉在京市易務為都提舉市易司秦鳯兩浙黔州成都廣州鄆州六市易司皆𨽻焉夏五月詔宗室非袒免親者許應舉初試黜其不成文理者餘令覆試纍覆不中者亦量才擢用行保馬法王安石建保甲養馬之法文彥博吳充以為不便安石持論益堅乃詔曽布等上其條約保甲願養馬者户一匹物力髙願養二匹者聼皆以監牧見馬給之或官與其直令自市先行于開封府及陜西五路府界無過三千匹五路無過五千匹襲逐盜賊外乘越三百里者有禁嵗一閲其肥瘠死病者補償在府界者免輸糧草二百五十末加給以錢布在五路者嵗免折變緣約錢三等以上十户為一保四等以下十户為一社以待病斃逋償者保户馬死保户獨償社户馬死社户半償之其後遂偏行于諸路王安石求去位帝不許先是樞密都承㫖李評喜論事帝多從其言又嘗極言助役不便安石惡之會評妄奏罷閣門官吏安石言其作威福必欲罪之帝亦謂評有罪然未始罪評也明日安石入見乞東南一郡帝曰自古君臣如卿與朕相知極少朕鄙鈍初未有知自卿在翰林始聞道德之說心稍開悟天下事方有緒卿何去安石固請帝曰卿得非以李評事謂朕有疑心朕自知制誥知卿屬以天下事如吕誨比卿少正卯盧杞朕不為惑豈更有人能惑朕者未幾安石復自齎表入請帝不視以表授安石固令就職秋閏七月以章惇為湖北察訪使時帝思用兵以威四夷湖北提㸃刑獄趙鼎上言峽州宋蠻州非歸峽之峽州也峒酋刻剝無度蠻衆願內附辰州布衣張翹亦上書言南北江利害北江彭氏有州二十已見前南江諸蠻舒氏有州四曰敘峽中勝元則田氏有州四曰奬錦懿晃向氏有州五曰宿龍保順天賜古則地俱在今辰沅二府界遂詔中書檢正官章惇察訪荆湖北路經制蠻事八月王韶擊吐蕃敗之遂城武勝秦鳯駐洎都監宋置諸路都監有禁兵駐泊其地者以駐泊冠之張守約字希參濮州人請名古渭寨為軍以根本隴右詔從之遂建為通逺軍使王韶知軍事以圗武勝韶引兵築乞神平堡在渭源縣西南蕃酋瑪爾舊作抹耳今改結日巴舊作水巴今改等族入寇韶率兵度竹牛嶺在狄道州東逼之斬首百餘級焚其廬帳洮西震動瑪爾戬渡河來寇瑪爾依其聲勢保集瑪爾本山在狄道州南舊作抹邦今改知德順軍宋置今靜寧州景思立普州人以涇原兵出南路遣將分擊瑪爾于南甲在狄道州南擊瑪爾戬于古凌城吐蕃所築在狄道州西南舊作鞏令今改使不得動韶將大軍從東谷河名在狄道州東出渭源縣西南流入洮河徑趨武勝未至數里賊迎戰敗還追至其城首領轄裕勒舊作瞎藥今改棄城遁餘衆出降遂城武勝建為鎮洮軍時瑪爾戬亦敗于古凌城初韶言措置洮河尺用回易息錢未嘗輒費官本文彥博曰工師造物初必小計冀人易于動工及既興作知不可已乃方增多帝曰屋壞豈可不修王安石曰主者善計自有忖度豈為工師所欺也彥博乃不復言由是韶進討敢肆欺誕朝廷不與計財觀文殿學士致仕歐陽修卒諡文忠修既致仕樂潁川風土遂居焉自號六一居士初修以薛居正所進五代史開寶中進共一百五十卷繁猥失實重加修定共七十五卷藏于家是嵗有詔取其書而修己卒詔刋行之修天資剛徑見義勇為平生奬引後進如恐不及賞識之下率為聞人及在政府士大夫有所干請輒面諭可否雖臺諌論事亦必以是非詰之怨誹益衆自五代以來文體卑弱修遊隨州得唐韓愈遺稿讀而心慕之苦心探賾至忘寢食遂以文章名冠天下學者翕然師尊之貶唐坰錢塘人為潮州别駕坰以父任得官坰父詢判太常寺進給事中嘗上書言秦二世制于趙髙乃失之弱非失之彊帝悅其言又言青苗法不行宜斬大臣異議如韓琦者數人王安石尢喜之薦使對賜進士出身為崇文校書安石復令鄧綰舉為御史遂除太子中允將用為諌官安石疑其輕脫將背已立名不除職以本官同知諌院非故事也坰果怒安石易已凡奏二十疏論時事皆留中不出坰乃因百官起居日扣陛請對帝令諭以他日坰伏地不起遂一召升殿坰至御座前進曰臣所言皆大臣不法請對陛下一一陳之乃搢笏展疏目安石曰王安石近御座聽劄子安石遲遲坰呵曰陛下前猶敢如此在外可知安石竦然而進坰大聲宣讀凡六十條大抵言安石專作威福曽布表裏擅權天下但知憚安石不復知有陛下文彥博馮京知而不敢言王圭曲事安石無異厮僕且讀且目圭圭慙懼俯首先降又言薛康陳繹字和叔開封人安石頤指氣使無異家奴張璪李定為安石爪牙張商英字大覺蜀州新津人乃安石鷹犬逆意者雖賢為不肖附己者雖不肖為賢至詆安石為李林甫盧杞帝屢止之坰慷慨自若略不退懾讀已下殿再拜而退侍臣衛士相顧失色閣門糾其瀆亂朝儀貶潮州别駕頒方田均稅法帝患田賦不均詔司農重定方田及均稅法頒之天下方田之法以東西南北各一千步當四十一頃六十六畝一百六十步為一方歲以九月縣委令佐分地計量隨陂原平澤而定其地因赤淤黑壚而辨其色方量畢以地及色參定肥瘠而分五等以定其稅則至明年三月畢揭以示民均稅之法縣各以其租額稅數為限舊嘗收蹙竒零如米不及十合而收為升絹不滿十分而收為寸之類今不得用其數均攤增展致溢舊額凡越額增數皆禁若瘠鹵不毛及衆所食利山林陂塘溝路墳墓皆不立稅凡方田之角立土為峯植其野之所宜木以封表之有方帳有莊帳有甲帳有户帖其分烟析産典賣割移官給契縣置簿皆以今所方之田為正令既具乃以巨野縣尉王曼為指教官先自京東路行之諸路倣焉九月少華山崩山在今同州府華州東南與太華峯勢相連而稍低故名少華雍大記少華山有峯曰阜頭即宋熙寧五年崩處其崩山遺址名半截山其下地裂陷民居數百户冬十月置熙河路以王韶為經略安撫使置熙河路領熙河洮岷州及通逺軍注俱見前升鎮洮軍為熙州以韶為經略安撫使兼知熙州然河洮岷三州猶未復也十一月章惇招降梅山峒蠻置安化縣今縣屬長沙府梅山其在西南與寶慶府新化縣接界在新化者曰上梅山在安化者曰下梅山梅山峒蠻蘇氏舊不通中國其地東接潭南接邵西接辰北接鼎灃章惇招降之籍其民萬四千八百餘户其田二十六萬四百餘畝均定其稅使嵗一輸築武陽開峽二城在安化新化二縣界置安化縣𨽻邵州癸丑六年春二月王韶克河州獲瑪爾戬妻子以沈起字興宗明州鄞縣人知桂州自王安石用事始求邊功知雍州蕭注喜言兵羡王韶等獲髙位乃上疏言交址雖奉朝貢實包禍心失今不取必為後憂㑹交人為占城所敗或言其餘衆不滿萬取之易詔即以注知桂州經略之注入朝帝問攻取之䇿注復以為難度支判官沈起言南交小醜無不可取之理乃以起代注起受㫖于安石遂一意事攻擾交址始二夏四月甲戌朔日食先是司天奏四月朔日當食帝自三月即避殿減膳降天下罪囚一等至是雲隂日不見王安石等進賀以為聖德所感乞御殿復膳從之文彥博罷彥博久居樞密以王安石多變舊典言于帝曰朝廷行事務合人心宜兼采衆論以靜重為先陛下勵精求治而人心未安蓋更張之過也祖宗法未必皆不可行但有偏而不舉之弊爾安石知為已發奮然排之曰求去民害何為不可若萬事隳脞乃西晉之風何益于治及市易司立至果實亦官監賣彥博以為損國體斂民怨致華嶽山崩為帝極言之安石曰華山之變殆天意為小人發市易之起自為細民久困以抑兼并爾于官何利焉彥博求去益力遂為司空河東節度使判河陽徙大名府身雖在外而帝眷有加置律學詔士之臣官以法從事今所習非所學宜置律學令官舉人皆得入學習律令以范子淵提舉濬河司河溢北京夏津唐縣今屬東昌府帝語執政聞京東調夫修河有壞産者且河決不過占一河之地或西或東利害無所校聼其所趨如何王安石曰北流不塞占公私田至多又水散漫久復澱塞昨修二股費至少而公私田皆出向之㵼鹵俱為沃壤庸非利乎況調夫已減于去嵗若復葺理隄防則夫愈減矣帝從之先是有選人李公義者獻鐵龍爪揚泥車法以濬河其法用鐵為爪形繫舟尾乘流相繼而下一再過水深數尺宦官黃懷信以為可用而患其太輕安石請令懷信公義同議增損乃别置濬川杷其法以巨木長八尺齒長一尺列于水下如把狀以石壓之兩傍繫大船各用滑車絞之撓蕩泥沙或謂水深則杷不及底淺則齒礙泥沙人皆知不可用惟安石善其法乃賞懷信而命公義官以杷法下大名令子淵與通判知縣共試之皆言不可用會子淵以事至京師安石問其故子淵意附㑹遽曰法誠善第同官議不合爾安石大悅乃置濬河司將自衛州濬至海口差子淵為都大提舉公義為之屬六月置軍器監王雱言今天下甲胄弓弩以千萬計而無一堅利者莫若更置其法斂數州之所作而聚以為一若今錢鹽之比擇知工事之臣使典其職且募良工為匠師帝頗采雱說置軍器監總內外軍器之政以吕惠卿判監事知南康軍周敦頤字茂叔道州營道人卒敦頤初因舅鄭向字公明開封陳留人任為分寧唐縣今南昌府寧州是主簿有獄久不決敦頤至一訊立辨邑人驚曰老吏不如也調南安今江西南安府宋為南安軍司理有囚法不當死轉運使王逵欲深治之敦頤力與辨逹不聼敦頤委手板將棄官去曰如此尚可仕乎殺人以媚人吾不為也逵悟囚得釋調桂陽宋置今屬郴州令改知南昌富家大姓黠吏惡少惴惴畏法且又以汙穢善政為恥歷知南康軍年五十七而卒敦頤博學力行著太極圖易通明天理之根源究萬物之終始言約而道大文質而義精得孔孟之本原大有功于學者為南安司理時通判程珦羽之孫以其為學知道使二子皓頤往受業敦頤每令尋孔顔樂處所樂何事皓嘗曰自再見周茂叔後吟風弄月以歸有吾與㸃也之意既至南康即築室于蓮花峯廬山之峯在今九江府德化縣下前有溪合于湓江即湓浦注見前取營道漢縣明省故城在今永州府道州所居濓溪在今道州西南流入瀟水以名之學者稱為濓溪先生大蝗秋九月初策武舉之士凡武舉試義策于祕閣武藝于殿前司及殿試則又試騎射及䇿于庭策武藝俱優為右班殿值武藝次優為三班奉直又次借職末等三班差役初樞密院修武舉法不能答䇿者答兵書墨義王安石曰武舉而試墨義何異學究誦書不曉理者無補于事先王收勇力之士皆屬于車右者欲以備禦侮之用則記誦何所施帝從之至是始䇿武舉之士吐蕃瑪爾戬復入河州王韶破走之取岷宕即唐宕州古宕昌也注見前洮疊即唐疊州後沒吐蕃故城在今鞏昌府洮州㕔四城帝御殿受賀韶既復河州降羌復入韶趨擊之瑪爾戬以其間據河州韶進破格納舊作訶諾今改密藏舊作木藏今改城二城皆吐蕃所置格納城在河州南宋改名定羌密藏城在州西南穿露骨山在今河州西南接洮州蕃界石如骨露故名又四時積雪亦曰雪山南入洮州境道狹隘釋馬徒行或日至六七瑪爾戬留其黨守河州自將尾官軍韶力戰破走之河州復平岷山首領摩琳沁舊作木令征今改以城降韶入之于是宕洮疊三州羌酋皆以城附韶軍行五十四日涉千八百里得州五斬首數千級獲牛羊馬以萬計捷書至帝御紫宸殿受賀解所服御帶賜王安石進韶左諌議大夫端明殿學士收免行錢先是京師百物有行官司所須俱以責辦下逮貧民浮販類有賠折吕嘉問請約諸行利入厚薄令納錢以賦吏祿與免行户祗應而禁中賣買百貨並下雜買埸務仍置市司估物低昻凡內外官司欲占物價則取辨焉至是行之冬十月開直河時河北流閉已久水或橫決散漫常虞壅遏外都水監丞王令圖獻議于大名第四第五掃等處開修直河使大河還二股故道時河流潰溢己不循二股初行之道故欲開直河以復之考此即後回河之議所由始王安石主其議言于帝曰開直河則水勢分其不可開者以近河每開數尺即見水不容施功爾今第見水即以濬川杷濬之苟置數干杷則諸河淺澱皆非所患嵗可省開濬之費幾百千萬帝曰果爾甚善乃命開直河使范子淵領其事章惇擊南江蠻平之置沅州今為府屬湖南湖北蠻向永晤舒光銀各以其地降惇獨田氏有元猛者頗桀驁惇進兵破懿州五季馬氏置後為田氏所據南江州峒悉平遂置沅州以懿州新城為治所後誠徽州五季蠻峒有誠徽州楊氏居之誠州即今靖州徽州即今靖州屬之綏寧縣蠻酋楊光富亦率其族姓二十三州峝歸附因置誠州後改靖州考靖州崇寧二年始改續綱目類敘于此而于崇寧二年又復載之事屬重復今刪後條而并載于此又誠徽州今改正誤作城徽州今改正行折二錢自王安石為政始罷銅禁姦民日銷錢為器邊關海舶不復譏錢之出國錢日耗張方平因對極論其害請詰問王安石舉纍朝令典一旦削而除之其意安在安石深惡之至是行折二錢除在京及府界外諸路並通行甲寅七年春正月熊本字伯通鄱陽人討瀘夷瀘州夷也降之先是瀘夷叛詔以本為梓䕫察訪使得以便宜措置諸夷事本嘗通判戎州注見前習夷中俗及至部以夷人擾邉皆介村豪為鄉導乃以計致百餘人梟之瀘川隨縣瀘州治元省入州其徒股栗願矢死自贖獨柯隂本唐縣屬羈縻晏州後為蠻所據地在今瀘州江安縣西南一酋不至本率軍進討柯隂窘迫乞降本受之盡籍丁口土田及其重寶善馬歸之公上受貢職于是淯井在叙州府長寧縣北泉有二脉一鹹一淡取以煎鹽宋初為淯水夷所居後置監于此長寧唐羈縻州後沒于夷人獻地建為軍宋以改縣今屬叙州府烏蠻羅氏鬼主宋史瀘夷傳鳥蠻王得蓋居姚州授刺史得蓋死其子竊號羅氏鬼主瀘姚州宋羈縻州屬州諸夷皆願世為漢官本還帝勞之曰卿不傷財不害民一旦去百年之患至于檄奏詳明近時鮮儷擢集賢殿修撰賜三品服西南用兵自此始二月知河州景思立與吐蕃别將戰于踏白城在河州西北敗死三月瑪爾戬寇岷州刺史髙遵裕擊走之瑪爾戬雖屢破敗棟戬别將青伊克舊作青宜今改結果莊舊作鬼章今改復數擾河州屬蕃時王韶入朝思立與戰于踏白城敗死瑪爾戬勢復熾遂寇岷州遵裕遣包順擊走之遼使人來議疆事遣太常少卿劉忱報之遼以河東路沿邉增修戍壘起鋪舍侵入蔚應朔三州界內使林牙遼官名掌文告蕭禧來言乞行毁撤别立界至禧歸帝面諭以三州地界俟遣官與北朝官即境上議之遂詔忱如遼遼遣樞密副使蕭素會忱于代州境上詔下樞密院議且手詔判相州韓琦司空富弼判河南府文彥博判永興軍曽公亮條代北事宜以聞琦言臣觀近年朝廷舉事似不以大敵為恤彼見形生疑必謂我有復燕之意故引先發制人之說造為釁端所以致疑其事有七招髙麗朝貢一也取吐蕃之地建熙河二也植榆栁于西山以制蕃騎三也創保甲四也築河北城池五也置都作院頒弓矢新式六也置河北三十七將七也契丹素為敵國因事起疑不得不然臣嘗竊計始為陛下謀者必曰治國之本當先聚財積榖募兵于農則可以鞭箠四夷故散青苖錢為免役法置市易務次第取錢新制日下更改無常而監司督責以刻為明今農怨于畎畝商歎于道路長吏不安其職陛下不盡知也夫欲攘斥四夷以興太平而先使邦本困搖衆心離怨此則為陛下始謀者大誤也臣今為陛下計宜遣報使且言向來興作乃修備之常疆土素定悉如舊境不可持此造端以隳纍世之好可疑之形如將官之類因而罷去益養民愛力選賢任能使天下悅服邉備日充若其果自敗盟則可一振威恢復故疆攄纍朝之宿憤矣弼彥博公亮亦皆有言大抵度上以虜為憂故深指時事云大旱詔求直言夏四月權罷新法雨自去秋七月不雨至夏四月帝憂形于色欲盡罷法度之不善者王安石曰水旱常數堯湯所不免但當修人事以應之帝曰朕所以恐懼者正為人事之未修爾今取免行錢太重人情咨怨自近臣以至后族無不言其害者馮京曰臣亦聞之安石曰士大夫不逞者以京為歸故京獨聞此言臣未之聞也翰林學士韓維言陛下損膳避殿乃舉行故事恐不足以應變當痛自責已廣求直言帝即命維草詔行之初光州司法參軍鄭俠字介夫福州福清人以秩滿入京俠先為安石所奬拔感其知己思欲盡忠及入京安石問以所聞俠曰青苗免役保甲市易數事與邉鄙用兵在俠心不能無區區也安石不答久之監安上門㑹嵗饑征斂苛急東北流民每風沙霾曀扶攜塞道羸疾愁苦身無完衣或茹木實草根至身被鎖械而負瓦揭木賣以償官纍纍不絶俠乃繪所見為圖并疏陳時政之失詣閣門不納遂假稱密急發馬遞上之銀臺司且云陛下觀臣之圖行臣之言十日不雨即乞斬臣宣德門外以正欺君之罪疏奏帝反覆觀圖長吁數四袖以入內是夕寢不能寐翌日遂命開封體放免行錢三司察市易司農發常平倉三衛具熙河所用兵諸路上民物流散之故青苖免役權息追呼方田保甲並罷凡十有八事民間歡呼相賀是日果大雨逺近沾洽下監安上門鄭俠獄復行新法輔臣入賀雨帝示以俠所進圖狀且責之皆再拜安石上章求去外間始知所行之由羣姦切齒遂以俠付御史治其擅發馬遞罪吕惠卿鄧綰言于帝曰陛下數年忘寢與食成此美政天下方被其賜一旦用狂夫之言罷廢殆盡豈不惜哉相與環泣于帝前于是新法一切如故惟方田暫罷吐蕃木征圍河州王韶擊降之木征圍河州其勢甚盛韶自京師還至興平注見前聞之乃與李憲宦者祥符人日夜馳至熙州熙方城守韶命撤之選兵得二萬人諸將欲趨河州韶曰賊所以圍城者恃有外援也攻其所恃則圍自解乃直趨定羌城注見前破西蕃結河川族斷夏國通路進臨寧河宋寨以吐蕃香子城置在今河州南分命偏將入南山木征知援絶拔柵去韶還熙州以兵循西山繞踏白城後焚賊八十帳斬首七千餘級木征窮蹙率酋長八十餘人詣軍門乞降韶受之送木征赴京師初思立之覆師也羌勢復熾朝議欲棄熙河帝為之旰食數下詔戒韶持重勿出及是帝大喜以木征為營州團練使賜姓名趙思忠王安石免以韓絳同平章事吕惠卿參知政事安石執政六年更法度開邉疆老成正士廢黜殆盡儇慧少年超擢用事天下怨之而帝倚任益專太皇太后嘗乘間語帝曰祖宗法度不宜輕改吾聞民間甚苦青苖助役宜罷之帝曰此以利民非苦之也后又曰安石誠有才學然怨之者益衆欲保全之不若暫出之于外帝曰羣臣惟安石為國家當事時帝弟岐王皓在側因進曰太后之言至言也不可不思帝怒曰是我敗壞天下邪汝自為之皓泣曰何至是邪皆不樂而罷英岐王皓字仲明宗第二子久之太后流涕謂帝曰安石亂天下奈何帝始疑之及鄭俠疏進安石不自安遂求去位帝再四勉留安石請益堅乃以觀文殿大學士知江寧府吕惠卿使其黨變姓名日投匭留之安石感其意因乞韓絳代已而惠卿佐之帝從其請二人守安石成規不少失時號絳為傳法沙門惠卿為護法善神惠卿懼中外有議新法者乃作書遍遺監司郡守使陳利害又從容白帝下詔言終不以吏違法之故為之廢法故安石所建無所更改初𣙜蜀茶王韶建開河湟之策遣三司幹當公事李杞入蜀經畫買茶于秦鳳熙河博馬貿易也以著作佐郎蒲宗閔同領其事初蜀之茶園皆民兩稅地不植五榖惟宜種茶賦稅一例折輸稅額總三十萬杞乃即蜀諸州創設官場更嚴私交易之令知彭州吕陶言市易司籠制百貨嵗出息錢不過十之二今茶埸司盡榷民茶取息十之三茶户被害不可勝窮詔止取息十之一而陶遂以是得罪五月罷制科自孔文仲對策忤王安石意因言于帝曰進士試䇿則是制科何必復置是邪帝然之吕惠卿執政復言制舉止于記誦非義理之學遂詔罷之三司使曽布提舉市易司吕嘉問免先是吕嘉問提舉市易連以羡課受賞帝聞其擾民以語王安石安石對曰嘉問奉法在公以是媒怨帝曰免行錢所收細瑣市易鬻及果實氷炭太傷國體安石力辨至譏帝為叢脞不知帝王大略帝曰即如是士大夫何故以為不便安石請言者姓名令嘉問條析時市易𨽻三司嘉問恃勢陵使薛向出其上及曽布代向懷不能平㑹帝出手札詢布布訪于魏繼宗具上嘉問多收息于賞挾官府而為兼并之事帝將委布考之安石言二人有私忿于是詔布與惠卿同治惠鄉故憾布脅繼宗使誣布繼宗不從布言惠卿不可共事帝欲聼之安石不可帝遂詔中書曰朝廷設市易本為平準以便民若周官泉府者今顧使中人之家失業若此吾民安得泰然也宜釐定其制布見帝言曰臣每聞德音欲以王道治天下今市易之為虐駸駸乎間架除陌之事矣如此之政書于簡牘不獨唐虞三代所無歷觀秦漢以來衰亂之世恐未之有也嘉問又請販鹽鬻帛豈不貽笑四方帝頷之事未决安石去位嘉問持之以泣安石勞之曰吾已薦惠卿矣及惠卿執政遂治前獄劾布沮新法出知饒州嘉問亦出知常州以章惇為三司使六月作渾儀浮漏成時日官皆市井傭販法象圖器俱不能知乃以太常丞沈括字存中錢塘人提舉司天監括博學洽聞于天文方志律厯醫藥卜算無所不通皆有論著乃上渾儀浮漏景表三議詔從其說令更造至渾儀浮漏成以括為右正言宋史天文志括渾儀之制在外者曰體其次曰象在內者曰璣衡體之為器為圓規者四其規之别一曰經經之規二二曰緯緯之規一三曰紘紘之規一象之為器為圓規者四其規之别一曰璣璣之規二二曰赤道赤道之規一三曰黃道黃道之規一璣衡之為器為圓規二璣可以左右衡可以低昂浮漏之制為播水之壺三曰求壺復壺廢壺受水之壺一曰建壺求壺進水達于復壺復壺之脅為枝渠以為水節枝渠廢水注于廢壺三壺皆所以播水為水制也自復壺之介以玉權釃于建壺建壺所以受水為刻者也又考天文志所載甚繁不能備録今略節其槩作注考天文志括議止言四壺而括本傳乃作五壺續綱目因之及考括筆談云熙寧中更造渾儀創為玉壺浮漏銅表皆置天文院據此則五壺當是玉壺之訛今依柯維騏宋史新編削五壺二字而以筆談所載附注于此秋七月立手實法時免役出錢或未均吕惠卿用其弟曲陽注見前縣尉和卿計創手實法其法官為定立物價使民各以田畝屋宅資貨畜産隨價自占凡居錢五當蕃息之錢一非用器食粟而輒隱落者許告有實以三分之一充賞預具式示民令依式為狀縣受而籍之以其價列定髙下分為五等既該見一縣之民物産錢數乃參會通縣役錢本額而定所當輸錢詔從其言于是民家尺椽寸土檢括無遺至于雞豚亦遍抄之民不聊生初惠卿雖制是法然猶災傷五分以上不預􅍮湖察訪使蒲宗孟上言此天下之良法使民自供初無所擾何待豐嵗願詔有司勿以豐凶弛張其法從之民于是益困矣蒲宗孟字傳正閬州新井人九月三司火焚屋千八十楹案牘殆盡詔諸路熙寧五年文帳悉封上防其因火為姦也冬十月置三司會計司初帝嘗患增置官司費財王安石謂增置官司所以省費帝曰古者什一而稅今取財百端安石謂古非特什一而已安石又欲盡祿天下之吏帝未之許而三司上新增吏祿嵗至緡錢百十一萬有竒主新法者皆謂吏祿既厚則人知自重不敢冒法可以省刑然良吏實寡賕取如故往往陷重辟議者不以為善詔三司帳司㑹計是嵗天下財用出入之數以聞令宰相提舉其事至是韓絳請選官置司以天下户口人丁稅賦場物坑冶河渡房園之類租額年課及一路錢榖出入之數去其重復嵗比較增虧廢置及羡餘橫費計贏闕之處使有無相通而以任職能否為黜陟則國計大綱可以省察三司使章惇亦以為言乃詔置三司會計司以絳提舉遼女真部節度使烏古鼐舊作烏古乃今改後仿此卒烏古鼐之先曰函普自髙麗來居完顔部金史世紀函普來完顔年已六十餘部人有賢女亦年六十而未嫁乃納之生二子一女凡六傳而至烏古鼐稍役屬諸部會五國城名在今寧古塔東北遼時自此而東凡五國故名蒲聶部節度使拔乙門叛遼遼將致討烏古鼐襲而擒之獻于遼主遼主召見燕賜加等以為生女真部節度使始有官屬紀綱漸立然不肯受印繫遼籍其部內舊無鐵鄰國有以甲胄往粥者以厚價售之得鐵既多因以修弓矢備器械兵勢稍振前後願附者衆至是五國沒撚部謝野復叛遼阿庫納伐之謝野敗走烏古鼐將見遼將自陳敗謝野之功行次來流水金史地理志上京會寧府有來流河金㑹寧府今寧古塔地有疾而卒後金追贈景祖子合理博今改舊作劾里鉢今改後仿此嗣金源事始見此乙卯八年春正月竄鄭俠于英州罷參知政事馮京放祕閣校理王安國字平甫安石之弟于田里俠上疏論吕惠卿朋黨壅蔽仍取唐魏徴姚崇宋璟李林甫盧杞傳為兩軸題曰正直君子邪曲小人事業圖迹在位之臣與之暗合者各以其類復為書獻之且薦馮京可相并言禁中有人披甲登殿詬罵等事惠卿奏為訕謗令中丞鄧綰知制誥鄧潤甫字溫伯江西建昌人治之遂編管俠于汀州京在政府嘗與惠卿爭辨而王安石弟安國素與俠善侍御史張璪承惠卿㫖劾京與俠交通有迹時俠已行惠卿遂令奉禮郎舒亶字信道明州慈溪人往捕遇于陳州搜其篋得所録名臣諫疏先是御史臺吏楊忠信謁俠曰御史緘默不言而君上書不已是言貴在監門而臺中無人也取懷中名臣諫疏二帙授俠曰以為正人助及是遂搜得之有言新法事及親朋書尺悉按姓名治之獄成惠卿欲致俠以死帝曰俠所言非為身也忠誠亦可嘉豈宜深罪但徙英州京罷政出知毫州安國奪祕閣校理放歸田里初安國任西京國子教授秩滿至京師帝以安石故特召對問曰漢文帝何如主安國對曰三代之後未有也帝曰但恨其才不能立法更制耳安國對曰文帝自代來入未央宫定變故俄頃呼吸間恐無才者不能至用賈誼言待羣臣有節專務以德化曰海內興于禮義幾致刑措則文帝加有才一等矣帝曰王猛佐符堅以蕞爾國而令必行今朕以天下之大不能使人何也曰猛教堅以峻刑法殺人致秦祚不長今刻薄小人必有以是誤陛下者願專以堯舜三代為法則下豈有不從者乎帝又問卿兄秉政外論謂何安國對曰恨知人不明聚斂太急爾帝不悅由是止授崇文院校書尋改祕閣校理安國屢以新法之弊力諫安石又嘗以佞人目惠卿故惠卿銜而逐之二月復以王安石同平章事初吕惠卿迎合安石建立新法安石故力援引驟至執政惠卿既得志忌安石復用遂欲逆閉其途凡可以害安石者無所不用其智安石聞而怨之時韓絳顓處中書事多稽留不決且數與惠卿爭論度不能制密請帝復用安石帝從之安石承命即倍道而進七日至汴京三月遼人復來議疆事遣知制誥沈括報之劉忱等與蕭素㑹于大黃平在代州境三議不能決遼人初指蔚朔應三州分水嶺土壠為界及忱與之行視無土壠乃但云以分水嶺為界凡山皆有分水遼人意至時可以罔取也相持久之至是遼主復遣蕭禧來致國書以忱等遷延為言乃命韓縝代忱等與遼使議縝與禧爭辨或至夜分禧執分水嶺之說不變留館不肯辭曰必得請而後反帝不得已先遣知制誥沈括報聘括詣樞密院閲故牘得頃嵗所議疆地書指古長城為分界今所爭乃黃嵬山在代州崞縣西南接寧武府界相逺三十餘里表論之帝曰大臣殊不究本末幾誤國事乃賜括白金千兩使行括至遼遼相楊遵朂考遼史楊遵朂字益誡范陽人太康初拜南府宰相不言以字行而宋史沈括傳則書字曰契丹相楊益戒今依遼史改書名與議不能屈謾曰數里之地不忍而輕絶好乎括曰師直為壯曲為老今北朝棄先君之大信以威用其民我朝之不利也凡六會竟不可奪乃還括在道圖其山川險易迂直風俗淳龎人情向背為使契丹圖上之夏閏四月陳升之罷升之深狡多數善傅會以取富貴初附安石及拜相即求解條例司世以是議之號為筌相六月王安石上三經新義詔頒于學官先是置經義局訓釋詩書周禮三經以王安石提舉吕惠卿王雱同修撰帝欲召程皓與其事安石不可至是書成上之帝謂安石曰今談經者人人殊何以一道德卿所著經其以頒行使學者歸一遂頒于學官號曰三經新義加安石左僕射吕惠卿給事中王雱龍圖閣直學士雱辭新命惠卿勸帝許之由是王吕之怨益深新義既頒一時學者無敢不傳習主司純用以取士先儒傳注一切廢而不用又黜春秋之書不列學官至詆之為斷爛朝報安石又以字學久不講後罷居金陵作字說二十四卷以進多穿鑿附會其流入于佛老云司徒侍中魏公韓琦卒諡忠獻琦卒前一夕大星隕州治櫪馬皆驚帝自為碑文載琦大節篆其首曰兩朝顧命定䇿元勳贈尚書令後封魏王史臣曰琦相三朝立二帝當治平危疑之際兩宫幾成嫌隙琦處之裕如卒安社稷歐陽修稱其臨大事決大義垂紳正笏不動聲色措天下于泰山之安可謂社稷之臣豈不信哉秋七月太白晝見詔韓縝如河東割地以畀遼遼使爭議疆事不決帝問于王安石安石勸帝曰將欲取之必姑與之于是詔于分水嶺為界禧乃去至是遣天章閣待制韓縝如河東割新疆與之凡東西失地七百里遂為異日興兵之端八月庚寅朔日食韓絳免絳與王安石議事不合以疾求去出知許州而三司會計司亦罷絳臨事果敢故韓琦以為有公輔器而薦用之特以素黨安石為清議所少冬十月吕惠卿有罪免御史蔡承禧論惠卿姦惡惠卿居家俟命中丞鄧綰亦欲彌縫前附惠卿之迹以媚安石安石子雱復深憾惠卿遂諷綰發惠卿兄弟疆借秀州華亭唐縣今為江南松江府治富民錢五百萬與知華亭縣張若濟買田共為姦利事置獄鞫之惠卿竟罷出知陳州綰又論三司使章惇協濟惠卿之姦出知湖州慧星見詔求直言罷手實法慧出軫帝以災異數見避殿減膳詔求直言赦天下詢政事之未協于民者王安石率同列上疏言晉武帝五年慧出軫十年又有孛而其在位二十八年與乙已占所期不合考晉書天文志武帝泰始四年彗星見軫占曰為兵喪非五年又十年有星孛于軫占曰天下兵起是嵗為甲午非乙巳且武帝在位二十六年非二十八年蓋天道逺先王雖有官占而所信者人事而已禆竈言火而驗欲禳之國僑不聼鄭亦不火見左傳事具前有如禆竈未免妄誕况今星工哉竊聞兩宫以此為憂望以臣等所言力行開慰帝曰聞民間殊苦新法安石對曰祁寒暑雨民猶怨咨此無庸恤帝曰豈若并祁寒暑雨之怨亦無邪安石不悅退而屬疾卧帝慰勉起之其黨謀曰今不取上素所不喜者暴進用之則權輕將有窺人間隙者安石是其䇿帝喜其出凡所進用悉從之鄧綰言凡民養生之具日用而家有之今欲盡令疏實則家有告訐之憂人懷隱匿之慮商賈通殖貨利交易有無或春有之而夏已蕩析或秋貯之而冬已散亡公家簿書何由拘録其勢安得不犯徒使嚚訟者趨賞報怨畏怯者守死忍困而已詔罷手實法十一月交址大舉入寇陷欽亷州注俱見前初廣西屯北兵二十指揮以備邉交人畏之㑹沈起坐邊議罷以知處州隋置今為府屬浙江劉彛代之彛至奏罷北兵而用槍杖手分戍聼偏校言以為安南可取乃大治戈船交人來互市率皆遏絶表疏上訴亦不得達至是遂分三道入寇一自廣府一自欽州一自崑崙關連陷欽亷二州殺士丁八千人事聞起坐貶安置郢州而除彛名明年正月交人圍雍州知州事蘇緘悉力拒守外援不至及城陷死之緘命其家三十六人皆先死藏尸于坎乃縱大自焚城中感緘之義無一人降者交人盡屠之凡五萬八千餘口事聞詔贈緘奉國節度使諡忠勇熊本擊渝州獠即古板楯蠻注見前降之置南平軍渝州南川本蠻地唐為縣宋廢復置分縣屬重慶府獠木斗叛詔本安撫之本進營銅佛壩在南州縣南地有金銅佛像二相傳為唐明皇所鑄破其衆木斗與秦州當作溱州唐置宋為羈縻州後改為榮懿等寨地在今重慶府綦江縣南接貴州遵義府界地五百里來歸為四寨九堡建銅佛壩為南平軍召本還知制誥本欲取媚王安石因上疏曰天下之治有因有革期于趨時適治而已陛下出大號發大政可謂極因革之理然改治之始安常習故之羣交歡合譟或諍于廷或謗于市或投劾引去者不可勝數陛下燭見至理獨立不奪今雖少定彼將伺隙而逞願陛下深念之勿使彼有以窺其間而終萬世難就之業天下幸甚遼主洪基殺其后蕭氏蕭氏姿容冠絶工詩善談論好音樂立為后生太子濬時北院樞密使耶律乙辛專政勢傾一國忌后明敏于是宫婢單登等誣后與伶官趙惟一私通乙辛以聞詔乙辛劾狀遂誅惟一后賜自盡歸其尸于家後追諡宣懿十二月以元絳字厚之錢塘人參知政事曽孝寬簽書樞密院事絳在翰林諂事王安石而安石嘗德曾公亮之助已欲引公亮子孝寬于政地以報之由是二人同升更定解池鹽鈔法自薛向立鹽鈔本其後多虛鈔而鹽益輕至是多言官賣不便乞通商王安石主提舉張景溫之言至課民賣官鹽隨貧富作業為多少之差買賣私鹽聽人告以犯人家財給之買官鹽食不盡留經宿者同私鹽法于是民間騷怨鹽鈔舊法每席六緡至是三緡有餘商不入粟邊儲失備御批厯代通鑑輯覽卷七十七

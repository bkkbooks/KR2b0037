front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷八周敬王壬子三十有一年楚子使使聘孔子
  hash: sha256:017e25f7284f2a07d3977d61db8aabcfcb5c150e2d72ace37c8e0f75fd737aab
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_007-1a, image: WYG0335/WYG0335-0189a.png}
body:
  text: 先是孔子在衛靈公問陳不對而行史記靈公與孔子語見蜚雁仰視之色不在孔子遂行復如陳是年季孫斯卒遺言謂其子肥即康子必召孔子史記季桓子病輦而見魯城歎曰此國幾興以吾獲罪于孔子故不興也顧謂康子曰我死若必相魯相魯必召孔子其家臣公之魚止之肥乃召冉求魯人字孔子有孑子如蔡及葉朱子論語序說據史記云于是楚昭王使人聘孔子孔子將往拜禮而陳蔡大夫發徒圍之故孔子絶糧于陳蔡之問案是時陳蔡臣服于楚若楚王來聘孔子陳蔡大夫安敢圍之且據論語絶糧當在去衛如陳之時楚子將以書社地七百里封孔子史記索隱古者二十五家為里里各有社書社者書其社之人名于籍蓋以七百里書社之人封孔子也令尹公子申即子西不可史記子西曰文王在豐武王在鎬百里之君卒王天下今孔子得據土壤賢弟子為佐非楚之福也乃止孔子又反乎衛秋七月楚子軫卒吳伐陳楚子救之軍于城父卜戰不吉卜退又不吉楚子曰然則死也乃命公子申為王不可初楚平卒令尹子常以太子弱欲立子西子西曰王有適嗣不可亂也乃立太子至是又讓則命公子結即子期亦不可則命公子啓即子閭五辭而後許將戰楚子有疾遂卒于城父公子啓曰君王舍其子而讓羣臣敢忘君乎從君之命順也立君之子亦順也二順不可失也與申結謀潛師閉途逆越女越勾踐女之子章立之是為惠王乃還左傳是嵗也有雲如衆赤烏夾日以飛三日楚子使問諸周太史太史曰其當王身乎若禜之可移于令尹司馬楚子曰除腹心之疾而置諸股肱何益遂弗禜初楚子有疾卜曰河為祟大夫請祭諸郊楚子曰三代命祀祭不越望江漢睢漳楚之望也不榖雖不德河非所獲罪也遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉由已率常可矣禜音詠禳祭睢即沮水出鄖陽府房縣景山至當陽入漳餘注俱見前冬十月齊陽生景公子入于齊陳乞無宇之子諡僖子弒其君荼初齊景公疾命國夏髙張立其嬖子荼鬻姒之子而置羣公子于萊注見前景公卒荼即位公子陽生奔魯公子鉏同奔公子嘉駒黔奔衛事在王三十年陳乞僞事髙國而譖之諸大夫遂逐髙國國夏奔莒髙張奔魯召公子陽生于魯立之公羊傳陳乞召陽生置諸其家諸大夫至坐乞使力士舉巨囊至于中霤諸大夫皆色然而駭開之則然公子陽生也乞曰此君也已諸大夫不得已皆逡巡北面再拜稽首而君之將盟鮑牧鮑國孫醉而往乞誣之曰此子之命牧曰女忘君之為孺子牛而折其齒乎左傳注景公嘗街繩為牛使茶牽之茶頓地故折其齒而背之也陽生稽首曰若我可不必亡一大夫謂鮑牧若我不可不必亡一公子陽生自謂義則進否則退敢不惟子是從鮑牧曰誰非君之子乃受盟使胡姬景公妾以安孺子安號也如賴去鬻姒殺王甲拘江說囚王豹于勾竇之邱賴齊邑今山東濟南府章邱縣有賴亭陽生立是為悼公使朱毛齊大夫告于乞曰君異于器不可以二器二不匱君二多難敢布諸大夫乞不對而泣毛反命請殺孺子乃遷之于駘齊邑在山東青州府臨胊縣未至殺諸野幕之下杜氏預曰弒荼者朱毛與陽生也而書陳乞所以明乞立陽生而荼見弒則禍由乞始也楚比劫立陳乞流涕子家憚老皆疑于免罪故春秋明而書之以為弒主甲寅三十有三年春正月宋公入曹以曹伯陽歸曹鄙人公孫彊好弋獲白雁獻之曹伯且言田弋之說曹伯說之因訪政事大說之有寵使為司城以聽政彊言霸說于曹伯乃背晉而奸宋宋人伐之晉人不救遂滅曹執曹伯陽公孫彊以歸曹自振鐸受封至伯陽凡二十五傳而滅三月吳伐魯先是魯伐邾茅成子請告于吳邾子曰魯擊柝聞于邾吳二千里不三月不至何及于我遂入之處其公宫衆師晝掠邾衆保于繹即嶧山在今山東兖州府鄒縣東南以邾子益邾隱公歸獻于亳社囚諸負瑕即瑕邱城注見前邾大夫茅夷鴻即茅成子請救于吳吳以故伐魯使公山不狃時奔在吳率故道險故由險道欲使魯備從武城此為南武城其故城在今山東沂州府費縣西南今東昌府有武城縣乃趙邑漢曰東武城非魯邑也鄫人道吳師初武城人或因于吳境田焉拘鄫人之漚管者曰何故使吾水滋吳師至漚管者道之以入遂克武城進次于泗上泗水注見前微虎魯大夫欲宵攻吳舍吳子所舍私屬徒七百人三踊于幕庭卒三百人終得三百人有若魯人字子有與焉及稷門之內吳子聞之一夕三遷吳人行成盟而還歸邾子邾子又無道吳囚之後二年奔魯又奔齊乙卯三十有四年秋吳城邗溝通江淮吳人溝邗江以通于淮後因名邗溝今南運河自揚州西北抵淮安三百七十里即古邗溝水水經注謂之邗溟溝元和志謂之官河今曰漕河亦曰湖漕以連甓社汜光諸湖也吳欲伐齊乃于邗江水經注作韓江即中瀆水也首受江于江都築城穿溝通江淮之道左傳注東北通射陽湖西北至末口入淮射陽湖在今江南淮安府阜寧縣北與鹽城寶應分界末口在淮安府山陽縣北舊曰北神堰後曰北閘今廢丙辰三十有五年春魯侯㑹吳伐齊齊侯陽生卒左傳注以疾赴故不書弒魯侯㑹吳子伐齊齊人弒悼公史記鮑氏弒悼公索隱鮑牧于魯哀八年已為悼公所殺蓋其宗黨赴于師悼公子壬立是為簡公吳子三日哭于軍門徐承吳大夫帥舟師將自海入齊齊人敗之乃還是冬楚公子結伐陳吳延州來季子救之謂公子結曰二君不務德而力爭諸侯民何罪焉我請退以為子名務德而安民遂歸考左傳注季子為夀夢少子自夀夢卒至此七十七嵗夀夢卒時季子已能讓國年當十五六至此蓋九十餘孫疏曰季子邑于州來世稱延州來季子或是札之子與孫也今故從左傳原文書字丁巳三十有六年春齊國書國氏族伐魯夏五月魯侯㑹吳伐齊戰于艾陵春秋大事表艾陵齊地在今山東泰安府泰安縣博縣故城南齊師敗績齊國書髙無㔻髙氏族帥師伐魯及清今山東濟南府長清縣有古清亭齊邑季孫謂其宰冉求曰齊師在清必魯故也若之何求曰禦諸境季孫曰不能求曰政在季氏當子之身齊人伐魯而不能戰子之恥也大不列于諸侯矣季孫使從于朝叔孫州仇呼而問戰求曰君子有逺慮小人何知孟孫何忌强問之求曰小人慮材而言量力而共者也州仇曰是謂我不成丈夫也退而搜乘孟孺子泄懿子之子武伯彘帥右師顔羽御邴泄為右冉求帥左師管周父御樊須為右須字子遲魯人季氏之甲七千冉求以武城人三百為已徒卒次于雩門魯城南門之外五日右師從之魯師及齊師戰于郊檀弓史記俱作郎齊師自稷曲郊地名魯左師不踰溝樊須請三刻而踰之衆從之入齊軍獲甲首八十齊人不能師宵諜曰齊人遁冉求請從之三季孫弗許右師奔孟之側殿林不狃死公叔務人與其僮汪錡皆死皆殯孔子曰能執干戈以衛社稷可無殤也昭孟之側論語疏字反孟氏族公叔務人即公子公為冉求用矛于齊師故能入其軍孔子曰義也為郊戰故魯侯㑹吳子伐齊吳中軍從吳子胥門巢將上軍王子姑曹將下軍辰如將右軍齊國書將中軍髙無㔻將上軍宗樓將下軍戰于艾陵吳展如敗髙無㔻齊國書敗胥門巢吳子以卒助之大敗齊師獲國書及公孫夏閭邱明陳書東郭書革車八百乘甲首三千以獻于魯初吳將伐齊越勾踐率其衆以朝吳子及列士皆有饋賂吳人皆喜惟伍員懼曰是豢吳也夫諌曰越在我腹心之疾不如早從事焉得志于齊猶獲石田無所用之弗聽使員于齊員屬其子于鮑氏為王孫氏反役吳子聞之史記太宰嚭與子胥有隙因讒之賜之屬鏤劍名以死將死曰樹吾墓檟檟可材也吳其亡乎史記子胥將死告其舍人曰必樹吾墓上以梓令可為器而抉吾服縣吳東門之上以觀越冦之入吳也吳王聞之大怒乃取子胥尸盛以鴟夷革浮之江中吳人憐之為立祠于江上命曰胥山孔子自衛歸于魯冉求既與齊戰有功季孫肥乃以幣迎孔子史記季康子謂冉有曰子于軍旅學之乎性之乎冉有曰學之于孔子康子曰我欲召之可乎對曰欲召之則無以小人固之康子逐公華公賔公林以幣迎孔子孔子歸魯年六十八矣史記孔子去魯凡十四嵗而反乎魯魯終不能用孔子孔子亦不求仕乃叙書傳禮記史記追跡三代之禮序書傳上紀唐虞之際下至秦穆編次其事刪詩正樂史記古者詩三千餘篇及至孔子取可施于禮義上采契后稷中述殷周之盛至幽厲之缺始于衽席故關雎為風始鹿鳴為小雅始文王為大雅始清廟為頌始三百五篇孔子皆絃歌之以求合韶武雅頌之音序易史記孔子晚而好易韋編三絶正義云夫子作十翼謂上彖下彖上象下象上繫下繫文言序卦說卦雜卦也弟子蓋三千焉身通六藝者七十有二人戊午三十有七年春正月魯用田賦孫復春秋尊王發微田者井田賦者財賦魯自宣公始什二而稅至于哀公既什二而稅其田又什二而斂其財故曰用田賦季孫欲以田賦使冉求訪諸孔子孔子不對私于冉求曰先王制土藉田謂稅也以力三十受田百畝二十受五十畝六十還田而砥謂平也其逺邇近郊十一逺郊二十而三賦里㕓也商賈所居以入計其利入而量其有無圜㕓二十而一漆林二十而五任力謂徭役以夫以夫家為數而議其老幼有復除于是有鰥寡孤疾此則不役有軍旅之出則徴之雖不役者亦徴其賦無則已其嵗收田一井出稷禾六百四十斛為稯秉芻一百六十斗為秉缶米缶庾也十六斗為庾不是過也先王以為足若子季孫欲其法也則有周公之籍矣又何訪焉弗聽夏魯侯㑹吳于槖皋今江南廬州府巢縣有拓皋鎮漢為槖皋縣春秋吳邑初吳與魯㑹鄫吳徴魯百牢子服景伯對吳弗聽遂與之史記索隱百牢牢具一百也周禮天子十二牢上公九牢侯伯七牢子男五牢今吳徴百牢不識禮也太宰嚭召季孫季孫使端木賜衛人字子貢辭至是㑹于槖皋吳子使太宰嚭請尋盟魯侯不欲使賜對曰盟以周信若可尋也亦可寒也乃不尋盟吳徴㑹于衛衛侯㑹吳子于鄖左傳注發陽也海陵東南有發繇亭繇今江南通州如皋縣東有立發壩即發口也亦曰古鄖吳藩衛侯之舍將止之賜以束錦見太宰嚭與之語乃舍衛侯己未三十有八年夏魯侯㑹晉侯及吳子榖梁傳黃池之㑹吳遂子矣辭尊稱而居卑稱以㑹諸侯于黃池在今河南開封府封邱縣西南歃裴駰史記集解黃池之㑹吳先晉亞之先叙晉者所以外吳於越入吳吳不稔于嵗起師北征闕其月切深溝于商魯之間北屬之沂西屬之濟以㑹晉于黃池單手公及魯侯來㑹于是越子勾踐襲吳入其郛獲太子友吳晉方爭長未成邊遽傳也乃至以越亂告吳子懼以公孫雄言雄曰無㑹而歸越聞章矣㑹而先晉晉將執諸侯之柄以臨我必㑹而先之乃昏戒令夜中而陳係馬舌恐有聲出火竈出火于竈外以自燭雞鳴乃定軍各萬人為方陳中軍皆白常白旗素甲白羽之矰望之如荼左軍皆赤常赤旟丹甲朱羽之矰望之如火右軍皆元常元旗黑甲鳥羽之矰望之如墨凡帶甲三萬去晉軍一里昧明鳴鐘鼓振鐸三軍皆譁其聲動天地晉人大駭使董褐晉大夫請事吳子親對之曰天子有命周室卑約貢獻莫入無姬姓之振也孤欲守先君之班爵爵次當為盟主恐事之不集以為諸侯笑孤之事君在今日不得事君亦在今日董褐既致命告趙鞅曰觀吳王之色類有大憂小則嬖妾嫡子死大則越入吳將毒猶暴也言若猛獸被毒悖暴不可與戰其許之先然不可徒許鞅乃使董褐復命曰諸侯失禮于天子無所逃罪今君奄王東海以淫名謂僭號聞于天下君有短垣而自踰之夫命圭有命固曰吳伯不曰吳王君若無卑天子而曰吳公晉敢不從命吳子許諾就幕而㑹吳先歃晉亞之許氏翰曰左氏曰先晉國語曰先吳此二國史籍之異也自宋之盟晉已為楚所先陵遲至于黃池之時豈能復與吳爭國語信也晉人恥吳先之故諱馬耳吳子使駱來京師吳子既長晉于黃池將還恐齊宋之害已使公孫駱告勞于王曰昔楚不承供貢吾先君闔閭不忍其惡與楚昭相逐于中原天舍其𠂻楚師敗績今齊不鑒于楚又不恭王命夫差不忍其惡徑至艾陵天福于吳齊師還鋒而退夫差豈敢自多其功是文武之德所祐助敢告于天子執事王答曰伯父命女來明紹享余一人余實嘉之伯父若能輔余一人則兼受永福周室何憂焉乃賜吳子弓弩王阼吳子還國亡太子內空士皆罷敝乃以厚幣與越乎冬十有一月有星孛于東方庚申三十有九年春魯狩獲麟麟注見前魯狩于大野元和志大野澤一名巨野今山東兖州府嘉祥縣有獲麟堆嘉祥本巨野分置叔孫氏之車子鉏商車子微者鉏商名獲麟折其前左足以為不祥棄之郭外孔子觀之曰麟也胡為來哉反袂拭面涕泗沾襟曰吾道窮矣叔孫聞而取之端木賜問曰夫子何泣孔子曰麟之至為明王也出非其時而見害吾是以傷焉是年孔子成春秋史記孔子因魯史作春秋上自隱公下至哀公凡十二公夏五月庚申朔日有食之宋向魋入于曹以叛宋桓魋恃寵初宋公嬖魋公子地抶之公閉門而與魋泣目盡腫于是公子地及公母弟辰入于蕭以叛事在王二十一年害于宋公久益驕盈宋公將討之未及魋先謀宋公宋公知之告皇野皇氏宋戴公之後字子仲為司馬曰魋將禍余請即救野以公命召左師巢魋之兄巢至告之故對曰魋之不共宋之禍也敢不唯命是聽請瑞符節以命其徒攻桓氏魋欲入子車魋之弟止之魋遂入于曹以叛使左師巢伐之巢亦入于曹曹叛桓氏魋奔衛巢奔魯司馬牛名耕字子牛魋之弟致其邑與圭而適齊魋出于衛而奔齊牛遂適吳吳人惡之反卒于魯郭門之外坑氏魯人葬諸邱輿今費縣輿城司馬牛墓在費縣成山六月齊陳恆乞之子諡成子史記作田常弒其君壬簡公齊侯之在魯悼公奔魯簡公從在王三十年闞止字子我有寵陳乞私召悼公闞止知之先俟諸外悼公使止反與簡公處悼公既立止從簡公歸在王三十二年及即位使為政陳恆憚之諸御僕御官鞅曰陳闞不可並也君其擇焉弗聽有陳豹陳氏族者為闞止臣止與之言政說謂曰我盡逐陳氏而立女何如對曰我逺于陳氏矣且其違者不過數人何盡逐焉遂告陳氏陳逆字子行陳氏宗故怨止逆嘗殺人止執之逃而匿于陳恆家乃曰彼得君弗先必禍逆遂舍于公宫陳恆兄弟並如公闞止在幄出逆之遂入閉門止之侍人禦之陳逆殺侍人齊侯方與婦人飲酒于檀臺齊乘在臨淄陳恆遷諸寢齊侯執戈將擊恆太史子餘止之恆欲出逆抽劍謂曰需事之賊也乃止闞止歸屬徒攻闈與大門皆不勝乃出陳氏追之殺諸郭關齊關名陳恆執齊侯于舒州史記簡公出奔田氏之徒追執之于徐州公曰蚤如御鞅言不及此索隱徐音舒正義齊之西北界上地名弒之孔子三日齊而請伐齊三魯侯曰魯為齊弱久矣子之伐之將若之何孔子曰陳恆弒其君民之不與者半以魯之衆加齊之半可克也魯侯曰子告季孫孔子辭退而告人曰吾以從大夫之後也故不敢不言陳恆既弒簡公乃立簡公之弟驁是為平公恐諸侯共誅已乃盡歸魯衛侵地西約晉韓魏趙氏南通吳楚之使齊國之政皆歸于恆于是盡殺鮑晏及公族之彊者而割齊自安平以東至琅邪自為封邑安平齊邑漢置縣後省故城在今青州府臨淄縣琅邪亦齊邑漢置縣後省故城在今青州府諸城縣辛酉四十年熒惑執法之星其行無常以其舍命國守居其宿曰守心蒼龍之宿為明堂心宋之分野也清類天文分野書氐二度至尾二度屬宋分徐州河南之歸德房心大火之次宋公憂之司星占星之官子韋曰可移于相公曰相吾之股肱曰可移于民公曰君者待民曰可移于嵗公曰嵗饑民困吾誰為君子韋曰天髙聽卑君有君人之言三熒惑宜有動于是候之果徙三度壬戌四十有一年春正月衛世子蒯聵自戚入于衛輒奔魯衛孔圉取蒯聵之姊生悝圉卒豎渾良夫通于內使之戚蒯聵謂曰茍使我獲國服冕乘軒三死無與良夫為請于伯姬與蒯聵入舍于孔氏外圃昏二人䝉衣而乘孔氏之老欒寧問之稱姻妾以告遂入適伯姬氏既食伯姬杖戈而先蒯聵從之迫孔悝于厠强盟之遂劫以登臺欒寧聞亂使告仲由為孔氏宰仲由將入遇髙柴字子羔齊人髙氏别族柴曰弗及政不及已不踐其難由曰食焉不避其難柴遂出仲由入石乞盂黶以戈擊之斷纓由曰君子死冠不免結纓而死孔子聞衛亂曰柴也其來由也死矣孔悝立蒯聵召獲衛大夫奉輒奔魯蒯聵既立是為莊公使鄢肸諡武子告于王王使單子平公命之辭明年衛侯莊公飲孔悝酒于平陽今河南衛輝府滑縣有韋城其南有平陽亭醉而遣之悝載伯姬而行奔宋夏四月己丑孔子卒左傳注四月十八日乙丑無己丑己丑五月十二日日月必有誤孔子蚤作負手曳杖逍遙于門歌曰泰山其頽乎梁木其壞乎哲人其萎乎既歌而入當户而坐端木賜聞之曰夫子殆將病也遂趨而入孔子曰賜爾來何遲也夏后氏殯于東階之上殷人殯于兩楹之間周人殯于西階之上余殷人也疇昔之夜夢坐奠于兩楹之間夫明王不興天下其孰能宗豫豫殆將死也寢疾七日而沒年七十有三魯哀公誄之曰旻天不弔不憖遺一老俾屏余一人以在位㷀㷀余在疚嗚呼哀哉尼父無自律葬魯城北泗上皇覽孔子冢去城一里冢塋百畝南北廣十步東西十三步髙一丈二尺冢塋中樹以百數皆異種傳言孔子弟子異國人各持其方樹來種之塋中不生荆棘及刺人革徑今孔林在曲阜縣北二里背泗面洙繞以周垣數里弟子皆服心喪三年畢相訣而去哭各復盡哀或復留唯賜廬于冢上今孔林中有一室東向相傳為子貢廬墓處凡六年然後去弟子及魯人往從冡而家者百有餘室孔子生鯉字伯魚伯魚之生昭公賜孔子鯉因名焉先孔子卒鯉生伋字子思作中庸朱子論語序說子思學于曽子孟子受業于子思之門人居魯繆公尊禮之後居于衛秋七月楚公孫勝亂沈諸梁討誅之楚故太子建之子勝在吳建以費無極讒奔宋又避華氏之亂于鄭鄭人善之建與晉謀襲鄭鄭遂殺建其子勝奔吳事在景王二十三年令尹申欲召之沈諸梁曰吾聞勝好復言而求死士殆有私乎弗從召之使處吳竟為白公今河南光州息縣有白公城再請伐鄭許之未起師晉人伐鄭楚救之與之盟勝怒曰鄭人在此讐不逺矣自厲劍司馬即子期之子平見之曰王孫何自厲也勝曰勝以直聞不告女庸為直將以殺爾父平以告令尹令尹曰勝如卵余翼而長之楚國第用士次第我死令尹司馬非勝而誰勝聞之曰令尹之狂也得死乃非我言若得自死我不復成人令尹不悛吳人伐慎邑名漢為縣後省今江南潁州府潁上縣有慎縣故城勝敗之請以戰備獻許之遂作亂殺令尹司馬于朝而劫楚子子西以袂掩面而死其黨石乞曰焚庫弒王不然不濟勝不許將立公子啓即子閭啓不可遂殺之而以楚子如髙府楚别府石乞尹門圉公陽楚大夫穴宫負楚子以如昭夫人之宫楚子母越女前所居宫葉公沈諸梁聞亂以師至及北門或遇之曰君胡不胄國人望君如望慈父母焉盜賊之矢若傷君是絶民望也若之何不胄乃胄而進又遇一人焉曰君胡胄國人望君如望嵗焉日日以幾若見君面是得艾也而又掩面以絶民望不亦甚乎乃免胄而進帥國人以攻勝勝奔山而縊其徒微匿也之生拘石乞而問焉對曰余知其死所而長者謂白公使余勿言曰不言將烹乞曰事克則為卿不克則烹固其所也乃烹乞諸梁兼二事令尹司馬國寧使寧子西之子為令尹寬子期之子為司馬而老于葉癸亥四十有二年春三月越子伐吳敗之于笠澤即禹貢震澤爾雅謂之具區今曰太湖跨江南蘇州常州及浙江湖州三府界越子伐吳吳子禦之笠澤夾水而陳越子為左右勾卒鈎伍相著别為左右屯使夜或左或右鼓譟而進吳師分以禦之越子以三軍潛涉當吳中軍而鼓之吳師大亂遂敗之國語勾踐之地南至于句無北至于禦兒東至于鄞西至于姑蔑命壯者無取老婦老者無取壯妻女子十七不嫁其父母有罪丈夫二十不取其父母有罪將免者以告令醫守之生丈夫二壺酒一犬生女子二壺酒一豚生三人公與之母生二人公與之餼孤子寡婦貧病者納宦其子其逹士潔其居美其服飽其食而摩厲之于義四方之士來者必廟禮之非其身之所種不食非夫人之所織不衣十年不收于國民居有三年之食國之父兄讀報吳勾踐辭復請勾踐乃致其衆而誓之曰寡人不欲匹夫之勇欲其旅進旅退也進則思賞退則思刑如此有常賞進不用命退則無恥如此有常刑果行國人皆勸父勉其子兄勉其弟婦勉其夫曰孰是君也而可無死乎是故敗吳于圎句無韋昭曰諸暨有句無亭諸暨今縣屬紹興府禦兒今嘉興府石門縣東南有語兒鄉即古禦兒也鄞越邑漢為縣今為寧波府治姑蔑今衢州府龍游縣北之姑蔑城是秋七月楚滅陳楚白公勝之亂陳人恃其聚積聚也而侵楚楚既寧將取陳麥卜之武城尹子西子公孫朝也吉使帥師取陳麥陳人禦之敗遂圍陳滅之殺湣公陳自胡公受封至湣公凡十九傳而滅時陳恆得政于齊後遂建國冬十月晉趙鞅伐衛衛人出其君蒯聵及晉平衛侯背晉趙鞅召之辭以難鞅遂圍衛齊國觀國書之子陳瓘陳恆之兄救之鞅還至是鞅復伐衛入其郛衛人逐衛侯而與晉平晉立襄公之孫般師師退衛侯自鄄入般師出初衛侯嘗翦削壞其邑聚戎州莊公登城望見戎州問之以告公曰我姬姓何戎之有翦之戎州衛邑在楚邱又欲逐石圃衛卿石惡從子而未及于是石圃攻衛侯衛侯踰于北方戎州人攻之殺太子疾公子青入于已氏戎人姓已氏殺之初已氏之妻髮美莊公髠之以為夫人髢至是入而示之璧曰活我與女璧已氏曰殺女璧其焉往遂殺之衛人復立般師是冬齊人伐衛立公子起靈公子執般師以歸明年石圃逐起起奔齊輒自齊復歸于衛輒立十二年出亡亡在外四年復入乙丑四十有四年王崩太子仁立是為元王元王丙寅元年冬十有一月越圍吳越子伐吳吳人出桃戰一日五反越子將許之范蠡字少伯楚宛三戶人文種賢之入越為上將軍曰臣聞天道皇皇日月以為常明者日月盛滿時以為法法其明以進取微者虧損薄食則是行則其微以隱遁陽至而隂隂至而陽日困窮也而還月盈而匡虧也古之善用兵者因天地之常與之俱行後謂後動則用隂謂沈重固密先謂先動則用陽謂輕疾猛厲近則用柔示之以弱逺則用剛抗威厲辭後無隂蔽後動者泰舒靜為隂蔽先無陽察先動者泰顯露為陽察用人無藝無常所也往從其所因敵為制不預設也彼來從我固守勿與勿與之戰宜為人客先動為客剛彊而力疾陽節不盡輕而不可取陽數未盡雖輕易人不可得取宜為人主安徐而重固隂節不盡柔而不可迫隂數未盡雖柔不可困迫蚤晏無失必順天道周旋無究無窮若日月然今其來也剛彊而力疾言吳陽節未盡不可擊也君姑待之越子乃弗與戰居軍三年吳師自潰明年晉趙無恤有父之喪降于喪食使楚隆如越問吳難趙無恤即襄子晉荀瑶即智伯諡襄子伐鄭初智宣子荀躒之子甲將以瑶為後智果智氏之族曰不如宵宣子庶子也瑶之賢于人者五其不逮者一也美鬚長大則賢射御足力則賢技藝畢給則賢巧文辨慧則賢彊毅果敢則賢如是而甚不仁夫以其五賢陵人而以不仁行之其誰能待之若果立瑶也智宗必滅弗聽至是瑶伐鄭取九邑智果别族于太史為輔氏後智氏亡惟輔果在丁卯二年晉趙無恤滅代吕祖謙大事記代國在蔚州代今蔚州屬直𨽻宣化府有古王城無恤趙鞅幼子初鞅將置後乃書訓戒之辭于二簡以授長子伯魯及無恤曰謹識之三年問之伯魯不能舉其辭求其簡已失之矣問無恤誦其辭甚習求其簡出諸袖中鞅以無恤賢立以為後及鞅卒無恤嗣既葬北登夏屋山名在今山西代州亦曰賈母山與句注山相接請代君使厨人操銅枓音斗其形方有柄取斟水器以食代君及從者行斟隂令宰人各以枓擊殺代君及從官遂興兵平代地代君夫人無恤姊也聞代君死曰以弟慢夫非仁也以夫怨弟非義也泣而呼天摩筓自殺代人憐之名其所死地為摩筓之山山在今直𨽻易州廣昌縣無恤遂以代封伯魯子周為代成君史記趙簡子嘗召諸子曰吾藏寶符于常山上先得者賞諸子馳之山上無所得無恤還曰已得符矣簡子曰癸之無恤曰從常山上臨代代可取也簡子于是知無恤果賢以為太子後卒滅代戊辰三年冬十有一月越滅吳吳子夫差自殺越入吳國吳子率其賢良親近之士與其重祿大臣也以上姑蘇臺名在今江南蘇州府吳縣西南姑蘇山上吳地記闔閭造此亦曰姑胥使公孫雄肉袒膝行請成于越曰昔者上天降禍于吳得罪于㑹稽今君王其圖不榖不榖請如㑹稽之和勾踐弗忍欲許之范蠡曰㑹稽之事天以越賜吳吳不取今天以吳賜越越其可逆天乎且天與不取反受其咎伐柯者其則不逺君忘㑹稽之厄乎勾踐曰吾欲聽子言不忍其使者范蠡乃鼓進兵曰王已屬政于執事使者去不者且得罪使者泣而去勾踐乃使人謂夫差曰吾置王甬東今浙江寧波府定海縣在海中其東有翁洲即春秋越甬東地君百家夫差謝曰吾老矣不能事君王遂自殺夫差將死自蔽其面曰吾無面見子胥也越于是滅吳吳自泰伯傳仲雍至夫差凡二十五傳而滅越子致貢命為伯勾踐既平吳乃以兵北渡淮與齊晉諸侯㑹于俆州大事記俆音舒亦作徐國今山東兖州府滕縣有薛縣故城戰時曰俆州致貢于王王使人賜勾踐胙命為伯勾踐號令齊楚秦晉皆輔周室秦不如命勾踐選吳越將士西渡河攻秦㑹秦引罪乃還軍渡淮而南以淮上地與楚又與魯泗東方百里歸吳所侵地于宋越兵橫行于江淮東諸侯畢賀號稱霸王范蠡去越越子殺其大夫文種蠡從勾踐自㑹歸以大名之下難以久居為書辭于勾踐不復入越遂乘扁舟浮于五湖韋昭曰胥湖蠡湖洮湖滆湖并太湖而五寶一湖也考五湖之說不一今以國語注為據胥湖即胥口在吳縣西南蠡湖今曰蠡瀆在無錫縣東北洮湖亦名長塘湖在宜興縣西北滆湖在武進縣西南變姓名適齊為鴟夷子皮之陶為朱公遺大夫種書曰蜚鳥盡良弓藏狡兔死走狗烹越王為人長頸烏喙可與共患難不可與共安樂子何不去種見書稱病不朝人或讒種且作亂勾踐乃賜種劍曰子教寡人七術寡人用其三而取吳其四在子為我從先王試之種遂自殺庚午五年閏月魯侯朝于越魯侯如越得相悅也太子適郢越太子名將妻魯侯而多與之地公孫有山使告于季孫季孫懼使因太宰嚭而納賂焉左傳注嚭故吳臣考史記越滅吳誅太宰嚭與此異乃止明年魯侯自越反季孫肥孟孫彘逆于五梧魯南鄙地在山東沂州府費縣郭重僕及宴孟孫為祝上夀酒惡郭重曰何肥也季孫曰請飲彘何謂重也肥魯侯曰是食言多矣能無肥乎飲酒不樂魯侯與大夫始有惡辛未六年夏五月衛侯輒出奔宋衛侯怒褚師比即聲子衛侯與大夫飲酒于靈臺禇師比襪而登公怒禇師辭公愈怒褚師出公㦸其手曰必斷而足奪公孫彌牟即南文子邑又奪司冦亥政嬖夏戊之女初太叔疾以夏戊為大夫疾出亡衛人翦夏氏以其帑與彌子瑕彌子納夏戊之女于公以為夫人其弟期為司徒夫人寵衰期得罪嘗使侍人投公文要即懿子之車于池復使優狡俳優名狡盟拳彌衛大夫使俳優盟之以恥辱而甚近信之故褚師比公孫彌牟公文要司冦亥司徒期因拳彌以作亂拳彌先入衆譟而攻公宫鄄子士衛大夫欲禦之彌援其手曰子則勇矣將若君何衆怒難犯休而易間也遂出彌請適城鉏即鉏城注見前以鉤越乃適城鉏彌曰衛盜不可知也請速自我始乃載寶以歸衛侯不知彌與亂故為所詐衛侯為支離陳名之卒因祝史揮揮為內間以侵衛公文要知之與彌牟謀因揮在朝使吏先遣其室揮出弗納館諸外里揮遂如衛侯所衛侯使之越請師明年越皋如后庸皆越大夫宋樂茷樂溷子字子潞魯叔孫舒武叔子諡文子納衛侯彌牟致衆而問請納之衆曰勿納彌牟請亡衆曰勿出于是重賂越人申開守陴申重也開重門而嚴設守備而納衛侯衛侯不敢入師還衛人立莊公之庶弟公子黚是為悼公彌牟相之以城鉏與越出公遂卒于越出公自城鉏使以弓問子貢且曰吾其入乎子貢稽首受弓對曰臣不識也私于使者曰昔成公孫于陳寧武子孫莊子為宛濮之盟而君入獻公孫于齊子鮮子展為夷儀之盟而君入今君再孫矣內不聞獻之親外不聞成之臣賜不識所由入也壬申七年冬十月宋公頭曼卒景公宋公無子取公孫周元公孫子髙之子得與啓畜諸公宫未有立焉于是六卿左右師大司馬司徒司城大司冦三族皇靈樂降和同也聽政因大尹近官有寵者以達大尹常不告而以其欲稱君命以令國人惡之宋公遊于空澤即空桐澤在今河南歸德府虞城縣卒于連中館名名勝志連勝館在空桐澤後俗呼連冢大尹興空澤之士千甲奉公自空桐空桐澤之上有空桐亭入如沃宫宋都內宫使召六子即六卿曰君請六子畫計䇿也至以甲劫之曰君有疾病請二三子盟乃盟于少寢之庭曰無為公室不利大尹立啓奉喪殯于大宫三日而後國人知之司城樂茷使宣言于國曰大尹蠱惑其君而專其利今君無疾而死死又匿之是無他矣大尹之罪也六子皆歸授甲使國人施于大尹大尹奉啓以奔楚乃立得是為昭公呂祖謙大事記昭公嘗出亡謂其御曰吾被服而立侍御者數十人無不曰吾君麗也吾發言動事朝臣數十人無不曰吾君聖也內外不見其過失是以亡也乃改操易行二年而美聞于宋宋人迎而復之王崩太子介立是為貞定王貞定王癸酉元年夏晉荀瑶伐鄭齊陳恆救之晉師還荀瑶帥師伐鄭鄭請救于齊齊陳恆救鄭師及濮古濮水首受大河自封邱徑濟隂至髙平入濟今堙荀瑶聞之乃還曰吾卜伐鄭不卜敵齊使謂恆曰大夫陳之自出陳之不祀鄭之罪也故寡君使瑶察陳衷焉謂大夫其恤陳乎若利本之顛瑶何有焉恆怒曰多陵人者皆不在智伯其能久乎後四年荀瑶復圍鄭門于桔柣之門瑶謂趙無恤入之對曰主在此瑶曰惡而無勇何以為子對曰以能忍恥庶無害趙宗無恤由是惎瑶魯侯如越歸卒于有山氏魯侯患三桓之侈三桓亦患魯侯之妄故君臣多間魯侯欲以越伐魯而去三桓遂如公孫有陘氏即有山氏因孫于邾乃如越國人迎之復歸卒于有山氏子寧立是為悼公悼公之時三桓勝魯始小侯戊寅六年晉河絶于扈扈亭在今河南懷慶府原武縣水經注河水東北徑卷之扈亭北禹貢錐指晉出公時河絶于扈即于是也庚辰八年秦滅大荔後漢書西羌傳洛川有大荔之戎注洛川即洛水大荔古戎國秦獲之改曰臨晉同州城是也延今陜西同州府治大荔縣此洛水乃沮洛由榆林徑安同州諸府入河非禹貢之伊洛時諸戎國大荔與義渠史記索隱古西戎國括地志寧涇慶三州皆其地慶今慶陽府寧今慶陽府寧州涇今平涼府涇州俱𨽻甘肅寧州有義渠故城最强築城數十皆自稱王秦伯厲公以兵伐大荔取其王城今同州府朝邑縣有王城寰宇記大荔戎王所居遂滅之後秦又伐義渠執其王以歸在王二十五年癸未十有一年晉侯出公鑿出奔齊晉荀瑶與趙襄子無恤韓康子虎不信之孫魏桓子駒曼多之孫共分范中行地以為己邑晉侯怒告于齊魯欲伐四卿四卿恐反攻晉侯晉侯出奔齊道卒荀瑶立昭公之曽孫驕為晉君是為哀公晉君之大父曰雍父曰忌忌善荀瑶瑶欲并晉未敢故立之是時晉國之政皆决于瑶晉君不得有所制瑶遂有范中行地甲申十有二年晉荀瑶襲衛不克還荀瑶欲伐衛遺衛侯野馬四百白璧一羣臣皆賀公孫彌牟曰此小國之禮而大國致之君其圖之衛侯告于邊境荀瑶果以師襲衛至境而反曰衛有賢人先知吾謀也已荀瑶還自衛宴于藍臺戲韓虎而侮段規段鄭共叔段之後以名為氏規韓康子相智國諫曰主不備難必至矣瑶曰難將由我我不為難誰敢興之對曰君子能勤小物故無大患主一宴而恥人之君相又弗備曰不敢興難無乃不可乎弗聽丙戌十有四年晉荀瑶以魏駒韓虎攻趙無恤無恤奔晉陽注見前荀瑶請地于韓虎虎欲弗與段規曰智伯好利而愎不與將伐我不如與之彼狃于得地必請于他人他人不與必嚮之以兵然後我得免于患而待事之變矣虎曰善乃與之荀瑶悅又求地于魏駒駒欲弗與任章任風姓之後以國為氏章魏桓子相曰無故索地諸大夫必懼吾與之地智伯必驕彼驕而輕敵此懼而相親以相親之兵待輕敵之人智氏之命必不長矣不如與之駒曰善亦與之瑶又求蔡臯狼之地今山西汾州府永寧州有臯狼故城考史記孟增幸于周成王是為宅臯狼集解徐廣曰臯狼地名索隱成王居孟增于臯狼故曰宅臯狼智伯所求即此地蔡蓋宅音之訛于趙無恤無恤弗與襄子以伐鄭之辱基智伯事見前瑶怒帥韓魏之甲以攻趙氏無恤走晉陽初趙簡子使尹鐸尹周尹氏之别為晉陽請曰以為繭絲乎謂浚民之膏如抽繭之緒抑為保障乎謂厚民之生如築堡以自障簡子曰保障哉尹鐸損其户數簡子謂無恤曰晉國有難而無以尹鐸為少無以晉陽為逺必以晉陽為歸至是三家圍晉陽荀瑶決晉水在山西太原府太原縣西南源出滴瀝泉今謂之晉渠分三派以溉民田而灌之城不浸者三版沉竈産蛙民無叛意戊子十有六年晉趙無恤及魏駒韓虎攻荀瑶滅之荀瑶行水魏駒御韓虎驂乘瑶曰吾乃今知水之可以亡人國也魏駒肘韓虎虎履駒之跗以汾水注見前可以灌安邑注見前絳水源出山西絳州絳山徑曲沃縣入澮可以灌平陽注見前也安邑魏氏都平陽韓氏都趙無恤使張孟談張晉公族解張字張侯其後以字為氏世仕于晉潛出見魏駒韓虎曰臣聞唇亡則齒寒趙亡則韓魏為之次矣二子乃隂與約為之期日而遣之無恤夜使人殺守隄吏而決水灌荀瑶軍軍亂韓魏翼而擊之無恤將卒犯其前大敗之遂殺荀瑶盡滅其族而分其地趙襄子漆智伯之頭以為飲器智伯之臣豫讓欲為報仇乃詐為刑人挾匕首入襄子宫中塗厠襄子如厠心動索之獲豫讓左右欲殺之襄子曰義士也吾謹避之耳豫讓又漆身為癩吞炭為啞行乞于市其妻不識也其友識之為之泣曰以子之才臣事趙孟必得近幸子乃為所欲為顧不易邪何乃自苦如此豫讓曰既已委質為臣而又殺之是二心也吾所以為此者將以愧天下後世之為人臣懷二心者也頃之襄子出豫讓伏橋下襄子至橋馬驚襄子曰必豫讓也問之果豫讓襄子數其先事范中行氏而不為報仇豫讓曰范中行氏以衆人遇我故衆人報之智伯以國士待我故國士報之乃請襄子之衣拔劍三躍呼天擊之曰可以報智伯矣遂自殺甲午二十有二年楚滅蔡蔡侯齊出奔蔡自叔度至齊凡二十四世丙申二十有四年楚滅把自東樓公封把至簡公春凡十九世庚子二十有八年王崩貞定王崩長子去疾立是為哀王立三月弟叔襲殺之而自立是為思王立五月少弟嵬又攻殺之而自立是為考王此三王皆貞定王之子封弟揭于河南即東都漢于此置河南縣初王子朝之亂餘黨皆在王城敬王畏之徙都成周事見前至是王考王以王城故地封其弟揭以續周公之職是為河南桓王考王辛丑元年甲辰四年晉侯朝于韓魏趙氏晉哀公卒子栁立是為幽公時晉獨有絳曲沃餘皆入韓魏趙氏號三晉晉侯畏反朝焉丙午六年夏六月雪日有食之庚戌十年楚滅莒初莒子庚輿虐而好劍茍鑄劍必試諸人大夫烏存因國人逐之莒子奔魯齊人納郊公事在敬王元年自是微不復見後四世楚滅之莒自兹輿期受封二十三傳而滅乙卯十有五年王崩太子午立是為威烈王河南公封其少子于鞏鞏故城在今河南府鞏縣西南河南桓公卒子威公代威公卒子惠公代乃自封其少子班于鞏以奉王號東周而河南遂號西周大事記曰自洛陽下都視王城則在西故曰西周自河南王城視下都則在東故曰東周衛公子亹弒其君糾先是衛敬公卒子糾立是為昭公時三晉彊衛如小侯屬于趙至是公子亹弒昭公而自立是為懷公立十一年敬公之孫頽弒之頽亦自立是為慎公威烈王丙辰元年晉趙無恤卒無恤為伯魯之不立有子五人不肯置後必欲傳位于代成君伯魯之子代成君早卒立其子浣為趙氏後至是無恤卒其弟桓子逐浣而自立一年卒趙氏之人曰桓子立非襄主意乃共殺其子復迎浣而立之是為獻子是年魏駒韓虎皆卒駒之子斯代是為文侯虎之子啓章代是為武子秦庶長秦爵二十級十曰左庶長十一曰右庶長鼂弒其君懷公鼂與大臣圍懷公懷公自殺懷公太子曰昭子早卒大臣乃立昭子之子是為靈公戊午三年晉韓啓章伐鄭殺鄭伯啓章殺鄭幽公名已鄭人立幽公之弟駘是為繻公後韓氏景侯䖍復伐鄭在王十七年取雍邱注見前已而鄭伐韓氏在王十九年敗其兵于負黍注見前己未四年秦作上下畤上畤祭黃帝下畤祭炎帝辛酉六年盜殺晉侯栁晉侯淫婦人夜竊出邑中盜殺之魏斯以兵誅亂者立幽公之子止是為烈公癸亥八年越滅郯注見前少皥之祀莒及郯司之莒郯皆嬴姓少皥之後楚先滅莒越復滅郯少皡遂不祀甲子九年秦初以君主猶公主也妻河謂嫁之河伯取他女為君主用諸河以求福命曰妻河時晉魏斯以西門豹西門以地為氏為鄴令故鄴城在今河南彰德府臨漳縣鄴苦河伯娶婦豹乃與三老期當共送婦及期豹先投巫嫗于河曰先報河伯已而投三老復欲投廷掾與豪長者皆叩頭流血自是不敢復言河伯娶婦六事記魏與秦鄰故染其俗至豹始禁之戊辰十有三年晉河岸崩壅龍門至于底柱此西河東圮也龍門底柱之間皆髙山崇阜河雖壅不徙流己巳十有四年晉魏斯始行平糴法李悝李氏率陶之後悝魏臣為魏斯作盡地力之教以為地方百里除山澤居邑三分去一為田六百萬畝治田勤謹則畝益三斗不勤則損亦如之地方百里之增减輒為粟百八十萬石又曰糴甚貴傷民謂士工商甚賤傷農民傷則離散農傷則國貧善平糴者必謹觀嵗有上中下孰上孰其收自四餘四百石平嵗百畝收百五十石大孰四倍收六百石計民食終嵗長四百石中孰自三四百五十石餘三百石終嵗長三百石下孰自倍收三百石餘百石終嵗長百石小饑則收百石收平嵗三分之二中饑七十石收三分之一大饑三十石五分之一故上孰則上糴三而舍一糴三百石舍一百石中孰則糴二糴二百石下孰則糴一糴五十石使民適足賈平則止小饑則發小孰之所斂中饑則發中孰之所斂大饑則發上孰之所斂而糶之故雖遇饑饉水旱糴糶不貴而民不散斯又以鄴令西門豹言引用漳水清漳出山西平定州樂平縣沾嶺濁漳出山西潞安府長子縣發鳩山二水分流至河南彰德府涉縣始合東北徑直𨽻界分二支一東行入衛一東北行合滏陽滹沱諸水至天津入海穿渠溉鄴田今彰德府有西門渠豹所開後漢元初中嘗詔修之河內之民利之魏以是益富彊漢書溝洫志魏文侯曾孫襄王時史起為鄴令引漳水溉鄴民歌之曰鄴有賢令兮為史公决漳水兮灌鄴旁終古舄鹵兮生稻梁與史記不同辛未十有六年命晉韓啓章趙浣伐齊王命韓氏趙氏伐齊入其長城括地志齊長城起濟州平隂縣緣河歷泰山北岡經淄州東至密州琅邪臺入海今濟州今濟寧州屬兖州府平隂今屬泰安府淄州淄川縣屬濟南府密州今諸城縣屬青州府琅邪臺在諸城縣東長城故址今尚存時三晉自通王室亦如列國壬申十有七年魯繆公顯以公儀休為相休魯博士以髙第為魯相休相魯奉法循理無所變更百官自正嘗之其家見織帛怒而出其妻食于舍而茹葵愠而拔其葵曰吾已食祿又奪園夫紅女利乎秦初令吏帶劍三代之制大夫士皆佩玉秦始令帶劍并令百姓亦帶之癸酉十有八年晉魏斯克中山今直𨽻定州春秋鮮虞地戰國為中山國使其子擊守之魏斯使樂羊宋樂氏之别伐中山克之史記趙獻侯十年中山武公初立索隱系本云中山武公居顧桓公居靈夀後為趙武靈王所滅據此魏文侯所克乃武公地趙武靈所滅乃桓公地地本分自中山故皆以中山為號魏武侯之世中山及趙戰于房子蓋靈夀之中山也以封其子擊斯問于其臣曰我何如主皆曰仁君任座曰君得中山不以封弟而封子何為仁君斯怒任座趨出問翟璜翟以國為氏璜名也對曰仁君斯曰何以知之對曰君仁則臣直嚮者任座之言直臣是以知之斯說使翟璜召任座親下堂迎之引為上客樂羊攻中山其子在中山懸之以示羊羊不顧中山烹而為之羔羊啜之盡一杯中山知其忍下之魏文賞其功而疑其心甲戌十有九年齊田和陳敬仲改氏田左傳作陳史記作之子田田成子之孫白是為莊子莊子和是為太公伐衛田和相齊宣公籍伐衛取毋邱史記年表作母索隱母音貫即貫城貫城注見前後二年和之宗人田㑹叛和以廩邱故城在今山東曹州府范縣屬于晉趙氏晉魏斯受經于孔子之弟子卜商卜以官為氏商字子夏衛人孔子既沒子夏居西河教授魏斯受卜子夏經藝以為師又師事田子方齊田氏之别過段干木段干姓木名之廬必式皇甫謐髙士傳木晉人守道不仕魏文侯造其門踰垣避之文侯待以客禮四方賢士多歸之斯由此得譽于諸侯斯子擊出遭田子方于道下車伏謁子方不為禮子擊怒謂子方曰富貴者驕人乎貧賤者驕人乎子方曰亦貧賤者驕人耳富貴者安敢驕人國君而驕人則失其國大夫而驕人則失其家士貧賤者言不用行不合則納履而去耳安往而不得貧賤哉子擊乃謝之丙子二十有一年晉魏斯以魏成為相以吳起為將魏斯謂李克曰先生有言家貧思良妻國亂思良相今所置非成則璜二子何如對曰居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之斯曰先生就舍吾之相定矣李克出翟璜曰君召卜相果誰為之克曰魏成璜忿然曰西河胡三省曰班忘魏地自髙陵以東盡河東河內髙陵漢屬馮翊其地在河西所謂西河之外者也今髙陵縣屬西安府之守謂吳起臣所進也君以鄴為憂臣進西門豹君欲伐中山臣進樂羊中山已拔無使守之臣進先生君之子無傅臣進屈侯鮒以耳目之所覩記臣何負于魏成克曰成得卜子夏田子方段干木三人君皆師之子所進五人君皆臣之子惡得與成比也璜再拜曰鄙人失對願卒為弟子吳起吳以國為氏衛人仕于魯齊人伐魯魯欲以起為將起取齊女魯人疑之起殺妻以求將大破齊師或譖之曰起始事曽參母死不奔喪曽參絶之今又殺妻以求將殘忍薄行人也起恐得罪遂去魯聞魏斯賢往歸之斯問李克克曰起貪而好色然用兵司馬穰苴齊田氏庶孽晏子薦之景公尊為大司馬有兵法書弗能過也于是斯以為將擊秦拔五城起為將卧不設席行不騎乘親褁贏糧與士卒最下者同衣食分勞苦斯以其得士心使為西河守以拒秦韓御批歷代通鑑輯覽卷八

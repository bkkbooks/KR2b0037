front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷六周簡王丙子元年晉遷于新田今山西平陽府曲沃縣有絳邑故城即晉新田地景公遷都於此
  hash: sha256:f812d8e2dc257f8e7588f02223e910d90941c5501d2637fce5c0710285932279
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_005-1a, image: WYG0335/WYG0335-0142a.png}
body:
  text: 晉人謀去故絳左傳注晉復命新田為絳故謂此為故絳諸大夫皆曰必居郇瑕氏之地今山西蒲州府臨晉縣有瑕城即郇瑕晉有二瑕其一鄭燭之武所云焦瑕在河南陜州閿鄉縣其一即此沃饒而近盬音古説文盬河東鹽地國利君樂韓厥曰郇瑕水薄土淺不如新田土厚水深夫山澤林盬國之寶也國饒則民驕佚近寶公室乃貧民多逐末田賦不供不可謂樂晉侯從之遷新田吳注見前子乘即夀夢章史記秦伯無子武王求仲雍之後得周已君吳因而封之索隱夀夢仲雍十八代孫來朝夀夢始立朝王適楚觀諸侯禮樂後與魯侯會于鍾離今江南鳯陽府鳯陽縣有鍾離故城古鍾離子國問周公禮樂魯侯悉為陳之因咏歌三代之風夀夢曰孤在夷蠻以椎髻為俗豈有斯之服哉因嘆而去丁丑二年吳入州來今江南鳯陽府鳯臺縣北有下蔡故城春秋州來邑初楚莊圍宋師還公子嬰齊請申吕為賞田申公巫臣曰不可楚莊乃止嬰齊以是怨巫臣公子側欲取夏姬巫臣止之而自取以奔晉故側亦怨之側與嬰齊遂殺巫臣之族而分其室巫臣自晉遺二子書曰余必使爾罷于奔命以死于是巫臣請使于吳通吳于晉教吳戰陳使之伐楚伐巢今江南盧州府巢縣周巢伯國伐徐至是入州來嬰齊側一嵗七奔命蠻夷屬于楚者吳盡取之是以吳始大通于上國戊寅三年晉殺其大夫趙同趙括趙嬰齊通于趙朔之妻莊姬晉成公女趙同趙括放諸齊事在定王二十一年朔妻以故譖于晉侯曰原屏將為亂晉侯討而殺之趙武朔之子莊姬出諡文子從姬畜于公宫以其田與祁奚氏族略奚獻侯之後食于祁因以為氏今太原府祁縣是也韓厥言于晉侯曰成季之勳謂趙衰宣孟之忠謂趙盾而無後為善者其懼矣乃立武而反其田史記趙盾卒子朔嗣朔娶晉成公姊為夫人晉景公三年屠岸賈為司冦治靈公之賊攻趙氏于下宫殺趙朔趙同趙括趙嬰齊滅其族朔妻有遺腹走公宫匿免身生男屠岸賈索之朔客公孫杵臼與朔友程嬰曰立孤與死孰難嬰曰死易立孤難杵臼曰子強為其難者我為其易者乃取他人兒匿之程嬰出謬告諸將攻殺公孫杵臼及孤兒程嬰以真孤匿山中居十五年景公疾卜之大業之後不遂者為祟公問韓厥厥知趙孤在乃曰大業之後在晉絶祀者其趙氏乎具以實告公乃以韓厥之衆脅諸將立趙孤名曰武攻屠岸賈滅其族與趙武田邑如故程嬰曰我將下報趙宣孟與公孫杵臼遂自殺此所載與左傳異孔頴逹春秋正義曰史記稱趙朔妻成公姊為夫人案傳趙衰嫡妻文公之女若朔妻成公之姊則亦文公之女父之從母不得為妻賈服先儒皆以為成公之女故杜氏從之史記又稱屠岸賈攻殺趙盾趙同趙括案成二年傳欒書將下軍則朔已死矣不得于此年與同括俱死于是晉君明諸臣強無容有屠岸賈厠其間如此専恣又稱公孫杵臼取他兒代武死程嬰匿武山中因晉侯有疾韓厥請立武為趙氏後與左傳背違其説不可從己卯四年晉人執鄭伯悼公子成公睔楚人以重賄求鄭鄭伯會楚公子成于鄧注見前尋鄭伯如晉晉以其二于楚執諸銅鞮今山西沁州有銅鞮故城在州西南欒書伐鄭鄭人使伯蠲行成晉人殺之鄭公孫申謀曰我出師以圍許為將改立君者而紓晉使晉必歸君遂圍許明年鄭公子班即子如聞叔申謀立公子繻成公庶子鄭人殺繻立髠頑成公世子公子班奔許欒書曰鄭人立君我執一人焉何益不如伐鄭而歸其君晉侯有疾立世子州蒲是為厲公為君而會諸侯伐鄭鄭公子喜字子罕穆公子賂以襄鍾鄭襄公之廟鍾子然穆公子盟于修澤今河南懷慶府原武縣有修武亭亦曰修魚即春秋修澤公子騑字子駟穆公子為質鄭伯歸討立君者殺叔申及其弟叔禽是夏晉景公卒辛巳六年命王季子單子取鄇田鄇音侯今河南懷慶府武陟縣西南有鄇人亭即周鄇田于晉晉郤至即溫季蒲城鵲居之子諡昭子與王室爭鄇田王使劉子康公即王季子單子襄公訟諸晉郤至曰溫吾故也故不敢失劉子單子曰昔蘇忿生以溫為司冦厥後蘇氏即狄又不能于狄而奔衛事見襄王二年襄王勞文公而賜之溫見襄王十七年狐氏狐毛之子溱為溫大夫陽氏陽處久居溫先處之而後及子若治其故則王官之邑也左傳疏鄇是溫之别邑襄王賜晉以溫不賜以鄇也鄇本未嘗屬子晉故曰王官之邑安得之晉侯使郤至弗敢爭壬午七年晉士燮及楚公子罷許偃皆楚大夫盟于宋宋華元善于楚公子嬰齊時為令尹又善于晉欒書時將中軍聞楚人既許晉成王之四年晉歸楚鍾儀楚使公子辰聘晉修好五年晉使糴茷如楚報之遂如楚復如晉合晉楚之成于是晉士燮會楚公子罷許偃盟于宋西門之外鄭伯遂如晉受成癸未八年魯侯來朝遂會晉侯齊侯頃公子靈公環宋公衛侯鄭伯曹伯邾人滕人伐秦初秦晉將會于令狐晉侯先至秦伯桓公滎不肯涉河次于王城使史顆秦大夫盟晉侯于河東晉郤犫步陽之子又名州亦曰苦叔成盟秦伯于河西事在王六年秦伯歸而背晉成又召狄與楚欲道以伐晉于是晉侯使郤錡克之子字駒伯如魯乞師魯侯至京師以諸侯朝王遂從王季子即劉康公成子成肅公會晉侯及諸侯之師伐秦晉侯使吕相魏錡子諡宣子絶秦及秦師戰于麻隧在今陜西西安府涇陽縣北秦師敗績獲秦成差及不更女父左傳注不更秦爵師遂濟涇及侯麗春秋彚纂注侯麗劉伯莊云在涇陽境而還成肅公卒于瑕先是成子受脈于社不敬劉子曰民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也國之大事在祀與戎今成子惰棄其命矣其不及乎乙酉十年晉侯執曹伯歸于京師伐秦之役曹宣公名盧文公子卒于師事在王八年曹人使公子負芻守公子欣時即子臧逆曹伯之喪二子皆宣公庶子負芻殺其太子而自立是為成公事在九年至是晉侯及諸侯盟于戚執負芻以歸于京師諸侯將見子臧于王而立之辭曰聖達節次守節為君非吾節也敢失守乎遂逃奔宋後曹人請負芻于晉事在十一年晉人使謂子臧曰反吾歸而君子臧反晉釋曹伯歸自京師子臧盡致其邑與卿而不出晉士燮齊髙無咎固之子宋華元魯叔孫僑如衛孫林父良夫之子鄭公子鰌邾人會吳于鍾離鍾離注見前此會吳之始亦晉以諸侯之大夫為會之始始通吳也後魯仲孫蔑衛孫林父會吳于善道事在靈王四年吳使夀越如晉請聽諸侯之好晉人使魯衛先會春秋彚纂注阮勝之南兖州記云盱貽本吳善道地今盱眙縣𨽻江南泗州是年諸侯會吳于戚後又會吳子夀夢于柤事在靈王九年嶧春秋彚纂注柤今山東兖州府縣泇口是也諸侯之大夫又會吳于向事在靈王十三年向鄭地今開封府尉氏縣西南有向城丙戌十有一年夏六月丙寅朔日有食之晉侯及楚子鄭伯戰于鄢陵即鄢注見前楚子鄭師敗績先是楚將北師事在王十年公子貞即子囊楚莊子曰新與晉盟而背之不可公子側曰敵利則進何盟之有楚子遂侵鄭及暴隧鄭地路史曰暴辛公采邑後為鄭有復侵衛及首止注見前鄭公子喜侵楚取新石春秋彚纂注楚邑在今南陽府葉縣界至是楚以汝隂之田汝水南近鄭之田求成于鄭鄭叛晉使公子騑從楚盟于是晉侯將伐鄭士燮不欲欒書曰不可以當吾世而失諸侯師遂起鄭人聞有晉師使告于楚楚子救鄭遇于鄢陵士燮曰惟聖人能內外無患自非聖人外寧必有內憂盍釋楚為外患乎甲午晦楚晨壓晉軍而陳欒書曰楚師輕窕固壘而待之三日必退退而擊之必獲勝郤至曰楚有六間二卿相惡王卒以舊鄭陳而不整蠻軍而不陳陳不違晦在陳而囂不可失也苖賁皇言于晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃于王卒必敗之晉侯從之及戰魏錡射楚子中目楚子召養由基與之兩矢使射錡中頂伏韜以一矢復命楚師薄于險晉囚其公子茷卻至從鄭伯鄭伯之御石首納旌于韜中乃免旦而戰見星未巳楚公子側命軍吏察夷傷補卒乘雞鳴而食將復戰穀陽豎獻飲于側側醉楚子召之不能見楚子曰天敗楚也夫乃宵遁晉入楚軍三日榖士燮立于戎馬之前曰君幼諸臣不佞才才也何以及此君其戒之楚師還公子側自殺丁亥十有二年冬十有二月丁巳朔日有食之晉殺其大夫郤錡郤犫郤至晉侯多外嬖反自鄢陵欲盡去羣大夫而立其左右胥童夷陽五國語作夷陽午長魚矯三人俱怨郤氏胥童胥克子郤缺為政廢胥克邠錡奪夷陽五田郤犫與長魚矯爭田執而梏之而嬖于晉侯欒書以郤至不從已而敗楚師鄢陵之戰蠻書欲固壘郤至言楚有六間必克之欲廢之使楚公子茷鄢陵之戰所獲告晉侯曰此戰也郤至實召寡君曰此行必敗吾奉孫周晉襄公之曾孫以事君晉侯告欒書書曰其有焉盍使諸周而察之郤至聘于周欒書使孫周見之晉侯使覘之信遂怨郤至胥童夷陽五帥甲八百將攻郤氏長魚矯請無用衆晉侯使清沸魋亦嬖人助之三郤將謀于榭矯殺郤錡郤犫于其位郤至欲逃矯及諸其車殺之胥童以甲劫欒書中行偃即荀偃荀庚之子荀林父嘗為中行遂以官為氏于朝請殺之晉侯弗許矯曰不殺二子憂必及君遂出奔狄晉侯使書偃皆復其位初三郤害伯宗譖而殺之韓獻子曰郤氏其不免乎善人天地之紀也而驟絶之不亡何待伯宗每朝其妻必戒之曰盜憎主人民怨其上子好直言必及于難伯宗死子州犁奔楚戊子十有三年晉弒其君州蒲晉侯使胥童為卿遊于匠麗氏嬖大夫家欒書中行偃執晉侯召士丐士燮之子即范宣子士丐辭召韓厥厥曰二三子不能事君焉用厥也欒書中行偃殺胥童使程滑晉大夫弒晉侯葬之于翼東門之外以車一乘先是諸侯伐鄭會于柯陵周單襄公見晉侯視逺步髙卻錡見其語犯郤犫見其語迂郤至見其語伐單子曰晉將有亂其君與三郤當之乎君子目以定體足以從之今晉侯目不在體而足不步目其心必異矣郤氏晉之寵人也三卿而五大夫可以戒懼矣今郤伯之語犯叔迂季伐犯則陵人迂則誣人伐則掩人有是寵也而益之以三怨誰能忍之未幾晉殺三郤及是厲公被弒晉逆公孫周于京師立之是為悼公史記晉襄公少子捷號桓叔桓叔最愛生惠伯談談生周韋昭國語注晉不畜羣公子故談子周適周事單襄公晉欒書中行偃既弒厲公使荀罃即智武子荀首别邑于智故又以智為氏士魴士會子亦曰彘共子逆周子于京師而立之生十四年矣國語周事單襄公立無跛視無旋聽無聳言無逺晉國有憂未嘗不戚有慶未嘗不怡襄公疾召其子頃公而告之曰必善晉周將得晉國其行也而文能文則得天地天地所胙小而後國晉仍無道鮮胄其將失之矣必蚤善晉子其當之也大夫逆于清原注見前周子曰孤始願不及此雖及此豈非天乎抑人之求君使出命也立而不從將安用君二三子用我今日否亦今日共而從君神之所福也對曰羣臣之願也敢不唯命是聽盟而入朝于武宫逐不臣者七人二月即位于朝始命百官施施恩惠舍舍勞役已責止逋責振廢滯禁淫慝薄賦斂宥罪戾使魏相即吕相佐下軍士魴將新軍魏頡魏顆子别為令狐氏趙武與頡俱佐新軍為卿荀家荀會欒黶韓無忌為公族大夫使訓卿之子弟士渥濁為太傅修士會之法右行辛為司空修士蒍之法欒紏御戎使訓諸御荀賓為右使訓勇力之士祁奚為中軍尉羊舌職佐之魏絳為司馬張老為候菴鐸遏寇為上軍尉籍偃為司馬使訓卒乘程鄭為乘馬禦使訓羣騶之荀家荀會荀賓皆荀氏族欒黶書之子韓無忌厥子右行辛其先將右行以官為氏欒紏亦曰辨紏欒氏族羊舌職晉武公曾孫突為羊舌大夫遂以為氏職叔向父魏絳犫之子籍偃其先伯黶司晉典籍以官為氏程鄭荀氏别族羣騶謂諸掌駕之官凡六官之長皆民譽也己丑十有四年晉欒黶宋華元魯仲孫蔑衛寧殖俞之孫諡惠子曹人莒人邾人滕人薛人圍宋彭城注見前初宋司馬蕩澤蕩氏宋桓公子蕩之後澤亦曰子山殺公子肥宋文公子華元為右師出奔晉魚石公子魚曽孫時為左師止之于河上華元遂復入以國人攻蕩氏殺澤于是魚石及向為人宋桓公子貯字向父其後以字為氏為人時為大司冦鱗朱桓公子鱗元孫以名為氏朱時為少司寇向帶時為太宰魚府時為少宰俱出奔楚事在王十年楚子鄭伯伐宋取彭城魚石遂入于彭城向為人鱗朱向帶魚府亦入焉楚以三百乘戍之而還宋老佐戴公五世孫時為司馬及華喜華父督元孫時為司徒帥師圍之楚令尹嬰齊救彭城伐宋宋華元如晉告急韓厥為政曰欲求得人必先勤之成霸安疆自宋始矣晉侯遂以師救宋遇楚師于靡角之谷左傳注宋地楚師還晉使士魴如魯乞師魯仲孫蔑會諸侯于虛朾春秋彚纂注虛朾杜注闕或云即宋之虛在今睢州界謀救宋事在王十三年是年魯成公卒子午嗣是為襄公至是諸侯之大夫圍彭城彭城降晉晉人以宋五大夫在彭城者歸置諸瓠邱即壺邱亦曰陽壺其故城在今山西絳州垣曲縣王崩太子泄心立是為靈王靈王庚寅元年晉荀罃齊崔杼夭之子宋華元魯仲孫蔑衛孫林父曹人邾人滕人薛人小邾人曹姓邾俠之後封于郳今山東兖州府滕縣郳城是也本附庸後進爵小邾子會于戚遂城虎牢戚虎牢注俱見前初諸侯會于沙隨今河南歸德府寧陵縣沙隨城是尹子周尹武公及晉侯厲公以諸侯伐鄭事在簡王十一年既而鄭公子騑侵晉虛滑左傳注晉之二邑衛北宫括即懿子衛成公曾孫侵鄭至于髙氏今河南開封府禹州有髙氏亭楚人戍鄭尹子單子單襄公朝會晉侯亦厲公及諸侯盟于柯陵左傳注鄭西地以伐鄭楚公子嬰齊救之諸侯師還尋又伐鄭楚再救之諸侯復還事在簡王十二年彭城之役晉韓厥帥諸侯之師伐鄭入其郛敗其兵于洧上事在簡王十四年洧水出河南府登封縣馬嶺山經鄭州許州合溱水為雙洎河至是鄭伯疾公子騑請息肩于晉鄭伯不可既卒子髠頑嗣是為僖公晉師宋師衛師侵鄭鄭人不從晉乃會諸侯之大夫于戚以謀鄭魯仲蔑曰請城虎牢以逼鄭晉人從之鄭乃行成明年單子會晉侯及諸侯盟于雞澤今直𨽻廣平府雞澤縣西南有會盟臺即春秋諸侯盟處為鄭服故也晉侯之弟揚干亂行于曲梁魏絳戮其僕晉侯怒謂羊舌赤曰必殺魏絳無失也對曰絳事君不避難有罪不逃刑其將來辭言終魏絳至授僕人書將伏劍公讀其書曰臣聞師衆以順為武軍事有死無犯為敬君合諸侯臣敢不敬臣懼其死以及揚干無所逃罪請歸死于司冦公跣而出曰寡人之言親愛也吾子之討軍禮也子無重寡人之遇反役使絳佐新軍羊舌赤字伯華職長子後二年晉侯復會諸侯于戚鄭伯皆來會史記晉會諸侯于雞澤悼公問羣臣可用者祁奚舉解狐解狐奚之仇復問舉其子午君子曰祁奚可謂不黨矣外舉不隱仇內舉不隱子壬辰三年晉大夫魏絳盟諸戎無終子嘉父無終山戎國名字爵嘉父字也今順天府薊州有無終故城即無終子國使孟樂無終之臣如晉因魏絳納虎豹之皮以請和諸戎晉侯曰戎狄無親而貪不如伐之魏絳曰諸侯新服將觀于我我德則睦否則攜二勞師于戎諸華必叛晉侯曰然則莫如和戎乎對曰和戎有五利焉戎狄薦聚也居貴貨易輕也土土可賈焉一也邉鄙不聳民狎其野穡人成功二也戎狄事晉四鄰振動諸侯威懷三也以德綏戎師徒不勤兵甲不頓四也鑒于后羿有夏之衰羿因夏民以代夏政其臣寒浞殺之事詳見前而用德度逺至邇安五也君其圖之晉侯説乃使魏絳盟諸戎癸巳四年諸侯戍陳初楚公子壬夫即子辛為令尹侵欲于小國多欲無厭侵害小國雞澤之盟陳侯使袁僑左傳注轅濤塗四世孫如會求成事在二年楚司馬公子何忌遂侵陳會陳成公卒子溺嗣是為哀公楚人聞喪乃止陳人卒不聽楚命楚彭名侵之使頓今河南陳州府項城縣北有南頓故城古頓子國漢書地理志應劭注頓迫于陳其後南徙故號南頓間陳而伐之陳人圍頓事在三年至是晉侯合諸侯于戚以戍陳楚令尹公子貞楚人討陳叛故知由令尹子辛乃殺子辛而以子囊為令尹帥師伐陳晉士魴曰楚人討二而疾伐陳陳近于楚能無往乎晉侯復合諸侯于城棣今河南開封府陽武縣北有南棣北棣二城即春秋城棣以救之後楚公子貞圍陳晉侯率諸侯會陳侯于鄬是時鄭伯會鄬公子騑相使賊夜弒鄭伯以瘧疾赴于諸侯立子嘉是為簡公鄬鄭地陳人患楚使告陳侯于會曰君若不來羣臣不忍宗廟社稷懼有二圖陳侯逃歸事在王六年丁酉八年晉侯宋公魯侯衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光伐鄭同盟于戲即戲童在河南開封府汜水縣南水經注汜水出浮戲之山是也鄭既與晉成公子發即子國穆公子公孫輒即子耳穆公孫侵蔡獲其司馬公子燮蔡莊公子諸侯會于邢邱即今河南懷慶府溫縣平皋故城漢書地理志河南郡平臯晉曰邢邱鄭伯獻捷以聽命是會晉侯以命朝聘之數使諸侯之大夫聽命魯季孫宿齊髙厚宋向戌衛寧殖邾大夫會之季孫宿行父之子諡武子髙厚固之子向戌宋桓公子肸之孫于是楚公子貞帥師伐鄭子駟曰姑從楚以紓吾民晉師至吾又從之犧牲玉帛陳于二境以待強者而庇民焉子展曰小所以事大信也晉君方明四軍無闕八卿和睦必不棄鄭不如完守以老楚仗信以待晉子駟曰從楚騑受其咎鄭及楚平事在王七年晉侯率諸侯伐鄭師于汜鄭有二汜東汜在新鄭南汜在襄城此東汜也秦晉圍鄭秦軍汜南即此鄭人恐復行成于晉中行偃曰遂圍之以待楚人之救而與之戰智罃曰許之盟而還師以敝楚吾三分四軍與諸侯之鋭以逆來者于我未病楚不能矣猶愈于戰乃許鄭成同盥于戲晉師還晉侯謀所以息民者魏絳請施舍自公以下茍有積者盡出之國無滯積亦無困人公無禁例亦無貪民祈以幣更不用勝賓以特牲器用不作仍其舊車服從給止足給事行之期年國乃有節三駕而楚不能爭左傳注三駕三興師也一師于牛首二師于向三觀兵于鄭東門自是鄭遂服戊戌九年晉侯使士丐平王室先是王使王叔陳生王叔周卿士訴戎于晉王叔二于戎晉士魴執之以如京師事在四年及是王叔與伯輿王卿士爭政王右伯輿王叔怒而出奔及河王復之不入晉侯使士丐平王室王叔之宰與伯輿之大夫瑕禽坐獄于王庭士丐聼之曰天子所右寡君亦右之所左亦左之使王叔與伯輿合要王叔不能舉其契春秋疏使其兩相辨答伯輿詞直王叔不能舉要契之詞也王叔奔晉單子頃公子靖公為卿士以相王室己亥十年魯作三軍魯季孫宿告叔孫豹得臣之子穆子請為三軍左傳注魯上下二軍皆屬于公有事三卿更率以征伐季氏欲專其民人故假立中軍因以改作各征其軍豹不欲宿固請之乃盟諸僖閎僖公廟門詛諸五父之衢元和志五父衢在曲阜縣東南正月作三軍三分公室各有其一三子各毁其乘各自壞其舊時車乘分以足成三軍使各自屬其軍季氏使其乘之人以其役邑入者無征春秋疏役謂共官力役則今之丁也邑謂賦稅若今之租調也以其役與邑皆來季氏者則公室無征不入者倍征若不入季氏者則使公家倍征之毆之使入已也孟氏使半為臣若子若弟取其子弟之半為臣四分其乘之人以三歸公而取其一叔孫氏使盡為臣盡取子弟以其父兄歸公晉侯宋公魯侯衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭會于蕭魚春秋彚纂注蕭魚鄭地路史曰少昊後嬴姓國修魚即蕭魚也戲之盟晉人不得志于鄭復以諸侯伐之門其三門而還尋楚子伐鄭鄭又及楚平子駟將與楚成子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰要盟無質背之可也乃及楚平事在王八年子孔即公子嘉穆公子子蟜即公孫蠆子遊之子使公孫輒從楚公子貞伐宋又使皇耳皇戍子侵衛衛人追之獲耳于犬邱輒復受楚令伐魯圍蕭克之魯仲孫蔑曰鄭其有災乎師競已甚于是晉侯會諸侯伐鄭師于牛首初鄭子駟與尉止有爭至是將禦諸侯之師而黜其車尉止獲又抑之弗與獻尉止乃帥賊攻西宫之朝殺子駟子國子耳劫鄭伯以如北宫子國之子子産攻盜于北宫獲尉止牛首今河南開封府牛首城是子産即公孫僑諸侯之師城虎牢而戍之晉師城梧春秋彚纂注梧杜預曰鄭地案隋書滎陽縣有梧桐澗或即是梧也及制即城臯在開封府滎陽縣士魴魏絳戍之鄭及晉平此三駕之一楚公子貞救鄭諸侯之師還繞也鄭而南楚師不退師遂進與楚夾潁潁水出河南登封縣潁谷至江南潁上縣入淮而軍鄭公孫蠆與楚人盟子蟜曰諸侯必不戰矣從之將退不從亦退退楚必圍我不如從楚亦以退之宵涉潁與楚人盟欒黶欲伐鄭師荀罃不可侵鄭北鄙而歸楚人亦還事皆在王九年鄭公孫舍之即子展子罕之子侵宋鄭人患晉楚之故諸大夫曰楚弱于晉何由而使晉師至死于我楚弗敢敵而後可固與也子展曰與宋甚為惡諸侯必至吾從之盟楚師至吾又從之則晉怒矣晉能驟來楚將不能吾乃固與晉大夫説之于是子展遂侵宋以致諸侯晉侯復會諸侯師于向注見前伐鄭鄭人行成同盟于亳城北此三駕之二亳城西亳也在今偃師楚公子貞乞師于秦以伐鄭鄭伯逆之伐宋晉侯乃會諸侯悉師以復伐鄭觀兵于鄭東門鄭使良霄即伯有子耳之子考左傳鄭七穆皆穆公子子良之後為良氏子遊之後為遊氏子國之後為國氏子罕之後為罕氏子駟之後為駟氏子印之後為印氏子豐之後為豐氏皆以字為氏石㲋亦作石盂如楚告將服于晉楚人執之後復歸于鄭使王子伯駢行成晉趙武入盟鄭伯鄭公孫舍之出盟晉侯會于蕭魚是為三駕赦鄭囚皆禮而歸之鄭人賂晉侯以師悝師觸師蠲皆樂師歌鐘二肆肆列也縣鍾十六為一肆二肆三十二枚及鎛磬女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎以正諸夏八年之中九合諸侯史記集解服虔曰九合一會戚二會城棣三會鄬四會邢邱五盟戲六會柤七會虎牢八盟宅城九會蕭魚如樂之和無所不諧請與子樂之辭曰國之福也君之靈也二三子之勞也臣何力之有焉抑臣願君安其樂而思其終也書曰居安思危思則有備有備無患敢以此規晉侯曰子之教敢不承命賞則不可廢也子其受之魏絳于是有金石之樂晉悼公復霸庚子十有一年吳子乘卒壽夢四子長諸樊春秋經書遏次餘祭左傳作戴次餘昧左傳作夷末次季札季札賢壽夢欲立之季札讓乃立諸樊諸樊已除喪讓位季札季札辭曰曹宣公之卒諸侯不義曹君成公負芻也事見簡王八年將立子臧子臧去之君子曰能守節札雖不才願附子臧以無失節固立之棄其室而耕乃舍之辛丑十有二年晉復三軍晉于三軍之外作三行又作六軍至是始復大國三軍之制晉侯搜于綿上即綿上聚注見前以治兵使荀偃將中軍士丐佐之趙武將上軍韓起韓厥子諡宣子佐之欒黶將下軍魏絳佐之新軍無帥晉侯難其人使其什吏率其卒乘官屬以從于下軍明年荀偃以諸侯之師伐秦無功而還晉人謂之遷延之役遂舍新軍伐秦之役欒黶之弟針與士鞅馳秦師針死士鞅反欒黶欲殺鞅鞅奔秦秦伯問晉大夫誰先亡對曰欒氏其在盈乎秦伯曰何故對曰武子之德在民是庇其子欒黶死盈之善未能及人武子所施沒矣而黶之怨實章將于是乎在秦伯以為知言請于晉而復之丐士鞅即范獻子之子壬寅十有三年春二月乙未朔日有食之衛侯出奔齊衛侯戒孫林父寧殖食皆服而朝日旰不召而射鴻于囿二子從之不釋皮冠而與之言二子怒林父如戚戚即戚城林父食邑自獻公之立林父置其重器于戚而善晉大夫孫蒯文子之子入使衛侯飲之酒使大師歌巧言之卒章左傳注巧言詩卒章曰彼何人斯居河之麋無拳無勇職為亂階公以喻文子居河上而為亂大師辭師曹請為之初公有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百故師曹欲歌此以怒孫子而報公衛侯使歌之遂誦之恐孫蒯不解故蒯懼告林父林父曰君忌我矣弗先必死遂入告蘧瑗衛大夫字伯玉對曰君制其國臣敢姦之乎遂行從近關出衛侯使子蟜子伯子皮三子皆羣公子與林父盟林父殺之衛侯如鄄注見前使子行亦羣公子于林父又殺之衛侯出奔齊齊人以郲寄衛侯其復也以郲糧歸郲即萊國齊滅之為邑今山東萊州府掖縣是衛人立公孫剽字子叔穆公孫是為殤公孫林父寧殖相之以聽命于諸侯晉侯問衛故于中行偃對曰衛有君矣伐之未可以得志而勤諸侯仲虺有言曰推亡固存國之道也君其定衛以待時乎于是會于戚以謀定衛癸卯十有四年秋八月丁巳日有食之甲辰十有五年晉侯宋公魯侯衛侯殤公剽鄭伯曹伯莒子邾子薛伯把伯小邾子會于溴梁爾雅梁莫大于湨梁懷湨梁水隄也今河南慶府濟源縣有湨水東徑孟縣入河大夫盟晉悼公卒子彪立是為平公既葬會諸侯于溴梁宴于溫使諸大夫舞曰歌詩必類齊髙厚之詩不類荀偃怒曰諸侯有異志矣使諸大夫盟髙厚髙厚逃歸于是晉荀偃宋向戍魯叔孫豹衛寧殖鄭公孫蠆小邾之大夫盟曰同討不庭張氏洽曰春秋魯莊公十三年以前禮樂征伐自諸侯出而權未一也自桓文繼霸列國之政齊晉專之然猶在諸侯也自溴梁以後則皆自大夫出矣故春秋于此書大夫盟著世變之益降也丙午十有七年晉侯宋公魯侯衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子同圍齊齊二于晉士丐假羽毛于齊而弗歸齊人始二焉羽毛王者遊車之旌齊私有之故假故伐魯圍成事在王十四年縣成魯邑今山東兖州府寧陽東北有成城湨梁之會髙厚逃歸齊再伐魯魯使叔孫豹如晉言齊故事在王十五年齊人以未得志于魯圍桃今兖州府汶上縣桃鄉故城是及防髙厚圍臧紇于防聊叔紇臧疇臧賈帥甲三百宵犯齊師齊師去之獲臧堅齊侯使夙沙衛唁之令無死堅不可以杙抉其傷而死梁防注見前臧紇即武仲文仲孫聊叔紇即叔紇臧疇臧賈武仲昆弟復使邾人伐魯南鄙事在王十六年齊人又伐魯北鄙于是晉侯伐齊濟河會諸侯于魯濟古濟水經齊魯之地在齊者為齊濟在魯者為魯濟尋湨梁之言同伐齊齊侯禦諸平隂今山東泰安府平隂縣有故城在縣東北即春秋齊邑塹防門而守之廣里防門在今平隂縣東北水經注防門北有光里齊人音廣與光同即春秋所謂守之廣里者也夙沙衛齊靈公寺人曰不能戰莫如守險弗聽諸侯之士門焉齊人多死齊侯登巫山在今泰安府肥城縣西北亦曰孝堂山以望晉師晉人使司馬斥山澤之險雖所不至必斾而疏陳之斥候也疏建旌旗以為陳示衆也使乘車者左實右偽以斾先偽以衣服為人形建斾以先驅輿曳柴而從之齊侯見之畏其衆也乃脫歸夜遁師曠告晉侯曰鳥烏之聲樂齊師其遁邢伯告中行伯曰有班馬之聲齊師其遁叔向告晉侯曰城上有烏齊師其遁師曠晉樂師邢伯韓氏别族中行伯即獻子叔向即羊舌肸職次子諸侯之師入平隂從齊師遂克京兹在平隂縣東南克邿今平隂縣西邿山是圍盧今濟南府長清縣有盧城春秋齊盧邑門于雍門齊城門焚之及郭秦周伐雍門之荻范鞅之御以戈殺犬于門中孟莊子斬其橁以為公琴焚雍門及西郭南郭又焚申池之竹木及東郭北郭子孟莊子即仲孫速獻之子荻橁皆木名又門于揚門齊西門及東閭齊東門齊侯駕將走郵棠今萊州府平慶州東南有棠鄉亦曰甘棠社即郵棠太子與郭榮齊大夫扣馬曰師速而疾略也將退矣君何懼焉且社稷之主不可以輕乃止諸侯東侵及濰地理今釋濰水出山東莒州濰山土人名為淮河東流折北至萊州府昌邑縣入海南及沂沂水注見前舊入于泗今東流徑江南宿遷縣滙為駱馬湖明年還自沂上盟于督揚春秋經諸侯盟于祝柯杜預曰左傳見前督揚即祝柯也祝柯即祝阿注是秋齊靈公卒故太子光立是為莊公初靈公娶于魯曰顔懿姬無子其侄鬷聲姬生光以為太子既而廢光立所嬖之子牙使髙厚傅之夙沙衛為少傅靈公疾崔杼微逆光疾病而立之靈公卒莊公即位執子牙崔杼段髙厚夙沙衛以髙唐叛圍而克之醢衛于軍晉士丐帥師伐齊及穀注見前聞齊喪乃還楚公子午字子庚楚令尹帥師伐鄭鄭公子嘉欲去諸大夫將叛晉而起楚師以去之使告楚令尹午午弗許楚子使人問之午對使者曰諸侯方睦于晉臣請嘗之若可君繼之不可收師而退可以無害君亦無辱午遂帥師治兵于汾今許州襄城縣東北有汾邱城戰國䇿楚北有汾陘之塞是也于是鄭公孫蠆良霄公孫黑肱字子張穆公孫子印子從鄭伯伐齊嘉及公孫舍之公孫夏字子西子駟之子守二子知嘉謀完守入保嘉不敢會楚師楚師門于純門注見前信再宿也于城下而還涉于魚齒之下魚齒山在今河南汝州寶豐縣東南其下有滍水故曰涉甚雨及之楚師多凍役徙幾盡晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競楚必無功董叔晉大夫曰天道多在西北嵗在豕韋月又建亥故曰多在西北豕韋一名陬訾亥之次也南師不時必無功羊舌肸時為太傳曰在其君之德也明年鄭人患嘉專政討純門之難公孫舍之公孫夏遂殺嘉而分其室舍之當國夏聽政立公孫僑為卿戊申十有九年冬十月丙辰朔日有食之己酉二十年晉欒盈出奔楚初欒黶娶于范丐即士丐范釋見後生盈范鞅以其亡秦也范鞅奔秦事見前怨欒氏故與盈共為公族大夫而不相能欒黶卒欒祁即黶妻范丐女范氏堯後故祈姓與其老州賓通幾亡室言亂也矣盈患之祈懼討訴于丐曰盈將為亂鞅為之徵盈素好施士多歸焉丐因其多士也信之時盈佐下軍丐使城著左傳注晉邑而逐之盈出奔楚丐殺其黨箕遺黃淵嘉父司空靖邴豫董叔邴師申書羊舌虎叔羆于是知起中行喜州綽邢蒯俱出奔齊十子皆晉大夫欒盈之黨羊舌虎叔向弟囚籍偃羊舌赤羊舌肸祁奚言肸于丐乃免叔向曰祁大夫外舉不棄讐內舉不失親其獨遺我乎于是祁奚老矣聞之乘馹而見范宣子曰謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者若之何以虎也棄社稷宣子説與之乘以言諸公而免之不見叔向而歸叔向亦不告免焉而朝秋九月庚戌朔日有食之冬十月庚辰朔日有食之晉侯齊侯宋公魯衛侯鄭伯曹伯成公子武公滕莒子邾子會于商任左傳注地闕錮欒氏也明年復會于沙隨注見也以錮之庚戌二十有一年冬十月庚子孔子生是年為魯襄公二十二年孔子之先宋人也家語孔子宋之後宋襄公熙生弗父何及厲公方祀弗父以下世為宋卿何生宋父周周生勝勝生正考父考父生孔父嘉五世親盡别為公族故後以為氏焉孔父生子木金父金父生睪夷睪夷生防叔避華氏之禍而奔魯父叔梁紇家語防叔生伯夏伯夏生叔梁紇左傳襄公十年晉伐逼陽逼陽人啓門諸侯之壬門焉縣門發聊人紇抉之以出門者又襄公十七年聊叔紇帥甲三百宵犯齊師孔安國曰聊孔子父叔梁紇所治邑母顔氏家語叔梁紇生九女無子其妾生孟皮有足疾乃求婚于顔氏顔氏三女其小曰徵在顔父問三女曰聊大夫聖王之裔其人身長十尺武力絶倫雖年大性嚴不足為疑三子孰能為之妻徴在進曰從父所制父曰即爾能矣遂以妻之徵在既廟見以夫之年長懼不時有男而私禱尼山以祈焉以是年庚戌之嵗十月庚子生孔子公羊傳魯襄公二十一年冬十一月庚子孔子生榖梁傳二十一年冬十月庚子孔子生考是年十月為庚辰朔經有明文則庚子為二十一日迄六旬而再得庚子則當在十二月不得在十一月也杜預左傳注孔子魯襄公二十二年生至哀公十六年七十三嵗也羅泌路史餘論公羊子言十一月是月固無庚子孔氏家譜祖庭記俱云二十二年十月庚子乃二十七日周正十月乃今之八月今定著八月二十七日為先聖孔子生日羅氏之論如此今以杜預春秋長歷合之是年酉月為甲戊自甲戌推至庚子為二十七日酉月今八月周十月也于魯昌平鄉鄹邑括地志昌平山在泗水縣南孔子生昌平鄉蓋鄉取山為名闕里志昌平山在曲阜縣東南其東即尼山又東為顔母山連泗水鄒縣界鄹邑今曲阜縣東南郰城是也孔子生而墟頂因名焉為兒嬉戲陳爼豆設禮容及長為委吏科量平為司職吏今氏前編注職讀為樴繫養犧牲之所畜蕃息魯仲孫貜即孟僖子孟莊子庶子孝伯羯之子使其子何忌孟懿子與南宫適居南宫因氏字子容諡敬叔懿子庶兄往學禮焉史記孟僖子病誡其嗣懿子曰仲尼聖人之後滅于宋其祖弗父何嘗有宋而讓厲公及正考父佐戴武宣三命滋益恭故鼎銘云一命而僂再命而傴三命而俯循墻而走亦莫余敢侮饘于是粥于是以糊余口其恭如是吾聞聖人之後雖不當世必有達者仲尼年少好禮其達者歟吾即沒若必師之辛亥二十有二年春二月癸酉朔日有食之欒盈復入于晉晉人殺欒盈盈自楚適齊晏嬰字平仲晏弱之子諌齊侯曰商任之會受命于晉今納欒氏將安用之弗聽晉將嫁女于吳齊侯使析歸父媵之以藩車之有障蔽者載欒盈及其士納諸曲沃盈夜見胥午守曲沃大夫而告之午伏盈而觴曲沃人樂作午言曰今也得欒孺子何如對曰得主而為之死猶不死也皆歎有泣者爵行又言皆曰得主何二之有盈出遍拜之遂帥曲沃之甲因魏舒終之子諡獻子以入絳盈先佐魏絳于下軍舒私焉故因之魏氏及七輿大夫下軍之屬注見前與之樂王鮒諡桓子晉大夫侍于范丐或告曰欒氏至矣樂王鮒使丐奉晉侯如固宫宮之有臺觀備守者國語作襄公之宫使鞅迎魏舒則成列既乘將迎欒氏鞅趨進曰鞅之父與二三子在君所矣使鞅逆吾子鞅請驂乘遂超乘右撫劍左援帶命驅之出僕請鞅曰之公既至丐逆諸階執舒手賂之以曲沃使斐豹殺欒氏之力臣督戎斐豹𨽻也著于丹書謂范丐曰茍焚丹書我殺督戎丐許之豹遂繫殺督戎欒氏乘公門鞅用劍以帥卒欒氏退攝車從之欒盈奔曲沃晉人圍而克之盡殺欒氏之族惟欒魴欒氏族出奔宋齊侯伐衛遂伐晉齊侯伐衛將自衛伐晉晏嬰曰君恃勇力以伐盟主若不濟國之福也不德而有功憂必及君崔杼亦諫弗聼遂伐晉取朝歌注見前初為衛邑後為晉有為二隊入孟門注見前登太行述征記太行山首始河內北至幽州凡百嶺連亘十三州之界有入陘其二曰太行陘元和志太行陘在懷州河內今河內縣屬河南懷慶府春秋晉地張武軍于熒庭即陘庭注見前戍郫邵左傳注晉邑封少水即澮水有二源一出翼城烏嶺山一出絳縣東北至曲沃縣合流入于汾以報平隂之役師還復襲莒門于且于莒地在今沂州府莒州傷股而退華還即華周杞殖即把梁載甲夜入且于之隧明日遇莒子于蒲侯氏左傳注近莒之邑莒子鼓之獲把梁莒人行成齊侯歸禮記檀弓齊莊公襲莒子奪把梁死焉其妻迎其柩于路而哭之哀莊公使人弔之對曰君之臣不免于罪則將肆諸市朝而妻妾執君之臣免于罪則有先人之敝廬在君無所辱命榖洛鬭榖水出河南府澠池縣榖陽谷東流合澗水至洛陽縣西南入洛洛水注見前韋昭國語注兩水格有似于鬬洛在王城南榖在王城北至靈王時榖水盛出于王城之西而南流入于洛榖洛二水鬭將毁王宫王欲壅之太子晉諫曰不可晉聞長民者不墮山不崇藪不防川不竇澤是以民無夭昏札瘥之憂飢寒乏匱之患故上下能相固以待不虞古之聖王唯此之慎今吾執政無乃實有所避違也而滑音汨亂也夫二川之神使至于爭明以妨王宫王而飾之無乃不可乎王卒壅之壬子二十有三年鄭伯朝晉先是晉人徵朝于鄭鄭少正公孫僑以辭却之事在王二十一年于是晉范丐為政諸侯之幣重鄭人患之故鄭伯如晉公孫僑寓書于公孫夏以告范丐曰子為晉國四鄰諸侯不聞令德而聞重幣僑也惑之僑聞長國家者非無賄之患而無令名之難夫諸侯之賄聚于公室則諸侯二若吾子賴之則晉國二諸侯二則晉國壞晉國二則子之家壞將焉用賄象有齒以焚其身賄也范丐説乃輕幣是年魯叔孫豹如晉范丐問曰古人有言曰死而不朽何謂也對曰豹聞之太上有立德其次有立功其次有立言雖久不廢此之謂不朽秋七月甲子朔日有食之既八月癸巳朔日有食之齊人來城郟注見前魯叔孫豹入聘是時榖洛鬬王城毁齊人方叛晉欲求媚于王乃為王城郟魯叔孫豹來京師聘且賀城王嘉豹有禮賜之大路癸丑二十有四年齊崔杼弒其君光崔杼取棠公棠邑大夫之妻薑氏棠公妻東郭偃之姊東郭偃臣崔杼棠公死偃御杼以弔杼見棠薑美遂取之齊侯通焉驟如崔氏以杼之冠賜人杼因是欲弒齊侯且以説于晉齊侯方叛晉未獲間會莒子朝于齊饗諸北郭杼稱疾不視事齊侯問杼疾遂從薑氏薑入于室與杼自側户出齊侯拊楹而歌門閉甲興齊侯踰墻走射之中股反隊遂弒之賈舉州綽邴師公孫敖封具鐸父襄伊僂堙皆死祝他父祭于髙唐至復命不脫辨而死申蒯侍漁者與其宰皆死杼復殺鬷蔑于平隂晏嬰立于崔氏之門外門啓而入枕尸股而哭興三踊而出人謂杼弒之杼曰民之望也舍之杼立靈公子杵臼而相之初魯叔孫僑如奔齊納其女于靈公生杵臼是為景公慶封字子家慶克子公子無虧孫為左相盟國人于大宫太公廟曰所不與崔慶者晏嬰仰天歎曰嬰所不惟忠于君利社稷者是與有如上帝乃歃太史書曰崔杼弒其君杼殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞太史盡死執簡以往聞既書乃還杼葬莊公于士孫之里四翣不蹕下車七乘不以兵甲時晉侯方會諸侯于夷儀注見前本邢地後衛滅邢為衛邑伐齊以報朝歌之役齊人以莊公説使隰鉏朋曾孫請成慶封如師以重賂賂晉侯以宗器樂器自六正五吏三十帥三軍百官之正長師旅及處守者皆有賂晉侯許之而告于諸侯初杼生子成及疆而寡偏喪曰寡寡特也娶東郭薑生明因立明而使東郭偃棠無咎棠公子薑所出相之廢成及疆二子怒欲殺偃無咎以告慶封封曰難吾助汝成與疆遂殺偃無咎杼怒往見慶封封曰崔慶一也是何敢然請為子討之使盧蒲嫳帥甲以攻崔氏弗克使國人助之遂滅崔氏殺成及疆而盡俘其家東郭薑縊嫳反命于杼且御以歸至則無歸矣杼乃縊崔明夜辟諸大墓開先人冢藏之奔魯事在王二十六年慶舍之難事具王二十七年齊人求得杼尸戮之于市改葬莊公于北郭吳子遏即諸樊伐楚門于巢卒初楚公子嬰齊伐吳使鄧廖以組甲三百被練三千侵之吳人要而擊之獲楚鄧廖楚能免者組甲八十被練三百而已事在王二年自是吳楚兵爭不息王之十二年楚共卒吳伐楚喪楚敗之庸浦明年楚公子貞伐吳吳敗之臯舟之隘至二十三年楚子為舟師以伐吳無功而還注庸浦楚地在今廬州府無為州南臯舟之隘左傳吳險厄之道吳復召舒鳩舒國偃姓今江南廬州府舒城縣有舒鳩城羣舒之一使叛楚楚令尹屈建屈到子字子木伐舒鳩吳人救之楚大敗吳師遂滅舒鳩先是匡王五年楚滅舒蓼簡王十二年楚滅舒庸及舒鳩滅羣舒遂絶至是吳諸樊伐楚門于巢注見前巢牛臣曰吳君勇而輕若啓之將親門我獲射之必殪從之吳子門焉牛臣隱于短墻以射之諸樊卒授國餘祭後餘祭被弒吳伐越獲浮焉以為閽使守舟餘祭觀舟閽以刀弒之弟餘昧立甲寅二十有五年衛寧喜即悼子弒其君剽衛侯衎復歸于衛初寧殖疾召其子喜曰吾得罪于君悔而無及名藏在諸侯之䇿曰孫林父寧殖出其君君入則掩之若能掩之則吾子也喜許諾事在王十九年至是衛侯衎在夷儀晉使魏舒逆獻公于齊將使衛與之夷儀獻公遂入于夷儀在王二十十四年使其母弟鱄字子鮮謂喜曰茍反政由寧氏祭則寡人喜告蘧瑗瑗曰瑗不得聞君之出敢聞其入遂行從近關出告右宰榖右宰榖不可喜曰吾受命于先人不可以二時孫林父在戚孫嘉聘齊孫襄即伯國居守嘉及襄皆林父子喜與右宰榖攻孫氏不克喜出舍于郊伯國傷而死國人召喜喜復攻之遂克弒殤公殺其子角衛侯遂入孫林父入於戚以叛衛人伐戚林父訴于晉晉戍茅氏左傳注戚東鄙殖綽齊人在衛伐茅氏殺晉戍三百人孫蒯追之敗諸圉雍鉏獲殖綽晉趙武會魯侯及諸侯之大夫于澶淵亦曰繁淵今謂之澶州陂在直𨽻大名府開州西南古澶水所經故名討衛疆戚田取衛西鄙懿氏六十左傳注戚城西北有懿城因姓以名城取田六十井也今開州西北有故懿城址以與孫氏衛侯如晉晉執而囚之衛人歸衛姬于晉乃釋衛侯衛侯既歸寧喜專公孫免餘衛大夫請殺之遂攻寧氏殺喜及右宰榖尸諸朝初太叔儀聞喜將納衛侯曰寧子視君不如奕棋其何以免乎奕者舉棋不定不勝其耦況置君而弗定乎必不免矣九世之卿族一舉而滅之可哀也哉至是果敗太祖儀諡文子衛文公之孫公子鱄出奔晉鱄曰逐我者出納我者死賞罰無章何以沮勸且鱄實使之遂奔晉公使止之不可托于木門不向衛國而坐木門大夫勸之仕曰吾不可以立于人之朝矣終身不仕事在王二十六年木門晉邑乙卯二十有六年晉趙武楚屈建魯叔孫豹蔡公孫歸生衛石惡石買子諡悼子陳孔奐鄭良霄許人曹人盟于宋宋向戌善于晉趙武又善于楚令尹屈建欲弭諸侯之兵以為名如晉告趙武以韓起言許之如楚楚亦許之遂如齊且告于秦皆許之乃遍告于諸國為會于宋晉趙武先至宋宋人享之叔向為介諸侯之大夫及邾滕之君先後至丙午鄭良霄至戊申魯叔孫豹齊慶封陳須無衛石惡至甲寅晉荀盈至丙辰邾悼公至戊辰滕成公至也陳須無即文子敬仲曽孫楚公子黑肱即子晢成言于晉宋向戍如陳從令尹子木成言于楚成晉楚盟載之言兩相然可楚屈建至自陳陳孔奂蔡公孫歸生亦至諸侯從晉楚者釋齊秦交相朝見子木謂向戍曰晉楚之從交相見也向戌復趙孟趙孟曰晉楚齊秦匹也楚若能使秦君辱于敝邑寡君敢不固請于齊向戍復子木子木使馹謁諸王王曰釋齊秦他國請相見也故齊秦不與盟將盟伯夙謂趙孟曰楚氛甚惡懼難楚人衷甲趙武患之羊舌肸曰以信召人而以僭不信也濟之必莫之與也安能害我乃盟齊人請邾宋人請滕皆不與盟晉楚爭先羊舌肸謂趙武曰子務德無爭先且諸侯盟小國固必有尸盟者小國主辦具乃先楚人盟于宋蒙門之外諸侯之大夫歸宋向戍請賞宋公與之邑以示樂喜即司城子罕吕之孫喜曰天生五材民並用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文德也聖人以興亂人以廢廢興存亡昏明之術皆兵之由也而求去之不亦誣乎向戍乃辭邑冬十有二月乙亥朔日有食之丙辰二十有七年齊慶封奔魯慶封與子舍政舍字子之封當國不自為政以付其子舍遷其內實于盧蒲嫳氏易內而飲酒國遷朝焉諸大夫就盧蒲氏朝封反亡人莊公之難出奔者盧蒲癸癸臣舍有寵舍妻之舍之士謂癸曰男女辨姓子不辟宗何也癸曰賦詩斷章余取所求焉惡識宗慶與盧蒲皆齊之宗故舍之士云癸言王何而反之二人皆嬖二人皆莊公故臣今還求寵于慶氏為莊公報讐使執寢戈親近兵仗而先後之二人因謀攻慶氏卜之示舍兆曰或卜攻讐敢獻其兆舍曰克見血慶封田于萊即郲注見前盧蒲薑癸妻即慶舍女知癸謀謂癸曰夫子愎莫之止將不出我請止之癸曰諾時當嘗于太公之廟慶舍蒞事盧蒲薑告舍且止之弗聽曰誰敢者遂如公盧蒲癸王何執寢戈以從遂殺慶舍于廟慶封歸遇告亂者伐門而入攻公宫弗克請戰弗許乃奔魯封獻車于季武子美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也展莊叔展禽族既而齊人讓魯封奔吳吳與之朱方今江南鎮江府丹徒縣吳朱方地封聚族而居焉封富于具舊魯子服惠伯謂叔孫曰天殆富淫人慶封又富矣穆子曰善人富謂之賞淫人富謂之殃天其殃之也其將聚而殱旃亦子服惠伯仲孫蔑子它别為子服氏惠伯它之子曰孟椒後楚子伐吳殺慶封而盡滅其族事詳後王崩諡曰靈冡在河南城西南柏家西周山上太子晉早卒次子貴立是為景王景王丁巳元年吳子使札聘于魯及齊鄭衛晉札至魯請觀周樂歌周南召南列國之風小雅大雅及頌舞象簫南籥大武韶濩大夏至韶簫札曰德至矣哉大矣如天之無不幬也如地之無不載也觀止矣若有他樂吾不敢請已札見叔孫豹而説之謂曰君子務在擇人子為魯宗卿而任其大政不慎舉何以堪之遂聘于齊説晏嬰謂曰子速納邑與政乃免于難晏子因陳桓子納已與政遂免欒髙之難事見後陳桓子名無宇文子之子及鄭見公孫僑如舊相識與之縞帶子産獻紵衣焉謂曰鄭之執政侈謂伯有難將至矣政必及子子為政慎之以禮不然鄭國將敗適衛説蘧瑗史狗史朝之子諡文子史鰌即史魯公子荆公子朝皆衛大夫公孫發獻公孫諡文子曰衛多君子未有患也自衛如晉將宿于戚孫林久邑聞鐘聲曰異哉夫子獲罪于君以在此林父以戚叛猶燕之巢于幕上君又在殯獻公方卒而可以樂乎遂去之林父聞之終身不聽琴瑟適晉説趙武韓起魏舒曰晉國其萃于三族乎説羊舌肸將行謂之曰君侈而多良謂多以惡人為良而善之大夫皆富政將在家吾子好直必思自免于難戊午二年蔡世子般音班弒其君固文公子景公蔡侯為太子般娶于楚通焉般弒蔡侯遂自立是為靈公立十二年為楚靈王所殺事具後宋災伯姬魯宣公女宋共公夫人卒宋火災火及伯姬之舍左右曰夫人少避火乎伯姬曰婦人之義傅母不在宵不下堂左右又曰夫人少避火乎伯姬曰婦人之義保母不在宵不下堂遂逮乎火而死既葬諡曰共王殺其弟佞夫靈王子王子瑕奔晉初王儋季靈王弟卒其子括將見王而歎單公子愆期單靖公之弟為靈王御士過諸廷愆期行過王廷聞其歎而言曰烏乎必有此夫欲有此朝廷之權入以告王且曰必殺之不戚而願大視躁而足髙心在他矣不殺必害王曰童子何知及靈王崩儋括欲立王子佞夫佞夫弗知儋括圍蒍蒍氏食邑注見前逐成愆蒍邑大夫成愆出奔尹言多尹氏之後劉毅劉子之族甘過子帶食邑于草今河南府洛陽縣故甘城是甘過甘簡公子諡悼公單蔑單子之族鞏成鞏伯食邑于鞏今河南鞏縣是也殺佞夫王子瑕奔晉儋括及廖同奔鄭以公孫僑為政鄭良霄嗜酒為窟室地室也而夜飲朝至未巳既而朝使公孫黑即子晳子駟子如楚先是伯有使黑如楚黑以楚鄭方惡辭伯有不可黑怒欲攻伯有大夫和之事在王元年歸而飲酒公孫黑以駟氏之甲伐而焚之良霄奔雍梁今河南開封府禹州有雍城即鄭雍梁地醒而後知之于是鄭大夫皆受盟于駟氏良霄聞之怒自墓門鄭城門之瀆入介于襄庫伐舊北門駟帶公孫夏之子字子上率國人以伐之良霄死于羊肆公孫僑禭之殯而葬諸斗城鄭邑在今開封府陳留縣駟氏欲攻之罕虎即子皮子展之子不許而授僑以政僑辭曰國小而逼族大寵多不可為也虎曰虎率以聽誰敢犯子子善相之僑為政使都鄙有章國都及邉鄙尊卑各有分部上下有服公卿大夫服不相踰田有封洫封疆洫溝也廬井有五廬舍也九夫為井使五家相保大人謂卿大夫之忠儉者從而與之泰侈者因而斃踣也之一年輿人衆人也誦之曰取我衣冠而褚畜而藏也之取我田疇而伍之孰殺子産我其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之鄭人遊于鄉校以論執政然明曰毁鄉校何如子産曰何為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之子皮欲使尹何為邑子産曰少未知可否子皮曰願吾愛之使夫往而學焉夫亦愈知治矣子産曰不可僑聞學而後入政未聞蔑以政學者也若果行此必有所害然明即鬷後公孫黑將為亂欲去遊氏而代其位以疾作不果僑使吏數之數其罪曰女有亂心無厭國不女堪不速死大刑將至黑乃縊僑尸諸衢加木焉書罪于木以加尸上事在王五年己未三年魯侯午卒子稠立是為昭公魯襄公卒于楚宫先是公作楚宫叔孫豹曰君欲楚也夫若不復適楚必死是宫也至是卒于宮子野立敬歸之子以毀卒過哀滅性季孫宿乃立稠敬歸娣之子于是年十九矣猶有童心居喪不哀比及葬三易衰識者知其不能終焉魯襄公卒之月鄭公孫僑相鄭伯如晉晉侯以魯喪未見僑使盡壞其館之垣而納車馬焉士丐讓之對曰敝邑褊小介于大國誅求無時是以不敢寧處悉索敝賦以來會時事逄執事之不聞而未符見不敢輸幣亦不敢暴露今諸侯之館門不容車而不可踰越益賊公行而夭癘不戎賓見無時命不可知若又勿壞是無所藏幣以重罪也敢請執事將何所命士丐復命趙武曰信使丐謝不敏晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館庚申四年晉趙武楚公子圍楚共子齊國弱諡景子國佐子宋向戌魯叔孫豹衛齊惡公羊作石惡陳公子招陳哀公母弟蔡公孫歸生鄭罕虎許人曹人會于虢故東虢國後為鄭滅楚公子圍聘于鄭且娶于公孫假即伯石穆公子子豐之子氏伍舉為介將入館鄭使行人子羽與之言乃館于外既聘將以衆逆子産使子羽辭焉伍舉知鄭有備乃請垂櫜而入子伍舉伍參子亦曰椒舉羽即公孫撣遂會于虢尋宋之盟也圍請用牲讀舊書加于牲上而已晉人許之先是莒展輿弒其君犂比公而自立既而齊納其弟去疾于莒展輿奔吳于是莒亂季孫宿取鄆至是莒訴于會楚欲戮魯使趙孟為魯固請乃免叔孫子犁比公名州密渠邱公季他王使劉子劉定公名夏康公之子勞趙武于潁注見前館于洛汭亦見前劉子曰美哉禹功明德逺矣微禹吾其魚乎吾與子辨冕端委以治民臨諸侯禹之力也子盍亦逺績禹功而大庇吾民乎對曰老夫罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也劉子歸以語王曰諺所謂老將知而耄及之者其趙孟之謂乎為晉正卿以主諸侯而儕于𨽻人朝不謀夕棄神人矣何以能久是年趙武卒晉荀吳中行偃之子諡穆子敗狄于大鹵即太原注見前晉荀吳敗無終注見前及羣狄于太原崇卒也此毁車用卒之始將戰魏舒曰彼徒我車所遇又厄以什共車左傳注十人以當一車之用必克困諸厄又克請皆卒自我始毁車以為行毁其車為步陳五乘為三伍趙氏恆曰車每乘三人五乘為十五令五人為伍三五亦一十五也此言用卒之法荀吳之嬖人不肯即卒斬以徇為五陳以相離左傳疏布陳使相逺也兩于前伍于後專為右角參為左角偏為前拒趙氏恆曰司馬法五十乘為兩百二十乘為伍八十一乘為專二十九乘為參二十五乘為偏皆凖車數多少以為名今雖用卒猶襲車乘之名也此言布陳之法以誘之狄人笑之未陳而薄之大敗之楚子麇卒公子比楚共子奔晉圍自立楚公子圍將聘于鄭伍舉為介未出境聞楚子有疾而還伍舉遂聘圍至入問楚子疾諡而弒之左傳注楚以瘧疾赴故不書弒殺其二子幕及平夏公子比奔晉葬楚子于郟今河南汝州郟縣春秋鄭邑後屬楚謂之郟敖圍遂即位易名熊虔是為楚靈後伐吳執齊慶封徇于軍中曰有若齊慶封弒其君者乎慶封曰子一息我亦且一言曰有若楚公子圍弒其兄之子而代之為君者乎軍人粲然皆笑事在王七年辛酉五年晉使韓起聘于魯起聘魯且告為政代趙武為政觀書于太史氏見易象上下經之象辭與魯春秋用周公之法書魯國之事故曰魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也癸亥七年楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子今江南潁州府阜陽縣有朝城春秋胡子國沈子今河南汝寧府汝陽縣有沈縣春秋沈國小邾子宋世子佐淮夷會于申楚子專會諸侯始此楚子使椒舉即伍舉如晉求諸侯晉侯欲勿許司馬侯即女齊亦曰女叔侯言于晉侯晉侯曰晉有三不殆國險而多馬齊楚多難何鄉而不濟對曰是三殆也四嶽三塗陽城大室荆山中南九州之險也是不一姓冀之北土馬之所生無興國焉鄰國之難不可虞也或多難以固其國啓其疆土或無難以喪其國失其守宇若何虞難四嶽岱華衡恆三塗山名注具見前陽城亦山名在河南府登封縣東北一曰馬嶺山大室即嵩山在登封縣北其西為少室荆山在湖北襄陽府南障縣西禹貢荆豫二州以此分界中南即終南山在西安府長安縣南雍録終南山橫亘關中南靣西起秦隴東微藍田蓋八百餘里請許楚使乃許之諸侯如楚楚子合諸侯于申椒舉曰臣聞諸侯無歸禮以為歸今君始得諸侯其慎禮矣楚子使問禮于宋向戍鄭公孫僑戍獻公合諸侯之禮六宋公爵故獻公合諸侯之禮僑獻伯子男會公之禮六鄭伯爵故獻伯子男見公之禮楚子使椒舉待于後以規過卒事不規問其故對曰禮吾未見者六焉戊與僑所獻禮楚皆未嘗行又何以規楚子示諸侯侈椒舉諫弗聽公孫僑見向戍曰吾不患楚矣汰而愎諫不過十年戍曰然不十年侈其惡不逺惡逺而後棄善亦如之德逺而後興是會楚執徐子以吳出也于是伐吳遂滅賴遷之鄢鄭作邱賦左傳注邱十六井當出馬一匹牛三頭今鄭于馬牛之外别賦其田鄭公孫僑作賦國人謗之渾罕即遊速字子寬子太叔子以告僑曰茍利社稷死生以之何恤于人言吾不遷矣渾罕退曰國氏其先亡乎君子作法于涼薄也其敝猶貪作法于貪敝將若之何後二年僑鑄刑書左傳注鑄刑書于鼎以為國之常法晉羊舌肸詒之書曰吾子相鄭國作封洫事見前立謗政即謂邱賦制參辟鑄刑書參音三謂用三代之末法以鑄刑書將以靖民不亦難乎甲子八年魯舍中軍左傳注罷中軍季孫稱左師孟孫為右師叔孫氏自以叔孫為軍名初作二軍三分公室而各有其一季氏盡征之無所入于公叔孫氏臣其子弟以父兄歸公孟氏取其半焉復以子弟之半歸公及其舍之也四分公室季氏擇二二子各一皆盡征之而貢于公楚子蔡侯陳侯許侯頓子沈子徐人越人夏少庾封庶子于會稽以奉禹祀周初受封為不成子言不能成子也至是勾踐始大築山隂城而都之今浙江紹興府治伐吳楚子以諸侯及東夷伐吳薳射楚大夫以師會于夏汭漢水入江之處即今漢口也在湖北漢陽府漢陽縣東越大夫常夀過會楚子于瑣春秋彚纂注瑣楚邑在江南夀州霍邱縣東霍邱今屬潁州府聞吳師出薳啓疆楚太宰帥師從之遽不設備吳人敗諸鵲岸今江南池州府銅仁縣有鵲頭山沿江而下有鵲尾洲故江曰鵲江岸曰鵲岸薳射之師先入南懷楚師從之及汝清春秋彚纂注南懷汝清皆楚界在今江淮間吳不可入遂還乙丑九年齊侯伐北燕注見前初北燕伯簡公名欵多嬖寵欲去諸大夫而立其寵人燕大夫比諸大夫相比以殺諸外嬖北燕伯懼奔齊事在王六年至是齊侯請于晉伐北燕將納伯晏嬰曰不入燕有君矣民不二吾君賄左右諂諛作大事不以信未可也明年燕及齊平齊侯取賂而還後髙偃以師納之于陽左傳作唐燕别邑今直𨽻保定府唐縣有古城即春秋陽也事在王十五年丙寅十年夏四月甲辰朔日有食之衛侯惡卒衛襄公卒夫人薑氏無子嬖人婤姶生孟縶及元縶足不良弱行孔圉乃立元是為靈公孔圉諡文子孔達五世孫告喪于王王使成子簡公如衛弔且追命襄公曰叔父陟恪在先王之左右以佐事上帝余敢忘髙圉亞圉周之祖系見前左傳疏二圉並為殷諸侯受殷王追命丁卯十有一年楚師滅陳初陳侯哀公元妃鄭姬生太子偃師二妃生公子留下妃生公子勝留有寵屬諸司徒招與公子過招及過皆哀公弟陳侯有廢疾招與過殺偃師而立留陳侯縊干徵師陳大夫赴于楚且告立君公子勝訴之于楚楚殺干徵師留奔鄭招歸罪于過而殺之于是楚公子棄疾帥師圍陳遂滅陳執招放之於越殺孔奐招之黨以穿封戍為陳公滅陳為縣使戍為縣公陳輿嬖袁克殺馬毁玉以葬哀公晉侯問于史趙曰陳其遂亡乎對曰未也陳顓頊之族也陳祖舜左氏以舜出虞幕又言陳顓頊之族辨已詳前兹不再録嵗在鶉火是以卒滅顓頊以水德嵗在鶉火而滅火盛而水滅也陳將如之今在析木之津箕斗之間有天漢故謂之析木之津猶將由之由用也言將復用更興且陳氏得政于齊而後陳卒亡陳繼守將在齊其兆既存矣後楚平即位陳遂復事具後御批歷代通鑑輯覽卷六

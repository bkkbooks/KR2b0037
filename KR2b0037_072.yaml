front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷七十三宋太宗皇帝
  hash: sha256:4022a64142f15bd7a81d248be65aa2090a29271ff5484b0659fa3a0792a0d585
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_072-1a, image: WYG0338/WYG0338-0039a.png}
body:
  text: 至道元年春正月帝觀燈于乾元樓帝以上元御乾元門樓觀燈賜宴見京師繁盛諭近臣曰五代之際生靈周喪周夫祖自鄴南歸士庶皆罹剽掠下則火光上則彗孛觀者恐栗當時謂無復太平之日矣朕躬覽庶政萬事粗理每念上天之貺致此繁盛乃知理亂在人吕䝉正避席曰乘輿所在士庶走集故繁盛如此臣常見都城外不數里饑寒而死者甚衆願陛下親近以及逺蒼生之幸也帝變色不言蒙正侃然復位同列咸多其伉直契丹犯府州永安節度使折御卿擊敗之契丹大將韓德威率衆萬騎誘党項埒里党項别種等族自振武入冦御卿邀擊敗之于子河汊在葭州府谷縣境埒里等乘亂反擊德威殺其將突厥哈里等德威僅以身免夏四月吕䝉正柴禹錫蘇易簡罷帝嘗欲遣人使朔方諭中書選可責以事者䝉正以名上帝不許他日三問三以其人對帝怒曰卿何執邪蒙正對曰臣非執臣不欲用媚道妄隨人主意以害國事因稱其人可使餘人不及同列竦息不敢動帝退謂左右曰䝉正氣量我不如既而卒用其人果稱職䝉正夾袋中有冊子每四方人替罷謁見必問其有何人才客去隨即疏之各分門類及朝廷用人即取之袋中故所用皆當至是罷相判河南以吕端同平章事張洎參知政事趙鎔知樞密院事初帝欲相端或曰端為人糊塗帝曰端小事糊塗大事不糊塗決意用之端持重識大體慮與冦準同列而已先正台揆恐準不平乃請參知政事與宰相同升政事堂時同列奏對多異議惟端罕所建明一旦內札戒諭自今中書事必經吕端參酌乃得聞奏端愈謙讓不敢當洎博涉經史善持論為翰林學士帝嘗謂近臣曰張洎富有文藝至今尚苦學江東士人之冠也甚見寵遇洎初為冦準官屬甚恭謹每為寇規畫準心伏以兄事之極薦其才遂與凖同列奉之諭謹政事一決于凖無所參預惟専修時政記甘言善柔而已契丹寇雄州何承矩禦郤之承矩條子河汊之捷諭州民且揭于市契丹諜知愧忿將襲取承矩以雪恥夜引數千騎抵城下承矩整兵出拒遲明與契丹酣戰契丹復敗走帝聞虜入寇之由謂承矩輕脫生事失守禦體罷之開寶皇后宋氏崩貶翰林學士王禹稱知滁州后疾甚遷于故燕國長公主第崩權殯普濟佛舍諡曰孝章皇后羣臣不成服禹稱對客言后嘗母儀天下當遵用舊禮帝不恱坐謗訕責知滁州禹稱立朝敢言以直躬行道為己任不為流俗所容故屢見斥六月以李繼遷為鄜州節度使繼遷不奉詔繼遷遣押牙張浦以良馬槖駝來獻帝令衛士射于後園俾浦觀之士皆拓兩石弓有餘力帝笑問浦曰羌人敢敵否對曰羌部弓弱矢短但見此長巨人則已遁矣况敢敵乎乃以浦為鄭州團練使留京師遣使持詔拜繼遷鄜州節度使繼遷不受已而繼遷攻清逺軍守臣張延擊退之府清逺軍宋置故城在寧夏靈州東南秋八月立元侃為皇太子更名恆大赦自唐天祐以來中國多故立儲之禮廢及百年至是始舉而行中外胥恱太子既立廟見還宫京師民擁道喜躍曰少年天子也帝聞之不懌召寇準謂曰人心遽屬太子欲置我何地準再拜賀曰此社稷之福也帝悟入語后嬪宫中皆前慶帝喜復出延準飲極醉而罷以李至李沆並兼太子賓客詔太子以師傅禮事之太子每見至沆必先拜至沆不敢當上表辭謝帝不許冬十一月召王繼恩還以上官正雷有終為西州招安使十二月契丹寇府州折御卿禦之卒于軍契丹韓德威諜知御卿有疾遂帥衆攻府州以報子河汊之役御卿力疾禦之德威聞其至不敢進既而疾甚母密召之歸御卿曰世受國恩邉寇未滅御卿罪也今臨敵安可棄士卒自便死于軍中乃其分也為白太夫人無念我忠孝豈得兩全言訖泣下翌日卒詔以其子惟正知府州事丙申二年春二月以太祖孫惟吉字國祥德昭長子為閬州觀察使太祖崩時惟吉裁六嵗帝即位猶在禁中日侍中食午膳也周禮疏王朝食日中食夕食為三時食中食義蓋本此太平興國八年始出居東宫未幾授左驍衛大將軍至是授閬州觀察使凡邸第供億車服賜與皆與諸王埒夏四月遣李繼隆等分道討李繼遷初帝令洛苑使白守榮護芻粟四十萬赴靈州李繼遷邀擊于浦洛河亦曰溥樂河在寧夏府靈州南北流入黃河守榮衆潰運餉盡為繼遷所奪帝怒命李繼隆為環慶等州都部署將兵討之會魯璨字韜光彬之子自河西還言繼遷衆萬餘方圍靈武城中上表告急為繼遷所得遂頓兵不去此宋史原文言表為繼遷所獲續綱目刪去上表二字改下二句作使為繼遷所得則頓兵不去矣似慮靈州為繼遷所得者與史不合今改正吕端請發兵出麟府鄜延環慶三道以搗平夏襲其巢穴則靈武之圍解矣或云盛夏涉旱海在靈州東南趙珣曰鹽夏清逺軍間並係沙磧俗謂之旱海無水泉糧運艱辛不如靜以侍之帝不聽即部分諸將命繼隆出環丁罕潁州人出慶范廷召冀州棗强人出延王超趙州人出夏張守恩出麟五路進討直趨平夏秋七月以陳靖字道卿興化莆田人為京西勸農使未行而罷帝務興農事詔有司議均田法太常博士陳靖乞先命大臣兼屯田制置令京東西檢責荒地及逃民産籍之募民耕作賜以牛種室器俟田成然後度田均稅量田授人約井田之利為定法頒行天下乃詔請為勸農使皇甫選何亮副之選等言其功難成陳恕亦以為不可遂出靖知婺州而罷其法寇準免是嵗郊祀中外官皆進秩準素所喜者多得臺省清要官所惡及不相知者即序進之廣州通判馮拯上疏極陳準擅權且條上除拜不平事帝不懌張洎揣知帝嫉準懼一旦同罷乃奏準誹謗帝益不恱命廣東轉運使康戩上言吕端張洎李昌齡皆準所引故準得以任胸臆亂經制帝怒召端等責之端對曰準性剛自任臣等不欲數爭慮傷國體因再拜請罪及準入對帝語及拯事準力爭不已又持中書簿論曲直于帝前帝因歎曰鼠雀尚知人意况人乎遂罷知鄧州以丁惟清知西涼府宋初以涼州為西涼府後沒于夏涼州久不內屬唐廣德初州陷吐蕃咸通中收復旋即荒廢後唐長興四年留後孫超遣使求旌節詔拜超節度使至後周顯德中復絶于中國至是請帥從之八月李繼隆副將范廷召遇李繼遷于烏白池鹽池也在寧夏府靈州東南元和志鹽州五原縣有烏白二池出鹽即此擊敗之繼隆不見虜而還諸將分道並進期抵烏白池繼隆遣其弟繼和字周叔馳奏以環州道迂欲自清岡峽注見前直趨繼遷巢穴不及援靈武上怒曰汝兄必敗吾事矣因手札切責使未至而繼隆已發兵與丁罕合行十日不見虜引軍還張守恩見虜不擊獨廷召與王超至烏白池與賊遇時虜鋭甚超持重不進其子德用字元翰年十七為先鋒請乘之轉戰三日虜遂却德用曰歸師遇險必亂乃領兵先絶要害下令曰亂行者斬一軍肅然虜見其師整不敢近廷召等大小數十戰雖頗克捷而諸將失期士卒困乏終不能擒賊九月秦晉諸州地震大有年丁酉三年春正月張洎罷洎性險詖巧于將順尤善事宦官嘗引唐故事奏內供奉藍敏政為學士帝曰此唐弊政朕安可踵覆轍卿言過矣洎慚而退至是以病罷尋卒葬孝章皇后葬昌陵北自后崩至是踰三年而始克葬分天下州軍為十五路京東京西河北河東陜西淮南江南荆湖南北兩浙福建州峽廣南東西凡十五路各置轉運使三月帝崩太子恆即位是為真宗帝不豫宣政使王繼恩忌太子英明陰與參知政事李昌齡至道二年參知政事知制誥胡旦等謀立楚王元佐及帝崩皇后令繼恩召吕端端知有變即紿繼恩入書閣鎖閉之亟入宫后問曰宫車己晏駕立嗣以長順也今將如何端曰先帝立太子正為今日豈容更有異議后默然乃奉太子至福寧殿即位垂簾引見羣臣端平立殿下不拜請捲簾升殿審視然後降階率羣臣拜焉夏四月尊皇后為皇太后赦以李至李沆參知政事五月李昌齡有罪貶忠武軍名注見前行軍司馬討謀立楚王之罪貶昌齡為行軍司馬降王繼恩為右監門衛將軍均安安置胡旦除名長流潯州唐置今為府屬廣西立郭氏守文之女為皇后六月追復涪王廷美為秦王復封兄元佐為楚王錢若水請罷許之初太宗以劉昌言罷問左右曰昌言涕泣否及吕蒙正罷又曰䝉正望復位目穿矣若水因歎曰上待輔臣如此蓋無秉節髙邁全進退之道以感動之者耳即欲移疾㑹西邉用兵不敢言至是以母老請解樞務章再上乃罷為集賢院學士若水入謝便殿帝問近臣可大用者若水以中書舍人王旦字子明祜之子對帝曰此固朕所屬也冬十月葬永熙陵在河南府鞏縣永昌陵西史臣曰太宗沈謀英斷勤儉自勵閔農事考治功慎刑獄納諫諍遇災知懼有遏知悔故能削平海內功業炳然若夫太祖之崩不踰年而改元涪陵武功之不得其死宋后之不成喪後世不能無議馬十二月追尊母李氏真定人防禦使英之女為皇太后帝生母也太宗時封夫人尋薨帝即位追封賢妃又進上尊號諡曰元德李繼遷請降以為定難節度使復姓名趙保吉繼遷表求蕃任帝雖察其變詐方在諒陰姑從其請又以夏綏銀宥靜五州靜州五代時以唐靜邉廢州置故城在今綏德州米脂縣與之張浦亦遣還真宗皇帝戊戌咸平元年春正月彗星見詔求直言彗出營室注見前北吕端言應在齊魯分帝曰朕以天下為憂豈直一方邪詔求直言避殿減膳時田錫自知集賢院出知秦州上疏言李繼遷不合與夏州又不合呼之為趙保吉乃時事舛誤之大者又言樞密公事宰相不為預聞中書政事樞密不得預議以致兵謀未精國計未善帝嘉納之夏四月遣使按諸路逋負悉除之除天下逋缺一千餘萬釋繫獄者三千餘人用三司判官王欽若字定國臨江新喻人之言也五月戊午朔日食冬十月丙戌朔日食吕端李至罷端氣量寬恕知大體帝深重之每見其入對肅然拱揖不以名呼又以端􅐾儀瓌大宮廷陛峻特令梓人為納陛至是以疾罷至亦以目疾求解政柄授武信軍節度使以張齊賢李沆同平章事向敏中參知政事楊礪字汝礪京兆鄠人宋湜字特正長安人為樞密副使齊賢慷慨有大略每以致君自負常為帝言皇王之道帝曰皇王之道非有跡但庶事無撓則近之矣帝嘗問沆治道所宜先沆對曰不用浮薄新進喜事之人此最為先帝問其人沆曰如梅詢字昌言宣州宣城人魯致堯字正臣撫州南豐人輩是矣帝又語及唐人樹黨遂使王室微弱蓋奸邪難辨耳沆曰佞言似忠姦言似信如盧杞䝉蔽德宗李勉以為真奸邪是也一夕內出手詔欲以劉美人為貴妃沆對使者引燭焚之附奏曰但道臣沆以為不可其議遂寢帝嘗謂沆曰人皆有密啓卿獨無何也對曰臣待罪宰相公事則公言之何用密啓夫人臣有密啓者非讒即佞臣常惡之豈可效尤劉美人益州華陽人即劉后也己亥二年春閏三月旱求直言轉運副使朱台符字拱正眉州眉山人上疏言宜重農以積粟簡卒以省費専將帥之任以安邉慎守令之選以惠民帝優詔褒答之夏六月樞密使兼侍中魯公曹彬卒諡武惠彬疾帝臨問因詢以契丹事宜彬對曰太祖英武定天下猶經營和好帝曰此事朕當屈節為天下蒼生然須執綱紀存大體即久逺之利也又問以後事對曰臣無事可言臣子璨瑋字寶臣彬之子材器皆堪為將帝問其優劣對曰璨不如瑋及卒帝哭之慟贈中書令追封濟陽王彬在朝廷未嘗忤㫖亦未嘗言人過失伐二國秋毫無所取位兼將相不以等威自異遇士大夫于途必引車避之不名下吏每白事必冠而後見居官俸入給宗族無餘積守法度保功名為宋良將第一秋七月初給外任官職田以官莊及逺年逃田充之悉免租稅初置翰林侍讀侍講學士讀講學士始此詔吕文仲楊徽之夏侯嶠字峻極濟州巨野人為侍讀學士邢昺為侍講學士設直廬于祕閣更直召對詢訪或至中夕尋詔昺與杜鎬舒雅孫奭等校定周禮儀禮公羊榖梁春秋傳孝經論語爾雅疏義杜鎬字文周常州無錫人舒雅字子正宣城人孫奭字宗古博平人九月庚辰朔日食冬十月契丹入寇都部署康保裔河南洛陽人與戰于瀛州死之十二月帝自將禦契丹次于大名契丹主隆緒大舉入冦攻遂城城小無備衆情危懼守將楊延朗業之子集衆登陴固守會大寒汲水灌城上旦悉為氷堅滑不可上契丹乃引去掠祁趙邢洺州時真定髙陽關都部署傅潛冀州衡水人擁步騎八萬餘畏懦不進閉營自守將校請戰者則醜言詈之朝廷間道遣使督潛出兵會擊潛不聽范廷召忿詬曰公恇怯乃不如一嫗鈐轄張昭允字仲孚衛州人又屢勸之潛不得已乃分騎八千付廷召仍許出師為援廷召復求援于都部署康保裔保裔即領兵赴之遇虜于瀛州㑹暮約詰旦合戰遲明虜圍之數重左右請易甲以遁保裔曰臨難無苟免正吾效死之日也遂決戰數十合殺傷甚衆兵盡矢絶而援不至保裔殁焉續綱目范廷召潛遁保裔不之覺遂戰殁考宋史康保裔傅潛范廷召傅俱無廷召于瀛州潛遁事真宗紀潛等皆逺流不及廷召其無潛遁事可知今依宋史改輯契丹遂自德棣濟河掠淄齊十二月帝親禦之以李沆為東京留守命王超等督先鋒示以戰圖遂次大名聞保裔死優詔賻之贈侍中録其二子一孫又聞諸將告急于潛潛不遣兵而有功者抑不以聞帝命王繼英祥符人即軍中召潛還以髙瓊燕人代之羣臣請誅潛詔削官長流房州庚子三年春正月契丹引還范廷召追敗之契丹知帝親征乃縱掠而去廷召等追敗之于莫州斬首萬餘級盡獲所掠餘寇遁出境益州戍兵作亂推王均為首都巡檢使劉紹榮死之均遂陷漢州詔以雷有終為川峽招安使將兵討之初神衛卒戍益州以都虞候王均董福分領之福御衆有法所部皆優贍均好飲博軍裝悉以給費兵馬鈐轄符昭夀彥卿子驕恣侵虐軍士素怨之正月朔旦戍兵趙延順等八人為辭遂殺昭夀是日益州官吏方賀正旦聞變皆奔竄知州牛冕徐州彭城人與轉運使張適縋城而去惟都巡檢使劉紹榮冒刃格鬭衆寡不敵叛卒尚未有主欲奉紹榮紹榮攝弓矢罵曰我本燕人棄虜歸朝豈能與爾為逆邪亟見殺我終不負朝廷也監軍王澤召王均謂曰汝所部為亂盍自往招安之叛卒見均至即擁之為主紹榮自經死均遂僭號大蜀改元化順署置官稱以小校張鍇為謀主已而均率衆攻陷漢州進寇綿州不克直趨劍州為知州李士衡字天鈞秦州成紀人所敗還保益州帝將發大名奏至即日以户部使雷有終為川峽招安使李惠石普太原人李守倫並為巡檢使給步騎八千往討之上官正李繼昌字世長上黨人等皆𨽻焉知蜀州楊懷忠聞均作亂即調鄉丁㑹諸州巡檢兵討之入益州焚城北門與賊戰不敵而退復檄嘉眉七州合兵再進軍于州南十五里雞鳴原以俟王師帝至自大名上之在大名也詔調丁夫十五萬修黃河監察御史王濟字濟川深州饒陽人以為勞民請徐圖之乃命濟馳往經度還奏省其什六七張齊賢以河決為憂因對并召濟入見齊賢請令濟署狀保河不決濟曰河決亦陰陽災沴所致宰相若能和陰陽弭災沴為國家致太平河之不決臣亦可保齊賢曰若是則今非太平邪濟曰北有胡寇西有繼遷兩河關右嵗被侵擾以陛下神武英略苟用得其人可以馴致今則未也上動容獨留濟問以邉事退而著備邉策十五條以獻未幾選官判大理寺欲得剛正不回者上曰王濟近之即以命濟二月以周瑩瀛州景城人王繼英知樞密院事王旦同知院事初旦為翰林學士嘗奏事退帝目送之曰為朕致太平者必此人也三月戊寅朔日食夏四月太子太保吕端卒諡正惠端屢經擯退未嘗以得喪介懷及疾篤帝親視之端不能興撫慰甚至卒贈司空六月以向敏中為兩河宣撫大使以大兵之後特命重臣巡慰河北河東訪民疾苦冬十月雷有終復益州王均走死先是有終等至益州為賊所敗時都巡檢使張思釣已復漢州有終等進壁升仙橋賊開門僞遁有終等帥兵徑入伏發官軍悉被殺有終緣堞而墜得免李惠死之張思鈞邢州沙河人升仙橋在成都縣北退保漢州既而賊由升仙橋分路襲王師有終帥兵逆擊大敗之均單騎還城遂撒橋塞門有終與石普進屯于城北分遣將校攻城東西南三面賊出戰屢敗日益消沮至是有終等入城均夜與其黨二萬餘突圍而遁有終遣楊懷忠追至富順監宋至今為縣屬叙州府及之均方在監署中與蠻酋飲其黨多醉不能枝梧均乃縊死懷忠取均首及僣僞法物旌旗甲馬甚衆擒其黨六千餘人詔進有終懷忠等秩而流牛冕儋州張適連州以翰林學士王欽若知制誥梁皓字太素鄆州須城人往安撫之十一月張齊賢免齊賢與李沆不相得日南至朝會齊賢被酒失儀遂坐免辛丑四年春二月詔羣臣子弟補京官者試一經夏四月回鶻來貢願助討李繼遷六月汰冗吏天下凡汰冗吏十九萬五千八百餘人選曹為清頒九經于州縣學校秋八月以張齊賢為涇原諸路經略使帝以趙保吉雖入貢而鈔劫益甚乃遣齊賢行邉齊賢言靈武孤城必難固守徒使軍民六七萬陷于危亡之地通判永興軍何亮復上安邉書言靈武地方千里表裏山河決不可舍之以資戎狄帝不能決詔羣臣議棄守之宜楊億字大年建州浦城人言棄之便輔臣咸以靈州乃必爭之地苟失之則緣邉諸郡皆不可保帝惑之李沆曰保吉未死靈州非朝廷有莫若遣使密召諸將使部分軍民空壘而歸如此則關右之民息肩矣帝不從以王超為西面行營都部署將步騎六萬援靈州齊賢又請募江南丁壯以益戍兵帝曰此不惟人心搖動抑使南方之人逺戍西鄙甚不便也寢其奏九月趙保吉反陷清逺軍注見前保吉寇清逺軍都監段義叛降于保吉都部署楊瓊宋置故城在今寧夏府新渠縣懷逺後周縣宋為鎮今寧夏府寧夏縣是又掠輜重至唐龍鎮在寧夏縣西南副都部署曹璨以番兵邀擊敗之冬十月契丹寇遂城都部署王顯敗之契丹謀入冦朝廷聞之以王顯為鎮定髙陽關都部署王超副之是月顯與契丹戰于遂城大敗之戮二萬餘人契丹進次滿城而還壬寅五年春三月趙保吉陷靈州知州事裴濟字仲溥聞喜人死之濟知靈州謀輯八鎮即懷逺等鎮已沒西夏地理志不載興屯田之利民甚賴之保吉大集番部來攻濟被圍餉絶刺指血染奏求救兵不至城遂陷濟死焉保吉以州為西平府居之帝得報悔不用李沆之言詔王超屯永興軍秋七月甲午朔日食九月召种放為左司諫直昭文館張齊賢言放孝行純至簡朴退靜可厲風俗下詔召之放乃詣京師對于崇政殿賜坐詢以民政邉事放對曰明王之治愛民而已惟徐而化之餘皆謙讓不對即日授左司諫直昭文館放固讓不許賜豫甚厚時召對焉明年請暫還山許之遷起居舍人放既還後數朝京師東封西祀無不預祿賜既豐頗飾輿服置田長安彊市爭訟時議薄之王嗣宗守京兆因條上其不法事極其醜詆㑹赦而止杜鎬嘗因宴餞賦詩誦北山移文以譏之放不知愧王嗣宗字希阮汾州人癸卯六年春二月以六谷酋長潘羅支西凉府吐蕃族首領為朔方節度使知鎮戎軍宋置今平凉府鎮原縣是李繼和言潘羅支願戮力討趙保吉請授以刺史張齊賢請封為六谷王兼招討使帝以問宰相皆曰羅支以為酋帥授刺史太輕未領節鎮加王爵非順招討使號不可假外夷乃授朔方節度使靈州西面都巡檢使羅支表言感朝廷恩信憤保吉倔彊已集騎兵六萬乞㑹王師收復靈州帝許之夏四月副都部署王繼忠開封人與契丹戰于望都敗績契丹執繼忠以去耶律諾衮字延寧太祖母弟寇定州之望都髙陽關副都部署王繼忠與大將王超桑贊等帥兵赴之至康村在望都縣東北與諾衮戰繼忠陳東偏為敵所乘超贊皆畏縮退師繼忠與麾下躍馬馳赴服飾稍異契丹識之圍數十重士皆殊死戰且戰且行旁西山而北至白城在保定府清苑縣西南力不能支遂被執帝聞之謂其已死優詔贈官繼忠見契丹主于炭山此又一炭山在今宣化府萬全縣西南遼史歸化州有炭山謂之陘頭有凉殿即此非遼初建城于灤河上之炭山也蕭太后知繼忠才賢授户部使繼忠後遂仕于契丹更姓名為耶律顯忠又改名宗信復以張詠知益州帝以詠前在蜀治政優異復自永興徙知益州民聞詠再至皆鼓舞相慶詠威惠並行政績益著下詔褒美且令巡撫使傳諭詠曰得卿在蜀朕無西顧之憂矣六月以寇準為三司使陳恕罷恕久領三司帝初即位嘗命條具中外錢榖恕久不進屢詔趣之恕對曰陛下富于春秋若知府庫充實侈生侈心是以不敢進也帝嘉之至是以疾固求館殿之職帝曰卿求一人可代者聽卿去恕遂薦凖凖至三司檢尋恕前後改創之事類為册及其所出榜别用新板躬至恕第請判押恕亦不讓一一押之自是計使無不循其舊貫恕精于吏理人不敢干以私掌利柄十餘年强力幹事胥吏畏服冬十一月有星孛于井鬼天文志南方輿鬼五星為天目十二月右諫議大夫田錫卒錫居諫署慕魏徴李絳之為人以盡規獻替為己任直言時政得失每指斥將相備位前後章疏凡五十有二續綱目作五十二卷今依宋史錫傳改正悉焚之曰直諫臣職也豈可藏副示後以賣直邪及卒帝謂李沆曰田錫直臣也朝廷少有闕失方在思慮錫之章疏已至矣嗟惜久之趙保吉陷西凉殺丁惟清潘羅支會蕃部擊敗之保吉走死子德明嗣保吉陷西涼殺丁惟清于是潘羅支僞降保吉受之不疑羅支遽集六谷番部合擊之保吉大敗中流矢創甚奔還死于靈州境上子德明遣使告哀于契丹契丹贈保吉尚書令尋封德明為西平王環慶宋以慶環邠寧乾五州為環慶路邉城以德明初立乞降詔撫之帝乃詔德明令審圖去就知鎮戎軍曹瑋上言保吉擅河南地二十年兵不解甲使中國有西顧之憂今其國亡子弱不即捕滅後更彊盛不可制矣願假臣精兵出其不意擒德明送闕下復河南為郡縣此其時也帝欲以恩致德明不報甲辰景德元年春正月京師地震丙申震癸卯丁未復震三月皇太后李氏崩諡明德秋七月尚書右僕射同平章事李沆卒諡文靖沆卒帝往臨哭之慟謂左右曰沆忠良純厚始終如一豈意不享遐夀邪贈太尉中書令時西北用兵帝便殿廷訪或至旰食王旦嘆曰我輩安得坐見太平優游無事邪沆曰彊敵外患足為警戒他日四方寧謐朝廷未必無事沆日取四方水軍盜賊奏之旦以為細事不足煩帝聽沆嘆曰人主少年當使知四方艱難不然血氣方剛不留意聲色犬馬則土木甲兵禱祀之事作矣吾老不及見此參政他日之憂也丁謂與寇凖善凖屢薦其才于沆沆不用準問之沆曰顧其為人可使之在人上乎準曰如謂者相公終能抑之使在人下乎沆笑曰他日當思吾言沆嘗言居重位無補惟中外所陳利害一切報罷之少以報國爾朝廷防制纎悉具備或徇所陳請行一事即所傷多矣陸象先所謂庸人擾之是已憸人苟一時之進豈念厲民邪沆嘗讀論語或問之沆曰沆為宰相如節用而愛人使民以時尚未能行聖人之言終身誦之可也沆性直諒內行修謹居位慎密不求聲譽遵法度識大體人莫能于以私公退終日危坐未嘗跛倚治第封邱門內㕔事前僅用旋馬或言其大隘沆笑曰居第當傳子孫此為宰相㕔事誠隘為太祝奉禮㕔事則已寬矣謂丁謂字公言初字之蘇州長洲人盜殺朔方節度使巴勒結趙保吉既死故黨密巴勒儒及日布結羅丹二族亡歸結隆族俱党項别族欲陰圖巴勒結以復讎會其黨攻結隆巴勒結率百餘騎赴援將議合擊遂為二族戕于帳下六谷諸豪共立巴勒結弟斯多特為首領朝廷聞之授斯多特朔方節度使八月以畢士安寇準同平章事王繼英為樞密使初士安既拜參知政事入謝帝曰未也行且相卿因問誰可與卿同進者對曰寇準兼資忠義善斷大事臣所不如帝曰聞其好剛使氣對曰準忘身徇國秉道嫉邪故不為流俗所喜今天下之民雖䝉休德涵養安佚而北戎跳梁為邉境患若準者正宜用也帝曰然當藉卿宿德鎮之準既相守正疾惡小人日思所以傾之士安每為申辨帝始不疑閏九月契丹主大舉入寇契丹主隆緒同其母蕭氏大舉入冦遣其統軍順國王蕭達蘭攻威虜順安軍北平寨本漢縣宋為寨後改軍故城在今保定府完縣保州皆敗乃與契丹主合衆攻定州王超拒于唐河即古嘔夷水源出山西流徑唐縣謂之唐水入于定州謂之滱水下流與滋沙諸河合又分兵圍岢嵐軍髙繼勳字紹先瓊長子力戰禦之又攻瀛州李延渥并州晉陽人擊敗之契丹遂駐兵陽城淀在慶都縣東南水經注陽城故城近在西北故名馬號二十萬每縱游騎剽掠小不利輒引去徜佯無鬭志寇準聞之曰是狃我也請練師命將簡驍鋭據要害以備之冬十月契丹來議和遣閣門祗候曹利用字用之趙州寧晉人報之故將王繼忠為契丹言和好之利契丹以為然遣李興以繼忠書及密表詣莫州部署石普議和普以聞于朝朝臣莫敢如何畢士安請羈縻之漸許其平帝曰敵悍如此恐不可保士安曰臣嘗得契丹降人言其雖深入屢挫不得志陰欲引去又恥無名且彼寧不畏人乘虛覆其巢穴此請殆不妄于是詔諭繼忠許其通和繼忠復附奏乞先遣使帝乃遣曹利用詣契丹軍帝語之曰契丹南來不求地則邀賂爾關南地歸中國已久不可許漢以玉帛賜單于有故事利用憤契丹色不平對曰彼若妄有所求臣不敢生還帝壯其言置龍圖閣奉太宗御製文集及典籍圖畫寶瑞之物與宗正所進屬籍并置待制學士官自是每帝皆置一閣十一月契丹進寇澶州帝自將禦之契丹陷德清軍石晉置故城在今大名府清豐縣逼冀州遂抵澶州邉書告急一夕五至寇準不發飲笑自如帝聞之大駭以問準對曰陛下欲了此不過五日耳因請帝幸澶州同列懼欲退準止之令候駕起帝難之欲還內準曰陛下入則臣不得見大事去矣請毋還畢士安力勸帝如準所請帝乃議親征召羣臣問方略時以虜寇深入中外震駭王欽若臨清人也請幸金陵陳堯叟字唐夫閬州人也請幸成都帝以問準準心知二人謀乃陽若不知者曰誰為陛下畫此䇿罪可斬也陛下神武將臣協和若大駕親征敵當自遁不然出竒以撓其謀堅守以老其師勞佚之勢我得勝算矣奈何棄廟社欲幸楚蜀所在人心崩潰敵乘勝深入天下可復保邪帝意乃決時欲擇大臣鎮大名準薦欽若遂詔判天雄軍蓋準以欽若多智恐妄有所疑沮故出之欽若至天雄契丹臨境欽若閉門束守無䇿但修齊誦經而已李繼隆軍射殺契丹將蕭達蘭契丹圍澶州李繼隆整軍禦之會有自虜中回者言達蘭謀以遲明襲寨繼隆伏兵分據要害頃之控弦暴至達蘭躬出陳前督戰繼隆將張環字唐公洎之孫守牀子弩弩撼機發射殺之達蘭有機勇所領皆鋭兵既死虜大挫衄時魏能守安肅軍楊延朗守廣信軍二軍最切虜境而攻圍百戰不能下及虜退出境延朗追躡轉戰未嘗敗衄時人目二軍曰銅梁門鐵遂城梁門安肅軍治遂城廣信軍治也魏能鄆人梁門即戰國趙汾門宋置寨今保定府安肅縣是也遂城注見前以王旦為東京留守初帝親征以雍王元份太子第五子留守旦等皆扈從至是元份以暴疾聞命旦馳還代之旦曰願宣寇準臣有所陳準至旦奏曰十日不捷何以處之帝默然良久曰立太子旦至東京直入禁中下令甚嚴人無知者十二月庚辰朔日食帝渡河次澶州契丹請盟而退帝還京帝在道又有以金陵之謀告者帝意稍惑召準問之準曰陛下惟可進尺不可退寸河北諸軍日夜望鑾輿至士氣百倍若回輦數步則萬衆瓦解虜乘其後金陵亦不可得至也準出遇殿前都指揮使髙瓊曰太尉受國厚恩今日有以報乎瓊曰願效死準復入瓊立庭下準曰陛下不以臣言為然盍試問瓊瓊即奏曰寇準言是準又曰機不可失宜趣駕帝乃晨發適苦寒左右進貂裘帝郤之曰將士皆寒朕安用此帝至澶州南城即德勝寨之南城注見前望見契丹軍勢甚衆衆請駐蹕寇準固請曰陛下不過河則人心益危敵氣未懾非所以取威決勝也且王超領徑兵屯中山以扼其吭李繼隆石保吉字祐之守信子分大陳以扼其左右肘四方征鎮赴援者日至何疑而不進髙瓊亦固以請即麾衛士進輦帝遂渡河御北城門樓逺近望見御蓋踴躍呼萬嵗聲聞數十里契丹相視益怖駭帝悉以軍事付準準承制専決號令明肅士卒畏恱已而契丹數千騎來薄城下詔士卒迎擊斬獲大半乃引去帝還行宫留準居北城上徐使人視準何為準方與知制誥楊億飲博歌謔歡呼帝喜曰準如是吾復何憂契丹遣其臣韓杞持書與曹利用俱來請盟利用言契丹欲得關南地帝曰所言歸地事極無名若必邀求朕當決戰若欲金帛朝廷之體固亦無傷準不欲賂以貨財且欲邀其稱臣及獻幽燕之地因畫策以進曰如此則可保百年無事不然數十年後戎且生心矣帝曰數十年後當有捍禦之者吾不忍生靈重困姑聽其和可也準尚未許㑹有譖準幸兵以自取重者準不得已乃許其成復遣曹利用如契丹軍議嵗幣帝曰必不得已雖百萬亦可準聞之召利用至幄謂曰雖有敕旨汝所許過三十萬吾斬汝矣利用至契丹軍蕭太后謂利用曰晉畀我關南周世宗取之今宜見還也利用曰晉周事我朝不知若嵗求金帛以佐軍尚不知帝意可否割地之請我不敢以聞契丹政事舍人髙正始遽前曰我引衆以來圖復故地若止得金帛而歸吾愧吾國人矣利用曰子盍為契丹熟計使契丹用子言恐連兵結釁非國利也契丹猶覬關南遣其監門衛大將軍姚東之持書復議帝不許而去利用竟以銀十萬兩絹二十萬匹成約而還戒諸將勿出兵邀其歸路契丹遣其閣門使丁振持誓書來以兄禮事帝引兵北歸帝遂還京乙巳二年春正月大赦以契丹講和大赦天下放河北諸州彊壯歸農罷諸路行營省河北戍兵十之五緣邉三之二詔緣邉毋出境掠奪得契丹牛馬悉縱還之通互市葺城池招流亡廣儲蓄由是河北民得安業皆畢士安之謀也士安請按邉要選守將以馬知節知定州楊延昭知保州又以李允則知雄州孫全照知鎮州他所擇任悉當其才則馬知節字子元全義子楊延昭即延朗改名李允字垂範謙溥子孫全照字繼明行友子置國信司以契丹修好則有慶弔之使乃置國信司専主之領以宦者時遣太子中允孫僅字鄰成蔡州汝陽人賀蕭太后生辰致書自稱南朝以契丹為北朝直史館王曾字孝先青州益都人上言春秋書外夷爵不過子今從其國號足矣何用對稱兩朝帝以為然弗果易僅隨其損益豐約中度後奉使者悉循其制時稱得體夏四月王欽若罷以馮拯參知政事欽若與寇準不協纍表願解政事特置資政殿學士授之秋七月增置制舉六科賢良方正等三科久不行至是增置為六科曰賢良方正能直言極諫為一科博通墳典達于教化為一科才識兼茂明于體用為一科詳明吏理可使從政為一科識洞韜略運籌決勝為一科軍謀宏逺材任邉寄為一科凡六科詔中書門下試察其才具名奏聞臨軒親策之歸幣于契丹自是嵗以為常八月有星孛于紫微注見前以向敏中知延州先是趙德明以父有遺命遣使乞歸順詔以敏中為緣邉安撫使受其降時帝幸澶淵賜敏中密詔書付西鄙許便宜從事敏中得詔藏之視政如常日邉蕃以安至是以德明誓約未定徙敏中為都部署兼知延州委以經略冬十月吏部侍郎同平章事畢士安卒諡文簡士安既卒帝謂輔臣曰士安飭躬畏謹有古人之風遽此淪沒深為悼惜及王旦為相面奏士安官至輔相而四方無田園居第沒未終喪家用已詘真不負陛下之所知矣帝感歎賜其家白金五千兩十一月契丹遣使來聘自是往來不絶丙午三年春二月罷寇準知陜州準為相用人不以次同列頗不恱他日除官同列目吏持例簿以進準曰宰相所以進賢退不肖若用例一吏職耳自澶淵還頗矜其功帝待準甚厚王欽若深嫉之一日㑹朝準先退帝目送之欽若因進曰陛下敬準為其有社稷功邪帝曰然欽若曰澶淵之役陛下不以為恥而謂準有社稷功何也帝愕然曰何故欽若曰城下之盟春秋恥耳澶淵之舉以萬乘之貴而為城下之盟何恥如之帝愀然不恱欽若曰陛下聞博乎博者輸錢欲盡乃罄所有出之謂之孤注陛下寇凖之孤注也斯亦危矣帝由是顧準寢衰竟罷為刑部尚書出知陜州初張詠在成都聞凖入相謂僚屬曰寇公竒材惜學術不足爾及準知陜詠適自成都還準送之郊問曰何以教凖詠徐曰霍光傳不可不讀也準莫諭其意歸取其傳讀之至不學無術笑曰此張公謂我也未幾移凖知天雄軍契丹使過大名謂準曰相公望重何故不在中書準曰主上以朝廷無事北門鎖鑰非準不可耳以王旦同平章事趙安仁字樂道河南洛陽人參知政事帝謂旦曰寇準多許人官為己任卿當深戒之置諸州常平倉詔京東西河北東陜西江南淮南兩浙皆立常平倉計户多寡量留上供錢嵗夏秋視市價賤貴量減增糶糴三年以上不糶即回充糧廩易以新粟其後荆湖川峽廣南悉置焉冬十月趙德明請降詔以為定難節度使向敏中言德明屢表歸欵復奉誓表請藏盟府帝嘉之乃遣使授德明檢校太師兼侍中充定難軍節度使封西平王賜賚甚厚因責其子弟入質德明謂非先世故事不遣惟獻駝馬謝恩而已未幾契丹亦册德明為夏國王德明終其身三十年不敢窺邉葬德明皇后先是后崩權殯沙臺至是始附葬永熙陵丁未四年春正月帝如西京謁諸陵作太祖神御殿三月還宫又置國子監于西京契丹城遼西為中京今喀喇沁右翼南有故大寧城廢址遼中京大定府也方輿紀要遼中京金曰北京元為大寧路明洪武初置大寧衛封寧王權于此永樂初寧藩徙封南昌衛遂廢遼西幅員千里多大山深谷險阻足以自固唐初置饒樂都督府以饒樂水名饒樂水方輿紀要以為在大寧城北東北流入于潢河潢河在今克什克騰界蒙古名西喇木倫東北流會諸水徑巴林及科爾心等境入于遼即遼河之西一源也至是契丹主建都于此倣臨潢遼上京也故城在今巴林東北以臨潢水名置宫掖樓閣府庫城市實以漢户號中京夏四月皇后郭氏崩諡莊穆五月丙申朔日食六月葬莊穆皇后葬永熙陵西北仁宗時改諡章穆秋八月權三司使丁謂上景德會計録自乾德中諸州支度經費外凡金帛悉送闕下于是利歸公上而條禁文簿漸為精密吏不得售其奸太宗尤留意財帛淳化初詔三司每嵗具見管金銀錢帛軍儲等簿以聞至是謂權三司使著會計録以獻因條大禮經費以備參較優詔奬之謂機敏冇智謀憸狡過人在三司案牘繁委吏久難解者謂一言判之衆皆釋然冬十二月初詔禮部糊名考校舉人考試糊名始此戊申大中祥符元年春正月有天書見于承天門大赦改元帝自聞王欽若言深以澶州之盟為辱常怏怏不樂欽若度帝厭兵因謬進曰陛下以兵取幽薊乃可滌此恥帝曰河朔生靈始免兵革朕安忍為此可思其次欽若曰惟封禪可以鎮服四海誇示外國然自古封禪當得天瑞希世絶倫之事乃可爾既而又曰天瑞安可必得前代蓋有以人力為之者惟人主深信而崇奉之以明示天下則與天瑞無異也陛下謂河圖洛書果有邪聖人以神道設教耳帝沈思久之曰王旦得無不可乎欽若曰臣喻以聖意宜無不可欽若乃乘間為旦言旦黽勉從之帝尚猶豫會幸祕閣驟問直學士杜鎬曰古所謂河出圖洛出書果何事邪鎬老儒不測上旨漫應之曰此聖人以神道設教爾帝意遂決乃召旦飲歡甚賜以樽酒曰歸與妻孥共之既歸發封則皆美珠也旦悟帝旨自是不敢有異議正月乙丑帝謂羣臣曰去冬十一月庚寅夜將半朕方寢忽室中光曜見神人星冠絳衣告曰來月宜于正殿建黃籙道場一月當降天書大中祥符三篇朕竦然起對已復無見自十二月朔即齊戒于朝元殿建道場以佇神貺適皇城司奏有黃帛曳左承天門南鴟尾上令中使視之帛長二尺許緘物如書卷纒以青縷封處隱隱有字蓋神人所謂天降之書也旦等皆再拜稱賀帝即步至承天門瞻望再拜遣二內史升屋奉之下旦跪進帝再拜受之親置輿中導至道場授陳堯叟啓封帛上有文曰趙受命興于宋付于眘居其器守于正世七百九九定帝跪受復命堯叟讀之其書黃字三幅詞類洪範道德經始言帝能以至孝至道紹世次諭以清淨簡儉終述世祚延永之意讀訖帝復跪奉韞以所緘帛盛以金匱羣臣入賀于崇政殿賜宴帝與輔臣皆蔬食遣官告天地宗廟社稷大赦改元羣臣加恩賜京師酺五日改左承天門為承天祥符置天書儀衛扶侍使有大禮即命宰執近臣兼之欽若之計既行陳堯叟陳彭年丁謂杜鎬益以經義附和而天下爭言祥瑞矣獨龍圖閣待制孫奭言于帝曰以臣愚所聞天何言哉豈有書也帝默然陳彭年字永年撫州南城人三月詔議封禪夏四月以王旦兼封禪大禮使宰相王旦等率文武百官諸軍將校官吏蕃夷僧道耆夀二萬四千三百餘人凡五上表請帝封禪帝意未決召丁謂問以經費謂對曰大計有餘議乃定命翰林太常詳定儀注以王旦為大禮使王欽若等為經度制置使丁謂等計度糧草既而契丹遣使請嵗幣外别假錢幣旦曰東封近彼以此探朝廷意耳帝曰何以答之旦曰正當以微物輕之乃于嵗給三十萬內各借三萬仍諭次年額內除之契丹得之大慙及明年復下有司以契丹所借金幣事屬微末仍依常數與之六月得天書于泰山羣臣上帝尊號王欽若至乾封唐縣宋改奉符今曰泰安為泰安府治上言泰山醴泉出錫山泰山下之小山蒼龍見未幾木工董祚于醴泉亭北見黃帛曳林木上有字不能識言于皇城使王居正居正見其上有御名馳告欽若欽若奉至社首跪授中使馳捧詣闕帝御崇政殿趣召羣臣曰朕五月丙子夜復夢向者神人言來月上旬當賜天書于泰山即密諭欽若等凡有祥異即上聞今果與夢協上天眷祐惟懼不稱王旦等再拜稱賀乃迎奉含芳園之正殿帝齊戒備法駕詣殿拜受之授陳堯叟啓封其文曰汝崇孝奉育民廣福錫爾嘉瑞黎庶咸知祕守斯言善解吾意國祚延永夀歷遐嵗讀訖復奉以升殿于是羣臣表上尊號曰崇文廣武儀天尊道應應章感聖明仁孝皇帝未幾欽若獻芝草八千本趙安仁獻五色金玉丹紫芝八千七百餘本諸州上芝草嘉禾瑞木三脊茅等不可稱紀九月令有司勿奏大辟案以天書告于太廟作玉清昭應宮奉天書也知制誥王曾都虞候張旻字元弼開封人後改名耆皆上疏諫不聽帝先召丁謂問之謂曰陛下富有天下建一宫所以祈皇嗣也羣臣沮陛下願以此諭之王旦密疏諫帝以謂所對告旦不敢復言冬十月帝封泰山禪社首大赦帝發京師以玉輅載天書先道凡十七日至泰山王欽若等獻芝草三萬八千餘本齊戒三日登山道經險峻降輦步進鹵簿儀衛列于山下享昊天上帝于圜臺陳天書于左以太祖太宗配命羣臣享五方帝及諸神于山下封祀壇帝飲福酒攝中書令王旦跪稱曰天賜皇帝太乙神策周而復始永綏兆人三獻畢封金玉匱王旦奉玉匱置于石䃭音感石篋也封禪所用攝太尉馮拯奉金匱以降將作監領徒封䃭帝登圜臺閲視訖還御幄宰相率從官稱賀明旦禪祭皇地祇于社首山如封祀儀禮畢御夀昌殿受羣臣朝賀大赦天下文武並進秩令開封府及所過州軍考送舉人賜天下酺三日改乾封縣為奉符縣大宴穆清殿又宴泰山父老于殿門十一月帝過曲阜謁孔子廟加諡元聖文宣王帝幸曲阜縣謁孔子廟行酌獻禮特展拜近臣分奠七十二弟子遂幸孔林加諡孔子曰元聖文宣王祭以太牢又追諡齊太公望為昭烈武成王立廟青州周文公旦為文憲王立廟曲阜仍追封叔梁紇齊國公顔氏魯國夫人伯魚母开官氏鄆國夫人尋又復追封孔子弟子顔回為兖國公閔損以下九人為郡公曾參以下六十二人為侯命從臣為贊又封左邱明等十九人為伯還宮帝還羣臣爭頌功德惟進士孫籍獻書言封禪帝王之盛事願陛下謹于盈成不可遂自滿假知制誥周起字萬卿淄州鄒平人亦上言天下之勢常患恬于安逸而忽于兢畏願毋以告成為恃帝皆納之己酉二年春三月丙辰朔日食夏四月升州大水陜西旱蝗三司使丁謂上封禪祥瑞圖謂上封禪祥瑞圖示百官于朝堂自封禪之後士大夫爭奏符瑞獻贊頌崔立獨言水發徐兗旱連江淮無為宋軍名元為州今屬廬州府烈風金陵大火是天所以戒驕矜也而中外多上雲霧草木之瑞此何足為治道言哉不省五月代州地震冬十二月罷制舉諸科上封事者言兩漢賢良多因災變以詢訪闕政今國家受瑞建封不當復設遂詔罷制舉庚戌三年春二月交州將李公藴弒其主黎至忠遣使入貢詔封公藴為交址郡王黎氏據安南亦三傳而滅初黎桓死中子龍鉞立未幾龍鉞弟龍廷殺龍鉞而代之踰年入貢詔封交址郡王賜名至忠至忠苛虐國人不附大校李公藴為至忠親征乃逐至忠出城而殺之其二弟明提明昶爭立公藴又殺之自稱留後遣使奉貢帝曰黎桓不義而得之公藴又效尤焉甚可惡也然蠻俗何足責哉其用桓故事授以官爵賜之器幣贖吕端第賜其家端諸子多不同處舊第已質于人帝聞之出內庫錢贖還之令其聚居端長子蕃言負人息錢甚多帝别賜內庫金帛俾償之蕃弟荀與西京差遣仍令內侍省置簿為掌僦課給其家詔樞密院察其妄費王旦曰陛下推恩舊臣始終委曲至矣夏五月髙麗康肇殺其主誦建五世孫立誦兄詢而相之契丹主謂羣臣曰康肇弒君誦而立詢因而相之大逆也宜發兵問其罪羣臣皆曰可蕭敵烈字涅魯衮撻烈四世孫曰國家連嵗征討士卒罷敝况陛下在諒陰時太后蕭氏卒年榖不登創痍未復島夷小國城壘完固勝不為武萬一失利恐為後悔不如遣一介之使往問其故彼若伏罪則已不然俟服除嵗豐舉兵未晚不聽已而契丹伐髙麗擒康肇誅之王詢奔平州今朝鮮國平安道有平州秋旱蝗九月內侍江守恩有罪誅守恩擅取民田麥穗杖殺軍士獄成抵法太常博士俞獻卿字諫臣歙人抗章論救坐貶帝嘗謂輔臣曰前代內臣恃恩恣橫蠧政害物朕深以為戒故于班秩賜豫不使過分有罪未嘗矜貸王旦等曰前代事跡昭然足為龜鑑陛下言及此社稷之福也冬十二月夏州饑西夏管內饑趙德明表求粟百萬朝議不知所出或言德明方納疑而敢渝誓請降詔責之王旦曰第詔德明云已敕有司具粟百萬于京師其遣衆來取德明得詔慚曰朝廷有人遂止辛亥四年春二月帝祭后土于汾陰大赦先是羣臣上表請祀汾陰帝從之以王旦兼大禮使王欽若為禮儀使陳堯叟為經度使儀同封禪正月奉天書發京師是月出潼關渡渭河遣近臣祀西嶽遂至寶鼎縣本漢汾陰唐改寶鼎宋曰榮河今縣屬蒲州府奉祇宫祀后土地祇大赦天下文武進秩建寶鼎縣為慶成軍賜天下酺三日大宴羣臣于穆清殿而還初將祀汾陰會嵗旱龍圖閣待制孫奭上疏陳不可者十有曰陛下才畢東封又議西幸非先王五年卜征重謹之意又曰夫民神之主也是以聖王先成民而後致力于神今國家水旱作沴饑饉居多乃欲勞民事神神其饗之乎又曰今之姦臣以先帝嘗議封禪故贊陛下以繼承先志先帝欲北平幽朔西取繼遷則未嘗獻一謀畫一策而乃卑辭厚幣求和于契丹蹙國縻爵姑息于保吉謂主辱臣死為空言以誣下罔上為己任是陛下以祖宗艱難之業為姦臣僥幸之資此臣所以長歎痛惜也時羣臣爭奏祥瑞奭復上言今野雕山鹿并形奏簡秋旱冬雷率皆稱賀將以欺上天則上天不可欺將以愚下民則下民不可愚將以惑後世則後世不可惑夫國將興聽于民將亡聽于神陛下何為而不思也帝嘉其忠而不能從三月召陜州隱士魏野字仲先蜀人不至野不求聞達居陜之東郊為詩清苦帝自汾陰還次陜州遣陜令王希召之不起命工圖其所居觀之野所居架革堂有水竹之勝帝過西京遂謁諸陵夏四月還宫太子太師吕䝉正卒諡文穆六月太白晝見八月復晝見江淮大水秋七月畿內蝗鎮眉昌等州昌州唐置今重慶府榮昌縣是餘注見前地震八月河決通利軍宋置後改安利復改平川今衛輝府濬縣是冬十月以向敏中等為五嶽奉册使加上五嶽帝號帝御朝元殿發册命敏中等充使尋作會靈觀以奉祀壬子五年夏四月復以向敏中同平章事時舊將出鎮不以吏事為意惟敏中盡心民事帝由是有復用之意及東封西祀皆以敏中留守厚重鎮靜人情帖然遂復拜相五月賜杭州隱士林逋字君復杭州錢塘人粟帛逋力學善詩不趨榮利家貧衣食不足晏如也結廬杭州西湖之孤山在裏外二湖之間一嶼聳立為湖山絶勝處帝聞其名賜以粟帛秋八月丙申朔日食九月以王欽若陳堯叟為樞密使丁謂參知政事馬知節為樞密副使時天下乂安王欽若丁謂導帝以封祀眷遇日隆欽若自以深達道教多所建明而謂附㑹之與陳彭年宦者劉承圭楚州山陽人後改名承規等搜講墜典大修宫觀以林特字士竒南劍州順昌人有心計使為三司使以幹財利五人交通蹤跡詭祕時號五鬼王旦欲諫則業已同之欲去則上遇之厚追思李沆之先識嘆曰李文靖真聖人也欽若狀貌短小項有附疣時目為癭相性傾巧敢為矯誕然智數過人每朝廷有興作能委曲遷就以中帝意知節以衆方競言祥瑞深不然之每言于帝曰天下雖安不可忘戰去兵也冬十月帝言聖祖降于延恩殿初汀州人王捷言于南康遇道人姓趙氏授以丹術及小鐶神劍蓋司命真君也是為聖祖劉承圭以聞賜捷名中正得對龍圖閣既東封加聖祖號為司命天尊授中正左武衛將軍至是帝語輔臣曰朕夢神人傳玉皇之命云先命汝祖趙元朗授汝天書今令再見汝翌日復夢神人傳聖祖言吾座西斜設六位以候是日即于延恩殿設道場五鼓一籌先聞異香頃之黃光滿殿聖祖至朕再拜殿下俄有六人至揖聖祖皆就坐聖祖命朕前曰吾人皇九人中一人也是趙之始祖再降乃軒轅皇帝後唐時復降生趙氏之族今已百年皇帝善為撫育蒼生無怠前志即離座乘雲而去王旦等皆再拜稱賀詔告天下肆赦加恩命丁謂等修崇奉儀注閏月上聖祖尊號曰聖祖上靈髙道九天司命保生天尊大帝聖母懿號曰元天大聖后遂加太廟六室尊號羣臣上帝尊號曰崇文廣武感天尊適應真佑德上聖欽明仁孝皇帝尋作景靈宮奉聖祖以孔子諡犯聖祖諱改元聖日至聖十一月以王旦兼玉清昭應宫使詔建康軍鑄玉皇聖祖太祖太宗尊像以丁謂為奉迎使奉安于玉清昭應宫帝率百官郊謁又詔刻天書于宫以旦為刻玉使王欽若與謂副之十二月立德妃劉氏為皇后后父通為虎捷都指揮使從征太原道卒后在襁褓而孤鞠于外氏善播鼗蜀人龔美者以煆銀為業携之至京師年十五入襄邸帝即位以為美人欲封貴妃李沆不可事具前未幾為修儀進位德妃専寵後宫郭后崩帝欲立之翰林學士李迪字復古幽州人言妃起于微寒不可以母天下參知政事趙安仁亦言不如沈才人出于相門帝不從他日與王欽若從容論方今大臣誰為長者欽若欲排安仁乃譽之曰無若趙安仁安仁昔為沈倫所知常欲報之帝默然未幾安仁罷帝欲得楊億草制使丁謂諭旨億難之謂曰勉為此不憂不富貴億曰如此富貴亦非所願也乃命他學士焉后既立以無宗族更以美為兄改其姓為劉聞李迪之諫大恨之后性敏警曉書史聞朝廷事能記其本末帝退朝閲天下封奏多至中夜后皆預聞宫闈事有問輒援引故實以對帝深重之由是漸干外政癸丑六年春正月禁內臣出使干預公事凡有干預州縣公事所在官吏不以聞並罪之秋七月除農器稅知濱州後周置今屬山東武定府吕夷簡字坦夫䝉正兄子請免稅河北農器帝曰務穡勸農古之道也豈獨河北哉詔諸路並除之冬十二月戊午朔日食獻天書于朝元殿先是帝享玉皇于朝元殿判亳州丁謂獻芝草三萬七千本遂詔扶侍使趙安仁等奉獻天書告玉清昭應宫及太廟甲寅七年春正月帝如亳州謁老子于太清宫先是詔親謁太清宫加號太上老君混元上德皇帝孫奭上言陛下事事慕效唐明皇豈以明皇為令德之主邪帝曰東封祀汾謁陵寢享老子非始于明皇且開元禮今世所循用不可以天寶之亂而非之作解疑論以示羣臣及是春天書發京師遂朝謁太清宫丁謂獻白鹿一芝革九萬五千本曲赦亳州及車駕所經流以下罪升亳州為集慶軍賜酺三日以應天府為南京二月還宫國初因五代之舊以大梁為東京開封府洛陽為西京河南府後以太祖舊藩歸德軍在宋州改宋州為應天府至是建為南京作鴻慶宫以奉太祖太宗聖像夏四月沙州入貢先是曹宗夀殺其從父節度使延祿而代之至是死其子賢順遣人入貢詔授歸義節度使沙州自宗夀丹以來通使契六月王欽若陳堯叟馬知節免知節素惡欽若之為人議論未嘗少屈欽若每奏事必懷數奏但出一二匿其餘退則以己意稱上旨行之知節嘗于帝前顧欽若曰懷中奏何不盡出之欽若不恱會瀘州梁置今𨽻四川都巡檢王懷信等上平蠻功欽若久不決既而擅超擢之知節因面詆其短爭于帝前帝召王旦質之旦至欽若猶譁不已知節流涕曰願與欽若同下御史府旦叱欽若使退帝大怒命付獄旦從容曰欽若等當黜未知坐以何罪帝曰忿爭無禮旦曰陛下奄有天下使大臣坐忿爭無禮之罪或聞外國無以威逺願至中書召欽若等宣示陛下含容之意且戒約之俟少間罷未晚也帝曰非卿言朕固難忍月餘始罷欽若知節併及堯叟司空張齊賢卒諡文定以寇準為樞密使王旦薦之也契丹伐髙麗大敗而還初契丹以鴨緑江注見前地子髙麗髙麗築六城曰興鐵通龍龜郭六州及王詢敗請降于契丹契丹責令親朝詢以疾辭契丹怒連嵗遣耶律資忠字沃衍系出仲父房往取地不從乃遣蕭敵烈討之髙麗與女真設竒邀擊契丹大敗而還已而契丹耶律世良等大敗髙麗于郭州斬首數萬獲其輜重而還耶律世良小字幹六院部人冬十月髙麗來貢自髙麗王誦立遣使入朝為契丹所阻不通中國者纍年至是詢復遣其工部侍郎尹證古入貢詔登州置館于海次以待之十一月玉清昭應宫成初議營宫料功須十五年修宫使丁謂令以夜繼晝每繪一壁給二燭故七年而成凡二千六百一十楹製度宏麗屋宇少不中程式雖金碧已具劉承圭必令毁而更造有司莫敢較其費未幾帝親謁宮奉刻玉天書安于寶符閣以御容立侍于側十二月癸丑朔司天監奏日食不應羣臣表賀戶部獻天下民數戶九百五萬五千七百二十九口二千一百九十七萬六千九百六十五乙卯八年春二月淮浙饑加楚王元佐天策上將軍賜劍履上殿詔書不名夏四月寇準罷準以三司使林特附會邪險惡之每事阻抑帝方寵特聞之不恱謂王旦曰準剛忿如昔旦曰準好人懷惠又欲人畏威皆大臣所當避而準乃以為己任此其所短也非至仁之主孰能容之凖竟以是罷初準數短旦于帝而旦専稱準帝謂旦曰卿雖稱其美彼専談卿惡旦曰理固當然臣在相位久政事缺失必多準對陛下無隱益見其忠直此臣所以重準也帝由是益賢旦中書有事送樞密院違詔格準以上聞旦被責拜謝堂吏皆坐罰不踰月樞密冇事送中書亦違詔格堂吏欣然呈旦旦令送還樞密而已準大慙謝及罷準托人語旦求為使相旦驚曰將相之任豈可求耶吾不受私情也準深憾之已而除準武勝軍節度使同平章事判河南府凖入見謝曰非陛下知臣安能至此帝具道旦所以薦者準愧嘆以為不可及朝元殿災榮王元儼太宗第八子宫火延及殿閣內庫有司劾遺火事當死者衆王旦曰陛下始以罪已詔天下今乃過為殺戮且火雖有迹安知非天譴也帝欣然納之減死幾百人六月己酉朔日食秋九月吐蕃唃厮囉請伐夏州不許嘉勒斯賚吐蕃嘉勒布之苗裔居宗噶爾城在今西寧府西寧縣東宋于此置龍支縣後廢以宗噶爾僧李立遵為倫布倫布者國相也立遵貪而喜殺國人不附會與涇原鈴轄曹瑋戰于三都谷在今鞏昌府伏羌縣西而敗復襲西涼府亦敗衆益怨之嘉勒斯賚遂與立遵不協徙居邈川城名宋于此置樂州今為西寧府碾伯縣治而立遵自居宗噶爾屢表請嘉勒布之號朝議以嘉勒布乃戎王也立遵居嘉勒斯賚下不宜妄授止命為保順軍節度使嘉勒斯賚與西夏接壤每以兵抗趙德明希朝廷賜豫因是聚衆數十萬請討平夏以自效帝以戎人多詐或生他變命周文質監涇原軍曹瑋知秦州以備之樞密直學士知陳州張詠卒諡忠定詠倜儻有大志尚氣節嘗曰事君者亷不言貧勤不言苦忠不言已效公不言已能斯可以事君矣故所至以政績聞方疾上疏言不當造宫觀竭天下之財傷生民之命此皆賊臣丁謂誑惑陛下乞斬謂首置國門以謝天下然後斬詠頭置丁氏之門以謝謂章三上出知陳州卒贈左僕射賜信州道士張正隨號真靜先生初漢張魯子自漢中徙居信州龍虎山在今江西廣信府貴溪縣西南相傳漢張道陵修鍊于此世以鬼道惑衆正隨其後也至是召赴闕賜號王欽若為奏立授籙院及上清觀今曰太上清宫在龍虎山上蠲其田租自是凡嗣世者皆賜號丙辰九年春正月以張旻為樞密副使先是旻為馬軍副都指揮使被旨選兵下令太峻兵懼謀欲為變上召二府議之王旦曰若罪旻則自今帥臣何以御衆捕謀者則震驚都邑今但擢旻使解兵柄反側者當自安矣帝從其言兵果無他帝語左右曰王旦善處大事真宰相也夏六月畿內蝗帝遣人出郊得死蝗以獻因以示大臣明日執政遂袖死蝗進曰蝗盡死矣請示于朝率百官賀王旦曰蝗出為災災弭幸也又何賀固稱不可後數日二府方奏事飛蝗忽蔽天帝顧旦曰使百官方賀而蝗如此豈不為天下笑邪秋八月知秦州曹瑋敗吐蕃于伏羌寨本唐復羌縣宋為寨元復置縣今屬鞏昌府瑋在秦州屢請益兵帝不恱問李迪邉將誰可代瑋者迪曰瑋知嘉勒斯賚窺關中故請益兵為備非怯也乃詔發關內羡兵赴瑋未幾嘉勒斯賚與宗噶爾族入冦使諜者聲言以某日下秦州會食以激怒瑋瑋勒兵不動坐俟其至大破之夷其族帳斬首千餘級自是嘉勒斯賚勢蹙退保磧中不出九月丁謂陳堯叟免以陳彭年王曾張知白字用晦滄州清池人參知政事任中正字慶之曹州濟陰人為樞密副使彭年初入翰林為學士嘗謁王旦旦辭不見彭年性奸諂時號九尾狐翌日向敏中以彭年所上文字示旦旦瞑目不覽曰是不過興建符瑞圖進取耳已而彭年附王欽若丁謂朝廷典禮無不參預詳練儀制前世未有者必推引依據以成就之帝甚寵遇及升內閣而李宗諤字昌武昉之子卒楊億罷彭年獨任事務叢委形神皆耗舉止失措至家人有不記其名者明年二月卒以旱蝗罷諸營建考宋史李迪傳迪請發內藏庫與諫土木乃一時事續綱目分係祥符九年天僖元年與傳不合今依宋元通鑑併之帝以頻嵗旱蝗洊饑三司調用不給召李迪問所以濟之之策迪對曰祖宗置內藏庫欲攻取西北且備凶年今邉幸無費儻以佐國用則庶幾天下財利寬而民不加賦矣帝曰朕欲用李士衡代馬元方字景山濮州甄城人為三司使俟其至當出金帛借之迪曰天子于財無內外何必曰借迪又言陛下自祀汾亳以來土木之役不可勝紀今旱蝗之警乃天所以仁愛陛下也願罷諸不急之費帝嘉納之大發內庫金繒賜三司詔宗樂罷秋宴督諸路捕蝗遂罷諸營造禁天下貢瑞物詔民能振貧者官之未幾得雨青州飛蝗多赴海死丁巳天禧元年春三月以王曾兼會靈觀使辭不受王欽若方挾符瑞以固寵位陰排異已者會有詔以曾為㑹靈觀使曾以推欽若帝不恱謂曾曰大臣宜傅會國事何遽自異邪曾頓首曰君從諫謂明臣盡忠謂義陛下不知臣駑病使待罪宰府臣知義而已不知異也夏五月以王旦為太尉侍中參決軍國重事旦固辭許之旦素羸多疾連年求解機務不許乃拜太尉侍中五日一赴起居入中書遇軍國重事不限時日入預參決旦愈畏避上疏固辭新命又託同列奏白帝重違其意止加封邑秋七月王旦罷旦疾甚引對滋福殿帝曰朕方以大事託卿而卿疾如此因命皇子出拜旦皇恐走避皇子隨而拜之旦言皇子盛德必任陛下事因薦可為大臣者十餘人其後不至宰相惟凌策字子竒宣州人李及字幼幾鄭州人旦復力求避位帝憫其形瘁許之復問曰卿萬一有不諱朕以天下付之誰乎旦謝曰知臣莫若君惟明主擇之固問之旦舉笏曰以臣之愚莫如寇準帝曰準性剛褊更思其次旦曰他人臣所不知也八月以王欽若同平章事帝久欲相欽若王旦曰欽若遭逢陛下恩禮已隆且乞留之樞密兩府亦均臣見祖宗朝未嘗有南人當國者雖古稱立賢無方然須賢士乃可臣為宰相不敢阻抑人此亦公議也乃止及旦罷欽若遂相欽若語人曰為王子明遲我十年為宰相九月王曾罷曾不不受㑹靈觀使上意不懌王欽若數譖之會曾市賀皇后家舊第其家未徙而曾令人舁土置其門賀氏訴于朝遂罷曾政事王旦在告聞之曰王君介然他日德望勳業甚大顧豫不得見爾或問其故曰王君昨讓觀使雖拂上旨而詞直氣和了無所懾且始被進用已能若是我自任政事二十年每進對稍忤即䠞蹜不能自容以是知其偉度矣太尉玉清昭應宫使王旦卒諡文政旦疾篤帝臨問親調藥并薯蕷粥賜之遣內侍問者日至三四及卒痛悼不已旦遺令削髮披緇以斂蓋悔其不諫天書之失也諸子欲奉遺令楊億以為不可乃止旦為首相會天下無事慎守祖宗法度無所變改帝久益信言無不從凡大臣有所奏請必問曰王旦以為何如旦與人寡言笑及奏事羣臣異同旦徐一言以定居家賔客滿堂察可與言及素知名者數日後召與語詢訪四方利病或使疏其言而獻之以觀其所長密籍其名薦之人未嘗知諫議大夫張師德兩詣旦門不得見意為人所毁以告向敏中敏中從容為旦言之旦曰旦處安得有毀人者及議知制誥旦曰可惜張師德敏中問之旦曰師德名家子有士行不意兩及吾門狀元及第榮進素定當靜以待之若復奔競使無階而入者當如何也薛奎運江淮辭旦旦無他語但云東南民力竭矣奎退嘆曰真宰相之言也內臣劉承圭以忠謹得幸既病求節度使帝謂旦曰承圭待此以瞑目旦執不可曰他日求為樞密使此其階也遂止自是內臣不過留後旦任事久有謗之者輒引咎不辨至人有過失雖人主盛怒可辨者辨之必得而後已人張師德字尚賢襄邑人薛奎字宿藝絳州戊午二年夏五月京師民訛言妖至先是西京訛言有物如席帽夜飛入人家又變為犬狼狀能傷人民恐每夕重閉深處操兵自衛至是京師民訛言帽妖至達旦呌譟詔立賞格募告為妖者知應天府王曾令夜開里門有倡言者即捕之妖亦不興契丹以張儉宛平人為政事令儉端慤不事外飾為雲州幕官契丹主獵雲中故事長吏當有所獻節度使進曰臣境無他産惟幕僚張儉一代之寶願以為獻因召見容止朴野訪及世務占奏三十餘事由是顧遇特異六月彗星出北斗秋八月立子受益帝第六子即仁宗為皇太子更名禎赦受益司寢李氏杭州人所生皇后養以為子與楊淑妃益州郫人同撫育之至是立為太子帝作元良針賜之冬十月張知白罷知白與王欽若論議多相失因稱疾辭位遂罷知天雄軍己未三年春二月戊午朔日食得天書于乾佑山乾佑縣之山也乾佑五代漢縣故城在今商州鎮南縣夏六月王欽若有罪免以寇準同平章事永興軍巡檢朱能挾內侍都知周懷政并州人詐為天書降于乾佑山時寇準方判永興素喜能附已遂上其書詔迎入禁中中外皆識其詐帝獨信之諭德魯宗道字貫之亳州譙人言姦臣妄誕以惑聖聽知河陽孫奭言乞斬朱能以謝天下皆不聽準由是得召用矣時欽若恩禮衰商州捕得道士譙文易蓄禁書能以術使六丁六甲神欽若坐與之出入遂免以準代相準之始召也門生有勸準者曰公若至河陽稱疾堅求外補此為上策倘入見即發乾佑天書之詐斯為次也最下則再入中書大喪平生矣準不懌以丁謂參知政事謂因準稱譽得致通顯雖同列而事之甚謹嘗㑹食中書羮汚準鬚謂徐起拂之準笑曰參政國之大臣乃為長官拂鬚邪謂大慙恨遂成讎隙河決滑州泛澶􅗛鄆濟徐境秋七月羣臣上帝尊號大赦以天書再見也八月大㑹道釋于天安殿凡萬三千八百六人京東河北水彰德留後馬知節卒諡正惠知節慷慨以方略自任所與善必一時豪傑性剛直敢言不肯少有卑屈天下稱其直嘗與王欽若爭論上前退見王旦辭色猶怒甚曰知節幾欲以笏擊死之但恐驚動君相爾至是卒冬十一月帝謁景靈宫享太廟祀天地于圜丘大赦自是每嵗三行禮宮廟圜丘必同舉永為定制向敏中寇凖並加僕射麻下帝以即位未嘗除左僕射意敏中應喜甚賀客必多使人密覘之云敏中方謝客門闌悄然瞷其庖中亦寂無一人帝大笑曰向敏中大耐官職御批歷代通鑑輯覽卷七十三

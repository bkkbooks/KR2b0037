front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷一百七明孝宗皇帝丁巳𢎞治十年春三月召閣臣議政文華殿
  hash: sha256:c41754c17934cf860cf50c692d1c828d223d30495a0b420addf5c2324724cf43
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_106-1a, image: WYG0339/WYG0339-0409a.png}
body:
  text: 帝御經筵罷召徐溥及劉健李東陽謝遷授以諸司題奏曰與卿輩裁決溥等擬㫖上帝應手改定無疑滯事端多者健請出外詳閲帝曰盍就此靣議既畢賜茶而退自成化中憲宗召對彭時商輅後至此始再見其後宣召顧問遂以為常夏五月小王子寇潮河川明置潮河川堡以地近潮河故名潮河源出古北口外舊自密雲至順義縣牛欄山與白河合今自密雲縣東南即入白河水流湍悍其聲如潮指揮劉鋠等戰死六月命户部侍郎劉大夏督理宣大軍餉大夏將行尚書周經謂曰塞上勢家子以市糴為私利公母以剛賈禍大夏曰處天下事以理不以勢俟至彼圖之初塞上糴買必粟千石芻萬束方許告納以故中官武臣家得操利權大夏令有芻粟者自百束十石以上皆許勢家無所牟利不兩月邊儲充積先是李敏巡撫大同見北方諸省轉餉至者道逺耗費及為户部尚書㑹計嵗攴奏令糧一石徵銀一兩輸邊民樂輕齎一時稱便然軍儲由是全資市糴始則利歸勢家後乃空乏時告云李敏字公勉襄城人冬十月起王越總制三邊軍務帝即位初越自安陸赦還屢疏頌寃下廷議列上其功罪詔復左都御史致仕時越年已七十矣復結中官李廣以中㫖召掌都察院事言官交章論奏乃寢及是小王子和碩諸部屢犯邊遼東宣大延綏甘肅俱被殘廷議覆設總制官先後㑹舉七人不稱㫖吏部尚書屠滽以越名上詔起原官總制甘涼軍務越言甘鎮兵弱非藉延寧兩鎮兵難以克敵請兼制兩鎮從之簡閲禁兵馬文升疏言歷代兵制不使權歸一人漢制有南北軍南軍守王宫主禁衛北軍護京師聽征討各有所掌而南軍尤託以腹心我太祖法古制十六衛親軍指揮使司不𨽻五府為禁兵即古之南軍也其他衛屬五府即古之北軍也永樂中增設十二衛又選精壯數千人屬御馬監更番上直近年禁兵廢弛請敕大臣揀選操練令更畨直各門官為鈐束出入從之戊午十一年春三月皇太子出閣講讀東宫宦豎不欲太子近儒臣數以事間講讀詹事吳寬字源博長洲人上疏曰東宫講學寒暑風雨則止朔望令節則止一年不過數月一月不過數日一日不過數刻進講之時少輟講之日多豈容復以他事妨之古人八嵗就傅即居宿于外欲令離近習親正人庶民且然况太子天下本哉帝嘉納之秋七月王越襲小王子于賀蘭山破之小王子居山後久熟知路徑纍招野默克埓等侵擾邊地越分兵三路進俱有斬獲日晡收兵回别伏道旁敵來襲復追殺至桞溝在寧夏府平羅縣西北獲駝馬牛羊器仗千數論功進越少保遂條上制置哈密事宜未報㑹李廣得罪死言官連章劾廣黨皆及越越聞憂恚卒越舉景泰初進士方廷試對策忽旋風起飄其卷入雲中及秋朝鮮使至言其王視朝時有卷從風中墮謹持以獻視之乃越卷也帝語吏部曰此當任風憲官因授越御史不五年即擢大同巡撫其後屢立邊功遂至封伯督兵既久健將武校多出其門賞豫略無吝惜嘗一夕值大雪越故豪縱方圍爐飲諸伎擁琵琶侍一小校詗敵還陳敵情未竟越喜酌金巵命飲即賜之巵語畢益大喜指伎絶麗者立豫之校感激所至為盡死力越初比汪直既耋復結李廣士大夫以其破敗名檢咸鄙之然自越死後將餒卒惰冒功糜餉滋甚邊臣竟未有如越者九月華蓋殿大學士徐溥致仕溥居內閣十二年與劉健謝遷等協心輔治天下並稱賢相至是以目青三疏乞休始許之恩賚視常典有加溥性凝重度量宏逺既為首輔事有不可輒與同列共言之值帝方向治于所言亦皆聽從欽天監革職監正李華為昌國公張巒擇葬地中㫖復官溥等言即位以來未有內降幸門一開未流安底臣等不敢奉詔遂收㫖還占城奏安南侵擾帝欲遣大臣往解溥等言外國相侵有司榭諭之足矣若遣使萬一抗命虧損國體問罪興師則坐耗中國非計之得也于是罷不遣使詔撰三清樂章溥等言漢祀五帝儒者猶非之况三清乃道家妄說一天之上安得有三大帝且以周柱下史李耳當其一以人鬼列天神矯誣尤甚乃止中官李廣以燒煉齊醮被寵溥等力言其妖妄引唐憲宗宋徽宗為戒帝深感其言溥歸後踰年卒贈太師諡文靖張巒興濟人皇后父冬十月清寧宫災太皇太后宫也先是有熊踰西直門兵部請嚴武備郎中何孟春字子元郴州人曰宜慎火已而禮部內府軍器庫香經厰內官監連年災太監李廣有罪自殺廣以符籙禱祀獲寵任權傾中外勸帝建育秀亭于萬嵗山亭成幼公主殤清寧宫復災日者謂建亭犯嵗忌太皇太后恚曰今日李廣明日李廣果然禍及矣廣懼飲藥死帝疑廣有異書使使即其家索之得賄簿多文武大臣名餽黃白米各千百石帝曰廣食幾何其家亦甚隘豈能容是米哉左右曰隱語耳黃米者金白米者銀也帝怒下法司按問諸臣皆懼昏夜赴夀寧候張鶴齡巒之子求解事得寢時方以宫災求直言編修羅玘上言日今日之事如癭瘤割之去易而身危消之去遲而身安竊見文武官賄廣求進亷恥掃地其間有部寺之尊將師之寄天下四夷方以為丙魏姚宋方召衛霍今一旦暴白恐生慢易雖實有丙魏方召之徒亦不復信此大可憂也如遂己之亷恥愈衷乞密諭賄廣者引退或以他事黜之庶可消已成之黨絶未起之禍章下所司羅玘字景鳴南城人閏十一月壬戌朔日食庚申十二年夏六月闕里至聖廟災敕山東撫按重建及成在十七年遣大學士李東陽祭告前禮部主事楊循吉字君謙吳縣人請復建文位號不從循吉言建文君乃髙皇帝嫡孫躬受神器其後太宗入繼大統削建文位號百餘年來未䝉顯復夫建文雖以左右非人得罪社稷而實則生民之主也請復尊號如景皇帝故事庶幾禆益先聖有光大孝下禮部議格不行己未十三年夏四月更定律例初洪永間定制法司斷獄一依律擬議毋許妄引條例英憲以後巧法吏往往舍律用例借便已私條例由此日繁及是帝命刑部尚書白昂刪定之給事中楊亷字方震豐城人疏請刪例從簡略言髙皇帝肇造之初特命劉基陶安等詳定律令且諭之曰立法貴簡若條緒繁多可輕可重吏得夤緣為奸聖祖重律輕例之意見矣百三十年來律行既久條例漸多近令法司詳議革其繁瑣臣以為非深于經者不足以議律非深于律者不足以議例望特選素有經術深明律意者専理其事以大祖立法貴簡之心為主一切近代冗雜悉為革去俾以例通律之窮不以例淆律之正庶刑官有所遵守帝嘉納之已而昂㑹九卿定議擇條例可行者二百九十餘條與律並行詔如所請頒之中外帝前後所任刑官何喬新彭韶而外昂與閔圭字朝英烏程人持法皆平㑹情比律一歸仁恕天下翕然稱頌焉和碩寇大同遊擊將軍王果禦之敗績敵騎七千餘入威逺衛正統中置今省故城在朔平府平魯縣北果及都指揮鄧洪等與戰大敗官軍九百餘人皆死命平江伯陳鋭為靖虜將軍充總兵官侍郎許進提督軍務往禦之五月甲寅朔日食召閣臣面議軍政大同之警京師戒嚴兵部請甄别京營諸將帝召劉健及李東陽謝遷至平臺出英國公張懋輔之子等自陳疏靣議去留乃去遂安伯陳韶志曾孫等三人而召鎮逺侯顧溥興祖孫督團營其後和碩謀犯大同帝復召見閣臣健請簡京營大帥因言京軍怯不任戰請自今罷其役作以飬鋭氣帝然之秋七月京師地震九月下行人司行人王雄于獄貶其官和碩諸部屢寇大同朝廷以陳鋭等無功召還遣保國公朱暉永之子侍郎史琳代之太監苗逵為監軍雄上言克敵在將得其人選任不可不慎比者北虜入寇廷臣首推陳鋭以國之死生衆之存亡試之謀勇未聞之人虜益猖獗今斥陳鋭用朱暉素不更事固不多于鋭也願陛下罷暉責前日推舉鋭之罪然後從公拔其尤者俾専閫外勿署監軍提督以撓之今之監督即唐觀軍容使之任也以郭子儀李光弼之勇略然魚朝恩為觀軍容使而九節度皆潰相州况其下乎帝以雄妄言下獄謫縣丞比暉至寇已退乃還辛酉十四年春正月庚戌朔陜西地大震朝邑震十七日壞廬舍壓死人畜無算兵部尚書馬文升言此外寇侵凌之兆今和碩方跳梁而海內民困財竭將懦兵弱宜行仁政以飬民講武備以固國節財用停齊醮止傳奉冗員禁奏乞聞田撤還陜西織造內臣賑恤被灾者之家帝從其言立召內臣還京夏四月和碩及小王子連兵入寇復命朱暉帥師禦之先是小王子及和碩等復居河套至是以敵八千騎東駐遼塞下入長勝堡在錦州界既而西歸復進掠延綏寧夏往來數千里所至殺掠殆盡命暉佩大將軍印統都督劉寧等五將往禦及秋暉等至寧夏敵已飽掠去乃以五路之師夜襲敵巢于河套僅斬三級以捷聞未幾小王子和碩以十萬騎分道入散掠固原寧夏境戕殺慘酷胔骼遍野關中震動六月陜西獻玉璽鄠縣民得玉璽色微青文曰受命于天既夀永昌背有螭紐周廣一尺四寸厚三寸巡撫熊翀以為秦璽復出遂獻之禮部尚書傅瀚字曰川新喻人言秦璽完毀具載簡冊今所進璽篆紐皆不類與宋元所得璽色又殊蓋後人倣為之且帝王受命在德不在璽請姑藏內府帝是其言薄賞得璽者而遣之秋七月普安注見前苗婦米魯作亂命南京户部尚書王軾字用敬公安人督師討之初普安土司隆暢既老子禮聽營長阿保讒搆相仇怨暢有妾曰米魯以罪見逐依禮同居禮阿保皆與亂暢聞誅禮阿保懼禍助米魯率衆攻暢破百餘寨暢逃雲南鎮巡官召阿保與暢盟息兵米魯潛令人殺暢與阿保亂益甚鎮巡官發兵捕斬阿保米魯亡入霑益州元置今州屬雲南曲靖府至是復歸故營攻劫諸寨鎮守太監楊友等討之大敗賊乘勝劫掠普安幾陷命軾兼左副都統史提督軍務軾未至米魯擁萬騎劫營虜友去九月丙子朔日食召秦絃總制三邊軍務言官劾史琳等喪師溺職召琳還起秦紘户部尚書兼副都御史代之紘至録死事者功劾敗將楊琳等四人罪練壯士興屯田申明號令軍聲大振冬十月以馬文升為吏部尚書劉大夏為兵部尚書文升在班列中最為耆碩帝推心委任特敬禮之嘗召見暖閣議考察事以文升年髙重聽再呼告之及出命左右掖之下階其他嵗時賜賚諸大臣莫敢望也大夏時為兩廣總督召命至再以疾固辭帝不允仍趨之入見既至帝問曰朕召卿卿數引疾何也大夏頓首言臣老且病竊見天下民窮財盡脫有不虞責在兵部度力不辦故辭耳帝默然十二月和碩等出河套詔朱暉還留京兵三千防禦以參將楊玉領之明年正月朱暉引兵還都給事中屈伸字引之任邱人疏劾暉等西討無功班師甫命下將士已入國門不知奉何詔㫖且此一役糜京帑及邊儲共一百六十餘萬而首功止三級是以五十萬金易一無名之首也所上有功將士至萬餘人假使馘一渠魁如和碩或斬級至千百將竭天下財不足供費而報功又不知幾萬萬也暉等宜論罪置重典不聽壬戌十五年秋七月王軾破米魯斬之軾調官土兵分道進擊連破賊賊遁走僉事王懋中土知府鳯英追及之馬尾籠在貴州南龍府境官軍四靣急攻米魯突圍出戰英臨陳格殺之餘黨平九月庚午朔日食冬十一月瓊州黎亂前知府張桓貪殘私斂繼以余濬賊虐尤甚黎人苦之符南蛇等遂聚衆為亂鎮兵討之不下户部主事馮顒上言瓊州在大海中周三千里其五指山在瓊州府定安縣西南五峯髙大亦名黎母山黎人環居山下外為熟黎內為生黎山水亦分五𣲖環繞郡境入海林箐深密川澤險阻兵不可入黎衆聚散無常攻之則巢穴難窮置之則侵掠不已乞勾考熟知夷情者令各集土兵聽巡守官節制有能擒斬首惡者復其祖職此以夷攻夷數月間當見俘獲不然師旅之興無時已也帝從之明年七月斬符南蛇賊遂平癸亥十六年春二月詔建延夀塔于朝陽門外尋罷帝事兩宫太后甚謹而兩宫皆好佛老以是宫中多設齊醮數遣中使往泰山武當山進神袍奉幡幢或白晝散燈市上閣臣雖諫帝不敢違也及是內㫖建造佛塔又除道士五人為真人劉健等力諫遂皆寢罷夏五月遣南京刑部侍郎樊瑩字廷璧常山人巡視雲貴先是雲南景東元開南州明置府今府屬雲南大疫雲霧黑暗凡七日不辨晝夜龍川即隴川宣慰司雨雪如手掌盡殺禾稼宜良元縣今屬雲南府地屢震暴風曲靖注見前火災燬房舍無算帝以雲南災變非常皆由官不得人上下攫取以致小民含怨上干天和命瑩兼左僉都御史巡視瑩至滇黜不職者數十人民心漸安召見兵部尚書劉大夏于便殿帝問大夏曰卿前言天下民窮財盡祖宗以來征斂有常何今日至此對曰正謂不盡有常耳如廣西嵗取鐸木廣東取香藥固以萬計他可知矣又問天下軍若何對曰窮與民等帝曰居有月糧出有行糧何故窮對曰其帥侵克且過半安得不窮帝太息曰朕臨御久乃不知天下軍民困何以為人主遂下詔嚴禁帝察知大夏方嚴委寄益重左都御史戴珊亦以材見知每有宣召或専及大夏或兼及珊諸大臣不能與也既而寇犯大同中官苗逵貪武功勸帝出師帝惑其言將從之閣臣劉健等委曲勸阻帝意猶未回召問大夏曰太宗時頻年出塞今何故不可大夏曰陛下神武固不後太宗而將領士馬逺不逮且淇國公小違節制謂邱福事見前舉十萬衆悉委沙漠奈何易言之度今上䇿惟守耳時珊亦同召從旁贊決帝遽曰微二卿朕幾誤由是師不果出帝嘗諭大夏曰臨事輒思召卿又以非卿部事而止後有當行罷者具揭帖以進大夏頓首曰不敢帝問何故對曰事之可否外付府部內咨閣臣可也揭帖滋弊不可為後世法帝然之又嘗問天下何時太平對曰求治亦未可太急但用人行政悉與大臣面議當而後行久之天下自治嘗乘開言四方鎮守中官之害帝問狀對曰臣在兩廣見諸文武大吏供億不能敵一鎮守煩費可知帝曰然祖宗來設此已久安能遽革第自今必擇其亷者而後用不然則已之大夏頓首稱善一日大夏與戴珊同侍帝曰時當述職諸大臣皆杜門如二卿者雖日見客何害袖出白金賚之曰少左爾亷且屬勿廷謝恐為他人忌也珊以老疾乞骸骨優詔慰留已大夏宴見復代珊請帝曰彼屬卿言邪主人留客堅客且為强留珊獨不能為朕留邪且朕以天下事付卿輩猶家人父子今太平未兆何忍言歸大夏出以告珊珊感泣曰臣死是官矣秋九月詔户部核議鹽法帝在位久益明習政事數召見大臣欲以次革煩苛除宿弊嘗論及理財李東陽極言鹽法弊壞由陳乞者衆因而私販數倍劉健進曰太祖時茶法始行駙馬歐陽倫以私販坐死髙皇帝不能救如倫事孰敢為陛下言者帝曰非不敢言不肯言耳遂詔户部核利弊具議以聞當是時健等三人竭誠盡慮知無不言初或有從有不從既乃益見信所奏請無不納每進見帝輒屏左右左右不得聞從屏間竊聽但聞帝數數稱善時人為之語曰李公謀劉公斷謝公尤侃侃帝寵任健等特甚三人皆賜蟒衣閣臣賜蟒自健等始甲子十七年春二月詔每嵗審録重囚毋限一日故事每年㑹官録囚率以一日告竣兵科給事中潘釋言審録數多一日不能詳定恐致寃濫太宗皇帝時刑部上大辟三百餘人諭各官再訊遲十日不為害祖宗好生之仁萬世所當遵也從之三月太皇太后周氏崩諡孝肅皇后定祔廟制先是慈懿錢太后崩雖合葬裕陵而異隧距英宗元堂數丈許窒之虛右壙以待隧獨通至是周太后崩帝御便殿出裕陵圖示大學士曰陵有二隧一窒一通此皆先朝內臣所為未合禮昨見成化時彭時商輅等章奏先朝大臣忠厚為國如此先帝亦甚不得已耳因與劉健等議欲通隧欽天監奏恐動地脉乃止後問祔廟禮健言漢以前一帝一后祔二后自唐始祔三后自宋始曩者定議慈懿太皇太后居左今大行太皇太后居右引唐宋故事為證臣等以此不敢復論帝曰事須師古末世不足效太皇太后鞠育朕躬朕豈敢忘顧私情耳祖宗來惟一帝一后今若並祔是壞禮自朕始也乃援孝穆别祭奉慈殿為言謂紀太后下廷臣議英國公張懋等言春秋考仲子之宫胡安國傳云孟子入惠公之廟仲子無祭所以此觀之祖廟無二配而周禮有祀先妣之文疏云姜嫄也唐宋推尊太后不配食者立别廟享之亦得閟宫之義宜倣故事于奉先殿外建廟奉祀為宜帝然之將建廟欽天監奏年月不宜廷議請暫祀太皇太后于奉慈殿正中徙孝穆居左終明世皆用其制夏四月葬孝肅皇后于裕陵五月罷中官監織造命鎮巡官領之從劉大夏請也六月雨雪命兩京五品以下官六年一考察四品以上自陳著為令故事方靣官三年朝覲一考察兩京堂上官不與至五品以下十年始一行而居官率九載年勞轉遷或除服改補多不及期給事中許天錫字啓衷閩縣人請京官六年一考察大僚令自陳簡去之命從所請和碩入大同指揮鄭瑀戰死廬山鳴聲如雷次日大風雨平地水丈餘星子宋縣今為南康府治德安五季揚吳縣今屬九江府二縣人溺死者無算秋八月置東西衛軍帝欲宿兵近地為左右輔劉大夏言保定設都司統五衛祖宗意當亦如此請遣還操軍萬人為西衛納京東兵密雲薊州為東衛報司中官監京營者恚失兵揭飛語宫門帝以示大夏曰宫門豈外人能至必此曹不利失兵耳由是間不行九月復置起居注洪武間設起居注後廢至是太僕少卿儲巏言古者立史官記言記動典至重也臣見陛下宣召羣臣多係帷幄造滕之言近臣不得以聞史官莫由紀録失今不圖恐嵗月綿逺傳聞各異事跡無以䆒其始末乞敕廷臣曽䝉召問者備録呈覽宣付史館庶幾聖君言動舉無所遺羣臣論說亦以附見報可冬十一月貶大理寺丞吳一貫字道夫海陽人為嵩明州元置今屬雲南府同知先是泰寧衛部落射傷海西貢使指揮張天祥出關掩殺他衛三十八人指為射貢使者巡撫張鼐字用和歷城人以捷聞㑹指揮張茂與天祥有郤發其事命一貫往勘得實論天祥死斃獄中天祥叔父洪屢說寃帝密令東厰亷其事還奏所勘皆誣因逮一貫帝御午門親鞫之盡反前獄抵一貫死閔圭進曰一貫推案不實罪當徒帝不允圭執如初帝怒令更擬圭終以原擬上謪一貫嵩明州同知茂擬死洪反得論功帝晚年委任大臣中官勢稍絀而天祥事發自東厰廷議猶為所撓焉罷雲南銀場乙丑十八年春二月御經筵學士張元禎字廷祥南昌人請講太極圖西銘等書帝亟取觀之喜曰天生斯人以開朕也元禎清癯長不踰中人其充日講帝特設低几聽之三月下户部主事李夢陽字獻吉慶陽人于獄即釋之帝頗優禮外家皇后弟夀寧侯鶴齡建昌伯延齡並驕縱多犯法夢陽上書陳二病三害六漸纍數千言末云夀寧侯鶴齡招納無賴罔利賊民勢如翼虎鶴齡奏辨摘疏中陛下厚張氏語誣夢陽訕母后為張氏罪當斬后母金夫人復泣訴帝帝不得已下夢陽獄尋即內批宥出僅奪俸三月金夫人訴不已帝弗聽左右知帝護夢陽請母重罪而豫杖以泄金夫人憤帝亦不許謂劉大夏曰若輩欲以杖斃夢陽耳朕寧殺直臣快左右心乎他日帝遊南宫鶴齡兄弟入侍酒半皇后及金夫人起更衣因出遊覽帝獨召鶴齡語左右莫聞也遙見鶴齡免冠首觸地自是稍斂迹夏五月帝崩帝大漸召劉健李東陽謝遷至乾清宫執健手曰卿輩輔導良苦朕備知之東宫年幼好逸樂卿輩當教之讀書輔導成德健等欷歔受命翌日召東宫論以法祖用賢遂崩太子厚照即位是為武宗赦以明年為正德元年秋八月尊皇太后為太皇太后皇后為皇太后京師淫雨自六月至于是月時東宫舊豎劉瑾等瑾興平人本談氏子幼自宫投中官劉姓者以進因冒姓劉帝即位掌鐘鼓司與其黨馬永成谷大用魏彬張永邱聚髙鳯羅祥等相交結時謂之八黨亦謂之八虎日導帝遊戲由是怠于政事遺詔中所當興罷悉廢格不行閣臣劉健等因久雨上疏言之帝雖溫㫖褒答而狎昵羣小詔書廢格如故冬十月葬泰陵在昌平州羣架山東南諡曰敬皇帝廟號孝宗明史贊曰明有天下傳世十六孝宗獨能恭儉有制勤政愛民兢兢于保泰持盈之道用使朝序清明民物康阜易曰無平不陂無往不復艱貞無咎知此道者其惟孝宗乎武宗皇帝丙寅正德元年春二月大學士劉健等乞罷不許吏户兵三部及都察院各有疏言事為宦官所撓傳示帝意令閣臣調旨健等不奉命别擬以奏帝不聽健等力諫謂奸商壞亂鹽政武臣負罪玩法北征將士無功授官御用監書篆濫用匪人皆宜痛抑今陛下不信大臣而信羣小欲以一二人私恩壞百年舊制臣等豈敢苟從所擬四疏謹以原擬封進不報居數日又言比為鹽法賞功諸事極陳利害拱俟數日未奉玉音若以臣等言是宜賜施行所言非邪亦當明加斥責乃留中不報視之若無政出多門咎歸臣等宋儒朱熹有言一日立乎其位則一日業乎其官一日不得乎其官則一日不敢居乎其位伏乞聖明矜察特賜退休帝優㫖慰留之疏仍不下又數日歷數政令十失指斥貴戚近幸尤切因再申前請帝不得已始下前疏令所司詳議健等知志終不行各上章乞骸骨帝不許既而所司議上一如健等指帝勉從之由是諸失利者咸切齒三月兵部尚書劉大夏罷大夏承詔請撤鎮守中官非額設者凡數十人劉健等以孝宗遺命入帝登極詔中行之又列上傳奉官當汰者六百八十餘人帝不盡從復劾廢閹韋興不當起用帝不聽大夏自知言不見用遂連疏乞歸許之夏四月吏部尚書馬文升罷以焦芳泌陽人代之時朝政已移于中官文升日懷去志㑹兩廣缺總督推兵部侍郎熊繡字汝明道州人可任繡不欲出外頗怏怏其同鄉御史何天衢劾文升徇私文升連疏乞休去芳粗鄙無學識好嫚罵人既積忤廷臣乃深結閹宦以干進帝初即位廷議以國用不足勸上節儉芳知左右有竊聽者大言曰庶民家尚須用度何况縣官諺云無錢揀故紙今天下多逋租匿稅不是檢索而但云損上何也帝聞大喜㑹文升去遂代為尚書六月大風雨壞郊壇獸瓦帝諭羣臣修省劉健李東陽謝遷上言比來免朝太多奏事漸晚遊戲漸廣經筵日講直命停止不知陛下宫中復有何事急于此者夫濫賞妄費非所以崇儉德彈射釣獵非所以飬仁心鷹犬狐兔不可育于朝廷弓矢甲胄不可施于宫禁今聖學久曠正人不親直言不聞下情不逹而此數者雜交于前臣不勝憂懼疏入報聞秋八月立皇后夏氏上元人冬十月以劉瑾掌司禮監華蓋殿大學士劉健武英殿大學士謝遷同罷瑾以內官監兼督團營帝漸信用瑾與馬永成等日進鷹犬歌舞角抵之戲導帝微行又勸帝令鎮守內臣各進萬金奏至皇莊增至二百餘所畿內大擾健等謀去之㑹言官交章論劾給事中陶諧御史趙佑等流諧字世和㑹稽人佑字汝翼雙人章下閣議健等持之甚力欽天監五官監候楊源字本清豐城人瑄之子亦因星變陳言乞親元老斥寵幸帝意頗動而不能斷也先是户部尚書韓文字貫道洪洞人宋宰相琦之後以八黨用事每朝退與僚屬言輒泣下郎中李夢陽進曰公泣何為比諫官疏劾諸閹執政持甚力公誠及此時率大臣固爭去入人易易耳文毅然改容曰善縱事弗濟吾年足死矣不死不足報國即令夢陽草疏既具文讀而刪之遂率諸大臣伏闕以上略曰伏覩近日朝政益非號令失當中外皆言太監馬永成谷大用張永羅祥魏彬邱聚劉瑾髙鳯等造作巧僞淫蕩上心擊毬走馬放鷹逐犬俳優雜劇錯陳于前至導萬乘與外人交易狎昵媟䙝無復禮體日遊不足夜以繼之勞耗精伸虧損志德此輩細人惟知蠱惑君上以便己私而不思皇天春命祖宗大業皆在陛下一身萬一遊宴損神起居失節雖􅐽粉若輩何補于事竊觀前古閹宦誤國為禍尤烈漢十常侍唐甘露之變其明驗也今永成等罪惡既著若縱不冶將來益無忌憚必患在社稷伏望陛下奮乾剛割私愛上告兩宫下諭百僚明正典刑潛消禍亂之階永保靈長之祚疏入帝驚泣不食乃遣司禮中官李榮王嶽等至閣議一日三反欲安置之南京遷欲遂誅之以為處之未盡健推案哭曰先帝臨崩執老臣手付以大事今陵土未乾使若輩敗壞至此臣死何面目見先帝健遷聲色俱厲惟李東陽語少緩王嶽者素剛直嫉邪慨然曰閣議是具以健等言白帝明日忽有㫖召諸大臣入至左順門健迎謂曰事垂濟公等第堅持尚書許進曰過激恐生變健不應有頃李榮手諸大臣疏曰有㫖問諸先生諸先生言良是第奴儕事上久不忍即置理幸少寬之上自處耳衆相顧莫言韓文乃抗聲數八人罪侍郎王鏊字濟川吳人助之曰八人不去亂本不除榮曰上非不知第欲少寬之耳鏊直前曰設上不處奈何榮曰榮頸有鐵裹邪敢壞國事遂退健約文及諸九卿詰朝伏闕面爭王嶽從中應之因誅瑾等焦芳聞之馳告瑾瑾乃率永成等夜伏帝前環泣以首觸地曰微上恩奴儕磔餧狗矣帝色動瑾進曰害奴儕者王嶽也帝曰何故瑾曰嶽結閣臣欲制上出入故先去所忌耳且鷹犬何損萬幾若司禮監得人左班官安敢如此帝大怒立收嶽命瑾掌司禮監永成大用掌東西厰各分據要地及旦諸臣入朝將伏闕知事己中變于是健東陽遷俱上章求去瑾矯㫖聽健遷歸而獨留東陽嶽充南京淨軍追殺之于途于是中外大權悉歸于瑾矣健遷瀕行東陽祖餞泣下健正色曰何哭為使當日多出一語與我輩同去矣東陽默然以焦芳為文淵閣大學士吏部左侍郎王鏊兼翰林學士入內閣預機務劉瑾欲引焦芳廷議獨推鏊瑾迫公論令鏊與芳同入閣芳在閣裁閲章奏一阿瑾意鏊雖持正不能與抗事有不可與李東陽彌縫其間多所補救東陽雖為首輔嘗委蛇避禍芳嫉其位在已上日夕搆之于瑾㑹通鑑纂要成瑾以謄寫不謹欲因是為東陽罪東陽大窘屬芳為解乃止除謄録官數人名東陽得無事是書修于孝宗時芳未嘗為總裁官至是命文華殿改謄芳遂列名其間及進呈書辦官張駿等皆擢顯秩裝潢匠役亦悉授官給事中劉􅉅字惟馨涪人吕翀廣信永豐人請留劉健謝遷不報尋與南京給事中戴銑字寶之婺源人御史薄彥徽陽曲人等並杖斥除名健遷既去位􅉅翀抗章請留帝不聽其疏傳至南京為協同守偹武靖伯趙承慶輔之子所得應天尹陸珩録以示諸僚兵部尚書林瀚聞而太息于是銑彥徽率諸科道官合疏言元老不可去宦豎不可任劉瑾等激帝怒盡逮之并􅉅翀俱豫杖削籍詞連承慶瀚珩亦皆得譴時南京御史蔣欽與銑等同被罪出獄耳甫三日欽獨具疏劾瑾言劉瑾小竪子陛下親以腹心寄以耳日待以股肱殊不知瑾為悖逆之徒蠧國之賊竊柄弄權萬民失望愁嘆之聲動徹天地幸聽臣言急誅瑾以謝天下然後殺臣以謝瑾疏入再杖三十繫獄越三日復具疏請殺瑾且言陛下不殺此賊當先殺臣使臣得與龍逢比干同遊地下臣誠不願與此賊並生言尤激切既入復杖三十方欽屬草時燈下微聞鬼聲欽念疏上必掇竒禍此必先人之靈欲寢此奏因整衣冠立曰果先人盍厲聲以告言未已聲出壁間益悽愴欽歎曰業已委身義不得緘默負國為先人羞遂奮筆曰死即死此藁不可易也聲遂止杖後三日卒于獄又兵部主事王守仁以論救銧等廷杖四十謪貴州龍場驛丞至錢塘瑾使人追之急守仁賦詩置衣冠江岸側若自沉者乃潛附商舟抵福建故所識道士責之日若有父在倘瑾逮若父誣若走異域何以自明守仁父華前為南京吏部尚書以忤瑾歸故道士以為言守仁悟遂之驛字蔣欽字子修常熟人王華字德輝餘姚人守仁伯安龍場驛在貴州修文縣治今廢十一月削户部尚書韓文職劉瑾恨文甚日令人伺文過不得及是有以僞銀輸內庫者遂以為文罪詔降一級致仕給事中徐昂疏救中㫖責其黨護遂落文職并除昂名文出都門乘一騾宿野店而去瑾又憾李夢陽代文革疏矯㫖謫山西布政司經歷勒致仕既而瑾復托他事下夢陽獄將殺之夢陽與修撰康海素以詩文相倡和獄中書片紙出曰對山救我對山者海别號也海與瑾同鄉瑾前招致之海不肯往因夢陽故遂謁瑾瑾大喜為倒屣迎海因詭詞說之夢陽遂得釋後瑾敗海坐黨落職而夢陽起為江西提學副使復以與巡按御史江萬實相訐奏罷官久之乃卒夢陽才思雄鷙言文必秦漢詩必盛唐與海及何景明徐禎卿邊貢王九思王廷相號七才子皆以詩名當世逮嘉靖朝李攀龍王世貞出復奉以為宗天下推李何王李為四大家無不爭效其體云康海字德涵武功人何景明字仲默信陽人徐禎卿字昌穀吳縣人邊貢字廷實歷城人王九思字敬夫鄠人王廷相字子衡儀封人李攀龍字于鱗歷城人王世貞字元美太倉人丁卯二年春正月乙亥朔日食三月劉瑾矯詔榜奸黨于朝堂劉健謝遷雖去瑾憾不已矯詔列健遷及尚書韓文楊守隨林瀚都御史張敷華字公實安福人戴珊并詞臣檢討劉瑞內瑞字德符江人臺諫陶諧趙佑等部曹李夢陽等凡五十三人為奸黨榜示朝堂召羣臣跪金水橋南宣戒之敕各鎮守太監預刑名政事夏五月度僧道四萬人復寧王宸濠獻王權五世孫護衛初宸濠祖奠培犯法革護衛至是宸濠請復劉瑾受賂遂許之六月逮前總制三邊都御史楊一清字應寧雲南安寧州人居丹徒下獄尋釋之先是一清巡撫陜西請特遣大臣總制三邊自王越後總制罷不設劉大夏以一清才請即任之一清乃建議防邊以花馬池至靈州地勢平衍寇每從此毁墻入固原平凉不能耕牧請修濬墻塹增設衛所以安內附以遏外侵帝可其議為特發帑金數十萬工方興而劉瑾憾一清不附已一清遂引疾歸尋以一清破冒邊費逮下錦衣獄李東陽王鏊力救乃得釋已而瑾託言邊倉芻粟多朽腐復矯㫖逮各省巡撫及管糧郎中下獄秋八月作豹房帝為羣閹蠱惑于西華門作豹房朝夕處其中冬十月劉瑾矯㫖杖戌欽天監五官監候楊源道死源以霾霧時作言此衆邪之氣隂冒于陽臣欺其君小人擅權下將叛上引譬甚切劉瑾怒矯㫖杖三十釋之源又言占得火星入太微垣帝座前或東或西往來不一乞收攬政柄思患豫防蓋専指瑾也瑾大怒召而叱之曰若何官亦學為忠臣源厲聲曰官大小異忠一也矯㫖又杖六十謫戌肅州在道以創卒初源父瑄在天順初以忠諫名天下事具前及是源以小臣抗節尤為士論所重云以楊廷和字介夫新都人為户部尚書兼文淵閣大學士預機務廷和先為詹事直講筵附經義指斥近幸劉瑾惡之傳㫖改南京吏部侍郎尋遷南京户部尚書及是帝問楊學士何在瑾以南京户部對乃召入閣戊辰三年春正月大計外吏內批黜翰林學士吳儼字克溫宜興人御史楊南金儼家素饒劉瑾遣人求金啖以美官儼峻拒瑾怒南金為都御史劉宇字志大鈞州人所搆瑾亦怒之時方考察朝覲官瑾忽批奏尾落儼南金職初瑾每奏事必伺帝為戲弄時帝厭之亟揮去曰吾用若何事乃溷我自此大小事瑾皆専決不復白帝及是奏出中外莫不駭異瑾不學批答章奏皆持歸私第與妹壻禮部司務孫聰松江市儈張文冕相參決聰文冕不能文辭率鄙冗焦芳為潤色之已而瑾威權日甚內外章奏先具紅揭投瑾號紅本然後上通政司號白本奉行若朝制然夏六月劉瑾執朝官三百餘人下獄午朝退有遺匿名書于御道數瑾罪者瑾矯詔召百官悉跪奉天門外詰責之日暮執五品官以下三百餘人悉下獄時酷暑曝死者三人暍而病者無算明日李東陽等力救瑾以亷知其同類所為衆獲免瑾凶暴日甚嘗以尚寶司卿崔濬副使姚祥郎中張瑋違制乘肩輿荷重校幾死李東陽王鏊刀救始釋而戍之其他庶官以荷校死者甚衆秋八月立內厰時東西厰緝事人四出道路惶懼劉瑾復立內厰自領之中人以微法無得全者萬姓􅍅􅍅劉瑾創罰米法凡朝官忤瑾者悉誣以舊事罰米輸邊刻期完納違者罪之韓文已落職瑾憾不已首逮之下錦衣獄數月罰米千石輪大同尋又羅織他事罰至再家業蕩然九月逮前兵部尚書劉大夏下獄戍肅州初孝宗時大夏在兵部劉宇為大同巡撫宇私市善馬賂遺權要大夏于宴見時為考宗言之宇聞深憾大夏及是與焦芳譖于劉瑾曰籍大夏家可當邊費十二遂假田州岑猛事逮繫詔獄岑猛者田州土官也𢎞治中與思恩土官岑濬相仇殺濬尋伏誅猛貶秩大夏方長兵部逼議以思恩田州俱設流官而徙猛福建千户奏下猛遛不肯行及是納賄于瑾求復故地瑾許之遂與是獄瑾欲坐大夏激變論死閣臣王鏊曰岑氏未叛何名激變都御史屠滽亦言劉尚書無死法瑾漫罵曰即不死可無戌耶瑾亦詗大夏家實貧乃坐戍極邊初擬廣西芳曰是送之歸也遂改肅州大夏年已七十三徒步荷戈至大明門下叩首而去觀者歎息泣下大夏至戍所遇團操輒就位所司固辭大夏曰軍固當役也瑾猶托他事罰米輸塞下者再後遇赦歸及瑾誅復原官致仕己巳四年春二月黜前大學士劉健謝遷為民初健遷在內閣時浙江應詔舉懷才抱德之士餘姚周禮字德恭著有續綱目發明徐子元許龍上虞徐文彪凡四人未録也及是劉瑾焦芳日偵察健遷過無所得乃托其事以禮等皆遷同鄉而草詔由健欲因此為罪矯㫖謂天下至大豈無應詔者何餘姚處士之多邪遂下禮等詔獄屬主者詞連健遷瑾持至閣欲逮二人籍其家賴李東陽力解瑾意少釋芳從旁厲聲曰縱輕貸亦當除名既而旨下果如芳言并榜禁自今餘姚人不得授京官夏四月王鏊罷劉瑾橫彌甚鏊初開誠與言間聽納既而漸不能救遂力求去疏三上許之鏊博學有識鑒少善制舉藝為當世所宗後數典鄉試程文冠一時取士尚經術隂詭者一切屏去文體為一變明代舉子業最擅名者前則鏊與唐順之後則歸有光胡友信天下並稱為大家鏊歸後家居十五年屢薦不起及卒贈大傅諡文恪唐順之家應德武進人歸有光字熙甫崑山人胡友信字成之德清人五月改翰林官吳一鵬字南夫長洲人官侍讀顧清字士亷華亭人官編修等于南京六部劉瑾素惡翰林官不下已焦芳亦銜之及是孝宗實録成翰林預纂修者當進秩芳說瑾曰翰林官當擴充政事于是一鵬清等十六人俱調南京六部為員外郎主事等官六月以劉宇兼文淵閣大學士宇乞歸遂以張綵安定人為吏部尚書始宇介于焦芳以結瑾得入為都御史瑾好摧折臺諫宇輒以小過笞御史瑾以為賢瑾初通賄望不過數百金宇首以萬金贄瑾瑾大喜曰劉先生何厚我遂由兵部尚書晉吏部宇在兵部賄賂狼籍及為吏部權歸選郎張綵而文吏贈遺又不若武辨嘗悒悒嘆曰兵部自佳何必吏部也至是瑾欲用張綵代宇乃令宇入閣宇宴瑾閣中極歡明日將入閣任事瑾曰爾真欲相耶此地豈容再入宇不得已乃乞省墓去遂以綵長吏部綵先為選郎移疾家居瑾以同鄉起用原官大悅之一嵗之中由郎署長六卿變亂選格賄賂肆行金帛竒貨相望塗巷綵性尤漁色撫州知府劉介妻妾美綵特擢介太常少卿盛服往賀曰子何以報我介惶恐謝曰一身外皆公物綵曰命之矣即使人直入內牽其妾輿載歸其肆橫如此秋小王子寇延綏尋犯花馬池總制尚書才寬字汝栗遷安人率師禦之頗有斬獲敵伏兵突出寬中流矢死湖廣江西四川盜起時連嵗饑饉四方盜賊並起湖廣則沔陽元府明為州今屬安陸府賊楊清邱仁等僭稱天王將軍出沒湖湘間江西則東鄉明縣今屬撫州府賊王鈺五徐仰山等桃源山洞名在饒州府萬年縣東賊汪澄二王浩八等華林山名在瑞州府髙安縣西北上有雲棚城賊羅先權陳福一等各據山寨而贛州大帽山在長寧縣東南路通閩廣賊何積欽等復蔓延福建廣東之境四川則保寧注見前賊藍廷瑞自稱順天王鄢本忠自稱刮地王廖惠自稱掃地王等擁衆至數萬官軍討之不能克羣盜遂日熾庚午五年春二月以曹元字以貞大寧前衛人為吏部尚書兼文淵閣大學士預機務元柔佞滑稽不修士行與劉瑾有連遂攀援入閣其在閣中日飲酒諧謔道里巷鄙語而已三月以洪鐘字宣子錢塘人總制湖廣川陜河南軍務楊清邱仁等圍嶽州陷臨湘宋縣今屬嶽州府鐘檄布政使陳鎬應天人及都指揮潘勳擊破之湖湘底寧鐘遂移師入蜀時藍廷瑞與廖惠謀據保寧鄢本恕謀據漢中取鄖陽自荆襄東下已而惠陷通江宋縣今屬保寧府尋復遁去四川巡撫林俊發玀􅉰兵蹙之龍灘河亦曰龍灘渡在保寧府昭化縣西嘉陵江津濟處也賊墜崖溺水者無算遂擒惠廷瑞本恕東奔越漢中至大巴山在南江縣北與陜西漢中諸山相連俊復追敗之㑹鐘至與俊議不合俊别擊瀘州賊曹甫廷瑞等乘間收集散亡勢復振鐘率兵分道進勦而俊亦平曹甫還與鐘㑹賊依山結營陽言就撫以計緩師官軍為七壘守之賊不得逸其黨漸潰鐘令永順注見前土司彭世麟以計擒廷瑞本恕本恕以所掠女子詐為己女結婚于世麟冀得間逸去世麟密白鐘鐘令許其請因遂圖之及期廷瑞本恕及其黨咸來㑹伏發悉就擒送鐘斬之餘衆悉平事在六年有廖麻子者獨逸去轉掠兩川官軍不敢擊躡賊後馘良民為功土兵虐尤甚時有謡曰賊如梳軍如篦土兵如剃夏四月安化王置鐇慶靖王㮵曽孫反遊擊將軍仇鉞字廷威鎮原人討擒之置鐇素狂誕術者言置鐇當大貴遂覬望非分與其黨指揮周昂等潛畜逆謀㑹大理寺少卿周東度田寧夏以五十畝為一頃苛斂騰怨而巡撫安惟學素殘虐將士銜次骨置鐇使人激之咸願從置鐇遂反殺東惟學及總兵官鎮守太監都指揮等傳檄逺近以誅劉瑾為名詔起右都御史楊一清總制軍務討之以太監張永為監軍先是仇鉞以邊警屯玉泉營在寧夏府西南聞變即入城謬以兵𨽻賊營自稱疾堅卧而隂結壯士伺問圖之及一清將至置鐇令昂就鉞問計鉞方卧呻吟伏卒猝起捶殺昂乃披甲橫刀提昂首躍馬大呼壯士皆集徑馳詣置鐇第縛之其衆皆潰置鐇叛十有八日而敗檻送京師賜死黨皆伏誅鉞論功封咸寧伯五月焦芳罷劉瑾濁亂朝政荼毒縉紳皆芳導之每過瑾言必稱千嵗自稱日門下四方賂瑾者先賂芳始張綵為郎時芳力薦以悅瑾比綵為尚書芳納賄薦人無虗日綵時異同遂有隙檢討假炅故芳黨見瑾昵綵芳勢稍衰轉附綵盡發芳隂事搆于瑾瑾大怒數于衆中斥責芳芳大愧沮遂乞歸六月前吏部尚書馬文升卒文升歸後劉瑾坐以朋黨除名及是卒文升有文武才朝端大議往往待之决功在邊鎮外國皆聞其名卒後未幾瑾誅復官贈太傅諡端肅帝自稱大慶法王帝于佛經梵語無不通曉自稱大慶法王西天覺道圓明自在大定慧佛命所司鑄金印以進秋八月劉瑾伏誅先是張永監軍西征楊一清深與相結知永與瑾有隙因密與畫䇿請誅瑾初八黨中瑾尤狡猾為七人所推及専政七人有所請瑾俱不應咸怨之瑾又嘗欲逐永永以譎免一清知之因乘間扼腕言曰今反側雖除如內患何因促席畫掌作瑾字永難之一清慷慨曰公亦上信臣討賊不付他人而付公意可知今功成奏捷請間論軍事因發瑾奸極陳海內愁怨恐變生心腹上英武必聽公誅瑾瑾誅公益柄用悉矯弊政收天下心吕强張承業暨公千載三人耳永曰脫不濟奈何一清曰言出于公必濟萬一不信公頓首據地泣詣死上前剖心以明不妄上必為公動苟得請即行事毋須臾緩永勃然起曰老奴何惜餘年不以報主意遂决及將至京永請以八月十五日獻俘瑾使緩其期時京師籍籍謂瑾將于是日為亂瑾信術者言謂其從孫二漢當大貴遂謀不軌㑹其兄都督同知景詳死將以八月十五日俟百官送葬遂作亂或馳告永永遂先期入獻俘畢帝置酒勞永瑾等皆侍及夜瑾退永出置鐇檄因奏瑾不法十七事帝已被酒俯首曰奴負我永曰此不可緩緩則奴輩皆虀粉陛下安所歸乎馬永成等亦助之遂縛瑾菜厰明日帝出永奏示內閣下瑾獄帝親籍其家得金銀數百萬珠玉寶玩無數并衮衣玉帶甲仗弓弩諸違禁物又所常持扇內藏利七首二帝大怒曰奴果反命百官㑹鞫午門獄具詔磔于市怨家爭購其肉生噉之二漢及張文冕等俱就戮張綵獄斃磔其尸焦芳止除名二漢臨刑曰我固當死第吾家所為皆焦芳與張綵耳今我與綵皆處極刑而芳獨宴然豈非寃哉芳後竟良死曹元以罪免劉瑾敗元即日上疏請哀詔許致仕言官交劾黜為民諸附瑾者竄逐以差朝署為清以劉忠字司直陳留人梁儲字叔厚廣東順德人並為吏部尚書兼文淵閣大學士預機務忠先與楊廷和同侍講筵為劉瑾所嫉出為南京禮部侍郎尋進尚書焦芳薦之召還瑾見忠頗負氣岸甚悔乃傳旨以尚書専典誥敕儲為學士時嘗修㑹典及為吏部尚書瑾坐以小疵降侍郎孝宗實録成當復尚書調南京吏部至是瑾敗二人遂同召入閣冬十月霸州降盜劉六名寵霸州文安人劉七名宸寵之弟叛劉六劉七並驍悍善騎射初與楊虎齊彥名等從有司捕盜時畿輔多盜皆馳馬鳴箭號口響馬頻有功㑹劉瑾家人梁洪徵賄不得誣為盜令捕之六等乃投大盜張茂茂素招納亡命為逋逃主家與太監張忠鄰茂與忠皆文安人結為兄弟夤緣馬永成谷大用輩得出入豹房侍帝踏鞠而乘間出劫如故已茂為捕盜御史寧杲遼東海州人所擒六等詣官首伏兵部奏赦之令捕他盜自效六等憚要束及是叛去聚衆剽掠旬日間至數千畿南大擾有趙鐩者亦曰風子本霸州文安諸生六等亂起挈家匿水渚中賊至驅之登陸將汚其妻女鐩故有膂力格殺二賊賊聚執之遂入其黨與六等俱為盜魁明年賊衆益多遂分為二劉六劉七齊彥名等乃轉掠山東自山東河南至湖廣江西仍由故道還抵霸州復走山東楊虎趙鐩等擾河南由河南入山西自西而東踰曲周威縣還抵文安仍往河間曲周注見前威縣元州明改縣今縣屬廣平府縱橫數千里殘破州縣以百數詔以惠安伯張偉昭皇后兄升之曽孫都御史馬中錫字天録故城人帥京營鋭卒往討中錫書生不習兵事偉紈袴子畏怯不敢戰遂議招撫中錫至桑園單車入賊壘開誠諭之劉六欲降劉七曰騎虎不得下今內臣主國事馬都堂能踐其言乎徑去北桑園鎮名在山東德州賊終不降于是廷臣交章劾偉中錫玩寇召還下獄論死而賊橫愈甚辛未六年春二月起左都御史陳金字汝礪應城人徙居武昌總制江西軍務江西盜起連年官軍屢失利金時丁母憂在籍詔起原官提督軍務討之金以屬郡兵不足用奏調廣西狼土兵久之兵至乃先擊東鄉賊平之以下事俱在明年遂移師以次悉定桃源華林及大帽山諸賊半嵗間俘斬二萬七千餘人立東鄉注見前萬年即桃源洞置二縣招降人居之然土兵貪殘嗜殺剽掠甚于賊金方倚其力不為禁士民深怨焉夏四月劉忠罷劉瑾既誅張永魏彬輩猶用事永嘗遣廖鵬謁忠忠僕𨽻遇之又却其餽永大恨是年忠典㑹試帝摘試録中舛誤示李東陽忠知為中官所齮乞省墓歸忠抵家再上章乞致仕報許嘉靖初卒贈太保諡文肅秋八月以兵部侍郎陸完字全卿長洲人督邊兵討賊張偉馬中錫既論罪兵部尚書何鑑字世光浙江新昌人以京軍不能制賊請發宣府延綏二鎮兵助討詔完統之邊將許泰寧之子郤永馮禎綏德衛人等俱聽調遣師行至涿州忽傳賊犯固安且逼京師帝御左順門召閣臣及鑑諭曰賊在東師乃西出恐緩不及事因命鑑召完入衛完遂趨信安鎮各注見前􅊾泰永擊賊霸州敗之京師乃解嚴已而邊兵連破賊完請益發大同遼東兵濟之內官谷大用張忠意賊旦暮且平乃自請督師冀邀封賞詔以大用提督軍務伏羌伯毛鋭忠之子為總兵官忠監神鎗帥京軍五千㑹完是時賊益南方圍濟寧焚糧艘大用等駐師臨清觀望不敢進㑹明年正月帝將有事南郊賊遂謀以十二月朔伺帝省牲乘間犯駕乃疾馳而北先一日至霸州鑑立奏聞即夜嚴設守備逮明帝召問駕可出否鑑請早出安人心帝成禮而還賊知有備西掠保定以去明年正月劉六復突霸州帝召大用鋭回禦近畿大用鋭遇賊于長垣大敗廷議召二人還冬十一月地震霸州尤甚三日中十有九震十二月以禮部尚書費宏字子充􅖳山人兼文淵閣大學士預機務先是宏以帝耽宴樂早朝日講俱罷上疏切諫報聞及是劉忠致仕遂以宏代黃河清自清河口注見前至桞鋪九十餘里凡三日壬申七年夏閏五月都御史彭澤字濟物蘭州人咸寧伯仇鉞討平河南賊先是賊渠楊虎溺死宿州虎為邊兵所追至小黃河渡口百户夏時設伏蹙之虎遂溺死南小黃河在宿州北與河夏邑縣接界餘衆悉奔河南推劉惠為首稱奉天征討犬元帥趙鐩副之分其衆十三萬為二十八營應二十八宿以牽制官軍鎰于羣盜中稍有計智羣盜専事淫掠鐩獨勸其黨無妄殺移􅊾府縣約官吏師儒母走避迎者安堵由是橫行中原勢出劉六等上嘗攻鈞州以馬文升家在舍之去及入泌陽燬焦芳家掘其先冢芳逺匿束草為芳像寸裂之曰吾為天下誅此賊朝議以畿輔山東賊委陸完而命澤與鉞専辦河南賊時參將馮禎戰死賊方張及聞澤等且至素憚威名奔迸四出永順宣慰彭明輔敗之潁州諸將神周夀州人英之子時源等又敗之光山胡廣軍亦敗其别部于羅田蕭梁縣今屬黃州府賊沿途潰散分其衆為二惠北走商城鐩南出潁水澤與鉞定計使周追鐩源追惠連戰皆捷鐩轉至應山隋縣今屬德安府衆略盡剃髮懷度牒潛至江夏為軍校所執送京師伏誅惠追及于南召明縣成化中置今屬南陽府官軍射中其目自縊死餘黨先後勦捕悉平秋八月陸完追賊于狼山注見前平之劉六劉七齊彥名等出沒畿輔山東之境沿及淮北官軍雖屢敗之而賊招聚散亡旋即復振㑹河南賊已平其勢始衰遂走湖廣奪舟至夏口遇督漕都御史馬炳然殺之復登陸焚漢口指揮滿弼追及劉六中流矢赴水死劉七徐彥名率舟東下由黃州至鎮江完疾趨而南帝命彭澤仇鉞㑹完並勦大兵盡集江南北賊猶乘潮上下肆掠已而賊治舟孟瀆在常州府武進縣西北南通運河北逹大江唐刺史孟簡所開因名尋抵通州颶風大作棄舟走保狼山完以兵夜蹙之山南彥名中槍死七中矢亦赴水死餘賊盡平九月賜義子一百二十七人國姓帝所悅中官奴卒輒收為義子亡虜亦與焉並賜姓朱氏召洪鐘還以彭澤代之四川餘賊廖麻子喻思俸連陷州縣勢日猖獗言官劾鐘乃召還以澤往代澤與總兵官時源數敗賊廖子喻思俸皆就擒澤遂移漢中請班師未報而內江隋縣今屬資州榮昌明縣洪武初置今屬重慶府賊復熾澤旋軍討平之詔澤暫留保寧鎮撫冬十一月調宣府大同遼東延綏四鎮兵入京營初大同遊擊江彬宣府人領邊兵討賊及賊平還過京師因結義子錢寧太監錢能家奴以進未幾大得幸寵在寧上寧心忌之彬欲藉邊兵自固因盛稱邊軍驍悍勝京軍請互調操練言官交諫大學士李東陽疏陳十不便皆不聽于是調四鎮兵入京師號外四家軍彬兼統之帝别令羣閹善射者為一軍與彬等晨夕馳逐甲光照宫苑呼譟聲逹九門又作東西官㕔于禁中視團營命內官義子分領之帝時臨閲名曰過錦十二月李東陽罷東陽以老疾乞休前後章數上至是始許之東陽立朝五十年清節不渝以文章領䄂縉紳朝廷大著作多出其手奬成後進推挽才彥學士大夫出其門者率粲然有所成就初與劉健謝遷請誅劉瑾及健遷去而東陽獨留氣節之士多非之侍郎羅玘上書勸其早退至請削門生籍東陽得書俯首長嘆而已然方逆瑾肆虐時潛移默奪保全善類天下亦隂受其庇云致仕四年卒贈大師諡文正癸酉八月春正月召陳金還以俞諫字良佐桐廬人代之初陳金破東鄉賊土兵邀賞千金金靳不豫乃縱賊使逸黠傑者多不死金急欲成功遂下命招撫及破桃源賊金與諸將置酒髙㑹賊賂目兵乘間遁去轉掠徽衢間餘衆復集攻剽如故至是言官劾金乃召還以諫為都御史往代賊渠王浩八屯貴溪唐縣今屬廣信府之裴源山勢甚盛諫潛軍夜破之擒浩八又進勦桃源東鄉餘賊悉平之秋八月土魯番據哈密初哈密善巴卒其子巴雅濟舊作拜牙即今改後仿此襲封忠順王淫虐不親政事嘗恐其屬部害己土魯番酋莽蘇爾阿哈瑪特子嗣為蘇勒坦按莽蘇爾舊作滿速兒今改後仿此數以甘言誘之莽蘇爾狡黠過于其父時有吞復哈密之意至是巴雅濟遂棄其國奔土魯莽肅爾奪其印即遣和卓塔濟迪音舊作火者他只丁今改後仿此據守哈密甲戌九年春正月乾清宫災帝每嵗張燈費浮數萬及是宸濠别為竒巧以獻令所遣人入宫懸掛皆附著柱壁復依簷以貯火藥遂延燒宫殿皆盡火盛時帝猶往豹房回顧光焰燭天謂左右曰好一棚大烟火也楊廷和等請帝避殿下詔罪已又疏請早朝宴罷躬九廟祭示崇兩宫孝飬勤日講復面奏開言路逹下情還邊兵革宫市罷皇店江彬毁京城民居為皇店酒肆出西僧省工作減織造語皆切至帝不省二月以禮部尚書靳貴字充道丹徒人兼文淵閣大學士預機務貴以宫僚舊恩貴先侍帝東宫故有是命貴在閣三年無所建白致仕歸後帝至江南㑹貴卒親臨其喪命詞臣撰文皆不稱㫖帝乃自為文祭之夏五月費宏罷錢寧隂黨宸濠欲交歡宏餽宏綵幣珍玩拒却之寧慚且恚初宸濠行賄劉瑾得復護衛事具前及瑾誅仍論奪至是宸濠因伶人臧賢輦白金數萬遍賂朝貴奏請復還所奪寧及兵部尚書陸完主之完前為江西按察使與宸濠善中官持奏詣閣宏力持不可諸嬖人乘宏讀廷試卷取中㫖豫之于是宸濠與寧合數偵宏事無所得以御史嘗劾宏弟寀不當留翰林即指為宏罪中㫖責宏令自陳狀宏即日乞休命并寀致仕宏甫發京師寧遣騎尾之至臨清焚其舟資裝盡燬遣右都御史彭澤提督甘肅軍務經理哈密土魯番既據哈密復遣使赴甘肅投謾書索犒賜邊臣以聞請遣大臣經理大學士楊廷和等交薦澤再辭不許澤至甘州土魯番方攻掠赤斤苦峪諸衛聲言與我金帛萬數即歸城印澤謂番人嗜利可因而欵也遣都督沙呼實哈密回回都督先以國亂徙居肅州按沙呼實舊作亦虎仙今改後仿此以幣二千銀酒鎗一往賂番酋莽蘇爾令還城印莽肅爾僞許之澤輒奏番酋悔過效順事已平帝即召澤還巡撫御史馮時雍言城未歸澤不宜遽召不納初沙瑚實隂與莽蘇爾通為之耳目據城奪印皆其謀澤不知而遣之及澤還巴雅濟在土魯番迄不返和卓塔濟迪音據哈密亦不退久之莽蘇爾復要重賞始以城獻還事在十一一年巴雅濟仍留如故既而沙呼實復誘莽蘇爾謂肅州可得莽蘇爾遂復取哈密以萬騎寇嘉峪闕遊擊芮寧戰歿詔澤提督三邊軍務禦之㑹副使陳九疇禁繫沙呼實及沙布塔絶其內應莽蘇爾乃還瓜州為副總兵鄭亷所敗因復求和澤兵遂罷時十二年四月也初澤與兵部尚書王瓊有隙又時時謾罵錢寧由是瓊與寧相庇欲傾澤㑹澤乞歸瓊追論嘉峪之敗請窮詰增幣者主名寧從中下其事而沙布塔之子以其父為九疇禁繫捶死詣闕訟寃瓊欲因此興大獄奏遣科道二人往甘肅勘狀明年勘至于澤無所坐瓊怒劾澤誣妄辱國斥為民坐九疇激變逮下吏削籍澤材武知兵然性疏闊負氣其經略哈密事頗不當瓊與寧因交齮之遂得罪時沙布塔已逮赴刑部九疇既論罪遂得釋夤緣錢寧與沙布塔之子俱得侍帝左右帝悅之授錦衣指揮並賜國姓塔陳九疇字禹學曹州人王瓊字德華太原人沙布舊作失拜烟答今改後仿此秋八月辛卯朔日食京師地震九月謪編修王思字宜學直曽孫為三河驛在潮州府大埔縣西今有巡司為縣巨鎮丞時帝狎虎被傷踰月不視朝思疏言孝宗皇帝子惟陛下一人當為天下萬世自重其身豈可嗜酒以荒志好勇以輕身疏留中謫三河縣丞冬十一月廢歸善王當沍魯王陽鑄幼子為庶人當沍自殺當沍以勇健聞初流賊攻兖州當沍率家衆乘城取護衛弓弩射却賊降敕奬諭名遂著數與卒袁質舍人趙巖校射質巖家東平與吏部主事梁榖同里㑹有怨質巖者誑榖云質巖且為亂榖遂告變于楊一清兵部議以大兵駐濟南伺變而魯王陽鑄入長史馬魁譖亦奏當沍欲反帝遣司禮太監溫祥大理少卿王純等往按問圍當沍第搜其兵械則前所射賊弓弩半渝敝矣祥等讞榖所指皆平人于是御史李翰臣劾榖魁誣罔宜即訊詔下翰臣獄謪其官而釋榖不問廷臣議當沍罪無所得乃坐以違祖制藏護衛兵器廢為庶人質等戌邊魁坐斬中官送當沍之髙墻當沍大慟曰寃乎即日觸墻死聞者傷之十二月營乾清宫加天下賦百萬乙亥十年春正月帝有事于南郊逮暮成禮是日漏下二鼓帝始還宫楊廷和等疏諫不報楊一清等又言比嵗視朝太稀又復太晚入春以來漸至昏夜日月之光既逺上下之情不通侍衛被執鎧仗自朝至暮饑餒困疲四夷貢使見此能無駭異歸而傳語必啓戎心疏入不報三月楊廷和罷廷和丁父憂乞奔喪不許三請乃許之夏閏四月以吏部尚書楊一清兼武英殿大學士預機務先是一清再推內閣不用及是楊廷和去遂以一清代之冬十月遣太監劉允使烏斯藏左右言西域胡僧能知三世遂命允往迎以珠琲為幡幢黃金為供器餽賜巨萬所攜鹽茶又數十萬允至臨清漕艘為之阻截入峽江舟大難進易以􅖻􅑳淺船也相連二百里至成都又治入番器物居嵗餘始行兩月至其地番僧恐國中誘害之匿不出見允脅以威番人夜襲之奪其寶貨器械去士卒死者數百人十二月癸丑朔日食丙子十一年夏大旱五月録自宫男子三千四百人充海户前兵部尚書劉大夏卒諡忠宣大夏復官後清軍御史王相見其居貧請給廪𨽻中官用事者終嗛之不許及是卒贈太保大夏忠勤懇篤遇知孝宗忘身徇國于權幸多所裁抑故深見嫉于小人嘗言居官以正已為先不獨當戒利亦當逺名又言士大夫蓋棺論定一日未死即一日憂責未已自為壙志曰無使人飾美俾懷愧地下也秋八月楊一清罷錢寧素善一清㑹有搆之者因蓄怨一清以災異陳時政議切近幸寧與江彬等皆大怒使優人于帝前為蜚語譏刺一清而武學生朱大周亦訐一清隂事以寧為內主一清乃力請骸骨歸以禮部尚書蔣冕字敬之全州人兼文淵閣大學士預機務冕清謹有器識雅負時望及是入閣以王守仁為僉都御史巡撫南贛汀漳南贛地連閩廣山谷深阻盜賊易為巢穴陳金俞諫先後討之未盡不數年嘯聚復起橫水隘名在江西南安府崇義縣東其南為十八面領左溪即汀水亦曰鄞江在福建汀州府長汀縣東源出寧化下流至廣東大埔縣入海桶岡在崇義縣西北與湖廣彬州接界則有謝志山等浰頭山名在廣東惠州府和平縣西北接江西龍南縣界有上中下三浰最北近龍南者為上浰在岑岡者為中浰最南者為下浰則有池仲容亦曰大鬢等皆稱王攻剽府縣而大廋唐縣以大廋嶺名今為南安府治陳曰能大帽山詹師富諸賊復與之相應于是江西福建廣東湖廣之交千餘里皆亂巡撫文森長洲人託疾避去兵部尚書王瓊薦守仁才遂特用之初守仁既謫龍場驛丞地在萬山之中苗獠雜居守仁因俗化導夷人悅服相率伐木為居以居之瑾誅復量移廬陵知縣纍遷鴻臚卿遂擢巡撫丁丑十二年春正月帝祀南郊遂獵于南海子郊祀畢即幸海子縱獵夜半始還御奉天殿受朝賀夏五月以禮部尚書毛紀字維之掖縣人兼東閣大學士預機務紀前在禮部以帝遣使烏斯藏再疏切諫不納及入閣同列皆倚重之六月乙巳朔日食秋八月帝微行至宣府江彬欲攘權數導帝逺遊使諸幸臣不得近因言宣府樂工多美婦人且可觀邊釁何鬱鬱居丈內為廷臣所制帝然之至是急裝微服出德勝門幸昌平大學士梁儲蔣冕毛紀追及于沙河注見前請回蹕不聽至居庸關巡按御史張欽字敬之順天通州人閉關不奉詔乃還先是帝將出關欽再上疏諌詞極切至不報帝既至昌平傳報出關甚急欽令指揮孫璽納門鑰藏之分守中官劉嵩欲詣昌平朝謁欽止之曰關不開車駕不得出違命當死關開車駕得出萬一有如土木我與君亦死寧坐不開關死頃之帝召璽璽辭更手召嵩嵩謂欽曰吾主上家奴也敢不赴欽因負敕印劍坐關門下曰敢言開關者斬夜草疏言臣聞天子將親征必先期下詔其行也六軍翼衛百官扈從今寂然不一聞輒言車駕即日過關此必有假陛下名出邊勾賊者臣請捕其人明正典刑奏未逹使者復來欽拔劍叱之曰此許也使者懼而返㑹廷臣亦多諫者帝不得已而還京師盛傳張御史閉關三疏云越數日復夜出先令太監谷大用代欽止廷臣追諫者因度關幸宣府彬先為帝建鎮國府第輦豹房珍玩女御實其中彬從帝數夜入人家索婦女帝大樂之忘歸稱曰家裏未幾幸陽和韃靼五萬騎入寇大同總兵官王勛等力禦之轉戰五日至應州五季唐置今州屬大同府帝率太監張永等自陽和往援寇引去是役也斬首十六級官軍死者數百人乘輿幾陷勛等以捷聞于朝九月帝自稱總督軍務威武大將軍總兵官復命户部發銀一百萬兩輸宣府以備賞勞時凡調發軍馬錢糧槩以威武大將軍鈞帖行之冬十一月召楊廷和復入閣廷和既至與蔣冕馳至居庸欲身出塞請帝回鑾帝令谷大用扼關門乃歸戊寅十三年春正月帝還京師留十四日復如宣府帝至德勝門外百官具綵帳羊酒郊迎先是帝將至京命羣臣各製旗帳迎及是羣臣具綵帳數十綵聨千數皆金織字序詞稱威武大將軍不敢及尊號衆官列名亦不敢稱臣帝御帳殿閣臣奉觴稱賀楊廷和奉觴梁儲注酒蔣冕奉果榼毛紀奉金花帝飲畢云朕在榆河親斬敵首一級廷和等皆稱帝聖武帝遂馳馬入東華門宿豹房既還宫于奉天門陳應州所獲刀械衣器令羣臣縱觀時當南郊以初至不及致齊遂行禮既畢獵南海子居十四日復如宣府廷臣從者四人餘以次追及楊廷和等諫不聽二月太皇太后王氏崩諡孝貞皇后帝還京師夏五月己亥朔日食六月葬孝貞皇后先是帝以孝貞皇后將葬幸昌平躬視隧道遂幸密雲時民間訛言欲括女子以充進奉所至遁匿永平知府毛思義下令以為大喪未舉車駕必不出此必奸徒矯詐自今非有撫按府部文書妄稱駕至擾民者悉捕治之帝聞大怒執送詔獄降雲南安寧知府州毛思義陽信人安寧元置今屬雲南府駐蹕喜峰口還復幸河西務指揮黃勳以供應為名科擾侵盜巡撫御史劉士元按之勳逃至行在因嬖幸譖士元于帝帝命祼執士元至行在軍門梜之仍繫錦衣衛獄士河西務在順天府武清縣東北舟航輻輳之地劉元彭縣人至是梓宫發京師帝戎服從至陵飲帳殿及升祔帝至暮乃入廟雷雨大作燭盡滅言官上疏請修省不報秋七月帝復如宣府帝從江彬言將遍遊塞上託言邊關多警令總督軍務威武大將軍總兵官朱夀統六師往征令內閣草敕閣臣不可帝復集百官左順門面諭衆皆泣諫而帝意不可回竟不聽遂復北幸由東安門出羣臣知而送者五十二人尋駐蹕宣府令兵户工三部各遣侍郎一人率司屬以往彬又導帝由大同渡黃河次榆林至綏德州幸總兵官戴欽第納其女還由西安歷偏頭關抵太原大徵女樂晉府樂工楊騰妻劉氏善謳帝悅之載以俱歸大見寵幸江彬與諸近幸皆母事之稱曰劉娘娘云九月帝自加封鎮國公敕曰總督軍務威武大將軍總兵官朱夀統領六師掃除邊患纍建竒功特加封鎮國公嵗支祿五千石吏部如敕奉行楊廷和梁儲等極諫以為名之不正言之不順一至于此古今所未有也不聽又録應州功升賞內外官九千五百五十餘人封江彬許泰皆為伯王守仁平江西賊守仁既至贛州知左右多賊耳目呼老隸詰之隸不敢隱因貰其罪令詗賊動靜無弗知于是檄福建廣東㑹兵先討大帽山賊守仁親率鋭卒屯上抗佯退師出不意搗之連破四十餘寨擒賊首詹師富府上杭宋縣今屬汀州復進討大庾生縶賊首陳曰能以歸橫水左溪諸賊令都指揮許清等各一軍㑹橫水南安知府季斆等各一軍㑹左溪守仁自駐南康去橫水三十里先遣四百人伏賊巢左右進軍逼之賊方迎戰兩山舉幟賊大驚遂潰乘勝克橫水賊首謝志山等皆走桶岡左溪亦破皆平之贛州知府邢珣當塗人吉安知府伍文定字時泰松滋人等亦破滅桶岡賊守仁以桶岡險固移營近地諭以禍福賊首藍廷鳯等方乞降而珣文定已冒雨奪險入賊倉卒敗走廷鳯等遂面縛降凡破巢八十有四俘斬六千有竒守仁乃還贛州誘斬浰頭賊首池仲容弟仲安初橫水破仲容遣弟仲安來歸而嚴為戰守備守仁佯下令散令嵗首大張燈樂守仁賜仲容節物誘入謝仲容率其衆營教場而自以數人入謁守仁曰若皆吾民屯于外疑我乎悉引入祥符宫厚飲食之賊大喜益自安守仁留仲容觀燈樂正月至三日大享伏甲士于門諸賊入以次悉擒戮之遂自將抵賊巢連破上中下三浰斬馘二千有竒賊奔九連山在廣東惠州府連平州東周數百里環連九縣因名山陡絶不可攻守仁簡壯士衣賊衣奔崖下賊下招之遂上據其險官軍進攻擒斬無遺因于橫水設崇義縣今𨽻江西南安府于浰頭設和平縣今𨽻廣東惠州府置戍而歸自是境內大定守仁所將皆文吏及偏禆小校平數十年巨寇逺近驚為神御批歷代通鑑輯覽卷一百七

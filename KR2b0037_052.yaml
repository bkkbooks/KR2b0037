  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_052-1a, image: WYG0337/WYG0337-0097c.png}
body:
  text: 貢士殿試自此始補闕薛謙光上疏曰選舉之法宜得實才取捨之間風化所係今之選人咸稱覔舉奔競相尚喧訴無慚至于才應經邦惟令試䇿武能制敵止驗彎弧虛文豈足濟時善射何能克敵要在文吏察其行能武吏觀其武略考居官之臧否行舉者之賞罰而已補闕唐官與拾遺俱屬門下省掌諷諫秋七月太后流舒王元名高祖子于和州以侯思止醴泉人王𢎞義衡水人為侍御史思止素詭譎無賴告刺史裴貞與舒王元名謀反貞嘗杖一判司判司即使思止告之元名廢徙貞遂族滅思止求為御史太后曰卿不識字對曰獬豸神羊也能别曲直楚王獲之以為冠秦滅楚以其冠賜御史服之見後漢書輿服志何嘗識字但能觸邪耳太后悅從之𢎞義亦素無行以告密𢎞義嘗從鄰舍乞瓜不與乃告縣官瓜田中有白兔縣官使人搜捕蹂踐立盡又見閭里耆老作邑齋遂告以謀反殺二百餘人太后擢為殿中侍御史思止𢎞義奏置制獄入者非死不出朝士人人自危相見莫敢交口道路以目或因入朝密遭掩捕每朝輒與家人訣曰未知復相見否時法官競為深酷惟司刑丞徐有功名𢎞敏以字行文逺之孫杜景儉武邑人唐書作景佺通鑑考異曰實録筆誤新書因之今從舊統紀獨存平恕被告者皆曰遇來侯必死遇徐杜必生有功初為蒲州司法不施敲撲吏相約有犯徐司法杖者衆共斥之逮官滿不杖一人職事亦修及為司刑丞酷吏所誣構者皆為直之前後所活數十百家嘗廷爭獄事太后厲色詰之有功神色不撓爭之彌切太后雖好殺知有功正直甚敬憚之司刑丞李日知亦尚平恕少卿胡元禮欲殺一囚日知以為不可往復數四元禮曰元禮不離刑曹此囚終無生理日知曰日知不離刑曹此囚終無死法乃以所列狀上日知果直李日知滎陽人太后頒大雲經于天下僧法明等撰大雲經上之言太后乃彌勒佛下生當代唐為閻浮提主胡三省注釋氏以人世為閻浮提制頒天下尋敕兩京諸州建寺藏之八月太后殺南安王頴密王元曉子高祖孫等十四人通鑑作十二人今依唐書改又綱目于是條十二人下書及故太子賢二子考唐書賢傳賢三子光順封義豐被誅不書年月守義封桂陽薨守禮嗣雍王幽宫中後出外通鑑光順于天授二年與守義守禮同幽于是年又書鞭殺故太子賢二子所載互有不同今于是條依唐書不書殺賢二子于明年光順幽宫中條仍依通鑑唐之宗室于是殆盡其幼弱者亦流嶺南九月武氏改國號曰周稱皇帝以豫王旦為皇嗣改姓武氏立武氏七廟于神都侍御史傅遊藝衛州汲人上表請改國號曰周賜皇帝姓武氏武氏綱目于武氏革命後目仍書太后今以目從綱俱改稱武氏不許擢遊藝為給事中于是百官宗戚百姓四夷合六萬餘人俱上表如遊藝所請武氏可之御則天樓赦天下以唐為周改元上尊號曰聖神皇帝以皇帝豫王為皇嗣賜姓武氏以皇太子為皇孫立武氏七廟追尊周文王為始祖文皇帝妣姒氏曰文定皇后平王少子武曰睿祖康皇帝妣薑氏曰康惠皇后五世祖高曾祖考皆為皇帝妣皆為皇后以武承嗣為魏王三思為梁王士彠兄孫攸暨等十二人皆為郡王以史務滋溧陽人為納言宗秦客檢校內史傅遊藝為鸞臺侍郎平章事並賜姓武秦客潛勸武氏革命故首為內史尋坐贓貶舜遊藝期年之中厯衣青緑朱紫時人謂之四時仕宦明年九月遊藝所親告遊藝夢登湛露殿下獄自殺冬十月西突厥入居內地西突厥十姓自垂拱以來為東突厥所侵掠散亡略盡繼往絶可汗斛瑟羅收其餘衆六七萬人入居內地武氏以為竭忠事主可汗十一月周為正月綱目以唐正紀年故仍書十一月周易服色改置社稷宗廟武氏受尊號于萬象神宫旗幟尚赤改置社稷于神都納武氏神主于太廟以唐太廟為享德廟止祠高祖以下三室餘廢不享改唐崇先廟垂拱四年立為崇尊廟冬至祀明堂以武氏祖配上帝辛卯八年周武氏天授二年春正月周為一月説見前帝在房州二月周流其右丞周興于嶺南先是金吾大將軍邱神績以罪誅或告右丞周興與神績通謀武氏命來俊臣鞫之俊臣與興方推事對食謂興曰囚多不承當為何法興曰此甚易耳取大甕以炭四周炙之令囚入中何事不承俊臣索大甕如興法起謂興曰有內狀推兄請兄入此甕興惶恐服罪法當死原之流嶺南在道為仇家所殺興與索元禮來俊臣競為暴刻所殺各數千人破千餘家元禮殘刻尤甚尋亦為武氏所殺夏四月壬辰朔日食秋八月周改義豐王光順故太子賢之子等姓武氏幽之宫中光順與弟守禮守義及豫王諸子皆幽閉宫中不出門庭者十餘年周以武攸寧士彠兄孫為納言狄仁傑同平章事武氏謂仁傑曰卿在汝南甚有善政卿欲知譖卿者名乎仁傑謝曰陛下以臣為過臣請改之知臣無過臣之幸也不願知譖者名武氏深歎美之周殺其同平章事格輔元汴州浚儀人右相岑長倩納言歐陽通字明師詢之子先是鳯閣舍人張嘉福修武人使洛陽人王慶之等數百人上表請立武承嗣為皇太子岑長倩格輔元以皇嗣在東宫不宜有此議由是大忤諸武意皆坐誅來俊臣教長倩子引歐陽通訊之不服詐為欵并殺之武氏詔慶之曰皇嗣我子奈何廢之對曰神不歆非類民不祀非族今誰有天下而以李氏為嗣乎武氏不從慶之屢求見武氏怒命鳳閣侍郎李昭德長安人乾祐子杖之昭德引出門示朝士曰此賊欲廢我皇嗣立武承嗣命撲之耳目皆血出然後杖殺之其黨乃散昭德因言于武氏曰天皇陛下之夫皇嗣陛下之子陛下身有天下當傳之子孫為萬代業豈得以姪為嗣乎自古未聞姪為天子而為姑立廟者也且陛下受天皇顧託若以天下與承嗣則天皇不血食矣武氏亦以為然周殺右將軍李安靜綱之孫初武氏將革命王公百官皆上表勸進右將軍李安靜獨正色拒之及下制獄來俊臣詰其反狀安靜曰以我唐家老臣須殺即殺若問謀反實無可對俊臣竟殺之壬辰九年周武氏如意元年再改長夀春正月帝在房州周武氏引見存撫使所舉人先是武氏遣使存恤四方至是引見其所舉人無問賢愚悉加擢用高者試給舍給事中舍人次郎員外郎御史遺補拾遺補闕校書郎試官自此始時人為之語曰補闕連車載拾遺平斗量欋推侍御史碗脫校書郎有舉人沈全交續之曰􅭢心存撫使眯目聖神皇御史劾之武氏笑曰但使卿輩不濫何恤人言武氏雖濫以祿位收人心然不稱職者尋亦黜之或加刑誅挾刑賞之柄以駕御天下政由已出明察善斷故當時英賢亦競為之用如欋推欋其俱反杷也推吐雷反轉也言授官之泛用杷推轉也碗脫碗同碗言官不得人如碗脫模相似無異也周以郭霸舒州同安人唐書作𢎞霸通鑑從舊書為監察御史霸由寧陵注見前令召見自陳往討徐敬業臣誓抽其筋食其肉飲其血絶其髓武氏大悅遷監察御史時號四其御史霸素諂諛中丞魏元忠病霸往問之因嘗其糞喜曰糞甘則可憂今苦無傷也元忠大惡之周貶狄仁傑魏元忠等為縣令來俊臣羅告同平章事任知古狄仁傑裴行本司農卿崔宣禮左丞盧獻中丞魏元忠潞州刺史李嗣真字承胄趙州柏鄉人謀反先是俊臣請降敕一問即承反者得減死知古等下獄俊臣以此誘之仁傑曰大周革命萬物惟新唐室舊臣甘從誅戮反是實俊臣乃少寬之判官王德夀教仁傑引平章事楊執柔恭仁從孫仁傑曰皇天后土遣狄仁傑為如此事以頭觸柱血流被面德壽懼而謝之仁傑裂衾帛書寃狀置綿衣中謂德壽曰天時方熱請授家人去其綿德壽許之仁傑子得書稱變以聞武氏以問俊臣俊臣乃詐為仁傑等謝死表上之初平章事樂思晦淯陽人彥瑋子亦為俊臣等所殺男未十嵗沒入司農至是上變得召見武氏問狀對曰臣父已死臣家已破但惜陛下法為俊臣等所弄陛下不信臣言乞擇朝臣之忠清陛下素所信任者為反狀以付俊臣無不承反矣武氏意稍寤召見仁傑等問曰卿承反何也對曰不承則已死于拷掠矣武氏曰何為作謝死表對曰無之出表示之乃知其詐于是出此七族知古仁傑宣禮元忠獻皆貶縣令流行本嗣真于嶺南夏五月周禁天下屠殺採捕時江淮旱飢民不得採魚蝦餓死者甚衆拾遺張德生男私殺羊會同僚補闕杜肅懷一餤上表告之明日武氏對仗謂德曰聞卿生男甚喜德拜謝武氏曰何從得肉德叩頭服罪武氏曰朕禁屠宰吉凶不預卿自今召客亦須擇人出肅表示之肅大慙舉朝皆唾其面後武氏久視元年以鳯閣舍人崔融言始開屠禁崔融字安成齊州全節人秋七月周左相武承嗣罷以李昭德同平章事先是昭德密言于武氏曰魏王承嗣權太重武氏曰吾姪也故委以腹心昭德曰姑姪之親何如父子子猶有篡弒其父者况姪乎武氏矍然遂罷承嗣政事承嗣亦毁昭德于武氏武氏曰吾任昭德始得安眠此代吾勞汝勿言也昭德恃武氏委遇頗專權使氣已而為邱愔所奏貶南賔尉南賔隋縣唐天寶中改靈山今縣屬廣東廉州府周流其御史嚴善思名撰以字行朝邑人于歡州隋置地在今安南國武氏自垂拱以來任用酷吏先誅唐宗戚數百人次及大臣數百家其刺史郎將以下不可勝數每除一官戶婢竊相謂曰鬼朴又來矣不旬月輒遭掩捕族誅監察御史嚴善思公直敢言時告密者益衆武氏亦厭其煩命善思按問引虛伏罪者八百五十餘人羅織之黨為之不振乃相與構善思坐流歡州武氏知其枉尋復召之補闕朱敬則上疏曰自文明草昧天地屯蒙三叔流言四凶構難不設鈎距無以應天順人不切刑名不可推姦息暴故開告端以禁異議然急趨無善迹促柱少和聲向時之妙䇿乃當今之芻狗也伏願窒羅織之源掃朋黨之迹使天下蒼生坦然大悅豈不樂哉武氏善之賜帛三百段侍御史周矩上疏曰推劾之吏相矜以虐人非木石茍求賖死臣竊聽輿議皆稱天下太平何苦須反豈被告者盡是英雄欲求帝王邪但不勝楚毒而自誣耳周用仁而昌秦用刑而亡願陛下緩刑用仁天下幸甚武氏頗采其言制獄稍衰朱敬則字少連亳州永城人九月周更以九月為社冬十月周遣兵擊吐蕃取四鎮初王孝傑京兆新豐人從劉審禮擊吐蕃與審禮皆敗沒審禮敗沒事見前孝傑後竟得歸由是知吐蕃虛實會西州都督唐休璟請復取龜兹于闐疏勒碎葉即焉耆鎮後更名四鎮敕以孝傑及阿史那忠節將兵擊破吐蕃復取四鎮遂置安西都護于龜兹發兵戍之周武氏殺豫王妃劉氏戶婢團兒為武氏所寵信有憾于皇嗣乃譖皇嗣妃劉氏及德妃竇氏即元宗母後追諡昭成皇后為厭咒武氏殺之瘞于宫中莫知所在德妃父孝諶為潤州刺史有奴妄為妖異以恐妃母龎氏因請夜祠禱而發其事監察御史薛季昶按之以為當斬其子希瑊詣侍御史徐有功訟寃有功論之以為無罪季昶奏有功阿黨惡逆罪當絞令史以白有功有功嘆曰豈我獨死諸人永不死邪既食掩扉熟寢武氏召有功謂曰卿比按獄失出何多對曰失出人臣之小過好生聖人之大德武氏默然由是龎氏得減死有功亦除名州竇孝諶抗之孫薛季昶絳龍門人周制宰相撰時政記月送史館時政記自此始從姚璹字令璋思廉孫之請也癸巳十年周武氏長夀二年春正月帝在房州周以婁師德同平章事師德寬厚清慎犯而不校其弟除代州刺史將行師德謂曰吾弟兄榮寵過盛人所疾也將何以自免弟曰自今雖有人唾某面某拭之而已庶不為兄憂師德愀然曰此所以為吾憂也人唾汝面怒汝也而汝拭之則逆其意而重之怒矣夫唾不拭自乾當笑而受之耳周殺其尚方監裴匪躬匪躬坐私謁皇嗣腰斬于市自是公卿以下皆不得見又有告皇嗣潛有異謀者武氏命來俊臣鞫其左右左右不勝楚毒皆欲自誣太常工人安金藏京兆長安人大呼曰請剖心以明皇嗣不反即引佩刀自剖其胸五臟皆出武氏聞之令輿入宫使醫納五臟以桑皮線縫之傅以藥經宿始蘇武氏親臨視之歎曰吾有子不能自明使汝至此即命俊臣停推皇嗣由是得免三月周侯思止以罪誅時禁人間錦思止私蓄之李昭德按之杖殺于朝堂明年王𢎞義亦以罪流瓊州詐稱追還至漢北侍御史胡元禮遇之按驗殺之瓊州唐置今為府屬廣東夏五月棣州唐置今山東武定府是河溢流二千餘家秋九月丁亥朔日食周武氏自號金輪聖神皇帝作七寶金輪置之殿庭甲午十一年周武氏延載元年春正月帝在房州三月周以僧懷義為朔方道大總管討突厥先是突厥可汗骨篤祿死其子幼弟默啜自立寇靈州武氏以僧懷義為總管討之懷義未行虜退而止夏五月周武氏加越古之號秋八月周以杜景儉同平章事武氏出梨花一枝以示宰相宰相皆以為瑞杜景儉獨曰今草木黃落而此更發榮隂陽不時咎在臣等因拜謝武氏曰卿真宰相也周鑄天樞武三思請鑄銅鐵為天樞刻武氏功德立于端門之外銅鐵不足賦民間農器以足之明年四月天樞成高一百五尺徑十二尺三思為文武氏自書其傍曰大周萬國頌德天樞後開元二年毁之鎔其銅鐵厯月不盡九月壬午朔日食冬十一月周武氏加慈氏之號明年二月與越古之號並去之周明堂火武氏命懷義作天堂日役萬人費以億計府藏為空會御醫沈南璆亦得幸于武氏懷義心愠乃密燒天堂延及明堂一夕皆盡時方酺晏拾遺劉承慶請輟朝停酺以答天譴武氏將從之姚璹曰明堂布政之所非宗廟也不應自貶損乃止命更造天堂明堂越二年成號曰通天宫因改元萬歲通天又鑄銅為九州鼎神功元年成置通天宫及十二神子鼠丑牛之類皆高一丈各置其方武氏以明堂火制求直言劉承慶上疏請罷所營佛舍獲嘉主簿劉知幾表陳四事曰今六合清晏而赦令不息為善者不預恩光作惡者獨承徼幸一也海內具僚每嵗逢赦必賜階勳至于緋服衆于青衣象板多于木笏二也取士太廣宜加沙汰三也牧伯遷代太速既懷茍且之謀何暇循良之政四也是時官爵易得而法網嚴峻故人競為趨進而多陷刑戮知幾乃著思慎賦以刺時見志焉劉知幾字子元彭城人乙未十二年周武氏天册萬歲元年春正月帝在房州二月己酉朔日食周僧懷義伏誅懷義既焚明堂心不自安言多不順武氏密選宫人有力者執之樹下使武攸寧帥壯士毆殺之焚其尸冬十二月周為臘月説見前周安平王武攸緒惟良之子棄官隱嵩山攸緒少有志行恬淡寡欲求棄官隱于嵩山之陽武氏疑其詐許之以觀其所為攸緒遂優遊巖壑冬居茅椒以茅與椒編室夏居石室武氏所賜服器皆置不用買田使奴耕種與民無異丙申十三年周武氏萬歲通天元年春正月帝在房州夏五月契丹寇營州注見前周遣兵擊之大敗營州契丹松漠都督李盡忠貞觀中契丹酋長窟哥舉部內屬詔置松漠都督府以窟哥為都督賜姓李氏盡忠窟哥之孫也及歸誠州松漠羈縻州屬營州都督府綱目以歸為媯馮智舒直作誠州因釋為湖南之靖州謬甚刺史孫萬榮契丹大酋孫敖曹之孫舉兵反陷營州殺都督趙文翽文翽剛愎契丹飢不賑給視酋長如奴𨽻故二人怨而反盡忠自稱無上可汗以萬榮為前鋒所向皆克旬日間兵至數萬武氏遣將軍曹仁師擊之戰西硤石唐書地理志平州有東硤石西硤石等戍周師大敗仁師等至幽州虜遣老弱迎降故遺老牛瘦馬于道側仁師等將騎兵輕進虜設兵橫擊之生擒二將軍士卒死填山谷鮮有脫者于是武氏以建安王武攸宜為清邊道大總管募天下人奴有勇者官畀主直悉發以擊契丹明年三月總管王孝傑與契丹戰東硤石敗死攸宜軍漁陽不敢進秋九月突厥寇涼州執都督許欽明安陸人紹之曾孫時欽明兄欽寂為討擊副使與契丹戰亦被擒虜將圍安東即安東都護府令欽寂説其屬城未下者欽寂謂城中曰狂賊天殃滅在朝夕公但厲兵謹守以全忠節虜殺之其後默啜寇靈州以欽明自隨欽明至城下大呼求美醬粱米及墨意欲城中選良將引精兵夜襲虜營而城中無諭其意者未幾亦遇害吐蕃遣使請和吐蕃遣使請和親武氏遣武衛參軍郭元振名震以字行魏州貴鄉人往察其宜吐蕃將論欽陵請罷安西四鎮戍兵并求分十姓突厥之地元振曰所請如此豈非有兼并之志乎欽陵曰吐蕃茍貪土地欲為邊患則東侵甘涼豈肯規利于萬里之外邪乃遣使者隨元振入請之朝廷疑未決元振上疏以為斷不可許當以計緩之疏曰欽陵求罷兵割地此乃利害之機不可輕舉措也今若直拒其善意則為邉患必深宜以計緩之使其和望未絶則善矣彼四鎮十姓吐蕃之所甚欲也而青海吐谷渾亦中國之要地也今報之宜曰四鎮十姓之地本無用于中國所以遣兵戍之欲以鎮撫西域分吐蕃之勢使不得併力東侵也今若果無東侵之志當歸我吐谷渾諸部及青海故地則五俟斤部亦當以歸吐蕃如此則足以塞欽陵之口而亦未與之絶也若欽陵小有乖違則曲在彼矣且四鎮十姓欵附歲久今割而棄之恐傷諸國之心非所以御四夷也武氏遂從其言元振又言吐蕃百姓疲于徭戍早願和親欽陵利于統兵不欲歸欵若國家歲發和使而欽陵常不從命則彼國之人怨欽陵日深望國恩日甚斯亦疑間之漸可使其上下猜阻禍亂內興矣武氏亦深然之冬十月契丹陷冀州周以狄仁傑為魏州刺史契丹李盡忠死孫萬榮代領其衆突厥默啜乘間襲沙漠虜盡忠萬榮妻子而去萬榮收合餘衆攻陷冀州又攻瀛州河北震動制起狄仁傑為魏州刺史前刺史畏契丹猝至悉驅百姓入城繕守備仁傑至悉遣歸農百姓大悅周以姚元崇字元之陜州硤石人為夏官侍郎時契丹入寇軍書填委夏官郎中姚元崇剖析如流皆有條理武氏竒之擢為夏官侍郎周以徐有功為殿中侍御史武氏思徐有功用法平恕擢拜左臺殿中侍御史遠近聞者無不相賀宗城潘好禮著論稱有功蹈道依仁固守誠節不以貴賤生死易其操履設客問曰徐公何如張釋之主人曰釋之所行者甚易徐公所行者甚難難易之間優劣見矣張公逢漢文之時天下無事守法而已豈不易哉徐公逢革命之秋屬維新之運人主有疑于上酷吏恣虐于下而徐公守死善道幾陷囹圄數挂網羅豈不難哉客曰使為司刑卿乃得展其才矣主人曰吾子徒見徐公用法平允謂可置司刑僕覩其人方寸之地何所不容若其用之何事不可豈直司刑而已哉十一月周殺其箕州本隋遼州唐更名後復舊今𨽻山西刺史劉思禮等三十六家流其親屬千餘人明堂高宗時分萬年縣置長安中省尉吉頊河南人以箕州刺史劉思禮謀反告來俊臣俊臣先貶同州參軍尋召為合宫尉合宫縣高宗分河南縣置尋省使上變告之武氏使河內王武懿宗亦士彠兄孫推之懿宗令思禮廣引朝士許免其死于是思禮引平章事李元素譙人敬元之孫等凡三十六家皆海內名士咸族誅之親舊連坐流竄者千餘人俊臣由是復用而頊亦以此得進周以張昌宗義豐人行成族孫為散騎常侍張易之昌宗兄為司衛少卿昌宗易之年少美姿容太平公主薦之入侍禁中皆得幸于武氏常傅朱粉衣錦繡賞賜不可勝紀武承嗣三思懿宗宗楚客晉卿皆秦客弟皆候其門庭爭執鞭轡謂易之為五郎昌宗為六郎丁酉十四年周武氏神功元年春正月帝在房州三月周立突厥默啜為可汗默啜請為武氏子并為其女求婚武氏遣閻知微萬年人立德之孫田歸道長安人仁會之子册拜默啜為遷善可汗知微見突厥舞蹈歸道長揖不拜默啜囚歸道將殺之歸道辭色不撓乃捨之但留不遣初唐處突厥降者于豐勝靈夏朔代六州至是默啜求之及單于都護府之地并榖種繒綿農器鐵姚璹楊再思請給之鳳閣侍郎李嶠曰此所謂借寇兵資盜糧也不如治兵以備之璹等固請乃悉驅六州降戶數千帳并給榖種四萬斛雜綵五萬段農器三千事鐵數萬斤并許其婚默啜由是益強楊再思原武人李嶠字巨山趙州贊皇人已而歸道得還與知微爭論于武氏前歸道以為默啜必負約知微以為和親必可保夏四月周遣武懿宗婁師德擊契丹懿宗為神兵道大總管師德副之將兵二十萬擊契丹既而懿宗軍至趙州聞契丹將至懼而南遁契丹遂屠趙州六月周殺其右司郎中喬知之馮翊人知之有美妾曰碧玉武承嗣奪之知之作緑珠怨詩以寄之碧玉赴井死承嗣得詩于裙帶大怒諷酷吏羅告族誅之周殺其監察御史李昭德來俊臣伏誅來俊臣依勢貪淫士民妻妾有美者百方取之前後羅織誅人不可勝計自言才比石勒監察御史李昭德昭德由南賔尉召為御史素惡之俊臣遂誣昭德謀反下獄又欲羅告諸武及太平公主與皇嗣廬陵王南北牙同反諸武及太平公主共發其罪繫獄有司處以極刑奏上三日不出王及善時為內史曰俊臣國之元惡不去之必動搖朝廷吉頊曰俊臣聚結不逞誣搆良善贓賄如山寃魂塞路國之賊也何足惜哉武氏乃下其奏昭德俊臣同棄市時人無不痛昭德而快俊臣仇家爭噉其肉須臾而盡賀曰自今眠者背始帖席矣契丹軍潰斬孫萬榮以降初孫萬榮之破王孝傑也于柳城西北依險築城留其老弱婦女使人守之自引精兵寇幽州突厥默啜襲其新城三日克之盡俘以歸時萬榮方與唐兵相持軍遂大潰奴斬其首以降餘衆降于突厥武氏以契丹初平命武懿宗婁師德狄仁傑分道安撫河北懿宗所至殘酷奏請族誅河北百姓從賊者左拾遺王求禮廷折之曰此屬素無武備力不能勝茍以求生而已豈有叛國之心懿宗擁強兵數十萬望風退走賊徒滋蔓又欲移罪于草野詿誤之人為臣不忠請先斬懿宗以謝河北懿宗不能對司刑卿杜景儉亦曰此皆脅從請悉原之武氏從之秋九月周以魏元忠為肅政中丞武氏謂侍臣曰頃者周興來俊臣按獄多連引朝臣云其謀反朕使近臣就獄引問皆自承服朕不復疑今自興俊臣死不復聞有反者然則前死者不有寃邪夏官侍郎姚元崇對曰比來坐謀反死者率皆興等羅織陛下使近臣問之近臣亦不自保何敢動搖今賴天啓聖心興等伏誅臣以百口為陛下保自今內外之臣無復反者矣時人多為魏元忠訟寃武氏復召為肅政中丞冬閏十月周以狄仁傑同平章事周以李嶠知天官選事始置員外官數千人戊戌十五年周武氏聖厯元年春三月帝還東都武承嗣三思營求為太子狄仁傑從容言于武氏曰太宗櫛風沐雨親冒鋒鏑以定天下傳之子孫大帝以二子托陛下陛下今乃欲移之他族無乃非天意乎且姑姪之與母子孰親陛下立子則千秋萬歲後配食太廟立姪則未聞姪為天子而袝姑于廟者也武氏曰此朕家事卿勿預知仁傑曰王者以四海為家四海之內何者不為陛下家事况元首股肱義同一體臣備位宰相豈得有所不預知乎因勸武氏召還廬陵王武氏意稍寤他日又謂仁傑曰朕夢大鸚鵡兩翼皆折何也對曰武者陛下之姓兩翼二子也陛下起二子則兩翼振矣武氏由是無立承嗣三思之意吉頊與張易之昌宗為控鶴監供奉頊從容説二人曰公兄弟貴寵天下側目不大有功何以自全二人懼問計頊曰天下未忘唐德主上春秋高公何不勸立廬陵王以慰人望如此豈徒免禍亦可以長保富貴矣二人以為然承間屢為武氏言之武氏乃託言廬陵王有疾遣使召之及其妃子皆詣行在承嗣怏怏遂發病死秋八月突厥默啜冦媯檀等州媯州注見前檀州唐置今順天府密雲縣是初武氏命武承嗣之子淮陽王延秀入突厥納默啜女為妻復遣閻知微齎金帛巨億以送之延秀至突厥默啜謂曰我欲以女嫁李氏安用武氏兒邪我突厥世受李氏恩聞李氏盡滅惟兩兒在我今將兵輔立之乃拒延秀以知微為南面可汗言欲使之主唐民也發兵冦媯檀等州移書數朝廷曰我可汗女當嫁天子兒武氏小姓門户不敵罔冒為婚我為此起兵欲取河北耳已而默啜陷定州殺刺史又陷趙州刺史高睿與妻秦氏仰藥詐死虜輿詣默啜誘之降秦氏謂睿曰酬報國恩正在今日遂俱閉目不言再宿虜乃殺之虜高睿萬年人熲之孫周以狄仁傑兼納言武氏命宰相各舉尚書郎一人仁傑舉其子光嗣拜地官員外郎已而稱職武氏喜曰卿足繼祁奚矣通事含人元行沖博學多通仁傑重之行沖數規諫仁傑且曰凡為家者必有儲蓄脯醢以適口參术以攻疾僕竊計明公之門珍味多矣行沖請備藥物之末仁傑笑曰吾藥籠中物何可一日無也元行沖名淡以字行河南人周武氏以帝為皇太子河北道元帥狄仁傑副之以討默啜皇嗣固請遜位于廬陵王武氏許之立為太子復名顯賜姓武氏命太子為河北道元帥以討突厥先是募人月餘不滿千人及聞太子為帥應者雲集未幾數盈五萬時太子不行命仁傑知元帥事王及善請太子赴外朝以慰人心從之突厥盡殺所掠趙定男女萬餘人而去仁傑將兵追之不及默啜還漠北擁兵四十萬據地萬里西北諸夷皆附之立其弟吐悉匐為右廂察骨篤祿子默矩為左廂察各主兵二萬餘人其子匐俱為小可汗位兩察上主兵四萬餘人周以蘇味道趙州樂城人同平章事味道在相位依阿取容嘗謂人曰處事不宜明白但模稜持兩端可矣時人謂之蘇模稜冬十月周以狄仁傑為河北道安撫大使時河北人為突厥所驅迫者虜退懼誅往往亡匿仁傑上疏請曲赦河北諸州一無所問制從之仁傑于是撫慰百姓得突厥所驅掠者悉遞還本貫散糧運以賑貧乏修郵驛以濟旋師自食疏糲禁其下不得侵擾百姓犯者必斬河北遂安周閻知微伏誅以田歸道為夏官侍郎默啜縱知微使還武氏命磔于天津橋南使百官共射之夷其三族擢歸道為夏官侍郎甚見親委十一月周以豫王旦為相王周置控鶴監丞簿等官胡三省注先是置監今方備官控鶴監率皆嬖寵之人頗用才能文學之士田歸道李逈秀字茂之大亮族孫薛稷字嗣通道衡曾孫員半千字榮期齊州全節人以參之半千以古無此官請罷之遂忤旨左遷己亥十六年周武氏聖厯二年春正月帝在東宫二月周遣使禱少室山嵩山東曰太室西曰少室武氏不豫遣給事中閻朝隱字友倩欒城人禱少室山朝隱自為犧牲沐浴伏爼上願代武氏命武氏厚賞之吐蕃贊婆弓仁降周初吐蕃贊普器弩悉弄尚幼論欽陵兄弟用事皆有勇略諸人畏之欽陵居中秉政諸弟握兵分據方面贊婆常居東邊為中國患者三十餘年器弩悉弄浸長陰與大臣論巖謀誅之會欽陵出外贊普殺其親黨二千餘人欽陵自殺贊婆帥所部千餘人欽陵子弓仁以所統吐谷渾七千餘帳俱來降帝及武攸暨士彠兄孫尚太平公主等誓于明堂武氏自以春秋高慮身後太子與諸武不相容命太子相王太平公主與武攸暨等誓于明堂銘之鐵劵秋八月周以王及善為文昌左相初王及善已致仕會契丹亂起滑州刺史武氏召見問以朝廷得失及善陳十餘事武氏善之留為內史及善雖無學術然清正難奪有大臣之節張易之兄弟每侍內宴無復人臣之禮及善屢以為言武氏不悅謂及善曰卿高年不宜更侍遊宴及善遂乞骸骨武氏不許至是以為左相罷政事周納言婁師德卒諡曰貞師德沈厚寬恕狄仁傑之入相也師德實薦之而仁傑不知意頗輕之武氏嘗問仁傑曰師德賢乎對曰為將能謹守邊陲賢則臣不知又曰師德知人乎對曰臣嘗同僚未聞其知人也武氏曰朕之知卿乃師德所薦也亦可謂知人矣仁傑既出嘆曰婁公盛德我為其所包容久矣吾不得窺其際也是時羅織紛紜師德久為將相獨能以功名終人以是重之河溢濟源隋縣今屬河南懷慶府漂千餘家周以韋嗣立字延構思謙子為鳳閣舍人嗣立兄承慶字延休為鳳閣舍人以疾去職嗣立時為萊蕪漢縣晉廢唐復置今屬山東泰安府令武氏召使代之自武氏稱制以來學校殆廢酷吏所陷親友流離未獲原宥嗣立上疏曰時俗浸輕儒學先王之道弛廢不講宜令三公以下子弟皆入國學不聽以他岐仕進又酷吏乘間殺人求進至如仁傑元忠枉遭按鞫亦皆自誣非陛下明察則已為葅醢矣今陛下升而用之皆為良輔臣恐嚮之負寃得罪者亦皆如是伏望一皆昭洗死者追復官爵生者聽還鄉里如此則天下皆知昔之枉濫非陛下之意幽冥歡欣和氣感通矣武氏不能用冬十一月周貶吉頊為安固注見前尉武氏以頊有幹略以為同平章事委以心腹頊與武懿宗爭趙州之功于武氏前頊魁岸辨口懿宗短小傴僂頊視懿宗聲氣凌厲武氏由是不悅曰頊在朕前猶卑諸武况異時詎可倚邪他日頊奏事方援引古今武氏怒曰卿所言朕飫聞之無多言昔太宗有馬肥逸無能馭者朕為宫女進言曰妾能制之然須三物一鐵鞭二鐵撾三七首鞭之不服則撾其首撾之不服則斷其喉太宗壯朕之志今日卿豈足汙朕七首邪頊皇恐謝諸武因共發其弟冒官事由是坐貶頊辭日得召見涕泣言曰臣永辭闕庭願陳一言武氏問之頊曰合水土為泥有爭乎武氏曰無之又曰分半為佛半為天尊有爭乎曰有爭矣頊頓首曰宗室外戚各當其分則天下安今太子已立而外戚猶為王此陛下驅之使他日必爭兩不得安矣武氏曰朕亦知之然業已如是不可如何十二月周同平章事陸元方字希仲吳人罷武氏問元方以外事對曰臣備位宰相有大事不敢不以聞人間細事不足煩聖聽忤旨遂罷元方為人清謹再為宰相武氏每有遷除多訪之元方密封以進臨終悉焚其藁曰吾于人多陰德子孫其未衰乎庚子十七年周武氏久視元年眷正月帝在東宫夏五月己酉朔日食六月周以張易之為奉宸令武氏改控鶴監為奉宸府以易之為令每內殿曲宴輒引諸武易之昌宗飲博嘲謔又令易之昌宗與李嶠等修三教珠英于內殿以掩其迹武三思奏昌宗乃王子晉後身武氏使衣羽衣吹笙乘木鶴于庭中文士皆賦詩以美之武氏又多選美少年為奉宸內供奉右補闕朱敬則諫曰陛下內寵易之昌宗足矣而侯祥等明自媒衒求入供奉醜慢無耻臣職諫諍不敢不奏武氏勞之易之昌宗競以豪侈相勝弟昌儀為洛陽令請屬無不從嘗早朝有選人姓薛以金五十兩并狀賂之昌儀受金以狀授天官侍郎張錫數日錫失其狀以問昌儀昌儀曰我亦不記但姓薛者即與之錫懼退索在銓姓薛者六十餘人悉留注官張錫文瓘兄子周遣將軍李楷固等擊契丹餘黨平之契丹將李楷固善用䌈索及騎射舞槊每陷陳如鶻入烏羣所向披靡駱務整者亦為契丹將屢敗唐兵及孫萬榮死二人來降有司請族之狄仁傑曰二人驍勇絶倫能盡力于所事必能盡力于我若撫之以德皆為我用矣奏請赦之皆以為將軍使將兵擊契丹餘黨悉平之周隴右大使唐休璟破吐蕃于洪源谷名在涼州府平蕃縣西北吐蕃將麴莽布支冦涼州圍昌松注見前唐休璟與戰于洪源谷謂諸將曰諸論既死麴莽布支新為將不習軍事請為諸軍破之乃披甲先陷陳六戰皆捷吐蕃大奔已而吐蕃遣使請和宴使者于麟德殿會休璟入朝預宴使者屢窺之武氏問其故對曰洪源之戰此將軍猛厲無敵故欲識之周同平章事狄仁傑卒武氏信重仁傑羣臣莫及嘗謂之國老而不名仁傑好面引廷爭武氏每屈意從之屢以老疾乞骸骨不許及卒武氏泣曰朝堂空矣武氏嘗問仁傑朕欲得一佳士用之誰可者仁傑曰有張柬之字孟將襄陽人者其人雖老宰相才也武氏擢為洛州司馬數日又問仁傑對曰前薦柬之尚未用也武氏曰已遷矣對曰臣所薦者可為宰相非司馬也乃遷秋官侍郎卒用為相仁傑又嘗薦夏官侍郎姚元崇監察御史桓彥範字士則潤州丹陽人太州今太原府太谷縣唐于此置太州後廢刺史敬暉字仲曄平陽人等數十人卒成反正之功或謂仁傑曰天下桃李悉在公門矣仁傑曰薦賢為國非為私也中宗復位贈司空睿宗時追封梁國公冬十月周復以正月為歲首周以韋安石萬年人孝寬曾孫同平章事時武三思張易之兄弟用事安石數面折之嘗侍宴禁中易之引蜀商數人在座同博安石跪奏曰商賈賤類不應得預此會顧左右逐出之座中皆失色武氏以其言直勞勉之同列皆嘆服辛丑十八年周武氏大足元年又改長安春正月帝在東宫是歲武邑人蘇安恆上疏武氏曰陛下欽先聖之顧托受嗣子之推讓敬天順人二十年矣今太子春秋既壯陛下年德既尊何不禪位東宫使臨宸極亦何異陛下之身哉諸武皆得封王而陛下二十餘孫無尺寸之土此非長久之計也臣請黜諸武為公侯而分土以王諸孫擇立師傅教其孝敬之道以夾輔周室屏藩王家疏奏武氏召見賜食慰諭而遣之明年安恆復上疏曰臣惟天下者神堯文武之天下也陛下雖居正統實因唐氏舊基當今大子追回年德俱盛陛下貪其寶位而忘母子深恩將以何顔見唐家之宗廟乎武氏亦不之罪三月雨雪蘇味道以雪為瑞帥百官入賀殿中侍御史王求禮止之曰三月雪為瑞雪臘月雷為瑞雷乎味道不從既入求禮獨不賀進言曰今陽和布氣草木發榮而寒雪為災豈得誣以為瑞賀者皆諂諛之士也武氏為之罷朝時又有獻三足牛者宰相復賀求禮揚言曰凡物反常皆為妖此鼎足非其人政教不行之象也武氏為之愀然冬十一月周以崔元暐博陵安平人為天官侍郎天官侍郎崔元暐性介直未嘗請謁執政惡之改文昌左丞月餘武氏謂元瑋曰聞卿改官令史設齋自慶此欲盛為姦貪耳今還卿舊任乃復拜天官侍郎周以郭元振為涼州都督先是涼州南北境不過四百餘里突厥吐蕃頻歲奄至城下百姓苦之元振始于南境硤口置和戎城今涼州府古浪縣是北境磧口置白亭軍故城在今涼州府鎮畨縣北控其衝要拓州境千五百里自是冦不復至城下元振又令甘州刺史李漢通開置屯田盡水陸之利舊粟麥斛至數千至是一縑可糴數十斛軍糧支數十年元振善撫御在州五年夷夏畏慕令行禁止牛羊被野路不拾遺壬寅十九年周武氏長安二年春正月帝在東宫周設武舉唐六典武舉以七等閲其人一曰射長垜二曰騎射三曰馬槍四曰步射五曰材貌六曰言語七曰負重秋九月乙丑朔日食不盡如鈎神都見其既冬十一月周命監察御史蘇頲字廷碩夔之曾孫按雪寃獄監察御史魏靖上疏以為陛下既知俊臣之姦處以極法乞詳覆俊臣等所推大獄申其枉濫武氏乃命蘇頲按覆由是雪寃者甚衆十二月周以張嘉貞蒲州猗氏人為監察御史侍御史張循憲為河東採訪使有疑事不能決問侍吏曰此有佳客可與議事者乎吏言前平鄉隋縣今屬直𨽻順德府尉張嘉貞有異才循憲召見詢之嘉貞為之條析理分莫不洗與灑同散解貌然循憲因請為奏皆意所未及及還武氏善之循憲具言嘉貞所為且請以已官授之武氏曰朕寧無一官自進賢邪因召嘉貞與語大悅即拜監察御史擢循憲司勳郎中賞其得人也癸卯二十年周武氏長安三年春正月帝在東宫突厥默啜請以女妻太子之子許之乃遣武延秀還延秀為突厥所執事見前仍遣使來朝宴于宿羽臺在東都宿羽宫中高宗建太子預焉宫尹崔神慶上疏曰今五品以上所以佩龜者為别敕徵召恐有詐妄內出龜合然後應命况太子國本古來徴召皆用玉契此誠重慎之極也昨緣突厥使見太子應預朝參直有文符下宫曾不降敕處分臣愚謂太子非朔望朝參應别召者請降手敕及玉契武氏然之崔神慶武城人義元子佩龜玉契唐制百官有隨身魚符以應召命皇太子以玉契召勘合乃赴親王以金庶官以銅皆題其官位姓名盛以魚袋天授二年改佩魚為龜張鷟曰唐以鯉魚為符偽周武姓元武龜也故以魚為龜三月壬戌朔日食秋九月庚寅朔日食既周貶魏元忠為高要注見前尉流張説于嶺南初魏元忠為洛州長史張易之奴暴亂都市元忠杖殺之及為相武氏欲以易之弟昌期為雍州長史問宰相誰堪雍州者元忠以薛季昶對武氏曰昌期何如元忠曰昌期少年不間吏事嚮在岐州户口逃亡且盡不如季昶武氏默然而止元忠又嘗面奏臣承乏宰相不能盡忠死節使小人在側臣之罪也武氏不悅由是諸張深怨之乃譖元忠嘗言太后老矣不若挾太子為長久武氏怒下元忠獄昌宗密引鳳閣舍人張説字道濟洛陽人賂以美官使證元忠説許之武氏召説入鳳閣舍人宋璟邢州南和人謂曰名義至重鬼神難欺不可黨邪陷正若獲罪流竄其榮多矣若事有不測璟當叩閣力爭與子同死努力為之萬代瞻仰在此舉也殿中侍御史張廷圭濟源人曰朝聞道夕死可矣左史劉知幾曰無汙青史為子孫纍及入武氏問之説未對昌宗從旁迫趣説使速言説曰陛下視之在陛下前猶逼臣如是况在外乎臣實不聞元忠有是言易之昌宗遽呼曰張説與元忠同反武氏問其狀對曰説嘗謂元忠為伊周伊尹放太甲周公攝王位非欲反而何説曰易之小人徒聞伊周之語安知伊周之道伊尹周公為臣至忠古今慕仰陛下用宰相不使學伊周當使學誰邪武氏曰説反覆宜并繫治之他日更引問説對如前朱敬則抗疏理之曰元忠素稱忠直張説所坐無名若令抵罪失天下望蘇安恆亦上疏曰元忠下獄里巷恟恟皆以為陛下委信姦宄斥逐賢良忠臣烈士皆拊髀于私室方今賦役煩重百姓凋弊重以讒慝專恣刑賞失中竊恐人心不安别生他變竟貶元忠高要尉流説嶺表元忠入辭言曰臣老向嶺南十死一生但陛下他日必思臣言因指昌宗易之曰此二小兒終為亂階殿中侍御史王晙滄州景城人復奏申理元忠宋璟謂之曰魏公幸已得全今子復冒威怒得無狼狽乎晙曰魏公以忠獲罪晙為義所激顛沛無恨璟歎曰璟不能申魏公之枉深負朝廷矣太子僕崔貞慎等八人餞元忠于郊外易之詐為狀稱貞慎等與元忠謀反武氏使監察御史馬懷素鞫之懷素曰昔欒布奏事彭越頭下漢祖不以為罪况元忠之刑未如彭越而陛下欲誅其送者乎武氏意解貞慎等乃獲免武氏嘗命朝貴宴集易之兄弟皆位宋璟上易之素憚璟欲説其意虛位揖之曰公方今第一人何乃下坐璟曰才劣位卑張卿以為第一何也天官侍郎鄭杲謂璟曰中丞奈何卿五郎璟曰以官言之正當為卿足下非張卿家奴何郎之有舉坐悚惕時自武三思以下皆謹事易之兄弟璟獨不為之禮諸張積怒嘗欲中傷之武氏知之故得免馬懷素字惟白潤州丹徒人鄭杲滎澤人元璹曾孫周以裴懷古夀春人為桂州都督始安本漢縣三國吳為郡今廣西桂林府是獠范成大曰獠依山林而居無酋長蠻之荒忽無常者反攻陷州縣朝廷思得良吏以鎮之朱敬則稱懷古有文武才以為桂州都督懷古飛書示以禍福獠即迎拜懷古輕騎赴之左右曰夷獠無信不可忽也懷古曰吾仗忠信可通神明而况人乎遂詣其營賊衆大喜嶺外悉定甲辰二十一年周武氏長安四年春正月帝在東宫夏四月周復作大像武氏復稅天下僧尼作大像糜費巨億李嶠上疏曰造像錢見有一十七萬餘緡若將散施人與一千濟得一十七萬餘户拯飢寒之弊省勞役之勤人神胥悅功德無窮監察御史張廷圭疏曰以時政論之則宜先邊境蓄府庫養人力以釋教論之則宜救苦厄滅諸相崇無為願察臣之愚行佛之意武氏為之罷役召見廷圭賞慰之秋八月周以楊再思為內史再思為相專以諂媚取容司禮少卿張同休易之之兄嘗因宴集戲再思曰楊內史面似高麗再思欣然剪紙帖巾反被紫袍為高麗舞舉坐大笑時人或譽張昌宗之美曰六郎面似蓮花再思獨曰不然昌宗問其故再思曰乃蓮花似六郎耳周以韋安石為揚州刺史唐休璟兼幽營都督安石舉奏張易之等罪敕付安石及唐休璟鞫之未竟而事變出安石揚州休璟幽營休璟將行密言于太子曰二張恃寵不臣必將為亂殿下宜備之冬十月以秋官侍郎張柬之同平章事先是武氏以姚元之時突厥叱列元崇反武氏詔姚元崇以字行為靈武道安撫大使元之將行武氏令舉外司堪為宰相者對曰張東之沉厚有謀能斷大事且其人已老惟陛下急用之武氏遂以柬之同平章事時年已八十矣周以岑羲字伯華文本孫為天官員外郎武氏命宰相選郎吏韋嗣立薦羲曰但恨其伯父長倩長倩被誅事見前為纍武氏曰茍或有才此何所纍由是諸緣坐者始得進用十二月周張昌宗下獄既而赦之武氏寢疾宰相不得見者纍月惟易之昌宗侍側崔元暐奏曰太子相王足侍湯藥宫禁事重願不令異姓出入易之昌宗亦恐禍及陰為之備屢有人為飛書云易之兄弟謀反許州人楊元嗣告昌宗嘗召術士李𢎞泰占相𢎞泰言昌宗有天子相武氏命平章事韋承慶及司刑卿崔神慶御史中丞宋璟鞫之神慶奏言昌宗欵稱𢎞泰語已奏聞準法首原璟奏昌宗儻以𢎞泰為妖妄何不執送有司雖云奏聞終是包藏禍心法當處斬武氏不許尋敕璟安撫隴蜀璟不肯行奏曰故事中丞非軍國大事不當出使今隴蜀無變臣不敢奉制先是璟方奏退拾遺李雍進曰宋璟志安社稷非為身謀願可其奏武氏不聽既而司刑少卿桓彥範上疏曰昌宗無功荷寵而包藏禍心所以奏者擬事發則云先已奏聞不發則俟時為逆此乃姦臣詭計若云可捨誰為可刑請考竟其罪疏奏不報崔元暐亦屢以為言和李雍字泰江都人武氏令法司議昌宗罪元暐弟司刑少卿忭處以大辟宋璟復奏昌宗為飛書所逼不得已而自首且謀反大逆無容首免武氏溫言解之璟聲色愈厲曰臣知言出禍從然義激於心雖死不恨武氏不悅楊再思遽宣敕令出璟曰聖主在此不煩宰相擅宣敕命武氏乃可其奏遣昌宗詣臺璟庭立而按事未畢武氏特敕赦之璟嘆曰不先擊小子腦裂負此恨矣武氏使昌宗詣璟謝璟拒不見乙巳神龍元年春正月張柬之等舉兵討武氏之亂張易之昌宗伏誅帝復位大赦武氏疾甚易之昌宗居中用事張柬之崔元暐與中臺右丞敬暉司刑少卿桓彥範相王司馬袁恕已滄州東光人謀誅之柬之謂羽林大將軍李多祚曰將軍富貴誰所致也多祚泣曰大帝柬之曰今大帝之子為二豎所危將軍不思報大帝之德乎多祚曰茍利國家惟相公處分不敢顧身遂與定謀初柬之與荆府長史楊元琰字溫閿鄉人相代同泛江至中流語及武氏革命事元琰慨然有匡復之志及柬之為相引元琰為右羽林將軍謂曰君頗記江中之事乎今日非輕授也柬之又用彥範暉及右散騎侍郎李湛皆為羽林將軍委以禁兵易之等疑懼乃更以其黨武攸宜參之易之等乃安俄而姚元之自靈武至都柬之彥範相謂曰事濟矣遂以其謀告之時太子于北門起居彥範暉謁見密陳其䇿太子許之柬之元暐彥範乃與左威衛將軍薛思行等帥羽林兵五百餘人至元武門遣多祚湛及內直郎王同皎相州安陽人詣東宫迎太子斬關而入斬易之昌宗于廡下進至武氏所寢長生殿武氏驚起問曰亂者誰邪多祚等對曰易之昌宗謀反臣等奉太子令誅之恐有漏泄故不敢以聞稱兵宫禁罪當萬死武氏見太子曰小子既誅可還東宫彥範進曰太子安得更歸昔天皇以愛子託陛下今年齒已長久在東宫天意人心久思李氏願陛下傳位太子以順天人之望武氏謂崔元暐曰卿朕所自擢亦在此邪對曰此乃所以報陛下之大德于是以武氏制命太子監國遣使宣諭諸州明日武氏傳位于太子帝復位大赦武氏徙居上陽宫帝帥百官上尊號曰則天大聖皇帝相王旦加號安國相王太平公主加號鎮國太平公主皇族皆復屬籍敘官爵其為武氏所殺者訪求其柩改葬之以張柬之袁恕已同三品崔元暐為內史敬暉桓彥範為納言李多祚等進官賜爵有差二月復國號曰唐郊廟社稷寢陵百官旗幟服色文字皆如永淳以前故事復以神都為東都北都為并州老君為元元皇帝流貶周宰相韋承慶房融崔神慶于嶺南復立韋氏為皇后贈后父元貞上洛王左拾遺賈虛已上疏曰異姓不王古今通制今中興之始萬姓仰觀而先王后族非所以廣德美于天下也且先朝贈后父太原王殷鑒不逺須防其漸不聽上之遷房陵也與后同幽閉備嘗艱危情愛甚篤每聞敕使至輒皇恐欲自殺后止之曰禍福無常何遽如是嘗與后私誓曰異時幸復見天日當惟卿所欲不相禁禦至是上每臨朝則后必施帷帳坐于殿上預聞朝政如武氏在高宗之世矣桓彥範上表曰書稱牝雞之晨惟家之索自古帝王未有以婦人共政而不破國亡身者也願令皇后專居中宫治陰教勿出外朝干國政上不聽以武三思為司空二張之誅也洛州長史薛季昶謂張柬之敬暉曰二凶雖誅産祿猶在去草不除根終當復生二人曰大事已定彼猶機上肉耳夫何能為季昶歎曰吾不知死所矣朝邑尉劉幽求冀州武強人亦謂柬之等曰三思尚存公輩終無葬地若不早圖噬臍無及不從至是上以三思為司空同三品上女安樂公主適三思子崇訓上官儀女婉兒者沒入掖庭辨慧能文明習史事武氏愛之及上即位使掌制命益委任之拜為媫妤三思通焉故婉兒黨于武氏又薦三思于韋后上遂與三思圖議政事數微服幸其第柬之等皆受制于三思矣上使后與三思雙陸而自為點籌三思遂與后通由是武氏之勢復振柬之等數勸上誅諸武曰輩命之際宗室誅夷略盡今陛下反正武氏濫官僭爵安堵如故豈逺近所望邪不聽柬之等或撫床歎憤或彈指出血曰主上昔為英王時稱勇烈吾所以不誅諸武者欲使上自誅之以張天子之威耳今反如此事勢已去知復奈何貶譙王重福為均州刺史重福上之庶子也韋后惡之貶均州刺史常令州司防禦之徵武攸緒為太子賔客以安車徵武攸緒既至為太子賔客固請還山許之夏四月以鄭普思為祕書監葉靜能為國子祭酒術士鄭普思尚衣奉御葉靜能皆以妖妄為上所信墨敕敕出禁中不由中書門下以普思為祕書監靜能為國子祭酒桓彥範崔元暐固執不可拾遺李雍亦上疏言之上皆不聽已而普思聚衆雍岐謀作亂事覺西京留守蘇瓌收繫窮治之上抑瓌而佑普思侍御史范獻忠力言之上不得已流普思儋州靜能于景雲初伏誅蘇瓌字昌容頲之父五月遷周廟主于西京仍避其諱賜敬暉等五人王爵罷其政事敬暉等帥百官上表曰天授革命之際宗室誅竄殆盡今天命惟新而諸武封建如舊開闢以來未有斯理願陛下為社稷計順遐邇心降其王爵以安內外上不許暉等畏武三思之讒以考功員外郎崔湜字澄瀾仁師之孫為耳目湜見上親三思而忌暉等乃悉以暉等謀告三思三思引為中書舍人與鄭愔滄州南皮人皆為謀主先是愔詔事二張坐貶亡入東都謁三思初見哭甚哀既而大笑三思怪之愔曰愔始哀大王將戮死而族滅後乃喜大王之得愔也大王雖得天子之意然彼五人皆據將相之權膽略過人廢太后如反掌日夜切齒欲噬大王之肉此愔所以為大王寒心也三思大懼與之登樓問自安之䇿引為中書舍人三思與韋后日夜譖暉等云恃功專權將不利社稷不若封以王爵罷其政事外不失尊寵功臣內實奪之權上以為然封敬暉為平陽王桓彥範為扶陽王張柬之為漢陽王袁恕已為南陽王崔元暐為博陵王皆罷政事三思令百官修復武氏之政不附武氏者斥之為五王所逐者復之大權盡歸三思矣五王之請削武氏諸王也求人為表衆莫肯為中書舍人岑羲為之語甚激切中書舍人畢構次當讀辭色明厲三思既得志羲改祕書少監出構為潤州刺史畢構字隆澤河南偃師人以宋璟為黃門侍郎上嘉宋璟忠直纍遷黃門侍郎武三思嘗以事屬璟璟正色拒之曰今太后既復子明辟王當以侯就第何得尚預朝政獨不見産祿之事乎以唐休璟豆盧欽望豆盧代北復姓欽望萬年人為左右僕射以唐休璟豆盧欽望為左右僕射休璟仍同三品欽望有軍國重事中書門下可共平章先是僕射為二宰相馬端臨曰唐左右二僕射本副尚書令自尚書令廢闕二僕射遂為宰相考百官志唐太宗嘗為尚書令臣下不敢居其職遂以僕射主省事故二僕射為二宰相綱目改二曰正未知何據今依通鑑其後多兼中書門下之職貞觀末除拜僕射必兼中書門下故曰同三品午前決朝政午後決省事至是欽望專為僕射不敢預政事故有是命是後專拜僕射者不復為宰相矣洛水溢流二千餘家秋七月以漢陽王張柬之為襄州刺史柬之表請歸襄州養疾制以柬之為刺史上為賦詩祖道詔羣臣餞定鼎門外柬之至州持下以法親舊無所縱貸會漢水漲齧城郭柬之因壘為隄以遏遄怒闔境賴之改考通鑑柬之為刺史不知州事今依唐書輯河南北十七州大水制求直言右衛參軍宋務光一名烈字子昂汾州西河人上疏曰水陰類臣妾之象恐後庭有干外朝之政者宜杜絶其萌太子國本宜早擇賢能而立之又外戚太盛如武三思等宜解其機要鄭普思葉靜能以小技竊大位亦朝政之蠧也疏奏不省冬十一月羣臣上皇帝皇后尊號羣臣上皇帝尊號曰應天皇帝皇后曰順天皇后上與后謁謝太廟赦天下相王太平公主加實封皆滿萬户後景龍元年皇后帥王公上表加帝號曰應天神龍皇帝宗楚客又帥百官表請加皇后為順天翊聖皇后上並許之上御樓觀潑寒胡戲注見前清源尉吕元泰上疏曰謀時寒若何必裸身揮水鼓舞衢路以索之哉疏奏不納武氏死綱目作皇太后武氏崩邱濬曰武氏廢唐宗祀滅唐國祚殺唐族屬其于李氏固已義絶葬不可以列園陵祭不可以入宗廟死全首領亦已為幸而又稱之為后書之以崩何以誅絶其既往示戒于將來必若直斥其名而且以死書之為愈其説甚正今特採之于武氏之死削去太后改崩書死武氏死于上陽宫年八十二遺制去帝號赦王蕭二族及褚遂良韓瑗柳奭親屬上居諒陰以中書令魏元忠攝冡宰三日元忠素負忠直之望中外賴之武三思矯武氏遺制慰諭元忠賜實封百户元忠捧制感咽涕泗見者曰事去矣將以武氏合葬乾陵給事中嚴善思上疏曰神明之道體尚幽元今欲啓之恐致驚黷况合葬非古宜于陵旁更擇吉地不從明年五月遂合葬于乾陵户部奏是歲天下户口之數戶六百一十五萬口三千七百一十四萬有竒丙午二年春正月制太平安樂公主各開府置官屬安樂公主恃寵賣官鬻獄勢傾朝野或自為制敕掩其文令上署之上笑而從之竟不視也自請為皇大女上雖不從亦不譴責大平公主與僧寺爭碾磑雍州司戶李元紘判歸僧寺時竇從一為刺史命改判元紘大署判後曰南山可移此判無動從一不能奪碾磑激水以礱穀出米即今水磨也李元紘字大綱萬年人竇從一德元之子本名懷貞避韋后父諱更名置十道巡察使選內外五品以上官二十人為十道巡察使委之察吏撫人薦賢直獄二年一代考其功罪而進退之薑師度魏州魏縣人馬懷素源乾曜相州臨漳人盧懷慎滑州靈昌人李傑相州滏陽人皆預焉三月殺駙馬都尉王同皎初宋之問字延清汾州人及弟之遜皆坐附會張易之貶嶺南逃歸東都匿于友人王同皎家同皎疾武三思及韋后所為每與所親言之輒切齒之遜密告三思三思使人告同皎與武當丞周憬壽春人等謀殺三思廢皇后皆坐斬之問之遜並除京官憬亡入比干廟大言曰比干古之忠臣知吾此心三思與皇后淫亂傾危國家行當梟首都市恨不及見耳遂自剄大置員外官置員外官自京師及諸州凡二千餘人宦官超遷七品以上員外官者又將千人魏元忠自端州還為相不復強諫惟與時俯仰中外失望酸棗尉袁楚客以書責之曰主上新復厥命惟新厥德當進君子退小人以興大化豈可安其榮寵循默而已今不早建太子擇師傳而輔之一失也公主開府置僚屬二失也崇長緇衣借勢納賂三失也俳優小人竊盜品秩四失也有司選賢皆以貨取勢求五失也寵進宦者殆滿千人六失也王公貴戚賞賜無度競為侈靡七失也廣置員外官傷財害民八失也先朝宫女出入無禁交通請謁九失也左道之人熒惑主聽竊盜祿位十失也凡此十失君侯不正誰正之哉元忠得書愧謝而已端州隋置今廣東肇慶府是元忠先貶髙要尉髙要端州治也殺處士韋月將以尹思貞京兆長安人為青州刺史宋璟為貝州後周置今廣平府清河縣是刺史處士韋月將上書告武三思潛通宫掖必為逆亂上大怒命斬之黃門侍郎宋璟奏曰人言中宫私于三思升下不問而誅之臣恐天下必有竊議固請按之上不許璟曰必欲斬月將請先斬臣不然臣終不敢奉詔上怒少解御史大夫蘇珦大理卿尹思貞皆以為方夏行戮有違時令上乃命杖而流之嶺南過秋分一日平曉廣州都督周仁軌斬之御史大夫李承嘉附武三思詆尹思貞于朝思貞曰公附會姦臣將圖不軌先除忠臣邪承嘉怒劾奏思貞出為青州刺史武三思惡宋璟出之檢校貝州刺史六月貶敬暉桓彥範張柬之袁恕已崔元暐為逺州司馬先是武三思惡敬暉等居京師出為諸州刺史暉滑桓彥彥範洛州袁恕已豫州尋復左遷逺州暉郎州崔元暐均州彥範亳州恕已郢州郎州隋置今湖南常德府是餘見前至是三思使鄭愔告暉等與王同皎通謀貶暉崖州唐置今廣東瓊州府澄邁縣是今府屬之崖州乃宋吉陽軍明洪武初更名彥範瀧州梁置今廣東羅定州是束之新州梁置今肇慶府新興縣是恕已竇州唐置今髙州府信宜縣是元暐白州唐置今廣西欎林州博白縣是司馬員外長任削其勳封初楊元琰見武三思浸用事請棄官為僧上不許敬暉聞而笑之元琰曰功成名遂不退將危此由𠂻之請非徒然也及暉等得罪元琰獨免秋七月立衛王重俊為皇太子太子性明果而官屬率貴逰子弟所為多不法左庶子姚珽璹之弟屢諫不聽流敬暉桓彥範張柬之袁恕已崔元暐等尋為武三思所殺武三思陰令人疏皇后穢行榜于天津橋請加廢黜上大怒命李承嘉窮核其事承嘉奏言敬暉等所為請族誅之上可其奏大理承李朝隱字光國京兆三源人奏稱暉等未經推鞫不可遽就誅夷乃長流暉等崔湜説三思遣使矯制殺之三思既殺五王勢傾人主常言我不知代間何者謂之善人何者謂之惡人但于我善者則為善人于我惡者則為惡人耳時宗楚客宗晉卿紀處納甘元東皆為三思羽翼周利用冉祖雍李俊宋之遜姚紹之皆為三思耳目時人謂之五狗丁未景龍元年春二月復崇恩廟武氏死廟廢又復之上遣武攸暨三思詣乾陵祈雨既而雨降大喜制復武氏崇恩廟齋郎取五品子充太常博士楊孚曰太廟皆取七品以下子為齋郎今崇恩廟取五品子未知太廟當如何上令太廟亦準崇恩廟孚曰以臣準君猶為僭逆況以君準臣乎上乃止右補闕權若納上疏曰天地日月等字皆則天能事賊臣敬暉等輕紊前規請復存之以光孝理又神龍制書並依貞觀故事豈可近捨母儀逺尊祖德疏奏手制褒美尋敕自今奏事不得言中興夏六月丁卯朔日食秋七月太子重俊起兵誅武三思武崇訓兵潰而死韋氏以太子重俊非其所生惡之武三思尤忌太子上官媫好以三思故每下制敕推尊武氏駙馬武崇訓又教安樂公主請廢太子太子積不能平與李多祚等矯制發羽林兵三百餘人殺三思崇訓于其第又使成王千里太宗孫分兵守宫城諸門太子與多祚斬關而入叩閣索上官媫妤上乃與韋后安樂公主上官媫妤登元武門樓以避之宫闈令楊思朂擊斬多祚前鋒多祚軍奪氣上俯謂多祚所將千騎曰汝輩皆朕宿衛之士何為從多祚反茍能斬反者勿患不冨貴于是千騎斬多祚等餘衆皆潰千里攻延明門將殺宗楚客紀處納不克而死太子亦為左右所殺上以其首獻太廟及祭三思崇訓之柩然後梟之朝堂官屬不敢近永和隋縣今屬山西隰州縣丞寧嘉朂號哭解衣裹之坐貶安樂公主請以崇訓墓為陵給事中盧粲駁之公主怒出粲為陳州刺史襄邑尉席豫聞公主求為太女歎曰梅福譏切王氏獨何人哉乃上書請立太子言甚深切大平公主欲表為諫官豫耻之逃去安樂公主及兵部尚書宗楚客使侍御史冉祖雍等誣奏相王及太平公主與重俊通謀上使御史中丞蕭至忠鞫之至忠泣曰陛下不能容一弟一妹而使人羅織害之乎相王昔為皇嗣固請以天下讓陛下纍日不食陛下奈何疑之上素友愛事遂寢右補闕吳兢上疏曰國家枝葉無幾陛下登極未久而一子以弄兵受誅一子以愆違逺竄惟餘一弟朝夕左右尺布斗粟之譏不可不慎青蠅之詩良可畏也相王寬厚恭謹安恬好讓故免于難席豫字建侯襄陽人蕭至忠沂州丞人吳兢汴州浚儀人貶魏元忠為務川隋縣元改婺川今屬貴州思南府尉道卒元忠以武三思擅權意常憤鬱及太子重俊起兵遇元忠子太僕少卿升于永安門脅以自隨太子死升為亂兵所殺元忠揚言曰元惡已死雖鼎鑊何傷但惜太子殞殁耳宗楚客等共誣元忠與太子通謀請夷三族制不許元忠懼表請致仕楚客等又使御史中丞姚廷筠劾之貶渠州梁置今四川順慶府渠縣是司馬又令給事中冉祖雍奏元忠不應佐州乃貶務川尉行至涪陵隋縣故城在今四川重慶府涪州而卒習藝館內教蘇安恆矜髙好竒太子之誅武三思也安恆自言此我之謀太子敗或告之遂見殺冬十二月乙丑朔日食遣使詣江淮贖生中書舍人李乂字尚貞趙州房子人諫曰江南鄉人採捕為業魚鱉之利黎元所資江湖生育無限府庫供支易殫與其拯物豈若憂人且鬻生之徒惟利斯視錢刀日至網罟年滋施之一朝營之百倍未若回救贖之錢物減貧無之徭賦活國愛人其福勝彼戊申二年春二月赦宫中言皇后衣笥裙上有五色雲起上令圖以示百官侍中韋巨源安石從子請布之天下從之乃赦天下迦葉復姓音加涉天竺梵語志忠奏昔神堯未受命天下歌桃李子文皇未受命天下歌秦王破陳樂則天未受命天下歌嫵媚娘隋時有此曲永徽後民間復歌之皇后未受命天下歌桑條韋永徽末民間有桑條韋也也女時韋也樂之歌上桑韋歌十二篇請編之樂府皇后祀先蠶則奏之太常卿鄭愔又引而申之皆受厚賞三月朔方總管張仁願本名仁亶避諱改華州下邽人築三受降城中受降城在今吳喇忒旗西黃河北岸元和志本秦九原近地漢更名五原東受降城在今歸化城西黃河東岸元和志本漢雲中郡地西受降城在今吳喇忒旗西北黃河北岸元和志本漢朔方郡臨河縣故理處初朔方軍與突厥以河為境時默啜悉衆西擊突騎施西突厥别部其可汗烏質勒居碎業川神龍中遣子入朝封懷德郡王是嵗死子娑葛襲封爵仁願請乘虛奪取漠南地于河北築三受降城首尾相應以絶其南冦之路六旬而成以拂雲祠拂雲堆在今吳喇忒旗西北唐書堆上有祠突厥將入冦必先詣祠祭酹求福因牧馬料兵候氷合渡河為中城距東西城各四百餘里皆據津要于牛頭朝那山在今吳喇忒旗東蒙古名雞藍拖羅海北置烽候千八百所自是突厥不敢度山畋牧減鎮兵數萬人仁願建城不置壅門守具或問之仁願曰兵貴進取冦至當併力出戰回首望城者斬之安用守備生其退恧之心也其後常元楷為總管始築壅門人以是重仁願而輕元楷即壅門門外築垣以遮壅城門今甕城也夏四月置修文館學士劉友益曰以學士名官始見于此置修文館學士選公卿善為文者李嶠等二十餘人為之陪侍逰宴賦詩屬和使上官昭容上官媫妤于是冬始進昭容此蓋史臣追敘之文第其甲乙于是天下靡然爭以文華相尚儒學忠讜之士莫不進矣秋七月始用斜封墨敕除官安樂長寧公主上官媫妤皆依勢用事請謁受賕雖屠沽臧獲用錢三十萬别降墨敕除官斜封付中書時人謂之斜封官其員外同正試攝檢校判知官胡三省注有員外置之官有員外同正之官有試官有攝官有檢校官判謂判某官事知謂知某官事也凡數千人皆不由兩省而授兩省不敢執奏即宣示所司吏部員外郎李朝隱前後執破一千四百餘人怨謗紛然朝隱一無所顧媫妤立外第出入無節朝士往往從之逰處以求進逹安樂公主九驕橫宰相以下多出其門奪民田作定昆池延袤數里以上好擊毬灑油以築毬場上及皇后公主多營佛寺左拾遺卒替否上疏曰臣聞古之建官買不必備故士有完行家有亷節朝廷有餘俸百姓有餘食今陛下百陪行賞十陪增官使府庫空竭流品混淆陛下又以愛女之故竭人之力費人之財奪人之家愛數子而取三怨使戰士不盡力朝士不盡忠人既散矣獨提所愛何所歸乎若以造寺必為理體飬人不足經邦緩其所急急其所緩一旦風塵再擾霜雹荐臻沙彌不可操干戈寺塔不足攘飢饉臣竊惜之疏奏不省人辛替否字協時京北萬年冬十一月突騎施娑葛犯塞將軍牛師奬戰沒遂赦娑葛立為可汗初娑葛統有父衆烏質勒有衆三十萬娑葛既立遂皆統之與其將闕啜忠節交怨數相攻擊總管郭元振奏追忠節入朝宿衛忠節行遇經略使周以悌以悌教忠節以千金賂宗楚客等願無入朝請導吐蕃擊娑葛以報忠節如其言楚客等即以御史中丞馮嘉賔持節安撫忠節侍御史李守素處置四鎮以將軍牛師奬為安西副都護發甘涼兵兼徴吐蕃以討娑葛忠節逆會嘉賔娑葛遣兵襲之生擒忠節殺嘉賔守素牛師奬與戰敗沒娑葛遂陷安西斷四鎮路遣使上表求楚客頭楚客表周以悌代元振娑葛遺元振書言我無仇于唐宗尚書受闕啜金欲加擊滅故懼死而鬬元振遣子具奏其狀乞留定西土以悌竟坐流白州赦娑葛罪册為十四姓可汗徴武攸緒入朝時以安樂公主適武延秀延秀美儀容善歌舞公主悅之及崇訓死遂以延秀尚焉召武攸緒于嵩山敕禮官于兩儀殿設位行問道之禮令攸緒以山服見不名不拜攸緒至趨立辭見班中再拜而退屢加寵錫皆辭不受親貴謁候寒溫之外不交一言起居舍人武平一名甄以字行士彠從曽孫亦表請抑損外戚權寵不敢斥言韋氏但請抑損已家優制不許十二月召王公近臣入閣守嵗敕中書門下與學士諸王駙馬入閣守嵗設廷燎置酒奏樂酒酣上謂御史大夫竇從一日聞卿久無伉儷今夕為卿成禮從一拜謝俄而內侍引燭籠步障金縷羅扇其後有人衣禮衣花叉令與從一對坐却扇易服乃皇后老乳母王氏本蠻婢也上與侍臣大笑詔封莒國夫人嫁為從一妻俗謂乳母之壻曰何㸙從一每奏表狀自稱翊聖皇后阿㸙欣然有自負之色己酉三年春正月帝幸元武門觀宫女拔河戲名以麻絙巨竹分朋而挽水幸元武門與近臣觀宫女拔河又命宫女為市肆公卿為商旅與之交易因為忿爭言辭褻慢上與后臨觀為樂上每與近臣宴集令各效伎藝以為樂國子司業郭山惲獨歌鹿鳴蟋蟀明日賜山惲敕嘉美之又嘗宴侍臣使各為回波辭諫議大夫李景伯曰回波爾持酒巵微臣職在針規侍宴既過三爵喧譁竊恐非儀上不悅蕭至忠曰此真諫官也嘗幸定昆池命從官賦詩黃門侍郎李日知詩曰所願暫思居者逸勿使時稱作者勞郭山惲河東人三月以韋巨源楊再思為左右僕射同三品宗楚客為中書令蕭至忠為侍中韋嗣立同三品崔湜趙彥昭字無然張掖人同平章事時政出多門濫官充溢人以為三無坐處謂宰相及御史員外官也監察御史崔琬對仗彈宗楚客紀處納潛通戎狄受其貨賂致生邊患故事大臣被彈俯僂趨出立于廟堂待罪至是楚客更忿怒作色目陳忠鯁為琬所誣上竟不窮問命琬與楚客結為兄弟以和解之時人謂之和事天子夏五月流鄭愔于吉州隋置今江西吉安府是貶崔湜為江州司馬崔湜鄭愔俱掌銓衡傾附勢要贓賄狼籍選法大壞御史靳恆李尚隱萬年人對仗彈之下獄流貶逺州湜先通于上官昭容及貶昭容密為申理乃以湜為襄州刺史冬十一月祀南郊上將祀南郊國子祭酒祝欽明字文思京兆始平人司業郭山惲建言古者大祭祀后祼獻以瑶爵皇后當助祭天地太常博士唐紹長安人臨之子蔣欽緒萊州膠水人以為周禮惟有助祭先王先公無助祭天地之文侍中韋巨源請依欽明議上乃以皇后為亞獻宰相女為齋娘助執籩豆大赦齋娘有壻者皆遷官召崔湜鄭愔入陪大禮流人皆放還均州刺史譙王重福獨不得歸乃上表自陳曰陛下焚柴展禮郊祀上天蒼生並皆除赦赤子偏加擯棄天下之人為臣流涕況陛下慈念豈不愍臣恓惶表奏不報關中飢關中米斗百錢運山東江淮榖輸京師牛死什八九羣臣多請幸東都韋后家本杜陵不樂東遷使巫覡以不利東行説上後有言者上怒曰豈有逐糧天子邪乃止庚戌四年睿宗皇帝景雲元年春正月上觀燈于市里上與韋后微行縱宫女數千人出逰多不歸者上又御梨園命三品以上拋毬拔河韋巨源唐休璟衰老隨絙踣地不能興上及皇后妃主臨觀大笑夏四月幸隆慶池亦曰龍池在咸寧縣東南初武氏之世長安城東民家井溢浸成大池數十頃號隆慶池相王子五王列第于其北望氣者言常鬱鬱有帝王氣比日尤盛上幸池宴侍臣以厭之五月上宴近臣國子祭酒祝欽明自請作八風舞搖頭轉目備諸醜態欽明素以儒學著名盧藏用曰祝公五經掃地盡矣范盧藏用字子潛陽人六月皇后韋氏弒帝于神龍殿以裴談張錫同三品張嘉福岑羲崔湜同平章事立溫王重茂初定州人郎岌上言韋后宗楚客將為逆亂后殺之許州參軍燕欽融偃師人復上言皇后淫亂干預國政宗楚客圖危社稷上面詰之欽融抗言不撓楚客矯制撲殺之上意怏怏由是后及其黨始懼散騎常侍馬秦客光祿少卿楊均皆幸于后恐事泄安樂公主亦欲后臨朝以已為皇太女乃相與合謀于餅餤中進毒帝遂崩韋后祕不發喪召宰相入禁中徵諸府兵屯京城以裴談張錫同三品張嘉福岑羲崔湜同平章事太平公主與上官昭容謀草遺制立溫王重茂為太子皇后知政事相王旦參謀政事宗楚客曰相王于皇后嫂叔不通問聽朝之際何以為禮遂帥諸宰相表請罷相王政事乃發喪皇后攝政改元唐隆太子即位太子時年十六宗楚客等與諸韋勸后遵武后故事以韋氏子弟領南北軍楚客等又上書稱韋氏宜單唐命謀害少帝深忌相王及太平公主密與韋溫安樂公主謀去之韋溫韋后從父兄臨淄王隆基即元宗起兵討韋氏并其黨皆伏誅隆基為平王以鍾紹京虔州贛人劉幽求參知機務李日知同三品蕭至忠等貶官有差相王子臨淄王隆基罷潞州别駕在京師陰聚才勇之士密謀匡復羽林萬騎初太宗選官戶及蕃口驍勇者著虎文衣跨豹文韉謂之百騎武氏時增為千騎隸左右羽林中宗謂之萬騎隆基皆厚結其豪傑兵部侍郎崔日用滑州靈昌人素與宗楚客善以其謀告隆基隆基乃與太平公主及公主子薛崇暕紹之子苑總監鍾紹京尚衣奉御王崇曄前朝邑尉劉幽求折衝麻嗣宗謀先事誅之會韋播數榜捶萬騎萬騎皆怨果毅葛福順陳元禮見隆基訴之隆基諷以誅諸韋皆踴躍自效或謂隆基當啓相王隆基曰我曹為此以徇社稷事成福歸于王不成以身死不以纍王也且萬一不從將敗大計遂不啓微服與幽求等入苑中逮夜天星散落如雪幽求曰天意若此時不可失于是福順直入羽林營斬諸韋典兵者以徇曰韋后鴆殺先帝謀危社稷今夕當共誅之立相王以安天下敢有懷兩端助逆黨者罪及三族羽林士皆欣然聽命隆基勒兵入元武門諸衛兵皆應之斬韋后及安樂公主武延秀上官昭容幽求曰衆約今夕共立相王何不早定隆基止之比曉內外皆定隆基乃出見相王叩頭謝不先白之罪相王曰社稷宗廟不墜于地汝之力也遂迎相王入輔少帝閉城門收捕諸韋親黨及宗楚客晉卿紀處訥趙履溫張嘉福馬秦客楊均葉靜能等皆斬之尸韋后于市諸韋襁褓兒無免者封隆基為平王押左右廂萬騎賜崇暕爵立節王以紹京守中書侍郎幽求守中書舍人並參知機務武氏宗族誅竄殆盡以李日知鍾紹京並同三品隆基二奴王毛仲髙麗人李守德皆超拜將軍諸宰相蕭至忠等貶官有差相王旦即位是為睿宗廢重茂復為溫王劉幽求言于隆基請相王早即位以鎮天下遂以少帝制傳位相王時少帝猶在御座太平公主進曰天下之心已歸相王此非兒座遂提下之相王遂即位以少帝為溫王置于內宅立平王隆基為皇太子上將立太子以宋王成器嫡長平王隆基有功疑不能決成器辭曰國家安則先嫡長危則先有功茍違其宜四海失望臣死不敢居平王之上劉幽求曰除天下之禍者當享天下之福平王拯社稷之危救君親之難論功語德無可疑者上從之加太平公主實封萬戶公主沈敏多權略武氏以為類已獨愛幸及誅張易之公主有力焉中宗之世韋后安樂皆畏之又與太子共誅韋氏既屢立大功益尊重上嘗與之議政宰相進退係其一言薦士驟厯清顯者不可勝數權傾人主其門如市秋七月追復故太子重俊位號及敬暉桓彥範崔元暐張柬之袁恕已李多祚等官爵追復故太子重俊位號諡曰節愍太府少卿韋湊字彥宗萬年人上言漢戾太子困于江充之讒發忿殺充兵敗而死及其孫為天子猶諡曰戾況重俊可諡之曰節愍乎臣恐後之亂臣賊子得引以為比非所以彰善疸惡也請改其諡多祚等重從俊興兵不為無罪今宥之可也名之為雪亦所未安上然其言而執政以為制命已行但停多祚贈官而已時又追贈韋月將郎岌燕欽融官爵各有差以宋璟同三品璟與姚元之協心革中宗弊政進忠良退不肖賞罰盡公請託不行紀綱修舉當時翕然以為復有貞觀永徽之風廢崇恩廟追廢韋后安樂公主為庶人八月譙王重福反伏誅韋后之臨朝也鄭愔貶過均州與譙王重福謀舉兵誅韋氏未發而韋氏敗洛陽人張靈均説重福曰大王地居嫡長當為天子相王雖有功不當立王若潛入洛陽發屯兵殺留守天下指麾可定重福從之時愔左遷過洛陽與靈均結謀聚徒以俟重福重福與靈均詐乘驛入東都縣官馳白留守洛陽長史崔日知字子駿日用從父兄帥衆討之重福窘迫赴漕渠溺死愔與靈均皆伏誅初愔附來俊臣得進俊臣誅附張易之易之誅附韋氏韋氏敗又附重福竟坐族誅罷斜封官用姚元之宋璟及御史大夫畢構之言也所罷凡數千人已而殿中侍御史崔涖希太平公主意上言罷斜封官人失其所怨積于下恐有非常之變乃下詔盡復之冬十月以薛訥字慎言仁貴子為幽州經略節度大使節度使之名自訥始訥鎮幽州二十餘年吏民安之未嘗舉兵出塞虜亦不敢犯十一月葬定陵在西安府富平縣西北龍泉山下朝議以韋后有罪不應祔葬乃追諡故英王妃趙氏為和思皇后招魂袝葬許公蘇瓌卒諡曰文貞制起復瓌子頲為工部侍郎頲固辭上使李日知諭旨日知還奏曰臣見其哀毁不敢發言上乃聽其終制十二月加李朝隱大中大夫宦者閻興貴以事屬長安令李朝隱朝隱繫之獄上聞之召見朝隱勞之因御承天門集百官宣示朝隱所為且下制稱宦官遇寬柔之代必弄威權朕覽前載每所歎息能副朕意實在斯人可加中大夫賜中上考時侍御史楊孚彈斜不避權貴權貴毁之上曰鷹摶狡兔須急救之不爾必反為所噬御史繩姦慝亦然茍非人主保衛之則亦為姦慝所噬矣以宋璟為吏部尚書姚元之為兵部尚書舊制三品以上官册授五品以上制授六品以下敕授皆委尚書省奏擬文屬吏部武屬兵部中宋之末選舉混淆至是以宋璟為吏部尚書李乂盧從願字子龔臨漳人為侍郎皆不畏強禦請謁絶路人服其公以姚元之為兵部尚書陸象先元方子盧懷慎為侍郎武選亦治貶祝欽明郭山惲為諸州長史侍御史倪若水字子泉恆州藁城人彈奏欽明山惲亂常改作希旨病君于是左授御批厯代通鑑輯覽卷五十三

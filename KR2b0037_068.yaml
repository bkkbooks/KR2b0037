  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_068-1a, image: WYG0337/WYG0337-0679a.png}
body:
  text: 安重榮既誅晉改鎮州成徳軍為恒州順國軍以杜重威為節度使重威奉王瑜范陽人為副使瑜為重歛于民恒人不勝其苦二月唐以宋齊邱知尚書省尋罷之齊邱固求豫政事唐主聴入中書又求領尚書乃以齊邱知尚書省事親吏夏昌圖盗官錢三千緡齊邱判貸其死唐主大怒斬昌圖齊邱稱疾請罷從之夏四月晉貶張彦澤突厥部人徙太原為龍武大將軍彦澤先為彰義涇州軍號節度使殺其掌書記張式决口剖心斷其四支式父鐸詣闕訟寃晉主以河陽帥王周代彦澤鎮涇州彦澤還至陜獲亡將楊洪乘醉斷其手足而斬之王周奏彦澤在鎮不法二十六條民㪚亡者五千餘户彦澤既至晉主以其有軍功釋不問諫議大夫鄭受益從讜兄子上言彦澤凶殘無所忌憚見聞之人無不切齒而陛下一無詰讓中外皆言陛下受其獻馬百匹聴其如是竊為陛下惜此惡名乞正彦澤罪法以湔洗聖徳疏奏留中刑部郎中李濤等伏閣極論彦澤罪語甚切至敕彦澤削一階降爵一級濤復與兩省及御史臺官伏門奏請論如法晉主召濤面諭之濤端笏前廹殿陛論辯聲色俱厲晉主怒連叱之濤不退晉主曰朕已許彦澤不死濤曰陛下許彦澤不死不可負不知范延光鐡劵安在晉主拂衣起入禁中既而有是命漢主龑殂子玢立漢主龑寢疾以其子秦王洪度晉王洪熙皆驕恣少子越王洪昌龑諸子名俱依歐史輯孝謹有智識與右僕射王翷謀龑曰吾子孫不肖後世如鼠入牛角當漸小爾因泣下歔欷欲出洪度洪熙而立洪昌會崇文使蕭益入問疾以其事訪之益曰立嫡以長違之必亂乃止龑為人辯察多權術好自矜大嘗謂中國天子為洛州刺史窮奢極麗悉聚南海珍寶以為玉堂珠殿困刑慘酷有灌鼻割舌支解刳剔炮炙烹蒸之法或聚毒蛇水中以罪人投之謂之水獄每視殺人則不勝其喜不覺朶頤垂涎吥呷人以為真蛟蜃也末年尤精忌以士人多為子孫計故專任宦者由是其國宦者大盛及殂洪度即位更名玢以洪熙輔政五月唐以宋齊邱為鎮南節度使齊邱既罷不復朝謁唐主遣夀王景遂勞問許鎮洪州始入朝唐主與之宴酒酣齊邱曰陛下中興臣之力也奈何忘之唐主怒曰公以遊客干朕今為三公亦足矣齊邱曰臣為遊客時陛下乃偏禆耳明日唐主手詔謝之曰朕之褊性子嵩所知少相親老相怨可乎乃以齊邱鎮洪州六月晉主敬瑭殂兄子齊王重貴立是為晉出帝遼主以晉招納吐谷渾遣使來讓晉主憂悒成疾一旦馮道獨對晉主命幼子重睿出拜之又令宦者抱置道懐中葢欲道輔立之六月晉主殂時晉主在鄴都殂于保昌殿道與侍衛馬歩都虞候景延廣議以國家多難宜立長君乃奉齊王重貴為嗣是日即位延廣始用事禁人偶語初髙祖晉主敬瑭廟號髙祖疾亟有㫖召劉知逺入輔政晉主重貴寢之知逺由是怨秋七月閩富沙王延政攻汀州不克歸敗福州兵于尤口尤漢口也在延平府南平縣南漢循州盗張遇賢作亂有神降于博羅縣秦置今屬惠州府民家縣吏張遇賢事之甚謹時循州盗賊羣起莫相統一共禱其神神大言曰張遇賢當為汝主于是羣帥共奉遇賢為主攻掠海隅遇賢年少無他方畧諸將但告進退而已漢主遣越王洪昌循王供杲討之戰不利為賊所圍指揮使陳道庠端州人等力戰救之得免東方州縣多為遇賢所䧟後遇賢為漢所敗告于神神曰取虞州則大事可成遇賢遂趣䖍州唐將違縞白昌裕屢破之遇賢禱于神神不從言其黨大懼執遇賢以降斬于金陵市邊鎬昇州人白昌裕􅐚州人八月晉討襄州拔之安從進伏誅髙行周圍襄州踰年不下奉國軍都虞候王清字去瑕曲周人曰賊城已危我師已老民力已困不早逼之尚何俟乎與指揮使劉詞字好謙元城人帥衆先登拔之從進舉族自焚冬十一月晉復行官賣鹽法先是河南北諸州官自賣海鹽歲収緍錢十七萬人散蠶鹽所以襄繭斂民錢言事者稱民坐私販鹽抵罪者衆不若聽民自販而歲以官所賣錢直斂于民謂之食鹽錢髙祖從之俄而鹽價頓賤毎斤至十錢至是三司使董遇欲増求羡利而難于驟變前法乃重征鹽商過者七錢留賣者十錢由是鹽商殆絶而官復自賣其食鹽錢斂之如故十二月閩以李仁遇同平章事仁遇閩主曦之甥也年少美姿容得幸于曦以為左僕射與吏部侍郎李光凖並同平章事曦滛侈無度資用不給國計使陳匡範增算商之法以獻曦大悦曰匡範人中寶也已而歲入不登其數乃借于民以足之匡範以憂死曦後知其借于民也剖棺斷尸棄之冰中泉州刺史余廷英貪穢畧人子女事覺下吏廷英獻買宴錢萬緡曦召見曰宴已買矣皇后貢物安在廷英復獻錢于后未幾遂以廷英為相于是校書郎陳光逸上書陳曦大悲五十事曦怒殺之癸晉天福八年南唐李璟保大元年殷王廷政天徳夘元年南漢劉晟乾和元年是歲并殷凡六國三鎮春二月晉主還東都晉主即位于鄴都及是始還汴晉主之初即位也大臣議奉表稱臣告哀于契丹景延廣請致書稱孫而不稱臣李崧曰陛下如此他日必躬擐甲胄與遼戰于時悔無益矣延廣固爭馮道依違其間晉主卒從延廣議遼主大怒遣使來責讓延廣復以不遜語答之遼盧龍節度使趙延壽欲代晉帝中國屢説遼主擊晉遼主頗然之晉主聞遼將南侵還東京然猶與遼問遺相往來無虚月唐主昪殂唐宣城王景逹剛毅開爽唐主愛之屢欲以為嗣宋齊邱亟稱其才唐主以璟年長而止嘗如璟宫遇璟親調樂器大怒數日㓜子景逷母种氏有寵乘間言景逷可為嗣唐主怒曰子有過父訓之常事也國家大計女子何得預知即命嫁之方士獻丹餌之浸成躁急羣臣奏事往往暴怒然有論辯中理者亦歛容謝之問道士王栖霞何道可致太平對曰王者治心治身乃治國家今陛下尚未能去飢嗔飽喜何論太平凡所賜予皆不受駕部郎中馮延己本彭城人徙歙州為齊王掌書記性傾巧與宋齊邱及陳覺相結又有魏岑者亦在齊府給事中常夢錫字孟圖扶風人屢言覺延己岑皆佞邪小人不宜侍東宫司門郎中蕭儼廬陵人亦表覺姦囬亂政唐主頗悟未及去㑹疽發背疾亟太醫吳廷裕遣親信召齊王璟入侍疾唐主謂曰吾餌金石始欲益壽乃更傷生汝宜戒之是夕殂秘不發䘮下制以齊王監國孫晟恐馮延已等用事欲稱遣詔令太后臨朝稱制翰林學士李貽業蔚從曾孫曰先帝常云婦人預政亂之本也安肯自為厲階此必近習奸人之詐也且嗣君春秋已長明徳著聞公何得遽為亡國之言若果宣行吾必對百官毁之晟乃止閩富沙王延政稱帝于建州國號殷延政稱帝以潘承祐為吏部尚書楊思恭建陽人為兵部尚書未幾以承祐同平章事思恭遷僕射録軍國事國小民貧軍旅不息思恭以善聚斂得幸増田畆山澤之税至于魚鹽蔬果無不倍徴國人謂之楊剝皮已而承祐上書陳十事首以兄弟相攻為言延政大怒削承祐官爵放歸私第三月唐主璟立唐主即位大赦改元秘書郎韓熙載請俟踰年改元不從唐主為人謙謹不名大臣數延公卿論政體李建勲謂人曰主上寛仁大度優于先帝但性習未定茍旁無正人恐不能守先帝之業耳宋齊邱待陳覺素厚唐主亦以為才委任之馮延巳延魯魏岑皆依附覺與查文徽更相汲引侵蠧政事唐人謂之五鬼馮延魯字叔文延己之弟一名謐查文徽字先慎休寧人漢晉王洪熙殺其主玢而自立更名晟漢主玢驕奢不親政事居䘮無禮左右忤意輒死無敢諌者惟越王洪昌及内常侍吳懐恩屢諫不聽常猜忌諸弟晉王洪熙欲圖之乃盛飾聲妓娯悦其意以成其惡玢好手摶洪熙令指揮使陳道庠引力士劉思潮等五人習手摶洪熙與諸王宴而觀之至夕大醉洪熙使道庠思潮等掖漢主因拉殺之洪熙即位更名晟以洪昌為大尉道庠等皆受賞賜甚厚晟既立國中議論洶洶循王洪杲請斬劉思潮等以謝中外不從思潮等誣洪杲謀反殺之于是晟欲盡殺諸弟以越王洪昌賢而得衆先遣盗刺殺之其後諸弟洪澤等俱見殺而劉思潮等亦被誅夏四月戊申朔日食秋七月晉遣使括民榖詔以年饑國用不足分遣使者六十餘人于諸道括民榖唐主立其弟景遂為齊王景逹為燕王唐主縁烈祖李昇廟號烈祖意以景遂為諸道兵馬元帥徙封齊王居東宫景逹為副元帥徙封燕王宣告中外約以傳位景遂景逹固辭不許景遂自誓必不敢為嗣更其字曰退身人立景逷為保寧王宋太后怨种夫人屢欲害景逷唐主力保全之九月晉執遼回圖使回圖務之使也主典互市回圖務注見前喬榮既而歸之初河陽牙將喬榮從趙延壽入遼遼以為回圖使往來販易于晉置邸大梁至是景延廣説晉主囚榮于獄凡遼人販易在晉境者皆殺之奪其貨大臣皆言遼不可負乃釋榮慰賜而歸之榮辭延廣延廣大言曰歸語而主先帝為北朝所立故稱臣奉表今上乃中國所立所以降志于北朝者正以不敢忘先帝盟約故耳為隣稱孫足矣無稱臣之理翁怒則來戰孫有十萬横磨劎足以相待他日為孫所敗取笑天下毋悔也榮欲為異時據騐乃曰公所言頗多懼有遺忘願記之紙墨延廣命吏書其語以授之榮具以白遼主遼主大怒南侵之志始决晉使如遼者皆縶之桑維翰屢請遜辭以謝遼主每為延廣所沮晉以延廣有定䇿功寵冠羣臣又總宿衛兵故大臣莫能與之爭河東節度使劉知逺知延廣必召兵而不敢言但益募兵増置十餘軍以備遼冬十月晉主立其叔母馮氏為后初髙祖愛少弟重𦙍飬以為子娶馮濛定州安喜人女為其婦重𦙍早卒馮夫人寡居有美色晉主初立納之至是立以為后頗預政事兄玉字景臣時為鹽鐵判官擢為端明殿學士與議政事十二月晉楊光逺誘遼南侵初晉髙祖以馬三百借平廬節度使楊光逺景延廣以詔命取之光逺怒密告于遼以晉境大飢乘此攻之一舉可取趙延壽亦勸之遼主乃集兵五萬使延壽將之經畧中國曰若得之當立汝為帝延壽信之為盡力朝廷頗聞其謀遣使城南樂及徳清軍晉置故城在今大名府清豐縣西北徴近道兵以備之唐以宋齊邱為青陽唐縣今属池州府公遣歸九華唐侍中周宗年老謹恭中書令宋齊邱樹黨傾之宗泣訴于唐主唐主由是薄齊邱齊邱忿懟表乞歸九華舊隱唐主知其詐一表即從之仍賜號九華先生封青陽公齊邱乃治大第于青陽服御將吏皆如王公而憤邑益甚晉旱水蝗民大饑是歲晉境春夏旱秋冬水蝗大起原野山谷城郭廬舍皆滿竹木葉俱盡重以官括民榖使者督責嚴急不留其食有坐匿榖抵死者縣令往往納印自劾去民餒死者數十萬口流亡不可勝數朝廷以恒定飢甚獨不括民榖杜威即杜重威避晉主諱去重奏請如例用判官王緒謀檢索殆盡得百萬斛威止奏三十萬斛餘皆入其家又令判官李沼稱貸于民復滿百萬斛闔境苦之定州吏欲援例為奏節度使馬全節不許曰吾為觀察使節度兼觀察職在養民豈忍效彼所為乎楚作九龍殿楚王希範奢欲無厭務窮侈靡作九龍殿刻沉香為八龍餙以金寶抱柱相向希範居中自言身一龍也先是楚地多産金銀茶利尤厚故財貨豐殖及是用度不足重為賦歛民多逃亡各失其業又用孔目官周陟議令常税之外大縣貢米二千斛中千斛小七百斛無米者輸布帛天䇿學士拓拔恒上書曰殿下長深宫之中藉已成之業身不知稼穯之勞耳不聞鼔鼙之音馳驅遊遨雕牆玉食府庫盡矣而浮費益甚百姓困矣而厚歛不息今淮南為仇讎之國番禺懐吞噬之志荆渚日圖窺伺溪洞待我姑息諺曰足寒傷心民怨覆國願罷輸水之令誅周陟以詌郡縣去不急之務减興作之役無令一旦禍敗為四方所笑希範大怒他日請見辭以晝寢桓謂客將曰王逞欲而愎諫吾見其干口飄零無日矣希範益怒遂終身不復見之甲晉開運元年是歲辰凡六國三鎮閩亡春正月遼克晉貝州權知州事吳巒死之晉遣兵以禦遼遼前鋒將趙延壽趙延照思温之子將兵南侵逼貝州先是朝廷以貝州水陸要衝多聚芻粟為大軍數年之儲軍校邵珂性凶悖節度使王令温河間人黜之珂怨望密遣人亡入遼言貝州易取㑹令温入朝執政以吳巒權知州事巒至而遼兵至巒書生無爪牙珂請效死巒使將兵守南門自守東門遼主自攻貝州巒悉力拒之燒其攻具殆盡珂引遼軍自南門入巒赴井死遼遂破貝州所殺且萬人晉以髙行周為都部署與符彦卿皇甫遇常山人等將兵禦之唐主敕齊王景遂參决庶政既而罷之唐主决欲傳位于齊燕二王翰林學士馮延己等因之欲隔絶中外以擅權請敕齊王景遂參决庶政百官惟魏岑查文徽得白事餘非召對不得見唐主從之國人大駭給事中蕭儼上疏極論不報侍衛都虞侯賈崇叩閤求見曰臣事先帝三十年觀其延接疏逺孜孜不怠下情猶有不通者陛下新即位所任者何人而頓與羣臣謝絶臣老矣不得復奉顔色因涕泗嗚咽唐主感悟遽収前敕唐主于宫中作髙樓召侍臣觀之衆皆歎美蕭儼曰恨樓下無井唐主問其故對曰以此不及景陽樓耳唐主怒貶于舒州觀察使孫晟遣兵防之儼曰儼以諫諍得罪非有他惠昔顧命之際君幾危社稷其罪顧不重于儼乎今日反見防邪晟遂罷之晉主自將次澶州遣劉知逺杜威張彦澤將兵禦遼晉主以景延廣為御營使髙行周以前軍先發時用兵方畧號令皆出延廣延廣乘勢使氣陵侮諸將雖天子亦不能制晉主發東京遼兵至黎陽晉主至澶州遼主屯元城遼别將宼太原劉知逺與白承福合兵擊之詔以知逺為招討使杜威為副使馬全節為都虞候遣張彦澤等將兵拒遼于黎陽復遣譯者致書于遼求修舊好遼主復書曰已成之勢不可改也太原奏破遼偉王于秀容遼兵遁去二月遼兵渡河晉主遣李守貞河陽人等分道擊之遼兵敗走晉博州刺史周儒降遼又與楊光逺通情引遼兵自馬家口濟河營于東岸攻鄆州北津以應楊光逺晉遣李守貞皇甫遇梁漢章應州人薛懐讓太原人將兵萬人緣河水陸俱進遼兵圍髙行周符彦卿及先鋒使石公覇于戚城先是景延廣令諸將分地而守無得相救行周等告急延廣徐白晉主晉主自將救之遼兵解去三將泣訴救兵之緩幾不免守貞等至馬家口遼遣歩卒萬人築壘散騎兵于其外餘兵數萬屯河西渡未已晉兵薄之遼騎兵退走晉兵進攻其壘拔之遼兵大敗溺死數千人俘斬亦數千人河西之兵慟哭而去由是不敢復東初遼主得貝州博州皆撫慰其人或拜官賜服章及敗于戚城馬家口忿患所得民皆殺之由是晉人憤怒戮力爭奮晉定難節度使李彝殷彜超之弟侵遼以救晉晉詔劉知逺擊遼知逺屯樂平注見前不進三月遼侵晉澶州不克引還遼主偽棄元城去伏精騎于古頓邱在衛輝府濬縣詩送子渉淇至于頓邱即此以俟晉軍與恒定之兵合而擊之鄴都奏虜已遁去大軍欲進追之㑹霖雨而止遼人馬飢疲趙延壽曰晉軍悉在河上畏我鋒鋭必不敢前不如即其城下四合攻之奪其浮梁則天下定矣遼主從之三月朔自將兵十餘萬陳于澶州城北髙行周與戰自午至晡互有勝負遼主以精兵當中軍而來晉主亦出陳以待之遼主望見晉軍之盛謂左右曰楊光逺言晉兵半以餒死今何其多也以精騎左右畧陳晉軍不動萬弩齊發飛矢蔽地遼兵稍郤兩軍死者不可勝數昏後遼兵引去遼主帳中小校亡來云遼主已得木書収軍北去景延廣疑有詐閉壁不敢追遼主北歸所過焚掠民物殆盡閩指揮使朱文進弑其主曦而自立閩拱宸都指揮使朱文進閤門使連重遇以前弑昶懼國人之討相與結昏以自固閩主曦心疑之曦嘗因醉殺控鶴指揮使魏從朗從朗朱連之黨也又嘗酒酣誦白居易詩云惟有人心相對間咫尺之情不能料因舉酒属二人二人大懼曦后李氏悍而酗酒以賢妃尚氏有寵妬之欲弑曦而立其子亞澄使人告文進重遇曰主上殊不平二公奈何㑹后父李真有疾曦往問之文進重遇使馬歩使錢逹弑曦于馬上召百官告之曰天厭王氏宜擇有徳者立之衆莫敢言重遇乃推文進升殿被衮冕帥羣臣北面稱臣文進自稱閩主悉収王氏宗族五十餘人皆殺之以重遇總六軍禮部尚書鄭元弼抗辭不屈文進殺之殷主延政遣統軍使吳成義將兵討文進不克文進遂稱藩于晉晉以為閩國王晉籍鄉兵毎七户共出兵械資一卒號武定軍時兵荒之餘復有此擾民不聊生夏四月晉主還大梁以景延廣為西京留守晉主命髙行周王周留鎮澶洲遂還大梁景延廣既為上下所惡晉主亦憚之桑維翰引其不救戚城之罪出西京留守以髙行周為侍衛馬歩都指揮使延光鬱鬱不得志日夜縱酒晉遣使分道括率民財晉因遼兵屢至國用愈竭復遣使者三十六人分道括率民財各封劎以授之使者多從吏卒携鎻械刀杖入民家大小驚懼求死無地州縣吏復因緣為姦河南府出緡錢二十萬景延廣率三十七萬延廣増率十七萬欲以入已留守判官廬億字子元河内人曰公位兼將相富貴極矣今國家不幸府庫空竭不得已取于民公何忍復因而求利為子孫之累乎延廣慙而止先是詔以楊光逺叛命兖州修守備節度使安審信以治樓堞為名率民財以寔私藏括率使至賦緡錢十萬㑹審信他出拘其守藏吏指取一囷已滿其數六月晉太尉侍中馮道罷以桑維翰為中書令兼樞密使道雖為首相依違兩可無所操決或謂晉主曰馮道承平之良相今艱難之際譬如使禪僧飛鷹耳乃以為匡國節度使或又謂晉主曰陛下欲禦北狄安天下非桑維翰不可遂復置樞密院以維翰為中書令兼樞密使事無大小悉以委之數月之間朝廷差治晉滑州河決發民塞之滑州河決浸汴曹單濮鄆五州之境詔大發數道丁夫塞之既塞晉主欲刻碑記其事中書舍人楊昭儉字仲寶長安人諫曰陛下刻石記功不若降哀痛之詔染翰頌美不若頒罪已之文晉主乃止晉以折從逺折西河大姓從逺字可乆雲中人為府州唐置今葭州府谷縣是團練使初晉髙祖割地以賂遼府州與焉㑹遼欲盡徙河西之民以實遼東州人大恐刺史折從逺因保險拒之及晉與遼絶從逺引兵深入拔十餘寨故有是命晉復置翰林學士以李慎儀為承㫖劉温叟字永齡洛陽人崇望從孫徐台符武彊人李澣范質字文素宗城人為學士秋八月晉以劉知逺為行營都統杜威為招討使督十三節度使以備遼桑維翰兩秉朝政出楊光逺景延廣于外至是一制指揮節度使十五人無敢違者時人服其膽畧時軍國多事咨請輻輳維翰隨事裁决初若不經思慮人疑其疎畧退而熟議之亦終不能易也然頗任愛憎恩怨必報人亦以是少之朔方節度使馮暉上章自陳未老可用而制書見遺維翰召學士使為答詔曰非制書忽忘寔以朔方重地非卿無以彈壓此欲移卿内地受代亦須竒材暉得詔甚喜遼兵之至也晉主再命劉知逺㑹兵山東皆不至晉主疑之謂所親曰太原殊不助朕必有異圖至是雖為都統而寔無􅎔制之權密謀大計皆不得預色知逺亦知見疎但慎事自守而已郭成見知逺有憂謂知逺曰河東山河險固風俗尚武士多戰馬静則勤稼穯動則習軍旅此覇王之資也何憂乎九月庚午朔日食冬十一月閩泉州牙將留從効泉州永春人等誅朱文進所署刺史黄紹頗傳首建州朱文進以其黨黄紹頗為泉州刺史散員指揮使留從効謂同列曰文進屠滅王氏遣腹心分據諸州吾属世受王氏恩而交臂事賊一旦富沙王克福州吾属死有餘愧衆以為然十一月各引軍中所善壯士夜飲于從効家從効紿之曰富沙王已平福州密㫖令吾属討黄紹頗諸君從吾言富貴可圖不然祸且至矣衆皆踊躍操白梃踰垣而入執紹頗斬之從効持州印詣王繼勲延正族子第請主軍府凾紹頗首遣副使陳洪進臨淮人家泉州齎詣建州延政以繼勲為泉州刺史從効洪進皆為都指揮使文進聞黄紹頗死大懼募兵攻泉州從効與戰大破之十二月晉師圍青州楊光逺之子承勲刦其父以降李守貞圍青州經時城中食盡遼援兵不至楊光逺遥稽首于遼曰皇帝皇帝誤光逺矣其子承勲勸光逺降兾全其族光逺不許承勲斬勸光逺反者判官邱濤等送其首于守貞縱火大譟刦其父出居私第上表待罪開城納官軍晉以光逺罪大而諸子歸命難于顕誅命守貞以便宜從事守貞遣人拉殺光逺以病死聞起復承勲為汝州防禦使後遼主入汴責承勲以殺父斬之閠月閩人討殺朱文進傳首建州先是殷主延政遣統軍使吳成義帥戰艦千艘攻福州㑹唐遣行營都虞候邊鎬等以兵擊延政屯建陽唐翰林待詔臧循與樞密副使查文徽同鄉里循嘗為賈人習知福建山川為文徽盡取建州之䇿文徽遂表請擊延政且言必克唐主從之遣邊鎬以兵從文徽及循伐殷至葢竹聞泉汀漳三州已降于殷退屯建陽臧循屯邵武為民所執送建州斬之武葢竹鎮名在建陽縣南建陽晋縣今屬建寧府邵三國吳置縣宋改軍今為府屬福建及是吳成義聞有唐兵詐使人告福州吏民曰唐助我討賊臣大兵今至矣福人益懼南廊承㫖林仁翰謂其徒曰吾曹世事王氏今受制賊臣富沙王至何面見之帥其徒三十人被甲趣連重遇第刺殺之斬其首以示衆曰富沙王且至汝輩族矣今重遇已死何不亟取文進以贖罪衆踊躍從之遂斬文進迎吳成義入城函二首送建州遼復侵晉遼復大舉侵晉趙延壽引兵先進至邢州晉主欲自拒之㑹有疾命天平節度使張從恩太原人為鄴都留守馬全節䕶國節度使安審琦㑹諸道兵屯邢州武寧節度使趙在禮屯鄴都遼主以大兵繼至建牙于元氏晉主憚遼之盛詔從恩等引兵稍郤于是忷懼無復部伍委棄器甲所過焚掠比至相州不復能整乙晉開運三年是歲凡五巳國三鎮殷改稱閩而亡春正月遼兵至相州引還晉主自將追之詔趙在禮還屯澶州馬全節還鄴都又遣張彦澤屯黎陽景延廣守胡梁渡在衛輝府滑縣東北是遼侵邢磁洺三州殺掠殆盡入鄴都境張從恩馬全節安審琦悉兵陳于相州安陽水即洹水注見前之南皇甫遇與濮州刺史慕容彦超吐谷渾部人將數千騎前覘遼兵至鄴都遇遼兵數萬遇等且戰且郤至榆林店遼兵大至二將謀曰吾屬今走死無遺矣乃止布陣自午至未力戰百餘合相殺傷甚衆遇馬斃歩戰其僕杜知敏以所乘馬授之戰稍解顧知敏已為遼所擒遇曰知敏義士不可棄也與彦超躍馬入陣取知敏而還俄而遼繼出新兵來戰二將曰吾屬勢不可走以死報國爾日且暮安陽諸將怪覘兵不還審琦即引騎兵出將救之從恩曰敵衆猥至盡吾軍恐未足以當之公往何益審琦曰成敗天也萬一不濟當共受之藉使敵不南來坐失皇甫太師吾屬何顔以見天子遂踰水而進遼兵解去遇等乃得還遼亦引軍還其衆自相驚曰晉軍悉至矣時遼主在邯鄲聞之即時北遁晉主疾小愈河北相繼告急晉主曰此非安寢之時乃部分諸將為行計馬全節等奏據降者言敵衆不多宜乘其散歸種落大舉徑襲幽州晉主以為然徴兵諸道下詔親征發大梁殷改國號曰閩閩之故臣共迎殷主延政請歸福州改國號曰閩延政以方有唐兵未暇徙都以從子繼昌鎮福州以指揮使黄仁諷將兵衛之賞林仁翰甚薄仁翰未甞自言其功發兩軍甲士萬五千人詣建州以拒唐唐兵屯赤嶺延政遣僕射楊思恭統軍使陳望將兵拒之列柵水南旬除不戰唐人不敢逼思恭以延政之命督望戰望曰江淮兵精其將習武事國之安危繫此一舉不可不萬全而後動思恭怒望不得已引兵渉水與唐戰望敗死思恭僅以身免失政大懼嬰城自守召衆州兵分守要害赤嶺在建寧府崇安縣二月晉主至澶州諸將引軍北上晉主至澶州馬全節等諸軍以次北上劉知逺聞之曰中國疲弊自守恐不足乃横挑彊胡勝之猶有後患况不勝乎遼克晉祁州唐末置今屬保定府刺史沈斌下邳人死之遼以羸兵驅牛羊過祁州城下晉刺史沈斌出兵擊之遼以精騎奪其門州兵不得還趙延壽引遼兵急攻之斌在城上延壽語之曰使君何不早降斌曰侍中父子失計䧟身敵庭忍殘父母之邦不自愧恥更有驕色何哉沈斌弓折矢盡寧為國家死爾終不效公所為明日城破斌自殺晉以馮玉為樞密使晉端明殿學士馮玉宣徽北院使李彦韜太原人皆挾恩用事惡桑維翰數毁之晉主欲罷維翰政事李崧劉昫固諌而止維翰請以玉為樞密副使玉殊不平中㫖以玉為樞密使以分維翰之權彦韜少事關實為僕夫後𨽻髙祖帳下有寵于晉主性纖巧與嬖幸相結以蔽耳目至于升黜將相亦得預議常謂人曰吾不知朝廷設文官何所用且欲澄汰徐當盡去之三月閩李仁逹作亂以僧卓儼明稱帝閩主延政遣兵討之初光州人李仁逹仕閩叛奔建州及朱文進之亂叛奔福州浦城人陳繼珣亦叛閩主延政奔福州至是二人不自安王繼昌暗弱嗜酒不恤將士將士多怨仁逹與繼珣説黄仁諷殺繼昌及吳成義仁逹欲自立恐衆心未服以雪峯寺僧卓儼明素為衆所重相與迎之立以為帝帥將吏北面拜之然猶遣使稱藩于晉延政聞之族黄仁諷家命統軍使張漢真將水軍五千㑹漳泉兵討巖明漢真至福州黄仁諷聞其家夷减開門力戰執漢真斬之卓巖明無他方畧但于殿上噀水散豆作諸法事而已李仁逹自判六軍諸衛事已而仁逹使人殺仁諷由是兵權盡歸之因大閲将士刺殺卓巖明自稱威武留後奉表稱藩于唐亦遣使入貢于晉唐以仁逹為節度使遼還軍南下晉都排陳使符彦卿等擊之遼兵敗走夏四月晉主還大梁杜威等諸軍㑹于定州攻遼泰州遼置晋為保州今直𨽻保定府是降之取滿城唐縣今屬保定府獲遼二千人取遂城唐縣故城在保定府安肅縣趙延壽部曲有降者言遼主還至虎口北即今古北口在順天府密雲縣東北兩崖壁立舊有營城據山巔聞晉取泰州復擁衆南向約八萬騎計來夕當至威等懼退至陽城在保定府完縣東南後漢書郡國志蒲陰縣有陽城即此遼兵大至晉軍與戰逐北十餘里遼兵踰白溝河名其上流為巨馬河出易州淶水縣至定興新城為白溝河其下流逕雄縣為㑹同河入于淀而去晉軍結陳而南胡騎四合如山諸軍力戰拒之人馬飢乏至白團衛村埋鹿角為行寨遼軍圍之數重竒兵出寨後斷糧道是夕東北風大起營中掘井輙崩人馬俱渴至曙風甚遼兵坐奚車奚人所造之車中命鐵鷂遼謂精騎曰鐵鷂四面下馬㧞鹿角而入奮短兵以擊晉軍又順風縱火揚塵以助其勢軍士皆憤怒大呼曰都招討使何不用兵令士卒徒死諸將請出戰杜威曰俟風稍緩徐觀可否李守貞曰彼衆我寡風沙之内莫測多少惟力鬭者勝此風乃助我也若俟風止吾屬無類矣即呼曰諸將齊擊賊又謂威曰令公善守禦守貞以中軍决死矣馬軍排陣使張彦澤召諸將問計皆曰敵得風勢宜俟風囬與戰都排陣使符彦卿曰與其束手就擒曷若以身狥國乃與張彦澤樂元福并州晉陽人及皇甫遇引精騎出西門擊之諸將繼至遼兵郤數百歩風勢益甚昏晦如夜彦卿等擁萬餘騎横擊遼兵呼聲動天地遼兵大敗而走勢如崩山守貞亦令歩兵盡拔鹿角出鬭歩騎俱進逐北二十餘里鐵鷂既下馬蒼黄不能復上委棄馬伏蔽地遼主乘奚車走十餘里追兵急獲一槖駝乘之而走諸将請追擊之杜威揚言曰逢賊幸不死更索衣囊耶李守貞曰人馬渴甚得水足重難以追宼乃退保定州遼主至幽州散兵稍集以軍失利杖其酋長各數百諸將引歸晉主亦還大梁五月晉順國節度使杜威入朝威乆鎮恒州貪殘不法又畏懦過甚毎遼數千騎入境威已閉門登陴由是敵無所忌憚属城多為所屠威竟不出一卒救之千里之間暴骨如莾威見所部殘弊為衆所怨又畏遼之彊累表求朝不許威不俟報遽委鎮入朝桑維翰曰威居常憑恃勲親邀求姑息及疆埸多事曾無守禦之意宜因此時廢之庶無後患晉主不悦曰威朕之宻親必無異志但長公主欲相見耳公勿以為疑維翰自是不敢復言以足疾辭位先是晉復以鄴都為天雄軍及是威令長公主白求天雄節鉞晉主從之六月晉遣使如遼遼連嵗南侵中國疲于奔命邊民塗地遼人畜亦多死國人厭苦之舒嚕太后謂遼主曰使漢人為胡主可乎曰不可太后曰然則汝何故欲為漢主曰石氏負恩不可容太后曰汝今雖得漢地不能居也萬一蹉跌悔何所及又謂其羣下曰漢兒何得一向眠自古但聞漢和蕃不聞蕃和漢漢兒果能回意我亦何惜與和桑維翰屢勸晉王復請和于遼以紓國患晉主遣使奉表稱臣請遼謝過遼主曰使景延廣桑維翰自來仍割鎮定兩道隸我則可和晉以遼主語忿謂其無和意乃止秋八月甲子朔日食晉加馮玉同平章事和凝罷加樞密使馮玉同平章事事無大小悉以委之晉主自陽城之㨗謂天下無虞驕侈益甚多造器玩廣宫室作織錦樓以織地衣用工數百期年乃成又賞賜優伶無度桑維翰諫曰曏者陛下親禦胡㓂戰士重傷者賞不過帛數端今優人一談一笑稱㫖徃徃賜束帛萬錢錦袍銀𢃄彼戰士見之能不觖望士卒解體陛下誰與衛社稷乎不聴馮玉每善承迎益有寵有疾在家晉主謂諸宰相曰自刺史以上俟馮玉出乃得除玉乘勢弄權賂遣輻輳朝政益壊唐兵㧞建州閩主延政出降閩自王審知據福建至延政降唐凡七主合六十年唐兵圍建州既乆建人離心或謂董思安盍早擇去就思安曰吾世事王氏危而叛之天下其誰容我衆感其言無叛者唐先鋒使王建封上元人先登遂克建州閩主延政降思安整衆奔泉州初唐兵之來建人苦王氏之亂與楊思恭之重斂爭伐木開道以迎之至是縱兵焚掠建人大失望延政至金陵唐主以為羽林大将軍斬楊思恭以謝建人以王崇文為永安節度使崇文治以寛簡建人遂安冬十一月晉桑維翰罷初晉主疾未平㑹正旦樞密使桑維翰遣女僕入宫起居太后因問皇弟睿近讀書否馮玉因譛桑維翰有廢立之志李守貞李彦韜合謀排之以趙瑩柔而易制共薦以代維翰罷維翰政事為開封尹以瑩為中書令李崧為樞密使維翰遂稱足疾希復朝謁杜絶賔客或謂馮玉曰桑公元老當優以大藩奈何使之尹京親猥細之務乎玉曰恐其反耳曰儒生安能反玉曰縱不自反恐其教人爾丙晉開運三年是午歳凡四國三鎮春正月唐以宋齊邱為太傅唐齊王景逹府屬謝仲宣言于景逹曰宋齊邱先帝布衣之交今棄之草萊不厭衆心景達為之言于唐主曰齊邱宿望勿用可也何必棄之以為名唐主乃以齊邱為太傅但奉朝請不預政事唐以李建勲馮延己同平章事建勲練習吏事而懦怯少斷延己工文辭而狡佞善大言多樹朋黨水部郎髙越字仲逺幽州人上書指延己兄弟過惡唐主怒貶越蘄州司户初唐主置宣政院于禁中以給事中常夢錫領之専與機密夢錫與中書侍郎嚴續皆忠直無私唐主謂夢錫曰大臣維嚴續中立然無才恐不勝其黨卿宜左右之未幾夢錫罷宣政院續亦出為池州觀察使夢錫于是稱疾縱酒不復與朝廷事嚴續字興宗可求之子二月壬戍朔日食夏四月唐泉州牙將留從効逐其刺史王繼勲而代之從効表聞于唐唐召繼勲還金陵以從効為刺史後從効兄從願復取漳州唐不能制乃建清源軍于泉州以從効為節度使從効遂據泉漳從効勤儉養民部内安治每歳取進士明經謂之秋堂晉定州指揮使孫方簡莫州清苑人叛降遼定州西北有狼山在易州西南亦曰郎山其上有西氷及姑姑窩等寨土人築堡于山上以避㓂堡中有佛舍尼孫深意居之以妖術惑衆逺近信奉之孫方簡及弟行反自言深意之姪事之甚謹深意死方簡嗣其術稱深意坐化事之如生其徒日滋㑹晉與遼絶好北邊㓂盗充斥方簡行友因帥鄉里豪健據城自保遼人入境帥衆邀擊頗獲其軍資人挈家往依之者益衆遂為羣盗懼為吏所討乃歸欵朝廷朝廷亦資其禦㓂署東北招収指揮使方簡邀求不已朝廷小不副其意則舉寨降于遼請為鄉導以入晉時河北大饑民饑死者所在以萬數盗賊蠭起吏不能禁天雄軍将劉延翰市馬于邊方簡執之獻于遼延翰逃歸言方簡欲乘中國凶饑引遼南侵宜為之備六月晉復以馮暉為朔方節度使初暉在靈武得羌胡心市馬期年至五千匹晉朝忌之徙鎮邠州又徙陜州歳中入為侍衛都指揮使暉乃厚事馮玉李彦韜復求靈州㑹𦍑胡作亂党項拓跋彦超最為大族暉在鎮留之州下賜予豐厚故諸部不敢為㓂及將罷鎮而縱之王令温代鎮不厚撫𦍑胡以中國法繩之諸部愁怨皆叛遂有是命暉在道擊敗彦超遂入靈州暉撫綏邊部凡十餘年恩信大著秋七月河决河决楊劉西入莘縣注見前廣四千里自朝城注見前北流嗣又溢厯亭等處八月晉劉知逺殺白承福夷其族晉主數召承福入朝宴賜甚厚使戍滑州属歳大熱遣其部落還太原畜牧多犯法劉知逺無所縱捨部落知朝廷㣲弱且畏知逺之嚴謀相與遁歸故地有白可乆者位亞承福帥所部先亡歸遼知逺與郭威謀曰今天下多事置此属于太原乃腹心之疾也不如去之密表吐谷渾反覆請還于内地晉主遣使發其部落分置諸州知逺遣威誘承福等入居太原城中誣以謀叛殺之合四百口吐谷渾由是遂㣲唐攻福州不克初唐人既克建州欲乘勝取福州唐主不許樞密使陳覺請自往説李仁逹必令入朝宋齊邱亦薦覺可使唐主乃以覺為宣諭使厚賜仁達仁達知其謀見覺詞色甚倨覺不敢言入朝事而還自恥無功至建州矯詔發汀建撫信州兵命馮延魯將之趣福州唐以覺專命大怒羣臣皆言兵業行不可止唐主乃以王崇文為招討使覺延魯魏岑為監軍使又命留從効王建封以兵㑹攻福州仁達遣使乞師于吳越吳越王佐令統軍使張筠以兵三萬救之㑹唐兵已入福州外郭吳越兵至禦之不利唐諸將爭功進退不相習仁逹固守第二城攻之不克冬十月晉遣杜威將兵伐遼十一月至瀛州與遼戰不利而還先是有自幽州來者言趙延壽有意歸國馮王李崧命杜威致書延壽延壽復書乞發大兵接應至是遼使瀛州刺史劉延祚遺樂壽監軍王巒書請舉城内附且言城中遣兵不滿千人乞朝廷發輕騎襲之已為内應巒與杜威屢奏瀛莫乘此可取馮玉李崧信以為然欲發大兵迎趙延壽及延祚與晉主議之以威為都招討使李守貞為之副趙瑩私謂馮李曰杜令國戚貴為將相而所欲未厭心常慊慊豈可復假以兵權必若有事北方不若止任守貞為愈也不從十月下敕榜曰專發大軍往平北敵先収瀛莫定安闗南次復幽燕盪平塞北有能擒獲遼主者除上鎮節度使賞錢萬緡絹萬匹銀萬兩時自六月積雨至是未止軍行及饋運者甚艱苦威守貞㑹兵于廣晉而北行威屢使公主入奏請益兵由是禁軍皆在麾下而宿衛空虛十一月至瀛州城門洞啓寂若無人威等不敢進聞遼將髙謨翰先已引兵潜出威遣梁漢璋將二千騎追之漢璋敗死威等引兵南還遼大舉侵晉十二月晉將王清戰死杜威等以兵降遼遣兵入大梁執晉主重貴以歸殺桑維翰囚景延廣後晉自髙祖至出帝凡二主合十一年遼主大舉侵晉趣恒州杜威等聞之將自兾貝而南張彦澤時在恒州引兵㑹之言遼可破之狀威等乃復趣恒州以彦澤為前鋒與遼夾滹沱而軍遼恐晉軍急渡滹沱與恒州合勢議引兵還及聞晉軍築壘為持久之計遂不去威性懦怯偏禆皆節度使但日相承迎置酒作樂罕議軍事磁州刺史李榖説威及李守貞曰今大軍去恒州咫尺烟火相望若多以三股木置水中積薪布土其上橋可立成密約城中舉火應夜募壯士斫營而入表裏合勢敵必遁逃諸將皆以為然獨威不可遣榖出督懐孟軍糧遼以大兵當晉軍之前潜遣其將蕭翰一名廸里字罕札逹魯之子考五代史翰號阿巴入汴後李崧為製姓名曰蕭翰遼史外戚表太宗入汴賜后族小漢曰蕭翰所載各不同阿按廸里舊作敵烈罕札舊作寒真逹魯舊作敵魯巴舊作阿鉢以上今並改將百騎出晉軍之後斷晉糧道及歸路樵採者遇之盡為所掠有逸歸者皆稱敵衆之盛軍中忷懼十二月李榖自書密奏具言大軍危急之勢請幸滑州及發兵守澶州河陽以備奔衝杜威奏請益兵詔悉發守宫禁者得數百人赴之威又遣使告急還為遼所獲自是朝廷與軍前聲問兩不相通開封尹桑維翰以國家危在旦夕求見言事晉主方在苑中調鷹辭不見又詣執政言之執政不以為然退謂所親曰晉氏不血食矣晉主欲自將北征李彦韜諫而止詔以髙行周符彦卿共戍澶州景延廣戍河陽指揮使王清言于杜威曰請以歩卒二千為前鋒奪橋開道公帥諸軍繼之得入恒州則無憂矣威許諾遣清與宋彦筠俱進清戰甚鋭遼軍小却諸將以大小軍繼之威不許彦筠敗走清獨帥麾下力戰屢請救威竟不遣一騎助之清謂其衆曰上將握兵坐觀吾輩困急而不救此必有異志吾輩當以死報國爾衆感其言莫有退者至暮戰不息遼以新兵繼之清及士衆盡死由是諸軍皆奪氣遼人遥以兵環晉營軍中食盡威與李守貞宋彦筠謀降遼威潜遣腹心詣遼主牙帳邀求重賞遼主紿之曰趙延壽威望素淺恐不能帝中國汝果降者當以汝為之威喜遂定降計伏甲召諸將出降表使署名諸將駭愕聴命命軍士出陳于外軍士皆踊躍以為且戰威親諭之曰今食盡途窮當為汝曹共求生計因命釋甲軍士皆慟哭聲振原野遼主遣趙延壽衣赭𫀆至晉營慰撫士卒亦以褚袍衣威其實皆戲之耳威引遼主至恒州城下順國節度使王周亦出降先是遼主屢攻易州刺史郭璘固守拒之遼主每過城下指而歎曰吾能吞併天下而為此人所扼至是遣通事耿崇美至易州誘説其衆衆皆降璘不能制遂為崇美所殺杜威之降也皇甫遇初不預謀遼主欲遣遇先入大梁遇辭退謂所親曰吾位為将相敗不能死忍復圖其主乎至平棘謂從者曰吾不食累日矣何面目復南行遂扼吭而死郭璘邢州人遼主引兵而南杜威將降兵以從遣張彦澤將二千騎先取大梁以通事傅住児為都監彦澤倍道疾驅夜渡白馬津晉主召李崧馮玉李彦韜入禁中計事欲詔劉知逺發兵入援明日彦澤自封邱門斬闗而入城中大擾晉主于宫中起火自携劎驅後宮赴火為親軍將薛超遼州平城人所持俄而彦澤傳遼主與太后書慰撫之且召桑維翰景延廣晉主乃命滅火與后妃聚泣召范質草降表表稱孫男臣重貴禍至神感運盡天亡今與太后及妻馮氏舉族而縳待罪遣男延煦延寶奉國寶出迎太后亦上表所婦李氏傅住兒入宣遼主命晉主脱黄袍服素衫拜受左右皆掩泣使召張彦澤欲與計事彦澤微笑不應以晉主命召桑維翰維翰至天街遇李崧駐馬語未畢有軍吏于馬前揖維翰赴侍衛司維翰知不免顧謂崧曰侍中當國今日國亡反令維翰死之何也崧有愧色彦澤倨坐見維翰維翰責之曰公領大鎮握强兵何乃負恩至此彦澤無以應遣兵守之彦澤自謂有功于遼旂幟皆題赤心為主見者笑之中書舍人李濤謂人曰吾與其逃于溝瀆而不李免不若徃見之乃投刺謂彦澤曰上疏請殺太尉人濤謹來請死彦澤欣然接之謂濤曰舍人懼乎濤曰濤今日之懼亦猶足下昔年之懼也曏促髙祖用濤言事安至此彦澤大笑命酒飲之濤引滿而去旁若無人李濤請誅彦澤事具前彦澤遷晉主于開封府頃刻不得留見者流涕晉主悉以内庫金珠自隨彦澤曰此物不可匿也晉主悉歸之亦分以遺彦澤彦澤遣指揮使李筠以兵守晉主内外不通所上遼主表章皆先示彦澤然後敢發晉主使取内庫帛主者不與曰此非帝物也求酒于李筠筠亦辭不進欲見李彦韜彦韜亦不往馮玉佞彦澤求自送傅國寳兾遼復任用彦澤殺桑維翰以𢃄加頸白遼主云具自經遼主命厚撫其家髙行周符彦卿皆詣遼降遼主賜晉主手詔曰孫勿憂必使汝有噉飯之所又以所獻傳國寶非真詰之晉主奏頃王從珂自焚舊傳國寳不知所在此寶先帝所為羣臣備知乃止有司欲使晉主銜璧牽羊大臣輿櫬迎于郊外遼主曰吾遣竒兵取大梁非受降也不許又詔晉文武羣僚一切如故朝廷制度並用漢禮遣兵趣河陽捕景延廣延廣見遼主于封邱遼主詰之曰致兩主失歡皆汝所為也十萬横磨劎安在召喬榮使相辨證延廣初不服榮以紙所記語示之乃服延廣伏地請死乃鎖之丁二月漢髙祖劉知逺立仍稱晉天福十二年未六月改號漢是歳晉亡漢興凡四國三鎮春正月遼主徳光入大梁殺張彦澤景延廣自殺正月朔百官遥辭晉主于城北乃易素服紗㡌迎遼主伏路側請罪遼主命起改服撫慰之晉主太后迎于封邱門外遼主辭不見遂入門民皆驚走遼主遣通事諭之曰我亦人也汝曹勿懼㑹當使汝曹蘇息我無心南來漢兵引我至此耳至明徳門下馬拜而後入日暮復出屯于赤岡在開封府城東北先是張彦澤與晉閤門使髙勲不恊及引遼入汴殺勲叔父及弟至是勲訴于遼遼主亦怒彦澤剽掠京城鎻之百姓爭投牒疏彦澤罪遂與傅住兒俱斬北市仍命髙勲監刑彦澤前所殺士大夫子孫皆絰杖號哭詬罵以杖撲之勲命剖其心以祭死者市人争破腦取髓臠其肉而食之遼送景延廣歸其國宿陳橋驛名今為鎮在開封府祥符縣東北夜扼吭而死遼封晉主重貴為負義侯徙之黄龍府故城在今奉天府開原縣遼史地理志黄龍府本渤海扶餘府太祖征渤海還至此有黄龍見城上故名後廢遼主使遷晉主及其家人于封禪寺以兵守之數遣使存問時雨雪連旬外無供億上下凍餒太后使人謂寺僧曰吾嘗于此飯僧數萬今日獨無一人相念邪僧辭以敵意難測不敢獻食晉主隂祈守者乃相得食既而遼命遷之黄龍府考通鑑以黄龍為即慕容氏之和龍城蓋因南史謂北燕馮氏為黄龍國故引之不知燕之和龍在遼水之西遼之黄龍在混同江之南其地相去甚逺南史所謂黄龍國者葢亦一時漫語未嘗實指其地不得引以為據也遼以李崧為樞密使馮道為太傅晉諸藩鎮皆降遼主引兵入宮諸門皆以遼兵守衛磔犬懸羊皮為厭勝謂晉羣臣曰自今不修甲兵不市戰馬輕賦省役天下太平矣改服中國衣冠百官起居皆如舊制趙延壽張礪共薦李崧㑹馮道自鄧州入朝遼主素聞二人名皆禮重之以崧為太子太師充樞密使道守太傅于樞密院祗候道之入朝也遼主誚之曰爾是何等老子對曰無才無徳癡頑老子遼主喜又嘗問曰天下百姓如何救得道為俳語以對曰此時佛出救不得惟皇帝救得時人善其言遼主遣使以詔賜晉之藩鎮諸藩鎮爭上表稱臣惟彰義節度使史匡威建塘之子據涇州拒遼而雄武節度使何重建以秦階成州降蜀遼分遣晉降卒還營初杜重威重威在晉避晉主諱名威至是復舊名既以晉軍降遼遼主悉収其鎧杖貯恒州驅馬歸其國遣重威將其衆從已而南及河恐其為變欲悉以胡騎擁而納之河流或謀曰晉兵在他所者尚多彼聞降者盡死必皆拒命不若且撫之徐思其䇿遼主乃使重威以其衆屯陳橋會乆雪凍餒咸怨重威重威毎出道旁人皆罵之遼主猶欲誅晉兵趙延壽説之延壽曰皇帝親冒矢石以取晉國欲自有之乎將為他人取之乎遼主變色曰朕舉國征南五年不觧甲僅能得之豈為他人乎延壽曰晉國南有唐西有蜀常為讐敵東西數千里常以兵戌之南方署濕上國之人不能居也他日車駕北歸無兵守之吳蜀必相與乗虛入冦如此豈非為他人取之乎遼主曰然則奈何延壽曰陳橋降卒分以戌邊則吳蜀不能為患矣遼主曰昔吾失于斷割悉以唐兵授晉既而反為仇讐今幸入吾手豈可復留以為後患乎延壽曰曏留晉兵不質其妻子故有此憂今若悉徙其家于恒朔每嵗分番使戍南邊何憂其為變乎遼主悦由是陳橋兵始得免分遣還營故晉主重貴發大梁晉主與太后安太妃馮后及弟睿子延煦延寳俱北遷從者百餘人遼遣三百騎援送又遣趙瑩馮玊李彦韜與之俱在塗供饋不繼或時絶食舊臣無敢進謁者獨磁州刺史李榖迎謁于路傾貲以獻晉主至中度橋舊在正定府城東南跨滹沱河上見杜重威寨歎曰天乎我家何負為此賊所破慟哭而去遼縱兵大掠遣使括借士民錢帛遼主廣受四方貢獻大縱酒作樂趙延壽請給上國兵食遼主曰吾國無此法乃縱胡騎四出剽掠謂之打草榖丁壯斃于鋒刃老弱委于溝壑自東西兩畿及鄭滑曹濮數百里間財畜殆盡遼主謂判三司劉㫬曰遼兵應有優賜速宜營辦時府庫空竭㫬請括借都城士民錢帛又分遣使者數十人詣諸州括借皆廹以嚴誅民不聊生其實無所頒給皆蓄之内庫欲輦歸其國由是内外怨憤始患苦遼皆思逐之矣晉劉知逺遣使奉表于遼初晉主忌河東節度使北平主劉知逺以為北面行營都統知逺因之廣募士卒又得吐谷渾財畜由是富强步騎至五萬人晉主與遼結怨知逺知其必危而未嘗論諫遼屢深入知逺初無邀遮入援之志及聞遼主入汴乃分兵守四境遣客將王峻字秀峰安陽人奉表稱臣遼主賜詔褒美親加兒字于知逺姓名之士仍賜以木拐遼法以優禮大臣如漢賜几杖之比既而遼主以知逺觀望不至使謂曰汝不事南朝又不事北朝意欲何所俟邪孔目官郭威言于知逺曰敵恨深矣王峻言契丹貪殘失人心必不能乆有中國或勸知逺舉兵進取知逺曰用兵當随時剖宜今契丹新據京邑未有他變豈可輕動且觀其所利止于得財貨財貨既足必將北去况冰雪已消勢難久留宜待其去然後取之可以萬全書王峻劉知逺各言契丹仍依當日原文説具前荆南節度使髙從誨遣使入貢于遼又遣使詣河東勸進唐主立其弟景遂為太弟唐主立其弟齊王景遂為皇太弟徙景逹為齊王子兾為燕王景遂甞與宫寮燕集賛善大夫張易有所規諫景遂方與客傳玩玊杯弗之顧易怒曰殿下重寳而輕士取杯抵地碎之衆皆失色景遂飲容謝之待易益厚景達性剛直唐主嘗與宗室近臣飲馮延已延魯魏岑陳覺輩極傾謟之態景達屢呵責之復極言諫唐主以不宜親近侫臣延已以二弟立非己意欲以虚言徳之當宴東宫陽景逹背曰爾不可忘我景逹大怒入白唐主請斬之唐主論觧乃止張易謂景逹曰羣小交構禍福所繫殿下力未能去數面折之使彼懼而為備何所不至自是毎遊宴景逹多辭疾不預張易字簡能掖縣人唐遣使如遼唐主遣使賀遼滅晉且請詣長安修復諸陵遼主不許而晉密州刺史皇甫暉棣州刺史王建皆避遼帥衆奔唐淮北賊帥多請命于唐唐史館修撰韓熈載上疏曰陛下恢復祖業今也其時若敵人北歸中原有主則未易圖也時方連兵福州未暇北顧唐人皆以為恨唐主亦悔之二月遼行朝賀禮大赦以趙延壽為中京留守遼主召晉百官問曰中國之俗異于吾國吾欲擇一人君之如何皆曰夷夏之心皆願推戴皇帝二月朔遼主服通天冠絳紗袍登正殿設樂縣儀衛于庭百官朝賀下制稱大遼㑹同十年大赦趙延壽以遼主負約心怏怏乞為皇太子遼主曰皇太子當以天子兒為之豈燕王所可為也因令為延壽遷官時遼以恒州為中京張礪奏擬延壽中京留守事大丞相録尚書事都督中外諸軍事遼主取筆塗去録尚書事都督中外諸軍事而行之晉劉知逺稱帝于晉陽河東將佐勸知逺稱尊號以號令四方知逺不許聞晉主北遷聲言欲出兵井陘迎歸晉陽命指揮使史𢎞肇字化源鄭州榮澤人集諸軍告以出師之期軍士皆曰今天下無主主天下者非我王而誰宜先正位號然後出師爭呼萬歳不已知逺曰敵勢尚强吾軍威未振當且建功業士卒何知命左右遏止之郭威與都押衙楊邠魏州冠氏人入説知逺曰此天意也王不乘此取之人心一移則反受其咎矣知逺從之遂即位自言未忍改晉國又惡開運之名乃更稱天福十二年詔諸道為遼括率錢帛者皆罷之晉主知逺自將迎故晉主重貴至壽陽晉縣今屬山西平定州而還劉知逺自將東迎故晉主至壽陽聞已過數日乃留兵戍承天軍注見前而還故晉主既出塞遼人無復供給至錦州遼置今為府屬奉天令拜按巴堅墓故晉主不勝屈辱泣曰薛超誤我馮后求毒藥欲與故晉主俱自殺不果晉遣賊帥梁暉襲取相州殺遼守兵遼主聞知逺即位遣耿崇美守澤潞髙唐英守相州崔廷勲守河陽以控扼要害時遼主多以其子弟及親信為節度刺史不通政事華人之狡獪者多往依其麾下教之妄作民不堪命于是所在相聚為盜多者數萬人少者不減千百滏陽賊帥梁暉有衆數百送欵晉陽磁州刺史李榖宻表令暉襲相州暉偵知髙唐英未至夜遣壮士踰城啓關納衆殺遼兵數百據州自稱留後己而陜晉潞州皆殺遼使者奉表詣晉陽晉主知逺還晉陽知逺還至晉陽議率民財以賞將士夫人李氏諫曰陛下因河東創大業未有以恵澤其民而先奪其生生之資殆非新天子所以救民之意也請悉出宫中所有以勞軍雖復不厚人無怨言知逺從之中外大悦澶州賊帥王瓊攻遼將朗烏舊作郎五今改正不克而死鎮寜節度使耶律朗烏性殘虐澶州人苦之賊帥王瓊帥其徒千餘人圍朗烏于牙城遼主聞之懼遣兵救之瓊敗死然遼主自是無久留河南之意矣遼以李從益為許王唐王淑妃與郇公從益居洛陽趙延夀夫人明宗女也淑妃詣大梁㑹禮遼主見而拜之曰吾嫂也以從益為許王復歸于洛遼以張礪和凝同平章事羣盜䧟宋亳宻州東方羣盜大起䧟宋亳宻三州遼主謂左右曰我不知中國之人難制如此亟遣㤗寧安審琦武寜符彦卿等歸鎮三月朔遼行入閤禮唐故事天子正殿謂之衙衙有仗便殿謂之閤其御便殿也自正衙喚仗由閤而入百官俟朝者因隨之入見謂之入閤遼主服赭袍坐崇元殿百官行入閤禮晉主知逺遣使安集農民保山谷避遼者遼以蕭翰為宣武節度使遼主謂晉百官曰天時向暑吾難久留欲暫至上國省太后乃以汴州為宣武軍以蕭翰為節度使翰舒嚕太后之兄子其妹復為遼主后自翰以蕭為姓于是遼后族皆稱蕭氏説已具前呉越復遣兵救福州撃敗唐兵遂取福州呉越遣余安將水軍救福州至白蝦浦即白龍江别名在福州府城南海岸泥淖湏布竹簀乃可行唐軍聚而射之簀不得施馮延魯欲縱其登岸而盡殺禆將孟堅之曰浙兵至此已久求一戰而不可得若聼其登岸彼必致死于我其鋒不可當安能盡殺乎不聼呉越兵既登岸大呼奮擊延魯棄衆而走孟堅戰死城中兵亦出夾撃唐兵大破之唐軍燒營而遁死者二萬餘人委棄資械數十萬府庫為之耗竭余安引兵入福州李仁達舉所部授之後仁達為吳越戍將所殺夷其族遼主徳光發大梁遼主發大梁晉文武諸司諸軍吏卒從者皆數千人宫女宦官數百人盡載府庫之實以行謂宣徽使髙勲曰吾在上國以射獵為樂至此令人悒悒今得歸死無恨矣至相州梁暉乗城拒守遼攻之及城街盡殺城中男子驅其婦女而北遺民僅七百人而髑髏至十餘萬遼主見所過城邑邱墟謂羣臣曰致中國如此皆燕王之罪也顧張礪曰汝亦有力焉晉王知逺以其弟崇為太原尹劉崇有太原始此夏四月晉以劉信漢主從弟史𢎞肇為侍衛指揮使楊邠為樞宻使郭威為副使王章魏州南樂人為三司使晉以蘇逢吉京兆長安人蘇禹珪宻州人同平章事時制度草創皆出逄吉然素不學問與禹珪同在中書決事多違舊制而逢吉尤納賄賂謗者讙沸晉以折從阮為永安節度使從逺入朝更名從阮避晉主名也置永安軍于府州注見前以從阮為節度使遼侵潞州晉遣史𢎞肇救之鄭謙守忻代閻萬進井州人守嵐憲憲州唐末置治樓煩故城在今忻州静樂縣遼昭義節度使耿崇美屯澤州将攻潞州晉主遣史𢎞肇將兵救之又以鄭謙為忻代都部署閻萬進為嵐憲都制置使知逺聞遼主北歸欲經畧河南故以𢎞肇為前驅而遣二人出北方以分遼兵勢晉以武行徳太原榆次人為河陽節度使遼以船載晉鎧杖泝河歸國命寕國都虞侯武行徳部送之至河陰行徳與將士謀曰敵勢不能乆留中國不若共逐其黨堅守河陽以俟天命之所歸者而臣之衆以為然即相與殺遼監軍使㑹崔廷勲以兵送耿崇美之潞州行徳遂乘虚入據河陽遣弟行友奉蠟表詣晉陽晉主以行德為河陽節度使遼主聞之歎曰我有三失宜天下之叛我也諸道括錢一失也令上國人打革穀二失也不早遣諸節度使還鎮三失也唐流陳覺于蘄州馮延魯于舒州唐主以矯詔敗軍皆陳覺馮延魯之罪議斬二人以謝中外御史中丞江文蔚字君章建安人對仗彈馮延已魏岑曰延已延魯岑覺四人皆陰狡弄權壅蔽聰明排斥忠良引用羣小今覺延魯雖伏辜而延已岑猶在同罪異誅人心疑惑唐主以文蔚言太過怒貶江州司士㕘軍流覺于蘄州延魯于舒州知制詔徐鉉史館修撰韓熙載上疏曰覺延魯罪不容誅但齊邱延已為之陳請故陛下赦之擅興者不罪則疆場有生事者矣䘮師者䕶存則行陳無効死者矣請行顯戮以重軍威不從但罷延已為太弟少保貶岑太子洗馬熈載屢言宋齊邱黨與必為禍亂齊邱奏熈載嗜酒猖狂貶和州司土參軍徐鉉字鼎臣揚州廣陵人遼主徳光殂趙延夀入恒州自稱權知南朝軍國事遼王至臨城得疾至殺狐林在正定府欒城縣西北王㓜曰村民于林中射狐殺之因名而殂國人剖其腹實鹽數斗載之北去晉人謂之帝羓趙延夀恨遼主負約即日引兵入恒州遼永康王鄂約東丹王托允子托允入中國曰李賛華為唐廢帝所殺鄂約立追謚讓國皇帝兀按鄂約舊作欲今改正以兵繼入遼諸將宻議奉以為主延夀不知自稱受遼皇帝遺詔權知南朝軍國事所以供給鄂約與諸將同鄂約銜之遼主䘮至國舒嚕太后不哭曰待諸部寕一如故則汝矣五月遼鄂約執趙延夀而自立鄂約召延夀及張礪等飲鄂約妻素以兄事延夀從容謂曰妹自上國來寜欲見之乎延夀與俱入良久鄂約出謂礪等曰燕王謀反適已鎖之矣又曰先帝在汴時遺我一籌許我知南朝軍國近者臨崩别無遺詔而燕王擅自知南朝軍國豈理邪後數日集番漢之臣于府署宣遼主遺制即皇帝位既而鄂約以徳光有子在國已以兄子襲位又無舒嚕太后之命内不自安乃勒兵歸以滿逹勒徳光從弟改舊作麻答今正為中京留守鄂約之即位舉哀成服尋即易去以見羣臣不復行䘮歌吹之聲不絶于内及歸晋文武吏卒皆留恒州獨以後宦者教坊自隨晉以劉崇為北都留守晉主知逺集羣臣議進取諸將咸請出師井陘攻取鎮魏知逺欲自石會闗名注見前趨上黨郭威曰遼主雖死黨衆猶盛各據堅城我出河北兵少路迂傍無應援若羣盜合勢共撃我軍糧餉路絶此危道也上黨山路險澁粟少民殘無以供億亦不可由近者陜晉相繼欵附引兵從之萬無一失不出兩旬洛汴定矣知逺曰卿言是也詔諭諸道以太原尹崇為北京留守楚王希範卒謚文昭弟希廣字徳丕嗣希廣希範之母弟也性謹順希範愛之使判内外諸司事希範卒將佐議所立張少敵袁友㳟以武平節度使知永州事希蕚最長請立之劉彦瑫李𢎞皋皆欲立希廣拓䟦恒曰三十郎居長請遣使以禮讓之不然必起争端彦瑫等不從稱希範遺命共立希廣少敵退而歎曰禍其始此乎與拓䟦恒皆稱疾不出晉主知逺發太原出晉絳晉史𢎞肇克澤州遼将崔廷勲等遁去𢎞肇攻澤州刺史翟令竒固守不下知逺以𢎞肇兵少欲召還使問之𢎞肇曰兵已及此勢如破竹可進不可退乃遣李萬超説令竒令竒降崔廷勲耿崇美奚王伊喇擁衆北遁遼人在河南者相繼引去𢎞肇為人沈毅寡言御衆嚴慗制校小不從命立撾殺之士卒所過犯民田及繫馬于樹者皆斬軍中惕息莫敢犯令故所向必克知逺自晉陽安行及汴兵不血刃皆𢎞肇力也知逺由是倚重之遼将蕭翰刦李從益稱帝于大梁遂北走從益避位翰聞劉知逺擁兵而南欲北歸恐中國無主必大亂已不得從容而去時唐許王從益與王淑妃在洛陽翰矯遼主命以從益知南朝軍國事召已赴恒州淑妃從益匿于徽陵下宫不得已而出翰立以為帝帥諸酋長拜之百官謁見淑妃淑妃泣曰吾母子单弱如此而為諸公所推是禍吾家也翰留燕兵千人為從益衛而行從益遣使召髙行周武行徳皆不至淑妃懼召大臣謀之曰吾母子為蕭翰所逼分當滅亡諸公無罪冝早迎新主自求多福勿以吾母子為意衆惑其言不忍去或曰令集諸營與燕兵併力堅守一月北救必至淑妃曰吾母子亡國之餘安敢與人争天下若新主見察當知我無所負今更為計畫則禍及他人闔城塗炭終何益乎衆猶欲拒守三司使劉審交曰城中公私窮竭遺民無幾若復受圍一月無噍類矣願諸公勿復言一從太妃處分劉審交字求益幽州文安人從益乃用趙逺翟光鄴䇿稱梁王知軍國事遣使奉表稱臣迎知逺仍出居私第蕭翰至恒州與满逹勒以鐵騎圍張礪之第執而鎖之礪抗聲曰欲殺即殺奚以鎖為是夕憤恚而死六月呉越王佐卒謚忠獻弟倧嗣晉主知逺入洛陽遣使殺李從益知逺至洛陽汴州百官奉表來迎諭以受遼補署者皆勿自疑聚其告牒而焚之命鄭州防禦使郭從義沙陀部人家太原先入大梁清宫宻令殺李從益及王淑妃淑妃且死曰吾兒何罪而死何不留之使每嵗寒食以一盂麥飯灑明宗陵乎聞者泣下晉主知逺入大梁諸鎮多降始改國號曰漢知逺發洛陽樞宻院使魏仁浦字道濟衛州沒人自遼逃歸郭威問以兵數及故事仁浦强記精敏威由是親任之知逺至大梁晉之藩鎮相繼來降復以汴州為東京改國曰漢仍稱天福年曰余未忍亡晉也遼主鄂約幽其祖母于木葉山注見前遼舒嚕太后聞鄂約自立大怒發兵拒之鄂約以偉王為前鋒相遇于石橋太后以李彦韜時從晉主北遷𨽻太后麾下為排陳使彦韜迎䧏于偉王太后兵敗鄂約幽太后于按巴堅墓改元天祿自稱天授皇帝慕中華風俗多用晉臣而荒于酒色輕慢諸酋長由是國人不附諸部數叛故數年之中不暇南侵唐以李金全為北面招討使唐主聞遼主徳光殂蕭翰棄大梁去下詔曰乃眷中原本朝故地以金全為北面行營招討使議經畧北方聞漢已入大梁還不敢出兵秋七月漢以杜重威為歸徳節度使重威拒命漢發兵討之重威自以䧏遼負中國内常疑懼移鎮制下拒而不受遣子質于滿達勒求援滿達勒遣其將楊衮將遼兵千五百人及幽州兵赴之詔削奪重威官爵以髙行周為招討使慕容彦超副之以討重威時兵荒之餘公私匱竭王章白漢主罷不急之務省無益之費以奉軍用度充贍閏月漢立髙祖世祖及四親廟恒州將何福進河南人李榮太原人逐遼將滿達勒遣使降漢滿達勒貪猾殘忍民間珍貨美女必奪取之又捕村民誣以為盗披面抉目焚炙而殺之常疑漢兵稍稍廢省又損其食以飼胡兵衆心怨憤聞漢主入大梁皆有南歸之志前潁州防禦使何福進控鶴指揮使李榮潜結軍中壮士奪守門者兵因哭入府據甲庫召漢兵及市人結鎧仗焚牙門與遼人戰榮召諸將并力指揮使白再榮史不詳何所人狐疑軍吏逼之不得已而行諸將繼至煙火四起鼓譟震地滿達勒等大驚載寳貨家屬走保北城而漢兵無所統壹貪狡者乘亂剽掠懦者竄匿八月朔遼人自北門入勢復振漢民死者二千餘前磁州刺史李榖恐事不濟請馮道等至戰所慰勉士卒士卒爭自奮會日暮有村民數千譟于城外欲奪遼寶貨婦女衆懼而北遁滿逹勒崔廷勲皆奔定州與義武耶律忠即朗烏合馮道等四出安撫兵民以再榮位在福進等上乃以為權知留後具以狀聞且請援兵漢主遣飛龍使李彦從將兵赴之再榮貪虐漢人嘗事滿逹勒者皆拘之以取其財恒人謂之白滿逹勒已而漢以再裝為成徳留後尋為節度使踰年始以何福進李榮為刺史八月漢制盗賊母問贜多少皆死時四方盗賊多朝廷患之故重其法仍分命使者逐捕楚王希廣以其兄希蕚守朗州希廣庶弟希崇性狡險隂遺希蕚書言劉彦瑫等違先王之命廢長立少以激怒之希蕚來奔喪彦瑫白希廣遣指揮使周延誨等將水軍逆之不聼入希蕚求還延誨勸希廣殺之希廣曰吾何忍殺兄寜分潭朗而治之乃厚贈希蕚遣還朗州希崇甞為希蕚詗希廣語言動作悉以告之約為内應荆南襲漢襄郢不克初荆南介居湖南嶺南之間地狹兵弱自武信王季興時諸道入貢過其境者多掠奪其貨幣及諸道詰讓加兵不得已復歸之及從誨立唐晉遼漢更據中原南漢閩呉蜀皆稱帝從誨利其賜于所向稱臣諸國賤之謂之髙無賴九月漢以竇貞固字體仁同州白水人李濤同平章事初漢主與竇貞固俱事晉髙祖雅相知重及即位欲以為相問蘇逢吉其次誰可者逄吉與李濤善同薦之㑹髙行周慕容彦超共討杜重威彦超欲急攻城行周欲緩之以待其弊行周女為重威子婦彦超揚言行周以女故爱賊不攻由是二將不協漢主恐生他變欲自將擊重威意未決濤上疏請親征漢主大悦以濤有宰相器制貞固濤並同平章事詔幸澶魏勞軍冬十月漢晉昌節度使趙匡贊字元輔叛降于蜀匡賛延夀之子也恐不為漢所容遣使降蜀漢主如澶魏勞軍十一月杜重威出降漢主至鄴都城下舍于髙行周營行周言曰城中食未盡急攻徒殺士卒未易克不若緩之彼食盡自潰漢主然之慕容彦超數因事陵轢行周行周泣訴于執政蘇逢吉楊邠密以白漢主漢主命二臣和解之又召彦超于帳中責之且使詣行周謝初遼留幽州兵千五百人戍汴漢主至盡殺之于繁台在開封府祥符縣東南九域志本梁孝王吹臺其後有繁姓居其側人遂以姓呼之之下至是張璉將幽州兵二千助重威漢主遣人招諭許以不死璉曰繁臺之卒何罪而戮今守此以死為期耳由是城乆不下十一月重威食竭力盡開門出降城中餒死者什七八張璉先邀朝廷信誓詔許以歸鄉里及出降殺之郭威請殺重威牙將百餘人并重威家貲籍之以賞戰士從之以重威為太傅重威每出入路人徃徃擲瓦礫詬之十二月漢主之子開封尹承訓卒承訓孝友忠厚逹于從政人皆惜之漢主還大梁漢鳯翔節度使侯益汾州平遙人叛降于蜀呉越統軍使胡進思廢其君倧而立其弟俶字文徳倧性剛嚴統軍使胡進思恃迎立功干預政事倧惡之有所謀議數靣折之進思恨怒不自安倧與指揮使何承訓謀逐之承訓反以謀告進思進思作亂帥親兵戎服入見倧叱之不退猝愕言倧倉猝驚愕趨入義和院進思鎖其門矯稱王命告中外云猝得風疾傳位于俶因帥諸將迎俶于私第稱倧之命承制授俶鎮海鎮東節度使俶曰能全吾兄乃敢承命不然當避賢路進思許之俶始視事俶遷倧于衣錦軍遣都頭薛温將親兵衛之戒之曰若有非常處分皆非吾意當以死拒之既而何承訓請誅胡進思俶惡其反覆殺之進思屢勸俶殺倧俶不許進思詐以王命宻令薛温害之温不徒進思乃夜遣其黨二人踰垣而入倧闔戸大呼温聞之率衆而入斃二人于庭中以告俶俶大驚曰全吾兄汝之力也由是益忌進思進思憂懼疽發背死戊漢乾祐元年二月𨼆帝承申祐立是嵗几四國三鎮春正月漢遣將軍王景崇邢州人等經畧闗中漢主以趙匡贊侯益與蜀兵共為冦患之會回鶻入貢訴稱為党項所阻乞兵應接詔將軍王景崇齊藏珍將禁軍數千赴之因使之經畧關西晉昌節度判官李恕久在趙延夀幕下延夀使之佐匡贊匡贊將入蜀恕諫曰漢家新得天下方務招懷若謝蜀歸朝必保富貴入蜀非全計也匡贊乃遣恕奉表請入朝景崇等未行而恕至漢主許之侯益亦請赴聖夀節上夀景崇等將行帝召入卧内敕之曰二人之心皆未可知爾至彼彼此入朝則勿問若尚遷延顧望當以便宜從事漢主更名暠趙匡贊侯益叛蜀還漢王景崇等擊蜀兵敗之趙匡贊不俟李恕反命已離長安王景崇等至長安聞蜀兵已入秦川發本道及趙匡贊牙兵千餘人同拒之恐牙兵亡逸欲文其靣微露風㫖軍校趙思綰魏州人首請自文靣以帥下景崇悦齊藏珍竊言曰思綰凶暴難制不如殺之景崇不聼蜀將李廷珪聞匡賛已入朝欲引歸景崇邀敗之張䖍釗至寳鷄侯益拒之䖍釗夜遁景崇追敗之于散闗漢主暠殂杜重威伏誅周王承祐立漢主大漸楊邠忌侍衛指揮使劉信立遣之鎮信不得奉辭雨泣而去漢主召蘇逢吉楊邠史𢎞肇郭威入受顧命曰承祐㓜弱後事託在卿輩又曰善防重威是日殂逢吉等秘不發䘮下詔稱重威父子因朕小疾謗議摇衆皆斬之磔尸于市市人争啖其肉二月立皇子承祐為周王有頃發䘮周王即位三月漢史𢎞肇以母䘮起復加兼侍中𢎞肇遭䘮不數日自出朝參故有是命漢以侯益為開封尹侯益入朝漢主問何故召蜀兵益曰臣欲誘致而殺之耳漢主哂之益富于財厚賂執政及史𢎞肇等遂以益行開封尹漢徴鳯翔兵詣闕行至長安軍校趙思綰據城作亂侯益盛毁王景崇于朝言其恣横景崇不自安會詔遣供奉官王益如鳯翔徴趙匡賛牙兵詣闕趙思綰等甚懼景崇因以言激之至長安節度副使安友規出迎益思綰前白曰壕寨使已定舍舘于城東將士欲各入城挈家詣城東宿友規等然之思綰等既入城即大譟持白梃入府開庫取鎧仗友規等皆逃去思綰遂據城集城中少年得四千餘人旬日間戰守之具皆備景崇諷鳯翔吏民表已知軍府事朝廷患之以王守恩建立之子為永興時改晉昌軍為永興節度使趙暉為鳯翔節度使以景崇為邠州留後漢復以孫方簡為義武節度使遼將朗烏滿逹勒掠定州而遁初遼以孫方簡為義武節度使及北歸徙方簡大同方簡怨恚不受命帥其黨三千人保狼山故寨遼攻之不克未㡬遣使歸漢漢主復其舊官使扞遼朗烏聞鄴都平常懼華人為變與滿逹勒等焚掠定州悉驅其人棄城北去方簡自狼山帥其衆數百還據定州奏以弟行友為易州刺史方遇為泰州刺史毎遼人南侵兄弟奔命遼頗畏之于是晉末州縣陥遼者皆復為漢有矣滿逹勒至其國遼主鴆殺之漢李濤罷蘓逢吉等遷補官吏楊邠以為虚費國用所奏多抑之逢吉等不恱李濤等上疏言今闗西紛擾外禦為急且二樞宻官雖貴而家未富宜授以要害大鎮樞機之務在陛下目前易以裁决逢吉禹珪皆可委也楊邠郭威聞之見太后泣訴太后怒以讓漢主漢主因以詰貴宰相濤曰此疏臣獨為之他人無預乃罷濤政事漢䕶國節度使李守貞反始守貞聞杜重威死而懼隂有異志自以嘗有戰功素好施得士卒心漢室新造天子年少初立執政皆後進有輕朝廷之志乃招納亡命治城塹繕甲兵晝夜不息門下僧總倫以術媚守貞言其必為天子守貞信之會趙思綰據長安奉表獻御衣于守貞守貞乃自稱秦王遣其驍將王繼勲陜州平陸人將兵西據潼闗夏四月漢以楊邠同平章事郭威為樞宻使漢主與左右謀以太后怒李濤離間欲更進用二樞宻以明非已意左右亦疾二蘓之専欲奪其權共勸之制以邠為中書侍郎同平章事樞密使如故郭威為樞密使自是政事盡决于邠漢遣郭從義討趙思綰白文珂王峻討李守貞五月河决魚池即魚池口在衛輝府滑縣西南六月戊寅朔日食漢王景崇叛降于蜀景崇遷延不之邠州閲集鳯翔丁壯詐言討趙思綰仍牒邠州會兵至是降蜀亦受李守貞官爵秋七月蜀以王招逺成都人知樞密院事招逺㓜以僧童從其師入府蜀髙袓孟知祥廟號愛其敏慧令給事蜀主左右至是委以機務府庫金帛皆恣其取與不復會計八月漢河東節度使劉崇表募兵備遼初髙袓鎮河東崇與郭威爭權有隙及威執政崇憂之判官鄭珙青州人勸崇為自全計崇遂表募兵四指揮自是選募勇士招納亡命繕甲兵實府庫罷上供財賦皆以備遼為名朝廷詔令多不禀承漢以郭威為西面招慰安撫使漢自河中永興鳯翔三鎮拒命已遣諸將討之乆無功漢主患之欲遣重臣臨督以郭威為西面軍前招慰安撫使諸軍皆受節度威問䇿于馮道道曰守貞自謂舊將為士卒所附願公勿愛官物以賜士卒則奪其所恃矣威從之由是衆心始附于威漢郭威督諸將圍李守貞于河中郭威與諸將議攻討諸將欲先取長安鳯翔鎮國節度使􅕆彦琦代州雁門人曰今三叛連衡推守貞為主守貞亡則兩鎮自破矣若捨近而攻逺萬一王趙拒吾前守貞掎吾後此危道也威善之于是威自陕州白文珂劉詞自同州常思自潼闗三道攻河中威撫養士卒與同苦樂小有功輙厚賞之微有傷常親視之士無賢不肖有所陳唘皆温辭已而受之違忤不怒小過不責由是將卒咸歸心焉諸將欲急攻城威曰守貞前朝宿將健鬬好施屢立戰功况城臨大河樓堞完固未易輕也不若且設長圍而守之乃發民夫二萬使白文珂帥之刳長濠築連城列隊伍而圍之偃旗仆鼓但循河多設火舖連延數十里番歩卒以守之遣水軍艤舟于岸㓂有潜徃來者無不擒之于是守貞如坐網中矣冬十月漢趙暉圍王景崇于鳯翔蜀遣兵救之不克景崇遣兵出西門趙暉擊破之遂取西闗城景崇退守大城暉塹而圍之數挑戰不出暉遣千餘人潜擐甲執兵效蜀旗幟循南山而下令諸軍聲言蜀兵至矣景崇果遣兵數千出迎暉設伏掩撃盡殪之自是景崇不敢出蜀主遣安思謙將兵救鳯翔思謙遣申貴將兵二千設伏于竹林以兵數百壓寳鷄而陳漢兵逐之遇伏而敗蜀兵進屯渭水漢益兵五千戍寶鷄思謙引還既而景崇復告急于蜀蜀主再遣思議救之思謙進屯散闗擊敗漢兵趙暉告急于郭威自住赴之互華威州開蜀兵以食盡引去遂還荆南節度使髙從誨卒以其子保融字徳長知留後十一月漢殺其太子太傅李崧滅其家初漢髙袓入大梁馮道及崧皆在真定髙祖以道第賜蘇禹珪崧第賜蘇逢吉崧第中瘞藏之物及洛陽别業逢吉盡有之及崧歸朝自以形迹孤危事漢權臣甚謹而二弟嶼㠖時乗酒出怨言逢吉聞而惡之翰林學士陶榖字秀寔邠州新平人本姓唐避晉祖諱攻焉先為崧所引用復從而譛之漢法既嚴而史𢎞肇尤殘忍及三叛連兵羣情震動𢎞肇廵邏京城得罪人不問情法何如皆専殺不請雖奸盗屏跡而寃死者甚衆李嶼僕夫葛延遇被嶼杖責遂與蘇逢吉之僕李澄謀上變告嶼謀反逢吉召崧送侍衛獄嶼自誣云與兄弟及家僮二十人謀作亂又遣人結李守貞召契丹兵及具獄上逢吉取筆改二十字為五十字詔誅崧兄弟家屬仍厚賞延遇等時人無不寃之自是士民家皆畏憚僕隸往往為所脅制延遇澄後周廣順初始伏誅御批厯代通鑑輯覽卷六十九

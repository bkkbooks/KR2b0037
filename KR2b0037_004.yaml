front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷五周襄王己卯十年春正月宋公曹伯衛人邾人伐齊夏五月宋師及齊師戰于甗齊地在今山東齊南府厯城縣齊師敗績
  hash: sha256:a2d0f4899c700afa780404460c532493c65f815076635ef63ac08f6614dddb29
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_004-1a, image: WYG0335/WYG0335-0116a.png}
body:
  text: 宋公以諸侯伐齊納子昭齊人殺無虧將立子昭不勝四公子之徒遂與宋人戰宋敗齊師于甗立子昭是為孝公而還史記齊桓公子十有餘人其立者五人無詭立三月死次孝公昭次昭公潘次懿公商人次惠公元鄭伯朝于楚此鄭朝楚之始楚子賜之金既而悔之與之盟曰無以鑄兵故以鑄三鐘庚辰十有一年夏六月宋公曹人邾人盟于曹南曹之南鄙宋襄公始圖霸鄫子會盟于邾邾人執而用之宋人執滕子嬰齊宣公使邾人用鄫子于次睢之社後漢書郡國志琅邪國臨沂有叢亭注縣東有大叢社民謂之食人社即次睢之社臨沂今山東沂州府蘭山縣欲以屬東夷司馬子魚曰古者六畜爾雅釋畜馬牛羊犬豕雞謂之六畜不相為用小事不用大牲而况敢用人乎祭祀以為人也民神之主也用人其誰享之齊桓存三亡國魯衛邢以屬諸侯義士猶曰薄德今一會而虐二國之君又用諸淫昏之鬼將以求霸不亦難乎秋宋人圍曹討不服也曹南之盟曹不修地主之禮冬陳人魯人蔡人楚人鄭人盟于齊楚始與齊盟陳侯請修好于諸侯以無忘齊桓公之德冬盟于齊修桓公之好也梁亡梁注見前公羊傳梁亡何梁自亡也其自亡奈何魚爛而亡也何休曰著其自亡狀若魚爛梁君立法一家犯罪四家坐之一國之中無不被刑者百姓一旦相率俱去梁遂亡左傳梁伯亟城而不處民罷而弗堪則曰某冦將至乃溝公宫曰秦將襲我民懼而潰秦遂取梁與公羊傳異今並存之壬午十有三年春宋人齊人楚人盟于鹿上左傳注鹿上汝隂原鹿縣南原鹿廢縣在今江潁州府阜陽縣南宋公欲合諸侯魯臧孫辰字文仲哀伯孫聞之曰以欲從人則可以人從欲鮮濟于是宋人為鹿上之盟以求諸侯于楚楚人許之子魚曰小國爭盟禍也宋其亡乎幸而後敗秋宋公楚子陳侯蔡侯哀侯孫莊公甲午鄭伯許男曹伯會于盂今河南歸德府睢州盂亭是執宋公以伐宋趙氏匡曰此楚執耳其以諸侯執之之辭何譏諸侯也冬十有二月諸侯盟于薄即薄縣故城注見前釋宋公諸侯會于盂子魚曰禍其在此乎君欲已甚其何以堪之于是楚執宋公以伐宋冬會于薄以釋之公羊傳宋公與楚子期以乘車之會公子目夷曰楚強而無義請君以兵車之會往公曰吾與之約自我為之自我墮之不可終以乘車之會往楚人果伏兵車執宋公以伐宋宋公謂目夷曰子歸守國矣國子之國也目夷于是歸設守械楚人謂宋人曰不與我國吾將殺子君宋人曰賴社稷之靈國已有君矣楚人知雖殺宋公猶不得宋國于是釋宋公公走之衛目夷復曰國為君守之君曷為不入逆公歸癸未十有四年秋秦晉遷陸渾之戎于伊川允姓之戎居于瓜州陸渾其别部也在秦晉西北二國誘而徙之伊川其後遂從戎號為陸渾縣今陸渾故城在河南河南府嵩縣其西有伏流坂為伊水伏流處即伊川也初平王之東遷也辛有虞董父之裔其後為董氏適伊川見被髮而祭于野者曰不及百年此其戎乎其禮先亡矣是年秋秦晉遷陸渾之戎于伊川冬十有一月宋公及楚人戰于泓水名在河南歸德府柘城縣渙水支流也宋師敗績鄭伯如楚宋公伐鄭楚人伐宋以救鄭宋公及楚人戰于泓宋人既成列楚人未既濟司馬子魚請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殲焉門官守門者師行則在君左右國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列子魚曰君未知戰勍敵之人隘而不列天贊我也阻而鼓之不亦可乎且今之勍者皆吾敵也雖及胡耉獲則取之何有于二毛明恥教戰求殺敵也傷未及死如何勿重三軍以利用也金鼓以聲氣也利而用之阻隘可也聲盛致志鼓儳未整陳可也明年宋公卒子王臣立是為成公乙酉十有六年春二月晉公子重耳入于晉初重耳奔狄從者狐偃趙衰夙之弟顛頡魏犫畢萬孫晉封萬于魏因以為氏胥臣字臼季即司空季子處狄十二年狐偃曰蓄力一紀可以遠矣齊侯長謂年已老管仲沒必求善以終求得賢佐以終霸業兹可以親乃行左傳狄人伐牆咎如獲其二女叔隗季隗納諸公子公子取季隗以叔隗妻趙衰將適齊謂季隗曰待我二十五年不來而後嫁季隗曰我二十五年矣又如是而嫁則就木焉請待子隗牆咎如赤狄别種姓過衛衛文公不禮焉出于五鹿今直𨽻大名府有五鹿城二一在元城縣即沙鹿城一在開州即晉文公乞食處乞食干野人與之塊重耳怒狐偃曰天賜也民以土服必獲此土受而載之及齊齊桓公妻之重耳安焉桓公卒從者謀去齊薑氏知之趣重耳行國語從者謀于桑下蠶妾在焉告薑氏薑氏殺之而言于公子曰從者將以子行其聞之者吾已除之矣重耳曰吾不動矣薑氏曰西方之書曰懷與安實疚大事時不可失子必速行重耳不可薑與狐偃謀醉而遣之過曹國語曹共公聞其駢脅諜其將浴薄而觀之僖負羈之妻謂負羈曰晉公子賢人其從者皆國相必得晉國得晉國而討無禮曹其首誅也子盍早自二焉負羈餽盤飱置璧焉公子受飱反璧及宋左傳宋襄公贈之以馬二十乘及鄭史記重耳過鄭鄭文公弗禮叔詹諫文公曰諸侯亡公子過此者衆安可盡禮叔詹曰君不禮不如殺之後且為國患文公不聽遂如楚楚子饗之國語楚成王以周禮享之九獻度實旅百曰公子若反晉國則何以報不榖對曰子女玉帛則君有之羽毛齒革則君地生焉其何以報君若以君之靈得反晉國晉楚治兵遇于中原其辟君三舍若不獲命其左執鞭弭右屬櫜鞬以與君周旋子玉即成得臣若敖曽孫請殺之楚子不許左傳楚子曰晉公子廣而儉文而有禮其從者肅而寬忠而能力天將與之誰能廢之居數月晉子圉自秦亡歸秦伯召重耳于楚楚子厚幣以送于秦秦伯納女五人焉史記子圉妻懷嬴與重耳不欲受臼季曰且受以結秦歡而求入乃受及晉惠公卒子圉嗣是為懷公史記晉大夫欒郤等聞重耳在秦皆隂來勸重耳反國為內應于是秦伯納重耳重耳即位是為文公左傳重耳濟河晉師軍于廬栁秦伯使公子縶如晉師師退軍于郇狐偃及秦晉之大夫盟重耳如晉師入于曲沃朝于武宫注廬栁城在今平陽府猗氏縣郇見前武宫晉武公廟使人殺懷公于髙梁注見前懷公故臣吕甥郤芮將焚公宫弒晉侯寺人披以難告左傳披請見公使辭之曰蒲城之役君命一宿女即至其後為惠公來求殺余命女三宿女中宿至雖有君命何其達也夫袪猶在女其行乎對曰君命無二除君之惡惟力是視蒲人狄人余何有焉今君即位其無蒲狄乎乃見之晉侯潛會秦伯于王城注見前公宫火呂郤不獲公乃如河上秦伯誘而殺之晉侯逆夫人嬴氏以歸左傳秦伯送衛于晉三千人實紀綱之僕狄人亦歸季隗于晉晉侯賞從亡者介之推史記作子推不言祿祿亦弗及推曰獻公之子九人惟君在矣惠懷無親外內棄之天未絶晉必將有主主晉祀者非君而誰天實置之而二三子以為已力不亦誣乎遂與其母偕隱而死史記介子推從者憐之乃懸書宫門曰龍欲上天五蛇為輔龍已升雲四蛇各入其宇一蛇獨怨終不見處所艾公出見其書曰此介子推也使人召之則亡遂求所在聞其入綿上山中于是文公環山而封之以為介推田號曰介山介山在今山西汾州府介休縣南有綿上聚錫晉侯命王使大宰王子虎文公及內史興錫晉侯命上卿逆于境晉侯郊勞館諸宗廟饋九牢設庭燎及期命于武宫設桑主獻公之主布几筵大宰涖之晉侯端委以入內史贊之三命而後即冕服既畢賔饗贈飢如公命侯伯之禮而加之以宴好內史興歸告王曰晉不可不善也其君必霸逆王命敬奉禮義成敬王命順之道也成禮義德之則也則德以道諸侯諸侯必歸焉王其善之夏狄伐鄭初鄭入滑滑人叛鄭而服于衛故鄭入滑滑人聽命師還又即衛鄭公子士泄鄭文公子堵俞彌鄭大夫帥師伐滑王使伯服遊孫伯二子周大夫如鄭請滑鄭伯不聽王命而執二子王怒將以狄伐鄭富辰周大夫諌曰不可人有言曰兄弟讒鬩侮人百里兄弟雖以讒言相達猶禁禦他人侮已鄭在天子兄弟也周之東遷晉鄭是依子頽之亂又鄭之由定今以小忿棄之是以小怨置大德也無乃不可乎王弗聽使頽叔桃子二子周大夫出狄師伐鄭取櫟王德狄人將以其女為后富辰諫曰報者倦矣施者未厭狄固貪婪王又啓之女德無極婦怨無終狄必為患王又弗聽冬王出居于鄭初富辰言于王請召王子帶于是帶自齊歸于京師及是帶通于狄后隗氏王替廢也隗氏頽叔桃子曰我實使狄狄其怨我遂奉帶以狄師攻王王御士將禦之王曰先后其謂我何寧使諸侯圖之王遂出及坎欿周地在今河南府鞏縣國人納之帶復以狄師寇王城大敗王師王出適鄭居于汜鄭南汜也今河南許州襄城縣有汜城鄭文公築此以居襄王後遂謂之襄城因以名縣帶以隗氏居于溫王使告難于諸侯簡師父告于晉左鄢父告于秦鄭伯與孔將鉏石甲父侯宣多三人皆鄭大夫省視官具于汜而後聽其私政丙戌十有七年春正月衛侯燬滅邢公羊傳衛侯燬何以名滅同姓也衛將伐邢禮至衛人曰不得其守守國正卿國不可得也我請昆弟仕焉乃往得仕及是衛人伐邢二禮從國子邢之卿巡城掖以赴外殺之衛遂滅邢衛侯尋卒子鄭嗣是為成公夏四月晉侯逆王入于王城誅𢃄秦伯師于河上將納王狐偃言于晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業謂文侯仇而信宣于諸侯今為可矣晉侯辭秦師而下右師圍溫帶在溫左師逆王王入于王城取帶于溫殺之晉侯朝王王饗醴命之宥請隧闕地通路曰隧王之葬禮弗許曰王章也未有代德而有二王亦叔父之所惡也與之陽樊溫原注俱見前攢茅今河南懷慶府修武縣有攢城即春秋攢茅田之田晉于是始啓南陽今河南懷慶府春秋為晉南陽地在山南河北故曰南陽陽樊不服圍之倉葛陽樊人呼曰此誰非王之親姻其俘之也乃出其民圍原命三日之糧原不降命去之諜出曰原將降矣軍吏請待之公曰信國之寶也民之所庇也得原失信何以庇之所亡滋多退一舍而原降遷原伯于冀趙衰為原大夫狐溱為溫大夫丁亥十有八年秋楚人滅夔楚同姓國今湖北宜昌府歸州有夔子國地名夔沱夔子不祀祝融楚之逺祖與鬻熊祝融十二世孫楚成得臣鬭宜申即司馬子西帥師滅夔以夔子歸戊子十有九年冬楚人陳侯蔡侯鄭伯許男圍宋宋以善于晉畔楚即晉楚子及諸侯圍宋宋公孫固莊公之孫為大司馬如晉告急先軫曰報施救患取威定霸于是在矣狐偃曰楚始得曹而新昏于衛若伐曹衛楚必救之則宋免矣于是乎搜于被廬晉地始作三軍謀元帥趙衰曰郤縠可説禮樂而敦詩書詩書義之府也禮樂德之則也德義利之本也君其試之乃使郤穀將中軍郤溱佐之使狐偃將上軍讓于狐毛而佐之欒枝將下軍先軫佐之荀林父御戎魏犫為右之郤縠郤溱郤氏族狐毛偃之兄樂枝賔孫先軫即原軫茍林父即中行桓子己丑二十年春正月晉侯侵曹晉侯伐衛蘇轍春秋集傳侵曹與伐衛異道故再稱晉侯晉侯將伐曹假道于衛衛弗許還自南河濟渡河而南出衛之東侵曹伐衛取五鹿郤縠卒先軫將中軍及齊侯昭公潘盟于斂盂今直𨽻大名府開州斂盂聚是衛侯請盟不許衛侯欲與楚國人不欲出其君以説于晉衛侯出居于襄牛襄襄牛衛地今河南歸德府睢州之邑廢縣是楚人救衛晉遂入曹令無入僖負羈之宫魏犫顛頡怒曰勞之不圖報于何有爇僖負羈氏公以魏犫才舍之殺顛頡以徇于師立舟之僑為戎右執曹伯以曹衛之田畀宋人宋使門尹般如晉師告急公曰宋人告急舍之則絶告楚不許我欲戰矣齊秦未可若之何先軫曰使宋舍我而賂齊秦藉之告楚我執曹君而分曹衛之田以畀宋人楚愛曹衛必不許也喜賂怒頑能無戰乎公從之夏四月晉侯齊師宋師秦師及楚人戰于城濮左傳注衛地府今山東曹州濮州南有臨濮故城即春秋城濮楚師敗績楚子入居于申使子玉去宋曰無從晉師楚子曰晉侯在外十九年矣而果得晉國天假之年而除其害天之所置其可廢乎子玉使伯棼子越椒也鬬伯比之孫請戰曰非敢必有功也願以間執讒慝之口謂蒍賈也蒍賈言于玉剛而無禮過三百乘即不能入蒍賈即伯嬴蚡冒之後蒍亦作薳食邑也楚子怒少與之師子玉使宛春告于晉曰請復衛侯而封曹臣亦釋宋之圍狐偃曰子玉無禮哉君取一臣取二不可失矣先軫曰定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎不如私許復曹衛以攜之執宛春以怒楚既戰而後圖之乃拘宛春于衛且私許復曹衛曹衛告絶于楚子玉怒從晉師晉師退三舍狐偃曰微楚之惠不及此退三舍避之所以報也楚衆欲止子玉不可晉侯及諸侯之師宋公齊國歸父崔夭秦小子憖崔夭齊丁公季子之後食采于崔以邑為氏小子憖秦穆公子次于城濮楚師背酅而舍酅邱陵險阻名使鬬勃即子上請戰晉侯登有莘之墟有莘古國伊尹耕于其野注見前以觀師曰少長有禮其可用也遂伐木以益其兵陳于莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒子玉宗人之兵六百人將中軍曰今日必無晉矣子西鬬宜申將左子上將右胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰狐毛設二斾而退之若為將却欒枝使輿曳柴而偽遁詐為衆走楚師馳之先軫郤溱史記作臻以中軍公族橫擊之狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止晉師三日館榖館舍也食楚軍榖三日而還子玉既敗楚子使謂之曰大夫若入其若申息之老何及連榖楚地在方城之外而死自殺晉侯聞之喜曰莫余毒也已朱子曰自齊桓公殁楚侵列國得晉文攔遏如橫流泛濫特作隄防不然列國為淹浸必矣惟是伐衛以致楚隂謀以取勝故夫子稱譎而不正五月晉侯齊侯宋公魯侯蔡侯鄭伯衛子衛侯出奔弟叔武受盟故稱子莒子盟于踐土左傳注鄭地元和志鄭州滎澤縣踐土臺故王宫在縣西北臨汴水今滎澤縣屬河南開封府晉侯至衡雍時鄭伯為楚師既敗而懼行成于晉晉侯及鄭伯盟于衡雍衡雍即垣雍城在河南懷慶府原武縣水經注晉文公戰勝于楚周襄王勞之于此作王宫于踐土獻楚俘于王駟介百乘徒兵千鄭伯傅王用平禮也用平王享晉文侯之禮王享醴命晉侯宥王命尹氏周世卿及王子虎周卿士內史叔興父即內史興䇿命晉侯為侯伯賜之大輅金輅之服戎輅戎車之服彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人曰王謂叔父敬服王命以綏四國糾逖王慝晉侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命受䇿以出出入三覲王子虎盟諸侯于王庭左傳注王子虎臨盟不同歃故不書王庭踐土宫之庭曰皆獎王室無相害也陳侯如會來不及盟諸侯朝于王所于是晉文公始霸冬晉侯齊侯宋公魯侯蔡侯鄭伯陳子穆公款卒共公朔嗣未葬故稱子莒子邾子秦人會于溫諸侯會于溫討不服也為討衛許晉遂執衛侯以諸侯圍許王狩于河陽今河南懷慶府孟縣河陽故城是諸侯朝于王所晉侯召王以諸侯見且使王狩史記晉侯會諸侯于溫欲率之朝周力未能恐有畔者乃使人言王狩于河陽孔子讀史至文公曰諸侯無召王王狩河陽者春秋諱之也伊川程子曰晉文公欲率諸侯以朝王正也懼其不能故譎以行之召王以就焉人獨見其召王之非而不見其欲朝之本心是以譎而掩其正也晉人執衛侯歸之于京師初衛侯聞楚師敗懼出奔楚遂適陳使元咺衛大夫奉叔武衛侯弟夷叔以受盟或訴元咺于衛侯曰立叔武矣其子角從公公殺之咺不廢命奉叔武以入守晉人復衛侯衛侯先期入叔武將沐聞公至喜捉髮走出前驅公子歂犬華仲射而殺之公知其無罪遂殺歂犬元咺出奔晉溫之會衛侯與元咺訟衛侯不勝元咺歸于衛立公子瑕晉人執衛侯歸之于京師請殺之王曰不可夫君臣無獄今元咺雖直不可聽也君臣皆獄父子將獄是無上下也而叔父聽之一逆矣又為臣殺其君其安庸刑布刑而不庸再逆矣一合諸侯而有再逆政余懼其無後也于是置諸深室寧俞寧氏衛公族以邑為氏俞莊子速之子職納槖饘焉槖衣囊饘麋也後玨使醫衍鴆衛侯寧俞貨醫使薄其鴆不死魯侯為之請納玉于王與晉侯皆十榖乃釋衛侯衛侯使周歂冶厪殺元咺及公子瑕遂歸于衛先是諸侯圍許晉侯有疾曹伯之豎侯獳貨筮史使以曹為解晉侯復曹伯歸于曹庚寅二十有一年夏六月王子虎魯侯晉人宋人齊人陳人蔡人秦人盟于翟泉在河南府洛陽縣故洛陽城中水經注榖水東流入洛陽縣之南池即故翟泉也書考是盟春秋不書公王子虎王人今依金氏前編書王子虎魯侯晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉尋踐土之盟且謀伐鄭陳氏傅良曰此晉初以大夫盟王子也大夫之交政于是始辛卯二十有二年秋九月晉人秦人圍鄭晉侯秦伯圍鄭鄭人以名寶行成晉弗許曰與我詹而師還謂叔詹也詹前請殺晉侯詹請往鄭以詹與晉晉人將烹之既而弗殺詹就烹據鼎耳而疾號曰自今以往知忠以事君者與詹同晉人舍之曰欲得鄭君而甘心焉鄭恐乃間令使燭之武夜縋而出謂秦伯曰亡鄭厚晉于晉得矣而秦未為利何不解鄭得為東道交秦伯遂與鄭人盟使杞子逄孫揚孫戌之而還狐偃請擊之晉侯曰不可微夫人之力不及此亦去之初鄭公子蘭出奔晉從于晉侯伐鄭請無與圍鄭許之使待命于東鄭石甲父侯宣多逆以為太子以求成于晉晉許之越二年鄭文公卒子蘭嗣是為穆公冬使宰周公聘于魯魯公子遂即東門襄仲莊公子入聘周公閲聘魯饗有昌歜昌蒲菹白熬稻黑熬黍形鹽辭曰國君文足昭也武可畏也則有備物之饗吾何以堪之于是魯公子遂入聘京師壬辰二十有三年秋晉作五軍初晉侯作三行以禦狄左傳注晉置三軍復增置三行以避天子六軍名至是搜于清原在山西絳州稷山縣西北舍三行而作五軍更為上下新軍使趙衰為卿為新軍帥後復舍二軍仍為三軍趙盾將中軍始為國政事在三十一年冬十有二月衛遷于帝邱注見前狄圍衛衛遷帝邱卜曰三百年左傳疏衛自此年以後厯十九君積四百二十年衛元君乃徙野王後為秦所滅癸巳二十有四年冬十有二月晉侯重耳卒晉文公卒子歡立是為襄公是年楚鬬章請平于晉晉陽處父晉大夫報之晉楚始通甲午二十有五年春二月秦人入滑夏四月晉人及薑戎薑姓之戎居晉南鄙敗秦師于殽即崤山在今河南府永寧縣杞子自鄭使告于秦曰鄭人使我掌其北門之管若潛師以來國可得也秦伯訪諸蹇叔百里奚之友奚嘗遊因于秦蹇叔收之及秦用奚奚薦之穆公穆公以厚幣迎為上大夫蹇叔曰勞師以襲逺不可公辭焉召孟明西乞白乙史記百里奚子孟明視蹇叔子西乞術及白乙丙出師蹇叔子與師哭而送之蹇叔曰晉人禦師必于殽殽有二陵焉其南陵夏后臯之墓也其北陵文王之所避風雨也必死是間豫收爾骨焉秦師遂東過周北門左右免胄而下起乘者三百乘王孫滿尚幼觀之曰秦師輕而無禮必敗及滑鄭商人弦髙以牛十二犒師且使遽告于鄭鄭人使視客館則束載厲兵秣馬矣遂辭焉杞子奔齊逄孫揚孫奔宋孟明曰鄭有備矣不可冀也滅滑而還晉先軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱必伐秦師遂發命遽興薑戎子墨衰絰子謂晉侯凶服從戎故墨之敗秦師于殽獲孟明西乞白乙以歸遂墨以葬文公晉于是始墨文嬴文公夫人請三帥使歸就戮于秦公許之先軫朝問秦囚公曰夫人請之吾舍之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國墮軍實而長寇讐亡無日矣公使陽處父追之及諸河則在舟中矣三帥歸秦伯素服郊次哭曰孤違蹇叔以辱二三子孤之罪也大夫何罪且吾不以一眚掩大德乙未二十有六年春二月癸亥日有食之夏使毛伯姬姓伯爵食采于毛地在畿內世為王卿士錫魯侯命魯叔孫得臣叔牙孫諡莊叔來拜命魯僖公卒子興嗣是為文公王使毛伯衛如魯錫魯侯命魯使叔孫得臣來京師拜賜命晉侯襄公來朝于溫伐衛晉文公之季年諸侯朝晉衛侯不朝使孔達衛大夫伐鄭及是晉侯既祥使告于諸侯而伐衛及南陽先且居先軫子曰效尤禍也請君朝王左傳注時王在溫故勸之臣從師晉侯朝王于溫先且居胥臣伐衛圍戚古戚城在今直𨽻大名府開州取之衛人使告于陳陳侯穆公子共公朔曰更伐之我辭之衛孔達帥師伐晉于是晉侯疆戚田正其疆界魯公孫敖會之後晉以郤缺言復歸戚田于衛郤缺芮之子冬十月楚世子商臣弒其君頵初楚子將以商臣為太子訪之令尹子上子上曰是人也蜂目而豺聲忍人也不可立弗聽既又欲立子職商臣庶弟而黜商臣商臣聞之未察告其師潘崇曰若之何察之潘崇曰享江芊楚子妹而弗敬也從之江芊怒曰呼役夫宜君王之欲殺女而立職也告潘崇曰信矣乃以宫甲楚有東宫之卒圍楚子楚子請食熊蹯而死熊掌難熟冀久將有外救弗聽楚子縊商臣乃自立是為楚穆以太子之室與潘崇使為太師掌環列之尹丙申二十有七年夏六月晉士縠士蒍子會宋公陳侯鄭伯魯公孫敖盟于垂隴今河南開封府滎澤縣有故隴城亦謂之都尉城即春秋垂隴晉司空士縠會諸侯及魯公孫敖盟于垂隴晉討衛故也陳侯為衛請成于晉執孔達以説明年衛侯如陳拜晉成又明年晉人歸孔達于衛衛侯如晉拜陳氏傳良曰大夫而敵諸侯于是始丁酉二十有八年夏秦伯伐晉誓于軍殽之役晉人既歸秦帥秦大夫及左右皆言于秦伯曰是孟明之罪也請殺之秦伯曰是孤之罪也孤實貪以禍夫子夫子何罪復使為政明年孟明帥師伐晉以報殽之役晉侯禦之戰于彭衙陜西同州府白水縣有衙縣故城今為彭衙堡即春秋彭衙秦師敗績秦伯猶用孟明孟明增修國政重施于民晉趙衰言于諸大夫曰秦師又至將必避之懼而增德不可當也至是秦伯伐晉濟河焚舟今山西蒲州府永濟縣有孟盟橋即秦伯濟河焚舟處盟師必克因以名橋取王官王官城在蒲州府虞鄉縣南近王官谷及郊春秋彚纂注臨晉平陽間小邑晉人不出遂自茅津濟今山西解州平陸縣有沙澗渡亦名茅津渡在黃河北岸南對陜州即春秋茅津封殽中尸發喪哭之三日乃誓于軍作秦誓以申思不用蹇叔之謀且曰令後世以記余過秋楚人圍江冬王叔會晉陽處父伐楚以救江楚師圍江晉以告于王王叔桓公以王叔虎文公之子爵系為氏及晉陽處父伐楚以救江門于方城遇息公子朱而還左傳注子朱楚伐江之帥聞晉師起而江兵解故晉亦還戊戌二十有九年秋楚人滅江秦伯為之降服素服也出次辟正寢不舉去盛饌過數鄰國之禮有數秦伯過之大夫諌公曰同盟滅雖不能救敢不矜乎吾自懼也命秦伯為西方諸侯伯戎人由余自戎歸于秦由余其先晉人亡入戎能晉言戎王使覘秦秦伯賢之以內史廖言遺戎王以女樂而歸由余戎王説女樂由余數諌弗聽秦伯數使人間要由余由余遂降秦秦伯以客禮禮之用其謀伐戎益國十二開地千里遂霸西戎王使召公過賜秦伯以金鼓命為西方諸侯伯己亥三十年秋楚人滅六注見前冬滅蓼今河南光州固始縣有蓼城岡古蓼國魯臧孫辰聞六與蓼滅曰臯陶庭堅不祀忽諸六蓼皆臯陶之後德之不建民之無援哀哉庚子三十有一年秦伯任好卒子罃嗣是為康公以子車氏秦大夫之三子奄息仲行針虎為殉秦自武公卒初以人從死皆秦之良也國人哀之為之賦黃鳥詩序秦風黃鳥哀三良也國人刺穆公以人從死而作是詩辛丑三十有二年春三月魯取須句今山東泰安府東平州有須昌故城即須句國須句風姓司太皥之祀魯僖公時邾人滅之成風僖公母風姓言于公公伐邾取須句而反其君至是魯取須句絶太皥之祀置邾子之子焉左傳注邾文公子叛邾在魯故魯使為須句大夫夏晉人及秦人戰于令狐令狐城在山西蒲州府猗氏縣今名令狐村晉先蔑即士伯奔秦晉襄公卒太子夷臯少晉人以難故欲立長君趙盾曰趙盾趙衰子狄女叔隗出立公子雍文公子仕秦為亞卿好善而長先君愛之且近在秦秦舊好也足以為援乃使先蔑士會士蒍之孫别邑于隨故亦曰隨季如秦逆公子雍賈季欲立文公子樂亦使召于陳趙盾殺諸郫賈季殺陽處父而奔狄賈季即狐射姑偃之子秦伯康公送公子雍于晉曰文公之入無衛故有吕郤之難乃多與之徒衛晉太子母嬴穆嬴日抱太子以啼于朝曰先君何罪其嗣亦何罪舍適嗣不立而外求君將焉置此出朝則抱以適趙氏頓首于趙盾曰先君奉此子而屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何趙盾與諸大夫皆患嬴氏且畏逼畏國人以大義來逼巳乃背先蔑而立夷臯是為靈公以禦秦師訓卒利兵秣馬蓐食潛師夜起敗秦師于令狐先蔑奔秦士會從之壬寅三十有三年秋八月王崩子壬臣立是為頃王頃王癸卯元年春毛伯注見前如魯求金魯使叔孫得臣來京師葬襄王先是襄王崩魯使公孫敖入弔不至以幣奔莒及將葬毛伯如魯求金魯復使得臣來京師會葬三月楚人伐鄭晉人宋人魯人衛人許人救鄭范山楚大夫言于楚子曰晉君少志不在諸侯北方可圖也楚子師于狼淵左傳注潁川潁隂縣有狼陂潁隂即今河南許州以伐鄭囚公子堅公子厖及樂耳皆鄭大夫鄭及楚平魯公子遂會晉趙盾宋華耦督曽孫衛孔達許大夫救鄭不及後鄭復請成于晉盟于新城事在王六年縣新城宋地在今歸德府商邱西南晉伐齊宋齊弒昭公子舍宋弒昭公俱詳後皆取賂而還鄭以晉不足與遂盟于楚事在匡王五年夏楚侵陳楚子以陳服于晉侵之克壺邱左傳注陳邑秋楚公子朱息公也復自東夷伐陳陳人敗之獲公子茷陳懼乃及楚平左傳注以小勝大故懼而請平明年陳侯鄭伯會楚子于息遂及蔡侯次于厥貉春秋彚纂注厥貉杜注地闕當在今陳州項城縣將伐宋宋公成公子昭公杵臼逆楚子勞且請命遂道以田孟諸爾雅十藪宋有孟諸今河南歸德府商邱縣有孟諸澤後陳共公卒子平國立是為靈公楚不禮焉陳遂受盟于晉于是楚復侵陳晉趙盾帥師救之楚人囚晉解揚晉大夫後復還晉晉師乃還事在匡王五年乙巳三年冬十月魯叔孫得臣敗狄史記作翟于鹹左傳注魯地鄋瞞左傳注狄國名防風氏之後漆姓侵齊遂伐魯魯侯使叔孫得臣追之遂敗之于鹹獲長狄僑如左傳注鄋瞞國之君身長三丈榖梁傳射其目身橫九畝斷其首而載之眉見于軾范寧榖梁集解九畝五丈四尺殺之埋其首于子駒之門左傳注魯郭門僑如骨節非常恐後世怪之故詳其處史記宋武公之世鄋瞞伐宋宋獲長翟緣斯晉之滅潞獲僑如弟焚如齊惠公二年鄋瞞伐齊獲其弟榮如衛人穫其季弟簡如鄋瞞由是遂亡丙午四年冬十有二月晉人秦人戰于河曲左傳注在河東蒲坂縣蒲坂故城在今山西蒲州府永濟縣黃河自永濟折而東入解州之芮城謂之河曲秦為令狐之役伐晉取羈馬今蒲州府永濟縣有羈馬城亦謂之涉邱晉人禦之從秦師于河曲臾駢趙盾屬大夫新佐上軍曰秦不能久請深壘固軍以待從之士會謂秦伯曰必臾駢為此謀以老我師也趙穿趙夙庶孫有寵而弱好勇而狂若使輕者肆焉其可秦軍遂掩晉上軍趙穿追之不及怒將獨以其屬戰趙盾曰秦獲穿歸我何以報乃皆出戰交綏綏郤也秦晉兵未至爭而兩退故曰交綏是夜秦師遁復侵晉入瑕故瑕城在蒲州府臨晉縣晉患秦之用士會也使魏壽餘畢萬之後偽以魏注見前叛降秦時秦師河曲魏人在東壽餘曰請東人之能與夫二三有司言者吾與之先秦伯使士會既濟魏人譟而還士會將行繞朝贈之以䇿曰子無謂秦無人吾謀適不用也秦人歸士會之帑其處者為劉氏戊申六年春王崩子班立是為匡王頃王崩周公閲與王孫蘇爭政將訟于晉王匡王不與王孫而訟理之也周公于晉晉趙盾平王室而復之復使和好秋七月有星孛入于北斗左傳注孛彗也既見而移入北斗九月齊公子商人弒其君舍齊昭公卒昭公孝公弟孝公卒昭公因開方殺其子而立子舍即位舍母魯叔姬無寵舍無威商人驟施于國而多聚士舍立甫三月商人弒之而讓公子元桓公子商人兄元曰爾求之久矣我能事爾商人乃自立是為懿公公子元不順懿公之為政終不曰公曰夫已氏匡王己酉元年夏六月辛丑朔日有食之庚戌二年秋楚人秦人巴人今四川重慶府古巴國巴縣其國都也滅庸注見前楚大飢戎伐之庸人率羣蠻以叛麇人文獻通考麇國在均州鄖鄉今湖北鄖陽府鄖縣故鄖鄉縣也率百濮杜預春秋釋例建寧南有濮夷各以邑落自聚故稱百濮地理今釋建寧故城在今荆州府石首縣聚于選左傳注楚地在今荆州府枝江縣南將伐楚楚人謀徙于阪髙左傳注楚險地蒍賈曰不可我能往冦亦能往不如伐庸夫麇與百濮謂我飢不能師故伐我也若我出師必懼而歸乃出師旬有五日百濮遂罷使廬戢梨廬盧戎也今湖北襄陽府南漳縣有中廬故城即廬國戢梨廬大夫侵庸庸人逐之囚子揚窗戢梨官屬逸歸曰庸師衆不如復大師且起王卒合而後進潘尫潘崇子字師叔曰不可姑又與之遇以驕之乃與之遇七遇皆北庸人曰楚不足與戰矣遂不設備楚子楚穆之子名旅是為楚莊乘馹會師于臨品春秋彚纂注臨品地名在今襄陽府均州界分為二隊子越自石溪子貝自仞左傳注石溪仞入庸道俱在均州界以伐庸秦人巴人從楚師遂滅庸冬十有一月宋人弒其君杵臼昭公宋公子鮑昭公庶弟禮于國人宋飢竭其粟而貸之年自七十以上無不餽貽也國之材人無不事也親自桓以下無不恤也襄夫人襄公夫人助之施宋公昭公無道國人奉公子鮑以因夫人夫人將使公田而殺之公知之盡以寶行蕩意諸公子蕩孫以名為氏世為司城曰盍適諸侯公曰不能其大夫至于君祖母昭公成公子襄公孫以及國人諸侯誰納我盡以其寶賜左右使行夫人使謂意諸去公對曰臣之而逃其難若後君何公田孟諸未至夫人使帥甸郊甸之帥攻而殺之意諸死焉公子鮑即位是為文公壬子四年夏五月齊人弒其君商人齊侯為公子時與邴歜之父爭田弗勝及即位掘而刖之左傳注斷其尸足而使歜僕御車也納閻職之妻而使職驂乘齊侯遊于申池齊南城西門名申門左右有池二人浴于池歜以撲抶擊也職職怒歜曰人奪汝妻而不怒一抶何傷職曰與刖其父而不能病者何如乃共謀弒齊侯納諸竹中歸舍爵而行飲酒訖乃去齊人立公子元是為惠公冬十月魯侯興文公卒公子遂弒其君之子赤一名惡及公子視立公子倭是為宣公夫人薑氏歸于齊魯文公二妃長妃薑哀薑生赤及視次妃嬴敬嬴生倭嬴嬖而私事公子遂文公卒遂以倭長欲立之叔仲彭生字惠伯叔牙孫别為叔仲氏不可遂乃之齊以立倭請齊侯新立欲親魯許之遂歸殺赤及視而立倭以君命召彭生其宰公冉務人止之曰入必死彭生曰死君命可也乃入殺而埋之夫人薑氏歸于齊哭而過市曰天乎仲為不道殺適立庶市人皆哭魯人謂之哀薑莒弒其君庶其紀公莒子生太子僕又生季他愛季他而黜僕且多行無禮于國僕因國人弒莒子以其寶玉奔魯魯侯命與之邑季孫行父諡文子季友孫使司冦出諸境魯侯問其故曰先大夫臧文仲教行父事君之禮曰見有禮于其君者事之如孝子之養父母也見無禮于其君者誅之如鷹鸇之逐鳥雀也夫僕弒君父其人則盜賊也其器則姦兆也保而利之則主藏也是以去之甲寅六年春二月宋華元御事子督曽孫為右師及鄭公子歸生帥師戰于大棘今河南歸德府柘城縣西北有大棘城故址宋師敗績獲宋華元鄭公子歸生受命于楚伐宋宋華元樂吕宋戴公曽孫為司冦禦之戰于大棘宋師敗績囚華元獲樂吕初華元殺羊饗士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗宋人以兵車百乘文馬百駟贖華元于鄭半入華元逃歸宋城華元巡功城者謳曰睅其目皤其腹棄甲而復于思于思棄甲復來元使謂之曰牛則有皮犀兕尚多棄甲則那役人曰縱其有皮丹漆若何華元曰去之夫其口衆我寡秋九月晉趙盾弒其君夷臯晉侯虐公羊傳靈公使諸大夫內朝處乎臺上引彈而彈之大夫趨而避丸是樂諸大夫出于朝有人荷畚自閨而出趙盾視之膳宰也熊蹯不熱以斗摮而殺之支解使棄之趙盾驟諫晉侯患之使鉏麑賊之晨往盾寢門已闢盛服將朝蚤而假寐麑歎曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一于此不如死也觸槐而死晉侯飲趙盾酒伏甲將攻盾其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫􅋙明搏而殺之鬭且出提彌明死之靈輒為公介公甲士倒戟以禦公徒而免盾初盾田首山舍于翳桑見靈輒餓食之舍其半問之曰願遺母盾使盡之而益與之簞食與肉使遺母至是既免盾問何故對曰翳桑之餓人也問其名居不告因亡去盾遂奔趙穿弒晉侯于桃園盾未出山而復晉太史董狐周辛有之後書曰趙盾弒其君以示于朝盾曰不然對曰子為正卿亡不越境反不討賊非子而誰盾使趙穿逆公子黑臀文公子于周而立之是為成公冬十月王崩弟瑜立是為定王定王乙卯元年春楚子伐陸渾之戎注見前楚子伐陸渾之戎遂至于雒觀兵于周疆王使王孫滿周大夫勞楚子楚子問鼎之大小輕重對曰在德不在鼎德之休明雖小重也其姦回昏亂雖大輕也天祚明德有所底止成王定鼎于郟鄏注見前卜世三十卜年七百周德雖衰天命未改鼎之輕重未可問也丙辰二年夏六月鄭公子歸生弒其君夷穆公子靈公楚人獻黿于鄭伯公子宋即子公與歸生即子家將見宋食指動以示歸生曰他日我如此必嘗異味及入宰夫將解黿相視而笑鄭伯問之歸生以告鄭伯食諸大夫黿召宋而弗與宋遂染指于鼎嘗之而出鄭伯怒欲殺宋宋與歸生謀先歸生不可宋反譖歸生歸生懼而從之遂弒鄭伯鄭人立穆公之庶子堅是為襄公後歸生卒鄭人斫其棺逐其族秋七月楚殺鬬椒即子越椒楚鬭般子文之子子揚為令尹椒為司馬蒍賈為工正賈譖般而殺之椒為令尹賈為司馬椒又惡賈乃以若敖氏之族圄賈于轑陽春秋彚纂注楚地漢武封江喜為轑陽侯即此而殺之遂處蒸野左傳注楚地將攻楚子師于漳澨漳水名澨水涯水經漳水出臨沮荆山注漳水南徑當陽縣右會沮陸臨沮今湖北襄陽府南漳縣當陽今縣屬湖北安府沮水在其北楚子與若敖氏戰椒射楚子師退楚子鼓而進之遂滅若敖氏初椒始生子文曰必殺之是子也熊虎之狀而豺狼之聲弗殺必滅若敖氏子良子文弟椒之父不可子文以為大戚至是若敖氏果滅子文孫針尹官名克黃子揚子使于齊還及宋聞亂人曰不可入矣克黃曰棄君之命獨誰受之君天也天可逃乎遂歸復命自拘于司敗楚子思子文之治國曰子文無後其何以勸善使復其所改命曰生己未五年河徙漢書溝洫志大司空掾王橫言周譜定王五年河徙蔡沈尚書集傳程氏大昌曰周時河徙砱礫胡渭禹貢錐指大昌禹貢論但云河徙故瀆無砱礫字蔡傳所引誤初大禹導河自積石即大雪山注見前阿考大雪山在今青海境內名彌耶瑪勒津木遜山又闢展西南有大澤曰羅布淖爾即古蒲昌海葉爾羌和闐兩河東行注之即古于闐蔥嶺兩河所謂合注蒲昌海潛行出于積石者大雪山西有山曰庫爾坤阿爾坦河出焉是即漢書所云河有重源者其東北有泉名鄂敦搭拉則元史所云星宿海也至孟津龍門底柱俱已見前兹不具載考河流自孟津以上至今不改過洛汭水曲流曰汭洛水入河處舊在鞏縣今在開封府汜水縣西北及至大伾即黎山在今河南衛輝府濬縣東南乃釃二渠史記禹厮二渠以引河北載之髙地禹貢錐指二渠自黎陽宿胥口始一北流為大河一東流為漯川東北至千乘入海北過降水即漳水以合絳水故亦名絳兼通為降也禹貢錐指河之經流自大伾西南折而北為宿胥口又東北合漳水是為北過降水至于大陸即廣阿澤在直𨽻趙州隆平縣東北跨保定府束鹿縣順德府巨鹿任二縣及深州下流至寧晉縣為胡盧河又北播為九河注亦見前同為逆河入于海蘇軾書傳云逆河者既分為九又合為一以一逆八而入于海也帝堯八十載告厥成功至是凡一千六百七十六年河始決宿胥口水經注宿胥口舊河水北入東徙漯川即禹釃二渠之一禹河由大伾之西而北流河徙後由大伾之南而東流于是禹河北過降水至大陸之道遂堙徑長壽津在今衛輝府滑縣東北禹貢錐指河行漯川右經滑臺城又東北至長壽津與漯别行水經謂之大河故瀆東北徑戚城西今直𨽻開州地又東北徑發干縣故城西今山東堂邑縣地西流徑鬲縣故城西今山東德州地又北徑安陵縣西今直𨽻吳橋縣地東北至成平今交河縣復合于禹故河水經注大河故瀆至東光縣故城西而北與漳水合禹貢錐指大河自宿胥口徙流至成平合漳水復歸禹河故道厯浮陽平舒至章武入海以今輿地言之濬縣滑縣開州及館陶堂邑平原德州吳橋東光交河滄州靜海天津諸州縣界中皆周定王五年至西漢末大河之所行也此黃河大徙之始余氏闕曰自周定王時河始東徙訖于漢而禹之故道遂失西京時受患特甚自瓠子再決遂流為屯氏諸河東都至唐河不為害者千有餘年至宋而河又南決乃由彭城合汴泗東流以入淮冬晉侯宋公魯侯衛侯鄭伯曹伯會于黑壤今山西澤州府沁水縣有烏嶺即春秋晉黑壤鄭及晉平公子宋之謀也故相鄭伯以會盟于黑壤王叔桓公臨之以謀不睦左俾注王叔銜天子命臨諸侯不同歃故不書初晉侯之立鄭舍楚即晉故楚人侵鄭王元年又三伐鄭王之二年及三年四年取成而還取成于厲鄭伯逃歸至是復與晉盟于是楚子復伐鄭事在王七年晉人救之既而鄭及楚平晉以諸侯伐鄭遂取成焉事在王八年是冬楚伐鄭晉以諸侯之師戍鄭庚申六年秋七月甲子日有食之既冬使單子單襄公韋昭國語注王卿士單朝聘于宋遂自陳聘于楚王使單子聘于宋遂假道于陳以聘于楚火朝覿矣火心星覿見也謂夏正十月晨見于辰道茀不可行候候人也不在疆司空不視塗澤不陂川不梁野有庾積庾露積榖也場功未畢道無列樹墾田若蓻發田曰墾蓻猶蒔也言其希少猶若蓻物膳宰不致餼司里不授館國無寄寓縣無施舍民將築臺于夏氏陳大夫夏徴舒之家及陳陳侯名平國恭公之子靈公與公孫寧儀行父陳二卿南冠楚冠也以如夏氏夏徴舒祖少西字子夏後遂以字為氏留賓弗見單子歸告王曰陳侯不有大咎國必亡辛酉七年夏魯仲孫蔑諡獻子文伯穀之子入聘王徴聘于魯魯使仲孫蔑入聘王以為有禮厚賄之秋九月晉侯宋公衛侯鄭伯曹伯會于扈今河南懷慶府原武縣扈亭是晉荀林父帥師伐陳初陳即楚晉趙盾衛孫免侵陳陳及晉平事在王四年于是楚師伐陳取成而還在六年至是晉合諸侯于扈陳侯不會荀林父以諸侯之師伐陳晉侯卒于扈乃還晉成公卒子獳嗣是為景公壬戌八年夏四月丙辰日有食之五年陳夏徴舒弒其君平國陳侯與公孫寧儀行父通于夏姬左傳注夏姬鄭穆公女陳大夫御叔妻夏徴舒母皆衣其衵服婦人近衷衣曰衵以戲于朝泄冶陳大夫諌曰君臣淫亂民何效焉陳侯以告二子遂殺泄冶陳侯飲酒于夏氏謂行父曰徴舒似女對曰亦似君徴舒病之伏弩廄門俟陳侯出弒之公孫寧儀行父奔楚太子午奔晉徴舒自立為陳侯秋使王季子即劉康公公羊傳王母弟也左傳注季子王大夫故稱字其後食采于劉今河南府偃師縣有劉聚亦曰劉亭即劉子邑聘于魯春秋書王聘止此報仲孫蔑之聘也發幣于大夫季孫行父仲孫蔑皆儉叔孫僑如公孫歸父公子遂子皆侈歸王問魯大夫孰賢對曰季孟孟即仲孫氏其長處魯乎叔孫東門遂居東門因以為氏其亡乎若家不亡身必不免王曰何故對曰臣聞之寬肅宣惠君也敬恪恭儉臣也今二子者儉儉則能足用用足則族可以庇二子者侈侈則不恤匱匱而不恤憂必及之王曰幾何對曰東門之位不若叔孫東門大夫叔孫卿也而泰侈焉不可以事二君叔孫之位不若季孟叔孫下卿季孟上卿而亦泰侈焉不可以事三君王十六年歸父謀去三桓使如晉未反魯宣公薨三桓逐歸父遂奔齊簡王十一年僑如通于宣公夫人穆薑欲去季孟而專公室國人逐之亦出奔齊癸亥九年夏楚子陳侯鄭伯盟于辰陵陳地今河南陳州府淮寧縣有辰亭即春秋辰陵也楚子伐鄭及櫟注見前鄭公子去疾字子良穆公子曰晉楚不務德而兵爭與其來者可也晉楚無信我焉得有信乃從楚楚盟于辰陵陳鄭服也于時楚益強盛主盟列國冬十月楚人殺陳夏徴舒楚子入陳楚子伐陳謂陳人無動將討于少西氏遂入陳殺夏徴舒轘諸栗門陳城門因縣陳申叔時諫曰時使于齊還夏徴舒弒其君其罪大矣討而戮之君之義也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎楚子曰善乃復封陳納公孫寧儀行父于陳迎太子午于晉而立之是為成公鄉取一人焉以歸謂之夏州在今湖北漢陽府漢陽縣夏口北蘇秦説楚威王曰楚有夏州即莊王處陳人之所甲子十年春楚子圍鄭三月克之入自皇門鄭南門曰皇門至于逵路鄭伯肉袒牽羊以迎楚子曰其君能下人必能信用其民矣庸可幾乎退三十里而許之平潘尫入盟鄭公子去疾出質鄭自此服于楚至王二十一年蟲牢之盟方與晉成夏六月晉荀林父帥師及楚戰于邲鄭地今河南開封府鄭州東有邲城晉師敗績晉師救鄭荀林父將中軍先縠佐之士會將上軍郤克佐之趙朔將下軍欒書佐之趙括趙嬰齊為中軍大夫鞏朔韓穿為上軍大夫荀首趙同為下軍大夫韓厥為司馬先縠且居之子趙朔盾之子欒書枝之孫趙括嬰齊同皆盾異母弟鞏朔即士莊伯韓穿韓氏族荀首林父弟韓厥萬曽孫及河聞鄭既及楚平荀林父欲還曰無及于鄭而勦民焉用之士會曰善會聞見可而進知難而退軍之善政也兼弱攻昧武之善經也子姑整軍而經武乎猶有弱而昧者何必楚先縠曰晉所以霸師武臣力也今失諸侯不可謂力有敵而不從不可謂武且成師以出聞敵強而退非夫也以中軍佐濟韓厥謂林父曰彘子即先縠以偏師陷子罪大矣事之不捷惡有所分與其專罪六人同之不猶愈乎不如進也師遂濟楚子北師次于郔左傳注鄭邑即廩延將飲馬于河聞晉師既濟欲還嬖人伍參欲戰令尹孫叔敖弗欲史記孫叔敖楚之處士虞邱相進之楚莊王為楚相施教導民政緩禁止吏無姦邪盜賊不起秋冬勸民山採春夏以水各得其所便民皆樂其生莊考孟子孫叔敖舉于海趙岐注叔敖隱處海濵楚王舉之以為令尹其説與史記同杜預左傳注則從服虔之説以叔敖為蒍賈之子即蒍艾獵也案左傳蒍賈為子越椒所殺叔敖或以是而隱處亦未可知今並存其説附注于此南轅反斾伍參曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命晉師必敗楚子告令尹改乘轅而北之次于管今開封府鄭州管城廢縣是以待晉師在敖鄗山名在開封府榮澤縣西北之間楚子使求成于晉晉人許之盟有日矣魏錡魏犫子求公族未得及趙旃趙穿子求卿未得請使召盟皆命而往郤克請設備先縠不可士會使鞏朔韓穿設七覆于敖前趙嬰齊使其徒先具舟于河魏錡遂請戰楚潘黨逐之趙旃夜至楚軍席于軍門之外使其徒入之楚子逐趙旃楚人懼其入晉軍遂出陳令尹命疾進師車馳卒奔乘晉軍林父不知所為鼓于軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也晉師右移上軍未動士會殿其卒而退不敗楚熊負羈囚荀罃荀首以其族反之曰不以人子吾子其可得乎射連尹襄老獲之遂載其尸射公子榖臣囚之以二者還荀罃首之子榖臣楚莊之子楚子軍于邲次于衡雍注見前潘黨請築京觀積尸封土其上謂之京觀弗許祀于河作先君宫告成事而還晉師歸林父請死晉侯欲許之士渥濁士氏族諡貞子諌曰林父進思盡忠退思補過社稷之衛也若之何殺之晉侯使復其位明年先縠召赤狄伐晉及清即清原晉人討邲之敗與清之師殺先縠而滅其族冬十有二月楚子滅蕭注見前楚子伐蕭宋華椒華氏族以蔡人救蕭蕭人囚熊相宜僚及公子丙皆楚大夫楚子曰勿殺吾退蕭人殺之楚子怒遂圍蕭蕭潰申公巫臣屈蕩子曰師人多寒楚子巡三軍拊而勉之三軍之士皆如挾纊丁卯十有三年夏五月宋人及楚人平楚子使申舟即文之母畏聘于齊曰無假道于宋先是楚穆與宋公田于孟諸母畏抶宋公之僕故惡宋曰我必死楚子曰殺女我伐之及宋宋華元殺之于是楚子圍宋宋使樂嬰齊告急于晉晉侯欲救之伯宗晉大夫曰雖鞭之長不及馬腹天方授楚未可與爭君其待之乃止使解揚如宋使無降楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子將殺之曰爾既許不榖而反之非我無信女則棄之速即爾刑對曰君能制命為義臣能承命為信義無二信信無二命君之賂臣不知命也受命以出有死無霣又可賂乎臣之許君以成命也死而成命臣之祿也死又何求楚子舍之以歸楚師將去宋申犀申舟子稽首于馬前曰毋畏知死而不敢廢王命王棄言焉申叔時僕為御也曰築室反耕者宋必聽命從之宋人懼使華元夜入楚師公羊傳莊王圍宋軍有七日之糧耳盡此不勝將去而歸于是使司馬子反乘堙而閫宋城宋華元亦乘堙而出見之登子反公子側之床起之曰寡君使元以病告曰敝邑易子而食析骸以爨雖然城下之盟有以國斃不能從也去我三十里唯命是聽子反懼與之盟而告楚子退三十里宋及楚平華元為質盟曰我無爾詐爾無我虞王札子左傳注王札子王子札也經文倒札字公羊注天子之庶兄殺召伯毛伯王孫蘇與召氏毛氏三人皆王卿士爭政使王子捷即子札殺召伯戴公毛伯衛其後立戴公之子襄秋魯初稅畝履畝而稅也左傳注周法民耕百畝公田十畝借民力而治之稅不過此是十取其一今又履其餘畝復十收其一遂以為常故曰初戊辰十有四年春三月晉獻狄俘先是晉荀林父帥師滅赤狄潞氏潞赤狄别種今山西潞安府潞城縣東北有潞縣故城春秋潞子國晉侯使趙同獻俘于王不敬劉子即王季子劉康公曰不十年原叔趙同字必有大咎至是士會復滅赤狄甲氏在今直𨽻廣平府雞澤縣境及留吁今潞安府屯留縣有純留故城即留吁國鐸辰留吁之屬再獻狄俘晉侯請于王以黻冕命士會將中軍且為太傅左傳注太傅孤卿左傳疏天子太傅三公之官諸侯太傅孤卿之官上公得置孤卿一人晉為伯主雖侯亦得置孤卿于是晉國之盜逃奔于秦夏成周宣榭火火公羊傳作災何休曰有室曰寢無室曰榭徐彥疏但有大殿無室名曰榭宣宫之榭何休曰宣王之廟也樂器藏焉何體曰中興所作樂器至是災冬晉侯使士會入聘為毛召之難王室復亂王孫蘇奔晉晉人復之使士會平王室國語作聘王享之殽蒸升殽于爼也原公原襄公周大夫相禮士會私問其故享當體薦而殽蒸故問王聞之召士會曰季氏士會字季而弗聞乎王享有體薦半解其體而薦之宴有折爼體解節折升之于爼公當享卿當宴王室之禮也士會不敢對而退歸乃講聚三代之典禮修執秩秩常也可奉執以為常以為晉法己巳十有五年夏六月癸卯日有食之晉侯魯侯衛侯曹伯邾子同盟于斷道晉地今山西沁州東有斷梁城即春秋斷道晉侯使郤克徴會于齊齊侯頃公名無野惠公子帷婦人使觀之郤克登婦人笑于房榖梁傳季孫行父秃晉郤克眇衛孫良夫跛曹公子手僂同時而聘于齊齊使秃者御秃者眇者御眇者跛者御跛者僂者御僂者蕭同姪子處臺上而笑之聞于客客不悅而去為孫良夫衛武公曽孫孫仲之後以字氏蕭同姪子詳注後郤克怒先歸請伐齊晉侯不許于是諸侯會于斷道辭齊人齊侯使髙固晏弱蔡朝南郭偃會髙固逃歸晉人執晏弱蔡朝南郭偃苗賁皇言于晉侯緩晏弱遂逸明年晉侯衛太子臧伐齊齊侯會晉侯盟于繒以公子疆為質于晉蔡朝南郭偃逃歸髙固徯之孫晏弱齊公族嬰之父苗賁皇楚越椒子奔晉以食邑為氏是年晉士會請老郤克為政冬十有一月魯侯弟叔肸卒叔肸魯侯同母弟魯侯殺子赤叔肸非之與之財不受織屨而食終身不食魯侯之食至是卒辛未十有七年春三月魯作邱甲魯宣公卒子黑肱立是為成公為齊難故左傳注前年魯乞師于楚欲以伐齊楚師不出故懼作邱甲左傳注周禮九夫為井四井為邑四邑為邱邱十六井出戎馬一匹牛二頭四邱為甸甸六十四井出長轂一乘馬四匹牛十二頭甲士三人步卒七十二人此甸所賦今魯使邱出之是重斂矣壬申十有八年夏六月晉郤克魯季孫行父衛孫良夫曹公子首公羊榖梁作手及齊侯戰于鞍今山東濟南府厯城縣藥山南有鞍山舊傳晉伐齊戰于鞍即此齊師敗績先是齊伐魯北鄙取龍今山東泰安府泰安縣西南有龍鄉城即魯龍邑遂南侵衛孫良夫帥師將侵齊與齊師遇戰于新築左傳注衛地春秋彚纂注今直𨽻大名府魏縣南有新築城衛師敗績新築人仲叔于奚救良夫良夫是以免衛人賞之邑辭請曲縣繁纓以朝許之後孔子聞之曰惜也不如多與之邑惟名與器不可以假人良夫如晉乞師魯臧孫許諡宣叔文仲子亦乞師于晉皆主郤克克請八百乘晉侯許之郤克將中軍及士燮將上軍為士燮即范文子士會之子會邑隨隨氏後邑范遂為范氏欒書將下軍韓厥為司馬將以救魯衛魯季孫行父帥師會之師從齊師至于靡笄之下春秋彚纂注靡笄山名史記晉平公伐齊戰于靡下徐廣曰靡當作厯志曰厯山即左傳所謂靡笄之山也在厯城縣南陳于鞍邴夏御齊侯逄丑父為右晉解張御郤克鄭邱緩為右齊侯曰吾姑翦滅此而朝食不介馬而馳之郤克傷于矢流血及屨未絶鼓音解張曰師之耳目在吾旗鼓吾子勉之左并轡右援枹而鼓馬逸不能止師乘之齊師敗績逐之三周華不注山名在厯城縣東北伏琛齊紀不讀如跗與詩鄂不之不同言此山孤秀如花跗也逄丑父與齊侯易位齊侯乃免韓厥及齊侯車逄丑父使公下如華泉取飲鄭周父載齊侯以免韓厥獻丑父郤克曰人不難以死免其君殺之不祥赦之晉師從齊師及馬陘左傳注齊邑春秋彚纂注在今益都縣西南齊侯使國佐歸父子左傳作賓媚人注國佐也賂以紀甗玉甑也玉磬甗磬皆齊滅紀所得與地郤克曰必使耕者東畝壟畝皆東西行以利戎車且以蕭同叔子為質左傳注同叔蕭君字齊侯外祖父子女也難斥言其母故逺言之公羊穀梁俱作蕭同姪子公羊曰齊君之母榖梁曰蕭同姪子之母范寧集解蕭國也同姓也姪子字也其母更嫁齊惠公生頃公楚人滅蕭故隨其母在齊國佐曰使耕者東畝則是土齊也晉以齊為已之土地蕭同叔子齊君之母也齊君之母猶晉君之母也不可請戰三戰不勝齊子之有也何必質晉人乃許之盟于袁婁在青州府臨淄縣西博物記臨淄有袁婁使齊人歸魯汶陽之田汶水注見前田在汶水之北故曰汶陽晉使鞏朔獻齊捷王命委于三吏左傳注三公也左傳疏曲禮曰五官之長曰伯其擯于天子也曰天子之吏是知三公稱吏也晉侯使鞏朔獻捷于王王弗見使單子襄公朝辭焉曰兄弟甥舅侵敗王略王命伐之告事而已不獻其功所以敬親昵也今叔父遂有功于齊不使命卿鎮撫王室而鞏伯實來未有職司于王室鞏朔上軍大夫名位不達王室又姦先王之禮謂獻齊捷余雖欲于鞏伯其敢廢舊典以忝叔父夫齊甥舅之國又大師之後也寧不亦淫從其欲以怒叔父抑豈不可諫誨鞏朔不能對王使委于三吏禮之如侯伯克敵使大夫告慶之禮降于卿禮一等王以鞏伯宴而私賄之使相告之曰非禮也勿籍冬十有一月魯侯及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人薛任姓國注見前鄫人盟于蜀魯地今泰安府泰安縣西有蜀亭初魯宣公求好于楚會楚莊卒子審嗣是為楚共宣公亦卒皆在十六年不克作好及魯侯即位與晉盟赤棘之盟在十七年赤棘晉地衛亦受盟于晉從伐齊故楚令尹嬰齊即子重帥師侵衛遂及魯仲孫蔑往賂公衡成公子為質楚人許平于是魯侯與蔡侯許男秦右大夫説宋華元陳公孫寧衛孫良夫鄭公子去疾及齊國之大夫盟于蜀是役也畏晉而竊與楚盟謂之匱盟私竊為盟盟終不固匱乏之道也蔡侯許男乘楚車謂之失位故春秋不書癸酉十有九年冬十有二月晉作六軍左傳注僭王也韓厥趙括鞏朔韓穿荀騅荀氏族趙旃皆為卿賞鞍之功也韓厥為新中軍趙括佐之鞏朔為新上軍韓穿佐之荀騅為新下軍趙旃佐之乙亥二十有一年夏梁山崩梁山在陜西同州府韓城縣西北接郃陽縣界詩夾奕梁山爾雅梁山晉望水經注河水南徑梁山原是也梁山崩壅河三日不流晉侯以傳召伯宗遇絳人問之曰國主山川故山崩川竭君為之不舉降服損盛服乘縵車無文徹樂息八音出次舍于郊祝幣陳玉帛史辭自罪責以禮焉如此而已伯宗遂以告晉侯從之冬十有一月王崩子夷立是為簡王十有二月晉侯齊侯宋公文公子共公固魯侯衛侯鄭伯曹伯邾子把伯同盟于蟲牢即桐牢在河南開封府封邱縣後漢書郡國志陳留郡封邱有桐牢亭或曰古蟲牢寰宇記俗謂之桐渦初晉侯以諸侯伐鄭鄭公子偃字子遊穆公子禦之敗諸邱輿左傳注鄭地使皇戌如楚獻捷事在王十九年鄭襄公卒子費嗣是為悼公使公孫申即叔申疆許田許人敗諸展陂春秋彚纂注許地在今河南許州西北鄭伯悼公伐許取鉏任泠敦之田春秋彚纂注俱在許州境晉欒書救許伐鄭楚公子側救鄭事在王二十年鄭伯與許男訟田于楚鄭伯不勝歸而請成于晉于是諸侯盟于蟲牢鄭服也明年楚公子嬰齊伐鄭晉欒書帥師救鄭又明年晉侯復盟諸侯于馬陵衛地今直𨽻大名府元城縣有馬陵城鄭獲楚鄖公鍾儀獻諸晉晉囚鍾儀于軍府晉侯見之南冠而縶使稅之與之琴操南音范文子曰楚囚君子也盍歸之使合晉楚之成晉侯重為之禮而歸之事在簡王四年御批歷代通鑑輯覽卷五

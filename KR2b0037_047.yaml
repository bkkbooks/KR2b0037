front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷四十八隋煬帝丁卯大業三年春正月突厥啓民可汗來朝
  hash: sha256:5c56ec29226a7a77bfce4cebd5a44d51eb350670d1ba70ea8a47889370d15e0a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_047-1a, image: WYG0336/WYG0336-0610a.png}
body:
  text: 正月朔旦大陳文物突厥啓民可汗入朝見而慕之請襲冠帶帝大悅三月殺故長寧王儼故太子勇之子及其弟七人初雲定興故太子勇昭訓雲氏之父坐媚事太子勇與妻子俱沒官為奴婢及帝即位聞其有巧思召之使典營造時宇文述用事定興以明珠絡帳賂述述大喜兄事之薦使監造兵器因謂之曰兄所作器仗並合上心而不得官者為長寧兄弟未死耳定興曰此無用物何不勸上殺之述因奏請處分帝然之乃鴆殺長寧王儼及其七弟襄城王恪之妃栁氏自殺以從恪夏四月詔頒新律帝以髙祖末年法令峻刻詔牛𢎞等造大業律十八篇頒行之民久厭嚴刻喜于寬政其後征殺繁興有司臨時迫脅以求濟事不復用律令矣旅騎尉劉炫預修律令牛𢎞問曰周禮士多而府史少今令史百倍于前減則不濟其何故也炫曰古人委任責成嵗終考其殿最案不重校文不繁悉府史掌要目而已今之文簿恆慮覆治鍛鍊不密則萬里追證百年舊案故諺云老吏抱案死事繁政弊職此之由𢎞曰魏齊之時令史從容而已今則不遑寧處何也炫曰往者州唯置綱紀郡置守丞縣置令而已其餘具僚則長官自辟今大小之官悉由吏部纎芥之迹皆屬考功省官不如省事官事不省而望從容其可得乎𢎞善其言而不能用改州為郡更定官制改上柱國以下官為大夫置殿內省與尚書門下內史祕書為五省增謁者司隸臺謁者臺掌受詔中奏司隸臺掌諸巡察與御史為三臺分太府寺置少府監與長秋國子將作都水為五監又增改左右翊衛等為十六府廢伯子男爵六月詔為髙祖建别廟初髙祖受禪唯立四親廟同殿異室而已帝即位命有司議七廟之制禮部侍郎許善心等奏請為太祖髙祖各立一殿準周文武二祧與始祖而三餘並分室而祭從迭毁之法帝謂栁辨字顧言惔之孫辨與辨同曰今始祖及二祧已具後世子孫處朕何所乃詔為髙祖建别廟既而方事巡幸竟不果立帝北巡次榆林郡即勝州注見前啓民可汗及義成公主來朝吐谷渾髙昌皆入貢車駕北巡發河北十餘郡丁男鑿太行山達于并州以通馳道過雁門本代州大業初改郡今仍為州隸山西太守邱和洛陽人獻食甚精至馬邑即朔州注見前太守楊廓獨無所獻帝不悅以和為博陵即定州注亦見前太守使廓至博陵觀之由是所至獻食競為豐侈至榆林遂欲出塞耀兵徑突厥中恐啓民驚懼先遣長孫晟諭旨啓民奉詔因召所部酋長咸集晟欲令啓民親除草示諸部以明威重乃指帳前草曰此根大香啓民遽嗅之曰殊不香也晟曰天子行幸所在諸侯躬自掃除以表至敬之心今牙內蕪穢謂是留沓草耳啓民乃悟曰奴之罪也遂拔所佩刀自芟庭草其貴人及諸部爭效之于是發榆林北境東達于薊開為御道長三千里廣百步啓民及義成公主來朝行宫吐谷渾髙昌並遣使入貢帝令宇文愷為大帳其下可坐數千人以宴啓民及其部落作散樂諸胡駭悅帝賜啓民路車乘馬鼓吹幡旗贊拜不名位在諸侯王上秋七月築長城詔發丁男百餘萬築長城西距榆林東至紫河隋書地理志定襄郡大利縣有紫河大利故城在今歸化城西北蘇威諫不聽明年七月復發丁男二十餘萬築之自榆谷而東榆谷注見前殺太常卿髙熲尚書宇文弼光祿大夫賀若弼帝之徵散樂也太常卿髙熲諫不聽退謂丞李懿曰周天元以好樂而亡殷鑒不逺安可復爾又以帝遇啓民過厚謂何稠曰此虜頗知中國虛實山川險易恐為後患宇文弼私謂熲曰天元之侈以今方之不亦甚乎賀若弼亦私議宴可汗太侈並為人所奏帝以為誹謗朝政皆殺之熲有文武大略明達世務以天下為己任蘇威楊素賀若弼韓擒虎皆熲所薦及死天下莫不傷之免內史令蕭琮僕射蘇威官琮以皇后故甚見親重與賀若弼善弼既誅又有童謡曰蕭蕭亦復起帝由是忌之遂廢于家未幾卒蘇威以諫築長城故亦坐免八月帝至金河在古雲內州東南西流入黃河雲內廢州在今吳喇忒旗幸啓民可汗帳車駕發榆林泝金河甲士五十餘萬旌旗輜重千里不絶令宇文愷等造觀風行殿容數百人離合為之下施輪軸倏忽推移又作行城周二千步以布衣板樓櫓悉備諸胡驚以為神帝幸啓民廬帳啓民捧觴上夀王侯以下袒割帳前莫敢仰視帝大悅賦詩曰呼韓頓顙至屠耆接踵來何如漢天子空上單于臺皇后亦幸義成公主帳賜豫甚厚帝還至太原營晉陽宫遂上太行開直道九十里至濟源幸御史大夫張衡宅留宴三日乃還東都濟源隋縣今屬河南懷慶府冬十月以裴矩為黃門侍郎經略西域西域諸胡多至張掖交市帝使吏部侍郎裴矩掌之矩訪諸商胡以其國山川風俗撰西域圖記三卷入朝奏之仍别造地圖窮其要害從西傾以去縱橫所亘將三萬里發自燉煌至于西海凡為三道北道從伊吾中道從髙昌南道從鄯善西西傾即禹貢西傾一名嵹臺山在今鞏昌府洮州南延袤千里外跨諸羌燉煌西海伊吾髙昌鄯善注俱見前矩因盛言胡中多諸珍寶帝于是慨然將通西域以矩為黃門侍郎復使至張掖引至諸胡陷之以利勸令入朝自是西域諸胡往來相繼所經郡縣糜費以萬萬計戊辰四年春正月開永濟渠即今衛河亦曰御河源出河南衛輝府蘇門山東北流合清淇漳洹諸水徑直𨽻山東之大名東昌河間諸府界至天津府會白河入海發河北諸軍百餘萬穿永濟渠引沁水即古少水源出山西沁州沁源縣羊頭山東南流徑嶽陽沁水陽城諸縣界至河南懷慶府武陟縣入黃河考沁水本自入河此言引沁達河蓋引渠入沁以達于河也南達于河北通涿郡丁男不供始役婦人二月西突厥入貢西突厥處羅可汗之母向氏本中國人開皇末入朝處羅之父泥利死向氏更嫁泥利之弟婆實特勒與俱入朝遂留長安至是裴矩在燉煌聞處羅思其母請遣使招懷之帝遣謁者崔君肅煬帝紀作崔毅齎詔往諭處羅甚踞受詔不肯起君肅責之曰突厥中分為二每嵗交兵積數十嵗莫能相滅今啓民舉其部落卑躬折節入臣天子欲借兵大國共滅可汗天子許之師出有日矣顧可汗母向夫人懼西國之滅旦夕守闕哭泣哀祈匍匐謝罪請發使召可汗令入內屬天子憐之故復遣使至此今可汗乃踞慢如是則夫人為誑天子必伏尸都市傳首虜庭發大隋之兵資東國之衆左折右挈以擊可汗亡無日矣奈何愛兩拜之禮絶慈母之命惜一語稱臣使社稷為墟乎處羅矍然而起流涕再拜跪受詔書因遣使者隨君肅貢汗血馬後處羅為其酋長射匱所襲大敗東走帝遣裴矩與向氏馳至玉門關招之遂入朝帝待以殊禮使將五百騎常從巡幸賜號曷婆那可汗三月倭國即今日本國在東海中有五畿七道三島小國數十皆服屬焉入貢倭王姓阿每名目多利思比孤其國號阿輩雞彌華言天兒也遺帝書曰日出處天子致書日沒處天子無恙帝覽之不悅詔鴻臚蠻夷書無禮者勿奏明年帝遣文林郎裴清泛海至倭國其王迎清相見與語大悅遣使隨清來貢方物帝如五原遂巡長城行宫設六合板城載以槍車每頓舍則外其轅以為外圍內布鐵菱次施弩牀以繩連機人來觸繩則弩機旋轉向所觸而發夏四月齊王長史栁謇之字公正解人有罪除名初元德太子卒齊王暕字世朏帝次子次當為嗣帝為之妙選僚屬以栁謇之為長史且戒之曰齊王德業修備富貴自鍾卿門若有不善罪亦相及暕寵遇日隆驕恣不法私納栁氏女樂平公主嘗言栁氏女美帝久未答主以進暕帝知之不悅樂平公主周天元后也又違制攜伊闕令皇甫詡入宫又與妃姊元氏婦通暕妃韋氏早卒與妃姊通召相工遍視後庭相工指妃姊言當為皇后且以元德太子有三子恐不得立乃隂挾左道為厭勝至是皆發帝大怒斬暕左右數人賜元氏婦死王府僚皆斥謇之亦坐除名暕自是恩寵日衰冬十月赤土扶南别種即今暹羅國也在占城西南入貢帝募能通絶域者屯田主事屯田工部屬主事流外吏職常駿請使赤土帝大悅令賫詔往賜其王駿泛海百餘日入境月餘乃至其都曰僧祇城其王姓瞿曇氏名富利多塞居處器用窮極珍麗遣子入貢己巳五年春三月帝巡河右河西武威諸郡夏四月遣兵擊吐谷渾不克西域諸國來朝獻地置西海等郡先是裴矩説鐵勒擊破吐谷渾其可汗伏允遣使求救帝遣將迎之吐谷渾畏隋兵盛不敢降帥衆奔雪山胡三省注此蜀西之雪山也考元和志大雪山一名蓬婆山在柘縣西北柘縣故城在今四川龍安府疊溪營其地東西四千里南北二千里詔皆置郡縣鎮戍至是帝西巡將復擊吐谷渾伏允遁去遣其名王詐稱伏允保車我真山在今青海西北詔大將軍張定和字處謙萬年人等追討皆為所殺惟衛尉卿劉權字世略京兆人虜千餘口而還帝至燕支山注見前髙昌王麴伯雅金城人其父嘉為國人所立嘉死伯雅嗣伊吾吐屯設突厥監伊吾官等及西域二十七國謁于道左帝復令武威張掖士女盛飾縱觀以示中國之盛衣服不鮮者郡縣督課之吐屯設獻地數千里帝大悅置西海治伏俟城在今青海西河源治赤水城在今青海南鄯善即鄯善故國在今安西府燉煌縣西且末即且未故國在今燉煌縣西南等郡謫天下罪人為戍卒以守之命劉權鎮河源大開屯田扞禦吐谷渾以通西域之路進裴矩銀青光祿大夫先是帝嘗謂給事郎蔡徵曰自古天子有巡守之禮而江東諸帝多傅脂粉坐深宫不與百姓相見此何理也及將西巡先命裴矩説髙昌伊吾等國啖以厚利使來覲于是至者雲集然所置郡縣在塞外者既多自西京迤北轉輸嵗巨億計由是百姓失業西方先困矣是冬車駕東還行經大斗拔谷在今甘州山丹縣南山路隘險風雪晦冥士卒多凍餒死妃嬪或相失與軍士雜宿山間冬十一月以裴藴為御史大夫民部侍郎裴藴以民間版籍多脫漏户口奏令閲實若一人不實則官司解職又許民糾得一丁者令被糾之家代輸賦役是嵗進丁二十四萬口六十四萬帝謂百官曰前代無賢才致此罔冒今户口皆實全由裴藴擢授御史大夫蘊善伺帝意所欲罪者則鍛成其罪所欲宥者則附從輕典自後大小之獄皆付藴輕重皆出其口殺司隸大夫薛道衡道衡以才學有盛名嘗上髙祖頌帝不悅曰此魚藻之義也詩序魚藻刺幽王也言萬物失其性君子思古之武王焉將罪之會議新令久不決道衡謂人曰向使髙熲不死令決當久有人奏之帝怒付執法者推之裴藴奏道衡負才悖逆有無君之心縊殺之妻子徙且末天下寃之庚午六年春正月盜入建國門有盜數十人素冠練衣焚香持華讀作花自稱彌勒佛入建國門奪衛士仗將為亂齊王暕遇而斬之于是都下大索連坐者千餘家諸蕃來朝陳百戲于端門以示之帝以諸蕃酋長畢集洛陽陳百戲于端門街執絲竹者萬八千人自昏達旦終月而罷所費巨萬自是嵗以為常諸蕃請入豐都市交易許之先命整飾店肆珍貨充積人物華盛胡客過酒食店者悉令邀入醉飽不取其直紿之曰中國豐饒酒食例不取直胡客皆驚嘆其黠者頗覺之見以繒帛纒樹曰中國亦有貧者衣不蓋形何如以此物與之市人慙不能答豐都市東都之東市也南曰大同北曰通逺帝稱裴矩之能謂羣臣曰裴矩大識朕意凡所陳奏皆朕之成算而未發者自非奉國盡心孰能若是是時矩及大將軍宇文述內史侍郎虞世基御史大夫裴蘊光祿大夫郭衍皆以諂諛有寵述容止便辟侍衛者咸取則焉衍嘗勸帝五日一視朝曰無效髙祖空自勤苦為也帝臨朝凝重發言可觀而內存聲色日于苑中盛陳酒饌敇燕王倓梁公簫巨千牛左右宇文皛及髙祖嬪御為一席僧尼道士女官為一席帝與諸寵姬為一席略相連接酒酣淆亂靡所不至蕭巨琮弟之子宇文皛慶之孫遣兵攻流求今曰琉球在東海島中直福建省殺其王虜其衆以歸先是帝遣羽騎尉朱寬入海求訪異俗至流求國而還至是復遣寬招撫流求不從乃命虎賁郎將陳稜字長威廬江人發兵泛海擊之斬其王遏刺兜虜其民以歸三月帝如江都除榆林太守張衡名以王世充字行滿本西域人姓支氏父收從母更嫁王氏因冒其姓領江都宫監初帝營汾陽宫在今山西欣州靜樂縣管涔山上山有天池宫環之張衡進諫帝意不平謂侍臣曰衡自謂由其計畫令我有天下也出為榆林太守已復敕督江都宫役衡聞薛道衡之死以為枉楊元感素之子奏之王世充又奏衡頻減頓具帝怒除名為民以世充領江都宫監世充性譎詐有口辨帝數幸江都能伺顔色為阿諛由是有寵冬十二月文安侯牛𢎞卒𢎞寬厚恭儉學術精博隋室舊臣始終信任悔吝不及者一人而已𢎞弟弼嘗射殺𢎞駕車牛𢎞自外還其妻迎謂之曰叔射殺牛𢎞無所問直云作脯坐定其妻又言𢎞曰已知之矣顔色自若穿江南河即今南運河自杭州達鎮江府入大江自京口至餘杭八百餘里廣十餘丈欲東巡會稽也辛未七年春二月帝自將擊髙麗夏四月至臨朔宫唐書地里志薊縣有故隋臨朔宫徵天下兵會涿郡先是帝幸啓民帳時髙麗使者在啓民所啓民不敢隱以見帝帝納裴矩言矩説帝曰髙麗漢晉皆為郡縣今乃不臣先帝欲征之久矣今其使者親見啓民舉國從化可因其恐懼脅使入朝帝從之敕使者還語髙麗王元入朝久之不至乃謀討之課天下富人買馬匹至十萬錢至是遂下詔討髙麗帝御龍舟入永濟渠赴涿敕幽州總管元𢎞嗣洛陽人往東萊海口造船官吏督役晝夜立水中不敢息自腰以下皆生蛆死者什三四又敕河內淮南江南造戎車五萬乘送髙陽注見前供載衣甲幔幕令兵士自挽之發河南北民夫以供軍須江淮以南民夫及船運黎陽及洛口諸倉米舳艫千里往還常數十萬人晝夜不絶死者相枕天下騷動山東河南大水漂沒三十餘郡冬十月底柱崩偃河逆流數十里王薄張金稱髙士達竇建德等兵起帝自去嵗謀討髙麗詔山東置府令養馬以供軍役又發民夫運米塞下車牛往者皆不返士卒死亡過半耕稼失時穀價踴貴東北邊尤甚斗米直數百錢所運米或粗惡令民糴以償之又發鹿車小車也夫六十餘萬二人共推米三石道途險逺不足充餱糧至鎮無可輸皆懼罪亡命重以官吏侵漁百姓窮困于是始相聚為盜鄒平注見前民王薄擁衆據長白山此山東之長白山也在今濟南府長山縣跨鄒平淄川章邱諸縣界自稱知世郎言事可知矣又作無向遼東浪死歌以相煽動避征役者多往歸之平原本德州大業初改郡今仍為州屬濟南府東有豆子䴚即今鹹水沽在天津府東南羣盜多匿其中有劉霸道者家于其旁喜俠逺近多往依之有衆十餘萬號阿舅北人謂異姓長親為阿舅猶言長者也賊漳南隋縣宋省故城在今東昌府恩縣人竇建德少尚氣俠膽力過人會募人征髙麗建德以選為二百人長同縣孫安祖亦以驍勇選為征士安祖辭縣令怒笞之安祖殺令亡抵建德建德乃集無賴少年得數百人使安祖將之入髙雞泊在東昌府恩縣西北中為盜時鄃注見前人張金稱聚衆河曲唐書作河渚清河之渚也清河即今衛河蓚注見前人髙士達聚衆清河此清河郡也注見前自稱東海公往來剽掠獨不入建德閭郡縣疑建德與賊通收其家屬殺之建德已至河間聞難亡歸士達頃之安祖為金稱所殺其衆盡歸建德建德兵至萬餘人傾身接物人爭附之胡三省曰竇建德始此壬申八年夏六月帝至遼東即漢襄平城注見前攻城不克先是遣諸軍分道擊髙麗帝徴合水令庾質問之質曰事機在速緩則無功陛下親行戰或未克懼損威靈若車駕留此命將倍道兼行出其不意克之必矣左候衛大將軍段文振亦曰水潦方降不可淹遲惟願勒諸軍速發勢必可克如不時定脫遇秋霖兵糧必竭非上䇿也帝皆不聽治合水隋縣宋改安化今為甘肅慶陽府庾質字行修季才之子段文振北海人左十二軍出鏤方漢縣今為朝鮮國地樂浪漢郡注見前等道右十二軍出黏蟬漢縣故城在今朝鮮國平壤府西南黏女廉反蟬應邵曰音提襄平等道總集平壤髙麗所都注見前凡一百一十三萬人餽運者倍之連營漸進御營六軍後發首尾亘千餘里至是諸軍度遼水注見前敗髙麗兵遂圍遼東師至遼水髙麗兵阻水拒守師不得濟將軍麥鐵杖自請為前鋒造浮橋以濟師橋未成距岸丈餘鐵杖躍而登戰死諸軍接橋繼進髙麗兵大敗遂乘勝進圍遼東城車駕度遼引遏娑那可汗及髙昌王麴伯雅觀戰處以懼之命尚書衛文升撫其民建置郡縣字衛文升名元以行洛陽人遼東嬰城固守帝命諸軍攻之久不下諸將之東下也帝親戒之曰今者弔民伐罪非為功名公等進軍當分為三道有所攻擊必三道相知凡軍事進止皆須奏聞待報至是遼東固守帝命諸將攻之又敕諸將髙麗若降即宜撫納不得縱兵城將陷城中輒請降諸將不敢赴先令馳奏比報至城中守禦亦備隨出拒戰如此再三帝終不悟將軍來護兒以水軍攻平壤敗績秋七月宇文述等九軍大敗于薩水一名清川江亦曰大寧江在今朝鮮國安州城東西南流入海而還來護兒帥江淮水軍由海道至髙麗去平壤六十里敗髙麗兵乘勝入其城遇伏大敗而還宇文述于仲文字次武實之子辛世雄衛文升等九人分出諸道會于鴨緑水即今鴨緑江在吉林烏喇南源出長白山西南流與朝鮮分界至鳯凰城東南入海通典江即古馬訾水也髙麗恃此為天險西人馬皆給百日糧重莫能勝述令軍中遺棄米麥者斬士卒皆于幕中掘坑埋之才及中路糧已將盡髙麗軍見隋兵有飢色故欲疲之每戰輒走述一日之中七戰皆捷遂濟薩水去平壤三十里而營髙麗又遣使詐降曰若旋師當奉髙元朝行在述等以糧盡而平壤城堅勢難猝敗遂還至薩水軍半濟髙麗自後擊之諸軍皆潰將士奔還一日夜至鴨緑水行四百五十里初九軍度遼凡三十萬五千人及還至遼東惟二千七百人資械蕩盡帝大怒械繫述等而還九月帝還東都誅慰撫使劉士龍諸將皆除名宇文述素有寵其子士及尚帝女南陽公主故帝不忍誅與于仲文等皆除名為民斬劉士龍以謝天下先是于仲文受密旨若髙元及其大臣乙支文德來者必擒之會文德來詐降仲文將執之士龍不可遂聽其還已而仲文又遣騎追文德被誘至薩水軍盡疲故及于敗尋復宇文述官爵詔曰兵糧不繼乃軍吏失于支料非述罪也于仲文憂恚發病未幾卒山東大旱殺張衡衡既放廢帝每令人覘之及還自遼東衡妾告衡怨望謗訕詔賜自盡衡臨死大言曰我為人作何等事而望久活監刑者塞耳促令殺之癸酉九年春正月徵天下兵集涿郡始募民為驍果命代王侑留守西京以刑部尚書衛文升輔之靈武白瑜娑兵起賊帥白瑜娑劫牧馬連突厥隴右多被其患謂之奴賊三月濟隂注見前孟海公起兵據周橋在今曹州府曹縣東北海公衆至數萬見人稱引書史輒殺之後海公為竇建德所擒帝復自將擊髙麗命越王侗留守東都帝議復伐髙麗光祿大夫郭榮字長榮太原人諫曰千鈞之弩不為鼷鼠發機奈何親辱萬乘以敵小冦乎不聽命民部尚書樊子蓋字華宗廬江人輔侗守東都齊郡即齊州注見前丞張須陀閿鄉人擊王薄等破之時所在盜起齊郡王薄孟讓北海本青州大業初改郡今山東青州府是郭方預清河張金稱平原郝孝德河間本瀛州大業初改郡今為府屬直隸格謙渤海本滄州大業初改郡今仍為州屬天津府孫宣雅各聚衆攻剽多者十餘萬少者數萬人天下承平日久人不習兵郡縣吏與賊戰輒敗唯須陀勇決善戰將郡兵擊王薄大破之薄北連孫宣雅郝孝德等十餘萬攻章邱隋縣今屬濟南府須陀擊之賊大敗賊帥裴長才等衆二萬掩至城下須陀未暇集兵帥五騎與戰賊圍之百重身中數創勇氣彌厲會城中兵至賊稍郤須陀乘勢擊破之郭方預等合兵攻陷北海須陀曰賊謂我不能救吾今速行破之必矣乃倍道進擊又破之歷城人羅士信年十四從須陀擊賊濰水上賊始布陳士信馳至陳前刺殺數人斬一人首以矟承之揭以略陳賊莫敢近須陀引置左右每戰須陀先登士信為副夏六月楚公楊元感起兵黎陽圍東都元感驍勇便騎射喜賔客蒲山公李密字元邃一字法主弼之曽孫也少有才略輕財好士為左親侍帝見之謂宇文述曰左仗下黑色小兒瞻視異常勿令宿衛述乃諷密使稱病自免密嘗乘黃牛讀漢書楊素遇而異之與語大悅謂元感等曰汝等不及也由是元感與為深交元感時或侮密密曰若決機兩陳之間喑嗚咄嗟使敵人震懾密不如公驅䇿天下賢俊各申其䇿公不如密元感笑而服之胡三省曰李密事始此素恃功驕倨或失臣禮帝心銜而不言及素死謂近臣曰使素不死終當族滅元感知之內不自安且以朝政日紊乃與諸弟潛謀作亂至是帝命元感于黎陽督運遂與虎賁郎將王仲伯汲郡贊治趙懷義等謀故為逗遛欲令諸軍之食弟郎將元縱萬石並從幸遼東元感潛召之皆亡還萬石至髙陽為人所執斬于涿郡時來護兒以舟師自東萊將入海趨平壤元感遣家奴偽為使者從東方來詐稱護兒反六月元感入黎陽大索男夫移書傍郡以討護兒為名各令發兵會于倉所以懷義為衛州刺史時已改州為郡元感仍稱州示不用朝命也元務本為黎州刺史河內主簿唐禕為懷州刺史御史遊元督運在黎陽元感謂曰獨夫肆虐陷身絶域我今親帥義兵以誅無道卿意如何元正色曰尊公荷國寵靈振古無比公之兄弟青紫交映豈意親圖反噬僕有死而已元感殺之遊元字楚客明根之子元感選運夫少壯者得五千餘人篙梢舟人也三千餘人刑三牲誓衆且諭之曰主上無道不以百姓為念天下騷擾死遼東者以萬計今與君等起兵以救兆民何如衆皆踴躍乃勒兵分部唐禕逃歸河內先是元感隂遣召李密及弟元挺密至元感大喜元感問計于密密曰天子逺在遼外公出其不意長驅入薊扼其咽喉髙麗聞之必躡其後不過旬日資糧皆盡其衆不降則潰此上計也元感曰更言其次密曰關中都城所在今帥衆鼓行而西經城勿攻直取長安天子雖還失其根本可徐圖也元感曰更言其次密曰速取東都以號令四方但恐唐禕告之先已固守若攻之百日不克天下之兵四面而至大勢去矣元感曰不然今百官家口並在東都取之先足動其心且經城不攻何以示威公之下計乃上計也遂引兵向洛陽遣元挺將千人為先鋒先取河內唐禕據城拒守又使人告東都越王侗等勒兵為備元感渡河從者如市使弟積善將兵三千緣洛水西入元挺踰邙山南入元感自將三千餘人隨其後其兵皆執單刀栁楯無弓矢甲胄東都遣河南令達奚善意代人將兵五千拒積善將作監裴𢎞䇿聞喜人將兵八千拒元挺善意兵潰鎧仗皆為積善所取𢎞䇿戰敗走將十餘騎馳入宫城餘皆歸于元感元感每誓衆曰我身為上柱國家纍巨萬金富貴非所圖也今不顧族滅者但為天下解倒懸之急耳衆皆感悅父老爭獻牛酒子弟詣軍門自效者日以千數元感盡鋭攻城樊子蓋拒守元感不能克代王侑使衛文升帥兵救東都至華隂掘楊素冢示士卒以必死直趨東都城北元感屢破之衆至十萬文升衆寡不敵死傷且盡猶進與元感決戰會元挺中流矢死元感軍少却帝引軍還遣宇文述來護兒等擊楊元感先是帝度遼水遣諸將擊髙麗攻遼東城久不拔帝遣造布囊百萬貯土欲積于大道髙與城齊使戰士登而攻之又作八輪車樓髙出於城欲俯射城內會楊元感反書至帝大懼引蘇威入謂曰此兒聰明得無為患威曰元感粗疏必無所慮但恐因此寖成亂階耳帝又聞達官子弟皆在元感所益憂之夜召諸將使引軍還資械委棄衆心恟懼無復部分髙麗覺之然疑其詐經三日乃出兵追躡終不敢逼帝遣宇文述屈突通乘傳發兵以討元感來護兒至東萊聞元感圍東都召諸將議旋軍救之諸將咸以無敕不宜擅還護兒厲聲曰洛陽被圍心腹之疾髙麗猶癬疥耳公家之事知無不為専擅在吾不關諸人有沮議者軍法從事即日回軍護兒使其子馳驛奏聞時帝已敕護兒敕東都見其子至甚悅秋七月餘杭劉元進兵起帝發三吳兵征髙麗兵多亡命聞元進舉事至者雲集旬月間衆至數萬楊元感引兵趣潼關八月宇文述等追之元感敗死殺其黨與三萬餘人元感欲稱尊號李密曰今雖頻捷而郡縣未有從者東都守禦尚強天下救兵益至公當挺身力戰早定關中乃亟欲自尊乎元感笑而止元感得韋福嗣委以心膂不専任李密密謂所親曰楚公好反而不欲勝吾屬今為虜矣屈突通等引軍屯河陽李子雄渤海蓚人謂元感曰通若渡河則勝負難決不如分兵拒之通不能濟則樊衛失援元感然之樊子蓋知其謀數出擊營元感不得往通遂濟河元感分為兩軍西拒文升東拒通子蓋復出兵大戰元感軍屢敗子雄勸元感直取關中開永豐倉在華隂縣東北亦曰渭水倉以號召三輔元感遂引兵而西元感至𢎞農太守蔡王智積曰元感欲直取關中此計若成則難克也當以計縻之使不得進不出一旬可以成擒元感軍至智積登城詈之元感怒留攻之李密諫曰軍事貴速今追兵將至安可稽留元感不從攻三日不拔乃西行宇文述屈突通衛文升來護兒等追及之于閿鄉元感一日三敗乃與十餘騎奔上洛自度不免命弟積善斫殺之帝使大理卿鄭善果等至東都推元感黨與謂曰元感一呼而從者十萬益知天下不欲人多多則相聚為盜耳不盡加誅無以示後由是殺三萬餘人元感之圍東都也開倉賑百姓至是凡受求者皆坑之元感所善文士王胄亡命捕得誅之帝善屬文不欲人出其右薛道衡死帝曰更能作空梁落燕泥否胄死帝誦其佳句曰庭草無人隨意緑復能作此語邪鄭善果鄭州滎澤人王胄字承基筠之孫以唐公李淵為𢎞化本慶州大業初改郡今甘肅慶陽府是留守帝以𢎞化留守元𢎞嗣斛斯政河南人之親也斛斯政與楊元感通謀從帝征高麗時懼事泄亡奔髙麗遣衛尉少卿李淵馳往執之因代為留守淵御衆寬簡人多附之帝以淵相表竒異又名應圖讖忌之未幾徴詣行在所淵遇􅔂未謁其甥王氏在後宫帝問曰汝舅來何遲王氏以疾對帝曰可得死否淵聞之懼因縱酒納䀩以自晦髙胡三省曰唐祖事始此吳郡朱燮晉陵注見前管崇兵起燮為崑山縣博士燮本還俗道人涉歷經史頗知兵法與數十學生起兵民趨之如歸崇隱居常熟梁縣今屬蘇州府羣盜相與奉之帝命虎牙郎將趙六兒屯兵揚子崇遣人襲破之收其器械軍資衆至十萬冬十月遣將軍吐萬緒吐萬代北復姓緒字長緒鮮卑人擊劉元進十二月破之管崇敗死詔徵緒還遣王世充代將元進燮皆敗死燮崇共迎元進為主據吳郡稱天子帝遣吐萬緒魚俱羅下邽人渡江擊破之元進結柵拒緒與燮崇等連營百餘里緒又破之斬崇然百姓從亂者益衆賊敗而復聚勢益熾緒以士卒疲敝請待來春進討帝不悅魚俱羅亦以賊難驟平潛迎諸子于洛帝怒斬俱羅徴緒詣行在緒憂憤道卒帝更遣江都丞王世充討元進頻戰皆捷元進燮敗死餘衆降散世充與降者約以不殺散者聞之歸酋略盡世充悉坑之凡三萬餘人由是餘黨復聚為盜勢日益熾杜伏威起兵掠江淮章邱杜伏威與臨濟輔公祏俱亡命為盜伏威年十六勇冠賊中共推為主下邳苖海潮亦聚衆為盜伏威使公祏謂之曰我與君勢分力弱恐不足敵隋若合而為一則敵之有餘矣君能為主吾當敬從自揆不堪宜來相就海潮懼即帥衆降之伏威轉掠淮南校尉宗皓討之伏威引入葦中因風縱火皓衆皆燒死甲戌十年春二月徵天下兵伐髙麗三月帝如涿郡秋七月次懷逺鎮髙麗遣使請降詔復徵天下兵伐髙麗百道俱進三月帝發髙陽士卒在道亡者相繼七月次懷逺鎮時天下已亂所徵兵多不至髙麗亦困敝來護兒至卑奢城亦曰卑沙城又曰沙卑城在今奉天府海城縣境自東萊海道趣髙麗之平壤必先由此髙麗舉兵迎戰護兒擊破之將趣平壤髙麗王元懼遣使乞降因送斛斯政帝大悅遣使持節召護兒還八月帝班師邯鄲賊帥楊公卿帥其黨八千人抄駕後第八隊得飛黃上廏馬四十二匹而去冬十月還西京以髙麗使者及斛斯政告太廟仍徵髙麗王元入朝元竟不至敕將帥嚴裝更圖後舉竟不果行初開皇之末國家殷盛朝野皆以髙麗為意劉炫獨以為不可作撫夷論以刺之至是其言始驗殺斛斯政烹其肉使百官噉之佞者或噉之至飽十一月祀南郊大風有事于南郊帝不齋于次詰旦備法駕至即行禮是日大風一獻禮畢御馬疾驅而歸離石注見前胡劉苖王兵起苖王劉淵之裔也起兵旬月衆至數萬時汲郡王德仁亦起兵據林慮山衆數萬後德仁歸王世充林慮山注見前十二月齊郡孟讓兵掠盱眙王世充擊破之讓冦掠至盱眙衆十餘萬王世充羸兵示弱民皆結堡自固賊無所掠漸飢分兵轉掠南方世充伺其弛備出擊大破之讓遁去以張須陀為河南討捕大使齊郡賊帥左孝友擁衆十萬須陀討降之威振東夏故有是命涿郡賊盧明月衆十餘萬軍祝阿須陀邀之相持十餘日糧盡將退謂將士曰賊見吾退必悉衆來追若以千人襲據其營可大克雖能往者衆莫對唯羅士信及秦叔寶請行于是須陀偽遁明月悉衆追之士信叔寶潛至其柵柵門閉二人超而升殺數人斬關以納外兵因縱火焚三十餘柵明月聞之奔還須陀回擊大破之明月以數百騎遁去轉掠河南後為王世充所殺秦叔寶名瓊以字顯歷城人乙亥十一年春正月增祕書省官百二十員帝好讀書著述自為揚州總管置王府學士至百人常令修撰自經術文章兵農地理醫卜釋道乃至蒱博鷹狗皆為新書無不精洽共成萬七千餘卷初西京嘉則殿有書三十七萬卷帝命祕書監栁顧言即栁辨等詮次除其復重猥雜得三萬七千餘卷納于東都修文殿又寫副本分置西京東都宫省官府于觀文殿為書室十四間每三間開方户垂錦幔上有二飛仙户外地中施機帝幸書室宫人執香爐前行踐機則飛仙下收幔而上户扉及厨扉皆開帝出則垂閉如故上谷王須拔魏刀兒兵起上谷賊帥王須拔自稱漫天王魏刀兒自稱歷山飛衆各十餘萬北連突厥南冦燕趙後須拔掠幽州中流矢死刀兒為竇建德所殺殺郕公李渾穆之子夷其族初髙祖夢洪水沒都城意惡之故遷都大興及是有方士言李氏當為天子勸帝盡誅李姓帝以郕公李渾宗族強盛渾從子將作監敏小名洪兒疑其名應讖嘗面告之冀其引決敏大懼數與渾等屏人私語宇文述故怨渾先是穆卒孫筠當襲爵渾殺之而求援于述得紹封許嵗奉國賦之半後不與述大恨之遣郎將裴仁基告渾反帝收渾等雜治不得狀述誘敏妻為表誣渾欲因度遼襲御營立敏為天子持入奏之遂殺渾敏及其宗族敏妻亦鴆死孔雀集朝堂百官稱賀有二孔雀自西苑飛集朝堂親衛校尉髙德儒等見之奏以為鸞時孔雀已去無可得驗于是百官稱賀拜德儒朝散大夫賜物百段夏四月帝如汾陽宫以李淵為山西河東撫慰大使以淵承制黜陟討捕羣盜淵擊賊帥毋端兒破之尋又擊降敬盤陀等秋八月帝巡北邊突厥始畢可汗啓民之子入寇帝入鴈門始畢圍之九月乃解初突厥啓民可汗死帝立其子咄吉世為始畢可汗裴矩以始畢部衆漸盛請拜其弟叱吉設為南面可汗以分其勢叱吉設不敢受始畢聞而慙怨突厥之臣史蜀胡悉有智謀矩誘殺之始畢由是不朝至是帝巡北邊始畢帥騎數十萬謀襲乘輿義成公主先遣使者告變車駕馳入鴈門突厥引騎急攻矢及御前帝大懼抱趙王杲帝第三子而泣目盡腫乃親巡將士謂之曰努力擊賊茍能保全凡在行陳勿憂富貴又下令守城有功者無官直除六品有官以次增益由是衆皆踴躍晝夜拒戰又詔天下募兵守令競來赴難李淵之子世民年十六應募隸屯衛將軍雲定興説之曰始畢敢舉兵圍天子必謂我倉猝不能赴援故也宜晝則引旌旗令數十里不絶夜則鉦鼓相應虜必謂救兵大至望風遁去定興從之唐太宗事始此帝遣間使求救于義成公主公主遣使告始畢云北邊有急諸郡援兵亦至九月始畢解圍去帝遣騎追躡得老弱二千餘而還冬十月帝還東都帝至東都顧盼街衢謂侍臣曰猶大有人在意謂平楊元感殺人尚少也蘇威追論勳格太重宜加斟酌樊子蓋以為不宜失信帝曰公欲收物情邪帝性吝官賞初平楊元感應授勳者多乃更置戎秩建節奮武宣惠綏德懷仁秉義奉誠立信等尉自正六品遞降一階將士守雁門者萬七千人至是得勳者才千五百人一戰得第一勳者進一階先無戎秩者止得立信尉無勳者四戰進一階又議伐髙麗由是將士憤怨詔江都更造龍舟楊元感之亂龍舟皆焚詔更造數千艘制度更大于舊東海李子通據海陵漢縣今揚州府泰州是子通先依賊帥左才相羣盜皆殘忍而子通獨寬仁由是人多歸之有衆萬人才相忌之子通引去與杜伏威合已而反襲伏威伏威敗而復振子通奔海陵收兵得二萬人城父朱粲兵起粲始為縣佐史從軍亡命聚衆為盜謂之可達寒賊自稱迦樓羅王衆至十餘萬轉掠荆沔以南丙子十二年楚主林士𢎞太平元年春正月分遣使者發兵擊諸起兵者朝集使不至者二十餘郡始議分遣使者十二道發兵討捕盜賊三月宴羣臣于西苑上己帝與羣臣飲于西苑水上命學士采古水事七十二以木為之間以妓航酒船人物自動能成音曲是春築毗陵宫于郡東南周十二里大抵倣東都西苑之制而竒麗過之毗陵注見前夏五月丙戍朔日食既是夏帝于景華宫徵求螢火得數百斛夜出遊山放之光遍巖谷除納言蘇威名帝問侍臣盜賊宇文述曰漸少威引身隱柱帝呼問之對曰臣不知多少但患漸近帝曰何謂也威曰他日賊據長山今近在泛水隋縣今屬開封府且往日租賦丁役今皆何在豈非其人皆化為盜乎又昔在鴈門許罷征遼今復徵發賊何由息帝不悅頃之帝問以伐髙麗事威欲帝知天下多盜對曰今兹之役願不發兵但赦羣盜自可得數十萬遣之東征髙麗可滅帝不懌威出裴藴奏曰此大不遜天下何處有許多賊帝曰老革猶言老兵也多姦以賊脅我藴知帝意遣人奏威昔典選濫授人官案驗獄成詔除名為民秋七月帝如江都命越王侗留守殺諫者任宗崔民象王愛仁江都龍舟成送東都宇文述勸幸江都帝從之將軍趙才諫曰今百姓疲勞府藏空竭盜賊蜂起禁令不行願陛下還京師安兆庶帝大怒以屬吏朝臣無敢諫者建節尉任宗上書極諫即日杖殺之遂啓行命越王侗等總留後事帝以詩留别宫人曰我夢江都好征遼亦偶然奉信郎崔民象以盜賊充斥于建國門上表諫帝大怒先解其頤然後斬之至汜水奉信郎王愛仁復上表請還西京斬之至梁郡郡人邀駕上書曰陛下若遂幸江都天下非陛下之有又斬之冬十月許公宇文述死初述子化及智及皆無賴化及事帝于東宫帝寵昵之及即位以為太僕少卿從幸榆林化及智及冒禁與突厥交市帝怒將斬之既而釋之賜述為奴述卒帝復以化及為右屯衛將軍智及為將作少監翟讓李密起兵攻滎陽張須陀擊之敗死楊元感之敗李密被獲既而亡命樊子蓋鎖送密及王仲伯等詣髙陽密等悉出金以示使者曰吾等死日此金並付公幸用相瘞使者許諾防禁漸弛密請通市酒食每宴飲喧譁竟夕使者不以為意至魏郡飲防守者皆醉密遂逸去往依郝孝德及王薄皆不之禮密困乏變姓名曰劉智逺聚徒教授郡縣疑而捕之密亡去韋城隋縣元省故城在今衛暉府睿縣翟讓為東都胡三省注當作東郡今東郡本滑州大業初改郡滑縣是法曹坐事當斬獄吏黃君漢竒其驍勇夜謂讓曰天時人事抑亦可知豈能守死獄中乎讓驚喜叩頭君漢即破械出之讓遂亡命于瓦岡在滑縣東為羣盜同郡單雄信唐書作曹州濟隂人驍健善馬槊聚少年往從之離狐漢縣故城在今曹州府荷澤縣徐世績字懋功入唐賜姓李氏避太宗諱更名績年十七有勇略説讓曰東郡于公與績皆為鄉里不宜侵掠滎陽梁郡本宋州大業初改郡今河南歸德府是汴水所經剽行舟商旅足以自資讓從之往掠公私船資用豐給附者益衆時又有外黃王當仁濟陽王伯當韋城周文舉雍邱李公逸等皆擁衆為盜李密既亡命往來諸賊帥間説以取天下之䇿始皆不信久之稍以為然相謂曰今人皆云楊氏將滅李氏將興吾聞王者不死斯人再三獲濟豈其人乎由是漸敬密密察翟讓最強乃因王伯當以見讓為讓畫䇿讓悅密説讓取天下讓遜謝不敢當有李元英者自東都逃來經歷諸賊求訪李密云斯人當代隋家人問其故元英言比來民間謡歌曰桃李子皇后繞揚州宛轉花園裏莫浪語誰道許桃李子謂逃亡者李氏之子也莫浪語誰道許者密也既與密遇遂委身事之考隋書五行志桃李子歌謡作鴻鵠繞陽山宛轉花林裏言李密自陽城山而來也與此不同今并附録已而讓見密為豪傑所歸欲從其計密因説讓先取滎陽休兵館穀待士馬肥充然後與人爭利于是攻滎陽諸縣多下之帝徙張須陀為滎陽通守以討之須陀戰死讓素為須陀所敗聞其來懼欲避去密止之分千餘人伏林間須陀至讓戰不利須陀乘之密發伏掩其後與讓及徐世績王伯當合軍圍之須陀戰死部兵號泣數日不止河南郡縣為之喪氣詔以裴仁基字德本河東人代領其衆徙鎮虎牢讓乃令密建牙别統所部號蒲山公營讓謂密曰今資糧粗足意欲還向瓦岡公若不往讓從此别矣遂東歸而密獨西行説下數城大獲資儲讓尋悔復引兵從密十二月鄱陽林士𢎞稱楚帝據江南士𢎞擁衆十餘萬北自九江本江州大業初改郡今江西九江府是南及番禺注見前皆為所有以李淵為太原留守擊甄翟兒魏刀兒别將亦號歷山飛破之甄翟兒攻太原將軍潘長文戰死詔以淵為太原留守以郎將王威髙君雅副之將兵討甄翟兒遇于雀鼠谷在今汾州府介休縣西南水經注汾水南經雀鼠谷上戴山阜下臨絶澗俗亦謂之魯般橋淵衆才數千賊圍數匝淵子世民將精兵救之拔淵于萬衆之中會步兵至合擊大破之太僕楊義成擊張金稱髙士達斬之竇建德收其衆取饒陽注見前詔罷義臣兵內史郎虞世基以帝惡盜賊匿不以聞由是盜賊遍海內帝皆弗之知楊義臣破降河北賊數十萬列狀上聞義臣討張金稱堅壁不戰金稱日引兵至義臣約與之戰既而不出如是月餘金稱易之義臣乃約明日與戰而潛遣精騎伺金稱出營即入擊其輜重金稱引還義臣從後擊之金稱大敗遁去清河郡丞楊善會擒殺之髙士達自以才略不及竇建德悉以兵授建德會涿郡通守郭絢將兵來討建德請士達守輜重自簡精兵詐降于絢即襲殺之金稱餘黨俱歸建德義臣乘勝欲討之建德謂士達曰歷觀隋將無如義臣者不如避之然後伺間出擊士達不從留建德守營自帥兵與義臣戰小勝因縱酒髙會建德聞之曰東海公未能破敵遽自矜大禍其至矣未幾義臣果破士達斬之兵皆潰建德與百騎亡去襲破饒陽行收兵還平原為士達發喪兵復大振先是羣盜得隋官及士族子弟皆殺之獨建德善遇之由是隋官多有以城降者軍益盛勝兵至十餘萬人楊善會字敬仁華隂人郭絢河東安邑人帝歎曰我初不聞賊頓如此世基對曰小竊雖多未足為慮義臣擁兵不少久在閫外此最非宜帝遽追義臣放散其兵賊由是復盛書侍御史韋雲起劾世基及御史大夫裴藴職典樞要四方告變不為奏聞賊多言少致發兵不多往皆不克請付有司詰正其罪大理卿鄭善果奏雲起言不實左遷大理司直帝至江都帝至江都江淮郡官謁見者専問禮餉豐薄豐則超遷薄則停解江都郡丞王世充獻銅鏡屏風遷通守歷陽郡臣趙元楷獻異味遷江都郡丞由是郡縣競務刻剝以充貢獻民外為盜賊所掠內為郡縣所賦生計無遺加之飢饉始采樹皮葉或搗藁煮土而食之甚至自相食而官倉猶充牣吏皆畏法莫敢振救王世充密為帝簡閲江淮民間美女獻之由是益有寵遣江都通守王世充擊河間格謙斬之謙黨髙開道滄州陽信人收其衆掠燕地謙擁衆十餘萬據豆子䴚自稱燕王帝命王世充將兵討斬之謙將髙開道收餘衆寇掠燕地軍勢復振虎賁郎將羅藝字子延京兆雲陽人起兵涿郡初帝謀伐髙麗器械資儲皆積于涿郡諸賊競來侵掠留守官不能拒惟藝破賊甚多將作亂先激怒其衆曰吾輩討賊素有功城中倉庫山積而留守官不肯散施將何以勸將士衆皆憤怨遂殺郡丞起兵栁城注見前懷逺即懷逺鎮並歸之藝自稱幽州總管丁丑十三年恭帝侑義寧元年長樂王竇建德丁丑元年魏公李密元年定楊可汗劉武周天興元年梁王梁師都永隆元年秦主薛舉秦興元年梁王蕭銑鳴鳯元年是嵗并楚凡八國春正月光祿大夫陳稜討杜伏威敗績先是李子通據海陵左才相掠淮北杜伏威屯六合帝遣稜將宿衛精兵討之往往克捷至是稜討伏威堅壁不戰伏威遺以婦人服謂之陳姥稜怒出戰伏威大破之遂據歷陽自稱總管分徇郡縣所至輒下伏威常選死七五千寵遇甚厚有攻戰令先擊之戰罷閲視有傷在背者即殺之所獲資財皆以賞軍士有戰死者以妻妾殉葬故人自為戰所向無敵竇建德稱長樂王建德為壇于樂夀本漢樂成隋更名明省故城在今河間府獻縣稱長樂王魯郡徐圓朗兵起圓朗攻陷東平分兵略地自琅邪以西北至東平盡有之勝兵二萬人二月馬邑校尉劉武周河間景城人朔方郎將梁師都夏州人各據郡起兵武周驍勇任俠太守王仁恭字元實上邽人厚遇之使將親兵屯閣下武周與仁恭侍兒私通懼事泄謀亂乃與郡中豪傑斬仁恭開倉賑貧收兵萬餘人遣使附突厥師都亦殺郡丞據郡附突厥翟讓李密據興洛倉即洛口倉在鞏縣擊敗東都兵讓推密稱魏公略取河南諸郡李密説翟讓襲興洛倉密曰洛口倉多積粟若襲取以賑貧乏百萬之衆一朝可得然後檄召四方引賢豪選驍悍天下不足定也讓曰此英雄之略非僕所堪惟君之命盡力從事乃與密共襲興洛倉據之開倉恣民所取老弱襁負相屬越王侗遣郎將劉長恭帥步騎一萬五千討密而使河南討捕使裴仁基等自汜水西入以掩其後密讓大破之威聲益振時東都人皆以密為飢賊盜米烏合易破爭來應募衣服鮮華旗鼓甚盛長恭使陳于石子河西密讓選驍雄分為十隊令四隊伏嶺下以侍仁基六隊陳于石子河東長恭等見密兵少意輕之讓先戰不利密帥麾下橫衝之隋兵大敗死者什五六亦石子河在鞏縣東南即古石泉水也謂之玉仙河讓于是推密為主號魏公稱元年其文書行下稱行軍元帥府拜讓司徒單雄信徐世績皆大將軍于是江淮以北羣盜莫不響應悉拜官爵使各領其衆置百營簿以領之衆至數十萬乃廣築洛口城居之遣將略地河南郡縣多附三月突厥立劉武周為定楊可汗武周取汾陽宫獲隋宫人賂突厥始畢可汗始畢以馬報之遺以狼頭纛立為定楊可汗武周即皇帝位改元武周圍鴈門郡丞陳孝意悉力拒守乘間出擊武周屢破之既而外無救援遣間使詣江都不報孝意誓以必死旦夕向詔敕庫俯伏流涕哀動左右被圍百餘日食盡校尉張倫殺孝意以降梁師都自稱梁帝引突厥冦邊師都略定雕隂隋郡今陜西綏德州是𢎞化注見前延安本延州大業初改郡今陜西延安府是諸郡即皇帝位國號梁始畢亦遺以狼頭纛號為大度毗迦可汗師都乃引突厥居河南地即河套攻破鹽州郡本西魏鹽州大業初改郡唐仍為州故城在今寧夏府靈州即花馬池營也流人郭子和蒲城人起兵榆林突厥以為屋利設突厥俗謂别部典兵者曰屋利設子和自稱永樂王南連梁師都北附突厥始畢以劉武周為定楊天子梁師都為解事天子子和為平陽天子子和固辭不敢當乃更以為屋利設子和後降唐賜姓李氏夏四月金城校尉薛舉金城人起兵隴西自稱西秦霸王舉驍勇絶倫家資巨萬交結豪傑雄于西邊金城令郝瑗募兵數千使舉將之以討羣盜舉與其子仁杲及同黨十三人劫瑗發兵開倉賑施自稱西秦霸王賊帥宗羅㬋羌酋鍾利俗各擁衆歸之舉兵大振以仁杲為齊王少子仁越為晉王羅㬋為興王未幾盡得隴西之地衆至十三萬李密攻東都入其郛密以孟讓為總管使夜帥步騎入東都外郭燒掠時裴仁基以虎牢降密密以為上柱國其子行儼驍勇善戰密亦以為上柱國密又得秦叔寶及程咬金皆以為驃騎羅士信趙仁基皆帥衆歸密密署為總管使各統所部程咬金後更名知節東阿人遣讓與仁基帥二萬餘人襲回洛東倉破之東都出兵擊之仁基等敗走密自率衆屯回洛倉攻偃師金墉皆不克還洛口東都城內乏糧而布帛山積至燃布以爨越王侗使人運回洛倉米入城分兵為九營以備密汝隂淮陽注俱見前降密密復據回洛倉段達等出兵拒之敗走密遂移檄郡縣數帝十罪且曰罄南山之竹書罪無窮決東海之波流惡難盡祖君彥之詞也君彥珽之子工文詞薛道衡嘗薦之于髙祖髙祖曰是歌殺斛律明月人兒邪朕不須此輩帝即位尤疾之調宿城令君彥恆鬱鬱思亂李密據回洛倉君彥往歸之密引為上客宿城隋縣故城在今泰安府東平州越王侗遣太常丞元善達間行詣江都奏曰李密圍逼東都城內無食若陛下速還烏合必散不然者東都決沒因欷噓嗚咽帝為之改容虞世基進曰越王年少此輩誑之若如所言善達何緣至此帝乃怒曰善達小人敢廷辱我因使催運善達遂為羣盜所殺自後人莫敢以賊聞世基容貌沉審特為帝所親愛鬻官賣獄其門如市舍人封德彛託附世基以世基不嫻吏務密為指畫諂順帝意故世基寵益隆而隋政益敝皆德彛所為也五月李淵起兵太原殺副留守王威髙君雅初淵娶于竇毅生四男建成世民元霸元吉一女適太子千牛備身隋東宫官千牛刀名柴紹字嗣昌臨汾人世民聰明勇決識量過人見隋室方亂隂有安天下之志晉陽宫監裴寂字元真蒲州人晉陽令劉文靜字肇仁武功人相與同宿見城上烽火寂嘆曰貧賤如此復逄亂離何以自存文靜笑曰時事可知吾二人相得何憂貧賤文靜見世民而異之深自結納謂寂曰此人雖少命世才也寂初未然之文靜坐與李密連昏繫獄世民就省之隂與計大事文靜曰今天下大亂羣盜萬數有真主驅駕而用之取天下如反掌耳太原百姓皆避盜入城一旦收集可得十萬人尊公所將之兵復且數萬以此乘虛入關號令天下不過半年帝業成矣世民笑曰君言正合我意乃隂部署賔客淵不之知也世民恐淵不從知淵與裴寂有舊乃出私錢數百萬與寂博稍以輸之由是欵狎世民以其謀告之寂許諾會突厥冦馬邑淵遣髙君雅等將兵拒之不利恐并獲罪世民乘間屏人説淵曰今主上無道百姓困窮晉陽城外皆為戰場大人若守小節下有寇盜上有嚴刑危亡無日不若順民心興義兵轉禍為福此天授之時也淵大驚曰汝安得為此言慎勿出口明日世民復説淵淵乃嘆曰吾一夕思汝言亦大有理今日破家亡軀亦由汝化家為國亦由汝矣帝以淵等不能禦冦遣使者執詣江都淵大懼世民與寂等復説淵及早定計淵然之密部勒將發會帝遣使馳驛赦淵淵謀稍緩時建成元吉尚在河東故淵遷延未發先是裴寂私以晉陽宫人侍淵及是文靜謂寂曰先發制人後發制于人且公為宫監而以宫人侍客公死可耳何誤唐公也寂甚懼屢趣淵起兵淵乃使文靜詐為敕書發太原西河鴈門馬邑民年二十以上為兵擊髙麗由是人情恟恟思亂者衆及劉武周據汾陽宫世民言于淵曰大人為留守而盜賊竊據離宫不早建大計禍今至矣淵乃集將佐謂之曰武周據汾陽宫吾輩罪當族滅若之何王威等皆懼請計淵曰朝廷用兵皆稟節度今賊在數百里內江都在三千里外進退維谷何為而可威等皆曰公地兼親賢同國休戚要在平賊専之可也淵陽若不得已而從之者曰然則先當集兵乃命世民與劉文靜長孫順德洛陽人劉𢎞基池陽人等各募兵密遣使召建成元吉于河東柴紹于長安王威髙君雅見兵大集疑淵有異志謂武士彠字信世并州文水人曰順德𢎞基皆背征謂出征而背叛逃亡者三侍隋制左右翊衛府有親侍勳侍武侍之名安得將兵欲收按之士彠曰二人皆唐公客若爾必大致紛紜威等乃止威君雅欲因晉祠祈雨討淵五月淵使世民伏兵于晉陽宫城外自與威君雅共坐視事使劉文靜引司馬劉政會滑州胙城人入告威君雅潛引突厥入冦君雅攘袂大詬世民已布兵塞路文靜與𢎞基順德等共執威君雅繫獄會突厥數萬衆冦晉陽淵命裴寂等勒兵為備而悉開諸城門突厥不敢進衆以威君雅實召之也于是斬威君雅以徇突厥大掠而去東都遣兵擊李密大破之密退屯洛口帝命將軍龎玉將關內兵援東都柴孝和説密使翟讓守洛口裴仁基守回洛而自帥兵西襲長安然後東向以平河洛密曰此誠上䇿但昏主尚存從兵猶衆我兵皆山東人誰肯西入諸將皆出于羣盜留之各競雌雄如此則大業隳矣遂不果會密為流矢所中越王侗使段達與龎玉等夜出兵與戰大破之乃棄回洛奔洛口已而密帥衆向東都大戰于平樂圍東都兵大敗密復取回洛六月李淵遣使如突厥建成元吉與柴紹偕至晉陽劉文靜勸李淵與突厥相結淵從之自為手啓遺始畢可汗云欲舉義兵迎主上復與突厥和親若能與我俱南願勿侵暴百姓坐受寶貨亦唯可汗所擇始畢得啓謂其大臣曰隋主為人我所知也若迎以來必害唐公而擊我無疑矣茍唐公自為天子我當以兵馬助之即命以此意為復書使者七日而反將佐皆喜請從突厥之言淵不可寂等乃請尊天子為太上皇立代王為帝以安隋室移檄郡縣改易旗幟雜用絳白以示突厥淵曰此可謂掩耳盜鈴然逼于時事不得不爾既而突厥遣使至太原以馬千匹為互市淵止市其半軍士請以私錢市之淵曰虜饒馬而貪利其來將不已恐汝不能市也吾所以少取者示貧且不以為急故耳淵乃遣劉文靜報之以請兵私謂文靜曰胡騎入中國生民之大蠧也吾所以欲得之者恐劉武周引之為邊患又胡馬行牧不費芻粟聊藉之為聲勢耳數百人之外無所用之李淵遣世子建成及世民擊西河郡拔之斬郡丞髙德儒西河郡不從淵命淵使建成世民將兵擊之時軍士新集建成世民與之同甘苦遇敵則以身先之近道菜果非買不食軍士有竊之者輒求其主償之亦不詰竊者軍民大悅郡丞髙德儒閉城拒守攻拔之執德儒至軍門世民數之曰汝指野鳥為鸞事具前以欺人主取髙官吾興義兵正為誅佞人耳遂斬之其餘不戮一人秋毫無犯逺近聞之大悅建成等引兵還晉陽往返凡九日淵喜曰以此行兵雖橫行天下可也遂定入關之計李淵自稱大將軍開府置官屬淵開倉賑貧應募者日衆淵分為三軍通謂之義士裴寂等上淵號為大將軍淵以寂為長史劉文靜為司馬唐儉字茂系晉陽人雍之子溫大雅字彥𢎞并州人為記室大雅與弟大有字彥將共掌機密武士彠為鎧曹劉政會及崔善為貝州武城人張道源名河以字行太原人為户曹薑謨上邽人為司功參軍殷開山名嶠以字行不害之孫為府掾長孫順德劉𢎞基竇琮熾之孫及王長諧髙平人薑寶誼天水人陽屯為左右統軍以世子建成為隴西公左領軍大都督左三統軍隸焉世民為敦煌公右領軍大都督右三統軍隸焉各置官屬以柴紹為右領軍府長史咨議秋七月李淵引兵至霍邑夲後漢永安縣隋更名今平陽府霍州是代王侑遣郎將宋老生將軍屈突通將兵拒之李淵以子元吉留守晉陽帥甲士三萬西行誓衆移檄諭以尊立代王之意代王侑遣郎將宋老生屯霍邑大將軍屈突通屯河東以拒淵會積雨淵不能進劉文靜至突厥見始畢可汗請兵且與之約曰若入長安民衆土地入唐公金玉繒帛歸突厥始畢大喜淵以書招李密密恃兵強欲為盟主復書曰所望左提右挈戮力同心執子嬰于咸陽殪商辛于牧野淵得書笑曰密妄自矜大非折簡可致吾方有事關中不如卑辭推獎以驕其志使為我塞成臯之道綴東都之兵我得専意西征俟關中平定徐議之耳乃復書曰天生蒸民必有司牧當今為牧非子而誰老夫年逾知命願不及此欣大弟攀鱗附翼唯弟早膺圖籙以寧兆民宗盟之長屬籍見容復封于唐斯榮足矣密得書甚喜以示將佐曰唐公見推天下不足定矣自是信使往來不絶雨久不止淵中軍糧乏劉文靜未返或傳突厥與劉武周乘虛襲晉陽淵欲北還裴寂等亦以為隋兵尚強未易猝下李密姦謀難測武周惟利是視不如還救根本更圖後舉世民曰今禾菽被野何憂乏糧老生輕躁一戰可擒李密顧戀倉粟未遑逺略武周與突厥外雖相附內實相猜彼雖逺利太原豈可近忘馬邑本興大義以救蒼生當先入咸陽號令天下今遇小敵遽已班師恐從義之徒一朝解體何以自全建成亦以為然淵不從促令引發世民將復入諫會淵已寢不得入號哭于外淵召問之世民曰今兵以義動進戰則克退還則散衆散于前敵乘于後死亡無日何得不悲淵乃悟曰軍已發奈何世民曰右軍嚴而未發左軍去亦未逺請自追之淵笑曰吾之成敗皆在爾惟爾所為世民乃與建成分道夜追左軍復還既而太原運糧亦至雨既霽淵趣霍邑與宋老生戰斬之遂取霍邑淵至霍邑恐宋老生不出建成世民曰老生勇而無謀以輕騎挑之理無不出脫其固守則誣以二于我彼恐為左右所奏安敢不出淵乃引兵進使建成世民以數十騎至城下舉鞭指麾若將圍城之狀且詬之老生怒率兵三萬出戰淵與建成陳于城東世民陳于城南淵戰小却世民與軍頭段志元自南原引兵馳下衝老生出其背老生兵敗投塹劉𢎞基就斬之日已暮淵即命登城時無攻具將士皆肉薄而登遂克之軍吏疑奴應募者不得與良人同淵曰矢石之間不辨貴賤論勳何有等差並宜從本勳授勞賞霍邑吏民關中軍士欲歸者皆授五品官遣歸或諫以官太濫淵曰隋氏吝惜勳賞故失人心奈何效之且收衆以官不勝于用兵乎段志元臨淄人武威司馬李軌字處則姑臧人起兵河西自稱涼王軌家富任俠薛舉起兵河西軌與同郡豪傑謀曰薛舉必來侵暴郡官庸怯不能禦吾輩豈可束手為人所虜不如相與併力拒之保據河右以待天下之變衆皆以為然遂共推軌為主軌乃結豪民及諸胡起兵稱河西大涼王同事者欲殺隋官分其資軌曰今興義兵以救生民乃殺人取資此羣盜耳乃止薛舉遣將擊軌與軌將李贇戰敗沒贇欲盡坑之軌曰天若祚我當擒其主此屬終為我有若其無成坑之何益乃縱之未幾盡有河西五郡之地薛舉自稱秦帝徙據天水注見前舉稱帝立其子仁杲為太子遣仁杲將兵取天水徙都之仁杲多力善騎射軍中號萬人敵然性貪而好殺克天水悉召富人倒懸之以醋灌鼻責其金寶舉每戒之曰汝才略足以辦事然苛虐無恩終當覆我國家涿郡留守薛世雄字世英汾隂人徙關中擊李密竇建德襲破之遂圍河間世雄行至河間建德士衆懼皆南遁聲言還入豆子䴚世雄以為畏已不復設備建德謀還襲之帥敢死士二百餘人先行令餘衆續發約曰夜至則擊其營已明則降之未至二里所天欲明建德惶惑議降會大霧咫尺不辨喜曰天贊我也遂突前擊之世雄遁歸涿郡慙恚而死建德遂圍河間八月李淵克臨汾本平陽大業初更名今山西平陽府治是絳郡注見前劉文靜以突厥兵至遂下韓城本夏陽縣隋更名今屬陜西同州府淵克絳郡得通守陳叔達字子聰陳髙宗之子禮而用之至龍門注見前劉文靜以突厥兵五百馬二千至淵喜曰兵少馬多君將命之功也河東户曹任瓌説淵自梁山注見前濟河指韓城然後鼓行而進據永豐倉以規長安淵悅以瓌為招討大使先説韓城下之九月以江都婦女配將士驍果在江都者多逃亡帝患之以問裴矩對曰人情非有匹偶難以久處乃悉召江都境內寡婦處女集宫下恣將士所取李密遣徐世績取黎陽倉河南山東大水餓莩滿野詔開黎陽倉賑之吏不時給死者日數萬人徐世績言于李密曰天下大亂本為飢饉若更得黎陽倉大事濟矣先是武陽本魏州大業初改郡今直𨽻大名府是郡丞元寶藏以郡降密密以為魏州總管寶藏使其客魏徴為啓謝密密以徴為參軍掌記室徴少孤貧好讀書有大志落拓不事生業始為道士寶藏召典書記密愛其文辭故用之魏徴字元成魏州曲城人至是密遣世績帥麾下五千人濟河會寶藏郝孝德共襲破黎陽倉據之開倉恣民就食浹旬間得勝兵三十餘萬竇建德朱粲之徒亦遣使附密泰山道士徐洪客獻書于密以為大衆久聚恐米盡人散師老厭戰難可成功勸密乘進取之機因士馬之鋭沿流東指直向江都執取獨夫號令天下密壯其言以書招之洪客竟不出莫知所之王世充韋霽世康之子等救東都合擊李密于洛口王世充等帥兵赴東都越王侗使劉長恭龎玉等帥兵與世充等合擊李密于洛口詔諸軍皆受世充節度江都郡丞馮慈明向東都為密所獲密厚禮欲降之慈明曰公家歷事先朝榮祿兼備不能善守門閥乃與元感舉兵偶脫羅網得有今日唯圖反噬未諭髙旨密怒囚之慈明説防人席務本使亡走奉表江都及致書東都論賊形勢為密將所獲密又義而釋之出營門翟讓殺之密之克洛口也箕山府郎將張季珣固守不下密攻之季珣所領不過數百人撫之一無離叛城陷見密不肯拜曰天子爪牙何容拜賊密殺之張馮慈明字無佚長樂人季珣京兆人李淵濟河遣建成守潼關世民徇渭北先是馮翊本漢左馮翊西魏曰同州大業初改馮翊郡今陜西同州府是太守蕭造梁宜豐侯循之子降于李淵淵留兵圍屈突通于河東自引軍西至是濟河關中士民歸之者如市淵遣世子建成劉文靜帥王長諧等諸軍屯永豐倉守潼關以備東方兵慰撫使竇軌字士則琮之兄等受其節度世民率劉𢎞基等諸軍徇渭北慰撫使殷開山等受其節度冠氏長于志寧安養尉顔師古及世民婦兄長孫無忌謁見淵于長春宫淵皆禮而用之冠氏隋縣今東昌府冠縣是安養西魏縣唐省故城在今襄陽縣于志寧字仲謐髙陵人顔師古名籀以字行之推之孫長孫無忌字輔機晟之子已而柴紹妻李氏及淵從弟神通各起兵以應淵關中羣盜悉降于淵柴紹赴太原時謂李氏曰尊公舉兵今偕行則不可留此則及禍奈何李氏曰君第速行我一婦人易以潛匿紹遂行李氏歸鄠縣别墅散家資聚徒衆神通亦在長安亡入鄠縣山中起兵以應淵李氏使其奴馬三寶説關中羣盜皆帥衆從之衆至七萬左親衛段綸先娶淵女亦聚兵萬人各遣使迎淵淵使柴紹將數百騎並南山迎李氏關中羣盜皆降淵淵以書慰勞使受世民節度反鄠縣注見前段綸文振之子並蒲浪依也冬十月李淵合諸軍圍長安京兆內史衛文升年老聞淵軍至憂懼成疾獨將軍隂世師武威人夀之子郡丞骨儀本天竺人居長安奉代王侑乘城拒守淵如永豐倉勞軍賑飢進屯馮翊世民營于涇陽漢涇陽縣在今平涼府境隋開皇中徙置于廢咸陽郡今縣是也屬西安府勝兵九萬李氏將兵萬餘會世民與柴紹各置募府號娘子軍隰城尉房元齡謁世民于軍門世民一見如舊識署記室參軍引為謀主汾隰城漢縣晉移置兹氏唐改西河今州府汾陽縣是淵命劉𢎞基殷開山分兵西略扶風本漢古扶風魏置岐州大業初改郡今陜西鳳翔府是有衆六萬南渡渭水城中出戰𢎞基逆擊破之世民引兵趣司竹注見前軍令嚴整秋毫不犯遣使白淵請期日赴長安淵命建成選倉上兵趣長樂官世民帥新附諸軍北屯長安故城此漢長安城在今西安府西北延安上郡本敷州大業初改郡今陜西鄜州是雕隂皆請降淵引軍西行所過離宫園苑皆罷之出宫女還其親屬十月至長安諸軍皆集合二十餘萬淵命各依壘壁毋得入村落侵暴遣使至城下諭衛文升等不報命諸軍進圍城蕭銑後梁宣帝曽孫巖之孫起兵巴陵注見前自稱梁王巴陵校尉董景珍鄱陽人雷世猛旅帥大業中改都督為旅帥鄭文秀徐德基張繡等謀據郡叛隋推景珍為主景珍曰吾素寒賤不為衆所服羅川令隋書煬帝紀作羅縣令羅漢縣也唐省故城在今湖南長沙府湘隂縣蕭銑梁室之後請奉之乃遣使報銑銑喜從之召募得數千人自稱梁王改隋服色旗幟皆如梁舊十一月李淵克長安殺留守官隂世師等十餘人李淵命諸軍攻城約毋得犯七廟及代王宗室違者夷三族十一月克長安代王左右奔散唯侍讀姚思廉名簡以字行陳吏部尚書察之子侍側軍士將登殿思廉厲聲訶之曰唐公舉義兵匡帝室卿等毋得無禮衆皆愕然布立庭下淵迎王于東宫遷居大興殿後廳思廉扶王至閣下泣拜而去淵還舍于長樂宫與民約法十二條悉除隋苛禁淵之起兵也留守官發其墳墓毁其五廟至是衛文升已卒執隂世師骨儀等十餘人斬之餘無所問馬邑郡丞李靖素與淵有隙淵將斬之靖大呼曰公興義兵欲平暴亂乃以私怨殺壯士乎世民為之固請乃舍之世民因召置幕府靖少負志氣有文武才略其舅韓擒虎每曰可與言將帥之略者獨此子耳李靖字藥師三原人李密誘翟讓殺之讓司馬王儒信勸讓自為大冢宰以奪密權讓不從讓兄𢎞曰天子汝當自為汝不為者我當為之讓但大笑不以為意密聞而惡之乃與房彥藻齊郡人等謀置酒召讓密曰今日不須多人密左右引去讓左右猶在彥藻曰天時甚寒司徒左右請給酒食讓許之乃引讓左右盡出獨密麾下壯士蔡建德立侍密與讓較射讓方引滿建德自後斫之并殺𢎞儒信徐世績走出為門者斫傷王伯當訶止之單雄信叩頭請命密釋之密乃大言曰與君等起義本除暴亂司徒専行貪虐陵辱羣寮今所誅止其一家諸軍無與也命扶世績置帳下親為傅創讓麾下欲散密單騎入其營慰止之使世績雄信伯當分領其衆讓殘忍故死之日無哀之者然密將佐皆有自疑之心矣李淵立代王侑為皇帝尊帝為太上皇淵自為大丞相封唐王以建成為唐王世子世民為秦公元吉為齊公以武德殿為丞相府改教稱令置丞相府官屬以裴寂為長史劉文靜為司馬又以李綱為丞相府司録専掌選事竇威字文蔚熾之子為司録參軍使定禮儀淵傾府庫以賜勳人國用不足光祿大夫劉世龍獻䇿以為今義師數萬並在京師樵蘇貴而布帛賤請伐苑中及六街樹為樵以易布帛可得十數萬匹淵從之十二月唐王淵追諡其大父為景王襄公虎考為元王仁公昞夫人竇氏為穆妃薛舉侵扶風唐王淵遣秦公世民擊敗之舉遣其子仁杲襲破扶風悉并其衆號三十萬謀取長安世民逆擊大破之舉大懼問羣臣曰自古天子有降事乎侍郎禇亮曰趙陀歸漢劉禪事晉轉禍為福自古有之衛尉卿郝瑗曰陛下失問褚亮之言又何悖也舉亦悔之曰聊以此試卿等耳塘禇亮字希明錢人屈突通降唐唐遣招河東通守堯君素湯隂人不下通與劉文靜相持月餘通勢日蹙或説通降通泣曰吾歷事兩主忍相負乎每自摩其頸曰要當為國受一刀及聞長安不守家屬皆被虜乃留桑顯和鎮潼關而自引兵東出將趣洛陽顯和即以城降文靜遣竇琮等與顯和追之通結陳自固琮遣通子夀往諭之通罵曰此賊何來昔與汝為父子今與汝為仇讐命左右射之顯和呼其衆曰今京城已陷汝輩皆關中人去欲何之衆皆釋仗降軍士執通送長安淵以為兵部尚書賜爵蔣公遣至河東城下招諭堯君素相見俱泣下通勸君素降君素曰君為國大臣奈何負國生降更為人作説客邪通曰我力屈耳君素曰我力猶未屈何用多言通慙而退是冬河池太守蕭瑀以郡降唐唐王淵遣李孝恭張道源撫慰山南山東降附者三十餘州又遣使徇巴蜀下之河池本南岐州大業初改郡今陜西漢中府鳳縣是蕭瑀字時文琮之弟李孝恭淵從父兄子王世充襲李密敗績先是王世充與李密戰于洛北敗績已又戰于石子河世充復大敗至是東都米斗三千人餓死者什二三世充謀襲倉城密知之世充軍士有亡降密者密問世充軍中何為軍士曰比見益募兵再饗將士不知其故密謂裴仁基曰吾幾落奴度中吾久不出兵世充芻糧將竭求戰不得故募兵饗士欲乘月晦以襲倉城耳宜速備之乃命郝孝德王伯當孟讓勒兵分屯城側以待之其夕世充兵果至伯當擊之斬其驍將士卒戰溺死者千餘人世充屢戰不勝越王侗遣使勞之世充訴以兵少侗以兵七萬益之明年正月世充擊密于洛北敗之遂屯鞏北命諸將各造浮橋度洛前後不一密帥敢死士乘之世充復大敗密乘勝進據金墉城擁兵三十萬陳于北邙南逼上春門越王侗使段達韋津拒之達望見密兵盛懼而反走軍潰津死于是偃師柏谷河陽河內俱降于密竇建德等並遣使奉表勸進密曰東都未平未可議此御批歷代通鑑輯覽卷四十八

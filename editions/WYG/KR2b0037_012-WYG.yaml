body:
  text: 姓劉氏名邦陶唐氏裔劉累之後春秋時在晉為范氏士㑹入秦還其處者為劉氏後自秦涉魏徙于豐以布衣起沛八載而成帝業因初王漢遂建為有天下之號張晏曰禮諡法無髙以帝功最髙為漢太祖故特起名焉己亥五年二月漢王即皇帝位諸侯及將相共請尊漢王為皇帝漢王辭不敢當帝位羣臣皆曰大王起細微誅不義立有功徳施四海諸侯王不足以道之居帝位甚實宜願大王以幸天下使天下慶幸也漢王三讓乃于二月甲午即皇帝位汜水濟瀆分流在山東曹州府曹縣北與定陶縣分界今定陶西北有漢祖壇髙祖即位處之陽尊王后曰皇后太子曰皇太子追尊先媪皇帝母孟康曰媪母别名音烏老反曰昭靈夫人立故衡山王芮為長沙王故粤與越同王無諸為閩粤今福建周七閩地後為越人所居故曰閩越王詔曰故衡山王吳芮從百粤之兵以佐諸侯誅暴秦有大功諸侯立以為王項羽侵奪之地謂之番君其以長沙豫章象郡桂林南海注俱見前立芮為長沙王都臨湘今湖南長沙府治是又曰故粤王無諸勾踐之後姓騶氏世奉粤祀秦奪其地使其社稷不得血食諸侯伐秦無諸身帥閩中兵以佐滅秦項羽廢而弗立今以為閩粤王王閩中地都治今福建福州府治是弗使失職帝西都洛陽夏五月兵皆罷還家詔曰民前或相聚保山澤不書名數户籍也今天下已定令各歸其縣復故爵田宅其以文法教訓辨告勿笞辱軍吏卒爵及七大夫即公大夫以爵第七故為之七大夫以上皆令食邑秦制列侯乃得食邑今所以寵之也非七大夫以下皆復其身及户勿事不輸户賦也置酒南宫在今河南府洛陽縣東故洛陽城中輿地志秦時已有南北宫上曰徹侯諸將毋敢隠朕皆言其情吾所以有天下者何項氏所以失天下者何髙起髙齊髙氏之别起名也臣瓉曰髙帝時有武都侯臣起王陵對曰陛下使人攻城畧地因以與之與天下同其利項羽不然有功者害之賢者疑之戰勝而不與人功得地而不與人利此其所以失天下也上曰公知其一未知其二夫運籌帷幄之中决勝千里之外吾不如子房填國家撫百姓給餉餽不絶糧道吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信三者皆人傑吾能用之此吾所以取天下者也項羽有一范增而不能用此所以為吾禽也羣臣説服召故齊王横末至自殺彭越既受漢封田横與其徒屬五百餘人入海居島中在山東萊州府即墨縣東北今名田横島帝恐其為亂赦横罪召之横謝曰臣烹陛下之使酈生今聞其弟商為漢將臣恐懼不敢奉詔使還報帝乃詔衛尉秦官漢因之掌宫門衛屯兵酈商曰齊王田横即至敢動摇者致族夷乃復使使具告以詔商狀曰田横來大者王小者乃侯耳不來且發兵加誅横乃與其客二人乘傳詣洛陽至尸鄉在河南偃師縣西即周尸氏廐置置馬以傳驛者謂其客曰横始與漢王俱南面稱孤今漢王為天子而横乃為亡虜北面事之其恥固已甚矣且吾烹人之兄與其弟併肩而事主縦彼畏天子之詔不敢動我獨不愧于心乎遂自剄令客奉其頭從使者馳奏之帝為流涕以王禮𦵏之拜其二客為都尉横既𦵏二客穿其冢傍孔皆自剄下從之帝聞之大驚以横客皆賢餘五百人尚在海中使使召之至則聞横死亦皆自殺以季布季魯季氏之别為郎中斬丁公丁齊丁公伋支孫以次為氏此丁公晉灼曰薛人名固以徇初楚人季布為項羽將數窘辱帝羽滅帝購求布千金敢有舎匿罪三族布匿濮陽周氏周氏令布髠鉗為奴賣之魯朱家魯人以俠聞朱家心知其季布也買置田舎身之洛陽見滕公說曰季布何罪臣各為其主用職耳項氏臣豈可盡誅耶今上始得天下而以私怨求一人何示不廣也且以季布之賢漢求之急此不北走胡南走越耳夫忌壯士以資敵國此伍子胥所以鞭荆平之墓也事見前滕公言於上乃赦布召拜郎中朱家遂不復見之布母弟丁公師古曰同母異父之弟亦為項羽將逐窘帝彭城西短兵接帝急顧曰兩賢豈相戹哉丁公乃還至是來謁帝以徇軍中曰丁公為臣不忠使項王失天下遂斬之曰使後為人臣無傚丁公也帝西都關中以婁敬婁氏邾婁固之後為郎中賜姓劉氏齊人婁敬戍隴西過洛陽求見上曰陛下都洛陽豈欲與周室比隆哉上曰然敬曰陛下取天下與周異周自后稷積徳累善十有餘世至於文武而諸侯自歸之遂滅殷為天子成王即位周公相焉乃營洛邑以為此天下之中也諸侯四方納貢職道里均矣有徳則易以王無徳則易以亡故周之盛時諸侯四夷莫不賔服及其衰也天下莫朝周不能制非惟徳薄形勢弱也今陛下起豐沛卷蜀漢定三秦與項羽戰滎陽成臯之間大戰七十小戰四十使天下之民肝腦塗地哭聲未絶傷者未起而欲比隆于成康之時臣竊以為不侔也夫秦地被山帶河四塞以為固卒然有急百萬之衆可立興也夫與人鬭而不搤音厄其亢音剛與拊其背未能全勝今陛下入關而案秦之故此亦搤天下之亢而拊其背也帝問羣臣羣臣皆山東人争言周王數百年秦二世即亡洛陽東有成臯西有殽殽山注見前澠澠池注亦見前倍河鄉洛其固亦足恃也上問張良良曰洛陽雖有此固其中小不過數百里田地薄四面受敵非用武之國也關中左殽函右隴蜀沃野千里南有巴蜀之饒北有胡苑之利師古曰安定北地上郡之北與胡相接之地可以畜牧故曰胡苑阻三面而守獨以一面東制諸侯諸侯安定河渭漕輓天下西給京師諸侯有變順流而下足以委輸舂遇反此所謂金城千里天府之國敬説是也上即日西都闗中拜敬郎中賜姓劉氏號奉春君良從上入關即道引不食穀杜門不出曰家世相韓及韓滅不愛萬金之資為韓報仇彊秦天下震動今以三寸舌為帝者師封萬户侯此布衣之極于良足矣願棄人間事欲從赤松子逰耳也赤松子師古曰仙人號神農時為兩師秋七月燕王臧荼反帝自將擊虜之九月立盧綰為燕王綰家與上同里閈綰生又與上同日上寵幸綰故特王之時西楚故將利幾反楚公子食采於利後以為氏利幾以陳令降帝侯之潁川至雒陽舉通侯籍召之利幾恐遂反上亦自撃破之後九月治長樂宫在陜西長安縣西北故城中本秦興樂宮漢修飾之因更名庚子六年冬十二月帝㑹諸侯于陳執楚王信以歸至洛陽赦為淮隂侯信初之國行縣邑陳兵出入有上書告信反者工問左右左右爭欲撃之用陳平計乃偽㳺雲夢平曰古者天子有廵狩㑹諸侯陛下第出偽㳺雲夢㑹諸侯于陳陳楚之西界信聞天子以好出㳺其勢必無事而郊迎謁因而禽之此特一力士耳帝以為然發使告諸侯㑹陳信聞之疑懼時楚故將鍾離昧亡歸信詔捕之或說信曰斬鍾離昧以謁上上必喜亡患信從之信見昧計事昧曰公捕我自媚漢吾今死公隨手亡矣乃罵信曰公非長者卒自剄持昧首謁帝于陳帝豫具武士縛信載後車信曰果若人言狡兔死走狗烹髙鳥盡良弓藏敵國破謀臣亡天下已定我固當烹上曰人告公反遂械繫信以歸因赦天下田肯賀曰陛下得韓信又治秦中秦形勝之國也帶河阻山縣隔千里持㦸百萬秦得百二焉地勢便利其以下兵于諸侯譬猶居髙屋之上建瓴水也夫齊東有瑯邪即墨注俱見前之饒南有泰山之固西有濁河之限晉灼曰齊西有平原河水號黄河故曰濁河北有勃海之利地方二千里持㦸百萬縣隔千里之外齊得十二焉此東西秦也非親子弟莫可使王齊者上曰善還至洛陽赦信為淮隂侯信知上畏惡其能多稱病不朝從居常鞅鞅羞與絳灌等列常過樊將軍噲噲跪拜送迎言稱臣曰大王乃肯臨臣信出門笑曰生乃與噲等為伍上嘗從容與信言諸將能各有差上問曰如我能將幾何信曰陛下不過能將十萬上曰于君何如曰臣多多益善上笑曰多多益善何為為我禽信曰陛下不能將兵而善將將此乃信之為陛下禽也且陛下所謂天授非人力也始剖符封功臣為徹侯詔定元功位次賜丞相何劍履上殿入朝不趨始封功臣酇今湖北襄陽府光化縣北有鄼縣故城蕭何所封侯蕭何食邑獨多功臣皆曰臣等身被堅執鋭多者百餘戰少者數十合今蕭何未嘗有汗馬之勞徒持文墨議論顧反居臣等上何也帝曰諸君知獵乎追殺獸兔者狗也發縱指示者人也今諸君徒能得走獸耳功狗也至如蕭何發縱指示功人也羣臣皆莫敢言張良亦無戰鬬功帝使自擇三萬户良曰臣始起下邳與上㑹留注見前此天以臣授陛下陛下用臣計幸而時中臣願封留足矣不敢當三萬戸乃封良為留侯封陳平為戸牖陽武縣郷漢改東昏縣後廢故城在開封府蘭陽縣東北侯平辭曰此非臣之功也上曰吾用先生謀戰勝克敵非功而何平曰非魏無知臣安得進上曰子可謂不背本矣乃賞無知列侯畢已受封詔定元功十八人位次師古曰謂蕭何曹參張敖周勃樊噲酈商奚消夏侯嬰灌嬰傅寛靳歙王陵陳武王吸薛歐周昌丁寛蟲達從第一至十八也皆曰曹參功最多宜第一鄂千秋鄂出姬姓晉鄂侯之後進曰參雖有野戰略地之功此特一時之事耳上與楚相距五載失軍亡衆跳身遁者數矣蕭何常從闗中遣軍補其處又軍無見糧何轉漕闗中給食不乏陛下雖數亡山東何常全闗中以待陛下此萬世之功也今奈何以一旦之功而加萬世之功哉何第一參次之上曰善且曰吾聞進賢受上賞封千秋為安平漢縣今屬直𨽻深州侯是日悉封何父子兄弟十餘人皆有食邑益封何二千戸春正月立從兄賈為荆王弟交為楚王兄喜為代王子肥為齊王帝懲秦孤立而亡欲大封同姓以填撫天下分楚地為二國立從兄將軍賈數有大功為荆王王淮東故吳地凡五十三縣弟文信君交帝同父少弟好書多材藝為楚王王淮西故楚地凡三十六縣兄宜信侯喜帝仲兄字仲為代王王代地凡五十三縣長子肥帝微時外婦曹氏子為齊王王齊地凡七十三縣諸民能齊言者皆以與齊帝兄弟四人長兄伯早卒帝微時嘗與賔客遇其邱嫂食嫂陽為羹盡轑釜客以故去已而視釜中有羹由是怨嫂故伯子不得封太上皇以為言帝曰某非忘封之也為其母不長者耳乃封其子信為羹頡侯以曹參為齊相參至齊聞膠西漢縣今為膠州屬山東莱州府有蓋公善治黄老言樂毅之後樂臣公善修黄帝老子之言以教蓋公蓋公教于髙密膠西使人請之蓋公為言治道貴清静而民自定參乃避正堂以舍之用其言齊國安集稱賢相焉更以太原郡漢太原郡治晉陽今太原府太原縣是為韓國徙韓王信王之上以信材武所王皆天下精兵處乃以太原郡三十一縣胡三省注班志漢太原郡領二十一縣今以三十一縣為韓國蓋定襄未置郡故太原之地北被邉兼有雁門之馬邑也為韓國徙信王之以備胡都晉陽信以國被邊晉陽去塞逺請治馬邑山西朔平府朔州西北有故城故馬邑城也今馬邑縣唐開元中置非漢縣許之封雍齒為什方漢縣今屬四川成都府侯上已大封功臣三十餘人其餘争功未得行封上居洛陽南宫從複道上望見諸將往往坐沙中偶語以問張良良曰陛下與此屬共取天下今所封皆故人親愛所誅皆平生仇怨此屬畏陛下不能徧封恐义以過失及誅故相聚謀反耳上曰為之奈何良曰取上素所不快計羣臣所共知最甚者一人先封以示羣臣三月上置酒封雍齒帝初起時齒以豐降魏事見前因趣丞相急定功行封罷酒羣臣皆喜曰雍齒且侯吾屬無患矣夏五月尊太公為太上皇上還櫟陽五日一朝太公太公家令説太公曰皇帝雖子人主也太公雖父人臣也奈何令人主拜人臣使威重不行後上朝太公擁篲掃竹也迎門却行上大驚下扶太公太公曰帝人主奈何以我亂天下法上乃詔尊太公為太上皇賜家令金五百斤太上皇思欲東歸帝知之乃于驪邑改築城市街里以象豐徙豐民實之太上皇乃恱後因名驪邑曰新豐秋九月匈奴宼邉圍馬邑韓王信叛與連兵初匈奴畏秦北徙及秦滅復稍南渡河單于頭曼有太子曰冒頓音墨特後有所愛閼氏音烟支匈奴皇后號生少子頭曼欲立之乃使冒頓質于月支與匈奴同俗隨畜移徙居祁連敦煌間控弦十餘萬月氏欲殺冒頓冒頓盜其善馬亡歸頭曼以為壯使將萬騎冒頓乃作鳴鏑勒其騎習射令曰鳴鏑所射有不悉射者斬于是先射其善馬既又射其愛妻左右或不敢射者皆斬之後頭曼出獵冒頓以鳴鏑射頭曼左右皆隨鳴鏑而射之遂殺頭曼而自立先自東胡烏丸之祖其别為鮮卑在匈奴東故名彊月氏盛冒頓既立乃襲滅東胡東胡王輕冒頓使人求得頭曼時千里馬冒頓與之已又欲得單于一閼氏冒頓復與之東胡愈益驕兩國中間有棄地千餘里各居其邉為甌脱東胡欲有之羣臣或曰此棄地于之亦可勿與亦可冒頓大怒曰地者國之本奈何與人言與者皆斬之即上馬令國中後出者斬遂襲撃東胡滅之西走月氏月氏為匈奴所破乃逺去擊大夏而臣之為大月氏其不能去者保南山為小月氏南并樓煩漢書地理志雁門郡樓煩應劭曰故樓煩胡地漢樓煩故城今山西寧武府是白羊匈奴别種其王居河南河南即新秦中遂侵燕代悉復秦所奪故地至是圍韓王信于馬邑信使使求和解漢疑信有二心使人譲之信恐誅遂以馬邑降匈奴冒頓因引兵南攻太原至晉陽命博士叔孫通叔孫魯叔孫氏之别通薛人號稷嗣君起朝儀帝悉去秦儀法為簡易羣臣争功醉或妄呼㧞劍撃柱帝益厭之叔孫通説上曰夫儒者難與進取可與守成臣願徴魯諸生共起朝儀帝曰得無難乎通曰五帝異樂三王不同禮禮者因時世人情為之節文者也臣願頗采古禮與秦儀雜就之上曰可試為之令易知度吾所能行為之于是通使徴魯諸生有兩生不肯行曰今天下初定死者未葬傷者未起又欲起禮樂禮樂所由起百年積徳而後可興也吾不忍為公所為通曰若真鄙儒不知時變所徴三十餘人及上左右為學者近臣之有學術者與其弟子百餘人為綿蕞韋昭曰引繩為綿立表為蕞野外習之月餘言于上曰可試觀矣上使行禮曰吾能為此乃令羣臣習肄明年長樂宫成諸侯羣臣皆朝賀先平明謁者官名掌賔讚受事治禮以次引入殿門陳東西鄉功臣列侯諸將軍軍吏以次陳西方東鄉文官丞相以下陳東方西鄉衛官張旗志與幟同郎中侠與挟同陛大行即典客後更名大鴻臚設九賓臚句傳蘇林曰上傳語告下為臚下告上為句劉攽曰賔為傳擯之擯九賔擯者九人掌臚句傳也于是皇帝傳警傳聲而唱警輦出房引諸侯王以下至吏六百石以次奉賀莫不震恐肅敬禮畢置法酒猶言禮酌諸侍坐者皆俯抑首以次起上壽觴九行謁者奏罷酒御史執法舉不如儀者輒引去竟朝置酒無敢諠譁失禮者于是上曰吾乃今日知皇帝之貴也拜通為奉常秦官漢因之掌宗廟禮儀後改太常賜金五百斤以其弟子皆為郎初通在奉時以文學徴會陳勝起二世問諸生或言反或言盜二世作色通曰此特鼠􅀼狗偷何足置齒牙二世喜拜通博士諸生責通䛕通曰公不知我幾不免虎口遂亡去事楚後降漢從弟子百餘人無所進弟子愠通曰漢王方争天下諸生寧能鬬乎且待我我不忘矣及徴諸生習禮成通言于帝請官諸弟子儒生帝皆以為郎通又出所賜金悉與諸生諸生乃喜曰叔孫生真知當世務辛丑七年帝自將討韓王信信及匈奴皆敗走帝追擊之被圍平城漢縣故城在今山西大同府大同縣東七日乃解上自將擊韓王信破其軍信亡走匈奴白土漢上郡有白土縣故城在今鄂爾多斯右翼中旗南人曼邱臣曼邱姓臣名王黄等立趙苖裔趙利為王收信散兵謀攻漢匈奴使左右賢王匈奴爵號最為大國將萬騎與王黄等南至晉陽漢擊之輒敗走已復屯聚㑹天大寒雨雪士卒墮指者十二三上聞冒頓居代谷胡三省注谷在句注之北句注山名在山西代州西北使人覘之冒頓匿其壯士肥牛馬但見老弱羸畜使者十輩来皆言匈奴可擊上復使劉敬往使未還悉兵三十二萬北逐之踰句注敬還報曰兩國相擊此宜夸矜見所長今臣往徒見羸瘠老弱此必欲見短伏竒兵以争利愚以為匈奴不可擊也時兵已業行上怒罵敬曰齊虜以口舌得官今乃妄言沮吾軍械繫敬廣武漢縣故城在今代州西遂先至平城兵未盡到冒頓縱精兵四十萬騎圍帝于白登山名在大同縣東一名白登臺七日漢兵中外不得相救餉帝用陳平秘計使使間厚遺閼氏閼氏謂冒頓曰兩主不相困今得漢地單于非能居之也且漢王亦有神靈單于察之考漢書注應劭曰陳平使畫工圖羙女間遣人遺閼氏云漢有美女如此今皇帝困厄欲獻之閼氏畏其奪己寵因與單于言之顔師古以應説出桓譚新論蓋意測之辭非傳記所説也冒頓乃解圍去冒頓與王黄趙利期黄利不至冒頓疑之亦以閼氏之言乃解圍之一角會天霧漢使人往来匈奴不覺陳平請令彊弩傅兩矢外郷從解角直出漢亦罷兵歸上至廣武斬前使十輩赦劉敬曰吾不用公言以困平城封為建信侯關内侯無國邑更封陳平為曲逆侯帝南過曲逆曰壯哉縣吾行天下獨見洛陽與是耳遂以封平直曲逆漢縣故城在今𨽻保定府完縣東南平從帝征伐凡六出竒計請捐金行反問一以惡革具進楚使二夜出女子二千人解滎陽圍三躡足請封齊王信四請偽逰雲夢縳信五解白登之圍六輒益封邑焉匈奴冦代代王喜棄國自歸立子如意為代王匈奴攻代代王不能堅守棄國間行走洛陽自歸帝不忍致法廢為合陽即郃陽今縣屬陕西同州府侯以少子如意為代王如意定陶戚姬子也二月徙都長安漢長安故城在今西安府長安縣西北寰宇記長安蓋古鄉聚名隔渭水對秦咸陽宫漢于其地築未央宫置縣以長安為名蕭何治未央宫在今長安縣西北故長安城中三輔黄圖未央宫周廻三十八里立東闕北闕前殿西京雜記未央宫因龍首山制前殿建北闕師古曰未央殿雖南鄉而上書奏事謁見皆詣北闕公車司馬亦在焉是則以北闕為正門而又有東闕西南兩門則無葢作宫之初厭勝之術或然乎武庫太倉上見其壯麗怒甚謂何曰天下洶洶勞苦數歳成敗未可知是何治宫室過度也何曰天下方未定故可因以就宫室且天子以四海為家非壯麗無以重威且無令後有以加也上説遂自櫟陽徙都之是月置宗正官以序九族壬寅八年春三月帝如洛陽九月還宫令爵非公乗爵八級曰公乗言得乗公家之車也以上毋得冠劉氏冠帝為亭長時以竹皮為冠及貴常冠之所謂劉氏冠也賈人毋得衣錦繡綺縠絺紵罽氍毹之類操兵乗騎馬駕車單騎俱毋得用馬癸夘九年冬十月淮南王布梁王越趙王敖楚王交朝于未央宫上置酒未央前殿起奉玉巵為太上皇夀曰始大人常以臣亡頼不能治産業不如仲力今臣之業所就孰與仲多殿上羣臣皆稱萬嵗大笑為樂遣劉敬使匈奴結和親徙齊楚大族于闗中匈奴嵗苦北邊上患之劉敬曰天下初定士卒罷于兵未可以武服也冒頓殺父妻母以力為威未可以仁義説也獨可以計久逺子孫為臣耳陛下誠以適長公主周制天下嫁女于諸侯不自主婚使諸侯同姓者主之故曰公主妻之彼必慕以為閼氏生子必為太子嵗時問遺諭以禮節冒頓在固為子壻死則外孫為單于可無戰以漸臣也帝曰善欲遣長公主吕后不可乃取家人子宫人名號名為長公主以妻單于使劉敬往結和親約敬還言于上曰闗中北近匈奴匈奴河南地去長安近者七百里東有彊族齊諸田楚昭屈景一日有變陛下未得髙枕而卧也願徙六國後及豪傑名家居闗中無事可以備胡有變率以東伐此彊本弱末之術也上曰善于是徙昭屈景懐田五族及豪傑于闗中與利田宅給與便利之處凡十餘萬口春正月趙王敖廢徙代王如意為趙王初上解平城還至趙趙王敖執子壻禮甚卑上箕踞慢罵之趙相貫髙貫氏原伯貫後以名為氏趙午等皆怒曰吾王孱冀州人謂懦弱為孱王也乃説敖曰皇帝遇王無禮請為王殺之敖齧其指出血曰君何言之悞先人亡國頼帝得復徳流子孫秋毫皆帝力也願君無復出口貫髙等相謂曰吾王長者不背徳何汚王為事成歸王事敗獨身坐耳事在七年已而上擊韓王信餘冦過柏人漢縣故城在今直𨽻順徳府唐山縣西貫髙等壁人于厠中欲以要上上欲宿心動而去上問縣名為何曰柏人上曰柏人者迫于人也去弗宿事在八年至是貫髙怨家上變告之于是逮捕趙王敖及諸反者趙午等皆自剄貫髙獨怒罵曰公等皆死誰白王不反者乃檻車車上著板四周如檻形膠致膠宻不得開送詣京師詣長安貫髙對獄曰獨吾屬為之王實不知吏榜笞刺爇身無完者終不復言廷尉以聞上曰壯士誰知者中大夫漢官掌議論泄公氏族略泄亦作洩曰臣素知之此固趙國立名義不侵為然諾者也上使泄公持節往問之箯輿前榜刺委困故以竹為輿處之仰視泄公勞苦如平生歡泄公因問張王果有謀否髙曰吾三族皆以論死豈愛王過于吾親哉顧為王實不反獨吾等為之具道所以王不知狀泄公以報乃赦敖廢為宣平侯徙代王如意為趙王上賢髙赦之髙曰所以不死白張王不反耳今王已出吾責己塞死不恨矣且人臣有篡弑之名豈有面目復事上哉乃仰絶亢而死先是詔捕趙王羣臣賓客敢從者罪三族郎中田叔孟舒皆自髠鉗為奴以從及貫髙事白上召見田叔等與語漢廷臣無能出其右者盡拜為守相齊田叔趙陘城人其先田氏夏六月乙未晦日食甲辰十年夏五月太上皇崩葬萬年漢太上皇葬櫟陽北原因于櫟陽置萬年縣以奉陵寢故城在今西安府臨潼縣東北令諸侯王國各立廟于其都以周昌沛人苛之弟為趙相趙堯為御史大夫戚􅁎有寵嘗從上之闗東日夜啼泣欲立其子如意吕后年長希見益疎上以太子仁弱如意類已如意已立為趙王留之長安欲廢太子而立之大臣固争皆莫能得御史大夫周昌廷争之彊上問其説昌為人吃言之難也又盛怒曰臣口不能言然臣期期知其不可陛下欲廢太子臣期期不奉詔上欣然而笑即罷吕后聞之跪謝昌曰微君太子㡬廢時趙王年十嵗上憂萬嵗之後不全也獨心不樂悲歌符璽御史趙堯侍知上指乃請為趙王置貴彊相及吕后太子羣臣所敬憚者上問其人堯以昌對上乃以昌相趙而以堯代為御史大夫九月代相陳豨宛句人反帝自將討之初陳豨以郎中封陽夏侯為代相監趙代兵豨嘗稱慕魏公子無忌及將守邊多招致賓客告歸過趙賓客隨之者千餘乗趙相周昌求入見上具言豨賓客盛擅兵于外恐有變上令人覆案豨客諸不法事多連引豨豨恐隂令客通王黄曼邱臣所遂反自立為代王刼略趙代上聞乃自擊豨至邯鄲上喜曰豨不南據邯鄲而阻漳水吾知其無能為矣周昌奏常山亡二十城請誅守尉上曰守尉反乎對曰不上曰是力不足亡罪令昌選趙壯士可將者白見四人白于天子而召見也封各千户以為將左右諫曰此何功上曰非汝所知趙代地皆豨有吾徴天下兵未至今獨邯鄲中兵耳吾何愛四千戶不以慰趙子弟又聞豨將皆故賈人上曰吾知所以與之矣乃多以金間之豨將多降明年將軍郭蒙擊破豨將張春等太尉秦官漢因之掌武事後為大司馬周勃道太原屠馬邑上攻㧞東垣今正定府正定縣漢初曰東垣後改今名以千金購王黄曼邱臣皆生致之于是豨軍遂敗乙巳十一年春正月皇后殺淮隂侯韓信夷三族淮隂侯信舍人得罪于信信欲殺之其弟乃上變告前陳豨相代監邊辭信信辟左右曰公所居天下精兵處也而公陛下之信幸臣也人言公畔陛下必不信再至則疑矣三至必怒而自將吾為公從中起天下可圖也豨曰謹奉教今信隂與豨通謀欲與家臣夜詐赦諸官徒奴發以襲吕后太子后與蕭何謀詐令人從帝所来稱豨已破羣臣皆賀時信方稱疾何紿信曰雖病彊入賀信入吕后使武士縳信斬之長樂鐘室懸鐘之室信方斬曰悔不用蒯徹計反為女子所詐豈非天哉遂夷信三族上已破豨歸聞信死且喜且哀之問后曰信死亦何言后道其語上曰此齊辯士蒯徹也詔捕之至問曰若教淮隂侯反耶對曰然豎子不用臣䇿故自夷于此上怒曰烹之徹曰秦失其鹿天下共逐之髙材㨗足者先得焉跖之狗吠堯堯非不仁狗固吠非其主當是時臣惟知韓信非知陛下也且天下欲為陛下所為者甚衆顧力不能耳豈可盡烹耶上曰置之以蕭何為相國上已聞韓信死使使拜丞相何為相國益封五千户令卒五百人一都尉為相國衛衆皆賀召平獨弔謂何曰禍自此始矣上暴露于外而君守于内非被矢石之事而益君封置衛者以淮隂新反于中有疑君心置衛衛君非寵君也願君讓封弗受以家私財佐軍何從其計上説是秋黥布反上自擊之何拊循百姓悉以所有佐軍如陳豨時客或説曰君位為相國功第一可復加哉何不多買田地賤貰貸以自汚上心乃安何又從其計上益大恱安召平故秦東陵侯秦破為布衣種𤓰長城東故後世謂之東陵𤓰韓王信伏誅信引匈奴入居參合漢縣故城在今山西大同府陽髙縣東北將軍柴武柴氏髙柴之後以名為氏遺信書令急自歸信報曰僕之思歸如痿人不忘起盲者不忘視勢不可耳遂戰武擊斬之後信子積當及其太子之子嬰以衆降漢俱封列侯世貴顯帝至洛陽立子恒即文帝為代王帝以代地居常山之北與匈奴邊數被冦乃稍分山南太原地以益之令羣臣擇可立為王者皆曰子恒賢知温良遂立以為代王都晉陽後徙中都漢縣故城在今山西汾州府平遥縣西北二月立王侯朝獻郡國口賦法詔曰欲省賦甚今獻未有程吏或多購以為獻而諸侯王尤多民疾之令諸侯王常以十月朝獻及郡各以其口數率計之也人嵗六十三錢以給獻費詔郡國求遺賢詔曰蓋聞王者莫髙于周文伯者莫髙于齊桓皆待賢人而成名今天下賢者智能豈特古之人乎患在人主不交故也士奚由進今吾以天之靈賢士大夫定有天下以為一家欲其長久世世奉宗廟無絶也賢人已與我共平之矣而不與我共安利之可乎賢士大夫有肯從我遊者吾能尊顯之布告天下使明知朕意御史大夫下相國相國下諸侯王御史中執法中丞也下郡守其有意稱明徳者必身勸為之駕身親敦勸自為駕車遣詣相國府有而弗言覺免年老癃病勿遣梁王越廢徙蜀三月殺之夷三族上之擊陳豨也徴兵于梁梁王稱病使將將兵詣邯鄲上怒讓之梁王恐欲自往謝其將扈輙曰往則為禽不如遂反王不聴梁太僕得罪亡走漢告之上使使掩捕梁王囚之洛陽有司奏反形已具請論如法上赦以為庶人徙蜀青衣本羌地漢置青衣道以青衣江名後改曰漢嘉縣今四川雅州府雅安縣是也至鄭今陕西同州府華州鄭縣故城是逢吕后從長安来王為后涕泣自言無罪願處故昌邑后許諾與俱至洛陽白上曰彭王壯士今徙之蜀此自遺患不如遂誅之妾謹與俱来乃令其舎人告越復謀反夷三族梟首洛陽下詔有收視者捕之梁大夫欒布使于齊還奏事彭越頭下祠而哭之吏捕以聞上欲烹之方提趨湯顧曰願一言而死上曰何言布曰方上之困彭城敗滎陽也王與楚則漢破與漢則楚破且垓下之會㣲彭王項氏不亡天下已定而陛下以苛小案誅滅之臣恐功臣人人自危也今彭王已死臣生不如死請就烹于是上乃釋布拜為都尉立子恢為梁王友為淮陽漢淮陽國治陳今河南陳州府王罷東郡頗益梁罷潁川郡頗益淮陽夏四月帝還宫五月立故秦南海秦郡注見前尉趙佗正定人為南粤王初秦南海尉任囂病且死召龍川今縣屬廣東惠州府令趙佗語曰秦為無道天下苦之聞陳勝等作亂天下未知所安番禺秦南海郡治番禺今廣東廣州府番禺南海二縣是負山險阻南海東西數千里頗有中國人相輔此亦一州之主也可以立國即被佗書行南海尉事囂死佗即移檄闗隘絶道絶秦所開越道聚兵因稍以法誅秦吏擊并桂林象郡注俱見前自立為南越武王至是詔立為南越王使陸賈即授璽綬與剖符通使使和集百越無為南邉患害賈至佗以魋音椎結音計為髻一撮似椎夷俗也箕踞見之賈曰足下中國人親戚墳墓皆在正定今反天性棄冠𢃄欲以區區之越與天子抗衡為敵國禍且及身矣夫秦失其政豪傑並起唯漢王先入闗項羽倍約遂誅滅之五年之間海内平定此非人力天所建也今天子憐百姓新勞苦且休之遣使授君王印剖符通使君王宜郊迎北面稱臣乃欲以新造未集之越屈彊于此漢誠聞之掘燒君王先人冢夷㓕家族使一偏將將十萬衆臨越則越殺王降漢如反覆手耳于是佗乃蹶然起坐謝曰居蠻夷中久殊失禮義留賈與飲數月曰越中無足與語至生来我今日聞所不聞賜槖中装直千金他送亦千金賈卒拜佗令稱臣奉漢約歸報帝大悦拜賈為大中大夫賈時時前説稱詩書帝駡之曰乃公居馬上得之安事詩書賈曰馬上得之寧可以馬上治乎且湯武逆取而以順守之文武並用長乆之術也向使秦已并天下行仁義法先聖陛下安得而有之帝有慙色曰試為我著秦所以失天下吾所以得之者及古成敗之國賈著十二篇毎奏一篇帝未嘗不稱善號其書曰新語帝有疾帝有疾惡見人詔户者無得入羣臣十餘日舞陽今縣屬河南南陽府侯樊噲排闥直入大臣隨之上獨枕一宦官卧噲等流涕曰始陛下與臣等起豐沛定天下何其壯也今天下已定何其憊也且陛下病甚大臣震恐不見臣等計事顧與一宦者卧豈不見趙髙之事乎帝笑而起秋七月淮南王布反帝自將討之立子長為淮南王布平之國治夀春初淮隂侯死布心已恐及彭越誅醢其肉以賜諸侯布見醢大恐隂令人部聚兵候伺旁郡警急有中大夫賁音肥赫得罪于布乗傳詣長安上變言布謀反有端上繫赫使人驗之布遂族赫家發兵反反書聞汝隂漢縣今曰阜陽為江南潁州府冶侯滕公以問其客薛公故楚令尹薛公曰往年殺彭越前年殺韓信此三人者同功一體之人也自疑禍及身故反爾滕公言于上上召薛公問之對曰布反不足怪使布出于上計山東非漢有也出于中計勝敗之數未可知也出于下計陛下髙枕而卧漢無事矣上曰何謂也對曰東取吳西取楚并齊取魯傳檄燕趙固守其所此上計也東取吳西取楚并韓取魏㩀敖倉之粟塞成臯之口此中計也東取吳西取下蔡即春秋州来注見前歸重于越身歸長沙此下計也上曰是計將安出對曰布以驪山之徒自致萬乗此皆為身不顧後慮者也必出下計上曰善封薛公千户立子長故趙王敖所進美人子方三嵗為淮南王時上有疾欲使太子撃布太子客東園公姓唐字宣明居園中因號綺里季姓氏未計夏黄公姓崔名廣字少通齊人隠居夏里故號夏黄公角里先生河内軹人姓周名術字元道四人所謂四皓也避秦亂隠于商山吕后以留侯計使建成侯吕釋之奉太子書卑辭厚禮迎之四人皆至有商山在商州東七盤十二縛説建成侯吕釋之曰太子將兵有功則位不益無功則從此受禍矣君何不急請吕后乗間為上泣言黥布猛將善用兵諸將皆陛下故等夷乃令太子將此屬無異使羊將狼且使布聞之則鼓行而西耳后如其言上曰吾惟䜿子固不足遣而公自行耳於是上自將而東羣臣皆送至覇上留侯病强起見上曰臣宜從病甚楚人剽疾願上無與争鋒因説上令太子為將軍監關中兵上曰子房雖病彊卧而傅之時叔孫通已為太傅留侯行少傅事布之初反謂帝老厭兵必不能来諸將淮隂彭越已死餘不足畏故遂反果如薛公之言東擊荆荆王賈走死擊楚楚與戰徐注見前僮漢縣故城在江南鳳陽府虹縣東北間軍敗楚為三軍欲以相救為竒或曰兵法諸侯自戰其地為㪚地今别為三彼敗吾一軍餘皆走安能相救不聽果敗楚王交走薛注見前布遂引兵西丙午十二年冬十月帝破布軍于蘄西布亡走長沙王臣吳芮子嗣王誘而誅之上與布軍遇于㑹甀邑名徐廣曰在蘄西會攻外反甀文瑞反布兵甚精上望其置陳如項籍軍惡之遥見布謂曰何苦而反布曰欲為帝耳上怒罵之遂大戰布軍敗渡淮走江南長沙王臣使人誘與走越殺之帝還過沛復其民及豐上還過沛留置酒沛宫悉召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣上擊筑自歌曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方令兒皆和習之上乃起舞慷慨傷懐泣數行下謂沛父兄曰逰子悲故鄉吾雖都關中萬嵗後吾魂魄猶思沛且朕自沛公以誅暴逆遂有天下其以沛為朕湯沐邑復其民世世無有所與沛父老諸故又日樂飲極歡道故舊為笑樂十餘日乃去沛父老皆頓首曰沛幸得復豐未得唯陛下哀矜上曰豐者吾所生長極不忘耳特以其為雍齒故反我為魏沛父兄固請之乃并復豐比沛太尉周勃誅陳豨定代地勃斬豨于當城漢縣故城在大同府陽髙縣界悉定代郡雁門雲中地立兄子濞為吳王荆王既死事見前無後更以荆為呉國立兄仲之子沛侯濞為吳王已拜上召濞謂曰汝状有反相因附其背曰漢後五十年東南有亂豈汝耶然天下同姓一家汝慎毋反濞頓首曰不敢十一月過魯以太牢祀孔子尹氏起莘曰漢髙之興以馬上得天下不事詩書然過魯祠孔子乃見于兵戈倥偬之日自是而後除挾書律置博士官開獻書路儒道稍稍振起蓋實基于此帝還宫上還長安疾益甚愈欲易太子張良諫不聴因辭疾不視事叔孫通諫曰晉獻公以驪姬故廢太子國亂數十年秦以不蚤定扶蘇自使滅祀今必欲廢嫡而立少臣願先伏誅以頸血汚地帝曰公罷矣吾直戯耳通曰太子天下本本一摇天下震動奈何以天下為戯乎時大臣固争者多上知羣臣心皆不附趙王乃不易太子史記留侯世家上破布歸置酒太子侍東園公等四人從年皆八十餘鬚眉皓白衣冠甚偉上怪問之四人前對各言姓名上乃大驚曰吾求公數嵗公避逃我今何自從吾兒逰四人皆曰陛下輕士善罵臣等義不辱竊聞太子仁孝恭敬愛士天下莫不延頸欲為太子死故臣等來耳上曰煩公幸卒調䕶太子四人為夀已畢起去上目送之召戚夫人指示四人者曰我欲易之彼四人輔之羽翼已成難動矣戚夫人泣上曰為我楚舞我為若楚歌歌曰鴻鵠髙飛一舉千里羽翮已就横絶四海横絶四海當可奈何雖有繒繳尚安可施歌數闋戚夫人嘘唏流涕上起罷酒竟不易太子留侯招四人之功也王通鑑考異曰髙祖特以大臣皆不肯從恐身後趙不能獨立故不為耳豈四叟片言遽能柅其事乎此辯士欲誇大四叟之事故遂云然司馬遷好竒多愛而採之今不取下相國何廷尉獄已赦出之蕭何以長安地陿上林中多空地棄請令民得入田毋収藳為獸食上大怒下廷尉械繫之王衛尉侍前問曰相國何大罪陛下繫之暴也上曰吾聞李斯相秦有善歸主有惡自與今相國多受賈䜿金為請吾苑以自媚于民故繫治之王衛尉曰夫職事茍有便于民而請之真宰相事也陛下奈何乃疑相國受賈人錢乎且陛下距楚數嵗相國一摇足則關以西非陛下有也相國不以此時為利而利賈人之金乎且秦以不聞其過亡天下李斯之分過又何足法哉上不懌即赦出之何年老素恭謹徒跣入謝上曰相國休矣相國為民請苑不許我不過為桀紂主而相國為賢相吾故繫相國欲令百姓聞吾過也燕王綰謀反春二月遣樊噲以相國將兵討之立子建為燕王陳豨之反燕王綰發兵撃其東北以豨求救于匈奴亦使其臣張勝于匈奴為言豨軍已破故燕王臧荼子衍在胡謂勝曰燕所以乆存以諸侯數反兵連不決也今公欲急滅豨豨亡次亦至燕矣勝以為然還告綰綰乃隂使勝為間于匈奴而使范齊通計謀于豨欲令乆亡連兵勿決至是豨禆將降言之帝召綰綰恐謂其幸臣曰非劉氏而王獨我與長沙耳徃年族淮隂誅彭越皆吕氏計今上病吕氏専欲以事誅異姓之王者及大功臣遂稱病不行語頗泄上聞之怒又得匈奴降者言張勝為燕使胡狀于是上曰綰果反矣使樊噲將兵撃之詔陳平斬樊噲以周勃代將其軍平傳噲詣長安帝病甚人或言噲黨于吕氏即一日上晏駕欲以兵誅趙王如意之屬帝大怒用陳平謀召絳侯周勃受詔牀下曰陳平馳傳載勃代噲將至軍中即斬噲頭二人行計之曰噲帝之故人也功多又呂后弟嬃之夫有親且貴今帝特以忿怒故欲斬之恐後悔寧囚而致上上自誅之未至軍為壇以節召噲反接載檻車傳詣長安令勃代將定燕反縣夏四月帝崩上撃黥布時為流矢所中行道疾疾甚吕后迎良醫醫入見曰疾可治上嫚罵之曰吾以布衣提三尺取天下非天命乎命乃在天雖扁鵲姓秦氏名越人勃海鄭人也何益罷之后問陛下百嵗後蕭相國死誰令代之曰曹參其次曰王陵然少戅陳平可以助之平智有餘然難獨任周勃厚重少文然安劉氏者必勃也可令為太尉復問其次曰此後亦非乃所知也四月甲辰崩于長樂宮通鑑考異曰據漢書云吕后與審食其謀將盡族諸將酈商見食其曰聞帝已崩不發䘮欲誅諸將誠如此天下危矣今陳平灌嬰守滎陽樊噲周勃定燕代聞此必連兵還鄉亡可蹻足待也乃以丁未發䘮按吕氏雖暴戾亦安敢一旦盡誅大臣且其時陳平不在滎陽樊噲亦不在代此説不足據盧綰亡入匈奴綰悉將其宫人家屬騎數千居長城下候伺幸上病瘉自入謝會帝崩綰遂亡入匈奴匈奴以為東胡盧王為蠻夷所侵奪常思復歸居嵗餘死胡中五月葬長陵在西安府咸陽縣東陵之北有廢城即漢長陵縣也髙祖不修文學而性明達好謀能聴自監門戍卒見之如舊初順民心作三章之約天下既定令蕭何次律令韓信申軍法張蒼陽武人定章程叔孫通制禮儀又與功臣剖符作誓丹書鐵劵石室金匱藏之宗廟雖日不暇給規摹宏逺矣太子盈即位是為孝惠帝尊皇后曰皇太后赦樊噲復爵邑陳平既執樊噲行聞帝崩恐吕嬃讒之乃馳傳先去逢使者詔平與灌嬰屯滎陽平受詔立復馳至宫哭殊哀因固請得宿衛中太后乃以為郎中令秦官漢因之掌宫殿掖門户使傅教帝吕嬃讒乃不得行噲至太后即釋之并復爵邑令郡國立髙廟孝惠皇帝丁未元年冬十二月太后殺趙王如意太后令永巷囚戚夫人髠鉗衣赭衣令舂戚夫人舂且歌曰子為王母為虜終日舂薄暮常與死相伍相離三千里誰當使告女太后聞之大怒曰乃欲倚汝子耶召趙王如意三反相周昌曰髙帝屬臣趙王聞太后欲誅之臣不敢遣王亦病不能奉詔太后怒召昌至復召趙王王來帝自迎入宮挾與起居飲食太后欲殺之不得間帝晨出射趙王少不能早起太后使人持酖飲之周昌謝病不朝見三嵗而卒諡曰悼侯遂斷戚夫人手足去眼煇耳飲瘖藥使居厠中命曰人彘召帝視之帝驚大哭因病嵗餘不能起使人謂太后曰此非人所為臣為太后子終不能治天下遂曰飲為滛樂不聴政徙淮陽王友為趙王趙王如意既酖死諡日隠乃徙友王趙春正月城長安是年始城西北方三年春正月發長安六百里内男女十四萬六千人夏六月發諸侯王列侯徒𨽻二萬人再城之五年春正月發六百里内男女十四萬五千人復城之其秋乃成三輔黄圖長安城周迴六十五里城南為南斗形北為北斗形至今人呼之曰斗城戊申二年冬十月齊王肥來朝帝與齊王燕飲太后前置齊王上坐如家人禮太后怒廼令人酌兩巵鴆酒置前令齊王為壽齊王起帝亦起欲俱為壽太后恐自起反音幡覆也巵齊王怪之因不敢飲陽醉去問知其鴆乃憂自以為不得脱長安用内史士内史王官士名也言獻城陽郡注見前為魯元公主湯沐邑乃得歸春正月兩龍見蘭陵注見前井中隴西漢郡治狄道今甘肅蘭州府狄道州是地震夏旱秋七月相國酇侯蕭何卒諡曰文終以曹參為相國相國何病上親自臨視因問曰君即百嵗後誰可代君對曰知臣莫若主上曰曹參何如何頓首曰帝得之矣臣死不恨七月卒何買田宅必居窮僻處為家不治垣屋曰令後世賢師吾儉不賢毋為勢家所奪參聞何卒告舎人趣治行曰吾且入相居無何果召參參去屬其後相曰以齊獄市為寄慎勿擾也後相曰治無大于此者乎參曰獄市所以并容也今擾之姦人安所容乎吾是以先之始參㣲時與蕭何善及為將相有隙至何且死所推賢惟參參代何為相國舉事無所變更一遵何之約束擇郡國吏長大取年長大也訥于文辭謹厚長者即召除為丞相史史言文刻深欲務聲名輙斥去之日夜飲醇酒卿大夫以下吏及賔客見參不事事皆欲有言至者參輙飲以醇酒莫得開説見人有細過掩匿覆蓋之府中無事子窋為中大夫帝怪參不治事使窋私問之參怒笞窋曰趣入侍天下事非若所當言也至朝時帝讓參曰乃者我使諫君也參免冠謝曰陛下自察聖武孰與髙帝上曰朕安敢望先帝曰臣孰與蕭何賢上曰君似不及也參曰陛下言是也髙帝與蕭何定天下法令既明今陛下垂拱參等守職遵而勿失不亦可乎帝曰善己酉三年春與匈奴和親匈奴冒頓寖驕為書遺太后辭極䙝嫚后怒議斬其使發兵擊之樊噲曰臣願得十萬衆横行匈奴中季布曰噲可斬也前匈奴圍髙帝于平城漢兵三十二萬噲為上將軍不能解圍天下歌之曰平城之下亦誠苦七日不食不能彀弩今歌唫未絶傷痍甫起而噲欲摇動天下妄言以十萬衆横行是面謾也且匈奴即善言不足喜惡言不足怒也太后曰善令報書遜謝遺以車馬冒頓復使來謝曰未嘗聞中國禮義陛下幸而赦之因獻馬遂和親以宗室女為公主嫁之夏五月立閩越君摇勾踐之裔與無諸同姓為東海主摇與無諸俱率百越之衆從諸侯入秦髙祖已王無諸在五年事見前至是更舉越功乃立摇為東海王都東甌今浙江温州府永嘉縣西南有東甌城摇所都世號曰東甌王庚戌四年冬十月立皇后張氏后帝姊魯元公主女也太后欲為重親故以配帝春正月舉民孝弟力田者復其身三月帝冠赦天下除挾書律張晏曰秦律敢有挾書者族立原廟師古曰原重也先已有廟今更立之故云重也帝以朝長樂宫太后居長樂數蹕煩民乃築複道武庫南叔孫通諫曰此髙帝月出遊衣冠師古曰從髙帝陵寢出衣冠遊于髙廟月一為之之道也子孫奈何乗宗廟道上行哉帝懼曰急壊之通曰人主無過舉今已作百姓皆知之矣願陛下為原廟于渭北衣冠月出遊之益廣宗廟大孝之本乃詔有司立原廟帝常出逰離宫通曰古者有春嘗菓方今攖桃熟可獻宗廟上許之諸菓獻由此興宜陽注見前雨血辛亥五年冬雷桃李華棗實夏大旱江河水少谿谷水絶秋八月相國平陽侯曹參卒諡曰懿參為相三年卒百姓歌之曰蕭何為法較若畫一曹參代之守而勿失載其清静民以寧壹壬子六年冬十月以王陵為右丞相陳平為左丞相夏留侯張良卒諡曰文成良常謝病辟榖學道欲輕舉髙帝崩吕后徳良乃彊食之曰人生一世間如白駒之過隙何自苦如此良不得已彊聴食至是卒良亡岀下邳時逰北上遇一老父出一編書曰讀是則為王者師後十年興十三年見我濟北穀城山下黄石即我已後十三嵗從髙帝過濟北果得穀城山下黄石取而寳祠之及良死并葬黄石以周勃為太尉勃為人木彊敦厚髙帝以為可屬大事前已遷太尉擊陳豨既定燕歸髙帝已崩以列侯事上至是更置太尉官漢初太尉官不常設以勃為之癸丑七年春正月辛丑朔日食夏五月丁夘日食既秋八月帝崩太后使吕台周吕侯澤之子吕産台之弟將南北軍漢衛宫之兵在城内者為南軍宫衛主之京城之軍則為北軍京中尉主之帝崩太后哭而泣淚也不下留侯子辟疆年十五為侍中謂陳平曰太后獨有帝今哭而不哀君知其解未平曰何解辟疆曰帝無壯子太后畏君等今請拜吕台吕産為將居南北軍諸吕皆居中用事則太后心安君等幸脱禍矣從之太后哭乃哀吕氏權由此起九月葬安陵在咸陽縣東北去長陵十里漢置縣晉廢史臣曰孝惠内修親親外禮宰相可謂寛仁之主遭吕太后虧損至徳悲夫太子即位太后臨朝稱制師古曰制非皇后所得稱今太后行天子事故曰稱制張皇后無子太后使陽為有身取後宫美人子名之殺其母以為太子至是即位甲髙皇后吕氏元年之汪克寛書法曰既有少帝曷為寅以髙皇后之年紀少帝他人子而呂后則漢太后也故以吕氏紀元不以他人子亂正統也然則曷為不于嵗下大書女后稱制天下之大變故特變例書之冬十一月太后吕氏以王陵為帝太傅陳平為右丞相審食其為左丞相任敖沛人為御史大夫太后欲立諸吕為王王陵曰髙帝刑白馬而誓曰非劉氏而王者天下共擊之陳平周勃曰髙帝定天下王子弟今太后稱制王諸吕無所不可及退陵讓平勃曰始與髙帝啑血盟諸君不在耶今欲阿意背約何面目見髙帝地下乎平勃曰面折廷争臣不如君全社稷定劉氏之後君亦不如臣于是太后以陵為帝太傅實奪之相權陵遂謝病免杜門竟不朝請十年而薨乃以平為右丞相吕嬃以平前執樊噲數讒之曰平為丞相不治事日飲醇酒戯婦人太后不聴太后多立諸呂為王平偽聴之審食其為左丞相食其沛人楚取太上皇吕后為質食其以舎人從得幸于太后及為相不治事監宫中如郎中令公卿百官皆因決事太后又怨趙堯為定趙王如意之䇿事見前乃扺堯罪上黨守任敖常有徳于太后敖初為沛獄吏髙祖常避吏吏繫吕后遇之不謹敖怒撃傷主太后吏故徳之遂以為御史大夫太后追尊父吕公為宣王兄澤為悼武王欲以王諸吕為漸也春正月除三族罪妖言令二月置孝弟力田二千石者一人夏四月太后立張偃為魯王魯元公主卒封公主子偃為王諡公主曰魯元太后太后封山朝武為列侯立彊為淮陽王不疑為恒山今直𨽻正定府漢恒山郡避文帝諱改常山王皆他人子太后名之為孝惠子彊立五年卒以武為淮陽王太后立吕台為吕王太后使大謁者張釋風大臣大臣乃請割齊之濟南郡為吕國立台為王明年卒諡曰肅子嘉嗣秋桃李華乙夘二年春正月地震武都道山崩漢書地理志縣有蠻夷曰道武都本羌地故城在今甘肅階州成縣西夏五月太后封齊王名襄悼惠王肥之子弟章為朱虚漢縣故城在今山東青州府臨朐縣侯令章入宿衛以吕祿女妻之後太后復以章弟興居為東牟侯入宿衛六月丙戌晦日食秋七月恒山王不疑卒太后立襄成侯山為恒山王更名義丙辰三年夏江漢水溢流四千餘家是秋伊洛汝水皆溢秋星晝見丁巳四年夏四月太后封女弟嬃為臨光侯太后廢少帝幽殺之五月立恒山王義為帝以朝為恒山王少帝自知非皇后子乃出言曰后殺吾母我壯即為變太后幽之永巷中謂羣臣曰帝病乆迷惑昏亂不能治天下其議代之羣臣頓首奉詔遂廢殺之立義為帝更名宏不稱元年以太后制天下事故也戊午五年春南越王佗反時有司請禁粤關市鐵器佗曰髙皇帝立我通使物今髙后聴讒臣别異蠻夷隔絶器物此必長沙王計欲倚中國擊滅南海并王之自為功也乃自號為南越武帝發兵攻長沙敗數縣而去己未六年冬十月太后廢呂王嘉立台弟産為吕王春星晝見庚申七年春正月太后幽殺趙王友友以諸吕女為后弗愛女怒去讒之太后曰王言吕氏安得王太后百嵗後吾必擊之太后召友至邸令衛守之友餓而作歌遂幽死己丑日食晝晦太后見日食惡之曰此為我也二月太后徙梁王恢為趙王吕王産為梁王立太為濟川胡三省注濟川濟南濟北之地割齊封之時太年幼未嘗之國王産不之國為帝太傅太亦太后所名孝惠子也太后封營陵即營邱注見前侯澤為琅邪注見前王澤髙祖從祖昆弟其妻吕嬃女也齊人田生為之説大謁者張釋曰諸吕之王也大臣未服今營陵侯澤諸劉長為大將軍王之諸呂益固矣張釋言之乃割齊之琅邪郡封澤為王田生與琅邪王之國勸急行勿留出關太后果使人追之已出使遂還趙王恢自殺太后立呂禄為趙王太后以呂産女為趙王恢后王有愛姬王后酖殺之王悲憤自殺太后以為用婦人故自殺無思奉宗廟禮廢其嗣使使告代王恒欲徙王趙代王謝願守代邊乃立兄子禄為趙王是時諸吕擅權用事朱虚侯章年二十有氣力忿劉氏不得職嘗入侍燕飲太后令為酒吏章自請曰臣將種也請得以軍法行酒太后曰可酒酣章請言耕田太后曰試為我言田意章曰深耕穊種立苖欲疏非其種者鉏而去之太后黙然頃之諸呂有一人醉亡酒章追㧞劍斬之還報太后左右皆大驚業已許其軍法亡以罪也自是諸吕憚之陳平患諸吕力不能制嘗燕居深念陸賈徃直入坐而平不見賈曰何念之深也平曰生揣我何念賈曰足下極富貴無欲矣不過患諸吕少主耳平曰然奈何賈曰天下安注意相天下危注意將將相和調則士豫附天下雖有變權不分為社稷計在兩君掌握耳君何不交驩太尉因為平畫吕氏數事平用其計兩人深相結吕氏謀益衰秋九月燕王建卒太后殺其子國除辛酉八年冬十月太后立吕通台之子為燕王夏江漢水溢流萬餘家秋七月太后吕氏崩遺詔産為相國禄女為帝后審食其為帝太傅先是太后祓還過軹道注見前見物如蒼太撠謂拘持之也太后掖忽不復見卜之云趙王如意為􅑂遂病掖傷病甚乃令禄為上將軍居北軍産居南軍誡曰吕氏之王大臣弗平我崩大臣恐為變必據兵衛宫慎勿送䘮為人所制七月崩于未央宫齊王襄發兵討諸吕相國産使大將軍灌嬰擊之嬰屯滎陽與齊連和諸吕欲為亂未敢發朱虚侯以吕禄女為婦知其謀乃隂令人告其兄齊王襄令發兵西已為内應以誅諸吕立齊王為帝于是齊王悉發國中兵使内史祝午黄帝之後封祝以國為氏紿琅邪王澤午謂琅邪王曰吕氏為亂齊王發兵欲西誅之齊王自以年少不習兵事願舉國委大王請大王幸之臨淄與齊王計事琅邪王信之西馳見齊王齊王因留之而使午至琅邪國發其兵并將之西攻濟南本齊郡太后割以為吕國遺諸侯王書陳諸吕罪曰寡人率兵入誅不當為王者産祿聞使大將軍灌嬰將兵擊之嬰至滎陽謀曰諸吕欲危劉氏今我破齊還報是益吕氏資也乃留兵屯滎陽使人諭齊王與連和以待吕氏變共誅之王乃還兵西界待約九月太尉勃丞相平朱虗侯章誅産祿及諸吕齊王灌嬰兵皆罷時産祿居南北軍太尉勃不得主兵曲周侯酈商老病其子寄與祿善勃乃與丞相平謀使人劫商令寄紿説祿曰高帝與吕后共定天下劉氏所立九王吕氏所立三王皆大臣之議諸侯王亦以為宜今太后崩帝少而足下不急之國乃將兵留此為大臣諸侯所疑何不歸將印以兵屬大尉請梁王亦歸相印與大臣盟而之國齊兵必罷足下高枕而王千里此萬世之利也祿善其計諸吕老人或以為不便猶豫未決禄信寄時與出㳺過其姑吕嬃嬃大怒曰若為將而棄軍吕氏今無處矣乃悉出珠玉寳器散堂下曰毋為他人守也九月平陽侯窋曹參子行御史大夫事見産計事㑹郎中令賈壽晉賈季食邑于賈其後以為氏使從齊來具以灌嬰與齊楚合從告産且趣産急入宫窋聞其語馳告平勃勃欲入北軍不得襄平漢縣故城在奉天府遼陽州侯紀通紀成子尚主也符節乃令持節矯内讀作納太尉北軍復令寄語禄解將軍印以兵授勃勃入軍門令曰為吕氏右袒為劉氏左袒軍中皆左袒然尚有南軍平乃召朱虚侯章佐勃勃令章監軍門令窋告衛尉毋入産殿門産欲入宫為亂至殿門弗得入徘徊往來窋馳告勃勃尚恐不勝未敢公言誅之乃謂章曰急入宫衛帝予卒千餘人章入宫門見産廷中遂擊殺之帝遣謁者持節勞章章欲奪其節不得則從與載因節信馳走斬長樂衛尉吕更始還報勃勃起拜賀遂遣人分部悉捕諸吕男女無少長皆斬之使人誅燕王通時通已之國而廢魯王張偃遣章告齊王罷兵灌嬰亦罷歸諸大臣迎立代王恒後九月至即位是為文帝誅吕后所名孝惠子赦諸大臣謀曰呂后所立帝及諸王皆非真孝恵子也呂后詐取他人子而立之以彊吕氏今皆以夷㓕諸呂而所立即長用事吾属無類矣或言齊王髙帝長孫可立大臣皆曰呂氏幾危宗廟今齊王舅駟鈞虎而冠即立齊王復為吕氏矣代王髙帝予於今見在最為長仁孝寛厚太后家薄氏謹良乃召代王代郎中令張武等曰漢大臣習兵多詐願稱疾毋往以觀其變中尉宋昌史記索隠昌宋義孫曰秦失其政豪傑並起卒踐天子位者劉氏也天下絶望一矣髙帝王子弟地犬牙相制此所謂磐石之宗也天下服其彊二矣除秦苛政約法令施徳惠人人自安難動摇三矣夫以吕太后之嚴立三王擅權制然而太尉以一節入北軍一呼士皆左􅃝此乃天授非人力也今大臣雖欲為變百姓弗為使故用天下之心而欲迎立大王大王勿疑也代王下之吉兆得大横占曰大横庚庚余為天王夏以光代王曰寡人固已為王又何王乎卜人曰所謂天王者乃天子也乃遣太后弟昭往見勃勃等具言所以迎立王者昭還報王乃命昌驂乗張武等六人乗傳從詣長安至渭橋故渭橋在西安府故長安城北今廢羣臣拜謁稱臣王下車答拜太尉勃進曰願請間昌曰所言公公言之所言私王者無私勃乃跪上天子璽符王謝曰至邸而議之後九月晦至邸丞相平等皆再拜言曰子宏等皆非孝惠帝子不當奉宗廟大王髙帝長子宜為嗣願大王即天子位王西鄉讓者三南鄉讓者再遂即位東牟侯興居曰誅吕氏臣無功請得除宫乃與太僕滕公入宫載吕后所立帝出奉法駕迎帝即夕入未央宫夜拜宋昌為衛將軍鎮撫南北軍以張武為郎中令行殿中有司分部誅呂后所立帝及諸王于邸帝還坐前殿夜下詔書赦天下御批歴代通鑑輯覽卷十三

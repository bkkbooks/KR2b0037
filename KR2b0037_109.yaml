  text: 欽定四庫全書御批歴代通鑑輯覽卷一百十明世宗皇帝辛酉嘉靖四十年春二月辛夘朔日食景王載圳之國
  hash: sha256:e773ed65451774174940e78cd4c8aba80b69dcb6080cb80aa1cec41f904f63d5

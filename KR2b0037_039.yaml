front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷四十南北朝丁齊永明五年魏夘太和十一年春正月魏定樂章
  hash: sha256:428f2a5a3955480b55265bd9d53269961cf21ab3201909a13c5070d42c8d962d

body:
  text: 魏將軍尉眷攻上邽夏主退屯平凉奚斤進軍安定與邱堆娥清軍合斤以馬疲糧少深壘自固監軍侍御史安頡同之子曰赫連昌狷而無謀好勇而輕每自出挑戰衆皆識之若伏兵掩擊昌可擒也斤猶難之頡乃陰與尉眷等謀選騎待之既而夏主來攻城頡出應之夏主自出摶戰軍士争赴之夏主敗走頡追禽之昌至平城魏王以妹妻之賜爵會稽公後昌以謀叛見殺夏平原王定收其餘衆奔還平凉即位改元奚斤自以為元帥而昌為偏禆所禽深耻之乃捨輜重齎三日糧追夏主定于平凉夏軍將遁會魏軍食少無水夏主定乃分兵夾擊之魏軍大潰斤為所禽夏人復取長安夏五月秦王乞伏熾磐卒世子暮末立六月宋以王𢎞為衛將軍開府儀同三司光祿大夫范㤗説𢎞曰天下事重權要難居卿兄弟盛滿當存降挹𢎞納其言遜位不許固請故有是命冬十一月乙未朔日食己宋元嘉六年巳魏神䴥二年春正月宋以彭城王義康為司徒錄尚書事江夏王義恭都督荆湘等州軍事王𢎞乞解州錄以授義康宋主不許而以義康為司徒錄尚書事領南徐州晉南渡後僑置徐州于京口宋改曰南徐至隋始省刺史與𢎞共輔朝政𢎞既多疾且欲逺權由是義康専總内外之務以義恭為荆州刺史督八州劉湛為南蠻校尉行府州事宋主與義恭書曰天下艱難國家事重雖曰守成實亦匪易汝性褊急冝念裁抑司徒當周公之事汝不可不盡祗順之理天下安危决汝二人耳汝一月自用錢不可過三十萬府舍不湏改作訊獄虚懐博盡毋以喜怒加人名器深冝愛惜爵賜尤應量裁聲樂逰嬉不宜令過蒲酒漁獵一切勿為供用奉身皆有節度奇服異器不宜興長又宜數引見佐史相見不數則彼我不親無因得盡人情復何由知衆事也三月宋立子劭為太子夏四月魏主伐柔然魏主將擊柔然羣臣皆不欲行獨崔浩勸之尚書令劉潔等共推太史令張淵徐辯使言於魏主曰今兹己巳三陰之嵗嵗星襲月太白在西方不可舉兵北伐必敗雖克不利于上浩曰陽為徳隂為刑故日食修徳月食修刑比年以來月行掩昴其占三年天子大破旄頭之國蠕蠕髙車旄頭之衆也願陛下勿疑淵辯曰蠕蠕荒外無用之物得其地不可耕而食得其民不可臣而使有何汲汲而欲勞士馬以伐之浩曰辯言天道猶是其職至於人事尤非其所知此乃漢世常談施之于今殊不合時冝蠕蠕本國家邊臣中間叛去今誅其元惡收其良民令復舊役非無用也淵辯等不能對魏主大悦公卿或尤浩曰南冦伺隙而捨之北伐若後有疆㓂將何以待之浩曰不然南北殊俗水陸異宜以劉裕之雄傑吞併關中留其愛子輔以良將精兵數萬猶不能守况義隆今日君臣非裕時比主上英武士馬精彊彼若果來如以駒犢鬬虎狼何懼之有蠕蠕恃其絶逺謂國家力不能制夏則散衆放畜秋􅏂乃聚背寒向温南來宼抄今掩其不備必望塵駭走可一舉而擒也暫勞永逸時不可失㓂謙之謂浩曰蠕蠕果可克乎浩曰必克但恐諸将𤨏𤨏前後顧慮不能乗勝深入使不全舉耳三陰己為干之陰巳為支之陰己巳合為干支皆頭陰是為三陰之嵗旄頭昴七星主西方為旄先是宋主因魏使還告魏主曰汝趣歸我河南地不然將盡我將士之力魏主聞之大笑謂公卿曰龜鼈小竪夫何能為就使能來若不先滅蠕蠕乃是坐待㓂至腹背受攻非良策也吾行决矣遂發平城至栗水胡三省注在漠北近稽落山有竇憲故壘在焉柔然紇升盖可汗先不設備遂燒廬舍絶迹西走部落四散魏主分軍搜討俘獲甚衆至涿邪山諸將慮有伏兵㓂謙之以崔浩之言告魏主不從引兵還魏主得蠕蠕降人言可汗被病以車自載入南山民畜宭聚無人統領相去百八十里追兵不至乃徐西遁若復前行三日則盡滅之矣魏主深悔之紇升盖可汗憤悒而死子吳提立號勅連可汗五月壬辰朔日食武都王楊元卒弟難當廢其子保宗而自立冬十月魏以崔浩為撫軍大將軍魏主加浩侍中特進撫軍大將軍以賞其謀畫之功浩善占天文嘗置銅鋌于酢器中夜有所見即以鋌畫紙作字記之魏主每如浩家問以災異或倉卒不及束𢃄奉進疏食魏主必為之舉筯或立嘗而還嘗謂浩曰卿才智淵博著忠三世故朕引以自近卿宜盡忠規諫勿有所隐朕雖或時忿恚不從卿言然終久深思卿言也嘗指浩以示髙車渠帥曰此人尫纖懦弱不能彎弓持矛然其胷中所懐乃過于兵甲朕之前後有功皆此人所教也乂敕尚書曰軍國大計汝曹所不能决者皆當咨浩然後施行十一月己丑朔日食星晝見十二月秦地震日食不盡如鉤星晝見至晡河北地闇十二月秦地震野草皆自反庚宋元嘉七年午魏神䴥三年春三月宋遣將軍到彦之等伐魏宋主有恢復河南之志詔簡甲卒五萬給右將軍到彦之統將軍王仲徳竺靈秀舟師入河又使將軍叚宏將精騎直指虎牢劉徳武將兵繼進長沙王義欣道憐之子監征討諸軍事出鎮彭城為衆軍聲援先遣將軍田奇告魏主曰河南舊是宋土中為彼所侵今當修復舊境不關河北魏主大怒曰我生髮未燥已聞河南是我地必若進兵當權斂戍相避冬寒氷合自更取之秋七月魏河南諸軍退屯河北宋到彦之等取河南魏南邉諸將表稱宋將入㓂請兵三萬先其未發逆擊之以挫其鋒因請悉誅河北流民在境上者以絶其鄉導魏主使公卿議之皆以為然獨崔浩以為不可浩曰南方卑濕入夏水潦草木蒙密地氣欎蒸易生疾厲不可行師且彼既嚴備城守必固留屯久攻則糧運不繼分軍四掠則衆力單寡以今擊之未見其利彼若果能北來宜待其勞倦秋凉馬肥因敵取食徐徃擊之此萬全之策也西北守將從陛下征伐多獲美女珍寳南邉諸將聞而慕之亦欲南鈔以取資財為國生事不可從也魏主乃止諸將復表乞簡幽州以南勁兵助己戍守及就漳水造船公卿皆以為宜如所請仍署司馬楚之魯軌韓延之等為將帥使招誘南人浩又固諫曰楚之等皆彼所畏忌今聞國家悉發精兵大造舟艦謂國家欲存立司馬氏誅除劉宗必舉國震駭悉發精鋭以死争之則我南邉諸將無以禦之欲以郤敵而反速之矣且楚之等皆纎利小材止可招合輕薄無賴而不能成大功徒使國家兵連禍結而已魏主未以為然浩乃復陳天時以為南方舉兵必不利曰今兹害氣在揚州一也庚午自刑先發者傷二也日食畫晦宿值斗牛三也熒惑伏于翼軫主亂及喪四也太白未出進兵者敗五也夫興國之君先修人事次盡地利後觀天時故萬舉萬全今劉義隆新造之國人事未洽災變屢見天時不協舟行水涸地利不盡三者無一可而義隆行之必敗無疑揚州于辰在丑而是嵗在午丑為金庫午為火旺以火害金故曰害氣庚金午火嵗在庚午以火尅金故曰自刑魏主不能違衆乃詔造船三千艘簡幽州以南戍兵集河上以司馬楚之為安南大將軍封琅邪王屯潁川到彦之自淮入泗泗水滲所禁反説文曰水下漉為滲日行纔十里七月始至須昌漢縣明省故城在今山東㤗安府東平州乃泝河西上魏主以河南四鎮兵少命悉衆北渡彦之留朱修之字恭祖義陽平氏人守滑臺尹冲守虎牢杜驥字度世預之元孫守金墉諸軍進屯靈昌津水經注河水又東北通謂之延津石勒襲劉曜于此以河氷泮為神靈之助因號靈昌泮列守南岸至于潼關于是司兖既平諸軍皆喜王仲徳獨有憂色曰諸賢不諳北土情偽必墮其計彼雖仁義不足而凶狡有餘今斂戍北歸必并力完聚若河氷既合將復南來豈可不以為憂乎九月燕王馮跋卒弟𢎞字文通跋之少弟殺其太子翼而自立魏主如統萬夏主遣使求和于宋約合兵滅魏遥分河北自恒山以東屬宋以西屬夏魏主聞之治兵將伐夏羣臣咸曰劉義隆兵猶在河中捨之西行前㓂未可必克而義隆乗虚濟河則失山東矣魏主以崔浩言浩曰義隆與赫連定遥相招引以虚聲唱和莫敢先入譬如連雞不得俱飛無能為害臣始謂義隆軍來當屯止河中兩道北上東道出冀西道衝鄴如此則陛下當自討之不得徐行今則不然東西列兵徑二千里一處不過數千形分勢弱此不過欲固河自守無北渡意也赫連定殘根易摧擬之必仆克定之後東出湩關席卷而前則威震北極江淮以北無立草矣魏主從之遂如統萬謀襲平凉既而使將軍古弼魏内入諸姓吐奚氏為古氏弼初賜名筆後改曰弼等將兵趣安定夏主自安定北救平凉與戰夏兵大敗西秦自正月不雨至于九月冬十月宋鑄四銖錢宋時錢制數更是年始鑄四銖文曰四銖重如其文至元嘉二十四年復鑄大錢時民多剪鑿古錢取銅盗鑄江夏王義恭建議請以大錢一當兩以防穿鑿宋主從之明年罷之當兩大錢行之經時公私不以為便遂罷後孝建元年更鑄四銖文曰孝建形式薄小輪廓不成盗鑄者衆雜以鉛錫吏不能禁物價踊貴民患苦之于是沈慶之建議聽民鑄錢郡縣置署平其凖式去其雜偽萬税三千嚴檢盗鑄丹陽尹顔竣駁之乃止顔沈慶之字𢎞先吳興武康人竣字子遜延之之子景和二年即㤗始元年又鑄二銖錢文曰景和形式轉細民問效之而更薄小無輪廓不磨鑢謂之耒子尤輕薄者謂之荇葉聽民私鑄沈慶之復啟聽民私鑄由是錢貨亂敗千錢長不盈三寸謂之鵞眼錢劣于此者謂之綖環錢入手不沈隨手破碎斗米一萬商賈不行已罷二銖惟禁鵞眼綖環餘皆通用禁民鑄㤗始二年乃普斷新錢専用古錢盖三十七年之間錢幣凡七變云十一月宋遣將軍檀道濟伐魏到彦之棄軍走先是宋到彦之保東平魏攻宋金墉虎牢取之至是宋加檀道濟都督征討諸軍事帥衆伐魏魏叔孫建長孫道生濟河而南到彦之聞洛陽虎牢不守欲引兵還將軍坦䕶之字彦宗畧陽坦道人以書諫之以為宜使竺靈秀助朱修之修滑臺帥大衆進詣河北且曰昔人有連年攻戰失衆乏糧猶張膽争進莫肯輕退况今青州豐穰濟漕流通士馬飽逸威力無損若空棄滑臺坐喪成業豈朝廷委任之意耶彦之不從欲焚舟歩走王仲徳曰洛陽既陷虎牢不守自然之勢也虜去我猶千里滑臺尚有彊兵若遽舍舟南走士卒必散彦之乃引兵自清河注見前入濟南至厯城漢縣今為山東濟南府治焚舟棄甲歩趨彭城時青兖大擾長沙王義欣在彭城将佐皆勸委鎮還都義欣不從魏攻濟南太守蕭承之帥數百人拒之魏衆大集承之使偃兵開門衆曰賊衆我寡奈何輕之承之曰今懸守孤城事已危急若復示弱必為所屠唯當見強以待之耳魏人疑有伏兵遂引去既而到彦之王仲徳皆下獄免官宋主見坦䕶之書而善之以為北髙平太守蕭承之字嗣伯南蘭陵人齊高帝之父也北高平郡治湖陸注見前宋有南高平僑郡故此云北十二月宋以長沙王義欣為豫州刺史壽陽土荒民散盗賊公行義欣隨宜經理境内安業城府完實遂為盛藩芍陂久廢義欣修治隄防引渒水入陂溉田萬餘頃無復災旱縣渒水即沘水源出霍山逕壽州西北流入淮辛宋元嘉八年魏神䴥四年燕王馮𢎞大興元未年北凉義和元年是嵗秦夏皆亡凡四國春正月夏滅秦以秦王暮末歸殺之夏主擊秦將姚獻敗之遂遣其叔父韋伐攻南安城中大饑秦出連輔政代北複姓有出連氏輔政其名也等奔夏秦王暮末窮蹙出降夏主竟殺之夷其族西秦自乞伏國仁據苑川至暮末亡凡四主合四十七年二月魏克滑臺宋檀道濟引兵還先是魏攻宋滑臺檀道濟自清水徃救敗魏師于壽張本漢壽良後漢更名故城在秦安府東平州明初始移置今治屬兖州府道濟復自濟上至厯城二十餘日間道濟與魏師三十餘戰皆㨗叔孫建縱輕騎邀其前後焚燒穀草道濟軍乏食不能進由是安頡司馬楚之等得専力攻滑臺魏主復使將軍王慧龍太原晉陽人助之遂克滑臺朱修之堅守數月糧盡與士卒熏鼠食之魏執修之嘉其守節以為侍中道濟等食盡自厯城還士有亡走魏者具告之魏人追之衆恼懼將潰道濟夜唱籌量沙以所餘少米覆其上及早魏軍見之謂資糧有餘以降者為妄而斬之時道濟兵少魏兵甚盛道濟命軍士皆被甲巳白服乗輿引兵徐出魏人疑有伏兵不敢逼稍稍引退道濟全軍而返魏以王慧龍為滎陽太守魏司馬楚之以為諸方已平請大舉伐宋魏主以兵久勞不許徵楚之為散騎常侍以慧龍為滎陽太守慧龍在郡十年農戰並修大著聲績歸附者萬餘家宋主縱反間于魏曰慧龍自以功高位下欲引宋人入冦因執司馬楚之以叛魏主聞之賜慧龍璽書曰劉義隆畏將軍如虎欲相中害朕自知之不足介意宋主復遣刺客吕元伯刺之元伯詐為降人求屏人語慧龍疑之使探其懷得尺刀元伯叩頭請死慧龍曰各為其主耳遂釋之後慧龍卒元伯守其墓終身不去夏六月夏主定擊凉吐谷渾襲敗之執定以歸先是夏主與魏人戰敗走上邽魏取安定隴西既而魏克平凉復取長安至是夏主畏魏人之偪擁秦民十萬餘口自治城濟河欲擊北凉王䝉遜而奪其地吐谷渾王慕璝遣騎三萬乗其半濟邀擊之執夏主定以歸既而送定于魏魏主殺之赫連夏自勃勃僭號至定亡凡三主合二十六年閠月魏遣使如宋求昏魏主使周紹聘于宋且求昏宋主依違答之宋以劉湛為太子詹事給事中荆州刺史江夏王義恭年浸長欲専政事長史劉湛每裁抑之遂有隙帝心重湛使人詰讓義恭且和解之是時王華王曇首皆已卒領軍殷景仁素與湛善白徵湛為太子詹事加給事中共參政事而以張邵代湛後邵坐贓當死将軍謝述上表陳邵先朝舊勲宜䝉優貸帝手詔酧納免邵官削爵土述謂其子綜曰主上矜邵夙誠特加曲宥吾所言謬會故特見酧納耳若此迹宣布則為侵奪主恩不可之大者也使綜對前焚其表弟謝述字景先景仁之秋九月魏以崔浩為司徒長孫道生為司空道生性清儉一熊皮障泥數十年不易魏主使歌工厯頌羣臣曰智如崔浩㢘若道生魏徵世胄遺逸詔曰今二㓂摧殄將偃武修文理廢職舉逸民范陽盧元字子真涿人博陵崔綽安平人趙郡李靈字武符平棘人河間邢穎字宗敬鄚人渤海高允字伯恭蓚人廣平㳺雅字伯度任人太原張偉字仲業中都人等皆賢儁之胄冠冕州邦如此比者盡勅州郡以禮發遣遂徵元等數百人差次叙用崔綽以母老固辭元等皆拜中書博士元舅崔浩每與元言輙歎曰對子真使我懐古之情愈深浩欲大整流品明辨族姓元止之曰夫創制立事各有其時樂衆為此者詎有幾人宜加三思浩不從由是得罪于冬十月魏使崔浩定律令魏主命崔浩更定律令除五嵗四嵗刑増一年刑巫蠱者負羖羊抱犬沉諸淵初令官階九品者得以官爵除刑婦人當刑而孕産後百日乃决闕左懸登聞鼓以達寃人胡三省曰令負寃者得詣闕撾鼔登時上聞也壬宋元嘉九年申魏延和元年夏五月宋太保王𢎞卒𢎞明敏有思致而輕率褊狹好折辱人雖貴顯不營財利及卒家無餘業宋主特賜錢百萬米千斛秋七月宋益州人趙廣作亂宋益州刺史劉道濟粹之弟信任長史費謙别駕張熈聚斂興利商賈嗟怨流民許穆之變姓名稱司馬飛龍自云晉室近親招合蜀人千餘攻殺已興晉縣隋改長江元省故城在潼川府蓬溪縣令逐陰平宋有南陰平北陰平此南陰平也故城在四川綿州徳陽縣太守道濟遣軍斬之先是道濟欲以帛氐奴孫愐曰帛姓也梁顯為督䕶費謙固執不與氐奴等與郷人趙廣搆扇縣人詐言司馬殿下猶在陽泉蜀漢縣隋省故城在徳陽縣山中聚衆向廣漢攻䧟涪城于是涪陵晉郡今四川重慶府涪州是江陽漢縣晉為郡今四川瀘州是遂寧漢縣晉置郡今仍為縣屬潼川府諸郡守皆棄城走廣等進攻成都道濟嬰城自守廣乃詣陽泉寺迎道人枹罕程道養言是飛龍推為蜀王建號大始備置百官以道養弟道助為長沙王廣及梁顯等皆為將軍衆十餘萬四面圍城道濟遣參軍裴方明等出擊先敗還已頻破之明年賊復攻逼成都時道濟已卒方明匿不發䘮以兵擊賊大破之賊退屯廣漢分守郫城荆州刺史臨川王義慶遣已東太守周藉之以兵來救方明與藉之合攻郫克之斬程道助進擊廣漢賊衆奔潰涪蜀皆平癸宋元嘉十年魏延和二年北酉凉王沮渠牧犍永和元年夏四月凉王䝉遜卒子牧犍立蒙遜病甚國人以世子菩提㓜弱而其兄牧犍聰頴好學立以為世子䝉遜卒牧犍即位遣使請命于魏魏主遣太常李順拜牧犍為河西王初魏主遣李順至凉凉王䝉遜箕坐隐几無動起之状順正言大言責之蒙遜乃拜受詔及使還魏主問以凉事順曰䝉遜無禮不敬不復年矣魏主曰易世之後何時當滅順曰䝉遜諸子皆庸才惟牧犍器宇粗立繼䝉遜者必此人也然比之于父皆云不及此殆天之所以資聖明也魏主曰朕方有事東方未暇西畧如卿所言不過數年之外不為晚也及是牧犍使至魏主謂順曰卿言䝉遜死牧犍立皆騐朕克凉州亦不逺矣乃進順號安西将軍寵待彌厚冬十二月宋謝靈運有罪誅靈運好為山澤之逰窮幽極險從者數百人伐木開徑百姓驚擾以為山賊㑹稽太守孟顗字彦重昶之弟表其有異志靈運詣闕自陳宋主以為臨川内史靈運逰放自若為有司所糾遣使收之靈運執使者興兵逃逸作詩曰韓亡子房奮秦帝魯連恥追討擒之廷尉論正斬刑宋主愛其才降死徙廣州久之或告靈運令人買兵噐結健児欲于三江口在廣州府番禺縣東南欎水為西江泿水為東江湞水為北江西北二江合流而東與東江會謂之三江口篡取之不果詔于廣州棄市靈運恃才放逸自以名輩才能應参時政同時名位素出其下者並見任遇意甚不平又多所陵忽故及于禍甲宋元嘉十一年戌魏延和三年春宋梁秦刺史蕭思話南蘭陵人討楊難當破之先是宋主聞梁秦刺史甄法䕶中山無極人刑政不治乃自徒中起蕭思話思話先為青州刺史魏克滑臺思話棄城走坐繫尚方徒作今復徵起使代之未至楊難當舉兵襲法䕶法䕶棄城奔洋川即洋水在漢中府西鄉縣東水經注洋水導源巴山東北流逕平陽城為洋川難當遂有漢中之地至是思話至襄陽遣司馬蕭承之為前驅難當焚掠漢中引衆西還留軍分守思話與承之共擊屢破之既而難當遣其子和將兵擊蕭承之為承之所敗承之與和相拒四十餘日短兵接弓矢無所復施氏悉衣犀甲戈矛不能入承之斷矟長數尺大斧椎之一矟輙貫數人氐不能當敗走承之追擊斬獲甚衆遂悉收漢中地置戍葭萌水即白水江在四川保寜府昭化縣西北水經注白水出西傾山東南流出葭萌縣亦謂之葭萌水思話徙鎮南鄭難當奉表謝恩詔赦之甄法䕶坐賜死燕王𢎞稱藩于魏先是魏主攻燕圍和龍燕尚書郭淵勸燕主送欵獻女于魏乞為附庸燕主曰負釁在前結忿已深降附取死不如守志更圖也已而魏主拔燕旁郡引兵西還至是燕王遣使奉表謝罪于魏以季女充掖庭魏主許之徵其太子王仁入朝燕主使魏使者于什門還平城什門使燕被留事具前什門在燕二十一年不屈節魏主下詔褒稱以比蘓武拜治書御史䇿告宗廟頒示天下乙宋元嘉十二年亥魏太延元年春正月己未朔日食燕王𢎞稱藩于宋初魏主之圍和龍也宿衛之士多在戰陣行宫人少雲中鎮將朱修之本宋將被執事具前謀與南人襲殺魏主因入和龍浮海南歸以告將軍毛修之亦宋將降魏事具前不從乃止既而事泄朱修之逃奔燕由是魏人數伐燕燕主遣修之南歸求救修之汎海還建康拜黄門侍郎及是燕日危蹙燕王不遣太子質魏魏頻伐之遣使至宋奉貢稱藩宋封為燕王江南謂之黄龍國凉有神投書于敦煌東門有父老投書于敦煌東門求之不獲書曰凉王三十年若七年凉王牧犍以問奉常張慎對曰昔虢之將亡神降于莘願陛下崇徳修政以享三十年之祚若盤于逰畋荒于酒色臣恐七年將有大變牧犍不悦夏四月宋以殷景仁為中書令中䕶軍宋領軍將軍劉湛與僕射殷景仁素善湛之入也景仁實引之見上八年湛以景仁位遇素不踰已而一旦居前意甚憤憤又以景仁専管内任謂其間已猜隙漸生時司徒義康専秉朝權湛嘗為其上佐遂委心自結欲因其力以傾景仁至是宋主加景仁中書令中䕶軍湛愈憤怒使義康毁景仁而宋主遇之益隆景仁對親舊歎曰引之令入入便噬人乃稱疾解職不許湛又陰謀遣人殺景仁宋主徵聞之遷䕶軍府于西掖門外使近宫禁故湛謀不行義康僚屬及諸附湛者潛相約勒無敢厯殷氏之門唯後將軍司馬庾炳之逰二人之間皆得其歡心而宻輸忠于朝廷景仁卧家不朝謁宋主常使炳之啣命往來湛不疑也庾炳之字仲文鄢陵人六月宋大水設酒禁揚州諸郡大水運徐豫南兖穀賑之揚州西曹主簿沈亮字道明田子之子以為酒糜穀而不能療饑請權禁止從之秋七月宋禁擅鑄像造寺者丹陽尹蕭摩之南蘭陵人思話再從父上言佛入中國已厯四代形像塔寺所在千數材竹銅綵糜損無極請自今欲鑄銅像及造塔寺者皆當列言須報乃得為之詔從之丙宋元嘉十三年魏太延二子年是嵗燕亡凡三國春三月宋殺其司空檀道濟道濟立功前朝威名甚重左右腹心並經百戰諸子又有才氣朝廷畏疑之宋主久疾不愈劉湛説司徒義康以為宫車一日晏駕道濟不可復制會宋主疾篤義康請召道濟入朝其妻向氏謂道濟曰高世之勲自古所忌今無事相召禍其至矣既至留累月宋主稍間將還未發會宋主疾動義康稱詔召道濟入祖道因執之三月下詔稱道濟因朕寢疾規肆禍心收付廷尉并其子植等十一人誅之又殺其參軍薛彤高進之二人皆道濟腹心有勇力時人比之關張道濟見收憤怒目光如炬脱幘投地曰乃壞汝萬里長城魏人聞之喜曰道濟死吳子輩不足復憚夏魏伐燕燕王𢎞奔高麗即高句麗魏伐燕娥清古弼攻白狼城白狼漢縣以白狼山名故城在今熱河八溝境克之先是燕太常楊㟭勸燕王速遣太子質魏燕主不從宻遣尚書楊伊請迎于高麗及是高麗遣將以數萬衆至和龍燕王焚宫室帥龍城見户東徙古弼部將高茍子帥騎欲追之弼醉拔刀止之故燕主得逃去魏主聞之怒檻車徴弼及娥清至平城皆黜為門卒高麗處燕主于北豐高麗地名居二年燕主復遣使求迎于宋高麗人殺之北燕自馮跋篡立及亡凡二主合二十八年秋七月魏伐楊難當于上邽降之先是赫連定西遷難當遂據上邽自稱大秦王改元建義立王后太子置百官皆如天子之制然猶貢奉宋魏不絶至是魏伐之先遣使齎詔諭㫖難當懼遂奉詔降冬宋鑄渾儀初高祖克長安得古銅渾儀儀狀雖舉不綴七曜是嵗詔太史令錢樂之更鑄渾儀徑六尺八分以水轉之昏明中星與天相應丁宋元嘉十四年丑魏太延三年夏五月魏詔吏民告守令罪魏主以民官多貪詔吏民得舉告守令不如法者于是姦猾専求宰牧之失廹脅在位横于閭里而長吏咸降心待之貪縱如故西域朝貢于魏先是西域龜兹疏勒烏孫皆漢時舊國注俱見前悦般在烏孫西北去代一萬九百三十里其先本北匈奴部落為竇憲所破北單于西走康居其不能去者居龜兹之北為悦般渇槃陀在葱嶺東其國有高山夏多積雪鄯善焉耆車師注亦俱見前粟特一名温那沙在葱嶺之西康居西北占奄蔡國也去代一萬六千里九國入貢于魏魏主以西域去中國絶逺報使徃來徒為勞費終無所益欲不遣使有司固請乃遣行人王恩生等二十輩使西域皆為蠕蠕所執恩生見勅逹可汗持魏節不屈魏主切責勅連勅連乃遣恩生等還竟不能逹西域至是魏主復遣侍郎董琬等招撫九國琬等至烏孫其王甚喜曰破落那即漢大宛國去代萬四千四百五十里者舌在破落那西北故康居國也去代一萬五千四百五十里二國皆欲稱臣奉貢但無路自致耳今使君宜過撫之乃遣導譯送琬等旁國聞之争遣使者隨琬等入貢凡十六國自是每嵗朝貢不絶凉遣子入侍于魏遣使如宋魏主遣李順徵凉世子封壇入侍凉王牧犍奉詔亦遣使詣建康獻雜書并求書數十種宋主皆與之李順自河西還魏主問之曰卿往年言取凉州之䇿朕以東方有事未遑也今和龍已平吾欲西征可乎順對曰臣疇昔所言以今觀之私謂不謬然國家戎車屢動士馬疲勞西征之議請俟他年魏主乃止戊宋元嘉十五年寅魏太延四年春二月宋以吐谷渾慕利延為隴西王冬十一月丁卯朔日食宋立四學以雷次宗字仲倫豫章南昌人為給事中不受豫章雷次宗好學隠居廬山在江西九江府徳化縣按南康府星子縣界山周二百五十里朱子以為即禹貢之敷淺原也嘗徵為散騎侍郎不就是嵗以處士徵至建康為開館于鷄籠山今曰鷄鳴山在江寧府上元縣西北使聚徒教授宋主雅好藝文使丹陽尹何尚之字彦徳廬江灊人立元學太子率更令東宫官主宫殿門户職如衛尉何承天立史學司徒參軍謝元靈運從祖弟立文學并次宗儒學為四學宋主數幸次宗學館令次宗以巾褠巾首服也褠單衣也江南人士交際以為公服侍講資給甚厚又除給事中不就久之還廬山宋主性仁厚恭儉勤于為政守法而不峻容物而不弛百官皆久于其職守宰以六朞為斷吏不茍免民有所繫三十年間四境之内晏安無事户口蕃息出租供徭止于嵗賦晨出暮歸自事而已閭閻之内講誦相聞士敦操尚鄉恥輕薄江左風俗于斯為美後之言政治者皆稱元嘉焉己宋元嘉十六年魏太延五夘年是嵗凉亡凡二國春二月宋以衡陽王義季武帝少子都督荆湘諸州軍事初高祖遺詔令諸子次第居荆州臨川王義慶在荆州八年欲為之選代故以義季為荆州刺史義季嘗春月出畋有老父被苫而耕左右斥之老父曰盤于逰畋古人所戒今陽和布氣一日不耕民失其時奈何以從禽之樂而驅斥老農也義季止馬曰賢者也命賜之食辭曰大王不奪農時則境内之民皆飽大王之食老夫何敢獨受大王之賜乎義季問其名不告而退夏六月魏主伐凉秋九月凉王牧犍降北凉王牧犍通于其嫂李氏李氏毒魏公主魏主以其妹武威公主妻牧犍魏主遣醫救之得愈魏主徵李氏牧犍不遣使居酒泉魏主欲討之以問崔浩浩曰牧犍逆心已露不可不誅魏主乃大集公卿議于西堂𢎞農王奚斤等皆以為牧犍罪惡未彰宜加恕宥且聞其土地鹵瘠難得水草若攻之不㧞野無所掠此危道也初崔浩惡李順順使凉州凡十二返凉武宣王䝉遜數與順逰宴時為驕慢之語恐順泄之隨以金帛納順懐順亦為之隠浩知之宻以白魏主魏主尚未之信及是順與古弼皆曰姑臧地皆枯石絶無水草城南天梯山上積雪丈餘春夏消釋下流成川居民仰之灌溉彼聞軍至决此渠口水必乏絶人馬饑渴難以久留斤等議是浩曰史稱凉州之畜為天下饒若無水草畜何以蕃又漢人終不于無水草之地築城郭達郡縣也且雪之消釋何得通渠溉灌此言大為欺誣矣李順曰耳聞不如目見浩曰汝受人金錢欲為之逰説謂我日不見便可欺耶魏主𨼆聽聞之乃出見斤等辭色嚴厲羣臣不敢復言唯唯而已將軍伊馛代人言曰凉州若果無水草彼何以為國宜從浩言衆議皆不可用魏主從之六月發平城使穆夀代人崇之孫輔太子晃監國又使大將軍嵇敬魏北方諸姓有紇奚氏後改嵇氏將二萬人屯漠南以備蠕蠕命公卿為書讓牧犍七月至上郡屬國城漢上郡屬國都尉治龜兹故城在今陜西榆林府榆林縣部分諸軍以源賀秃髮傉檀之子為鄉導八月牧犍求救于蠕蠕魏主使姑臧遣使喻牧犍出降牧犍嬰城固守魏主分兵圍之魏主見姑臧水草豐饒由是恨李順謂崔浩曰卿言騐矣始太子晃亦以西戎為疑至是詔報之曰姑臧東西門外涌泉合于城北其大如河自餘溝渠流入漢中其間乃無燥地特有此敕以釋此疑九月姑臧城潰牧犍帥其文武五千人靣縛請降魏主釋而禮之魏主置酒姑臧謂羣臣曰崔公智畧有餘吾不復以為奇伊馛弓馬之士而所見乃與崔公同此深可奇也馛善射能曵牛却行走及奔馬而性忠謹故魏主特愛之至北凉自叚業改元沮渠䝉遜篡立牧犍亡凡三主合四十三年冬十二月宋太子劭冠劭美鬚眉好讀書便弓馬喜延賔客意之所欲宋主必從之東宫置兵與羽林等魏主還平城魏主猶以妹婿待沮渠牧犍拜征西大將軍河西王如故後有告牧犍與故臣民交通謀反者詔賜死凉州自張氏以來號為多士牧犍尤喜文學其臣闞駰闞氏齊闞止之後以名為字駰字元陰敦煌人張湛字子然敦煌淵泉人劉昞字延明索敞字巨振陰興字世隆俱敦煌人宗欽字景若趙柔字元明俱金城人程駿字驎駒廣平曲安人居凉州程𢎞駿從弟魏主皆禮而用之初安定胡叟字倫許臨涇人往從牧犍牧犍不甚重之叟謂程𢎞曰貴主居僻陋之國而滛名僭禮以小事大而心不純一外慕仁義而實無道徳其亡可翹足而待也遂適魏至是魏主以為先識拜虎威將軍河内常爽字仕明温人世寓凉州不受禮命魏主以為宣威將軍以索敞為中書博士時魏方尚武功貴逰子弟不以講學為意敞為博士十餘年勤于誘導肅而有禮多所成就常爽亦置館于温水之右教授七百餘人立賞罰之科弟子事之如嚴君由是魏之儒風始振温水亦曰温湯在大同府大同縣西南水經注桑乾城西有温湯即此魏命崔浩高允修國史魏主命崔浩監秘書事綜理史職以侍郎高允張偉參典著作浩集諸厯家考校漢元以來日月薄蝕五星行度并譏前史之失别為魏厯以示高允允曰漢月元年十五星聚東井案星傳太白辰星常附日而行十月日在尾箕昏沒于申南而東井方出于寅北二星何得背日而行此乃歴術之淺事而史官欲神其事不復推之于理今議漢史而不覺此謬恐後人之譏今猶今之譏古也浩曰天文欲為變者何所不可耶允曰此不可以口舌爭宜更審之後嵗餘浩謂允曰先所論者果如君言吾言乃以前三月聚東井非十月也衆乃歎服考秦以十月為正漢初因之天文志所云十月五星聚東井乃今之七月也宋劉邠之論甚詳已具前五星聚條下允雖明厯初不推歩論説惟東宫少傅㳺雅知之數以災異問允允曰陰陽災異知之甚難既知之矣復懼漏泄不如不知也天下妙理至多何遽問此魏除田禁魏主問髙允何政為先允曰臣少賤唯知農事若國家廣田積穀公私有備則饑饉不足憂也時魏多禁封良田故允及之魏主乃命悉除其禁以賦百姓庚宋元嘉十七年魏辰太平真君元年夏四月戊午朔日食六月魏大赦改元魏主改元太平真君取㓂謙之神書云輔佐北方太平真君故也冬十月宋領軍劉湛有罪誅以彭城王義康為江州刺史江夏王義恭為司徒録尚書事始興王濬字休明文帝第二子為揚州刺史宋司徒義康專總朝權宋主羸疾積年屢至危殆義康盡心營奉藥石非親嘗不進或連夕不寐性好吏職糾剔精盡凡所陳奏入無不可方伯以下並令選用生殺大事或以録命斷之勢傾逺近朝野輻輳義康傾身引接未嘗稍懈士之幹練者多被恩遇然素無學術不識大體朝士有才用者皆引入己府府僚無施及忤㫖者乃斥為臺官自謂兄弟至親不復存君臣形迹置私僮六千人四方獻饋皆以上品薦義康而以次者供御領軍劉湛與僕射殷景仁有隙欲倚義康以傾之義康權勢已盛湛愈推崇之無復人臣之禮宋主浸不能平殷景仁宻言于宋主曰相王權重非社稷計宜少裁抑宋主然之義康長史劉斌湛之宗王履謐之孫劉敬文沛郡人孔𦙍秀魯郡人皆以傾䧟有寵于義康宋主嘗疾篤使義康具顧命詔義康還省流涕以告湛及景仁湛曰天下艱難詎是㓜主所御義康景仁皆不答而𦙍秀等輙就尚書議曺索晉立康帝舊事義康不知也及宋主疾瘳微聞之而斌等宻謀欲使大業終歸義康遂邀結朋黨伺察禁省有不與己同者必百方搆䧟之自是主相之勢分矣既而湛遭母憂去職自知罪釁已彰無復全地謂所親曰常日正賴口舌争之故得推遷今既窮毒無復此望禍至其能久乎至是宋主收湛下詔誅之及斌等八人義康上表遜位詔以為江州刺史出鎮豫章初殷景仁卧疾五年雖不見上而宻函去來日以十數影迹周宻莫有窺其際者收湛之曰景仁使拂拭衣冠左右莫曉其意至夜聞召猶稱脚疾以小牀輿就坐誅討處分一以委之初檀道濟薦沈慶之忠謹曉兵宋主使領隊劉湛謂曰卿在省嵗久比當相論慶之正色曰下官在省十年自應得轉不復以此仰累收湛之夕宋主召之慶之戎服縳袴而入宋主曰卿何意乃爾急裝慶之曰夜半喚隊主不容緩服乃遣收劉斌殺之將軍徐湛之與義康尤親厚被收當死其母會稽公主於兄弟為嫡長髙祖微時自以新洲伐荻有衲布衫襖臧皇后所作也既貴以付公主曰後世有驕奢不節者可以此衣示之至是公主入見號哭以錦囊盛衲布擲地曰汝家本貧賤此是我母為汝父所作今日得一飽餐遽欲殺我皃耶宋主乃赦之王履叔父球為吏部尚書簡淡有美名以履性近利屢戒之至是履徒跣告球球曰常日語汝云何履不能對球徐曰阿父在汝亦何憂宋主以球故免履死廢於家初吳興太守謝述累佐義康數有規益早卒至是義康歎曰昔謝述惟勸吾退劉班唯勸吾進今班存而述死其敗也宜哉宋主亦曰謝述若存義康必不至此久之宋主就會稽公主宴集甚懽主起再拜悲不自勝曰車子嵗暮必不為陛下所容令特請其命因慟哭宋主亦流涕指蔣山曰必無所慮若違今誓便是負初寧陵即封所飲酒賜義康故終主之身義康得無恙班徐湛之字孝源東海郯人王珠字舊玉謐之子劉劉湛小字班虎故稱為班車子義康小字蔣山即鍾山在上元縣東北初寧陵在其南義恭懲彭城之敗雖為總錄奉行文書而已宋主乃安之景仁為揚州刺史尋卒以王球為僕射始興王濬為揚州刺史范曄字蔚宗順陽人㤗之子沈演之字臺真武康人為左右衛將軍對掌禁旅庾炳之為吏部郎俱參機宻蔚宗有雋才而薄情淺行數犯名教為士流所鄙性躁競自謂才用不盡常怏怏不得志吏部尚書何尚之言於宋主曰蔚宗志趣異常請出為廣州刺史若在内釁成不得不加鈇鉞鈇鉞亟行非國家之美也宋主曰始誅劉湛復遷蔚宗人將渭卿等不能容才朕信受讒言但共知其如此無能為害也辛宋元嘉十八年魏巳太平真君二年春正月宋以彭城王義康都督江交廣州軍事義康至豫章辭刺史以為都督三州軍事前龍驤參軍扶令育上表曰彭城王先朝之愛子陛下之次弟若有迷謬之愆正可導以義方奈何一旦黜削逺送南陲萬一義康年命窮盡奄忽於南臣雖微賤竊為陛下羞之陛下徒知惡枝之宜伐豈知伐枝之傷樹乎願亟召還兄弟協和君臣輯睦則四海之望塞多言之路絶矣表奏即收付建康獄賜死扶姓令育巴東人壬宋元嘉十九年魏午太平真君三年春正月魏主詣道壇受符籙魏㓂謙之言於魏主曰陛下以真君馭世建静輪天宫之法開古以來未之有也應登受符書以彰聖徳魏主從之自是每世即位皆受符籙謙之又奏作静輪宫必令其高不聞鷄犬欲以上接天神崔浩亦勸為之功費萬計經年不成太子晃諌曰天人道殊髙卑定分不可相接理在必然今耗府庫疲百姓為無益之事將安用之不聽夏五月宋討楊難當平之先是楊難當㓂宋漢川宋遣龍驤將軍裴方明等討之至是方明等至漢中與劉真道武帝從母弟懷敬之子分兵攻取旁邑難當遣兵拒戰方明等大破之難當奔上邽獲其兄子保熾又獲其子虎方明以虎送建康斬之仇池平以胡崇之為北秦州刺史鎮其地立保熾為楊元後守仇池魏人迎難當詣平城真道方明坐匿金寶善馬下獄死既而魏擊宋仇池取之胡崇之被擒楊保熾走秋七月甲戍晦日食九月宋以沮渠無諱為河西王凉之亡也牧犍之弟無諱出奔敦煌㓂魏酒泉拔之已而魏克酒泉無諱遂棄敦煌西據鄯善今甘肅西安府之西有地名噶斯即古鄯善國時州人闞爽凉故太守據髙昌今土魯番地漢為車師前部髙昌壁凉張駿於此置髙昌郡為唐契亦凉故將所攻爽遣使詐降於無諱欲與之共攻契比無諱至髙昌契已死爽閉門拒之無諱因襲據髙昌遣使奉表於宋宋以無諱為河西王爽奔蠕蠕無諱尋亦卒冬十二月宋修孔子廟詔魯郡修孔子廟及學舍蠲墓側五户課役以供灑掃魏以李寳字懷素西凉武昭王暠之孫為敦煌公寳自其伯父歆為沮渠䝉遜所滅北奔伊吾遺民歸附者稍至二千餘衆及沮渠無諱棄敦煌而西寳帥衆自伊吾入據之繕修城府規復先業遣使奉表於魏魏以為鎮西大將軍敦煌公已而寳朝於魏魏遂留之魏尚書李順有罪誅魏主使李順差次羣臣賜以爵位順受賄品第不平魏主怒且以順保庇沮渠氏面欺誤國賜死癸宋元嘉二十年魏未太平真君四年夏五月魏殺其武都王楊保宗秋七月宋立楊文徳為武都王魏河間公齊烈帝之元孫與武都王楊保宗對鎮雒谷即駱谷注見前保宗弟文徳説保宗閉險自固以叛魏或以告齊齊誘執保宗送平城殺之其屬符達等遂舉兵立文徳為王據白崖山名在漢中府洋縣北分兵取諸戍進圍仇池自號仇池公魏将軍古弼擊之文徳退走皮豹子漁陽人督闗中軍至下辯魏以豹子為仇池鎮将文徳遣使求援於宋宋立文徳為征西大将軍武都王九月魏主襲柔然走之魏主如漠南以輕騎襲柔然遇敕連可汗太子晃曰賊不意大軍猝至宜掩其不備速進擊之尚書劉潔曰賊營塵盛其衆必多不如須諸軍大集擊之晃曰塵盛者軍士驚擾也何得營上而有此塵乎魏主疑之不急擊柔然遁去追之不及獲其後騎曰柔然不覺魏軍至惶駭北走經六七日知無追者始乃徐行魏主深悔之自是軍國大事皆與晃謀之司馬楚之别将督軍糧柔然欲擊之俄而軍中有告失驢耳者楚之曰此必賊遣姦人入營覘伺割以為信耳賊至不乆宜急為備乃伐栁為城以水灌之俄而賊至氷堅滑不可攻乃散走甲宋元嘉二十五年申魏太平真君五年春正月宋主耕耤田大赦魏太子晃摠百揆魏以太子晃總百揆以中書監穆壽司徒崔浩侍中張黎鴈門平原人古弼輔之弼忠謹質直嘗以上谷苑囿太廣乞減大半以賜貧民魏主方與給事中劉樹圍棋志不在弼弼侍坐良乆不獲陳聞怱起捽樹頭毆之曰朝廷不治實爾之罪魏主失容曰不聽奏事朕之過也樹何罪置之弼乃具狀以聞魏主可之弼曰為臣無禮至此其罪大矣出詣公車免冠徒跣請罪魏主詔令冠履就職且諭之曰茍有可以利社稷便百姓者竭力為之勿顧慮也魏禁私養沙門巫覡魏主詔王公以下至庶人有私養沙門巫覡者皆遣詣官過二月十五日不出者沙門巫覡死主人門誅魏令公卿子弟皆入太學魏詔王公卿大夫之子皆詣太學其百工商賈之子各習父兄之業母得私立學校違者師死主人門誅二月魏尚書令劉潔有罪誅樂平王丕明元帝之子以憂卒初魏尚書令劉潔久典機要恃寵自専魏主心惡之及將擊柔然潔諌止之崔浩固勸魏主行魏主從之潔耻其言不用欲敗魏師魏主與諸將期㑹鹿渾谷胡三省註即鹿渾海之谷也地直平城西北潔矯詔易其期至鹿渾谷欲擊柔然潔又止之使待諸將留六日而諸將不至柔然遂逺遁軍還糧盡士卒多死潔隂使人驚魏軍勸魏主委軍輕還不從又以軍出無功請治崔浩之罪魏主曰諸將失期遇賊不撃浩何罪也浩以潔矯詔事白魏主收潔囚之魏主之北行也潔私謂所親曰若車駕不返吾當立樂平王又聞尚書張嵩家有圖䜟問曰劉氏應王吾有姓名否魏主聞之命有司窮治潔嵩皆夷三族樂平王丕以憂卒秋八月魏主畋于河西魏主詔以肥馬給獵騎尚書令古弼留守悉以弱馬給之魏主大怒曰筆頭奴敢裁量朕弼頭鋭故魏主常以筆目之朕還臺先斬此奴弼官屬惶怖并恐坐誅弼曰吾為人臣不使人主盤於㳺田其罪小不備不虞乏軍國之用其罪大今蠕蠕方彊南㓂未滅吾為國逺慮雖死何傷且吾自為之非諸君之憂也魏主聞之歎曰有臣如此國之寳也賜衣一襲他日復畋於山北獲麋鹿數千頭詔尚書發牛車五百乗運之既而謂左右曰筆公必不與我汝軰不如自以馬運之尋果得弼表曰今秋榖懸黄麻菽布野猪鹿竊食鳥鴈侵費風雨所耗朝夕三倍乞賜矜緩使得收載魏主曰果如吾言筆公可謂社稷之臣矣宋以衡陽王義季為兖州刺史南譙晉僑郡梁廢故城在今江南滁州全椒縣王義宣武帝子為荆州刺史初宋主以義宣不才故不用㑹稽公主屢以為言宋主不得已用之先賜詔曰師䕶在西雖無殊績潔已節用通懐期物不恣羣下聲著西土士庶所安論者未議遷之今之曰換更為汝與師䕶年時一輩欲各試其能汝往脱有一事減之者遷代之譏必歸於吾矣師䕶義季小字義宣至鎮勤自課厲事亦修理宋主餞義季於武帳岡在上元縣故臺城内將行敕諸子且勿食至㑹所設饌日旰不至皆有饑色乃謂曰汝曹少長豐佚不見百姓艱難今使汝曹識有饑苦知以節儉御物耳乙宋元嘉二十二年酉魏太平真君六年春正月朔宋行元嘉厯初宋太子率更令何天承撰元嘉新厯表上云以月食之衝知日所在日與月對衝光相掩而知之又以中星驗之知堯時冬至日在須女十度此以堯典日短星昴推之今在斗十七度又測景較二至差三日有餘用周禮測日至之景之法知今之南至日應在斗十三四度于是更立新法冬至徙上三日五時日之所在移舊四度又月有遲疾前厯合朔月食不在朔望今皆以盈縮定其小餘厯法有大餘小餘史記厯書曰大餘者日也小餘者月也竒日為大餘竒分為小餘積而成閠以正朔望詔付外詳之太史令錢樂之等奏皆如承天所上惟月有頻三大頻二小承天法每月晦望及弦皆定大小餘或連三月皆大或連二月皆小也比舊為異謂宜仍舊詔可至是始行之初漢京房以十二率仲呂上生黄鐘不滿九寸更演為六十率樂之復演為三百六十率日當一管承天以為上下相生三分損益其一盖古人簡易之法猶古厯周天三百六十五度四分度之一而房不悟謬為六十度更設新率林鍾長六寸一釐則從仲吕還得黄鐘十二旋宫聲韻無失率與律通宋以武陵王駿文帝第三子即孝武帝為雍州刺史宋主欲經略闗河故以駿鎮襄陽三月魏詔中書以經義决疑獄冬十一月魏人侵宋魏選六州驍騎二萬分為二道掠淮泗以北徙青徐之民以實河北十二月宋太子詹事范􅁮謀反伏誅初魯國孔熈先博學文史兼通數術為員外散騎侍郎憤憤不得志父黙之為廣州刺史以贜獲罪彭城王義康救解得免及義康遷豫章熙先宻懐報效且以為天文圖䜟宋主必以非道晏駕禍由骨肉而江州應出天子以范蔚宗志意不滿欲引與同謀乃厚結蔚宗甥太子中書舎人謝綜述之子綜引熙先見蔚宗熈先家故饒於財數與蔚宗博故為拙行以物輸之由是情好欵洽熈先從容説蔚宗弑宋主立義康蔚宗愕然熈先曰丈人奕葉清通而不得連姻帝室人以犬豕相遇而丈人曽不之耻欲為之死不亦惑乎蔚宗門無内行故熈先以此之蔚宗黙然不應反意乃决綜素為義康所厚弟約又娶其女丹陽尹徐湛之及尼法静皆義康黨並與熈先徃來法静妹夫許曜領隊在臺許為内應熈以徃牋書與義康陳説圖䜟於是宻相署置又詐作義康與湛之書令除君側之惡宣示同黨宋主之燕武帳岡也蔚宗等謀以其日作亂許曜扣刀目蔚宗蔚宗不敢發湛之恐事不濟宻白其謀宋主乃命有司收付廷尉蔚宗綜熈先及其子弟黨與皆伏誅熈先被收望風吐欵詞氣不撓宋主竒其才遣人慰勉之曰以卿之才而滯于集書省理應有異志此乃我負卿也熈先于獄中上書謝恩且陳圖䜟深戒宋主以骨肉之禍蔚宗在獄為詩曰雖無嵇生琴庶同夏侯色比誅其母在市涕泣責之蔚宗色不怍妹及妓妾來别蔚宗悲涕流連綜曰舅殊不及夏侯色乃收淚而止謝約不預逆謀見綜與熈先逰常諫止之綜不從而敗綜母以子自蹈逆亂獨不出視蔚宗語綜曰姊今不來勝人多矣宋廢其彭城王義康為庶人徙安成郡注見前有司奏削義康收付廷尉治罪詔免為庻人絶屬籍徙安成郡以沈邵字道輝林子之子為安成相領兵防守義康在安成讀書見淮南王事廢書歎曰自古有此吾乃不知得罪宜矣宋始備郊廟之樂初江左二郊無樂宗廟有歌無舞是嵗南郊始設登歌丙宋元嘉二十三年戌魏太平真君七年春正月魏主討盧水胡盖吴宋發兵援之先是魏民間訛言滅魏者吴盧水胡盖吴聚衆反于杏城有衆十餘萬表降於宋魏将拓䟦紇討之敗死河東蜀蜀人遷居河東者謂之河東蜀薛永宗復聚衆以應吴至是魏主發兵討之軍至東雍州臨薛永宗壘永宗出戰大敗赴水死諸軍大破吴於杏城吴復遣使求援於宋宋以吴為北地公發雍梁兵屯境上為吴聲援三月魏誅沙門毁佛書佛像魏主與崔浩皆信重㓂謙之奉其道浩素不信佛法每言于魏主以為佛法妄誕宜悉除之及魏主至長安入佛寺沙門飲從官酒從官入其室見大有兵噐出以白魏主魏主怒曰此非沙門所用必與盖吴通謀欲為亂耳命有司按誅闔寺沙門閲其財産得釀具及􅀢室婦女浩因説魏主悉誅境内沙門焚毁經像魏主從之詔曰昔後漢荒君信惑邪偽以亂天常使政教不行禮義漸壊九服之内鞠為邱墟朕欲除偽定真滅其踪跡有司其宣告諸鎮諸有佛像胡書皆擊破焚燒沙門無長少悉阬之自今以後有事胡神及造泥人銅人者門誅太子晃素好佛法屢諫魏主魏主不聴乃緩宣詔書使逺近聞之得以各自為計由是沙門多亡匿獲免或收藏書像惟塔廟無復孑遺焉魏人侵宋初魏移書于宋以南國僑立諸州多濫北地名號又欲逰獵具區宋人答曰必若因土立州則彼立徐揚豈有其地如欲觀化南國則呼韓入漢厥儀未泯館邸饋餼每存豐厚至是魏人侵宋北邊騷動宋主以為憂諮謀羣臣御史中丞何承天上表以為凡備匃奴之䇿不過二科武夫盡征伐之謀儒生講和親之約今若追踪衛霍自非大田淮泗内實青徐使民有盈儲野有積穀然後發卒十萬一舉蕩夷賊不足為也若但欲遣軍追討報其侵暴則彼輕騎奔走不肯會戰徒興巨費不損于彼報復之役遂将無己斯䇿之最末者也惟安邊固守于計為長耳夫曹孫之覇才均智敵江淮之間不過各數百里何者斥侯之郊非耕牧之地故堅壁清野以候其來整甲繕兵以乗其弊保民全境不出此塗要而歸之其䇿有四一曰移逺就近今青兖舊民及冀州新附在首界者三萬餘衆可悉徙之大峴之南以實内地二曰多築城邑以居新徙之家假其經用春夏佃牧秋冬入保㓂至之時一城千家戰士不下二千其餘殘弱猶能登陴鼓譟足抗羣虜三萬矣三曰纂偶車牛以載糧械曰計千家之資不下五百耦牛為車五百兩参合鈞連以衛其衆設使城不可固平行趨險賊不能干有急徵發信宿可聚四曰計丁課仗凡戰士二千隨其便能各自有仗素所服習銘刻由己還保輸之于庫出行請以自新弓簳利鐡民不得者官以漸充之數年之内軍用粗備矣近郡之師逺屯清濟功費既重怨咨亦深以臣料之未若即用彼衆之易也今因民所利導而師之兵强而敵不戒國富而民不勞比于優復隊伍坐食糧廩者不可同年而校矣宋伐林邑克之初林邑王范陽邁雖奉貢於宋而㓂盗不絶宋主遣交州刺史檀和之討之南陽宗慤字元幹家世儒素慤叔父少文髙尚不仕諸子羣從皆愛好墳典慤獨好武事常言願乗長風破萬里浪至是自請從軍和之進圍區粟城在日南水經註盧容水出日南盧容縣區粟城南遣慤為前鋒擊林邑别将破之和之等乗勝入象浦在盧容縣縣本象林地故亦謂之象浦陽邁傾國來戰以具裝馬甲謂之具裝被象前後無際宗慤曰吾聞外國有獅子威服百獸乃製其形與象相拒象果遁走遂克林邑獲寳不可勝計慤一無所取還家之日衣櫛蕭然夏六月癸未朔日食秋七月宋以柦坦驥之弟為青州刺史初社預之子耽避晋亂居河西仕張氏秦克凉州子孫始還闗中宋髙祖滅後秦坦兄弟從過江時江東王謝諸族方盛北人晚渡者朝廷悉以傖荒謂其自荒外來也遇之雖有才可施皆不得踐清塗故宋主嘗與坦論金日磾曰恨今無有此輩人坦曰日磾假生今世養馬不暇豈辦見知宋主變色曰卿何量朝廷之薄也坦曰請以臣言之臣本中華髙族世業相承直以南渡不早便以傖荒賜隔况日磾胡人身為牧圉乎宋主黙然八月魏將陸俟魏内人諸姓歩六孤氏後改陸氏俟代人討盖吴斬之安定胡劉超反俟又斬之盖吴屯杏城魏遣髙凉王那平文帝之後等討破之獲其二叔諸將欲送詣平城長安鎮將陸俟以為不討盖吴其變未巳莫若私許吴叔免其妻子使自追吴吴必就禽諸將咸曰脱吴叔不返誰任其罪俟曰此罪我為諸君任之遂與刻期而遣之及期不至諸將皆咎俟俟曰彼未得其便爾必不負也後數日果以吴首來傳詣平城討其餘黨悉平之以俟為内都大官㑹安定盧水胡劉超復反魏主遣俟鎮長安俟單車至鎮超喜以俟為無能也俟既至喻以成敗誘納其女與為姻戚以招之超竟無降意俟乃帥帳下往見之超設備甚嚴俟縱酒盡醉而還頃之復選敢死士五百人出獵因詣超營約曰發機當以醉為限既飲俟陽醉上馬大呼手斬超首士卒應聲縱擊殺傷千數遂平之魏主復徴俟為外都大官丁宋元嘉二十四年亥魏太平真君八年秋八月宋衡陽王義季卒義季自義康之貶遂縱酒不事事以至成疾而終戊宋元嘉二十五年子魏太平真君九年夏四月宋以武陵王駿為徐州刺史彭城太守王元謨上言彭城要兼水陸請以皇子撫臨州事故有是命已宋元嘉二十六年丑魏太平真君十年秋七月宋以隨王誕字休文文帝第六子後改封竟陵王為雍州刺史宋主欲經略中原羣臣争獻䇿以迎合取寵王元謨尤好進言宋主謂侍臣曰觀元謨所陳令人有封狼居胥意漢霍去病封狼居胥事見前御史中丞袁淑字陽源陳郡陽夏人曰陛下今當席卷趙魏檢玉岱宗臣逢千秋之會願上封禪書宋主悦以襄陽外接闗河欲廣其資力乃罷江州軍府文武悉配雍州湘州入臺租税悉給襄陽九月魏主伐柔然大獲柔然處羅可汗敕連可汗死處羅可汗立為魏髙凉王那所敗遁走那追之九日夜悉收其輜重而還自是柔然衰弱屏跡不敢犯魏塞庚宋元嘉二十七年魏寅太平真君十一年夏二月魏主侵宋圍懸瓠城名今河南汝寧府治是水經注汝水東過懸瓠城北城形若垂瓠然夏四月魏師還魏主將伐宋宋主聞之敕淮泗諸郡若魏宼小至則各堅守大至則㧞民歸夀陽邊戍偵候不明魏主自將歩騎十萬奄至南頓潁川太守皆棄城走是時豫州刺史南平王鑠字休元文帝第四子鎮夀陽遣參軍陳憲守懸瓠城中戰士不滿千人魏主圍之魏人日夜来攻城作髙樓臨城以射之矢下如雨城中負户以汲施大鈎于衝車之端以前牽堞壊其南城陳憲内設女墻外立木柵以拒之魏人填塹肉薄登城憲督厲将士苦戰積屍與城等魏人乗之上城短兵相接憲鋭氣益奮戰士無不一當百殺傷萬計城中死者亦過半魏遣永昌王仁以所掠六郡生口北屯汝陽宋主遣間使命武陵王發兵襲之駿發百里内馬得千五百匹共分為五軍遣参軍劉泰之等将之直扺汝陽魏人惟慮救兵自壽陽來不備彭城㤗之潜進擊之殺三千餘人燒其輜重魏人奔散諸生口悉得東走魏人偵知㤗之等兵無後繼復引兵擊之士卒驚亂走死免者九百餘人馬還者四百匹魏主攻懸瓠四十二日宋主遣南平内史臧質字含文熹之子司馬劉康祖彭城吕人共救懸瓠魏遣任城公乞地真逆拒之質等斬乞地真四月魏主燒攻具引兵還宋以陳憲為龍驤將軍宋以江湛字微淵濟陽考城人為吏部尚書湛性公㢘與僕射徐湛之並為上所􅃂信時稱江徐六月魏殺其司徒崔浩夷其族浩自恃才略及為魏主所寵任専制朝權嘗薦士數十人皆起家為郡守太子晃曰先徵之人亦州郡之選在位已久勤勞未答宜先補郡縣以新徵者代為郎吏浩固争而遣之中書侍郎髙允聞之曰崔公其不免乎茍遂其非而校勝于上将何以堪之魏主使浩允等共撰國記曰務從實録著作令史閔湛郗標性巧佞浩嘗注易及論語詩書湛標上疏言馬鄭王賈不如浩之精微乞班浩所注令天下習業浩亦薦湛標有著述才湛標又勸浩刋所撰國史于石以彰直筆允聞之謂著作郎宗欽曰湛標所營分寸之間恐為崔門萬世之禍吾徒亦無噍類矣浩竞刋石立于郊壇東方百歩所書魏之先世事皆詳實列于衢路北人無不忿恚相與譛浩以為暴揚國惡魏主大怒使有司按浩及秘書郎吏等罪狀初魏主使髙允授太子經及浩被收太子召允謂曰吾自導卿至尊有問但依吾語太子入言允小心慎宻且制由崔浩請赦其死魏主問曰國史皆浩所為乎對曰太祖記前著作郎鄧淵所為先帝記及今記臣與浩共為之然浩所領事多總裁而已至于著述臣多于浩魏主怒曰允罪甚于浩何以得生太子懼曰天威嚴重􅁢小臣迷亂失次耳臣向問皆云浩所為魏主問信如東宫言乎對曰臣罪當滅族不敢虚妄殿下哀臣欲匄其生耳魏主顧謂太子曰直哉此人情所難臨死不易辭信也為臣不欺君貞也宜特除其罪遂赦之召浩臨詰浩惶惑不能對允事事申明皆有條理魏主命允為詔誅浩及僚屬僮吏凡百二十八人皆夷五族允持疑不為帝頻使催切允曰浩之所坐若更有餘釁非臣敢知若直以觸犯罪不至死魏主怒命武士執允太子為之拜請魏主意解乃曰無斯人當更有數千口死矣六月詔誅浩夷其族餘皆誅其身他日太子讓允曰吾欲為卿脱死而卿終不從激怒帝如此每念之令人心悸允曰夫史者所以記人主善惡為將來勸戒故人主有所畏忌崔浩孤負聖恩不為無罪至于書朝廷起居言國家得失此為史之大體未為多違臣與浩實同其事死生榮辱義無獨殊誠荷殿下再造之慈違心茍免非臣所願也太子動容稱歎魏主既誅浩而悔之會比部尚書宣城公李孝伯病篤或傳已卒魏主悼之曰李宣城可惜既而曰朕失言崔司徒可惜李宣城可哀自浩之誅軍國謀議皆出孝伯寵春亞于浩人李孝伯平棘順從父弟秋宋人大舉侵魏取碻磝注見前圍滑臺冬十月魏主自將救之宋將軍王元謨退走宋主欲伐魏丹陽尹徐湛之尚書江湛寧朔將軍王元謨等並勸之校尉沈慶之諌曰我歩彼騎其勢不敵檀道濟再行無功到彦之失利而返今料王元謨等未踰兩將六軍之盛不過往時恐重辱王師宋主曰道濟養㓂自資彦之中途疾動虜所恃惟馬今夏水浩汗河道流通汎舟北下碻磝必走滑臺易拔克此二城館穀弔民虎牢洛陽自然不固比及冬初城守相接虜馬過河即成禽也慶之又固陳不可宋主使湛之等難之慶之曰治國譬如治家耕當問奴織當問婢今欲伐國而與白面書生輩謀之事何由濟宋主大笑太子劭及將軍蕭思話亦諌皆不聽七月宋主遣王元謨帥沈慶之申坦魏郡魏人水軍入河受督于青冀刺史蕭斌摹之之子臧質王方回徑造許洛駿武陵王鑠南平王東西齊舉劉秀之字道寳東莞莒人震盪汧隴義恭出次彭城為衆軍節度是時軍旅大起王公妃主及朝士牧守下至富民各獻金帛雜物以助國用又以兵力不足悉發六州三五民丁倩使蹔行募中外有馬歩衆藝武力之士應科者皆加厚賞有司奏軍用不充富民家資滿五十萬僧尼滿二十萬並四分借一事息即還魏羣臣初聞有宋師言于魏主請兵救縁河穀帛魏主曰馬今未肥天時尚熱速出必無功若兵來不止且還陰山避之國人本着羊皮袴何用綿帛展至十月吾無憂矣九月魏主引兵救滑臺命太子晃屯漠南以備柔然王元謨士衆甚盛器械精嚴而元謨貪愎好殺初圍滑臺城多茅屋衆以火箭燒之元謨曰彼吾財也何遽燒之城中即撤屋穴處時河洛之民競出租穀操兵來赴者日以千數元謨不即其長帥而以配私暱家付匹布責大梨八百由是衆心失望攻城數月不下聞魏救將至衆請發車為營元謨不從十月魏主夜渡河衆號百萬鞞鼔之聲震動天地元謨懼退走魏人追擊之死者萬餘人麾下散亡略盡委棄軍資器械山積先是元謨遣坦䕶之以百舸為前鋒據石濟䕶之聞魏兵將至馳書勸元謨急攻元謨不從魏人以所得戰艦連以鐵鎻三重斷河以絶䕶之還路河水迅急䕶之中流而下每至鐡鎻以長柯斧斷之魏不能禁惟失一舸餘皆宄備而返蕭斌遣沈慶之將五千人救元謨會元謨遁還斌將斬之慶之固諌曰佛貍威震天下豈元謨所能當且殺戰將以自弱非良計也斌乃止斌將固守碻磝慶之曰今青冀虚弱而坐守窮城若虜衆東過清東非國家有也碻磝孤絶復作朱修之滑臺耳會詔使至不聽退師斌復召諸將議之慶之曰閫外之事將軍得以専之詔從逺來不知事勢節下有一范增而不能用空議何施斌及坐者並笑曰沈公乃更學問慶之厲聲曰衆人雖知古今不如下官耳學也斌乃使王元謨戍碻磝申坦垣䕶之據清口自將諸軍還厯城石濟水經河水逕東燕縣故城東濟水北來注之注垣䕶之守石濟即此東燕故城在衛輝府延津縣佛貍魏主小字清口清水入河之口十一月魏主進至魯郡以太牢祠孔子魏主自東平趨鄒山即嶧山注見前禽魯郡太守崔邪利見秦始皇石刻即嶧山碑李斯所篆使人排而仆之以守牢祠孔子宋雍州參軍栁元景字仁孝河東解人大破魏師于陜斬其將張是連提進據潼關而還宋畧陽太守龎法起等諸軍入盧氏漢縣今屬河南陜州斬縣令以趙難為令使為鄉導栁元景等進攻𢎞農拔之進向潼關詔以元景為𢎞農太守元景使薛安都河東汾陰人尹顯祖先引兵就法起等于陜元景于後督租陜城險固攻之不拔魏洛州刺史張是連提帥衆三萬度崤救陜安都等與戰于城南魏人縱突騎諸軍不能敵安都怒脱兜鍪解鎧惟著絳衲兩當前當心後當背謂之兩當馬亦去具裝瞋目横茅單騎突陳所向無前魏人夾射不能中如是數四殺傷不可勝數日暮别將魯元保引兵自函谷關至魏兵乃退明日安都等陳于城西南魯方平謂安都曰今勍敵在前堅城在後是吾取死之日卿若不進我當斬卿我若不進卿斬我也安都曰善遂合戰軍副栁元佑引兵自南門鼓譟直出旌旗甚盛魏衆驚駭安都挺身奮擊流血凝肘矛折易之更入諸軍齊奮自旦至日昃魏衆大潰斬張是連提及將卒三千餘級其餘赴河塹死者甚衆降者二千餘人明日元景至讓降者曰汝輩本中國民今為虜盡力力屈乃降何也皆曰虜驅民戰後出者滅族以騎蹙歩未戰先死此將軍所親見也緒將欲盡殺之元景曰王旗北指當使仁聲先路盡釋而遣之皆稱萬嵗而去遂克陜城進攻潼關據之關中豪傑所在蠭起及四山羗胡皆來送欵宋以王元謨敗退魏兵深入栁元景等不宜獨進皆召還元景使薛安都斷後引兵歸襄陽詔以元景為襄陽太守魏永昌王仁明元帝之孫克懸瓠遂敗宋師于尉武戍名在夀州北殺其將劉康祖進逼壽陽魏永昌王仁攻懸瓠項城拔之宋主恐魏兵至夀陽召劉康祖使還仁將八萬騎追及康祖于尉武康祖有衆八千人軍副胡盛之欲依山險間行取之康祖怒曰臨河求敵遂無所見幸其自送奈何避之乃結車營而進下令軍中曰顧望者斬首轉歩者斬足魏人四靣攻之將士皆殊死戰自旦至晡殺魏兵萬餘人流血沒踝康祖身被十創意氣彌厲魏分其衆為三且休且戰魏以騎負草燒車營康祖隨補其闕有流矢貫康祖頸墜馬死餘衆遂潰南平王鑠使參軍王羅漢以三百人戍尉武魏兵至衆欲南依卑林以自固羅漢以受命居此不去魏人攻而禽之鎻其頸使三郎將掌之羅漢夜斷三郎將首抱鎻亡奔盱眙仁進逼夀陽南平王鑠嬰城固守魏主攻彭城不克魏軍去彭城十餘里彭城兵雖多而食少江夏王義恭欲棄彭城南歸長史張暢字少微吳人曰城中乏食百姓咸有走志一旦動足則各自逃散欲至所在何由得違今軍食雖寡朝夕猶未窘罄豈有捨萬安之術而就危亡之道若此計必行下官請以頸血汚公馬蹄武陵王駿謂義恭曰阿父既為總統去留非所敢干道民駿小字忝為城主必與此城共其存歿張長史言不可異也義恭乃止魏主至彭城使尚書李孝伯至南門餉義恭貂裘餉駿槖駝及騾且曰魏主致意安北可蹔出見我駿使張暢開門出見之孝伯曰魏主不圍此城自帥衆軍直造𤓰歩山名在江寧府六合縣東南臨大江飲江湖以療渇爾暢曰去留之事自適彼懷若虜馬遂得飲江便為無復天道先是童謡云虜馬飲江水佛貍死卯年故暢云然暢音容雅麗孝伯亦辨贍且去謂暢曰長史深自愛相去歩武恨不執手暢曰君善自愛冀盪定有期君還宋朝今為相識之始十二月魏主引兵南下攻盱眙不克進次𤓰歩宋人戒嚴守江魏引兵南下所過無不殘滅城邑皆望風奔潰建康戒嚴魏兵至淮上宋主使將軍臧質將萬人救彭城至盱眙魏主已過淮質使臧澄之燾之孫毛熈祚修之之兄子等軍于東山前浦俱在盱眙縣東南而自營于城南魏燕王譚太武帝子後改封臨淮攻之皆敗没質軍亦潰質棄輜重器械單將七百人赴城盱眙太守沈璞字道真林子之子開門納質質見城中豐實大喜因與璞共守初璞到官江淮無驚璞以郡當衝要乃繕城浚隍積財榖儲石矢為守城之備及魏兵南向守宰多棄城走或勸璞還建康璞曰虜若以城小不顧夫復何懼若薄來攻此乃吾報國之秋諸君封侯之日也奈何去之諸君嘗見數十萬人聚小城之下而不敗者乎昆陽合肥前事之明騐也衆心稍定及質向城衆皆勸璞勿受璞歎曰同舟而濟胡越一心今兵多則虜退速少則退緩吾寧可専功而留虜乎因開門納質魏人之南㓂也不齎糧用以抄掠為資及過淮民多竄匿抄掠無所得人馬饑乏聞盱眙有積粟欲以為北歸之資攻城不拔即留數千人守盱眙自帥大衆南向由是盱眙得益完守備魏主至𤓰歩壞民廬舍及伐葦為筏聲言欲渡江建康震懼内外戒嚴命劉遵考等將兵分守津要陳艦列營周亘江濵自采石戍名注見前至于暨陽晉縣隋省故城在今常州府江陰縣六七百里宋主登石頭城有憂色謂吏部尚書江湛曰北伐之計同議者少今士民勞怨不得無慙貽大夫之憂予之過也又曰檀道濟若在豈使胡馬至此魏及宋平魏主以槖駝名馬餉宋主求和請婚宋主亦餉以珍羞異味魏主以其孫示使者曰吾逺來至此非欲為功名實欲繼好援宋若能以女妻此孫我以女妻武陵王自今匹馬不復南顧使還宋主召羣臣議之衆謂宜許江湛曰戎狄無親許之無益太子劭怒謂湛曰今三王在阨詎宜茍執異議聲色甚厲坐散劭又言于宋主曰北伐敗辱數州淪破獨有斬江徐可以謝天下宋主曰北伐自是吾意江徐但不異爾由是太子與江徐不平三王謂江夏武陵南平三王也魏亦竟不成婚御批厯代通鑑輯覽卷三十七

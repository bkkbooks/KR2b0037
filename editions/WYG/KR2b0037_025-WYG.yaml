body:
  text: 太常劉焉見王室多故建議以為四方兵宼由刺史威輕且用非其人宜改置牧伯選清名重臣以居其任朝廷遂從焉議選列卿尚書為牧牧各以本秩居任州任之重自此始虞嘗為幽州刺史民夷懷其恩信故用之焉入蜀㑹賊殺刺史卻儉從事賈龍等破走之選吏迎焉徙泊綿竹務行寛惠以收人心夏六月大水凡郡國七冀州刺史王芬自殺陳蕃子逸逸徙比景以赦還與襄楷會于刺史王芬坐楷曰天文不利宦者黄門常侍真族滅矣逸喜芬曰若然者芬願驅除因上書言黒山賊攻刦郡縣欲以起兵時帝欲北巡河間舊宅芬等謀以兵誅諸常侍因廢帝而立合肥侯紀𫝊無系以告曹操操拒之操曰夫廢立之事天下之至不祥也古人有權成敗計輕重而行之者伊霍是也然皆懐至忠之誠據宰輔之執因秉政之重同衆人之欲故能計從事立今諸君徒見往昔之易未覩當今之難欲望必克不亦危乎會北方夜半有赤氣東西竟天太史言北方有隂謀不宜北行帝乃止敕芬罷兵俄而徴之芬懼自殺秋八月置西園八校尉以小黄門蹇姓也左傳有秦大夫蹇叔碩為上軍校尉袁紹鮑鴻曹操趙融馮芳夏牟淳于瓊等七校尉皆統于碩帝自黄巾之起留心戎事碩壯健有武略帝親任之雖大將軍亦領屬焉冬十月青徐黄巾復起先是黄巾餘賊郭太等宼太原河東至是青徐賊復起攻掠郡縣講武平樂觀在洛陽縣東北今曰平樂保望氣者言京師當有大兵兩宫流血帝欲厭之乃發四方兵講武于平樂觀起大壇建華蓋帝躬擐甲介馬稱無上將軍行陳三匝而還帝問討虜校尉蓋勲曰吾講武如是何如對曰臣聞先王耀徳不觀兵今宼在逺而設近陳不足昭毅祗黷武耳帝曰善恨見君晚羣臣初無是言也勲時與袁紹共典禁兵因謂紹曰上甚聰明但蔽于左右耳遂與紹謀共誅嬖佞蹇碩懼出勲為京兆尹己巳六年春二月將軍皇甫嵩擊凉州賊王國大破之王國圍陳倉詔復拜嵩左將軍督前將軍董卓各率二萬人擊之卓欲速赴陳倉嵩不聴卓謂嵩曰速救則城全不救則城滅嵩曰不然百戰百勝不如不戰而屈人之兵陳倉雖小城守固講王國雖强攻陳倉不下其衆必疲疲而擊之全勝之道也國攻陳倉八十餘日不㧞疲敝解去嵩進兵擊之卓以為不可嵩復不聴卓曰兵法窮冦勿猶迫歸衆勿追困獸闕况大衆乎嵩曰不然前吾不擊避其鋭也今而擊之待其衰也所擊疲師非歸衆也國衆且走莫有鬬志以整擊亂非窮宼也遂獨進使卓為後拒連戰大破之國走而死卓大慚恨由是與嵩有隙明年詔卓以兵委嵩卓不從嵩兄子酈在軍勸嵩誅卓嵩不聴上書奏其事帝讓卓卓益憎怨嵩三月劉虞討漁陽賊張純斬之餘衆降㪚初漁陽張純故中山相與同郡張舉故太山太守反車騎將軍張温發烏桓突騎擊凉州賊純請將之温不許純恥不得將㑹烏桓多叛還遂與舉及烏桓大人邱力居連盟攻薊中殺校尉太守衆至十餘萬舉自稱天子純稱彌天將軍移書州郡告天子避位公卿奉迎事在四年鈔掠青徐幽冀四州詔遣騎都尉公孫瓚字伯珪遼西令支人討之瓚進戰純等太敗棄妻子踰塞走瓚深入無繼反為賊所圍二百餘日乃還賊亦饑困逺逅事在五年至是劉虞到部遣使至鮮卑中告以利害責使送舉純首純客王政斬純首送虞餘皆降散帝遺使者即拜虞太尉虞既平純乃罷諸屯兵但留公孫瓚將萬人屯右北平瓚志欲掃滅烏桓而虞欲以恩信括降由是有隙潤右北平後漢郡治土垠故城在令直𨽻遵化州豐縣夏四月丙子朔日食帝崩年三十四子辯即位尊皇后曰皇太后太后臨朝封弟恊為渤海王恊先封渤海後徙陳留范書靈帝紀及通鑑皆同綱目于此即書陳留今依通鑑仍書渤海而以徙封附註于目初帝數失皇子何后生辯養于道人史子助家號曰史侯王美人生恊董太后自養之號曰董侯羣臣請立太子帝以辯輕佻無威儀欲立協猶豫未决會疾篤屬恊于蹇碩碩素忌何進説帝遣進西擊韓遂帝從之進知其謀奏遣袁紹收兵徐兖既還而西以稽行期丙辰帝崩碩時在内欲先誅何進而立協使人迎進進往碩司馬潘隱迎而白之進驚馳歸營引兵入屯百郡邸天下郡國百餘皆置邸京師百郡邸者百郡縂為一邸也稱疾不入辯即位年十四太后臨朝封協渤海王年九嵗是秋七月徙封陳留王以袁隗為太傅與大將軍進參録尚書事進收宦者蹇碩誅之進忿蹇碩圖已袁紹因勸進悉誅諸宦官進以袁氏累世貴寵而紹與從弟術皆為豪傑所歸因信用之復博徴智謀之士何顒見前荀攸字公逹爽從孫鄭㤗字公業河南開封人等二十餘人與同腹心碩不自安與趙忠等謀誅進中常侍郭勝進同郡人以告進進使黄門令收碩誅之因悉領其屯兵遷孝仁皇后于河間驃騎將軍董重后兄之子自殺后暴崩董重與何進權勢相害中官挾重為助董太后每欲參預政事何太后輙禁塞之董后忿詈曰汝今輈張猶彊梁也怙汝兄邪吾敕驃騎斷何進頭如反手耳何太后告進進與三公共奏故事藩后不得留京師請遷宫本國舉兵圍驃騎府重自殺董后憂怖暴崩民間繇是不附何氏葬文陵在洛陽縣西北何進懲蹇碩之謀不陪喪又不送山陵賀善贊曰靈帝信宦豎殺忠賢時多變異且作罼圭作列肆不知社稷之將虞人有恒言曰桓靈靈又甚于桓也大水秋七月大將軍進召董卓將兵詣京師太后詔罷諸宦官八月宦官張讓等入宫殺進刼太后帝出至河上司𨽻校尉袁紹捕宦者悉誅之帝還宫以卓為司空袁紹説何進悉誅宦官紹曰前竇武欲誅内寵而反為所害者但坐言語漏泄五營兵士皆畏服中人而竇氏反㒳之自取禍滅今將軍兄弟並領勁兵將吏皆英後樂盡力命此天贊之時不可失也進乃白太后請盡罷中常侍以下以三署郎補其處太后中官統領禁省漢家故事也且先帝新棄天下我奈何楚楚悽愴苦楚之意與士人共對事乎進難違太后意且欲誅其放縱者事又不决太后母舞陽君及弟車騎將軍苗受宦官賂遺為其障蔽進又新貴素敬畏中宦雖外慕大名而内不能斷紹等又為􅀞䇿召四方猛將使引兵向京城以脅太后進然之主簿陳琳諫曰諺稱掩目捕雀夾㣲物尚不可欺以得志况國之大事其可以詐立乎今將軍總皇威握兵要但速發雷霆行權立斷則天人順之而反委釋利器更徵外助大兵聚㑹強者為椎所謂倒持干戈授人以柄功必不成祗為亂階耳進不聽曹操聞而笑曰宦者之官古今宜有但世主不當假之權寵使至于此既治其罪當誅元惡一獄吏足矣何必紛紛召外兵乎欲盡誅之事必宣露吾見其敗也陳琳字孔璋廣陵人時董卓駐兵河東進召之使將兵詣京師鄭㤗盧植皆諫進不從㤗乃棄官去謂荀攸曰何公未易輔也進又使騎都尉鮑信字允誠㤗山陽平人宣之後募兵㤗山幷召東郡太守橋瑁字元儀太尉元族子屯成臯使武猛都尉丁原字建陽前幷州刺史將數千人宼河内燒孟津火照城中皆以誅宦官為言卓聞召即時就道幷上書請收譲等以清姦穢太后猶不從卓至澠池而進更孤疑遣使宣詔止之袁紹懼進變計因脅之曰事乆變生復為竇氏矣進于是以紹為司隸校尉王允為河南尹紹促卓使馳驛上奏欲進兵平樂觀太后乃恐悉罷中常侍小黄門使還里舍皆詣進謝罪唯所措置紹勸進便于此决之謀頗泄張譲懇其子婦言于太后母舞陽君譲子婦大后之妹也讓向子婦叩頭曰老臣得罪當與新婦俱歸私門願復一入直得暫奉太后顔色然後退就溝壑死不恨矣子婦為舞陽君言之入白太后太后詔諸常侍皆復入直八月進入長樂宫請太后盡誅諸常侍張讓叚珪相謂曰大將軍稱疾不臨喪不送葬今欲入省此意何為使潛聽具聞其語乃率其黨數十人持兵伏省户下伺進出斬之即為詔以樊陵為司隸許相為河南尹尚書得詔板疑之請大將軍共出議中黄門以進頭擲與曰何進謀反已伏誅矣進部曲將吳匡及虎賁中郎將袁術引兵燒南宮青𤨏門門刻為連𤨏文而青塗也譲等將太后少帝及陳留王刼省内官屬從複道走北宫尚書盧植執戈于閣道憲下仰數段珪珪懼乃釋太后太后投閣得免袁紹矯詔召樊陵許相斬之引兵屯闕下捕得趙忠等斬之吳匡等怨何苖不與進同心又疑其與宦官通謀乃令軍中曰殺大將軍者即車騎也吏士能為報讎乎皆流涕曰願致死遂攻殺苖紹遂閉北宫門勒兵捕諸宦者無少長皆殺之凡二千餘人或有無鬚而誤死者進攻省内讓珪等困廹遂將帝與陳留王數十人歩出穀門正北門夜走小平津六璽不自随公卿無從者唯盧植及河南中部掾閔貢夜至河上貢厲聲責讓等因手劍斬數人譲等惶怖叩頭向帝辭曰臣等死陛下自愛遂投河而死貢扶帝與陳留王夜逐螢光南行至雒舍地名在北邙之北止明旦帝乘一馬陳留王與貢共乘一馬自雒舍而南公卿稍有至者董卓亦到因與公卿奉迎于北芒即北卬山在今洛陽縣北接偃師鞏孟津三縣界阪下卓與帝語語不可了乃更與陳留王語問禍亂之由王答自初至終無所遺失卓大喜以為賢遂有廢立意是日帝還宫失𫝊國璽鮑信募兵適至說紹曰董卓將有異志今不卑圖必為所制及其新至疲勞襲之可禽也紹不敢發信乃引兵還泰山卓初入步騎不過三千俄而進及弟苗部曲皆歸之卓又陰使丁原部曲呂布字奉先五原人殺原而並其衆卓兵于是大盛乃諷朝廷以乆雨䇿免司空劉𢎞而代之蔡邕亡命江海積十二年卓聞其名而避之稱疾不就卓怒詈曰我能族人邕懼而應命到署祭酒甚見敬重三日之間周歴三臺遷為侍中九月袁紹出奔冀州卓廢帝為𢎞農王奉陳留王協即位是為獻帝遂弑太后何氏卓謂紹曰天下之主宜得賢明毎念靈帝令人憤毒董侯似可今欲立之能勝史侯否為當且爾猶言且如此劉氏種不足復遺卓意欲廢漢自立紹曰漢有天下四百餘年恩澤深渥兆民戴之今上富于春秋未有不善宣于天下公欲廢嫡立庶恐衆不從公議也卓按劒叱紹曰豎子敢然爾謂董卓刀為不利乎紹勃然曰天下健者豈惟董公引佩刀横揖徑出逃犇冀州卓大㑹百寮奮首而言欲更立陳留王皆惶恐莫敢對盧植獨曰太甲不明昌邑多罪故有廢立之事今上行無失徳非前事之比也卓大怒免植官植遂逃隠于上谷卓以議示袁隗隗報如議卓遂脅太后䇿廢少帝為𢎞農王立陳留王協為帝隗解帝璽綬扶下殿北面稱臣太后鯁涕羣臣含悲莫敢言但鯁涕胡三省注言不敢出聲而鯁咽流涕也卓又議太后踧與蹙通謂促迫也迫永樂宫至憂死逆婦姑禮乃遷永安宫酖殺之后既殺公卿不敢布服及㑹𦵏素衣而已后諡靈思合𦵏文陵卓自為太尉領前將軍事加節𫝊斧鉞虎賁更封郿漢縣今屬陜西鳳翔府侯遣使弔祭陳蕃竇武及諸黨人復其爵位卓與三公上書追理蕃武及諸黨人悉復爵位遣使弔祠擢用子孫自六月雨至于是月冬十一月卓自為相國贊拜不名入朝不趨劒履上殿十二月徴處士申屠蟠不至以黄琬字子琰瓊之孫為太尉楊彪為司徒荀爽為司空初尚書周毖字仲逺武威人城門校尉伍瓊字徳瑜汝南人說董卓矯桓靈之政擢用天下名士以收衆望卓從之于是徴荀爽申屠蟠等爽等皆畏卓之暴無敢不至爽就拜平原相行至宛陵遷光祿勲視事三日進拜司空自徵至三公凡九十五日獨蟠得徴書人勸之行笑而不答竟以夀終卓又以韓馥為冀州牧劉岱孔伷為兖豫刺史張邈張咨為陳留南陽太守川韓馥字文節潁川人孔伷字公緒陳留人張咨潁人劉岱張邈見前以袁紹為渤海太守卓購求袁紹急周毖伍瓊隂為紹說卓曰紹恐懼出犇非有他志今急購之勢必為變袁氏樹恩四世門生故吏徧天下若收豪傑以聚徒衆則山東非公之有也不如赦之拜一郡守紹喜于免罪必無患矣卓乃拜紹渤海太守以紹從弟術為後將軍曹操為驍騎校尉術犇南陽操變易姓名間行東歸至陳留散家財合兵得五千人是時豪傑多欲起兵討卓袁紹在渤海韓馥遣數部從事守之不得動摇東郡太守橋瑁詐作三公移書州郡陳卓罪惡徴兵赴難馥得移問諸從事曰今當助袁氏邪助董氏邪治中從事劉子惠中山人曰興兵為國何謂袁董馥有慙色乃作書與紹聴其起兵孝獻皇帝庚午初平元年春正月闗東州郡起兵討卓推袁紹為盟主時袁紹以渤海起兵紹從弟後將軍術冀州牧韓馥豫州刺史孔伷兗州刺史劉岱陳留太守張邈廣陵太守張超邈之弟河内太守王匡字公節泰山人山陽太守袁遺字伯業紹從弟東郡太守橋瑁濟北相鮑信同時俱起衆各數萬以討卓為名紹與王匡屯河内韓馥留鄴給軍糧袁術屯魯陽後漢縣今曰魯山屬河南汝州餘軍咸屯酸棗注見前約盟先是張超以張洪為功曹洪勸超倡義討卓超然其言與洪俱西見張邈及劉岱孔伷約謀定議于是諸牧守大㑹酸棗設壇㙏將盟更相推讓洪攝衣升壇㰱血而盟辭氣慷慨聞其言者無不激揚陵臧洪字子源廣射陽人推紹為盟主紹自號車騎將軍領司𨽻校尉以曹操行奮武將軍時諸牧守多歸心袁紹鮑信獨謂操曰君略不世出殆天之所啓乎卓弑𢎞農王卓聞東方兵起懼乃酖殺王葬故中常侍趙忠成壙中諡曰懷卓奏免太尉琬司徒彪以王允為司徒殺城門校尉伍瓊尚書周毖卓議大發兵以討山東尚書鄭㤗諫阻之㤗恐卓衆多益横議曰夫政在徳不在衆也卓不悦曰如卿此言兵為無用邪㤗懼乃詭辭更對曰非謂無用以山東不足加大兵耳明公出自西州少為國將閑習軍事袁本初公卿子弟生處京師張孟卓東平長者坐不闚堂孔公緒清談髙論嘘枯吹生並無軍旅之才臨鋒决敵非公之儔也卓乃悦既而卓又以山東兵盛欲遷都以避之卓表朱儁為太僕以為已副儁曰國家西遷必孤天下之望以成山東之釁固辭而止乃大㑹公卿議莫敢言者司徒楊彪曰闗中殘破都雒已乆今無故捐宗廟棄園陵恐百姓驚動必有糜沸之亂天下動之甚易安之甚難惟明公慮焉卓作色曰公欲沮國計邪太尉黄琬曰此國之大事楊公之言得無可思卓不答以災異奏免琬彪等以王允為司徒伍瓊周毖固諫遷都卓大恕曰卓初入朝二君勸用善士故卓相從而諸君到官舉兵相圖此二君賣卓卓何用相負遂收斬之時蓋勲為京兆尹皇甫嵩以左將軍將兵屯扶風卓素怨嵩將西遷徴嵩為城門校尉欲因殺之嵩將行長史梁衍説嵩曰卓冦掠京邑廢立從意今徵將軍大則為禍小則困辱今及卓在雒陽天子來西以將軍之衆迎接至尊奉令討逆袁氏逼其東將軍廹其西此成禽也嵩不從遂就徵勲以衆弱不能獨立亦還京師卓以為越騎校尉三月卓遷都長安燒雒陽宮廟發諸帝陵車駕西遷初卓既專政見雒中貴戚第室相望金帛財産家家充積卓縱放兵士突其廬舍剽虜資物妻略婦女人皆不保朝夕至是收諸富室以罪惡誅之沒入其財物死者不可勝計悉驅徙其餘民數百萬口于長安步騎驅蹙更相蹈藉積尸盈路卓自留屯罼圭苑中悉燒宫廟官府居家二百里内無復雞犬又使吕布發諸帝陵及公卿冡墓收其珍寳三月車駕入長安居京兆府舍後乃稍箿宫室而居之董卓未至朝政大小皆委之王允允外相彌縫内謀王室自天子及朝中皆倚允允屈意承卓卓亦雅信焉卓殺太傅袁隗滅其家卓以袁紹之故殺太傅袁隗太僕袁基及其家尺口謂嬰孩也以上五十餘人長沙太守孫堅舉兵討卓將軍袁術據南陽表堅領豫州刺史初堅為長沙太守討賊區星平之封烏程漢縣今為浙江湖州府治侯及聞州郡兵起堅亦以長沙舉兵襲殺荆州刺史王叡叡先與堅討賊以堅武人遇之無禮及堅過荆州勒兵襲叡叡窮廹刮金飲之而死比至南陽衆已數萬南陽太守張咨不給軍糧堅收斬之前到魯陽與袁術合兵術遂得據南陽表堅行破虜將軍領豫州刺史堅遣長史督促軍糧設祖道城東門外官屬共㑹董卓步騎數萬猝至堅方行酒談笑整頓部曲無得妄動後騎漸盛堅徐罷坐導引入城乃曰向堅所以下即起者恐兵相蹈藉諸君不得入耳卓兵見其整不敢攻而還以劉表為荆州刺史是時江南宗賊章懐注宗黨共為賊甚盛袁術屯據魯陽餘冦縱横呉人蘇代貝羽阻兵長沙為亂道路梗塞表單馬入宜城注見前請南郡名士蒯良字子柔中廬人蒯越良弔字異度與共謀畫表曰宗各擁衆不附若袁術困之禍必至矣吾欲徴兵恐不能集其䇿安出良曰衆不附者仁不足也附而不治者義不足也茍仁義之道行百姓歸之如水之就下何患徴兵之不集乎越曰袁術驕而無謀宗賊帥多貪暴為下所患使人示之以利必以衆來使君誅其無道撫而用之一州之人襁負而至矣兵集毅附南據江陵北守襄陽荆州八郡可𫝊檄而定公路雖至無能為也表曰善八郡荆州刺史部統南陽南郡江夏章陵及江南之零陵桂陽長沙武陵凡八郡乃使越誘宗賊帥至者十五人皆斬之而取其衆遂徙治襄陽荆州刺史本治武陵郡漢夀襄陽縣漢屬南郡令為襄陽府治鎮撫郡縣江南悉平曹操與卓兵戰于滎陽不克還屯河内董卓在雒陽袁紹等諸軍皆畏其彊莫敢先進曹操曰舉義兵以誅暴亂大衆已合諸君何疑向使董卓倚王室據舊京東向以臨天下雖以無道行之猶足為患今焚燒宫室刼遷天子海内震動不知所歸此天亡之時也一戰而天下定矣遂引兵西将據成臯張邈遣將分兵随之至滎陽汴水注見前汴渠遇卓將徐榮元莬人與戰操兵敗為流矢所中所乘馬被創從弟洪以馬與操曰天下可無洪不可無君遂歩從操夜遁去榮見操所將兵少力戰盡日謂酸棗未易攻也亦引還操到酸棗諸軍十餘萬日置酒高㑹不圖進取操責譲之因為謀畫操曰諸君能聴吾計使渤海引河内之衆臨孟津酸棗諸將守成臯據敖倉塞轘轅大谷全制其險使袁將軍率南陽之衆軍丹析入武闗以震三輔皆高壘深壁勿與戰益為疑兵示天下形勢以順誅逆可立定矣今遲疑不進失天下望竊為諸君恥之内丹後漢丹水縣故城在今南陽府鄉縣析後漢縣故域亦在内鄉邈等不能用操乃募兵掦州得千餘人還屯河内頃之酸棗諸軍食盡衆散劉岱遂殺橋瑁時青州刺史焦和亦起兵始濟河黃巾已入其境青州財富兵盛和每望冦奔北賞罰淆亂州遂蕭條未幾和病卒袁紹使臧洪領青州以撫之司空荀爽卒爽見卓忍暴滋甚必危社稷其所舉辟皆取才略之士將共圖之㑹病卒爽與王允何顒等為内謀爽既卒顒以他事為卓所繫憂憤而死爽從孫攸及鄭㤗亦共謀刺卓事洩㤗東犇袁術攸被執及卓誅乃免卓壞五銖錢更鑄小錢悉取雒陽及長安銅人秦始皇所鑄鐘虡飛亷漢武帝置飛亷館音義曰飛亷神禽名銅馬東京置在金馬門外馬援亦進銅馬之屬以鑄之由是貨賤物貴穀石至數萬錢省孝和以下廟號左中郎將蔡邕議和安順桓四帝無功德不宜稱宗和帝號穆宗安帝號恭宗順帝號敬宗桓帝號威宗請皆省去從之以公孫度字开濟遼東襄平人徙元莬為遼東太守度初為冀州刺史以謠言免中郎將徐榮與度同郡薦為遼東太守度到官以法誅滅郡中名豪大姓百餘家郡中震慄乃東伐髙句驪西撃烏桓謂所親吏柳魯展禽食采柳下其後因以為氏毅陽儀等曰漢祚將絶當與諸卿圖王耳于是分遼東為遼西中遼郡安帝分遼東遼西二郡地為遼東屬國度復分之也各置太守越海收東萊諸縣置營州舜分青州為營州遼東夲青州地故度以為名刺史自立為遼東侯平州取郡治襄平為名地在今秦天府遼陽州牧立漢二祖廟承制郊祀天地藉田乘鸞輅設旄頭羽騎辛未二年春正月闗東諸將奉大司馬劉虞為帝虞不受先是虞拜大司馬已加太𫝊道路壅塞信命竟不得通虞在幽州務存寛政勸督農桑開上谷胡市之利通虞陽鹽鐵之饒民悦年登榖石三十青徐士庶避難歸虞者百萬餘口虞收視温恤皆為安立生業民忘其遷徙焉至是關東諸將議以朝廷幼冲逼于董卓關塞逺隔不知存否虞宗室賢儁欲共立為主曹操曰吾等舉兵而逺近響應者以義動故也今幼主微弱制于姦臣非有昌邑亡國之釁而一旦改易天下其孰安之諸君北面我自西向書告袁術術隂有不臣之心不利國家有長君外託公議以拒之韓馥袁紹等乃遣故樂浪太守張岐齎議上虞尊號虞厲聲叱之曰今天下崩亂主上䝉塵吾受重恩未能清雪國恥諸君各據州郡宜共戮力王室而反造逆謀以相垢汚邪馥等又請虞領尚書事承制封拜復不聴欲犇匈奴以自絶乃止二月卓自為太師位在諸侯王上以弟旻為左將軍兄子璜為中軍校尉皆典兵事宗族内外並列朝廷侍妾懐抱中子皆封侯弄以金紫築塢于郿髙厚皆七丈積榖為三十年儲自云事成雄據天下不成守此足以畢老府董卓塢在今鳳翔郿縣北僭擬車服乗青益金華車𤓰畫兩轓時號曰竿摩車言其逼天子也召呼三臺尚書以下詣府啟事公卿拜謁車下卓不為禮皇甫嵩時為御史中丞卓見之抵手謂曰義真怖未乎嵩曰明公以徳輔朝廷大慶方至何怖之有若滛刑以逞將天下皆懼豈獨嵩乎孫堅進兵擊卓卓敗西走堅入雒陽修塞諸陵而還孫堅進屯陽人堅先為卓將徐榮所敗收㪚卒復進陽人聚名注見前卓遣步騎迎戰堅擊破之衆其都督或謂袁術曰堅若得維不可復制此謂除狼而得虎也術疑之不運軍糧堅夜騎見術曰所以出身不顧者上為國家討賊下慰將軍家門之私讎而將軍受浸潤之言還相嫌疑何也術踧踖即為調發卓遣説堅欲與和親堅曰卓逆天無道今不夷汝三族縣示四海則吾死不瞑目豈將與乃和親邪遂進軍太谷注見前卓自出與戰敗走郤屯澠池堅進至雒陽掃除宗廟祠以太牢得傳國璽于甄官井中韋昭吳書張讓之亂刼天子走河上掌璽者以璽投井中及堅軍城南甄官署有井每旦有五色氣從井中出使人浚井得玉璽其文曰受命于天既夀永昌一角缺分兵邀卓卓謂長史劉艾曰關東軍敗數矣皆畏孤無能為也惟孫堅小戇都絳反愚也頗能用人當語諸將使知忌之乃使諸將分屯諸縣董越屯澠地段煨屯華隂牛輔屯安邑以禦山東字牛氏宋司冦牛父之後以為氏輔卓之壻也而自引還長安孫堅修塞諸陵引軍還魯陽夏六月地震袁紹逐冀州牧韓馥自領州事韓馥以豪傑多附袁紹忌之隂節其糧欲使離散紹客逢蒲江反紀字元南陽人謂紹曰將軍舉大事而仰人資給不據一州無以自全韓馥庸才可宻要公孫瓚使取冀州馥必駭懼因遣辨士為陳禍福馥廹于倉猝必有遜讓紹然之以書與瓚瓚果引兵至冀馥與戰不利紹乃使其外甥髙幹字元才陳留圉人及馥所親荀諶字友若叔之孫等說馥以冀州讓紹諶謂馥曰公孫瓚乘勝南来其鋒下可當袁車騎引軍東向其意亦未可量竊為將軍危之馥懼曰為之奈何諶曰夫冀州天下之重資也若兩雄並力兵交城下危亡可立而侍然袁氏將軍之舊且為同盟為今之計不若舉冀州以釀袁氏彼必厚徳將軍而瓚亦不能與之爭矣是將軍有讓賢之名而身安于秦山也馥性恇怯因然其計馥長史耿武等諫曰袁紹孤客窮軍仰我鼻息譬如嬰兒在股掌之上絶其哺乳立可餓殺奈何欲以州與之馥曰吾袁氏故吏且才不如本初度徳而讓古人所貴諸君又向病馬乃避位讓紹紹遂領冀州牧承制以馥為奮威將軍而無所將御亦無官屬從事沮授勸紹曰將軍因冀州之衆收英雄之才迎大駕于西京復宗廟于雒邑以此號令天下誅討未服其功不難紹喜即表授為奮武將軍使監䕶諸將田豐審配並以正直不得志于韓馥紹以豐為别駕配為治中與許攸逢紀荀諶皆為謀主沮側余反氏出黄帝史臣沮誦之後授廣平人由豐字元皓鉅虎人審配字正南魏郡人許攸字子逺南陽人治中别駕漢于定國條州大小奏置秩六百石見文獻通考馥後去紹往依張邈㑹紹使至與邈耳語馥謂圗已遂自殺袁紹表曹操為東郡太守鮑信謂曹操曰袁紹為盟主因權専利將自生亂是復有一卓也抑之則力不能制且可規大河之南以待其變操善之㑹黒山賊十餘萬衆略東郡操引兵擊破之袁紹因表操為東郡太守初荀叔之孫彧少有才名何顒見而異之曰王佐才也及天下亂彧率宗族北依同郡韓馥彧以潁川四戰之地謂父老宜亟避之鄉人多懐土不能去㑹韓馥遣騎来迎彧遂獨率其族以往比至冀州而袁紹已奪馥位紹待彧以上賓之禮彧度紹終不能定大業聞曹操有雄略遂去紹從操操與語大恱曰吾子房也以為奮武司馬明年董卓將李傕等掠潁川彧鄉人留者多為所殺卓以張楊字穉叔雲中人為河内太守初何進遣張楊募兵并州會進敗楊留上黨有衆數千人遂歸袁紹于河内與南單于屯漳水注見前及是南單于刼楊以叛袁紹引軍屯黎陽後漢縣故城在今河南衛輝府濬縣卓因以楊為河内守秋九月蚩尤旗類彗而後曲象旗熒感之精也見于角亢蒼龍之星冬十月卓殺衛尉張温太史望氣言當有大臣戮死者卓故與張温有隙卓討邊章無功孫堅勸温殺之温不能從而卓猶懷恨事已具前使人誣告温罪笞殺于市以應之卓忍于誅殺諸將言語蹉跌便戮于前稍誅闗中舊族陷以叛逆寃死者千數人不聊生道路以目公孫瓚攻袁紹以劉備為平原相胡三省曰劉先主事始此涿郡劉備字元徳中山靖王勝之後也少孤貧與母以販履為業身長七尺五寸垂手下膝顧自見其耳有大志少語言好交結諸豪俠嘗與公孫瓚師事同郡盧植因往依瓚初備以討黄巾功除安喜尉督郵到縣求謁不通遂直入縛督郵杖二百以綬繫其頸棄官已去後復以功除髙唐尉為賊所破遂奔瓚是時闗東州郡務相兼并以自彊大袁術袁紹亦相離貳術遣孫堅擊董卓未返紹以周昻為豫州刺史使襲堅堅嘆曰同舉義兵將救社稷逆賊垂破而各若此吾當誰與戮力乎引兵擊昻走之公孫瓚連破黄巾威震河北青徐黄巾三十萬衆入渤海界瓚逆擊于東光南大破之賊乘車重走渡河瓚因其半濟薄之賊後大破死者數萬生獲七萬餘人威名大震與術相結而怒紹劉虞子和為侍中帝思東歸使和偽逃出武闗諸虞令將兵來迎和至南陽袁術留之使以書與虞虞得書遣騎詣和瓚止之虞不聴瓚恐術聞而怨己亦使其弟越以騎詣術而隂教術執和奪其兵術從之因即遣越助孫堅擊周昻越為流失所中死瓚怒曰余弟死禍由于紹遂出軍屯磐河即鈎磐河禹貢九河之一今山東濟南府陵縣東有磐河店數紹罪惡進兵攻之冀州諸城多畔從瓚瓚使劉備與田楷徇青州數有戰功因以為平原相備少與河東闗羽字雲長字長生解人涿郡張飛字益徳􅃰人相友善至是以羽飛為别部司馬分統部曲備與二人寢則同牀思苦兄弟而稒人廣坐侍立終日随備周旋不避艱險常山趙雲字子龍真定人先將本部兵屬瓚雲詣瓚瓚曰聞貴州人皆願袁氏君何獨迷而能反乎雲曰天下訕訩未知孰是民有懸之厄鄙州論議從仁政所在不為忽袁公私明將軍也備見而竒之深加接納雲遂從至平原為備主騎兵河南尹朱儁移書州郡徴兵討卓初董卓入闗留儁守雒陽儁潛與山東諸將通謀東屯中牟移書州郡請師討卓徐州刺史陶謙字恭祖丹陽人上儁行車騎將軍遣精兵三千助之餘州郡亦有所給明年春卓遣其將李傕郭汜等將兵拒儁儁逆戰為傕汜所破儁自知不敵遂不復前劉焉使張魯字公棋沛國豐人殺漢中太守斷斜谷在今陜西漢中府褒城縣南口曰褒北口曰斜魯自祖父陵客蜀世奉五斗米道初靈帝時巴郡張修以妖術療病其法略與張角同令病家出五斗米號五斗米師聚衆宼掠郡縣時人謂之米後角被誅修遂亡去魯因其法而増餙之劉考范書靈帝紀中平二年巴郡張修反章懷注引艾典略為據陳夀三國志張魯傳魯世奉五斗米裝松之補注亦引載典略而較章懷注為尤詳令依裴注附修事于此劉焉在益州隂圖異計魯母以鬼道有少容往來焉家焉乃以魯為督義司馬將兵掩殺漢中太守斷絶斜谷閣即連雲棧閣殺害漢使焉上書託言米賊斷道不得復通因誅殺州中豪彊及太守校尉作乘輿車具千餘乘時焉子璋從帝在長安帝使喻焉焉留不遣管寧字幼安邴原字根矩皆朱虚人王烈字彦方平原人適遼東公孫度威行海外中國人士避亂者多歸之管寧邴原王烈皆往依馬寧少時與華歆為友嘗共鋤菜見地有金寧揮鋤不顧歆提而擲之人以是知其優劣邴原游學八九年師友皆一時名士臨别以原不飲酒㑹米肉送之原曰本能飲酒但以荒思廢業故斷之耳今當逺别可一飲于是共飲終日不醉華歆字子魚髙唐人寧原俱以操尚稱度虚館以候之寧既見度乃廬于山谷避難者漸来從之旬月而成邑每見度語唯經典不及世事還山専講詩書習俎豆非學者無見也由是度安其賢民化其徳原性剛直清議以格物度已下心不安之寧謂曰潛龍以不見成徳言非其時皆招禍之道也宻遣原西還度亦不復追烈器業過人名聞在原寧之右善于教誘鄉里有盜牛者主得之盜請罪曰刑戮自甘乞不使王彦方知也烈聞而使人謝之遺布一端或問其故烈曰盜懼吾聞其過是有恥惡之心既知恥惡則善心將生故與布以勸為善也後有老父遺劍于路行道一人見而守之至暮老父還尋得劍怪之以告烈烈使推求乃先盜牛者也諸有爭訟曲直將質之于烈或至聞途而返或望廬而還皆相推以直不敢使烈度欲以為長史烈辭之為商賈以自穢乃免建安中曹操辟原為司空掾從征吳卒操又屢徵烈遼東不遣烈遂卒于海表壬申三年春正月袁術使孫堅擊劉表表軍射殺之范書陳志孫堅戰歿俱在初平三年通鑑據張璠漢紀載于二年考吳録及英雄記所載互有不同今仍依范陳正史初袁術據南陽户口數百萬而術奢淫肆欲徴歛無度百姓苦之稍稍離散既與袁紹有隙術以豪傑多附紹怒曰羣豎不吾從而從吾家奴乎又與公孫瓚書曰紹非袁氏子紹聞大怒紹司空建孽子出後伯父成故術云然各立黨援以相圖術結公孫瓚而紹連劉表術使孫堅擊表表遣其將黄祖逆戰堅擊破之遂圍襄陽表夜遣黄祖潛出發兵堅逆與戰祖敗走堅乗勝夜追祖步兵射堅殺之堅所舉孝㢘桓階詣表請堅䘮表義而許之還葬曲阿桓階字伯緒長沙臨湘人曲阿漢縣唐改曰丹陽今屬江南鎮江府袁紹擊公孫瓚于界橋在今直𨽻廣平府威縣北水經注曰界城橋寰宇記曰袁公橋大敗之袁紹自出拒公孫瓚戰于界橋南二十里瓚兵三萬其鋒甚銳紹遣其將麴義漢尚書今鞠譚子閟避難西平改姓麴氏義本韓馥将叛降紹領精兵八百先登彊弩千張夾承之瓚輕其兵少縱騎衝之義兵伏楯下不動未至數十步一時同發讙呼動地大敗瓚軍斬其將嚴綱追至瓚營拔其牙門牙旗名軍出建立牙竿于門即周禮軍旅㑹同置旗門是也餘衆皆走瓚還薊夏四月司徒王允使中郎將吕布誅董卓詔允録尚書事以布為奮威將軍司徒王允與司𨽻校尉黄琬僕射士孫瑞士孫氏以爵系為氏瑞字君䇿扶風人密謀誅卓中郎將吕布便弓馬膂力過人卓愛信之誓為父子卓自知凶恣恐人圍已行止常以布自衛然卓性剛褊常小失卓意卓㧞手㦸擲布布拳㨗得免卓又常使布守中閣布與卓侍婢私通恐事覺益不自安王允素善待布布見允言狀允因以誅卓之謀告之使為内應布曰如父子何允曰君自姓吕本非骨肉擲㦸之時豈有父子情耶布遂許之四月帝有疾新愈大㑹未央殿卓朝服乘車入陳兵夾道屯衛周匝令吕布等扞衞前後王允使士孫瑞自書詔以授布布令勇士十餘人偽著衛士服守北掖門卓入以㦸刺之卓衷甲不入傷臂堕車顧大呼曰吕布何在布曰有詔討賊臣應聲持矛刺卓趣兵斬之即出懐中詔版以令吏士曰詔討卓耳餘皆不問吏士皆稱萬嵗百姓歌舞於道賣衣裝市酒肉相慶卓宗族在郿皆為其羣下所殺暴卓屍于市卓素充肥守吏為大炷置臍中然之光明逹􅍼如是積日塢中有金二三萬斤銀八九萬斤錦綺竒玩積如邱山以王允録尚書事吕布為奮威將軍封温注見前侯共秉朝政卓之死也蔡邕在王允坐聞之驚歎允叱之曰董卓之大賊幾亡漢室君為王臣所宜同疾而懷其私遇反相傷痛豈不共為逆哉即收付廷尉邑謝曰身雖不忠願黥首刖足繼成漢史太尉馬日磾謂允曰伯喈曠世逸才多識漢事當續成漢史為一代大典誅之無乃失人望乎允曰昔武帝不殺司馬遷使作謗書留于後世方今祚中衰戎馬在郊不可令佞臣執筆在幼主左右既無益聖徳復使吾黨䝉其訕議曰磾退而告人田王公其無後乎善人國之紀也制作國之典也滅紀廢典其能久乎邕遂死獄中馬日磾字翁叔扶風人黄巾寇兖州殺刺史劉岱曹操入據之自稱刺史青州黄巾百萬衆入兖州殺任城注見前相轉入東平劉岱欲撃之鮑信諫曰今百姓震恐士卒無鬬志不可敵也觀賊衆羣輩相隨軍無輕重唯以鈔略為資不若畜士衆之力先為固守彼欲戰不得攻又不能勢必離散然後選精銳據要害擊之可破也岱不從遂戰果為所殺曹操部將陳宫字公臺東郡人謂操曰州今無主而王命斷絶宫請說州中綱紀謂諸從事明府尋往牧之資之以收天下此霸王之業也宫因往說别駕治中鮑信等以為然乃迎操領兖州刺史時賊衆精悍操兵寡弱操撫循激勵明設賞罰乘間設竒晝夜㑹戰戰輒禽獲賊遂退走鮑信戰死操求其䘮不得乃刻如信狀祭而哭焉追至濟北注見前悉降之詔以金尚為兖州刺史將之部操逆撃之尚奔袁術操得卒三十萬收其精銳號青州兵六月李傕北地人郭汜張掖人等舉兵犯闕殺司徒王允吕布走出闗初吕布勸王允盡殺董卓部曲允曰此輩無罪不可布欲以卓財物班賜公卿將校允又不從允素以劒客遇布布負其功勞多自誇伐既失意望漸不相平允性剛峻初懼卓故折節下之卓既殱滅自謂無復患難頗驕傲以是羣下不甚附之允始與士孫瑞議赦卓部曲既而不果又議悉罷其軍百姓遂訛言當盡誅凉州人于是卓故將校轉相恐動皆擁兵自守會卓子壻牛輔為左右所殺傕等無所依遣使詣長安求赦允不許傕等益懼欲各解散校尉賈詡字文和姑臧人曰諸君若棄軍單行則一亭長能束君矣不如相率而西以攻長安為董公報仇事濟奉國家以正天下若其不合走未晩也傕等然之乃率軍數千晨夜西行随道收兵比至長安已十餘萬與卓故部曲樊稠李蒙等合圍長安城城峻不可攻守之八日吕布軍有叟兵章懐注蜀兵也漢代謂蜀為叟内反引傕衆入城放兵擄掠布與戰不勝將數百騎駐馬青瑣門外招允同去允曰朝廷幼少恃我而已臨難茍免吾不忍也努力謝闗東諸公勤以國家為念太常种拂字頴伯嵩之子戰死允扶帝上宣平門長安城東北門名避兵傕等于城門下伏地叩頭曰董卓忠于陛下而無故為吕布所殺臣等為卓報仇非敢為逆也請事畢詣廷尉受罪圍門樓共表請王允出問太師何罪允窮蹙乃下見之傕等遂殺司隸黄琬徴左扶風王宏字長文太原人右馮翊宋翼宏遣使謂翼曰傕汜以我二人在外故未危王公今日就徵明日俱族闗東義兵鼎欲誅董卓今卓已死其黨羽易制耳若舉兵共討傕等與山東相應徴此轉禍為福之道也翼不從宏不能獨立遂俱就既至傕收允及宏翼皆殺之尸王允于市莫敢收者故吏平陵令趙戩京兆人收而葬之始允自專討卓之功士孫瑞歸功不侯故得免于難傕自為車騎將軍汜後將軍樊稠右將軍張濟鎮東將軍傕汜稠共秉朝政濟出屯𢎞農以賈詡為左馮翊欲侯之詡曰此救命之計何功之有固辭不受吕布自武闗奔南陽袁術待之甚厚布恣兵鈔略術患之布不自安去從張楊于河内傕等購求急又逃歸袁紹既而復歸張楊張濟武獻祖厲人秋八月遣太𫝊馬日磾太僕趙岐和解闗東日磾至洛陽表别遣岐宣掦國命所到郡縣百姓皆喜曰今日乃復見使者車騎袁紹曹操聞岐至皆自將兵數百里奉迎時紹與公孫瓚方爭冀州瓚遣兵擊紹至龍湊為紹所破紹又與瓚所置青州刺史田楷連戰二年野無青草紹以其子譚為青州刺史楷與戰不勝在龍凑地名平原界岐深陳天子恩徳宜罷兵安人又與瓚書為言利害紹等各引兵去皆期會雒陽奉迎車駕會岐得篤疾經渉逾年期者不至是冬劉表遣使貢獻詔以為荆州牧岐以荆州完富欲説表身自將兵共􅅄王室乃詣表以老病遂留荆州建安中卒日磾為袁術所留術借其節視之因奪不還求去不遣嘔血而死曹操遣使上書操辟毛玠字孝光平邱人為治中從事玠言于操曰今天下分崩乘輿播蕩公家無經歲之儲百姓無安固之志難以持久夫兵義者勝守位以財宜奉天子以令不臣修耕植以畜軍資如此則覇王之業可成也操納其言遣使張楊假塗西至長安董昭字公仁定陶人乃為操作書與催汜等致殷勤催汜議留操使黄門侍郎鍾繇字元常潁川人皓㑹孫説曰方今英雄並起各矯命專制唯曹兗州乃心王室而逆其忠欵非所以副將來之望也傕汜從之徴朱儁為太僕陶謙與諸守相共奏記推朱儁為太師因移檄牧伯欲以同討李㴶等奉迎天子㑹李㴶用賈詡策徴儁入朝軍吏皆憚入闗欲就謙等儁曰以君吕臣義不俟駕且傕汜小豎樊稠庸兒執力相敵變難必作吾乘其聞大事可濟儁乃辭謙議而就徴復為太僕謙等遂罷癸酉四年春正月甲寅朔日食袁術進兵封邱漢縣今屬河南開封府曹操撃破之術走夀春注見前自領揚州事術為劉表所廹進兵北向為曹操所破走歸逐所置揚州刺史陳瑀先是揚州刺史陳温卒袁紹以袁遺領掦州袁術撃破之遺走死術遂以下邳陳瑀為刺史至是術奔九江瑀拒不納術合軍攻瑀瑀走歸下邳九江後漢郡治隂陵故城在今江南鳳陽府定逺縣據夀春領州事李傕欲結術為援以為左將軍華山崩裂秋曹操擊陶謙謙走保郯先是陶謙遣使間行奉貢治中王朗别駕趙昱説謙曰求諸侯莫如勤王今天子越在西京宜遣使奉承王命謙從之人王朗字景興東海人趙昱字元逹琅邪詔以為徐州牧至是曹操以其父嵩為謙别將所殺嵩初避難琅邪操迎之輜重百餘輛謙别將利其財寳遂襲殺嵩乃引兵擊謙攻抜十餘城至彭城大戰謙兵敗走郯曹攻之不能克乃去掠旁邑所過皆屠之初徐方殷盛榖實差豐京雒流民東出者多歸之及遇樵至凡殺男女數十萬口所過城邑雞犬亦盡墟落無復行人冬十月地震十二月復震有星孛于天市大司馬劉虞討公孫瓚不克見殺虞與瓚積不相能虞遣使奉章陳瓚暴掠之罪瓚亦上虞禀糧不周互相非毁朝廷依違而已瓚别築小城于薊城南以居虞數請㑹瓚輒不應虞恐其終為亂乃率兵十萬討之虞兵無部伍又愛民廬舎不聽焚燒戒軍士曰無傷餘人殺一伯珪而已攻圍不下瓚乃簡募鋭士數百人因風縱火直衝突之餘衆大潰瓚執虞㑹詔遣使者段訓􅀈虞封邑瓚誣虞前與袁紹等謀稱尊號脅訓斬虞及妻子于薊市虞以恩厚得衆心北州流舊流他州人流入幽州者舊舊著藉幽州者莫不痛惜初虞欲遣使詣長安而難其人衆咸曰右北平田疇年雖少有竒才盧乃備禮請以為而遣之疇間道至長安致命此還虞已死疇謁墓哭泣而去北歸無終率宗族及他附從者數百人掃地而盟曰君仇不報吾不可以立于世遂入徐無山中營深險平敞地而居躬耕以養父母百姓歸之數年間至五千餘家疇乃為約束班行于衆衆皆便之至道不失遺北邊翕然服其威信烏桓鮮卑各遣使致饋遺疇撫納令不為宼化田疇字子㤗右北平無終人徐無山在今直𨽻遵州西甲戌興平元年春二月追尊母王夫人為靈懐皇后劉備救陶謙謙表備為豫州刺史謙告急于田楷楷與劉備救之備自有兵數千人謙益以丹陽兵四千備遂去楷歸謙謙表為豫州刺史屯小沛即沛縣以屬沛郡故謂之小沛曹操軍食亦盡引還夏四月曹操復攻陶謙還擊劉備破之陳留太守張邈迎吕布以拒操操還攻之操使荀彧程昱字仲徳東阿人守鄄城漢縣即春秋鄄邑故城在今山東曹州府濮州曹操領兖州時治此復徃攻陶謙所過殘滅還擊破劉備于郯東謙恐欲走歸丹陽㑹張邈叛操迎吕布操乃引軍還初張邈與袁紹等首舉義兵及紹為主盟有驕色邈正義責紹紹怒使操殺之操不聴而邈終不自安陳宫性剛直壯㤠先事操後亦自疑乃與邈弟超共謀説邈迎吕布為兖州牧是時兖州郡縣皆應布唯鄄城范漢縣今屬曹州府東阿漢縣故城在今兖州府陽榖縣今縣宋開寳中徙屬㤗安府不動降者言宫欲自將取東阿又使汛符咸反本凡氏避地于汜水因氏馬嶷取范彧謂昱曰今舉州皆叛唯有此三城宫等以重兵臨之非有以深結其心三城必動君民之望也宜往撫之昱乃歸過范説其令殺汛嶷勒兵固守昱又遣别騎絶倉亭津述征記在范縣界去東阿六十里陳宫至不得渡昱至東阿東阿令棗袛棗氏本姓棘避難改焉祗潁川人已拒城堅守卒完三城以待操吕布攻鄄城不能下西屯濮陽曹曰布不能據東平斷亢父漢縣故城在今兖州府濟寧州泰山之道乘險要我而乃屯濮陽吾知其無能為也乃進攻之布出攻戰操軍敗布先以騎犯青州兵青州兵奔操墜馬布騎得操而不知釋之與布相守百餘日引還鄄城袁紹使人説操欲使遣家居鄴操新失兗州將許之程昱諌乃止六月京師地冄震乙酉晦日食自四月不雨至于七月穀一斛直錢五十萬長安中人相食帝令侍御史侯汶出太倉米豆為平人作糜饑死者如故帝疑稟賦不實取米豆各五升于御前作糜得二盆乃杖汶五十于是悉得全濟劉焉卒以其子璋為益州牧天火燒綿竹城劉焉徙治成都疽發背卒州大吏趙韙等貪焉子璋温仁共上以為刺史詔以為益州牧後韙叛璋圍城都敗死事在建安七年陶謙卒劉備兼領徐州謙疾篤謂别駕麋竺楚大夫封于麋亭因以為氏竺字子仲東海朐人曰非劉備不能安此州也謙卒竺率州人迎備備曰袁公路近在夀春君可以州與之典農校尉陳登字元龍下邳人曰公路驕豪非治亂之主今欲為使君合步騎十萬上可以匡主濟民下可以割地守境若使君不見聴許登亦未敢聴使君也北海相孔融謂備曰袁公路豈憂國忘家者邪冡中枯骨何足介意今日之事百姓與能見易繫辭言百姓樂推而不厭也天與不取悔不可追備遂領徐州袁術表孫䇿字伯符為懷義校尉初孫堅娶錢塘呉氏生四男䇿權字仲謀翊字叔弼匡字季佐及一女堅從軍於外留家夀春䇿年十餘嵗已交結知名舒人周瑜字公瑾與䇿同年亦英逹夙成聞䇿聲問自舒來造勸䇿徙居舒推道南大宅與䇿升堂拜母有無通共及堅死䇿還葬渡江居江都結納豪俊有復讐之志至夀春見袁術術甚竒之以堅餘兵千餘人還䇿表拜懷義校尉術先許以䇿為九江太守已而更用丹陽陳紀又使攻廬江太守陸康初靈帝時廬江賊反詔就家拜康太守悉降之至是袁術欲攻徐州從康求米康不與故攻之謂曰前錯用陳紀每恨本意不遂今若得康廬江真卿有也䇿攻康抜之術復用其故吏劉勲為太守䇿益失望乙亥二年春二月李傕殺樊稠攻郭汜刦帝入其營董卓初死三輔民尚數十萬户傕等放兵刦掠加以饑饉二年之間民相食略盡李傕郭汜樊稠各相與矜功争權傕以稠勇而得衆忌之請稠㑹議便于坐殺稠由是諸将轉相疑貳傕汜各治兵相攻傕遂将兵圍宫以車三乗迎帝放兵入掠宫人御物並取金帛遂放火燒宫殿官府居民悉盡帝使公卿和傕汜汜留太尉楊彪大司農朱儁等十人為質儁憤懣發病死議攻李傕楊彪曰羣臣共鬬一人刦天子一人質公卿可乎汜怒欲手刃之彪曰卿尚不奉國家吾豈求生邪汜乃止傕召羗胡數千以御物繒綵與之許以宫人欲令攻汜汜遂將兵夜攻傕門矢及帝簾帷中傕復移乘輿幸北塢使校尉監塢門侍臣皆有饑色帝求米五斗牛骨五具以賜左右傕曰朝晡上飯何用米為乃以􅆨牛骨與之帝使謁者僕射皇甫酈和傕汜酈先詣汜汜從命又詣傕傕不肯曰郭多汜一名多盗馬盧耳何敢欲與吾等君觀吾方略士衆足辦多否多又刦質公卿而君茍欲左右之邪酈曰汜質公卿而將軍脅主誰輕重乎傕呵之出酈詣省門白傕不奉詔辭語不順帝恐傕聞之亟命酈去傕遂自為大司馬位三公右夏四月立貴人伏氏為皇后曹操攻抜定陶吕布走歸劉備留張超守雍邱操以陶謙已死遂欲取徐州還乃定布荀彧曰昔高祖保闗中光武據河内皆深根固夲以制天下將軍夲以兗州首事河濟天下要地是亦將軍之闗中河内也今舍而東布必乘虚㓂暴民心益危是無兖州也若徐州不定將軍當安所歸乎操乃止布與陳宫將萬餘人來戰操兵皆出收麥在者不能千人屯營不固屯西有大堤其南樹木幽深操引兵堤出半兵堤外布益進乃令輕兵挑戰既合伏兵乃悉乘堤歩騎並進大破之遂攻㧞定陶分兵平諸縣布東奔劉備邈詣袁術求救留弟超守雍邱邈未至夀春為其下所殺布見備甚尊敬之請備于帳中坐婦牀上令婦向拜酌酒飲食名備為弟備見布語言無常外然之而内不悦六月張濟迎帝東歸秋七月發長安張濟自陜来和傕汜欲遷乗輿權幸𢎞農帝亦思舊京遣使宣諭十反傕汜乃許自傕汜相攻數月死者萬數㑹傕將楊奉謀殺傕事泄叛去傕衆稍衰帝又遣賈詡吕羌胡大師許以封賞令各引去傕由此單弱七月車駕東出夜到霸陵從者皆飢張濟賦給有差傕出屯池陽汜欲令帝幸髙陵公卿及濟以為宜幸𢎞農汜不從帝遂終日不食汜聞之曰可且幸近縣八月幸新豐汜復謀脅帝還都郿侍中种輯知之宻告楊定卓故部曲傕以為安西将軍董承靈帝母董太后之姪先為牛輔将楊奉故白波城帥後為卓將白波賊者黄巾餘黨起西河白波谷因以為號令㑹新豐汜自知謀泄乃棄軍入南山冬十二月張濟與傕汜合追帝至陜帝渡河入李樂營帝東至華隂将軍段煨具服御及公卿已下資儲欲上幸其營楊定與煨有隙誣煨欲反遂攻其營十餘日不下煨供給御膳禀養百官無有二意詔和解之李傕郭汜悔遣天子復相與和欲共刼帝而西楊定為汜所遮亡走荆州張濟與董承楊奉不相平乃反合傕氾共追乘輿至𢎞農東澗承奉與戰軍敗百官士卒死者不可勝數射聲校尉沮儁被創墜馬傕謂左右曰尚可活否儁罵之曰汝等凶逆逼刼天子亂臣賊子未有如此者傕使殺之帝露次曹陽墟名在今河南陜州西元和志俗曰七里澗承奉乃譎傕等與連和而密遣間使至河東招故白波注見前師李樂韓暹胡才及南匈奴右賢王去卑並率其衆數千騎來與承奉共擊傕等大破之車駕發東傕等復來戰奉等大敗死者甚于東澗李樂曰事急矣陛下宜御馬上曰不可舎百姓而去此何辜哉兵相連綴四十里至陜乃結營自守虎賁羽林不滿百人承奉等議夜潛過河使李樂先渡具船舉火為應上與公卿歩出營皇后兄伏徳扶后臨河河岸髙十餘丈以絹縋而下餘人皆匍匐岸側或從上自投死亡傷殘不復相知爭赴舟者董承李樂以戈擊之舟中手指可掬帝乃御船同濟者皇后宋貴人后父完及楊彪以下纔數十人到大陽漢縣注見前幸李樂營河内太守張楊使數千人負米貢餉帝御牛車幸安邑羣師競求拜職刻印不給至乃以錐畫之乘輿居棘籬中門户無闗閉帝又遣太僕韓融與傕汜等連和傕乃放遣公卿百官歸所掠宫人已而糧盡宫人皆食菜果張楊來朝謀以乘輿還雒陽諸將不聴楊復還野王沮授説袁紹曰將軍累葉台輔世濟忠義今州域初定兵彊士附西迎大駕即宫鄴都挾天子而令諸候畜士馬以討不庭誰能禦之若不早定必有先之者笑紹不從孫䇿擊劉繇字正禮牟平人岱之弟于曲阿破走之先是劉繇奉詔為掦州刺史時袁術已據夀春刺史所治丹陽太守吳景孫策舅都尉孫賁字伯陽策從兄迎繇至曲阿既而繇以景賁夲袁術所用乃廹逐使去景賁退保歴陽繇遣將屯横江浦名在和州東南對江南之采石為津渡處以拒之景賁連攻不克至是孫策説術乞助景等平定江東策説術曰家有舊恩在東願助舅討横江横江拔因投本土召募可得三萬兵以佐明使君定天下術知其恨而以劉繇在曲阿王朗在會稽謂策未必能定遂許之術表策為折衝校尉將兵千餘人騎數十匹比至歴陽衆五六千策先奉母徙曲阿依吳景已徙厯陽及是又徙母于阜陵周瑜將兵迎之助以資糧進攻橫江拔之渡江轉鬬所向皆破百姓聞孫郎至皆失魂魄雞犬菜茹一無所犯民乃大悦競以牛酒勞軍遂攻劉繇于曲阿繇使大史慈偵軍卒遇策于神亭慈便前鬬策擥得慈子㦸慈亦得䇿兠鍪會兩家兵騎來赴遂解散金太史慈字子義東萊人神亭在今江南鎮江府壇縣西北繇兵敗走䇿入曲阿勞賜將士發恩布令告諭諸縣樂從軍者一身行復除門户不樂者不强旬日之間四面雲集得見賢遍反兵三萬餘人威震江東術表䇿為殄寇將軍䇿以張紘字子綱廣陵人為正議校尉張昭字子布彭城人為長史常令一人居守一人從征討待昭以師友之禮文武之事一以委之繇奔丹徒將走會稽許劭曰不如豫章北連豫壤西接荆州孟徳景升必相救濟繇從其言遂泝江南保豫章有笮融者先從陶謙為下邳相謙敗融走廣陵殺太守趙昱依故彭城相薛禮于秣陵復殺禮至豫章又詐殺太守朱皓繇擊破之融走死雍邱潰張超自殺袁紹圍東郡執太守臧洪殺之張超在雍邱曹操圍之急超曰唯臧洪當來救吾衆曰袁曹方睦洪為袁所表用必不敗好以招禍超曰子源天下義士終不背本但恐見制强力不相及耳洪時為東郡太守洪先領青州紹以其能徒東郡治東武陽徒跣號泣從紹請兵將赴其難紹不與請自率所領以行亦不許雍邱遂潰超自殺操夷其三族洪由是怨紹絶不與通紹興兵圍之不下紹令洪邑人陳琳以書喻之洪復書曰僕䝉主人傾蓋遂竊大州自謂究竟大事其尊王室豈悟郡將戹請師覓拒使洪故君遂至淪滅區區微節無所獲仲斯所以忍悲揮戈收涙告絶者也行矣孔璋足下徼利于境外臧洪投命于君親吾子托身于盟主臧洪䇿名于長安子謂余身死而名滅僕亦笑子生而無聞焉紹知洪無降意増兵急攻城中糧榖已盡初尚掘䑕煮筋角後無可復食者主簿啓内厨米三升請為饘粥洪難曰何能獨甘此也使作薄糜徧班士衆又殺其愛妾以食將士將士感流涕無能仰視者男女七八千人相枕而死莫有離叛城陷生執洪紹謂洪曰今日服未洪據地瞋目曰諸袁事漢四世五公可謂受恩今王室衰弱無扶翼之意欲因際會希冀非望多殺忠良以立姦威洪惜力劣不能推刃為天下報讐何謂服乎紹知洪終不為己用乃殺之洪邑人陳容少親慕洪時在紹坐起謂紹曰將軍欲為天下除暴而先誅忠義豈合天意紹慚使人牽出容曰寧與臧洪同日死不與將軍同日生也遂復見殺在坐無不歎息竊相謂曰如何一日殺二烈士劉虞故吏鮮于箕于封朝鮮其支子食采在于因以鮮于為氏輔迎虞子和擊公孫瓚破之公孫瓚盡有幽州之地遂益驕矜記過忘善多所賊害劉虞從事漁陽鮮于輔等率州兵欲報瓚以燕國閻柔素有恩信共推為烏桓司馬招誘胡漢得數萬人與瓚所置漁陽太守鄒丹戰斬之烏桓峭王烏桓大人之稱感虞恩徳亦率種人随輔南迎虞子和和先為袁術所執逃還北袁紹復留之與袁紹將麴義合兵十萬共攻瓚瓚兵數敗還易漢縣故城在今直𨽻保定府雄縣京固守前此有童謡曰燕南垂趙北際中央不合大如礪惟有此中可避世瓚自以為易地當之逆徙鎮焉及為輔等所敗慮有非常為塹十重築京髙十丈為樓其上以鐵為門夀與姫妾居疎逺賓客希復攻戰或問其故瓚曰昔謂天下事可指揮而定今日視之非我所决不如休兵力田畜榖兵法百樓不攻今吾樓櫓十重積榖三百萬斛食盡此榖足以待天下之事矣丙子建安元年秋七月帝還雒陽張楊使董承先詣雒陽修宫時諸將更相疑貳帝遣使至營宣諭乃從詔楊奉韓暹奉帝東還胡才李樂留河東才為怨家所害樂病死楊以糧迎道路七月至雒陽幸故中常侍趙忠宅八月幸南宫楊安殿張楊以為己功故名其殿曰楊安楊曰天子當與天下共之朝廷自有公卿楊當出扞外難遂還野王楊後為其將楊醜所殺楊奉亦出屯梁漢縣故城在今河南汝州韓暹董承並留宿衛時宫室燒盡百官披荆棘依牆壁間州郡各擁強兵委輸不至羣僚饑乏尚書郎以下自出採稆音吕野榖不因播種而生者或飢死牆壁或為兵士所殺曹操入朝自為司𨽻校尉錄尚書事曹操在許謀迎天子衆以為山東未定韓暹楊奉未可卒制荀彧曰今鑾駕旋軫東京搸蕪誠因此時奉主上以從人望大順也秉至公以服天下大略也扶宏義以致英俊大徳也四方雖有逆節其何能為操乃遣曹洪字子廉操從弟將兵西迎天子董承等拒之洪不得進㑹韓暹矜功専恣承潛召操操乃以兵詣雒陽既至奏韓暹楊張之罪暹懼誅單騎奔楊奉帝以暹楊有翼駕功詔勿問以操領司隸校尉録尚書事操殺尚書馬碩等封董承輔國將軍伏宂等十三人為列侯贈沮儁𢎞農太守曹操遷帝于許自為大將軍封武平後漢縣故城在今河南歸徳府鹿邑縣侯操引董昭問計昭曰諸將人殊意異今留匡弼事埶不便唯有移駕幸許耳操曰此孤本志也乃奉車駕東遷行至轘轅楊奉韓暹欲要遮乘輿不及操撃之奉暹南奔袁術遂都許立宗廟社稷自是政歸曹氏天子守位而已孫䇿取會稽太守王朗降䇿引兵渡浙江會稽功曹虞翻字仲翔餘姚人勸太守王朗避之朗不從發兵拒戰敗績浮海至東冶注見前䇿追擊大破之朗乃降策以朗儒雅詰讓而不害後曹操徵朗參司空軍事䇿自領㑹稽太守復命翻為功曹待以交友之禮䇿好遊獵翻諫曰明府喜輕出微行夫白龍魚服困于豫且願少留意䇿曰君言是也然不能改白龍魚服昔白龍下清冷之淵化為魚漁者豫且射中其目見劉向説苑以袁紹為太尉曹操自為司空詔書下紹責以地廣兵多而専自樹黨不聞勤王之師但擅相討伐紹上書陳愬乃以紹為太尉紹恥班在操下辭不受操懼請以大將軍讓紹而自為司空行車騎將軍事曹操以荀彧為侍中尚書令荀攸為軍師郭嘉字奉孝潁州陽翟人為祭酒操以荀彧為侍中守尚書令問以䇿謀之士彧薦其從子攸及郭嘉操徵攸與語大悦曰公逹非常人也吾得與之計事天下當何憂哉以為軍師嘉初見袁紹紹甚敬禮之居數十日嘉訝其多端寡要好謀無决遂去之操召見與論天下事喜曰使孤成大業者必此人也嘉出亦喜曰真吾主也操表嘉為司空祭酒以孔融為將作大匠北海太守孔融志在靖難而才疎意廣訖無成功時袁曹公孫首尾相連融孤立不與通袁紹子譚為青州刺史攻融自春及夏戰士所餘纔數百人流矢交集而融猶隱几讀書談笑自若及城陷乃奔東山胡三省注都昌縣之東山也都昌故城在今山東青州府臨朐縣操與融有舊徵為将作大匠融在北海尊事髙宻鄭康成為特立一鄉曰鄭公鄉會黄巾入郡界康成避地徐州數年乃還公車徵為大司農以病乞歸卒于家康成所著經書凡百餘萬言通人頗譏其煩然經傳洽熟稱為大儒齊魯間宗之募民屯田許下州郡並置田官中平以來民棄農業諸軍並起率乏粮穀飢則冦掠飽則棄餘瓦解流離無敵自破者不可勝數袁紹在河北軍人仰食袁柘袁術在江淮取給蒲嬴民多相食州里蕭條羽林監棗祗請建置屯田操從之以祗為屯田都尉以任峻字伯逹中牟人為典農中郎将募民屯田許下得榖百萬斛于是州郡例置田官所在倉廩皆滿故操征伐四方無運糧之勞遂能兼並羣雄軍國之饒起于祗而成于峻吕布攻劉備備走歸許詔以為豫州牧遣東屯沛先是袁術攻劉備以爭徐州備使張飛守下邳自將拒術于盱眙注見前術與布書令襲下邳許以助軍糧布引兵東下飛敗走備與術戰又敗請降于布布亦忿術軍糧不至乃復與備合并埶攻術至是術畏布為己害乃為子求婚布許之術遣將紀靈等攻劉備備求救于布布馳往赴之靈等聞布至皆歛兵而止布屯沛西南諸靈等靈等亦請布布往就之與備共飲食布謂靈等曰元徳布弟也為諸君所困故來救之布性不喜合鬬喜解鬬耳乃令軍候植㦸于營門布彎弓顧曰諸君觀布射戟小支中者當各解兵不中可留決鬬布即一發正中㦸支靈等皆驚言將軍天威也明日復歡會然後罷兵備合兵得萬餘人布惡之自出兵攻備備敗走歸曹操操厚遇之以為豫州牧或謂操曰備有英雄之志今不早圖後必為患操以問郭嘉嘉曰公起義兵爲天下除暴推誠仗信以招俊傑猶懼其未也今備有英雄名以窮歸已而害之則智士將自疑囘心擇主公誰與定天下乎操笑曰君得之矣遂益其兵使圖布初備在豫州與袁渙為茂才至是渙為布所留布使作書辱罵備渙不可布以兵脅之渙顔色不變笑而應曰渙聞唯徳可以辱人不聞以罵且渙他日事劉將軍猶今日之事將軍也如一旦去之復罵將軍可乎布慚而止人袁渙字曜卿扶樂司徒滂之子劉表立學校作雅樂劉表愛民養士從容自保境内無事學士歸之者以千數表乃起立學校講明經術命故雅樂郎杜䕫字公良河南人作雅樂表欲庭觀之䕫曰將軍號不為天子合樂而庭觀之無乃不可乎表乃止禰衡少有才辯而尚氣剛傲孔融薦之曹操辱罵操操怒曰衡豎子殺之猶鼠雀耳顧此人素有才名逺近將謂孤不能容乃送劉表衡稱表之羙盈口而好譏貶其左右左右譖之表怒以江夏太守黄祖性急送衡與之後衡衆辱祖祖殺之衡字正平平原般人丁丑二年春正月曹操擊張繡降之繡叛襲操殺其子昻繡張濟族子也先是濟在闗中士卒饑餓至南陽冦略為流矢所中死繡領其衆屯宛與劉表合初帝出長安賈詡往依段煨已而歸繡説繡使附劉表繡從之詡往見表還曰表平世三公才也不見事變多疑無决無能為也至是曹操擊繡繡舉衆降操納張濟妻繡恨之襲擊操軍殺操長子昻操中流矢敗走繡還保穰明年操後擊繡圍穰㑹袁紹將田豐勸紹襲許奉迎天子紹不從而亡卒有以豐謀白操者操遂解穰圍而還繡率衆追之賈詡曰不可追也必敗繡不聽敗還詡曰促更追之必勝繡從之果以勝歸繡問其故詡曰公雖善用兵非曹公敵也曹公軍新退必自斷後故云必敗曹公力未盡而一朝引退必國内有故也已破將軍必輕軍速進諸將雖勇非將軍敵故雖用敗兵而必勝也繡乃服以鍾繇為司隸校尉督關中諸軍初董卓召馬騰韓遂以圗山東至㑹卓死李傕皆以為將軍遣遂還留騰屯郿事在初平三年諫議大夫种劭字申甫拂之子左中郎將劉範焉之子等謀誅傕使騰襲長安戰敗劭等皆死騰走還涼州在興平元年至是曹操將有事山東而以闗右為憂操用荀彧郭嘉言将東取吕布又􅂲袁紹浸擾鬬中彧曰闗中將師唯馬騰韓遂最彊若撫以恩徳雖不能乆安比公平定山東足以不動侍中鍾繇有志謀可屬以西事乃表鍾繇以侍中守司隸校尉持節督闗中諸軍繇至長安移書騰遂等為陳禍福騰遂各遣子入侍袁術稱帝殺故兖州刺史金尚術以讖言代漢者當塗髙自云名字應之章懐注當塗髙者魏也術自以術及路皆是塗故云應之遂有僭逆之謀聞孫堅得𫝊國璽拘堅妻而得之議稱尊號孫䇿聞之與術書曰湯武雖有聖徳假使時無失道無由逼而取也今主上非有惡于天下徒以幼小脅于強臣異于湯武之時且董卓貪滛驕陵志無紀極至于廢主自興亦猶未也而天下同心疾之况效尤而甚焉者乎術始料䇿必與己合及得其書愁沮發疾䇿遂絶之至是僭號于夀春自稱仲家置百官郊祀天地沛相陳珪字漢瑜登之父少與術游術以書召珪又刦質其子期必致珪珪答書曰足下隂謀不軌以身試禍欲吾營私阿附有死不能也術欲以金尚為太尉尚先為曹操所擊奔術事見前尚不許而逃去術殺之夏五月以吕布為左將軍布擊袁術兵破之袁術遣使以稱帝告吕布因求迎婦布遣女隨之陳珪恐徐揚合縱為難未已往說布曰曹公奉迎天子輔贊國政將軍宜與協謀共存大計今與術結婚必受不義之名將有累卵之危矣布亦素怨術女已在塗乃追還絶婚械送其使梟首許市珪欲使子登詣曹操布固不肯㑹詔以布為左将軍操復遺布手書深加慰納布大喜即遣登奉章謝恩並答操書登見操因陳布勇而無謀輕于去就宜早圖之操即增珪秩中二千石拜登廣陵太守命隂合部衆以為内應始布因登求徐州牧不得登還布怒拔㦸斫几日卿父勸我協同曹操絶婚公路今吾所求無獲而卿父子顯重但為卿所賣耳登不為動容徐對之曰登見曹公言養將軍譬如養虎當飽其肉不飽則將噬人公曰不如卿言譬如養鷹饑即為用飽則颺去其言如此布意乃解術遣其大將張勲等與韓暹楊奉步騎數萬七道攻布布懼不敵珪曰暹奉與術卒合之師謀無素定不能相維子登策之比于連雞埶不俱棲立可離也布乃用珪策與暹奉書使與己并力擊術且許破術悉以軍資與之暹奉大喜即從布進軍去勲營百歩暹奉兵同時呌呼勲等散走布追擊大破之殺傷堕水死者殆盡韓暹楊奉縱暴徐揚間是耳劉備誘奉斬之暹奔還并州道為人所殺袁術遣盜殺陳王寵敬王羡曾孫自黄巾賊起郡國皆棄城走唯陳王寵有勇善射治兵自守國人不敢離叛故陳獨得完國相駱俊字孝遠烏栕人素有威恩鄰郡人多歸之有衆十餘萬袁術求糧俊拒絶之術遣客詐殺俊及寵陳由是破敗時王侯無復租禄或並日而食轉死溝壑者甚衆夫人姬妾多為冦盜所虜云秋九月下故太尉楊彪獄尋赦出之故太尉楊彪與袁術婚姻曹操惡之奏收下獄劾以大逆孔融往見曹曰楊公四世清徳海内所瞻父子兄弟罪不相及况以袁氏歸罪楊公乎操曰此國家之意融曰假使成王殺召公周公可得言不知邪操使許令滿寵風俗通荆蠻有瞒氏音舛後改為滿寵字伯寧山陽昌邑人按彪獄融與荀彧皆屬寵勿考掠寵考訊如法數日求見操曰楊彪考訊無他辭語此人有名海内若罪不明白必大失民望竊為明公惜之操即赦彪彪見漢室衰㣲政在曹氏遂稱脚攣積十餘年不行由是得免于禍戊寅三年夏四月詔將軍段煨等討李傕夷三族先是郭氾為其將伍習所殺至是煨等誅傕𫝊首於許詔髙縣之封煨閿鄉漢縣今屬河南陜州侯煨後徵為大鴻臚病卒秋九月吕布復攻劉備曹操擊布殺之吕布復與袁術通遣其將髙順等攻劉備破沛城虜備妻子備單身走曹操使夏侯惇字元讓譙人救備為順所敗順所將七百餘兵每戰必克名陷陳營操乃自擊布與備遇於梁廣陵太守陳登率郡兵為操先驅進至下邳布屢戰皆敗還保城不敢出布欲使陳宫髙順守城自將騎斷操糧道布妻謂曰宫順素不和將軍一出宫順必不同心共守城如有蹉跌妾豈得復為將軍妻哉布乃止遣人求救于袁術術不能救嚴兵為布作聲援操圍下邳乆疲敝欲還荀攸郭嘉曰吕布勇而無謀今屢戰皆北銳氣衰矣陳宫有智而遲今及布氣之未復宫謀之未定急攻之布可㧞也乃引沂泗水名注俱見前灌城月餘布益困迫布將魏續等共執陳宫髙順初布性决疑所為無常髙順每諫布不能從後遂疎順奪其兵以與魏續至是續執順等以叛布率其衆降布登白門樓水經注下邳城南門名白門兵圍之急布令左右取其首詣操左右不忍乃下降布見操曰明公之所患不過于布今已服矣若令布將騎明公將步天下不足定也顧謂劉備曰元徳卿為坐上客我為降虜繩縳我急獨不可一言邪操笑曰縛虎不得不急乃命緩布縳劉備曰不可明公不見吕布事丁建陽董太師乎操然之布目備曰大耳兒最叵信于是縊殺布及陳宫髙順皆𫝊首送許然後葬之操將殺陳宫謂曰奈卿老母妻子何宫曰以孝治天下者不害人之親施仁政于天下者不絶人之祀老母妻子存否在明公不在宫也遂出就刑操為之流涕厚撫其家初㤗山屯帥臧霸等皆附于布及布敗霸等及布將張遼皆率其衆降操割青徐二州近海者委霸等以遼為中郎將劉備從操還許操表為左將軍禮之愈重陳登加伏波將軍臧霸字宣髙㤗山華人張遼字文逺雁門人以孫䇿為討逆將軍封吳侯孫忠遣張紘獻方物操欲撫納之表䇿為討逆將軍封吳侯以紘為侍御史袁術以周瑜為居巢注見前長魯肅字子敬臨淮人為東城胡三省注前漢縣屬廬江後漢省當是袁術復置長瑜肅知術終無所成皆棄官渡江從䇿䇿自將討祖郎丹陽宗帥于陵陽注見前禽之即破械署門下賊曹又討太史慈劉繇仁走慈進住涇縣大為山越所附于勇里胡三省注在涇縣禽之即署門下督䇿謂慈曰寧識神亭時邪若卿爾時得我云何慈曰未可量也䇿大笑曰今日之事當與卿共之孤是卿知己勿憂不如意也軍還郎慈俱在前導軍人以為榮先是劉繇攻破笮融朝廷以華歆為豫章太守及是繇卒餘衆未有所附䇿命慈為撫安之且觀華歆牧御方規何如慈還謂䇿曰華子魚良徳也然無他方規自守而已䇿遂有兼并之志己夘四年春三月袁紹擊公孫瓚瓚自焚死袁紹連年攻公孫瓚不能克欲與瓚釋憾連和瓚不答而増修守備至是黒山帥救瓚未至瓚密使人齎書使起火為應瓚自内出戰紹候得其書如期舉火瓚遂出戰紹設伏擊之瓚大敗復還自守紹為地道穿其樓下燒之樓輒傾倒稍至京中即所築髙京瓚悉縊其姊妹妻子然後引火自焚其將田楷戰死袁紹承制以烏桓蹋頓為單于蹋頓邱力居從子有武略邱力居死子樓班年少蹋頓代立總攝諸部紹攻公孫瓚蹋頓以諸部助之瓚滅紹皆賜以單于印綬又以閻柔得烏桓心因加寵慰以安北邊其後諸部奉樓班為單于以蹋頓為王然蹋頓猶秉計策夏六月袁術北走詔劉備將兵邀之術還走死術既稱帝淫侈滋甚媵御數百無不兼羅紈厭梁肉而士卒凍餒莫之簡恤既為吕布所破事見前又為曹操所敗二年操東征術術棄軍走留其將橋蕤等拒操操擊斬之術走渡淮由是遂衰資食空盡不能自立乃燒宫室奔其部曲陳簡復為所拒士卒散走憂懣不知所為乃遣使歸帝號于紹具言祿去漢室表氏當興紹因然之袁譚自青州迎術欲從下邳北過曹操遣劉備邀之復走夀春至江亭坐簀牀而歎曰表術乃至是乎因憤慨歐血死妻子奔皖城故廣陵太守徐璆得𫝊國璽獻之秋八月曹操進兵黎陽注見前還許分兵守官渡城名在今河南開封府中牟縣東北亦曰中牟臺袁紹既克公孫瓚心益驕貢御稀簡簡精兵十萬騎萬匹欲以攻許沮授諫曰曹操奉天子以令天下今舉師南向于義則違且廟勝之䇿不在強弱操法令既行士卒精練非公孫瓚坐而受攻者也竊為公懼之紹不從許下諸將聞紹將攻許皆懼操曰吾知紹之為人志大而智小色厲而膽薄忌克而少威兵多而分畫不明將驕而政令不一土地雖廣糧食雖豐適足以為吾奉也孔融謂荀彧曰紹地廣兵彊田豐許攸智士也為之謀審配道紀忠臣也任其事顔良文醜勇將也統其兵殆難克乎彧曰紹兵雖多而法不整田豐剛而犯上許攸貪而不治審配專而無謀逄紀果而自此數人者者埶不相容必生内變顔良文醜一夫之勇耳可一戰而禽也八月操進軍黎陽使臧霸等入青州于禁字文則㤗山鉅平人屯河上九月操還許分兵守官渡冬十一月張繡降袁紹遣人招繡并與賈詡書結好詡于繡坐上顯謂紹使曰歸謝袁夲初兄弟不能相容而能容天下國士乎繡驚懼曰何至于此詡因勸繡歸曹操繡從之操以繡為揚武將軍詡為執金吾復置鹽官徙司隸校尉治𢎞農闗中諸將以袁曹方爭皆中立顧望涼州牧韋端使從事楊年詣許阜還諸將問袁曹勝負阜曰袁公寛而不斷好謀而少決不斷則無威少決則後事今雖彊終不成大業曹公有雄才大略決機無疑法一而兵精能用度外之人所任各盡其力必能濟大事者也楊阜字義山天水冀人操使侍御史衛覬字伯儒河東安邑人往鎮撫之時四方大有還民諸將多引為部曲覬書與荀彧書曰闗中膏腴之地頃遭荒亂人民流入荆州者十萬家今歸者無以自業諸將各競招懷以為部曲一旦變動必有後憂夫鹽國之大寳也亂來放散宜如舊置使者監賣以其直益市犂牛若有歸民以供給之勤耕積粟以豐殖闗中逺民聞之必日夜竸還又使司𨽻校尉留治闗中以為之主則諸將日削官民日盛此彊本弱敵之利也彧以白操操從之始遣謁者僕射監鹽官司𨽻校尉治𢎞農闗中由是服從孫䇿襲廬江取之徇豫章太守華歆降廬江太守劉勲新得袁術部曲孫䇿惡其兵强勸勲攻取上繚今江西南昌府建昌縣有上繚營相傳漢昌邑王所置宗帥勲既行䇿與周瑜輕軍襲拔廬江悉降其衆勲北歸許䇿遂西破黄祖盛兵将徇豫章謂虞翻曰華子魚自有名字然非吾敵也若不開門譲城不得無所傷害卿便在前具宣孤意翻往見歆曰孫討逆智略超世用兵如神君今守孤城資糧不足不早為計悔無及也大軍已次椒邱地名在南昌府城北明日日中迎檄不至與君絶矣歆乃夜作檄明旦遣使齎迎䇿便進軍歆葛巾迎降䇿向歆拜禮為上賓䇿之入皖城也撫視袁術妻子及入豫章収載劉繇喪善遇其家士大夫以是稱之南皖城後漢皖縣為廬江郡治故城在今江安慶府潛山縣劉備起兵徐州討曹操初董承稱受帝衣帯中密詔與劉備謀誅曹操操從容謂備曰今天下英雄唯使君與操耳本初之徒不足數也備方食失匕箸值雷震備因曰聖人云迅雷風烈必變良有以也遂與承及种輯等同謀會操遣備邀袁術備遂殺徐州刺史留闗羽守下邳行太守事身還小沛郡縣多叛操為備備衆數萬人遣使與袁紹連兵操使長史劉岱等擊備不克備謂曰使汝百人來無如我何曹公自來未可知耳御批歴代通鑑輯覽卷二十六

front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷八十九宋光宗皇帝庚戌紹熙元年金章宗璟明昌元年春正月丙辰朔帝朝夀皇于重華宫金以完顔守貞本名左業古紳之孫為參知政事
  hash: sha256:38f48c7d6bc56c4e6a5417cf4ab88625d64d3129ba4fbd896d6bf275c8906c90

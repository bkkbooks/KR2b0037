body:
  text: 自三家滅智伯至是凡五十一年始列為諸侯初韓借師于魏以伐趙魏侯曰趙兄弟也不敢聞命趙借師以伐韓對亦如之二國皆怒已而知魏以講于已也皆朝于魏魏于是始大于韓趙魏侯與犀臣飲酒樂而天雨命駕將適野左右曰君將安之魏侯曰吾與虞人期獵雖樂豈可無一會期哉乃往身自罷之乎趙侯好音謂相國公仲連曰寡人有愛可以貴之連曰富之可貴之則否趙侯曰然鄭歌者槍石二人吾賜之田人萬畝連諾而不與趙侯屢問連乃稱疾不朝番吾君謂連曰君實好善而未知所持公仲亦有進士乎連曰未也曰牛畜荀欣徐越皆可連進之畜侍以仁義趙侯逌然明日欣侍以舉賢使能明日越侍以節財儉用察度功德趙侯悅乃謂連曰歌者之田且止以畜為師欣為中尉越為內史賜連衣二襲番吾即蒲吾故城在今正定府平山縣逌與攸同氣悅也是年九鼎震考金氏前編曰九鼎震大異也司馬氏通鑑始于是年而不書通鑑以人事為要也今從金氏説不另立綱附載于此己卯二十四年燕僖公元年王崩子驕立是為安王盜殺楚君當簡王之子聲王始考綱目于七國諸君提綱皆書君周亡稱王今依之其目及分注仍依通鑑之例從史文稱王國人立其子疑是為楚悼明年三晉伐之至乘邱注見前而還安王庚辰元年楚悼王疑元年新綱目安王以後其年或無事可紀而七國有君初立者則大書某年以某國某君元年分注今從之壬午三年秦惠公趙武侯韓烈侯取元年虢山崩壅河括地志虢山在陜州陜縣西二里臨黃河今河濵有岡阜似是頽山之餘陜縣即今河南陜州治甲申五年日食胡三省資治通鑑注書年而不書月與晦朔史失之也後同盜殺韓相俠纍俠纍與濮陽注見前嚴仲子有惡仲子聞軹今河南懷慶府濟源縣有軹縣故城戰國時軹邑人聶政衛大夫食采于聶因氏之勇以黃金百鎰為政母夀欲因以報仇政曰老母在政身未敢以輕許人也及母卒仲子乃使政刺纍纍方坐府上兵衛甚嚴政直入刺之因自皮面抉眼刺其靣出其眼令人不識韓人暴其尸于市購問莫能識姊嫈史記作榮聞而往哭之曰是軹深井里今濟源縣故軹城旁有深井堂即聶政所居聶政也以妾在故重自刑以絶蹤妾奈何畏沒身之誅終沒賢弟名遂死政尸旁乙酉六年鄭弒其君駘繻公鄭伯殺其相駟子陽子陽之黨遂弒鄭伯而立其弟乙是為康公甲午十五年魏吳起奔楚楚以為相魏侯文侯子名擊是為武侯浮西河括地志河在冀州西故名西河而下中流顧謂吳起曰美哉河山之固此魏國之寶也對曰在德不在險若君不修德舟中之人皆敵國也魏侯曰善久之魏相公叔害起譛之魏侯疑起起懼誅遂奔楚楚君楚悼王素聞其賢至則任之為相起明法審令捐不急之官廢公族疏逺者以養戰士要在強兵破遊説式芮反之言從將容反橫與衡通胡盲反者胡三省注南北曰從從者連南北為一西鄉以擯秦東西曰橫橫者離山東之交使之西鄉以事秦子是南平百越言非一種猶曰百蠻北卻三晉西伐秦諸侯皆患楚之疆而楚之貴戚大臣多怨起者後起竟為楚所殺悼王卒貴戚大臣作亂攻吳起殺之太子臧即位是為肅王討為亂者夷七十餘家事在王二十一年乙未十六年秦出公魏武侯擊趙敬侯章韓文侯元年初命齊大夫田和為諸侯考史記田和相齊凡二十七年是嵗始建國為齊侯元年初田和遷其君貸齊康公于海上食一城既而求為諸侯魏文侯為之請於王及諸侯事在王十三年王許之和立是為太公後齊康公卒無子田氏遂并齊事在王二十三年齊自太公望至康公凡二十八傳而為田氏所并魏襲趙邯鄲不克趙公子朝史記作翔作亂朝武侯子武侯卒國人立烈侯太子章是為敬侯朝以不立故亂不勝奔魏於是趙始都邯鄲朝與魏襲之敗還丙申十七年秦庶長改弒其君及其君母秦惠公卒子出子立亦曰出公史記秦靈公卒子獻公不得立立靈公季父悼子是為簡公簡公卒子惠公立惠公卒子出子立立二年庶長改迎靈公之子索隱名師隰於河西而立之是為獻公胡三省注靈公之卒獻公既不得立出居河西河西者黃河之西也殺出子及其母沈之淵旁時秦數亂益衰弱三晉侵奪其河西地丁酉十八年秦獻公師隰齊桓公午元年己亥二十年日食晝晦辛丑二十二年楚肅王臧元年癸卯二十四年齊威王因齊元年乙巳二十六年韓哀侯元年王崩子喜立是為烈王三晉共廢其君俱酒為家人索隱家人謂居家之人無官職也晉自幽公以後止有絳曲沃地至是魏韓趙共分之晉遂亡晉自叔虞受封至靖公凡三十八傳而為三家所並烈王丙午元年日食韓滅鄭徙都之鄭自桓公友受封至君乙凡二十三傳而滅韓初都陽翟注見前既滅鄭遂徙都焉丁未二年趙成侯種元年己酉四年燕桓公元年庚戌五年韓嚴遂史記作韓嚴弒其君哀侯韓侯以韓廆為相而愛嚴遂二人相害遂刺廆于朝並中韓侯國人立哀侯之子是為懿侯考吳師道戰國䇿補注聶政刺韓相嚴遂弒哀侯戰國䇿誤合二事為一司馬遷兩存而不決溫公通鑑從史記而不信國䇿故並載之今從通鑑辛亥六年魏惠王韓懿侯元年齊侯即齊威王來朝時王室微弱諸侯莫朝齊獨朝之天下以此賢齊侯初齊侯即位國人不治于是召即墨今山東萊州府平度州有即墨故城齊邑大夫語之曰自子居即墨毁言日至然吾使人視即墨田野闢人民給官無事東方以寧是子不事吾左右以求助也封之萬家召阿即柯邑注見前大夫語之曰自子守阿譽言日聞吾使人視阿田野不闢人民貧餒趙攻鄄即春秋鄄邑注見前子不救衛取薛陵今陽穀縣東北有薛陵城戰國齊邑子不知是子厚幣事吾左右以求譽也是日烹阿大夫及左右嘗譽者于是羣臣聳懼莫敢飾詐務盡其情齊國大治壬子七年楚宣王良夫元年日食王崩弟扁立是為顯王韓趙伐魏圍安邑魏武侯卒未立太子子罃與公中讀曰仲緩爭立國內亂公孫頎公孫以爵系為氏頎名也自趙入韓謂韓侯懿侯曰魏亂可取也韓侯乃與趙侯成侯合兵伐魏圍安邑趙侯曰殺罃立公中緩割地而退我二國之利也韓侯曰殺魏君暴也割地貪也不如兩分之魏分為兩不強於宋衛則我終無魏患矣趙人不聽乃解去罃遂殺公中緩而自立後僣號諡惠王顯王癸丑元年丁巳五年賜秦黼黻刺繡為斧形曰黼兩己相背曰黻之服先是秦敗魏韓之師於洛陽至是秦又敗三晉之師於石門山名一名白徑嶺在今山西解州東南左右壁立間不容軌謂之石門道通陜州亦曰白徑斬首六萬王於是賀秦賜以黼黻之服庚申八年秦孝公渠梁燕文公元年彗星見西方張守莭曰彗妖星光芒遍指如彗衛公孫鞅衛之庶孽入秦秦獻公卒子渠梁立是為孝公是時河山以東黃河華山之東強國六齊楚魏趙韓燕淮泗之間小國十餘宋魯鄒滕薛郳諸國楚魏與秦接界皆以夷翟遇秦擯斥之不得與中國之會盟秦伯孝公于是發憤修政令國中曰賔客羣臣有能出竒計強秦者吾且尊官與之分土衛公孫鞅聞之乃西入秦鞅好刑名之學既至秦因嬖臣景監景氏楚公族監甲暫反閹人也以求見説秦伯以富國強兵之術秦伯大説與議國事史記鞅初事魏相公叔痤痤知其賢未及進會病魏惠王往問之曰公叔如有不諱將奈社稷何公叔曰痤之中庶子衛鞅年雖少有竒才願君舉國而聽之王默然公叔曰君即不用鞅必殺之無使出境王許諾而去公叔召鞅謝曰吾先君而後臣故先為君謀後以告子子必速行矣鞅曰君不能用子之言任臣又安能用子之言殺臣卒不去既王謂左右曰公叔病甚悲乎欲令寡人以國聽衛鞅也既又勸寡人殺之豈不悖哉壬戌十年秦以衛鞅為左庶長定變法之令衛鞅欲變法秦人不悅鞅言於秦伯曰夫民不可與慮始而可與樂成論至德者不和於俗成大功者不謀於衆是以聖人茍可以強國不法其故甘龍甘氏商甘盤之後曰不然因民而教者不勞而成功緣法而治者吏習而民安之衛鞅曰常人安于故俗學者溺于所聞以此兩者居官守法可也非所與論于法之外也智者作法愚者制焉賢者更禮不肖者拘焉秦伯曰善乃以鞅為左庶長卒定變法之令令民為什五五家為保十家為連而相收司連坐收司相糾發也一家有罪九家舉發不糾發則十家連坐告姦者與斬敵首同賞匿姦者與降敵同罰民有二男以上不分異者倍其賦有軍功者各以率受爵率約數也猶言差也為私鬭者各以輕重被刑大小僇力本業耕織致粟帛多者復其身復除也謂除免其身役事末利謂工商及怠而貧者舉以為收孥謂收其妻子沒為官奴婢宗室非有軍功論不得為屬籍無戰功可論不得入宗屬之籍明尊卑爵秩等級各以差次名田占田也宅臣妾衣服以家次各隨其家爵秩之班次有功者顯榮無功者雖富無所芬華令既具未布恐民之不信乃立三丈之木於國都南門募民能徙置北門者豫十金民怪之莫敢徙復曰能徙者豫五十金一人徙之輒豫五十金乃下令令行期年民言新令之不便者以千數於是太子犯法鞅曰法之不行自上犯之太子君嗣也不可施刑刑其傅公子虔黥其師公孫賈明日秦人皆趨令行之十年秦國道不拾遺山無盜賊民勇于公戰怯于私鬭鄉邑大治秦民初言令不便者有來言令便鞅曰此亂法之民盡遷之於邊其後民莫敢議令癸亥十一年韓昭侯元年丙寅十四年齊魏會田于郊王幼學集覽郊縣屬沛郡一作洨今江南鳯陽府靈壁縣有洨縣故城亦曰濠城魏君魏惠王謂齊君齊威王曰齊亦有寶乎齊君曰無有魏君曰寡人國雖小尚有徑寸之珠照車前後各十二乘者十枚豈以齊大國而無寶乎齊君曰寡人之寶與君異吾臣有檀子齊公族食采于檀城因以為氏者使守南城城在齊南境故曰南城則楚人不敢南冦有盼子即田盼者使守髙唐注見前則趙人不敢東漁于河有黔夫齊有黔敖黔亦氏也者使守俆州注見前則燕趙之人徙而從者七千餘家有種首集覽種首名也史失其姓者使備盜賊則道不拾遺此四臣者將照千里豈特十二乘哉魏君有慚色丁卯十五年魏伐趙圍邯鄲楚使景舍救趙戰國䇿景舍謂楚王曰王少出兵以為趙援趙恃楚必與魏戰魏怒于趙而又見楚救不足畏也必不釋趙趙魏相敝而齊秦應楚則魏可破也楚王從之趙復請救於齊戊辰十六年齊伐魏以救趙魏克邯鄲還及齊戰敗績初孫臏孫武之後古刖刑曰臏孫子以刖足故呼為臏與龎涓畢公之後封于龎因氏焉俱學兵法涓仕魏為將軍自以能不及臏乃召之至則斷其足而黥之欲使終身廢棄齊使者至魏臏隂見之使者竊載以歸田忌齊之將客之進之齊君齊君問兵法遂以為師至是齊欲救趙使忌為將而臏居輜車安車也中坐為計謀忌欲引兵之趙臏曰夫解雜亂紛糾者不控拳言欲解雜亂紛糾之物當以手徐解之不持拳以擊之也救鬭者不搏撠言救鬬者當善撝解之母以手持撠刺人使其怒益熾批亢批擊亢喉也言擊其要處搗虛搗衝虛空也言攻其不備形格勢禁則自為解耳批亢搗虛則形相格而勢自止不能不解也今梁之輕兵鋭卒竭于外而老弱疲於內若引兵疾走其都彼必釋趙而自救是我一舉解趙之圍而收敝於魏也忌從之十月邯鄲降魏魏師還與齊戰于桂陵在今山東曹州府菏澤縣東北魏師大敗明年諸侯圍魏襄陵又明年魏歸趙邯鄲與趙盟漳水上韓冦東周取陵觀廩邱胡三省注戰國時周僅有七邑漢之河南洛陽穀城平隂偃師鞏緱氏是也王幼學某覽陵觀地名在兖州境一統志廩邱周邑名廩邱故城在今山東曹州府范縣庚午十八年韓以申不害申氏申侯之後不害鄭之賤臣為相不害學本于黃老而主刑名以其術千韓侯懿侯之子昭侯韓侯用以為相內修政教外應諸侯十五年終不害之身國治兵強戰國䇿昭侯有敝袴令藏之侍者曰君亦不仁者矣不賜左右而藏之昭侯曰吾聞明主愛一嚬一笑今袴豈特嚬笑哉吾必待有功者辛未十九年秦徙都咸陽今西安府咸寧縣東有渭城故城秦所都咸陽也三秦記地在九嵕之南渭水之北山水皆陽故曰咸陽始廢井田初秦獻公徙治櫟陽故城在今西安府臨潼縣東北至是衛鞅築冀闕冀記也記列教令于此門閥也宫廷于咸陽遂遷都焉令民父子兄弟同室內息止也者為禁秦俗父子兄弟同室居止鞅始禁之并諸小鄉聚集為縣縣置令丞廢井田開阡陌南北曰阡東西曰陌更賦稅之法井田既廢什一之制不復用乃始計畝而定賦壬申二十年趙肅侯語元年乙亥二十三年衛成侯遫貶號曰侯尹起莘發明衛故侯爵而云貶號曰侯何哉蓋春秋列國率皆僣號稱公如鄭伯邾子許男之類今焉衛之自貶特迫于勢之微弱求為取容之地耳初子思居衛言茍變于衛侯曰其材可將五百乘衛侯曰吾知其可將然變嘗為吏賦于民而食人二雞子故弗用也子思曰夫聖人之官人猶匠之用木也取其所長棄其所短故把梓連抱而有數尺之朽良工不棄今君處戰國之世選爪牙之士而以二卵棄干城之將此不可使聞于鄰國也衛侯再拜曰謹受教子思復言于衛侯曰君之國事將日非矣衛侯曰何故子思曰君出言自以為是而卿大夫莫敢矯其非卿大夫出言亦自以為是而士庶人莫敢矯其非君臣既自賢矣而臣下同聲賢之賢之則順而有福矯之則逆而有禍如此則善安從生乎戊寅二十六年致伯胡三省注伯如字周二伯九伯之任于秦秦使公子少官率諸侯來朝先是秦會諸侯于京師在王二十五年至是王致伯于秦諸侯畢賀秦使公子少官帥師會諸侯于逄澤括地志逢澤亦名逢池在浚儀縣東南祥浚儀故城在今河南開封府符縣朝王庚辰二十八年魏伐韓齊伐魏以救韓殺其將龎涓虜太子申魏使龎涓伐韓韓請救于齊齊用孫臏計臏曰韓魏之兵未弊而救之是吾代韓受魏之兵顧反聽命于韓也且魏有破國之志韓見亡必東面而訴于齊吾因深結韓之親而晚承魏之弊則可受重利而得尊名也齊君曰善隂許韓使而遣之韓因恃齊五戰不勝而東委國于齊齊因起兵以救韓田忌為將孫臏為師直走魏都龎涓聞之去韓而歸魏人亦大發兵使太子申將以禦齊師孫臏曰兵法百里而趨利者蹶上將五十里而趨利者軍半至謂前後不相屬半至半不至也乃使齊軍入魏地為十萬竈明日為五萬竈又明日為二萬竈龎涓行三日大喜曰我固知齊軍怯入吾境三日士卒亡者過半矣乃棄其步軍率輕鋭倍日並行逐之孫臏度其行暮當至馬陵在今直𨽻大名府元城縣東南馬陵道狹而旁多阻隘可伏兵乃斫大樹白而書之曰龎涓死此樹下令萬弩夾道而伏期日暮見火舉而俱發涓果夜至見白書以火燭之讀未畢萬弩俱發魏師大亂涓乃自刎曰遂成豎子之名齊因乘勝大敗魏師虜太子申辛巳二十九年秦衛鞅伐魏誘執其將公子卬敗之魏獻河西地注見前于秦徙都大梁今河南開封府戰國魏所都號為大梁秦封鞅為商君秦使衛鞅伐魏衛鞅言于秦君曰秦之與魏譬若人有腹心之疾非魏并秦即秦并魏魏往年大破于齊諸侯畔之可因此時伐魏魏不支秦必東徙然後秦據河山之固東鄉以制諸侯此帝王之業也秦君從之遂使鞅伐魏魏使公子卬將而禦之軍既相距鞅遺卬書曰吾始與公子歡今俱為兩國將不忍相攻欲與公子面相見盟樂飲而罷兵以安秦魏之民卬以為然乃與會盟而飲鞅伏甲襲卬虜之因大破魏師魏君恐獻河西地于秦以和遂去安邑徙大梁嘆曰吾恨不用公叔之言秦封鞅商於商今陜西商州故商城是於今河南南陽府淅川縣古於村是十五邑號曰商君壬午三十年楚威王商元年癸未三十一年秦人誅衛鞅滅其家秦孝公卒子駟立是為惠文君後僣稱王公子虔之徒告衛鞅欲反發吏捕之鞅出亡欲止客舍舍人曰商君之法舍人無驗者坐之鞅嘆曰為法之弊一至此哉去之魏魏人不受內之秦秦殺之車裂以徇盡滅其家鞅嘗謂趙良曰我治秦孰與五羖大夫賢良曰五羖大夫荆之鄙人也穆公舉之牛口之下而加之百姓之上相秦六七年而東伐鄭三置晉君一救荆禍其為相也勞不坐乘暑不張蓋及死秦國男女流涕童子不歌謡舂者不相杵今君之見也因景監以為王其從政也陵轢公族殘傷百姓公子虔杜門不出已八年矣君又殺祝歡而黥公孫賈詩曰得人者興失人者崩此數者非所以得人也君之出也後車載甲多力而駢脅者為驂乘持矛而操戟者旁車而趨書曰恃德者昌恃力者亡此數者非恃德也君之危若朝露而尚貪商於之富寵秦國之政畜百姓之怨亡可翹足而待鞅弗從居五月而難作甲申三十二年秦惠文王駟元年乙酉三十三年孟軻孟氏出魯軻騶人至魏是嵗魏君卑辭厚幣以招賢者于是孟子至梁具見孟子書魏君以孟子所言迂逺而濶於事情卒不能用丁亥三十五年齊魏相王初齊威王敗魏桂陵事具王十六年強于諸侯遂自稱為王以令天下至是魏君新立魏君罃卒子嗣立是為襄王會齊君于徐州注見前以相王魏王既僣號追尊其父為惠王後九年秦亦稱王惠文王又二年韓燕皆稱王獨趙武靈王不肯曰無其實焉取其名乎令國人謂已曰君後武靈王被弒趙亦稱王楚滅越越無疆句踐七世孫伐齊齊使人説之代楚楚人大敗之乘勝盡取吳故地東至于浙江即今錢塘江江有三源一出今衢州仙霞嶺為穀水一出金華府之盆山為東陽溪一出江南徽州府浙源山為漸江水三水合流為浙江亦曰曲江至錢塘縣入海故又名錢塘江越以此散諸公族爭立或為王或為君濵于海上漢之甌越閩越皆其後也甌越即東甌今浙江溫州府閩越今福建朝服于楚越自無余至允常史無世系允常之後八傳而滅戊子三十六年燕文侯趙肅侯韓宣惠王魏襄王齊是年威王卒子辟疆立是為宣王楚威王合從以擯秦以蘇秦蘇氏周蘇子之後秦洛陽人為從約長並相六國初蘇秦西至秦説秦以兼天下之術不用乃之燕説燕與趙從親蘇秦曰燕之所以不被兵者以趙之蔽其南也且秦攻燕戰于千里之外趙攻燕戰于百里之內夫不憂百里之內而重千里之外計無過于此者願王與趙從親天下為一燕必無患矣燕君從之資蘇秦車馬以説趙請一韓魏齊楚燕趙以擯秦蘇秦謂趙王曰當今之時山東之國莫強于趙秦之所害亦莫如趙而秦不敢舉兵伐趙者畏韓魏之議其後也秦攻韓魏無名山大川之限稍蠶食之傅國都而止韓魏不能支秦必入臣于秦秦無韓魏之規禍必中于趙矣臣以天下之圖案諸侯之地五倍于秦度諸侯之卒十倍于秦而衡人日夜以秦權恐喝諸侯使之割地以事秦秦成則其身富榮國被秦患而不與其憂願大王熟計之也且請令諸侯之將相會盟洹水源出河南彰德府林縣隆慮山徑安陽至內黃入于衛之上約曰秦攻一國則五國各出鋭師以撓秦或救之有不如約者五國共攻之則秦甲必不敢出函谷關名在今河南陜州靈寶縣南關城在谷中深險如函故名以害山東矣趙侯大恱厚賜賚之以約于諸侯會秦使公孫衍魏人仕于秦伐魏敗魏師禽其將龍賈龍氏出御龍氏取雕隂今陜西鄜州雕隂故城是且欲東兵蘇秦恐敗從約念莫可用于秦者乃激怒張儀魏人入之于秦儀始嘗與蘇秦俱事鬼谷先生學縱橫術蘇秦自以為不及也儀方困于楚故召而辱之儀怒遂入秦蘇秦隂遣舍人齎金幣資儀儀得見秦王秦王恱之以為客卿舍人辭去曰蘇君憂秦伐趙敗從約以為非君莫能得秦柄故激怒君使臣隂奉君資盡蘇君計也張儀曰嗟乎此吾在術中而不悟吾不及蘇君明矣為我謝蘇君蘇君之時儀何敢言于是蘇秦説韓蘇秦曰韓地方九百餘里天下之強弓徑弩利劍皆從韓出以韓卒之勇披堅甲跖徑弩帶利劍一人當百不足言也而大王割地事秦諺日寧為雞口無為牛後以大王之賢挾強韓之兵而有牛後之名竊為大王羞之韓從其言説魏蘇秦曰大王之地方千里武士蒼頭奮擊各二十萬厮徒十萬車六百乘騎五千匹乃聽于羣臣之説而欲臣事秦臣願大王熟計之也武士武卒也蒼頭晉灼曰其軍著青帽也厮徒取薪之卒魏聽之又説齊蘇秦曰齊四塞之國地方二千餘里帶甲數十萬粟如邱山臨淄之塗車擊轂人摩肩連袵成帷揮汗成雨夫韓魏之所以重畏秦者為與秦接境也秦之攻齊倍韓魏之地過衛陽晉之道經亢父之險欲深入則恐韓魏之議其後是故恫疑虛喝驕矜而不敢進則秦之不能害齊亦明矣夫不料秦之無奈齊何而欲西面事之是羣臣之過計也今陽晉衛地今曹州府鄆城縣有陽晉城亢父齊地兖州府濟寧州有亢父故城漢于此置縣後廢及楚蘇秦曰楚地方六千餘里帶甲百萬粟支十年此霸王之資也秦之所害莫如楚楚強則秦弱秦強則楚弱其勢不兩立從親則諸侯割地以事楚衡合則楚割地以事秦此兩䇿者相去逺矣大王何居焉皆許之于是蘇秦為從約長并相六國北報趙車騎輜重擬于王者己丑三十七年燕易王韓宣惠王齊宣王辟疆元年秦以齊魏之師伐趙蘇秦去趙適燕從約解秦使公孫衍欺齊魏與共伐趙敗從約趙侯讓蘇秦秦恐請使燕必報齊乃去趙而從約皆解壬辰四十年宋公弟偃逐其君剔成而自立剔成宋昭公事見前之元孫也立四十一年其弟偃攻襲之剔成敗奔齊偃遂自立為君偃既立後僣號稱王在慎靚王三年癸巳四十一年楚懷王槐元年秦張儀伐魏取蒲陽即蒲坂注見前既而歸之魏盡入上郡今陜西延安府榆林府及綏德州戰國初魏上郡地以謝秦以儀為相先是魏以隂晉即華隂今縣屬陜西同州府為和于秦在王三十七年既而秦伐魏在王三十九年魏獻少梁今同州府韓城縣魏少梁邑地未幾秦又伐魏在王四十年取汾隂故城在今蒲州府榮河縣北皮氏故城在今山西絳州河津縣西拔焦即春秋焦瑕戰國初屬魏至是張儀為秦客卿將兵伐魏取蒲陽請秦復以與魏而使公子繇質焉儀因説魏曰秦之遇魏甚厚魏不可無禮于秦魏因盡入上郡十五縣以謝秦儀遂為秦相明年秦歸魏焦後張儀復伐魏取陜丙申四十四年趙武靈王雍元年是嵗秦稱王丁酉四十五年蘇秦自燕奔齊蘇秦通于燕文公之夫人燕文公卒子易王立在位三十六年燕君知之蘇秦恐説燕君曰臣在燕不能使燕重而在齊則燕重燕君許之乃偽得罪于燕而奔齊齊以為客卿秦説齊髙宫室大苑囿以明得意欲以敝齊而為燕後齊大夫與蘇秦爭寵使人刺殺之事在慎靚王四年戊戌四十六年秦相張儀免出相魏是年韓燕皆稱王儀相魏欲令魏事秦而諸侯效之魏王不聽秦于是伐魏取曲沃今河南陜州有曲沃鎮戰國魏地非晉都曲沃也平周邑名在今山西汾州府介休縣隂厚儀益甚庚子四十八年王崩子定立是為慎靚王齊號薛公即薛國注見前田文為孟嘗君初齊王封田嬰于薛號靖郭君嬰有子四十餘人其賤妾之子曰文通儻饒智略説嬰以散財養士嬰使文主家待賔客賔客爭譽其美嬰遂以為嗣及嬰卒文嗣立號孟嘗君招致諸侯遊士及有罪亡人食客常數千人名重天下司馬氏光曰君子之養士以為民也今田文盜君之祿以立私黨張虛譽上侮其君下蠧其民是姦人之雄耳烏足尚哉慎靚王辛丑元年燕王噲元年衛更貶號曰君衛介秦魏之間日益削弱至嗣君時獨有濮陽注見前之地因更貶號曰君嗣君好察微隱縣令有發褥而席弊者嗣君聞之乃賜之席令大驚以君為神又使人過關市賂之以金既而召關市問有客過與汝金汝回遣之謂還其金也關市大恐又愛泄姬姬姓泄音薛重如耳如姓耳名魏大夫後仕衛而恐其因愛重以壅已也乃貴薄疑薄姓疑名也以敵當也如耳尊魏妃以偶匹也泄姬曰以是相參謂相參列也衛有胥靡亡之魏嗣君以五十金買之不得以左氏易之左右曰以一城買一胥靡可乎嗣君曰治無小亂無大法不立誅不必雖有十左氏無益法立誅必雖失十左氏無害也壬寅二年孟軻適齊竹書紀年梁惠王三十六年改元一年後十六年薨司馬氏通鑑朱子綱目皆從之故于是年書魏君罃卒孟子去魏適齊考史記年表及魏世家皆云魏惠王三十六年薨子襄王立邵子經世書從史記而不取竹書王氏幼學亦以紀年之書多偽謬不可信今從經世書齊王問齊桓晉文之事孟子對以保民而王説具孟子書癸卯三年魏哀王元年楚趙魏韓燕伐秦攻函谷秦出兵逆之五國皆敗走明年秦大敗韓師于修魚即春秋蕭魚注見前斬首八萬諸侯震恐甲辰四年魏請成于秦張儀歸復相秦張儀説魏王曰諸侯之約從盟洹水之上結為兄弟以相堅也今親兄弟同父母尚有爭錢財相殺傷而欲恃反覆蘇秦之餘謀時蘇秦已為齊所殺其不可成亦明矣大王不事秦秦下兵攻河外據卷今河南懷慶府原武縣戰國魏卷邑衍張守莭曰在鄭州酸棗故城在令河南衛輝府延津縣北劫衛取陽晉注見前則趙不南梁不北而從道絶矣大王之國雖欲無危不可得也魏王乃倍從約而因儀以請成于秦儀歸復相秦乙巳五年秦伐蜀今四川成都府古蜀國黃帝所封歷夏商周世為侯伯周哀蜀蠶叢始稱王取之巴注見前蜀相攻初蜀王封其弟于漢中號曰苴侯苴侯與巴為好而巴與蜀為讎蜀王伐苴侯苴侯奔巴故相攻俱告急于秦司馬錯周程伯休父為司馬以官為氏其後裔散處列國請伐蜀張儀曰不如伐韓時韓方侵秦下兵三川伊洛及河為三川秦置三川郡漢改為河南今河南之河南府是也攻新城今河南府洛陽縣有新城故城宜陽今縣屬河南府以臨二周東西周之郊據九鼎按圖籍挾天子以令天下天下莫敢不聽此王業也司馬錯曰不然臣聞欲富國者務廣其地欲強兵者務富其民欲王者務廣其德三資者備而王隨之矣夫蜀西僻之國戎翟之長也得其地足以廣國取其財足以富民而又有禁暴止亂之名是我一舉而名實附也不如伐蜀秦王從之起兵伐蜀十月取之蜀王敗死後秦并滅巴苴秦以益強富厚輕諸侯燕君噲易王子以國讓其相子之燕相子之與蘇秦之弟代婚欲得燕權代使齊而歸燕王問曰齊王其霸乎對曰不能燕王曰何故對曰不信其臣于是燕王専任子之子之又使鹿毛夀鹿一作厝謂燕王曰人謂堯賢者以其能讓天下也今王以國讓子之是王與堯同名也燕王因屬國于子之并收吏印綬自三百石以上而效之子之效呈也以印呈與子之子之南面行王事噲老不聽政顧為臣丙午六年王崩子延立是為赧王赧王丁未元年齊伐燕取之醢子之殺故燕君噲燕子之為王三年國內大亂將軍市被市姓被名與太子平謀攻子之齊王使人誘之且許為助平使市被攻子之不克被反攻平國人連戰數月死者數萬人齊王使章子即匡章見孟子伐燕燕士卒不戰城門不閉齊人取子之醢之遂殺王噲齊王問孟子及沈同陳賈語詳孟子書不具載是嵗齊宣王卒子地立是為湣王孟軻去齊是時天下方務于合從連橫以攻伐為賢而孟子獨述唐虞三代之德是以所如者不合退而與萬章萬氏芮伯萬之後之徒序詩書述仲尼之意作孟子七篇戊申二年齊湣王地元年楚屈丐伐秦秦欲伐齊患其與楚從親乃使張儀説楚王懷王曰大王誠能閉關絶約于齊臣請獻商於注見前之地六百里使秦女得為大王箕帚之妾楚王悅而許之羣臣皆賀陳軫獨弔楚王怒軫曰秦之所以重楚者以其有齊也今絶齊則楚孤秦奚貪夫孤國而與之地六百里哉儀至秦必負王是北絶齊交而西生患于秦也兩國之兵必俱至矣王曰願子閉口無復言乃厚賜張儀而閉關絶約于齊使一將軍隨張儀至秦儀詳讀田佯墮車不朝三月楚王聞之曰儀以寡人絶齊未甚邪乃使勇士宋遺借宋之符閉關絶約信使不通故借宋符以逹北罵齊王齊王大怒折節而事秦齊秦之交合儀乃朝見楚使者曰子何不受地自某至某廣袤六里使者還報楚王大怒陳軫請楚王賂秦以一名都與之并力而攻齊是亡地于秦而取償于齊也王又不聼使屈丐帥師伐秦秦亦發兵擊之明年秦大敗楚師于丹陽胡三省注此丹陽謂丹水之陽也班志丹水出上洛冢嶺山東至析入鈞水地在武關之外秦楚交戰當在此至上洛今商州冢嶺山在州西北丹水出其南下流南陽浙川縣入均水均即鈞也虜屈丐遂取漢中胡三省注自沔陽至上庸皆楚漢中地庸沔陽今陜西漢中府沔縣上今湖北鄖陽府竹山縣楚復襲秦又大敗于藍田今縣屬陜西西安府韓魏襲楚楚割兩城以和于秦己酉三年燕人立太子平為君是為昭王燕王即位于破燕之後弔死問孤與百姓同甘苦卑身厚幣以招賢者問郭隗郭氏出于郭公曰齊因孤之國亂而襲破燕孤極知燕小力少不足以報然誠得賢士與共國以雪先王之耻孤之願也先生視可者得身事之隗曰古之人君有以千金使涓人官名韋昭曰即中涓也求千里馬者馬己死買其骨五百金而返君大怒涓人曰死馬且買之况生者乎馬今至矣不期年而千里馬至者三今王必𣣔致士先從隗始况賢于愧者豈逺千里哉于是燕王為隗改築宫而師事之于是士爭趨燕樂毅自魏往劇辛自趙往燕王以樂毅為亞卿任以國政樂毅樂羊之後劇姓辛名庚戌四年燕昭王平韓襄王倉元年秦使張儀説楚懷王韓齊湣王地趙武靈王雍燕連衡以事秦秦君卒惠王卒子蕩立是為武王諸侯復合從秦王使告楚王請以武關秦之南關即春秋少習也在今陜西商州東之外易黔中地今湖南之常德辰州永順貴州之黎平思南諸府皆楚黔中地楚王曰不願願得張儀而獻黔中儀請行秦王曰楚將甘心于子奈何行儀曰秦強而楚弱大王在楚不宜敢取臣且臣善其嬖臣靳尚靳姓尚名尚得事幸姬鄭袖戰國策作褎古字也袖之言王無不聽者遂往楚王囚儀將殺之靳尚謂鄭袖曰秦王甚愛張儀將以六縣及美女贖之王重地尊秦秦女必貴而夫人斥矣于是袖日夜泣于王曰臣各為其主耳今殺張儀秦必大怒妾請子母俱遷江南母為秦所魚肉也王乃赦儀而厚禮之儀因説楚王事秦儀曰夫為從者無以異于驅羣羊而攻猛虎不格明矣今王不事秦秦自巴蜀治船積粟浮岷江而下一日行五百里不十日而距扞關扞關驚則黔中巫郡非王之有又舉甲而出武關則北地絶夫秦之攻楚危在三月之內而楚待諸侯之救在半嵗之外此臣所以為大王患也大王誠聽臣請令秦楚長為兄弟之國郡岷江即大江扞關在今湖北宜昌府長陽縣西巫今四川夔州府巫山縣有巫縣故城即楚巫郡楚王己得儀而重出地乃許之時屈原方使齊歸諫楚王曰何不誅張儀王悔使人追儀弗及屈原名平屈氏族儀遂之韓説韓王事秦而攻楚儀謂韓王曰韓地險惡山居國無二嵗之食見卒不過二十萬而秦兵百餘萬大王不事秦秦下甲據宜陽塞成臯則王之國分矣為大王計莫如事秦而攻楚以轉禍而悅秦韓王許之儀歸報秦封以六邑復使東説齊儀謂齊王曰從人説大王者必曰齊蔽于三晉地廣民衆兵強士勇雖有百秦將無奈齊何大王賢其説而不計其實今秦楚嫁娶為昆弟之國韓獻宜陽梁效河外趙割河間大王不事秦秦驅韓梁攻南地悉趙兵指慱關臨淄即墨非王有也府河間趙地今直𨽻河間府是博關在今山東東昌博平縣西北徐廣曰博平亦謂之博關是也西説趙儀謂趙王曰大王收率天下以擯秦秦兵不敢出函谷關者十五年心含忿怒久矣今有敝甲凋兵軍于澠池願渡河踰漳據番吾會邯鄲之下謹使臣先聞左右今楚與秦為昆弟韓梁稱藩臣齊獻魚鹽之地此斷趙之右肩也夫斷右肩而與人鬬失其黨而孤居欲求無危得乎臣竊為大王計莫若與秦約為兄弟之國也澠池戰國韓邑後入秦漢置縣今縣屬河南府餘注俱見前皆許之又北説燕儀謂燕王曰趙已效河間大王不事秦秦下甲雲中九原驅趙攻燕則易水長城非王之有矣雲雲中故城在今歸化城西元和志趙雲中城秦漢中郡也九原故城在今吳喇忒旗北水經注九原城南面長河北背連山是也易水有三皆出今易州其自定興西南合拒馬河者曰中易在定興西為涉河者曰北易徑安肅歷安州新安為雹河者曰南易燕王請獻常山即恆山在今山西大同府渾源州漢以文帝諱改名之尾五城以和儀歸報未至而秦王薨太子立太子素不悅張儀諸侯聞之皆畔衡復合從辛亥五年秦武王蕩元年秦張儀復出相魏張儀詭説秦王武王而相魏一嵗卒儀與蘇秦皆以從橫之術逰諸侯致位富貴天下爭慕效之又有魏人公孫衍號犀首魏官名衍嘗為此官故稱焉及蘇代蘇厲皆蘇秦弟陳軫初與張儀俱事秦惠王後去秦之楚樓緩樓氏把東樓公之後之徒紛紜遍于天下務以辨詐相髙不可勝紀而儀秦衍最著壬子六年秦初置丞相應劭曰丞承也相助也荀悅曰秦本次國命卿二人故置左右丞相以樗里疾秦惠王之弟所居有大樗樹故號樗里子滑稽多智秦人又號曰智囊甘茂下蔡人為左右丞相癸丑七年秦甘茂伐韓宜陽秦王使甘茂約魏以伐韓茂至魏乃使人還謂秦王曰魏聽臣矣然願王勿伐秦王迎茂息壤史記正義秦邑名而問其故對曰宜陽大縣其實郡也今倍數險謂函谷及三崤之險行千里攻之難魯人有與曾參同姓名者殺人人告其母母織自若也及三人告之其母投杼下機踰墻而走臣之賢不若曾參王之信臣不如其母疑臣者非特三人臣恐大王之投杼也魏文侯令樂羊攻中山三年拔之返而論功文侯示之謗書一篋樂羊再拜稽首曰此非臣之功君之力也今臣羈旅之臣也樗里子公孫奭挾韓而議之王必聽之是王欺魏王而臣受公仲侈韓之相之怨也故臣願王勿伐秦王曰寡人勿聽也乃與盟于息壤茂攻宜陽五月而不拔樗里疾公孫奭果爭之秦王欲罷兵茂曰息壤在彼秦王乃悉起兵佐茂遂拔宜陽甲寅八年秦君蕩卒弟稷立是為昭襄王母芈氏楚女號芈八子是為宣太后治國事以舅魏冉即穰侯宣太后異父弟為將軍秦王好以力戲力士多至大官與孟説舉鼎絶脈史記作臏而薨胡三省注史記甘茂傳秦武王至周而卒于周蓋舉鼎者舉九鼎也無子諸弟爭立異母弟稷為質于燕魏冉與國人迎而立之冉自惠王武王時任職用事及稷立年少太后治事以冉為將軍衛咸陽後二年庶長壯庶長名壯及大臣諸公子作亂冉誅之及惠文后昭襄王嫡母皆不得良死又逐悼武后武王之后出歸于魏王兄弟不善者皆滅之威振秦國乙卯九年秦昭襄王稷元年丙辰十年彗星見戊午十二年彗星復見齊韓魏伐楚楚使太子橫質于秦秦救之初楚與齊韓合從既而秦楚盟于黃棘即棘陽故城在今河南南陽府新野縣東北秦復與楚上庸事在王十一年齊韓魏以楚負約合兵伐之楚王使其太子橫為質于秦秦人救之三國引去楚太子在秦私與秦大夫鬭殺之亡歸在王十三年于是秦會韓魏齊兵伐楚殺其將唐昧在王十四年唐以國為氏昧名明年秦芈戎即華陽君宣太后同父弟華陽秦縣復伐楚殺其將景缺取襄城注見前楚王恐使太子為質于齊以請平庚申十四年日食晝晦壬戌十六年趙君廢其太子章傳國于少子何自號主父何立是為惠文王趙君已立長子章為太子後納吳廣吳以國為氏廣名之女孟姚有寵生子何愛之欲及其生而立之乃廢章而傳國焉使肥義肥以鄉為氏義名為相傅何自號主父先是主父與肥義謀變服騎射以令百姓北略中山西至榆中榆中即古榆溪塞在今陜西榆林府西北邊外至是使子治國事而已西北略地將從雲中九原注俱見前南襲咸陽于是詐為使者入秦欲以觀秦地形及秦王之為人秦王不知己而怪其狀甚偉非人臣之度使人逐之主父行已脫關矣秦人大驚秦伐楚誘楚君槐于武關執之以歸楚人立太子橫是為頃襄王秦伐楚取八城秦王乃遺楚王書曰始寡人與王約為兄弟盟于黃棘太子入質至歡也太子陵殺寡人之重臣不謝而亡去寡人誠不勝怒使兵侵君之邊今願與君王會武關面相約結盟而去楚王欲往恐見欺欲不往恐秦怒屈平曰秦虎狼之國不可信不如無行王稚子子蘭勸王行王乃入秦秦令一將軍詐為王伏兵武關劫之與西至咸陽要以割地楚王怒不許遂留之時楚太子橫為質于齊楚大臣相與謀乃詐赴于齊齊歸楚太子楚人立之初屈平為楚左徒楚官名志潔行芳明于治體楚王懷王甚任之後以讒見疏上官大夫心害其能因讒之而眷顧不忘作離騷班固曰離遭也顔師古曰擾動曰騷朱子楚辭注班顔之説是也之辭以自怨冀君之一悟而終不悟也其後子蘭頃襄王立以子蘭為令尹又譛之于王王怒遷之江南平遂懷石自投汨羅江名在今湖南長沙府湘隂縣北西流入湘以死秦以齊田文為丞相秦王聞文賢使其弟悝即涇陽君涇陽故城在今甘肅平涼府為質于齊請文入秦以為丞相癸亥十七年楚頃襄王橫趙惠文王何元年田文自秦逃歸或謂秦王曰田文相秦必先齊而後秦秦其危哉王囚文欲殺之文使人求解于王之幸姬姬欲其狐白裘而文先已獻于秦王文客有善為狗盜者盜裘以獻姬言于王而遣之王後悔使追之文至關關法雞鳴乃出客時尚蚤追者將至客有善為雞鳴者野雞皆應之文乃脫歸初孟嘗君將入秦以蘇代諫而止後齊湣王卒遣之行既而湣王不自得及孟嘗君歸遂以為相齊韓魏伐秦敗其軍于函谷關秦割河東三城今山西平陽府戰國河東地先屬魏後入于秦以和田文怨秦與韓魏攻之入函谷秦王使公子池以河東三城講于三國初田文欲借兵食于西周史記王赧時東西周分治王赧徙都西周索隱西周河南東周鞏也蘇代為西周謂文曰君攻楚九年取宛即今南陽縣屬河南南陽府葉今縣屬南陽府春秋沈諸梁邑以北以強韓魏今復攻秦以益之韓魏南無楚憂西無秦患則齊危矣君不如臨函谷而無攻令敝邑以君之情謂秦王曰薛公必不破秦以強韓魏其攻秦也欲王之令楚割東國以與齊而秦出楚王以為和也文從其計會公子池求講解遂罷兵而秦卒不出楚王趙君封弟勝為平原君勝封于東武城號平原君非封于平原也東武城即今山東東昌府武城縣平原今縣屬山東濟南府勝喜賔客至者蓋數千人公孫龍趙人善為堅白同異之辨龍嘗著守白論堅白即守白堅執其説而守之也同異合異以為同也勝厚遇之孔子之元孫穿字子髙自魯適趙與龍論臧三耳減即臧獲之臧兩耳形也兼聽而言可得為三猶莊子雞本二足以有運而行者是為三矣龍甚辨析穿弗應明日平原君問穿穿曰幾能令臧三耳矣然謂三耳甚難而實非也謂兩耳甚易而實是也不知君將從易而是者乎其亦從難而非者乎勝無以應謂龍曰公無復與孔子髙辨事也其人理勝于辭公辭勝于理辭勝于理終必受詘乙丑十九年楚君槐卒于秦楚王槐自秦走趙趙不納秦追及之以歸遂發病薨秦人歸其喪楚人憐之如悲親戚諸侯由是不直秦丙寅二十年魏昭王遫韓釐王咎元年趙滅中山先是趙主父伐中山中山君奔齊事在王十四年至是以燕齊之師滅之歸大赦酺布也布惠大飲酒也五日趙故太子章作亂公子成李兌誅之遂弒主父于沙邱即沙邱臺紂所築注見前主父封長子章于代使田不禮相之李兌謂肥義曰章黨衆而欲大不禮忍殺而驕二人相得必有隂謀子何不稱疾不朝毋為禍梯不亦可乎義曰昔主父以王屬義曰毋變而度毋易而慮堅守一心以沒而世義再拜受而籍之諺曰死者復生生者不愧吾欲全吾言安得全吾身乎李兌涕泣而出肥義謂信期即髙信信音申曰公子章田不禮聲善而實惡內得主而外為暴矯令以擅一旦之命不難為也自今有召王者必見吾面我將以身先之時吳娃即孟姚死王愛弛嘗朝羣臣主父從旁窺之見故太子傫然也謂疲病北面詘于其弟心憐之欲分趙而王章于代計未決主父及王逰沙邱異宫異宫而處公子章田不禮作亂詐以主父令召王肥義先入殺之公子成李兌起兵距難章敗走主父所成兌因圍主父宫殺章及不禮而滅其黨成兌相與謀曰以章故圍主父即解兵吾屬夷矣乃遂圍之令宫中人後出者夷主父欲出不得探雀鷇而食之三月餘餓死戊辰二十二年魏韓伐秦秦左更秦爵十四曰左更白起白氏出秦大夫白乙丙起郿人考楚有白公其後以邑為氏此又别為一氏敗之拔五城魏與韓伐秦魏冉薦左更白起于秦王時丹代樓緩為丞相使將兵敗二國之師于伊闕注見前斬首二十四萬拔五城以起為國尉秦官名己巳二十三年楚君迎婦于秦先是楚人既立太子為王告于秦曰賴社稷神靈國有君矣秦王怒伐楚取十六城在王十七年至是秦王遺楚王書曰楚倍秦秦且率諸侯伐楚願飭士卒得一樂戰言得一戰以快其意楚王患之乃復與秦和親司馬氏光曰甚矣秦之無道也殺其父而劫其子楚之不競也忍其父而昏其讎嗚呼楚之君誠得其道臣誠得其人秦雖強烏得陵之哉故荀卿論之曰夫道善用之則百里之地可以獨立不善用之則楚以六千里而為讎人役信哉辛未二十五年東周君注見前如秦是年魏入河東地胡三省注安邑蒲阪瀕河之地四百里韓入武遂史記正義本韓邑近平陽秦取之復以與韓後韓仍獻于秦地二百里于秦癸酉二十七年秦君稱西帝遣使立齊君為東帝已而皆去之秦王欲約齊伐趙乃自稱西帝而遣使立齊為東帝蘇代自燕至齊齊王問曰秦使致帝何如對曰願王受之而勿稱以收天下之望所謂以卑為尊也齊王從之稱帝二日而復歸之秦亦去帝號乙亥二十九年齊滅宋宋自微子受封至玉偃凡三十二傳而滅宋有雀生劉向説苑作鸇鷂屬史占之曰吉小而生巨必霸天下王偃喜起兵滅滕滕自叔繡受封三十一傳而滅敗齊楚魏取地數百里乃愈自信其霸欲霸之亟成射天笞地斬社稷而焚滅之為長夜之飲于室中室中人呼萬嵗則堂上之人應之堂下之人應之門外之人又應之至于國中無敢不呼者天下謂之桀宋齊伐之民散城不守王偃走死溫即周溫邑注見前丁丑三十一年燕上將軍樂毅以秦魏韓趙之師伐齊入臨淄今縣屬山東青州府齊君地出走其相淖齒弒之毅下齊七十餘城燕封毅為昌國君今山東濟南府淄川縣有昌國故城毅所封齊王滅宋而驕南侵楚西侵三晉欲並二周為天子狐咺陳舉諫皆殺之燕王乃謀伐齊樂毅曰齊霸國之餘業地大人衆未易獨攻也王必欲伐之莫如約趙及楚魏于是使毅約趙嚪以利誘也秦連楚及魏諸侯害齊王之驕暴皆許之燕悉起兵以毅為上將軍秦尉斯離帥師與三晉之師會之并將秦魏韓趙之兵以伐齊戰于濟西濟水之西齊師天敗毅還秦韓之師分魏師以略宋地部趙師以收河間遂長驅深入劇辛曰齊大燕小賴諸侯之助以破其軍宜及時攻取其邊城以自益今過而不攻以深入為名無損于齊而結深怨後必悔之樂毅曰齊王政令虐戾百姓怨懟今軍皆破亡因而乘之其民必叛若不遂乘之待彼悔前之非改過恤下而撫其民則難慮也乃進軍齊國果大亂齊王出走先亡之衛衛君辟宫舍之稱臣共具齊王不衛人侵之去奔鄒魯又有驕色鄒魯不納遂走莒樂毅入臨淄取寶物祭器輸之于燕燕王親至濟上勞軍行賞封毅為昌國君留徇齊城末下者楚使淖齒將兵救齊因為齊相齒欲與燕分齊地遂執齊王而弒之齒數齊王曰千乘博昌之間雨血沾衣王知之乎曰知之贏博之間地拆及泉王知之乎曰知之有人當闕而哭求之不得去則聞其聲王知之乎曰知之齒曰雨血者天以告也地拆者地以告也當闕而哭者人以告也而王不戒焉何得無誅遂擢王筋懸之廟梁宿昔而死縣千乘齊邑漢為郡并置縣故城在今青州府髙苑博昌亦齊邑漢為縣故城在今青州府博興縣贏博齊二邑名漢皆置縣故城俱在今泰安府樂毅聞畫邑畫一作澅音獲故城在今青州府臨淄縣西北人王蠋一作歜賢令軍中環畫邑三十里無入使人請蠋蠋謝不往燕人曰不來吾且屠邑蠋曰忠臣不事二君烈女不更二夫國破君亡吾不能存而又欲劫之以兵與其不義而生不若死遂自經絶脰而死毅整軍禁侵掠禮逸民寬賦斂除暴令修舊政祀桓公管仲于郊封王蠋之墓齊民喜悅六月之間下齊七十餘城皆為郡縣秦魏韓會于京師秦王與魏王會宜陽又與韓王會新城注見前遂胥會于西周會而不朝王戊寅三十二年齊人討殺淖齒而立其君之子法章是為襄王保莒城齊東境邑左傳陳桓子請老于莒是也非莒國之莒淖齒之亂齊湣王太子法章變姓名為莒太史敫音皎莒人太史氏也家傭雇作也敫女竒法章狀貌憐而竊衣食之因與私通湣王從者王孫賈失王處而歸其母曰汝朝出而晚來則吾倚門而望汝暮出而不還則吾倚閭里門也而望汝今事王王走汝不知其處尚何歸焉賈乃入市呼曰淖齒亂齊國殺王欲與我誅之者袒右市人從者四百人與攻淖齒殺之于是齊亡臣相與永湣王子欲立之法章疑懼久之乃敢自言遂立以為齊王保莒城以拒燕布告國中曰王已立在莒矣胡氏三省曰其時樂毅以燕中軍鎮臨淄法章已立而保莒田單自安嚴保即墨奔敗之餘猶可置之不問法章布告國中自言已立在莒安可坐而不問乎後人論樂毅以為善藏其用吾未敢以為然也趙使藺相如韓厥之後仕趙食采于藺因氏焉獻璧于秦趙得楚和氏璧卞和之玉秦王請易以十五城趙欲勿與畏秦強欲與之恐見欺以問藺相如相如初為謁者繆賢舍人趙王求可使秦者賢薦之對曰以城求璧而不與曲在我矣與之璧而不與我城則曲在秦臣願奉璧而往城不入臣請完璧而歸王遣之相如至秦既獻璧視秦王無意償趙城乃紿取璧使從者懷之間行歸趙而以身待命于秦秦王曰殺相如終不能得璧而絶秦趙之歡不如因而厚遇之乃廷見相如禮而遣之相如歸趙以為上大夫庚辰三十四年楚謀入冦王使東周公武公喻止之楚約齊韓共伐秦因欲圖周王使東周公謂楚令尹昭子曰西周之地不過百里而名為天下共主裂其地不足以肥國得其衆不足以徑兵而攻之者名為弒君然而猶有欲攻者以祭器在焉故也夫虎肉臊而兵利身人猶攻之劉伯莊曰虎之爪牙如利刃在身其肉雖臊而人猶攻之者以其皮之所在也若使澤中之麋蒙虎之皮人之攻之必萬倍矣裂楚之地足以肥國詘楚之名足以尊主今子欲誅殘天下之共主居三代之傳器器南則兵至矣于是楚計不行辛巳三十五年秦伐趙及楚秦白起伐趙取代光狼城在今山西澤州府髙平縣司馬錯伐楚㧋黔中注見前楚獻漢北胡三省注漢水以北究葉隨鄧之地及上庸注見前地明年白起復伐楚取鄢鄧注俱見前西陵今湖北宜昌府楚西陵地御批歷代通鑑輯覽卷九

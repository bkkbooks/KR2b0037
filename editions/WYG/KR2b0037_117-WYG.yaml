body:
  text: 欽定四庫全書御批厯代通鑑輯覽卷一百十八附明唐桂二王本末桂王一丙戊我大清世祖章皇帝順治三年冬十一月故明兵部尚書丁魁楚兵部侍郎瞿式耜等以桂王由榔明神宗孫桂王常瀛次子稱號於肇慶初桂王常瀛卒於梧州長子安仁王由􅀈襲封未幾病卒由榔當嗣爵㑹唐王聿鍵敗死報至粤中故明總督尚書丁魁楚侍郎瞿式耜廵按御史王化澄與舊臣吕大器李永茂晏日曙湯來賀董天閎朱治􅍀周鼎瀚方以智朱容藩林佳鼎程源等議所立乃共推由榔桂太妃王氏曰諸君何患於無君吾兒仁柔願更擇可者魁楚等請益堅遂以十月十四日稱監國于肇慶以魁楚大器式耜並為大學士魁楚兼戎政尚書大器兼兵部尚書式耜兼吏部右侍郎永茂請終制化澄以下進爵有差未幾聞大兵已破贛州司禮太監王坤即王肇基崇禎朝監餉宣府大作威福屢為言官所劾福王時奔南亰福王敗復入閩唐王聿鍵棄不用又入粤事由榔命掌司禮監遂擅政事倉卒奉由榔奔梧州式耜等力爭不得時大學士蘇觀生奉唐王聿鍵命募兵南安亦退入廣州遣職方主事陳邦彦字令斌順徳人奉表勸進甫入謁而觀生在廣州别議立唐王聿􅟽事具後邦彦不知也夜二鼓由榔召入舟中魁楚侍語以廣州事邦彦請急還肇慶正大位以繫人心命南雄勍卒取韶制粤東十郡之七而委其三于唐王代我受敵從而承其敝由榔大悦魁楚式耜等乃定議迎由榔復還肇慶十一月十八日遂稱尊號改年永厯以肇慶府署為行宫臣等謹案前代宦官之禍至明最烈始于王振而極于魏忠賢履霜堅冰其漸已非一日桂王當大厦既傾親見宗邦淪喪由於閹寺横行尤宜疾首痛心乃甫稱尊號而即令王坤進掌司禮監干政擅權倉卒奔梧州以致衆志乖離馴召劉承允之亂及坤被逐而龎天夀等先後用事諸臣依附朋黨交争迄入緬而未已在桂王閻劣受制奄竪固無足怪獨是㭬徒流毒相仍既已覆明宗社即此阽危餘燼而堅持故局雖國亡而其燄未熸禍敗所鍾遂與明一代相為終始其亦可為歎息痛恨者矣故明大學士蘇觀生等以唐王聿􅟽稱號于廣州丁魁楚等之将立桂王由榔也蘇觀生欲與共事魁楚素輕之且欲專定䇿功慮其以舊相居已上拒不與議吕大器亦以其非兩榜叱辱之觀生愠甚適唐王聿鍵弟聿􅟽嗣為唐王者與大學士何吾騶自閩浮海至南海闗捷先番禺梁朝鍾首倡兄終弟及議觀生遂與吾騶及布政使顧元鏡侍郎王應華曽道唯總兵林察等擁立聿􅟽改年紹武就都司署為行宫封觀生建明伯掌兵部事進吾騶等秩擢捷先吏部尚書旋與元鏡應華道唯並拜東閣大學士分掌諸部招海上鄭石馬徐四姓盗授總兵等官與肇慶相拒時倉猝舉事治宫室服御鹵簿通國奔走夜中如晝不旬日除官數千冠服皆假之優伶市人傳以為笑桂王由榔遣兵攻唐王聿􅟽不克桂王由榔遣給事中彭燿順徳人主事陳嘉謨齎敕徃諭唐王聿􅟽至廣州以諸王禮見備陳宗支倫序及監國先後語甚切至因厯詆蘇觀生諸人觀生怒執燿殺之嘉謨亦不屈死節燿嘉謨俱賜諡愍即日發兵攻肇慶以番禺人陳際泰督師由榔遣兵部右侍郎林佳鼎帥兵赴三水佳鼎故粤中監司與林察同姓相善察使羣盜詐降佳鼎信之乘勝追至三山口亂作全師皆覆佳鼎同僉事夏四敷赴水死佳鼎四敷俱賜諡節愍時肇慶大震瞿式耜視師峽口以王化澄代佳鼎督師吕大器辭官入蜀遂以化澄為尚書起李永茂為大學士未幾亦罷臣等謹案桂王竄跡嶺南據手掌之地勢尤危窘聿􅟽本唐王親弟誼出本支乃當望風瓦解之時為同室操戈之舉而為之臣者方各挾其主以為奇貨爭城奪地攻戰逾時此與燕雀處堂何異至彭燿陳嘉謨等衘命出使抗詞被殺雖律以大義與疆場致命者有殊乃猶念其臨難捐軀不失臣節竟得一例邀恩賜諡褒錫仁至義盡史冊以來實所未聞也十二月我大清兵克廣州獲唐王聿􅟽廣東平蘇觀生既敗肇慶兵意自得務粉飾為太平事而委任闗捷先及梁朝鍾捷先少有才便筆扎朝鍾善談論浹旬三遷至祭酒有楊明競潮州人者好為大言詭稱精兵滿惠潮間可十萬即特授惠潮巡撫又有梁鍙者妄人也觀生才之用為吏科都給事中與明競大納賄賂日薦用數十人觀生本乏猷略兼總内外任益昏瞀招海盗資捍禦其衆白日殺人懸肝腸於貴官之門以示威城内外大擾時大兵由福建趨潮州惠州俱下之長吏皆降附即用其印移牒廣州報無警觀生信之是月十五日聿􅟽視學百僚咸集或報大兵已逼觀生叱之曰潮州昨尚有報安得遽至此妄言惑衆如是者三大兵已自東門入觀生始召兵摶戰兵精者皆西出倉猝不能集觀生乃自縊死觀生走梁鍙所問計鍙曰死爾復何言觀生入東房鍙入西房各拒户自縊觀生慮其詐稍留聼之鍙故扼其吭氣湧有聲且推几扑地久之寂然觀生信為死遂自縊明日鍙獻其屍出降朝鍾及太僕寺卿霍子衡南海人行人梁萬爵字天若番禺人新城知縣廖翰標龍門人等皆死之朝鍾聞變赴池為隣人救出自剄死子衡召三子訓以死節朝服北向拜又易緋􅂁拜家廟先赴井死妾莫氏從之子應蘭應荃應芷及其妻各繼之有小婢見之亦赴井死萬爵赴水死翰標自縊死朝鍾萬爵翰標俱子衡賜諡節愍賜諡烈愍聿􅟽方事閲射急易服踰垣匿王應華家俄縋城走為追騎所獲饋之食不受曰我若飲汝一勺水何以見先人地下投繯而絶周益遼等二十四王俱死何吾騶及應華等悉降桂王由榔奔梧州由榔司禮太監王坤用事銓政軍務任意顛例數以内批授官由榔諸臣爭之不聼給事中劉鼒疏劾坤幾得罪瞿式耜力救乃免及是聞廣州已破肇慶大震式耜請駐峽口坤不從以朱治􅍀為兩廣總督守肇慶趣由榔出走以二十二日乘輕舟上西峽遂奔梧州我大清兵至順慶流賊張獻忠伏誅其黨孫可望李定國白文選等潰走川南獻忠據成都遣偽将軍分屠各府州縣川中民盡乃謀窺西安盡焚成都宫殿廬舍夷其城率衆出川北又欲盡殺川兵偽将劉進忠故統川兵聞之率一軍逃㑹大兵至漢中進忠來奔乞為鄉𨗳至鹽亭界大霧獻忠曉行猝遇大兵於鳯凰坡中矢墜馬蒲伏積薪下於是大兵擒獻忠出斬之降及敗死者二三十萬其黨偽平東将軍孫可望偽安西将軍李定國偽撫南将軍劉文秀偽定北将軍艾能奇偽都督白文選馮雙禮等俱潰走川南時故明川中諸将競擁兵自固督師大學士王應熊及王祥在遵義巡撫馬乾副将曽英在重慶監軍副使范文光及曹勛在洪雅監軍僉事詹天顔在松茂譚宏譚詣在夔萬兵部侍郎總督川陜軍務樊一蘅在納溪居中調度與應熊㑹瀘州尅期並進王祥綦江人馬乾呉縣人范文光内江人詹天顔龍巖人重慶曽英兵最强可望等率殘卒驟至英出不意戰敗死於江英節愍賜諡賊遂䧟綦江督師大學士王應熊退走永寧山中尋病卒於畢節衛踰月賊䧟遵義入貴州境大兵追至重慶故明巡撫馬乾敗死乾忠節賜諡遂入遵義以餉乏旋師王祥等因復取保寧二郡故明總督侍郎樊一蘅再駐江上為復窺全蜀計乃列上善後事宜及諸将功状於桂王由榔由榔拜一蘅户兵二部尚書加太子太傅祥等進爵有差王師臣等謹案孫可望李定國等本張獻忠義子自史定蜀即南定滇中旋附桂王受其爵號從前明各傳牽連附載未為區别臣等恭輯唐桂二王本末仰荷聖明指示以可望定國等身為賊黨其所稱平東安西等號皆獻忠偽授自應重加貶絶書賊書偽以正聖慈其罪至二王及其臣子荷䝉君則正其稱號臣則裁度未可遽從僭偽之例故深仁目以原官尺寸權衡具存書法大度等量兩儀彼指瑯琊為僭晉斥梁益為偽朝者豈足語於建中之極則乎丁亥我大清世祖章皇帝順治四年春正月我大清兵克肇慶桂王由榔奔桂林由榔既西走瞿式耜兼道趨赴由榔已越梧州而西大兵自廣州向肇慶總督朱治􅍀棄城去由榔走平樂大兵入肇慶遣别将徇髙雷二府進取梧州巡撫曹華迎降由榔欲走依何騰蛟于湖廣丁魁楚王化澄皆棄由榔去化澄走潯州魁楚走岑溪輜重多舳艫相連屬為大将李成棟追獲魁楚遂降成棟與有隙録其家數百人殺之魁楚乞一子成棟笑曰汝身且莫保尚求活人耶并殺之惟式耜及呉炳宜興人時為由榔兵部侍郎呉貞毓字元聲宜興人時為由榔户部尚書等從乃由平樂抵桂林湖南副使陳象明以徵餉在廣西聞廣東地盡失檄調土兵與陳邦傅連營東至梧州榕樹潭遇死之陳象明字麗南東莞人賜大兵戰敗諡烈愍以吳炳方以智為大學士同式耜入閣辦事以智不至遣使勞何騰蛟趣其兵入衛徵四川文安之彛陵人雲南王錫兗祿豐人入閣錫兗以道阻不能逹安之亦不至以周堪賡郭都賢劉逺生等為六卿丁時魁金堡等為給事中馬吉翔掌錦衣衛吉翔本京師㳺猾夤縁為香山叅将丁魁楚今獻捷于唐王聿鍵聿鍵喜其應對敏捷擢為錦衣衛使至是以使忠貞營復命益以柔媚得由榔意命掌絲綸房事同栗擬遂大用事二月我大清兵克平樂桂王由榔奔全州以其大學士瞿式耜留守桂林大兵襲平樂克之潯州相繼破由榔大恐㑹武岡鎮将劉承允以兵至全州王坤請赴之瞿式耜極陳桂林形勢請由榔堅守略言留粤則粤在去粤則粤危我進一步人亦能進一步我去速一日人來亦能速一日去而不守則拱手送矣由榔不聼自請留守許之進文淵閣大學士兼吏兵二部尚書賜劍便宜從事以麾下焦璉為總兵初由榔為張獻忠所執璉率衆攀城上破械出之由榔病不能行璉員之以行由榔以此徳璉用破靖江王功命為叅将至是進總兵封陳邦傅為思恩侯守昭平由榔遂走全州四川賊孫可望李定國等率衆入貴州孫可望等率衆入黔故明布政使張耀字融我三原人急言於巡撫米夀圖宛平人請發兵民守禦夀圖以衆寡不敵難之俄賊衆突至貴陽耀率家丁乘城拒擊興寧知縣吳子騏字九逵户部主事劉琯同知楊元瀛等亦以鄉兵扼賊賊來益衆子騏等戰敗被執死城遂䧟賊執耀説之降耀大罵不屈遂與家屬十三人同見殺夀圖出奔沅州可望等䧟安平僉事曽益拒守力屈死䧟平壩衛户部郎中譚先哲寧前兵備參議石聲和俱闔門殉難犯定畨州鄉官顧人龍率士民拒守殺賊甚衆城破大罵而死張耀楊元賜諡忠烈吳子騏譚先哲諡節賜諡烈愍劉琯瀛曽益石聲和俱賜愍顧人龍忠賜祀義祠三月我大清兵攻桂林由榔既出奔桂林危甚其總督侍郎朱盛濃走靈川巡撫御史辜延泰走融縣布政使朱盛􅀈副使楊垂雲桂林知府王惠卿以下皆遁惟瞿式耜與通判鄭國藩縣丞李世榮及都司林應昌李當瑞沈煌在焉由榔令兵部右侍郎丁元華代盛濃御史魯可藻代延泰未赴而大兵已薄桂林以騎數十直入文昌門登城樓瞰式耜公署式耜即令焦璉拒戰甚力而身立矢石中與士卒同甘苦積雨城壞吏士無人色式耜督城守自如故人無叛志援兵索餉而譁式耜括庫不足妻邵捐簪珥佐之既而劉承允所遣援桂兵五千人在城與璉兵主客不和擊傷璉大掠城中而去璉兵亦出城赴黄沙鎮城幾破者數矣㑹大兵東還桂林始獲全四川賊孫可望李定國等率衆入雲南先是雲南土官沙定洲王弄山長官司沙源之子作亂逐故明黔國公沐天波黔寜王沐英裔孫以總兵官世鎮雲南盤踞㑹城傳檄州縣全滇震動天波走楚雄巡撫吳兆元不能制許為奏請鎮滇定洲遂西追天波分巡金滄副使楊畏知寳雞人説天波走永昌而已以楚雄當定洲定洲至畏知紿與結盟而乘間清野繕堞徵鄰境援兵姚安景東俱響應定洲聞之不敢至永昌還攻楚雄不能下畏知伺賊懈輒出擊殺傷甚多定洲築長圍困之迄不能下至是孫可望等聞滇亂兼程趨滇稱黔國焦夫人弟來復仇定洲之亂天波母妻皆走城北自焚死故可望假復仇為名民久困沙兵喜其來迎之定洲解楚雄圍去禦於草泥闗大敗遁歸阿迷可望破曲靖及交水俱屠之巡按雲南御史羅國瓛方按部曲靖與知府焦潤生俱被執可望欲降之國瓛不屈擕至昆明自焚死潤生亦不屈死都司經厯徐道興方署師宗州事集士民固守及賊入署道興大罵賊令出迎其将道興擲酒盃擊之罵不絶口遂被殺興羅國瓛嘉定州人焦潤生上元人修撰竑子徐道睢州人國瓛賜諡忠烈潤生賜諡節愍道興賜諡烈愍賊遂由陸涼宜良入雲南城右僉都御史朱夀琳以桂王由榔命募兵雲南可望至夀琳知不免張麾盖徃見之行三揖禮曰謝将軍不殺不掠之恩可望脅之降不從繫他所使人誘以官亦不從從容題詩於壁或以詩報可望遂遇害夀琳魯府宗室家兗州賜諡節愍分遣李定國徇迤東諸府而自與劉文秀等率兵西出畏知禦於啟明橋兵敗投水不死踞而罵可望下馬慰之曰聞公名久吾為討賊來公能共事相與匡扶明室非有他也畏知瞪目視之曰紿我爾可望曰不信當折矢誓畏知因要以三事不用獻忠偽號不殺百姓不擄婦女可望皆許諾乃與至楚雄略定大理諸郡使文秀至永昌迎天波歸時永昌推官王運開攝監司事通判劉廷標攝府事方發兵守瀾滄而天波已降可望諭兩人以印徃兩人堅不予永昌士民聞賊所至屠戮泣請納欵紓禍兩人慰遣之既去兩人相謂曰衆情如此吾軰惟一死自靖爾是夕運開先自經廷標聞之曰我老當先死王公乃先我耶遂沐浴賦詩三章亦自經可望等重兩人死節求其後或以運開弟運閎對即聘之行至潞江謂其僕曰吾兄弟可異趣耶吾死若收吾骨與兄合葬遂躍入江死賜運開字子朗夾江人廷標字霞起上杭人俱諡節愍運閎賜祀忠義祠而定國之徇臨安者與定洲部目李阿楚力戰破其城殺城中官民七萬八千餘人盡掠子女而囘所過無不屠滅姚安䧟姚州知州何思舉人席上珍不屈死舉人金世鼎自殺晉寧陷知州冷陽春殉節死舉人叚伯美諸生余繼善耿希哲助陽春城守亦殉難呈貢䧟知縣夏祖訓死之富民䧟貢生李開方率妻子同死其友諸生王朝賀掩埋訖即自經在籍知縣陳昌裔不受偽職為賊杖死兵科給事中廖履亨楚雄舉人杜天禎亦先後死之裔冷陽春石阡人夏祖訓嘉興人何思夏祖訓陳昌廖履亨俱愍席賜諡節愍冷陽春祀忠賜諡烈上珍等俱賜義祠於是迤西八府以畏知在軍得保全而迤東之殺與獻忠同慘可望遂據雲南後二年可望復遣定國攻定洲既至㑹定洲土目楊嘉者方迎定洲就其營宴定國偵得之率兵圍營相拒數日乃出降遂械定洲及其妻萬氏數百人囘雲南剝其皮市中萬氏本江西寄籍女滛而狡先為阿迷土官普名聲妻後改嫁定洲遂併有其地云我大清兵克長沙始唐王聿鍵既死故明總督何騰蛟在湘陰厲兵保境如平時桂王由榔進騰蛟武英殿大學士加太子太保至是平南大将軍恭順王孔有徳等帥師下湖南桂王總兵王進才故守益陽聞之退保長沙與狼兵将覃遇春鬨揚言乏餉大掠而去并及湘陰大兵進逼長沙進才走湖北騰蛟不能守單騎走衡州湖南巡撫章曠亦走寳慶大兵遂克長沙湘陰先是劉承允受騰蛟節制騰蛟以藤溪之㨗請加郝永忠援勦左将軍張先璧援勦右将軍承允怒及長沙既失承允遂奏解騰蛟兵柄召之入朝先璧奏劾承允專擅騰蛟反和解之㑹聞先璧提兵至寳慶承允懼又請命騰蛟督諸鎮兵駐衡州夏四月桂王由榔為其将劉承允劫遷於武岡州由榔之至全州也劉承允迎奉頗如禮既而跋扈不可制逐司禮監王坤於永州矯由榔命晉已爵為安國公總督戎政賜尚方劍封其弟承永武岡伯錦衣指揮馬吉翔文安伯郭承昊太和伯嚴雲從清江伯御史毛夀登爭之吉翔怒激承允脅由榔杖夀登及劉湘客吳徳藻萬六吉於牙門外承允又力為申救得免皆奪職六部九卿科道頌承允功徳者章無虚日至是聞大兵将至承允揚言瞿式耜已通降欵逼由榔即日發全州移居武岡改曰奉天府張先璧欲與承允為難伏兵邀於路由榔甫渡河浮橋㫁獲免先璧遂大掠新寧承允請敇諭解久之始去自是由榔政事皆决於承允矣桂王由榔遣兵犯荆州敗走由榔令李赤心等攻荆州月餘大兵來援赤心等大敗步走入蜀數日不得食乃㪚入施州衛聲言就食湖南劉承允懼為赤心所倂計非堵允錫不能禦乃加允錫東閣大學士封光化伯賜劍便宜行事允錫疏請得給空勅鑄印頒賜秦中舉兵者時頗議其專桂王由榔兵科給事中陳邦彦以兵犯廣州敗走初邦彦見桂王由榔於肇慶擢兵部給事中遣齎勅還諭蘇觀生邦彦聞使臣彭燿被殺遂變姓名入髙明山中及大兵已定廣州列城悉下邦彦乃潛謀起兵有余龍者本萬元吉所募兵未行而贛州失龍等千餘人無所歸聚甘竹灘為盜他潰卒多附至二萬餘人桂王總督朱治􅍀招降之未幾譟歸而唐王所置廣西巡撫張家玉字元子東莞人亦與舉人韓如璜結鄉兵陷東莞城籍前尚書李覺斯等貲以犒士奉表桂王由榔由榔進家玉兵部尚書尋為大兵擊敗如璜戰死家玉走西鄉家玉祖母陳母黎妹石寳俱赴水死妻彭被執不屈死邦彦見粤西危急説龍乘間圍廣州而已發髙明兵由海道入珠江與龍㑹且移家玉書曰桂林累卵但得牽制毋西潯平間可完葺是我致力於此而收功於彼也家玉以為然邦彦遂與龍聫兵犯廣州圍其城龍卒故無紀律大兵自桂林還救揚言取甘竹灘龍等顧其家輒退邦彦亦却歸大兵以廣州之圍謀出邦彦求其家獲妾何氏及二子厚遇之為書招邦彦邦彦判書尾曰妾辱之子殺之身為忠臣義不顧妻子既乃遣門人馬應芳㑹龍軍䧟順徳無何大兵至龍戰敗應芳被執赴水死龍再戰黄連江亦敗歿大兵攻家玉於新安時西鄉大豪陳文豹奉家玉䧟新安襲東莞大兵至家玉敗走鐵岡文豹等皆死李覺斯怨家玉甚發其先壟毁其家廟盡滅家玉族市井為墟家玉過故里號哭而去道得衆數千復䧟龍門博羅連平長寧歸善諸州縣還屯博羅邦彦乃棄髙明收餘衆徇下江門據之五月我大清兵克衡州故明總督盧鼎方從何騰蛟駐衡州而張先璧兵突至大掠鼎不能抗走永州先璧遂挾騰蛟走祁陽又間道走辰州騰蛟脱還走永州甫至鼎部将復大掠鼎走道州騰蛟與督餉侍郎嚴起恒浙江山陰人走白牙市大兵遂克衡州初騰蛟建十三鎮以衛長沙黄朝宣張先璧劉承允李赤心郝永忠袁宗第王進才董英馬進忠馬士秀曹志建王允成盧鼎皆開鎮湖南北故時稱十三鎮大扺李自成餘黨及左良玉舊将也至是皆自為盗賊衡州守将黄朝宣來降大兵數其罪支解之逺近大快尋進克永州以一知府守之故明副将周金湯莆田人知城内虚夜鼓譟而登知府出走金湯復䧟永州魯王以海遣兵犯崇明以海既航海走南澳復走長垣以熊汝霖為大學士封鄭彩建國公鄭遵謙義興侯張名振定西侯阮進蕩湖伯遣兵犯海口鎮東據之連陷海澄漳浦諸縣王師旋復漳浦以海所置知縣洪有文死之至是遣其總督水師兵部右侍郎沈廷揚字季明崇明人率舟師北窺崇明抵福山次鹿苑夜分􅄓風大作舟膠於沙為大兵所執諭之降不從戮死洪有文沈廷揚賜諡節愍賜諡忠節六月桂王由榔召其督師大學士何騰蛟入武岡尋遣還騰蛟在白牙由榔宻遣中使告以劉承允專恣罪令入武岡除之騰蛟乃以兵事屬章曠而走謁由榔於武岡由榔及其太妃皆召見承允由小校以騰蛟薦至大将稱門生已漸倨騰蛟在長沙徵其兵承允大怒言先調黄朝宣張先璧軍皆章曠親行今乃折箠使我遂馳至黎平執騰蛟子索餉數萬子走訢騰蛟騰蛟遣曠行承允乃至騰蛟為請於由榔得封伯且與為姻承允益驕至是忌騰蛟出已上欲奪其權請用為户部尚書專領餉務由榔不許由榔召騰蛟圖承允騰蛟固無如承允何也騰蛟無兵由榔命以雲南援将趙印選胡一青兵𨽻之及辭還賜銀幣命羣臣郊餞承允伏千騎襲騰蛟印選卒力戰盡殱之騰蛟乃還駐白牙章曠移駐永州見諸大将擁兵聞警輒走抑鬰而卒臣等謹案明季督撫姑息将校結為師生互相黨庇以致軍法玩墮劉承允因何騰蛟薦亦稱門生其後跋扈反噬而騰蛟竞不能制盖積弊相沿雖騰蛟之忠藎有所不免終至召侮長奸亦可知錮習之入人者深也秋七月桂王由榔遣兵䧟平樂梧州諸郡由榔大學士瞿式耜遣總兵焦璉連取陽朔及平樂陳邦傅由賓州取潯合兵䧟梧州於是廣西全省地復為由榔所據由榔封式耜臨桂伯璉新興伯式耜請由榔返全州又請還桂林皆不許魯王以海以兵犯福州敗走以海遣兵犯漳州復率鄭彩阮進等犯福州敗還旋襲據連江進䧟長樂永福羅原寧徳諸縣八月我大清兵克武岡桂王由榔奔栁州時大兵克常徳寳慶直趨武岡城外馬吉翔挾由榔倉猝走靖州命其大學士吳炳分道䕶由榔世子走城步吏部主事侯偉時公安人從之既至城已為大兵所破遂就執炳至衡州不食自盡於湘山寺偉時亦死之炳賜諡忠節偉時賜諡烈愍劉承允以武岡降叅将謝復榮戰死兵部尚書傅作霖冠帶坐堂上承允力勸之降不從戮死作霖妾鄭有殊色就執驅之過橋躍入水中死節復榮賜諡烈愍作霖賜諡忠由榔遂自靖州奔栁州道出古泥總兵侯性太監龎天夀率舟師迎由榔㑹天雨眷屬内豎狼籍泥淖中饑餓無人色性供張儲峙皆備由榔喜封性商邱伯以天夀掌司禮監時從官皆不至隨行者惟馬吉翔各部諸司事皆吉翔一人掌之由榔進吉翔爵為侯桂王由榔東閣大學士陳子壮以兵犯廣州敗死子壮家居九江村桂王由榔稱號授為東閣大學士兼兵部尚書總督廣東福建江西湖廣軍務㑹大兵入廣東子壮止不行及張家玉陳邦彦與新㑹王興潮陽賴其肖等先後舉兵子壮亦以是月聚兵九江村兵多蜑户畨鬼善戰乃與邦彦約共攻廣州結故指揮使楊可觀為内應子壮先至駐五羊驛事洩可觀等死将引退邦彦軍亦至謀伏兵禺珠洲側伺大兵還救㑹城而縱火以焚舟子壮如其計果焚舟數十大兵引而西邦彦尾之㑹日暮子壮不能辨旗幟疑皆大兵也陣動大兵順風追擊遂大潰子壮走還九江村長子上庸陣歿邦彦奔三水㑹故御史麥而炫字章闇髙明人䧟髙明迎子壮以故主事朱實蓮字子潔南海人攝縣事而清逺指揮白常燦亦以城迎邦彦與諸生朱學熙嬰城固守邦彦自起兵日一食夜則坐而假寐與其下同勞苦故軍最强嘗分兵救諸營之敗者至是精鋭盡喪外無援軍越數日城破常燦死邦彦率數十人巷戰肩受三刃不死走朱氏園見學熙縊拜哭之旋就執饋之食不食繫獄五日就戮死髙明亦破實蓮戰死子壮而炫俱執至廣州不降磔死時張家玉走龍門復募兵萬餘人分為龍虎犀象四營攻據増城倚深大兵步騎萬餘進擊家玉三分其兵犄角相救溪髙崖自固大戰十日力竭而敗被圍數重諸将請潰圍出家玉歎曰矢盡砲裂欲戰無具将傷卒斃欲戰無人烏用徘徊不决以頸血濺敵人手哉因徧拜諸将自投野塘中以死而陳子壮賜諡忠簡陳邦彦賜諡忠烈麥炫朱實蓮白常燦俱初節賜諡烈愍張家玉以甲申出謁闖賊有虧廷議不予諡我大清兵克永州時大兵盡定湖南地何騰蛟趙印選胡一青奔還桂林嚴起恒劉湘客等亦至城中止焦璉軍騰蛟率諸将助守而南安侯郝永忠忽擁衆萬餘至與璉兵欲鬬㑹宜章伯盧鼎兵亦至騰蛟為調劑桂林以安乃與瞿式耜議遣璉永忠鼎印選一青分扼興安靈川永寧義寧諸州縣使各自為守九月桂王由榔奔象州初狼兵将覃遇春率衆滛掠瞿式耜召至桂林斬之由榔之走栁州也遇春妻子迎訴由榔復以其子鳴珂為總兵領父部曲至是鳴珂聲言復仇與栁州守道龍文明相攻殺文明走鳴珂大掠城中矢及由榔舟由榔南走象州冬十月魯王以海遣兵䧟福寧州唐王聿鍵舊将凃登華守福寧以海遣其大學士劉中藻攻之登華欲降疑未决曰海上豈有天子舟中豈有國公錢肅樂致書曰将軍獨不聞南宋之末二帝並在海上張陸並在舟中乎登華遂以城附於以海以海復遣其兵部右侍郎林汝翥字大葳福清人文選員外郎林垐字子野汝翥同邑人以鄉兵犯福清戰敗垐殁於陣汝翥就執諭降不從繋之吞金屑而死汝翥節垐賜諡忠烈賜諡愍臣等謹案魯王竄身海外以視唐桂二王之在閩滇流離更甚其臣如林汝翥林垐等烏合逋逃旋褒録沒行陣亦非瞿式耜等可比乃易名鉅典並荷曠蕩隆施實從古所未有也我大清兵克黎平故明總兵蕭曠本武昌諸生為劉承允偏禆何騰蛟令管黎平㕘将事及承允降令降将陳友龍招曠曠不從已而城破曠死之友龍遂盡劫騰蛟眷屬以去曠烈愍賜諡十一月我大清兵克沅州故明貴州巡撫米夀圖死之夀圖忠節賜諡偏沅巡撫傅上瑞出降踰年與劉承允並誅死我大清兵攻全州大兵既定湖南進攻全州灌陽何騰蛟率焦璉郝永忠盧鼎趙印選胡一青等五将合力守拒大戰全州城下㑹大兵解圍去桂王由榔以為騰蛟等功加騰蛟太師與焦璉並進爵為侯封趙印選新寧伯胡一青興寧伯我大清兵克梧州故明總兵陳邦傅在梧州遣舟師将犯肇慶遇大兵㳺騎輙驚潰大兵泝流追擊徑上梧州邦傅不知所為急遁還潯州大兵遂入梧州十二月桂王由榔還桂林由榔在象州聞梧州復破欲走南寧瞿式耜等力爭乃以是月初五日還桂林以嚴起恒為大學士與式耜王化澄同入直何騰蛟仍出督師我大清兵克全州郝永忠駐全州有言陳邦傅将襲其輜重之在㑹城者永忠即撤兵馳還桂林盧鼎從之焦璉不知其故亦倉皇走平樂人情危駭守全諸将議遣使請降監軍御史周震力爭不可衆怒曵出斬之震忠節賜諡全州鎮道遂舉城來附御批厯代通鑑輯覽卷一百十八

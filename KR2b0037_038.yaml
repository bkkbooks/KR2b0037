  text: 欽定四庫全書御批厯代通鑑輯覽卷三十九南北朝丁宋泰始三年未魏皇釁元年春宋青冀州平
  hash: sha256:1b963bc0adbeeb9f22e7709285606cb79f8b8946fcad86505132cc5a8769c25c

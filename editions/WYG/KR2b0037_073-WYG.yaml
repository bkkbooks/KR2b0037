front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷七十四宋真宗皇帝庚申天禧四年春正月以曹瑋簽書樞密院事
  hash: sha256:eb6f7e94ffcefdb7a621e783eaac03e2639c5ee07fe826ad6c59b99b71221695
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_073-1a, image: WYG0338/WYG0338-0073c.png}
body:
  text: 瑋沈勇有謀馭軍嚴明自少捍禦西陲熟知羌情以竒計用兵所向克捷善撫士卒綏懐邉人羌戎畏愛之二月帝有疾不視朝三月左僕射同平章事兼景靈宫使向敏中卒諡文簡敏中端厚沈毅識大體時以重徳目之夏四月有兩月並見西南六月寇準罷時帝得風疾事多決于皇后寇準李迪以為憂一日準請間曰皇太子人所屬望願陛下思宗廟之重傳以神器擇方正大臣羽翼之丁謂錢惟演佞人也不可以輔少主帝然之準密令楊億草表請太子監國且欲援億輔政已而準被酒漏言謂聞之曰即日上體平朝廷何以處此李迪曰太子監國古制也何不可之有謂因力譖準請罷其政事帝不記與準有成言竟罷為太子太傅封莱國公秋七月以李迪丁謂同平章事馮拯為樞密使迪時兼太子賓客制下固辭帝不允㑹皇太子見帝拜曰陛下用賓客為相敢謝帝顧謂迪曰尚可辭邪迪乃受命貶寇準知相州帝始得疾自疑不起嘗卧宦者周懐政股與之謀欲命太子監國懐政東宫官也出告寇準已而事泄準罷丁謂等因疎斥之使不得親近懐政憂懼不自安陰謀奉帝為太上皇而傳位太子罷皇后預政殺丁謂而復相準客省使楊崇勲字寶臣薊州人等以其謀告謂謂即微服夜乘犢車挾崇勲詣曹利用議明日以聞詔命曹瑋訊之懐政具服帝怒甚欲責及太子羣臣莫敢言李迪従容奏曰陛下有㡬子乃欲如是帝悟乃止誅懐政謂與皇后謀并發朱能天書妖妄事遂貶準為太常卿知相州詔罷翰林學士盛度字公量餘杭人樞密直學士王曙字晦叔河南人準之婿朝士與準親厚者皆斥之準之貶也帝命與小州謂輒云與逺小州迪言向者聖旨無逺字二人忿爭盖始此八月貶寇準為道州司馬時遣使捕朱能能擁衆叛未㡬衆潰自殺準坐是再貶道州既至晨具朝服如常時對賓客言笑若初無廊廟之貴者自罷相三絀皆非帝意嵗餘帝問左右曰吾目中何久不見寇準羣臣畏謂威莫敢對九月帝疾瘳冬十一月李迪丁謂罷翌日謂復留視事罷翰林學士劉筠字子儀大名人丁謂擅權用事至除吏不以聞迪憤然謂同列曰迪起布衣至宰相有以報國死猶不恨安能附權倖為自安計邪會議二府皆進秩兼東宫官迪以為不可謂又欲引林特為樞副迪復沮之謂積怒既而謂加門下侍郎兼太子太傅迪加尚書左丞仍兼太子少傅故事宰相無兼左丞者及入對長春殿内出制書置榻前帝謂輔臣曰此卿等兼東宫官制也迪進曰東宫官屬不當增置臣不敢受命丁謂㒺上弄權私林特錢惟演而嫉寇準特子殺人事寢不治準無事逺謫惟演以皇后姻家使預朝政曹利用馮拯相為朋黨臣願與謂俱罷付御史臺劾正帝怒留制不下左遷迪知鄆州謂知河南府明日謂入謝帝詰所爭狀謂對曰非臣敢爭乃迪詈臣爾願復留遂自出傳口詔復入中書視事時劉筠已草迪謂同罷制既而謂復留命草制筠不奉詔乃更召學士晏殊字同叔撫州臨川人草之筠自院出遇殊殊皇愧側面不敢與揖謂既復位益擅權専恣筠曰奸人用事安可一日居此力請補外遂知廬州筠初為億所識後遂與億齊名時號楊劉詔太子㕘議朝政詔自今軍國大事取旨如故餘皆委皇太子同宰相樞密等㕘議施行太子固讓不允遂開資善堂親政皇后裁決于内而丁謂用事中外以為憂王曾謂錢惟演曰太子幼非中宫不能立中宫非倚太子則人心亦不附后若加恩太子則太子安太子安則劉氏安矣惟演乘間言之后深納之辛酉五年秋七月甲戌朔日食九月吐番嘉勒斯賚降冬十月貶王欽若為司農卿分司南京欽若判河南有疾表乞就醫京師丁謂使人紿之曰上甚思一見君也欽若信之即輿疾至京謂因言欽若擅去官守無人臣禮命御史就第按問欽若惶恐伏罪故貶壬戌乾興元年春二月羣臣上帝尊號帝崩遺詔皇后權處分軍國事太子禎即位是為仁宗尊皇后為皇太后赦王曾奉遺詔入殿廬草制命皇后權處分軍國事輔太子聽政丁謂欲去權字曾曰皇帝沖年太后臨朝斯己國家否運稱權猶足示後且增減制書有法表則之地先欲亂之邪謂遂止太子即位年十三矣尊皇后為皇太后淑妃楊氏為皇太妃兩府議太后臨朝儀曾請如東漢故事太后與帝五日一御承明殿太后坐帝右垂簾聴政謂欲擅權不欲同列與聞機政潛結入内押班雷允公開封人密請太后降手書云帝朔望見羣臣大事則太后召對輔臣決之非大事則令允恭傳奏禁中畫可以下曾曰兩宫異處而柄歸宦官禍端兆矣于是允恭恃勢専恣而謂權傾中外衆莫敢抗獨曾正色立朝時倚為重夏四月貶寇準為雷州司戸㕘軍李迪為衡州團練副使真宗臨崩惟言寇準李迪可託丁謂怨準而太后憾迪嘗諫立已事具前遂誣以朋黨貶之連坐者甚衆曹瑋亦謫知莱州初議竄逐王曾疑責太重謂熟視曾曰居停主人恐亦未免盖曾嘗以第舍假準曾遂不復爭學士呈制草謂改曰當醜徒干紀之際屬先帝違豫之初罹此震驚遂致沈劇且使人迫迪行或語謂曰迪若貶死公如士論何謂曰異日諸生記事不過曰天下惜之而已謂必欲令二人死遣中使齎敕就賜以錦囊貯劍掲于馬前示將誅戮狀至道州衆皆皇恐不知所為準方與郡官宴飲神色自若使人謂之曰朝廷若賜凖死願見勅書中使不得已乃授勅準拜于庭升階復宴至暮乃還六月契丹遣使来弔祭契丹主聞真宗崩集蕃漢大臣舉哀遣耶律僧隠等来弔祭置真宗御靈建資福道場百日而罷詔諸州軍不得作樂凡國中犯真宗諱者悉改之内侍雷允恭伏誅丁謂任中正免謂為山陵使允恭為都監判司天監邢中和言于允恭曰今山陵上百步法宜子孫類汝州秦王墳但恐下有石與水耳允恭曰上無他子若如秦王墳何不可中和曰山陵事重踏行覆按動經日月恐不及七月之期耳允恭曰苐移就上穴我走馬入見太后言之允恭素貴橫人不敢違即改穿上穴乃入白太后曰此大事何輕易如此允恭曰使先帝宜子孫何為不可太后意不然曰出與山陵使議可否允恭出與謂言謂唯唯允恭入奏山陵使亦無異議遂命夏守恩字君殊并州榆次人領工徒數萬穿地土石相半繼之以水衆議日喧懼不能成功中作而罷奏請待命謂芘允恭依違不決内侍毛昌達自陵下還以其事聞詔問謂謂始請遣使按視既而咸請復用舊地乃詔馮拯曹利用等就謂第議遣王曾復視曾還請獨對因言謂包藏禍心令允恭移皇堂于絶地太后大驚怒甚欲併誅謂馮拯進曰謂固有罪然新帝即位亟誅大臣駭天下耳目后怒稍解遂止誅允恭等二日太后召宰相諭曰丁謂為宰相乃與宦官交通謂前附允恭奏事皆言已與卿等定議故皆可之且營奉先帝陵寢而擅有遷易㡬誤大事拯等對曰自先帝登遐政事皆謂與允恭同議稱得旨禁中臣等莫敢辨虚實賴聖神察其姦此宗社之福也任中正獨進曰謂被先帝顧託雖有罪請如律議功曾曰謂以不忠得罪宗廟尚可議邪乃降授謂太子少保分司西京并罷中正出知鄆州故事黜宰相皆降制時欲亟行止召舍人草詞仍榜朝堂宣諭天下以拯為山陵使秋七月甲子朔日食㡬盡以王曾同平章事吕夷簡魯宗道㕘知政事錢惟演為樞密使曾方嚴持重每進見言利害事審而中理多所拔薦尤惡僥倖帝嘗問曽曰比臣僚請對多求進者曾對曰惟陛下抑奔競崇恬静庶㡬有難進易退之人矣初真宗封岱祀汾兩過洛陽皆幸吕蒙正第問曰卿諸子孰可用䝉正對曰臣諸子皆不足用姪夷簡宰相材也夷簡由是進用累擢知開封府嚴辨有聲真宗識其姓名于屏風將大任之不果宗道嘗為右正言論列無所畏避真宗書殿壁曰魯直盖思念之也丁謂有罪貶崖州司戸㕘軍初女道士劉徳妙嘗以巫師出入謂家謂敗逮繫徳妙内侍鞫之徳妙具言謂嘗敎之曰汝所為不過巫事不若托老君言禍福足以動人于是即謂家設神像夜醮于園中雷允恭數至請禱及真宗崩引入禁中又因穿地得龜蛇令徳妙入内紿言出其家山洞中仍敎云上即問若所事何知為老君第云相公非凡人當知之謂又作頌題曰混元皇帝賜徳妙語涉妖誕遂貶謂崖州司户㕘軍籍其家得四方賂遺不可勝紀謂赴崖州道出雷州寇凖使人以一烝羊逆諸境上謂欲見準準固辭之準聞家僮謀欲報仇乃杜門使縦博毋得出候謂行逺乃已謂機敏有智謀憸狡過人及居崖州専事浮屠因果之說家寓西京嘗為書自克責敘國厚恩戒家人無輒怨望遣人致于洛守劉耀卿祈付其家戒使者伺耀卿會衆僚時達之耀卿得書不敢私即以上聞太后與帝見之感惻遂徙雷州亦出于揣摩也劉耀卿洛陽人八月太后同御承明殿聴政冬十月葬永定陵在鞏縣永昌陵北以天書殉史臣曰真宗英悟之主其初踐位相臣李沆屢奏災異以杜其侈心盖有所見及澶淵既盟封禪事故祥瑞沓臻天書屢降一國君臣如病狂然吁可怪也仁宗以天書殉葬山陵賢哉十一月錢惟演罷初惟演見丁謂當國權勢薰灼因附之與為昏婣寇準之斥惟演有力焉及序樞密題名獨削去準姓氏云逆凖不書御史中丞蔡齊字子思莱州膠水人言于帝曰寇準忠義聞天下社稷之臣也豈可為奸黨所誣哉帝遽令磨去之謂得罪惟演慮將及已因擠謂以自解馮拯以是惡其為人因言惟演以妹妻劉美乃太后姻家不可與機政以廢祖宗之法請罷之乃以保大節度使知河陽府踰年入朝意圖執政御史鞫詠字詠之開封人上疏論之太后遣内使持奏示惟演惟演猶顧望不行詠語右司監劉隨字仲宇開封考城人曰若相惟演當取白麻廷毁之惟演始亟去惟演出于勲貴文辭清麗名與楊億劉筠相上下于書無所不讀尤喜奬勵後進嘗曰吾生平不足者惟不得于黄紙上押字耳故切切求入中書為時議所鄙吐蕃李立遵来附給兖州學田判國子監孫奭上言知兖州日建立學舍以延生徒至數百人臣雖以俸贍之然常不給乞給田十頃為學糧従之諸州給學田始此帝初御經筵王曾以帝初即位宜近師儒乃請御崇政殿西閣召侍講學士孫奭直學士馮元字道宗廣州人講論語初詔雙日御經筵自是雖隻日亦召侍臣講讀帝在經筵或左右瞻矚及容體不正奭即拱立不講帝為竦然改聴仁宗皇帝癸亥天聖元年春正月立計置司罷𣙜茶鹽行貼射見錢法時承平既久兵籍益廣吏員益衆上下困于財三司使李諮字仲詢新喻人請省浮費鹽鐵判官俞獻卿字諫臣歙人亦言天下穀帛日耗稻禾未生而和糴桑葉未吐而和買自天禧以来日甚一日宜與大臣議捄正之上納其言乃立計置司以張士遜字順之陰城人吕夷簡魯道宗領之首考茶法利害初陜西河北商人入芻糧者雍熙後用兵多募商人入芻糧塞下酌地之逺近而為其直取市價而厚増之𣙜貨務宋𣙜茶之制擇要會之地曰江陵府曰真州曰海州曰漢陽軍曰無為軍曰蘄州之蘄口為𣙜貨務六給劵以茶償之後又益以東南緡錢及香藥犀象謂之三說讀作兊及其既敝利歸商賈入芻糧者非盡行啇多其土人急于售錢得劵即轉鬻茶啇茶商以券取茶收蓄貿易以射厚利劵之滯積雖二三年茶不足儻物之估日髙茶之價日賤故劵多滯積由是邉備日蹙入芻糧者以利薄不趨茶法大壊至是諮等較嵗入登耗上言淮南十三場茶蘄州曰王祺石橋冼馬黄梅黄州曰麻城廬州曰王同舒州曰太湖羅源夀州曰霍山麻步開順口光州曰商城子安嵗課五十萬緡天禧五年纔及二十三萬緡每劵直錢十萬鬻之售錢五萬五千總為實錢十三萬緡除九萬緡為本錢嵗纔得息錢三萬餘緡而官吏廩給雜費不與焉是則虚數雖多實利殊寡請罷三說以十三場本息併計其數罷官給本錢使商人與園户自相交易一切定為中估而官收其息如鬻舒州羅源場茶斤售錢五十有六其本錢二十有五官不復給但使商人輸息錢三十有一而已然必輦茶入官隨商人所指而與之給劵為驗以防私售謂之貼射以物為質曰貼指物而取曰射給劵為質而指取其茶故有貼射之名若嵗課貼射不盡則官市之如舊商人入芻糧塞下者隨所有實估度地理逺近量増其直給劵至京一切以緡錢償之謂之見錢法以實錢入粟以實錢售茶二者不得相為輕重諮等又以乾興中解池鹽入錢京師嵗二十三萬緡視天禧三年數損十四萬請令入中之仲反猶言注也並邉芻粟上皆従之諮法既行商人失厚利怨謗蜂起會孫奭等亦言其煩擾于是罷貼射法官仍給本錢市茶商人入錢售之茶法復壊其解鹽亦詔入錢京師隨商人所便諮改知洪州尋奪職事在三年三月行崇天厯司天監張奎運所造秋九月馮拯罷拯氣貌嚴重而乏風節丁謂不誅實拯營救力也平居自奉多侈靡外示儉陋人不能知至是以疾罷未㡬卒以王欽若同平章事欽若再相以帝初臨政謂百官敘進皆有常法為圖以獻然亦不能大用事如真宗朝矣閏月故相寇準卒于雷州後復官賜諡忠愍初太宗得通天犀犀角紋有白理如線夜視有光者名通天犀亦曰夜明犀命工為二帶一以賜準及是準病遣人取自洛中既至沐浴具朝服束帶北面再拜就榻而卒詔許歸葬西京道出公安人皆路祭挿竹焚紙踰月枯竹盡生笋衆因為立廟號竹林寇公祠公安蜀漢縣注見前今縣東北有寇莱公祠冬十一月禁巫覡邪術先是洪州俗尚鬼多巫覡惑民凡己之所資假神而言無求不得知州夏竦字子喬江州徳安人索部中㡬二千家勒令還農毁其淫祠以聞詔江浙荆湖閩廣凡挾邪術害人者悉禁絶之置益州交子倣于唐之氣錢以楮為之其後闗子會子綫引及鈔畧同此務初張詠知益州患蜀人鐵錢重不便貿易設質劑之法一交一緡以三年為一界而換之六十五年為二十二界謂之交子使富民主之後富民稍衰不能償所負爭訟不息轉運使薛田字希稷河東人張若谷字徳繇南劍州沙縣人請置交子務以權其出入禁私造者帝従其議立務于益州界以百二十五萬六千三百緡為額自是以後始以楮代鋼交子代錢限年以為界而交易之甲子二年夏五月丁亥朔司天監奏日食不應中書奉表稱賀秋八月帝臨國子監謁孔子冬十一月立皇后郭氏平盧節度使崇之女孫時張美人河南永安人石州推官堯封之女有寵帝欲立之太后不可而止故后雖立而頗見疎乙丑三年夏五月帝幸御莊觀刈麥考宋史仁宗紀是年書觀刈麥皇祐元年則不書續綱目皇祐元年書幸後苑觀刈麥而此則不書今依宋史為據而已續綱目所載附主于此聞民舍機杼聲賜織婦茶帛帝復于後苑作寶岐殿嵗觀刈麥謂輔臣曰朕作殿不欲植花卉而嵗以種麥庻知稼穡之不易也冬十一月王欽若死欽若既死後帝謂輔臣曰欽若久在政府觀其所為真奸邪也王曾對曰誠如聖諭十二月以張知白同平章事張旻為樞密使太后微時嘗寓旻家旻事之甚謹后徳之故自河陽召還長樞府樞密副使晏殊言旻無勲勞徒以恩幸被寵天下已有非才之議柰何復用為樞密使也后不恱旻尋更名耆丙寅四年夏五月契丹伐回鶻圍甘州兵敗而還先是契丹伐鶻入甘州降其王耶剌里里既而又破肅州盡俘其民修土隗口故城在今肅州西北以實之至是契丹將蕭惠字伯仁阿古只五世孫復圍甘州不克由是阻卜諸部皆叛契丹兵將多敗死六月大水京師大雨平地水數尺壊民舍壓死數百人京東西及河北江淮以南皆大水帝避殿減膳肆赦蠲民租撫流民方水之作也宰執晨朝未入有旨放朝王曾附中使奏曰天變甚異乃臣等燮理無狀豈可退安私室亟請入見陳所以備禦之道同列有先歸者皆愧服焉時傳言汴口决水且大至都人恐欲東奔帝問曾曾曰河決奏未至民間妖言不足慮也已而果然冬十月甲戌朔日食丁卯五年春正月朔帝率羣臣朝太后于會慶殿先是帝白太后欲元日先上太后夀乃受朝太后不可王曾奏曰陛下以孝奉母儀太后以謙全國體請如太后令帝不従晏殊罷以夏竦為樞密副使殊従幸玉清昭應宫従者持笏後至殊恕以笏擊之折齒為御史所論出知宣州尋改應天自五代以来天下學校廢壊殊始興建為諸州倡且延范仲淹字希文蘇州吳縣人以敎生徒仲俺敦尚風節每感激論天下事殊深器之竦明敏博學文章典雅材術過人但急于進取喜交結任數傾側世以奸邪目之夏五月楚王元佐卒秋九月以程琳字天球水寧軍博野人為御史中丞張知白最器琳當除命喜曰不辱吾筆琳上疏請罷諸土木營造蠲被災郡縣逋租帝嘉納之未㡬除知開封府王䝉正子齊雄殺人貨其妻子使以病告䝉正聨姻大后家琳察其詞色異今有司驗之得狀太后因琳對諭之曰齊雄非殺人者乃其奴捶之琳曰奴無自専理且使令興已犯同太后黙然卒論如法戊辰六年春二月工部尚書同平章事張知白卒謚文莭知白為相慎名器抑徼倖每以盛滿為戒雖貴顯清約如寒士及是卒帝為罷上已宴三月丙申朔日食以張士遜同平章事姜遵字従式淄州長山人范雍字伯純河南人為樞密副使士遜之相曹利用薦之也夏五趙徳明使其子元昊小字嵬理夏國語謂惜為嵬富貴為埋襲囘鶻甘州取之元昊性雄毅多大畧善繪畫能創製物始圓面髙準曉浮圖學通蕃漢文字徳明雖臣事中國及契丹然于本國則稱皇至是以元昊襲破回鶻奪甘州遂立為皇太子元昊事始此秋七月江南河北水據宋史及東都事畧是年大水並在七月亦不及兩浙今改政江寧府揚眞潤州江水溢詔遣使安撫賑恤河北大水九月遣近臣十七人巡行免水災州軍秋稅己巳七年春正月曹利用罷時太后臨朝中人貴戚稍能軒輊為禍福而利用以勲舊自處不恤也凡内降恩力持不與左右多怨之太后亦嚴憚利用稱曰侍中而不名利用奏事簾前或以指爪擊帶鞓左右指示太后曰利用在先帝時何敢爾邪太后頷之㑹利用従子汭為趙州兵馬監押被酒衣黃衣令人呼萬嵗事聞汭杖死内侍羅崇勲與利用有隙先是崇勲得罪太后使利用戒之利用去其冠幘詬詈良久請併罪利用后問諸執政衆顧望未有對者張士遜徐曰此獨不肖子為之利用大臣宜不知狀后大怒王曾復為力解后曰卿嘗言利用彊橫今何解也曽曰利用素恃恩故嘗以理折之今加之以大惡則非臣所知也后意少釋乃罷為千牛衛將軍知隨州二月參知政事魯宗道卒謚簡肅宗道剛正嫉惡遇事敢言貴戚用事者皆憚之目為魚頭參政因其姓且言骨鯁也及卒太后臨奠之太后臨朝宗道屢有獻替后嘗問唐武后何如主對曰唐之罪人也㡬危社稷后黙然有小臣方仲弓請立劉氏七廟后問諸輔臣衆不敢對宗道獨進曰若立劉氏七廟如嗣君何乃止后嘗與帝同幸慈孝寺欲乘輦先行宗道以夫死従子之義爭之后遽命輦後乘輿張士遜罷先是曹利用憑寵自恣士遜為相依違其間時人目之為和鼔及是利用既斥士遜遂罷以吕夷簡同平章事夏竦薛奎㕘知政事陳堯佐字希元堯叟之弟為樞密副使初奎知開封府時真宗數宴大臣至有沾醉者奎諫曰今天下誠無事然宴樂無度大臣數被酒失儀非所以重朝廷也真宗善其言及是入謝帝曰先帝嘗以卿可大任今用卿先帝意也他曰帝諭輔臣曰臣事君鮮有克終者奎對曰保終之道匪獨臣下然也因厯數唐開元天寶時事以聞帝然之安置曹利用于房州至襄陽自殺利用復坐私貸官錢再貶宦者多惡利用必欲致之死以快志内侍楊懐敏送之至襄陽驛以語侵之利用遂投繯而死利用性悍梗少通力裁僥倖而其親舊或有因縁以進者故及于禍然居位忠藎有守終始不屈死非其罪聞者冤之復制舉諸科自祥符罷制舉至是帝詔復置六科以待京朝官之被舉及應選者増置書判拔萃科以侍選人之應書者又置髙蹈邱園沈淪草澤茂材異等三科以侍布衣之被舉者又置武舉以侍方畧智勇之士三月給契丹流民田契丹饑流民至境上帝曰皆吾赤子也詔給以唐鄧州閒田仍令所過給食夏六月玉清昭應宫災罷王曾知青州續綱目作兖州今據宋史及東都事畧改正丁未夜大雨震電官内火起至曉宮室盡燬詔繫守衛者于御史獄太后泣對大臣曰先帝竭力成此宫一夕延燎㡬盡惟長生崇夀二小殿存爾何以稱遺旨哉范雍抗言曰不若悉燔之先朝以此竭天下之力遽為灰燼非出人意如因其所存又將葺之則民不堪命非所以祇天戒也中丞王曙亦言是宫之建非應經義災變之来若有警者願除其地罷諸禱祠以應天變司諫范諷字補之齊州人復言此天之戒告不當置獄窮治太后與帝感悟遂減守衛者罪乃下詔不復繕修以二殿為萬夀觀罷諸宮觀使初太后受册將御大安殿曾執不可及長寧節上夀又執不可皆供帳便殿太后左右姻家稍通請謁曾多裁抑之太后滋不恱至是曾以首相罷知青州秋八月丁亥朔日食契丹詳穏大延琳據遼陽反冬十月契丹將蕭孝穆小字胡獨堇阿古只五世孫討之遼東自神册中附契丹無𣙜酤鹽麴之法馮延休韓紹勲延徽孫相繼為戸部使始以燕法繩之民不堪命會燕荐饑户部副使王嘉獻計造船使其民漕粟以賑之水路艱險多至覆没鞭撲搒掠民怨思亂東京舍利軍詳穏大延琳因之為變遂囚留守蕭孝先字延寧孝穆弟及其妻南陽公主殺紹勲嘉以快衆情僭號興遼改元天慶副留守王道平踰城走告變契丹主徴諸道兵命南京留守蕭孝穆為都統以討之賊兵屢敗延琳嬰故城守明年賊將楊詳世夜開門納軍遂擒延琳京師地震十一月出祕閣校理范仲淹通判河中時帝毎以嵗旦冬至率百官上太后夀子㑹寧殿遂同御大安殿以受朝秘閣校理范仲淹上疏曰天子奉親于内自有家人禮今顧與百官同列北面而朝虧君體損主威非所以垂法後世也疏入不報晏殊初薦仲淹為館職聞之大懼召仲淹至詰以狂率邀名且將累薦者仲淹正色抗言曰仲淹謬辱公薦每懼不稱為知己羞不意今日反以忠直獲罪門下殊不能答既而又疏請太后還政亦不報遂乞外補出為河中府通判庚午八年秋八月復解鹽通商法上書者言𣙜解鹽官得利微而民困于轉輸詔翰林學士盛度等議更其制度上通商五利伐木造船輦運疲勞今去其有一也陸運貧人懼役連嵗逃今悉罷二也船運沈溺之患綱吏侵盜雜以沙石今皆得食真鹽三也錢幣欲使流通今嵗得商人出緡錢六十餘萬助經費四也嵗减鹽官兵卒畦夫傭作之給五也乃罷三京二十八州軍𣙜法聴商人入錢若金銀于京師𣙜貨務受兩池鹽自是商賈流行而官課損矣九月姜遵卒以趙稹字表微宣城人為樞密副使時政出宫掖稹厚結劉美家婢以干進用命未下有馳告者稹問東頭西頭盖意在中書也聞者以為笑談辛未九年夏六月契丹主隆緒卒子宗真立其母蕭訥木謹阿古只五世孫治國事宗真宫人訥木謹所生齊天后蕭氏無子取而養之愛同已出宗真立訥木謹自立為皇太后聴政宗真改元景福號隆緒曰聖宗初隆緒疾革訥木謹詈皇后曰老物之寵亦有既邪及隆緒卒左右希其風旨誣齊天后弟謀逆令鞫治之辭連及齊天后宗真聞之曰皇后侍先帝四十年撫育朕躬當為太后今不果何反罪之訥木謹曰此人若在恐為後患宗真曰皇后無子而老亦無能為也訥木謹不従遷之上京秋七月遣龍圗閣待制孔道輔字原魯孔子四十五世孫等使契丹契丹来告哀帝遣道輔及王隨字子正河南人等充賀冊及弔祭等使初道輔使契丹契丹燕使者優人以文宣王為戲道輔艴然徑出主客者邀還坐且令謝道輔正色曰中國與北朝通好以禮文相接令俳優之徒侮慢先聖而不之禁北朝之過也何謝為至是再使契丹益加禮重冬十月罷翰林學士宋綬字公垂趙州平棘人時太后專政而帝未始獨對羣臣綬請令羣臣對前殿非軍國大事及除拜皆前殿取旨書上忤太后意出知應天府壬申明道元年春二月真宗宸妃李氏薨李氏實生帝太后既取帝為己子與楊太妃保䕶之李氏黙然處先朝嬪御中未嘗自異人畏太后亦無敢言者以是帝雖春秋長不自知為李氏出也至是疾革乃自順容進位宸妃薨太后欲以宫人禮治喪于外吕夷簡奏禮宜従厚太后遽引帝起復獨立簾下召夷簡問曰一宫人死相公云云何也夷簡對曰臣待罪宰相事無内外皆當預也后怒曰相公欲離間吾母子邪夷簡對曰陛下不以劉氏為念臣不敢言尚念劉氏則喪禮宜従厚后悟乃以一品禮殯于洪福院夷簡又謂入内都知羅崇勲曰宸妃當以后服殮用水銀實棺異時勿謂夷簡不道及也崇勲懼馳告太后乃許之三月契丹蕭訥木謹弑其主母蕭氏訥木謹慮宗真懐齊天后鞠育之恩因其蒐于雪林遣人馳至臨潢賜后死后曰我實無辜天下共知待我浴而後就死使者退比反則后已死矣秋七月宫中火詔羣臣言闕失大内火延及八殿帝移御延福宫百官晨朝而宫門不啟輔臣請對帝御拱宸門追班百官拜樓下吕夷簡不拜帝使人問其故曰宫中有變羣臣願一見清光上舉簾見之乃拜有司究火所起多引宫人屬吏御史蔣堂字希魯常州宜興人言火起無迹安知非天意陛下宜修徳應變有司乃欲歸咎宫人是重天譴也時促開封府具獄程琳命工圖火所經處辨其誣伏者且言此殆天災不可以罪人遂罷獄詔羣臣直言闕失大赦殿中丞滕宗諒字子京河南人秘書丞劉越字子長大名人皆請太后還政以答天譴不報冬十一月夏王趙徳明卒子元昊嗣是嵗封徳明為夏王未㡬卒贈太師尚書令兼中書令遣楊吉授元昊三使節度觀宗及處置押蕃落使封西平王契丹亦遣使冊元昊為夏國王初元昊數諫其父勿臣宋徳明輒戒之曰吾用兵久疲矣吾族三十年衣錦綺此宋恩也不可負元昊曰衣皮毛事畜牧蕃性所便英雄之生當霸王耳何錦綺為既襲封明號令以兵法勒諸部自號嵬名吾祖凡六日九日則見官屬倣中國置文武班立蕃漢書自中書令宰相樞密使以下皆分命蕃漢人為之以衣冠采色别士庻貴賤每舉兵必率部長與獵有獲則下馬環坐而飲割鮮而食各問所見擇取其長因避父諱改明道為顯道稱于國中癸酉二年春二月彗星見于東北光芒長二尺司天言含譽星注見前見然觀者皆以為彗太后有事于太廟太后欲被服天子衮冕以享太廟薛奎力諫且曰必御此若何為拜后不聴服儀天冦衮衣初獻皇太妃亞獻皇后終獻禮畢羣臣上太后尊號帝耕耤田命宰相張士遜明道元年二月復相撰謁太廟及躬耕耤田記檢討宋祁字子京安陵人言皇太后謁廟非後世法乃止撰耤田記三月皇太后劉氏崩謚曰莊獻明肅尊太妃楊氏為皇太后帝始親政后稱制十一年雖政出宫闈而號令嚴明恩威加天下左右近習少習假借宫掖間未嘗妄改作内外賜予有節賜族人御食必易以銅器曰上方器物勿使入吾家也三司使程琳獻武后臨朝圖后擲于地曰吾不作此負祖宗事漕使劉綽河中虞鄉人還京西言在庾有出糧千餘斛乞付三司后問曰卿識王曾張知白吕夷簡魯宗道乎此四人者豈因獻羨餘進哉晚年稍進外家而任宦者羅崇勲江徳明等訪外事崇勲由此勢傾中外至是后崩帝見左右泣曰太后疾不能言猶數引其衣若有所屬何也薛奎曰其在衮冕也服之豈可見先帝于地下帝悟遂以后服斂舊制后皆二諡稱制加四諡自此始太后遺誥尊太妃為皇太后與皇帝同議軍國事閤門趣百僚賀御史中丞蔡齊目臺吏毋追班而入白執政曰上春長長習知天下情偽今宜躬攬朝政豈可使女后相踵稱制乎殿中侍御史龎籍字醇之單州武城人請下閤門取垂簾儀制盡焚之乃止尊太妃為皇太后而削去同議軍國事之語帝始親政罷創修寺觀裁抑僥倖召宋綬范仲淹而黜内侍羅崇勲等中外大恱劉太后愛帝如已出帝亦盡孝故始終無毫髪間隙及帝親庻務言者多追詆太后時事范仲淹言于帝曰太后受遺先帝調䕶陛下者十年今宜掩其小故以全大德帝曰此亦朕所不忍聞也遂下詔戒飭中外毋得輒言皇太后垂簾日事夏四月吕夷簡張耆夏竦陳堯佐范雍趙稹晏殊罷夷簡疏陳八事正朝綱塞邪徑禁賄賂辨佞壬絶女謁疎近習罷力役節冗費語甚切至帝因與謀以張耆等皆附太后欲悉罷之夷簡以為然帝退以語皇后后曰夷簡獨不附太后邪但多機巧善應變耳由是夷簡亦罷制下夷簡方押班聞唱名大駭不知其故因令素所厚内侍都知閻文應開封人詗之乃知事由郭后也于是深憾后思有以傾之以李迪同平章事王隨㕘知政事李諮為樞密副使王徳用僉事樞密院事迪自太后崩召還未㡬復相徳用初為殿前都虞候有求太后内降補軍吏者徳用曰補吏軍政也不可與太后固欲與之徳用卒不奉詔至是帝閱太后閤中得徳用所奏事奇之以為可大用遂拜僉樞追尊母宸妃李氏為皇太后謚莊懿左右有為帝言陛下乃李宸妃所生妃死以非命者帝號慟累日下詔自責追尊為皇太后幸洪福寺祭告易梓宫親啓視之妃以水銀故玉色如生冠服如皇后帝歎曰人言其可信哉待劉氏加厚六月甲午朔日食秋七月旱蝗詔求直言時嵗大旱蝗食草木㡬盡范仲淹請遣使循行未報因請間曰宫掖中半日不食當何如帝惻然乃命陳執中字昭譽恕之子安撫京東仲淹安撫江淮時初置端明殿學士以命宋綬綬上言帝王御天下在總攬威柄陛下躬親萬㡬内外延首望冶而賞罰號今未過於前日頃者恩出太后而今又出大臣大臣市恩以招權小人趨利以售進此風䆮長冇蠧邦政太宗嘗曰國家無外憂必有内患外憂不􅂈邉事皆可預防若姦邪共濟為内患深可懼也真宗亦曰唐朝朋黨尤甚以致王室卑弱願陛下思祖宗訓戒念王業艱難整齊紀綱正在今日又言馭下之道有三臨事貴守當機貴斷兆謀貴密能守則姦無由移能斷則邪無由惑能密則事無由變斯安危之所繫惟陛下深念之冬十月葬莊獻明肅皇后莊懿皇后于永定陵詔定祔廟禮翰林侍讀學士宋綬援春秋考仲子之宫故事請别築宫乃作奉慈廟以奉二后神主張士遜楊崇勲明道元年為樞密副使免以吕夷簡同平章事宋綬㕘知政事王曙為樞密使王徳用蔡齊為副使士遜與崇勲宴飲期上莊懿太后册不至中丞范諷劾之俱罷夷簡遂復相十一月薛奎罷奎以疾罷踰年卒奎謀議正直或志不伸歸輒歎咤不食家人笑曰何必如是奎曰吾仰慙士人俯愧後世爾尤善知人范仲淹龎籍明鎬字化基密州安邱人自為吏部選人皆以公輔許之卒如其言詔宰相毋得進用臺官言者謂臺官必由中旨乃祖宗法也帝曰祖宗法不可壊宰相自用臺官則宰相過失無敢言者乃詔自今臺官非中丞知雜保薦者毋得除授廢皇后郭氏謫御史中丞孔道輔右司諫范仲淹時尚美人楊美人俱得幸數與皇后忿爭一日尚氏于帝前有侵后語后不勝忿批其頰帝自起救之誤批帝頸帝大怒内侍閻文應因與帝謀廢后且勸以爪痕示執政帝以示吕夷簡告之故夷簡有憾于后遂主廢黜之議帝猶疑之夷簡曰光武漢之明主也郭后止以怨懟坐廢况傷陛下頸乎帝意遂決夷簡先敇有司毋得受臺諫章奏乃詔稱皇后願入道封淨妃玉京冲妙仙師居長寧宫臺諫章奏果不得入于是中丞孔道輔率諫官范仲淹孫祖徳字延仲濰州北海人宋庠本名郊字公序祁之兄劉渙御史蔣堂郭勸字仲褒鄆州須城人楊偕字次公坊州中部人馬絳段少連字希逸開封人十人詣垂拱殿伏奏皇后天下之母不當輕廢願賜對盡所言殿門闔不為通道輔叩鐶大呼曰皇后被廢奈何不聴臺臣言尋有詔令夷簡諭以皇后當廢狀道輔等至中書語夷簡曰大臣之于帝后猶子事父母也父母不和可以諫止奈何順父出母乎夷簡曰廢后有漢唐故事道輔曰大臣當導君以堯舜豈得引漢唐失徳為法邪夷簡不答即奏言伏閣請對非太平美事遂黜道輔知泰州仲淹知睦州祖徳等罰金仍詔臺諫自今毋相率請對明日道輔等趨朝欲留百官揖宰相廷爭至待漏院聞詔乃退道輔鯁挺特達遇事彈劾無所避天下皆以直道許之僉書河陽判官富弼字彦國河南人言朝廷一舉而兩失縱不能復后宜還仲淹等不聼後近臣有獻詩百篇者執政請除龍圗閣直學士帝曰是詩雖多不如孔道輔一言遂以命道輔自是在廷皆知前日之斥果非上意也甲戌景祐元年春正月置崇政殿說書侍講學士孫奭年老乞外因薦賈昌朝字子明真定獲鹿人趙希言王宗道楊安國字君倚密州安邱人等自代遂制說書日輪二人祗候昌朝誦說明白帝多所質問夏五月契丹主宗真幽其母蕭氏于慶州遼置故城在今巴林西北䝉古名挿漢城契丹太后訥木謹召諸弟議欲立少子重元小字孛吉只聖宗次子重元以其謀白于遼主遂收太后符璽而遷之慶州七括宫始親決國事立重元為皇太弟八月有星孛于張翼張六星注見前翼二十二星天之樂府又主逺賓帝以星變避殿減膳尋詔淨妃郭氏出居瑤華宫賜號冲静元師尚美人亦廢于洞真宫入道楊美人别宅安置王曙卒以王曾為樞密使曙方嚴簡重有大臣體居官深自損抑然喜浮圗法齋居疏食泊如也及卒以王曽代之九月立曹氏彬女孫為皇后御史裏行孫沔字元規會稽人請終莊獻喪制而後行祕書丞余靖字安道韶州曲江人亦以為言不報冬十月趙元昊冦環慶續綱目于是年七月書趙元昊反冦環慶考宋史夏國傳及東都事元昊入冦俱不係七月且入冦環慶在先稱兵報仇在後自是兩事續綱目混而為一叙次顚倒今改正再考宋史仁宗紀景祐元年十二月賜趙元昊佛經盖是時元昊雖僣擬改元然猶遣使奉貢故禮賜如故至寶元元年上表自言稱帝本紀乃始書反今一依本紀為斷于此書冦于寶元元年書反元昊率衆至環慶殺掠居民下詔約束之已而慶州柔逺砦宋置在今慶陽府安化縣北蕃部都巡檢嵬通嵬羌人姓通其名也攻後橋諸堡夏人所築破之元昊稱兵報仇縁邉都巡檢楊遵與戰敗績環慶都監齊宗矩援之次節義峯在安化縣西北伏發被執久之始放還元昊雖嘗奉貢而車服僭擬改元開運或曰石晉敗亡號也乃改廣運是月其母衛慕氏之族人山喜謀殺元昊事覺元昊酖其母殺之沈山喜之族于河遣使来告哀乙亥二年春正月作邇英延義二閣先是龍圗閣學士祥符中置班樞密直學士上孫奭繪無逸圗以進帝命施于講讀閣至是又詔蔡襄字君謨興化軍仙逰人寫無逸篇于閣屏貶御史裏行孫沔監永州酒務沔上言自孔道輔范仲淹被黜凡在縉紳盡懐緘黙乞少霽天威用存國體疏入責知衡山縣沔未知有責命復上書言事畧日深宫之中侍左右者刀鋸之餘恱耳目者艷冶之色宸禁畫嚴乗輿天逺未見歎召名臣請問外事詢祖宗之紀綱質朝廷之得失徒修簡易之名未益承平之化又曰願推擇大臣講求古道極論精忠品藻賢哲逐刺史縣令老懦貪殘之輩以利于民罷公卿大夫諂佞詭誕之士以肅于朝簡掖庭之幽曠以求錫羨之慶抑宦侍之重任以防昵近之私書奏再責監永州酒務二月育宗室允讓太宗之孫商王元份之子子宗實于宫中時帝未有繼嗣曹皇后居中決定大計遂取宗實入宫后拊鞠之時年四嵗李迪罷以王曾同平章事蔡齊盛度㕘知政事王隨李諮知樞密事王徳用韓億字宗魏開封雍邱人同知院事侍御史龎籍劾三司使范諷李廸右之籍劾諷不已詔下獄置對上獨召吕夷簡與宋綬決獄夷簡素疾諷又欲因以傾迪特寛籍而重貶諷凡與諷善者皆絀削迪遂罷知亳州迪謂人曰迪不自量恃主上之知自以為宋璟而以吕公為姚崇其待我乃如是邪當時謂籍之劾諷夷簡實陰敎之命集賢校理李照重定雅樂時承平日久帝留意禮樂之事判太常寺燕肅字穆之青州益都人乞以王朴所造律準考定樂器帝乃命李照照言朴律準視古樂髙五律視敎坊樂髙二律臣請依神瞽律法試鑄編鐘一簴可使量度權衡協和詔許之既成帝御延福宫觀焉然照獨任所見更造新器聲極下議者非之乃詔天下有深達鍾律音者所在以聞知杭州鄭向字公明陳留人薦鎮東推官阮逸知蘇州范仲淹薦布衣胡瑗字翼之泰州海陵人瑗逸至闕盛言照樂穿鑿帝命改作之瑗以橫黍累尺及成則律圍徑與古不合而逸又獨執周禮嘉量之法請鑄量以定律右司諫韓琦字穉圭國華之子言自燕肅倡議以来言人人殊臣恐後人復有従而非之者臣竊計之不若窮作樂之原為致治之本使政令平簡民物熙洽斯則治古之樂也可以器象求乎今西北二陲久弛邉備陛下與左右大臣宜先及之緩兹求樂之議移訪安邉之策帝嘉納之詔太常仍用和峴所定樂秋九月作睦親宅依宋史帝紀改七月為九月上以皇族散處都城或暌燕集詔以玉清昭應宫舊地作睦親宅以處之冬十月故后郭氏暴卒詔竄内侍閻文應于嶺南后居瑤華帝頗念之遣使存問賜以樂府后和荅辭甚悽惋帝悔嘗密遣人召之后辭曰若再見召須百官立班受册方可文應以嘗譖后懼其復立屬后小疾帝遣文應挾醫診視數日言后暴崩中外疑文應進毒而不得其實帝深悼之追復后號以禮殮𦵏而停謚册祔廟之禮知開封府范仲淹劾奏文應之罪竄之嶺南死于道詔錄五代及諸國後以郊祀加恩故也時御史臺辟石介字守道兖州奉符人為主簿介未至論不當求諸偽國後坐罷館閣校勘歐陽修遺書責中丞杜衍曰主簿于臺中非言事官介足求履臺門之國已用言事見罷度介之才不止為主簿直可為御史今斥介而他舉亦必擇賢夫賢者固好辯又有言則又斥而他舉乎如此則必得愚闇懦黙者而後止也衍不能用字歐陽修字永叔廬陵人杜衍世昌越州山陰人十二月吐蕃嘉勒斯賚大敗趙元昊于河湟趙元昊遣索諾爾擊嘉勒斯賚敗死殆盡索諾爾被執元昊自領衆攻猫牛城即氂牛城後崇寧中改名宣威在今西寧府西寧縣北一月不下既而許約和城開元昊大縦殺戮又攻青唐今西寧縣宋初屬吐蕃謂之青唐城宗噶爾注見前帶星嶺在西寧縣故龍支城西北諸城吐蕃部將阿咱爾以兵截歸路元昊與戰敗之然兵溺宗噶爾河即宗哥河亦曰宗水源出西寧邉外東北流入湟河及饑死過半并兵臨河湟嘉勒斯賚潛移州不出元昊乃渡河插幟識其淺嘉勒斯賚潛移植深處及大戰元昊潰歸士卒視幟而渡溺死者十八九鹵獲甚衆嘉勒斯賚来獻捷詔加保順軍留後丙子三年春三月詔優給致仕官俸詔曰致仕官舊給半俸而仕嘗顯者或貧不能自給非所以遇髙年養亷恥也自今兩省卿監刺史閤門使以上致仕者給俸如分司長吏嵗時以朕意勞賜之復貼射茶法自貼射茶法廢而河北入中虚估之弊益甚李諮既居政府請復行見錢法皆如天聖元年之制又命商持劵徑趨𣙜貨務驗實立償之錢而三說之法廢縣官自此省費矣夏五月貶知開封府范仲淹及集賢校理余靖館閣校勘尹洙字師魯河南人歐陽修于外詔戒羣臣越職言事仲淹以吕夷簡執政進用多出其門上百官圗指其次第曰如此為序遷如此為不次如此則公如此則私况進退近臣凡超格者不宜全委之宰相夷簡不恱他日論建都之事仲淹進曰洛陽險固而汴為四戰之地太平宜居汴即有事必居洛陽當漸廣儲蓄繕宫室帝以問夷簡夷簡對曰仲淹迂濶務名無實仲淹聞之乃為四論以獻一曰帝王好尚二曰選賢任能三曰近名四曰推變大抵譏切時弊且曰漢成帝信張禹不疑舅家故有新莽之禍臣恐今日亦有張禹壊陛下家法吏簡訴仲淹越職知饒州集賢校理余靖上言仲淹以議刺大臣重加譴謫儻其言未合聖意在陛下聴與不聴耳安可以為罪乎汲黯在廷以平津為多詐張昭論將以魯肅為麄疎漢皇吳主熟聞訾毁兩用無猜豈損令徳陛下自親政以来屢逐言事者恐鉗天下口請改前命疏入坐落職監筠州唐置今江西瑞州府是酒稅館閣校勘尹洙上疏曰仲淹忠亮有素臣與之義兼師友則是仲淹之黨也臣不可苟免夷簡怒斥監郢州酒稅館閣校勘歐陽修貽書責司諫髙若訥字敏之并州榆次人曰仲淹以非辜逐君不能辨猶以面目見士大夫出入朝中是不復知人間有羞恥事若訥怒上其書修坐貶夷陵注見前令于是御史韓縝字玉汝億第六子希夷簡旨請以仲淹朋黨榜朝堂戒百官越職言事従之時朝士畏宰相無敢出送仲淹者獨龍圗直學士李紘集賢校理王質出郊飲餞之或以誚質質曰希文賢者得為朋黨幸矣館閣校勘蔡襄作四賢一不肖詩以譽仲淹靖洙修而譏若訥都人相傳寫鬻書者市之得厚利契丹使適至買歸張于幽州館子李紘字仲綱昌齡従子王質字子野旦第三秋七月置大宗正司以宗室允讓領之時諸王子孫衆多既聚居睦親宅詔于祖宗後各擇一人使司訓導糾遺失冬十月契丹初殿試進士契丹主御元和殿以日射三十六熊賦幸燕詩試進士于廷遂大宴十一月皇太后楊氏崩謚章惠祔葬永定陵十二月趙元昊侵囘鶻取瓜沙肅州注見前元昊既悉有夏銀綏宥静靈鹽㑹勝甘凉注俱見前又取爪沙肅而洪定威龍皆即堡鎮號為州洪州以洪源谷名在今凉州府平畨縣定州即定逺鎮注見前威州即威振堡在今寧夏府平羅縣龍州今榆林府靖逺縣之龍州堡是仍居興州元昊改靈州為興州以為興慶府阻河黄河也依賀蘭山在今寧夏府寧朔縣西元和志其山樹木青白望如駮馬彼人呼駮馬為賀蘭故名為固地方萬里改元大慶設十六司以總庶務置十六監軍司委酋豪分統其衆軍兵總計五十餘萬發兵則以銀牌召部長自製蕃書形體方正類八分以敎國人紀事初華州有二生曰張曰吳者久困場屋薄遊塞上聞元昊有意窺中國遂叛而往即其都門之酒家劇飲終日引筆書壁曰張元吳昊来飲此邏者執之元昊責以入國問諱之義二人大言曰姓尚不理會乃理會名邪時元昊用中國賜姓二人故云元昊竦然異之日尊寵用事凡夏人立國規模入冦謀畫皆二人所導也丁丑四年春二月祠赤帝于宫中初乾徳中太常博士聶崇義言皇帝以火徳上承正統請以赤帝為感生帝每嵗正月别壇而祭至是以祈嗣乃置像宫中祠之夏四月吕夷簡王曾宋綬蔡齊罷以王隨陳堯佐同平章事韓億程琳石中立字表臣熙載子㕘知政事盛度知樞密院事王鬷字總之趙州臨城人同知院事初夷簡事曾甚謹曾力薦為相及曾復入中書位反居下而夷簡任事久多所専決曾不能堪議論間有異同遂力求罷帝疑之問曾曰卿亦有所不足邪時外傳夷簡納賂曾因及之帝以問夷簡夷簡乞置對遂交論帝前而曾語亦有失實者求去益力夷簡亦乞罷時曾與蔡齊善而夷簡善宋綬惟盛度不得志于二人而性猜險每有所議依違其間及是帝問度曰曾夷簡力求退何也度對曰二人心事臣不得知陛下詢二人以孰可代者則其情可察矣帝従之曾薦齊夷簡薦綬于是四人俱罷而度獨留冬十二月地震京師及定襄并代忻州皆震而并代忻尤甚壊民廬舍壓死者二萬二千餘人傷者五千六百人直史館葉青臣字道卿蘇州長洲人上言京師地震及大河之東彌千五百里誠大異也陛下泰然不以為異徒使内侍四方崇佛事修道科非所謂消復之實也頃范仲淹余靖以言事被黜天下之人齰舌不敢議朝政者將二年願陛下深自咎責詳延忠直敢言之士庻㡬明威降鑒善應来集書奏數日仲淹等皆得近徙戊寅寶元元年春正月戊戌朔日食續綱目不書今依宋史天文志補詔求直言時有衆星西北流雷發不時下詔求直言大理評事蘇舜欽字子美易簡孫言臣觀國史祖宗日日視朝旰昃方罷猶坐後苑門召對白事者委曲詢訪今陛下春秋鼎盛實宵旰求治之秋乃隔日御殿此政事不親也三司計度經費二十倍于祖宗之時府庫匱竭斂科無虚日此用度不足也二者誠國大憂願陛下因此災變修己以御人洗心以鑒物勤聴斷舍燕安放優諧近習之纎人親剛明鯁直之良士以思永圗疏入詔復曰御前殿三月王隨陳堯佐韓億石中立免隨為相無所建明而數與堯佐億中立争事㑹災異屢見右司諫韓琦言隨堯佐中立非輔弼才億不當以子綱為羣牧判官遂皆免琦遇事敢言切而不迂在諫垣前後凡七十餘疏以張士遜章得象字希言建州浦城人同平章事王鬷李若谷字子淵徐州豐人㕘知政事王博文字仲明曹州濟陰人陳執中同知樞密院事得象為翰林學士時莊獻太后每遣内侍至學士院得象必正色待之或不交一言帝聞而器之至是謂曰向者太后垂簾羣臣邪正朕皆黙識惟卿清忠無所阿附且未嘗干請今日用卿職由此也博文尋卒以張觀同知樞密院事絳張觀字思正絳州縣人冬十月詔戒百官朋黨范仲淹既徙潤州讒者恐仲淹復用遽誣以事語入帝怒亟命置之嶺南中外論薦仲淹者衆帝以其涉朋黨下詔戒之趙元昊殺其叔父山遇遂反元昊遣使請五臺供佛以窺河東道路既還與諸酋歃血約先攻鄜延欲自靖徳當作徳靖故城在今延安府保安縣塞門砦在今延安府保塞縣赤城路在今平凉府崇信縣三道並入其叔父山遇數勸元昊勿反不聴山遇遂挈妻子来降知延州郭勸執還元昊元昊殺之遂稱帝改元天授禮法延祚國號夏遣使奉表有云望許西郊之地冊為南面之君敢竭庸愚常敦歡好十一月沂公王曾卒謚文正曾性資端厚在朝廷進止有常處平居寡言笑人不敢干以私進退士人莫有知者范仲淹嘗謂曾曰明揚士類宰相任也公之盛徳獨少此爾曾曰恩欲歸己怨將誰歸邪仲淹服其言及卒贈侍中曾無子皇祐中其弟子融援唐元宗題裴耀卿碑額例請帝親篆其碑許之題曰旌賢大臣賜碑自曾始十二月京師地震以夏竦為涇原秦鳳安撫使范雍為鄜延環慶安撫使經畧夏州時鄜延路奏趙元昊反故有是命已而移竦知涇州與雍俱兼經畧使又命天章閣待制龎籍體量體察量度也陜西詔籍就竦計事竦上疏以為徳明元昊相繼猖獗今若不較主客之利不計防守之便而輒議追討非良策也因條上十事一教習彊弩以為竒兵二羈縻屬羌以為藩籬三詔嘉勒斯賚并力破賊四度地勢險易逺近砦柵多少増減屯兵五詔諸路互相應援六募土人為兵以伐東兵七增置弓手壯丁以備城守八併並邉小砦以完兵力九聽闗中民入粟贖罪以贍邉計十損並邉冗官冗官以紓饋餉朝廷多采用之然是時邉臣方議征討多以竦為怯加吐蕃嘉勒斯賚保順節度使自西涼為李繼遷所陷巴勒結舊部歸嘉勒斯賚囘紇多附之嘉勒斯賚居鄯州西有臨谷城在今西寧府西寧縣通青海髙昌諸國注俱見前商人皆趨之以貿易由是富彊朝廷欲使背擊元昊以披其勢因授節鉞仍兼邈州大首領尋加河西節度使嘉勒斯賚約盡力然終不能立大功己卯二年夏四月募民入粟實邉五月罷王徳用以夏守贇字子美守恩弟知樞密院事趙元昊反徳用請自將討之不許徳用狀貌雄毅面黑頸以下白晳人皆異之言者論其貌類藝祖且得士心不宜久典機密遂罷言者猶不已遂降知隨州家人惶懼而徳用舉止言笑自若惟不接賓客而已六月削趙元昊賜姓官爵元昊表至羣臣皆曰元昊小醜出師討之當即誅滅諫官吳育字春卿建安人獨進曰天昊雖稱藩臣其尺賦斗租不入縣官且叛服不常請置之示不足責且彼已僭輿服勢必不能自削宜援國初江南故事稍易其名可以順附而收之不報未㡬下詔削奪元昊官爵絶互市掲榜于邉募人能擒元昊若斬首獻者即授定難節鉞已而元昊又遣賀永年齎嫚書納旌節及所授敇告置神明匣留歸孃族而去歸孃族蕃部名詔省浮費時陜西用兵調費日蹙命近臣及三司議省浮費右司諫韓琦言省費當自掖庭始請令三司取先朝及近嵗賜予之數裁為中制無名者罷之乃詔自乘輿服御及宫掖所須務従簡約或欲損兵吏俸賜帝曰祿廪皆有定制母遽更變以揺人心宜申諭之秋七月契丹主宗真迎其母蕭氏于慶州蕭氏居慶州五年勸契丹主迎之以覬中國嵗幣之利契丹主悔悟乃奉迎還京然出入舍止常相距十數里陰為之備冬十一月盛度程琳罷以王鬷知樞密院事宋庠㕘知政事初張士遜惡琳而嫉孔道輔不附己欲并去之㑹開封府吏馮士元以贓敗知府鄭戩字天休蘇州吳縣人窮治之辭連度琳及天章閣待制龎籍直集賢院吕公綽字仲裕太常博士吕公弼字宗臣並夷簡子等十餘人士遜謂道輔曰上顧程公厚今為小人所誣盍見上辨之道輔不悟入言琳罪薄不足深治帝以道輔朋附怒于是度琳俱坐免度出知揚州琳知潁州籍等並被黜罷士元流海島道輔亦出知鄆州道輔始知為士遜所賣發憤而卒然天下皆以遺直許之夏人冦保安軍宋置今延安府保安縣是巡檢指揮使狄青字漢臣汾州河西人擊敗之青初以善騎射為騎御散直従西征戰安逺本蕃部舊砦在延安府安塞縣北諸砦皆克捷臨敵披髪帶銅面具出入賊中皆披靡莫敢當至是元昊冦保安軍鈐轄盧守懃字君錫開封祥符人使青擊走之以功加秦州刺史帝欲召見問以方畧㑹賊冦渭州命圖形以進庚辰康定元年春正月丙辰朔日食先是司天楊惟徳請移閏于庚辰嵗則日食在正月之晦帝曰閏所以正天時而授民事其可曲避乎不許至是諫院富弼請罷宴徹樂就館賜北使酒食執政不可弼曰萬一契丹行之豈不為朝廷羞既而聞契丹罷宴帝深悔之元昊寇延州執副總管劉平字士衡開封祥符人石元孫字善長守信孫平死之續綱目作劉平石元孫戰殁考平與元孫同被執而平死節元孫留賊中不得並書戰殁今改書二月貶范雍知安州延州當夏人出入之衝地濶砦疎土兵寡弱又無宿將雍請益師不報未㡬元昊詐遣人通欵于雍雍信之不設備既而元昊引兵攻保安軍破金明砦本隋金明縣宋改為砦故城在延安府安塞縣執都監李士彬延州金明人父子乘勝至延州城下雍令石元孫出戰又以書召劉平于慶州平督騎兵先發步卒繼進夜至三川口宜川延川洛川之口也在今安塞縣北西十里止營時鄜延都監黃徳和巡檢万俟政郭遵開封人分屯外境雍皆召還為援平與之合步騎萬餘東行五里許與賊遇遵擊退之賊䝉盾而陳官軍復奪其盾殺獲及溺死者近千人日暮賊以輕兵来薄官軍小却徳和望見遽率麾下走保西南山衆従之皆潰平遣其子宜孫馳追徳和語曰當并力抗賊先何先奔徳和不従驟馬遁赴甘泉唐縣今屬延安府平遣軍校遮留得千餘人轉鬭三日退保西南山立柵自顧夜四鼔賊環營呼曰如許殘兵不降何待平旦賊自山四出合擊絶官軍為二平遂與元孫俱被執平不食數罵曰何不速殺我遂遇害元孫留賊中會大雪賊解去延州得不陷徳和既遁輒誣平降賊詔殿中侍御史文彦博字寛夫汾州介休人即河中置獄問狀徳和坐腰斬雍貶知安州朝廷不知孫元未死詔與平俱贈官後元昊歸欵縦元孫歸諫官請斬塞下以賈昌朝奏貸之安置全州以夏守贇為陜西經畧安撫招討使内侍王守忠為都鈐轄知諫院富弼言唐之衰以内臣監軍取敗非一今守忠為鈐轄與監軍無異昨用夏守贇已失人望願罷守忠勿遣不聴除越職言事之禁西事日擾括畿内京東西淮南馬詔諸路轉運提刑訪知邉事者以聞又詔樞密同宰臣議邉事出内藏緡錢八十萬陜西糴軍儲釋寇所至州縣罪並免夏稅時禁越職言事富弼因論日食謂應天變莫若通下情帝嘉納之于是盡除其禁許中外臣庻上封章言朝政得失命知制誥韓琦安撫陜西琦使蜀歸論西師形勢甚急即命安撫陜西琦言范雍節制無狀宜召知越州范仲淹委任之方陛下焦勞之際臣豈敢避形迹不言若涉朋比誤國家當族帝従之召范仲淹知永興軍三月王鬷陳執中張觀免以晏殊宋綬知樞密院事王貽永字繼長溥之孫同知院事天聖中鬷使河北過真定時曹瑋為總管鬷見之瑋謂曰君異日當柄用願留意邉防鬷曰何以教之瑋曰吾聞趙徳明嘗使人以馬𣙜易漢物不如意欲殺之少子元昊年方十歲諫曰我戎人本従事鞍馬而以資鄰國易不急之物已為非策又従殺之失衆心矣徳明従之吾嘗使人覘元昊狀貌異常他日必為邉患鬷未以為然比再入樞密元昊果反帝數問邉事鬷不能對及劉平戰殁議刺鄉兵久未決帝怒遂與執中觀同免鬷始歎瑋之明識夏五月張士遜致仕以吕夷簡同平章事時軍興機務填委士遜位首相無所建明諫官以為言士遜不自安上章請老詔以太傅致仕宰相得謝自士遜始以夏竦為陜西經畧安撫招討使韓琦范仲淹副之詔夏守贇王守忠還守贇庸怯寡方畧詔與王守忠赴闕以竦等代之仲淹上言今邉城之備十有五七闕中之備十無二三若昊賊深入乘闕中之虛東阻潼闗隔兩川貢賦則朝廷不得髙枕矣為今之計宜嚴戒邉備使持久可守充實闗内使無虛可乘寇至邉城清野不得大戰闗中稍實不能深入二三年問彼自困弱此上策也今邉城請五路入討臣恐承平嵗久無宿將精兵一旦興深入之謀國之安危未可知也已而元昊陷塞門砦執砦主髙延徳以去又陷安逺承平二砦著作佐郎張方平上平戎十策其畧以為宜屯重兵河東示形勢賊入寇必自延渭而興州巢穴之守必虚我師自麟府渡河不十日可至此所謂攻其所必救形格勢禁之道也宰臣吕夷簡雖善其策而不果行承平砦在延安府安定縣北張方平字安道南京人以范仲淹兼知延州延州諸砦多失守仲淹請自行詔兼知延州先是詔分邉兵總管領萬人鈐轄領五千人都監領三千人寇至禦之則官卑者先出仲淹曰將不擇人以官為序取敗之道也于是大閱州兵得萬八千人分六將領之日夜訓練量賊衆寡使更出禦敵人聞之相戒曰無以延川為意今小范老子腹中自有數萬甲兵不比大范老子可欺大范指雍也仲淹以民逺輸勞苦請建鄜城為軍以河中府同華州中下戸租稅就輸之春夏徙兵就食可省糴之十三他所減不與去聲詔以為康定軍仲淹又修承平永平等砦永平砦在延安府延川縣西北稍招還流亡定堡障通斥堠城十二砦于是羌漢之民相踵歸業九月元昊寇三川諸砦三川砦宋置在平凉府固原州東南環慶副總管任福字祐之開封人攻其白豹城在今慶陽府安化縣北克之元昊寇三川諸砦韓琦使任福領兵七千聲言巡邉部分諸將夜趨七十里至白豹城平明克之破四十一族焚其餘積而還鄜州將种世衡字仲平放兄子城青澗本寛州壘宋建城金升為縣今屬綏徳州時塞門諸砦既陷鄜州判官种世衡言延安東北二百里有故寛州城請因廢壘而興之以當寇衝右可固延安之勢左可致河東之粟北可圖銀夏之舊朝廷従之命世衡董其役夏人屢次来争世衡且戰且城然處險無泉議不可守鑿地百五十尺至石不及泉工辭不可穿世衡命屑石一畚酬百錢卒得泉以濟城成賜名青澗以世衡知城事世衡開營田募商賈通貨利城遂富實冬十月詔内降升遷者執奏先是韓琦言祖宗于賞罰任使必與兩省大臣升朝公議自莊獻垂簾遂有假托因縁或于内中下表或口為奏求以致僥倖日滋賞罰倒置蠧壊綱紀為害至深臣乞自今于凡因縁陳乞者即降出姓名并為奏求人並重行貶責則聖政無私朝規有序矣帝嘉納之詔禁皇族及諸命婦女冠尼等非時入内至是復詔凡有内降升遷及差遣者許執奏十二月鑄當十錢助邉費也辛巳慶厯元年春正月詔鄜延涇原㑹兵討元昊不果行帝以元昊勢益猖獗遣翰林學士晁宗慤字世良澶州清豐人即陜西問攻守之䇿夏竦等具二說令副使韓琦判官尹洙詣闕奏之帝取攻䇿執政以為難杜衍亦曰儌倖成功非萬全之計帝不聴詔鄜延涇原㑹兵期以正月進討范仲淹言正月塞外大寒我師暴露不如俟春深賊馬瘦人饑勢易制且鄜延密邇靈夏西羌必由之地乞留此一路以備招納或擇利進城廢砦以牽制元昊帝従之仍詔仲淹與琦等同謀可以應機乘便即仍出師琦奏言兩路協力尚懼未能大剉黠虜若鄜延以牽制為名則是委涇原孤軍嘗于賊手非計之得乞督令鄜延進兵同入帝以奏示仲淹仲淹言臣與琦等皆一心非有怯弱但戰者危事一或失差則平定之期轉延嵗月况横山在榆林府懐逺縣南與延安府安定縣接界蕃部散居亦多設堡控扼兵少則難追多則難進未見其利琦又令尹洙至延州議仲淹堅執不可琦復上奏曰仲淹意在招納使朝廷彊之終非己謀將佐聞之必無鋭志臣以賊昊傾國入㓂不過四五萬我兵逐路自守勢分力弱故遇敵不支若大軍併出鼔行而前乘賊驕惰其破可必今中外不究此故遂乃待賊太過屯二十萬重兵只守界濠中夏之弱自古未有臣恐邉障日虚士氣日喪經費益蹙乞别命近臣以觀賊隙如可進討㫁在不疑朝廷終難之元昊遣人至延州議和范仲淹以書諭之考宋史范仲淹傳元昊請和于仲淹在好水之戰前夏國傳在好水之戰後韓琦傳與仲淹傳畧同續綱目叙次以韓范二傳為斷今依之元昊歸陷將高延徳于延州與范仲淹約和仲淹自為書遺元昊反覆戒諭令去帝號盡臣節以報累朝厚待之恩㑹元昊亦求盟于韓琦琦曰無約而請和者謀也命諸將戒嚴而自行邉二月元昊寇渭州宋置治平涼唐時渭州已沒吐畨故移置于此任福與戰于好水川今名甜水河在平凉府隆徳縣東源出六盤山西南流與苦水合苦水即瓦亭水也敗死貶韓琦知秦州韓琦行邉至高平此宋砦在平涼府鎮原縣北非古高平城也元昊果遣衆寇渭州薄懐逺城本赤藁城明道中賜名在隆徳縣東南琦乃趨鎮戎軍宋置今固原州是盡出其兵命環慶副總管任福將之以耿傅字公弼河南人參軍事涇原都監桑懌雍邱人為先鋒朱觀武英字漢傑太原人王珪開封人各以所部從福將行琦戒令自懐逺趨徳勝砦宋置在平涼府静寧州東北至羊牧隆城在隆徳縣西北即邪没隴川宋于此置砦出敵後度勢未可戰即據險置伏要其歸路且曰苟違節制有功亦斬福引輕騎數千趨懐逺掠龍川在隆徳縣東北遇鎮戎西路廵檢常鼎劉肅與敵戰于張家堡南敵佯北桑懌引騎趨之福踵其後諜傳敵兵少福等頗易之薄暮與懌合軍屯好水川朱觀武英屯籠絡川在好水川南相距五里時元昊自將精兵十萬營于川口諸將已入其伏中猶不知約以翌日會兵不使夏人一騎遁詰旦福與懌循好水川西行出六盤山在隆徳縣東與固原州接界下距羊牧隆城五里與夏軍遇方知墮敵計勢不可留遂格戰懌于道傍得數銀泥合封襲謹宻中有動躍聲疑莫敢發福至發之乃懸哨家鴿百餘自中起盤飛軍上于是夏兵四合懌馳犯其鋒福陣未成列賊縱鐵騎突之自辰至午陣動衆欲據勝地忽夏人陣中樹鮑老旗戲幢也長二丈餘懌等莫測既而旗左麾左伏起右麾右伏起翼而擊之官軍大敗懌肅戰死福身被十餘矢小校劉進勸福自免福曰吾為大將兵敗以死報國爾力戰鎗中左頰絶其喉而死子懐亮亦死之先是渭川都監趙津將瓦亭宋砦在平涼縣以瓦亭闗名瓦亭闗在平涼府華亭縣西北是為東瓦亭其西瓦亭在秦州泰安縣東北騎兵三千為後繼至是與朱觀武英遇合兵拒戰王珪亦自羊牧隆城引屯兵四千五百助觀掠陣陣堅不可破英被重傷不能視軍敵兵益至衆遂潰英津珪傅皆死惟觀以兵千餘保民垣發矢四射㑹暮敵引去得還將士死者萬三百人闗右大震時元昊傾國入㓂福臨敵受命所統皆非素撫之兵又分出趨利故至甚敗奏至帝震悼為之旰食夏竦使人收散兵得琦檄于福衣帶間言罪不在琦琦亦上章自劾猶奪一官徙知秦州三月貶范仲淹知耀州元昊答仲淹書以好水川之勝語多不遜仲淹對來使焚之朝議以仲淹不當擅通書又不當擅焚之宋庠請斬仲淹杜衍曰仲淹志在招納葢忠于朝廷也何可深罪帝乃䧏仲淹戸部員外郎徙知耀州未㡬復徙慶州夏四月以陳執中同陜西撫經畧招討使時夏竦判永興軍執中知軍事議多異同故分命竦屯鄜州執中屯涇州竦雅意在朝廷及任以西事頗依違顧避嘗出廵邉置侍婢中軍帳下幾至兵變元昊命募得竦首者與錢三千其見輕侮如此五月宋庠鄭戬罷以王舉正字伯中化基于參知政事任中師字祖聖中正弟任布字應之河南人為樞宻副使庠練習典故遇事輒分别是非戬果敢任氣皆與吕夷簡不合因罷凡庠與善者夷簡悉指為朋黨斥之秋八月元昊䧟豐州注見前冬十月夏竦陳執中免元昊㓂麟府州折繼閔徳扆曾孫敗之尋㓂金明破寧逺宋砦在葭州府谷縣西進圍豐州孤城無援遂䧟元昊又遣兵分屯要害以絶麟州餉道會管勾麟府軍馬事張亢字公壽濮州人破賊于柏子砦在府谷縣北及毛川在葭州神木縣西北遂築十餘柵河外始固知諌院張方平言夏竦為統帥三嵗于兹師惟不出出則喪敗㓂惟不來來必殘蕩安用為統帥也今將校被斥而帥不加罪非刑賞之公乃改竦判河中執中知陜州分陜西為四路以韓琦王㳂字聖源大名館陶人范仲淹龎藉兼畧安撫招討使分秦鳳涇原環慶鄜延為四路各置使琦知秦州㳂知渭州仲淹知慶州籍知延州詔分領之張方平言涇原最當賊衝王㳂未愜人望不當與琦同等列不報琦上言請于鄜渭慶三州各更益兵三萬人㧞用有武畧將帥統領訓練預分部曲逺斥堠西賊一有舉動則先據要害觀利整陣併力擊之又于賊未集之時出已整之兵淺入大掠招其種落築壘拓地别立經制朝廷傾内帑三分之一分助邉用使行間覘賊如此則二三年間賊力漸屈平定有期矣籍至延州城砦焚掠殆盡籍稍葺治之命部將狄青將萬人築招安砦于橋子谷旁在延安府安塞縣西北以斷冦出入之路又使周美字子純靈州曰樂人襲取承平砦王信字公亮太原人築龍安砦在安塞縣北後改名徳安悉復所亡地築十一城延民以安初元昊陰誘屬羌為助環慶酋長六百餘人約為鄉導事尋露仲淹以其反覆不常至部即奏行邉以詔書犒賞諸羌為立條約諸羌皆受命自是為中國用羌人親愛之呼為龍圖老子仲淹又據要險築大順城在慶陽府安化縣北度賊必争密遣其子純佑字天成與蕃將趙明先據其地旬日城成賊以三萬騎來戰佯北仲淹戒勿追已而果有伏大順既城而白豹金湯砦名在安北縣東北與延州榆林接界皆不敢犯環慶自此寇盜益少仲淹在邊純佑年方冠與將卒錯處鈎深摘得其材否由是仲淹任人無失所向冇功御批厯代通鑑輯覽卷七十四

body:
  text: 自金師日逼屢下求言之詔事稍緩則隂沮抑之當日有城門閉言路開城門開言路閉之語梁方平之師潰于黎陽金人遂渡河斡里雅布破相濬二州先是李鄴至慶源府斡里雅布欲還郭藥師曰南朝未必有備不如姑行從之至邯鄲遣藥師以二千騎前驅進破二州慶源府宋大觀中置今直𨽻趙州是時方平帥禁旅屯黎陽河北岸金將達呼布金史作洪郭逹呼布世居錫馨水黃逹呼布舊作敵古本又作迪古補洪郭舊作摑錫馨舊作星顯今改奄至方平奔潰河南守橋者望見金兵旗幟燒橋而遁河北河東路制置副使何灌帥兵二萬退保滑州官軍在河南者無一人禦敵金人遂取小舟以濟凡五日騎兵方絶步兵猶未渡也旋渡旋行無復隊伍金人笑曰南朝可謂無人若以一二千人守河我豈得渡哉遂破滑州何灌奔還竄王黼于永州賜李彥死並籍其家放朱勔歸田里黼至雍邱盜殺之黼聞金兵至不俟命載其孥以東詔貶為崇信軍節度副使永州安置吳敏李綱請誅黼事下開封尹聶昌本名山字賁逺撫州臨川人昌遣武士躡及于雍邱南戕之民家取其首以獻帝以初即位難于誅大臣託言為盜所殺彥賜死並籍其家勔放歸田里勔以花石取媚流毒州郡者踰二十年積官至寧逺軍節度使居蘇州公肆掊克其園池擬禁籞服飾器用上僭乘輿又託挽舟募兵數十人擁以自衛聲焰薰灼東南部刺史郡守多出其門邪人穢夫候門奴事時謂東南小朝廷上皇末年益親任之居中白事傳逹上㫖大略如內侍進見不避宫嬪一門盡為顯官騶僕亦至金紫天下為之扼腕至是凡由勔得官者皆罷太上皇出奔亳州遂如鎮江本潤州宋升為府今𨽻江南帝聞斡里雅布濟河下詔親征以蔡攸為太上皇帝行宫使宇文粹中副之奉上皇東行以避敵庚午上皇如亳州于是百官多潜遁初童貫在陜西募長大少年號勝捷軍幾萬人以為親軍環列第舍及自太原還京適上皇南幸貫即以是軍自隨上皇過浮橋衛士攀望號慟貫惟恐行不速使親軍射之中而踣者百餘人道路流涕蔡京亦盡室南行為自全之計上皇尋至鎮江以李綱為尚書右丞東京留守兼親征行營使京師戒嚴宰執議請帝出幸襄鄧以避敵鋒行營參謀官李綱曰道君皇帝挈宗社以授陛下委而去之可乎帝默然白時中謂京城不可守綱曰天下城池豈有如都城者且宗廟社稷百官萬民所在捨此欲何之今日之計當整飭軍馬固結人心相與堅守以待勤王之師帝問誰可將者綱曰白時中李邦彥等雖未必知兵然藉其位號撫將士以抗敵鋒乃其職也時中勃然曰李綱莫能將兵出戰否綱曰陛下不以臣庸懦儻使治兵願以死報乃以綱為尚書右丞東京留守綱為帝力陳不可去之義㑹內侍奏中宫已行帝色變倉卒降御榻曰朕不能留矣綱泣拜以死邀之帝顧綱曰朕今為卿留治兵禦敵之事専責之卿勿致疏虞綱皇恐受命宰臣猶請出幸不已帝從之明日綱趨朝則禁衛擐甲乘輿己駕矣綱急呼禁衛曰爾等願守宗社乎願從幸乎皆曰願死守綱入見曰陛下已許臣留復戒行何也今六軍父子妻孥皆在都城願以死守萬一中道散歸陛下孰與為衛敵兵已逼知乘輿未逺以健馬疾追何以禦之帝感悟而止禁衛六軍聞之無不悅者皆拜伏呼萬嵗乃命綱兼行營使以便宜從事綱治守戰之具不數日而畢金斡里雅布圍京師李綱力禦之金人來議和詔出內帑及括借士民金帛與之遣康王構及張邦昌邦昌時為少宰往為質癸酉斡里雅布抵汴城據牟駝岡在開封府祥符縣西北宋時有天駟監為飬馬之所帝召羣臣議之李邦彥時白時中免邦彥為太宰力請割地求和李綱以為擊之便帝竟從邦彥計命駕部員外郎鄭望之字顧道彭城人防禦使高世則字仲貽遵裕從孫使其軍未至遇金使吳孝民來因與偕還是夜金人攻宣澤門汴河上北面水門名李綱禦之斬獲百餘人金人知有備又聞道君已內禪乃退甲戍孝民入見問納張㲄事令執送童貫談稹詹度且曰上皇朝事已往不必計今少帝與金别立誓書結好仍遣親王宰相詣軍前可也帝因求大臣可使者李綱請行帝不許而命李棁棁時同知樞密院綱曰安危在此一舉臣恐李棁怯懦誤國事也不聼遂命棁使金軍棁至斡里雅布盛兵南向坐棁北面再拜膝行恐怖喪膽失其所言斡里雅布謂之曰汝家京城破在頃刻所以斂兵不攻者徒以少帝之故欲存趙氏宗社我恩大矣今若欲議和當輸金五百萬兩銀五千萬兩牛馬萬頭表段百萬匹尊金帝為伯父歸燕雲之人在漢者割中山太原河間三鎮之地而以宰相親王為質送大軍過河乃退爾因出事目一紙付棁遣還棁等唯唯不敢措一言乙亥續綱目作丙子今從宋史欽宗紀改棁與金使蕭三寶努舊作三寶奴今改耶律忠王汭等偕來凡金人所要求皆郭藥師教之也是日金人攻天津景陽等門李綱親督戰募壯士縋城而下自卯至酉斬首數千級何灌力戰而死李邦彥等力勸帝從金議丙子帝乃避殿減膳括借都城金銀及倡優家財得金二十萬兩銀四百萬兩而民間已空李綱言金人所需金幣竭天下且不足况都城乎三鎮國之屏蔽割之何以立國至于遣質即宰相當往親王不當往若遣辨士姑與之議所以可不可者宿留數日大兵四集彼孤軍深入雖不得所欲亦將速歸此時與之盟則不敢輕中國而和可久也李邦彥等言都城破在旦夕尚何有三鎮而金幣之數又不足較帝默然綱不能奪因求去帝慰諭之曰第出治兵此事當徐圖之綱退則誓書已成稱伯大金國皇帝姪大宋皇帝金幣割地遣質更盟一依其言遣沈晦字元用錢塘人以誓書先往並持三鎮地圖示之庚辰以張邦昌為計議使奉康王構往金軍為質以求成初邦昌與邦彥等力主和議不意身自為質及行乃邀帝署御批無變割地議帝不許康王與邦昌乘筏渡濠自午至夜始逹金營統制官馬忠敗金人于順天門續綱目作都統制馬忠考馬忠宋史欽宗紀作統制官种師道傳作偏將非都統制也今改書金游騎大掠于城下忠以京西募兵適至擊金人敗之于順天門外金師遂收斂為一西路稍通援兵得達以路允迪簽書樞密院事如金尼瑪哈軍种師道帥師入援以師道同知樞密院事統四方勤王兵師道至洛聞斡里雅布屯東城下或止師道言敵勢方鋭願少駐汜水以謀萬全師道曰吾兵少若遲回不進形見情露祇取辱焉今鼓行而進彼安能測我虛實都人知吾來士氣自振何憂敵焉揭榜沿道言种少保領西兵百萬來遂抵京西趨汴水南徑赴敵營金人懼徙寨稍北斂游騎但守牟駝岡增壘自衛時師道年高天下稱為老种帝聞其至甚喜開安上門命李綱迎勞師道入見帝問曰今日之事卿意若何對曰女真不知兵豈有孤軍深入人境而能善其歸乎帝曰業已講好矣對曰臣以軍旅之事事陛下餘非所敢知也遂拜同知樞密院事充京畿河北河東宣撫使統四方勤王兵及前後軍以姚平仲為都統制師道時被病命毋拜許肩輿入朝金使王汭在廷頡頏望見師道拜跪稍如禮帝顧笑曰彼為卿故師道請緩給金幣于金俟彼惰歸扼而殱諸河計之上也李邦彥不從以楊時為右諫議大夫兼侍講時言今日之事當以收人心為先人心不附雖有高城深池堅甲利兵不足恃也童貫為三路大帥棄軍逃歸朝廷置之不罪故梁方平之徒相繼而遁當正典刑以為不忠之戒自貫握兵二千餘年覆軍殺將馴至今日比聞防城仍用閹人覆車之轍不可復蹈疏上遂有是命貶梁師成為彰化節度副使尋賜死初王黼嘗為鄆王楷隂畫奪宗之計事具前師成力保護太子得不動搖及上皇東幸嬖臣多從以避罪師成自以舊恩留京師太學生陳東既疏其罪惡布衣張炳亦以為言遂貶令開封吏護送至貶所行一日追殺之二月都統制姚平仲將兵夜襲金營不克而遁時朝廷日輸金幣于金而金人需求不已日肆屠掠四方勤王之師漸至李綱言金人貪婪無厭凶悖日甚其勢非用王師不可且敵兵號六萬而吾勤王之師集城下者已二十餘萬彼以孤軍入重地猶虎豹自投陷穽中當以計取之不必與角一旦之力若扼河津絶餉道分兵復畿北諸邑而以重兵臨敵營堅壁勿戰俟其食盡力疲然後以一檄取誓書復三鎮縱其北歸半渡而擊之此必勝之計也帝深然之約日舉事种氏姚氏皆素為山西巨室平仲以父古方帥熙河兵入援慮功名獨歸种氏乃云士不得速戰有怨言帝聞之以語李綱綱主其議令城下兵緩急聽平仲節度帝日遣使趣師道戰師道欲俟其弟師中至因奏言過春分乃可擊時相距才八日帝以為緩平仲請先期擊之二月丁酉朔平仲帥步騎萬人夜斫敵營欲生擒斡里雅布取康王以歸夜半帝遣中使諭李綱曰姚平仲已舉事卿速援之平仲方發金候吏覺之斡里雅布遣兵迎擊平仲敗懼誅亡去李綱率諸將出救遂與金人戰于幕天坡在祥符縣西以神臂弓弩類能射二百四十餘步射却之師道復言劫寨已誤然兵家亦有出其不意者今夕再遣兵分道攻之亦一竒也如猶不勝然後每夕以數千人擾之不十日賊遁矣李邦彥等畏懦皆不果用罷李綱以謝金人斡里雅布召使者詰責用兵違誓之故張邦昌恐懼涕泣康王不為動金人異之乃使王汭來致責且請更以他王為質汭至李邦彥語之曰用兵乃李綱姚平仲爾非朝廷意也因罷李綱以謝金人廢親征行營使時宇文虛中聞汴圍急馳歸收合散卒得東南兵二萬人以便宜起李邈字彥思臨江軍清江人領之令駐于汴河㑹姚平仲失利援兵西來者皆潰虛中縋而入京帝欲遣人奉使辨劫營非朝廷意大臣皆不欲行虛中承命慨然而往太學生陳東上書請復用李綱詔以綱為尚書右丞京城防禦使東等千餘人上書于宣德門略言李綱奮勇不顧以身任天下之重所謂社稷之臣也李邦彥白時中張邦昌等庸繆不才忌嫉賢能動為身謀不恤國計所謂社稷之賊也陛下拔綱中外相慶而邦彥等疾如仇讐恐其成功因緣沮敗且邦彥等必欲割地曽不知無三關四鎮是棄河北也棄河北朝廷能復都大梁乎又不知邦昌等能保金人不復販盟否也竊恐敵兵南向大梁不可都必將遷而之金陵則自江以北非朝廷冇况金陵正慮童貫蔡攸朱勔等往生變亂雖欲遷而都又不可得陛下將于何地而奠宗社邪邦彥等不為國家長久之計又欲沮李綱成謀以快私憤李綱罷命一傳兵民騷動至于流涕咸謂不日為賊擒矣罷綱非特墮邦彥等計中又墮敵計中也乞復用綱而斥邦彥等且以閫外付种師道宗廟存亡在此一舉不可不謹書奏軍民不期而集者數萬人㑹邦彥入朝衆數其罪而罵且欲毆之邦彥疾驅得免吳敏傳宣令退衆莫肯去檛壞登聞鼓喧呼動地殿帥王宗濋恐生變奏帝勉從之帝乃遣耿南仲號于衆曰已得旨宣綱矣內侍朱拱之宣綱後期衆臠而磔之並殺內侍數十人知開封府王時雍蜀人麾之不退帝顧户部尚書聶昌俾出諭旨諸生始退乃復綱右丞充京城四壁防禦使既而都人又言願見种師道詔趣師道入城彈壓師道乘車而至衆褰簾視之曰果我公也乃相麾聲喏而散明日詔誅士民殺內侍為首者禁伏闕上書王時雍欲盡致太學諸生于獄人人惴恐㑹朝廷將用楊時為祭酒遣聶昌詣學宣諭然後定吳敏欲弭謗議奏東為太學録東力辭以歸除元祐黨籍學術之禁廢苑囿宮觀可以與民者更以肅王樞上皇第五子為質于金康王構還宇文虛中冒鋒鏑至金營露坐風埃自已至申金人注矢露刃周匝圍之久乃得見康王次日侍王至金幕府見斡里雅布語不遜禮節倨傲抵暮遣王汭隨虛中入城要越王及李邦彥吳敏李綱並駙馬曹晟等與金銀騾馬之類且欲御筆書定三鎮界方退軍明日帝命肅王往代質康王張邦昌還詔割三鎮地以畀金金斡里雅布引兵北去京師解嚴初金人圍城蔡懋禁不得輒施矢石將士積憤及李綱復用下令能殺敵者厚賞衆無不奮躍金人懼稍稍引郤至是宇文虛中復奉詔如金許割三鎮地斡里雅布得詔不俟金幣數足遣韓光裔來告辭退師北去肅王從之京師解嚴种師道請乘其半濟擊之帝不許師道曰異日必為國患御史中丞呂好問字舜圖希哲之子進言于帝曰金人得志益輕中國秋冬必傾國復來禦敵之備當速講求不聽金人既退詔赦天下自今庶事並遵用祖宗舊制凡蠧國害民之事一切寢罷復罷宰執兼神霄玉清萬夀宫使李邦彥免以張邦昌為太宰吳敏為少宰李綱知樞密院事耿南仲李棁為尚書左右丞邦彥罷不旬日吳敏為請復起為太宰人皆駭愕言者交論之乃出知鄧州姚古种師中及府州將折彥質字中古可適之子以兵入援姚古种師中及府州帥折彥質等各以兵勤王凡十餘萬人至汴城下而斡里雅布退李綱請詔古等追之且戒俟其間可擊則擊而三省乃令護送出境勿輕動以啓釁時大臣政令矛盾故迄無成功种師道罷中丞許翰字嵩老襄邑人言師道名將沈毅有謀不可使解兵柄帝謂其老難用翰曰秦始皇老王翦而用李信兵辱于楚漢宣帝用趙充國之老而卒能成金城之功自吕望以來以老將收功者難一二數師道智慮未衰雖老可用也帝不納翰又言金人此去存亡所繫當令一大創使失利去則中原可保四夷可服不然將來再舉必有不救之患宜遣師追擊之帝亦不聽以楊時兼國子監祭酒時知無不言然不見聽及太學生留李綱种師道吳敏乞用時以靖太學因召對時言諸生忠于朝廷非有他意但擇老成有行誼者為之長二則將自定帝曰無以逾卿遂用之金尼瑪哈入威勝軍注見前破隆德府宋置今山西潞安府是尼瑪哈攻太原悉破諸縣獨城中以張孝純固守不下乃于城外矢石不及之地築城防守使內外不相通及聞斡里雅布議和亦遣人求賂宰臣以勤王兵大集拘其使而不與尼瑪哈怒乃分兵趨汴京折可求劉光世軍皆為所敗平陽府叛卒導金兵入南北關南關在沁州武鄉縣西北北關在太原府祁縣東兩關相接號南北關路甚險隘尼瑪哈歎曰關險如此而使我過之南朝無人矣既過知威勝軍李植以城降遂攻下隆德府知府張確字守固邠州宜祿人死之進屯澤州既而尼瑪哈還雲中留尼楚赫圍太原貶蔡京為祕書監童貫為左衛上將軍蔡攸為大中大夫時三人皆從上皇行以陳東言貶之梁方平尋亦復誅以聶昌為東南發運使未行而罷初上皇南幸童貫高俅俅字里無考徽宗朝以殿前都指揮使加太尉進開府儀同三司後欽宗誅謫諸奸俅已死詔追奪其官事在本年七月等以兵扈從既行聞都城受圍乃止東南部傳及勤王之師道路籍籍言貫等為變朝議以聶昌為發運使往圖之李綱曰使昌所圖果成震驚太上此憂在陛下萬一不果是數人者挾太上于東南求劍南一道陛下將何以處之莫若罷聶昌之行請于太上去此數人自可不勞而定帝從之三月張邦昌李棁免以徐處仁為太宰唐恪為中書侍郎何㮚為尚書右丞許翰同知樞密院事帝召處仁問割三鎮是否處仁言不當棄與吳敏議合敏薦處仁可相時處仁已拜中書侍郎㑹議者以張邦昌私于敵故尼瑪哈復至社稷之賊也遂與李棁並罷而拜處仁太宰時進見者多論宣和間事唐恪言于帝曰革弊當以漸宜擇今日之所急者先之而言者不顧大體至毛舉前事以快一時之憤豈不傷太上之心哉京攸貫黼之徒既從竄斥姑可已矣他日邊事既定然後白太上請下一詔與天下共棄之誰曰不可帝曰卿論甚善為朕作詔書以此意布告在位言者又論宇文虛中議和之罪出知青州詔种師道屯滑州姚古种師中援三鎮古復隆德府威勝軍師中追斡里雅布至北鄙而還詔金人要盟終不可保今尼瑪哈深入南陷隆德先敗元約朕夙夜追咎已黜罷元主和議之臣其太原中山河間三鎮保塞陵寢所在誓當固守于是命种師道為河北河東宣諭使駐滑州姚古為河北制置使种師中副之古總兵援太原師中援中山河間而師道實無兵自隨乃請合關謂關中河謂兩河卒屯滄衛孟滑備金兵再至朝廷以大敵甫退不宜勞師示弱格不用師中渡河上言尼瑪哈至澤州臣欲由邢相間捷出上黨搗其不意當可以逞朝廷疑不用斡里雅布至中山河間兩鎮皆固守不下師中因進兵以逼之斡里雅布出境姚古以兵復隆德威勝扼南北關詔李綱迎太上皇于南京時用事者言太上將復辟于鎮江人情危駭既而太上皇后先還或謂后將由端門直入禁中內侍輩頗勸帝嚴備帝不從既而太上還至南京以書問改革政事之故且召吳敏李綱或慮太上意不可測綱曰此無他不過欲知朝廷事爾綱往具道皇帝聖孝思慕請陛下早還京師太上因及行宫止遞角等事綱曰當時恐金人知行宫所在非有他也因言皇帝每得詰問之詔輒憂懼不食臣竊譬之家長出而彊冦至子弟之任家事者不得不從宜措置長者但當以其能保田園大計而慰勞之苟誅及細故則為子弟者何所逃其責邪陛下回鑾臣謂宜有以大慰皇帝之心勿問細故可也太上感悟出玉帶金魚象簡賜綱且曰卿捍守宗社有大功若能調和父子間使無疑沮當遂垂名青史綱還具道太上意帝始釋然夏四月夏人陷天德雲內諸城金人襲取之先是尼瑪哈遣薩滿舊作撒拇今改後仿此使夏許割天德雲內金肅注俱見前河清遼與金肅州同置故城在州東北四軍及武州等八館方輿紀要在廢武州界遼置館舍于此因名之地約攻麟州以牽河東之勢夏人遂由金肅河清渡河取天德雲內武州河東八館之地因攻鎮威城方輿紀要在朔州西南宋初與遼分界處兵馬監押朱昭字彥明府州府谷人力戰而敗乃盡殺其妻子納尸井中復帥士搏戰死之城遂陷既而金將額實續綱目作果伸考金史希尹傳無此事今從宋史夏國傳額實舊作兀室今改後仿此以數萬騎陽為出獵掩至天德逼逐夏人悉奪有其地夏人請和金人執其使太上皇至京師太上將至宰執進迎奉儀注耿南仲議欲屏太上左右車駕乃進李綱言天下之理誠與疑明與暗而已自誠明推之可至于堯舜自疑䦣推之其患有不可勝言者耿南仲不以堯舜之道輔陛下乃暗而多疑南仲怫然曰臣適見右司諫陳公輔字國佐台州臨海人乃為李綱結士民伏闕者乞下御史置對上愕然綱曰臣與南仲所論國事也南仲乃為此言臣何敢復有所辨因求去帝不允立子諶為皇太子詔吏部考核濫賞凡由楊戬李彥之公田王黼朱勔之應奉童貫談稹等西北之師孟昌齡河防之役夔蜀湖南之開疆關陜河東之改幣又若近習所引獻頌可採特赴殿試之流所得爵賞悉奪之以种師道為兩河宣撫使復以詩賦取士禁用王安石字說口河南尹焞至京師賜號和靖處士遣還种師道薦焞德行召至京師不欲留賜號和靖處士遣還户部尚書梅執禮字和勝婺州浦江人户部侍郎邵溥雍之孫中丞吕好問中書舍人胡安國字康侯建寧崇安人合奏焞言動可以師法器識可以任大乞擢用之不報五月罷王安石配享孔子仍從祀廟庭國子祭酒楊時致仕時上言蔡京用事二十年蠧國害民幾危社稷人所切齒而論其罪者莫知其所本也蓋京以繼述神宗為名實挾王安石以圖身利故推尊安石加以王爵配享孔子廟庭今日之禍實安石有以啓之安石挾管商之術飾六藝以文姦言變亂祖宗法度當時司馬光已言其為害當見于數十年之後今日之事若合符契其著為邪說以塗學者耳目而敗壞其心術者不可縷數伏望追奪王爵明詔中外毀去配享之像使邪說淫辭不為學者之惑疏上詔罷安石配享降居從祀之列時諸生習用王氏學以取科第者已數十年不復知其罪忽聞楊氏目為邪說羣論籍籍于是中丞陳過庭諫議大夫馮澥字長源普州安嶽人上疏詆時㑹學官中有紛爭者有旨學官並罷時亦罷祭酒尋改給事中時力辭遂以徽猷閣待制致仕時居諫垣九十日凡所論列皆切于世道而其大者則闢王氏排和議論三鎮不可棄云馮澥素主熙豐紹聖故詆時及時罷㑹有詔諫官極論得失右正言崔鶠上疏曰馮澥近上章言熙寧元豐之問士無異論太學之盛也澥尚敢為此姦言乎王安石除異已之人著三經之說以取士天下靡然雷同陵夷至于大亂此無異論之效也蔡京又以學校之法馭士人如馭卒伍冇一異論纍及學官其苛錮多士固已密矣而澥猶以為太學之盛欺罔不已甚乎仁宗英宗選敦朴敢言之士以遺子孫安石日為流俗一切逐去司馬光復起而用之元祐之治天下安于泰山及蔡京得志引門生故吏更持政柄倡紹述之論以欺人主紹述一道德而天下一于諂佞紹述同風俗而天下同于欺罔紹述理財而公私竭紹述造士而人才壞紹述開邊而塞塵犯闕矣京之術破壞天下已極尚忍使其餘蠹再破壞邪京姦邪之計大類王莽而朋黨之衆則又過之願斬之以謝天下奏上時議重之詔种師中姚古進軍太原師中與金人戰于殺熊嶺在平定州夀陽縣西南接大原府榆次縣界敗績死之古軍潰太原圍不解詔种師中由井陘與姚古掎角師中進次平定軍乘勢復夀陽榆次等縣留屯真定時尼瑪哈避暑還雲中留兵分就畜牧覘者以為將遁告于朝許翰信之數遣使趣師中出戰責以逗撓師中歎曰逗撓兵家大戮也吾結髮從軍今老矣忍受此為罪乎即日辦嚴約姚古及張灝孝純之子俱進而輜重賞犒之物皆不以從行師中抵夀陽之石坑在夀陽縣東南為金將完顔和尼婁室之子按和尼舊作活女今改後仿此所襲五戰三勝回趣榆次至殺熊嶺去太原百里姚古將兵至威勝統制焦安節妄傳尼瑪哈將至故古與灝皆失期不至師中兵饑甚敵知之悉衆攻右軍右軍潰前軍亦奔師中獨以麾下死戰自卯至巳士卒發神臂弓射退金人而賞賚不及皆憤怨散去所留才百人師中身被四創力疾鬭死師中老成持重為時名將既死諸軍無不奪氣金乘勝進兵迎古遇于盤陀戍名在太原府祁縣東古兵潰退保隆德事聞李綱召安節斬之安置古于廣州而贈師中少師諡莊愍召种師道還以李綱為兩河宣撫使京師自金兵退上下恬然置邊事于不問李綱獨以為憂數上備邊禦敵之䇿不見聽用每有謀議復為耿南仲等所沮及姚古种師中敗潰种師道以病乞歸南仲等請棄三鎮綱言不可乃以綱為宣撫使劉韐字仲偃建州崇安人副之以代師道又以解潜為制置副使以代姚古綱言臣書生實不知兵在圍城中不得已為陛下料理兵事今使為大帥恐誤國事因拜辭不許退而移疾乞致仕章十餘上亦不允臺諫言綱不可去朝廷帝以其為大臣游說斥之或謂綱曰公知所以遣行之故乎此非為邊事欲緣此以去公則都人無辭耳公不起上怒且不惻奈何許翰復書杜郵二字以遺綱綱不得已受命帝手書裴度傳以賜之宣撫使兵僅萬二千人綱請銀絹錢各百萬僅得二十萬庶事皆未集綱乞展行期御批以為遷延拒命趣召數四綱入對帝曰卿為朕巡邊便可還朝綱曰臣之行無復還理臣以愚直不容于朝使既行之後無有沮難則進而死敵臣之願也萬一朝廷執議不堅臣自度不能有為即當求去陛下宜察臣孤忠以全君臣之義上為感動陛辭又為上道唐恪聶昌之姦任之必誤國言甚激切謫左司諫陳公輔監合州酒務公輔居職敢言耿南仲指為李綱之黨公輔因自列且辭位復言李綱乃書生不知軍旅遣援太原乃為大臣所陷必敗事時宰怒其言斥監合州酒務天狗星隕彗出紫微垣天狗墜地有聲如雷彗出寅艮間長數丈北拂帝座掃文昌大臣有謂此乃夷狄將衰非中國憂也主管龍德宫談世績面奏垂象可畏當修德以應天不宜惑其諛說詔除民間疾苦十七事侍御史李光亦奏言宜恐懼修省不當以大異委之外夷謫監汀州酒稅李光字泰嚴越州上虞人髙麗稱藩于金金以保州本高麗州為遼所取金還之今朝鮮國曰安州屬平安道畀之高麗王楷遣使奉表稱藩于金一依事遼之禮金遣高伯淑報之且以保州與之自是朝貢不絶秋七月除元符上書邪等之禁竄蔡京于儋州道死童貫趙良嗣伏誅京再貶崇信軍節度副使貫再貶昭化軍節度副使至是復竄京于儋州其子孫二十三人分竄逺地遇赦不許量移竄貫于吉陽軍今瓊州府崖州宋政和末改吉陽軍明初始復為州趙良嗣于栁州詔下十日京死于潭州朝廷遣御史張澄字逹明舒州人誅貫轉運副使李升之誅良嗣于貶所函首赴闕梟于市京天資凶譎舞智御人在人主前顓狙伺為固位計太上亦知其姦屢罷屢起京每聞將退免輒入見祈哀蒲伏叩頭無復廉恥見利忘義至于兄弟父子自為秦越暮年即家為府營進之徒集門輸貨僮𨽻皆得美官棄紀綱法度為虛器根株連結牢不可破卒致宗廟之禍雖以謫死天下猶以不正典刑為恨貫握兵二十年權傾一時奔走期㑹過于制敕嘗有論其過者詔方劭往察劭一動一息貫悉偵得之先密以白且陷十以他事劭反得罪逐死貫狀魁梧偉瞻視頥下生鬚數皮骨徑如鐵不類閹人有度量能疏財後宫自妃嬪以下皆獻饋結納左右婦寺譽言日聞寵煽翕赫庭户雜遝成市嶽牧輔弼多出其門窮姦稔禍流毒四海死不足以償責李綱至懷州詔罷所起兵續綱目是條于李綱至懷州下即書諸軍潰于太原考宋史欽宗紀解潛劉韐戰敗在七月召李綱還在八月丙申張思正折可求師潰在八月己酉李綱傳不載軍潰但云時方議和詔止綱進兵未幾徐處仁吳敏罷相綱即上奏求罷乃命种師道領宣撫司召綱赴闕紀與傳互異續綱目書軍潰與紀不符書召綱又與傳不合今依本紀月日為據提綱改書目亦改輯綱留河陽十餘日練士卒修整器甲之屬進次懷州造戰車期兵集大舉而朝廷降詔罷所起兵綱上疏言秋高馬肥敵必深入宗社安危殆未可知防秋兵盡集尚恐不足今河北河東日告危急未有一人一騎以副其求奈何甫集之兵又皆散遣且以軍法勒諸路起兵而以寸紙罷之臣恐後時有所號召無復應者矣疏上不報趣赴太原八月復以种師道為兩河宣撫使召李綱還諸軍潰于太原先是綱遣解潜屯威勝軍劉韐屯遼州幕官王以寧與都統制折可求張思正等屯汾州范瓊屯南北關皆去太原五驛約三道並進時諸將皆承受御畫事皆専逹進退自如宣撫司徒有節制之名多不遵命綱嘗具論之雖降約束而承受専逹自若劉韐乃以兵先進金人併力禦之韐戰敗解潜與敵遇于南關亦大敗㑹有詔復以种師道為宣撫使巡邊召綱還而張思正等領兵十七萬與張灝夜襲金羅索于文水隋縣今屬山西太原府小捷明日復戰師潰死者數萬人折可求師亦潰于子夏山即隱泉山在汾州府汾陽縣北上有石室相傳為子夏所居故俗謂之子夏山亦曰卜山于是威勝隆德汾晋澤絳民皆渡河南奔州縣俱空諸軍既潰綱又上疏極論節制不専之弊且言分路進兵敵以全力制吾孤軍不若合大兵由一路進范世雄以湖南兵至因薦為宣撫判官方欲㑹合親率擊敵而召命已至綱亦求罷遂代還金尼瑪哈斡里雅布復分道南侵先是朝廷以肅王為金所質亦留其使臣蕭仲恭遼駙馬蕭特末之子與遼主俱被獲遂仕于金踰月不遣其副趙倫懼不得歸乃紿館伴邢倞恕之子曰金有耶律伊都者領契丹兵甚衆二于金人願歸大國可結之以圖斡里雅布尼瑪哈執政以仲恭伊都皆遼貴戚舊臣而用事于金當有亡國之戚信之乃以蠟書命仲恭致伊都使為內應仲恭還見斡里雅布即以蠟書獻之斡里雅布以聞金主麟府帥折可求又言遼梁王雅里在西夏之北欲結宋以復怨于金吳敏勸帝致書梁王由河東之麟府亦為尼瑪哈所得復以聞于是以尼瑪哈為左副元帥斡里雅布為右副元帥分道南侵尼瑪哈發雲中斡里雅布發保州徐處仁吳敏許翰罷以唐恪為少宰何㮚為中書侍郎陳過庭為尚書右丞聶昌同知樞密院事李回江寧人簽書院事翰處仁主用兵而吳敏耿南仲欲和議論不合翰罷知亳州處仁又與敏爭于帝前處仁怒擲筆中敏面鼻額為黑南仲與唐恪聶昌欲排去二人而代之位諷中丞李回論之于是俱罷初敏以昌猛厲可使助己自衡州召知開封府不數月拜同知樞密入謝即陳捍禦之䇿曰三關四鎮國家藩籬也聞欲以畀敵一朝渝盟何以制之願勿輕與而檄天下兵集都畿堅城守以遏其衝簡禁旅以備出擊壅河流以斷歸路前有堅城後有大河徑兵四面而至彼或南下墮吾網中矣臣願激合勇義之士設伏開關出不意掃其營以報帝壯之命提舉守禦得以便宜行事未幾言者論敏因蔡京進用安置涪州遣刑部尚書王雲字子飛澤州人使金軍考宋史王雲傳雲前後兩使金軍初以給事中出使後以刑部尚書再使欽宗紀略同續綱目但書給事中不更詳書再使今依宋史改書增輯雲先以給事中使斡里雅布軍還言必敗和約執政以為不然罷知唐州至是太原圍益急朝廷遣著作佐郎劉岑字季高吳興人太常博士李若水本名若氷字清卿洛州曲周人分使金軍求緩師岑等還言斡里雅布止索歸朝官及所缺金銀尼瑪哈則深諱金銀専論三鎮乃召雲拜刑部尚書再往許以三鎮賦入之數九月金尼瑪哈陷太原副都總管王禀等死之尼瑪哈乘勝急攻太原知府張孝純力竭不能支城遂陷孝純被執既又釋而用之副都總管王禀負原廟中太宗御容赴汾水死通判方笈轉運韓揆等三十人皆被害金分兵陷汾州知州張克戬字德祥耆曽孫畢力捍禦城破猶巷戰不克乃南向拜自引決一家死者八人蔡攸朱勔伏誅先是竄勔循州籍其家田至三十萬頃他物稱是言者又論攸興燕山之役禍及天下驕奢淫佚載籍所無于是遣使即二人所至斬之罷李綱知揚州謫中書舍人劉珏字希範湖川長興人胡安國官時方議和言者論李綱専主戰議喪師費財罷知揚州尋落職責授保靜軍節度副使建昌軍安置舍人劉珏當制謂綱勇于報國吏部侍郎馮澥言珏為綱逰說珏坐貶提舉亳州明道宫安國封還詞頭且論澥越職論事耿南仲大怒何㮚從而擠之遂出知通州安國初為大學博士蔡京惡其異己㑹安國舉永州布衣王繪鄧璋遺逸京以二人乃范純仁鄒浩之客置獄惟治安國坐除名張商英相始得復官帝即位召赴京師入對言明君以務學為急聖學以正心為要語甚剴切日昃始退耿南仲聞其言而惡之力沮于帝帝不為動中丞許翰入見帝謂曰卿識胡安國否翰對曰自蔡京得政士大夫無不受其籠絡超然逺迹不為所汚如安國者實鮮遂除中書舍人安國在省一月多在告之日及出必有所論列或曰事之小者盍姑置之安國曰事之大者無不起于細微今之小事為不必言至于大事又不敢言是無時可言也人服其論置四道都總管府以李回為大河守禦使折彥質為河北宣撫副使從何㮚之請分天下二十三路為四道建三京及鄧州為都總管府分總四道兵以知大明府趙野總北道知河南府王襄初名寧鄧州南陽人總西道知鄧州張叔夜總南道知應天府胡直孺字少汲奉新人總東道事得専決財得専用官得辟置罷西南勤王兵金師日逼南道總管張叔夜陜西制置使錢蓋各統兵赴闕唐恪耿南仲專主和議函檄止諸軍勿前遣給事中黃鍔由海道使金以請和冬十月金斡里雅布陷真定都鈐轄劉竧宋史忠義傳作劉翊今從欽宗紀死之种師閔及斡里雅布戰于井陘敗績斡里雅布入天威軍攻真定竧率衆晝夜搏戰久之城陷竧巷戰麾下稍稍散亡竧顧其弟曰我大將也可受賊戮乎因挺刀欲奪門出不果自縊死知府李邈被執北去金遣使來尼瑪哈斡里雅布遣楊天吉王汭等以書詰責索親王詣軍前陳謝仍要割地且求金帛車輅儀物及加其主徽號罷御史中丞吕好問金人復至大臣不知所出遣使講解金人佯許而攻略自如諸將以和議故皆閉壁不出好問乃請亟集滄滑邢相之戍以遏奔衝而列勤王之師于畿邑以衛京城疏入不省金人入真定攻中山上下震駭廷臣狐疑相顧猶以和議為辭好問率臺屬劾大臣畏懦誤國坐貶知袁州帝閔其忠下遷吏部侍郎下哀痛詔徵兵于四方續綱目係于十一月今依宋史欽宗紀改輯帝以太原真定已陷大以為憂下哀痛詔徵兵命河北河東諸路帥臣傳檄所部得便宜行事召种師道還尋卒諡忠憲師道次河陽遇王汭揣敵必大舉亟上疏請幸長安以避其鋒大臣以為怯召還以范訥代之師道既至病不能見尋卒十一月詔百官議三鎮棄守王雲至真定斡里雅布軍使從吏先還言金不復求地但索五輅及上尊號且須康王至軍乃議和斡里雅布尼瑪哈亦使王汭等來帝乃命尚書左丞王㝢字元惠江州人副康王往使㝢託故不行帝怒安置㝢于新州改命馮澥知樞密院事充副使王未行而車輅至長垣為金人所却王遂不行至是雲還言金人中變今必欲得三鎮不然則進兵取汴都中外震駭詔集從官于尚書省議割三鎮梅執禮孫傅秦檜等三十六人言不可與自范宗尹以下七十人皆欲與之尹孫𫝊字伯野海州人秦檜字會之江寧人范宗字覺民襄陽鄧城人何㮚曰三鎮國之根本奈何一旦棄之且金人無信割地亦來不割亦來唐恪耿南仲等力主割地㮚辨論不已因曰河北之民皆吾赤子棄地則並其民棄之為民父母而棄其子可乎帝悟乃止㮚退謂恪曰割三鎮則傷河外之情不割則太原已失不若任之恪唯唯遂詔河北河東京畿清野令流民得占官舍寺觀以居禁京師民以浮言相動者金尼瑪哈陷河東諸州郡李回折彥質師潰金人遂渡河陷西京詔馮澥使金軍請和尼瑪哈自太原取汴所至破降平陽威勝隆德澤州皆失官吏棄城走者逺近相望尼瑪哈至河外宣撫副使折彥質以兵十二萬拒之夾河而軍時李回以萬騎防河亦至河上尼瑪哈曰南軍亦衆與之戰勝負未可知不若加以虛聲遂取戰鼓擊之逹旦彥質之衆皆潰李回亦奔還京師金兵至河無船不得渡和尼帥軍三百自孟津而下度其可渡遂引軍以濟尼瑪哈從之于是知河陽燕瑛河南留守西道都總管王襄皆棄城走永安軍鄭州悉降于金尼瑪哈既渡河不復言三鎮直遣人來言欲盡得兩河地請畫河為界于是京師戒嚴遣馮澥李若水往使行至中牟守河兵相驚以為金兵至左右謀取間道去澥問何如若水曰戍兵畏敵而潰奈何效之今正有死爾敢言退者斬衆乃定既行若水屢附奏言和議者必不可諧乞申飭守備詔王雲副康王構使金軍許割三鎮至磁州州人殺雲構還次相州雲固請康王往使詔以資政殿學士副王使斡里雅布軍許割三鎮奉衮冕玉輅尊金主為皇叔且上尊號十八字王由滑濬至磁州守臣宗澤字汝霖婺州義烏人迎謁曰肅王一去不返今敵又詭辭以致大王其兵已迫復去何益願勿行先是王雲奉使過磁州勸兩郡撤近城民舍運粟入保為清野之計民怨之及是次磁㑹康王出謁嘉應神祠雲在後民遮道諫王勿北去厲聲指雲曰真姦賊也王出廟行民譟執雲殺之斡里雅布軍濟河逰兵日至磁城下蹤跡王所在知相州汪伯彥字廷俊徽州祁門人亟以帛書請王如相服櫜鞬部兵以迎于河上王遂行至相勞伯彥曰他日見上當首以京兆薦公由是受知議者以為是役雲不死王必至金無復還理相州湯隂人嶽飛少負氣節家貧力學尤好左氏春秋孫吳兵法有神力能挽弓三百斤弩八石劉韐宣撫真定募取戰士飛與焉屢擒劇賊至是因劉浩以見王以為承信郎舉嶽飛字鵬何㮚罷以陳過庭為中書侍郎孫傅為尚書右丞㮚主戰守與唐恪耿南仲不合罷為開封尹傅以兵部尚書拜右丞尋改同知樞密院以郭京為成忠郎選六甲以禦金孫傅因讀邱濬感事詩有郭京楊適劉無忌之語于市人中訪得無忌于龍衛中得京好事者言京能施六甲法可以生擒金二將而掃蕩無餘其法用七千七百七十七人朝廷深信不疑命以官賜金帛數萬使自募兵無問伎藝能否但擇年命合六甲者所得皆市井游惰旬日而足敵攻益急京談笑自如云擇日出兵三百可致太平直襲擊至隂山乃止孫傅何㮚尤尊信之又冇劉孝竭等募衆或稱六丁力士或稱北斗神兵或稱天闕大將大率效京所為識者危之遣耿南仲聶昌使金軍許盡割兩河地昌為絳人所殺南仲奔相州斡里雅布遣使來議割兩河地帝許之命耿南仲往報南仲以老辭改命聶昌昌以親辭陳過庭曰主憂臣辱願效死帝為揮淚太息而怒南仲及昌即命南仲如河北斡里雅布軍昌如河東尼瑪哈軍昌言兩河之人忠勇萬一不從必為所執死不瞑目矣行至絳絳人果堅壁拒之昌持詔抵城下縋而登鈐轄趙子清麾衆殺昌抉其目而臠之初南仲為東宫官十年自謂首當柄用而吳敏李綱越次進位在己上心不能平每事異議力沮戰守與吳幵字正仲濮州人堅請割地以成和好故朝廷戰守之備皆罷致金師日逼至是與金使王汭偕行至衛州衛鄉兵欲殺汭汭脫去南仲遂奔相州以帝旨喻康王起河北兵入衛京師因連署募兵榜揭之人情始安金人入懷州知州事霍安國等死之安國被圍捍禦不遺力鼎澧兵亦至相與共守拜徽猷閣待制及是城陷尼瑪哈引安國以下問不降者為誰安國曰守臣安國也問餘人通判林淵鈐轄張彭年都監趙士詝張諶于潜鼎澧將沈敦張行中及隊將五人同辭對曰淵等與知州一體皆不肯降尼瑪哈令引于東北鄉望拜亦不屈乃解衣面縳殺十三人而釋其餘安國一門無噍類金斡里雅布尼瑪哈圍京城要帝出盟斡里雅布自真定趨汴僅二十日至城下屯劉家寺尼瑪哈自河陽來㑹屯于青城有二一在開封府城北一在城南宋南北郊齊宫也使劉晏來要帝出盟時西南二道援兵為唐恪耿南仲遣還于是四方無一人至者城中唯衛士及弓箭手七萬人乃以萬人分作五軍備緩急救護命姚友仲辛永宗分領之以五萬七千人分四壁守禦何㮚募竒兵皆操瓢行乞羸劣之人未就紀律因作亂殺使臣內前大擾斬數十人乃定都人又殺東壁統制官辛亢宗詔罷民乘城代以保甲遣使以蠟書間行出關召兵又約康王及河北守將求援多為邏兵所獲唐恪計無所出密言于帝曰唐自天寶而後屢失而復興者以天子在外可以號召四方也今宜舉景德故事留太子居守而幸西洛連據秦雍領天下兵親征以圖興復帝將從之開封尹何㮚入見引蘇軾所論謂周之失計未有如東遷之甚者帝翻然而改以足頓地曰今當以死守社稷南道都總管張叔夜將兵勤王叔夜聞召即日自將中軍令子伯奮將前軍仲雄將後軍合三萬餘人與金游兵轉戰而前至都下帝御南薰門見之軍容甚整入對言敵鋒甚鋭願如明皇之避祿山暫詣襄陽以圖幸雍帝不答時東道都總管胡直孺亦將兵入衛與金人遇于拱州兵敗被執金人示于城下都人大懼復元豐三省官名閏月唐恪免以何㮚為尚書右僕射兼中書侍郎恪從帝巡城為都人遮擊䇿馬得脫遂卧家求去御史胡舜陟字汝明徽州績溪人劾恪知慮不能經畫邊事但長于交結內侍今國勢日蹙誠不可以備位乃罷馮澥至自金軍以為尚書左丞澥與李若水至懷州金使蕭慶挾與俱還自後凡三遣慶來堅請帝出盟會詔張叔夜簽書樞密院事將兵入城朱子曰叔夜領兵合駐旁近以為牽掣且伸縮自如一入城便有牽掣所以迄無成功金人約親王出盟遣馮澥曹輔輔于是月簽書樞密院以宗室受盟金人不許金人屯青城日縱兵攻掠殿前副都指揮使王宗濋與金人戰于城下兵敗而遁續綱目作宗濋敗死考宋史高宗紀建炎元年以王宗濋引衛兵逃遁致都城失守謫官安置是宗濋並未死事今改輯金人攻南壁張叔夜范瓊分兵禦之遙見金兵奔還自相蹈藉死者以千數乃遣間使趣召諸道兵兵無至者城中惟衛士三萬可用然亦什失伍六因時令挑戰以示敢敵時雨雪交作帝被甲登城以御膳賜士卒易火飯以進㑹天大寒士卒噤戰不能執兵有僵仆者帝在禁中徒跣祈晴復幸宣化門乘馬行泥淖中民皆感泣金人復來言不須上出城請親王及何㮚往議詔越王往將行而尼瑪哈以兵來迓王乃止于是金人宣言失信攻城益急再遣使來趣親王出盟詔遣馮澥曹輔與宗室仲溫士􅧘如金軍以請和既至尼瑪哈即遣還不與交一語詔康王構為天下兵馬大元帥殿中侍御史胡唐老字俊明宿曾孫言康王奉使至磁為士民所留乃天意也乞就拜為大元帥俾率天下兵入援何㮚以為然密草詔藁上之帝募令死士得秦仔劉定等四人遣持蠟詔如相州拜王為兵馬大元帥知中山府陳遘為元帥汪伯彥宗澤為副元帥使盡起河北兵速入衛仔至相州于頂髮中出詔王讀之嗚咽軍民感動慧星出長竟天郭京出禦金軍敗走京城破帝如金營請降金人攻通津宣化門范瓊以千人出戰渡河氷裂沒者五百人自是士氣益挫會大雨雪連日夜不止何㮚數趣郭京出師京徙期再三至是京盡令守禦人下城母得竊窺因大啓宣化門出攻金師京與張叔夜坐城樓上金兵分四翼譟而前京所遣兵敗走墮死于護龍河填尸皆滿城門急閉京白叔夜曰須自下作法因下城引餘衆南遁京逃至襄陽聚衆欲為亂張思正囚而殺之金兵遂登城衆皆披靡四壁兵皆潰金人焚南薰諸門統制姚友仲死于亂兵四壁守禦使劉延慶奪門出奔為追騎所殺統制何慶言陳克禮中書舍人高振力戰與其家人皆被害京城遂破帝聞城破慟哭曰不用种師道言以至于此衛士入都亭驛執金使劉晏殺之軍民數萬斧左掖門求見天子帝御樓諭遣之衛士長蔣宣率其衆數百欲邀乘輿犯圍而出左右奔竄獨孫傅梅執禮吕好問侍宣抗聲曰國事至此皆宰相信任姦臣不用直言所致孫傅訶之宣以語侵傅好問譬曉之曰若屬忘家族欲冒重圍衛上以出誠忠義然乘輿將駕必甲乘無缺而後動詎可輕邪宣詘服曰尚書真知軍情揮其徒退時都人喧呼不已莘縣人王綸乘勢徑造御前曰臣能彈壓之帝解所佩夏國寶劍以賜曰臣未冇官帝取片紙書曰王綸可除兵部侍郎綸下樓挾惡少數人傳旨撫定都人乃息何㮚以除命太峻補綸修職郎斥不用王綸字正道旦弟勗之元孫何㮚欲親率都民巷戰金人宣言議和退師乃止帝聞金人欲和而退命何㮚及濟王栩使其軍請成尼瑪哈斡里雅布曰自古有南即有北不可相無也今之所議期在割地而已㮚還言金人欲邀上皇出郊帝曰上皇驚憂而疾必不獲已朕當親往遂如青城尼瑪哈軍何㮚陳過庭孫傅等從奉表請降以金遺尼瑪哈斡里雅布二人言其主欲别立賢君宜族中擇一人為宋國主仍去帝號帝默然何㮚喜和議成既歸都堂作㑹飲酒談笑終日陳桱曰方幹里雅布北還宋廷宜為逺謀乃忽李綱种師道之言上下相慶以為無虞曾不數月再致金師當是時廟堂之相方鎮之將皆出于童蔡王梁之門無可以係天下之望唯以割地請和為言未聞有能出一計與之抗者是以金人之來如破竹然及圍城逾月外援不至竟以妖術取敗吁可怪哉十二月康王構帥師入衛次于東平康王開大元帥府于相州有兵萬人分為五軍而進既渡河次于大名宗澤以二千人與金人力戰破其三十餘寨履氷渡河見王曰京城受圍日久入援不可緩王納之既而知信德府宋宣和中置今直𨽻順德府是梁揚祖以三千人至張俊字伯英鳯翔成紀人苗傳上黨人履之子楊沂中字正甫後賜名存中代州崞縣人田師中等皆在麾下兵威稍振㑹帝遣曹輔齎蠟詔至云金人登城不下方議和好可屯兵近甸毋動汪伯彥等皆信之宗澤獨曰金人狡譎是欲欵我師爾君父之望入援何啻飢渴宜急引軍直趨澶淵次第進壘以解京城之圍萬一敵有異謀則吾兵已在城下伯彥難之勸王遣澤先行王乃命澤趨澶淵自是澤不得預帥府事矣耿南仲及伯彥請移軍東平從之帝至自金營遣使如兩河割地以畀金帝還宫士庶及太學生迎謁帝掩面大哭曰宰相誤我父子觀者無不流涕先是金遣蕭慶入居尚書省凡朝廷事皆先關白及是復遣使來索金一千萬錠銀二千萬錠帛一千萬匹于是六括金銀定京師米價勸糶以賑民縱民伐紫筠館花木以為薪以陳過庭折彥質等為割地使如河東北割地以畀金又分遣歐陽珣字全美吉州廬陵人等十二人持詔而往珣嘗上書極言祖宗之地尺寸不可以與人復抗論當與力戰戰敗而失地他日取之直不戰而割地他日取之曲時宰怒欲殺珣乃以珣為將作監丞奉使割深州珣至深州城下慟哭謂城上人曰朝廷為姦人所誤至此吾已辦死來矣汝等宜勉為忠義報國金人怒執送燕焚死之范致虛㑹師入援至鄧州師潰先是汴城圍急詔以致虛為陜西五路宣撫使督勤王兵入援致虛㑹陜西節度使錢蓋師十萬至潁昌聞汴京破西道總管王襄南遁致虛獨與西道副總管孫昭逺字顯叔眉州眉山人環慶帥王似熙河帥王倚帥步騎號二十萬命馬祐昌統之以趨汴以僧趙宗印汾州孝義人為參議官致虛將大軍遵陸宗印將舟師趨西京宗印又以僧為一軍號尊勝隊童子行為一軍號淨勝隊致虛勇而無謀委己以聼于宗印宗印徒大言實未嘗知兵及是師出武關至鄧州千秋鎮一作千金鎮在鄧州西金將羅索以精騎衝之不戰而潰死者過半王似王倚孫昭逺等留陜府致虛收餘兵入潼關致虛之鼓行出關也禆將李彥仙曰行者利速多為支軍則舍不至淹敗不至覆若衆羣聚而出殽澠一蹴于險則皆潰矣致虛不從遂底于敗人李彥仙初名孝忠字少嚴寧州彭原丁未二年金天㑹五年靖是年依前一嵗兩係之例五月以前為欽宗康二年五月以後為高宗建炎元年春正月詔兩河民降金民不從陳過庭至兩河民堅守不奉詔至是復詔兩河民開門出降民猶不肯帝命太子監國復如金營金人索金銀急且再邀帝至營帝有難色何㮚李若水以為無虞勸帝行帝乃命孫傅輔太子監國而與㮚若水等復如青城唐恪聞之曰一之為甚其可再乎閣門宣贊舍人吳革字義夫華州華隂人亦白㮚曰天文帝座甚傾車駕若出必墮敵計㮚不聼帝至郊張叔夜叩馬而諫帝曰朕為生靈之故不得不親往叔夜號慟再拜衆皆哭帝字之曰嵇仲努力河東割地使劉韐自經于金軍韐至金營金人使僕射韓正館之僧舍謂韐曰國相知君今用君矣韐曰偷生以事二姓有死不為也正曰軍中議立異姓欲以君為正代與其徒死不若北去取富貴韐仰天大呼曰有是乎歸書片紙曰貞女不事二夫忠臣不事二君况主辱臣死以順為正者妾婦之道也此豫所以必死也使親信持歸報其子子羽字彥伯等即沐浴更衣酌巵酒而縊金人嘆其忠瘞之寺西岡上遍題忩壁以識其處凡八十日乃就斂顔色如生副元帥宗澤大敗金人于衛州澤自大名至開德與金人十三戰皆捷遂以書勸康王檄諸道兵㑹京城又移書北道總管趙野河東北路宣撫范訥知興仁府宋崇寧初置今曹州府曹縣是曾楙合兵入援三人皆以澤為狂不答澤隨以孤軍進至衛南隋縣元省故城在今衛輝府滑縣先驅云前有敵兵澤揮衆直前與戰敗之轉戰而東敵益生兵至澤將王孝忠戰死前後皆敵壘澤下令曰今日進退等死不可不死中求生士卒知必死無不一當百斬首數千金人大敗退却數十里澤計敵必復來乃暮徙其營金人夜至得空營大驚自是憚澤不敢復出兵澤出其不意遣兵過大河襲擊敗之遼耶律逹實建都于朔漠號呼遜鄂爾多鄂呼遜有力之稱舊作虎思爾多亭也遼以名宮帳舊作幹耳朵亦作斡魯朵今改西遼主逹實引兵東還行二十日得善地遂建都城改元康國以蕭鄂囉羅為都元帥率騎七萬東征以青牛白馬祭天誓衆興復鄂囉羅行萬餘里無所得牛馬多死勒兵而歸逹實曰皇天勿順數也大風霾雲霧四塞二月京城巡檢范瓊逼上皇及后妃太子宗戚如金軍吏部侍郎李若水死之帝自如青城都人日出迎駕而粘默合留不遣太學生徐揆衢州人上書金帥請帝還宫金人取至軍中詰難揆厲聲抗論被殺金主得帝降表遂廢帝及太上皇帝為庶人知樞密院事劉彥宗請復立趙氏不許丙寅金人塹南薰門路人心大恐丁卯金人令翰林承旨吳幵吏部尚書莫儔字夀朋湖州人入城令推立異姓堪為人主者且邀上皇出城孫傅曰吾惟知吾君可帝中國爾若立異姓吾當死之上表金人請立趙氏不報京城巡檢范瓊逼上皇與太后御犢車出宫鄆王楷及諸妃公主駙馬暨六宫有位號者皆行獨元祐皇后孟氏以廢居私第獲免初金人以內侍鄧述所具諸王皇孫妃主名檄開封尹徐秉哲盡取之秉哲令坊巷五家為保母得藏匿前後凡得三千餘人秉哲悉令衣袂相聨屬而往金人逼帝及上皇易服若水抱帝而哭詆金人為狗輩金人曳若水出擊之敗面氣結仆地尼瑪哈令鐵騎十餘守視曰必使李侍郎無恙若水絶不食或勉之曰事無可為者公今日順從明日當富貴矣若水嘆曰天無二日若水寧有二主哉其僕亦慰解之曰公父母春秋高若少屈冀得一歸覲若水叱之曰吾不復顧家矣金人又逼上皇召皇后太子孫傅留太子不遣統制吳革欲以所募士微服衛太子潰圍而出傅不從而密謀匿之民間别求狀類太子者及宦者二人殺之並斬十數死囚持首送之紿金人曰宦者欲竊太子出都人爭鬭殺傷誤中太子因帥兵討定斬其為亂者以獻苟不已則以死繼之越五日無肯承其事者吳幵莫儔督脅甚急范瓊恐變生以危言讋衛士遂擁皇后太子共車而出傅曰吾為太子傅當同死生遂以留守事付王時雍從太子出百官軍吏奔隨太子號哭太子亦呼云百姓救我哭聲震天至南薰門范瓊力止傅金守門者曰所欲得太子留守何預傅曰我宋之大臣且太子傅也當死從遂宿門下以待命若水在金營旬日尼瑪哈召問立異姓狀若水因罵之為劇賊尼瑪哈令擁之去若水反顧罵益甚謂其僕曰我為國死職爾奈并纍若屬何又罵不絶口監軍撾破其脣噀血罵愈切至以刃裂頸斷舌而死金人相與言曰遼國之亡死義者十數南朝唯李侍郎一人金人大括金帛殺户部尚書梅執禮等時金人邀索金帛每曰和議已定但所需滿數則奉天子還闕執禮及禮部侍郎陳知質刑部侍郎程振字伯起饒州樂平人給事中安扶燾之子皆主根索四人哀民力已困相與謀曰金人所欲無藝極雖銅鐵亦不能給惟以軍法結罪或可窒其求㑹宦者挾宿怨語金師曰城中百萬户所取未百一但許民金銀換米麥當有出者已而果然金帥怒呼四人責之執禮等曰天子䝉塵臣民皆願致死雖肝腦不計于金銀何有哉顧比屋枵空無以塞命爾金帥問官長何在振恐執禮獲罪遽前曰皆官長也金帥怒先取其副胡舜陟等各杖之百檛四人殺之而梟其首士庶莫不流涕憤歎康王構次于濟州王有衆八萬分屯濟濮諸州高陽關路安撫使黃潛善總管楊惟忠亦以步兵數千至東平王遣真定總管王淵以三千人入衛宗廟金人聞之遣甲士及中書舍人張徴賫蠟詔自汴京至命王以兵付副帥而還京王問計于左右後軍統制張俊曰此金人詐謀爾今大王居外此天授豈可徒往因請進兵王遂如濟州既而金人謀以五千騎取康王吕好問聞之遣人以書白王曰大王之兵度能擊則邀擊之不然即宜逺避金人議立異姓執孫傅張叔夜及御史中丞秦檜吳幵莫儔復召百官議立異姓衆莫敢出聲相視久之計無所出王時雍問于幵儔二人微言敵意在張邦昌時雍未以為然適尚書員外郎宋齊愈至自金營衆問金人意所主齊愈取片紙書張邦昌三字示之時雍乃決遂以邦昌姓名入議狀張叔夜不肯署狀金人執叔夜及孫傅置軍中尼瑪哈召叔夜紿之曰孫傅不立異姓己殺之公年老大家豈可與傅同死叔夜曰世受國恩義當與之存亡今日之事有死而已金人皆義之太常寺簿張浚字德逺漢州綿竹人開封士曹趙鼎字元鎮解州聞喜人司門員外郎胡寅字明仲安國子皆逃入太學不書名唐恪書名仰藥而死已而時雍復集百官詣祕書省至即閉省門以兵環之俾范瓊諭衆以立邦昌意衆唯唯時雍先署狀以率百官御史馬伸字時中東平人獨奮曰吾曹職為爭臣豈容坐視乃與御史吳給約中丞秦檜共為議狀願復嗣君以安四方且論邦昌當上皇時蠧國亂政以致社稷傾危金人怒執檜去吳幵莫儔持狀詣軍前邦昌入居尚書省三月金立張邦昌為楚帝閣門宣贊舍人吳革率衆討邦昌不克而死金人勸進邦昌始欲引決或曰相公不前死城外今欲塗炭一城邪適金人奉冊寶至邦昌北向拜舞受冊即位號大楚遂升文德殿設位御座西受賀遣閣門傳令勿拜王時雍率百官遽拜邦昌但東面拱立閣門宣贊舍人吳革恥屈節異姓率內親事官數百人皆先殺其妻孥焚所居舉義金水門外范瓊詐與合謀令悉棄兵仗乃從後襲之殺百餘人捕革并其子殺之又擒斬十餘人是日風霾日暈無光百官慘沮邦昌亦變色惟時雍吳幵莫儔范瓊等欣然以為有佐命功邦昌心不安拜官皆加權字以時雍權知樞密院事領尚書省幵權同知樞密院事儔權簽書院事吕好問權領門下省徐秉哲權領中書省邦昌見百官稱豫手詔曰手書雖不改元而百官文移必去年號好問所行文書稱靖康二年百官猶未以帝禮事邦昌唯時雍每言事稱臣啓陛下時雍本為市伍圖利人謂之三川牙郎至是又號為賣國牙郎幵儔為金人需索朝往暮還都人稱之為捷疾鬼時雍又勸邦昌坐紫宸垂拱殿以見金使好問爭之乃止時雍復議肆赦好問曰四壁之外皆非我有將誰赦邪乃止赦城中而選郎官為四方密諭使及金人將還邦昌詣營祖之服柘袍張紅蓋所過設香案起居時雍秉哲幵儔皆從士庶觀者無不感愴夏四月金人以二帝及后妃太子宗戚三千人北去上皇聞張邦昌僭位曰邦昌若以節死則社稷增重今既尸君之位則吾事决矣因泣下霑襟至是斡里雅布脅上皇太后與親王皇孫駙馬公主妃嬪及康王母韋賢妃康王夫人邢氏等由滑州去尼瑪哈以帝后太子妃嬪宗室及何㮚孫傅張叔夜陳過庭司馬朴字文季光從孫秦檜等由鄭州去而歸馮澥曹輔孫覿汪藻字彥章饒州德興人郭仲荀等于張邦昌邦昌率百官遙辭二帝于南薰門衆慟哭有仆絶者凡法駕鹵簿皇后以下車輅鹵簿冠服禮器法物大樂教坊樂器祭器八寶九鼎圭璧渾天儀銅人刻漏古器景靈宫供器太清樓祕閣三館書天下府州圖及官吏內人內侍伎藝工匠倡優府庫蓄積為之一空初金人將還議留兵以衛邦昌吕好問曰南北異宜恐北兵不習風土必不相安金人曰留一貝勒統之可也好問曰貝勒貴人有如觸發致疾則負罪益深金人乃不留兵而去宗澤在衛聞二帝北行即提軍趨滑走黎陽至大名欲徑渡河據金人歸路邀還二帝而勤王之兵卒無至者遂不果上皇離青城金人以牛車數百乘載諸王後宫牽駕者不通華言至邢趙間斡里雅布遣郭藥師迎謝上皇曰天時帝如此非公之罪藥師慚而退斡里雅布請王婉容位姬與尼瑪哈次子作婦許之至燕山館于延夀寺帝自離青城頂青氊笠後有監軍隨之自鄭門而北每過一城輒掩面號泣至代工部員外郎滕茂實號泣迎謁茂實蓋嘗副路允迪出使者尼瑪哈逼茂實易服茂實力拒之見者墮淚茂實請侍舊主俱行尼瑪哈不許帝遂從代渡太和嶺至雲中滕茂實字彥穎杭州臨安人太和嶺在今朔平府馬邑縣東南勾注之支也張邦昌號哲宗廢后孟氏曰太后吕好問謂邦昌曰相公真欲立邪抑姑塞敵意而徐為之圖也邦昌曰是何言也好問曰相公知中國人情所向乎特畏女真兵威爾女真既去能保如今日乎大元帥在外元祐皇后在內此殆天意盍亟還政可轉禍為福且省中非人臣所處宜寓直殿廬毋令衛士夾陛敵所遺袍帶非戎人在勿服車駕未還下文書不當稱聖㫖為今計者當迎元祐皇后請康王早正大位庶獲保全監察御史馬伸具書請邦昌速奉迎康王極陳逆順利害邦昌讀其書氣沮乃尊元祐皇后為宋太后迎居延福宫而遣人至濟州訪康王其上太后冊語有曰尚念宋氏之初首崇西宮之禮蓋用太祖即位迎周太后入西宫故事識者有以覘邦昌之意非真為趙氏也邦昌令談世績李熙靖同直學士院皆稱疾卧不起憂憤而卒時工部侍郎何昌言與其弟昌辰皆避邦昌諱改名獨司門郎徐俯置婢名昌奴客至則呼前驅使之淦李熙靖字子安常州晋陵人何昌言新人徐俯字師川禧之子御批歷代通鑑輯覽卷八十二

front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷七十一五季宋太祖開七年以前附已周頤德六年六月恭帝宗朱訓立是嵗五國三鎮春正月周命王朴作律凖定大樂
  hash: sha256:ef5625d83cf14b6868ccf5455799d66a39528182b5ae684e84f2bc17ed847f3b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_070-1a, image: WYG0337/WYG0337-0752a.png}
body:
  text: 初有司將立正伏宿設前一夕設之也樂縣于殿庭周主觀之見鐘磬有設而不擊者問樂工皆不能對乃命寶儼討論古今考正雅樂以妾朴素曉音律詢之朴具疏以對疏曰禮以檢形樂以治心形順于外心和于內然而天下不治者未之有也夫樂生于人心而聲成于物物聲既成復能感人之心昔黃帝吹九寸之管得黃鍾正聲半之為清聲倍之為緩聲三分損益之以生十二律旋相為宫以生七調為一均凡十二均八十四調而大備遭秦滅學厯代罕能用之唐祖孝孫考正大樂其法始備安史之亂十亡八九至于黃巢蕩盡無遺時有慱士殷盈孫鑄鏄鍾十二編鍾二百四十處士蕭承訓校定石磬今之在縣者是也雖有鐘磬之狀殊無相應之和其鑄鐘不問音律但循環而擊編鐘編磬徒縣而已絲竹匏土僅有七聲黃鐘之宫止存一調蓋樂之缺壞無甚于今陛下臨視樂縣知其亡失以臣曾學律呂宣示古今樂録命臣討論臣雖不敏敢不奉詔乃依古法以秬黍用牛頭山秬黍中者定尺一黍為分十黍為寸十寸為尺長九寸徑三分為黃鍾之管與今黃鐘之聲相應因而推之得十二律管衆管互吹用聲不便乃作律凖十有三絃其長九尺朱子曰京房始作律凖梁武帝為之通其制十有三絃一絃是全律考律凖中央一絃下畫分寸以為六十律清濁之節故曰全律皆應黃鍾之聲以次設柱為十一律第八絃為林鍾第三絃為太簇第十絃為南吕第五絃為姑洗第十二絃為應鍾第七絃為蕤賔第二絃為大呂第九絃為夷則第四絃為夾鍾第十一絃為無射第六絃為仲吕及黃鍾清聲第十三絃為黃鍾之清聲旋用七律以為一均一律中調之一終也為均之主者宫也徴商羽角變宫變徴次焉發其均主之聲歸乎本音之律迭應不亂乃成其調凡八十四調歌奏之曲出焉朴又言此法久絶出臣獨見乞集百官校其得失詔從之百官皆以為然乃行之樂成而和二月周𨗳汴水入蔡水即閔河注見前以通陳潁之漕自是以西南為閔河東南為蔡河後又改曰惠氏河周減行苗使所奏羡田開封府奏田稅舊一十萬二千餘頃今按行得羡田四萬二千餘頃敕減三萬八千頃諸州使還奏所減之數仿此周淮南飢淮南飢周主命以米貸之或曰民貧恐不能償周主曰民吾子也安有子倒懸而父不為之解哉安在責其必償也三月周樞密使王朴卒朴剛鋭明敏志略過人及卒周主臨其喪以玉鉞卓地慟哭數四不能自止夏四月周主自將伐遼五月取瀛莫易置雄霸州遂趣幽州有疾乃還周主以北鄙未復下詔親征命親軍都虞候韓通等將水陸軍先發四月通自滄洲治水道入遼境柵于乾寧軍唐置遼于軍置寧州明改曰青縣今屬天津府南補壞防開遊口三十六遂通瀛莫車駕至滄洲即日帥步騎數萬直趣遼境非道所從民間皆不之知遼寧州刺史王洪舉城降詔以韓通為陸路都部署趙匡胤為水路都部署自御龍舟至益關津後唐置今霸州是遼守將終廷輝以城降自是水路漸隘乃登陸而西趙匡胤先至瓦橋關遼守將姚內斌平州盧龍人莫州刺史劉楚信皆舉城降五月朔侍衛都指揮使李重進等引兵繼至遼瀛州刺史章彥暉薊州漁陽人舉城降于是關南悉平宴諸將于行宫議取幽州諸將曰陛下離京四十二日兵不血刃取燕南之地此不世之功也今敵騎皆聚幽州之北未冝深入周主不悅是日趣先鋒都指揮使劉重進幽州人先發據固安隋縣今屬順天府自至安陽水在固安縣北拒馬河支流也命作橋會日暮還宿瓦橋是夕不豫而立孫行友拔易州擒遼刺史李在欽獻之斬于軍市以瓦橋關為雄州今雄縣是屬保定府益津關為霸州今屬順天府命韓令坤陳思讓字後己盧龍人戍之遂還大梁六月河決原武周發近縣民夫塞之唐泉州遣使入貢于周不受唐清源節度使劉從效遣使入貢請置進奏院于京師詔報之曰江南近服方務綏懷卿久奉金陵未可改圖若置邸上都與彼抗衡受而有之罪在于朕唐城金陵唐遣鍾謨入貢于周周主曰江南亦治兵修守備乎對曰既臣事大國不敢復爾周主曰不然嚮時則為讐敵今日則為一家吾與汝國大義已定保無他虞然人生難期至于後世則事不可知歸語汝主可及吾時完城郭繕甲兵據守要害為子孫計謨歸以告唐主乃城金陵凡城郭不完者葺之戍兵少者益之周主立其子宗訓為梁王初宰相屢請王諸皇子周主曰功臣之子皆未加恩而獨先朕子能自安乎至是不豫乃封宗訓為梁王生七年矣周以魏仁浦同平章事周主欲相仁浦議者以仁浦不由科第為疑周主曰自古用文武才略為輔佐者豈盡由科第邪乃以王溥范質皆參知樞密院事仁浦同平章事樞密使如故仁浦為人謙謹周主性嚴急近職有忤旨者仁浦多引罪歸己以救之所全活什七八故雖起刀筆吏致位宰相時人不以為忝周以趙匡胤為殿前都點檢胡三省注後唐始置大內都點檢官至後周選驍勇之士充殿前諸班置殿前都點檢在都指揮使之上先是周主自關南還在道閲文書于篋中得木長三尺餘題云點檢作天子時張永德為都點檢永德周懿親永德妻周太祖女有功周主疑焉至是以匡胤代之周主榮殂梁王宗訓立是為周恭帝周主大漸召范質等入受顧命謂曰王著字成象單父人藩邸故人朕若不起當相之質等出相謂曰著終日遊醉鄉豈堪為相慎毋泄此言是日周主殂諡睿武孝文皇帝廟號世宗梁王宗訓即位世宗在藩多務韜晦及即位破高年之寇人始服其英武其御軍號令嚴明人莫敢犯攻城對敵矢石落其左右略不動容應機決䇿出人意表又勤于為治發姦摘伏聽察如神明暇則召儒者讀前史啇榷大義性不好絲竹珍玩之物嘗言朕必不因喜賞人因怒刑人又言太祖養成王峻王殷之惡致君臣之分不終故羣臣有道則面質責之服則赦之有功剛厚賞之文武參用各盡其能人無不畏其明而懷其惠故能破敵廣地所向無前然用法太嚴羣臣執事小有不舉往往置之極刑雖素有才幹聲名無所開宥焉尋亦悔之末年寖寬登遐之日逺邇哀慕秋七月周以趙匡胤領歸德軍節度使唐鑄大錢唐自淮上用兵及割江北以事周嵗時貢獻府藏空竭錢少物貴謨請鑄大錢一當五十韓熙載請鑄鐵錢唐王從謨計鑄當十大錢文曰永通泉貨又鑄當二錢文曰唐國通寶九月唐太子冀卒唐王以其子從嘉字重光唐王第六子為吳王居東宫殺禮部侍郎鍾謨謨數奉使入周周世宗及唐皆原待之恃此驕橫嘗與天威都虞侯張巒屏人夜語樞密副使唐鎬譖其有異謀又言大錢民多盜鑄犯法者多會太子冀卒唐王欲立鄭王從嘉謨與紀公從善字子師唐主第七子善言于唐主曰從嘉德輕志懦又酷信釋氏非人主才從善果敢凝重宜為嗣唐主由是怒徙從嘉為吳王居東宫謨請令張巒以所部兵巡徼都城唐主乃下詔暴謨罪流饒州貶巒宜州副使未幾皆殺之廢永通錢南漢殺其尚書右丞鍾允章番禺人以龔澄樞為內太師南漢王鋹以允章藩府舊僚擢為尚書右丞參政事甚委任之允章請誅亂法者數人以正綱紀鋹不能從宦官聞而惡之內侍監許彥真告允章欲作亂玊清宫使龔澄樞內侍監李托封州人等共證之乃收允章斬之自是宦官益橫未幾以澄樞為內太師軍國之事皆取決焉凡羣臣有才能及進士狀頭皆先下蠶室然後得進亦有自宫以求進者由是宦者近二萬人貴顯用事之人大抵皆宦者也謂士人為門外人不得預事卒以亡國唐以洪州為南郡唐以金陵去周境才隔一水洪州險固居上遊議徙都之羣臣皆不欲徙惟樞密副使唐鎬勸之乃以洪州為南都命曰南昌府遼遣使如唐周人殺之遼主遣其舅使于唐周泰州團練使荆罕儒冀州信都人募刺客使殺之自是遼與唐絶庚周恭帝宗訓元年宋太祖神德皇帝趙匡申胤建隆元年是嵗周亡宋代凡五國三鎮春正月周殿前都點檢趙匡胤稱皇帝國號宋廢周主宗訓為鄭王周侍衛副都指揮使韓通死之後周自太祖至恭帝凡三主合九年先是周鎮定二州言北漢會遼兵入境至是正月辛丑朔遣趙匡胤率兵禦之殿前副都點檢慕容延釗太原人將前軍先發時主少國疑中外乃密有推戴匡胤之意都下歡言將以出軍之日册點檢為天子士民恐怖爭為逃匿計惟內廷宴然不知癸卯大軍繼出軍校苗訓號知天文見日下復有一日黑光摩蕩者久之指示匡胤親吏楚昭輔曰此天命也苗訓河中人楚昭輔字拱辰宋州宗城人是夕次陳橋驛注見前將士相聚謀曰主上幼弱我輩出死力破敵誰則知之不如先册點檢為天子然後北征未晚也都押衙李處耘潞州上黨人具以事白匡胤弟供奉官都知匡義即宋太保及歸德掌書記趙普匡義普部分諸將環列待旦遣牙隊軍使郭延贇馳騎入京報殿前都指揮使石守信開封浚儀人都虞候王審琦字併審洛陽人二人皆素歸心匡胤者甲辰黎明將士逼匡胤寢所匡義普入帳中白之匡胤時被酒卧欠身徐起將校已露刃列廷曰諸將無主願册太尉為皇帝匡胤未及對黃袍已加身矣衆即羅拜呼萬嵗掖之上馬還汴匡胤攬轡曰汝等貪富貴能從我命則可不然我不能為若主矣皆下馬曰願受命匡胤曰太后主上我北靣事者不得驚犯公卿皆我比肩不得侵凌朝市府庫不得侵掠用命有重賞違不汝貰也皆應曰諾遂肅隊而行乙巳入汴先遣楚昭輔慰安家人又遣客省使潘美字仲詢大名人見執政諭意時早朝未罷聞變范質執王溥手曰倉卒遣將吾輩之罪也爪入溥手幾出血溥噤不能對侍衛親軍副都指揮使韓通自禁中遑遽而歸謀帥衆禦之軍校王彥升字光烈蜀人徙洛陽逐焉通馳入其第未及闔門為彥升所害妻子俱死匡胤進登明德門命甲士歸營而自退居公署將士擁范質等至匡胤見之流涕曰吾受世宗厚恩為六軍所迫一旦至此慙負天地將若之何質等未及對列校羅彥環并州太原人挺劍厲聲曰我輩無主今日必得天子質等相顧不知所為溥降階先拜質不得已亦拜遂請匡胤詣崇元殿行襌代禮召百官至晡時班定猶未有襌詔翰林承旨陶穀出諸袖中遂用之宣徽使引匡胤就庭北面拜受已乃夜升殿服兖冕即皇帝位奉周主為鄭王符太后周世宗納符彥卿之女為后后殂復納其妹即太后也為周太后遷之西宫大赦改元以所領歸德軍在宋州國因號宋遣使遍告郡國藩鎮加官進爵有差未幾鎮州報北漢兵引還華山處士陳摶聞宋主代周曰天下自此定矣宋贈周韓通為中書令宋主贈通以旌其忠仍詔以禮葬之欲加王彥升擅殺之罪羣臣以建國之始乞貰之宋主猶怒故終身不得節鉞宋論翊戴功加石守信等官爵石守信髙懷德字藏用行周子張令鐸隸州厭次人王審琦張光翰趙彥徽並領節鎮餘領軍者並進爵時慕容延釗握重兵屯真定韓令坤引兵巡北邉宋主遣使諭意許以便宜從事兩人皆聼命乃加延釗殿前都檢令坤亦加侍衛都指揮使後延釗令坤皆出為節度使自是殿前都點檢遂不復除受宋遣使分賑諸州宋主以其弟光義即匡義為殿前都虞侯趙普為樞密直學士宋立太廟追帝其祖考宋主從兵部尚書張昭判太常寺竇儀議立四親廟尊髙祖能為僖祖文獻皇帝曾祖珽為順祖惠元皇帝祖敬為翼祖簡恭皇帝妣皆為皇后考𢎞殷為宣祖昭武皇帝定制嵗以四孟月及季冬凡五享朔望薦食薦新三年一祫以孟冬五年一禘以孟夏宋主視學詔增葺祠宇塑繪先聖先賢像自為贊書于孔顔座端令大臣分撰餘贊屢臨幸焉嘗謂侍臣曰朕欲盡令武臣讀書知為治之道于是臣庶始貴文學二月宋主尊其母杜氏定州安喜人為皇太后后治家嚴而有法陳橋之變后聞之曰吾兒素有大志今果然矣及尊為皇太后宋主拜于殿上群臣稱賀后愀然不樂左右進曰臣聞母以子貴今子為天子胡為不樂后曰吾聞為君難天子置身兆庶之上若治得其道則此位可尊茍或失馭求為匹夫不可得是吾所以憂也宋主再拜曰謹受教既而后有疾宋主侍藥餌不離左右及疾亟召趙普入受遺命且問宋主曰汝知所以得天下乎宋主曰皆祖考及太后之餘慶也后曰不然正由柴氏使幼兒主天下爾若周有長君汝安得至此汝百嵗後當傳位光義光義傳光美字文化宋主弟光美傳德昭字日新宋主弟二子夫四海之廣能立長君社稷之福也宋主泣曰敢不受教后顧謂普曰爾同記吾言不可違也普即榻前為誓書于紙尾署曰臣普記藏之金匱命謹密宫人掌之遂殂事在次年六月宋以范質王溥魏仁浦同平章事吳廷祚字慶之太原人為樞密使加同中書門下三品廷祚父名璋避平章特加同三品仍為樞密使舊制宰臣上殿命坐而議大政其進擬差除但入執狀畫可降出奉行而已質等自以周朝舊臣稍存形迹且憚宋主英睿乃請用劄子靣取旨退各疏其事同列書字以志宋主從之坐論之禮遂廢三月唐吳越遣使如宋賀即位也夏四月周昭義節度使李筠起兵會北漢伐宋宋遣兵擊之宋遣使加筠中書令使者至潞州筠延使者置酒既而取周太祖畫像懸于壁涕泣不已北漢主鈞聞之乃以蠟書結筠同舉兵筠長子守節字得臣泣諫筠不聼遂起兵令幕府為檄數宋主罪執監軍周光遜等送于北漢以求濟師又遣人殺澤州刺史張福據其城從事閭邱仲卿説筠曰公孤軍舉事其勢甚危雖倚河東之援恐亦不得其力大梁甲兵精鋭難以爭鋒不如西下太行直扺懷孟塞虎牢據洛邑東向而爭天下計之上也筠不能用北漢主自帥兵赴筠筠迎謁于太平驛在潞州府長治縣西北言受周太祖恩不敢愛死北漢主周世讐不悅其説因使其宣徽使盧贊監其軍筠見漢兵弱少而贊又來監心甚悔謀多不協乃留守節守潞而自引衆南向北漢主聞贊與筠異復遣其平章事衛融字明遠青州博興人和解之宋主遣石守信髙懷德慕容延釗王全斌分道擊筠五月己亥朔日食宋主自將兵圍澤州六月克其城李筠死之宋主自帥大衆討筠山路險峻多石宋主先于馬上負數石將士因爭負之即日平為大道遂與石守信等會大敗筠衆于澤州南殺盧贊筠走保澤州宋主列柵圍之六月宋將馬全義帥敢死士數十人攀堞而上遂入其城筠赴火死北漢主懼引師歸宋獲衛融融請死宋主怒以鐵撾擊其首流血被靣融呼曰臣得死所矣宋主曰忠臣也釋之以為太府鄉進攻潞州守節降秋七月宋主還荆南節度使髙保融卒弟保朂字省躬嗣保融迂緩國事悉委于母弟保朂及卒保朂權知軍府請命于宋宋主授以節度使冬十月周淮南節度使李重進謀起兵拒宋十一月宋主自將擊之重進自焚死重進與宋主同事周室分掌兵權常心憚宋主宋主立加重進中書令移鎮青州重進愈不自安宋主遣六宅使宋初武職諸司有六宅正副使陳思誨宅讓弟賜之鐵劵重進欲治裝隨思誨朝汴左右沮之猶豫不決又自以周室懿親恐不得全遂拘思誨治城繕兵遣人求援于唐唐主聞于宋宋遣石守信王審琦李處耘宋偓洛陽人等分道討之趙普勸宋主自行十月宋主發汴十一月至廣陵即日拔之城將陷左右欲殺思誨重進曰吾將舉族赴火死殺此何益即盡室自焚思誨亦被害唐主遣子朝宋主于揚州十二月宋主還汴宋主令諸軍習戰艦于迎鑾鎮唐主大恐遣使犒師且使其子從鑑朝于揚州唐臣杜著薛良以罪奔宋獻平南䇿宋主惡其不忠斬著配良牙校遂還汴宋以竇儀為翰林學士宋主嘗召儀草制至苑門儀見宋主岸幘髮布曰幘岸幘露頂也跣足赤足也而坐却立不肯進宋主遽索冠帶而後召入儀曰陛下創業垂統不以禮示天下恐豪傑聞而解體宋主斂容謝之自是對近臣未嘗不冠帶考宋史竇儀傳建隆元年秋儀遷工部尚書會翰林學士王著因酒失貶官太祖問干范質以儀代之而王著傳則云乾德元年著直禁中被酒夜叩宫門帝怒貶著比部員外郎兩傳互異商輅續綱目以儀傳為據薛應旗通鑑則從著傳今依續綱目紀于是年而王著酒失事不載宋主微行宋主欲察羣情向背頗為微行或諌曰陛下新得天下人心未安今數輕出萬一有不虞其可悔乎宋主笑曰帝王之興自有天命求之亦不可得拒之亦不可止周世宗見諸將方靣大耳者皆殺之我終日侍側亦不能害若應為天下主誰能圖之微行愈數曰有天命者任自為之不汝禁也辛宋建隆二年是酉嵗凡五國三鎮春正月宋度民田周世宗末年嘗命官詣諸州度民田而使者多不稱至是宋主謂侍臣曰度田蓋欲勤恤下民而民敝愈甚今當精擇其人遂分遣常參官詣諸州尋詔州縣課民種植長史以春秋巡視著為令又置義倉官所取二稅每一石别輸一斗貯之以備凶歉二月宋遣使監輸民租先是藩鎮率遣親吏視民租入概量增益公取餘羡符彥卿在天雄軍取民尤悉宋主聞之即遣使諸州分主其事民始不困唐徙都洪州宋主既平揚州唐主景懼甚乃遷豫章以太子從嘉守建康豫章城邑迫隘羣臣日夜思歸景怒欲誅贊行者夏四月癸巳朔日食秋七月宋罷其侍衛都指揮使石守信等典禁兵石守信王審琦等皆宋主故人有功典禁衛兵趙普數以為言宋主曰彼等必不吾叛卿何憂之深邪普曰臣亦不憂其叛也然熟觀數人者皆非統御才恐不能制伏其下若軍伍間萬一有作孽者彼臨時亦不能自由爾宋主悟一日因晚朝與守信等飲酒酣屏左右謂曰朕非卿等不及此然天子亦大艱難殊不若為節度使之樂朕終夕未嘗敢安枕卧也守信等請其故宋主曰是不難知此位誰不欲為守信等頓首曰陛下何為出此言今天命已定誰復有異心宋主曰卿等固然其如麾下欲富貴何一旦有以黃袍加汝身汝雖欲不為其可得乎守信等泣謝曰臣等愚不及此惟升下哀矜指示可生之途宋主曰人生如白駒過隙所以好富貴者不過欲多積金錢厚自娛樂使子孫無貧乏爾卿等何不釋去兵權出守大藩擇好便田宅市之為子孫立永遠不可動之業多置歌兒舞女日夕飲酒相歡以終天年朕且與卿等約為婚姻君臣之間兩無猜疑上下相安不亦善乎守信等皆謝曰陛下念臣等至此所謂生死而肉骨也明日皆稱疾乞罷典兵宋主從之宋以李漢超雲中人為關南兵馬都監文獻通考宋置兵馬都監分掌本路禁旅屯戍邊防訓練之政令漢超在關南民有訟其強娶己女為妾及貸民錢不償者宋主召謂曰汝女可適何人對曰農家爾又問漢超未至關南時契丹何如對曰嵗苦侵暴曰今復爾邪對曰無也宋主曰漢超朕之貴臣汝女為之妾不猶愈為農婦乎且使漢超不在關南汝家尚能保其所有貨財邪責其人而遣之密使諭漢超曰亟還其女并所貸朕姑貰女勿復為也不足于用何不以告朕邪漢超感泣由是益修政理吏民愛之八月宋襲執武義節度使孫行友行友繼其兄方簡鎮易定踰八年狼山佛舍妖黨事見前益甚宋主即位行友不自安纍表乞罷不許行友懼乃繕甲兵將棄其孥還據山寨以叛兵馬都監樂繼能密表其事宋主遣李懷節馳騎會鎮趙之兵偽稱巡邊直入定州行友不之覺既而出詔令舉族歸朝行友倉皇聼命既至訊之得實制削奪其官爵禁錮私第唐主景殂于煜即從嘉更名立于金陵景方議東還以疾殂于南都太子煜時留建康遂即位遣其户部尚書馮謐即馮延魯更名奉父遺表于宋願追尊帝號宋主許之煜聰悟好學善屬文工書畫明音律女真注見前入貢于宋女真部人在南者繫籍于遼號熟女真在北者不𨽻遼籍號生女真至是以馬入貢于宋宋主詔蠲登州沙門島在登州府蓬萊縣西北海中齊乘有五島相聫屬海市現滅多在其上居民租賦令専治舟船渡其所貢馬冬十一月沙州入貢於宋瓜沙自後唐同光初曹義金遣使間道通貢事具前其後義金卒五代史義金于晉天福五年卒其子元忠元深等亦皆遣使中國五代史天福七年沙州曹元忠瓜州曹元深皆遣使來周世宗時以元忠為歸義軍節度使元深為瓜州團練使至是入貢於宋宋史外國傳沙州唐大中五年置歸義軍以張義為節度使至朱梁時張氏州人推長史曹義金為帥義金卒子元忠嗣啇輅續綱目薛應旗通鑑皆因之考司馬氏通鑑唐咸通十三年張義潮卒沙州長史曹義金自領軍府詔以義金為節度使又考歐陽修五代史沙州梁開平中有節度使張奉自號金山白衣天子至唐莊宗時回鶻來朝沙州留後曹義金遣使附以來二書所載與宋史互有不同司馬氏考據詳核當必無誤今依通鑑兼節採歐史改輯壬宋建隆三年唐後主煜戍元年是嵗凡五國三鎮春三月宋廣東京城宋主既廣汴城且命有司畫洛陽宫殿按圖修之以重贇磁州武安人董其後營繕既畢宋主坐寢殿令洞開諸門皆端直軒豁無有壅蔽謂左右曰此如我心若有邪曲人皆見之矣二月宋初詔常參官轉對每五日內殿起居百官以次轉對指陳時政得失事關急切者許非時上章宋令諸州大辟不得專夾宋主謂宰臣曰五代諸候跋扈有枉法殺人者朝廷置而不問人命至重姑息藩鎮當如是邪自今諸州決大辟録案問奏付刑部詳復之夏四月唐清源節度使留從效卒從效卒子紹鎡典留務會吳越聘使至紹鎡夜召與燕統軍使陳洪進誣紹鎡謀附吳越執送建康推副使張漢思為留後而自為副使既而洪進幽漢思而代之漢思年老不能治軍務事皆決于洪進漢思諸子頗不平欲害洪進謀泄不果由是更相為備一日漢思方坐內齋洪進徑入府中鎖其户而求印漢思惶懼即于阿閣出印與之洪進遂自稱留後遷漢思于别舍以兵守之宋以趙贊即趙匡贊避東主名改為彰武後唐改延州為彰武軍節度使贊至延州前後分置步騎使綿綿不絶林莾之際逺見旌旗所部羌渾來迎莫測其數相視奪氣莫不畏服宋主嘗注意于謀帥命贊屯延州姚內斌守慶州董遵誨守環州王彥升守原州馮繼業鎮靈武以備西夏李漢超屯關南馬仁瑀守瀛州韓令坤鎮常山賀惟忠守易州何繼均領棣州以拒北敵又以郭進控西山武守琪戍晉州李謙溥守隰州李繼勳鎮邵義以禦太原其家族在京師者撫之甚厚郡中管𣙜之利悉與之恣其圖回貿易免所過征稅令召募驍勇以為爪牙凡軍中事許從便宜每來朝必召對命坐賜以飲食錫賚殊異由是邊臣皆富于財得以飬募死力使為間諜洞知蕃情每入冦必預為之備多致克捷自此纍年無西北之虞得以盡力東南取荆湖川廣吳楚之地董遵誨范陽人馮繼業字嗣宗暉之子馬仁瑀夏津人賀惟忠欣州定襄人何繼筠字化龍福進之子郭進博野人李繼勳大名元城人冬十月宋以趙普為樞密使吳廷祚罷以普代之宋主嘗謂普曰天下自唐季以來數十年間帝王凡易八姓鬬戰不息生民塗地其故何也吾欲息天下之兵為國家長久計其道如何普對曰此無他方鎮大重君弱臣強而已今欲治之宜稍奪其權制其錢榖收其精兵則天下自安矣語未畢宋主曰卿勿復言吾已諭矣宋主匡胤遷鄭王宗訓于房州武平節度使周行逢卒子保權嗣時年十一嵗十一月荆南節度使髙保朂卒兄子繼沖字成和保融子嗣十二月湖南將張文表襲潭州據之初周行逢病亟召將校屬其子保權曰吾部內凶狠者誅之略盡惟張文表在耳我死文表必亂當以楊師璠討之如其不能則自歸于朝廷及保權嗣位文表聞之怒曰我與行逢俱起微賤立功名今日安能北靣事小兒乎遂襲潭州殺留後廖簡據其城又將取朗州以滅周氏保權遣楊師璠擊之且求援于宋蜀鑄鐵錢蜀以用度不足始鑄鐵錢禁境內用鐵凡器用須鐵為之者置場𣙜之以專其利又遣使遍督諸路纍年逋負租稅龍遊隋置今日樂山為四川嘉定府治令田淳成都人上疏言擾民犯天意聚財損君道語甚切直蜀主不能用淳好談治亂屢陳朝政闕失嘗言王昭遠伊審徵韓保正不可當大任或勸以遜詞取責仕淳曰大丈夫豈能附狗鼠求進哉子韓保正字永吉潞州長人南漢誅其內侍監許彥真以李托為內太監彥真既讒殺鍾允章威權與龔澄樞等澄樞忿彥真恣橫使人告其謀反下獄族誅南漢主以李托為內太監六軍觀軍容使初南漢主納托長女為貴妃次女為美人至是詔邦政皆稟托而後行癸宋乾德元年是歲凡五亥國一鎮荆南湖南亡春正月宋主以文臣知州事五代諸候強盛朝廷不能制每移鎮受代先命近臣諭旨且發兵備之尚有不奉詔者宋初異姓王及𢃄相印者不下數十人宋主用趙普謀漸削其權或因其卒或因遷徙致仕或因遙領他職皆以文臣代之宋遣慕容延釗李處耘假道荆南討張文表二月周保權執文表誅之處耘襲江陵高繼沖以荆南降荆南自高繼沖至繼沖凡五主合五十七年初宋盧懷忠瀛州河間人使荆南還言江陵南邇長沙東距建康西迫巴蜀北奉朝廷其勢日不暇給取之易也及周保權使至宋主謂范質等曰江陵四分五裂之國今假道出師因而下之蔑不濟矣乃命慕容延釗為都部署樞密副使李處耘為都監率十州兵假道荆南討文表未至楊師璠已破文表梟首朗陵市處耘至襄州遣丁德裕洺州臨洺人諭繼沖以假道之意孫光憲因言于繼沖曰中國自周世宗時已有混一天下之志今宋主規模宏逺不若早以疆土歸之則可免禍公亦不失富貴矣繼沖乃遣其叔父保寅奉牛酒犒師于荆門且覘強弱是夕延釗召保寅宴飲帳中處耘密遣輕騎數千倍道而進繼沖遽聞宋師奄至即惶怖出迎處耘揖繼沖令待延釗而率親軍先入城繼沖大懼因盡籍兵境內三州十七縣遣容將王昭濟奉表納于宋宋主受之以王仁贍唐州方城人為荆南都巡檢使文獻通考宋制沿邉溪洞有都巡檢其歸峽荆門等處跨連數郡特置都巡檢使以增重之授繼沖荆南節度使如故尋改武寧注見前節度使宋慕容延釗進克潭州周保權遣兵逆戰敗走延釗遂入朗執保權以歸延釗進克潭州將趨朗州保權牙將張從富等以為文表已誅而宋師繼進不止懼為所襲相與拒守延釗至從富等以兵逆戰于澧江出灃州安福縣徑州南下流入洞庭湖九江之一也宋師敗之延釗因長驅而進遂克其城執從富殺之其大將汪端劫保權及家屬亡匿江南岸僧寺中李處耘追田守奇帥師渡江獲之以歸宋主釋其罪以為右千牛衛上將軍汪端猶擁衆寇掠宋師擊殺之湖南悉平得州十四監一縣六十六宋主以户部侍郎吕餘度權知潭州吕餘慶琦之子宋天雄節度使符彥卿入朝宋主欲使彥卿典兵趙普屢諌不聼宣已出復懷入從容言之宋主曰朕待彥卿厚豈忍相負邪書曰陛下何以能負周世宗宋主默然事遂寢夏四月宋初置諸州通判宋史職官志通判掌倅貮郡政以郎官以上充詔設通判于諸州凡軍民之政皆統治之事得專達與長吏均禮大州或置二員又令節鎮所領支郡皆直𨽻京師得自奏事不屬諸藩于是節度使之權始輕用趙普之言也宋行應天厯王朴欽天厯推驗稍疏司天少監王處訥製新厯上之宋主自為序賜名應天頒行之宋初以常參官知縣事符彥卿久鎮大名專恣不法屬邑頗不治乃特選常參官強幹者往涖之遂著為令秋七月宋主幸武成王廟毁白起象宋主厯觀武成王廟兩廡指白起曰起殺已降不武之甚豈宜受享命去之八月宋侵北漢取樂平遼救之不及宋將王全斌攻取北漢樂平詔以為平晉軍宋殺其殿前都虞侯張瓊初宋主為周將瓊𨽻帳下嘗以身蔽宋主中弩矢死而復蘇淝橋之役事具前及宋主即位擢典禁兵為殿前都虞侯時軍校史圭石漢卿以數言外事得幸于宋主瓊輕侮之二人因譖瓊養部曲擅威福宋主召瓊靣訊之不伏宋主怒令擊之漢卿即奮鐵撾擊其首血流氣絶乃曵出下吏瓊自知不免解所繫𢃄以遺母即自殺宋主旋聞瓊家無餘財甚悔責漢卿厚恤其家九月北漢以遼兵攻宋平晉軍宋將郭進救却之初進從征澤潞遷洺州防禦使充山西巡檢御下嚴毅宋主遣戍卒必諭之曰汝輩謹奉法我猶貨汝郭進殺汝矣嘗有軍校自西山詣汴誣訟進不法事宋主詰知其情送進令殺之會北漢來攻進語其人曰汝敢論我信有膽氣今貰汝罪汝能掩殺敵兵當即薦汝如敗可自投河東其人踴躍赴戰大致克捷進即以聞乞還其職宋主從之冬十月北漢以郭無為字無不為青州千乘人同平章事北漢主自敗于潞州日懼宋師之至以趙文度薊州人為相又召抱腹山在太原人郭無為及五臺山在代州五臺縣東北寰宇記山五巒巍然故名僧繼顒劉守光子為浮屠參預國事未幾文度無為議論不協北漢主出文度守汾州而無為獨相機事悉以委之十二月宋黜鄭起楊徽之字仲猷建州浦城人為縣令初殿中侍御史鄭起在周見宋主握禁兵有人望乃貽書范質極言其事右拾遺楊徽之亦嘗言于世宗以宋主不宜典禁兵宋主銜之至是左遷起為西河令徽之為天長令溪州注見前蠻附于宋北江酉陽江之别源也在今永順府保靖縣北亦曰北河蠻酋最大者曰彭氏本江西吉水人世有溪州州有三曰上中下溪上溪廢州在今永順府龍山縣中溪廢州亦在龍山縣下溪州故城在永順府永順縣彭氏所治也又有龍賜忠順保靜感化天賜永順六州及懿安逺新給富來寧南順高十一州地俱在今永順府境至是其酋彭允林以地附宋于是各州悉置刺史而以下溪州刺史兼都誓主以統之謂之誓下州甲宋乾德二年是子嵗凡五國一鎮春正月宋范質王溥魏仁浦罷以趙普同平章事普既相以天下為已任宋主倚任之事無大小悉咨決焉宋主數微行過功臣家普每退朝不敢去衣冠一日大雪向夜普意宋主不出久之聞叩門聲普亟出宋主立風雪中普惶恐迎拜宋主曰已約光義矣已而光義至設重裀地坐堂中熾炭燒肉普妻行酒炙宋主以嫂呼之因與普計下太原普曰太原當西北二靣太原既下則我獨當之不如姑俟削平諸國則彈丸黑子之地將安逃乎宋主曰吾意正如此特試卿耳宋主又嘗以幽燕地圖示普問進取之䇿普曰圖必出曹翰宋主曰然因曰翰可取否普曰翰可取孰可守宋主曰以翰守之普曰翰死孰可代宋主默然良久曰卿可謂深虞矣普嘗薦某人為某官宋主不許明日復奏亦不許明日又奏宋主大怒裂碎奏牘擲地普顔色不變跪而拾之以歸他日補綴舊牘復奏如初宋主乃悟卒用其人又有羣臣當遷官宋主素惡其人不與普堅以為請宋主怒曰朕固不與遷卿若之何普曰刑賞天下之刑賞陛下豈得以喜怒專之宋主怒甚起普亦隨之宋主入宫門久之不去竟得俞允其剛毅果斷類如此然多忌刻屢以微時所不足者為言宋主曰若塵埃中可識天子宰相則人皆物色之矣自是不敢復言能范質罷相未幾卒宋主弟光義嘗稱質曰宰輔中循規矩慎名器持亷節無出質右者但欠世宗一死為可惜耳二月宋昭義節度使李繼勳侵北漢遼州克之繼勳屢敗北漢兵至是宋主遣曹彬會繼勳合兵入北漢境攻其邉邑及遼石州繼勳大敗北漢兵于遼城下北漢遼州刺史杜延韜危蹙籍部下兵三千人降于繼勳遼以六萬騎來援又擊走之已而遼州復為北漢所取宋以陳洪進為平海節度使先是洪進既幽張漢思遣使請命于唐復遣牙將魏仁濟奉表如宋且請制命至是宋主詔諭唐主改清源為平海軍授洪進節度使洪進嵗貢多厚斂于民二州甚苦之夏四月宋以薛居正字子平浚儀人吕餘慶參知政事參知政事設官自此始職官志秩正二品宋主以趙普獨相欲置副而難其名稱問翰林承旨陶穀曰下宰相一等有何官對曰唐有參知政事唐參知政事之名始于劉洎説具前乃以樞密直學士薛居正兵部侍郎吕餘慶並以本官參知政事不押班宣制知印不預奏事不升政事堂止令就宣徽使廳上事殿廷别設磚位敕尾署銜降宰相月俸雜給半之未欲與普齊也宋以秦再雄辰州猺人為辰州刺史初隋置辰州沅陵郡今辰州府是唐復置錦州盧陽郡故城在今沅州府麻陽縣溪州及巫敘州潭陽郡貞觀中曰巫州大厯初改敘州皆西南溪洞諸蠻地也唐末蠻酋分據之各保險阻以自固時出寇鈔宋既平湖南擇蠻人為其黨所服者得秦再雄武健有奇略宋主召至汴察其可任擢為刺史使自辟吏豫以租賦再雄感恩誓以死報至州日訓土兵三千人皆能被甲渡水厯山飛塹捷如猿猱又選親校二十人分使諸蠻以傳朝廷懷徠之意莫不從風而靡各得降表以聞自是荆湘無復邊患六月宋主以其子德昭為貴州防禦使故事皇子出閣即封王宋主以德昭未冠特殺其禮秋七月宋頒刑統判大理寺竇儀所重定也八月宋置𣙜貨務朝野雜記宋制有四提轄官𣙜貨務其一也掌鹺茗番礬鈔引之政令置于京師及沿江令商旅入金帛京師執引詣沿江給茶後解鹽解池鹽也亦𣙜之九月宋攻南漢郴州克之宋潘美尹從珂秦州天水人帥兵攻南漢郴州克之得南漢內侍秦延業宋主訪其國政延業具言其主作燒煮剝剔刀山劍樹之刑或令罪人鬪虎抵象又賦斂繁重雍民入城者人輸一錢瓊州斗米稅四五錢置媚川都在今廣州府新安縣南凡𨽻三千人定其課令入海探珠所居宫殿以珠玳瑁飾之內官陳延受作諸淫巧日費數萬金宫城左右離宫數十遊幸常至月餘或旬日以豪民為課户供宴犒之費宋主驚駭曰吾當救此一方民時方謀下蜀未遑也初南漢內常侍鄧廷瓚言于南漢主曰漢承唐亂居此五十餘年幸中國多故干戈不及而漢益驕于無事今兵不識旗鼓而人主不知存亡夫天下亂久矣亂久必治請飭兵備且遣使通好于宋南漢主懵然莫以為慮及宋克郴州始懼以廷琄為招討使屯洸口南洸口在韶州府英德縣西始興大江之北今有鎮冬十一月蜀約北漢侵宋宋遣忠武節度使王全斌等伐之蜀山南節度判官張廷偉説知樞密院事王昭遠曰公素無勳棄一旦位至樞近不自建立大功何以塞時論莫若通好并門令發兵南下我自黃花子午谷注見前出兵應之使中原表裏受敵則關右之地可撫而有昭遠然其言勸蜀主遣趙彥韜興州順政人等以蠟書間行約北漢濟河同舉兵彥韜至汴潛取其書以獻宋主宋主久欲伐蜀而無詞及得書笑曰西討有名矣乃命王全斌為西川行營都部署劉光義即劉廷讓范陽人守文之孫考宋史本紀太祖伐蜀有劉光義太宗拒遼有劉廷讓又考列傳劉廷讓字光又所載伐蜀拒遼事與本紀同蓋廷讓本名光義後避太宗諱更名因即以原名為字而改義從乂史特未之詳耳薛應旗以光義廷讓為兩人殊失考崔彥進大名人副之王仁贍曹彬為都監將步騎六萬分道伐蜀且命為蜀主治第于汴水之涯凡五百餘間供帳什物備具召全斌謂曰凡克城寨只籍其器甲芻糧悉以財帛分給將士吾所欲得者其土地耳全斌及彥進等由鳯州進廷讓及彬等由歸州進蜀主聞有宋師以王昭逺為都統趙崇韜為都監韓保正為招討使李進之副帥兵拒宋命左僕射李昊餞于郊招逺酒酣攘臂言曰吾此行非止克敵取中原如反掌耳手執鐵如意指揮軍事自方諸葛亮趙崇韜廷隱子十二月宋王全斌入蜀興州唐置即武興注見前擒其招討使韓保正蜀兵大潰全斌等克萬仞燕子二寨俱在漢中府略陽縣遂取興州先鋒將史進德與保正李進等戰于三泉寨注見前敗之擒保正及進等蜀人退保大漫天寨在保寧府廣元縣東北有大小二嶺皆極高峻蜀置寨于此崔彥進張萬友與康延澤福之子分三道擊之蜀人悉其精鋭逆戰大敗而潰王昭逺等復引兵迎敵三戰皆敗昭遠渡桔柏江注見前焚梁退保劍門宋將劉光義曹彬克蜀夔州蜀寧江制置使高彥儔太原人死之初夔州有鎖江為浮梁上設敵棚三重夾江列炮具光義等行宋主示以地圖指鎖江曰我軍泝流至此慎勿以舟師爭勝當先以步騎陸行襲擊之俟其勢郤即以戰擢夾攻取之必矣及師至夔距鎖江三十里舍舟步進先奪浮梁後牽舟而上彥儔謂監軍武守謙曰北軍涉逺而來利在速戰不如堅壁以待之守謙不從獨領麾下與光義騎將張廷翰澤州陵川人戰敗走廷翰乘勝登城彥儔力戰不勝身被十餘創左右皆散彥儔奔歸府第整衣冠望西北再拜縱火自焚死後數日光義見其骨于灰燼中以禮葬之已而光義及彬克蜀萬施開忠等州峽中郡縣悉定時諸將所過多屠戮獨彬禁止之故峽路兵始終秋毫無犯宋命判太常寺和峴字晦仁凝之子定雅樂宋主以雅樂聲高近于哀思不合中和詔峴改定以王朴律準較洛陽司天臺影表石尺制律吕音始和暢唐主募人為僧唐主酷信浮屠法出禁中金錢募人為僧時都下僧及萬人皆仰給縣官唐主退朝與后服僧衣誦佛書拜跪手足成贅僧有罪命禮佛而釋之宋主聞其惑乃選少年有口辨者南渡見唐主論性命之説唐主信重謂之一佛出世由是不復以治國守邊為事乙宋乾德三年是歲宋丑滅蜀凡四國一鎮春正月宋王全斌攻蜀劍門克之獲其都統王昭逺全斌進次益光今保寧府昭化縣本劉宋益昌後唐曰益光宋開寶後改名得降卒言益光江東越大山數重有狹徑名來蘇注見前蜀人于江西置寨對岸可渡自此出劍門南二十里至青疆亦曰清店在劍州東北與官道合若行此路則劍門不足恃也乃分兵趨來蘇而自帥大衆前進跨江為浮梁以濟蜀人見之棄寨而遁遂進次青疆王昭逺聞之留其偏將守劍門自引衆退屯漢源坡在劍州東以待全斌未至漢源劍門已破昭逺股栗失次趙崇韜布陳出戰昭逺據胡床不能起全斌進擊大破之斬首萬餘級昭逺走投東川匿倉舍下悲嗟流涕目盡腫俄而宋追騎至與宗韜俱被執蜀太子元哲字遵聖將兵禦宋至綿州遁還王全斌進次魏城西魏縣今為驛在綿州東北蜀主昶降後蜀自孟知祥至昶凡二世合三十二年蜀主聞昭逺敗大懼出金帛募兵令太子元哲統之李廷圭張惠安等為之副趨劍門以禦宋師元哲素不習武廷圭惠安皆庸懦無識元哲離成都但擕姫妾樂器及伶人數十輩晨夜嬉戲不恤軍政至綿州聞已失劍門遂遁還東川所過焚廬舍倉廪而去蜀主皇駭問計于左右有老將石斌對曰宋師逺來勢不能久請聚兵固守以老之蜀主曰吾父子以豐衣美食飬士四十年及遇敵不能為我東向發一矢今若固壘何人為我效命已而全斌進次魏城蜀主命李昊草表詣全斌請降全斌受之遂入成都劉光義等亦引兵來會前蜀之亡也降表亦昊為之蜀人夜書其門曰世修降表李家宋師自發汴至受降凡六十六日得州四十五縣百九十八宋主以吕餘慶知成都府初全斌之伐蜀也屬汴梁大雪宋主設氊帷于講武殿衣紫貂裘帽以視事忽謂左右曰我被服如此體尚覺寒念西征將士銜冒霜雪何以堪處即解裘帽遣中使馳賜全斌仍諭諸將曰不能遍及也全斌拜賜感泣所向有功三月宋兩川軍亂王全斌等在蜀晝夜宴飲不恤軍務縱部下掠子女奪財物蜀人苦之曹彬屢請旋師全斌等不從既而宋主詔發蜀兵赴汴並優給裝錢全斌等擅減其數蜀兵憤怨行至綿州遂作亂劫屬邑衆至十餘萬自號興國軍獲蜀文州刺史全師雄成都人推以為帥稱興蜀大王兩川郡縣崔彥進高彥暉等為師雄所敗彥暉戰死全斌退保成都師雄勢益張宋主聞之命客省使宋史職官志使為武臣崇秩掌四方進奉及四夷朝貢賔禮之事丁德裕領兵往討之以康延澤為東川七州招安巡檢使時師雄屯新繁漢縣今屬成都府劉光義曹彬進擊大破之全斌等復敗之于灌口今成都府灌縣宋以前為灌口鎮以灌口山名師雄走死其黨據銅山注見前推謝行本為主延澤旋拔之德裕等分道招輯蜀人始定宋初置諸路轉運使自唐天寶以來藩鎮屯重兵租稅所入皆以自贍名曰留使留州其上供者甚少五代藩鎮益強率令部曲主埸務厚斂以入已而輸貢有數宋主素知其弊趙普乞命諸州度支經費外凡金帛悉送汴都無得占留每藩鎮帥缺即令文臣權知所在場務凡一路之財置轉運使掌之雖節度防禦團練觀察諸使及刺史皆不預僉書金榖之籍于是財利盡歸于上矣夏六月宋賜孟昶爵泰國公尋卒蜀主昶舉族及官屬至汴率子弟素服待罪闕下宋主御崇元殿備禮見之賜賚甚厚拜昶檢校太師兼中書令封秦國公子元哲為泰寧軍五代史職方考後梁以兖州為泰寧軍節度使從臣親屬授官有差昶尋卒宋主廢朝五日追封楚王昶母李氏本唐莊宗宫妾也至汴宋主命肩輿入宫謂之曰國母善自愛無戚戚懷鄉土異日當送母歸李氏曰妾本太原人倘得歸老并土妾之願也時宋主有北征意聞其言喜及昶卒不肯哭以酒酹于地曰汝不死社稷貪生以至今日吾所以忍死者以汝在爾今汝既死吾何用生為不食數日亦死宋主聞而傷之宋主嘗見昶寶裝溺器命撞碎之曰以七寶飾此當以何器貯食所為如是不亡何待南漢主殺其招討使鄧廷琄廷琄屯洸口以待宋師招輯亡叛訓士卒修戰備國人賴以少安有投匿名書譖廷琄將圖不軌南漢主信之遣使賜廷琄死士卒排軍門見使者訴廷琄無反狀請加考驗弗許乃相與立廟洸口祀之秋八月宋選諸道兵入補禁衛先是宋主詔殿前侍衛二司各閲所掌兵揀其驍勇者升為上軍至是命諸州長吏擇本道兵驍勇者送都下以補禁旅之闕又選強壯卒定為兵樣分送諸道召募教習俟其精練即送闕下復立更戌法分遣禁旅戍守邉城使往來道路以習勤苦均勞佚自是將不得專其兵而士卒不至于驕惰趙普之謀也宋置封樁庫宋主平荆湖西蜀收其金帛别為內庫儲之號封樁凡嵗終用度之餘皆入之以為軍旅飢饉之備宋主嘗諭近臣曰石晉割幽燕以賂契丹使一方獨限外境朕甚憫之欲俟斯庫所畜滿三百萬遣使謀于彼倘肯以地歸于我則以此酬之不然朕當散滯財募勇士以圖攻取也尋又鑿大池于京城南號講武池選精卒習戰池中宋主嘗臨觀之丙宋乾德四年是寅嵗凡四國一鎮夏五月宋罷羡餘賞格初三司請諸場院主吏有羡餘粟及萬石芻五萬束以上者賞知光化軍宋置今為縣屬襄陽府張全操上言此茍非倍取民租私減軍食何以致之乃詔自今勿復施行閏月宋求遺書冬十一月宋竇儀卒儀學問優博風度峻整及卒宋主深惜其未大用云初宋主將改元諭宰相曰年號須擇前代所未有者及蜀平蜀宫人入內宋主見其鏡背有識乾德四年鑄者召儀問之儀對曰此必蜀物蜀主王衍嘗有此號宋主大悅曰宰相須用讀書人由是益重儒者每對大臣言欲用儀為相趙普忌其剛直陶穀等又相與排之遂中輟丁宋乾德五年是卯嵗凡四國一鎮春正月宋王全斌等以罪徴還貶官有差以曹彬為宣徽南院使宋主自聞蜀兵之亂凡使者至各令陳王全斌等不法事因盡得其狀乃皆徴還以其初立功不欲屬吏但令中書問狀全斌等具伏黷貨殺降之罪于是全斌及崔彥進王仁贍皆責降曹彬劉光義以功進爵復召吕餘慶參知政事仁贍等厯詆諸將兾以自免獨曰清亷畏慎不負陛下者曹彬一人爾彬之還也槖中惟圖書衣衾又能戢下于是賞特優曹彬入謝曰諸將獲罪臣不敢奉詔宋主曰卿有荗功又不矜伐懲勸國之常典可無遜二月宋以沈義倫字順儀太康人後避太宗諱止名倫為樞密副使義倫為四川轉運使隨軍入蜀宋史職官志王師征討則置隨軍轉運使事畢即停獨居佛寺飲蔬食有以珍異獻者皆卻之及歸篋中惟書數卷而已宋主嘗問曹彬以官吏善否彬曰臣止監軍旅至于采察官吏非所職也固問之曰義倫可用宋主嘉之故有是命宋罷其殿前都指揮使韓重贇時有譖重贇私取親兵為腹心者宋主怒欲誅之趙普諫曰若重贇以讒誅人人懼罪誰敢為陛下將者宋主乃止出重贇為彰德節度使三月五星聚奎宋史天文志五星如聫珠聚于奎當魯分從鎮星晨見東方周顯德中竇儼與盧多遜河內人億之子楊徽之同為諫官儼善步星厯嘗謂徽之等曰丁卯嵗五星聚奎自此天下當太平二拾遺見之儼不與也卒如其言夏六月戊午朔日食秋九月定難節度使李彛興即彛殷卒子克睿嗣戊宋開寶元年北漢主繼元廣辰運元年是嵗凡四國一鎮春二月宋主立宋氏邠州人為后宋主元配賀氏開封人早卒建隆初册繼室王氏邠州新平人為后乾德元年殂至是立宋氏為后后左衛上將軍偓之女也三月宋覆試貢士知貢舉王祐字景叔大名莘人續編作王裕今衣宋元通鑑上進士合格者十八人陶穀于邴名在第六宋主謂左右曰聞榖不能訓子邴安得第遽命中書覆試而邴復登第因下詔曰造士之選非樹私恩世祿之家宜敦素業如聞黨與頗容竊吹文衡公器豈宜私濫自今舉人凡關食祿之家悉委中書覆試夏五月唐以韓熙載為中書侍郎熙載顯德中入朝歸國唐主景問中國大臣熙載曰趙點檢顧視非常不可測也宋主受禪景益重之欲以為相以帷簿不修而止至是拜中書侍郎六月宋以董遵誨為通逺軍後周置今慶陽府環縣是使遵誨父宗本仕漢為隨州刺史宋主微時往依焉遵誨馮藉父勢嘗侮之一日謂宋主曰每見城上有紫雲如蓋又夢登髙臺遇黑蛇約長百餘尺俄化龍飛騰東北去雷電隨之是何祥也宋主皆不對他日論兵遵誨理屈拂衣走宋主乃辭宗本去及即位遵誨被召伏地請死宋主諭之曰卿尚記曩日黑蛇紫雲之事乎遵誨再拜呼萬嵗俄而部下卒訴其不法十餘事遵誨皇恐待罪宋主曰朕方赦過賞功豈念舊惡邪遵誨母在幽州患難暌離宋主厚賞邉民購得之仍加優賜至是以夏州近邉授通遠軍使遵誨至鎮召諸族酋長諭以朝廷威德衆皆感悅後數月復來擾邉遵誨卒兵深入其境俘斬甚衆獲羊馬數萬夷落以定秋七月北漢主鈞殂養于繼恩立初世祖劉旻廟號女適薛釗生繼恩再適何氏生繼元二子俱幼孤世祖以鈞無子命飬為子鈞嘗謂郭無為曰繼恩巽軟非繼世材恐不能了我家事將奈何無為不對至是疾篤召無為付以後事繼恩既嗣位怨無為初不助己且惡其専政加守司空外示優禮內實疏之八月宋遣李繼勳將兵伐北漢宋主嘗因諜者謂漢主曰君家與周世讐宜不屈今我與爾無所間何為困此一方人也若有志中國宜下太行以決勝負漢主遣諜者報曰河東土地甲兵不足以當中國然我家世非叛者區區守此蓋懼漢氏之不血食也宋主哀其言謂諜者曰為我語鈞開爾一生路故終鈞之世不加兵至是聞其卒遣李繼勳等以禁軍伐之九月宋李繼勳敗北漢兵于銅鍋河即洞渦水出平定州壽陽縣西流至太原縣南入汾亦曰同過水魏書地形志曰水合道故曰同過進薄太原北漢主初立宋兵已入其境乃遣劉繼業本楊重貴太原人北漢世祖賜姓名馬峰太原人等領軍扼團柏谷注見前峰至銅鍋河繼勳前鋒將何繼筠擊破之斬首三千級遂奪汾河橋薄太原城下焚延夏門北漢主大懼北漢司空郭無為弒其主繼恩而立其弟繼元繼恩欲逐郭無為畏懦不能決月餘供奉官侯霸榮率十餘人挺刃入閣反扄其門時繼恩獨處喪次見之驚起繞屏環走霸榮以刃揕其胸弒之無為使人梯屋入殺霸榮繼恩立才六十餘日并人疑無為授意子霸榮亟殺之以滅口無為與羣臣議立繼恩之弟繼元參議中書事張昭敏獨曰少主非劉氏故嗣位不終今宜立宗姓以慰名望世祖嫡孫繼文久留契丹初鈞既改元遼主責其罪輒拘繫使者數輩力令繼文往請命亦被留不遣歷險阻宜迎立之可以固宗社給外援無為不從以繼元易制遂立之冬十月宋貶雷德驤字善行同州郃陽人為商州司户參軍德驤判大理寺寺之官屬與堂吏附會宰相趙普增減刑名德驤憤惋求見宋主面白其事未及引對即直詣講武殿奏辭氣俱厲并言普強市人第宅聚斂財賄衆主怒叱之曰鼎鐺尚有耳汝不聞趙普吾社稷臣乎引柱斧擊折其上齶音鄂齒上下肉也二齒命左右曵出之詔處以極刑既而怒解止以闌入之罪黜之十一月遼敕北漢宋李繼勳引還北漢遂入宋晉綘州北漢主遣使告即位于遼且乞師遼主遣耶律特烈字尼魯衮六院部郎君努古濟之後將諸道兵救之宋主亦遣使賫詔諭北漢主令降約以平盧節度使授之又别賜郭無為詔許以邢州節度無為得詔色動勸北漢主納欵北漢主不從會李繼勳等聞遼兵將至皆引歸北漢因大掠宋晉絳二州按特烈舊作撻烈尼嚕衮舊作涅魯衮努古濟舊作裊古直今並改正宋主享太廟翌日郊初宋主入太廟見其所陳籩豆簠簋問曰此何物也左右以禮器對宋主曰吾祖宗寧識此亟命撤去進常膳如平生既而曰古禮不可廢也命復設之判太常寺和峴請遵唐故事每室加常食一牙盤從之自是三年而郊郊必先享太廟禮畢加恩肆赦以為常制北漢主劉繼元弒其母郭氏繼元妻假氏常以小過為孝和鈞諡孝和后郭氏所責既而病卒繼元疑后殺之后方縗服哭孝和帝于柩前繼元遣其嬖臣范超執而縊殺之宫中嬪御遭罹逼辱無復嫌間世祖十子鎬錡錫最有賢行繼元聼羣小之譖幽囚之未踰年皆死唐建澄心堂于內苑初元宗創清輝殿于北苑命徐逰知誨子與張洎初字師暗改字偕仁徐州全椒人為學士入直其中至是唐主復于殿北建澄心堂為朝廷內地遊與其兄遼居中用事即以從子元柄為員外郎凡機事密畫中旨皆自澄心堂出元楀宣行之由是中書樞密俱同散地唐主留意聲色先納周宗女為后后通書史尤善音律霓裳羽衣曲久絶不傳后按殘譜盡得其聲調徐逰等從旁稱美有狎容風后有妹姿容絶麗以姻戚住來宫中得幸于唐主唐主製小令艷詞頗傳干外后卒竟册立之被寵逾子故后己宋開寶二年是已嵗凡四國一鎮春二月遼弒其主烏嚕舊作兀律今改正于懷州遼置在京巴林部西北廢慶州界金史地理志慶州有遼懷州城中有遼行宫遼主耽酒好畋嗜殺不已賞以虞人偵鵝失期加炮烙鐵梳之刑又以獲鴨甚歡除鷹坊刺靣之令刑政紊亂國人怨之至是畋于懷州獲熊歡飲醉還行宫夜分近侍霄格盥人華格庖人錫衮等弒之按霄格舊作小哥華格舊作花哥錫衮舊作辛古今並改正宋主自將擊北漢三月圍太原李繼勳等既還宋主謀再舉以問魏仁浦曰朕欲親征太原何如仁浦曰欲速則不逹惟陛下重之宋主不聼命繼勳等將兵先赴太原以光義為東京留守自將發汴三月至太原築長連城圍之立寨于城四靣繼勳軍于南趙贊軍于西曹彬軍于北黨進朔州馬邑人軍于東北漢劉繼業等乘晦突門犯東西寨戰敗而遁宋主又命壅汾晉二水以灌城漢人大恐郭無為復欲北漢主出降漢主不從一日因宴羣臣無為痛哭于庭曰奈何以空城抗宋百萬之師乎引佩刀欲自殺冀動衆心漢主遽降階執其手引之升坐乃止遼耶律賢字賢寧兀欲次子立賢聞遼主被弒帥甲騎千人馳赴懷州即位改元保寧號烏嚕曰穆宗以蕭守興為尚書令納其女燕燕為后賢嬰風疾國事皆后決之考遼史景宗后蕭氏諱綽小字燕燕北府宰相思溫女思溫小字寅古宰相敵魯之族弟忽沒里之子與續編所載不同夏四月遼復救北漢宋韓重贇等擊敗之初宋主度遼人必由鎮定救太原使重贇倍道兼行赴之又聞其分道一自石嶺關在太原府城東北與欣州接界入召何繼筠逆擊授以方略繼筠遇遼兵于陽曲大敗之斬首千餘級重贇亦先陳于居山在定州曲陽縣東亦曰嘉禾山遼兵自定州西入見旗幟大駭欲遁重贇急擊大破之擒其首領三十人宋主命以所獲遼俘示于城下城中喪氣憲州判官史昭文嵐州刺史趙文度各以城降宋閠五月宋主引還太原圍久不下宋將石漢卿等戰死北漢兵亦履敗遼復遣南大王者將兵援北漢宋東西班都指揮使李懷忠涿州范陽人曰敵勢已困若選徑兵急攻破在旦夕都虞侯趙廷翰請先登宋主壯之俾率衆攻城戰不利懷忠中流矢幾死會暑雨軍士多疾太常博士李光贊上書請班師宋主以問趙普普亦以為然乃分兵屯鎮潞徙北漢民萬餘户于山東河南而還北漢主籍宋所棄軍儲得粟三十萬茶絹各數萬喪敗之餘賴此少濟北漢郭無為伏誅太原之圍南城為汾水所陷郭無為謀出降因請自將夜擊宋北漢主信之選精騎千人付無為自登七夏門送之無為行至北橋值風雨晦冥而止至是閹人衛德貴告其事且言無為獻地之謀蹤迹屢露反狀明白不可赦北漢主乃殺之以徇冬十月宋罷王彥超等節度使鳯翔節度使王彥超及諸藩鎮入朝宋主宴于後苑酒酣從容謂之曰卿等皆國家宿舊久臨劇鎮王事鞅掌非朕所以優賢之意也彥超諭意即前奏曰臣本無勳勞久冒榮寵今已衰朽乞骸骨歸邱園臣之願也安逺職方考後唐以安州為安逺軍節度使武行德護國注見前節度使郭從義定國寰宇記宋以同州為定國軍節度使白重贊保大注見前節度使楊廷璋競自陳攻戰閥閲及厯履艱苦宋主曰此異代事何足論明日皆罷鎮奉朝請庚宋開寶三年是午嵗凡四國一鎮春正月遼遣北漢使者劉繼文等歸先是遼所留北漢使者凡三十六人至是遼主盡厚禮而遣之仍移書北漢主以劉繼文同平章事繼文魁梧有氣局沉毅寡言久留于遼遼主甚敬禮之及歸秉國政左右害其寵多譖毁之北漢主乃出為代州刺史宋徴處士王昭素酸棗人為國子博士昭素有學行宋主召見便殿年已七十餘席講周易乾卦至九五飛龍在天昭素斂容曰此爻正當陛下今日之事援引證據因示諷諌微旨宋主嘉之問以治世飬身之術對曰治世莫若愛民飬身莫若寡欲宋主愛其言書于屏几昭素以衰老求歸鄉人服其德凡爭訟者多就決之夏四月辛未朔日食秋七月宋省州縣增其俸詔曰吏員猥多難以求治俸祿鮮薄未可責亷與其冗員而重費不若省官而益俸諸州縣宜以户口為率差減其員舊俸月增給五千九月宋詔修前代帝王陵盜發者宋遣潘美將兵伐南漢南漢侵宋道州刺史王繼勳上言劉鋹殘暴數出冦邉請南伐宋主未欲遽加兵乃令南唐主為書諭鋹使稱臣歸所侵湖南舊地鋹囚唐使驛書答唐主言甚不遜唐主上其書宋乃以潘美為桂州道行營都部署尹從珂為副以伐之時南漢舊將多以讒搆誅死宗室剪滅殆盡掌兵者惟宦官數輩自南漢主晟以來耽于遊宴城壁濠隍多飾為宫館池沼樓艦皆毁兵器又腐及聞有宋師內外震恐乃遣龔澄樞馳往賀州畫守禦䇿澄樞聞宋前鋒已至芳林鎮名在平樂府賀縣東北遁還宋師遂圍賀州南漢主遣其驍將伍彥柔以兵援賀潘美以竒兵擒彥柔斬之美聞彥柔至潛以竒兵伏南鄉岸彥柔乘夜艤舟岸側遲明挾彈登岸踞胡床指揮宋伏兵猝起彥柔軍大亂遂擒之梟其首示城中南鄉舊鎮名今曰信都在賀縣南翼日城遂破先是南漢大臣皆請起故將潘崇徹咸寧人以都統罷職南漢主不從及聞賀州陷乃今崇徹領兵三萬屯賀江注見前會美徑趨昭州崇徹但擁衆自保十月美次昭州克之又拔桂連二州南漢主謂左右曰昭桂連賀本屬湖南今北師取之足矣吾知不復南也乘勝遂攻韶州南漢主以李承渥為都統將兵十餘萬陳于蓮花峰下在韶州府曲江縣南南漢主教象為陳每象載十數人皆執兵仗軍容甚壯美集徑弩射之象奔踶乘者皆墜反踐承渥軍承渥大敗僅以身免韶州遂陷韶嶺南北門也既陷南漢主鋹窮蹙不知所為顧諸將無可使者宮媪梁鸞真薦其飬子郭崇嶽可用鋹以為招討使與大將植廷曉氏族略南越有植姓統軍六萬屯馬徑地名在廣州府南海縣西以禦宋師辛宋開寶四年是歲宋滅南漢未唐改號江南凡三國一鎮春二月宋潘美大破南漢兵于馬徑遂克廣州南漢主鋹降南漢自劉隱據廣州至年鋹亡凡五主合六十五潘美克英雄二州皆南漢置英州今韶州府英德縣是雄州今南雄府是潘崇徹以其衆降美進次隴頭水名在英德縣南其地險隘兩山夾峙水多激石南漢主遣使請和且求緩師美不許進兵馬徑去廣城十里寨于雙女山一名鳯山在南海縣西下南漢主懼遣其左僕射蕭㴶奉表詣軍門乞降美即令人送㴶赴汴宋師遂頓城外南漢主將遣其弟保興率百官出迎郭崇嶽止之乃復為扞禦之計遣保興率國內兵拒戰崇嶽無謀勇惟日禱鬼神為事既而宋師濟水植廷曉力戰不勝死于陳崇嶽奔還其柵美謂諸將曰彼編竹木為柵若篝火焚之必擾亂因而夾擊之此萬全之䇿也遂分遣丁夫人持二炬間道造其柵會夜大風萬炬俱發煙埃坌起南漢軍大敗崇嶽死于亂兵龔澄樞與李托謀縱火焚府庫宫殿一夕皆盡明日鋹出降美入城俘其宗室官屬保興逃于民家亦獲之悉送汴有宦者百餘輩盛服請見美曰是椓人多矣吾奉詔伐罪正為此等悉斬之凡得州六十縣二百四十宋加潘美山南東道節度使夏六月宋誅南漢宦者龔澄樞李托賜劉鋹爵恩赦候鋹至汴宋主遣吕餘慶問鋹反覆及焚府庫之罪鋹歸罪龔澄樞李托明日有司以帛繫鋹及其官僚獻于廟社宋主御明德門遣刑部尚書盧多遜宣詔責鋹鋹對曰鋹年十六僭位澄樞等皆先臣舊人每事臣不得専在國時臣是臣下澄樞是國主遂伏地待罪宋主命大理寺卿高繼申引澄樞托斬于千秋門外釋鋹罪賜襲衣冠𢃄器幣鞍馬授檢校太保右千牛衛上將軍封恩赦侯鋹體質豐碩眉目俱疏有口辨性巧絶其寶貨燔藝之餘尚存美珠四十六甕嘗以珠結鞍勒為戲龍之狀極其精妙以獻宋主謂左右曰鋹好工巧智以性成儻能移于治國豈至滅亡哉鋹在國時多置鴆臣下銀一日從宋主幸講武池從官未集鋹先至賜以巵酒疑有毒泣曰臣承祖父基業違拒朝廷勞王師致討罪固當誅陛下既待臣以不死願為大梁布衣觀太平之盛未敢飲此酒宋主笑曰朕推赤心于人腹中安有此事命取鋹酒自飲别酌以賜鋹鋹大慙謝宋御史中丞劉溫叟卒溫叟為中丞十二年屢求解職宋主難其代不許至是卒溫叟重厚清介好古執禮一日晚過明德門西關前宋主方與中黃門數人登樓溫叟知之令傳呼依常而過翼日請對且言人主非時登樓則下必希望恩賞臣所以呵道而過欲示衆以陛下非時不登樓也宋主善之冬十月癸亥朔日食十一月唐貶國號曰江南遣使朝宋唐主事宋甚謹每聞宋有嘉慶吉凶之事必遣人貢獻弔賀外示畏服內實修備及南漢亡懼甚使其弟從善上表于宋乞去國號改印文為江南國主且請賜詔呼名宋主許之先是唐主以銀五萬兩遣趙普普以白宋主宋主曰此不可不受但以書答謝少賂其使者可也普辭宋主曰大國之體不可自為削弱當使之弗測及從善來朝常賜外密賚白金如遺普之數唐君臣皆震駭服宋主之偉度河決澶州東匯于鄆濮壞民田廬宋主怒官吏不即以聞通判姚恕坐棄市壬宋開寶五年是申嵗凡三國一鎮春二月江南主殺其南都留守林仁肇初仁肇密陳淮南戍兵少宋前已滅蜀今又取嶺南道逺師疲願假臣兵數萬自夀春徑渡復江北舊境彼縱來援臣據淮禦之勢不能敵兵起日請以臣叛聞于北朝事成國享其利敗則族臣家明陛下無二心江南主不聽宋忌仁肇威名賂其侍者竊取仁肇畫像懸别室引江南使者觀之問何人使者曰林仁肇也曰仁肇將來降先持此為信又指空館曰將以此賜仁肇使者歸白江南主江南主不知其間鴆殺仁肇又沿江巡檢盧綘募亡命習水戰屢被吳越兵于海門亦嘗説江南主曰吳越仇讐也他日必為北朝犄角臣請詐以宣歙叛陛下聲言討臣且乞兵吳越至則躡而攻之其國可取江南主亦不用卿盧綘字晉宜春人夏五月大雨河決宋主出宫人大雨河決濮陽宋主命頴州團練使曹翰往塞之因謂曰朕信宿以來焚香告天若天災流行願在朕躬勿施于民翰拜曰宋景公一發善言災星為之退舍今陛下憂民如此必不能為災也宋主又謂宰相曰霖雨不止朕日夜罔知所措得非時政有闕邪趙普對曰陛下憂勤庶政苦雨為災乃是臣等失職宋主曰朕恐掖廷幽閉者衆昨令編籍後宫凡三百八十餘人因諭願歸其家者具以情言得百名悉厚賜遣之普等皆頓首服秋九月丁巳朔日食宋以辛仲甫字之翰汾州孝義人為四川兵馬都監宋主問趙普以文臣有武幹者普以左補闕辛仲甫對宋主遂用之因謂普曰五代方鎮殘虐民受其禍朕今用儒臣幹事者百餘人分治大藩縱皆貪濁亦未及武臣之一也癸宋開寶六年是酉嵗凡三國一鎮春三月鄭王郭宗訓卒宋人葬之諡曰周恭帝鄭王卒宋主素服發喪輟朝十日諡曰周恭帝還葬慶陵世宗陵五代史注在鄭州管城縣之側號曰順陵宋初殿試貢士翰林學士李昉字明遠深州饒陽人知貢舉有進士徐士亷訴昉用情舍取宋主乃擇終埸下第并已舉者親御講武殿給紙筆别試得進士諸科百二十七人進士二十六人五經四人開元禮七人三禮三十八人三傳二十六人三史三人學究十八人明法五人共百二十七人續編作百二十五人誤今改正皆賜及第且賜錢二十萬以張宴會責昉為太常少卿殿試遂為永制夏五月宋行開寶通禮初宋主命李昉劉溫叟重定開元禮附以國朝制度損益為書二百卷號通禮至是行之交州丁璉入貢于宋宋封璉為交址郡王梁末交州土豪曲承美乘中國之亂據有十二州之地唐書地理志安南都護府領交陸峰愛歡長福祿湯芝武峩演武安十二州南漢遣將李知順攻承美執之置交址節度使乾德初節度使吳昌文死其參謀吳處坪等爭立攝歡州刺史丁部領擊敗處坪等自領交州帥號大勝王署其子璉為節度使尋遜璉位南漢既亡璉入貢于宋宋授璉靜海軍節度使加封爵考宋史交址傳開寶六年丁璉內附授檢校太師充靜海軍節度使安南都護八年璉復修貢封交址郡王沈括夢溪筆談亦以璉封王在開寶八年為安南封王之始與續編所載不同秋八月宋趙普免普獨相十年為政頗專嘗以私怨誣馮瓚字禮臣齊州人李美李楫以贓論死瓚流沙門島十年不得召廷臣多忌之宋主嘗幸其第會吳越遣使致書于晉及海物十瓶置于廡下未及發而宋主至倉卒不暇屏宋主顧問何物普以實對宋主曰海物必佳即命啓之皆瓜子金也普皇恐謝臣未發書實不知宋主曰第受之彼謂國家事皆由汝書生爾時官禁私販秦隴大木普遣親吏詣市屋材聨巨筏至汴治第吏因之竊貨大木冒稱普市貨鬻都下三司使趙玭以聞宋主大怒即欲逐普王溥力為救解得止盧多遜與普不協數因入對短普宋主滋不悅初雷德驤之貶商州也知州奚嶼希普意奏德驤怨望坐削籍流靈武其子有鄰意普害之擊登聞鼓訴中書不法事宋主怒悉下御史獄鞫實始疑普詔吕餘慶薛居正與普更知印押班奏事以分其權普不自安求罷政遂出為河陽三城節度使以有鄰為祕書省正字召德驤為祕書丞普至河陽上表自訴曰外人謂臣輕議皇弟開封尹光義為開封尹皇弟忠孝全德豈有間然矧昭憲皇太后大漸之際臣實預聞顧命知臣者君願賜昭鑒宋主手封其表藏之金匱宋主封其弟光義為晉王班宰相上又以弟光美注見前兼侍中子德昭同平章事冬十二月宋起復盧多遜參知政事多遜敏給任數謀多竒中以翰林學士判史館宋主好讀書每取書館中多遜預戒吏令必白已知所取書因通夕閲覽及召對宋主問書中事應答無滯同列皆服拜參知政事未幾以喪父去位詔起復之多遜父億有高識惡其子所為曰趙普元勳也而小子毁之我得早死不見其敗幸也北漢主殺其大內都點檢劉繼欽世祖旻諸孫北漢主立親舊多所誅放繼欽謝病黜居交城隋縣今屬太原府遣人殺之北漢主性殘忍凡臣下有忤意必族其家自宋主親征及遣將攻伐因之殺傷不可勝紀大將張崇訓鄭進衛儔故相張昭敏樞密使高仲曦等先後俱以讒見殺甲宋開寶七年是戍嵗凡三國一鎮春二月庚辰朔日食夏五月江南遣使如宋江南主天性友愛弟從善使宋被留江南主悲戀不已嵗時宴會皆罷作登高文以見意至是遣常州刺史陸昭符金陵人入貢奉手疏求從善歸國宋主不許秋九月宋遣曹彬將兵伐江南宋主欲伐江南而無名遣知制誥李穆字孟雍陽武人諭江南主入朝江南主將從之其門下侍郎陳喬曰臣與陛下俱受元宗顧命今往必見留其若社稷何臣雖死無以見元宗于九泉矣內史舍人張洎亦勸其主無入朝江南主遂稱疾固辭且言謹事大朝冀全濟也今若此有死而已穆曰朝與否國主自處之然朝廷甲兵精鋭物力富雄恐不易當也宜熟思之無貽後悔江南主不從而遣使求封册宋主不許命梁逈博州聊城人復使諷之入朝江南主不答逈還宋主乃命曹彬為西南路行營都部署潘美為都監曹翰為先鋒將兵十萬以伐之自王全斌平蜀多殺降卒宋主每恨之至是彬等入辭宋主誡彬曰江南之事一以委卿切勿暴掠生民務廣威信使自歸順不煩急擊也又曰城陷之日慎無殺戮設若困鬬則李煜一門不可加害且以劍授彬曰副將而下不用命者斬之潘美等皆失色彬自荆南發戰艦東下江南屯戍皆謂每嵗宋所遣巡兵但閉壁自守奉牛酒犒師尋覺異于他日池州將戈彥棄城走彬入池州敗江南兵于銅陵南唐縣今屬池州府進次采石磯注見前冬十月宋加吳越王俶升州東南行營招撫制置使先是俶使判官黃彛簡字明舉福州人入貢于宋宋主謂之曰江南強倔不朝我將討之元帥當助我無惑于人言尋密告以師期至是加俶行營招撫制置使十一月宋潘美渡江江南將鄭彥華福州人等拒戰敗走初池州人樊若水字仲師後更名知古舉進士不第因謀歸宋乃漁釣采石江上乘小舟載絲繩其中維南岸疾棹抵北岸凡十數往返得江之廣狹因詣汴上書言江南可取狀請造浮梁以濟師宋主然之以為右贊善大夫遣使往荆湖造黃黑龍船千艘又以大艦載巨竹絙自荆渚而下或謂江濶水深古未有浮梁而濟者乃先試于石牌口今曰石牌市在安慶府懷寧縣西與池州府分界移置采石三日而成不差尺寸潘美因帥步兵渡江若履平地時江南久不用兵老將皆沒主兵者多新進以功名自負聞兵興踴躍言利害者日數十人江南主以鎮海節度使同平章事鄭彥華督水軍萬人都虞候杜真領步軍萬人同逆宋師將行江南主誡之曰兩軍水陸相濟無不捷矣彥華以戰艦鳴鼓泝流而上急趨浮梁潘美麾兵擊敗之真以所部接戰彥華不能救亦敗金陵始戒嚴下令去開寶之號益募民為兵民以財粟獻者官爵之宋始修日厯史館修撰扈蒙字日用幽州安次人請修日厯宋主從之命宰輔日録時政送史館仍以盧多遜專其職御批厯代通鑑輯覽卷七十一

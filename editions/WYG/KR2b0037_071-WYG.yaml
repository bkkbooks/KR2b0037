front:
  text: 欽定四庫全書御批歴代通鑑輯覽巻七十二宋起太祖建隆元年庚申至帝昺祥興二年己夘凡十八帝十三世共三百二十年太祖皇帝
  hash: sha256:38dbcb83062e2942e82f522ad3fd2e862bb1476b083d8be3b7f6705714358b20

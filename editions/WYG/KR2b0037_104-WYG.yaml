front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷一百五明景皇帝丁丑景泰八年英宗皇帝天順元年天考是年正月壬午英宗復辟丙戌改元順今依朱子綱目書唐中宗及分注睿宗例太書景泰八年孟以天順元年分注其下春正月羣臣請立太子不許

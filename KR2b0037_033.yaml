  text: 欽定四庫全書御批厯代通鑑輯覽卷三十四晉列宗孝武皇帝庚辰太元五年春二月秦作教武堂
  hash: sha256:002fbca9d0a0e55cbdecd8c8f89ab47c8ce336d38cc332c9ae691561ed598427
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_033-1a, image: WYG0336/WYG0336-0197a.png}
body:
  text: 秦作教武堂于渭城注見前命太學生明隂陽兵法者教授諸將祕書監朱彤諫曰陛下四海之地什得其八宜稍偃武修文乃更始立學舍教人戰鬭之術非所以致太平也且諸將百戰之餘何患不習于兵而更使受教于書生非所以疆其志氣也此無益于實而有損于名堅乃止夏四月以謝安為衛將軍與桓沖並開府儀同三司朝廷以秦兵之退為謝安桓沖之功故有是命六月秦以苻融為中書監都督諸軍録尚書事苻丕為冀州牧苻暉為豫州牧秦王堅以諸氐種類繁滋分三原注見前九嵕山名在西安府醴泉縣東北武都汧雍注俱見前氐十五萬户使諸宗親領之散居方鎮如古諸侯世領其種類如諸侯世封以其子長樂公丕鎮鄴平原公暉鎮洛陽石越梁讜毛興王騰等皆為諸州刺史堅送丕至灞上丕所領氐三千户别其父兄皆慟哭哀感路人祕書侍郎趙整因侍宴援琴而歌曰阿得脂阿得脂伯勞舅父是仇綏尾長翼短不能飛逺徙種人留鮮卑一旦緩急當語誰堅笑不納整宦官也博文疆記能屬文好直言面諫慕容垂夫人得幸于堅堅與之同輦遊于後庭整歌曰不見雀來入鸞室但見浮雲蔽白日堅改容謝之命夫人下輦堅與羣臣飲以極醉為限整作酒德之歌曰地列酒泉天垂酒旗杜康妙識儀狄先知紂喪殷邦桀傾夏國由此言之前危後則堅大悅自是宴羣臣禮飲而已雅趙整略陽清水人後出家事佛更名道整伯勞爾曰鵙伯勞仇綏未詳酒旗通鑑作池胡三省曰當從旗天文志軒轅右角南二星曰酒旗杜康古之造酒者儀狄注見前秋九月皇后王氏崩冬十一月葬定皇后辛巳六年春正月立佛精舍于殿內帝初奉佛法立精舍釋迦譜息心所棲曰精舍于殿內引諸沙門居之左丞王雅字茂逹肅曽孫諫不從夏六月庚子朔日食冬十一月秦寇竟陵桓沖擊破之遂拔管城在安陸府鍾祥縣敖水北獲其將閻振吳仲振仲寇竟陵沖遣太守桓石虔豁之子參軍桓石民石虔弟帥衆拒擊大破之振仲退保管城石虔進攻拔之獲振仲俘斬萬七千有竒壬午七年春三月秦司農苻陽堅兄法之子侍郎王皮猛之子尚書郎周虓謀反事覺徙邊秦東海公陽及王皮周虓謀反事覺收下廷尉秦王堅問其反狀陽曰臣父哀公死不以罪法死事見前臣為父復仇耳堅泣曰哀公之死事不在朕皮曰臣父丞相有佐命之勳而臣不免貧賤欲圖富貴耳堅曰丞相臨終託卿以十具牛為治田之資未嘗為卿求官知子莫若父何其明也虓曰世荷晉恩生為晉臣死為晉鬼復何問乎先是虓屢謀反左右請殺之堅曰孟威烈士秉志如此豈憚死乎殺之適足成其名耳皆赦不誅徙陽高昌即漢車師前部之高昌壁涼置郡秦因之今為土魯畨地皮虓朔方之北秋九月秦遣將軍吕光字世明婆樓之子將兵擊西域車師鄯善入朝于秦請為鄉導以伐西域之不服者因如漢法置都護以統理之秦王堅以吕光為都督總兵十萬以伐西域陽平公融諫曰西域荒逺得其民不可使得其地不可食漢武征之得不補失臣竊惜之不聽光行越流沙焉耆諸國皆降惟龜兹王帛純固守光進攻大破之帛純出走光撫寧西域恩威甚著逺方諸國皆來歸附冬十月秦會羣臣于太極殿秦王堅會羣臣于太極殿議曰今四方略定惟東南一隅未霑王化計吾士卒可得九十餘萬欲自將討之何如左僕射權翼曰晉雖微弱未有大惡謝安桓沖皆江表偉人君臣輯睦未可圖也太子左衛率石越曰今嵗鎮二星名注見前守斗自南斗十二度至須女七度為星紀吳越分野福德嵗星所在其國有福故曰福德在吳伐之必有天殃且彼據長江之險民為之用殆未可伐也堅曰天道幽逺未易可知以吾之衆投鞭于江足斷其流又何險之足恃乎于是羣臣各言利害久之不決堅曰此所謂築室道旁無時可成吾當內斷于心耳羣臣皆出獨留陽平公融問之對曰今伐晉有三難天道不順晉國無釁找數戰兵疲民有畏敵之心羣臣言晉不可伐者皆忠臣也願陛下聽之堅作色曰汝亦如此吾復何望融泣曰晉未可滅昭然甚明且臣之所憂不止于此陛下寵育鮮卑羌羯布滿畿甸太子獨與弱卒留守京師臣懼變生肘腋不可悔也臣之頑愚誠不足采王景略一時英傑陛下常比之諸葛武侯獨不記其臨沒之言乎堅不聽太子宏曰今嵗在吳分又晉君無罪若大舉不捷恐威名外挫財力內竭耳堅曰昔吾滅燕亦犯嵗而捷秦滅六國豈皆暴虐乎冠軍慕容垂獨言于堅曰陛下斷自聖心足矣晉武平吳所仗者張杜二三臣而已若從衆言豈有混一之功乎堅大悅曰與吾共定天下者獨卿而已堅素信重沙門道安羣臣使乘間進言堅與遊東苑曰朕將與公南遊吳越泛長江臨滄海不亦樂乎對曰陛下應天御世居中土而制四維自足以比隆堯舜何必櫛風沐雨經略遐方堅不聽所幸張夫人亦諫曰曰軍旅之事非婦人所當預堅幼子詵最有寵亦諫堅曰天下大事孺子安知秦大熟先是五月秦幽州蝗秦王堅命散騎常侍劉蘭彭城人發民撲除之不能滅有司請徴蘭下廷尉秦王曰災降自天非人力所能除此由朕之失政蘭何罪乎至是嵗大熟上田畝收七十石下者三十石蝗不出幽州之境不食麻豆上田畝收百石下者五十石胡氏三省曰物反常為妖蝗之為災尚已蝗生而不食五穀妖之大者也農夫力穡有秋自古以來無畝收百石七十石之理即五十石三十石亦未之聞也使其有之豈非反常之大者乎使其無之則州縣相與誣飾以罔上亦不祥之大者也秦亡宜矣癸未八年夏五月桓沖帥師伐秦拔築陽漢縣隋省故城在今襄陽府榖城縣先是沖遣將軍朱綽擊襄陽掠六百餘户而還至是沖帥師十萬復攻襄陽别將攻築陽拔之秦遣慕容垂來救進臨沔水夜命軍士人持十炬繫于樹枝光照數十里沖懼退還上明秋八月秦王堅大舉入寇詔征討都督謝石字石奴萬之弟冠軍將軍謝元等帥師拒之秦王堅下詔大舉民每十丁遣一兵其良家子年二十以下有材勇者皆拜為羽林郎良家子至者三萬餘騎拜趙盛之為少年都統是時秦臣皆不欲堅行獨慕容垂姚萇及良家子勸之陽平公融諫曰垂萇我之仇讐良家少年皆富饒子弟不間軍旅何可從也堅不聽八月遣融督張蚝慕容垂等步騎二十五萬為前鋒以姚萇為龍驤將軍督益涼州諸軍堅謂萇曰朕昔以龍驤建業未嘗輕以授人卿其勉之竇衝曰王者無戲言此不祥之徵也堅默然慕容紹言于垂曰主上驕矜已甚叔父建中興之業在此行也堅遂發長安戎卒六十餘萬騎二十七萬九月至項城涼州兵始達咸陽蜀漢兵皆順流而下幽冀兵至于彭城東西數千里水陸並進運漕萬艘融等兵先至潁口穎水入淮之口在今江南潁川府潁上縣東詔以謝石為征討大都督謝元為前鋒都督與將軍謝琰字瑗度安之子桓伊胡彬等督衆八萬拒之時都下震恐元入問計于謝安安夷然答曰已别有旨既而寂然遂命駕出遊山墅親朋畢集與元圍碁别墅安碁常劣于元是日元懼便為敵手而又不勝安遂遊陟至夜乃還桓沖深以根本為憂遣精騎三千入援安固却之曰朝廷處分已定兵甲無闕宜留以防西藩沖歎曰安石有廟堂之量不間將略今大敵垂至方遊談不暇遣諸不經事少年拒之衆又寡弱天下事已可知吾其左祍矣以琅邪王道子録尚書六條事冬十一月謝石謝元等大破秦兵于肥水注見前殺其大將苻融秦王堅走還長安秦陽平公融等攻夀陽即夀春克之胡彬退保硤石山名在鳳陽府夀州西北水經注淮水北徑山硤中謂之硤石融進攻之秦將梁成等屯于洛澗在鳳陽府定逺縣西下流入淮謂之洛口柵淮以遏東兵謝石謝元等憚不敢進彬糧盡潛遣使告石等曰今賊盛糧盡恐不復見大軍秦人獲之送于融融使人白秦王堅曰賊少易禽但恐逃去宜速赴之堅乃留大軍于項城引輕騎八千兼道就融遣朱序來説石等不如速降序私謂石等曰若秦衆盡至誠難與為敵今乘諸軍未集宜速擊之若敗其前鋒則彼已奪氣可遂破也十一月元遣廣陵相劉牢之帥精騎五千趨洛澗梁成阻澗為陳以待之牢之直前渡水擊成大破之斬成分兵斷其歸津秦步騎崩潰赴淮死者萬五千人于是石等水陸繼進堅與融登夀陽城望之見晉兵部陳嚴整又望見八公山上草木皆以為晉兵顧謂融曰此亦勍敵何謂弱也憮然始有懼色八公山在夀州東北漢時有八公詣淮南王安同登此故名秦兵逼肥水而陳元使謂融曰君懸軍深入而置陳逼水此乃持久之計非欲速戰者也若移陳小却使我兵得渡以決勝負不亦善乎秦諸將皆曰我衆彼寡不如遏之使不得上可以萬全堅曰但使半渡我以鐡騎蹙而殺之蔑不勝矣融亦以為然遂麾兵使却秦兵遂退不可復止元等引兵渡水擊之融騎而略陳欲以止退者馬倒為晉兵所殺秦兵遂潰元等乘勝追擊至于青岡在夀州西北寰宇記岡高一百步秦兵大敗自相蹈藉死者蔽野塞川其走者聞風聲鶴唳皆以為晉兵且至晝夜不敢息草行露宿重以飢凍死者什七八初秦兵小却朱序在陳後大呼曰秦兵敗矣衆遂大奔序因與張天錫皆來奔獲堅所乘雲母車及儀服器械不可勝計遂取夀陽謝安得驛書知秦兵已敗方與客圍棊攝書置牀上了無喜色圍棊如故客問之徐答曰小兒輩遂已破賊既罷還內過户限不覺屐齒之折堅中流矢走至淮北謂張夫人曰吾今復何面目治天下乎澘然流涕是時惟慕容垂所將三萬人獨全堅以千餘騎赴之時垂世子寶言于垂曰此時不可失願不以意氣微恩忘社稷之重垂曰彼以赤心投我若之何害之天苟棄之何患不亡不若保護其危以報德徐俟其釁而圖之既不負宿心且可以義取天下慕容德曰此為報仇非負宿心也垂曰吾昔為太傅所不容置身無所秦王以國士遇我後為王猛所賣秦王獨能明之此恩何可忘也若氐運必窮吾當懷集關東以復先業耳垂悉以兵授堅堅收集離散比至洛陽衆十餘萬垂子農復謂垂曰尊不迫人于險其義聲可以感動天下夫取果于未熟與自落不過晚旬日之間然其難易美惡相去逺矣垂善其言行至澠池垂言于堅曰北鄙聞王師不利輕相煽動臣請奉詔書以鎮慰之堅許之權翼諫曰垂勇略過人世豪東夏譬如養鷹飢之則附人每聞風飊起常有凌霄之志正宜謹其絛籠豈可解縱任其所欲哉堅曰卿言是也然朕已許之匹夫猶不食言况萬乘乎若天命有廢興固非智力所能移也翼曰陛下重小信而輕社稷臣見其往而不返關東之亂自此始矣堅不聽翼密遣壯士邀垂于河橋垂疑之詭道而去堅至長安哭陽平公融而後入以謝石為尚書令進謝元號前將軍固讓不受石等歸建康得秦樂工能習舊聲于是宗廟始備金石之樂以王國寶為尚書郎謝安壻王國寶坦之之子也安惡具為人每抑而不用由是怨安國寶從妹為會稽王道子妃帝與道子皆嗜酒狎昵國寶乃譖安于道子使離間之安功名既盛而險詖求進之徒多毁短安帝稍疏忌之秦將軍乞伏國仁隴西鮮卑其先有紇干者以雄勇為諸部統主號乞伏可汗傳至祐鄰其衆漸盛即國仁五世祖也叛據隴右初國仁之父司繁為秦將王統所破降秦秦以為南單于留之長安已復使討叛胡遂鎮勇士川本漢勇士縣晉廢故城在今蘭州府金縣司繁卒國仁嗣為秦前將軍從秦王堅入寇其叔父步頽聞秦師敗率隴西以叛秦使國仁討之國仁遂與步頽合衆至十萬據隴右丁零北狄種名注見前翟斌起兵攻洛陽秦使慕容垂討之垂叛秦與斌合慕容垂至安陽修好于長樂公丕丕館垂于鄴西垂潛與燕故臣謀復燕祚會丁零翟斌燕于丁零種落居中山苻堅滅燕徙之新安斌仕秦為衛軍中郎叛秦謀攻洛陽秦王堅驛書使垂討之石越言于丕曰垂有恢復舊業之志今復資之以兵此為虎傅翼也丕曰垂在此常恐為肘腋之變今逺之于外不猶愈乎乃以羸兵敝鎧給之又遣苻飛龍帥氐騎一千為之副密戒飛龍曰垂為三軍之帥卿為謀垂之將行矣勉之垂請入鄴城拜廟丕勿許乃潛服而入亭吏禁之垂怒斬吏燒亭而去石越謂丕曰垂反形已露矣可因此除之丕曰淮南之敗垂侍衛乘輿此功不可忘也越退告人曰公父子好為小仁不顧大計終當為人擒耳垂留其子農及從子楷紹于鄴行至安陽聞丕與飛龍謀因激怒其衆曰吾盡忠于苻氏而彼專欲圖吾父子吾雖欲已得乎乃停河內募兵旬日間有衆八千夜襲飛龍氐兵盡殺之而慕容鳳燕故宜都王桓子等亦各帥部曲歸翟斌會秦豫州牧平原公暉遣毛當討斌鳳擊斬之垂遂濟河焚橋有衆三萬遣人告農等農等遂以晦日將數十騎微服出鄴奔列人漢縣北齊省故城在今廣平府肥鄉縣起兵甲申九年後燕慕容垂元年後秦姚萇白雀元年舊大國一秦新大國二後燕後秦凡三僭國春正月慕容垂自稱燕王是為後燕慕容鳳勸翟斌奉垂為盟主斌從之垂至洛陽斌勸垂稱尊號垂曰新興侯謂慕容暐吾主也當迎歸反正耳垂以洛陽四面受敵欲取鄴而據之乃引兵東至滎陽羣下固請上尊號垂乃稱燕王立統府承制行事帥衆二十餘萬自石門濟河長驅向鄴慕容農之奔列人也止于烏桓魯利家利為之置饌農笑而不食利謂其妻曰惡奴郎貴人家貧無以饌之奈何妻曰郎有雄才大志今無故而至必將有異非為飲食來也君亟出逺望以備非常利從之農以興復告利利曰死生惟郎是從乃詣張驤亦烏桓人説之驤曰得舊主而奉之敢不致死于是農驅列人居民為士卒使趙秋説屠各東夷烏桓各帥衆數千赴之步騎雲集遂至數萬長樂公丕使石越討之農參軍趙謙請急繫越農曰彼甲在外我甲在心畫戰則士卒見其外貌而憚之不如待暮擊之可以必克令戰士嚴備以待毋得妄動向暮農鼓譟而出大衆隨之大敗秦兵斬越越與毛當皆秦驍將相繼敗沒秦人騷動盜賊羣起垂至鄴農引兵來會垂遂立世子寶字道祐為太子封拜王公百餘人丕使薑讓誚讓垂垂曰孤受主上不世之恩故欲安全長樂公使赴京師然後修復舊業永為鄰好若不以鄴城見歸當窮極兵勢恐單馬求生亦不可得也讓厲聲責之曰將軍不容于家國投命聖朝燕之尺土將軍豈有分乎主上與將軍風殊類别一見傾心親如宗戚寵逾勳舊一旦因王師小敗遽有異圖長樂公受分陜之任寧可拱手輸將軍以百城之地乎將軍欲裂冠毁冕自可極其兵勢但惜將軍以七十之年懸首白旗高世之忠更為逆鬼耳垂默然左右請殺之垂曰彼各為其主耳何罪禮而歸之上秦王堅表請送丕歸長安堅怒復書切責之二月荆江都督豐城公桓沖卒諡宣穆沖聞謝元等有功自以失言慙恨成疾而卒燕王垂圍鄴燕王垂攻鄴拔其外郭秦長樂公丕退守中城垂築長圍守之垂遣其弟德及從子楷等攻秦枋頭館陶皆取之于是關東六州郡縣多降于燕燕慕容泓暐之弟起兵華隂慕容沖泓之弟起兵平陽秦遣苻睿堅之子擊泓敗死夏四月睿司馬姚萇起兵北地自稱秦王是為後秦泓為秦北地長史聞燕王垂攻鄴亡奔關東收集鮮卑還屯華隂其衆遂盛自稱雍州牧秦王堅使巨鹿公睿都督中外諸軍事討泓以姚萇為司馬泓弟沖為秦平陽太守亦起兵河東進攻蒲坂堅使竇衝討之泓聞秦兵且至帥衆將奔關東睿粗猛輕敵欲馳兵邀之姚萇諫不聽遂與戰兵敗為泓所殺萇遣其長史詣堅謝罪堅怒殺之萇懼奔渭北馬牧于是天水尹緯字景亮尹詳南安龎演等紏煽羌豪五萬餘衆推萇為盟主萇自稱秦王進屯北地羌胡降者十餘萬已而萇出北地堅自帥步騎二萬擊之萇兵屢敗軍中無井秦人塞安公谷堰水以困之會天大雨萇營中水三尺營外寸餘而已萇軍復振堅歎曰天亦佑賊乎安公谷在西安府耀州秦遣兵擊慕容沖破之沖奔華隂泓遂進逼長安秦竇衝擊沖破之沖奔華隂泓衆至十餘萬改元燕興已而燕諸將殺泓立沖為太弟沖大破秦兵于鄭西鄭縣之西遂據阿房城泓沖之叛也堅召慕容暐責之曰卿之宗族可謂人面獸心不可以國士期也命暐以書招諭泓沖及垂暐密遣使謂泓曰吾籠中之人必無還理且燕室之罪人也不足復顧汝勉建大業聽吾死便即尊位及泓見殺沖復敗秦兵暐與慕容肅謀伏兵殺堅事覺堅誅暐肅并鮮卑無少長皆殺之燕王垂幼子柔與太子寶之子盛乘間得出奔沖阿房城注見前阿房六月崇德太后禇氏崩秋七月葬康獻皇后八月燕王垂解鄴圍趨新城即新興城垂所築以置輜重在廣平府肥鄉縣初燕王垂圍鄴城久不下以右司馬封衡言引漳水灌之垂行圍因飲于華林園秦人密出兵掩之矢下如雨垂幾不得出冠軍慕容隆將騎衝之垂僅而得免至是鄴中芻糧俱盡削松木以飼馬垂曰苻丕必無降理不如開丕西歸之路以謝秦王疇昔之恩乃解圍趨新城時翟斌以鄴城不下潛與秦通謀事覺垂殺之遣都督謝元帥師伐秦取河南太保安三月詔以安為太保奏請乘苻氏傾敗開拓中原以元為前鋒都督帥桓石虔等伐秦元至下邳秦徐州刺史趙遷棄彭城走元進據之使彭城內史劉牢之攻秦兖州刺史張崇棄鄄城奔燕牢之據鄄城河南城堡皆來歸附己而元遣兵攻秦青州降之朝廷加元都督徐兖青司冀幽并七州諸軍事冬十月辛卯朔日食後秦王萇攻新平後漢郡今陜西邠州是初新平人殺其郡將秦王堅缺其城角以恥之新平民望謂郡之賢豪深以為病欲立忠義以雪之及是萇至太守茍輔欲降郡人馮傑等諫曰昔田單以一城存齊今秦猶連城過百奈何遽為叛臣乎輔喜曰此吾志也于是憑城固守後秦為土山地道輔亦于內為之或戰地下或戰山上後秦之衆死者萬餘人輔詐降以誘萇萇將入城覺之而返輔伏兵邀擊幾獲之又殺萬餘人輔堅守數月糧竭矢盡乃帥其民以出欲赴長安萇圍而坑之慕容垂復圍鄴謝元遣劉牢之救之且饋之粟先是謝元遣劉牢之等據碻磝城名在泰安府東阿縣碻磝山上郭滿據滑臺亦曰白馬城今為衛輝府滑縣治元和志滑州治白馬城即古滑臺昔滑氏于此為壘後人增以為城顔肱劉襲軍河北襲攻黎陽注見前克之苻丕大懼會燕王垂復引兵圍鄴丕進退路窮遣參軍焦逵請救于元元欲徵丕任子逵固陳丕欵誠元乃遣劉牢之等帥衆二萬救鄴丕告飢元運米二千斛饋之乙酉十年秦王苻堅大安元年西燕主慕容沖更始元年西秦王乞伏國仁建義元年舊大國三秦燕後秦新大國一西燕小國一西秦凡五僭國春正月燕慕容沖稱帝于阿房是為西燕沖稱帝改元頗有自得之志賞罰任情慕容盛字道運寶庶長子年十三謂慕容柔曰十人之長亦須才過九人然後得安今中山王才不逮人功未成而驕已甚殆難濟乎已而沖襲長安秦王堅與戰屢敗之夏四月劉牢之進兵至鄴燕王垂逆戰敗走中山牢之追擊大敗而還牢之自枋頭至鄴燕王垂逆戰而敗遂撤圍北遁牢之引兵追之疾趨二百里至五橋澤胡三省注在臨漳縣北爭燕輜重垂邀擊大破之牢之單馬走會秦救至得免鄴中飢甚丕率衆就晉榖于枋頭牢之入屯鄴城兵復少振尋坐軍敗徵還丕亦還鄴燕秦相持經年幽冀人相食邑落蕭條垂以桑椹為軍糧北趨中山五月西燕攻長安秦王堅出奔五將山在鳳翔府岐山縣東北亦曰武將山後秦執之以歸西燕主沖攻長安秦王堅身自督戰飛矢滿體沖縱兵暴掠士民流散道路斷絶千里無煙堅大懼以讖書云帝出五將久長得乃留太子宏守長安帥騎數百與張夫人中山公詵奔五將山後秦王萇遣驍騎將軍吳忠圍之秦兵皆散走堅神色自若忠執之送詣新平堅之出也宣告州郡期以孟冬救長安宏不能守出奔下辨沖入長安縱兵大掠死者不可勝計已而宏自武都假道來奔詔處之江州秋八月太保建昌公謝安卒諡曰文靖先是安與琅邪王道子有隙會秦人求救安請自將出鎮廣陵至是有疾求還至建康而卒詔加殊禮以葬以琅邪王道子領揚州刺史録尚書都督中外諸軍事後秦王萇弒秦王堅後秦王萇幽秦王堅于别室使求傳國璽堅叱之曰五胡次序無汝羌名璽已送晉不可得也堅自以平生遇萇有恩尤忿之數罵萇求死萇遣人縊之張夫人中山公詵皆自殺後秦將士亦皆哀慟萇欲隱其名諡堅曰壯烈天王司馬氏光曰論者皆以為堅之亡由不殺慕容垂姚萇尤獨以為不然使堅治國無失其道則垂萇皆秦之能臣也烏能為亂哉李克有言數戰則民疲數勝則主驕以驕主御疲民未有不亡者也堅似之矣秦苻丕稱帝于晉陽秦長樂公丕將赴長安會幽州刺史王永猛之子自薊州壺關遣使招之丕乃帥鄴中男女六萬餘口西如潞川將軍張蚝并州刺史王騰迎入晉陽永以騎來會丕始知堅死乃發喪即位丕既去鄴燕使慕容和守之九月秦吕光還自龜兹擊涼州殺其刺史梁熙而代之初吕光以龜兹饒樂欲留居之天竺沙門鳩摩羅什曰此不足留將軍但東歸自有福地可居光乃以駝二萬餘頭載外國珍寶竒玩驅駿馬萬匹而還至玉門涼州刺史梁熙發兵拒之光破其兵斬熙入姑臧自領涼州刺史郡縣皆降酒泉太守宋皓西郡太守索泮城守不下光攻而執之責泮不降泮曰將軍受詔平西域不受詔亂涼州梁公何罪而將軍殺之泮力不能報讐主減臣死固其宜也光皆殺之初張天錫之南奔也秦長水校尉王穆匿其世子大豫與俱奔河西既而魏安人焦松聚兵迎大豫為主攻拔昌松進逼姑臧嶺西諸郡皆應之尋為吕光所攻大豫奔廣武廣武人執送姑臧斬之穆亦被殺在索泮字德林敦煌人西郡後漢末置治日勒故城今甘州府山丹縣魏安廣武皆前涼所置郡故城俱在今涼州府平番縣昌松本漢蒼松縣後涼改昌松廢縣在涼州府古浪縣乞伏國仁自稱單于是為西秦國仁稱單于置將相分其地置十二郡築勇士城而都之秦封以為苑川城名在蘭州府金縣水經注苑川水北徑牧師苑故漢牧苑之地有東西二城相去七里王冬十二月燕慕容麟攻秦博陵後漢縣晉置郡後魏省故城在今保定府蠡縣守將王兖新平氐人死之麟攻博陵王兖固守城中糧竭矢盡功曹張猗踰城出聚衆以應麟兖臨城數之曰卿是秦民吾是卿君卿起兵應賊而號義兵何名實之相違也古人求忠臣必于孝子之門卿母在城棄而不顧吾何有焉不意中州禮義之邦乃有如卿者也麟拔博陵執兖殺之燕定都中山先是燕樂浪王溫屯中山撫舊招新勸課農桑倉庫充溢溫乃運給軍糧且營中山宫室及是燕王垂至謂諸將曰樂浪王之功雖蕭何何以加之乃定都焉丙戌十一年秦主苻登泰初元年燕建興元年後秦建初元年西燕主慕容永中興元年魏太祖道武帝拓跋圭登國元年涼王吕光天安元年舊大國四秦燕後秦西燕小國一西秦新大國一魏小國一後涼凡七僣國春正月拓跋圭復立為代王先是劉庫仁死弟頭眷代領其衆庫仁之子顯弒之而自立顯又欲殺拓跋圭圭遂奔賀蘭部依其舅賀訥至是圭從曽祖紇羅力微之曽孫與諸部大人共請賀訥推圭為王大會于牛川在今山西朔平府右玉縣北邊牆外即代王位以長孫嵩代人叔孫普洛拓跋鄰命叔父之裔曰乙旃氏後改叔孫氏為南北部大人分治其衆以張衮字洪龍上谷沮陽人為左長史許謙字元遜代人為右司馬王建廣寧人等為外朝大人奚牧拓跋鄰之弟為逹奚氏後改奚為治民長皆掌宿衛及參謀議長孫道生嵩從弟等出納教命尋徙都盛樂已而圭以燕師擊顯大破之顯奔西燕盛樂注見前燕王垂稱皇帝始置公卿百官繕治宗廟社稷丁零翟遼斌從子據黎陽翟斌之死也遼奔黎陽太守滕恬之南陽西鄂人含從子甚愛信之恬之喜畋獵不愛士卒遼潛施姦惠以收衆心遂執恬之而據其郡明年燕王垂使慕容楷擊遼降之遼尋復叛燕自稱魏天王屯滑臺二月西燕弒其主沖沖樂在長安且畏燕主垂之強課農築室為久安計鮮卑咸怨將軍韓延因衆心不悅殺之立沖將段隨為燕王三月慕容恆慕容永廆從孫殺隨立宜都王子顗帥鮮卑男女四十萬口去長安而東恆弟韜殺顗恆立沖之子瑤永又殺之乃立泓之子忠為帝忠以永為丞相至聞喜聞燕王垂已稱帝不敢進築燕熙城在今絳州聞喜縣而居之未幾刁雲等復殺忠推永為河東王稱藩于燕三月泰山太守張願叛謝元退屯淮隂初謝元欲使朱序屯梁國而自屯彭城以北固河上西援洛陽朝議以征役既久欲令元置戍而還至是張願以郡叛降翟遼北方騷動元謝罪乞解職詔慰諭令還淮隂明年燕擊張願破之于是青兖徐諸州郡縣壁壘多降于燕後劉牢之擊敗翟遼願復來降夏四月代改稱魏魏王圭務農息民國人悅之後秦王萇取長安稱皇帝鮮卑既東長安空虛萇取之始稱皇帝置百官六月以楊亮為雍州刺史鎮衛山陵荆州刺史桓石民取𢎞農初置湖陜二戍後湖陜為姚興所陷秋七月秦以苻登字文高堅族孫為南安注見前王枹罕諸氐以河州刺史衛平衰老廢之推狄道長苻登為雍河二州牧率衆五萬下隴攻南安拔之馳使請命秦主丕因而命之仍封南安王冬十月西燕擊秦敗之秦主丕奔東垣故城在今河南府新安縣魏書地形志新安郡東垣即此將軍馮該擊殺之慕容永遣使詣秦主丕求假道東歸丕不許與戰于襄陵秦兵大敗丞相王永等皆死丕帥騎數千南奔東垣謀襲洛陽馮該自陜邀擊殺之執其太子寧等送建康詔赦不誅西燕慕容永稱帝于長子漢縣今屬山西潞安府永進據長子即帝位將以秦后楊氏為上夫人楊氏引劍刺之為永所殺時燕主垂之子柔及孫盛會皆在長子相繼逃歸于垂海西公奕薨于吳公自徙吳之後深慮橫禍專飲酒恣聲色有子不育時人憐之至是薨年四十五十一月秦苻登稱帝于南安登既克南安夷夏歸之者三萬餘户遂進攻後秦主萇之弟碩德于秦州萇自往救之登與戰大破之啖青啖姓青名氐人射萇中之萇走保上邽碩德代統其衆至是秦尚書寇遺奉渤海王懿丕之子自杏城注見前奔南安登發丕喪行服議立懿為主衆曰渤海年幼未堪多難非大王不可登乃即帝位十二月吕光自稱酒泉公是為後涼初光得秦主堅凶問舉軍縞素至是自稱涼州牧酒泉公秦主登伐後秦秦主登立世祖丕諡堅世祖宣昭皇帝神主于軍中載以輜軿衛以虎賁凡所欲為必啓而後行引兵五萬東擊後秦將士皆刻鉾鎧為死休字每戰以劍矟為方圓大陳有厚薄從中分配故人自為戰所向無前初長安之將敗也將軍徐嵩胡空各聚衆結壘自固既而受後秦官爵後秦以王禮葬秦王堅于二壘之間及登至嵩空以壘降登拜嵩雍州刺史空京兆尹改葬堅以天子之禮徐嵩字元高盛之子丁亥十二年春正月以朱序為青兖刺史鎮淮隂謝元為會稽內史夏四月尊母李氏為皇太妃五月徴處士戴逵字安道譙國人徙會稽不至詔徴會稽處士戴逵逵纍辭不就郡縣敦逼不已逵逃匿于吳內史謝元上疏曰逵自求其志今王命未回將罹風霜之患陛下既已愛而器之宜使其身名並存請絶召命帝許之秋八月立子德宗為皇太子冬十二月後秦攻秦拔將軍徐嵩壘嵩死之後秦姚方成拔嵩壘執而數之嵩罵曰汝姚萇罪當萬死先帝赦之授任內外榮寵極矣曽不如犬馬識所養之恩親為大逆汝羌輩豈可以人理期也何不速殺我早見先帝取萇于地下治之方成怒三斬嵩悉坑其士卒萇掘秦主堅尸鞭撻剝裸薦之以棘坎土而埋之戊子十三年西秦王乞伏乾歸太初元年春正月康樂公謝元卒諡獻武秦主登軍朝那漢縣屬安定郡後魏廢故城在今平涼府平涼縣後秦主萇軍武都胡三省注此武都亦當在安定界漢安定有安武縣武都或即此地兩秦相持屢戰互有勝負數月乃解關西豪傑以後秦無成功多去而附秦夏四月以朱序都督司雍等州軍事戍洛陽譙王恬字元愈烈王無忌子都督兖冀等州軍事鎮淮隂六月西秦王乞伏國仁卒弟乾歸立乾歸號河南王遷都金城注見前秦封以為金城王秦涼鮮卑羌胡多附之秋八月魏遣使如燕魏主圭密有圖燕之志遣九原公儀什翼犍之孫奉使至中山還言于圭曰燕主衰老太子暗弱范陽王謂慕容德自負材氣非少主臣燕主既沒內難必作于時乃可圖也今則未可圭善之己丑十四年後涼麟嘉元年春二月吕光自稱三河王秋八月秦主登擊安定後秦主萇襲破其輜重秦后毛氏死之秦主登留輜重于大界胡三省注在安定新平之間自將輕騎攻安定先是後秦主萇以秦戰屢勝謂得秦王堅之助亦于軍中立堅像而禱之秦主登升樓遙謂之曰為臣弒君而立像求福庸有益乎因大呼曰弒君賊姚萇何不自出吾與汝決之萇不應至是萇以軍未有利斬像首以送秦諸將勸萇決戰萇曰與窮寇爭勝兵家之忌也吾將以計取之乃留兵守安定夜帥騎三萬襲大界克之登后毛氏美而勇善騎射兵入其營猶彎弓跨馬帥壯士力戰殺七百餘人衆寡不敵為後秦所執萇將納之毛氏罵且哭曰姚萇汝已弒天子又欲辱皇后皇天后土寧汝容乎遂殺之諸將欲因秦軍駭亂擊之萇曰登衆雖亂怒氣猶盛未可輕也遂止登收餘衆保胡空壘劉友益書法曰秦世氐耳前王兖繼徐嵩此毛氏死節者凡三人世亂識忠臣信哉冬十一月以范寧字武子順陽人為豫章太守初帝既親政事威權己出有人主之量己而溺于酒色委政于琅邪王道子道子亦嗜酒日夕與帝以酣歌為事又崇尚浮屠窮奢極費所親昵者皆姏武酣反老女稱姆莫補反女師也僧尼近習弄權交通請託賄賂公行官爵濫雜刑獄繆亂尚書令陸納望宫闕歎曰好家居纖兒欲撞壞之邪左衛領營將軍許營上疏不省會陸納字祖言吳人許營稽人道子勢傾中外帝漸不平侍中王國寶以讒佞有寵于道子諷八座啓道子宜加殊禮護軍車胤字武子南平人曰此乃成王所以尊周公者今主上當陽豈得為此乃稱疾不署疏奏帝大怒而嘉胤有守中書侍郎范寧徐邈為帝所親信數進忠言補正闕失指斥姦黨國寶寧之甥也寧尤疾其阿諛勸帝黜之國寶遂與道子譖寧出為豫章太守寧在豫章遣議曹下屬城採求風政訊問官長得失徐邈與寧書曰自古以來欲為左右耳目者無非小人皆先因小忠而成其大不忠先藉小信而成其大不信遂使讒諂並進善惡倒置可不戒哉足下慎選綱紀必得國士以攝諸曹諸曹皆得良吏以掌文案又擇公方之人以為監司則淸濁能否莫可混淆足下但平心而處之何取于耳目哉寧好儒學性執直常謂王弼何晏之罪源于桀紂或以為貶之太過寧曰王何蔑棄典文幽沉仁義遊辭浮説波蕩後生使縉紳之徒翻然改轍以至禮壞樂崩中原傾覆遺風餘俗至今為患桀紂縱暴一時適足以喪身覆國為後世戒豈能同百姓之視聽哉故吾以為一世之禍輕厯代之患重自喪之惡小述衆之罪大也庚寅十五年春正月西燕主永寇洛陽朱序擊走之還擊翟遼又走之西燕主永引兵向洛陽朱序自河隂北濟河擊敗之永走還上黨序追至白水在山西澤州府鳳臺縣南水經注白水出高都縣故城西即此會翟遼謀向洛陽序乃引兵還擊走之留將軍朱黨守石門使其子略督護洛陽自還襄陽已而西燕復冦河南太守楊佺期擊破之佺期亮之子二月以王恭字孝伯藴之子都督青兖等州軍事琅邪王道子恃寵驕恣帝寖不能平欲選時望為藩鎮以潛制之問于太子左衛率王雅曰吾欲用王恭殷仲堪陳郡人何如雅曰恭風神簡貴志氣方嚴仲堪謹于細行以文義著稱然皆峻狹自是幹略不長天下無事足以守職若其有事必為亂階矣帝不從乃使恭鎮京口夏四月秦將軍魏揭飛攻後秦之杏城雷惡地應之後秦主萇擊斬揭飛惡地降先是秦將軍雷惡地降于後秦後秦主萇使人詐招秦主登許開門納之登將從之惡地在外馳騎見登曰萇多詐不可信也萇聞之謂諸將曰此羌見登事不成矣登以惡地勇略過人憚之于是惡地降萇至是秦主登遣將軍魏揭飛帥氐胡攻後秦將姚當成于杏城惡地復應之攻李潤地名在同州府大荔縣西北李延夀曰馮翊東有李潤鎮即此後秦主萇自引精兵一千六百擊之揭飛惡地有衆數萬氐胡赴之者首尾不絶見後秦兵少悉衆攻之萇固壘不戰示之以弱潛遣騎出其後揭飛兵擾亂萇縱兵擊之斬揭飛及其將士萬餘級惡地請降萇待之如初萇命姚當成于所營之地每柵孔中樹一木以旌戰功當成曰營地太小萇曰我自結髮以來與人戰未嘗如此之快以千餘兵破三萬之衆營地惟小為竒豈以大為貴哉是秋馮翊人郭質起兵應秦移檄三輔獨鄭縣人茍曜不從聚衆附于後秦擊質質走洛陽明年夏茍曜密招秦主登許為內應登赴之軍于馬頭原萇帥衆逆戰登擊破之斬其將軍吳忠萇收兵復戰姚碩德問之萇曰登用兵遲緩不識虛實今輕兵直進此必茍曜與之有謀也緩之則其謀得成故及其未合急擊之耳遂進戰大敗之登退屯郿尋復攻安定萇拒之謂太子興曰茍曜聞吾北行必來見汝汝執誅之萇既行曜果至長安興誅之萇擊登于安定城東敗之馬頭原在鳳翔府郿縣東南辛卯十六年冬十月魏王圭擊柔然東胡之苗裔其先曰木骨閭因以為氏木骨閭死子車鹿會雄健始有部衆自號柔然大破之徙之雲中初柔然部人世服于代及秦滅代遂附于劉衛辰魏王圭即位高車古赤狄之種初號為狄厯北方名為敕勒諸夏以為高車丁零諸部皆服獨柔然不下圭引兵擊之柔然舉部遁走圭倍道追之及于大磧大破之悉徙其部衆于雲中劉衛辰攻魏南部魏王圭大破之衛辰走死諸部悉降劉衛辰遣子直力鞮率衆九萬攻魏南部魏王圭引兵大破之乘勝追奔衛辰部落駭亂圭遂直抵其所居悅跋城即代來城在今鄂爾多斯左翼界衛辰父子出走分遣輕騎追之獲直力鞮衛辰為其下所殺圭誅其宗黨五千人河南諸部悉降獲馬三十餘萬匹牛羊四百餘萬頭國用由是遂饒衛辰少子勃勃即赫連勃勃字屈子亡奔薛干部鮮卑别部薛干部送于沒奕干河西鮮卑後秦封高平公沒奕干以女妻之壬辰十七年夏五月丁卯朔日食燕主垂擊翟釗遼之子釗奔西燕先是翟遼死子釗代領其衆至是燕主垂擊釗垂軍至黎陽臨河欲濟釗列兵南岸以拒之垂徙營就西津去黎陽西四十里為牛皮船百餘艘偽列兵仗泝流而上釗急引兵趨之垂潛遣慕容鎮等自黎陽津夜濟營于河南比明營成釗急還攻垂命堅壁勿戰釗兵往來疲暍攻營不拔將引去鎮等出戰慕容農自西津濟夾擊大破之盡獲其衆及所統七郡三萬餘户釗奔長子嵗餘謀反永殺之冬十一月以殷仲堪都督荆益寧州軍事仲堪雖有時譽資望猶淺到官好行小惠綱目不舉南郡公桓元負其才地以雄豪自處朝廷疑而不用年二十三始拜洗馬嘗詣琅邪王道子值其酣醉張目謂衆客曰桓溫晚塗欲作賊云何元伏地流汗不能起由是不自安而切齒于道子後出補義興太守鬱鬱不得志歎曰父為九州伯兒為五湖長遂棄官歸國上疏自訟不報桓氏纍世臨荆州元復豪橫士民畏之嘗于仲堪聽事前戲馬以矟擬仲堪參軍劉邁曰馬矟有餘精理不足元不悅既出仲堪謂邁曰卿狂人也元夜遣殺卿我豈能相救邪使邁避之元果使人追之不及劉邁字伯羣彭城人征虜參軍胡藩字道序南昌人過江陵見仲堪曰元志趣不常莭下崇待太過非計也藩內弟羅企生字宗伯豫章人為仲堪功曹藩謂曰殷侯倒戈授人必及于禍君不早去悔無及矣立子德文為琅邪王徙道子為會稽王李遼表請修孔子廟不報清河人李遼上表請敕兖州修孔子廟給户灑掃仍立庠序以教學者曰事有如賖而實急者此之謂也疏奏不省癸巳十八年冬十月燕主垂擊西燕燕主垂議伐西燕諸將皆曰未可范陽王德曰永國之枝葉僣舉位號宜先除之以一民心垂曰司徒意與吾同吾雖老叩囊底智足以取之終不留此賊以遺子孫也遂發中山次于鄴十二月後秦主萇卒太子興字子略帥兵擊秦先是秦主登聞後秦主萇病大喜秣馬厲兵進逼安定萇疾小瘳出兵拒之登懼而還萇夜引兵躡其後旦而候騎告登曰賊營已空不知所向登驚曰彼為何人去來不令我覺謂其將死忽然復至朕與此羌同世何其厄哉登遂還雍萇亦還安定已而登丞相竇衝叛登討之衝求救于萇萇使太子興將兵攻胡空堡登解衝圍以赴之興因襲平涼大獲而還至是萇疾甚還長安召太尉姚旻僕射尹緯受遺詔輔政謂太子興曰有毁此諸公者慎勿受之汝撫骨肉以恩接大臣以禮待物以信遇民以仁四者不失吾無憂矣萇卒興祕不發喪自稱大將軍率衆伐秦明年登聞萇死喜曰姚興小兒吾折杖笞之耳乃悉衆而東興使尹緯與戰大敗之其衆夜潰登單騎奔平涼收遺衆入馬毛山于是興始發喪即帝位髦馬毛山在平涼府固原州西南亦曰馬嶺甲午十九年秦主苻崇延初元年後秦主姚興皇初元年是嵗秦及西燕亡大國三燕後秦魏小國二後涼西秦凡五僣國春正月三河王光以秃髮烏孤樹機能從弟務丸之元孫能樹機見前為河西都統烏孤雄勇有大志其父思復犍卒烏孤嗣立與大將紛陀謀取涼州紛陀曰公必欲得涼州宜先務農講武禮賢修政然後可也烏孤從之吕光遣使拜烏孤鮮卑大都統羣下皆曰吾士馬衆多何為屬人石真若留曰吾根本未固大小非敵不如受以驕之俟釁而動烏孤乃受之胡三省曰此言烏孤所以興夏六月追尊會稽太妃鄭氏曰簡文宣太后羣臣或問宣太后應配食元帝太子前率徐邈曰太后平日不伉儷于先帝子孫豈可為祖考立配國學助教簡文帝置臧燾字德仁東莞莒人曰尊號既正則罔極之情申别建寢廟則嚴禰之義顯繫子為稱兼明貴之所由一舉而合三義不亦善乎乃立廟于太廟路西秋七月後秦主興擊秦主登殺之秦太子崇立奔湟中後秦主興自安定如涇陽與秦主登戰于山南馬毛山之南執登殺之悉散其衆使歸農業登太子崇奔湟中稱帝改元八月尊太妃李氏為皇太后居崇訓宫燕主垂圍長子拔之殺西燕主永燕主垂部分諸將出壺關注見前滏口在河南彰德府臨漳縣西元和志滏水出滏陽縣鼓山泉源奮湧如釡揚湯故以滏口名之沙庭在直𨽻大名府元城縣東南春秋定公七年齊侯衛侯盟于沙即此庭當作亭以擊西燕標榜所趣軍各就頓西燕主永聞之分道拒守聚糧臺壁在山西潞安府黎城縣西南水經注潞縣北對故壁臺本潞子所立世謂之臺壁遣兵戍之既而垂頓軍不進永疑垂欲詭道由太行入乃悉斂諸軍杜太行口惟留臺壁一軍于是垂引大軍出滏口入天井關注見前至臺壁破之永召太行軍還自將拒之垂陳于臺壁南遣千騎伏澗下及戰偽退永衆追之澗中伏發斷其後諸軍四面俱進大破之永走歸長子垂進圍之永困急求救于晉魏兵皆未至將士開門納燕兵垂執永斬之得所統八郡七萬餘户西燕自慕容泓改元至永亡凡六主合十一年冬秦主崇及隴西王楊定攻西秦兵敗皆死定弟盛遣使來稱藩西秦王乾歸攻秦主崇崇奔隴西王陽定定楊毅從孫也先為秦將軍與西燕戰兵敗被執已而亡奔隴右收集舊衆徙治厯城自稱仇池公稱藩于晉後又取天水略陽之地自稱隴西王定帥衆三萬與崇共攻乾歸大敗見殺苻氏遂亡前秦自苻健僣立至崇亡凡六主合四十四年乾歸于是盡有隴西之地自稱秦王定叔父之子盛先守仇池至是乃自稱秦州刺史仇池公遣使稱藩于建康分氐羌為二十部護軍各為鎮戍不置郡縣乙未二十年春三月庚辰朔日食以丹陽尹王雅領太子少傅時會稽王道子專權奢縱趙牙本倡優茹千秋本捕賊吏也皆以諂賂得進牙為道子開東第築山穿池功用巨萬帝常幸其地謂道子曰府內乃有山甚善然修飾太過道子無以對帝去道子謂牙曰上若知山是人力所為爾必死矣牙曰公在牙何敢死營作彌盛千秋賞官招權聚貨纍億帝益怒道子而逼于太后不忍廢黜乃擢王恭殷仲堪王珣王雅等居內外要任以防之道子亦引王國寶王緒國寶從弟為心腹由是朋黨競起無復嚮時友愛之歡太后每和解之秋七月長星見漢書注文頴曰孛彗長三星形象小異孛星光芒四出彗星光芒如掃彗長星光芒直指或竟天或十丈二三丈無常也有長星見自須女至于哭星晉書天文志須女四星天少府虛二星主哭泣帝心惡之于華林園舉杯祝之曰長星勸汝一杯酒自古何有萬嵗天子邪燕遣其太子寶擊魏魏王圭敗之于參合陂初魏王圭遣其弟觚圭叔父翰之子入貢于燕燕主垂衰老諸子用事留觚以求良馬圭弗與遂叛燕侵逼附塞諸郡燕主垂遣太子寶帥衆八萬自五原伐魏散騎常侍高湖諫曰魏與燕世為婚姻結好久矣問以求馬不獲而留其弟曲在于我奈何遽擊之圭沈勇有謀幼厯艱難兵精馬強未可輕也太子年少氣壯必小魏而易之萬一不如所欲傷威損重願陛下圖之垂怒免湖官海高湖字大淵渤蓨人魏張衮言于圭曰燕狃于滑臺長子之捷有輕我心宜羸形以驕之乃可克也圭從之悉徙部落畜産西渡河千餘里以避之燕軍至五原降魏别部三萬餘家進軍臨河欲濟魏王圭將兵拒之先是寶之發中山也燕主垂已有疾既至五原圭使人邀中山之路伺其使者盡執之寶等數月不聞垂起居圭使所執使者臨河告之曰若父已死何不早歸寶等憂恐士卒駭動乃夜遁圭選精鋭二萬餘騎追擊大敗之于參合陂時河水未結寶以魏軍必不能渡不設斥候俄而暴風氷合圭引兵濟河晨夜兼行至參合陂西燕軍在陂東山南水上圭夜部分諸部令士卒銜枚束馬口潛進旦日登山下臨燕營燕軍大驚擾亂圭縱兵擊之死者萬數復禽四五萬人寶等單騎僅免燕司徒德言于垂曰虜以其捷有輕太子心宜及陛下神略以服之不然將為後患垂乃會兵中山期以明年大舉擊魏丙申二十一年燕主慕容寶永康元年魏皇始元年涼龍飛元年春閏三月燕主垂襲魏平城克之夏四月還卒于上谷太子寶立燕主垂留范陽王德守中山引兵密發踰青嶺胡三省注即廣昌嶺所謂五回道也五回山在今易州廣昌縣亦曰廣昌嶺經天門胡三省注廣昌之南層崖刺天積石壁立蓋即天門也鑿山通道出魏不意直指雲中魏陳留公虔什翼犍子鎮平城垂襲之虔出戰敗死燕軍盡收其部落魏王圭震怖欲走諸部皆有二心會垂疾篤還垂之過參合陂也見積骸如山為之設祭軍士慟哭聲震山谷垂慚忿嘔血由是疾轉篤乃築燕昌城而還同燕昌城在大同府大縣北卒于上谷寶即位燕主寶弒其太后段氏寶初為太子有美稱已而荒怠中外失望段后嘗言于燕主垂以太子非濟世之才宜擇一人付以大業趙王麟姦詐強愎必為國患宜早圖之垂不從及是寶即位使麟逼段后自裁段氏曰汝兄弟不難逼殺其母况能守先業乎吾豈愛死但念國亡不久耳遂自殺六月三河王光自稱涼天王光即天王位國號大涼置百官遣使拜秃髮烏孤益州牧烏孤謂使者曰吕王諸子貪淫三甥暴虐逺近愁苦吾安可違百姓之心受不義之爵乎留其鼓吹羽儀謝遣之秋八月魏王圭擊燕九月燕慕容農及魏師戰敗走魏遂取并州魏羣臣勸魏王圭稱尊號圭始建天子旌旗出入警蹕參軍張恂字洪讓衮之子勸圭進取中原圭善之乃大舉伐燕步騎四十餘萬南出馬邑踰勾注注俱見前旌旗亘千餘里鼓行而進遣别將從東道襲幽州九月圭軍至晉陽慕容農出戰大敗奔還司馬慕輿嵩閉門拒之農遂東走魏追獲其妻子燕軍盡沒農獨與三騎逃歸中山魏遂取并州初建臺省置刺史太守尚書郎以下官悉用儒生為之士大夫詣軍門者皆引入存慰使人人盡言稍有才用咸加擢敘以張恂等為諸郡守招撫離散勸課農桑貴人張氏弒帝于清暑殿太子德宗即位會稽王道子進位太傅冬十月葬隆平陵在江寧府上元縣帝嗜酒流連內殿外人罕得進見張貴人寵冠後宫時年近三十帝戲之曰汝以年亦當廢矣吾意更屬少者已而醉寢清暑殿貴人使婢以被蒙帝面而弒之重賄左右曰因魘暴崩時太子暗弱會稽王道子昏荒遂不復推問王國寶夜叩禁門欲為遺詔侍中王爽恭之弟拒之曰大行晏駕皇太子未至敢入者斬國寶乃止太子即位道子進位太傅揚州牧假黃鉞太子幼而不慧口不能言至于寒暑飢飽亦不能辨飲食寢興皆非己出母弟琅邪王德文嘗侍左右為之節適初國寶黨附道子驕縱不法武帝惡之國寶懼遂更媚于帝而疏道子及帝崩國寶復事道子與王緒共為邪諂道子又倚為心腹遂參管朝權威震內外王恭入赴山陵每正色直言道子憚之深布腹心而恭每及時政輒厲聲色道子遂欲圖之或勸恭誅國寶王珣曰彼罪逆未彰今先事而發必失朝野之望恭乃止既而謂珣曰比來視君一似胡廣珣曰王陵廷爭陳平慎默但問嵗晏何如耳山陵既畢恭將還鎮謂道子曰主上諒暗冢宰之任伊周所難惟大王親萬機納直言放鄭聲逺佞人國寶等愈懼魏王圭拔常山魏王圭使冠軍將軍于栗磾魏書官氏志詰汾時諸部內入者有勿忸於氏後改于氏栗磾代人潛自晉陽開韓信故道信自井陘伐趙之路自井陘趣中山進攻常山拔之郡縣皆降唯中山鄴信都三城為燕守圭將進攻中山既而謂諸將曰中山城固急攻則傷士久圍則費糧不如先取信都然後圖之乃引兵而南高陽太守崔宏字元伯東武城人奔海渚胡三省注海中洲也圭素聞其名遣吏追獲以為黃門侍郎與張衮對掌機要創立法度博陵令屈遵字子度昌黎徒河人降以為中書令出納號令兼總文誥時魏東平公儀攻鄴燕范陽王德擊破之魏軍退屯新城已而儀司馬丁建隂與燕通引燕兵擊儀儀軍遂潰安皇帝丁酉隆安元年南涼王禿髮烏孤太初元年北涼王段業神璽元年舊大國三燕秦魏小國二涼西秦新小國二南涼北涼凡七僭國春正月魏王圭擊信都降之秃髮烏孤自稱西平王攻涼取京城是為南涼先是烏孤擊乙弗折掘部二部皆在秃髮氏之西降之徙都廉川故城在今西寧府碾伯縣廣武注見前趙振少好竒略棄家從烏孤烏孤喜曰吾得趙生大事濟矣拜左司馬至是烏孤稱王改元治兵廣武攻涼金城克之已而烏孤取嶺南五部更稱武威王徙治樂都郡嶺南洪池嶺南也洪池嶺注見前樂都涼今西寧府碾伯縣是二月燕主寶襲魏軍大敗奔還魏王圭自信都還燕主寶悉發其衆以邀之營于滹沱水北魏軍至營水南寶潛師夜濟襲魏營因風縱火魏軍大亂圭棄營走既而燕兵無故自相斫射圭望見之乃擊鼓收衆多布火炬于營外縱兵衝之燕兵大敗引還魏兵隨而擊之燕兵屢敗寶懼棄軍以二萬騎奔還時大風雪凍死者相枕藉尚書郎慕輿皓謀弒寶立趙王麟不克奔魏麟由是不安三月燕幽平牧慕容會寶之庶子引兵至薊慕容麟作亂出走魏王圭進圍中山燕主寶奔會軍慕容詳城守拒魏初燕清河王會聞魏兵東下表求赴難而無行意會雄俊有器藝燕主垂愛之遣鎮龍城遺言命寶以為嗣寶愛少子䇿立之會因是愠懟有異志燕主寶怒切責之會不得已乃上道徐進至是始逹薊城魏圍中山既久城中將士皆思出戰高陽王隆為寶屢言之趙王麟每沮其議隆成列而罷者數四衆大忿恨麟以兵劫北地王精使率禁兵弒寶精以義拒之麟怒殺精出奔西山依丁零餘衆于是城中震駭寶恐麟奪會軍乃召隆及遼西王農謀走保龍城夜與太子䇿及隆農等萬餘騎出赴會軍城中無主百姓惶惑開封公詳從寶不及城中立以為主閉門拒守圭盡衆攻之不拔寶出中山會帥騎卒二萬迎于薊南寶怪會有恨色分其兵給農隆北趣龍城魏兵追之會整陳與戰農隆等復以騎衝之魏兵大敗追奔百餘里會既敗魏兵矜狠滋甚遂謀作亂襲隆殺之農被重創亡走寶欲討會陽為好言以安之因召羣臣食會就坐寶目慕輿騰斬會傷首不死走赴其軍勒兵攻寶寶馳至龍城會引兵頓城下城中將士皆憤怒出破會軍侍御郎高雲復夜襲之會衆潰奔中山慕容詳殺之寶以雲為將軍養以為子高雲字子雨高句驪之支屬尊皇太后李氏為太皇太后立皇后王氏夏四月王恭舉兵反詔誅僕射王國寶將軍王緒恭罷兵還鎮王國寶王緒依附會稽王道子惡王恭殷仲堪勸道子裁損其兵權恭遣使與仲堪謀討國寶等桓元亦以仕不得志欲假仲堪兵勢以作亂乃説仲堪曰國寶與君惟患相斃之不速今既執大權無不如志若發詔徵君何以處之仲堪曰計將安出元曰孝伯疾惡深至宜潛與之約興晉陽之甲以除君側之惡元雖不肖願帥荆楚豪傑荷戈先驅此桓文之勳也仲堪疑未決于是外結雍州刺史郗恢內與從凡南蠻校尉覬南郡相江績謀之覬曰人臣當守職分朝廷是非豈藩屏所制也晉陽之事不敢預聞績亦極言其不可覬恐績及禍和解之績曰大丈夫何至以死相脅邪江仲元行年六十但求獲死所耳仲堪憚其堅正以楊佺期代之朝廷聞之徵績為御史中丞覬遂以疾辭位仲堪往省之曰兄病殊可憂曰我疾不過身死汝病乃當滅門宜深自愛勿以我為念郗恢亦不肯從字郗恢字道胤曇之子殷覬字伯通江績仲元陳留圉人會恭使至仲堪乃許之恭大喜上表罪狀國寶舉兵討之表至內外戒嚴國寶懼不知所為問計于王珣珣曰王殷與卿素無深怨所競不過勢利之間耳國寶曰將曹爽我乎珣曰是何言歟卿寧有爽之罪孝伯豈宣帝之儔邪又問計于車胤胤曰今朝廷遣軍恭必城守若京口未拔上流奄至何以待之國寶遂上疏解職待罪道子暗懦欲求姑息乃賜國寶死斬緒于市遣使謝恭恭乃罷兵還京口仲堪初猶豫不敢下聞國寶死始抗表舉兵道子以書止之仲堪乃還以會稽世子元顯為征虜將軍元顯年十六有俊材為侍中説會稽王道子以王殷終必為患請潛為之備道子乃拜元顯征虜將軍以其衛府及徐州文武悉配之涼沮渠蒙遜張掖盧水胡人胸奴沮渠王之後以官為氏叛推段業京兆人為建康前涼所置郡故城在今肅州高臺縣公以衆歸之是為北涼蒙遜之先世為部帥其諸父羅讐麴粥皆臣于涼涼王光殺之蒙遜因叛涼起兵攻臨松郡前涼置故城在今甘州府張掖縣拔之屯據金山在甘州府山丹縣西南蒙遜從兄男成聞蒙遜起亦合衆攻建康會蒙遜為光子纂字永緒所破男成遣使説建康太守段業推為涼州牧建康公改元神璽蒙遜帥衆歸之業以男成為輔國將軍蒙遜為鎮西將軍光命纂攻之不克業自稱涼王以蒙遜為尚書左丞秋九月秦太后蛇氏卒自此後秦止稱秦秦太后卒秦王興哀毁過禮不親庶政羣臣請依漢魏故事既葬即吉尚書郎李嵩上疏曰孝治天下先王之高事也宜遵聖性以光道訓既葬之後素服臨朝尹緯駮曰嵩矯常越禮請付有司論罪興曰嵩忠臣孝子有何罪乎其如嵩議興勤于政事延納善言杜瑾等以論事得顯拔薑龕等以儒學見尊禮古成詵等以文章參機密詵剛介雅正以風教為己任京兆韋高慕阮藉為人居母喪彈琴飲酒詵聞之而泣持劍欲殺之高懼而逃匿薑龕天水人古成復姓詵名也冬十月魏王圭克中山先是燕開封公詳稱帝于中山中山城無定主民恐魏兵乘之男女結盟人自為戰魏王圭罷圍就榖河間詳自謂能郤魏兵威德己振遂即帝位已而趙王麟襲殺詳而自立詳嗜酒奢淫刑殺無度羣下離心城中飢窘麟襲殺之自立以拒魏至是中山飢甚魏王圭進攻之太史令鼂崇字子業遼東襄平人曰不吉紂以甲子亡謂之疾日圭曰紂以甲子亡周武不以甲子興乎遂進與麟戰于義臺即古野臺在正定府新樂縣西南括地志野臺一名義臺大破之麟奔鄴魏克中山得燕璽綬圖書府庫珍寶以萬數班賞將士戊戌二年燕主慕容盛建平元年魏天興元年南燕主慕容德元年舊大國三燕秦魏小國四西秦涼南涼北涼新小國一南燕凡八僭國春正月燕慕容德徙居滑臺稱燕王是為南燕慕容麟奔鄴復稱趙王説范陽王德南趣滑臺阻河以待魏時魯王和德之弟鎮滑臺亦遣使迎德德許之自鄴帥户四萬南徙滑臺魏衛王儀入鄴追德至河弗及儀攻中山時圭封為衛王慕容麟上尊號于德德用兄垂故事稱燕王以統府行帝制置百官麟復謀反德殺之魏王圭北還徙山東民夷十餘萬口以實代二月以王愈字茂和坦之子都督江豫州軍事會稽王道子忌王殷之逼以譙王尚之字伯道承之曽孫及弟休之字季預有才略引為腹心尚之曰今方鎮強盛宰輔權輕宜樹腹心于外以自衛道子乃以其司馬王愈為江州刺史都督江州及豫之四郡軍事日夜謀議以伺四方之隙魏封爾朱羽健其先契胡部落大人居爾朱川因以為氏于秀容川胡三省注此北秀容地近平城秀容川酋長爾朱羽健從魏王圭攻晉陽中山有功環其所居割地三百里以封之燕衛卒段速骨作亂三月攻陷龍城燕主寶出奔尚書蘭汗誘而殺之秋七月長樂王盛討殺蘭汗攝行統制初燕人有自中山至龍城者言魏王圭衰弱于是燕主寶欲取中原調兵悉集已而聞中山已陷乃命罷兵遼西王農請因成師襲庫莫奚東部鮮卑之别種寶從之遂北行會南燕王德遣使來告圭已西還中國空虛寶大喜即日引還詔諸軍就頓不聽罷散乃留長樂王盛統後事自引兵而南長上衛兵之不畨代者段速骨等因衆心之憚征役逼立高陽王隆之子崇為主寶將十餘騎奔還龍城速骨攻之尚書蘭汗隂與通謀城遂陷寶及盛輕騎南走速骨以高陽王崇幼弱欲更立農崇黨聞之遂殺農蘭汗又襲殺速骨廢崇奉太子䇿承制遣使迎寶盛以汗不可信勸寶南就范陽王德先遣使告德奉迎德遣慕輿護帥壯士數百人而北聲言迎衛其實圖之寶聞德已稱制亦懼而北走遣盛收兵冀州會蘭汗復遣使奉迎寶以汗乃父垂之舅又盛妃之父謂必無他遂行盛流涕固諌不聽乃逃匿垂去龍城四十里汗遣弟加難帥五百騎迎入外邸而弒之并殺太子䇿汗自稱昌黎王盛欲赴哀從者止之盛曰我今以窮歸汗汗性愚淺必念婚姻不忍殺我旬月之間足以展吾志遂往見汗汗果哀之乃舍之于宫中親待如舊汗兄提驕狠荒淫事汗無禮盛因而間之汗兄弟漸生嫌忌久之其黨自相攻擊盛乃乘間殺汗龍城自夏不雨至于七月汗日詣燕諸廟禱請委罪加難加難怒叛汗汗遣太子穆擊破之還饗將士汗穆皆醉盛因踰垣入東宫殺穆諸軍聞盛得出皆呼躍爭先攻汗斬之告于太廟下令大赦改元以長樂王攝行統制魏遷都平城魏遷都平城始營宫室建宗廟立社稷宗廟嵗五祭用分至及臘魏王圭命有司正封畿標道里平權衡審度量遣使循行郡國察守宰不法者親考察黜陟之王恭殷仲堪及南郡公桓元反元陷江州桓元求為廣州會稽王道子忌元在荆州因從之元受命而不行豫州刺史庾楷亮之孫以道子割其四郡屬王愈上疏言江州內地而西府晉以京口為北府厯陽為西府豫州治厯陽楷故云北帶寇戎不應使愈分督朝廷不許楷怒遣其子鴻説王恭曰尚之兄弟復秉機權欲削方鎮宜早圖之恭以為然以告殷仲堪及元皆許之推恭為盟主刻期同趣京師恭司馬劉牢之諌曰會稽王道子天子叔父也而又當國秉政嚮為將軍割其所愛其伏將軍已多矣頃所受任雖未允愜亦無大失割庾楷四郡以配王愈于將軍何損晉陽之甲豈可數興乎恭不從上表請討王愈司馬尚之兄弟朝廷憂懼內外戒嚴道子不知所為悉以事委世子元顯日飲醇酒而已元顯聰警頗涉文義志氣果鋭以安危為己任附之者謂其英武有明帝之風仲堪聞恭舉兵勒兵趣發悉以軍事委南郡相楊佺期兄弟佺期帥舟師五千為前鋒桓元次之仲堪帥精兵二萬繼下八月佺期及元奄至湓口王愈無備惶遽奔臨川吳郡治臨汝今江西撫州府臨川縣是元追獲之九月加會稽王道子黃鉞討王恭恭司馬劉牢之執恭以降斬之以牢之都督青兖七州軍事桓元為江州刺史楊佺期為雍州刺史敕殷仲堪使回軍九月加會稽王道子黃鉞以世子元顯為征討都督遣王恂將兵討王恭譙王尚之將兵討庾楷尚之大破楷于牛渚楷奔桓元元大破官軍于白石山名在今廬州府無為州西水經注柵口水遵巢湖又東合白石山水即此進至橫江尚之退走道子屯中堂元顯守石頭珣守北郊以備之恭素以才地傲物既殺王國寶自謂威無不行仗劉牢之為爪牙而以部曲將遇之牢之負才懷恨元顯知之遣人説牢之使叛恭事成授以恭位號牢之謂其子敬宣曰恭為帝舅不能翼戴帝室數舉兵向京師吾欲討之何如敬宣曰朝廷雖無成康之美亦無幽厲之惡而恭恃其兵威暴蔑王室大人與恭親非骨肉義非君臣今日討之于情義何有參軍何淡之知其謀以告恭恭不信更置酒拜牢之為兄精兵堅甲悉以付之恭使牢之帥帳下督顔延為前鋒牢之至竹里山名在江寧府句容縣北元和志山甚傾險行者號翻車峴斬延以降遣敬宣還襲恭恭兵潰亡走為人所獲送京師斬之恭臨刑神色自若謂監刑者曰我暗于信人所以至此然其本心豈不欲忠于社稷耶但令百世之下知有王恭耳詔以牢之代恭為都督刺史鎮京口俄而楊佺期桓元至石頭殷仲堪至蕪湖上表理王恭求誅牢之牢之帥北府之衆馳赴京師軍于新亭佺期元見之皆失色回軍蔡洲在江寧縣西大江中朝廷未知西軍虛實內外憂逼桓修字承祖沖之子言于道子曰今若以重利啖元及佺期二人必內喜元能制仲堪佺期可使倒戈取仲堪矣道子納之以元為江州刺史佺期為雍州刺史黜仲堪為廣州刺史遣使宣詔敕使回軍仲堪得詔書大怒趣元佺期進軍元等喜于朝命欲受之仲堪遽自蕪湖南歸且諭散蔡洲軍士元等大懼追仲堪及之尋陽乃以子弟交質而盟連名上疏申理王恭求誅劉牢之及譙王尚之並訴仲堪無罪朝廷深憚之復以荆州還仲堪仲堪等受詔推元為盟主各還所鎮冬十月燕長樂王盛稱皇帝盛稱帝未幾復自貶號稱庶人天王十二月魏王圭稱皇帝魏王圭命吏部郎鄧淵字彥海安定人立官制協音律儀曹郎董謐清河人制禮儀三公郎王德定律令太史令鼂崇考天象尚書崔宏總而裁之以為永式十二月圭即皇帝位命朝野皆束髮加帽追尊逺祖毛以下二十七人皆為皇帝倣古制定郊廟祭享禮樂又用崔宏議自謂黃帝之後以土德王徙六州二十二郡守宰豪傑二千家于代都東至代郡胡三省注此依漢郡而言漢代郡治桑乾故城在今宣化府蔚州西及善無漢縣後魏為郡故城在今山西朔平府右玉縣南極陰館注見前北盡參合漢縣晉廢魏復置故城在今朔平府左雲縣皆為畿內其外四方四維置八部帥以監之妖人孫泰琅邪人謀亂伏誅初泰學妖術于杜子恭錢塘人士民多奉之王珣惡之流泰于廣州王雅薦于孝武帝云知養性之方召還纍官至新安太守泰知晉祚將終以討王恭為名收兵聚貨謀作亂會稽內史謝輶發其謀會稽王道子誘而斬之并其六子兄子恩逃入海愚民猶以為泰蟬蛻不死就海中資給之恩乃聚合亡命得百餘人以謀復仇御批厯代通鑑輯覽卷三十四

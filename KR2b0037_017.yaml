front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷十八漢孝元皇帝癸酉初元元年春正月葬孝宣皇帝杜陵在西安府咸寧縣東南考漢書帝本紀凡書葬皆曰葬某陵孝宣葬于元帝元年故特書諡以别今依之
  hash: sha256:e618488097fe274a67317baa417a515f36e7d43f5122a3fc0b039531ab838aee

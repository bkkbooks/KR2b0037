front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷九周威烈王綱目于王年下分注七國紀年今惟建國初立則附注其有名可考者書某君某元年其史本無名者書某君元年戊寅二十三年初命晉大夫魏斯是為文侯趙籍獻子浣之子是為烈侯韓虔武子啓章之子是為景侯為諸侯考魏斯立已二十一年趙籍韓虔立各六年是歲始建國為侯
  hash: sha256:6ae5f30097d78c8cac2f4dd4bd4a4748a3cb67772836571e5ef3573e2300e602

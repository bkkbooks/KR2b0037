front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷四十三南北朝辛梁中大通三年魏節閔帝恭亥普泰元年廢帝朗中興元年春二月魏爾朱世隆廢其主煜而立廣陵王恭廣陵王羽之子是為節閔帝
  hash: sha256:a7d8b65f09f15d5e86a059a4e917d32d75e6eef9bcccca7c4dc979e1a0119d29

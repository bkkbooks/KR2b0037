front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷十七漢孝昭皇帝辛丑元鳳元年應劭曰以鳳凰下冠元春三月徴有行義者韓福等至長安賜帛遣歸
  hash: sha256:cd59859a1766d3e17ccd4b46c47f7ef3c4eef5766969fd97b4489c26e4a2023f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_016-1a, image: WYG0335/WYG0335-0412a.png}
body:
  text: 賜郡國所選有行義者韓福等五人帛各五十匹遣歸詔曰朕閔勞以官職之事其務修孝弟以教鄉里令郡縣以正月賜羊酒有不幸者賜衣被一襲祠以中牢秋七月乙亥晦日食九月鄂邑長公主燕王旦上官桀安等謀反皆伏誅上官桀父子為丁外人求封侯霍光不許又為外人求光祿大夫欲令得召見又不許長主以是大怨光而桀安亦慙自武帝時桀位在光右及是皇后親安女光乃其外祖而顧専治朝事由是與光爭權燕王旦常懷怨望桑𢎞羊欲為子弟得官亦怨恨光于是蓋主桀安𢎞羊皆與旦通謀詐令人為燕王上書言光出都肄郎羽林都試肄習謂大閲試習武備也道上稱蹕又擅調益莫府校尉莫府大將軍府也専權自恣疑有非常候伺光出沐日奏之桀欲從中下其事𢎞羊當與諸大臣共執退光書奏帝不肯下明旦光聞之止畫室中室中有武帝所賜周公負成王之圖畫不入上問大將軍安在桀對曰以燕王告其罪故不敢入有詔召大將軍光入免冠頓首謝上曰將軍冠朕知是書詐也將軍無罪光曰陛下何以知之上曰將軍之廣明亭名之往也都郎屬耳屬近也言近日事也調校尉以來未能十日燕王何以知之且將軍為非不須校尉是時帝年十四尚書左右皆驚而上書者果亡捕之甚急桀等懼白上小事不足遂上不聽後桀黨與有譖光者上輒怒曰大將軍忠臣先帝所屬以輔朕身敢有毁者坐之自是不敢復言桀等謀令長公主置酒請光伏兵格殺之因廢帝而立燕王旦旦以語相平燕王之相名平平曰左將軍素輕易車騎少而驕臣恐其不能成又恐既成反大王耳旦不聽安果謀誘燕王至而誅之因廢帝而立桀會蓋主舍人父燕燕以國為氏倉知其謀以告大司農楊敞華隂人敞素謹畏事乃移病卧以告杜延年延年以聞九月詔捕桀安𢎞羊外人等并宗族悉誅之蓋主燕王皆自殺皇后以年少不與聞以霍光外孫得不廢燕太子建蓋主子文信赦為庶人冬十月以張安世張湯子字子孺為右將軍杜延年為太僕大將軍光以朝無舊臣安世自先帝時為尚書令志行純篤乃白用安世為右將軍兼光祿勳以自副焉初武帝幸河東亡書三篋詔問莫能知惟安世識之具作其事後購得書以相校無所遺失帝奇其材擢為光祿大夫至是光益親重之又以延年有忠節擢為太僕右曹給事中光持刑罰嚴延年常輔之以寬吏民上書言便宜輒下延年平處覆奏癸卯三年春三月泰山石立上林僵栁復起生泰山有大石自起立丐丐有數千人聲民視之有大石自立髙大五尺大四十八圍入地深八尺三石為足上林有僵栁自起生有蟲食栁葉成文字曰公孫病已立符節令眭孟魯國蕃人上書言大石自立僵栁復起必有匹庶為天子當求賢人禪帝位以順天命坐設妖言惑衆伏誅後五年宣帝立徴孟子為郎冬遼東烏桓反遣將軍范明友將兵擊之初冒頓破東胡東胡餘衆散保烏桓亦曰烏丸遼史地理志烏州有烏丸山今阿祿科爾沁西北有烏聨山或曰即烏丸山及鮮卑山在今喀爾沁右翼為二族世役屬胸奴武帝擊破胸奴左地因徙烏桓于上谷漁陽右北平遼東俱漢郡注見前塞外偵察胸奴動靜置護烏桓校尉監領之使不得與胸奴交通至是部衆漸強遂反漢得胸奴降者言胸奴方發二萬騎擊烏桓霍光欲邀擊之以問護軍都尉趙充國充國以為烏桓間數犯塞今胸奴擊之于漢便又胸奴希寇盜北邊幸無事蠻夷自相攻擊而發兵要之招寇生事非計也光更問中郎將范明友明友言可擊于是拜明友為度遼將軍將二萬騎出遼東胸奴引去初光戒明友不空出即後胸奴遂擊烏桓明友乘烏桓敝擊之斬獲甚衆胸奴由是恐不敢復出兵明年封明友為平陵侯甲辰四年春正月帝冠丞相千秋卒諡曰定以王欣濟南人為丞相封宜春侯千秋居丞相政事一決大將軍光千秋謹厚自守而已千秋年老上優之朝見得乘小車入宫殿中故因號曰車丞相夏五月孝文廟正殿火上及羣臣皆素服發中二千石將五校將作大匠屬有左右前後中五校令作治六日成遣使誘樓蘭王安歸殺之初樓蘭王死胸奴先聞之遣其質子安歸歸得立為王漢詔令入朝王辭不至復為胸奴反間數遮殺漢使駿馬監傅介子北地義渠人使大宛詔因令責樓蘭王王謝服介子還謂大將軍曰樓蘭數反覆而不誅無所懲艾願往刺之以威示諸國大將軍白遣之介子齎金幣揚言以賜外國為名至樓蘭王貪漢物來見介子與坐飲醉謂曰天子使我私報王王起隨介子入帳中壯士二人從後刺之遂斬其首馳傳詣闕縣北闕下立其弟在漢者尉屠耆為王更名其國為鄯善復遣吏士田其國伊循城鄯善地名以填撫之封介子為義陽侯乙巳五年夏大旱冬大雷丞相欣卒諡曰敬丙午六年冬十一月以楊敞為丞相封安平侯丁未元平元年春二月減口賦錢十三漢儀注民年七嵗至十四出口賦人二十三錢二十錢以食天子其三錢者武帝加口錢以補車騎馬詔曰天下以農桑為本日者省用罷不急官謂非要職減外繇耕桑者益衆而百姓未能家給朕甚愍焉其減口賦錢有司奏請減十三上許之有流星大如月衆星隨西行夏四月帝崩大將軍光承皇后詔迎昌邑王賀詣長安六月入即位尊皇后曰皇太后帝崩無嗣時武帝子獨有廣陵王胥羣臣欲立之胥本以行失道先帝所不用大將軍光不自安郎有上書言周太王廢太伯立王季文王舍伯邑考立武王惟在所宜雖廢長立少可也廣陵王不可以承宗廟言合光意光即日承皇后詔迎昌邑王賀詣長安邸賀昌邑哀王髆之子素狂縱動作無節武帝之喪遊獵不止中尉王吉字子陽琅邪臯虞人切諫吉曰大王不好書術而樂逸遊非所以全壽命之宗又非所以進仁義之隆也皇帝仁聖至今思慕未怠于宫館囿池弋獵之樂未有所幸大王宜夙夜念此以承聖意諸侯骨肉莫親大王于屬則子于位則臣一身而二任之責加焉恩愛行義孅介有不具者于以上間非監國之福也王乃下令曰中尉甚忠數輔吾過使賜牛肉酒脯而放縱自若郎中令襲遂字少卿山陽人忠厚剛毅有大節內諫諍王外責傅相引經義陳禍福至於涕泣蹇蹇亡已請選郎通經有行義者與王起居坐則誦詩書立則習禮容王許之數日皆逐去王嘗見大白犬頸以下似人冠方山冠以問遂遂曰此天戒言在側者盡冠狗也去之則存不去則亡矣又見大熊左右莫見以問遂遂曰山野之獸來入宫室宫室將空危亡象也王仰天嘆曰不祥何為數來遂叩頭曰臣不敢隱忠數言危亡之戒大王不悅夫國之存亡豈在臣言哉願王內自揆度大王誦詩三百五篇人事浹王道備王之所行中詩一篇何等也王終不改及徵書至夜漏未盡一刻以火發書日中發晡時至定陶行百三十五里王吉奏書戒王曰臣聞髙宗諒暗三年不言今大王以喪事徵宜日夜哭泣悲哀而已慎無有所發大將軍仁愛勇智忠信之德天下莫不聞願大王事之敬之政事一聽之大王垂拱南面而已王到霸上大鴻臚郊迎騶奉乘輿車王使遂驂桑至廣明東都門遂曰禮奔喪望見國都哭王曰吾嗌痛不能哭至城門遂復言王曰城門與郭門等耳且至未央宫東闕遂曰昌邑帳在是大王宜下車鄉闕西面伏哭盡哀止王曰諾到哭如儀六月受璽綬襲尊號葬平陵在西安府咸陽縣東北賀善贊曰昭帝初元即遣使問民疾苦斷賑貸種食後又罷榷酤官減口賦錢然後虛耗之民始有生意昭帝于是可謂善繼矣昌邑王有罪大將軍光率羣臣奏太后廢之昌邑王淫戲無度大將軍光憂悶以問故吏大司農田延年字子賔本齊諸田後徙陽陵延年曰將軍為國柱石審此人不可何不建白太后更選賢而立之光曰今欲如是于古嘗有此不延年曰伊尹相殷廢太甲以安宗廟後世稱其忠將軍若能行此亦漢之伊尹也光乃引延年給事中隂與張安世圖計王出遊光祿大夫夏侯勝當乘輿前諌曰天久隂而不雨臣下有謀上者陛下出欲何之王怒縛勝屬吏光讓安世以為泄語安世實不言乃召問勝勝言在洪範傳曰皇之不極厥罰恆隂時則下人有伐上者惡察察言光安世大驚以此益重經術士魯夏侯勝字長公東平人既定議召丞相御史將軍列侯中二千石大夫博士會議未央宫光曰昌邑王行昏亂恐危社稷如何羣臣皆驚愕失色莫敢發言延年離席按劒曰先帝屬將軍以幼孤寄將軍以天下以將軍忠賢能安劉氏也今羣下鼎沸社稷將傾且漢之傳諡常為孝者以長有天下令宗廟血食也如漢家絶祀將軍雖死何面目見先帝于地下乎今日之議不得旋踵羣臣後應者臣請劒斬之光謝曰九卿責光是也于是議者皆叩頭曰唯大將軍令光即與羣臣俱見白太后太后乃幸未央承明殿詔諸禁門毋內昌邑羣臣安世將羽林騎收縛二百餘人皆送廷尉詔獄光敕左右謹宿衛卒有物故自裁令我負天下有殺主名盛服坐武帳中侍御數百人皆持兵期門武士陛戟陳列殿下羣臣以次上殿召昌邑王伏前聽詔尚書令讀奏曰丞相臣敞等昧死言孝昭皇帝早棄天下遣使徵昌邑王典喪服斬衰無悲哀之心廢禮誼居道上不素食使從官略女子載衣車內所居傳舍受璽大行前就次發璽不封從官更持節引內昌邑騶宰官奴與居禁闥內敖戲發樂府樂器擊鼓歌吹作俳倡召內泰一宗廟樂人祭泰一樂人也悉奏衆樂與孝昭皇帝宫人蒙等淫亂太后曰止為人臣子當悖亂如是邪王離席伏尚書令復讀曰祖宗廟祠未舉為璽書使使者持節以三太牢祠昌邑哀王園廟稱嗣子皇帝受璽以來二十七日使者旁午持節詔諸官署徵發凡一千一百二十七事荒淫迷惑失帝王禮誼亂漢制度臣敞等數進諫不變更日以益甚恐危社稷天下不安臣敞等謹與博士議皆曰五辟刑也之屬莫大不孝宗廟重于君王不可以承天序奉祖宗廟子萬姓當廢臣請有司以一太牢具告祠髙廟皇太后詔曰可光令王起拜受詔脫其璽組奉上太后扶王下殿出金馬門就乘輿副車光送至邸謝曰王行自絶于天臣寧負王不敢負社稷願王自愛涕泣而去羣臣奏請徙王賀房陵漢縣故城在今湖北鄖陽府房縣詔歸賀昌邑賜湯沐邑二千户國除為山陽郡昌邑羣臣坐在國時不舉王罪過令漢朝不聞知又不能輔道陷王大惡皆下獄誅殺二百餘人唯中尉吉郎中令遂得減死髠為城旦師王式繫獄當死使者責曰師何以無諌書式對曰臣以詩三百五篇朝夕授王至于忠臣孝子之篇未嘗不為王反覆誦之也至于危亡失道之君未嘗不流涕為王深陳之也臣以三百五篇諌是以無諌書亦得減死論光以太后省政宜知經術白令夏侯勝用尚書授太后遷勝長信少府賜爵關內侯王式東平新桃人秋七月迎武帝曾孫病已入即位初衛太子納史良娣太子妃有三等曰妃曰良娣曰孺子生子進號史皇孫以外家姓稱之也皇孫納王夫人名翁須涿郡廣望人生子病已號皇曾孫生數月遭巫蠱事太子男女妻妾皆受害獨皇曾孫在亦坐收繫郡邸獄故廷尉監丙吉丙氏出邴以邑為氏後去邑吉字少卿魯國人受詔決獄心知太子無事實重哀皇曾孫無辜擇謹厚女徒胡組郭徵卿令乳養吉日再省視望氣者言長安獄中有天子氣武帝遣使者分條中都官詔獄漢儀注長安中諸官府獄三十六所繫者無輕重皆殺之夜到郡邸獄吉閉門不納曰他人無辜死者猶不可況親曾孫乎使者不得入還以聞武帝亦寤曰天使之也因赦天下吉聞史良娣有母貞君及兄恭乃載皇曾孫付之後有詔掖庭養視上屬籍宗正時掖庭令少府屬張賀嘗事衛太子思顧舊恩哀曾孫奉養甚謹欲以女孫妻之賀弟安世為右將軍輔政怒曰曾孫乃衛太子後也勿復言豫女事時暴室漢官儀暴室主宫人疾病者有罪亦就此嗇夫許廣漢昌邑人為郎以罪下蠶室有女賀以家財聘之曾孫因依廣漢兄弟及史氏受詩于東海澓中翁澓姓中翁名髙材好學然亦喜遊俠鬬雞走狗上下諸陵周遍三輔以是具知閭里姦邪吏治得失及是吉奏記光曰今社稷宗廟羣生之命在將軍之一舉竊伏聽之衆庶其所言諸侯宗室在列位者未有所聞也而武帝曾孫名病已在掖庭外家者十八九年矣通經術有美材行安而節和願將軍詳大義參以蓍龜先使入侍令天下昭然知之然後法定大䇿天下幸甚七月光會丞相以下議定所立遂上奏曰孝武皇帝曾孫病已年十七師授詩論語孝經躬行節儉慈仁愛人可以嗣孝昭皇帝後承祖宗子萬姓皇太后詔曰可光遣宗正德辟疆子字路叔迎曾孫就齋宗正府明日入未央宫見太后封為陽武侯羣臣奉上璽綬即皇帝位謁髙廟侍御史嚴延年字次卿東海下邳人劾奏大將軍光擅廢立無人臣禮不道奏雖寢然朝廷肅然敬憚之九月大赦天下丞相敞卒諡曰敬以蔡義河內溫人為丞相封陽午侯先是大將軍光與張安世謀廢立議已定遣田延年報敞敞驚懼不知所言汗出洽背徒唯唯而已敞夫人司馬遷女也遽從東廂與延年參語許諾請奉大將軍莫府遂共廢昌邑王而立帝義先以明經給事大將軍莫府昭帝召見説詩悅之擢光祿大夫及是敞卒義代為丞相時義年已八十餘貌似老嫗議者謂光置宰相茍可專制者光曰以為人主師當為宰相何謂云云冬十一月立皇后許氏公卿議立皇后皆心擬霍將軍女亦未有言上乃詔求微時故劒大臣知指白立許倢妤為皇后霍光以后父廣漢刑人不宜君國歲餘乃封為昌成君皇太后歸長樂宫長樂宫初置屯衛中宗孝宣皇帝本名病已後更名詢武帝曾孫戾太子孫也以太子故事具前初居民間率常在下杜卧居數有光耀每買餅所從買家輒大讐亦以是自怪霍光既廢昌邑王遂迎立之戊申本始元年春大將軍光請歸政不受詔有司論定策安宗廟功大將軍光等皆益封光稽首歸政上謙讓不受諸事皆先關白光然後奏御光自昭帝以來子禹及兄孫雲山諸壻外孫黨親連體根據朝廷及是權日益重每朝見上虛己斂容禮下之已甚時富平侯張安世以下益封者十人封侯者五人賜爵關內侯者八人大司農田延年以首發大議封陽城侯已而延年以昭帝之喪詐增車直盜取錢三千萬為怨家所告當就獄延年曰我何面目復入牢獄遂自刎死夏四月地震五月鳳凰集膠東注見前千乘注見前赦天下勿收田租賦帝之世鳳凰集者凡八是年以後四年五月集北海地節二年四月集魯元康元年三月集泰山神爵二年正月集京師四年十月集杜陵十二月集上林甘露三年二月集新蔡皆大赦追諡戾太子戻夫人悼考悼后置園邑詔曰故皇太子在湖未有號諡歲時祠其議諡置園邑有司奏禮為人後者為之子也故降其父母不得祭尊祖之義也陛下為孝昭皇帝後承祖宗之祀親諡宜曰悼母曰悼后故皇太子諡曰戾史良娣曰戾夫人皆改葬焉召黃霸字次公陽夏人為廷尉正初霍光既誅上官桀遂以刑法痛繩羣下由是俗吏皆尚嚴酷而河南丞黃霸獨用寬和為名上在民間時知百姓苦吏急也聞霸持法平乃召以為延尉正數斷疑獄廷中師古曰謂廷尉之中也稱平己酉二年夏尊孝武皇帝廟為世宗所幸郡國皆立廟詔曰孝武皇帝躬仁義厲威武功德茂盛而廟樂未稱朕甚悼焉其與列侯二千石博士議于是羣臣皆曰宜如詔書夏侯勝獨曰武帝雖有攘四夷廣土境之功然多殺士衆竭民財力無德澤于民不宜為立廟樂公卿共難勝曰此詔書也勝曰詔書不可用也人臣之義宜直言正論非茍阿意順指議已出口雖死不悔于是丞相御史劾奏勝非議詔書毁先帝不道丞相長史黃霸阿縱勝不舉劾俱下獄有司遂請尊武帝廟為世宗廟奏盛德文始五行之舞巡狩所幸郡國皆立廟勝霸既久繫霸欲從勝受尚書勝辭以罪死霸曰朝聞道夕死可矣勝賢其言遂授之秋遣將軍田廣明等將兵及校尉常惠護烏孫兵擊胸奴初烏孫公主死漢復以楚王戊之孫解憂為公主妻岑陬岑陬死以國與季父大祿子翁歸靡號肥王復尚楚主生元貴靡公主及昆彌皆上書言胸奴復連發大兵侵擊烏孫欲隔絶漢惟天子出兵救之乃大發兵遣廣明等五將軍田廣明為祁連將軍趙充國為蒲類將軍田順為虛牙將軍及度遼將軍范明友前將軍韓增凡五將軍十六萬騎分道並出使常惠持節護烏孫兵共擊胸奴明年夏五月胸奴聞漢兵大出奔逺遁軍遂罷田順不至期廣明逗遛不進皆下吏自殺烏孫昆彌自將五萬騎與常惠從西方入獲名王騎將以下四萬級馬牛羊驢七十餘萬頭乃封惠為長羅侯其冬單于自將數萬騎擊烏孫會天大雨雪一日深丈餘人畜凍死還者不能什一于是丁令乘弱攻其北烏桓入其東烏孫擊其西所殺數萬級重以餓死人民什三畜産什五諸國羈屬者皆瓦解攻盜不能理胸奴大虛弱滋欲鄉和親而邊境少事矣庚戌三年春正月大將軍光妻顯弒皇后許氏葬杜陵時霍光夫人顯欲貴其小女成君道無從會許后當娠病顯使女醫淳于衍投毒藥去之衍即搗附子齎入長定宫皇后免身後衍取附子并合太醫大丸以飲皇后有傾曰我頭岑岑也藥中得無有毒對曰無有遂加煩悶崩後有人上書告諸醫侍疾無狀者皆收繫詔獄顯恐急即具語光曰既失計為之無令吏急衍光大驚欲自舉發不忍奏上光署衍勿論顯因勸光內其女入宫夏六月丞相義卒諡曰節以韋賢字長孺魯國鄒人為丞相封扶陽侯魏相字弱侯濟隂定陶人為御史大夫以趙廣漢字子都蠡吾人為京兆尹初廣漢為潁川注見前太守其俗豪傑相朋黨廣漢為缿筒音項同缿如瓶筒斷竹也皆為小孔可入而不可出受吏民投書使相告訐于是姦黨散落及為京兆尤善鈎距如釣鈎之有距吞之則順吐之則逆使人入其術中而不能出也以得事情閭里銖兩之姦皆知之其發姦摘伏如神自漢興治京兆者莫能及然廣漢好用世吏子孫新進年少者見事風生無所回避卒以此敗先是廣漢以私怨論殺男子榮畜人上書言之事下丞相御史按驗會丞相有婢自絞死廣漢疑丞相夫人殺之欲因此脅丞相毋令窮竟已事丞相按之愈急廣漢乃將吏卒入丞相府召其夫人跪庭下受辭收奴婢十餘人去丞相上書自陳事下廷尉治婢實以過遣出至外第死不如廣漢言上惡之下廣漢廷尉獄竟坐要斬事在元康元年丞相魏相也廣漢廉明威制豪強小民得職下獄時吏民守闕號泣者數萬人既死百姓追思歌之辛亥四年春三月立大將軍光女為皇后初許后起微賤登至尊日淺從官車服甚節儉及霍后立輿駕侍從益盛賞賜官屬以千萬計與許后時大懸絶矣夏四月郡國四十九地震或山崩水出北海琅邪壞祖宗廟帝素服避殿詔問經學及舉賢良方正之士以夏侯勝為諫大夫黃霸為揚州刺史上以地震釋勝霸而用之勝為人質朴守正簡易無威儀或時謂上為君誤相字于前上亦以是親信之嘗見出道上語上聞而讓勝勝曰陛下所言善臣故揚之堯言布于天下至今見誦臣以為可傳故傳耳朝廷每有大議上謂曰先生建正言無懲前事後為長信少府遷太子太傅年九十卒太后素服五日以報師傅之恩壬子地節元年春有星孛于西方冬十二月癸亥晦日食以于定國字曼倩東海郯人為廷尉定國為廷尉乃迎師學春秋備弟子禮為人謙恭雖卑賤皆與鈞禮其決獄平法務在哀矜寡罪疑惟輕加審慎之心朝廷稱之曰張釋之為廷尉天下無寃民于定國為廷尉民自以不寃初定國父于公為縣獄史決獄平東海有孝婦少寡養姑甚謹姑欲嫁之終不肯姑謂鄰人曰婦無子守寡我老久纍丁壯奈何遂自經死姑女告婦殺毋婦不能辨誣服于公爭之不得婦論死東海旱三年後太守因公言致祭立兩公治門閭謂曰可髙大令容駟馬髙蓋我治獄多隂德子孫必有興者及是定國果貴顯癸丑二年春三月大司馬大將軍博陸侯霍光卒諡曰宣成光病車駕自臨問為之涕泣光上書謝恩願分國邑封兄孫山為列侯即日拜光子禹為右將軍光卒賜葬具如乘輿制度置園邑三百家夏四月以張安世為大司馬車騎將軍領尚書事魏相上封事曰聖主褒有德以懷萬方顯有功以勸百寮是以朝廷尊榮今新失大將軍宜顯明功臣以填藩國毋空大位以塞爭權車騎將軍安世忠信謹厚國家重臣也宜尊其位上亦欲用之安世深辭不能得乃拜大司馬車騎將軍領尚書事以霍山為奉車都尉領尚書事御史大夫魏相給事中上思報大將軍德乃封光兄孫山為樂平侯使以奉車都尉領尚書事魏相因許廣漢奏封事言春秋譏世卿惡宋三世為胡三省曰當作無大夫公羊傳宋三世無大夫三世內娶也注內娶大夫女也禮不臣妻之父母宋以內娶故言無大夫也及魯季孫之専權皆危亂國家自後元以來祿去王室政由冢宰今光死子復為右將軍兄子秉樞機昆弟諸壻據權勢在兵官夫人顯及諸女皆通籍長信宫或夜詔門出入驕奢放縱恐寖不制宜有以損奪其權破散隂謀以固萬世之基全功臣之世又故事諸上書者皆為二封署其一曰副領尚書者先發副封所言不善屏去不奏相復因許伯即廣漢白去副封以防壅蔽帝善之詔相給事中帝興于閭問知民事之囏難自霍光卒後始親政務勵精為治五日一聽事自丞相以下各奉職而進樞機周密品式備具上下相安莫有茍且之意及拜刺史守相輒親見問觀其所繇退而考察所行有名實不相應必知其所以然常稱曰凡庶民所以安其田里而無歎息愁恨之聲者政平訟理也與我共此者其惟良二千石乎以為太守吏民之本數變易則下不安民知其將久不可欺罔乃服從其教化故二千石有治理效輒以璽書勉勵增秩賜金或爵至關內侯公卿缺則選用之漢世良吏于斯為盛甲寅三年春三月賜膠東相王成爵關內侯詔曰膠東相王成勞來不怠流民自占八萬餘口治有異等之效其賜成爵關內侯秩中二千石後詔問郡國上計長史守丞以政令得失或對言前膠東相成偽自增加以蒙顯賞是後俗吏多為虛名云夏四月立子奭為皇太子即元帝共哀許皇后生霍顯聞立太子怒不食曰此乃民間時子安得立即后有子反為王邪復教后毒太子數召賜食保阿輒先嘗之后挾毒不得行五月丞相賢致仕賢以老病乞骸骨賜黃金安車駟馬罷就第丞相致仕自賢始賢為人質朴少欲篤志于學兼通禮尚書以詩教授號稱鄒魯大儒年八十二卒諡曰節少子元成復以明經厯仕故鄒魯諺曰遺子黃金滿籝不如一經六月以魏相為丞相封髙平侯丙吉為御史大夫上方練羣臣核名實而相總領衆職與丙吉同心輔政上皆重之以疏廣字仲翁東海蘭陵人為太子太傅廣兄子受字公子為少傅太子外祖父平恩侯許伯以為太子少白使其弟中郎將舜監護太子家上以問廣廣對曰太子國儲副君師友必于天下英俊不宜獨親外家且太子官屬已備復使舜護太子家示陋非所以廣太子德于天下也上善其言以語魏相相免冠謝曰此非臣等所能及也廣由是見器重太子每朝太傅在前少傅在後父子並為師傳朝廷以為榮大雨雹以蕭望之字長倩蘭陵人為謁者京師大雨雹大行丞蕭望之上疏言陛下思政求賢堯舜之用心也然而善祥未臻隂陽不和是大臣任政一姓専權之所致也附枝大者賊本心私家盛者公室危惟陛下躬萬幾選同姓舉賢才以為腹心與參政謀明陳其職以考功能則庶事理矣上素聞望之名拜為謁者時上博延賢俊多上書言便宜輒下望之問狀髙者請丞相御史次者中二千石試事滿歲以狀聞下者報聞或罷歸田里所白處奏皆可秋九月地震詔曰乃者地震朕甚懼焉有能針朕過失以匡不逮毋諱有司朕既不德不能附逺是以邊境屯戍未息今復飭兵重屯久勞百姓非所以綏天下也其罷車騎右將軍屯兵池籞禁苑也未御幸者假與貧民郡國宫館勿復修治流民還歸者假公田貸種食且勿算事謂不出算賦不給徭役以張安世為衛將軍諸軍皆屬以霍禹為大司馬罷其屯兵上頗聞霍氏毒殺許后而未察乃徙光諸壻為他官未央衛尉范明友為光祿勳中郎將羽林監任勝為安定太守長樂衛尉鄧廣漢為少府收其印綬更以張安世為衛將軍兩宫未央長樂衛尉城門十二門屯兵北軍八校兵屬焉以霍禹為大司馬冠小冠亡印綬特使禹官名與光俱大司馬者罷其屯兵官屬諸領胡越騎羽林及兩宫衛將屯兵悉易以所親信許史子弟代之冬十二月置廷尉平員四人有左右初孝武使張湯趙禹之屬條定法令作見知故縱監臨部主之法或見或知而不舉告為故縱而所監臨部主亦有罪并連坐也緩深故之罪時欲急刑吏深害及故入人罪者皆寬緩之急縱出之誅吏釋罪人疑以為縱出則急誅之其後姦猾巧法轉相比必利反況禁罔寖密律令煩苛文書盈于几閣典者不能遍睹是以郡國承用者或罪同而論異姦吏因緣為市所欲活則傅生議所欲陷則豫死比議者咸寃傷之上在閭閻知其若此會廷尉史路溫舒字長君巨鹿東里人上書言之略曰夫獄者天下之大命也死者不可復生絶者不可復屬書曰與其殺不辜寧失不經今治獄吏則不然上下相驅以刻為明深者獲公名平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死是以人血流離刑徒比肩大辟之計嵗以萬數此仁聖之所傷也夫人情安則樂生痛則思死捶楚之下何求而不得故囚人不勝痛則飾辭以示之吏治者利其然則指導以明之上奏畏卻則煆鍊而周內之蓋奏當之成雖咎繇聽之猶以為死有餘辜何則成鍊者衆文致之罪明也故俗語云畫地為獄議不入刻木為吏期不對此皆疾吏之酷悲痛之辭也惟陛下省法制寬刑罰則太平之風可興于世上善其言詔以廷史任輕祿薄置廷尉平每季秋請讞時上幸宣室齋居而決事獄刑號為平矣涿郡太守鄭昌上言今明主躬垂明聽雖不置廷平獄將自正若開後嗣不若刪定律令律令一定愚民知所避姦吏無所弄權帝未及修正侍郎鄭吉會稽人擊車師破之因田其地車師王與胸奴結婚教胸奴遮漢鄭吉將免刑罪人田渠犂注見前發諸國兵及所將田士共擊車師破之車師王請降吉等歸渠犂車師王恐胸奴兵復至奔烏孫胸奴更以王昆弟兜莫為王收其餘民東徙吉使吏卒往田車師地以實之乙卯四年春二月賜外祖母號為博平今縣屬山東東昌府君上初即位數遣使求外家至是得王媪及其男無故武賞賜巨萬皆封列侯無故平昌侯武樂昌侯詔有大父母父母喪者勿繇詔曰百姓遭凶而繇使不得葬傷孝子之心自今勿繇使得送終盡其子道是夏又詔自今子匿父母妻匿夫孫匿大父母者皆勿治夏五月山陽漢郡昌邑國改注見前濟隂漢郡治定陶注見前雨雹雹大如雞子深二尺五寸殺人飛鳥皆死秋七月霍氏謀反伏誅夷其族皇后霍氏廢霍顯及禹山雲自見日侵削數相對啼泣自怨山曰今丞相用事縣官信之盡變易大將軍時法令發揚大將軍過失又諸儒生多窶人子逺客飢寒喜妄説狂言不避忌諱大將軍常讐之今陛下好與儒生語人人自書封事多言我家者又聞民間歡言霍氏毒殺許后寧有是耶顯恐急即具以實告禹山雲驚曰縣官斥逐諸壻用是故也此大事誅罰不小奈何于是始有邪謀會雲舅李竟坐與諸侯王交通辭語及霍氏有詔雲山不宜宿衛免就第時山陽太守張敞上封事曰乃者大將軍決大計安宗廟海內之命斷于掌握方其盛時感動天地侵迫隂陽朝臣宜有明言曰輔臣顓政貴戚太盛君臣之分不明請罷霍氏三侯就第明詔以恩不聽羣臣以義固爭而後許之天下必以陛下為不忘功德而朝臣為知禮霍氏世世無所患苦今朝廷不聞直聲而令明詔自親其文非䇿之得者也今兩侯已出人情不相逺以臣心度之大司馬及其枝屬必有畏懼之心夫近臣自危非完計也臣敞願于廣朝白發其端直守逺郡其路無由惟陛下省察上甚善其訃然不召也敞字子髙河東平陽人禹山等謀令太后為博平君置酒召丞相平恩侯以下使范明友鄧廣漢承太后制引斬之因廢天子而立禹事覺七月雲山明友自殺禹要斬顯及諸女昆弟皆棄市與霍氏相連坐誅滅者數十家皇后霍氏廢處昭臺宫封告者皆為列侯帝初立謁見太廟大將軍光驂乘上嚴憚之若有芒刺在背後張安世代光驂乘上從容肆體甚安近焉故俗傳霍氏之禍萌于驂乘後十二歲霍后復徙雲林館乃自殺初霍氏奢侈茂陵徐福上疏言霍氏泰盛陛下即愛厚之宜以時抑制無使至亡書三上輒報聞至是人為徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更為曲突逺徙其薪不者且有火患主人不應俄而失火鄰里共救之幸而得息于是殺牛置酒謝其鄰人灼爛者坐于上行而不録言曲突者人謂主人曰鄉使聽客之言不費牛酒終無火患今論功而請賔曲突徙薪無恩澤焦頭爛額為上客邪今茂陵徐福數上書言霍氏且有變宜防絶之鄉使福説得行則國無裂土出爵之費臣無逆亂誅滅之敗往事既已而福獨不蒙其功惟陛下察之上乃賜福帛一匹以為郎司馬氏光曰霍光之輔漢室可謂忠矣然而久顓大柄不知避去多置私黨充塞朝廷使人主蓄憤于上吏民積怨于下切齒側目待時而發其得免于身幸矣況子孫以驕侈趨之哉雖然向使孝宣顓以祿秩賞賜富其子孫使之食大縣奉朝請亦足以報盛德矣乃復任之以政授之以兵及事叢釁積更加裁奪遂致怨懼以生邪謀豈徒霍氏之自禍哉亦孝宣醖釀以成之也九月以朱邑字仲卿廬江舒人為大司農邑少為桐鄉在今江南安慶府桐城縣北春秋桐國地嗇夫廉平不苛以愛利為行未嘗笞辱人存問孤老吏民愛敬之遷北海漢郡治營陵故城在今山東青州府昌樂縣太守以治行第一入為大司農惇厚篤于故舊公正不可交以私身為列卿居處儉節祿賜以共族黨家無餘財及卒天子下詔稱揚賜其子金百斤以奉祀邑病且死屬其子曰我故為桐鄉吏其民愛我必葬我桐鄉後世子孫奉嘗我不如桐鄉民及死子從其言桐鄉民果為起冢立嗣嵗時祭祀不絶以龔遂為水衡都尉先是勃海漢郡治浮陽故城在今直𨽻天津府滄州歲飢盜賊並起上選能治者丞相御史舉龔遂拜勃海太守時遂年七十餘召見問何以治盜賊對曰海瀕遐逺不霑聖化其民困于飢寒而吏不恤故使陛下赤子盜弄陛下之兵于潢池中耳今欲使臣勝之邪將安之也上曰選用賢良固欲安之也遂曰臣聞治亂民猶治亂繩不可急也唯緩之然後可治臣願丞相御史無拘臣以文法得一切便宜從事上許焉加賜黃金贈遣乘傳至勃海界郡發兵以迎皆遣還移書敕屬縣罷逐捕吏諸持田器者皆為良民吏毋得問持兵者乃為賊遂單車至府盜賊聞遂教令即時解散棄其兵弩而持鈎鉏于是悉平民安土樂業遂乃開倉廩假貧民選用良吏慰安牧養焉齊俗奢侈好末技不田作遂躬率以儉約勸民務農桑各以口率令口種一樹榆百本薤五十本蔥一畦韭家二母彘五雞民有帶持刀劍者使賣劍買牛賣刀買犢曰何為帶牛佩犢勞來循行郡中皆有畜積獄訟止息至是入為水衡都尉丙辰元康元年夏五月追尊悼考為皇考立寢廟有司奏言悼園史皇孫葬廣明郭北後改奉明園置縣在今西安府長安縣北宜稱尊號曰皇考于是立廟以尹翁歸字子兄音况河東平陽人為右扶風治渭城注見前翁歸為人公亷明察初為東海太守郡中吏民賢不肖及姦邪罪名盡知之縣縣各有記籍自聽其政不委令長也有急名則少緩之吏民少解讀作懈輒披籍披有罪者籍也取人必于秋冬課吏大會中及出行縣于大會之中及行縣時則收取罪人以警衆也不以無事時其有所取也以一警百吏民皆服恐懼改行自新以治郡高第入為右扶風選用亷平疾姦吏以為右職接待有禮好惡與共之其負翁歸罰亦必行課嘗為三輔最然溫良謙退不以行能驕人故尤得名譽于朝廷翁歸之為東海遏辭廷尉于定國定國欲託邑子與翁歸語終日不敢見曰此賢將汝不任事也又不可干以私後三年翁歸病卒家無餘財詔曰翁歸亷平鄉正冶民異等其賜翁歸子黃金百斤以奉祭祀莎車治莎車城去長安九千九百五十里叛衛侯馮奉世字子明上黨潞人矯發諸國兵擊破之時漢數出使西域多辱命不稱于是上選可使外國者前將軍韓增韓王信之後封龍額侯舉奉世以衛侯使持節送諸國客至伊循城注見前會故莎車王弟呼屠徴與旁國共殺其王萬年及漢使者自立為王初烏孫公主少子萬年有寵于莎車王莎車王死而無子時萬年在漢莎車國人計欲自託于漢又欲得鳥孫心上書請萬年為莎車王漢許之遣使者送萬年萬年初立暴惡國人不説至是殺之揚言北道諸國已屬胸奴于是攻劫南道歃盟叛漢從鄯善以西皆絶不通奉世計以為不亟擊之則莎車日強其勢難制必危西域遂以節諭告諸國發其兵進擊莎車攻拔其城莎車王自殺傳首長安更立他昆弟子為莎車王諸國悉平威振西域奉世遂西至大宛大宛聞其斬莎車王敬之異于他使得其名焉象龍而還上甚説議封奉世丞相將軍皆以為可獨蕭望之以奉世奉使有旨而擅矯制違命雖有功勞不可以為後法即封奉世開後奉使者利要功萬里之外為國家生事漸不可長乃以為光祿大夫丁巳二年春二月立偼妤王氏為皇后上欲立皇后懲艾霍氏欲害皇太子乃更選後宫無子而謹慎者立長陵王偼妤為皇后令母養太子封其父奉光為卭成侯奉光之先高祖時有功賜爵關內侯自沛徙長陵奉光嗣爵好鬪雞帝在民間數與會及即位納其女後宫遂立為后夏五月詔二千石察官屬治獄詔曰獄者萬民之命能使生者不怨死者不恨則可謂文吏矣今則不然用法或持巧心析律二端淺深不平增辭飾非以成其罪奏不如實上亡由知二千石各察官屬勿用此人吏或擅興徭役飾厨傳韋昭曰厨謂飲食傳謂傳舍稱過使客稱使客之意而令過去也越職踰法以取名譽譬猶踐薄氷以待白日豈不殆哉今天下頗被疾疫之災其令被災甚者毋出今年租賦胸奴擾車師田者詔鄭吉還屯渠犂胸奴大臣皆以為車師地肥美使漢得之多田積榖必害人國不可不爭數遣兵擊車師田者鄭吉將渠犁田卒救之為胸奴所圍吉上言願益田卒上與趙充國等議欲因胸奴衰弱擊其右地使不敢復擾西域上因魏相諫相曰臣聞救亂誅暴謂之義兵兵義者王敵加于已而起者謂之應兵兵應者勝爭恨小故不忍憤怒者謂之忿兵兵忿者敗利人土地貨寶者謂之貪兵兵貪者破恃國家之大矜民人之衆欲見威于敵者謂之驕兵兵驕者滅此五者非但人事乃天道也間者胸奴當有善意所得漢民輒奉歸之未有犯于邉境雖爭屯田車師不足致意中今聞諸將軍欲興兵入其地臣愚不知此兵何名者也今邉郡困乏難以動兵軍旅之後必有凶年言民以其愁苦之氣傷陰陽之和也出兵雖勝猶有後憂今守相多不實選風俗尤薄水旱不時按今年計子弟殺父兄妻殺夫者凡二百二十二人此非小變也今左右不憂此乃欲報纎介之忿于逺夷殆孔子所謂吾恐季孫之憂不在顓臾而在蕭墻之內也乃遣常惠將騎往車師迎鄭吉吏士還渠犁遂以車師故地與胸奴以蕭望之為左馮翊治高陵注見前初上選博士諫官通政事者補郡國守相望之以諫大夫出為平原太守望之遠為郡守內不自得上疏曰陛下哀愍百姓出諫官以輔郡吏然朝無諍臣則不知過所謂憂其末而忘其本者也已而徴入守少府帝察望之經明持重論議有餘材任宰相欲詳試其政事至是復以為左馮翊望之從少府出為左遷即移病上使侍中諭意曰所用皆更治民以考功君前為平原太守曰淺故復試之于三輔非有所聞也望之即起視事戊午三年春三月封故昌邑王賀為海昏漢縣故城在今江西南康府建昌縣侯上心忌故昌邑王賀賜山陽太守張敞璽書令謹偹盜賊察往來過客毋下所賜書敞于是條奏賀居處衣服言語跪起清狂不惠以著其廢亡之效上乃知賀不足忌封為海昏侯封丙吉等為列侯丙吉為人深厚不伐善自曽孫遭遇絶口不道前恩會掖庭宫婢自陳嘗有阿保之功辭引使者丙吉知狀上親見問然後知吉有舊恩而終不言大賢之初張賀嘗為弟安世稱皇曽孫之材美及徴怪安世輒絶止以為少主在上不宜稱述曽孫及帝即位而賀已死上謂安世曰掖庭令平生稱我將軍止之是也乃下詔曰朕微眇時丙吉御史大夫史曽史元俱中郎將許舜長樂衛尉許延夀侍中光祿大夫皆與朕有舊恩及故掖庭令張賀輔導朕躬修文學經術恩惠卓異厥功茂焉詩不云乎無德不報封賀子彭祖陽都侯賀子平死彭祖安世小男也少與上同席研書及吉博陽侯曽將陵侯元平臺侯舜博望侯延壽樂成侯皆為列侯賜賀諡曰陽都哀侯賀孤孫霸年七嵗賜爵關內侯故人下至郡邸獄復作自故舊以下至于在郡邸獄中復役工作之人皆受官祿田宅財物各以恩深淺報之吉臨當封病上憂其不起夏侯勝曰有隂德者必享其樂今吉未獲報非死疾也果愈安世自以父子封侯在位太盛乃辭祿詔都內别藏張氏無名錢以百萬數文穎曰都內主藏官也夏六月立子欽張偼妤出為淮陽王欽好經書法律聰違有才帝甚愛之疏廣疏受請老賜金遣歸皇太子年十二通論語孝經廣謂受曰吾聞知足不辱知止不殆今宦成名立如此不去懼有後悔即曰俱移病上疏乞骸骨上皆許之加賜黃金二十斤太子贈以五十斤公卿故人設祖道供帳東都門外送者車數百兩道旁觀者皆曰賢哉二大夫或歎息為之下泣廣受歸鄉里日令其家賣金共具請族人故舊賔客與相娛樂或勸以為子孫立産業者廣曰吾豈老悖不念子孫哉顧自有舊田廬令子孫勤力其中足以共衣食今復增益之但教子孫怠惰耳賢而多財則損其志愚而多財則益其過且夫富者衆之怨也吾既無以教化子孫不欲益其過而生怨又此金者聖主所以惠養老臣也故樂與鄉黨宗族共享其賜以盡吾餘日不亦可乎于是族人悅服以潁川太守黃霸守京兆尹尋罷歸故官霸為潁川太守使郵亭鄉官皆畜雞豚以贍鰥寡貧窮者為條教行之民間勸以為善防姦及務耕桑節用殖財種樹畜養初若煩碎然精力能推行之吏民見者語次尋繹問他隂伏因語話之次摉尋紬繹雖其他隂伏之事亦問而知之以相參考聰明識事吏民不敢有所欺姦人去入他郡盜賊日少霸力行教化而後誅罰務在成就安全許丞老病聾督郵白欲逐之霸曰許丞亷吏雖老尚能拜起迎送正頗重聽何傷且善助之無失賢者意或問其故曰數易長吏送故迎新之賣及姦吏因緣絶簿書盜財物公私耗費甚多皆當出于民所易新吏又未必賢或不如其故徒相益為亂凡治道去其奉甚者耳以外寬內明得吏民心户口嵗增治為天下第一徴守京兆尹尋坐法貶秩詔復歸潁川為太守以八百石居官己未四年秋八月求高帝功臣子孫失侯者賜金復其家得槐里即犬邱注見前公乘第八爵周廣漢勃曽孫等百三十六人皆賜黃金二十斤復其家令奉祭祀世世勿絶是年詔年八十以上非誣告殺傷人它皆勿坐又遣大中大夫強等十二人循行天下存問鰥寡覽觀風俗察吏治得失舉茂才異倫之士大司馬衛將軍富平侯張安世卒諡曰敬安世謹慎周密每定大政已決輒移病出聞有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也嘗有所薦其人來謝安世大恨以為舉賢達能豈有私謝邪絶弗復為通有郎功高不調自言安世曰君之功高明主所知人臣執事何短長而自言乎絶不許已而即果遷其欲匿名迹逺權勢如此遣光祿大夫義渠安國義渠西羌戎名後因為氏行邉兵初武帝開河西四郡注見前隔絶羌與胸奴相通之路斤逐諸羌不使居湟中湟水出甘肅西寧塞外東流合浩亹水至蘭州入黃河及帝即位義渠安國使行諸羌先零注見前豪言願時度湟水北逐民所不田處畜牧安國以聞趙充國劾安國奉使不敬是後羌人旁音傍依也緣前言扺冒犯突而前也渡湟水郡縣不能禁既而先零與諸羌種豪解仇交質羌人無大君長諸種豪遞相殺伐故每有仇讐往來相報今解仇交質自相親結欲入漢為冦也上聞之以問充國對曰羌人所以易制者以其種自有豪數相攻擊勢不一也往西羌反時亦先解仇合約胸奴數誘之與共擊張掖酒泉地間者胸奴困于西方謂本始二年為烏孫所破疑其更遣使至羌中與相結臣恐羌變未止宜為之偹後月餘羌侯狼何小月氏種果遣使至胸奴藉猶借也兵欲擊鄯善敦煌以絶漢道充國以為狼何勢不能獨造此計疑胸奴使已至羌中到秋馬肥變必起矣宜遣使者行邉兵敕視諸羌毋令解仇以發覺其謀于是兩府復白遣安國庚申神爵元年應劭曰前年神爵集長樂宫故改元春遣諫大夫王褒字子淵蜀人求金馬碧雞之神如淳曰金形似馬碧形似雞南今雲南府城東有金馬山其西為碧雞山兩山皆有神祠漢使王褒祭此考今雲南府漢為益州郡今四川省漢為益州部舊注金馬碧雞者凡皆以為在成都蓋誤以為益州部為益州郡也時帝始行幸甘泉郊泰畤幸河東祠后土頗修武帝故事以方士言增置神祠聞益州有金馬碧雞之神可醮祭而致乃使褒持節求之初帝以褒有俊才益州刺吏王襄使褒作中和樂職宣布詩工聞襄因奏褒有軼才乃徵褒召見使作聖主得賢臣頌其略曰聖主必待賢臣而𢎞功業俊士必俟明主而顯其德上下俱欲歡然交伒翼乎如鴻毛遇順風沛乎若巨魚縱大壑休徴自至夀考無疆何必偃伸屈伸若彭祖詬噓呼吸如僑松眇然絶俗離世哉是時帝頗好神仙故褒對及之褒于道病死後京兆尹張敞勸上斥逺方士由是悉罷上方待詔諫大夫王吉謝病歸帝頗修飾宫室車服外戚許史王氏貴寵吉上疏曰臣聞宣德流化必自近始左右不正難以化逺故冝謹選左右審擇所使左右所以正身所使所以宣德此其本也古者衣服車馬貴賤有章今上下僣差是以貪財趨利不畏死亡舜湯不用三公九卿之世李竒曰不繼世而爵也而舉臯陶伊尹今俗吏得任子弟率多驕驁無益于民宜明選求賢除任子之令外家及故人可厚以財不冝居位去角抵減樂府省尚方明示天下以儉上以其言為迂濶吉遂謝病歸先零羌楊玉叛夏四月遣後將軍趙充國將兵擊之義渠安國至羌中召先零諸豪尤桀黠者斬之縱兵擊斬千餘級于是歸義羌侯楊玉等怨怒背叛安國失亡車重兵器甚衆引還以聞時充國年七十餘上老之使丙吉問誰可將對曰無踰老臣者矣上問度當用幾人對曰兵難隃式朱切度願馳至金城注見前圖上方略羌戎小夷願陛下以屬老臣勿以為憂上笑曰諾乃發兵遣充國將之以擊西羌六月有星孛于東方秋七月趙充國擊叛羌羌多降詔復遣將軍辛武賢周太史甲封于辛其後以邑為氏武賢狄道人後徙昌陵擊之尋詔罷兵留充國屯田湟中充國至金城須兵滿萬騎欲渡河恐為羌所遮即夜遣三校銜枚先渡渡輒營陳會明畢遂以次盡渡羌數百騎來出入軍傍充國曰擊羌以殄滅為期小利不足貪令軍勿擊而遣騎候四望狹中文穎曰金城有三狹師古曰山峭而夾水曰狹四望狹名也無羌乃引兵進召諸校謂曰吾知羌乃不能為兵矣使彼發數千人守杜四望狹中兵豈得入哉至西部都尉府日饗軍士士皆樂為用羌數挑戰充國堅守初罕幵音罕牽注見前豪靡當兒使弟雕庫來告都尉曰先零欲反後數日果反都尉遂留雕庫充國以為無罪乃遣歸告諭種豪欲以威信招降罕幵及劫略者解散羌謀徼其疲劇乃擊之時內郡兵屯邉者合六萬人酒泉太守辛武賢請以七月分兵出擊罕幵充國以為先零首為叛逆他種劫略故欲捐罕幵暗昧之過先行先零之誅以震動之肯悔過反善因赦其罪選擇良吏撫循和輯此全師保勝之道天子下其書議者咸以先零兵盛而負罕幵之助不先破罕幵先零未可圖也上乃拜許延夀廣漢弟為強弩將軍武賢為破羌將軍以書敕讓充國充國上書陳利害略言先零為冦罕幵未有犯乃釋有罪誅無辜起一難就兩害誠非計也且先零欲叛故與罕幵解仇嘗欲赴罕幵之急以堅其約今先擊罕幵先零必助之交堅黨合迫脅諸小種羌兵寖多誅之用力數倍于臣之計先誅先零則罕幵之屬不煩兵而服矣璽書報從充國計充國乃引兵至先零在所羌久屯聚解弛望見大軍皆駭走欲渡涅水道厄狹充國徐行驅之或曰逐利行速充國曰此窮冦不可迫也緩之則走不顧急之則還致死軍校皆曰善斬獲甚重遂至罕幵令軍毋燔聚落芻牧田中罕羌喜曰漢果不擊我矣豪靡忘來自歸罕竟不煩兵而下其秋充國病詔以破羌將軍為副以十二月進擊先零時羌降者萬餘人矣充國欲罷騎兵屯田以待其敝作奏未上會得進兵璽書其子卬以中即將將支兵使客諫充國曰今兵久不決四夷卒有動搖相因而起雖有智者不能善其後羌獨足憂耶吾固以死守之明主可為忠言遂上屯田奏略曰臣所將吏士馬牛食所用糧穀茭藁調度甚廣難久不解繇役不息恐生他變為明主憂且羌易以計破難用兵碎也故臣愚心以為擊之不便計度臨羌束至浩亹羌族故田及公田民所未墾可二千頃以上其間郵亭多敗壞者臣願罷騎兵留步兵萬二百八十一人分屯要害處繕鄉亭浚溝渠治湟狹以西道橋令可至鮮水左右田出賦人三十畝四月草生發郡騎及屬國降騎各千就草為田者遊兵以充入金城益積畜省大費謹上田處及器用簿淮陛下裁擇臨羌漢縣故城在今甘肅西寧府西寧縣浩亹水出甘州府西番界流徑平畨縣入湟水今曰閣門河鮮水即青海在西寧府西亦曰禾羌海上報曰即如將軍之計敵當何時伏誅兵當何時得決孰計其便復奏充國上狀略曰臣聞帝王之兵以全取勝是以貴謀而賤戰蠻夷習俗雖殊然其欲避害就利愛親戚畏死亡一也今羌亡其美地薦草愁于寄託逺遁骨肉離心人有畔志而明主班師罷兵萬人留田順天時因地利以待可勝之機雖未即伏辜兵決可期月而望臣謹條不出兵留田便宜十二事步兵九校吏士萬人因田致榖威德並行一也排折羌人令不得居肥饒之地貧破其衆二也居民得並田作不失農業三也軍馬一月之費度支田土一嵗罷騎兵以省大費四也至春省甲士卒循河湟漕穀既至臨羌視羌威武五也以間暇時繕冶郵亭充入金城六也令反逆竄于風寒之地離霜露疾疫瘃墮之患坐得必勝之道七也亡經阻逺追死傷之害八也內不損威武之重外不令彼得乘間之藝九也又亡驚動河南大幵小幵使生他變十也冶湟狹中道橋令可至鮮水以制西域信威千里從枕席上過師十一也大費既省繇役豫息以戒不虞十二也留屯田得十二便出兵失十二利唯明詔採擇上復賜報曰兵決可期月而望者謂今冬邪謂何時也將軍獨不計羌聞兵頗罷且丁壯相聚攻擾田者殺略人民將何以止之將軍孰計復奏于是充國又奏略曰臣聞兵以計為本故多算勝少算先零羌精兵不過七八千人失地逺客分散飢凍臣愚以為敵破壞可日月冀故曰兵決可期月而望今騎兵雖罷見留屯田之士萬人從今盡三月敵焉羸瘦必不敢損其妻子于他種中逺涉河山而來為冦亦不敢將其纍重還歸故地臣之愚計所以度羌必且瓦解其處不戰而自破之䇿也至于些小冦盜時殺人民其原未可卒禁臣竊自惟念奉詔出塞引軍逺擊窮天子之精兵散車甲于山野雖無尺寸之功偷得避嫌之便而亡後咎餘責此人臣不忠之利非明主社稷之福也充國奏每上輒下公卿議初是充國計者什三中什五最後什八詔責前言不便者皆頓首服魏相曰臣愚不習兵事利害後將軍數畫軍䇿其言常是臣任其計可必用也上于是報充國嘉納之亦以武賢延壽數言當擊于是兩從其計詔兩將軍中郎將卬出擊降斬各數千人而充國所降復五千餘人詔罷兵獨留充國屯田明年夏五月充國奏言羌本可五萬人凡斬降及溺河湟餓河者遺脫不過四千人羌靡忘等自詭必得顔師古曰詭責也自以為貴必能得之請罷屯兵奏可充國振旅而還所善浩星賜迎説曰衆人皆以破羌強弩出擊羌以破壞然有識者以為羌勢窮困兵雖不出必自服矣將軍即見宜歸功兩將軍如此計未失也充國曰兵藝國之大事當為後法老臣不以餘命一為陛下明言利害卒死誰當復言之者卒以其意對上然其計詔遣辛武賢歸酒泉充國復為後將軍是秋羌先零等斬楊玉首帥四千餘人降初置金城屬國以處降羌辛武賢深恨充國上書告中即將卬泄省中語下吏自殺充國乞骸骨賜安車駟馬罷就第朝廷有大議常與參籌䇿甘露二年卒諡曰壯以張敞為京兆尹初敞為山陽太守會膠東盜賊起敞自請治之拜膠東相明設購賞開羣盜令相捕斬除罪吏追捕有功上名尚書調補縣令者數十人由是盜賊解散王太后膠東頃王音之母數出遊獵敞上書諫太后乃不復出時京兆自趙廣漢後更黃霸等數人不稱職上乃以敞尹京兆敞求得偷盜渠長數人令致諸偷以自贖一日得數百人窮治行法由是市無偷盜敞賞罰分明而以經術自輔不純用誅罰由是能自全時西羌兵起敞請令有罪者入穀邉郡贖罪蕭望之以為令民入穀贖罪是貧富異刑而法不一也敞議逆寢辛酉二年秋九月司𨽻校尉武帝征和四年置以掌徒隸而巡察故名蓋寬饒蓋公盍反齊大夫陳戴食邑于蓋後以為氏寬饒字次公魏郡人自剄北闕下寬饒剛直公清刺舉無所避然刻深與貴戚人為怨又好言事刺譏姦犯上意時帝方用刑法任中書宦官寬饒奏封事曰方今聖道寖微儒術不行以刑餘為周召以法律為詩書又引韓氏易傳言五帝官天下三王家天下家以傳子孫官以傳賢聖書奏帝以為怨謗下其書執金吾本中尉武帝太初元年更名議以寬饒意欲求禪大逆不道諫大夫鄭昌字次卿泰山剛人上書訟之曰寬饒進有憂國之心退有死莭之義上無許史之屬下無金張之託應劭曰許廣漢宣帝皇后父史高宣帝外家金金日磾張張安世言許史有外屬之恩金張自託在于狎近也直道而行多仇少與上書陳事有司劾以大辟臣官以諫為名不敢不言帝竟下寬饒吏寬饒引佩刀自剄北闕下衆莫不憐之先是太子庶子王生豫書寬饒曰自古之治各有制度今君不務循職而欲以太古久逺之事匡拂天子數進不用難聽之語以摩切左右非所以揚令名全夀命也夫君子直而不挺曲而不詘大雅云既明且哲以保其身唯裁省覽寬饒不聼以鄭吉為西域都護胸奴日逐王胸奴屬王號居西邉領西域諸國率其衆降漢胸奴虛閭權渠單于始立黜壺衍鞮單于所幸顓渠閼氏即與右賢王屠者堂私通虛閭權渠死閼氏立右賢王為握衍朐鞮單于虛閭權渠子稽侯㹪既不得立亡歸妻父烏禪幕日逐王先賢撣素與握衍朐鞮有隙即率衆降漢至渠犁與鄭吉相聞吉發諸國五萬人迎日逐王詣京師上封日逐王為歸德侯吉既破車師事見前降日逐威振西域遂并護車師以西北道故號都護都護之置自吉始上封吉為安逺侯吉于是中西域而立莫府治烏壘城去陽關二千七百三十八里其南三百三十里至渠犁督察康居及烏孫等三十六國漢之號令遂班西域矣壬戌三年春三月丞相高平侯魏相卒諡曰憲相明易經有師法數表採易隂陽及明堂月令上之以為隂陽者王事之本羣生之命自古聖賢未有不由者也願選明經通知隂陽者四人各主一時時至明言所職以和隂陽上納用焉好觀漢故事及便冝章奏數條漢興以來國家行事及賢臣賈誼董仲舒等所言奏請施行之敕掾史案事郡國及休告從家還至府輒白四方異聞或有逆賊風雨災變郡不上相輒奏言之視事九嵗卒夏四月以丙吉為丞相先已封博陽侯吉尚寬大好禮讓掾吏有罪輒與長休告務掩過揚善終無所案曰以公府而有案吏之名吾竊陋焉嘗出逄羣鬪死傷不問逄牛喘使問逐牛行幾里矣或譏吉失問吉曰民鬬京兆所當禁宰相不親小事非所當問也方春未熱恐牛近行用暑故喘此時氣失節三公調隂陽職當憂時人以為知大體秋八月益小吏俸詔曰吏不亷平則治道衰今小吏皆勤事而俸祿薄欲無侵漁百姓難矣其益吏百石以下俸十五韋昭曰若食一斛益五斗以韓延夀字長公燕人徙杜陵為左馮翊初延夀為潁川太守承趙廣漢令民告訐之後俗多怨讐延夀教以禮讓召郡中長老為陳和睦親愛消除怨咎之路議定嫁娶喪祭儀品略依古禮不得過法百姓遵用其教已而遷東郡黃霸代之因其迹而大治延夀為吏好古教化所至聘其賢士以禮待用表孝弟有行修治學宫春秋鄉射陳鐘鼓管絃盛升降揖讓接待下吏恩施厚而誓約明在東郡三嵗令行禁止斷獄大減由是入為馮翊蕭望之為御史大夫故以延夀代行縣至高陵民有兄弟訟田延夀大傷之曰幸得偹位為郡表率不能宣明教化至令民有骨肉爭訟咎在馮翊因閉閣思過于是訟者宗族傳相責讓兄弟深自悔願以田相移終死不敢復爭郡中翕然傳相敕厲恩信周遍二十四縣無復以辭訟自言者推其至誠吏民不忍欺紿或告蕭望之延夀在東郡放散官錢千餘萬會御史當問事東郡望之因令并問之延夀聞即部吏案校望之為馮翊時廪犧官錢放散百餘萬移殿門禁止望之望之奏為延夀拘持上不直延夀各令窮竟所考望之卒無事實而延夀以試騎士日車服侍衛奢僣逾制竟坐狡猾不道棄市吏民數千人送至渭城莫不流涕事在五鳯元年癸亥四年夏四月賜潁川太守黃霸爵關內侯霸在郡前後八年政事愈治是時鳯凰神爵數集郡國潁川尤多詔賜爵關內侯詔曰潁川太守霸宣布詔令百姓鄉化孝子悌弟貞婦順孫日以衆多田者讓畔道不拾遺養視鰥寡贍助貧窮獄至八年無重罪囚吏民向于教化興于行誼可謂賢人君子其賜爵關內侯黃金百斤後數月徵霸為太子太傅冬十一月河南太守嚴延年棄市延年隂鷙酷烈冬月傳屬縣囚會論府上流血數里河南號曰屠伯延年素輕黃霸及比郡為守見其以鳯凰褒賞心內不服郡界有蝗府丞義府丞名出行蝗還見延年延年曰此蝗豈鳯凰食邪義年老素畏延年恐中傷乃上書言延年罪因自殺以明不欺事下按驗得怨望誹謗數事坐不道棄市初延年母從東海來到洛陽適見報囚毋大驚便止都亭不肯入府責延年曰幸得偹郡守専治千里不聞仁愛教化有以安全愚民顧多刑殺人欲以立威豈為民父母意哉天道神明人不可獨殺我不意當老見壯子被戮也行矣去汝東歸掃除墓地耳遂去嵗餘果敗東海莫不賢智其母甲子五鳯應劭曰鳯凰五至因以改元元年秋胸奴亂五單于爭立胸奴握衍朐鞮單于暴虐烏禪幕及左地貴人共立稽侯㹪為呼韓邪單于發兵西擊握衍朐鞮握衍朐鞮敗走自殺其弟右賢王立日逐王薄胥堂為屠耆單于于是呼揭王自立為呼揭單于右奧鞬王自立為車犁單于烏藉都尉亦自立為烏藉單于凡五單于時議者多曰胸奴為害日久可因其壞亂舉兵滅之蕭望之曰前單于慕化向善請求和親不幸為賊臣所殺今伐之是乘亂幸災也宜遣使弔問輔其微弱救其災患如復其位必稱臣服從此德之盛也上從其議冬十二月乙酉朔日食丙寅三年春正月丞相博陽侯丙吉卒諡曰定吉病上臨問誰可以自代者吉薦杜延年于定國陳萬年字幼公沛郡相人時為太僕遂卒後三人居位皆稱職上稱吉為知人二月以黃霸為丞相封建成侯霸材長于治民為丞相功名損于治郡京兆尹舍鶡雀顔師曰古鶡音芬或作鳻鳻雀大而色青出羌中飛集丞相府霸以為神雀議欲以聞後知從張敞舍來乃止史高以外屬貴重霸薦髙可太尉帝使尚書召問霸太尉官罷久矣孝武建元元年太尉田蚡免官省故云罷久將相之官朕之任焉高帷幄近臣朕所自親君何越職而舉之霸免冠謝罪丁卯四年春正月廣陵王胥以罪自殺胥使女巫咒詛上求為天子事覺殺女巫以滅口公卿請誅胥胥遂自殺胥立凡六十四年國除糴三輔近郡榖供京師初置常平倉自元康以來比年豐稔榖石五錢大司農中丞耿夀昌奏言歲豐榖賤農人少利故事歲漕關東榖四百萬斛用卒六萬人宜糴三輔𢎞農河東上黨太原郡榖供京師可省漕卒過半又白令邉郡皆築倉榖賤增其價而糴以利農穀貴時減價而糶名曰常平倉民便之詔賜夀昌爵關內侯夏四月辛丑朔日食殺故平通侯楊惲丞相敞子以先發霍禹謀反封侯惲輕財好義亷潔無私然伐其行能好發人隱伏由是多怨于朝廷與太僕戴長樂相善既而相失長樂上書告惲妄引亡國誹謗當世惲言秦時但任小臣誅殺忠良竟以滅亡令親任大臣即至今耳古與今如一邱之貉無人禮臣又以主上為戲語尤悖逆惲又言正月以來天隂不雨此即夏侯君所言行不至河東矣上不忍加誅免為庶人事在二年惲既失位家居以財自娛其友人孫會宗安定太守西河人與書為言大臣廢退當閣門惶懼不當治産業通賔客有稱譽惲少顯朝廷一朝以暗昧語言見廢內懷不服報會宗書略言竊自思念過已大矣行已虧矣長為農夫以沒世矣田家作苦嵗時伏臘烹羊炮羔斗酒自勞酒後耳熟仰天拊缶而呼烏烏其詩曰田彼南山蕪穢不治種一頃豆落而為箕人生行樂耳須冨貴何時誠荒淫無度不知其不可也會有日食變騶馬猥佐成騶使馬吏成名告惲驕奢不悔過日食之咎此人所致章下廷尉案驗得所豫會宗書上見而惡之當惲大逆無道腰斬妻子流酒泉諸在位與惲厚善者皆免官京兆尹張敞坐惲黨當免奏未下敞使掾按事掾私歸其家曰五日京兆耳安能復按事敞聞即收掾致其死事掾家告之上免敞為庶人敞詣闕上卬綬便從闕下亡命數月京兆吏民解弛枹鼓數起而冀州部中有大賊上使使者即家召敞拜冀州刺史到部盜賊屏息戊辰甘露元年以韋元成為淮陽中尉皇太子柔仁好儒見帝所用多文法吏嘗侍燕從容言陛下持刑太深宜用儒生帝作色曰漢家自有制度本以霸王道雜之奈何純任德教用周政乎且俗儒不達時冝好是古非今使人眩于名實不知所守何足委任乃歎曰亂我家者太子也次子淮陽王欽母張偼妤有寵明察好法上欲立之然因太子起于微細上少依許氏及即位而許后以弒死故弗忍至是拜元成為淮陽中尉以元成常讓爵于兄元成初以父賢任為郎常侍騎會兄宏為太常丞坐罪繫獄賢病門下生共矯賢令以元成為後及賢卒元成當襲爵即陽為病狂不應召欲以爵讓兄丞相御史劾元成實不病有詔勿劾引拜元成不得已受爵帝髙其節以為河南太守宏泰山都尉欲以感喻淮陽王由是太子遂安己巳二年立子囂為定陶王後徙楚宇為東平王東平國治無鹽故城在今泰安府東平州庚午三年春正月胸奴呼韓邪單于來朝還居幕南塞下初五單于爭立屠耆單于擊車犁烏藉皆敗之車犁烏藉西北走與呼揭單于合而呼揭烏藉皆去單于號并力尊輔車犁屠耆單于復擊之車犁單于敗走事在五鳯元年既而呼韓邪單于襲屠耆屯兵屠耆兵敗自殺車犁因東降呼韓邪而屠耆少子右谷蠡王姑瞀樓頭亡歸漢呼韓邪大將烏厲屈等見胸奴亂亦率其衆南降漢封烏厲屈為新城侯及烏厲溫敦為義陽侯置西河北地屬國以處胸奴降者是時屠耆單于弟休旬王自立為閏振單于呼韓邪兄右賢王呼屠吾斯又自立為郅支骨都侯單于在五鳯三年後閏振單于東擊郅支郅支與戰殺之遂進攻呼韓邪呼韓邪單于敗在五鳯四年左伊秩訾王勸令稱臣事漢呼韓邪從之遣子右賢王銖鏤渠堂入侍郅支單于亦遣子右大將駒于利受入侍在甘露元年呼韓邪引其衆南遂欵五原塞願朝詔議其儀蕭望之以為宜待以不臣之禮位諸侯王上從之在甘露二年至是上幸甘泉郊泰畤呼韓邪單于來朝贊謁稱臣而不名賜以冠帶衣裳弓矢車馬金錢編縠諸物使使者道單于先行宿長平在今涇陽縣西南上自甘泉還登長平坂詔單于母謁其羣臣皆得列觀及諸蠻夷君長咸迎于渭橋下夾道陳上登渭橋咸稱萬歲單于就邸長安置酒建章宫饗賜之二月遣歸國發邉郡士馬送出塞又轉邉榖米糒給之前後三萬四千斛單于請居光祿塞光祿勳徐自為所築在今吳喇武故九原城北下保受降城注見前自是烏孫以西至安息諸國近胸奴者咸尊漢矣後黃龍元年春呼韓邪復來朝郅支聞漢助呼韓邪遂徙居堅昆東去單于庭七千里畫功臣于麒麟閣張晏曰麒麟閣武帝獲麒麟時作圖畫其象于閣遂以為名上以四夷賓服思股肱之美乃圖畫其人于麒麟閣署其官爵姓名惟霍光不名曰大司馬大將軍博陸侯姓霍氏其次張安世韓增趙充國魏相丙吉杜延年劉德梁邱賀琅琊諸人官少府蕭望之蘇武凡十一人皆有功德知名當世丞相霸卒諡曰定以于定國為丞相封西平侯詔諸儒講五經異同于石渠閣顔師古曰閣在未央殿北以藏祕書施讐沛人從田王孫受易論易周堪齊人從夏侯勝受尚書孔霸孔子十三世孫事夏侯勝治尚書論書薛廣德沛郡相人以魯詩教授論詩戴聖梁人與兄德同受后倉曲臺記號小戴論禮公羊公羊高齊人子夏弟子髙傳其子平平傳其子地地傳其子敢敢傳其子夀夀傳胡母子都及董仲舒仲舒傳嬴公嬴公傳眭孟眭孟傳嚴彭祖則嚴彭祖東海下邳人穀梁榖梁赤魯人一名俶字元始子夏弟子赤傳荀卿荀卿傳申公申公傳江公江公傳榮廣榮廣傳蔡千秋千秋傳尹更始則尹更始汝南人蕭望之等平奏其議上親稱制臨決焉乃立梁邱易孔子傳易于南瞿瞿傳馯臂子弓子弓傳矯子庸疵疵傳周子家豎豎傳光子羽羽傳田子莊何何傳周王孫王孫傳丁寬寬傳田王孫王孫傳梁邱賀賀本從京房受易後更事田王孫大小夏侯尚書伏勝今文尚書傳博士張生夏侯都尉從張生受尚書以傳族子始昌始昌傳勝小夏侯名建勝之從父子也勝以書授建建又事歐陽高由是尚書有大小夏侯之學穀梁春秋博士孫驁生即成帝劉友益書法王氏之篡漢之中否自驁生始矣故謹書之皇太子所幸司馬良娣病死太子忽忽不樂帝令皇后擇後宫家人子可侍太子者得王政君魏郡元城人故繡衣御史賀孫女即莽之姑也送太子宫是嵗生子男于甲觀畫堂顔師古曰甲觀觀名謂甲乙丙丁之次畫堂宫殿中有彩畫之堂為世適皇孫帝愛之自名曰驁字太孫常置左右烏孫公主楚主解憂來歸初烏孫肥王翁歸靡死兄子泥靡立是為狂王復尚楚主與主不和暴惡失衆肥王有本婦子烏就屠襲殺狂王而自立漢欲討之烏就屠恐願得小號以自處上遣謁者立楚主子元貴靡為大昆彌烏就屠為小昆彌事在甘露二年已而元貴靡死楚主上書言年老思土願歸葬漢地天子閔而迎之待如公主之制後二嵗卒烏孫立元貴靡子星靡為大昆彌壬申黃龍顔師古曰是年二月黃龍見廣漢故改年元年春三月有星孛于王良閣道史義正義王良五星在奎北河中閣道六星在王良北入紫微帝寢疾以史高為大司馬車騎將軍蕭望之為前將軍光祿勳周堪為光祿大夫受遺詔輔政領尚書事冬十二月帝崩太子奭即位是為孝元帝尊皇太后曰太皇太后上官后皇后曰皇太后卭成王皇后御批歷代通鑑輯覽卷十七

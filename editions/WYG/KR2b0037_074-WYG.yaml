front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷七十五宋仁宗皇帝壬午慶厯二年春正月復𣙜鹽法
  hash: sha256:bf3de6fa3485cf2052b49383a82a78c7ba6a0a4838cc34ff102476aee76c5403
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_074-1a, image: WYG0338/WYG0338-0108a.png}
body:
  text: 自元昊反軍興用度不足因聼並邉入中芻粟予劵趨京師𣙜貨務宋初京城置𣙜貨務後但給金銀交鈔往遷而不積茶貨受錢若金銀入中他貨予劵償以池鹽由是羽毛筋角膠漆鐵炭瓦木之類一切以鹽易之猾商貪吏表裏為姦至入椽木二估錢干給鹽二百二十斤鹽直益賤販者不行至是詔凡商人虛佑受券及已受鹽未鬻者皆計直輸虧官錢内地州軍民間鹽悉收市入官官為置場増價出之復禁永興等十一州軍商鹽官自輦運以衙前民之充役者主官物制見前主之又禁商鹽私入蜀置折博務于永興鳯翔聼人入錢若蜀貨易鹽趨蜀中以售已而東南末鹽悉復禁𣙜二月置義勇軍詔選河北諸州彊壯者為軍刺手背為義勇字各營于其州給以俸廩分番訓練不願者釋之尋又刺陜西秦鳳路義勇為保㨗軍三月詔舉將才契丹來求關南地夏四月遣知制誥富弼報之契丹主有南侵意㑹元昊反欲乘釁取瓦橋以南十縣地乃集羣臣議南院遼官制分北南院曰北面南面北面主宫帳部族屬國之政南面主漢人州縣租賦軍馬之政樞密使蕭惠曰宋人西征有年師老民疲陛下親帥六軍臨之其勝必矣北院樞密使蕭孝穆曰我先朝與宋和好無罪伐之其曲在我况勝未可逆料願熟察之契丹主從惠言遣南院宣徽使蕭特黙國舅大父房之後舊作特末今改正翰林學士劉六符河間人唐節度使怦之後來致書取故地及問興師伐夏并沿邊疏濬水澤增益兵戍之故特黙至吕夷簡奏弼為接伴使與中使迎勞之特黙托疾不拜弼曰吾嘗使北病卧車中聞命輙起今中使至而子不拜何也特黙等矍然起拜弼開懐與語特黙感說亦不復隱其情密以其主所欲得者告且曰可從從之不然以一事塞之弼具以聞帝惟許增歲幣或以宗室女嫁其子且令夷簡擇報聘者夷簡不悦弼因薦之集賢校理歐陽修引顔真卿使李希烈事請留之不報弼得命即入對叩頭曰主憂臣辱臣不敢愛其死帝為動色進弼樞密直學士弼辭曰國家有急義不憚勞奈何逆以官爵賂之遂往五月以大名府為北京契丹聚兵幽薊聲言南下朝議請城洛陽吕夷簡曰此子囊城郢計也事見左傳使契丹得渡河雖高城深池何可恃耶我聞契丹畏壯侮怯景徳之役非乘輿濟河則未易服也宜建都大名示將親征以伐其謀帝從之建大名為北京即真宗駐蹕之所城焉識者韙之六月以王徳用判定州以契丹兵壓境詔徳用判定州兼三路都部署徳用時教士卒習戰頃之士勇皆可用契丹遣人來覘或請捕之徳用曰彼得其實以告是服人之兵以不戰也明日大閱于郊下令具糗糧聽吾鼓視吾旗所向覘者歸告北庭謂漢兵將大至和議益決秋七月以吕夷簡章得象兼樞密使初富弼建議宰相兼樞密使帝曰軍國之務當悉歸中書樞密非古官然未欲遽廢故止令中書同議樞密院事及是知諫院張方平請廢樞密院帝乃追用弼議命夷簡得象判樞密事議者以判名太重夷簡亦不敢當遂改兼樞密使富弼還復如契丹弼至契丹見契丹主言曰兩朝人主父子繼好垂四十年一旦求割地何也契丹主曰南朝違約塞鴈門增塘水治城隍籍民兵將以何為羣臣請舉兵而南吾謂不若遣使求地求而不獲舉兵未晚弼曰北朝忘章聖皇帝之大徳乎澶淵之役苟從諸將言北兵無得脫者且北朝與中國通好則人主專其利而臣下無所獲若用兵則利歸臣下而人主受其禍故勸用兵者皆為身謀爾契丹主驚曰何謂也弼曰晉高祖欺天叛君末帝昏亂土宇狹小上下離叛故契丹全師獨克然擄獲金幣充牣諸臣之家而壯士健馬物故大半今中國提封萬里精兵百萬法令修明上下一心北朝欲用兵能保其必勝乎就使其勝所亡士馬羣臣當之歟抑人主當之歟若通好不絶歲幣盡歸人主羣臣何利焉契丹主大悟首肯者久之弼又曰塞鴈門者備元昊也塘水始于何承矩事在通好前城隍皆修舊民兵亦補闕非違約也契丹主曰微卿言吾不知其詳雖然吾祖宗故地當見還也弼曰晉以盧龍賂契丹周世宗復取闗南地皆異代事若各求地豈北朝之利哉既退劉六符曰吾主恥受金幣堅欲十縣何如弼曰本朝皇帝嘗言為祖宗守國豈敢妄以土地與人北朝所欲不過租賦爾朕不忍多殺兩朝赤子故屈已增幣以代之若必欲得地是志在敗盟假此為辭爾澶淵之盟天地鬼神實臨之北朝首發兵端過不在我天地鬼神其可欺乎六符謂其介曰南朝皇帝存心如此大善當共奏使兩主意通明日契丹主召弼同獵引弼馬自近謂曰得地則歡好可久弼反覆陳其不可狀且言北朝既以得地為榮南朝必以失地為辱兄弟之國豈可一榮一辱哉獵罷六符曰吾主聞公榮辱之言意甚感悟今惟有結昏可議爾弼曰結昏易生嫌隙本朝長公主出降齎送不過十萬緡豈若歲幣無窮之利哉契丹主諭弼使還曰俟卿再至當擇一事受之卿其遂以誓書來弼還具以白帝帝復使弼持和親增幣二議及誓書往契丹且命受口傳之詞于政府既行次樂壽謂副使張茂實曰吾為使而不見國書脫書詞與口傳異吾事敗矣啟視果不同馳還都以晡時入見曰政府故為此以陷臣臣死不足惜如國事何帝以問晏殊殊曰吕夷簡決不為此誠恐誤爾弼曰晏殊姦邪黨夷簡以欺陛下遂易書而行九月暨契丹平弼至契丹不復議婚專欲增幣且曰南朝既增我歲幣其遺我之辭當曰獻弼曰南朝為兄豈有兄獻于弟乎契丹主曰然則為納字弼曰亦不可契丹主曰南朝既以厚幣遺我是懼我矣于一字何有若我擁兵而南得無悔乎弼曰本朝兼愛南北之民故屈已增幣何名為懼或不得已而用兵則當以曲直為勝負非使臣之所知也契丹主曰卿勿固執古有之矣弼曰自古惟唐高祖借兵突厥當時贈遺或稱獻納然後頡利為太宗所擒豈復有此禮哉聲色俱厲契丹主知不可奪乃曰吾當自遣人議之乃留增幣誓書而使其北院樞密副使耶律仁先字濟蘭孟父房之後及劉六符持誓書與弼偕來且議獻納二字弼至入對曰二字臣以死拒之彼氣折矣可勿許也帝用晏殊議竟以納字許之于是歲增銀絹各十萬匹兩送至白溝仍遣知制誥梁適字仲賢東平人持誓書與仁先如契丹報之契丹亦遣使再致誓書來報撤兵自是通好如故按濟蘭舊作糺鄰今改閏月元昊寇鎮戎軍副總管葛懷敏眞定人㑹兵禦之敗死元昊遂大掠渭州元昊入寇攻鎮戎軍先是知延州龎籍言夏境䑕食稼且旱元昊思納欵詔命知保安軍劉拯諭元昊親信野利綱哩拉即野利旺榮舊作剛浪陵今改雅竒舊作遇乞今改兄弟令内附即􅂌西平爵土綱哩拉令拉黙特舊作浪埋今改薩勒竒舊作賞乞今改瑪尼舊作媚娘今改三人詣种世衡乞降世衡知其詐曰與其殺之不若因以為間留使監税出入騎從甚寵又遣其教練使李文貴至青澗報世衡言用兵以來資用困乏人情便于和世衡以白籍籍曰此詐也乃屯兵青澗留文貴不遣至是元昊果大入王沿使葛懷敏督諸砦兵禦之分諸將為四路趨定川砦在固原州西北賊毁橋斷其歸路四面圍之懐敏突圍走由是大潰懐敏馳至長城在固原州西北與隆徳縣接界秦時故址也濠路已斷遂及將校十四人死焉餘軍馬皆爲敵所得元昊乗勝直扺渭州焚蕩廬舍屠掠民畜自涇邠以東皆閉壘自守范仲淹自將慶州蕃漢兵援之元昊乃還議者欲以金繒啖契丹使攻元昊命御史中丞賈昌朝往使昌朝力辭使命且上疏曰太祖收方鎮之權以為萬世利及太宗時將帥率多舊人猶能仗威靈所向有功近歲因西羌之叛驟擇將領而士不練習以屢易之將馭不練之士故戰則必敗此削方鎮太過之弊也况今武臣多親舊恩倖出即為將素不知兵一旦付與千萬人之命是驅之死地矣此用親舊恩倖之弊也請自今方鎮守臣無數更易刺史以上宜慎所授以待有功且命將之時去疑貳推恩惠務責以大效使一切便宜從事庶得馭將之道帝嘉納之冬十一月以韓琦范仲淹龎籍為陜西安撫經畧招討使置司涇州初翰林學士王堯臣字伯庸虞城人體量安撫陜西歸上疏論兵因言韓琦范仲淹皆忠義智勇不當置之散地及葛懐敏敗死中外震懼帝思堯臣之言時已命文彦博經畧涇原帝以涇原傷夷欲對徙仲淹使王懐徳繼忠子諭之仲淹附奏乞與韓琦同經畧涇原並駐涇州琦兼秦鳳臣兼環慶涇原有警臣與琦合秦鳳環慶之兵掎角而進若秦鳳環慶有警亦可率涇原之師為援臣當與琦練兵選將漸復横山以斷賊臂不數年間可期平定願詔龎籍兼領環慶以成首尾之勢秦州委文彦博慶州用滕宗諒總之渭州一武臣足矣帝采用其䇿乃復置陜西路經畧安撫招討使總四路之事置府涇州益屯兵三萬以琦仲淹籍分領之復以堯臣為體量安撫使徙彦博帥秦宗諒帥慶張亢帥渭州堯臣復言琦等既為總使則四路當稟節制不當復帶使名各置司行事使所稟不一于是諸路並罷經畧使琦與仲淹在兵間久名重一時人心歸之朝廷倚以為重二人號令嚴明愛撫士卒諸羌來者推誠撫接咸感恩畏威不敢輙犯邊境邊人為之謠曰軍中有一韓西賊聞之心膽寒軍中有一范西賊聞之驚破膽徵處士孫復字明復晉州平陽人為國子監直講復舉進士不第退居泰山著春秋尊王發微十二篇國子直講石介嘗師事之語人曰孫先生非隱者也于是范仲淹富弼皆言復有經術宜在朝廷故召用之以富弼為翰林學士辭不拜弼始受命使契丹聞一女卒再往聞一男生皆不顧得家書未嘗發輙焚之曰徒亂人意于是帝復申樞密直學士之命弼辭又除翰林學士弼懇辭曰增歲幣非臣本意特以方討元昊未暇與角故不敢以死爭安敢受賞乎癸未三年春正月元昊上書請和元昊雖數勝然死亡創夷相半人困㸃集財力不給國中為十不如之謠以怨之种世衡又以計遣王嵩本僧人王光信世衡奏補三班借職更名嵩遺書間其大將野利綱哩拉雅竒兄弟皆得罪綱哩拉雅竒皆有才謀號大王親信用事世衡謀間之乃為蠟書遣嵩遺綱哩拉言朝廷知王有向漢心已授夏州節度并以棗綴畫龜喻其早歸之意綱哩拉得書笑曰种使君長矣何為此兒戲乃執嵩以書自詣元昊上之元昊果疑剛哩拉不令歸而錮嵩穽中遣人詐為綱哩拉使使世衡世衡知其為元昊所遣故為欵語而厚遣之使還元昊出嵩穽中而綱哩拉已報死矣世衡知其謀已行復為文以祭剛哩拉悼其兄弟有意本朝垂成而失投之境上夏人得之以獻元昊雅竒以此亦并獲罪元昊既失二將久之知為世衡所賣遂定講和之䇿時帝亦以西鄙用兵日久心厭之㑹契丹使言元昊欲歸欵乃密詔龎籍招納之籍遣李文貴還以通意元昊聞之大喜厚禮王嵩使與文貴以書至延州議和續綱目作文貴以綱哩拉書議和考宋史种世衡傳元昊得王嵩書遣李文貴以剛哩拉㫖報世衡而夏國傳文貴于元昊未冦鎮戎之前已為龎籍所留二傳前後矛盾續綱目採錄殊混今依宋元通鑑改輯然猶倔彊不肯削僭號且云如日方中止可順天西行安可逆天東下籍以其言未服乃令自請而詔籍復書許之元昊知朝廷許和有緒乃遣其六宅使賀從朂與文貴至延州上書自稱男邦泥鼎國烏珠舊作泥定國兀卒今改正上書父大宋皇帝更名曩霄而不稱臣烏珠即吾祖也如可汗號籍言名體未正不敢以聞從朂曰子事父猶臣事君也若得至京師天子不許更歸議之籍送使者闕下因陳便宜言羌久不通和市國人愁怨今辭理寖順必有改事中國之心請遣使諭之二月立四門學三月以吕夷簡為司徒同議軍國大事先是夷簡感風眩詔拜司空平章軍國大事疾稍愈命數日一至中書裁決可否夷簡力辭帝降手詔曰古謂髭可療疾今剪以賜卿至是帝御延和殿召見敕乘馬至殿門命内侍取兀子坐具有倚曰椅無倚曰兀輿舁也以前夷簡辭避久之詔給扶毋拜乃罷相改授司徒同議軍國大事以晏殊同平章事兼樞密使賈昌朝參知政事富弼為樞密副使弼固辭不拜弼見帝言契丹既結好議者便謂無事萬一敗盟臣死且有罪願陛下思其輕侮之恥坐薪嘗膽不忘修政且收臣新命使天下知使臣不受賞和好未可保其于守備決不敢懈帝察其意堅改授資政殿學士召夏竦為樞密使以歐陽修王素字仲儀旦子蔡襄知諫院余靖為右正言增置諫官以修等為之襄喜賢路開而慮正人難久立乃上疏曰修等忠誠剛正必能盡言但恐邪人不利必造為禦之之說其說不過有三曰好名好進彰君過爾願陛下察之修每入對帝必延問執政咨所宜行既多所張弛小人翕翕不便修慮善人必不勝數為帝分别言之初范仲淹貶饒州修及尹洙余靖皆以直仲淹見逐羣邪目之曰黨人于是朋黨之論起修論事切直人視之如仇帝獨奬其敢言顧侍臣曰如歐陽修者何處得來夏四月遣使如夏州賀從朂至京帝用龎籍言命著作佐郎邵良佐更往議之許封冊元昊為夏國主歲賜絹十萬匹茶三萬斤富弼言元昊臣契丹而不臣我朝則是契丹為無敵于天下矣須令稱臣乃可許和蔡襄亦言烏珠之譯為吾祖特以侮慢朝廷使朝廷賜之詔而亦曰吾祖是何等語耶不可許其請帝皆不聽良佐至夏州元昊亦遣儒定裕舎舊作如定聿捨今改張延壽等來議和及歲幣以韓琦范仲淹為樞密副使以元昊請和故召還命知永興軍鄭戩代之富弼言西寇未殄亦須藉材若二人俱來或恐闕事願召一人使處于内一人就授副樞且令在邊表裏相濟事無不集不聽時元昊倚契丹邀索無厭晏殊等厭用兵將一切從之琦力陳其不便帝嘉納之夏竦至京師罷之以杜衍為樞密使初召竦諫官歐陽修蔡襄等交章論竦在陜西畏懦不肯盡力兼之挾詐任數姦邪傾險陛下孜孜政事首用懐詐不忠之臣何以求治中丞王拱辰字君貺開封咸平人亦因對極論之帝未省遽起拱辰前引裾畢其說帝乃悟㑹竦已至國門言者論益力乞毋令入見右正言余靖言竦累表引疾及聞召命即兼驛而馳若不早決竦必堅求面對敘恩感泣復有左右為之地者則聖聽惑矣章累上即日詔竦歸鎮拜杜衍為樞密使竦亦自請還節鉞徙知亳州竦至亳上書萬言自辨乃徙判并州蔡襄言于帝曰陛下罷竦而用琦仲淹士大夫賀于朝庶民歌于路至飲酒叫號以為歡且退一邪進一賢豈能關天下輕重哉葢一邪退則其類退一賢進則其類進衆邪並退衆賢並進海内有不泰乎雖然臣竊憂之天下之勢譬猶病者陛下既得良醫矣信任不疑非徒愈病而又夀民醫雖良術不能盡用則病且日深雖有和扁難責效矣國子監直講石介篤學尚志樂善嫉惡喜聲名遇事奮然敢為㑹吕夷簡罷相章得象晏殊賈昌朝韓琦范仲淹富弼同時執政而歐陽修蔡襄王素余靖並為諫官夏竦既拜復奪之以衍代因大喜曰此盛事也歌頌吾職其可已乎作慶厯聖徳詩有曰衆賢之進如茅斯拔大姦之去如距斯脫其言大姦葢斥竦也詩且出孫復聞之曰介禍始于此矣范仲淹亦謂韓琦曰為此鬼怪輩壊事也自正月不雨至于是月帝禱于西太乙宫是日雨京師久旱遣使祠禱嶽瀆羣臣請帝親禱于郊帝曰太史言月二日當雨今將以旦日出禱王素曰臣非太史然度是日必不雨帝問其故素對曰陛下知其且雨而禱之應天不以誠故也帝竦然詔明日詣西太乙宫諫官故不在屬車間時命素扈從日甚熾埃氛翳空比車駕還未薄城天大雷電而雨吕夷簡罷先是陜西轉運使孫沔上書言自夷簡當國黜忠言廢直道以姑息為安以避謗為智柔而易制者升為心腹姦而可使者保為羽翼是張禹不獨生于漢而李林甫復見于今也書上帝不之罪夷簡見書謂人曰元規藥石之言但恨聞此遲十年爾至是蔡襄復言夷簡被病以來兩府大臣並笏受事于門貪尚權勢病不知止乃罷同議軍國大事未㡬以太尉致仕五月丁卯朔日食秋七月王舉正罷八月范仲淹參知政事富弼為樞密副使歐陽修余靖論舉正懦黙不任事范仲淹有相才請罷舉正而用仲淹帝然之舉正遂罷拜仲淹參知政事仲淹曰執政可由諫官而得乎固辭不拜願與韓琦出行邊命為陜西宣撫使未行復除參知政事同日復以樞副命弼弼猶固辭帝命宰相諭曰此朝廷特用非以使遼故也時元昊使辭帝至紫宸殿俟弼綴樞密班乃坐弼不得已受命帝方銳意太平責成輔相命弼主北事仲淹主西事仲淹語人曰上用我至矣事有先後久安之弊非朝夕可革也帝再賜手詔又為之開天章閣召輔臣條對仲淹退而上十事曰明黜陟抑僥倖精貢舉擇長官均公田厚農桑修武備推恩信重命令減徭役悉采用之宜著令者皆以詔書畫一頒下惟府兵法衆以為不可而止弼上當世之務十餘條及安邊十三䇿大約以進賢退不肖止僥倖去宿弊欲漸易監司之不才者使澄汰所部吏于是小人始不悅矣以韓琦為陜西宣撫使時二府合班奏事琦必盡言雖事屬中書亦指陳其實同列或不悦帝獨識之曰韓琦性直琦嘗條所宜先行者七事曰清政本念邊計擢材器備河北固河東收民心營洛邑繼又陳救弊八事曰選將帥明按察豐財利遏僥倖進能吏退不才謹入官去冗食謂數者之舉謗必隨之願委計輔臣聽其注措帝嘉納之遂命宣撫陜西琦討平羣盜張海郭邈山等汰禁卒羸老不任用者修鄜延城障賑河中同華諸州饑民所活百餘萬人冬十月以張昷之字景山秘之子王素等為都轉運按察使先是知諫院歐陽修言天下官吏既多朝廷無由遍知乞立按察之法于内外朝官三丞郎官中選彊幹亷明者為之使至州縣遍見官吏其公亷無狀皆以朱書于名之下其中材之人以墨書之歲具以聞詔從之富弼范仲淹復請詔中書樞密通選逐路轉運按察使即委使自擇知州知州擇知縣不任事者皆罷之于是昷之等首被兹選昷之河北王素淮南沈邈字子山信州弋陽人京東施昌言字正臣通州静海人河東李絢字公素卭州依政人京西范仲淹之選監司也取班簿視不才者一筆勾之弼曰一筆勾之甚易焉知一家哭矣仲淹曰一家哭何如一路哭即遂悉罷之更定磨勘法初太祖以舊制文武常參官各以曹務閑劇為月限考滿即選非循名責實之道乃罷之淳化中置審官院事具前復序進之制其後立法文臣五年武臣七年無贓私罪始得遷秩曾犯贓罪則文臣七年武臣十年中書樞密取㫖其七階選人宋史選舉志選人官七等一曰留守節察判官二曰節察掌書記支使防團判官三曰軍事判官留守節察推官四曰防團軍事推官軍監判官五曰縣令錄事參軍六曰試銜縣令知錄事七曰軍巡判官司理司戸司法參軍簿尉以考第資厯無過犯或有勞績者遞遷謂之循資至是用范仲淹言定磨勘保任之法自朝官至郎中少卿須清望官五人保任始得遷朝官三年無私罪而有監司及清望官五人為保任遷員外郎舉者數不足增二年遷郎中少卿監亦如之遷太卿監諫議悉聽㫖其法始密于舊矣後知諫院劉元瑜以為徒長奔競非所以養亷恥罷之劉元瑜字君玉河南人十一月更立蔭子法太祖初立任子之法臺省六品諸司五品登朝嘗厯兩任然後得請太宗即位諸州進奏者授以試銜及三班職尋特定選人七等即上七階凡誕聖節及三年南郊皆聽奏一人而特恩不預焉由是奏薦之恩寖廣至是范仲淹富弼始裁省奏補入仕之路罷聖節奏蔭恩凡長子不限年諸子孫必年過十五弟姪年過十二乃得蔭由是任子之恩殺矣十二月河北雨赤雪河東地震諫官孫甫字之翰許州陽翟人上疏言赤雪者赤𤯝也人君舒緩之應地震者陰盛也陰之象為臣為後宫為四夷盛則陰變而動矣天地災變固無虚應陛下救舒緩之失莫若自主威福時出英斷以懾姦邪救陰盛之變莫若外謹戎備内制後宫此應天之實也甲申四年春正月帝復御經筵自元昊反罷進講崇政殿說書趙師民字周翰臨淄人言帝王治經與品庶異不獨玩空文占古語也今方外小有事臣等即不復進見是以為先王遺籍可以講無事之朝不足賛有為之世臣愚以為過矣又獻勸講箴帝嘉納之于是復命曾公亮字明仲泉州晉江人等講讀經史嘗謂公亮等曰卿等宿儒博學多所發明朕雖盛暑亦未嘗倦但恐卿等勞爾荆王元儼太宗第八子卒元儼廣顙豐頤嚴毅不可犯天下崇憚之名聞外夷呼為八大王遼人入使必問王安及所在莊獻臨朝自以屬尊望重恐為太后所忌深自沉晦既有疾帝親視之屛人與語所對皆忠言至是卒有司以年嵗不利財用方困請緩𦵏期范仲淹言荆王大宗愛子眞宗愛弟屢被讒惑陛下仁聖力能保全豈忍送𦵏之際惜財力而廢典禮請賜内藏庫金帛備𦵏事帝從之三月詔天下州縣立學行科舉新法時范仲淹意欲復古勸學數言興學校本行實詔近臣議於是宋祁等奏教不本於學校士不察於鄉里則不能覈名實有司束以聲病學者専於記誦則不足盡人材今莫若教士於學校然後州縣察其履行則學者修飭矣先䇿論則文詞者留心於治亂矣簡程式則閎博者得以馳騁問大義則執經者不専於記誦帝從之乃詔天下州縣皆立學本道使者選部屬官為教授員不足取於鄉里宿學有道業者士須在學三百日乃聴預秋試舊嘗充試者百日而止試於州者令相保任有匿服犯刑虧行冒名等禁三場先䇿次論次詩賦通考為去取而罷帖經墨義士通經術願對大義者試十道宜州唐置今廣西慶逺府是蠻區希範思恩人作亂詔廣西鈐轄宋諸路置總管鈐轄司掌軍馬守禦事重臣則加都字討之希範嘗舉進士後與其叔正辭應募討安化州本無水州祥符中改名故城在今慶逺府思恩縣叛蠻自言其功求録用知宜州馮伸己字齊賢拯之子以為妄編管全州五季馬氏置今属桂林府希範遁歸與正辭舉其族作亂推白崖山即崖山本唐縣宋廢為蠻獠所據蠻䝉趕為帝偽立名號破環州宋覊縻州故城在今思恩縣及鎮寕州亦宋覊縻州在今思恩縣宜州捉賊宋廵檢司有捉賊巡檢李徳用擊郤之明年轉運使杜杞誘趕等擒之得希範醢以賜諸蠻杜杞字偉長鎬之子夏四月作太學五月帝謁孔子詔以錫慶院為太學置内舍生二百人講殿既備帝謁孔子故事止肅揖帝特冄拜賜直講孫復五品服初胡瑗為湖州敎授訓人有法科條纎悉備具以身率先雖盛暑必公服坐堂上嚴師弟子之禮從之遊者常數百人時方尚詞賦湖學獨立經義治事齋以敦實學及興太學詔下湖州取其法著為令式元昊復遣使來上表元昊遣使上誓表言兩失和好遂厯七年立誓自今願藏盟府凡嵗賜銀綺絹茶二十五萬五千乞與常數臣不復以他相干乞頒誓詔葢欲世世遵守永以為好倘君親之義不存或臣子之心渝變當使宗祀不永子孫罹殃帝遣使賜元昊詔曰俯閲來誓一皆如約時韓琦自陕西還與范仲淹並對言為今之䇿當以和好為權宜戰守為實務因盡和守戰三䇿又言北敵乆疆今乗元昊議和其勢愈重苟不大為之備禍未可量夫京師坦而無備若北敵一朝稱兵深入必促河朔重兵與之力戰彼戰勝則直趨澶淵若京城堅固戒河朔之兵勿與戰彼不得戰欲深入則前有堅城後有重兵必沮而自退退而邀之擊之皆可也故修京師非徒禦寇誠以伐深入之謀諫官余靖言王者守在四夷今無故而修京城是舍天下之大而為嬰城自守之計遂不果行六月開寶寺塔火余靖上疏言五行之占本是災變宜戒懼以答天意而聞有詔取舊瘞舍利入禁中竊恐巧佞之人推為靈異再圖營造廣事浮費以奉佛求福非天下所望也且一塔不能自衞為火所燬况藉其福以庇于民哉以范仲淹為陜西河東宣撫使初仲淹以忤吕夷簡放逐者數年及陕西用兵帝以其士望所属拔用䕶邉及夷簡罷召還倚以為治中外想望其功業仲淹亦以天下為己任與富弼日夜謀慮興致太平然更張無漸規模濶大論者籍籍及按察使出多所舉勘衆心不悦任子之恩薄磨勘之法宻僥倖者不便由是謗毁稍行先是石介奏記于弼責以行伊周之事夏竦怨介又欲因以傾弼䓁乃使女奴隂習介書乆之習成遂改伊周曰伊霍且偽作介為弼撰廢立詔草飛語上聞帝雖不信而弼與仲淹恐懼不自安適聞契丹伐夏遂請行邉京師旱蝗上謂輔臣曰方嵗旱而飛蝗百姓何罪罹此黙禱上帝願歸咎朕躬余靖䓁言災異之來實由人事闗失今陛下既有引過之言達於天地神祗伏乞必踐其言必行其實専聴㫁攬威權號令信於人恩澤及於下則災異消和氣應矣契丹初修國史命耶律古裕六院部人舊作谷欲今改耶律庻成季父房之後等充史官秋七月大封宗室先是富弼言北庭率以近親為名王將相以治國事掌兵柄今嵗荆王之薨識者憂之臣願陛下擇宗室中賢者數人封之内以藩屛王室外以威示四夷帝用其謀同時封王公者凡十人秦王廷美子徳文為東平王潤王元份子允譲為汝南王燕王徳昭孫從藹為潁國公岐王徳芳孫從照為安國公又有徳昭孫守巽與從藹同封餘無者改潤王即商王封契丹來告伐夏八月遣右正言余靖報之先是元昊侵党項党項諸部皆叛契丹降夏契丹伐党項夏人救之至是契丹主徴諸道兵將討元昊遣使來告曰請為中國討賊慎無與和也時朝廷欲加元昊封冊而契丹之使適至帝疑契丹與元昊同謀見欺召羣臣議之富弼言契丹實有怨于元昊耳保無他也余靖言契丹挟詐不可輕許乃命靖致贐禮且覘其誠否而留夏國封冊不發以富弼為河北宣撫使從弼請也弼及范仲淹既去石介不自安亦請外得濮州通判九月許公吕夷簡卒諡文靖莊獻太后臨朝十餘年間天下晏然夷簡之力為多及西夏用師契丹求地夷簡選將命使二邉以寕獨建募萬勝軍禁軍也慶厯元年置凡二十營加契丹嵗幣大為後日之患又成郭后之廢逐孔道輔范仲淹于外時論少之然所斥士旋復収用亦不終廢其於天下事屈伸舒卷動有操術故當國最乆雖數為言者所詆而帝眷倚不衰晏殊罷殊平居好賢及為相務進人材擢歐陽修為諫官既而苦其論事煩數或面折之至是修出為河北都轉運使諫官奏留殊獨不許孫復蔡襄因上言殊為李宸妃碑不言生帝又役官兵治僦舍以規利乃降授工部尚書出知潁州以杜衍同平章事兼樞密使賈昌朝為樞密使陳執中參知政事衍務裁僥倖毎有内降率寢格不行積詔㫖至十數輙納帝前帝嘗語歐陽修曰外人知杜衍封還内降邪凡有求於朕毎以衍不可告之而止者多于所還也執中自知青州召還諫官蔡襄孫甫等爭言執中剛愎不學若任以政天下不幸帝不聴諫官論不止乃命中使齎􅃯告即青州賜之明日諫官上殿帝作色迎謂之曰豈非論陳執中耶朕已召之矣乃不敢言契丹伐夏冬十月夏人誘而敗之契丹及夏平契丹主親將騎兵十萬出金肅城遼西京有金肅州故城在今鄂爾多斯左翼廢勝州東北遣弟重元出南路樞密使蕭惠出北路三路濟河入夏境不見敵據徳勝寺南壁以待惠與元昊戰于賀蘭山北敗之元昊見契丹兵盛乃請和退師十里請収叛黨以獻且進方物契丹主遣樞宻副使蕭革字和斯濟勒國舅房林牙華善之子今按和期濟勒舊作胡奚堇華善舊作和尚並改詰其納叛背盟之故元昊以未得成言又退師三十里以候凡三退將百里毎退必赭其地契丹馬無所食因許和元昊乃遷延以老之度其馬飢士疲因縱兵急攻恵營敗之乗勝攻南壁契丹主大敗從數騎走得免已而元昊遣使歸其先所俘獲契丹主亦遣所留夏使還之遂引兵還十一月契丹以雲州為西京契丹建西京于雲州號大同府于是契丹境内凡五京上京中京東京南京西京六府上京曰臨潢東京曰遼陽中京曰大定興中南京曰析津西京日大同氏考遼興中府即慕容龍城注見前州軍城百五十六考遼史地理志序遼有京五府六州軍城百五十有六續綱目誤作五京六州軍城百五十六今改正并注明六府縣二百九部族五千属國六十東至於海西至於金山注見前暨于流沙北至臚朐河今名克嚕倫河源出喀爾喀肯特山流亘大漠之北下流與黑龍江合南至白溝幅員萬里十二月冊元昊為夏國主余靖使還知契丹已與夏和帝乃遣尚書員外郎張子奭充冊禮使冊元昊為夏國主仍賜對衣黄金帶銀鞍勒馬銀二萬兩絹二萬匹茶三萬斤約稱臣奉正朔改所賜敇書為詔而不名許自置官属然元昊帝其國中自若也知環州种世衡卒世衡善撫士卒得人死力在邉數年積榖通貨所至不煩州縣官益兵増饋而武功自振夏戎不敢以環為意及卒青澗及環人皆畫像祠之乙酉五年春正月罷杜衍范仲淹富弼以賈昌朝同平章事兼樞宻使宋庠參知政事王貽永為樞宻使呉育龎籍為副使仲淹弼既出宣撫攻者益衆二人在朝所為亦稍沮止衍獨左右之衍好薦引賢士而抑僥倖羣小咸怨衍壻蘇舜欽能文章論議稍侵權貴時監進奏院用鬻故紙錢祠神以妓樂娱賔集賢校理王益柔字勝之曙之子于席上戲作傲歌御史中丞王拱辰聞之以二人皆仲淹所薦而舜欽又衍壻欲因是傾衍及仲淹乃諷御史魚周詢字裕之雍邱人劉元瑜舉劾其事拱辰及張方平列狀請誅益柔章得象無所可否賈昌朝隂主之韓琦言於帝曰益柔狂語何深計方平䓁皆陛下近臣今西陲用兵大事何限俱不為陛下論列而同狀攻一王益柔此其意可見矣帝感悟乃止黜益柔監復州注見前酒税而除舜欽名同席被斥者十餘人時同斥者右班殿直劉巽判尚書刑部江休復在召中而辭不往者何中立欲與㑹而以任子擯之者李定舜欽之斥中立與定所為也餘無攷定江休復字鄰幾陳留人何中立字公南許州人李字仲求洪州人晏殊之甥皆知名之士拱辰喜曰吾一舉網盡矣舜欽既得罪舜欽被廢居蘇州買水石作滄浪亭以自適後遷湖州長史卒衍不自安求去不許㑹諫官錢明逸字子飛故呉越王倧之孫論仲淹弼更張綱紀紛擾國經凡所推薦多挾朋黨陳執中復譖衍庇二人帝不悦遂并黜之衍罷知兖州仲淹知邠州仲淹以疾求解邉任改鄧州弼知鄆州衍清介有大節其去也君子惜之三月罷樞密副使韓琦范仲淹富弼罷去琦不能獨居上疏辨析且言近日臣僚多務攻擊忠良取快私忿不報初陕西四路總管鄭戬遣静邉砦在今延安府保安縣西南主劉滬字子濬保州人著作佐郎董士亷常山人城水洛注見前以通秦渭援兵知渭州尹洙以為前此屢困於賊者正由城砦多而兵勢分也今又益城不可奏罷其役㑹戬罷而滬䓁督役如故洙不平以張忠考宋史同時有兩張忠俱開封人一字聖毗厯官齊滄澶三州團練卒一不著其字曾為陕西總管指揮使洙以代滬者或即是其人而本傳不詳其事代之滬不受代洙乃諭禆將狄青往械滬及士亷下吏而罷水洛之役戬論奏不已琦是洙而朝議右戬竟徙洙知慶州釋滬等獄而復城水洛琦乃請外遂出知揚州河東轉運使歐陽修上疏曰杜衍范仲淹韓琦富弼天下皆知其有可用之賢而不聞其冇可罷之罪自古小人讒害其識不逺欲廣陷良善則指為朋黨欲動揺大臣則誣以専權葢去一善人而衆善人尚在則未為小人之利欲盡去之則善人少過惟指為朋黨則可盡逐自古大臣被主知䝉信任則難以他事動揺惟有専權是上之所惡方可傾之夫正士在朝羣邪所忌謀臣不用敵國之福也竊為陛下惜之羣邪益忌修因傅致修罪左遷知滁州洙博學有識度以為自唐以來文品卑弱至桞開始為古文而世未知宗尚乃與穆修復振起之為文簡而有法元昊反洙亦嘗在兵間故於西事尤為練習忌者誣以假用公錢坐貶未幾卒長桞開字仲塗大名人穆修字伯鄆州人罷科舉新法范仲淹既去磨勘䕃子法俱罷執政以新定科舉入學預試為不便且言詩賦聲病易考而䇿論汗漫難知祖宗以來莫之有改且得人嘗多矣帝下其議有司請如舊法乃詔前所更令悉罷之夏四月丁亥朔日食是日隂晦不見羣臣皆賀章得象罷得象在中書畏逺名勢宗黨親戚一切抑而不進然亦無所建明御史孫抗數論之得象乃上章求去遂出知陳州以陳執中同平章事兼樞宻使呉育参知政事丁度字公雅祥符人為樞宻副使未幾執中與賈昌朝言西夏來庭乞免兼樞宻使從之冬十月罷轉運兼按察使十一月罷京東安撫使富弼滁州狂人孔直温謀反伏誅捜其家得石介書時介已死宣徽南院使夏竦怨介嘗譏己言介詐死乃弼遣介結契丹起兵期以一路兵為内應請發介棺騐之詔下兖州訪介存亡杜衍保介必死衍㑹問􅁺属掌書記龔鼎臣願以闔門證其死衍探懐出奏稿示之曰吾已保介矣龔鼎臣字輔之須城人提刑吕居簡䝉正第六子亦上言無故發棺何以示後始獲免遂罷弼安撫使貶孫復監虔州税介子孫覊管池州丙戌六年春三月辛巳朔日食帝謂賈昌朝䓁曰謫見於天願罪朕躬卿䓁宜究民疾苦思所以安利之又曰人主懼天而修徳猶人臣奉法而自新也昌朝䓁頓首謝夏五月京師雨雹河北河東京東同時地震登萊州尤甚先是青州震已而登州屢震海底輙有聲如雷秋八月以呉育為樞宻副使丁度参知政事育在政府遇事敢言時知永静軍今河間府東光縣宋於此置永静軍何綬疑通判江中立譖已因誣以罪廹令自殺育欲坐綬死賈昌朝不可遂爭議帝前殿中皆失色育論辨不已曰臣所辨者職也顧力不勝願罷臣職知審刑院髙若訥附昌朝議綬竟減死一䓁帝以昌朝故乃命育與度易位謂近臣曰呉育剛正可用第嫉惡太過耳丁亥七年春二月大旱詔求直言三月賈昌朝呉育罷昌朝育議不恊論者多不直昌朝時方憫雨昌朝引漢冊免三公故事乞罷御史中丞髙若訥上言大臣喧争為不肅故雨不時若于是昌朝出判大名育出知許州以夏竦同平章事尋改授樞宻使以文彦博参知政事髙若訥為樞宻副使竦制下諫官御史交章言大臣和則政事修竦前在關中與首相陳執中論議不合今不可使共事故改之帝禱于西太乙宫是日雨帝出禱雨于太乙宫日方炎赫帝卻蓋不御及還而雨大浹冬十一月貝州卒王則據城反以明鎬為河北安撫使初涿人王則以嵗飢流至貝州自賣為人牧羊後𨽻宣毅軍為小校貝冀俗尚妖幻相與習五龍滴淚䓁經及諸圖䜟書言釋迦佛衰謝彌勒佛當持世妖人爭信事之州吏張巒卜吉主其謀黨與連徳齊諸州約以明年正旦㫁澶州浮梁作亂㑹其黨以書謁北京留守賈昌朝事覺被執則故不待期亟以冬至日反時知州張得一方與官属謁天慶觀則率其徒刦庫兵執得一囚之從通判董元亨深州束鹿人索庫鑰元亨厲聲罵賊賊遂殺之又殺司理王奨節度判官李浩䓁兵馬都監田斌以從卒巷戰不勝而出城扉闔提㸃刑獄田京字簡之亳州鹿邑人䓁縋城出保南闗入驍健營撫士卒凡冇欲應賊者京以計盡誅之由是營兵在外者皆懾服南闗得不陷時有北京指使馬遂聞則反告留守賈昌朝請討賊昌朝令持榜入貝州招降諭以禍福則不荅遂奮起扼其喉毆之而左右無助之者遂為賊所殺事聞贈宫苑使馬遂開封人則僭稱東平王建國曰安陽改元得聖旗幟號令率以佛為稱城以一樓為一州書州名補其徒為知州毎面置一總管然縋城下者日衆于是令民伍伍為保一人縋餘悉斬事聞以知開封府明鎬為體量安撫使而詔貝州有能獲賊者授諸衞上將軍鎬至貝州民汪文慶等自城上繫書射鎬帳約為内應夜垂絙以引官軍入城者數百人賊覺率衆拒戰官軍不利乃與文慶䓁復縋而出先是知制誥胡宿以登萊地震因言必有内盗起于河朔宜為之備登萊視京師為東北少陽之位也今二州並置今坑聚民以鑿山谷陽氣損洩故隂乗而動可即禁止以寕地道至是其言始騐胡宿字武平常州晋陵人太子太傅致仕李廸卒諡文定戊子八年春正月以文彦博為河北宣撫使明鎬副之閏月執王則檻送京師誅之以文彦博同平章事鎬以貝州城峻不可攻乃為巨闉將成為賊所焚鎬乃即南城為地道日攻其北以牽制之朝廷以則未下命彦博宣撫鎬為之副夏竦惡鎬恐其成功凡鎬所奏輙從中阻之彦博既受命請軍事得専行許之彦博至貝鎬穿道適通遂選壯士夜半由地道入城衆登城賊縱火牛官軍以槍中牛鼻牛還攻之賊大潰開東門遁總管王信字公亮太原人追則擒之餘衆保村舍者皆被焚死竦復言所獲恐非眞盗乃詔檻送則京師磔于市則據城凡六十六日而敗改貝州為恩州張得一以降賊伏誅詔以彦博同平章事加明鎬端明殿學士封賈昌朝為安國公侍讀學士楊偕言賊發昌朝部至出大臣乃能平昌朝為有罪不當賞弗聴夏元昊卒元昊卒子諒祚小字寕令格舊作寗令哥今改方期歲宻藏舊作沒藏今改氏所生也夏國語謂歡嘉為寕令両岔河名也宻藏氏從元昊出獵至此生諒祚遂名焉養于母族鄂博舊作訛龎今改鄂博因立之以三大將分治國政考東都事畧元昊凡七娶其五娶曰野利氏雅竒妹也生子曰寗寕格立為太子已而雅竒被誅元昊得其妻宻藏氏與私通野利氏出之為尼㑹元昊欲納馮伊克氏為寗寕格妻見其美自取之寗寕格憤而殺元昊不死劓其鼻而去匿黄廬為宻藏氏之兄鄂博所殺元昊遂因鼻創而死方宻藏氏之為尼也已有娠元昊既死而生子是為諒祚鄂博遂立之以宻藏氏為太后此所載與宋史不同李燾長編因之續綱目節録數語於圏外以示存疑今據東都事畧云云宻藏氏既已斥出為尼其生子又在元昊死後鄂博擁立夏國将相豈無一人異議其説恐不足信今仍以宋史為㫁而附注於此按寗寕格舊作寗寕歌瑪伊克舊作沒􅗹今並改正衛士作亂伏誅帝將以閏月望夕復張燈皇后諫止之越三日親從官顔秀䓁四人謀為亂夜入禁中越屋叩寢殿皇后方侍帝聞變遽起帝欲出后閉閤擁持趣召都知王守忠使引卒入衛賊傷宫嬪殿下聲徹帝所宦者以乳嫗毆小女子紿奏后叱之曰賊在近殺人敢妄言耶隂遣人挈水踵後賊果舉炬焚簾水随滅之是夕所遣宦侍后皆親剪其髪曰以是徴賞故爭盡死力守忠兵至賊就擒滅詔領皇城司者皆坐斥事連副都知楊懐敏夏竦與懐敏相結欲曲庇之乃請御史與宦官同鞫於禁中丁度曰宿衞有變事闗社稷請付外臺窮治因爭于帝前帝從竦議由是懐敏止降官領内職如故三月詔羣臣言時政闕失帝幸龍圖天章閣以手詔問輔臣及御史中丞以上時政闕失皆給筆札令即坐以對時陳執中不學少文固辭不對宋庠亦請至中書合議條奏乃聴兩府歸而上之翰林學士張方平方鎻院草制夜半與所條對俱上言汰冗兵退剰員慎磨勘擇將帥四事帝覽奏驚異詰旦更賜手札問詔所不及者方平復上備邉恤刑二事又言比來朝廷頗引輕險之人内為言官外為按察多發人暧昧之事天下承風靡然一變故將相以至卿大夫士一動一為輒曰恐致人言苟且因循求免謗咎何暇展布四體為國立事哉時殿中侍御史何郯言國家設侍從之官自學士至待制公卿之才並由此出自頃相承惟以文翰待之而不責其言議臣下亦以職分當爾自安循黙以天下利害之大備言責者惟御史諫官十人而欲陛下聰明無所遺政理無所失不可得矣乞諭兩制臣僚自今聞朝政闕失並許論列御史中丞魚周詢言近西陲備禦天下繹騷日費千金生靈重困今元昊㓜子新立乃朝廷寛財用恤民力之時速宜經度以紓匱乏願委安撫使與守邉掌記臣僚裁減冗兵莭抑浮費又言仕進多門滋長奔競糜費廪禄願特詔進士觧褐無令過多流外奏補宜暫停止又請擇牧守選將帥斥貧殘汰庸駑凡千有餘言帝以執政及近臣對多疎濶時嘉周詢詳敏何郯字聖從成都人夏四月冊諒祚為夏國主夏遣使來告哀朝廷及契丹皆遣使慰奠議者請因諒祚㓜弱毋族専國以節鉞啖其三大將使各有所部分以披其勢可以得志陕西安撫使程琳曰幸人之䘮非所以柔逺人不如因而撫之帝乃遣使冊諒祚為夏國主議者深惜朝廷之失機㑹罷丁度為觀文殿學士以明鎬参知政事度以與夏竦議事不合求解政事乃置觀文殿學士以授之度性淳質在翰林十五年數論天下事未嘗及私帝雅重之文彦博數推鎬貝州之功且薦其才可大用帝遂以代度未幾鎬卒五月無雲而震夏竦免以宋庠為樞宻使龎籍参知政事何郯論竦姦邪不可任樞要㑹京師一日無雲而震者五帝方坐便殿趣召翰林學士張方平至謂曰夏竦姦邪以致天變如此宜免之乃出知河南冬十二月以美人張氏為貴妃初衞士之變帝以美人有扈蹕功夏竦建議欲尊之同知諫院王贄字至之廬陵太和人因言賊本起皇后閤前請究其事兾動揺中宫隂為美人地上以問御史何郯郯曰此姦人之謀不可不察上悟事遂寝然美人卒以功進貴妃己丑皇祐元年春正月甲午朔日食二月彗星見夏五月加知青州富弼禮部侍郎辭不受先是河北京東大水民流就食青州富弼勸所部民出粟益以官廪得公私廬舍十餘萬區散處其人以便薪水官吏自前資待缺寄居者皆給其禄使即民所聚選老弱病瘠者廪之仍書其劳約他日為奏請受賞率五日輒遣人持酒肉飯糗慰藉出于至誠人人為盡力山林陂澤之利可資以生者聴民擅取死者為大冢𦵏之目曰叢冢及麥大熟民各以逺近受粮而歸凡活五十餘萬人募為兵者萬計前此救災者皆聚民城郭中為粥食之蒸民疾疫及相蹈藉或待哺數日不得粥而仆自弼立法簡便周盡天下傳以為式帝聞遣使褒劳加拜禮部侍郎弼曰救災守臣職也固辭不受秋八月陳執中罷以宋庠同平章事髙若訥参知政事龎籍為樞宻使梁適為副使執中居位無所建明但延接卜相術士言者屢攻之遂以足疾求罷出知陳州庠初執政遇事輙分别可否及再登用遂浮沉自安然天資忠厚嘗曰逆詐恃明殘人矜才吾終身不為也汰諸路兵文彦博龎籍建議省兵衆以為不可帝以為疑彦博籍共奏曰公私困竭正坐冗兵果有患臣請死之帝意遂決于是簡汰陕西及河北諸路羸兵為民者六萬減廩粮之半者二萬又詔減陕西兵屯内地以省邉費九月廣源州宋覊縻州地在今安南國諒山府東北蠻儂智髙反冦邕州儂氏自唐初即雄于西原注見前世為廣源州首領唐末交阯強盛廣源服属之知儻猶州蠻州與下安徳州俱與廣源州接界儂全福為交人所殺其妻改適商人生智髙冒姓儂氏既壯與其母據儻猶州交人攻而執之釋其罪使知廣源州智髙怨交阯乃乗間襲據安徳州潛稱南天國改元景瑞因招納亡命貢獻中國求内附朝廷不許復奉金函書以請亦不報智髙怒與廣州進士黄師宓䓁謀據廣南乃數出敝衣易榖食紿言洞中飢饉部落離散知邕州陳珙信之不設備智髙忽一夕縱火焚其居因紿衆曰平生積聚今為天火所焚生計窮矣當取邕廣以自王否則兵死衆從之遂率衆五千沿江即廣西南寕府之左江源出廣源州東下攻邕州横江砦當作横山本唐縣宋改砦在今南寕府宣化縣東横山上守將張日新䓁戰死詔江南福建等路發兵備之罷武舉冬十月契丹伐夏執諒祚之母以歸先是契丹主伐夏北院樞宻使蕭惠帥師自河南進戰艦粮艘綿亘數百里既入敵境偵候不逺鎧甲載于車軍士不得乗馬諸將請備不虞恵曰諒祚必自迎車駕何暇及我無故設備徒自弊耳契丹主聞夏人已遁而還恵師尚進未立營柵夏人奄至士卒皆不及甲而走死傷不可勝數至是北道行軍都統耶律達嚕噶舊作敵魯古今改正率兵至賀蘭山獲諒祚母及宫僚官属以歸明年契丹復伐夏夏两遣使于契丹乞依舊稱藩契丹主遣都監蕭雅噶等使夏索党項叛户諒祚請代党項權進駞馬牛羊等物而求唐隆鎮乞罷所建城邑契丹主不許置諒祚母属于薊州今按雅噶舊作爻括改正庚寅二年秋九月大享天地于明堂赦自太祖以來未嘗親享明堂惟命有司攝事是嵗帝以大慶殿為明堂仍詔有司詳定儀注于是新作禮神玉玉通鑑誤作主今依宋史改正製樂八曲五音一曲奉爼用之二變七律一曲飲福用之七律相生一曲退文舞迎武舞及亞獻終獻徹豆用之又酌獻五帝随月用律各從其音為五曲二變變宫變徴也月律正月太簇為青帝四月仲吕為赤帝六月林鍾為黄帝七月夷則為白帝十月應鍾為黒帝九月朝享景靈宫又享太廟乃大享天地于明堂以太祖太宗眞宗配儀如圜丘大赦百官皆進秩冬十一月詔外戚毋得任二府時張貴妃寵冠後庭堯佐字希元其伯父也驟除宣徽節度景靈羣牧四使殿中侍御史唐介字子方荆南人與知諫院包拯字希仁廬州合肥人呉奎字文長濰州北海人等力爭之中丞王舉正又留百官班廷論故有是詔且罷堯佐宣徽景靈二使閏月詔更定雅樂先是帝以大享明堂召近臣同閲雅樂至是言者以鎛鐘特磬未協音律詔令鄧保信阮逸盧昭序同太常檢詳典禮别行鑄造太常薦太子中舍致仕胡瑗詔同定鐘磬制度又下詔中書門下集兩制太常官置局于秘閣詳定大樂王堯臣薦天章閣待制趙師民博古今願同詳定尋又詔議定樂名王堯臣䓁奏宜名大安從之時田况宋祁薦益州鄉貢進士房庻曉音律召詣闕自言嘗得古本漢志云度起於黄鍾之長以子穀秬黍中者一黍之起積一千二百黍之廣度之九十分黄鍾之長一為一分今文脱之起積一千二百黍八字故自前世以來累黍為尺以制律是律生於尺非起于黄鍾也葢漢一為一分者九十分之一後誤以一黍為一分其法非是當以秬黍中者一千二百實管中黍盡得九十分為黄鍾之長九寸加一以為尺則律定矣直秘閣范鎮是其説而胡瑗䓁制樂已定故授庻校書郎而遣之惟集賢校理司馬光不以鎮言為是數與論辨然世鮮鍾律之學竟不能决田况字元均冀州信都人范鎮字景仁華陽人司馬光字君實陕州夏縣人後三年知制誥王洙字原叔堯臣之叔言黄鍾為宫最尊者但聲有尊卑不在形體之大小若随律長短為鍾大小之制則減至應鍾比黄鍾纔四分之一又九月十月以無射應鍾為宫即黄鍾大吕反為商聲宫小而商大是君弱臣強之象今参酌鎛鍾特磬制度欲且各依律數算定長短大小容受之數仍以景祐中黍尺胡瑗以横黍累尺事具前為法鑄大吕應鍾鍾磬各一即見形制聲韻所歸奏可翰林學士承㫖王拱辰復言黄鍾為諸律之首葢君徳之象不可並也今十二鍾磬一以黄鐘為率與古為異請更詳定知諫院李兑字子西臨潁人言竊聞崇文院聚議王拱辰欲更前史之義王洙不從議論宣嘖夫樂之道廣大㣲眇非知音入神豈能輕定且阮逸罪廢之人務其異説欲規恩賞朝廷制樂當國財匱之時煩費甚廣器既成矣又欲改為雖命兩府大臣監議未能裁定當請以新成鍾磬與祖宗舊樂参校其聲但取偕和近雅者用之于是詔南郊仍用舊樂其新定大安之樂常祀及朝㑹用之初王朴所制編鍾皆側垂李照與胡瑗皆非之又太常藏古編鍾其聲與朴鍾夷則清聲合而其形側垂後至和二年瑗改鑄正其鈕使下垂叩之弇鬱而不揚其鎛鍾又長甬而震掉聲不和著作佐郎劉義叟曰此與周景王無射鍾無異上將有眩惑之疾其明年正月帝暴感風眩人以其言為騐劉羲叟字仲更澤州晋城人辛卯三年春正月帝幸魏國大長公主太宗女第公主㓜不好㺯貌類太宗下嫁李遵朂字公武上黨人繼昌子賔客皆一時賢士大夫毎燕集主必親視饔饎之莭莊獻太后嘗賜金龍小冠辭不敢服太后訪以政事多語祖宗舊事以諷遵朂守許州暴得疾主亟欲往視不待奏而行從者纔五六人居其䘮衰麻未嘗去身服除不復御鮮華嘗燕禁中帝親為簮花主辭曰自誓不復為此乆矣未㡬病目帝自臨視親䑛主目左右感泣帝亦悲慟問子孫所欲主曰豈可以母疾而邀賞也賚白金三千兩不受至是以暴疾聞帝促駕往視未至而主卒乃即主堂易服奠哭諡主曰獻穆三月宋庠免以劉沆字冲之吉州永新人參知政事時有偽造勅牒者庠弟祁之子與遊事覺包拯䓁言庠不戢子弟且在政府無所建明庠遂求去出知河南府夏六月詔州郡勿獻瑞物知無為軍茹孝標獻芝草帝曰朕以豊年為瑞賢臣為寶草木之異焉足尚哉免孝標罪而戒州郡勿復獻秋八月京東淮浙饑諫官呉奎言近嵗以來水不潤下盜賊横起皆隂盛所致今朝廷之過在乎因循中外臣寮建一策舉一官雖有可取皆抑而不行又從而媒蘖謂之生事如兩河盜賊行路之人皆已傳布而大臣不以為事至執殺官吏然後倉皇移易官守不亦晚乎事將有大於此者幸陛下留意冬十月以張堯佐為宣徽南院使貶殿中侍御史裏行唐介為英州注見前别駕文彦博免堯佐復除宣徽使知河陽命下介謂同列曰是欲與宣徽而假河陽為名耳獨抗言之帝謂曰除擬本出中書介遂劾文彦博知益州日造間金竒錦縁閹寺通宫掖以得執政今顕用堯佐益自固結請罷之而相富弼語甚切直帝怒卻其奏不視且曰將逺竄介徐讀疏畢曰臣忠憤所激鼎鑊不避何辭于謫帝急召執政示之曰介論事是其職至以彦博由妃嬪致宰相此何言也進用冢司豈應得預而乃薦弼時彦博在帝前介責之曰彦博宜自省即有之不可隠彦博拜謝不已帝益怒梁適叱介使下殿修起居注蔡襄趣進救之貶春州别駕王舉正言其太重帝亦悟明日取其疏入改英州而罷彦博知許州呉奎亦以介黨出知宻州帝慮介或道死有殺直臣名命中使䕶之由是介直聲聞天下然彦博事之有無卒莫能辨夏竦卒以龎藉同平章事髙若訥為樞宻使梁適参知政事王堯臣為樞宻副使竦卒賜謚文正同知禮院司馬光言諡之美者極于文正竦何人乃得此諡判考功劉敞字原父新喻人言諡者有司之事竦姦邪而諡之以正不應法且侵臣官詔更諡文莊壬辰四年夏五月資政殿學士汝南公范仲淹卒諡文正仲淹生平勵志聖賢之學嘗自誦曰士當先天下之憂而憂後天下之樂而樂其為政忠厚所至有恩邠慶二州之民與属羗皆盡像立生祠其卒也哀號如父仲淹在朝嘗上言曰與陛下共理天下者惟守宰最要比年以來不知遷擇一切以例除之其開良吏百無一二使天下賦税不得均獄訟不得平水旱不得救盜賊不得除救之之術莫若守宰得人則政舉矣其知杭州也值嵗飢仲淹日出宴于湖山縱民競渡諭諸寺僧造殿宇又新倉厫吏舍日役千夫監司劾奏杭州不恤荒政仲淹言所以遊宴興造者正欲發有餘之財以惠貧者使工技貿易之人皆得仰食于公私荒政之施莫此為大既而兩浙惟杭州晏然遂著為令儂智髙䧟邕横諸州横州唐置今属南寕府遂圍廣州詔鈐轄陳曙等發兵討之智髙攻䧟邕州執知州陳珙䓁欲任司户孔宗旦魯人以事宗旦不屈遂遇害都監張立亦罵賊死智髙即州建大南國自稱仁恵皇帝置官属時天下乆安廣南州郡無備智髙所向守臣輙棄城走遂陷横貴藤今廣西梧州府藤縣梧康今廣東肇慶府平慶州端龔今廣西潯州府平南縣封與貴梧端注俱見前八州知封州曹覲字仲賔建安人知康州趙師旦字潛叔宣城人皆戰死智髙進圍廣州知州魏瓘力戰禦之知英州蘇緘字宜父泉州晋江人蒐募壯勇合數千人赴援扼賊歸路得黄師宓父斬之以徇而轉運王罕亦自外至募民兵益修守備城得不䧟事聞命陳曙討之又以余靖為廣西安撫使同提刑李樞及曙經制賊盜事復以楊畋字樂道崇勲曽孫體量安撫廣南發廣東鈐轄兵赴之以狄青為樞宻副使初尹洙與青談兵善之薦於韓琦范仲淹曰此良將材也二人待之甚厚仲淹授以左氏春秋且曰將不知古今匹夫勇耳青由是折莭讀書悉通秦漢以來將帥兵法累進馬軍副都指揮使青起行伍十餘年而顕貴面湼猶存帝嘗勑青傅藥除之青指其面曰陛下以功擢臣不問門地臣所以有今日由此湼耳臣願留以勸軍中不敢奉詔帝益重之至是自知延州召拜副使臺諫王舉正䓁諫其不可帝不聴秋七月儂智髙䧟昭州九月以孫沔為廣南安撫使初以沔知秦州入見帝以秦事勉之對曰秦州不足煩聖慮陛下當以嶺南為憂臣觀賊勢方張官軍朝夕當有敗奏既而昭州鈐轄張忠注見前以擊賊敗沒事聞帝乃除沔湖南江西安撫使沔請發騎兵求武庫精甲梁適折沔曰毋張皇沔曰前日惟亡備故至此今乃欲示鎮静耶夫實備不至而貌為鎮静危亾之道也乃與兵七百人沔憂賊度嶺而北乃檄湖南江西曰大兵且至其繕治營壘多具燕犒賊疑不敢北侵行至鼎州本朗州祥符中改名後升常徳府今府属湖南加廣南安撫使以狄青為荆湖宣撫使督諸軍討儂智髙智髙冦擾日甚嶺外騷動楊畋䓁乆無功帝以為憂智髙移書行營求邕桂節度使帝將受其降梁適曰若爾則嶺表非朝廷有矣㑹狄青上表請行遂以為宣撫使提舉廣南經制盜賊事青入對自言曰臣起行伍非戰伐無以報國願得蕃落數百騎益以禁兵覊賊首致闕下帝壯其言時命入内都知任守忠為青副知諫院李兑言唐失其政以宦者觀軍容致主將掣肘是不足法遂罷守忠諫官韓絳字子華億第三子復言青武人不宜専任帝以問龎籍力賛青可用且言號令不専不如不遣乃詔嶺南諸軍皆受青節度以范祥字晋公邠州人為陕西轉運使制置解鹽事自復𣙜法兵民輦運不勝其苦並邉務誘人入中芻粟皆為虚估騰踊至數倍大耗京師錢幣太常博士范祥闗中人也熟其利害常謂两池之利甚博而不能少助邉計者公私侵漁之害也倘一變法嵗可省度支緍錢數十百萬乃畫䇿以獻遂命制置其事使推行之論者爭言其非是遣户部使包拯馳視還言其便論者猶籍籍驛召祥至與三司雜議皆是祥所建詔從之田况請乆任祥以専其事乃擢祥為轉運使于是舊禁鹽地一切通商聴鹽入蜀罷九州軍入中芻粟令入實錢償以鹽授以要劵即池驗劵按數而出盡弛兵民輦運之役以商所入緡錢糴粟輸並邉九州軍而悉留𣙜貨物錢幣以實中都由是黠商貪賈無所僥倖關内之民得安其業公私便之按宋史食貨志祥之獻䇿變法在慶厯四年㑹祥以病告不果行至八年復申前説乃以祥為陕西提㸃刑獄兼制置觧鹽事推行其法至皇祐元年侍御史知雜何郯復言其非其明年遣包拯馳視以為便田况為三司使請乆任祥擢祥為轉運是祥法之行在慶厯八年祥之為轉運亦當在是年之前續綱目及通鑑皆書于此且似鹽法至此始變者殊為失實但食貨志及范祥包拯田况各傳俱不著日月若改書在慶厯八年無月可繫今姑仍其舊而加注以辨于此冬十月以胡瑗為國子監直講瑗既居太學其徒至不能容取旁官舍處之禮部所得士瑗弟子十常居四五随才髙下喜自修飭衣服容止往往相類人遇之不問可知為瑗弟子也時與孫復同為直講復教養不及瑗而治經過之十一月壬寅朔日食十二月狄青勒兵賔州唐置今属桞州府陳曙兵敗青斬之以徇先是儂智髙䧟賔州復入于邕時交阯請出兵助討智髙余靖以便宜許之請于朝青奏曰假兵于外以除内冦非我利也以一智髙横踐二廣力不能制乃假蠻夷兵蠻夷貪得忘義因而啟亂何以禦之願罷交阯助兵帝從之及是青合孫沔余靖之兵進次賔州青行軍立行伍明束約野宿皆成營柵戒諸將無得妄與賊鬭聴吾所為鈐轄陳曙乗青未至輙以步兵八千擊賊潰於崑崙闗在南寕府宣化縣東北崑崙山上方輿紀要闗扼賔邕两界旁多岐嶺最為衝要殿直袁用等皆遁青曰令之不齊兵所以敗晨㑹諸將堂上揖曙起并召用䓁三十二人按以敗亡狀驅出軍門斬之沔靖相顧􅌓眙諸將股栗莫敢仰視癸巳五年春正月狄青夜度崑崙闗大敗儂智髙于邕州智髙走大理即唐南詔滇載記石晋天福初叚思平據有南詔改國號大理廣南平青既誅陳曙因按兵止營令軍休十日衆莫測賊覘者還言軍未即進青明日即整兵自將前軍孫沔將次軍余靖為殿夕次崑崙闗值上元莭大張燈樂飲徹曉次夜二鼔方晏從軍官青忽稱疾暫起如内數使勸飲遲明諸將環立帳前待令乃發而青己㣲服與先鋒度闗趣諸將㑹食闗外賊方覺悉出逆戰右將孫莭開封人搏賊死山下賊氣鋭甚沔䓁懼失色青執白旗麾蕃落騎兵從左右翼擊之縱横開合部伍不亂賊不知所為大敗走追奔五十里斬首數千餘級賊黨黄師宓儂建中䓁及偽官属死者百五十七人生擒賊五百餘死者萬計智髙夜縱火燒城遁去由合江口左右两江合流處注見前入大理青按兵入城獲金帛鉅萬招復老壯七千二百嘗為賊所俘脇者慰遣之梟師宓䓁於城下時賊屍有衣金龍衣者衆謂智髙已死欲以上聞青曰安知其非詐耶寕失智髙不可誣朝廷以貪功也廣南悉平㨗至帝喜曰青破賊龎籍之力也又曰向非梁適言南方安危未可知也詔余靖經制廣西追捕智髙而召青沔還朝後二年靖遣都監蕭注入特磨道生獲智髙母及其弟智光子繼宗䓁又募死士使大理求智髙重譯得至㑹智髙已死函首至京師乃誅其母及其弟子廣蕭注字嚴夫新喻人特磨道今雲南南府是夏五月髙若訥罷以狄青為樞宻使孫沔為副使賞平廣南功也龎籍及臺諫朝士皆論青不可長省府帝不聴以孫抃字夢得眉山人為御史中丞韓絳奏抃非糾䋲才抃即手書曰臣觀方今士人以善求事為精神以能託人為風采㨗給者謂之有議論刻深者謂之有政事諫官所謂才者無乃謂是乎若然臣誠不能也上察其言趣令視事未㡬抃舉呉中復字仲庻永興人為監察御史抃未始識其面或問之抃曰昔人耻為呈身御史今豈薦識面臺官邪秋閏七月龎籍罷以陳執中梁適同平章事籍長于吏事持法深峭士卒畏服及為相聲名減于治郡時㑹姻属與堂吏受賂事覺罷知鄆州執中適遂相詔定内侍員詔自今内侍供奉至黄門以一百八十人為額仍詔内侍省都知押班湏年五十以上厯任無贓私罪者乃得為之冬十月丙申朔日食十一月詔減畿内諸縣税端明殿學士張方平言王畿賦歛之重詔開封府諸縣兩税于元額減二分永為定式甲午至和元年春正月貴妃張氏卒追冊為温成皇后二月孫沔罷貴妃巧慧多智數善承迎至贈其父堯封為郡王世父堯佐至太師婣戚莫不顕貴然帝守法度事無大小悉付外廷議凡宫禁干請雖已賜可或輙中郤妃嬖幸少比然終不得紊政及卒帝憂悼甚至輟朝七日禁京城舉樂一月追冊為皇后治䘮皇儀殿知制誥王洙鈎摭非禮隂與内侍石全斌附㑹欲令孫沔讀冊宰相䕶𦵏帝從之沔曰陛下以臣沔讀冊則可以樞宻副使讀冊則不可遂求罷乃出知杭州時陳執中為首相奉行惟謹且引洙為員外翰林學士士論由是爭咎執中京師疫内出犀角二令太醫和藥以療民其一通天犀也左右請留供服御帝曰吾豈貴異物而賤百姓哉立命碎之以田况為樞宻副使三月王貽永罷以王徳用為樞宻使貽永尚真宗女鄭國公主自以祖宗來無外姻輔政者恒懼寵禄過盛故在樞府十五年能逺權勢帝由是益加尊禮至是以疾罷徳用時以太子太師致仕㑹乾元莭上夀立班廷中契丹使語譯者曰黒王相公乃復起邪帝聞之遂拜樞使夏四月甲午朔日食用牲于社秋七月以程戡字勝之許州陽翟人參知政事梁適免適曉暢法令臨事有膽量而多挟智數貪黷怙權不戢子弟御史中丞孫抃御史馬遵字仲塗樂平人呉中復論之出知鄭州八月以劉沆同平章事冬十月𦵏温成皇后祔其主於太廟劉沆充温成皇后園林監䕶使既𦵏祔廟賜后閣中金器數百兩沆力辭而為其子請試學士院遂授館職乙未二年春三月改封孔子後世愿孔子四十七代孫為衍聖公世愿襲封文宣王太常博士祖無擇字擇之上蔡人言祖諡不可加後嗣乃詔改封仍令世襲夏四月定差衙前注見前法初太宗立九䓁差役法事見前後承平既乆姦偽滋生而里正衙前謂以里正復充衙前輦運官物陪償折耗役為至重民多破産者知并州韓琦請罷其法蔡襄亦為帝言之乃視貲産多寡差排鄉户衙前選鄉中貲最髙者充差置籍分為五則定役輕重而罷里正衙前自是民稍休息馬端臨曰既云罷里正衙前而復選貲最髙者為鄉户衙前則不過能免里正重復應役之苦而衙前弊如故也以趙抃字閲道衢州西安人為殿中侍御史抃彈劾不避權倖聲稱凜然京師目為鐵面御史其言務欲朝廷别白君子小人以為小人雖小過當力遏而絶之君子不幸詿誤當保全爱惜以成就其徳時呉充鞠眞卿馬遵吳中復䓁皆以直言居外充真卿以論温成皇后追冊事出遵中復以論罷梁適出歐陽修賈黯字直孺鄧州人復求郡抃言近日正人端士紛紛引去者以正色立朝不能諂事權要傷之者衆耳由是充䓁悉得召還六月陳執中免知諫院范鎮論執中無學術非宰相器㑹執中嬖妾笞小婢出外舍死孫抃趙抃䓁論之不報至是以旱録囚鎮言執中為相不病而家居陛下欲弭災變宜速退執中以快天下之望今臺臣不以隂陽不和責宰相而舍大索小暴揚燕私若因此為進退是因一婢逐一相非所以明等級辨堂陛也孫抃復與其属合班論奏執中過失執中竟免以文彦博富弼同平章事帝嘗問置相于王素素對曰惟宦官宫妾不知姓名者可充其選帝曰如是則富弼爾至是彦博與弼同召至郊詔百官迎之范鎮言曰隆之以虚禮不若推之以至誠及宣召士大夫相慶於朝帝遣小黄門覘知之語翰林學士毆陽修曰古之命相或得諸夢卜今朕用二相人情如是豈不賢於夢卜哉修頓首賀㑹契丹使者耶律防至王徳用與射于玉津園防曰天子以公典樞宻而用富公為相將相皆得人矣以張昇字杲卿韓城人為御史中丞昇指切時政無所避畏帝謂之曰卿孤立乃能如是昇對曰臣仰托聖主致位侍從是為不孤今陛下之臣持禄養望者多而赤心謀國者少竊以為陛下乃孤立耳帝為感動秋八月契丹主宗眞卒子洪基立宗眞入秋山在遼長春州境長春州今為郭爾羅斯地有疾翌日卒宗真性佻侻嘗因夜晏自入樂隊又數變服入酒肆寺觀尤重浮屠法僧有正拜三公三師兼政事令者其臣馬保忠嘗勸以臣下無勲劳宜序進之宗真怫然怒曰若爾則是君不得專豈社稷之福邪自是欲冇遷除必先厚賜近臣以絶其言及卒廟號興宗長子燕趙國王洪基即位以太弟重元為太叔大赦改元清寕尊皇太后為太皇太后遣使來告哀朝廷遣使祭奠冬十月知辰州宋守信撃下溪蠻不克下溪州自彭允林歸順事俱前其後世為刺史至仕羲允林傳子師皎太平興國中允殊襲刺史至仕羲又五傳有子曰師寶怨仕羲取其妻及是來奔辰州訴仕羲嘗殺誓下十三州注見前將奪其印符而并其地自號如意大王補置官属將起為亂知辰州宋守信聞之乃以師寶為鄉導帥兵數千深入討伐仕羲遁入他洞不可得俘其孥官軍戰死者十八九守信䓁皆坐貶自是蠻獠數入宼掠邉吏不能制朝廷姑􅁒無事遣吏諭㫖許以改過自歸初輙不聴後遣轉運使以大兵臨之至嘉祐二年仕羲始就降奉職貢然猶數盗邉乆之仕羲為其子師綵所殺師綵専為暴虐其兄師晏攻殺之納誓表于朝乃命師晏襲州事十二月修六塔河六塔地名今大名府清豊縣西南有六塔集即宋時開河處初眞宗景徳元年河决澶州横隴埽在今大名府開州東尋復修塞時河屢决著作郎李垂上導河形勝書并圖其畧朝議謂其煩費議遂寢未㡬河决滑州之天台山傍垂又言疏河利害議復寝乆之决河始塞天台山在衛輝府滑縣西李垂字舜工聊城人至帝景祐元年河又决横隴遂為大河經流迨慶厯八年河復决州之商胡埽在今開州東北宋史河渠志决口廣五百五十七步皇祐元年河合永濟渠注乾寕軍而横隴㫁流已而復决大名舘陶皇祐二年河决舘陶之郭固四年塞之至是殿中丞李仲昌垂之子請自啇河穿六塔渠引河歸横隴故道先是郭固雖塞而河勢猶壅議者請開六塔以披其勢及是仲昌復以為言詔從之發丁夫三十萬修六塔河時穿渠自開州北引商胡决河流經六塔東南入横隴故道是為六塔河以仲昌提舉河渠翰林學士歐陽修三上疏力諫不聴方議開六塔之初修上疏以為修河之役有大不可者五宜速止罷用安人心既而有詔詳定仲昌河議修復上疏以為開六塔者云可以全回大河使復横隴故道今六塔止是别河下流所散為患已多若全回大河以注之則河北之州當更不勝其患而又故道淤澀上流必有他决之盧願下臣議裁取其當及中書奏仲昌提舉修復上疏請罷其役且言功必不成後悔無及時富弼尤主仲昌議疏奏皆不省明年四月朔塞商胡北流以商胡之流北合永濟渠故謂之北流入六塔河不能容是夕復决溺兵夫漂芻藁不可勝計仲昌坐流英州餘謫罰有差由是議者乆不復論河事攷續綱目及宋元通鑑是條之載以修六塔而横隴商胡之决並不先行掲出但録宋史河渠志總序數十言于河决舘陶之上叙次殊不明晰且歐陽修三狀不更莭採數語亦為疎漏今依河渠志並採修文集及胡渭禹貢錐指所云宋時穿渠云云改輯御批厯代通鑑輯覽卷七十五

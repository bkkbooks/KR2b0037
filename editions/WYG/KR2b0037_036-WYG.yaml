front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷三十七南北朝戊宋元嘉五年魏神䴥元年西秦王乞㐲暮末永辰𢎞元年北凉承元元年夏主赫連定勝光元年春二月魏人及夏戰于上邽執其主昌以歸夏赫連定稱帝于平凉魏人追之敗績夏復取長安

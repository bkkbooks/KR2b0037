front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷二十九蜀漢帝禪己巳延熈十二年魏嘉平元年吴赤烏十二年春正月魏司馬懿殺曹爽及何晏等夷其族
  hash: sha256:76a00389efc9c350a9d3ef33f979bf98f5ac1605a90f8000f93b596f9d800453
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_028-1a, image: WYG0336/WYG0336-0035a.png}
body:
  text: 曹爽驕奢無度飲食衣服擬于乘輿兄弟數俱出遊司農桓範字元則沛國人謂曰總萬機典禁兵不宜並出若有閉城門誰復内人者爽曰誰敢爾耶爽所親李勝出刺荆州過辭懿懿令兩婢侍持衣衣落指口言渴婢進粥懿不持杯而飲粥流霑胷聲氣纔屬言年老忱疾死在旦夕并州近胡好為之備且以子師昭為託勝曰還忝本州非并州也懿復錯亂其辭曰君方到并州勝曰當忝荆州懿曰年老意荒不解君言今為本州好建功勲勝退告爽曰司馬公尸居餘氣形神已離不足慮矣故爽等不復設備是月魏主芳謁高平陵爽與弟羲訓彦皆從懿與師字子元晉諡景帝昭字子上晉諡文帝謀以皇太后令閉諸城門勒兵據武庫召司徒高柔太僕王觀字偉臺東郡廩邱人分據爽羲營奏爽背棄顧命敗亂國典僭擬專權有無君之心皇太后令罷爽兄弟吏兵以侯就第臣輒力疾将兵屯洛水浮橋伺察非常爽得奏迫窘不知所為懿使爽所親信説爽宜早自歸罪唯免官而已懿以太后令召桓範範欲應命其子曰車駕在外不如南出範乃出懿謂蔣濟曰智囊往矣濟曰駑馬戀棧豆必不能用也範勸爽以天子詣許昌發四方兵自輔爽疑未決範謂羲曰此事昭然卿用讀書何為今卿門户求貧賤復可得乎且匹夫質一人尚欲望活卿與天子相隨令于天下誰敢不應今詣許昌不過中宿所憂榖食而大司農印章在我身羲兄弟不能從自甲夜至五鼓爽乃投刀于地曰我亦不失作富家翁範哭曰曹子丹佳人生汝兄弟㹠犢耳何圖今日坐汝族滅也爽乃通懿奏請下詔免已官奉駕還宫爽兄弟歸家懿發吏卒圍守之有司奏黃門張當私以所擇才人與爽疑有姦收付廷尉考實辭云爽與何晏鄧颺丁謐畢軌李勝等謀逆于是收爽羲等并桓範張當俱夷三族先是宗室曹冏上書曰古者必建同姓以名親親必樹異姓以名賢賢親疎並用故能保其社稷今州郡牧守皆跨有千里兼軍務之任或比國數人或兄弟並據而宗室子弟王空虚之地君不使之民曽無一人間厠其與相維制非所以强幹弱枝備萬一之虞也語曰百足之蟲至死不僵以其扶之者衆也此言雖小可以譬大冏欲以感悟曹爽爽不能用何晏等方用事自以為一時才傑人莫能及嘗為名士品目曰唯深也故能通天下之志夏侯太初是也唯幾也故能成天下之務司馬子元是也唯神也故不疾而連不行而至吾聞其語未見其人蓋以自况也晏聞平原管輅明術數請與論易鄧颺在座謂輅曰君自謂善易而語不及易中詞義何也輅曰夫善易者不言易也晏笑而贊之曰可謂要言不煩因謂輅曰試為作一課當至三公不又問連夢青蠅數十來集鼻上何也輔曰元凱輔舜周公佐周皆以和惠謙恭享有多福今君侯位尊勢重而懐徳者鮮畏威者衆殆非小心求福之道願君侯裒多益寡非禮不履三公可至青蠅可驅也颺曰此老生之常談輅曰老生者見不生常談者見不談輅舅聞之責其言太切輅曰與死人語何所畏邪舅怒以為狂及何鄧敗輅舅謂輅曰爾前何以知之輅曰鄧之行步筋不束骨脈不制肉起立傾倚若無手足此為鬼躁何之視候魂不守宅血不華色精爽煙浮容若槁木此為鬼幽二者皆非遐福之象也晏性自喜粉白不去手行步顧影尤好老莊書與夏侯元荀粲王弼之徒競為凊議祖尚虚無謂六經為聖人之糟粕由是天下士大夫慕效之遂成風流不可復制管輅字公明平原人荀粲字奉倩彧之子王弼字輔嗣山陽人魏司馬懿自為丞相加九錫復辭不受懿為丞相汪克寛以提要本作自為今依之魏䕶軍夏侯霸字仲權淵之子來奔霸為曹爽所厚以父死于蜀常切齒有報仇之志為征蜀䕶軍統屬征西征西將軍夏侯元霸之從子爽外弟也至是司馬懿召元詣京師霸以爽既誅而元又被徴恐禍及遂來奔姜維問之曰懿既得政當復有征伐之志不霸曰彼方營立家門未遑外事有鍾士季鍾繇之子名㑹士季其字也者其人雖少若管朝政吴蜀之憂也秋姜維伐魏雍州不克維攻魏雍州依麴山築二城今鞏昌府岷州有古麴城即維所築使句安句音鈎句芒氏之後以名為氏李韶守之聚羌胡質任謂諸羌所質臣子侵偪諸郡魏郭淮使刺史陳泰字元伯羣之子進兵圍之㫁其運道及城外流水將士窘困分糧聚雪以引日月維引軍救之出自牛頭山明史地理志在岷州東南與泰相對泰勅諸軍各堅壘勿與戰遣使白淮使趣牛頭截其還路淮從之進軍洮水注見前維懼遁走安等降魏庚午十三年魏嘉平二年吴赤烏十三年秋吴廢其太子和殺魯王霸及將軍朱據冬十一月立子亮為太子初潘夫人有寵于吴主權生少子亮權愛之全公主既與太子和有隙事具前欲豫自結數稱亮美權以魯王霸結朋黨以害其兄心亦惡之謂侍中孫峻字子逺吴宗室曰子弟不睦將有袁氏之敗為天下笑若使一人立者安得不亂乎遂有廢和立亮之意然猶沈吟歴年至是乃幽太子和將軍朱據諫不聴據與尚書僕射屈晃汝南人率諸將吏泥頭自縛連日詣闕請和而無難督陳正吴置左右無難營又置五營各有督領之及五營督陳象各上書切諫吴主大怒族誅正象牽據晃入殿杖之一百遂廢和為庶人徙故鄣漢縣吴屬吴興郡故城在今浙江湖州府安吉州賜霸死殺楊竺全寄等據尋亦賜死遂立亮為太子明年立潘氏為皇后辛未十四年魏嘉平三年吴大元元年夏四月魏司馬懿殺王凌及楚王曹彪字朱虎武帝子由白馬王徙封楚遂置諸王公于鄴初凌以將軍假節督揚州西其甥令狐愚晉魏犨子顆封于令狐後以為氏為兖州刺史甥舅並典重兵專淮南之任陰謀以魏主制于彊臣楚王彪有智勇欲共立之迎都許昌㑹愚以病卒至是凌遣將軍禓宏以廢立事告兖州刺史黃華華宏連名以白司馬懿懿將中軍乘水道討凌先下赦赦凌罪又為書諭凌已而大軍掩至百尺水經注沙水過陳縣東南注于潁水水次有大堰即古百尺堰陳縣今陳州府淮寧縣是凌勢窮面縛水次懿解其縛送詣京師道飲藥死懿至洛陽窮治其事諸相連者悉夷三族發凌愚冢剖棺暴尸賜楚王彪死盡録諸王公置鄴使有司察之不得與人交闗秋八月魏太傅司馬懿卒其子師自為撫軍大將軍録尚書事綱目于司馬懿父子高歡宇文㤗之死皆准曹操例具官書卒以其為魏晉齊周之祖也今依之冬十二月吴以諸葛恪為太子太傅總統國事吴主權頗寤太子和之無罪㑹祀南郊得風疾欲召和還全公主及侍中孫峻中書令孫宏固爭之乃止權以太子亮㓜議所付託峻薦恪可付大事權嫌其剛很自用峻曰朝臣才無及恪者乃召之恪將行吕岱成之曰世方多難子每事必十思恪曰昔季文子三思而後行夫子曰再斯可矣今君令恪十思明恪之劣也岱無以答時咸謂之失言恪至建業見吴主于卧内受詔牀下以大將軍領太子太傅孫宏領少傅有司諸務一統于恪惟殺生大事乃以聞費禕北屯漢壽本漢葭萌縣蜀漢改名故城在今四川保寧府昭化縣以陳祗守尚書令禕還成都望氣者云都邑無宰相位乃復北屯漢壽壬申十五年魏嘉平四年吴主孫亮建興元年春正月魏司馬師自為大將軍夏四月吴主權卒太子亮立以諸葛恪為太傅吴主權病篤潘后使人問漢吕后稱制故事左右畏后虐戾伺其昏睡縊殺之召諸葛恪孫宏太常滕𦙍字承嗣北海劇人及將軍吕據字世議範之子侍中孫峻屬以後事而卒宏素與恪不平秘不發喪欲矯詔誅恪峻以告恪恪請宏咨事于坐殺之乃發喪諡權曰大皇帝太子亮即位以恪為太傅𦙍為衛將軍吕岱為大司馬恪乃命罷視聴息校官胡三省注吴主權置校官專任以為耳目今息校官即所謂罷視聴也原逋責除闗税崇恩澤衆莫不悦吴徙其齊王奮字子揚權第五子于豫章先是吴主權立故太子和為南陽王居長沙奮為齊王居武昌休字子烈權第六子後立為景帝為瑯邪王居虎林即武林城在今江南池州府貴池縣至是諸葛恪不欲諸王處濱江兵馬之地乃徙齊王奮于豫章瑯邪王休于丹陽奮不肯徙恪遺之牋曰明鑑所以照形古事所以知今大王宜深以魯王為戒謂魯王霸若棄忘先帝法教懐輕慢之心臣下寧負大王不敢負先帝奮懼遂行冬十月吴諸葛恪修東興堤在今江南和州含山縣西南接廬州府巢縣界十二月魏人擊之恪與戰于徐塘胡三省注東興近地魏人敗走初吴大帝築東興堤以遏巢湖後廢不治至是諸葛恪更作大堤左右結山俠與夾通築兩城水經注湖水東逕右塘山上有城塘即東興堤城即闗城也胡三省曰濡須山在和州謂之東闗七寶山在無為軍謂之西闗雨山對峙中為石梁鑿石通水各留千人使全端留略留氏衛留封人之後守之魏諸葛誕言于司馬師曰今因吴内侵使文舒王昶逼江陵仲恭毋邱儉向武昌以羈吴之上流然後簡精卒攻其兩城可大獲也是時征南王昶征東胡遵安定臨涇人鎮南毋邱儉各獻征吴之策詔以問尚書傅嘏嘏曰吴為冦六十年君臣相保吉凶同患設令立船津要則彼堅城據險横行之計其殆難捷今惟有擇地居險奪其肥壌使還塉地一也兵出民表冦鈔不犯二也招懐近路降附日至三也羅落逺設間搆不來四也賊退其守佃作易立五也坐食積榖士不運輸六也釁隙時聞討襲速決七也凡此七者軍事之急務也不進據則賊擅便資據之則利歸于國不可不察也師不從詔昶等三道擊吴昶攻南郡儉向武昌遵誕攻東興恪將兵四萬救東興遵等作浮橋以渡陳于堤上分兵攻兩城城高峻不可抜恪使將軍丁奉字承淵廬江安豐人吕據為前部從山西上奉曰諸軍行緩若賊據便地則難與爭鋒我請趨之乃辟讀如闢諸軍使下道自率麾下三千人徑進時北風舉帆二日至東闗遂據徐塘㑹天寒雪遵方置酒高㑹奉見其前部兵少使兵皆解鎧去矛㦸但兜鍪刀楯倮身縁堨魏人望見大笑之不即嚴兵吴兵得上便鼓譟斫破其前屯據等繼至魏軍驚擾散走爭渡橋壊相蹈藉溺死者數萬吴獲車乘牛馬驢騾各以千數資器山積振旅而歸昶儉聞東軍敗各燒屯走魏廷欲貶諸將師曰此我不聴公休過也諸將何罪悉宥之師弟安東將軍昭時為監軍唯削昭爵而已癸酉十六年魏嘉平五年吴建興二年春正月盜殺大將軍費禕初姜維攻魏西平後漢建安中析金城置西平郡今甘肅西寧府是獲中郎将郭循以為左將軍循欲刺帝不得近每因上壽且拜且前為左右所遏事輒不果至是費禕與諸將大㑹于漢壽歡飲沈醉循刺殺之禕汎愛不疑待新附太過張嶷嘗與書引岑彭來歙為戒禕不從故及二月吴諸葛恪擊魏吴軍還自東興加諸葛恪荆揚二州牧督中外諸軍事恪遂有輕敵之心復欲出軍諸大臣以為數出疲勞固諫不聴恪因著論諭衆論曰昔秦但得闗西耳尚并合六國今以魏比秦土地數倍以吴蜀比六國不能半也所以能敵之者但以操時兵衆于今適盡而後生者未長又司馬懿隕斃而其子㓜弱專國雖有智計之士未得施用是其厄㑹也若順衆人之情懐偷安之計以為長江之險可以傳世不論魏之終始而以今日遂輕其後此吾所以長歎息者也昔漢祖幸已自有三秦何不閉闗自娱而數出攻楚豈甘鋒刃而忘安寧哉每鑒荆邯之説近見家叔父陳表未嘗不喟然也荆邯説公孫述諸葛亮出師表俱見前衆人皆心以為不可莫敢復難獨滕𦙍謂曰君前破彊敵天下震動今猥以勞役之後興師出征民疲力屈逺主有備若攻城不克野掠無獲是喪前勞而招後責也恪又不聴遂大發州郡二十萬衆復擊魏夏四月姜維伐魏圍狄道注見前維負其才武欲誘諸羌胡以為羽翼謂自隴以西可㫁而有每欲大舉費禕嘗裁制不從與兵不過萬人曰丞相猶不能定中夏况吾等乎不如保國治民謹守社稷如其功業以俟能者無為徼倖決成敗于一舉若不如志悔之無及及禕死維得行其志遂將數萬人伐魏圍狄道吴師圍魏新城不克吴諸葛恪入淮南圍新城姜維復在狄道司馬師以二方皆急而諸將意沮問于虞松松曰昔周亞夫堅壁昌邑而吴楚自敗事有似弱而彊者不可不察也今恪悉其鋭衆足以肆暴而坐守新城欲以致一戰耳若攻城不抜請戰不可師老衆疲勢將自遁諸將之不進乃公之利也姜維投食我麥非深根之冦且謂我并力於東是以徑進今若使闗中諸軍倍道急赴出其不意殆將走矣師曰善乃使郭淮陳㤗解狄道之圍勅毋邱儉等按兵自守以新城委吴泰至洛門注見前維以糧盡引還揚州牙門將張特字子産涿郡人守新城吴人攻之連月城將陷特謂吴人曰今我無心復戰也然城雖陷尚有不欲降者我當還為相語明早送名且以我印綬去為信吴人聴之特乃夜撤諸屋材柵補其闕為二重明日謂曰我但有鬬死耳吴人大怒進攻之不能抜㑹大暑吴軍病者大半死傷塗地恪乃引去鄧艾言于司馬師曰孫權已歿大臣未附恪不念撫恤上下以立根基乃競于外事載禍而歸其亡可待也冬十月吴殺其太傅諸葛恪以孫峻為丞相峻殺南陽王和恪還建業愈治威嚴多所罪責復嚴兵欲向青徐孫峻因搆恪於吴主亮云欲為變遂與亮謀置酒請恪伏兵殺之并夷三族臨淮臧均表請聴故吏收葬從之初恪少有盛名大帝深器重之而恪父瑾常以為戚曰非保家之子也陸遜嘗謂恪曰在我前者吾必奉之同升在我下者則状接之今君氣陵其上意蔑其下非安徳之基也至是果敗吴羣臣表峻為丞相大將軍都督中外諸軍事峻驕矜淫暴國人側目南陽王和妃張氏恪甥也峻因此收和印綬遣使者賜和死和將死與張妃别妃曰吉凶當相隨終不獨生亦自殺其妾何氏曰若皆從死誰當字孤遂撫育其子皓及諸姬子徳謙俊皆頼以全甲戌十七年魏主曹髦正元元年吴五鳳元年春二月魏司馬師殺中書令李豐字安國馮翊人及太常夏侯元光禄大夫張緝字敬仲高陵人遂廢其后張氏胡三省曰曹操弑漢后伏氏而司馬師殺魏后張氏此不惟天道亦操有以教之也初李豐年十七八已有清名其父太僕恢不悦敕使閉門㫁客後司馬師秉政以豐為中書令時太常夏侯元有天下重名以曹爽親故不得在勢任居常怏怏張緝以后父家居亦不得意豐皆與親善雖為師所擢用而心常在元魏主芳又數獨召豐語師知其議已詰之不以實告師怒以刀鐶築殺之遂收元緝下廷尉鍾毓字稚叔繇之子案治云豐等謀誅大將軍以元代之緝知其謀遂皆夷三族并廢張后夏侯霸之入蜀也邀元與俱不從及司馬懿卒中領軍許允謂曰無復憂矣元歎曰此人猶能以通家年少遇我子元子上不我容也及下獄元不肯下辭鍾繇夜為辭流涕示之元惟頷之而已及就東市顔色不變舉動自若後允出為鎮北將軍與魏主芳别涕泣歔欷師諷有司奏其罪徙樂浪道死正始中元及何晏鄧颺俱有盛名欲交傅嘏嘏不受荀粲怪而問之嘏曰泰初志大其量能合虚聲而無實才何平叔言逺而情近好辨而無誠所謂利口覆邦國之人也鄧元茂外要名利内無闗鑰貴同惡異多言而妬前多言多釁妬前無親以吾觀此三人皆將敗家逺之猶恐禍及况昵之乎許允字士宗高陽人夏姜維伐魏維出隴西與魏將徐質戰敗之抜河間胡三省曰當作河闗河闗故縣在今甘肅河州狄道臨洮三縣遷其民還將軍張嶷戰死所殺傷亦過當詔封其子為侯秋九月魏司馬師廢其主芳為齊王遷之河内冬十月迎高貴鄉公髦字彦士文帝孫東海定王霖子立之魏主芳以李豐之死意殊不平安東將軍司馬昭鎮許昌詔召之使擊姜維九月昭領兵入見芳幸平樂觀以臨軍過左右勸因昭辭殺之勒兵以退大將軍已書詔于前芳懼不敢發司馬師以太后令召羣臣議以魏主荒淫無度䙝近倡優不可以承天緒羣臣莫敢違乃奏收璽綬歸藩于齊芳與太后垂泣而别乘王車從太極南殿出羣臣送者數十人太尉司馬孚悲不自勝餘多流涕司馬孚字叔達懿次弟也師將立彭城王據文帝子太后曰彭城王季叔也今來我當何之高貴鄉公文皇帝長孫明皇帝弟子于禮小宗有後大宗之義其詳議之師乃召羣臣議迎髦于元城先是師遣郭芝收芳璽綬太后令旁侍御引璽綬置坐側及羣臣議定師又使請璽綬迎髦太后曰我見高貴鄉公小時識之欲以璽綬手授之十月髦至元武館胡三省注在芒山之尾直洛城北羣臣奏請舎前殿髦以先帝舊處避止西廂羣臣又請以法駕迎不聴入洛陽羣臣迎拜髦下輿答拜儐者請曰儀不拜髦曰吾人臣也遂答拜至止車門左右曰舊乘輿入髦曰吾被徴未知所為遂步至太極東堂見太后其日即位時年十四百僚皆欣欣焉乙亥十八年魏正元二年吴五鳯二年春正月魏揚州都督毋邱儉刺史文欽字仲若譙郡人起兵討司馬師師擊敗之欽奔吴儉走死初欽以驍果見愛于曹爽而儉素與夏侯元李豐善至是皆不自安儉子甸謂儉曰大人居方嶽重任國家傾覆而安然自守將受四海之責矣于是儉矯太后詔起兵壽春移檄州郡以討司馬師又遣使邀鎮南將軍諸葛誕誕斬其使儉將五六萬衆渡淮至項注見前堅守使欽在外為游兵時師新割目瘤創甚或謂不宜自行河南尹王肅尚書傅嘏中書侍郎鍾㑹勸師自行師蹶然起曰我請輿疾而東以弟昭兼中領軍留鎮洛陽以荆州刺史王基為行監軍基言于師曰淮南之逆非吏民思亂也畏儉等迫脇是以屯聚若大兵一臨瓦解必矣師從之以基為前軍進據南頓注見前儉等亦往爭聞基先到乃還保項吴孫峻率兵襲壽春師命諸軍深壁以待來軍之集諸將請進攻項師曰淮南將士本無反志儉欽欺誘與之舉事小與持久詐情自露將不戰而克矣乃遣諸葛誕自安風漢縣魏于此置郡故城在今江南潁州府霍邱縣向壽春胡遵出譙宋譙漢縣建安末改郡今潁州府亳州是宋謂睢陽故宋都也絶其歸路儉欽進不得鬬退恐壽春見襲計窮不知所為將士家皆在北降者相屬兖州刺史鄧艾將萬餘人趨樂嘉城本漢博陽縣王莽更名後漢省故城在今陳州府商水縣儉使欽襲之師自汝陽潛兵就艾欽卒遇之未知所為其子鴦年十八勇力絶人謂之曰及其未定擊之可破也於是分為二隊夜夾攻之鴦率壯士先至鼓譟軍中震櫌師驚駭病目突出恐衆知之囓被皆破欽失期不應㑹明鴦見兵盛乃還欽引而東鴦以匹馬拒追騎數千所向披靡人莫敢逼殿中人尹大目故曹氏家奴從師行知師目出啟云欽本明公腹心素與大目相信乞為公追解之乃乘馬追欽謂曰君侯何苦不可復忍數日中也欽殊不悟乃更怒罵欲射之大目涕泣曰世事敗矣善自努力汝陽故城在商水縣欽軍退儉恐懼夜走壽春亦潰孫峻進至槖臯注見前欽以孤軍無繼不能自立遂詣峻降儉走慎縣注亦見前人就殺之傳首京師詔夷儉三族以諸葛誕為鎮東大將軍都督揚州諸軍事吴軍亦還魏大將軍司馬師卒二月師弟昭自為大將軍録尚書事師病篤還許昌昭自洛陽往省之師令總督諸軍而卒中書侍郎鍾㑹從師典知密事魏主髦詔勅尚書傅嘏以東南新定權留昭屯許昌為内外之援令嘏率諸軍還㑹與嘏謀使嘏表上輒與昭俱發還屯洛水南詔以昭為大將軍録尚書事㑹由是常有自矜之色嘏戒之曰子志大其量而勲業難為也可不慎哉秋八月姜維伐魏敗其兵于洮西洮水西遂圍狄道不克而還姜維復議出軍征西大將軍張翼廷爭以為國小民勞不宜黷武不聴維遂將數萬人至枹罕魏雍州刺史王經字彦偉清河人與戰于洮西大敗死者萬計還保狄道城翼謂維曰可以止矣進或毁此大功為蛇畫足陳軫語見戰國策維大怒遂圍狄道魏詔鄧艾行安西將軍與征西將軍陳泰并力拒維泰進軍隴西諸將皆曰王經新敗蜀衆太盛不如據險自保觀釁待敝此計之得也泰曰維輕兵深入正欲與我爭鋒原野求一戰之利當高壁深壘挫其鋭氣今乃與戰使賊得計經既破走維若以戰克之威進兵東向據櫟陽積穀之實招納羌胡東爭闗隴傳檄四郡此我之所惡也今乃以乘勝之兵挫峻城之下攻守勢殊客主不同吾乘高據勢臨其項領不戰必走矣遂進軍潛行夜至狄道於東南高山上多舉烽火鳴鼓角維不意救兵卒至急攻不克乃遁而還丙子十九年魏甘露元年吴太平元年夏四月魏司馬昭始服衮冕赤舄魏主髦視學初魏主髦宴羣臣于東堂與諸儒論夏少康漢高祖優劣以少康為優至是幸太學與諸儒論書易及禮諸儒莫能及常與中䕶軍司馬望字子初孚之子侍中王沈散騎常侍裴秀字學彦河東聞喜人及鍾㑹等講宴于東堂特加禮異魏主性急請召欲速以望職在外特給追鋒車虎賁五人毎有㑹集輒馳而至秋七月姜維伐魏與其將鄧艾戰敗績姜維自狄道還駐鍾提城名在甘肅階州成縣西北魏人以其力竭未能更出安西將軍鄧艾曰彼有乘勝之勢我有虚弱之實一也彼上下相習我將易兵新二也彼以船行我以陸軍三也狄道隴西南安祁山各當有守彼專為一我分為四四也彼從南安因食羌穀若趨祁山熟麥千頃五也賊有黠計其來必矣秋維復出祁山聞艾有備乃回趨南安艾與戰于叚谷今秦州清水縣有叚谷水元和志鄧艾敗姜維於此大破之死者甚衆蜀人由是怨維八月魏司馬昭自為都督奏事不名假黃鉞吴孫峻死以其從弟綝字子通為侍中輔政先是吴將軍孫儀等謀殺峻事泄死者數千人并及朱公主朱據妻至是將軍吕據當進軍淮泗峻入其營餞之據軍伍嚴整峻惡之稱心痛去遂夢為諸葛恪所擊恐懼發病死以後事付綝冬十月吴孫綝殺大司馬滕𦙍將軍吕據吴將軍吕據在江都聞孫綝輔政大怒表薦滕𦙍為丞相綝更以𦙍為大司馬出駐武昌未行據引兵還約𦙍共廢綝綝遣從兄憲將兵逆據而使人趣𦙍行𦙍懼勒兵自衛綝表𦙍反發兵攻圍之或勸𦙍曰引兵至蒼龍門吴建業宫門將士必委綝就公矣時夜已半𦙍特與據期又難舉兵向宫比曉據不至綝兵大㑹殺𦙍夷三族或勸據奔魏據曰吾恥為叛臣遂自殺綝多行無禮將軍王惇與峻從弟憲謀殺之事泄皆死魏以盧毓為司空魏以盧毓為司空毓固讓司𨽻校尉王祥字休徵琅邪臨沂人詔不許祥至孝繼母朱氏遇之無道祥愈恭謹朱氏子覽年數嵗每見祥被箠輒涕泣抱其母母以非禮使祥覽輒與俱及長娶妻母虐使祥妻覽妻亦趨之母為少止祥漸有時譽母深疾之密使酖祥覽徑起取酒祥不與母奪而反之後母賜祥饌覽輒先嘗母懼遂止漢末遭亂隱居三十餘年不應州郡之命母終毁瘁杖而後起徐州刺史檄祥為别駕委以州事政化大行時人歌之曰海沂之康實頼王祥邦國不空别駕之功王覽字元通丁丑二十年魏甘露二年吴太平二年夏四月吴主亮始親政吴主亮親政事大將軍孫綝表奏多見難問又料兵子弟十八已下十五已上三千餘人選大將子弟年少有勇力者使將之日於苑中教習曰吾立此軍欲與之俱長數出中書視大帝時舊事問左右侍臣曰先帝數有特制今大將軍問事但令我書可邪嘗食生梅使黃門至中藏取蜜蜜中有鼠矢召問藏吏藏吏叩頭亮曰黃門從爾求蜜邪吏曰向求實不敢與黃門不服亮令破鼠矢矢中燥因大笑謂左右曰若矢先在蜜中中外俱濕今外濕裏燥必黃門所為也詰之果服左右驚悚魏揚州都督諸葛誕起兵討司馬昭六月昭奉其主髦攻之吴人救之不克而還誕素與夏侯元等友善元等死王凌毋邱儉相繼誅滅誕内不自安乃傾帑賑施曲赦有罪以收衆心養輕俠數千人為死士又請増兵築城以備吴冦意欲保有淮南司馬昭初秉政長史賈充請遣參佐慰勞四征且觀其志充至淮南見誕論時事因曰洛中諸賢皆願禪代君以為何如誕厲聲曰卿非賈豫州子乎世受魏恩豈可以社禝輸人若洛中有難吾當死之充黙然還言於昭曰誕再在揚州得士衆心今召之必不來然反疾而禍小不召則反遲而禍大不如召之征賈充字公閭逵之子四征魏置征東征西南征北四將軍是為四征五月詔徴誕為司空誕遂殺揚州刺史樂綝斂屯田兵十餘萬及新附四五萬人聚穀足一年食為閉門自守計遣長史吴綱將小子靚至吴稱臣請救司馬昭奉魏主髦及太后討之吴使將軍全懌琮之子全端唐咨利城人等與文欽同救誕六月昭督諸軍二十六萬進屯邱頭今陳州府沈邱縣東有武邱本曰邱頭司馬昭更名使將軍王基陳騫字休淵矯之子圍壽春㑹吴朱異率三萬人屯安豐注見前為欽外勢基四面合圍擊欽異皆破走之吴孫綝大發卒出屯鑊里胡三省注在巢縣界復遣異等解壽春圍魏人又擊破之異走歸綝綝使異更死戰異以士卒乏食不從綝怒斬異而還綝既不能抜出誕而喪敗士衆自戮名將吴人咸怨㑹全懌兄子輝等得罪于吴奔魏昭偽作輝書告懌等言吴中怒諸將不能抜壽春欲盡誅之懌等恐遂率衆出降誕將蔣班焦彛勸誕并力决死誕不從班彛踰城自歸于昭姜維伐魏姜維聞魏分闗中兵赴淮南欲乘虚向秦川率數萬人出駱谷時長城戍名在西安府盩厔縣水經注駱谷水流逕長城西是也積穀多而守兵少魏都督司馬望及鄧艾進據之以拒維維數挑戰不應是時維數出兵蜀人愁苦譙周作仇國論諷之戊寅景耀元年魏甘露三年吴景帝孫休永安元年春二月魏司馬昭抜壽春殺諸葛誕文欽教諸葛誕決圍而出不克復還城中食盡降者日衆欽欲盡出北方人省食與吴人堅守誕不聴由是爭恨遂殺欽欽子鴦虎踰城自歸于魏軍吏請誅之司馬昭曰欽子固應就戮然今以窮來歸且城未抜殺之是堅城内之心也乃使將數百騎巡城呼曰文欽之子猶不見殺其餘何懼又表為將軍賜爵闗内侯城中皆喜昭因進軍克之斬誕夷三族誕麾下數百人皆拱手為列不降每斬一人輒降之卒不變以至于盡吴將于詮曰大丈夫受命其主以兵救人既不能克又束手于敵吾弗取也乃免胄冒陳而死時議者以淮南仍為叛逆吴兵家在江南宜悉坑之昭曰古之用兵全國為上戮其元惡而已吴兵得亡還適可示中國之大度耳一無所殺分布三河近郡安處之以王基為征東將軍都督揚州諸軍事是月姜維聞諸葛誕死遂引兵還成都夏五月魏司馬昭自為相國封晉公加九錫復辭不受秋八月魏主髦養老乞言于太學以王祥為三老鄭小同康成之孫康成子益恩被黃巾之難有遺腹子康成以其手文似已名之曰小同為五更九月吴孫綝廢其主亮為㑹稽王冬十月迎立琅邪王休休以綝為丞相封兄子皓字元宗一名彭祖字皓宗為烏程侯孫綝以其主亮親政多所難問稱疾不朝使弟據入宿衛恩幹闓分屯諸營以自固亮陰與全公主將軍劉承謀誅之全后父尚為衛將軍亮使尚子紀語尚嚴整兵馬孤當率宿衛臨橋且曰勿令卿母知女人不曉大事且綝姊也邂逅漏泄悮孤非小紀承詔以告尚尚無逺慮以語紀母母使人宻語綝九月綝以兵襲全尚執之殺劉承于蒼龍門外遂圍宫亮大怒上馬帶鞬執弓欲出曰孤大皇帝適子在位已五年誰敢不從者近臣共牽止之不得出綝使光禄勲孟宗字恭武江夏人告太廟廢亮為㑹稽王以其罪班告逺近尚書桓彜長沙臨湘人魏尚書令階之弟不肯署名綝怒殺之遂迎琅邪王休于㑹稽遣亮之國亮時年十六後㑹稽謠言以亮當為天子休黜為侯亮自殺綝于是殺全尚遷全公主于豫章綝以休未至欲入居宫中召百官㑹議皆惶怖唯唯選曹郎虞汜曰明公擅廢立之威誠欲上安宗廟今迎王未至而欲入宫竊恐衆聴疑惑非所以永終忠孝揚名于後世也綝不懌而止虞汜字世洪翻之子十月休至羣臣奉上璽符三讓乃受即日御正殿大赦改元綝稱草莽臣詣闕上印綬節鉞求避賢路吴主休慰諭之以為丞相荆州牧封南陽王子皓為烏程侯十二月吴孫綝伏誅綝奉牛酒詣休休不受齎詣左將軍張布酒酣出怨言曰帝非我不立今上禮見拒是與凡臣無異當復改圖耳布以告休休銜之恐其有變數加賞賜或告綝反休執付綝綝殺之由是益懼求出屯武昌休許之凡所請求無一違者將軍魏邈説休曰綝居外必有變衛士又告綝反休將討之密問于張布布曰左將軍丁奉雖不能吏書而計畧過人能㫁大事乃召奉問計畫奉曰丞相兄弟支黨甚盛不可卒制可因臘㑹有陛兵以誅之十二月臘㑹綝稱疾休强起之不得已而入奉布目左右縛而斬之以其首令衆諸同謀者皆赦之放仗者五千人夷綝三族發孫峻棺取印綬斵其棺而埋之改葬諸葛恪及𦙍據等其罹恪等事逺徙者一切召還有乞為恪立碑者詔曰盛夏出軍士卒傷損無尺寸之功不可謂能受託孤之任死于豎子之手不可謂智遂寢詔漢中兵屯漢壽守漢樂二城建興八年諸葛亮築漢城于沔陽樂城于成固西漢城在今漢中府沔縣對樂城而言謂之樂城樂城即成固縣南城是也在今縣南初昭烈定漢中實兵諸圍以禦外敵敵若來攻使不得入其後皆承此制及姜維用事建議以為諸圍適可禦敵不獲大利不若斂兵聚穀退守漢樂二城聴敵入平重闗頭鎮守以捍之敵攻闗不克千里運糧自然疲乏引退之日然後諸城並出搏之此殄敵之術也于是詔督漢中胡濟字偉度義陽人却屯漢壽王含守樂城蔣斌偉之子守漢城己夘二年魏甘露四年吴永安二年春正月黃龍二見魏寧陵井中先是魏地井中屢有龍見羣臣以為吉祥魏主髦曰龍者君徳也上不在天下不在田而數屈于井非嘉兆也作潛龍詩以自諷司馬昭見而惡之秋八月陳祗卒以董厥字龔襲義陽人為尚書令諸葛瞻字思逺亮之子為僕射祗以巧佞有寵權位在姜維之上及是卒帝為之流涕蜀人追思諸葛亮因咸愛瞻每朝廷有一善政雖非瞻所建造百姓皆傳相告曰此葛侯之所為也是以美聲溢譽或過其實庚辰三年魏元帝曹奐景元元年吴永安三年春正月朔日食三國志失書甲子夏五月魏司馬昭弑其主髦于南闕下尚書王經死之魏主髦見威權日去不勝其忿召侍中王沈尚書王經散騎常侍王業武人陵謂曰司馬昭之心路人所知也吾不能坐受廢辱今日當與卿自出討之經曰昔魯昭公不忍李氏敗走失國為天下笑今權在其門為口久矣朝廷四方皆為之致死不顧順逆之理且宿衛寡弱陛下何所資用而一旦如此毋乃欲除疾而更深之邪禍殆不測髦出懐中黃素詔投地曰行之決矣正使死何懼况不必死邪于是入白太后沈業奔走告昭呼經欲與俱經不從髦遂抜劍升輦率殿中宿衛蒼頭官僮鼓譟而出中䕶軍賈充入與戰南闕下髦自用劍衆欲退太子舎人成濟問充曰事急矣當奈何充曰司馬公畜養汝等正為今日今日之事無所問也濟即抽戈前刺髦殞于車下濟刺髦刃出於背時大雨雷電晦冥昭聞之大驚自投于地太傅孚奔往枕之股而哭甚哀曰殺陛下者臣之罪也昭入殿中召羣臣㑹議尚書僕射陳泰不至昭逼之乃入見泰悲慟昭亦對之泣曰元伯卿何以處我泰曰獨有斬賈充少可以謝天下耳昭久之曰更思其次泰曰泰言惟有進于此者不知其次昭乃不復言以太后令罪狀髦廢為庶人葬以民禮收王經及其家屬付廷尉經謝其母母笑曰人誰不死正恐不得其所以此并命何恨之有及就誅故吏向雄哭之哀動一市王沈以功封安平侯向雄字茂伯山陽人太傅孚等請以王禮葬髦許之昭言成濟大逆不道夷三族濟不即伏罪裸而升屋醜言悖慢自下射之方殪六月魏主奐立奐燕王宇之子也本名璜封常道鄉公司馬昭迎立之更名奐年十五辛巳四年魏景元二年吴永安四年冬以董厥諸葛瞻為將軍共平尚書事樊建字長元義陽人為尚書令時中常侍黃皓用事厥瞻咸共將䕶無能匡矯建特不與皓往來秘書令郤正久在内職與皓比屋周旋三十餘年澹然自守以書自娱既不為皓所愛亦不為所憎故官不過六百石而亦不罹其禍吴使薛珝綜之子來聘及還吴主問漢政得失對曰主闇而不知其過臣下容身以求免罪入其朝不聞直言經其野民皆菜色臣聞燕雀處堂子母相樂突決棟焚而怡然不知禍之將及其是之謂乎鮮卑索頭鮮卑别部姓拓跋氏黃帝子昌意之苗裔也北史黃帝以土徳王北俗謂土為拓謂后為跋故以為氏貢質于魏鮮卑索頭部世居北荒不交南夏至可汗音榼寒猶漢時之單于也毛後魏諡成帝始彊大統國三十六大姓九十九後五世至可汗推寅諡宣帝南遷大澤又七世至可汗鄰諡獻帝使其兄弟七人兄紇骨氏普氏拓䟦氏弟達奚氏伊婁氏邱敦氏侯氏及族人乙旃氏車惃氏分統部衆為十族九姓與鄰共為十族鄰老以位授其子詰汾諡聖武帝使南遷居匈奴故地詰汾死力微是為後魏始祖神元帝立復徙居定襄之盛樂漢定襄郡冶後漢廢故城在今歸化城南部衆浸盛諸部畏服之至是始遣其子沙漠汗諡文帝貢于魏因留為質胡三省曰拓跋氏始見此壬午五年魏景元三年吴永安五年冬十月姜維伐魏洮陽明史地理志洮州西南有臨潭城即古洮陽城洮州今屬鞏昌府不克維將出軍車騎將軍廖化字元儉襄陽人曰兵不戢必自焚伯約之謂也智不出敵而力少于冦用之無厭何以自存維遂伐魏攻洮陽鄧艾與戰于侯和明史地理志洮州有侯和城破之時黃皓用事維啟帝請殺之帝曰皓趨走小臣耳往董允每切齒吾嘗恨之君何足介意維見皓枝附葉連遜辭而出帝勅皓詣維陳謝維由是疑懼返自洮陽因求種麥㳫中不敢歸成都西明史地理志洮州南有古㳫中戍吴以濮陽興濮陽以地為氏興字子元陳留人為丞相初吴主休在㑹稽興為太守遇之厚而張布嘗為左右督將及即位二人皆貴寵用事布典宫省興闗軍國以佞巧更相表裏吴人失望休喜讀書欲與祭酒韋昭博士盛沖講論布以昭沖切直恐入侍言已過固諌止之休曰孤欲與昭等講習舊聞亦何所損君特恐其道臣下姦慝故不欲令入耳如此之事孤已自備之不須昭等然後解也布惶恐陳謝且言懼妨政事休曰王務學業其流各異不相妨也然休恐布疑懼卒廢講業不使昭等入韋昭字宏嗣吴郡雲陽人魏司馬昭殺中散大夫嵇康字叔夜其先姓奚㑹稽上虞人避怨徙譙郡銍縣家于嵇山之側因以命氏康文辭壯麗好言老莊而尚竒仕俠與阮籍殷有阮國其子孫以國為氏籍字嗣宗陳留尉氏人籍兄子咸字仲容山濤周官有山師其後以官為氏濤字巨源河内人向秀字子期山陽人王戎字濬仲琅邪人劉伶字伯倫沛國人相友善號竹林七賢皆崇尚虚無輕蔑禮法縱酒昏酣遺落世事籍為步兵校尉其母卒方與人圍棊對者求止籍留與決睹既而飲酒二斗舉聲一號吐血數升毀瘠骨立居喪飲酒無異平日司隸何曾面質籍于司馬昭座曰卿縱情背禮敗俗之人不可長也因謂昭曰公方以孝治天下而聴籍以重哀飲酒食肉于公座何以訓人宜擯之四裔無令汚染華夏昭愛籍才常擁䕶之咸素幸姑婢姑將婢去咸方對客遽借客馬追之累騎而還伶尤嗜酒常乘鹿車攜一壺酒使人荷隨之曰死便埋我當時士大夫皆以為賢爭慕效之謂之放達何曽字頴考陳國陽夏人鍾㑹聞康名造之康箕踞而鍛康性好鍛鍛小冶也不為之禮㑹將去康曰何所聞而來何所見而去㑹曰聞所聞而來見所見而去遂深銜之濤為吏部郎舉康自代康與濤書自説不堪流俗而非薄湯武昭聞而怒之康與東平吕安字仲悌親善安兄巽誣安不孝康為證其不然㑹因譖康嘗欲助毋邱儉與安皆有盛名于世而言論放蕩害時亂教宜因此除之昭遂殺安及康康嘗詣隱者孫登字公和汲郡共人登曰子才多識寡難乎免于今之世矣魏以鍾㑹都督闗中軍事魏司馬昭患姜維數北伐欲大舉伐漢朝臣多以為不可獨鍾㑹勸之昭諭衆曰自定壽春以來息役六年治兵繕甲以擬猶言謀也二虜今吴地廣大而下濕攻之用兵差難不如先定巴蜀三年之後因順流之勢水陸並進此滅虢取虞之勢也今絆姜維于沓中使不得東顧直指駱谷出其空虚之地以襲漢中以劉禪之闇而邊城外破士女内震其亡可知也乃以㑹為鎮西將軍督闗中鄧艾以蜀未有釁屢陳異議昭使人諭之艾乃奉命姜維表遣左右車騎張翼廖化督諸軍分䕶陽安闗口在漢中府寧羌州西北水經注謂之闗城今曰陽平闗營及陰平之橋頭今階州文縣城南有陰平橋跨白水上即水經注所云白水東逕橋頭是也以防未然黃皓信巫鬼謂敵終不自致啟帝寢其事羣臣莫知癸未炎興元年魏景元四年吴永安六年是嵗漢亡春詔立故丞相亮廟于沔陽亮初亡所在各求為立廟朝議以禮秩不許百姓遂因時節私祭之于道陌上至是校尉習隆襄陽人等請近其墓亮遺命葬定軍山因山為墳在今漢中府沔縣立一廟于沔陽以時賜祭其故臣吏欲奉祠者皆至其廟㫁其私祭以崇正禮從之夏吴交趾殺其太守以降魏吴交趾太守孫諝貪暴郡吏吕興殺之而請吏于魏九真日南皆應魏以興為將軍遣兵助之未至興為其下所殺其後吴三攻交趾皆敗沒已復取之晉遣楊稷毛炅戍交趾吴將虞汜陶璜擊破之禽殺稷炅九真曰南皆還屬事在晉泰始七年秋魏遣鄧艾鍾㑹將兵入冦闗中守將傅僉義陽人彤之子死之姜維戰敗還守劍閣亦曰劍門在今四川保寧府劍州東北水經注小劍戍去大劍三十里連山絶險元和志大劍即古梁山其山峭壁千仞下瞰絶澗鑿石架空為飛梁閣道以通行旅魏遣鄧艾督三萬餘人自狄道趨甘松嶺名元和志甘松嶺在松州嘉誠縣西南嘉誠故城在今四川龍安府松潘衛沓中注見前以綴姜維雍州刺史諸葛緒督三萬餘人自祁山趣武街水經注濁水東逕武街城南階濁水今曰下辨水在州成縣南橋頭絶維歸路鍾㑹統十萬餘衆分從斜谷駱谷子午谷趣漢中以衛瓘字伯玉河東安邑人持節監軍事行鎮西軍司八月軍發洛陽漢遣廖化為姜維繼援張翼董厥詣陽安闗口為諸圍外助大赦改元勅諸圍不得戰退保漢樂二城㑹平行至漢中使兵圍二城徑趣陽安口遣人祭諸葛亮墓使䕶軍胡烈字武元遵之子為前鋒攻闗口守將傅僉拒守其下蔣舒率衆迎降烈乘虚襲城僉格鬭而死㑹遂長驅而前大得藏庫積穀維聞㑹已入漢中引兵還艾遣兵追躡于彊川口胡三省注彊川在嵹臺山南地理今釋西傾山一名嵹臺山在今鞏昌府洮州西大戰維敗走還至陰平合衆欲赴闗城聞其已破遇化翼厥等合兵守劍閣以拒㑹冬十月吴人來援遣使告急于吴吴使大將軍丁奉向壽春丁封奉之弟孫異韶之子向沔中救漢魏司馬昭始稱相國晉公受九錫初昭累辭進位爵賜至是蜀㨗交至詔復授之昭乃受命辟魏舒字陽元仕城樊人為相國參軍舒少時遲鈍不為鄉親所重從叔父衡嘗使守水碓嘆曰舒堪數百户長我願矣舒亦不以介意年四十餘郡舉上計掾察孝廉宗黨以舒無學業勸令不就可以為高舒曰若試而不中其負在我安可竊不就之高以為己榮乎于是自課百日習一經對策升第累遷後將軍鍾毓長史毓每與參佐射朋人不足以舒滿數舒容範閑雅發無不中舉坐愕然莫有敵者毓嘆而謝曰吾之不足以盡卿才有如此射矣及為參軍府朝碎務未嘗是非至廢興大事衆人莫敢㫁者舒徐馬籌之多出衆議之表昭深器重之衛將軍諸葛瞻及鄧艾戰于綿竹敗績及其子尚皆死之鄧艾進至陰平欲與諸葛緒自江油蜀漢戍今為縣屬四川龍安府趨成都緒以西行非本詔遂引兵與鍾㑹合㑹欲專軍勢密白緒畏懦不進檻車徴還軍悉屬㑹姜維列營守險㑹攻之不能克欲引還艾言蜀已摧折宜遂乘之乃自陰平行無人地七百餘里鑿山通道造作橋閣方輿勝覽江油左擔路鄧艾伐蜀置闗道一十二處行者自北而南右肩不得易所負故名左擔山高谷深又糧運將匱瀕于危殆艾以氊自裹推轉而下將士皆攀木縁崖魚貫而進先登至江油守將馬邈降諸葛瞻督諸軍拒艾至涪尚書郎黃崇權之子勸瞻速行據險無令敵得入平地瞻猶豫未納艾遂長驅而前瞻退往綿竹艾以書誘瞻曰若降者表為琅邪王瞻斬其使列陳以待艾大破之斬瞻及崇瞻子尚曰父子荷國重恩不早斬黃皓使敗國殄民用生何為策馬冒陳而死鄧艾至成都帝出降皇子北地王諶死之漢亡劉友益曰獻帝之廢漢未亡也至此而亡矣故特揭著之漢不意魏兵卒至不為城守調度聞艾已入平地帝使羣臣㑹議或勸奔吴或勸入南中譙周以為自古無寄他國為天子者魏能并吴吴不能并魏等為稱臣為小孰與為大再辱何與一辱若欲奔南當早為計今大敵已近羣心無可保者恐發道之日其變不測就能至南逺夷平常無所供給猶數反叛今外當拒敵内供服御耗損諸夷其叛必矣乃用譙周策遣使奉璽綬詣艾降北地王諶怒曰若理窮力屈禍敗將及便當父子君臣背城一戰同死社稷以見先帝可也奈何降乎帝不聽諶哭于昭烈之廟先殺妻子而後自殺帝率羣臣面縛輿櫬詣軍門艾持節解縛焚櫬延見禁將士無得虜掠輒依鄧禹故事承制拜漢帝以下官收黃皓將殺之皓賂左右以免姜維等及諸郡縣圍守得勅放仗詣鍾㑹降將士咸怒技刀斫石㑹厚待維等皆權還其印綬節蓋吴兵還吴聞漢亡乃罷兵魏之代蜀也吴人或謂張悌曰司馬氏得政以來大難屢作百姓未服今又逺征何以能克悌曰不然司馬懿父子累有大功而仕賢使能各盡其心今蜀閹宦專朝國無政令玩戎黷武民勞卒敝因危而伐殆無不克噫彼之得志我之憂也吴人笑其言至是乃服張悌字巨先襄陽人甲魏咸熈元年吴主孫皓申元興元年凡二國春正月魏以檻車徴鄧艾鍾㑹謀反伏誅監軍衛瓘襲艾殺之鄧艾在成都頗自矜伐以書言于晉公昭請因平蜀之勢以乘吴宜留隴右及蜀兵煑鹽興冶並作舟船豫為順流之事且王劉禪以顯歸命之寵使吴人畏威懐徳望風而從昭使衛瓘喻艾事當須報不宜輒行艾曰春秋之義大夫出疆有可以安社稷利國家者專之可也今吴人未賓勢與蜀連不可拘常以失事機鍾㑹有異志姜維知之欲搆成擾亂以圖克復乃説㑹曰君自淮南以來算無遺策今復定蜀威徳振世欲以此安歸乎何不法陶朱公泛舟絶迹全功保身邪㑹曰君言逺矣我不能行維曰其他則君智力之所能無煩于老夫矣由是情好懽甚㑹因艾承制專事乃與瓘密白艾有反狀詔以檻車徴艾昭恐艾不從命敕㑹進軍成都又遣賈充將兵入斜谷昭自將大軍從魏主幸長安令山濤為行軍司馬鎮鄴㑹遣瓘先至成都收艾瓘兵少㑹因此欲令艾殺瓘并以為艾罪瓘知之乃以夜至成都檄艾所統諸將稱奉詔收艾其餘一無所問平旦瓘乘使者車徑入艾卧内執其父子置之檻車㑹至送艾赴京師㑹所憚惟艾艾既就擒遂決意謀反欲使姜維為前驅自隨其後時郭太后卒㑹乃悉召諸將為太后發哀稱遺詔使起兵廢司馬昭更使親信代領諸軍所召羣官悉閉諸曹屋中瓘詐稱疾篤出就外廨㑹信之無所復憚維欲使㑹盡殺北來諸將已因殺㑹復立故漢帝密書與帝曰願陛下忍數日之辱臣欲使社稷危而復安日月幽而復明㑹欲誅諸將猶豫未決䕶軍胡烈親兵出取飲食烈紿語親兵及與其子淵曰㑹已作大坑白棓數千欲悉呼外兵棓殺内坑中一夜轉相告皆徧淵遂率其父兵出門諸軍鼓譟爭先赴城所閉諸人各縁屋出與其軍士共斬㑹及維維死時見割膽如斗大死喪狼藉瓘分部諸將數日乃定艾本營將士追出艾于檻車迎還瓘自以與㑹共陷艾恐其為變乃遣兵襲艾父子于綿竹西斬之初魏軍發洛陽或問參相國軍事劉寔曰鍾鄧其平蜀乎寔曰破蜀必矣而皆不還客問其故寔笑而不答及是二人皆被誅果如寔言寔字子真平原高唐人三月魏晉公司馬昭進爵為王魏詔晉公昭進爵為王太尉王祥司徒何曽司空荀顗字景倩彧之子共詣晉王顗謂祥曰相王尊重今日便當相率而拜祥曰王公相去一階而已安有天子三公可輒拜人者君子愛人以禮我不為也及入顗拜而祥獨長揖昭謂祥曰今日然後知君見顧之重也魏封故漢帝禪為安樂公禪舉家遷洛陽大臣無從行者惟秘書令郤正及殿中督張通捨妻子單身從行正相導宜適舉動無闕禪乃慨然歎息恨知正之晩昭與禪宴為之作蜀技旁人皆感愴而禪喜笑自若昭謂賈充曰人之無情乃至于是雖使諸葛亮在不能輔之久全况姜維邪他日問禪曰頗思蜀否禪曰此間樂不思蜀也正聞之謂曰若王復問宜泣而答曰先人墳墓逺在岷蜀乃心西悲無日不思因閉其目㑹昭復問禪對如前昭曰何乃似郤正語邪禪驚視曰誠如尊命左右皆笑之秋七月魏以羅憲羅以國為氏憲字令則襄陽人為陵江將軍初漢使羅憲守永安及漢敗憲得其主手勅乃帥所統臨于都亭三日吴聞蜀敗起兵西上外託救援内欲襲憲憲曰吴不恤我難而背盟徼利不義甚矣乃繕甲誓衆厲以節義與吴人戰大破之吴主怒遣陸抗字㓜節遜之子等帥衆増其圍憲被攻凡六月魏荆州刺史胡烈救之吴師遂退晉王昭使仍舊任加號將軍時漢建寧太守霍弋督南中聞成都不守素服大臨三日諸將勸弋連降弋曰若魏以禮遇主上則保境而降萬一危辱吾將以死拒之何論遲速及得禪遷之問乃率將守上表曰臣聞人生在三事之如一唯難所在則致其命今臣國敗主附守死無所是以委質不敢有貳晉王昭善之委以本任在三語見左傳吴主休殂烏程侯皓立吴主寢疾口不能言手書呼濮陽興入令子􅓣讀如彎出拜把興臂指􅓣託之而殂諡曰景帝吴人以蜀初亡恐懼欲得長君左典軍萬彧嘗為烏程令與烏程侯皓善稱皓才識明㫁加之好學奉遵法度興與左將軍張布言于朱太后乃迎立之吴主貶朱太后為景皇后追諡父和曰文皇帝尊母何氏為太后吴主初立發優詔恤士民開倉廩賑貧乏當時稱為明主及既得志麤暴驕盈多忌諱好酒色大小失望興布竊悔之或譖諸吴主乃因興布入朝執之徙于廣州道殺之夷三族明年復殺景后及其二子八月魏司馬昭以其子中撫軍炎即晉世祖為副相國冬十月立為晉世子初晉王昭娶王肅之女生炎及攸字大猷以攸繼景王後攸性孝友多材藝清和平允名過于炎昭愛之常曰天下者景王之天下也吾百年後大業宜歸攸欲以為世子山濤曰廢長立少違禮不祥賈充何曽裴秀亦以為言乃遂立炎乙魏咸熈二年晉世祖武皇帝司馬炎秦始元酉年吴甘露元年是嵗魏亡晉代凡二國秋八月魏晉王司馬昭卒子炎嗣諡昭為文王葬崇陽陵在河南府洛陽縣東南冬吴遷都武昌從西陵督步闡隲少子之請也武昌塉埆揚民泝流供給苦之謠言云寧飲建業水不食武昌魚寧還建業死不止武昌居陸凱以為言明年乃復還建業陸覬字敬風遜族子十二月晉王炎稱皇帝廢魏主為陳留王魏主禪位于晉出舎金墉城在河南府洛陽縣東北魏明帝築太傅司馬孚拜辭流涕歔欷不自勝曰臣死之日固大魏之純臣也晉王即皇帝位奉魏主為陳留王即宫于鄴魏氏諸王皆降為侯魏自文帝篡漢至陳留王凡五主合四十六年追尊宣王景王文王為皇帝尊王太后曰皇太后晉大封宗室晉主懲魏氏孤立之敝故大封宗室授以職任叔祖父孚為安平王太宰都督中外諸軍事叔父伷東莞王弟攸齊王其餘封各有差伷字子將宣帝子又詔諸王皆得自選國中長吏齊王獨不敢皆上請晉除漢魏宗室禁錮罷將吏質任初魏禁防宗室甚峻又禁錮諸劉皆不得仕進其諸將征戍及長吏仕州郡者俱留質任于京師及是晉悉除罷之晉初置諫官胡三省曰漢有諌大夫後漢有諌議大夫魏不復置晉以散騎常侍拾遺補闕即諌官職也晉以散騎常侍傅元字休奕北地泥陽人及皇甫陶共掌諫職元以魏末士風頺敝上疏言之畧曰臣聞先王之御天下教化隆于上清議行于下近者魏武好法術而天下貴刑名魏文慕通達而天下賤守節其後綱維不攝放誕盈朝遂使天下無復清議陛下龍興受禪未舉清逺有禮之臣以敦風俗未退虚鄙之士以懲不恪臣是以猶敢有言晉主嘉納使元草詔以進然亦不能革也丙晉泰始二年戌吴寶鼎元年春正月晉立七廟即用魏廟祭征西府君名鈞字叔平以下凡七室征西將軍鈞豫章太守量潁川太守雋京兆尹防與宣帝景帝文帝為七廟晉除郊祀五帝座羣臣奏五帝即天帝也王氣時異故名號有五自今明堂南郊宜除五帝座從之晉主王肅外孫故郊祀之禮有司多從肅議三月吴遣使如晉弔祭以文帝之喪也使者丁忠還説吴主曰北方無守戰之備弋陽漢縣魏為郡今河南光州是可襲而取吴主以問羣臣鎮西大將軍陸凱曰北方新并巴蜀而遣使來和先是晉遣使致書吴主非求援于我也欲蓄力以俟時耳敵勢方彊而欲徼倖求勝未見其利也吴主雖不出師然遂與晉絶夏六月丙午晦日食秋八月晉主謁崇陽陵文帝之喪臣民皆從權制三日除服既葬晉主亦除之然猶素冠疏食哀毁如居喪者至是謁陵詔以衰絰從行羣臣自依舊制尚書令裴秀奏曰既除復服義無所依遂止中軍將軍羊祜字叔子泰山南城人謂傅元曰三年之喪雖貴遂服禮也而漢文除之毁禮傷義今主上至孝雖奪其服實行喪禮若因此復先王之法不亦善乎元曰以日易月已數百年一旦復古殆難行也祜曰不能使天下如禮且使主上遂服不猶愈乎元曰主上不除而天下除之此為有父子而無君臣也乃止羣臣請易服復膳詔曰毎念不得終苴絰之禮以為沈痛况食稻衣錦乎朕本諸生家傳禮來久何至一旦易此情于所天可試省孔子答宰我之言無事紛紜也遂以疏素終三年司馬氏光曰三年之喪自天子達于庶人此先王禮經百世不易者也漢文師心不學變古壊禮後世帝王不能篤于哀戚之情而羣臣諂諛莫肯釐正至于晉武獨以天性矯而行之可謂不世之賢君而裴傳之徒固陋庸臣習常玩故不能將順其美惜哉冬十月丙午朔日食晉罷山陽督軍除其禁制胡三省注魏奉漢帝為山陽公置軍防衛至是人心去漢已久故罷之十一月晉并圜方丘之祀于南北郊丁晉泰始三年亥吴寶鼎二年春正月晉立子衷字正度為太子詔以近世每立太子必有赦曲惠小人朕無取焉遂不赦晉徴犍為李密字令伯犍為武陽人不至晉主徴李密為太子洗悉薦反馬續漢志洗馬職如謁者太子出則當直者在前導威儀密以祖母老固辭許之密與人交每公議其得失而切責之常言吾獨立于世顧影無儔然而不懼者以無彼此于人故也夏六月吴作昭明宫晉太康地記吴有太初宫權所起昭明宫皓所造昭明在太初之東方五百丈吴主作昭明宫二千石以下皆自入山督伐木大開苑囿起土山樓觀窮極伎巧功費以億萬計丞相陸凱中書丞華覈字永先吴郡武進人切諫不聴先是吴主還自武昌后滕氏寵衰諸姬佩皇后璽綬者甚衆又使黃門徧行州郡料取將吏家女其二千石大臣子女皆嵗嵗言名簡閲不中乃得出嫁於是後宫千數被服華麗因之民俗滋奢華覈上疏曰今事多而役繁民貧而俗侈百工作無用之器婦人為綺靡之飾不勤麻枲並繡黼黻兵民之家亦皆逐俗内無儋石之儲出有綾綺之服至于富商大販奢恣尤甚上無尊卑等級之差下有耗財費力之損欲求富給其可得乎不聴秋九月晉禁星氣䜟緯之學胡三省注星謂星者氣謂望氣者䜟緯之學後漢以來有之戊晉泰始四年子吴寶鼎三年春正月晉律令成先是晉主命賈充等正法律至是充等上所刋修律令充等就漢律九章増十一篇合二十篇六百二十條其不入律者悉以為令合二千九百二十六條晉主親自臨講中書侍郎張華字茂先范陽方城人請抄死罪條目懸以示民從之晉詔立考課法不果行詔河南尹杜預字元凱恕之子為黜陟之課豫奏古者黜陟擬議于心不泥于法末世疑心而信耳日疑耳目而信簡書簡書愈繁官方愈偽魏氏考課即京房之遺意其文可謂至密然失于苛細以違本體故歴代不能通也豈若申唐堯舊制去密就簡委任達官各考所統嵗第其人言其優劣如此六載主者總集採案其言六優者超擢六劣者廢免優多劣少者平叙劣多優少者左遷其有優劣徇情不協公論者當委監司彈之若令上下公相容過此為清議大頺雖有考課之法亦無益也事竟不行晉主親耕籍田三月晉太后王氏殂晉主居喪一遵古禮既葬有司請除衰服詔曰受終身之愛而無數年之報情所不忍也有司固請詔曰患在不能篤孝勿以毁傷為憂前代典禮質文不同何必限以近制使達喪闕然乎羣臣請不已乃許之然猶素服以終三年夏四月晉太保王祥卒祥卒門無雜弔之賓其族孫戎嘆曰太保當正始之世不在能言之流及間與之言理致清逺豈非以徳掩其言乎胡氏三省曰王祥之所以可尚者孝于後母與不拜晉王耳君子猶謂其任人柱石而傾人棟梁也理致清逺言乎徳乎清談之禍迄于永嘉流及江左猶未已也秋七月衆星西流如雨而隕九月晉大水已晉泰始五年丑吴建衡元年春二月晉以羊祜督荆州諸軍事晉主有滅吴之志使祜都督荆州鎮襄陽祜綏懐逺近甚得江漢之心與吴人開布大信降者欲去皆聴之減戍邏之卒以墾田八百餘頃其始至軍無百日之糧及季年乃有十年之積祜在軍常輕裘緩帶身不被甲鈴閣之下侍衛不過十數人晉録用故漢名臣子孫濟陰太守文立字廣休巴西人言故蜀名臣子孫宜量才叙用以慰巴蜀之心傾吴人之望晉主從之詔曰諸葛亮在蜀盡其心力子瞻臨難死義其孫京宜隨才署吏蜀將傅僉父子死于其主息著募沒入奚官宜免為庶人息子也著募二子名奚官府屬凡男女沒入者屬焉秋九月有星孛于紫宫冬十月吴左丞相陸凱卒凱竭心公家忠懇内發表疏皆指事不飾都尉何定汝南人前為大帝給使吴主即位信仕之方用事專為威福凱面責其姦邪定大恨之及是凱疾病吴主遣人問所欲言凱陳定不可信用因薦樓元字承先蘄人賀卲字興伯齊之孫張悌及族弟抗等清忠卓茂可訪以時務遂卒吴主素銜凱切直且入何定之譖竟徙其家于建安本漢東侯官地三國吴置縣今為福建建寧府治庚晉秦始六年寅吴建衡二年夏四月吴以陸抗字㓜節遜之子都督諸軍治樂鄉城名在荆州府松滋縣水經注江水南逕孱陵縣之樂郷城陸抗所築抗以吴主政事多闕上疏曰徳均則衆者勝寡力侔則安者制危此六國所以并于秦西楚所以屈于漢也今敵之所據廣于秦漢而國家外無連衡之援内無西楚之彊庶政陵遲黎民未乂議者徒以長江峻山限帶封域此乃守國之末事非智者所先也臣每念及此中夜撫枕臨餐忘食謹陳時宜十七條吴主不納六月晉秦州刺史胡烈討鮮卑秃髪樹機能樹機能之祖曰壽闐在孕時其母相掖氏寢而産于被中鮮卑謂被為禿髪因而氏焉此即南涼禿髪烏孤之五世祖敗死先是鄧艾納鮮卑降者置雍涼之間與民雜居朝廷恐其久而為患乃分置秦州統隴西南安天水畧陽武都陰平等郡治冀城以胡烈為刺史至是樹機能作亂烈討之敗死明年樹機能與北地叛胡圍金城涼州刺史牽宏觀津人魏牽招次子復為所殺初陳騫言于晉主曰胡烈牽宏皆勇而無謀彊于自用非綏邊之材也將為國恥晉主不以為然及是二人皆兵敗身死征討連年僅而能定晉主悔之辛晉泰始七年夘吴建衡三年春正月吴主大舉兵出華里胡三省注在建業西遇雪還綱日作不至而還據分注皓出華里西上則已過華里而西非不至也今改書吴人刁元風俗通豎刁之後以名為氏元丹陽人詐増䜟文云黃旗紫蓋見于東南終有天下者荆揚之君又得降人言壽春有童謠云吴天子當上吴主信之大舉兵出華里載太后及後宫數千人西上皓意蓋欲直至壽春以應謠言行遇大雪兵士寒凍殆死皆曰若遇敵便當倒戈吴主乃還先是吴散騎常侍王蕃氣體高亮不能承顔順㫖吴主不悦萬彧從而譖之蕃遂被弑及吴主出華里彧恐其不歸與左將軍留平有宻謀吴主頗聞之後因㑹以毒酒飲彧及平不死彧自殺平憤懣而卒王蕃字永元廬江人冬十月丁丑朔日食晉安樂公劉禪卒諡曰思壬晉泰始八年辰吴鳯凰元年春二月晉太子衷納妃賈氏初侍中尚書令賈充自文帝時寵任用事晉主為太子充頗有力故益有寵充為人巧諂與太尉荀顗待中荀勗字公曽潁川人越騎校尉馮紞字少胄安平人相為黨友朝野惡之晉主嘗問侍中裴楷以方今得失對曰陛下受命四海承風所以未比徳于堯舜者但以賈充之徒尚在朝耳宜引天下賢人與宏政道不宜示人以私裴楷字叔則秀従弟侍中任愷字元襃樂安博昌人河南尹庾純庾氏堯時掌庾大夫以官命氏純字謀甫鄢陵人皆與充不協㑹樹機能亂秦雍晉主以為憂愷及純因薦充使督秦涼諸軍充患之問計于勗勗曰是行也辭之實難獨有結婚太子可不辭而自留矣晉主初欲為太子娶衛瓘女充妻郭槐賂楊后華陰人晉主即位立為皇后左右使后説納其女晉主曰衛公女有五可賈公女有五不可衛氏種賢而多子美而長白賈氏種妬而少子醜而短黑后固以為請至是勗與顗紞皆稱充女絶美且有才徳晉主遂從之留充復居舊任賈妃年十五長太子二嵗妬忌多權詐太子嬖而畏之晉太宰安平王孚辛諡曰憲孚性忠慎宣帝執政常自退損後逢廢立之際未嘗預謀及晉主即位恩禮尤重孚雖見尊寵常有憂色臨終遺令曰有魏貞士河内司馬孚字叔達不伊不周不夷不惠立身行道終始若一當衣以時服斂以素棺卒年九十三夏晉以王濬字士治湖人為益州刺史初濬為羊祜參軍祜深知之或曰濬為人志大奢侈不可專任祜曰濬有大才將以濟其所欲必可用也至是濬為廣漢太守㑹益州軍亂牙門張宏殺刺史皇甫晏縱兵抄掠濬發兵討平之詔以濬為益州刺史先是汶山白馬注俱見前諸羌胡相侵掠及濬至明立威信蠻夷歸附俄遷大司農時晉主與羊祜謀伐吴祜以為宜藉上流之勢密表留濬加龍驤將軍監梁益軍詔使罷屯田兵大作舟艦于是作大艦長百二十步受二千餘人以木為城起樓櫓開四出門其上可馳馬往來時木柹蔽江而下吴建平吴郡杜佑曰即巴東太守吾彦字士則吴人取以白吴主曰晉必有攻吴之計宜増建平兵以塞其衝吴主不從彦乃為鐵鎖橫㫁江路秋九月吴步闡以西陵叛降晉闡世在西陵至是吴主徴之闡自以失職且懼有讒遂據城降晉冬十月辛未朔日食十一月吴陸抗抜西陵誅步闡晉羊祜等救之不及抗聞闡叛急遣將軍吾彦討之晉遣荆州刺史楊肇迎闡羊祜出江陵以救之抗敕西陵諸軍築嚴圍内以圍闡外禦晉兵而自帥衆赴之已而肇至西陵抗自將憑圍肇攻之不克夜遁抗使輕兵躡其後肇兵大敗祜已至江陵聞之引軍還抗遂抜西陵誅闡夷三族吴主既克西陵志益張大使術士尚廣筮取天下對曰吉庚子嵗青蓋當入洛陽吴主喜不修徳政專為兼并之計祜歸自江陵務修徳信以懐吴人每交兵刻日方戰不為掩襲之計將帥有欲進譎計者輒飲以醇酒使不得言軍行吴境刈穀為糧皆計所侵送絹償之每遊獵常止晉地所得禽獸或先為吴人所傷者皆送還之于是吴邊人皆悦服祜與陸抗對境使命常通抗遺祜酒祜飲之不疑抗疾祜與之成藥抗即服之人多諌抗抗曰豈有酖人羊叔子哉抗告其邊戍曰彼專為徳我專為暴是不戰而自服各保分界而已無求細利吴主聞而責之抗曰一邑一鄉不可以無信義况大國乎臣不如此適足彰彼之徳于祜無傷也祜不附結中朝權貴荀勗馮紞之徒皆惡之從甥王衍嘗詣陳事辭甚清辯祜不然之衍拂衣去祜顧謂客曰王夷甫方當以盛名處大位然敗俗傷化必此人也及攻江陵祜以軍法將斬王戎戎衍之從兄也故皆憾之時人為之語曰三王當國羊公無徳晉免河南尹庾純官尋復以為國子祭酒晉初立國子學置祭酒博士各一人賈充與朝士宴河南尹庾純醉與充爭言充曰父老不歸養卿為無天地純曰高貴鄉公何在充慙怒上表解職純亦自劾詔免純官仍下五府正其臧否石苞字仲容渤海南皮人先為揚州都督徵還以樂陵郡公就第以純榮宦忘親當除名齊王攸以為純于禮律未有違者詔復以純為祭酒吴殺其大司農樓元吴主以樓元為宫下鎮官名主殿中事元正身帥衆奉法而行應對切直吴主浸不悦中書令賀卲諫略曰臣聞異國之君樂聞其過荒亂之主樂聞其譽聞其過者過日消而福臻聞其譽者譽日損而禍至陛下嚴刑法以禁直辭黜善士以逆諌口是以正士摧方庸臣茍媚非所以保洪緒也吴主深恨之于是左右誣元與卲謗訕政事俱被詰責徙元于廣州竟殺之後卲病中風不能言吴主疑其詐收掠千數卒無一語乃燒鋸斷其頭韋昭領國史吴主欲為其父作紀昭曰文皇不登帝位當為傳吴主不悦人有言祥瑞者吴主以問昭昭曰此家人箱篋中物耳吴主以積怒遂誅之陳聲為司市吴主愛姬使人入市奪民物聲繩之以法吴主怒假他事殺之投其身于四望之下又湘東太守張詠以不出算緡㑹稽太守車浚以郡饑求賑皆令梟首尚書熊睦微諌以刀環撞殺之身無完膚嘗與羣臣飲問中書令張尚曰孤飲酒可以方誰尚曰陛下有百觚之量吴主怒曰尚知孔某不王而以孤方之遂殺尚舜四望山名在今江寧府城西北百觚見孔叢子堯千鍾孔子百觚癸晉泰始九年巳吴鳯凰二年夏四月戊辰朔日食晉以鄧艾孫朗為郎中初鄧艾之死人皆知其􅁈而莫為之辨者及晉主即位議郎段灼字休然敦煌人上疏理之疏曰艾本屯田掌犢人寵位已極功名已成七十老公復何所求正以劉禪初降逺郡未附矯令承制權安社稷鍾㑹有悖逆之心畏艾威名因其疑似搆成其事艾被詔書即束身就縛誠知奉見先帝必無當死之理也㑹受誅之後艾將吏愚戅自共追艾解其囚執艾在困地未嘗預謀而獨受腹背之誅豈不哀哉謂宜聴艾歸葬還其田宅繼封定諡則艾死無所恨而天下徇名之士思立功之臣亦樂為陛下死矣晉主善其言而不能從也至是問給事中樊建故蜀臣以諸葛亮之治蜀建稽首曰陛下知鄧艾之􅁈而不能直雖得亮得母如馮唐之言乎晉主笑曰卿言起我意乃以朗為郎中秋七月丁酉朔日食晉選公卿女備六宫晉主詔選公卿以下女備六宫有蔽匿者以不敬論采擇未畢權禁天下嫁娶明年又取良家女及小將吏女五千餘人入宫選之母子號泣于宫中聲聞于外甲晉泰始十年午吴鳯凰三年春正月乙未朔日食晉書武帝紀泰始十年日食但有三月癸亥不書晦朔而無正月乙未今依通鑑晉詔自今不得以妾媵為正嫡晉主以近世多由内寵以登后亂尊卑之序故有是詔三月癸亥日食秋七月晉后楊氏殂初晉主以太子不慧恐不堪為嗣常密以問后后曰立子以長不以賢豈可動也疾篤恐晉王更立后以危太子泣而言曰叔父駿字文長華陰人女芷有徳色願以備六宫晉主許之既葬晉主及羣臣除喪博士陳逵議以為今時所行漢帝權制太子無國事自宜終服尚書杜預曰古者天子諸侯三年之喪始同齊斬既葬除服諒闇以居心喪終制故周公不言高宗服喪三年而云諒闇此服心喪之文也君子之于禮存諸内而已禮非玉帛之謂喪豈衰麻之謂乎太子出則撫軍守則監國不為無事宜卒哭除衰麻而以諒闇終三年晉主從之晉以山濤為吏部尚書濤典選十餘年每一官缺輒擇才資可為者啟擬數人得詔㫖所向然後顯奏之晉主所用或非舉首衆以濤輕重任意為言晉主益親愛之濤甄抜人物各為題目而奏之時稱山公啟事晉以嵇紹字延祖為秘書丞紹康之子也以父得罪屏居私門至是山濤薦徴之紹欲辭不就濤謂之曰為君思之久矣天地四時猶有消息况于人乎紹乃應命初東闗之敗文帝問寮屬曰近日之事誰任其咎安東司馬王儀對曰責在元帥文帝怒曰司馬欲委罪于孤邪斬之儀子裒痛父非命隱居教授三辟七徵皆不就未嘗西向而坐廬于墓側旦夕攀柏悲號涕涙著樹樹為之枯讀詩至哀哀父母生我劬勞未嘗不三復流涕門人為之廢蓼莪家貧計口而田度身而蠶人或饋之不受助之不聴諸生宻為刈麥裒輒棄之遂不仕而終偉王儀字朱表修之子裒字元吴大司馬荆州牧陸抗卒抗疾病上疏曰西陵建平國之藩表既處上流受敵二境若敵汎舟順流星奔電邁非可恃援他部以救倒懸此乃社稷安危之機也臣死之後乞以西方為屬及卒吴主使其子晏景字士仁元機字士衡雲字士龍分將其兵機雲皆善屬文名重于世初周魴之子處膂力絶人不修細行鄉里患之處嘗問父老曰今時和嵗豐而人不樂何也父老嘆曰三害不除何樂之有處曰何謂也曰南山白額虎長橋蛟并子為三矣處曰若患止此吾能除之乃射虎殺蛟遂從機雲受學篤志讀書砥節礪行比及期年州府交辟縣南山即荆南山孫皓封為南嶽在今常州府荆溪南長橋在荆溪縣治南周處字子隱晉作河橋以舟相比為梁而渡在河南懐慶府孟縣南杜預以孟津渡險請建河橋于富平津杜佑曰在河陽縣南河陽注見前議者難之預曰造舟為梁河橋之謂也卒成之晉邵陵公曹芳卒諡曰厲芳廢凡二十一年卒初芳之廢也中郎范粲素服拜送哀動左右遂稱疾陽狂不言寢所乘車足不履地子僑等侍疾家庭足不出邑里及晉代魏詔以二千石禄養病加賜帛百匹僑以父疾篤辭不敢受粲不言凡三十六年年八十四終于所寝之車范粲字承明陳留外黃人吴比三年大疫乙晉咸寧元年未吴天冊元年秋七月甲申晦日食冬晉追尊祖廟宣帝為高祖景帝為世宗文帝為太祖晉大疫丙晉咸寧二年申吴天璽元年春晉徙河南尹夏侯和字義權霸之弟為光禄勲晉主得疾甚劇朝野皆屬意于齊王攸攸妃賈充長女也充先娶李豐女生二女長曰荃為齊王攸妃河南尹夏侯和謂充曰卿二婿親疎等耳謂攸及太子立人當立徳充不答攸素惡荀勗馮紞傾諂及晉主疾愈勗使紞説晉主曰陛下前日疾若不愈齊王為公卿百姓所歸太子雖欲高讓其得免乎宜遣歸藩以安社稷晉主陰納之乃徙和為光禄卿奪充兵權而位遇無替秋八月吴臨平湖在浙江杭州府仁和縣西北開歴陽山石印封發吴志天冊元年鄱陽言歴陽山石文理成字胡三省曰鄱陽郡無歴陽有歴陵饒州圖經亦載鄱陽歴陵縣有石印山考歴陵故縣在今九江府徳安縣輿志不載有石印山惟和州之歴陽山輿地紀勝以為即孫皓所祭之石印山蓋仍吴志之文也今以二説並注于此吴人或言于吴主曰臨平湖自漢末薉塞長老言湖塞天下亂湖開天下平近者無故忽開此天下當太平青蓋入洛之祥也吴主以問都尉陳訓字道元歴陽人對曰臣止能望氣不能達湖之開塞退而告其友曰青蓋入洛者銜璧之事也初吴人掘地得銀尺上有刻文吴主因改元天册又或獻小石刻皇帝字復改元天璽至是歴陽長上言歴陽山石印封發俗謂當太平江表傳歴陽縣有石山臨水高百丈其三十丈所有七穿駢羅穿中色黃赤謂之石印發則天下太平吴主遣使者祠之封其山為王又改明年元曰天紀冬十月晉加羊祜征南大將軍祜上疏請伐吴曰期運雖天所授而功業必因人而成蜀之為國皆云一人荷㦸千人莫當及進兵之日曽無藩籬之限乘勝席卷徑至成都誠以力不足以相抗也今江淮之險不如劍閣孫皓之暴過于劉禪吴人之困甚于巴蜀而大晉兵力盛于往時若引梁益之兵水陸俱下荆楚之衆進臨江陵平南豫州胡奮為平南將軍王戎為豫州刺史直指夏口徐揚青兖並㑹秣陵以一隅之吴當天下之衆勢分形散所備皆急一處傾壊則上下震蕩雖有智者不能為吴謀矣晉主深納之時議者多有不同賈充荀勗馮紞尤以為不可祐歎曰天下不如意事十常居八九天與不取豈非更事者恨于後時哉惟杜預及中書令張華與晉主意合贊成其計晉立后楊氏以后父駿為車騎將軍晉主初聘后后叔父珧字文琚上表曰自古一門二后未有能全其宗者乞藏其表于宗廟異日得以免禍晉主許之竟立后而以駿為將軍封侯駿驕傲自得鎮軍胡奮謂曰卿恃女更益豪邪歴觀前世與天家婚未有不滅門者但早晚事耳胡奮字元威烈之弟丁晉咸寧三年酉吴天紀元年春正月丙子朔日食秋七月有星孛于紫宫晉詔遣諸王就國封功臣為公侯晉主詔諸王各以户邑多少為三等大國置三軍五千人次國二軍三千人小國一軍一千一百人諸王為都督者各徙其國使相近其無官者皆遣就國異姓之臣有大功者封郡公郡侯羊祜封南城郡侯固辭不受祜歴事二世職典樞要凡謀議皆焚其草世莫得聞所進達之人皆不知所由常曰拜官公朝謝恩私門吾所不取也晉大水冬十二月索頭拓跋力微死先是力微子沙漠汗在洛陽以親老求歸晉主許之已而復入貢于魏當還衛瓘表留不遣陰以金帛賂遺諸部大人令致間隙至是沙漠汗歸國諸部大人譖而殺之力微以憂死年一百四子悉禄立後魏諡章帝諸部離散其國遂衰戊晉咸寧四年戌吴天紀二年春正月庚午朔日食夏六月晉羊祜入朝祜以病求入朝既至面陳伐吴之計晉主善之以祜病不宜數入更遣張華就問籌策祜曰孫皓暴虐已甚于今可不戰而克若皓沒更立令主雖有百萬之衆長江未可窺也華深然之祜曰成吾志者子也晉主欲使祜卧䕶諸軍祜曰取吴不必臣行但既平之後當勞聖慮耳秋晉大水螟詔以水災問主者何以佐百姓杜預上疏以為今者水災東南尤劇宜勅兖豫等州留漢氏舊陂以蓄水餘皆決瀝令饑者得魚菜螺蜯之饒此目下日給之益也水去之後填淤之田畝取數鍾此又明年之益也典牧種牛有四萬五千餘頭可給民使耕種責其租税此又數年以後之益也晉主從之民頼其利預在尚書七年損益庶政不可勝數時人謂之杜武庫言其無所不有也冬晉以衛瓘為尚書令是時朝野咸知太子昏愚不堪為嗣瓘欲啟而不敢㑹侍宴凌雲臺在洛陽縣魏文帝所造登之可見孟津瓘陽醉跪晉主前欲言而止者三因以手撫牀曰此座可惜晉主意悟因謬曰公真大醉邪遂悉召東宫官宴而密封尚書疑事令太子決之賈妃大懼倩外人代對多引古義給事張泓曰太子不學陛下所知不如直以意對妃喜謂泓曰便與我好答富貴與汝共之泓即具草令太子自寫晉主省之甚悦先以示瓘瓘大踧踖衆人乃知瓘嘗有言也賈充密遣人語妃云衛瓘老奴幾破汝家十一月晉詔毋得獻竒技異服晉太醫司馬程據獻雉頭裘晉主焚之于殿前因有是詔晉以杜預為鎮南大將軍都督荆州諸軍事鉅平漢縣晉末省故城在兖州府寧陽縣侯羊祜卒諡曰成祜疾篤舉預自代而卒晉主哭之甚哀祜遺令不得以南城侯印入柩晉主曰祜固辭歴年身沒讓存今聴復本封以彰高美南州民聞祜卒罷市巷哭吴守邊將士亦為之泣祜好遊峴山襄陽人建碑立廟于其地嵗時祭祀望其碑者無不流涕因謂之墮淚碑峴峴山在襄陽縣南亦曰首山晉清泉侯傅元卒元性峻急為司𨽻每有奏劾或值日暮捧白簡整簪帶竦踊不寐坐而待旦由是貴游震懾臺閣生風卒諡曰剛時司空何曽亦卒曽厚自奉養過于人主博士秦秀讓曰曽驕侈過度名被九域若生極其情死又無貶王公貴人復何畏哉謹按諡法名與實爽曰繆怙亂肆行曰醜宜諡繆醜公晉主策諡曰孝良秦秀字元新興人己晉咸寧五年亥吴天紀三年春晉以匈奴劉淵字元海為左部帥胡三省曰劉淵事始此初南匈奴自謂其先本漢室之甥因冒姓劉氏魏太祖留單于呼厨泉于鄴分其衆為五部使居并州境内左賢王豹呼厨泉兄子為左部帥部族最强晉文帝以鄧艾言分左部為二國立右賢王去卑子使居鴈門淵豹之子也㓜而儁異師事上黨崔游字子相博習經史嘗謂同門生曰吾嘗恥隨陸無武絳灌無文于是兼學武事及長猿臂善射膂力過人姿貌魁偉為任子在洛陽王渾及其子濟字武子皆重之薦于晉主曰淵有文武長才陛下任以東南之事吴不足平也孔恂楊珧曰非我族類其心必異不可重任時樹機能方陷涼州晉主問將于李熹字子和上黨人對曰陛下誠假淵一將軍之號使將之而西樹機能之首可指日而梟也恂曰淵果梟樹機能則涼州之患方更深耳晉主乃止東萊王彌家世二千石彌有學術勇畧善騎射青州人謂之飛豹淵與彌友善謂彌曰王李以鄉曲見知每相稱薦適足為吾患耳因縱酒長嘯歔欷流涕齊王攸聞之言于晉主曰陛下不除劉淵臣恐并州不得久安王渾曰大晉方以信懐殊俗奈何以無形之疑殺人侍子乎晉主然之㑹豹卒以淵代為左部帥冬十一月晉大舉兵分道伐吴晉益州刺史王濬上疏曰孫皓荒淫兇逆皓每宴羣臣咸令沈醉又置黃門郎十人為司過宴罷之後奏其闕失或剝人面或鑿人眼宜速征伐臣作船七年且有朽敗臣年七十死亡無日願陛下無失事機晉主于是決意伐吴㑹王渾言孫皓欲北上邊戍皆戒嚴乃更議明年出師杜預上表言之未報復具表言畧曰羊祜不博謀而與陛下計故令朝臣多異同之議凡事當以利害相校今此舉之利十有八九而其害止于無功耳若又中止孫皓怖而生計徙都武昌完修江南諸城逺其居民城不可攻野無所掠則明年之計亦無及矣晉主方與張華圍碁預表適至華推枰斂手曰陛下聖武國富兵彊吴主淫虐誅殺賢能今討之可不勞而定願勿以為疑晉主乃許之以張華為度支尚書量計運漕賈充荀勗馮紞固爭之晉主大怒充免冠謝罪山濤退而告人曰自非聖人外寧必有内憂今釋吴為外懼豈非算乎十一月遣將軍琅邪王伷由東莞徙封及王渾王戎胡奮杜預王濬唐彬字儒宗魯國人等將兵二十餘萬分道伐吴十二月晉將軍馬隆字孝興東平平陸人破樹機能斬之涼州平先是樹機能陷涼州晉主臨朝而歎曰誰能為我討此虜者司馬督馬隆進曰臣願募勇士三千人無問所從來帥之以西虜不足平也晉主許之以為討虜將軍武威太守隆募能引弓四鈞挽弩九石者立標簡試得三千五百人隆曰足矣又請自主武庫選仗晉主命惟所取仍給三年軍資而遣之隆西渡温水胡三省注武威東有温圍水樹機能以衆數萬據險拒之隆以山路陿隘乃作扁箱車為木屋施於車上隆轉戰而前殺傷甚衆至武威鮮卑大人帥萬餘落降隆與樹機能大戰斬之涼州遂平晉詔議省吏員詔問朝臣以政之損益司徒長史傅咸字長虞元之子上書以為公私不足由設官太多當今之急在并官省役務農而已遂議省州郡縣半吏赴農功中書監荀勗以為省吏不如省官省官不如省事省事不如清心若直作大例天下之吏悉省其半恐郡國職業劇易不同不可以一概施之若有曠闕皆須更復或激而滋繁亦不可不重也御批歴代通鑑輯覽卷二十九

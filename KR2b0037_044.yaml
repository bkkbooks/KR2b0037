front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷四十五南北朝癸梁承聖二年魏主欽酉二年齊天保四年春正月魏宇文泰自加都督中外諸軍事三月梁武陵王紀伐江陵魏遣大將軍尉遲迥尉遲魏之别部後以為氏迥字羅代人伐成都以救之
  hash: sha256:aa9ffea59816e235252c01f056456746f91628182ca32cf8eb35cdfa223f3257

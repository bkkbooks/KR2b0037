front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷三十一晉孝恵皇帝乙丑永興二年夏四月張方復廢羊后秋七月東海王越自領徐州都督傳檄討張方
  hash: sha256:47816cd745b1cd129c5ab371e3db4b8860efb83d14fe04bd0dd2aee79ea0fd62

front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷一伏羲氏在位一百十五年傳十五世太昊伏羲氏
  hash: sha256:4b910e41879197c04dcdf0d809f0025a021fd217f4c761b9fa5e26945891ea8f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_001-1a, image: WYG0335/WYG0335-0030c.png}
body:
  text: 帝生于成紀帝母居于華胥之渚履巨人跡意有所動虹且繞之因而始娠生帝于成紀華胥古國寰宇記藍田縣有華胥氏陵成紀故城在今甘肅秦州秦安縣以木德繼天而王故風姓有聖德象日月之明故曰太昊都陳左傳陳太昊之墟鄭樵通志伏羲都陳宛邱城是也宛邱今河南陳州府治是始畫八卦帝德洽上下有龍馬說文龍鱗蟲之長玉篇馬武獸也此馬身而龍鱗故曰龍馬負圗出于河孔安國書傳伏羲氏王天下龍馬出河朱子河圖論圖之位一與六共宗而居乎北二與七為朋而居乎南三與八同道而居乎東四與九為友而居乎西五與十相守而居乎中乃仰觀象于天俯察法于地中觀萬物之宜始畫八卦卦有三爻因而重之為卦六十有四以通神明之德而卜筮自此生焉劉恕通鑑外紀伏羲德洽上下天應以鳥獸文章地應以河圖洛書則而象之乃作易說本禮緯舍文嘉羅泌路史鄭樵通志皆因之考易大傳河出圖洛出書漢孔安國劉向父子班固俱以河圖授羲洛書錫禹宋邵子朱子並同今依書傳朱子為據餘說皆不取教民佃漁畜牧民處草野逐捕禽獸茹毛飲血帝始結網罟以教佃漁故曰伏羲養犧牲以充庖㕑故又曰庖犧以龍紀官因龍馬之瑞故以龍名官號曰龍師春官為青龍又曰蒼龍氏夏官為赤龍氏秋官為白龍氏冬官為黑龍氏中官為黃龍氏僞三隤伏羲以共工為上相柏黃為下相朱襄為飛龍氏昊英為潛龍氏大庭為居龍氏渾沌為降龍氏隂康為土龍氏栗陸為水龍氏命官之名與後十五世帝號多同今不取作書契上古結繩以紀事帝易之以書契百官以治萬民以察作甲厯帝始立周天厯度以定日月列星分度見晉書天文志乃作甲厯日月嵗時日主晝月主夜日月相逐積三百六十晝夜為一嵗說見周髀算經自此而生焉外紀伏羲有甲厯五運通志甲厯起于甲寅王應麟曰甲寅之說蓋本通厯考大撓始作甲子若伏羲時已干支相配黃帝又何必命官重作乎今不取制嫁娶民男女無别帝制嫁娶以儷音麗偶數皮為禮正姓氏通媒妁以重人倫之本而民始不瀆造琴瑟斫桐為琴繩絲為絃絃二十有七絙古登切桑為三十六絃之瑟而樂音自是興焉伏羲樂曰立基亦曰扶來載孝經鈎命訣今不取帝崩葬于陳太昊陵在今陳州府懷寧縣西北帝神靈首出開物成務立極萬世在位一百一十有五年而崩傳十五帝曰女媧氏佐太昊正婚姻以重萬民之判是為神媒太昊沒共工氏作亂女媧誅之以治天下命臣隨作笙簧以通殊風娥陵制都良管以一天下之音破五十絃之瑟為二十五絃而樂以和柏皇氏中央氏亦曰中皇大庭氏具膺録也三辰增輝五鳯異色都于曲阜故魯有大庭氏之庫亦曰朱顔氏栗陸氏驪連氏亦曰昆連渾沌氏亦曰混敦赫胥氏其時之民鼓腹而遊舍哺而嬉晝動夕息渴飲飢食莫知作善而作惡也尊盧氏昊英氏又曰子英有巢氏上古聖人教民巢居及其久也木處而顛有聖人教之編槿而廬緝雚而扉革有巢之化故亦號有巢氏朱襄氏又曰子襄葛天氏其治世也不言而信不化而行其作樂也三人操牛尾投足以歌八闋是謂廣樂隂康氏無懷氏其民草食而樂居懷土而重生雞犬之音相聞民至老死不相往來命之曰無懷氏之民凡一千二百六十年而神農氏作神農氏在位一百四十年傳八世合五百二十年炎帝神農氏帝起于烈山帝母曰安登有神龍之感而生帝于烈山烈山一名厲山在湖北德安府隨州北荆州記厲鄉縣有石穴昔神農生此世謂之神農穴故亦曰烈山氏長于姜水在今陜西鳳翔府岐山縣東水經注岐水東徑姜氏城南為姜水故以姜為姓以火德代伏羲氏治天下故曰炎帝都陳遷曲阜皇甫謐帝王世紀炎帝都于陳又徙魯元和志曲阜古炎帝之墟曲阜今縣屬山東兖州府以火紀官春官為大火夏官為鶉火秋官為西火冬官為北火中官為中火初藝五穀民茹草木食禽獸不知耕稼帝因天時相地宜斫木為耜揉木為耒教民藝五榖而農事興焉始制醫藥民有疾病未知藥石帝始味草木之滋察其寒溫平熱之性辨其君臣佐使之義神而化之遂作方書以療民疾而醫道立矣復察水泉甘苦令人知所趨避由是民無夭札之患天下宜之故號神農氏立市㕓列㕓于國日中為市致天下之民聚天下之貨交易而退各得其所夙沙氏英賢傳炎帝時侯國來歸諸侯夙沙氏叛煮海為鹽說文古者夙沙煮海始謂之鹽不用帝命其臣箕文諫而被殺帝益修厥德夙沙之民自攻其君而來歸帝崩于長沙今湖南長沙府之茶鄉今長沙府茶陵州葬茶陵炎帝陵在今湖南衡州府酃縣西帝興萬世生養之利法省而不煩威厲而不試其俗朴重端慤不忿爭而財足無制令而民從在位一百四十年而崩傳八世譙周曰自神農至榆罔相承八代曰帝臨魁炎帝子在位八十年帝承帝臨魁子在位六十年帝明帝承子在位四十九年帝宜帝明子在位四十五年帝來帝宜子在位四十八年帝裏帝來子又曰帝居在位四十三年帝榆罔帝裏曾孫神農氏之政至帝始衰諸侯攜二帝居位之五十五年諸侯尊軒轅為天子降封帝于潞神農氏遂亡帝炎帝有别子曰柱佐帝播種五榖後世祀以為稷裏有孫曰戲其後有勾龍為類頊后土能平九州辨土地之宜後世祀之以配社凡五百二十年而黃帝氏作軒轅氏在位一百年黃帝軒轅氏少典氏神農時諸侯之子母曰附寶見電光繞斗感而有孕生帝于軒轅之邱在今河南開封府新鄭縣故曰軒轅氏姓公孫長于姬水故又以姬為姓國于有熊即新鄭杜佑通典新鄭祝融之墟黃帝都于有熊亦在此也故亦曰有熊氏誅蚩尤史記索隱古諸侯號于涿鹿山名在今直隸宣化府保安州南蚩尤好兵喜亂作刀㦸大弩以暴虐天下兼并諸侯攻炎帝榆罔榆罔遜居涿鹿帝乃徴師諸侯與蚩尤戰于涿鹿之野蚩尤作大霧軍士昏迷帝為指南車以示四方陳殷曰車上用子午盤針以定四方是為指南遂擒蚩尤而戮之史記炎帝欲侵陵諸侯軒轅乃修德振兵與炎帝戰于阪泉之野三戰然後得其志說本大戴禮五帝德篇考左傳晉文公將勤王使卜偃卜之曰吉遇黃帝戰于阪泉之兆然不言其與炎帝戰也若如戴德史遷所云則放伐之事軒轅已先行之成湯何必更有慙德且三戰得志其文尤不雅馴今不取諸侯尊帝為天子帝自涿鹿還諸侯咸尊帝為天子以代神農氏因有土德之瑞色尚黃故號曰黃帝以雲紀官帝初受命適有雲瑞乃以雲名官春官為青雲夏官為縉雲秋官為白雲冬官為黑雲中官為黃雲立六相暨史官帝舉風后太昊之裔力牧太山稽常先大鴻史記封禪書鬼臾蓲號大鴻容臾蓲音邱以治民命蒼頡為左史沮誦為右史制六書蒼頡觀鳥獸蹄迒之跡體類象形而制字字有六義一曰象形謂日月之類象形體而為之也二曰指事謂上下之類人在一上為上人在一下為下各指其事以為之也三曰㑹意謂武信之類止戈為武人言為信㑹合人意也四曰轉注謂考老之類左右相轉以為言也五曰諧聲謂江河之類皆以水為形以工可為聲也六曰假借謂令長之類一字兩用也使天下義理必歸文字天下文字必歸六書循蜚紀以蒼頡為史皇又言創成文字天為兩粟鬼為夜哭其說迂怪今不取制陳法帝衍握竒亦作機之法太平御覽風后為黃帝衍握竒圖設五旗軍中所建具五方之色五麾牙旗也以牙為飾亦具五色見出軍訣六毒與纛同軍中大旗也而制其陳熊山獸春出冬蟄羆似熊多力貔豹屬出貉國貅猛獸貔類以為前行路史注此言勇鋭之士鵰鷙鳥似鷹而大鶡毅鳥似雉鴈隨陽之鳥鸇鷂屬即晨風以為左右路史注此言旗之所繪又命岐伯作鐲形如小鐘以節鼓鐃似鈴無舌以止鼓鼓革音之器為羣音長角形如筒軍中所吹靈鞞騎上鼓神鉦今之銅鑼以揚德而建武立占天官帝設靈臺立五官天地神民物類之官以叙五事命鬼臾蓲占星羲和占日尚儀占月車區占風作甲子帝命大撓探五行之情占斗柄即斗柄東北第七星也所建史記天官書攝提直斗杓所指以建時節始作甲子甲乙丙丁戊己庚辛壬癸謂之幹子丑寅卯辰巳午未申酉戌亥謂之枝枝幹相配以名日而定之以納音作蓋天即渾天儀及調厯黃帝厯名命容成作蓋天以象周天之形因五量起于黃鐘之籥合籥為合以十乘之為升斗斛是為嘉量定五氣五行之氣起消息皇侃曰陽生為息隂死為消察發斂孟康曰春夏為發秋冬為斂以作調厯嵗紀甲寅日紀甲子而時節定是嵗己酉朔旦日南至而獲神䇿神蓍也乃迎日推䇿推算以逆知時日造十六神厯積斜音餘分以置閏配甲子而設蔀至朔同在日首謂之蔀于是時惠而辰從定算數即九章算法命𨽻首定數以率其羡要其㑹而律即律吕數因律起律以數成度分寸尺丈引所以度長短量注見上衡所以任權而平銖兩斤石鈞之輕重由是成焉造律吕作咸池之樂帝命伶倫取竹嶰溪之谷昆侖之北谷斷兩節間而吹之以為黃鐘之宫律之最長者制十二筒以聽鳳靈鳥五采而文其雌凰凰之鳴其雄鳴六雌鳴亦六以比黃鐘之宫損益相生下生者三分損一上生者三分益一為六律黃鍾太簇姑洗㽔賓夷則無射陽管為律六吕大吕應鍾南吕林鍾仲吕夾鍾隂管為吕又命榮猿鑄十二鐘金音之器以協月筒于是文之以五聲宫商角徴羽播之以八音金石絲竹匏土革木命大容作雲門大卷之樂中春之月乙卯之辰日在奎西方奎十六星天之武庫始奏之命曰咸池作冕旒冠有旒曰冕垂玉曰旒正衣裳帝作冕垂旒充纊細綿也為元衣黃裳以象天地之正色旁觀翬翟草木之華乃染五采為文章以表貴賤作器用命寧封為陶正赤將為木正以利器用揮作弓夷牟作矢以威天下又命共鼓化狐刳木為舟剡木為楫以濟不通邑夷作車以行四方服牛乘馬備物致用而天下利矣作合宫帝廣宫室之制遂作合宫又曰明庭以祀上帝享百神而敷政焉作貨幣范金五色之金為貨制金刀錢名也立五幣金刀泉布帛以制國用作內經帝察五氣燥濕寒溫涼立五運甲巳土乙庚金丙辛水丁壬木戊癸火洞性命紀隂陽咨于歧伯而作內經復命俞跗雷公察明堂究息脉巫彭桐君處方餌而人得以盡年教民蠶西陵氏之女嫘力追切祖為帝元妃始教民育蠶治絲繭以供衣服而天下無皴瘃音逡祝寒瘍也之患後世祀為先蠶畫野分州經土設井帝方行天下史記帝拔山通道未嘗寧居遷徙往來以師兵為營衛東至海西至崆峒山名在今甘肅肅州髙臺縣西南南至江注詳後北逐葷粥史記胸奴傳唐虞以前有山戎葷粥獫狁居于北蠻合符釡山在今直隸宣化府保安州西南而邑于涿鹿之阿括地志媯州有涿鹿故城本黃帝所都唐媯州今保安州是于是畫野分州得百里之國萬區命匠營國邑置左右大監監于萬國萬國以和遂經土設井言其經界如井字也以塞爭端立步六尺為步制畝步百為畝以防不足使八家為井井開四道而分八宅井一為鄰鄰三為朋朋三為里里五為邑邑十為都都十為師師十為州分之於井而計于州故地著猶言土著而數詳屈軼生于庭鳳凰巢于閣麒麟仁獸毛蟲之長牡曰麒牝曰麟逰于囿帝順天地之紀風雨時若人無夭札物無疵癘有草生于庭佞人入則指之名曰屈軼鳳凰巢于阿閣麒麟逰于苑囿帝崩于荆山之陽葬橋山在今陜西鄜州中部縣西北亦曰子午山接甘肅慶陽府真寧縣界黃帝陵在山上帝採首山在今河南許州襄城縣南之銅鑄三鼎于荆山在今河南陜州閿鄉縣南之陽八月既望鼎成崩焉其臣左徹感思取衣冠几杖而廟祀之帥諸侯羣臣嵗時朝焉帝生而神靈弱而能言幼而徇疾也齊速也長而敦敏成而聰明德配天地宰制羣動故民安樂不使而成不禁而止在位百年而崩年一百十有一嵗有子二十五人其得姓者十有四人曰祁已滕針任旬嬉姞嬛衣二姬二酉别為十二姓元妃之子摰嗣位為少昊氏金天氏在位八十四年少昊金天氏名摯亦曰元囂又曰清陽已姓黃帝之子母即嫘祖感大星如虹下臨華渚而生帝自窮桑在曲阜縣北登帝位以金德王天下故曰金天氏史記黃帝之子曰元囂是為青陽降居江水不得立漢書少昊帝考德曰清凊者黃帝之子清陽也考少昊之立見于左傳故漢書因之史記之說非是都曲阜左傳伯禽封于少昊之墟帝王世紀少昊自窮桑徙曲阜以鳥紀官帝之立也鳳鳥適至因以鳥紀官鳳鳥杜預左傳注鳯知天時氏為厯正元鳥燕也春分來秋分去氏司分伯趙伯勞也夏至鳴冬至止氏司至青鳥鶬鷃也立春鳴立夏止氏司唘丹鳥鷩雉也立秋來立冬去氏司閉是為厯正之四屬祝鳩鷦鳩孝鳥氏為司徒雎鳩王鳩鷙而有别氏為司馬鳲鳩鴶鵴性均平氏為司空爽鳩鷹也性鷙氏為司冦鶻鳩鶻鵰春來冬去氏為司事是為鳩聚也民之官又立五雉雉有五種為五工正賈逵曰西鷷雉主攻木東鶅雉主磚埴南翟雉主攻金北鵗雉主攻皮伊洛之南為翬雉主飾五色利器用正度量以夷平也民立九扈扈有九種為九農正賈逵曰春扈趣民耕夏扈趣民耘秋扈趣民斂冬扈趣民蓋藏棘扈為果驅鳥行扈晝為民驅鳥宵扈夜為農驅獸桑扈為蠶驅雀老扈趣民收麥今不得晏起以扈止也民無淫作大淵之樂帝之御世諸福之物畢至爰書鸞似鳯多青鳳韋續字源少昊作鸞鳯書立建鼓大鼓也制浮磬林之竒曰磬石取至輕者故謂之浮以通山川之氣合樂以諧人神和上下是曰大淵帝崩葬于曲阜少昊陵在今曲阜縣東北帝能修太昊之法象日月之明故曰少昊在位八十四年而崩年百嵗嗣位為髙陽氏髙陽氏在位七十八年顓頊髙陽氏姬姓黃帝之孫黃帝元妃西陵氏生昌意昌意降居若水即瀘水今名打沖河源出西畨徑四川寧逺府之西昌諸縣與金沙江合娶蜀山氏女是為女樞感瑶光貫月之祥生帝帝年十嵗佐少昊二十即帝位初國髙陽今河南開封府杞縣髙陽城是故號髙陽氏以水德王色尚赤都于帝邱今直隸大名府開州有濮陽故城漢書地理志濮陽古帝邱顓頊墟始以民事紀官以少昊之子重為木正曰勾芒該為金正曰蓐收修熙相代為水正曰元冥又以炎帝之後勾龍為后土而帝之孫黎為火正曰祝融分治五方是為五官命重黎治神人少昊之衰九黎尚書正義黎氏九人當時諸侯之為亂者亂德民神雜揉家為巫史民瀆齊盟災禍薦臻帝乃命南正重司天以屬神北正黎司地以屬民使復舊常無相輕瀆民用安生以建寅月為厯元帝作厯以孟春之月為元是嵗正月朔旦立春五星㑹于營室北方營室二星一曰元宫一曰清廟冰凍始泮蟄蟲始振雞始三號天地萬物莫不應和故後世稱帝為厯宗晉書律厯志黃帝作調厯後顓帝以孟春月為元遂為厯宗制九州馬端臨文獻通考顓帝創制九州帝始建九州兖冀青徐豫荆揚雍梁統領萬國北至幽陵即幽州南至交趾即南交西至流沙在今安西府敦煌縣西南地理今釋即古居延澤也其沙隨風流行故名東至蟠木東海中山日月所照莫不砥平也屬四逺皆平而來服屬作承雲之樂命飛龍氏㑹八風條風明庶風清明風景風涼風閻闔風不周風廣莫風是為八風之音為圭水之曲以召氣而生物浮金效珍鑄之為鐘作五基六英之樂以享上帝朝羣侯名曰承雲帝崩葬于濮陽濮陽注見上顓帝陵在今河南衛輝府滑縣東北帝靜淵以有謀疏通而知事養材以任地載時以象天依鬼神以制義治氣以教化潔誠以祭祀在位七十八年崩年九十一嵗少昊之孫帝嚳嗣位是為髙辛氏髙辛氏在位七十年帝嚳髙辛氏姬姓名夋七倫切少昊之孫父曰橋極帝生而神異自言其名年十五佐帝頊受封于辛今河南歸德府商邱縣南有髙辛里元和志帝嚳初封此年三十代髙陽氏為天子以肇基于辛故曰髙辛氏以木德王色尚黑都于亳今河南河南府偃師縣西有亳城帝王世紀契父帝嚳都此作六英之樂命咸黑典樂為聲歌名曰六英帝崩葬于頓丘頓丘故城在今直隸大名府清豐縣西南帝嚳陵在今河南衛輝府滑縣東北帝聰以知逺明以察微順天之義知民之急仁而威惠而信執中而遍天下日月所照風雨所至莫不從服在位七十年崩年百有五嵗帝元妃有邰氏女曰姜嫄出祀郊禖見大人之跡履之震動有娠生棄次妃有娀氏女曰簡狄春分元鳥降簡狄祈于郊禖􅜈遺卵簡狄吞之而孕生契三妃陳鋒氏女曰慶都有赤龍之感孕十四月生堯四妃娵訾氏女曰常儀生摯帝崩摯嗣位帝王世紀摯母于四妃之中班最下而摯子兄弟年最長故登帝位九年荒淫無度諸侯廢之而尊堯為天子是為陶唐氏陶唐氏在位一百嵗帝堯陶唐氏姬姓髙辛氏次子曰放勳育于母家伊侯之國今河南汝州伊陽縣後徙耆亦曰黎今山西潞安府黎城縣故曰伊耆氏身長十尺龍顔日角眉有八彩年十三佐帝摯封植受封于陶今山東曹州府定陶縣是又封于唐今直隸保定府唐縣是故為陶唐氏年十六諸侯廢帝摯而尊為天子以火德王色尚白甲辰元載帝即位都平陽漢書地理志河東郡平陽應劭曰堯都也平陽故城在今山西平陽府臨汾縣命羲和治厯象羲氏和氏重黎之後帝命治厯象授人時羲仲居嵎夷東表之地胡渭禹貢錐指今朝鮮地理東作以殷仲春羲叔居南交交跡之地地理今釋今安南國理南訛化也以正夏至和仲居西西極之地地理今釋流沙以西皆是理西成以殷仲秋和叔居朔方北荒之地地理今釋大漠以北山川攸逺故稱朔方以為大界理朔易朔猶言蘇易改也以正冬至乙巳二載置閏法帝既命羲和治厯象四時推候皆合積一朞而天有餘度嵗有餘日于是又置閏法嵗有十二月月有三十日三百六十者一嵗之常數日與天會而多五日有竒為氣盈月與日會而少五日有竒為朔虛合氣盈朔虛而閏生焉日月氣候始參㑹後世章法三嵗一閏五嵗再閏十有九嵗七閏為一章昉于此金氏履祥曰章法雖云氣朔齊然猶有分秒之餘至二十七章為會三會為統三統為元積四千六百一十七年日月皆無餘分却得十一月甲子朔子時半冬至又為厯元矣置諫鼓立謗木置敢諫之鼓使天下得盡其言立誹謗之木使天下得攻其過作戒戒曰戰戰栗栗日謹一日人莫躓于山而躓于垤戊申五載越裳氏在交址南明史外國傳占城國古越裳地秦為林邑縣漢曰象林晉以後為林邑國後更號占城來朝越裳氏重譯來朝獻大龜蓋千嵗方三尺餘背有科斗文記開闢以來帝命録之時有草生于庭曰蓂莢十五之前日生一葉十五之後日落一葉小餘則一葉厭而不落觀之可以知旬朔庚戌七載麒麟逰于郊藪帝在位七年民不作忒鴟久山海經蒼梧之野有鴟久注即鵂鶹李時珍曰鴟同鴟惡鳥也久前編誤作又今改正逃于絶域麒麟逰于郊藪乙卯十有二載巡狩方嶽帝臨民以十二十二載巡狩也一周流五嶽存鰥寡賑荒札一民飢則曰我飢之一民寒則曰我寒之一民罹辜則曰我陷之故民戴之如日月愛之如父母甲申四十有一載虞舜生舜之先國于虞括地志故虞城在河北縣虞山之上酈道元云堯以女嬪于虞之地也河北故城在今山西解州平陸縣系出虞幕史記以舜為顓頊五世孫路史以五帝中舜獨不出于黃帝而仍依史記以敬康而下為舜之祖考左傳自幕至于瞽瞍無違命不言世數及名今故于幕之下瞍之上皆闕之父瞽瞍盲母握登有大虹之感生舜于姚墟在今山西蒲州府永濟縣後居溈汭二水名在永濟縣首陽山下南曰溈北曰汭癸巳五十載帝逰于康衢帝逰康衢有童歌曰立我蒸民莫匪爾極不識不知順帝之則有老人擊壤而歌曰日出而作日入而息鑿井而飲耕田而食帝力于我何有哉帝又觀于華華封人祝曰使聖人富夀多男子帝曰多男多懼富則多事夀則多辱封人曰天生蒸民必授之以職多男而授之職何懼之有冨而使人分之何事之有天下有道與物皆昌天下無道修德就閒千嵗厭世去而上仙乘彼白雲歸于帝鄉何辱之有縣華華山在今陜西同州府華隂南癸卯六十載虞舜以孝聞舜母早喪瞽瞍更娶妻生象象傲瞍惑後妻愛少子嘗欲殺舜舜盡孝悌之道日以篤謹年二十以孝聞耕于厯山即雷首山今曰中條跨蒲州府永濟諸縣界人皆讓畔漁于雷澤在雷首山下亦曰雷水人皆讓居陶于河濱今永濟縣北有陶城寰宇記舜陶河濱即此器不苦窳作什器猶言什物于夀邱在今山東兖州府曲阜縣東就時謂逐時以販于負夏鄭康成曰衛城所居一年成聚二年成邑三年成都甲辰六十有一載洪水命鯀顓帝長子駱明之子治之功弗成時龍門山名在今陜西同州府韓城縣東北未開吕梁亦山名在今山西汾州府永寧州東北未鑿河出孟門亦山名在今山西吉州西南之上江淮流通河江淮注俱詳後無有平原髙阜帝求能治水者四嶽掌方嶽之官舉鯀帝乃封鯀為崇伯使治之鯀乃大興徒役作九仞之城訖無成功癸丑七十載舉舜登庸帝在位七十載以子朱嚚訟不可授乃詢四嶽求遜位四嶽羣臣咸舉舜帝亦聞之于是以二女妻舜以觀其內使九男與處以觀其外舜內行彌篤二女執婦道九男皆益篤帝以舜為賢乃命以位金氏履祥曰書稱帝堯克明峻德以親九族若如史記世系則堯之于舜為同髙祖之族而直妻以二女豈得謂之克明峻德故知堯舜不同出于黃帝也舜舉八愷八元和五典叙百揆髙陽氏有才子八人曰蒼舒隤敳檮戭大臨龎降庭堅仲容叔達敳音皚檮音稠戭音演天下謂之八愷髙辛氏有才子八人曰伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍天下謂之八元此十六族也世濟其美舜舉之使八愷主后土以揆百事八元布五教于四方於是五典克從而無違教百揆時叙而無廢事甲寅七十有一載舜賔于四門流四凶族帝鴻氏黃帝之後有不才子曰渾沌少昊氏有不才子曰窮竒顓頊氏有不才子曰檮杌縉雲氏黃帝之官有不才子曰叨餐天下謂之四凶舜投諸四裔于是四門穆穆而無凶人乙卯七十有二載舜納于大麓帝使舜入山林相視原隰雷雨大至衆懼失常舜行不迷命舜攝位帝曰咨爾舜天之厯數在爾躬允執厥中殛鯀于羽山在今江南海州贛榆縣東放歡兜堯時司徒杜預以為即渾沌說不足據于崇山在今湖南澧州永定縣東命禹治水鯀既殛死乃命禹為司空使續父業禹與益顓頊之裔孫曰女修生大業大業生大費是為伯益稷即棄也同受命命諸侯百姓興人徒以傅土禹乘四載水乘舟陸乘車泥乘輴山乘樏行山表木勞身焦思以水之患莫大于河濟次之淮與江又次之乃先治河始壺口禹導河自積石而施功則自壺口始于是闢龍門鑿砥柱自孟津而北疏為九河之積石山有二一曰大積石即今大雪山在今青海西南境禹導河自此一曰小積石在今蘭州府河州西北古唐山也壺口山在今山西吉州西南龍門注見上砥柱山在今河南陜州黃河之中有三門禹所鑿孟津在河南懷慶府孟縣南今曰河陽渡九河曰徒駭太史馬頰覆釜胡蘇簡潔鈎盤鬲津爾雅疏徒駭是河之本道東出分為八枝也瀹濟自沇水濟之上源為沇東流為濟入于河溢為滎東出于陶丘北㑹于汶見沇水即濟源出今河南懷慶府濟源縣王屋山既而伏復出為東西二池合流至溫縣潛行絶河滎即滎澤亦曰滎瀆在今開封府滎陽縣南陶邱地名在今山東曹州府定陶縣西南汶水有五北汶嬴汶柴汶牟汶其一經流曰大汶出山東泰安府萊蕪縣與四汶合流舊自安民亭合濟導淮自桐柏㑹于泗沂柏桐柏山在今河南南陽府桐縣淮水出其支山曰胎簪泗水出今山東兖州府泗水縣陪尾山四源並發故名沂水出今山東沂州府沂山舊沂入于泗泗入于淮今為運道所經俱已改流不具載導江自岷山别為沱過九江㑹于漢匯為彭蠡東為中江支岷山在今四川茂州及松潘衛連亘數千里其一曰羊膞嶺江水所出沱有二一在梁州今四川成都府之郫江是一在荆州今湖北荆州府之夏水是九江即洞庭湖在今湖南嶽州府接長沙常德二府界沅漸辰無叙酉湘資澧九水滙焉故曰九江漢水出今陜西漢中府寧羌州嶓冡山是為東漢水至湖北之漢陽入于江彭蠡即鄱陽湖在今江西南康府與九江饒州諸府接界中江江之經流漢為北江彭蠡之支為南江皆注諸海是為四瀆獨發源而注海曰瀆四瀆修而民宅土矣北條之水入于河濟南條之水入于江淮然後人得平土而居之丙辰七十有三載正月朔舜受終于文祖舜受終于帝始祖之廟以攝位告齊七政在察也璿璣玉衡以玉為璣象天之運轉以璿珠飾之象星辰之位次以玉為橫簫推其分度時節以窺天而與璣合後世渾天儀象蓋其法也以齊七政日月五星也舉羣祀類于上帝禋于六宗四時寒暑日月星水旱書六宗之說不一今從蔡沈傳望于山川遍于羣神覲羣后輯五瑞公桓圭侯信圭伯躬圭子榖璧男蒲璧擇吉月日覲四嶽羣牧班瑞丁巳七十有四載巡守去聲下並同嵗二月東巡守至于岱宗泰山在今山東泰安府泰安縣柴望秩于山川肆覲東后協時月正日同律度量衡修五禮吉凶軍賔嘉五玉三帛元纁黃二生羔雁一死雉贄如五器同五禮之器卒乃復五月南巡守至于南嶽衡山在今湖南衡州府衡山縣如岱禮八月西巡守至于西嶽華山注見前如初十有一月朔巡守至于北嶽恆山在今山西大同府渾源州如西禮歸格于藝祖書傳藝文也孔穎逹曰藝祖文祖史變文耳用特特牲謂一牛也流共工古之世官族也鄭樵曰共工氏蓋自伏羲之後子孫承傳以至堯舜之世于幽州今順天府密雲縣東北有共城括地志舜流共工于此己未七十有六載竄三苗國名吳起曰三苗之國左洞庭而右彭蠡是也考三苗即今湖南溪峝諸苗其種不一故唐虞時即號三苗孔安國以為縉雲氏之子叨餮是専指一人而言說不足據于三危山名在今安西府敦煌縣南三峯聳峙如危欲墜故名制五刑象以典刑墨劓剕宫大辟五刑之正流宥五刑五刑可矜遣之逺去鞭作官刑官府之刑撲作教刑學校之刑金作贖刑罪之極輕眚過誤災不幸肆赦怙有恃終再犯賊刑庚申七十有七載作大章之樂辛酉七十有八載神龜出于洛洛水出陜西雒南縣冢嶺山至河南鞏縣入河禹治水時有神龜負文而出列于背有數自一至九蔡沈書傳戴九履一左三右七二四為肩六八為足此洛書之數也禹因而第之以成九類癸亥八十載禹治水成功禹八年于外三過其門而不入始冀州冀為帝都三面距河次兖濟河為兖次青海岱為青次徐海岱及淮為徐次揚淮海為揚次荆荆及衡陽為荆次豫荆河為豫次梁華陽黑水為梁次雍黑水西河為雍通九川九州之川度九山九州之山陂九澤九州之澤任土作貢則壤成賦弼成五服甸侯綏要荒外薄四海于是禹錫元圭告厥成功禹以元圭為贄而告成功水色黑故圭以元甲子八十有一載分十二州肇十有二州分冀之東為并州東北為幽州青之東北為營州封十有二山每州封表一山以為之鎮封諸侯錫姓氏封禹于夏帝王世紀禹受封在河南陽翟陽翟今開封府禹州是錫姓姒氏是為夏后氏統領州伯以巡十二部契于商括地志商洛縣契所封商洛故城在今陜西商州姓子氏是謂商之始祖棄于邰今陜西乾州武功縣有故斄城棄所封姓姬氏是為周之始祖四嶽共工從孫為四嶽之官于吕今河南汝寧府新蔡縣有大呂亭古吕國姓姜氏又加賜伯益姓嬴氏是為秦趙之祖癸未百載帝崩于成陽故城在今山東曹州府濮州葬穀林即成陽今堯陵在泰安府東平州帝欽明文思允恭克讓其仁如天其智如神就之如日瞻之如雲存心于天下加志于窮民仁昭而義立德博而化廣故不賞而民勸不罰而民治在位百有一年而崩年一百十七嵗百姓如喪考妣三載四海遏密八音舜避帝之子于南河之南今濮州東有偃朱城括地志舜避丹朱于此天下不歸帝之子而之舜舜乃即天子位為有虞氏有虞氏在位四十八載帝舜有虞氏姚姓曰重華淮南子舜二瞳子是為重明其先國于虞系見前故曰有虞氏丙戌元載正月帝即位帝服堯喪三年畢始格于文祖告即位以土德王色尚赤都蒲坂故城在今山西蒲州府永濟縣亦曰虞都城詢四嶽闢四門明四目達四聰咨十二牧帝曰食哉惟時柔逺寬而撫之能邇擾而習之惇德厚有德允元信仁人而難任人任古文作壬拒姦惡也蠻夷率服命九官命禹宅百揆棄為后稷播百穀契為司徒敷五教臯陶字庭堅髙陽氏子考路史以臯陶為少昊之後四世今依杜預左傳注作士明五刑垂勾龍之子作共工主工師益作虞治山澤伯夷垂之子或曰四嶽作秩宗典三禮䕫亦曰后䕫典樂教胄子龍路史曰晏龍作納言出納帝命封堯子朱于丹今山東青州府臨朐縣東北有丹水竹書紀年堯處丹朱于丹水即此初堯讓天下于舜處子朱于丹淵即丹水為諸侯至是封朱以奉堯祀禮樂如之謂之虞賓示弗臣也封弟象于有庳今湖南永州府道州有鼻亭水經注謂之有鼻墟即有庳也象雖為諸侯不為政使吏治其國而納其貢賦焉建學太學曰上庠在西郊小學曰下庠在國中始養老皇侃曰養老之禮四三老五更一也子孫死王事養其父祖二也致仕之老三也庶人之老四也養國老于上庠養庶老于下庠俱以燕禮一獻既畢皆坐而飲酒禹臯陶陳謨書序臯陶矢厥謨禹成厥功帝舜申之作大禹臯陶謨益稷丁亥二載作五絃琴帝作五絃之琴以歌南風其詩曰南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮戊子三載考績三考黜陟幽明庚寅五載作九韶樂䕫為樂正正六律和五聲以通八風重黎欲求益人帝曰一䕫足矣于是作簫韶樂九成百獸率舞鳳凰來儀辛卯六載巡狩帝五載一巡狩羣后德讓貢正聲而九族奏具成諸侯貢其正聲而天子九奏之樂乃具成金氏履祥曰此採詩作樂之始己亥十有四載帝作歌帝庸作歌曰敕天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉臯陶拜手稽首揚言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉于時景星出卿雲興百工相和而歌帝乃偶之曰卿雲爛兮糾縵縵兮日月光華旦復旦兮八伯東陽伯羲伯南頁伯羲伯西秋伯和伯北冬伯和伯進稽首曰明明上天爛然星陳日月光華宏于一人十有五載帝載歌曰日月有常星辰有行四時順經萬姓允成於子論樂配天之靈遷于賢善莫不咸聽鼚乎鼓之軒乎舞之菁華既竭褰裳去之丁巳三十有二載命禹攝位帝之子商均不肖于是命禹攝位禹讓于臯陶帝曰惟汝諧命之曰人心惟危道心惟微惟精惟一允執厥中戊午三十有三載禹受命于神宗禹受命于堯之廟率百官若帝之初辛酉三十有六載有苗三苗餘孽格時有苗弗率帝命禹徂征禹誓師于衆奉辭伐罪三旬苗民逆命益贊于禹班師振旅帝乃誕敷文德舞干羽于兩階七旬有苗格癸酉四十有八載帝崩于蒼梧山名亦曰九疑在今湖南永州府寧逺縣葬零陵帝舜陵在今寧逺縣東南帝濬哲文明溫恭允塞臨下以簡御衆以寬德若天地而靜虛化若四時而變物是以四方風動暢于異類鳳翔麟至鳥獸馴德年二十以孝聞三十堯舉之五十攝天子事六十一代堯踐帝位踐位四十八年年百有十嵗南巡遂崩于蒼梧之野三年喪畢禹避帝之子于陽城故城在今河南府登封縣天下諸侯不歸帝之子而歸禹禹乃即位為夏后氏御批歷代通鑑輯覽卷一

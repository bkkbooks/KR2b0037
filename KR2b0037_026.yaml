front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷二十七後漢孝獻皇帝庚辰建安五年春正月曹操殺車騎將軍董承遂擊劉備破之備奔冀州
  hash: sha256:41bed80904e1d44952293d56f282e074f34cc8b838d67814c37c6a008a3e78ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_026-1a, image: WYG0335/WYG0335-0716a.png}
body:
  text: 董承等謀洩曹操殺之皆夷三族操欲自擊劉備諸將皆曰與公爭天下者袁紹也今紹方來而棄之東紹乘人後若何操曰劉備人傑也今不擊必為後患郭嘉曰紹性遲而多疑來必不速備新起衆心未附急擊之必敗操師遂東田豐說袁紹曰曹劉連兵未可卒解公舉軍而襲其後可一往而定紹辭以子疾豐舉杖擊地曰嗟乎遭難遇之時而以嬰兒之病失其㑹惜哉事去矣操擊劉備破之獲其妻子進拔下邳禽闗羽備由青州奔袁紹袁譚故備茂才也以步騎迎備至平原遣使白紹紹去鄴二百里迎之二月曹操還官渡袁紹進軍黎陽夏四月紹遣兵攻白馬注見前操擊破之斬其將顔良文醜操還官渡紹乃議攻許田豐諫豐曰曹操既破劉備則許下非復空虚且曹操善用兵衆雖少未可輕也今不如以久待之據山河之固擁四州之衆蕳其精鋭乘虛迭出救右則擊其左救左則擊其右我未勞而彼已困不及三年可坐克也紹不從豐復彊諫紹以為沮衆械繫之于是移檄州郡數操罪惡陳琳為之辭二月進軍黎陽沮授臨行會其宗族散財與之曰軍之破敗在此舉矣揚雄有言六國蚩蚩為羸弱姬其今之謂乎紹遣顔良攻白馬沮授曰良性促狹雖驍勇不可獨任紹不聽四月操引軍兼行趣白馬良來逆戰關羽望見良麾葢䇿馬刺良于萬衆之中斬其首而還紹軍莫能當者遂解白馬之圍徙其民而西紹渡河追之沮授諫紹復不從授臨濟歎曰上盈其志下務其功悠悠黄河吾其濟乎遂以疾辭紹不許而意恨之軍至延津杜預左傳注陳留酸棗縣北有延津注酸棗見前南操勒兵駐營南阪下令騎解鞍放馬用荀攸計陳輜重餌敵紹騎將文醜與劉備將五六千騎前後至諸將曰可上馬操曰未也有頃騎至稍多或分趣輜重操曰可矣乃皆上馬縱擊大破之斬醜醜良皆紹名將再戰斬之紹軍奪氣初曹操壯闗羽之為人而察其無留意使張遼以其情問之羽歎曰吾極知曹公待我厚然我受劉將軍恩誓以共死不可背之要當立效以報曹公乃去耳遼以報操操義之及殺良操知其必去重加賞賜羽盡封其所賜拜書告辭而奔劉備于袁軍左右欲追之操曰彼各為其主勿追也孫策卒弟權代領其衆策欲乘虚襲許郡署未發會先所殺呉郡太守許貢奴客初貢為朱治所逐南依山賊嚴白虎䇿皆擊殺之貢奴客欲為報仇因策出獵伏篁竹中射之中頰創甚召張昭等謂曰中國方亂以呉越之衆三江韋昭曰呉松江錢塘江浦陽江也考三江諸說不一此指呉越而言韋說為近之固足以觀成敗公等善相吾弟呼權佩以印綬謂曰決機于兩陳之間與天下爭衡卿不如我舉賢任能各盡其心以保江東我不如卿遂卒時年二十六權悲號未視事昭曰孝廉此寧哭時邪乃易權服扶上馬使出巡軍上表朝廷下移屬城中外將校各令奉職周瑜自巴邱初䇿定豫章分置廬陵郡留瑜鎮巴邱裴松之曰瑜所鎮今巴邱縣也考巴邱縣晋屬廬陵郡梁改曰巴山故城在今江西撫州府崇仁縣將兵赴䘮留與張昭共掌衆事時流寓之士皆以安危去就為意未有君臣之固昭與瑜等謂權可與共成大業遂委心而服事焉秋九月庚午朔日食袁紹攻曹操于官渡冬十月操襲破其輜重紹軍大潰袁紹軍陽武秦置縣兩漢列代皆因之今屬河南開封府沮授説曰北兵雖衆而勁果不及南南兵雖精而資儲不如北南幸于急戰北利在緩師宜徐持久曠以日月紹不從進營稍前東西數十里操亦分營與相當遂合戰操軍不勝復還堅壁紹為髙櫓起土山射营中營中皆䝉而行操乃為霹靂車發石擊紹皆破紹又為地道攻操操輒于内為長塹拒之操衆少糧盡士卒疲乏乃與荀彧書議欲還許彧報曰紹悉衆聚官渡欲與公決勝負公以至弱當至彊若不能制必為所乘是天下之大機也且紹能聚人而不能用情見勢竭必將有變此用竒之時不可失也操乃堅壁持之紹運穀車數千乘至官渡操擊燒之十月紹復遣軍運榖使淳于瓊等將兵送之沮授請别為支軍于表支别表外也以絶曹操之鈔紹不從瓊宿烏巢澤名在延津縣東南去紹營四十里㑹許攸怒紹奔操説操襲瓊先是許攸謂紹曰曹操悉師拒我許下勢必空弱若分邉輕軍星行掩襲許可㧞也許㧞則奉迎天子以討操操成禽矣紹不從㑹攸家犯法審配収擊之攸怒遂奔曹操聞其來跣出迎之撫掌笑曰子卿逺來吾事濟矣既入坐謂操曰今有幾糧乎操詭言可支一嵗既曰半嵗攸皆以為不實操乃曰向言戲之其實可支一月為之奈何攸曰袁氏輜重萬餘乘在故市烏巢屯軍無嚴備若輕兵襲之燔其積聚不過三日袁氏自敗也操大喜乃留荀攸曹洪守營自將歩騎五千用袁軍旗幟銜枚縳馬口夜從間道出人抱束薪至屯放火瓊營驚亂操急擊之紹聞操擊瓊謂其子譚曰就操破瓊吾㧞其營彼固無所歸矣乃使其將張郃字儁乂河間鄚人等攻操營而但遣輕騎救瓊騎至烏巢操士卒殊死戰大破之斬瓊等盡燔其糧榖張郃等攻操營不能下聞瓊已破乃焚攻具詣操降于是紹軍驚擾大潰紹及譚等幅巾乘馬與八百騎渡河操追之不及盡収其輜重圖書珍寳餘衆降者操盡阬之前後所殺七萬餘人沮授為操軍所執大呼曰授不降也操與之有舊遂赦而厚遇焉授尋謀歸袁氏操乃殺之操収紹書中得許下及軍中人書皆焚之曰當紹之彊孤猶不能自保况衆人乎紹走至黎陽北餘衆稍復歸之旣還遂殺田豐或謂田豐曰君必見重矣豐曰公貌寛而内忌若勝而喜猶能赦我今戰敗而恚吾不望生紹還謂僚屬曰吾不用田豐言果為所笑遂殺之紹外寛雅有局度喜怒不形于色而性矜愎自高短于從善故至于敗冀州城邑多降于操紹歸復擊定之明年夏操揚兵河上擊破紹倉亭軍有星孛于大梁晉書天文志自胃七度至畢十度曰大梁之次以孫權為討虜將軍曹操聞孫策死欲因喪伐之張紘諫曰乘人之喪旣非古義若其不克成讐棄好不如因而厚之操即表權為討虜將軍領㑹稽太守操欲令紘輔權内附乃以紘為㑹稽都尉紘至吳太夫人以權年少委紘與張昭共輔之紘思惟補察知無不為魯肅將北還周瑜止之因薦于權權與語悦之引肅合榻對飲問計肅曰漢室不可復興曹操不可卒除為將軍計惟有保守江東以觀天下之釁耳若因北方多務𠞰除黄祖進伐劉表竟長江所極據而有之此王業也張昭毁肅年少麄踈權益貴重之張魯據漢中後漢郡治南鄭注見前張魯以劉璋闇懦不復承順璋怒殺其母及弟魯遂據漢中魯以鬼道殺民自號師君其來學道者初皆名鬼卒受本道已信號祭酒各領部衆犯法者三原然後行刑不置長吏皆以祭酒為治民夷便之後復襲取巴郡後漢郡治江州注見前朝廷力不能征遂就寵魯為鎮民中郎將領漢寧章懷注建安二年置郡太守通貢獻而已魯雄據巴漢垂三十年辛巳六年春三月丁卯朔日食秋九月曹操擊劉備于汝南備奔荆州先是袁紹遣劉備畧汝南汝南黄巾劉辟叛操附紹紹遣備將兵助辟郡縣多應之曹操遣曹仁字子孝操從弟擊備備走還紹軍隂欲離紹乃説紹南連劉表紹遣備將本兵復至汝南與龔都等合操遣其將蔡陽擊之為備所殺事在五年至是操自將擊備備奔劉表都等皆散表聞備至自出郊迎以上賔禮待之益其兵使屯新野已而表遣備北侵與曹操將夏侯惇于禁等相拒于博望久之備設㐲兵一旦自燒屯偽遁惇與禁等追之為伏兵所破備在荆州數年嘗于表坐起至厠慨然流涕表怪問備備曰吾嘗身不離鞍髀肉皆消今不復騎髀裏肉生日月如流老將至矣而功業不能建是以悲耳壬午七年春正月曹操復進軍官渡夏五月袁紹卒㓜子尚襲行州事長子譚出屯黎陽操攻敗之袁紹慙憤發病嘔血卒初紹有三子譚字顯思熙字顯雍尚字顯甫紹後妻劉氏愛尚紹欲以為後乃以譚繼兄後出為青州刺史沮授諫曰世稱萬人逐免一人獲之貪者悉止分定故也譚當為嗣而斥使居外禍其始此矣紹曰吾欲令諸子各據一州以視其能于是使熙為幽州刺史甥髙幹為并州刺史逢紀審配素為譚所疾辛評陽翟人辛毗兄郭圖字公則潁川人皆附于譚而與配紀有隙及紹卒衆以譚長欲立之配等恐譚立而評等為害遂矯紹遺命奉尚為嗣譚至不得立自稱車騎將軍屯黎陽尚少與之兵而使紀隨之譚求益兵配等不與譚怒殺紀曹操攻譚尚自將助之與操相拒譚尚數敗尚遣其將郭援高幹共攻河東發使與馬騰等連兵援所經城邑皆下河東郡吏賈逵守絳援攻之急父老約援不害逵乃降援許之既而使逵為將逵不屈援怒將斬之或㐲其上以救之吏民皆乗城呼曰負約殺我賢君寧俱死耳援乃囚逵壺闗有祝公道者夜盜出之援軍至平陽鍾繇遣使説馬騰為言利害騰乃遣其子超將兵與繇㑹援將渡汾為營濟未半繇擊大破之援繇之甥也校尉龎徳斬之繇見其頭而哭德謝繇繇曰援雖我甥國之賊也何謝之有字絳漢縣後漢曰絳邑即春秋晉新田注見前賈逵梁道襄陵人馬超字孟起龎徳字令明南安狟道人狟音桓曹操責孫權任子權不受命曹操下書責孫權任子權召羣僚㑹議張昭等猶豫不决權引周瑜詣吳太夫人前定議瑜曰昔楚國初封不滿百里繼嗣賢能廣土開境遂據荆陽至于南海傳業延祚九百餘年今將軍承父兄餘資兼六郡之衆兵精糧多將士用命鑄山煮海境内富饒有何逼廹而欲送質質一入不得不與曹氏相首尾與相首尾則命召不得不徃如此見制于人極不過一侯印僕從十餘人車數乘馬數匹豈與南面稱孤同哉不如勿遣徐觀其變若曹氏能率義以正天下將軍事之未晩若為暴亂彼自亡之不暇焉能害人吳大夫人謂權曰公瑾議是也公瑾與伯符同年小一月耳我視之如子汝其兄事之遂不送質癸未八年春二月曹操攻黎陽譚尚敗走夏四月操追至鄴還譚攻尚不克曹操攻黎陽譚尚敗走還鄴操追至鄴諸將欲遂攻之郭嘉曰哀紹愛此二子莫適立也今權力相侔各有黨與急之則相保緩之則争心生不如南向荆州以待其變變成而後擊之可一舉定也操曰善留賈信守黎陽而還譚謂尚曰今曹軍退人懐歸志及其未濟出兵掩之可令大潰此䇿不可失也尚疑而不許譚大怒攻尚譚敗引兵還南皮譚别駕王修自青州來救譚譚欲更還攻尚修曰兄弟者左右手也今與人鬬而斷其右手曰我必勝其可乎夫棄兄弟而不親天下其誰親之譚不從治南皮注見前王修字叔北海營陵人秋八月曹操擊劉表尚圍譚于平原冬十月操還救却之曹操擊劉表軍于西平漢縣厯代因之今屬河南汝寧府袁尚攻袁譚大破之譚奔平原尚圍之急譚遣辛毗字佐治評之弟詣操謂救劉表以書諫譚勸其捐忿思義又與尚書曰青州天性峭急迷于曲直君當先除曹操以卒先公之恨事定之後乃議其曲直之計不亦善乎若還而不反則是韓盧東郭自困于前而遺田父之獲也譚尚皆不從山韓盧良犬東郭㕙狡兔戰國䇿韓盧逐東郭㕙騰者五環山者三犬兔俱疲田父見而獲之毗至西平諸將皆疑荀攸勸操許之諸將多以劉表方彊宜先平之荀攸曰天下方有事而表坐保江漢之間其無四方之志可知袁氏據四州之地帶甲數十萬使二子和睦以守其成業天下之難未息也今兄弟搆惡其勢不兩全若有所并則力専力專則難圖也及其亂而取之天下定矣操從之後數日操更欲先平荆州使譚尚自敝辛毗復說操操謂毗曰譚必可信尚必可克不毗曰明公無問信與詐也直當論其勢耳袁氏兄弟讒閱連年戰伐今往攻鄴尚不還救即不能自守還救即譚踵其後此乃天亡尚之時也天以尚與明公明公不取而伐荆州失用兵之本矣操曰善乃許譚平十月操至黎陽尚聞操渡河乃釋平原還鄴操引軍還甲申九年春二月袁尚復攻譚夏四月曹操攻鄴秋七月尚還戰敗走幽州操遂入鄴自領冀州牧正月曹操濟河遏淇水出河南懐慶府林縣西山流逕衛輝府淇縣東南入衛入白溝今淇水入衛自濬縣以下謂之白溝水經注其水逕宿胥故瀆東流為白溝是也王㓜學馮智舒以為宋遼分界之白溝考此河在今直隸新城雄縣去淇水甚遠無由得入其説非是以通糧道二月尚復攻譚審配諫不聼乃留配守鄴四月操至鄴為土山地道以攻之又攻絶其糧道五月鑿塹圍城周圍四十里初令淺示若可越配望見笑之不出爭利操一夜濬之廣深二丈引漳水水經注漳水逕鄴縣西以灌之城中餓死者過半七月尚還救鄴先使李孚入城孚研問事杖繫馬邊自著平上幘投暮詐稱都督歴北圍而東呵責守圍將士隨輕重行罰遂歴曹營前至南圍責怒守者収縳之遂開其圍馳到城下呼城上人得入操聞笑曰此非徒得入也方且復出孚知圍不可後胃乃請配悉出城中老㓜以省榖夜持白竿出降孚升降人服隨軰夜出突圍得去李孚鉅鹿人尚兵循西山而東去鄴十七里為營夜舉火以示城中配出兵城北以應操逆擊之敗還尚亦敗走營曲漳漳水之曲操遂圍之尚懼求降不聴衆潰奔中山審配殺辛毗家屬令士卒堅守死戰伏弩射操幾中配兄子榮開門納操兵配拒戰被執毗以馬鞭擊其頭而罵之配顧曰狗輩正由汝曹破我冀州恨不得殺汝也操引見配欲活之配意氣壯烈終無撓辭遂斬之操乃臨祀紹墓哭之流涕慰勞紹妻還其家人寳物賜繒絮廪食九月詔以操領冀州牧操讓還兖州操辟崔琰為别駕謂曰昨按户籍可得三十萬衆故為大州也琰對曰今九州幅裂二袁親尋干戈冀方烝庶暴骨原野未聞王師存問風俗敕其塗炭而唯以校計甲兵為先豈鄙州士女所望于明公哉操改容以謝許攸恃功嫚操嘗于衆坐呼操小字操不樂後竟殺之崔琰字季珪東武城人裴松之曰曹操一名吉利小字阿瞞冬十月有星孛于東井丹陽郡吏殺其太守孫翊翊妻徐氏討殺之丹陽督媯覽丞戴員殺太守孫翊覽欲逼取翊妻徐氏徐紿之曰乞湏晦日設祭除服然後聼命潛使所親語翊舊將孫高傅嬰等與共圖覽高嬰涕泣許諾宻呼翊時侍養者二十餘人與盟誓合謀晦日設祭徐哭泣盡哀畢乃除服薫香沐浴言笑懽悦覽宻覘無復疑意徐呼髙嬰置戸内使人召覽入適得一拜徐大呼二君可起高嬰俱出共殺覽餘人即就外殺員徐氏乃還縗絰奉覽員首以祭翊墓舉軍震駭孫權聞亂自椒邱注見前還族誅覽員餘黨擢高嬰為牙門將名其餘賞賜有差乙酉十年春正月曹操攻破袁譚于南皮斬之初操之入鄴也袁譚復背操畧取諸郡攻尚于中山敗之悉取其衆操遺書責譚然後進討譚奔南皮事在九年至是操攻南皮急譚出戰軍未合而破譚走追斬之告諭吏民各安故業斬郭圖等及其妻子王修詣操乞収𦵏譚尸許之辟為司空掾郭嘉説操多辟青冀幽并名士為據屬曹操從之初官渡之戰陳琳為袁紹作檄書數操連及家世極具醜詆及是琳歸曹操祖操曰卿昔為本初移書但可罪狀孤身何乃上及父邪琳謝罪操釋之使與阮瑀俱管記室阮瑀字元瑜陳留尉氏人幽州將吏逐刺史袁熙遣使降曹操熙尚俱奔烏桓袁熙為其將焦觸張南所攻與尚俱奔遼西烏桓觸等降曹皆封列侯觸驅率守令背袁向曹陳兵數萬殺白馬而盟令曰敢違者斬衆莫敢仰視各以次㰱别駕韓珩曰吾受袁公父子厚恩今其破亡智不能救勇不能死于義闕矣若乃北面曹氏所不能為也一座失色觸曰夫舉大事當立大義事之濟否不待一人可卒珩志以厲事君乃捨之佩韓珩字子代郡人以荀恱字仲豫淑之孫為侍中時政移曹氏恱志在獻替而謀無所用乃作申鑒五篇奏之畧曰為政之術先屏四患乃崇五政偽亂俗私壊法放越軌奢敗制四者不除則政未由行矣是謂四患興農桑以養其生審好惡以正其俗宣文教以章其化立武備以秉其威明賞罰以統其法是謂五政人不畏死不可懼以罪人不樂生不可勸以善故在上者先豐民財以定其志是謂養生善惡要乎功罪毁譽效于準騐聴言青事舉名察實無或詐偽以蕩衆心故俗無姦怪民無淫風是謂正俗榮辱者賞罰之精華也故禮教榮辱以加君子化其情也桎梏鞭扑以加小人化其形也若教化之廢推中人而墜于小人之域教化之行引中人而納于君子之塗是謂章化在上者必有武備以戒不虞安居則寄之内政有事則用之軍旅是謂秉威賞罰政之柄也人主不妄賞非愛其財也賞妄行則善不勸矣不妄罰非矜其人也罰妄行則惡不懲矣賞不勸謂之止善罰不懲謂之縱惡在上者能不止下為善不縱下為惡則國法立矣是謂統法四惡既蠲五政又立行之以誠守之以固簡而不怠疎而不失垂拱揖讓而海内平矣丙戌十一年春正月有星孛于北斗三月曹操破髙幹于并州斬之先是袁尚敗走髙幹以并州降操仍以為刺史事在九年既而幹復以州叛舉兵守壺口闗在今山西潞安府長治縣壺口山下與壺關縣接界書通鑑作壺關口今依范袁紹傳操遣其將樂進字文謙陽平人李典字曼成鉅野人擊之不拔事在十年至是操自征幹幹留其將守城自詣匈奴單于求救不得獨與數騎亡欲南奔荆州上洛漢縣今陜西商州是都尉王琰斬之幹之初叛也河内張晟聚衆冦崤渑間河東掾衛固范先等皆與幹通操用荀彧言以杜畿為河東太守固等使兵絶陜畿譌道從郖津波既至郡陽奉固先以訃縻之稍分散其衆會操徵馬騰等至擊固先及張晟等皆破斬之于是畿務崇寛惠勸耕桑課畜牧百姓豐實然後興學校修戎事河東遂安初山陽仲長統遊學至并州遇髙幹幹善遇之訪以世事統謂幹曰君有雄志而無雄才好士而不能擇人所以為君深戒也幹不忧統去之幹死荀彧舉統尚書郎此郖津水經注河水東逕湖縣故城北右合門水于有郖津之名湖縣注見前杜畿字伯侯杜陵人仲長統注見前丁亥十二年夏曹操擊烏桓秋八月破之斬蹋頓烏桓王名邱力居從子袁熙袁尚奔遼東公孫康度之子斬之烏桓蹋頓素為袁紹所厚紹立蹋頓為單于事具前故袁尚兄弟歸之數入塞為冦欲助尚復故地操將擊之先鑿平虜泉州二渠平虜故渠在今直𨽻天津府滄州東北泉州漢縣故城在今順天府武清縣渠故道在寶坻縣東南以通運時諸將皆曰袁尚亡虜蹋頓豈能為用今深入征之劉備必說劉表以襲許萬一為變事不可悔郭嘉曰袁紹有恩于民夷而尚兄弟生存今舍而南征尚因烏桓之資招其死主之臣言欲為其主致死之臣民夷俱應恐青冀非吾有也表坐談客耳自知才不足以御備重任之則恐不能制輕任之則備不為用雖虚國逺征公無憂矣操從之初袁紹數遣使召田疇疇皆拒之然每忿烏桓多殺其本郡冠蓋謂有冠蓋之士大夫意欲討之而力未能至是操遣使辟之疇即至隨軍次無終漢縣注見前時方夏水雨濱海道不通疇曰此道秋夏有水為難久矣舊北平郡治在平岡故城在今熱河八溝後漢移郡治土垠注見前道出盧龍古塞名明史地理志在永平府西北達于栁城漢縣故城在今熱河塔子溝自建武以來陷壊絶㫁尚有微徑若回軍從盧龍口越白檀漢縣今熱河地是之險出空虛之地路近而便掩其不備蹋頓可不戰而禽也操令疇將其衆為鄉導上徐無山塹山堙谷五百餘里經白檀歴平岡渉鮮卑庭東指桞城未至二百里虜乃知之尚熙與蹋頓等將數萬騎逆軍八月操登白狼山水經注山在右北平石城縣西石城故城在今八溝界卒與虜遇縱兵擊之虜衆大潰斬蹋頓降者二十餘萬尚熙奔遼東九月操引還公孫康九年度卒康嗣立誘尚熙斬之康伏兵于廐請尚熙入未及坐遂禽之送其首操梟尚首令敢哭者斬牽招獨設祭悲哭操義之舉為茂才封田疇為亭侯疇固讓不受後操復欲封之使夏侯惇喻意疇曰負義逃竄蒙恩全活為幸多矣豈可賣盧龍之塞以易賞祿哉惇以白操操知不可屈乃拜議郎牽姓招字子經安平觀津人操之北伐也劉備説劉表襲許表不能用至是表謂備曰不用君言故為失此大㑹備曰今天下分裂日尋干戈事㑹之來豈有終極若能應之于後者則此未足為恨也冬十月有星孛于鶉尾晉書天文志自張十七度至軫十一度為鶉尾之次楚之分野劉備見諸葛亮字孔明琅邪陽都人于隆中山名在今湖北襄陽府襄陽縣西初琅邪諸葛亮寓居襄陽隆中毎自比管仲樂毅時人莫之許也惟潁川徐庶字元直與崔州平安平人烈之子然之劉備訪士于襄陽司馬徽字徳操善知人同郡龎徳公稱為水鏡徽曰儒生俗士豈識時務識時務者在乎俊傑此間自有伏龍鳯雛備問為誰曰諸葛孔明龎士元也龎統字士元徳公從子德公嘗謂孔明為卧龍士元為鳯雛徐庶亦謂備曰諸葛孔明卧龍也將軍豈願見之乎備曰君與俱來庶曰此人可就見不可屈致也將軍宜枉駕顧之備由是詣亮几三徃乃見因屏人曰漢室傾頽姦臣竊命孤不度徳量力欲伸大義于天下而智術淺短遂用猖獗至于今日然志猶未已君謂計將安出亮曰今曹操已擁百萬之衆挾天子而令諸侯此誠不可與爭鋒孫權據有江東已歴三世國險而民附賢能為之用此可與為援而不可圖也荆州北據漢沔利盡南海東連吳㑹西通巴蜀此用武之國而其主不能守此殆天所以資將軍也益州險塞沃野千里天府之土劉璋闇弱張魯在北民殷國富而不知存䘏知能之士思得明君將軍既帝室之胄信義著于四海若跨有荆益保其巖阻西和諸戎南撫夷越外結孫權内修政理天下有變則命一上將將荆州之軍以向宛洛將軍身率益州之衆出于秦川百姓孰敢不簞食壺漿以迎將軍者乎誠如是則霸業可成漢室可興矣備曰善于是與亮情好日宻闗羽張飛不悦備解之曰孤之有孔明猶魚之有水也願諸君勿復言羽飛乃止戊子十三年春孫權擊江夏太守黄祖破斬之初巴郡甘寧字興霸將其僮客就劉表觀表事勢終必無成欲東入吳黄祖在夏口在湖北漢陽府漢陽縣東漢水入江之口也一曰魯口今曰漢口軍不得過乃留依祖祖以凡人畜之㑹孫權擊祖祖軍敗走寧遂奔吳獻策孫權寧曰今漢祚日㣲曹操終為篡盗南荆形便誠國之西勢也劉表慮既不遠兒子又劣當早圍之不可後操圖之之計宜先取黄祖祖今昏老已甚財榖並乏戰具不修其破可必一破祖軍鼓行而西西據楚闗大勢彌廣即可漸規巴蜀矣闗楚闗即扞注見前權深納之遂西擊黄祖祖以舟兵拒戰都尉吕蒙字子明汝南富陂人破其前鋒親梟都督陳就首偏將軍董襲字元代餘姚人司馬凌統字公績餘杭人等盡鋭攻之祖横兩蒙衝以大紲繫矴千弩交射襲與統率敢死士突入蒙衝以刀㫁紲蒙衝横流軍遂進傅其城屠之祖挺身走追斬之夏六月罷三公官曹操自為丞相操以崔琰為西曹掾毛玠為東曹掾司馬朗字伯逹河内温人為主簿弟懿字仲逹即晉高祖為文學掾琰玠並典選舉其所舉用皆清正之士雖有盛名而行不由本者終莫得進由是士以亷節自勵雖貴寵之臣輿服不敢過度長吏還者垢面羸衣獨乘柴車軍吏入宿朝服徒行操聞之歎曰用人如此使天下人人自治吾復何為哉懿少聰逹多大畧琰謂朗曰君弟聰亮明允剛㫁英特非子所及也操聞而辟之懿辭以風痺操怒欲収之懿懼就職胡三省曰司馬懿始此秋七月曹操擊劉表八月曹操殺大中大夫孔融夷其族融恃其才望數戲侮曹操又上書言宜準古王畿之制千里寰内不以封建諸侯操疑融所論建漸廣益憚之融與御史大夫郗慮郗氏蘓忿生支子封郗邑因氏焉慮字鴻豫山陽髙平人有隙慮承操㫖奏融昔在北海招合徒衆欲規不軌與孫權使語謗訕朝廷又與禰衡更相贊揚衡謂仲尼不死融答顔回復生大逆不道操遂收融并其妻子融被收時二子年八嵗方奕棊端坐不起左右問之答曰安有巢毁而卵不破乎遂俱見收皆殺之初京兆脂習與融善每融剛直大過必罹世患及融死許下莫敢收者習往撫尸曰文舉捨我死我何之用生為操收習欲殺之既而赦脂姓習字元升劉表卒九月曹操至新野表子琮舉州降初劉表二子琦琮表為琮取其後妻蔡氏之姪蔡氏因愛琮而惡琦遂出琦為江夏太守琦嘗與諸葛亮謀自安之術亮不對後乃與亮登樓去梯謂亮曰今日上不至天下不至地言出于子口而入于吾耳可以言未亮曰君不見申生在内而危重耳居外而安乎琦意感悟㑹黄祖死琦遂求代其任及表卒蔡瑁表妻弟張允表外甥等奉琮為嗣未幾曹操軍至蒯越等勸琮降操琮從之九月操至新野琮舉州降操遂進兵劉備奔江陵曹操追至當陽漢縣今屬湖北安陸府及之備走夏口劉備屯樊即今樊城在㐮陽縣北南臨漢水不意操軍卒至至宛乃知之裴松之蜀志補注劉琮乞降不敢告備備久之乃覺時曹公已在宛備大驚駭通鑑採之考宛在新野之北琮降在新野操已過宛而南及備聞知不應復在宛也今依蜀志本文而以裴注附見遂將其衆去過襄陽或勸備攻琮荆州可得備曰吾不忍也乃駐馬呼琮琮懼不能起琮左右及荆州人多歸備比至當陽衆十餘萬人輜重數千輛日行十餘里别遣闗羽乘船㑹江陵或謂備宜速行保江陵今擁大衆被甲者少曹公兵至何以拒之備曰夫濟大事必以人為本今人歸吾吾何忍棄去操以江陵有軍實恐備據之乃釋輜重將精騎急追之及于當陽之長阪在今縣東北備棄妻子與諸葛亮張飛趙雲等數十騎走徐庶母為操所獲庶辭備指其心曰本欲與將軍共圖王霸之業者以此方寸地也今已失老母方寸亂矣無益于事請從此别遂詣操張飛拒後據水㫁橋瞋目横矛曰身是張益徳也可來共決死操兵無敢近者趙雲身抱備子禪或言雲已北走備曰子龍不棄我走也頃之雲至適與闗羽船會得濟沔遇劉琦衆萬餘人與俱到夏口一冬十月癸未朔日食曹操東下孫權遣周喻魯肅等與劉備迎擊于赤璧山名在今湖北武昌府嘉魚縣西北江濱水經注江水東逕赤壁山北即此大破之操引還曹操進兵江陵遂順流東下時魯肅為孫權使襄陽不及與劉備同往樊口初肅言于孫權曰荆州與國鄰接江山險固士民殷富若據而有之此帝王之資也今劉表新亡二子不協劉備天下梟雄與操有隙若與彼協心上下齊同則宜撫安與結盟好如有離違宜别圖之以濟大事肅請得奉命弔表二子幷說備使撫表衆同心一意共治曹操備必喜而從命如其克諧天下可定矣今不速往恐為操所先彬即遣肅行比至南郡而琮已降肅遂迎備于當陽長阪宣權㫖致殷勤之意且曰孫討虜已據有六郡兵精糧多足以立事今為君計莫若遣心腹自結于東以共濟世業備甚恱肅又謂諸葛亮曰我子瑜友也即共定交樊口在今湖北武昌府西北子瑜亮兄瑾字時為權長史于是諸葛亮謂備曰事急矣請奉命求救于孫將軍遂與肅俱詣孫權見于柴桑漢縣故城在今江西九江府徳化縣說曰海内大亂將軍起兵江東劉豫州収衆漢南與曹操並爭天下今操芟夷大難畧已平矣遂破荆州威震四海英雄無用武之地故豫州遁逃至此願將軍量力而處之若能以吳越之衆與中國抗衡不如早與之絶若不能何不按兵束甲北面而事之今將軍外托服從之名而内懐猶豫之計事急而不㫁禍至無日矣權曰茍如君言劉豫州何不遂事之乎亮曰田横齊之壯士耳猶守義不辱况劉豫州王室之胄英才蓋世衆士仰慕若事之不濟此乃天也安能復為之下乎權勃然曰吾不能舉全吳之地十萬之衆受制于人吾計决矣非劉豫州莫可以當曹操者然豫州新敗安能抗此難乎亮曰豫州軍雖敗于長阪今戰士還者及闗羽水軍精甲萬人劉琦合江夏戰士亦不下萬人曹操之衆逺來疲敝聞追豫州輕騎一日一夜行三百餘里此所謂强弩之末勢不能穿魯縞者也故兵法忌之曰必蹶上將軍且北方之人不習水戰又荆州之民附操者偪兵勢耳非心服也今將軍誠能命猛將統兵數萬與豫州協規同力破曹軍必矣操軍敗必北還如此則荆呉之勢强鼎足之形成矣成敗之機在于今日權大恱時操遺權書曰近者奉辭伐罪劉琮束手今治水軍八十萬衆方與將軍會獵于呉權以示羣下莫不失色張昭等曰曹公挾天子以征四方拒之不順且將軍大勢可以拒操者長江也今操得荆州水軍䝉衝鬬艦乃以千數浮以沿江水陸俱下此為長江之險已與我共之矣而勢力衆寡又不可論愚謂不如迎之魯肅獨不言權起更衣肅追于宇下權知其意執肅手曰卿欲何言肅曰向察衆人之議専欲悞將軍今肅可迎操耳如將軍不可也何以言之今肅迎操操當以肅還付鄉黨品其名位猶不失下曹從事乗犢車從吏卒交遊士林累官故不失州郡也將軍迎操欲安所歸乎願定大計莫用衆人之議也權歎息曰諸人持議甚失孤望今卿廓開大計正與孤同時周瑜受使至番陽注見前肅勸權召瑜還瑜至謂權曰操雖托名漢相實漢賊也將軍以神武雄才兼仗父兄之烈割據江東地方數千里兵精足用英雄樂業當横行天下為國家除殘去穢况操自送死而可迎之邪請為將軍籌之今北土未平馬超韓遂為操後患而舍鞍馬仗舟楫與呉越爭衡又今盛寒馬無藁草驅中國士衆逺涉江湖之間不習水土必生疾病此數者用兵之患也而操皆冐行之將軍禽操宜在今日瑜請得精兵數萬人進徃夏口保為將軍破之權曰老賊欲廢漢自立久矣徒忌二袁吕布劉表與孤耳今數雄已滅惟孤尚存孤與老賊勢不兩立君言當擊甚與孤合此天以君授孤也因拔刀斫前奏案曰諸將吏敢有復言當迎操者與此案同遂選三萬人以周瑜程普字徳諄右北平土垠人為左右督與備并力逆操以魯肅為贊軍校尉助畫方畧進與操遇于赤壁時操軍已有疾疫初一交戰操軍不利引次江北瑜等在南岸瑜部將黄蓋字公覆零陵人曰今冦衆我寡難以持久操軍方連船艦首尾相接可燒而走也乃取蒙衝鬬艦十艘載燥荻枯柴灌油其中裹以帷幕上建旌旗豫備走舸繫于其尾先以書遺操詐云欲降時東南風急蓋以十艦最著前中江舉㠶餘船以次俱進操軍吏士皆出營立觀指言蓋降去北軍二里餘同時發火火烈風猛船徃如箭燒盡北船延及岸上營落頃之煙燄張天人馬燒溺死者甚多瑜等率輕鋭繼其後雷鼓大進北軍大壊操引軍從華容漢縣故城在今荆州府監利縣今岳州府之華容隋所置道歩走遇泥濘道不通天又大風悉使羸兵負草塡之騎乃得過蹈藉死者甚衆軍既出操乃大喜諸將問之操曰劉備吾儔也但得計少晚向使早放火吾徒無類矣備尋放火無所及劉備周瑜水陸并進追至南郡操軍死者大半乃引軍北還十二月劉備徇荆州江南諸郡降之劉備表劉琦為荆州刺史引兵南徇武陵長沙桂陽零陵注俱見前皆降之備以諸葛亮為軍師中郎將督諸郡賦税以充軍實孫權使其將賀齊賀本慶氏避漢安帝父諱改賀氏齊字公苗會稽山隂人討黟音醫漢縣今屬江南徽州府賊平之先是權破黄祖還復遣兵討平山越越種散而山處者丹陽豫章㑹稽皆有之及是黟賊帥陳僕等二萬戸屯林歴山在黟縣西南四面壁立齊募輕㨗士夜于隠處以鐵戈拓山而上懸布以援下人得上者百餘人分布四面鳴鼓角賊守路者皆驚走大軍上攻破之以其地置新都郡今徽州府是齊為太守己丑十四年秋七月曹操軍合肥漢縣今為江南廬州府治開芍陂在今江南鳯陽府夀州南亦曰安豐塘屯田先是孫權圍合肥久不下曹操自荆州還遣兵救之未至權退揚州别駕蔣濟詐言救至遣使齎書語城中為權軍所獲權信之遂燒圍走蔣濟字子通楚國人至是操治水軍自渦入淮渦河古蒗蕩渠分流也自河南之陳州歸徳逕江南鳯陽府之懐逺縣入淮謂之渦口出肥水源出合肥逕夀州入淮軍合肥故揚州刺史劉馥字元頴沛國人為刺史恩化大行十三年卒嘗治芍陂以溉稻田水經注陂周一百二十里楚相孫叔敖所造于是操復開之冬十月荆州地震十二月孫權表劉備領荆州牧初曹操北還留曹仁守江陵樂進守襄陽周瑜進至南郡與仁隔江未戰甘寧徑前據夷陵仁分遣兵騎圍之急瑜用吕蒙計䝉謂瑜曰留凌公績于江陵蒙與君行解圍釋急勢亦不久䝉保公績能十日守也瑜從之身與䝉西救寧大破仁兵而還乃渡江屯北岸與仁相拒至是嵗餘瑜所攻擊殺傷甚衆仁遂委城走權以瑜領南郡太守屯江陵程普領江夏太守治沙羡吕範領彭澤太守吕䝉領尋陽令縣沙羡漢縣故城在今湖北武昌府江夏縣彭澤漢故城在今江西九江府湖口縣孫權置郡尋廢尋陽注見前吕範字子衡汝南細陽人會劉琦卒權以備領荆州牧周瑜分南岸地以給備備立營于油口油江口也今曰油河在荆州府公安縣西改名公安權以妹妻備妹才㨗剛猛有諸兄風侍婢百餘人皆執刀侍立備每入心常凛凛曹操宻遣辯士蔣幹布衣烏巾私行説周瑜瑜出迎立謂之曰子翼良苦逺渉江湖為曹氏作説客邪因延幹與周觀營中行視倉庫軍資器仗訖還飲宴示之侍者服餙珍玩之物因謂幹曰丈夫處世遇知己之主外託君臣之義内結骨肉之恩言行計從禍福共之假使蘇張更生能移其意乎幹但笑終無所言還白操稱瑜雅量高致非言辭所能間也蔣幹字子翼九江人庚寅十五年春曹操下令求才丞相掾和洽字陽士汝南西平人言于操曰天下之人才德各殊不可以一節取也今朝廷之議吏有著新衣乘好車者謂之不清形容不飭衣裘敝壊者謂之亷潔至令士大夫故汚辱其衣藏其輿服朝府大吏或自挈壺飱以入官寺夫立教觀俗貴處中庸為可繼也今崇一概難堪之行以檢殊途勉而行之必有疲瘁而或容隠偽矣操善之下令求才二月乙巳朔日食冬曹操作銅雀臺于鄴後曹操又作金虎氷井二臺故址皆在今河南彰徳府臨漳縣西南名曰三臺十二月曹操讓還三縣操上所封三縣因遂下令令曰孤始舉孝亷自以本非巖穴知名之士恐為人所凡愚欲好作政教以立名譽故在濟南除殘去穢平心選舉以是為豪强所忿恐致家禍故以病還郷里乃于譙東五十里築精舍欲秋夏讀書冬春射獵為二十年規待天下清乃出仕耳然不能得如意徴為典軍校尉意更為國家討賊立功使題墓道言漢故征西將軍曹侯之墓此其志也遭值董卓之難興舉義兵破降黄巾又討擊袁術摧破袁紹梟其二子復定劉表遂平天下身為宰相人臣之貴已極意望已過矣設使國家無有孤不知當幾人稱帝幾人稱王或者見孤彊盛妄相忖度言有不遜之志每用耿耿然欲孤便爾委兵歸國實不可也何者誠恐離兵為人所禍既為子孫計又已敗則國家傾危是以不得慕虛名而處實祸也然封兼四縣食戸二萬何徳堪之今上還三縣但食武平萬戸且以分損謗議少減孤之責也孫權南郡守將周瑜卒權以魯肅代領其兵劉表故吏士多歸劉備備以周瑜所給地少不足以容其衆乃自詣孫權求都督荆州瑜因上疏請權留備疏曰劉備以梟雄之姿而有闗羽張飛熊虎之將必非久屈為人用者謂宜徙備置吳盛為築宫室多其美女玩好以娛其耳目而分羽飛各置一方使如瑜者挾與攻戰大事可定也今猥割土地以資業之聚此三人俱在疆埸恐蛟龍得雲雨終非池中物也權不從備還聞之歎曰天下智謀之士所見畧同前時孔明諫孤莫行其意亦慮此也瑜詣京京口城也今江南鎮江府治是見權請與權從弟奮威將軍瑜字仲異俱進取蜀并張魯與馬超結援還據襄陽以蹙曹權許之瑜還治裝道病困與權牋曰方今曹操在北疆埸未静劉備寄寓有似養虎天下之事未知終始魯肅忠烈臨事不茍可以代瑜倘所言可採瑜死不朽矣卒于巴邱裴松之曰瑜卒之處在今之巴陵與前所鎮巴邱名同處異南巴陵晉縣以巴邱山名今為湖岳州府治權聞之哀慟曰公瑾有王佐之資今忽短命孤何賴哉遂以魯肅為奮武校尉代瑜領兵肅勸權以荆州借劉備與共拒曹操權從之初權謂吕蒙曰卿今當塗掌事不可不學䝉辭以軍中多務權曰孤豈欲卿治經為博士邪但當渉獵見徃事耳卿言多務孰若孤孤嘗讀書自以為大有所益䝉乃就學及肅過尋陽與䝉議論大驚曰卿今者才畧非復吳下阿䝉䝉曰士别三日即更刮目相待大兄何見事之晚乎肅遂拜䝉母結友而去劉備以龎統為治中從事劉備以龎統守耒陽漢縣今屬湖南衡州府令不治免魯肅遺備書曰士元非百里才也使處治中别駕之任始當展其驥足耳諸葛亮亦言之備與統談大器之遂用統為治中親待亞亮並為軍師中郎將孫權以歩隲晉歩楊之後以邑為氏隲字子山淮隂人為交州刺史漢交州治南海今廣州府是初士燮字彦威蒼梧人為交阯太守表其三弟領合浦九真南海三郡燮體器寛厚中國士人多徃依之雄長一州威尊無上出入鳴鐘磬備其威儀笳簫鼓吹車騎滿道邊人夾轂焚香其貴重若此而不廢貢職至是權以隲為刺史燮率兄弟奉承節度遣子入質由是嶺南始服於權辛夘十六年春正月曹操以其子丕字子桓為五官中郎將為丞相副三月馬超韓遂等反秋曹操擊破之初馬騰韓遂結為異姓兄弟既而更為讐敵朝廷遣使和解之後曹操徴騰為衛尉使其子超代領部曲至是操遣鍾繇討張魯而使夏侯淵字妙才惇族弟出河東與繇㑹闗中諸將疑為襲已于是馬超韓遂等十部皆反其衆十萬屯據潼闗在今陜西同州府華隂縣東歴代皆為要地七月曹操自將擊之八月至潼闗與超等夾闗而軍操急持之而潛遣二將渡蒲阪津即蒲闗在今山西蒲州府永濟縣西據河西為營閏月操北渡河兵衆先渡操獨與虎士百餘人留南岸斷後馬超將歩騎萬餘人攻之矢下如雨操據胡床不動許褚扶操上船船工中流矢死禇左手舉鞍蔽操右手刺船校尉丁斐放牛馬以餌賊賊亂取之操乃得渡許禇字仲康譙人循河為甬道而南超等退拒渭口渭水入河之處漢曰船司空在今華隂縣東北操乃多設疑兵潛以舟載兵入渭作浮橋夜分兵結營于渭南超等夜攻營伏兵擊破之九月進軍渡渭超等數挑戰不許固請割地送任子操用賈詡計操問詡計詡曰離之而已操曰解乃偽許之而離間超遂使相猜疑韓遂請與操相見操與遂有舊于是交焉語移時不及軍事但説京都舊故拊手歡笑既罷超等問遂曹公何言遂曰無所言也超等疑之他日操與遂書多所㸃竄如遂改定者超等愈疑遂操乃與克日會戰先以輕兵挑之戰良久乃縱虎騎夾擊大破之超遂奔涼州諸將問曰初賊守潼闗渭北道缺不從河東擊馮翊而反守潼闗引日而後北渡何也操曰若吾入河東賊必引守諸津則西河未可渡吾故盛兵何潼闗使賊悉衆南守而西河之備虛故兩將得取西河然後引軍北渡賊不能與吾爭連車樹柵為甬道而南既為不可勝且以示弱度渭為堅壘盧至不出所以驕之也故賊不為營壘而求割地吾順言許之使自安而不為備因畜士卒之力一旦擊之所謂疾雷不及掩耳兵之變化固非一道也十月操軍追至安定將還參軍事楊阜謂操曰超有信布之勇甚得羗胡心若軍還而不嚴為之備隴上諸郡非國家有也會北方有事河間田銀蘇伯反留夏侯淵屯長安遂還銀等尋皆破滅明年操誅馬騰夷三族于是超率諸戎攻取郡縣殺刺史太守盡兼隴右之衆楊阜與姜叙字伯奕趙昻字偉章皆冀人起兵破超阜叙起鹵城昻據祁山隂遣人至冀使梁寛趙衢為内應衢詭説超使自出戰而與寛閉門超戰不克又不得入進退失據乃走鞏鹵城胡三省注在西縣冀縣之間祁山在甘肅昌府西和縣西北超南奔漢中先是阜欲討超而未得其便姜叙阜外兄也方屯歴城阜徃見叙及其母因具説情事歔郗悲甚敘母慨然曰咄伯奕人誰不死死于忠義得其所矣但當速發勿復顧我因敕敘與阜及趙昻等定計時昻子月已質于超謂妻異曰吾謀如是奈月何異厲聲曰雪君父之大耻喪元不足為重况一子哉已超走歴城執叙母母怒罵超超殺之及昻子月以去歴城杜佑曰在同谷郡西同谷今甘肅階州成縣是冬劉璋遣使迎劉備備留兵守荆州而西璋使備擊張魯扶風法正字孝直郿人為劉璋軍議校尉璋不能用别駕張松與正善前使荆州不為曹操所禮松恨因勸璋絶操而結劉備璋曰誰可使者松乃舉正正辭謝佯為不得已而行比還為松説備有雄畧宻謀奉戴以為州主會鍾繇欲向漢中璋懼松因説曰曹公兵無敵于天下若因張魯之資以取蜀土誰能禦之劉豫州使君之宗室而曹公之深讐也善用兵若使之討魯魯必破魯破則益州强曹公雖來無能為也璋然之遣正迎備主簿黄權諌曰左將軍有驍名今以部曲遇之則不滿其心以客禮待之則一國不容二君若客有泰山之安則主有累卵之危不若閉境以待時清璋不納黄權字公衡閬中人正至荆州隂説備取益州備疑未决龎統曰荆州荒殘人物殫盡東有孫車騎北有曹操難以得志今益州戸口百萬土沃財富誠得以為資大業可成也備曰今指與吾水火者曹操也操以急吾以寛操以暴吾以仁操以譎吾以忠每與操反事乃可成耳今以小利而失信義于天下奈何統曰亂離之時固非一道所能定也且兼弱攻昧逆取順守古人所貴若事定之後封以大國何負于信今日不取終為人利耳備以為然乃留諸葛亮闗羽等守荆州自將歩卒數萬而西孫權聞備西上遣船迎妹而夫人欲將備子禪去張飛趙雲勒兵截江乃得禪還劉璋敕在所供奉贈遺以巨億計巴郡太守嚴顔蜀人拊心歎曰此所謂獨坐窮山放虎自衛也備北詣涪注見前璋率兵三萬徃會之歡飲百餘日璋增備兵厚加資給使擊張魯備北到葭萌漢縣故城在今四川保寜府廣元縣厚樹恩德以収衆心壬辰十七年春正月曹操還鄴贊拜不名入朝不趨劍履上殿夏六月庚寅晦日食孫權徙治建業今江南江寧府治本楚金陵邑秦改曰秣陵置縣兩漢因之三國孫權建都于此名曰建業晉避諱又改曰建康至唐始定為上元江寜二縣初張紘以秣陵山川形勝勸孫權以為治所劉備亦勸權居之權于是作石頭城在今上元縣西石城山下徙治秣陵改號建業權遣紘還吳迎家道病卒留牋曰人情憚難而趨易好同而惡異𫝊曰從善如登從惡如崩言善之難也人君承基據勢無假于人而忠臣挾難進之術吐逆耳之言其不合也不亦宜乎故明君寤之求賢如飢渴受諫而不厭抑情損欲而以義斷恩也權省書為之流涕權作濡須塢濡須水名源出巢湖夾水立塢狀如偃月在今江南廬州府巢縣東南與無為州接冬十月曹操擊權至濡須吕䝉聞曹操欲東兵説孫權夾濡須水口立塢諸將皆曰上岸擊賊洗足入船何用塢為䝉曰兵有利鈍戰無百勝如有邂逅敵歩騎蹙人不暇及水其得入船乎權遂從之已曹操撃權至濡須權禦之相拒累月操出濡須作油船夜渡洲上權以水軍圍取得三千餘人其没溺者亦數千人權數挑戰操堅守不出權乃自乗輕舟從濡須口入操軍諸將皆以為是挑戰者欲擊之操曰此必孫權欲身見吾軍部伍也敕軍中皆精嚴弓弩不得妄發權行五六里廻環作鼓吹操見權舟船器仗軍伍齊肅喟然歎曰生子當如孫仲謀若劉景升子豚犬耳至明年正月權為牋與操説春水方生公宜速去操語諸將曰權不欺孤遂撤軍還侍中光祿大夫參軍事荀彧自殺先是董昭與諸將議以丞相宜進爵國公九錫備物以彰殊勲荀彧以為曹公本興義兵以匡朝寧國秉忠貞之誠守退讓之實君子愛人以徳不宜如此操由是不悦及擊孫權表請彧勞軍于譙因輙留彧以侍中光祿大夫持節參丞相軍事操向濡須彧以病留壽春飲藥而卒十二月有星孛于五諸侯晉書天文志五諸侯五星在東井北劉備據涪城時曹操方攻孫權權呼備自救先是備在葭萌龎統言于備曰今隂選精兵晝夜兼道徑襲成都一舉便定此上計也楊懷髙沛璋之名將各仗强兵據守關頭聞數諫璋使遣將軍還荆州將軍遣與相聞説荆州有急欲還救之二子喜必來見因此執之進取其兵乃回成都此中計也退還白帝連引荆州徐還圗之此下計也備然其中計關頭即白水闗在今四川保寧府昭化縣白帝城名公孫述所築在今四川夔州府奉節縣備貽書璋曰孫氏與孤本為唇齒而闗羽兵弱今不徃救則操必取荆州轉侵州界其憂甚于張魯因求益萬兵及資糧璋但許兵四千餘皆給半備因激怒其衆曰吾為益州征彊敵師徒勞瘁而積財吝賞何以使士大夫死戰乎張松書與備曰今大事垂立如何釋此去乎璋聞之収斬松敕闗戍勿復得與備通備大怒召懐沛責以無禮斬之勒兵徑至關頭并其兵進據涪城癸巳十八年春正月并十四州為九州省司𨽻及幽并涼交四州為冀豫兖青徐揚荆雍益九州而冀州兼有幽并二州及司𨽻之河東河内馮翊扶風四郡胡三省曰此曹操欲廣其所統以制天下耳夏五月曹操自立為魏公加九錫封凡十郡以丞相領冀州牧如故秋七月魏始建宗廟社稷冬十一月魏初置尚書侍中六卿以荀攸為尚書令涼茂字伯方山陽昌邑人為僕射毛玠崔琰常林字伯槐河内温人徐奕字季才東莞人何䕫字叔龍陳郡陽夏人為尚書王粲字仲宣髙平人杜襲字子緒潁川定林人衛凱和洽為侍中鍾繇為大理王修為大司農袁渙為郎中令行御史大夫事陳羣為御史中丞時操欲復肉刑令曰昔陳鴻臚以為死刑有可加于仁恩者御史中丞能申其父之論乎羣對曰臣父紀以為漢除肉刑而加増笞法本興仁惻而死者更衆所謂名輕而實重者也名輕則易犯實重則傷民且殺人價死合于古制至于傷人或殘毁其體而裁剪毛髪非其理也若用古刑使淫者下蠶室盗者刖其足則永無淫放穿窬之姦矣夫三十之屬雖未可悉復若斯數者時之所患宜先施用議者惟鍾繇與羣議同餘皆以為未可行操以軍事未罷顧衆議而止甲午十九年春三月曹操進位諸侯王上夏閏五月孫權使其將吕䝉攻皖城破之初曹操恐濵江郡縣為權所畧徴令内徙民轉相驚户十餘萬皆東渡江其地遂虛合肥以南惟有皖城操以朱光為廬江太守屯皖大開稻田吕蒙言于孫權曰皖田肥美若一収熟彼衆必増宜早除之權乃親攻皖城諸將欲作土山添攻具吕蒙曰治攻具及土山必歴日乃成城備既修外救亦至不可圖也今觀此城不能甚固以三軍鋭氣四面並攻不移時可㧞全勝之道也權從之䝉薦甘寧為升城督寧持練緣城䝉以精鋭繼之手執枹鼓士卒皆騰踴侵晨進攻食時破之獲朱光及男女數萬口權拜䝉為廬江太守還屯尋陽劉備入成都自領益州牧以諸葛亮為軍師將軍先是劉璋遣其將吳懿蜀志作臺字子遠陳留人等拒備皆敗退詣軍降備遂分定諸縣進圍雒城漢置雒縣後漢為廣漢郡治故城在今四川成都府漢州至是諸葛亮留闗羽守荆州與張飛趙雲將兵泝流克巴東劉璋分巴郡置巴東郡今䕫州府是破巴郡獲太守嚴顔飛呵顔曰何以不降顔曰卿等無狀侵奪我州我州但有斷頭將軍無降將軍也飛怒令牽去斫頭顔容止不變曰斫頭便斫頭何為怒也飛壯而釋之引為賔客備圍雒城且一年龎統中流矢卒法正牋與劉璋曰左將軍舊心依依實無薄意可圖變化以保尊門璋不答雒城潰備進圍成都亮飛雲引兵來會馬超知張魯不足與計事亦來請降備令引兵屯城北城中震怖璋遂開城出降備遷璋公安盡歸其財物佩以振威將軍印綬備入成都自領益州牧以諸葛亮為軍師將軍時董和字㓜宰南郡枝江人黄權李嚴字正方南陽人等本璋所任用和為益州大守權為府主簿嚴為䕶軍吳懿費觀字賔伯江夏鄳人等皆璋之姻親璋兄瑁取懿妹璋母費氏彭羕字永年廣漢人璋所擯棄羕為人所毁璋髠鉗為徒𨽻劉巴字子初零陵人宿昔所忌恨備自新野南奔巴不從備而北詣操後入蜀璋欲迎備巴又諫之皆處之顯任盡其器能有志之士無不競勸益州之民是以大和或欲以成都名田宅分賜諸將趙雲曰霍去病以匈奴未滅無用家為今國賊非但匈奴未可求安也須天下都定各反桑梓歸耕本土乃其宜耳益州人民初罹兵革田宅皆可歸還令安居復業乃可役調得其歡心不宜奪之以私所愛也備從之諸葛亮治蜀頗尚嚴峻人多怨者法正謂曰昔髙祖入關約法三章秦民知徳願君緩刑弛禁以慰此州之望亮曰君知其一未知其二秦以無道政苛民怨髙祖因之可以宏濟劉璋暗弱自馬以來政徳不舉威刑不肅君臣之道漸以陵替寵之以位位極則賤順之以恩恩竭則慢所以致敝實由于此吾今威之以法法行則知恩限之以爵爵加則知榮榮恩並濟上下有節為治之要于斯著矣秋七月曹操擊孫權操將擊孫權參軍𫝊幹字彦林北地人諫曰今天下未承王命者唯吳與蜀然吳有長江之險蜀有崇山之阻難以威服易以徳懐可且按甲寢兵全威養徳以道制勝操不從留少子植字子建守鄴以邢顒字子昻河間鄭人為植家丞顒防閑以禮無所屈撓由是不合庶子劉楨美文辭植親愛之楨曰君侯採庶子之春華忘家丞之秋實為上招謗其罪不小愚實懼馬劉楨字公幹東平人操進軍合肥至十月無功而還冬十月夏侯淵討枹罕賊宋建斬之初隴西宋建因涼州亂自號河首平漢王聚衆枹罕改元置百官三十餘年至是操遣夏侯淵自興國城名在今秦州秦安縣討之屠枹罕斬建淵先破走韓遂于長離川名在秦安縣悉降馬超餘衆畧定諸羌明年金城諸將斬送遂首于是涼州悉平十一月曹操弑皇后伏氏及皇子二人帝自都許以來守位而已左右侍御莫非曹氏之人議郎趙彦嘗為帝陳言時策操惡而殺之操後以事入見殿中帝不任其懼因曰君若能相輔則厚不爾幸垂恩相捨操失色俛仰求出舊儀三公引兵朝見令虎貢執刀挾之操出汗流浹背自後不復朝請董承女為貴人操誅承求貴人殺之帝以貴人有􅗖為請不得伏后懼與父完書令宻圖之至是事泄操使郗慮持節䇿収皇后璽綬以尚書令華歆為副勒兵入宫収后后閉户藏壁中歆壊戸發壁就牽后出時帝在外殿后披髪徒跣行泣過訣曰不能復相活邪帝曰我亦不知命在何時顧謂慮曰郗公天下寧有是邪遂將后下暴室以幽死所生二皇子皆酖殺之兄弟及宗族死者百餘人乙未二十年春正月立貴人曹氏操之女為皇后劉備孫權分荆州備使闗羽守江陵權使魯肅屯陸口陸水入江之口在今湖北武昌府嘉魚縣西南亦曰陸溪口孫權以劉備已得益州令諸葛瑾從備求荆州備曰須得涼州當以荆州相與權忿曰此假而不反乃欲虛辭引嵗也遂置長沙零陵桂陽長史闗羽逐之權遣吕䝉襲奪三郡備引兵自至公安遣羽爭之孫權進住陸口使魯肅將萬人屯益陽漢縣今屬湖南長沙府以拒羽肅邀羽相見因責數羽羽曰烏林磯名在今湖北安陸府沔陽州東南江濵水經注江水又東逕烏林南即黄公覆敗魏武處考三國志赤壁之戰多作烏林盖赤壁在江之南烏林在江之北故互言之也之役左將軍身在行伍戮力破敵豈得徒勞無一塊土而足下來欲収地邪肅曰不然始與豫州覲于長阪豫州之衆不當一校計窮慮極圖欲遠竄主上矜愍豫州身無處所不愛土地士民之力以濟其患而豫州愆德墮好今已藉手西州又欲剪并荆土斯葢凢夫所不忍行而况整領人物之主乎羽無以答會聞曹操將攻漢中備乃求和于權權令諸葛瑾報命遂分荆州以湘水源出廣西桂林府興安縣逕湖南之永州衡州至長沙府湘隂縣滙于洞庭為界長沙江夏桂陽以東屬權南郡零陵武陵以西屬備瑾每奉使至蜀與弟亮但公會相見退無私靣秋七月曹操取漢中張魯降操軍至陽平闗名在陜西漢中府沔縣西北即白馬城也今寧羌州亦有關名陽平乃後代所置張魯欲降其弟衛不肯率衆拒闗堅守操攻之不能拔欲引軍還會前軍夜迷誤入張衛别營營中大驚退散操進兵攻之衛等夜遁魯衆潰奔巴中魯左右欲悉燒寳貨倉庫魯曰本欲歸命國家而意未得達今避鋒鋭非有惡意寳貨倉庫國家之有遂封藏而去操入南鄭遣人慰喻魯復漢寧為漢中留夏侯淵張郃守之而還主簿司馬懿言于操曰劉備以詐力虜劉璋蜀人未附而遠爭江陵此機不可失也今克漢中益州震動進兵臨之勢必瓦解聖人不可違時亦不可失時也操曰人苦無足既得隴復望蜀邪遂還是冬張魯自巴中將餘衆降拜魯鎮南將軍封閬中侯魯將閻圃及五子皆為列侯冬十月始置名號侯以賞軍功裴松之曰虛封葢自此始丙申二十一年夏四月曹操自進爵魏王殺其尚書崔琰初崔琰薦鉅鹿楊訓操禮辟之及操進爵訓發表稱頌或笑訓希世浮偽琰失舉琰取其草視之與訓書曰省表事佳耳時乎時乎會當有變琰本意譏論者好譴呵而不尋情理有與琰不平者白之操怒以琰意指不遜収付獄髠為徒𨽻白者復云琰對賔客虬須直視若有所瞋遂賜琰死毛玠傷琰無辜心不悦人復白玠怨謗亦収付獄桓階和洽為之陳理操曰此捐君臣恩義妄為死友怨歎殆不可忍也洽曰玠剛直忠公不宜有此然人情難保要宜考覈兩騐其實玠信有謗言當肆之市朝若無此言言事者誣大臣以誤主聽臣竊不安操遂不窮治玠遂免黜時西曹掾丁儀字正禮沛郡人用事玠之獲罪儀有力焉羣下側目何䕫徐奕獨不事儀儀譖奕出之傅選謂䕫宜少下之䕫曰為不義適足害身焉能害人五月己亥朔日食秋七月南匈奴單于入朝于魏遂留居鄴初南匈奴久居塞内與編户大同而不輸貢賦議者恐其戸口滋蔓浸難禁制欲豫為之防至是單于呼厨泉入朝于魏操因留之于鄴使右賢王去卑監其國單于嵗給綿絹錢糓如列侯子孫襲號分其衆為五部各立其貴人為帥分為左右前後中五部散居并州諸郡監國者居平陽選漢人為司馬以監督之丁酉二十二年春正月曹操擊孫權軍三月權降先是孫權圍合肥魏將張遼李典擊之大敗而還權為張遼所掩襲甘寧凌統等以死扞敵權乘駿馬越津橋得去事在二十年至是操擊權進軍居巢權保濡湏操逼攻之權退走三月操引軍還權遣使請降操報之權留將軍周泰督濡須諸將以泰寒門不服權會諸將樂飲命秦解衣手指其創痕流涕曰㓜平卿為孤兄弟戰如熊虎被創數十吾亦何心不待卿以骨肉之恩委卿以兵馬之重乎諸將皆服周泰字㓜平下蔡人夏四月曹操用天子車服出入警蹕冕十二旒旒垂玉也十二以象天數乘金根車以金為餙輪皆朱駕六馬設五時副車各如方色焉亦如之冬十月魏以世子丕為王太子初操娶丁夫人無子妾劉氏生子昻卞氏生四子丕彰字子文植熊於是出丁夫人而立卞氏為繼室植性機警多藝能才藻敏贍操愛之操欲以女妻丁儀丕以儀目眇止之儀由是怨丕遂與弟廙字敬禮及楊修字祖徳彪之子數稱植才勸操立以為嗣他日操屏人問賈詡詡嘿然不對操問其故詡曰屬有所思故不即對耳操曰何思詡曰思袁本初劉景升父子也操大笑操嘗出征丕植並送植稱述功德發言有章左右屬目操亦悦焉丕悵然自失吳質耳語曰王當行流涕可也及辭丕流涕而拜操及左右咸歔欷于是皆以植多華辭而誠心不及也吳質字季重濟隂人植既任性而行不自雕餙丕御之以術矯情自飾宫人左右並為之稱説故遂定為太子丕抱議郎辛毗頸而言曰辛君知我喜不毗以告其女憲英憲英曰太子代君主宗廟社稷者也代君不可以不戚主國不可以不懼宜戚宜懼而反以為喜何以能久魏其不昌乎久之植乗車行馳道中開司馬門出操大怒公車令坐死由是重諸侯科禁而植寵日衰劉備進兵漢中曹操遣將軍曹洪拒之張魯之走巴中也劉備遣黄權迎之權言于備曰若失漢中則三巴不振此為割蜀之股臂也于是迎魯而魯已降操操遣張郃徇三巴巴郡巴東巴西為三巴巴東注見前巴西劉璋所置郡治閬中今保寧府治是也巴西太守張飛襲擊郃大破之郃走還南鄭事在二十年至是法正説劉備曰曹操一舉而降張魯定漢中不因此勢以圖巴蜀而留夏侯淵張郃屯守身遽北還此非其志不逮而力不足也必將内有憂逼故耳今策淵郃才畧不勝國之將帥舉衆徃討必可克之克之之日廣農積榖觀釁伺隙上可以傾覆寇敵尊奬王室中可以蠶食雍涼廣拓境土下可以固守要害為持久之計此蓋天以與我時不可失也備乃進兵遣張飛馬超吳蘭等屯下辨後漢武都郡治故城在今甘肅階州成縣操遣曹洪拒之明年曹洪擊吳蘭斬之張飛馬超走備屯陽平攻張郃等不克孫權陸口守將魯肅卒權以吕蒙代之孫權遣陸遜字伯言吳人討丹陽山越注見前平之陸遜言于權曰克敵寧亂非衆不濟而山冦未平難以圖遠可大部伍取其精鋭權從之會丹陽賊帥費棧作亂扇動山越權命遜討破之遂部伍東三郡丹陽新都會稽也强者為兵羸者補戸得精卒數萬人宿惡蕩除所過肅清會稽太守淳于式表遜枉取民人遜後詣都言次稱式佳吏權曰式白君而君薦之何也遜對曰式意欲養民是以白遜遜豈可復毁式以亂聖聼乎權曰此誠長者之事顧人不能為耳戊戌二十三年春正月少府耿紀字季行秉元孫司直韋晃太醫令吉本吉氏周尹吉甫之後本范書作㔻或又作平等起兵討曹操不克死之時有京兆金禕字徳偉日磾之後自以世為漢臣乃發憤與紀等起兵欲挾天子以伐魏南援劉備不克而死時操在留丞相長史王必典兵督許中事紀等率衆夜攻必射必中肩會天明衆潰紀等皆被誅必尋亦以創死三月有星孛于東方秋七月曹操擊劉備九月至長安己亥二十四年春正月劉備擊夏侯淵破斬之初夏侯淵戰雖數勝曹操常戒之曰為將當有怯弱時不可但恃勇也將當以勇為本行之以智計若但任勇則一匹夫敵耳及是與劉備相拒踰年備自陽平南渡沔水緣山稍前營于定軍山在今漢中府沔縣東南淵引兵爭之法正曰可擊矣備使討虜將軍黄忠字漢升南陽人乗高鼔譟攻之淵軍大敗遂斬之張郃引兵還督軍杜襲収斂散卒推郃為軍主衆心乃定二月壬子晦日食夏五月劉備取漢中操自長安出斜谷軍遮要以臨漢中劉備曰曹公雖來無能為也我必有漢川矣乃斂衆拒險終不交鋒操運米北山下黄忠引兵欲取之過期不還趙雲將數十騎出營視之值操揚兵大出雲遂前突其陣且鬬且却魏兵散而復合追至營下雲入營開門偃旗息鼓魏兵疑雲有伏引去雲以勁弩射魏兵魏兵驚駭自相蹂踐墮水死者甚衆明旦備至雲營視昨戰處曰子龍一身都是膽也相守積月魏軍士多亡五月操引兵還長安備遂有漢中備遣將軍孟逹攻房陵殺其太守又遣養子中郎將封與違會攻上庸太守申耽舉郡降府房陵漢縣後漢末置郡晉廢郡為縣今湖北鄖陽房縣是上庸漢縣後漢末置郡梁廢故城在今鄖陽府竹山縣劉封本羅侯寇氏子孟達扶風人秋七月劉備自立為漢中王備設壇場于沔陽漢縣故城任今漢中府沔縣陳兵列衆羣臣陪位奏以備為漢中王讀訖備拜受璽綬御王冠立子禪為王太子還治成都以許靖字文休汝南平輿人為太傅法正為尚書令闗羽張飛馬超黄忠皆進位有差初馬超來降闗羽書與諸葛亮問超人才可誰比類亮答曰孟起兼資文武雄烈過人一世之傑黥彭之徒可與益徳並驅爭先猶未及髯之絶倫超羣也羽美鬚髯故亮謂之髯羽省書大悦至是司馬費詩奉使授羽印綬羽聞黄忠位與已並怒曰大丈夫終不與老兵同列不肯受拜詩曰昔蕭曹與高祖少小親舊而陳韓亡命後至論其班列韓最居上未聞蕭曹以此為怨今王以一時之功隆崇漢室然意之輕重寜當與君侯齊乎且王與君侯譬猶一體同休等戚禍福共之愚謂君侯不宜計官號之高下爵祿之多少為意也羽大感悟遽即受拜人費詩字公舉為南安八月漢中將闗羽取襄陽闗羽使糜芳竺之弟守江陵傅士仁守公安羽自率衆攻曹仁于樊仁使于禁龎徳等屯樊北八月大霖雨漢水溢平地數丈禁等七軍皆没諸將登高避水羽乘大船就攻之禁窮廹遂降龎德力戰為羽所獲不屈羽殺之急攻樊城城多崩壊不没者數版羽乘船臨城外内斷絶羽又遣别將圍襄陽刺史胡修太守𫝊方皆降操聞龎徳死流涕曰吾知于禁三十年何意臨危反不及龎德邪曹操殺丞相主簿楊修初楊修丁儀謀立曹植為魏嗣丕患之以車載廢簏敗箱也内作納吳質與之謀修白操丕懼告質質曰無害也明日復以簏載絹入修復白之推驗無人操由是疑後植以驕縱見疏修亦不敢自絶每當就植慮事有闕忖度操意預作答教十餘條敕門下隨問答之于是教裁出答已入操怪其㨗推問始洩遂収殺之冬十月孫權使吕䝉襲取江陵曹操救樊闗羽走還權邀斬之十二月吕䝉卒闗羽威震華夏自許以南徃徃遥應曹操議徙許都以避其鋭司馬懿蔣濟曰闗羽得志孫權必不願也可遣人勸權躡其後許割江南以封權則樊圍自解操從之初魯肅以操尚存勸權撫輯闗羽與之同仇及吕䝉代肅以羽驍勇有兼并之志勸權取羽權善之權嘗為其子求昬于羽羽罵其使不許權由是怒至是蒙上疏曰羽討樊而多留備兵必恐䝉圖其後故也䝉嘗有病乞還建業以治疾羽必撤備兵盡赴襄陽然後襲其空虛羽可擒也遂稱病篤權露檄召蒙還既至問可代者蒙曰陸遜意思深長才堪負重而未有遠名非羽所忌宜用之權乃召遜代䝉遜至陸口為書與羽稱其功美深自謙抑羽意大安稍撤兵赴樊遜具啓陳狀權遂發兵令䝉先行而為牋與操請以討羽自效時徐晃字公明河東楊人屯宛助曹仁與羽相持操用董昭計權牋言欲掩取江陵公安二城乞宻不露使羽有備董昭曰宜應權以宻而内露之使羽聞而還自䕶則速解秘而不露使權得志非訃之上且羽為人彊梁自恃二城守固必不速退操曰善乃驛發權書敕晃以弩射示羽羽猶豫不能去操自雒陽南救仁駐軍摩陂在今河南汝州郟縣東南亦曰龍陂晃攻羽破之羽撤圍退然舟船猶據沔水吕蒙至尋陽盡伏精兵􅖻􅑳舟名中使白衣摇櫓作啇賈人服晝夜兼行羽所置江邊屯候盡収縛之糜芳傅士仁皆降芳士仁素嫌羽輕已羽出軍供給軍資不悉相及羽言還當治之芳士仁皆懼故降䝉遂入江陵得羽及將士家屬皆撫慰之羽聞南郡破即南走還而士卒皆無鬬心羽在道數使人與䝉相聞蒙輒厚待其使周遊城中家家致問或手書示信使還私相參訊咸知家門無恙見待過于平時故無鬬志會孫權已至羽西保麥城在今安陸府當陽縣東南因遁走兵皆解散纔十餘騎權先使潘璋字文珪東郡發干人斷其徑路十二月羽至漳鄉在當陽縣東北漳水逕其南與其子平皆被害于是孫權遂定荆州以吕䝉為南郡太守陸遜為鎮西將軍皆封侯遜屯夷陵守峽口西陵峽口也三峽之一在今湖北宜昌府東湖縣西北復以劉璋為益州牧駐秭歸注見前未幾卒吕䝉未及受封疾發亦卒以孫權為驃騎將軍領荆州牧權上書稱臣于操稱説天命操以示外曰是兒欲踞吾著爐火上耶陳羣等皆曰漢祚已終非適今日殿下功德巍巍羣生注望故孫權在遠稱臣此天人之應異氣齊聲殿下宜正大位復何疑哉操曰若天命在吾吾為周文王矣庚子二十五年魏文帝曹丕黄初元年是嵗僭國一元考范書獻帝紀建安二十五年三月改延康十月帝遜位是十月以前猶為漢也通鑑于是年正月即以魏黄初紀元而于三月仍書改元延康是既以建安為魏之年而又以延康為魏所改矣綱目因范紀之文仍作二十五年今依之春正月丞相冀州牧魏王曹操還至洛陽卒太子丕嗣自為丞相冀州牧操卒太子丕在鄴凶問至羣臣以為太子即位當俟詔命尚書陳矯字季弼廣陵東陽人曰王薨于外愛子在側彼此生變則社稷危乃具官備禮一夕而辦明旦以王后令策太子即王位帝尋遣御史大夫華歆奉䇿詔授丞相印綬魏王璽綬領冀州牧至是尊王后曰王太后葬武王于高陵操知人善察難眩以偽隨才任使皆獲其用行軍臨陣因事設竒譎敵制勝變化多端故能芟刈羣雄幾平海内然性刻忌諸將有計畫勝己者隨以法誅之故人舊怨亦皆無餘其所刑殺輙對之流涕終無所活高陵即西陵在河南彰德府臨漳縣西二月丁未朔日食曹丕遣其弟鄢陵注見前侯彰等皆就國丕遣其弟皆就國臨菑注亦見前監國謁者灌均希指奏臨菑侯植醉酒悖慢刧脅使者丕貶植為安鄉侯誅其黨丁儀丁廙并其男口魏立法自今宦者官不得過諸署令謂尚方黄門掖庭永巷御府等署之官置散騎常侍侍郎各四人以士人補之文獻通考秦置散騎又置中常侍漢因之後漢省散騎而中常侍改用宦者魏黄初初復置散騎合于中常侍謂之散騎常侍又置散騎侍郎其宦人為官者不得過諸署令作金䇿藏之石室魏立九品法置州郡中正胡三省曰九品中正自此始尚書陳羣以天朝選用不盡人才乃立九品官人之法州郡皆置中正皆本方之人擇有識鑒者為之區别人物第其高下定為九等其有言行修著則升進之或以五升四以六升五倘或道義虧缺則降下之或自五退六自六退七漢中將孟達以上庸降魏益州將軍孟逹屯上庸與副軍中郎將劉封不恊率部曲降魏達有容止才觀曹丕愛之以為新城合房陵上庸置治房陵太守劉曄字子揚淮南成徳人曰達有茍得之心而恃才好術必不能感恩懷義新城與孫劉接連若有變態為國生患丕不聼魏遣夏侯尚等襲封封破走還成都諸葛亮慮封剛猛難制勸漢中王因此除之遂賜封死以賈逵為豫州刺史時天下初定刺史多不能攝總錄也郡逵曰州本以六條詔書察二千石以下今長吏慢法盗賊公行州知而不糾天下復何取正乎于是二千石以下阿縱不如法者皆奏免之外修軍旅内治民事興陂田通運渠吏民稱之曹丕曰眞刺史矣布告天下當以豫州為法冬十月魏王曹丕稱皇帝廢帝為山陽此漢河内之山陽縣故城在今河南懐慶府修武縣公左中郎將李伏太史丞許芝言魏當代漢見于圖緯胡三省汪李伏引孔子玉版許芝引春秋佐助期令伏之言曰定天下者魏公子桓芝之言曰故白馬李雲上言許昌氣見于當塗高當塗高者魏也象魏者兩觀闕是也當道而高大者魏魏當代漢基昌于許故如雲之言也魏之羣臣因表勸丕簒位時丕方如譙大饗軍士父老設伎樂百戲還帝告祠高廟遣使持節奉璽綬詔册禪位于魏魏王丕上書三讓乃為壇于繁陽亭名魏改曰繁昌故城在今河南許州臨潁縣升受璽綬即皇帝位改元黄初奉漢帝為山陽公居濁鹿城在修武縣西北行漢正朔用天子禮樂追尊武王曰武皇帝廟號太祖尊王太后曰皇太后改相國為司徒御史大夫為司空十二月魏主丕如洛陽營宫室魏徙冀州士卒家實河南魏主丕欲徙冀州士卒家十萬戸實河南時旱蝗民饑羣司以為不可而丕意甚盛侍中辛毗求見丕作色待之曰卿謂徙民非邪毗曰誠以為非丕曰吾不與卿議毗曰陛下置臣謀議之官安得不與臣議臣所言非私乃社稷之慮也安得怒臣丕不答入内毗隨引其裾丕奮衣而去良久乃出曰佐治卿持我何太急耶毗曰今徙既失民心又無以食必將為冦故臣不敢不力爭丕乃徙其半御批歴代通鑑輯覽卷二十七

  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_065-1a, image: WYG0337/WYG0337-0573a.png}
body:
  text: 友圭遽為荒淫內外憤怒駙馬都尉趙巖犨之子奉使至大梁均王友貞密與之謀誅友圭巖曰此事成敗在楊令公謂師厚得其一言諭禁軍吾事立辦友貞乃遣腹心馬慎交之魏州説楊師厚曰郢王篡弒人望屬在大梁公若因而乘之此不世之功也且許事成之日賜犒軍錢五十萬師厚與將佐謀之曰方郢王弒逆吾不能即討今君臣之分已定無故改圖可乎或曰郢王親弒君父賊也均王舉兵復讐義也奉義討賊何君臣之有彼若一朝破賊公將何以自處乎師厚驚曰吾幾誤計師厚乃遣其將王舜賢至洛陽隂與龍虎統軍袁象先謀巖歸洛陽亦與象先定計于是象先等帥禁兵五千人突入宫中友圭自度不免令馮廷諤先殺妻次殺己廷諤亦自剄象先巖齎傳國寶詣大梁迎均王王曰大梁國家創業之地何必洛陽乃即位于大梁更名鍠久之又更名瑱追廢友圭為庶人復博王友文官爵加楊師厚兼中書令賜爵鄴王遣使招撫朱友謙友謙復稱藩三月晉師徇山後八軍今居庸關古北口地及武州注見前皆下之劉守光命元行欽募山北兵以應契丹又以騎將高行圭媯州人為武州刺史晉李嗣源分兵徇山後八軍皆下之進攻武州行圭以城降行欽以兵攻行圭行圭使其弟行周字尚質質晉軍以求救嗣源救之行欽八戰力屈乃降嗣源愛其驍勇養以為子以行圭為代州刺史行周留事嗣源與嗣源假子從珂分將牙兵以從從珂母魏氏鎮州人先適王氏生從珂嗣源從晉王克用戰河北得魏氏以為妾故從珂為嗣源子及長以勇健知名嗣源愛之夏六月蜀以道士杜光廷字賔至長安人為諫議大夫光廷博學善屬文光庭嘗應九經舉不第遂為道士蜀主重之頗與議政事太子元膺性狷急猜忍蜀主命光庭選純靜有德者侍東宫光庭薦儒者許寂徐簡夫元膺未嘗與之交言許寂會稽人秋七月蜀主殺其太子元膺蜀少保唐道襲閬州人蜀主嬖臣也道襲本以舞僮見幸太子元膺素惡之屢相譖毁會七夕元膺召諸王大臣置酒集王宗翰樞密使潘峭河西人翰林學士毛文錫髙陽人不至元膺怒白蜀主以峭文錫離間兄弟請貶之元膺出道襲入言于蜀主曰太子謀作亂欲召諸將諸王以兵錮之然後舉事耳蜀主疑焉道襲請召兵入衛元膺聞之懼遣軍使徐瑶字伯玉長葛人等以兵攻道襲中流矢墜馬死蜀主命王宗侃等發兵討之斬瑶元膺亡匿躍龍池艦中明日出而丐食為衛兵所殺蜀主追廢為庶人蜀主光聞元膺死慟哭不止會張格呈慰諭軍民榜讀至不行斧鉞之誅將誤社稷之計蜀主乃收淚曰朕何敢以私害公八月梁賜髙季昌爵渤海王季昌造戰艦五百艘治城塹繕器械為攻守之具招聚亡命交通吳蜀梁于是浸不能制冬十月蜀立子宗衍為太子蜀主十一子宗衍最幼其母賢妃有寵使飛龍使唐文扆諷張格表請立之格使以表示王宗侃等詐云受密旨衆皆署名蜀主不得已許之曰宗衍幼懦能堪其任乎遂立為太子十一月晉王入幽州執劉仁恭及守光以歸先是晉周德威進軍逼幽州南門劉守光遣使致書請和德威不答守光辭甚悲哀德威曰大燕皇帝尚未郊天何雌伏如是耶豫受命討罪他非所聞也不答其書已而盧龍巡屬皆入于晉守光求援于契丹契丹以其無信不救屢請降于晉晉人疑其詐亦不許至是登城謂周德威曰俟晉王至吾則開門泥首聽命十一月晉王單騎至城下謂守光曰朱溫篡逆余本欲與公合河朔之兵興復唐祚公謀之不臧乃效彼狂僭鎮定二帥皆俯首事公而公曽不之恤是以有今日之役丈夫成敗須決所向公將何如守光曰今日爼上肉耳惟王所裁王憫之與折弓矢為誓曰但出相見保無他也初守光愛將李小喜多贊成守光之惡及是守光將出降小喜止之而自踰城降晉且言城中力竭晉王督諸軍四面攻城克之擒劉仁恭守光帥妻子亡去王入幽州以周德威為盧龍節度使李嗣本為振武節度使德威帥振武今以嗣本代之守光將奔滄州迷失道為人所擒送晉軍晉王發幽州命掌書記王緘草露布劉協曰露板不封布諸觀聽也緘不知故事書之于布遣人曵之仁恭父子皆荷校于其下十二月梁遣兵侵吳吳人擊敗之梁以王景仁為淮南招討使將兵萬人侵廬夀吳徐溫朱瑾帥諸將拒之遇于趙步鎮名在今鳳陽府鳳臺縣東北淮河北岸徴兵未集溫戰不勝而郤景仁乘之吳吏士皆失色將軍陳紹宛邱人援槍大呼曰誘敵太深可以進矣躍馬還鬬衆隨之梁兵乃退溫賜之金帛紹悉以分麾下吳兵既集復戰于霍邱梁兵大敗梁之渡淮而南也表其可涉之津霍邱守將朱景浮表于木徙置深淵及梁兵敗還望表而涉溺死者大半甲晉岐吳稱唐天祐十一年梁戌乾化四年是嵗几五國五鎮春正月劉仁恭劉守光伏誅晉王以練糸斥充夜反縶縛之也劉仁恭父子凱歌入于晉陽獻于太廟自斬劉守光守光呼曰教守光不降者李小喜也小喜瞋目叱守光曰汝內亂禽獸行亦我教邪王怒其無禮先斬之乃斬守光械仁恭至代州刺其心血以祭先王墓然後斬之鎮定推晉王為尚書令始置行臺或説趙王鎔曰大王所稱尚書令乃梁官也大王既與梁為讐不當稱其官且自太宗踐阼以來無敢當其名者今晉王為盟主不若以尚書令讓之鎔乃與王處直各遣使推晉王為尚書令晉王三讓然後受之始開府置行臺如太宗故事髙季昌攻蜀夔州不克季昌以夔萬忠涪四州注俱見前舊𨽻荆南興兵取之先攻夔州刺史王先成逆戰季昌縱火船焚蜀浮橋蜀將張武日照人舉鐵絙拒之船不得進焚溺甚衆季昌遁還季昌既攻蜀不克峽上有堰或勸蜀主乘夏秋江漲決之以灌江陵判樞密院毛文錫諫曰季昌不服其民何罪陛下方以德懷天下以鄰國之民為魚鱉乎蜀主乃止之秋七月晉伐梁邢州不克晉王既克幽州乃謀伐梁會趙王鎔及周德威攻邢州李嗣源引昭義兵會之梁楊師厚引兵救而郤之冬十一月南詔寇蜀蜀遣兵擊敗之南詔寇黎州蜀主遣兵擊敗之俘斬數萬級溺死數萬人初黎雅蠻有楊劉郝三姓世為酋長謂之三王其部落壘甓而居號曰網舍雖內屬于唐受爵賞而潛通南詔為之詗導前鎮蜀者雖知而不敢詰至是蜀主數以泄漏軍謀斬之毁其㚋舍自是南詔不復犯邊碉㚋丁么反與通乙晉岐吳稱唐天祐十二年梁亥貞明元年是嵗凡五國五鎮春二月梁分天雄為兩鎮夏四月魏人降晉六月晉王入梁天雄節度使楊師厚卒師厚矜功恃衆擅割財賦置銀槍效節都數千人欲以復故時牙兵之盛梁主雖外加尊禮內實忌之及是卒租庸使趙巖判官邵贊言于梁主請分天雄六州為兩鎮以弱魏兵梁主然之以賀德倫為天雄節度使置昭德軍于相州割澶衛二州𨽻之以張筠海州人為節度使分魏州將士府庫之半入昭德于是天雄軍亂魏兵皆父子相承族姻磐結不願分徙連營聚哭相與謀曰朝廷忌吾軍府強盛欲設䇿使之殘破爾吾六州舊為藩府未嘗逺出國門一旦骨肉流離生不如死遂亂入攻牙城殺數百人劫德倫置樓上有效節軍校張彥者自帥其黨拔白刃止剽掠四月梁主遣供奉官扈異橅諭魏軍許彥以刺史彥請復還三州不許使者再返彥裂詔書抵地戟手南向而詬謂德倫曰天子愚暗聽人穿鼻遂逼德倫以書求援于晉晉王得書命李存審進據臨清後魏縣明為州今屬山東東昌府五月晉王引大軍東下與存審會猶疑魏人之詐按兵不進德倫遣判官司空頲貝州清陽人犒軍密言彥凶狡請王先除之王進屯永濟唐縣宋省故城在臨清州彥選銀槍效節五百人執兵自衛詣謁王登驛樓語之曰汝陵脅主帥殘虐百姓我今舉兵而來以安百姓非貪土地汝雖有功于我不得不誅以謝魏人遂斬彥及其黨七人餘衆股栗王召諭之曰罪止八人餘無所問衆皆拜伏呼萬嵗明日王緩帶輕裘而進令彥卒擐甲執兵翼馬而從衆心由是大服六月晉王入城德倫上印節王固辭而後受之德倫帥將吏拜賀王承制以德倫為大同節度使至晉陽張承業留之秋七月晉王勞軍魏縣梁主之分相魏也恐魏人不服遣劉鄩將兵六萬自白馬渡河張聲勢以脅之鄩先遣澶州刺史王彥章將五百騎入魏州以虞變軍果亂攻彥章于金波亭彥章屯兵處故址在今大名府元城縣東彥章南走鄩進屯洹水注見前聞晉軍至急選萬人取魏縣晉王使史建塘拒之自引親軍與鄩夾河漳河也為營晉王既入魏州遂分兵襲德州拔之又陷澶州王彥章在劉鄩營晉人獲其妻子厚待之遣間使誘彥章彥章斬其使晉人盡滅其家至是晉王勞軍于魏縣因帥百餘騎循河而上覘鄩營會天陰晦鄩伏兵五千于河曲鼓譟而出圍王數重王躍馬大呼所向披靡禆將夏魯竒字邦傑青州人等操短兵力戰自午至申乃得出亡其七騎會李存審救兵至乃得免賜魯竒姓名曰李紹竒梁劉鄩引兵襲晉陽不至還守莘城莘縣城也莘縣隨置今屬東昌府劉鄩以晉兵盡在魏州晉陽必虛欲襲取之乃潛引兵自黃澤嶺名在山西遼州東南與河南武安縣接界至去晉人怪鄩軍數日不出遣騎覘之時見旗幟循堞往來晉王曰吾聞劉鄩用兵一步百計此必詐也更使覘之乃縳芻為人執旗乘驢在城上耳晉王曰鄩長于襲人短于決戰計彼行才及山下亟發騎兵追之會陰雨積旬道險泥深鄩士卒腹疾足腫墜崖谷死者什二三晉將李嗣恩倍道先入晉陽城中知之勒兵為備鄩糧盡又聞晉有備追兵在後衆懼將潰鄩諭之曰今深入敵境腹背有兵山谷髙深去將何之惟力戰庶幾可免不則以死報君親爾衆泣而止周德威聞鄩西上幽州引千騎救晉陽至土門注見前鄩已整衆下山屯于宗城隋縣元省故城在今廣平府威縣馬死殆半知臨清有蓄積欲據之以絶晉糧道德威急追至南宫擒其斥候者斷腕而縱之使言曰周待中已據臨清矣詰朝略鄩兵而過入臨清鄩引軍趨貝州軍堂邑漢縣今屬東昌府德威攻之不克翌日軍于莘縣塹而守之自莘及河築甬道以通饋餉晉王軍于莘西三十里煙火相望一日數戰既而鄩攻鎮定營為晉將李存審所敗奔還鄩饋運不給晉人數挑戰鄩不出晉人乃攻絶其甬道梁主以詔讓鄩鄩奏晉兵甚多便習騎射誠勍敵未易輕也茍有隙可乘臣豈敢偷安養寇梁主怒遣中使往督戰鄩集諸將問曰主上深居禁中不知軍旅徒與少年新進輩謀之夫兵在臨機制變不可預度今敵尚強與戰必不利奈何諸將皆曰勝負須一決曠日何待鄩默然不悅退謂所親曰主暗臣諛將驕卒惰吾不知死所矣後數日將萬餘人薄鎮定營營中驚擾晉李存審以騎兵二千橫擊之鄩大敗晉人逐之俘斬千計吳徐溫出鎮潤州留子知訓江都輔政吳以徐溫為諸軍都指揮使鎮潤州軍國庶務參決如故留徐知訓居廣陵秉政冬十月梁康王友敬梁主之弟王代史作友孜作亂伏誅梁德妃張氏節度使歸霸之女歸霸清河人卒將葬友敬謀作亂使腹心數人匿于寢殿梁主覺之跣足踰垣而出召宿衛兵索殿中得而手刃之捕友敬誅之由是疏忌宗室専任趙巖及妃兄弟漢鼎漢傑從兄弟漢倫漢融咸居近職參預謀議每出兵必使之監護巖等依勢弄權賣官鬻獄離間舊將相敬翔李振雖為執政所言多不用振每稱疾不預事政事日紊以至于亡十一月蜀遣兵攻岐克階成秦鳯州岐將劉知俊奔蜀蜀王宗翰引兵出青泥嶺在秦州徽縣南為入蜀之路王宗綰等敗秦州兵于金沙谷在秦州東南克階成州秦州節度使李繼崇遣子迎降劉知俊攻霍彥威字子重曲周人于邠州半嵗不克聞秦州降蜀妻子皆遷成都解圍還鳯翔懼及禍夜帥親軍斬關奔蜀軍宗綰攻鳯州克之既而蜀主以知俊為都招討使諸將皆舊功臣多不用其命且疾之故無成功唐文扆譖之蜀主亦忌其才乃誣以謀叛殺之丙晉岐吳稱唐天祐十三年梁貞明二子年蜀通政元年是嵗凡五國五鎮春正月梁以李愚為左拾遺梁主聞李愚學行召為左拾遺充崇政院直學士衡王友諒貴重李振等見皆拜之愚獨長揖梁主讓之曰衡王朕兄也朕猶拜之卿長揖可乎對曰陛下以家人禮見衡王拜之宜也振等陛下家臣臣于王無素不敢妄有所屈久之竟以抗直罷二月梁劉鄩攻晉魏州晉王擊敗之劉鄩閉壁不出晉王乃留李存審守營自勞軍于貝州聲言歸晉陽鄩聞之奏請襲魏州令澶州刺史楊延直以萬人會魏州延直夜至城中選壯士五百潛出擊之延直潰走詰旦鄩自莘縣悉衆至城東與延直餘衆合李存審引營中兵踵其後李嗣源以城中兵出戰晉王亦自貝州至與嗣源當其前鄩見之驚郤晉王躡之至故元城即王莾城也在今大名府城東唐初元城縣嘗治此故名西為方陳于西北存審為方陳于東南鄩為圓陳于其中間四靣受敵合戰良久梁兵大敗鄩突圍走步卒七萬殺溺殆盡鄩渡河保􅉸州已而梁主召鄩不至即以鄩為宣義節度使使將兵屯黎陽梁遣兵襲晉陽將安金全代北人擊敗之梁匡國節度使王檀字衆美京兆人密疏請發關西兵襲晉陽奄至城下晝夜急攻城幾陷者數四代北故將安金全退居太原往見張承鄴曰晉陽根本之地若失之則大事去矣僕雖老病憂兼家國請以庫甲見授為公擊之承業即與之金全帥其子弟及退將之家得數百人夜出擊梁兵大驚引郤李嗣昭亦遣牙將石君立將五百騎救晉陽發上黨夕至城下大呼曰昭義侍中大軍至矣遂入城夜與安金全等分出諸門擊梁兵梁兵死傷什二三檀引還晉王性矜伐以策非已出故不行賞賀德倫部兵逃入梁軍張之承業恐其為變收德倫斬梁主聞劉鄩敗又聞王檀無功歎曰吾事去矣秋七月梁以吳越王鏐為諸道兵馬元帥吳越王鏐遣判官皮光業字文通襄陽人曰休之子間道入貢梁主嘉之故有是命朝議皆言鏐之入貢利于市易不宜過以名器假之翰林學士竇夢徴棣州人藝麻以泣坐貶九月晉王還晉陽王性孝雖經營河北而數還晉陽省曹夫人嵗再三焉晉王克用正室劉氏無子寵姫曹氏生存朂克用封晉王劉氏封秦國夫人存朂立曹氏封晉國夫人晉拔貝州先是晉王使李存審攻貝州刺史張源德本晉人拒守存審圍之已而晉克衛磁洺相邢等州梁昭德節度使張筠棄相州走晉人復以相州𨽻天雄保義節度使閻寶以邢州降晉遂置安國軍閻寶字瓊美鄆州人滄州亦降至是源德被圍踰年欲降其衆不從共殺源德嬰城固守城中食盡乃請擐甲執兵而降晉將許之其衆三千人出降既釋甲圍而殺之盡殪于是河北皆入于晉惟黎陽為梁守考歐陽修五代史張源德列于死事傳傳云貝人聞晉已盡有河北城中食且盡勸源德出降源德不從遂見殺通鑑考以歐陽史所載為未盡然故從唐莊宗實録今仍依通鑑而已歐史所載並注于此冬十二月晉以張瓘為麟州注見前刺史張承業治家甚嚴有姪為盜殺販牛者承業斬之晉王以其姪瓘為麟州刺史承業謂曰汝本為賊慣為不法今若不悛死無日矣由是瓘所至不敢貪暴契丹稱帝改元契丹主阿保機自稱皇帝國人謂之天皇王以妻述律氏名平小字鄂爾多月按舒嚕舊作述律鄂爾多舊作理朵今並改為皇后遼史外戚表契丹外戚其先曰二舒敏氏曰巴哩曰伊蘇濟勒太祖娶舒嚕氏舒嚕本回鶻糯思之後大同初太宗入汴以外戚小漢賜姓名曰蕭翰從中國之俗由是巴哩伊蘇濟勒舒嚕三姓皆為蕭姓后有母有姑皆踞榻受其拜曰吾惟拜天不拜人也晉王方經營河北欲結契丹為援常以叔父事按巴堅以叔母事舒嚕后蘇按舒敏舊作審密巴哩舊作拔里伊濟勒舊作乙室已今改後仿此置百官改元神册舒嚕后勇決多權變按巴堅行兵御衆后常預其謀按巴堅嘗擊黨項留后守帳室韋乘虛合兵掠之后知之勒兵以待奮擊破之由是名震諸夷先是劉守光末年衰困遣參軍韓延徽字藏明幽州安次人求援于契丹按巴堅怒其不拜留之使牧馬于野延徽有智略頗知屬文舒嚕后曰延徽能守節不屈此今之賢者奈何辱以牧圉宜禮而用之按巴堅召與語悅之遂以為謀主延徽始教契丹建牙開府築城郭立市里以處漢人使各有配偶墾藝荒田由是漢人安業逃亡者少契丹威服諸國延徽有功焉頃之延徽逃奔晉陽晉王欲置之幕府掌書記王緘疾之延徽不自安求歸省母遂復入契丹按巴堅待之益厚及自稱帝遂以為相延徽寄書于晉主曰非不戀英主非不思故鄉所以不留正懼王緘之讒爾因以老母為托且延徽在此契冦丹必不南收故終同光之世契丹不深入為丁晉岐吳稱唐天祐十四年梁貞明三年蜀天漢丑元年漢乾亨元年是嵗嶺南稱帝凡六國五鎮春二月契丹陷新州唐置今宣化府保安州是晉師攻之不克契丹遂圍幽州先是晉新州軍亂殺其防禦使李存矩晉王之弟禆將盧文進字大用范陽人以衆奔契丹存矩在新州驕惰不治晉王使募山北徑兵及劉守光亡卒以助南討存矩自部送之以文進為禆將行者皆憚逺役存矩復不存恤至祁溝闕小校宫彥章因衆怨殺存矩擁文進還攻新州不克攻武州又不克遂亡奔契丹至是文進引契丹兵急攻新州刺史安金全棄城走文進以其將劉殷守之周德威合河東鎮定之兵攻之旬日不克按巴堅帥衆三十萬救之德威大敗奔歸契丹乘勝進圍幽州聲言有衆百萬氊車毳幕彌漫山澤初幽州北七百里有渝關下有渝水通海自關東北循海有道道狹處才數尺旁皆亂山髙峻不可越舊置八防禦軍募土兵守之田租皆供軍食嵗致繒纊以供衣每嵗早穫選清野堅壁以待契丹契丹至則閉壁不戰俟其去驍勇據險邀之契丹常失利走土兵皆自為田園力戰有功則賜勳加賞由是契丹不敢輕入寇及周德威鎮盧龍恃勇不修邊備遂失渝關之險契丹每芻牧于營平之間德威又忌幽州舊將有名者往往殺之吳王遺按巴堅以猛火油曰此油燃火得水愈熾可以攻城按巴堅大喜即選騎欲攻幽州舒嚕后哂之曰豈有試油而攻一國乎但以三千騎伏其旁掠其四野使城中無食不過數年城自困矣何必如此躁舉輕動萬一不勝為中國笑吾部落亦解體矣乃止至是為盧文進所引教之為土山地道以攻城城中禦之日殺千計而攻之不止河渝關即今山海關在永平府臨榆縣渝水今曰渝在臨榆縣東宋白曰渝關關城下有渝水入大海即此猛火油南蕃志曰出占城國蠻人水戰用之以焚敵州夏五月吳徐溫徙治升州徐知誥治升州城市府舍甚盛徐溫行部愛其繁富潤州司馬陳彥謙常州人勸溫徙鎮海軍治所于升州溫從之徙知誥為潤州團練使知誥求宣州溫不許知誥不樂宋齊邱曰三郎謂知訓驕縱敗在朝夕潤州去廣陵隔一水爾此天授也知誥悅即之官溫以彥謙為判官溫但舉大綱細務悉委彥謙江淮稱治秋八月劉巖稱越帝于廣州先是巖以吳越王鏐為國王而已獨為南平王南平為郡王表梁求封南越王不許巖謂僚屬曰今中國紛紛孰為天子安能梯航萬里逺事偽庭乎貢使遂絶至是巖稱皇帝國號越改元乾亨以趙光裔字煥業光違之弟前使嶺南楊洞潛字昭元始興人李殷衡德裕之孫同平章事用洞潛計立學校設選舉明年改國號曰漢晉師救幽州擊契丹敗之幽州圍解契丹之圍幽州也周德威使告急于晉王晉王方與梁相持河上欲分兵則兵少欲勿救恐失之謀于諸將獨李嗣源李存審閻寶勸王救之王乃命嗣源將兵先進李存審寶繼之及是嗣源等步騎七萬會于易州嗣源與存審謀以虜騎利平原不若自山中潛行趣幽州遇虜則據險拒之遂踰大防嶺即今大房山在順天府房山縣西北而東嗣源與從珂將三千騎為前鋒距幽州六十里與契丹遇力戰得進至山口契丹以萬騎遮其前將士失色嗣源以百餘騎先進免胄揚鞭胡語謂曰汝無故犯我疆場晉王命我將百萬衆直抵西樓五代史按巴堅以所居為上京起樓其間號曰西樓遼上京為臨潢府地在今巴林部東北滅汝種族因躍馬奮撾三入其陳斬酋長一人後軍齊進契丹兵郤晉兵始得出將至幽州契丹列陳待之存審命步兵陳于其後戒勿動先令嬴兵曵柴燃草而進煙塵蔽天鼓譟合戰乃趣後陳起乘之契丹大敗俘斬萬計嗣源等遂入幽州契丹以盧文進為盧龍節度使居平州嵗引契丹入北邊殺掠吏民盧龍巡屬為之殘弊冬十月晉王還晉陽王連嵗出征凡軍府政事一委監軍使張承業承業勸課農桑畜積金榖收市兵馬徴租行法不寬貴戚由是軍城肅清饋餉不乏王或時須錢蒱博及給賜伶人承業靳之王乃置酒庫中令其子繼岌為承業舞承業以𢃄馬贈之王指錢積謂曰和哥繼岌小名乏錢宜與一積𢃄馬未為厚也承業曰此錢大王所以養戰士也承業不敢以為私禮王不悅語侵之承業怒曰僕老敕使爾非為子孫計惜此庫錢所以佐王成霸業也不然王自取用之何問僕為不過財盡人散一無所成爾王怒顧李紹榮即元行欽晉王賜姓名索劍承業起挽王衣泣曰僕受先王顧託之命誓為國家誅汴賊若以惜庫物死于王手僕下見先王無愧矣曹太夫人聞之遽令召王王惶恐叩頭謝請承業痛飲以分其過承業不肯王入宫太夫人使人謝承業曰小兒忤特進已笞之矣明日與王俱至承業第謝之未幾承制授承業開府儀同三司左衛上將軍燕國公承業固辭不受但稱唐官終身十一月晉王如魏州晉王聞河氷合曰用兵數嵗限一水不得度今氷自合天贊我也亟如魏州十二月晉王襲梁楊劉鎮名在泰安府東阿縣北舊有城臨河津為梁晉交兵要地拔之梁主如洛陽尋還大梁晉王視河氷已堅引步騎稍度梁甲士三千戍楊劉城緣河數十里列柵相望晉王急攻皆陷之進攻楊劉城拔之先是梁租庸使趙巖言曰陛下踐阼以來尚未南郊議者以為無異藩侯請幸西都行郊禮敬翔諫曰自劉鄩失利公私困竭人心惴恐今展禮圜丘必行賞賚是慕虛名而受實弊也且勍敵近在河上乘輿豈宜輕動俟北方既平報本未晚不聽遂如洛陽閲車服飾宫闕郊祀有日聞楊劉失守訛言晉軍已入大梁扼汜水注見前矣梁主惶駭遂罷郊祀奔歸大梁戊晉岐吳稱唐天祐十五年梁貞明四寅年蜀光天元年是嵗凡六國五鎮春正月晉師掠梁濮鄆而還梁敬翔上疏曰國家連年喪師疆土日蹙陛下所與計事者皆左右近習豈能量敵國之勝負乎李亞子繼位以來攻城野戰無不親當矢石近者攻楊劉身負束薪為士卒先一鼓拔之陛下儒雅守文宴安自若使賀環輩敵之而望攘逐寇讐非臣所知也宜詢訪黎老别求異䇿不然憂未艾也疏奏趙張之徒言翔怨望梁主遂不用夏六月蜀主建殂太子宗衍立後名衍蜀主久疾昏瞀至是增劇以王宗弼為都指揮使召大臣告之曰太子仁弱朕不能違諸公之請而立之若其不堪可置别宫幸勿殺之但王氏子弟諸公擇而輔之徐妃兄弟止可優其祿位慎勿使之掌兵預政以全其宗族時內飛龍使唐文扆典兵預政欲去諸大臣遣人守宫門宗弼輩聞其謀排闥入言之召太子入侍疾貶文扆刺眉州以宋光嗣福州人為內樞密使初蜀主雖因唐制置樞密使専用士人至是蜀主以諸將多許州故人恐其不為幼主用故以光嗣代之自是宦者始用事矣蜀主殂太子即位尊徐賢妃為太后徐淑妃賢妃妹為太妃殺唐文扆吳副都統朱瑾殺都軍使徐知訓而自殺吳都軍使徐知訓驕倨淫暴狎侮吳王無復君臣之禮嘗與王為優自為參軍使王為蒼鶻又嘗與王泛舟王先起知訓以彈彈之又嘗侍宴使酒悖慢王懼而泣左右扶王登舟知訓逐之不及撾殺王親吏將佐無敢言者參軍蒼鶻胡三省注優人為優以一人襆頭衣緑謂之參軍以一人髽角弊衣如僮奴狀謂之蒼鶻副都統朱瑾為知訓所惡出為靜淮節度使軍在泗州瑾心恨之而外事知訓愈謹置酒延之中堂伏壯士于户內出妻拜之知訓答拜瑾以笏擊之踣地呼壯士出斬之提其首馳入府示吳王曰僕已為大王除害王懼走入內曰舅自為之楊行密先娶朱氏故隆演呼瑾為舅我不敢知子城使翟虔彭城人等闔府門勒兵討之瑾遂自剄徐知誥在潤州聞難用宋齊邱䇿即日濟江撫定軍府溫乃以知誥代執吳政宣諭使李儼貧困寓居海陵溫疑其與瑾通謀殺之梁人決河以限晉兵晉王攻之拔其四寨梁將謝彥章許州人攻楊劉決河水以限晉兵瀰浸數里晉王自泛舟測水謂諸將曰梁軍非有戰意但欲阻水以老我師當涉水攻之遂引親軍先涉諸軍隨之褰甲橫槍結陳而進彥章拒之稍郤鼓譟復進梁兵大敗河水為赤晉人遂陷濵河四寨秋七月蜀以王宗弼為巨鹿王蜀主不親政事內外遷除皆出于王宗弼宗弼納賄多私上下咨怨宋光嗣通敏善希合蜀主寵任之蜀由是遂衰蜀主又以宦者歐陽晃等為將軍皆干預政事晃患所居之隘于夜因風縱火焚西鄰軍營數百間明旦召匠廣其居蜀主亦不之問吳以徐知誥為淮南行軍副使輔政吳徐溫入朝于廣陵疑諸將皆預朱瑾之謀欲大行誅戮徐知誥嚴可求具陳知訓過惡溫怒稍解責知訓將佐不能匡救皆抵罪獨刁彥能字德明上蔡人屢有諫書溫賞之以知誥為行軍副使知諫知訓季弟權潤州團練事先是知訓與弟知誨皆不禮于知誥獨知諫以兄事之知訓嘗與知誥飲伏甲欲殺之知諫躡知誥足知誥乃遁去溫還金陵庶政皆決于知誥知誥事吳王盡恭接士大夫以謙御衆以寬約身以儉求賢才納規諌除姦猾杜請託于是士民歸心宿將悅服先是吳有丁口錢又計畝輸錢錢重物輕民甚苦之宋齊邱説知誥曰錢非耕桑所得今使民輸錢是教民棄本逐末也請蠲丁口錢餘稅悉輸榖帛紬絹匹直千錢者當稅三千胡三省注以直千錢之物當稅額之三千考綱目千作十今依通鑑改正或曰如此縣官嵗失錢億萬計齊邱曰安有民富而國家貧者邪知誥從之由是江淮間曠土益闢桑柘滿野國以富強知誥欲用齊邱而徐溫惡之知誥每夜引齊邱于水亭屏語常至夜分或居髙堂悉去屏幛獨留大爐以鐵筯畫灰為字隨以匙滅去之故其所謀人莫得而知也八月晉王大舉伐梁晉王謀大舉伐梁周德威將幽州步騎三萬李存審李嗣源及王處直遣將各將步騎萬人及諸部落奚契丹室韋吐谷渾皆以兵會之并河東魏博之兵大閲于魏州循河而上軍于麻家渡在曹州府濮州東北梁賀瓌謝彥章屯濮州北相持不戰晉王好自引輕騎迫敵營挑戰危窘者數四賴李紹榮力戰得免趙王鎔及王處直皆遣使致書曰元元之命繫于王本朝中興繫于王奈何自輕如此王笑謂使者曰定天下者非百戰何由得之安可但深居帷房以自肥乎一旦將出李存審扣馬泣諫曰大王當為天下自重先登陷陳存審之職也王為之攬轡而還他日伺存審不在䇿馬急出顧謂左右曰老子妨人戲乃以數百騎抵梁營謝彥章伏精兵五千圍王數十重王力戰僅得出會李存審救之梁兵乃退王始以存審之言為忠冬十二月晉王與梁軍戰于胡柳陂在濮州西南亦名黃栁陂周德威敗死晉王收兵復戰大破梁軍晉王欲趣大梁而梁軍扼其前堅壁不戰百餘日王進兵距梁軍十里而舍梁招討使賀瓌善將步兵排陳使謝彥章善將騎兵瓖惡其與己齊名一日治兵于野瓌指一髙地曰此可以立柵已而晉軍柵之環疑彥章陰以告晉瓌屢欲戰彥章請持重以老敵瓌益疑之因密譖于梁主誣以謀叛而殺之晉王聞之喜曰將帥不和梁亡無日矣王欲自將萬騎直趣大梁周德威曰梁軍尚全輕行徼利未見其福不從毁營而進衆號十萬瓌亦棄營而踵之至胡桞陂候者言梁兵至矣周德威曰賊倍道而來未有所舍我營柵已固守備有餘此以逸待勞之師也王宜按兵勿戰而德威以騎兵擾之使其營壘不得成樵㸑不暇給因其勞乏而乘之可一舉滅也王曰公何怯也即以親軍先出德威不得已從之謂其子曰吾無死所矣前遇梁軍而陳王軍居中鎮定軍居左幽州軍居右而輜重次右之西王帥銀槍都陷梁陳衝蕩擊斬往返十餘里梁馬軍都指揮使王彥章軍敗西走濮陽晉輜重望見梁旗幟驚潰入幽州軍幽州軍亦擾亂德威不能制父子皆戰死梁兵四集勢甚盛晉王據髙邱收散兵至日中軍復振陂中有土山賀瓌引兵據之晉王謂將士曰今日得此山者勝吾與汝曹奪之即引騎兵先登李從珂王建及許州人以步卒繼之梁兵紛紛而下遂奪其山日向晡賀瓌陳于山西晉兵望之有懼色諸將以諸軍未盡集不若斂兵還營詰朝復戰閻寶曰王彥章騎兵已入濮陽山下惟步卒向晚皆有歸志我乘髙趣下破之必矣王之成敗在此一戰若不決力取勝縱收餘衆北歸河朔非王有也李嗣昭亦以為言王建及擐甲橫槊而進曰王但登山觀臣為王破賊王愕然曰非公等言吾幾誤計嗣昭建及以騎兵大呼陷陳諸軍繼之梁軍大敗死亡者幾三萬人晉王還營聞德威父子死哭之慟曰是吾罪也梁敗卒走至大梁曰晉人至矣京城大恐梁主驅市人登城又欲奔洛陽遇夜而止敗卒至者不滿千傷夷逃散各歸鄉里月餘僅能成軍晉軍之敗也李嗣源不知王所之或曰北渡河矣嗣源遂乘水北渡及是晉王進攻濮陽拔之嗣源復來見王不悅曰公以吾為死邪嗣源頓首謝王以從珂有功但賜大鍾酒以罰之然自是待嗣源稍薄己晉岐稱唐天祐十六年梁貞明五年蜀主衍乾德卯元年吳宣王隆演武義元年是嵗凡六國五鎮春正月晉築德勝兩城在大名府州今州治即北城也其南城宋為澶州治後圯于水晉李存審于德勝渡名為河津之要南北夾河築兩城而守之謂之夾寨晉王以存審為內外蕃漢馬步總管三月晉以郭崇韜代州雁門人為中門副使孟知祥薦教練使郭崇韜能治劇王以為中門副使崇韜倜儻有智略臨事敢決王寵待日隆知祥稱疾辭其位崇韜専典機密夏四月吳王隆演建國改元先是吳徐溫自以權重而位卑説吳王隆演曰今大王與諸將皆為節度使不相臨制請建吳國稱帝而治王不許至是溫帥將吏藩鎮以請王復不許乃即吳國王位大赦改元建宗廟社稷置百官宫殿文物皆用天子禮以溫為大丞相都督中外諸軍事東海郡王知誥為左僕射參政事兼知內外諸軍王令謀為內樞使嚴可求為門下侍即駱知祥為中書侍即吳越擊吳戰于狼山在江南通州南寰宇記狼山與塔山軍山馬鞍山刀創山並在江海之際破之吳越王鏐遣其子副大使傅瓘擊吳吳遣將彭彥章廬陵人陳汾拒之戰于狼山吳船乘風而進傅瓘引舟避之既過復自後隨之吳回船與戰傅瓘使順風揚灰吳人不能開目及船舷相接傅瓘使散沙于己船而散豆于吳船豆為戰血所漬吳人踐之皆僵仆因縱火焚吳船吳兵大敗彥章戰甚力陳汾按兵不救彥章自殺吳人誅汾籍沒家資以其半賜彥章家稟其妻子終身梁攻晉德勝南城不克賀瓌攻德勝南城百道俱進以竹笮大索也聨艨艟十餘艘蒙以革設睥睨音避詣女墻之名設之船上以窺敵戰格彭排也以木牌蔽人從隙中出器以擊敵橫于河流以斷晉救兵晉王自引兵救之不能進遣善遊者入城守將言矢石將盡陷在頃刻晉王積金帛于軍門募能破艨艟者衆莫知為計李建及即王建及少為李罕之養子後復姓王故史或書王建及或書李建及請選效節敢死士得三百人披鎧操斧帥之乘舟而進將至流矢雨集建及使操斧者入艨艟間斧其竹笮又以木罌載新沃油燃火于上流縱之隨以巨艦鼓譟攻之艨艟流而下梁兵焚溺者殆半晉兵乃得渡瓌解圍走秋七月吳越攻吳常州吳人與戰破之吳越王鏐遣錢傅瓘將兵三萬攻吳常州徐溫帥諸將拒之戰于無錫漢縣今屬常州府會溫病熱不能治軍吳越攻中軍陳彥謙遷中軍旗鼓于左取貌類溫者擐甲胄號令軍事頃之溫病稍間出拒之時久旱草枯吳人乘風縱火吳越兵大敗殺其將何逢斬首萬級傅瓘遁去知誥請帥步卒二千襲取蘇州溫曰爾䇿固善然吾且求息兵未暇如汝言諸將亦以為吳越所恃者舟楫今大旱水涸此天亡之時宜盡步騎之勢一舉滅之溫歎曰天下離亂久矣民困已甚錢公亦未易可輕若連兵不解方為諸軍之憂今戰勝以懼之戢兵以懷之使兩地之民各安其業君臣髙枕豈不樂哉多殺何為遂引還八月梁以王瓚為招討使拒晉兵賀瓌卒梁主以王瓚為招討使瓚為治嚴令行禁止據晉人上遊之楊村地名在今大名府開州西南夾河築壘造浮橋饋運相繼晉副總管李存進亦造浮橋于德勝或曰浮梁須竹笮牛石困我皆無之何以能成存進以葦笮維巨艦繫于土山巨木踰月而成人服其智既而晉王與瓚戰于河南瓚先勝獲晉將石君立等尋復戰大敗失亡萬計晉王乘勝遂拔濮陽梁主召瓚還以戴思逺代之梁主聞石君立勇繫于獄而使人誘之君立曰我晉之敗將而為用于梁雖竭誠效死則信之人各有君何忍反為仇讐用哉梁主惜之殺晉主將而留君立吳與吳越連和吳徐溫遣使以吳王書歸無錫之俘于吳越吳越王鏐亦遣使請和于吳自是吳國休兵息民三十餘州民樂業者二十餘年冬十月晉廣德勝北城晉王發徒數萬廣德勝北城日與梁人爭大小百餘戰互有勝負左射軍使石敬瑭沙陀臬捩雞之子李嗣源之壻戰于河壖梁人斷其馬甲橫衝兵馬使劉知逺其先沙陀部人後居太原以所乘馬授之自乘斷甲馬徐行為殿梁人疑有伏不敢迫俱得免敬瑭以是親愛之胡三省曰石敬瑭劉知逺始此庚晉岐稱唐天祐十七年梁貞辰明六年是嵗凡六國四鎮春三月晉以李建及為代州刺史晉王自得魏州以李建及為都將建及為人忠壯所得賞賜悉分士卒與同甘苦故能得其死力所向立功同列疾之宦者韋令圖譖之曰建及以私財驟施此其志不小王罷建及軍職以為代州刺史建及由是怏怏而卒夏四月梁朱友謙取同州遂以河中降晉梁河中節度使冀王友謙襲取同州以其子令德為留後表求節鉞不許乃附于晉晉王以墨制除令德忠武節度使自是友謙遂歸于晉五月吳王隆演卒諡曰宣六月弟溥行密第四子立王重厚恭恪徐溫父子專政王未嘗有不平之意形于言色溫以是安之及建國稱制尤非所樂多沈飲鮮食遂成疾溫自金陵入朝議當為嗣者或曰蜀先主謂武侯嗣子不才君宜自取溫正色曰吾有意取之當在誅張皓之初豈至今日邪使楊氏無男有女亦當立之敢妄言者斬乃以王命迎丹陽公溥監國王卒溥即位閏月蜀殺其華陽唐縣今與成都縣並為成都府治尉張士喬蜀主作髙祖王建廟號原廟于萬里橋在成都府城南元和志蜀費禕使吳諸葛亮于此祖之禕曰萬里之行始于此橋因以名帥后妃百官用褻味作鼓吹祭之士喬上疏諌蜀主怒欲誅之太后不可乃流黎州士喬感憤赴水死蜀主奢縱無度日與太后太妃遊宴貴臣之家及遊近郡名山所費不可勝計教坊使嚴旭疆取士民女子納宫中纍遷刺史太后太妃各出教令賣官每一官闕數人納賂多者得之文思殿大學士韓昭以便侫得幸乞數州刺史賣之以營居第許之識者知蜀之將亡韓昭字德華長安人梁遣劉􅬸等討同州秋七月晉遣李存審救之李存審等至河中即日濟河軍于朝邑梁軍亦大集河中友謙諸子説友謙且歸欵于梁以退其師友謙曰昔晉王親赴吾急秉燭夜戰今方與梁相拒又命將星行分我資糧豈可負邪晉人分兵攻華州壞其外城李存審進逼劉鄩營鄩等悉衆出戰大敗宵遁追擊破之殺獲甚衆存審等移檄告諭關右引兵略地至下邽謁唐帝陵哭之而還初劉鄩與朱友謙為昏其討友謙也先移書諭以禍福待之月餘友謙不從然後進兵尹皓段凝因譖之于梁主及敗還梁主密令西都留守張宗奭鴆殺之八月蜀主北巡冬十一月遣兵侵岐不克而還蜀主下詔北巡遂發成都被金甲冠珠帽執弓失而行旌旗兵甲亘百餘里雒漢縣元省故城在今成都府漢州令段融上言不宜逺離都邑當委大臣征討不從十一月遣王宗夀本許州民家子王建以同姓録之為子將兵伐岐攻隴州岐王自將屯汧蜀兵食盡引還蜀主至利州泛江而下龍舟畫舸輝映江渚州縣供辦民始愁怨至閬州州民何康女色美將嫁蜀主取之賜其夫家帛百匹夫一慟而卒利州唐置今四川保寧府廣元縣是閬州亦唐置今保寧府閬中縣是辛晉岐稱唐天祐十八年梁龍德元年吳巳睿王楊溥順義元年是嵗凡六國四鎮春正月蜀主還成都廢其后髙氏蜀主之后髙氏無寵而嬖其妃韋氏韋氏者徐耕之孫也有殊色蜀主見而悅之太后因納于後宫蜀主不欲娶于母族託云韋昭度之孫纍加元妃髙后益見踈薄至是遂遣還家蜀主常列錦步障擊毬其中往往逺適而外人不知爇諸香晝夜不絶久而厭之更爇皂莢以亂其氣結繪為山及宫殿樓觀于其上或為風雨所敗則更以新者易之或樂飲繪山涉旬不下山前穿渠乘船夜歸令宮女秉蠟炬千餘居前船郤立照之水面如畫好為微行酒肆娼家無所不到晉得傳國寶考傳國寶世以為即秦玉璽自子嬰奉漢元后投階孫堅之得井中徐璆之進漢獻晉謝尚之送建康事俱具前兹據宋白續會要云秦玉璽歷代相傳以為神器隋平陳得之江都之難後歸竇建德建德敗入唐唐末遣楊涉送于梁後唐莊宗滅梁得之及清奉敗以寶隨身自作寶為火灼文字訛缺明宗得之隨身自焚寶遂亡失又有神璽者不知製自何代其文與秦璽同而玉色不及形製亦稍高大晉孝武時雍州刺史郤恢得之慕容永以送金陵候景之亂入于北齊歷周反隋隋文帝號為傳國璽又改曰受命寶及平江左得秦璽以其後出仍以北朝所傳神璽為上秦璽次之隋亡與秦璽俱歸于唐唐末不知所在宋氏之説如此是傳國寶晉始有二隋兼寶之至唐末而一送于梁一不知所在于是魏州僧人所藏以獻晉王者為一寶梁主瑱左右所竊以迎唐軍者又為一寶胡三省通鑑注備採宋説而李心傳又以秦璽自後漢末久已失之厥後永嘉之亂沒于劉石永和之後復歸于江左者乃晉璽也其文自左與秦璽自右不同太元之末得自西燕更涉六朝至于隋代者乃慕客燕璽也其方者六寸與秦璽四寸不同宋武北伐得之關中歷晉暨隋姚奉璽也其文隱起與秦璽深刻不同辨説甚詳今並節録于此蜀主吳王屢以書勸晉王稱帝晉王以示僚佐曰昔王太師謂王建亦嘗遺先王書勸以自帝一方先王語余云昔天子幸石門吾發兵誅賊臣當是之時威振天下吾若挾天子據關中自作九錫禪文誰能禁我顧吾家世忠孝立功帝室誓死不為耳他日當務以復唐社稷為心慎勿效此曹所為言猶在耳此議非所敢聞也因泣既而將佐及藩鎮勸進不已乃令有司市玉造法物會魏州僧獻傳國寶黃巢之破長安也魏州僧傳真之師得傳國寶藏之四十年至是傳真以為常玉將鬻之或識之曰傳國寶也乃詣行臺獻之將佐皆奉觴稱賀張承業聞之亟詣魏州諫曰吾王世世忠于唐室救其患難所以老奴三十餘年為王捃拾財賦召補兵馬誓滅逆賊復本朝宗社耳今河北甫定朱氏尚存而王遽即大位殊非從來征伐之意天下其誰不解體乎王何不先滅朱氏復列聖之深讐然後求唐後而立之南取吳西取蜀汛掃宇內合為一家當是之時雖使髙祖太宗復生誰敢居王上者讓之愈久則得之愈堅矣老奴之志無他但以受先王大恩欲為王立萬年之基耳王曰此非余所願奈羣下意何承業知不可止慟哭曰諸侯血戰本為唐家今王自取之誤老奴矣即歸晉陽邑邑成疾不復起二月成德將張文禮即王鎔養子王德明事見前弒其節度使趙王鎔而代之趙王鎔驕于富貴多事遊嬉時諸鎮俱弊于戰爭趙獨安樂鎔雍容自逸治府第圈沼極一時之盛又好左道練丹藥求長生盛飾館宇于西山即正定房山亦曰王母山在平山縣西北今房山縣之大房山古名大防别為一山每往遊之房山有王母祠漢武帝所建鎔與道士王若訥遊之使婦人維錦繡牽持而上每往逾月忘歸委其政于宦者李𢎞規石希蒙等希蒙元以諂諛得幸會鎔自西山宿鶻營莊在平山縣西將還府石希蒙止之李𢎞規諫曰今晉王身自暴露以親矢石而大王竭軍國之用為遊畋之資開城空宫彌月不還使一夫閉門不納從者大王將安歸乎鎔懼促駕希蒙固止之𢎞規怒遣親事軍將蘇漢衡率兵擐甲露刃詣帳前曰軍士勞矣願從王歸國𢎞規繼而進曰惑王者希蒙也請誅之以謝衆鎔不答𢎞規呼甲士斬希蒙首擲于鎔前鎔怒遽歸使其子昭祚及養子王德明族𢎞規漢衡收其黨與窮究反狀親軍皆懼德明因誘以為亂德明素蓄異志因親軍之懼而激之曰大王命我盡坑爾曹從命則不忍不然又獲罪奈何衆皆感泣相與謀之其中驍健者曰吾曹識王太保意今夕富貴矣夜半親軍千餘人踰垣而入鎔方與道士焚香受籙軍士斷其首而出因焚宫室盡滅王氏之族自王庭湊據成德傳至鎔凡四世五帥百年而滅德眀復姓名曰張文禮遣使告亂于晉因求節鉞晉王方置酒作樂聞之投杯悲泣欲討之僚佐以為方與梁爭不可更立敵宜且安之晉王不得已承制授文禮成德留後夏六月乙邜朔日食秋七月晉以蘇循為節度副使晉王既許藩鎮之請求唐舊臣朱友謙遣蘇循詣行臺循依友謙河中事具前循至魏州望府即拜謂之拜殿見王呼萬嵗舞蹈泣而稱臣翌日又獻筆三十枝謂之畫日筆唐制敕皆天子畫日王大喜即命循為河東節度副使張承業深惡之未幾循病死八月晉以符習趙州昭慶人為成德留後討張文禮張文禮忌趙故將多所誅滅都指揮使符習將趙兵萬人從晉王在德勝文禮請以他將代之習見晉王泣涕請留晉王曰吾與趙王同盟討賊義猶骨肉不意一旦禍生肘腋吾誠痛之汝茍不忘舊君能為之復讐乎吾以兵糧助汝習與部將三十餘人舉身投地慟哭曰大王念故使輔佐之勤許之復寃習等不敢煩霸府之兵願以所部徑前搏取凶豎以報王氏纍世之恩死不恨矣八月王以習為成德留後命閻寶史建塘將兵助之自邢洺而北文禮先病腹疽會晉兵拔趙州文禮驚懼而死其子處瑾與其黨韓正時悉力拒晉九月晉兵圍鎮州建塘中流矢卒晉王欲自分兵攻鎮州梁戴思遠聞之悉衆襲德勝北城晉王得梁降者知之乃命李嗣源伏兵于戚城李存審屯德勝先以騎兵誘之梁兵競進晉王以鐵騎三千奮擊梁兵大敗失亡二萬餘人戚城注見前冬十月義武節度使王處直為其假子都所囚初義武節度使王處直未有子得小兒劉雲郎妖人李應之得之以遺處直養為子名之曰都及壯便佞多詐處直愛之置新軍使典之處直有孽子郁無寵奔晉晉王克用以女妻之纍遷至新州團練使餘子皆幼處直以都為副大使欲以為嗣及晉王存朂討張文禮處直以鎮定唇齒恐鎮亡而定孤固諌以為方禦梁冦且宜赦文禮晉王答以文禮弒君義不可赦又潛引梁兵恐于易定亦不利處直患之乃潛遣人語郁使賂契丹令犯塞以解鎮州之圍郁素疾都冒繼其宗乃邀處直求為嗣處直許之軍府皆不欲召契丹都亦慮郁奪其處為嗣之位乃以新軍數百伏于府第大譟曰將士不欲以城召契丹請令公歸西第乃并其妻妾幽之盡殺其子孫及將佐之為腹心者以狀白晉王晉王因以都代處直處直憂憤而卒自唐末王處存帥義武兄弟相繼至是而滅十一月晉王自將討鎮州晉王使李存審李嗣源守德勝自將兵攻鎮州旬日不克張處瑾使韓正時突圍出趣定州求救晉兵追斬之十二月契丹寇幽州拔涿州進侵義武晉王救之王郁説契丹主曰鎮州美女如雲金帛如山天皇王速往則皆已物也不然為晉王所有矣契丹主以為然悉衆而南舒嚕后曰吾有西樓羊馬之富其樂不可勝窮也何必勞使逺出以乘危徼利乎吾聞晉王用兵天下莫敵脫有危敗悔之何及契丹主不聽十二月攻幽州李紹宏本宦者姓馬晉王賜名者嬰城自守契丹南圍涿州拔之進冦定州王都告急于晉晉王將親軍五千救之壬晉岐稱唐天祐十九年梁龍午德二年是嵗凡六國四鎮春正月晉王擊契丹大敗之晉王至新城後魏建在正定府無極縣西今名新城村候騎白契丹前鋒涉沙河即派水出正定府龍衆關外遷行唐新樂諸縣又東過定州與滋河合將士皆失色有亡去者斬之不能止諸將皆曰吾衆寡不敵又梁寇內侵宜且還師以救根本或請西入井陘避之晉王猶豫未決郭崇韜曰契丹本利貨財而來非能救鎮州之急難也王新破梁兵威振夷夏挫其前鋒遁走必矣李嗣昭亦曰強敵在前有進無退不可輕動以搖人心晉王乃自帥鐡騎五千先進至新城北半出桑林契丹見之驚走晉王分軍逐之獲契丹主之子契丹退保望都漢縣宋改望為慶今避堯母名仍曰望都屬保定府晉王至定州王都迎謁馬前請以愛女妻王子繼岌王引兵趣望都遇奚酋托輝舊作秃餧今改正五千騎為其所圍力戰不解李嗣昭引三百騎橫擊之虜退王乃得出因縱兵奮擊契丹大敗逐北至易州會大雪彌旬平地數尺契丹人馬死者相屬契丹主乃歸晉王引兵躡契丹隨其行止見其野宿之所布藁于地回環方正皆如編剪雖去無一枝亂者嘆曰虜用法嚴乃能如是中國所不及也契丹主責王郁縶之以歸自是不聽其謀梁襲晉魏州不克攻德勝北城二月晉王還魏州梁兵遁還李存審謂李嗣源曰梁人聞我在南兵少不攻德勝必襲魏州不若分軍備之遂分軍屯澶州戴思逺果悉衆趣魏州嗣源引兵先之遣兵挑戰思逺知有備乃西拔成安北齊縣今屬廣平府大掠而還又攻德勝北城重塹復壘斷其出入晝夜急攻存審悉力拒守晉王聞之自幽州赴之五日至魏州思逺燒營遁還晉師圍鎮州不克退保趙州夏四月晉李嗣昭戰死晉閻寶築壘以圍鎮州決滹沱水環之內外斷絶城中食盡遣五百餘人出求食寶縱其出欲伏兵取之其人遂攻長圍寶不為備俄數千人繼至遂壞長圍縱火攻營寶不能拒退保趙州晉王以李嗣昭為招討使代寶張處瑾遣兵千人迎糧于九門嗣昭設伏邀擊之殺獲殆盡鎮兵發矢中其腦嗣昭拔矢射之一發而殪是夕亦卒晉王聞之不御酒肉者纍日嗣昭遺命悉以澤潞兵授判官任圜京兆三原人使督諸軍攻鎮州號令如一鎮人不知嗣昭之死也嗣昭七子繼儔長而懦其弟繼韜囚之而自立晉王以用兵方殷不得已改昭義為安義以繼韜為留後秋八月梁取晉衛州晉衛州刺史李存儒本姓楊名婆兒以俳優得幸于晉王為刺史専事掊斂防城卒皆徴月課縱歸梁段凝張朗引兵夜襲之詰旦登城執存儒遂克衛州戴思逺又與凝攻陷淇門鎮名在衛輝府汲縣東北共城隋縣故在衛輝府之輝縣新鄉隋縣今屬衛輝府于是澶州之西相州之南皆為梁有晉人失軍儲三之一梁軍復振九月晉師克鎮州張處瑾等伏誅李嗣昭之死晉王以李存進為招討使軍于東垣渡滹沱河津濟處在今正定府正定縣南以故東垣城名立柵未就鎮兵奄至存進出鬬橋上殺鎮兵殆盡存進亦戰歿晉王以李存審代之鎮州食盡請降未報存審兵至城中將李再豐投縋以納晉兵執處瑾兄弟及其黨髙濛等送行臺趙人皆請而食之磔張文禮尸于市王鎔故侍者得鎔遺體晉王祭而葬之晉王以符習為成德節度使無後而未葬習當斬衰以葬之禮畢聽命既葬即詣行臺趙人請晉王兼領成德從之乃割相衛二州置義寧軍以習為節度使習辭曰魏傳霸府不可分也願得河南一鎮習自取之乃以為天平節度使冬十一月唐特進河東監軍使張承業卒劉友益曰承業之卒具官書唐著其乃心唐宦也曹太夫人詣其第為之行服如子姪之禮晉王聞之亦不食者纍日十二月晉以趙季良字德章濟隂人為魏州司録唐制諸州有司録司功諸曹所謂判司也魏州稅多逋負晉王以讓季良季良曰殿下何時當平河南王怒曰汝職在督稅何敢預我軍事季良對曰殿下方謀攻取而不愛百姓一旦百姓離心恐河北亦非殿下之有況河南乎王悅謝之自是重之每預謀議癸岐稱唐天祐二十年梁龍德三年書十月四月以後未唐莊宗李存朂同光元年是嵗梁亡晉稱唐凡五國四鎮春二月晉以豆盧革瓌弟瓚之子盧程故唐進士為行臺丞相晉王下教于四鎮河東魏博易定鎮冀判官選前朝士族欲以為相河東判官盧質字子微河南人為之首質固辭請以義武判官豆盧革河東判官盧程為之即拜行臺左右丞相以質為禮部尚書梁以錢鏐為吳越王鏐始建國儀衛名稱多以天子之制惟不改元置百官有丞相侍郎客省等使鏐有寵姬鄭氏其父犯法當死左右為之請鏐曰豈可以一婦人亂我法出其女而斬之鏐自少在軍中夜未嘗寐倦極則就圓木小枕或枕大鈴寐熟輒欹而名曰警枕置粉盤于臥內有所記則書盤中比老不倦或寢方甜外有白事者令侍女振紙即寤時彈銅丸于樓牆之外以警直更者嘗微行夜叩北城門吏不肯啓關曰雖大王來亦不可啓乃自他門入明日召吏厚賜之三月晉李繼韜以潞州叛降梁其將裴約史無里系據澤州不下李繼韜為留後終不自安幕僚魏琢牙將申蒙復從而間之曰晉朝無人終為梁所併耳弟繼逺亦勸之繼韜乃使繼逺詣大梁請降梁王大喜以繼韜為節度使安義舊將裴約戍澤州泣諭其衆曰余事故使踰二紀見其分財享士志滅仇讐不幸捐館柩猶未葬而郎君遽背君親吾寧死不能從也遂據州自守梁遣董璋史不詳何所人將兵攻之繼韜散財募士堯山人郭威威少孤依潞州人常氏往應募嘗殺人繫獄繼韜惜其才勇而逸之胡三省曰郭威事殆此夏四月晉王存朂稱皇帝于魏州國號唐是為後唐莊宗晉王築壇于魏州牙城之南四月登壇祭告遂即帝位國號大唐尊母曹氏為皇大后嫡母劉氏為皇太妃初太妃無子性不妬忌太后亦謙退相得甚歡及册太妃詣太后宫賀有喜色太后忸怩不自安太妃曰願吾兒享國久長吾輩獲沒于地園陵有主餘何足言因相向歔欷唐以豆盧革盧程同平章事郭崇韜張居翰故唐宦者為樞密使徐無黨曰密使唐故事以宦者為之至此參用士人與宰相權任均矣革程皆輕淺無他能唐主特以其衣冠之緒霸府元僚故用之已而程以私事干興唐府府吏不能應鞭吏背少尹任團唐主姊壻也詣程訴之程曰何等蟲豸欲倚婦力祁團訴于唐主唐主曰朕誤相此癡物乃貶程右庶子任團圜之弟李紹宏自幽州召還崇韜惡其位在己上乃薦居翰而以紹宏為宣徽使唐制宣徽使在樞密使之下紹宏恨之居翰和謹畏事軍國機政皆崇韜掌之支度務使孔謙魏州人先為州孔目勤敏多計數善治簿書唐主入魏時以為支度務使自謂應為租庸使衆議以謙人微地寒故崇韜薦張憲字允中晉陽人以謙副之謙亦不悅唐建東西京及北都以魏州為興唐府建東京又于太原府建西京又以鎮州為真定府建北都時唐國所有凡十三節度五十州閏月唐立宗廟于晉陽唐主追尊曾祖執宜曰懿祖昭烈皇帝祖國昌曰獻祖文皇帝考晉王曰太祖武皇帝立宗廟于晉陽以髙祖太宗懿宗昭宗洎懿祖以下為七室唐遣李嗣源襲梁鄆州取之以嗣源為節度使契丹屢寇唐幽州衛州為梁所取潞州內叛人情岌岌以為梁未可取唐主患之會鄆州將盧順密奔唐言曰鄆州守兵不滿千人可襲取也郭崇韜等皆以為不可唐主密召李嗣源謀之嗣源自胡桞有渡河之慙常欲立竒功以補過對曰今用兵嵗久生民疲弊茍非出奇取勝大功何由可成臣願獨當此役必有以報唐主悅遣嗣源將精兵五千趣鄆州日暮隂雨道黑將士皆不欲進髙行周曰此天贊我也彼必無備夜渡河至城下鄆人不知李從珂先登殺守卒啓關納外兵進攻牙城拔之嗣源禁焚掠撫吏民唐主大喜曰總管真奇才吾事集矣即以為天平節度使梁主大懼遣使詰讓諸將段凝王彥章等趣令進戰五月梁遣招討使王彥章攻唐德勝南城拔之進攻楊劉六月唐主救之梁兵退秋七月彥章罷敬翔知梁室已危以繩納靴中入見梁主曰先帝取天下不以臣為不肖所謀無不用今敵勢益強而陛下棄忽臣言臣身無用不如死引繩將自縊梁主止之問所欲言翔曰事急矣非用王彥章為大將不可救也梁主從之以彥章為招討使仍以段凝為副唐主聞之自將親軍屯澶州命朱守殷守德勝戒之曰王鐡槍勇決宜謹備之守殷晉王幼時所役蒼頭也梁主召王彥章問以破敵之期彥章對曰三日左右皆失笑彥章出兩日馳至滑州置酒大會陰遣人具舟于楊村夜命甲士六百皆持巨斧載冶者具鞴蒲拜反韋裳也鼓以吹火炭乘流而下會飲尚未散彥章陽起更衣引精兵數千循河南岸趨德勝天微雨朱守殷不為備舟中兵舉鎖燒斷之因以巨斧斬浮橋而彥章引兵急擊南城破之適三日矣守殷救之不及彥章進攻諸塞皆拔之聲勢大振唐主遣宦者焦彥賔急趣楊劉與鎮使李周字通理內邱人固守唐主命守殷棄北城撤屋為城載兵械浮河東下助揚劉守備王彥章亦撤南城屋材浮河東丅各行一岸每遇灣曲輒于中流交鬬一日百戰互有勝負比及楊劉殆亡士卒之半彥章以十萬衆攻楊劉城垂陷者數四李周悉力拒之與士卒同甘苦彥章不能克退屯城南唐主引兵救之六月至楊劉梁兵塹壘不可入唐主問計于郭崇韜對曰請築壘于博州東岸以固河津既得以接應東平時李嗣源在鄆州河北聲問不通又可以分賊兵勢但慮彥章薄我城不能就願募死士日挑戰以綴之旬日不東則城成矣唐主以為然會梁將延孝密請降于嗣源延孝者太原胡人有罪奔梁嗣源遣押牙范延光送延孝蠟書詣唐主延光因言于唐主請築墅馬家口以通鄆州之路唐主從之范延光臨漳人乃遣崇韜將萬人夜發倍道趣博州至馬家口渡河築城晝夜不息唐主在楊劉與梁人晝夜苦戰崇韜築城六日彥章將兵數萬至急攻新城時板築僅畢未有守備崇韜慰諭士卒以身先之四靣拒戰唐主引大軍救之彥章退保鄒家口鄆州奏報始通七月唐主引兵南彥章等復趣楊劉李紹榮直抵梁營擒其斥侯又以火筏焚其連艦彥章等走保楊村唐兵追擊之梁兵前後死者且萬人楊劉圍解城中無食已三日矣彥章疾趙巖張漢傑亂政謂所親曰待我成功還當盡誅姦臣以謝天下趙張聞之私相謂曰我輩寧死于沙陀不可為彥章所殺相與協力傾之假凝素疾彥章而諂附趙張百方沮撓之惟恐其有功每捷奏至趙張悉歸功于凝由是彥章功竟無成梁主猶恐彥章成功難制徵還大梁八月梁取唐澤州裴約死之裴約遣間使告急唐主曰吾兄不幸乃生梟獍裴約獨能知逆順顧謂指揮使李紹斌曰澤州彈丸之地朕無所用卿為我取裴約以來紹斌至城已陷約死唐主深惜之梁以段凝為招討使遣王彥章張漢傑攻鄆州梁主遣段凝監軍河上敬翔李振屢請罷之梁主曰凝未有過振曰俟其有過則社稷危矣至是凝厚賂趙張求為招討使翔振力爭不從于是宿將憤怒士卒亦不服梁主又命王彥章將保鑾騎士萬人屯兖鄆之境謀復鄆州仍以張漢傑監其軍梁復決河以限唐兵謝彥章決河在揚劉今山東地段凝決河在酸棗今河南地揚劉之大小酸棗之決大綱目但載楊劉而不載酸棗今依五代史及通鑑補輯段凝以唐兵日逼乃自酸棗決河東注曹濮及鄆以隔絶唐軍謂之護駕水後決口日大屢為曹濮患唐命軍婁繼英塞之未幾復壞胡渭曰宋橫隴決河蓋由此東注梁將康延孝奔唐梁主引兵屯朝城本漢東武陽唐改朝城今屬曹州府康延孝來奔唐主解錦袍玉帶賜之以為招討指揮使問以梁事對曰梁朝地不為狹兵不為少然主既暗懦趙張擅權內結宫掖外納貨賂段凝智勇俱無専率斂行伍以奉權貴梁主不能専任將帥常以近臣監之進止可否動為所制近又聞欲數道出兵令董璋起太原霍彥威寇鎮定王彥章攻鄆州段凝當陛下決以十月大舉臣竊觀梁兵聚則不少分則不多願陛下養勇蓄力以待其分兵帥精騎五千自鄆州直抵大梁旬月之間天下定矣唐主大悅九月蜀主宴羣臣于宣華苑蜀主于重陽宴羣臣以宣華苑酒甜嘉王宗夀乘間極言社稷將危流涕不已韓昭曰嘉王好酒悲因諧笑而罷蜀主以韓昭潘在迎顧在珣等為狎客陪侍逰宴與宮女雜坐或為鮑歌相唱和褻慢無所不至樞密使宋光嗣等專斷國事恣為威虎務徇無蜀主之欲以盜其權宰相王錯庾傳素等各保寵祿敢規正潘在迎每勸蜀主誅諫者無使謗國嘉州司馬劉贄獻陳後主三閣圖並作歌以諷賢良方正蒲禹卿對䇿語極切直蜀主不能用人王鍇字鰭祥咸陽人蒲禹卿成都冬十月辛未朔日食唐主救鄆州梁師敗績王彥章死之唐主入大梁梁主瑱自殺唐遂滅梁梁自篡唐至亡几二主合二十六年唐主聞梁人欲大舉數道入寇召諸將議之李紹宏等皆以為鄆州難守請以易衛州及黎陽于梁與之約和休兵息民更圖後舉唐主不悅曰如此吾無葬地矣乃獨召郭崇韜問之對曰陛下不櫛沐不解甲十五餘年欲雪國家讐恥今已正尊號始得鄆州尺寸之地不能守而棄之臣恐將士解體將來食盡衆散雖畫河為境誰為陛下守之臣嘗細詢康延孝以河南之事度已料彼日夜思之成敗之機決在今嵗梁今悉以精兵授段凝決河自固恃此不復為備凝非將材不足畏降者皆言大梁無兵陛下若留兵守魏固保楊劉自以精兵與鄆州合勢長驅入汴偽主授首則諸將自降矣不然今秋不登軍糧將盡大功何由可成諺曰當道築室三年不成帝王應運必有天命在陛下勿疑耳唐主曰此正合朕心丈夫得則為王失則為虜我行決矣會王彥章將攻鄆州李嗣源遣李從珂逆戰敗其前鋒彥章退保中都注見前捷奏至唐主喜曰鄆州告捷足壯吾氣命將士悉遣其家歸興唐亦遣夫人劉氏皇子繼岌歸與之訣曰事之成敗在此一決若其不濟當聚吾家于魏宫而焚之乃濟河至鄆州中夜進軍以李嗣源為前鋒遇梁兵一戰敗之進至中都圍之梁兵潰追擊殺之彥章走將軍李紹奇追之彥章重傷馬躓遂擒之並擒張漢傑等二百餘人斬首數千級唐主惜彥章之材欲降之彥章曰余本匹夫蒙梁恩位至上將與皇帝交戰十五年今兵敗力窮死自其分豈有朝為梁將暮為唐臣此我所不為也于是諸將稱賀唐主舉酒屬嗣源曰今日之功公與崇韜之力也嚮從紹宏輩語大事去矣謂諸將曰嚮所患惟彥章今已就擒是天意滅梁也段凝猶在河上何向而可康延孝固請亟取大梁嗣源曰兵貴神速今彥章就擒段凝必未之知就使知之即發救兵直路則阻決河須自白馬南渡舟楫亦難猝辦此去大梁至近前無山險方陳兼程信宿可至段凝未離河上友貞已為吾擒矣延孝之言是也請陛下以大軍徐進臣願以千騎前驅唐主從之令下諸軍踴躍嗣源是夕遂行明日唐主發中都以王彥章終不為用斬之越二日至曹州梁守將降梁主聞彥章就擒唐軍且至日夜涕泣不知所為置傳國寶于卧內忽失之已為左右竊之迎唐軍矣乃謂指揮使皇甫麟曰李氏吾世讐理難降首降讀如字言難低頭為之下也不可俟彼刀鋸吾不能自裁卿可斷吾首麟泣曰臣為陛下揮劒死唐軍則可矣不敢奉此詔梁主曰卿欲賣我邪麟將自剄梁主持之曰與卿俱死麟遂弒梁主因自剄梁主為人溫恭儉約無荒淫之失但寵信趙張使擅威福疏棄敬李舊臣不用其言以至于亡李嗣源軍行五日至大梁王瓚開門出降是日唐主亦至入自梁門嗣源迎賀唐主喜不自勝手引嗣源衣而頭觸之曰吾有天下卿父子功也天下與爾共之李振謂敬翔曰有詔洗滌吾輩相與朝新君乎翔曰吾二人為梁宰相君昏不能諌國亡不能救新君若問將何辭以對是夕未曙或報翔曰李太保已入朝矣翔嘆曰李振謬為丈夫國亡君死何靣目入建國門乎乃縊而死趙巖奔許州溫昭圖斬之昭圖即溫韜降梁更名為匡國節度既殺趙巖乃復名韜詔漆朱友貞首函之藏于大社梁段凝降唐段凝入援以杜晏球字瑩之洛陽人本姓王為杜氏養子故從姓杜為前鋒至封邱遇李從珂晏球先降凝衆五萬亦降唐主勞之凝出入公卿問揚揚自得無愧色梁舊臣見者皆欲齕其靣抉其心唐貶梁宰相鄭珏綮諸孫以下十一人以其世受唐恩而仕梁貴顯也先是唐兵將入汴梁主友貞召羣臣問計鄧珏曰臣有一䇿不知陛下能行否梁主問䇿如何珏曰願得陛下傳國寶馳入唐營以緩其行而待救兵之至梁主曰事急矣寶固不足恃但此策可竟了否珏俯首久之曰但恐未了左右皆縮頭而笑及唐主至珏率百官迎謂道左至是貶來州司户敬翔李振趙巖張漢傑等伏誅夷其族敬翔既死段凝杜晏球上言偽梁要人趙巖張漢傑等竊弄威福殘蠧羣生不可不誅詔敬翔李振首佐朱溫共傾唐祚可並族誅凝尋賜姓名李紹欽晏球亦賜姓名李紹虔唐毁梁宗廟追廢朱友貞為庶人梁諸藩鎮入朝于唐者皆復其任宋州節度使袁象先首來入朝輦珍貨數十萬遍賂劉夫人及權貴伶官宦者中外爭譽之恩寵隆異唐以郭崇韜守侍中崇韜權兼內外謀猷規益竭忠無隱頗亦薦引人物豆盧草受成而已無所裁正梁河南尹張宗奭入朝于唐宗奭來朝復名全義唐主欲發朱溫墓斫棺焚尸全義言朱溫雖國之深讐然其人已死刑無可加屠滅其家足以為報乞免焚斫以存聖恩唐主從之但鏟其闕室削封樹而已楚王殷遣使入貢于唐殷遣其子希範字實規殷第四子入見納行營都統印上本道將吏籍吳遣使如唐唐遣使以滅梁告吳徐溫尤嚴可求曰公前沮吾計今將奈何唐之伐梁遣使徴兵下吳溫欲持兩端遣兵循海助其勝者可求不可乃止可求笑曰聞唐主始得中原志氣驕滿御下無法不出數年將有內變吾但當卑辭厚禮保境安民以待之耳唐使稱詔吳人不受唐主易其書用敵國之禮吳人復書稱大吳國主辭禮如箋表吳貶鍾泰章為饒州刺史吳人有告夀州團練使鍾泰章侵市官馬者徐知誥遣王稔代之以泰章為饒州刺史徐溫召至金陵使陳彥謙詰之者三皆不對或問泰章何以不自辨泰章曰吾在夀州去淮數里步騎五千茍有他志豈王稔單騎能代之乎我義不負國雖黜為縣令亦行況刺史乎何為自辨以彰朝廷之失知誥請收泰章治罪徐溫曰吾非泰章已死于張皓之手今日富貴安可負之命知誥為子景通知誥長子初名景又更名璟娶其女以解之時張崇在廬冮貪暴不法廬江民訟縣令受時知誥遣侍御史知雜事楊延式往按之廷式曰雜端推事其體至重職業不可不行知誥曰何如廷式曰械禁張崇使吏如升州簿責都統知誥曰何至是廷式曰縣今微官張崇使之取民財轉獻都統耳豈可捨大而詰小乎知誥以是重之楊廷式字憲臣泉州晉江人雜端唐侍御史以久次者一人知雜事謂之雜端彗星見彗出輿鬼輿鬼五星奉雍川分漢書地理志以巴蜀諸郡皆屬秦地為東升輿鬼之分野鶉首之次長丈餘蜀司天監言國有大災蜀主詔于玉局化道書後漢永夀初李老君與張道陵至此説經有局腳玉牀自地而出既去牀隱地成穴後遂名曰正局化觀今成都府城北有王局宋蘇軾領提舉即此設道場右補闕張雲唐安人上疏以為百姓怨氣上徹于天故彗星見此乃亡國之徴非行禳可弭蜀主怒流雲黎州道卒十一月唐以李紹欽即段凝為泰寧節度使紹欽因伶人景進納貨于宫掖故有是命唐主幼善音律或時自傅粉墨與優人共戲于庭以悅劉夫人優名謂之李天下嘗因為優自呼曰李天下李天下優人敬新磨遽前批其頰唐主失色新磨徐曰理天下者只有一人尚誰呼邪唐主悅厚賜之嘗畋中牟踐民稼中牟令當馬前諫曰陛下為民父母奈何毀其所食使轉死溝壑乎唐主怒叱夫將殺之新磨追禽至馬前責之曰汝為縣令獨不知吾天子好獵邪奈何縱民耕種以妨吾天子之馳驅乎汝罪當死因請行刑唐主笑而釋之諸伶出入宫掖侮弄縉紳羣臣憤嫉莫敢出氣或有反相附託以希恩澤者四海藩鎮爭以賄賂結之其尤蠹政害人者景進為之首進好采閭門鄙細事以聞唐主亦欲知外間事遂委進以耳目進奏事嘗屏左右問之由是進得施其讒恩干豫政事自將相大臣皆憚之唐朱友謙溫韜入朝友謙入朝唐主與之宴寵錫無算賜姓名曰李繼麟康延孝亦賜姓名李紹琛賜溫韜姓名曰李紹沖多齎金帛賂劉夫人及權貴伶官旬日復遣還鎮郭崇韜曰溫韜發唐山陵殆遍其罪與朱溫相埓耳何得復居方鎮天下義士其謂我何唐主曰入汴之初已赦其罪竟遣之唐省文武官申書奏以國用未充請量留三省寺監官餘並停詔從之人頗咨怨唐以趙光胤光逢之弟韋説宙弟岫之子同平章事豆盧革判租庸兼鹽鐡轉運使議者以郭崇韜不能知朝廷典故當用前朝名家以佐之或薦禮部尚書薛廷圭逢之子太子少保李琪字台秀敦煌人耆宿有文崇韜奏廷圭浮華無相業琪傾險無士風尚書左丞趙光胤廉潔方正有宰相器豆盧革薦禮部侍郎韋説諳練朝章故有是命光胤性輕率喜自矜説謹重守常而已孔謙畏張憲公正欲専使務言于郭崇韜奏為東京副留守崇韜復奏以豆盧革判租庸兼諸道鹽鐵轉運使謙彌失望唐荆南節度使高季興入朝髙季昌避唐朝諱更名季興欲自入朝梁震曰唐有吞天下之志嚴兵守險猶恐不自保況數千里入朝乎且公朱氏舊將安知彼不以仇敵相遇矣季興不從遂入朝唐主待之甚厚從容問曰朕欲用兵于吳蜀二國何先季興以蜀道險難取乃對曰吳地薄民貧克之無益不如先克蜀蜀土富饒主荒民怨伐之必克克蜀之後順流而下取吳如反掌耳唐主曰善季興尋還鎮季興在唐唐主左右伶宦求貨無厭季興忿之唐主欲留季興郭崇韜曰陛下新得天下諸臣不過遣子弟將佐入貢惟髙季興身自入朝當褒賞以勸來者乃羈留不遣棄信虧義沮四海之心非計也乃遣之季興倍道而去至江陵握梁震乎曰不用君言幾不免虎口又謂將佐曰新朝百戰方得河南乃對功臣舉手云吾于十指上得天下矜伐如此則他人皆無功矣其誰不解體又荒于禽色何能長久吾無憂矣乃繕城積粟招納梁舊兵為戰守之備唐復以長安為西京京兆尹十二月唐遷都洛陽從張全義之請也廢北都為成德軍梁東京仍為宣武軍以永州為歸德唐復行舊律令御史臺奏朱溫刪改本朝律令格式悉收舊本焚之聞定州敕庫所藏具在乞下本道録進從之唐李繼韜入朝赦之尋伏誅李繼韜憂懼欲走契丹會有詔徴詣闕繼韜母楊氏善蓄財家資百萬乃與偕行齎銀四十萬兩他貨稱是大布賂遺伶官爭為之言曰繼韜初無邪謀為姦人所惑耳嗣昭親賢不可無後楊氏入宫泣請又求哀于劉夫人唐主釋之寵待如故繼韜不自安潛遺弟繼逺書教軍士縱火冀復遣已撫安之事泄被誅並斬繼逺吳復遣使如唐吳復遣盧蘋洛陽人使唐嚴可求豫料所問教蘋應對既至皆如所料蘋還言唐主荒于遊畋嗇財拒諌內外皆怨御批厯代通鑑輯覽卷六十六

  text: 欽定四庫全書御批歷代通鑑輯覽卷四十七隋起文帝開皇元年辛丑至恭帝侗皇泰二年己卯凡四帝三世共三十九年髙祖文皇帝
  hash: sha256:bb3d6b1a9c64814c4371e0012b7f09256abf14a72ea991bef08ba8af39e3e1b4

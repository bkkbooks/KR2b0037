front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷二十四後漢孝安皇帝壬戌延光元年夏四月雨雹京師及郡國凡二十一河西雹大者如斗遼東都尉龎奮承偽詔斬元菟太守姚光徴抵罪
  hash: sha256:05f405c4dbe217102fed84fadcde2baf9cbdd181168363770714aace9308c9e3

front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷四十九隋煬帝戊寅大業十四年恭帝侑義寧二年已考是年楚林士𢎞魏定楊等建元俱見前恭帝侗唐髙祖等建元俱載三月以後兹不具列春正月唐王淵遣世子建成秦公世民救東都以齊公元吉為太原道行軍元帥三月宇文化及弒帝于江都立秦王浩
  hash: sha256:a498eb717b8942a81ee1ca55de4ac817ab759d3c26873201ba1a3fd0ba0be737

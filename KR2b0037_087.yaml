  text: 欽定四庫全書御批歴代通鑑輯覽卷八十八宋孝宗皇帝
  hash: sha256:a64363d2f2a05f8c852a4fd41c7a70547b88e2009e8f0143ade762cf74cbbae6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_087-1a, image: WYG0338/WYG0338-0541a.png}
body:
  text: 帝名眘本名伯琮更名瑗冬更名瑋後定名眘太祖六世孫子偁之子太祖少子秦王徳芳生英國公惟憲惟憲生新興侯從郁從郁生葉隆侯世将世將生變國公令譮令譮生子偁是為秀王母張氏髙宗建炎元年生帝于秀州子偁官嘉丞生帝于杉青牐之官舍紅光滿室如日正中杉青牐今曰杉青堰在嘉興府秀水縣東北高宗無子選育宫中事具前後遂立為皇太子受内禪即位癸未隆興元年金大定三年春正月以史浩為尚書右僕射同平章事兼樞密使先是詔議應敵定論洪遵字景嚴皓仲子金安節字彦亭休寧人唐文若字立夫眉山人庚之子相繼論列宰執獨無奏帝以問浩浩奏先為備禦是謂良規儻聴淺謀之士興不教之師㓂去則論賞以邀功㓂至則歛兵而遁跡謂之恢復得乎既而浩獻䇿以布衣李信甫為户部員外郎齎蠟書間道往中原招豪傑之據有州郡者許以封王世襲其所措置止此而已考此條續綱目係于張浚遣邵宏淵等出師條下今依宋史史浩本傳改輯于此以張浚為樞密使都督江淮軍馬開府建康先是浚薦陳俊卿為宣撫判官帝召俊卿及浚子栻字敬夫赴行在浚附奏請帝臨幸建康以動中原之心用師淮壖以為呉璘聲援帝見俊卿問浚動静飲食顔貎曰朕倚魏公如長城不容浮言揺奪遂有是命没開府江淮參佐皆一時之選栻以少年内贊密謀外參庻務其所綜畫幕府諸人皆自以為不及及入奏事因進言曰陛下上念祖宗之讐恥下閔中原之塗炭惕然于中思有以振之臣謂此心之發即天理之所存也願益加省察而稽古親賢以自輔使無少息則今日之功可以立成帝大異之三月金人以書徵海泗唐鄧商州之地及嵗幣先是金人十萬衆屯河南聲言規取兩淮及是赫舎哩志寧以書抵張浚欲凡事一依皇統以來故約不然請會兵相見且遣富察都木舊作蒲察徒穆今改後仿此逹周仁舊作大周仁今改屯虹縣唐縣今屬江南鳯陽府蕭琦屯靈壁本零壁鎮宋置縣改靈壁今属鳯陽府積粮修城為南攻計以辛次膺字起季萊州人同知樞密院事初次膺為右正言力諫和議為秦檜所怒流落者二十年帝即位召為中丞次膺毎以名實為言多所裨益帝呼其官而不名若成閔之貪饕湯思退之朋比葉義問之奸妄皆被論罷毎章疏一出天下韙之渡江以後直言之臣稱次膺為首未幾逐參知政事夏四月張浚使李顯忠邵宏淵分道出師帝鋭意恢復張浚入見乞即日降詔幸建康帝以問史浩浩力陳不可及退詰浚曰帝王之兵當出萬全豈可嘗試以圖徺倖復辨論于殿上浚因奏浩意不可回恐失機㑹且謂金人至秋必為邉患當及其未發攻之帝然其言乃議出師渡淮三省樞密院不預聞㑹顯忠宏淵亦獻搗虹縣靈壁之䇿帝命先圖二城浚乃遣顯忠出濠州趨靈壁宏淵出泗州趨虹縣五月史浩免省中忽見邵宏淵出兵状始知不由三省徑檄諸将浩語陳康伯曰吾等俱兼右府而出兵不預聞焉用相為哉不去何待入對因奏陳康伯欲納歸附人臣恐他日必為子孫憂張浚鋭意出師若一失之後恐陛下不得復望中原因力丐免侍御史王十朋字龜林温州樂清人論浩懐奸誤國等八罪遂罷浩知紹興府王十朋再疏謂紹興密邇行都浩嘗為属吏贓穢彰聞何顔復見其吏民遂改與祠李顯忠復靈壁遂㑹邵宏淵復虹縣金将士多降顯忠自濠梁渡淮至陡溝在鳯陽府靈壁縣南澮水之支流也金右翼都統蕭琦用拐子馬來拒顯忠與之力戰遂復靈壁顯忠入城宣布徳意不戮一人于是中原歸附者接踵宏淵圍虹久不下顯忠遣靈壁降卒開諭禍福金守将富察都木達周仁皆出降宏淵恥功不自己出㑹有降千户訴宏淵之卒奪其佩刀顯忠立斬之由是二将不協未幾蕭琦復降于顯忠張浚渡江李顯忠大敗金人復宿州顯忠兵傅宿州城金人來拒顯忠大敗其衆追奔二十餘里宏淵至謂顯忠曰招撫真闗西将軍也顯忠閉營休士為攻城計宏淵等不從顯忠引麾下将上城開北門不逾時㧞其城宏淵等殿後趣之始渡濠登城城中巷戰又擒斬數千人遂復宿州中原震動㨗聞帝手書勞張浚曰近日邉報中外鼓舞十年來無此克㨗既而宏淵欲發倉庫犒卒顯忠不可移軍出城止以現錢犒士士皆不悦詔以顯忠為淮南京東河北招討使宏淵副之帝率羣臣詣徳夀宫上夀天申節也嵗以為常李顯忠邵宏淵之師潰于符離注見前金赫舎哩志寕自睢陽引兵攻宿州李顯忠聞志寕軍止萬人心易之顯忠曰當令十人執一人日與降人置酒髙㑹考續綱目于此下作顯忠擊却之今採金史赫舍哩志寕傳改輯㑹金博索舊作孛撒今改後仿此復自汴率步騎十萬來薄城下列大陣顯忠謂宏淵併力夾攻宏淵按兵不動顯忠獨以所部力戰統志李福紇領李保各以所部退避顯忠皆斬以徇俄而金兵大至顯忠用克敵弓射卻之宏淵顧衆曰當此盛夏揺扇于清涼且猶不堪況烈日被甲苦戰乎人心遂揺無復鬬志諸将各遁中軍統制周宏鳴鼔大譟揚言敵兵至與邵世雍劉侁各以所部兵遁繼而統制左師淵統領李彦甫亦遁顯忠移軍入城統制張訓通張師顔荔澤張淵等以顯忠宏淵不協皆遁去金人乗虚復來攻顯忠竭力捍禦斬首二千餘城東北角金兵已上顯忠取軍所執斧斫之始退却顯忠嘆曰若使諸軍相與犄角自城外掩擊則敵兵可盡敵帥可擒河南之城指日可復矣宏淵又言金添生兵二十萬來倘我兵不返恐不測生變顯忠知宏淵無固志勢不可孤立嘆曰天未欲平中原邪何沮撓如此遂夜引還至符離師大潰是舉所䘮軍資器械殆盡幸而金不復南時張浚在盱眙顯忠往見浚納印待罪周密齊東野語近見四朝史張浚傳云符離軍潰浚方鼻息如雷此是心學葢取萊公紀事中意據密之説亦以四朝史為未可信也而後人舉此以詆浚者紛紛不一考符離師潰浚時方在盱眙相去幾四百里鼻息如雷之説何從附會即此四朝史之妄不辨可知矣今附駁于此浚以劉寶為鎮江諸軍都統制乃渡淮入泗州撫将士遂還揚州上疏自劾初廣漢蘇雲卿與張浚為布衣交紹興間結廬南昌之東湖灌園自給人稱曰蘇翁浚為相属洪州帥及漕禮致之帥漕易服為二客往見翁叩其郷里曰廣漢客曰張徳逺廣漢人翁當識之何如人也曰賢人也長于知君子短于知小人徳有餘而才不足因問徳逺今何官客曰今朝廷起張公欲了此事翁曰此恐怕他未便了得在帥漕因出金幣書函具道浚意雲卿徉期以詰朝上謁比往迎則已遁矣及是符離師潰議者稱雲卿先見且以其言為浚定論云六月庚申朔日食貶張俊為江淮宣撫使安置李顯忠于潭州考宋史孝宗紀顯忠先貶節副謫筠州再貶團副謫潭州續綱目昆合為一今依顯忠本傳歸重再貶書潭州宿師之還士大夫主和者皆議浚之非帝賜浚書曰今日邉事倚卿為重卿不可畏人言而懷猶豫前日舉事之初朕與卿任之今日亦湏與卿終之浚乃以魏勝守海州陳敏字元功贛州石城人守泗州戚方守濠州郭振守六合治髙郵巢縣兩城為大勢修滁州關山即石駝山在滁州西北清流閔之北口也以扼敵衝聚水軍淮隂馬軍夀春大飭兩淮守備帝復召浚子栻入奏事浚附奏曰自古有為之君心腹之臣相與合謀共志以成治功今臣以孤蹤動輒掣肘陛下将安用之因乞骸骨帝覽奏謂栻曰朕待魏公有加雖乞去之章日上朕決不許帝對近臣言必曰魏公未嘗斥其名毎遣使至督府必令視浚飲食多寡肥瘠如何至是帝以符離師潰乃議講和召湯思退為醴泉觀使奉朝請而下詔罪已于是尹穡字少稷兖州人居玉山附思退劾浚遂降授浚特進樞密使充宣撫治揚州顯忠責授果州團練副使潭州安置而邵宏淵仍前建康都統制後朝廷知其故復顯忠太尉奉祠宏淵尋貶靖州團練副使南安軍安置辛㳄膺罷㳄膺以疾祈免且奏曰王十朋雖上親擢天下皆知臣薦其賢湯思退召将至亦知臣嘗疏其奸遂罷奉祠陛辭帝甚惜其去㳄膺奏曰臣與思退理難同列帝曰有謂思退可用者㳄膺曰今日之事恐非思退能辦思退固不足道但恐有悞國家耳秋七月以湯思退為尚書右僕射同平章事兼樞宻使思退復相諫議王大寳字元龜其先由温陵徙潮州論之不報八月復以張浚都督江淮兵馬陳俊卿以浚降秩徙治上疏曰若浚不用宜别属賢将如欲責其後効降官示罸可也今削都督重權􅀢揚州死地如有奏請臺諫沮之人情觧體尚何後効之圖議者但知惡浚而欲殺之不復為社禝計願下詔戒中外協濟使浚自効疏入帝悟即復浚都督浚遂以劉寳為淮東招撫使金人復以書徵地及嵗幣詔淮西安撫幹辦官盧仲賢報之赫舍哩志寕以書貽三省宻院云故疆嵗幣如舊及稱臣還中原歸附人即止兵不然當俟農隙征戰帝以付張浚浚言金强則來弱則止不在和與不和時右相湯思退秦檜黨也急于求和参政周葵字立義常州宜興人守自治之説方出師渡淮葵請對謂不可輕舉累數百言及符離師潰帝思其言拜參知政事葵始終守其前説三續綱目作陳康伯周葵洪遵皆上疏請和考宋史人傳俱未嘗請和惟葵守自治之説而已續綱目不可從今改輯工部侍郎張闡注見前獨曰彼欲和畏我耶爱我耶直欵我耳力陳六害不可許帝曰朕意亦然姑隨宜應之乃遣盧仲賢持報書如金師云海泗唐鄧等州乃正隆渝盟之後本朝未遣使之前得之至于嵗幣固非所較苐兩淮凋瘵之餘恐未如數仲賢陛辭帝勅以勿許四郡而思退等命許之張浚奏仲賢小人多妄不可委信不聴既而命廷臣議金師所言四事其説不一帝曰四州嵗幣可與名分歸附人則不可從也冬十月立賢妃夏氏袁州宜春人為皇后帝初納郭氏開封祥符人為妃生鄧王愭即莊文太子慶王愷恭王惇即光宗邵王恪而薨夏氏生有祥徴父協竒之及長以資納于宫中為吳太后閤中侍御太后以夏氏賜帝至是立為后協既納女資匱居貧乃歸客袁之僧舍號夏翁而死后訪得其弟執中補閤門祇侯執中與其妻至京宫人諷使出之擇配貴族欲以媚后執中不為動他日后親為言執中以宋宏語對后不能奪執中既貴始從師學作大字頗工復善騎射帝聞其方欲召用之執中謝曰他日無累陛下保全足矣人以此益賢之十一月盧仲賢還有罪除名遣審議官胡昉如金軍仲賢至宿州布薩忠義懼之以威仲賢皇恐言歸當禀命遂以忠義遺三省密院書來上其畫定四事仍如志寕前書所言帝大悔張浚遣子栻入奏仲賢辱國無状帝怒遂下大理問其擅許四州之罪奪三官尋除名竄郴州而湯思退遽以王之望字瞻叔㐮陽榖城人充金國通問使龍大淵副之許割棄四州求減嵗幣之半初之望為都督府参賛軍事不欲戰請入朝因奏人主論兵與臣下不同惟奉承天意而已竊觀天意南北之形已成未易相兼我之不可絶淮而北猶敵之不可渡江而南也移攻戰之力以自守自守既固然後隨機制變擇利而應之思退悦其言故奏遣之會右正言陳良翰字邦彦台州臨海人言前遣使已辱命大臣不悔前失而後遣王之望是金不折一兵而坐收四千里要害之地決不可許四州也若嵗幣則俟得陵寝然後與庶為有名今議未決而之望遽行恐其辱國不止于仲賢可先馳一介往俟議決然後行未晚也遂以胡昉為金國通問所審議官張浚亦力言金未可與和請帝幸建康以圖進兵帝乃手詔王之望等以禮物待命境上而令胡昉先往諭金以四州不可割之意如必欲得四州則當追還使人罷和議矣詔廷臣集議和金得失召張浚還陳康伯等言金人通和朝廷遣盧仲賢報之其所論最大者三事我所欲者削去舊禮彼亦肯從彼所欲者嵗幣如數我不深較其未決者彼欲得四州而我以祖宗陵寝欽宗梓宫為言未之與也乞召張浚歸國特垂咨訪仍命侍從臺諫集議帝從之羣臣多欲從金人所請張浚及湖北京西宣諭使虞允文起居郎胡銓監察御史閻安中上疏力争以為不可與和湯思退怒曰此皆以利害不切于已大言誤國以邀美名宗社大事豈同戯劇以朱熹為武學博士熹應召入對言君父之讐不與共戴天今日所當為者非戰無以復讐非守無以制勝時相湯思退方倡和議不悦除武學博士後與洪适字景伯皓長子論不合而歸十二月陳康伯罷以湯思退張浚為尚書左右僕射並同平章事兼樞密使浚仍都督江淮軍馬甲申二年金大定四年春正月金人執胡昉尋遣還昉至金人以失信執之帝聞昉被執謂浚曰和議不成天也自此事當歸一矣詔王之望以幣還既而布薩忠義以書進金主金主覽之曰行人何罪即遣還邉事令元帥府從宜措置三月張浚視師江淮金軍退初湯思退恐和議不成奏請以宗社大計奏禀上皇而後從事帝批示三省曰金無禮如此卿猶欲議和今日敵勢非秦檜時比卿議論秦檜不若思退大駭續綱目此下即注王之望奏及錢端禮言考宋史張浚傳之望奏係于詔浚視師之後湯思退傳又係于命浚行邉之前兩傳本属牴牾續綱目混合為一以浚之視師專為罷兵張本叙㳄尤不明晰今一依浚傳以之望奏改叙下罷浚條目内俄詔浚行視江淮時浚所招徠山東淮北之士以實建康鎮江兩軍凡萬二千人萬弩營所招淮南壯士及江西羣盜又萬餘人陳敏統之以守泗州凡要害之地皆築城堡其可因水為險者皆積水為匱増置江淮戰艦諸軍弓矢器械悉備金人方屯重兵為虚聲脇和有刻日決戰之語及聞浚復視師亟撤兵歸于是淮北之來歸者日不絶山東豪傑􅊖願受節度復以蕭錡契丹望族沈勇有謀欲令盡領降衆且以檄諭契丹約為應援金人天懼夏四月罷張浚判福州先是湯思退陽乞奉祠隂謀去浚遂令王之望等驛奏兵少粮乏樓櫓器械未備人言委四萬衆以守泗州非計㑹户部侍郎錢端禮亦言兵食日增調發不支乞以符離之潰為戒錢端禮字處和臨安人帝頗惑之至是思退又諷右正言尹穡論浚䟦扈且費國不貲奏令張深守泗不受趙廓之代為拒命復論督府叅議官馮方罷之浚乃請解督府詔以錢端禮王之望宣諭兩淮而詔浚還端禮入奏言兩淮名曰備守守未必備名曰治兵兵未必精蓋詆浚也浚留平江凡八上疏乞致仕帝察其忠欲全其去乃命以少師保信節度使判福州右司諫陳良翰侍御史周操言浚忠勤人望所屬不當使去國皆坐罷六月甲寅朔日食秋七月撤兩淮邉備時湯思退急欲和好之成遂罷築壽春城散萬弩營兵輟修海船毁折水匱不推軍功賞典後更撤海泗唐鄧之戍八月少師保信節度使魏公張浚卒謚忠獻浚既去朝廷遂决棄地求和之議浚猶上疏言尹穡姦邪必誤國事或勸浚勿復以時事為言浚曰吾荷兩朝厚恩乆居重任今雖去國惟日望上心感悟苟有所見安忍弗言行㳄餘干得疾手書付二子栻杓曰吾嘗相國不能恢復中原雪祖宗之耻即死不當𦵏我先人墓左𦵏我衡山足矣數日卒贈太保後帝思浚忠加贈太師浚幼有大志及為熙河幕官徧行邉壘乃觀山川形勢時時與舊戍将握手飲酒問祖宗以來守邉舊法及軍陣方略之宜故一旦起自疏遠當樞筦之任悉能通知邉事本末在京城中親見二帝北行生民塗炭誓不與敵俱存故終身不主和議然才疎而果于自用量褊而暗于知人是以國事鮮濟師徒屡衂沒身有遺恨馬以續綱目于終身不主和議下引宋史浚傳論云時浚之忠大類漢諸葛亮比擬差過今節録劉定之宋史斷兼棌柯維騏宋史新編改輯邱濬曰浚學雖正而術則疎謀雖深而機則淺原其心不可謂不忠于宋而考其行事有富平之敗淮西之變符離之潰區區江左奔敗之餘奄奄之氣僅續能堪此幾敗耶元揭徯斯以宋南渡之不能復歸其罪于浚未可以為非也遣宗正少卿魏杞字南失壽春人使金湯思退奏遣杞如金議和書稱姪大宋皇帝某再拜奉于叔大金皇帝嵗幣二十萬帝面諭祀曰今遣使一正名二退師三減嵗幣四不發歸附人杞條陳十七事擬問對帝隨事畫可陛辭奏曰臣将㫖出彊豈敢不勉萬一無厭願速加兵帝善之兵部侍郎胡銓言敵不可和臣恐再拜不已必至稱臣稱臣不已必至請降請降不已必至納土納土不已必至輿櫬輿櫬不已必至如晉帝青衣行酒而後為快今日舉朝之士皆婦人也不聼金以完顔守道本名錫里陳王希尹之孫錫里舊作習泥烈今改按此興八十一卷之錫里非一人為尚書右丞金主謂守道曰卿等每奏皆常事凡治國安民及朝政不便于民者未嘗及也如此則宰相之任誰不能之九月詔湯思退都督江淮軍馬思退辭不行思退急欲求和諷侍御史尹穡言乞置獄取不肯撤備及棄地者二十餘人論罪因擢穡諫議大夫至是命思退都督江淮固辭乃以楊存中為同都督冬十月詔輔臣晚對便殿詔曰朕每聼朝議政頃刻之際意有未盡自今執政大臣或有奏陳宜于申未間入對便殿庶可坐論得盡所聞期躋于治金兵復渡淮十一月魏勝拒戰于淮陽敗績死之楚州破湯思退以帝悔悟恐事不成隂遣孫造諭金以重兵脇和金布薩忠義等遂議渡淮魏杞行次盱眙忠義遣趙房長問杞所以來之意求觀國書杞曰書御封也見主當廷授房長馳白忠義疑國書不如式又求割啇秦之地及歸附人且欲歳幣二十萬杞以聞帝命盡依初式許割四州歳幣亦如其數再易國書忠義猶以未如所欲遂與赫舍哩志寧分兵自清河口以攻楚州都統制劉寳棄城遁時勝奉詔專一措置清河口金人乗間以舟載器甲糗糧自清河出欲侵邊勝覘知之帥忠義士拒于河口金兵詐稱欲運糧往泗州由清河口入淮勝欲禦之劉寳戒以方議和不可金兵軼境勝帥諸兵拒于淮陽自夘至申勝負未决金圖克坦克寧帥生兵至勝力戰矢盡依土阜為陣謂士卒曰我當死此得脱者歸報天子乃令歩卒居前騎兵為殿至淮隂東十八里中矢墜馬死楚州遂破金兵尋入濠州都統制王彦棄昭闗走滁州亦破時魏杞雖已易書帝怒金人反覆詔以禮物犒督府師杞奏金若如約而金繒不具恐格事機乃行已而帝用錢端禮言復遣國信所大通事王汴持周葵書如金師得金帥報書以歸杞乃渡淮續綱目以王抃如金師附載前使魏杞如金條後與孝宗本紀叙次前後不合令改輯于此以楊存中都督江淮軍馬時諸軍各守分地不相統一存中集諸將調䕶之于是始更相為援朝議欲舍淮保江存中持不可乃已湯思退以罪竄永州道死言者論其主和誤國之罪遂落職永州居住太學生張觀等七十二人伏闕上書論思退及王之望尹穡姦邪誤國鉤致敵人之罪乞斬三人以謝天下併竄其黨洪适晁公武字子止鉅野人而用陳康伯胡銓陳良翰王十朋金安節虞允文王大寳陳俊卿黄中龔茂良字實之興化軍人張栻劉夙查籥字元章海陵人以濟大計思退行至信州聞之憂悸而死復以陳康伯為尚書左僕射同平章事兼樞密使錢端禮簽書樞密院事虞允文同簽書院事金兵渡淮人情驚駭時張浚已卒皆望陳康伯相乃自紹興召拜康伯力疾至闕下詔子安節壻文好謙掖以見减拜賜坐間日一㑹朝許乘肩與至殿門給扶升殿非大事不署帝又思允文之言故并召而用之詔王之望勞師江上閏月金人逼揚州之望以罪免金人至揚州或請擊之楊存中不敢渡江獨臨江固壘以自守之望與湯思退表裏專以割地啖金為得計帝詔都督擇利害擊金軍之望下令諸将不得妄進朝廷趣行之望言王抃既還不可冐小利害大計言者論之遂免金以女真字譯經史乙酉乾道元年金大定五年春正月召楊存中還罷都督府以存中為寜逺昭慶節度使又罷兩淮及陜西河東宣撫招討使二月左僕射同平章事陳康伯卒諡文恭康伯奏事出殿門疾作輿至第卒帝擇日臨奠子安節固辭乃止康伯以經濟自任臨事明㫁帝嘗謂輔安曰康伯有器量其從容不廹可比晉謝三月以虞允文參知政事王剛中同知樞密院事剛中嘗言戰守者實事和議者虚名不可恃虚名害實事居政府未幾卒在六月允文尋亦罷在八月魏杞還自金始正敵國之禮祀至燕山金館伴張恭愈以國書稱大宋脇杞去大字杞拒之具言天子神聖才傑奮起人人有敵愾意北朝用兵能保必勝乎金君臣環聽拱竦金主許損歳幣不發歸附人命元帥府罷兵分戍杞卒正敵國禮而還帝慰藉甚厚先是王抃還因赦沿邉被兵州軍詔曰比遣王抃邉抵潁濱得其要約尋澶淵盟誓之信仿大遼書題之儀正皇帝之稱為叔姪之國歳幣减十萬之數地界如紹興之時憐彼此之無幸約叛亡之不遣可使歸附之士咸起寧居之心洪适所草也論者謂前日之所貶損四方蓋未聞知今著之赦文失國體矣夏五月金以布薩忠義為尚書左丞相赫舍哩志寧為平章政事先是和議既定命元帥府諸新舊軍以六萬人留戍餘並放還又以宋國歳幣賞諸軍於是都元帥布薩忠義先還拜尚書左丞相尋召左副元帥赫舎哩志寧入見拜平章政事諭曰南服雖定尚須卿往規畫志寧迺還駐南京六月以洪适簽書樞密院事适拜簽書帝謂錢端禮虞允文曰三省事可與洪适共議自是東西府始同班奏事未幾以适參知政事秋八月立鄧王愭為皇太子大赦愭帝長子也錢端禮罷時乆不置相端禮以首參闚之甚急太子愭夫人端禮女也殿中侍御史唐堯封論端禮帝姻不可任執政坐遷太常少卿館閣士相與上疏排端禮者皆被斥吏部侍郎陳俊卿言本朝不以戚屬為相陛下所宜守帝納其言端禮憾之出俊卿知建寧及太子立端禮不得已引嫌奉祠冬十二月以洪适為尚書右僕射同平章事兼樞密使汪澈為樞密使葉顒字子昂興化軍仙遊人參知政事适以文學聞望遭時遇主自中書舎人半歳四遷至右相然無大建明以䆒其所學既而以霖雨引咎乞罷帝從之在明年三月澈在樞府帝宻訪人材澈薦百有十八人嘗奏言臣起寒逺所以報國無私不欺爾未幾罷在明年四月顒由資政殿學士拜參知為林安宅所劾落職奉祠在明年五月事尋白仍召知樞密先是林安宅請兩淮行鐵錢葉顒執不可已而安宅同知樞宻遂劾奏顒子受富民錢百萬得為監軍帝罷顒下其事于臨安府既置對安宅失實貶居筠州在明年八月丙戍二年金大定六年春二月金左丞相布薩忠義卒忠義謙以接下敬儒重士與人交侃侃如也善馭將卒能得死力為宰輔數年知無不言故能以外戚兼任將相以功名終夏五月修建康行宫冬十一月寧逺昭慶節度使楊存中卒諡武恭存中出入宿衛四十年忠義勇敢而寡過大小二百餘戰未嘗大衂上皇最眷念之十二月以葉顒魏杞為尚書左右僕射同平章事兼樞密使蔣芾字子禮常州宜興人參知政事陳俊卿同知樞密院事顒召知樞密未拜進僕射首薦汪應辰王十朋陳良翰周操陳之茂林光朝字謙之莆田人等可備執政待從臺諫帝嘉納又言自古明君用人使賢使愚使姦使盗惟去泰甚蓋指龍大淵也初帝末能屏鞠戯又将遊獵白石注見前俊卿上疏力諫至引漢桓靈唐敬穆以為戒帝喜曰所奏備見忠讜朕決意用卿矣遂有樞副之命置制國用司以宰相領之議者言近以宰相兼樞密使蓋欲使知兵也而不知財穀出入之源可乎且唐制宰相兼領三司使于是詔自今宰相可帶制國用使參知政事帶同知八年二月罷之丁亥三年金大定七年春二月出龍大淵為浙東總管曽覿為福建總管大淵覿怙寵擅權周必大字子充一字洪道廬陵人金安節等嘗極論之多坐斥至是中書舍人洪邁言于陳俊卿曰大淵覿言鄭聞當除右史某當除西掖信乎俊卿以邁之言質于帝帝怒遂出二人于外帝從太上皇幸玉津園在杭州府錢塘縣龍山北紹興之所中建隆興後為帝與羣臣燕射復從幸聚景園在錢唐縣清波門外歲以為常三月秀王夫人張氏卒帝成服于後苑夏五月太傅四川宣撫使新安王吳璘卒諡武順璘病革呼幕客草遺表曰願陛下毋棄四州毋輕出兵不及家事及卒贈太師追封信王璘剛勇喜大節畧苛細代兄玠守蜀二十年隐然為方面之重威聲亞于玠上皇嘗問勝敵之術于璘璘對曰弱者出戰彊者繼之上皇曰此孫武子三駟之法一敗而二勝也璘選諸将率以功有薦才者璘曰兵官非嘗試難知其才以小善進之則僥倖者獲志而邊人宿将之心怠矣璘既卒議擇代帝謂虞允文曰無以易卿凡事無效張浚迂濶遂以允文為四川宣撫使六月皇后夏氏崩諡曰安恭尋攅于修吉寺秋七月太子愭卒諡曰莊文九月金主幸保州詔察訪所過州縣官金主秋獵次保州詔修起居注王天祺察訪所過州縣官又謂侍臣曰近聞朕所幸郡邑凡堂宇曾經宴寢者後皆避之此甚無謂可宣諭令仍舊居止又嘗諭宰臣曰朕每次舍秣馬之具皆假于民閒多亡失不還其主此彈壓官不職可擇人代之所過即令詢問有似此者並償其值冬十一月合祀天地于圜丘雷葉顒魏祀免帝以郊祀而雷出非時用漢制罷顒杞相顒為人一易清介與物若無忤至處大事則毅然不可奪罷歸後尋卒諡正簡以陳俊卿參知政事劉珙同知樞密院事珙自湖南召還授翰林學士上言世儒多病漢高帝不説學輕儒生臣以為漢高帝所不説者特腐儒俗學耳使當時有以二帝三王之學告之知其必敬信功烈不止此因陳聖王之學所以明理正心為萬事之綱帝稱善遂拜樞副珙因薦張栻汪應辰陳良翰學行于帝十二月金出富察通舊作蒲察通今改後仿此為肇州防禦使通為殿前右衛将軍金主惡其人出之于外臨發賜金帶諭之曰卿雖有才然用心多詐朕左右須忠實人故命卿補外賜卿金帶者答卿服勞之乆也因顧謂左宣徽使敬嗣暉曰如卿不可謂無才所欠者純實耳又諭宰臣曰卿等舉用人才凡己所知識必使他人舉奏朕甚不喜如其果賢何必以親疎為避忌也戊子四年金大定八年春二月以蔣芾為尚書右僕射同平章事兼樞宻使詔芾常朝賛拜不名芾辭許之夏五月行乾道歴帝以近世歴學失傳士大夫無習之者新歴比舊特彼善于此乃不别製名祇以乾道命名秋八月劉珙罷主管殿前司公事王琪奉詔按視兩淮城堡還薦和州教授劉甄夫帝命召之陳俊卿言教官有才何與琪事劉珙遂呼琪詰責之琪謝後不敢㑹揚州奏琪擅令増築新城俊卿奏琪詐傳上㫖非小故琪遂削秩珙時同在帝前争之尤力言忤帝意遂罷珙奉祠俊卿復言奏實臣草當先罷臣且珙正直有才若以小事獲罪自此大臣皆阿順持禄非國家福乃改珙帥江西冬十月起復蔣芾為尚書左僕射以陳俊卿為右僕射並同平章事兼樞密使芾辭許之芾于六月以母䘮去位至是起復之有密㫖欲今歲大舉芾奏天時人事未至帝不悦大閲于茅灘在錢塘縣西南江濱帝親御甲胃指授方畧為方圓鋭直四陣戈甲耀日旌旗蔽天六師驩踴犒賚有加十二月召建州布衣魏掞之字子實初字元履建州建陽人以為太學錄掞之師胡憲與朱熹遊諸司薦其學行召赴行在入對帝曰治道以何為要掞之奏治道以分臣下邪正為要詔除太學録時將釋奠孔子掞之請廢安石父子勿祀而追爵程氏兄弟使從食不聼又言太學之教宜以徳行為先今一以空言浮説取之非是其他政事有係安危治亂之機者無不抗疏盡言至三四皆不見省遂罷為台州教授尋以病卒聞者惜之西遼布沙堪殺其夫蕭都爾本舊作朶魯不今改其舅鄂囉羅討誅之而立耶律珠勒呼舊作直魯古今改布沙堪與都爾本弟博果濟薩里舊作朴古只沙里今改通出都爾本為東平王而殺之都爾本之父續綱目作舅誤今改鄂囉羅以兵問罪遂殺布沙堪及博果濟薩里迎伊哷次子珠勒呼立之改元天禧己丑五年金大定九年春正月措置兩淮屯田陳俊卿以兩淮備禦未設民無固志萬一㓂至倉猝調兵恐不及事請于揚州和州各屯三萬人仍籍民家三丁者取其一以為義兵授之弓弩教以戰陣農隙之日給以兩月之食聚而教之沿江諸郡亦用其法諸將渡江則使之城守以備緩急且以隂制州兵頡頑之患其兩淮諸郡守臣但當擇才不當復論文武計資歴捐以財賦許辟官吏畧其小過責其成功要使大兵屯要害必爭之地待敵至而决戰使民兵各守其城相為犄角以壯聲勢帝意亦以為然詔即行之然竟為衆論所持俊卿尋亦去位不能及其成也二月以王炎字晦叔婺源人參知政事三月召四川宣撫使虞允文還以炎代之陳俊卿薦虞允文才堪將相故有是命允文至以為樞密使五月帝不視朝六月始視朝以射弩弦斷傷目故也陳俊卿言于帝曰陛下未能忘騎射者蓋志圖恢復耳誠能任智謀之士仗武猛之將明賞罰恢信義則英聲義烈不出尊爼而敵人已震慴于萬里之逺何待區區馳射于百步之間哉願以今日之事永為後戒秋七月以曾覿為浙東總管先是龍大淵死覿在福建帝憐欲召之劉珙奏曰此曹奴𨽻厚賜之可也引以自近使得預聞政事非所以増徳業振紀綱也帝納珙言命遂寢既而覿垂滿陳俊卿恐其入預請以浙東總管處之覿入見詔進覿一官為觀察使俊卿及虞允文諫不可竟申浙東之命覿怏快而去八月甲申朔日食以陳俊卿虞允文為尚書左右僕射並同平章事兼樞密使俊卿以用人為己任所除吏皆一時之選奨亷退抑奔競或才可用而資歴淺者則密薦于帝未嘗語人每接朝士及牧守自逺至必問以時政得失人才賢否允文為相亦以人才為急嘗籍為三等有所見聞即記之號材館録故所用皆知名士庚寅六年金天定十年春三月金以宗叙世祖孫為參知政事金主謂宗叙曰卿昨為河南統軍時言黄河堤埽利害甚合朕意朕毎念百姓差調官吏互為姦弊若不早計而迫期徴歛民増十倍之費為害非細卿既參朝政當盡革諸弊擇利而行之又諭左丞石琚字子美定州人曰女真人徑居逹要不知閭閻疾苦汝等自丞簿至是民間何事不知凡有利害宜悉敷陳夏四月罷吏部尚書汪應辰應辰剛方正直敢言不避在朝多革弊政中貴人皆側目上皇方甃石池以水銀浮金鳬魚于上帝過之上皇指示曰水銀正乏此買之汪尚書家帝怒曰汪應辰力言朕建房廊與民爭利乃自販水銀邪應辰聞之力求去㑹賜發運使史立志緡錢二百萬為均輸和糴之用應辰三上疏論之遂出知平江府然水銀實非買應辰家也五月陳俊卿罷虞允文建議遣使如金以陵寢為請俊卿以為不可允文請不已帝手札諭俊卿俊卿奏曰陛下痛念祖宗思復故疆然大事須萬全俟一二年吾力稍完乃可不敢迎合意指以誤國事帝意方嚮允文俊卿以論不合因力求去遂判福州陛辭猶勸帝逺佞親賢修政安民泛使不可輕遣夏相任得敬脇其主仁孝中分其國請命于金金主不許初仁孝之嗣位也國内多亂任得敬抗禦有功遂相夏國専政二十餘年隂蓄異志欲圖夏國誣殺宗親大臣其勢漸逼仁孝不能制是嵗乃分西南路及靈州囉龎嶺在寧憂府靈州西地與得敬自為國且上表于金為得敬求封金王以問宰相尚書令李石等曰事繫本國我何預焉不如因而許之金主曰有國之主豈肯無故分國與人此必權臣逼奪非夏主本意况夏國稱藩歳乆一旦逼于賊臣朕為四海主寕容此邪若彼不能自正則當以兵誅之不可許也乃却其貢物賜仁孝詔曰先業所傳亦當固守今兹請命事頗靡常未知措意之由來續當遣使以詢爾得敬始有懼心未幾仁孝誅得敬遣使謝金主慰之閏月以起居郎范成大字致能吴郡人為金國祈請使求陵寝地及更定受書禮盖泛使也紹興中金使者至捧書升殿北面立榻前跪進帝降榻受書以授内侍金主初立使者至陳康伯令伴使取書以進及湯思退當國復循紹興故事帝意悔之故令成大口以為請成大至金密草奏具言受書式懷之入初進國書辭氣慷慨金君臣方傾聼成大忽奏曰兩國共為叔姪而受書禮未稱臣有疏搢笏出之金主大駭曰此豈獻書處邪左右以笏摽起之成大屹不動必欲書逹既而歸館所金庭紛然其太子允恭欲殺成大或勸止之竟得全節而歸其後書畧云和好再成界河山而如舊緘音遽至指鞏洛以為言既云廢祀欲申追遠之懐止可奉還即候刻期之報至若未歸之旅櫬亦當並發于行塗抑聞附請之辭欲變受書之禮于尊卑之分何如顧信誓之誠安在于是二事皆無成功初議遣使祈請陵寢士大夫有憂其無備而召兵者輙斥去之起居郎張栻入對帝曰卿知敵國事乎栻對曰不知也帝曰金國饑饉連年盗賊四起栻曰金人之事臣雖未知境内水之事則知之矣帝曰何也栻曰臣竊見比年諸道多旱民貧日甚而國家兵弱財匱官吏誕謾不足倚賴正使彼實可圗臣懼我之未足以圖彼也帝黙然久之栻復奏曰臣竊謂陵寢隔絶誠臣子不忍言之至痛然今日未能奉辭以討之又不能正名以絶之乃欲卑辭厚禮以求于彼則于大義已為未盡而或猶以為憂者蓋見我未有必勝之形故也夫必勝之形當在于早正素定之時而不在于兩陣决機之日今日但當下哀痛之詔明復讐之義顯絶金人不與通使然後修徳立政用賢養民選將練兵以内修外攘進戰退守通為一事必治其實而不為虚文則必勝之形隐然可見雖有淺陋畏怯之人亦且奮躍而争先矣帝深納之冬十月高麗翼陽公晧廢其君晛而自立晧晛弟也以讓國奏于金金主曰譲國大事也必晧簒之耳郤其使而命有司詳問晧復取晛表言父遺訓傳位于晧金主乃封之十一月遣中書舍人趙雄字温叔資州人如金起居舍人趙雄請置局議恢復帝喜進中書舍人遣如金賀生辰别函書請陵寝乃更受書之禮金主不許雄辭歸金主謂雄曰汝國何舍欽宗而請鞏洛山陵如不欲欽宗之柩我當為爾國葬之辛夘七年金大定十一年春正月朔上太上皇尊號帝尋諭輔臣曰前日奉上册寶上皇聖意甚悦翌日過宫侍宴邦家非常之慶漢唐所無也又曰本朝家法逺過漢唐惟用兵一事未及朕以敵讐未復日不遑暇如宫中臺殿上皇時為之朕未嘗敢増益上皇列觀徘徊周覽為之興嘆頗訝其不飾也金禁羣臣相饋獻尚書省奏汾陽節度副使牛信昌生日受饋獻法當奪官金主曰朝廷行事苟不自正何以正天下尚書省樞密院生日節辰饋獻不少此而不問小官饋獻即加按劾豈正天下之道自今宰執樞密饋獻亦宜罷去帝作敬天圖帝謂輔臣曰無逸一篇享國長久皆本於寅畏朕近日取尚書所載敬天事編為兩圖朝夕觀覽以自警省名曰敬天圖虞允文對云惟陛下盡躬行之實敬畏不已必有明效大驗帝深然之二月立恭王惇為皇太子大赦進封慶王愷為魏王莊文太子卒慶王愷以次當立帝以恭王惇英武類已越次立之而進封愷為魏王判寧國府帝謂輔臣曰古人以教子為重其事備見于文王世子須當多置僚屬博選忠良使左右前後罔非正人不然一薛居州亦無益也尋以王十朋陳良翰為太子詹事劉焞為國子司業兼太子侍讀復詔皇太子領臨安户三月金葬欽宗皇帝於鞏洛之原以一品禮以張説開封人簽書樞密院事未拜而罷説妻吳氏太皇后女弟也説因攀縁親屬擢拜樞民府命下朝論譁然未有敢誦言攻之者左司員外郎兼侍講張栻獨上疏切諫且詣朝堂責虞允文曰宦官執政自京黼始近習執政自相公始允文慙憤不堪栻復奏文武誠不可偏然今欲右武以均二柄而所用乃得如此之人非惟不足以服文吏之心正恐反激武臣之怒帝感悟命遂寢夏五月起復劉珙為荆襄宣撫使珙固辭不起珙安撫江西以憂去及起復凡六疏懇辭引經據禮詞甚切至最後言曰三年通䘮先王因人情而節文之三代以來未之有改至于漢儒乃有金革無避之説此固已為先王之罪人矣然尚有可諉者曰魯公伯禽有為為之也今以陛下威靈邉陲幸尚無警臣乃冐金革之名以私利禄之實不又為漢儒之罪人乎帝納其言為寢前詔珙乃手疏别奏畧曰天下之事有其實而不露其形者無所為而不成無其實而先示其形者無所為而不敗今徳末加修賢不得用賦歛日重民不聊生將帥方割削士卒以事苞苴士卒方饑寒窮苦而生怨謗凡吾所以自治而為恢復之實者大扺濶畧如此而乃外招歸正之人内移禁衛之卒規筭未立手足先露其勢適足以速禍而致冦且荆襄四支也朝廷元氣也誠使朝廷設施得宜元氣充實則犂庭掃穴在反掌間耳何荆㐮之足慮如其不然則荆襄雖得臣革百人悉心經理亦何足恃哉臣恐恢復之功未易可圖而意外立至之憂將有不可勝言者惟陛下圖之冬十月金人遣使致聘金使烏凌阿舊作烏林逹今改天錫來賀生辰要帝降榻問金主起居虞允文請帝還内命知閤門事王抃諭天錫以明日㑹慶節就見天錫沮退金主幸太子宫金主謂太子曰朕為汝措天下當無復有經營之事汝惟無忘祖宗純厚之風以勤修道徳為孝明信賞罰為治而已昔唐太宗謂髙宗曰吾伐髙麗不克終汝可繼之如此之事朕不以遺汝如遼之海濵王以國人愛其子嫉而殺之此何理也子為衆愛愈為美事所為若此安有不亡唐太宗又嘗謂高宗曰爾于李勣無思今以事出之我死宜即授以僕射彼必致死力矣君人者焉用偽為受恩于父安有忘報于子者乎朕御臣下惟以誠實耳壬辰八年金大定十二年春二月改左右僕射為左右丞相以虞允文梁克家字叔子泉州晉江人為之並兼樞密使尋又省侍中中書令尚書令之官以左右丞相充其位罷左司員外郎兼侍講張栻宰相隂主張説欲伸前命故出栻知袁州栻在朝僅一年召對至六七所言皆修身務學畏天恤民抑僥倖屏䜛諛宰相近習皆憚之復以張説簽書樞密院事罷侍御史李衡字彦平江都人等四人侍御史李衡右正言王希吕字仲行宿州人論説不可執政直學士院周必大不草答詔給事中莫濟字子齊吳興人封還録黄帝詔翰林學士王曮草制權給事中姚憲書行而罷四人都人作四賢詩以紀之夏四月金右丞相赫舍哩志寧卒金主嘗宴羣臣于太子宫顧志寧謂太子曰天下無事吾父子今日相樂皆此人力也及卒甚悼惜之曰志寧臨敵身先士卒勇敢之氣自太師梁王後未有如此人也秋七月金罷保安注見前蘭州續綱目作蘭安考金史地理志有蘭州無蘭安續網目蓋仍夏國傳之訛今改正蘭州注亦見前金主謂宰臣曰夏國以珠玉易我絲帛是以無用易我有用也命罷之後承安中復置罷虞允文為四川宣撫使帝命選諫官允文以李彦頴字秀叔湖州徳清人林光朝王質字景文興國軍人對三人皆鯁亮有文學為時所推重帝不報而用曾覿所薦者允文梁克家爭之不從允文遂力求去授四川宣撫使進封雍國公陛辭帝諭以進取之方期日㑹河南御正衙酌酒賦詩以遣之冬十一月金去金銀坑冶之税不禁民採癸巳九年金大定十三年夏五月壬辰朔日食金禁女真人譯為漢姓金主嘗謂宰臣曰㑹寜乃國家興王之地自海陵遷都永安女真人寖忘舊風朕少時嘗見女真風俗迄今不忘今之燕飲音樂皆習漢風盖以備禮也非朕心所好東宫不知女真風俗苐以朕故猶尚存之恐異時一變此風非長久之計甚欲一至㑹寜使子孫得見舊俗庶幾習效之又嘗御睿思殿命歌者歌女真詞顧謂皇太子及諸王曰朕思先朝所行之事未嘗暫忘故時聴此詞亦欲令汝輩知之汝輩自幼惟習漢人風俗不知女真純實之風至于文字語言或不通曉是忘本也汝輩當體朕意至于子孫亦當遵朕教誡至是禁女真人毋得譯漢姓未幾復以㑹寜府為上京冬十月梁克家罷以曾懐字欽道晉江人為右丞相克家時獨相貴戚權幸不多假借而外濟以和至是以議金使朝見受書儀朝廷欲移文泗州示金生辰使完顔襄使正其禮克家以為不可與張説時説同知樞密院事不合遂求去出知建寜既而金果不從説尋知樞密院事既而帝知其欺罔罷之甲午淳熙元年金大定十四年春二月少保四川宣撫使雍公虞允文卒諡忠肅先是帝密詔趣師期允文奏軍需未備帝不樂至是帝遣二介持御札賜之介至而允文卒數日矣詔贈太傅夏四月以姚憲𠫭知政事葉衡字夢錫婺州金華人簽書樞密院事六月憲罷以衡代之衡奏牧守将帥必擇材以稱其職必久任以盡其材帝從之冬十一月甲申朔日食以龔茂良㕘知政事茂良除禮部侍郎帝亟進用之手詔問故事有自從官徑除執政例遂有是命曾懷罷以葉衡為右丞相兼樞密使衡有才智由小官不十年至宰相人謂出于曽覿乙未二年金大定十五年夏四月宴輔臣于玉津園帝謂葉衡等曰朝廷用人止論其賢否如何不可有黨如唐之牛李其黨相攻四十年不解皆緣主聴不明所以至此文宗乃言去河北賊易去朝中朋黨難朕常笑之為人主者但公是公非何縁有黨又曰近來士大夫好倡為清議此語一出竊恐相師成風便以趨事赴功者為猥俗以矯激沽譽者為清高駸駸不已如東漢激成黨錮之風深害治體豈可不戒卿等宜書諸紳秋八月以左司諫湯邦彦為金國申議使九月葉衡罷帝諭執政選使求河南陵寢地葉衡奏邦彦有口辯宜使邦彦請對問所以遣知薦出于衡恨之因奏衡對客有訕上語帝大怒罷衡贈趙鼎太傳追封豐國公謚忠簡髙麗將趙位寵以四十餘城叛附金金主不受位寵髙麗西京留守也以慈悲嶺在朝鮮國平壊城東至鴨緑江注見前四十餘城叛附于金金主曰朕懷綏萬邦豈助叛臣為虐執其使付高麗位寵伏誅閏月以李彦頴參知政事時湯邦彦新進奉使于金冀僥倖集事彦頴奏邦彦輕脱必悞國不從丙午三年金大定十六年春三月丙午朔日食夏四月金始命增置外府學及京府女真學京府設學金史選舉志及温特赫吉逹傳稱大定十三年續綱目據世宗紀作十六年今仍之考選舉志是年又設諸路府學不止女真學本紀不加分晰續綱目于綱書始命京府設學而目中則専叙女真學今依志𫝊改輯温特赫吉達舊作温廸罕締逹今改先是金置太學大定六年及是又命增置外府學其科曰詞賦曰經義曰䇿論謂之進士曰律科曰經童謂之舉人曰宏詞則制舉科也又有専試女真人科始于大定四年頒行女真大小字所譯經書于是興女真字學多擇明安穆昆内良家于為生于京師廩給九年以國史院編脩温特赫吉逹字學最號精深命教諸生習作詩䇿後復定為䇿論謂之女真進士科又命京師增設女真國子學諸路設女真府學亦同漢進士三年一試之制又定宗室宰相子程試等第其後二十八年復增置女真太學夏六月召朱熹為秘書郎不至先是陳俊卿劉珙薦熹為樞密院編脩官累召不至梁克家奏乞褒録之帝曰熹安貧守道亷退可嘉命主管台州崇道觀至是龔茂良言熹操行耿介除秘書管台州改官之命正以嘉其亷退顧乃冐進擢之寵是左右望而罔市利也力辭不至㑹復有言虚名之不可用者遂改主管武夷山沖佑觀史浩復薦熹知南康軍再辭不許至南康值嵗不雨講求荒政多所全活間詣郡學引士子與之講論訪唐李渤白鹿洞書院在江西南康府星子縣北廬山五老峯下唐李渤讀書廬山常畜一白鹿相隨因以名洞南唐于此建學初宋始置書院後廢朱熹復建遺址奏復其舊為學規俾守之湯邦彦有罪流新州邦彦至金金人拒不納旬餘乃引見夾道之士皆控弦露刃邦彦怖不能措一辭而還帝怒其無狀詔流新州自是陵寢之議遂息冬十月立貴妃謝氏丹陽人為皇后后㓜孤鞠于翟氏因冐姓翟及長被選入宮侍太上皇后后以賜帝累册貴妃夏后崩中宫虚位妃侍帝過徳夀宫太上諭帝立之復姓謝氏丁酉四年金大定十七年春正月髙麗致貢于金髙麗遣使謝金不納叛金有司奏髙麗所進玉帶乃石似玉者金主曰小國無能識辨誤以為玉耳且人不易物惟徳其物若復郤之豈政體也二月帝謁孔子廟遂臨太學金葬宋遼宗室于河南廣寧本遼奉先軍金置府明改衛今為縣屬奉天錦州府舊陵三月金免河北山東等路租税河北山東陜西河東西京遼東等十路旱蝗金主詔免其租税又賑東京博索哈斯罕三路尚書省奏三路粟不能周給金主曰朕嘗語卿等遇豐年即廣糴以為備卿等皆言天下倉廪盈溢今欲賑濟乃云不給夫蓄積為國家長計朕之積粟豈欲獨用之邪今既不給可於鄰道取濟自今預備當以為常夏六月罷龔茂良放之英州自葉衡罷茂良行相事凡再踰嵗帝迄不置相因謂茂良曰吏官近奏三台星不明葢實難其選耳㑹帝思史浩自明州召為醴泉觀使兼侍講茂良亦覺眷衰求去帝曰朕以經筵召浩卿不須疑既而曾覿欲以文資録其孫茂良以文武官各隨本色䕃補格法繳進覿因茂良入堂道間俾直省官賈光祖等當道不避街司叱之光祖曰參政能幾時茂良奏曰臣固不足道所惜者朝廷大體帝諭覿往謝茂良取光祖于臨安府撻之御札宣問施行太遽茂良待罪帝遣使諭復位會覿黨謝廓然賜出身除殿中侍御史中書舍人林光朝繳還詞頭帝怒罷光朝光朝與茂良同里茂良遂引疾求去出知建康猶手疏恢復六事帝曰卿五年不説恢復何故今日及此退朝甚怒曰福建子不可信如此廓然因劾之遂責降英州安置父子卒于貶所秋七月罷王雱從祀孔子九月丁酉朔日食戊戌五年金大定十八年春正月侍御史謝廓然請禁有司毋以程頤王安石之説取士未幾秘書郎趙彦中復疏言科舉之文成式具在今乃祖性理之説以浮言游詞相髙士之信道自守以六經聖賢為師可矣而别為洛學飾怪驚愚外假誠敬之名内濟虚偽之實士風日弊人才日偷望詔執事使明知聖朝好惡所在以變士風帝從之三月以史浩為右丞相兼樞密使王淮字季海金華人知樞密院事趙雄參知政事帝謂浩曰自葉衡罷虚席以待卿乆矣夏四月以陳俊卿判建康府時曾覿王抃甘昪三人盤結擅政進退大臣權震中外士大夫爭附之俊卿自興化赴建康過闕入對因極言三人招權納賄薦進人才而以中批行之等事且曰去國十年見都城榖賤人安惟士大夫風俗大變帝曰何也俊卿曰向士大夫奔覿抃之門十才一二尚畏人知今則公然趨附已七八不復顧忌矣人才進退由私門大非朝廷美事臣恐二人壞朝廷紀綱廢有司法度敗天下風俗累陛下聖德帝感其言秋七月太尉提舉萬壽觀李顯忠卒謚忠襄顯忠復官後賜第臨安帝常竒其狀貎魁傑命繪像閣下及卒贈開府儀同三司顯忠志復中原見忤秦檜屢遭廢黜符離之役又為邵宏淵所忌竟無成功冬十一月史浩罷以趙雄為右丞相王淮為樞密使錢良臣字友魏華亭人參知政事樞密都承㫖王抃建議募補殿步二司軍虚額輙捕市人軍士乘隙掠取民財浩奏盡釋所捕而擒軍民首讙呶者送獄獄成議取兵民各一人斬以徇浩又奏始釁者軍人也法固當民陸慶童特與抗鬬爾何可同罰帝怒乃求去後有言慶童之寃者帝始悔不從浩言己亥六年金大定十九年夏旱詔求直言知南康軍朱熹上疏畧曰天下之務莫大于恤民而恤民之本在人君正心術以立紀綱葢紀綱不能以自立必人主之心術公平正大無偏黨反側之私然後有所繫而立君心不能以自正必親賢臣逺小人講明理義閉塞私邪然後可得而正今宰相臺省師傅賔友諌諍之臣皆失其職而陛下所與親密謀議者不過一二近習之臣使陛下之號令黜陟不復出于朝廷而出于一二人之門名為陛下獨斷而實此一二人者隂執其柄臣恐莫大之禍必至之憂近在朝夕而陛下獨未之知也帝讀之大怒曰是以我為亡也諭趙雄令分析雄言于帝曰士之好名陛下疾之愈甚則人之譽之愈衆無乃適所以高之不若因其長而用之彼漸當事任能否自見矣帝以為然詔以熹提舉江西常平茶鹽庚子七年金大定二十年春二月魏王愷卒諡惠憲愷寛慈為帝深愛雖出于外心毎念之賜賚不絶及卒帝泫然曰向所以越次建儲正為此子福氣差薄耳二子櫖柄櫖早卒右文殿修撰張栻卒栻病且死猶手疏勸帝親君子逺小人信任防一己之偏好惡公天下之理天下傳誦之卒年四十八帝聞之嗟嘆不已朱熹與黄幹字直卿福州閩縣人書曰吾道益孤矣栻潁悟夙成父浚愛之自幼學所教莫非仁義忠孝之實長師胡宏宏以孔門論仁親切之㫖告之栻退而思若有得丐宏稱之曰聖門有人矣栻益自奮勵以古聖賢自期作希顔録為人表裏洞然勇于從義無毫髪滯吝毎進對必自盟于心不可以人主意輙有所隨順帝毎言使節死義之臣難得栻對當于犯顔敢諫中求之若平時不能犯顔敢諫他日何望其仗節死義帝又言難得辨事之臣栻對陛下當木曉事之臣不當求辦事之臣若但求辦事之臣則他日敗陛下事者未必非此人也其逺小人尤嚴為都司日肩與出遇曽覿覿舉手欲揖栻急掩其窻欞覿慙手不得下所至郡暇日召諸生告語民以事至庭必隨事開曉其為條教大扺以正禮俗明倫紀為先斥異端毀淫祠而崇社稷山川古先聖賢之祀栻聞道甚蚤朱熹嘗言已之學乃録積寸累而成如敬夫則大本卓然先有見者也栻所著論語孟子説太極圖説洙泗言仁録諸葛武侯傳經世紀年行于世嘗言曰學莫先于義利之辨義者本心之當為非有為而為也有為而為則皆人欲非天理也學者稱為南軒先生夏五月以周必大參知政事謝廓然簽書樞密院事必大為翰林學士幾六年制命温雅周盡事情為一時詞臣之冠及拜參政帝謂之曰執政于宰相固當和而不同前此宰相議事執政更無語何也必大對曰大臣自應互相可否自秦檜當國執政不敢措一辭後遂以為當然陛下虚心無我人臣乃欲自是乎雖小事不敢有隱則大事何由蔽欺帝深然之冬十二月資政殿學士致仕胡銓卒諡忠簡辛丑八年金大定二十一年春正月詔罷内侍兼兵職時擬以徳夀宫提舉陳源帶浙西副總管給事中趙汝愚字子直漢恭憲王元佐七世孫居饒之餘于縣論駁以為不當帝諭宰執曰汝愚言有理且可防微杜漸進呈太上亦以為然遂詔自今内侍不得兼兵職樞密院遵守永為定制秋七月著作郎吕祖謙字伯恭婺州人卒祖謙先為著作郎以末疾乞辭歸帝命修皇朝文鑑既成除直秘閤是年仍遷著作郎兼國史院編修卒祖謙為夷簡五世孫自其祖好問始居婺州其學本家庭有中原文獻之傳長從林之竒汪應辰胡憲游而友張栻朱熹學以闗洛為宗旁稽載籍心平氣和不立崖異少卞急一日誦孔子躬自厚而薄責于人之言忽覺平時忿􅓰渙然氷釋朱熹嘗言學如伯恭方是能變化氣質其所講盡将以開物成務既臥病而任重道逺之志不衰居家之政皆可以為後世法著讀書記大事記皆未成書考定古周易書説閫範官箴辯志録行于世學者稱為東萊先生八月趙雄罷雄自四川幕官陳恢復之䇿為帝所竒不數年致位右相毎進見必言二帝在沙漠未嘗離諸口也及帝眷衰有言雄多私里黨者帝疑之會陳峴字夀南温州平陽人帥四川命從中出雄遂求去乃出知瀘州以王淮為右丞相兼樞密使淮既相問太子侍讀楊萬里字廷秀吉州吉水人曰宰相先務何事萬里曰人才淮因問其人萬里即疏朱熹袁樞字機仲建安人以下六十人九月以朱熹提舉浙東常平茶鹽冬十二月下熹社倉法于諸路浙東大饑王淮薦熹即日單車就道召入對首陳災異之由與修徳任人之説因及時政之缺凡七事帝深納之熹始拜命即移書他郡募米商蠲其征及至則米已輳集熹日鉤訪民隱按行境内單車屏徒從所至人不及知郡縣官吏憚其風采至自引去所部肅然凡政有不便于民者悉釐革之有短熹者謂其疏于為政帝謂王淮曰朱熹政事郤有可觀淮言脩舉荒政是行其所學民被實惠宜進職以旌之乃進熹直徽猷閣熹言乾道四年民艱食熹請于府得常平米六百石賑貸夏受粟于倉冬則加息計米以償自後隨年歛散歉蠲其息之半大饑則盡蠲之凡十有四年以元數六百石還府見儲米三千一百石以為社倉不復收息每石止收耗米三升以故一鄉四十五里間雖遇歉年民不缺食詔下其法于諸路其法以十家為甲甲推一人為首五十家則推一人通曉者其逃軍及無行之士與有税糧衣食不缺者並不得為社首入甲其應入甲者又問其願與不願願者問其一家大小口若干大口一石小口五斗五嵗以下者不預置籍以待之其以濕惡者不實還者有罰壬寅九年金大定二十二年秋九月以朱熹為江西提刑熹辭不拜朱熹行部至台知州唐仲友字與政金革人為其民所訟喜按得其實而仲友與王淮同里且為婣家已除江西提刑未行而熹論之淮匿其章不以聞時淮拜左丞相喜論益力章前後六上淮不得已奪仲友江西新命以授熹熹辭不拜遂乞奉祠癸卯十年金大定二十三年春正月以黄洽字徳淵福州侯官人為御史中丞洽為中丞盡言無隐然所論列未嘗攟摭細故嘗奏云因言固可以知人輕聴亦至于失人是故聴言不厭其廣廣則庶幾其無壅擇言不厭其審審則庶幾其無誤帝深然之洽為人質直端重有大臣體嘗言居家不欺親仕不欺君仰不欺天俯不欺人幽不欺鬼神何用求福報哉二月内侍陳源有罪竄郴州源提舉徳夀宫恃恩專恣其厮役亦補官帝聞而惡之乃竄郴州籍其家以進徳壽宮夏六月監察御史陳賈請禁道學王淮以唐仲友之故怒朱熹欲沮之吏部尚書鄭丙字少融福州長樂人雅厚仲友且迎合淮意乃上疏言近世士大夫有所謂道學者欺世盜名不宜信用帝已惑其説淮又以太府丞陳賈為監察御史賈因面對首論曰雅正之辦誠與偽而已表裏相副是之謂誠言行相違是之謂偽臣伏見近世道學之徒其説以謹獨為能以踐履為高以正心誠意克己復禮為事夷考其所為則大不然是假其名以濟其偽也臣願陛下明詔中外痛革此習毎于聴納除授之間考察其人擯斥勿用蓋指熹也帝從之從直學士院尤袤以程氏之學為陳賈所攻言于帝曰道學者堯舜所以帝禹湯文武所以王周公孔孟所以設教近立此名詆訾士君子故臨財不苟得所謂亷介安貧守道所謂恬退擇言顧行所謂踐履行已有恥所謂名節皆目之謂道學此召一立賢人君子欲自見于世一舉足且入其中其無得免此豈盛世所宜有願循名責實聴言觀行人情庶不壞于疑似帝曰道學豈不美之名正恐假托為姦真偽相亂尤袤字延之常州無錫人冬十一月壬戌朔日食甲辰十一年金大定二十四年春三月金主如㑹寧金主將如㑹寧諭太子守國太子以不諳政務辭金主曰政事無甚難但用心公正毋納纔邪久之自熟太子乃受守國寶乙巳十二年金大定二十五年夏四月金主還燕金主曲赦㑹寧府放免今年租税百姓年七十以上者補一官謂羣臣曰上京風物朕自樂之每奏還都輙用感愴祖宗舊鄉不忍舍去萬嵗之後當置朕于太祖之側卿等無忘朕言遂宴宗室宗婦于皇武殿賜官賞賚有差曰尋常朕不飲酒今日甚欲成醉此樂亦不易得也宗室婦女及羣臣故老以次起舞進酒金主曰吾來數月未有一人歌本曲者吾自為汝等歌之其詞道王業艱難及繼述之不易至慨想祖宗宛然如覩歌畢泣下羣臣宗戚捧觴上夀皆稱萬嵗于是諸夫人又歌本曲如私家之會既醉金主復續調至一鼓乃罷明日發上京宗室戚屬奉辭金主曰太平嵗久國無征徭汝等皆奢縱往往貧乏朕甚憐之當務儉約無忘祖宗艱難因泣下數行宗室戚屬皆感泣而退金主遂行丙午十三年金大定二十六年夏五月宴講臣于秘書省以進讀陸䞇奏議終篇賜侍讀蕭燧字昭鄰臨江軍人等御筵及金器鞍馬帝召宰執賜酒從容語曰自古人主讀書少有知道知之亦罕能行之唐徳宗豈不知書然所行不至與陸䞇論事皆使中人傳㫖且事有是非面相詰難猶恐未盡傳㫖安能盡邪投機之㑹間不容髪惟其若此誤事多矣故朕毎事以徳宗為戒賜處士郭雍字子和其先洛陽人號頤正先生雍父忠孝師事程頤著易説號兼山先生雍傳其學通世務隱居峽州乾道中守臣薦于朝召不起帝稔其賢毎對輔臣稱道之命所在州郡嵗時致禮存問至是賜號頤正先生令部使者遣官就問雍所欲言備録來上時雍年八十三矣秋八月日月五星聚軫己亥十四年金大定二十七年春二月以周必大為右丞相施師㸃字聖與上饒人知樞密院事時對事多言大臣異同必大曰各盡所見歸于一是豈可尚同陛下復祖宗舊制命三省覆奏而後行正欲上下相維非止奉文書也師㸃先拜參知政事十年八月帝謂曰卿靜重有守識慮深逺朕欲用卿乆矣及是遂有是命秋八月以留正字仲至泉州永春人從效六世孫參知政事正制置四川以簡素化民既而以簽樞召還事在十三年閏七月歸装僅書幾簏而已人服其清及是乃參知政事九月太上皇有疾冬十月帝罷朝侍疾赦太上皇崩遺誥太上皇后改稱皇太后帝致喪三年太上皇崩帝號慟擗踊踰二日不進膳謂王淮等曰晉孝武魏孝文實行三年喪服何妨聴政司馬光通鑑所載甚詳淮對曰晉武雖有此意後來在宫中止用深衣練冠帝曰當時羣臣不能將順其美光所以譏之自我作古何害于是詔曰大行太上皇帝奄棄至養朕當衰服三年羣臣自遵易月之令百官五上表請帝還内聼政不許至十二月辛丑禫祭百官釋服復三上表請御殿聽政不許遣使如金以上皇崩遣韋璞如金告哀復遣顔師魯字幾聖彭州龍泉人致太上遺留物于金金主以其中玉器五玻璃器二十及弓劍之屬命師魯歸報曰此皆爾國前主珍玩之物所宜寶藏以無忘追慕今受之義有所不忍也十一月詔皇太子參決庶務帝始以白布巾袍視事于延和殿朔望詣徳夀宫則衰絰而杖如初因詔太子參決庶務于議事堂左諭徳尤袤言于太子曰大權所在天下之所争趨甚可懼也願殿下事無大小一取上㫖而後行情無厚薄一付衆議而後定又曰儲副之位止于侍膳問安不交外事撫軍監國自漢至今多出權宜事權不一動有觸礙乞俟祔廟之後便行懇辭以彰殿下令徳十二月大理寺奏獄空金禁女真人學南人衣飾金主嘗謂從官曰女真舊風最為純直汝等當習學之不可忘也又曰凡資用當務節省勿妄費至是禁女真不得學南人衣飾戊申十五年金大定二十八年春正月復置補闕拾遺官時倣唐制立官帝自除左補闕薛叔似字象先其先河東人徙永嘉等已而叔似上疏劾王淮帝曰卿等官以補闕拾遺為名專主規正人主不任紏劾今所奏乃類彈擊甚非設官命名之意宜思自警三月金遣使弔祭帝遣中書簽正公事京鏜字仲逺豫章人為報謝使金人循故事設宴用樂鏜力辭金人不可鏜率其屬竟出館門館使以白金主曰南朝直臣也命如其請及還帝以其能執禮特進官權工部侍郎三月葬永思陵在紹興府會稽縣東南寶山洪邁請廟號世祖尤袤言光武以長沙王後布衣崛起不與哀平相繼其稱祖無嫌太上中興雖同光武實繼徽宗正統以子繼父非光武比乃定號高宗史臣曰高宗恭儉仁厚以之繼體守文則有餘揆亂反正則不足當其初立因四方勤王之師内相李綱外任宗澤天下之事宜無不可為者顧乃摘遷窮僻坐失事機始惑于汪黄終制于秦檜偷安忍恥匿怨忘親以貽來世之譏悲夫夏四月祔高宗主于太廟下詔曰朕比下令欲衰絰三年羣臣屢請御殿易服故以布素視事内殿雖有俟過祔廟勉從所請之詔然稽諸典禮心實未安行之終制乃為近古宜體至意勿復有請五月王淮罷淮為相能盡心事上惟以唐仲友故為道學之禁毒痡善類論者譏之六月以朱熹為兵部郎官既而罷之貶侍郎林栗字黄中福州福清人知泉州王淮既罷周必大薦熹為江西提刑入奏事或要于路曰正心誠意之論上所厭聞慎勿復言熹曰吾生平所學惟此四字豈可隱黙以欺吾君乎及入對首言天理人欲之辨畧曰陛下居虚明應物之地而天理有所未純人欲有所未盡是以為善不能充其量除惡不能去其根一念之頃公私邪正是非得失之機交戰于中願自今以往一念之項必察夫天理人欲果天理邪則敬以充之而不使少有壅閉果人欲邪則敬以克之而不使少有凝滯推而至于言語動作之問用人處事之際無不以是裁之則聖心洞徹而天下之事將惟陛下所欲為無不如志矣帝曰久不見卿浙東之事朕自知之今當處卿清要不復以州縣為煩也時曽覿已死王汴已逐獨内侍甘昪尚在熹力論之帝曰昪有才熹曰小人無才安能動人主除兵部郎官熹以足疾乞祠兵部侍郎林栗與熹論易西銘不合遂疏論之疏曰燾本無學術徙竊張載徑頤之緒餘謂之道學妄自推尊所至輙携門生數十人習為春秋戰國之能妄希孔孟歴聘之風今採其虚名将置朝列而熹聞命遷延邀索髙價既經陛對得㫖除郎而傲睨累日不肯供職緣熹既除兵部在臣合有統攝若不舉劾厥罪維均望将熹停罷以為事君無禮者之戒帝謂栗言過當而大臣畏栗之彊莫敢深論乃命熹依舊江西提刑周必大言熹上殿之日足疾未瘳勉强登對帝曰朕亦見其跛曵左補闕薛叔似亦奏言之大常博士葉適上疏曰考栗劾熹之辭始未參驗無一實者特發其私意而遂忘其為欺耳至于其中謂之道學一語利害所繫不獨于熹葢自昔小人殘害忠良率有指名或以為好名或以為立異或以為植黨近又創為道學之目鄭丙倡之陳賈和之居要津者密相付授見士大夫冇稍自潔修者輙以道學之名歸之以為善為玷缺以好學為已愆相與指目使不得進于是賢士惴慄中才解體銷聲滅影穢徳垢行以避此名往日王淮表裏臺諌隂廢正人葢用此術栗為侍從無以達陛下之徳意志慮而更襲用鄭丙陳賈密相付授之説且以道學為大罪文致語言逐去一熹固末甚害第恐自此正游詞無實讒言横生良善受禍何所不有伏望陛下紀細之所在絶欺罔于既形摧折暴横以扶善類奮發明斷以慰公言疏入不報葉適字正則永嘉人㑹胡晉臣字子逺蜀州人拜侍御史首劾栗喜同惡異無事而指學者為黨乃出栗知泉州而熹亦除直寶文閣奉祠而去秋七月恩平王璩卒帝友愛甚至毎召璩内宴呼以官而不名賜予無算卒追封信王八月甲子朔日食冬十二月以朱熹為崇政殿説書熹辭不至熹既歸投匭進封事言大本急務大本者陛下之心急務則輔翼太子選用大臣振舉紀網變化風俗愛養民力修明軍政凡此六事皆不可緩而本在于陛下之一心一心正則六事無不正一有人心私欲以介其問則雖憊精勞心不可為矣疏入夜漏下七刻帝已就寢急起秉燭讀之終篇明日除主管西太一宫兼崇政殿説書熹力辭乃以秘閣脩撰奉祠己酉十六年金大定二十九年春正月金主殂孫璟立是為章宗金主之太子允恭先卒以孫原王瑪達格舊作麻達葛今改判大興尹又以右丞相更名璟使親見朝廷議論習知政事之體至是金主殂璟即位追號金主曰世宗允㳟曰顯宗毋圖克坦氏為太后世宗于金最為賢主以昭徳后烏凌阿氏守節而死終身不立后雅尚儉棄命宫中之飾勿得用黄金嘗謂近臣曰朕于宫室惟恐過度其或興脩即損宫人嵗費以充之至于佛法尤所未信梁武帝為同泰寺奴遼道宗以民戸賜寺僧復加以三公之官其惑深矣又曰亡遼日屠羊三百亦豈能盡用徒傷生耳朕毎當食時嘗思貧民饑餒猶在已也彼身為惡而口祈福何益之有嘗謂宰相曰卿等在相省未嘗薦士止限資格安能得人又曰卿等職居輔曾無薦舉惟朕嘗言某人可用然後從而言之卿等既無所言必待朕知而後進用将復冇幾又曰帝王之政固以寛慈為徳然梁武帝專務寛慈以致綱紀大壞朕嘗思之賞罰不濫即是寛政又曰朕觀唐史見太宗行事初甚勵精晚年與羣臣議多飾詞朕嘗思始終如一今雖年高敬慎之心無時或怠又曰朕自即位以來言事者雖有狂妄未嘗罪之卿等未嘗肯盡言何也當言而不言是相疑也君臣無疑謂之嘉㑹事有利害可竭誠言之即位五載南北講和與民休息犀臣守職上下相安家給人足倉廪有餘刑部斷死罪嵗或十七人國人號稱小堯舜然舉賢之急求言之切不絶于口而犀臣不能将順其美以底大順惜哉以周必大留正為左右丞相帝自高宗崩即欲傳位太子嘗諭必大曰禮莫重于事宗廟而孟享多以病分詣孝莫大于執䘮而不得曰至德壽宫欲不退休得乎因密賜紹興傳位親札于必大命預草詔專以奉几筵侍東朝為意而進必大為首相二月辛酉朔日食帝傳位于太子太子即位是為光宗尊帝為壽皇聖帝皇后為壽成皇后皇太后為壽聖皇太后大赦先是更徳壽宫為重華宫皇太后徙居慈福宫帝傳位太子遂素服退居重華宫立皇后李氏安陽人慶逺節度使道之女后父道帥湖北聞道士皇甫坦蜀之夾江人善相人乃出諸女拜之坦見后驚不敢受拜曰此女當母天下坦言于高宗遂聘為恭王妃生嘉王擴性妬悍常訴帝左右于高宗及夀皇高宗不懌謂吳后曰是婦將種吾為皇甫坦所誤夀皇亦屢訓敕令以皇太后為法不然行當廢汝后疑其説出于太后憾之至是立為后三月廢補闕拾遺官御史中丞謝諤字昌國臨江軍新喻人論其不可廢不聼自是近臣罕進言者夏五月周必大罷初何澹字自然處州龍泉人與必大厚為司業久不遷留正奏遷之澹由是憾必大而徳正為諫議大夫首上疏攻必大罷之知閤門事姜特立字邦傑麗水人有罪免特立帝東官舊臣也帝即位命知閤門事聲勢寢盛留正列其招權預政之罪乞斥逐之帝意未決㑹参知政事缺特立謁正曰上以丞相在位久欲遷左相葉翥張杓即浚子二尚書當擇一人執政未知孰先正奏之帝大怒詔特立奉祠夀皇聞之曰留正真宰相也御批歴代通鑑輯覽卷八十八

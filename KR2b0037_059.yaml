front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷六十唐憲宗皇帝
  hash: sha256:bc9538d5282fec353a181a3c0dc5b1ff6d1ef249a7137c02a066a39626506a21
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_059-1a, image: WYG0337/WYG0337-0362a.png}
body:
  text: 元和八年春正月權德輿罷李吉甫李綘數爭論于上前德輿居中無所可否上鄙之故罷貶于頔為恩王名連代宗子傳初頔在山南憚上英威為子季友求尚主上以普寧公主妻之因諷使入朝德宗時加同平章事及是復加司空奉朝請既而頔以久留長安鬱鬱不得志有梁正言者自言與樞密使梁守謙同宗頔使其子敏賂之求出鎮久之正言詐漸露敏索還其賂不得誘其奴支解之事覺頔素服詣闕請罪左授恩王傳絶朝謁敏流雷州唐置今廣東雷州府是季友等皆貶官事連僧鍳虛鑒虛自貞元以來以財交權幸受方鎮賂遺厚自奉養吏不敢詰至是權幸爭為之言上欲釋之中丞薛存誠不可上遣中使詣臺宣旨存誠對曰陛下必欲釋此僧請先殺臣不然臣不奉詔上嘉而從之杖殺鑒虛薛存誠字資明寶鼎人徵四川節度使武元衡入知政事夏六月大水上以為隂盈之象出宫人二百車徙受降城此中受降城也注見前于天德軍元和志天德軍本安北都護舊理西受降城天寶中于大同川西築城名曰天安軍移焉乾元後改為天德軍西南移永清棚至元和八年復移軍于大同川之舊城先是振武注見前集覽是條釋振武為雁門考雁門即今代州唐書地理志代州育神武軍非振武也集覽誤河溢毁受降城節度使李光進奏請修城兼理河防李吉甫請徙于天德故城東南去中受降城二百里以避河患李絳盧坦以為受降城張仁願所築當磧口據虜衝要美水草守邉之利也欲避河患退二三里可矣天德故城僻處確瘠烽候不相應接虜忽唐突勢無由知是無故而蹙國二百里也城使周懷義奏利害與絳坦同上卒用吉甫策時以受降城騎士并𨽻天德軍李絳言于上曰邉兵徒有其數而無其實將帥但緣私役使聚其財貨以結權幸而已未嘗訓練以備不虞此不可不于無事之時豫留聖意也受降兵籍舊四百人及天德交兵才五十人器械一弓而已故絳言及之上驚曰邉兵乃如是其虛邪卿曹當加按閲㑹絳罷相而止秋九月吐蕃作烏蘭橋在今鞏昌府靖逺縣西南烏蘭關外唐于此置烏蘭縣後沒于吐蕃初吐蕃欲作烏蘭橋先貯材于河側祖厲河之側也祖厲音嗟賴河在靖逺縣西南北流入于南河朔方常潛遣人投之于河終不能成虜知節度王泌貪先厚賂之然後併力成橋仍築月城守之自是朔方禦冦不暇甲午九年春正月李絳罷絳屢以疾辭位至是罷為禮部尚書初上嘗謂宰相曰卿輩當為朕惜官勿用之私親故李吉甫權德輿皆謝不敢絳曰崔祐甫有言非親非故不諳其才諳者尚不與官不諳者何敢復與但問其才器與官相稱否耳若避親故之嫌使聖朝虧多士之美此乃偷安之臣非至公之道也茍所用非其人則朝廷自有典刑誰敢逃之上以為然又嘗問絳人言外間朋黨大甚何也絳對曰自古人君所甚惡者莫若朋黨故小人譖君子者必曰朋黨蓋言之則可惡尋之則無跡以此目之則天下之賢人君子無能免者此東漢之所以亡也願陛下深察之夫君子困與君子合豈可必使之與小人合然後謂之非黨邪以吐突承璀為神䇿中尉初上欲相李絳先出吐突承璀為淮南監軍至是絳既罷召還承璀復以為左神䇿中尉夏五月復置宥州在今鄂爾多斯右翼前旗有新舊二州俱唐置元和志廢宥州在鹽州東北三百里開元二十六年置寶應後廢新宥州在廢宥州東北三百里元和九年置李吉甫奏開元中置宥州以領降戶寶應以來因循遂廢今請復之以備回鶻撫党項上從之先是回鶻屢請昏朝廷以費廣未許李絳言回鶻凶彊不可無備淮西窮蹙事更經營萬一北邉有警則非步騎數萬不足抗禦而淮西遺醜復延嵗月之命為國家費豈特降主之比哉上不聼六月以張𢎞靖字元理延賞子同平章事𢎞靖宰相子少有令名厯官河中節度使及是遂入相自張嘉貞及延賞𢎞靖三世為相時號其里第曰三相張家秋七月以岐陽公主適司議郎杜悰字永裕佑之孫翰林學士獨孤郁權德輿之壻也上嘆郁之才美曰德輿得壻郁我反不及邪先是尚主皆取勳戚之家上始命宰相選公卿子弟可居清貫猶言清職者諸家皆不願惟杜佑孫悰不辭遂以悰尚岐陽公主公主上長女郭妃曖之女所生有賢行杜氏大族尊行不翅數十人公主卑委怡順一同家人禮度二十餘年人未嘗以絲髮間指為貴驕始至與悰謀曰上所賜奴婢卒不肯窮屈奏請納之悉自市寒賤可制指者自是閨門落然不聞人聲閏月吳少陽死少陽在蔡州隂聚亡命抄掠夀州茶山壽州與六安霍山接界山多産茶以實其軍至是死其子元濟匿喪自領軍務初少陽聞吳武陵名請為賔友武陵不答至是以書喻元濟曰人情一也足下反天子部曲亦欲反足下易地而處則情可知矣先是少陽判官蘇兆楊元卿大將侯惟清皆勸少陽入朝及是元濟殺兆囚惟情元卿先奏事在長安具以淮西虛實及取元濟之䇿告李吉甫元濟殺其妻子而以董重質為謀主李吉甫言于上曰淮西非如河北四無黨援而國家常宿數十萬兵以備之勞費不支失今不取後難圖矣上將討之張𢎞靖請先為少陽輟朝贈官遣使弔贈待其有不順之迹然後加兵上從之遣工部員外郎李君何弔祭不得入而還少吳武陵信州人董重質吳誠之壻以烏重𦙍為汝州刺史李吉甫以為汝州捍蔽東都而河陽宿兵本以制魏博今田𢎞正歸順則河陽為內鎮不應屯重兵以示猜阻以烏重𦙍兼汝州刺史使徙鎮之加𢎞正檢校右僕射賜其軍錢二十萬緍𢎞正曰吾未若移河陽軍之為喜也冬十月同平章事李吉甫卒十二月以韋貫之同平章事李吉甫繪淮西地圖未及上而卒上敇其子獻之以貫之同平章事貫之先為禮部侍郎所取士抑浮華先實行嘗從客奏曰禮部侍郎重于宰相上曰侍郎是宰相除安得重對曰然然為陛下柬宰相者得無重乎上美其言改尚書右丞未幾遂相乙未十年春正月吳元濟反制削其官爵發兵討之吳元濟縱兵侵掠及東畿制削其官爵發十六道兵討之時又詔鄂嶽觀察使柳公綽以兵五千授安州刺史李聼討元濟公綽曰朝廷以吾書生不知兵邪即奏請自行許之至安州署聼都知兵馬使選卒六千屬之戒曰行營之事一决都將聼感恩畏威如出麾下公綽號令整肅區處軍事詣將皆服士卒在行營者厚給其家妻淫泆者沈之于江士卒皆喜故每戰皆捷公綽所乘馬踶殺圉人公綽命殺馬以祭之栁公綽字寬華原人李聼字正思晟之子三月以柳宗元為柳州唐置今廣西柳州府是刺史劉禹錫為連州隋置今州𨽻廣東刺史王叔文之黨十年不量移執政有憐其才欲漸進之者悉召至京師諫官爭言其不可上亦惡之皆以為逺州刺史宗元得栁州禹錫得播州注見前宗元曰播州非人所居而夢得親在堂萬無母子俱往理欲請于朝以柳易播中丞裴度亦以禹錫母老為上言上曰為人子不自謹貽親憂此則重可責也度曰陛下方侍太后恐禹錫在所宜矜上良久乃曰朕所言以責為子者耳然不欲傷其親心退謂左右曰裴度愛我終切禹錫得改連州宗元善為文雖坐廢名蓋一時在柳州頗著政績既殁州人懷之廟于羅池以祀焉禹錫自朗州還作元都觀看花詩語譏忿當路者不喜後入為主客郎中復作遊元都觀詩且言始謫十年還京師道士種桃其盛若霞又十四年過之無復一存唯兔葵燕麥動搖春風耳意詆摧近聞者益薄之尋以裴度薦為集賢直學士度罷出為蘇州刺史以政最賜金紫㑹昌中卒田𢎞正遣其子布將兵助討淮西盜焚河隂轉運院李師道數上表請赦吳元濟上不從師道使大將將二千人趨夀春聲言助官軍實以援元濟也師道素養刺客姦人數十人說師道曰用兵所急莫先糧儲今河隂院積江淮租賦請潛往焚之因劫東都焚宫闕亦救蔡一竒也師道從之遣攻河隂轉運院燒錢帛三十餘萬緍匹榖二萬餘斛人情恇懼多請罷兵上不許夏五月遣御史中丞裴度宣慰淮西行營諸軍討淮西久未有功上遣裴度詣行營宣慰察用兵形勢度還言淮西必可取之狀且曰觀諸將惟李光顔勇而知義必能立功既而光顔數敗賊軍上以度為知人知制誥韓愈亦言淮西三小州殘弊困劇之餘而當天下之全力其破敗可立而待然所未可知者在陛下斷與不斷耳六月盜殺中書侍郎同平章事武元衡擊傷裴度首上悉以兵事委武元衡師道客曰天子所以鋭意誅蔡者元衡贊之也請密往刺之元衡死則他相不敢主其謀爭勸天子罷兵矣師道資給遣之王承宗亦遣牙將尹少卿奏事且詣中書為元濟遊說辭指不遜元衡叱出之承宗又上書詆元衡至是元衡入朝有賊自暗中射殺之取其顱骨而去又擊裴度傷首墜溝中京城大駭于是詔宰相出入加金吾騎士張弦露刃以衛之賊遺紙于金吾府縣曰毋急捕我我先殺汝故捕賊者不敢甚急兵部侍郎許孟容見上言自古未有宰相橫尸路隅而盜不獲者此朝廷之辱也因涕泣又詣中書揮涕言請奏起裴中丞為相大索賊黨于是詔內外搜捕購賞甚厚主士則告承宗遣卒張晏所為捕得鞫之詔出承宗表并議其罪晏等其服張𢎞靖以為疑屢言之上不聼誅晏等而師道客潛遁去以裴度同平章事度病創臥二旬詔以衛兵宿其第中使問訊不絶或請罷度官以安恆鄆之心上怒曰若罷度官是姦謀得成朝廷無復綱紀吾用度一人足破二賊遂以度為相度言淮西心腹之疾不得不除且朝廷業已討之兩河跋扈者將視此為髙下不可中止上以為然悉以用兵事委度討賊愈急初德宗多猜忌朝士有相過從者金吾皆伺察以聞宰相不敢私第見客度癸今冦盜未平宰相宜招延四方賢才與恭謀議請于私第見客許之秋七月詔絶王承宗朝貢八月己亥朔日食李師道遣兵襲東都捕得伏誅師道置留後院于東都潛內兵數百人謀焚宫闕縱兵殺掠其小卒詣留守吕元膺告變元膺發兵圍之賊衆突出望山而遁都城震駭時留兵寡弱元膺坐皇城門部分指使意氣自若都人賴以安東都西南皆髙山深林民不耕種専以射獵為生人皆趫勇謂之山棚元膺設重購以捕賊數日有山棚遇賊走召其儕引官軍共圍獲之按驗得其魁乃中嶽寺僧圓淨為師道買田伊闕陸渾山間以舍山棚而衣食之捕獲伏誅圓淨本史思明將勇悍過人時年八十餘捕者得之奮鎚擊其脛不能折圓淨罵曰鼠子折人脛且不能敢稱健兒乃自置其脛教使折之臨刑嘆曰誤我事不得使洛城流血黨與死者凡數千人留守將及驛卒數人皆受其職名元膺鞫圓淨黨與始知殺武元衡者乃師道也元膺密以聞上業已討王承宗不復窮治是冬盜焚柏崖倉又焚獻陵寢宫永巷明年春盜復斷建陵門㦸九月以韓𢎞為淮西諸軍都統初上以嚴綬在河東所遣禆將多立功故使鎮襄陽且督諸軍討淮西綬無他材能但傾府庫以賚士卒賂宦官擁衆經年無尺寸功裴度屢言其軍無政乃以韓𢎞為諸軍都統𢎞亦欲倚賊自重不願淮西速平時李光顔戰最力𢎞欲結之索得一美婦人容色絶世遣使遺之光顔乃大饗將士謂使者曰戰士數萬皆棄家逺來冒犯白刃光顔何忍獨以聲色自娛悅乎因流涕坐者皆泣乃即席厚贈使者并妓返之曰為光顔多謝相公光顔以身許國誓不與逆賊同戴日月死無二矣丙申十一年春正月張𢎞靖罷王承宗縱兵四掠幽滄定三鎮皆苦之爭上表請討承宗上欲許之𢎞靖以為兩役並興恐國力不支請併力平淮西乃征恆冀上不為之止𢎞靖乃求罷出為河東節度使翰林學士錢徽字蔚章吳興人知制誥蕭俯罷時羣臣請罷兵者衆上患之故黜徽俯以警其餘制削王承宗官爵發兵討之韋貫之屢請先取吳元濟後封承宗曰陛下不見建中之事乎始於討魏及齊而蔡燕趙皆應之卒致朱泚之亂由德宗不能忍數年之憤欲太平之速成故也上不聼諸軍討王承宗者互相觀望獨昭義節度使郗士美字和夫兗州金鄉人引精兵壓其境大破承宗之衆于柏鄉隋縣今屬趙州二月以李逢吉字虛舟元道曾孫同平章事逢吉知禮部貢舉未巳事即拜同平章事詔禮部尚書王播字明敡揚州人署榜逢吉險譎多端既得位務償好惡三月皇太后王氏崩諡莊憲合葬豐陵夏四月以皇甫鎛涇州臨涇人判度支鎛始以聚斂得幸六月唐鄧節度使髙霞寓大敗于鐡城在今汝寧府遂平縣西南胡三省注即文城柵以其堅不可破故謂之鐡城時諸將討淮西者勝則虛張殺獲敗則匿之至是大敗不可掩始上聞中外駭愕宰相入見將勸罷兵上曰勝負兵家之常今但當論用兵之略察將帥之不勝任者易之兵食不足者助之耳豈得以一將失利遽議罷兵邪于是獨用裴度之言他人言罷兵者亦稍息矣秋八月韋貫之罷貫之性高簡好甄别流品又數請罷兵故罷為吏部侍郎九月李光顔烏重𦙍拔淮西陵雲栅在今陳州府商水縣故溵水城西南當郾城之東先是光顔重𦙍敗淮西兵于陵雲栅及是遂拔之加李師道檢校司空師道聞拔陵雲而懼詐請輸欵上以力未能討加檢校司空冬十一月以栁公綽為京兆尹公綽初赴府有神䇿小將躍馬衝其前導公綽駐馬杖殺之明日入對上怒詰之對曰京兆為輦轂師表今視事之初而小將敢爾唐突此乃輕陛下詔命非獨慢臣也臣知杖無禮之人不知其為神䇿軍將也上曰何不奏對曰臣職當杖之不當奏上退謂左右曰汝曹須作意此人朕亦畏之加李光顔等檢校官討淮西諸軍近九萬上怒諸將久無功命梁守謙宣慰因留監軍先加李光顔等檢校官而詔書切責示以無功必罰十二月以李訴字元直聼之兄為唐鄧節度使先是高霞寓兵敗坐貶以袁滋為彰義節度使理唐州滋至州吳元濟圍其新興栅宋白曰栅在吳房縣西南吳房故城在今汝寧府遂平縣西滋卑辭以請之元濟由是不復以滋為意朝廷知之貶滋以李訴代之訴至唐州知士卒憚戰謂之曰天子知訴柔懦故使拊循爾曹至于戰攻進取非吾事也衆始信而安之訴親行視士卒傷病者存恤之不事威嚴或以軍政不肅為言訴曰吾非不知也袁尚書專以恩惠懷賊賊易之聞吾至必增備吾故示之以不肅彼必以吾為懦而懈惰然後可圖也淮西人輕訴不為備初置淮潁水運使楊子院米自淮隂泝淮入潁至項城本漢項縣隋改項城今屬陳州府入溵輸于郾城以饋淮西行營省汴運之費七萬餘緡丁酉十二年春二月置淮西行縣淮西被兵數年竭倉廪以奉戰士民多無食采菱芡魚鱉鳥獸食之亦盡多降官軍敕置行縣以撫之三月淮西文城栅即鐡城注見上降李訴遣十將軍中小校也馬少良將十餘騎巡邏遇吳元濟捉生虞侯丁士良與戰擒之士良元濟驍將常為東邉患衆請刳其心訴許之士良無懼色訴命釋其縳士良請盡死以報德訴署為捉生將士良言于訴曰吳秀琳據文城栅為賊左臂官軍不敢近者有陳光洽為之謀主也光洽勇而輕好自出戰請為公擒之則秀琳降矣遂擒光洽以歸秀琳果以栅降訴引兵入據其城秀琳將李憲有才勇訴更其名曰忠義而用之于是軍氣復振人有欲戰之志既而董昌齡蔡人以郾城降元濟以昌齡為郾城令而質其母楊楊謂昌齡曰順死賢于逆生汝去逆而吾死乃孝子也從逆而吾生是戮吾也㑹官軍進逼郾城昌齡乃舉城降李光顔入據之元濟聞之甚懼時董重質守洄曲一名時曲在商水縣西南溵水于此洄曲故名元濟悉發親近及守城卒詣重質以拒官軍昌齡授郾城令兼監察御史後蔡平而母在封北平郡太君夏五月罷河北行營六鎮討王承宗者兵十餘萬厯二年無功月費度支錢十五萬緡李逢吉及朝士多言宜併力先取淮西俟淮西平乘勝取恆冀如拾芥耳上從之罷河北行營李訴擒淮西將李祐字慶之史不詳何所人訴與吳秀琳謀取蔡秀琳曰非得李祐不可秀琳無能為也祐有勇略守興橋栅在遂平縣東南時帥士卒割麥于張柴村在文城柵之東訴召廂虞侯史用誠以三百騎伏林中誘而擒之以歸將士爭請殺之訴釋縳待以客禮時時召祐及李忠義屏人語或至夜分他人莫預聞諸將恐祐為變多諫訴諸軍亦日有牒稱得賊諜者言祐為賊內應訴恐謗先逹于上已不及救乃械祐送京師先密奏曰若殺祐則無以成功詔以還訴署散兵馬使令佩刀巡警出入帳中或與同宿密語逹曙有竊聼者但聞祐感泣聲舊軍令含賊諜者屠其家訴除其令使厚待之諜反以情告訴訴益知賊中虛實嘗遣兵攻朗山不利衆皆悵恨訴獨歡然曰此吾計也乃募敢死士三千人號曰突將朝夕自教習之使常為行備朗山隋縣今汝寧府確山縣是六月吳元濟請降元濟兵勢日蹙上表請罪願束身自歸詔許之而為董重質等所制不得出秋七月大水以孔戣為嶺南節度使先是明州唐置今浙江寧波府是嵗貢蚶呼甘反蚌屬橫縱其理五味自充蛤葛合反小于蚶而殼薄其文如貝水陸遞夫勞費華州刺史孔戣奏罷之至是嶺南擇帥宰相奏擬數人上皆不用曰頃有諫進蚶蛤者可與也乃以戣為嶺南節度使以裴度兼彰義節度使充淮西宣慰招討使崔羣同平章事考唐書憲宗紀崔羣同平章事在是年七月丙辰與裴度使淮西制同日俱下通鑑因之綱目移在九月今改正諸軍討淮西四年不克饋運疲弊上亦病之宰相李逢吉等競言師老財竭意欲罷兵度獨無言上問之度曰臣誓不與此賊俱生今請自往督戰且元濟勢實窘迫但諸將心不一不併力迫之故未降耳若臣自詣行營諸將恐臣奪其功必爭進破賊矣上悅命度以平章事兼節度使仍充宣慰招討處置使以戶部侍郎崔羣同平章事制下度奏刑部侍郎馬總字㑹元扶風人為宣慰副使右庶子韓愈為行軍司馬將行言于上曰臣若滅賊則朝天有期賊在則歸闕無日上為之流涕御通化門送之李逢吉不欲討蔡翰林學士令狐楚字榖士德棻之裔與逢吉善度恐其合中外之勢以阻軍事乃請改制書數字且言楚草制失辭罷之度遂行以郾城為治所先是諸道皆有中使監陳進退不由主將勝則先使獻捷不利則陵挫百端度悉奏去之諸將始得專其軍事戰多有功九月李逢吉罷逢吉既與裴度異議上知而惡之遂罷為東川節度使初上為廣陵王布衣張宿以辨口得幸及即位纍官至比部員外郎招權受賂逢吉惡之上欲以宿為諫議大夫逢吉曰宿小人豈得竊賢者之位必欲用宿請先去臣上不悅㑹逢吉罷遂竟用宿張宿本寒人自云諸生李訴攻吳房入其外城李訴將攻吳房諸將曰今日往亡隂陽家說八月以白露後十八日為往亡九月以寒露後二十七日為往亡訴曰吾兵少不足戰宜出其不意彼以往亡不吾虞正可擊也遂往克其外城而還淮西將孫獻忠以驍騎五百追擊其背衆驚將走訴下馬據胡牀令曰敢退者斬返斾力戰斬獻忠或勸訴乘勝攻其子城可拔也訴不聼引還冬十月李訴夜襲蔡州擒吳元濟檻送京師李祐言于李訴曰蔡之精兵皆在洄曲守州城者皆羸卒可以乘虛直抵其城比賊將聞之元濟已成擒矣訴然之十月遣掌書記鄭澥白裴度度曰兵非出竒不勝常侍良圖也訴乃命祐及李忠義帥突騎三千為前驅自與監軍將三千人為中軍李進誠將三千人殿其後軍出不知所之訴但東行行六十里夜至張柴村盡殺其戍卒及烽子守烽之卒據其柵命士卒少休食乾糒整羈靮留五百人鎮之以斷朗山救兵又分兵以斷洄曲及諸道橋梁復夜引兵出諸將請所之訴曰入蔡州取吳元濟諸將皆失色監軍哭曰果落李祐姦計時大風雪旌旗裂人馬凍死者相望人人自以為必死然畏訴莫敢違夜半雪愈甚行七十里至州城近城有鵝鴨池訴令擊之以混軍聲自吳少誠拒命官軍不至蔡州城下三十餘年故蔡人不為備四鼓訴至無一人知者祐忠義钁鋤也其城以先登壯士從之殺守門卒而留擊柝者使擊柝如故遂開門納衆雞鳴雪止訴入居元濟外宅或告元濟曰官軍至矣元濟不信起聼于庭聞訴軍號令曰常侍傳語應者近萬人始怯曰何等常侍能至於此乃帥左右登牙城拒戰時董重質擁精兵萬餘人據洄曲訴曰元濟所望者重質之救耳乃訪重質家厚撫之遣其子傳道持書諭重質重質遂單騎詣訴降訴攻牙城燒其南門民爭負芻薪助之門壞執元濟檻送京師且告于裴度是日申光二州及諸鎮兵二萬餘人相繼來降自元濟就擒訴不戮一人自官吏帳下厨廄之卒皆復其職使之不疑然後屯于鞠場以待裴度諸將請曰公始敗于朗山而不憂勝于吳房而不取冒大風甚雪而不止孤軍深入而不怯然卒以成功皆衆人所不喻也敢問其故訴曰朗山不利則賊輕我不為備矣取吳房則其衆奔蔡併力固守故存之以分其兵風雪隂晦則烽火不接不知吾至孤軍深入則人皆致死戰自倍矣夫視逺者不顧近慮大者不計細若矜小勝恤小敗先自撓矣何暇立功乎衆皆服訴儉于奉已而豐于待士知覽不疑見可能斷所以成功以李鄘同平章事初吐突承璀為淮南監軍鄘為節度使性剛嚴與承璀互相敬憚故未嘗相失承璀既歸遂引鄘為相已而鄘至京師恥由宦官進遂辭疾不入見不視事未幾罷為戶都尚書裴度入蔡州度建彰義節將降卒萬餘人入城李訴躬具櫜鞬櫜姑勞反以藏弓鞬居言反以藏箭出迎拜于路左度將避之訴曰蔡人頑悖不識上下之分數十年矣願公因而示之使知朝廷之尊度乃受之訴還軍文城度以蔡卒為牙兵或諫曰蔡人反仄者尚多不可不備度笑曰吾為彰義節度使元惡既擒蔡人則吾人也又何疑焉蔡人聞之感泣先是吳氏父子阻兵禁人偶語然燭有以酒食相遇從者罪死度除其禁蔡人始知有生民之樂詔淮西百姓給復二年近賊四州免來年夏稅官軍戰亡者皆為收葬給其家十一月帝御門受俘誅吳元濟上御興安門受俘以吳元濟獻于廟社而斬之初淮西之人劫于李希烈吳少誠之威虐不能自拔久而老者衰幼者壯安于悖逆不復知有朝廷矣自少誠以來違將出兵皆不束以法制聼各以便宜自戰人人得盡其才故以三州之衆舉天下之兵環而攻之四年然後克之賜李訴爵涼國公韓𢎞等遷官有差李祐以功授神武將軍董重質雖降上以其為元濟謀主欲殺之李訴奏先許重質不死乃貶春州唐置今肇慶府陽春縣是司戶以宦者為館驛使舊制御史一人知驛至是詔以宦者為館驛使左補闕裴潾聞喜人諫曰內臣外事職分各殊切在塞侵官之源絶出位之漸事有不便必戒于初令或有妨不必在大上不聼十二月賜度晉國公復入知政事戊戌十三年春正月李師道奉表納質并獻三州初李師道謀逆命幕僚髙沐郭昈李公度屢諫之判官李文㑹孔目官林英譖沐殺之昈亦被囚及淮西平師道憂懼公度說之使遣子入侍并獻沂海密三州以自贖師道從之上遣左散騎常侍李遜字友道宗室逺裔居荆州詣鄆州宣慰遜至鄆州師道先惑其妻之言中悔乃嚴兵見遜遜盛氣正色責其決語師道謝曰既重煩朝使何敢復有二三遜歸言于上曰師道愚頑反復必須用兵既而師道表言軍情不聼納質割地上怒決意討之二月修麟德殿浚龍首池在西安府唐東內苑中引龍首渠之水自城南注此起承暉殿上命六軍修麟德殿龍武統軍張奉國大將軍李文悅以外寇初平營繕太多白宰相兾有論諫裴度言之上怒貶奉國等于是浚龍首池起承暉殿土木浸興矣以李夷簡同平章事時李鄘罷相遂以夷簡同平章事夷簡相數月上方委裴度以用兵夷簡自謂才不及度求出鎮乃罷為淮西節度使橫海節度使程權入朝權自以世襲滄景與河北三鎮無殊內不自安表請舉族入朝許之橫海將士樂自擅不聼權去掌書記林藴諭以禍福權乃得出詔以藴為禮部員外郎滄景自程日華至權入朝凡傳十有六年夏四月王承宗納質請吏復獻二州詔復其官爵裴度之在淮西也布衣柏耆史不詳何所人以䇿干韓愈曰元濟就擒承宗破膽矣願得奉丞相書往說之可不煩兵而服愈白度為書遣之承宗懼求哀于田𢎞正請以二子為質及獻德棣二州輸租稅請官吏𢎞正為之請上許之𢎞正遣使送其二子知感知信及二州圖印至京師幽州大將談忠亦說劉總曰自元和以來劉闢李錡田季安盧緃史吳元濟阻兵馮險自以為深根固蒂天下莫能危也然顧盼之間身死家覆此非人力所能及殆天誅也况今天子神聖威武苦身焦思縮衣節食以養戰士此志豈須臾忘天下哉今國兵駸駸北來趙人已獻城十二深為公憂之總泣曰聞先生言吾心定矣遂專意歸朝廷賜六軍辟仗使印舊制以宦官為六軍辟仗使如方鎮之監軍無印及張奉國等得罪至是始賜印得糾繩軍政事任專逹矣六月癸丑朔日食秋七月詔諸道發兵討李師道先是上謀討師道以李光顔為義成節度使鎮滑州及是下制罪狀師道令宣武魏博義成武寧元和二年置武寧節度領徐泗濠三州橫海兵共討之以皇甫鏄程异同平章事淮西既平上浸驕侈判度支皇甫鎛鹽鐡使程异曉其意數進羡餘由是有寵又以厚賂結吐突承璀上遂以為宰相制下朝野駭愕至于市道負販者亦嗤之裴度崔羣極諫其不可上不聼度恥與小人同列求退不許乃上疏曰鎛异皆錢殺俗吏佞巧小人陛下一旦置之相位中外駭笑况鎛在度支專以豐取刻與為務中外仰給之人無不思食其肉比者裁損淮西糧料幾至潰亂程异雖人品庸下然心事和平可處煩劇不宜為相臣若不退天下謂臣無恥臣若不言天下謂臣負恩今退既不許言又不聼臣如烈火燒心衆鏑叢體所可惜者淮西蕩定河北底寧承宗斂手削地韓𢎞輿疾討賊豈朝廷之力能制其命哉直以處置得宜能服其心耳陛下建升平之業十已八九何忍還自墜壞使四方解體乎上以度為朋黨不之省鎛自知不為衆諸所與益為巧諂以自固時內出積年繒帛什度支令賣鎛悉以髙價買之以給邉軍其繒帛朽敗隨手破裂邉軍聚而焚之度因奏事言之鎛于上前引其足曰此靴亦內庫所出臣以錢二千買之堅究可久服度言不可信上以為然由是鎛益無所殫程异亦自知不合衆心能亷謹謙遜為相月餘不敢知印秉筆故終免于過其後上語宰相曰人臣常力為善何乃好立朋黨度對曰方以類聚物以羣分君子小人志趣同者勢必相合君子為徒謂之同德小人為徒謂之朋黨外雖相似內實懸殊在聖主辨其所為邪正耳冬十一月以栁泌本楊仁更姓名為台州唐置今浙江台州府是刺史上好神仙詔天下求方士宗正卿李道古曹王臯之子因皇甫鎛薦山人柳泌云能合長生藥泌言天台山名在今台州府天台縣北山當斗牛之分上應台宿故名天台多靈草誠得為彼長吏庶幾可求上以泌權知台州刺史諫官爭論奏以為人主喜方士未有使之臨民者上曰煩一州之力而能為人主致長生臣子亦何愛焉由是羣臣俱莫敢言十二月田𢎞正將兵渡河逼鄆州先是𢎞正請自黎陽渡河討李師道裴度曰魏博軍既渡河即當仰給度支或與光顔互相疑阻則必益致遷延與其度河而不進不若養威于河北宜且使之秣馬厲兵俟霜降水落自楊劉在今泰安府東阿縣北宋以前前黃河津渡口渡河直指鄆州則賊衆搖心矣上從之是月𢎞正將魏博全師自楊劉渡河距鄆州四十里築壘城中大震既而魏博義成軍送所獲鄆州牙將夏侯澄等四十餘人上皆釋勿誅各什行營驅使曰若有父母欲歸者優給遣之朕所誅者師道而已于是賊中聞之降者相繼己亥十四年春正月遣中使迎佛骨至京師貶韓愈為潮州隋置今廣東潮州府是刺史先是功德使上言鳳翔法門寺塔有佛指骨相傳三十年一開開則嵗豐人安來年應開請迎之上從其言至是佛骨至京師留禁中三日厯送諸寺王公士民瞻奉捨施惟恐弗及刑部侍郎韓愈上表諫略曰昔者黃帝以至禹湯文武皆享壽考百姓安樂當是時中國未有佛也漢明帝時始有佛法其後亂亡相繼逢祚不長宋齊梁陳元魏以下事佛漸謹年代尢促惟梁武帝在位四十八年前後三度捨身施佛竟為侯景所逼餓死臺城事佛求福乃更得禍由此觀之佛不足信亦可知也夫佛與中國言語不通衣服殊製不知君臣之義父子之恩假如其身尚在來朝京師陛下客而接之不過宣政一見禮賓一設賜衣一襲衛而出之于境不令惑衆也况其身死已久枯朽之骨豈宜以入宫禁乞付有司投諸水火永絶根本斷天下之疑絶後代之惑佛若有靈能作禍福凡有殃咎宜加臣身上天鑒臨臣不怨悔上得表大怒將加愈極刑裴度崔羣言愈雖狂發于忠懇宜寬容以開言路乃貶潮州刺史二月平盧都將劉悟執李師道斬之田𢎞正李訴屢敗平盧兵李師道發民治城塹役及婦人民懼且怨都知兵馬使劉悟悟先于宣武逃至澤潞師道迎而用之將兵萬餘人屯陽榖隋縣今屬兗州府以拒官軍務為寬惠使士卒人人自便軍中號曰劉父或謂師道曰悟專收衆心恐有他志師道潛遣二使齎帖授行營副使張暹令斬悟暹素與悟善懷帖示之悟召諸將謂曰悟與公等不顧死亡以抗官軍誠無負於司空今司空信讒來取悟首悟死諸公其次矣且天子所欲誅者獨司空一人今軍勢日蹙吾曹何為隨之滅族欲與諸公還入鄆州奉行天子之命豈徒免危亡富貴可圖也有後應者皆立斬之衆懼皆曰惟都頭命軍中稱都將為都頭乃令士卒夜半即行人銜枚馬縳口天未明悟先遣十人宣言劉都頭至比悟軍至城下城中噪譁動地子城門已洞開牙中兵不滿數百皆投弓矢于地悟勒兵捕師道與二子斬之慰諭軍民斬贊師道逆謀者二十餘家文武將吏且懼且喜函師道父子三首送田𢎞正營𢎞正大喜露布以聞淄青等十二州皆平自李正已據淄青至師道凡三世五十四年而滅上命戶部侍郎楊於陵宣撫淄青分其地為三道以鄆曹濮為一道淄青齊登萊為一道兗海沂密為一道自廣德以來垂六十年藩鎮跋扈河南北三十餘州自除官吏不供貢賦至是盡遵朝廷約束矣裴度纂述蔡鄆用兵以來帝之憂勤機略因侍宴獻之請內印出付史官帝曰如此似出朕志非所欲也弗許以劉悟為義成節度使上欲移悟他鎮恐悟不受代復須用兵密詔田𢎞正察之𢎞正日遣使者修好以觀其所為悟得鄆州三日教手搏而庭觀之搖肩攘臂離坐以助其勢𢎞正聞之笑曰是何能為密表以聞上乃以悟為義成節度使悟聞制下手足失墜明日遂行而𢎞正己將數道兵至城西矣先是賊數遣人入關截陵㦸焚倉場流矢飛書以動京師有司督察甚嚴終不能絶及𢎞正閲李師道簿書有賞殺武元衡人王士元等及賞潼關蒲津吏卒案乃知嚮者皆吏卒受賂容其姦也𢎞正送士元等十六人詔有司鞫之皆欵服悉誅之夏四月詔諸道支郡旁郡也兵馬並令刺史領之橫海節度使烏重𦙍奏曰河朔藩鎮所以能旅拒朝命者由諸州縣各置鎮將領事收刺史縣令之權也嚮使刺史各得行其職則雖有姦雄如安史必不能以一州獨反也臣所領德棣景三州已舉牒各還刺史職事應在州兵並令刺史領之故有是詔其後河北諸鎮惟橫海最為順命由重𦙍處之得宜故也裴度罷為河東節度使度在相位知無不言皇甫鎛之黨擠之詔度以平章事鎮河東鎛専以掊克取媚人無敢言者獨諫議大夫武儒衡字廷碩元衡從父弟上疏言之鎛自訴于上上曰卿欲報怨邪鎛乃不敢言史館修撰李翺上疏曰定禍亂者武功也興太平者文德也今陛下既以武功定海內若遂革弊事復舊制用忠正而不疑屏邪佞而不邇改稅法不督錢而納布帛絶進獻寬百姓租賦厚邉兵以制戎狄數訪問待制官以通塞蔽此六者政之根本太平所以興也陛下既已能行其難若何不為其易乎以陛下天資上聖如不惑近習容悅之辭仕鯁骨正直之士與興大化可不勞而成也若其不然臣恐大功之後逸欲易生進言者必曰天下既平陛下可以高枕自逸則太平未可期也郡李翺字習之趙人秋七月宣武節度使韓𢎞入朝𢎞始入朝上待之甚厚𢎞獻馬三千絹五千雜繒三萬金銀器千兩汴之庫廄尚有錢百餘萬緍絹百餘萬匹馬七千匹糧三百萬斛羣臣上尊號曰元和聖文神武法天應道皇帝自淮西用兵以來度支鹽鐡及四方爭進奉謂之助軍賊平又進奉曰賀禮曰助賞及是上加尊號又進奉亦曰賀禮于是左右軍中尉各獻錢萬緡以令狐楚同平章事時程异卒楚與皇甫鎛同年進士故鎛引以為相八月以韓𢎞為司徒兼中書令張𢎞靖為宣武節度使𢎞纍表請留京師故有是命𢎞靖鎮宣武繼𢎞嚴猛之後代以寬簡民便安之魏博節度使田𢎞正入朝上待之甚厚𢎞正三表請留不許乃加兼侍中遣還鎮𢎞正恐一旦物故魏人猶以故事繼襲故兄弟子姪皆仕諸朝上皆擢居顯列朱紫盈廷時人榮之庫部員外郎李渤病免渤使陳許還言臣過渭南諸縣人多流亡舊三千戶者今才千戶迹其所以然皆由以逃戶稅攤于比鄰致驅迫俱逃聚斂之臣剝下媚上惟思竭澤不慮無魚乞降詔書禁絶計不數年人皆復于農矣執政見而惡之渤遂謝病歸東都冬十月安南遣將楊清討黃洞蠻西原蠻之屬有黃氏者居黃洞是為黃洞蠻長唐書南蠻傳西原蠻居廣容之南雍桂之西清作亂殺都護李象古道古之兄象古以貪縱苛刻失衆心清世為蠻酋象古召為牙將命將兵討黃洞蠻清因人心怨怒夜還襲州陷之初蠻賊黃少卿自貞元以來數反覆桂管觀察使裴行立鄉從孫容管經略使治容州今梧州府容縣是陽旻字公素惠元子欲徼幸立功爭請討之上從之嶺南節度使孔戣屢諫曰此禽獸耳不足與論是非不聼大發江湖兵㑹二管入討士卒多瘴死安南乘之遂殺都護二管亦雕弊惟戣所部晏然後楊清為安南將士所殺而黃少卿久未得平韓愈上言黃家賊居無城郭依山傍險尋常亦各營生急則屯聚相保比緣經略使多不得人侵欺虜縳以致怨恨遂攻劫州縣侵暴平人或聚或散終亦不能為事裴行立陽旻意在邀功獻計征討雍容兩管經此凋弊殺傷疾疫十室九空如此不已臣恐嶺南未得寧息兼此賊徒亦甚傷損厭若必深若赦其罪戻遣使宣諭必望風降服仍擇素有威信者為經略使處置得宜自無侵叛時不能用吐蕃圍鹽州吐蕃十五萬衆圍鹽州刺史李文悅竭力拒守凡二十七日吐蕃不能克靈武牙將史奉敬靈州人言于朔方節度使杜叔良請兵解圍叔良以二千五百人與之奉敬行旬餘無聲問朔方人以為俱沒矣無何奉敬自他道出吐蕃背吐蕃大驚潰去奉敬奮擊大破之貶裴潾為江陵令栁泌至台州驅吏民采藥嵗餘無所得而懼逃入山中浙東觀察使捕送京師皇甫鎛李道古保護之上復使待詔翰林服其藥日加燥渴起居舍人裴潾上言藥以愈疾非朝夕常餌之物况金石酷熱有毒又益以火氣殆非五藏所能勝也古者君飲藥臣先嘗之乞令獻藥者先餌一年則真僞可辨矣上怒貶潾崔羣罷初帝問宰相元宗之政先理而後亂何也羣對曰元宗用姚崇宗璟盧懷慎蘇頲韓休張九齡則理用字文融李林甫楊國忠則亂故用人得失所繫非輕人皆以天寶十四年安祿山反為亂之始臣獨以為開元二十四年罷張九齡相専任李林甫此理亂之所分也願陛下以開元初為法以天寶末為戒乃社稷無疆之福皇甫鎛深恨之及羣臣議上尊號皇甫鏄欲增孝德字羣曰言聖則孝在其中矣鎛言于上曰羣於陛下惜孝德二字上怒時鏄給邊軍不時又多陳敗之物軍士怨怒流言欲為亂李光顔憂懼欲自殺遣人訴之上不信京師忷懼羣具以聞鎛密言于上曰邉賜皆如舊制而人情忽如此者由羣鼓扇將以賣直歸怨于上也上以為然出羣為湖南觀察使于是中外切齒于鏄以狄兼謨字汝諧仁傑族曽孫為左拾遺中書舍人武儒衡有氣節好直言上器之顧待甚渥人皆言其且入相令狐楚忌之思有以沮之乃薦兼謨才行擢左拾遺楚以兼謨為仁傑之族乃自草制辭盛言天后竊位姦臣擅權賴仁傑保佑中宗克復明辟儒衡泣訴于上曰臣曽祖幸一在天后朝辭榮終老上由是薄楚之為人庚子十五年春正月帝暴崩于中和殿考唐書憲宗紀正月宦者陳𢎞志反皇帝崩又王守澄傳守澄與內常侍陳𢎞志弒帝于中和殿舊書紀時帝暴崩皆言內官陳𢎞志弒逆史氏諱而不書據此則憲宗被弒史臣特諱言之耳通鑑考異以兹事曖昧不能測其虛實故但云暴崩范祖禹以穆宗不能討賊故舊史但存疑而已綱目因通鑑亦書暴崩故劉友益尹起莘等皆以為著當時之君臣不能討賊之罪汪克寬則以為當依漢平隋文例書弒其說紛然不一今于提綱仍依綱目而以新舊書紀傳及考異諸說並注于此上服金丹多躁怒左右宦官往往獲罪有死者人人自危至是暴崩于中和殿時人皆言內常侍陳𢎞志弒逆其黨類諱之不敢討賊但云藥發外人莫能明也閏月太子即位是為穆宗諸宦官王守澄等共立太子即皇帝位以吐突承璀嘗欲立灃王惲憲宗次子為太子守澄等于是殺承璀及惲劉友益曰唐世宦官弒君立君始此貶皇甫鎛為崖州司戶以蕭俯假文昌同平章事輟西宫即西內殯在焉臨朝集羣臣于月華門外唐東西內皆有月華門在殿之西宣制貶鎛市井皆相賀上議命相令狐楚薦俯俯亦鎛同年進士上欲誅鎛俯及宦官救之得免柳泌伏誅貶李道古為循州司馬以薛放河中寶鼎人為工部侍郎丁公著字平子吳人為給事中放公著先為東宫侍讀及上即位未聼政即召二人入侍禁中參預機密欲以為相二人固辭尊貴妃郭氏為皇太后初憲宗即位羣臣纍表請立妃郭氏為后憲宗以妃宗門彊盛恐正位之後後宫莫得進託以嵗時禁忌不許至是乃尊為皇太后上與羣臣皆釋服二月赦天下上御樓肆赦事畢盛陳倡優雜戲而觀之又幸左神䇿軍觀手搏監察御史楊虞卿字師臯𢎞農人上疏曰陛下宜延問羣臣惠以氣色使進忠若趨利論政若訴寃如此而不升平者未之有也衡山人趙知微亦上疏諫上遊畋無節上雖不能用亦不罪也以栁公權字誠懸公綽弟為翰林侍書學士上見公權書跡愛之問曰卿書何能如是之善對曰用筆在心心正則筆正上默然改容知其以筆諫也夏五月以元稹為祠部郎中知制誥初稹為江陵士曹與監軍崔潭峻善上在東宫聞宫人誦稹歌詩而善之及即位潭峻歸朝薦稹上以為知制誥朝論鄙之㑹同僚食爪子聞下有青蠅集其上武儒術以扇揮之曰適從何乘遽集于此同僚皆失色儒衡意氣自若六月葬景陵在同州府蒲城縣南金幟山賀善贊曰憲宗志平僭叛所向有功可謂中興之主然有二病一任宦䦰二好進奉至于末年信惑異端身陷大禍豈不重可惜哉以崔羣為吏部侍郎上召羣對别殿謂曰朕升儲副知卿為羽翼對曰先帝之義久屬聖明臣何力之有太后居興慶宫太后居南內每朔望上帥百官詣宫門上夀上性侈所以奉太后者尤華靡秋七月令狐楚罷楚為山陵使不給工人傭直收其錢十五萬為羡餘以獻怨訴盈路故罷之楚出為宣歙觀察使以崔植同平章事已而楚再貶衡州刺史祐崔植字公修甫之子八月浚魚藻池在長安縣北唐故禁苑內雍池中有山山上建魚藻宫九月大宴上甫過公除即事遊畋聲色賜與無節欲以重陽大宴拾遺李珏字待價淮隂人帥其同僚上疏曰元朔未改山陵尚新雖陛下就易月之期俯從人欲而禮經著三年之制猶服心喪合宴內庭事將未可上不聼已而羣臣入閣諫議大夫鄭覃珣瑜子崔郾字廣略邠之弟等五人進言陛下宴樂多過遊畋無度又晨夕與近習倡優狎昵賜與過厚夫金帛皆百姓膏血非有功不可與雖內藏有餘願陛下愛之時久無閣中論事者上始甚訝之謂宰相曰此輩何人對曰諌官上乃使人慰勞之曰當依卿言宰相皆賀然實不能用也上嘗謂給事中丁公著曰聞外間人多宴樂此乃時和人安足用為慰公著對曰此非佳事恐漸勞聖慮上曰何故對曰自天寶以來公卿大夫競為遊宴沈酣晝夜獶雜子女不愧左右如此不已則百職皆廢陛下能無獨憂勞乎願少加禁止乃天下之福也幾與猱同言如猱之雜也冬十月成德節度使王成宗卒詔以田𢎞正代之王承元為義成節度使王承宗卒其下祕不發喪立承宗之弟承元承元時年二十曰諸公未忘先德不以承元年少使攝軍務承元請盡節天子以遵忠烈王王武俊賜諡忠烈之志諸公肯從之乎衆許諾承元乃視事于都將聼事不稱留後表請除帥諸將及鄰道爭以故事勸之皆不聼詔以田𢎞正為成德帥承元移鎮滑州諸將喧譁不受命承元以詔㫖諭之謂曰諸公意甚厚然使承元違天子詔其罪大矣昔李師道未敗朝廷嘗赦其罪師道欲行諸將固留之其後殺師道者亦諸將也諸將勿使承元為師道則幸矣大將李寂等固留承元承元斬以徇軍中乃定成德自李寶臣至王承元入朝更二姓傳五世凡五十九年吐蕃寇涇州涇州奏吐蕃入寇距州三十里告急求救以中尉梁守謙為神䇿行營都監并發八鎮全軍救之邠寧兵以神䇿受賞厚皆愠曰人給五十緡而不識戰鬪者彼何人邪常額衣資不得而前冒白刃者此何人邪洶洶不止節度使李光顔親為開陳大義然後軍士感悅而行將至涇州吐蕃懼而退幸華清宫上將幸華清宫宰相帥兩省官詣延英門三上表切諫上不聼諫官伏門下至暮乃退明日上自復道出城幸華清宫獨公主駙馬中尉兵千人扈從晡時還宫穆宗皇帝辛丑長慶元年春正月詔河北諸道各均定兩稅蕭俯罷俯介潔疾惡為相重惜官職少所引拔西川節度使王播大修貢舉且以賂結宦官求為相假文昌復左右之詔徵播詣京師俯屢爭之言播纎邪不可以汙台司上不聼俯遂辭位時假文昌亦罷以杜元頴同平章事王播為鹽鐡使播奏約𣙜茶額每百錢加稅五十李玨等諫曰𣙜茶近起貞元多士之際今天下無虞所宜寬橫斂之目而更增之百姓何時當得息肩不從杜元頴如晦五世孫盧龍節度使劉總棄官為僧以張𢎞靖代之總既殺其父兄心常自疑數見父兄為祟常于府舍飯僧使為佛事晚年恐懼尤甚又見河南北皆從化奏乞棄官為僧詔從之總奏分所屬為三道以幽涿營為一道平薊媯檀為一道請除張𢎞靖薛平為節度使瀛莫為一道請除盧士玫為觀察使𢎞靖先在河東以寬簡得衆總以燕人桀驁日久故舉𢎞靖以安輯之平嵩之子知河朔風俗而盡誠于國士玫則總妻族之親也總又盡擇麾下宿將有功難制者朱克融滔之孫等送京師乞加奬拔使燕人有慕羡朝廷祿位之志又獻征馬萬五千匹然後削髮委去總尋卒于定州至自劉怦得幽州總棄官凡三世三十六年是時上方酣宴不以天下為意崔植杜元頴不知安危大體茍欲崇重𢎞靖惟割瀛莫二州以士玫領之餘皆統于𢎞靖朱克融輩久羈旅京師至假丐衣食日詣中書求官植元頴不之省尋勒歸本軍驅使克融輩皆憤怨夏四月貶錢徽李宗閔為逺州刺史楊汝士為開江唐縣為開州治開州注見前令翰林學士季德裕字文饒吉甫之子也以中書舍人李宗閔嘗對䇿譏切其父恨之宗閔又與翰林學士元稹爭進取有隙右補闕楊汝士與禮部侍郎錢徽掌貢舉西川節度使假文昌翰林學士李紳字公垂敬元曽孫各以書屬所善進士及榜出二人所屬皆不預而鄭覃弟朗裴度子撰宗閔壻蘇巢汝士弟殷士及第文昌言于上曰今嵗禮部殊不公所取皆以關節得之上以問諸學士德裕稹紳皆以為然上乃命覆試黜朗等十人而貶徽等或勸徽奏二人屬書上必寤徽曰茍無愧心得喪一致奈何奏人私書豈士君子所為邪取而焚之時人多之自是德裕宗閔各分朋黨各相傾軋垂四十年五月遣使册回鶻崇德可汗保義可汗死册所屬為毗伽榮德可汗以太和長公主憲宗女妻之吐蕃聞唐與回鶻婚寇青塞堡回鶻奏以萬騎出北庭萬騎出安西拒吐蕃以迎公主秋七月盧龍軍亂囚節度使張𢎞靖推朱克融為留後𢎞靖驕貴自尊政事多委幕僚章雍輩皆年少輕薄嗜酒豪縱裁刻軍士糧賜數以反虜詬之謂曰今天下太平汝曹能挽兩石弓不若識一丁字由是軍中人人怨怒㑹雍出逢小將䇿馬衝其前導雍命杖之河朔軍士不貫與慣同受杖不服雍白𢎞靖繫治之是夕士卒連營呼譟作亂囚𢎞靖殺雍等迎朱克融為留後衆以判官張長者不殺罵曰汝何敢反行且族滅衆共殺之𢎞靖坐貶吉州刺史未幾瀛州軍亦亂執觀察使盧士畋送于克融成德兵馬使王庭湊回鶻阿布思之種王武俊養以為子因胃姓殺節度使田𢎞正起復田布為魏博節度使討之初田𢎞正徙鎮成德自以久與鎮人戰有父兄之仇乃以魏兵二千自衛請度支供其糧賜戶部侍郎崔倰字德長祐甫從子剛褊無逺慮恐開事例不肯給𢎞正不得已遣魏兵歸都知兵馬使王庭湊果悍隂狡潛謀作亂以魏兵故不敢發及魏兵去夜結牙兵殺𢎞正自稱留後逼監軍奏求節鉞朝廷震駭魏博節度使李訴聞變素服流涕令將士曰魏人所以得通聖化安寧富樂者田公之力也今鎮人不道輒敢害之是輕魏以為無人也諸公受田公恩宜如何報之衆皆慟哭深州刺史牛元翼趙州人成德良將也訴使以寶劍玉帶遺之曰昔吾先人以此劍立大勳吾又以之平蔡州今以授公努力翦庭湊元翼以劍帶狥于軍報曰願盡死㑹訴病作不果出兵乃復起田布為魏博節度使布固辭不獲與妻子賔客訣曰吾不還矣悉屏旌節導從而行未至魏州三十里被髮徒跣號哭而入居于堊室月俸千緡一無所取賣舊産得錢十餘萬緡以頒士卒舊將老者兄事之詔諸道討王庭湊以牛元翼為深翼節度使庭湊圍深州九月吐蕃遣使來盟以劉元鼎為吐蕃㑹盟使命宰相與吐蕃使者論訥羅盟于城西遣元鼎入吐蕃亦與其宰相以下盟今西藏衛地伊克招之門右有唐碑上刻長慶初與吐蕃㑹盟之文至今完好番語謂大為伊克廟為招伊克招猶言太廟也詔兩稅皆輸布絲纊自定兩稅法以來錢日重物日輕民所輸三倍其初戶部尚書楊於陵言錢者所以權百貨貿遷有無所宜流散不應蓄聚今稅百姓錢藏之公府又開元中天下鑄錢七十爐爐嵗入百萬今才十餘爐嵗入十五萬入綱目誤作八今依通鑑改正又積于富室流入四夷如此則錢焉得不重物焉得不輕今宜使天下輸稅課者皆用榖帛廣鑄錢而禁滯積及出塞者則錢日滋矣從之冬十月以王播同平章事播為相専以承迎為事未嘗言國家安危以裴度為鎮州行營都招討使以魏𢎞簡為弓箭庫使元稹為工部侍郎翰林學士元稹與知樞密魏𢎞簡深相結求為宰相由是有寵稹無怨于裴度但以度先逹重望恐其復有功大用妨已進取故度所奏軍事多與𢎞簡從中沮之度上表曰陛下欲掃蕩幽鎮先宜肅清朝廷河朔逆賊祗亂山東禁闈姦臣必亂天下是則河朔患小禁闈患大小者臣與諸將必能剪滅大者非陛下覺悟制斷無以驅除臣䝉陛下委付之意不輕遭姦臣抑損之事不少若朝中姦臣盡去則河朔逆賊不討自平若姦臣尚存則逆賊縱平無益表三上上雖不悅以度大臣不得已罷𢎞簡樞密解稹翰林而恩遇如故宿州唐置今屬江南鳳陽府刺史李直臣伏誅直臣坐贓當死宦官受其賂為之請御史中丞牛僧孺固請誅之上曰直臣有才可惜僧孺對曰彼不才者安足慮本設法令所以擒制有才之人安祿山朱泚皆才過于人法不能制者也上從之十二月深州行營節度使杜叔良討王庭湊大敗詔以李光顔代之初橫海節度使烏重𦙍將全軍救深州獨當幽鎮東南重𦙍宿將知賊未可破按兵觀釁上怒徙重𦙍山南西道而叔良素事權幸宦官薦之詔以代重𦙍至是將諸道兵與鎮人戰大敗詔復以李光顔代之以朱克融為平盧節度使自憲宗征伐西方國用已虛及上即位賞賜無節而幽鎮用兵久無功府藏空竭執政以王庭凑殺田𢎞正而克融囚張𢎞靖罪有輕重請赦克融敷討庭湊上從之克融既得旌節乃出張𢎞靖盧士玫壬寅二年春正月盧龍兵陷弓髙注見前先是弓髙守備甚嚴有中使夜至守將不內旦乃得入中使大詬怒賊諜知之他日僞遣人為中使夜至守將遽內之賊衆隨入又圍下慱中書舍人白居易上言曰自幽鎮逆命朝廷徵兵十七八萬四面攻圍已逾半年王師無功賊勢猶盛弓髙既陷糧道不通下博深州饑窮日蹙蓋由節將大重其心不齊未立功者或已拜官已敗衄者不聞得罪既無徵勸以至遷延請令李光顔將諸道徑兵從東速進問弓髙糧路合下博諸軍解深邢重圍與元翼合勢令裴度將大原全軍兼招討舊職四面壓境觀釁而動若乘虛得便即令同力翦除若戰勝賊窮亦許受降納欵如此則夾攻以分其力招諭以動其心必未及誅夷自生變故仍詔光顔選留諸道精兵餘悉遣歸本道蓋兵多而不精豈惟虛費資糧兼恐撓敗軍陳故也諸道監軍請皆停罷衆齊令一必有成功疏奏不省下博漢縣故城在今直𨽻深州魏博將史憲誠建康人作亂節度使田布死之詔以憲誠為節度使初田布從𢎞正在魏善視牙將史憲誠及為節度使遂寄以腹心軍中精鋭悉以委之至是布以魏兵討鎮軍于南宫漢縣今屬冀州以饋運不繼發六州魏博六州也綱目誤作六軍今改正租賦以供軍將士不悅憲誠因鼓扇之㑹有詔分魏博軍李光顔使救深州布軍遂潰多歸憲誠布獨與中軍八千人還魏復召諸將議出兵諸將益偃蹇曰尚書能行河朔舊事則死生以之若使復戰則不能也布嘆曰功不成矣即日作遺表曰臣觀衆意終負國恩臣既無功敢忘即死伏願陛下速救光顔元翼毋使義士忠臣皆為河朔屠害奉表號哭拜授幕僚李石字中玉襄邑王神符五世孫乃入唘父靈抽刀而言曰上以謝君父下以示三軍遂刺心而死憲誠聞之遂喻衆以河朔舊事衆擁憲誠為留後詔以為節度使憲誠雖外奉朝廷然內實與幽鎮連結二月以王庭湊為承德節度使遣兵部侍郎韓愈宣慰其軍庭湊圍牛元翼于深州官軍三靣救之皆以乏糧不能進時諸軍匱乏衣糧饋運在途即邀奪之其懸軍深入者皆凍餒無所得雖李光顔亦閉壁自守朝廷不得已以庭湊為成德節度使而遣韓愈宣慰其軍庭湊雖受命不解深州之圍詔愈至境更觀事勢勿遽入愈曰止君之仁死臣之義遂往至鎮庭湊拔刃弦弓以逆之及館甲士羅于庭庭湊言曰所以紛紛者乃此曹所為非庭湊心愈厲聲曰天子以尚書有將帥材故賜之節鉞不知尚書乃不能與健兒語邪甲士前曰先太師為國擊走朱滔血衣猶在此軍何負朝廷乃以為賊乎愈曰汝曹尚能記先太師則善矣夫逆順之為禍福豈逺邪自祿山思明以來至元濟師道其子孫有今尚存者乎田令公以魏博歸朝廷子孫孩提皆為美官王承元以此軍歸朝廷弱冠建節劉悟李祐皆為節度使汝曹亦聞之乎庭湊恐衆心動麾之使出謂愈曰侍郎來欲何為愈曰神䇿諸將如牛元翼者不少但朝廷顧大體不可棄之耳尚書何為圍之不置庭湊曰即當出之因與愈宴禮而歸之未幾元翼將十騎突圍出深州上之初即位也兩河略定蕭俯假文昌以為天下已平漸宜消兵請密詔軍鎮每嵗百人之中限八人逃死上方荒宴不以國事為意遂可其奏軍士落籍者皆聚山澤為盜及幽鎮作亂一呼而亡卒皆集詔徵諸道兵討之皆臨時召募烏合之衆以行又諸節度既有監軍主將不得専號令戰小勝則飛騎奏捷自以為功不勝則迫脅主將以罪歸之悉擇軍中驍勇以自衛遣羸弱者就戰故每戰必敗又凡用兵舉動皆自禁中授以方略朝令夕改不知所從不度可否惟督令速戰十使道路如織故雖以諸道十五萬之衆裴度元臣宿望烏重𦙍李光顔皆當時名將討幽鎮萬餘之衆屯守踰年竟無成功財竭力盡崔植度元頴王播為相皆庸才無逺略朱克融史憲誠及庭湊皆以節帥授之由是再失河朔迄于唐亡不能復取以傅良弼字安道清河人為沂州刺史李寰史不詳里系為欣州刺史時樂夀本漢樂成縣隋改名明省故城在今河間府獻縣兵馬使傅良弼博野本晉博陸縣後魏更名今縣屬保定府鎮遏使李寰所戍在幽鎮之間朱克融王庭湊互相誘脅二人不從各以其衆堅壁賊竟不能取故賞之崔植罷以元稹同平章事裴度為司空東都留守稹怨度欲解其兵柄故勸上雪王庭湊而罷兵以度為司空平章事東都留守諫官爭上言時未偃兵度有將相全才不宜置之散地上乃命度入朝然後赴東都以李聼為河東節度使初聼為羽林將軍有良馬上為太子遣左右諷求之聼以職總親軍不敢獻及河東缺帥上曰李聼不與朕馬是必可任遂用之昭義節度使李悟執監軍劉承偕承偕恃恩陵轢悟數衆辱之隂與磁州刺史張汶謀縛悟送闕下悟知之諷其軍士殺汶圍承偕欲殺之幕僚賈直言河朔舊族先為李師道幕僚責悟曰公欲為李司空邪安知軍中無如公者悟遂謝直言免承偕而囚之上詔悟送承偕悟不奉詔㑹裴度入朝上問度宜如何處置度請流承偕于逺州必得出上從之悟乃釋承偕自是悟浸驕欲效河北三鎮招聚不逞章表不遜三月詔內外諸軍將士有功者奏與除官初上在東宫聞天下厭苦憲宗用兵故即位務優假將卒以求姑息詔神䇿六軍及南牙常參武官悉加奬擢諸道大將久次及有功者悉奏聞除官于是商賈胥吏爭賂藩鎮牒補列將而薦之即升朝籍士大夫皆扼腕嘆息武寧副使王智興作亂詔以為節度使先是節度副使皆以文吏為之上以智興有勇略欲用之河北故授為武寧副使已而詔遣智興以精兵三千人討幽鎮崔羣忌之奏請以為他官未報會有詔罷兵智興引兵先入其境羣懼遣使迎勞且使釋甲而入智興不從引兵入府逐羣遣兵送至甬橋注見前遂掠鹽鐡院錢帛及諸道進奉而返朝廷以新罷兵力未能討以智興為節度使詔留裴度輔政王播罷度入朝不數日詔以為淮南節度使言事者皆謂裴度不宜出外上亦自重之制留度輔政以王播代度鎮淮南播仍兼鹽鐡轉運使夏四月丁酉朔日食詔免江州逃戶缺錢戶部侍郎判度支張平叔言官自糶鹽可獲倍利又請令所由將鹽就村糶易又乞令宰相領鹽鐡使以糶鹽多少為刺史縣令殿最檢責所在實戶據口給一年鹽使其四季輸價富商大賈有邀截喧訴者所在杖殺詔百官議兵部侍郎韓愈中書舍人韋處厚字德載萬年人皆以為不可事遂寢愈以為城郭之外少有見錢糶鹽多用雜物貿易鹽商無物不取或賖貸徐還用此取濟兩得利便今令吏人坐鋪自糶非得見錢必不敢受如此貧者無從得鹽自然坐失常課如何更有倍利若令吏人將鹽家至戶到而糶之必索百姓供應騷擾極多又刺吏縣令職在分憂豈可惟以鹽利多少為之陛黜不復考其理行又貧家食鹽至少或有旬月淡食若據口給鹽依時徵價官吏畏罪必用威刑臣恐因此所在不安此尤不可之大者也處厚以為宰相處論道之地雜以鹺務實非所宜竇參皇甫鎛皆以錢榖為相卒蹈禍敗又欲以重法禁人喧訴夫强人之所不能事必不立禁人之所必犯法必不行矣平叔又奏徵逺年逋缺江州刺史李渤上言度支徵當州貞元二年逃缺戶錢四千餘緍當州今嵗旱災田損什九陛下奈何于大旱中徵三十六年前逋負詔悉免之六月裴度罷為右僕射元稹罷為同州刺史王庭湊之圍牛元翼也和王傅于方言于元稹請遣客間說賊黨使出元翼仍賂兵吏部令史僞出告身二十通令以便宜給賜稹皆然之有李賞者知其謀乃告裴度云方為稹結客刺度度𨼆而不發賞詣神䇿告之詔僕射韓臯等鞫按事皆無驗六月度及稹皆罷相諫官言度無罪不當免相稹為邪謀責之太輕上不得已削稹長春宫使以李逢吉同平章事逢吉于上有講侍舊恩逢吉先為東宫侍講密結近幸召拜兵部尚書李賞告變逢吉實隂使之唐書逢吉本傳裴度元稹知政度嘗條稹憸佞逢吉以為其隙易乘遂并中之遣人告變言于方欲為稹刺度舊書所載略同通鑑考異以為李賞自告非由逢吉今于稹度罷相條依通鑑輯而以逢吉事略見于此裴度元稹既罷逢吉遂復相秋七月宣武押牙李㝏作亂討平之初張𢎞靖鎮宣武屢賞以悅軍士李願晟長子繼之薄賞勞而峻威刑其妻弟寶瑗驕貪軍中惡之牙將李臣則等作亂斬瑗願奔鄭州衆推㝏為留後監軍以聞詔三省官與宰相議時議皆以為宜如河北故事授㝏節李逢吉曰河北之事蓋非獲已今若并汴州棄之則江淮以南亦非國家有矣杜元頴張平叔爭之曰奈何惜數尺之節不愛一方之死乎議未決㑹宋亳潁州各奏請命帥上大喜逢吉請徵㝏入朝而以韓𢎞弟充鎮宣武充素寬厚得衆心脫㝏旅拒則命徐許兩軍攻其左右而滑軍蹙其北充必得入矣上皆從之㝏不奉詔忠武李光顔兖海曹華宋州楚邱人時為充海節度使質實以兖海曹華為四川繆甚皆以兵討㝏屢敗其兵韓充入汴境又敗其兵于郭橋鎮名在開封府祥符縣西北今曰郭橋集初㝏以兵馬使李質為腹心及㝏不奉詔質屢諫不聼㑹㝏疽發臥家質擒殺之遂迎充充既視事人心粗定乃密籍軍中為惡千餘人一朝悉逐之曰敢少留境內者斬于是軍政大治李質尋為金吾大將軍冬十一月太后幸華清宫上畋于驪山十二月立景王湛帝長子即敬宗為太子上與宦官擊毬于禁中有宦者墜馬上驚得疾不能履地宰相屢乞入見不報裴度三上疏請立太子且請入見言之詔立景王湛為皇太子上疾浸瘳初行宣明厯癸卯三年春二月以牛僧孺同平章事戶部侍郎牛僧孺素為上所厚初韓𢎞以財結中外𢎞卒孫幼主藏奴與吏訟于御史府上憐之取其簿自閲視凡中外主權多納𢎞貨獨僧孺不納上大喜遂以僧孺為相時僧孺與李德裕皆有入相之望德裕出為浙西觀察使八年不遷以為李逢吉排已而引僧孺由是怨愈深夏四月以鄭權汴州開封人為嶺南節度使翼城人鄭注巧譎傾諂善揣人意以醫遊四方李訴餌其藥頗驗署為牙推浸預軍政妄作威福軍府患之監軍王守澄請去之訴曰注竒才也將軍試與之語苟無所取去之未晚乃使注見守澄守澄不得已見之坐語未久大喜促膝恨相見之晚守澄入知樞密挈注以西薦于上上亦厚遇之自上有疾守澄專制國事勢傾中外注日夜出入其家與之謀議人莫能窺其迹始則微賤巧宦之士或因以進數年之後逹官車馬滿其門矣工部尚書鄭權家多姬妾祿薄不能贍因注通于守澄以求節鎮遂得嶺南五月以柳公綽為山南東道節度使公綽過鄧縣鄧城縣也本漢鄧縣唐曰鄧城宋省故城在今襄陽縣北此云鄧縣蓋䝉漢舊縣之文有二吏一犯贓一舞文衆謂公綽必殺犯贓者公綽判曰贓吏犯法法在姦吏亂法法亡竟誅舞文者六月以韓愈為京兆尹愈為京兆六軍不敢犯法私相謂曰是尚欲燒佛骨何可犯也秋八月帝幸興慶宫上自復道雍録開元中築夾城自大明宫復道由通化等門達曲江芙蓉園外人不知也幸興慶宫至通化門樓投絹二百匹施山僧上之濫賜皆此類不可悉紀以裴度為司空山南西道節度使李逢吉惡度出之山南不兼平章事九月復以韓愈為吏部侍郎李紳為戶部侍郎李逢吉結王守澄勢傾朝野惟翰林學士李紳常排抑之逢吉患之而上遇紳厚不能逺也㑹御史中丞缺逢吉薦紳清直宜居風憲之地上以中丞亦次對官胡三省注唐中世以後宰相對延英既畢待制官巡對官皆得引對總謂之次對官謂次宰相之後而得對也可之㑹紳與京兆尹韓愈爭臺參故事京兆新除皆詣臺參逢吉欲激二人使爭以愈兼御史大夫免臺恭而紳愈果爭往來辭語不遜逢吉奏二人不協以愈為兵部侍郎紳為江西觀察使愈紳入謝上各令自叙其事乃深寤故有是命甲辰四年春正月帝崩太子即位是為敬宗上餌金石之藥處士張臯上疏曰神慮淡則血氣和嗜欲勝則疾疹作藥以攻疾無疾不可餌也昔孫思邈有言藥勢有所偏助令人藏氣不平借使有疾用藥猶須重慎况無疾乎庶人尚爾况天子乎先帝信方士妄言餌藥致疾此陛下所詳知也豈得復循其覆轍乎上善其言而求之不已孫思邈華原人既而疾作命太子監國宦官欲請郭太后臨朝太后曰昔武氏稱制幾傾社稷我家世守忠義非武氏比也太子雖少但得賢宰相輔之卿輩勿預朝政何患國家不安自古豈有女子為天下主而能致唐虞之理乎取制書手裂之太后兄太常卿釗亦密上疏曰若果徇其請臣請先帥諸子納官爵歸田里太后泣曰祖考之慶鍾于吾兄是夕上崩太子即位二月貶李紳為端州司馬初穆宗既留李紳李逢吉愈忌之㑹紳族子虞怨紳以紳平日密論逢吉語告之逢吉益怒使虞與從子仲言即李訓始名仲言字子訓後更名字子垂及補闕張又新深州陸澤人薦之子伺求伸短及上即位逢吉令王守澄言于上曰陛下之所以為儲二逢吉力也如杜元頴李紳輩皆欲立深王名察後改名悰穆宗之弟時上年十六疑未信㑹逢吉亦言紳謀不利于上請加貶謫乃貶之又新等猶忌紳日上書言貶紳太輕上許為殺之朝臣莫敢言獨翰林侍讀學士韋處厚上疏指述紳為逢吉之黨所讒上稍開寤㑹閲禁中文書有穆宗所封一篋發之得裴度杜元頴及紳請立上為太子疏乃焚譖紳書後有言者不復聼矣尊皇太后為太皇太后母王妃越州人為皇太后幸中和殿擊毬自是數遊宴擊毬奏樂賞賜宦官樂人不可悉紀賜宦官服色有今日賜緑而明日賜緋者三月赦詔諸道常貢之外無得進奉以劉栖楚為起居舍人不拜上視朝晏百官班于紫宸門外老病者幾至僵踣諫議大夫李渤白宰相曰昨日疏論坐晚今晨愈甚請出閣待罪于金吾仗既坐退班左拾遺劉栖楚獨留進言曰陛下富于春秋嗣位之初當宵衣求理而嗜寢樂色日晏方起梓官在殯鼓吹日喧令聞未彰惡聲遐布臣恐福祚之不長請碎首玉階以謝諫職之曠遂以額叩龍墀見血不已響聞閣外李逢吉宣曰劉栖楚休叩頭俟進止栖楚捧首而起更論宦官事上連揮令出栖楚曰不用臣言臣繼以死牛僧孺宣曰所奏知門外俟進止栖楚乃出待罪金吾仗于是宰相贊成其言上命中使就仗并李渤宣慰令歸尋擢栖楚為起居舍人栖楚辭疾不拜夏四月以李虞為拾遺李逢吉用事所親厚者張又新李仲言李虞劉栖楚李績之姜洽張權輿程昔範等八人又有從而附麗之者時人目之為八關十六子凡有求請者先賂關子後逹于逢吉無不得所欲盜入清思殿中尉馬存亮河中人遣兵討平之卜者蘇元明與染坊供人張韶善謂之曰我為子卜當升殿坐與我共食今主上晝夜毬獵多不在宫大事可圖也韶以為然乃與元明謀結染工無賴者百餘人匿兵于紫草車載以入有疑其重而詰之者韶急殺之斬關而入先是右軍中尉梁守謙有寵每兩軍角伎上常右右軍至是上狼狽欲幸右軍以逺不能遂幸左軍左軍中尉馬存亮走出迎自負上入軍遣大將康藝全將騎卒入宫討賊上憂二太后隔絶存亮復以騎迎至軍韶升清思殿坐御榻與元明同食曰果如子言元明驚曰事止此邪韶懼而走藝全兵至擊殺之餘黨悉獲上乃還宫盜所厯諸門監門宦者法當死詔並杖之使仍舊職存亮不自矜委權求出監淮南軍五月以李程字表臣襄邑王神符五世孫竇易直字宗元京兆始平人同平章事上好治宫室欲營别殿制度甚廣李程諫請以所具木石回奉山陵上即從之既而波斯注見前獻沈香亭子材拾遺李漢字南紀淮陽王道元六世孫言此何異瑤臺瓊室上雖怒亦優容之六月加裴度同平章事初牛元翼鎮襄陽數賂王庭湊以請其家庭湊不與聞元翼卒盡殺之上聞之嘆宰相非才使凶賊縱暴翰林學士韋處厚言裴度勳髙中夏聲播外夷若置之巖廊委其參决河北山東必禀廟算伏承陛下當食嘆息恨無蕭曹今有一裴度尚不能留此馮唐所以謂漢文得亷頗李牧不能用也臣與逢吉素無私嫌嘗謂裴度無辜貶官憲宗時韋貫之罷相處厚以考功郎出刺州今之所陳上答聖明下逹羣議耳㑹上見度奏狀無同平章事以問處厚處厚具言逢吉排沮之狀李程亦勸上加禮于度上乃加度同平章事夏綏節度使李祐進馬百五十匹却之侍御史溫造字簡輿大雅五世孫彈祐違敇進奉請論如法詔釋之祐謂人曰吾夜半入蔡州城取吳元濟未嘗心動今日膽落于溫御史矣冬十月賜韋處厚錦綵銀器處厚諫上宴遊曰先帝以酒色致疾損夀臣時不死諫者以陛下年已十五故也今皇子才一嵗臣安敢畏死而不諫乎上感其言故有是賜十一月葬光陵在州府蒲城縣北堯山十二月以劉栖楚為諫議大夫淮南節度使王播以錢十萬緡賂王守澄求領鹽鐡諫議大夫獨孤朗等數人請開延英論之上問前庭爭者不在中邪即日除栖楚諫議大夫而竟以播兼鹽鐡轉運使罷泗州戒壇徐泗觀察使王智興以上生日請于泗州置戒壇泗州上聖寺有僧伽塔人敬事之故智興于此置戒壇度僧尼以資福許之自元和以來敕禁此弊智興欲聚貨首請置之于是四方輻輳智興欲聚貨纍巨萬浙西觀察使李德裕上言若不鈐制至降誕日方停計兩浙福建皆失六十萬丁奏至即日罷之敬宗皇帝乙巳寶厯元年春正月赦上祀南郊還御丹鳯樓赦天下先是鄠令崔發武城人聞五坊人歐百姓命擒以入曳之于庭詰之乃中使也上怒收發繫臺獄是日與諸囚立金雞下唐制赦日衛尉建金雞擊鼓宣詔乃釋囚忽有品官注見前數十人執梃亂捶發氣絶數刻始蘇詔復繫之給事中李勃上書縣令曳中人中人毆御囚其罪一也然縣令所犯在赦前中人所犯在赦後中人橫暴若不早正刑書臣恐四夷藩鎮聞之則慢易之心生矣諫議大夫張仲方亦上言曰鴻恩將布于天下而不行御前霈澤遍及于昆蟲而獨遺崔發上皆不聼張仲方九齡從曾孫李逢吉從容言于上曰崔發輒曵中人誠大不敬然其母年垂八十故相章貫之之姊自發下獄積憂成疾陛下方以孝理天下所宜矜念上乃愍然曰比諫官但言發寃未嘗言其不敬亦不言有老母如卿所言朕何為不赦之即命中使釋其罪送歸家仍慰勞其母母對中使杖發四十牛僧孺罷牛僧孺以上荒淫嬖幸用事又畏罪不敢言但纍表求出乃升鄂嶽為武昌軍以僧孺為節度使僧孺過襄陽節度使栁公綽服櫜鞬候于館舍將佐曰襄陽地望髙于夏口此禮太過公綽曰竒章公甫離台席方鎮重宰相所以尊朝廷也竟行之以竒章公牛𢎞封魏僧孺其裔孫故稱之二月浙西觀察使李德裕獻丹扆六針上遊幸無常昵比羣小視朝月不再三大臣罕得進見德裕獻丹扆六針一曰宵衣以諷視朝稀晚二曰正服以諷服御乖異三曰罷獻以諷徵求玩好四曰納誨以諷侮棄讜言五曰辨邪以諷信任羣小六曰防微以諷輕出遊幸上優詔答之其納誨針略曰漢驁流湎舉白浮鍾魏睿侈汰陵霄作宫雖不忤善亦不終以規為瑱是為塞聰防微針略曰亂臣猖獗非可遽數元服莫辨觸瑟始仆柏谷微行豺豕塞路覩貌獻餐斯可戒懼二針尢最明切上雖褒答而不能用故後卒及于禍事漢驁成帝名魏睿明帝名元服任宣子欲刺漢宣觸瑟焉何羅欲刺漢武事俱具前柏谷漢武帝微行至柏谷逆旅主人欲攻之其嫗覩容貌非常殺雞作食獻之夏四月羣臣上尊號赦天下赦文但云左降官已量移者宜與量移不言未量移者韋處厚上言逢吉恐李紳量移故有此處置如此則是應近年流貶官因李紳一人皆不得量移也上即追改之紳由是得移江州刺史秋七月鹽鐡使王播進羡餘絹百萬匹播領鹽鐡誅求嚴急正入不供而羡餘相繼造競渡船荆楚嵗時記屈原以五月五日投于汨羅人傷其死並以舟楫拯之至今競渡是其遺俗自唐以後刻舟為龍鱗而綵繪之謂之龍舟詔王播造競渡船二十艘計用轉運半年之費張仲方等力諫乃減其半八月昭義節度使劉悟卒悟卒子從諫匿喪謀以悟遺表求知留後司馬賈直言責之曰爾父提十二州地歸朝廷其功非細祇以張汶之故自謂不潔淋頭胡三省注今人謂尿為不潔竟至羞死爾孺子何敢如此父死不哭何以為人從諫恐乃發喪既而朝廷得悟遺表議者皆言上黨內鎮與河朔異不可許李絳上疏以為劉悟死已數月從諫未嘗典兵其衆必不盡與同謀但速除近地一將令兼程赴鎮從諫未及布置而新帥已至軍心自有所繫然後續除從諫一刺史必無違拒時李逢吉王守澄計議已定竟不用絳等謀以從諫為昭義留後冬十月殺袁王名紳順宗子長史武昭昭有才力裴度討淮西時奬用之度遺昭說吳元濟元濟臨以兵辭不撓原禮遣還得署軍職纍奏為刺史及度斥外昭以袁王長史居京師頗有怨言時李程與李逢吉不協程族人水部郎中仍叔激怒昭云程欲與君官顧逢吉持不可昭愈怒因酒酣對金吾兵曹茅彚言欲刺逢吉逢吉聞之張權輿以其語告逢吉㑹度請入覲逢吉欲因昭事以傾度顯度前用昭之罪乃令人告之由是昭彚皆下獄逢吉黨李仲言諷彚誣昭與程同謀不然且死彚不可曰誣人以自免不為也獄成昭杖死仍叔仲言彚皆逺貶武昭之獄李逢吉欲借以傾裴度新舊書所載皆然而通鑑于此事略不及逢吉蓋以新舊書之言皆出李讓夷敬宗實録讓夷德裕之黨故深詆逢吉通鑑不以為然于是逢吉詭謀祕跡多不具載而考異于八關十六子且為之辨其說不足據綱目不考正史原文于武昭之死書曰伏誅亦未為核實今于綱特改書目則兼採新舊書輯之十一月幸驪山溫湯上欲幸驪山溫湯左僕射李絳諫議大夫張仲方等屢諫不聼拾遺張權輿伏紫宸殿下叩頭諫曰昔周幽王幸驪山而為犬戎所殺秦始皇幸驪山而國亡元宗宫驪山而祿山亂先帝幸驪山而享年不長上曰驪山若此之凶邪我宜一往以驗彼言幸溫湯還謂左右曰彼叩頭者之言安足信哉以李絳為太子少師分司東都僕射李絳好直諫李逢吉惡之故事僕射上曰蒞任之日宰相送之百官立班中丞列位于庭尚書以下每月當牙元和中以舊儀太重削去之御史中丞王播恃逢吉之勢與絳相遇于塗不之避絳引故事上言僕射國初為正宰相禮數至重儻人才忝位自宜别授賢良若朝命守官豈得有虧法制乞下百官詳定議者多從絳議上聼行舊儀至是以絳有足疾出之東都丙午二年春二月以裴度為司空同平章事言事者多稱裴度賢不宜棄之藩鎮上數遣使勞問度因求入朝逢吉之黨大懼百計毁之先是民間謠云緋衣小兒裴字也坦其腹度字也天上有口吳字也被驅逐言吳元濟被擒也又長安城中有橫亘六岡如乾象度宅偶居第五岡舊于第五岡置元都觀興善寺以鎮其地度宅略與元都觀相對張權輿上言度名應圖䜟宅占岡原不召而來其旨可見上雖少年悉察其誣謗待度益厚度至京師復知政事度初至朝士填門度留之飲京兆尹劉栖楚附度耳語侍御史崔咸舉觴罰度曰丞相不應許所由官呫囁耳語度笑而飲之栖楚不自安趨出度在中書左右忽白失印聞者失色度飲酒自如頃復白已得之度亦不應或問其故度曰此必吏人盜之以印書券耳急之則投諸水火緩之則復還故處人服其識量府崔咸字重易博平人所由官唐人縣官之稱栖楚尹京兆故云三月罷修東都上欲幸東都諫者甚衆上皆不聼已使按修官闕裴度從容言曰國家本設兩都以備巡幸然自多難以來官闕營壘百司廨舍率已荒弛陛下儻欲行幸宜命有司徐加完葺然後可往上曰從來言事者皆云不當往如卿所言不往亦可㑹幽鎮皆請以兵匠助修東都乃敕罷之夏五月幽州軍亂殺節度使朱克融而立其子秋八月都將李載義自稱常山王承乾之後殺之尋以載義為盧龍節度使遣使迎周息元入禁中道士趙歸真說上以神仙有潤州人周息元自言數百嵗上遣中使迎至京師館之禁中山亭九月李程罷出為河東節度使冬十一月李逢吉罷逢吉屢沮裴度入相而不果上知度忠寖疏逢吉至是遂罷為山南東道節度使十二月宦官劉克明等弒帝于室內立絳王悟憲宗子王守澄等討克明殺悟立江王涵穆宗次子上遊戲無度狎昵羣小善擊毬好手搏禁軍及諸道爭獻力士又以錢萬緍召募力士晝夜不離側又好深夜自捕狐狸謂之夜打狐性復褊急力士或恃恩不遜輒配流籍沒宦官小過動遭捶撻皆怨且懼夜獵還宫與宦官劉克明擊毬軍將蘇佐明等二十八人飲酒上酒酣入室更衣殿上燭滅克明等弒帝于室內克明矯稱上旨命學士路隋字南式陽平人草遺制以絳王悟權勾當軍國事又欲易置內侍之執權者于是樞密使王守澄楊承和中尉魏從簡梁守謙定議以牙兵迎江王涵入宫發左右神䇿飛龍兵進討賊黨盡斬之絳王為亂兵所害時事起倉卒守澄等欲號令中外而疑所以為辭問于學士韋處厚處厚曰正名討罪于義何嫌又問江王踐阼之禮處厚曰詰朝當以王教布告中外以已平內難然後羣臣三表勸進以太皇太后令册命即位耳守澄等從其言以裴度攝冡宰百官謁江王于紫宸外廡王素服涕泣明日即位更名昂是為文宗尊母蕭氏閩人為皇太后時郭太后居興慶宫寶厯王太后居義安殿蕭太后居大內上性孝謹事之如一每得珍異先薦郊廟次奉三宫然後進御以韋處厚同平章事上即位詔令儀矩一出處厚遂以為相出宫人放鷹犬省冗食罷别貯宣索上自為諸王深知兩朝之弊及即位勵精求治去奢從儉詔宫女非有職事者出三千餘人放五坊鷹犬省教坊總監冗食千二百餘員近嵗别貯錢榖悉歸之有司宣索組繡雕鏤之物悉罷之敬宗之世每月視朝不過一二上始復舊制每竒日視朝對宰相羣臣延訪政事久之方罷待制官舊雖設之未嘗召對至是屢䝉延問中外翕然相賀以為太平可冀御批歷代通鑑輯覽卷六十

  text: 欽定四庫全書御批歴代通鑑輯覽卷六十二唐宣宗皇帝丁卯大中元年春正月赦天下改元二月旱
  hash: sha256:e67831dd30391e596174250569abb591f789434d6ff00a2ac25f6cbd88fb4fda

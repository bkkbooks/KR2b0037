front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷二十一後漢起光武帝建武元年乙酉至獻帝建安二十五年庚子共十二帝一百九十六年世祖光武皇帝
  hash: sha256:8f0ae51e3d5053ec76ef94065b38cf32ff01f30d6bf1503023afa9ac20df64d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_020-1a, image: WYG0335/WYG0335-0525a.png}
body:
  text: 帝名秀字文叔南陽蔡陽漢縣故城在今湖北襄陽府棗陽縣人髙祖九世孫出自景帝子長沙定王系見前生之歳有嘉禾一莖九穗之瑞故名時有望氣者至舂陵曰氣佳哉鬰鬱葱葱然莽末起兵先是莽改貨日貨衆人以其字為白水真人後帝竟從白水起復興漢室乃即帝位乙酉建武元年夏六月蕭王即皇帝位改元大赦王自薊還至中山諸將請上尊號先是宼恂馮異擊破朱鮪移檄上狀諸將入賀馬武進曰大王宜先即尊位乃議征伐今此誰賊而馳騖逐之乎王曰將軍言可斬也武曰諸將盡然王使出曉之至是復請王不許到南平棘漢縣故城在今直𨽻趙州諸將復固請王曰寇賊未平四靣受敵何遽欲正位號乎諸將且出耿純進曰士大夫捐親戚棄土壤從大王于矢石之間者其計固欲攀龍鱗附鳯翼以成其所志耳今大王留時逆衆不正號位士大夫望絶計窮有去歸之思大衆一散難可復合純言甚誠切王深感曰吾將思之行至鄗漢縣故城在今趙州髙邑縣召馮異問四方動静異曰更始必敗宗廟之憂在于大王㑹儒生彊華彊風俗通作疆王微時在長安常與華同舍自闗中奉赤伏符䜟記之書日符漢尚史徳赤火色伏藏也來詣王其文曰劉秀發兵捕不道四裔雲集龍鬬野四七之際火為主合四七二十八也自髙祖至光武初起二百二十八年為四七之際羣臣因復奏請乃即位于鄗南改元曰建武大赦天下改鄗曰高邑長安亂張卬與諸將議曰赤眉且至見滅不久不如掠長安而歸南陽事若不集復入湖池中為盗耳入說更始更始怒使王匡陳牧成丹趙萌屯新豐李松軍掫續漢志新豐有鴻門亭即掫城鴻門注見前以拒赤眉卬與申屠建隗囂囂降更始為御史大夫合謀欲共刦更始成前計更始知之斬建使兵圍囂第卬等勒兵燒門入戰更始大敗奔新豐復疑王匡等與卬合謀乃並召入牧丹先至斬之匡入長安與卬等合更始攻之連戰月餘匡等敗走更始乃復入隗囂走歸天水赤眉以劉盆子稱帝赤眉進至華陰方望帝陽怨更始殺其兄乃説樊崇等曰將軍擁百萬之衆西向帝城而名為羣賊不可以久不如立宗室挾義誅伐以此號令誰敢不從崇等以為然乃于軍中求城陽景王章之後時赤眉軍中有齊巫常祠景王巫誑言王怒曰當為縣官何故作賊諸將驚怪又以方陽言乃求景王後得七十餘人唯盆子最親盆子者故式侯萌之子赤眉掠盆子與其二兄恭茂俱在軍中恭見更始洛陽紹封式侯隨入闗茂與盆子留赤眉中為劉俠卿牧牛號曰牛吏崇等議所立盆子以探符得之遂共立為天子徐宣為丞相樊崇為御史大夫逢安為左大司馬謝禄為右大司馬楊音以下皆列卿時盆子年十五被髪徒跣見諸將皆稱臣拜恐怖欲啼盆子雖立仍歸俠卿所時欲出從牧兒戲俠卿怒止之崇等亦不復候視秋七月以鄧禹為大司徒王梁為大司空呉漢為大司馬伏湛伏氏出伏羲之後湛牛惠公琅琊東武人勝九世孫為尚書令帝使使持節拜禹大司徒封鄼侯按赤伏符以梁為大司空符曰王梁主衛作元武時梁為野王令帝以野王衛地元武水神司空水土官特㧞梁為之又欲以讖文用孫咸行大司馬衆不悦乃拜漢初更始以伏湛為平原太守時天下兵起湛獨晏然撫循百姓一境以全帝徴為尚書使定舊制又以禹西征拜湛為司直行尚書事胡三省注東都之司徒西都之丞相也司直即丞相司直九月赤眉入長安更始奔高陵注見前詔封更始為淮陽王王匡張卬迎降赤眉連兵而進遂入長安更始單騎走先是式侯恭以赤眉立其弟自繫詔獄聞敗乃出從更始于渭濱至高陵將相皆降唯丞相曹竟不降手劍格死帝憐更始破敗詔封為淮陽王以卓茂字子康南陽宛人為太傅封褒徳侯茂寛仁恭愛哀平間為宻漢縣今屬河南開封府令視民如子舉善而教口無惡言吏民親愛不忍欺之民嘗有言部亭長受其米肉遺者茂曰亭長為從汝求乎為汝有事囑之而受乎將平居自以恩義遺之乎民曰往遺之耳茂曰遺之而受何故言耶民曰竊聞賢明之君使民不畏吏吏不取民今我畏吏是以遺之吏既卒受故來言耳茂日汝為敝民久矣凡人所以異于禽獸者以有仁愛禮義知相敬事也汝獨不欲修之寧能高飛逺走不在人間邪吏顧不當乘威力疆請求耳亭長素善吏歳時遺之禮也民曰茍如此律何故葉之茂笑曰律設大法禮順人情今我以禮教汝汝必無怨惡以律治汝汝何所措其手足乎一門之内小者可論大者可殺也且歸念之數年教化大行道不拾遺遷京部丞平帝時王莽置主勸農桑宻人老少皆涕泣隨送及王莽居攝以病免歸上即位先訪求茂茂時年七十餘詔曰夫名冠天下當受天下重賞今以茂為太傅封褒徳侯朱鮪以洛陽降冬十月帝入都之帝遣呉漢率朱祐字仲先宛人等十一將軍圍朱鮪于洛陽數月不下帝以岑彭嘗為鮪校尉令往說之鮪曰大司徒被害時鮪與其謀又諫更始無遣蕭王北伐自知罪深不敢降彭還言之帝曰舉大事者不忌小怨鮪今若降官爵可保况誅罰乎河水在此吾不食言彭復往告鮪乃降鮪封扶溝侯𫝊累世十月車駕入洛陽幸南宮注見前遂定都焉侍御史杜詩安集洛陽將軍蕭廣縱兵暴横詩敕曉不改遂格殺廣上召見詩賜棨㦸擢任之之杜詩字君公河内汲人棨㦸前驅之器以赤油韜亦謂之油㦸王公以下皆用之淮陽王降于赤眉尋被殺赤眉下書曰聖公降者封長沙王過二十日勿受更始乃遣劉恭請降赤眉使謝禄受之劉恭請如夲約樊崇等封更始為長沙王常依謝禄居恭亦擁䕶之已三輔苦赤眉暴虐欲盗出更始張卬等以為慮使謝禄縊殺之劉恭夜往藏其屍帝使鄧禹葬之于霸陵鄧禹引軍屯栒邑漢縣故城在今陜西邠州三水縣禹擊定河東斬更始將樊參劉均等遂渡河破左輔兵更始左輔都尉公乘歙引衆十萬拒禹禹擊破之是時劉盆子居長樂宫兵士暴掠百姓不知所歸聞禹乘勝獨克師行有紀皆望風相擕負以迎禹輒停車住節以勞來之垂髫戴白滿其車下莫不感恱于是名震闗西諸將皆勸禹徑攻長安禹曰吾衆雖多能戰者少前無可仰之積後無轉饋之資赤眉新入長安財賦方盛鋒銳未可當夫盗賊羣居無終日計變故萬端非能堅守者也上郡北地安定注俱見前饒穀多畜吾且休兵北道就糧飬士觀其敝乃可圖也于是引軍北至栒邑所至郡縣皆開門歸附頃之將軍馮愔宗歆争權相攻愔遂殺歆因反擊禹帝聞之使尚書宗廣諭降愔愔䕶軍黄防縳愔歸罪廣并降更始諸將王匡成丹等至安邑盡誅之十一月梁王永稱帝十二月隗囂據天水漢郡治平襄故城在今甘肅鞏昌府通渭縣自稱西州上將軍囂歸天水招聚其衆復據故地自稱西州上將軍三輔士大夫避亂者多歸之囂傾身引接為布衣交以范逡平陵人為師友鄭興字少贛河南開封人為祭酒申屠綱見前杜林字伯山扶風茂林人為治書馬援字文淵茂林人王元字惠孟杜陵人等為將軍班彪字叔皮穉之子之屬為賓客由是名震西州聞于山東馬援少時以家用不足辭其兄况欲就邊郡田牧况曰汝大才當晩成良工不示人以璞且從所好遂至北地牧田常曰丈夫為志窮當益堅老當益壮後有畜數千頭穀數萬斛既而嘆曰凡殖財産貴其能賑施也否則守錢虜耳乃盡㪚于親舊聞隗囂好士往從之囂甚敬重與决籌䇿竇融字周公扶風平陵人廣國七世孫據河西自稱五郡武威張掖酒泉敦煌金城是為河西五郡大將軍竇融累世仕宦河西知其土俗更始時私謂兄弟曰天下安危未可知河西殷富帶河為固張掖屬國精兵萬騎一旦緩急杜絶河津足以自守此遺種處也章懷曰遺留也可以保全不畏絶滅乃因趙萌求為都尉融既到撫結雄傑懷輯羌虜得其歡心與酒泉太守梁統字仲寧安定烏氐人等金城太守庫鈞張掖都尉史苞酒泉都尉竺曾敦煌都尉辛彤庫釣章懷曰庫氏倉庫吏後今羌中有姓庫者音舍承釣之後也史苞茂陵人竺氏孤竹君之後五人尤厚善及更始敗融與統等計議議曰今天下擾亂未知所歸河西斗絶在羌胡中不同心戮力則不能守權均力齊復無以相率當推一人為大將軍共全五郡觀時變動議既定衆推統統辭乃推融行河西五郡大將軍事以梁統為武威太守史苞為張掖太守竺曾為酒泉太守辛彤為敦煌太守唯庫鈞為金城太守如故而融亦仍居屬國領都尉職置從事監察五郡河西民俗質樸融等政亦寛和上下相親晏然富殖羌胡咸服流民歸之盧芳字君期安定三水人據安定自稱西平王匈奴迎之立以為漢帝王莽時天下咸思漢德盧芳詐稱武帝曽孫劉文伯誑惑安定間及更始敗芳自立為上將軍西平王使使與匈奴結和親單于以漢中絶劉氏來歸當如漢立呼韓邪令尊事我乃使騎迎芳入匈奴立為漢帝四年五原人李興等迎芳入塞居九原縣芳自稱天子與匈奴通兵侵苦北邊鄧禹承制以隗囂為西州大將軍胡三省注承制言承制詔而命之也後之承制始此馮愔之叛也引兵西向天水囂擊破之于是禹承制遣使持節命囂為西州大將軍得専制凉州朔方注俱見前事丙戌二年春正月甲子朔日食劉恭知赤眉必敗宻教弟盆子歸璽綬習為辭讓之言及是日大㑹盆子下牀觧璽綬叩頭曰今設置縣官而為賊如故四方怨恨不復信向此皆立非其人所致願乞骸骨避賢聖路必欲殺盆子以塞責者無所離死因涕泣嘘唏崇等憐之避席頓首曰臣無狀負陛下請後不敢因共抱持盆子帶以璽綬盆子號呼不得已既罷出各閉營自守三輔翕然稱天子聰明百姓争還長安市里且滿復二十餘日復出大掠如故悉封諸功臣為列侯䇿曰在上不驕高而不危制節謹度滿而不溢敬之戒之傳爾子孫長為漢藩陰鄉侯陰識貴人之兄也以軍功當増封識叩頭讓曰臣託屬掖庭仍加爵土不可以示天下帝從之次陰氏齊管仲七世孫修為楚陰大夫因氏焉識字伯新野人郎中馮勤字偉伯魏郡繁陽人典諸侯封事差量功次輕重國土逺近地勢豐薄不相踰越莫不厭服焉帝以為能尚書衆事令總録之故事尚書郎以令史久次補帝始用孝亷為之立宗廟郊社于洛陽起高廟于洛陽四時合配髙祖太宗世宗建社稷于宗廟之右立郊兆于城南赤眉西掠安定北地鄧禹入長安長安城中食盡赤眉收載珍寳大縱火燒宫室引兵而西衆號百萬自南山轉掠城邑遂入安定北地于是鄧禹南至長安謁高廟收十一帝神主送詣洛陽埽除園陵置吏士奉守是秋九月赤眉欲上隴隗囂遣將迎撃破之赤眉乃復還發掘諸陵取其寳貨鄧禹擊之反為所敗禹乃出之雲陽赤眉遂復入長安時延岑屯杜陵赤眉将逢安擊之岑大破安軍死者十餘萬人真定王楊謀反伏誅楊造讖記楊病癭因造讖記曰赤九之後癭楊為主以此惑衆與綿蔓漢縣故城在今直𨽻正定府獲鹿縣賊交通帝遣將軍耿純持節行幽冀宻敕收楊純至真定邀楊相見純真定宗室之出故楊不以為疑因閉閤誅之二月帝幸修武漢縣今河南衛輝府獲嘉縣是懷慶之修武漢山陽縣也鮑永來降先是更始上黨太守田邑知更始敗舉郡來降帝因遣使者持節徴鮑永永與其將軍馮衍衍白說廉丹不聽乃亡命河東㑹永至以為立漢將軍疑不肯降或言更始隨赤眉在北收繋使者遣使至長安詗問虚實至是永衍審知更始已亡乃發喪出使者封上印綬悉罷兵幅巾詣河内帝見永問曰卿衆安在永叩頭曰臣事更始不能令全誠慚以其衆幸富貴故悉罷之帝曰卿言大而意不恱既而永以立功見用衍遂廢棄永謂衍曰昔高祖賞季布之罪誅丁固之功今遭明主亦何憂哉衍曰天命難知人道易守守道之臣何患死亡大司空梁罷以宋𢎞字仲子長安人為大司空封宣平侯𢎞薦桓譚帝問𢎞通博之士乃薦譚為議郎給事中帝令譚鼓琴愛其繁聲𢎞聞之不恱伺譚出朝服坐府上遣吏召譚至不與席而讓之譚頓首謝良久乃已後大㑹羣臣帝使譚鼔琴譚見𢎞失其常度帝怪而問之𢎞免冠謝曰所以薦譚者望能以忠直導主而令朝廷耽恱鄭聲臣之罪也帝改容謝之湖陽公主新寡帝與共語朝臣微觀其意主曰宋公威容徳器羣臣莫及後𢎞被引見帝令主坐屛風後因謂𢎞曰諺云貴易交富易妻人情乎𢎞曰臣聞貧賤之交不可忘糟糠之妻不下堂帝顧謂主曰事不諧矣湖陽公主帝長姊名黄漁陽太守彭寵反帝之討王郎也彭寵發突騎轉糧食前後不絶及帝追銅馬至薊寵自負其功意望甚髙帝接之不能滿帝即位呉漢王梁為三公寵愈怏怏幽州牧朱浮字叔元沛國瀟人年少欲厲風迹收士心辟趙州中名宿多發倉穀廩贍之寵以為師旅方起不宜多置官屬以捐軍實不從其令浮數贈寵上輒漏泄令寵聞以脅恐之至是徴寵寵益自疑其妻素剛固勸無就徴帝遣寵從弟子后蘭卿往喻寵留之遂發兵反攻浮于薊又數遣使要誘耿况况斬其使延岑反據漢中公孫述擊取之延岑復反漢中王嘉敗走岑遂據漢中為更始將李寳所破走天水公孫述遂取南鄭嘉擊之不利岑引北入散闗在今陜西漢中府鳯縣東北嘉追撃破之述遣將從閬中今縣本漢置四川保寧府治下江州漢縣注見前東據扞闗注亦見前于是盡有益州之地遣執金吾賈復擊郾大司馬呉漢撃宛皆降之更始諸大將在南方未降者尚多帝詔諸將議曰郾最彊宛為次誰當撃之賈復率然對曰臣請撃郾帝笑曰執金吾擊郾吾復何憂大司馬當擊宛遂遣復擊郾破之尹尊降漢擊宛宛王賜奉更始妻子詣洛陽降帝封賜為愼侯是秋賈復擊召陵新息皆平之復部將殺人于潁川太守寇恂戮之復以為恥欲殺恂恂知之不欲與相見姊孕谷從曰崇將也得帶劍侍側有變足以相當恂曰不然昔藺相如不畏秦王而屈于亷頗者為國也乃敕縣屬盛供具儲酒醪執金吾軍入界一人皆兼二人之饌恂出迎于道稱疾而還復勒兵欲追之而吏士皆醉遂過去恂遣谷崇以狀聞帝乃徴恂恂至引見時復先在坐欲起避之帝曰天下未定兩虎安得私鬬今日朕分之于是並坐極歡遂共車同出結友而去封諸宗室為王侯後漢諸王固所治邑多仍前漢餘或徙置不一今不具注因事附見帝叔父良字次伯帝兄弟少孤良撫循甚篤及兵起良從軍更始立以為國三老隨入關族父歙字經孫其子終與帝少相親愛更始入闗封歙元氏王終為侍中族兄祉字巨伯舂陵康侯敞之子更始封為定陶王皆自長安來于是封良為廣陽王後徙封趙歙為泗水王祉為城陽王歙子終為淄川王又封兄縯子章縯長子為太原王後徙封齊興縯次子為魯王嗣帝兄仲更始三子求歆鯉皆為列侯帝以伯升首起遭害小長安之敗兄仲及姊元俱没亂兵乃追謚伯升為齊武王仲為魯哀王姊元為新野節義長公主夏六月立貴人郭氏為皇后子彊為皇太子初帝從更始在宛納新野陰氏之女麗華帝微時適新野聞麗華羙心恱之及至長安見執金吾車騎甚盛因嘆曰仕宦當作執金吾娶妻當得陰麗華故遂納焉既即位遣使迎至立為貴人帝以貴人雅性寛仁欲立為后貴人以郭貴人有子辭不肯當乃立郭后秋八月帝自將征五校降之帝幸内黄漢縣今屬河南彰徳府自率諸將大破五校于羛許宜反陽聚名水經注作井陽在内黄縣東降其衆五萬人先是刁子都為其部曲所殺餘黨與諸賊㑹于檀鄉是年渡河與五校合寇魏郡清河帝遣呉漢等擊破之降者十餘萬漢又與馮異擊五樓五幡諸賊皆破之三年呉漢率耿弇盖延擊破青犢于軹西四年漢又擊破五校于箕山是冬漢率耿弇王常等撃富平獲宰于平原五年春漢大破賊衆因追討餘黨進至渤海皆平之于是諸賊悉定軹檀鄉亦曰檀城在今山東兖州府滋陽縣東北漢縣注見前箕山在今山東東昌府濮州將軍盖延克睢陽劉永走湖陵注見前帝遣盖延督馬武等四將軍伐永故更始將蘇茂與俱軍中不相能茂遂反據廣樂故城在今河南歸徳府虞城縣降永永封為淮陽王延等撃破永别將遂圍睢陽數月克之永奔譙漢縣故城在今江南潁州府亳州茂與佼彊周建合軍三萬人救永延與戰于沛西大破之茂奔還廣樂彊建從永走保湖陵明年呉漢等圍蘇茂于廣樂周建率衆救茂茂建戰敗棄城復還湖陵漢中王嘉降故更始將廖湛以赤眉十萬衆撃嘉嘉大敗之遂就穀雲陽帝素與嘉善令鄧禹招之嘉妻兄來歙字君叔新野人帝之姑子也亦勸嘉乃詣禹降至洛陽帝封為順陽侯將軍鄧奉反呉漢徇南陽多侵暴鄧奉謁歸新野怨漢掠其郷里遂反攻破漢軍屯淯陽漢縣故城在今南陽府南召縣與諸賊合從先是王常自鄧來歸更始封常為鄧王帝慰勞之甚歡及奉及帝于大會中指常謂羣臣曰此家率下江諸軍輔翼漢室心如金石真忠臣也即日拜漢忠將軍使與岑彭等討奉時堵陽人董訴反宛城揚化將軍堅鐔攻宛㧞之訢走堵鄉與鄧奉合堵音者章懷曰堵鄉在方城縣方城今南陽府裕州是堅鐔字子伋潁川襄邑人遣將軍馮異入闗徴鄧禹還京師鄧禹戰數不利歸附者日散帝乃遣馮異代之敕異曰三輔遭王莽更始之亂重以赤眉延岑之酷元元塗炭無所依訴將軍奉辭討諸不軌營保降者遣其渠帥詣京師㪚其小民令就農桑壞其營壁無使復聚征伐非必略地屠城要在平定安集之耳諸將非不健鬭然好虜掠卿本能御吏士念自修勅無為郡縣所苦異頓首受命所至布威信羣盗多降又詔徴鄧禹還曰慎毋與窮寇争鋒赤眉無穀自當來降吾以飽待饑以逸待勞折箠笞之非諸將憂也無得復妄進兵詔復宗室列侯為莽所絶者三輔大饑赤眉東出馮異與戰破之三輔大饑人相食城郭皆空白骨蔽野遺民往往聚為營堡各堅壁清野赤眉虜掠無所得乃引而東帝遣侯進屯新安注見前耿弇屯宜陽注亦見前敕曰賊若東走可引宣陽兵㑹新安南走可引新安兵㑹宜陽馮異與赤眉遇于華陰戰數十合降五千餘人丁亥三年春正月以馮異為征西大將軍鄧禹馮異與赤眉戰敗績鄧禹慚于受任無功數以饑卒徼赤眉戰輒不利及與馮異遇乃要異共攻之異曰賊衆尚多可以恩信傾誘難卒用兵破也禹不從遂戰軍潰既而復戰又大敗禹以二十四騎脫歸宜陽異棄馬走上回谿坂與麾下數人歸營收其散卒堅壁自守鄧禹上大司徒印綬詔以為右將軍立四親廟于洛陽祀父南頓君以上至舂陵節侯舂陵節侯鬱林太守鉅鹿都尉南頓令是為四親馮異大破赤眉于崤底崤山之底即二崤也注見前賊衆東走帝勒軍宜陽降之得𫝊國璽綬異與赤眉約期㑹戰預使壯士變服與赤眉同伏于道側迨賊悉衆攻議異乃縱兵大戰日昃賊氣衰伏兵卒起衣服相亂不復識别遂驚潰追撃大破于崤底降男女八萬人帝降璽書勞異曰始雖垂翅回谿終能奮翼澠池可謂失之東隅收之桑榆赤眉餘衆東向宜陽帝親勒六軍嚴陣以待之赤眉忽遇大軍驚震乃遣劉恭乞降曰盆子將百萬衆降陛下何以待之帝曰待汝以不死耳丙午盆子及丞相徐宣以下肉袒降上所得𫝊國璽綬積兵甲宜陽城西與熊耳山在今河南陜州盧氏縣南齊時赤眉衆尚十餘萬人帝令縣厨皆賜食明旦陳兵臨洛水令盆子君臣列而觀之帝謂樊崇等曰得無悔降乎朕今遣卿歸營勒兵鳴鼔相攻決其勝負不欲遣相服也徐宣等叩頭曰臣等出長安東都門君臣計議歸命聖徳今日得降猶去虎口歸慈母誠懼誠喜無所恨也帝曰卿所謂鐵中錚錚傭中佼佼者也賜樊崇等洛陽田宅帝憐盆子以為趙王郎中劉恭為更始報讐殺謝禄自繫獄帝赦不誅樊崇逄安後反伏誅徐宣楊音卒于鄉里二月劉永立董憲為海西漢縣故城在今江南海州王張歩為齊王歩殺光禄大夫伏隆字文伯湛之子青徐羣盗張歩等聞劉永破敗皆惶怖請降帝使伏隆持節安輯二州拜歩東萊太守永聞之即馳使封歩為齊王并封董憲為海西王歩貪王爵欲留隆隆不聽求得反命歩遂執隆而受永封隆遣閒使上書曰臣雖困扼授命不顧願以時進兵無以臣隆為念帝得奏召其父湛流涕示之曰恨不且許而遽求還也其後歩遂殺之帝方北憂漁陽南事梁楚故歩得專集齊地據郡十二三月以伏湛為大司徒彭寵自稱燕王朱浮以帝不自征彭寵上疏求救詔報曰度此反虜勢無久全其中必有内相斬者今軍資未充故須後麥耳浮城中糧盡人相食㑹耿况遣騎來救浮乃脫身走薊城遂降於彭寵寵自稱燕王涿郡太守張豐好方術有道士言豐當為天子以五綵囊裹石繋豐肘云石中有玉璽豐信之遂反與彭寵連兵明年祭遵等討豐禽之將斬豐曰肘中有玉璽傍人為椎破之豐乃知被詐仰天嘆曰當死無恨帝自將征鄧奉夏四月奉降誅之帝至堵陽漢縣故城在今南陽府裕州董訢降奉逃歸帝追之至小長安大破之奉肉袒因朱祐降祐先為奉所執故因之請降帝憐奉欲宥之岑彭耿弇諌曰奉背恩反逆陛下親在行陳猶俟兵敗乃降不誅無以懲惡于是斬之復朱祐位馮異撃延岑破之岑走南陽闗中平延岑既破赤眉欲據闗中時闗中衆寇猶盛各稱將軍據地擁兵多者萬餘人少者數千人岑引之攻異異撃大破之諸營堡附岑者皆來降岑遂自武闗走南陽時百姓饑餓道路斷隔委輸不至異軍中悉以果實為糧詔拜趙匡為右扶風將兵助異并送縑穀異兵食漸盛乃稍誅撃豪傑不從令者褒賞降附有功勞者悉遣諸營渠帥詣京師散其衆歸本業威行闗中餘寇悉平延岑攻南陽耿弇大破之遂走歸秦豐岑䕶軍鄧仲况據陰縣劉歆孫龔為其謀主前侍中蘇竟以書曉之仲况與龔降竟終不伐其功隠身樂道夀終千家延岑後奔蜀公孫述以為大司馬漢陰縣故城在今湖北襄陽府光化縣蘇竟字伯況平陵人劉龔字孟公夏五月帝還宫乙卯晦日食秋七月劉永將慶吾齊大夫慶父之後以字為氏斬永降蘇茂等復立永子紆為梁王睢陽人反城迎永蓋延圍之百日永與蘇茂周建突出將走酇注見前諸將追急永將慶吾斬永首以降封吾為列侯蘇茂周建奔垂惠聚名在今江南潁州府䝉城縣共立永子紆為梁王佼彊奔保西防明年秋帝遣馬武王霸國劉紆周建于垂惠又明年二月蘇茂救建馬武為茂所敗奔遇王霸營大呼求救霸聞營堅壁示不相援茂乘勝前進紆建亦悉出兵與武合戰良久霸乃開營後出精騎襲其背茂建前後受敵敗走霸武各歸營茂建復聚兵挑戰霸堅卧不出方饗士作倡樂茂兩射營中中霸前酒尊霸安坐不動茂建既不得戰乃引還營其夜建兄子誦閉城拒之建于道死茂奔下邳與董憲合紆奔佼彊冬十月帝如舂陵祠園廟十一月還宮李憲稱帝都舒今廬州府舒城縣是置百官擁九城衆十餘萬遣大中大夫來歙使隗囂帝謂來歙曰今西州未附子陽稱帝道里阻逺思西州方畧未知所在奈何歙曰臣嘗與隗囂遇長安其人始起以漢為名臣願得奉威命開以丹青之信囂必束手自歸則述自亡之執不足圖也帝乃令歙使囂囂腹心議者多勸囂通使京師乃奉奏詣闕帝報以殊禮戊子四年秋八月帝如壽春以侯覇字君房河内宻人為尚書令王莽末天下亂臨淮大尹侯霸獨能保全其郡帝徴㑹壽春拜尚書令時朝廷無故典又少舊臣霸明習故事收録遺文條奏前世善政法度施行之冬十月帝還宫隗囂遣馬援奉書入見囂使馬援往觀公孫述援與述舊同里閈相善以為既至當握手歡如平生而述盛陳陛衛見援交拜禮畢延援就客館備威儀㑹百官為援立舊交之位述磬折而入禮饗甚盛欲留援援謂其客曰天下雌雄未定公孫不吐哺迎國士與圖成敗乃修飾邊幅如偶人形此何足久留乎因辭歸謂囂曰子陽井底蛙耳而妄自尊大不如専意東方囂乃使援奉書洛陽初到良久中黄門引入帝在宣德殿南廡下袒幘坐迎笑謂援曰卿遨遊二帝間今見卿使人大慙援頓首辭謝因曰當今之世非但君擇臣臣亦擇君矣臣與公孫述同縣少相善臣前至蜀述陛㦸而後進臣臣今逺來陛下何知非刺客姦人而簡易若是帝復笑曰卿非刺客顧説客耳援曰天下反覆盗名字者不可勝數今見陛下恢廓大度同符高祖乃知帝王自有真也已遣來歙送援歸隴右是冬公孫述遣兵屯陳倉將徇三輔馮異迎撃大破之囂遣兵佐異有功帝報以手書是後每與異令勢挫述述遣使以大司空扶陽王印授囂囂斬其使以故蜀兵不復北出縣陳倉秦縣故城在今鳯翔府寳雞太傅褒德侯卓茂卒十二月帝如黎邱遣將軍朱祐圍秦豐岑彭撃田戎初帝征鄧奉還遣岑彭南撃秦豐豐拒彭于鄧漢縣即春秋鄧國注見前彭撃破之豐與其大將蔡宏拒彭兵不得進彭乃聲言西撃山都緩所獲虜令得亡歸告豐豐悉其衆西邀彭彭乃潛軍渡沔撃破豐將張揚從川谷間伐木開通直襲黎邱撃破諸屯兵也山都漢縣故城在今襄陽縣沔水上流孔安國曰沔至漢中合漢互相通稱進圍黎邱别遣將徇江東揚州悉定至是凡三歳斬首九萬餘級豐餘兵裁千人食且盡帝幸黎邱勞軍招豐降豐不肯降帝以豐轉弱令朱祐代彭守之使彭撃田戎戎聞秦豐被圍懼引兵至黎邱欲降其妻兄誑之而先降以書招戎戎怒其賣已遂亡歸夷陵彭進撃大破之拔夷陵戎奔蜀公孫述以為翼江王己丑五年春正月帝還宫二月彭寵奴斬寵來降封奴為不義侯寵妻數為惡夢又多見怪變寵以子后蘭卿質漢歸不信之使將兵居外寵齋在便室蒼頭子宻等三人因寵卧寐共縳之收取金玉寳物夜觧寵手令作記告城門將軍開門書成斬寵及妻頭馳以詣闕明旦官屬始覺其尚書韓立等共立寵子午為王國師韓利斬午首詣祭遵降夷其宗族帝封子宻為不義侯權德與議曰伯通之叛命子宻之戕君同歸于亂罪不相蔽宜各致于法昭示王度反乃爵于五等又以不義為名且舉以不義莫可侯也此而可侯漢爵為不足勸矣遣將軍耿弇討張歩先是耿弇從容言于帝自請北收上谷兵定彭寵于漁陽取張豐于涿郡還收諸賊東攻張歩以平齊地帝壯其意許之至是弇與呉漢撃降羣賊于平原因詔弇進討張歩弇率騎都尉劉韻字細君植之從兄㤗山太守陳俊引兵而東遣將軍龎萌蓋延撃董憲萌反帝自將討之龎萌為人遜順帝信愛之萌先為更始冀州牧將兵屬謝躬躬敗乃降帝以為侍中常稱曰可以託六尺之孤寄百里之命者龎萌是也拜平狄將軍使與蓋延共撃董憲時詔書獨下延而不及萌萌以延譖已自疑遂反襲延軍破之與董憲連和帝聞之大怒自將討萌與諸將書曰吾常以龎萌為社稷之臣將軍得無笑其言乎老賊當族其各厲兵㑹睢陽龎萌攻破彭城將殺楚郡太守孫萌郡吏劉平伏太守身上號泣請代身被七創龎萌義而捨之太守已絶復蘇渴求飲平傾創血以飲之夏四月旱蝗竇融遣使奉書入見詔以融為凉州牧初竇融等聞帝威徳心欲東向以河西隔逺未能自通乃從隗囂受建武正朔囂皆假其將軍印綬然囂内懷異心使辯士張元說融等曰更始事已成尋復亡滅此一興不再興之效也方今當各據土宇與隴蜀合從高可為六國下不失尉佗融等詔豪傑議之皆曰今皇帝姓名見于圖書前世谷永夏賀良等皆言漢有再受命之符况洛陽土地最廣甲兵最強號令最明觀符命而察人事他姓殆未能當也融遂決䇿東向遣長史劉鈞等奉書詣洛陽時帝亦發使遺融書遇鈞于道與俱還見帝賜融璽書曰今益州有公孫子陽天水有隗將軍方蜀漢相攻權在將軍舉足左右便有輕重以此言之欲相厚豈有量哉欲遂立桓文輔㣲國當勉卒功業欲三分鼎足連横合從亦宜以時定今之議者必有任囂教尉佗制七郡之計王者有分土無分民自適已事而已因授融涼州牧璽書至河西河西皆驚以為天子明見萬里之外六月秦豐降斬之豐窮困降于朱祐祐送洛陽斬之董憲劉紆遣蘇茂佼彊救龎萌帝自將擊破之董憲在下邳聞帝自討萌乃以劉紆還蘭陵遣蘇茂佼彊助萌合兵圍桃城即春秋桃邱今山東㤗安府東阿縣西南有桃城舖其旁邱尚存帝時幸蒙漢縣故城在今河南歸德府商邱縣因自將征之先理兵任城漢縣今兖州府濟寧州是馳使召呉漢王常等至乃率衆進救桃城帝親自摶戰大破之萌茂彊夜走從董憲秋七月帝如湖陵佼彊降蘇茂奔張步董憲龎萌奔朐漢縣故城在今江南海州梁人斬紆以降帝自沛進幸湖陵董憲與劉紆悉其兵數萬人迎距帝親臨四面攻憲三日大破之佼彊率其衆降蘇茂東奔張步憲萌走保朐劉紆不知所歸其軍士髙扈斬其首降呉漢進圍朐冬十月帝如魯使大司空𢎞祠孔子耿弇與張步戰大破之帝勞弇軍步斬蘇茂以降齊地悉平張步聞耿弇將至使其將費邑軍厯下故城在今山東濟南府厯城縣治西城在厯山之下故名又令兵屯祝阿注見前别于泰山鍾城在今濟南府禹城縣漢時地屬泰山郡故曰泰山鍾城列營數十以待之弇渡河先拔祝阿故開圍一角令其衆奔歸鍾城鍾城人聞祝阿已潰大恐懼遂空壁已走誘致費邑于巨里城名亦曰巨合城在厯城縣東擊斬之復進兵縱擊諸未下者遂定濟南時張步都劇注見前使其弟藍將精兵二萬守西安漢縣故城在今青州府臨淄縣諸郡太守合萬餘人守臨淄相去四十里弇進軍居二城之間視西安城小而堅藍兵又精臨淄名雖大而實易攻乃揚言欲攻西安而出不意攻臨淄半日拔之入據其城藍棄西安歸劇于是步率兵號二十萬至臨淄大城東攻弇弇故示弱以盛其氣使都尉劉歆與戰弇引精兵横突歩陳于東城下大破之時帝在魯聞弇為歩所攻自往救之未至陳俊謂弇曰劇虜兵盛可且閉營休士以須上來弇曰乘輿且到臣子當撃牛釃酒以待百官敢以賊虜遺君父耶乃出兵大戰復大破之歩還劇兄弟各分兵散去數日車駕至臨淄自勞軍羣臣大㑹帝謂弇曰昔韓信破厯下以開基今將軍攻祝阿以發迹此皆齊之西界功足相方將軍前在南陽建此大策常以為落落難合有志者事竟成也帝進幸劇弇復追歩蘇茂將萬人救之茂讓歩曰大王奈何就攻弇營既呼茂不能待邪歩曰負負無可言者帝乃遣使告歩茂能相斬降者封列侯歩遂斬茂以降其弟藍等自繋所在獄詔皆赦之封歩為安邱漢縣今屬青州府侯弇罷遣歩兵各歸鄉里齊地悉平後歩逃奔臨淮欲招其故衆入海陳俊撃斬之初起太學帝還讀曰旋如魯而反也視之帝幸太學稽式古典修明禮樂煥然文物可觀矣十一月大司徒伏湛免以侯霸為大司徒霸聞太原閔仲叔名貢之名而辟之既至霸不及政事徒勞苦而已仲叔曰始䝉嘉命且喜且懼今見明公喜懼皆去以仲叔為不足問耶不當辟也辟而不問是失人也遂辭出投劾而去隗囂遣子入侍囂自比西伯議欲稱王鄭興諫阻又欲廣置職位鄭興復諫囂病之而止囂當問班彪曰昔周亡戰國並争數世始定意者縱横之事復起于今日乎彪既疾囂言又傷時方艱乃作王命論以感之囂不悟時闗中將帥數上書言蜀可撃之狀帝以書示囂因使擊蜀以效其信囂上書盛言三輔單弱劉文伯在邊時盧芳入塞掠據五郡朱宜謀蜀帝知囂不願天下統一于是稍屈其禮正君臣之儀以囂與馬援來歙相善數使歙援奉使徃來勸令入朝囂雅信援與論東方事問帝何如髙祖援曰不如也髙祖無可無不可今上好吏事動如節度又不喜飲酒囂不懌曰如卿言反覆勝耶已帝復遣來歙說囂遣子入侍囂聞劉永彭寵皆已破滅乃遣長子恂隨歙詣闕帝以為胡騎校尉封鐫羌侯以恂能琢鑿羌戎故以為封號囂雖遣子入質猶負其險阨欲專制方靣其將王元又勸囂無專心内事元曰天水完富士馬最强元請以一丸泥為大王東封凾谷關此萬世一時也若計不及此且畜養士馬據隘自守圖王不成猶足以霸囂然其計申屠剛諌曰璽書數到委國歸信欲與將軍共吉凶布衣相與尚有不負然諾之信况于萬乘者哉今何畏何利而久疑若此卒有非常之變上負忠孝下愧當世願反覆計之囂不納于是遊士長者稍稍去之鄭興因恂求歸葬父母與妻子俱東馬援亦將家屬隨恂歸洛陽交阯牧鄧讓等遣使貢獻王莽末交阯諸郡閉境自守岑彭素與交阯牧鄧讓厚善與讓書陳國家威徳又遣偏將軍屈充移檄江南班行詔命于是讓與江夏太守侯登武陵太守王堂長沙相韓福桂陽太守張隆零陵太守田翕蒼梧太守杜穆交阯太守錫光等相率遣使貢獻悉封為列侯錫光者漢中人在交阯教民夷以禮義帝復以南陽任延為九真太守延教民耕種嫁娶故嶺南華風始于二守焉任延字長孫宛人徴處士周黨字伯况太原廣武人嚴光本姓莊避明帝諱改嚴光字子陵㑹稽餘姚人王良字仲子東海蘭陵人至京師黨光不屈以良為諫議大夫黨入見伏而不謁自陳願守所志博士范升字辨卿代郡人奏曰伏見周黨王良等䝉受厚恩使者三聘乃肯就車及陛見帝廷黨不以禮屈伏而不謁偃蹇驕悍同時俱逝黨等文不能演義武不能死君釣采華名庶幾三公之位臣願與坐雲臺之下考試圖國之道書奏詔曰自古明王聖主必有不賓之士伯夷叔齊不食周粟太原周黨不受朕禄亦各其志焉其賜帛四十匹罷之帝少與嚴光同遊學及即位以物色訪之得于齊國累徴乃至拜諫議大夫不肯受去耕釣于富春山在嚴州府桐廬縣西一名嚴陵山前臨大江上有東西二臺為光隠釣處中以壽終于家王良後厯沛郡太守大司徒司直在位恭儉布被瓦器妻子不入官舍後以病歸一歳復徴至滎陽過其友人友人拒不肯見曰不有忠言竒謀而取大位何其往來屑屑不憚煩也良慙後徴不應卒于家時太原王霸北海逢萌亦隠居飬志俱被聘霸到尚書拜不稱臣問之荅曰天子有所不臣諸侯有所不友遂以疾歸萌客遼東天下定乃還琅邪不其山中連徴不起王霸字儒仲廣武人逢萌注見前不其山在今山東萊州府即墨縣東南庚寅六年春正月以舂陵鄉為章陵縣復其徭役復徭役比豐沛將軍馬成等拔舒舒人斬李憲降考是年通鑑及綱目俱遺拔舒事今依後漢書補輯先是帝在壽春遣馬成等撃憲遂圍舒事在四年至是始拔之憲亡走其軍士帛意帛姓意名斬之以降二月將軍呉漢等拔朐斬董憲龎萌憲萌皆𫝊首洛陽于是江淮山東悉平馮異入朝異治闗中出入三歳上林成都異屯兵上林苑中人有上章言異威權至重百姓歸心號為咸陽王帝以章示異異惶懼上書陳謝詔報曰將軍之于國家義為君臣恩猶父子何嫌何疑而有懼意至是自長安入朝帝謂公卿曰是我起兵時主簿也為我披荆棘定闗中既罷賜珍寳錢帛詔曰倉卒蕪蔞亭豆粥滹沱河麥飯厚意久不報異稽首謝曰臣聞管仲謂桓公曰願君無忘射鉤臣無忘檻車齊國賴之臣今亦願國家無忘河北之難小臣不敢忘巾車異在巾車鄉為漢兵所獲事見前之恩留十餘日令與妻子還西夏四月帝如長安謁園陵遣耿弇等七將軍從隴道伐蜀先是帝以闗東悉平騰書隴蜀告示禍福公孫述屢移書中國自陳符命冀以惑衆帝與述書曰圖讖言公孫即宣帝也代漢者當塗高君豈髙之身耶乃復以掌文為瑞王莽何足效乎君非吾賊臣亂子倉猝時人皆欲為君事耳天下神器不可力争宜留三思署曰公孫皇帝𫐠不荅又聽荆邯之說邯言漢帝東伐四分天下而有其三若舉兵天水則九分而有其八梁州之地將有自潰之變臣之愚計急以此時發國内精兵令田戎據江陵臨江南之㑹𫝊檄呉楚長沙以南必從風而靡令延岑出漢中定三輔天水隴西拱手自服如此海内震搖冀有大利述然其言欲悉發兵使延岑田戎分出兩道與漢中諸將合兵并勢蜀人及其弟光以為不宜空國千里之外决成敗于一舉固争之述乃止延岑田戎亦數請兵立功述終疑不聽已而述遣兵寇南郡帝乃詔隗囂欲從天水伐蜀囂上言述性嚴酷上下相患須其罪惡孰與熟同著而攻之帝知其終不為用乃謀討之遣耿弇蓋延等七將軍從隴道伐蜀先使中郎將來歙奉璽書賜囂喻㫖囂猶豫不决歙遂發憤質責之因欲前刺囂囂起入部勒諸將欲殺歙王遵諫曰殺之無損于漢而隨以族滅歙為人有信義西州士大夫皆重之多為其言始得免歸五月帝還宫隗囂反使其將王元據隴坻注見前諸將與戰敗績囂遣兵下隴馮異祭遵撃破之囂降蜀囂發兵反使王元據隴坻伐木塞道諸將與戰大敗囂乘勝使王元行廵行氏周大行人之官其後以官為氏將二萬餘人下隴馮異大破廵軍于栒邑巡將取栒邑異馳兵欲先據之諸將以虜方盛不可與争異日攻者不足守者有餘吾先據城以逸待勞非所以争也潛往閉城偃旗鼓廵不知馳赴之異卒撃鼓建旗而出巡軍驚走追撃大破之祭遵亦破王元于汧漢縣以汧水名故城在今陜西鳳翔府隴州于是北地諸豪長耿定等悉叛囂降初馬援聞囂欲貳于漢數以書責譬之囂得書增怒及囂反援上書願聽詣行在極陳滅囂之術帝乃召之援具言謀畫帝因使將突騎五千往來遊說囂將高峻任禹之屬下及羌豪為陳禍福以離囂支黨及是囂上疏謝曰吏民聞大兵卒至臣不能禁止昔虞舜事父大杖則走小杖則受臣雖不敏敢忘斯義有司以囂言慢請誅其子帝不忍復使來歙至汧陽汧水之陽賜囂書曰今若束手復遣恂弟歸闕廷者則爵禄獲全吾年垂四十在兵中十歳厭浮語虛辭即不欲勿報囂知帝審其詐遂遣使稱臣于公孫述述以囂為朔寧王是時竇融遣其弟友上書具言臣幸得托先后末屬累世二千石臣復假厯將帥守持一隅故遣劉鈞口陳肝膽而璽書盛稱蜀漢二主三分鼎足之權任囂尉佗之謀竊自病傷臣融雖無識猶知利害之際順逆之分豈可背真舊之主事姦偽之人廢忠貞之節為傾覆之事棄已成之基求無冀之利謹遣弟友詣闕陳誠會隗囂反道不通乃遣司馬席封間道通書帝復遣封賜融友書所以慰藉之甚厚融乃與囂書曰將軍親遇厄會之際國家不利之時守節不回承事本朝融等所以欣服高義願從役于將軍也而忿悁之間改節易國委成功造難就百年累之一朝毁之豈不惜乎當今西州地勢局廹易以輔人難以自建計若失路不反聞道猶迷不南合子陽則北入文伯耳夫負虚交而易彊禦恃逺救而輕近敵未見其利也囂不納六月并省縣國減損吏員詔曰夫張官置吏所以為民也今百姓遭難户口耗少而縣官吏職所置尚繁其令司隸州牧各實所部省減吏員縣國不足置長吏者并之于是並省四百餘縣吏職減損十置其一秋九月丙寅晦日食執金吾朱浮上書曰昔堯舜之盛猶加三考大漢之興亦累功效吏皆積久至長子孫而間者守宰數見换易迎新相代疲勞道路尋其視事日淺未足昭見其職既加嚴切人不自保廹于舉劾懼于刺譏故争飾詐偽以希虚譽斯所以致日月失行之應也願陛下遊意于經年之外望治于一世之後天下幸甚帝采其言自是牧守易代頗簡冬十二月大司空𢎞免復田租舊制詔曰頃者師旅未觧用度不足故行十一之税今糧儲差積其令郡國收見田租三十税一如舊制建武之初一石粟直黄金一斤二年秋野穀旅生野蠶成繭民收其實以為衣糧五年以後野榖漸少南畝益墾辛夘七年春三月癸亥晦日食詔百官各上封事不得言聖大中大夫鄭興上疏曰夫國無善政則謫見日月要在因人之心擇人處位今公卿大夫多舉漁陽太守郭伋先是彭寵誅帝以伋為漁陽守伋承離亂之後養民訓兵開示威信盗賊銷散匈奴逺迹郭伋字細侯茂陵人可大司空者而不以時定願陛下屈已從衆以濟羣臣讓善之功頃年日食每多在晦先時而合皆月行疾也日君象而月臣象君亢急則臣下廹促故月行疾今陛下高明而羣臣惶促宜留思柔克之政垂意洪範之法書奏多有所納帝嘗問興以郊祀事曰吾欲以䜟㫁之對曰臣不為識帝怒曰卿不為䜟非之邪興曰臣于書有所未學無所非也帝乃觧曰言不當若是邪以李通為大司空以杜詩為南陽太守詩政治清平興利除害百姓便之又修治陂池廣拓土田郡内比室殷足時人方于召信臣南陽為之語曰前有召父後有杜母壬辰八年春遣中郎將來歙伐隗囂取畧陽漢道故城在今甘肅秦州秦安縣夏閏四月帝自將征囂竇融等率五郡兵以從囂衆皆降囂奔西城胡三省注西縣城也漢西縣故城在今秦州呉漢引兵圍之來歙將二千餘人伐山開道從畨須章懷曰畨音盤谷名也回中注見前徑襲畧陽斬囂守將金梁囂大驚曰何其神也帝聞得畧陽甚喜又聞呉漢等諸將争馳赴之上以為囂失所恃亡其要領勢必悉以精鋭來攻曠日久圍而城不抜士卒頓蔽乃可乘危而進因追漢等還囂果使王元拒隴坻行巡守畨須口王孟塞雞頭山名注見前道牛邯軍瓦亭闗名在甘肅平凉府華亭縣西北囂自悉其大衆數萬人圍畧陽公孫述遣將李育田弇助之塹山築隄激水灌城來歙與將士固死堅守囂盡鋭攻之累月不能下夏閏四月帝自征囂光禄勲郭憲字子横汝南人諫曰東方初定車駕未可逺征乃當車拔佩刀以斷車靷帝不從西至漆漢縣後漢為新平今為邠州隸陜西諸將多以王師之重不宜逺入阻險計猶豫未决帝召馬援問之援因説讀如字囂將帥有土崩之勢兵進有必破之狀又于帝前聚米為山谷指畫形勢開示軍所從道徑往來分晰昭然可曉帝曰虜在吾目中矣明旦遂進軍至高平第一後漢書郡國志安定郡高平有第一城高平今甘肅平凉府固原州是竇融率五郡太守及羌虜小月氐等歩騎數萬輜重五千餘兩與大軍㑹是時軍旅草創諸將朝㑹禮容多不肅融先遣從事問㑹見儀帝聞而善之以宣示百僚乃置酒高㑹待融以殊禮遂進軍先是帝使來歙招降囂將王遵至是遵以書喻牛邯邯即來歸俱拜大中大夫于是囂大將十三人屬縣十六衆十餘萬皆降囂將妻子奔西城從楊廣而田弇李育保上邽漢縣故城在今秦州畧陽圍觧帝勞賜來歙班坐絶席專席獨坐尊寵之也在諸將之右進幸上邽詔告囂曰若束手自詣父子相見保無他也囂終不降于是誅其子恂使呉漢岑彭圍西城耿弇蓋延圍上邽以四縣封竇融為安豐漢縣故城在今河南光州固始縣侯弟友為顯親後漢侯國故城在今甘肅秦州侯及五郡太守皆封列侯遣西還所鎮融以久專方靣懼不自安數上書求代詔曰吾與將軍如左右手耳數執謙退何不曉人意勉循士民無擅離部曲潁川盗起秋九月帝還自上邽六日自將討平之遂還宫潁川盗羣起河東守兵亦叛京師騷動帝聞之曰吾悔不用郭子横之言八月帝自上邽晨夜東馳賜岑彭等書曰兩城若下便可將兵南撃蜀虜人苦不知足既平隴復望蜀毎一發兵頭須為白九月車駕還宫帝謂執金吾寇恂曰潁川廹近京師當以時定惟念獨卿能平之耳從九卿復出以憂國可也對曰潁川聞陛下有事隴蜀故狂狡乘閒相詿誤耳如聞乘輿南向賊必惶怖歸死臣願執鋭前軀帝從之車駕南征潁川盗賊悉降寇恂竟不拜郡百姓遮道曰願從陛下復借寇君一年乃留恂長社漢縣故城在今河南許州長葛縣鎮撫吏民受納餘降時東郡濟陰盗賊亦起帝遣李通王常撃之以東光侯耿純嘗為東郡太守威信著于衛地遣使拜大中大夫使與大兵㑹東都純初入界盗賊九千餘人皆詣降大兵不戰而還璽書復以純為東郡太守冬十一月公孫述遣兵救隗囂呉漢引兵下隴校尉温序温氏晉郤至食采于温其後以邑為氏序字次房太原郷人死之楊廣死隗囂窮困岑彭擁谷水水經注作西谷水在今秦州灌西城城未没丈餘㑹王元得巡周宗將蜀兵五千餘乘高卒至鼔譟大呼曰百萬之衆方至漢軍大驚未及陳元等决圍殊死戰遂得入城迎囂歸冀本冀戎地漢置縣故城在今甘肅鞏昌府伏羌縣呉漢軍食盡乃燒輜重引兵下隴諸將亦相隨而退于是天水隴西諸郡復反為囂校尉温序為囂别將荀宇所執欲降之序大怒叱曰何敢廹脅漢將因以節撾殺數人宇衆争欲殺之宇曰此義士死節可賜以劍序受劍銜須于口顧左右曰既為賊所殺毋令須汚血遂伏劍而死從事王忠持其喪歸洛陽詔賜以冢地拜三子為郎癸巳九年春正月征虜將軍潁陽漢縣故城在河南許州侯祭遵卒于軍詔馮異領其營遵為人亷約小心克已奉公賞賜盡與士卒約束嚴整所在吏民不知有軍取士皆用儒術對酒設樂必雅歌投壺臨終遺戒薄葬問以家事終無所言帝愍悼之尤甚後毎朝㑹輙嘆曰安得憂國奉公如祭征虜者乎隗囂死諸將立其子純囂病且餓恚憤而死王元周宗立囂小子純為王總兵據冀公孫述遣將趙匡田弇助純帝使馮異撃之異與匡弇戰且一年乃皆斬之遣來歙馬援䕶諸將屯長安歙上書言公孫述以隴西天水為藩蔽二郡平蕩則述智窮矣今西州新破民人饑饉若招以財榖其衆可集也帝然之于是詔于汧積穀六葛斛秋八月歙率異等討隗純于天水封陰就為宣恩侯盗殺陰貴人母鄧氏及弟訢帝甚傷之封貴人弟就為宣恩侯復召就兄侍中興字君漢欲封之置印綬于前興固讓曰臣未有先登陷陳之功而一家數人並䝉爵土令天下觖望誠所不願帝嘉之不奪其志貴人問其故興曰夫外戚家苦不知謙退嫁女欲配侯王取婦盼聣公主愚心實不安也富貴有極人當知足誇奢益為觀聽所譏貴人感其言深自降挹與抑同卒不為宗親求位甲午十年夏征西大將軍陽夏胡三省注馮異傳異封陽夏侯馬武𫝊列二十八將官位名姓曰夏陽侯馮異未知孰是侯馮異卒于軍秋八月帝如長安遂至汧隗囂將高峻降冬十月來歙等攻破落門聚名在伏羌縣今縣有落門河隗純降王元奔蜀隴右悉平初隗囂將高峻擁兵據高平第一耿弇等圍之一歳不拔帝自將征之進幸汧遣寇恂招降恂至第一峻遣軍師皇甫文出謁辭禮不屈恂斬之遣其副歸告峻曰軍師無禮已戮之矣欲降急降不欲固守峻惶恐即日開城門諸將皆賀因問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳諸將皆曰非所及也冬十月來歙與諸將攻破落門周宗行巡等將隗純降後純與賓客亡入匈奴捕得誅之王元遂奔蜀時先零羗寇金城來歙撃破之于是開倉廩以振饑乏隴右遂安而凉州通焉帝還宫乙未十一年春三月遣呉漢等將兵㑹岑彭伐蜀破其浮橋遂入江闗荆門虎牙二山之間曰江闗荆門在江南屬荆州府宜都縣虎牙在江北屬宜昌府東湖縣兩山相對為大江絶險處先是公孫述遣其將田戎任滿陳汎將兵下江闗拔夷陵因據荆門虎牙横江水起浮橋闗樓立攢柱叢木為柱也以絶水道結營跨山以塞陸路至是岑彭屯津鄉地名今荆州府江陵縣有津鄉城數攻之不克帝遣呉漢率劉隆字元伯南陽安衆侯宗室及臧宫字君翁潁川郟人劉歆發荆州兵凡六萬餘人騎五千匹與彭㑹荆門閏月彭令軍中募攻浮橋先登者上賞于是偏將軍魯竒應募而前時東風狂急魯竒船逆流而上直衝浮橋而攢柱有反杷鈎其鈎鈎船使不得退又逆拒之使不得進故曰反把竒船不得去竒等乘勢殊死戰因飛炬焚之風怒火盛橋樓崩燒岑彭悉軍順風並進所向無前蜀兵大亂溺死者數千人斬任滿生獲程汎田戎走保江州注見前彭長驅入江闗令軍中無得虜掠百姓大喜争開門降詔彭守益州牧所下郡輒行太守事彭到江州以其城固糧多難卒拔留馮駿守之自引兵乘利直指墊江漢縣今四川重慶府合州是今墊江縣漢臨江縣地後魏分置攻破平曲章懷注地闕收其米數十萬石呉漢留夷陵裝露橈船名撓小檝露撓謂露檝在外人在船中繼進公孫述遣王元拒河池漢縣故城在今秦州徽縣夏六月諸將撃破之述使盗殺監䕶使者來歙詔以將軍馬成代之述以王元為將軍使與領軍環安環氏楚環列尹之後拒河池六月來歙與蓋延等進攻元安大破之遂克下辨漢道括地志成州同谷縣漢下辨道也故城在今甘肅階州成縣乘勝遂進蜀人大懼使刺客刺歙未殊馳召蓋延延因伏悲哀不能仰視歙叱延曰今使者中刺客無以報國故呼巨卿欲相屬以軍事而反效兒女子涕泣乎延收淚彊起受所誡歙自書表曰臣夜人定後為何人所賊傷中臣要害臣不敢自惜誠恨奉職不稱以為朝廷羞夫理國以得賢為本大中大夫段襄骨鯾可任願陛下裁察投筆抽刃而絶帝聞大驚省書攬涕以將軍馬成守中郎將代之帝自將征蜀秋七月次長安岑彭及將軍臧宫大破蜀兵王元以其衆降述使其將延岑呂鮪王元公孫恢悉兵拒廣漢漢縣屬廣漢郡酈道元謂之小廣漢以别于郡也故城在今四川潼川府遂寧縣及資中漢縣故城在今四川資州資陽縣又遣將侯丹拒黄石章懷注即黄石灘也杜佑曰今謂横石灘灘在四川重慶府涪州東彭使臧宫從涪水今涪江出四川松潘衛逕龍安緜州潼川諸境至重慶府入大江上平曲胡三省曰水經注涪水逕緜竹縣又東南與建始水合水出平洛郡西溪西南流屈而東意此即平曲也拒延岑自分兵浮江而下還江州襲撃侯丹大破之因晨夜倍道兼行二千餘里徑拔武陽漢縣故城在今四川眉州彭山縣使精騎馳撃廣都漢縣今成都府雙流縣是去成都數十里勢若風雨所至皆奔散初述聞漢兵在平曲故遣大兵逆之及彭至武陽繞出延岑軍後蜀地震駭述大以杖撃地曰是何神也延岑盛兵于沅水光武紀作沈水章懷曰水經注沈水出廣漢縣下入涪本作沉及沅者並非考沈水在今潼川府射洪縣東南臧宫衆多食少轉輸不至㑹帝遣謁者將兵詣岑彭有馬七百匹宫驕制取以自益晨夜進兵多張旗幟登山鼔譟右歩左騎挾船而進呼聲動山谷岑登山望之大震恐宫因縱撃大破之岑奔成都宫乘勝追北軍至平陽鄉胡三省曰水經注臧宫泝涪至平陽涪在緜竹北平陽鄉當在緜竹縣王元舉衆降帝與述書陳言禍福示以丹青之信述省書太息以示所親常少張隆皆勸述降述曰廢興死命也豈有降天子哉左右莫敢言少隆以憂帝還宫冬十月公孫述使盗刺殺征南大將軍舞陰漢縣故城在今南陽府泌陽縣侯岑彭彭所營地名彭亡山名在眉州彭山縣東北水經注謂之彭模寰宇記亦謂之平模惡之欲徙㑹日暮公孫述使刺客詐為亡奴降刺殺彭監軍鄭興領其營俟呉漢至而授之彭持軍整齊秋毫無犯蜀人立廟祠焉先零羌叛隴西太守馬援及將軍馬成等撃破之諸羌自王莽末入居塞内金城屬縣多為所有隗囂不能討因就慰納發其衆與漢相拒司徒掾班彪請如舊制置䕶羌校尉持節䕶領以明威防帝従之以牛邯為校尉隴右既平來歙擊破先零羌事具前為帝言隴西非馬援莫能定帝乃拜援隴西太守援撃先零羌于臨洮破之既而諸種數萬屯聚寇鈔拒浩亹注見前隘援與馬成等深入討撃虜遂大潰已悉歸服徙置于天水隴西扶風三郡時廷臣議棄金城破羌以西援奏曰破羌之西田土肥壤灌溉流通如令羌在湟中為害不休不可棄也帝從之援于是奏置長吏繕城郭起塢侯開導水田勸以耕牧民皆樂業援又招降塞外氐羌復其侯王君長印綬帝悉從之在破羌漢縣故城西寧府碾伯縣乃罷馬成軍後二年參狼羌寇武都援復撃破之降三萬餘人于是隴右清静丙申十二年秋七月大司馬呉漢進攻成都冬十一月公孫述引兵出戰呉漢撃殺之延岑以成都降蜀地悉平呉漢以舟師泝江而上大破蜀兵撃破述將魏黨公孫永及述子壻史興馮駿亦獲田戎遂拔廣都遣輕騎燒成都市橋旋乘利與劉尚進逼成都漢阻江作浮橋使尚屯江南相去二十里帝聞之大驚讓漢曰既輕敵深入又與尚别營賊若出兵綴公以衆攻尚尚破公必敗矣詔書未到述果使謝豐袁吉以十萬衆攻漢尚不得救漢敗入壁乃召厲諸將閉營三日多樹旛旗使烟火不絶夜銜枚引兵與尚合斬述將謝豐袁吉自是漢與述戰于廣都成都之間八戰八克遂軍于其郭中臧宫拔緜竹破涪城涪縣城也在今緜州斬述弟恢復攻拔繁漢縣今成都新繁縣是郫漢縣今屬成都府與呉漢㑹于成都述困急悉散金帛募敢死士五千餘人以配延岑岑襲撃破呉漢軍漢墮水縁馬尾得出時漢軍餘七日糧陰具船欲遁去蜀郡太守張堪字君游宛人為謁者帝使領騎詣呉漢在道即拜蜀郡守聞之馳往見漢説讀如字述必敗不宜退師之䇿漢從之冬十一月臧宫軍咸陽門成都城門名述自將數萬人攻漢使延岑扼宫大戰岑三合三勝自旦至日中軍士不得食並疲漢因使䕶軍高午唐邯將鋭卒數萬撃之述兵大亂高午奔陳刺述洞胸墮馬左右輿入城述以兵屬延岑其夜死明旦延岑以城降呉漢夷述妻子盡滅公孫氏并族延岑放兵大掠焚述公室帝聞之怒以譴漢又讓劉尚曰賊降三日吏民從服一旦放兵縱火聞之可為酸鼻尚宗室子孫嘗更吏職何忍行此殊失斬將弔民之義也帝既平蜀詔贈常少為太常張隆為光禄勲二人皆勸述降事具前祠譙元以中牢述聘巴郡譙元元不詣遣使者以毒藥刦之元日保志全高死亦奚恨遂受毒藥元子瑛願奉家錢千萬以贖父死述許之時元已卒表李業之閭述徴廣漢李業為博士業稱疾不起述羞不能致賜以毒酒業乃嘆曰古人危邦不入亂邦不居為此故也遂飲藥而死又𫐠徴蜀郡王皓王嘉恐其不至先繋其妻子嘉曰犬馬猶識主況于人乎皓先自刎述怒遂誅皓家屬王嘉聞而嘆曰後之哉乃對使者伏劍而死徴費貽任永馮信犍為費貽不肯仕述漆身為癩陽狂以避之同郡任永馮信皆托青盲以辭徴命永信病卒獨貽仕至合浦注見前太守上以述將程烏李育有才幹皆擢用之于是西土咸恱莫不歸心焉竇融及五郡太守入朝以融為冀州牧上詔融與五郡太守入朝既至詣城門上印綬詔遣使者還侯印綬引見賞賜恩寵傾動京師尋拜融冀州牧又以梁統為大中大夫姑臧漢縣今曰武威為甘肅涼州府治長孔奮字君魚茂陵人為武都郡丞姑臧在河西最為富饒天下未定士多不修檢操奮在職四年力行清潔為衆人所笑以為身處脂膏不能自潤及從融入朝請守令財貨連轂唯奮單車就道帝以是賞之時任延左遷睢陽令帝擢為武威太守親見戒之日善事上官無失名譽延對曰臣聞忠臣不和和臣不忠履正奉公臣子之節善事上官臣不敢奉詔帝嘆息曰卿言是也雍奴漢縣故城在今順天府武清縣侯寇恂卒十二月以將軍馬成行大司空事時李通請罷丁酉十三年春正月詔大官勿受郡國異味詔曰郡國獻異味其令大官勿復受逺方口食所以薦宗廟自如舊制時異國有獻名馬者日行千里又進寳劍價直百金詔以劍賜騎士馬駕鼓車上雅不喜聽音樂手不持珠玉嘗出獵車駕夜還上東門候洛陽城十二門按十二爻上東者寅方門也每門侯一人屬城門校尉郅惲拒闗不開上令從者見靣于門間惲曰火明燎逺遂不受詔上乃回從東中門卯方門入明旦惲上書諌曰陛下逺獵山林夜以繼晝如社稷宗廟何書奏賜惲布百匹貶東中門侯盧芳奔匈奴先是芳與匈奴烏桓連兵寇邊詔將軍杜茂字諸公南陽冠軍人等撃之不克至是芳攻雲中郡先為芳所據後來降故芳攻之久不下其將隨昱留守九原欲脅芳降芳知之與十餘騎亡入匈奴其衆盡歸于昱昱乃詣闕降詔以昱為五原太守封鐫胡侯後四年芳復入居髙栁使使請降帝立芳為代王因使和集匈奴芳遂上疏請朝南及昌平有詔止之芳還内自疑懼乃復反匈奴遣騎迎之出塞芳留匈奴中久之病死今髙栁漢縣故城在大同府陽髙縣詔諸王皆降為公侯朱祐奏古者人臣受封不加王爵詔長沙王興真定王得故王楊之子楊被誅帝憐其謀尚未發乃復封得河間王邵中山王茂四王皆景帝後王莽時國除帝復封皆降爵為侯趙王良太原王章魯王興皆為公時宗室及絶國封侯者凡一百三十七人以紹嘉公孔安為宋公承休注見前公姬常為衛公以韓歆字君翁南陽人為大司徒侯霸卒歆代夏四月呉漢軍還大饗將士諸功臣皆増邑更封呉漢自蜀振旅而還于是大饗將士功臣増邑更封凡三百六十五人其外戚恩澤封者四十五人定封鄧禹為髙宻注見前侯食四縣李通為固始本漢􅐛縣後漢更名為侯國故城在河南陳州府沈邱縣今光州固始縣劉宋時所置侯賈復為膠東注見前侯食六縣餘各有差已没者益封其子孫或更封支庶帝在兵間久厭武事且知天下疲耗思樂息肩自隴蜀平後非警急未嘗復言軍旅皇太子嘗問攻戰之事帝曰昔衛靈公問陳孔子不對此非爾所及鄧禹賈復知帝偃干戈修文德不欲功臣擁衆京師乃去甲兵敦儒學帝思念欲完功臣爵土不令以吏職為過遂罷左右將軍官耿弇等亦上大將軍印綬皆以列侯就第鄧禹内行淳備有子十三人各使守一藝修整闔門教養子孫皆可以為後世法賈復為人剛毅方直多大節既還私第闔門養威重朱祐等薦復宜為宰相帝方以吏事責三公故功臣並不用是時列侯唯髙宻固始膠東三侯與公卿參議國家大事恩遇甚厚帝雖制御功臣而每能回容宥其小失逺方貢珍甘必先徧賜諸侯而大官無餘故皆保其福禄無誅譴者上嘗與功臣宴飲厯問曰卿等不遭際㑹與朕相遇能何為乎鄧禹對曰臣嘗學問可郡文學上笑曰言何也卿志行修整可郡功曹各以次對至馬武武曰臣以武勇顯可為守尉督盗賊上笑曰且自不為盗賊斯可矣以竇融為大司空馬成罷復為揚武將軍融自以非舊臣一旦入朝在功臣之右每朝㑹進見容貌辭氣卑恭已甚帝愈親厚之融數辭爵上疏曰臣融有子朝夕教導以經藝令不觀天文見讖記欲令恭肅畏事恂恂守道不願其才能况乃傳以連城廣土哉帝不許詔勿得復言戊戌十四年夏四月封孔子後志為褒成侯大中大夫梁統請更定律不報統上疏曰臣竊見元帝輕殊死刑三十四事哀帝輕殊死刑八十一事自是以後著為常準故人輕犯法吏易殺人臣惟刑罰在衷無取于輕願陛下宣詔有司更定不易之典事下公卿光禄勲杜林奏曰大漢初興蠲除苛政海内歡欣及至其後漸以滋章果桃菜茹之餽集以成贓小事無妨于義以為大戮至于法不能禁上下相遁為弊彌深臣謂宜如舊制統復言臣之所奏非曰嚴刑經曰爰制百姓于刑之衷衷之為言不輕不重之謂也自高祖至于孝宣海内稱治至初元建平而盗賊浸多皆刑罰不衷愚人易犯之所至也由此觀之則刑輕之作反生大患惠加姦軌而害及良善也事寢不報己亥十五年春正月免大司徒歆歸田里歆自殺歆好直言無隠帝每不能容歆于上前證歳將饑凶指天畫地言甚剛切故坐免歸田里帝猶不釋復遣使宣詔責之歆及子嬰皆自殺歆素有重名死非其罪衆多不厭帝乃追賜錢穀以成禮葬之有星孛于昴以歐陽歙越王勾踐支孫封烏程歐陽亭因氏焉歙字正思樂安千乘人為大司徒歙為汝南太守視事九歳政多異迹至是徴拜大司徒已而坐在郡度田不實下獄死歙世傳伏生尚書在汝南教授數百人及下獄諸生守闕求哀至有自髠剔者平原禮震年十七求代歙死書奏歙已死獄中是冬以戴渉代歙為大司徒封子輔等為公輔為右翊公康為濟南公延為淮陽公焉為左翊公皆郭后出陽為東海公蒼為東平公荆為山陽公衡為臨淮公京為琅邪公皆陰貴人出英為楚公許美人出六月詔州郡檢覈墾田户口帝以天下墾田多不以實自占又户口年紀互有増減乃詔下州郡檢覈于是刺史太守以度田為名并度廬屋里落民遮道啼呼或優饒豪右侵刻羸弱時諸郡各遣使奏事帝見陳留吏牘上有書視之云潁川𢎞農漢郡志𢎞農故城在今河南陜州靈寳縣可問河南南陽不可問帝詰吏由趣由従也問是書之所從來也趣向也問是書之意其所向為何如也抵托辭也言于長壽街上得之帝怒時東海公陽年十二在幄後言曰吏受郡敕當欲以墾田相方比也耳帝曰即如此何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為準帝令虎賁將詰問吏吏乃實首服如東海公對上由是益竒愛陽遣謁者考實二千石長吏阿枉不平者冬十二月以張堪為漁陽太守時匈奴寇鈔日甚州郡不能禁帝遣吳漢等徙邊郡吏民以避胡寇復遣杜茂繕治障塞已而茂以罪免使馬成代之騎都尉張堪時領杜茂營撃破之于高栁乃即拜堪為漁陽太守堪在郡八年匈奴不敢犯塞勸民耕稼以致殷富百姓歌曰桑無附枝麥穗兩岐張公為政樂不可支庚子十六年春三月辛丑晦日食秋九月羣盗起詔許相斬除罪遂皆觧散郡國羣盗處處並起遣使者下郡國聽羣盗自相糾擿五人共斬一人者除其罪吏雖逗遛廻避故縱者皆勿問聽以禽討為效其牧守令長坐界内有盗賊而不收捕者又以畏愞捐城委守者皆不以為負但取獲賊多少為殿最唯蔽匿者乃罪之于是更相追捕賊並觧散徙其魁帥于他郡賦田受廩使安生業自是牛馬放牧不收邑門不閉冬十二月復行五銖錢自王莽時五銖錢廢不用至是以馬援奏復行之天下賴其便辛丑十七年春正月以趙憙字伯陽宛人為平原太守初憙為懷令憙先為更始中郎將更始敗亡走道遇更始親屬皆饑困不能前憙悉以所裝資糧與之㑹鄧奉及憙素與奉善遺書切責之或譖憙與奉通帝以為疑及奉敗得憙書帝驚曰趙憙真長者即召見拜簡陽侯相復徙平林皆有平賊功後復拜懷令懷大姓李子春二孫殺人憙窮治其姦二孫自殺收繋子春京師貴戚為請者數十憙終不聽趙孝公良病上臨視之問所欲言良曰素與李子春厚今犯罪懷令趙憙欲殺之願乞其命帝曰吏奉法律不可枉也更道他所欲良無復言既薨上追思良乃貰出子春遷憙為平原太守二月乙未晦日食冬十月廢皇后郭氏立貴人陰氏為皇后郭后寵衰數懷怨懟上怒之廢后立貴人陰氏為皇后詔曰異常之事非國休福不得上壽稱慶進右翊公輔為中山王後徙封沛郅惲言于帝曰臣聞夫婦之好父不能得之于子况臣能得之于君乎是臣所不敢言雖然願陛下念其不可勿亂大倫使天下有議社稷者帝曰惲善恕已量主知我必不有所左右而輕天下也乃進郭后子右翊公輔為中山王郭后為中山太后其餘九國公皆進爵為王明年趙齊魯三公亦為王帝如章陵帝幸章陵修園廟祠舊宅觀田廬置酒作樂賞賜時宗室諸母因酣恱相與語曰文叔少時謹信與人不欵曲唯直柔耳今乃能如此帝聞之大笑曰吾治天下亦欲以柔道行之十二月還宫壬寅十八年夏四月以馬援為伏波將軍討交阯後漢書光武紀十八年夏四月遣伏波將軍馬援擊交阯馬㧞𫝊十八年春援軍至浪泊所載互異考袁宏後漢紀與光武紀同今依之先是交阯麊泠音縻零漢縣元和志安南都䕶府峯州漢麊泠縣地縣雒將水經注交阯未有郡縣時有雒田墾之者為雒民統其民者為雒王其下有雒侯雒將女子徴側名也嫁為朱鳶人詩索妻甚雄勇交阯太守蘇定以法繩之徴側忿怒與妹徴貳反九真日南合浦蠻俚南夷種名皆應之凡畧六十五城自立為王都麊泠寇亂連年至是詔長沙合浦交阯具車船修道橋通障與嶂同谿儲糧穀拜馬援為伏波將軍以扶樂後漢侯國故城在今河南陳州府太康縣侯劉隆為副撃之援縁海而進隨山刋木千餘里至浪泊在今安南國交州府東闗縣一名西湖與徴側等戰大破之賊散走明年斬徴側徴貳進撃餘黨降之嶠南悉平援既平交阯勞饗軍士從容謂曰吾從弟少游常哀吾慷慨有大志嘆曰士生一世但取衣食纔足為郡縣吏守墳墓使鄉里稱為善人足矣至求贏餘徒自苦耳吾在浪泊西里間賊未滅時下潦上霧毒氣薰蒸仰視飛鳶跕跕墮水中念少游平生語何可得也罷州牧置刺史御批厯代通鑑輯覽卷二十一

front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷一百二明成祖皇帝癸未永樂元年春正月復周齊代岷四王國
  hash: sha256:7912644c3f9affeaf3c29d8eb57e48d2a758cd5f5f04ca99eee2ad6602fc2456
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_101-1a, image: WYG0339/WYG0339-0255a.png}
body:
  text: 帝即位初四王俱已復爵及是並還故封各令之國谷王橞以開門功賞賜優尋徙封長沙遼王植自請改封荆州從之以北平為北京設北京留守行後軍都督府行部尚書二人侍郎四人所屬六曹各設郎中等官國子監改北平曰順天府二月遣御史分巡天下自是遂為定制至洪熙元年定出巡之期以八月徙封寧王權于南昌初權之被誘入關也帝許以事成中分天下及即位留之京師時大寧殘破已無可歸乃乞改南土請蘇州及錢塘皆不許封之南昌舊史載王屏從兵與老中官數人偕往南昌稱病臥城樓乞即封南昌帝不得已許之即布政司為邸㼨甋規制皆無所更説本薑清祕史考寧王素有智略既被成祖誘報復不許封內地當必圖免禍自全豈有不俟朝命而徑往南昌之理野史無稽今不取已而有告權巫蠱誹謗者密探無驗得已權自是日韜晦搆精廬一區讀書鼓琴其間終帝之世得無患三月始以大寧地畀烏梁海改北平行都司為大寧都司徙保定以大寧地畀烏梁海自是北邊失一重鎮自北平兵起帝既誘執寧王權乃選烏梁海三千人為竒兵從戰數有功及天下既定遂割大寧地畀之以償前勞由是洪武中所築諸城盡廢後至天順末大寧遂盡為烏梁海所有遼東宣府聲援因之隔絶命平江伯陳瑄等督海運餉北京遼東洪武中靜海侯吳禎等先後督江浙邊海衛軍嵗轉遼餉至三十年以遼餉贏羡罷海運及是北方軍儲不足乃命瑄與都督僉事宣信帥舟師由海道運糧四十九萬石餉北京遼東自是嵗以為常夏四月命户部尚書夏原吉浚吳淞江即古松江自太湖分流經吳江縣東南下流至嘉定縣入每時蘇松嘉湖諸郡頻年水災命原吉治之原吉上言浙西諸郡蘇松最居下流太湖在其西南綿亘幾五百里頃因浦港堙塞湖流漲溢傷害禾稼拯治之法在濬吳淞諸浦而吳淞下流適當潮汐之衝泥沙易致淤壅惟嘉定劉家港即劉河口注見前徑通大海常熟白茆港今日白茆浦在大倉州東北宋嘗置寨于此徑入大江皆廣川急流今宜疏吳淞南北兩岸安亭等浦安亭在崑山縣東南今有鎮引太湖諸水入劉家白苑二港使其勢分松江大黃浦首受三苑諸水東流經華亭諸縣至上海縣東北會吳松江入海相傳戰國楚春申君所鑿故亦名春申浦為三苑即今􅍩湖在婁縣西有上中下三名以北上􅍩亦曰圓泖中曰大泖南曰下􅍩長􅍩乃通吳淞要道其入海處亦宜浚令深濶庶幾復禹貢三江入海之舊帝從之命發民夫開濬原吉晝夜經畫布衣徒步以身先之功遂成遣中官侯顯等使外域帝聞烏斯藏僧哈里瑪舊作哈立麻今改後仿此善幻化欲致一見因通迤西諸蕃命顯賫書幣往迓選壯士健馬護行未幾又遣馬彬使瓜哇注見前蘇門答剌在占城西南海中為西洋要會諸國李興使暹羅即隋唐赤土國後分為暹與羅斛二國元時羅斛并有暹地遂稱暹羅尹慶使滿加剌在占城南海中或言即古頓遜唐哥羅富沙柯枝在西海中或云即古盤盤國諸國于是中官銜命異域者紛紛四出矣秋八月徙富民實北京時發流罪以下墾北京田又徙直𨽻蘇州等十郡浙江等九省富民實之削厯城侯盛庸爵尋自殺帝初命庸鎮淮安旋移山東庸常不自安陳瑛誣以心懷異謀遂削其爵庸自殺冬十一月頒大統厯于朝鮮諸國北京地震閏月封胡􅐏為安南國王惠帝時黎季犛弒國王陳日焜立其子顒及弟􅀢復弒之而篡其位更名曰胡一元名其子蒼曰胡􅐏尋自稱太上皇傳位于􅐏朝廷不知也帝初踐阼􅐏遣使奉表朝貢詭言安南王陳氏嗣絶臣為衆所推乞賜封爵帝遣使賫敕諭其陪臣耆老詢以陳氏繼嗣有無及推立誠偽􅐏遂遣使還奏遂詔封􅐏未幾安南舊臣裴伯耆詣闕告難既而前國王日煃弟陳天平來奔請兵復讐事在明帝帝始悔封􅐏之誤遣使詰責令具篡奪之狀以聞􅐏復遣使謝罪請迎天平歸國帝信之遂遣都督僉事黃中吕毅項城人以兵納天平于安南事在三年至芹站在安南國舊諒山府雞陵關南山徑險惡􅐏伏兵邀殺天平中等引兵欲戰橋斷不得前遂還事在四年事聞帝大怒決意興師討之始命內臣出鎮考王世貞史料以中官出鎮自永樂八年遣馬靖始今明史據革除偹遺録以為始于是年特書于本紀因遵之并據偹遼録及明史兵志宦官傳序輯目初惠帝御內臣嚴燕兵逼江北多逃入軍中漏朝廷虛實帝深以為忠于已及即位封賞既行諸宦官言功不已帝患之會鎮逺侯顧成都督韓觀劉真何福等出鎮貴州廣西遼東寧夏諸邊乃命宦官中有謀者與之偕行賜公侯服位諸將上未幾雲南大同甘肅宣府永平寧波亦各相繼遣使已又設京營提督使監軍在八年復建東厰在十八年使刺外事大權悉以委寄遂為一代厲階甲申二年春三月始選進士為翰林院庶吉士洪武時庶吉士不専屬翰林事見前及是春廷試進士賜曽棨字子啓永豐人第及第出身有差復命于第二甲擇文學優等楊相等五十人及善書者湯流等十人俱為翰林院庶吉士于是庶吉士遂為翰林官尋又命學士解縉等選才資英敏者就學文淵閣縉等選修撰棨庶吉士相等共二十八人以應二十八宿之數庶吉士周忱字恂如吉水人自陳年少願學帝喜而俞之時人為之挨宿以其在二十八宿之外也其後或科一選或連科屢選或數科不選所選多寡亦無定額其與選者謂之館選以輪詹官望優資深者一人課之謂之教習比三年試之其留者二甲為編修三甲為檢討不得留者為給事中御史主事或出為州縣官謂之散館最後教習以吏禮部侍郎為之也夏四月立子高熾與二王俱皇后出為皇太子封高煦為漢王初封雲南後改樂安高燧為趙王封彰德帝初起兵高煦常從戰有功帝喜以為類已高煦亦以此自負謀奪嫡及議建儲邱福等言高煦有功宜立獨金忠力爭以為不可帝召解縉問之縉稱皇太子仁孝天下歸心帝不應縉又頓首曰好聖孫謂皇孫瞻基也即宣宗復問黃淮尹昌隆昌隆于帝即位初名列姦黨將就刑大呼曰建文時嘗上疏讓位陛下奏牘可覆帝取奏閲之歎曰火燒頭若早從所言朕亦無此勞苦也乃免昌隆死使往北京輔導太子對與縉同帝意乃決以僧道衍為太子少師初帝即位授道衍僧録司左善世及是録功以為第一拜資善大夫太子少師復姚氏姓賜名廣孝帝與語呼為少師而不名常居僧寺退朝仍緇衣嘗命蓄髮不肯賜第及兩宫人皆不受六月汰冗官封哈密恩凡特穆爾舊作安克帖木兒今改後仿此為忠順王哈密漢伊吾廬地元末以威武王納古里舊作納忽里今改後仿此鎮之卒弟恩克特穆爾嗣帝即位遣使詔諭遂入貢詔封忠順王明年卒命其兄子托克托襲封秋九月以胡儼為國子祭酒儼在閣承顧問嘗不欲先人然少戅帝以為祭酒遂不預機務周王橚來朝獻騶虞百官請賀帝曰瑞應依德而至騶虞若果為祥在朕更當修省不許周王宴賜加厚冬十月河決開封蒲城河津黃河清十二月同州韓城黃河亦清籍長興侯耿炳文家炳文自殺刑部尚書鄭賜字彥嘉建寧人都御史陳瑛劾炳文衣服器皿有龍鳯飾玉𢃄用紅鞓僭妄不道詔籍其家炳文遂自殺炳文子璿尚懿文太子長女建文初進駙馬都尉炳文北伐璿勸直搗北平不聽遂敗帝即位璿稱疾不出坐罪死炳文雖太祖功臣然終以惠帝肺腑戚故賜等希旨劾之遂及十一月京師地震濟南開封亦震十二月李景隆有罪削爵初景隆以迎降功加太子太師授左柱國朝廷有大事景隆以班首主議諸臣皆不平周王首發其建文時至邸受賕事廷臣復劾其與弟增校謀逆有狀詔削勳號絶朝請至是李至剛名鋼以字行華亭人復言其居家不道事遂奪爵錮私第籍其家乙酉三年春正月韃靼索和爾內屬初北平兵起會郭勒齊稱汗帝遣使賀之遂與通和其國公趙圖嚕根舊作脫列于今改後仿此等率衆助戰並厚加犒賜及帝即位屢使致書郭勒齊賜之銀幣并及其知院阿嚕台舊作阿魯台今改等至是阿嚕台别部索和爾及察罕達魯噶舊作察罕達魯花今改後仿此等先後來歸二月命趙王高燧居守北京夏六月遣中官山壽帥師出雲州注見前時命武城侯王聰蘄水人覘虜兵别遣山壽帥竒兵出雲州北行會之人齎一月糧每三十里置五騎以待馳報宦者典兵自此始遣中官鄭和雲南人世謂之三保太監使西洋帝疑建文帝亡海外命和及王景和等蹤迹之多賫金幣率兵三萬七千餘人造大船凡六十有二由蘇州劉家港泛海至福建達占城以次遍厯西洋頒天子詔宣示威德因給賜其君長不服則以兵懾之諸邦咸聽命比和還皆遣使者隨和朝貢帝大喜未幾復命和往遍賚諸邦由是來朝者益衆和先後凡七奉使三擒番長初使擒舊港酋陳祖義舊港故三佛齊國也再使擒錫蘭國王亞列苦奈兒及其妻子最後蘇門答剌王子蘇幹利謀弒其王并欲殺和和率兵討擒之為古來宦官所未有而諸番利中國貨物益互市通商往來不絶故當時有三保太監下西洋之説而後之奉命海表者莫不盛稱和以誇外番然中國前後耗費亦不資其隨行軍士或以舟敗漂沒異國有十餘年始得還者什不存一二云冬十月殺駙馬都尉梅殷初殷守淮安悉力防禦及帝即位殷尚擁兵淮上帝迫公主齧血為書招之殷得書慟哭及還京既入見帝曰駙馬勞苦對曰勞而無功徒自愧耳帝默然既而陳瑛奏殷祝詛畜養亡命帝命執殷家人送遼東至是殷入朝都督談深指揮趙曦揣帝不悅殷遂擠殷死橋下以殷自投水聞公主牽帝衣大哭帝歸罪深曦斬之官其二子有鄂爾和者降人也事殷久以深曦殺殷請于帝斷二人手足剖其腸祭殷遂自縊死改按鄂爾和舊作瓦剌灰今十二月沐晟討八百大甸本八百媳婦國明初內附設八百者乃八百大甸二宣慰使降之丙戌四年春正月初御午朝令羣臣奏事得從容陳論三月帝詣國子監行釋奠禮置開原廣寧馬市設馬市三一在開原南關以待海西一在開原城東一在廣寧以待朵顔三衛既而城東廣寧皆廢惟南關市獨存夏四月詔求遺書六月己未朔日食不見禮官請賀不許秋七月以成國公朱能為征夷將軍帥師討安南帝大發兵討安南命能為征夷將軍沐晟張輔字文弼玉長子也副之帥十八將軍分道進一出廣西一出雲南詔之曰安南皆朕赤子惟黎季犛父子首惡必誅他脅從者勿治罪人既得當擇陳氏子孫賢者立之閏月營北京宫殿以泰寧侯陳圭泰州人董其役宥雜犯死罪以下令輸作命大臣往川湖各省採大工佐工至十八年冬郊廟宫殿始成八月齊王榑有罪廢為庶人榑性凶暴復國後益驕縱帝賜書戒之不悛五月榑入朝廷臣劾榑罪榑厲聲曰姦臣喋喋又欲效建文時耶會盡斬此輩帝聞之怒留之京邸削官屬護衛及是召其子至並廢為庶人冬十月朱能卒于軍詔以張輔代之十一月高文雅上書言事詔授以官先是通政使受四方章奏非重務不以聞帝知之降旨切責至是户部人材高文雅上書言時政首舉建文事次及救荒恤民陳瑛劾其狂妄請罪之帝曰草野之人不知忌諱言苟可採勿以直而廢之命吏部量授文雅官十二月赦張輔大破安南兵輔軍出慿祥明置縣後改州今為土州屬廣西太平府進破隘留雞陵二關隘留關在安南國舊諒山府北雞陵關注見上抵芹站沐晟亦由蒙自元縣今屬雲南臨安府斬木通道奪諸關隘營白鶴江西在安南國舊興化府北安南有東西二郡交人以交州府為東都即古龍編城以清化府為西都即古九真城依宣洮沱富良四江洮江即雲南瀾滄江下流經安南國臨洮府謂之洮江其北曰宣江其南曰沱江合流處曰三江口至交州界為富艮江為固賊緣江兩岸樹柵築城于多邦隘在安南國舊廣威州西連亘九百餘里輔軍次富良江遣都督朱榮字仲華沂人破賊于嘉林江在安南國舊北江府西南富良江支流也以經嘉林川故名遂與沐晟合軍進攻多邦城夜四鼓令軍士人持炬火銅角越重濠雲梯傅其城指揮蔡福先登士蟻附而上角鳴萬炬齊舉遂入城賊驅象迎戰輔以畫獅蒙馬衝之翼以神機火器象皆反走賊火潰遂循富良進攻東都遣别將李彬字質文定遠人等取西都三江州縣皆望風降賊焚其宫室倉庫遁入海明年春輔定諒江諸府賊以舟師入犯大破之于木㔫江斬首三萬餘級丁亥五年春二月謫解縉為廣西參議縉建議立太子語稍稍傳外庭高煦深怨之譖縉泄禁中語帝怒遽出縉三月封西僧哈里瑪為大寶法王先是侯顯偕哈里瑪至帝令建齋于靈谷寺為高帝高后薦福或言卿雲甘露青鳥白象之屬連日畢見帝大喜侍臣多獻賦頌乃封哈里瑪萬行具足十方最勝圓覺妙智慧善普應祐國演教如來大寶法王西天大善自在佛領天下釋教賜印誥其徒三人亦封灌頂大國師夏四月皇長孫瞻基出閣就學五月張輔擒黎季犛及其子蒼送京師官軍自諒江還至鹹子關在安南國舊建昌府快州西北自東南海道入者此為要會之處賊以海艘入富良江輔與沐晟夾岸迎戰都督栁升懷逺人等以舟師橫擊大破之季犛父子以小舟遁至海門涇水凅棄舟走官軍至驟雨水漲數尺舟畢渡窮追至竒羅海口在安南國舊乂安府東南獲季犛及其子蒼檻送京師安南平六月置交址布政司以行部尚書黃福字如錫昌邑人領之求陳氏後不得乃以安南為交趾設府十七曰交州領州五縣十三北江領州三縣七諒江領州二縣十諒山領州七縣七新安領州四縣十三建昌領州一縣六奉化領縣四建平領州一縣六鎮蠻領縣四三江領州三縣三宣化領縣九太原領縣十一清化領州四縣十乂安領州四縣十三新平領州二縣三順化領州一縣十一升華領州二縣十一直𨽻布政司州五曰廣威領州二宣化領縣三歸化領縣四嘉興領縣三演州領縣三其他要害設十二衛控制之置三司以尚書黃福兼掌布政按察二司事吕毅掌都司黃中副之以丁鈺為刑科給事中時嚴誹謗之禁山陽民丁鈺訐其鄉人誹謗得罪者數十人法司迎上旨言鈺才可用立命為給事中秋七月皇后徐氏崩后好讀書嘗為帝言當世賢才皆高皇帝所遺陛下不宜以新間舊又言帝堯施仁自親九族始帝輒嘉納及崩帝大悲慟為后薦大齋于靈谷天禧二寺聽羣臣致祭光祿為具物初后弟增壽為惠帝所誅帝不即位欲贈爵后力言不可帝聽竟封之使其子襲以告后后曰非妾意也終勿謝冬十一月彗星見戊子六年春正月岷王楩有罪罷其官屬楩在藩與沐晟交惡晟于惠帝時劾楩事見前帝以書諭楩而召戒晟楩益沉湎廢禮殺戮吏民帝怒奪寶册尋念楩建文中久囚繫復之削其官屬護衛洪熙時徙楩武罔寄居州治久之始建王宫夏五月京師地震六月張輔沐晟班師還京論功輔封英國公晟封黔國公餘爵賞有差自唐之亡交趾淪于蠻服四百餘年至是始𨽻版國輔還帝賦平安南歌以寵之秋八月交址復亂大軍之討黎氏也陳氏故官簡定先降將遣詣京師復逸去説羣盜鄧悉等下之遂僭號稱大越出沒化州山中大軍還即出攻鹹子關扼三江府往來孔道諸州縣皆響應事聞帝命沭晟以兵四萬討之晟與簡定戰于生厥江在交州府西敗績參贊尚書劉俊字子士江陵人被執罵賊死吕毅及參政劉昱武城人皆死明年春復命張輔王友荆州人帥師與晟協剿簡定自稱上皇立陳季擴為帝賊勢益張季擴本蠻人詭言陳氏後交人不忍陳氏之亡於是相率歸季擴九月詔理獄囚科臣劾刑部都察院淹禁罪囚瘦死者衆帝召尚書吕震等切責期三日內悉疏雜犯死罪以下囚冬十二月命安逺伯栁升平江伯陳瑄率舟師沿海捕倭栁升遇倭于靈山在萊州府膠州東南海中敗之瑄追至白山島在登州府蓬萊縣海中百户唐錠等追至朝鮮義州界捷奏敕還師己丑七年春正月申茶禁洪武中以茶易馬事見前上馬給茶八十斤中下以次減之帝初年招徠逺人遞增其數至是碉門茶馬司至用茶八萬餘斤增設茶馬司後又特遣御史巡督二月帝北巡命皇太子監國詔惟文武除拜邊軍調發上請行在自餘常務悉啓太子處分命吏部尚書蹇義兵部尚書金忠右春坊大學士黃淮左諭德楊士竒輔太子監國時御史袁綱覃珩黨附陳瑛陷兵部主事李貞太子察其寃立白之以帝方寵瑛故特宥瑛而下綱珩于獄又御史方恢匿父喪太子令械送行在于是人皆服用法之當忠誠伯茹瑺下獄死瑺以首先勸進封忠誠伯坐不送趙王遣歸里既復逮至京得釋還過長沙不謁谷王王以為言時方重藩王禮谷王又開金川門有功帝意嚮之遂逮瑺下錦衣衛獄瑺知不免服毒死三月都督僉事平安自殺初惠帝時安以列將屢挫燕京已而兵敗被執事俱見前送北平帝即位纍進後軍都督僉事及是帝覽章奏見安名曰平安尚在耶安聞遂自殺夏閏四月詔重罪皆五覆奏五月封衛拉特亦蒙古部落在韃靼西按衛拉特舊作瓦剌今改後仿此瑪哈木特舊作馬哈木今改後仿此為順寧王太平為賢義王巴圖博囉舊作把秃孛羅今改後仿此為安樂王衛拉特始見此初元臣孟克特穆爾舊作猛可帖木兒今改後仿此據西陲衛拉特強甚帝自起兵北平即與之通和已而孟克特穆爾死衆分為三其渠曰瑪哈木特曰太平曰巴圖博囉帝即位後屢遣使諭賜至是遣諾衮達什舊作暖答失今改後仿此等來貢馬仍請封遂封三人皆紫金光祿大夫加王號自是嵗一朝貢遣給事中那驥使韃靼為所殺韃靼知院阿嚕台殺郭勒齊迎元裔布尼雅錫哩舊作本雅失里今改後仿此于巴什伯里舊作别失八里今改立為汗帝以書諭之不聽命至是復遣驥往布尼雅錫哩殺之詔御史勿復用吏帝以御史為朝廷耳目之寄宜用有學識達治體者詔自今勿復用吏黜洪秉等四人為序班鴻臚寺官秩從九品秋七月以邱福為征虜大將軍帥師征韃靼敗沒帝以福為大將軍王總火真蒙古人封同安侯副之王忠孝感人封靖安侯李逺懷遠人封安平侯為左右參將將精兵十萬北討時布尼雅錫哩已為衛拉特所襲破與阿嚕台徙居臚朐河福帥千騎先馳遇遊兵擊敗之遂渡河獲其尚書一人詭言布尼雅錫哩聞大兵至惶恐北走去此僅可三十里福大喜信之曰當疾馳擒之諸將請俟諸軍集偵虛實然後進福不從率衆直薄敵營戰二日每戰敵輒佯敗引去福鋭意乘之敵衆奄至圍之數重聰戰死福等皆被死全軍盡沒初福將出師帝慮其敢戰輕敵陛辭日戒之曰兵事冝慎重勿易敵為所紿及福遇敵進戰不已李逺諫曰敵誘我深入進必不利始天子與將軍言何如而遂忘之也王忠亦力言不可福皆不聽遂敗事聞帝震怒奪福封爵徙其家海南追封李逺王忠為國公念諸將無可仕者遂決意親征九月庚午朔日食冬十一月張輔討交址破之獲簡定輔進師鹹子關賊以舟蔽江為營官軍衝擊乘風縱火俘斬無算逮至天平海口在鹹子關南賊黨鄧景異迎戰短兵接擊斬八百餘餘衆皆潰于是季擴自言陳氏後請紹封輔曰向者遍索陳氏後不應今詐也吾奉命討賊不知其他遂遣朱榮等以步騎先輔舟師繼之自黃江在安南國舊清化府東元和志謂之小黃江下流入每至神投海亦日神符海口在安南國舊建平府南會師清化獲簡定于美良山中美良交址舊縣在故廣威州東南及其黨送京師皆伏誅惟陳季擴遁去帝留沐晟討之召輔還庚寅八年春二月帝自將征韃靼以北征詔天下命户部尚書夏原吉輔皇長長孫瞻基留守北京以王友督中軍栁升副之何福鄭亨合肥人督左右哨陳懋壽州人劉才字子才霍邱人督左右掖劉榮宿遷人督前哨衆五十萬出塞帝欠楊林戌勒銘于山至臚胊河更其名曰飲焉楊林戌在今蘇尼特西北為渡漠處夏五月大敗韃靼于鄂諾河注詳見前布尼雅錫哩遁遂征阿嚕台布尼雅錫哩聞大軍至懼邀阿嚕台俱西阿嚕台不從衆潰散君臣始各為部布尼雅錫哩西奔阿嚕台東奔帝追及于鄂諾河布尼雅錫哩拒戰帝麾兵奮擊之布尼雅錫哩棄輜重牲畜以七騎遁遂詔移師征阿嚕台六月擊阿嚕台敗之帝次青楊戍一統志明永樂中北征其度漠驛站自庫倫海子回至開平有青楊戍蒼松峽飛雲壑靜鹵鎮廣漢戌諸處河方輿紀要庫倫海子在漠北飲馬東度飛雲壑阿嚕台乞降帝察其詐令諸將嚴陳以待己而果悉衆來犯阿嚕台帥千騎當中堅帝自將精騎衝擊矢下如雨阿嚕台墮馬遂大敗追奔百餘里至廣漠戍擒攝後者殱之遂班師是年冬阿嚕台遣使來貢馬帝納之秋七月帝還北京御奉天殿受朝賀論功行賞帝在軍念士卒艱苦每疏食是日宴賚始復常膳八月寧逺侯何福自殺福在惠帝時與盛庸平安禦燕師于淮北戰敗奔還事見前帝即位命鎮寧夏甘肅委寄甚重福在甘肅請以布市馬選其良者别為羣馬大蕃息永昌苑收馬自此始及是從征還陳瑛劾其怨望福懼自縊死冬十一月帝還京師辛卯九年春正月復命張輔帥師討交址前年冬沐晟追陳季擴于靈長海口在安南國乂安府東大敗之季擴遣使奉表乞降帝命為交址布政司不受命剽掠如故乃以輔為征虜將軍會晟討之交人苦中國拘束又數為吏卒擾往往起附賊乍服乍叛將帥益玩冦輔至申軍令都督黃中節度詰之不遜斬以徇將士惕息無敢不用命者二月都御史陳瑛以罪誅帝初即位御下多用重典瑛承風旨専以摶擊為能帝寵任之瑛益務深刻傾陷不可勝計至是帝始聞其諸不法狀下獄死天下快之命工部尚書宋禮字大本河南永寧人浚會通河注見前河為元轉􅒩故道岸狹水淺元末已廢不用洪武中復因河決遂淤及帝建北京河海兼運海運險逺多失亡而河運則由江淮達陽武陸挽百七十里入衛河民苦其勞濟寧州同知潘叔正請復舊會通河帝命禮治之禮以會通之源必資汶水乃用汶上老人鄉官名洪武中命有司擇民髙年而公正可任者聽其鄉詞訟謂之老人事重者始白于官餘皆老人理之白英䇿築壩東平之戴村在東平州東遏汶流使南無入洸注見前北無歸海匯諸泉之水汶河泉派凡百四十有五盡出南旺湖名在兖州府汶上縣西南有東西二湖漕渠貫其中其南為蜀山湖北為馬踏湖中分為二道以四分南流接徐沛六分北流達臨清南旺地勢髙決其水南北皆注所謂水脊也因相地勢置閘三十有八以時蓄泄禮又請疏東平沙河汶水支流逸而西出經東平州境謂之沙河合馬常泊即馬場湖在濟寧州西北與蜀山湖接之流以益汶禮言會通河以汶泗為源夏秋霖潦則馬常泊之流亦入焉其水夏秋有餘冬春不足非引别水以益之必有淺澀之患今東平東境沙河亦汶水夫流通于泊比年淤塞宜亟挑濬築堰障之禮既得請又于汶上東平濟寧沛縣諸處立水匱陡門水匱有四曰南旺曰安山曰馬場曰昭陽以蓄水陡門建于各閘左右平時則常閉水盛則啓以泄漲運道以成安山湖注見前昭陽有大小二湖北屬滕縣南屬沛縣三月浚祥符縣黃河故道謂賈魯河故道自洪武時河決原武事見前賈魯河故道久淤既而決開封在洪武三十年開封城三而受水城遂圮至永樂二年始修築又決溫縣在永樂二年濟濚二水交溢壞隄四千文至是復大決開封壞城二百餘丈民被患者萬四千餘户沒田七千五百餘頃帝命工部侍郎張信祥符人時有兩張信一于北平兵起時首先納欵已見前一即此往視信言祥符縣魚王口至中濼注見前下二十餘里有舊黃河岸宜濬之以殺水勢時尚書宋禮侍郎金純字德修泗州人方開會通河帝乃發民夫十萬命興安伯徐亨侍郎蔣廷瓉偕純相治并令禮總其役純引河自開封北復由故道河自封邱金龍口下魚臺塌場會于汶由徐吕二洪入淮塌場口在魚臺縣南洪武初徐違開此通餉永樂後為運道所經至嘉靖中河決遂堙廢河南水患稍息夏六月下交址右參議解縉于獄縉初謫廣西復改交址督餉化州入奏事會帝北征謁太子而還髙煦言縉伺上出私覲太子徑歸無人臣禮帝震怒時縉方偕檢討王稱道廣東覽山川上疏請鑿贛江通南北奏至逮下獄拷掠備至詞連大理丞湯宗宗人府經歷髙得暘中允李貫編修朱紘檢討蕭引髙等俱繫獄得㿩貫紘引髙遂瘐死縉在獄四年錦衣衛帥紀綱使獄卒醉以酒埋積雪中斃之仍籍其家妻子徙遼東紀綱臨邑人秋七月張輔大破交址賊于月常江在安南國舊清化府東賊據月常江列柵樹樁設伏山右輔遣將連艦拔樁以進而自率步隊剿其伏兵水陸夾攻賊大敗是冬復敗之于生厥江冬十月封哈密推勒特穆爾舊作兔力帖木兒今改後仿此為忠義王初哈密忠順王托克托以俘虜得歸襲封帝眷特厚而托克托凌侮朝使且沉湎不恤國事帝賜敕戒諭未至托克托暴卒乃封其從弟推勒特穆爾為忠義王賜印誥世守哈密自是修貢惟謹復修太祖實録帝以前監修官李景隆心術不正又期限迫促未能詳細乃命姚廣孝等重修十一月立長孫瞻基為皇太孫築海門捍潮隄海溢舊隄圮隄始自唐時名捍海堰宋范仲淹復修之故又名范公隄後屢築屢圮自海門至鹽城凡百三十里詔陳瑄以四十萬卒築治之為捍潮隄萬八十餘丈已而瑄又言嘉定瀕海地江流衝會海舟停泊無可依傍請于清浦築土山立堠表識既成賜名寶山在太倉州寶山縣南吳淞江口今縣以此名山周四百丈髙五十餘丈海洋空濶遙見千重帝親為文記之事在明年壬辰十年春正月詔入覲官言事時入覲官千五百餘人命各陳民莫不言者罪之言有不當勿問二月削遼王植護衛植之改封荆州也請止給一衛以備使令而留其三護衛于廣寧防邉然帝終嫌其起兵時二于已建文中植渡海歸朝事見前至是并一衛削之秋八月敕邉將治壕垣自長安嶺在宣化府龍門縣東南迤西至洗馬林在宣化府萬全縣西北皆築石垣深濠塹以固防禦九月以藺芳夏縣人為工部侍郎芳為都水主事河決陽武中鹽隄遣芳按視芳言隄當急流之衝河勢不可驟殺宜捲土樹樁以資捍禦而自中灤分導河流使由故道北入海誠萬世利芳又以沿河隄掃止用蒲繩泥草不能持久請編木成大囷貫樁其中實以瓦石復以木橫貫之牽築隄上為殺水固隄之長䇿詔悉從之後皆遵用其法以宋禮薦擢侍郎冬十一月命侍講楊榮經略甘肅涼州酋婁達衮舊作老的罕今改叛守將擊敗之婁達衮走赤斤蒙古衛明置今為玉門縣屬安西府帝欲發兵討之乃遣榮至陜西會豐城侯李彬議方略榮還言隆冬非出兵時彬亦言道逺餉難宜緩圖之乃賜敕詰責赤斤蒙古明年赤斤蒙古遂縛婁達衮來獻十二月殺浙江按察使周新字志新南海人時錦衣衛指揮紀綱用事使千户緝事浙中作威受賕新捕治之綱誣奏新罪帝豦命逮新旗校皆錦衣私人在道榜掠無完虜既至伏陛前抗聲曰陛下詔按察司行事與都察院同臣奉詔擒姦惡奈何罪臣帝怒命戮之臨刑大呼曰生為直臣死當作直鬼竟殺之新初為大理評事善決獄改御史敢言不避權貴人目為冷面寒鐡及按浙江屢雪寃獄周廉使名聞天下至是以讒死人咸寃之癸巳十一年春正月辛巳朔日食罷朝賀二月置貴州布政使司貴州古羅施鬼國南夷牂牁武陵諸傍郡地元八蕃五季時馬殷遣八帥討溪洞諸蠻遂各分據之號八蕃今定蕃州諸長官司即其地也順元注見前諸宣慰司以羈縻之太祖初平陳友諒兵威振南服思南唐思州元思南宣威司明永樂後為府今府屬貴州宣慰田仁智思州唐思州地元分置沿江宣撫司後改思州明永樂後為府今府屬貴州宣撫田仁厚率先歸附即以故官授之命世守其地及洪武年貴州宣慰靄翠蜀漢火濟之裔世領水西後為安氏同知宋欽宋以後始領水東系見前及普定注見前女總管適邇等先後來歸皆豫以原官世襲賦稅聽自輸納已而思南田宗鼎仁智之孫與思州田琛仁厚之孫搆怨相仇殺朝廷屢禁之不能止初宗鼎與副使黃禧交惡訐奏纍年朝廷以田氏世官曲宥之改禧知辰州府未幾宗鼎以爭地與思州有隙禧遂與琛結合兵攻思南宗鼎挈家走琛殺其弟發其祖墓宗鼎訴于朝屢敕琛禧赴闕自辨皆拒命不至至是帝命鎮逺侯顧成帥兵擒之送京師詔分其地為八府以思南地設思南鎮寧銅仁烏羅四府以思州地設思州新化黎平石阡四府四州鎮逺安順永寧普安土此四州皆貴州地且建制不在一時明史司傳蓋因類書之設貴州布政使司治貴州宣慰司後成化中分置程蕃府至隆慶末始改程蕃曰貴陽府為布政司治而宣慰司如故府所治在城北宣慰所治在城南而以長官司七十五分𨽻焉貴州為內地自此始初洪武中設貴州都指揮使司至是領十八衛而以長官司七𨽻焉後二年復設按察使司于是貴州二司官與各省同而鄉貢則附于雲南令民牧馬洪武初令應天諸府民牧馬初制應天太平鎮江廬州鳯陽揚州六府滁和二州令民牧馬既而復令飛熊廣武英武三衛軍五人共飬一馬嵗課一駒解京尋又以牧監羣馬悉歸有司専令民牧江南十一户江北五户飬馬以免其身役課駒一如三衛軍至是行之北畿計丁飬馬十五丁以下飬馬一十六丁以上飬馬二其以事編發者七户飬馬一得除罪自後馬日蕃輒責民牧民年十五即飬馬復散之山東河南民漸苦之山東自宣德四年始河南自正統十一年始帝如北京皇太孫從命皇太子監國以尚書蹇義學士黃淮諭德楊士竒洗馬楊溥字𢎞濟石首人輔太子監國葬仁孝皇后先是帝營夀陵于昌平封其山曰天夀事在永樂七年至是始成名曰長陵在昌平州北以后葬焉夏五月定死罪納贖例命法司定議死罪情重者殺之情輕者得納贖斬八千貫絞六千貫流徒以下納鈔有差無力者發天夀山種樹秋七月封阿嚕台為和寧王先是衛拉特瑪哈木時纍請賞賚留敕使不遣帝遣中官賫敕責之既而瑪哈木特弒其主布尼雅鍚哩立嗒爾巴舊作答里巴今改後仿此為汗阿嚕台遣使來告請發兵討賊願率所部為前鋒故有是命八月北京地震甲午十二年春二月詔親征衛拉特瑪哈木特擁兵飲馬河將悉衆南犯楊言襲阿嚕台開平守將以聞帝下詔親征以栁升領大營鄭亨領中軍陳懋李彬領左右哨王通咸寧人談青淵之子領左右掖劉江即劉榮初冒父名江後始更名故江與榮互書朱榮為前鋒先遣榮等率師駐興和三月張輔追獲陳季擴于老撾蠻名撾家明置宣慰司距雲南布政司六十八程今為南掌國先是輔與晟會順州永樂中置屬順化府敗賊于愛子江在順州東北破其象陳俘斬千餘人擒偽將軍潘徑阮徐等事在十年冬至是進師羅蒙江在交址廢田和縣界道險騎不得進輔與將校徒步行山箐中夜半抵其巢悉擒鄧景異阮鎔等皆磔以徇又遣别將追斬阮帥于南靈州永樂中置屬新平府季擴走老撾輔遣指揮師祐破其三關方輿紀要在老撾東南與交址接界處遂縛季擴及其孥送京師斬之交址復平帝發北京皇太孫從帝謂侍臣曰朕長孫聰明英鋭宜歷行陳俾知兵法且可悉將士之勞苦知征伐之不易又命學士胡廣等即軍中為太孫講論經史夏六月至和拉和錫衮方輿紀要在漠北故和林東按和拉和錫襄舊作忽蘭忽失溫今改大破衛拉特兵追至圖拉河瑪哈木特遁前鋒都督劉江等遇敵于剛哈拉海漠北地名今舊作哈里咳改擒斬數十人帝諸軍兼程進至和拉和錫衮瑪哈木特等三部掃境來戰帝升髙阜見其衆分三隊乃命栁升等攻其中陳懋王通攻其右李彬談青馬聚攻其左火器齊發帝親率鐡騎馳擊大破之斬其王子十餘人部衆數千級追奔度兩髙山至圖拉河瑪哈木特等遁帝欲窮追皇太孫請及時班師從之還至三峯山阿嚕台復遣使來朝秋八月帝還北京蠲北京州縣田租二年九月廢晉王濟熺恭王棡子為庶人進封平陽王濟熿濟熺弟為晉王濟熿少狠戾失愛於父濟熺既嗣位濟熿追憾其父并憾濟熺嗾其弟慶成王濟炫等日譖濟熺于朝又誘府中官校文致其罪帝信之奪濟熺爵及世子美圭並為庶人而立濟熿為晉王濟熿既立驕恣暴橫一府咸被其害至進毒弒嫡母謝氏逼蒸恭王侍兒人莫敢言閏月下右春坊大學士黃淮等于獄帝親征還太子遣使迎稍緩帝入髙煦譖悉徵東宫官屬下詔獄楊士竒楊溥金問字公素吳人皆坐繫特宥士竒復職冬十一月命翰林學士胡廣等修五經四書及宋儒性理諸書書成名曰大全頒行天下大全書全托宋元諸儒成説類聚成編鮮所折衷後儒少之乙未十三年春正月瑪哈木特遣使來朝瑪哈木特遣使謝罪貢馬詞極卑順帝曰衛拉特不足與較受其獻館其使者釋工作囚徒先是命出繫囚輸作贖罪既而多亡者有司請捕之帝曰此皆衣食空乏出于不得已遂命見役者俱還家共釋四千九百餘人罷海運會通河既開黃河與之合流入淮俱見前漕道大通遂罷海運三月帝䇿士于北京夏四月命英國公張輔出鎮交址輔班師甫還在三月論功賞賚旋遣出鎮輔至交址討餘寇陳月湖等平之兵部尚書兼詹事金忠卒諡忠襄忠少隨兄戍通州以善卜聞燕兵既起僧道衍薦為謀臣事見前帝即位歷官兵部尚書定建儲議兼詹事帝北征輔太子監國帝入髙煦譖悉徵東宫官屬下獄以忠勳舊不問而密令審察太子事忠言無有帝怒忠免冠頓首願連坐以保之以故太子得無廢而宫僚楊溥黃淮等亦獲全至是卒五月丁酉朔日食開清江浦在淮安府山隂縣西北運河由此出清口為水陸孔途今河道總督駐出初漕粟至淮安陸運以達清河勞費甚巨陳瑄請自淮安城西管家湖舊有南北二湖今淤為田鑿渠二十里為清江浦宋轉運使喬為嶽嘗開此瑄復濬之導湖水入淮置四閘以宣泄又緣河十里築隄引漕舟直達于河漕運稱使秋九月北京地震丙申十四年春正月賑北京河南山東飢發粟一百三十八萬賑之三月阿嚕台敗衛拉特來獻捷夏四月禮部尚書吕震請封禪不許時禮部侍中周訥請封禪震力贊之帝謂曰今天下水旱疾疫難語太平昔唐太宗欲行封禪魏徵力諌而止爾等所請異於徴之所以愛君者矣不許秋七月掌錦衣衛事紀綱伏誅綱便僻詭黠善鈎人意帝愛幸之令典詔獄綱覘帝旨廣布校尉日摘臣民陰事帝悉下綱治深文誣詆帝以為忠擢都指揮僉事掌錦衣衛綱益恣橫謀不軌內侍讐綱者發其罪下都察院按治有狀即日磔于市天下快之九月京師地震始命御史巡鹽冬十月帝還京師十一月召張輔還輔凡四至交址前後建置郡邑及增設驛傳遞運規畫甚備交人所畏惟輔至是召還丁酉十五年春二月谷王橞有罪廢為庶人橞自徙封長沙恃前開門功日益驕恣謀不軌其護衛張興懼禍及因奏事北京白之帝未信會蜀王椿子悅燇得罪逃橞所橞因詭衆曰建文君尚在我將為申大義椿聞之上變告帝召橞入朝示以蜀王章橞伏地請罪羣臣請誅之又下諸王議皆以為當死帝曰吾寧生橞乃廢橞及其二子並為庶人命豐城侯李彬征交址三月漢王髙煦有罪徙封樂安州本唐棣州明改樂安後改武定今府屬山東髙煦初封雲南曰我何罪而斥萬里不肯行髙煦請得天䇿衛為護衛曰唐太宗天策上將吾得之豈偶然已而改封青州又托故不欲往私選各衛健士為腹心又募兵三千人不𨽻籍兵部縱使拍掠兵馬指揮徐野驢擒治之髙煦手鐡􅐏撾殺野驢衆莫敢言遂僭用乘輿器物帝還京師盡得其不法數十事召至切責之褫衣冠縶西華門將廢為庶人皇太子泣涕力救乃削兩護衛誅其左右數人徙封樂安州趣即日行帝北巡命皇太子監國戊戌十六年春正月交址復亂交人故好亂中官馬騏以采辦至大索境內珍寶人情擾動桀黠者鼓煽之大軍甫還即並起為寇李彬遣將討定之至是俄樂交址舊縣屬清化府巡檢黎利及乂安知府潘僚等復乘機作亂利初事陳氏為金吾將軍歸命後授巡檢以是常怏怏與其黨放兵四掠參政侯保贊皇人馮貴武陵人死焉帝以賊久未平命榮昌伯陳智夀州人為左參將助彬討之在十八年其後羣寇悉破滅惟利竄匿老撾彬􅊾其酋發所部兵捕之不獲三月姚廣孝死初北平兵起隂謀首發自廣孝及帝轉戰有天下廣孝決䇿之功為多論者謂帝躬冒不韙以爭天下惠帝不終諸臣被戮追原禍首皆廣孝始之既拜太子少師至長洲候同産姊姊不納訪其友王賓號光菴長洲人賓亦不見但遙語曰和尚誤矣和尚誤矣復往見姊姊詈之廣孝惘然至是死追封榮國公王賓不見廣孝舊史例議引錢謙益列朝詩集以為廣孝出賑蘇湖至長洲徒步訪賓歡若平生賓作賑災記鋪陳其功德考震澤記聞賓稱吳中髙士豈肯漫作諛語頌要人功德且其記安在後人未聞有見之者謙益説不足據今明史仍采建文遺迹語載入廣孝本傳遵之夏五月胡廣卒諡文穆廣于建文時對䇿指摘親藩遂擢第一及帝即位首偕解縉迎附以醇謹見幸時人以方漢胡廣始終恩寵弗衰及卒特賜諡秋七月下贊善梁潛字用之泰和人司諫周冕繁昌人于獄殺之時太子監國宦寺黃儼等黨趙王髙燧隂謀奪嫡譖太子擅赦罪人帝怒以潛冕輔導有闕下獄死己亥十七年夏六月倭寇遼東總兵官劉榮擊破之江後以破倭冦封伯改名榮倭數寇海上江度形勢請于望海堝在奉天府寧海縣東南其地髙可屯兵暸望為瀕海要地築城堡以備之倭入王家山島在寧海縣東南海中江急引兵赴堝依山設伏别遣將斷其歸路以步卒迎戰賊敗走江分兩路夾擊盡覆之倭自是不敢復入遼東庚子十八年春二月蒲臺隋縣今屬山東武定府妖婦唐賽兒作亂討平之賽兒蒲臺縣民林三妻以幻術聚衆自稱佛母知成敗得石函中寶書神劍役鬼神剪紙作人馬相戰鬬據益都卸石柵在益都縣西南為亂攻下莒即墨圍安邱詔安逺侯栁升與都指揮劉忠將京軍往勦升自以大將意輕賊賊乞降信之夜為所襲忠中流矢死比明升始覺賽兒已遁别賊攻安邱益急都指揮僉事衛青字明德華亭人方屯海上聞之帥千騎晝夜馳抵城下再戰大敗之斬馘六千餘人鰲山明衛在即墨縣東今裁指揮王真亦殱賊于諸城賊遂平而賽兒卒不獲升忌青功摧辱之為刑部尚書吳中字思正武城人所劾詔擢青都指揮使徵升下獄已得釋帝以賽兒未獲山東三司官悉坐縱寇誅擢刑部郎中段民為左參政時索賽兒急盡逮山東北京及天下尼媪先後幾萬人所在大擾民力為矜宥人情始安段民字時舉武進人秋八月丁酉朔日食冬十一月召皇太孫從皇太子至北京時將遷都故有是命辛丑十九年春正月遷都北京赦改京師為南京以北京為京師徙都之頒詔天下大祀天地于南郊赦夏四月奉天謹身華蓋三殿災詔羣臣條奏闕失直言無隱殺主事蕭儀下侍讀李時勉名懋以字行安福人于獄左庶子兼侍講鄒緝字仲熙吉水人應詔上言略曰陛下肇建北京工巨費繁調度甚廣農民終嵗供役猶且伐桑棗以供薪剝桑皮以為楮加之官吏橫征日甚一日非其土産動科千百小民轉購他所其植倍蓰及至進納多不中程往復輾轉重為民纍又自營建以來工匠假託威勢驅民移徙號令一出屋宇立摧與突粗完又復重徙有三四遷而不能定居者此陛下所不知而人民疾怨者也貪官汚吏遍布內外朝廷每遣一人虐取苛求初無限量有司承奉惟恐不及剝下媚上有同交易小民所積幾何而誅求若此今山東河南山西陜西水旱相仍民至剝樹皮掘草根為食而京師聚僧道萬餘人日耗廩米此奪民食以飬無用也朝廷嵗賚錢幣布馬外蕃所出數十萬而所取不能一二散馬民間馬死輒令賠補不知人民耗矣多馬奚禆漢北降人皆懷窺覘非真逺慕王化乃使犀居輦轂盛供帳厚賞賚以優之此豈足明廣大耶夫奉天殿陛下正朝也災首及馬自非省躬責已改革改化疏滌天下窮困之人不能上回天怒願還都南京保養聖躬散遣工匠停止征𣲖將災沴不作而太平可致矣疏入不省時帝方以定都詔天下忽罹火災頗懼而言事者僉云遷都不便帝不懌儀與時勉言尤峻切于是發怒殺儀下時勉獄時勉條上十五事極言北京營建之非及入貢諸人不宜使羣居輦轂大拂帝意已觀其他説多中時病擲地復取者再率多施行會大臣希旨詆言者謗訕遂下獄事在十一月出給事阿暹字暉池州建德人御史鄭維桓慈溪人等于外事在八年而緝意得無罪命蹇義等分巡天下安撫軍民以三殿災敕延臣二十六人分巡天下問軍民疾苦文武長吏擾民者奏黜之秋八月辛卯朔日食冬十一月遣使核天下庫藏下户部尚書夏原吉等于獄兵部尚書方賓錢塘人自殺帝將大舉北征詔原吉賓及刑部尚書吳中等議皆以為兵不當出帝召賓賓力言軍興費絀帝不懌召原吉問邉儲多寡對曰比年師出無功軍儲十喪八九災眚迭作內外俱疲乞遣將往征勿勞車駕帝怒立命原吉出視開平糧儲而吳中入對如賓言帝益怒下原吉及中于獄賓懼自經死遂命侍郎張本等分往山東山西河南及應山諸府督造糧車發丁夫挽運期以明年二月集宣府壬寅二十年春正月己未朔日食罷朝會帝自將征阿嚕台命皇太子監國阿嚕台初為衛拉特所敗窮蹙南竄帝納而封之數年生聚蓄富浸桀驁拘留朝使時將兵出沒塞下至是大入興和殺都指揮王瑛常于是決策親征夏六月雨水傷稼南北畿山東數十州縣霪雨傷稼秋七月帝至沙狐原在興和北阿嚕台遁遂移師征烏梁海大軍至開平諜報阿嚕台攻萬全諸將請分兵還擊帝曰詐也彼慮吾搗巢欲以此牽制我疾驅之攻萬全者果遁去大軍次沙狐原阿嚕台大懼母妻皆詈之于是盡棄輜重于庫倫海側遁去命發兵焚之收其牲畜而還帝謂諸將曰阿嚕台恃有烏梁海部衆敢行悖逆當移師翦之遂簡步騎二萬五道並進至啓拉爾河方輿紀要在朵顔境內舊作屈裂兒河今改遇其部衆帝麾騎夾擊自率前鋒衝之皆散走其地背河面左皆山大軍依山而軍帝乘髙望之見其衆稍復聚乃麾兵繞出其右其衆突至盡獲之又麾兵繞出其左先伏神機弩于深林中其衆棄輜重走左遇伏遂大潰追奔三十里斬部長數十人别以兵徇河西斬獲甚衆八月詔班師請將分道捕擊者亦以次獻捷乃下詔班師九月帝還京師下左春坊大學士楊士竒吏部尚書兼詹事蹇義于獄尋釋之太子屢遭讒搆帝以士竒輔導有闕下錦衣獄禮部尚書吕震壻張鶴朝參失儀太子宥之帝怒義不匡正命與震並下獄尋皆釋之冬十月遣使核天下倉儲閏月乾清宫災癸卯二十一年夏五月趙護衛指揮孟賢等謀逆伏誅帝有疾多不視朝賢與宦官黃儼衛士髙以正等相結造偽詔謀進毒于帝從中下詔廢太子而立趙王以正語其甥王瑜瑜上變帝立捕賢等鞫之得實帝顧髙燧曰汝為之耶髙燧戰栗不能言太子力解之曰此下人所為髙燧必不與知乃得免賢等皆伏誅六月庚戌朔日食秋七月釋李時勉于獄復其官八月帝復自將征阿嚕台命皇太子監國邉將言阿嚕台將師衆南犯帝曰彼意吾不能復出耳當先駐塞下待之冬十月帝至上莊堡在宣化府萬全縣北蒙古額森托干舊作也先土干今改後仿此來降詔班師大軍至西陽河即西洋河在西安府淮安縣西北自西天鎮縣流入經西陽河堡下流與東洋河合入桑乾河聞阿嚕台為衛拉特所敗部落潰散遂駐師命陳懋為前鋒至宿嵬山方輿紀要在興和北亦曰宿嵬口度漠處也遇王子額森托干率所部來降帝大喜封為忠勇王賜姓名金忠賞賚甚厚遂班師十二月帝還京師二十二年春正月復詔北征甲辰金忠數請擊阿嚕台願為前鋒自效帝初不許會開平守將言阿嚕台兵在近邉羣臣勸帝如忠言帝意遂決夏四月帝發京師命皇太子監國大學士楊榮金幼孜從楊士竒等留京師輔太子大軍至開平獲諜者知阿嚕台遁帝意亦獻兵乃下詔暴阿嚕台罪而宥其來降者時比年用兵白骨被野帝命瘞諸道旁親製文紀之六月至達蘭納穆爾河方輿紀要在和林東北或曰即庫庫諾爾海元太祖初會集部落之地按達蘭納穆爾舊作答蘭納木兒庫庫諾爾舊作濶濶納浯兒今並改詔班師前鋒至達蘭納穆爾河不見敵命張輔等窮搜山谷三百餘里無一馬迹帝進駐河上令陳懋等前覘懋至白邙山方輿紀要在漠外無所遇以糧盡引還南京地震秋七月帝有疾至榆木州在故聞平城西北崩帝還至清水源在漠北八年春帝北征過此甘泉溢出名之曰神應命楊榮金幼孜刻崖石為銘遺吕震以旋師諭皇太子詔告天下時帝已不豫次蒼崖戍疾甚顧左右歎曰夏原吉愛我至榆木川疾大漸遺詔傳位皇太子喪禮一如髙皇帝遺制遂崩楊榮金幼孜等議以六師在外祕不發喪鎔錫為稗以斂載以龍輿所至朝夕上食如常儀榮及御馬少監海夀馳訃太子遣太孫奉迎次雕鶚谷在宣化府龍門縣東有堡太孫至軍中始發喪及郊迎入仁智殿加殮納梓宫八月太子髙熾即位是為仁宗大赦天下以明年為洪熙元年釋夏原吉黃淮等于獄復其官時原吉及吳中楊勉黃淮楊溥金問皆久繫獄中遺詔至京師太子即釋之咨原吉以時事原吉對以賑飢省賦役罷西洋取寶船及雲南交址採辦悉從之即位復原吉等官復置三公三孤官洪武初置三公官以李善長等為之三孤無兼領者建文永樂問罷公孤官至是復設以公侯伯尚書兼之加楊榮金幼孜楊士竒黃淮等官領內閣事如故初解縉等入文淵閣皆編檢講讀之官不得専制諸司諸司奏事亦不得相關白帝即位以榮士竒等皆東宫舊臣乃進榮為太常卿幼孜為户部侍郎兼文淵閣大學士如故士竒為禮部侍郎兼華蓋殿大學士黃淮為通政使兼武英殿大學士已復置謹身殿大學士改榮為之未幾榮士竒皆遷尚書閣職漸崇九月召黃福于交址以兵部尚書陳洽字叔逺武進人代之福在交址十九年編氓籍定賦稅興校學置官師數召文老宣諭德意戒屬吏毋苛擾一切鎮之以靜上下帖然帝以福久勞于外召還交人扶擕走送號泣不忍别福既還交址賊遂劇訖不能靖羣臣請公除不許易月制滿禮部尚書吕震請即吉侍郎楊士竒不可尚書蹇義兼取二説進帝曰梓宫在殯易服豈臣子忍言士竒執是也明日帝素冠麻衣絰而視朝時羣臣皆已吉服惟士竒及英國公張輔服如帝帝歎曰輔武臣也而知禮過六卿由是益見親重詔自今官用物悉于所産地市之詔工部曰古者任土作貢不強所無比年如丹漆石青之類所司不究物産之地槩徵郡縣科派病民自今官所用物必于所産地計直市之違者罪不宥始置南京守偹以襄城李隆者字産平和州人濬之子為之兼領中軍都督府事勳臣守偹南京自此始其後復以內臣同守偹後景泰中復置協同守偹一人鎮守交址中官山夀請授黎利清化知府從之初利未叛時與夀相善及竄老過已為所逐朝廷詰責故逐利乃率衆求撫而匿俄樂不出尋寇茶籠交址舊州屬乂安府敗鎮守參將方政全椒人兵殺指揮伍雲定逺人會帝踐阼夀入朝力言利與已相信今往諭之必來歸帝恐為所紿夀叩頭言如利不求臣當萬死帝頷之遣夀齎敕往諭敕甫降利已犯清化指揮同知陳忠臨淮人戰沒明年春利得敕亦無降意楊言俟秋涼赴官而冦掠不己時榮昌伯陳智與方政協同鎮守智暗懦素無將略又與政積不相能而中官山夀一意主撫專進止以故賊益猖獗官軍不能制賜少傅兼吏部尚書蹇義等銀章義進少傅楊士竒進少保楊榮進太子少傅金幼孜進太子少保賜銀章各一曰繩愆糾繆諭以協力贊務凡政事有闕或羣臣言而未從者用此章密疏以聞既而進户部尚書夏原吉少保賜原吉銀章諭勉如義士竒等冬十月復魏國公徐欽爵初輝祖以忤成祖奪爵事見前及卒復封其子欽十九年來朝不辭徑去成祖怒罷為民至是復故爵召有司奏雨澤者即以聞通政使請彚四方雨澤章奏送給事中收貯帝曰祖宗欲前知水旱以便恤民故令奏雨澤今送給事是終不知也自今奏至即以聞立皇后張氏永城人兵馬副指揮騏之女立子瞻基為皇太子并封子瞻埈帝第二子為鄭王居鳯翔後徙懷慶瞻墉帝第三子越王居衢州未之藩卒瞻墡帝第五子襄王居長沙後徙襄陽瞻缸帝第六子荆王居建昌後徙蘄州瞻墺帝第七子淮王居韶州後徙饒州瞻塏帝第八子滕王居雲南未之藩卒瞻垍帝第九子梁王居安陸瞻埏帝第十子衛王居懷慶未之藩卒詔舉賢才今于五品以下官及軍民之訪薦德行惇篤文學優長者量才應用舉後犯贓則連坐舉者命大學士會法司録囚帝性仁恕諭楊士竒楊榮金幼孜曰比年法司之濫朕所深知所擬大逆不道往往出于文致自今審決重囚卿三人必往同讞有寃抑者雖細故必以聞十一月詔羣臣極言得失葬長陵諡曰文皇帝廟號太宗後嘉靖中更廟號曰成祖明史贊曰文皇少長習兵據幽燕形勝之地乘建文孱弱長驅內向奄有天下即位以後知人善任雄武之略同符髙祖六師屢出漠北塵淸成功駿烈卓乎盛矣然而革除之際倒行逆施慙德亦何可掩哉仁宗皇帝乙巳洪熙元年春正月建𢎞文閣詔選諸臣有學行者入直楊士竒薦侍講王進儒士陳繼字嗣初吳縣人蹇義薦學録楊敬訓導何澄詔以繼為博士敬為編修澄為給事中直閣中命學士楊溥掌閣事進佐之帝親授榮閣印日用卿等非止助益學問亦欲廣知民事為理道助如有建白封職以進二月帝耕藉田南京地震凡十有六震四月又三震五月復震三月以權謹字仲常徐州人為文華殿大學士謹初為光祿丞事母至孝帝曰能孝者必忠忠孝之人可任輔導特擢之詔求直言初大理少卿弋謙代州人言事過激帝怒停謙朝參未幾帝以言者益少遂詔羣臣曰去冬無雪今春少雨隂陽愆和必有其咎朕于謙一時不能含容未嘗不自愧咎爾諸臣勿以前事為戒于國家利弊政令未當者直言勿諱謙朝參如故隆平唐昭慶縣宋改隆平令縣屬趙州飢有司請以官麥貸之帝曰飢即賑之何必曰貸詔法司慎刑詔曰刑者所以禁暴止邪導民于善也吏或深文傳會以致寃濫朕深憫之自今其悉依律擬罪若朕過于嫉惡法外用刑法司執奏五奏不允同三公大臣執奏必允乃已諸司不得鞭囚背及加人宫刑有自宫者以不孝論人之為非父子不相謀是以舜罰不嗣文罪不孥自今非謀反勿連坐親屬古之盛時採民言以資警戒今姦人往往托拾誣為誹謗法吏刻深煆錬刑之不中民則無措其除誹謗今有告者一切勿治詔北京都司復稱行在將遷都南京故有是命夏四月免山東淮徐今年租稅之半帝聞山東及淮徐民之食有司徵夏稅方急乃御西角門召楊士竒草詔免今年夏秋稅之半士竒言上恩至矣但須户工二部與聞帝曰有司慮國用不足必持不決救民之困當如救災拯溺不可遲也趣具楮筆令士竒就門樓書詔帝覽畢即下所司命皇太子居守南京五月左遷李時勉羅汝敬名簡以字行吉水人為監察御史尋下獄侍讀李時勉抗疏言事帝怒召至便殿對不屈命武士以金􅐏擊之脅折死而復蘇時侍講羅汝敬亦言事並改監察御史頃之下獄帝崩先是帝不豫遣中官海夀馳召皇太子及是崩遺詔皇太子即位六月太子瞻基至自南京即位是為宣宗大赦太子方謁孝陵海夀至太子即日就道時南京頗傳凶問又傳漢王髙煦謀伏兵于道邀太子羣臣請整兵衛或請從問道行太子不可曰君父在上誰敢干之驛道馳還至良鄉太監楊瑛尚書夏原吉吕震捧遺詔至宣訖太子哭盡哀入宫發喪越十日即位大赦以明年為宣德元年尊皇后為皇太后立妃胡氏濟寧人錦衣百户榮之女為皇后閏月以翰林學士楊溥入內閣罷𢎞文閣召溥入內閣典機務溥與楊士竒同治內閣王進等以原職𨽻翰林院帝謂溥曰古君臣更相戒飭用治太平卿將何以輔朕對曰臣受國厚恩安敢忘報帝曰直針朕過報朕多矣溥曰直言非難能受直言為難陛下既以命臣臣敢不盡忠以告更定科舉法初制禮闈取士不分南北仁宗時楊士竒請定取士之額南人十六北人十四仁宗以為然帝即位遂詔行之其後復分南北中為三以百人為率則南取五十五名北取三十五名中取十名中謂四川廣西雲南貴州及鳯陽廬州二府滁徐和三州也秋八月始置巡撫官以大理寺卿胡概字子節豐城人本姓熊隨母適胡氏遂冒其姓參政葉春海鹽人巡撫南畿浙江巡撫始此自是遇災荒盜賊輒遣大臣往巡撫事已召還成化以後遂成定員而三司之任漸輕詔內外臣舉堪任守令者九月葬獻陵在昌平州長陵西北諡曰昭皇帝廟號仁宗明史贊曰仁宗在東宫屢遘媒孽而終以誠敬獲全踐位一載用人行政善不勝書而使天假之年涵濡休養德化之盛豈不與文景比隆哉御批歷代通鑑輯覽卷一百二

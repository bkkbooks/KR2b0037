front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷十九漢孝成皇帝己酉元延元年春正月己亥朔日食夏四月無雲而雷有流星從日下東南行四面如雨自晡及昏止秋七月有星孛于東井

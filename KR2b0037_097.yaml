front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷九十八元明宗皇帝己巳元年八月以後文宗圖卜特穆爾天歷二年變按明宗即位而未改元續綱目削而未書今例特書元年而以天歷二年附注其下春正月周王和實拉即位于和寧之北是為明宗
  hash: sha256:b0aee088cba46332b8eb815cc6f5a2cd8e176338a7157fad172d7b4c5ee07fdc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_097-1a, image: WYG0339/WYG0339-0111a.png}
body:
  text: 圖卜特穆爾屢遣使奉迎勸進王南還至和寧之北遂即位遣使還報諸王舊臣及兩都之民聞王使者至皆歡呼鼓舞爭先迎謁所至成聚陕西大旱饑以張養浩為行臺御史中丞陕西自泰定二年至是不雨嵗大饑人相食圖卜特穆爾乃起張養浩為中丞往賑之先是養浩棄官家居七詔不起至是聞命登車即行道經華山禱于嶽祠一雨三日到官復大雨禾黍自生秦人大喜時斗米十三緡民持鈔往糴稍昏即不用詣庫倒換纍日不能得民大窘養浩檢庫中未毁昏鈔文可驗者得一千八十五萬又以印識其背又刻十貫五貫為劵給貧民命米商視印記出糶詣庫驗數以易之又率富商出粟及奏行納粟補官之令聞民有殺子以啖母者為之大慟出私錢濟之且命出其肉遍示闔府官屬責其不能賑貸到官四月未嘗家居止宿公署夜禱于天晝出賑饑民終日無少怠遂得疾未幾卒追封濱國公諡文忠二月圖卜特穆爾立其妃鴻吉哩氏駙馬魯王多阿克巴勒女多阿克巴勒舊作雕阿不剌今改後仿此為皇后圖卜特穆爾追尊帝母依竒哩氏努掄公主之女按努掄舊作奴兀掄今改後仿此及其母唐古特氏舊作唐兀氏今改後仿此並為皇后依竒哩氏諡曰仁獻章聖唐古特氏諡曰文獻昭聖三月圖卜特穆爾遣雅克特穆爾奉皇帝寶赴漠北夏四月以雅克特穆爾為太師圖卜特穆爾遣雅克特穆爾奉皇帝璽來上乃諭廷臣曰寶璽既北上繼今國事其遣人聞于行在所四月癸巳雅克特穆爾入見帝嘉其功以為太師復諭之曰京師百官朕弟所用者並仍舊其諭以朕意雅克特穆爾奏陛下君臨萬方國家大事所用者省院臺而己宜擇人居之乃用哈瑪爾圖舊作哈八兒禿今改後仿此等為平章政事等官皆武宗舊人也是日宴諸王大臣于行殿因諭臺臣曰太祖有訓美色名馬人皆悅之然方寸一有繫纍即能敗名喪德卿等亦嘗念及于此乎世祖初立御史臺時首命塔齊爾布達嘉勒舊作奔帖傑兒今改後仿此二人協司其政天下國家譬如一人之身中書其右手也樞密其左手也左右手有疾治之以良醫省院闕失不以御史臺治之可乎凡諸王百司違法越禮一聽舉劾風紀重則貪墨懼猶斧斤重則入木深也朕有闕失卿等亦當以聞不汝責也遣使立圖卜特穆爾為皇太子旱蝗民饑河南北山東兩浙饑民毋論百餘萬户自嵩汝至淮南死亡相籍命所在州縣官以便宜賑之囊嘉特降尋殺之圖卜特穆爾遣使至四川赦囊嘉特囊嘉特聽詔歸順蜀地悉定尋坐以指斥乘輿殺之于市籍其家秋七月丙辰朔日食太白經天八月帝次翁果察圖圖卜特穆爾入見帝暴崩武寧王徹辰圖舊作徹徹禿今改後仿此等先至京師致立皇太子之命圖卜特穆爾遂發京師奉迎于道受太子寶八月乙酉朔帝次翁果察圖丙辰圖卜特穆爾入見與諸王大臣宴于行殿越三日庚寅帝暴崩年三十國語稱曰呼土克圖皇帝呼土克圖䝉古語有福之謂元史舊訛作護都篤今譯改胡粹中曰聞故老言雅克特穆爾奉上璽綬明宗從官有不為禮者雅克特穆爾怒且懼既而帝暴崩雅克特穆爾聞哭聲即奔入帳中取竇璽扶文宗上馬南馳本史言皇太子入哭盡哀雅克特穆爾以皇后命以皇帝寶授于大子其說不合豈當時忌諱而不敢明言者歟圖卜特穆爾以巴延為左丞相竒徹台舊作欽察台阿爾斯蘭哈雅舊作阿兒思蘭海牙今並改復仿此趙世延並為平章事多爾濟為右丞阿永舊作阿榮今改後仿此趙世安並參知政事達實特穆爾知樞密院特穆爾布哈特穆爾圖舊作鐵木兒脫今改後仿此並御史大夫圖卜特穆爾復襲位于上都是為文宗建龍翔集慶寺于建康命阿永趙世安督工臺臣監造于是南臺御史言陛下龍潛建業居民困于供給幸而獲覩今日莫不跂望非常之恩今奪民時毁民居以創佛寺臺臣表正百官委以監造豈其禮哉昔漢髙祖復豐沛兩縣光武免南陽稅三年今不務此而隆重佛教何以慰斯民之望且佛教慈悲方便今尊佛氏而害生民無乃違其教乎書奏為免臺臣監役詔修經世大典敕翰林國子院同奎章閣學士采輯本朝故事準唐宋㑹要為經世大典冬十一月湖南猺賊冦邊湖廣州縣為廣源猺冦掠者二百八十餘處因命平章劉脫歡招捕之十二月以西僧牟札克䇿喇實舊作輦乞剌思今改後仿此為帝師帝師至帝命朝臣一品以下咸郊迎大臣俯伏進觴帝師不為動惟國子祭酒富珠哩翀字子翬其先隆安人金泰和間定女直姓屬望廣平舊作孛术魯翀今改舉觴立進曰帝師釋迦之徒天下僧人師也豫孔子之徒天下儒人師也請各不為禮帝師笑而起舉觴立飲衆為之栗然文宗皇帝庚午至順元年春二月立明宗子伊埒哲伯舊作懿璘質班今改後仿此為鄜王平章政事多爾濟以罪免臺臣言多爾濟紊亂銓選貪汚著聞請加罷黜從之尋以鄂博哈雅舊作阿卜海牙伊拉齊舊作亦列赤今並改後仿此相繼為平章政事以巴延知樞密院事罷置左丞相帝以雅克特穆爾有大功欲獨相以尊異之乃詔諭中書省曰昔世祖以宰相一人總領庶務故治出于一今雅克特穆爾為右丞相巴顔既知樞密院事左丞相其勿復置又詔一切政務悉聽雅克特穆爾總裁大小官員人等敢有隔越聞奏以違制論三月雲南諸王圖沁舊作秃堅今改後仿此反遣豫王喇特納實哩督諸將討之圖沁及萬户布呼舊作伯忽阿哈舊作阿禾今並改後仿此等叛攻陷中慶路本大理國善闡府地元置中慶路雲南行省治焉今為雲南府殺廉訪司官尋自稱雲南王以布呼為丞相阿哈等為平章等官立城柵焚倉庫以拒命詔以竒珠舊作乞住今改後仿此為雲南平章政事特穆爾布哈舊作帖木兒不花今改後仿此為雲南左丞及中尚卿蘇爾約蘇舊作小雲失今改後仿此從喇特納實哩由八番本漢牂牁郡地五季馬殷遣八姓帥率兵討兩江溪峒至此留戍遂各分據號八畨元置八畨順元等處宣慰司明升置貴州布政司今為貴陽府治進討之夏四月皇后鴻吉哩氏殺明宗皇后班布爾實成宗甥夀寧公主之女按巴布沙舊作八不沙今改後仿此皇后與宦者拜珠謀殺之雲南土官祿余等叛附于圖沁詔遣諸王溫都遜特穆爾舊作雲都思帖木兒今改後仿此㑹諸路兵進討之續綱目于是年事前後多錯誤今悉從文宗本紀改正初雲南烏蒙蠻部名元置宣慰司明升為府今雲南昭通府是土官祿余以討圖沁功授行省參知政事至是叛附于圖沁羅羅即羅羅斯番部名其酋長散居大渡河西元時內附立羅羅宣慰司統之明置建昌衛今為寧逺府屬四川省諸蠻因相繼作亂平章特穆爾布哈被害詔諸王溫都遜特穆爾將江浙河南江西三省兵二萬與湖廣省臣脫歡並討之六月殺知樞密院庫春貝舊作澗徹伯托克托穆爾舊作脫脫木兒今並改等十二人籍其家庫春貝托克托穆爾及通政使濟爾噶朗舊作只爾哈郎今改等以雅克特穆爾權勢崇重欲謀誅之頁特密實托密舊作也的迷失脫迷今改後仿此以變告雅克特穆爾即率竒卜察克軍掩捕案問並棄市籍其家秋七月將作院使索珠等有罪誅特們德爾子索珠觀音努舊作觀音奴今改壻伊埒哈雅舊作野理牙又作野理海牙今改坐怨望造符籙祭北斗呪咀事覺詞連刑部尚書烏訥爾舊作烏馬兒今改前御史大夫博羅上都留守烏訥爾舊作馬兒今改等俱伏誅閏月趙世延罷御史葛明誠言世延年踰七十固位苟容請黜歸田里詔中書議之雅克特穆爾言世延向陳致仕不允所請御史之言蓋不知有旨也帝曰如御史言世延固難任中書其仍任以翰林奎章之職詔加孔子父母及顔回曽參孔伋孟軻程皓程頤封爵孔子父叔梁紇為啓聖王母顔氏啓聖王夫人顔子兗國復聖公曾子郕國宗聖公子思沂國述聖公孟子鄒國亞聖公程皓豫國公頤洛國公尋復以董仲舒從祀孔子廟廷位列七十子之下江南大水江浙湖廣尤甚沒民田五萬一百八十頃民饑者四十餘萬户冬十月始親祀南郊帝始服大裘袞冕親祀昊天上帝于南郊以太祖配享蓋自世祖至是凡七世而南郊親祀之禮始克舉焉十二月立燕王喇特納達喇舊作阿剌忒納答剌今改為太子太子既立月餘以疹疾卒詔繪真容奉安慶夀寺祀之如纍朝神御殿辛未二年春二月立廣教總管府凡十六所以掌天下僧尼之政秩正三品府設達嚕噶齊總管同知府事判官各一員宣政院選流內官擬注以聞總管則僧為之三月司徒錫沙舊作香山今改陳符讖錫沙言陶𢎞景胡笳曲有負扆飛天歷終是甲辰君之語暗合陛下生年紀號實受命之符乞録付史館頒示中外詔翰林集賢諸儒臣議咸以為唐開元間薛讓進武后鼎銘云上天降監方建隆基為𤣥宗受命之符姚崇表賀宋司馬光言其采偶就之文以為符瑞此小臣之諂而宰相實之是誣其君也今𢎞景之曲雖于生年紀號若偶合者然陛下應天順人紹基正統無待于旁引曲說以為符瑞從其所言恐啓讖緯之端非所以定民志也事遂寢夏四月武陟地震踰月不止喇特納實哩等略定雲南引兵還先是鎮西武靖王綽斯巴勒世祖第六子西平王鄂爾齊之孫按綽斯巴勒舊作搠思班今改後仿此及喇特納實哩等率兵十餘萬討雲南倍道兼進奪金沙江即古麗水源出吐蕃共隴川犁牛石下東南流入雲南境合打冲河又東流至㑹理州南入四川界與賊兵遇連戰敗之擒斬阿呼遂復中慶路又與布呼戰于馬金山獲而誅之惟祿余遁去至是遣使來獻捷且請留荆王伊蘇伊伯根太宗子奎屯之孫按伊蘇伊伯根舊作也速也不干今改後仿此等各領所部屯駐鎮遺冦餘軍皆遣還詔從之而以特默齊齊為雲南行省平章總制軍事六月翰林學士吳澄卒諡文正澄自泰定間謝病歸臨川四方從學者恆數百人著書至將終猶不輟其易春秋禮記纂言盡破傳注穿鑿卓然成一家言朝廷命其子京為撫州教授以便奉養至是卒贈臨川郡公學者稱之為草廬先生秋八月甲辰朔日食江浙水壞田十八萬八千七百三十八頃詔皇子古嚕達喇舊作古納答剌今改後仿此出居雅克特穆爾家命市諤爾根薩里舊作阿魯渾撒里今改宅令雅克特穆爾奉皇子居之更名雅克特古斯舊作燕帖古思今改尋又詔養雅克特穆爾之子塔剌海為己子賜以居第及資産九月祿余復冦雲南冬十月都元帥齊喇舊本作怯烈今改後仿此擊走之祿余既竄伏尋出收招餘黨復大亂冦順元元至元二十年討平羣蠻置順元路安撫司在今貴州貴陽府境內等路雲南省臣遣都事諾海往招之授以參政制命祿余拒不受遂遇害既而蒙古都元帥齊喇潛師擊破賊寨殺五百餘人圖沁弟必里克圖庫圖齊舊作必剌都古象失今改後仿此舉家赴水死獲圖沁弟二人子三人誅之祿余遁去餘黨悉平冬十一月壬申朔日食壬申三年夏四月諸王伊嚕特穆爾謀反伏誅安西王阿南達舊作阿難答今改之子伊嚕特穆爾與輝和爾裕勒珍舊作玉珍今改達實班第舊作逹八的喇實班第舊作剌板的國師必喇特納實哩沙津阿古齊舊作必剌忒納失里沙津愛護持今並改謀不軌事覺皆伏誅五月禁如封淫祀太常博士王瓉言諸路請加封神廟濫及淫祠按禮經以勞定國以死勤事能禦大災能捍大患則祀之其非祀典之神自後請不許加封從之雲南饑六月嚴起復之禁監察御史陳思謙字景謙祐之孫言內外官非文武全才出處繫天下安危能拯金革之難者不許奪情起復從之思謙又言銓衡之弊入仕之門太多黜陟之法太簡州郡之任太淹朝省之除太速欲設三䇿以救四弊一曰至元三十年以後增設衙門冗濫不急者從實減并其外有選法者并入中書二曰宜參酌古制設辟舉之科令三品以下各舉所知得材則受賞失實則受罰三曰古者刺史入為三公郎官出宰百里蓋使外職識朝廷治體內官知民間利病今後厯縣尹有能聲善政者授郎官御史厯郡守有竒才異績者任憲使尚書其餘各驗資品通遷在內者不得三考連任京官在外者須厯兩任乃遷內職績非出類守不敗官者則循以年勞處以常調凡朝缺官員須二十月之下方許遷除帝可其奏命中書議行之時河北道亷訪使僧嘉努又言自古求忠臣于孝子之門今官于朝十年不省覲者有之非無思親之心也由朝廷無結假省親之制而有擅離官次之禁古律諸職官父母在三百里之外三年聽一給定省假二十日親不存者聽一給拜墓假十日以此推之父母在三百里以至萬里宜計道里逺近定立假期其應省覲匿不行者坐以罪若詐冒有所規避者與詐奔喪者同科亦命廷臣議行之按僧嘉努舊作僧家奴今改秋八月京師隴西地震帝崩于上都年二十九國語稱曰濟雅圖皇帝濟雅圖䝉古語有天命之謂元史舊訛作札牙篤今譯改冬十月鄜王伊埒哲伯即位是為寧宗王明宗第二子為帝所眷愛留居京師帝崩遺詔傳位明宗之子雅克特穆爾請皇后立皇子雅克特古斯不從命立王以繼大統時年甫七嵗中書百司政務咸啓皇后取進止十一月尊皇后為皇太后鄜王薨王禕曰寧宗之立雖母后權臣利於立幼抑文宗顧命舍其子而立兄子是不可謂非公天下之心也然終不足以掩其弒兄之惡天理人心吁可畏哉太后遣右丞竒爾濟蘇迎托歡特穆爾舊作妥歡帖睦爾今改後仿此于靜江初太祖取西北諸國阿爾斯蘭哈唎魯特氏按哈唎魯特舊作罕祿魯今改率衆來降乃封為郡王明宗出居沙漠過其地納其裔孫女曰瑪勒岱舊作邁來的今改後仿此生托歡特穆爾于至順初明宗后班布爾實被讒遇害徙之髙麗髙麗使居大清島在今朝鮮國廣州海中中不與人接尋又因其乳母夫言詔天下言明宗在時素謂托歡特穆爾非己子移于廣西之靜江鄜王薨雅克特穆爾復請立雅克特古斯皇太后曰吾子尚幼托歡特穆爾在廣西今年十三矣且明宗長子于理當立乃遣竒爾濟蘇往迎之癸酉四年順帝元統元年春三月雅克特穆爾死雅克特穆爾秉權以來肆行無忌一宴或宰十三馬取泰定后為夫人前後尚宗室女四十人或有交禮三日遽遣歸者後房充斥不能盡識一日宴趙世延宅男女列坐見坐隅一婦色甚麗意欲與俱歸顧左右曰此為誰對曰太師家人也自後荒淫日甚體羸溺血而死夏五月京師地震六月托歡特穆爾即位于上都是為順帝初托歡特穆爾至自靜江百官鹵簿迎于良鄉雅克特穆爾既見並馬徐行且陳迎立之意托歡特穆爾幼且畏之一無所答雅克特穆爾疑其不可測又恐即位之後追舉明宗暴崩故事故至京久不得立適太史亦言其立則天下亂用是議未能決遷延數月至是雅克特穆爾死太后乃與大臣定議立之且約後當傳于雅克特古斯若武宗仁宗故事以巴延為太師右丞相薩敦為太傅左丞相時復置左丞相時有阿勒呼木特穆爾舊作阿魯渾帖木兒今改後仿此者明宗親臣言于帝曰天下事重宜委宰相決之庶可責其成功若躬自聽斷必負惡名帝然之由是深居宫中每事決于宰相而已無所專焉大霖雨京畿水平地丈餘饑民四十餘萬時關中河南俱水災兩淮大旱秋八月立皇后巴約特氏雅克特穆爾之女按巴約特舊作伯牙吾今改後仿此奎章閣侍書學士虞集字伯生允文之五世孫謝病歸初御史中丞馬祖常求集薦引其鄉人龔伯璲集固不從祖常不悅帝之將立也召諸老臣赴上都集亦與焉祖常使人告集曰御史有言矣蓋以文宗嘗命集書詔言帝非明宗子故祖常以是諷集使去集乃謝病歸臨川集既去侍臣有以舊詔言者帝不懌曰此我家事豈由彼書生邪尋遣使賜酒幣召還禁林㑹疾作竟不至集歸後十五年病卒于家賜諡文靖集性孝友能折節後進學該博而究極本原研精探微心解神契其文亦頗有宋慶歷乾淳風烈學者稱為邵庵先生冬十月封薩敦榮王騰吉斯襲封太平王薩敦食邑廬州賜騰吉斯平江田五百頃十一月封巴延為秦王賜以金印是日秦州山崩地震順帝甲戌元統二年春二月汴梁雨血著衣皆赤三月天雨毛彰德路雨白毛俗呼云老君髯民謠曰天雨氂事不齊既而彰德復雨毛如線而俗呼曰菩薩線民又謠曰天雨線民起怨中原地事必變水旱疫民饑時山東大水浙西水旱疾疫饑民至五十七萬户夏四月戊午朔日食五月薩敦罷六月復以為左丞相命薩敦仍商量中書省事騰吉斯為左丞相既而騰吉斯辭不拜遂復命薩敦為之尋卒秋八月赦是日京師地震雞鳴山注見前崩以湖廣河南自三月不雨至于是月及諸路旱蝗民饑太白屢晝見經天大赦天下是日京師地震雞鳴山崩陷為池方百里人死者甚衆冬十月始以珍格舊作真哥今改皇后配饗武宗時議三朝皇后升祔未決巴延以問太常博士逯魯曾字善止修武人曰先朝既以珍格皇后無子不為立主今所當立者明宗母邪文宗母邪對曰珍格皇后在武宗朝已膺寶册則文明二母皆妾也今以無子之故不得立主而以妾母為正是為臣而廢其先君之母為子而私尊其先父之妾豈可復蹈慕容埀之失乎集賢學士陳皓素疾魯曽乃曰唐太宗冊曹王明母為后亦二后也奚為不可魯曽曰堯母帝嚳庶妃堯未嘗以配嚳不法堯舜而法唐太宗邪衆服其議而巴延亦是之遂以珍格皇后配武宗擢魯曽為御史詔舉才堪守令者命臺憲部官各舉才堪任守令者一人以名聞乙亥至元元年春二月帝畋柳林不果行帝將田于栁林御史臺臣奏曰陛下春秋鼎盛宜思文皇付託之重致天下于隆平今赤縣之民供給繁勞農務方興而馳騁氷雪之地倘有銜橛之變奈宗廟社稷何遂止三月罷采髙麗媵女臺臣言髙麗首效臣節而近年屢遣人往取媵女至使生女不舉女長不嫁乞賜禁止從之夏六月騰吉斯反伏誅秋七月巴延弒皇后巴約特氏時薩敦已死巴延獨秉政騰吉斯忿曰天下本我家天下巴延何人居吾上與其叔父句容郡王達朗達賚舊作答憐答里今改潛蓄異心謀立諸王鴻和特穆爾舊作晃火帖木兒今改帝數召達賚不至郯王齊齊克圖發其謀六月晦騰吉斯伏兵東郊率勇士突入宫巴延及鄂勒哲特穆爾舊作完者帖木兒今改後仿此等掩捕獲騰吉斯及其弟塔喇海誅之餘黨奔達賚達賚即應以兵殺使者以禡旗帝遣阿巴往諭又殺之而率其黨華善舊作和尚今改等逆戰敗走鴻和特穆爾所阿哩袞徹爾舊作阿里渾察今改遂執送上都戮之鴻和特穆爾自殺初騰吉斯事敗被擒攀折殿檻不肯出塔喇海走匿皇后坐下后蔽之以衣左右曵出斬之血濺后衣巴延奏并執后后呼帝曰陛下救我帝曰汝兄弟為逆豈能相救乃遷出宫巴延尋鴆殺之于開平民舍騰吉斯既誅巴延遂専為右丞相而復罷左丞相不置九月減宦者御史臺臣言國初宦官不過數十人今內府執事不下千餘乞依舊制裁減冗濫以廣仁愛之心省縻費之患從之冬十一月詔罷科舉初徹爾特穆爾阿倫氏按齊里克特穆爾舊作徹里帖木兒阿倫舊作阿魯溫今並改後倣此為江浙平章㑹科舉驛請試官供張甚盛心頗不平及復入中書是年齊里克穆穆爾拜平章政事首議罷科舉及論學校莊田租可給宿衛士衣糧動當國者以發其機又欲損太廟四祭為一于是御史吕思誠字仲實平定州人等列其罪狀劾之不報皆辭職去而思誠出為廣西僉事時罷科舉詔已書而未用璽參政許有壬力爭之巴延怒曰汝今諷臺臣等言徹爾特穆爾邪有壬曰太師擢徹爾特穆爾在中書御史三十人不畏太師而聽有壬豈有壬權重于太師邪巴延意稍解有壬乃曰科舉若罷天下才人觖望巴延曰舉子多以贓敗有壬曰科舉未行時臺中贓罰無算豈盡出于舉子巴延曰舉子中可任用者惟參政耳有壬曰若張夢臣馬伯庸輩皆可任大事如歐陽元字原功其先廬陵人徙瀏陽之文章亦豈易及巴延曰科舉雖罷士之欲求美衣食者自能向學有壬曰為士者初不事衣食巴延曰科舉取人實妨選法有壬曰今通事知印等天下凡三千三百餘名今嵗自四月至九月白身補官受宣者七十三人而科舉一嵗僅三十餘人科舉于選法果相妨邪巴延心然其言而議已定不可中輟乃溫言慰解之翌日宣詔特命有壬為班首以折辱之有壬懼禍不敢辭治書御史布哈舊作普化今改後仿此誚有壬曰參政可謂過河拆橋者矣有壬以為大恥稱疾不出詔改元時星文屢示警帝以世祖皇帝在位長久欲祖述之詔改元統三年仍為至元元年監察御史李好文言年號襲舊千古未有襲其名而不蹈其實未見有益因言時弊不如至元者十餘事不報十二月尊皇太后為太皇太后初騰吉斯既誅帝詔天下有言曰皇太后後其所生之子一以至公為心親挈大寶畀豫兄弟定䇿兩朝功德隆盛近古罕比命大臣特議加禮至是奉玉册玉寶尊為太皇太后許有壬言皇上于太后母子也若加太皇太后則為孫矣且今制封贈祖父母降父母一等蓋推恩之法近重而逺輕今尊皇太后為太皇太后是推而逺之乃反輕矣不從監察御史台哈布哈字兼善巴王特氏居于台州按台哈布哈舊作泰不華巴約特舊作伯牙吾台今並改後仿此率同列上章言嬸母不宜加徽稱太后聞之怒欲殺言者衆懼台哈布哈曰此事自我發之甘受誅戮決不敢纍諸公已而太后怒解曰風憲有臣如此豈不能守祖宗之法乎命賜金幣以旌其直徹爾特穆爾有罪免徙南安注見前徹爾特穆爾嘗指斥武宗又以妻弟之女為己女冒請珠袍等物于是臺臣復劾其罪而巴延亦惡其忤己遂流于南安人皆快之尋卒河決封邱丙子二年春二月尊追生母瑪勒岱舊作邁拉第今改為皇后秋八月甲戌朔日食是嵗水旱蝗饑鄧州大霖雨三十日白河注見前水大溢為災黃州蝗江浙自春至八月不雨民大饑時江州諸縣民饑甚總管王大中貸富室粟賑之而免其雜役以為息期嵗豐還其本民無病焉丁丑三年春正月帝畋于栁林凡三十五日御史綽台舊作丑的今改後仿此宋紹明進諫帝賜以金帛綽台等固辭帝曰昔魏徴進諫唐太宗未嘗不賞汝其受之廣東朱光卿增城人河南棒胡名閏兒陳州人等起兵作亂光卿與其黨石昆山鍾大明聚衆反稱大金國改元赤符時惠州民聶秀卿等亦舉兵與光卿相結為亂棒胡本以燒香惑衆反于信陽州即宋信陽軍元置府尋改為州今屬汝寧府破歸德鹿邑隋縣今屬歸德府焚陳州屯營于杏岡在陳州府淮寧縣北命河南左丞慶通舊作慶童今改討之獲其旌幟宣敕金印獻之時大臣有忌漢官者取賊旗幟宣敕班地上問曰此欲何為意漢官諱言反將中以罪許有壬曰此曹反狀甚明尚何言大臣語塞既而帝以光卿秀卿棒胡皆漢人詔漢人官省臺院及翰林集賢者講求誅捕之法以聞未幾四川合州人韓法師亦擁衆自稱南朝趙王尋皆討平之二月壬申朔日食定服色器皿輿馬之制時服飾上下無别帝初禁民間服麒麟鸞鳯白兔靈芝雙角五爪龍八龍九龍萬夀字赭黃等物至是復詔定其制尋禁倡優盛服及戴笠乘馬弛江浙諸處山澤之禁時江浙等處饑民至四十萬户詔發鈔四十萬錠賑之開所在山場河泊之禁聽民樵採三月立皇后鴻吉哩氏育德王博羅特穆爾之女禁漢人南人不得執軍器凡有馬者拘入官尋復詔鎮遏生番處開其禁內地如故既又禁漢人南人不許習蒙古字夏五月民訛言采童男女民間訛言朝廷拘刷童男女一時嫁娶殆盡西番盜起殺鎮西王子丹巴勒舊作党兀班今改尋蔓延至二百餘處詔立行宣政院以額森特穆爾為院使督兵往討之彗星見時太白屢晝見久而不息彗星自五月至八月凡六十有三日自昴至房厯一十五宿而滅秋七月武陟注見前蝗河南武陟縣禾垂熟有蝗自東來縣尹張寬仰天祝曰寧殺縣尹毋傷百姓俄有黑鷹羣飛啄食之八月京師地屢震先是京師大霖雨凡十三日御河沁河渾河注俱見前皆溢沒人畜田廬不可勝計至是地大震太廟梁柱裂各室牆壁皆壞壓損儀物文宗神主及御牀盡碎凡六日方止冬十月金華處士許謙字益之卒謙少受業金履祥之門盡得所傳居東陽八華山逺近學者翕然宗之不出里閭者垂四十年中外名臣列其行義薦于朝者前後章數十上郡復以遺逸應詔終莫能致至是卒詔賜諡文懿謙于書無所不讀窮探聖微多所自得嘗謂吾非有大過人者惟為學之功無間斷耳平生制行甚嚴而所以應世者不膠于古不流于俗其教人至誠諄悉內外殫盡不以科舉之文教人曰此義利所由分也至其晚節獨以身任正學之重學者咸稱為白雲先生先是何基王柏金履祥殁其學猶未大顯至謙而其道益著同時陳櫟胡一桂皆以講明道學見重于時云廷陳櫟字夀翁休寧人胡一桂字芳婺源人十二月以滿濟勒噶台巴延之弟舊作馬札兒台今改按此又一滿濟勒噶台非前卷行臺御史也為太保分樞密院鎮北邊滿濟勒噶台方知樞密院事朝議進爵為王辭曰兄封秦王弟不宜並受王爵故有是命巴延請殺五姓漢人不許巴延請殺張王劉李趙五姓漢人帝不從戊寅四年夏四月大雨雹時帝如上都次八里塘雨雹大如拳其狀有小兒環玦獅象等物之形五月詔考核郡縣官功過命佛家律舊作佛家閭今改後仿此為考功郎中喬林為員外郎魏宗道續綱目作魏宗今從元史本紀改正為主事考較天下郡縣官屬功過漳州民李志甫袁州民周子旺起兵作亂漳州南勝縣元置今漳州府平和縣是民李志甫聚衆圍州城守將綽斯戩舊作搠斯監今改後仿此與之戰失利詔江浙平章拜布哈舊作别不花今改後仿此發四省兵討之不克龍巖唐縣今為州直𨽻福建尉黃佐才與賊戰妻子四十餘口皆被害既而州人陳君用者襲殺之袁州周子旺亦舉兵稱周王改年建號尋敗被獲誅之秋八月癸亥朔日食京師地震日二三次凡十日乃止己卯五年夏六月汀州大水平地水深三丈沒民居八百餘區人溺死者八千餘冬十月詔以巴延為大丞相續綱目繫于十一月今從本紀改正加元德上輔功臣之號賜七寶玉書龍虎金符十一月盜殺河南平章政事伊嚕特穆爾等尋捕誅之把縣人范孟謀不軌詐為詔使至河南行省殺平章政事伊嚕特穆爾廉訪使鄂勒哲布哈舊作完者不花今改等隨召官屬及去位者署而用之執大都路儒學提舉歸賜字彥溫汴梁人俾北守黃河口𤾉力拒不從賊怒繫之獄既而官軍捕孟誅之凡汚賊者皆得罪暘獨免𤾉同里有吳炳者嘗以翰林待制徵不起賊召司卯酉厯炳懼不敢辭時人為之語曰歸𤾉出角吳炳無光暘之名由是大著尋由國子博士拜監察御史入謝臺臣奏曰此河南抗賊不屈者帝曰好事卿宜數為之賜以上尊巴延矯詔殺郯王齊齊克圖巴延搆陷郯王奏賜死帝未允輒傳旨殺之又奏貶宣讓王特穆爾布哈鎮南王脫歡第四子世祖之孫威順王庫春布哈亦托歡之子按庫春布哈舊作寬徹普花今改後仿此不俟命即遣之帝為之不平庚辰六年春二月巴延有罪黜為河南行省左丞相尋竄南恩州宋置明廢今廣東肇慶府陽江縣是道死巴延既誅騰吉斯獨秉國鈞專權自恣變亂成憲虐害天下漸有異謀帝患之巴延欲以其姪托克托字大用穆齊爾泰之子巴延養為己子宿衛偵帝起居懼涉物議乃以知樞密院旺嘉努舊作汪家奴今改後仿此翰林承旨實喇卜舊作沙刺班今改後仿此同侍禁近實屬意托克托托克托政令日修衛士拱聽約束巴延自領諸衛精兵以揚珠布哈舊作燕者不花今改後仿此為屏蔽導從之盛填溢街衢而帝儀衛反落落如晨星勢焰薰灼天下人知有巴延而已托克托深憂之私請于父曰伯父驕縱已甚萬一天子震怒吾族赤矣曷若以未敗圖之其父亦以為然托克托復質于師吳直方浦江人直方曰傳有之大義滅親大夫但知忠于國爾餘復何顧焉一日見帝乘間自陳忘家殉國之意帝猶未之信時帝前後左右皆巴延之黨獨沙克嘉木舊作世傑班今改阿嚕為帝腹心乃遣二人與托克托逰日以忠義之言往復辨論益悉其心靡他遂聞于帝帝始信之及巴延擅貶宣讓威順二王帝不勝忿決意逐之一日泣語托克托托克托亦泣下歸復與直方謀直方曰此大事議論之際左右為誰曰阿嚕及托克托穆爾舊作脫脫木兒今改與本卷前係兩人直方曰子伯父挾震主之威此輩苟利富貴語一泄主危身戮矣托克托乃延二人于家治酒張樂晝夜不令出遂與沙克嘉木等謀欲候巴延入朝擒之戒衛士嚴宫門出入螭坳皆為置兵巴延見之驚召托克托責之對曰天子所居防禦不得不爾然遂疑托克托益增兵自衛至是巴延日領兵衛請帝出田托克托勸帝稱疾不往巴延固請乃命太子雅克特古斯出次栁林托克托遂與阿嚕等合謀悉拘京城門鑰命所親信列布城門下是夜奉帝居玉德殿召省院大臣先後入見出宫門聽命至夜二鼓遣集賽依徹察喇舊作月可察兒今改率三十騎抵營取太子入城又召楊瑀錢塘人范滙江西人入草檄數巴延罪狀出為河南行省左丞相平章事政事珠爾噶岱舊作只兒瓦歹今改齎赴栁林比黎明巴延遣騎士至城下問故托克托踞城上宣言有旨黜丞相一人諸從官皆無罪可各還本衛巴延奏乞陛辭不許遂行道出真定父老奉觴酒以進巴延曰爾曹見子殺父事乎對曰不曽見子殺父惟聞有臣弒君巴延俯首有慚色既而帝以巴延罪重罰輕復降詔安置南恩州陽春縣梁置今屬廣東肇慶府行次江西隆興驛病死以滿濟勒噶台為太師右丞相塔斯哈雅為太傅特默齊為太保旺嘉努為平章政事托克托知樞密院事詔托克托之外諸王侯不得懸帶弓箭及環刀入內府彗星見凡三十二日色白狀如粉絮尾跡約長五寸餘賜滿濟勒噶台爵忠王固辭許之詔封滿濟勒噶台為忠王賜號達爾汗固辭不受御史請示天下以勸亷讓從之夏六月詔廢文宗廟主遷太皇太后鴻吉哩氏于東安州尋崩放雅克特古斯于髙麗殺諸途詔曰昔武宗升遐太后惑于憸慝俾皇考出封雲南英宗遇害正統寖偏我皇考以武宗之嫡逃居沙漠宗王大臣同心翊戴于是以地近先迎文宗暫總機務繼知天理人倫所在假讓位之名以寶璽來上皇考推誠不疑即立為皇太子文宗稔惡不悛當躬迓之際與其臣伊嚕布哈舊作月魯不花阿里雅舊作也里牙今並改明哷棟阿等謀為不軌使我皇考飲恨上賓歸而再御宸極又私圖傳子乃搆邪言嫁禍班布爾實皇后謂朕非明宗之子出居遐陬上天不佑隨降殞罰叔嬸布達實里舊作不答失里今改後仿此怙其勢焰舍冡嗣而立孺稚奄復不年諸王大臣以賢以長扶朕踐阼每念治必本于盡孝事莫先于正名賴天之靈權奸屏黜永惟鞠育罔極之恩忍忘不共戴天之義其命太常徹去圖卜特穆爾在廟之主布達實里本朕之嬸僭膺太皇太后之號迹其閨門之禍罪惡尤重揆之大義削去鴻名徙東安州安置雅克特古斯放諸髙麗當時賊臣伊嚕布哈等已死以明哷棟阿明正典刑時監察御史崔敬字伯恭大寧惠州人言文宗既徹廟主嬸母亦削鴻名盡孝正名斯亦足矣惟念皇弟雅克特古斯年幼播遷天理人情有所不忍方先皇上賓皇弟尚在襁褓未有知識義當矜閔常人有百金之産尚置義田以收養宗族陛下富有四海乃以同氣之人置之度外貽笑他邦取辱中國倘生他變關係非輕臣願殺身以贖皇弟之罪伏望陛下迎歸太后母子以盡骨肉之義書奏不報未幾太后崩于東安州雅克特古斯未至髙麗伊克徹察舊作月濶察兒今改後仿此害之于中道冬十月滿濟勒噶台罷以托克托為右丞相特穆爾布哈為左丞相滿濟勒噶台以疾辭位詔以太師就第而以托克托及宗正特穆爾布哈為右左丞相十二月復科舉取士制時科舉既輟翰林學士承旨庫庫字子山剛里氏布庫穆子從容言曰古昔取人材以濟世用必由科舉何可廢也帝采其論詔復行之罷文宗增置官屬初文宗設太禧宗禋等院及奎章閣藝文監增置官屬有差至是大臣議悉革罷庫庫曰民有千金之産尚設家孰以延館客堂堂天朝一學房乃不能容邪帝然之改奎章閣為宣文閣藝文監為崇文監餘悉罷之辛巳至正元年夏四月帝如上都御史崔敬上疏請御內殿其略言世祖以上都為清暑之地車駕行幸嵗以為常閣有大安殿有鴻禧睿思所以保養聖躬適起居之宜存敬畏之心也實喇鄂爾多斯舊作失剌幹爾朵思今改乃先皇所以備宴逰非常時臨御之所今國家多故天道變更願大駕還大內居深宫嚴宿衛與宰臣謀治道萬幾之暇則命經筵進講究古今盛衰之由緝熙聖學乃宗社之福也時帝數以厯代珍寶分賜近侍敬又上疏曰臣聞世皇時大臣有功所賜不過鞶革重惜天物為後世慮至逺也今山東大饑燕南亢旱海潮為災天文示警地道失寧京畿南北飛蝗蔽天正當聖主恤民之日近侍之臣不知慮此奏粟承請殆無虛日甚至于府庫百年所積之寶物遍賜僕御閽寺之流乳稚童孩之子帑藏或空萬一國有大事人有大功又將何以為賜乎乞退回所賜以示恩不可濫庶允公論冬湖廣猺賊作亂湖廣猺賊唐大二等作亂其黨蔣丙何仁甫等相繼舉兵攻破江華唐縣今屬湖南永州府等州縣丙自稱順天王溪峒猺民二百餘寨亦相率入邊抄掠湖廣行省平章袞布巴勒舊作鞏卜班今改後仿此擊平之山東燕南冦盜亦縱橫至三百餘處壬午二年春正月開金口河在宛平縣西托克托用參議博羅特穆爾等言于都門外開河置閘引金口渾河注見前之水東流達通州接引海運至大都城內輸納廷士多言不可托克托排羣議不納左丞許有壬言渾河之水湍悍易決而足以為害淤淺易塞而不可行舟況西山水勢髙峻金時在城北流入郊野縱有衝決為害亦輕今則在都城西南若霖潦漲決亦不能保其永無衝決之患帝不聽河成果水急泥壅船不能行而開挑之際毁民廬舍墳塋死傷甚衆又費用不資而卒以無功三月大同饑人相食運京師糧賑之秋八月庚子朔日食冬十月己亥朔日食癸未三年春正月遼陽沃濟野人元為開元路地明置沃濟野人女直軍民府後改三萬衛今奉天府開原縣是按沃濟野人舊作吾者野人今改作亂遼陽為捕海東青煩擾沃濟野人及碩達勒達元置海蘭碩達勒達等路分領渾同江南北地在今寧古塔界內皆叛二月鞏昌山崩成紀注見前寧逺宋縣今屬鞏昌府伏羌宋縣今亦屬鞏昌府等縣山崩水涌溺死人無算三月詔修遼金宋三史初世祖立國史院首命王鶚修遼金二史宋亡又命史臣通修三史延祐天厯之間屢詔修輯以義例未定久之不能成至是乃命托克托為都總裁特穆爾達實字九齡魯王托克托于時為平章政事按特穆爾達實舊作鐵木兒塔識今改後仿此張起巖歐陽元吕思誠揭徯斯字曼碩龍興富州人為總裁官修之或欲如晉書例以宋為世紀而遼金為載紀或又謂遼立國先宋五十年宋南渡後嘗稱臣于金以為不可待制王理著論欲以遼為北史太祖至靖康為宋史建炎以後為南宋史持論久不決詔遼金宋各立為史凡再閲嵗書成上之三史惟遼史先成金宋二史次第告竣其金史多本金末元好問劉祈所著書最為詳贍而發凡起例論贊表奏則皆歐陽元屬華馬劉祈字景叔渾源人夏四月丙申朔日食秋七月汴梁大水自四月至是月霖雨不止中牟注見前等七縣皆大水冬十月親祀太廟帝行禮至寧宗室問曰朕寧宗兄也理當拜否太常博士劉聞對曰寧宗雖弟其為帝時陛下為臣春秋時魯僖公閔公兄也閔公先為君宗廟之祭未聞僖公不拜陛下當拜乃拜十二月以伯勒齊爾布哈字大用延濟克台氏按博爾克布哈舊作怯兒别不花延濟克台舊作燕只吉䚟今並改後仿此為左丞相特穆爾布哈罷徴清江南唐縣今屬江西臨江府處士杜本字伯原其先居京兆後徙清江不至本在武宗時嘗被召至京師即歸隱武夷山注見前文宗聞其名徴之不起至是托克托薦之召為翰林學制兼國史院編修官使者趣至杭州稱疾固辭不至後又詔徵處士鄂勒哲圖濟爾噶朗董立李孝光張樞樞辭不至詔以鄂勒哲圖濟爾噶朗為翰林待制立修撰孝光著作郎或疑其太優特穆爾達寶曰隱士無求于朝廷朝廷有求于隱士區區名爵何足吝惜事在至正七年按李孝光字季和溫州樂清人張樞字子長金華人鄂勒哲圖舊作完者圖濟爾哈朗舊作執禮哈朗今並改後仿此甲申四年春正月詔定守令黜陟之法六事謂田野闢户口增賦役平盜賊息軍民和詞訟簡備者升一等四事備者減一資三事備者平遷六事俱不備者降一等河決曹州發丁夫萬五千八百塞之是月又決汴梁既而復決濟隂金縣今曹州府荷澤縣是漂官民廬舍殆盡二月以賀惟一字允中勝之子為平章政事既而復拜御史大夫故事臺省正官非國姓不以授惟一固辭詔特賜姓而改其名曰太平閏月命托克托兼領宣政院事時諸山主僧請復僧司且曰為郡縣所苦如坐地獄托克托曰若復僧司何異地獄中復置地獄耶夏五月托克托罷以阿嚕圖博爾濟四世孫按阿嚕圖舊作阿魯圖今改後仿此為右丞相托克托以羸疾固辭相位帝問誰可代者以阿嚕圖對遂召用之封托克托為鄭王阿嚕圖既為相議除一人為刑部尚書有難之者曰此人柔弱非刑部所可任阿嚕圖曰欲選劊子邪若選劊子須用强壯人尚書詳讞刑獄不枉人壞法即是好官何用强壯者為右司郎中陳思謙建言諸事阿嚕圖曰郎中如冇所言可與我輩共議施行何必别為文字自有所陳耶郎中居他官則可建言若為右司而建言是徒欲顯一己能言耳將置我輩何地思謙大慙服秋九月丁亥朔日食冬十一月令民入粟補官備賑濟也有匿奸罪而輸粟得七品雜流者為怨家所告有司議輸粟例無有過不與之文中書右司郎中成遵字誼叔南陽穰縣人以為賣官鬻爵己非令典況又賣與奸淫之人其何以為治必奪其敕還其粟著為令乃可從之時有議賊吏遭喪不許歸葬須竟其獄者遵曰惡人因可怒然與人倫孰重國家以孝理天下寧失罪人不可使天下有無親之吏議遂寢乙酉五年夏五月翰林學士承旨庫庫卒諡文忠庫庫為江浙行省平章政事有旨以承旨召還適中書闕員或有所薦帝應之曰平章己有其人今在半途矣人知帝意在庫庫至京七日而卒家貧幾無以斂帝為賜賻并以罰布償其所負官錢焉初庫庫知經筵日勸帝就學帝欲龍以師禮固辭不可帝嘗欲觀畫庫庫乃取比干圖以進一日帝覽宋徽宗畫稱善庫庫進曰徽宗多能惟一事不能帝問一事謂何對曰獨不能為君爾身辱國破皆由不能為君所致凡為人主貴能為君他非所尚其隨事規諌皆類此嘗謂人曰夫天下事宰相當言宰相不得言則臺諌言之臺諌不言則經筵言之備位經筵得言人所不敢言于天子之前志願足矣故于時政得失有當匡敕者未嘗緘默秋九月壬午朔日食遣使巡行天下時諸道奉使者皆與臺諌交相掩蔽惟巡湖廣道大都達魯噶齊巴克實巡京畿道西臺中丞鼎鼎穆舊作定定今改後仿此集賢侍講學士蘇天爵字伯修真定人糾舉無所避天爵所興革者七百八十三事糾劾九百四十九人都人稱為包拯然竟以忤時相罷去丙戌六年春二月庚戌朔日食夏五月陕西饑行酒禁盜竊太廟神主六月羅天麟等作亂陷汀州連城縣宋置蓮城縣元更名今屬汀州府民羅天麟及陳積萬叛陷長汀命江浙行省右丞呼圖克布哈舊作忽都不花今改後仿此等合兵進討未幾其徒羅德用殺天麟積萬來降雲南夷死可伐作亂詔以死可伐盜據一方侵奪路甸命伊圖勒亨舊作亦秃渾今改後仿此為雲南行省平章討之且下詔招諭後死可伐遣其子入貢請降置平緬宣撫司以羈縻之秋七月以多爾濟巴勒字惟中穆呼哩七世孫按多爾濟巴勒舊作朵爾只班今改後仿此為右丞時有善音樂得幸者帝命為崇文監丞參政多爾濟巴勒他擬一人以進帝怒曰選法盡由中書邪多爾濟巴勒頓首曰用幸臣居清選恐後世以此議陛下今選他人臣實有罪省臣無與焉帝悅升右丞冬閏十月靖州宋崇寧間置注見前猺吳天保作亂時湖廣猺俱亂而天保勢尤熾冦陷黔陽宋縣今屬辰州府武岡唐縣明為州今屬寶慶府漵浦唐縣今亦屬辰州府諸郡縣湖廣右丞實保舊作沙班今改率師討之尋敗沒天保遂有衆六萬餘尋進冦全道州注見前官軍不能制未幾廣西峒猺亦乘隙入冦是嵗河決尚書李絅請躬祀郊廟近正人逺侫邪以崇陽抑陰不聽阿魯圖罷先是伯勒齊爾布哈嘗與阿魯圖謀擠托克托阿嚕圖曰我輩亦有退休之日人將謂我何伯勒齊爾布哈屢以為言終不從于是風御史劾奏阿嚕圖不宜居相位阿嚕圖聞之即辭避出城所親皆為之不平請見上自陳阿嚕圖曰我乃博爾濟世裔豈以丞相為難得邪但上命我不敢辭今御史劾我我即宜去御史臺乃世祖所建我與御史抗即與世祖抗矣汝等勿復言丁亥七年春正月甲辰朔日食是日大寒而風朝官仆者數人以蓋苗字耘夫大名元城人為參知政事時大臣以兩京馳道狹隘奏毁民田廬廣之已遣使督治苗曰馳道創自至元初何今日獨以為狹力辨其不可乃止又欲出宿衛士為郡長官俾以養貧苗曰郡長所以牧民豈養貧之地果不能自存賜之錢可也若任郡守必擇賢而後可議遂寢又欲與角抵者鈔萬貫苗曰諸處告饑不䝉賑恤力戲何功獲此重賞乎于是宰相謂僚佐曰所以引蓋君至此欲其相助也乃每事沮抗如此後有公務毋白參政苗聞即欲引去適有旨拜江南行臺御史中丞宰相怒不解比至復除甘肅行省左丞以宦者拜特穆爾舊作伯帖木兒今改後仿此為司徒二月山東地震壞城郭有聲如雷三月東平又震河水動搖夏四月復以伯勒齊爾布哈為右丞相是年正月己命為右丞相尋辭其職今則復命之以特穆爾達實為左丞相伯勒齊爾布哈尋罷帝嘗問特穆爾達實為治何先對曰法祖宗又問王文統竒才也恨不得如斯人者用之對曰世祖有堯舜之資文統不告以王道而乃尚伯術要近利世祖之罪人也使今有文統正當逺之又何足取乎既而伯勒齊爾布哈坐調燮失宜以太保罷就第臺臣復交章論之尋謫居渤海而卒河東大旱民多饑死六月放太師滿濟勒噶台于西寧注見前伯勒齊爾布哈以宿憾譖滿濟勒噶台詔徙西寧州其子托克托力請與俱行時相欲傾之因有告變者復移于西域薩克蘇舊作撒思今改之地御史大夫額琳沁巴勒西夏人舊作亦憐真班今改與本卷前係兩人曰托克托父子無大過奈何迫之于險遂召回甘肅滿濟勒噶台尋卒秋九月特穆爾達實卒以多爾濟穆呼哩六世孫為左丞相多爾濟先為江浙行省丞相以寬簡得民心召入為御史大夫會特穆爾達實從幸上都還感暴疾卒遂命代為左丞相冬十一月沿江盜起剽掠無忌有司不能禁兩淮運使宋文瓚言江陰通泰江海之門户而鎮江真州次之國初設萬户以鎮其地今戍將非人致賊艦往來無常集慶花山在今高淳縣東南劫賊才三十六人官軍萬數不能進討反為所敗後竟假手鹽徒雖能成功豈不貽笑逺近宜亟選智勇以圖後功不然則東南五省財賦恐非國家有矣不聽十二月以多爾濟為右丞相太平即賀惟一改名事具前為左丞相多爾濟先拜左丞相請于帝曰臣藉先臣之蔭蚤襲國王穆呼哩封魯國王子孫世襲弗替昧于國家之理今備位宰相非得太平不足與共事遂拜太平左丞相而以多爾濟為右丞相時順江酋長樂孫求內附請立宣撫司及置郡縣省臣將許之右司都事歸晹曰既設郡縣有事不救則孤來附之意救之則疲中國而事外夷所謂獲虛名而受實禍也與左丞吕思誠抗辨甚力太平問其䇿安出𤾉曰可授其酋長宣撫勿責其貢稅使者賜金帛遣歸足矣卒從暘言詔選臺閣名臣出為守令以連年水旱民多失業選臺閣名臣二十六人出為守令許民間利害實封呈省時參政魏中立薦韓鏞為饒州路總管饒州尚鬼鏞至凡境內淫詞悉毁之人初大駭已而歎服選民俊秀入學求尊宿有學行者為五經師朔望幅巾深衣以謁先聖每月考課以示勸勵由是人人自力于學魏中立字伯時韓鏞字伯高俱濟南人戊子八年春二月立行都水監于鄆城注見前以工部郎中賈魯字友恆河東高平人為都水監魯循行河道考察地形備得要害為圖上進二策其一議修築北隄以制橫潰則用工省其二議疏塞並舉挽河東行使復故道其工數倍會魯遷中書右司郎中議未及竟明年又立山東河南等處行都水監夏四月帝臨國子監賜衍聖公銀印升秩從二品定弟子員出身及省親奔喪等制五月霖雨山崩江溢秋七月丙申朔日食冬十一月台州方國珍又名谷珍黃巖人作亂國珍世以販鹽浮海為業時有蔡亂頭者行剽海上有司捕之國珍怨家告其通冦遂入海為亂劫掠漕運江浙參政多爾濟巴勒舊作朵兒只班今改與卷前係兩人討之追至福州國珍焚舟將遁行省兵自知驚潰多爾濟巴勒遂被執國珍脅使請于朝詔授定海尉國珍不肯赴尋進攻溫州勢益猖獗時監察御史張禛言明哷棟阿等陛下深仇巴延賊殺親王一十二口法當族誅而其子孫兄弟尚皆仕于朝今災異迭見盜賊蜂起海冦敢于要君閫帥敢于玩冦若不振舉恐有唐末藩鎮噬臍之禍不報御史李祕亦言世祖誓不與高麗共事而陛下乃以高麗竒氏位皇后今河決地震盜賊滋蔓皆陰盛陽微之象乞降為妃亦不聽竒氏帝第三皇后皇子阿育實哩達喇之母按阿育實哩達喇舊作愛猷識理達臘今改後仿此以台哈布哈鴻吉哩氏按此又一台哈布哈非前為御史後殉難之台哈布哈也呼圖克布哈並為平章政事丞相太平薦台哈布哈可用故有是命明年太平罷相台哈布哈黨于托克托謀害太平衆由是不平之己丑九年夏四月棗陽童子暴長棗陽民張氏婦生男甫及周嵗暴長四尺許容貌異常皤腹擁腫見人輒嬉笑如世俗所畫布袋和尚云秋七月多爾濟太平俱罷以托克托為右丞相初滿濟勒噶台卒太平請令托克托歸葬左右以為難太平為之固請托克托得還復拜太傅然不知太平有德于已也因儒克忠巴勒舊作汝中柏今改讒間成隙欲中傷之時參政孔思立等皆太平所拔用悉誣以罪黜去而太平亦罷為翰林學士承旨又誣劾其過失托克托母聞之謂曰太平好人何害于汝而欲去之若違吾言非吾子也乃止太平故吏田復勸之自裁太平曰吾無罪當聽于天若自殺則誠有歉矣遂還奉元冬十月命皇太子阿育實哩達喇拉習漢人文字命皇太子阿育實哩達喇入端本堂肄業以李好文為諭德歸暘為贊善張冲為文學命托克托領其事堂虛中座以俟臨幸皇子與師傅分東西向坐授書其下僚屬以次列坐好文取經史有關治體者為書曰端本堂經訓要義又取古史自三皇迄金宋國祚久速治亂興廢為書曰大寶録前代帝王善惡當法戒者為書曰大寶龜鑑以進復上書曰陛下以臣所進諸書參以貞觀政要大學衍義等篇推而行之則太平之治不難致矣他日皇子坐清寧殿分布長席列坐高麗西番僧曰李好文先生教我儒書多年尚不曉其意今聽佛法一夜即曉由是愈崇尚佛學十一月戊午朔日食詔削沃呼海夀舊作斡勒海夀今改後仿此官流韓吉納于尼嚕罕先是同知樞密院事哈瑪爾字士亷剛哩克人舊作哈麻今改與弟舒蘇舊作雪雪今改為帝所褻幸聲勢甚盛太平及御史大夫韓吉納等皆謀黜之令監察御史沃哷海夀劾奏哈瑪爾兄弟出入托果斯舊作脫匆思今改皇后明宗妃帝之庶母宫闈犯分無禮哈瑪爾知之先自訴于帝吉納以御史章入奏帝遂怒弗納明日再上不得已奪哈瑪爾舒蘇官居之草地而出海夀為陜西亷訪副使太平吉納亦相繼罷去吉納罷為江浙行省平章政事至是托果斯皇后以其言侵巳復泣訴于帝帝益怒乃奪海夀官屏歸田里禁錮之並誣吉納贓罪杖流尼嚕罕以死庚寅十年夏六月有星入于北斗大如月震聲如雷冬十一月壬子朔日食更鈔法先是左司郎中武祺以鈔法不行轉撥民間流通者少故僞鈔滋多請如舊制凡合支名目于總庫轉支從之至是復與吏部尚書竒齊葉圖舊作偰哲篤今改後仿此迎合丞相托克托意請以鈔一貫文省權銅錢一千文鈔為母而錢為子托都集臺省兩院共議之衆皆唯唯惟國子祭酒吕思誠極言其不可不聽思誠曰中統至元自有母子豈有以故紙為母而立銅為子者乎又曰錢鈔用法見為一致以虛換實也今歷代錢與至正錢中統至元鈔交鈔分為五項慮下民藏其實而棄其虛恐不為國家之利竒齊葉圖曰至元鈔多僞故更之思誠曰至元鈔非僞人為僞爾且至元鈔人猶識之交鈔人未之識僞將滋多竒齊葉圖曰令錢鈔兼行何如思誠曰錢鈔兼行輕重不倫何者為母何者為子汝不通古今徒以口舌取媚大臣可乎竒齊葉圖忿曰公今有何議思誠曰我有三字議曰行不得行不得托克托見思誠言直頗疑未決御史大夫額森特穆爾曰吕祭酒之言亦有是者但不當于廊廟中大聲厲色耳于是風御史劾思誠狂妄左遷湖廣行省左丞額森特穆爾托克托之弟遂定更鈔之議以中統交鈔一貫省權銅錢一千文唯至元鈔二貫仍鑄至元通寶錢與歷代銅錢並用以實鈔法至元鈔通行如故置寶泉提舉司鑄至正錢印造交鈔令民間通用行之未久物價騰湧至逾十倍所有郡縣皆以物貨相貿易公私所積之鈔皆不行國用由是大乏辛卯十一年是年以後徐夀輝韓林兒明玉珍陳友諒等相繼僭號續綱目皆附注紀年今按夀輝等以羣盜倡亂旋即敗亡不成為國與晉末五代諸割據各有土宇者不同續綱目書法未當今並削之夏四月詔開黃河故道左遷工部尚書成遵為河間鹽運使以賈魯為總治河防使時黃河屢決北侵安山在陽山縣南延及濟南河間朝廷患之托克托集羣臣議言人人殊惟賈魯謂必塞北河疏南河使復故道役不大興害不能已于是遣工部尚書成遵與大司農圖魯舊作禿魯今改後仿此行視河議其疏塞之方以聞遵等自濟濮汴梁大名行數千里掘井以量地之高下測岸以宄水之深淺謂河之故道斷不可復且曰山東連歉民不聊生若聚二十萬衆于此地恐他日之憂又有重于河患者時托克托先入魯言聞遵等議怒曰汝謂民將反耶自辰至酉論辨終莫能入明日執攻謂遵曰修河之役丞相意已定且有人任其責公勿多言幸為兩可之議遵曰腕可斷議不可易遂出遵為河間鹽運使詔開黃河故道命魯以工部尚書充總治河防使發河南北兵民十七萬自黃陵岡在開封府儀封縣東北與考城縣及山東曹縣接界南達白茅村名在長垣縣東接東明縣界放于黃固一名黃堌在單縣界哈齊在歸德府界等口又自黃陵西至楊青村在曹縣南凡二百八十里有竒四月鳩工七月疏鑿成九月舟楫通行十一月諸掃堤成河復故道南滙于淮又東入海詔超授魯集賢大學士賜托克托世襲達爾汗之號餘遷賚有差宋濓曰先是嵗庚寅河南北童謡曰石人一隻眼桃動黃河天下反及魯治河果于黃陵岡得石人一眼而汝潁之妖冦乘時而起議者謂天下亂皆由魯治河之役勞民動衆所致不知元之亡實基于上下因循狃于宴安之習紀綱廢弛風俗偷薄其致亂之階非一朝夕之故設不興是役亂詎無從而起乎不此之察而徒以成敗論事非通論也冀晉地震半月乃止懷孟等州俱震有聲如雷圮民居屋壓死者甚衆五月己酉朔日食潁州人劉福通蕭縣人李二羅田人徐夀輝又名真一等起兵作亂續綱目于徐夀輝等書兵起今依元史本紀例改書作亂時四方盜賊蜂起有司不能制有韓山童者欒城人自其祖父以白蓮㑹燒香惑衆謫徙永平至山童倡言天下大亂彌勒佛下生河南及江淮愚民信之福通與其黨杜遵道羅文素盛文郁王顯忠韓雅爾舊作咬兒今改復言山童實宋徽宗八世孫當為中國主乃刑白馬烏牛誓告天地謀同起兵以紅巾為號事覺縣官捕之急福通遂反而山童就擒其妻楊氏及其子韓林兒逃之武安惟福通黨盛不可制朝廷于是命同知樞密院圖沁舊作秃赤今改後仿此以兵擊之福通既破潁州遂據朱皋攻羅山注見前上蔡真陽確山真陽今改名正陽與確山俱屬汝寧府諸縣尋犯舞陽葉縣陷汝寧府及光息二州衆至十萬蕭縣李二號芝麻李亦以燒香聚衆與其黨趙均用彭早住攻陷徐州據之徐夀輝本以販布為業有僧瑩玉袁州人以妖術與鄒普勝麻城人倪文俊等作亂竒夀輝狀貌共推為主攻陷蘄水及黃州路亦以紅巾為號時謂諸賊曰紅軍亦稱香軍六月浙江行省左丞博囉特穆爾擊方國珍兵敗被執秋七月遣大司農達實特穆爾字九成舊作達識帖木邇今改後仿此招降之國珍入海燒掠沿海州郡朝廷遣博囉特穆爾將兵討之兵至大閭洋在今溫州府界海中國珍夜率徑卒縱火鼓譟官軍不戰皆潰赴水溺死者過半博囉特穆爾被執反為國珍飾詞上聞朝廷弗之知復遣大司農達實特穆爾等至黃巖招降國珍兄弟登岸羅拜退止民間紹興總管台哈布哈欲命壯士襲殺之達實特穆爾適夜過台哈布哈密白其事達實特穆爾曰我受詔招降公欲擅命邪乃止檄台哈布哈至海濱散其徒衆拘其海舟兵器授國珍兄弟官有差八月詔知樞密院事額森特穆爾督兵討劉福通時福通兵勢日盛托克托奏以額森特穆爾知樞密院事及衛王庫春格爾舊作寬徹哥後仿此率諸衛兵十餘萬討之復上蔡擒其黨韓雅爾誅之冬十月饒信等路雨黍信州及邵武雨黍饒州建寧雨黑子大如黍菽衢州雨黍民多取而食之徐夀輝稱帝于蘄水夀輝據蘄水為都國號天完自稱皇帝改元治平以鄒普勝為太師攻陷饒州執魏中立陷信州執于大本字德中密州人皆脅使從已命以官二人不屈夀輝並殺之十一月以多爾濟巴勒為平章政事多爾濟巴勒首言治國之道綱常為重前西臺御史張桓字彥威藁城人汝寧盜起為所執不屈被害仗節死義宜旌之以勸來者又言祖宗用兵不専于殺人今倡亂者數人乃盡坐中華之民為叛逆豈足以服人心頗忤托克托意時托克托倚任儒克忠巴勒拜特穆爾兩人擅權用事多爾濟巴勒正色立朝無所附麗未幾出為西臺御史大夫壬辰十二年春正月徐夀輝兵陷漢陽諸郡威順王庫春布哈舊作寬徹普化今改後仿此等棄城走二月陷江州總管李黼字子威潁上人死之夀輝遣其將丁普郎等陷漢陽興國武昌威順王及平章政事華善等並遁去又攻沔陽推官俞述祖字紹芳慶元象山人戰敗被執不屈夀輝怒支解之又陷安陸府知府超爾字時中䝉古氏按超爾舊作丑閭今改後仿此戰死遂南攻九江右丞博囉特穆爾方駐兵于江聞風宵遁黼檄鄉落聚木石于險處遏其歸路黃梅主簿伊蘇特穆爾願出擊賊黼與之出戰大敗賊兵殺獲二萬餘人黼曰賊不利于陸必以舟薄我乃令以長木數千冒鐵雉于杪暗置沿岸水中賊舟數千艘順流鼓譟而至遇樁不得動黼發火箭射之焚溺無算時東際淮甸西自荆湖守臣往往棄城遁獨黼守孤城中外援絶而賊勢益熾進兵薄城分省平章圖沁布哈舊作秃堅不花今改後仿此自北門出走黼引兵登陴賊已焚西門張弩射之轉攻東門黼急往救賊兵已入矣猶與之巷戰力不能敵乃揮劍叱之曰殺我毋殺百姓賊刺之墮馬與從子秉昭黼兄冕之子俱死州民聞之哭聲振天具棺葬之事聞贈黼淮南行省左丞隴西公諡忠文郭子興其先曹州人遷居定逺等起兵作亂陷濠州隋置元屬安豐路今江南鳯陽府是子興少任俠喜與壯士結交至是見汝潁兵起列郡騷動遂與其黨孫德崖等舉兵反自稱元帥攻拔濠州據之徹爾布哈舊作徹里不花今改後仿此率兵欲克復濠城憚不敢進惟日掠良民為盜以徼賞由是民益恟恟不安其豪傑咸投入城以自保三月詔省臺官兼用南人自世祖以後臺省之職南人斥不用至是始復舊制詔南人有才學者並許用之台州路達嚕噶齊台哈布哈與方國珍戰于澄江在今台州府黃巖縣海中死之時朝廷方征徐州命江浙募舟師北守大江國珍懷疑復劫其黨入海台哈布哈遣義士王大用往諭留不遣其戚黨陳仲達往來計議陳其可降狀台哈布哈具舟張受降旗乘潮下澄江觸沙不行垂與國珍遇呼仲達申前議仲達目動氣索台哈布哈覺其心異手斬之即前搏賊船奮擊賊羣至欲抱持入其船台哈布哈瞋目叱之奪刀殺賊賊攢槊刺之中頸死猶直立不仆投其尸海中事聞追贈江浙平章封魏國公諡忠介隴西地震凡百餘日城郭頺圮陵谷遷變定西會州靜寧注俱見前莊浪元置縣明改衛今涼州府平畨縣是尤甚會州公宇墻崩獲弩五百餘長者丈餘短者九尺人莫能挽因改定西為安定州㑹州為㑹寧州徐夀輝陷吉安路夀輝連破袁瑞饒信徽等州復使僞將陳普文進陷吉安路鄉民羅明逺起兵復之命各行省分兵討賊詔四川行省平章約爾珠討荆襄賊復忠萬等州江西行省丞相額琳沁巴勒守江東西關隘參政額森特穆爾與陜西行省平章伊嚕特穆爾討南陽襄陽賊刑部尚書阿嚕討海寧賊江西右丞和尼齊舊作火你赤今改後仿此討江西賊江西右丞烏格什舊作兀忽失今改後仿此等討饒信等處賊夏四月癸卯朔日食額森特穆爾軍潰召還復為御史大夫左遷西臺御史大夫多爾濟巴勒為湖廣平章政事額森特穆爾駐軍沙河在今潁州府太和縣南即古新溝也俗呼曰惠民河軍中夜驚盡棄軍械北奔汴梁收散軍退屯朱仙鎮朝廷以額森特穆爾不知兵遣平章曼濟舊作蠻子今改代還仍為御史大夫西臺御史范文劉希曾等劾其喪師辱國托克托庇之中臺御史周伯琦字伯溫饒州人阿附托克托劾文等越分干譽乃左遷多爾濟巴勒為湖廣平章出文等為各郡判官由是人莫敢言事多爾濟巴勒既受命關中人涕泣遮留慰遣之從間道得出至湖廣儒克忠巴勒等言于托克托曰不殺多爾濟巴勒丞相終不安乃命専給軍餉總兵者希旨數侵辱之不為動托克托又遣國子助教額勒哲至軍中諷使害之額勒哲至益加敬禮謂人曰平章國之勛舊吾苟傷之人將不食吾餘矣多爾濟巴勒素感風疾竟卒于黃州詔天下完城郭築隄防五月徙瀛國公子趙完普等于沙州御史齊齊克特穆爾舊作徹徹帖木兒今改後仿此等言諸路羣盜輒引亡宋故號以為口實宜徙和尚完普及親屬于沙州安置禁人交通從之六月大名路旱蝗饑民七十餘萬口秋七月徐夀輝陷杭州江執參知政事樊執敬字時中濟寧鄆城人戰死董搏霄字孟起磁州人率兵復之遂復徽州先是夀輝遣項普略引兵掠徽饒諸州遂犯昱嶺關在今昌化縣西昱嶺山下來攻杭州城中猝無備執敬遽上馬率衆出中途與賊遇乃奮力斫賊中槍而死時董摶霄從江浙平章嘉琿征安豐乘勝攻濠州㑹朝廷命移軍援江南遂渡江至德清而杭州已陷嘉琿問計摶霄曰賊見杭城子女玉帛必縱欲不暇為備宜急攻之若退保湖州賊乘鋭趨京口則江南不可為矣嘉琿不能決諸將亦難其行摶霄曰公為江浙相方面失陷而及今不取誰任其咎復拔劍顧諸將曰相君在是敢有慢令者斬遂進兵薄杭城賊迎敵摶霄揮壯士突前諸將相繼夾擊凡七戰賊奔接待寺塞其門而焚之皆死遂復杭城已而餘杭武康德清於潛安吉次第以平賊將潘大淵梅元等俱以其徒來降尋進克廣德蘄饒諸賊復犯徽州賊中有道士能作十二里霧摶霄引兵擊之賊大潰斬首數萬級焚其妖書而斬之徽州遂平八月右丞相托克托將諸軍大破李二于徐州屠其城托克托自乞率師討李二詔許之尚書穆爾瑪舊作密邇麻哈穆特舊作和謨今並改後仿此等言大臣天子股肱中書庶政根本不可一日離乞留托克托以弼亮天工庶內外有兼治之宜不報遂詔托克托以達可汗大傅右丞相分省于外總制諸路軍馬凡爵賞誅殺悉聽便宜從事九月至徐州攻其西門賊出戰以鐵翎箭射馬首托克托不為動麾軍奮擊破之李二遁去趙君用彭早住走濠州追擒其將數十人遂屠其城帝遣平章政事即軍中加托克托太師趣還朝改徐州為武安州九月以余闕字廷心一字天心瑭古特氏廬州人為淮西宣慰副使守安慶時闕以浙東廉訪僉事居母憂于家值兵擾河南陷郡縣乃起闕副使僉都元帥府事分兵守安慶抵官十日而冦至拒却之乃集有司諸將議屯田守戰䇿環境築堡寨選精外捍而耕稼于中浚隍增陴隍外環以大防深塹三重南引江水注之環植木為柵城上四面起飛樓表裏完固俄升都元帥廣西苗軍五萬從元帥阿爾斯蘭舊作阿思蘭今改後仿此沿江下抵廬州關移文謂苗蠻不可使之窺中國詔阿爾斯蘭還軍苗軍有暴于軍者即收戮之凜凜莫敢犯時羣盜環布四外闕居其中左提右挈屹為江淮一保障冬十月霍山在今六安州霍山縣西又名天柱山爾雅霍山謂南嶽是也崩前三日山如雷鳴禽獸驚散隕石數里十一月江西行省平章政事桑節字吉甫河西人綽戬之子舊作星吉今改改討趙普勝戰于湖口注見前兵敗死之桑節初為南臺御史大夫執政惡之出為湖廣平章召拜大司農時相復奏移之江西桑節馳赴任比至江東復有詔令守江州時江州己陷趙普勝珠倫舊作周驢今改後仿此等據池州太平注俱見前諸郡號百萬桑節募兵得三千人趨銅陵南唐縣今屬池州府克之擒倫奪其船六百艘軍聲大振遂復池州分兵攻石埭梁縣今亦屬池州府諸縣進據清水灣又大破之賊久圍安慶聞風燒營遁去遂進復湖口縣克江州留兵守之命王惟恭柵小孤山桑節自據番陽口綴江湖要衝以圖恢復日久援不至賊乘大艦來攻編葦筏塞上下流火之桑節出兵力戰衆死且盡桑節猶堅坐不動中流矢而仆賊素聞其名不忍害舁至密室乃蘇羅拜餽食桑節斥之凡七日乃自力而起北向再拜曰臣力竭矣遂絶以察罕特穆爾字廷瑞系出北庭家河南為潁州沈邱人按察罕特穆爾舊作察罕帖木兒今改後仿此為汝寧府達嚕噶齊李思齊信陽羅山人知府事時汝潁賊名愈熾不數月江淮諸郡皆殘破朝廷徴兵致討察罕特功察罕特穆爾與李思齊同奮義起兵邑人子弟從者數百人設竒計襲破羅山事聞遂並授以官于是所在義士俱將兵來㑹得萬人屯沈邱唐縣今屬陳州府自成一軍數與賊戰輒克捷趙均用入濠州據之時徐州既下彭早住趙均用率餘黨入濠州托克托命賈魯追擊之均用與郭子興孫德崖極力拒守㑹魯卒兵乃解去早住均用遂據濠城稱王初二人本以窮蹙來奔子興與德崖反曲已下之事皆稟命遂為所制既而早住死均用益自專御批歷代通鑑輯覽卷九十八

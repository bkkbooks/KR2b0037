front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷二十八蜀漢起昭烈帝章武元年辛丑至後主炎興元年癸未共二帝四十二年昭烈皇帝
  hash: sha256:0bc93c9b230fcbd7dc6f3554f89e7b7dd4eb70ab3eed9fa51d66d63b880aaca4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_027-1a, image: WYG0336/WYG0336-0001a.png}
body:
  text: 帝名備字元德涿郡涿郡治今順天府涿州是人景帝子中山靖王勝之裔勝子貞元狩六年封涿縣陸城亭侯坐酎金失侯因家焉帝祖雄父𢎞世任州郡建安末自為漢中王事且前曹丕篡漢遂正位于蜀辛丑章武元年魏黃初二年夏四月漢中王即皇帝位蜀中傳言漢帝已遇害于是漢中王發喪制服諡曰孝愍皇帝群下競勸王稱尊號乃即帝位于武擔山名在成都府城內西北隅之南大赦改元以諸葛亮為丞相許靖為司徒置百官立宗廟祫祭高皇帝以下尹氏起莘曰通鑑因史筆以紀述初不别立義例故以魏紀年綱目取春秋之義以示天下萬世之公論故以昭烈承獻帝之後紹漢遺統二者固並行而不相悖也孫權徙治武昌權自公安徙都亍鄂漢縣屬江夏郡今武昌府武昌縣是更名鄂曰武昌五月立夫人吳氏將軍懿之妹為皇后子禪為皇太子六月戊辰晦日食魏有司以日食奏免太尉詔曰災異之作以譴元首而歸過股肱豈禹湯罪已之義乎其令百官各䖍厥職後有天地之靑勿劾三公秋七月帝自將伐孫權帝恥關羽之沒將擊孫權將軍趙雲曰國賊曹操非孫權也若先滅魏則權自服今操雖斃子丕篡位當因衆心早圗關中居河渭上流以討凶逆關東義士必裹糧䇿馬以迎王師不應置魏先吳群臣諌者甚衆帝皆不聼乃留諸葛亮輔太子守成都而自率諸軍東下孫權遣使求和不許權遂遣陸遜督諸軍拒守先是諸葛瑾致箋于帝曰關羽之親何如先帝荆州大小孰與海內俱應仇疾誰當先後若審此數易亍反掌矣帝不聼時吳人彧言瑾别遣親人與漢相聞者權曰孤與子瑜有生死不易之誓子瑜之不負孤猶孤之不負子瑜也陸遜亦表瑾必無此權報曰元德昔遣孔明至吳孤嘗語子瑜曰卿與孔明同産何不留之子瑜言亮已委質于人義無二心弟之不留猶瑾之不往也其言足貫神明今豈當有此乎孤與子瑜可謂神交非外言所聞知卿意至輒封來表示之矣車騎將軍張飛為其下所殺飛雄猛亞于關羽羽善待卒伍而驕于士大夫飛愛禮君子而不恤軍人帝常戒之飛不悛至是當率萬人㑹江州臨發為帳下所殺以其首奔孫權帝聞飛營都督有表曰噫飛死矣胡三省曰用兵必觀人事既失關羽又喪張飛兵可以無出矣八月孫權遣使降魏魏封權為吳王權遣使稱臣送亍禁等還魏魏受吳降朝臣皆賀劉曄獨曰權無故求降必內有急恐中國往承其釁也冝大興師徑渡江襲之蜀攻其外我攻其內吳之亡不出旬月吳亡則蜀亦不能久存矣魏主不聼遣太常邢貞奉䇿拜權為吳王加九錫貞至吳權出都亭侯貞貞入門不下車張昭曰君敢自尊大豈以江南寡弱無方寸刃乎貞即下車中郎將徐盛忿憤謂同列曰盛等不能奮身出命為國家并許洛吞巴蜀而令吾君與貞盟不亦辱乎因涕泣橫流貞聞之謂具徒曰江東將相如此非久下人者也徐盛字文嚮琅邪莒人已而吳遣中大夫趙咨字德度南陽人入謝于魏魏主丕問咨曰吳王何等主也咨曰聰明仁智雄略之主也魏主問其狀對曰納魯肅于凡品聰也拔呂蒙于行陳明也獲于禁而不害仁也取荆州而兵不血刃智也據有三州虎視四方雄也屈身于陛下略也丕曰頗知學乎對曰吳王任賢使能志存經略雖有餘閒博覽書史然不效書生尋章摘句而已曰吳可征不對曰大國有征伐之兵小國有備禦之固曰吳難魏乎對曰𢃄甲百萬江漢為池何難之有曰吳如大夫者幾人對曰聰明特逹者八九十人如臣之比車載斗量不可勝數魏遣使求珍物于吳魏主丕求大貝明珠象犀玳瑁孔雀翡翠鬪鴨長鳴雞于吳吳群臣曰荆掦貢有常典魏所求非禮冝勿與吳王權曰彼所求者于我瓦石耳孤何惜焉且彼在諒聞而所求若此寧可與言禮哉具以與之冬十月魏以楊彪為光祿大夫初魏主丕欲以彪為太尉彪辭曰嘗為漢朝三公值世衰亂不能立尺寸之益若復臣魏于國之選亦不為榮也及是公卿朝朔且乃并引彪待以客禮賜几杖使著布單衣皮辨以見拜光祿大夫朝見位次三公又令門施行馬即周禮梐枑一木橫中兩木互穿施之于門以為約禁也晋魏之制三公始得用之以優崇之孫權立子登字子髙權長子為太子吳王權為登妙選師友于是諸葛恪字元遜瑾之子張休字叔嗣昭之子顧譂字子默雍之孫雍字元嘆吳人長子邵邵子譂考通鑑談作顧雍子今依吳志改注陳表字文與武之子武字子烈廬江松滋人以選為中庶子入講詩書出從騎射待以布衣之禮謂之四友魏欲封登萬戶侯權以年幼辭之權遣西曹掾沈珩謝魏魏主丕問曰聞太子當來寧然乎對曰臣在東朝朝不坐宴不與若此之議無所聞也丕善之沈以國為氏珩字仲山吳郡人魏置護鮮卑烏桓校尉初魏太祖既克踏頓烏桓浸衰鮮卑大人軻比能素利彌加等因求通市太祖皆表以為王軻比能本小種以勇健亷平為衆所服威制餘部時自雲中五原東抵遼水在今奉天府西有東西二源合流而南徑開原鐵嶺二縣西又南徑承德遼陽海城之西又南入海此河左右即漢遼東遼西所由分也皆為鮮卑庭分地統御軻比能近塞中國叛人多歸之素利等在塞外道逺故不為邊患魏主丕以牽招為護鮮卑校尉田豫字國讓漁陽雍奴人為護烏桓校使鎮撫之保塞鮮卑步度根檀石槐之後也軻比能誘之以叛己復殺之魏青龍三年幽州刺史王雄使人刺殺軻比能種落離散邊陲遂安壬寅二年魏黃初三年吳大帝孫權黃武元年春正月丙寅朔日食魏除貢士限年法郡國所選勿拘老幼儒通經史吏逹文法到皆試用帝進軍猇許交反亭在荆州府冝都縣西今名虎腦背市帝自秭歸將進擊吳黃權曰水軍沿流進易退難臣請先驅以當寇陛下冝為後鎮帝不從以權督江北諸軍自率諸將自江南緣山截嶺軍于夷道今冝都漢夷道也蜀漢置冝都郡治此猇亭吳將皆欲迎擊之陸遜曰彼鋭氣始盛乘髙守險難可卒攻今且奬厲將士以觀其變彼勢不得展自當罷于木石之間徐制其敝耳諸將皆以為怯帝復自佷音恆山漢縣今湖北冝昌府長陽縣是縣西北有佷山通武陵使馬良字季常襄陽冝城人以金錦賜五溪諸蠻夷授以官爵三月魏立子弟為王時諸侯王皆寄地空名而無實國各有老兵百餘人以為守衛隔絶千里之外不聼朝聘設防輔監國之官以伺察之雖有王侯之號皆思為匹夫而不可得夏六月吳陸遜進攻猇亭諸軍敗績帝還永安即白帝前城注見帝自巫峽在今四川䕫州府巫山縣東與西陵峽歸峽並稱三峽建平吳郡治巫今巫山縣也胡三省曰是時未有建平史追書耳連營至夷陵界立數十屯自正月與吳相拒至六月不决帝遣吳班將數千人亍平地立營吳將帥欲擊之陸遜曰此必有譎且觀之帝知計不得行乃引伏兵八千從谷中出遜曰所以不聼諸君擊之者以此故也遂上疏吳王權曰夷陵國之關限失之則荆州可憂臣初嫌彼水陸俱進今反捨船就步處處結營察其布置必無他變矣遜將進攻漢軍諸將曰攻當在初今諸要害皆已固守擊之必無利遜曰彼更事多其軍始集思慮精專未可干也今住既久不得我便兵疲意沮計不復生掎角此軍正在今日乃先攻一營不利遜曰吾已曉破之之術乃敕各持一把茅以火攻拔之遂率諸軍同時俱攻破四十餘營帝升馬鞍山在冝昌府東湖縣西北陳兵自繞遜促兵四面蹙之土崩瓦解死者萬數帝收敗兵棄船由步道還白帝改魚復縣曰永安舟械軍資略盡帝大慙恚曰吾乃為陸遜所折辱豈非天邪將軍傅彤義陽人為後殿兵衆盡死彤氣益烈吳人使降彤曰吳狗安有漢將軍而降者遂死之從事祭酒程畿字季然閬中人泝江而退衆勸其走畿曰吾在軍未習為敵之走也亦死之初諸葛亮與法正好尚不同而以公義相取亮每竒正智術及是正已卒亮嘆曰孝直若在必能制主上東行就行必不危矣是秋黃權以道絶不得還遂率其衆降魏馬良亦死于五溪秋七月魏冀州大蝗饑九月魏立法自今后家不得輔政詔曰婦人與政亂之本也自今以後群臣不得奏事太后后族之家不得輔政及橫受茅土後世有背違者天下共誅之魏遣將軍曹休字文烈操族子等擊吳吳王權改元拒魏魏主丕自將擊之魏主丕遣使責吳任子不至怒欲伐之劉曄曰彼新得志上下齊心而阻帶山湖不可倉卒制也不從命將軍曹休等出洞口胡三省注在歷陽江邉歷陽注見前曹仁出濡須曹真字子丹操從子等圍南郡吳遣將軍吕範以舟師拒休諸葛瑾等救南郡朱桓字休穆吳人拒仁時楊越蠻夷多未平集權以內難未弭卑辭上書魏主丕求自改厲又欲與子登求昏丕報曰朕之與君大義已定若登朝到久召兵還耳于是權改元黃武臨江拒守丕自許昌魏黃初二年改許縣曰許昌南伐之冬十一月庚申晦日食吳人來聘遣大中大夫宗瑋報之孫權遣使請和帝許之遣宗瑋報命于是與吳復通癸卯三年帝禪建興元年魏黃初四年吳黃武二年書汪克寬考異曰提要及紫陽書院刋本並大三年後主建興元年按綱目名號例秦漢以下凡正統之君曰帝無統稱帝者曰某主今刋本綱目于蜀志先主大書昭烈皇帝而後主未革舊史仍書後主蓋當時録者因史舊文而朱子偶未及改也當依晋帝奕例書曰帝禪又按改元例凡中歲而改元者以前為正而注所改于下是年五月後主即位改元建興今綱目刋本于是年嵗首即書建興元年而不著章武三年蓋亦鈔録之誤當從提要及紫陽本大書三年分注帝禪建興元年而明年大書建興二年汪氏之說如此今依之春魏師攻濡須别將圍江陵皆不克引還先是曹休在洞口㑹暴風吹吳吕範船綆纜悉斷魏軍乘之頗有斬獲已吳救船至魏軍戰敗而還及是曹仁以步騎數萬向濡須吳督朱桓兵才五千人乃偃旗鼓示弱以誘之時諸將皆懼桓曰勝負在將不在衆寡兵法稱客倍而主人半者謂俱在平原而士卒勇怯等耳今仁非智勇士卒甚怯千里步涉人馬罷困桓與諸君共據髙城臨江背山以逸待勞以主制客此百戰百勝之勢雖曹丕自來尚不足憂况仁等邪仁遣其子泰攻濡須城分遣常雕王雙等襲中洲桓部曲妻子所在桓遣别將擊雕等而身自拒泰泰燒營退桓遂斬雕生虜雙是時朱然字義封本姓施氏朱治以為子方鎮江陵曹真夏侯尚字伯仁淵從子等圍之諸葛瑾以兵來救為尚所郤亍是中外斷絶城中兵多腫病真等起土山鑿地道弓矢雨注將士皆失色然無恐意方厲兵伺隙攻破魏兩屯魏軍攻圍然凡六月不能克夏侯尚欲乘船將步騎入渚中安屯作浮橋南北往來議者多以為城必可拔董昭上疏曰今屯渚中至深也浮橋而濟至危也一道而行至狹也三者兵家所忌而今行之恐渚中精鋭將轉而為吳矣魏主丕即詔尚等促出吳人擊之魏兵僅而得脫㑹大疫丕悉召諸軍還洛陽初丕問賈詡曰吾欲伐不從命以一天下吳蜀何先對曰備有雄才諸葛亮善治國孫權識虛實陸遜見兵勢據險守要泛舟江湖皆難卒謀也用兵之道先勝後戰量敵論將故舉無遺䇿今群臣無備權對雖以天威臨之未見萬全之勢也丕不納軍竟無功夏四月帝崩于永安丞相亮受遺詔輔政五月太子禪即位是為帝禪尊皇后曰皇太后改元大赦封亮為武鄉侯領益州牧諸葛亮至永安帝病篤命亮輔太子禪以尚書令李嚴為副帝謂亮曰君才十倍曹丕必能安國終定大事嗣子可輔輔之如其不可君可自取亮涕泣曰臣敢不竭股肱之力效忠貞之節繼之以死帝又詔敕禪曰勿以惡小而為之勿以善小而不為惟賢惟德可以服人汝父德薄不足效也汝與丞相從事事之如父遂崩亮奉喪還成都以嚴為中都護留鎮永安禪即位年十七大赦改元建興封亮為武鄉侯領益州牧政事咸取決焉亮約官職修法制發教與群下曰夫參署者集衆思廣忠益也若逺小嫌難相違覆曠闕損矣違覆而得中猶棄敝蹻而獲珠王然人心苦不能盡惟徐元直處兹不惑又董幼宰參署七年事有不至至于十反來相啓告苟能慕元直之十一幼宰之勤渠有忠于國則亮可少過矣亮常自校簿書主簿楊顒諌曰為治有體上下不可相侵請為明公以作家譬之今有人使奴執耕婢典爨雞司晨犬吠盜牛負重馬涉逺私業無曠所求皆足雍容髙枕飲食而已忽一旦盡欲以身親其役形疲神困終無一成豈其智之不如奴婢雞狗哉失為家主之法也是故古人稱坐而論道謂之三公作而行之謂之士大夫丙吉不問死人陳平不知錢穀彼誠逹亍位分之體也今公躬校簿書流汗終日不亦勞乎亮謝之及顒卒亮垂涕三日楊顒字子昭襄陽人六月益州郡耆長也帥雍闓雍姓闓名闓音開等以四郡益州永昌牂牁越嶲注見前叛初益州郡耆帥雍闓殺太守因士燮求附于吳吳以為永昌太守闓又使郡人孟獲誘扇諸夷牂牁越嶲皆叛應闓丞相亮以新遭大喪撫而不討務農殖穀閉關息民民安食足而後用之秋八月葬惠陵在四川成都府華陽縣西南依考昭烈帝葬通鑑及綱目皆脫書今蜀志補史臣曰先主之宏毅寬厚知人待士蓋有髙祖之風及其舉國託孤亍諸葛亮心神無二誠君臣之至公古今之盛軌也機權幹略不逮魏武是以基宇亦狹焉魏以鍾繇為太尉時魏三公無事希與朝政廷尉髙柔字文惠陳留圉人上疏曰公輔國之棟梁而不使知政遂各偃息飬髙鮮有進納誠非朝廷崇用大臣大臣獻可替否之義也古者刑政有疑輒議于槐棘之下周禮朝士掌外朝之法面三槐三公位焉左九棘孤卿大夫位焉自今有疑議大事宜訪三公三公朝朔望日可特延論博盡事情庶有補益魏主丕嘉納之遣尚書鄧芝字伯苖新野人使吳芝言于丞相亮曰上初即位宜申吳好亮然之即遣芝于吳時吳王猶未與魏絶不時見芝芝請見曰臣今來亦欲為吳非但為蜀也吳王權見之曰孤誠願與蜀和親然恐蜀主幼國小為魏所乘不自全耳芝曰大王命世之英諸葛亮一時之傑蜀有重險吳有三江共為唇齒進可兼并天下退可鼎足而立今若委質于魏魏必望大王入朝求太子內侍若不從命則奉辭伐叛蜀亦順流見可而進如此則江南之地非復大王有也權默然良久曰君言是也遂絶魏專與漢連和明年吳使張溫來聘自是信使不絶時事所冝吳王權常令陸遜語諸葛亮又刻印置遜所每與帝及亮書必以示遜有不安輒改而封之鄧芝復至吳權謂曰若天下太平二主分治不亦樂乎芝對曰天無二日土無二主如并魏之後大王未識天命君各茂其德臣各盡其忠則戰爭方始耳權大笑曰君之誠欵乃當爾耶張溫字惠恕吳人立皇后張氏飛之女帝禪甲辰建興二年魏黃初五年吳黃武三年夏四月魏立太學初平以來學道廢墜至是魏初立太學置博士依漢制設五經課試之法秋八月魏主丕以舟師擊吳臨江而還魏主丕大興軍伐吳辛毗諌曰天下新定土廣民稀而欲用之未見其利今日之計莫若飬民屯田十年然後用之則役不再舉矣丕不從留尚書僕射司馬懿鎮許昌親御龍舟循蔡蔡水即汴渠分流注見前潁注亦見前浮淮如壽春至廣陵吳將軍徐盛列舟艦于江而植木衣葦為疑城假樓自石頭至于江乘聨綿數百里一夕而就見江乘縣名注前時江水盛長丕臨望嘆曰魏雖有武騎千群無所用之未可圖也㑹暴風至龍舟幾覆于是旋師丕問群臣權當自來否劉曄曰彼謂陛下欲以萬乘之重牽已而超越江湖者在于别將必勒兵待事未有進退也既而吳王權果不至冬十一月戊申晦日食乙巳三年魏黃初六年吳黃武四年春三月丞相亮南征討雍闓斬之遂平四郡亮率衆討雍闓問計于參軍馬謖謖曰南中恃其險逺不服久矣今日破之明日復反若殄盡遺類以除後患又非仁者之情也用兵之道攻心為上攻城為下心戰為上兵戰為下願公服其心而已亮納之之馬謖字幼常良弟至南中所在戰捷由越嶲入斬雍闓等孟獲素為夷漢所服收餘衆拒亮亮募生致之既得使觀于營陳間獲曰向者不知虛實故敗今祗如此即易勝耳乃縱使更戰七縱七禽而亮猶遣獲獲止不去曰公天威也南人不復反矣遂入滇池漢益州治今雲南府晋寧州是益州永昌牂牁越嶲四郡皆平亮即其渠率而用之或以諫亮亮曰留外人則當留兵兵留則無所食一不易也夷新傷破父兄死喪留外人而無兵必成禍患二不易也又夷纍有廢殺之罪自嫌釁重留外人終不相信三不易也今吾欲使不留兵不運糧而綱紀粗定夷漢粗安故耳于是悉收其俊傑孟獲等以為官屬出其金銀丹漆耕牛戰馬以給軍國之用終亮之世夷不復反夏六月吳以顧雍為丞相雍為人寡言舉動時當權嘗嘆曰顧公不言言必有中初領尚書令封侯還而家人不知及為相所用文武吏各隨其能心無適莫時訪逮民間及政職所宜輒密以聞用之則歸亍上不用終不宣泄權以此重之權常令中書郎詣雍有所咨訪若事可施行雍即與反覆究論為設酒食如不合意正色不言權曰顧公歡悅是事合宜其不言者孤當重思之江邊諸將各欲立功自效多陳便冝有所掩襲雍曰兵戒小利此等欲邀功名而為其身非為國也不宜聼權從之秋八月魏主丕以舟師自淮擊吳冬十月臨江而還先是魏主丕議伐吳鮑勛字叔業信之子諌曰往年龍舟飄蕩宗廟幾覆今又勞兵襲逺虛耗中國竊以為不可丕怒左遷之至是以舟師自譙循渦入淮蔣濟言水道難通不從十月如廣陵故城在今江南揚州府東北臨江觀兵戎卒十餘萬旌旗數百里有渡江之志吳人嚴兵固守時大寒氷舟不得入江丕見波濤洶湧嘆曰嗟乎固天所以限南北也遂歸吳孫韶字公禮吳人本姓俞氏賜姓為孫等率敢死士于徑路夜要丕獲副車羽蓋丙午四年魏黃初七年吳黃武五年春中都護李嚴移屯江州丞相亮欲出軍漢中李嚴當知後事移屯江州留護軍陳到字叔至汝南人駐永安而統屬于嚴吳令諸將屯田陸遜以所在少榖表請諸將增廣農畝吳王權報曰甚善孤父子親受田車中八牛以為四耦二耜為耦耕田器也雖未及古人亦欲與衆均勞耳魏殺其執法鮑勛免將軍曹洪官魏主丕之為太子也郭夫人弟有罪魏郡都尉胡三省注建安中魏武分魏郡置東西部都尉謂之三魏鮑勛治之請不能得及即位勛數直諌丕益忿之及伐吳還屯陳留界勛為治書執法大守孫雍過勛時營壘未成但立標埒雍行不從正道營令吏欲推之勛解止不舉以塹壘未成為解止而不舉也丕聞之詔曰勛指鹿作馬收付廷尉法議謂引法而議正刑五歲正結正也五歲髠鉗刑三官廷尉正監平也依律罰金丕大怒曰勛無活分而汝等欲縱之收三官已下付刺姦後漢書百官志將軍屬有刺姦掾主罪法當令十鼠同穴華歆陳群辛毗髙柔並奏勛父信有功于太祖求免勛罪丕不許柔固執不奉詔丕怒甚召柔詣臺遣使誅勛然後遣柔還寺驃騎將軍曹洪富而吝丕在東宫嘗從貸絹不稱意至是以舍客犯法下獄當死群臣救不能得卞太后責丕曰梁沛之間非子亷無今日又謂郭后后于黃初三年由貴嬪立后曰洪今日死吾明日敕帝廢汝于是郭后泣請乃得免官削土爵夏五月魏主丕卒太子睿字元仲立是為魏明帝初郭后無子魏主丕使母飬平原王睿睿母被誅睿母甄夫人本袁熙妻文帝納之後以失寵出怨言賜死故未建為嗣睿事后甚謹后亦愛之丕嘗與睿獵見子母鹿既射其母命睿射其子睿泣曰陛下已殺其母臣不忍復殺其子丕釋弓矢為之惻然及是丕疾篤立為太子召中軍大將軍曹真鎮軍陳群撫軍司馬懿並受遺詔輔政而卒太子睿即位尊皇太后曰太皇太后皇后曰皇太后追諡甄夫人曰文昭皇后葬文帝于首陽陵在今河南府偃師縣西北首陽山南秋八月吳王權圍魏江夏不克吳王權聞魏喪自將攻江夏太守文聘字仲業南陽宛人堅守魏朝議欲發兵救之魏主睿曰權習水戰今敢陸攻者冀掩不備也已與聘相拒攻守勢倍終不敢久未幾果退是月吳將軍諸葛瑾攻魏襄陽魏司馬懿擊破之魏徴處士管寧不至寧在遼東三十五年魏主丕徴之乃浮海西歸以為大中大夫不受至是華歆為太尉讓位于寧不許徴為光祿大夫敕青州給安車吏從以禮發遣寧復不至丁未五年魏明帝曹睿太和元年吳黃武六年春三月丞相亮率諸軍出屯漢中以圖中原亮率諸軍北駐漢中使長史張裔字君嗣成都人參軍蔣琬字公琰零陵湘隂人統留府事臨發上疏曰先帝創業未半而中道崩殂今天下三分益州疲敝此誠危急存亡之秋也然侍衛之臣不懈于內忠志之士忘身于外者蓋追先帝之殊遇欲報之于陛下也誠冝開張聖聼以光先帝遺德恢宏志士之氣不宜妄自菲薄引喻失義以塞忠諌之路也宫中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之理不宜偏私使內外異法也侍中侍郎郭攸之費禕董允等此皆良實志慮忠純是以先帝簡拔以遺陛下愚以為宫中之事事無大小悉以咨之然後施行必能禆補闕漏有所廣益將軍向寵性行淑均曉暢軍事試用于昔日先帝稱之曰能是以衆議舉寵為督愚以為營中之事悉以咨之必能使行陳和睦優劣得所親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頺也先帝在時每與臣論此事未嘗不嘆惜痛恨于桓靈也侍中尚書長史參軍此悉端良死莭之臣願陛下親之信之則漢室之隆可計日而待也臣本布衣躬耕南陽苟全性命亍亂世不求聞逹于諸侯先帝不以臣卑鄙猥自枉屈三顧臣于草廬之中咨臣以當世之事由是感激遂許先帝以馳驅後值傾覆受任于敗軍之際奉命于危難之間爾來二十有一年矣先帝知臣謹慎故臨崩寄臣以大事也受命以來夙夜憂懼恐付託不效以傷先帝之明故五月渡瀘深入不毛今南方已定兵甲已足當奬率三軍北定中原庶竭駑鈍攘除姦凶興復漢室還于舊都此臣所以報先帝而忠陛下之職分也至于斟酌損益進盡忠言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈責攸之禕允等之慢以彰其咎陛下亦冝自謀以咨諏善道察納雅言深追先帝遺詔臣不勝受恩感激今當逺離臨表涕零不知所言遂行郭攸之南陽人費禕字文偉江夏鄳人董允字休昭和之子向寵襄陽宜城人向朗兄子瀘水即古若水注見前亮屯于沔北陽平石馬水經注沔水徑白馬戍南謂之白馬城一名陽平關東有武侯壘據此石馬即白馬也注見前陽平魏主睿聞之欲太發兵迎擊以問孫資字彥龍太原人資曰昔武皇取張魯危而後濟數言南鄭直為天獄中斜谷道為五百里石穴今若進軍道既險阻且必當更有所興發天下騷動此宜深慮不若但以見兵分命大將據諸險要亦足以震懾彊寇鎮靜疆場乃止夏四月魏復行五銖錢自董卓壞五銖錢至魏文帝始復之既而以榖貴罷錢而用榖帛人多巧僞競以濕榖薄絹為市嚴刑不能禁亍是復行五銖錢戊申六年魏太和二年吳黃武七年春丞相亮伐魏戰于街亭即街泉亭本漢縣後漢省在今甘肅秦州秦安縣東北通典街泉亭馬謖敗處敗績詔貶亮右將軍行丞相事初魏以夏侯楙字子林惇中子之考通鑑以楙為淵之子綱目因今依魏志改注都督關中至是丞相亮將伐魏司馬魏延字文長義陽人曰楙主壻也楙尚太祖女清河公主怯而無謀今假延精兵五千負糧五千直從褒中注見前出循秦嶺在西安府藍田縣南東起商洛西盡汧隴而東當子午谷谷名路通南北北口曰子在西安府城南南口曰午在漢中府洋縣東北而北不過十日可到長安楙聞延奄至必棄城走比東方合聚尚二十許日而公從斜谷注見前來亦足以逹如此則一舉而咸陽已西可定矣亮以此為危計不用掦聲出斜谷取郿使將軍趙雲鄧芝為疑軍據箕谷箕山之谷在今漢中府褒城縣北魏使曹真督諸軍軍郿以拒之亮乃率大軍攻祁山戎陳整齊號令明肅始魏以昭烈既崩數歲寂然無聞是以略無豫備而卒聞亮出朝野恐懼亍是天水南安後漢靈帝時置郡治䝠道故城在今鞏昌府隴西縣安定皆舉軍應亮關中響震魏主睿如長安右將軍張郃率步騎五萬拒亮亮使參軍馬謖督諸軍與郃戰于街亭謖違亮節度舍水上山郃絶其汲道擊大破之亮乃拔西縣此漢西縣故城在今秦州漢中府沔縣亦有西縣故城乃隋所置千餘家還漢中初亮以謖才術過人深加器異昭烈帝臨終謂曰謖言過其實不可大用君其察之亮未以為然引謖參軍事每與談論自晝逹夜至是乃收殺之而自臨祭為之流涕撫其遺孤謖之未敗也禆將軍王平連規諌謖謖不能用及敗衆散惟平所領千餘人鳴鼓自守張郃疑其有伏不敢逼于是平徐徐收合諸營散兵以還亮拜平參軍進位封侯王平字子均巴西宕渠人亮上疏請自貶三等詔以右將軍行丞相事趙雲亦以箕谷兵敗坐貶亮于是考微勞甄壯烈引咎責躬布所失于境內厲兵講武以為後圗戎士簡練民忘其敗矣先是亮出祁山天水參軍姜維字伯約冀人詣亮降亮美其膽智使典軍事吳人誘魏掦州牧曹休戰于石亭在今江南安慶府潛山縣東北大敗之吳使鄱陽太守周魴字子魚吳郡陽羡人詐以郡降于魏魏掦州牧曹休率步騎十萬向皖以應之魏主睿又使司馬懿向江陵賈逵向東關在廬州府巢縣東南三道俱進八月吳主權至皖以陸遜為大都督假黃鉞以朱桓全琮字子璜錢唐人為左右督各督三萬人以擊休桓曰休以親見任非智勇名將今戰必敗敗必走走必由夾石挂車此兩道險厄若以萬兵柴路則彼衆可盡而休可虜臣請將所部以斷之若得休則可乘勝長驅進取夀春以窺許洛此萬世一時也權以問陸遜遜以為不可乃止城夾石即今北峽山在安慶府桐縣北挂車山名在桐城縣西戰于石亭遜令桓琮為左右翼衝休伏兵因驅走之追至夾石斬獲萬餘資伏略盡初睿命賈逵引兵東與休合逵曰賊無東關之備必并軍于皖而休深入與戰必敗乃亟進聞休已敗而吳遣兵斷夾石逵兼道進軍多設旗鼓疑兵吳人驚退休乃得還冬十二月右將軍亮伐魏圍陳倉不克而還斬其追將王雙右將軍亮聞曹休敗魏兵東下關中虛弱欲出兵擊魏群臣多以為疑亮乃上言于帝略曰先帝以漢賊不兩立王業不偏安故託臣以討賊以先帝之明量臣之才固知臣伐賊才弱敵彊也然不伐賊王業亦亡惟坐而待亡孰與伐之是故託臣而弗疑也臣受命之日寢不安席食不甘味思惟北征宜先入南故五月渡瀘深入不毛臣非不自惜也顧王業不可偏安于蜀都故胃危難以奉先帝之遺意也而議者謂為非計今賊適疲亍西又務亍東兵法乘勞此進趨之時也且髙帝明並日月謀臣淵深然涉險被創危然後安今陛下未及髙帝謀臣不如良平而欲以長計取勝坐定天下此臣之未解一也劉繇王朗各據州郡論安言計動引聖人羣疑滿腹衆難塞胸今歲不戰明年不征使孫策坐大遂并江東此臣之未解二也臣到漢中中間期年已喪趙雲等及曲長屯將七十餘人突將武騎一千餘人皆數十年所計合四方之精鋭非一州之所有若復數年則損三分之二當何以圗敵此臣之未解三也今民窮兵疲而事不可息事不可息則住與行勞費正等而不及虛圗之欲以一州之地與賊支久此臣之未解四也夫難平者事也昔先帝兵敗于楚曹操拊手謂天下已定然先帝東連吳越西取巴蜀舉兵北征夏侯授首此操之失計而漢事將成也其後吳更違盟關羽毁敗秭歸蹉跌曹丕稱帝凡事如是難可逆見臣鞠躬盡力死而後已至于成敗利鈍非臣之明所能逆覩也刪按後出師表蜀志不載通鑑採裴注補録綱目稍莭之今依綱目十二月引兵數萬出散關在今陜西鳯翔府寶雞縣西南圍陳倉不克初曹真以亮懲于祁山後必出從陳倉乃使將軍郝昭守其城及是亮進攻之起雲梯衝車臨城昭以火箭逆射其梯人多燒死昭又以繩連石磨壓其衝車衝車折亮乃更為井闌百尺以射城中以土丸填塹欲直攀城昭又于內築重墻亮又為地突欲踊出于城襄昭又于城內穿地橫截之盡夜相攻拒二十餘日太郝昭字伯道原人會亮糧盡引去魏將軍王雙追亮亮擊斬之吳大司馬呂範卒初孫䇿使範典財計時吳王權年少私從有求範必權白不敢專許及權守陽羡漢縣今江南常州府宜興縣是長有所私用䇿或料覆功曹周谷輒為傅著簿書使無譴問權以是望範而悅谷及後統事以範忠誠信任之而谷能欺更簿書不用也至是以範為大司馬印綬未下而卒己酉七年魏太和三年吳黃龍元年春右將軍亮伐魏拔武都注見前隂平漢縣魏置郡今階州文縣是復拜丞相夏四月吳王孫權稱帝吳王權即皇帝位大赦改元百官畢㑹權歸功亍周瑜將軍張昭舉笏欲褒贊功德未及言權曰如張公計今已乞食矣昭大慙汗權追尊父堅為武烈皇帝兄䇿為長沙桓王立子登為太子以諸葛恪為太子左輔張休為右弼顧談為輔正陳表為翼正謝景范慎羊衟等為賔客于是東官號多士太子使侍中胡綜作賔友目曰英才卓越則諸葛恪精識時機則顧談凝辨宏逹則謝景究學甄微則范慎羊衟私駮之曰元遜才而踈子默精而狠叔發辨而浮孝敬深而狹恪等惡之其後皆敗如衟所言謝景字叔發南陽人范慎字孝敬廣陵人羊衟南陽人衟古道字胡綜字偉則汝南固始人餘見前于是權使以並尊二帝來告衆皆以為交之無益而名體弗順宜顯明正義絶其盟好丞相亮曰權有僭逆之心久矣國家所以略其釁情者求犄角之援也今若加顯絶讎我必深更當移兵東戍與之角力彼賢才尚多將相輯睦未可一朝定也頓兵相守坐而須老使北賊得計非算之上者乃遣衛尉陳震字孝起南陽人賀吳權與盟約中分天下秋七月魏制後嗣有由諸侯入奉大統者不得顧私親詔曰禮王后無嗣擇建支子以繼大宗則當纂正統而奉公義何得復顧私親哉其令公卿有司深以前世行事為戒後嗣萬一有由諸侯入奉大統則當明為人後之義敢為佞邪導諛時君建非正之號以干正統謂考為皇稱姬為后則股肱大臣誅之無赦其書之金䇿藏之宗廟著于令典九月吳遷都建業使上大將軍吳亍大將軍之上復置上大將軍陸遜輔太子登守武昌吳主權遷都建業皆因故府不復增改使上大將軍陸遜輔太子登及尚書九官九卿也留武昌南陽劉廙常著先刑後禮論大子賔客謝景稱之于遜遜呵景曰禮之長于刑久矣君侍東宮宜遵仁義以彰德音若彼之談不須講也太子與西陵都督步隲書求見啓誨隲上疏曰人君不親小事使百官有司各任其職故舜命九賢則無所用心不下廟堂而天下治賢人所在折衝萬里信國家之利器崇替之所由也願重以經意則天下幸甚安劉廙字恭嗣南陽衆人冬十月魏立聼訟觀置律博士魏主睿常言獄者天下之命因改平望觀水經注平望觀在華林園東南為聼訟觀每斷大獄詣觀臨聼之初魏文侯師李悝著法經六篇蕭何定漢律益為九篇後稍增至六十篇又有令三百餘篇决事比九百六卷馬鄭諸儒章句又十餘家至是所當用二萬六千餘條七百七十餘萬言乃詔但用鄭氏章句李悝法經胡三省曰漢志法家者流李子三十二篇今言法經六篇蓋其書有經有解也九百六卷程大昌曰古書皆卷至唐始為葉子今書冊也馬鄭謂馬融鄭康成尚書衛覬奏刑法者國家之所貴重而私議者之所輕賤獄吏者百官之所縣命而選用者之所卑下王政之敝未必不由此也請置律博士從之又詔司空陳羣等刪約漢法制新律十八篇州郡令四十五篇尚書官令軍中令百八十餘篇於正律九篇為增於旁章科令為省矣庚戌八年魏太和四年吳黃龍二年春二月魏立郎吏課試法尚書諸葛誕字公休琅邪陽都人等以罪免魏尚書諸葛誕中書郎胡三省注即通事郎魏置中書監令又置通事郎及晋改曰中書侍郎鄧揚字元茂南陽人等結為黨友更相題表以夏侯元字太初尚之子等為四聰誕輩為八逹中書監劉放字子棄涿郡人子熙中書令孫資子密吏部尚書亦魏置衛臻字公振陳留襄邑人子烈以父居勢位容之為三豫容三人得豫于品題之中也行司徒事董昭上疏言之疏曰竊見當今年少不以學問為本專以交遊為業國士不以孝悌清修為首乃以趨勢游利為先合黨連群互相褒歎以毁訾為罰戮用黨譽為爵賞附己者則歎之盈言不附者則作為瑕釁至乃往來禁奧交通探問凡此諸事皆法之所不取刑之所不赦也魏主睿善其言詔郎吏學通一經才任牧民博士課試擢其髙第者亟用其浮華不務道本者罷退之仍免誕揚等官秋七月魏寇漢中丞相亮出次成固漢縣今曰成固屬漢中府九月魏師還魏曹真以漢人數出請由斜谷伐之魏主睿詔司馬懿泝漢水由西城漢縣後漢末為郡今陜西興安州治是與真㑹漢中諸將或欲由子午谷或欲由武威胡三省曰當作武都陳羣以斜谷阻險轉運恐見鈔截留兵則損戰士不可睿從羣議真復表從子午道遂行丞相亮聞魏兵至次于成固赤坂在今漢中府洋縣龍亭山東以待之召李嚴使將二萬人赴漢中表嚴子豐為江州都督典嚴後事㑹天大雨三十餘日棧道斷絶于是魏華歆楊阜王肅字子雍朗之子等皆以為言睿乃詔真等班師是歲亮遣魏延西入羌中與魏雍州刺史郭淮戰于陽溪大破之郭淮字伯濟太原人辛亥九年魏太和五年吳黃龍三年春二月丞相亮伐魏圍祁山先是亮以蔣琬為長史亮數外出琬常足食足兵以相供給亮每言公琰託志忠雅當與吾共贊王業者也自十月不雨至于三月夏五月亮敗魏司馬懿于鹵城注見前殺其將張郃魏遣司馬懿屯長安督將軍張郃郭淮等禦漢亮分兵攻祁山自逆懿于上邽魏將郭淮等徼亮亮破之因大芟其麥與懿遇于上邽之東懿斂軍依險兵不得交亮引還懿躡其後至于鹵城又登山掘營不肯戰賈詡魏平數請戰曰公畏蜀如虎奈天下笑何懿病之乃使張郃攻南圍漢圍祁山之南也自接中道向亮亮使魏延等逆戰魏兵大敗懿還保營亮以糧盡退軍懿遣郃追之至木門與亮戰漢兵乘髙發伏弩郃中飛矢卒亮之攻祁山也命李嚴以中都護署府事更名平㑹天霖雨平主督運恐糧不繼遣參軍諭指呼亮來還亮既退軍平乃更言軍糧饒足何為而退欲殺督運以解不辦之責義表言軍僞退以誘賊亮出其前後手書本末違錯平辭窮謝罪亍是亮表其前後過惡免官削爵土徙梓潼郡又與蔣琬董允書曰孝起前為吾說正方腹中有鱗甲吾謂鱗甲者但不當犯之耳不圗復有蘇張之事也梓潼漢縣後漢末置郡于此今為縣屬四川綿州孝起陳震字秋八月魏令其宗室王侯朝明年正月魏黃初以來諸侯王法禁嚴切吏察之急親姻皆不敢相問東阿王上疏曰陛下惠洽椒房思昭九族羣臣百寮番休遞上親理之路通慶弔之情展誠可謂恕己治人推思施惠者矣至于臣者人道絶緒禁錮明時婚媾不通兄弟乖隔又以一切之制永無朝覲之望至于注心皇極結情紫闥神明知之矣願陛下沛然垂詔使諸國變問四節得展妃妾之家膏沐之遺歲得再通則聖世無不蒙施之物矣魏主睿報曰諸國本無禁錮之詔矯枉過正下吏懼譴以至于此耳已敕有司如王所訴植復上疏曰天下傾耳注目者當權者是也權之所在雖疏必重勢之所去雖親必輕故取齊者田族非吕宗也分晋者趙魏非姬姓也吉專其位凶離其患者異姓之臣也存共其榮殁同其禍者公族之臣也今公族疏而異姓親臣竊惑焉睿優文答報而已至是魏主睿詔曰先帝著令不欲使諸王留京都者謂幼主在位母后攝政防微漸關盛衰也朕不見諸王十有二載其令諸王及宗室公侯各將適子一人朝明年正月後有少主母后在宮者自如先帝令冬十月吳人誘敗魏兵于阜陵漢縣晋後廢故城在今江南滁州全椒縣吳主權遣中郎將孫布詐降于魏以誘揚州刺史王凌字彥雲太原祁人伏兵阜陵以俟之凌謄布書請兵迎之征東將軍滿寵以為必詐不與兵㑹寵被書入朝敕留府長史若凌欲往迎勿與兵也凌于後索兵不得乃單遣一督將步騎七百人往迎之布夜掩擊死傷過半先是凌表寵年過耽酒不可居方任故魏主睿召之既至氣體康彊乃慰勞遣還十一月戊戌晦日食壬子十年魏大和六年吳嘉禾元年春三月魏主睿東巡魏主睿幼女淑卒睿痛之甚追諡立廟葬于南陵取甄后從孫黃與之合葬追封黃為列侯為之置侯襲爵欲自送葬又欲幸許司空陳羣少府楊阜等皆諌羣曰八歲下殤禮所不備况未期月而為制服舉朝素服朝夕哭臨自古以來未有此比且又欲自往視陵親臨祖載乎願陛下插割有損無益之事又聞車駕欲幸許昌將以避凶夫吉凶有命禍福由人移徙求安其亦奚益哉阜曰文皇帝武宣皇后崩陛下皆不送葬所以重社稷備不虞也何至孩抱赤子而送葬邪不聼吳遣使如遼東徙其騎都尉虞翻于蒼梧注見前初公孫康卒子晃淵皆幼衆立其弟恭久之恭病淵遂脅奪其位魏拜為揚烈將軍遼東太守淵隂懷疑二南與吳通至是吳王權遣周賀等乘海之遼東從淵求馬時虞翻徙在交州先是翻性疏直數有酒失又好抵忤人多見謗毁吳主權嘗與張昭論神仙翻指昭曰彼皆死人而語神仙世豈有仙人也權積怒非一遂徙翻交州周賀等行翻聞之以為去人財以求馬既非國利而遼東絶逺往恐無獲欲諌不敢作表以示呂岱字定公廣陵人為人所白復徙蒼梧猛陵漢縣吳因之故城今在廣西梧州府蒼梧縣考吳交州治南海郡翻由南海而徙蒼梧皆交州地也是秋魏將田豫由海道伐遼東不克㑹賀等還豫以兵西擊于成山在今山東登州府文登縣南海濵斬之權始思翻言召之已卒以其喪還魏以劉煜為大鴻臚魏侍中劉煜為魏主睿所親重煜有膽智善應變睿將伐蜀朝臣皆諌煜入贊議則曰可伐出與朝臣言則曰不可中領軍楊暨嘗勸伐蜀睿曰卿書生焉知兵事暨謝曰臣言誠不足采劉煜先帝謀臣蓋亦云然睿曰煜與吾言可矣暨曰請召質之乃召煜至問之終不答後因獨見責睿曰夫兵詭道也未發不厭其密陛下顯然露之臣恐敵國已聞之矣睿謝之煜出責暨曰夫釣者中大魚則縱而隨之須可制而後牽則無不得也人主之威豈徒大魚而已哉子誠直言然計不足采不可不精思也暨亦謝之或謂睿曰煜不盡忠善伺上意所趨而合之陛下試反意而問之與所問反者是常與聖意合也每問皆同者其情必無所逃矣睿驗之果得其情從此疏焉出為大鴻臚以憂死癸丑十一年魏青龍元年吳嘉禾二年春正月青龍見魏摩陂注見前井中二月魏主睿往觀之改年曰青龍以摩陂為龍陂吳遣使拜公孫淵為燕王淵斬吳使者獻首于魏魏封淵為樂浪公公孫淵遣校尉宿舒宿本風姓以國為氏等奉表稱臣于吳吳主權大悅遣太常張彌執金吾許晏等將兵萬人金寶珍貨九錫備物乘海授淵封為燕王舉朝皆諌以為淵未可信但可遣兵吏護送其使而已權不聼吳使至遼東淵知吳逺難恃乃斬張彌等首傳送于魏魏拜淵大司馬封樂浪公吳主權聞之大怒將自征淵陸遜薛綜字敬文沛郡人等上疏切諌權乃止初彌等至襄平淵欲圗之乃先分散其人衆以中使秦旦張群杜德黃彊等六十人置元菟旦等議曰吾觀此郡形勢甚弱若焚其城郭殺其長吏為國報耻然後伏死足以無恨孰與偷生苟活長為囚虜乎于是隂相結約未發為人所告旦等皆走時羣病疽創著䣛不能前乃推旦彊使前德留守羣採菜果食之旦彊行數日得逹句驪因宣權詔于其王位宮位宫即使人迎羣德並遣還吳奉表稱臣旦等至吳皆拜校尉句驪即髙句驪位宫漢髙句驪王宫之曽孫胡三省曰句驪呼相似為位以其似祖故名位宫夏閏五月庚辰朔日食吳主權自將攻魏新城合肥新城也不克先是魏蒲寵以合肥城南臨江湖北逺夀春請于其西三十里依險立城徙見兵固守魏主睿從之至是吳主權出兵欲圍新城以其逺水積二十餘日不敢下船滿寵謂諸將曰孫權得吾新城必于衆中有自大之言今來雖不敢至必當上岸耀兵以示有餘乃潜遣步騎六千伏肥水隱處權果上岸伏軍卒起擊之斬首數百或有赴水死者以馬忠字德信閬中人為庲降都督水經注寧州建寧郡故庲降都督屯建寧郡今雲南曲靖府是庲降都督張翼字伯恭犍為武陽人用法嚴峻夷帥劉胄叛丞相亮以參軍馬忠代翼召翼令還或謂翼宜速即罪翼曰吾臨戰場代人未至當運糧積榖為滅賊之資豈可以黜退之故而廢公家之事乎于是統攝不懈代到乃發忠因其資破胄斬之忠寬濟有度處事能斷恩威並立民夷畏而愛之甲寅十二年魏青龍二年吳嘉禾三年春二月丞相亮伐魏初丞相亮勸農講武作木牛流馬其法皆用木為之以機行止詳見諸葛氏集杜佑通典載之今不具録運米積斜谷口治邸閣息民休士三年而後用之至是悉衆十萬由斜谷伐魏遣使約吳同時大舉三月魏山陽公卒魏主素服發哀諡曰漢孝獻皇帝山陽公傳國至晋永嘉中為胡寇所滅夏四月魏大疫丞相亮進軍渭南魏大將軍司馬懿引兵拒守亮始分兵屯田丞相亮至郿軍于渭水之南司馬懿引軍渡渭背水為壘以拒之謂諸將曰亮若出武功漢縣後漢移于斄故城在今縣西南今縣北周時置依山而東誠為可憂若西上五丈原今在鳯翔府郿縣西南諸將無事矣亮果屯五丈原郭淮曰亮若跨渭登原連兵北山隔絶隴道搖蕩民夷非國之利也懿乃使淮先據北原塹壘未成漢兵大至淮逆擊却之亮以前者數出皆以運糧不繼使己志不伸乃分兵屯田為久駐之基耕者雜于渭濵居民之間而百姓安堵軍無私焉五月吳主權擊魏秋七月魏主睿自將擊郤之吳主權入居巢湖口湖一名焦湖本巢縣地後陷為湖周四百里跨合肥廬江舒城巢四縣界有東口在巢縣西南水由此入江向合肥新城衆號十萬又遣陸遜諸葛瑾入江夏沔口向襄陽孫韶張承字仲嗣昭長子入淮向廣陵淮隂魏滿寵欲拔新城守致賊夀春魏主睿不聼曰縱權攻新城必不能拔敕諸將堅守吾將自往攻之時漢軍方出武功吳人謂魏主必不能逺出睿乃使秦朗字元明新興人督步騎二萬助司馬懿拒漢自率水軍御龍舟而東滿寵募壯士焚吳攻具吳吏士多病又聞睿至遂退陸遜遣人奉表于權為魏邏者所得諸葛瑾聞之甚懼與遜書令速去遜未答方催人種葑豆與諸將奕棊射戲如常瑾來見遜遜曰今兵將意動且當自定以安之施設變術然後出耳若便遽退賊謂吾怖而來相蹙必敗之勢也乃密與瑾立計令瑾督舟船遜悉上兵馬以向襄陽城魏人素憚遜名遽還赴城瑾便引船出遜徐整步伍張拓聲勢步趨船魏人不敢逼行到白圍托言往獵遣周峻等擊江夏新市安陸石陽斬獲千餘人而還白圍胡三省注立圍屯于白河口故名白河即淯水源出河南嵩縣流徑南陽至湖北襄陽縣入漢石陽城名在今湖北漢陽府黃陂縣八月魏葬孝獻皇帝于禪陵在今河南懷慶府修武縣北丞相武鄉候諸葛亮卒于軍長史楊儀字威公襄陽人引軍還前軍師魏延作亂儀擊斬之亮數挑戰懿不出乃遺以巾幗婦人之服懿怒上表請戰魏主睿使衛尉辛毗杖節為軍師以制之姜維謂亮曰賊不復出矣亮曰彼本無戰情所以固請者以示武于衆耳將在軍君命有所不受苟能制吾豈千里而請戰邪亮遣使者至懿軍懿問其寢食及事之繁簡而不及戎事使者曰諸葛公夙興夜寐罰二十以上皆親覽焉所敢食不至數升懿告人曰孔明食少事繁其能久乎亮病篤帝使僕射李福字孫德梓潼涪人省視因咨大計與亮語已别去數日復還亮曰孤知君還意公所問者公琰其宜也福謝前實失不咨請公百年後誰可任大事者故輒還耳又請其次亮曰文偉可又問亮不答八月薨長史楊儀整軍而出百姓奔告懿懿追之姜維令儀返旗鳴鼓若將向懿者懿不敢逼于是儀結陳而去入谷然後發喪百姓為之諺曰死諸葛走生仲逹懿聞之笑曰吾能料生不能料死故也亮嘗推演兵法作八陳圗在漢中府沔縣定軍山下其陳聚細石為之各六十四聚别有二十四聚作兩層每層各十二聚至今尚存又四川成都府新都縣北䕫州府奉節縣南亦皆有八陳圗遺跡至是懿案行其營壘歎曰天下竒才也追至赤岸即赤崖在漢中府褒城縣北不及而還初前軍師魏延勇猛過人善飬士卒每欲請兵萬人與亮異道㑹于潼關如韓信故事亮不許延常謂亮怯不能盡用己才楊儀為人幹敏亮每出軍儀規畫分部籌度糧榖咸取辦焉延性矜髙當時皆下之惟儀不假借延以為至忿亮深惜二人之才不忍偏廢也反亮病篤作退軍莭度令延斷後姜維次之延或不從軍即自發亮薨儀令費禕往揣延意延曰丞相雖亡吾自見在府親官屬便可將喪還葬吾自當率諸軍擊賊云何以一人死廢天下之事邪且魏延何人當為楊儀作斷後將乎儀等乃案亮成規引還延果大怒攙初銜反自後爭前也儀未發率所領先歸燒絶閣道延儀各相表叛逆一日之中羽檄交至帝以問董允蔣琬咸保儀而疑延儀等槎山通道晝夜兼行亦繼延後延據南谷口逆擊儀等將軍何平胡三省注即王平本養外家何姓後復姓王此從其初姓亍前禦延叱先登曰公亡身尚未寒汝輩何敢乃爾士卒知曲在延皆散延逃奔漢中儀遣將斬之夷三族始延欲殺儀等冀時論以己代諸葛輔政故不北降魏而南擊儀實無反意也諸軍還成都䇿贈亮印綬諡曰忠武初亮表于帝曰臣成都有桑八百株薄田十五頃子弟衣食自有餘饒不别治生以長尺寸臣死之日不使內有餘帛外有餘財以負陛下卒如其所言長水校尉廖立自謂才名宜為亮副怏怏怨謗亮廢立為民徙之汶山及亮薨立垂泣曰吾終為左袵矣李平聞之亦發病死平常兾復收已得自補復䇿後人不能故也廖氏廖叔安之後以國為氏立字公淵武陵臨沅人汶山注見前史臣曰亮為相國撫百姓示儀軌約官職從權制開誠心布公道盡忠益時者雖讎必賞犯法怠慢者雖親必罰服罪輸情者雖重必釋游辭巧飾者雖輕必戮善無微而不賞惡無纎而不貶庶事精練物理其本循名責實虛僞不齒終于邦域之內畏而愛之刑政雖峻而無怨者以其用心平而勸戒明也可謂識治之良才管蕭之亞匹矣以吳懿為車騎將軍督漢中蔣琬為尚書令總統國事時新喪元帥逺近危悚琬拔處羣僚之右既無戚容又無喜色神守舉止有如平日由是衆望漸服吳人聞諸葛亮卒恐魏乘衰取蜀增巴邱守兵萬人一欲以為救援二欲以事分割漢人聞之亦增兵永安以備非常帝遣中郎將宗預字德艷南陽安衆人使吳吳主權問之對曰東益巴邱之戍西增白帝之守皆事勢宜然俱不足以相問也權嘉其抗直禮之亞于鄧芝冬十一月魏洛陽地震乙卯十三年魏青龍三年吳嘉禾四年春正月中軍師楊儀有罪廢徙漢嘉本漢青衣縣後漢改曰漢嘉蜀漢置郡晋廢故城在今四川雅州府雅安縣自殺楊儀既殺魏延自以為宜代諸葛亮秉政而亮平生密指謂亮平常密語諸僚佐以儀狷狹意在蔣琬儀至成都拜中軍師無所統領儀自以年宦先琬才能踰之由是怨憤形于言色後軍師費禕省之儀語曰往者丞相初亡吾若舉軍就魏處世寧當落度徒落反言失意也如此邪令人追悔不可復及禕密表其言詔廢儀為民徙漢嘉郡儀至徙所復上書誹謗下郡收之自殺夏四月以蔣琬為大將軍費禕為尚書令時軍國多事禕省讀書記舉目暫視已窺其意指其速數倍于人終亦不忘魏治洛陽宫魏主睿既作許昌宫宫有景福殿在今河南許州東北又治洛陽宫起昭陽太極殿在洛陽故南宫即漢崇德殿之地築總章觀髙十餘丈在太極殿前又欲平北芒注見前作臺觀以望孟津衛尉辛毗諌曰天地之性髙高下下今欲反之既非其理且若河水為害邱陵既夷將何以禦之睿乃止中書郎王基上疏曰古人以水喻民曰水所以載舟亦所以覆舟顔淵曰東野子之御馬力盡矣而求進不已殆將敗矣願陛下深察東野之敝留意舟水之喻見王基字伯輿山東萊人水以載舟東野子御俱家語及苟子是秋洛陽承華殿災睿問太史令髙堂隆風俗通齊卿髙恭仲食采亍髙堂後以為氏隆字升平秦山人曰漢柏梁災而大起宫殿以厭之事見前其義云何對曰此越巫所為非聖賢之訓也睿不納復營之更名九龍通引榖水過殿前為玉井綺欄蟾蜍含受神龍吐出使博士扶風馬鈞作司南車水轉百戲榖水注見前司南車即指南車陵霄闕始搆有鵲巢其上睿復以問隆對曰詩曰惟鵲有巢惟鳩居之今始搆闕而鵲巢之天意若曰宫室未成將有他姓制御之耳夫天道無親常與善人此不可不深防而審慮也睿為之動容睿耽于內寵婦官秩石擬百官之數自貴人以下至掖庭灑掃凡數千人選女子知書者六人為女尚書使典省外奏事廷尉髙柔諌曰周禮天子后妃以下百二十人既已盛矣竊聞後庭之數今復過之聖嗣不昌殆或由此臣愚以為可妙簡淑媛以備內官之數其餘盡遣還家且以育精飬神專靜為寶則螽斯之徴可庶而致矣睿報之曰輒克昌言他復以聞睿常著褐被縹綾半袖少府楊阜問曰此于禮何法服也睿默然自是不法服不見阜阜又上疏欲省宫人召御府吏問其數吏對曰密禁不得宣露阜怒杖而數之曰國家不與九卿為密反與小吏為密乎睿間而愈嚴憚之夷輒克昌言謂以昌言自克也說文曰小兒反蠻頭衣半袖即半臂也御府官名典宮婢少府屬秋八月魏立子芳字蘭卿為齊王詢為秦王魏主睿無子飬二王為己子宫省事祕莫有知其所由來者或曰芳任城王楷之子也楷王彰子魏張掖涌石負圖張掖桞谷口水溢漢晋春秋氐池縣大桞谷口夜激波湧溢氐池漢縣故城在今甘州府山丹縣涌石負圗狀象靈龜立于川西有石馬七及鳯凰麒麟白虎犧牛璜玦八卦列宿孛彗之象又有文曰大討曹魏主睿下詔班示以為嘉瑞任漢縣今屬直𨽻順德府令于綽以問巨鹿張臻字子明巨鹿人徙居任臻曰神以知來不追既往祥兆先見而後廢興從之今漢久亡魏已得之何所追興祥兆乎此石當今之變異將來之符瑞也胡三省曰後人以此為晋繼魏之徵丙辰十四年魏青龍四年吳嘉禾五年夏四月帝如湔胡三省曰即漢湔氐道明史地里志四川茂州有湔氐故縣觀汶水晉書音義汶讀與岫同元和志大江一名汶江江至彭州導江縣有天彭門兩山相對如闕蜀後主登觀坂看汶水之流即此導江唐縣故城在成都府灌縣觀坂之觀音夫聲旬日而還冬十月有星孛亍大辰注見前又孛于東方魏司空陳羣卒羣前後數上封事輒削其草雖子弟莫知也或議其居位拱默及正始中詔撰名臣奏議朝士乃見羣諌事皆歎息焉魏令公卿舉才德兼備之士時司馬懿以兗州刺史王昶字文舒太原晋陽人應選昶為人謹厚名其兄子曰默字處靜曰沈字處道子曰渾字元冲曰深字道冲皆依謙實以見其意為書戒之曰吾以四者為名願爾曹顧名思義不敢違也夫物速成則疾亡晚就則善終朝華之草夕而零落松柏之茂隆冬不衰是以君子戒于闕黨也夫能屈以為伸讓以為德弱以為彊鮮不遂矣毁譽者愛惡之源而禍福之機也人或毁己當退而求之于身若己有可毁則彼言當矣無可毁則彼言妄矣當則無怨于彼妄則無害于身又何報焉諺曰救寒莫如重裘止謗莫如自修斯言善矣丁巳十五年魏景初元年吳嘉禾六年春正月魏黃龍見以三月為夏四月髙堂隆以魏得土德故其瑞黃龍見宜改正朔易服色以變民耳目魏主睿從之遂以建丑之月為正服色尚黃牲用白夏六月魏地震魏以陳矯為司徒矯初為尚書令魏主睿常卒至尚書門矯跪問曰陛下欲何之曰欲案行文書耳矯曰此自臣職分非陛下所宜臨也若臣不稱職請就黜退睿慚而反睿嘗問曰司馬公忠貞可為社稷之臣乎矯曰朝廷之望也社稷未之知也尚書郎亷昭以才能得幸好抉摘群臣細過以媚上嘗奏尚書左丞罪以矯當連坐黃門侍郎杜恕曰陛下憂勞萬幾或親燈火而庶事不康刑禁日弛原其所由非特臣不盡忠亦委任不專而俗多忌諱故也今上疏者毁人而陛下疑其私報所憎譽人而陛下疑其私受所親左右或因之以進憎愛之說遂使疏者不敢毁譽至于政事損益陛下當思所以廣朝臣之心厲有道之莭反使如亷昭者擾亂其間臣恐大臣盡懼遂將容身保位坐觀得失也杜恕字伯務畿之子魏制三祖為不毁之廟魏有司奏武皇帝為太祖文皇帝為髙祖今皇帝為烈祖三祖之廟萬世不毁詔從之皇后張氏崩冬十月魏營圜方丘南北郊陳祥道禮書祀天于南郊而地上之圜丘者南郊之丘也丘圜而髙所以象天祭地亍北郊而澤中之方丘者北郊之丘也丘方而下所以象地馬端臨曰魏立圜方丘又有南北郊此用鄭康成之說其時康成所注二禮方行王肅雖著論以攻之人猶未宗其說也考孔頴逹禮疏王肅聖證論以圜丘即郊鄭氏以丘郊各異故馬氏之論如此魏用髙堂隆議營洛陽南委粟山在今洛陽縣東南為圜丘詔曰漢承秦亂廢無禘禮馬端臨曰禘有二名有大禘之禘大傳所謂不王不禘王者禘其祖之所自出而以祖配之是也有時禘之禘祭義所謂春禘秋嘗王制所謂天子祫禘諸侯禘一犆一祫是也而考明帝此詔蓋指大禘言曹氏世系出自有虞今祀皇皇帝天亍圜丘以虞舜配祭皇皇后地于方丘以舜妃伊氏舜妃堯女也堯伊祁氏配祀天神于南郊以武帝配祭地祇于北郊以武宣皇后配考鄭氏祭法注禘謂祭吳天于圜丘也王肅曰唯郊是祭天禘者宗廟之殷祭也其說又各不同魏明帝分郊丘為二而合禘與圜丘為一是皆沿鄭氏之說也魏鑄銅人起土山于芳林園在河南府故洛陽城中裴松之曰芳林圜即華林園魏齊王芳即位因改名魏主睿徙長安鐘虡槖駝銅人秦始皇製見前承露盤漢武帝製亦見前于洛陽盤折聲聞數十里銅人重不可致留于霸城即漢霸陵故城大發銅鑄銅人二號曰翁仲列坐于司馬門外又鑄黃龍鳯凰置內殿前起土山于芳林園使公卿皆負土樹雜木善草捕禽獸致其中司徒掾河東董尋上疏曰建安以來野戰死亡或門殫户盡雖有存者遺孤老弱若宮室狹小當廣大之猶宜隨時不妨農務况作無益之物哉陛下既尊羣臣顯以冠冕載以華輿而使穿方舉土面目垢黑衣冠了鳥毁國之光以崇無益甚無謂也孔子曰君使臣以禮臣事君以忠無忠無禮國何以立臣知言出必死而自比于牛之一毛生既無益死亦何損將奏沐浴以待命睿曰尋不畏死邪主者奏收之詔勿問髙堂隆上疏曰今吳蜀欲與中國爭衡若有人來告權禪並修德政輕省租賦動咨耆賢事遵禮度陛下聞之豈不惡其如此而為國憂乎若告者曰彼並為無道崇侈無度重其稅斂民不堪命陛下聞之豈不幸彼疲敝而取之不難乎今天下雕敝若有寇警臣懼版築之士不能投命虜廷矣睿覽之曰觀隆此奏使朕懼哉尚書衛覬上疏曰昔漢武信神仙之道謂當得雲表之露以餐王屑故立仙掌以承髙露陛下通明每所非笑漢武有求于露而猶尚見非陛下無求于露而空設之不益亍好而靡費功夫皆聖慮所宜裁制也不聼魏光祿勳髙堂隆卒隆疾篤口占上疏曰三代之有天下歷數百載尺土一民莫非其有然癸辛縱欲皇天震怒宗國為墟豈伊異人皆明王之胄也黃初之際天兆其戒異類之鳥育長燕雀晋書五行志黃初元年未央宫中有燕生鷹口爪俱赤此大異也宜防鷹揚之臣于蕭墻之內可選諸王使典兵棊跱鎮撫皇畿翼亮帝室夫皇天無親惟德是輔民詠德政則延期過歷下有怨歎則輟録授能由此觀之天下乃天下之天下非獨陛下之天下也魏主睿手詔慰勞之未幾而卒魏作考課法不果行魏主睿深疾浮華之士詔吏部尚書盧育字子嘉植之子曰選舉勿取有名名如畫地作餅不可啖也育對曰名不足以致異人而可以得常士常士畏教慕善然後有名非所當疾也愚臣既不足以識異人又主者正以循名案常為職但當有以驗其後耳古者敷奏以言明試以功今考績之法廢而以毁譽為進退故真僞混雜虛實相䝉睿納其言詔散騎常侍劉劭字孔才廣平邯鄲人作都官考課法七十二條下百官議司𨽻崔林曰周官考課其文備矣康王而下遂以陵夷蓋法存乎其人也且萬目不張舉其綱衆毛不整振其領若大臣任職式是百辟則孰敢不肅烏在考課哉黃門侍郎杜恕曰世有亂人而無亂法若法可專任則唐虞不須稷契之佐殷周無責伊吕之輔矣今欲使州郡考課必由四科皆有事效然後察舉試辟公府為親民長吏轉以功次補郡守者或就增秩賜爵此最考課之急務也臣以為便當顯其身用其言使為課州郡之法法具施行必有賞罰隨之至于三公坐而論道內職大臣納言補闕誠使容身保位無放退之辜而盡莭在公抱見疑之勢公義不修而私議成俗雖仲尼為課猶不能盡一才又况于世俗之人乎司空掾傳嘏曰建官均職清理民物所以立本也循名責實紏勵成規所以治末也本綱未舉而造制末程國略不崇而考課是先懼不足以料賢愚之分精幽明之理也崔林字德孺河東人傳嘏字蘭石北地泥陽人久之事竟不行司馬氏光曰為治之要莫先用人而知人聖賢所難也故求之毁譽則愛憎競進而善惡混殽考之功狀則巧詐橫生而真僞相胃要其本在至公至明而已矣蓋公明者心也功狀者迹也為人上者誠能不以親疏貴賤異其心喜怒好惡亂其志雖詢于人而决之在己雖求于迹而察之在心則羣下之能否焯然形于目中無所逃矣安得豫為之法而悉委有司哉或曰考績之法唐虞所為京房劉劭述而俢之耳曰唐虞之官居位久而委任專立法寬而責成逺非若房劭校米鹽之課責旦夕之效也事固有名同而實異者不可不察也戊午延熙元年魏景初二年吳赤烏元年春正月魏遣太尉司馬懿擊公孫淵初魏使者至遼東公孫淵設甲兵為軍陳以見之又數對其國中賔客出惡言魏主睿遣毋邱儉毋邱復姓儉字仲恭河東聞喜人齎璽書徴淵淵遂發兵逆儉亍遼隊漢縣後漢省公孫度復置故城在今奉天府海城縣儉與戰不利引軍還淵因自立為燕王改元紹漢置百官誘鮮卑以擾北方至是魏主睿召司馬懿于長安使將兵四萬討遼東睿謂懿曰公孫淵將何計以待君對曰葉城預走上計也據遼東拒大軍其次也坐守襄平此成擒耳曰三者何出對曰惟明智能審量彼我乃豫有所割棄此非淵所及必先拒遼東後守襄平也曰還往幾日對曰往百日攻百日還百日以六十日為休息如此一年足矣淵聞之復遣使稱臣求救于吳吳人欲戮其使羊衟曰不可是肆匹夫之怨而捐霸王之計也不如因而厚之遣竒兵潜往以要其成若魏伐不克而我軍逺赴是恩結遐夷而義形萬里若兵連不解首尾之隔則我虜其傍郡驅略而歸亦足以報雪曩事矣吳主權勒兵謂淵使曰請俟後問當從簡書語見左氏傳同惡相拒之謂也二月魏以韓暨字公至南陽堵陽人為司徒魏主睿問盧育誰可為司徒者育薦處士管寧睿不能用更問其次對曰敦篤至行則大中大夫韓暨亮直清方則司𨽻崔林貞固純粹則太常常林乃以暨為之立皇后張氏立子璿字文衡為皇太子大司農孟光字孝裕洛陽人問太子讀書及性情好尚亍祕書郎郤正字令先偃師人正曰奉親䖍恭舉動仁恕有古世子之風光曰此皆家戶所有耳吾欲知其權略智調何如也正曰世子之道在于承志竭歡既不得妄有施為智調藏于胸中權略應時而發此之有無焉可預知也光曰今天下未定智意為先儲君讀書寧當效吾等竭力博識以待訪問如博士探䇿講試以求爵位邪當務其急者正深然之吳鑄當千大錢吳先鑄大錢一當五百及是又鑄當千大錢秋八月魏司馬懿破襄平斬公孫淵六月司馬懿軍至遼東公孫淵使其將卑衍卑氏卑耳國之後等將步騎數萬屯遼隊圍塹二十餘里諸將欲擊之懿曰此欲以老吾兵也攻之正墮其計且賊大衆在此其巢窟空虛直指襄平破之必矣乃多張旗幟欲出其南衍等盡鋭趣之懿潜濟水出其北直趣襄平衍等恐引兵夜走諸軍進至首山在奉天府遼陽州西南淵使衍等逆戰懿擊大破之遂進圍襄平秋大霖雨遼水暴漲兩月餘不止平地水數尺三軍恐欲移營懿令軍中敢有言徙者斬都督令史犯令斬之軍中乃定已雨霽懿乃作土山地道楯櫓鈎衝晝夜攻之天石如雨淵窘急糧盡人相食死者甚衆其將楊祚等降淵使其相國王建等請解圍却兵當君臣面縳懿命斬之檄告淵曰楚鄭列國而鄭伯猶肉袒牽羊迎之孤天子上公而建等欲孤解圍退舍傳言失指已為斬之若意有未已可更遣有明决者來淵復使侍中衛演乞克日送任懿曰軍事大要有五能戰當戰不能戰當守不能守當走餘二事但有降與死耳汝不肯面縳此為决就死也不須送任任質子也既而城潰淵與子修將數百騎突圍走懿擊斬之遂入城傳淵首洛陽于是遼東𢃄方本漢縣公孫氏置為郡樂浪元菟四郡皆平始公孫度以漢中平六年據遼東至淵三世凡五十年而滅冬十二月蔣琬出屯漢中詔命琬總帥諸軍須吳舉動東西掎角以乘魏釁魏主睿有疾立郭夫人為后召司馬懿入朝以曹爽字昭伯真之子為大將軍初魏太祖以劉放孫資為祕書郎文帝更名祕書曰中書以放為監資為令遂掌機祕魏主睿即位尤見寵任時親總萬幾數興軍旅腹心之任皆二人管之每大事朝臣㑹議常令决其是非擇而行之中護軍蔣濟上疏曰臣聞大臣太重者國危左右太親者身敝陛下既已察之于大臣願無忘之于左右左右忠正逺慮未必賢于大臣至于便辟取合或能攻之况實握事要日在目前倘因疲倦之間有所割制推移賞罰因微而入緣形而出意所狎信不復猜覺此宜早以經意也睿不聼及寢疾深念後事乃以武帝子燕王宇字彭祖為大將軍夏侯元曹爽曹肇字長思休之子秦朗等輔政劉放孫資久典機任元肇心不平殿中有雞棲樹二人相謂曰此亦久矣其能復幾放資懼隂圗閒之宇性恭良陳誠固辭睿引放資入卧內問曰燕王正爾為言其性恭良為事正如此也對曰燕王實自知不堪大任故耳睿曰誰可者時惟爽在側放資因薦之且請召司馬懿與相參睿從之既而中變放資復入說又從之放請為手詔睿曰我困篤不能放上牀執其手強作之遂齎出大言曰有詔免燕王宇等官不得停省中皆流涕而出遂以爽為大將軍睿嫌其才弱拜尚書孫禮字德逹涿郡客城人為長史以佐之時懿在汲宇以為關中事重宜遣懿還長安事已施行至是復得手詔前後相違懿疑京師有變乃疾馳入朝己未二年魏景初三年吳赤烏二年春正月魏司馬懿至洛陽與爽受遺輔政魏主睿卒太子芳立司馬懿至洛陽入見魏主睿執其手曰吾以後事屬君君與曹爽輔小子死乃可忍吾忍死待君得相見無恨矣乃召二王示懿别指齊王芳曰此是也君諦視之勿誤也又教芳前抱懿項懿頓首流涕于是芳年八歲即日立為太子睿尋卒芳嗣位尊皇后為皇太后爽懿並加侍中都督中外諸軍録尚書事諸所興作皆以遺詔罷之二月魏以司馬懿為太傅何晏字平叔進之孫為尚書時曹爽司馬懿各領兵三千人更宿殿內爽以懿年位素髙常父事之每事咨訪不敢專行初畢軌字昭先東平人鄧揚李勝字公昭南陽人何晏丁謐字彥靖沛國人皆有才名而急于富貴趨時附勢明帝惡其浮華抑而不用曹爽素與親善及輔政驟加引擢以為腹心晏等為爽謀曰重權不可委之于人可白天子轉懿為太傅外以名號專之內令尚書奏事先來由己得制其輕重爽從之二月以懿為太傅自以其弟羲訓等皆為將軍侍從出入禁闥徙吏部尚書盧育為僕射而以晏代之以揚為尚書軌為司𨽻晏等依勢用事附㑹者升進違忤者罷退內外望風莫敢忤者傅嘏謂羲曰何平叔外靜內躁銛巧好利必先惑子兄弟仁人將逺而朝政廢矣晏等遂因事免嘏官孫禮亮直不撓爽出為揚州刺史夏以蔣琬為大司馬東曹掾楊戲字文然犍為武陽人素簡略琬與言論戲時不應或謂琬曰戲慢公矣琬曰人心不同各如其面面從後言古人所誡戲欲贊吾是耶則非其本心欲反吾言則顯吾之非是以默然耳督農楊敏嘗毁琬曰作事憒憒誠不及前人或以白琬主者請推治之琬曰吾實不及前人無可推主者請問憒憒之狀琬曰苟其不如則事不理事不理則憒憒矣後敏坐事繫獄衆猶懼其必死琬心無適莫敏得免重罪冬十月吳遣將軍吕岱屯武昌岱時年八十躬親王事與陸遜同心協規有善相讓南土稱之是冬吳將廖式殺臨賀太守攻零陵桂陽諸郡岱自表輒行星夜兼進遂擊斬式郡縣悉平西臨賀漢縣吳置郡今廣平樂府賀縣是十二月魏復以建寅之月為正庚申三年魏主曹芳正始元年吳赤烏三年春以張嶷字伯岐巴西南充人為越巂太守初丞相亮既殁越巂蠻夷數叛殺太守太守寄治安定縣胡三省注安定不見于志當是暫立去郡八百餘里及嶷為守招慰新附誅討彊猾郡界悉平復還舊治冬吳饑辛酉四年魏正始二年吳赤烏四年夏四月吳人攻魏魏擊却之吳主權伐魏命全琮略淮南决芍陂朱然圍樊諸葛瑾攻柤中襄陽記柤讀如租在上黃界上黃故城在襄陽府南漳縣魏將軍王凌與琮戰敗之司馬懿曰柤中民夷十萬胡三省注魏時夷王權敷部曲萬餘家屯此土地平敞宜桑麻為沔南沃壤流離無主樊城被攻歷月此危事也請自討之遂督諸軍救樊吳軍夜遁蔣琬徙屯涪即涪城注見前琬以諸葛亮數出秦川道險運難卒無成功乃多作舟船欲乘漢沔東下襲魏興即西城郡魏改魏興注見前上庸㑹疾動未行朝廷咸以為事有不捷還路甚難帝遣費禕姜維喻指琬言今魏跨𢃄九州根蒂滋蔓若東西并力首尾犄角雖未能速得如志且當分列蠶食推其支黨然吳期二三連不克果輒與禕等議以涼州胡塞之要進退有資且羌胡乃心思漢如渴宜以維為刺史若維征行銜制河右臣當帥軍為繼今涪水陸四通惟急是應若東北有虞赴之亦易請徙屯涪帝從之魏置淮南北屯田廣漕渠魏欲廣田畜榖于掦豫之間使尚書郎鄧艾字士載棘陽人行陳注見前項漢縣今陳州府項城縣是已東至夀春艾以為太祖破黃巾因為屯田積穀許都以制四方今三隅略定事在淮南每大軍出征運兵過半功費巨億陳蔡之間上下田良可省許昌左右稻田并水東下令淮北屯二萬人淮南三萬人什二分休常有四萬人且田且守益開河渠以增灌溉通漕運計除衆費歲完五百萬斛六七年間可積三千萬斛于淮上此則十萬之衆五年食也以此乘吳無不克矣司馬懿善之是歲始開廣漕渠每東南有事大軍泛舟逹于江淮資食有儲而無水害管寧卒亍魏寧名行髙潔人望之者邈然若不可及即之熙熙和易能因事導人于善人皆化服年八十四卒天下知與不知聞之無不嗟歎壬戌五年魏正始三年吳赤烏五年春正月中監軍姜維自漢中徙屯涪諸軍悉屬蔣琬維領偏軍癸亥六年魏正始四年吳赤烏六年夏五月朔日食既三國志失書甲子冬十月遣前監軍王平督漢中蔣琬住涪疾益甚乃以平督漢中甲子七年魏正始五年吳赤烏七年春三月魏曹爽寇漢中費禕督諸軍救之魏軍敗走魏征西將軍夏侯元爽姑子也辟李勝為長史勝及鄧揚欲爽立威名于天下勸使伐蜀司馬懿止之不得三月爽至長安發卒十餘萬與元自駱谷在西安府盩厔縣西南寰宇記駱谷道南通洋州興藝縣入漢中漢中守兵不滿三萬諸將皆恐欲守城不出以待涪兵王平曰此去涪垂千里賊若得關便為深禍遂遣護軍劉敏泉陵人據興藝山名在洋縣北後魏于此置興藝縣唐改曰興道元省多張旗幟彌亘百餘里閏月帝遣費禕救漢中將行光祿大夫來敏詣禕别求其圍棊時羽檄交至人馬擐甲嚴駕已訖禕與對戲了無倦色敏曰向觀試君耳君信可人必能辦賊也來敏字叔逹新野人魏兵距興藝不得進關中及氐羌轉輸不能供牛畜多死民夷號泣道路司馬懿與夏侯元書曰春秋責大德重言責任之大者其思尤為重也今興藝至險蜀已先據之若進不獲戰退見迫絶覆軍必矣將何以任其責元懼言于爽遂引軍還費禕進據三嶺胡三省注自駱谷出扶風隔以終南山其間有三嶺一曰沈嶺一曰衙嶺一曰分水嶺以截爽爽爭險苦戰僅乃得過失亡甚衆關中為之虛耗夏四月丙辰朔日食冬以費禕兼益州刺史董允守尚書令蔣琬以病固讓州職亍禕禕當國功名略與琬比禕為尚書令時常以朝晡聼事其間接納賔客飲食博戲盡人之歡而事不廢闕及允代禕始欲斆之旬日之中已多愆滯乃歎曰人才相逺如此非吾所及也乃聼事終日而猶有不暇焉乙丑八年魏正始六年吳赤烏八年春吳殺其太子太傅吾粲吾氏夏昆吾之後粲字孔休吳郡烏程人先是吳太子登卒吳主權立子和字子孝為太子霸字子威為魯王霸和同母弟也權愛之與太子同宫禮秩如一羣臣多以為言權乃命分宫别僚二子由是有隙全琮遣其子寄事魯王陸遜謂曰子弟茍有才不憂不用私出以要榮利終取禍耳聞二宫勢敵此古人之深忌也寄果阿附交構琮不能禁霸曲意交結名士嘗自詣將軍朱績字公緒然之子績不納于是賔客侍從仇黨疑二滋延大臣舉國中分權長女適全琮少女適朱據全公主與太子母王夫人有隙權寢疾遣太子禱長沙桓王廟太子妃叔父張休居近廟邀太子過所居公主因言太子不至廟中專就妃家計議而王夫人見上寢疾有喜色權由是發怒夫人以憂死朱據字子範吳人太子寵日衰霸黨楊竺廣陵人全寄從而毁之權惑焉陸遜諌曰正統藩臣當使寵秩有差則彼此得所上下獲安書三四上辭情危切權不悅吾粲請使魯王鎮夏口出楊竺等不得在京師又數以消息語陸遜霸竺譖之吳主怒誅粲時陸遜外甥顧談亦以言太子事見徙權遣使數責問遜遜憤恚而卒秋八月皇太后吳氏崩冬十一月大司馬蔣琬卒諡曰恭琬卒帝始親國事十二月尚書令董允卒以宦者黃皓為中常侍董允秉性公亮獻替盡忠帝甚嚴憚之宦人黃皓便辟佞慧有寵允數責之皓畏允不敢為非終允之世位不過黃門丞費禕以選曹郎陳祗字奉宗南陽人代允為侍中祗多技藝挾智數禕以為賢越次用之祗與皓相表裏皓始預政遷中常侍操弄威柄終以覆國時帝數出遊觀增廣聲樂太子家令譙周諌曰昔世祖初入河北馮翼勸之曰當行人所不能為者遂理冤獄崇莭儉北州歌歎聲布四逺故能以弱為彊而成帝業今漢遭厄運天下三分臣願陛下復行人所不能為者以副人望且憂責在身者不暇盡樂願省減樂官及後宫凡所增造以成先帝之志不聼譙周字允南西充國人丙寅九年魏正始七年吳赤烏九年秋赦大司農孟光于衆中責費禕曰赦者偏枯之物非明世所宜有也必不得已乃可權而行之今有何急而數施非常之恩以惠姦宄乎禕顧謝踧踖而已初丞相亮時有言公惜赦者亮答曰治世以大德不以小惠故匡衡吳漢不願為赦先帝亦言吾周旋陳元方鄭康成間每見啓告治亂之道悉矣曽不語赦也若劉景升父子歲歲赦宥何益于治乎以姜維為衛將軍與費禕並録尚書事時涼州胡王白虎文治無戴胡三省注羌胡有治姓等率衆來降維以兵迎之遂徙于蜀丁卯十年魏正始八年吳赤烏十年春二月朔日食三國志失書甲子魏遷其太后于永寧宫曹爽用何晏等謀遷太后擅朝政多樹親黨司馬懿不能禁遂稱疾不與政事胡三省曰據魏志太后稱永寧宮非徙也晋諸臣欲增曹爽之惡以遷字加之耳戊辰十一年魏正始九年年吳赤烏十一夏四月魏以徐邈字景山薊人為司空不受邈先為涼州刺史務農積穀立學明訓進善黜惡州界肅清及是以光祿大夫拜司空邈歎曰三公論道之官無其人則闕豈可以老病忝之哉遂固辭不受邈與田豫俱以清莭稱豫為衛尉屢乞遜位司馬懿書喻之豫答曰年過七十而以居位譬猶鐘鳴漏盡而夜行不休是罪人也遂固稱疾篤豫邈俱以大夫卒于家五月以費禕出屯漢中自蔣琬及禕雖身居于外慶賞威刑皆遙先咨斷然後乃行並承諸葛亮之成規遵循不易御批厯代通鑑輯覽卷二十八

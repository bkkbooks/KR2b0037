body:
  text: 初魏廣陵王恭以元乂擅權託稱瘖疾居于龍華佛寺無所交通至是爾朱世隆兄弟以魏主煜疏逺無人望密謀更立近親郎中薛孝通字士逹汾隂人聰之子説爾朱天光曰廣陵高祖猶子夙有令望沈晦不言多歷年所若奉以為主天人允協矣天光使爾朱彥伯榮從弟潛往脅之恭乃曰天何言哉世隆等大喜乃廢煜而立之邢卲字子才蠻族弟為赦文敘敬宗西魏太昌中追諡子攸為孝莊帝廟號敬宗枉殺爾朱榮之狀魏主曰永安手翦強臣非為失德直以天未厭亂故逢成濟之禍耳因取筆自作赦文魏主閉口八年至是乃言中外欣然以為明主魏河北大使高乾起兵信都以冀州迎高歡初爾朱榮以高敖曹即高昻後以字行入洛敖曹為榮所執事具前敖曹兄乾亦自東冀州乾父翼前聚衆河濟間魏置東冀州以翼為刺史馳至及榮死魏敬宗以乾為河北大使敖曹為直閣將軍使歸集鄉里為形援敬宗親送之河橋舉酒指水曰卿兄弟冀部豪傑能令士卒致死京城倘有變可為朕河上一揚塵乾垂涕受詔敖曹援劒起舞誓以必死俄而敬宗遇害劉靈助反于幽州靈助推算知爾朱氏將衰乃起兵聲言為敬宗復讐幽瀛滄冀之民多從之及是爾朱兆遣監軍孫白鷂至冀州託言調發民馬欲收乾兄弟乾等知之乃與前河內太守封隆之字祖裔回之子等襲信都殺白鷂奉隆之行州事為敬宗舉哀將士皆縞素升壇誓衆移檄州郡共討爾朱氏殷州刺史爾朱羽生襲之為敖曹所敗敖曹馬矟絶世左右無不一當百時高歡屯壺關聲言討信都衆懼乾曰吾聞高晉州雄略蓋世其志不居人下且爾朱無道弒君虐民正是英雄立功之會今日之來必有深謀吾當輕馬迎之諸君勿懼乃潛謁歡于滏口注見前説之曰爾朱酷逆痛結神人凡曰有知莫不思奮明公威德素著天下傾心若兵以義立則屈強之徒不足為明公敵矣鄙州雖小户口不減十萬榖秸之稅足濟軍資願熟思之歡大悅與同帳寢已歡東出趙郡李元忠靈之曾孫復勸歡就乾元忠先為南趙郡太守好酒無政續及爾朱兆弒敬宗棄官歸謀舉兵討之會歡已見乾東出元忠乘露車載素箏濁酒以迎歡歡未即見元忠下車獨酌謂門者曰今聞國士到門不吐哺輟洗其人可知還吾刺勿通也門者以告歡遽見之引入觴再行取箏鼓之長歌慷慨歌謂歡曰天下形𫝑可見公猶事爾朱邪歡曰富貴皆彼所致敢不盡節元忠曰非英雄也歡曰趙郡醉矣使人扶出元忠不肯起孫騰進曰此君天遣來不可違也歡乃復與語元忠慷慨流涕歡亦悲不自勝元忠因進策曰殷州小無糧仗不足以濟大事若向冀州高乾雍兄弟必為明公主人殷州便以賜委冀殷既合滄瀛幽定自當弭服矣歡急握元忠手而謝焉于是歡帥衆至信都隆之乾納之時敖曹在外略地聞之以乾為婦人遺以布裙歡使子澄字子惠以子孫禮見之敖曹乃與俱來初乾之舉兵也仍受劉靈助節度靈助自占曰三月之末我必入定州已而魏都督侯淵討靈助斬之函首入定州果如其期魏封其故主曄為東海王魏以爾朱世隆為太保時天光專制關右兆奄有并汾仲逺擅命徐兗世隆居中用事競為貪暴而仲逺為尤甚所部富室多誣以謀反沒其婦女財物而投其男子于河人畏之如豺虎由是四方皆惡爾朱氏而憚其強莫敢違也魏以髙歡為渤海王魏賜髙歡爵渤海王徴之不至乃以為東道大行臺冀州刺史夏四月梁太子統卒諡昭明統自加元服梁主使省録朝政辨析詐謬秋毫必賭但令改正不加案劾斷獄多所全宥寬和容衆喜愠不形于色好讀書屬文引接才俊不畜聲樂每零雨積雪遣左右周行閭巷視貧者賑之天性孝謹在東宫坐起恆西向母丁貴嬪卒水漿不入口腰帶十圍減削過半及寢疾恐貽梁主憂敇參問輒自力手書及卒朝野惋愕五月梁立子綱即簡文帝為太子六月封孫歡字孟孫為豫章王譽字重孫為河東王察即後梁宣帝皆故太子統子為嶽陽王梁昭明太子既卒其長子華容公歡梁主欲立為嗣以銜太子舊事猶豫久之竟不立初昭明太子葬母丁貴嬪有道士云此地不利長子請厭之乃為蠟鵝及諸物埋于墓側宫監鮑邈之有寵于太子晚而見疏乃密啓梁主云太子有厭禱梁主遣檢掘果得鵝物大驚將窮其事徐勉諌而止但誅道士由是太子終身慙憤及卒不能自明已而立太子母弟晉安王綱為太子朝野多以為不順侍郎周宏王字行捨弟之子嘗為綱主簿乃奏記曰謙讓道廢多歷年所願殿下抗目夷宋子魚事具前之義執子臧曹子臧亦見前之節綱不能從綱以徐摛為家令兼管記摛文體輕麗春坊之學時人謂之宫體梁主聞之怒召摛欲加誚責及見應對明敏意更釋然因問經史及釋教摛商較縱橫梁主深歎異之寵遇日隆朱異不悅謂所親曰徐叟漸來見逼須早為之所遂乘間白梁主曰摛老愛泉石意在一郡梁主謂摛真欲之乃曰新安大好山水遂出為郡徐摛字士秀東海郯人新安注見前尋梁主以人言不息封歡譽察等皆大郡以慰其心魏冀州刺史髙歡起兵討爾朱氏髙歡自向山東養士繕甲禁兵侵掠百姓歸心將起兵討爾朱氏斛律金斛律本敕勒部因以為氏金字阿六敦朔州人庫狄于庫狄氏段匹磾之後避難改姓干善無人與婁昭字菩薩平城人歡妻弟段榮皆勸成之歡乃詐為書稱爾朱兆將以六鎮人配契夷為部曲衆皆憂懼又為并州符徴兵討步稽落即稽部劉淵五部之苖裔乃發萬人將遣之孫騰尉景為請留五日如此者再歡親送之郊雪涕執别衆號慟歡乃諭之曰與爾俱為失鄉客義同一家不意在上徴發乃爾今直西向已當死後軍期又當死配國人又當死奈何衆曰唯有反耳歡曰然當推一人為主誰可者衆推歡歡曰爾不見葛榮乎雖有百萬之衆曾無法度終自敗滅今以吾為主當與前異無得陵漢人犯軍令生死任吾則可不然不能為天下笑衆皆頓顙曰死生唯命歡乃椎牛饗士起兵信都然猶未敢顯言叛爾朱氏也會李元忠舉兵逼殷州歡令髙乾救之乾輕騎入見爾朱羽生因斬之持首謁歡歡撫膺曰今日反決矣乃以元忠為殷州刺史抗表罪狀爾朱氏冬十一月魏髙歡立渤海太守元朗章武王融之子是為廢帝自為丞相敗爾朱兆等軍于廣阿注見前爾朱仲逺度律等聞髙歡起兵不以為慮獨世隆憂之孫騰説歡曰今朝廷隔絶號令無所稟不權有所立衆將沮散歡乃立渤海太守元朗為帝朗以歡為丞相都督中外諸軍事高乾為侍中司空封拜有差爾朱仲逺軍陽平兆軍廣阿歡用竇泰計縱反間云世隆兄弟謀殺兆復云兆與歡同謀殺仲逺等由是迭相猜二徘徊不進仲逺等屢使人往諭兆兆執之仲逺等懼引兵南遁歡遂進戰大破兆軍先是歡欲與兆戰而畏其衆強以問段韶韶曰所謂衆者得衆人之死所謂強者得天下之心爾朱氏上弒天子中屠公卿下暴百姓王以順討逆如湯沃雪何衆強之有歡曰恐無天命不能濟耳韶曰爾朱暴亂人心已去矣天意安有不從者哉已而歡果破兆遂進攻鄴段韶字孝先榮之子魏南兗州魏置治譙城譙城注見前人執刺史劉世明字伯楚芳族子以降于梁梁遣歸魏魏南兗州民劫刺史舉州降梁梁以世明為征西大將軍不受固請北歸比至洛陽奉送所持節歸鄉里不仕而卒壬梁中大通四年魏普泰二年中子與二年孝武帝修永熙元年春正月梁封西豐侯正德為臨賀王正德自結于朱異言正德失職故王之魏髙歡克相州以楊愔字遵彥津之子為行臺右丞初魏敬宗之誅爾朱榮也楊侃預其謀及爾朱兆入洛侃逃歸華隂爾朱天光誘而殺之爾朱世隆復誣奏楊氏謀反盡滅其族楊氏家世孝友緦服同變男女百口人無間言及是族無少長皆被殺唯津子愔適出在外獲免往見高歡泣訴家禍因為言討爾朱氏之策歡甚重之以為行臺郎中至是歡攻克相州刺史劉誕嬰城固守歡為地道施柱而焚之城陷入地遂拔之以愔為行臺右丞時軍國多事文檄教令皆出于愔及咨議參軍崔㥄字長孫逞之五世孫二月梁邵陵王綸字世調梁主第六子有罪免為庶人既而復之綸為揚州刺史市物不給其直市皆閉邸少府丞何智通啓聞綸被責還第遣人刺殺智通事覺免為庶人鎖之三旬既而復之三月魏主朗入居于鄴高歡自為太師劉友益曰書魏主成朗之為君也成朗之為君將以正罪歡也閏月魏爾朱天光等會兵攻鄴高歡擊破之爾朱世隆卑辭諭兆使之赴洛又請魏主恭納其女為后兆乃悅并與天光度律復相親睦將軍斛斯椿斛斯代北復姓字法壽廣牧富曷人欲圖爾朱氏因説世隆邀天光等共討高歡椿隂謂賀拔勝曰天下怨毒爾朱而吾等為之用亡無日矣不如闈之勝曰天光與兆各據一方去之不盡必有後患奈何椿曰此易致耳乃見世隆以共討離歡説之于是天光自長安兆自并州度律自洛陽仲逺自東郡皆會于鄴衆號二十萬夾洹水注見前而軍高歡出頓紫陌在今彰德府臨漳縣西水經注石趙建武中造紫陌浮橋于漳水上即此高敖曹以其部曲從敖曹所將皆漢兵歡恐不足集事欲割鮮卑千人雜之敖曹曰所將練習已久前後格鬭不滅鮮卑今若雜之情不相洽勝則爭功退則推罪不願更配也時歡馬不滿二千步兵不滿三萬乃于韓陵山名在彰德府安陽縣東北為圓陳連牛驢塞歸道以示必死兆望見歡責以叛已歡曰本所以戮力者共輔帝室今天子何在兆曰永安枉殺天柱我報讐耳歡曰以君殺臣何報之有今日絶義矣遂戰歡將中軍敖曹將左歡弟嶽將右歡戰不利兆等乘之嶽以五百騎衝其前别將斛律敦收散卒躡其後敖曹以千騎橫擊之髙嶽字洪略歡從父弟兆等大敗賀拔勝于陳降歡兆對慕容紹宗撫膺曰不用公言以至于此遂還晉陽仲逺奔東郡度律天光走洛陽夏四月魏將軍斛斯椿執爾朱天光度律送鄴世隆伏誅仲逺奔梁斛斯椿謂賈顯度顯智曰不先執爾朱氏吾屬死無類矣于是入據河橋盡殺爾朱氏之黨度律天光出走擒之送高歡又使顯智襲執世隆斬之魏主恭使中書舍人盧辨字景宣同之兄子勞歡歡使見魏主朗辨抗辭不從歡不能奪侯景降于鄴仲逺奔梁仲逺兄彥伯與世隆同時俱斬世隆弟弼為其帳下馮紹隆所殺天光弟顯夀鎮長安雍州刺史賀拔嶽襲殺之天光度律高歡自鄴送于洛陽斬首都市仲逺後死于江南高歡入洛陽廢其主恭及朗而立平陽王修廣平王懷之子是為孝武帝自為大丞相魏主朗至邙山高歡以為疏逺使魏蘭根觀魏主恭之為人欲復奉之蘭根以恭神采髙明恐後難制勸歡廢之歡集百官問所宜立莫有應者太僕綦俊魏西方其連氏後改綦氏俊字􅋆顯本代人後居洛陽考通鑑綦作綦母今依魏書北史稱恭賢明宜主社稷歡將從之崔㥄作色曰廣陵既為逆臣所立何得為天子若從俊言王師何名義舉歡遂幽恭于崇訓寺歡在洛陽斛斯椿謂賀拔勝曰今天下事在吾與君耳若不先制人將為人所制高歡初至之不難勝曰人有功而害之不祥椿乃止時諸王多逃匿平陽王修匿于田舍歡欲立之使斛斯椿求之椿從修所親王思政太原祁人見修修曰賣我耶思政曰不也曰敢保之乎曰變態百端何可保也椿馳報歡歡乃迎修為朗作詔䇿而禪位焉修即位用代都舊制以黑氊蒙七人歡居其一修于氊上西向拜天畢入御殿修以歡為大丞相天柱大將軍歡以司馬子如為行臺尚書𠫭知軍國歡欲徴賀拔嶽為冀州刺史嶽欲入朝行臺右丞薛孝通曰歡方內撫羣雄外抗徑敵安能去其巢穴與公爭關中之地乎公以華山為城黃河為塹進可以兼山東退可以封函谷奈何欲束手受制于人嶽曰君言是也乃不就徴五月魏封其故主朗為安定王魏主修弒其故主恭後西魏追諡為節閔恭有德望魏主鴆之于門下外省葬用殊禮秋七月魏髙歡討爾朱兆走之遂據晉陽髙歡擊爾朱兆軍于武鄉注見前兆大掠晉陽北走秀容并州平歡以晉陽四塞乃建太丞相府而居之兆至秀容分守險隘歡揚聲討之師出復止者數四兆意怠明年正月歡乘其嵗首晏會遣竇泰以精騎馳之一日一夜行三百里歡以大軍繼之兆驚走泰追破之兆縊死山中慕容紹宗降歡厚待之冬十一月魏主修弒安定王朗東海王煜十二月復殺汝南王悅先是髙歡既誅爾朱氏以髙祖不可無後召汝南王悅于梁至將立之宿昔而止魏主以悅為大司馬至是魏主以悅屬近地尊遂殺之癸梁中大通五年丑魏永熙二年春正月魏以賀拔勝為荆州刺史魏侍中斛斯椿與南陽王寶炬京兆王愈之子即西魏文帝將軍元毗字休弼常山王遵之元孫王思政密勸魏主圖髙歡增置都督部曲各數百員以關中大行臺賀拔嶽擁重兵密與相結出其弟勝為荆州刺史欲以敵歡歡不悅初侍中司空髙乾遭父喪解侍中魏主既二于歡冀乾為己用常與共立盟約乾不之知對曰臣以身許國何敢有二及是乾謂所親曰上不親勳賢而招集羣小數遣人往來關中又令賀拔兄弟相近禍難將作必及于我乃密啓歡歡召乾詣并州乾因勸歡受魏禪歡掩其口曰勿妄言遂屢表乾使復為侍中魏主不許乾知變將起求為徐州從之二月阿至羅髙車别種復附于魏魏正光以前阿至羅嘗稱藩內附自中原多事遂叛髙歡遣使招納阿至羅復降先是魏主詔以冦賊平罷行臺至是以殊俗歸降復授歡大行臺隨機處分歡賚之粟帛議者以為徒費無益歡不從及經略河西大收其用魏徐州刺史髙乾伏誅大都督髙敖曹奔晉陽乾將之徐州魏主聞其泄漏機事乃詔歡曰乾雍與朕有盟今乃反覆歡聞亦惡之取乾前後啓論時事者封上魏主召乾責之遂賜死弟敖曹及仲密名慎以字行俱奔晉陽魏主既賜乾死復遣東徐州刺史潘紹業密敕長欒太守龎蒼鷹令殺敖曺敖曺先聞其兄死伏肚士執紹業于路得敕書于袍領遂奔晉陽歡抱其首哭曰天子枉害司空遽使以白虎幡勞其家屬時乾次弟仲密在光州聞難將奔梁其屬曰公家勳重必不弟兄相及乃敝衣推鹿車亦奔于歡自是魏主與歡遂有隙夏四月魏青州人耿翔殺其刺史降梁梁以翔為刺史五月魏下邳叛降子梁秋八月魏以賀拔嶽為雍州刺史初賀拔嶽遣行臺郎馮景字長明河間武垣人詣晉陽高歡與景歃盟約與嶽為兄弟景還言于嶽曰高歡姦詐有餘不可信也府司馬宇文泰請使晉陽以觀歡之為人泰返謂嶽曰歡所以未篡者正憚公兄弟耳侯莫陳悅之徒非所忌也公但潛為之備圖歡不難今費也頭代北别部後遂為姓控弦之騎不下一萬夏州刺史斛拔彌俄突斛拔氏代北復姓勝兵三千餘靈州刺史曹泥河西流民紇豆陵伊利魏南方諸姓省紇豆陵氏各擁部衆未有所屬若移軍近隴扼其要害震之以威懷之以惠收其士馬以資吾衆西輯氐羌北撫沙塞還軍長安匡輔魏室此桓文之功也嶽大悅復遣詣洛陽請事密陳其狀魏主喜以嶽為都督二十州軍事雍州刺史時彌俄突來降嶽以夏州邊地要重欲求良刺史衆舉字文泰嶽曰左丞吾左右手何可廢也沉吟纍日卒表用之伊利及費也頭万俟受洛于鐵勒斛律沙門等皆于嶽惟曹泥附歡冬十二月魏人侵梁雍州魏荆州刺史賀拔勝侵梁雍州拔下迮戍在襄陽縣西扇動諸蠻梁刺史廬陵王續字世欣梁主第五子屢為所敗漢南震駭城邑多陷于是沔北蕩為邱墟甲梁中大通六年魏永熙三年東魏孝靜帝寅善見天平元年是歲魏分為二凡三國春正月魏高歡攻紇豆陵伊利執之高歡使侯景招紇豆陵伊利伊利不從擊之于河西擒之遷其部落于河東魏主讓之曰伊利不侵不叛為國純臣王忽伐之豈有一介行人先請之乎魏秦州刺史侯莫陳悅殺賀拔嶽魏以宇文泰統嶽軍討悅誅之遂以泰為關西大都督初高歡患賀拔嶽侯莫陳悅之強右丞翟嵩曰嵩能間之使其自相屠滅歡遣嵩如關中會賀拔嶽將討曹泥使都督趙貴字元寶天水南安人至夏州與宇文泰謀之泰曰曹泥孤城阻逺末足憂侯莫陳悅貪而無信宜先圖之不聽至是嶽召悅會于高平與共討泥悅既得翟嵩之言乃謀取嶽與嶽宴語誘而斬之還屯水洛城在今平涼府莊浪縣東南嶽衆散走平涼未有所屬趙貴曰今宇文夏州英略冠世逺近歸心若迎而奉之大事濟矣都督杜朔周盛欒人本姓赫連其曾祖周避難改姓杜氏後宇文泰命復其舊姓名之曰違請輕騎告哀且迎之遂馳至夏州泰與將佐議去留前大中大夫韓褒字宏業潁川人曰此天授也又何疑乎衆欲暫留以觀變泰曰悅既害元帥自應乘勢直據平涼而退屯水洛吾知其無能為也若不早赴衆心將離因與諸將共盟討悅輕騎赴平涼既至哭嶽哀慟將士悲喜先是髙歡使侯景招撫嶽衆泰至安存定遇之謂曰賀拔公雖死宇文泰尚卿何為者景失色曰我猶箭耳惟人所射遂還及泰至平涼歡復使景與張華原王基勞泰泰不受欲劫留之華原不屈乃遣之基還言泰雄傑請及其未定擊滅之歡曰卿不見賀拔嶽侯莫陳悅乎吾當以訃拱手取之王張華原字國代郡人基大安人魏主遣元毗慰勞嶽軍召還洛陽并召侯莫陳悅悅附高歡不肯應召泰因毗上表言嶽忽罹非命都督寇洛上谷昌平人等令臣權掌軍事今高歡之衆已至河東侯莫陳悅猶在水洛士卒多西人顧戀鄉邑乞少停緩徐就東引魏主乃以泰為大都督即統嶽軍嶽之死也都督李虎奔荆州説賀拔勝使攻嶽衆勝不從而還為歡别將所獲送洛陽魏主方謀取關中得虎甚喜拜衛將軍使就泰李虎西涼王歆之元孫唐髙祖之祖泰與悅書曰君黨附國賊共危社稷吾已發兵為賀拔公報讐指日相見泰引兵上隴軍令嚴肅秋毫無犯百姓大悅水洛降悅退保上邽召南秦州刺史李弼字景和隴西成紀人與之拒泰弼舉城降悅兵潰縊死泰入上邽散府庫以賞士卒左右竊一銀甕以歸泰知而罪之剖賜將士初魏之亂也故氐王楊紹先逃歸武興復稱王氐羌吐谷渾所在蜂起泰令李弼鎮原州拔也惡蚝鎮南泰州可朱渾元鎮渭州趙貴行秦州事徴豳涇東泰岐之粟給軍紹先懼遂稱藩送質長史于謹言于泰曰明公據關中險固將士驍勇土地膏腴今天子在洛迫于羣凶若陳公訴誠請都關右挾天子以令諸侯奉王命以討暴亂此桓文之業千載一時也泰善之拔也代北復姓惡蚝名可朱渾代北三字姓元字道元違東人高歡復遣使甘言厚幣以結泰泰不受封其書以聞魏主命泰引軍而東泰使雍州刺史梁禦字善通安定人入據長安魏主以泰為關西大都督略陽縣公承制封拜夏四月癸丑朔日食六月魏高歡舉兵反秋七月魏主修奔長安歡入洛陽推清河王亶懌之子承制決事魏主以宇文泰為大將軍尚書令侍中封隆之言于高歡曰斛斯椿等必搆禍亂孫騰泄其言椿白魏主隆之及騰皆逃就歡華山王鷙字孔雀髙涼王孤六世孫在徐州歡使大都督邸珍字安寶中山上曲陽人奪其管鑰建州魏置今山西澤州府是刺史韓賢字普賢廣寧石門人濟州刺史蔡俊廣寧石門人歡黨也魏主皆罷之又增置勳府庶子騎官各數百人欲伐晉陽下詔戒嚴云欲伐梁發河南兵詣洛陽魏主密詔歡曰宇文黑獺賀拔勝有異志故假南征潛為之備王宜近為形援歡表曰臣今潛勒兵馬三萬自河東渡又遣庫狄干等自來違津渡婁昭等討荆州尉景等討江左皆勒所部伏聼處分魏主知歡覺其變乃止歡軍歡亦表云臣為嬖侫所間一旦受疑陛下若垂信赤心願賜斟量亟令廢出魏主以源子恭宇陽胡汝陽王暹守石濟又以賈顯智為濟州刺史蔡俊不受代魏主愈怒乃為敕賜歡曰聞庫狄干語王云本欲取懦弱者為主無庸立此長君使其不可駕馭今但作十五曰行自可廢之此論自是王問勳人豈出侫臣之口隆之孫騰逃去不罪王若盡誠何不斬送啓云西去而四道俱進南渡洛陽東臨江左聞者寧能不疑王若舉旗南指縱無匹馬隻輸猶若奮拳而爭死假令還為王殺幽辱虀粉了無遺憾陽來違津胡三省注在平城之西自此渡河至夏州胡即陽壺城在今山西絳州垣曲縣地近河崤谷之北岸也石濟注見前王思政言于魏主曰高歡之心昭然可知洛陽非用武之地宇文泰乃心王室今往就之還復舊京何慮不克魏主深然之遣侍郎栁慶字更興河東解人見泰于高平泰請奉迎輿駕魏主復私謂慶曰朕欲向荆州何如慶曰關中形勝宇文泰才略可依荆州地非要害南逼梁寇臣愚未見其可時東郡太守裴俠帥兵詣洛思政問以西巡之訃俠曰宇文泰已操戈矛寧肯投人以柄雖欲投之恐無異避湯入火也思政曰然則何如而可俠曰圖歡有立至之憂西巡有將來之禍且至關右徐思其宜耳思政然之乃進俠于魏主授左中郎將裴俠字嵩和河東解人初歡欲遷都于鄴魏主不可至是復謀遷都遣騎屯建興魏郡後改曰高都故城在今山西澤州府鳳臺縣益河東及濟州兵擁諸州和糴粟悉入鄴魏主又以敕喻歡令歸兵罷戍送相州之粟使蔡俊受代邸珍出徐歡不奉詔魏主以廣寧太守任祥字延敬廣寧人兼僕射祥棄官走渡河據郡待歡魏主乃下制書數歡罪惡以宇文泰為關西大行臺令遣騎奉迎歡遂勒兵南出以誅斛斯椿為名以高敖曹為前鋒宇文泰亦移檄州郡數歡罪惡自將大軍發高平前軍屯恆農七月魏主親勒兵十餘萬屯河橋以斛斯椿為前驅陳于邙山之北椿請帥精騎二千夜渡河掩其勞弊魏主然之侍郎楊寬字蒙仁華隂人曰假兵于人恐生他變椿若有功是滅一高歡生一高歡矣魏主敕椿停行椿歎曰頃熒惑入南斗今上信左右間搆不用吾計豈天道乎宇文泰聞之謂左右曰高歡數日行八九百里此兵家所忌當乘便擊之而主上以萬乘之重不能渡河決戰方緣津據守且長河萬里扞禦為難若一處得渡大事去矣即以趙貴自蒲坂濟趣并州遣李賢字賢和隴西成紀人將精騎一千赴洛陽魏主使斛斯椿與潁川王斌之字子爽安樂王鑒之弟鎮虎牢賈顯智鎮滑臺顯智降于歡歡引軍渡河斌之與椿爭權還紿魏主云歡兵已至魏主即召椿還與南陽王寶炬清河王亶廣陽王湛深之子以五千騎宿于瀍西衆知魏主將西亡者過半亶湛亦逃歸將軍獨孤信魏部內入諸姓有獨孤氏信雲中人單騎追魏主魏主歎曰將軍辭父母捐妻子而來世亂識忠臣豈虛言也明日奔長安歡遂入洛陽遣婁昭高敖曹輕騎追魏主不及魏主糗漿乏絶惟飲澗水至稠桑都督毛鴻賓迎獻酒食始解飢渴稠桑驛名今在陜西靈寶縣西即春秋桑田也毛鴻賓北地三原人歡集百官責以處不諫諍出不陪從之罪殺僕射辛雄以下數人推清河王亶為大司馬承制決事宇文泰使趙貴梁禦帥甲騎奉迎魏主循河西上謂禦等曰此水東流而朕西上若得復見洛陽親謁陵廟卿等功也魏主及左右皆流涕泰備儀衛迎魏主謁見于東陽驛在今西安府渭南縣東以近東陽谷故名魏主遂入長安以泰為大將軍雍州刺史兼尚書令軍國之政咸取決焉别置二尚書分掌機事以毛遐字鴻逺鴻賓兄周惠達字懷文章武文安人為之時軍國草創二人積糧儲治器械簡士馬魏朝賴之先是熒惑入南斗去而復還留止六旬梁主以諺云熒惑入南斗天子下殿走乃跣足下殿以禳之及聞魏主西奔慚曰彼亦應天象耶魏髙歡屯華隂使侯景取荆州賀拔勝奔梁髙歡自追迎魏主至恆農遂攻潼關克之進屯華隂賀拔勝帥所部西赴關中至淅陽魏郡隋改曰內鄉今為縣屬河南南陽府聞歡已屯華隂遂還先是魏主將發洛陽召勝赴行在所勝以問掾盧柔柔曰髙歡悖逆公席卷赴都輿決勝負死生以之上䇿也北阻魯陽南并舊楚東連兖豫西引關中中策也舉三荆之地庇身于梁功名皆去下策也勝笑而不應及是勝將還行臺左丞崔士謙曰今帝室顛覆主上蒙塵公宜倍道兼行朝于行在然後與宇文行臺同心戮力唱舉大義天下孰不望風響應今捨此而退恐人人解體一失事機後悔何及勝不能用荆盧柔字子剛范陽涿人崔士謙安平人辨之孫三魏置荆州于穰注見前又置南荆州于安昌今汝寧府確山縣是又置東荆州于比陽今南陽府泌陽縣是馮智舒以三荆為三楚非是歡自發晉陽及至華隂凡四十啓魏主皆不報乃東還遣侯景向荆州遇勝景逆擊之勝敗奔梁冬十月魏高歡立清河世子善見於洛陽是為東魏孝靜帝歡還洛陽又遣僧道榮奉表于魏主魏主亦不答歡乃集百寮沙門耆老議所推立時清河王亶出入已稱警蹕歡醜之謂亶曰欲立王不如立王之子亶不自安南走歡追還之善見即位時年十一魏於是始分為二考魏自孝武西奔于是有東魏西魏之稱綱目于在西者提綱仍書魏以魏統相承也惟高歡所立乃加車字以别今依之魏以宇文泰為大丞相泰攻潼關斬高歡守將薛瑜還長安進位大丞相十一月東魏遷于鄴高歡以魏主孝武帝既西恐逼崤陜洛陽復在河外接近梁境如向晉陽形勢不能相接乃議遷鄴書下三日車駕便發户四十萬狼狽就道歡留洛陽部分事畢還晉陽以僕射司馬子如高隆之侍中高嶽孫騰留鄴共知朝政改相州刺史為司州牧魏郡太守為魏尹時童謡云可憐青雀子飛去鄴城裏羽翮垂欲成化作鸚鵡子好事者竊言雀謂魏主清河王鸚鵡謂歡也閏十二月魏宇文泰進毒弒其君修魏主閨門無禮從妹不嫁者三人平原公主明月南陽王寶炬同産也從入關宇文泰使人殺之魏主不悅遂與泰有隙閏十二月魏主在逍遙園晏阿至羅使夜還飲酒遇鴆而殂殯於佛寺諡曰孝武十年乃葬諫議大夫宋球慟哭嘔血漿粒不入口者數日泰以其名儒不之罪也魏都督獨孤信克荆州東魏人襲之信奔梁東魏既取荆州魏以獨孤信為刺史招懷之東魏遣恆農太守田八能拒信于淅陽又遣都督張齊民出信後信謂其衆曰今士卒不滿千人首尾受敵若還擊齊民士民謂我退走必來邀我不如進擊八能破之齊民自潰矣遂擊破八能乘勝襲穰城東魏刺史辛纂出戰大敗還趣城門未及闔信前驅武川楊忠本華隂人家于武川隋文帝之父也叱門者曰大軍已至爾等求生何不避走門者皆散忠帥衆入城斬纂以徇城中懾服信分兵定三荆居半歲東魏高敖曹侯景將兵奄至城下信兵少不敵與楊忠皆奔梁乙梁大同元年魏文帝寶炬卯大統元年東魏天平二年春正月朔魏宇文泰立南陽王寶炬是為文帝魏宇文泰與羣臣議所立多舉廣平王贊孝武帝之兄子濮陽王順常山王素之孫垂涕謂泰曰高歡逼逐先帝立幼主以專權明公宜反其所為廣平幼沖不如立長君而奉之泰乃立南陽王寶炬即位于城西大赦改元魏宇文泰自為都督中外諸軍事封安定公魏以泰為都督中外諸軍録尚書事大行臺封安定王泰固讓王爵及録尚書魏主許之乃改封安定公魏立后乙弗氏其先吐谷渾渠帥歸魏為洛陽人后仁恕節儉不妬忌魏主重之東魏高歡擊稽部即步落稽注見前斬劉蠡升初魏孝昌中稽部劉蠡升自稱天子居雲陽谷在今朔平府左雲縣明于此置雲陽堡邊境歲被其冦謂之稽荒至是歡襲擊大破之其北部王斬蠡升首以降東魏高歡自為相國假黃鉞加殊禮復辭不受魏作新制二十四條魏宇文泰以軍旅未息吏民勞弊命所司斟酌古今可以便時適治者為二十四條新制奏行之魏宇文泰以蘇綽字令綽武功人為行臺左丞綽先為行臺郎中宇文泰未深知之然諸曹疑事皆詢于綽而後定臺中咸稱其能已而泰與僕射周惠逹論事惠逹不能對請出議之以告綽綽為之區處惠逹入白之泰稱善曰誰與卿為此議者惠逹以綽對且稱綽有王佐才乃擢綽為著作郎會泰與公卿如昆明池觀漁行至漢故倉池在西安府長安故城內水經注池在末夾宫西顧問左右莫有知者召綽問之具以狀對泰悅因問天地造化之始歷代興亡之迹綽應對如流泰與並馬而還留至夜問以政事卧而聽之綽指陳為治之要泰起整衣危坐不覺膝之前席語逹曙不厭詰朝謂惠逹曰蘇綽真奇士吾方任之以政即拜大行臺左丞參典機密自是寵遇日隆綽始制文案程式朱出墨入及計帳課後之大數户籍户口之籍之法後人多遵用之夏五月魏宇文泰自加柱國初魏敬宗始置柱國大將軍以寵爾朱榮位在丞相上榮敗後此官遂廢至是泰復為之自大統十六年以前加柱國考泰及李虎元欣李弼獨孤信趙貴于謹侯莫陳崇凡八人時稱八柱國家元欣字慶樂廣陵王羽之子大統中紹封侯莫陳崇字尚樂武川人魏閣內都督趙剛字僧慶洛陽人以東荆州歸于魏先是趙剛以東荆州兵西赴關中魏孝武帝之在洛陽也剛奉密敕召東荆州刺史馮景昭入援兵未及發而孝武入關景昭集文武議所從司馬馮道和請待北方處分剛抽刀投地謂景昭曰公若欲為忠臣請斬道和如欲從賊可速見殺景昭感悟遂帥衆而西會高歡遣侯景向荆州州民楊祖歡起兵應景邀剛于路刺史馮景昭戰敗剛沒蠻中至是剛自蠻中往見東魏東荆州刺史李愍趙郡人勸令附魏愍從之剛由是得至長安宇文泰以為光祿大夫剛説泰召賀拔勝獨孤信等于梁泰使剛往請之勝與信等在梁梁主待之甚厚剛再至魏興因梁梁州刺史杜懷珍移書建康梁主禮送勝等還魏勝懷梁主恩見鳥獸南向者皆不射之信與楊忠至長安宇文泰愛忠之勇留置帳下冬十一月梁侍中徐勉卒勉雖骨鯁不及范雲亦不阿意茍合故梁世言賢相者稱范徐云東魏封高洋歡次子即北齊文宣帝為太原公洋內明決而外如不慧衆皆嗤鄙之獨歡異之謂長史薛琡字墨珍代人曰此兒識慮過吾洋幼時歡嘗欲觀諸子意議使各治亂緣洋獨抽刀斬之曰亂者當斬又各配兵四出使人帥甲騎偽攻之兄澄等皆怖撓洋獨勒衆與格攻者免胄言情猶擒以獻丙梁大同二年魏大統辰二年東魏天平三年春正月東魏高歡襲魏夏州注見前取之魏靈涼州靈州魏孝昌中置今屬甘肅寧夏府涼州注見前亦叛附於歡高歡帥庫狄干等萬騎襲魏夏州身不火食四日而至縛矟為梯夜入其城禽其刺史斛律俄彌突因而用之留都督張瓊字德建代人將兵鎮守遷其部落以歸魏靈州刺史曹泥與其壻涼州刺史劉豐字豐生普樂人復叛降東魏魏人圍之水灌其城不沒者四尺歡命阿至羅發騎三萬徑度靈州繞出魏師之後魏師退歡迎泥及豐拔其遺户五千以歸二月東魏高歡遣其世子澄入鄴輔政東魏以為尚書令京畿大都督東魏渤海世子澄年十五入鄴輔政用法嚴峻事無凝滯中外震肅引崔暹為左丞親任之初澄通于歡妾一婢告之歡杖澄而幽之婁妃亦隔絶不得見歡納魏敬宗之后爾朱氏有寵生子浟欲立之澄求救于司馬子如子如入見偽為不知者請見婁妃歡告其故子如曰妃是王結髮婦王在懷朔被杖背無完皮妃晝夜供侍同走并州然馬矢自作靴恩義何可忘也且婁領軍之勳何宜搖動一女子如草芥况婢言不足信邪歡固使子如更鞠之子如盡反其辭乃啓歡曰果虛言也歡大悅父子夫婦復如初東魏高歡以陳元康字長猷廣宗人為功曹高季式薦元康于高歡曰是能夜中暗書謂能暗中書字快吏也歡召之一見即授功曹掌機密時軍國多務元康問無不知與功曹趙彥深名隱以字行南陽宛人同知機密而元康性柔謹歡甚親之曰此人天賜我也三月梁處士陶𢎞景字通明丹陽秣陵人卒𢎞景博學好養生仕齊為奉朝請棄官隱居茅山即句曲山在今江寧府句容縣南漢茅盈與其弟衷固來此世號三茅君因以名山梁主早與之遊及即位恩禮甚篤每得其書焚香虔受屢以手敕招之𢎞景不出國家每有大議必先咨之時人謂之山中宰相及是卒諡貞白先生𢎞景將歿為詩曰夷甫任散誕平叔坐論空豈悟昭陽殿遂作單于宫時士大夫競論元理不習武事故𢎞景詩及之夷甫晉玉衍字平叔晉何晏字夏四月梁以江子四濟陽考城人為右丞子四上封事極言得失梁主詔曰古人有言屋漏在上知之在下朕有過失不能自覺子四所言尚書時加檢括速以啓聞秋九月東魏行臺侯景侵梁梁陳慶之擊破之冬十二月東魏及梁平魏大飢人相食死者什七八丁梁大同三年魏大統己三年東魏天平四年春正月東魏高歡侵魏魏宇文泰擊破之殺其將竇泰歡别將襲魏洛州此魏太和中所置之洛州治上洛今陜西商州是執其刺史泉企字思道上洛豐陽人初魏主下詔數高歡二十罪歡亦移檄謂宇文泰斛斯椿為逆徒至是歡遣司徒高敖曹攻上洛大都督竇泰攻潼關而自將軍蒲坂造三浮橋欲渡河魏宇文泰出軍廣陽魏縣屬馮翊郡故城今在西安府臨潼縣謂諸將曰賊掎吾三面作浮橋以示必渡此欲綴吾軍使竇泰得西入耳泰屢勝而驕襲之必克克泰則歡不戰自走矣諸將皆曰不如分兵禦之宇文泰曰賊雖作橋未能徑渡不過五日吾取竇泰必矣乃聲言欲保隴右而潛軍東出竇泰猝聞軍至渡河宇文泰擊破之士衆皆盡竇泰自殺先是宇文泰還長安問計于族子直事郎中深深曰竇泰歡之騎將今大軍攻蒲圾則歡拒守而泰救之吾表裏受敵此危道也不如選輕鋭潛出小關竇泰躁急必來決戰歡持重未即救我急擊泰必可擒泰擒則歡勢自阻回師擊之可以決勝宇文泰曰是吾心也遂從之宇文深字奴干小關在潼關左今曰禁峪口高歡撒浮橋而退敖曹自商山轉戰而進所向無前遂攻上洛郡人泉嶽及弟猛略與杜窋等謀翻城應之洛州刺史泉企知之殺嶽及猛略窋走歸敖曹敖曹以為鄉導而攻之企固守旬餘二子元禮仲遵力戰仲遵傷目城遂陷企見敖曹曰吾力屈非心服也敖曹以杜窋為洛州刺史欲遂入藍田關聞竇泰軍沒而還敖曹以企反元禮自隨企私戒二子曰吾餘生無幾汝曹才器足以立功勿以吾故遂虧臣節元禮逃還與仲遵隂結豪右襲窋殺之魏以元禮世襲洛州刺史企尋卒于鄴夏六月東魏遣使如梁東魏遣散騎常侍李諧字虔和平之孫聘于梁梁主與語應對如流因目送之謂左右曰卿輩常言北間無人物此等何自而來邪是時南北通好務以俊乂相誇銜命接客必盡一時之選每梁使至鄴鄴下為之傾動宴日高澄常使左右覘之一言制勝為之拊掌魏使至建寧亦然秋八月梁修長干塔今江寧府城南有大報恩寺塔髙百餘丈即古長干寺塔也宋明皆重修寺前大道即古長干里梁主修長干寺阿育王塔出佛爪髮舍利魏書釋老志釋迦佛既謝世香木焚尸靈骨分碎大小如粒擊之不壤焚亦不燋或有光明神驗謂之舍利弟子收置寶瓶募建宫宇謂為塔塔猶言宋廟也于後有王阿育以神力分佛舍利于諸鬼神造八萬四千塔布于世界皆同日而就幸寺設無礙食大赦閏九月梁以武陵王紀字世詢梁主第八子為益州刺史紀以道逺固辭梁主曰天下方亂唯益州可免故以處汝汝其勉之東魏高歡侵魏冬十月魏宇文泰迎戰渭曲渭水之曲在今陜西同州府大荔縣東南大敗之髙歡將兵二十萬趣蒲津關名在同州府朝邑縣東即古臨晉關也今曰大慶關使高敖曹將兵三萬出河南時關中飢魏宇文泰所將不滿萬人屯恆農五十餘日聞歡將濟河乃引兵入關敖曹遂圍恆農歡引兵自蒲津濟河涉洛此沮洛也注見前軍于許原西先是長史薛琡言于歡曰西人連年飢饉故冒死入陜州欲取倉粟今敖曹己圍陜城粟不得出但置兵諸道勿興野戰比及麥秋民自飢死寶炬黑獺何憂不降願勿渡河侯景曰今兹舉兵形勢極大萬一不捷梓難收斂不如分為二軍相繼而進歡不從及濟河至馮翊謂魏刺史王羆曰何不降羆大呼曰此城是王羆冢欲死者來歡知不可攻乃止許原即商原在大荔縣北水經注洛水南徑商原西俗謂許原也泰至渭南徴諸州兵皆未會欲進擊歡諸將以衆寡不敵請待歡更西以觀其勢泰曰歡若至長安人情大擾今及其新至可擊也即造浮橋于渭令軍士齎三日糧輕騎渡渭十月至沙苑在今大荔縣東與朝邑縣接界地宜畜牧唐于此置監距東魏軍六十里時諸將皆懼宇文深獨賀曰歡懸師渡河非衆所欲獨歡恥失竇泰愎諫而來所謂忿兵可一戰擒也願假深一節發王羆之兵邀其走路使無遣類泰遣須昌公違奚武覘歡軍武從三騎皆效歡將士服日暮去營數百步下馬潛聽得其軍號因上馬歷營若警夜者有不如法往往揵之具知敵之情狀而還逹奚武字成興代人歡聞泰至引兵會之李弼謂泰曰彼衆我寡不可平地置陳此東十里有渭曲可先據以待之泰從之背水東西為陳李弼趙貴為左右拒命將士皆掩戈于葦中約聞鼓聲而起晡時東魏兵至望見魏兵少爭進擊之無復行列泰鳴鼓士皆奮起合戰李弼等帥鐵騎橫擊之東魏兵中絶遂大破之歡欲收兵更戰斛律金曰衆心離散不可復用歡乃馳去夜渡河喪甲士八萬人鎧仗十八萬泰追至河上選留甲士二萬餘人餘悉縱歸李穆字顯慶賢之弟曰高歡破膽矣速追之可獲泰不聽還軍渭南所徴之兵甫至乃于戰所人種桞一株以旌武功侯景言于歡曰黑獺驟勝而驕必不為備願得精騎二萬徑往取之歡以告婁妃妃曰設如其言景豈有還理得黑獺而失景何利之有歡乃止高敖曺間歡敗釋恆農退保洛陽魏宇文泰伐東魏東魏秦州魏置泰州于河東郡今山西蒲州府是降泰遂略定汾絳二州名汾東魏之南汾州治定陽今山西吉州是絳魏曰東雍州後周更名今山西絳州是進取洛陽豫州此魏之北豫州治虎牢今開封府汜水縣是潁梁廣陽等州魏潁州治潁隂今河南詐州是梁州治大梁今河南開封府是廢州治魯陽今汝州魯山縣是陽州治宜陽今河南府宜陽縣是皆降魏遣行臺王季海與獨孤信趣洛陽李顯趣三荆賀拔勝李弼圍蒲坂東魏秦州别駕薛善字仲良汾隂人聽弟子開門納魏軍刺史薛崇禮善族兄棄城走追獲之宇文泰進軍蒲坂略定汾絳先是崇禮固守蒲坂善謂口高歡有逐君之罪善與兄忝衣冠緒餘世荷國恩今大軍已臨而猶為歡守一旦城陷送首長安署為逆賊死有餘愧及今歸疑猶為愈也崇禮猶豫不決善與族人斬關以納魏師及泰既定汾絳凡薛氏預開城之謀者皆賜五等爵善曰背逆歸順臣子常節豈容闔門俱叨封邑與其弟慎用辭不受薛慎字佛護獨孤信至新安漢縣魏置郡今為縣屬河南府高敖曹引兵北渡河信逼洛陽洛州東魏改司州為洛州今河南府是刺史廣陽王湛棄城歸鄴信遂據金墉城潁州長史賀若統魏內入諸姓有賀若氏統代人舉城降魏梁州滎陽廣州皆降十一月東魏行臺任祥攻潁川宇文泰使大都督宇文貴字永貴憂州人救之諸將咸以為彼衆我寡不可爭鋒貴曰彼謂吾兵少必不敢進今進據潁川出其不意破之必矣遂疾趣據潁川背城為陳以待其至合戰大破之俘其士卒萬餘人悉縱之乘勝追擊又大敗之東魏將是云寶是云代北復姓殺其陽州刺史以降魏都督韋孝寬名叔裕以字行京兆杜陵人攻豫州拔之于是東魏河南諸州多入于魏明年二月東魏遣賀拔仁侯景復取南汾潁豫廣四州賀拔仁字天惠善無人戊梁大同四年魏大統午四年東魏元象元年春正月辛酉朔日食二月魏廢其后乙弗氏立柔然女郁久閭氏為后初柔然頭兵可汗事魏盡禮永安以後不復稱臣得魏淳于覃親寵任事使典文翰及是數為邊患魏宇文泰欲結婚以撫之言于魏主以乙弗后為尼使扶風王孚迎頭兵女為后頭兵遂留東魏使者而送后于魏柔然營幕户席皆東向孚請正南靣后曰我未見魏主固柔然女也魏仗南靣我自東向秋八月東魏遣兵圍金墉魏宇文泰救之斬其將髙敖曹復戰不利引還東魏遣侯景髙敖曹等圍魏獨孤信于金墉髙歡帥大軍繼之魏主與宇文泰俱東李弼達奚武帥千騎為前驅至穀城溪縣晉省故城在今洛陽縣侯景等欲整陳以待其至莫多婁貸文莫多婁代北三字姓貸文太安狄那人請擊之進遇李弼敗死泰進軍瀍東景等夜解圍去泰帥輕騎追至河上景為陳北據河橋南屬邙山與泰合戰泰馬驚逸墮地東魏兵追及之左右背散李移以策扶泰罵曰籠東軍士爾主何在而獨留此追者不疑捨之穆因以馬授泰與俱逸魏軍復撅子籠東摧敗披靡之貌見掦倞荀注泰擊東魏兵大破之高敖曹意輕泰建旗蓋以陵陳魏人盡鋭攻之一軍皆沒敖曹單騎走投河陽南城守將高永樂歡從祖兄子與敖曹有怨閉門不納追者斬之高歡聞之如喪肝膽然是日置陳既大首尾懸逺從旦至未戰數十合氛霧四塞莫能相知魏諸軍戰不利燒營而歸留儀同三司長孫子彥本名俊衆之子守金墉王思政舉矟陷陳被創絶思政每戰常著破衣弊甲敝不知其將帥故得免將軍蔡祐下馬帥左右十餘人擊東魏兵殺傷甚衆東魏人圍之祐彎弓持滿四面拒之東魏人募厚甲長刀者直進取之去祐三十步左右勸射之祐曰吾曹之命在此一矢豈可虛發將至十步祐乃射之應弦而倒東魏兵稍却祐徐引還祐每戰常為士卒先戰還諸將皆爭功祐終無所言泰每歎曰承先口不言勳我當代其論敘因以王思政為東道行臺使鎮恆農承蔡祐高平人先其字也魏長安亂宇文泰討平之魏之東伐關中留守兵少前後所俘東魏士卒散在民間聞魏兵敗謀作亂李虎與周惠達等輔魏太子欽出次渭北關中大擾于是沙苑所俘東魏都督趙青雀雍州民于伏德等遂反青雀據長安子城伏德保咸陽與太守慕容思慶各收降卒以拒還師魏主留止閿鄉令泰討之泰引兵西入長安父老且悲且喜士女咸相賀華州刺史宇文導字菩薩泰兄子襲咸陽斬思慶擒伏德渡渭與泰會遂攻青雀破之東魏高歡拔金墉魏師走范陽人起兵應魏東魏擊平之歡自晉陽將騎濟河遣别將追魏師至崤不及自攻金墉長孫子彥棄城走歡毁金墉而還范陽盧仲禮及弟景裕字仲孺兄子起兵應魏東魏都督賀拔仁擊仲禮等平之景裕本孺生歡釋之使教諸子景裕講論精徵難者或相詆訶大聲厲色而景裕神彩儼然風調如一從容往復無際可尋性清靜歷官屢有進退無得失之色弊衣粗食恬然自安終日端嚴如對賓客是冬魏遣是云寶復襲洛陽趙剛襲廣州皆拔之于是自襄魏襄州治北南陽今南陽裕州是廣以西城鎮復為魏東魏禁擅立寺魏自正光以後四方多事民避賦役多為僧尼至二百萬人寺三萬餘區至是始詔長吏擅立寺者計庸用也以枉法論魏取宜陽行臺王思政城玉璧在今山西絳州稷山縣南後周于此置勳州隋廢徙鎮之東魏將假琛字懷寶代人等據宜陽遣牛道恆誘魏邊民韋孝寬患之乃詐為道恆與孝寬書道歸欵之意使諜遺之琛營琛果疑之孝寬乘其猜阻襲而禽之崤澠遂清王思政以玉璧險要請築城自恆農徙鎮之後高歡侵魏入自汾絳思政守玉璧以斷其道歡圍之九日遇大雪士卒多死乃解圍去事在魏大統八年東魏改停年格東魏以高澄攝吏部尚書始改崔亮年勞之制銓擢賢能又沙汰尚書郎妙選人地以充之凡才名之士皆引致門下與之遊宴已梁大同五年魏大統未五年東魏興和元年春正月梁以何敬容字國禮廬江人為尚書令自晉宋以來宰相皆以文義自逸敬容獨勤簿領日旰不休為俗所嗤自徐勉周捨既卒當權要者外朝則敬容內省則朱異敬容質慤無文以綱維為己任異文華敏洽曲營世譽善伺主意為阿諛用事三十年廣納貨賂欺罔視聽逺近莫不忿疾宅玩好飲膳聲色窮一時之盛每休下車馬填門惟王承王稚及褚翔不往王承字安期險之孫稚承弟褚翔字世舉之曾孫魏宇文泰置行臺學泰于行臺置學令丞郎府佐旦治公務晚就講習冬十月魏置紙筆于陽武門以求言十一月東魏行興光歷校書郎李業興上長子人所修也行之梁分諸州為五品朱異奏頃來置州稍廣而小大不倫請分為五品其位秩高卑參僚多少皆以是為差詔從之于是上品二十州次品十州次品八州次品二十三州次品二十一州梁主方事征伐恢拓境宇北踰淮汝東距彭城西牂牁南平俚洞建置州郡紛綸甚衆其下州皆異國降人有名無地職貢罕通五品之外又有二十餘州不知處所凡一百七州又邊境鎮戍雖領兵不多欲重其將帥皆建為郡州郡雖多而户口日耗矣魏制禮樂魏自西遷以來禮樂散逸宇文泰命僕射周惠達郎中唐瑾字附璘北海平壽人損益舊章至是稍備庚梁大同六年魏大統申六年東魏興和二年春二月柔然侵魏魏主殺其故后乙弗氏柔然舉國南侵時頗有言以后故興師者魏主乃賜乙弗后自盡柔然至夏州而退未幾郁久閭后亦遇疾殂夏閏五月丁丑朔日食冬十一月吐谷渾遣使如東魏吐谷渾自莫折之亂不通于魏伏連籌卒子夸吕立始稱可汗治伏俟城在今青海西隋于此置西海郡其地東西三千里南北千餘里是歲始遣使假道柔然聘于東魏辛梁大同七年魏大統酉七年東魏興和三年秋七月魏以宇文測字澄鏡深之兄為大都督行汾州此汾州西魏置治隰川今山西隰州是事測為政簡惠得士民心汾州地接東魏東魏人數來寇抄測禽獲之解縛引見待以客禮并給糧餼衛送出境東魏人大慙不復為寇時有告測交通境外者宇文泰怒曰測為我安邊何得間我骨肉命斬之九月魏省官員置屯田頒六條宇文泰欲革時政為強國富民之法度支尚書蘇綽贊成其事減官員置二長并置田屯以資軍國又為六條詔書一清心二敦化三盡地利四擢賢良五恤獄訟六均賦役泰常置諸坐右令百司習誦之非通六條及計帳者不得居官既而又益新制十二條冬十月東魏頒麟趾格東魏詔羣官于麟趾閣議定法制謂之麟趾格行之東魏大稔魏自喪亂以來農啇失業六鎮之民就食齊晉東西分裂連年戰爭公私困竭民多餓死高歡命諸州濱河皆置倉積穀以供軍旅備飢饉又于傍海煮鹽軍國粗贍又以諸州調絹不依舊式民甚苦之奏令悉以四十尺為匹至是東方連歲大稔穀斛至九錢山東之民稍復蘇息矣臨淮王孝友言令制百家為族二十五家為閭五家為比百家之內有帥二十五徵發皆免苦樂不均復有蠶食為弊久矣京邑諸坊或七八百家唯一里正二史庶事無闕請每閭止為二比計族省十二丁資絹畨兵所益甚多事下尚書寢不行臨淮王孝友彧之弟資絹謂討資輸絹番兵謂番代為兵也壬梁大同八年魏大統戍八年東魏興和四年春正月梁安成注見前妖人作亂三月江州司馬王僧辨字君才太原祁人討平之安成望族劉敬躬以妖術惑衆遂據郡反時南方久不習兵人情擾駭江州刺史湘東王繹梁主第七子即梁元帝遣司馬王僧辨討斬之僧辨該博辨捷器宇肅然雖射不穿札而志氣高逺秋八月東魏以侯景為河南大行臺冬十二月梁盧子略作亂監西江即漢牂牁江注見前督護高要漢縣梁置郡隋以後仍為縣今為廣東肇慶府治太守陳霸先吳興長城下若里人即陳髙祖討平之陳霸先事始此先是梁交州人李賁反賁世為交址豪右仕不得志又有并韶者富于詞藻詣選求官尚書蔡撙以并姓無前賢除廣陽門郎韶耻之與賁俱還鄉里會交州刺史武林侯咨以刻暴失衆心二人因連結數州豪傑俱反陽蔡撙字景節廓之孫武林侯咨字世泰鄙王恢之子梁主遣高州梁置今為府屬廣東刺史孫冏新州梁置治興新今肇慶府新興縣是刺史盧子雄討之時春瘴方起衆潰而歸武林侯咨奏冏及子雄通賊逗留皆賜死于是子雄弟子略及杜僧明字𢎞照廣陵臨澤人周文育字景德義興陽羡人等舉兵攻廣州欲殺咨時咨奔還廣州監西江督護蕭子顯曰廣州統內西南二江川源深逺别置督護專征討之任高要太守陳霸先帥精甲三千救之大破子略等擒僧明文育霸先以二人驍勇釋之以為主帥詔以霸先為直閣將軍霸先身長七尺五寸目角覆顔垂手遇膝既平盧子略等梁主遣畫工圖其容貌而觀之癸梁大同九年魏大統亥九年東魏武定元年春二月東魏北豫州刺史高仲密以虎牢降魏三月魏宇文泰帥軍應之及東魏高歡戰于邙山大敗而還東魏北豫州刺史高仲密隂謀外叛高歡疑之遣奚夀興典其軍事仲密執之以虎牢降魏初仲密為御史中尉取崔暹之妹既而棄之由是與暹有隙選用御史多其親黨高澄奏令改選仲密疑暹搆已愈恨之仲密後妻李氏秀而慧澄見而悅之李氏不從以告仲密仲密益怨至是降魏歡以事由崔暹將殺之高澄為之固請歡乃釋之魏宇文泰帥諸軍應仲密三月圍河橋南城高歡將兵十萬至河北泰退軍瀍上縱火舟于上流以燒河橋斛律金使張亮字伯德西河隰城人以小艇百餘載長鎖伺火船將至以釘釘之引鎖向岸橋遂獲全歡渡河據邙山為陳數日泰留輜重夜襲之歡聞之正陳以待黎明泰至東魏彭樂字興安定人以數千騎衝魏軍所向奔潰遂馳入魏營獲泰督將僚佐四十八人諸軍乘勝擊魏大破之斬首三萬餘級歡使彭樂追泰泰窘謂樂曰癡男子今日無我明日豈有汝耶何不急還營收汝金寶樂從其言獲泰金𢃄一囊以歸言于歡曰黑獺漏刃破膽矣歡怒其失泰捽其頭連頓之持刃將下者三噤齘良久樂曰乞五千騎復為王取之歡曰汝縱之何意而言復取也乃赦之明日復戰泰為中軍與右軍若干惠若干代北復姓惠字惠保武川人合擊東魏大破之悉俘其步卒歡走從者七人追兵至都督尉興慶太安狄那人拒戰矢盡而死東魏降者告泰以歡所在泰募勇敢三千人皆執短兵配賀拔勝攻之勝執槊逐歡槊刃埀及段韶射勝馬斃之歡遂逸去勝歎曰今日不執弓矢天也左軍趙貴戰不利東魏兵復振泰與戰又不利遂遁入關屯渭上歡進至陜泰使開府儀同三司逹奚武拒之初泰召王思政于玉璧將使鎮虎牢未至而敗乃使守恆農思政入城開門解衣而卧慰勉將士示不足畏髙歡使劉豐生將數千騎追泰至憚之引還思政乃修城郭起樓櫓營農田積芻粟由是恆始有守之備泰亦廣募關隴豪右以增軍旅夏四月東魏復取虎牢宇文泰遣諜潛入虎牢令守將魏光固守侯景獲之改其書云宜速去縱諜入城光宵遁景獲高仲密妻子送鄴北豫洛二州復入于東魏高歡以高乾有義勳髙昻死王事皆為之請死其從坐仲密妻李氏當死高澄納之冬十一月東魏築長城于肆州注見前西自馬陵戍名在今山西欣州靜樂縣北東至土墱寨名在今代州崞縣西北甲梁大周十年魏大統子十年東魏武定二年春三月東魏以高澄為大將軍領中書監高歡多在晉陽委孫騰司馬子如高嶽高隆之以朝政鄴巾謂之四貴權勢熏灼專恣驕貪歡欲損奪其權故以澄領中書監移門下機事總歸中書文武賞罰皆稟于澄孫騰見澄不背盡敬澄叱左右牽下築以刀環立之門下歡謂羣公曰貌子浸長公宜避之于是公卿以下無不聳懼庫狄干澄姑之壻也自定州來謁立門外三日乃得見澄欲置腹心于東魏主左右擢崔季舒為中書侍郎崔季舒字叔正挺從子夏四月梁尚書令何敬容有罪免敬容復為太子詹事太子頻于元圃自講老莊敬容謂人曰昔晉代喪亂頗由祖尚元虛使中原淪于沙幕今東宫復襲此江南亦將為戎乎至是坐為妾弟書屬領軍免官秋七月魏更權衡度量頒新制魏更權衡度量命尚書蘇綽損益三十六條之制頒行之搜簡賢才為牧守令長皆依新制而遣焉數年之間百姓便之東魏以崔暹為中尉宗遊道為左丞魏自正光以後政刑弛縱在位多貪汚高歡啓以宋遊道為御史中尉澄請以崔暹為之以遊道為尚書左丞謂曰卿一人處南臺一人處北省當使天下肅然暹選畢義雲等為御史時稱得人澄與諸公出之東山遇暹于道前驅為赤棒所擊澄回馬避之尚書令司馬子如太師咸陽王垣貪黷無厭暹彈之削其官爵其餘死黜者甚衆歡與鄴下諸貴書曰崔暹居憲臺咸陽王司馬令皆吾布衣之舊同時獲罪吾不能救諸君其慎之遊道奏駁尚書違失數百條省中豪吏並鞭斥之高隆之遊道有不臣之言罪當死黃門侍郎楊愔曰畜狗求吠今以數吠殺之恐將來無復吠狗遊道竟坐除名之畢義雲衆敬之曾孫咸陽王垣禧子冬十月東魏括户均賦東魏以喪亂之後户口失實徭賦不均以孫騰高隆之為括户大使分行諸州得無籍之户六十餘萬僑居者皆勒還本屬乙梁大同十一年魏大統丑十一年東魏武定三年春三月魏遣使如突厥劉友益曰突厥始見此突厥本西方小國姓阿史那氏文獻通考突厥胸奴别種其先居西海之右為鄰國所滅遺一兒且十歲刖足斷臂棄大澤中有北狼銜肉食之得不死及長遂與狼交生十男其後各為一姓阿史那其一也世居金山即今阿爾泰山在巴里坤西北路蒙古謂金為阿爾垣泰即垣音之轉也之陽為柔然鐵工通考金山狀如兜鍪北俗呼兜鍪為突厥因以為號至其渠長土門始強大頗侵魏西邊至是魏使至其國人皆喜曰大國使者至吾國其將興矣夏六月魏作大誥晉氏以來文章競為浮華魏宇文泰欲革其弊命蘇綽作大誥宣示羣臣戒以政事仍命自今文章皆依此體梁遣兵討交州賊李賁敗之賁自稱越帝置百官梁遣交州刺史楊㬓天水西縣人公則之子討之以陳霸先為司馬瞟推霸先為前鋒賁敗奔嘉寧城在今安南國元和志安南都護府峯州治元寧縣諸軍圍之先是定州刺史蕭勃會㬓于西江説説留㬓曋集諸將問計霸先曰定州偷安日前不顧大計節下奉辭伐罪當死生以之豈可逗撓不進長寇沮衆乎遂勒兵先發至是軍至交州賁衆數萬于蘇歷江口立城柵以拒霸先霸先所向摧陷蘇定州梁置今廣西潯州府貴縣是蘇歷江今日來江在安南國交州府東北蕭勃吳平侯昺之子明年諸軍克嘉寧賁奔典徹湖胡三省注湖在新昌新昌即峯州也大造船艦充塞湖中衆軍憚之頓湖口不敢進霸先謂諸將曰我師老而無援入人心腹若戰不捷豈望生全今藉其屢奔人情未固正當共出百死決力取之無故停留時事去矣將士皆莫應會江水夜暴起七丈奔注湖中霸先勒所部兵乘流先進衆軍鼓譟俱前賁衆大潰竄入屈獠洞中屈獠斬賁傳首建康梁散騎常侍賀琛字國寶會稽山隂人上書論事詔詰責之琛啓陳四事一曰牧守貪殘略言今天下户口減落關外彌甚郡不堪州之控總縣不堪郡之裒削更相呼擾唯事徵斂豈非牧守之過歟東境户口空虛皆由使命紫數駑因守宰拱手聽其漁獵恭黠長吏因之重為貪殘雖年降復業之詔日下蠲賦之恩民不得反其居也二曰風俗侈靡略言今牧守所以貪殘良由風俗侈靡使然為吏致資鉏億罷歸不支數年率皆盡于燕飲之物歌謳之具所費等于邱山為歡止在俄頃乃更追恨向時所取之少一何悖哉其餘淫侈日見滋甚誠宜嚴為禁制道以節儉糾奏浮華變其耳目三曰斗筲競進略言陛下憂念四海不憚勤勞至于百司莫不奏事但斗筲之人譊競求進不論國之大體唯務吹毛求疵以深刻為能以繩逐為務迹雖似于奉公事更成其威福誠願責其公平之效黜其讒慝之心則下安上滋無徼幸之患矣四曰省事息費略言今天下無事而猶日不暇給宜省事息費事省則民養費息則財聚應內省職掌各簡所部有宜除除之有宜減減之興造有非急者徵求有可緩者皆宜停省以畜財而養民啓奏梁王大怒召主書于前口授敕書以責琛大指以為朕有天下四十餘年公車讜言日聽覽卿不宜自同茸止取名字寅之行路言我能上事恨朝廷之不用何不分别顯言某刺史橫暴某太守貪殘某使者漁獵邪士民飲食遇差若加嚴禁益增苛擾若指朝廷我無此事昔之牲牢久不宰殺朝中會同菜蔬而已我非公晏不食國家之食凡所營造皆以雇借成事純房室三十餘年雕飾之物不入于宫不飲酒不好音朝中尚晏未嘗奏樂三更治事日常一食昔腰十圍今裁二尺為誰為之救物故也卿又欲禁百司奏事絶競求進偏聽生姦獨任成亂二世之委趙高元后之付王莽呼鹿為馬又可法歟治署邸肆何者宜除何者宜減何處興造非急何處徵求可緩各出其事具奏以聞琛但謝過而已不敢復言梁主為人孝慈恭儉勤于政務冬月視事執筆觸寒手為皴裂自天監中用釋氏法長齋一食菜羹糲飯身衣布衣木棉皂帳一冠三載一衾二年雖居暗室恆理衣冠小坐盛暑未嘗褰袒對內豎小臣如遇大賓然優假士人太過牧守多侵漁百姓使者干擾郡縣又好親任小人頗傷苛察多造塔廟公私費損江南久安風俗奢靡故琛啓及之梁主惡其觸實故怒梁主疏簡刑法自公卿大臣咸不以繫獄為意姦吏招權弄法貨賂成市枉濫者多年老又持佛戒每斷重罪則終日不懌或謀逆事覺亦泣而宥之由是王侯益橫或白晝殺人暮夜剽掠梁主深知其弊而溺于慈愛不能禁也丙梁中大同元年魏大統寅十二年東魏武定四年春三月梁主講佛書于同泰寺夏四月同泰浮圖災復作之梁主幸同泰寺講三慧經四月講解是夕浮圖災梁主曰此魔也更宜廣為法事遂起十二層浮圖將成值侯景亂乃止秋八月梁以卲陵王綸為南徐州刺史梁主年高諸子心不相下互相猜忌卲陵王綸為丹陽尹湘東王繹在江州武陵王紀在益州皆權侔人主太子綱惡之常選精兵以衛東宫出綸為南徐州刺史冬十月梁以嶽陽王察為雍州刺史梁主既捨察兄弟而立太子綱內常愧之寵亞諸子使迭為東掦州以慰其心會稽人物殷阜故使為之察兄弟亦內懷不平至是察以梁主衰老朝多秕政遂蓄財下士招募勇敢至數千人以襄陽形勝梁業所基可圖大功乃克己為政撫循士民數施恩惠延納規諌所部稱治十一月東魏髙歡侵魏圍玉壁不克而還先是魏徙王思政為荆州刺史思政舉韋孝寬代為并州刺史守玉壁至是東魏髙歡悉山東之衆侵魏至玉壁圍而攻之晝夜不息孝寬隨機拒之城中無水汲于汾歡使移汾一夕而畢又于城南起土山欲乘之以入孝寬縛木接樓以禦之歡鑿地為十道孝寬掘長塹輒擒殺之塞柴投火以皮排吹之在地道內者亦皆焦爛歡以攻車撞城孝寬縫布為慢隨其所向懸空張之車不能壞歡又縛松麻于竿灌油加火以燒布焚樓孝寬作長鈎遙割之歡又于城四面穿地中施梁柱縱火燒之柱折城崩孝寬隨處豎木柵以扞之敵不得入城外盡攻擊之術而城中守禦有餘又奪據其土山歡無如之何乃使祖珽説之使降孝寬曰孝寬關西男子必不為降將軍也珽乃射募格于城中云能斬孝寬者拜太尉封郡公孝寬題書背返射城外云能斬髙歡者準此祖珽字孝徵瑩之子東魏苦攻五十日士卒死者七萬人歡智力皆困因而發疾乃解圍去歡之自玉璧歸也軍中訛言孝寬以定功弩射殺丞相歡聞之勉坐見諸賁使斛律金作敕勒歌自和之哀感流涕勒斛律金敕勒部人也故歡使作敕勒歌其辭曰敕川陰山下天似穹廬籠罩四野天蒼蒼野茫茫風吹草低見牛羊魏度支尚書蘇綽卒綽性忠儉常以喪亂未平為己任薦賢拔能紀綱庶政宇文泰推心任之綽嘗謂為國之道當愛人如慈父訓人如嚴師每與公卿議論自晝逹夜事無巨細若指諸掌積勞成疾而卒泰深痛惜之謂公卿曰蘇尚書平生亷讓吾欲全其素志悠悠之徒有所未逹如厚加贈諡又乖夙昔相知之心何為其可令史麻瑶越次進曰儉約所以彰其美也泰從之歸葬武功載以布車一乘泰與羣公步送之酹酒言曰爾知吾心吾知爾意方欲共定天下遽舍吾去奈何因舉聲慟哭不覺巵落于手史臣曰周文提劍而起百度草創施約法之制于競逐之辰修太平之禮于鼎峙之日終能斫雕為朴變奢從儉風化既被而下肅上尊疆場屢動而內安外附斯蓋蘇綽之力也御批厯代通鑑輯覽卷四十三

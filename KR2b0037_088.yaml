front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷八十九宋光宗皇帝庚戌紹熙元年金章宗璟明昌元年春正月丙辰朔帝朝夀皇于重華宫金以完顔守貞本名左業古紳之孫為參知政事
  hash: sha256:0622c1f1d6103bd96394d0daea6d80443502e2fb1ccfe7bdffa8d70204d0b161

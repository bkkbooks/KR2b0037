front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷五十二唐高宗皇帝丙辰顯慶元年春正月以太子忠為梁王立代王𢎞皇后子為皇太子
  hash: sha256:d7ed6b49e84fbaa6402445163fedfa8d1b638e1a1288c1186abcc56f09eaace2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_051-1a, image: WYG0337/WYG0337-0066a.png}
body:
  text: 先是許敬宗奏曰在東宫者所出本微今知國家已有正嫡必不自安恐非宗廟之福至是上遂廢忠而立𢎞忠既廢官屬無敢見者右庶子李安仁獨候見泣涕拜辭而去李安仁綱之孫二月贈武士彠司徒賜爵周國公夏六月詔以高祖配昊天于圜丘太宗配五帝于明堂秋七月貶侍御史王義方泗州連水人為萊州注見前司户李義府恃寵用事洛州婦人淳于氏美色繫大理獄義府屬大理丞畢正義枉法出之將納為妾事覺上命給事中劉仁軌鞫之義府逼正義自縊以滅口上知而不問侍御史王義方奏曰義府擅殺六品寺丞漸不可長對仗叱義府令下義府顧望不退義方三叱義府始趨出義方乃讀彈文上以義方毁辱大臣貶之義方將劾奏白其母曰義方為御史視姦臣不紏則不忠紏之則身危而憂及于親為不孝奈何母曰昔王陵之母殺身以成子之名汝能盡忠以事君吾死不恨義方乃奏之九月括州隋置今浙江處州府是暴風海溢丁巳二年春正月以蘇定方名烈以字行冀州武邑人為伊麗即今伊犂在巴里坤北道行軍總管討沙鉢羅先是上遣使册拜西突厥真珠葉護乙毗咄陸之子為可汗至碎葉城唐書地里志馬者都督府有碎葉城西域傳出安西至葱嶺贏二千里度雪海春夏常雨雪北行贏千里得細葉川東曰熱海地寒不凍其西有碎葉城考唐碎葉川亦曰素葉水在伊麗河西今伊犂河西之水最大者為圖斯庫爾蓋即碎葉舊蹟也其水周廣六百餘里為沙鉢羅所拒遣程知節等討之不克至是乃以蘇定方為總管督諸軍自北道進討夏五月帝始隔日視事上自即位每日視事宰相奏天下無虞請隔日視事許之遣天竺方士歸國王元䇿之破天竺也事見前得方士娑婆寐以歸自言有長生之術太宗頗信之發使四方采藥藥竟不就放還上即位復詣長安上仍遣歸謂侍臣曰自古安有神仙秦始皇漢武帝求之卒無所成果有不死之人今皆安在李績對曰此人再來容髮衰白已改于前何能長生陛下遣之內外皆喜娑婆寐竟未及行而死秋八月貶韓瑗來濟禇遂良皆為遠州刺史先是詔以禇遂良為桂州都督事見前至是許敬宗李義府誣奏韓瑗來濟與禇遂良潛謀不軌以桂州用武之地授遂良都督欲為外援遂皆坐貶瑗振州唐置今瓊州府崖州是濟台州後復徙庭州是台州唐置今浙江台州府庭州注見前遂良愛州梁置地在今安南國桞奭象州隋置今屬廣西桞州府詔廢六天唐書禮樂志自鄭康成以昊天上帝者天皇大帝北辰耀魄寶也青帝靈威仰赤帝赤熛怒黃帝含樞紐白帝白招拒黑帝叶光紀者五天也由是有六天之說之祀合方丘神州注見前為一祭禮樂志貞觀禮冬至祀昊天上帝于圜丘正月辛日祀感生帝靈威仰于南郊以祈穀孟夏雩于南郊季秋大享于明堂皆祀五天帝顯慶二年禮官等議盡黜鄭說南郊祈穀孟夏雩明堂大享皆祀昊天上帝又武德中冬至及孟夏雩祭皇地祇于方丘孟冬祭神州地于北郊至是合為一祭冬十月蘇定方擊沙鉢羅獲之分立興昔亡繼往絶二可汗蘇定方至曵嘻河胡三省注在伊麗河東西沙鉢羅帥兵十萬拒戰定方擊敗之斬獲數萬㑹大雪平地二尺軍中咸請俟晴而行定方曰虜恃雪深謂我不能進必且休息亟追之可及也乃兼行至其牙帳縱兵擊之斬獲又數萬沙鉢羅脫走趨石國注見前定方于是息兵諸部各歸所居通道路置郵驛掩骸骨問疾苦畫彊場復生業凡為沙鉢羅所掠者悉還給之十姓五咄陸五弩失卑安堵如故乃命蕭嗣業鈞兄子將兵追沙鉢羅獲之分西突厥地置崑陵居碎葉川西濛池居碎葉川東二都護府以彌射逹頭可汗五世族孫為興昔亡可汗押五咄陸部落步真彌射族兄二人俱太宗世來降為繼往絶可汗押五弩失畢部落以洛陽宫為東都以劉祥道字同壽觀城人林甫之子為黃門侍郎知選事祥道以取士傷濫每年入流之數二千四百有餘內外文武官自一品至九品萬三千四百六十五員約準三十年則萬三千餘人略盡矣若年别入流者五百人足充所須之數望有釐革而大臣懼于改作事遂寢戊午三年春正月詔行新禮先是議者謂貞觀禮節文未備故命長孫無忌等修之時許敬宗李義府用事所損益多希㫖學者非之博士蕭楚材等以為凶事非臣子所宜言敬宗義府深然之焚國恤篇凶禮遂闕夏五月徙安西都護府于龜兹初龜兹王布失畢與其相那利互來告難王之妻與那利通由是君臣獖阻上兩召之囚那利遣使送布失畢歸國龜兹將羯獵顛發衆拒之詔發兵討誅羯獵顛乃徙安西都護府于龜兹高昌但為西州都督府冬十一月貶杜正倫為橫州唐置今屬廣西南寧府刺史李義府為普州後周置宋廢故城在今四川潼川府安嶽縣刺史李義府兼中書令有寵于上諸子孩抱者並列清貴而義府貪冒無厭賣官鬻獄其門如市中書令杜正倫每以先進自處由是有隙訟于上前上兩責之未幾義府復召為吏部尚書鄂公尉遲敬德卒諡忠武敬德晚年閒居學延年術不交通賓客凡十六年卒愛州刺史禇遂良卒己末四年夏四月削太尉趙公長孫無忌官封黔州注見前安置武后以長孫無忌受重賜而不助已深怨之以于志寧中立不言亦不悅令許敬宗伺其隙而陷之㑹人告太子洗馬韋季方罪敕敬宗與辛茂將時為侍中鞫之季方自刺不死敬宗因誣奏季方欲與無忌謀反上驚曰舅為小人所間小生疑阻則有之何至于反敬宗曰反狀已具願陛下勿疑上泣曰我家不幸往年高陽公主與房遺愛謀反今元舅復然將若之何對曰遺愛乳臭兒與一女子謀反勢何所成無忌與先帝謀取天下天下服其智為宰相三十年百姓畏其威若一旦竊發內外響應陛下遣誰當之乎上曰朕决不忍加刑于無忌敬宗對曰漢文帝漢之賢主也其舅薄昭止坐殺人帝使公卿哭而殺之後世不以為非今無忌謀移社稷其罪與昭不可同年而語陛下少更遷延臣恐變生肘腋悔無及矣上以為然竟不引問詔削無忌官封黔州安置敬宗又奏無忌謀逆由禇遂良柳奭韓瑗搆扇而成于志寧亦其黨也于是詔追削遂良官爵除奭瑗名免志寧官六月改氏族志為姓氏録初太宗修氏族志升降去取時稱允當至是許敬宗等以其書不叙武氏本望奏請改之以后族為第一等其餘悉以仕唐官品髙下為準于是士卒以軍功至位五品者豫士流時人謂之勳格詔許敬宗議封禪儀敬宗請以高祖太宗俱配上帝太穆文德二后並配地祇從之秋七月殺長孫無忌柳奭韓瑗七月詔御史追柳奭韓瑗枷鎖詣京師敬宗又遣袁公輸詣黔州再鞫長孫無忌逼令自縊詔斬瑗奭瑗已死發驗而還籍沒三家近親皆流嶺南為奴婢長孫氏柳氏緣無忌奭貶降者十三人高履行貶永州刺史于志寧貶榮州刺史于氏貶者九人自是政歸中宫矣廉髙履行士之子冬十月思結反鐵勒别部注見前遣蘇定方討降之俟斤都曼降庚申五年春二月帝如并州皇后宴親戚故舊鄰里于朝堂婦人于內殿頒賜有差詔并州婦人年八十已上皆版授郡君夏六月丙寅朔日食秋七月廢梁王忠為庶人梁王忠年浸長頗不自安或衣婦人服以備刺客又數自占吉凶有告其事廢為庶人徙黔州遣蘇定方等伐百濟降之初百濟恃高麗之援數侵新羅新羅王上表求救詔蘇定方等率水陸十萬以伐之定方引軍自成山在今山東登州府文登縣南濟海直趨其都百濟傾國來戰大敗之百濟王義慈降定方前後凡滅三國皆生擒其王慈謂西突厥沙鉢羅思結都曼及義也詔以其地置熊津城在今朝鮮國全州西北等五都督府明年百濟故將福信迎立其故王子扶餘豐檢校帶方州即帶方郡注見前刺史劉仁軌擊破之先是蘇定方軍還留郎將劉仁願守百濟城王文度為熊津都督文度濟海卒福信遂迎扶餘豐立之引兵圍仁願時劉仁軌坐罪白衣從軍詔以為帶方州刺史統文度衆并新羅兵救仁願仁軌御軍嚴整所向皆克拔其數城既而福信與扶餘豐浸相猜忌豐襲殺福信遣使詣髙麗倭國乞援倭國即日本注見前又明年九月熊津道總管孫仁師及仁軌等大破百濟餘衆及倭國兵百濟悉平仁師將兵浮海而進仁軌軍勢大振與倭兵遇四戰皆捷扶餘豐奔髙麗子忠勝等帥衆降初仁軌檢校帶方請唐厯及廟諱而行人問其故曰吾欲削平東方頒示本朝正朔及百濟平仁軌留鎮卒皆如言仁軌又上疏以戍兵疲弊請厚加慰賚以鼓士心復表用扶餘隆使招集餘衆上深納之遣兵渡海以代舊戍以扶餘隆為熊津都尉使冬十月初令皇后决百司奏事上初苦風眩不能視百司奏事或使皇后决之后性明敏涉獵文史處事皆稱㫖由是始委以政事權與人主侔矣辛酉龍朔元年夏四月遣兵部尚書任雅相渭南人等征髙麗時任雅相等及諸胡凡三十五軍水陸並進上欲自將大軍繼之皇后表諌乃止蘇定方破高麗于浿江注見前屢戰皆捷遂圍平壤城高麗蓋蘇文遣其子男生以精兵數萬守鴨緑水契苾何力至值冰大合引衆乘冰鼓譟而進高麗大潰斬首三萬級餘衆悉降㑹有詔班師何力乃還已而任雅相卒于軍蘇定方圍平壤久不下引軍還六月以西域諸國為州府凡府八州七十六徙潞王賢字明允即章懷大子為沛王潞王賢聞王勃字子安通之孫善屬文召為修撰時諸王鬭雞勃戲為檄周王即中宗雞文上見之怒曰此乃交搆之漸斥勃出沛府壬戌二年春正月改百官名以門下省為東臺中書省為西臺尚書省為中臺侍郎為左相中書令為右相僕射為匡政左右丞為肅儀尚書為太常伯侍郎為少常伯其餘並以義訓更其名而職任如故三月鐵勒道行軍大總管鄭仁泰等擊敗鐵勒于天山注見前先是回紇同羅僕固犯邉詔以鄭仁泰為鐵勒道行軍大總管督諸軍討之及是鐵勒九姓曰藥羅葛曰胡咄葛曰啒羅勿曰貊歌息紇曰阿勿嘀曰葛薩曰斛嗢索曰藥勿葛曰溪野勿聞仁泰至合衆十餘萬以拒之選驍健者數十人挑戰薛仁貴發三矢殺三人餘皆下馬請降仁貴悉坑之度磧北擊其餘衆獲葉護兄弟三人而還軍中歌之曰將軍三箭定天山壯士長歌入漢關思結多滋葛等部落先保天山已而迎降仁泰等縱兵擊掠虜相宰遠遁仁泰將輕騎赴之踰大磧至仙蕚河不見虜糧盡而還值大雪士卒饑凍此入塞餘兵八百人司憲大夫楊德裔劾奏詔釋不問以契苾何力為鐵勒道安撫使安輯餘衆仙蕚河一名仙蛾河在回紇牙北六百里冬十月䫻越筆反海西域水名總管蘇海政矯詔殺興昔亡可汗䫻海道總管蘇海政受詔討龜兹敕興昔亡繼往絶二可汗發兵與俱繼往絶素與興昔亡有怨密請海政矯敕收斬之其部落亡走海政追討平之繼往絶尋死十姓注見前無主附于吐蕃劉友益曰十姓皆附吐蕃而唐世吐蕃之禍始此矣西突厥冦庭州刺史來濟死之西突厥冦庭州刺史來濟將兵拒之謂其衆曰吾久當死幸蒙存全以至今日當以身報國遂不釋甲胄赴敵而死癸亥三年春正月以李義府為右相夏四月除名流嶲州隋置今四川寧遠府是義府兼知選事恃勢賣官怨讟盈路上從容戒之義府勃然變色曰誰告陛下緩步而去上不悅義府又與術者微服出城候望氣色或告義府隂有異圖鞫之有實詔除名流嶲州朝野稱慶後二年東封大赦惟長流人不聼還義府憂憤發病而死蓬萊宮故址在今西安府咸寧縣東成初隋文帝遷長安城立宫于西北隅至是營蓬萊宫于其東北制度宏壯于舊門曰丹鳯殿曰含元移仗居之名故宫曰西內新宫曰東內亦曰大明宫云五月詔鄭仁泰等分屯涼鄯二州注並見前以備吐蕃吐蕃吐谷渾互相攻各上表論曲直求援上不許吐蕃擊吐谷渾大破之吐谷渾可汗曷鉢與𢎞化公主帥數千帳棄國走涼州上以鄭仁泰等分屯涼鄯備吐蕃又以蘇定方節度諸軍授吐谷渾吐蕃表吐谷渾之罪且請和詔責讓之劉友益曰吐蕃于是始彊甲子麟德元年春正月以殷王旭輪後更名旦即睿宗為單于大都護初李靖破突厥遷三百帳于雲中城阿史德氏為其長至是部落漸衆請立可汗以統之上曰今之可汗古之單于也故更為單于都護府而使皇子殷王遙領之秋七月詔以三年正月封禪冬十二月殺同三品上官儀字游韶陜人劉祥道罷梁王忠賜死初武后屈身忍辱奉順上意故上排羣議而立之及得志專作威福上動為所制不勝其忿㑹宦者王伏勝發其使道士郭行真出入禁中為厭禱事上密召上官儀議之儀因言后専恣請廢之上即命草詔左右奔告于后后遽詣上自訴上羞縮不忍乃曰我初無此心皆上官儀教我儀先與伏勝俱事故太子忠后于是使許敬宗誣奏儀伏勝與忠謀大逆儀下獄及伏勝皆死妻子籍沒賜忠死于流所右相劉祥道坐與儀善罷朝士流貶者甚衆自是上每視事則后垂簾于後政無大小皆預聞之天下大權悉歸中宫天子拱手而已中外謂之二聖乙丑二年夏五月行麟德厯李淳風以戊寅厯推步浸踈乃增損劉焯皇極厯更撰麟德厯行之冬十月車駕發東都十二月至泰山皇后表稱封禪祭皇地祗太后昭配而令公卿行事禮有未安請帥內外命婦奠獻詔禪社首山名在泰安府西南上有壇以皇后為亞獻越國太妃燕氏越王貞之母太宗妃也為終獻廢藁秸陶匏用茵褥罍爵文舞用功成慶善之樂武舞用神功破陳之樂上發東都華戎衛從數百里不絶時比歲豐稔米斗至五錢麥豆不列于市上元濮陽左相竇德元騎從上問濮陽謂之帝邱何也德元不能對許敬宗自後躍馬面前曰昔顓頊居此故謂之帝邱上稱善敬宗退謂人曰大臣不可以無學德元曰人各有能有不能吾不強對以所不知此吾所能也李績曰敬宗多聞信美矣德元之言亦善也張公藝九世同居北齊降唐皆旌表其門上幸其宅問所以能之故公藝書忍字百餘以進上善之賜以縑帛濮陽注見前竇德元威之從子張公藝夀張人丙寅乾封元年春正月封泰山禪社首正月朔祀昊天上帝于泰山南明日祭泰山封玉牒藏之石䃭音感石篋也纒以金繩封以金泥又明日降禪于社首祭皇地祇上初獻畢執事者皆趨下宦者執帷皇后升壇亞獻帷帟皆以錦繡為之赦天下改元文武官賜爵加階有差先是階無泛加皆以勞考叙進至五品三品仍奏取進止至是始有泛階比及末年服緋者滿朝矣車駕還過曲阜祠孔子贈太師祭以少牢至亳州後周置今屬潁州府尊老君即老子為太上元元皇帝至亳州謁老君廟上尊號夏四月車駕還京師五月鑄乾封泉寶錢錢一當十俟期年盡廢舊錢已而錢帛踊貴商價不行罷之秋七月以劉仁軌為右相初仁軌為給事中按畢正義事事具前李義府怨之出為青州刺史㑹討百濟仁軌當浮海運糧遭風失船命監察御史袁異式往鞫之異式承義府風㫖逼令仁軌引决仁軌不從異式具獄以聞上命除名以白衣從軍自效及仁軌為大司憲即御史大夫異式懼不自安仁軌瀝觴告之曰仁軌若念疇昔之事有如此觴既知政事薦為司元大夫監察御史杜易簡襄陽人預之裔謂人曰斯所謂矯枉過正矣皇后殺其從兄武惟良懷運初武士彠卒其子元慶元爽前妻相里氏出及兄子惟良懷運皆不禮于后母楊氏楊氏深銜之后既立楊氏號榮國夫人后長姊楊氏出號韓國夫人惟良等皆列朝廷后上疏請出惟良等為遠州刺史外示謙抑實惡之也元慶以戞卒元爽坐事流振州而死韓國及其女皆得幸于上韓國尋卒其女賜號魏國夫人后嫉之㑹惟良懷運朝覲至京師因獻食后密置毒醢中使魏國食之暴卒因歸罪于惟良懷運誅之改其姓為蝮氏冬十二月以李績為遼東大總管伐高麗先是高麗泉蓋蘇文死長子男生字元德代為莫離支出巡諸城其弟男建男産居守或搆之謂二弟曰男生欲除二弟又告男生曰二弟欲拒兄不納男生遣人偵伺二弟收掩得之以王命召男生男生不敢歸男建遂自為莫離支發兵以拒男生男生走保别城遣其子獻誠詣闕求救詔以契苾何力為安撫使龎同善為行軍總管發兵救之已而同善大破高麗兵男生帥衆與之㑹至是詔復以李績為大總管郝處俊安陸人副之同討高麗何力同善並受績處分丁卯二年春正月耕藉田有司進耒耜加以雕飾上曰耒耜農夫所執豈宜如此之麗命易之既而耕之九推乃止夏六月以楊𢎞武素弟嶽之子戴至德胄之兄李安期百藥子趙仁本渭州隴西人並同三品張文瓘字稚圭貝州武城人參知政事考唐書高宗紀乾封二年六月東臺舍人張文瓘參知政事總章二年二月文瓘為東臺侍郎與李敬元同三品百官志同三品入銜自文瓘始通鑑于乾封二年總章二年並書文瓘同三品恐有誤令依唐書改時造蓬萊上陽在洛陽宫西合璧亦洛陽别宫等宫頻征伐四夷廄馬萬匹倉庫漸虛張文瓘諫曰隋鑒不遠願勿使百姓生怨上納其言減廄馬數千匹上屢責侍臣不進賢李安期對曰比來公卿有所薦引為讒者已指為朋黨滯淹者未獲伸而在位者先獲罪是以各務杜口耳陛下果推至誠以待之其誰下願舉所知邪上深以為然秋八月己丑朔日食戊辰總章元年夏四月彗星見于五車五車五星在畢北主天子五兵彗星見上避正殿減膳徹樂許敬宗等奏請復常曰彗星見東北高麗將滅之兆也上曰朕之不德謫見于天豈可歸咎小夷且高麗之百姓亦朕之百姓也不許彗尋滅秋九月李績拔平壤高麗王藏降高麗悉平冬十二月置安東都護府先是李績拔高麗新城遂進攻一十六城皆下之行軍管記元萬頃作檄髙麗文曰不知守鴨緑之險男建報曰謹聞命矣即移兵據之唐兵不得渡上聞之流萬頃于嶺南王元萬頃河南人魏京兆子推後已而左武衛將軍薛仁貴擊破高麗兵于金山乘勝將攻扶餘城扶餘固之故城諸將以其兵少止之仁貴曰兵不必多顧用之何如耳遂為前鋒以進與高麗戰大破之殺獲萬餘人遂拔扶餘城餘四十城皆望風請服及是績等進攻大行城在朝鮮國咸興府西南拔之諸軍皆㑹進至鴨緑栅破之圍平壤月餘高麗王藏遣泉男産詣績降男建猶閉門拒守以軍事委僧信城信城開門績縱兵登城男建自刺不死遂擒之高麗悉平凡收五部百六十七城户六十九萬十二月李績將至上命以高藏等獻于昭陵具軍容奏凱歌入京師獻于太廟上受俘于含元殿分高麗為九都督府四十二州百縣置安東都護府于平壤以統之擢其酋長有功者為都督刺史縣令與華人參理以薛仁貴檢校安東都護總兵二萬人以鎮撫之初高麗有祕記云不及九百年當有八十大將滅之髙氏自漢有國至是凡九百年而李績為大將滅髙麗年正八十云京師山東江淮旱饑己巳二年春二月以張文瓘李敬元亳州譙人並同三品同三品入銜自此始以盧承慶字子餘思道孫為司刑太常伯承慶嘗考內外官有一官督運遭風失米承慶考之曰監運損糧考中下其人容色自若無言而退承慶重其雅量改注曰非力所及考中中既無喜色亦無愧詞又改曰寵辱不驚考中上時渭南尉彭城劉延祐弱冠政事為畿縣最李績謂曰足下春秋甫爾遽擅大名宜稍自貶柳無為獨出人古也詔定明堂制度定明堂制度其基八觚方稜也其宇上圓覆以清陽玉葉瓦名清陽為天玉者寶其名葉者薄其質也其門墻階級窗櫺盧經反窗隔也楣棟下橫木柱柳魚剛反斜角謂之飛柳楶子結反梁上欂櫨枅堅夷反柱上橫木栱居竦反大杙也皆法天地隂陽律厯之數以衆議未决又㑹饑饉竟不果立夏六月戊申朔日食秋八月詔幸涼州不果行詔以十月幸涼州時隴右虛耗議者多以為不宜遊幸上聞之詔五品以上謂曰自古帝王莫不巡狩故朕欲巡視遠俗若其不可何不面陳而退有後言邪宰相以下皆不敢言詳刑大夫即大理少卿來公敏曰巡狩雖帝王常事然今高麗餘冦尚多西邉兵亦未息隴右户口雕弊鑾輿所至供億百端外間實有竊議但明制已行故羣臣不敢陳論耳上善其言為之罷行九月大風海溢永嘉安固諸縣溫永嘉本漢永寧縣隋更名今為浙江州府治安固晉縣吳越改瑞安今𨽻溫州府漂六千餘家冬十一月李績卒諡曰貞武績寢疾謂弟弼曰我見房杜平生勤苦僅立門户遭不肖子蕩覆無餘吾此諸子今以付汝謹察視之其有志氣不倫交遊非類者皆先撾殺然後以聞及卒孫敬業嗣績為將有謀善斷戰勝則歸功于下所得金帛悉散之將士故人思致死所向克捷臨事選將必訾相其狀貌豐厚者遣之或問其故績曰薄命之人不足與成功名閨門雍睦而嚴其姊嘗病績親為作粥風回爇其鬚鬢姊曰僕妾幸多何自苦如是績曰非然也顧姊老績亦老雖久欲為姊煮粥其可得乎常謂人我年十二三時為亡賴逢人則殺十四五為難當賊有所不愜則殺之十七八為賊臨陳乃殺人二十為大將用兵以救人死及是年八十卒定銓注法時承平既久選人益多司列少常伯即吏部侍郎裴行儉始與員外郎張仁禕設長名姓厯榜引銓注之法又定州縣升降官資高下其後遂為永制無能革之者大約唐之選法取人以身體貌豐偉言言辭辨正書楷法遒美判文理優長計資量勞而擬官始集而試觀其書判已試而銓察其身言已銓而注注其姓名官職詢其便利已注而唱集衆告之然後類以為甲甲乙次序先簡僕射乃上門下給事中讀侍郎省侍中審之不當者駁下既審然後上聞主者受㫖奉行各給以符謂之告身兵部武選亦然課試之法以騎射及翹關長丈七尺徑三寸半試者凡十舉其後端出手毋過一尺負米負米五斛行二十步人有格限未至而能試文三篇謂之宏詞試判三條謂之拔萃入等者得不限而受其黔中嶺南閩中州縣官不由吏部委都督選擇土人補授凡居官以年為考一年一考六品以下四考為滿有劉曉者上疏論之曰今選曹以檢勘為公道書判為得人殊不知考其德行才能况書判借人者衆矣又禮部取士專用文章為甲乙故天下之士皆捨德行而趨文藝有朝登甲科而夕陷刑辟者雖日誦萬言何闕理體文成七步未足化人取士以德行為先文藝為末則多士雷奔四方風動矣庚午咸亨元年春三月敕突厥酋長子弟給事東宫西臺舍人徐齊𥅆字將道湖州長城人上疏曰皇太子當引文學端良之士置左右豈可使醜類入侍軒闥又奏齊獻公長孫晟即陛下外祖雖子孫有犯豈應上延祖禰今周忠孝公武士彠廟甚修而齊廟毁廢非所以彰孝理之風也上皆從之夏六月壬寅朔日食秋八月薛仁貴擊吐蕃敗績初吐蕃陷西域十八州又與于闐襲龜兹撥換城陷之詔罷龜兹于闐焉耆疏勒四鎮以薛仁貴為大總管阿史那道真郭待封孝恪子副之以討吐蕃待封先與仁貴並列恥居共下仁貴所言多違之至大非川在青海西今曰布喀河仁貴帥所部前行擊吐蕃于河口積石河口斬獲甚衆進屯烏海注見前待封將輜重徐進遇吐蕃敗走仁貴退屯大非川吐蕃就擊之唐兵敗死略盡與欽陵祿東贊之子約和而還仁貴待封皆免死除名欽陵與弟贊婆悉多于勃論皆有才略欽陵代父秉政三弟將兵居外鄰國畏之關中旱饑閏月皇后以旱請避位不許加贈武士彠為太原王夫人為妃冬十月詔官名復舊辛未二年冬十一月甲午朔日食壬申三年春二月徙吐谷渾于靈州吐谷渾畏吐蕃徙靈州以鳴沙縣地置安樂州處之鳴沙故城在今寧夏府中衛縣其故地皆入于吐蕃夏四月吐蕃遣使入貢吐蕃遣其大臣仲琮入貢上問以吐蕃風俗對曰吐蕃地薄氣寒風俗朴魯然法令嚴整上下一心議事常自下而起因人所利而行之斯所以能持久也上又詰以奪吐谷渾地及敗薛仁貴事仲琮頓首曰臣受命來獻他非所聞上厚賜而遣之秋八月許敬宗死敬宗先致仕及是死太常博士袁思古以敬宗嘗奏流其子于嶺南又以女嫁蠻酋多納其貨按諡法名與實爽曰繆請以諡之敬宗孫彥伯訟請改諡博士王福畤曰昔晉司空何曾以日食萬錢得諡為繆敬宗不逮于曽而飲食男女之纍過之諡之曰繆無負許氏矣詔五品以上更議禮部尚書楊忠敬曰過而能改曰恭請諡曰恭女敬宗以婢為繼室其子昻蒸之敬宗奏斥昻又以嫁盎子王福畤通之子冬十一月戊子朔日食以邢文偉全椒人為右史即起居舍人王及善邯鄲人為左千牛衛將軍唐官掌宿衛侍從太子罕接宫臣典膳丞邢文偉輒減所供膳上書諫太子納之上聞之曰直士也擢為右史太子因宴集命宫臣擲倒唐散樂有擲倒伎次至右奉裕率唐東宫官王及善及善曰擲倒自有伶官臣若奉令恐非所以羽翼殿下也太子謝之上聞之賜及善縑百匹尋遷左千牛衛將軍癸酉四年春三月詔劉仁軌修改國史以許敬宗等所記多不實故也秋七月婺州大水甲戊上元元年春正月以劉仁軌為雞林帝以新羅國為雞林州道大總管討新羅新羅王法敏既納高麗叛衆又據百濟故地詔削法敏官爵其弟仁問在京師立為王使歸國明年二月仁軌大破新羅之衆于七重城新羅遣使謝罪上赦之復法敏官爵仁問改封臨海郡公三月辛卯朔日食以武承嗣后兄元爽子為周國公秋八月帝稱天皇后稱天后九月追復長孫無忌官爵以無忌曽孫翼襲爵趙公聼陪葬昭陵大酺太酺上御翔鸞閣含元殿東閣曰朔鸞西曰棲鳯觀之分音樂為東西朋使雍王賢主東朋周王顯主西朋角勝為樂郝處俊諫曰二王春秋尚少志趣未定當推梨讓棗相親如一今分二朋遞相誇競非所以崇禮義勸敦睦也上瞿然曰卿遠識非衆人所及也遽止之天后表便宜十二條詔行之后以國家聖緒出元元皇帝請令王公以下皆習老子令明經舉人試䇿又請自今父在為母服齊衰三年又京官八品以上量加俸祿及他便宜合十二條詔書褒美皆行之乙亥二年春三月天后祀先蠶天后祀先蠶于邙山之陽百官及朝集使皆陪位時上苦風眩議使天后攝政郝處俊諫曰天子理外后理內天之道也昔魏文帝著令雖有幼主不許皇后臨朝所以杜禍亂之萌陛下奈何以高祖太宗之天下不傳之子孫而委之天后乎中書侍郎李義琰曰處俊之言至忠陛下宜聼之上乃止天后多引文學之士元萬頃劉禕之等使之撰列女傳臣軌百僚新戒樂書凡千餘卷時密令參决表奏以分宰相之權時人謂之北門學士李義琰魏州昌樂人劉禕之字希美子翼之子夏四月太子𢎞薨諡孝敬皇帝立雍王賢為太子太子𢎞仁孝謙謹上甚愛之中外屬心天后方逞其志太子奏請數忤㫖義陽宣城二公主蕭淑妃女也幽于掖庭年踰三十太子見之驚惻奏請出降上許之天后怒即日以公主配當上翊衛權毅王朂太子尋薨時人以為天后鴆之也詔追諡為孝敬皇帝胡三省曰帝子諡皇帝始此秋八月以戴至德劉仁軌為左右僕射張文瓘為侍中郝處俊為中書令李敬元同三品劉仁軌戴至德更日受牒訴仁軌常以美言許之至德必據理難詰未嘗與奪實有寃結者密為奏辨由是時譽皆歸仁軌或問其故至德曰威福者人主之柄人臣安得盜取上聞深重之有老嫗欲詣仁軌陳牒誤詣至德至德覽之未終嫗曰本謂是解事僕射乃不解事僕射邪歸我牒至德笑而授之時人稱其長者文瓘時兼大理卿囚聞改官皆慟哭文瓘性嚴正諸司奏議多所紏駁上甚委之丙子儀鳯元年秋八月始遣使詣桂廣交綱目作文今依通鑑改黔等都督府注擬敕廣桂等都督府比來注擬簡擇未精自今每四年遣五品以上官充使仍令御史同往注擬時人謂之南選九月以狄仁傑字懷英太原人為侍御史將軍權善才中郎將范懷義誤斫昭陵柏當除名上特命殺之大理丞狄仁傑奏罪不當死上曰我不殺則為不孝仁傑固執不已上怒令出仁傑曰犯顔直諫自古以為難臣以為遇桀紂則難遇堯舜則易夫法不至死而陛下特殺之是法不信于人也人何所措其手足且張釋之有言設有盜長陵一抔土陛下何以處之今以一柏殺二將軍後代謂陛下為何如矣臣不敢奉詔者恐陷陛下于不道且羞見釋之于地下也上怒解遂貸之仍擢仁傑為侍御史初仁傑為并州法曺同僚鄭崇質當使絶域崇質母老且病仁傑曰彼母如此豈可復使之有萬里之憂詣長史藺仁基請代之行仁基素與司馬李孝廉不協因相謂曰吾輩豈可不自愧乎遂相與輯睦冬十月祫享太廟用太學博士史璨議禘後三年而祫祫後二年而禘唐書禮樂志禮三年一祫五年一禘上元三年詔有司議禘祫年數史璨等議春秋魯禘五年而再祭蓋後禘去前禘五年而祫常在禘後三年時以其言有經據從之安置郇王素節帝之子蕭淑妃出于袁州隋置今為府屬江西素節警敏好學天后惡之以為申州後周置今汝寧府信陽州是刺史素節以久不得入覲著忠孝論后見之誣以贓賄降封鄱陽王袁州安置祀王上金後宫楊氏出也后惡楊氏徙金澧州安置後武承嗣諷有司誣奏上金與素節謀反皆縊死澧州隋置今𨽻湖南丁丑二年春二月以髙藏為朝鮮王扶餘隆為𢃄方王以高藏為朝鮮王遣歸遼東安輯高麗餘衆髙麗先在諸州者總章二年徙髙麗戶于江淮山南京西諸州遣與俱歸扶餘隆為𢃄方王亦遣歸安輯百濟餘衆仍移安東都護府于新城以統之藏至遼東謀叛召還徙卬州而死髙麗舊城沒于新羅餘衆散入靺鞨隆亦不敢還故地髙氏扶餘氏遂亡卬州注前見夏四月河南北旱遣御史中丞崔謐等分道賑給侍御史劉思立寧陵人上疏曰麥秀蠶老農事方殷聚集參迎妨廢不少既緣賑給須立簿書本欲安存更成煩擾伏望且委州縣賑給疏奏謐等遂不行詔廢顯慶新禮詔以顯慶新禮多不師古其五禮并依周禮行事自是禮官益無憑守每大禮臨時撰定秋八月徙周王顯為英王更名哲戊寅三年春正月百官四夷朝天后于光順門以李敬元為洮河道大總管秋九月敬元與吐蕃戰敗績先是詔以劉仁軌鎮洮河軍胡三省注鄯州城內有洮河軍鄯州今西寧府碾伯縣是仁軌每有奏請多為李敬元所抑由是怨之知敬元非將帥才薦之使守西邉敬元固辭上曰仁軌須朕朕亦自往卿安得辭乃以敬元代仁軌大發兵討吐蕃九月敬元將兵十八萬與吐蕃將論欽陵戰於青海副總管劉審禮德威子深入敗沒敬元按兵不救狼狽還走虜追擊之員外將軍黑齒常之百濟西部人夜帥死士襲擊虜營虜乃遁去敬元收餘衆還鄯州上嘉常之之功擢拜左武衛將軍敬元之西征也監察御史復師德應猛士詔從軍及敗敕師德收集散亡軍乃振因命使于吐蕃吐蕃將論贊婆迎之師德宣導上意論以禍福贊婆甚悅為之數年不犯邉上以吐蕃為憂太學生魏元忠上封書曰理國之要在文與武今言文者則以辭華為首而不及經綸言武者則以騎射為先而不知方略故陸機著論辨亡無救河梁之敗飬由基射穿七扎不濟鄢陵之師此已然之明效也古語有之兵無强弱將有巧拙故選將當以智略為本勇力為末今朝廷用人類取將門子弟及死事之家後皆庸人豈足當閫外之任古之名將皆出貧賤而立殊功未聞其家代為將也夫賞罰者軍國之切務有功不賞有罪不誅雖堯舜不能致理近日蘇定方征遼東李績破平壤賞絶不行大非川之敗仁貴郭待封等不即重誅臣恐吐蕃之平非旦夕可冀也又出師之要全資馬力請開蓄馬之禁使百姓皆得蓄馬若官軍大舉增價市之則皆為官有矣上善其言召見令直中書省仗內供奉城人師德字宗仁鄯州原武人魏元忠宋州東己卯調露元年春正月幸東都司農卿韋𢎞機京兆萬年人免𢎞機作上陽等宫制度壯麗侍御史狄仁傑劾奏𢎞機導上為奢泰免其官左司郎中王本立恃恩用事朝廷畏之仁傑奏其姦上特原之仁傑曰陛下何惜罪人以虧王法必欲曲赦本立請棄臣于無人之境為忠貞之誡本立竟得罪由是朝建肅然夏四月命太子賢監國太子處事明審時人稱之六月遣吏部侍郎裴行儉立波斯西域國大月氏别種居逹遏水西距長安萬五千里而贏王行儉襲執西突厥阿史那都支以歸初西突厥阿史那都支及其别帥李遮匐與吐蕃連和侵逼安西朝議欲發兵討之吏部侍郎裴行儉曰今波斯王卒其子質京師先是波斯為大食所滅其王卑路斯入朝尋死其子泥洹斯為質在京師宜遣使送歸道過二虜以便宜取之可不血刃而擒也上從之乃命行儉册立波斯王行儉奏肅州刺史王方翼字仲翔廢王后從弟為副過西州揚言須稍涼西上都支覘知之遂不設偹行儉召四鎮安西四鎮已見前酋長謂曰昔在此州縱獵甚樂今欲尋舊賞誰能從者諸胡子弟爭請行近得萬人行險陽為畋獵校勒部伍數日遂倍道西進去都支部落十餘里遣使問其安否召與相見都支計無所出帥子弟迎謁遂擒之簡其精騎進掩遮匐遮匐亦降于是囚都支遮匐以歸遣波斯王自還其國留王方翼于安西使築碎葉城馬耆都督府所治城四面十二門為屈曲隱出伏沒之狀西域胡縱觀莫測方略悉獻珍寶冬十月單于府突厥反遂寇定州單于大都護府注見前突厥阿史德溫傅奉職二部俱反立阿史那泥熟匐為可汗二十四州皆塞州北酋長皆叛應之衆數十萬遣長史蕭嗣業等將兵討之嗣業等先戰屢捷因不設備㑹大雪突厥夜襲其營嗣業狼狽拔營走衆遂大亂為虜所敗突厥遂寇定州刺史霍王元軌命開門偃旗虜疑有伏懼而遁州人李嘉運與虜通謀事泄上令元軌窮其黨與元軌曰强寇在境人心不安若多所逮繫是驅之使叛也乃獨殺嘉運餘無所問上大喜自是朝廷有大事上多密敕問之庚辰永隆元年春三月以裴行儉為定襄道大總管討突厥平之初上謂裴行儉曰卿大武兼資今授卿二職乃除禮部尚書右衛大將軍為定襄道行軍大總管將兵三十餘萬以討突厥至是行險大破突厥于黑山在今歸化城故豐州北檎奉職泥熟匐為其下所殺以首來降先是行儉至朔州謂其下曰撫士貴誠致敵尚詐乃為糧車三百乘每車伏壯士五人各持陌刀徑弩以羸兵為之援且伏精兵于險要以待之虜果至羸兵棄車散走虜驅車就水革解鞍牧馬欲取糧壯士自軍中躍出擊之虜驚走復為伏兵所邀殺後殆盡自是運糧行者虜莫敢近軍至單于府北抵暮下營掘塹已周行儉遽命移就髙岡諸將皆言士卒已安不可動行險不從趣使移是夜風雨暴至前所營地水深丈餘諸將驚服問其故行儉笑曰自今但從我命不必問其所由知也後二年突厥阿史那伏念自立為可汗與阿史德溫傅連兵為寇詔復以行儉為總管討之行儉多縱反間伏念等浸相猜二行儉遣禆將程務挺掩襲伏念伏念窮迫執溫傅以降餘黨悉平陌刀大刀也程務挺名振之子秋七月吐蕃寇河源隋故郡在今青海南即吐谷渾赤水城也先是吐蕃贊普死子器弩悉弄立年始八嵗上命裴行儉乘間圖之行儉曰欽陵為政大臣輯睦未可圖也乃止至是入寇河源將軍黑齒常之擊郤之常之以河源衝要欲加兵戍之而轉輸險逺乃廣置𤇺戍七十餘所開屯田五千餘頃歲收五百餘萬石由是戰守有備焉先是劍南募兵于茂州唐置今州𨽻四川築安戎城在茂州西以斷吐蕃之路吐蕃攻陷其城以兵據之由是西洱注見前諸蠻皆降于吐蕃吐蕃之地東接涼松茂嶲等州南鄰天竺西陷龜兹疏勒等四鎮北抵突厥地方萬餘里諸胡之盛莫與為比八月廢太子賢為庶人立英王哲為皇太子太子賢聞宫中竊議以賢為天后姊韓國夫人所生內自疑懼方士明崇儼偃師人以厭勝之術為天后所信官至正諫大夫嘗密稱太子不堪承繼英王貌類太宗㑹崇儼為人所殺天后遂疑太子所為太子頗好聲色與戶奴狎昵天后使人告其事鞫之于馬坊得皂甲數百領以為反具上素愛太子欲宥之天后不可遂廢為庶人黨與皆伏誅冬十一月壬申朔日食辛已開耀元年春正月宴百官及命婦于麟德殿以立太子宴百官及命婦于宣政殿引九部伎及散樂自宣政門入太常博士袁利貞昂之曽孫上疏以為正寢非命婦宴㑹之地路門非倡優進御之所請命婦曽于别殿九部伎自東西門入而停散樂上乃更命置宴于麟德殿賜利貞帛百匹利貞族孫誼為蘇州刺史自以其先宗太尉淑以來盡忠帝室琅邪王氏雖奕世台鼎而為厯代佐命耻與為比嘗曰所貴于名家者為世篤忠貞才行相繼故也彼鬻婚姻求祿利者又鳥足貴乎三月以劉仁軌為太子少傅少府監裴匪舒為上造鏡殿上與仁軌觀之仁軌驚趨下殿上問其故對曰天無二日土無二主適視四壁有數天子不祥孰甚焉上遽命剔去匪舒善營利奏賈苑中馬糞歲得錢二萬緍上以問仁軌對曰利則厚矣竊恐後代稱唐家賣馬糞非嘉名也乃止秋七月太平公主武后女適薛紹汾隂人紹母太宗女城陽公主也紹兄顗以公主寵盛深憂之以問族祖戶部郎中克構克構曰帝甥尚主國家故事茍以恭慎行之何傷然諺曰娶婦得公主無事取官府亦不得不懼也徴處士田遊巖京兆三原人為太子洗馬遊巖隱居泰山上東封嘗幸其廬徴為洗馬無所規益右衛副率蔣儼義興人綱目作薛儼今依唐書改以書責之曰足下負巢由之峻節傲唐虞之聖主屈萬乘之重申三顧之榮將以輔道儲二漸染芝蘭耳皇太子春秋鼎盛聖道未明足下乃唯唯而無一談悠悠以卒年歲何以塞聖主調護之寄乎遊巖不能答冬十月丙寅朔日食徙故太子賢於巴州注見前壬午永淳元年春二月立孫重照為皇太孫上欲令開府置僚屬問吏部郎中王方慶名綝以字行本丹陽人後徙咸陽對曰未聞太子在東宫而更立太孫者也上曰自我作古可乎對曰三王不相襲禮何為不可乃奏置師傅等官既而上疑其非法竟不補授夏四月甲子朔日食關中饑上幸東都上以關中飢饉米斗三百將幸東都留太子監國使劉仁軌裴炎字子隆聞喜人薛元超收之子輔之時出幸倉猝扈從之士有餓死者上慮道路多草竊命監察御史魏元忠檢校元忠閲赤縣獄得盜一人神采語言異于衆命釋桎梏襲冠帶乘驛以從與共食宿託以詰盜及東都士馬萬數不亡一錢赤縣唐京師所理長安萬年二縣是也聞喜公裴行儉卒諡曰憲行儉有知人之鍳初王勃與楊炯華隂人盧照鄰字升之范陽人駱賔王義烏人皆以文章有盛名李敬元尤重之行儉曰士之致逺者當先器識而後才藝勃等雖有文華而浮躁淺露豈享爵祿之器邪楊子稍沉靜應至令長餘得令終幸矣既而勃渡海墮水炯終于盈川唐置故城在今浙江衢州府西安縣令照鄰惡疾赴水死賔王反誅皆如行儉言行儉為將帥所引偏禆後多為名將破阿史那都支得馬腦盤廣二尺餘以示將士軍士捧以升階跌而碎之惶恐叩頭流血行儉笑曰爾非故為何至于是不復有追惜之色以郭待舉潁川人岑長倩文本從子郭正一定州鼓城人魏元同字和初鼓城人並中書門下同承受進止章平事唐書百官志平章事入銜自待舉等始上欲用待舉等謂中書令崔知溫字體仁許州鄢陵人曰待舉等資任尚淺且令預聞政事未可與卿等同名自是外司四品以下知政事者始以平章事為名先是元同為吏部侍郎上言曰人君之體當委任而責成功所委者當則所用者自精周穆王命伯問為大僕正曰慎簡乃僚是使羣司各自求其小者而天子命其大者也漢氏得人皆自州縣補署五府辟召然後升于天朝魏晉以來始專委選部夫以天下之大士人之衆而委之𢾗人之手用刀筆以量才案簿書而察行倡使平如權衡明如水鏡猶力有所極照有所窮况所委非人而有愚閽阿私之弊乎願略依周漢之規以救晉魏之失疏奏不納五月洛水溢關中旱蝗東都霖雨洛水溢溺民居千餘家關中先水後旱蝗繼以疾疫米斗四百兩京間死者相枕于路人相食秋七月作奉天宫上既封泰山欲遍封五嶽作奉天宫于嵩山之南監察御史裏行李善感諫曰陛下封泰山告太平致羣瑞與三皇五帝比隆矣數年不稔餓殍相望四夷交侵兵車歲駕陛下冝恭默思道以禳災譴更廣行宫室勞役不休天下莫不失望上不納自禇遂良韓瑗之死中外以言為諱幾二十年及善感始諫天下皆嘉謂之鳯鳴朝陽上遣宦者沿江徙異竹所在縱暴荆州長史蘇良嗣囚之上疏切諫以為致逺方異物煩擾道路恐非聖人愛人之意上手詔慰論令棄竹江中蘇良嗣世長之子零陵王明自殺初曺王明以太子賢黨降封零陵王黔州安置至是都督謝祐希天后意逼使自殺上深惜之黔府官屬皆坐免官祐後寢于平閣夜失其首及明子後為天后所殺有司籍其家得祐首漆為穢器題云謝祐乃知明子使刺客服之也突厥骨篤祿寇并州薛仁貴大破之突厥餘黨阿史那骨篤祿阿史德元珍等招集亡散據黑沙城反寇并州代州都督薛仁貴將兵擊之虜問唐大將為誰應之曰薛仁貴虜曰吾聞仁貴流象州注見前死久矣何紿我也仁貴免胄示之面虜相顧失色下馬列拜稍稍引去仁貴因奮擊大破之明年五月骨篤祿寇蔚州殺刺史豐州都督崔智辨將兵邀之為虜所擒朝議欲廢豐州司馬唐休璟上言豐州阻河為固居賊衝要今若廢之則潰河之地恐為賊有非國家之利也乃止蔚州注見前豐州隋置故城在今鄂爾多斯右翼唐休璟名璿以字行京兆始平人以婁師德為河源軍經略副使吐蕃寇河源師德將兵擊之于白水澗在西寧府西北八戰八捷上以師德為比部刑部尚書屬員外郎左驍騎郎將充使曰卿有大武材勿辭也癸未𢎞道元年夏四月綏州部落稽注見前作亂討平之部落稽白鐵余余姓之鐵工因以為號埋銅佛于地中久之草生其上紿鄉人曰吾于此數見佛光集衆掘地果得之因曰得見聖佛者百疾皆愈逺近赴之數年歸信者衆遂謀作亂據城平縣本西魏城中縣隋更名衆廢故城在今綏德州清澗縣稱皇帝置百官遣右武衛將軍程務挺與王方翼討之擒白鐡余餘黨悉平秋七月詔以來年有事于嵩山冬十一月詔罷之詔封嵩山已而上疾甚故罷上苦頭重不能視召侍醫秦鳴鶴診之請刺頭出血可愈天后不欲上疾愈怒曰此可斬也乃欲于天子頭刺血上曰但刺之未必不住乃刺二穴上曰吾目似明矣后舉手加額曰天賜也自負綵百匹以賜鳴鶴詔太子監國以裴炎劉景先祥道子本名齊賢後更名郭正一兼東宫平章事十二月帝崩太子即位是為中宗尊天后為皇太后上疾甚夜召裴炎入受遺詔遂崩遺詔太子柩前即位軍國大事有不决者兼取天后進止越六日太子即位尊天后為皇太后政事咸取决焉以劉仁軌為左僕射裴炎為中書令劉景先為侍中故事宰相于門下省議事謂之政事堂及裴炎遷中書令始遷政事堂于中書省中宗皇帝甲申嗣聖元年二月睿宗文明元年九月太后光宅元年春正月立妃韋氏為皇后二月太后廢帝為廬陵王立豫王旦𢎞道元年以相王徙封更名帝欲以后父韋元貞京兆萬年人為侍中裴炎固爭帝怒曰我以天下與韋元貞何不可而惜侍中邪炎懼白太后密謀廢立太后集百官于乾元殿勒兵宣令廢帝為廬陵王帝曰我何罪太后曰汝欲以天下與韋元貞何得無罪乃幽于别所立豫王旦為皇帝即睿宗妃劉氏為皇后永平王成器豫王子為太子廢太孫重照為庶人改元文明旦居别殿不得有所豫政事皆決于太后有飛騎十餘人飲于坊曲一人言嚮知别無勳賞不若奉廬陵一人起告之座未散皆捕繫羽林獄言者斬餘皆絞告者除五品官告密之端自此興太后以劉仁軌為西京留守仁軌上疏辭以衰老不堪居守因陳吕后禍敗之事以申規戒太后璽書慰諭之太后始御紫宸殿洛陽宫內朝之殿太后御武成殿在洛陽宫內東北皇帝豫王也帥王公以下上尊號自是太后常御紫宸殿施黲紫紫色之淺者帳以視朝三月太后殺故太子賢初太后命將軍邱神績和之孫詣巴州檢校故太子賢宅以備外虞風使殺之至是神績逼賢自殺太后乃歸罪神績貶之而追封賢為雍王尋復以神績為金吾將軍夏四月太后遷帝于房州即房陵注見前又遷于均州注亦見前秋七月溫州唐置今為府屬浙江大水流四千餘家括州亦大水流二千餘家八月葬乾陵在乾州西北賀善贊曰髙宗瀆亂人倫委政房間幾貽宗社之禍可勝罪哉太后以尚書左丞馮元常安陽人子琮曾孫為隴州西魏置今屬鳯翔府刺史初元帝為髙宗所委常密言中宫威權太后宜稍抑損髙宗深然其言而不能用及太后稱制四方爭言符瑞嵩陽獻瑞石元常奏言狀涉諂詐不可誣罔天下太后不悅出之九月太后改元及服色官名太后改元光宅旗幟皆從金色八品服碧髙宗上元初敕文武官三品以上服紫四品深緋五品淺緋六品深緑七品淺緑八品深青九品淺青東都為神都尚書省為文昌臺僕射為左右相六曹為天地四時六官門下省為鸞臺中書省為鳯閣侍中為納言中書令為內史御史臺分為左右肅政臺其餘悉以義改類之太后立武氏五廟通鑑綱目俱作七廟考唐書武后傳光宅元年追尊武氏五代祖為公髙曽祖考皆為王遣使者告五世廟室裴炎傳武承嗣請立武氏七廟炎諫太后不悅而罷又武后紀天授元年九月改國號周立武氏七廟光宅初本欲立七廟以裴炎諫止立五廟及天授改國乃于五廟之外又立周文王及平王少子武二廟共為七廟也綱目因仍通鑑原文未及詳考本史故于是年綱書七廟而目則止及五世天授改國目中則詳記所立之七廟前後似未明晰今依唐書改正太后以武承嗣同三品承嗣請追王其祖立武氏七廟裴炎諫曰太后母臨天下當示至公不可私于所親獨不見吕氏之敗乎太后曰吕氏以權委生者故敗今吾追尊亡者何傷乎對曰事當防微杜漸不可長耳太后不悅尊五代祖為公妣為夫人髙曽祖考為王妣皆為妃英公李敬業起兵揚州太后遣將軍李孝逸淮安王神通子擊之時諸武用事唐宗室人人自危衆心憤惋㑹栁州司馬英公李敬業本眉州刺州坐事貶及弟敬猷盩厔令免官唐之竒給事中貶括蒼令駱賔王貶臨海丞杜求仁正倫之姪以詹事司直貶黟令魏思溫御史被黜皆失職怨望乃謀起兵遂矯詔殺揚州長史開府庫赦囚徒旬日間得勝兵十餘萬復稱嗣聖元年敬業自稱匡復上將復求得貌類濮王賢者置之軍中云賢不死逃至此令其舉兵移檄州縣略曰僞􅎔朝武氏者人非溫順地實寒微昔充太宗下陳嘗以更衣入侍洎乎晚節穢亂春宫密隱先帝之私隂圖後庭之嬖踐元后于翬翟陷吾君于聚麀殺姊屠兄弒君䲴母人神之所同嫉天地之所不容包藏禍心竊窺神器君之愛子幽之于别宫賊之宗盟在委之以重任一抔之土未乾六尺之孤何太后見檄問誰所為或對曰駱賔王太后曰宰相之過也人有如此才而使之流落不偶乎遣左玉鈐衛大將軍李孝逸將兵三十萬以討敬業追削其祖考官爵發冡斫棺復姓徐氏太后殺侍中裴炎以騫味道騫氏閔子騫之後以字為氏味道蘭州金城人為內史李景諶同平章事武承嗣與從父弟三思元慶之子以韓王元慶魯王靈䕫二王皆髙祖子屬尊位重屢勸太后因事誅之太后謀于執政裴炎固爭及李敬業舉兵太后問計于炎對曰皇帝年長不親政事故豎子得以為辭若太后反政則不討自平矣承嗣因使監察御史崔察藍田人言炎有異圖太后命左肅政大夫騫味道鞫之鳳閣舍人李景諶證炎必反劉景先胡元範中州義陽人為鳯閣侍郎明其必不反遂并下獄以騫味道檢校內史李景諶平章事斬裴炎于都亭籍沒其家無甔石之儲景先等流貶有差炎弟子太僕寺丞胄先年十七上封事求見曰陛下為李氏婦先帝棄天下遽攬朝政變易嗣子踈李氏封崇諸武伯父忠于社稷反誣以罪戮及子孫陛下所為如是臣實惜之陛下早宜復子明辟髙枕深居則宗族可全不然天下一變不可復救矣太后怒命于朝堂杖而流之李敬業取潤州唐置今江南鎮江府是李孝逸擊殺之初魏思溫說李敬業直指洛陽薛仲璋以不如先取常潤為定霸之基思溫曰山東豪傑以武氏專制憤惋不平聞公舉事皆蒸麥為糧伸鋤為兵以俟南軍之至不乘此勢以立大功乃更自謀巢穴逺近聞之其誰不解體敬業不從將兵渡江陷潤州思溫謂社求仁曰兵勢合則彊分則弱敬業不并力渡淮收山東之衆以取洛陽敗在眼中矣敬業聞李孝逸將至回軍拒之屯下阿溪在揚州府髙郵州西北使敬猷逼淮隂孝逸軍至臨淮戰不利監軍御史魏元忠曰天下安危在兹一舉今大軍久留不進萬一朝廷更命他將以代將軍將軍何辭以逃逗撓之罪乎孝逸乃引軍而前元忠請先擊敬猷孝逸從之敬猷走敬業勒兵阻溪拒守元忠復言于孝逸因風縱火敬業大敗將走入海其將王那相斬敬業等首以降餘黨皆捕得傳首神都胡氏寅曰元忠智謀誠為可用然其言曰天下安危在此一舉夫敬業敗則武氏愈安何繫于唐室乎太后殺單于道安撫大使程務挺初裴炎下獄務挺密表申理至是或譖務挺與炎及敬業通謀太后遣使即軍中斬之突厥宴飲相慶太后以王方翼與務挺相善流崖州而死先是方翼為安西郡護擊破那史那車簿及三姓咽麵等西突厥遂平以廢后近屬竟不録功至是遂流死三姓咽麵鐡勒别部乙酉二年太后垂拱元年春正月帝在均州劉友益曰每嵗首必書帝所在存正統也三月太后遷帝于房州太后頒垂拱格夏五月太后制百官及百姓皆得自舉秋七月太后以僧懷義為白馬寺主懷義得幸于太后太后以為白馬寺主懷義鄂人本姓馮名小寶賣藥洛陽市因千金公主以進遂得幸于太后欲令出入禁中因度為僧又以其家寒徵令與駙馬都尉薛紹合族紹以季父事之懷義乘御馬朝貴皆匐匍禮謁武承嗣三思皆執僮僕之禮懷義皆聚無賴少年度為僧縱橫犯法人莫敢言御史馮思朂屢以法繩之懷義遇諸塗令從者毆之幾死太后託言懷義有巧思使入宫營造補闕王求禮許州長社人表請閹之庶不亂宫闥表寢不出丙戌三年太后垂拱二年春正月帝在房州太后歸政于豫王旦尋復稱制太后下詔歸政豫王綱目于武后稱制後中宗睿宗自稱諡以别今以目從綱中宗稱帝睿宗仍稱豫王知太后非誠心奉表固辭太后復臨朝稱制二月辛未朔日食三月太后置銅匭受密奏太后自徐敬業之反疑天下人多圖已又自以久專國事內行不正知宗室大臣怨望不服欲大誅殺以威之乃盛開告密有告密者給馬供食使詣行在所農夫樵人皆得召見或不次除官無實者不問于是四方告密者蜂起有魚保家者請鑄銅為匭以受天下密奏其器一室四壁上各有竅可入不可出太后善之未幾其怨家投匭告保家嘗為徐敬業作兵器遂伏誅胡人索元禮因告密召見擢為遊擊將軍令按制獄元禮性殘忍推一人必令引數千百人于是周興長安人來俊臣萬年人之徒效之興纍遷至秋官侍郎俊臣至御史中丞皆養無賴𢾗百人意所欲陷則使數處俱告之辭狀俱同既下獄則以威刑脅之無不誣服又造告密羅織經數千言網羅無故織成反狀構造布置皆有支節其訊囚酷法有定百脉突地吼死猪愁求破家反是實等號中外畏之甚于虎狼麟臺正字陳子昂上疏曰執事者疾徐敬業首亂唱禍將息姦源遂使陛下大開詔獄重設嚴刑有迹涉嫌疑辭相逮引莫不窮捕考按至有姦人熒惑乘險相誣紏告疑似冀圖爵賞及其窮竟百無一實陛下仁恕又屈法容之遂使姦惡之黨快意相讐天下喁喁莫知寧所臣聞隋之末代天下猶平楊元感作亂不踰月而敗天下之弊未至土崩焬帝不悟專行屠戮大窮黨與遂至殺人如麻流血成澤天下靡然始思為亂前事之不忘後事之師也伏惟陛下念之太后不聽子昂又嘗上疏曰宰相陛下之腹心刺史縣令陛下之手足未有無腹心手足而能獨理者皆不可以不擇也又曰天下有危機禍福因之而生百姓是也百姓安則樂其生不安則輕其死輕其死則天下亂矣陳子昂字伯玉梓州射洪人夏六月太后以岑長倩為內史蘇良嗣韋待價挺之子為左右相韋思謙為納言良嗣為相遇懷義于朝堂懷義偃蹇不為禮良嗣大怒命左右批其頰懷義訴于太后太后曰阿師當于北門出入南牙宰相所往來勿犯也秋九月有山出于新豐雍州言新豐縣東南有山踊出太后改新豐為慶山縣江陵人俞文俊上書言天氣不和而寒暑併人氣不和而疣贅生地氣不和而塠阜出今陛下以女主處陽位反易剛柔故地氣塞隔而山變為災陛下謂之慶山臣以為非慶也伏惟側身修德以答天譴不然禍今至矣太后怒流之嶺外丁亥四年大后垂拱三年春正月帝在房州夏四月太后殺同三品劉禕之禕之竊謂鳳閣舍人賈大隱洺州永年人曰太后廢昏立明安用臨朝稱制不如反政以安天下之心大隱密奏之太后不悅或誣禕之受金太后命王本立推之本立宣敕示之禕之曰不經鳯閣鸞臺何名為敕太后怒賜死禕之初下獄豫王為之上疏申理親友皆賀之禕之曰此乃所以速吾死也􅎔刑沐浴神色自若草謝表立成數紙秋七月突厥寇朔州太后遣黑齒常之擊之突厥骨篤祿寇朔州太后遣黑齒常之李多祚擊之突厥走散磧北多祚世為靺鞨酋長以軍功賜姓得入宿衛常之每得賞賜皆分將士有善馬為軍士所損官屬請笞之常之曰奈何以私馬笞官兵乎卒不問九月虢州人楊初成矯詔募人迎帝于房州太后殺之冬十月太后流李孝逸于儋州唐置今屬廣東瓊州府孝逸自克徐敬業聲望甚重武承嗣等惡而譖之出為施州後周置今湖北施南府是刺史至是承嗣誣孝逸自言當有天分太后以孝逸有功滅死除名流儋州卒太后罷御史監軍太后欲遣韋待價擊吐蕃韋方質奏請遣御史監軍太后曰古者明君遣將閫外之事悉以委之比聞御史監軍軍法事皆承禀以下制上非令典也且何以責其有功遂罷之大饑戊子五年太后垂拱四年春正月帝在房州太后立崇先廟太后立崇先廟以享武氏祖考命有司議室數博士周悰請為七室減唐太廟為五室春官侍郎賈大隱奏禮天子七廟諸侯五廟百王不易崇先廟室應如諸侯之數國家宗廟不應輒有變移太后乃止二月太后毁乾元殿作明堂初太宗髙宗之世屢欲立明堂諸儒議其制度不決而止至是太后獨與北門學士議其制諸儒以為明堂當在國陽丙巳之南三里之外七里之內太后以為逺毁乾元殿以其地為之以僧懷義為之使凡役數萬人夏四月太后殺太子舍人郝象賢象賢處俊之孫也初太后有憾于處俊㑹奴誣告象賢反遂族誅之象賢臨刑極口罵太后發揚宫中隱慝自是法官刑人先以木丸塞其口五月太后加號聖母神皇武承嗣使人作瑞石文曰聖母臨人永昌帝業使人獻之曰獲之洛水太后喜命曰寶圖詔當拜洛受圖以洛水為永昌水告謝于郊御明堂朝群臣命諸州都督刺史宗戚並㑹神都先加尊號六月丁亥朔日食河南巡撫大使狄仁傑奏焚淫祠仁傑以吳楚多淫祠奏焚其一千七百餘所獨留夏禹吳太伯季扎伍員四祠秋八月琅邪王冲越王貞子越王貞太宗子舉兵匡復不克而死太后遂大殺唐宗室太后潛謀革命稍除宗室韓王元嘉等內不自安密有匡復之志及后將受圖召宗室朝明堂諸王遞相驚曰神皇欲因此盡收宗室誅之于是元嘉子黃公撰詐為皇帝中宗璽書分告諸王令各起兵琅邪王冲募兵得五千人擊武水隋縣五代周廢故城在今東昌府聊城縣不克還走博州隋置今東昌府是為門者所殺越王貞聞冲起亦舉兵豫州注見前未幾戰潰自殺初諸王往來相結約未定而冲先廢惟貞狼狽應之諸王皆不敢發故敗太后削貞父子屬籍更姓虺民并欲悉誅韓魯諸王命監察御史蘇珦藍田人按之無驗太后召詰之珦抗論不回太后曰卿大雅之士朕當别有任使此獄不必卿也使周興等按之乃收韓王元嘉魯王靈䕫黃公撰等于東都逼使自殺親黨皆誅常樂大長公主髙祖女也下嫁趙瓌瓌時為壽州刺史貞將起兵遣使告之公主謂使者曰李氏危若朝露諸王先帝之子不捨生取義欲何須邪大大夫當為忠義鬼無為使死也及貞敗亦坐死霍王元軌江都王緒元軌子東莞公融虢王鳯子髙祖孫皆坐與二王通謀為太后所殺紀王愼太宗子獨不與謀亦坐徙巴州道卒慎女東光縣主楚媛適司儀郎裴仲將相敬如賔時宗女皆以驕奢相尚誚媛之儉素楚媛曰自古女子皆以恭儉為美縱侈為惡富貴儻來之物何足驕人衆皆慙服及聞慎卒號慟嘔血不御膏沐垂二十年越王貞之敗也太后以狄仁傑為豫州刺史時貞黨坐者六七百家當籍沒者五千口仁傑密奏彼皆詿誤而臣欲顯奏似為逆人申理不言又乖陛下仁恤之㫖太后特原之皆流豐州仁傑先為寧州刺史有德政及是流者道過寧州父老迎勞曰我狄使君活汝邪相携哭于德政碑下三日而後行太后拜洛受圖太后拜洛受圖豫王及太子皆從內外百官蠻夷酋長各依方叙立文物鹵簿之盛唐興以來未之有也明堂成作天堂明堂髙二百九十四尺方三百尺凡層三下層法四時各隨方色中層法十二辰上為圓蓋九龍捧之上層法二十四氣亦為圓蓋上施鐡鳯高一大飾以黃金號曰萬象神宫又于明堂北起天堂五級以貯大像懷義所作夾紵大像也至三級則俯視明堂矣以懷義為威衛大將軍梁國公侍御史王求禮上書曰古之明堂茅茨不剪采椽不斫今者飾以珠玉圖以丹青瓊臺瑤室無以加也不報己丑六年太后永昌元年春正月帝在房州太后大饗萬象神宫太后服袞冕搢大圭執鎮圭為初獻豫王為亞獻太子為終獻周國先王武氏祖父亦與饗焉禮畢御門大赦布政于明堂頒九條以訓百官又尊周忠孝王為太皇妣為太后墓曰昊陵順陵夏四月太后殺汝南王煒蔣王惲子太宗孫鄱陽公諲道王元慶子髙祖孫等十三人及天官侍郎鄧元挺藍田人諲謀迎帝中宗于房陵以問元挺煒又嘗謂元挺曰欲為急計何如元挺皆不應坐知反不告同誅是冬太后又殺鄭王璥等六人滕王修琦等六人免死流嶺南璥元懿子修琦元嬰子皆髙祖孫嗣王五月太后以僧懷義為新平軍注見前大總管討突厥懷義行至紫河在今歸化城南不見虜刻石紀功而還明年復命懷義北討辱罷秋七月太后殺內史張光輔京兆人徐敬業之敗也弟敬真流繡州唐置治常林故城在今廣西潯州府桂平縣將奔突厥為吏所獲敬真多引海內知識冀以免死誣內史張光輔私論圖䜟隂懷兩端遂被誅初越王貞等起兵太后遣兵擊之命光輔節度光輔久留孫州多殺無辜狄仁傑謂曰亂河南者一越王貞今官軍暴掠殺人丹野是一貞死萬貞生恨不得尚方斬馬劍加明公頸雖死如歸耳光輔奏之仁傑坐貶至是敬真誣光輔在豫州時有異圖遂誅秋官尚書張楚金祁人道源族孫陜州刺史郭正一鳯閣侍郎元萬頃洛陽令魏元忠皆當死臨刑太后使馳騎赦之當刑者皆喜躍歡呼元忠獨安坐自如既宣敕乃徐起拜竟無憂喜之色遂流嶺南是日隂雲四塞既釋楚金等天氣晴霽初太后問陳子昻為政之要子昻上疏以為宜緩刑崇德息兵革省賦役撫慰宗室各使自安辭婉意切其論甚美及楚金等免死又上疏曰比者敕免楚金等死是日初有風雨變為景雲臣聞隂慘者刑也陽舒者德也聖人法天天亦助聖今又隂雨臣恐過在獄官惟陛下嚴懲酷吏使天下咸服豈非至德克明哉閏月太后殺同平章事魏元同魏元同素與裴炎善時人以其終始不渝謂之耐久朋周興素惡元同誣之曰元同言后老矣不若奉嗣君為耐久太后怒賜死于家或教之告密冀得召見自陳元同歎曰人殺鬼殺等耳豈能作告密人邪乃就死自餘內外大臣坐死及流貶甚衆彭州長史劉易從為徐敬真所引就州誅之易從為人仁孝忠謹將刑于市吏民憐其無辜遠近奔走竸解衣投地曰為長吏求冥福有司平準直十餘萬興等又誣武衛大將軍黑齒常之謀反徵下獄常之縊死冬十一月太后享萬象神宫始用周正改十一月為正月十二月為臘月夏正月為一月太后自名曌即照字改詔曰制鳯閣侍郎宗秦客蒲州人太后從父姊之子改造十二字照為曌天為地為日為月為星為召為臣為人為載為年為正為以獻至是行之除唐宗室屬籍從周興之請也御批厯代通鑑輯覽卷五十二

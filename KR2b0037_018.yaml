body:
  text: 上以災變愽謀羣臣中壘校尉武帝置掌北軍壘門内又外掌西域劉向上書曰臣聞易曰觀乎天文以察時變異有小大希稠占有舒疾緩急今日食尤屢星孛東井攝提漢書天文志大角兩旁各有三星鼎足勾之曰攝提炎及紫宫五行志是年七月星孛東井踐五諸侯出河戍北貫紫宮中南逝犯大角攝提此變之大者也其事難一二記臣雖圖上猶須口説願賜清燕之間指圖陳狀上輙入之謂召入也向具言方今同姓疏逺母黨專政禄去公室權在外家非所以保守社稷安固後嗣也其言多痛切上終不能用時谷永為北地太守當之官上使淳于長受所欲言永對曰建始以來二十載間羣災大異交錯蜂起内則為深宫後庭驕臣悍妾醉酒狂悖卒起之敗苑囿街巷臣妾之家徴舒崔杼之亂外則為諸夏下士陳勝項梁奮臂之禍下有其萌然後變見于上可不致慎永黨于王氏專攻上身與後宫上亦知之不甚親信也後上欲用劉向為九卿為王氏所持故終不遷谷永自北地徵入為大司農歲餘以病免冬十二月大司馬衛將軍商卒諡景成以王根為大司馬驃騎將軍商卒紅陽侯立次當輔政先是立使客于南郡占墾草田數百頃以入縣官而貴取其直一萬萬以上為丞相司直孫寳字子嚴鄢陵人所發上由是廢立而用根故槐里令朱雲言事得罪既而釋之故丞相安昌侯張禹雖家居以帝師位特進甚尊重天子賞賜前後千萬禹内殖貨財買田多至四百餘頃皆極膏腴身居大第後堂日理絲竹管絃又自治冡塋奏請肥牛亭地王根以地當平陵寢廟衣冠所出游道宜更䁑禹他地上不從王根害其寵數毁惡之上愈益敬厚禹禹疾車駕自臨問親拜禹床下禹數目其少子少子未有官上即拜為黄門即國家每有大政必與定議時吏民上書言災異王氏專政所致上意頗然之乃至禹第辟左右親以吏民所言示禹禹自見年老子孫弱又與根有隙恐為所害謂上曰災變之意深逺難見故聖人罕言命不語怪神陛下宜修政事以善應之新學小生亂道誤人宜無信用上雅信愛禹因此不疑王氏故槐里令朱雲上書求見公卿在前雲曰今朝廷大臣皆尸位素餐孔子所謂鄙夫不可與事君茍患失之無所不至者也臣願賜上方斬馬劔斷佞臣一人頭以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲攀殿檻檻折雲呼曰臣得下從龍逄比干遊於地下足矣未知聖朝何如耳於是左將軍辛慶忌免冠叩頭殿下曰此臣素著狂直使其言是不可誅其言非固當容之臣敢以死爭慶忌叩頭流血上意乃解及後當治檻上曰勿易因而輯之以旌直臣初雲在元帝時五鹿充宗方貴幸為梁邱易與諸家論充宗乗貴辯口諸儒莫能抗雲獨與論難連拄之故諸儒為之語曰五鹿嶽嶽朱雲折其角及是復言張禹後遂不復仕常居鄠教授弟子卒于家辛亥三年春岷山注見前崩壅江三日江水竭劉向曰周岐山注見前崩三川竭而幽王亡岐山者周所興也漢家本起于蜀今所起之地山崩川竭星孛又及攝提大角從參注見前至辰大火也注見前殆必亡矣癸丑綏和元年春三月立定陶王欣共王康子即哀帝為皇太子先是中山王興定陶王欣來朝中山王獨從傅定陶王盡從傅相中尉上問定陶王對曰令諸侯王朝得從其國二千石故盡從之令誦詩通習能説問中山王獨從傅在何法令不能對令誦尚書又廢帝由是以為不能而賢定陶王數稱其材是時二王于帝為至親定陶傅太后即共王康之母𫝊昭儀隨王來朝私賂遺趙皇后昭儀及王根三人見上無子亦欲豫自結為長乆計皆勸帝以為嗣帝為加元服而遣之事在元延四年至是使執金吾任宏守大鴻臚持節徴定陶王立為太子時孔光議以為宜立中山王上不從左遷光為廷尉十一月上以太子既奉大宗後不得顧私親乃立楚孝王孫景為定陶王以奉共王後初太子㓜時祖母傅太后躬自養視至是為太子詔𫝊太后與太子母丁姫自居定陶國邸不得相見皇太后曰太子小而傅太后抱養之今至太子家以乳母恩耳不足有所妨于是許之是年八月中山王興卒封孔吉孔子十三世孫為殷紹嘉侯三月與周承休侯注見前皆進爵為公初元帝時詔求殷後分㪚為十餘姓推求其嫡不能得匡衡以為宜封孔子世為湯後議寢不行至是梅福復言之上乃下詔封吉與周承休侯俱進爵為公地各百里夏四月建三公官御史夫夫何武言末俗事煩宰相才不及古而獨兼三公之事所以不治宜建三公官上從之以王根為大司馬罷驃騎將軍官武帝置大司馬以冠將軍之號無印綬官屬至是始授金印紫綬置官屬不復領將軍以武為大司空封汜鄉侯皆増奉如丞相以備三公焉冬十月大司馬根病免衛尉淳于長有罪下獄死廢后許氏自殺以王莽為大司馬初趙皇后之立長有力焉故上德之大見信用貴傾公卿許后姊孊音靡后姊名初為龍頟侯韓寳妻寳以鴻嘉元年卒寡居長與私通因娶為小妻許后時徙居長定宫三輔黄圖林光宫中有長定宫因孊厚貽長求復為偼伃長受詐許為白上立以為左皇后輙與孊書戱侮許后嫚易無不言王莽心害長寵白之莽侍王根疾因言長見將軍乆病意喜自以當代輔政且言其罪根怒使白東宫莽求見太后具言其狀太后亦怒命徃白帝上以太后故免長官不治罪遣就國㑹紅陽侯立上疏為長求留上疑之逮長繫詔獄窮治長具服辠至大逆死獄中紅陽侯立故與長有怨及長當就國立嗣子融從長請車騎長以珍寳遺立立因為長求留上疑之下吏按騐立令融自殺以滅口上愈疑其有大姦遂下長獄遣立就國丞相方進復劾奏立黨友後將軍朱博等免官歸郡朱博字子元杜陵人使廷尉孔光持節賜許后藥自殺葬延陵交道廐西上以王莽首發大奸稱其忠直王根因薦莽自代遂以莽為大司馬莽既繼四父輔政欲令名譽過前人聘請賢良以為掾史賞賜邑錢悉以享士愈為儉約母病公卿列侯遣夫人問疾莽妻迎之衣不曵地布蔽膝見之者以為僮使問知夫人皆驚其餙名如此罷刺史置州牧秩二千石丞相大司空言春秋之義用貴治賤不以卑臨尊刺史位下大夫而臨二千石輕重不相凖請罷刺史更置州牧以應古制從之哀帝建平二年以朱博言罷州牧復置刺史如故詔立辟雍注見前未作而罷犍為郡注見前于水濵得古磬十六枚議者以為善祥劉向因是説上宜興辟雍設庠序陳禮樂以風化天下或曰不能具禮顔師古曰此向設為難者之言也禮以養人為本如有過差是過而養人也刑罸之過或至死傷今之刑有司定法筆則筆削則削至于禮樂則曰不敢是敢于殺人不敢于養人也夫教化所恃以為治刑法所以助治也今廢所恃而獨立其所助非所以致太平也帝以其言下公卿議丞相大司空奏請立辟雍按行長安城南營表未作而罷時又有言孔子布衣養徒三千人今天子太學弟子少于是増弟子員三千人歲餘復如故未幾劉向亦卒甲寅二年春二月丞相方進卒時熒惑守心注見前丞相府議曹李尋奏記方進言今災變廹切大責日加安得但保斥逐之戮闔府三百餘人丞相官屬唯君侯擇其中與盡節轉凶方進憂之不知所出㑹郎賁音肥麗善為星言大臣宜當之上乃召見方進還歸未及引决上遂賜册責讓使尚書令賜上尊酒十石如淳曰稻米二斗得酒一斗為上尊養牛一方進即日自殺如淳曰漢儀注有天地大變皇帝使侍中持節乗四白馬賜上尊酒十斛牛一頭䇿告殃咎使者去半道丞相即上病使者還未白事尚書以丞相不起病聞上秘之遣九卿册贈印綬賜乗輿秘器親臨弔者數至禮賜異于它相故事三月帝崩帝素彊無疾病時梁王名立梁懐王揖七代孫楚王名衍宣帝孫楚孝王囂子來朝明旦當辭去又欲拜孔光為丞相已刻侯印書贊顔師古曰贊謂延拜之辭昬夜平善鄉晨欲起不能言而崩民間讙譁咸歸罪趙昭儀皇太后詔大司馬莽雜治問皇帝起居發病狀趙昭儀自殺以孔光為丞相光于大行前拜受丞相博山故城在今河南南陽府淅川縣侯印綬夏四月太子欣即位是為孝哀帝帝初立躬行儉約罷樂府官及官織綺繡除任子令應劭曰任子令者漢儀注吏二千石以上視事滿三年得任同産若子一人為郎不以德選故除之誹謗詆欺法出宫人免官奴婢益小吏俸政皆由已出朝廷翕然望治焉尊皇太后曰太皇太后皇后曰皇太后葬延陵在西安府咸陽縣西北史臣曰成帝善修容儀臨朝淵嘿尊嚴若神博覽古今容受直辭公卿奏議可述然湛于酒色趙氏内亂外家擅朝建始以來王氏始執國命哀平短祚莽遂簒位葢其威福所由來者漸矣追尊定陶共王為定陶共皇太皇太后令傅太后丁姫十日一至未央宫有詔問丞相孔光大司空何武定陶太后宜何居孔光素聞傅太后剛暴長于權謀恐其與政事不欲與帝旦夕相近即議以為宜改築宫何武曰可居北宫上從武言北宫有紫房複道通未央宫傅太后果從複道朝夕至帝所求稱尊號貴寵其親屬髙昌故城在今山東青州府博興縣侯董宏父忠以告霍禹反封侯宏嗣希指言秦莊襄王母本夏氏而為華陽夫人所子及即位後俱稱太后宜立定陶太后為帝太后事下有司王莽師丹帝為太子時丹為太子太傅及即位以為左將軍領尚書事劾奏宏知皇太后至尊之號而稱引亡秦非所宜言大不道上納其言免宏為庻人傅太后大怒要上必欲稱尊號上乃白太皇太后令下詔尊定陶共王為共皇五月立皇后傅氏傅太后從弟晏之子也尊定陶太后曰定陶共皇太后丁姫曰定陶共皇后封丁明共皇后兄𫝊晏共皇太后從父之子皆為列侯晏孔鄉侯明陽安侯共皇太后共皇后各置左右詹事食邑如長信宫皇太后中宫皇后詔劉歆字子駿向少子典領五經王莽薦劉歆有才行為侍中稍遷光禄大夫貴幸上復令典領五經卒父前業歆于是摠羣書而奏其七略有輯略諸書之總要六藝略六藝之文易書詩禮樂春秋論語孝經小學凡九種諸子略曰儒曰道曰隂陽曰法曰名曰墨曰縱横曰雜曰農凡九家外又有小説家詩賦略賦三種雜賦歌詩為五種兵書略權謀形勢隂陽技巧為四種術數略天文厯譜五行蓍龜雜占形法為六種方技略醫經經方房中神仙為四種六月詔限民名田不果行初董仲舒説武帝以秦除井田民得賣買富者田連阡陌貧者無立錐之地小民安得不困古井田法雖難卒行宜少近古限民名田以贍不足塞兼并之路薄賦斂省徭役以寛民力然後可善治也至是師丹復建言帝下其議丞相大司空奏請自諸侯王列侯公主名田各有限闗内侯吏民名田毋過三十頃奴婢毋過三十人期盡三年犯者没入官貴戚近習不便遂寢不行秋七月罷大司馬莽就第以師丹為大司馬封髙樂侯初太皇太后詔莽就第避帝外家莽即上䟽乞骸骨帝遣尚書令詔起之又遣孔光等白太皇太后復令莽視事至是置酒未央宫内者令為傅太后張幄坐于太皇太后坐旁莽按行責内者令曰定陶太后藩妾何以得與至尊並徹去更設坐傅太后大怒不肯坐莽乞骸骨罷就第時右將軍傅喜𫝊太后從弟好學問有志行莽既罷衆庻歸望于喜先是上官爵外親喜獨執謙稱疾傅太后始與政事數諫之由是傅太后不欲令喜輔政乃以師丹為大司馬而賜喜黄金百斤以光禄大夫遣歸養病何武唐林沛國人皆上書言喜行義修潔忠誠憂國今以寢病一旦遣歸衆庻失望忠臣社稷之衛喜立于朝陛下之光輝傅氏之廢興也上亦自重之故尋復進用焉遣曲陽侯王根就國免成都侯王况商之子為庻人帝少聞王氏驕盛心不能善司𨽻校尉解光奏曲陽侯根三世據權五將秉政天下輻凑臧累巨萬大治第宅殿上赤墀户青瑣游觀射獵使奴從者被甲持弓弩陳歩兵止宿離宫水衡供帳發民治道百姓苦其役推親近吏張業為尚書蔽上壅下先帝山陵未成公聘取故掖庭女樂殷嚴王飛君等置酒歌舞成都侯况亦聘取故掖庭貴人以為妻皆無人臣禮大不敬不道上以根嘗建社稷之筞遣就國而免况為庻人九月地震自京師至北邊郡國三十餘處地震壊城郭壓殺四百餘人上以災異問待詔李尋對曰日者衆陽之長君之表也間者光明侵奪失色邪氣珥蜺珥音耳蜺讀曰齧皆日旁氣也數作惟陛下執乾剛之德諸保阿乳母甘言卑辭之託斷而勿聼勉強大誼絶小不忍有不得已可賜以貨財不可私以官位月者衆隂之長妃后大臣諸侯之象也間者月數為變此為母后與政亂朝惟陛下親求賢士以崇社稷五行以水為本今汝潁漂涌並為民害咎在皇甫卿士之屬惟陛下少抑外親大臣地道柔靜隂之常義也間者地數震宜務崇陽抑隂以救其咎傳曰土之美者善養禾君之明者善養士中人皆可使為君子如近世貢禹以言事忠切蒙尊榮當此之時士厲身立名者多及京兆尹王坐言事誅滅智者結舌邪偽並興外戚顓命女宫作亂此行事之敗徃者不可及來者猶可追也宜選練左右舉有德行道術通明之士以輔聖德下至郎吏從官行能亡異又不通一藝及博士無文雅皆使就南畆以視天下上雖不能從然頗采其語尋遷黄門侍郎求能浚川䟽河者騎都尉平當平以邑為氏當字子思平陵人以經明禹貢使領河堤奏言按經義治水有决河浚川而無隄防壅塞之文宜博求能浚川䟽河者上從之待詔賈譲奏言治河有上中下筞古者立國居民疆理土地必遺川澤之分度水勢所不及顔師古曰遺留度計也言川澤流聚之處皆留而置之必計水之所不及然後居而田之也大川無防小水得入陂障卑下以為汙澤使秋水多得其所休息左右游波寛緩而不廹夫士之有川猶人之有口也故曰善為川者决之使道善為民者宣之使言隄防之作近起戰國齊地卑下作隄去河二十五里趙魏亦為隄去河二十五里雖非其正水尚有所游盪今隄防陿者去水數百歩逺者數里民起廬舍其間此皆前世所排也河從河内黎陽注皆見前至魏郡昭陽故城今在河南彰德府安陽縣東西互有石隄激水使還百餘里間河再西三東廹阨如此不得安息今行上筞徙冀州之民當水衝者决黎陽遮害亭在今濬縣西南舊為河所經放河使入海河西薄大山謂太行諸山東薄金堤勢不能逺汎濫朞月自定此功一立河定民安故謂之上筞若乃多穿漕渠于冀州地使民得以溉田分殺水怒雖非聖人法然亦救敗術也可從淇口淇水之口也在今河南衛輝府輝縣西北以東為石隄多張水門冀州諸渠皆股引取之旱則開東方下水門溉冀州水則開西方髙門分河流通渠則下隰填淤加肥禾麥更為秔稻轉漕舟船便此三利也民田適治河堤亦成此誠富國安民興利除害支數百歲故謂中筞若乃繕完故堤増卑倍薄勞費無已數逢其害此最下筞也詔定世宗為不毁之廟孔光何武奏言本始二年制書孝武皇帝為世宗迭毁之次當以時定請與羣臣雜議皆以為孝武皇帝雖有功烈親盡宜毁王舜劉歆曰禮天子七廟可常數者也宗不在此數茍有功德則宗之故殷太甲為太宗太戊為中宗武丁為髙宗宗無數也以七廟言之孝武皇帝未宜毁以所宗言之則不可謂無功德臣愚以為孝武皇帝功烈如彼孝宣皇帝崇立之如此不宜毁制曰可冬十月筞免大司空武遣就國以師丹為大司空左右或議武事親不篤帝亦欲改易大臣乃筞免武就國以丹為大司空丹上書言古者諒闇不言前大行在堂而官爵臣等以及親屬赫然貴寵變動政事卒暴無漸天下者陛下之家也肺腑何患不富貴倉卒若是其不乆長矣書數十上多切直之言傅太后從弟子遷尤傾邪上惡之免官遣歸故郡傅太后怒上不得已復留遷孔光與丹奏詔書前後相反天下疑惑無所取信請歸遷故郡上逼于傅太后卒不得遣復為侍中孝哀皇帝乙夘建平元年新城侯趙欽趙太后弟綏和二年封以罪免徙遼西漢郡治且慮故城在今直𨽻永平府東司𨽻校尉解光解氏晉解陽之後以邑為氏奏言臣聞許美人及故宮中史曹宫皇后宫女史曹姓宫名皆御幸孝成皇帝産子子隠不見臣遣吏問皆得其狀其他飲藥傷墮者無數趙昭儀親滅繼嗣家屬當伏天誅而同産親屬皆在尊貴之位請窮竟議正法于是免欽及欽兄子成陽侯訢皆為庻人將家屬徙遼西郡議即耿育上言將順君父之美銷滅既徃之過古今通義也事不當時固爭各隨指阿從以求容媚晏駕之後乃訐揚幽昧之過空使謗議上及山陵臣所深痛也帝亦以為太子頗得趙太后力遂不竟其事耿氏周耿國之後夏四月以傅喜為大司馬封高武侯秋䇿免大司空髙樂侯丹為庻人復賜爵關内侯泠褒周有泠州鳩後以為氏褒郎中令段猶黄門郎等奏言定陶共皇太后共皇后皆不宜復引定陶藩國之言以冠大號車馬衣服宜皆稱尺孕反副也皇之意置吏二千石以下各供厥職又宜為共皇立廟京師上復下其議羣臣皆以為宜丹曰定陶共皇太后共皇后以定陶共為號者母從子妻從夫之義也欲立官置吏車服與太皇太后並非所以明尊亡二上之義也禮父為士子為天子祭以天子其尸服以士子無爵父之義尊父母也為人後者為之子故為所後服斬衰三年而降其父母朞明尊祖而重正統也孝成皇帝為共皇立後奉承祭祀令共皇長為一國太祖萬世不毁恩義已備陛下既繼體先帝持重大宗承天地宗廟社稷之祀義不得復奉定陶共皇祭今欲立廟于京師而使臣下祭之是無主也又親盡當毁空去一國太祖不墮之祀而就無主當毁不正之禮非所以尊厚共皇也丹由是寖不合上意會丹使吏書奏吏私冩其草丁傅子弟聞之使人上書告丹上封事行道人徧持其書事下廷尉劾丹大不敬博士申咸炔古惠切欽齊人許商弟子上書言丹經行無比奏封事不及深思使主簿書漏泄之過不在丹以此貶黜恐不厭衆心上貶咸欽秩各二等遂筞免丹尚書令唐林上䟽曰丹經為世儒宗德為黄耉親傅聖躬位在三公所坐者㣲免爵太重惟陛下裁之詔賜丹爵闗内侯冬十月以朱博為大司空中山王太后馮氏及其弟宜鄉侯綏和元年封參皆自殺中山王箕子興之子㓜有𤯝病時未滿歲蘇林曰𤯝病名為肝厥發時唇口手足十指甲皆青祖母馮太后自養視數禱祠解帝遣中郎謁者張由將醫治之由素有狂易病顔師古曰狂而變易常性也病發西歸因誣馮太后祝詛上及傅太后傅太后與馮太后並事元帝以當熊事事見前追怨之因是遣御史丁元案騐盡收御者官吏及馮氏昆弟在國者百餘人數十日無所得更遣中謁者令史立治之立受傅太后指治馮太后女弟弟婦死者數十人誣奏云祝詛謀殺上立中山王責問馮太后無服辭立曰熊之上殿何其勇今何怯也太后還謂左右此乃中語前世事吏何用知之欲䧟我故也乃飲藥自殺弟叅召詣廷尉亦自殺參通尚書少為黄門郎宿衛十餘年以嚴見憚不得近侍帷幄以王舅封侯奉朝請五侯皆敬憚之且死歎曰參父子兄弟皆備大位身至封侯今被惡名而死無以見先人于地下衆莫不憐之馮氏死者十七人司𨽻孫寳奏請覆治傅太后大怒乃下寳獄尚書僕射唐林爭之上以林朋黨左遷敦煌魚澤障侯大司馬喜光禄大夫龔勝字君賔楚人固爭上為言太后出寳復官張由賜爵闗内侯史立遷中太僕後帝崩孔光奏前由誣告骨肉立䧟人大辟請免為庻人徙合浦丙辰二年春三月筞免大司馬喜罷三公官夏四月復以御史大夫丁明為大司馬衛將軍丁傅驕奢皆嫉傅喜恭儉又傅太后欲稱尊號喜與孔光師丹共執以為不可帝先免丹以感動喜喜終不順朱博與傅晏連結共謀成尊號事數毁短喜因遂筞免喜朱博又奏言故事選郡國守相髙第為中二千石選中二千石為御史大夫任職者為丞相位次有序今中二千石未更御史大夫而為丞相權輕非所以重國政也臣愚以為大司空官可罷于是更置御史大夫以博為之又以丁明為大司馬衛將軍並如故事是夏傅太后以喜附下㒺上與師丹同心背畔遣就國䇿免丞相博山侯光為庻人以朱博為丞相封陽卿侯孔光自議繼嗣持異又重忤傅太后指筞免為庻人以朱博為丞相以少府趙元為御史大夫臨延登受筞有大聲如鐘鳴殿中以問黄門侍郎掌侍從左右給事中揚雄揚氏出周伯喬與楊别為一氏雄字子雲蜀郡成都人成帝時以王音薦待詔獻羽獵賦除為即及李尋尋對曰此洪範所謂鼓妖洪範傳曰妄聞之氣發于聲音故有鼓妖者也人君不聰為衆所惑空名得進則有聲無形不知所從生宜退丞相以應天變不退期年其人自䝉其咎雄亦以為聽失之象且曰博為人彊毅多權謀宜將不宜相恐有凶惡亟疾之怒上不聽詔共皇去定陶之號立廟京師比宣帝父悼皇考制度尊共皇太后傅氏為帝太太后共皇后為帝太后朱博既相上遂用其議下此詔于是帝太太后稱永信宫帝太后稱中安宫四太后各置少府太僕傅太后既尊後尤驕與太皇太后語至謂之嫗丁傅為公卿列侯侍中諸曹甚衆然帝不甚假以權勢不如王氏在成帝世也免闗内侯師丹為庻人遣新都侯王莽就國丞相御史言師丹王莽抑貶尊號虧損孝道當伏顯誅幸䝉赦令不宜有爵土請免為庶人詔免丹遣莽就國諫大夫楊宣什邡人言孝成皇帝稱述陛下至德以承天序豈不欲以陛下自代承奉東宮哉太皇太后春秋七十數更憂傷勅令親屬引領以避丁傅陛下登高望逺獨不慚於延陵乎帝深感其言復封商子邑為成都侯莽就國杜門自守中子獲殺奴莽切責獲令自殺在國三歳吏民上書頌莽者以百數元夀元年賢良周䕶宋崇等對䇿頌莽功德于是徴莽還京師六月帝太后丁氏崩合葬共皇園大赦改元太初更號陳聖劉韋昭曰敷陳聖劉之德也太平皇帝尋罷待詔夏賀良等伏誅待詔黄門夏賀良重平人初成帝時齊人甘忠可詐造天官厯包元太平經言天帝使真人赤精子下教此道因以傳賀良及郭昌等劉向奏忠可㒺上惑衆下獄病死後司𨽻校尉解光亦以通災異得幸白賀良等所挾忠可書郭昌為長安令勸李尋宜助之尋遂白賀良等皆待詔黄門言漢厯中衰當更受命宜急改元易號可得延年益壽上久寢疾遂從其議改號月餘寢疾自若賀良等復欲妄變政事進退大臣上以其言無騐詔罷改元易號事下賀良等吏皆伏誅李尋及觧光徙敦煌郡秋八月丞相博有罪自殺御史大夫趙元減死論傅太后怨傅喜不已使傅晏風丞相博令奏免喜侯博與趙元議之元許可博惡獨斥奏喜以何武前就國與喜相似即幷奏喜武皆請免為庶人上知傅太后素嘗怨喜疑博元承指即召元問狀元辭服詔减元死罪三等削晏户四分之一假謁者節召丞相詣廷尉博自殺國除冬十二月通鑑作冬十月考漢書表係十二月甲寅今從漢書以平當為丞相封闗内侯李竒曰冬月非封侯時故且先賜爵闗内侯也丁巳三年春三月丞相當卒上欲召封當當病駕不應召或謂當不可彊起受印為子孫耶當曰吾居大位已負素餐受印還死死有餘罪不起所以為子孫也至是卒有星孛于河鼓三星在牽牛北主軍鼓夏四月以王嘉字公仲平陵人為丞相封新甫侯嘉上䟽曰臣聞聖王之功在于得人是以教化行而治功立孝文時吏居官者或長子孫以官為氏其二千石長吏亦安官樂職然後上下相望莫有苟且之意其後稍稍變易數更政事舉劾苛細中材茍容求全下材懐危内顧壹切營私者多惟陛下留神擇賢記善忘過勿責以備令盡力者有所勸此方今急務也因薦儒者公孫光滿昌風俗通荆蠻有瞞氏後改為滿蕭咸字仲望之之子薛修等皆故二千石有名稱者上納用之無鹽東平國治注見前危山在今東平州東北土起瓠山漢書作報山師古曰報本作瓠以其形似瓠耳山在今東平州北石立東平王雲宣帝孫東平思王宇子坐祠祭祝詛自殺以孫寵長安人為南陽太守息夫躬息公子邊爵大夫遂為息夫氏躬字子㣲河陽人為光禄大夫無鹽危山土自起覆草如馳道狀又瓠山石轉立晉灼曰山脅石一枚轉側起立髙九尺六寸旁行一丈廣四尺雲及后謁自之石所祭祀之息夫躬孫寵相與謀曰此取封侯之計也乃因中常侍宋𢎞上變事時上被疾多所惡逮謁騐治言使巫祠祭詛祝上為雲求為天子以為石立宣帝起之表也有司誅王詔廢徙房陵雲自殺謁棄市擢寵為南陽太守𢎞躬皆光禄大夫廷尉梁相疑雲獄有餙辭奏更下公卿覆治尚書令鞠譚僕射宗伯鳯以為可許上以相等顧望無討賊嫉惡之意皆免為庻人戊午四年春闗東民訛言行籌闗東民無故驚走持稾禾捍也或掫麻幹也一枚傳相付與曰行西王母張揖曰狀如人豹尾虎首戴勝而處籌或被髪徒跣或夜折闗踰墻或車騎犇馳經厯郡國二十六至京師不可禁止民又聚㑹設張博具歌舞祠西王母至秋乃止顔師古曰西王母元后壽考之象行籌言執國家之籌筞行于天下二月封傅商傅太后從弟㓜君之子為汝昌侯上欲封商尚書僕射鄭崇平陵人字子㳺傅喜薦之數諫爭每見曵革履上笑曰我識鄭尚書履聲諫曰成帝封五侯天赤黄晝昏日中有黒氣今無故封商壊亂制度逆天人心臣願以身命當國咎因持詔書案起𫝊太后大怒曰何有為天子乃反為一臣顓制耶上遂下詔封商又封傅太后同母弟子鄭業傅太后父蚤卒母更嫁魏郡鄭翁生男惲惲生業為陽信侯追尊業父惲為陽信節侯下尚書僕射鄭崇獄殺之免司𨽻孫寳為庻人侍中董賢雲陽人父恭為御史任賢為太子舍人帝立遷為郎美麗自喜性和柔便辟得幸于上常與上卧起妻得通籍殿中女弟為昭儀父恭為少府賜爵關内侯詔將作大匠為賢起大第北闕下窮極技巧賜武庫禁兵上方珍寳皆選上第而乗輿所服乃其副也至東園秘器顔師古曰東園署名也屬少府掌為棺器珠襦玉柙顔師古曰以珠為𥜗如鎧狀連縫之以黄金為縷腰以下玉為柙至足亦縫黄金以為縷無不備具下至僮僕皆受上賜又為賢起冢義陵建平二年以永陵亭部為初陵即義陵也在今陜西西安府咸陽縣西北旁周垣數里鄭崇切諫上由是數以職事見責尚書令趙昌因奏崇與宗族通疑有姦請治上責崇曰君門如市人何以欲禁切主上崇對曰臣門如市臣心如水願得考覆上怒下崇獄司𨽻孫寳上書曰崇獄覆治搒掠將死卒無一辭道路稱寃疑昌與崇内有纎芥浸潤相䧟臣請治昌以解衆心詔曰司𨽻寳附下㒺上國之賊也免為庻人崇死獄中昌後為河内太守王莽秉政以其譛鄭崇免官徙合浦夏六月尊帝太太后傅氏為皇太太后秋八月封董賢為髙安侯孫寵為方陽侯息夫躬為宜陵侯初上欲侯董賢而未有縁侍中傅嘉勸上因東平王事以封賢上于是定息夫躬告東平王本章去宋𢎞更言因賢以聞皆先賜爵闗内侯頃之上欲封賢等而心憚王嘉乃先使持詔示丞相御史于是嘉與御史大夫賈延言宜暴賢等本奏語言延問公卿大夫博士議郎必有言賢當封者天下雖不悦咎有所分臣知順指不逆可得容身所以不敢者思報厚恩也上不得已止數月遂下詔切責公卿曰東平王雲圖弑天子公卿股肱莫能銷厭未萌頼宗廟之靈侍中賢等發覺伏辜其封賢寵躬皆為列侯躬數進見厯詆公卿大臣衆畏其口見之側目明年夏賈延免左遷執金吾毋將隆毋將複姓隆名字君房蘭陵人為沛郡都尉上發武庫兵送董賢及上乳母王阿舍毋將隆奏言古者方伯專征乃賜斧鉞漢家邊吏距冦賜武庫兵春秋之誼家不藏甲所以抑臣威損私力也今便僻弄臣私恩㣲妾而以天下公用給其私門契猶缺也國威器共其家備以廣驕僣非所以示四方也臣請收還武庫上不悦頃之傅太后賤買執金吾官婢隆奏請更平直詔隆與永信宮爭貴賤之賈傷化失俗左遷為沛郡都尉成帝末隆為諫大夫甞奏言宜徵定陶王居國邸故上宥之王莽少慕與隆交隆不甚附後莽秉政使孔光奏隆前為冀州牧治中山馮太后獄寃䧟無辜免官徙合浦諌大夫鮑宣字子都勃海髙城人上書時丁傅子弟並進董賢貴幸宣上書曰竊見孝成皇帝時外戚持權濁亂天下是以日蝕且十慧星四起危亡之徴陛下所親見也今奈何復劇于前乎朝臣亡有大儒骨鯁之士論議通古今憂國如饑渴者敦外親小童及幸臣董賢等在省户下陛下欲與此共承天地安海内甚難今民有七亡水旱為災一也重責賦税二也貪吏取受三也豪强蠶食四也苛吏徭役五也部落鼓嗚六也盗賊刼略七也七亡尚可又有七死酷吏毆殺一也治獄深刻二也寃䧟無辜三也盗賊横發四也怨讎相殘五也歲惡饑餓六也時氣疾疫七也民有七亡而無一得有七死而無一生父子夫婦不能相保奈何獨私養外親幸臣乎賞賜大鉅也萬使從奴賔客漿酒藿肉言視酒如漿視肉如藿非天意也孫寵息夫躬奸人之雄惑世尤劇宜以時罷退外親㓜童未通經術者皆宜令休就師傅急徴傅喜使領外親何武師丹孔光彭宣淮陽陽夏人因張禹薦至左將軍建平元年免龔勝可大委任治天下者當用天下之心為心不得自専快意而已也宣語雖刻切上以其名儒優容之己未元壽元年春正月辛丑朔以傅晏為大司馬衛將軍丁明為大司馬驃騎將軍是日日食尋罷晏就第初晏與息夫躬謀欲求居位輔政躬因言災異屢見恐有非常之變可遣大將軍行邊斬一郡守以立威應變上問丞相王嘉嘉對曰臣聞動民以行不以言應天以實不以文下民細㣲猶不可詐况于上天神明而可欺乎天之見異所以敕戒人君欲令覺悟反正推誠行善民心悦而天意得矣謀動干戈設為權變非應天之道也上不聽因拜傅晏丁明皆為大司馬㑹有日食之變詔舉直言嘉復奏封事略日元帝温恭少欲賞賜節約故少府水衡見錢多雖遭凶年加有羌變終無傾危之憂成帝時諫臣多言燕欒女寵犹酒之害其言甚切終不怨怒寵臣史育數貶退張放斥就國淳于長搒死于獄不以私愛害公義陛下初即位易帷帳去錦繡共皇寢廟比當作以用度不足憂閔元元今始作治而董賢亦治大第使者䕶作甚于治宗廟詔書罷苑而以賜賢二千餘頃均田之制從此墮壞奢僣放縱變亂隂陽災異衆多臣嘉幸得備位竊内悲傷不能通愚忠之信惟陛下慎已之所獨鄉察衆人之所共疑徃者鄧通韓驕貴逸豫卒陷罪辜所謂愛之適足以害之也宜節賢寵安全其命上不悦杜鄴字子夏繁陽人以方正對筞亦言之略曰春秋災異以指象為言語日食明陽為隂揜今諸外家並侍帷帳典兵至乃並置大司馬當拜之日晻然日食欲令昭昭以覺聖朝願陛下加致精誠以厭下心上乃徴孔光詣公車問以日食事拜為光禄大夫董賢亦以日食沮晏躬之筞上乃收晏印綬罷歸第皇太太后傅氏崩合葬渭陵號孝元傅皇后孫寵息夫躬以罪就國寵國龍亢在江南定逺縣躬國杜衍在河南南陽縣丞相御史奏躬寵罪過上乃下詔罷躬寵官遣就國躬之國未有第含寄居邱亭姦人以為富數守之躬恐每夜被髪立亭中向北斗祝人告躬祝詛上逮繋雒陽獄僵地絶咽死躬母聖棄市家屬徙合浦寵亦坐前為姦讒徙合浦事俱在元康二年以鮑宣為司𨽻宣上書曰陛下父事天母事地子養黎民即位以來父虧明母震動子訛相驚今日食于三始誠可畏懼陛下深内自責避正殿舉直言求過失退外親徴拜孔光發覺寵躬過惡衆庻歙然莫不説喜乃白虹干日連隂不雨此天有憂結未解民有怨望未塞者也董賢以令色諛言自進賞賜無度竭盡府藏海内貢獻當養一君今反盡之賢家豈天意與民意耶厚之如此反所以害之也誠欲哀賢宜為謝過天地解讎海内免遣就國收乗輿器物還之縣官如此可以父子終其性命復徴何武師丹彭宣傅喜以應天心建立大政興太平之瑞上乃徴何武彭宣而拜宣為司𨽻下丞相新甫侯王嘉獄殺之上託言傅太后遺詔益封董賢二千户王嘉封還詔書諌曰臣聞爵禄土地天之有也王者代天爵人尤宜慎之不得其宜則衆庻不服感動隂陽其害疾自深髙安侯賢侫幸之臣陛下傾爵位以貴之殫貨財以富之損至尊以寵之四方同怨陛下寢疾乆不平繼嗣未立宜思正萬事順天人之心以求福祐奈何輕身肆意不念髙祖之勤苦哉初廷尉梁相以請覆治東平王獄免為庻人事見前已而更赦嘉薦之上不能平及封還董賢事上乃發怒召嘉詣尚書責問以相事下將軍中朝内朝也者孔光等劾嘉罔上不道請召詣廷尉永信少府猛等以為聖王之于大臣進以禮退以義關械受笞非所以重國家褒宗廟也上從光議召嘉詣廷尉使既到府掾史涕泣共和藥進嘉引杯擊地曰丞相幸得備位三公奉職負國當伏刑都市以示萬衆何為咀藥而死廷尉收嘉丞相新甫侯印綬載至都船執金吾屬有令丞吏稍侵辱嘉嘉仰天歎曰幸得充備宰相不能進賢退不肖以是負國死有餘責吏問賢不肖主名嘉曰賢孔光何武不能進惡董賢不能退罪當死死無所恨遂不食嘔血而死元始四年追謚嘉為忠侯封嘉子崇為新甫侯秋七月以孔光為丞相八月以何武為前將軍彭宣為御史大夫上覧王嘉之對思其言故有是命光復故爵下司𨽻鮑宣獄髠鉗之丞相光行園陵官屬以令行馳道中宣出逢之使吏鉤止摧辱丞相事下御史中丞侍御欲捕從事宣閉户不納遂以閉距使者大不敬不道下獄博士弟子王咸濟南人等舉幡太學下曰欲救鮑司𨽻者㑹此㑹者千人遮丞相自言又守闕上書上竟抵宣罪冬十二月以董賢為大司馬衛將軍大司馬丁明素重王嘉以其死憐之上方欲極董賢位恨明遂筞免就第以光禄大夫韋賞為大司馬數日卒以賢大司馬衛將軍册日定國于公以為漢輔徃悉爾心匡正庻事允執其中時年二十二雖為三公常給事中領尚書百官因賢奏事親屬皆侍中奉朝請寵在丁𫝊之右上故令賢私過孔光光聞賢來警戒衣冠出門待望見賢車却入賢至中門光入閤既下車乃出拜謁送迎甚謹不敢以賔客均敵之禮上喜立拜光兩兄之子為諌大夫常侍後置酒麒麟殿賢父子親屬宴飲上從容視賢笑曰吾欲法堯禪舜何如時王閎平阿侯譚子為中常侍進曰天下乃髙皇帝天下陛下承宗廟統業至重天子無戲言上黙然閎妻父蕭咸望之子也賢父恭慕之欲為子求咸女為婦使閎言之咸私謂閎曰董公大司馬册乃堯禪舜之文非三公故事長老見者莫不心懼此豈家人子所能堪耶閎聞咸言亦悟乃還報恭深逹咸自謙薄之意恭歎曰我家何負天下而為人所畏如此意不悦庚申二年春正月匃奴單于烏孫大昆彌皆來朝先是匈奴單于上書請朝在建平四年初成帝河平中匈奴復株累若鞮單于入朝綏和元年烏珠留若鞮單于立漢遣夏侯藩使匈奴大司馬王根以匈奴有斗入漢地直張掖郡得之于邊甚饒乃白帝以指曉藩令求之藩至語次説單于上書獻此地單于曰此詔語耶抑使者所求也藩曰詔指也然亦為單于畫善計耳單于曰匈奴西邉仰此材木且先父地不敢失藩還單于以狀聞徙藩濟南太守既而匈奴敗烏孫要其質子漢使責讓單于單于既受詔遂請朝時帝被疾或言匈奴從上游來厭人詔問公卿亦以虚費府帑可且勿許單于使辭去未發揚雄諌曰臣聞六經之治貴于未亂兵家之勝貴于未戰今單于上書求朝國家不許而辭之臣愚以為漢與匈奴從此隙矣匈奴本五帝所不能臣三王所不能制其不可使隙明甚故前世以為不一勞者不乆佚不暫費者不永寜是以忍百萬之師運府庫之財而不悔今單于歸義願朝乃上世之遺筞神靈之所想望者也夫百年勞之一日失之費十而愛一臣竊為國不安也惟陛下留意于未亂未戰以息邊萌一作甿民也之禍書奏上召還匈奴使者而許之至是來朝賞賜如河平時單于宴見羣臣在前單于怪董賢年少以問譯上令報曰大司馬年少以大賢居位單于乃起拜賀漢得賢臣烏孫自分立兩昆彌事具宣帝甘露元年漢用憂勞且無寜歲成帝元延初烏孫小昆彌安日為降民所殺詔遣中郎將叚㑹宗立日安弟末振將為小昆彌時大昆彌雌貴靡勇健末振將恐為所并使人刺殺之漢欲討之而未能遣㑹宗立公主孫伊秩靡為大昆彌乆之翎侯難栖殺末振將安日子靡犂代為小昆彌于是漢復將衆遣會宗誅死末振將子畨邱末振將弟卑爰疐八萬餘口北附康居謀欲借兵兼并兩昆彌兩昆彌畏之親依都䕶及是大昆彌伊秩靡與單于並入朝漢以為榮時西域凡五十國本三十六國分為五十餘國康居大月氐安息罽賔之屬不在此數佩漢印綬者凡三百七十六人夏四月壬辰晦日食五月正三公分職董賢為大司馬孔光為大司徒彭宣為大司空封長平侯六月帝崩太皇太后聞帝崩即日之未央宫收取璽綬董賢以罪罷即日自殺太后召賢問以䘮事調度賢憂懼不能對太后曰新都侯莽奉送先帝大行曉習故事吾令莽佐君賢頓首幸甚莽以建平二年遣就國尋徴還事見前乃遣使者馳召莽詔尚書諸發兵符節百官奏事中黄門期門兵皆屬焉莽以太后指使尚書劾賢不親醫藥禁止不得入宫殿即闕下册收賢印綬罷歸第賢即日與妻皆自殺家惶恐夜葬莽疑詐死發其棺至獄診視因埋獄中收沒入家財四十三萬萬父恭與家屬徙合浦太皇太后以王莽為大司馬領尚書事太皇太后詔公卿舉可大司馬者孔光以下皆舉莽獨何武前將軍公孫禄左將軍以為惠昭之世外戚持權幾危社稷今比世無嗣方當選立近親㓜主不令外戚持權親踈相錯為國計便于是武舉禄禄亦舉武太皇太后自用莽為大司馬領尚書事秋七月迎中山王箕子為嗣太皇太后與莽議遣車騎將軍王舜使持節迎之八月貶皇太后為孝成皇后莽白太皇太后以皇太后前與女弟昭儀専寵錮寢殘滅繼嗣貶為孝成皇后徙居北宫五行志成帝時童謡曰燕燕尾涎涎張公子時相見木門倉琅根燕飛來啄皇孫皇孫死燕啄矢涎涎美好貎張公子富平侯也木門倉琅根謂宫門銅鍰言將尊貴也後立為皇后弟昭儀賊害皇子卒皆伏辜所謂燕飛來啄皇孫皇孫死燕啄矢也徙孝哀皇后于桂宫長安圖北宮桂宫俱在未央宫北後月餘與孝成皇后俱廢為庻人就其園皆自殺追貶傅太后為定陶共王母丁太后為丁姫傅氏丁氏皆免官爵歸故郡傅晏將妻子徙合浦獨下詔褒揚傅喜徴還位特進奉朝請喜雖外見褒賞孤立憂懼後復遣就國以壽終以甄邯陳留風俗傳舜陶甄河濵後以為氏為侍中筞免何武公孫禄遣紅陽侯立就國莽以孔光名儒厯相三主太后所敬天下信之于是盛尊事光引光女婿甄邯為侍中諸素所不悦者皆傅致其罪為請奏令邯持與光光畏不敢不上莽白太后輙可其奏乃劾奏何武公孫禄互相稱舉免宫就國董宏子武以父邪侫奪爵紅陽侯立莽諸父内敬憚之令光奏立罪惡以前知淳于長罪多受其賂白宫婢楊寄私子為皇子使衆疑吕氏少帝復出太后不聽莽曰漢家比世無嗣太后獨代㓜主統政力用公正先天下尚恐不從今以私恩逆大臣議羣臣傾邪亂從此起太后不得已遣立就國時莽諸父平阿侯仁素剛直莽復令大臣以罪邇奏遣仁就國于是以王舜王邑為心腹甄豐甄邯主擊斷平晏當之子領機事劉秀歆改名典文章孫建為爪牙莽色厲而言方欲有所為㣲見風采黨與承其指意而顯奏之莽涕泣固讓上惑太后下示信于衆庻焉筞免大司空宣遣就國彭宣以王莽専權乃上印綬乞骸骨歸鄉里莽恨宣求退白太后筞免宣宣居國四年卒以王崇為大司馬封扶平侯九月中山王箕子即位是為孝平帝明年更名衎時年九歲明年立東平思王孫桃鄉頃侯子成都為中山王奉孝王後太皇太后臨朝大司馬莽秉政百官總已以聽以孔光為帝太傅馬宫字㳺卿東海戚人本姓馬矢宫仕學稱馬氏云為大司徒莽權日盛孔光憂懼不知所出上書乞骸骨莽白太后徙光為帝太傅給事中領宿衛供養行内猶言禁中也署門户省猶視也服御食物冬十月葬義陵荀氏悦曰帝覩孝成之世禄去公室權柄外移是故臨朝務攬主威以則宣武然董賢用事大臣誅傷有覆餗棟橈之凶享國不永亂臣乗間豈不哀哉孝平皇帝辛酉元始元年春正月益州塞外蠻夷獻白雉王莽自為太𫝊號安漢公褒賞宗室羣臣莽風益州令塞外蠻夷自稱越裳氏重譯獻白雉莽白太后以薦宗廟于是羣臣盛陳莽功德宜賜號曰安漢公益爵邑莽上書言臣與孔光王舜甄豐甄邯共定筞今願獨條光等功因數譲四稱疾不起太后乃詔光為太師舜為太保豐為少𫝊邯封承陽侯莽尚未起羣臣復上言宜以時加賞元功無使百寮元元失望太后乃以莽為太傅幹四輔之事號曰安漢公以故蕭相國甲第為安漢公第益封二萬八千户莽為皇恐不得已起受太傅安漢公號讓還益封事復建言立東平王開明故王雲太子封宣帝耳孫三十六人為列侯又令諸侯王公列侯關内侯無子而有孫若同産子者皆得以為嗣宗室屬未盡而以罪絶者復其屬吏以年老致仕者參分故禄以一與之終其身下及庻民鰥寡恩澤無所不施又風公卿奏言太后春秋髙不宜親省小事令太后詔曰自今唯封爵乃以聞他事安漢公四輔平决州牧二千石及茂才吏初除奏事者引入近署對安漢公考故官問新職以知其稱否于是莽人人延問宻致恩意厚加贈送其不合指顯奏免之權與人主侔矣二月置羲和官初置自為一官及莽簒位改大司農為羲和後又更為納言夏五月丁巳朔日食六月拜帝母衛姬中山盧奴人為中山孝王后莽恐帝外家衛氏奪其權白太后前哀帝立自貴外家幾危社稷今帝以幼年復奉大宗宜戒前事為後代法乃遣甄豐拜衛姬為中山孝王后帝舅寳元爵關内侯皆留中山不得至京師申屠剛字巨卿茂陵人時為扶風功曹以直言對䇿曰聖主始免襁褓至親分離誠宜徴中山太后置之别宫令時朝見又召馮衛二族使得執㦸親奉宿衛以抑患禍之端莽令太后詔剛僻經妄説違背大義罷歸田里封公孫相如周公後通鑑作魯頃公八世孫公子寛今從漢書為褒魯侯孔均孔覇曽孫為褒成侯以奉周公孔子之祠追諡孔子為褒成宣尼公壬戌二年春黄支國應劭曰黄支在日南之南去長安三萬里獻犀牛師古曰犀狀如水牛頭似猪四足類象黒色一角當額前鼻上又有小角黄支在南海中莽欲耀威德厚遺其王令遣使貢獻越嶲郡上黄龍游江中孔光馬宫等稱莽功德比周公大司農孫寳曰周公上聖召公大賢尚猶有不相悦見書序召誥今有一事羣臣同聲得無非其美者時大臣皆失色甄邯即時承制罷議者㑹寳遣吏迎母母病留弟家獨遣妻子司直陳崇劾奏寳坐免終于家三月大司空崇免以甄豐為大司空詔封宗室及功臣後為王侯者百餘人郡國大旱蝗莽白太后宜衣繒損膳以示天下莽亦素食上書出錢百萬獻田三十頃付大司農助給貧民于是公卿皆效慕焉凡獻田宅者二百三十人六月隕石于鉅鹿二大夫龔勝邴漢琅邪人罷歸勝漢以莽専政皆乞骸骨莽令太后依昭帝時韓福故事事見前加優禮而遣之楚又有龔舍與勝相友並著名節世謂之楚兩龔舍以勝薦為諫大夫復拜光禄大夫終不肯起以魯詩教授年六十八卒漢兄子曼容亦養志自修為官不肯過六百石其名過于漢秋九月戊申晦日食匈奴單于遣女入侍太皇太后莽欲説太后以威德至盛異于前乃風單于令遣王昭君女須卜居次云集覽須卜複姓居次云其名入侍太后賞賜之甚厚時頒四條于匈奴凡中國亡入匈奴者烏孫亡降匈奴者西域諸國佩中國印綬降匈奴者烏桓降匈奴者皆不得受因收故宣帝所為約束封函而還癸亥三年春聘安漢公莽女為皇后莽欲以女配帝以固其權奏請考論五經定取后禮正十二女之義十二女見公羊傳註何休曰諸侯一娶九女惟天子娶十二女博采二王後及周公孔子世列侯在長安者適子女事下有司上衆女名王氏多在選中莽恐其與己女爭即上言子材下不宜采太后詔王氏朕外家其勿采庶民諸生郎吏守闕上書公卿大夫伏省户下咸言願得公女為天下母太后從之四年遣大司徒馬宫等迎皇后入未央宫安漢公莽殺其子宇滅中山孝王后家殺敬武公主及汜鄉侯何武故司𨽻鮑宣等數百人莽長子宇非莽隔絶衛氏私與衛寳通書教衛后上書求至京師莽不聼宇與師呉章及婦兄吕寛議章以莽好鬼神可為變怪驚懼之因推類説令歸政衛氏推原比類而説誘之令其歸政宇即使寛夜持血灑莽第門吏發覺之莽執宇送獄飲藥死盡滅衛氏支屬唯衛后在呉章腰斬初章為當世名儒教授千餘人莽以為惡人黨皆當禁錮不得仕宦門人盡更名他師平陵云敞時為大司徒掾自劾呉章弟子收抱章尸歸棺歛葬之莽因是獄連引素所惡者悉誅之元帝女弟敬武長公主素非議莽紅陽侯立莽尊屬平阿侯仁素剛直皆以太皇太后詔廹令自殺郡國豪傑及漢忠直臣不附莽者何武鮑宣等皆坐死凡數百人北海逢萌字子慶北海都昌人謂友人曰三綱絶矣不去禍將及人即解冠挂東都城門歸將家屬浮海客于遼東甲子四年春正月郊祀髙帝以配天宗祀孝文以配上帝夏安漢公莽自加號宰衡初陳崇張竦奏稱莽功德以為宜恢國如周公至是太保舜等及吏民上書者八千餘人復請益封公以新息漢縣故城在今河南光州息縣召陵註見前二縣及黄郵聚在今河南南陽府新野縣新野即今縣田采伊尹周公稱號加公為宰衡位上公尋升位在諸侯王上莽雖専權所以誑耀媚事太后下至旁側長御方故萬端賂遺以千萬數以故左右日譽之起明堂辟雍注俱見前靈臺應劭曰天子曰靈臺諸侯曰觀臺以望氣書雲物立樂經徴天下通經異能之士莽奏起明堂辟雍靈臺為學者築舍萬區立樂經益博士員經各五人徴天下通一藝教授十一人以上及有逸禮古書天文圖䜟張衡曰圖䜟虚妄成哀之後乃始聞之鍾律月令兵法史篇文字孟康曰史籕所作十五篇古文書也通知其意者皆詣公車網羅天下異能之士前後至者千數徵能治河者時徴能治河者以百數其大略異者闗並闗氏夏大夫闗龍逢之後言河决率常于平原東郡左右其地形下而土䟽惡聞禹治河時本空苦貢反下開空同此地宜勿以為官亭民室韓牧以為可略于禹貢九河處穿之縱不能為九但為四五宜有益王横言河入勃海地髙于韓牧所欲穿處徃者海溢西南出寖數百里九河之地已為海所漸矣禹之行河水本從西山下東北去周譜如淳曰世統譜牒也云定王五年河徙事見前則今所行非禹之所穿也又秦攻魏决河灌之事見前决處遂大不可補宜更開空使縁西山足禹貢錐指横所云西山足即宿胥口也宿胥口在今濬縣之西有上陽三山曰同山曰白祀曰枉人所謂西山者也乗髙地而東北入海乃無水災時莽但崇空語無施行者冬置西海郡故郡在今青海東水經河水又東自河曲逕西海郡南即此莽自以北化匃奴東致海外王莽傳東夷王度大海奉國珍南懐黄支唯西方未有加乃遣中郎將平憲等多持金幣誘塞外羌豪良願等獻鮮水海即青海注見前允谷在西寜邊外黄河北鹽池在青海西南地莽奏以為西海郡增法五十條犯者徙之以千萬數民始怨矣更定官名及十二州界分京師置前輝光後承烈二郡更公卿大夫元士官名位次及十二州名分界郡國所屬罷置改易吏不能紀乙丑五年春正月復南北郊三十年間天地之祠凡五徙自成帝建始元年作南北郊永始三年罷成帝崩太后詔復之哀帝建平三年再罷至是又復夏四月孔光卒謚簡烈以馬宮為太師光自莽稱宰衡愈恐固稱疾辭位太后詔令十日一朝賜靈壽杖顔師古曰木似竹有枝節自然合杖制不湏削治省中坐置几及是卒贈賜葬送甚盛以宫代之五月安漢公莽自加九錫何休曰一輿馬二衣服三樂則四朱户五納陛六虎賁七弓矢八鈇鉞九秬鬯吏民以莽不受新野田而上書者前後四十八萬七千餘人及諸侯王公列侯宗室見者皆叩頭言宜亟加賞于安漢公乃策命莽以九錫封王惲等八人為列侯先是莽遣惲等八人行天下觀風俗及惲等還詐造歌謡頌功德莽以詔皆封列侯時廣平相班穉不上嘉瑞琅邪太守公孫閎言災害甄豐劾閎造不祥穉絶嘉應皆不道穉班偼伃弟也太后曰班穉後宫賢家我所哀也于是閎獨下獄誅莽又奏為市無二價官無獄訟邑無盗賊野無饑民道不拾遺男女異路之制違者象刑白虎通曰象刑以衣服象五刑也犯墨者幪巾犯劓者赭其衣犯臏者墨其臏犯宫者屝犯大辟者衣無領縁投之于市與衆棄之屝草屦也發定陶共王母及丁姬冡取其璽綬莽奏共王母丁姫懐帝太后皇太太后璽綬以葬請發冡取其璽綬太后不許莽固爭太后詔因故棺改葬之莽又奏共王母丁姬棺皆名梓宫珠玉之衣非藩妾服請更之奏可公卿在位皆阿莽指入錢帛遣子弟及諸生四夷凢十萬餘人操持作具助將作掘平之秋八月馬宫罷宫嘗與議傅太后諡及莽追誅前議者宫為所厚獨不及宫慙懼上書自言詔以侯就第莽簒位以宫為太子師死冬十二月王莽弑帝帝益壮以衛后故怨不悦莽因臘日漢以大寒後戌日為臘上椒酒置毒酒中帝有疾莽作策請命於泰畤願以身代藏策金縢敕諸公勿敢言帝崩莽令斂加元服吏皆服喪三年葬康陵在西安府咸陽縣西綱目于平帝不書葬徐昭文以為春秋不討賊不書葬以為無臣子也綱目即此意考是時元后方臨朝非臣子比且莽居攝數月劉崇翟義即起兵討之但不克耳不可謂無臣子今依漢書及通鑑仍書葬史臣曰孝平之世政自莽出觀其文辭方外百蠻無于思不服休徴嘉應頌聲並作至于變異見于上民怨下莽亦不能文也以平晏為大司徒太皇太后詔徴宣帝元孫莽居攝踐阼太后與羣臣議立嗣時元帝世絶而宣帝曽孫有見王五人淮陽王縯中山王成都楚王紆信都王景東平王開明列侯四十八人陽興侯寄等莽惡其長大曰兄弟不得相為後乃悉徴宣帝元孫選立之先是泉陵侯劉慶上言皇帝富于春秋宜令安漢公攝行天子如成王周公故事羣臣皆以為宜至是前輝光謝囂奏浚井得白石有丹書文曰吉安漢公莽為皇帝太后曰此誣罔不可施行太保舜謂太后事已如此莽但欲稱攝以填服天下耳太后不能制乃下詔令安漢公居攝踐阼如周公故事禮儀皆如天子祭祀賛曰假皇帝民臣謂之攝皇帝其朝見太皇太后皇帝皇后皆復臣節御批厯代通鑑輯覽卷十九

front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷二十六後漢孝靈皇帝戊辰中平五年春二月有星孛于紫宫注見前以劉焉字君郎江夏竟陵人魯恭王之後為益州牧劉虞字伯安東海郯人東海恭王之後為幽州牧
  hash: sha256:c1901a59b710093ec73ae041ebc88de5e18dedcb366ba51c067bef3b8151da82

  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_015-1a, image: WYG0335/WYG0335-0383a.png}
body:
  text: 元鼎元年應劭曰以得寶鼎故改元通鑑考異寶鼎得於四年六月而改元則於是年蓋亦如建元元先後來追敘之耳漢書因改元遂於元年誤增得鼎一事考漢書武帝紀元鼎元年夏五月得鼎汾水上四年六月得寶鼎后土祠旁其書法有得鼎得寶鼎之不同似兩得鼎而並紀之者且自元狩以後皆以瑞紀元何待追敘今仍漢書夏五月得鼎汾水上丙寅二年冬十一月張湯有罪自殺十二月丞相青翟下獄自殺初御史中丞李文河東人與湯有隙湯所厚吏魯謁居隂使人告文姦事事下湯治論殺之上問變事從師古曰讀曰蹤迹安起湯心知謁居為之陽驚曰此殆文故人怨之謁居病湯親為之摩足趙王素怨湯告湯大臣乃與吏摩足疑與為大姦事下廷尉謁居病死事連其弟弟告湯與謁居謀共變告李文事下減宣楊人為左內史窮竟未奏會盜發孝文園瘞錢丞相青翟與張湯約俱謝至前湯獨不謝上使御史案丞相湯欲致其文丞相見知欲以見知故縱之罪罪丞相丞相長史朱買臣王朝齊人邊通邊氏出周大夫邊伯皆怨恨湯三長史素貴居湯右已而失官守長史湯數行丞相事常陵折之故怨欲死之乃與丞相謀使吏案捕賈人田信等曰湯且欲奏請信輒先知之居物致富與湯分之事辭頗聞上問湯曰吾所為賈人輒先知之益居其物是類有以吾謀告之者湯不謝又陽驚曰固宜有減宣亦奏謁居事上以湯懷詐面欺使趙禹切責湯湯乃為書謝因曰陷臣者三長史也遂自殺湯既死家産直不過五百金昆弟諸子欲厚葬湯湯母曰湯為天子大臣被污惡言而死何厚葬乎載以牛車有棺無椁上聞之乃盡案誅三長史丞相青翟下獄自殺春起柏梁臺在今西安府長安縣故城內以香柏為梁故名作承露盤在長安縣西北故建童宫內盤髙二十丈大七圍以銅為之上有仙人掌以承露和玉屑飲之可長生云二月以趙周為丞相三月大雨雪夏大水關東飢置均輸大農令屬有均輸令丞孟康曰諸州郡所當輸於官者皆令輸其土地所饒平其所在時價官自轉遷於所無之地賣之輸者既便而官有利禁郡國鑄錢孔僅為大農令而桑𢎞羊為大農中丞稍置均輸以通貨物悉禁郡國無鑄錢専令上林三官鑄裴駰曰水衡都尉掌上林苑屬有上林鍾官辨銅令然則上林三官其是此三令乎非三官錢不得行而民鑄益少計其費不能相當惟真工大姦乃盜為之西域始通置酒泉治表是今甘肅肅州髙臺縣是應劭曰其水若酒故名武威治姑臧今甘肅涼州府武威縣是郡張騫建言烏孫王昆莫王之號名獵驕靡本為胸奴臣後兵稍強不肯復朝事胸奴今單于新困於漢而故渾邪地空無人誠以厚幣賂烏孫招居故渾邪之地則是斷胸奴右臂也既連烏孫自其西大夏之屬皆可招來而為外臣上以為然拜騫為中郎將將三百人多持節副使齎金幣帛直數千巨萬騫至烏孫致賜諭指未能得其決因分遣副使使大宛康居大月氐大夏注俱見前安息治番兜城去長安萬一千六百里其屬大小數百城地方數千里最大國也身毒注見前于闐注見前考于闐國在蔥嶺之北今回部之和闐也有河出其南山即于闐河北流合葉爾羌之塔里母河河出蔥嶺即蔥嶺河乂折而東滙於羅布淖爾即古所稱河源注於鹽澤者也及諸旁國烏孫發譯道送騫還使數十人馬數十匹烏孫多馬富人至四五千匹隨騫報謝是歲騫還後歲餘所遣使通大夏之屬者皆頗與其人俱來於是西域始通於漢矣西域凡三十六國其後稍分至五十餘南北有大山南山即南祁連北山即北祁連中央有河即于闐河東西六千餘里南北千餘里東則接漢玉門元和志玉門故關在龍勒縣西為西域門户龍勒故城在今安西府敦煌縣西陽關在今敦煌縣西南元和志以居玉門關之南故曰陽關西則限以蔥嶺在葉爾羌西南南北兩山皆其分支西河舊事蔥嶺在敦煌西八千里其山髙大上悉生蔥故名明一統志蔥嶺髙數千丈番名塔兒塔石打班自玉門陽關出西域有兩道從鄯善本樓蘭後更名治扜泥城去長安六千一百里旁南山循河西行至莎車為南道南道西踰蔥嶺則出大月氐安息自車師前王庭有前後王庭前王治交河城去長安八千一百五十里後王治務塗谷去長安八千九百五十里隨北山循河西行至疏勒治疏勒城去長安九千三百五十里為北道北道西踰蔥嶺則出大宛康居奄蔡在康居西北可二千里與康居同俗國臨大澤無涯乃北海云故皆役屬胸奴胸奴賦稅諸國取富給焉烏孫既不肯東還乃於渾邪故地置酒泉郡稍發徙民以充實之又置武威郡以絶胸奴與羌通之道後使西域者益多胸奴時遮擊之乃分武威酒泉地更置張掖敦煌二郡張掖治觻得今甘州府張掖縣是敦煌治敦煌注見上孟康曰觻音鹿丁邜三年夏四月雨雹關東飢被災郡國凡十餘人相食戊辰四年冬十一月立后土祠於汾隂注見前脽上亦曰脽邱在今山西蒲州府榮河縣北親祠之始巡郡國先是上祠五畤詔曰今上帝朕親郊而后土無祀則禮不答也謂闕地祗之祀不為神所答應其令有司議之於是立后土祠於汾隂脽上顔師古曰以形髙起如人尻脽故名上親望拜如上帝禮禮畢遂至滎陽始巡幸郡國封周後姬嘉為周子南君顔師古曰子南封邑之號以為周後故曰周子南君上過洛陽求周後得嘉封為周子南君以奉周祀夏以方士欒大為五利將軍尚公主方士欒大膠東王家人故嘗與文成同師上方悔誅文成樂成侯丁義乃薦大敢為大言處之不疑見上曰臣嘗往來海上見安期羡門之屬曰黃金可成而河決可塞不死之藥可得仙人可致也然臣恐效文成徒為方士掩口上曰文成食馬肝死耳子能修其方我何愛乎大曰臣師非有求人人自求之陛下必欲致之則貴其使者令為親屬以客禮待之乃可使通言於神人時上方憂河決而黃金不就乃拜大為五利將軍封樂通侯食邑賜甲第以衛長公主衛太子姊妻之齎金十萬斤上親幸其第自竇太主將相以下皆獻遺之大見數月凡佩六印天士地士大通五利四將軍及侯帝又刻玉卬授之曰天道將軍天道者為天子道天神也貴震天下而海上燕齊之間莫不扼捉持也腕自言有禁方能神仙矣明年大坐誣罔要斬大裘為入海求其師乃之泰山上使人隨驗實無所見而大妄言見其師方又多不售遂誅之六月得大鼎后土祠旁汾隂巫錦錦巫名得大鼎於魏脽汾隂本魏地故曰魏脽后土營祠之兆域旁錦掊地得鼎鼎大異於衆鼎文鏤無欵識怪之告吏河東太守以聞上以禮祠迎鼎至甘泉從上行薦之郊廟羣臣皆賀時羣臣皆言得周鼎吾邱夀王獨以為非周鼎上召而問之夀王對曰昔秦始皇親出鼎於彭城而不能得今天祚有德而鼎自出此天之所以與漢乃漢寶非周寶也上曰善於是作寶鼎之歌是秋齊人公孫卿以漢得寶鼎與黃帝時等漢得寶鼎其冬辛巳朔旦冬至黃帝得寶鼎是歲冬己酉朔旦冬至乃為札書因嬖人奏之上召問卿卿言漢興復當黃帝之時寶鼎出而與神通當封禪封禪則能仙登天矣卿又言黃帝採首山銅鑄鼎荆山下鼎既成有龍垂胡髯下迎黃帝上騎與羣臣後宫七十餘人俱登天于是上曰嗟乎誠得如黃帝吾視去妻子如脫屣耳乃拜卿為郎後二年卿候神河南言見仙人迹緱氏城上帝親往視謂卿得毋效文成五利乎卿曰仙者非有求人主人主自求之其道非寬假神不來積以歲月乃可致也帝信之以兒寬為左內史寬為治勸農桑緩刑罰理獄訟務在得人心擇用仁厚士推情與下不求聲名吏民大信愛之收租稅時裁濶狹與民相假貸胡三省注濶謂禁防疏濶之時狹謂督促迫急之時濶時不足徵收與民相假貸也以故租多不入後有軍發左內史以負租課殿課下下曰殿當免民聞皆恐失之大家牛車小家擔負輸租繦屬言輸者如繦之相聨屬不絶課更以最課上上曰最上由此愈竒寬己巳五年冬十月帝祠五畤遂獵新秦中以勒邊兵上祠五畤於雍遂踰隴隴坻也亦曰隴坂在今甘肅秦州分水縣三秦記其坂九曲上者七日乃越西登崆洞注見前北出蕭關注亦見前從數萬騎獵新秦中以勒邊兵而歸新秦中或千里無亭徼既無亭候又不徼循於是誅北地太守以下立泰一注見前及五帝祠壇於甘泉十一月辛巳朔冬至親郊見昧爽天子始郊拜泰一朝朝日夕夕月皆揖是為泰畤自是三歲天子一郊見南越相吕嘉弒其王興更立建德為王發兵反遣將軍路博德西河平州人等將兵討之先是上遣使諭南越王入朝建元時南越太子嬰齊入宿衛在長安取樛氏女生子興後嬰齊嗣王立僇氏為后興為太子嬰齊薨興代立其母為太后太后故嘗與霸陵人安國少季通往喻王及太后入朝比內諸侯南越王太后勸王及羣臣內屬安國少季至越復與太后私通國人頗知之多不附太后太后倚漢威故數勸即因使者上書請比內諸侯三歲一朝除邊關天子許之事在四年至是太后與王飭治行􅏻重齎為入朝具其相吕嘉數諫不聽因稱病不見漢使者太后欲誅之嘉遂與其大臣謀作亂未發會漢使韓千秋及樛樂即太后弟將二千人入越境嘉遂反下令國中曰王年少太后中國人又與使者亂無顧趙氏社稷為萬世慮計之意將卒攻殺王太后及漢使者立明王嬰齊諡長男越妻子建德為王韓千秋兵破數小邑未至番禺四十里越以兵擊千秋等遂滅之使人函封漢使者節置塞上發兵守要害處上聞南越反下詔發樓船十萬師往討之伏波將軍路博德出桂陽漢郡治郴今湖南郴州是樓船將軍楊僕宜陽人出豫章注見前戈船將軍歸義越侯嚴出零陵漢郡治零陵今湖南永州府零陵縣是下瀨將軍甲甲與嚴皆越人歸漢者下蒼梧今廣西梧州府是時漢尚未置郡越馳義侯遺亦越人發夜郎兵下牂柯江注見前咸會番禺夏四月丁丑晦日食秋九月嘗酎嘗秋祭酎直救反三重釀酒也列侯百有六人皆奪爵丞相周下獄自殺時齊相卜式上書請父子與齊習船者往死南越詔褒美式賜爵關內侯布告天下天下莫應諸列侯以百數亦莫求從軍擊越會九月嘗酎列侯以令獻金助祭張晏曰正月旦作酒八月成名曰酎武帝金因八月嘗酎會諸侯廟中出金助祭名酎少府省金金有輕及色惡者上皆令劾以不敬奪爵者百六人丞相趙周坐知列侯酎金輕下獄自殺以石慶為丞相封牧邱侯食邑平原時九卿更進用事事不關決於丞相慶醇謹而己庚午六年冬討平西羌後漢書西羌傳羌出三苗舜竄之三危河關西南羌是也先零羌羌無弋爰劍之後留居湟中者二十餘種先零罕开之屬皆是零音憐與胸奴通合衆十餘萬共攻令居注見前安故漢縣注見前遂圍枹罕漢縣故城在今蘭州府河州詔發卒十萬人遣將軍李息郎中令徐自為擊平之始置護羌校尉統領焉平南越置九郡楊僕入越地先陷尋狹史記索隱在始興郡西北始興郡今廣東韶州府是破石門山名在廣州府城西北江中兩山對峙如門故名待博德至俱進至畨禺南越城守會暮僕縱火燒城博德遣使招降者賜印綬復縱令相招黎旦城中皆降建德嘉已夜亡入海博德遣人追得之戈船下瀨夜郎兵未下南越已平矣時帝將幸緱氏至左邑桐鄉聞南越破以為聞喜縣至汲新中鄉得吕嘉首以為獲嘉縣遂分南越地置南海治番禺今縣廣州府治蒼梧治廣信今蒼梧縣廣西梧州府治鬱林治布山今貴縣屬廣西潯州府合浦治徐聞今海康縣屬廣東雷州府今徐聞縣唐時析置交趾治羸􅖮音連受九真治胥浦日南治朱吾交趾下三郡今為安南國地珠崖茂陵書治曋都地在今廣東瓊州府瓊山縣儋耳元和志治義倫今瓊州府儋州是考珠崖儋耳元封元年始開昭帝時省儋耳元帝時罷珠崖故漢書地理志不載凡九郡平西南夷置五郡越馳義侯發南夷兵且蘭今貴州平越府平越縣故且蘭侯邑君反殺使者令巴蜀罪人當擊南越者擊之誅且蘭君及卭君筰君遂平南夷為牂柯郡治故且蘭即侯邑夜郎侯入朝上以為夜郎王西夷冉駹之屬卭筰冉駹注俱見前皆振恐請臣置吏乃以卭都為越嶲郡治卭都故城在今四川寧逺府西昌縣筰為沈黎郡治筰都天漢四年省筰都注見前冉駹為汶山郡治汶江宣帝時省汶江今四川茂州廣漢漢郡今四川成都府漢州是西白馬地名氐所居為武都郡治武都今甘肅階州成縣是秋東越王餘善反遣將軍楊僕等將兵討之先是東越王餘善請從樓船擊吕嘉至揭陽今縣屬廣東潮州府本漢置以海風波為辭隂使南越楊僕上書願便引兵擊東越上不許令屯豫章梅嶺在江西南昌府新建縣西上有梅仙壇以待命餘善聞樓船請誅之遂反發兵距漢道號其將軍曰吞漢自稱武帝上欲復使楊僕將為其伐前勞以書敇責之僕惶恐願效死贖罪乃遣橫海將軍韓説出句章漢縣故城在今浙江寧波府慈溪縣浮海僕出武林史記索隱豫章北接番陽界有武陽亭亭東南地名武林當閩越之京道今江西饒州府餘干縣東北有武陵山即古之武林楊僕出師處王溫舒出梅嶺越侯出若邪山名在浙江紹興府會稽縣南下有溪白沙今浙江溫州府樂清縣有白沙嶺上有關為水陸要衝以擊東越明年繇王居股殺餘善以其衆降上以閩地險阻數反覆乃詔諸將悉徙其民於江淮間遂虛其地以卜式為御史大夫式言郡國民多不便縣官作鹽鐵苦惡價貴鹽苦鐵惡而價又貴強令民買之而船有算商者少物貴上不悅未幾以式不習文章貶太子太傅辛未元封元年應劭曰始封泰山故改元考是歲改元在四月冬十月帝出長城登單于臺在今歸化城西勒兵而還詔曰南越東甌咸伏其辜西蠻北夷頗未輯睦朕將巡邊垂躬秉武節置十二部將軍親帥師焉乃行自雲陽北厯上郡注俱見前西河漢郡治富昌故城在今鄂爾多斯左翼前旗後漢移郡治離石今山西汾州府永寧州是也五原漢郡治九原九原注見前出長城北登單于臺至朔方臨北河通典河自九原以東謂之北河勒兵十八萬騎旌旗徑千餘里遣使者郭吉告單于曰南越王頭已縣於漢北闕單于能戰天子自將待邊不能亟來臣服何但亡匿幕北苦寒之地為單于怒留吉上乃還祭黃帝冢於橋山上曰吾聞黃帝不死今有冢何也公孫卿曰黃帝已仙上天羣臣思慕葬其衣冠上嘆曰吾後升天羣臣亦當葬吾衣冠於東陵乎橋山注見前乃釋兵還甘泉帝自制封禪儀成以兒寬為御史大夫初司馬相如病且死有遺書勸上封泰山會得寶鼎上乃令諸儒采尚書周官王制之文草封禪儀數年不就以問兒寬寬曰封泰山禪梁父昭姓考瑞帝王之盛節也然享薦之儀不著於經非羣臣之所能列唯天子建中和之極兼總條貫金聲而玉振之以順成天慶垂萬世之基上然之乃自制儀采儒術以文焉既成將用事拜寬為御史大夫春正月帝東巡祭中嶽注見前遂如海上求神仙夏四月封泰山禪肅然泰山東麓在山東泰安府萊蕪縣東北今稱為宿巖山復東北至碣石注見前而還帝東幸緱氏漢縣故城在今河南府偃師縣禮祭中嶽從官在山下聞若有呼萬歲者三詔祠官加增太室祠以山下户三百為奉邑名曰崇髙行至泰山山草木葉未生令人上石立之山巔遂東巡海上禮八神注見前益發船令言海中神山者求蓬萊公孫卿言夜見大人長數丈就之則不見見其迹甚大羣臣又言見一老父牽狗言吾欲見巨公已忽不見上即見大迹未信及羣臣言老父則大以為仙人也豫方士傳車及間使求仙人皆以千數四月還至奉髙漢縣泰山郡治宋改奉符今曰泰安為泰安府治令侍中儒者行事封泰山下東方如郊祠泰一之禮封廣丈二尺髙九尺其下則有玉牒祕書也禮畢天子獨與侍中奉車都尉霍子侯去病子上泰山亦有封其事皆禁明日下隂道山北為隂禪泰山下址東北肅然山如祭后土禮江淮間茅三脊為神藉五色土益雜封其封禪祠夜若有光晝有白雲出封中上還坐明堂臣瓉曰泰山東北址古時有明堂則此所坐者羣臣上夀頌功德詔改今年為元封元年大赦天下上既已封泰山無風雨而方士更言蓬萊諸神若將可得於是上欣然庶幾遇之復東至海上望焉上欲自浮海求蓬萊羣臣諫莫能止東方朔曰夫仙者得之自然不可躁求若其有道不憂不得若其無道雖至蓬萊見仙人亦無益也臣願陛下苐還宫靜處以須之仙人將自至上乃止會奉車霍子侯暴病一日死乃遂去並海上北至碣石厯北邊至九原五月還甘泉賜桑𢎞羊爵左庶長先是桑𢎞羊為治粟都尉領大農盡斡音管専主之也天下鹽鐵乃置大農部丞數十人分主郡國令逺方各以其物如異時商賈所轉販者為賦而相灌輸置平準官名屬大農有令丞於京師都受天下委輸貴即賣之賤即買之欲使富商大賈無所牟大利而萬物不得騰踊至是巡狩所過賞賜用帛百餘萬匹錢金以巨萬計皆取足大農𢎞羊又請令吏得入粟補官及罪人贖罪民不益賦而天下用饒於是賜𢎞羊爵左庶長是時小旱上令官求雨卜式言曰縣官當食租衣稅而已令𢎞羊令吏坐市列肆販物求利烹𢎞羊天乃雨秋有星孛於東井又孛於三台魁下六星兩兩而比曰三台望氣王朔言候獨見填星填讀曰鎮土星也出如瓜食頃復入有司皆曰陛下建漢家封禪天其報德星云德星即填星也史記作旗星明年帝祠五畤還祠泰一以拜德星壬申二年春帝如東萊漢郡治掖今山東萊州府掖縣是還臨塞決河築宣防宫在直𨽻大名府開州西南公孫卿言見神人東萊山若云欲見天子上於是幸緱氏遂至東萊宿留數日無所見見大人迹云時歲旱天子既出無名乃禱萬里沙在萊州府掖縣東北寰宇記夾萬歲水兩岸皆沙舊有祠過祠泰山還過瓠子瓠子河決已二十餘年不塞上自臨決河沈白馬玉璧令羣臣從官自將軍以下皆負薪置決河時東郡燒草以故薪柴少而下淇園之竹以為楗樹竹以塞決口令密而以土填之卒塞瓠子築宫其上名曰宣防上初臨河決悼功之不成作瓠子之歌既塞乃築宫道河北行二渠注見前復禹舊迹梁楚之地復寧無水災夏帝還長安越人勇之越人名言越俗祠皆見鬼有效東甌王敬鬼得夀百六十歲乃命立越祠亦祀天神上帝百鬼而用雞卜越俗執雞以禱所占殺之拔其骨視骨上之孔以驗吉凶公孫卿復言仙人好樓居於是上令長安作蜚廉觀在故長安城中應劭曰蜚廉神禽能致風氣者也甘泉作通天臺三輔黃圖臺髙百餘丈若與天通使卿持節設具而候神人更置甘泉前殿夏有芝生殿房內中芝九莖連葉內中後庭之室也詔赦天下作芝房之歌朝鮮注見前襲殺遼東注見前都尉遣將軍楊僕荀彘將兵伐之朝鮮在戰國時故屬燕秦為遼東外徼漢興為其逺難守復修遼東故塞至浿水在朝鮮國平壤城東今曰大通江為界屬燕國燕王盧綰反入胸奴燕人衛滿亡命聚黨椎結蠻服東走出塞度浿水居秦故空地役屬諸夷及燕齊亡在者師古曰燕齊之人亡居此地王之都王險即平壤城箕子故都今朝鮮國為平壤府孝惠髙后時遼東太守約滿為外臣保塞以故滿得侵降其旁小邑方數千里傳子至孫右渠所誘漢亡人滋多又未嘗入見辰國即辰韓韓有三種曰馬韓辰韓辨韓欲上書見天子又雍閼不通是歲漢使涉何譙責讓也諭右渠終不肯奉詔何去至浿水刺殺送者歸報天子曰殺朝鮮將上以其名美拜何遼東東部都尉朝鮮怨何發兵攻襲殺之上募天下死罪為兵遣樓船將軍楊僕從齊浮渤海左將軍荀彘出遼東以討朝鮮旱上以旱為憂公孫卿曰黃帝時封則天旱乾音干封三年上乃下詔曰天旱意乾封乎蘇林曰謂天旱之意欲新封之土乾燥乎秋作明堂於汶上汶水之上也水經注北汶水東南流徑明堂下今泰安府南有泮河即北汶水東南流入大汶上欲作明堂未曉其制度濟南公玉帶史記索隱公玉姓帶名也風俗通齊泯王臣有公玉冉帶其後也上黃帝明堂圖中有一殿四面無壁以茅蓋通水園宮垣為復道上有樓從西南入命曰昆侖於是上令奉髙作明堂汶上如帶圖遣將軍郭昌發兵擊滇滇王降置益州郡治填池今雲南府是初上使王然於諭滇王入朝滇王衆數萬人其旁東北勞深靡莫括地志勞深即勞浸在蜀南靡莫即靡非在姚州北同姓相仗未肯聽勞深靡莫數侵犯使者吏卒於是上遣將軍郭昌發巴蜀兵擊滅勞深靡莫以兵臨滇滇王舉國降請置吏入朝乃以為益州郡賜滇王王印復長其民西南夷君長以百數獨夜郎及滇受王印最寵焉以杜周南陽杜衍人為廷尉周少言重遲而內深次骨其治大抵放張湯而善候司讀作伺上所欲擠者因而陷之上所欲釋久繫待問而微見其寃狀客或讓周不循三尺法周曰三尺安出哉前主所是著為律後主所是疏為令當時為是何古之法乎時詔獄益多一歲至千餘章逮至六七萬人吏所增加十有餘萬癸酉三年冬十二月雷雨雹遣將軍趙破奴擊姑師徐廣曰即車師破奴虜樓蘭王遂破姑師考通鑑姑師作車師蓋以一國兩名故互書也綱目以姑師為樓蘭王名未知何據今依漢書上必欲通大宛諸國使者一歲多至十餘輩樓蘭姑師當道苦之攻劫漢使又數為胸奴耳目上遣趙破奴將屬國騎及郡兵擊姑師王恢數為樓蘭所苦上令恢佐破奴將兵破奴以輕騎七百人先至虜樓蘭王遂破姑師因暴兵威以動烏孫大宛之屬還破奴恢俱封侯破奴浞野侯恢涪侯於是酒泉亭障至玉門矣朝鮮人殺王右渠以降置樂浪治朝鮮即平壤城臨屯茂陵書治東暆昭帝時廢今朝鮮國城西南有臨屯城元莬治髙句驪故城在朝鮮咸興府東北真畨茂陵書治霅縣亦昭帝時廢今朝鮮國城西有真番城郡漢兵入朝鮮境朝鮮王右渠發兵距險楊僕將齊兵先至戰敗遁走收散卒復聚荀彘擊朝鮮浿水西軍亦未能破上以兩將未有利乃使衛山因兵威往諭右渠右渠頓首請降遣太子入謝人衆萬餘持兵方渡浿水山與彘疑其為變諭令人毋持兵太子疑遂不渡浿水復引歸山還報上乃誅山已彘破浿水上軍乃前至城下圍其西北僕亦往會居城南數月未下彘所將燕代卒徑悍乘勝多驕僕嘗敗亡卒皆恐將心慙其圍右渠僕常持和節而彘急擊之朝鮮大臣乃隂使人約降於僕往來未決彘使人降之不從以故彘與僕不相得上以兩將乖異使濟南太守公孫遂往正之有便宜得以從事遂至彘具以素所意告之遂亦以為然乃共執僕而并其軍遂還報上誅遂彘擊朝鮮益急朝鮮尼溪相參尼溪朝鮮地參相之名也等使人殺王右渠以降朝鮮平以其地為四郡彘徴棄市僕贖為庶人甲戌四年夏大旱民多暍死胸奴冦邊遣郭昌將兵屯朔方胸奴自衛霍渡幕以來希復為冦逺徙北方數使使請和親漢使王烏窺之單于佯許遣太子入漢為質又曰吾欲入漢見天子面相約為兄弟王烏歸報漢為單于築邸長安會胸奴使至漢病死漢使路充國送其喪單于以為漢殺吾使者乃留充國而數使部兵侵犯漢邊上遣昌等屯朔方以備之乙亥五年冬帝南巡江漢春三月至泰山增封祀上帝於明堂配以髙祖上南巡狩自江陵而東至於盛唐韋昭曰在南郡寰宇記盛唐漢縣屬廬江郡其西有盛唐山考漢書地理志廬江郡無盛唐其盛唐縣乃唐置非漢縣也且自江陵而東則南郡之説為是望祀虞帝於九疑注見前登灊漢縣故城在江南六安州霍山縣天柱山即霍山在霍山縣北爾雅謂之南嶽今亦曰灊嶽自尋陽漢縣在江北今湖北黃梅縣界晉尋陽郡在江南今江西九江府是也浮江親射蛟江中獲之舳艫千里薄樅陽漢縣故城在江南安慶府桐城縣今為鎮而出作盛唐樅陽之歌遂北至琅邪注見前並海所過禮祀其名山大川還至泰山增封始祀上帝於明堂以髙祖配因朝諸侯王列侯受郡國計師古曰受郡國上計簿也夏四月赦天下所幸縣毋出今年租賦還幸甘泉郊泰畤大司馬大將軍長平侯衛青卒諡曰烈青凡七出擊胸奴再益封并三子凡二萬二百户蘇建常責青以招選賢者青謝曰自魏其武安之厚賔客天子常切齒彼招賢黜不肖者人主之柄也人臣奉法遵職而已何與招士初置刺史上既攘卻胡越開地斥境乃置交址朔方之州及冀幽并幽并二州舜分冀州置兖徐青揚荆豫益禹貢梁州涼禹貢雍州西地等州凡十三部皆置刺史掌奉詔條察州漢舊儀刺史每以秋分行部所察六條詔舉茂材異等詔曰蓋有非常之功必待非常之人故馬或奔踶而致千里士或有負俗之纍而立功名夫覂駕之馬跅弛之士亦在御之而已其令州郡察吏民有茂材異等可為將相及使絶國者丙子六年遣郭昌將兵擊昆明注見前上欲通大夏遣使皆閉昆明為所殺奪幣物於是赦京師亡命遣郭昌將以擊之斬首數十萬後復遣使竟不得通秋大旱蝗以宗室女為公主嫁烏孫烏孫使者見漢廣大歸報其國其國乃益重漢胸奴怒欲擊之烏孫恐使使願得尚漢公主為昆弟乃以江都王建女細君為公主往妻烏孫昆莫以為右夫人胸奴亦遣女妻之以為左夫人公主自治宫室居歲時一再與昆莫會昆莫年老言語不通公主悲愁思歸作黃鵠之歌天子聞而憐之間歲使人問遺昆莫欲使其孫岑陬烏孫官號名軍須靡尚公主公主不聽上書言狀天子欲與烏孫共滅胸奴詔從其國俗岑陬遂妻公主昆莫死代立乃以昆彌昆莫本名獵驕靡故號取昆莫驕靡合而一之為王號云是時漢使西踰蔥嶺抵安息安息發使以大鳥卵及犛靬眩人獻於漢諸小國皆隨漢使獻見每巡狩海上悉從外國客大都多人則大角抵出竒戲聚觀者散財帛賞賜以示富厚令遍觀各倉庫府藏之積以傾駭之大宛左右多蒲萄可以為酒多苜蓿天馬嗜之漢使采其實以來天子種之離宫别館旁極望焉人大鳥卵條支國大雀其卵如甕犛靬西域國名眩即幻人顔師古曰今吞刀吐火之類是也角抵竒戲文頴曰雜技樂也巴渝戲魚龍曼衍之屬丁丑太初元年應劭曰初用夏正故改年為太初冬十月帝如泰山十一月甲子朔旦冬至祀明堂益遣方士入海上自泰山東至海上考入海及方士求神仙者莫驗然益遣冀遇之十二月親禪髙里伏儼曰山名在泰山下祠后土臨勃海望祀蓬萊幾義同冀至殊廷仙人廷也焉柏梁臺災作建章宫三輔黃圖在未央宫西長安城外柏梁既災上還受計明庭甘泉公孫卿言黃帝就青靈臺十二日燒乃治明庭甘泉也上於是令甘泉作諸侯邸越人勇之曰越俗有火災復起屋必以大用勝服之乃作建章宫度為千門萬户東鳯闕西虎圈北太液池中有漸臺蓬萊方丈壺梁南玉堂璧門立神明臺井幹樓輦道相屬夏五月造太初厯以正月為歲首大中大夫公孫卿壺遂壺氏晉大夫受邑壺口其後以為氏太史令太史史官之長令漢所置司馬遷太史談子生於龍門字子長等言厯紀廢壞宜改正朔禮記疏周建子商建丑夏建寅改正也周夜半商雞鳴夏平旦易朔也兒寬議以為宜用夏正斗杓初昏建寅之月為歲首也乃詔卿等造漢太初厯卿等以上元泰初四千六百一十七歲至於元封七年復得閼逢攝提挌之歲中冬十一月甲子朔旦冬至日月在建星太歲在子巳得太初本星度願募治厯者更造密度各自增減以造漢太初厯於是鄧平及洛下閎等都分天部閎運算轉厯其法以律起厯與鄧平所治同詔遂用鄧平厯王應麟曰漢太初厯元起丁丑以日月五緯復得上元本星度故命曰閼逢攝提格之歲而實非甲寅也以正月為歲首色尚黃黃土色漢據土德故尚黃數用五土數五故用五定官名光祿勳大鴻臚大司農執金吾京兆尹左馮翊右扶風皆是歲所改協音律更是年為太初元年劉氏友益曰始用夏正故特書造自是無能改者矣蓋行夏之時誠不易之常經也秋以李廣利為二帥將軍伐大宛漢使入西域者言宛有善馬在二師城大宛國城名匿不肯與漢使上使壯士持千金及金馬以請之宛王不肯漢使怒椎破也金馬而去宛貴人令其東邊郁成王遮殺之於是上大怒諸嘗使者言宛兵弱誠以漢兵三千人可盡虜矣上以為然而欲侯寵姬李氏乃拜其兄廣利為二師將軍期至二師取善焉故以為號發屬國騎及郡國惡少年數萬人往伐宛二師西行當道小國各城守不給食比至郁成士不過數千皆飢罷攻郁成為所殺傷甚衆二師引兵還至敦煌上書乞罷兵上怒使使遮玉門曰軍有敢入斬之二師恐因留敦煌關東蝗大起西飛至敦煌戊寅二年春正月丞相慶卒以公孫賀為丞相封葛繹侯時朝廷督責大臣丞相比坐事死賀引拜不受印綬頓首涕泣上起去賀不得已拜出曰我從是殆矣秋遣趙破奴擊胸奴敗沒初丐奴烏維單于死子兒單于名烏斯盧立年少好殺伐國人不安左大都尉告漢曰我欲殺單于降漢漢逺即兵來迎我我即發上乃遣公孫敖築塞外受降城在今吳喇忒旗北以應之既而猶以為逺乃遣浚稽將軍趙破奴將二萬騎期至浚稽山在漢北胡三省注胸奴有東西浚稽考浚稽山去漢朔方北一千餘里當在今喀爾喀土喇河及鄂爾渾河之間所謂龍勒水在東浚稽山南余吾水在山之北者是也既至左大都尉欲發而覺單于誅之發兵八萬騎圍破奴獲之因急擊其軍軍吏畏亡將而誅遂沒於胸奴明年兒單于死詬犂湖單于立漢遣光祿勳徐自為出五原塞築城障列亭逺者千里其秋胸奴大入盡毁壞之己邜三年春睢陽功臣表作睢陵侯張昌張敖曽孫廣之子有罪國除初髙祖封功臣為列侯百四十有三人其封爵之誓曰使黃河如帶泰山若礪國以永存爰及苗裔申以丹書之信重以白馬之盟髙后時差第位次藏之宗廟副在有司逮文景後列侯子孫多抵法禁隕身失國至是昌坐為太常乏祠祠事有闕也國除見侯才四人而已大發兵從李廣利圍宛宛殺其王毋寡出善馬以降時議者皆願罷宛兵以趙破奴畋沒胸奴上以為宛小國而不能下則大夏之屬漸輕漢而宛善馬絶不來乃案案其罪行罰言伐宛尤不便者鄧光等大發兵出敦煌赦囚徒發惡少年及邉騎凡六萬人負私從者不與益發天下七科吏有罪一亡命二贅壻三賈人四故有市籍五父母有市籍六大父母有市籍七適與謫同戍也及載糒給二師拜習馬者二人為執驅馬校尉備破宛擇取其善馬云於是二師復行以兵多所至迎給不下者攻屠之至宛城兵到者三萬宛兵迎擊漢兵大敗之圍其城攻之四十餘日宛城中無井汲城外流水二師決其水原移之宛大困宛貴人相與謀共殺王毋寡持其頭使二師曰無攻我我盡出善馬恣所取而給軍食即不聽我我盡殺善馬康居之救又且至二師許之宛乃出其馬令漢自擇之而多出食食漢軍漢軍取其善馬數十匹中馬以下三千餘匹立宛貴人昧蔡故與漢使善者為王與盟而罷兵令搜粟都尉上官桀楚子蘭為上官邑大夫後以為氏桀隴西上邽人攻破郁成郁成王走康居追斬之明年師還上以得宛善馬作西極天馬之歌辭曰天馬徠從西極涉流沙九夷服天馬徠出泉水虎脊兩化若鬼天馬徠厯無皂徑千里循東道天馬徠執徐時將搖舉誰與期天馬徠開逺門竦豫身逝昆侖天馬徠龍之媒逰閶闔觀玉臺封廣利為海西侯將士皆論功封賞伐宛再反凡四嵗而得罷二師還時胸奴因樓蘭候漢使後過者欲絶勿通軍正任文捕得生口知狀以聞上詔文引兵捕樓蘭王詣闕對簿王對曰小國在大國間不兩屬無以自安願徙居漢地上直其言遣歸國因使候伺胸奴自是不親信樓蘭於是自敦煌西至鹽澤往往起亭而輪臺渠犂皆有田卒數百人置使者校尉領護以給使外國者輪臺西域地名在車師西北渠犂城在輪臺東地相接辛巳天漢元年應劭曰時頻年苦旱故改元天漢以祈甘雨師古曰大雅有雲漢之詩故依以為年號春三月遣中郎將蘇武杜陵人蘇建子字子卿使胸奴先是上欲因伐宛之威遂困胸奴乃下詔曰髙皇帝遺朕平城之憂髙后時單于書絶悖逆昔齊襄公復九世之讐齊襄公滅紀復哀公之讐見公羊傳春秋大之會胸奴詬犂湖單于死弟且鞮侯單于初立恐漢襲之乃曰我兒子安敢望漢天子漢天子我丈人行也因盡歸漢使之不降者路充國等使使來獻於是上嘉單于之義遣蘇武送胸奴使留在漢者因厚賂單于答其善意武與副中郎將張勝及假吏常惠等俱既至置幣單于單于益驕非漢所望也會緱王昆邪王姊子與昆邪王俱降漢後隨趙破奴沒胡中與長水虞常漢有長水校尉掌長水胡騎虞常蓋亦先沒於胸奴者等謀殺漢降人衛律律父故長水胡人律善李延年延年薦律使於胸奴聞延年家收遂亡降於胸奴單于愛之而劫單于母閼氏歸漢人告單于時律為丁靈胸奴屬國在康居北今為俄羅斯地王貴寵用事單于使律治之虞常引武副張勝知其謀虞常在漢素與張勝相知私候勝請為伏弩射殺衛律勝許之單于怒欲殺漢使者左伊秩訾胡官之號曰即謀單于何以復加言謀衛律而殺之其罰太重宜皆降之單于使衛律召武受辭武謂常惠等曰屈節辱命雖生何面目以歸漢引佩刀自刺衛律驚自抱持之武氣絶半日復息單于壯其節朝夕遣人問武而收繫勝武益愈會論虞常欲因此時降武劍斬常己律曰漢使張勝謀殺單于近臣當死降者赦罪舉劍欲擊之勝請降律謂武曰副有罪當相坐武曰本無謀又非親屬何謂相坐律復舉劍擬之武不動律曰君因我降與君為兄弟今不聽吾計後雖欲復見我尚可得乎武罵律曰汝為人臣子不顧恩義畔主背親為降虜於蠻夷何以汝為見言何用見汝為也且單于信汝使決人生死不平心持正反欲鬭兩主觀禍敗南越殺漢使者屠為九郡宛王殺漢使者頭縣北闕朝鮮殺漢使者即時誅滅若知我不降明欲令兩國相攻胸奴之禍從此始矣律白單于愈欲降之遂幽武置大窖中絶不飲食天雨雪武卧齧雪與旃毛並咽之數日不死胸奴以為神乃徙武北海上無人處使牧羝曰羝乳乃得歸别其官屬常惠等各置他所武既至海上廪食不給掘野鼠去草實而食之仗漢節牧羊卧起操持節旄盡落雨白氂與釐通師古曰毛之強曲者也夏大旱赦壬午二年夏遣李廣利將兵擊胸奴别將李陵戰敗降虜二師出酒泉擊胸奴斬萬餘級師還胸奴大圍之漢軍乏食數日死傷者多假司馬趙充國字翁孫隴西上邽人與壯士百餘人潰圍陷陳二師引兵隨之遂得解充國身被二十餘創詔徵詣行在所帝親視其創嗟嘆之拜為中郎初李廣有孫陵字少卿善騎射愛人下士帝以為有廣之風拜騎都尉使將丹陽楚人五千人教射酒泉張掖以備胡至是上欲使為二師將輜重陵曰臣所將皆荆楚勇士奇才劍客力扼虎射命中願得自當一隊分單于兵毋令専鄉二師軍上曰將惡相屬耶吾發軍多無騎豫女陵對無所事騎臣願以步兵五千人涉單于庭上壯而許之因詔路博德將兵半道迎陵軍博德亦羞為陵後距奏言方秋胸奴馬肥未可與戰願留陵至春俱出上疑陵悔而教博德上書乃詔博德擊胸奴於西河注見前詔陵以九月發陵於是出居延漢縣注見前至浚稽山注見前與單于相值騎可三萬圍陵軍軍居兩山間以大車為營陵引士出營外為陳前行持戟盾後行持弓弩令曰聞鼓聲而縱聞金聲而止虜見漢軍少直前就營陵摶戰千弩俱發應弦而倒擊殺數千人單于大驚召左右地兵八萬餘騎攻陵陵且戰且引南行斬首三千餘級抵大澤葭葦中虜從上風縱火陵亦軍中縱火以自救步鬭樹木間復殺數千人單于曰此漢精兵擊之不能下日夜引吾南近塞得毋有伏兵乎欲去會軍候管敢亡降胸奴具言陵軍無後救矢且盡單于大喜遮道急攻陵居谷中虜在山上四面射矢如雨下漢軍南行未至鞮汗山一日五十萬矢皆盡陵太息曰兵敗死矣令軍士各散期至遮虜障漢路博德所築在今肅州北邊外相待虜騎數千追之校尉成安侯韓延年戰死陵曰無面目報陛下遂降軍得脫至塞者四百人上聞陵降怒甚羣臣皆罪陵惟太史令司馬遷盛言陵事親孝與士信常奮不顧身以徇國家之急且陵提步卒不滿五千深蹂戎馬之地抑數萬之師雖古名將不過也身雖陷敗彼之不死宜欲得當以報漢也上以遷為誣罔欲沮二師為陵遊説下遷腐刑久之上悔曰陵當發出塞乃詔強弩都尉令迎軍坐預詔之得令老將生姦詐乃遣使勞賜陵餘軍得脫者遣繡衣直指使者即侍御史師古曰衣以繡者尊寵之也發兵擊東方盜賊時郡國二千石多酷暴吏民益輕犯法東方盜賊滋起攻城邑取庫兵釋死罪殺二千石掠鹵鄉里道路不通上使光祿大夫范昆等衣繡衣持節虎符發兵以興擊所至得擅斬二千石以下誅殺甚衆一郡多至萬餘人數歲乃頗得其渠率散卒失亡復聚黨阻山川者往往羣居無可奈何於是作沈命法韋昭曰沈沒也敢蔽匿盜賊者沒其命曰盜起不發覺發覺而捕弗滿品者二千石以下至小吏主者皆死其後小吏畏誅雖有盜不敢發府亦使其不言故盜賊浸多上下相為匿以文辭避法焉是時暴勝之為直指使者衣繡杖斧所誅殺二千石以下尤多威振州郡至勃海聞郡人雋不疑賢請與相見不疑容貌尊嚴衣冠甚偉勝之屣履起迎登堂坐定不疑據地曰竊伏海濱聞暴公子舊矣今乃承顔接辭凡為吏太剛則折太柔則廢威行施之以恩然後樹功揚名永終天祿勝之深納其戒及還表薦召拜青州刺史王賀亦為繡衣御史逐捕羣盜多所縱舍以奉使不稱免歎曰吾聞活千人子孫有封吾所活者萬餘人後世其興乎雋不疑字曼倩勃海人王賀字翁孺元皇后之父癸未三年春三月帝東巡還祠常山上行幸泰山修封祀明堂因受計還祠常山瘞元玉方士之候神人求蓬萊者終無有驗上益厭怠矣然猶羈縻不絶冀遇其真夏大旱赦甲申四年春正月遣李廣利等擊胸奴不利族誅李陵家發天下七科適及勇敢士遣李廣利等四將軍出塞二師將軍李廣利將騎六萬步兵七萬出朔方強弩都尉路博德將萬餘人與二師會逰擊將軍韓説將步兵三萬人出五原因杅將軍公孫敖將騎萬步兵三萬人出鴈門胸奴聞之悉逺其纍重於余吾水在浚稽山北北而單于以兵十萬待水南與二師接戰二師解而引歸遊擊無所得因杅與左賢王戰不利時上遣敖深入胸奴迎李陵敖軍無功還因曰得生口言李陵教單于為兵以備漢軍故臣無所得上於是族陵家既而聞之乃李緒非陵也陵使人刺殺緒單于以女妻陵立為右校王與衛律皆貴用事夏四月立子髆為昌邑王治昌邑注見前髆李夫人子也立十一年薨子賀嗣秋九月令死罪入贖錢五十萬減死一等乙酉太始元年應劭曰與民更始故以冠元春正月徙豪傑於茂陵丙戌二年春三月制金班諸侯王詔曰往者朕郊見上帝獲白麟渥窪水出天馬泰山見黃金宜改故名今更黃金為麟趾裊奴了反蹄要裊駿馬名裊蹄馬蹄也師古曰舊金以斤兩為名今欲表祥瑞故普改為麟足馬蹄之形以易舊法以協瑞焉因以班賜諸侯王秋穿白渠在西安府涇陽縣西北有大白中白南白三渠趙中大夫白公史失其名奏穿渠引涇水注見前首起谷口在涇陽縣西北師古曰仲山之谷口也漢時為縣今呼冶谷仲山之北寒涼故為此谷為寒門尾入櫟陽注見前注渭中袤二百里溉田四千五百餘頃因名曰白渠民得其饒歌曰田於何所池陽谷口鄭國在前白渠起後舉臿成雲決渠為雨涇水一石其泥數斗且溉且糞長我禾黍衣食京師億萬之口鄭國渠注見前今三白渠自仲山龍洞而東北曰北白中曰中白南曰下白凡灌涇陽醴泉三原髙陵四縣田七千餘頃丁亥三年春正月帝東巡琅邪浮海而還上行幸東海獲赤鴈作赤鴈之歌幸琅邪禮日成山登之罘注俱見前浮大海而還子弗陵生弗陵母曰河間趙偼妤帝遇河間望氣者言此有奇女上使召之既至兩手皆拳上自披之手即時伸由是得幸號拳夫人封偼妤偼妤位昭儀下視上卿比列侯居鈎弋宫以偼妤手反屈如鈎故名任身十四月而生上曰聞昔堯十四月而生乃命門曰堯母門以江充邯鄲人為水衡都尉充初為趙王趙敬肅王彭祖客得罪亡詣闕告趙太子隂事太子坐廢充容貌魁岸被服輕靡上召與語大悅之拜為直指繡衣使者使督察貴戚近臣踰侈者充舉劾無所避令身待北軍擊胸奴貴戚子弟叩頭求哀於上願入錢贖罪凡數十萬上以充為忠直嘗從上甘泉逢太子家使乘車馬行馳道中充以屬吏太子使人謝充曰非愛車馬誠不欲令上聞之以教敕亡素謂素不曽教敕左右者唯江君寬之充不聽遂白奏上曰人臣當如是矣大見信用威震京師戊子四年春三月帝東巡祀明堂修封禪夏五月還宫赦上幸不其漢縣以不其山名故城在今山東萊州府即墨縣祠神人於交門宫晉灼曰琅邪有交門宫若有鄉坐拜者作交門之歌冬十月甲寅晦日食己丑征和元年應劭曰言征伐四夷而天下和平夏大旱冬十一月大搜長安十一日上居建章宫見一男子帶劍入中龍華門命收之弗獲上怒斬門候發三輔京兆左馮翊右扶風是為三輔騎士大搜上林閉長安城門索十一日乃解巫蠱始起是時方士及諸神巫多聚京師率皆左道惑衆變幻無所不為女巫往來宫中教美人度厄每屋輒埋木人祭祀之因妬忌恚詈更相告訐以為祝詛上無道後宫及大臣被誅者甚衆庚寅二年春正月丞相賀有罪下獄死夷其族以劉屈氂中山靖王子為左丞相封澎侯賀夫人君孺衛皇后姊也子敬聲為太僕驕奢不奉法擅用北軍錢發覺下獄時詔捕陽陵大俠朱安世甚急賀自請捕安世以贖敬聲罪果得安世安世笑曰丞相禍及宗矣遂從獄中上書告敬聲與陽石公主私通祝詛上有惡言遂下賀獄父子死獄中家族夏四月大風發屋折木帝如甘泉秋七月皇太子據殺使者江充白皇后發兵反詔丞相屈氂討之據敗走湖漢縣故城在今河南陜州閿鄉縣皇后衛氏及據皆自殺初上立太子甚愛之及長嫌其才能不類已皇后太子常不自安上覺使大將軍曉之上曰漢家庶事草創加四夷侵陵中國朕不變更制度後世無法不出師征伐天下不安為此者不得不勞若後世又如朕所為是襲亡秦之迹也太子敦重好靜必能安天下欲求守文之主安有賢於太子者乎可以此意喻之上用法嚴太子寬厚多所平反如淳曰奏請從輕也用法大臣多不悅衛青既卒臣下無復外家為據言諸臣以太子已無外家可為馮依競欲搆太子會巫蠱事起上心以為疑嘗晝寢夢木人數千持杖欲擊上上驚寤因是體不平遂苦忽忽善忘上以江充為使者治其獄自京師三輔及郡國坐死者數萬人充自以與太子及衛氏有隙因言宫中有蠱氣入宫至省中壞御座掘地求蠱上又使蘇文等助充太子嘗謁皇后移日乃出黃門蘇文告上曰太子與宫人戲上益太子宫人太子知之銜文文與小黃門常融等常微伺太子過輒增加白之皇后切齒使太子白誅文等太子曰苐勿為過上聰明不信邪佞不足憂也已而融被誅文搆太子益甚充遂至太子宫掘地縱橫無復施牀處云於太子宫得木人尤多當奏聞太子懼召問少傅石德石慶子德懼并誅因曰前丞相公孫賀父子兩公主諸邑陽石及衛氏長平侯伉皆坐此今無以自明可矯以節收捕充等繫獄窮治其姦詐且上疾在甘泉皇后及家吏請問皆不報存亡未可知而姦臣如此太子不念秦扶蘇事邪太子不聽將如甘泉而充持之急太子遂從德計乃使客詐為使者收捕充等自臨斬之罵曰趙虜前亂乃國王父子不足邪乃復亂吾父子也使舍人持節夜入宫白皇后發中廄天子內廄車載射士出武庫兵發長樂宫衛卒蘇文亡歸甘泉言狀上大怒賜丞相璽書曰捕斬反者自有賞罰堅閉城門毋令反者得出太子宣言帝病困疑有變上於是從甘泉來幸城西建章宫詔發三輔近縣兵丞相將之太子亦矯制赦長安中都官囚徒命石德及賓客張光等分將召護北軍使者任安與節令發兵安拜受節入閉門不出太子引兵驅肆市人數萬至長樂西闕下逢丞相軍合戰五日死者數萬人民間皆云太子反以故衆不附太子兵敗南奔覆盎城門長安城東南門亦曰杜門司直田仁部閉城門以為太子父子之親不欲急之太子得出亡丞相欲斬仁御史大夫暴勝之曰司直吏二千石當先請奈何擅斬之丞相釋仁上聞大怒下吏責問勝之惶恐自殺詔收皇后璽綬后自殺上以為任安老吏欲坐觀成敗有兩心與田仁皆要斬諸太子賓客嘗出入宫門皆坐誅其隨太子發兵以反法族上怒甚羣下憂懼不知所出壺關今縣屬山西潞安府本漢置三老茂上書曰臣聞父者猶天母者猶地子猶萬物也故天平地安物乃茂成父慈母愛子乃孝順今皇太子為漢適嗣承萬世之業體祖宗之重親則皇帝之宗子也江充布衣之人閭閻之隸臣耳陛下顯而用之銜至尊之命以迫蹙皇太子造飾姦詐羣邪錯繆太子進則不得見上退則困於亂臣獨寃結而無告不忍忿忿之心起而殺充恐懼逋逃子盜父兵以救難自免耳臣竊以為無邪心往者江充讒殺趙太子天下莫不聞陛下不察深過太子發盛怒舉大兵而求之三公自將智者不敢言辨士不敢説臣竊痛之書奏上感悟然尚未顯言赦之也太子亡東至湖匿泉鳩里一名全鳩澗在閿鄉縣西南主人家貧賣屨以給太子八月發覺吏圍捕太子太子入室距户自經皇孫二人皆並遇害初上為太子立博望苑使通賓客從其所好賓客多以異端進者故終及於敗八月地震辛邜三年春三月遣李廣利等將兵擊胸奴胸奴冦五原酒泉遣李廣利等將兵擊之李廣利將七萬人出五原商邱成將二萬人出西河馬通將四萬騎出酒泉夏六月丞相屈氂棄市李廣利降胸奴詔族其家二師之出也丞相劉屈氂為祖道送至渭橋廣利曰願君侯早請昌邑王為太子如立為帝君侯長何憂乎屈氂許諾二師出塞破胸奴兵於夫羊句山在漢北乘勝追北至范夫人城在今喀爾喀地會有告丞相夫人祝詛上及與二師共禱祠欲令昌邑王為帝按驗罪至大逆不道六月屈氂要斬東市二師妻子亦收二師聞之憂懼遂深入要功北至郅居水在范夫人城北上逢左賢王左大將合戰一日殺左大將還至燕然山今喀爾喀有杭愛山直陜西寧夏北二千餘里蓋即古燕然山單于自將五萬騎遮擊二師夜塹漢軍前深數尺從後急擊之軍大亂敗二師遂降單于以女妻之宗族遂滅二師在胸奴歲餘衛律害其寵會母閼氏病律飭胡巫言當用二師以祠二師且死罵曰我死必滅丐奴會連雨雪數月畜産死人民疫病榖稼不熟單于恐為二師立祠室秋以田千秋本齊諸田徙長陵為大鴻臚族滅江充家吏民以巫蠱相告言者案驗多不實上頗知太子惶恐無他意會髙寢郎髙廟衛寢之郎田千秋上急變訟太子寃曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言上乃大感悟召見千秋千秋長八尺餘體貌甚麗上見而悅之謂曰父子之間人所難言也公獨明其不然此髙廟神靈使公教我公當遂為我輔佐立拜千秋為大鴻臚而族滅江充家焚蘇文於橫橋即中渭橋在橫門外上上憐太子無辜乃作思子宫為歸來望思之臺於湖天下聞而悲之壬辰四年春正月帝如東萊注見前上欲浮海求神仙羣臣諫弗聽會大風晦冥海水沸涌留十餘日乃還是歲雍縣注見前無雲而雷者三聲聞四百里隕石二黑如黳三月帝耕於巨定漢縣故城在今山東青州府夀光縣西北還至泰山罷方士候神人者夏六月還宫上耕於巨定還幸泰山修封禪祀明堂見羣臣乃言曰朕即位以來所謂狂悖使天下愁苦不可追悔自今事有傷害百姓糜費天下者悉罷之田千秋曰方士言神仙者甚衆而無顯功請皆罷斥遣之上曰大鴻臚言是也於是悉罷諸方士候神人者是後上每對羣臣自嘆鄉時愚惑為方士所欺天下豈有仙人盡妖妄耳節食服藥差可少病而已以田千秋為丞相封富民侯以趙過為搜粟都尉千秋無他才能學術又無閥閲功勞特以一言寤意數月取宰相封侯世未嘗有也然為人敦厚有智居位自稱踰於前後數公先是桑𢎞羊言輪臺注見前東有溉田五千頃以上可遣屯田卒置校尉募民壯健敢徙者詣田所墾田築亭以威西國上乃下詔深陳既往之悔曰前有司奏欲益民賦三十助邊用是重困老弱孤獨也今又請遣卒田輪臺輪臺西於車師千餘里前擊車師雖降其王以遼逺乏食道死者尚數千人况益西乎胸奴常言漢極大然不耐飢渴失一狼走千羊乃者二師敗軍士死略離散悲痛常在朕心今又請逺田輪臺欲起亭隧是擾亂天下非所以優民也朕不忍聞大鴻臚等又議欲募囚徒送胸奴使者明封侯之賞以報忿此五伯所弗為也當今務在禁苛暴止擅賦力本農修馬復師古曰馬復因飬馬以免徭賦也令以補缺毋乏武備而已郡國二千石各上進畜馬方略補邊狀與計對自是不復出軍而封田千秋為富民侯以明休息思富養民也又以趙過為搜粟都尉過教民為代田一畝秦制二百四十步為畝三甽溝廣深各尺曰甽歲代處代易也歲易其處胡三省曰即周禮一易再易之類每耨輒附根每耨草輒以土附著苗根根深能讀曰耐風旱其耕耘田器皆有便巧用力少而得榖多民皆便之秋八月辛酉晦日食癸巳後元元年夏六月侍中僕射馬何羅反伏誅初馬何羅與江充相善及衛太子起兵何羅弟通以力戰封侯後上夷滅江充宗族黨與何羅兄弟懼及遂謀為逆侍中金日磾視其志意有非常心疑之隂獨察其動靜與俱上下以故久不得發上幸林光宫服虔曰甘泉宮亦名林光何羅與通矯制夜出發兵明旦上未起何羅袖白刃從東廂上見日磾色變走趨卧內觸寶瑟僵日磾得抱何羅投殿下窮治皆伏辜秋七月地震往往湧泉出殺鉤弋夫人趙氏鉤弋夫人之子弗陵年七歲形體壯大多知上竒愛之心欲立焉以其年稚母少猶與久之欲以大臣輔之察羣臣唯奉車都尉光祿大夫霍光忠厚可任大事上乃使黃門畫周公負成王朝諸侯以賜光後數日帝譴責鉤弋夫人夫人脫簮珥叩頭帝曰引持去送掖庭獄夫人還顧帝曰趣行汝不得活卒賜死帝間居問左右曰外人言云何左右對曰人言且立其子何去其母乎帝曰然是非兒曹愚人之所知也往古國家所以亂由主少母壯也女主獨居驕蹇淫亂自恣莫能禁也汝不聞吕氏邪故不得不先去之也甲午二年春二月帝如五柞宫在今西安府盩厔縣東南西京雜記宫有五柞樹蔭覆數畝故名立弗陵為皇太子以霍光為大司馬大將軍金日磾為車騎將軍上官桀為左將軍受遺詔輔少主帝崩上病篤霍光涕泣問曰如有不諱誰當嗣者上曰君未喻前畫意邪立少主君行周公之事光頓首讓曰臣不如金日磾日磾亦曰臣外國人不如光且使胸奴輕漢乃立弗陵為皇太子明日命光日磾及上官桀受遺詔輔少主與御史大夫桑𢎞羊皆拜卧內牀下光出入禁闥二十餘年出則奉車入侍左石小心謹慎未嘗有過為人沈靜詳審每出入下殿門止進有常處郎僕射竊識視之不失尺寸日磾在上左右目不忤視者數十年賜出宫女不敢近上欲納其女後宫不肯其罵慎如此上尤竒異之日磾長子為帝弄兒其後壯大自殿下與宫人戲日磾適見遂殺之上怒日磾具言所以上為之泣而心敬日磾桀始以材能見幸為未央廄令上嘗體不安及愈見馬多瘦上大怒曰令以我不復見馬邪欲下吏桀頓首曰臣聞聖體不安日夜憂懼意誠不在馬言未卒泣數行下上以為愛已由是親近又明日帝崩入殯未夾前殿太子弗陵即位時帝姊鄂邑長公王共養省中光日磾桀共領尚書事光輔幼主政自己出天下想聞其風采殿中常有怪一夜羣臣相驚光召尚符璽郎欲收取璽郎不肯授光欲奪之郎按劍曰臣頭可得璽不可得也光甚誼之明日詔增此郎秩二等衆庶莫不多光三月葬茂陵史臣曰漢承百王之弊髙祖撥亂反正文景務在養民至於稽古禮文之事猶多闕焉孝武初立卓然罷黜百家表章六經遂疇咨海內舉其俊茂與之立功興太學修郊祀改正朔定厯數協音律紹周後號令文章煥馬可述如武帝之雄才大略不改文景之恭儉以濟斯民雖詩書所稱何以加焉秋七月追尊鉤弋夫人為皇太后起雲陵在西安府涇陽縣西北孝昭皇帝乙未始元元年春二月帝耕於弄田鉤盾弄田在未央宫中師古曰謂宴遊之田天子所戲弄耳秋七月大雨至於十月燕王旦謀反赦弗治黨與皆伏誅初武帝時燕王旦自以次第當為太子上書求入宿衛帝怒斬其使又坐匿亡命削三縣旦辨慧博學其弟廣陵王胥有勇力而皆動作無法復多過失及武帝崩賜諸侯王璽書燕王旦得書不肯哭曰璽書封小京師疑有變遣幸臣之長安問禮儀隂刺候朝廷事及詔賜錢益封旦怒曰我當為帝何賜也遂與齊孝王孫澤等結謀詐言以武帝時受詔得職吏事修武備備非常為姦書言少帝非武帝子天下宜共伐之使人傳行郡國以搖動百姓澤謀歸發兵臨災注見前且招徠郡國姦人賦斂銅鐵作甲兵數閲其車騎材官卒發民大獵以講士馬須期日殺諫者韓義等凡十五人八月青州刺史雋不疑收捕澤等以聞遣大鴻臚丞治連引燕王詔以燕王至親勿治而澤等皆伏誅遂擢不疑為京兆尹不疑為京兆尹吏民敬其威信每行縣録囚徒還其母輒問不疑有所平反活幾何人即多所平反母喜笑異他時或無所出母怒為不食故不疑為吏嚴而不殘九月車騎將軍秺漢縣故城在今山東曹州府城武縣侯金日磾卒諡曰敬初武帝以日磾捕反者馬何羅功遺詔封為秺侯日磾以帝少不受封及病困光白封之卧受印綬一日薨日磾兩子賞建俱侍中與上卧起賞奉車建駙馬都尉及賞嗣侯佩兩綬上謂光曰金氏兄弟兩人不可使俱兩綬邪對曰賞自嗣父為侯耳上笑曰侯不在我與將軍乎對曰先帝之約有功乃得封侯遂止閏月遣使行郡國舉賢良問民疾苦丙申二年春正月封大將軍光為博陸師古曰取鄉聚之名非縣也侯左將軍桀為安陽桀食邑蕩隂侯皆以遺詔前捕反者功與金日磾同封至是始受時衛尉王莽子男忽侍中揚語曰帝崩忽常在左右安得遺詔封三子事羣兒自相貴耳光聞之切讓王莽莽鴆殺忽以宗室劉辟強字少卿楚元王交之孫劉長樂為光祿大夫辟強守長樂衛尉或説光曰將軍不見諸吕之事乎攝政擅權而背宗室不與共職是以天下不信卒至於滅亡今將軍當盛位帝春秋富宜納宗室又多與大臣共事則可以免患光然之乃擇宗室可用者拜二人皆為光祿大夫辟強守長樂衛尉時辟強已八十餘徙宗正數月卒秋胸奴狐鹿姑單于死子壺衍鞮單于立初武帝征伐胸奴深入窮追二十餘年胸奴馬畜孕重懷任也墮殰胎落散也罷讀作疲極苦之常有欲和親意未能得是歲單于病且死謂諸貴人我子少不能治國立弟右谷蠡王及單于死衛律等與顓渠閼氏謀矯單于令更立其子為壺衍鞮單于左賢王右谷蠡王怨望不復肯會龍城胸奴諸王每歲五月大會龍城祭其先天地鬼神胸奴始衰丁酉三年冬十月鳯凰集東海漢郡注見前遣使者祠其處十一月壬辰朔日食戊戌四年春三月立偼妤上官氏為皇后赦初霍光與上官桀相親善每休沐出桀常代入決事光女為桀子安妻生女年甫六歲安欲因光內之宫中光不聽帝姊鄂邑蓋長公主私近子客丁外人安説外人曰安子容貌端正誠因長主時得入為后以臣父子在朝而有椒房之重漢家故事常以列侯尚主足下何憂不封侯乎外人言於長主長主以為然召安女入為偼妤遂立為后以安為車騎將軍己亥五年春正月男子成方遂詣闕詐稱衛太子伏誅有男子乘黃犢車詣北闕詐稱衛太子公車以聞詔公卿將軍中二千石雜識視至者莫敢發言京兆尹不疑後到叱從吏收縛或曰是非未可知且安之不疑曰諸君何患於衛太子昔蒯瞶違命出奔輒拒而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄上與大將軍光聞而嘉之曰公卿大臣當用有經術明於大誼者由是不疑名重朝廷廷尉驗治竟得姦詐本夏陽人姓成名方遂居湖有故太子舍人謂曰子狀貌似衛太子方遂利其言冀以得富貴坐誣罔不道要斬伊川程子曰不疑説春秋非是然其處事應機則不異於古人矣庚子六年春詔問賢良文學民間疾苦諌議大夫杜延年字幼公杜周少子言年歲比不登流民未盡還宜修孝文時政示以儉約寬和順天心説民意年歲宜應光納其言詔有司問郡國所舉賢良文學民間疾苦教化之要皆對願罷鹽鐵酒𣙜武帝時𣙜酒酤均輸官毋與天下爭利桑𢎞羊難以為此國家大業所以制四夷安邊足用之本不可廢也於是鹽鐵之議起焉是年秋七月罷𣙜酤官從賢良文學之議也霍光知時務之要輕徭薄賦與民休息會胸奴和親百姓充實稍復文景之業焉蘇武還自胸奴以為典屬國本秦官漢因之掌蠻夷降者初武與李陵俱為侍中及陵降胸奴單于使至海上為武置酒設樂謂曰單于聞陵與子卿素厚故使來説足下虛心欲相待終不得歸漢空自苦亡人之地信義安所見乎武曰武父子無功德皆為陛下所成就位列將爵通侯常願肝腦塗地今得殺身自效誠甘樂之臣事君猶子事父也子為父死無所恨願勿復言陵與武飲數日復曰子卿一聽陵言武曰自分已死久矣必欲降武請畢今日之歡效死於前陵見其至誠喟然嘆曰嗟乎義士陵與衛律之罪上通於天因泣下霑襟與武決去後陵復至北海上語武以武帝崩武南鄉號哭歐血旦夕臨數月及是胸奴國內乖離恐漢兵襲之於是與漢和親乃歸武及馬宏等宏前使西國為胸奴所遮亦不肯降故丐奴歸此二人欲以通善意先是漢求武等單于詭言武死漢使復至常惠夜見漢使具自陳道教使者為單于言天子射上林中得鴈足有繫帛書言武等在某澤中使者如惠語以讓單于單于大驚謝曰武等實在於是李陵置酒賀武曰足下揚名胸奴功顯漢室雖古竹帛所載丹青所畫何以過子卿陵雖駑怯令漢貰陵罪全其老母庶幾乎曹柯之盟宿昔所不忘也今復何顧哉已矣令子卿知吾心耳乃起舞作歌泣下數行遂與武決武留胸奴十九歲始以強壯出及還鬚髮盡白官屬隨還者九人既至京師詔武奉一太牢謁武帝園廟拜典屬國賜錢二百萬田二頃宅一區常惠等拜中郎老者歸家賜錢十萬御批厯代通鑑輯覽卷十六

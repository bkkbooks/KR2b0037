front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷三十八南北朝辛宋元嘉二十八年魏卯太平真君十二年春正月魏師還
  hash: sha256:1e042432f7c075d97b1e7b167fa19f34b8d62315e3198ed0bac21f5236334c5e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_037-1a, image: WYG0336/WYG0336-0313a.png}
body:
  text: 正月朔魏主大㑹羣臣于爪步山上班爵行賞有差魏人緣江舉火右衛率尹𢎞言于宋主曰魏人如此必走明日果掠居民焚廬舍而去是月王元謨退還厯城魏人復取碻磝宋主殺其弟義康初胡藩之子誕世反據豫章欲奉前彭城王義康為主前交州刺史檀和之道過豫章擊斬之江夏王義恭等奏義康數有怨言搖動民聽故不逞之族因以生心請徙義康廣州宋主先遣使語之義康曰人生㑹死吾豈愛生必為亂階雖遠何益請死于此恥復屢遷竟未及往至是魏師在瓜步人情惱懼宋王慮不逞之人復奉義康為亂太子劭及武陵王駿僕射何尚之屢啓宜早為之所宋主乃遣中書舍人嚴龍就殺之魏主攻盱眙宋將軍臧質拒之魏師退走二月過彭城宋人追之不及魏人攻盱眙魏主就臧質求酒質封溲便與之魏主怒築長圍一夕而合運東山土石以填塹作浮橋于君山在盱眙縣東北亦名軍山絶水陸道魏主遺質書質復之且寫臺格以示魏衆云斬佛貍首封萬戶侯賜布絹各萬匹魏主大怒作鐵牀于其上施鐵鑱曰破城得質當坐之此上以鈎車鈎城樓城內繫以彄絙數百人唱呼引之車不能退既夜縋桶懸卒出截其鈎獲之明日人以衝車攻城城土堅密頺落不過數升魏人乃肉薄登城分番相代墮而復升莫有退者殺傷萬計尸與城平凡三旬城不拔會魏軍中多疾疫或告以建康遣水軍自海入淮又敇彭城斷其歸路魏主乃燒攻具退走盱眙人欲追之沈璞曰今兵不多雖可固守不可出戰但整舟楫示若欲北渡者以速其走不須實行也臧質以璞城主使之上露板璞固辭歸功于質宋主聞益嘉之魏師過彭城江夏王義恭震懼不敢擊或告敵驅南口萬餘去城數十里追之可悉得諸將皆請行義恭不許明日驛使至敇義恭悉力急追魏師已逺義恭乃遣司馬檀和之向蕭城魏人先聞之盡殺所驅者而去宋令民遭寇者蠲其稅調魏人凡破南兗宋置治廣陵今揚州府是徐兗豫青冀六州殺掠不可勝計丁壯者即加斬截嬰兒貫于槊上盤舞以為戲所過郡縣赤地無餘春燕歸巢于林木自是邑里蕭條元嘉之政衰矣詔賑恤郡縣民遭寇者蠲其稅調降太尉義恭為驃騎將軍鎮軍將軍駿為北中郎將宋主每命將出師常授以成律交戰日時亦待中詔是以將帥趦趄莫敢自决又江南白丁輕進易退此其所以敗也然是役魏之士馬死傷亦過半國人皆尤之三月魏主還平城魏主飲至告廟以降民五萬餘家分置近畿夏四月宋以何尚之為尚書令徐湛之為僕射尚之以湛之國戚任遇隆重每事讓之朝事悉歸湛之魏更定律令魏主命太子少傅游雅中書侍郎胡方回安定臨涇人等更定律令增損凡三百九十一條六月魏太子晃卒諡景穆魏太子晃監國頗信任左右營園田收其利高允切諫略日天地無私故能覆載王者無私故能容養今殿下國之儲二萬方所則而營立私田畜養雞犬乃至酤販市㕓與民爭利謗聲流布不可追掩夫天下者殿下之天下富有四海何求而無乃與販夫販婦競此尺寸之利乎東宫俊乂不少頃來侍御左右者恐非在朝之選願殿下斥去邪佞親近忠良所在田園分給貧下販賣之物以時收散如此則休聲日至謗議可除矣不聽太子為政精察而中常侍宗愛性險暴多不法晃惡之給事中仇尼復姓道盛有寵于晃與愛不協愛恐為所紏遂搆其罪魏主怒斬道盛于都街東宫官屬多坐死晃以憂卒魏主徐知其無罪悔之欲封其子濬為高陽王既而以皇孫世嫡不當為藩王乃止時濬年十二聰逹過人魏主愛之常置左右是考魏書文成帝紀文成帝生于真君元年六月至應年十二通鑑作時濬生四年綱目因之恐是誤筆今依魏書改正秋宋青冀刺史蕭斌將軍王元謨以罪免坐退敗也宋主問沈慶之曰斌欲斬元謨而卿止之何也對曰諸將奔退莫不懼罪自歸而死將至逃散故止之宋魏復通好宋主遣使至魏魏遣殿中將軍郎法祐來修好宋以王僧綽曇首之子為侍中僧綽幼有大成之度衆皆以國器許之好學有思理練悉朝典為吏部郎諳悉人物舉拔咸得其分及為侍中年二十九沈深有局度不以才能高人宋主以其年少欲以後事托之朝政大小皆與參焉壬宋元嘉二十九年魏高辰宗文成帝濬興安元年春二月魏中常侍宗愛弒其君燾而立南安王余魏主追悼景穆太子不已宗愛懼誅弒之諡曰太武皇帝廟號世祖僕射蘭延魏北方諸姓烏落蘭氏後改為蘭氏和匹通作雅薛提太原人等祕不發喪延匹以濬冲幼欲立長君徴秦王翰置之祕室提以濬嫡孫不可廢議久不决宗愛自以得罪太子而素惡翰善南安王余翰余皆太武帝之子乃密迎余矯皇后令召延等而使宦者持兵伏禁中以次收縛斬之殺翰立余余以愛為大司馬大將軍夏五月宋人侵魏先是魯軌之子爽小字女生及其弟秀小字天念自魏奔宋軌初自晉奔秦秦亡復奔魏魏太宗以軌為襄陽公鎮長社軌常思南歸未果㑹卒爽襲父爵與其弟秀俱有寵于魏世祖既而有罪懼誅遂帥部衆千餘家請降于宋軌奔秦事具前宋主以爽為司州刺史鎮義陽宋郡僑置司州于此故城在今汝寧府信陽州秀為穎川太守至是宋主聞魏世祖殂更謀北伐爽時復勸之太子中庶子何偃字仲𢎞尚之之子以為淮泗數州瘡痍未復不宜輕動不從遣蕭思話督張永字景雲茂度子等向碻磝魯爽魯秀陳天祚將荆州甲士四萬出許洛雍州刺史臧質帥所領趣潼關沈慶之固諫北代宋主不使行青州刺史劉興祖上言河南阻饑野無所掠脫諸城固守非旬月可拔稽留大衆轉輸方勞應機乘勢事存急速今僞帥始死兼逼署時國內猜擾不暇逺赴愚謂宜長驅中山據其關要冀州以北民人尚豐兼麥已向熟因資為易若中州震動黃河以南自當消潰臣請發青冀兵入其心腹若前驅克勝則衆軍宜一時濟河使聲實兼舉並建司牧撫柔初附西拒太行北塞軍都因事指揮隨宜加授若能成功清一可待若不克捷不為大傷宋主意止存河南亦不從有軍都漢縣後魏改昌平今為州屬順天府州西北山曰軍都為太行第八陘即居庸關也又使侍郎徐爰字長玉南琅邪開陽人隨軍向碻磝銜中㫖授諸將方略臨時宣示宋尚書令何尚之致仕尋復起之尚之以老請致仕退居方山在江寧府上元縣東南寰宇記其山四面等方故名議者咸謂尚之不能固志既而詔書敦諭數四果起視事袁淑録自古隱士有迹無名者為真隱傳以嗤之宋太子劭始興王濬巫蠱事覺赦不誅初潘淑妃生濬元皇后恚恨而殂淑妃専總內政由是太子劭深惡淑妃及濬濬懼曲意事劭劭更與之善吳興巫嚴道育女巫也自言能役使鬼物因東陽公主婢王鸚鵡出入主家主與劭濬信惑之劭濬多過失數為宋主所詰責使道育祈請欲令過不上聞道育曰我已為上天陳請必不泄露劭等敬事之號曰天師後遂與道育鸚鵡及主奴陳天與黃門陳慶國共為巫蠱琢玉為宋主形像埋于含章殿前已而慶國白其事邵補天與為隊主宋主聞之讓劭曰汝所用隊主副並是奴耶劭懼以書告濬濬復書曰彼人若所為不已正可促其餘命或是大慶之漸耳劭濬相與往來書疏常謂宋主為彼人或曰其人鸚鵡先與天與私通東陽公主卒出嫁濬府佐沈懷逺為妾恐事泄白劭密殺天與慶國懼曰巫蠱事惟我與天與宣傳往來今天與死吾其殆哉乃具以其事白宋主宋主大驚即遣收鸚鵡封籍其家得劭濬書及所埋玉人命有司窮治其事道育亡命捕之不獲宋主惋歎彌日謂潘淑妃曰太子圖富貴更是一理虎頭復如此非復思慮所及汝母子豈可一日無我耶虎頭濬小字遣中使切責劭濬劭濬惶懼陳謝宋主雖怒然猶未忍罪也秋八月宋攻碻磝不克而退雍州兵至虎牢亦還諸軍攻碻磝纍旬不拔八月魏人夜自地道潜出燒營張永撤圍夜遁不告諸將士卒驚擾魏人乘之死傷塗地蕭思話自往增兵力攻不克以軍乏食退屯厯城魯爽至長社魏戍主棄城走臧質遣司馬栁元景帥參軍薛安都向潼關梁州刺史劉秀之遣參軍蕭道成字紹伯小字鬬將承之之子等將兵向長安胡三省曰蕭道成始見此九月魯爽與魏拓跋僕蘭戰于大索城名今開封府滎陽縣治是括地志榮陽縣即大索城又有小索城在縣北破之進攻城臯聞碻磝敗退與元景等皆引還冬十月魏宗愛弒其君余魏主濬立是為文成帝討愛誅之魏南安王余自以違次而立厚賜羣下欲以收衆心旬月之間府藏虛竭又好酣飲及聲樂畋獵不恤政事宗愛為宰相録三省總宿衛坐召公卿專恣日甚余患之謀奪其權愛憤怒余以十月朔夜祭東廟愛使小黃門賈周等就弒而祕之唯羽林郎中劉尼人知之勸愛立皇孫濬愛驚曰君大癡人皇孫若立豈忘正平時事乎景穆太子之死在真君十二年是年六月改元正平尼恐愛為變密告殿中尚書源賀賀時與尼俱典兵宿衛乃與書陸麗俟之子謀曰宗愛既立南安還復殺之今又不立皇孫將不利于社稷遂定謀共立濬賀與尚書長孫渴侯嚴兵守衛使尼麗迎濬于苑中尼馳還東廟大呼宗愛弒南安王大逆不道皇孫已登大位有詔宿衛之士皆還宫衆咸呼萬嵗遂執宗愛賈周等勒兵入奉皇孫即位殺愛周具五刑夷三族追尊景穆太子為皇帝廟號恭宗立乳母常氏為保太后魏復建佛圖聽民出家魏世祖晚年佛禁稍弛民間往往有私習者至是羣臣多請復之乃詔州郡縣各聽建佛圖一區民欲為沙門者聽出家大州五十人小州四十人于是向之所毁率皆修復魏主親為沙門下髮魏以周忸為太尉陸麗為司徒杜元寶魏郡鄴人明元密皇后從弟遺之子為司空忸尋坐事賜死麗以迎立之功受心膂之寄朝臣無出其右者賜爵平原王麗辭曰陛下國家之正統當承基緒效順奉迎臣子常職不敢慆天之功以干大賞魏主不許麗曰臣父奉事先朝忠勤著效今年逼桑榆願以臣爵授之魏主曰朕豈不能使卿父子為二王耶乃進其父建業公賜爵為東平王班賜羣臣謂源賀曰卿任意取之賀辭曰南北未賔府庫不可虛固與之乃取戎馬一匹已而忸坐事死明年元寶亦以謀反誄時魏法深峻賀奏謀反之家男子十三以下本不預謀者宜免死沒官從之魏用元始厯初魏入中原用景初厯楊偉所造世祖克沮渠氏得趙􅜫音斐元始厯時人以為密是嵗始行之癸宋元嘉三十年已魏興安二年春正月宋以始興王濬為荆州刺史初濬以南徐刺史鎮京口求為荆州宋主許之濬還京口治行而巫蠱事覺宋主怒未解故濬久留京口既除荆州乃聽入朝二月宋太子劭弒其君義隆及其左衛率袁淑僕射徐湛之尚書江湛而自立以何尚之為司空宋主欲廢太子劭賜濬死先與王僧綽謀之使尋漢魏典故南平王鑠妃江湛之妹隨王誕妃徐湛之之女湛勸立鑠湛之欲立誕僧綽曰建立之事仰由聖懷臣謂唯宜速斷不可稽緩當斷不斷反受其亂願以義割恩略小不忍不爾便應坦懷如初無煩疑論事機雖密易至宣廣不可使難生慮表取笑千載宋主曰卿可謂能斷大事然此事至重不可不殷勤三思且彭城始亡人將謂我無復慈愛之道僧綽曰臣恐千載之後言陛下唯能裁弟不能裁兒宋主默然議久不决與湛之屏人語或連日纍夕常使湛之自秉燭繞壁慮有竊聽者既而以其謀告潘淑妃妃以告濬濬馳報劭劭乃謀為逆詐為詔豫加部勒云有所討夜呼前中庶子蕭斌左衛率袁淑中舍人殷仲素入宫流涕曰主上信讒將見罪廢內省無過不能受枉明旦當行大事望相與戮力因起遍拜之衆驚愕莫能對淑斌皆曰自古無此願加善思劭怒變色斌懼曰當竭身奉令淑叱之曰卿便謂殿下真有是邪殿下幼嘗患風今疾動耳劭愈怒因眄淑曰事當克否淑曰居不疑之地何患不克但既克之後不為天地所容大禍亦旋至耳假有此謀猶將可息左右引淑出日此何事而云可罷乎淑還省繞牀行至四更乃寢汚明日宫門未開劭以朱衣加戎服上乘畫輪車與蕭斌同載呼袁淑甚急淑眠不起劭停車催之淑徐至劭使登車辭不上乃殺之門開而入舊制東宫隊不得入城劭以僞詔示門衛曰受敕有所收討令後隊速來張超之等馳入齊閣拔刃徑上合殿其夜宋主與徐湛之屏人語至旦燭猶未滅見超之入舉几捍之五指皆落遂弒之湛之驚起兵入殺之江湛聞譟聲歎曰不用王僧綽言以至于此劭遣兵殺之左細仗主卜天與不暇被甲執刃持弓疾呼左右出戰射劭幾中劭黨擊之斷臂而死隊將張泓之朱道欽陳滿俱戰死劭使人殺潘淑妃及太祖親信數十人在西州府聞臺內喧噪不知事之濟否騷耰不知所為而劭馳召濬屛人問狀即戎服乘馬而去入見劭劭曰潘淑妃遂為亂兵所害濬曰此是下情由來所願興卜天與吳餘杭人劭詐以詔召大將軍義恭尚書令何尚之入拘于內並召百官至者才數十人劭遽即位下詔曰徐湛之江湛弒逆無道吾勒兵入殿已無所及今罪人斯得可大赦改元太初即稱疾還永福省不敢臨喪以白刃自守以蕭斌為僕射何尚之為司空劭不知王僧綽之謀以為吏部尚書時武陵王駿方討西陽蠻屯五洲沈慶之自巴水來咨受軍略典籤董元嗣自建康至五洲具言大子弒逆沈慶之密謂腹心曰蕭斌婦人其餘將帥皆易與耳東宫同惡不過三十人此外屈逼必不為用今附順討逆不憂不濟也西陽宋郡今湖北黃州府是五洲在黃州府蘄水縣大江中巴水今日巴河源出黃州府羅田縣入江宋劭殺其吏部尚書王僧綽劭料檢文帝巾箱及江湛家書疏得王僧綽所啓前代故事即所上廢太子諸王典故乃收殺之僧綽弟僧䖍為司徒屬所親咸勸之逃僧䖍泣曰吾兄奉國以忠貞撫我以慈愛今日之事若不見及耳若得同歸九泉猶羽化也劭因誣北第諸王侯云與僧綽謀反殺之故北第諸侯王列第于臺城北云夏四月宋江州刺史武陵王駿舉兵討劭宋人立駿是為孝武帝五月劭及弟濬皆伏誅劭密與沈慶之手書令弒武陵王駿慶之求見駿駿懼辭以疾慶之突入以劭書示駿駿泣求入與母訣慶之曰下官受先帝厚恩今日之事唯力是視殿下何見疑之深駿起再拜曰國家安危皆在將軍慶之即命內外勒兵旬日之間內外整辦人以為神兵駿以慶之領府司馬栁元景宗慤朱修之皆為參佐顔竣領録事總內外以劉延孫道産之子為長史行留府事荆州刺史南譙王義宣雍州刺史臧質同舉兵以應駿駿至尋陽命顔竣移檄四方州郡響應劭自謂素習武事及聞四方兵起始憂懼戒嚴四月栁元景統薛安都等十二軍發湓口駿發尋陽沈慶之總中軍以從檄至建康劭以示太常顔延之曰彼誰筆也延之曰竣之筆也劭曰何至于是延之曰竣尚不顧老臣安能顧陛下劭怒稍解劭疑舊臣不為己用乃厚撫魯秀王羅漢以軍事委之以蕭斌為謀主殷冲掌文符蕭斌勸劭勒水軍自上决戰不爾則保據梁山江夏王義恭以南軍倉猝船舫陋小不利水戰勸劭養鋭待期劭善之斌厲色曰南中郎二十年少能建如此大事豈復可量三方同惡勢據上流沈慶之甚練軍事元景宗慤屢嘗立功形勢如此實非小敵唯宜及人情未離尚可决力一戰端坐臺城何由得久劭不聼或勸劭保石頭城劭曰昔人所以固石頭城者俟諸侯勤王耳我若守此誰當見救唯應力戰決之不然不克梁山即天門山注見前太尉司馬龎秀之河南人自石頭先衆南奔人情由是大震駿軍于鵲頭山名在江南池州府銅陵縣北元和志即春秋鵲岸沿流有鵲尾洲六朝屯兵處宣城太守王僧逹𢎞之孫自候道南奔駿即以為長史駿初發尋陽沈慶之謂人曰王僧逹必來赴義人問其故慶之曰吾見在先帝前議論開張也執意明决以此言之其至必栁元景以舟艦不堅憚于水戰乃倍道兼行至江寧步上使薛安都帥鐵騎耀兵于淮上秦淮水之上移書朝士為陳逆順降者相屬駿自發尋陽有疾不能見將佐唯顔竣出入卧內擁駿于膝親視起居疾屢危篤不任咨稟竣皆専决軍政之外間以文教書檄應接遐邇昏曉臨哭若出一人如是纍旬軍中皆不知駿之危疾也元景潜至新亭依山為壘劭使蕭斌等分統水陸精兵萬人攻新亭壘劭自登朱雀門督戰元景令軍中銜枚疾戰一聼鼓聲劭將士懷劭重賞皆殊死戰元景水陸受敵意氣彌彊麾下勇士悉遣出鬬劭兵垂克魯秀擊退鼓劭衆遽止元景開壘鼓譟以乘之劭衆大潰劭僅以身免魯秀南奔駿至江寧江夏王義恭單騎南奔上表勸進駿遂即位于新亭改諡太祖曰文廟號太祖劭初葬太祖諡曰景廟號中宗尊母路氏為皇太后立妃王氏為皇后封拜義恭以下有差劭緣淮樹柵自守男丁既盡召婦女供役魯秀等募勇士攻大航克之王羅漢即放仗降城中沸亂文武將吏爭踰出降蕭斌令所統皆解甲自石頭戴白幡來降詔斬于軍門諸軍遂克臺城張超之走至合殿御牀之所為軍士所殺刳腸割心諸將皆臠其肉生噉之劭入武庫井中隊副高禽執之臧質見之慟哭劭曰天地所不覆載丈人何為見哭質縳劭于馬上防送軍門時不見傳國璽問劭曰在嚴道育處道育匿于劭所就取得之斬劭及其四子于牙下濬帥左右南走江夏王義恭斬之及其三子劭濬父子首並梟于大航暴尸于市汙瀦劭所居齊嚴道育王鸚鵡並都街鞭殺焚尸揚灰于江殷冲尹𢎞王羅漢及沈璞皆伏誅璞守于湖坐不迎義師誅贈袁淑為太尉諡忠憲徐湛之為司空諡忠烈江湛為開府儀同三司諡忠簡王僧綽為金紫光祿大夫諡簡侯卜天與益州刺史諡壯侯與淑等四家長給廪祿宋復以何尚之為尚書令尚之自劭敗後左右皆散自洗通作灑黃閣舊制三公聼事置黃自洗躬親灑掃也宋主以尚之及其子偃素有令譽故特免之復以尚之為尚書令偃為大司馬長史任遇無改秋七月辛酉朔日食宋主詔求直言省細作並尚方雕文塗飾貴戚競利悉皆禁絶中軍録事參軍周朗字義利汝南安成人上疏陳述得失略曰毒之在體必割其緩處今歷下泗間空守孤城徒費財役使虜但發輕騎三千更互出入于賊不勞而邊已困不至二年卒散民盡可蹻足而待也今人知不以羊追狼蟹捕鼠而令重車弱卒與肥馬悍虜相逐其不能濟固宜矣又三年之喪天下之逹喪漢氏節其臣則可矣薄其子則亂也今陛下以大孝始基宜返斯謬又舉天下以奉一君何患不給一體炫金不及百兩一嵗美衣不過數襲而必收寶連櫝集服纍目豈常視身未時親是櫝帶寶笥著衣也何縻蠹之劇惑鄙之甚耶且細作始并以為儉節而市造華怪即傳于民如此則遷也非罷也凡厥庶民制度日侈見車馬不辨貴賤視冠服不知尊卑尚方今造一物小民明已䁹晚宫中朝制一衣庶家晚已裁學侈麗之源實先宫閫又設官者宜官稱事立人稱官置王侯識未堪務不應强仕且帝子未官人誰謂賤但宜詳置賓友茂擇正人亦何必列長史參軍别駕從事然後為貴哉又俗好以毁沉人不知察其所以致毁以譽進人不知測其所以致譽毁徒皆鄙則遭毁者宜擢譽黨悉庸則得譽者宜退如此則毁譽不妄善惡分矣凡無世不有言事無時不有下令然升平不至昏亂相繼何哉設令之本非實故也書奏忤㫖自解去職時多變易太祖之制郡縣以三周為滿宋政于是乎衰宋主殺其弟南平王鑠鑠素負才能常輕宋主宋主潛使人毒之武昌王渾亦宋主弟也嘗與左右檄文自號楚王改元永光以為戲笑長史封上之廢為庶人逼令自殺時年十七渾字休深文帝第十子甲宋世祖孝武帝駿孝午建元年魏興光元年春正月宋立子業為太子將置東宫省率更令餘各減舊員之半二月宋江州刺史臧質以南郡王義宣舉兵反夏宋主遣兵討質誅之初江州刺史臧質自謂人才足為一世英雄太子劭之亂潜有異圗以荆州刺史南郡王義宣庸暗易制欲外相推奉因而覆之劭既誅義宣與質功皆第一由是驕恣事多專行宋主方自攬威權而質以少主遇之政刑慶賞一不咨禀宋主淫義宣諸女義宣恨怒質乃遣密信說義宣義宣以豫州刺史魯爽有勇力素與相結至是密使人報之及兖州刺史徐遺寶期以今秋舉兵使者至夀陽爽方飲醉失義宣指即日舉兵竊造法服登壇遺寶亦勒兵向彭城義宣聞爽已反狼狽舉兵與質俱表欲誅君側之惡爽送所造輿服詣江詣江陵使征北府户曹板義宣等文曰丞相劉今補天子名義宣車騎臧今補丞相名質皆板到奉行義宣駭愕召司州刺史魯秀欲使為後繼秀見羲宣出拊膺曰吾兄誤我乃與癡人作賊今年敗矣義宣兼荆江兗豫四州之力威震逺近宋主欲奉乘輿法物迎之竟陵王誕固執不可曰奈何持此座與人乃以栁元景王元謨統諸將討之進據梁山洲三月義宣移檄州郡雍州刺史朱修之僞許之而陳誠于宋主義宣帥衆十萬發江津以子慆與竺超民留鎮江陵義宣至尋陽以質為前鋒爽亦引兵趨厯陽與質水陸俱下爽旋為沈慶之所殺徐遺寶亦走死義宣至鵲頭慶之送爽首示之爽纍世將家驍猛善戰號萬人敵義宣與質由是駭懼太傅義恭與義宣書曰臧質少無美行弟所具悉今藉西楚之彊力圖濟其私凶謀若果恐非池中物也義宣由此疑之宋主使元景進屯姑孰質遣將攻陷梁山西壘王元謨使告急于元景欲退還姑孰元景乃留羸弱自守悉遣精兵助元謨多張旗幟梁山望之如數萬人皆以為建康兵悉至衆心乃安質請自攻東城義宣乃遣劉諶之與質俱進頓兵西岸元謨督諸軍大戰薛安都帥突騎衝陳陷之斬諶之質等大敗義宣兵潰單舸迸走閉户而泣質不知所為亦走其衆皆降散質逃于南湖在湖北武昌府武昌縣南一名五丈湖輿地紀勝臧質逃入南湖以荷自蔽即此追斬其首送建康子孫皆棄市魯秀赴水死就取其首義宣走向江陵衆散且盡尋為朱修之所殺並誅其子十六人及同黨竺超民等宋置東揚州郢州初晉氏南遷以揚州為京畿榖帛所資出焉以荆江為重鎮甲兵所聚在焉三州户口居江南之半至是宋主惡其彊大乃分揚州浙東五郡置東揚州治㑹稽分荆湘江豫州之八郡置郢州治江夏宋江夏郡治夏口城在今武昌府西黃鵠山上今武昌府治之江夏縣隋所置罷南蠻校尉治方地在今荆州府江陵縣東水經注南蠻府在方城東屯營相接是也遷其營于建康荆揚由此虛耗既而宋主以垣護之言移青冀二州並鎮厯城又以王元謨言并雍州僑郡為一郡青冀宋青州本治東陽冀州治厯城後移青州并治厯城東陽注見前雍州晉太元中置雍州于襄陽宋齊梁皆因之西魏改曰襄州今襄陽府是僑郡晉僑置京兆扶風等郡皆寄治襄陽宋省録尚書事官宋主惡宗室彊盛不欲權在臣下太傅義恭知其指故請省之秋七月丙申朔日食乙宋孝建二年未魏太安元年春宋鎮北大將軍沈慶之罷就第慶之請老表數十上詔聽以始興公就第頃之宋主復欲用慶之使何尚之往起之慶之笑曰沈公不效何公往而復返尚之慙而止冬十月宋裁損王侯制度宋主欲削弱王侯江夏王義恭等奏裁損王侯車服器用樂舞制度凡九事宋主因諷有司奏增廣為二十四條聽事不得南向坐施帳劍不得為鹿盧形晉灼曰古長劍首以玉作井鹿盧形內史相及封內官長止稱下官不得稱臣罷官則不復追敬詔可丙宋孝建三年申魏太安二年春正月魏立貴人馮氏為后后父朗故燕主𢎞之庶子也魏世祖攻燕朗與其兄崇叛降魏為秦雍二州刺史遼西郡公崇封遼西王已而坐事誅后沒入宫至是以貴人立為后二月魏主立其子𢎞為太子是時𢎞生三年矣先使其母李貴人條記所付托兄弟然後依故事賜死宋以宗慤為豫州刺史故事府州部內論事皆籖前直叙所論之事置典籖以主之宋諸王子為方鎮者多幼時主皆以親近左右領典籖至是雖長王臨藩素族出鎮典籖皆出納教命刺史不得専其職及慤為豫州吳喜臨安人為典籖每多違執慤大怒曰宗慤年將六十為國竭命止得一州如斗大不能復與典籖共臨之喜稽顙流血乃止秋七月宋以西陽王子尚字宗思宋主第二子後改封豫章王為揚州刺史太傅義恭以宋主之子子尚有寵將避之乃辭揚州而宋主以子尚為刺史時熒惑守南斗宋主廢西州舊館使子尚移治東城以厭之别駕沈懷文曰天道示變宜應之以德雖空西州恐無益也不從沈懷文字思明武康人冬十一月魏以源賀為冀州刺史賀上言今北虜遊魂南寇負險疆場之間猶須防戍自非大逆赤手殺人其坐贓盜及過誤應入死者皆可原宥謫死守邊則已斷之體受更生之恩徭役之家䝉休息之惠魏主從之久之謂羣臣曰吾用賀言一嵗所活不少增兵亦多卿等人人如賀朕何憂哉㑹人告賀謀反魏主曰賀竭誠事國朕為卿等保之訊驗果誣乃誅告者因謂左右曰以賀忠誠猶不免誣謗不及賀者可無慎哉十二月宋金紫光祿大夫顔延之卒延之子竣貴重凡所資供延之一無所受布衣茅屋蕭然如故常乘羸牛笨車逢竣鹵簿即屏住道側常謂竣曰吾平生不喜見要人今不幸見汝竣起宅延之謂曰善為之無令後人笑汝拙也延之嘗早詣竣見賓客盈門竣尚未起延之怒曰汝出糞土之中升雲霞之上遽驕傲如此其能久乎竣丁父夏裁踰月起為右將軍丹陽尹如故竣固辭表十上不許遣中書舍人抱竣登車載之郡舍賜以布衣一襲絮以綵綸遣主衣就衣諸體納綸似絮而細絮以綵綸以綵色之綸于布衣中也主衣尚衣奉御之官丁宋大明元年酉魏太安三年春正月魏侵宋入兗州魏人侵宋敗東平太守劉胡南陽人宋主遣薛安都沈法系禦之並受徐州刺史申坦節度比至魏兵已去先是羣盜聚任城注見前荆榛中纍世為患謂之任榛坦請回軍討之無功而還安都法系坐白衣領職坦當誅羣臣為請莫能得沈慶之抱坦哭于市曰汝無罪而死我行當就汝矣有司以聞乃免之秋八月宋以竟陵王誕為南兗州刺史劉延孫為南徐州刺史初髙祖遺詔以京口要地非宗室近親不得居之延孫之先雖與髙祖同源而從來不序昭穆宋主既命延孫鎮京口仍詔與合族宋主閨門無禮不辨親疏尊卑流聞民間無所不至誕寬而有禮誅邵及義宣皆有大功人心竊向之誕多聚才力之士蓄精甲利兵宋主畏忌之不欲誕居中使出鎮京口猶嫌其逼更徙于廣陵以延孫腹心之臣故使鎮京口以防之戊宋大明二年戌魏太安四年春正月魏設酒禁置候官魏主以士民多因酒致鬭故設酒禁釀酤飲者皆斬吉凶之㑹聽開禁有程日增置候官伺察諸曹及州鎮或微服雜亂于府寺間以求百官過失有司窮治訊掠取服百官贓滿二丈皆斬又增律七十九章二月魏以髙允為中書令允好切諫事有不便輒求見魏主屏左右待之或自朝至暮或連日不出語或痛切魏主不忍聞命左右扶出然終善遇之時有上事為激訐者魏主謂羣臣曰君父一也父有過子何不于衆中諌之而于私室屏處諫者豈非不欲其父之惡彰于外邪至于事君何獨不然君有得失不能面陳而上表顯諫欲以彰君之短明已之直此豈忠臣所為乎如髙允者乃忠臣也朕有過未嘗不面言朕聞其過而天下不知可不謂忠乎允所與同徴者游雅等皆至大官封侯而允為郎二十七年不徙官魏主謂羣臣曰汝等雖執弓刀在朕左右末嘗有一言規正唯伺朕喜悅祈官乞爵今皆無功而至王公允執筆佐國家數十年為益不少不過為郎汝等不自愧乎乃拜允中書令時魏百官無祿允常使諸子樵採自給司徒陸麗曰髙允雖蒙寵待而家貧妻子不立魏主曰公何不先言今見朕用之乃言其貧乎即日至允第唯草屋粟數間布被緼袍厨中鹽菜而已魏主嘆息賜以帛拜其長子悅為長樂太守允固辭不許魏主重允常呼為令公而不名游雅常曰前史稱卓子康劉文饒之為人褊心者或不之信余與髙子游處四十年未嘗見其喜愠之色乃知古人為不誣耳髙子內文明而外柔順言呐呐不能出口昔崔司徒嘗謂余云髙生豐才博學一代佳士所乏者矯矯風節耳余亦以為然及司徒得罪詔㫖臨責聲嘶服栗髙子獨敷陳事理辭義清辨人主為之動容非所謂矯矯者乎宗愛用事威振四海王公以下趨庭望拜髙子獨升階長揖此非所謂風節者乎夫人固未易知吾既失之于心崔又漏之于外此乃管仲所以致慟于鮑叔也夏六月宋以謝莊字希逸密之子顧覬之字偉仁吳縣人為吏部尚書宋主不欲權在臣下分吏部尚書置二人以謝莊顧覬之為之初晉世散騎常侍選望甚重其後職任間散用人漸輕宋主欲重其選乃用當世名士孔顗王彧字景文球從子為之侍中蔡興宗廓之子曰選曹要重常侍間淡改之以名而不以實雖為重輕人心豈可變耶後竟如其言秋八月宋殺其中書令王僧達僧達幼聰警能文而跌蕩不拘宋主初立擢為僕射自負才地一二年間即望宰相既而下遷再被彈削僧達恥怨所上表奏辭㫖抑揚又好非議朝政宋主已積憤怒路太后兄子嘗詣僧達升其榻僧達令舁羊茹反對舉也棄之太后兄樂之常為王氏門下騶故僧違麾其子太后大怒固邀宋主令必殺僧達㑹南彭城晋南渡後僑立南彭城郡于晋陵界民髙闍與沙門曇標等謀反伏誅高闍曇標與殿中將軍苗允等謀作亂立闍為帝事覺伏誅宋主因誣僧達與闍通謀賜死魏侵宋清口此汶水合濟之口水經注濟水徑安民亭西汶水東北來注之所謂清口也安民亭在泰安府東平州西南宋青冀刺史顔師伯字長深竣族兄連戰破之宋積射將軍殷孝祖陳郡長平人羡之曽孫築兩城于清水之東魏鎮西將軍封敕文代人攻之清口戌主傅乾愛拒破之宋主遣虎賁主龎孟蚪救清口顔師伯遣參車茍思達助之敗魏兵于沙溝亦曰中川水水經注中川水徑盧縣故城東北入濟俗謂之沙溝水徑盧縣故城在濟南府長清縣宋主又遣司空參軍卜天生天與之弟等㑹傅乾愛共擊魏兵屢破之斬魏將數人魏征西將軍皮豹子將兵三萬寇青州師伯與戰將軍焦度南安氏人刺豹子墜馬幾獲之宋以戴法興會稽山隂人戴明寶南東海丹徒人巢尚之魯郡人為中書舍人初宋主在江州戴法興戴明寶蔡間為典籖及即位皆以為南臺御史臺謂之南臺侍御史兼中書通事舍人是嵗並以初舉兵預密謀賜爵縣男間己卒追賜之時宋主親覽朝政不任大臣而腹心耳目不得無所委寄法興頗知古今素見親待巢尚之人士之末涉獵文史亦為中書通事舍人凡選授遷徙誅賞大處分宋主皆與法興尚之參懷胡三省注宋齊之間凡參决機務皆謂之參懷內外雜事多委明寶三人權重一時而法興明寶大納財賄門外成市家産並纍千金顧覬之獨不肯降意于法興等蔡興宗與覬之善嫌其風節太峻覬之曰卒毗有言孫劉不過使吾不為三公耳覬之常以為人禀命有定分非智力所移唯應恭已守道而暗者不逹妄意僥幸徒虧雅道無關得喪乃以其意命弟子原著定命論以釋之孫劉謂魏孫資劉放具見前已宋大明三年亥魏太安五年夏四月宋竟陵王誕反廣陵宋主遣兵討之誕伏誅竟陵王誕知宋主意忌之亦潛為之備因魏人入寇修城浚隍聚糧治仗參軍江智淵知誕有異志請假先還建康智淵少有操行沈懷文每稱之曰人所應有盡有人所應無盡無者其惟江智淵乎江智淵南史作智深湛從弟既而事覺宋主令有司奏請收付廷尉詔貶爵為侯遣之國使垣朗戴明寶襲之明寶使誕典籖蔣成為內應知之斬成擊殺朗明寶逃還詔沈慶之將兵討誕慶之至歐陽誕遣人齎書說慶之餉以玉環刀遣還之上歐陽戍名在揚州府儀徵縣東水經注吳城䢴溝承歐陽引江入埭即此誕閉門自守分遣書檄邀結逺近時山陽內史梁曠家在廣陵誕執其妻子遣使邀曠曠斬使拒之誕怒滅其家誕奉表投之城外數宋主罪惡曰陛下宫帷之醜豈可三緘宋主大怒凡誕左右腹心同籍期親在建康者誅死以千數慮誕奔魏使慶之斷其走路誕棄城北走慶之遣兵追之誕衆皆不欲去誕乃復還築壇歃血以誓衆以劉琨之為參軍琨之遵考之子也辭曰忠孝不得並琨之老父在不敢承命誕囚之十餘日終不受乃殺之慶之進營逼廣陵城誕于城上授函表請慶之為送慶之曰我受詔討賊不得為汝送表汝必欲歸死朝廷自應開門遣使吾為汝護送時值久雨慶之不得攻城宋主令有司奏免慶之官詔勿問以激之慶之帥衆攻城克之誕走追及斬之母妻皆自殺誕初閉城參軍山隂賀弼固諌誕怒抽刀向之及誕兵屢敗將佐多踰城出降或勸弼宜早出弼曰公舉兵向朝廷此事既不可從荷公厚恩又義無違背惟有以死明心耳乃飲藥自殺參軍何康之等謀開門納官軍不果斬關出降誕為髙樓置康之母于其上暴露之不與食母呼康之數日而死濮陽范義為誕左司馬或勸其行義曰子不可以棄母吏不可以叛君必若康之而活吾弗為也宋主聞廣陵平出宣陽門敕左右皆呼萬嵗侍中蔡興宗陪輦宋主顧曰卿何獨不呼興宗正色曰陛下今日正應涕泣行誅豈得皆稱萬嵗宋主不悅詔貶誕姓留氏廣陵城中士民無大小悉命殺之慶之請自五尺以下全之女子為軍賞猶殺三千餘口擢梁曠為後將軍贈劉琨之給事黃門侍郎蔡興宗奉㫖慰勞廣陵興宗與范義素善收斂其尸送歸豫章宋主謂曰卿何敢故觸王憲對曰陛下自殺賊臣自葬故交何不可之有宋王有慙色宋殺其東揚州刺史顔竣先是宋主即吉之後奢淫自恣多所興造竣以藩朝舊臣數懇切諌諍宋主浸不悅竣自謂恩舊莫比而所陳多不納疑宋主欲疏之求外出以覘其意宋主即以為東揚州刺史竣始大懼已而竣遭母憂送喪還都宋主恩待猶厚㑹王僧達得罪疑竣譖之陳竣前後怨望誹謗之語竣坐免官竣懼上啓請命宋主益怒及是㑹誕反遂誣竣通謀賜死妻子徙交州復沉其男口于江秋九月宋徙郊壇造五路天子所乘法車有玉金象革木五路初晋人築南郊壇于已位至是尚書右丞徐爰以為非禮宋主詔徙于牛頭山在上元縣南有兩峯相對亦曰天闕山西直宫城之午位又造五路依金根車沈約曰秦閲三代之車獨取殷制古曰桑根車秦曰金根車加羽葆蓋明年宋主祀郊廟始乘玉路庚宋大明四年子魏和平元年春正月宋主耕藉田三月后親蠶西郊夏六月魏伐吐谷渾吐谷渾王拾寅兩受宋魏爵命居止出入擬于王者魏人忿之遣陽平王新成景穆帝之子等督諸軍分道出擊俘獲甚衆冬十月宋殺其盧陵內史周朗朗言事切直宋主銜之使有司奏朗居母喪不如禮傳送寧州注見前于道殺之朗之行也侍中蔡興宗方在直請與朗别坐白衣領職宋以顔師伯為侍中師伯以諂佞被親任羣臣莫及多納貨賄家纍千金宋主嘗與之摴蒲宋主擲得雉自謂必勝師伯次擲得盧宋主失色師伯遽斂子曰幾作盧是日師伯一輸百萬卒宋大明五年丑魏和平二年春正月雪宋以正旦朝賀雪落太宰義恭衣有六出義恭奏以為瑞宋主悅義恭以宋王猜暴懼不自容每卑辭遜色曲意祗奉由是終宋主之世得免于禍夏宋立明堂作大殿于丙巳之地制如太廟唯十有二間為異宋雍州刺史海陵王休茂文帝第十四子反襄陽為其下所殺雍州刺史海陵王休茂年十七司馬庾深之新野人行府事休茂欲専處決深之及主帥每禁之左右張伯超有寵多罪惡主帥屢責之伯超說休茂殺行事及主帥而舉兵休茂從之徴集兵衆建牙馳檄參軍尹元度起兵攻休茂生擒斬之母妻皆自殺同黨伏誅宋主自即位以來抑黜諸弟既克廣陵欲更峻其科沈懷文曰漢明不使其子比光武之子前史以為美談陛下既明管蔡之誅願崇唐衛之寄及襄陽平太宰義恭希㫖復請裁抑諸王不使任邉州及悉輸甲兵禁絶賔客懷文固諫乃止秋九月甲寅朔日食宋司空沈慶之罷就第先是慶之以克廣陵功拜司空領南兗州刺史至是慶之固讓司空于栁元景詔許之慶之目不知書家素富産業纍萬金一夕徙居婁湖在江寧縣東南元和志湖張昭所開昭封婁侯故名以宅輸官非朝賀不出門冬十月宋以新安王子鸞字孝羽宋主第八子為南徐州刺史子鸞母殷淑儀義宣之女義宣敗宋主密取之假姓殷氏或曰殷琰家人入義宣家後沒入宫寵傾後宫子鸞愛冠諸子凡為上所眄遇者莫不入其府及為南徐州割吳郡以屬之初巴陵王休若為北徐州刺史以張岱為參軍行府州國事後厯臨海豫章晋安三府與典籖主帥共事事舉而情不相失或問岱何由致此岱曰古人言一心可事百君吾為政端平待物以禮悔吝之事無由而及明暗長短更是才用之多少耳及是子鸞復以岱為别駕行事張岱字景山永之弟十二月宋禁士族雜婚胡三省注謂與工商雜户為婚也詔士族雜婚者皆補將吏士族多避役逃亡乃嚴為之制捕得即斬之往往奔竄湖山為盜賊沈懷文諌不聽壬宋大明六年寅魏和平三年春正月宋策孝秀胡三省注孝廉秀才也于中堂揚州秀才顧法對策曰源清則流潔神聖則形全躬化易于上風體訓速于草偃宋主惡其諒也投策于地三月宋殺其廣陵太守沈懷文懷文素與顔竣周朗善數以直諌忤㫖宋主謂曰竣若知我殺之亦當不敢如此懷文默然宋主嘗出射雉風雨驟至懷文與王彧江智淵約相與諌懷文曰風雨如此非聖躬所宜冒彧曰懷文所啓宜從智淵未及言宋主注弩作色曰卿欲效顔竣耶宋主每燕集在坐者皆令沉醉嘲謔無度懷文素不飲又不好戲嘲宋主謂故欲異已出為廣陵太守至是朝正事畢當還以女病求申期為有司所紏免官禁錮十年懷文賣宅欲還東宋主大怒賜死夏四月宋淑儀殷氏卒宋主以淑儀之卒痛悼不已精神罔罔頗廢政事葬于龍山在江寧縣西南寰宇記嚴山宋孝武改曰龍山鑿岡通道民不堪役死亡甚衆自江南埋葬之盛未之有也又為之别立廟追贈貴妃諡曰宣謝莊作哀策文奏之宋主卧覽流涕起坐曰不謂當今復有此才都下傳寫紙墨為貴江智淵先議妃諡曰懷宋主以為不盡美銜之他日至妃墓指石柱謂智淵曰此上不容有懷字智淵惶懼竟以憂卒宋主嘗與羣臣數至貴妃墓謂劉德願曰卿哭貴妃悲者當厚賞德願劈踊號慟涕泗交流宋主甚悅即以德願為豫州刺史劉德願懷慎之子秋九月宋制沙門致敬人主初晋庾冰議使沙門敬王者不果行至是有司奏曰浮圖為教反經蔽道屈膝四輩王幼學曰釋書所謂四部大衆也謂比邱比邱尼優婆塞優婆夷而簡禮二親稽顙耆臘徐昭文曰謂髙年之僧僧家不序齒而序臘以捨俗為僧之年為始如云僧臘若干謂為僧若干年也而直體萬乘臣等參議以為沙門接見比當盡䖍從之宋南徐州從事史祖冲之字文逺范陽道人請更造新厯不報冲之以何承天所製元嘉厯疏舛猶多乃更造新厯上表言之以為舊法冬至日有定處未盈百載輒差二度今令冬至日度嵗嵗微差將來久用無煩屢改又子為辰首位在正北虛為北方列宿之中今厯上元日度發自虛一又日辰之號甲子為先今厯上元嵗在甲子又承天法日月五星各自有元今法交㑹遲疾悉以上元嵗首為始胡三省注今厯今法皆冲之更造者也厯家分上元中元下元甲子各六十年凡一百八十年而下元甲子終又復于上元甲子宋主令善厯者難之不能屈己而不果施行癸宋大明七年卯魏和平四年夏宋以蔡興宗袁粲字景倩淑之兄子為吏部尚書宋主好狎侮羣臣自太宰義恭以下不免穢辱常呼金紫光祿大夫王元謨為老傖僕射劉秀之為老慳顔師伯為齴魚蹇反露齒也其餘短長肥瘦皆有稱目又寵一崑崙奴胡三省注言其狀似崑崙國人也崑崙國在林邑南令以杖擊羣臣惟憚蔡興宗方嚴不敢侵媟儀曹郎王耽之曰蔡豫章興宗父廓嘗為豫章太守昔在相府亦以方嚴不狎武帝宴私之日未嘗相召蔡尚書今日可謂能負荷矣冬十月魏遣散騎常侍游明根字志逺雅從祖弟如宋明根奉使三返宋主以其長者禮之有加甲宋大明八年辰魏和平五年夏五月宋主駿殂太子子業立是為前廢帝宋主末年尤貪財利刺史二千石罷還必限使獻奉又以蒱戲取之罄盡乃止終日酣飲嘗憑几昏睡或外有奏事即肅然整容無復酒態以故內外畏之至是殂諡曰孝武廟號世祖世祖機警勇决記問博洽文章華敏又善騎射而奢欲無度土木被錦繡賞賜傾府藏壞高祖所居隂室于其處起玉燭殿與羣臣觀之牀頭有土障壁上掛葛燈籠麻蠅拂侍中袁顗因盛稱高祖儉素之德世祖曰田舍翁得此已為過矣及是遂殂于殿袁頭字國章淑兄子遺詔太宰義恭加中書監栁元景領尚書令事無巨細悉關二公大事與始興公沈慶之參决若有軍旅悉委慶之尚書中事委僕射顔師伯外監所統委領軍王元謨太子即位年十六蔡興宗親奉璽綬太子受之傲慢無戚容興宗出告人曰昔魯昭不戚叔孫知其不終見左傳家國之禍其在此乎秋七月宋以蔡興宗為新昌宋郡治頓邱故城在今江南滁州太守王元謨為南徐州刺史太宰義恭素畏戴法興巢尚之等雖受遺輔政而引身避事由是政歸近習法興等専制朝權詔敕皆出其手興宗自以職管銓衡每至上朝輒為義恭陳登賢進士之意又針規得失博論朝政義恭聞之戰懼無答興宗每奏選事法興尚之等輒㸃定回換興宗于朝堂謂義恭師伯曰主上諒暗不親萬幾而選舉密事多被删改復非公筆亦不知是何天子意義恭法興皆惡之左遷新昌太守既而以其人望復留之建康法興等惡王元謨剛嚴以為南徐州刺史八月宋太后王氏殂太后疾篤使呼宋主子業子業曰病人間多鬼那可往太后怒謂侍者取刀來剖我腹那得生寧馨兒乙宋前廢帝子業景和元年太宗已明帝彧泰始元年魏和平六年夏五月魏主濬殂太子𢎞立是為獻文帝初世祖經營四方國頗虛耗重以內難朝野楚楚胡三省注楚楚酸痛之貌魏主嗣之與時消息靜以鎮之懷集中外民心復安及是殂諡曰文成廟號高宗太子𢎞即位時年十二魏車騎大將軍乙渾殺司徒陸麗乙渾専權矯詔殺尚書楊保年等于禁中使司衛監穆多侯召平原王陸麗于代郡多侯謂麗曰渾有無君之心今宫車宴駕王德望素重姦臣所忌宜少淹留以觀之朝廷安靜然後入未晚也麗曰安有聞君父之喪慮患而不赴者乎即馳赴平城渾所為多不法麗數爭之渾殺麗及穆多侯而自為太尉録尚書事既而渾乂自為丞相位居諸王上事無大小皆取决焉秋八月宋主殺其太宰江夏王義恭尚書令栁元景僕射顔師伯子業幼而狷暴及即位欲有所為戴法興輒抑制之不能平所幸閹人華願兒怨法興裁其賜與言于子業曰道路皆言法興為真天子官為贋猶言僞物也天子且官居深宫與人物不接法興與太宰顏栁共為一體內外畏服深恐此坐非復官有子業遂賜法興死初世祖多猜忌大臣重足屏息世祖殂義恭等相賀曰今日始免橫死矣及法興死諸大臣始復內不自安于是元景師伯密謀廢子業立義恭日夜聚謀而不能决元景以其謀告沈慶之慶之與義恭素不厚又恨師伯專斷朝事不與已參懷乃發其事子業遂自帥羽林兵殺義恭並其四子召元景以兵隨之元景知禍至入辭其母整朝服乘車應召弟叔仁帥左右欲拒命元景若禁之既出巷軍士大至元景下車受戮容色恬然並其子弟諸姪獲顏師伯於道殺之及其六子自是公卿以下皆被捶曵如奴𨽻矣初子業在東宫多過失世祖欲廢之而立新安王子鸞侍中袁為顗盛稱太子之美乃止子業由是德之既誅羣公以吏部尚書尚書左丞徐爰便辟善事人頗涉書傳自元嘉初入侍左右預參顧問大明之世委寄尤重時殿省舊人多見誅逐唯爰巧于將迎始終無忤子業每出常與沈慶之及姊山隂公主同輦爰亦預焉主尤淫恣嘗謂帝曰妾與陛下男女雖殊俱托體先帝陛下六宫萬數而妾唯駙馬一人事太不均子業乃為置面首左右三十人吏部郎禇淵貌美公主請以自侍子業許之淵侍公主十日備見逼迫以死自誓乃得免子業令太廟别畫祖考之像入廟指高祖像曰渠大英雄生擒數天子指太祖像曰渠亦不惡但末年不免兒斫去頭指世祖像曰渠大齄鼻如何不齄立召畫工令齄之面首面取其貌美首取其髮美齄壯加反鼻上麭也禇字彥回湛之之子九月宋主殺其弟新安王子鸞新安王子鸞有寵于世祖子業惡之遣使賜之死又殺其母弟南海王子師發殷淑儀墓又欲掘景寧陵即世祖陵在龍山太史以為不利于子業乃止宋義陽王昶字休道文帝第九子出奔魏昶為徐州刺史素為世祖所惡而民間每訛言昶反是嵗尤甚子業謂左右曰我即大位未嘗戒嚴使人邑邑㑹昶遣使上表求朝子業詰以反狀使懼逃歸子業因下詔討昶內外戒嚴自將兵渡江命沈慶之統諸軍昶聚兵移檄統內皆不受命昶知事不成棄母妻携愛妾奔魏昶頗涉學能屬文魏人重之使尚公主賜爵丹陽王宋以袁顗為雍州刺史蔡興宗為吏部尚書顗始為子業所寵任俄而失指待遇頓衰顗懼求出以為雍州刺史其舅蔡興宗謂曰襄陽星惡何可往顗曰白創交前不救流矢今惟願生出虎口耳時臨海王子頊為荆州刺史朝廷以興宗為子頊長史行府州事興宗辭不行顗曰朝廷形勢人所共見在內大臣朝不保夕舅今出為八州行事顗在襄沔地勝兵彊可以共立桓文之勳豈比受制凶狂臨不測之禍乎今得間不去後復求出豈可得耶興宗曰吾素門平進與主上甚疏未容有患宫省內外人不自保會應有變若內難得弭外釁未必可量汝欲在外求全我欲居中免禍各行其志不亦善乎烈臨海王子頊字孝孝武第七子顗狼狽上路猶慮見追行至尋陽喜曰今始免矣鄧琬字元琬豫章人為晉安王子勛字孝德孝武第三子長史顗與之欵狎過常顗與琬人地本殊見者知其有異志矣尋復以蔡興宗為吏部尚書冬十一月宋主殺其寧朔將軍何邁灊人澄之元孫邁尚子業姑新蔡長公主子業納公主于後宫謂之謝貴嬪詐言主薨殺宫婢送邁第殯葬邁素豪侈多養死士謀廢子業立晉安王子勛事泄見殺宋主殺其太尉沈慶之初沈慶之既發顔栁之謀遂自眤于子業數盡言規諌子業浸不悅慶之懼禍杜門不接賔客常遣左右范羡至蔡興宗所興宗使謂曰公閉門絶客避悠悠請托者耳興宗非有求于公者也何為見拒慶之使羡邀興宗興宗往說之曰主上比者所行人倫道盡今所忌憚唯在于公公威名素著天下所服今舉朝遑遑人懷危怖指麾之日誰不響應如猶豫不斷豈惟旦暮及禍四海重責將有所歸願公詳思其計慶之曰僕誠知憂危不復自保但盡忠奉國始終以之以俟天命耳加以老退私門兵力頓闕雖欲為之事亦無成興宗曰當今懷謀思奮者正求脫朝夕之死耳殿中將帥惟聼外間消息若一人唱首則俯仰可定聞車駕屢幸貴第酣醉淹留又聞屏左右獨入閣內此萬世一時不可失也慶之曰感君至言然此大事非僕所能行事至固當抱忠以沒耳及子業誅何邁量慶之必入諌先閉青溪諸橋以絶之慶之果往不得進子業乃使沈攸之字仲逹慶之從子賜藥與飲慶之不肯飲攸之以被掩殺之時年八十詐言病薨贈恤甚厚慶之子侍中文叔謂其弟文季曰我能死爾能報遂飲慶之之藥而死文季揮刀馳馬而去遂得免時王元謨數流涕諫子業以刑殺過差子業大怒元謨宿將有威名道路訛言云已見誅蔡興宗謂其典籤包法榮日領軍殊為憂懼法榮曰領軍比日殆不復食夜亦不眠恆言收已在門不保俄頃興宗曰領軍憂懼當為方略那得坐待禍至因使法榮勸元謨舉事元謨使謝曰此亦未易可行期當不泄君言耳將軍劉道隆專典禁兵興宗嘗與俱從夜出謂曰劉君比日思一間寫道隆解其意搯興宗手日蔡公勿多言窵沈文季字伯逹劉道隆懷慎弟子間謂思得清間傾寫所懷也宋主幽其諸父湘東王彧文帝第十一子即明帝等于殿內子業畏忌諸父恐其在外為患皆拘于殿內毆捶陵曵無復人理湘東王彧建安王休仁文帝第十二子山陽王休祐文帝第十三子年長尤惡之以彧肥謂之猪王謂休仁為殺王休祐為賊王東海王禕性尤劣謂之驢王以木槽盛食祼彧納泥水中使就槽食前後欲殺以十數休仁多智數每以談笑佞諛說之故得推遷少府劉曚妾孕臨月迎于後宫俟生男以為太子彧嘗忤㫖子業祼之縳其手足擔付大官曰今日屠猪休仁笑曰不若待皇太子生殺取肝肺子業乃釋之及矇妾生子名曰皇太子為之大赦八東海王褘字休秀文帝第子後改封盧陵王宋江州刺史晉安王子勛舉兵尋陽宋主子業以太祖世祖在兄弟數皆第三江州刺史晉安王子勛亦第三故惡之因前何邁之謀事見上使左右朱景雲送藥賜子勛死景雲至湓口停不進子勛典籖謝道邁聞之馳告長史鄧琬琬曰身南土寒士䝉先帝殊恩以愛子見託豈得惜門户百口期當以死報效幼主昏暴社稷危殆雖曰天子事猶獨夫今便指帥文武直造京邑與羣公卿士廢昏立明耳琬遂稱子勛教令所部戒嚴子勛戎服出聽事集僚佐使主帥潘欣之宣㫖諭之四座未對參軍陶亮首請效死前驅衆皆奉㫖乃以亮為咨議中兵總統軍事先是子業使荆州録送長史張悅暢之弟至湓口及是琬稱子勛命釋其桎梏迎以所乘車以為司馬旬日得五千人出頓大雷移檄遠近宋主殺南平王敬猷廬陵王敬先南安侯敬淵子業召諸妃主列于前彊左右使辱之南平王鑠妃江氏不從子業怒鞭妃一百殺其三子宋弒其君子業而立湘東王彧是為明帝先是民間訛言湘中出天子子業將南巡荆湘以厭之欲先誅湘東王彧然後發時三王久幽不知所為湘東王彧主衣阮佃夫會稽諸暨人及子業左右壽寂之風俗通夀姓吳王夀夢之後寂之吳興人王敬則臨淮射陽人等陰謀弒子業㑹巫覡言華林園竹林堂有鬼先是子業遊竹林堂使宫人祼而相逐一人不從命斬之夜夢在後堂有女子罵日悖虐不道明年不及熟矣子業于宫中求得一人似所夢者斬之義夢所殺者罵日我已訴上帝矣于是巫覡言堂中有鬼子業出華林園休仁休祐並從彧獨在祕書省不被召益憂懼初子業既殺諸公恐羣下謀已以直閣將軍宗越南陽涅陽人沈攸之等有勇力引為爪牙宿衛之士皆畏之及是以將巡荆湘越等並聼出外裝束子業悉屏侍衛與羣巫綵女捕鬼親自射之事畢將奏樂夀寂之抽刀前入子業見寂之至引弓射之不中綵女皆迸走子業亦走大呼寂寂者三寂之追而弒之宣令宿衛曰湘東王受太皇太后令除狂主今已平定休仁就祕書省見彧即稱臣引升御座召見諸大臣猶著烏帽休仁呼主衣以白帽代之凡事悉稱令書施行宣太皇太后令數子業罪惡命湘東王纂承皇極子業母弟豫章王子尚頑悖有兄風及會稽公主皆賜死休仁等始得出居外舍子業猶橫尸太醫閣口蔡興宗謂僕射王彧曰此雖凶悖要是天下之主宜使喪禮粗足若直如此四海必將乘入乃葬之秣陵論功行賞夀寂之等十四人封爵有差以東海王禕為中書監太尉晉安王子勛為車騎將軍開府儀同三司建安王休仁為司徒尚書令揚州刺史彧即位大赦子業時昏制謬封並皆刋削以劉道隆為中護軍道隆䁥于子業嘗無禮于建安太妃至是建安王休仁求解職宋主乃賜道隆死宗越等內不自安沈攸之以聞皆伏誅攸之復入直閣宋雍郢荆州㑹稽郡皆舉兵應尋陽鄧琬與陶亮等繕治器甲徴兵四方雍州刺史袁顗與參軍劉胡南陽涅陽人起兵奉表勸子勛即大位子勛傳檄建康稱孤志遵前典廢幽陟明而湘東王彧矯害明茂謂宋主賜豫章王死也篡竊大寶藐孤同氣猶有十三聖靈何辜而當乏饗于是郢州刺史安陵王子綏字寶孫孝武第四子荆州刺史臨海王子頊注見前㑹稽太守尋陽王子房字孝良孝武第六子皆舉兵以應子勛丙宋泰始二年魏顯祖午獻文帝𢎞天安元年春正月宋遣建安王休仁討江州晉安王子勛遂稱帝宋以建安王休仁都督征討諸軍事江州刺史王元謨副之以沈攸之為尋陽太守將兵屯虎檻洲名在太平府繁昌縣東北鄧琬詐稱受路太后璽書帥將佐上尊號于子勛子勛遂即位改元義嘉以琬及袁顗為僕射張悅為尚書徐州刺史薛安都冀州刺史崔道固青州刺史沈文秀義陽內史龎應蚪行會稽郡事孔覬吳郡太守顧琛吳興太守王曇生義興太守劉延熙晉陵大守袁標益州刺史蕭惠開相州行事何慧文廣州刺史袁曇逺梁州刺史栁元怙山陽太守程天祚皆附于子勛崔道固清河人沈文秀字仲逺慶之弟子顧琛字𢎞緯吳人簫惠䦕思話之子栁元怙元景之從兄四方貢計皆歸尋陽朝廷所保惟丹陽淮南數郡而東兵會稽諸郡之兵又已至永世晉縣唐廢故城在今鎮江府溧陽縣宫省危懼宋主謀于羣臣蔡興宗曰今普天同叛人有異志宜鎮之以靜至信待人叛者親戚布在宫省若繩之以法則土崩立至宜明罪不相及之義物情既定人有戰心六軍精勇器甲犀利以待不習之兵其勢相萬矣願陛下勿憂建武司馬劉順說豫州刺史殷琰字敬珉孝祖族子使應尋陽琰初以家在建康未許尋為參軍杜叔寶坦之子所制不得已而從之宋主復謂興宗曰諸處未平殷琰已復同逆為之奈何興宗曰逆之與順臣無以辨然今啇旅斷絶而米甚豐賤四方雲合而人情更安以此卜之清蕩可必但臣之所憂更在事後猶羊公言既平吳後方當勞聖慮耳宋主知琰附尋陽非本意乃厚撫其家以招之時內外憂危咸欲奔散兗州刺史殷孝祖帥兵還建康宋主遣孝祖之甥潁川荀僧韶說孝祖入朝孝祖即日帥文武二十人東還所領皆傖楚壯士荀僧韶通鑑作葛今依南史人情大安乃假孝祖節督前鋒遣向虎檻分兵遣山陽王休祐督將軍劉勔字伯猷彭城人吕安國廣陵人等討殷琰巴陵王休若文帝第十九子督將軍沈懷明吳興武康人蕭道成等討孔覬先是宋主徵覬為太子詹事使都水使者孔璪入東慰勞璪說覬以建康虛弱不如擁郡以應𡊮鄧覬遂發兵馳檄奉尋陽至是覬遣其將屯晉陵部陳甚盛孔璪覬從弟已而殿中御史吳喜將兵克義興喜請于宋主願得精兵三百致死于東宋主簡羽林勇士配之喜性寬厚數使東吳人皆懷之及聞其來皆望風降散喜進逼義興諸壘皆潰劉延熙赴水死將軍江方興濟陽考城人御史王道隆攻拔晉陵及吳興吳郡沈懷明等與東軍相持久不决宋主遣方興道隆至晉陵道隆激厲諸將急攻拔之孔璪時屯吳興與袁標王曇生顧琛皆棄郡奔會稽喜等遂進攻會稽克之喜等引兵向會稽取西陵上虞令王晏起兵攻郡執尋陽王子房孔覬出走為晏所獲及璪皆斬之顧琛等詣喜歸罪喜宥之送子房建康貶松滋侯在上虞漢縣厯代因之今屬浙江紹興府西陵渡名紹興府蕭山縣西後五代時吳越改名西興宋太后路氏殂太后聞子勛建號心幸之延宋主置酒進毒宋主覺之即以其巵上壽是日太后殂二月魏丞相太原王乙渾謀反伏誅太后稱制渾専權多殺侍中拓跋丕烈帝之元孫後封東陽王告其謀反馮太后收渾誅之遂臨朝稱制引中書令高允中書侍郎高及賈秀共參大政秋八月宋臺軍六朝以禁城為臺城禁軍為臺軍克江州殺子勛先是宋臺軍敗于赭圻注見前殷孝祖中流矢死鄧琬遣其將以萬人據赭圻陶亮以二萬衆屯鵲洲孝祖負其誠節陵轢諸將每戰常以鼓蓋自隨軍中相謂殷統軍可謂死將矣興賊交鋒而以羽儀自標顯若十人射之欲不斃得乎及攻赭圻果中流矢死人情震駭宋主以沈攸之代將擊尋陽軍大破之先是江方興吳喜既克三吳宋主遣擊尋陽及殷孝祖死衆謂沈攸之當代為統督攸之以方興名位相亞必不為已下乃讓之方興大悅明日帥諸軍進戰大破南軍會宋主以攸之假節代孝祖督前鋒吳喜亦以所領五千人至攸之乃帥諸軍圍赭圻時鄧琬遣劉胡東屯鵲尾衆十餘萬胡宿將勇使屢有戰功將士畏之攸之邀擊胡大敗被創走攸之遂拔赭圻宋主遣尚書禇淵至虎檻選用將士時以軍功除官者衆板不能供始用黃紙已而鄧琬以軍久不决乃以子勛命徴袁顗于襄陽以為都督顗本無將略性又怯撓在軍中未嘗戎服唯賦詩談義不復橅接諸將由此大失人心劉胡尤切齒恚恨與臺軍相拒于濃湖在繁昌縣西今荻港其餘浸也將軍張興世字文德竟陵人越鵲尾上據錢溪在池州府貴池縣東亦曰梅根渚渚東即古梅根錢監故名斷南軍糧道劉胡攻之不能克攸之復擊破濃湖軍胡遁去顗亦走興世既據錢溪顗遣胡攻之屢為興世所敗攸之遂進攻濃湖拔其營柵大破之于是江路阻斷胡軍乏食夜走顗聞之亦棄衆西奔建安王休仁勒兵入其營納降卒十萬顗至鵲頭為人所殺胡走入沔竟陵丞陳懷直斬之八月攸之進兵克江州張悅斬琬齎首詣建安王休仁降琬憂惶無計張悅稱疾呼琬計事令左右伏甲帳後以索酒為約琬至悅問計琬曰正當斬晉安王封府庫以謝罪耳悅曰今日寧可賣殿下以求活邪因呼酒伏發斬琬單舸齎首以降子勛被執攸之斬之傳首建康休仁入尋陽遣吳喜等向荆郢雍湘豫章平諸餘寇袁曇逺為始興人所殺龎孟虯走蠻中死何慧文自殺崔道固程天祚桞元怙皆請降海陵王子頊為治中宗景所執逆建康荆州行事孔道存郢州行事張沈及劉順等餘黨皆伏誅九月魏立郡學魏初立郡學置博士助教生員從高允之請也冬十月宋主殺其兄之子安陸王子綏等十三人宋主既誅子勛又殺安陸王子綏臨海王子頊邵陵王子元建安王休仁言于宋主曰松滋侯兄弟尚在非社稷計宜早為之所于是子房等十人皆賜死世祖二十八子于此盡矣宋徐州刺史薛安都叛降于魏宋徐州刺史薛安都遣使乞降于建康宋主以南方已平欲示威淮北命張永沈攸之將兵五萬迎安都蔡興宗曰安都歸順不虛正須單使尺書今以重兵迎之勢必疑懼安都外據大鎮密邇邊陲地險兵彊尤宜馴養如其外叛招引北寇將為朝廷旰食之憂宋主不從謂蕭道成曰吾今因此北討卿意以為何如對曰安都狡猾有餘以兵逼之非國之利宋主亦不聽安都聞大兵北上懼而降魏魏遣將軍尉元等救之元至安都出迎元不禮于安都安都悔降復謀叛元知之不果發乃重賄元等元遂隱之張永等進逼彭城攻之不克會天大雪士卒凍死大半永等棄城走尉元邀其前安都乘其後大破永等于吕梁山名在徐州府銅山縣東南其下即吕梁洪列子稱孔子觀于吕梁懸水三十仞流沫四十里即此之東死者萬數枕尸六十餘里永及攸之僅以身免宋主召蔡興宗以敗書示之曰我愧卿甚初汝南太守周矜起兵以應建康袁顗遣司馬常珍竒執斬矜以珍竒代為太守前泰山太守畢衆敬奉使詣兗州募人薛安都說之叛建康使行兗州事及尋陽平皆請降于建康會安都叛宋珍竒亦以懸瓠降魏魏以師迎之衆敬以其子在建康被誅魏師至亦降珍竒尋復歸宋衆敬遂仕于魏宋由是夫北四州及豫州淮西之地乃僑立兗徐青冀諸州兗州治淮隂徐州治鍾離青冀冶鬱洲虛置郡縣荒民無幾昌常珍竒汝南人畢衆敬東平須人鍾離鬱洲注俱見前宋立子昱即後廢帝為太子宋主無子嘗以宮人陳氏賜嬖人李道兒已復迎還生昱又密取諸王姬有孕者內之宫中生男則殺其母而使寵姬母之宋豫州益州平先是劉勔至壽陽殷琰與杜叔寶欲降以衆心不一復嬰城固守及是宋主使中書為詔諭琰蔡興宗曰叛亂既定是琰思過之日宜手詔以慰引之今直中書為詔彼必疑之非所以速清方難也不從琰得詔疑勔詐為之欲降于魏主簿夏侯詳字叔業譙人極陳不可琰乃帥將佐出降勔悉加慰撫不戮一人入城約勒將士秋毫無犯壽陽人大悅初尋陽兵起蕭惠開集益州將佐謂曰湘東太祖之昭晉安世祖之穆其于當璧並無不可但景和本世祖之嗣不任社稷其次猶多吾荷世祖之眷當奉九江乃舉兵應之及尋陽平宋主遣惠開弟惠基使成都赦惠開惠開乃降召還建康御批歷代通鑑輯覽卷三十八

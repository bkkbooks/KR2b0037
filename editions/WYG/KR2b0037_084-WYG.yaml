front:
  text: 欽定四庫全書御批歴代通鑑輯覽巻八十五宋髙宗皇帝壬子紹興二年金天㑹十年春正月復賢良方正直言極諫科韓世忠拔建州范汝為自焚死
  hash: sha256:9ec1b9ddbccca25085c955d11b6b446b48311b6377bffa6ee13331b2278ac108

  text: 欽定四庫全書御批厯代通鑑輯覽卷七十六宋仁宗皇帝丙甲嘉祐元年春正月帝有疾文彥博等宿衛禁中二月帝疾瘳
  hash: sha256:648eaf248590de2b2c59e027518818e45ff37b08d404d9bf37f3f4eff146e1e7

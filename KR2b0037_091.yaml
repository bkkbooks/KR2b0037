  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_091-1a, image: WYG0338/WYG0338-0683a.png}
body:
  text: 金主遣使徴糧于歸德總帥什嘉紐勒緷送糧千五百石至蒲城即春秋蒲邑注見前東六軍給糧盡因留船二百張布為幄金主遂乘以濟河會大風後軍不能濟蒙古輝爾古納舊作回古乃今改追擊于南岸金元帥賀德希舊作都喜今改力戰死金兵溺者近千人金主次北岸望之震懼遂次漚麻岡在大名府長垣縣西北遣博索帥師攻衛州至城下以御旗招之城中不應蒙古聞之自河南渡河博索遂退師蒙古史天澤以騎兵踵其後戰于白公廟在衛輝府汲縣東金師敗績博索棄軍東遁金主進次魏樓村在長垣縣西猶欲俟蒙古兵至決戰少頃博索至倉皇言軍已潰北兵近在隄外請幸歸德金主遂與副元帥阿里哈舊作合理合今改等六七人夜登舟潛渡河走歸德翼日諸軍始聞金主棄師遂潰金主入歸德遣奉御珠嘉塔克錫布舊作术甲塔失不今改往汴京奉迎太后及后妃諸軍怨憤金主乃暴博索罪殺之金汴京西面元帥崔立將陵人金主東走以立為外城西面元帥作亂以梁王從恪衛紹王子監國而幽之自為太師尚書令都元帥以城降蒙古初汴人以金主親出師日聽捷報及聞軍敗始大懼會金主遣使至汴奉迎兩宫人情益不安西面元帥崔立性淫狡因民洶洶潛謀作亂時兩宫已出至陳留見城外二三處火起疑有兵復馳還汴京明日崔立拔劍指完顔訥蘇肯及薩尼雅布曰京城危困已極二公坐視何也二相曰有事當好議之何遽至如是立麾其黨先殺薩尼雅布次殺訥蘇肯及左司郎中納哈塔德輝舊作納合德輝今改等十餘人勒兵入宫集百官議所立立曰衛紹王太子從恪其妹公主在北兵中可立之乃遣其黨韓鐸燕京人以太后命往召從恪至以太后誥命為梁王監國百官拜舞立自為太師都元帥尚書令鄭王弟倚為平章政事侃為殿前都點檢其黨皆拜官遂送欵詣蘇布特軍蘇布特至青城立服御衣儀衛往見之蘇布特喜飲之酒立以父事之還城悉燒樓櫓蘇布特益喜始信其實降也立託以軍前索隨駕官吏家屬軍民子女聚之省中親閲之日亂數人猶以為不足乃禁民間嫁娶有以一女之故致數人死者未幾遷梁王及宗族近屬于宫中以腹心守之限其出入以荆王府為已私第取內府珍玩充實之羣小附和請建功德碑翟奕以尚書省命翰林直學士王若虛為文時元好問以左司都事立遷為左右司員外郎若虛私謂好問曰今召我作碑不從則死作之則名節掃地不若死之為愈然我姑以理諭之乃謂奕曰丞相功德碑當指何事為言奕曰丞相以京城降活生靈百萬非功德乎若虛曰學士代王言功德碑謂之代王言可乎且丞相既以城降則朝官皆出其門自古豈有門下人為主帥頌功德而可取信于後世者乎奕雖殘虐聞之不能對而去事遂得已王若虛字從之藁城人夏四月葬恭聖仁烈皇后金崔立執其主之后妃及梁王從恪等送蒙古軍蒙古蘇布特殺從恪等以后妃北還崔立以天子衮冕后服進于蘇布特又括在城金銀搜索薰灌訊掠慘酷貴族富人不堪其毒竊相語曰攻城之後七八日中諸門出葬者凡百萬人恨不早預其數而值此也立時與其妻入宫兩宫賜之不可勝計立因諷太后作書陳天時人事遣金主乳母入歸德招降立以太后王氏皇后圖克坦氏梁王及荆王守純諸妃嬪凡車三十七兩宗室男女五百餘人衍聖公孔元措等赴青城蘇布特殺二王及族屬而送后妃等于和林在道艱楚萬狀尤甚于徽欽之時蘇布特入汴城立時在城外兵先入其家取其妻妾寶玉以出立歸大慟而已初蒙古之制凡攻城不降矢石一發則屠之汴京既陷蘇布特遣使言于蒙古主曰此城相抗日久士卒多傷請屠其城耶律楚材聞之馳見蒙古主曰將士暴露數十年所爭者土地人民耳得地無民將焉用之蒙古主未許楚材又曰凡弓矢甲仗金玉等匠及官民富貴之家皆聚此城殺之則一無所得是徒勞也乃詔除完顔氏一族外餘皆原免時避兵在汴者尚百四十萬户皆得保全遂為定制孟珙擊金武仙于順陽破走之遂復鄧州金唐鄧行省武仙次于順陽與唐州守將武天錫鄧州守將伊喇瑗舊作移刺瑗今改後仿此相掎角謀迎金主入蜀遂犯光化其鋒甚鋭珙逼天錫壘一鼓拔之壯士張子良斬天錫首以獻俘將士四百餘人又敗金人于吕堰在襄陽府襄陽縣北今有驛俘獲不可勝計遂攻順陽武仙敗走馬磴山在南陽府浙川縣東縣令李英及申州安撫張林皆以城降伊喇瑗孤立而懼遣使請降珙納之為易衣冠以賔禮見于是降者相繼珙言于史嵩之曰歸附之人宜因其鄉土而使之耕因其人民而立之長少壯籍為軍俾自耕自守才能者分以土地任以職事使各招其徒以殺其勢嵩之從之五月金富察固納少充忠孝軍萬户按固納舊作官奴今改後倣此幽其主守緒于照碧堂在歸德府城南舊城上宋建六月固納伏誅先是富察固納作亂殺元帥實嘉紐勒緷又殺左丞相李蹊等時蒙古特穆德克圍亳州且日遣兵薄歸德民心搖搖固納請北渡河以圖恢復紐勒緷沮之固納不悅乃私與完顔永安謀邀金主幸海州金主不從固納積忿遂作亂執紐勒緷殺之又殺朝官李蹊等三百人以兵入見金主曰紐勒緷謀反臣殺之矣按特穆德克舊作忒木䚟今改金主不得已以固納權參知政事後固納又襲敗蒙古特穆德克軍于亳州初衛州白公廟之潰固納母為蒙古所獲金主命固納固其母以計請和固納乃私與特穆德克言欲劫金主以降特穆德克信之還其母固納乃日相往來講議遂與金主密定斫營之策因五月五日祭天軍中隂偹火槍戰具固納率忠孝軍乘夜徑至特穆德克營腹背攻之特穆德克軍大潰固納盡焚其柵而還遂真拜左副元帥參知政事至是勢益暴橫居金主于照碧堂禁近無一人敢奏對者金主惟日悲泣語近侍云自古無不亡之國不死之君但恨我不知人為此奴所困耳于是內侍局令宋圭本名琪諾燕人按琪諾舊作乞奴今改奉御紐祜祿溫綽舊作女奚烈完出今改後倣此烏克遜聞蔡州城堅池深兵衆糧廣咸勸幸之以救飢窘會蔡息陳潁等州便宜總帥烏庫哩鎬本名喀喇東北路招討司人喀喇舊作栲栳今改運米四百斛至歸德且請臨幸金主意遂決諭固納以幸蔡固納力陳不可至于扼腕頓足意趣叵測因出號于衆曰敢言南遷者斬衆以固納為無君諷金主早為計金主遂與圭等謀召宰相議事而令溫綽立于照碧堂門間固納進見溫綽從後刺其肋金主亦拔劍斫之固納中創投城下以走溫綽愛錫追殺之忠孝軍聞變皆擐甲溫綽請金主親撫慰之于是金主御雙門赦忠孝軍以安反側蒙古取洛陽金中京留守強伸死之金主以強伸守中京有功降詔褒諭授中京留守行總帥府事月餘糧盡軍民稍散蒙古兵復至伸力戰蒙古稍退鷹揚都尉獻西門以降紳知城不能守帥死士數十突出轉戰至偃師力盡就執載以一馬擁迫而行將見蒙古塔齊爾一名布展博勒呼從孫舊作塔察爾布展舊作倴盞今改紳語不遜兵卒因好語誘之曰汝能北面一屈膝當貰汝命紳不從左右持使北面紳拗頸南向遂殺之金主守緒走蔡州金主留元帥王璧守歸德遂如蔡州時久雨朝士扈從者徒行泥水中掇青棗為糧足脛盡腫明日至亳州金主黃衣皂笠金兔鶻帶以青黃旗二導前黃繖擁後從者二三百人馬五十匹而已行次城中父老拜伏道左金主遣近侍諭以國家涵養汝輩百有餘年今朕無德令汝塗炭朕亦無足言者汝輩無忘祖宗之德可也皆呼萬嵗泣下留一日進次亳南六十里避雨雙溝寺中蒿艾滿目無一人迹金主太息曰生靈盡矣為之一慟及入蔡父老羅拜于道見金主儀衛蕭條莫不飲泣金主亦歔欷遂以完顔呼沙呼為尚書右丞總領省院事烏庫哩鎬為御史大夫總帥如故張天綱字正卿霸州益津人權參知政事富珠哩舊作孛术魯今改小洛索時有大中小三洛索皆內族以其名同故各以長幼别之簽書樞密院事呼沙呼有文武材事無巨細率親為之選士括馬繕治甲兵未嘗一日忘奉金主幸秦鞏之志近侍久困睢陽幸即汝陽之安皆娶妻營業不願遷徙曰夕進言西幸不便金主信之呼沙呼惟深居燕坐瞑目太息而已時蒙古兵去蔡差逺商販頗集金主安之命選室女偹後宫及修見山亭在汝寧府治前牙城上為遊息之所呼沙呼切諌乃止呼沙呼定進馬遷賞格得馬千餘匹又遣使分詣諸道選兵詣蔡得精鋭萬餘兵威稍振忠孝軍提控李德率十餘人乘馬入省大呼以月糧不優幾于罵詈呼沙呼縳德杖之金主諭呼沙呼曰此軍得力方欲倚用卿何不容忍責罰乃爾呼沙呼對曰時方多故録功隱過自陛下之德至于將帥之職則不然小犯則決大犯則誅其強兵悍卒不使一日不在紀律蓋小人之情縱則驕驕則難制睢陽之禍豈獨固納之罪亦有司縱之太過耳今欲易前轍不宜愛克厥威賞必由中罰則臣任其責軍士聞之自是無復敢犯法者是時從官近侍皆窮乏悉取給于烏庫哩鎬鎬不能人滿其欲日夕交譖于金主至以尚食闕供為言金主怒遂疏鎬鎬以被譖憂憤成疾多不視事蒙古以孔元措襲封衍聖公從耶律楚材之請也秋七月孟珙大敗金武仙于馬蹬山降其衆而還武仙愛將劉儀詣珙降珙問仙虛實儀言仙所據九寨其大寨石穴山在馬蹬山東南與岵山王子山聨綿百餘里以馬蹬沙窩岵山三寨蔽其前三寨不破石穴未可圖也若破離金寨則岵山沙窩孤立矣珙乃遣兵攻離金掩殺幾盡是夕復令壯士搗王子山寨斬金將首而出遂圍馬蹬殺戮山還至沙窩西與金人遇大捷未幾丁順復破默候里寨于是仙之丸寨六日破其七珙召儀曰此寨既破板橋石穴必震汝能為我招之乎儀請選婦人三百偽逃歸懷招安榜以往珙料仙勢窮蹙必上岵山絶頂窺伺乃令樊文彬駐軍其下已而仙衆果登山及半文彬麾旗伏兵四起仙衆失措枕籍崖谷山為之赭殺其將烏色舊作兀沙惹今改擒七百三十人棄鎧甲如山薄暮珙進軍至小水河儀言仙謀往商州依險以守然老稚不願北去珙曰進兵不可緩夜漏十刻召文彬等授方略明日攻石穴丙夜蓐食啓行晨至石穴時積雨未霽文彬患之珙曰此雪夜擒吳元濟之時策馬直至石穴分兵進攻自寅至已遂破石穴仙走追及于鮎魚寨仙望見易服而遁復戰于銀葫蘆山在汝州伊陽縣西南又敗之仙與五六騎遁去降其衆七萬珙還襄陽八月史嵩之以兵會蒙古將塔齊爾伐金取唐州金使穆延烏登等行省院事于息州蒙古都元帥塔齊爾使王楫至襄陽約攻蔡州史嵩之以兵會伐唐州金將烏庫哩和歡舊作烏古論黑漢今改戰死城遂降官軍駐于息州之南降者日衆息州刺史烏庫哩瑚魯舊作烏古論忽魯今改後仿此懼請益兵為備金主以參知政事穆延烏登簽書樞密院富珠哩中洛索帥忠孝軍五百赴之九月壬寅朔日食金人來乞糧不許金使完顔阿固岱來乞糧將行金王諭之曰宋人負朕深矣朕自即位以來戒飭邉將無犯南界邉臣有請征討者未嘗不切責之向得宋一州隨即付與近淮陰來歸彼多以金幣為贖朕若受財是貨之也付之全城秋毫無犯清口臨陳生獲數千人悉以資糧遣之今乘我疲弊據我壽州誘我鄧州又攻我唐州彼為謀亦淺矣蒙古滅國四十以及西夏夏亡及于我我亡必及于宋唇亡齒寒自然之理若與我連和所以為我者亦為彼也卿其以此意曉之阿固岱至朝廷不許蒙古塔齊爾圍金蔡州冬十月史嵩之使孟珙等帥師會之金主拜天于節度廳羣臣陪從成禮金主戒諭之因賜巵酒酒未竟邏騎馳奏敵兵數百突至城下將士踴躍咸請一戰金主許之是日分兵防守四面及子城衆既出接戰蒙古兵奔潰塔齊爾以數百騎復駐城東金主遣兵接戰又敗之自是蒙古不復薄城分築長壘圍之史嵩之命孟珙江海帥師二萬運米三十萬石赴蒙古之約塔齊爾大喜益修攻具斫木之聲聞于城中城中益恐往往竊議投降金呼沙呼日以國家恩澤君臣分義撫循其民且營畫禦備未嘗入私室軍民感奮始有固志既而南北兩軍以攻具薄城金人自東門出戰孟珙遮其歸路得降人言蔡城中飢珙曰已窘矣當盡死守之以防突圍珙與塔齊爾約南北軍毋相犯頃之塔齊爾遣張柔帥精兵五千薄城金人鈎二卒以去柔中流矢如蝟珙麾先鋒救之挾柔以出明旦珙殊死戰進逼柴潭在汝寧府汝陽縣南立柵潭上命諸將奪柴潭樓金人來爭諸軍魚貫而上遂拔柴潭樓蔡州恃潭為固外即汝河潭髙于河五六丈珙召麾下謂曰彼所恃此水耳決而注之涸可立待遂鑿隄潭果決入汝水珙命實以薪葦蒙古亦決練江源出確山縣俗稱黃酉河至汝陽縣西入汝于是兩軍皆濟攻其外城破之進逼土門金總帥富珠哩中洛索帥精兵五百夜出西門人荷束藁沃油其上將燒兩軍寨及炮具蒙古兵先覺之伏于隱處挽強努百餘火發矢亦發金兵却走傷者甚衆洛索僅以身免兩軍合攻西城克之因墮其城先是呼沙呼命築寨浚濠為備及西城墮兩軍皆未能入但于城上立柵自蔽呼沙呼摘三面精鋭日夕戰禦金主謂侍臣曰我為金紫十年太子十年人主十年自知無大過惡死無所恨所恨者祖宗傳祚百年至我而絶與古荒淫暴亂之君等為亡國獨為此介介耳又曰亡國之君往往為人囚縶或為俘獻或辱于階庭閉之空谷朕必不至于此卿等觀之朕志決矣以御用器皿賞戰士已而又殺廄馬犒之然其勢不可為已金徐州降于蒙古行省右丞相完顔薩布死之時徐州節度使郭葉嚕舊作野驢今改約源州叛將麻琮襲破徐州徐州將士以蔡州被圍又迫于蒙古兵衆議出降薩布不從恐被執乃投河求死軍士援出之卒自縊死麻琮遂以州降蒙古以史彌逺為太師左丞相鄭清之為右丞相並兼樞密使薛極字會之常州武進人為樞密使喬行簡陳貴誼字正甫福清人參知政事封史彌逺為會稽郡王奉朝請彌逺尋死彌逺拜左相一日以疾求解政詔彌逺有定䇿大功勤勞王室宜加優禮于是授保寧昭信節度使充醴泉觀使封會稽郡王奉朝請二子一壻五孫皆加官秩越八日而死彌逺為相凡二十六年用事專且久權傾內外初欲反韓托胄所為故收召賢才老成布于朝廷及濟王不得其死論者紛起遂專任憸壬以居臺諫一時君子貶斥殆盡帝德其立已惟言是從故思寵終其身十一月刑部侍郎梁成大等有罪免時成大權刑部侍郎有旨黜之提舉鴻禧觀刑部尚書兼給事中莫澤論成大暴狠貪婪苟賤無恥遂寢祠命既而臺臣交劾莫澤貪淫忮害工部尚書李知孝侵欲無厭皆罷之蓋三人皆黨附史彌逺排斥諸賢而成大尤心術嶮巇凡可賊害忠良者率攘臂為之四方賂遺列置堂廡導賔客觀之欲其效尤雖知孝亦鄙其為人至曰所不堪者他日與成大同傳耳卒皆貶死天下快之詔改元史彌逺死帝始親政勵精求治鄭清之亦慨然以天下為己任收召賢才擢之朝廷下詔改明年紀元端平以洪咨夔王遂字去非一字潁叔韶之元孫後為金壇人為監察御史帝親政五日即召咨夔為禮部員外郎入對帝問以今日急務咨夔言進君子退小人開誠心布公道因乞召用崔與之真德秀魏了翁帝納之翌日與王遂並拜御史咨夔謂遂曰朝無臺諌久矣要當極本原而先論之因上疏乞權歸人主政出中書以致平治之道且劾資政殿學士袁韶字彥淳慶元府人仇視善類諂附史彌逺詔奪韶祠祿又論趙善湘鄭損陳晐納賂史彌逺怙勢肆姦失江淮荆襄蜀漢人心罪狀顯著詔善湘有討李全功特寢免晐損皆落職十二月薛極免極與胡矩字仲方銓之孫聶子述趙汝述附史彌逺最親用事時人謂之四木甲午端平元年金天興三年是嵗金亡春正月金主守緒傳位于其宗室承麟世祖後拜甡之弟是為末帝孟珙以蒙古兵入蔡州金主及其尚書右丞呼沙呼死之承麟為亂兵所殺金亡金自太祖建國至承麟亡凡十主合一百二十年蒙古兵以元旦會飲歌吹之聲四望相接城中飢窘歎息而已孟珙見黑氣壓城上日無光降者言城中絶糧已三月欲降者衆珙乃下令諸軍銜枚分運雲梯布城下以攻之是夕金主集百官傳位于東面元帥承麟承麟拜泣不敢受金主曰朕所以付卿者豈得已哉以朕肌體肥重不便鞍馬馳突卿平日趫捷有將略萬一得免宗祚不絶此朕志也承麟起受璽明日承麟即位時孟珙師已向南門萬衆競進金百官稱賀禮畢亟出捍敵而南城之陴已立宋旗幟矣俄頃四靣鼓噪夾攻聲震天地孟珙招江海塔齊爾之師以入呼沙呼率精兵一千巷戰不能禦金主知事急即取寶玉置于幽蘭軒在汝寧府治內一名幽蘭閣環之以草命近侍曰死便火我遂自經呼沙呼聞之謂將士曰吾君已崩吾何以戰為吾不死于亂兵之手吾赴汝水從吾君矣諸君其善為計言訖赴水死將士皆曰相公能死吾輩獨不能邪于是參政富珠哩小洛索烏凌噶瑚圖克舊作兀林答胡土今改總帥兀志元帥裕色爾舊作玉山兒今改赫舍哩柏壽烏庫哩和勒端舊作烏古倫桓端今改等及軍士五百餘人皆從死也承麟退保子城聞金主殂帥羣臣入哭因謂衆曰先帝在位十年勤儉寬仁圖復舊業有志未就可哀也已宜諡曰哀奠未畢城已陷諸將禁近共舉火焚之奉御京錫完顔氏系出始祖按京錫舊作絳山今改後仿此收哀宗骨將瘞之汝水上江海入宫執參政張天綱孟珙問金土所在天綱曰城危時自經矣珙乃與塔齊爾分哀宗骨及寶玉法物考金史完顔京錫傳京錫焚幽蘭軒火方熾大兵突入左右皆走避京鍚留不去衆問之京錫曰吾君終于是吾候火滅灰寒收瘞其骨耳衆曰汝命且不保能瘞而君邪京錫曰吾逆知君輩決不遺吾吾若果得瘞吾君雖寸斬不恨衆以告其帥布展曰此竒男子也許之京錫乃收餘燼裹以敝衾瘞于汝水旁再拜號哭將赴水死以救免後不知所終所載與續綱目異今并注于此是日承麟亦為亂兵所殺金亡金自宣宗之世為宰相樞密者往往臨事推讓低言緩語以為養相體每有四方兵革災異輒以聖主心困或俟再議因循苟且以度時日及出兵則以近侍監戰臨事多所牽制故師出無功國亂不聞以底于亡困史臣曰金自宣宗南渡棄厥本根連兵宋夏內致􅉵哀宗之世無足為者區區生聚圖存于亡力盡乃斃可哀也已雖國君死社稷哀宗無愧也以陳蔡西北地分屬蒙古蒙古以劉福為河南道總管史嵩之使孟珙等分屯京西嵩之使盂珙還師襄陽江海還師信陽王旻戍隨州王安國守棗陽蔣成守光化楊恢守均州並益兵飭偹經理屯田于唐鄧州金穆延烏登以息州來降蒙古追殺之烏登行省于息州與諸將帥日以飲酒為樂軍士淫縱及蔡州破于是與富珠哩中洛索瓜爾佳玖珠舊作夾谷九住今改後仿此等送欵請降為金主發喪設祭上諡曰昭宗州民因奉烏登為丞相中洛索為平章舉城南遷遂焚樓櫓蒙古望見火起追及于羅山今汝寧府信陽州隋置羅山縣元徙縣于西南而改宋信陽軍為州移治于此自萬户以下凡七百人皆被殺二月蒙古入徐州金完顔永安自殺蒙古圍沛永安救之敗走徐州蒙古移兵攻徐永安投水死初永安降金與李全妻楊氏絶楊氏怒悉屠永安家走益都永安選兵分將期必得楊氏相攻者久之及永安死蒙古得其尸㓟面繫馬尾為怨家醬食而盡楊氏亦死于山東以賈貴妃弟似道字師憲涉之子為籍田令似道少落魄為遊博不事操行以蔭補嘉興司倉帝以貴妃故纍擢籍田令恃寵不檢日縱遊諸妓家至夜即燕遊湖上不返帝嘗夜憑髙望西湖中燈火異常時語左右曰此必似道也明日詢之果然使京尹史巖之戒之巖之對曰似道雖有少年氣習然其才可大用也詔太常簿朱揚祖詣河南省謁八陵史嵩之露布至詔遣朱揚祖林拓往省謁八陵尋遣朱復之詣八陵相度修奉夏四月獻金俘于太廟論功行賞有差史嵩之遣使以孟珙所獲金哀宗遺骨及寶玉法物并俘囚張天綱完顔哈拉海哈拉海舊作好海今改等獻于臨安四月丙戍偹禮告于太廟藏骨于大理寺獄庫加孟珙帶御器械江海以下論功行賞有差知臨安府薛瓊問天綱曰何有面目到此天綱曰國之興亡何代無之我金之亡比汝二帝何如瓊叱之明日奏其語帝召天綱問曰汝真不畏死邪天綱對曰大丈夫患死之不中節耳何畏之有因祈死不已帝不聽初有司令天綱供狀必欲書金主為虜主天綱曰殺即殺焉用狀為有司不能屈聽其所供天綱但書故主而已聞者憐之後莫知其所終監察御史王遂言史嵩之本不知兵矜功自侈謀身詭祕欺君誤國留之襄陽一日則有一日之憂不報洪咨夔亦言殘金雖滅鄰國方強益嚴守偹猶恐不逮豈可動色相賀渙然解體以重方來之憂帝嘉納之五月賜黃幹李燔李道傳等諡録其子詔幹燔道傳及陳宓字師復俊卿之子樓昉徐瑄胡夢昱等厄于權姦而各行其志沒齒無怨其賜諡復官録用其子金武仙奔澤州戍兵殺之六月詔復故濟王竑官爵太常寺卿徐僑字崇甫婺州義烏人嘗侍講開陳友愛大義帝悟乃命復竑官爵有司檢視墓域以時致祭時竑妻吳氏自請為尼特賜號慧淨法空大師紹興府月給衣資緍錢趙范趙葵請復三京詔知廬州全子才會兵趨汴金故將李伯淵等殺崔立以降范葵欲乘時撫定中原建守河據關收復三京之議朝臣多以為未可獨鄭清之力主其説乃命趙范移司黃州刻日進兵范參議官邱嶽曰方興之敵新盟而退氣盛鋒鋭寧肯捐所得以與人邪我師若往彼必突至非惟進退失據開釁致兵必自此始且千里長驅以爭空城得之當勤餽餉後必悔之范不聽史嵩之亦言荆襄方爾飢饉未可興師杜杲復陳守境之利出師之害喬行簡時在告上疏曰八陵有可朝之路中原有可復之機以大有為之資當大有為之會則事之有成固可坐而䇿也臣不憂師出無功而憂事力不可繼不可繼則其憂深矣夫規恢進取必須選將練兵豐財足食而今將乏卒寡財匱食竭臣恐北方未可圖而南方已先騷動矣願堅特聖意定為國論以絶紛紛之説皆不聽邱嶽字煦山丹徒人杜果字子昕邵武人詔知廬州全子才合淮西兵萬人赴汴時汴京都尉李伯淵李琦李賤奴等為崔立所侮謀殺之及聞子才軍至伯淵等以書約降而陽與立謀偹禦之策六月伯淵燒封邱門以警動立立殊不安伯淵等乃來約立視火立從苑秀折希顔等數騎往既還伯淵就馬上抱立即出匕首橫刺之立墜馬死伏兵起元帥三合殺苑秀折希顔亦為軍所殺伯淵繫立尸馬尾至內前號于衆曰立殺害劫奪蒸淫暴虐大逆不道古今無有當殺之否萬口齊應曰寸斬之未稱也乃梟立首望承天門祭哀宗伯淵以下軍民皆慟或剖其心生噉之以三尸挂闕前槐樹上趙葵帥師會全子才于汴秋七月葵將楊誼等入洛陽全子才次于汴趙葵自滁州以淮西兵五萬取泗州由泗趨汴以會之葵謂子才曰我輩始謀據關守河今已抵汴半月不急攻洛陽潼關何待邪子才以糧餉未集對葵督促益急乃檄鈐轄范用吉樊辛李先胡顯等提兵萬三千命淮西制置司機宜文字徐敏子為監軍先令西上又命楊誼以廬州強弩軍萬五千繼之各給五日糧七月徐敏子啓行遣和州寧淮軍正將張迪以二百人趨洛陽迪至城下城中寂然無應者至晚有民庶三百餘家登城投降迪與敏子遂帥衆入城蒙古聞之復引兵南下八月朱揚祖還自河南揚祖朝陵行至襄陽會諜報蒙古哨騎已及孟津陜府潼關河南皆增屯戍設伏兵又聞淮閫刻日進師衆畏不前孟珙曰淮東之師由淮西遡汴非旬餘不達吾選精騎疾馳不十日可竣事逮師至東京吾已歸矣于是珙與二使晝夜兼行至陵下奉宣御表成禮而還揚祖以八陵圖上進帝問諸陵相去幾何及陵前澗水新復揚祖悉以對帝忍涕太息久之蒙古復引兵至洛陽城下楊誼軍潰趙葵全子才遂棄汴而歸徐敏子入洛之明日軍食已竭乃采蒿和麵作餅而食之楊誼至洛陽東三十里方散坐蓐食匆數里外有立黃紅涼繖者衆方駭異而蒙古伏兵突起深蒿中楊誼倉卒無偹師遂大潰為蒙古擁入洛水者無數誼僅以身免是晚有潰卒奔告于洛曰楊誼一軍已為蒙古大陳衝散今蒙古軍已據北岸矣于是在洛之師皆奪氣八月朔旦蒙古兵至洛陽城下立寨敏子與戰勝負相當士卒乏糧因殺馬而食敏子等不能留乃班師趙葵全子才在汴亦以史嵩之不致餽糧用不繼所復州郡率皆空城無兵食可因蒙古兵又決黃河寸金淀在開封府北黃河泛溢之水所滙之水以灌官軍官軍多溺死遂皆引師南還趙范以入洛之師敗績上表劾葵子才輕遣偏師趙楷劉子澄參贊失計師退無律致後陳覆敗詔葵子才各削一秩餘貶秩有差鄭清之力辭解政不許喬行簡上言三京撓敗之餘事與前異但當益修戰守之偹帝嘉納之京湖制置使史嵩之免九月以趙范代之詔真德秀為翰林學士魏了翁直學士院帝因民望召還二人德秀入對帝迎謂曰卿去國十年每切思賢德秀以大學衍義上進因言于帝曰天之所助者順人之所助者信陛下倘能敬德以迓續休命中原終為吾有若徒以力求之而不反其本天意難測臣實憂之了翁入對言事剴切反覆利害之端至漏下四十刻乃退帝皆嘉納之冬十月詔真德秀進講大學衍義十二月蒙古使王楫來蒙古使王楫來言曰何為而敗盟也自是河淮之間無寧日矣乙未二年春正月以程芾為蒙古通好使詔孟珙屯黃州珙留襄陽招中原精鋭之士萬五千餘分屯漅北考漅水即巢湖在廬州去襄陽逺甚此當是漢北之訛樊城新野唐鄧間以備蒙古名鎮北軍詔以珙為襄陽都統制珙赴樞密院稟議因入對帝曰卿名將子忠勤體國破蔡滅金功緒昭著珙對曰此宗社威靈陛下聖德與三軍將士之勞臣何力之有授主管侍衛馬軍司公事時暫黃州駐劄朝辭帝問恢復珙對曰願陛下寬民力蓄人材以俟機會帝問和議珙對曰臣介胄之士當言戰不當言和賜賚甚厚珙至黃增陴浚隍搜訪軍實邉民來歸者日以千數為屋三萬間以居之厚加賑貸又慮軍民雜處因髙阜為齊安鎮淮二寨齊安寨木蕭齊時齊安郡故址在黃州府黃岡縣西北鎮淮寨在今黃州府黃梅縣北以居諸軍二月蒙古城和林注見前蒙古以和林為會同之所于是城之周五里許三月以真德秀參知政事陳卓字立道居仁子同簽書樞密院事夏五月德秀卒諡文忠德秀拜參知政事時已得疾遂三上表乞祠帝不得已授資政殿學士提舉萬壽宫逾旬而卒贈銀青光祿大夫德秀立朝不滿十年奏疏將數十萬言皆切當世要務直聲振朝廷四方文士誦其文想見風采及宦遊所至惠政深洽不愧其言由是中外交頌都城人時驚傳澒洞奔擁出關曰真直院至矣果至則又填塞聚觀不置史彌遠以是忌之輒擯不用而聲聞愈彰及歸朝將大用則既衰矣然自韓托胄立偽學之名以錮善類凡近世大儒之書皆顯禁絶之德秀晚出獨慨然以斯文旬任講習而服行之黨禁既開正學遂明于後世德秀之力為多六月召崔與之參知政事不至與之自成都乞歸廣州每有除命皆力辭不起及拜廣東安撫會摧鋒軍士作亂與之肩輿登城叛兵望之俯伏聽命而散因即家治事帝注想彌切召參大政與之力辭帝乃遣使趣之且訪以政事之當行罷者人材之當用舍者與之上疏曰天生人才自足以供一代之用惟辨其君子小人而已忠實而有才者上也才不高忠實存者次也用人之道無逾于此帝嘉納之召命益力與之控辭至十三疏不許久之召與之為右丞相兼樞密使復辭不至蒙古主使其子庫騰舊作濶端今改後仿此等分道南侵蒙古主命子庫騰將塔海等侵蜀特穆德克及張柔等侵漢昆布哈及察罕初名益德塘古時烏密氏夏臣綽依辰類之子按瑭古忒烏審舊作唐兀烏密綽依辰類舊作曲也怯律今並改等侵江淮秋七月蒙古將昆布哈攻唐州全子才等棄師走趙范帥兵敗蒙古于上閘在南陽府唐縣南為瀦水溉田處而還冬十月金鞏昌總帥汪世顯降蒙古金亡郡縣皆降獨世顯堅守不下一日謂其衆曰宗祀已失吾何愛一死千萬人之命懸于吾手平居享髙爵厚祿死其分也餘者何罪與其自經于溝瀆姑徇一時之節孰若屈已紓斯人之禍會蒙古庫騰入蜀次于鞏昌城下世顯帥耆老持牛羊酒幣迎謁庫騰謂之曰吾征討多年所至皆下汝獨固守何也世顯曰有君在上賣國市恩之人諒所不取庫騰大悅戒其下秋毫勿犯俾世顯仍舊職即日令帥所部從征世顯遂截嘉陵趨太安庫騰資其糧械十二月以魏了翁同簽書樞密院事督視江淮京湖軍馬了翁在朝凡六月前後一十餘疏皆當世急務帝將引以共政而忌者相與合謀排擯之且言了翁知兵體乃命出視師賜便宜詔書如張浚故事陛辭御書唐嚴武詩及鶴山書院四大字賜之了翁開幕府于江州以吳潛字􅪢夫宣州寧國人為參謀官趙善瀚馬光祖字華父婺州金華人為參議官蒙古庫騰入沔州殺知州事髙稼字南叔卭州蒲江人進圍青野原利州統制曺友聞字允叔栗亭人彬十二世孫將兵救却之稼在沔葺理創殘招集流散民皆襁負歸之又數與蒙古力戰竒功甚多至是庫騰自鳯州入西川當作西縣隋置元省故城在今漢中府沔縣東路之師多敗遂搗西池谷在沔縣東北距沔九十里吏民議退保大安稼言于制置使趙彥呐曰今日之事有進無退若能進據險地以身捍蜀敵有後顧必不深入若倉皇召兵退守內地敵長驅而前蜀事去矣彥呐曰吾志也已而竟行留稼守沔蒙古自白水關注見前入六股株在漢中府略陽縣東北方輿紀要此即白馬關也亦曰九股樹舊置巡司于此距沔六十里沔無城依山為險稼升髙鼓譟盛旗鼓為疑兵已而蒙古大至沔州遂破衆擁稼出户稼叱之不能止敵圍殺之彥呐聞稼死沔州破乃進屯青野原蒙古圍之曺友聞曰青野為蜀咽喉不可緩也即往救之半夜截戰遂解其圍既而蒙古先鋒汪世顯搗大安友聞又救之指麾甫畢蒙古大軍數萬突至友聞迎戰又敗之敵乃退友聞遂引兵扼仙人關丙申三年春二月蒙古初行交鈔從耶律楚材之請也以萬錠為額召魏了翁還簽書樞密院事了翁固辭不拜尋罷廷臣多忌了翁者故謀假出督以外之甫二旬復以建督為非召之還而帝不悟于是了翁固辭求去不允既而詔以資政殿學士知潭州時殿中侍御史李韶訟曰了翁忠言讜論載在國史比者樞庭之詔未幾改鎮改鎮未久有旨與祠不知國家人材有如了翁者幾人願亟召還處以台輔不報人李韶字元善吳縣三月襄陽將王旻等作亂走降蒙古趙范在襄陽以北軍將王旻李伯淵樊文彬黃國弼等為腹心朝夕酣狎了無上下之序民訟邉防一切廢弛既而南北軍將交爭范失于撫馭于是旻伯淵焚襄陽城郭倉庫相繼降于蒙古襄陽自嶽飛收復以來生聚繁庶城高池深甲于邉陲至是城中官民尚四萬七千有竒財粟在庫者無慮三十萬軍器二十四庫金銀鹽鈔不與焉亂作南軍將李虎等乘火大掠所積一空詔削趙范三官仍舊任未幾以臺諫言罷之夏四月下詔罪已時師屢為蒙古所敗襄漢淮蜀日事兵爭帝悔前事命學士吳泳字叔永潼川人草詔罪已泳以監察御史王萬字處一婺州人忠伉有大志精于邉事以詔意訪之萬曰兵固失矣言之甚恐亦不可今邉民生意如髮宜以振厲奮發興感人心因為條具沿邉事宜泳從其言草詔上進其略有曰數年之間多難已甚屬讐金之滅而蒙古之與鄰逮合謀成破蔡之功恐假道有及虞之勢心之憂矣可噬乎又曰兵民之死戰鬬户口之困流離室廬靡存骼胔相望是皆朕明不能燭德有未孚上無以格天心下無以定民志今乃施令發政以為綏輯之圖輔卒兼乘以嚴守禦之偹想瘡之溢目如疾病之在身蒙古初括中原民户定賦稅初蒙古唯事進取降户以與將士一社之民各有所主不相統攝至是詔括户口以大臣呼圖克舊作忽都虎今改領之民始隸州縣時羣臣共欲以丁為户耶律楚域材以為不可衆皆曰我朝及西諸國莫不以丁為户豈可舍大朝之法而從亡國之政邪楚材曰自古有中原者未嘗以丁為户若果行之可輸一年之賦隨即逃散矣蒙古主從楚材之議及呼圖克以所括户一百四萬上蒙古主議割裂諸州郡分賜諸王貴族為湯沐邑楚材奏曰尾大不掉易以生隙不如多與金帛足以為恩蒙古主曰業已許之矣楚材曰若置官吏必自朝命除恆賦外不擅自徴欽差可久也蒙古主從之楚材又定賦稅每二户出絲一斤以供官用五户出絲一斤以與受賜貴戚功臣之家上田每畝稅三升半中田三升下田二升中水田畝五升商稅三十分之一盜每銀一兩四十斤已上定為永額朝臣皆謂太輕楚材曰將來必有以利進者則以為重矣五月以趙葵為淮東制置使葵兼知揚州墾田治兵邊備以飭秋八月蒙古破棗陽軍德安府宋置今府屬湖北初蒙古破許州獲金軍資庫使姚樞字公茂栁城人後徙洛陽楊惟中字彥誠𢎞州人見之以兄事樞時北庭無漢人士大夫太祖見樞至甚喜特加重馬及庫騰南侵俾樞從惟中即軍中求儒釋道醫卜之人樞招致稍衆至是破棗陽特穆德克欲坑士人樞力與辨得脫死者數十人繼拔德安得趙復字仁甫德安人復以儒學見重于世其徒稱為江漢先生既被獲不欲北行力求死所樞止與共宿譬説百端曰徒死無益隨吾而北可保無他也至燕名益大著學徒百人由是北方始知學經而樞亦初得覩程朱性理之書九月有事于明堂大雨震電鄭清之喬行簡免時清之行簡為左右丞相曹友聞與蒙古戰于陽平關敗績死之蒙古庫騰遂入成都曺友聞帥師扼仙人關蒙古攻武休入興元欲衝大安軍制置使趙彥呐檄友聞控制大安以保蜀口友聞以為不可彥呐不從友聞乃遣弟萬及友諒引兵上雞冠隘在漢中府沔縣西南龍門山之隘口也多張旗幟示敵堅守友聞選精鋭萬人夜渡江即漢江自寧羌州流徑沔縣密往流溪漢江東小溪也設伏約日敵至鳴鼓舉火內外夾擊已而蒙古兵果至萬出迎戰令諸軍舉烽友聞親帥精兵疾馳至隘下入龍虎頭即龍尼坡在沔縣龍門山西南萬聞之出隘口與友聞會內外兩軍皆殊死戰會大風雨兩軍素以綿裘代鐵甲經雨濡濕不利步鬪黎明蒙古增鐵騎四面圍繞友聞歎曰此殆天乎吾有死而已于是殺所乘馬血戰愈厲與萬俱死軍盡沒蒙古兵遂長驅入蜀一月之間成都利州潼川三路所屬府州軍監關隘縣寨俱破沒庫騰次于成都四屬所存唯夔州一路及潼川府路所屬瀘合州順慶府注俱見前而已未錢復成都冬十月蒙古破文州唐置明為縣今縣屬階州知州事劉鋭等死之庫騰兵離成都入文州知州劉鋭通判趙汝嚮乘城固守晝夜搏戰踰月援兵不至鋭度不免集其家人盡飲以藥皆死乃聚其尸及公私金帛告命焚之家素有禮法幼子才六嵗飲藥時猶下拜受之左右感慟城破鋭及其二子自刎死汝嚮被執臠殺之軍民同死者數萬人封陳日煚為安南王先是日煚遣使入貢故有是命十一月蒙古兵入淮西詔史嵩之趙葵陳韡字子華福州候官人分道拒之毗布哈入淮西蘄舒光州守臣皆遁毗布哈于是合三州人馬糧械趨黃州遊騎自信陽趨合肥詔淮西史嵩之援光淮東趙葵援合肥沿江陳韡過和州為淮西聲援孟珙引兵敗蒙古特穆爾岱于江陵先是特穆爾岱攻江陵統制李復明死之已而又破隨郢州及荆門軍特穆德克復攻江陵史嵩之遣珙救之珙遣張順民兵部將先渡而自以全師繼之變易旌旗服色循環往來夜則列炬照江數十里相接珙又遣趙武等與戰珙親往節度遂破蒙古二十四寨還民二萬而歸蒙古將察罕攻真州知州事邱嶽敗之蒙古攻真州嶽部分嚴明守具周悉蒙古兵薄城輒敗嶽乘勝出戰于胥浦橋在揚州府儀徵縣西相傳為伍子胥入吳渡江處故名以強弩射殺其致師者一人敵兵少却嶽曰敵兵十倍于我不可以力勝也乃為三伏設炮石待之于西城敵至伏起炮發殺其驍將敵衆大擾嶽選勇士襲敵營焚其廬帳越二日皆引去丁酉嘉熙元年春二月詔經筵進講朱熹通鑑綱目蒙古始給官府符印定驛令初諸路官府自為符印僭越無度耶律楚材請中書省依式鑄給名器始重時諸王貴戚皆得自起驛馬道路騷擾所至須索百端楚材復請給牌劄定分例其弊始革三月資政殿學士魏了翁卒諡文靖贈少師蒙古擊竒卜察克西域國方輿紀要圖在蔥嶺極西舊作欽察今改諸部破之考元史蘇布特傳太祖癸未蘇布特請討竒卜察克許之遂收其境而太祖本紀不載其事又太宗本紀九年丁酉莽賚扣征竒卜察克部破之擒其酋巴齊瑪克而憲宗本紀書其事而不詳年月蓋竒卜察克在西域最逺叛服不常太祖收其境太宗復加征討續綱目于嘉定十八年書蘇布特滅竒卜察克于是年復書蒙古聲竒卜察克前既書滅此復書擊體例未協今節採元史紀傳並輯于此按巴齊瑪克舊作八赤蠻今改初蒙古太祖時蘇布特擊竒卜察克續綱目竒卜察克去中國三萬餘里夏夜極短口暫沒輒出土産良馬富者以萬計所載與唐書郭喇窪傳略同但郭喇窪地在翰海北與日出處相近故晝長夜短此竒卜察克在蔥嶺極西地當近日入處晝夜何得與日出處相同其言恐未足據今不取由庫勒騰舊作寬定續綱目作寬田濟蘇哈雅舊作吉海今益改至太和嶺鑿石開道與其酋伊勒吉舊作玉里吉今改等遇縱兵奮擊衆潰悉降遂收其境與奈曼諸部千户通立一軍及蒙古主即位既滅金命諸王巴圖舊作拔都今改莽賚扣等分討西域諸部至是莽賚扣擊竒卜察克至濟蘇哈雅其酋巴齊瑪克逃匿海島會大風刮海水其淺可涉遂進屠其衆生擒巴齊瑪克復進兵俄羅斯舊作斡羅思今改部至額里齊舊作也烈贊今改城破之方巴齊瑪克被擒莽賚扣命之跪不肯既而謂監者曰我入于海而終見擒天也今水回期且至軍宜早還莽賚扣聞之即班師而水已至後軍有浮渡者夏五月臨安大火臨安大火自己至酉燒民廬五十三萬士民上書咸訴濟王之寃進士潘牥字庭堅福州閩人對策亦以為言并及史彌逺侍御史蔣峴彌逺之黨也上疏謂火災天數何預故王遂劾方大琮王邁字貫之興化仙遊人劉克莊字潛夫莆田人等鼓扇異論并斥牥姓同逆賊語涉不順請皆論以漢法自是羣臣無敢復言濟王之寃矣秋八月蒙古校儒士于諸路耶律楚材奏制器者必用良工守成者必用儒臣儒臣之事業非積數十年殆未易成也蒙古主曰果爾可官其人楚材請校試之乃命稅課使劉中楊奐字奐然乾州人隨郡考試以經義詞賦論分為三科儒人被俘為奴者亦令就試其主匿弗遣者死得士凡四千三十人免為奴者四之二楚材又請一衡量立鈔法定均輸庶政略偹民稍蘇息冬十月蒙古攻安豐宋以夀春鎮置安豐軍元為路明改壽州今州屬鳯陽府知軍事杜杲力戰遇之蒙古引還蒙古昆布哈攻黃州孟珙帥師救却之遂移攻安豐杜果繕完守禦蒙古以火炮焚樓櫓杲隨陷隨補完蒙古令巴圖爾斫牌杈木巴圖爾者皆死囚為之攻城以自贖杲募善射者用小箭射其目巴圖爾多傷而退蒙古填壕為二十七壩杲分兵扼壩蒙古乘風縱火俄而風雪驟作杲募壯士奪壩路士皆奮躍死戰會池州都統制吕文德安豐人突圍入城合力捍禦蒙古引去淮右以安文德魁梧勇悍嘗鬻薪城中趙葵見其遺屨長尺有咫異而訪之值文德出獵暮負虎鹿各一而歸召置帳下遂纍功勞超擢軍職十二月戊寅朔日食日與金木水火四星俱躔斗食將既戊戌二年春二月以史嵩之參知政事督視京湖江西軍馬置司鄂州尋兼督視淮南西路光蘄黃夔施州夏五月以李鳴復字成叔瀘州人知樞密院事余天錫簽書院事李宗勉字強父富陽人參知政事喬行簡請以兵事委鳴復財用委宗勉楮幣委天錫當會議者臣則參酌行之帝從其請秋九月蒙古圍廬州杜杲敗走之蒙古察罕帥兵號八十萬圍廬州期破廬後造舟巢湖以窺江左于濠外築土城六十里穿兩濠攻具皆數倍于攻安豐時杜杲極力守禦蒙古築壩髙于城樓杲以油灌草即壩下焚之皆為煨燼又于串樓內立鴈翅七層俄炮中壩上衆驚杲乘勝出戰蒙古敗走杲追躡數十里又練舟師扼淮河遣其子庶字康侯監吕文德聶斌伏精鋭于要害蒙古不能進遂引師北歸詔加杲淮西制置使以孟珙為京湖制置使冬十月珙復郢州荆門軍珙受詔收復京襄珙謂必得郢然後可以通餽餉得荆門然後可以出竒兵及至嶽州檄江陵節制司搗襄郢召諸將指授方略發兵深入遂復郢州荆門軍蒙古建太極書院于燕京時濓溪周子之學未至于河朔楊惟中用師于蜀湖京漢得名士數十人始知其道之粹乃收集伊洛諸書載送燕京師還與姚樞謀建太極書院及周子祠以二程張楊遊朱六子配食請趙復為師選俊秀有識度者為道學生由是河朔始知道學己亥三年春正月以喬行簡為少傅平章軍國重事李宗勉為左丞相兼樞密使史嵩之為右丞相兼樞密使督視江淮四川京湖軍馬嵩之既相一時正人如杜範字成之黃巖人遊似字景仁南充人劉應起李韶趙汝騰字茂實宗室子居福州等皆以不合逐去時三相當國論者謂喬失之泛李失之狹史失之専然宗勉清謹守法猶號為賢三月孟珙復襄陽珙遣兵及蒙古三戰皆捷遂復信陽光化軍樊城襄陽因上奏曰取襄不難而守為難非將士不勇也非車馬器械不精也實在乎事力之不給爾襄樊為朝廷根本今百戰而得之當加經理如護元氣非甲兵十萬不足分守與其抽兵于敵來之後孰若保此全勝上兵伐謀此不爭之爭也乃以蔡息降人置忠衛軍襄郢降人置先鋒軍秋八月蒙古軍復破成都而去蒙古塔海將兵入蜀制置使丁黼聞之先遣妻子南歸自誓死守至是塔海自新井唐縣元省故盛在今保寧府南部縣入詐竪宋將旗黼以為潰卒以旗榜招之既審知其非領兵夜出城南迎戰至石筍街在成都府西門外杜甫詩益州城西門陌上石筍雙髙蹲即此兵散力戰而死蒙古遂取漢卭簡眉閬蓬州遂寧重慶順慶府尋引還黼帥蜀為政寬大蜀人思之冬十二月觀文殿大學士致仕崔與之卒諡清獻與之未嘗造朝帝虛位待之致仕踰年而卒贈少師封南海郡公與之晚出畨禺屹然有大臣風與張九齡齊名異代孟珙遣兵禦蒙古于蜀口孟珙諜知蒙古塔海等帥衆號八十萬南侵䇿其必道施黔謂施州黔州也施州後周置明改衛今為施南府屬湖北黔州注見前以透湖湘乃請粟十萬石以給軍餉以三千人屯峽州千人屯歸州命弟瑛以精兵五千駐松滋晉縣今屬荆州府為夔聲援增兵守歸州隘口萬户谷在歸州西及蒙古至珙密遣將禦之又以千人屯施州蒙古既入蜀珙增置營寨分布戰艦遣兵間道抵均州防遏且設䇿偹禦未幾蒙古渡萬州後周置明改縣今縣屬夔州府湖灘在萬縣西水勢險急春秋泛溢江面如湖故名施夔震動珙兄璟時知峽州帥兵迎拒于歸州大堙寨在州西北得捷于巴東隋縣今屬宜昌府夔州以全以陳塤字和中鄞人為國子司業塤史彌逺之甥也紹定中為太常博士上疏乞去君側之蠱媚以正主德從天下之公論以新庶政蓋指賈妃及彌逺也彌逺召謂曰何為好名塤曰好名孟子所不取然求士于三代之上惟恐其好名求士于三代之下惟恐其不好名耳因力請外彌逺卒乃召還歷官吏部侍郎至是授司業諸生相慶以為得師庚子四年春正月彗見營室臨安大飢飢者奪食于路市中殺人以賣盜于隱處掠賣人以徼利日未晡路無行人二月以孟珙為四川宣撫使珙遂大興屯田珙條具上流事宜會諜知蒙古于襄樊信陽隨州招集軍民布種積船材于鄧之順陽乃分兵撓其勢潛兵燒所積船材又度其必因糧于蔡遣兵火其積聚遂拜四川安撫使知夔州節制歸峽鼎澧軍馬珙至鎮招集散民為寧武軍以降人回鶻愛勒巴圖魯舊作愛里巴圖魯今改為飛鶻軍釐蜀政之弊為條班諸郡縣且曰不擇險要立寨柵則難責兵以衛民不集流離安耕種則難責民以養兵乃立賞罰以課殿最俾諸州奉行之尋兼夔州路制置屯田調夫築堰募農給種又創南陽竹林兩書院以處襄漢四川流寓之士以李庭芝字祥甫隨州應山人權施州建始縣晉縣今屬四川夔州府庭芝訓農治兵選壯士雜官軍教之期年民皆知守戰善馳逐無事則耕敵至則出戰珙下其法于所部行之夏四月召史嵩之還以杜杲為沿江制置使知建康府蒙古復使王楫來楫前後凡五至以和議未決隱憂致卒遣使歸其柩于蒙古秋九月喬行簡罷行簡告老乃以少師為醴泉觀使尋卒是冬李宗勉亦卒辛丑淳祐元年春正月詔加周敦頤張載程皓程頤封爵與朱熹並從祀孔子廟庭黜王安石從祀詔曰孔子之道自孟軻後不得其傳至我朝周敦頤張載程皓程頤真見實踐深探聖域千載絶學始有指歸中興以來又得朱熹精思明辨表裏渾融使大學論孟中庸之書本末洞徹孔子之道益以大明于世朕每觀五臣論著啓沃良多今視學有日其令學官列諸從祀以示崇奬之意尋以王安石謂天命不足畏祖宗不足法人言不足恤為萬世罪人豈宜從祀孔子其黜之越二日加封敦頤汝南伯載郿伯皓河南伯頤伊陽伯秋九月高麗王暾以族子為質于蒙古先是蒙古伐髙麗髙麗屢敗乃復入貢請平蒙古令其王暾親朝當罷兵至是暾以族子為質于蒙古八月求遺書冬十一月蒙古主諤格德依殂第六后鼐瑪錦氏即昭慈皇后名托里格訥按鼐瑪錦舊作乃馬真托里格訥舊作脫列哥今並改稱制蒙古主諤格德依性嗜酒晚年尤甚耶律楚材數諌不聽乃持酒槽鐡口以獻曰此鐡為酒所蝕尚致如此況人之五臟邪蒙古主乃少減是年二月疾篤脈絶六皇后不知所為召楚材問之楚材對曰今任使非人賣官鬻獄囚繫非辜者多宜赦天下后亟欲行之楚材曰非君命不可頃之蒙古主少蘇后以為言乃首肯之赦發而脈復生十一月疾愈楚材推太乙數謂不宜田獵左右皆曰不騎射何以為樂出田五日還至烏特古呼蘭方輿紀要地在河林東北舊作鈋鐵鐸湖蘭諤多拉哈瑪爾回回國人舊作奧都剌合蠻今改進酒歡飲極夜乃罷翌日殂立凡十有三年廟號太宗初蒙古主有旨以孫錫哩瑪勒蒙古主第四子庫春之子按錫哩瑪勒舊作失烈門庫春舊作曲出今並改為嗣至是后召楚材問之楚材曰此非外姓臣所敢知自有先帝遺詔幸遵行之后不從遂稱制于和林成都將田世顯叛以城降蒙古制置使陳隆之死之塔海部汪世顯等復入蜀圍成都隆之守彌旬誓與城存亡部將田世顯潛送欵于蒙古乘夜開門北兵突入隆之舉家數百口皆死檻送隆之至漢州命諭守臣王夔降隆之大呼曰大丈夫死爾勿降也遂見殺漢州兵三千出戰城破盡為蒙古所屠十二月蒙古使伊拉瑪斯鼐瑪氏舊作月里麻思今改等來至淮上守將囚之蒙古使伊拉瑪斯來議和從行者七十餘人伊拉瑪斯曰吾與汝等奉命南下宋人多詐倘遇害當死焉毋辱君命已而馳抵淮上守將以兵會之曰爾命在我生死頃刻間耳若能降官爵可立致不然必不汝貸伊拉瑪斯曰吾持節南來以通國好反誘我以不義有死而已守將知其不可逼乃囚之長沙飛虎寨壬寅二年是年以投蒙古鼐瑪錦后稱制春正月蒙古復攻蜀孟珙分兵禦之蒙古伊克那顔舊作也可耶那顔今改律珠格爾自京兆取道商房以趨三川遂攻瀘州孟珙遣一軍屯江陵及郢州一軍屯沙市即今沙頭市在荆州府江陵縣東南一軍自江陵出襄與諸軍會又遣一軍屯涪州注見前且下令應出戍主兵官不計失棄寸土權開州宋置明改縣今縣屬夔州府梁棟以乏糧還司珙曰是棄城也斬以徇由是諸將稟命惟謹蒙古燕京行省郎中姚樞棄官隱于蘇門在衛輝府輝縣西一名百門山上有百門泉故名先是蒙古以伊勒噶克齊舊作牙剌瓦赤今改行省事于燕京主管漢氏公事以姚樞為郎中伊勒噶克齊惟事貨賂以樞為募長分及之樞一切拒絶因辭職去携家往輝州金置明改縣今縣屬衛輝府之蘇門作家廟别為室奉孔子及宋儒周程張邵司馬六君子像刋小學四書并諸經傳注以惠學者讀書鳴琴若將終身夏六月徐榮叟字茂翁應龍之子罷榮叟于是年二月參知政事中書舍人李韶言道揆之地愛善類不勝于愛爵祿畏公議不勝于畏權勢與史嵩之議不合出知泉州榮叟言韶議論不阿請留之帝不聽亦罷秋七月蒙古兵渡淮入揚滁和州已而蒙古復破通州屠其民九月庚辰朔日食冬十一月日南至雷電交作詔避殿減膳求直言癸卯三年春二月以余玠字義夫蘄州人為四川制置使初玠家貧落魄無行亡命走揚州上謁趙葵葵壯之留置幕府俾帥舟師泝淮入河抵汴所向有功纍推淮東制置副使入對言方今指即戎之士為粗人斥為儈伍願陛下視文武之士為一勿令偏有所重偏則必至于激文武交激非國之福帝曰卿人物議論皆不尋常可獨當一面乃授四川宣諭使至是加制置使知重慶府蜀中財賦甲天下入户部三司者五百餘萬緡入四總領所者二千五百餘萬緡金銀線錦之類不預馬自寶慶三年失關外端平三年蜀地殘破所存州縣無幾國用益窮十六年間凡授宣撫使者三人制置使者九人俱無成績于是兩川無復紀律遺民咸不聊生監司戎帥各專號令擅辟守宰蕩無法度蜀日益壞玠至大更弊政遴選守宰築招賢館于府左士之至者玠不厭接隨其材而任之遂于利閬城大獲山在保寧府蒼溪縣東南城在山上因石巖為之天成竒險宋末移閬州治此以護蜀口蓬州注見前城營山當作雲山一曰披衣山在州東南與營山縣接界其山純險宋末徙州治此渠州注亦見前城大良平在順慶府廣安州東北舊曰濃洄鎮宋末廣安軍治此亦曰大良城嘉定宋府明為州今仍為府治樂山城舊治瀘州注見前城神臂山在州東亦曰神臂崖宋末徙州治此其他因山為壘棊布星列如臂使指氣勢聨絡屯兵聚糧為必守計民始有安土之心播州冉璡及弟璞俱有文武材隱居蠻中前後間帥辟召皆堅辭不至聞玠賢自詣府上謁玠待以上客璡璞居數月無所言玠疑之乃更闢别館以處之且日使人窺其所為兄弟終日不言惟對踞以琧畫地為山川城池之形起則漫去如是又旬日請見玠屏人曰某兄弟辱明公禮遇思有以少禆益為今日西蜀之計其在合州城乎玠不覺躣起執其手曰此玠忠也但未得其所耳璡曰蜀口形勝之地莫若釣魚山請徙諸此若任得其人積粟以守之賢于十萬師遠矣玠大寺曰玠固疑先生非淺士先生之謀玠不敢掠以歸已遂密以其謀聞于朝請不次官之詔璡權發遣合州璞權通判徙城之事悉以任之釣魚城成蜀始可守合州唐置今屬重慶府釣魚山在州東三面臨江崖壁峭險三月丁丑朔日食蒙古中書令耶律楚材以憂卒鼐瑪錦氏稱制鄂多拉哈瑪爾專政權傾于中外后至以御寶空紙使自書填楚材曰天下者先帝之天下朝廷自有憲章今欲紊之臣不敢奉詔又有旨凡鄂多拉哈瑪爾所建白令史不為書者斷其手楚材曰國之典故先帝悉委老臣令史何預焉事若合理自當奉行如不可行死且不避況截手乎后不悅楚材憤悒成疾而卒或譖之曰楚材為相二十年天下貢賦半入其家后命近臣覆視之惟琴玩十餘及古今書畫金石遺文數千卷而已楚材天資英邁敻出人表正色立朝不為勢屈每陳國家利病生民休戚辭色懇切蒙古太宗嘗曰汝又欲為百姓哭邪楚材每言興一利不若除一害生一事不若減一事人以為名言互順初贈大師進封廣寧王諡文正甲辰四年春正月以李鳴復參知政事杜範同知樞密院事範固辭遂與鳴復俱罷初範為殿中侍御史嘗論鄭清之李鳴復之過不行即棄官去至是不屑與鳴復共政上疏辭位而去帝遣使召還太學諸生亦上書留範而斥鳴復并斥史嵩之嵩之諷諫議大夫劉晉之併論罷二人夏六月以吕文德為淮西招撫使先是以文德為侍衛副都指揮使總兩淮軍馬既而蒙古圍壽春文德解其圍遂有是命未幾文德又敗蒙古于五河宋縣今屬泗州縣東濵淮西北有澮河沱河東南有漴河東北有潼河並流合淮所謂五河也復其城秋九月詔起復史嵩之將作監徐元杰字仁伯信州上饒人太學生黃愷伯等上書論之不報先是黃濤劉應起徐霖字景説衢州西安人等俱上書論嵩之深姦擅權帝不聽而論者益衆及其父彌忠卒詔嵩之起復徐元杰上疏曰陛下為四海綱常之主大臣身任道揆扶綱常自聞嵩之有起復之命凡有父母之心者莫不失聲涕零是果何為而然人心天理誰實無之興言及此非可使聞于鄰國也臣懇懇納忠何敢詆訐特為陛下愛惜民彛而已疏出嵩之憾之帝亦不聽于是太學生黃愷伯等百四十四人武學生翁日善等六十七人皆上書切諫亦不報冬十月以劉漢弼字正甫上虞人為左司諫史嵩之久擅國柄帝亦患苦之乃夜降御筆黜四不才臺諫諫議大夫劉晉之侍御史王瓉監察御史龔基先胡清獻皆罷以漢弼為左司諫漢弼首贊帝曰拔去陰邪庶可轉危而安否則是非不兩立邪正不並進陛下雖欲收召善類不可得矣帝嘉納之十一月詔史嵩之終喪徐元杰復上疏論嵩之起復士論紛然乞許其舉執政自代帝曰學校雖是正論但言之太甚元杰對曰正論乃國家元氣今正論猶在學校要當保養一線之脈因乞引去左司諌劉漢弼亦上言願聽嵩之終喪亟選賢臣早定相位嵩之亦自知不為衆論所容上疏乞終喪帝乃許之金淵字淵叔臨安府人等有罪免上欲更新庶政乃召王伯大字幼學福州人李性傳陳韡等赴闕于是劉漢弼及右正言鄭宷監察御史江萬里字子逺都昌人相繼言簽書樞密院事金淵諫議大夫劉晉之兵部尚書鄭起潛吏部侍郎濮斗南陳一薦起居舍人韓祥國子祭酒項容孫字仲履江陵人起居郎葉蕡主管侍衛步軍司王德明及知州林光謙等皆附麗史嵩之為之心腹盤踞要路公論之所切齒詔淵罷政豫祠餘各貶官有差十二月以范鍾字仲和婺州蘭溪人杜範為左右丞相並兼樞密使範入相首上五事曰正治本謂政事當常出于中書毋使旁蹊得竊威福曰肅宫闈謂當嚴內外之限使宫府一體曰擇人才謂當隨其所長用之而久于職毋徒守遷之常格曰惜名器謂如文臣貼職武臣閣衛不當為徇私市恩之地曰節財用謂當自人主一身始自宫掖始自貴近始考封椿國用出入之數而補窒其罅漏求鹽策楮幣變更之目而斟酌其利害仍乞早定國本以安人心以孟珙知江陵府珙至江陵登城嘆曰江陵所恃三海在荆州府江陵縣東北孫吳時引諸湖及沮漳水滙江陵以北阻拒魏兵號稱北海不知沮洳有變為桑田者敵一鳴鞭即至城外蓋自城以東古嶺先鋒直至三汊海有上中下古嶺等其名也無限隔乃修復內隘十有一别作十隘于外有距城數十里者沮漳之水舊自城西入江因障而東之俾繞城北入于漢而三海遂通為一隨其髙下為匱蓄泄三百里間渺然巨浸土木之工百七十萬民不知役因繪圖上之乙巳五年夏四月右丞相兼樞密使杜範卒六月工部侍郎徐元杰暴卒史嵩之既去元老舊德次第收召杜範既入相復延元杰議政多所禆益六月朔元杰當侍立先一日謁范鍾歸是夕熱大作夜四鼓指爪忽裂以死三學諸生相繼伏闕上言昔小人傾君子者不過使之死于蠻煙瘴雨之鄉今蠻煙瘴雨不在嶺海而在朝廷詔付臨安府鞫治常所給使之人獄迄無成劉漢弼亦每以姦邪未盡屏汰為慮未幾以腫疾暴死太學生蔡德潤等百七十有三人復叩閽上書訟寃詔給元杰漢弼官田五百畝緍錢五千恤其家時杜範入相八十日卒元杰漢弼相繼暴死時謂諸公皆中毒堂食無敢下筯者初嵩之從子璟卿嘗上書諫嵩之曰久開督府所成何功東南民力困于征輸州縣匱于應辦誠恐禍起蕭墻危如朝露為今之計莫若盡去在幕之羣小悉召在野之君子相與改絃易轍戮力王事以收桑榆之功言甚切至居無何璟卿暴卒相傳亦嵩之致毒云秋七月癸巳朔日食丙午六年蒙古定宗固玉克元年固玉克舊作貴由今改後仿此春正月卒卯朔日食秋七月蒙古主庫裕克立是為元定宗庫裕克太宗長子母六皇后臨朝四年至是會諸王百官議立庫裕克乃即位于昂吉蘇默托里之地方與紀要地在和林境舊作汪吉宿滅秃里今改朝政猶出于后九月寧武節度使漢東公孟珙卒諡忠襄以賈似道為京湖制置使珙卒纍贈太師封吉國公珙忠君體國之念可貫金石在軍中參佐部曲論事言人人異珙徐以片言折衷衆志皆愜謁士遊客老校退卒一以恩意撫接名位雖重惟建旗鼓臨將吏面色凛然無敢涕唾者退則掃他焚香隱几危坐若蕭然事外逺貨色絶滋味尤邃于易學冬十二月詔史嵩之致仕嵩之服除有嚮用之意殿中侍御史章琰正言李昂英字淩明番禺人監察御史黃師雍字子敬福州人論其無父無君乞寢宫祠削官逺竄詔皆落職豫祠翰林學士李韶與從官抗疏言陛下不能正姦臣之罪其過不専在上蓋大臣百執事不能輔天子以討有罪乞斷以春秋之義亟賜裁處乃命嵩之以觀文殿大學士永國公致仕詔不復用蒙古侵京湖江淮之境蒙古萬户史權字伯衡天澤子等擁兵淮南攻虎頭關塞在黃州府麻城縣北與穆陵黃土白沙大城為五關接河南兒山縣界拔之進至黃州丁未七年夏四月以鄭清之為太傅右丞相兼樞密使中使及門清之方放浪湖山寓僧剎竟夕不歸詰旦始還入對力辭不允以趙葵為樞密使督視江淮京湖軍馬陳韡知樞密院事湖南安撫大使葵兼知建康府韡兼知潭州秋八月蒙古侵髙麗髙麗嵗貢不入蒙古伐之自後十年之間凡四易將拔其城十有四戊申八年春二月蒙古主庫裕克殂后烏拉海額錫舊作斡凡立海迷失今改稱制蒙古主庫裕克殂于杭錫雅爾舊作橫相乙兒今改之地廟號定宗后烏拉海額錫抱庫春子錫哩瑪勒聽政諸王大臣皆不服時國內大旱河水盡涸野草自焚牛馬死者十八九人不聊生諸王及各部又遣使于諸郡徵求貨財或于西域回鶻索取珠璣或于海東取鷹鶻驛騎絡繹晝夜不絶民力益因己酉九年夏四月壬寅朔日食秋九月嚴中外上書之禁諫臣言譁徒吻士結黨叩閽簧鼓是非為攫利之計詔中外士庶上書其言有益于國者必加精採倘涉私邪朋姦罔上妄肆雌黃當嚴加究問是時臺綱不振嬖寵干政彈文及其私黨則內降聖旨宣諭刪去謂之節帖臺諫不敢與爭庚戌十年春三月以賈似道為兩淮制置大使李曽伯字長孺覃懷人居嘉興為京湖制置使似道兼知揚州曽伯知江陵府趙葵罷言者論葵非由科目進且曰宰相須用讀書人葵因力辭其表有云霍光不學無術每思張詠之語以自慚后稷所讀何書敢以趙抃之言而自解帝不得已授醴泉觀使兼侍讀復固辭乃以觀文殿大學士判潭州冬余玠出兵至興元而還玠帥蜀慷慨自許有挈故地還天子之語上嘉之數年之間建城壁築關隘增屯堡邉境稍息寖以驕恣而鄭清之再相因慫恿其進兵于是一意出師雖有小捷至興元遇蒙古將汪德臣世顯之子鄭鼎澤州陽城人無功而還御批歷代通鑑輯覽卷九十二

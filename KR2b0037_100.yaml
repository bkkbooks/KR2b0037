  text: 欽定四庫全書御批厯代通鑑輯覽卷一百一明太祖皇帝子卯洪武二十年春正月以馮勝為征虜大將軍帥師征納克楚
  hash: sha256:783058bc8845c289d701fb6b81579512affde66548a0efbde9cf6fe8561462a8

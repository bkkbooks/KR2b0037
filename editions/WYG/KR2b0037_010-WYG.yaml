body:
  text: 嬴姓伯益之裔非子封秦詳見前名政莊襄王子生于趙故初姓趙氏後歸秦嗣為王遂滅六國并天下庚辰二十六年王賁襲齊王建降遂滅齊田齊自太公和至王建凡七傳而為秦所滅初齊王建年少國事皆決于君王后襄王后太史氏君王后事秦謹與諸侯信齊亦東邊海上秦日夜攻三晉燕楚五國各自救以故王建立四十餘年不受兵及君王后卒后勝魯有郈氏其後去邑從后相齊與賓客多受秦間金勸王朝秦不修戰備不助五國攻秦秦以故得滅五國齊王將朝秦雍門司馬曰所為立王者為社稷邪為王邪王曰為社稷司馬曰為社稷立王王何以去社稷入秦王乃還即墨大夫聞之見王曰齊地方數千里帶甲數百萬今三晉大夫不便秦而在鄄阿之間者百數王收而與之數萬之衆使收晉故地即臨晉之闗可入矣鄢郢大夫不欲為秦而在城南下者百數王收而與之數萬之衆使收楚故地即武闗可入矣如此則齊威可立秦國可亡何西面而事秦邪王不聴州臨晉闗即古蒲津闗今曰大慶闗在同府朝邑縣東餘注俱見前至是王賁自燕南攻齊猝入臨淄民莫敢格者建遂降秦遷之共注見前處之松栢之間餓而死齊人怨建聽姦人賓客不蚤與諸侯合從以亡其國歌之曰松邪栢邪住建共者客邪初號皇帝除諡法王既并天下令丞相御史秦官一名曰柱後史即周柱下史也主四方文書議帝號于是丞相綰王綰御史大夫侍御史之率故稱大夫劫馮劫廷尉秦官掌刑辟斯李斯等皆曰陛下陛階也蔡邕曰天子必有近臣立于陛側羣臣與天子言不敢指斥故呼在陛下者與之言因卑逹尊之意也平定天下海内為郡縣自上古以來五帝所不及臣等謹與博士秦官掌通古今議曰古有天皇地皇泰皇史記索隱泰皇人皇也泰皇最貴請上尊號王為泰皇命除拜遣議曰命為制謂制度之命令希告中外曰令為詔告也天子自稱曰朕古者君臣之間通稱曰朕自秦定制唯天子獨稱之王曰去泰著皇采上古帝位號號曰皇帝他如議追尊莊襄王為太上皇制曰死而以行為諡是子議父臣議君也甚無謂自今以來除諡法朕為始皇帝後世以計數二世三世至于萬世傳之無窮定為水徳以十月為嵗首初齊人鄒衍鄒以邑為氏衍居齊稷下與鄒奭並著書言治亂齊人頌之曰談天衍雕龍奭論著終始五徳之運漢書注如淳曰衍書有五徳終始五徳各以其勝為行章潢圖書編五運之説始于鄒衍漢賈誼司馬遷從衍相勝之説劉向父子則以相生為言主相勝者以火能滅金即以火勝金金能尅木即以金勝木論相生者則曰帝出乎震故庖犧氏始受木徳後以母傳子終而復始始皇采用其説以為周得火徳胡三省注衍以周得火徳蓋以火流王屋為周受命之符且服色尚赤故也秦代周從所不勝為水徳于是更命河為徳水始改年朝賀皆自十月朔衣服旌旄節旗皆尚黑水北方故黑色數以六為紀水成數六故以六寸為符六尺為步事統尚法臣瓚曰水陰陰主刑殺故尚法令分天下為三十六郡銷兵器徙豪傑於咸陽丞相綰等言諸侯初破燕齊荆避莊襄王諱故以楚為荆地逺不為置王無以填之請立諸子始皇下其議廷尉斯曰周封子弟同姓甚衆然後屬疎逺相攻擊如仇讐天子弗能禁今海内賴陛下神靈一統皆為郡縣諸子功臣以公税賦重賞賜之甚足易制天下無異意則安寧之術也置諸侯不便始皇曰天下共苦戰鬭不休以有侯王賴宗廟天下初定又復立國是樹兵也而求其寧息豈不難哉廷尉議是分天下為三十六郡三川河東南陽南郡九江鄣郡㑹稽潁川碭郡泗水薛郡東郡琅琊齊郡上谷漁陽右北平遼西遼東代郡鉅鹿邯鄲上黨太原雲中九原雁門上郡隴西北地漢中巴郡蜀郡黔中長沙凡三十五郡與内史為三十六郡郡置守掌治郡尉掌佐守典武職甲卒監御史掌監郡更命民曰黔首黔黒也凡民以黒巾覆頭故曰黔首收天下兵聚咸陽銷以為鐘鐻與虞同音巨所以懸鐘金人凡十二重各千石置宫庭中漢書五行志始皇二十六年有大人長五丈足履六尺凡十二人見于臨洮始皇以為瑞銷兵器作金人以象之一法度衡石丈尺徙天下豪傑于咸陽十二萬户築宫咸陽北坂徐廣曰在長安西北漢武時别名渭城寰宇記故渭城在咸陽東北上初諸廟及章臺在陜西西安府長安縣故城西南隅上林在長安縣西及盩厔鄠縣界秦舊苑漢武帝更増廣之皆在渭南及破諸侯寫放其宫室作之咸陽北坂上南臨渭自雍門徐廣曰在高陵縣高陵注見前以東至涇渭殿屋複道築起為道不與民庶相雜周閣周馳架木為棚而行名曰閣道相屬所得諸侯美人鐘鼓以充入之明年復作信宫即長信宫作于渭南已而以宫象天極更名極廟故址在今咸陽縣境及甘泉前殿闗輔記林光宫一名甘泉宫始皇造在池陽縣西池陽故城在今西安府涇陽縣西北治馳道天子所行道孔頴達曰如今御路也于天下是年帝巡隴西北地至雞頭山過回中秦隴西郡今甘肅臨洮鞏昌諸府地北地郡今甘肅平涼慶陽諸府地雞頭山亦曰笄頭山在今平涼府平涼縣西考史記黄帝西至崆峒登雞頭括地志以崆峒在肅州雞頭在原州又以雞頭為即崆峒今按史記原文崆峒雞頭自是兩山括地志前説為是後説為非回中宮在鳯翔府隴州西北今曰回城壬午二十八年帝東巡封泰山積土為封謂負土于山上壇而祭之泰山注見前禪梁父除地為墠後改曰禪梁父泰山下小山在今山東泰安府新泰縣西遂遊海上求神仙南渡江乃還始皇東行郡縣祠鄒嶧山亦曰繹山在山東兖州府鄒縣東南禹貢嶧陽詩魯頌鳬繹即此頌秦功業召魯儒生至泰山下議封禪或曰古者封禪為蒲車惡傷山之土石草木掃地而祭席用葅稭議各乖異葅音祖茅藉也稭讀曰戛禾槀也去其皮以為席始皇以其難施用遂絀儒生除車道上自山陽至巔立石頌徳從陰道下禪于梁父封藏皆秘之世不得而記也始皇上泰山中坂遇暴風雨休于樹下因封其樹為五大夫遂東遊海上祠山川八神史記封禪書八神一曰天主祠天齊淵水二曰地主祠泰山梁父三曰兵主祠蚩尤四曰陰主祠三山五曰陽主祠之罘六曰月主祠之萊七曰日主祠成山八曰四時主祠琅琊南登琅琊山名在今山東青州府諸城縣東南作臺水經注臺基三層層高五丈刻石徙黔首三萬户于臺下立石刻頌秦徳明得意初燕人宋無忌史記索隱白澤圖云火之精曰宋無忌蓋其人火仙也羨門子高綱目集覽應劭曰羨門古仙人也字子高居碣石山上一曰羨門髙之徒稱有仙道形解即尸解銷化之術自齊威宣燕昭王皆信之使人入海求蓬萊方丈瀛洲云此三神山在渤海中初學記東海之别有渤澥故東海共稱渤海又曰滄海去人不逺患且至則風引船去嘗有至者諸仙人及不死藥皆在焉其物禽獸盡白黄金銀為宫闕未至望之如雲及到三神山反居水下臨之風輒引去終莫能至云至是方士徐市徐氏徐子之後以國為氏等上書請得齋戒與童男女求之于是遣市發童男女數千人入海船交海中皆以風為解曰未能至望見之焉始皇還過彭城注見前齋戒禱祠欲出周鼎泗水史記封禪書秦滅周周九鼎入于秦或曰宋太邱社亡而鼎沒于泗水彭城下使千人沒水求之弗得水經注泗水南逕彭城縣故城東秦始皇求周鼎不得所謂鼎洑也乃西南渡淮浮江至湘山祠湘山一名君山亦曰洞庭山在湖南岳州府巴陵縣西南洞庭湖中水經注是山湘君之所遊處故曰君山湘君舜二妃也君山有湘妃廟逢大風幾不能渡上問湘君何神博士對曰堯女舜妻葬此始皇大怒使刑徒三千人伐湘山樹赭赤也其山遂自南郡注見前由武闗歸癸未二十九年帝東遊至陽武秦縣今屬河南開封府韓人張良字子房皇甫謐曰良韓之公族姬姓秦索賊急乃更姓名狙擊狙玃屬狙伺物必伏而候之故凡伏而擊者為狙擊誤中副車屬車也應劭漢官儀天子屬車三十六乘令天下大索十日不得初韓人張良五世相韓良大父開地相韓昭侯宣惠王襄哀王父平相釐王桓惠王及韓亡良散千金之産弟死不葬欲為韓報仇始皇東遊至陽武博浪沙中今陽武縣有故城在縣東南秦陽武城也博浪沙在其南良令力士操鐵錐良嘗學禮淮陽東見倉海君得力士為鐵錐重百二十斤狙擊始皇誤中副車始皇驚求弗得令天下大索十日良乃更姓名亡匿下邳秦縣故城在今江南徐州府邳州東乙酉三十一年更名臘禮記月令注臘即周禮所謂蜡祭也蔡邕獨斷臘者嵗終大祭縱吏民燕飲曰嘉平自惠文王十二年初臘至是改曰嘉平茅盈内紀先是邑有歌謠曰神仙得者茅初成帝欲學之臘嘉平始皇聞之欣然有尋仙之意遂改臘曰嘉平是年命黔首自實田自具頃畆實數也丙戌三十二年帝巡北邊使將軍䝉恬伐匈奴先是帝之碣石刻碣石門壊城郭決通隄防絫孔安國書傳碣石海畔山水經注縣碣石山枕海山有大石如柱形世名天橋柱絫縣故城在今直𨽻永平府昌黎縣南使燕人盧生姜姓之後封于盧以國為氏求羨門子高還奏録圖書曰亡秦者胡也始皇乃巡北邊遣將軍䝉恬發兵三十萬人北伐䝉恬斥逐匈奴收河南地秦為新秦中漢為朔方郡隋唐為勝州豐州明為河套今為鄂爾多斯地為四十四縣築長城起臨洮秦縣今甘肅鞏昌府岷州是以地臨洮水故名洮水出鞏昌府洮州西傾山逕蘭州府臯蘭縣入黃河至遼東今府盛京奉天府東南境及錦州東北境皆秦遼東郡地延袤延長也南北曰袤萬餘里恬常居上郡今陜西綏徳州秦上郡治統治之事在三十三年始皇復使恬除直道道九原注見前抵雲陽故城在陜西西安府涇陽縣西北塹山堙谷千八百里數年不就事在三十五年丁亥三十三年略取南越即百越亦曰揚越漢書注南越芈姓與楚同祖國語曰芈姓䕫越是也地置桂林今廣西桂林平欒及梧潯栁諸府地南海今廣東廣韶潮惠肇高南雄諸府地象郡其地廣逺今廣東亷雷二府廣西慶逺太平諸府及安南國皆是發諸嘗逋亡人及贅壻史記集解男無聘財以身自質于妻家曰贅索隱曰如人身之有肬贅也賈人為兵略取南越陸梁地史記正義嶺南人多處山陸間其性强梁故曰陸梁置三郡以謫徙民五十萬人戍五嶺水經注五嶺最東曰大庾第二曰騎田第三曰都龎第四曰萌渚最西曰越城大庾在今廣東南雄府保昌縣北騎田一曰上嶺山又曰黃岑山在今湖南郴州南都龎亦曰永明嶺在今湖南永州府永明縣北萌渚在今永州府江華縣西南越城亦曰始安嶺在今廣西桂林府興安縣北與越雜處彗星見戊子三十四年燒詩書百家語始皇置酒咸陽宫僕射秦官顔師古曰僕主也射如字古者重武事每官必有主射督課之故名周青臣周之後人號曰周家因以為氏進頌曰陛下平定海内以諸侯為郡縣上古所不及始皇悦博士淳于越春秋州公亦曰淳于公其後以國為氏曰殷周之王千餘嵗封子弟功臣自為枝輔今陛下富有四海而子弟為匹夫卒有田恒六卿之臣田恒篡齊六卿分晉事俱見前何以相救事不師古而能長久非所聞也始皇下其議丞相李斯言五帝不相復三王不相襲越言乃三代之事何足法也異時諸侯並爭厚招遊學今天下已定法令出一諸生不師今而學古聞令下則各以其學議之入則心非出則卷議誇主以為名異趣以為高率羣下以造謗如此弗禁則主勢降乎上黨與成乎下臣請史官非秦記皆燒之非博士官所職天下有藏詩書百家語者皆詣守尉雜燒之偶語詩書者棄市以古非今者族吏見知不舉與同罪令下三十日不燒黥為城旦黥墨刑城旦旦起行治城四嵗刑也所不去者醫藥卜筮種樹之書欲學法令者以吏為師制曰可己丑三十五年營朝宫作前殿阿房亦曰阿城在陝西西安府長安縣西北史記阿房宫未成成欲更令名名之作宮阿房故天下謂之阿房宫索隱此以形名宫言其四阿旁廣也始皇以咸陽人多先王宫廷小乃營朝宫渭南上林苑中先作前殿阿房東西五百步南北五十丈上可以坐萬人下可以建五丈旗周馳為閣道自殿下直抵南山在西安府南自終南太白連延至商嶺皆是表山巔以為闕複道渡渭屬之咸陽隱宫史記正義餘刑見于市朝宫刑一百日隱于蔭室故曰隱宫下蠶室是也徒刑奴役也以罪供徭作者七十餘萬人分作阿房驪山闗中闗中記東自函闗西至隴闗二闗之間謂之闗中計宫三百闗外四百餘因徙三萬家驪邑臨潼縣東有驪戎城秦驪邑漢改曰新豐五萬家雲陽注見前盧生説始皇㣲行以避惡鬼所居宫毋令人知然後不死之藥始可得也始皇乃令咸陽旁三百里内宮觀複道相連帷帳鐘鼓美人充之各按署不移徙所行幸有言其處者死于是羣臣莫知行之所在受決事者悉于咸陽宫始皇嘗從梁山宫望見丞相車騎甚衆弗善也或告丞相丞相損之始皇怒曰此中人泄吾語捕時在旁者盡殺之梁山宫在陜西乾州永夀縣西北阬諸生使長子扶蘇監蒙恬軍侯生説苑曰韓客盧生相與譏議始皇因亡去始皇聞之大怒曰諸生或為妖言以亂黔首使御史按問之秦制御史掌討姦猾治大獄諸生傳音轉相告引乃自除犯禁者四百六十餘人皆阬之咸陽臨潼縣西南舊有阬儒谷唐明皇改曰旌儒鄉長子扶蘇諫曰諸生皆誦法孔子今以重法繩之臣恐天下不安始皇怒使北監䝉恬軍于上郡庚寅三十六年星隕東郡秦取魏地置東郡治濮陽今直隷大名府開州是為石有墜星下東郡至地為石或刻其石曰始皇死而地分使御史逐問莫服盡誅石旁居人燔其石是秋有使者從闗東夜過華陰有人持璧遮使者曰為吾遺滈池君因言曰今年祖龍死使者問其故忽不見置其璧去使者奉璧具以聞始皇黙然良久曰山鬼固不過知一嵗事退而使御府視璧乃二十八年行渡江所沈璧也曰滈池君服䖍曰水神也祖龍蘇林祖始也龍人君象謂始皇辛夘三十七年帝東巡至沙邱注見前崩丞相李斯宦者奄宦中官也趙高諸趙疎逺屬矯遺詔立少子胡亥為太子殺扶蘇及䝉恬還至咸陽胡亥襲位是為二世皇帝十月癸丑始皇出遊丞相斯從少子胡亥愛慕請從許之至雲夢澤名在今湖北徳安府安陸縣南本二澤雲在江北夢在江南方八九百里後悉為邑居聚落因併稱之曰雲夢望祀虞舜于九疑山在今湖南永州府寧逺縣南九峯相似望而疑之故名浮江下渡海渚史記正義括地志以海渚在舒州按舒州在江之中疑海字誤過丹陽秦縣故城在今太平府當塗縣東名丹陽鎮考丹陽有楚丹陽吴丹陽楚丹陽熊繹所封在今歸州及枝江者是也吴丹陽秦為縣漢因之在當塗者是也後漢武帝置丹陽郡乃于縣稱小丹陽以别之至錢塘今縣浙江杭州府治臨浙江水波惡乃西百二十里從陿中渡州浙江注見前陿中在今杭府餘杭縣上㑹稽注見前祭大禹望于南海立石頌徳還過吴從江乘故城在今江寧府句客縣北渡並海上北至琅琊之罘山名在今山東登州府福山縣東北見巨魚射殺之始皇夢與海神戰如人狀占之博士曰神不可見以大魚蛟龍為候乃命以連弩候魚出射之自琅琊至成山弗見至之罘見巨魚射殺一魚西至平原津平原趙邑注見前而病始皇惡言死羣臣莫敢言死事病益甚乃令中車府令秦官屬太僕行符璽事趙高為書賜扶蘇曰與喪㑹咸陽而葬未付使者七月始皇崩于沙邱丞相斯恐諸公子及天下有變秘不發喪棺載輼涼車卧車也有牕牖閉則温開則涼故名後因載喪飾以栁翣遂為喪車中所至上食奏事如故獨胡亥趙高及所幸宦者五六人知之初始皇尊寵蒙氏恬任外將恬弟毅常居中參謀議名為忠信趙高者生而隱宫始皇聞其强力通獄法以為中車府令使教胡亥決獄嘗有罪使毅治之毅當高法應死始皇赦之復其官高既幸于胡亥又怨䝉氏乃與胡亥謀詐以始皇命誅扶蘇而立胡亥為太子胡亥然之高曰不與丞相謀恐事不成乃見李斯曰上賜長子書及符璽皆在胡亥所定太子在君侯與高之口耳事將何如斯曰安得亡國之言此非人臣所當議也高曰君侯材能智慮功高無怨長子信之孰與䝉恬斯曰皆不及也高曰長子即位必用恬為丞相君侯終不懐通侯應劭曰舊曰徹侯徹通也言其上通王室也後避漢武諱故曰通侯之印歸鄉里明矣胡亥仁慈篤厚可以為嗣願君審計而定之斯以為然乃相與矯詔立胡亥為太子更為書賜扶蘇數以不能立功數上書誹謗怨望而恬不矯正皆賜死扶蘇發書泣欲自殺恬曰陛下使臣將三十萬衆守邊長子為監此天下重任也今一使者來安知其非詐復請而死未暮也扶蘇曰父賜子死尚安復請即自殺恬不肯死使者屬吏繫諸陽周故城在今甘肅慶陽府真寧縣北更置李斯舎人為䕶軍秦有䕶軍都尉還報胡亥知扶蘇已死即欲釋恬㑹毅出禱山川還高曰先帝欲立太子久矣而毅以為不可不若誅之乃繫諸代遂從井陘抵九原㑹暑輼車臭乃詔從官令車載一石鮑魚以亂之鮑魚䱒魚也從直道至咸陽發喪胡亥襲位趙高用事日夜毁惡蒙氏二世遂殺恬兄弟兄子子嬰諫曰䝉氏秦之大臣一旦棄之而立無節行之人是使羣臣不相信而鬭士之意離也二世不聴使御史曲宫之代賜毅死又遣使者至陽周怙對使者曰吾積功信于秦四世矣今將共三十餘萬身雖囚繫其勢足以倍畔然自知必死而守義者不敢辱先人之教而忘先帝也乃吞藥自殺九月葬驪山注見前下錮三泉冶銅錮塞下至三重之泉竒器珍怪徙藏滿之令匠作機弩有穿近者輒射之以水銀為百川江河大海機相灌輸上具天文下具地理後宫無子者皆令從死葬既已工匠為機者盡閉之無復得出二世皇帝壬辰元年綱目于是嵗即分列楚趙齊燕魏諸國考諸國不久即滅亡今不更為分注二年三年所建國亦倣此冬十月大赦春帝東行至碣石並海南至㑹稽而還二世東行郡縣李斯從盡刻始皇所立刻石旁著大臣從者姓名以章先帝成功盛徳夏四月殺諸公子公主二世謂趙高曰人生居世間猶騁六驥過決隙決裂也裂開之隙言其狹小也吾欲悉耳目之所好窮心志之所樂以終吾年壽可乎高曰此賢主之所能行而昬亂主之所禁也然沙邱之謀諸公子及大臣皆疑焉今陛下初立此其意怏怏皆不服恐為變陛下安得為此樂乎二世曰為之奈何高曰嚴法刻刑誅滅大臣宗室收舉遺民貧者富之賤者貴之盡除故臣更置所親信陛下則高枕肆志寵樂矣二世然之乃更為法律益務刻深大臣諸公子有罪輒下高鞫治公子十二人僇死咸陽市十公主矺竹格反磓也死于杜即杜陵故城在西安府咸寧縣東南相連逮者不可勝數公子將閭昆弟三人囚于内宫將殺之將閭仰而呼天者三兄弟皆自殺公子高欲奔恐收族上書請從死先帝得葬驪山之足二世大悦賜錢以葬復作阿房宫初始皇作阿房未就而崩遂罷其役至是二世復營之并徴材士如淳曰有材多力之士五萬人為衛狗馬禽獸當食者多調郡縣轉輸菽粟芻稾皆令自齎糧食咸陽三百里内不得食其穀秋七月陳勝字涉陽城人吴廣字叔陽夏人起兵于蘄今江南鳳陽府宿州南蘄縣故城是勝自立為楚王以廣為假王擊滎陽注見前是時發閭左閭里門應劭曰秦以謫發戍先發吏有過及贅壻賈人嘗有市籍者曹輩盡復入閭取其左發之未及發右而秦亡顔師古曰閭左之釋應最得之戍漁陽故城在順天府密雲縣西南者九百人屯大澤鄉在宿州西南陳勝吴廣為屯長㑹天大雨道不通度已失期法皆斬勝廣乃相與謀勝曰天下苦秦久矣今誠以吾衆為天下倡宜多應者廣以為然共殺將尉尉官名將領戍卒故曰將尉召令徒屬曰公等皆失期當斬假令毋斬而戍死者固什六七且壯士不死則已死則舉大名耳王侯將相寧有種乎衆皆從之乃詐稱公子扶蘇扶蘇被殺百姓未知其死項燕燕之死或以為亡去為壇而盟稱大楚勝自立為將軍廣為都尉攻大澤鄉抜之攻蘄蘄下徇蘄以東行收兵比至陳車六七百乘騎千餘卒數萬人陳守丞戰死遂入據之初大梁人張耳陳餘耳及魏公子無忌時為客餘年少父事耳為刎頸交在陳為里監門秦滅魏重賞購二人二人變姓名俱之陳為監門以自食陳勝既入陳耳餘詣門上謁勝素聞二人賢見之大喜陳中豪傑父老請立勝為楚王勝以問耳餘對曰秦為無道滅人社稷暴虐百姓將軍出萬死之計為天下除殘今始至陳而王之示天下私願將軍毋王急引兵而西遣人立六國後自為樹黨如此野無交兵六國皆為與國則兵不交鋒誅暴秦據咸陽以令諸侯則帝業成矣不聴遂自立為王號張楚劉徳曰若云張大楚國也相勝少時嘗與人傭耕隴上悵然甚久曰茍富貴無忘傭者笑曰若為傭耕何富貴也勝太息曰嗟乎燕雀安知鴻鵠之志哉及為王其故嘗與傭耕者聞之乃之陳伺勝出遮道而呼勝乃載與俱歸入宫見殿屋帷帳曰夥頤涉之為王沈沈者夥頤方言嘆其物盛大而多之辭當是時諸郡縣苦秦法皆殺其長吏以應勝使從東方來以反者聞二世怒下之吏後至者曰羣盜鼠竊狗偷郡守尉方捕逐今盡得不足憂也乃悦勝以廣為假王監諸將擊滎陽廣尋為裨將田臧所殺廣圍滎陽李斯子由為三川守拒之廣不能下田臧以廣不知兵矯勝令殺之而奉其首于勝勝即以臧為上將西迎秦軍臧敗死事在二年楚遣諸將徇趙魏以周文為將軍將兵至戲今臨潼縣東北有戲亭戲水所逕戲水出驪山入渭少府秦官掌山林池澤之税章邯齊太公支孫封鄣其後去邑為章氏邯字少榮拒之楚兵敗走綱目于是條大書楚以周文為將軍將兵伐秦劉友益曰夷秦于列國也考史例紀一朝之事則以一朝為統秦雖無道二世猶居帝位綱目既用以紀年不應直斥為秦且于此以後既已書秦而望夷之弑則又書帝書法亦不畫一今于提綱改書其目及分注依左傳稱周人之例仍稱秦漢以後各朝皆同此張耳陳餘請兵略趙地勝以所善陳人武臣武氏宋武公之後以諡為氏為將軍耳餘為校尉予卒三千人徇趙又令魏人周市徇魏聞周文陳之賢人文名章嘗為項燕軍視日事春申君日視日占時吉凶之官習兵與之將軍印使西擊秦勝既遣周文有輕秦之意不復設備博士孔鮒斌之子字子魚孔子八世孫陳涉之王魯諸生持孔氏禮器歸之故鮒為涉博士諫曰臣聞兵法不恃敵之不我攻恃吾之不可攻今王恃敵而不自恃若跌而不振悔無及也不聴文行收兵車千乘卒數十萬至戲軍焉二世乃大驚少府章邯請赦驪山徒悉發以擊楚軍大敗之周文走出闗至澠池自刎死事在二年八月楚將武臣自立為趙王武臣等從白馬渡河白馬津名注見前收兵得數萬人號武信君下趙十餘城餘皆城守乃引兵擊范陽秦縣故城在今直𨽻保定府定興縣范陽人蒯徹晉大夫蒯得食采于蒯後以為氏徹史記避漢武諱改曰通説武臣曰范陽令徐公畏死而貪欲降君君無以為秦所置吏誅殺而以侯印授之使馳驅燕趙之間則燕趙諸城可無戰而降矣從之不戰而下者三十餘城張耳陳餘怨陳王不以為將軍而以為校尉又聞周文敗走乃勸武臣自立為趙王餘為大將軍耳為丞相使人報陳王陳王大怒欲族武臣家柱國房君姓蔡名賜上蔡人為勝上柱國諫曰秦未亡而誅武信君等家此生一秦也不如因而賀之使急引兵擊秦陳王從其計使使者賀趙趣發兵西入闗耳餘勸武臣毋西兵而北徇燕代南收河内以自廣武臣以為然因不西兵使韓廣畧燕李良畧常山張黶畧上黨九月劉邦起兵于沛今縣屬江南徐州府自立為沛公漢高祖事始此劉邦字季沛豐邑應劭曰沛縣豐鄉也中陽里人為人隆準龍顔隆高準鼻顔額顙也愛人喜施意豁如也有大度不事家人生産作業初為泗上亭長秦法十里一亭亭長主亭之吏今沛縣東有泗水亭括地志漢高祖㣲時為亭長于此常繇咸陽縱觀秦皇帝喟然太息曰大丈夫當如此也單父秦縣故城在今山東曹州府單縣南人吕公好相人竒其狀貌以女妻之即吕后既而為縣送徒驪山徒多道亡自度比至皆亡之到豐西止飲夜乃解縱所送徒曰公等皆去吾亦從此逝矣徒中壯士願從者十餘人季被酒夜徑澤中有大蛇當徑季抜劍斬蛇有老嫗哭曰吾子白帝子也化為蛇當道今赤帝子殺之因忽不見季亡匿芒碭山在徐州府碭山縣東與河南歸徳府永城縣接界中數有竒怪所居上常有雲氣吕后與人從往即得之沛中子弟聞之多欲附者及陳勝起沛令欲應之掾主吏秦制官各有掾屬正曰掾副曰屬主吏功曹也蕭何曹參蕭與曹皆以國為氏何參俱沛人曰君為秦吏今背之恐子弟不聴願召諸亡在外者以劫衆乃召劉季季之衆已數十百人矣令悔閉城欲誅蕭曹蕭曹恐踰城保劉季季乃書帛射城上遺沛父老為陳利害父老乃率子弟殺令迎季立以為沛公蕭曹為收子弟得二三千人以應諸侯祠黃帝旗幟皆赤楚項梁起兵于吴項梁下相故城在今江南徐州府宿遷縣西人楚將項燕子也嘗殺人與兄子籍避仇吴中吴中賢士大夫俱出其下吴中每有大繇役及喪梁常主辦陰用兵法部勒賓客及子弟以是知其能籍字羽少時學書不成去學劍又不成梁怒之籍曰書足記姓名而已劍一人敵不足學學萬人敵梁乃教籍兵法籍大喜略知其意又不肯竟學籍長八尺餘力能扛舉也鼎才器過人始皇東遊㑹稽渡浙江梁與籍觀籍曰彼可取而代也梁掩其口曰無妄言族矣㑹稽守殷通武王克商子孫分散以殷為氏素賢梁聞陳勝起欲發兵應勝使梁將梁請召籍籍入梁眴音舜動目而使之也籍籍抜劍斬守梁持守頭佩其印綬門下驚擾籍所擊殺數十百人府中皆讋伏莫敢起召故所知豪吏諭以所為起大事遂舉吴中兵收下縣得精兵八千人梁部署豪傑為校尉候司馬有一人不得官自言梁曰某時某喪使公主某事不能辦以故不任公衆乃皆服梁自為㑹稽守籍為裨將籍時年二十四齊田儋自立為齊王儋故齊王族也與從弟榮榮弟横皆豪健宗彊能得人周市略地至狄注見前儋殺狄令而召豪吏子弟曰諸侯皆反秦自立齊古之建國儋田氏當王遂自立擊市走之東略定齊地趙將韓廣自立為燕王韓廣至燕燕豪傑立以為王廣以其母在趙不許燕人曰楚不敢害趙王將相之家趙安敢害將軍母乎廣乃立居數月趙奉其母歸之趙王與張耳陳餘北略地燕界趙王間出為燕軍所得囚之欲求割地使者數往燕輒殺之有厮養韋昭曰析薪為厮炊烹為養卒走燕壁見燕將曰君知張耳陳餘何欲曰欲得其王耳卒曰君未知此兩人所欲也夫武臣張耳陳餘杖馬箠下趙數十城此亦各欲南面而王顧其勢初定且以少長先立武臣今趙地已服此兩人方欲分趙而王今君乃囚趙王此兩人名為求王實欲燕殺之而分趙自立夫以一趙尚易燕况以兩賢王左提右挈而責殺王之罪滅燕易矣燕將乃歸趙王卒為御而歸楚將周市立魏公子咎為魏王而相之周市已定魏地魏人欲立為王市曰天下昏亂忠臣乃見必立魏王後乃可齊趙各遣使立市市不受時魏故公子甯陵君咎甯陵注見前在陳王所市迎之使五反陳王乃遣咎市立為王而相之秦廢衛君角為庶人衛自康叔至君角凡三十七傳而為秦滅初秦并天下而衛獨存至是二世廢之衛祀遂絶癸巳二年趙將李良弑其君武臣張耳陳餘立趙歇為王李良已定常山還報趙王復使略太原至井陘還請益兵時秦兵方塞井陘道道逢趙王姊良以為王伏謁道旁王姊醉不知其將使騎謝之良起慚其從官從官或請追殺之良先得秦將書詐為二世招良意欲反趙未決因此怒使人追殺王姊遂襲邯鄲殺武臣趙人多為張耳陳餘耳目者故兩人得脱收散兵得數萬人擊李良良敗走歸章邯客或説耳餘曰兩君羇旅難可獨立立趙後輔以誼可就功乃求得歇立之居信都今直𨽻冀州是故城在州治東北章邯等擊敗楚軍楚莊賈弑其君勝降吕臣討殺賈復以陳為楚二世益發兵遣長史秦官丞相屬司馬欣都尉秦官名董翳晉董狐之裔佐章邯擊楚柱國房君殺之又進擊陳西軍張賀陳王出監戰軍敗張賀死臘月張晏曰秦之臘月夏之九月陳王至下城父今江南潁州䝉城縣西北有下城父聚以近故城父縣故加下其御莊賈殺之以降陳王故涓人即中涓顔師古曰主居中而潔除之人吕臣為蒼頭軍蒼頭注見前起攻陳殺賈復以陳為楚葬陳王于碭今江南徐州府碭山縣有故碭城在縣南諡曰隱初勝既為王故人皆往依之妻之父亦往焉勝以衆賓待之長揖不拜妻之父怒而去故人出入或言勝故情勝聞而斬之諸故人皆引去以朱防為中正胡武為司過主司羣臣以苛察為忠諸將不親附以及于敗秦嘉魯有秦董父其後以邑為氏又嬴秦之支以國為氏立景駒楚公族為楚王陳王初起時淩秦縣故城在今江南徐州府宿遷縣東南人秦嘉銍秦縣今江南鳳陽府宿州西南有銍城人董緤符離今宿州人朱雞石取慮音秋閭秦縣故城在今徐州府睢寧縣西南人鄭布徐本徐國楚滅之為縣徐國注見前人丁疾等皆特起將兵圍東海今江南海州守于郯今郯城縣屬山東沂州府陳王聞使武平君畔為將軍監郯下軍秦嘉不受命自立為大司馬殺武平君畔及陳王軍破嘉乃立景駒為楚王左右校秦官即左右校尉攻陳下之吕臣走得英布英氏臯陶之後以國為氏軍還復取陳英布六春秋六國秦為縣六國注見前人嘗坐法黥故曰黥布論輸驪山驪山之徒數十萬人布皆與其徒長豪傑交通乃亡之江中為羣盜番陽今縣曰鄱陽屬江西饒州府令吴芮甚得江湖間心號曰番君布往見之其衆已數千人番君以女妻之使將其兵擊秦吕臣方敗走與布遇乃以其兵還破秦軍陳復為楚布引兵而東沛公得張良以為廏將主馬官初沛公破秦軍于豐秦為鄉今縣屬徐州府令雍齒雍氏周雍伯之後以國為氏守之而之薛注見前齒雅不欲屬沛公魏人招之即反為魏守豐沛公引兵攻之不能取聞景駒新立在留秦縣今為留城鎮在徐州府沛縣東往從之時張良亦聚少年百餘人欲往從景駒遇沛公于下邳注見前遂屬焉沛公拜良為廏將良數以太公兵法説沛公沛公善之常用其策為他人言皆不省良曰沛公殆天授遂留不去景駒使沛公與秦戰不利攻碭下抜之得兵五六千人還擊豐不項梁擊景駒殺之夏六月立楚懐王孫心為楚懐王韓公子成為韓王廣陵今江南揚州府治秦為廣陵縣人召平召氏召公之後以邑為氏為楚徇廣陵未下聞陳王敗乃渡江矯王令拜項梁為上柱國曰江東已定急引兵西擊秦梁乃以八千人渡江而西聞陳嬰已下東陽秦縣故城在今江南泗州天長縣西北遣使欲與連和俱西陳嬰者故東陽令史素信謹稱長者東陽少年殺其令相聚二萬人欲立嬰為王嬰母曰暴得大名不祥不如有所屬事成猶得封侯事敗易以亡非世所指名也嬰乃謂軍吏曰項氏世世將家有名于楚今欲舉大事將非其人不可衆從之嬰以兵屬梁及渡淮英布蒲將軍亦以兵屬焉梁衆凡六七萬人軍下邳梁曰陳王首事戰不利未聞所在今秦嘉立景駒大逆無道乃進兵擊殺嘉駒走死至薛沛公往見之梁予卒五千人還抜豐雍齒奔魏使項羽攻襄城注見前不下已抜皆阬之梁聞陳王定死召諸别將㑹薛計事時沛公亦從沛往居鄛亦作巢秦縣故城在今江南廬州府巢縣人范増年七十好竒計往説梁曰陳勝敗固當夫秦滅六國楚最無罪自懐王入秦不反楚人憐之至今故楚南公漢書藝文志南公三十一篇陰陽家流曰楚雖三户亡秦必楚言楚怨秦雖三户猶足亡秦後項羽破章邯于三戸津邯降羽秦遂亡乃讖也今勝首事不立楚後而自立其勢不長今君起江東楚蠭起之將皆爭附君者以君世世楚將為能復楚之後也梁然其言乃求得懐王孫心于民間為人牧羊六月立以為楚懐王從民望也都盱眙今縣屬江南泗州以陳嬰為上柱國梁自號武信君張良説梁曰君已立楚後韓公子橫陽君成最賢可立為王益樹黨梁從之立為韓王以良為司徒西略韓地得數城秦輒復取之往來為游兵潁川秦郡注見前章邯擊魏齊楚救之齊王儋魏相市敗死魏王咎自殺章邯擊魏王于臨濟後漢書郡國志陳留郡平邱有臨濟亭齊田儋死此平邱注見前魏使周市求救于齊楚齊王及楚將項它皆將兵隨市救魏章邯夜銜枚擊大破之殺齊王及周市魏王為其民約降約定自燒殺其弟豹走楚齊人立田假為王故王儋弟榮逐假立儋子市為王而相之假王建弟也齊人聞田儋死立以為王田角為相田間為將儋弟榮收儋餘兵走東阿春秋柯邑秦曰東阿柯邑注見前章邯追圍之項梁引兵擊破章邯軍章邯走而西田榮東歸項梁獨追北梁别遣項羽沛公攻城陽屠之復攻定陶西畧地至雍邱與秦軍戰破之斬李由見城陽定陶雍邱注俱前八月田榮逐王假假亡走楚田角走趙田間前使趙因留不敢歸立儋子市為王榮相之田橫為將平齊地項梁追逐秦軍數使使者趣齊兵俱西榮曰楚殺田假趙殺田角田間乃發兵楚趙不許田榮怒終不肯出兵下右丞相去疾左丞相斯吏去疾自殺斯要斬夷三族以宦者趙高為中丞相二世數誚讓李斯居三公位如何令盜如此斯恐懼重爵禄不知所出乃阿二世意請修申韓之術行督責之道且言督責必則所求得羣臣百姓救過不給何變之敢圖二世悦于是行督責益嚴刑者相半于道民益駭懼思亂郎中令趙高恃恩專恣多以私怨殺人恐大臣言之乃説二世曰天子所以貴者但以聞聲羣臣莫得見其面故號曰朕且陛下富于春秋未必盡通諸事今坐朝廷譴舉有不當則見短于大臣非所以示神明也不如深拱禁中與臣及侍中秦官應劭曰入侍天子故曰侍中習法者待事來揆之則大臣不敢奏疑事天下稱聖主矣二世乃不坐朝廷事皆決于高高知李斯將以為言乃見斯曰闗東羣盜多而上益發繇役聚狗馬無用之物君何不諫斯曰上居深宫欲見無間高曰請候上間語君于是待二世方燕樂婦女在前使人告斯可奏事矣斯至上謁如此者三二世怒高因曰沙邱之謀丞相與焉今陛下為帝而丞相貴不益其意亦望裂地而王矣且丞相長男由守三川楚盜陳勝等皆丞相傍縣之子傍縣近縣也斯上蔡人與勝陽城相近故云傍縣之子猶言子弟也以故公行過三川守不肯擊高聞其文書相往來未得其審故未敢以聞二世欲案丞相恐不審乃先使人按驗三川守與盜通狀斯聞之乃上書言趙高罪二世曰趙君為人精廉彊力下知人情上能適朕朕非屬趙君當誰任哉斯又與右丞相馮去疾將軍馮劫進諫請且止阿房宫作者減四邊戍轉戍征戍也轉轉運也二世曰君不能禁盜又欲罷先帝所為是上無以報先帝次不為朕盡忠力何以在位下吏按罪去疾劫自殺斯自負其辯有功無反心乃就獄二世屬高治之責與由反狀榜掠千餘斯不勝痛自誣服斯從獄中上書自陳前功幸二世寤而赦之高棄去不奏而使其客詐為御史謁者侍中更往來覆訊斯斯更以實對輒復榜之後二世使人驗斯斯以為如前終不更言所使案三川守由者至則楚兵已擊殺之矣高皆妄為反辭以相傅遂具斯五刑論秦法當三族者皆先黥劓斬左右趾笞殺之梟其首俎其骨肉于市謂之具五刑要斬咸陽市斯顧謂其中子曰吾欲與若復牽黃犬出上蔡東門逐狡兔豈可得乎遂父子相哭而夷三族二世乃以高為中丞相事皆決焉章邯擊破楚軍于定陶項梁死項梁既破章邯東阿西北至定陶又破之益輕秦有驕色宋義宋以國為氏諫曰戰勝而將驕卒惰者敗今卒少惰矣秦兵日益臣為君畏之梁不聴使宋義于齊道遇齊使者高陵君顯曰公將見武信君乎曰然曰臣論武信君必敗公徐行即免死疾行則及禍二世悉起兵益章邯擊楚軍大破之定陶項梁死項羽沛公方攻陳留秦縣今屬河南開封府臣瓚曰宋亦有留此留屬陳故名陳留聞梁死與吕臣俱引兵而東吕臣軍彭城東項羽軍彭城西沛公軍碭已而楚懐王自盱眙都彭城并吕臣項羽軍自將之以吕臣為司徒其父青為令尹沛公為碭郡長封武安侯號項羽為魯公封長安侯楚立魏豹為魏王豹之走楚楚王與卒數千人使徇魏地豹下二十城乃立為魏王章邯擊趙圍趙王于鉅鹿今直𨽻順徳府内鄉縣本趙鉅鹿邑秦置縣為鉅鹿郡治漢因之後魏改曰内鄉今之鉅鹿縣乃漢南䜌縣隋改曰鉅鹿者也楚以宋義為上將軍救之章邯既破項梁以楚地兵不足憂乃北擊趙破邯鄲張耳以趙王走入鉅鹿王離王翦之孫圍之陳餘北收兵得數萬人軍鉅鹿北章邯軍其南築甬道屬河饟王離王離兵食多攻益急趙數請救于楚楚王聞宋義先策武信軍必敗義所遇齊使者高陵君顯在楚言于楚王以義為知兵召與計事大説之以為上將軍項羽為次將范増為末將以救趙義號卿子冠軍卿子人相褒尊之辭冠軍言其在諸軍之上諸别將皆屬焉楚遣沛公西入闗初楚懐王與諸將約先入定闗中者王之是時秦兵尚彊諸將莫利先入闗獨項羽怨秦殺項梁奮憤激也願與沛公西入闗諸老將皆曰項羽為人慓悍猾賊所過無不殘滅且楚進取數敗謂陳涉項梁不如更遣長者扶義而西告喻秦父兄秦父兄苦其主久矣今誠得長者往無侵暴宜可下羽不可遣獨沛公素寛大長者可遣王乃遣沛公收陳王項梁散卒以西甲午三年楚次將項籍矯殺宋義而代之大破章邯軍虜王離宋義至安陽今山東曹州府曹縣東有安陽城即宋義留兵處留四十六日不進項羽曰秦圍趙急宜疾引兵渡河楚擊其外趙應其内破秦軍必矣宋義曰今秦攻趙戰勝則兵罷我承其敝不勝則我鼓行而西必舉秦矣因下令曰有猛如虎狠如羊貪如狼强不可使者皆斬之遣其子襄相齊送之無鹽故城在今山東泰安府東平州東飲酒高㑹天寒大雨士卒凍飢項羽曰今嵗飢民貧卒食半粟而飲酒高㑹不引兵渡河因趙食并力攻秦乃曰承其敝夫以秦之彊攻新造之趙其勢必舉何敝之承且國兵新破王坐不安席掃境内而屬將軍國家安危在此一舉今不恤士卒而徇其私非社稷之臣也晨朝義即其帳中斬之出令軍中曰宋義與齊謀反楚楚王陰令籍誅之諸將莫敢枝梧相與共立羽為假上將軍追宋義子及之齊殺之遣使報命于王王因以羽為上將軍鉅鹿城中兵少食盡張耳數召陳餘餘不敢前耳又使張黶陳澤讓之要與俱死餘使黶澤將五千人先嘗秦軍皆沒羽使當陽君即黥布蒲將軍顔師古曰布與蒲將軍乃二人服䖍以為一人非將二萬人渡河絶秦甬道戰少利言其稍有利也羽乃悉引兵渡河已渡皆沈船破釡甑燒廬舎持三日糧以示士卒必死無還心與秦軍遇九戰皆破之章邯引却遂虜王離時諸侯軍鉅鹿者十餘壁齊將田都燕將臧荼及齊王建孫田安來救張耳子敖亦北收代兵得萬餘人皆壁陳餘軍旁莫敢縱兵及楚擊秦皆從壁上觀楚戰士無不一當十呼聲動天地諸侯軍人人惴恐既破秦軍諸侯將入轅門張晏曰軍行以車為陳轅相向為門膝行而前莫敢仰視羽由是始為諸侯上將軍兵皆屬焉趙王及張耳出鉅鹿城謝諸侯張耳責讓陳餘問黶澤所在疑餘殺之餘怒解印綬與耳耳不受餘起如厠客或説耳急取之耳乃佩其印綬收其麾下餘遂與數百人去河上澤中漁獵二人由此有隙沛公擊昌邑秦縣故城在今山東兖州府金鄉縣西北彭越彭氏大彭之後以國為氏以兵從越昌邑人嘗漁鉅野澤即禹貢大野在山東曹州府鉅野縣北澤最廣大元末為黃河所決遂涸中為羣盜楚兵起澤間年少相聚百餘人請越為長越謝曰臣不願也彊請乃許之與期旦日日出㑹後期者斬至期多後或至日中于是越謝曰臣老諸君彊以為長今期多後不可盡誅誅最後者一人皆笑曰何至是請後不敢越竟斬之徒屬皆驚莫敢仰視乃略地收散卒得千餘人至是以其兵歸沛公沛公使酈食其酈音歴黃帝支孫封酈後以為氏食其音異基説陳留下之沛公過高陽此杞縣之高陽城注見前高陽人酈食其家貧落魄顔師古曰失業無次也為里監門時諸將略地過者皆握齱好苛禮自用不能聴大度之言酈生深自匿沛公麾下有騎士適食其里中子食其使言于沛公酈生謂騎士曰吾聞沛公慢而易人多大畧此真吾所願從遊若見沛公謂曰臣里中有酈生年六十餘長八尺人皆謂之狂生生自謂我非狂騎士曰沛公不好儒諸客冠儒冠來者沛公輒解其冠溲溺其中與人言常大罵未可以儒生説也酈生曰第言之騎士從客言如生所誡者沛公至傳舎使召酈生酈生至入謁沛公方踞床使兩女子洗足酈生長揖不拜曰足下欲助秦攻諸侯乎且欲率諸侯破秦也沛公罵曰豎儒天不同苦秦久矣故諸侯相率而攻秦何謂助秦攻諸侯乎酈生曰必聚徒合義兵誅無道秦不宜倨見長者于是沛公輟洗攝衣延生上坐問計生曰足下兵不滿萬欲以徑入彊秦此所謂探虎口者也夫陳留天下之衝又多積聚臣善其令請得使之令下令使下降也即不聴足下引兵攻之臣為内應于是遣酈生行而引兵隨之遂下陳留號生為廣野君為説客使諸侯生弟商亦聚衆四千人來屬沛公沛公使將陳留兵以從章邯以軍降楚章邯軍棘原在直𨽻順徳府平鄉縣南項羽軍漳南漳水之南漳水注見前相持未戰二世使人讓邯邯恐使長史欣請事留司馬門顔師古曰宫垣之内兵衛所在四面皆有司馬司馬主武事故總謂宫之外門為司馬門三日趙高不見欣恐走還不敢出故道趙高果使人追之不及至軍報曰趙高用事于中下無可為者今戰勝高疾吾功不勝不免于死願熟計之陳餘亦遺邯書書曰將軍為秦將三嵗所亡失已十數萬而諸侯並起兹益多彼趙高素䛕日久今事急亦恐二世誅之故欲以法誅將軍以塞責使人更代以脱其禍將軍有功亦誅無功亦誅且天之亡秦無愚智皆知之將軍何不與諸侯為從南面稱孤孰與身伏斧鑕妻子為戮乎章邯狐疑陰使羽約未成羽遣蒲將軍引兵渡三户漳水津也孟康曰在鄴西與秦戰再破之羽又擊敗之汙水在臨漳縣西南出武安山入漳今絶上邯遂請降羽乃與盟于洹水注見前南立以為雍王置楚軍中使長史欣將秦軍行前顔師古曰謂居前而行沛公入武闗沛公南攻潁川秦郡注見前因張良畧韓地文穎曰潁南北皆韓地以良累世相韓故因之出轘轅山名在河南府偃師縣東南元和志山路險阻凡十二曲將去復還故曰轘轅畧南陽南陽守齮戰敗走保宛今河南南陽府南陽縣楚宛邑秦為縣隋始改今名沛公引兵過之張良曰公雖欲急入闗秦兵尚衆距險今不下宛宛從後擊彊秦在前此危道也沛公乃夜從他道還圍宛齮舎人陳恢踰城見沛公約降恢曰聞足下約先入咸陽者王之今足下留守宛宛郡縣連城數十其吏民自以為降必死故皆堅守乘城足下盡日止攻士死傷者必多引兵去宛宛必隨足下後足下前則失咸陽之約後有彊宛之患為足下計莫若約降封其守因使止守引其甲卒與之西諸城未下者聞聲爭開門而待足下矣沛公曰善許之七月齮降封殷侯恢封千户引兵而西無不下者所過令毋得鹵與虜同掠秦民皆喜八月遂入武闗趙高弑帝于望夷宫在西安府涇陽縣東南立子嬰為王子嬰誅高夷三族趙高欲專秦權恐羣臣不聴乃持鹿獻于二世曰馬也二世笑曰丞相誤耶謂鹿為馬問左右或黙或言鹿高因陰中諸言鹿者以法後羣臣皆畏之莫敢言其過高前數言闗東盜無能為及是沛公已破武闗二世使責讓高高懼與其壻咸陽令閻樂閻以鄉為氏謀弑二世時二世將祠涇水二世夢白虎齧其左驂馬殺之卜曰涇水為祟故欲祠涇齋于望夷宫高詐為有大賊令樂發吏卒至宫殿門縛衛令秦衛尉掌宫門屯兵屬有衛士令僕射注見前殺之射郎秦官掌守門户宦者或走或格格者輒死樂與高弟郎中令成俱入射上幄坐幃二世怒召左右惶擾不鬭有宦者一人侍不去二世謂曰公何不早告我乃至于此對曰使臣早言皆已誅安得至今樂前數二世曰足下驕恣誅殺無道天下皆畔其自為計二世曰吾願得一郡為王弗許願為萬户侯又弗許願與妻子為黔首樂曰臣受命丞相為天下誅足下足下雖多言臣不敢報麾其兵進二世自殺趙高召諸大臣公子告曰秦故王國始皇君天下故稱帝今六國復立宜為王如故便乃立子嬰為秦王以黔首葬二世杜南宜春苑在西安府咸寧縣南漢曰宜春下苑中九月趙高令子嬰齋廟見受璽齋五日高使人請子嬰子嬰稱病不行子嬰與其二子及宦者韓謀曰丞相殺二世恐羣臣誅之乃詐以義立我聞高與楚約滅秦而分王闗中今使我見廟此欲因廟中殺我我稱病不行丞相必自來來則殺之高自往請子嬰遂刺殺高三族其家以徇沛公擊嶢闗即藍田闗在西安府藍田縣東南破之先是趙高既弑二世使人與沛公約分王闗中沛公不許及子嬰誅殺高遣將將兵距嶢闗沛公欲擊之張良曰秦兵方彊願益張旗幟為疑兵而使酈生陸賈齊宣王少子通封陸鄉因收為氏賈楚人往説秦將啗以利秦將果欲連和沛公欲許之良又曰不如因其怠而擊之沛公引兵繞嶢闗踰蕢山在藍田縣南擊秦軍大破之御批歴代通鑑輯覽卷十一

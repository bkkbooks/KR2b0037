  text: 欽定四庫全書御批厯代通鑑輯覽卷六十四唐昭宗皇帝庚戌大順元年春正月羣臣上尊號夏四月詔削奪李克用官爵屬籍以張濬為招討制置使孫揆副之會諸道兵討克用

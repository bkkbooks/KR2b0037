front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷九十六元世祖皇帝戌子至元二十五年春二月毁宋故宫為佛寺
  hash: sha256:188da0b9312e5d8b24a59d11abbe77d445115ef1118a75bc64e26a365a4b22f0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_095-1a, image: WYG0339/WYG0339-0037a.png}
body:
  text: 從僧格及嘉木楊喇勒智言凡宋宫殿郊廟悉毁為寺復欲取宋髙宗所書九經石刻為浮屠基杭州府推官申屠致逺力拒止之天大雨雪有司督民入山伐木死者四百人行省參政董文用曰非時役民民不堪矣宜少徐之不從三月帝如上都以鄭制宜鄭鼎子續綱目誤作鄭子鼎宋元通鑑因之謬甚今依本傳改正領樞密院事故事車駕如上都樞密院臣俱從行嵗留一人領院事漢人不得與焉至是以屬判官鄭制宜制宜遜辭帝曰汝豈漢人比耶竟留之托歡引軍還陳日烜邀擊敗之尋遣使來謝罪托歡復遣兵追日烜于海右丞相阿巴齊舊作阿八赤今改曰賊棄巢穴逺遁意待吾之敝而乗之將士皆北人春夏之交瘴癘將作賊弗就擒饋餉且盡吾不能持久矣時日烜復遣使請降以欵師諸將信其說久之不降擁衆據海口阿巴齊率衆攻之將士多被疫不能進諸蠻復叛所得險阨皆失守遂謀引還日烜復集散兵三十萬守東闗在安南國沼北有城遏托歡歸路諸軍且戰且行日數十合賊據險竊發毒矢將士裹瘡以戰樊楫阿巴齊皆死前軍蘓都爾舊作昔都兒今改奮勇乗之交人小却托歡由間道趨還日烜尋遣使入朝貢金人以代已罪帝以托歡無功而還令出鎮揚州終身不容入覲夏四月徴宋江西招諭使知信州謝枋得辭不至初枋得遁入建陽及程文海至江南訪求人才薦宋遺士三十人枋得亦在列枋得方居母喪遺書文海曰某所以不死者以九十三嵗之母在耳先妣以今年二月考終某自今無意人間事矣亡國之大夫不可與圖存李左車猶能言之況稍知詩書頗識義理者乎某之至愚極闇決不可以辱召命亦明矣既而留夢炎亦力薦之奏上枋得復遺書夢炎言江南無人才未有如今日之可恥者春秋以下之人物本不足道今欲求一人如瑕吕飴甥程嬰杵臼厮養卒亦不可得辯論凡數千百言卒不行江南盗起廣東民董賢舉浙江民楊鎮龍栁世英循州民鍾明亮各擁衆萬餘相繼而起明亮勢尤猖獗詔遣浙江行省丞相䝉古岱行樞密院副使頁特密實舊作月的述失䝉古岱傳作博羅哈思哈雅今改發四省兵討之明亮屢降復叛既而福建按察使王惲上疏言福建郡縣五十餘處連山距海實邊徼要區由平宋以來官吏殘虐故愚民往往嘯聚朝廷遣兵討之復致蹂踐甚非一視同仁之意況福建歸附之民户幾百萬黄華之變事見前十去四五今明亮之勢又烈于華其可以尋常草竊視之宜選精兵明號令以計取之可也御史夫夫伊囉勒亦言江南盜起凡四百餘處宜選將討之帝曰頁特密實屢以㨗聞䝉古岱已往卿毋以為慮也詔皇孫特穆爾太子珍第三子即成宗行邊納顔餘黨和爾果斯托克托呼𫝊作火魯哈孫續綱目作火魯火孫今改及哈坦等尚攻掠邊郡未下詔皇孫特穆爾北撫諸軍討之都指揮托克托呼竒卜察克國王子拜都察克之子舊作土土哈班都察今改擊破和爾果斯還復敗哈坦軍盡得遼左諸部置東路萬户府五月河決汴梁汴梁大霖雨河決太康通許把三縣陳潁二州皆被其害秋九月南臺御史中丞劉宣自殺時江浙行省丞相䝉古岱悍戾縱恣常慮臺臣紏劾其罪而尤畏宣日遣人入建康偵伺臺臣違失臺臣憚之隂求自解惟宣屹不為動䝉古岱益忌之因羅織宣罪逮繫其子于獄又令人妄言宣沮壞錢榖事聞遂遣使置獄行省鞫治之宣及御史六人俱就逮宣不勝憤遂自剄于舟中始宣將行以一緘付從子自誠令勿啟視宣死視其書云觸怒大臣誣搆成罪身為臺臣義不受辱當自引決但不獲以身徇國為恨耳嗚呼天乎實鑑此心聞者莫不悼惜之延祐中賜諡忠憲置徴理司冬十月遣使鈎考諸路錢榖初僧格摘委六部鈎考百司倉庫錢榖復以為不専其任遂置徴理司以主之時理算之計行入倉庫司錢榖者無不破産及當更代人皆棄家避之十月僧格又言湖廣錢榖已責償于平章約蘓穆爾他省欺盜必多請以參知政事實都等十二人理算江淮江西福建四川甘肅安西六省耗失之數給兵以衛其行詔皆從之既而行臺侍御史程文海入朝言天子之職莫大於擇相宰相之職莫大於進賢宰相不以進賢為急而惟以貨殖為心非為上為德為下為民之意今權姦用事立尚書省鉤考錢榖以割剥生民為務所委任者率皆貪饕邀利之人江南盜賊竊發良以此也臣竊以為宜清尚書之政損行省之權罷言利之官行恤民之事僧格大怒留京不遣奏請殺之者六帝皆不允遣瀛國公趙㬎學佛於吐蕃十一月立僧格輔政碑時天下騷然而江淮尤甚讒佞之徒方且諷請立石為僧格頌德帝曰民欲立則立之仍告僧格使之許也碑成樹之省前題曰王公輔政之碑十二月以董文用為御史中丞文用入為中丞首舉胡祇遹字紹聞磁州武安人王惲等十餘人為按察使徐琰魏初字太初𢎞州順聖人為行臺中丞當時以為極選㑹僧格當國貴戚見之皆屏息遜避文用獨不附之僧格使人諷文用頌己功不答又自謂文用曰百司皆具食丞相府矣亦不答時朔方軍興而徴求愈急文用曰民急矣外難未除而内傷其根本丞相宜思之因持郡國所上盗賊之目謂之曰百姓非不欲安樂急法暴斂至此御史臺所以救時政之不及丞相當有以助之不當抑之也僧格愈恨之日摭拾臺事譖於帝言文用戅傲沮法欲罪之帝曰彼御史職也何罪之有尋遷為大司農己丑二十六年春正月地震開㑹通河即今山東運河漕艘上下以牐啟閉謂之牐漕從夀張縣注見前尹韓仲暉等言也起須城縣即漢須昌縣後唐改名明省故城在今泰安府東平州安山在東平州西南下有湖湖旁有亭子店即古安民亭遺址汶濟合流處也今為運道所經曰安山鎮有牐西南由夀張西北至東昌又西北至臨清元魏縣明升為州今州屬東昌府引汶水以達御河與上汶水注俱詳前長二百五十餘里中建牐三十一以時蓄洩河成名曰㑹通初畢輔國始于堽城左汶水隂作一斗門遏汶入洸南通泗淮而未分於北至是始分流絶濟由壽張以北達于臨清剛堽城在兖川府寧陽縣東北即漢剛縣故城後訛為堽元人置斗門於此曰堽城堰明改為壩洸河在堽城壩西南本汶水支流自元人遏汶入之其流始盛今河由滋陽縣至濟寧州入運濟水即大清河注詳前二月以中書右氶相巴延知樞密院事將兵鎮和林和林置知院自巴延始三月庚辰朔日食夏四月禁江南民挾弓矢犯者籍為兵福建參知政事魏天祐執宋謝枋得至大都不屈死之初天祐見時方求才欲薦枋得為功遣使誘之入城與之言坐而不對或嫚言無禮天祐不能堪乃讓曰封疆之臣當死封疆安仁之敗事見前何不死枋得曰程嬰公孫杵臼二人皆忠於趙一存孤一死節王莽簒漢龔勝餓死司馬子長云死有重於泰山輕於鴻毛參政豈足知此天祐怒逼之北行枋得以死自誓自離嘉興即不食二十餘日不死乃復少茹蔬果積數月困殆四月朔至燕問太后攢所及瀛國公所在再拜慟哭疾甚留夢炎使醫持藥雜米飲進之枋得怒擲之於地不食五日死枋得天資嚴厲雅負竒氣風岸孤峭不能與世軒輊而以天時人事推宋必亡於二十年後毎論樂毅申包胥張良諸葛亮事常若有千古之憤者而以植世教立民彛為任貴富貧賤一不動其中死之後子定之䕶骸骨歸葬信州六月海都宼邊秋七月帝自將討之海都兵至和林宣慰使竒卜舊作怯伯今改等反應之時劉哈喇巴圖爾河東人本姓劉至元中賜名乗間脫歸報帝帝嘉賚之先是海都至杭愛在和林北元時置耕屯于此皇孫噶瑪拉太子珍戬長子舊作甘麻利今改率衆與戰失利被圍托克托呼引勁卒陷陣翼王出及帝親征至北邊謂托克托呼曰昔太祖與臣下同患難者飲班珠爾河注見前之水以紀功今日之事何愧昔人冬十月禁百官受饋酒食者内外百宫有犯之者籍其家貲之半閏月帝還大都十二月詔括馬先是令百官市馬助邊猶不足用復括天下馬充之其品官所乗者限數外悉令入宫以白絜矩為尚書省舍人紹興路總管府判官白絜矩言宋宗室居江南者百姓敬之不衰久之非便宜悉遷于京師僧格以聞擢為尚書省舍人遣之江南發兼併户偕宋宗室至京師既而江淮行省言江南之民方患增課料民括馬之苦今此舉必致人心揺動宜且止從之帝幸大聖夀萬安寺詔天下梵寺所貯藏經集僧誦之仍給所費嵗為例庚寅二十七年夏四月河北十七郡蝗秋八月辛未朔日食地大震九月赦天下武平即金大定府元初為武平路後改曰大寜明為衛注詳前尤甚地陷黒沙水涌出壞官暑四百八十間民居不可勝計壓溺死傷者數十萬人帝深憂之時駐蹕龍虎臺在順天府昌平州西居庸闗南口遣諤爾根薩里召集賢翰林兩院官詢致災之由議者畏僧格莫敢指切時政時僧格遣實都王巨濟等理算天下錢榖已徴者數百萬未徴者尙數千萬民不聊生自殺者相屬逃山林者則發兵捕之于是集賢直學士趙孟頫因諤爾根薩里入奏於帝謂須下詔蠲除庶幾天變可弭帝從之詔草已具僧格怒曰此必非帝意孟頫曰凡錢榖未徴者其人死亡已盡非及是時除免之他日言事者儻以失陷歸咎尚書豈不為丞相深累邪僧格悟遂赦天下民賴稍蘓冬十一月增置萬户府分戍江南江南行省言淛東地極險惡賊所巢穴初巴延等于各路置軍鎮戍葢視地之輕重而為多寡後為䝉古岱更易其法今宜復遣三萬户分戍之以哈喇台一軍戌明台伊竒哩一軍戍温處扎呼岱一軍戊紹興婺舊作合剌帶軍亦怯烈軍扎忽帶軍今並改揚州建康鎮江三城跨據大江宜置萬户府七杭州置萬户府四瀕海沿江要害二十二所復宜增置戰艦分兵閱習水戰之法詔從之安圖罷安圖見天下大權盡歸尚書省屢求退不許至是罷相仍領宿衛大水江南民流者四十五萬餘人凡發粟五十八萬賑之辛卯二十八年春正月僧格及諤爾根薩里葉李以罪免天下以僧格鈎考錢榖之故中外騷動廷臣莫敢言者集賢直學士趙孟頫謂奉御徹爾曰僧格罪惡甚矣我等不言他日何以辭其責公為上所親信捐一旦之命為萬姓除殘賊仁者事也時帝畋漷北漷河之北也在順天府通州故漷縣南東入白河徹爾乗間入言之詞語激烈帝怒謂其毁詆大臣命衛士批其頰血湧口鼻委頓地上少間復呼而問之辯愈力曰臣與僧格無讐所以力數其罪而不顧身者正為國家計耳苟畏聖怒而不言則姦臣何時除民害何時息帝大悟召博果密問之對曰僧格壅蔽聰明紊亂朝政有言者即誣殺之今百姓失業盜賊蜂起召亂在旦夕非亟誅之恐為陛下憂㑹廷臣言者益衆遂詔臺省相與辯駁之僧格辭屈帝曰僧格為惡始終四年臺臣豈不知之知而不言當得何罪御史杜思敬曰奪官追俸惟上所裁遂斥罷臺臣之久任者免僧格等官命徹爾率衛士三百人籍僧格家得珍寳如内藏之半諤爾根薩里以連坐亦籍其貲葉李與僧格同事一無所匡正亦坐免久之得以疾請南還揚州學正李淦上言葉李本一黥徒方受上簡知即以舉僧格為第一事致以非罪誅貶大臣遣使四出鈎考錢榖民怨而盜發天怒而地震水災洊至人皆知僧格用羣小之罪而不知葉李舉僧格之罪宜斬李以謝天下書聞帝矍然曰朕素以葉李剛介寧有是邪令召淦詣京師置對淦至而李已卒遂擢淦江隂路教授以旌其直二月罷徴理司詔下之日百姓相慶而各路鉤考猶未盡罷既而御史言鉤考錢榖自中統至今餘三十年更阿哈瑪特僧格當國設法已極其黨公取賄賂民不能堪不如罷之便詔從之仍命取昔逋負錢榖文牘聚至一室非上命而竊視者罪之以鄂勒哲圖卜氏舊作完澤土别燕氏今改為尚書右丞相博果密平章政事初僧格欲殺楊居寛郭佑刑部尚書博果密争之不得僧格深忌之謂其妻曰他日籍我家者必此人也因其退食責以不入曹治事欲加之罪遂以疾免久之復起為翰林學士承㫖至是帝欲用為相謂之曰朕過聽僧格致天下不安今雖悔之已無及朕識卿㓜時使從學政欲備今日之用博果密曰朝廷勲舊齒爵居臣右者尚多今不次用臣無以服衆帝曰然則孰可曰太子詹事鄂勒哲可嚮者阿哈瑪特家其賂遺近臣皆有簿籍唯無鄂勒哲名又嘗言僧格為相必敗國事今果如其言是以知其可也乃拜鄂勒哲尚書右丞相博果密平章政事三月踣僧格輔政碑初帝命翰林學士閻復字子靖山東高唐人撰文至是復已改亷訪使時御史臺改提刑按察司爲肅政廉訪司亦坐免夏五月逮西僧嘉木揚喇勒智下獄尋釋之嘉木揚喇勒智發宋諸陵及其大臣塜墓攘取金寳珠玉無算私庇平民之不輸賦者二萬三千户田土稱是及受美女寳物之獻藏匿未露者尤多至是坐侵盜官物遣使逮問追治之籍其妻孥田畝臺省諸臣皆言宜誅之以謝天下帝不聽命釋之給還其所籍復徴劉因為集賢學士辭不至因以疾固辭帝聞之曰古有所謂不召之臣其斯人之徒歟遂不彊致之初許衡應召時道過因因謂曰一聘而起毋乃太速乎衡曰不如此則道不行至是因不就集賢之命或問之曰不如此則道不尊後二年因卒延祐中追封容城郡公謚文靖下僧格獄逮其黨約蘓穆爾誅之崔彧言僧格當國四年中外百官鮮有不以賄而得者親舊皆授要官美地惟以欺蔽九重朘削百姓為事宜令兩省嚴加考覈凡入其黨者並除名為民從之湖廣平章政事約蘓穆爾僧格妻黨也尤不法逮至京師籍其家黄金至四千兩遂詔下僧格獄復繫約蘓穆爾還湖廣誅之初約蘓穆爾因人言湖廣初附時郡縣長吏吏胥富人比屋斂銀將輸之官銀已具而事中止即下令責民自實使者旁午隨地置獄株連蔓引備極慘酷民拷掠瘐死者載道所獲不貲約蘓穆爾悉掩有之使至永州判官烏克遜澤婉曲以利害曉之卒無所擾既見鉤考日急天下騒動嘆曰民不堪命矣即自上計行省約蘓穆爾怒曰郡國錢糧無不增羡永州何獨不然此直府判倚其才辨慢我亟拘繫之欲置于死至是因僧格敗始得釋烏克遜凙字潤甫臨潢人罷尚書省右丞相鄂勒哲等並入中書頒行至元新格初朝廷未有法守百司斷理獄訟循用金律頗傷嚴刻右丞何榮祖字繼先廣平人家世業吏初以公規治民禦盜理財等十事輯為一書名曰至元新格至是奏頒行之秋七月僧格伏誅八月平陽地震壊民居萬八百餘區壓死百五十人九月遣使招諭琉球注見前琉球久不通中國海船副萬戸楊祥請以兵往伐之既而閩人呉志斗自言熟知海道宜先招諭之不從然後用兵未晚乃以祥充宣撫使阮鑑兵部員外郎志斗禮部員外郎往招諭之明年祥等不至而還志斗卒于行初志斗嘗斥祥誕妄要功人疑為祥所殺詔福建行省按問㑹赦不竟其事冬十月遣禮部尚書張立道字顯卿其先陳留人徙大名使安南徴其王入朝托歡等既還帝怒安南不已欲再伐之適陳日烜死子日燇襲位博果宻曰彼山海小夷以天威臨之寜不震懼獸窮則噬勢使之然今若遣使諭之彼宜無不奉命遂以禮部尚書張立道嘗使安南有功復使往徴其王入朝十二月蠲瀛國公田租宣政院臣言宋全太后瀛國公母子已為僧尼有地三百六十頃乞如例免徴其租從之詔議科取之法中書省臣言江南在宋時徭役為名七十有餘一切未徴今諸王嵗賜官吏俸禄多不給宜令江南如宋時諸名徴賦盡輸之至是因何榮祖言召各省任錢榖之臣至京師雜議科取之法戸部上天下户口之數戸一千三百四十三萬三百二十有二口五千九百八十四萬八千九百六十有四游食者不在其數考是嵗戸口數世祖本紀分内郡江淮四川食貨志則通計天下之數相較不符績綱目係于二十八年數復不合今依本紀係于是年仍以本紀所分之數總核改輯壬辰二十九年春正月甲午朔日食免朝賀開通惠河即今大通河自昌平州流貫都城由大通橋至通州入白河以郭守敬領都水監事初守敬言水利十有一事其一欲導昌平縣即今昌平州注見前白浮村在昌平州東南元人築堰于此神山水昌平州東北有神嶺山下有潭流入白浮村堰即神山泉也過䨇塔榆河雙塔河在昌平州西北自孟村經雙塔店故名榆河即古温餘水注見前引一畝泉在昌平州西南約徑一畝因名玉泉出宛平縣西北玉泉山下諸水入城滙于積水潭在宛平縣治西北東西一里餘南北半之環禁城北安門宫墻左右舊名海子套亦名净業湖從東折而南入舊河先時所開金水河也歐陽原功碑記自積水潭環大内之左右合金水河而南流東出是也每十里置一牐以時蓄洩帝稱善復置都水監命守敬領之丞相以下皆親操畚鍤為之倡置牐之處往往于地中得舊時甎木人服其識逾年畢工自是免都民陸輓之勞公私便之帝自上都還過積水潭見舳艫蔽水大悦賜名曰通惠詔江南避亂者令復業江南福建諸路連嵗盜起居民多入山谷自保時羣盜皆以次就平江南右丞高興言乞招諭復業詔從之二月以伊克穆蘇輝和爾人舊作亦黒迷失今改史弼高興並為福建行省平章政事將兵擊𤓰哇即古闇婆國又名莆家龍亦曰下港在大海中占城西南初右丞孟淇使𤓰哇𤓰哇黥其面使還帝怒命伊克穆蘇及史弼等將兵三萬伐之時𤓰哇國王為鄰境葛郎國所殺其壻土罕必闍耶迎弼求捄弼等遂并取葛郎國王以歸既而土罕必闍耶復叛弼等力戰却之得還死者三千餘人有司計其亡失貨貝直五千餘萬帝以其亡失太多及治其縱土罕必闍耶之罪弼與伊克穆蘇没家貲三之一唯興以不與議得免三月誅僧格黨尼雅斯拉鼎等僧格敗尼雅斯拉鼎黙埒舊作密里今改實都王巨濟俱下獄至是御史臺言其黨比僧格恣為不法理算江南錢榖極其酷虐民嫁妻賣女殃及親鄰維揚錢塘受禍最慘無辜死者五百餘人天下之人莫不思食其肉今三人既已伏辜乞誅之以謝天下帝以實都長于理財欲釋之博果密力争不可日中凡七奏卒併誅之敏珠爾多卜丹罷以特爾格琳沁舊作剌真今改並為平章政事敏珠爾多卜丹嘗請復立尚書省專領右三部博果密曰阿哈瑪特僧格等相繼誤國身誅家滅前鑑未逺奈何又欲效之乎事遂寢至是以乆居其任免猶與議省事特爾格與琳沁同拜中書平章政事初特爾格為司農寺達嚕噶齊從獵巴雅爾之地獵者射免誤中名駝帝怒命誅之特爾格曰殺人償畜刑大重帝曰誤那史官必書亟釋之庾人有盗秔罪應死特爾格曰臣鞫之其人母病盗以養母耳請貰其死至是進平章政事以病足聽肩輿上殿巴雅爾舊作百查兒今改徴集賢學士楊恭懿字元甫奉元人叅議中書省事辭不至恭懿于至元之初與許衡俱被召屢辭不起大子珍戬令有司以漢聘四皓故事聘之至京師與定科舉之議及考正歴法厯成授集賢學士兼太史院事即辭歸自是復屢召之皆不起至是監察御史商琥上書薦天下名士若胡祗遹王惲姚燧字端甫樞從子雷膺字彦正渾源人等十餘人恭懿與焉詔起恭懿參議中書省事力辭不至尋卒夏六月兩浙水詔免田租一百二十五萬七千餘石閏月廣西上思州唐置今州屬南寜府亂遣右丞程鵬飛將兵擊之上思州土官黄聖許擁衆二萬結交趾為援寇陷忠州宋羈縻州今為土州屬南寜府江州亦宋羈縻州今為土州屬太平府及華陽元縣明省故城在今南寜府新寜州諸縣詔遣程鵬飛討之聖許尋敗走入交州安南遣使入貢張立道至安南謂陳日燇曰昔鎮南王不用嚮道率衆深入不戰自潰天子亦既知之汝所恃者山海之險瘴癘之惡而雲南嶺南之人與汝習俗同而技力等今發而用之繼以北方之勁卒汝復能抗哉且前年之師殊非上意邊將䜛汝耳汝曾不悟稱兵抗拒逐我使人今禍且至矣日燇泣謝出竒寳為賄立道却之因要其入朝日燇曰貪生畏死人之常情朝廷誠有詔貸以不死臣將何辭乃先遣其臣何惟嚴阮代之隨立道上表謝罪修嵗貢之禮如初且言所以願朝之意時有忌立道之功者言必先朝而後可赦日燇懼卒不至已而復遣吏部尚書梁曾及禮部郎中陳孚持詔往徴之秋八月罷福建銀冶初福建參知政事魏天祐獻計發民一萬鑿山煉銀嵗可得萬五千兩天祐乃賦民鈔市銀輸官而私其百七十錠至是臺臣以聞請追其贓而罷銀冶從之時寜國路銀冶錁課二千四百雨民皆市易以輸未嘗採之於山省臣以為言亦詔罷之冬十二月改封梁王噶瑪拉為晉王鎮北邊噶瑪拉初出鎮北邊後封梁王移鎮雲南至是復改封晉王鎮漠北統領太祖四大鄂爾多之地王天性仁厚御下有恩民賴以安諸王莽賚特穆爾舊作明里鐵木兒今改附海都以叛詔巴延討之巴延至額森呼圖克嶺在和林界舊作阿撒怱突嶺今改莽賚特穆爾已據之矢下如雨巴延先登陷陣諸軍争奮大破之莽賚特穆爾僅以身走巴延軍還遇伏兵復擊敗之斬首二千級俘其餘衆歸以張珪字公瑞𢎞範子為江淮行樞密副使珪時為管軍萬戸入朝帝欲用為樞密副使伊實特穆爾曰珪尚少果欲大用可俟他日帝曰不然其家為國滅金滅宋盡死力者三世矣而可吝此遂拜江淮行樞密副使癸巳三十年春正月汰冗員凡省内外官府二百五十五所官六百六十九員詔邊軍屯田詔邊境無事本軍屯耕以食始置社稷至元初已詔嵗祀而未立壇壝至是始用崔彧言置之右丞相安圖卒帝聞之震悼曰人言丞相病朕固弗信果喪予良弼命大臣監䕶喪事後大徳中追封東平王諡忠憲二月以嘉木揚喇勒智子温普舊作暗普今改後仿此為江浙行省左丞尋以江南民怨嘉木揚喇勒智不已罷之三月括諸路馬時以海都入宼詔羣臣議所以為備從樞密李庭言復括天下馬凡得十一萬匹夏六月詔皇孫特穆爾撫軍北邊召巴延還以伊實特穆爾代之時有譖巴延乆居北邊與海都通好因仍保守無尺寸之獲者詔授皇孫特穆爾以皇太子寳撫其軍以太傅伊實特穆爾輔行召巴延居大同以俟後命伊實特穆爾未至三驛海都兵復至巴延遣人語伊實特穆爾曰公姑止待我剪此宼而來未晩也遂與海都兵交且戰且却凡七日諸將以為怯憤曰果懼戰何不授軍于太傅巴延曰海都懸軍渉吾地邀之則遁誘其深入一戰可擒也諸將必欲速戰若失海都誰執其咎諸將曰請任之即還軍擊敗之海都果脱去乃召伊實特穆爾至軍中授以印而行皇孫舉酒餞之曰公去何以教我巴延舉所酌酒曰可慎者惟此與女色耳秋七月以伊徹察喇博勒呼之孫按伊徹察喇舊作月赤察爾今改後仿此知樞密院事初伊徹察喇由長集賽授宣徽使本宋官元以院掌供玉食光禄寺屬焉院使秩正二品從帝北征奏曰安圖巴延伊羅勒皆嘗受命征伐三人者臣不可以後之臣願躬出一戰帝曰爾以安圖輩與爾家同功一體各立戰功恥不逮耶然躬親侍衛厥功非小何必踐行伍乃快心耶及僧格之敗實伊徹察喇潛奏劾之至是以為知樞密院事八月安南遣使入貢詔安置于江陵復議舉兵伐之初梁曾字貢父燕人至安南其國有三門日燇欲迎詔自旁門入曾貽書責之往復者三卒從中行且諷之入朝日燇不從遣其臣陶子竒偕曾來貢曾進所與日燇辯論書帝大悦解衣賜之令坐地上右丞阿里意不然帝怒曰梁曾兩使外國以口舌息干戈爾何敢爾或䜛曾受安南賂遺帝以問曾曾曰安南以黄金器幣竒物遺臣臣不受以屬陶子竒帝曰受之亦何不可廷臣以日燇終不入朝遂拘留子竒于江陵命劉國傑字國寳本金人姓烏庫理氏後入中州改姓劉與諸王伊勒吉岱舊作亦里吉解今改後仿此等整兵聚糧復議伐之冬十月彗星出紫㣲垣帝憂之夜召博果密入禁中問所以銷天變之道博果密曰風雨自天而至人則棟宇以待之江河為地之限人則舟楫以通之天地有所不能者人則為之此人所以與天地參也且父母怒人子不敢疾怨起敬起孝故易曰君子以恐懼修省詩曰敬天之怒三代聖王克謹天戒鮮有不終漢文之世同日山崩者二十有九日食地震頻年有之善用此道天亦悔禍海内乂安此前代龜鑑也願陛下法之因誦文帝日食求言詔帝悚然曰此言深合朕意可復誦之遂論説至四更乃罷赦甲午三十一年春正月知樞密院事巴延還自軍中巴延時在大同事具前帝不豫乃驛召還考元史世祖本紀三十年十一月河南江北行省平章巴延入為中書省平章政事位博果密上三十一年春正月知樞密院事巴延至自軍中官位各不同葢實兩巴延也續綱目于三十年則依本紀書以巴延為平章政事于三十一年則又不依本紀不書巴延至自軍中似以入為平章之巴延即至自軍中之巴延兩人混而為一今于入為平章之巴延則以尋常命相不為特書于至自軍中之巴延則以入受顧命兼採本傳特書之再考元代之名巴延者不一其最著者一為平定江南追封淮安王之巴延即此還自大同者也史有特傳一為擁戴文宗至順帝時竄死南恩州之巴延與托克托等同傳一為江西僉事講學州後死賊難之巴延在儒學傳其至元三十年入為平章之巴延但見本紀無列傳宰相表于是年又不列其名惟賽音諤徳齊扎斯迪音傳附載其子敏珠爾多卜丹有長子曰巴延官中書省平章事末子曰巴延徹爾亦官平章事合之本紀當即其人厥後以受朱清張瑄賂罷相而又復官尋為武宗所誅者當亦即其人史以其人無可紀故不為立傳今以其入相無所闗係故亦不為特書其為平章以後之事則仍隨時具載但不使是年兩巴延相混故特揭之于此帝崩親王諸大臣發使告哀于皇孫知樞密院事巴延總百官以聽兵馬司請日出鳴晨鐘日入鳴昏鐘以防變故巴延呵之曰汝欲為賊邪其一如平日適有盗内庫銀者宰執欲誅之巴延曰何時無盗今以誰命誅之邪人服其有識葬起輦谷注見前廟號世祖國語尊稱曰色辰皇帝色辰䝉古語聰明天縱之謂元史舊訛作薛禪今譯改能史臣曰世祖度量洪廣知人善任使信用懦術用立經陳紀所以為一代之制者䂓模𢎞逺矣御史中丞崔彧得傳國璽獻之時穆呼哩曾孫索多舊作碩徳今改已死而貧其妻出玉璽一鬻之或以告彧召秘書監丞楊桓字武子兖州人辨其文曰受命于天既夀永昌此歴代傳國璽也遂獻之故太子妃鴻吉哩氏妃以之徧示羣臣丞相以下次第上夀慶曰神寳之出實當宫車晏駕之後此乃天意屬於皇太孫也乃遣右丞張九思賫授之夏四月皇孫特穆爾即位于上都是為成宗大赦皇孫南還及宗室諸王㑹于上都定策之際親王有違言者伊實特穆爾謂晉王噶瑪拉曰宫車晏駕神器不可虚疇昔儲闈符璽已有所歸授星太子寳事具前晉王宗盟之長何俟而不言巴延亦握劍立殿陛宣揚顧命述所以立皇孫之意辭色俱厲諸王皆股栗趨殿下拜皇孫遂即位大赦追尊皇考曰裕宗皇帝尊母鴻吉哩氏曰皇太后改太后所居舊太子府為隆福宫五月以伊實特穆爾為太師巴延為太𫝊伊徹察喇為太保罷伐安南兵釋其使歸國六月庚辰朔日食賜宋使臣家鉉翁號處士遣還鄉初世祖欲官鉉翁不受遂安置河間以春秋教授弟子數為諸生談及宋興亡之故輒流涕太息至是年逾八十詔賜號處士放還鄉里錫予金幣皆不受尋卒秋七月詔中外崇奉孔子博果密罷為陜西平章政事尋復留之初世祖崩時博果密得預顧命丞相鄂勒哲以其年位在下深忌之帝知其故慰勞之曰卿先朝腹心惟朝夕啟沃匡朕不逮庶無負先皇付託之重廷議大事多從其言河東守臣獻嘉禾博果密曰汝郡内所産盡如是邪曰惟此數莖耳博果密曰如此則既無益于民何足為瑞遂罷遣之西僧作佛事請釋罪囚祈福謂之都勒斡舊作秃魯麻今改豪民犯法皆賂之以求免有殺主殺夫西僧請被以帝后服乗黄犢出宫門釋之云可得福博果密曰人倫者王政之本風化之基豈可容其亂法如是帝責丞相曰朕戒汝無令博果密知今聞其言朕甚媿之使人語博果密曰卿且休朕今從卿言有奴告主者主被誅即以其主所居官與之博果密言若此必大壊天下風俗無復上下之分矣帝悟為追廢前命丞相以下多與謀議不合奏以為陜西行省平章政事太后謂帝曰博果密朝廷正人先皇帝所付託豈可出之于外邪乃復留之冬十月帝至自上都帝廵狩賽音布拉克舊作三不剌今改川地方輿紀要賽音市拉克川在故開平衛境董文用言先帝新棄天下陛下廵遊不以時無以慰安元元且人君猶北辰居其所而衆星拱之不在勤逺畧也宜趣還京師帝悟始還弛江西銀冶課額江西省臣言銀冶嵗輸萬一千兩而未嘗及數民不能堪命自今從實辦之不為額十一月罷江南行樞密院初江淮湖廣江西各立行樞密院江南省臣累請罷之帝以問巴延時巴延已屬疾張目對曰内而省院各置為宜外而軍民分𨽻不便帝從之遂罷三院以其事歸行省以何瑋易州易縣人伯祥之子為參知政事巴延徹爾為參議省事初帝諭右丞相阿里參政梁徳珪字伯温大興良斜人曰中書政務卿等皆懐怠心又不約束吏曹使選人留滯僧格雖姦邪然僚屬憚其威政事無不立辦卿等其約所屬不事事者懲之時省臣凡十一人至是以瑋參知政事瑋曰古者一相專任賢也今宰執員冗政出多門轉相猜忌請損之不從巴延徹爾平章政事巴延即三十年十一月入為平章者弟也巴延曰臣叨平章政事兄弟宜相嫌避帝曰兄平章于上弟參議于下何所嫌也十二月太傅知樞密院事巴延卒諡忠武巴延深沉有謀畧善斷將二十萬衆伐宋如將一人諸將仰之若神明還朝未嘗言功及是卒贈太師追封淮安王禁侵擾農桑者成宗皇帝乙未元貞元年春正月以劉國傑為湖廣行省平章政事辰澧地接溪洞宋嘗選民立屯免其繇役使禦諸蠻在澧曰隘丁在辰曰寨兵宋亡皆廢國傑悉復其制又視盜出没之地置戍三十八所分屯將士以守之由是東盡交廣西亘黔中周湖廣四境皆有屯戍制度周密諸蠻不能復宼入朝賜玉帶錦衣旌其功臺臣言國傑在軍中每傾家貲賞賫將士帝命估償之二月帝如上都以後諸帝往還上都俱于首年書之其或因事特書不在此列留夢炎致仕上以其在朝言無所隠厚賜遣之初世祖嘗問夢炎葉李優劣于趙孟頫對曰夢炎臣之殳執其人重厚篤于自信好謀能斷有大臣器葉李所讀之書臣皆讀之所知所能臣皆知之能之世祖曰汝以夢炎優于李邪夢炎為宋狀元至宰相當賈似道誤國依阿取容李以布衣乃㐲闕上書是賢于夢炎也三月安南入貢地震夏四月廣京師賑糶米肆帝以京師米貴益廣世祖之制設三十肆發米七萬餘石糶之其肆每年増糶多至四十萬石行之既乆多為强豪巧取乃令有司籍貧民户數驗口給之減賑糶之直三分之一毎嵗亦不下二十餘萬石閏月蘭州河清上下三百餘里凡三日釐正選法省臣言阿哈瑪特僧格怙勢賣官不别賢否選法大壊乃詔敏珠爾多卜丹與何榮祖等釐正之五月升江南諸縣為州以戸為差戸四萬五萬者為下州五萬至十萬為中州凡為中州二十八下州十五又以戸不及額降連州注見前路為州六月汴梁諸路災汴梁蝗利州葢州螟泰安曹州濟寕水安西元陜西行省至京兆至元十六年改京兆為安西路延安鞏昌慶陽環州旱時許扆為陜西行省右丞以闗中饑議發廩賑之同列以未經奏請不可扆曰民為邦本今饑餒若此若俟命下無及矣擅發之罪吾當任之遂發粟賑貧命亦尋下許扆字君甫絳州曲沃人秋九月帝還大都冬十一月太師伊實特穆爾卒後追封為廣平王諡貞憲十二月立皇后巴約特舊作伯岳吾今改氏駙馬托里實克之女舊作托里斯今改丙申二年春正月諸王公主駙馬母輒罪官吏時諸王錫錫舊作小薛等部曲及駙馬曼濟台舊作蠻子台今改恣横擾民私殺有罪有司官吏輒被號召至是詔非奉㫖毋得専擅加罪二月以博果密為昭文館大學士平章軍國事丹津為平章政事博果宻以與同列多異議乆稱疾不出帝曰朕知卿疾之故以卿不能從人人亦不能從卿也欲以丹津代卿何如博果密曰津實勝臣乃拜博果密為昭文館大學士平章軍國重事辭曰是職也國朝惟史天澤嘗為之臣不敢當制去重字而以津代為平章政事夏六月頒官吏受賕條格凡十三等南臺御史大夫阿喇卜丹姜衛子舊作阿老瓦丁今改後仿此言立法貴于輕重得宜使民不至易犯今所降條格除枉法外其不枉法者自二十兩以下罪與受一分者同科似輕重少偏然終未之改也秋八月立捕盜賞格御史臺臣言内地盜賊衆多乞立條格督責所屬期至盡滅乃詔諸人能告捕者强盜一名賞鈔五十貫竊盜半之應捕者又半之皆徴諸犯人無可徴者官給之時盜賊羣起山東居多復詔求弭盜方畧山東東西道亷訪使陳天祥上疏曰盜賊之起各有所因除嵗㓙諉之天時宜且勿論如軍旅不息工役薦興厚斂煩刑皆足致盜中間保䕶滋長之者赦令是也赦者小人之幸君子之不幸彼强梁之徒執兵殺人有司力盡以擒之朝廷加恩以釋之旦脱係累暮即行刦既不感恩又不畏法夫㓙殘悖逆性已預定誠非善化所能移惟嚴刑以制之可也疏上乃嚴督有司追捕自其所部南至漢江二千餘里多就擒者山東東西道元置屬中書省領濟南等路括江南隠蔽田凡巴延阿珠阿爾哈雅等下江南所據田及權豪隠蔽者悉括之令輸租冬十月贛州民作亂江西行省左丞董士選字舜卿文炳次子討平之贛州民劉六十聚衆萬餘建立名號朝廷遣將討之觀望退縮賊勢益盛士選請自往進至興國注見前距其營不百里命將校分兵守地待命察知激亂之人悉置于法復誅奸民之為囊槖者于是民争出自效數日六十就擒餘衆悉散事平士選遣使奏聞但請黜贓吏數人而已畧不及破賊事時稱其不伐丁酉大徳元年春正月太后幸五臺山在山西代川五臺縣東北五峯聳立高出雲表山上興林木有如壘土之臺故名元和志云道經以為紫府山内典以為清凉山初為太后建寺于五臺山司程陸信等董其役驅迫民夫冒險入山谷伐木運石死者萬餘人及太后臨幸五臺河東亷訪使王忱因言建寺本以福民今福未及而害已甚恐非朝廷意也太后聞之為減其役仍賜恤死者之家太后之將幸五臺也監察御史李元禮上疏諫止臺臣不敢以聞其復侍御史烏遜與中丞崔彧有隙取元禮章封入奏之曰崔中丞私比漢人李御史大言謗佛帝大怒敕鄂勒哲博果密鞫之鄂勒哲曰往吾亦嘗以此諫太后曰我非喜建此寺蓋先帝嘗許為之非汝所知也博果密曰他御史懼不敢言言者惟一元禮可賞也鄂勒哲等為帝言之帝沈思良乆曰御史言是也乃罷烏遜復元禮職作李元禮字庭訓正定人烏遜舊萬僧今改夏四月癸巳朔日食秋七月河決把縣蒲口在縣北舊為汴水分流處先是河決汴梁發丁夫三萬塞之至是蒲口復決乃命廉訪使尚文字周卿祁州深澤人徙保定相度形勢為乆利之策文言河自陳留抵睢東西百有餘里南岸視水髙六七尺或四五尺北岸故隄水視田髙三四尺或高下等大較南高于北約八九尺隄安得不壊水安得不北也蒲口今決千有餘歩東走歸舊瀆行二百里至歸徳横隄以下復合正流或彊遏之上決下潰功不可成揆今之計河北郡縣宜順水性築長隄以禦汎溢歸徳徐邳之民任擇所便避其衝突被害民戸量給河南退灘地以為業異時決他所亦如之亦一時救患之良策也蒲口不塞便帝從之㑹河朔郡縣及山東憲部争言不塞則河北桑田盡化魚鼈之區塞之便帝復從之是後蒲口復決障塞之役無嵗無之而水北入河復故道竟如文言冬十月竒卜察克都指揮使綽爾和圖圖爾哈第三子舊作牀兀兒今改攻破巴林之地按巴林舊作八鄰據元史志傳考之其地應在今阿爾泰山西北又考元裔順義王諳達居西北邊其子有巴林台吉之號後東徙為今巴林部落八鄰葢係巴林之訛諳達舊作俺答今改還撃海都軍敗走巴林之地時為海都所據綽爾和帥師踰金山注見前進攻之其將達蘭台舊作特靈台今改阻達嚕噶舊作答魯忽今改河與下阿嚕河俱在阿爾穆爾境阿爾穆爾舊作阿力麻里今改而軍伐木柵岸以自庇士皆下馬跪坐持弓矢以待綽爾和奮師馳擊大破之盡得其人馬廬帳還次阿嚕舊作阿雷今改河與海都援將巴拜舊作索伯今改遇綽爾和麾軍渡河蹙之巴拜敗走僅以身免以呉元珪字君章廣平人為吏部尚書時選曹銓注多有私其鄉人者元珪曰此風不可長自視事請謁悉謝絶十二月禁諸王駙馬奪民田仍禁民間以公私土田呈獻及受其獻者戊戌二年春正月増太廟牲用馬從伊徹察喇請也凡舉大祭其馬牲既與三牲同登于俎而割尊之饌復與籩豆俱設將奠牲盤酹馬湩則䝉古太祝升詣第一座呼帝后神諱以致祭年月日數牲齊品物致其祝語列室皆如之禮畢則以割奠之餘撒于櫺星門外名曰抛撒茶飯葢以國俗行事尤所重也二月以張九思梁徳珪並為平章政事初太子珍戬卒朝議欲罷詹事院九思時為詹事丞抗言曰皇孫宗社人心所屬詹事正所以輔成道徳奈何罷之尋進拜中書左丞徳珪于世祖時參知政事治事有敏才京師地震世祖怪州郡報囚之數過多徳珪曰當國者急于徴索蔓延收繫以致此爾帝悟為赦中外逋負尋拜右丞至是並為平章政事罷中外土木之役先是中書省臣屢言諸藩戚賜與繁重向之所儲散之殆盡至是遂諭省臣㑹計天下財帛嵗入及賜與營建嵗費之數丞相鄂勒哲言嵗入之數不償所費又豫于至元鈔本借二十萬錠因以節用為請帝為罷中外土木之役開鐵幡竿渠元時上都渠名今宣化府獨石口東北有鐵幡竿嶺在故開平城南渠葢導源于此時欲開鐵幡竿渠召郭守敬至上都議之守敬曰頻年山水暴下非為大渠堰廣五七十歩不可執政吝于工費以其言為過縮其廣三之一明年大雨山水注下渠不能容漂没人畜廬帳幾犯行殿帝謂省臣曰郭太史神人也惜其言不用耳三月以兩淮閒田給䝉古軍夏六月徴湖廣夏税初阿爾哈雅下湖廣罷宋夏税用内郡例改科門攤每戸一貫二錢葢視夏税増鈔五萬餘錠至是宣慰張國紀復請科夏税與門攤並徴湖湘重罹其害御史臺以為言詔趣罷之尋復改門攤為夏税併徴之每戸計三貫四錢以上視江浙江西為差重云秋七月大雨河決漂没歸徳屬縣田廬禾稼詔免田租一年遣尚書諾海御史劉賡等塞之自蒲口首事凡築九十六所召高麗王謜入朝先是髙麗王昛傳國于其子謜詔以謜為高麗王昛為逸壽王至是有言謜僭設司空司徒等官又擅殺無罪及自造歴等事中書請詔謜入朝因留不遣復以昛為高麗王江西江浙水賑饑民二萬四千九百有竒冬十二月定嵗課三十取一命亷訪司嵗舉亷幹者各二人彗星見出子孫星下參東南之軍市西南二星曰丈人丈人東二星曰子子東二星曰孫見晉書天文志駙馬高唐王竒爾濟蘓翁觀部人沙陀雁門之後舊作爾集斯翁觀舊作汪古今改勒兵備邊遇宼敗没先是諸王伊額布太宗第六子哈丹大王之子舊作也不干哈丹舊作合丹今改叛竒爾濟蘓屢禦之有功至是諸王將帥議備邊事咸曰敵往嵗不冬出且可休兵于境竒爾濟蘇獨嚴兵待之冬敵果大至竒爾濟蘇三戰三克乗勝逐北馬躓為敵所執誘使降不屈又欲妻以女竒爾濟蘇毅然曰我天子婿也非天子命而可再娶乎竟不屈死焉後追封趙王諡忠憲己亥三年春正月遣使問民疾苦省臣以天變屢見請依故事引咎避位上曰此漢人所說豈可一一盡從耶卿但當擇賢者任之爾時翰林學士閻復亦因星變上書陳數事且言古者刑不上大夫今郡守之貴以徴租受杖非所以勵亷隅江南公田租太重宜減以貸貧民多采用之以哈喇哈斯為左丞相帝問閻復曰中書左相難其人卿試舉所知誰可任者復以哈喇哈斯對遂由江浙左丞相召入用之二月遣僧一山使日本江浙平章政事伊蘓岱爾舊作也速答兒今改復勸帝用兵日本帝曰今非其時因其俗奉佛遂遣一山往使而日本竟不至命何榮祖等更定律令帝諭榮祖曰律令良法也宜早定之既而書成上之且言臣所擇者三百八十條一條有該三四事者帝曰古今異宜不必相沿詔元老大臣聚聽之未及頒行而榮祖卒諡文憲夏五月立征東行省領府二司一勸課使五考元史地理志征東行省大徳三年立未幾罷至治元年復立令高麗國王為左丞相續綱目于此作復立與地志不合今依志不書復高麗王昛既復爵已而使臣自其國還者言昛不能服其衆乃立征東行省以福建都元帥竒爾濟蘇此又一竒爾濟蘓䝉古阿齊台氏為平章政事共理之秋七月放江南僧寺佃戸五十萬為編民江南編民五十餘萬悉為嘉木揚喇勒智入寺籍為佃戸至是因省臣言檢放之八月己酉朔太史院奏日食不應是日己時依歴法當日食二分有竒至期不食衆懼保章正太史院官秩正七品齊履謙字伯恒善推歩曰當食不食在古有之矧巳時近午陽盛隂㣲故當食不食遂考唐開元以來當食不食十事以聞冬十二月以諤爾根薩里為平章政事帝初撫軍北邊數召諤爾根薩里不往世祖遣奉皇太子寳僅一至及即位語之曰朕在潛邸誰不願侍朕者惟卿數召不往真得大臣體自是召對不名賜坐視諸侯王嘗語左右曰若全平章諤爾根薩里父别名萬全故以全為氏真全材也命復入中書命兄子哈尚帝兄達爾瑪巴拉之長子即武宗喇按哈尚舊作海山達爾瑪巴拉舊作荅麻八剌今並改後仿此鎮漢北帝以寜逺王庫庫楚世祖第八子後封寜王舊作闊闊出今改總兵北邊怠于備禦哈尚即軍中代之省民出公田租時公田為民害而荆湖尤甚部内實無田隨民所輸租取之户無大小皆出公田租雖水旱不免荆湖宣慰使勒芝喇斡塘古特烏密氏功臣察罕從孫舊作立智理威今改上民所不便十餘事于朝其言公田尤切廷議遣使理之㑹有詔凡官無公田者給俸民力少蘓焉庚子四年春二月丁未朔日食皇太后鴻吉哩氏崩后有賢徳及是崩諡徽仁裕聖皇后后事昭睿順聖皇后執婦道甚謹及尊為太后置徽政院掌其財賦院官有受獻浙西田七百頃者藉于位下后曰我寡居婦人衣食自有餘況江南率土皆國家所有曷敢私之即命盡易院官之受獻者后之弟欲因后求官后拒之曰勿以累我也夏五月緬阿散哥也弑其王的立普哇拿阿迪提牙遣雲南平章政事色辰額呼舊作薛超兀兒今改後仿此等發兵討之初緬人僧哥倫作亂緬王執其兄阿散哥也尋釋之阿散哥也乃率其黨囚王于豕牢因弑之王次子窟麻刺哥撒八奔愬京師詔遣色辰額呼等率行省兵二千人討之已而詔立窟麻剌哥撒八為緬國王昭文館大學士平章軍國事博果密卒諡文貞博果密雖歴顯要而家素貧卒無以葬賜鈔賻之初世祖嘗謂博果密曰太祖有言人主理天下如右手持物必資左手承之然後能固卿實朕之左手也博果密每陳説古今治要世祖必拊髀嘆曰恨卿生晩不得早聞此言然亦吾子孫之福臨終以白璧遺之曰他日持此以見朕也至大時贈魯國公秋八月更定䕃敘格正一品子敘正五從五品子叙從九餘以是為差冬十二月遣雲南行省左丞劉深將兵擊八百媳婦西南蠻世傳其酋有妻八百各領一寨故名其地東接車里西與緬鄰距雲南布政司三十八程先是緬賊阿散哥也倚八百媳婦為援其勢張甚至是鄂勒哲因劉深之言勸帝曰世祖以神武一海内功葢萬世今陛下嗣大歴服未有武功以彰休烈西南夷有八百媳婦未奉正朔請往征之哈喇哈斯曰山嶠小夷遼絶萬里可諭之使來不必逺勤兵力不聴竟發兵二萬命劉深及哈喇岱舊作哈剌帯今改後仿比等將之以往御史中丞董士選亦言不當輕信一人妄言而寘百萬生靈于死地帝變色曰事已成卿勿復言麾之出辛丑五年春正月罷征東行省先是征東行省平章竒爾濟蘇言髙麗王擅署官府及僭用天子禮儀器物況官冗民稀刑罰不一若止依本俗行事實難撫治帝遣刑部尚書王㤗亨等往釐正之既而王昛言設省監制其國不便帝亦以竒爾濟蘇不能和輯高麗遂罷行省徴還之夏五月劉深兵次順元今貴州貴陽府元為順元安撫司治蠻酋宋隆濟黔記宋開寳間有真定人宋景陽奉詔平定羣蠻因置大萬谷落總管府授之其後子孫分長溪峝自宋元迄明所謂水東宋氏也等連兵反劉深等取道順元逺冒烟瘴未戰士卒死者什已七八驅民轉餉谿谷之間一夫負粟八斗率數人佐之數十日乃達死者亦數十萬人中外騷然深復令雲南調民供餽及脅求水西蠻地名黔記蜀漢時蠻火濟從諸葛武侯南征有功封羅甸王几數十世保有水西之地明時土司安氏即其後也通志本朝康熙間安氏叛討平之置黔西府後改為州屬貴州大定府土官之妻蛇節金三千兩馬三千匹隆濟因紿其衆曰官軍徴發汝等將悉剪髪黥面為兵衆惑之隆濟遂連蛇節率苖獠諸蠻攻破楊黄諸寨蠻寨名進攻貴州元置明改新貴縣今省入貴筑知府張懐徳力戰敗死遂圍深窮谷中梁王自雲南遣兵救之賊衆稍却秋七月詔移征緬兵伐金齒諸蠻先是緬阿散哥也遣其弟赴闕自陳殺主之罪乃罷征緬兵及是師還為金齒遮士多戰死金齒地連八百媳婦諸蠻相效不輸税賦賊殺官吏詔遣色辰額哷等移征緬兵討之八月彗出井入紫㣲垣凡四十六日而滅後二年彗復出紫㣲垣七十四日而滅海都復大舉入宼哈尚大破之海都走死海都與都爾斡舊作篤哇今改諸部大舉入宼哈尚躬督綽和爾等五軍合擊大破之阿實克伊竒哩氏呼蘭子舊作阿什呼蘭舊作忽憐今改射都爾斡中膝號哭遁去海都不得志引還旋亦死九月誅髙慶察罕布哈免色辰額哷為庶人先是色辰額呼及高慶等圍緬未奉移兵金齒之詔慶等已受緬人金賂倡言炎暑瘴癘色辰額哷遽引兵還及是事聞詔遣官鞫之盡得將校受賂狀詔誅慶及察罕布哈色辰額哷等遇赦削奪官爵為庶人禁酒時以嵗㓙禁酒仍弛山澤之禁聽民漁獵冬十月益海運糧以畿内嵗饑増明年海運糧為百二十萬石十一月遣劉國傑率師討宋隆濟及蛇節劉深兵敗帝始悔不用哈喇哈斯及董士選之言乃遣劉國傑及楊賽音布哈本名漢英字熙載其先太原人自唐時平播州世有其地元世祖初漢英父納土遂賜漢英名賽音布哈等率四川雲南湖廣各省兵分道進討諸蠻别敕梁王提兵應之軍中機務一聽國傑處分壬寅六年春正月免朱清張瑄官尋誅之二人父子致位顯要清瑄初為海道運糧招討使後又以凊為中萬户賜虎符瑄子文虎為千户賜金符宗戚皆累大官田園館舍徧天下巨艘大舶交諸番中廪藏倉庾相望車馬填塞門巷從僕佩金虎符為萬戸千戸者累數十人江南僧石祖進摭其不法事上聞時中書亦言二人屢致人言宜罷其官詔御史臺鞫之既而伏誅尋籍其家禁錮其親屬流其妻子逺方初二人被逮時以金珠賂江浙平章托克托祈蔽其罪托克托以聞帝喜曰托克托我家老臣子孫其志固宜與衆人殊也賜内帑黄金五十兩以旌之托克托舊作脱脱今改穆呼哩後薩滿之子劉深引兵還宋隆濟累攻圍貴州不解深等糧盡道格不通遂引兵還隆濟復率衆邀之輜重委棄士卒殺傷殆盡南臺御史中丞陳天祥上書諫曰八百媳婦乃荒裔小夷取之不足以為利不取不足以為害而劉深欺上罔下帥兵伐之中途變生所在皆叛食盡計窮倉皇退走喪師十八九棄地千餘里朝廷又發各省之兵以圖收復比聞從征者言經過之地皆重山複嶺陡澗深林其窄隘處僅容一人一騎賊若乗險邀擊我軍雖衆亦難施為或諸蠻逺遁阻隘以老我師進不得前旁無所掠將不戰自困矣且自征伐倭國占城交緬諸夷以來近三十年未嘗有尺土一民之益計其所費可勝言哉去嵗西征及今此舉何以異之乞早正深罪仍下明詔招諭彼必自相歸順不須逺勞王師與小媿争一旦之勝負也苟謂業已如此欲罷不能亦當詳審成敗算定而行彼諸蠻皆烏合之衆必無乆能同心捍我之理但急之則相救緩之則相疑以計使之互相讐怨待彼有可乗之隙我有可動之時徐命諸軍數道俱進服從者懐之以仁抗敵者威之以武恩威兼濟功乃易成若復舍思任威深陷覆轍恐他日之患有甚于今日者矣不報遂謝病去二月帝有疾三月赦西南夷俱叛遣陜西行省平章政事伊蘓岱爾剛里克人等討平之免劉深等官烏撒元路名為軍民府今改威寜州屬貴州大定府烏䝉元路明為軍民府屬四川今改昭通府屬雲南東川元路明軍民府屬四川今府改屬雲南芒部元路明改鎮軍民府今為州屬昭通府及武定元路明為府今府屬雲南威楚元路明改楚雄府今府屬雲南普安元路明為州今州屬貴州南籠府諸蠻因蛇節之亂皆以供輸煩勞為辭乗釁起兵攻掠州縣焚燒堡砦遣伊蘓岱爾等將兵㑹劉國傑討之時國傑方討順元蠻不及來㑹伊蘓岱爾等率師分道並進次第平之夏五月太廟寢殿災六月癸亥朔日食太史院失于推筴詔議其罪秋九月龍興今江西南昌府元時為龍興路民訛言括童男女至有殺其子者命捕為首者三人誅之訛言始息癸卯七年春二月詔定中書省官詔中書省設官自左右丞相而下平章政事二員左右丞各一員參知政事二員定為八府此中書省官數本至元二十二年舊制已詳前注今因更定八府故復載之據元史百官志至元末中書省平章或増至六員葢已非復舊制是年所以更定也乃八府之制止見成宗本紀而不官志不載此必志有脱漏今依本紀輯三月遣使廵行天下罷贜汚官吏萬八千四百七十三人審寃獄五千一百七十六事劉國傑敗宋隆濟及蛇節于墨特川在貴陽府西北擒斬之初國傑師出播州境與賊遇戰失利乃令軍士人持一盾布釘其上俟陣合即棄盾佯走賊果逐之馬遇盾皆仆國傑鼔譟趣之賊大敗既而餘宼復合要戰國傑不應數日命楊賽音布哈分兵先進大軍繼之賊兵潰乗勝逐北千里殺獲無算遂破之于墨特川擒斬蛇節隆濟遁去尋為兄子宋阿重執之來獻詔斬之餘黨相繼平復以特爾格為平章政事初特爾格乞解機務詔仍以平章議中書省事時諸王朝見未有知典故者帝曰惟特爾格諳之凡賜予諸王禮節悉命掌行至是復以為平章政事鄂勒哲及巴延等俱坐贓巴延等免官鄂勒哲釋不問朱清張瑄以金帛結貴近無不受其賂者事敗監察御史杜肯構等言鄂勒哲等與二人交通宜罪之詔巴延密喇卜和卓舊作迷兒火者今改梁徳哇巴特瑪琳沁舊作八部馬辛今改等謪戍逺邊丹津諤爾根薩里等罷職不叙俱籍其家惟鄂勒哲不報既而御史及樞密院臣復言中丞董士選亦嘗貸二家鈔為非義帝曰既云稱貸不必問也誅劉深罷雲南分省時有司㑹赦議釋深罪哈喇哈斯曰徼名首釁喪師辱國非常罪比不誅無以謝天下遂誅之蘭谿處士金履祥其先本姓劉五季時避錢鏐嫌名改姓金氏履祥字吉父卒履祥少從學同郡王栢及何基之門造詣益逺晩嵗屏居金華山在金華府金華縣北一名長山元和志長山赤松子得道處中講道著書以淑後進所著有通鑑前編大學章句疏議論孟集注考書表注授門人許謙以傳之許謙字益金華人當時以為基之清介純實似尹和靖栢之高明剛正似謝上蔡履祥則親得之二氏而並充於己者也家在仁山在金華府蘭谿縣西與道峯山相對之下學者因稱仁山先生至正中賜諡文安夏閏五月戊午朔日食右丞相鄂勒哲卒元貞以來鄂勒哲號為賢相特朱清張瑄之賂帝釋不問人皆疑之後追封興元王諡忠憲六月遣䝉古軍戍𤓰沙二州御史言𤓰沙二州為邊鎮重地今大軍内屯甘州使官民反居邊外非宜乞以䝉古軍萬人分鎮二州險隘兼立屯田以供軍從之既而簽樞宻院齊諾言䝉古兵在山東河南者往戍甘肅動渉萬里装囊鞍馬皆其自備每行必鬻田產甚者或賣妻子戍者未歸代者當發前後相仍困苦日甚請以近甘肅之兵戍之其在山東河南者免戍詔從之齊諾裕爾别里伯雅烏爾氏舊作齊努玉耳别里伯牙吾兒氏今改秋七月都勒斡遣使乞䧏都勒斡敗聚其屬及海都之子名徹伯爾八按徹伯爾舊作察兒今改謀遣使請命使至伊徹察喇㑹諸王將帥議曰都勒斡乞降當待命于上然往返再閲月恐失事機乃使瑪古哈喇舊作馬兀合剌今改後仿此往報之既遣始以聞帝嘉之詔慎飭軍士安置驛傳以俟自是諸王叛者相率來歸兩浙大饑平江等十五路霪雨害稼詔發粟賑民一月仍減直鬻米三十萬石恊濟之時台州諸路旱饑尤甚行省檄浙東元帥托歡徹爾舊作脱歡察兒今改賑之托歡徹爾殘虐不恤治中陳孚訴于宣撫使亟發廪以賑民之殍者已十六七以哈喇哈斯為右丞相阿古岱舊作阿怱台今改後仿此為左丞相二相為武宗繼統所係故特書八月地震平陽大原尤甚村堡移徙地裂成渠壊廬舍萬八百區人民壓死不可勝計詔問致災之由齊履謙言地為隂主静妻道臣道子道也三者一失其道則地為之不寜弭之之道大臣當反躬責已去專制之威以答天變不可徒為祈禳也時帝寢疾宰臣及中宫專政故履謙言及之集賢大學士陳天祥亦上書極陳隂陽不和天地不位為時政之弊言尤切直執政者惡之抑不以聞天祥自被召起且一嵗毎以不得一見帝言鬰鬰不自釋尋復謝病歸遣翰林直學士王約字彦傳真定人使高麗徴其臣呉祈入朝尋流之安西昛既復位厚斂淫刑國人羣愬于朝因得其國相呉祈耑權離間王父子狀詔遣約諭之曰天地間至親者父子至重者君臣小人知自利寕肯為汝家國地邪昛泣謝罪且請子謜還國奸人黨與悉從約治遂徴祈赴闕鞫之流安西冬十月詔互遷行省官之乆任者時諸道奉使言行省官乆任多與所𨽻編民聨姻殊為害政詔互遷之十二月詔翰林太史院官勿致仕時詔内外官七十者並聽致仕獨郭守敬以先朝舊徳朝政多諮之累請謝事不許自是凡翰林太史官不許致仕著為令甲辰八年春正月京師地震平陽尤甚民居摧毁帝不豫皇后召平章政事阿錫葉西域拂菻人舊作愛薛今改問曰災異如此殆下民所自致耶阿錫葉曰天地示警民何與焉二月増置國子生初増䝉古生百員至是増至二百員選宿衛大臣子孫充之尋復分教于上都夏五月癸未朔日食秋九月復巴延等官御史杜肯構等言巴延等樹黨受賕謫戍逺方道路相慶方經數月遽聞召復相位又與原鞫之人列坐朝堂天下目巴延梁徳珪巴特瑪琳沁為三㓙三㓙不誅無以謝天下又況密喇卜和卓阿里等與之同惡相濟濁亂朝綱是以比年災異屢見雖朝廷存恤之詔累頒而禍亂之源未塞上失其政民受其殃乞將羣㓙或斥或誅明正其罪御史中丞何通亦以為言前後章數十上皆不報冬十月立哈尚為懐寜王出鎮青海在和林境元為屯田之所置倉庫以軍守之舊作稱海今改乙巳九年春三月隕霜殺桑般陽今山東濟南府淄川縣元般陽路治此益都河間諸路凡殺桑二百四十一萬七千餘本夏四月大同地震有聲如雷壊官民廬舍五千餘間壓死二千餘人始定郊祀禮元初代有拜天之禮然皆循用國俗其初衣冠尚質祭器尚純帝后親之宗助祭憲宗二年始以冕服拜天于日月山又用孔元措言合祭昊天后土始大合樂作牌位以太祖睿宗配享世宗中統二年祀天于舊桓州之西北灑馬涇以為禮皇族外無與至元十二年以受尊號始于國陽麗正門外建祭臺設昊天上帝皇地祇位二行一獻禮至大徳五年合祭昊天上帝皇地祇五方帝于南郊遣左丞相哈喇哈斯攝事孔元措乃孔子裔孫至是哈喇哈斯等言比年地震星變雨澤愆期嵗比不登祈天保民之事天子親祀者三曰天曰祖宗曰社稷而祭天尤大陛下雖未及親祀宜如宗廟社稷嵗時遣官攝行之制下翰林集賢太常及中書議之以為周禮冬至圜丘禮天夏至方丘禮地西漢元始間始合祭天地歴東漢至宋千有餘年分祭合祭迄無定議然時既不同禮樂亦異王莽之制何可法也今當循三代之典祀天南郊而方丘之禮續議以聞又按周作壇壝三成近代増四成以廣天文從祀之位今宜去其一成以合陽竒之數每成高八尺一寸以合乾之九九壇設丙巳之地以就陽位又古者器用陶匏席用藁鞂漢唐而後禮樂玉帛日益繁縟宋金多循唐禮今欲修嚴非草創所能備舉宜取唐制損益而行之既而太常復議尊祖配天之儀省臣曰自古漢人有天下率尊祖以配天宗廟已有時享郊止祭天為宜中丞何瑋曰嚴父配天不易之制也不從六月立子徳夀為皇太子復十二月卒秋七月命兄子阿裕爾巴里巴特喇達爾瑪巴喇次子哈尚母弟即仁宗按阿育爾巴里巴逹喇舊作愛育黎拔力八達今改後仿此居懐州時皇后秉政出阿裕爾巴里巴特喇與其母鴻吉哩氏居于懐州八月給曲阜林廟灑掃户以尚珍署田五十頃供祭祀賈胡獻寳珠西域賈人有獻寳珠求售者議以六十萬錠酬其直省臣有謂左丞尚文者曰此雅庫特舊作押怱大今改珠也六十萬不為過矣文問何所用之答曰含之可不渴熨面可使目有光文曰一人含之千萬人不渴則誠寳也若一寳止濟一人則用已㣲矣吾之所謂寳者米粟是也有之則百姓安無則天下亂以公用較之豈不愈於彼乎丙午十年春正月罷江南白雲宗都僧録司汰其民歸州縣各寺田悉令輸租初南臺御史言江南寺觀田畝歴年詔免租賦上虧公額下侵民利其所録民戸或罹饑窘為其徒者坐視不䘏乞於秋成之時驗其頃畝減半徴之以備㓙歳推賑其民庶幾利害稍均不加費於官府也從之夏五月遣高麗王謜還國復置征東行省高麗王昛既卒遂遣謜還仍置行省鎮撫之謜尋更名章奏言國中饑饉供億不勝請罷征東行省從之事在至大元年秋八月開成元置開成府後改為州明省故城在今平凉府固原州地震先是晉寜元路今山西平陽府是冀寜元路今山西太原府是及諸郡地數震至是開成又大震壊王宫世祖子安西王鎮開成及官民廬舍壓死五千餘人冬十二月帝有疾丁未十一年春正月安西王阿南達世祖次子莽噶拉木之子至元十七年襲封及諸王莽賚特穆爾入朝皇后召之也帝崩廟號成宗國語稱曰額勒哲圖皇帝按勒哲圖䝉古語有夀之謂元史舊訛作澤篤又作完者篤今譯改史臣曰帝承天下混一之後善于守成惟其末年連嵗寢疾國家政事内則決于宮閫外則委于大臣其所以不至廢墜者則以去世祖未逺成憲具在故也左丞相阿固岱等謀奉皇后臨朝以安西王攝政左丞相哈喇哈斯遣使迎懐寜王哈尚於漠北及其弟阿裕爾巴里巴特喇於懐州后以已嘗謀出阿裕爾巴里巴特喇及其母居懐州恐其兄懐寜王立必報前怨故命召安西王入京師欲立之左丞相阿固岱平章賽音諤徳齊巴延巴特瑪琳沁及諸王莽賚特穆爾隂左右之謀斷哈尚歸路奉皇后垂簾聽政立安西王輔之於是阿固岱以祔廟及攝位事集廷臣議太常卿田忠良博士張昇字伯高平州人曰制祔廟必書嗣皇帝名今將何書御史中丞何瑋亦執不可阿固岱變色曰制自天降邪公等不畏死敢沮大事瑋曰死畏不義爾苟外於義何畏議遂寢時右丞相哈喇哈斯收百司符印封府庫稱疾守宿掖門内㫖日數至皆不聽衆欲害之未敢發適懐寜王遣喀喇托克托阿實克布哈之子計事京師哈喇哈斯令急還報復遣使南迎阿裕爾巴里巴特喇于懐州二月阿裕爾巴里巴特喇至自懐州誅阿固岱等執阿南達歸於上都哈喇哈斯使至懐州阿裕爾巴里巴特喇疑未行其傳李孟字道復潞州上黨人曰支子不嗣世祖之典訓也今宫車晏駕大太子逺在萬里殿下當急還宫廷以安人心阿裕爾巴里巴特喇乃奉其母還大都先遣孟趨哈喇哈斯覘之適后使問疾哈喇哈斯所孟入長揖引其手胗之衆謂孟醫也竟不疑既而知安西之變有日還報曰事急矣不可不早圖之阿裕爾巴里巴特喇曰當以卜決之孟召卜者謂曰大事待汝而決第云其吉及入筮果吉孟曰筮不違人是為大同阿裕爾巴里巴特喇喜振䄂而起衆翼之上馬諸臣皆歩從入哭盡哀復出居舊邸安西之黨見阿裕爾巴里巴特喇既至遂謀以三月三日偽賀其生辰因以舉事哈喇哈斯許之夜遣人啟阿裕爾巴里巴特喇曰懐寜王逺不能猝至恐變生不測當先事而發阿裕爾巴里巴特喇復遣都萬戸囊嘉特舊作囊加歹今改奈曼人詣諸王圖喇太祖次子察罕台四世孫舊作秃剌今改後仿此定計囊嘉特力贊之乃先二日率衛士入内稱懐寜王遣使召安西計事至即并諸王莽賚特穆爾執之械送上都收阿固岱巴特瑪琳沁賽音諤徳齊巴延等誅之諸王庫庫舊作闊闊今改後仿此伊克圖睿宗世子博綽之孫按伊克圖舊作牙怱都博綽舊作撥綽今並改後仿此進曰今罪人斯得太子實世祖孫宜早正大位阿裕爾巴里巴特喇曰惡人潛結宫壼亂我家法故誅之豈欲作威福以覬神器邪懐寜王吾兄也宜正大位已遣使奉璽北迎之矣遂自監國與哈喇哈斯日夜居禁中備變俾李孟參知政事孟損益庶務裁抑僥倖羣小多不樂既而曰執政大臣自當天子親用今鑾輿在道孟未見顔色誠不敢冒大任固辭弗許遂逃去不知所之夏五月懐寜王哈尚至上都廢皇后巴約特氏居東安元州今為縣屬順天府殺之誅安西王阿南達及諸王莽賚特穆爾遂即位大赦初哈尚聞帝崩自阿勒台至和林諸王勲戚合辭勸進王曰吾母及弟在大都俟宗親畢㑹議之阿裕爾巴里巴特喇既平内難其母鴻吉哩妃惑於日者之言欲哈尚讓位阿裕爾巴里巴特喇哈尚聞之語喀喇托克托曰我捍邉陲十年又序次居長星命之言茫昧難信設我即位後所行上合天心下副民望則雖一日之短亦足埀名萬年何可以隂陽家言而乖祖宗之託哉此殆用事之臣擅權耑殺恐他日或治其罪故為是奸謀爾汝為我往察事機疾歸報我乃親率大軍由西道諸王昻輝舊作按灰今改由中道綽和爾由東道各以勁卒一萬從而遲廻不進托克托馳至大都入道哈尚言妃愕然曰修短之説雖出術家為太子周思逺慮乃我深憂今貪憝已除宗王大臣議已定太子不速來何為汝所致言殆有䜛間汝歸為我彌縫之而趣其來先是妃以哈尚不至復遣阿實克布哈迎之備道安西謀變始末及太弟監國諸王羣臣推戴意至是托克托繼往行至中道哈尚輿中望見趣使同載托克托備述妃言哈尚大感悟既以阿實克布哈為平章政事遣還報兩宫阿裕爾巴里巴特喇即侍其母來㑹于上都哈尚遂即位追尊考曰順宗皇帝尊母鴻吉哩氏爲皇太后加哈喇哈斯托多爾海舊作朶兒朶海今改太傅達爾罕舊作答剌罕今改太保並録軍國重事以塔喇海為左丞相綽和爾阿實克布哈並平章政事六月立弟阿裕爾巴里巴特喇為皇太子詔定祔廟之次哈喇哈斯等言與翰林太常議皇考大行皇帝母兄也二帝神主依兄弟之次祔廟為宜擬諡皇考曰昭聖衍孝皇帝廟號順宗大行皇帝曰欽明廣孝皇帝廟號成宗升祔太廟太祖居中睿宗西第一世祖第二裕宗第三順宗東第一成宗第二先元妃鴻吉哩氏宜諡曰貞慈静懿皇后祔成宗廟制可胡粹中曰睿宗裕宗順宗皆未嘗居天子之位但當祔食於其所出之帝而各為立廟已非禮矣況成宗為君時順宗為之臣豈有依次序祔而躋順宗于成宗之上者乎失禮之中又失禮焉哈喇哈斯何瑋諸臣何能逃其責乎秋七月封圖喇為越王左遷右丞相哈喇哈斯為和林左丞相以伊徹察喇為和林右丞相進爵淇陽王初皇太子入定内難阿固岱有勇力人莫能近圖喇實手縳之以功封越王哈喇哈斯力爭以為舊制非親王不得加一字之封圖喇疏屬豈可以一日功廢萬世之制帝不聽圖喇因譖于帝曰安西謀干大統時丞相亦嘗署其牘由是罷為和林行省左丞相仍太傅復録軍國重事哈喇哈斯至鎮斬為盗者一人分遣使者賑貸降民奏出鈔帛易牛羊以給之近水者教取魚鱉為食命諸部置傳車相去各三百里凡十傳轉米數萬石以餉饑民又度地置倉庫積粟以待來者求古渠浚之溉田數千頃令部民雜耕其間嵗得米二十餘萬北邊大治制加孔子號曰大成制曰先孔子而聖者非孔子無以明後孔子而聖者非孔子無以法所為祖述堯舜憲章文武儀範百王師表萬世者也可加大成至聖文宣王遣使闕里祀以太牢以都指揮使茂穆蘓舊作馬謀沙及伶官實迪舊作沙的今並改後仿此等並為平章政事茂穆蘓以角觝屢勝遥授平章政事實迪等授平章仍領玉宸樂院使未幾樂工有犯法者刑部逮之實迪等以玉宸與刑部秩皆三品官皆榮禄大夫留不遣中書以聞帝曰凡諸司視其資級授之散官不可超越其閒冗職名官髙者宜遵舊制降之周禮曰平章執政之官豈伶人之所宜任揭而書之所以志武宗荒逸之本八月停内降㫖選官省臣言内降㫖與官者八百八十餘人已除三百未除者猶五百餘請自今越奏者乞勿與又外任官多帶相銜非制御史臺臣亦言御史亷訪司官宜從本臺公選不當從諸臣所請䧏内㫖用之帝曰若此者卿等皆當執勿與未幾省臣復言比有應入常調者或未入任及已嘗廢黜者亦復請自内䧏已嘗奉詔禁革之後所降内㫖復有百餘臣等竊謂中書政務他人輒得干請如此責效實難自今銓選錢榖之事不由中書議者不得奏聞從之賜諸王孝經中書左丞博羅特穆爾以國字譯孝經進詔曰此孔子㣲言王公庶民皆當由是而行命刻板模印諸王以下咸賜之九月帝至自上都冬十月命皇太子領中書令省臣言初置中書省時裕宗為皇太子嘗至省署敕行中書令事後僧格遷立尚書省不四載而罷今復建中書于舊省乞徙中書令位請皇太子入省一涖之制可十二月山東饑遣禮部尚書呉鼎往賑之時議發米四萬石不給則以鈔折之鼎曰民得鈔將何從易米請于朝易米以行徴處士蕭㪺字維斗奉元人為太子右諭徳元史百官志詹事院左右諭徳各一員㪺初出為府史上官語不合即引退讀書南山三十年凡天文地理律歴算數靡不研究世祖時辟為陜西儒學提舉不赴後累召皆不起至是徴拜太子右諭徳扶病至京師入覲東宫書酒誥為獻以朝廷時尚酒也尋以病請解職或問之則曰禮東宫東靣師傅西靣此禮今可行乎俄擢集賢學士國子祭酒依前右諭徳疾作固辭而歸㪺踐履篤實教人必自小學始為文立意精深言近而指遠所著有三禮説諸書卒賜諡貞敏御批歴代通鑑輯覽卷九十六

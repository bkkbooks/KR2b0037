front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷五十三唐中宗皇帝庚寅嗣聖七年是年九月周武氏天授元年春正月帝在房州二月太后䇿貢士于洛城殿
  hash: sha256:43ef39792d675f1c4c022bd8f92a4cd14acf8bd0a77cd2f53c6abfa6c2a64606

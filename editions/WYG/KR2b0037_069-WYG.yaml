front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷七十五季己漢乾祐二年是酉嵗凡四國三鎮春二月漢以靜州本靖邉軍五代時改置故城在今綏徳州米脂縣𨽻定難軍
  hash: sha256:9a593635ab9dbb54c9679a39ee6640a3f8fbd25dd26c77a782d38cddafa690e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_069-1a, image: WYG0337/WYG0337-0717a.png}
body:
  text: 漢詔以静州𨽻定難軍李彜殷上表謝彞殷以中原多故有輕傲之志漢人故以恩澤羈縻之李氏世據銀夏漸以桀驁遂成宋時繼遷之叛遼遷故晉主重貴于建州本唐昌黎縣遼置州後遷冶永霸縣故城在今錦州府錦縣晉李太后詣遼主請依漢人城寨之側給田耕桑以自贍遼主許之并晉主遷于建州未至安太妃卒于路遺令焚骨南向颺之既至建州得田五十餘頃今従者耕以給食頃之遼主徳光之子舒嚕遣騎取晉主寵姬趙氏聶氏而去夏四月太白晝見民有仰視之者為邏卒所獲史𢎞肇腰斬之五月趙思綰遣使請降于漢漢郭従義尋誘殺人初思綰少時求為左騎衛大將軍李肅肅建人前為晉昌節度副使僕肅不納曰是人目亂而語誕他日必為叛臣肅妻張氏全義之女曰君今拒之後且為患乃以金帛遺之及思綰據長安肅居城中思綰數就見之拜伏如故禮肅曰是子亟来且汚我欲自殺張氏曰曷若勸之歸國㑹長安城中食盡思綰好食人肝又好以酒吞人膽及城中食盡取婦女幼稚為軍糧毎犒軍輒屠數百人計窮不知所出思綰向肅問自全之䇿肅乃與判官程讓能說思綰曰公本與國家無嫌但懼罪耳今若翻然改圖自可不失富貴思綰従之遣使請降于漢漢以為華州留後已而思綰遷延收斂財賄三改行期郭従義疑之密白郭威召思綰酌别因執之及其部曲三百人皆斬于市六月癸酉朔日食秋七月漢郭威克河中李守貞自殺先是守貞出兵攻長圍郭威擊敗之擒其將魏延朗王繼勲以衆降威乘其離散督諸軍百道攻之及是克其外郭守貞與妻子自焚威入城獲其子崇玉及所署將相國師總倫等送大梁磔于市威守貞文書得朝臣藩鎮交通書詞意悖逆欲奏之秘書郎王溥諫曰魑魅乘夜争出見日自消願一切焚之以安反仄威従之物王溥字齊并州祁人八月漢郭威以白文珂為西京留守西京留守王守恩性貪鄙専事聚斂喪車非輸錢不得出城下至抒厠行乞之人不免課率或縦麾下令盜人財有富室娶婦守恩與俳優數人往為賀客得銀數鋌而返抒厠抒除厠溷之賤人郭威自河中還過洛守恩肩輿出迎威怒以為慢已不見即以頭子即堂帖命白文珂代守恩朝廷不之問守恩歸至大梁廣為貢獻厚賂權貴亦竟不獲罪楚馬希萼攻潭州不克希萼調丁壯作戰艦將攻潭州馬希廣聞之曰朗州吾兄也不可與爭當以國讓之而已劉彦瑫固爭以為不可乃以王贇部署戰棹大破其兵追希萼將及之希廣遣使召之曰勿傷吾兄贇引兵還希萼遁去希萼之舉兵也其妻苑氏諫曰兄弟相攻勝負皆為人笑不聴及敗苑氏泣曰禍將至矣余不忍見也赴井而死希萼弟希瞻為静江節度使以希萼希廣交戰屢遣使諫止不従知終覆族疽發背死九月漢加郭威侍中威請加恩將相藩鎮従之威至大梁入見勞賜甚厚辭曰臣將兵在外凡鎮安京師供億兵食皆諸大臣居中者之力也臣安敢獨膺此賜請徧賞之乃徧賜宰相竇貞固蘇逢吉蘇禹珪樞密楊邠宣徽王峻吳䖍裕三司王章侍衛史𢎞肇九人與威而九如一加威兼侍中史𢎞肇中書令竇貞固司徒蘇逢吉司空蘇禹珪楊邠僕射諸大臣議以執政既溥加恩恐藩鎮觖望亦徧加恩有差議者以郭威不専有其功推以分人信為美矣而國家爵位以一人而覃及天下不亦濫乎冬十月吳越募民墾田吳越王俶募民能墾荒田者勿收其稅由是境内無棄田或請糾民遺丁以増賦俶仗之國門國人皆恱十二月漢趙暉攻鳯翔王景崇自殺趙暉急攻鳯翔周璨謂王景崇曰蒲雍已平蜀兒不足恃不如降也景崇曰善吾更思之後數日外攻轉急景崇自焚死諸將乃降三叛既平漢主浸驕縦時與飛龍使後匡贊茶酒使郭允明狎暱為廋辭醜語太后屢戒之太常卿張昭上言宜親近儒臣講習經訓皆不聴復姓匡贊瑕邱人郭允明太原人廋辭隱語也張昭即眧逺避漢祖諱改焉庚漢乾祐三年是嵗戌四國三鎮漢亡春正月漢遣使收瘞河中鳳翔遺骸時有僧已聚二十萬矣漢汝州防禦使劉審交卒汝州吏民詣闕上書以審交有仁政乞留葬汝州得奉事其邱壟許之州人為立祠嵗時享之馮道曰吾嘗為劉君僚佐觀其為政無以踰人非能減其租賦除其徭役也但推公亷慈愛之心以行之耳此亦衆人所能為但衆人不為而劉君獨為之故汝人愛之如此使天下二千石皆效其所為何患得民不如劉君哉夏四月漢以郭威為鄴都留守樞密使如故漢人以遼將南侵議以郭威鎮鄴都使督諸將備之史𢎞肇欲威仍領樞密使蘇逢吉以為故事無之𢎞肇曰領樞密使則可以便宜従事諸軍畏服號令行矣漢主従之仍詔河北甲兵錢糧但見郭威文書立皆稟應𢎞肇怨逢吉異議逢吉曰以内制外順也今反以外制内其可乎自是將相始有隙既而朝貴會飲𢎞肇舉大觴屬成厲聲曰昨日廷議一何異同今日為弟飲之逢吉與楊邠亦舉觴曰是國家之事何足介意𢎞肇又厲聲曰安定國家在長鎗大劍安用毛錐王章曰無毛錐財賦何從可出毛錐盖言筆也他日王章復置酒酒酣為手勢令𢎞肇不能為客省使閻晉卿在坐次屢敎之逢吉戲曰坐有姓閻人何愛罰爵𢎞肇妻閻氏故酒家倡也意逢吉譏已大怒以醜語詬逢吉欲毆之逢吉起去𢎞肇索劍欲追之楊邠哭止之曰蘇公宰相若殺之置天子何地願熟思之于是將相如水火漢主使宣徽使王峻置酒和解之不能得漢以郭榮為貴州刺史貴州隋置今廣西潯州府貴縣是五代時地屬南漢郭榮以天雄牙將遙領刺史榮本姓柴父守禮邢州龍岡人郭威之妻兄也威未有子時養以為子榮即周世宗始見此五月漢以折徳扆従阮之子為府州團練使時従阮舉族入朝故有是命郭威赴鄴威辭行言于漢主曰太后従先帝久多歴天下事陛下富于春秋有事宜禀其敎而行之親近忠直放逺讒邪善惡之間所宜明審蘇逢吉楊邠史𢎞肇皆先帝舊臣願陛下推心任之至于疆場之事臣願竭愚漢王斂容謝之威至鄴都以河北困弊戒邉將謹守疆場嚴飭守備如遼人侵掠則堅壁清野以待之閏月漢大風漢宫中數有怪大風發屋拔木吹鄭門大梁城西面南来第一門也扉起十餘步而落漢主召司天監趙延乂問以禳祈之術對曰臣之職在天文時日禳祈非所習也然王者欲弭災異莫如修徳漢主曰何謂修徳對曰請讀貞觀政要而法之六月河決鄭州秋八月故晉太后李氏卒于遼后病無醫藥惟與晉主仰天號泣㦸手罵杜重威李守貞曰吾死不置汝遂卒後周顯徳中有自遼來者云晉主及馮后尚無恙其従者亡歸及物故則過半矣九月馬希萼遣使乞師于唐唐遣兵助之希萼先奉表于漢請别置進奏務于京師漢主不許亦賜楚王希廣詔勸以敦睦希萼以漢廷意佑希廣怒遣使稱藩于唐乞師攻楚唐命楚州刺史何敬洙將兵往助希萼先是希萼誘溪洞諸蠻共攻益陽楚將陳璠等敗死潭人震恐既而劉彦瑫言于希廣以兵萬人入朗州境父老爭以牛酒犒軍艦過則運竹木以斷其後希萼遣兵逆戰彦瑫乘風縦火以焚其艦頃之風囘自焚還走則江路已㫁戰溺死者數千人希廣聞之涕泣不知所為遣其屬孟駢說希萼曰公忘父兄之讎北面事唐何異袁譚求救于曹公邪希萼將斬之駢曰駢若愛死安肯此来駢之言非私于潭人竇為公謀也乃檡之使還報曰大義絶矣非地下不相見也悉發境内之兵趣長沙冬十一月甲子朔日食漢主承祐殺其樞密使楊邠侍衛指揮使史𢎞肇三司使王章遣使殺郭威不克威舉兵反遂弑其主承祐漢主自即位以来楊邠總機政郭威主征伐史𢎞肇典宿衛王章掌財賦邠頗公忠門無私謁雖不郤四方饋遺然有餘輒獻之𢎞肇督察京城道不拾遺章捃摭遺利供饋不乏國家粗安然章吝于出納聚斂刻急舊制田稅毎斛更輸二升謂之雀鼠耗章始令更輸二斗謂之省耗舊錢出入皆以八十為陌章始令入者八十出者七十七謂之省陌犯鹽礬酒麴之禁者錙銖涓滴皆死由是百姓愁怨章尤不喜文臣嘗曰此輩授之握算不知縦橫何益于用俸禄皆以不堪資軍者髙其估而給之漢主左右嬖倖浸用事太后親戚亦干朝政邠等屢裁抑之太后弟武徳使李業求宣徽使不得内客省使閻晉卿次當為宣徽使亦久不補聶文進并州人後匡贊郭允明皆有寵而久不遷官劉銖陜州人罷歸銖為前平盧節度使以貪虐徵還久未除官共怨執政漢主除喪聴樂賜伶人錦袍玉帶𢎞肇怒曰士卒守邉苦戰猶未有以賜之汝曹何功而得此皆奪之漢主年益壯厭為大臣所制邠𢎞肇嘗議事于前曰陛下但禁聲有臣等在漢主積不能平左右因譖之曰邠等専恣終當為亂蘇逢吉與𢎞肇有隙屢以言激業等漢主遂與業文進匡賛允明謀誅邠等入白太后太后曰兹事何可輕發更宜與宰相議之業曰先帝嘗言朝廷大事不可謀及書生懦怯誤人太后不可漢主忿曰國家之事非閨門所知拂衣而出業等以告閻晉卿晉卿恐事不成詣𢎞肇第欲告之𢎞肇辭不見與邠章入朝殿中甲士出而殺之文進亟召宰相朝臣諸軍將校漢主親諭之分遣使收捕邠等親黨僕従盡殺之遣供奉官孟業齎密詔令鎮寧李洪義李太后弟殺𢎞肇黨步軍指揮使王殷大名人時將兵屯澶州又令行營指揮使郭崇威曹威真定人殺郭威及監軍王峻又急詔徴髙行周苻彦卿郭從義慕容彦超李穀入朝以蘇逢吉權知樞密院事劉銖權知開封府李洪建洪義兄權判侍衛司事逢吉雖惡𢎞肇而不預李業等謀聞變驚愕私謂人曰事太息悤主上儻以一言見問不至于此業等命劉銖誅郭威王峻之家銖極其慘毒嬰孺無免者命李洪建誅王殷之家㓋建但使人守視仍飲食之孟業至澶州洪義不敢發殷囚業以詔示郭威威召郭崇威曹威及諸將告以邠等冤死及有密詔之狀且曰吾與諸公披荆棘従先帝取天下受託孤之任竭力以衛國家今諸公已死吾何心獨生君輩當奉行詔書取吾首以報天子庶不相累崇威等皆泣曰天子幼冲此必左右羣小所為若使此輩得志國家豈得安乎願従公入朝自訴蕩滌鼠輩以清朝廷翰林天文趙修已浚儀人善術數初為李守頁客守貞欲反修已為言時令不可勿妄動不聴及守貞敗徵為翰林天文時従郭威在鄴曰公徒死何益不若順衆心擁兵而南此天啟也威乃留其養子榮鎮鄴都命崇威前驅自將大軍繼之慕容彦超方食得詔舍匕筯入朝漢主悉以軍事委之郭威至澶州李洪義納之王殷亦以兵従遂趣滑州漢主聞郭威至河上悔懼私謂竇貞固曰屬者亦太草草李業等請傾府庫以賜諸軍乃賜禁軍人二十緡下軍半之將士在北者給其家仍使通家信以誘之威至封邱人情恟懼太后泣曰不用李濤言宜其亡也漢主欲自出勞軍太后止之不従時扈従軍甚盛至暮不戰而還来日欲再出太后又止之不可既陳慕容彦超引輕騎直前奮擊馬倒引兵退麾下死者百餘人于是諸軍奪氣稍稍降于北軍彦超遂與十餘騎奔還兖州漢主獨與三相及従官數十人宿于七里寨在開封府城北餘皆逃潰旦日將還宫至元化門劉銖在門上射漢主左右漢主囘轡西北至趙村追兵已至漢主下馬入民家為亂兵所弑蘇逢吉閻晉卿郭允明皆自殺威至劉銖射之威自迎春門入歸私第諸軍大掠通夕獲劉銖李洪建囚之令諸將分部禁止掠者至晡乃定遷𨼆帝梓宫于西宫或請如魏髙貴卿公故事葬以公禮威不許曰倉猝之際吾不能保衛乘輿罪已大矣况敢貶君乎馮道帥百官謁見郭威威猶拜之道受拜如平時徐曰侍中此行不易漢迎武寧節度使劉贇于徐州郭威帥百官起居太后奏請早立嗣君太后誥曰河東節度使崇忠武節度使信皆髙祖之弟武寧節度使贇開封尹承勲髙祖之子其令百官議擇所宜贇崇之子髙祖愛之養視如子郭威王峻入見太后請以承勲為嗣太后曰承勲久羸疾不能起令左右以卧榻舉之示諸將諸將乃信之于是郭威與峻議立贇帥百官表請太后誥遣太師馮道及樞密直學士王度秘書監趙上交詣徐州奉迎威之討三叛也見詔書處分軍事皆合機宜問誰為之使者以范質對威曰宰相器也至是令草誥令具儀注蒼黄之中討論撰定皆得其宜尋以為樞密副使漢太后臨朝郭威帥羣臣請之也威殺劉銖李洪建及其黨皆梟首于市而赦其家威謂公卿曰劉銖屠吾家吾復屠其家怨讎反覆庸有極乎由是數家獲免王殷屢為洪建請威不許遼人破内邱本漢中邱隋改名今縣屬順徳府克饒陽漢遣郭威將兵擊之馬希萼陷潭州殺楚王希廣而自立先是希萼攻岳州刺史王贇堅守不下希萼呼贇曰吾昔約君同行今何異心乎贇曰君王兄弟不相容而責將吏異心乎願君王入長沙不傷同氣臣其敢不盡節希萼慚引去遂下湘鄉後漢縣今屬長沙府至長沙屯水西楚將劉彦瑫許可瓊屯水東指揮使彭師暠士愁之子登城望之言于希廣曰朗人驟勝而驕雜以蠻兵易破也請令可瓊等陳山前臣以步卒三千自巴溪即麻溪在長沙縣北渡江湘江也注見前出嶽麓山名在長沙府善化縣西衡山足也後夜擊之希廣以為可而可瓊已送欵于希萼遂沮其議希廣信巫覡及僧語塑鬼于江上舉手以郤朗兵又作大像于髙樓手指水西怒目視之命衆僧日夜誦經自衣僧服膜拜求福朗兵水陸急攻指揮使吳宏小門使楊滌相謂曰以死報國此其時矣各引兵出戰自辰至午朗兵小郤劉彦瑫按兵不救彭師暠戰于城東北隅可瓊舉全軍降希萼長沙遂陷希崇帥將吏詣希萼勸進吳宏見希萼曰不幸為許可瓊所誤今日死不愧先王矣彭師暠投槊于地大呼請死希萼嘆曰鐵石人也皆不殺希萼入府捕希廣獲之自稱楚王以希崇為節度副使謂將吏曰希廣鈍夫也為左右所制耳吾欲生之可乎朱進忠曰大王三年血戰始得長沙一國不容二主他日必悔之乃賜希廣死希廣臨刑猶誦佛書彭師暠葬之于瀏陽門外希萼召拓䟦恒欲用之恒稱疾不起瀏陽門長沙東門以通瀏陽水名瀏陽水出長沙府瀏陽縣西北流入湘漢劉贇發徐州贇留右都押牙鞏廷美敎練使楊温守徐州與馮道等西来在道仗衛皆如王者左右呼萬嵗郭威至滑州留數日贇遣使慰勞諸將受命之際相顧不拜私相謂曰我輩屠陷京城其罪大矣若劉氏復立我輩尚有種乎漢郭威至澶州自立而還王峻王殷遣兵拒劉贇以太后誥廢為湘陰公令郭威監國威至澶州將發將士數千人忽大譟曰天子須侍中自為之將士已與劉氏為仇不可立也或裂黄旗以被威體共扶抱之呼萬嵗震地因擁威南行威乃上太后牋請奉漢宗廟事太后為母下書撫諭大梁士民勿有憂疑至七里店竇貞固帥百官出迎拜謁勸進贇至宋州王峻王殷聞澶州軍變遣郭崇威將七百騎往拒之又遣馬鐸將兵詣許州巡檢崇威忽至宋州贇大驚闔門登樓詰之對曰澶州軍變郭公遣崇威来宿衛贇召崇威登樓執手而泣時䕶聖指揮使張令超帥部兵為贇宿衛徐州判官董裔說贇急召令超夜刦崇威奪其兵北走晉陽贇猶豫未決是夕崇威密誘令超帥衆歸之贇大懼郭威召馮道先歸贇謂之曰寡人此来所恃者以公三十年舊相故無疑耳令事危矣公何以為計道黙然客將賈貞數目道欲殺之贇曰汝輩勿草草無預馮公事崇威遷贇于外館殺董裔賈貞等數人太后誥廢贇為湘陰公馬鐸引兵入許州劉信自殺太后誥以侍中監國百官藩鎮相繼上表勸進後漢自髙祖至𨼆帝凡二主合四年南漢以宫人為女侍中南漢主以宫人盧瓊仙黄瓊芝為女侍中朝服冠帶㕘決政事宗室勲舊誅戮殆盡惟宦官林延遇閩清人等用事延遇陰險多計數後卒薦龔澄樞自代南漢主即日用之龔澄樞南海人辛周太祖郭威廣順元年北漢主劉崇乾祐四年是亥嵗周代漢北漢建國凡五國三鎭十月湖南亡春正月郭威稱皇帝國號周是為後周太祖漢太后下誥授監國符寶即皇帝位制曰朕周室之裔虢叔之後春秋有郭公公羊傳曰虢謂之郭音之轉也國號宜曰周改元大赦凡倉場庫務掌納官吏無得收斗餘稱耗舊所進羨餘物悉罷之犯竊盜及姦者並依晉天福元年以前刑名罪人非反逆無得誅其親族籍没家貲唐莊宗明宗晉髙祖各置守陵十户漢髙祖陵職員宫人薦享守户並如故漢太后遷居西宫號昭聖太后漢河東節度使劉崇表請湘陰公歸晉陽初崇聞𨼆帝遇害欲起兵南向聞迎立湘陰公乃止曰吾兒為帝吾又何求太原少尹李驤正定人陰說崇曰觀郭公之心終欲自取公不如疾引兵逾太行據孟津俟徐州相公即位然後還鎮則郭公不敢動矣不然且為所賣崇怒曰腐儒欲離間吾父子命左右曳出斬之驤呼曰吾負經濟之才而為愚人謀事死固甘心家有老妻願與之同死崇并其妻殺之及贇廢崇乃遣使請贇歸晉陽周主報曰湘陰公比在宋州今方取歸必令得所公勿以為憂漢湘陰公故將鞏廷美等舉兵徐州廷美楊溫聞湘陰公贇失位奉贇妃董氏據徐州拒守以俟河東援兵周主使贇以書諭之遼使至大梁遼人之攻内邱也死傷頗多又值月食軍中多妖異遼主懼引兵還遣使請和于漢㑹漢亡劉詞送其使者詣大梁周主遣將軍朱憲報聘且叙革命之由周以王殷為鄴都留守周主以鄴都鎮撫河北控制遼境欲以腹心處之以殷為留守領軍如故仍以侍衛司従赴鎮周主為故漢主承祐舉哀成服周主威弑漢湘陰公贇于宋州漢劉崇稱帝于晉陽是為北漢劉崇即位于晉陽仍用乾祐年號所有者并汾忻代嵐憲隆蔚沁遼麟石十二州之地隆州晉漢間置地在今岢嵐州餘注俱見前以判官鄭珙趙華榮陽人同平章事次子承鈞為侍衛親軍都指揮使副使李存瓌為代州防禦使謂諸將曰朕以髙祖之業一朝墜地今日位號不得已稱之顧我是何天子汝曹是何節度使邪由是不建宗廟祭祀如家人宰相俸錢月止百緡節度使止三十緡自餘薄有資給而已聞湘陰公死哭曰吾不用忠臣之言以至于此為李驤立祠嵗時祭之周罷四方貢獻珍食詔百官上封事周主謂王峻曰朕起于微寒備嘗艱苦遭時喪亂一旦為帝王豈敢厚自奉養以病下民乎命峻疏四方貢獻珍美食物詔悉罷之又詔曰朕生長軍旅不親學問未知治天下之道文武官有益國利民之術各具封事以聞周主悉出漢宮中寳玉器碎之于庭曰凡為帝王安用此為仍戒左右自今珍華恱目之物母得入宮北漢主遣其子承鈞將兵伐周不克二月周主以其養子榮為鎮寧節度使選朝士為之僚佐以王敏崔頌協之子為判官王朴字文伯東平人為掌書記遼遣使如周周報之北漢遣使如遼乞師初遼主聞北漢主立使招討使潘伊納克遺劉承鈞書北漢主使承鈞復書言本朝淪亡欲循晉室故事求援北朝遼主大喜至是北漢主遣使如遼乞兵已而遼主遣使如北漢北漢主使鄭珙以厚賂謝之致書稱姪請行册禮按伊納克舊作聿撚今改正周克徐州鞏廷美死之夏四月蜀以伊審徴字申圖太原人知樞密院事審徴蜀髙祖孟知祥廟號之甥也少與蜀主相親狎及知樞密以經濟為已任而貪侈囘邪與王昭逺相表裏蜀政由是浸衰周以王峻范質李穀同平章事初周主討河中已為人望所屬李榖時為轉運使周主數以微言諷之榖但以人臣盡忠為對周主以是賢之即位首用為相時國家新造四方多故王峻夙夜盡心知無不為軍旅之謀多所禆益范質明敏彊記謹守法度李穀沈毅有器畧論議忼慨善譬喻以開主意楚朗州將王逵朗州武陵人周行逢亦武陵人等逐其節度使推劉言廬陵人為留後先是楚朗州指揮使王逵副使周行逢作亂入于朗州楚王希萼既得志殺戮無度縦酒荒淫使逵行逢帥所部兵治府舍執役甚勞又無犒賜士卒愁怨逵行逢帥衆逃歸希萼遣兵追之逵行逢擊殺殆盡遂入朗州推楚王希萼兄子光惠為留後及是逵行逢以光惠愚懦嗜酒辰州隋置今為府屬湖南刺史劉言驍勇得蠻夷心欲迎以為副使言知逵等難制曰不往將攻我乃單騎赴之既至衆廢光惠推言權武平留後求節于唐亦稱藩于周遼遣使如北漢册命其主崇更名旻遼燕王舒斡遼史作罕察作按舒斡舊作述軋察罕舊察割今並改弑其主鄂約而自立舒嚕討殺舒斡而代之北漢遣兵伐周遼主欲引兵會之與諸部議諸部不欲南彊之行至新州燕王舒斡作亂弑遼主而自立齊王舒嚕逃入南山諸部奉之以攻舒斡殺之立舒嚕為帝北漢主復以叔父事之請兵以擊晉州舒嚕年少好遊戲毎夜酣飲達旦乃寐日中方起國人謂之睡王後更名明五代史遼史俱作璟楚將徐威等作亂廢其君希萼立希崇為武安留後楚人復立希萼居衡山楚王希萼悉以軍政委其弟希崇希崇與指揮使徐威陸孟俊等謀作亂㑹希萼宴將吏威等先驅馬十餘入府自帥其徒執斧斤白梃聲言縶馬奄至座上縛希萼而囚之立希崇為武安留後希崇遣彭師暠廖偃幽希萼于衡山縣師暠偃奉希萼為衡山王初希萼入長沙師暠雖免死猶杖背黜為民希崇以為師暠必怨之使送希萼于衡山師暠曰欲使我為弑君之人乎奉事逾謹與衡山指揮使廖偃謀共立希萼為衡山王以縣為行府召募徒衆各州縣多應之冬十月唐遣邉鎬將兵擊楚馬希崇降楚自馬殷據湖南至希崇降唐凡六主合五十六年徐威等見希崇所為知必無成又畏朗州衡山之逼欲殺希崇希崇大懼密奉表請兵于唐唐主命邉鎬將兵萬人聚長沙希崇率弟姪迎拜鎬下馬稱詔勞之時湖南饑饉鎬大發馬氏倉廩賑之楚人大恱是月唐將劉仁贍取岳州撫納降附人忘其亡既而南漢取桂州盡有嶺南地劉仁贍字子惠彭城人遼北漢會兵伐周攻晉州遼遣蕭裕矩將兵五萬㑹北漢兵伐周北漢主自將兵二萬攻晉州三面置寨晝夜攻之巡檢使王萬敢與都指揮使史彦超雲州人何徽等共拒之唐以邉鎬為武安節度使遷馬氏之族于金陵馬希萼望唐人立已為潭帥而潭人惡希萼共請邉鎬為帥鎬趣希崇希萼入朝希崇與宗族及將佐千餘人號慟登舟送者皆哭響振川谷希萼亦與將佐士卒萬餘人東下尋至金陵唐主以希萼鎮洪州希崇鎮舒州唐百官賀湖南平起居郎髙逺曰我乘楚亂取之甚易觀諸將之才恐守之甚難耳司徒致仕李建勲曰禍其始于此乎髙逺字悠逺幽州人十一月周遣王峻救晉州詔諸軍皆受峻節度聴以便宜従事十二月周主自將救晉州不果行王峻留陜州旬日周主以北漢攻晉州急議自將由澤州路與峻會兵救之十二月朔詔以三日西征峻因使者言于周主曰晉州城堅未易可拔劉崇兵鋒方銳不可力爭所以駐兵待其衰耳陛下新即位不宜輕動若車駕出汜水則慕容彦超引兵入汴大事去矣周主聞之以手提耳曰㡬敗吾事乃勅罷親征周王峻至晉州遼北漢兵夜遁北漢主攻晉州久不克軍乏食遼人思歸聞王峻至燒營夜遁峻入晉州諸將請亟追遼漢兵峻猶豫未決明日乃遣指揮使藥元福康延治將騎兵追之北漢兵墜崖谷死者甚衆遼人比至晉陽士馬什喪三四北漢主始息意于進取北漢土瘠民貧内供軍國外奉遼人賦繁役重民不聊生逃入周境者甚衆壬周廣順二年是嵗凡五子國三鎮劉言據湖南春正月周泰寧軍節度使慕容彦超反周發兵討之初周主既立彦超遣使入貢于周周主賜詔慰安之及徐州平彦超疑懼日甚潛以書結北漢又求援于唐周主遣使與誓彦超愈不自安反迹漸露至是彦超發鄉兵入城為戰守之備又多募羣盜剽掠鄰境周主以曹英即曹威避周主名改焉為都部署向訓向氏宋向戍之後訓河内人後更名拱字星民為都監藥元福為都虞候討彦超唐主發兵軍下邳以援彦超周師逆擊大破之彦超勢沮英等至兖州設長圍彦超屢出戰藥元福皆擊敗之長圍合遂進攻之彦超之將反也判官崔周度諫曰魯詩書之國自伯禽以来不能霸諸侯然以禮義守之可以長世公于國家非有私憾况主上開諭勤至茍撤備歸誠則坐享泰山之安矣彦超怒及是括士民之財以瞻軍坐匿財死者甚衆周度遂為彦超所殺二月唐設科舉既而罷之唐主好文學故韓熙載馮延已延魯江文蔚潘佑幽州人徐鉉之徒皆至美官文雅于諸國為盛然未嘗設科舉多因上書言事拜官至是始命文蔚知貢舉執政皆不由科第相與沮毁竟罷之三月唐以馮延已孫晟同平章事唐以延已晟為相既宣制户部尚書常夢錫衆中大言曰白麻甚佳但不及江文蔚䟽耳文蔚疏劾延已事具前晟素輕延已謂人曰金盃玉盌乃貯狗矢乎夏四月丙戌朔日食周主自將討兖州克之慕容彦超自殺周主以曹英久無功下詔親征至兖州使人招諭彦超不従乃命進攻彦超貪吝人無鬭志將卒多出降官軍克城彦超赴井死官軍大掠城中死者近萬人周主欲􅊖誅其將吏翰林學士竇儀字可象漁陽人見馮道范質與共白曰彼皆脅従耳乃赦之六月朔周主如曲阜謁孔子祠在曲阜縣城中即闕里故宅拜其墓注見前周主謁孔子祠將拜左右曰孔子陪臣也不當以天子拜之周主曰孔子百世帝王之師敢不敬乎遂拜又拜孔子墓命禁樵採訪孔子顔淵之後以為曲阜令及主簿蜀大水壊其太廟遼幽州節度使蕭海真遼史作國舅蕭眉古得世宗后之弟也請降于周不果李濤之弟澣在遼為勤政殿學士與海真善說海真内附海真欣然許之澣因諜以聞且與濤書言契丹主童騃無逺志朝廷若能用兵必克不然與和必得二者皆利于速度其情勢他日終不能力助河東者也㑹中國多事不果従秋九月遼攻周冀州周兵拒郤之冬十月武平留後劉言遣兵攻潭州唐節度使邉鎬棄城走言遂取湖南唐武安節度使邉鎬昏懦無斷不合衆心唐主使鎬經畧朗州召劉言入朝言不行謂王逵曰唐必伐我奈何逵曰邉鎬撫御無方士民不附可一戰擒也言乃以逵及周行逢何敬真武陵人潘叔嗣張文表俱朗州人等十人皆為指揮使部分發兵行逢能謀文表善戰叔嗣果敢三人多相須成功情欵甚昵十月逵等將兵分道趣長沙邉鎬遣屯兵益陽逵等克之遂至潭州鎬棄城走吏民俱潰逵入城自稱武平節度副使權知軍府事以何敬真為行軍司馬唐將守湖南諸州者相繼遁去劉言盡復馬氏嶺北故地惟郴連入于南漢遼大水瀛莫幽州大水流民入塞者四十萬口周詔所在賑給存處之中國民被掠得歸者十五六周平章事李榖辭位不許榖以病臂辭位周主遣中使諭㫖曰卿所掌至重朕難其人茍事功克集何必朝禮穀不得已復視事榖未能執筆詔以三司務繁命刻名印用之周立訴訟法敇民有訴訟必先歴縣州及觀察使處決不直乃聴詣臺省或自不能書牒倩人書者必書所倩姓名居處若無可倩聴執素紙所訴必須已事毋得挾私客訴謂代人申訴周慶州注見前野雞族黨項别種居慶州北反遣折従阮討之慶州刺史郭彦欽性貪野雞族多羊馬彦欽故擾之以求賂野雞族遂反徙折従阮為静難節度使討之已而野雞族降殺牛族復反周主以郭彦欽擾羣胡致其作亂黜廢于家選良吏為刺史以撫之會解州刺史郭元昭代歸元昭故與樞密魏仁浦有隙甚懼仁浦知之即白周主以元昭為慶州刺史殺牛族亦黨項别種唐馮延已孫晟罷削邉鎬官爵流饒州初鎬従查文徽克建州凡所俘獲皆全之建人謂之邉佛子及克潭州市不易肆潭人謂之邉菩薩既而政無綱紀惟日設齋供盛修佛寺潭人失望謂之邉和尚至是鎬削官坐譴馮延已孫晟上表請罪皆釋之晟陳情不已乃與延已皆罷唐主以比年出師無功乃議休兵息民或曰願陛下數十年不用兵可小康矣唐主曰將終身不用何數十年之有先是吉水人歐陽廣上書言邉鎬非將帥才必喪湖南唐主不聴及是思廣言拜本縣令十二月河決鄭滑周遣使修塞周静難節度使侯章并州榆次人入朝章獻買宴絹千匹銀五百兩周主不受曰諸侯入覲天子宜有宴犒豈待買邪自今如此比者皆不受癸周廣順三年是嵗凡五丑國三鎮王逵據湖南春正月周以劉言為武平節度使劉言上表于周乞移使府治朗州且請貢獻賣茶悉如馬氏故事許之以言為武平節度制置武安静江等軍事王逵為武安節度使何敬真為静江節度使周行逢為武安行軍司馬敬真尋為逵所殺周罷户部營田務除租牛課前世屯田皆在邉地使戌兵佃之唐末中原宿兵所在皆置營田以耕曠土其後又募髙貲户使輸課佃之户部别置官司總領不𨽻州縣或丁多無役或容庇姦盜州縣不能詰梁太祖擊淮南得牛萬計以給農民使嵗輸租牛死而租不除民甚苦之周主素知其弊李穀亦以為言敇悉罷之以其民𨽻州縣田廬牛具並賜見佃者為永業是嵗户部増三萬餘户民既得為永業始敢葺屋植木獲地利數倍或言營田有肥饒者不若鬻之可得錢數十萬緡以資國用周主曰利在于民猶在國也朕用此錢何為唐草澤邵棠上言近遊淮上聞周主恭儉增修徳政吾兵新破于潭朗恐其有南征之志宜為之備遼攻周定州周擊走之周鎮寧節度使郭榮入朝先是榮屢求入朝王峻忌其英烈毎沮止之會峻行視決河周主以決河為憂峻請自行視榮復請周主許之至是乃入朝故李守貞騎士馬全義従榮入朝召見補殿前指揮使謂左右曰全義忠于所事昔在河中屢挫吾軍汝輩宜效之人馬全義幽州薊周以王峻兼平盧節度使峻聞榮入朝遽自河上還大梁固求領鎮故有是命二月周更作二寶初遼主徳光以晉傳國寶北還至是更以玉作二寳五代會要時製寳兩座用白玉方六寸螭虎紐其一以皇帝承天受命之寶為文其一以皇帝神寶為文命中書令馮道書寶周貶王峻為商州司馬峻晚節益狂躁奏請以顔衎字祖徳曲阜人兖國公四十五代孫陳觀為相周主曰進退宰輔不可倉猝俟更思之峻語浸不遜峻退周主幽之别所召見馮道等泣曰王峻陵朕太甚欲盡逐大臣翦朕羽翼朕惟一子専務間阻無君如此誰則堪之乃貶峻商州司馬以病卒三月周主以郭榮為開封尹封晉王夏六月周九經板成後唐長興中所刻九經板至是始成獻之由是雖亂世九經傳布甚廣是時蜀毋昭裔亦出私財百萬營學館且請刻板印九經蜀主後之由是蜀中文學亦盛昭毋氏齊宣王弟封毋卿其後因以為氏裔河中龍門人王逵執劉言殺之尋以周行逢知朗州事逵上表于周誣言欲降唐幽之别館請復移使府治潭州周従之逵以周行逢知朗州事使潘叔嗣殺言于朗州已而逵復徙冶朗州以行逢知潭州事叔嗣為岳州團練使秋七月唐大旱唐大旱井泉涸淮水可涉饑民度淮相繼濠夀發兵禦之民與鬭而北周主聞之曰彼我之民一也聴糴米過淮唐人遂築倉多糴以供軍八月詔以舟車運載者勿予八月周塞決河周大水周築郊社壇作太廟于大梁周主自入秋得風痺疾術者言宜散財以禳之周主欲祀南郊又以自梁以来郊祀常在洛陽疑之執政曰天子所都則可以祀百神何必洛陽于是始築圜丘社稷壇作太廟于大梁周鄴都留守王殷入朝周主殺之殷恃功専橫凡河北鎮戍兵應用敕處分者殷即以帖行之又多掊斂民財周主聞之不恱因其入朝留充京城内外巡檢因力疾御殿殷入起居遂執之下制誣殷謀以郊祀日作亂殺之唐復置科舉従知制誥徐鉉之請也冬十二月周主朝享太廟疾作而退周主享太廟纔及一室不能拜而退命晉王榮終禮是嵗宿南郊㡬不救夜分小愈甲周顯徳元年正月世宗皇帝榮立冬北漢寅乾祐七年旻子鈞立是嵗凡五國三鎮春正月朔周主祀圜丘周主祀圜丘僅能瞻仰致敬而已周以晉王榮判内外兵馬事時羣臣希得見中外恐懼聞晉王典兵人心稍安周主疾篤詔晉王榮聴政周主疾篤停諸司細務勿奏有大事則晉王榮禀進止宣行之初周王在鄴都竒愛小吏曹翰之才使之事晉王榮至是翰請間曰大王國之儲嗣令主上寢疾大王當入侍醫藥奈何猶決事于外邪榮感悟即日入止禁中周主屢戒榮曰昔吾西征見唐十八陵無不發掘者此無他惟多藏金玉故也我死當衣以紙衣斂以瓦棺壙中無用石以甓代之工人役徒皆和雇勿以煩民葬畢募近陵民三十户蠲其雜徭使之守視勿修下宫置宫人作石羊虎人馬惟刻石置陵前云周天子平生好儉約遺令用紙衣瓦棺嗣天子不敢違也汝或吾違吾不福汝曹翰大名人周遣使分塞決河周以王溥同平章事周主命趣草制相溥宣畢曰吾無恨矣周主威殂晉王榮立是為周世宗二月北漢主以遼兵擊周周昭義節度使李筠即李榮避周主名改逆戰敗績北漢主聞周太祖殂甚喜遣使請兵于遼遼遣其政事令楊衮將萬騎如晉陽北漢主自將兵三萬以白従暉叶谷渾人為都部署張元徽武安人為前鋒使與遼趣潞州節度使李筠遣其將穆令均將兵逆戰元徽與戰陽不勝而北令均逐之伏發被殺筠遁歸上黨嬰城自守三月周主自將與漢戰于髙平注見前漢兵敗績周將樊愛能何徽等伏誅周主欲自將禦漢兵羣臣皆曰陛下新即位山陵有日人心易搖不宜輕動宜命將禦之周主曰崇幸我大喪輕朕年少新立此必自来朕不可不往馮道固爭之周主曰昔唐太宗定天下未嘗不自行朕何敢偷安道曰未審陛下能為唐太宗否周主曰以吾兵力之彊破劉崇如山壓卵耳道曰未審陛下能如山否周主不恱惟王溥勸行乃命馮道奉梓宫赴山陵遂發大梁至懐州兼行速進宿澤州東北北漢主軍髙平南明日周前鋒擊之北漢兵卻周主慮其遁去趣諸軍急進北漢主陳于巴公原在澤州府鳯臺縣北今名巴公鎮張元徽軍其東楊衮軍其西衆頗嚴整周河陽節度使劉詞將後軍未至衆心危懼而周主志氣益銳命白重贊憲州人李重進滄州人周太祖之甥將左軍居西樊愛能何徽將右軍居東向訓史彦超將精騎居中張永徳字抱一并州陽曲人將禁兵自衛介馬臨陳督戰北漢主見周兵少悔召遼兵遼將楊衮䇿馬前望周軍退謂北漢主曰勁敵也未可輕進北漢主奮髯曰請公勿言試觀我戰時東北風盛俄轉南風北漢主麾東軍先進擊周右軍合戰未㡬周樊愛能何徽引騎兵先遁右軍潰步兵千餘人解甲降北漢周主見軍勢危自引親兵犯矢石督戰趙匡𦙍涿郡人即宋太祖時為宿衛將謂同列曰主危如此吾屬何得不致死又謂張永徳曰賊氣驕可破也公引兵乘髙西出為左翼我為右翼以擊之國家安危在此一舉永徳従之各將二千人進戰匡𦙍身先士卒馳犯其鋒士卒死戰無不一當百北漢兵披靡張元徽前畧陳馬倒為周所殺北軍奪氣時南風益盛周兵爭奮北漢兵大敗楊衮畏周兵之彊不敢救且恨北漢主之語全軍而退時北漢主尚有餘衆萬餘人阻澗而陳薄暮劉詞至復與諸軍擊敗之追至髙平僵尸滿谷委棄輜重器械不可勝紀是夕周主野宿得步兵之降敵者皆殺之樊愛能等聞捷與士卒稍稍復還北漢主帥百餘騎晝夜北走所至得食未舉筯或傳周兵至輒蒼黃而去衰老力憊殆不能支僅得入晉陽周主休兵髙平欲誅樊愛能等猶豫未決以訪張永徳對曰愛能等素無大功忝冒節鉞望敵先逃死未塞責且陛下方欲削平四海茍軍法不立雖有熊羆之士百萬之衆安得而用之周主稱善即收愛能徽及所部軍使以上七十餘人責之曰汝輩非不能戰正欲以朕為竒貨賣與劉崇耳悉斬之自是驕將惰卒始知所懼矣永徳稱趙匡𦙍之智勇周主擢為殿前都虞候宋太祖事始此餘將校遷拜者凡數十人北漢主收散卒繕甲兵完城塹以備周遣王得中送楊衮還因復求救于遼遼主許之已而得中歸值周兵囚送于軍周主釋之賜以帶馬問虜兵何時當至得中曰臣受命送楊衮他無所求或謂得中曰公不以實告契丹兵即至公得無危乎得中太息曰吾食劉氏禄有老母在城中若不實告周人必發兵據險以拒之如此則家國兩亡吾獨生何益不若殺身以全家國所得多矣居數日周人縊殺之王得中上黨人周遣行營都署符彦卿督諸將攻北漢至晉陽孟縣漢置今縣屬平定州汾遼州降周主遣符彦卿等北征但欲耀兵于晉陽城下未議攻取既入北漢境其民爭以食物迎勞泣訴劉氏賦役之重願供軍須助攻晉陽州縣亦繼有降者周主始有兼并之意既而北漢憲嵐州降周周又克北漢石州沁忻州亦降周中書令馮道死道少能矯行以取稱于世及為大臣尤務持重以鎮物事四姓十君滑稽多智浮沈取容益以舊徳自處然是時天下大亂道視喪君亡國未嘗以屑意方自著長樂老叙述所得累朝階勲官爵以為榮君子鄙之歐陽修論曰禮義亷恥國之四維四維不張國乃滅亡况為大臣而無亷恥天下其有不亂國家其有不亡者乎觀馮道長樂老敘自述以為榮可謂無亷恥者矣則天下國家可従而知也夏五月周主攻晉陽不克引軍還周主自潞州趨晉陽至其城下旗幟環城四十里遼騎數千屯忻代之間周遣符彦卿等擊之史彦超為前鋒恃勇輕進為遼所殺周兵死傷甚衆彦卿引兵還晉陽時方久雨士卒疲病會彦超死乃議引還將發匡國節度使藥元福曰進軍易退軍難乃勒兵成列而殿北漢果出兵追躡元福擊走之然軍還悤遽焚棄芻糧數十萬失亡不可勝計所得北漢州縣復皆失之周主以違衆議破北漢兵自是政無大小皆親決百官受成而已河南府推官髙錫上書諫曰四海之廣萬㡬之衆雖堯舜不能獨治必澤人而任之今陛下以一身親之天下不謂陛下聰明睿知足以兼百官之任皆謂陛下褊迫疑忌不信羣臣耳不若選能知人公正者以為宰相能愛民聴訟者以為守令能豐財足食者使掌金穀能原情守法者使掌刑獄陛下但垂拱明堂視其功過而賞罰之天下何憂不治何必降君尊而代臣職屈貴位而親賤人事無乃失政之本乎不従髙錫字天福河中虞鄉冬十月周簡閱諸軍募壯士以補宿衞初宿衞之士累朝相承務為姑息不欲簡閱恐傷人情由是羸老居多但驕蹇不用命實不可用毎遇大敵不走即降其所以失國亦多由此周主因髙平之戰始知其弊謂侍臣曰凡兵務精不務多今以農夫百未能養甲士一奈何朘民之膏血養此無用之物乎且健懦不分衆何所勸乃命大簡諸軍精銳者升之上軍羸者斥去之又以驍勇之士多為諸道所蓄詔募天下壯士咸遣詣闕命趙匡𦙍選其尤者為殿前諸班其騎步諸軍各命將帥選之由是士卒精彊所向克捷周罷諸道巡檢使臣周主謂侍臣曰諸道盜賊頗多盖由累朝分命使臣巡檢致藩侯守令皆不致力宜悉召還専委節鎮州縣責其清肅十一月周河隄成河自楊劉至于博州百二十里連年東潰分為二派滙為大澤瀰漫數百里又東北壊古隄而出灌齊棣淄諸州漂没田廬不可勝計流民采菰即茭米也稗草似穀者捕魚以給食久不能塞至是遣李穀按視隄塞役徒六萬三十日而畢北漢主旻殂子鈞立北漢主自髙平之敗憂憤成疾悉以國事委其子承鈞及是北漢主殂告哀于遼遼册命承鈞為帝更名鈞鈞性孝謹既嗣位勤于為政愛民禮士境内粗安其事遼表稱男遼賜詔為兒皇帝湖南大饑是嵗湖南大饑周行逢開倉以賑之全活甚衆行逢起于微賤知民間疾苦其自奉甚薄或譏其太儉行逢曰馬氏父子窮奢極靡不恤百姓今子孫乞食于人又足效乎乙周顯徳二年是卯嵗凡五國三鎮春正月周制給漕運斗耗自晉漢以来漕運不給斗耗綱吏多以虧欠抵死至是詔毎斛給耗一斗周遣使如夏州先是周主圍晉陽折徳扆將兵来朝因置永安軍以徳扆為節度使李彝興以徳扆與已並列恥之塞路不通周使周主謀于宰相對曰夏州邉鎮朝廷毎加優借府州褊小得失不繫重輕且宜撫諭彝興庶全大體周主曰徳扆數年以来盡力以拒劉氏奈何一旦棄之且夏州惟産羊馬貿易百貨悉仰中國我若絶之彼何能為乃遣供奉官齎詔書責之彝興惶恐謝罪周制舉令縣令錄州錄事法初令翰林學士兩省舉令錄除官之日仍署舉者姓名若貪穢敗官並當連坐周浚胡盧河在趙州寜晉縣東南今名寧晉泊亦曰北泊漳滏諸水所滙下流至冀州合滹沱河城李晏口今曰李晏鎮有二一在河間府景州東北為東鎮一在深州南為西鎮以張藏英范陽人嘉貞之後為沿邉巡檢使遼人屢侵河北輕騎深入無藩籬之限郊野毎困殺掠言事者稱深冀之間有胡盧河橫亘數百里可浚之以限其奔突詔王彦超大名臨清人韓通太原人將兵夫浚之築城于李晏口留兵戍之周主召張藏英問以備邉之策藏英具陳地形要害請列置戍兵募邉人驍勇者厚其廪給自請將之隨宜討擊従之藏英到官數月募得千餘人彦超等視役嘗為遼人所圍藏英引兵馳擊大破之自是河南之民始得休息二月庚子朔日食周召羣臣極言得失詔曰朕于卿大夫才不能盡知面不能盡識若不采其言而觀其行審其意而察其忠則何以見器識之淺深知任用之得失若言之不入罪實在予茍求之不言咎將誰執夏四月周廣大梁城周主以大梁城中迫隘詔展外城先立標幟令冬農隙興板築東作動則罷之更俟次年以漸成之周以王朴為諫議大夫知開封府事周主謂宰相曰朕毎思致治之方未得其要寢食不忘又吳蜀幽并皆阻聲敎未能混一宜命近臣著為君難為臣不易論及開邉策各一篇朕將覽焉比部郎中王朴獻䇿曰中國之失吳蜀幽并皆由失道今必先觀所以失之之原然後知所以取之之術其始失之也莫不以君暗臣邪兵驕民困姦黨内熾武夫外横因小致大積微成著今欲取之莫若反其所為而已進賢退不肖以收其才恩𨼆誠信以結其心賞功罰罪以盡其力去奢節用以豐其財時使薄斂以阜其民俟羣才既集政事既治財用既充士民既附然後舉而用之功無不成矣凡攻取之道必先其易者唐與吾接境㡬二千里其勢易擾也擾之當以無備之處為始備東則擾西備西則擾東彼必奔走而救之奔走之間可以知其虚實彊弱然後避實擊虚避彊擊弱未須大舉宜以輕兵擾之南人懦怯聞小有警必悉師以救之師數動則民疲而財竭不悉師則我可以乘虚取之如此江北諸州將􅊖為我有既得江北則用彼之民行我之法江南亦易取也得江南則嶺南巴蜀可傳檄而定南方既定則燕地必望風内附若其不至移兵攻之席捲可平惟河東必死之冦不可以恩信誘必當以彊兵制之然彼自髙平之敗力竭氣沮必未能為邉患宜且以為後圖俟天下既平然後伺問一舉可擒也恩𨼆謂矜恤也周主欣然納之時羣臣多守常偷安所對少可取者惟朴神峻氣勁有謀能斷周主重之以為諌議大夫知開封府事五月周遣鳳翔節度使王景莱州掖人伐蜀周主謀取秦鳳求可將者王溥薦宣徽使向訓詔訓與景偕取秦州周廢無額寺院禁私度僧尼敇天下寺院非敇額者悉廢之禁私度僧尼凡欲出家者必俟祖父母父母伯叔父之命禁僧俗捨身斷手足煉指挂燈帶鉗之類幻惑流俗者令諸州毎嵗造僧帳有死亡歸俗皆隨時開落廢寺院三萬餘所存二千六百九十四見僧尼六萬餘人六月周主親錄囚于内苑有汝州民馬遇父及弟為吏所冤死屢經覆按不能自伸周主臨問始得其實人以為神由是諸長吏無不親察獄訟蜀遣使如唐及北漢蜀主遣間使如北漢及唐欲與之俱出兵以制周二國皆許之周以張美字元珪貝州清河人權㸃檢三司事初周主在澶州美掌州之金穀𨽻三司者周主或私有所求美曲為供副至是以美治財精敏當時鮮及故以權授之征伐四方用度不乏美之力也然思在澶州所為終不以公忠待之秋九月周始鑄錢周主以縣官久不鑄錢而民間多銷錢為器皿及佛像錢益少敕立監采銅鑄錢唯法物軍器及寺觀鐘磬鈸鐸之類聴留外民間銅器佛像五十日内輸官受直過期匿五斤以上罪死不及者論刑有差周主謂侍臣曰佛以善道化人茍志于善斯奉佛矣彼銅像豈若所謂佛邪且吾聞佛志在利人雖頭目猶捨以布施朕身可以濟民亦非所惜也周王景敗蜀師取秦階成州蜀主遣李廷珪伊審徴拒周兵王景遣禆將以兵趣唐倉鎮名在漢中府鳳縣北扼蜀歸路蜀將戰敗秦州判官趙玭澶州人舉城降成階二州皆降百官皆入賀周主舉酒屬王溥曰邉功之成卿擇帥之力也蜀李廷珪伊審徴請罪蜀王皆釋之致書請和于周周主怒其抗禮不答周師圍蜀鳳州節度使王環拒守不下久之城陷執環及都監趙崇溥崇溥不食而死環召見周主嘉其不降授右驍衛將軍王環鎮州人冬十一月周遣李穀督諸軍伐唐周以李榖為淮南前軍都部署王彦超副之督侍衞都指揮使韓令坤磁州武安人等十二將以伐唐唐主性和柔好文華而喜人順已由是諛臣日進政事日亂既克建州破湖南益驕有吞天下之志李守貞慕容彦超之叛皆為之出師又遣使通遼及北漢約共圖中國然遼利其貨徒以虚語相往来實不為之用也先是毎冬淮水淺涸常發兵戍守謂之把淺夀州監軍吳廷紹以疆場無事罷之清淮節度使劉仁贍固爭不能得及是周師將至唐人大懼仁贍神氣自若部分守禦無異平日衆情稍安周疏汴水汴水自唐末潰決自埇橋東南悉為汗澤周主謀擊唐先命發民夫因故隄疏導之東至泗上議者皆以為難成周主曰數年之後必獲其利唐遣兵拒周師于夀州周師擊敗之唐主以劉彦貞兖州中都人為都部署將兵二萬趣夀州皇甫暉後晉開運末奔唐姚鳳將兵三萬屯定逺梁縣今屬鳳陽府召鎮南節度使宋齊邱還金陵謀國難周李穀等為浮梁自正陽鎮名有二一在潁州府潁上縣東南為西鎮一在鳳陽府夀州為東鎮兩鎮夾淮相對濟淮王彦超敗唐兵于夀州城下周樞密使鄭仁誨字日新晉陽人卒仁誨卒仁誨為周太祖所親重居中謀畫慎密不聞于人謙謹好禮為士大夫所稱周主欲臨其喪近臣奏嵗道非便謂年月方道不利周主曰君臣義重何時日之有往哭盡哀吳越遣使入貢于周吳越王俶遣使入貢于周周以詔諭之使出兵擊唐俶既奉詔又以其相吳程言遣兵襲唐常州元徳昭曰唐大國未可輕也若我入唐境而周師不至能無危乎已而唐主以柴克宏為右衛將軍使救常州尋召還宣潤都督燕王冀表留之時吾程已克常州外郭克宏引兵襲擊其營大破之斬首萬餘級克宏復請将兵救夀州未至而卒吳程字正臣山陰人元徳昭本姓危字明逺撫州南城人子惡危字更姓為元柴克宏再用之丙周顯徳三年是嵗凡五辰國三鎮周行逢據湖南春正月周主自將伐唐大敗唐兵斬其將劉彦貞周主下詔親征淮南命侍衛都指揮使李重進將兵先赴正陽遂發大梁李穀攻夀州久不克劉彦貞救之榖退保正陽彦貞素驕貴無才畧聞李穀退喜引兵直抵正陽劉仁贍及池州刺史張全約固止之彦貞不従李重進度淮逆戰大破之斬彦貞擒其禆將咸師朗等斬首萬餘級是時江淮久安民不習戰唐人大恐張全約收餘衆奔夀州劉仁贍表為左廂都指揮使皇甫暉姚鳳退保清流闗清流闗在滁州西南周以李重進為都招討使李榖判夀州行府事二月周主命趙匡𦙍將兵襲唐滁州克之擒其將皇甫暉姚鳳先是周主至夀州城下命諸軍圍之徙正陽浮梁于下蔡遣趙匡𦙍擊唐兵于塗山大破之至是下蔡浮梁成周主自往視之命匡𦙍倍道襲清流闗皇甫暉等驚走入滁州斷橋自守匡𦙍躍馬麾兵涉水直抵城下暉曰人各為其主願容成列而戰匡𦙍笑而許之暉整衆而出匡𦙍突陣擊暉擒之并擒姚鳳遂克滁州初永興節度使劉詞遺表薦其幕僚趙普至是范質以為滁州判官匡𦙍與語恱之時獲盜百餘人皆應死普請先訊鞫然後決所活什七八匡𦙍益竒之匡𦙍威名日盛毎臨陣必以繁纓飾馬鎧仗鮮明或曰如此則為敵所識匡𦙍者吾固欲其識之耳趙普字則平幽州薊人唐主遣鍾謨字重益崇安人李徳明奉表于周唐主先奉書于周稱唐皇帝願以兄事周周主不答及是以兵屢敗懼亡乃遣翰林學士鍾謨文理院學士李徳明奉表稱臣請平于周謨徳明素辯口周主知其欲游說盛陳甲兵而見之曰爾主自謂唐室苗裔宜知禮義異于他國與朕止隔一水未嘗遣一介以修好惟泛海通契丹捨華事夷禮義安在且汝欲說我令罷兵邪我非六國愚主豈汝口舌所能移邪可歸語爾主亟来見朕再拜謝過則無事矣不然朕欲往觀金陵城借府庫以勞軍汝君臣得無悔乎二人戰栗不敢言周取唐揚州周主詗知揚州無備命韓令坤等將兵襲之令坤奄至揚州以數騎馳入城城中不知覺唐副留守馮延魯髠髪僧服而逃軍士執之令坤慰諭其民使皆安堵已而用取唐泰州尋復取唐光舒靳州唐滅故吳主楊氏之族唐主遣園苑使尹延範如泰州遷吳讓皇之族于潤州延範以道路艱難恐其為變盡殺其男子六十人還報唐主怒腰斬之岳州團練使潘叔嗣殺王逵迎周行逢入朗州行逢討叔嗣斬之王逵受周詔攻唐過岳州潘叔嗣燕犒甚謹逵左右索取無厭譖叔嗣于逵逵面罵之叔嗣慙恨謂其下曰逵戰勝而還吾無遺類矣乃以兵襲朗州逵還戰敗死或勸叔嗣遂據朗州叔嗣曰吾救死耳朗州非吾利也乃歸岳州使將吏迎周行逢于潭州行逢至或請以潭州與叔嗣行逢曰叔嗣殺主帥罪當死以其迎我未忍殺爾若與潭州是吾使之殺王公也召為行軍司馬叔嗣怒稱疾不至行逢曰是又欲殺我矣乃陽以武安節鉞與之召使至府受命既至數其罪而斬之行逢乃自稱武平留後奉表于周三月周主行視水寨周主至淝橋淝水上之橋自取一石馬上持之至寨以供礟従官過橋者舉一石趙匡𦙍乘皮船入夀春壕中城上發連弩射之矢大如椽牙將張瓊館陶人以身蔽之矢中瓊體死而復蘇鏃著骨不可出瓊飲酒一大巵令人破骨出之流血數升神色自若唐遣司空孫晟奉表于周唐主以孫晟為司空遣與禮部尚書王崇質奉表于周請奉正朔守土疆晟謂馮廷已曰此行當在左相然晟若辭之則為負先帝矣既行知不免中夜歎息謂崇質曰君家百口宜自為謀吾思之熟矣終不負永陵李昪之陵一杯土餘無所知也既至周主遣中使以晟等詣夀春城下示劉仁贍且招諭之仁贍見晟戎服拜于城上晟謂仁贍曰君受國厚恩不可開門納寇周主聞之怒晟曰臣為唐宰相豈可敎節度使外叛邪周主釋之唐主使李徳明孫晟言于周請去帝號割六州嵗輸金帛百萬以求罷兵周主欲盡得江北之地不許徳明請歸白唐主獻之晟因奏遣王崇質與徳明俱歸賜唐主詔曰諸郡悉来大軍立罷但存帝號何爽嵗寒儻堅事大之心終不迫人于險言盡于此更不煩云茍曰未然請従兹絶唐主復上表謝徳明盛稱周主威徳及甲兵之彊勸唐主割江北之地唐主不恱宋齊邱以割地為無益徳明言多過實樞密使陳覺副使李徵古素惡晟及徳明因譖徳明賣國求利唐主大怒斬之李徵古夀春人唐主以其弟齊王景逹為元帥將兵拒周師唐主以景達為諸道兵馬元帥將兵拒周以陳覺為監軍使中書舍人韓熙載上書曰信莫信于親王重莫重于元帥安用監軍為哉不従夏四月唐兵攻六合趙匡𦙍擊破之先是周主命匡𦙍將兵屯六合唐將軍陸孟俊以兵趣泰州周兵進去進攻揚州韓令坤亦走周主急遣匡𦙍屯六合匡𦙍令曰揚州兵有過六合者折其足令坤乃還揚州拒守擊破唐兵擒孟俊殺之至是唐齊王景達將兵濟江拒六合二十餘里設柵不進諸將欲擊之匡𦙍曰吾衆不滿二千若往擊之彼必見吾衆寡矣不如俟其東而擊之其破必矣居數日唐出兵趣六合匡𦙍奮撃大破之殺獲近五千人溺死甚衆于是唐之精卒盡矣是戰也將士有不致力者匡𦙍陽為督戰以劍硏其皮笠明日適閱其笠笠有劍跡者數十人皆斬之由是部兵莫敢不盡死周主如渦口周主攻夀州久不克失亡頗多糧運不繼議欲旋師乃先幸濠州會渦口作新浮梁成復自濠州如渦口欲遂至揚州范質等以兵疲食少泣諫而止周主嘗怒竇儀欲殺之范質入救之周主起避之質趨前伏地叩頭曰儀罪不至于死臣為宰相致陛下枉殺近臣罪皆在臣繼之以泣周主意解乃釋之五月周主還大梁留李重進圍夀州六月唐遣員外郎朱元沈邱人本姓舒事李守貞易其姓使于唐守貞敗遂仕唐將兵復江北諸州元因奏事論用兵方畧唐主以為能故用之秋七月周以周行逢為武平節度使行逢留心民事悉除馬氏橫賦貪吏猾民為民害者皆去之擇亷平吏為刺史縣令境内以治行逢性勇敢果于殺戮夫人嚴氏諫之行逢怒嚴氏因請視家田至則營居以老嵗時衣青裙押佃户送租入城行逢就見之曰夫人何自苦若此嚴氏曰公思作户長時乎民租後時嘗苦鞭朴今貴矣宜先期以率衆安得遂忘隴畝乎行逢彊邀之嚴氏卒無留意因曰公用法太嚴而失人心所以不欲留者一旦禍起田野易為逃匿耳行逢為少損五嚴氏通鑑作鄧氏今依代史唐朱元等取舒和蘄州周揚滁州守將皆棄城并兵攻夀州初唐人以茶鹽彊民而徵其粟帛謂之博徴博易也謂以茶鹽易徵其粟帛又興營田于淮南民甚苦之及周師至爭奉牛酒迎勞而將帥不知恤専事俘掠民皆失望相聚山澤操農器為兵積紙為甲時人謂之白甲軍周兵討之屢為所敗所得諸州多復為唐有淮南節度使向訓奏請以廣陵之兵并力攻夀春詔許之訓封府庫以授主者命牙將分部按行城中秋毫不犯州民感恱軍還或負糗糒以送之滁州守將亦棄城引兵趣夀州唐諸將請據險以邀周師宋齊邱曰如此則怨益深不如縦之以徳于敵則兵易解也乃命諸將自守毋得擅出由是夀春之圍益急齊王景逹軍于濠州遙為聲援軍政皆由于陳覺擁兵五萬無決戰意將吏畏之無敢言者八月周作欽天厯王朴與司天少監王處訥河南洛陽人所撰也冬十月周立二稅起徴限周主謂侍臣曰近朝徴歛榖帛多不俟收穫紡績之畢乃詔三司自今夏稅以六月秋稅以十月起徴民間便之周山南東道節度使安審琦入朝除太師遣還鎮審琦鎮襄州十餘年至是入朝除守太師遣還鎮審琦感恱周主謂宰相曰近朝多不以誠信待諸侯雖有欲效忠節者其道無由王者但能毋失其信何患諸侯不歸心哉周以趙匡𦙍為定國即同州匡國軍改號節度使兼殿前都指揮使匡𦙍表趙普為節度推官十一月周殺唐使者司空孫晟唐使者孫晟鍾謨従至大梁周主待之甚厚時召見飲以醇酒問以唐事晟但言唐主畏陛下神武事陛下無二心會得唐蠟書張永徳與李重進不相恱永徳密表重進有二心周主不之信已而重進詣永徳營宴飲永徳意解唐主聞之以蠟書誘重進皆謗毁反間之語重進奏之周主召晟責之晟正色抗辭請死問以唐虚實黙不對命都承旨曹翰送晟于右軍巡院與之飲酒従容問之晟終不言翰乃謂曰有敕賜相公死晟神色怡然索靴袍整衣冠南向拜曰臣謹以死報國乃就刑并従者百餘人皆殺之貶鍾謨為耀州司馬既而周主憐晟忠節悔殺之召謨拜衛尉少卿周召華山隠士陳搏字圖南亳州真源人詣闕尋遣還山周主召陳搏問以飛升黄白之術對曰陛下為天子當以治天下為務安用此為乃遣還山詔州縣長吏常存問之丁周顯徳四年北漢天會巳元年是嵗凡五國三鎮春正月唐遣兵救夀州周師擊破之唐齊王景逹遣邉鎬朱元等將兵數萬救夀州軍于紫金山在夀州東北列十餘寨與城中烽火相應又築甬道運糧綿亘數十里將及夀春周李重進邀擊大破之死者五千人奪其二寨劉仁贍請以邉鎬守城自帥衆決戰景達不許仁贍憤悒成疾其幼子崇諫夜泛舟渡淮為小校所執仁贍命腰斬之監軍使周廷構哭于中門以救之不許廷構復使求救于夫人薛氏薛氏曰妾于崇諫非不愛也然軍法不可私名節不可虧若貸之則劉氏為不忠之門妾與公何面目見將士乎趣命殺之然後成喪將士皆感泣二月周更造祭器祭玉命國子博士聶崇義洛南洛陽人討論制度為之圖三月周主復如夀州大破唐兵唐元帥景逹奔還先是唐水軍銳敏周人無以敵之周主以為恨反自夀春于大梁城西汴水側造戰艦數百艘命唐降卒敎北人水戰數月之後縦橫出没殆勝唐兵至是車駕發大梁命王環將之自閔河即蔡河舊自祥符尉氏至陳州入潁宋史河渠志蔡河兼閔水以通舟楫是也今堙沿潁入淮唐人大驚三月周主渡淮抵夀春城下躬擐甲胄軍于紫金山南命趙匡𦙍擊唐寨破之斷其甬道由是唐兵首尾不能相救朱元舉寨萬餘人降周其餘衆沿流東潰周主自將騎數百與諸將夾岸追之唐兵戰溺死及降者殆四萬人劉仁贍聞援兵敗扼吭歎息景達陳覺皆奔歸金陵唐夀州監軍周廷構以城降周唐節度使劉仁贍死之周以夀州為忠正軍徙治下蔡周主耀兵于夀州城下唐清淮節度使劉仁贍病甚不知人監軍使周廷構等作仁贍表舁仁贍出城以降于周仁贍卧不能起周主慰勞賜賚復令入城養疾徙夀州治下蔡又制曰劉仁贍盡忠所事抗節無虧前代名臣㡬人堪比其以為天平節度使兼中書令是日卒追賜爵彭城郡王唐主聞知亦贈太師周主復以清淮軍為忠正軍以旌仁贍之節周主之父光祿卿致仕柴守禮犯法周主不問守禮及當時將相王溥王晏徐州滕縣人韓令坤之父遊處恃勢恣橫洛人畏之謂之十阿父周主既為太祖嗣人無敢言守禮子者但以元舅處之優其俸給未嘗至大梁嘗以小忿殺人有司不敢詰周主知而不問夏四月周主還大梁周疏汴水入五丈河在開封府祥符縣北九域志河即禹貢之荷澤従都北歴陳留及鄆其廣五丈故名自是齊魯舟楫皆逹于大梁五月周作刑綂詔以律令文古難知勅格煩雜不一命侍御史張湜等訓釋刪定為刑綂唐敗周兵斷其浮梁唐郭廷謂字信臣彭城人將水軍斷渦口浮梁又襲敗武行徳于定逺唐以廷謂為應援使秋八月周平章事李穀罷以王朴為樞密使榖卧病二年九表辭位罷守本官令每月肩輿一詣便殿議政事九月周以竇儼字望之儀之弟為中書舍人儼上疏請令有司討論禮儀考正鍾律作通禮正樂又論政刑及勸農經武之要以為為政之本莫大擇人擇人之重莫先宰相自有唐之末輕用名器始為輔弼即兼三公僕射之官故其未得之也則以趨競為心既得之也則以容黙為事乞令宰相各舉所知且令本官權知政事期嵗之問察其職業若果能堪稱其官已髙則除平章事未髙則稍更遷官權知如故若有不稱則罷其政事責其舉者又班行之中有員無職者大半乞量其才器授以外任考其治狀能者進之否者黜之又請令盗首則賊自相糾告以其所告貲産之半賞之或親戚為之論其徒侣而赦其所首者如此則盜不能聚矣又新鄭鄉村團為義營各立將佐一户為盗累其一村一户被盜罪其一將每有盜發則鳴鼔舉火丁壯雲集盜少民多無能脫者由是一境獨清請令他縣皆效之亦止盜之一術也又累朝屢詔聴民廣耕止輸舊税及其既種則有司履畝而増之故民皆疑懼而田不加闊夫為政之先莫如敦信信茍著矣則田無不廣田廣則穀多穀多則藏之民猶藏之官也又言陛下南征江淮威靈所加前無彊敵今以衆撃寡以治代亂勢無不克但行之貴速則彼民免俘馘之災此民息轉輸之困矣周主善之冬十月周設賢良經學吏理等科十一月周主自將伐唐攻濠泗州遼北漢會兵攻周潞州不克而還十二月唐泗州降周唐泗州守將范再遇舉城降周周主自至城下禁軍中芻蕘者毋得犯民田民皆感恱爭獻芻粟無一卒敢擅入城者唐濠州降周周主進兵攻楚州遣兵取揚㤗州唐濠州團練使郭廷謂舉城降周先是廷謂上表周主言臣家在江南今若遽降恐為唐所種族請先遣使稟命然後出降許之至是廷謂使者自金陵還知唐不能救命㕘軍李廷鄒章降表延鄒責以忠義廷謂以兵臨之延鄒擲筆曰大丈夫終不負國為叛臣作降表廷謂斬之而降陽李延鄒鄱人時周主進攻楚州廷謂謁見周主使將濠州兵攻天長遣指揮使武守琦將兵數百趣揚州至髙郵唐人悉焚揚州官府民居驅其人南渡江後數日周兵乃至周主聞泰州亦無備遣兵襲取之已而周克唐海州南漢遣使入貢于周不至南漢主聞唐屢敗憂形于色遣使入貢于周為湖南所閉乃治戰船修武備既而縦酒酣飲曰吾身得免幸矣何暇慮後世哉戊周顯徳五年唐中興元年南漢主午鋹大寶元年是嵗凡五國三鎮春正月周鑿鸛水即老鸛河舊在淮安府城西北今堙引戰艦入江周主欲引戰艦自淮入江阻北神堰今曰北神鎮在淮安府城北不得渡欲鑿楚州西北鸛水以通其道遣使行視還言地形不便計功甚多乃自往視之授以規畫旬日而成用功甚省巨艦數百艘皆逹于江唐人大驚以為神周師拔唐静海軍南唐置宋改通州今州𨽻江南周拔静海軍始通吳越之路先是周主遣使如吳越語之曰卿去雖汎海還當陸歸已而果然周主克唐楚州唐防禦使張彦卿史不詳里系死之周攻楚州踰四旬唐防禦使張彦卿固守不下周主自督諸將攻克之彦卿與都監鄭昭業猶帥衆巷戰矢刃皆盡彦卿舉繩床以鬬而死所部千餘人至死無一人降者二月北漢攻周隰州不克隰州刺史暴卒建雄節度使楊廷璋字温玉正定人謂都監李謙溥字徳明并州孟人曰今大駕南征澤州胡三省曰當作隰州無守將河東必生心若奏請待報則孤城危矣即牒謙溥權隰州事謙溥至則修守備未㡬北漢兵果至攻城久不下廷璋度其疲困無備潛與謙溥募死士夜襲其營北漢兵驚潰解去三月唐以太弟景遂為晉王燕王冀為太子景遂前後十表辭位且言冀嫡長有軍功宜為嗣唐主乃立景遂為晉王以冀為太子參決庶政周主臨江遣水軍擊唐兵破之唐主遣使盡獻江北地周主罷兵引還周主至揚州如迎鑾鎮遣水軍擊破唐兵唐主聞周主在江上恐遂南渡又恥降號稱藩乃遣陳覺奉表請傳位于太子冀使聴命于中國時淮南惟廬舒蘄黃未下覺見周兵之盛白周主請遣人渡江取表獻四州之地盡江為境以求息兵辭指甚哀周主曰朕本興師止取江北今爾主能舉國内附朕復何求賜唐主書稱皇帝恭問江南國主慰納之唐主奉表稱唐國主請獻江北四州地輸貢物數十萬于是江北悉平得州十四縣六十周主賜唐主書諭以今當罷兵不必傳位周汴渠成浚汴口導河流逹于淮于是江淮舟檝始通夏五月辛巳朔日食唐主更名景去帝號奉周正朔唐主避周諱更名景下令去帝號稱國主凡天子儀制皆有降損去年號用周正朔平章事馮延已嚴續樞密使陳覺皆罷初延已以取中原之䇿說唐主由是有寵嘗笑烈祖昪曰田舍翁安能成大事與其黨談論更相倡和翰林學士常夢錫屢言延已等浮誕不可信唐主不聴夢錫曰姦言似忠陛下不悟國必亡矣及是延已之黨相與言有謂周為大朝者夢錫大笑曰諸君嘗欲致君堯舜何意今日自為小朝邪衆嘿然秋八月唐太子冀殺其叔父晉王景遂唐太子冀在東宫多不法唐主怒嘗以毬仗擊之曰吾當復召景遂冀密遣洪州都押牙袁従範毒殺景遂唐王不之知南漢主晟殂子鋹立本名繼興即位更名鋹年十六國事皆決于龔澄樞宦者知承宣院盧瓊仙女侍中等臺省備位而已周遣闔門使曹彬字國華正定靈夀人如吳越周遣曹彬以兵器賜吳越事畢亟返不受饋遺吳越人以輕舟追與之至于數四彬曰吾終不受是竊名也盡籍其數歸而獻之周主曰曏之奉使者乞匄無厭使四方輕朝命卿能如是甚善然彼以遺卿卿自取之彬始拜受悉以散于親識家無留者冬十月周遣使均定境内田稅周主留心農事常刻木為農夫蠶婦置之殿庭至是詔散騎常侍艾穎艾以地為氏頴須城人等三十四人分行諸州均定田租又詔諸州并鄉村率以百户為團團置耆長三人又詔諸邑課户唐制令上戸出課給官員月料謂之課户及俸户斂嵗之稅使髙户主之收其息給俸謂之俸户並勒歸州縣其幕職州縣官自今並支俸錢及米麥十一月周命竇儼撰通禮正樂二書名唐放其太傅宋齊邱于九華山齊邱多樹朋黨陳覺李徴古共相附和唐主惡之司天奏天文有變人主宜避位禳災唐主乃曰吾欲釋去萬㡬誰可以託國徴古請授齊邱覺亦曰陛下深居禁中國事皆委宋公先行後聞臣等時入侍談釋老不亦可乎唐主心愠即命中書舍人陳喬革詔喬惶恐請見極言其不可唐主笑曰爾亦知其非邪乃止遂出徴古洪州罷覺近職陳喬字子喬盧陵玉筍人㑹周遣鍾謨馮延魯還唐謨以李徳明之死怨齊邱欲報之知陳覺前自周還矯周主命言江南連嵗拒命皆宰相嚴續之謀當斬之唐主未之信謨因請復之于周唐主乃因謨復命上書言久拒王師皆臣愚迷非續之罪周主大驚曰審如此則續乃忠臣朕為天下主豈敎人殺忠臣乎謨還以白唐主唐主乃詔暴齊邱等罪放齊邱歸九華山覺宣州安置尋殺之徴古賜自盡齊邱未㡬自經死御批歴代通鑑輯覽卷七十

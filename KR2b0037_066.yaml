front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷六十七五季甲後唐同光二年是嵗岐申降後唐凡四國四鎮春正月岐王李茂貞遣使入貢于唐
  hash: sha256:26c8ae010fb0ea5e8e4ed0b3f91e7761475dd3a96dcd835d582582411d18e808
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_066-1a, image: WYG0337/WYG0337-0607a.png}
body:
  text: 茂貞聞唐主入洛內不自安遣其子繼曮入貢上表稱臣唐主以其前朝耆舊特加優禮賜詔不名尋封為秦王唐復以宦官為內諸司使及諸道鑑軍內諸司使自天祐以來以士人代之至是復用宦者浸干政事既而復置諸道監軍陵忽主帥怙勢爭權由是藩鎮皆憤怒唐太后至洛陽唐主遣存渥唐主之弟繼岌迎太后太妃于晉陽太妃曰陵廟在此若相與俱行嵗時何人奉祀遂留不來太后至洛陽二月唐主祀南郊大赦唐主將祀南郊郭崇韜獻勞軍錢十萬緡崇韜素廉入洛後頗受四方賂遺所親諫之崇韜曰吾祿賜巨萬豈舊外財但以河南藩鎮皆謂梁之舊臣主上之深讐也拒其意能無懼乎吾特為國家藏之私室耳及有事南郊乃悉出所藏以佐賞給先是宦官勸唐主分天下財賦為內外府州縣上供者入外府充經費方鎮貢獻者入內府充賜宴于是外府常虛竭無餘而內府山積及有司辦郊祀乏勞軍錢崇韜言于唐主曰臣已傾家所有以助大禮願陛下亦出內府之財賜有司唐主默然久之曰晉陽自有儲積可令租庸輦取于是軍士皆不滿望始怨恨有離心矣孔謙欲聚斂以求媚凡赦文所蠲者謙復徵之自是每有詔令人皆不信百姓愁怨唐立夫人劉氏魏州安成人為皇后先是唐主欲以劉夫人為皇后而有正妃韓夫人在唐主正室曰衛國夫人韓氏次曰燕國夫人伊氏人次魏國夫人劉氏太后素惡劉夫人郭崇韜亦屢諫唐主以是不果會崇韜為嬖幸勳舊所嫉崇韜位兼將相權侔人主嬖幸僥求多所摧抑又自附汾陽王子儀之派以膏梁自處甄别流品引拔浮華䣓棄勳護由是嬖幸疾之于內勳舊怨之于外崇韜欎欎不得志與所親謀赴本鎮以避之所親以為不可因説崇韜曰公若請立劉夫人為皇后上必喜內有皇后之助則伶宦輩不能為患矣崇韜從其言乃與宰相帥百官共奏請立之后生于寒微其父以醫卜為業后幼被掠得入宫性狡悍淫妬從唐主在魏父聞其貴諸魏上謁時后方與諸夫人爭寵以門地相髙恥之怒曰妾去鄉時父不幸死亂兵妾哭而去今何物田舍翁敢至此命笞之宫門又專務著財薪蘇果茹皆販之至是四方貢獻皆分為二一上天子一上中宫以是寶貨山積惟用寫佛經施尼師而已是時皇太后誥皇后教與制敕交行于藩鎮奉之如一三月蜀主宴近臣于怡雲亭蜀主宴近臣酒酣君臣及宫人皆脫冠露髻喧譁自恣知制誥李龜禎京兆人諫曰君臣沈湎不憂國政臣恐啓北敵之謀不聽唐封髙季興為南平王唐以李存賢本姓王注見前為盧龍節度使李存審以不得預克汴之功感憤疾甚表求入覲許之初唐主嘗與李存賢手搏存賢不盡其技唐主曰汝能勝我當授藩鎮存賢乃仆唐主至是以存賢鎮幽州曰手搏之約吾不食言矣唐詔銓司考核偽濫唐末喪亂縉紳之家或以誥敕鬻于族􅊚遂亂昭穆至有舅叔拜甥姪者選人偽濫者衆郭崇韜欲革其弊請令銓司精加考核時南郊行事官預執事之官千二百人注官者才數十人塗毀告身者十之九選人或號哭道路或餒死逆旅唐遣使按視諸陵夏四月唐主加尊號唐遣客省使李嚴如蜀唐遣客省司李嚴使于蜀嚴盛稱唐主威德有混一天下之志且言朱氏篡竊諸侯曽無勤王者王宗儔請斬之蜀主不從宣徽使宋光葆言宜選將練兵屯戍邊鄙積糗糧治戰艦以待之蜀主乃以光葆為梓州觀察使已而嚴還言于唐主曰王衍童騃荒縱不親政務斥逺故老昵此小人其臣諂諛專恣黷貨無厭賢愚易位刑賞紊亂大兵一臨瓦解土崩可翹足而待也唐主然之嚴之行也唐主令市宫中珍玩而蜀法禁錦綺珍竒不得入中國其粗惡者乃聽謂之入草物嚴還以國唐主怒曰王衍寧免為入草人乎唐秦王李茂貞死遺奏以其子繼曮權知軍府事唐尋以為節度使五月唐以伶人陳俊儲德源為刺史初胡栁之役伶人周匝為梁所得唐主每思之入汴之日匝謁見泣言臣所以得生皆梁教坊使陳俊內園使儲德源之力也願乞二州以報之唐主許之郭崇韜曰陛下所以共取天下者皆英豪忠勇之士今大功始就封賞未及一人而先以伶人為刺史恐失天下心以是不行踰年伶人屢以為言唐主謂崇韜曰吾已許周匝矣公言雖正然當為我屈意行之故有是命時親軍有百戰未得刺史者莫不憤歎唐以曹義金為歸義節度使時瓜沙與吐蕃雜居義金遣使間道入貢故命之自唐咸通十三年義金為歸義留後及是已五十四年六月唐詔州鎮無得修城毀其守具時潞州牙將楊立據城以叛故有是命立初有寵于李繼韜繼韜誅悒悒思亂會發安義兵戍涿州因聚譟據城自稱留後詔李嗣源等討之已而李嗣源等平潞州磔立并其黨唐主以潞州城池髙深悉夷之右諌義大夫薛昭文上疏曰今諸道僭竊者尚多征伐之謀未可遽息又士卒久從征伐賞給未豐宜加頒賚又河南諸軍皆梁之精鋭恐僭竊之國潛以厚利誘之宜加收撫又户口流亡者宜寬徭薄賦以安集之又土木不急之役宜加裁省又擇隙地牧馬勿使踐京畿民田皆不從秋八月唐以孔謙為租庸使謙屢欲為租庸使終不獲豆盧草判租庸謙言于郭崇韜曰首座相公事綮第逺簿書留滯宜更圖之崇韜欲復用張憲謙彌失望乃言于革以興唐尹王正言為之正言昏懦謙利其易制故也已而謙又短正言于崇韜會正言亦以病不能治事于是謙厚賂伶官景進進言于唐主乃以謙為租庸使孔循即趙殷衡梁亡復其姓名為副使謙自是重斂急徵以充唐主之欲民不聊生賜號豐財贍國功臣九月唐主獵于近郊時唐主屢出遊獵傷民禾稼洛陽令何澤廣州人遮馬諫曰陛下賦斂既急今稼穡將成復蹂踐之使吏何以為理民何以為生臣願先賜死唐主慰遣之既而唐主復獵于伊闕命從官拜梁太祖墓涉歷山臉連日不止或夜合圍士卒墜崖谷死傷甚衆冬十月蜀以宦官王承休為龍武指揮使承休請擇諸軍驍勇者置龍武軍給賜優異以承休為都指揮使禆將安重霸雲州人以狡侫賄賂事承休承休悅之以為已副舊將莫不憤恥已而蜀主復以承休為天雄此秦州之天雄軍也節度使唐僖昭之世宦官雖盛未有建節者承休言于蜀主曰秦州多美婦人請為陛下采擇以獻故有是命吳越入貢于唐吳越王鏐復修職貢于唐唐因梁官爵而命之鏐厚貢獻並賂權要求金印玉册有司言故事惟天子用玉王公皆用竹唐主曲從之吳王如白沙鎮名在揚州府儀徴縣南吳王如白沙觀樓船更命曰迎鑾鎮徐溫來朝先是溫以親吏翟虔為閣門使使察王起居防制甚急至是王對溫名雨為水溫請其故王曰翟虔父名吾諱之熟矣因以虔無禮告溫頓首謝請斬之王曰逺徙可也乃徙撫州注見前十二月蜀復以張格同平章事初格罷相坐貶蜀主衍初立格以附唐文扆貶維州司户中書吏王魯柔乘危窘之及再為相杖殺之許寂時亦為蜀相謂人曰張公才髙而識淺殺一魯柔他人誰敢自保此取禍之端也契丹侵蔚州唐遣李嗣源禦之先是契丹就唐求幽州以處盧文進不許遂侵幽州至是復寇蔚州唐主詔李嗣源將兵禦之唐主及后如河南尹張全義第全義大陳貢獻酒酣皇后奏妾幼失父母請父事全義唐主許之全義惶恐固辭強之竟受后拜復貢獻謝恩明日后命翰林學士趙鳯幽州人草書謝全義鳯奏自古無天下之母拜人臣為父者唐主嘉其直然卒行之乙後唐同光三年蜀咸康元年漢酉白龍元年是嵗凡四國四鎮春正月唐主如興唐唐主至興唐以義武節度使王都將入朝欲闢毬場副留守張憲曰此以行宫闕廷為毬場場有陛下即位壇不可毁請更闢場于宫西數日未成唐主命毁即位壇憲謂郭崇韜曰此壇主上受命之地若之何毁之崇韜從容言之唐主立命兩虞候毁之憲私謂崇韜曰忘天背本不祥莫大焉二月唐以李嗣源為成德節度使唐主以契丹為憂與郭崇韜謀以宿將零落殆盡欲徙嗣源鎮真定崇韜深以為便時崇韜領真定唐主欲徙崇韜汴州崇韜辭曰臣富貴極矣何必更領藩方且羣臣或經百戰所得不過一州臣無汗馬之勞致位至此常不自安今因委任勳賢使臣得解麾節乃大願也且汴州衝要富繁臣既不至治所徒令他人攝職何異空城非所以固國基也唐主曰卿為朕畫䇿保固河津直趨大梁成朕帝業豈百戰之功可比乎崇韜固辭乃許之漢遣使如唐漢主聞唐滅梁而懼遣宫苑使何詞入貢且覘強弱詞還言唐主驕淫無政不足畏也漢主大悅遂不復通三月唐黜李從珂為突騎指揮使唐主性剛好勝不欲權在臣下信伶官之讒頗疏忌宿將李嗣源家在太原表從珂為北京內牙指揮使以便其家唐主怒黜從珂為突騎指揮使帥數百人戍石門鎮胡三省注即唐之橫水柵嗣源憂恐求朝不許郭崇韜亦忌之私謂人曰總管令公嗣源為蕃漢馬步總管非久為人下者皇家子弟皆不及也密勸唐主罷其兵權因而除之不從唐遣使采民女入後宫唐宦者欲增廣嬪御詐言宫中夜見鬼物因言咸通乾符時六宫不減萬人今掖庭空虛故鬼物逰之耳唐主乃命宦者王允平伶人景進采擇民女三千餘人以充後庭夏四月癸亥朔日食大旱初五臺僧誠惠自言能降伏天龍命風召雨唐主親帥后妃拜之誠惠安坐不起羣臣莫敢不拜獨郭崇韜不拜會大旱迎至洛陽使祈雨數旬不雨或謂誠惠官以師祈雨無驗將焚之誠惠逃去慚懼而死五月唐太妃劉氏卒太后自與太妃别常忽忽不樂太妃亦邑邑成疾太后欲自往省之唐主以天暑道逺苦諌久之乃止及薨太后悲哀不食者纍日自是得疾六月雨春夏大旱至是始雨遂連雨七十五日始霽百川皆溢唐主作清暑樓唐主苦溽暑宦者因言長安全盛時宫中樓觀以百數今日官家會無避暑之所唐主乃命王允平别建一樓宦者曰郭崇韜常不伸眉為孔謙論用度不足恐陛下雖欲營繕終不可得唐主曰吾自用內府錢無關經費然猶慮郭崇韜諫遣中使語之曰今嵗盛暑異常朕昔在河上行營卑濕被甲乘馬親當矢石猶無此暑今居深宫之中而暑不可度奈何對曰陛下昔在河上勍敵未滅深念讐恥雖有盛暑不介聖懷今外患已除海內賓服故雖珍臺間館猶覺鬱蒸也陛下倘不忘艱難之時則暑氣自消矣唐主默然宦者曰崇韜之第無異皇居宜其不知至尊之熱也唐主卒命允平營樓日役萬人所費巨萬崇韜諌曰今河南水旱軍食不充願且息役以俟豐年不聽秋七月唐太后曹氏殂唐主哀毁五日方食八月唐主殺其河南令羅貫貫性強直為郭崇韜所知用為河南令為政不避權豪伶宦請托一不報皆以示崇韜崇韜奏之由是伶宦切齒張全義亦惡之遣婢訴于劉后后與伶宦共毁之唐主含怒未發會往祀坤陵唐主以中書門下言作坤陵于夀安葬曹太后南壽安隋縣故城在河府宜陽縣道濘橋壞怒下貫獄明日傳詔殺之崇韜諫曰貫法不至死唐主怒曰太后靈駕將發天子朝夕往來橋道不修卿言無罪是黨也崇韜曰陛下以萬乘之尊怒一縣令使天下謂陛下用法不平臣之罪也唐主曰既公所愛任公裁之拂衣起入宫崇韜隨之論秦不已唐主自闔殿門崇韜不得入貫竟死暴尸府門逺近寃之九月唐遣魏王繼岌及郭崇韜將兵伐蜀唐主與宰相議伐蜀李紹欽素諂事宣徽使李紹宏紹宏薦紹欽有竒才可大任郭崇韜曰段凝亡國之將姦諂絶倫不可信也衆舉李嗣源崇韜曰契丹方熾總管不可離河朔魏王地當儲嗣未立殊功請以為都統成其威名帝曰兒幼豈能獨往當求其副既而曰無以易卿乃以繼岌充西川行營都統崇韜充都招討制置等使軍事悉以委之將兵六萬伐蜀仍詔工部尚書任圜翰林學士李愚並參預軍機崇韜以孟知祥有薦引舊恩將行言于上曰知祥信厚有謀可為西川帥又薦張憲謹重有識可為相冬十月蜀主東遊安重霸勸王承休請蜀主東逰秦川毁府署作行宫強取民間女子教歌舞圖形以遺韓昭蜀主將行羣臣諫皆不聽太后涕泣不食止之亦不能得前秦州節度判官蒲禹卿上表極諫幾二千言韓昭謂曰吾收汝表俟主上西歸當使獄吏字字問汝承休妻美蜀主私焉故鋭意欲行十月引兵數萬發成都武興節度使王承捷告唐兵西上蜀主不信大言曰吾方欲耀武遂行在道賦詩初不為意十一月唐師滅蜀蜀主王衍降前蜀自王衍據城都至衍亡凡二主各三十五年郭崇韜入散關饋運將竭諸將皆言蜀地險固未可長驅崇韜以問李愚愚曰蜀人苦其主荒淫莫為之用宜乘其人情崩離風驅霆擊彼皆落膽雖有險阻誰與守之兵勢不可緩也崇韜倍道而進先是李紹琛即康孝攻蜀威武城在漢中府鳯縣東北降之縱其敗卒萬餘人逃去因趣鳯州李嚴飛書以諭王承捷至是承捷以鳯興文扶四州印節迎降得兵八千糧四千萬斛蜀主至利州遇威武敗卒始信唐兵之來乃以王宗訓王宗儼王宗昱為三招討將兵三萬逆戰紹琛等自興州與蜀三招討戰于三泉唐縣故城在漢中府寧羌州大敗之斬首五千級餘皆奔潰蜀主聞宗勳等敗倍道西走斷桔柏津即桔柏渡在保寧府昭化縣東北嘉陵白水二江合流處浮梁命王宗弼守利州李紹琛晝夜兼行趣之宋光葆遺郭崇韜書請兵不入境當舉巡屬內附茍不如約則背城決戰崇韜納之繼岌至興州光葆及諸城鎮皆望風欵附王承休與安璽霸謀掩唐軍重霸曰擊之不勝則大事去矣然公受國恩聞難不可不赴願與國俱西承休以為然使以兵從將行重霸拜于馬前曰若從開府還朝誰當守此開府行矣重霸請為公守之承休無如之何遂行重霸遂以秦隴降唐崇韜遺王宗弼等書為陳利害宗弼棄利州歸三招討追及之相持而泣遂合謀送欵于唐蜀主至成都百官及後宫出迎蜀主入嬪妃中作回鶻隊入宫數日宗弼亦至登太元門嚴兵自備劫遷蜀主及太后後宫諸王于西宫收其璽綬及內庫金帛歸其家自稱西川兵馬留後宗弼之産利州也李紹琛至乃修桔柏浮梁進至綿州綿江浮梁已斷水深無舟楫紹琛謂李嚴曰吾軍深入利在速戰但得百騎過鹿頭關彼且迎降不暇若修繕橋梁必留數日或教王衍堅閉近關則勝負未可知矣乃與嚴乘馬浮渡江從兵得濟者僅千人溺死者亦千餘人遂入鹿頭關據漢州綿江今曰綿陽河出綿竹縣西北下流至漢州入雒江宗弼遣使勞軍且以蜀主書遺李嚴曰公來吾即降或謂嚴公首建伐蜀之䇿蜀人怨公深入骨髓不可往嚴不從欣然馳入成都撫諭吏民告以大軍繼至悉命撤去樓櫓蜀主命翰林學士李昊字穹佐自言唐宰相紳之後草降表又命平章事王鍇草降書遣兵部侍郎歐陽彬字齊美衡山人奉之以迎繼岌崇韜宗弼斬宋光嗣景閏澄李周輅歐陽晃函首送繼岌又貴韓昭佞諛梟于金馬坊門繼岌至成都李嚴引蜀主及百官儀衛出降蜀主白衣首絰銜璧牽羊百官衰絰徒跣輿櫬號哭俟命繼岌受璧崇韜解縛焚櫬承制釋罪君臣東北向拜謝大軍入成都崇韜禁侵掠市不改肆自出師至是凡七十日得節度十州六十四縣二百四十九兵三萬鎧仗錢糧金銀繒帛共以千萬計髙季興聞蜀亡方食失匕箸曰是老夫之過也梁震曰不足憂也唐主得蜀益驕亡無日矣安知其不為吾福楚王殷上表願上印綬以保餘齡優詔諭之十二月唐以董璋為東川節度使平蜀之功李紹琛為多位董璋上而璋素與郭崇韜善崇韜數與議軍事紹琛心不平謂曰吾有平蜀之功公等朴􅈪小木喻董璋小材也相從反呫囁細語也于郭公之門謀為傾害吾為都將獨不能以軍法斬公邪璋訴于崇韜十二月崇韜表璋東川節度使解其軍職使不屬紹琛紹琛愈怒曰吾冒白刃陵險阻定兩川璋乃坐有之邪乃見崇韜言東川重地任尚書有文武才宜表為帥崇韜怒曰紹琛反邪何敢違吾節度紹琛懼而退蜀王宗弼玉承休伏誅先是宗弼以蜀主之後宫珍寶賂魏王繼岌及郭崇韜求為西川節度使繼岌曰此皆我家物奚以獻為留其物而遣之已而宗弼復遣崇韜求之崇韜陽許之久而未得宗弼乃帥蜀人列狀請留崇韜鎮蜀時宦者李從襲從繼岌在軍唐主所遣以崇韜専制軍事心多不平繼岌雖為都統軍中制置一由崇韜將吏賓客趨走盈庭而都統牙門索然從襲等同恥之及破蜀蜀貴人大將爭以寶貨妓樂遺崇韜及其子廷誨繼岌所得不過匹馬束帛唾壺塵柄而已從襲等益不平因言于繼岌曰郭公父子専橫今又使蜀人請已為帥其志難測王不可不為之借繼岌謂崇韜曰主上倚侍中如山嶽豈肯棄之蠻夷之域且此非豫之所敢知也請諸人詣闕自陳于是繼岌始疑崇韜崇韜因欲誅宗弼以自明乃徵犒軍錢數萬緡于宗弼宗弼靳之士卒怨怒夜縱火喧噪崇韜遂白繼岌收宗弼等數其不忠之罪族誅之蜀人爭食宗弼之肉承休等至繼岌亦斬之閩王王審知卒子延翰字子逸審知長子立唐以孟知祥為西川節度使唐以北都留守孟知祥為西川節度使議選代者樞密承旨段徊等惡鄴都留守張憲不欲其在朝廷皆曰憲雖有宰相器然宰相在天子目前事有得失可以改更北都雖繫一方安危其任尤重非憲不可乃徙憲為太原尹王正言為興唐吏史彥瓊為鄴都監軍正言昏耄彥瓊本伶人有寵遂専六州之政威福自恣陵忽將佐正言以下皆諂事之唐主獵于白沙此洛陽之白沙也在伊闕山旁是嵗大飢民多流亡租賦不充軍士乏食有雇妻鬻子者老弱餒死流言怨嗟而唐主逰畋不息獵于白沙後宫畢從六日而還會大雪吏卒有僵仆者伊汝間飢尤甚衛兵所過責其供餉不得則壞其什器撤其室廬甚于寇盜漢白龍見漢主改元白龍更名曰龔以應龍見之祥有胡僧言讖書滅劉氏者龔也乃採易飛龍在天之義為龑字音儼以名焉長和求昏于漢長和驃信鄭旻求昏于漢漢主以其增城公主妻之長和即唐之南詔也滇載記唐光化中鄭買嗣滅蒙氏改國號曰大長和閏月唐詔罷折納折穀帛之數而以錢約官紐配紐合其數而科配之法唐主以軍儲不足謀于羣臣吏部尚書李琪上疏曰古者量入以為出計農而發兵故雖有水旱之災而無空乏之憂近代稅農以飬兵未有農富給而兵不足農捐瘠而兵豐飽者也今縱未能蠲省租稅茍除折納紐配之法農亦可以小休矣唐主即敕有司從之然竟不能行唐主又欲如汴州諫官上言不如節儉以足用自古無就食天子今楊氏未滅不宜示以虛實乃止唐遣宦者馬彥圭使蜀軍時蜀中盜賊羣起崇韜恐大軍既去更為後患命任圜張筠分道招討以是未即還唐主遣宦者向延嗣促之崇韜待之倨延嗣怒李從襲因謂曰郭公専權如是廷誨日與軍中驍將蜀士豪傑狎飲指天畫地近聞白其父請表已為蜀帥諸將皆郭氏之黨王寄身于虎狼之口一朝有變吾屬不知委骨何地矣因相向垂涕延嗣歸具以語劉后后泣訴于唐主請早救繼岌前此唐主聞蜀人請崇韜為帥已不平至是不能無疑閲蜀府庫之籍曰人言蜀中珍寶無算何如是之微也延嗣曰蜀珍貨皆入崇韜父子故縣官所得不多耳唐主遂怒遣宦官馬彥圭馳詣成都曰崇韜奉詔班師則已若有遷延跋扈之狀則與繼岌圖之彥圭見劉后説之曰蜀中事勢憂在旦夕安能緩急稟命于三千里外乎后復言之唐主曰傳聞之言未知虛實豈可遽爾后不得請退自為教與繼岌令殺崇韜崇韜素疾宦者及平蜀密謂繼岌曰師旋王必為大子他日得天下騬馬亦不可乘况任宦官宜盡去之専用士人宦官聞而切齒故羣構之騬馬扇馬也以喻宦者騬食陵反楚鑄鉛鐡錢楚王殷不征商旅由是四方商旅輻輳湖南地多鉛鐵殷用高郁䇿鑄鉛鐡錢商旅出境無所用之皆易他貨而去故能以境內所餘之物易天下百貨國以富饒湖南民不事桑蠶郁命民輸稅者皆以帛代錢未幾民間機杼大盛丙後唐同光四年四月明宗李嗣源天成元年吳戌越寶正元年是嵗蜀亡閩建國凡四國三鎮春正月唐護國軍節度使李繼麟入朝繼麟自恃與唐主故舊有功苦諸伶宦求丐無厭遂拒不與大軍之征蜀也繼麟閲兵遣其子令德將之以從景進與宦官譖之曰繼麟聞大軍起以為討己故閲兵自衛又曰崇韜與河中隂謀內外相應繼麟聞之懼欲入朝以自明其所親止之繼麟曰郭侍中功高于我今事勢將危吾得見主上面陳至誠則讒人獲罪矣乃入朝唐魏王繼岌殺郭崇韜繼岌將發成都部署已定馬彥圭至以皇后教示繼岌繼岌曰彼無釁端安可為此且主上無敕獨以皇后教殺招討使可乎李從襲等泣相與巧陳利害繼岌從之召崇韜計事從者李環撾碎其首並殺其子廷誨廷信推官李嵩海州饒陽人謂繼岌曰今行軍三千里外初無敕旨擅殺大將大王奈何行此危事邪繼岌曰公言是也悔之無及嵩乃召書吏數人登樓去梯矯為敕書用蠟印宣之軍中粗定崇韜左右皆竄匿獨掌書記張礪滏陽人詣魏王府慟哭久之繼岌命任圜代總軍政唐殺其睦王存乂唐主之弟及李繼麟馬彥圭還洛陽唐主乃下詔暴郭崇韜之罪並殺其諸子朝野駭惋保大節度使睦王存乂崇韜之壻也宦官言存乂攘臂稱寃言辭怨望唐主殺之景進言李繼麟與存乂通謀宦者因共勸速除之唐主乃使朱守殷殺之復其姓名曰朱友謙時諸軍飢窘妄為謡言伶官采之以聞故崇韜友謙皆及于禍李嗣源入朝亦為謡言所屬唐主遣朱守殷察之守殷私謂嗣源曰令公勳業振主宜自圖歸藩以逺禍嗣源曰吾心不負天地禍福之乘無可避皆安之于命耳時伶官用事勳舊人不自保嗣源危殆者數四李紹宏左右營護以是得全唐魏王繼岌發成都先是孟知祥至成都時新殺郭崇韜人情未安知祥慰撫吏民犒賜將卒去留帖然至是繼岌留李仁罕字德美陳留人潘仁嗣東光人趙廷隱太原人張業俊儀人武璋文水人李延厚平恩人等戍成都而還二月唐鄴都亂遣李紹榮招諭之唐魏博指揮使楊仁晸將兵戍瓦橋踰年代歸唐以鄴都空虛恐兵至為變敕留屯貝州時天下莫知郭崇韜之罪民間訛言皇后弒帝人情愈駭仁晸部兵皇甫暉魏州人因人情不安遂作亂劫仁晸仁晸不從暉殺之又劫小校不從又殺之效節指揮使趙在禮字幹臣涿州人聞亂而走暉追及示以二首在禮懼而從之亂兵遂奉以為帥焚掠貝州南趨臨清有向鄴都告亂者都巡撿使孫鐸等亟詣史彥瓊請授甲乘城為備彥瓊曰賊至為備未晚是夜賊前鋒攻北門彥瓊兵潰單騎奔洛陽賊遂入鄴都在禮據宫城署皇甫暉趙進定州人為指揮使縱兵大掠王正言方據案召吏草奏其家人告之索馬不得乃步出府門謁在禮再拜請罪在禮諭遣之衆擁在禮為留後張憲家在鄴都在禮厚撫之遣使以書誘憲憲斬其使以聞唐主乃命歸德節度使李紹榮詣鄴都招撫已而紹榮至鄴都攻之不克紹榮至鄴都攻其南門遣人以敕招諭之趙在禮拜于城上曰將士思家擅歸相公誠善為數奏得免于難敢不自新史彥瓊戟手大罵曰羣死賊城破萬段皇甫暉謂衆曰觀史武德之言上不赦我矣因聚衆掠敕書手壞之守陴拒戰紹榮攻之不利以狀聞唐主怒曰克城之日勿遺噍類大發諸軍討之唐李紹琛反于蜀魏王繼岌使工部尚書任圜討擒之郭崇韜之死也李紹琛謂董璋曰公復欲呫囁誰門邪璋懼謝罪魏王繼岌至武連西魏縣宋省故城在今保寧府劍州遇敕使諭令董璋將兵誅朱令德友謙子為武信節度使在遂州遂州注見前時紹琛將後軍去中軍一舍聞之以唐主不見委大驚俄而璋過不謁紹琛怒謂諸將曰國家南取大梁西定巴蜀皆郭公之謀而吾之功也至于去逆效順與國家犄角以破梁則朱公也今朱郭皆無罪族滅歸朝之後行及我矣寃哉天乎奈何紹琛所將多河中兵河中將焦武等號哭于軍門曰西平王友謙封何罪闔門屠膾我輩歸則同誅決不復東矣紹琛自劍州擁兵西還自稱西川節度使移檄成都招諭蜀人衆至五萬繼岌以任圜為副招討使討之時董璋屯綿州以兵二萬會圜追及紹琛于漢州紹琛迎戰大敗以十餘騎奔綿竹遂擒之繼岌乃引兵而東紹琛之被擒也孟知祥至漢州犒軍與任圜董璋置酒髙會引紹琛檻車至座中知祥自酌大巵飲之謂曰公何患不富貴而求入此邪紹琛曰郭侍中佐命功第一兵不血刃取兩川一旦無罪族誅如紹琛輩安保首領以此不敢歸耳紹琛至鳯翔白延嗣以唐主命殺之唐從馬直唐主選諸軍驍勇者為親軍號從馬直軍士作亂伏誅從馬直指揮使郭從謙本優人也優名郭門高以德勝之役挑戰有功遂有寵積功至指揮使郭崇韜方用事從謙以叔父事之又為睦王存乂假子及二人得罪從謙數以私財饗諸校對之流涕言崇韜之寃至是軍士王溫等五人作亂擒斬之唐主戲謂從謙曰汝既負我附崇韜存乂又教王溫反欲何為也從謙益懼既退隂謂諸校曰主上以王溫之故俟鄴都平定盡坑若曹家之所有宜盡市酒肉勿為久計也由是親軍皆不自安唐遣李嗣源將親軍討鄴都李紹榮再攻鄴都賊知不赦堅守無降意唐主患之日發中使促魏王繼岌還軍繼岌以討李紹琛未至紹榮久無功會邢州兵趙太等亦為亂據州未下滄州軍亂小校王某戡自為留後河朔州縣告亂者相繼唐主欲自征鄴都大臣皆言京師根本車駕不可輕動唐主曰諸將無可使者皆曰李嗣源最為勳舊唐主心忌嗣源曰吾惜嗣源欲留宿衛皆曰他人無可者張全義李紹宏亦屢言之乃許之三月唐討鄴兵劫李嗣源入鄴都李嗣源至鄴都城西南下令詰旦攻城是夜從馬直軍士張破敗帥衆大譟焚營嗣源叱而問之對曰將士從主上十年百戰以得天下今貝州戍卒思歸主上不赦從馬直數卒喧競遽欲盡誅其衆我輩初無叛心但畏死耳今欲與城中合勢請主上帝河南令公帝河北嗣源涕泣諭之不從遂拔白刃擁嗣源及李紹真即霍彥威等入城城中不受外兵逆擊之皆潰趙在禮帥諸校迎拜嗣源泣謝曰將士輩負令公敢不惟命是聽嗣源詭説在禮曰凡舉大事須借兵力今外兵流散無所歸我為公出收之在禮乃聽嗣源紹真俱出城宿魏縣散兵稍有至者唐李嗣源奔相州李嗣源之為亂兵所逼也李紹榮有衆萬人營于城南嗣源遣牙將七人相繼召之欲與共攻亂者紹榮不應及嗣源入鄴遂引兵去至是嗣源在魏縣衆不滿百又無兵仗李紹真所將鎮兵五千聞嗣源得出相帥歸之由是兵稍振嗣源欲歸藩待罪中門使安重誨應州人曰公為元帥不幸為凶人所劫李紹榮不戰而退歸朝必以公藉口公若歸藩則為據地要君適足以實讒慝之口耳不若星行詣闕面見天子庶可自明嗣源曰善南趣相州遇馬坊使康福蔚州人得馬數千匹始得成軍唐豫借河南夏秋稅唐主以軍食不足敕河南尹豫借夏秋稅民不聊生租庸使以倉儲不足頗朘刻軍糧軍士流言益甚宰相懼帥百官上表請出內庫之財以給諸軍唐主欲從之劉后曰吾夫婦君臨萬國雖藉武功亦由天命命既在天人如我何宰相又于便殿論之后屬耳于屏風後須臾出粧具及三銀盆皇幼子三人于外曰四方貢獻隨以給賜所餘止此耳請鬻以贍軍宰相惶懼而退唐李嗣源反引兵向大梁歐陽修五代史唐莊宗紀書李嗣源反綱目不書尹起莘曰綱目于嗣源多恕辭亮其無利之之心也歐陽氏書反明君臣之大義也今于嗣源入鄴依綱目書劫于引兵向大梁依歐陽史書反李紹榮退保衛州奏李嗣源已叛與賊合嗣源遣使上章自理一日數輩唐主遣嗣源長子從審喻嗣源至衛州紹榮欲殺之從審乃還唐主憐之賜名繼璟待之如子嗣源所奏皆為紹榮所遏不得通嗣源由是疑懼石敬瑭曰夫事成于果決而敗于猶豫安有上將與叛卒入賊城而他日得保無恙乎大梁天下之要會也願假三百騎先往取之公引大軍亟進如此始可自全康義誠字信成代北三部落人曰主上無道軍民怨望公從衆則生守節必死嗣源乃令安重誨移檄會兵時嗣源家在真定虞候將王建立遼州榆社人先殺其監軍由是獲全李從珂將所部兵趣鎮州與建立合倍道從嗣源嗣源分三百騎遣石敬瑭將之前驅李從珂為殿軍勢大盛唐主乃詔白從暉將騎兵扼河陽橋出金帛給賜諸軍軍士詬曰吾妻子已殍死得此何為李紹榮至洛陽曰鄴都亂兵欲濟河襲鄆汴願陛下幸關東謂汜水關以東招撫唐主從之唐殺故蜀主王衍夷其族景進等言于唐主曰西南未安王衍族黨不少聞車駕東征恐其為變不若除之唐乃遣中使齎敕往誅之敕曰王衍一行並從殺戮已印畫張居翰覆視就殿柱揩去行字改為家字由是獲免者千餘人衍母徐氏且死呼曰吾兒以一國迎降不免族誅信義俱棄吾知汝行亦受禍矣唐主如關東李嗣源入大梁唐主乃還唐主發洛陽次汜水或勸李繼璟亡去不從唐主屢遣之繼璟固辭請死唐主聞嗣源在黎陽強遣繼璟召之道遇李紹榮見殺嗣源至滑州符習安審通金全之姪引兵來會知汴州孔循遣使迎唐主亦遣使輸欵于嗣源曰先至者得之石敬瑭以徑兵入封邱門遂據其城使人趣嗣源嗣源入大梁是日唐主至榮澤東命龍驤指揮使姚彥溫帥三千騎為前軍彥溫即以衆叛歸嗣源嗣源奪其兵唐主至萬勝鎮在開封府中牟縣東聞嗣源已據大梁諸軍離叛神色沮喪登髙歎曰吾不濟矣即命旋師夜即至汜水扈從兵三萬五千已失萬餘人還過罌子谷道遇衛士輒以善言撫之曰適報魏王又進西川金銀五十萬到京當給爾曹對曰陛下賜已晚矣人亦不感聖恩唐主涕泣而已又索袍帶賜從官內庫使張容哥稱頒給已盡衛士叱之曰致吾君失社稷皆此閹豎輩也抽刀逆之容哥謂同類曰皇后吝財至此今乃歸咎于吾輩事若不測吾輩萬段吾不忍待也因赴河死水罌子谷在汜縣西唐主至石橋西置酒悲涕晚入洛城嗣源命石敬瑭將前軍趨汜水收撫散兵嗣源繼之李紹虔即杜晏球李紹英本房知溫字伯王瑕邱人引兵來會宰相樞密奏西將軍至車駕宜且控汜水收撫散兵以俟之唐主從之夏四月唐伶人郭從謙弒其主存朂李嗣源入洛陽唐主欲復如汜水四月朔嚴辦將發從馬直指揮使郭從謙帥所部兵攻興教門洛陽皇城中左門唐主方食聞變帥衛兵擊之逐亂兵出門時朱守殷將騎兵在外唐主急召之守殷不至引兵憩茂林下亂兵焚興教門緣城而入近臣宿將皆釋甲潛遁獨散員都指揮使李彥卿字官俟存審之子軍校何福進王全斌皆太原人等十餘人力戰俄而唐主為流矢所中鷹坊人善友善姓友名扶至絳霄殿廡下抽矢渴悶劉后不自省視遣宦者進酪須臾遂殂彥卿等痛哭而去左右皆散善友斂樂器覆尸而焚之劉后囊金寶繫馬鞍與申王存渥注見前及李紹榮焚嘉慶殿出走朱守殷入宫選宫人三十餘人內于其家于是諸軍大掠是日李嗣源至罌子谷謂諸將曰主上深得士心止為羣小蔽惑致此今吾將安歸乎乃入洛陽止于私第禁焚掠拾莊宗骨于灰燼之餘而殯之謂朱守殷曰公善巡徼以待魏王淑妃德妃在宫供給尤宜豐備吾俟山陵畢社稷有奉則歸藩為國捍禦北方耳是日豆盧革帥百官上箋勸進嗣源曰吾奉詔討賊不幸部曲叛散欲入朝自訴又為紹榮所隔披猖至此諸君見推殊非相悉願勿言也魏王繼岌至興平聞亂復引兵西謀保鳯翔唐太原軍亂初莊宗命吕鄭二內飬在晉陽張憲以下承應不暇莊宗既殂推官張昭逺字潛夫濮州范縣人勸張憲奉表勸進憲曰吾自布衣至服金紫皆出先帝之恩豈可偷生而不自愧乎昭逺泣曰此古人所行公能行之忠義不朽矣有李存沼者莊宗之近屬與二內養謀殺憲及巡檢李彥超彥卿之兄彥超欲先圖之憲曰僕受先帝厚恩不忍為此徇義而不免于禍乃天也軍士共殺二內養及存沼憲奔欣州會嗣源移書至彥超號令士卒城中始安後嗣源即位有司劾憲失城之罪見殺唐李嗣源監國百官三箋請嗣源監國嗣源乃許之入居興聖宫百官班見下令稱教宣徽使選後宫美少者數百獻之監國曰奚用此為對曰宮中職掌不可闕也監國曰宫中職掌宜諳故事此輩安知乃悉補用老舊之人其年少者皆出之唐以安重誨為樞密使張延朗汴州開封人為副使延朗本梁租庸吏性纎巧善事權要故重誨引之唐監國嗣源殺劉后及諸王監國令所在訪求諸王通王存確雅王存紀俱太祖子匿民間安重誨與李紹真謀曰今殿下既監國典喪諸王宜早為之所以一人心密遣人殺之後月餘監國聞之切責重誨傷惜久之劉后奔晉陽在道與存渥私通存渥為其下所殺劉后為尼于晉陽監國使人就殺之莊宗幼子繼嵩等皆不知所終惟雍王存美太祖次子以病得免髙季興以孫光憲字孟文陵州人掌書記徐溫髙季興聞莊宗遇殺益重嚴可求梁震梁震薦孫光憲掌書記季興欲攻楚光憲諌曰荆南亂離之後賴公休息士民始有生意若又與楚國交惡他國乘吾之弊良可憂也季興乃止唐監國嗣源殺李紹榮先是紹榮將奔河中為人所執折其兩足送洛陽監國責之曰吾何負于爾而殺吾兒紹榮瞋目直視曰先帝何負于爾遂斬之復其姓名曰元行欽唐監國嗣源殺孔謙廢祖庸使及諸道監軍監國下教數租庸使孔謙姦佞侵刻窮困軍民之罪斬之孔謙所立苛斂之法皆罷之因廢租庸使依舊為三司委宰相一人専判又罷諸道監軍使以莊宗由宦官亡國命諸道盡殺之唐魏王繼岌至長安自殺魏王繼岌退至武功李從襲曰退不如進請亟東行以救內難繼岌從之還至渭水留守張籛己斷浮橋乃循水浮渡至渭南腹心吕知柔等皆已竄匿從襲謂繼岌曰時事已去王宜自圖繼岌徘徊流涕乃自伏于牀命僕夫李環縊殺之任圜代將而東華州都監李沖殺從襲唐主嗣源立有司議即位禮李紹真孔循以為唐運已盡宜自建國號監國問左右何謂國號對曰先帝賜姓于唐為唐復讐故稱唐今梁朝之人不欲殿下稱唐耳監國曰吾年十三事獻祖莊宗尊其祖國昌為獻祖獻祖以吾宗屬視吾猶子又事武皇先帝垂五十年經綸攻戰未嘗不預武皇之基業則吾之基業也先帝之天下則吾之天下也安有同家而異國乎李琪曰若改國號則先帝遂為路人梓宫安所托乎不惟殿下忘三世舊君吾曹為人臣者又能自安乎前代以旁支入繼多矣宜用嗣子柩前即位之禮衆從之監國服斬衰于柩前即位百官縞素既而御衮冕受册百官吉服稱賀唐大赦唐主大赦量留後宫百人宦官三十人教坊百人鷹坊二十人御厨五十人中外毋得獻鷹犬竒玩諸司使務有名無實者皆廢之分遣諸軍就食近畿以省饋運除夏秋稅省耗諸侯四節貢舉毋得斂百姓刺史以下不得貢奉唐以鄭珏任圜同平章事圜憂公如家簡拔賢俊杜絶僥幸期年之間軍民皆足朝綱粗立園每以天下為己任由是安重誨忌之唐李紹真等復姓名李紹真李紹瓊李紹英李紹虔李紹竒李紹能各復舊姓名為霍彥威萇從簡豫州人房知溫王晏球夏魯竒米君立晏球本王氏子注見前故請復姓王唐以趙在禮為義成節度使在禮請唐主幸鄴都唐主徙在禮義成節度使辭以軍情未聽不赴唐以馮道趙鳳為端明殿學士唐主目不知書四方奏事皆令安重誨讀之重誨亦不能盡通乃奏請選文學之臣與之共事以備應對乃置端明殿學士以道鳯為之唐聽郭崇韜歸葬復朱友謙官爵秋七月唐初令百官轉對初令百官正衙常朝外五日一赴內殿起居轉對奏事契丹攻渤海拔夫餘城注俱見前契丹主按巴堅攻渤海拔其夫餘城更名曰東丹國命其長子托允舊作突欲今改鎮之號人皇王次子德光字德謹宋白曰本名耀渠芝後改焉按耀渠芝舊作耀屈之今改守西樓號元帥太子唐遣供奉官姚坤如契丹唐遣姚坤告哀于契丹契丹主阿保機聞莊宗遇害慟哭曰我朝定兒也朝定猶華言朋友也謂坤曰今天子聞洛陽有急何不救對曰地逺不能及曰何故自立坤為言其由契丹主曰漢兒喜飾説母多談又曰聞吾兒専好聲色遊畋不恤軍民宜其及此我自聞之舉家不飲酒散遣伶人解縱鷹犬若欲效吾兒所為行自亡矣又曰我于今天子無怨足以修好若與我大河之北吾不復南侵矣坤曰此非使臣之所得専也契丹主怒囚之旬餘復召之曰河北恐難得得鎮定幽州亦可也給紙筆趣令為狀坤不可欲殺之韓延徽諫乃復囚之唐豆盧革韋説罷革説奏事唐主前禮貌不盡恭百官俸錢皆折估而革父子獨受實錢説以孫為子奏官受選人賂除近官中旨以蕭希甫宋州人為諫議大夫革説覆奏希甫恨之上疏言革説不忠前朝並誣革他罪制罷革説擢希甫為散騎常侍後革説皆流逺州見殺契丹主按巴堅殂綱目書死今依南北朝魏太宗例改書殂其景宗以後以宋為統仍依綱目東晉魏太祖續綱目南宋金元例書卒按巴堅卒于夫餘城舒嚕后召諸酋長妻謂曰我今寡居汝不可不效我又集其夫泣問曰汝思先帝乎對曰受先帝恩豈得不思曰果思之宜往見之遂殺之八月乙酉朔日食唐平盧軍亂討平之平盧軍校王公儼作亂討斬之并誅其黨支使唐節度採訪等使幕僚有判官支使等名韓叔嗣貴州北海人預焉其子熙載字叔言將奔吳密告其友李穀字惟珍汝隂人曰吳若用吾為相當長驅以定中原穀笑曰中原若用吾為相取吳如囊中物耳九月契丹德光立契丹舒嚕后愛中子德光欲立之至西樓命與托允俱乘馬立帳前謂諸酋長曰二子皆愛之莫知所立汝曹擇可立者執其轡酋長知其意爭執德光轡后曰衆之所欲吾安敢違遂立之為天皇王托允愠欲奔唐后遣歸東丹德光尊后為太后國事皆決焉太后復納其姪為后德光性孝謹母病不食亦不食以韓延徽為政事令聽姚坤歸唐契丹葬按巴堅子木葉山廟號太祖太后左右有桀點者后輒謂曰為我逹語于先帝至墓所則殺之前後所殺以百數最後趙思溫當往不肯行后曰汝事先帝嘗親近何為不行對曰親近莫如后后行臣則繼之后曰吾非不欲從先帝于地下也顧嗣子幼弱國家無主不得往耳乃斷一腕令置墓中思溫亦得免本葉山考遼史地理志永州有木葉山上建契丹始祖廟又祖州有祖山太祖陵鑿山為殿是遼太祖葬祖山不葬木葉山也與五代史不同今一統志木葉山在克什克騰旗北蒙古名濟吉溫都爾遼太祖陵在巴林旗北廢祖州界趙思溫字文美平州盧龍人冬十月王延翰自稱閩王延翰驕淫殘暴自稱大閩國王宫殿百官皆放天子之制契丹盧龍節度使盧文進奔唐文進為契丹守平州唐主遣人説之以易代之後無復嫌怨文進所部皆華人思歸乃帥其衆十萬歸唐唐以趙季良為三川制置轉運使李嚴為西川都監初郭崇韜率蜀中富民輸犒賞錢五百萬緡給軍之餘猶二百萬緡至是任圜判三司知成都富饒遣季良為三川都制置轉運使蜀人皆欲不與知祥曰府庫他人所聚輸之可也州縣租稅以贍鎮兵決不可得季良但發庫物不敢復言制置轉運職事安重誨以知祥及東川節度使董璋皆據險擁兵又知祥乃莊宗近姻陰欲圖之李嚴自請為西川監軍嚴母謂曰汝前啓滅蜀之謀今日再往必以死報蜀人矣已而嚴果為知祥所殺知祥見嚴盛陳兵甲謂曰公前奉使王衍歸而請兵伐蜀莊宗用公言遂致兩國俱亡今公復來蜀人懼矣且天下皆慶監軍公獨來監吾軍何也嚴惶懼求哀知祥曰衆怒不可遏也因揖下斬之而誣奏以他罪初知祥至蜀蜀中羣盜猶未息知祥遣趙廷隱張業討定之擇廉吏使治州縣蠲除橫賦安集流散與民更始已而增置營兵修葺城垣隂有據蜀之志以趙季良與之有舊遂奏留之唐主不得已以季良為西川節度副使李昊亦歸蜀知祥以為觀察推官推官後唐置與判官俱為幕職十二月閩王延稟弒其君延翰而立其弟延鈞延翰蔑棄兄弟出延鈞為泉州刺史延翰多取民女以充後庭延鈞上書極諫由是有隙審知飬子延稟為建州刺史延翰使之采擇延稟復書不遜亦有隙于是合兵襲福州延稟先至梯城而入延翰驚匿延稟執之暴其罪惡斬于門外延鈞至延稟納之推為威武留後唐以為節度使尋封閩王唐以其子從榮為天榮節度使丁後唐天成二年吳乾貞亥元年是嵗凡四國三鎮春正月唐主更名亶初唐主詔朕二名不連稱者勿避至是乃改名唐以馮道崔協齊州人邠之曽孫同平章事安重誨以孔循少侍宫禁謂其諳練故事知朝士行能多聽其言時議置相循已薦鄭珏又薦崔協而任圜欲用李琪珏素惡琪由是循力沮之他日議于唐主前圜曰重誨未悉朝中人物為人所賣協雖名家識字甚少臣既以不學忝相位奈何更益以協為天下笑乎唐主曰宰相重任卿輩審之吾在河東時見馮書記多才博學與物無競此可相矣既退循不揖拂衣去因稱疾不朝者數日重誨謂圜曰今方乏人協且備員可乎圜曰明公捨李琪而相崔協是猶棄蘇合之丸出大秦國煎衆香為之取蛣蜣之轉黑甲蟲一名蜣蜋摶糞為丸如轉車然也循與重誨日短琪而譽協竟以道協同平章事唐主以其子從厚為河南尹判六軍諸衛事從厚從榮之弟也從榮聞之不悅二月唐郭從謙伏誅夷其族唐以郭從謙為景州刺史既至遣使族誅之三月唐鄴都軍亂討平之初莊宗之克梁也以魏州牙兵之力及其亡也皇甫暉張破敗之亂亦由之趙在禮之徙義成不之官亦實為其下所制在禮自謀脫禍隂求移鎮唐主乃謂之除皇甫暉陳州趙進貝州刺史徙在禮為橫海節度使以皇甫從榮鎮鄴都命范延光字子環相州臨漳人將兵送之且制置鄴都軍事乃出奉節等九指揮三千五百人使軍校龍晊部之戍盧臺軍唐置今為鎮在順天府寧河縣東南不給鎧仗但繫幟于長竿以别隊伍由是皆俯首而去中途聞孟知祥殺李嚴軍中籍籍已有訛言既至會朝廷擢烏震信都人為副抬討使代房知溫知溫怨震誘龍晊所部兵殺之其衆譟于營外馬軍指揮使安審通脫身濟河知溫恐事不濟亦走渡河與審通合謀擊亂兵亂兵列炬宵行疲于荒澤詰朝騎兵四合擊之亂兵殆盡四月敇盧臺亂兵在營家屬並全門處斬鄴都合九指揮之門驅三千五百家凡萬餘人悉斬之永濟渠即今衛河注見前為之變赤朝廷雖知知溫首亂欲安反側詔加侍中夏五月荆南自附于吳吳人不受初唐魏王繼岌破蜀遣押牙韓珙等部送蜀珍貨四十萬浮江而下高季興殺而掠之唐主既立遣使詰問對曰欲知覆溺之故宜自按問水神唐主怒會季興襲據夔州季興先請蘷忠萬三州為屬郡唐主許之又請自除刺史不許季興輒遣兵突入蘷州據之乃削季興官爵以劉訓為招討使討之會久雨糧道不繼軍士疾疫乃詔訓引兵還至是楚王殷遣使入貢唐主賜之駿馬十美女二過江陵季興復奪之而自附于吳徐溫曰為國者當務實效而去虛名洛陽去江陵不逺唐人步騎襲之甚易我以舟師泝流救之甚難夫臣人而不能救使之危亡能無愧乎乃受其貢物辭其稱臣已而唐取蘷忠萬三州季興復請稱蕃于吳吳進季興秦王六月唐任圜罷任圜性剛急勇于敢為權幸多疾之舊制館劵猶今勘合出于户部安重誨請從內出與圜爭于唐主前聲色俱厲唐主退朝宫人曰妾在長安宫中未嘗見宰相樞密奏事敢如是者蓋輕大家耳唐主不悅卒從重誨議圜因求罷居磁州唐以馬殷為楚國王殷始建國立宫殿置百官以姚彥章汝南人許德勳為丞相秋八月己卯朔日食九月契丹與唐修好冬十月唐主如汴州宣武節度使朱守殷反唐主遣兵討之遂遣使殺任圜守殷自殺唐主如汴州至榮陽民間訛言帝欲制置東方諸侯宣武節度使朱守殷疑懼判官孫晟高密人勸守殷反守殷遂乘城拒守唐主遣范延光往諭之延光曰不早擊之則汴城堅矣願得五百騎與俱從之延光暮發未明行二百里扺大梁城下與汴人戰御營使石敬瑭將親軍倍道繼之或謂安重誨曰失職在外之人乘賊未破或能為患不如除之重誨奏遣使賜任圜死趙鳯哭謂重誨曰任圜義士安肯為逆公濫刑如此何以贊國使至圜聚族酣飲然後死神情不撓唐主至大梁守殷自殺乘城者望見乘輿相帥開門降孫晟奔吳徐知誥客之唐免三司通負二百萬緡吳丞相徐溫卒初溫子行軍司馬知詢以其兄知誥非徐氏子數請代之執吳政溫曰汝不如也嚴可求及副使徐玠屢勸溫溫以知誥孝謹不忍可求等言之不已溫欲帥諸藩鎮入朝勸吳王稱帝將行有疾乃遣知詢奉表勸進因留代知誥執政未果溫卒知詢亟歸金陵吳王贈溫齊王諡曰忠武十一月吳王楊溥稱帝十二月唐以周元豹為光祿卿致仕初晉陽相者周元豹嘗言唐主貴不可言唐主欲召詣闕趙鳳曰元豹言已驗矣無所復詢若置之京師則輕躁狂險之人必輻輳其門爭問吉凶自古術士妄言致人族滅者多矣非所以靖國家也乃就除光祿卿致仕厚賜金帛而已有年是嵗蔚代緣邊粟斗不過十錢戊後唐天成三年漢大有子元年是嵗凡四國三鎮春二月丁丑朔日食吳遣使如唐不受吳使者至安重誨以為楊溥敢與朝廷抗禮遣使窺覘拒而不受自是遂與吳絶二月唐以孔循為東都留守王建立同平章事樞密使孔循性狡佞安重誨親信之唐主欲為皇子娶重誨女循謂曰公職居近密不宜復與皇子為昏重誨辭之久之循陰遣人結王德妃求納其女唐主許之重誨大怒出循東都重誨性強愎惡成德節度使王建立奏其有異志建立入朝因言重誨與宣徽使張延朗結昏相表裏弄威福唐主怒謂重誨曰今與卿一鎮以王建立代卿延朗亦除外官宣徽使朱𢎞昭太原人曰陛下平日待重誨如左右手奈何以小忿棄之唐主尋召重誨慰撫之會鄭珏請致仕以建立為僕射平章事判三司夏四月唐以子從榮為北都留守以從榮為北都留守馮贇太原人為副留守楊思權新平人為步軍都指揮使以佐之唐主謂安重誨曰從榮左右有矯宣朕旨令勿接儒生恐溺人志氣者朕以從榮年少臨大藩故擇名儒使輔導之今姦人所言乃如此欲斬之重誨請嚴戒而已唐王都反奚契丹助之唐遣招討使王晏球等將兵討破之義武節度使王都在鎮十餘年自除刺史租賦皆贍本軍及安重誨用事稍以法制裁之唐主亦以都篡父位惡之時契丹數犯塞朝廷多屯兵于幽易間都隂為之備浸成猜沮腹心和昭訓勸都為自全之計都乃遣人説北面副招討使王晏球晏球不從乃以金遺晏球帳下使圖之不克晏球以都反狀聞詔削奪官爵以晏球為招討使發諸道兵討之都以重賂求救于奚酋托輝五月托輝以萬騎突入定州晏球退保曲陽本漢上曲陽唐去上今縣屬定州都與托輝就攻之晏球與戰破之因進攻得其西關城以為行府使三州祁易定民輸稅供軍食而守之契丹亦發兵救定州與王都襲破新樂隋縣今屬正定府合兵萬餘人至曲陽邀戰晏球集諸將校令之曰王都輕而驕可一戰擒也今日乃諸軍報國之時悉去弓矢以短兵擊之回顧者斬于是騎兵先進奮撾揮劍直衝其陳大破之僵尸蔽野契丹死者過半餘衆北走都與托輝得數騎僅免盧龍節度使趙德鈞幽州薊人邀擊契丹北走者殆無孑遺吳遣使如楚先是吳侵楚嶽州楚擊敗之獲其將苗璘王彥章此吳將别一王彥章也以歸至是吳求和于楚請璘彥章楚王殷歸之許德勳餞吳使謂曰楚國雖小舊臣宿將猶在願吳朝勿以措懷必俟衆駒爭皂棧然後可圖也時殷多內寵嫡庶無别諸子驕奢故德勳語及之秋七月契丹救定州王晏球擊走之八月擒其將特哩衮契丹官名掌治宗族史失其人故但記其官按特哩衮舊作惕隱今改正契丹復遣酋長特哩衮救定州晏球逆戰破之追至易州俘斬溺死者不可勝紀趙德鈞遣牙將武從諫邀擊之擒特哩衮等數百人餘衆散投村落村人以挺擊之其得脫者不過數十人自此契丹沮氣不敢輕犯塞德鈞獻俘諸將皆請誅之唐主曰此曹皆虜中驍將殺之則虜絶望不若存之以紓邊患乃赦特哩衮等五十人餘六百人悉斬之閏月契丹遣使如唐九月唐溫韜段凝伏誅先是韜凝皆流邊郡至是唐主以韜發諸陵凝反覆敕所在賜死冬十一月唐立哀帝廟于曹州十二月荆南節度使髙季興卒吳立其子從誨字遵聖季興長子代之從誨既襲位謂僚佐曰唐近而吳逺捨近臣逺非計也乃因楚王殷以謝罪于唐求復修職貢唐以為荆南節度使已唐天成四年吳太和元丑年是嵗凡四國三鎮春二月唐王晏球克定州王都伏誅獲托輝送大梁斬之定州守備固伺察嚴諸將屢有謀翻城應官兵者皆不果唐主遣使者促王晏球攻城晏球與使者連騎巡城謂之曰城髙峻如此借使主人聽外兵登城亦非梯衝所及徒多殺精兵無損于賊不若食三州之租愛民養兵以俟之彼必內潰唐主從之王都托輝欲突圍走不得出定州都指揮使馬讓能開門納官軍都舉族自焚擒托輝送大梁斬之晏球在定州城下日以私財饗士自始攻至克城未嘗戮一卒已而入朝唐主美其功晏球謝久煩餽運而已三月楚王殷以其子希聲字若訥殷次子知政事總諸軍自是國政先歷希聲乃逹于殷夏四月唐置緣邊市馬場先是黨項皆詣闕以貢馬為名國家約其直酬之加以館穀賜與嵗費五十餘萬緡至是始于緣邊置場市馬不令詣闕唐以子從榮為河南尹從厚為北都留守先是從榮為北都年少驕狠不親政務唐主遣左右往諷𨗳之其人謂曰河南相公謂從厚時為河南尹孝謹好善親禮端士有老成之風相公齒長宜自策勵勿令聲問出河南之下從榮不悅退告楊思權曰我其廢乎思權因勸從榮多募部曲繕甲兵隂為自固之備其人懼以告馮贇贇密奏之唐主召思權詣闕亦弗之罪已贇入為宣徽使謂執政曰從榮剛僻而易宜選重德輔之至是唐主以從榮尹河南而以從厚留守北都史館修撰張昭逺上言竊見先朝皇弟皇子皆喜俳優入則飾姬妾出則誇僕馬習尚如此何道能賢諸皇子宜精擇師傅令皇子屈身師事之講禮義之經論安危之理古者人君即位則建太子所以明嫡庶之分塞禍亂之源今卜嗣建儲臣未敢輕議至于恩澤賜與之間昏姻省侍之際嫡庶長幼宜有所分示以等威絶其僥冀唐主賞嘆其言而不能用唐以趙鳯同平章事唐主問鳯帝王賜人鐵劵何也對曰與之立誓令其子孫長享爵祿耳唐主曰先朝受此賜者三人崇韜繼麟尋皆族滅朕得脫如毫釐耳因嘆息久之鳳曰帝王心存大信固不必刻之金石也秋八月楚馬希聲殺判官髙郁初楚王殷用都軍判官髙郁為謀主國以富強鄰國皆疾之莊宗人洛殷遣其子希範入貢莊宗愛其警敏曰比聞馬氏當為髙郁所奪今有子如此郁安能得之髙季興亦屢以流言間郁于殷殷不聽乃遣使遺希聲書盛稱郁功名願為兄弟司馬楊昭遂希聲之妻族也謀代郁任自譖之于希聲屢言于殷請誅之殷曰成吾功業皆郁力也汝勿為此言希聲固請罷其兵柄乃左遷郁行軍司馬郁謂所親曰亟營西山長沙西岸嶽麓諸山吾將歸老猘子漸大能咋人矣希聲聞之益怒矯以殷命殺郁誣以謀叛并誅其族黨至暮殷尚未知是日大霧殷謂左右曰吾昔從孫儒度淮每殺不辜多致兹異馬步院時諸鎮營有馬步司置獄院豈有寃死者乎明日吏以郁死告殷拊膺大慟曰吾老耄政非已出使吾勳舊橫罹寃酷既而顧左右曰吾亦何可久處此乎有年唐主與馮道從容語及年穀屢登四方無事道曰臣昔在先皇幕府奉使中山歷井陘之險臣憂馬蹶執轡甚謹幸而無失逮至平路放轡自逸俄至顛隕凡為天下者亦猶是也唐主深以為然又問道今嵗雖豐百姓贍足否道曰農家嵗凶則死于流殍嵗豐則傷于榖賤豐凶皆病者惟農家為然臣記進士聶夷中詩云二月賣新絲五月糶新榖醫得眼前瘡剜郤心頭肉語雖鄙俚曲盡田家情狀農于四民之中最為勤苦人主不可不知也唐主悅命左右録其詩嘗諷誦之九月唐削錢鏐官爵同光末吳越王鏐以中國喪亂朝命不通改元寶正其後復通中國諱而不稱至是鏐遺安重誨書辭禮甚倨唐遣供奉官烏昭遇韓玫使吳越還玫奏昭遇見鏐稱臣拜舞重誨奏賜昭遇死制鏐以太師致仕自餘官爵皆削之凡吳越奏進官使者綱吏令所在繫治之鏐令子傅瓘等上表訟寃不省冬十月唐以康福為朔方節度使前磁州刺史康福善諸戎語唐主退朝多召入便殿訪以時事福輒以蕃語對安重誨惡之常戒之曰汝但妄奏事會當斬汝福懼求外補會朔方軍亂留後韓澄節度使韓洙卒弟澄為留後表請命帥重誨以靈州深入胡境為帥者多遇害以福為朔方河西節度使福見唐主泣辭唐主命更他鎮重誨不可唐主不得已遣將軍衛審􅀈徐州人等將兵萬人衛送之福行至方渠羌胡出兵邀福福擊走之至青剛峽遇吐蕃野利大蟲二族數千帳福遣審􅀈掩擊大破之殺獲殆盡由是威聲大根遂進至靈州自是朔方始受代環方渠漢縣後廢故城在今慶逺府環縣青剛峽在縣北亦曰青剛川趙珣聚米圖經青剛川在環州西北本靈州大路綱目作青銅峽考青銅峽在靈州西若康福至此則已過靈州下不必更言進至矣今依五代史通鑑改正十二月吳加徐知誥兼中書令吳諸道副都統徐知詢數與知誥爭權知詢與客周廷望説知詢捐寶貨結勳舊知詢從之廷望至江都因知誥親吏周宗密輸欵于知誥亦以知誥隂謀告知詢宗謂廷望曰人言侍中有不臣七事宜亟入謝廷望還以告知詢十一月知詢入朝知誥留以統軍遣徴金陵兵還江都知誥自是始専吳政知詢又以廷望所告詰知誥知誥曰以爾所為告我者亦廷望也遂斬之吳加知誥兼中書令知誥召知詢飲以金鐘酌酒賜之曰願弟夀千嵗知詢疑有毒引他器均之跪獻曰願與兄各享五百嵗知誥變色左右莫知所為伶人申漸高徑前訞語掠二酒合飲之攘金鐘趨出腦潰而卒唐以李仁矩為保寧節度使唐割閬果二州置保寧軍以仁矩為節度使安重誨之謀也先是仁矩奉使兩川不禮于董璋璋欲殺之涕泣而免唐主將祀南郊遣仁矩以詔諭兩川獻錢仁矩自以唐主舊將又為安重誨所厚恃恩驕縱至梓州董璋置宴召之日中不至方擁姬酣飲璋怒從徒卒執兵入驛立仁矩于階下而詬之曰公但聞西川斬李客省謂我猶不能邪仁矩流涕拜請僅而得免及還言璋必反至是重誨使仁矩詗璋反狀仁矩增飾而奏之重誨又使綿州刺史武虔裕重誨外兄將兵赴治復使夏魯竒治遂州城隍繕甲兵益兵戍之璋大懼時道路傳言又將割綿龍唐龍州今四川龍安府是為節鎮孟知祥亦懼璋素與知祥有隙未嘗通問至是遣使詣成都請為其子娶知祥女知祥許之謀併力以拒朝廷庚唐長興元年是寅嵗凡四國三鎮春正月唐董璋築寨劍門與孟知祥上表拒命詔慰諭之董璋遣兵築七寨于劍門孟知祥遣趙季良詣璋修好于是知祥與璋同上表言兩川聞朝廷于閬中建節綿遂益兵無不憂懼唐主以詔書慰諭之璋恐武虔裕窺其所為召而囚之闔集民兵皆剪髮黥靣于劍門北布列烽火知祥纍表請雲安鹽監唐主許之雲安後周縣今夔州府雲陽縣是鹽監唐雲安有十三鹽監以收鹽利今雲陽縣西北有雲安監故城三月唐立淑妃曹氏為后唐主將立曹淑妃為后妃謂王德妃邠州餅家子曰吾素病中煩倦于接對妹代我為之德妃曰中宫敵至尊誰敢干之乃立淑妃為后德妃事后恭謹后亦憐之初妃因安重誨得進常德之妃有美色先為劉鄩侍兒鄩卒無所歸有言于安重誨者重誨以告唐主而納之唐主性儉約及在位久宫中用度稍侈重誨每規諌妃取外庫錦造地衣重誨切諌引劉后為戒妃由是怨之夏四月唐河中軍亂逐其節度使李從珂討平之初唐主在真定李從珂與安重誨飲酒爭言從珂毆重誨既醒悔謝重誨終銜之至是從珂為河中節度使重誨屢短之唐主不聽重誨乃矯以唐主命諭河中牙內指揮使楊彥溫使逐之從珂出城閲馬彥溫勒兵閉門拒之從珂使人詰之對曰彥溫非敢負恩受樞院宣胡三省注樞密院用宣三省用堂帖堂帖謂之省劄宣謂之密劄請公入朝耳從珂遣使以聞唐主以問重誨對曰此姦人妄言耳宜速討之唐主疑之欲誘致彥溫訊其事重誨固請發兵擊之乃命西都留守素自通索姓也都指揮使藥彥稠沙陀三部落人等將兵討之唐主令彥稠必生致彥溫吾欲面訊之從珂馳入自明唐主責使歸第絶朝請自通拔河中斬彥溫傳首以獻唐主怒彥稠不生致深責之重誨諷馮道趙鳯奏從珂失守宜加罪唐主曰吾兒為姦黨所頎未明曲直公輩遂不欲置之人間何邪且此皆非公輩意也明日重誨自言之唐主曰朕昔為小校家貧賴此小兒拾馬糞自贍以至今日為天子曽不能庇之邪卿欲如何處之于卿為使重誨曰惟陛下裁之唐主曰使間居私第亦可矣何用復言以索自通鎮河中自通承重誨旨籍軍府甲仗數上之以為從珂私造王德妃保護得免士大夫不敢與從珂往來惟禮部郎中吕琦居相近時往見之從珂每有奏請皆咨琦而後行六月癸巳朔日食秋七月唐以張廷朗為三司使三司使設官自此始考唐末始有三司之名天祐三年設都置使尋罷至此始設三司使專管總管財賦逮及宋初位亞執政號為計相職仕益重唐立子從榮為秦王從厚為宋王八月唐兩川節度使董璋孟知祥連兵反唐遣指揮使姚洪史無里系將兵千人從李仁矩戍閬州董璋以書至洛告其子宫苑使光業曰朝廷割吾支郡分建旄節又以兵戍之是必欲殺我也汝為我語樞要若再發一騎入斜谷吾必反與汝訣矣光業以書示樞密承旨李虔徽未幾安重誨復遣别將荀咸乂益兵赴閬璋聞之遂反重誨既遣咸乂光業謂虔徽曰此兵未至吾父必反吾不敢自愛恐煩朝廷調發願止此兵吾父保無他虔徽以告重誨重誨不從成乂未至璋已反利李彥琦閬李仁矩遂夏魯竒三鎮以聞安重誨曰臣久知其如此陛下含容不討耳唐主曰我不負人人負我則討之時西川進奏官蘇願在洛陽遣人白孟知祥云朝廷欲大發兵討兩川知祥謀于副使趙季良季良請以東川先取遂閬然後併兵守劍門知祥從之遣使約董璋璋引兵擊閬州知祥以指揮使李仁罕趙廷隱張業將兵攻遂州侯𢎞實千乘人孟思恭將兵會璋攻閬州已而璋陷閬州殺李仁矩執姚洪洪不屈死之洪初為小校嘗事璋及是被執璋謂曰我待汝厚汝何相負洪曰老賦爾昔為李七郎家奴掃馬糞得一臠殘炙感恩無窮今天子用爾為節度使何負于爾而反邪吾能為國家死不從人奴以生璋怒然鋌于前令壯士十人刲其肉而食洪至死罵不絶聲唐主置洪二子于近衛厚給其家李七郎汴州富人李也入梁曰朱友讓瑋與髙季興孔循皆其家僮九月唐以范延光為樞密使安重誨久專大權中外惡之王德妃及武德使孟漢瓊本王鎔家奴浸用事數短重誨于上重誨懼表解機務求一鎮以全餘生唐主不許重誨請不已唐主怒曰聽卿去朕不患無人前成德節度使范延光勸留重誨且曰重誨去誰能代之唐主曰卿豈不可延光謝不敢當唐主遣漢瓊詣中書議重誨事馮道曰諸公果愛安令公宜解其樞務為便趙鳯曰公失言乃奏大臣不可輕動以延光為樞密使而重誨如故唐詔削董璋官爵遣天雄節度使石敬瑭討之唐下制削董璋官爵興兵討之以孟知祥兼供饋使知祥雖已遣兵攻遂州唐主猶欲懷輯之以離董璋之交故有是命石敬瑭為招討使夏魯竒副之誅董璋之子光業夷其族冬十一月楚王馬殷卒諡武穆子希聲嗣殷遺命諸子兄弟相繼及卒希聲襲位去建國之制復藩鎮之舊希聲居喪無戚容葬殷之日頓食雞􅌜數盤其臣潘起譏之曰昔阮籍居喪食蒸豚何代無賢唐削孟知祥官爵并討之石敬瑭入散關階州刺史王𢎞贄史不祥何所人濾州刺史馮暉魏州人與前鋒王思同幽州人趙在禮引兵出人頭山在保寧府昭化縣西綱目作馬頭山考馬頭山在閬中縣東南北去劍門三百餘里今依通鑑改正後過劍門之南元和志劍門南至劍州六十里還襲劍門克之殺東川三千人據而守之𢎞贄等破劍州而大軍不繼乃焚其廬舍取其資糧還保劍門董璋之陷閬州也將趨利州遇雨而還孟知祥聞之曰董公退處閬中逺棄劍閣非計也欲遣兵助守劍門璋辭之至是璋遣使至成都告急知祥懼曰董公果誤我遣指揮使李肇將兵五千赴之戒之曰爾倍道兼行先據劍州北軍無能為也又遣趙廷隱將萬人會屯劍州李筠將兵四千趣龍州守要害先是西川牙內指揮使龎福誠謝鍠屯來蘇村聞劍門失守相謂曰使北軍得劍州則二蜀勢危矣遽引部兵千餘人間道趣劍州始至官軍萬餘人自北山大下會日暮三人謂曰衆寡不敵逮明則吾屬無遺矣福誠夜引兵數百升北山大譟于官軍營後鍠帥餘衆操短兵自其前急擊之官軍大驚空營遁去復保劍門十餘日不出知祥聞之喜曰吾始謂𢎞贄等克劍門徑據劍州堅守其城或引兵直趣梓州董公必棄閭州奔還我亦須解遂州之圍如此則內外受敵兩川震動勢可憂危今焚毁劍州運糧東歸劍門頓兵不進吾事濟矣董璋王暉將兵三千會李肇等分屯劍州石敬瑭攻之不克在龎福太谷人來蘇村亦曰來蘇寨劍門東契丹東丹王托允奔唐托允自以失職帥部曲四十人越海奔唐唐賜姓名曰李贊華以為懷化唐慎州軍名都慎州僑治良鄉之鄉城節度使先所俘特哩衮等皆賜姓名特哩衮姓狄名懷忠十二月唐遣安重誨督征蜀諸軍石敬瑭征蜀未有功使者自軍前來多言道險狹難進兵關右之民疲于轉餉聚為盜賊唐主憂之謂近臣曰誰能辦吾事者吾當自行耳安重誨曰軍威不振臣之罪也臣請自往督戰拜辭便行日馳數百里西方藩鎮聞之無不惶駭錢帛芻糧晝夜輦運赴利州人畜斃踣不可勝紀時唐主已疏重誨石敬瑭本不欲西征及重誨西出乃敢纍表奏論以為蜀不可伐唐主頗然之辛唐長興三年是卯嵗凡四國三鎮春正月孟知祥兵陷遂州唐守將夏魯竒死之知祥將李仁罕圍遂州夏魯竒嬰城固守及是城陷魯竒自殺時石敬瑭屯劍州北山知祥梟魯竒首以示之魯竒二子在敬瑭軍泣請往取首葬之敬瑭曰知祥長者必葬而父不猶愈于身首異處乎已而知祥果葬之唐召安重誨還二月石敬瑭引兵遁歸西川兵追之陷利州初鳯翔節度使朱𢎞昭諂事安重誨連得大鎮重誨過鳯翔𢎞昭迎拜馬首館于府舍妻子羅拜奉酒進食禮甚謹重誨為𢎞昭泣言讒人交搆幾不免賴主上明察得保宗族重誨既去𢎞昭即奏重誨怨望有惡言至行營恐奪敬瑭兵柄又遺敬瑭書言重誨舉止孟浪恐將士疑駭宜迎止之敬瑭大懼即上言重誨至恐有變宜急徴還宜徽使孟漢瓊自西方還亦言重誨過惡有詔召重誨還二月朔石敬瑭以遂閬既陷糧運不繼燒營北歸重誨至三泉得詔亟歸過鳳翔𢎞昭不內重誨懼馳騎而東兩川兵追敬瑭至利州昭武節度使李彥琦棄城走知祥以趙廷隱為昭武留後廷隱遣使密言于知祥曰董璋多詐必為公患因其劍州勞軍請圖之并兩川之衆可以得志于天下知祥不許廷隱嘆曰不從吾謀禍難未巳唐以安重誨為護國節度使趙鳳言于唐主曰重誨陛下家臣終不叛主但不能周防為人所讒陛下不察其心重誨死無日矣唐主以為朋黨不悅吳以宋齊邱為右僕射致仕吳徐知誥欲以宋齊邱為相齊邱自以資望素淺欲以退讓為髙謁歸洪州葬父因入九華山在池州府青陽縣西南山有九峯舊名九子山唐李白以九峯如蓮花削成因更名啓求隱居吳主下詔徴之不至知誥遣其子景通即景改名入山敦諭齊邱始還除右僕射致仕三月唐以李從珂為左衛大將軍復錢鏐官爵唐主既解安重誨樞務乃召李從珂泣謂曰如重誨意汝安得復見吾以為左衛大將軍盡復錢鏐官爵遣使往諭旨以嚮日致仕重誨矯制也夏四月閩奉國節度使王延稟舉兵襲福州敗死延稟聞閩王延鈞有疾帥其子建州刺史繼雄將水軍襲福州延鈞遣樓船指揮使王仁逹延鈞從子拒之仁達偽降繼雄喜登舟慰撫仁達斬之延稟衆潰追擒之初延稟既立延鈞事具前將還建州謂延鈞曰善繼先志毋煩老兄再來及是延鈞見之曰果煩老兄再下延稟慙不能對延鈞斬之復其姓名曰周彥琛遣其弟都教練使延政如建州慰撫吏民延鈞先度僧二萬餘人由是閩中多僧又好神仙之術道士陳守元巫者徐彥林與盛韜共誘之作寶皇宮極土木之盛五月唐以宦者孟漢瓊為宣徽使時范延光趙延壽本姓劉恆山人趙德鈞飬為子因姓趙尚唐主女興平公主為樞密使懲安重誨以剛愎得罪每事不敢可否獨漢瓊與王淑王淑妃居中用事人皆憚之先是宫中須索稍踰常度重誨輒執奏由是非分之求殆絶至是漢瓊直以中宫之命取府庫物不復關白樞密院及三司亦無文書所取不可勝紀唐殺其太子太師致仕安重誨安重誨內不自安表請致仕閏月制以太子太師致仕以李從璋字子良唐主之姪為護國節度使遣步軍指揮使藥彥稠將兵趣河中重誨子崇贊崇緒逃奔至重誨所重誨驚曰汝安得來既而曰此為人所使耳吾以死殉國夫復何言乃執二子表送詣闕明日有中使至見重誨慟哭重誨問故中使曰人言令公有異志朝廷已遣藥彥稠將兵至矣重誨曰吾受國恩死不足報敢有異志更煩國家發兵貽主上之憂罪益重矣皇城使翟光鄴字他基鄄城人素惡重誨唐主遣詣河中察之曰重誨果有異志則誅之光鄴至從璋以甲士圍其第自入見重誨拜于庭下重誨驚降階答拜從璋奮撾擊其首妻張氏驚救亦撾殺之詔以重誨離間孟知祥董璋錢鏐又誣其欲自擊淮南以圖兵柄遣元隨竊二子歸本道并二子誅之唐遣兩川將吏還諭本鎮唐主遣西川進奏官蘇願東川軍將劉澄各還本道諭以安重誨專命興兵今已伏辜孟知祥遣使告董璋欲與之俱上表謝罪璋怒曰孟公親戚皆完固宜歸附璋已族滅尚何謝為由是復為怨敵六月唐均田稅秋九月唐敕解縱五坊鷹隼敕解縱鷹隼內外無得更進馮道曰陛下可謂仁及鳥獸唐主曰不然朕昔嘗從武皇獵時秋稼方熟有獸逸入田中遣騎取之比及得獸餘稼無幾以是思之獵有損無益故不為耳冬十一月甲申朔日食吳以其中書令徐知誥鎮金陵徐景通為司徒輔政知誥表請歸老金陵以知誥為鎮海寧國節度使鎮金陵總録朝政以其子景通為司徒同平章事知中外左右諸軍事留江都輔政以王令謀宋齊邱為左右僕射並同平章事兼內樞使以左景通知誥作禮賢院于府舍聚圖書延士大夫與孫晟陳覺議時事以國中屢災曰兵民困苦吾安可獨樂悉縱遣侍妓取樂器焚之陵陳覺海人御批厯代通鑑輯覽卷六十七

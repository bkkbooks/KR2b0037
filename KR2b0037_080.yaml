body:
  text: 林靈素欲盡廢釋氏以逞前憾請于帝改佛號大覺金仙餘為仙人大士僧為德士易服飾稱姓氏寺為宫院為觀改女冠為女道尼為女德尋詔德士並許入道學依道士之法明年始復寺院額及僧號金人來聘遣馬政報之不至而復金主與尼瑪哈議遣李善慶渤海人索多完顔部人作按索多舊散覩今改後仿此持國書并北珠生金等物同馬政來修好詔蔡京等諭以夾攻遼之意善慶等唯唯居十餘日遣政同趙有開遼人降宋者王瓌師中子齎詔及禮物與善慶等渡海報聘行至登州有開死會諜者言遼已封金主為帝乃詔政勿行止遣平海軍校呼慶送善慶等歸金金主遣慶歸且語之曰歸見皇帝果欲結好早示國書若仍用詔決難行也初高麗來求醫帝命二醫往至是歸奏云高麗館醫甚勤日夕引之視其用兵布陳禦敵之方曰聞天子將與女真圖契丹苟存契丹猶足為中國捍邊女真不可交也宜早為之備帝聞之不樂以余深為太宰王黼為少宰黼賜第城西徙居之日導以教坊樂供張什器悉取于官寵傾一時是時朝廷已納趙良嗣之計將會金以圖燕會諜云遼主有亡國之相黼薦畫學正陳堯臣使遼堯臣繪遼主相以歸言于帝曰遼主望之不似人君若以相法言之亡在旦夕幸速進兵兼弱攻昧此其時也并圖其山川險易以上帝大喜取燕雲之計遂決占城入貢占城自周顯德中始入貢其後朝貢不絶然與交州相近互相侵擾至是封為王後每遇恩輒加封邑與交趾均矣三月以馮熙載字彥為衛州西安人為中書侍郎范致虛注見前張邦昌字子能永靜軍東光人為尚書左右丞致虛自右丞進左丞半歲以母喪去位事在八月後年餘起知大名府入見時朝廷方用師圖燕致虛謂邊釁一開必有意外之患宰相惡其懷異復聽終喪考宋史致虛沮伐燕之議在起知大名時續綱目敘于母喪去位之前非是今據致虛本傳改輯劉法及夏人戰于統安城在震武城北敗走夏人追殺之童貫使劉法取朔方不欲行強遣之乃引兵二萬至統安城遇夏主弟察克舊作察哥今改率步騎為三陳當法前軍而别遣精騎登山出其後大戰移七時兵飢馬渴死者甚衆法乘夜遁比明走七十里至蓋朱峗方輿紀要地在湟鄯間為一負擔軍夏制負擔一人為一抄負擔者隨軍雜役也斬首而去貫隱其敗而以捷聞察克見法首惻然語其下曰劉將軍前敗我于古庫勒日木多泉吾嘗避其鋒謂天生神將豈料今為一小卒梟首哉其失在恃勝輕出不可不戒遂乘勝圍震武震武在山峽中熙秦兩路不能餉自築城三歲知軍李明孟清皆為夏人所殺至是城又將陷察克曰勿破此城留作南朝病塊乃自引去夏四月丙子朔日食五月京師大水京師茶肆傭晨興見大犬蹲榻傍近視之則龍也軍器作坊兵士取而食之逾五日大雨如注歷七日而止京城外水高十餘丈帝懼甚命戶部侍郎唐恪字欽叟錢塘人決水下流入五丈河起居郎李綱字伯紀邵武人言國家都汴百五十餘年未嘗有此異夫變不虛生必有所以感召之災非易禦必思所以消復之今陰氣太盛當以盜賊外患為憂望求直言采而用之以答天戒詔貶綱監南劍州沙縣稅務六月夏人來詔童貫罷兵秋七月以貫為太傅關右既困童貫諷夏人因遼進誓表納欵遂詔六路罷兵及夏遣使來賀天寧節授以誓詔夏使辭不取貫不能屈但迫館伴強之使持還及境棄之道中而去延安帥賈炎得而上之貫始大沮尋加貫太傅封涇國公時人稱蔡京為公相貫為媪相遼遣使册金主為東懷國皇帝金主不受遼遣耶律努克舊作奴哥今改如金議和金主復書曰能以兄事朕歲貢方物歸我中京上京興中府三路州縣以親王公主駙馬大臣子孫為質還我行人及元給信符并宋夏高麗往復書詔表諜則可既而努克復至金金使呼圖克昆舊作胡宇衮今改後仿此與俱如遼免取質子及上京興中府所屬州郡裁減歲幣之數且曰必以兄事我册用漢儀方可如約言如不從勿復遣使遼主從之凡七遣使如金議册禮金乃使烏凌阿贊謨舊作烏林答贊謨今改後仿此如遼迎封册册至金金主以無兄事之語又不稱大金而云東懷乃小邦懷其德之義語涉輕侮乃復使贊謨如遼責其册乖體式如依前書所定然後可從秋八月金製女真字女真初無文字及獲契丹漢人始通契丹漢字金主遂命古紳依仿漢人楷字因契丹字制度合本國語製女真字行之後復製女真小字謂古紳所製為大字云九月幸蔡京第帝幸道德院觀金芝遂幸蔡京第時京子攸倏翛及攸子行皆為大學士鞗尚帝女茂德帝姬帝時改公主曰帝姬家人厮養亦居大官媵妾封夫人京每侍上恆以君臣相悅為言帝時乘輕車小輦頻幸其第命坐傳觴略用家人禮京謝表有云主婦上壽請釂而肯從稚子牽衣挽留而不卻蓋實事也加蔡攸開府儀同三司攸有寵于帝進見無時與王黼得預宫中祕戲或侍曲宴則攸黼著短衫窄袴塗抹青紅雜倡優侏儒中多道市井淫媟謔浪語以獻笑取悅攸妻宋氏出入禁掖攸子行領殿中監寵信傾其父攸嘗言于帝曰所謂人主當以四海為家太平為娛歲月能幾何豈徒自勞苦帝深納之帝令苑囿皆倣江浙為白屋不施五采多為村居野店乃聚珍禽異獸動數十百以實其中都下每秋風夜靜禽獸之聲四徹宛若山林陂澤之間識者以為不祥之兆冬十月頒紹述熙豐政事書于天下十一月以張邦昌王安中為尚書左右丞安中附童貫王黼為中丞因論蔡京罪為帝所知至是張邦昌自右丞進左丞安中遂代為右丞十二月帝數微行竄祕書省正字曹輔字載德南劍州人于郴州帝自政和以來多微行始民間猶未知及蔡京謝表輕車小輦七賜臨幸自是邸報傳之四方而臣僚阿順莫敢言曹輔上疏切諫略曰陛下厭居法宫時乘小輦出入㕓陌郊坰極遊樂而後返臣不意陛下當宗社付託之重玩安忽危一至于此夫君之與民本以人合合則為腹心離則為楚越畔服之際在于斯須甚可畏也萬一當乘輿不戒之初一夫不逞包藏禍心雖神靈垂護然亦損威傷重矣又况有臣子不忍言者可不戒哉帝得疏出示宰臣令赴都堂審問余深曰輔小官何敢論大事輔曰大官不言故小官言之王黼陽顧張邦昌王安中曰有是事乎皆應以不知輔曰兹事雖里巷小民無不知相公當國獨不知邪曾此不知焉用彼相黼怒令吏從輔受詞輔操筆曰區區之心一無所求愛君而已退待罪于家黼奏不重責輔無以息浮言遂編管郴州初輔將有言知必獲罪召子紳來付以家事乃閉戶草疏及貶怡然就道召楊時為祕書郎時浮沉州縣四十餘年時歷知瀏陽餘杭蕭山諸縣事皆有惠政未嘗求聞達而德望日重四方之士不遠千里從之遊號曰龜山先生至是福州進士張觷字柔直侯官人方到部蔡京延訓其子弟京求善訓子弟者或薦觷觷辭不獲乃即館謂諸生曰汝曹曾學走乎諸生駭問觷曰天下被而翁破壞至此旦夕賊發必先至而家汝曹惟有善走乃可逃死爾諸生大驚亟以告京京矍然曰此非汝所知也即見觷深與傾倒觷慷慨謂京曰宗廟社稷危在旦夕宜亟引耆德老成置諸左右以開導上心羅天下忠義之士布列內外以分理庶務庶幾猶可及耳京叩其所知遂以時對京因薦之會路允迪自高麗還言高麗國王問龜山先生安在乃詔為祕書郎庚子二年春正月林靈素有罪放歸田里靈素初與道士王允誠共為神怪之事後忌其相軋毒殺允誠遂專用事及都城水帝遣靈素厭勝方步虛城上役夫爭舉梃將擊之走而免帝知衆怨始不樂而靈素愈恣橫不悛道遇皇太子弗斂避太子入訴帝怒以靈素為太虛大夫斥還故里命江端本通判溫州察之端本廉得其居處過制罪詔徙置楚州命下而靈素已死遺奏至猶以侍從禮葬焉二月遣趙良嗣使金先是呼慶自金還具道金主意并持其書來請别遣使時童貫密受旨圖燕因建議遣右文殿修撰趙良嗣往仍以市馬為名其實約攻遼以取燕雲之地中書舍人吳時因進對及取燕事曰祖宗盟血未乾渝之必速亂王黼斥為腐儒時遂求去又有安堯臣者上書曰燕雲之役興則邊釁遂開宦寺之權重則皇綱不振臣恐異時唇亡齒寒邊境有可乘之隙狠子蓄鋭伺間以逞其欲此臣所日夜寒心也帝頗然之欲授以官然竟為羣姦所沮吳時字伸道卭州人安堯臣惇族子三月遼復遣使如金議册禮金主不許先是遼遣蕭實訥埒舊作習泥烈今改持册藁如金金遣烏凌阿贊謨持册副本報遼遼以金所定大聖二字與先世稱號同遣實訥埒往議金主怒謂其臣曰遼人屢敗遣使求成惟飾虛詞以為緩師之計當議進兵乃令咸州路統軍司治軍旅備器械將以四月進師令色克舊作斜葛今改後仿此留兵一千鎮守棟摩金主異母弟按棟摩舊作暗母今改後仿此以餘兵來會于渾河和議遂絶夏五月金侵遼上京留守耶律托卜嘉以城降金主自將攻遼以遼使蕭實訥埒宋使趙良嗣從遣降者馬乙持詔諭城中使速降遼主方獵于呼圖哩巴山金史地理志撫州有胡圖哩巴山撫州地在今蘇尼特按呼圖哩巴山舊作胡土白山今改後仿此聞金舉兵命耶律拜薩巴舊作白斯不今改等選精兵三千以濟師五月金主進攻且謂實訥埒趙良嗣曰汝可觀吾用兵以卜去就遂臨城督戰諸軍鼓譟而進自旦及已棟摩以麾下先登克其外城留守托卜嘉以城降良嗣等奉觴為壽皆稱萬歲金主乃還六月詔蔡京致仕京專政日久公論益不與帝亦厭薄之子攸權勢既與父相軋浮薄者復間焉由是父子各立門户遂為仇敵攸别居賜第一日詣京京正與客語使避之攸甫入遽起握父手為診視狀曰大人脈勢舒緩體中得無有不適乎京曰無之攸曰禁中方有公事即辭去客竊窺見以問京京曰君固不解此兒欲以為吾疾而罷我爾閲數日果以太師魯國公致仕仍朝朔望秋九月金人來議攻遼及歲幣遣馬政報之續綱目係于八月今依宋史及東都事略改書趙良嗣謂金主曰燕本漢地欲夾攻遼使金取中京大定府宋取燕京析津府遼史地理志以燕分野為析木之津故名金主許之遂議歲幣金主因以手札付良嗣約金兵自平地松林亦曰十里松林在今克什克騰西南遼史地理志上京臨潢府有平地松林克什克騰遼臨潢府地也趨古北口宋兵自白溝夾攻不然不能從因遣貝勒偕良嗣還以致其言帝使馬政報聘書云大宋皇帝致書于大金皇帝遠承示書致罰契丹當如來約己差童貫勒兵相應彼此兵不得過關歲幣之數同于遼時貫與蔡京力主燕議熙河鈐轄趙隆極言不可貫曰君能共此當有殊拜隆曰隆武夫豈敢干賞以敗祖宗二百年之好異時起釁萬死不足塞責貫不悅鄭居中亦謂蔡京曰公為大臣不能守兩國盟約輒造事端誠非廟算京曰上厭歲幣五十萬故耳居中曰漢世單于歲給一億九十萬西域一千八百八十萬與本朝孰為多乎使百萬生靈肝腦塗地公實為之由是議稍寢趙隆字子漸秦州成紀人冬十月戊辰朔日食加內侍梁師成祥符人太尉師成黠慧習文法初領睿思殿文字外庫主出外傳上旨政和中漸得幸因竄名進士籍中纍遷至河東節度使遂加太尉時帝留意禮文符瑞之事師成善逢迎希恩寵帝命入處殿中凡御書號令皆出其手多擇善書吏習倣帝書雜詔旨以出外廷莫能辨師成實不能文而高自標榜以翰墨為己任自言蘇軾出子時天下禁誦蘇文其尺牘在人間者皆毁去師成訴于帝曰先臣何罪自是軾之文乃稍出四方雋秀名士師成必招致門下合意者輒密加汲引執政侍從可階而升王黼以父事之稱為恩府先生蔡京父子亦諂附焉都人目為隱相所領職局至數十百階至開府儀同三司布衣朱夢説上書論宦侍權太重詔編管于池州睦州人方臘作亂睦州清溪今嚴州府淳安縣唐曰清溪宋改淳化後改今名民方臘世居縣堨村託左道以惑衆初唐永徽中睦州女子陳碩真反自稱文佳皇帝故其地相傳有天子基臘因得憑藉以自信縣境梓桐幫源諸洞梓桐洞在淳安縣今曰梓桐鄉幫源洞亦曰青溪洞後改名威平在淳安縣西皆山谷幽險處民物繁夥有漆楮杉材之饒富商巨賈多往來臘有漆園造作局屢酷取之臘怨而未敢發時吳中困于朱勔花石之擾比屋致怨太學生鄧肅字志宏南劍州沙縣人進詩諷諫帝不聽放肅歸田里勔益橫臘遂因民不忍陰聚貧乏遊手之徒以朱勔為名起作亂自號聖公建元永樂置官吏將帥以巾飾為别自紅巾而上凡六等無弓矢介胄惟以鬼神詭祕事相扇訹焚室廬掠金帛子女誘脅良民為兵人安于太平不識金革聞金鼓聲即斂手聽命不旬日聚衆至數萬兩浙都監蔡遵顔坦擊之皆敗死于息坑亦曰重坑山在淳安縣東十一月余深罷以王黼為太宰時福建以取花果擾民深為言之帝不悅出知福州黼遂為少保太宰初蔡京致仕黼陽順人心悉反其所為四方翕然稱為賢相及拜太宰遂乘高為邪多蓄子女玉帛自奉僭擬禁省稍襲京迹十二月方臘陷睦歙杭州詔以童貫為江淮荆浙宣撫使發兵討之臘攻陷清溪遂陷睦歙州東南將郭師中戰死遂北掠桐廬三國吳縣今屬嚴州府富陽本漢富春晉改名今屬杭州府諸縣進逼杭州知州趙震棄城走州即陷殺制置使陳建廉訪使趙約縱火六日死者不可勝計凡得官吏必斷臠支體探其肺腸或熬以膏油叢鏑亂射備盡楚毒以償怨心警奏至京師時方聚兵以圖北伐王黼匿不以聞于是凶焰日熾附者益衆東南大震淮南發運使陳遘字亨伯其先自江寧徙永州上言臘衆強東南兵弱乞調京畿兵及鼎灃槍牌手兼程以來使不至滋蔓帝得疏始大驚乃罷北伐之議而以童貫為宣撫使談稹為兩浙制置使率禁旅及秦晉蕃漢兵十五萬討之臘分兵陷婺州又陷衢州知州彭汝方罵賊死又進犯處州守二皆遁走縉雲尉詹良臣率數十人出禦為賊所執誘降不屈亦死之人彭汝方字宜老汝礪弟詹良臣字元公睦州分水處州本隋括州唐改名今為府屬浙江縉雲唐縣今屬處州府真臘注見前入貢真臘于政和中始通中國至是遣郎將來朝詔封其主金裒賓深為國王恩比占城辛丑三年春正月童貫承詔罷蘇杭應奉局花石綱貫之行也帝付以東南之事且曰如有急即以御筆行之貫至吳見民困花石之擾衆言賊不亟平坐此耳貫即命其僚董耘作手詔罷諸應奉造作局及御前花石綱運并木石彩色等場務而帝亦黜朱靦父子弟姪之在職者吳民大悅二月罷方田及州縣學三舍法詔開封府及諸路仍以科舉取士省宗學辟雍諸路提舉學事官淮南盜宋江掠京東諸郡知海州張叔夜字嵇仲耆之孫擊降之宋江起為盜以三十六人橫行河朔轉掠十郡官軍莫敢嬰其鋒知亳州侯蒙上言江才必有過人者不若赦之使討方臘以自贖帝命蒙知東平府未赴而卒江聲言將至海州知州張叔夜續綱目宋元通鑑皆作命叔夜知海州在侯蒙卒後考叔夜本傳叔夜為蔡京所忌出知海州事應在前今改正使間者覘所向江徑趨海濱劫巨舟十餘載鹵獲叔夜募死士得千人設伏近城而出輕兵距海誘之戰先匿壯卒海旁伺兵合舉火焚其舟賊聞之皆無鬬志伏兵乘之擒其副賊江乃降遼都統耶律伊都一名伊都古楚舊作余覩伊都古楚舊作余都姑今改叛降金遼主諸子長晉王額嚕溫舊作敖盧幹今改次秦王定次許王寧遼史天祚紀天祚四子長趙王實訥埒次晉王額嚕溫今考皇子表晉王第一趙王第四又尚有燕國王塔魯梁王雅里六子非四子本紀不足據續綱目因之今依表改輯晉王文妃蕭氏小字琴瑟國舅大父房之後所生積有人望女真興兵境內郡縣所失幾半遼主畋遊不恤忠臣多被疏斥文妃作歌諷諌歌凡二首其第一首有直須卧薪嘗膽兮激壯士之捐身可以朝清漠北兮夕枕燕雲之句遼主銜之樞密使蕭奉先元妃小字錫衮北府宰相常哥之女之兄秦許王之舅也以國人屬意晉王恐秦王不得立因潛圖之文妃姊適耶律遼哈拉舊作撻葛里今改妹適耶律伊都一日其姊若妹俱會軍前奉先諷人誣文妃與駙馬蕭昱及伊都達哈拉等謀立晉王遼主遂誅蕭昱達哈拉等而賜文妃死伊都在軍中聞之大懼即率千餘騎叛降于金遼主遣蕭錫默舊作遐買今改等將兵追之及諸閭山縣遼置屬興中府故城在今土默特右翼錫默等謀曰主上信蕭奉先奉先視吾輩蔑如也伊都乃宗室豪俊常不肯為奉先下若擒伊都他日吾黨皆伊都也遂縱之以追不及還報伊都至金金主見之因詔咸州都統司曰自伊都來灼見遼國事宜已決議親征其治軍以俟師期塔魯舊作撻魯錫衮舊作師姑今改夏四月童貫合兵擊方臘破之執臘以歸先是臘將方七佛引衆六萬寇秀州統軍王子武固守會貫引大軍至合擊敗之賊還據杭既而貫前鋒至青河堰即今清湖閘在杭州府仁和縣北臘焚官舍府庫民居遁還清溪諸將劉延慶王稟王渙楊惟忠辛興宗王淵字幾道熙州人等相繼至盡復所陷城四月貫等合兵擊臘于幫源洞臘衆尚二十萬深據巖屋為三窟諸將莫知所入王淵裨將韓世忠字良臣延安人潛行溪谷間問野婦得徑即挺身仗戈直前搗其穴格殺數十人擒臘以出辛興宗領兵截洞口掠為己功併取臘妻子及偽相方肥等五十二人于梓桐石穴中殺賊七萬餘黨悉平送臘京師斬之臘之起凡破六州五十二縣戕平民二百萬所掠婦女自賊洞逃出倮而縊于林中者相望百餘里詔改睦州為嚴州歙州為徽州加童貫太師封楚國公尋復領陜西兩河宣撫使五月大蝗安置御史中丞陳過庭本名揚庭字賓王越州山隂人于黃州過庭以睦寇竊發嘗上言致冦者蔡京養冦者王黼竄二人則冦自平又言朱勔父子本刑餘小人交結權近竊取名器罪惡盈積宜昭正典刑以謝天下三人憾之至是陷以罪罷知蘄州未半道謫黃州安置閏月復置應奉司方臘既平王黼言于帝曰士大夫懷姦弗悛即損應奉妄為譏謗望特置應奉一司臣專總領庶杜姦謀從之仍令梁師成總領于內遂復諸應奉局奪發運漕挽之卒為用户部不敢詰自是四方珍異之物充牣二人之家而入尚方者才什一秋七月黑眚見考禁中黑眚宋史五行志無日月可紀惟洛陽黑眚徽宗本紀附書是年七月之末續綱目直書秋七月黑眚見于禁中似屬無據今但書黑眚見依宋史先載洛陽訛言之事而以禁中黑眚附見焉洛陽民間訛言有黑眚如人或如犬夜出掠小兒食之後雖白晝入人家為患謂之黑漢二年乃息又禁中有黑眚大如席元豐末夜見寢殿上而神宗崩元符末又見而哲宗崩至大觀間漸晝見政和以後大作每出若列屋摧倒之聲其形僅文餘倣佛如龜黑氣蒙之不大了了氣之所及腥血四灑兵刃皆不能施又或變人形或為驢晝夜出無時多在掖庭及內殿習以為常人亦不大怖宣和末寢少而亂作九月詔宦者李彥括民田于京東西路初胥吏杜公才獻䇿于內侍楊戩立法索民田契自甲之乙乙之丙展轉究尋至無可證則度地所出增立租賦始于汝州浸淫于京東西淮西北括廢堤棄堰荒山退灘皆勒民主佃額一定後雖衝蕩回復不可減一邑率于常賦外增租錢至十餘萬緡水旱不得蠲免擢公才為觀察使至是戩死以內侍李彥繼之彥狠愎密與王黼表裏置局汝州臨事愈劇凡民間美田使他人投牒告陳皆指為天荒雖執印劵皆不省魯山注見前闔縣盡括為公田訴者輒加威刑致死者千萬京西提舉官及京東州縣吏皆助彥為虐民不勝忿痛發物供奉大抵類朱勔責辦于民無休息期農不得之田牛不得耕墾殫財靡芻力竭餓死或自縊轅軏間喜賞怒刑禍福轉手因之得美官者甚衆前執政冠帶操笏迎謁彥馬首彥處之自如所在倨坐堂上監司郡守不敢抗禮有言于帝者梁師成適在旁抗聲曰王人雖微序于諸侯之上豈足為過言者懼不敢復言冬十一月馮熙載罷以張邦昌為中書侍郎王安中李邦彥字士美懷州人為尚書左右丞邦彥本銀工子俊爽美風姿為文敏而工然生長閭閻習猥鄙事應對便捷善謳謔能蹴踘每綴街市俚語為詞曲人爭傳之自號李浪子以善事中人爭薦譽之纍擢翰林承旨進右丞十二月進封廣平郡王構帝第九子韋后所生為康王壬寅四年春正月金克遼中京遼主延禧殺其子晉王敖盧幹走雲中耶律伊都之奔金也尼瑪哈言于金主曰遼主失德中外離心今乘其釁宜襲取中京天時人事不可失也金主用其䇿以舍音都統內外諸軍普嘉努尼瑪哈斡布金主庶長子後改名宗斡此按斡布舊作幹本今改後仿斡里雅布舊作幹離不今改後仿此富勒呼舊作蒲盧虎今改後仿此等副之耶律伊都為鄉導至是薄中京遼兵不戰而潰進下澤州遼置本漢土垠縣地故城在今喀喇沁在翼南遼主時獵于鴛鴦濼在今宣化府赤城縣西北宣鎮志其水停積不流自遼金來為飛放之所伊都引羅索奄至遼主憂甚樞密使蕭奉先曰伊都此來欲立甥晉王額嚕溫爾若為宗社計不惜一子誅之可不戰而退會耶律薩巴舊作撒八今改等復謀立額嚕溫事覺遼主召樞密使蕭德勒岱字吉林孝先孫舊作得里底吉林舊作糾鄰今改等議曰反者必以此兒為名若不除去何以獲安德勒岱唯唯遼主乃遣人縊之或勸額嚕溫亡額嚕溫曰安忍為蕞爾之軀而失臣子之節遂就死遼主素服三日耶律薩巴等皆被誅額嚕溫槖有人望諸軍聞其死無不流涕由是人心解體伊都引金兵逼遼主行宫遼主率衛士五千餘騎自鴛鴦濼走雲中遺傳國璽于桑乾河注見前二月管勾太平觀陳瓘卒或問遊酢以當今可以濟世之人酢曰四海人才不能周知以所識知陳了翁其人也劉安世嘗因瓘病使人勉以醫藥自輔曰天下將有賴于公當力加保養以待時用至是卒于楚州三月金襲遼軍遼主延禧走夾山方輿紀要在古雲內州北雲內州遼置故城在今烏喇特西北烏喇特舊作吳喇忒今改金尼瑪哈敗遼奚王于北安州遼置金曰興州故城在今熱河南喀喇河屯拔其城遣古紳略近地獲遼護衛實訥埒知遼上下離心使人報舍音曰遼主窮迫若失機會事難圖矣舍音意未決幹布勸從之舍音乃出青嶺方輿紀要在開平廢衛西南即大青山也尼瑪哈出瓢嶺在青嶺北期會于羊城濼方輿紀要在大同府東北邊外遼主在雲中以金兵為憂蕭奉先猶言女真雖能攻我上京終不能遠離巢穴及聞金師將出嶺西遼主遂趨白水濼在大同府北尼瑪哈以精兵六千襲之將近行宫遼主計不知所出遂乘輕騎入夾山始悟蕭奉先之不忠怒曰汝父子誤我至此誅汝何益恐軍心忿怒爾曹避敵苟安禍必及我其勿從行奉先下馬哭拜而去行未數里左右執其父子縛送金軍金人斬其長子昻以奉先及其次子昱械送金主道遇遼軍奪以歸並賜死蕭德勒岱自知不免亦絶食死遼燕京留守李處溫析津人等以耶律淳稱帝遙廢其主延禧為湘陰王遼主之走雲中留南府宰相張琳參知政事李處溫與淳守燕京處溫聞遼主入夾山命令不通即與族弟處能及子奭外假怨軍內結都統蕭幹即和勒博續綱目誤分二人説詳後謀立淳處溫邀張琳白其事琳曰攝政則可即真則不可處溫曰今日之事天意人心已定豈可易也琳不敢執遂與諸大臣耶律達實字重德遼太祖八代孫嘗官翰林承旨遼國語謂翰林為林牙亦稱達實林牙舊作大石今改西遼達實始此左企弓字君材薊人虞仲文字質夫武州寧逺人曹勇義廣寧人康公弼字伯起宛平人集蕃漢百官諸軍詣淳府引唐靈武故事勸進淳不許將出李奭持赭袍被之令百官拜舞山呼淳驚駭再三辭不獲從之羣臣上尊號曰天錫皇帝建元天福以妻蕭氏為德妃加處溫守太尉張琳守太師餘與謀者授官有差改怨軍為常勝軍軍旅之事悉委達實遙降遼主為湘陰王遂據有燕雲中及上京遼西之地遼主所有沙漠已北西南西北路兩都招討府諸蕃族而已淳遣使來報免歲幣結好亦遣使奉表于金乞為附庸金人不報金克遼西京金人攻西京大同府遼耿守忠救之尼瑪哈摩囉歡斡布等繼至尼瑪哈率麾下自其中衝擊使餘兵去馬從旁射之守忠大敗其衆殱焉西京西路州縣部族皆降金詔童貫蔡攸等勒兵巡邊以應金童貫聞金數敗遼兵乃乞舉兵以應金鄭居中言不宜幸災而動待其自斃可也時睦寇初平帝亦悔用兵王黼獨言曰中國與遼雖為兄弟之邦然百餘年來彼之所以開邊慢我者多矣且兼弱攻昧武之善經也今而不取燕雲女真必強中原故地將不復為我有帝遂決意治兵黼于三省置經撫房專治邊事不關樞密括天下丁夫計口出算得錢六千二百萬緡以充用黼又遺童貫書曰太師若北行願盡死力會聞耶律淳自立乃以蔡攸副貫勒兵十五萬巡北邊以應金且招諭幽燕攸童騃不習事謂功業可唾手致入辭日二美嬪侍帝側攸指而請曰臣成功歸乞以是賞帝笑而勿責朝散郎宋昭上書乞誅王黼童貫趙良嗣等且曰兩國之誓敗盟者禍及九族陛下孝理天下其忍忘列聖之靈乎陛下以仁覆天下其忍置河北之民于塗嵗之中乎疏上除昭名編管海南夏四月置補完校正文籍局詔購求士民藏書其有未見祕書足備觀采者仍命以官且以三館書多遺逸命建局以補完校正為名設官總理募工繕寫一置宣和殿一置太清樓一置祕閣金取遼東勝諸州東勝州遼置即唐東受降城池注見前獲阿蘇以歸金羅索等略定東勝諸州獲阿蘇軍士問之曰汝為誰曰我破遼鬼也執送金主金主杖而釋之五月童貫進兵擊遼敗績退保雄州詔班師貶都統制种師道為右衛將軍致仕貫至高陽關用知雄州和詵濮州甄城人計降黃榜及旗述弔民伐罪之意且云若有豪傑能以燕京來獻者即除節度使遂命都統制种師道護諸將進兵師道諫曰今日之舉譬如盜入鄰家不能救又乘之而分其室焉無乃不可乎貫不聽分兵為兩道師道總東路兵趨白溝辛興宗總西路兵趨范村注見前耶律淳聞之遣耶律達實蕭幹禦之師道次白溝遼人譟而前師道前軍統制楊可世敗績士卒多傷師道先令人持一巨梃自防賴以不大敗退師雄州遼人追擊至于城下辛興宗亦敗于范村帝聞兵敗而懼詔班師遼使來言曰女真之侵本朝亦南朝之所甚惡也今射一時之利棄百年之好結強大之鄰基他日之禍謂為得計可乎救災恤鄰古今通義惟大國圖之貫不能對种師道復請與之和貫不納密劾師道助賊王黼怒責授師道右衛將軍致仕遼耶律淳死其妻蕭氏稱太后主國事李處溫伏誅淳寢疾聞遼主傳檄合諸蕃精騎五萬約以八月入燕并遣人問勞索衣裘茗藥淳甚驚命北南靣大臣議而李處溫蕭幹等有迎秦王拒湘陰王之説惟南靣行營都部署耶律寧曰天祚果能以諸蕃兵大舉奪燕則是天數未盡豈能拒之否則秦湘父子也安有迎子而拒其父者處溫等以寧扇亂軍心欲殺之淳曰彼忠臣也焉可殺天祚果來吾有死爾復何靣目相見邪已而淳疾自知不起密授處溫蕃漢馬步軍都元帥意將屬以後事及蕭幹等召執政入議處溫稱疾不至陰聚勇士為備紿云奉密旨防他變淳死蕭幹等乃立淳妻蕭氏為皇太后主軍國事奉遺命遙立秦王定為帝蕭后遂稱制改元德興諡淳為孝章皇帝廟號宣宗葬于燕西之香山幹以后命召處溫至以時方多難未即加誅但追毁元帥劄子處溫父子懼禍南通童貫欲挾蕭后納土北通于金欲為內應事覺后執處溫問之處溫自陳有定䇿功后曰誤秦晉國王者皆女父子何功之有并數其前罪惡數十處溫無以對乃賜死臠其子奭而磔之籍其家得錢七萬緡金玉寶器稱是皆為宰相數月間所取也夏人救遼金襲敗之于宜水在榆林府東北邊外夏主使李良輔將兵三萬救遼金將幹魯羅索敗之于宜水追至野谷澗在宜水西水暴至夏人漂沒者不可勝計秋七月詔童貫蔡攸再舉伐遼以劉延慶為都統制王黼聞耶律淳死復命童貫蔡攸治兵以河陽三城節度使劉延慶為都統制初收經制錢先是命陳遘經制江淮七路治於杭州以供饋餉遘以財用不給創議比較酒務及度公家出納錢糧最取其贏號經制錢遂為東南七路之害八月金襲遼延禧于錫訥圖地名方輿紀要在大同府西北邊外按錫訥圖舊作石輦鐸今改後仿此延禧敗走遼主既失西京及沙漠以南遂奔於額蘇倫遼史國語解地名按額蘇倫舊作訛莎烈今改後仿此金舍音使斡里雅布告金主曰今雲中新定諸路遼兵尚數萬新降之民其心未固諸將望幸軍中金主從之既而聞遼主在大漁濼亦曰魚兒濼在古興和城西興和城遼撫州也元曰興和路故城在今張家口外鑲黃旗牧厰西南乃自將精兵萬人襲之晝夜兼行追及遼主于錫訥圖軍士至者才千人遼兵二萬五千方治營壘耶律伊都曰我軍未集人馬疲劇未可戰也斡里雅布曰今追及遼主而不亟戰日久而遁則無及矣遂戰短兵接遼兵圍之數重副統軍蕭特烈字額敦溫要尼溫汗宫分人額敦溫舊作訛都碗要尼溫汗舊作遙輦窪可汗今改諭軍士以君臣之義士皆殊死戰遼主謂斡里雅布兵少必敗與妃嬪登高阜觀戰伊都指遼主麾蓋以示諸將斡里雅布等遂以騎兵馳赴之遼主望之大驚即遁去遼兵遂潰斡里雅布等還金主曰遼主去不遠盍亟追之斡里雅布追至鄂勒哲圖在錫訥圖西舊作烏里質鐸今改遼主棄輜重而遁蕭特烈被執九月金遣使來命趙良嗣報之金人聞童貫舉兵恐南朝徑取燕而歲幣不可得乃遣使來議師期帝遣趙良嗣報之且言不負初約遼將郭藥師以涿易二州來降遼常勝軍帥郭藥師為涿州留守以蕭后立蕭幹專政國人多二謂所部曰天祚失國女政不綱宋天子重兵壓境此男兒取金印時也遂擁所部八千人奉二州來降童貫受之以聞詔授恩州觀察使以兵隸劉延慶冬十月劉延慶及郭藥師進兵攻遼藥師襲燕敗績延慶兵潰童貫遣劉延慶郭藥師將兵十萬出雄州以郭藥師為鄉導渡白溝延慶軍無紀律藥師諫曰今大軍拔隊行而不設備若敵人置伏邀擊首尾不相應則望塵決潰矣不聽至良鄉遼蕭幹率衆來拒延慶與戰而敗遂閉壘不出藥師曰幹兵不過萬人今悉力拒我燕山必虛願得奇兵五千倍道襲之請令公之子三太尉即劉光世字平叔延慶次子以五千人䇿應延慶許之遣大將高世宣楊可世與藥師帥兵六千夜半渡盧溝倍道而進質明常勝軍帥甄五臣領五千騎奪迎春門燕城東南門以入藥師等繼至遣人諭蕭后使趣降蕭后密報蕭幹幹舉精甲三千還燕巷戰光世渝約不至藥師失援而敗與可世棄馬縋城而出死傷過半世宣死焉延慶營于盧溝南幹分兵斷餉道獲護糧將王淵得漢軍二人蔽其目留帳中夜半偽相語曰吾師三倍漢軍敵之有餘當分左右翼以精兵衝其中左右翼為應舉火為期殱之無遺既言乃陰逸一人歸報延慶聞而信之明旦見火起以為敵至即燒營遁士卒蹂踐死者百餘里幹因縱兵追至涿水而去自熙豐以來所儲軍實殆盡退保雄州燕人知宋之無能為作賦及歌詩以誚之藥師還猶進安遠軍承宣使尋加武泰節度使以蔡攸為少傅判燕山府十一月金人來議燕地十二月遣趙良嗣復如金求營平灤三州初朝廷與金約但求石晉賂契丹故地而不及平濼等州續綱目作不思營平濼三州乃劉仁恭獻契丹以求援者其説蓋本長編王應麟曰劉仁恭無割地遺契丹事四夷附録云契丹當莊宗明宗時攻陷營平二州唐亦無灤州王氏之説如此再考遼史地理志灤州永安軍本古黃落城石晉割地在平州之境太祖以俘户置灤州為形勝之地以遼史合之王説則長編所云殊不足據而續網目諸書因之今據宋金二史紀傳及表俱不載宋求得三州事惟東都事略金國附録云趙良嗣至金金主欲得燕京租稅而不議平灤等州因即采此改輯而削去劉仁恭獻地契丹之説既而王黼欲併得之金主不肯及趙良嗣往金主使普嘉努責良嗣以出兵失期且云今更不論元約特與燕京薊景檀順涿易六州今直隸遵化州遼于此置景州餘注俱見前良嗣言元約山前山後十七州今乃如此信義安在抗辨數四金人不從良嗣乃與其使李靖偕來止許山前六州帝復遣良嗣送之且求營平灤三州金克遼燕京耶律淳妻蕭氏奔天德即唐天德軍注見前童貫再舉伐燕不克成功懼得罪乃密遣王瓌如金求如約夾攻金主遂分三道進兵遼蕭后五上表于金求立秦王定金主不許遼人遂以徑兵守居庸關金兵至關崖石自崩戍卒多壓死遼人不戰而潰金兵度關而南遼統軍都監高陸舊作高六今改等送欵于金金主至燕京遂自南門入使尼楚赫羅索陳于城上金主次于城南遼宰相左企弓參政虞仲文康公弼樞密使曹勇義張彥忠劉彥宗字魯開宛平人等奉表詣金營請罪金主並釋之命守舊職而遣左企弓等撫定燕京諸州縣蕭后自古北口趨天德于是遼五京皆為金有金主遣騎兵送趙良嗣還且獻遼俘萬歲山成更名曰艮嶽山作于政和七年至是始成帝自為記以山在國之艮位改名艮嶽山周十餘里其最高一峯九十步上有亭曰介亭分東南二嶺直接南山山之東有萼緑華堂書屋八仙館紫石巖棲真嶝攬秀軒龍吟堂山之南則壽山兩峰並峙有鴈池噰噰亭山之西有藥寮西莊巢雲亭白龍沜濯龍峽蟠秀練光跨雲亭羅漢巖又西有萬松嶺半嶺有樓曰倚翠上下設兩關關下有平地鑿大沼沼中有兩洲東為蘆渚亭曰浮陽西為梅渚亭曰雪浪西流為鳯池東出為研池中分二館東曰流碧西曰環山有巢鳯閣三秀堂東池後有揮雪廳復由嶝道上至介亭亭左復有亭曰極目蕭森右復有麗雲亭北俯景龍江引江之上流注山間西行為漱瓊軒又行石間為煉丹凝真觀圜山亭下視江際見高陽酒肆及清澌閣北岸有勝筠庵躡雲臺蕭間館飛岑亭支流别為山莊為回溪又于南山之外為小山橫亘三里曰芙蓉城窮極巧妙而景龍江外諸館舍尤精其北又作大池名曰曲江池中有堂曰蓬壺東盡封邱門而止其西則自天波門橋引水直西殆半里江乃折南又折北折南者過閭闔門為復道通茂德帝姬宅折北者四五里屬之龍德宫大抵四方怪竹奇石悉聚于斯亭臺樓觀日增月益殆不可悉數初朱靦于太湖取石高廣數丈載以大舟挽以千夫鑿河斷橋毁堰拆閘數月乃至會得燕地因號昭功敷慶神運石錫爵盤固侯為亭以庇之又作絳霄樓勢極高峻盡工藝之巧後以金芝産于萬壽峯乃復更名壽嶽云户部獻是歲民數時天下分為二十六路元豐中析天下為二十三路曰京東東西曰京西南北曰河北東西曰永興曰秦鳯曰河東曰淮南東西曰兩浙曰江南東西曰荆湖南北曰成都曰潼州曰利州曰夔州曰福建曰廣南東西崇寧四年增置京畿路至是又置燕山雲中府路共二十六路京府四東京開封西京河南北京大名南京應天府三十州二百五十四監六十三縣一千二百三十四户二千八十八萬二千二百五十八口四千六百七十三萬四千七百八十四户口視西漢盛時蓋有加焉隋唐疆理雖廣而户口皆不及癸卯五年春正月遼知北院樞密事奚和勒博自稱奚帝考遼史天祚紀都統蕭幹謀立耶律淳而紀末附書淳事則作奚王和勒博議立淳又和勒博傳所載皆幹事再考東都事略遼國附録則作蕭幹而徽宗本紀則作庫里布庫里布乃和勒博轉音之訛而紀所載詔書又皆言蕭幹事蓋蕭幹即和勒博一人而兩名互見史家未經刋定及考金史和勒博傳云奚有五世族世與遼人為昏因附姓舒嚕氏舒嚕遼后族後改蕭氏而和勒博一名翰翰即幹之轉音是知和勒博乃奚之附姓舒嚕者從其本族則稱和勒博從其附姓則稱蕭幹也續綱目不加考核誤分為二人一于正月一于八月皆書自稱奚帝又皆書為郭藥師所敗歷考三史並無二人同稱奚帝郭藥師傳亦並無兩敗奚人之事續綱目所書殊繆今詳核三史改正而其名則從本史于立耶律淳書蕭幹于稱帝則書和勒博庫里布舊作夔離不舒嚕舊作述律今改先是燕京既破和勒博自古北口出奔至盧龍嶺即盧龍鎮方輿紀要永平府北有盧龍鎮土色黑而山形似龍或曰即古盧龍塞也遂留不行至是會諸奚吏民及渤海軍即箭笴山在永平府撫軍縣東北今亦名茶盆山自立為奚國皇帝改元天復設奚漢渤海三樞密院改東西節度為二王分司建官遼主命都統耶律瑪格討之瑪格舊作馬哥今改金遣使來趙良嗣復如金良嗣至燕與金主議燕京西京之地金主曰若宋必欲平灤等州則并燕京不與因以答書先示良嗣良嗣讀至燕京用本朝兵力攻下其租稅當輸本朝良嗣因曰租稅隨地豈有與其地而不與租稅者尼瑪哈曰若不見與請速追涿易之師無留我疆于是遣李靖等與良嗣偕來靖既入對遂見王黼黼謂靖曰租稅非約也上意以交好之故欲以銀絹充之靖復請去年歲幣帝亦特許之仍命良嗣與靖偕使以王安中知燕山府郭藥師同知府事朝廷以金人將歸燕謀帥臣守之左丞王安中請行王黼贊于帝遂授安中慶遠軍節度使河北河東燕山府路宣撫使知燕山府郭藥師為檢校少保同知府事詔藥師入朝禮遇甚厚賜以甲第姬妾命貴戚大臣更互設宴又召對于後園延春殿藥師拜庭下泣言臣在敵中聞趙皇如在天上不謂今日得望龍顔帝深褒稱之委以守燕對曰願效死又令取天祚以絶燕人之望藥師變色言曰天祚故主也國破出走臣是以降陛下使臣畢命他所不敢辭若使反故主非所以事陛下願以付他人因涕泣如雨帝以為忠解所御珠袍及二金盆以賜藥師出諭其下曰此非吾功汝輩力也即剪盆分給之加檢校少傅遣歸鎮燕山府路轉運使吕頤浩言開邊極遠其勢難守雖窮力竭財無以善後又奏燕山河北危急五事帝怒命貶官而職任如故州吕頤浩字元直樂陵人徙齊金以遼平州為南京命張瑴宋金二史作覺平州義豐人留守瑴仕遼為遼興軍節度副使遼主之走山西也平州軍亂殺其節度使蕭迪里瑴撫安亂者州民推瑴領州事耶律淳死瑴知遼必亡乃籍壯丁五萬人馬千匹練兵為備蕭后遣時立愛字昌夀涿州新城人知平州瑴拒弗納金人入燕京訪瑴情狀于康公弼公弼曰當示以不疑金人乃招時立愛赴軍前加瑴臨海軍節度仍知平州既而尼瑪哈又欲先下平州擒瑴公弼曰若加兵是趣之叛也公弼請自往覘之瑴厚賂公弼使還言于尼瑪哈曰彼無足慮也乃升平州為南京加瑴試中書門下平章事判留守事二月遼延禧追廢淳為庶人殺淳妻蕭氏遼主聞南京破出奔四部族遼史營衛志遼內四部族曰遙輦九帳族曰橫帳三父房族曰國舅帳巴里伊蘇濟勒族曰國舅部族巴里伊蘇濟勒舊作拔里乙室已今改蕭后來見遼主怒殺之追降淳為庶人除其屬籍而赦其黨三月遣使如金趙良嗣至燕謂金主曰本朝徇大國多矣豈平灤一事不能相從邪金主曰平灤欲作邊鎮不可得也遂議租稅金主曰燕租六百萬止取一百萬不然還我涿易舊疆良嗣曰本朝自以兵下涿易今乃云爾豈無曲直邪且言御筆許十萬至二十萬不敢擅增乃令良嗣歸報時左企弓嘗以詩獻金主曰君王莫聽捐燕議一寸山河一寸金故金人欲背初約要求不已良嗣行至雄州以金書遞奏其略云貴朝兵不克夾攻特因已力下燕所以拘稅今據燕管內每年租六百萬貫良嗣等稱御筆許二十萬以上不敢自專其平灤等州不在許限儻務侵求難終信義仍速追過界之兵王黼欲功之速成乃請復遣良嗣自雄州再往使許遼人舊歲幣四十萬之外每歲更加燕京代稅錢一百萬緡并遣使賀正旦生辰置𣙜場交易金主大喜遂使尼楚赫等持誓書草來許以燕京及六州來歸而山後諸州及西北一帶接連山川不在許與之限帝曲意從之遣盧益趙良嗣等持誓書往至涿州金古紳等先索書觀之言其字畫不謹令易之益言帝親書所以示尊崇于大國也金人不聽至汴更易者數四金人又言近有燕人趙溫訊等逃出南朝須先還方可議交燕地良嗣諭宣撫司縳送溫訊于金既至尼瑪哈釋其縳而用之金人又求糧良嗣許以二十萬石夏四月金人來歸燕及涿易檀順景薊之地詔童貫蔡攸班師金人既遂所欲乃使楊璞以誓書及燕京六州來歸而營平灤三州終以非石晉所賂契丹之地不預焉詔童貫蔡攸入燕交割時燕之職官富民金帛子女皆為金人所掠而東惟存空城而已尼瑪哈猶欲止割涿易金主曰海上之盟不可忘也我死汝則為之貫等奏燕城老幼迎謁焚香稱壽帝為之曲赦兩河燕雲命即日班師仍詔王安中作復燕雲碑勒于延壽寺以紀功金襲遼延禧于青冢在今歸化城南遼史地理志豐州有青冢即王昭君墓方輿紀要塞草皆白惟此獨青故名獲其子女族屬從臣以歸延禧邀戰敗績走雲內金主已定燕京聞遼主在陰山青冢之間乃以斡魯為都統斡里雅布為副使襲之至居庸關獲林牙耶律達實幹魯使斡里雅布尼楚赫羅索等以兵三千分道掩襲將至青冢遇泥濘不能進斡里雅布以繩繫達實使為鄉導直趣遼主營斡魯等大軍繼至時遼主往應州注見前其子秦王定許王寧及諸妃公主并從臣皆被執盡失輜重萬餘乘惟太保特默格舊作特母哥今改竊遼主次子梁王雅里字薩魯薩魯舊作撒鸞今改及長女特哩舊作特里今改乘軍亂走免斡魯軍至索勒敏地名在故豐州境舊作掃里門今改為書招遼主遼主自金城五季唐縣明省入應州來聞金人以所獲東去乃率兵五千餘邀戰于白水濼注見前斡里雅布以兵千餘敗之遼主遁去金人獲遼主子趙王實訥埒追奔二十餘里盡得其從馬别獲遼牧馬萬四千匹車八千乘遼主使人持紐金印偽請降于金而西走雲內斡里雅布復以書招遼主諭以石晉北遷事遼主答書乞為弟若子量賜土地斡里雅布不許五月以楊時為邇英殿説書時入對言于帝曰熙寧之初大臣文六藝之言以行其私祖宗之法紛更殆盡元祐繼之盡復祖宗之舊熙寧之法一切廢革至紹聖崇寧抑又甚焉凡元祐之政事著在令甲皆焚之以滅其迹自是分為二黨搢紳之禍至今未殄臣願明詔有司條具祖宗之法著為綱目有宜于今者舉而行之當損益者損益之元祐熙豐姑置勿問一趨于中而已又言燕雲之師宜退守內地以省轉輸之勞募邊民為弓弩手以殺常勝軍之勢又言都城無高山巨浸以為阻衛士人各異心緩急不可倚仗君臣警戒正在無虞之時帝首肯之除邇英殿説書以王黼為太傅總治三省事鄭居中為太保蔡攸為少師進封童貫為徐豫國公居中辭不拜王黼竭天下之財以北征僅得七空城至是率百官表賀詔以收復燕雲宰執皆進位而命王黼總治三省事賜玉帶以趙良嗣為延康殿學士居中自陳無功不拜己而居中入朝暴遇疾數日而卒遼延禧奔夏都統蕭特烈等以梁王雅里稱帝夏主李乾順遣使請遼主臨其國遼主從之中軍都統蕭特烈等切諫不聽遂渡河次于金肅軍注見前北遣使册乾順為夏國皇帝人情惶懼不知所為特烈陰謂耶律額哲舊作兀直今改曰事勢如此億兆離心正我輩效節之秋不早為計奈社稷何乃共劫梁王雅里走西北部三日遂立為帝改元神厯以特烈為樞密使特默格副之雅里性寬大惡誅殺獲亡者笞之而已自歸者即官之六月金張瑴以平州來歸金驅遼宰相左企弓虞仲文曹勇義康公弼同燕京大家富民俱東徙燕民流離道路不勝其苦過平州遂入城言于張瑴曰左企弓不能守燕致吾民如是公今臨巨鎮握強兵盡忠于遼使我復歸鄉土人心亦惟公是望瑴遂召諸將領議皆曰聞天祚兵勢復振出入漠南公若仗義勤王奉迎天祚以圖興復先責左企弓等叛降之罪而誅之盡歸燕民使復其業而以平州歸宋則宋無不接納平州遂為藩鎮矣即後日金人加兵內用營平之軍外藉宋人之援又何懼焉瑴又訪于翰林學士李石亦以為然瑴乃遣張謙帥五百餘騎傳留守令召左企弓虞仲文曹勇義康公弼至灤河西岸數企弓等十罪皆縊殺之瑴乃稱保大三年畫天祚像朝夕謁事必告而後行稱遼官秩榜諭燕人復業恆産為常勝軍所占者悉還之燕民既得歸大悅李石更名安弼偕故三司使高黨至燕京説王安中曰平州形勝之地張瑴總練之才足以禦金人安燕境幸招致之毋令西迎天祚北合蕭幹也安中納之以聞帝以手札付同知燕山府事詹度第令羈縻之而度促瑴內附瑴乃遣張鈞張敦固持書來請降王黼勸帝納之趙良嗣諫曰國家新與金盟如此必失其歡後不可悔不聽良嗣坐削五階而詔安中及詹度厚加安撫與免三年常賦瑴聞之自謂得計秋七月童貫致仕以內侍談稹為兩河燕山路宣撫使貫與蔡攸歸自燕頗失上意王黼梁師成共薦稹代貫交雲中之地稹至太原招朔應蔚諸州降人為朔寧軍禁元祐學術中書言福建印造司馬光等文集詔令毁板凡舉人傳習元祐學術者以違制論尋又詔蘇軾黃庭堅等獲罪宗廟義不戴天片文隻語並令焚毁勿存違者以大不恭論八月辛巳朔日食和勒博引兵破景薊州遂冦燕與郭藥師戰敗走死詔加藥師太尉時奚人飢和勒博帥衆出盧龍鎮注見前攻破景州又敗常勝軍于石門鎮今曰石門路有城在永平府撫寧縣東北陷薊州冦掠燕城其鋒鋭甚有涉河犯京師之意人情洶洶頗有謀棄燕者已而藥師大破其衆乘勝窮追過盧龍殺傷大半和勒博遁去尋為其黨耶律阿古齊舊作阿古哲今改等所殺傳首京師詔加藥師太尉金主卒弟烏奇邁立是為金太宗金主去燕京六月有疾命尼瑪哈為都統普嘉努幹魯副之駐兵雲中以備邊而還八月至布圖舊作部堵今改濼方輿紀要在故黃龍府東而卒諡武元皇帝廟號太祖古倫貝勒舍音等請安班貝勒烏奇邁即位更名晟改元天會以舍音為安班貝勒幹布為古倫貝勒相與輔政九月金葬太祖于海古勒城西其後改葬房山今海古勒金上京地故城在今寧古塔界舊作海古改房山在今順天府房山縣西北有金太祖陵冬十月遼雅里死蕭特烈等復立耶律珠拉遼興宗孫舊作木烈今改為帝尋為亂兵所殺雅里既卒蕭特烈等以珠拉才德純備復立之未三旬珠拉與特烈等俱為亂兵所殺十一月幸王黼第觀芝帝遇黼日隆名其所居閭曰得賢治定為書堂榜凡九有玉芝産堂柱帝臨觀之由便門過梁師成家黼第與師成連墻穿便門往來復來黼第因大醉不能語夜漏上五刻乃開龍德宫復道小門以還內侍十餘人執兵接擁是夜諸班禁從皆集教場備不虞幾至生變翌日猶不御殿殆半日人心始少安宋初以來臨幸未之有也金人襲平州張瑴奔燕山平州人殺金使以拒守先是金人聞瑴叛遣棟摩將三千騎來討瑴拒之于營州棟摩以兵少不交鋒而退瑴遂妄以大捷聞詔建平州為泰寧軍以瑴為節度使犒賞銀絹數萬至是金主復使斡里雅布督棟摩攻之會瑴聞朝廷犒賜將至喜而遠迎斡里雅布乘其無備襲之與瑴戰于城東瑴敗宵奔燕山王安中納而匿之平州都統張忠嗣及張敦固出降金金遣使與敦固入諭城中城中人殺其使者立敦固為都統閉門固守詔殺張瑴函首以畀金金人以納叛來責朝廷初不欲發遣金人索之益急王安中取貌類瑴者斬其首與之金人曰非瑴也遂欲以兵攻燕安中言必不發遣懼起兵端朝廷不得已令安中縊殺之函其首併瑴二子送之金瑴且死罵宋人不絶口于是燕降將及常勝軍士皆泣下郭藥師曰金人欲瑴即與若求藥師亦將與之乎安中懼因力求罷召為上清寶籙宫使以蔡靖知燕山府事自是降將卒皆解體而金人遂用此興師矣金人來歸武朔州此武州遼置非唐武州也唐武州今宣化府是此武州治神武縣即神武川也與朔州注俱見前朝廷以山後諸州請于金金主新立將許之尼瑪哈自雲中至言于金主曰先帝圖宋協力攻遼故許以燕地宋人既盟之後請加幣以求山西諸鎮先帝辭其幣而復與之盟曰無匿逋逃無擾邊民今宋數路招納叛亡索之不遣盟未期年已如此萬世守約其可望乎且西鄙未寧割付山西諸郡則諸軍失屯據之所將有經略或難持久請勿與之金主遂遣使止以武朔二州來歸甲辰六年春正月夏稱藩于金金以邊地畀之初金聞夏迎護遼主乃遺書于夏使執送遼主且許割地至是夏遣巴哩舊作把里今改公亮奉誓表請以事遼之禮稱藩于金且受割賜之地尼瑪哈承制割下寨以北陰山以南伊實伊喇舊作乙室耶剌今改部圖嚕舊作吐祿今改濼西之地本拓跋故地為遼所有者與之自是兩國信使不絶三月金人來索糧不與金遣使詣宣撫司索趙良嗣所許糧二十萬石談稹曰二十萬石豈易致耶良嗣口許何足憑也遂不與金人由是大怒閏月京師河東陜西地震宫殿門皆搖動有聲河東陜西尤甚陵谷易處蘭州地及諸山草木悉沒入而山下麥苗皆在山上詔右司郎中黃潛善字茂和邵武人按視潛善不以實聞上意乃安遷潛善為户部侍郎夏六月金人克平州張敦固出兵與金人戰大敗州民猶不肯降金主召斡里雅布還下詔招撫棟摩竟克平州執敦固殺之科免夫錢自得燕地悉出河北河東山東之力往饋官軍率十數石致一石才一年三路皆困王黼乃請詔京西淮南兩浙江南福建荆湖廣南措置調夫各數十萬並納免夫錢初黃河歲調夫修築掃岸其不即役者輸免夫錢大觀間始盡令輸錢至是黼依其法行之每夫三十貫委漕臣限督之又詔宗室戚里宰執之家及宫觀侍院一例均敷于是遍率天下凡得一千七百餘萬緡而結怨四海矣秋七月遼延禧復東勝諸州至武州與金人戰敗走山陰遼置河陰縣金改山陰今縣屬大同府此云山陰史臣追敘之文遼主復渡河居圖魯布舊作宇吕不今改部圖魯遼部族耶律達實自金來歸遼主責之曰我在汝何敢立淳達實對曰陛下以全國之勢不能拒敵棄國遠遁使黎民塗炭即立十淳皆太祖子孫豈不勝乞命于他人邪遼主無以答賜酒食而赦之金襲遼主營遼主北走有瑪克實舊作謨葛失今改者迎遼主至其部事之甚謹遼主遂得至烏爾古德埒勒舊作烏古敵烈部遼部族遼主得耶律達實及瑪克實之兵自謂有天助再謀出兵收復燕雲達實諫曰向以全師不謀戰備使舉國皆為金有國勢至此而方求戰非計也當養兵待時而動不可輕舉遼主不從遂及于敗八月談稹罷復以童貫領樞密院事兩河燕山路宣撫使夏人舉兵侵武朔州地界談稹遣兵禦之兵數交夏人未即退聽又金人以朝廷納張瑴不給糧遂攻應蔚逐守臣朝廷罪稹措置乖方詔致仕以貫代之時遼主延禧在夾山帝欲誘致之始遣一番僧齎御筆絹書通意及延禧許歸遂易書為詔許待以皇弟之禮位燕越二王上燕王俁越王偲皆帝弟築第千間女樂三百人延禧大喜貫之是行名為代稹交割山後土地其實已約延禧來降自往迎之也九月以白時中字蒙亨壽春人為太宰李邦彥為少宰趙野開封人宇文粹中為尚書左右丞蔡懋同知樞密院事時燕山危急時中為太宰恬不為慮惟表賀翔鶴霞光上言休氣充應而已邦彥居父喪不兩月起復遂拜少宰但以阿順趨諂為事都人目為浪子宰相冬十一月王黼有罪免黼位元宰每陪曲宴親為俳優鄙賤之役以獻笑取悅太子聞而惡之黼以鄆王楷字德逺帝第三子有寵陰為畫奪宗之計未成及帝幸其第觀芝見有便門通梁師成第始悟其與師成交結狀還宫眷頓衰李邦彥素與黼不協因結蔡攸共毁之會中丞何栗字文縝仙井監人論黼姦邪專權十五事遂詔黼致仕其黨胡松年字茂老海州懷仁人等皆免置講議財利司罷應奉司自蔡京倡豐亨豫大之説勸帝窮極侈靡久而帑藏空竭言利之臣殆析秋毫宣和以來王黼專主應奉掊剝橫賦以羡為功所入雖多國用日匱至是宇文粹中上言祖宗之時國計所仰皆有實數量入為出沛然有餘近年諸局務應奉司妄耗百出若非痛行裁減慮智者無以善後于是詔蔡攸就尚書省置講議財利司除茶法已有定制餘並講究條上攸請內侍職掌事干宫禁應裁省者委童貫請旨由是不急之物無名之費悉議裁省帝亦自罷諸路應奉官吏減六尚歲貢物十二月詔蔡京復領三省事王黼既致仕朱靦力勸用京帝從之京至是四當國目昏眊不能視事悉決于季子絛凡京所判皆絛為之且代京入奏每造朝侍從以下皆迎揖呫囁耳語堂吏數十人抱案後從由是恣為姦利竊弄威柄驟引其婦兄韓梠為戶部侍郎媒蘖密謀斥逐朝士創宣和庫式貢司四方金帛與府藏所儲盡拘括以實之為天子私財白時中李邦彥輩惟奉行文書而已河北山東盜起時轉糧以給燕山民力疲困重以鹽額科斂加之連歲凶荒于是飢民並起為盜山東有張萬仙張迪河北有高托山衆皆十餘萬自餘二三萬者不可勝數令內侍梁方平討之已而京東轉運副使李孝昌招降張萬仙等五萬人知海州錢伯松降賈進等十萬人都城有女子生髭詔度為道士都城中酒保朱氏女忽生髭長六七寸疏秀甚美宛然一男子詔度為道士又有賣青果男子孕而誕子乙巳七年春正月遼延禧如黨項二月至應州金將羅索獲之以歸遼亡遼自太祖建國至天祚亡凡九主合二百十九年遼主畏中國不可仗謀奔西夏會黨項小呼嚕舊作小斛祿今改遣人請遼主臨其地遼主遂趨天德過沙漠金兵忽至遼主徒步出走乘從者馬得脫途次絶糧從者至囓氷雪以濟飢至夜將宿民家紿曰偵騎其家知之叩馬首跪而大慟潛宿其家居數日嘉其忠遙授以節度使遂趨黨項以小呼嚕為西南靣招討使總知軍事二月至應州新城東六十里為金將羅索等所獲遼遂亡延禧至金金主廢為海濱王遣使來告慶遼耶律達實稱帝于奇爾滿是為西遼紀奇爾滿西域地名方輿要在唐庭州西南唐庭州漢車師後王庭也注見前按奇爾滿舊作起兒漫今改後仿此先是達實以諌遼主不從遂殺北院樞密蕭伊蘇舊作乙薛今改自立為王率衆西走至哈屯舊作可敦今改城在庭州東北駐于北庭都護府唐庭州治會西鄙七州十八部王論以興復事得精兵萬餘置官吏立排甲具器械又遺書假道于回鶻元史回鶻五城即唐北庭都護王必里克舊作畢勒哥今改必里克得書即迎至邸願質子孫為附庸送至境外所過敵者勝之降者安之兵行萬里歸者數國獲牛羊駝馬不可勝計至塔實干西域地名舊作尋思罕今改西域諸國舉兵十萬號呼爾察西域大將軍名舊作忽兒珊今改來拒戰達實分所部為三軍進擊大破之僵尸數十里駐兵塔實干凡九十日回回國王來降貢方物又西行至奇爾滿羣臣共册立達實為帝改元延慶上尊號曰天祐皇帝妻蕭氏為昭德皇后自六院司大王蕭鄂囉羅等四十九人皆推恩有差鄂囉羅舊作幹里剌今改夏四月勒蔡京致仕蔡絛鍾愛于京擅權用事其兄攸嫉之數言于帝請殺絛帝不許白時中李邦彥亦惡絛乃與攸發絛姦私事帝怒欲竄之京力丐免乃止勒停侍養因安置韓梠于黃州褫絛侍讀毁賜出身敕欲以撼京而京猶未有去志帝乃命童貫詣京令上章謝事貫至京泣曰上何不容京數年當有相讒譖者貫曰不知也京不得已以章授貫帝令詞臣代京作三表求去乃降詔從之復元豐官制詔行元豐官制復尚書令之官虛而不授三公但為階官毋領三省事六月封宦者童貫為廣陽郡王帝援神宗遺訓能復全燕之境者胙土錫以王爵遂封貫為王前寶文閣待制劉安世卒安世為章惇蔡卞蔡京所忌連貶竄極遠惡地無不歷之至是卒安世少從學于司馬光平居坐不傾倚書不草率不好聲色貨利忠孝正直皆取則于光及年既老羣賢凋喪略盡巋然獨存以是名望益重梁師成用事心服其賢求得小吏吳默常趨走前後者使持書啖以即大用默勸為子孫計安世笑謝曰吾若為子孫計不至是矣還其書不答蘇軾嘗評元祐人物曰器之真鐵漢秋七月熙河蘭州河東地震熙河地震有裂數十丈者蘭州尤甚倉庫皆沒九月有狐升御榻而坐時又有都城東門外鬻菜夫至宣德門宫城正南門下忽若迷罔釋荷擔向門戟手且罵云太祖皇帝神宗皇帝使我來道尚宜速改也邏卒捕之下開封獄一夕方省則不知向者所為乃于獄中盡之冬十月金將尼瑪哈斡里雅布分道南侵初斡里雅布在平州遣人來索叛亡户口朝議弗遣且聞童貫郭藥師治兵燕山斡里雅布遂請于金主曰苟不先舉伐宋恐為後患金主以為然而未敢輕舉及使者往返既數道路險易朝廷治否府庫虛實漸得要領始遼使至率迂其程宴犒不示以華侈王黼務于欲速令金使以七日自燕至都每張宴輒陳尚方錦繡金玉瑰寶以誇富盛由是金人益生心而耶律伊都劉彥宗亦言南朝可圖師不必衆因糧就兵可也及既獲遼主即決意南侵以安班貝勒舍音領都元帥居京師尼瑪哈為左副元帥古紳為右監軍耶律伊都為右都監自雲中趨太原達蘭金穆宗英額子舊作撻懶今改為六部路都統棟摩為南京路都統劉彥宗為漢軍都統斡里雅布監棟摩彥宗兩軍戰事自平州入燕山時帝方親郊才下壇而警報至左右祕之曰恐妨恭謝宰相亦不知也及恭謝畢宰相又共匿之不以聞十一月太常少卿傅察字公晦堯俞從孫奉使遇金兵不屈死之察接伴金國賀正旦使次境上而使人不來居數日忽數十騎馳入館擁之北去遇斡里雅布兵脅之使拜且降不拜左右捽之伏地愈植立反覆辨論不屈遂遇害察登進士蔡京欲妻以女拒弗答平居恂恂然若無所可否及倉猝徇義聞者莫不壯之後諡忠肅召种師道為兩河制置使師道致仕居南山豹林谷在西安府長安縣南終南山麓谷內有東蒙峯亦曰東明种放嘗隱此金人南下趣召之師道聞命即東過姚平仲五原人古之子有步騎四千與之俱赴汴十二月童貫自太原逃歸金尼瑪哈陷朔代州遂圍太原先是金人遣使來許割蔚應州及飛狐靈邱縣注俱見前帝信之遣童貫往受地至太原聞尼瑪哈自雲中南下貫乃使馬擴政之子辛興宗往使諭以交割地事擴至軍前尼瑪哈嚴兵以待趣擴等庭參如見金主之禮既畢首議山後事尼瑪哈曰爾尚欲此兩州兩縣邪山前山後皆我家地尚復何論汝家别削數城來可贖罪也擴還具言于貫貫曰金初立國邊頭寧有幾許軍馬遽敢作如此事耶擴曰彼既深恨本朝結納張玨又為契丹舊臣所激故謀報復今宜速作備禦貫不從既而尼瑪哈遣王介儒色埒默舊作撒離拇今改後仿此持書至太原責以渝盟納叛等事詞語甚倨貫曰如此大事何不素告我色埒默曰兵已興何告為宜速割河東河北以大河為界用存宋朝宗社貫聞之氣褫不知所為即欲假赴闕稟議為名遁還京師知太原府張孝純止之曰金人渝盟大王當會諸路將士竭力枝梧今大王去人心必搖是以河東與金也河東既失河北豈可保邪願少留共圖報國貫怒叱之曰貫受命宣撫非守土也必欲留貫置帥臣何為遂行孝純嘆曰平生童太師作幾許威望及臨事乃蓄縮畏懾奉頭鼠竄何面目復見天子乎尼瑪哈引兵降朔州克代州都巡檢使李義死之尼瑪哈遂進兵圍太原孝純悉力固守金斡里雅布入檀薊州郭藥師以燕山叛降金金盡取燕山州縣初郭藥師與詹度同職自以節鉞欲居度上度以御筆所書有序藥師不從加以常勝軍橫暴藥師右之度不能制朝廷慮其交惡命蔡靖代度靖坦懷待之藥師亦重靖稍為抑損及王安中被召靖代知府事藥師每令部曲持良械精甲貿易于他道為奇巧之物以奉權貴宦侍譽言日聞于帝遂專制一路增募兵至三十萬而不改契丹服飾朝論頗以為疑進拜太尉召之入朝藥師辭不至帝令童貫行邊陰察其去就不然則挾之偕來貫至藥師迎拜帳下貫避之曰汝今為太尉與我等耳此禮何為藥師曰太師父也藥師唯拜我父焉知其他貫釋然遂邀貫視師至于逈野略無人迹藥師下馬當貫前掉旗一麾俄頃四山鐵騎耀日莫測其數貫衆皆失色歸為帝言藥師必能拒敵蔡攸亦從中力主之謂其可倚故內地不復防制屢有告變及得其通金國書朝廷輒不省至是詹度又言藥師瞻視非常趣向懷異逆節已萌凶橫日甚始詔遣官究實而金兵已南下矣斡里雅布自平州破檀薊至三河蔡靖遣藥師及張令徽劉舜仁二人皆遼常勝軍帥同藥師降宋者帥師四萬五千迎戰于白河即古沽水源出邊外由宣化徑順天境至天津與衛河合兵敗而還藥師遂帥所部兵劫靖及都轉運使吕頤浩以降斡里雅布執靖及頤浩置軍中以行于是燕山府所屬州縣皆為金有斡里雅布既得藥師益知宋虛實因以為鄉導懸軍深入矣罷花石綱及內外製造局詔內侍梁方平帥衛士守黎陽帝以金人南下悉以禁軍付內侍威武軍節度使梁方平守黎陽步軍都虞候何灌字仲源開封祥符人謂白時中曰金人傾國遠至其鋒不可當今方平掃精兵以北在京皆疲弱也萬一方平不枝梧何以善吾後盍留以衛根本不從以皇太子為開封牧帝以金師日迫為憂蔡攸探知帝意欲內禪引給事中吳敏字元中真州人入對宰執皆在敏前奏事且曰金人渝盟舉兵犯順陛下何以待之帝蹙然曰奈何時東幸計已定命李梲先出守金陵敏退詣都堂言曰朝廷便為棄京師計何理也此命果行須死不奉詔宰執以為言梲遂罷行而以太子為開封牧詔天下勤王許臣庶直言極諫罷道官及行幸諸局初宇文虛中字叔通成都華陽人為童貫參議官虛中以廟謨失䇿主帥非人將有納侮自焚之禍上書極言之王黼大怒又纍建防邊策議皆不報及金人南下貫與虛中還朝帝謂虛中曰王黼不用卿言今事勢若此奈何虛中對曰今日宜先降詔罪已更革弊端俾人心天意回則備禦之事將帥可以任之帝即命虛中草詔略曰朕以寡昧之質籍盈成之業言路壅蔽靣諛日聞恩幸持權貪叨得志縉紳賢能陷于黨籍政事興廢拘于紀年賦斂竭生民之財戍役困軍旅之力多作無益侈靡成風利源酤𣙜已盡而牟利者尚肆誅求諸軍衣糧不時而冗食者坐享富貴災異謫見而朕不悟衆庶怨懟而朕不知追維己愆悔之何及思得奇䇿庶解大紛望四海勤王之師宣二邊禦敵之略永念纍聖仁厚之德涵養天下百年之餘豈無四方忠義之人來徇國家一日之急應天下方鎮郡縣守令各率衆勤王能立奇功者並優加奬異草澤異材能為國家建大計或出使疆外者並不次任用中外臣庶並許直言極諫帝覽之曰今日不吝改過可便施行虛中又請出宫人罷道官及大晟府行幸局暨諸局務召熙河經略使姚古五原人雄之子秦鳯經略使种師中師道弟將兵入援時欲召古師中令以本路兵會鄭洛外援河陽內衛京城帝命宇文虛中為河北河東路宣諭使護其軍虛中以檄召古師中兵馬令直赴汴京應援以吳敏為門下侍郎帝東幸之意益決太常少卿李綱謂敏曰建牧之議豈非欲要太子以留守之任乎今敵勢猖獗非傳太子以位號不足以招徠天下豪傑敏曰監國可乎綱曰肅宗靈武之事不建號不足以復邦而建號之議不出于明皇後世惜之上聰明仁恕公曷不為上言之翼日敏入對具以綱言白帝帝即召綱入議綱刺臂血上疏曰皇太子監國禮之常也今大敵入攻安危存亡在呼吸間猶守常禮可乎名分不正而當大權何以號召天下若假皇太子以位號使為陛下守宗社收將士心以死捍敵天下可保帝意遂決明日宰臣奏事帝留李邦彥語敏綱所言遂拜敏門下侍郎草詔傳位帝傳位于太子太子即位是為欽宗尊帝為教主道君太上皇帝皇后為太上皇后帝下詔禪位太子自稱曰道君皇帝趣太子入禁中被以御服涕泣固辭不許遂即位尊帝為教主道君太上皇帝退居龍德宫以李邦彥為龍德宫使蔡攸吳敏副之以李綱為兵部侍郎耿南仲字晞道開封人簽書樞密院事綱上書言方今中國勢弱君子道消法度紀綱蕩然無統陛下履位之初當上應天心下順人欲攘除外患誅鋤內姦以付道君皇帝付託之意帝召對延和殿時金議割地綱言祖宗疆土當以死守不可以尺寸與人帝嘉納之拜兵部侍郎南仲帝東宫舊僚故亦推用之立皇后朱氏開封祥符人武康節度使伯材之女太學生陳東字少陽鎮江丹陽人上書請誅蔡京等六人時天下皆知蔡京等誤國而用事者多受其薦引莫肯為帝明言之東率諸生上書曰今日之事蔡京壞亂于前梁師成陰賊于內李彥結怨于西北朱勔聚怨于東南王黼童貫又從而結怨于遼金創開邊隙使天下勢危如絲髮此六賊者異名同罪伏願陛下擒此六賊肆諸市朝傳首四方以謝天下御批歷代通鑑輯覽卷八十一

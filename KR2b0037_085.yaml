front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷八十六宋髙宗皇帝戊午紹興八年金天眷元年春二月胡安國進春秋傳詔加安國寶文閣直學士
  hash: sha256:eb0157d6b61206819526e51630ae4dfe6f747fc63bacdc6a78b071c3a91a5d1e

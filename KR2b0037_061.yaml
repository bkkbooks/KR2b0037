  text: 欽定四庫全書御批歷代通鑑輯覽卷六十二唐宣宗皇帝丁卯大中元年春正月赦天下改元二月旱
  hash: sha256:08567f9cd09b87f377dfdb61182a1a1aa604c6a4d451cc1f651e369ff3631caf

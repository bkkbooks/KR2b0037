front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷七十八宋神宗皇帝丙辰熙寧九年春正月下溪州降遂城之續綱目作章惇招降五溪蠻遂城下溪州考宋史神宗紀熙寧九年正月下溪州刺史彭師晏降章惇𫝊不載其事蠻夷傳師晏為下溪州刺史章惇經制南北江湖北提刑李平招降師晏不言惇使考惇傳惇自察訪使召還為三司使尋以鄧綰論出知湖淵事在熙寧八年十月是下溪州降惇並不在其地安得云惇招降五溪乎續綱目叙事不實多類此今改輯

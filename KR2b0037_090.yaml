body:
  text: 初金人攻蘄知州李誠之字茂欽婺州東陽人百計禦之會黃州失守金人併兵來攻城始破誠之併其妻子官屬皆死之金兵退再興邀擊于天長敗之及渡淮北去全又大敗之宋元通鑑金人圍黃州州守何大節取郡印佩之誓以死守一夕輿兵忽奔告曰城陷矣擁之登車敵兵已集大節自沉于江而死時以誠之大節二人等死誠之果決特為褒贈立廟大節遲回等于棄城遁走所載與續綱目不同今並注于此夏五月甲申朔日食蒙古取金東平使嚴實石圭守之金以呼爾噶行省于邳州王庭玊行元帥府于黃陵岡東平被圍久糧道復絶行省呼爾噶監軍王庭玊不能守率衆南趨邳州蒙古蘇嚕克圖舊作唆嚕匆禿今改邀擊斬首七千級嚴實遂入城建行省于府第先是穆呼哩以東平不下將還謂千户薩哩台曰東平破可命嚴實石圭分城內南北以守之遂去至是薩哩台以穆瑚黎命中分其城以嚴實撫安東平以北恩博等州石圭移治曹州已而金王庭玉取曹州殺石圭六月立沂王嗣子貴和為皇子更名竑帝以國本未立命選太祖十世孫年十五歲以上者教育宫中如髙宗檡普安王故事于是立貴和為皇子以貴誠為秉義郎貴誠初名與莒燕懿王德昭之後希瓐之子也母全氏家于紹興山隂縣初慶元人余天錫為史彌逺府童子師性謹厚彌逺器重之彌逺在相位久以帝未有儲嗣而沂靖惠王近屬亦未有後欲借沂王置後為名隂擇宗室中可立者以備皇子之選會天錫告還鄉秋試彌逺密語之曰今沂王無後宗子賢厚者幸具以來天錫渡浙舟抵越西門會天大雨過全保長家避雨保長知為丞相客具雞黍甚肅須臾有二子侍立天錫異而問之保長曰此吾外孫越與莒與芮也日者嘗言二兒後當極貴天錫因憶彌逺言及還臨安以告之彌逺命召二子來保長大喜鬻田治衣冠集姻黨送之且詫其遇及見彌逺善相大竒之恐事不便遽使復歸保長大慙逾年彌逺忽謂天錫曰二子可復來乎天錫召之保長辭謝不遣彌逺乃使天錫密諭保長曰二子長者最貴宜還撫于其父家遂載至臨安及貴和立為皇子乃補與莒東義郎賜名貴誠年十七矣京湖制置大使趙方卒方病革曰未死一日當立一日紀綱及卒人皆思之方少從張栻學初知青陽縣告其守史彌逺曰催科不擾是催科中撫字刑罰無差是刑罰中教化人以為名言方守襄漢十年以戰為守合官民兵為一體通制總司為一家許國之忠應變之略隱然有樽爼折衝之風故金人擾邊淮蜀大困而京西一境獨全能用名人如陳䀭遊九功畢皆拔為大吏扈再興孟宗政皆自土豪推誠擢任致其死力卒為名將故能藩屏一方使朝廷無北顧之憂遊九功字勉之建陽人九月立宗室貴誠為沂王後貴誠凝重寡言潔修好學每朝參待漏他人或笑語貴誠獨儼然出入殿庭矩度有常見者斂容彌逺益異之至是立為沂靖惠王後冬十月蒙古穆呼哩侵夏夏人以兵附之遂取金葭州及綏德州十一月圍延安府穆呼哩由東勝州涉河而西夏主懼遣塔爾海舊作塔海今改監府等宴穆呼哩於河南且遣塔海舊作塔哥今改甘布舊作甘普今改將兵五萬屬焉十月穆呼哩引兵東行入葭州金將王公佐遁以石天應權行臺守葭自將兵攻綏德破兩寨夏主遣瑪爾布舊作迷僕今改帥衆會之瑪爾布問穆呼哩相見之儀曰汝主見我主即其禮也瑪爾布曰未受主命不敢即拜因引衆去至是穆呼哩進攻延安瑪爾布始贄馬而拜金元帥哈逹即完顔瞻字景山舊作合逹今改與納哈塔邁珠禦之哈逹以兵三萬陳于城東蒙古將蒙古布哈先以騎士三千趨之約半夜伏發穆呼哩乃命軍士銜枚潛進伏于城東兩谷間明日蒙古布哈望見金兵佯棄旗鼓走金兵追之穆呼哩出伏兵乘其後鼓鼙震天金兵大亂穆呼哩追殺七千餘人哈逹走入延安城堅壁不出穆呼哩以城池堅深猝不可拔乃留軍圍之而自將兵南攻鄜坊等州四川宣撫使安丙卒詔以崔與之字正子廣州人為四川制置使盡護蜀軍丙在四川以攻為守威績甚著朝廷賴之及卒詔與之盡護四蜀之師與之開誠布公拊循將士人人悅服軍政復立張林叛降蒙古穆呼哩以林行山東東路都元帥李福自膠西逃歸李全既併將漣水忠義益驕悍輕朝廷及遊金山作佛事以薦國殤知鎮江府喬行簡方舟逆全大合樂以享之全歸語其徒曰江南佳麗無比正須若等一到始造舭􅭥舟謀爭舟楫之利焉陽喬行簡字壽朋婺州東人膠西當登寧海之衝百貨輻輳全使其兄福守之為窟宅計時互市始通北人尤重南貨價增十倍全誘商人至山陽以舟浮其貨而中分之自淮轉海逹于膠西福又具車輦之而稅其半乃聽往諸郡貿易車夫皆督辦于張林林不能堪林財計仰六鹽場福恃弟有恩于林欲分其半林許福恣取鹽而不分場福怒曰若背恩邪待與都統提兵取君頭耳林懼其黨李馬兒説林歸蒙古林遂以京東諸郡請降于蒙古穆呼哩以林行山東東路益都滄景濵棣等州都元帥府事福狼狽走還楚州林猶遺賈涉書言非已叛實由李福也已而知濟南府种贇討張林林敗走李全入青州據之事在十五年五月閏十二月遣使如蒙古通好也蒙古尋遣使來報壬午十五年金元光元年春正月庚戌朔受恭膺天命寶于大慶殿大赦初鎮江都統翟朝宗得璽于金師獻于朝既而趙拱又得玊印文與璽同而加大朝廷喜受之行慶賀禮大赦賈涉遺書彌逺謂天意隱而難知人事切而易見當思今日人事尚未有可答天意彌逺不懌二月金人復來侵夏五月淮兵襲敗之金主以朝廷絶嵗幣國用困乃命元帥左監軍額爾克行元帥府事節制三路軍馬同簽書樞密院事時全副之由頴夀進渡淮敗官軍于高塘市今曰高塘鎮在潁州府霍邱縣西攻固始縣破廬州將焦思忠兵既而獲生口言全之姪青受宋詔與全兵相拒全匿之五月額爾克引衆還距淮二十里諸軍將渡全矯稱密詔諸軍且留收淮南麥下令人穫三石以給軍衆惑之留三日額爾克謂全曰今淮水淺狹可以逺濟若值暴漲宋乘其後將不得完歸矣全力拒之是夕大雨明日淮水暴漲乃為橋渡軍官軍襲之全兵大敗橋壞全以輕舟先濟士卒皆覆沒金之兵財由是大竭金主詔數全罪而誅之進封子竑為濟國公以貴誠為邵州防禦使竑好鼓琴史彌逺買美人善鼓琴者納諸竑而厚撫其家使瞷竑動息美人知書慧黠竑嬖之時楊皇后専國政彌逺用事久宰執侍從臺諫藩閫皆所引薦莫敢誰何權勢熏灼竑心不能平嘗書楊后及彌逺之事于几上曰彌逺當決配八千里又嘗指宫壁輿地圖瓊崖曰吾他日得志置史彌逺于此又嘗呼彌逺為新恩以他日非新州則恩州也彌逺聞之大懼思以處竑而竑不知真德秀時兼宫教諫竑曰皇太子若能孝于慈母而敬大臣則天命歸之矣否則深可慮也竑不聽一日彌逺為其父浩飯僧淨慈寺與國子學録鄭清之字德源鄞人登慧日閣屏人語曰皇子不堪負荷聞後沂邸者甚賢今欲擇講官君其善訓導之事成彌逺之坐即君坐也然言出于彌逺之口入于君之耳若一語泄吾與君皆族矣清之曰不敢乃以清之兼魏惠王府學教授清之日教貴誠為文又購高宗御書俾習焉清之謁彌逺即示以貴誠詩文翰墨譽之不容口彌逺嘗問清之曰吾聞皇姪之賢已熟大要竟如何清之曰其人之賢更僕不能數然一言以斷之曰不凡彌逺頷之再三䇿立之意益堅乃日媒孽竑之失于帝覬帝廢竑立貴誠而帝不悟其意秋八月長星見西方蒙古耶律楚材謂其主曰女真將昜主矣九月大名忠義彭義斌復京東州縣嚴實將朝海以青崖崓降冬十月蒙古穆呼哩取金河中以石天應權河東關陜行臺穆呼哩所過州縣皆下時金于牛心寨在吉州西僑治吉州事穆呼哩自隰州攻之知州楊貞字正甫吉州人令妻孥先墜崖己從之皆死考一統志楊貞築牛心寨以拒元兵子克義戰歿元兵攻之急命其子克敬克讓俱死妻孟氏自經乃南望再拜自投河中所載較詳今附注于此穆呼哩入寨留兵守之且使蒙古布哈引遊騎出秦隴以為聲援及相視山川夷險而自將兵下孟州晉陽霍邑等寨召石天應謂之曰河中為河東要郡擇守非君不可乃以天應權行臺平陽太原吉隰等帥並受節制穆呼哩遂趨長安使烏哈納台布哈舊作兀胡乃太不花今改屯守之遣昻吉舊作安赤今改將兵斷潼關十一月蒙古穆呼哩取金同州節度使完顏額爾克死之十二月以李全為保寧節度使京東河北鎮撫副使初史彌逺欲加全官賈涉止之及加節鉞涉歎曰朝廷但知官爵可以得其心寧知驕則將至于不可勸耶蒙古主特穆津入西域滅回回國即默迪納國明史西域傳默迪納回回祖國也相傳其祖國王瑪哈木瑪特生而神靈盡臣服西域諸國尊為排哈木巴爾猶言天使也其教以事天為主而無像設隋開皇間始傳其教入中國迄元世其人遍于四方續綱目是條提綱書蒙古主入西域屠密爾城滅回回國大掠欣都而還考元史太祖紀十七年壬午西域主扎拉迪音出奔與密爾汗合帝自將擊之擒瑪里克汗扎拉迪音遁去追之不獲十八年癸未定西域諸城置逹嚕噶齊監治之十九年甲申帝至東印度國角端見班師據此則回回之滅與角端之見事隔兩年續綱目併作一條非是今于是條提綱但書蒙古主滅回回國而以欣都角端之見附敘目中仍加已而二字以别先後默迪納舊作默德那排哈本巴爾舊作𣲖噶木巴爾密爾舊作密里扎拉迪音舊作扎拉丁瑪里克汗舊作密里汗今改先是蒙古主遣子卓沁察罕台烏格台圖壘分攻鄂托羅爾舊作斡脫羅兒今改玉龍哈實等城而自將攻都哩木舊作迭里密今改巴喇勒台舊作班勒訖今改城方與紀要諸城皆在天方國境天方古筠沖地舊日天堂亦曰默伽在西域極西考西域圖志和闐回部所屬六城有玊隴哈什蓋即元時所謂玉龍城也遂圍塔爾哈舊作塔里寒今改寨方輿紀要在默迪納境地近天方進薄回回國其王委國而去續綱目作選匿海嶼不旬日瘐死于是擊定西域諸城置逹嚕噶齊猶華言掌印官也監治之已而蒙古主進掠痕都即印度也方輿紀要漢身毒國六朝及唐謂之天竺宋時謂之欣都後又訛為印度有東西南北中五國所謂五印度是也次鐵門關明史西域傳撒馬兒罕渴石城西有石峽兩崖如斧劈其口有門色如鐵番人號為鐵門關設兵守之賽瑪爾堪古罽賔國舊作撒馬兒罕今改侍衛見一獸鹿形馬尾緑色而獨角能為人言謂之曰汝君宜早還蒙古主怪之以問耶律楚材對曰此獸名角端解四夷語是惡殺之象今大軍西征已四年蓋上天惡殺遣之告陛下願承天心宥此數國人命實無疆之福蒙古主遂班師癸未十六年金元光二年春正月金元帥都監侯孝順河東人按侯孝雜順舊作侯小叔今改後仿此取河中殺蒙古石天應穆呼哩攻鳯翔府晝夜苦戰四十餘日不下將由河中北還金元帥右都監侯孝順襲河中破之殺石天應焚浮橋而退穆呼哩以天應子烏格按烏格舊作斡可今改後仿此代領其衆初金主命元帥都監阿嚕岱守河中阿嚕岱恇怯不能軍竭民膏血為浚築之計及絳州破阿嚕岱益懼馳奏河中孤城不可守有旨親視果不可守則棄之無至資敵阿嚕岱遂棄河中燒民居官舍一二日而盡尋有言河中重鎮國家基本所在設為敵人所據則大河之險我不得專恃矣金主命有司復修葺之終不能成故隨守隨陷三月蒙古穆呼哩卒于解州穆呼哩自河中帥師還至解州聞喜縣以疾卒穆呼哩雄勇善謀與博爾濟阿爾拉氏納固爾傲拉之子朔方人博勒呼厚新氏齊拉衮按博爾濟舊作博爾术阿爾拉舊作阿兒剌納固爾傲拉舊作納忽阿兒蘭博勒呼舊作博兒忽厚新舊作許兀慎齊拉衮舊作赤老溫今並改後仿此等俱以忠勇事蒙古主時號為都爾本庫嚕克舊作撥里斑曲律今改猶華言四傑也四人之子孫皆領宿衛號四集賽舊作怯薛今改出官則為輔相焉夏六月淮東制置使賈涉卒涉以李全驕暴難制力求還朝在道卒初涉欲制忠義兵乃以翟朝宗統鎮江副司八千人屯楚州城中又分帳前忠義萬人命趙邦永高友統五千屯城西王暉于潭統五千屯淮隂李全輕鎮江兵而忌帳前忠義乃數稱髙友等勇遇出軍必請以自隨涉不許全每宴麾下併召涉帳前將校于是帳前亦願隸全然未能合也及涉卒邱夀邁攝帥事全請曰忠義烏合尺籍鹵莽莫若别置新籍一納諸朝一申制閫一留全所庶功過有考請給無弊夀邁從之全乃合帳前忠義與已軍盡籍之而併統其軍壽邁不悟秋八月金將納哈塔陸格舊作納合六哥今改後仿此殺呼爾噶謀邳州降附金人殺之呼爾噶御下嚴邳州從宜經略使納哈塔陸格殺之遂據州反與蒙古將李二措致書海州言欲來附李全麾下周岊得之以報全全喜遣王喜兒以兵二千應接而已繼之二措納喜兒而囚之全若攻邳四面阻水二措積徑弩備之全不得進合兵索戰而敗欲還楚州會濵棣有亂乃引兵趨青州金行院總帥約赫德舊作牙吾答今改後仿此討殺陸格復其城九月庚子朔日食冬十二月以許國為淮東制置使初淮西都統許國奉祠家居欲傾賈涉而代之數言李全必反涉卒會召國入對國疏全姦謀益深反狀已著非有豪傑不能消弭蓋自鬻也遂易國文階為淮東安撫制置使兼知楚州命下聞者驚愕淮東參幕徐晞稷雅意開閫及聞國用乃注釋國疏以寄全全不樂金主珣殂子守緒立是為金哀宗金主疾革時已暮夜近臣皆出惟前朝資政夫人鄭氏以年老侍側金主知其可託謂之曰速召太子主後事言絶而殂夫人祕之是夕后妃問安寢閣龎貴妃隂狡機慧常以其子英王守純年長不得立懷怨鄭氏恐其為變即紿之曰上方更衣后妃可少休他室伺其入遽鑰之急召大臣傳遺詔立皇太子守緒始啓户出后妃發喪太子方入宫英王已先至太子知之分遣樞密院官及東宫親衛軍官伊喇布哈本契丹人按伊拉布哈舊作移剌蒲阿今改後仿此集軍三萬餘于東華門街部署既定命護衛四人監守純于近侍局乃即位于柩前蒙古攻夏夏主遵頊傳國于其子德旺遵頊自稱上皇德旺改元乾定未幾遵頊卒德旺號之曰神宗甲申十七年金哀宗守緒正大元年春三月召崔與之為禮部尚書以鄭損為四川制置使與之辭不拜與之治蜀將士輯睦府藏充實至是以疾歸廣州蜀人肖其像祠焉金使人來請和金主遣尚書令史李唐英至滁州通好既而復遣樞密判官伊喇布哈率兵至光州榜諭軍民更不南侵秋閏八月帝崩史彌逺矯詔立沂王子貴誠更名昀是為理宗尊皇后為皇太后同聽政封皇子竑為濟王出居湖州八月丙戍帝不豫史彌逺遣鄭清之往沂王府告貴誠以將立之意貴誠默不應清之曰丞相以清之從遊久故使布腹心今不答一語則清之將何以答丞相貴誠始拱手徐言曰紹興老母在清之以告史彌逺益相與嘆其不凡壬辰帝疾篤彌逺稱詔以貴誠為皇子改賜名昀授武泰軍節度使封成國公閠月丁酉帝崩彌逺遣皇后兄子谷本開封人居上虞石字介之谷之弟以廢立事白后后不可曰皇子竑先帝所立豈敢擅變谷等一夜七往返后終不許谷等乃拜泣曰內外軍民皆已歸心苟不立之禍變必生則楊氏無噍類矣后默然良久曰其人安在彌逺即于禁中遣快行宣昀令之曰今所宣是沂靖惠王府皇子非萬歲巷皇子苟誤則汝皆處斬皇子竑時聞帝崩跋足以需宣召久而不至乃屬目墻壁間見快行過其府而不入疑焉已爾擁一人徑過天暝不知為誰甚惑之昀入宫見后后拊其背曰汝今為吾子矣彌逺引昀至柩前舉哀畢然後召竑竑聞命即赴至則每過宫門禁衛拒其從者彌逺亦引竑至柩前舉哀畢引出帳殿帥夏震守之遂召百官立班聽遺制則引竑至舊班竑愕然曰今日之事我豈當仍在此班震紿之曰未宣制前當在此宣制後乃即位竑以為然已而遙見殿上燭影中有人在御座則昀已即位矣宣制畢閣門宣贊呼百官拜賀竑不肯拜震捽其首下拜遂稱遺詔以竑為開府儀同三司封濟陽郡王判寧國府尊楊皇后曰皇太后埀簾同聽政詔遵孝宗故事宫中自服三年喪尋進封竑為濟王出居湖州九月詔傅伯成字景初察之孫為顯謨閣學士楊簡字敬仲慈溪人為寶謨閣學士辭不至史彌逺欲收衆望勸帝褒表老儒遂詔傅伯成楊簡及柴中行字與之餘千人俱奉朝請伯成簡辭不至以真德秀直學士院魏了翁為起居郎初以德秀及禮部侍郎程珌字懷古休寧人吏部侍郎朱著閩縣人綽之孫並兼侍讀工部侍郎葛洪字容父婺州東陽人起居郎喬行簡宗正少卿陳貴誼字正甫福清人軍器監王暨並兼侍講尋又以德秀直學士院召魏了翁為起居郎德秀之為起居舍人兼宫講也言事不避權貴且惓惓于復讐知史彌逺欲以爵祿縻天下士慨然謂劉爚曰吾徒須急引去使廟堂知世有不肯為從官者遂力請外至是自知潭州召還入對勸帝容受直言召用賢臣固結人心為本帝開納之了翁當開禧初以武學博士召試學士院對策諫開邊事御史徐相劾了翁在妄了翁亦以親老出知嘉定府尋築室白鶴山下以所聞于輔廣李燔者開門授徒士爭負笈從之由是蜀人盡知義理之學及為潼川轉運判官上疏乞與周敦頤張載程皓程頤錫爵定諡示學者趨向朝廷從之在白鶴山亦名四明山卭州西追封希瓐為榮王以其子與芮襲封奉祀帝追封所生父希瓐為榮王生母全氏為國夫人而弟與芮嗣之冬十月金及夏平夏人自貞祐初與金以小故生釁構難十年一勝一負遂至精鋭俱盡兩國皆弊至是夏遣其吏部尚書李仲諤修好于金稱弟不臣各用本國年號金遣禮部尚書鄂吞良弼舊作奧敦良弼今改後仿此報之理宗皇帝乙酉寶慶元年金正大二年春正月湖州潘壬起兵謀立濟王竑既而竑討壬壬走史彌逺矯詔殺竑追貶為巴陵郡公湖州人潘壬與其從兄甫弟丙以史彌逺廢立不平欲奉濟王而立之乃遣甫密告于李全全欲坐視成敗陽與之期日遣兵而實無意也壬等信之遂部分其衆以待及期全兵不至壬等懼事泄乃以其黨雜販鹽盜千餘人結束如全軍狀揚言自山東來夜入州城求濟王王聞變匿水竇中壬尋得之擁至州治以黃袍加王身王號泣不從壬等強之王不得已乃與約曰汝能勿傷太后官家乎衆許諾遂發軍資庫金帛會子犒軍知州謝周卿率官屬入賀壬等乃偽為李全榜揭于門數史彌逺廢立罪且曰今領精兵二十萬水陸並進人皆聳動比明視之則皆太湖漁人及巡尉兵卒耳王知事不成乃遣王元春告于朝而帥州兵討壬壬變名走楚州甫丙皆死元春至行在史彌逺懼甚急召殿司將彭壬帥師赴之至則事平矣潘壬至楚州將渡淮為小校明亮所獲送臨安斬之彌逺忌竑詐言竑有疾令余天錫召醫入湖州視之天錫至假稱諭旨逼竑縊于州治以疾薨聞尋詔追貶為巴陵郡公又降為縣公改湖州為安吉州起居郎魏了翁金部員外郎洪咨夔相繼言竑之寃及禮部侍郎直學士院真德秀入對因曰陛下初膺大寶不幸處人倫之變有所未盡流聞四方所損非淺霅川之變非濟邸本志前有避匿之迹後聞捕討之謀情狀本末灼然可考願詔有司討論雍熙進封秦邸舍罪恤孤故事斟酌行之雖濟王未有子息興滅繼絶在陛下耳帝曰朝廷待濟王亦至矣德秀曰若謂此事置處盡善臣未敢以為然觀舜所以處象則陛下不及舜明甚人主但當以二帝三王為師帝曰一時倉卒耳德秀曰此已往之咎願陛下進德修學以掩前失和洪咨夔字舜俞於潛人霅川湖州有霅水故名元志霅水一名苕溪源出天目山徑湖州南下流與餘不諸溪合入太湖蒙古武仙殺史天倪天倪弟天澤字潤甫秉直季子討仙仙走西山天澤復入真定武仙聞彭義斌復山東州縣乃叛蒙古殺都元帥史天倪天倪弟天澤時護母歸燕府僚王守道元史作王縉追天澤于道告之故且曰變起倉卒部曲散在近郊若能返斾當不招自至天澤曰不共國之讐死亦當往况不死邪遂傾資裝易鎧仗南還行次滿城得士馬甚衆遣監軍李伯祐詣國王博囉穆呼哩之子嗣為國王舊作孛魯今改言狀且乞濟師博囉即命天澤嗣兄河北西路都元帥遣薩納台圗伯特克􅚕特氏舊作乃台元史作省乃台圖伯特克􅚕特舊作禿伯怯烈今改後仿此率鋭卒三千援之合勢進攻仙仙驍將葛鐡搶擁衆來拒天澤迎擊之乘勝至中山略無極漢毋極縣唐改無今縣屬正定府拔趙州仙敗奔西山天澤遂復真定已而武仙夜襲真定天澤奔藁城未幾天澤以藁城之兵入真定襲仙仙復走西山漢藁城縣唐改藁平宋復舊今縣屬正定府二月李全作亂焚楚州許國走死以徐晞稷為制置使撫之許國至鎮李全妻楊氏郊迓國辭不見楊氏慚而歸既視事痛抑北軍有與南軍競者無曲直偏坐之犒賞十損八九全自青州致書于國國誇于衆曰全仰我養育我略示威即奔走不暇矣全故留青州國不能致乃數致厚餽邀全還劉慶福亦使人覘國意向國左右語覘者曰制置無害汝等意慶福以報全全集將校曰我不參制閫則曲在我今不計生死必往遂還楚州上謁賔贊戒全曰節使當庭參制使必免禮及庭趨國端坐納全拜不為止全怒退曰全歸本朝拜人多矣但恨汝非文臣本與我等汝向以淮西都統謁賈制帥亦免汝拜汝有何勳業一旦位我上便不相假借邪全赤心報朝廷不反也國繼設盛會宴全遺勞加厚全終不樂慶福謁國之幕客章夢先夢先令隔幕貌諾慶福亦怒既而全欲往青州恐國苛留自計曰彼所爭者拜耳拜而得志吾何愛焉更折節為禮因會集間出劄白事國見其細故判從之全即席再拜謝自是動息必請得請必拜國大喜語家人曰吾折伏此虜矣全往青州尋遣慶福還楚為亂國集兩淮馬步軍十三萬大閲楚城外以挫北人之心全妻楊氏及軍校留者懼其謀已內自為備適湖州潘壬事敗全黨益不安或教楊氏畜一妄男子指謂人曰此宗室也且語僚佐曰會令汝為朝士潛約盱眙四軍為應盱眙四將不從于是慶福謀中輟止欲快意于國計議官苟夢玉知之以告國國曰但使反反即殺我豈文儒不知兵者邪夢玉懼禍及求檄往盱眙復告慶福曰制使欲圖汝兩為自結之計及是國晨起視事忽露刃充庭客駭走國厲聲曰不得無禮矢已及顙流血蔽面而走亂兵悉害其家大縱火焚官寺兩司積蓄盡為賊有親兵數十人翼國登城樓縋城走伏道堂中宿焉是日慶福首殺夢先以報其辱明日國縊于途事聞史彌逺懼激他變欲事含忍以徐晞稷嘗倅楚守海得全歡心乃授晞稷制使令屈意撫全全聞國死自青州還楚徉責慶福不能彈壓致忠義之閧斬數人上表待罪朝廷不問知揚州趙范得制置使印于潰卒中以授晞稷晞稷至楚全及門下馬拜庭下晞稷降等止之賊衆乃悅晞稷至以恩府稱全恩堂稱楊氏而手足倒置矣三月葬永茂陵在會稽縣東南寶山史臣曰寧宗初年召用宿儒引拔善類其政可觀中更韓伲胄內蓄羣姦指正為偽外桃強鄰流毒淮甸函首求成國體虧矣及史彌逺擅權幸帝耄荒竊弄威福至于皇儲國統亦得乘機伺間遂其廢立之私他可知矣夏四月太后以疾罷聽政五月李全襲彭義斌于恩州義斌敗之許國既死李全牒彭義斌于山東曰許國謀反已伏誅矣兩軍並聽我節制義斌大罵曰逆賊背國厚恩擅殺制使我必報此讐乃斬齎牒人南向告天誓衆見者憤激五月全自青州攻東平不克乃攻恩州義斌出兵與戰全敗走獲其馬二千劉慶福引兵救全又敗全退保山崓抽山陽忠義軍以北楊氏及劉全皆欲親赴難會全遣人求徐晞稷書與義斌連和乃止義斌致書沿江制置使趙善湘字清臣濮安懿王五世孫曰不誅逆全恢復不成但能遣兵扼淮進據漣海以蹙之斷其南路此賊必擒賊平之後收復一京三府然後義斌戰河北盱眙諸將襄陽騎士戰河南神州可復也盱眙四總管亦各遣使致書乞助討賊知揚州趙范亦以為言史彌逺令諭范無出位專兵各享安靜之福范復以書力論之彌逺不聽六月加史彌逺太師封魏國公彌逺辭太師許之彭義斌圍東平嚴實請和秋七月義斌徇真定實以蒙古兵來襲義斌死之京東州縣盡陷義斌既克山東復納李全降兵兵勢大振遂圍東平嚴實潛約蒙古將博囉罕舊作孛里海今改合兵攻之兵久不至城中食盡乃與義斌連和義斌亦欲藉實取河朔而後圖之遂以兄禮事實時實衆尚數千義斌不之奪而留所掠實青崖之家屬不遣七月義斌下真定道西山與博囉罕等軍相望義斌分實以帳下兵陽助而陰伺之實知勢迫即赴博囉罕軍與之合遂及義斌戰于內黃之五馬山在內黃縣西義斌兵潰史天澤以鋭卒略其後遂擒義斌説之降義斌厲聲曰我大宋臣義豈為他臣屬邪遂死之于是京東州縣復為實有實所統有全魏十分齊之三魯之九凡五十四城後又割大名彰德外屬而益以德兖濟單四州時所在殘毁獨實所統治安四方之民爭赴之贈張九成官爵録程頤後帝以九成正色立朝有中興明道之功贈太師追封崇國公諡文忠九成研思經學多所訓解然早與學佛者遊故議論多偏尋又詔求程頤後得四世孫源以為籍田令以梁成大字謙之福州人為監察御史罷直學士院真德秀金部員外郎洪咨夔時論濟王事者衆史彌逺患之成大以知縣秩滿待選諂事彌逺家幹者萬昕昕一日言真德秀當逐成大曰某若入臺必能辦此事昕為達其語遂擢御史成大因與莫澤李知孝字孝先光之孫共為彌逺鷹犬凡忤彌逺意者三人必相繼擊之于是給事中王塈等駁德秀所主濟王贈典莫澤等繼劾之遂命提舉玉隆宫咨夔亦言濟王寃成大等復交劾之鐫二秩由是名人賢土排斥殆盡人目成大知孝與莫澤為三凶且謂成大為成犬冬十月蒙古主伐夏取甘肅州西涼府十一月取靈州進次鹽州川以西夏納仇人伊克和實衮舊制亦臘喇翔昆今改及不入質子也以李知孝為右正言知孝附史彌逺而忌真德秀魏了翁之鯁直乃上疏陰詆之略曰士大夫汲汲好名正救之力少而附和沽激之意多扶持之意微而詆訾扇搖之意勝既慮君上之或不能用又恐朝廷之或不能容姑為激怒之辭退俟斥逐之命始則慷慨而激烈終則懇切而求去將以樹竒節而立令名此則臣之所未解也踰月復言近年諸老凋零後學晚出不見前輩不聞義理不講綱常識見鄙陋議論偏詖更唱迭和蠱惑人心此風披扇為害實深各務靖共以杜禍萌遂進拜右正言貶魏了翁官居之靖州罷真德秀祠祿先是大理評事胡夢昱上書言濟王不當廢言甚切直史彌逺諷李知孝劾之除名編管象州時魏了翁出關餞夢昱知孝遂引了翁首倡異論將擊之彌逺猶畏公議外示優禮改權工部侍郎了翁力以疾辭乃出知常德府夢昱尋卒于貶所越二日諫議大夫朱端常劾了翁欺世盜名朋邪謗國德秀奏劄詆誣詔了翁落職奪三秩靖州居住德秀落煥章閣待制罷祠知孝復上書乞追削流竄德秀以正典刑梁成大亦奏了翁已從追竄人猶以為罪大罰輕德秀狂僭悖謬不減了翁相羊同倘佯家食冝削秩貶竄一例施行彌逺勸帝下其章帝曰仲尼不為己甚乃止成大貽書所親曰真德秀乃真小人魏了翁乃偽君子此舉大快公論識者笑之了翁至靖湖湘江浙之士不逺千里負書從學乃著九經要義百卷訂定精密先儒所未有也德秀既歸浦城修讀書記語門人曰此人君為治之門如有用我者執此以往給京軍緡錢以雪寒給在京諸軍緡錢有差出戍之家倍之自是慶祥災異淫雨雪寒咸給之蒙古使人如高麗未至盜殺之自是高麗與蒙古不通丙戌二年金正大三年春正月贈陸九齡等官録張栻吕祖謙陸九淵後詔贈陸九齡直祕閣諡文逹沈煥字叔晦定海人直華文閣諡端憲録張栻吕祖謙陸九淵子孫官各有差沈煥九淵門人人品高明不苟自恕常曰晝觀諸妻子夜卜諸夢寐兩者無愧始可以言學仕終舒州通判三月建昭勳崇德閣趙普曹彬薛居正石熙載潘美李沆王旦李繼隆王曾吕夷簡曹瑋韓琦曾公亮富弼司馬光韓忠彥吕頤浩趙鼎韓世忠張浚陳康伯史浩葛邲後益以趙汝愚凡二十四人皆圗形其上蒙古圍李全于青州全北剽山東挾朝廷以疑蒙古蒙古攻之全大小百戰終不利嬰城自守蒙古築長圍夜布狗寨全糧援路絶與兄福謀福曰二人俱死無益也汝身係南北輕重我當死守孤城汝間道南歸提兵赴援可尋生路全曰數十萬徑敵未易支也全朝出城夕陷不如兄歸于是全留青福還楚秋七月夏主德旺以憂卒弟子晛立蒙古主子夏城邑多降德旺憂悸而卒國人立晛號德旺曰獻宗八月金置益政院説書金主詔設置政院于內庭以禮部尚書楊雲翼字之美贊皇人家樂平等為説書官雲翼天性雅重博學能文明于政事直言敢諌與翰林學士趙秉文字周臣磁州滏陽人同為時所重徐晞稷罷以劉琸為淮東制置使朝廷聞李全為蒙古所圍稍欲圖之以晞稷畏懦謀易帥劉琸雅意建閫使鎮江副都統彭􅗘延譽􅗘亦埀涎代琸從臾尤力故以琸代晞稷􅗘代琸知盱眙冬十一月盱眙忠義夏全作亂逐劉琸以衆降金琸至楚州心知不能制馭盱眙四總管惟以鎮江兵三萬自隨夏全請從琸素畏其狡不許彭􅗘自以資望視琸更淺曰琸止夏全是欲遺患盱眙琸猶憚夏全我何能用乃激夏全曰楚城賊黨不滿三千健將又在山東劉制使圖之收功在旦夕太尉曷不往赴事會夏全欣然帥兵徑入楚城時青亦自淮隂入屯城內琸駭懼時傳李全已死李福欲分兵赴青州琸令夏全盛陳兵楚城李全之黨震恐李全妻楊氏使人行成于夏全謂曰將軍非山東歸附邪狐死兔悲李氏滅夏氏寧獨存願將軍埀盻全諾楊氏盛飾出迎與按行營壘曰人傳三哥死吾一婦人安能自立便當事太尉為夫子女玉帛干戈倉廩皆太尉有望即領此城無多言也夏全心動乃置酒歡甚飲酣就寢如歸於是轉讐為好反與福謀逐琸遂圍楚州治焚官民舍殺守藏吏取貨物時琸精兵尚萬人窘束不能發一令太息而已夜半琸縋城僅以身免鎮江軍與賊戰死者大半將校多死器甲錢粟悉為賊有琸步至揚州借兵自衛夏全既逐琸暮歸李全營楊氏拒之全恐楊氏圖已因大掠趨盱𣅿欲為亂盱眙將張惠范成進閉城門夏全不得入狼狽降金朝廷聞之大怒琸自劾未幾死丁亥三年金正大四年春正月以姚翀為淮東制置使朝廷以姚翀嘗與李全交歡故命之翀朝辭帝謂曰南北皆吾赤子何分彼此卿直為朕撫定之翀至楚城東􅋈舟以治事間入城見李全妻楊氏用徐晞稷故事而禮過之楊氏許翀入城翀乃入寄治僧寺中極意娛之贈朱熹太師信國公熹先諡曰文至是詔曰朕觀朱熹集注大學論語孟子中庸發揮聖賢藴奧有補治道朕勵治講學緬懷典刑可特贈熹太師追封信國公踰月熹子工部侍郎因入對言人主學問之要帝曰先卿中庸序言之甚詳朕讀之不釋手恨不與之同時也紹定中改封徽國公夏五月李全以青州降蒙古全被圍一年食牛馬及人且盡將自食其軍全欲降懼衆異議乃焚香南向再拜欲自經而死其黨鄭衍德田四救之曰譬如為衣有身愁無袖邪今北歸未必非福全乃降于蒙古蒙古遣使責嵗幣于金六月戊申朔日食楚州忠義李福作亂逐姚翀詔以統制楊紹雲兼淮東制置使改楚州為淮安軍劉慶福在山陽自知已為厲階懷不自安欲圖李福以贖罪于朝福知之亦謀殺慶福于是二人互相猜忌不復相見一日福偽稱疾不出旬餘慶福往候之福乃躍起拔刀傷慶福慶福走左右殺之福以慶福首納于姚翀翀大喜時楚州自夏全之亂儲積無餘綱運不續賊黨籍籍謂福所致福畏衆口數見翀促之翀謝以朝廷頒給未下至是福來衆怒與李全妻楊氏謀召翀飲翀至而楊氏不出就坐賔次左右散去福兵欲害翀鄭衍德救之得免去鬚髮縋城夜走歸明州死朝廷以淮亂相仍遣帥必斃始欲輕淮而重江楚州不復建閫就以其帥楊紹雲兼制置改楚州為淮安軍命通判張國明權守視之若羈縻州然金遣使請和于蒙古蒙古主滅夏以夏主晛歸夏自元昊稱帝至晛亡凡十主合二百一年蒙古主盡克夏城邑其民穿鑿土石以避鋒鏑免者百無一二白骨蔽城蒙古主避暑于六盤山注見前踰月夏主睍力屈出降遂縶以歸夏亡時諸將爭掠子女財帛耶律楚材獨取書數部大黃兩駝而已既而軍士病疫惟得大黃可愈楚材用之可活萬人秋七月張林等歸淮安討李福斬之李全之黨以贍軍錢糧不繼屢有怨心全將國安用閻通歎曰我曹米外日受銅錢二百楚州物賤可以樂生而劉慶福為不善怨讐相尋使我曹無所衣食時張林邢德亦在楚自謂嘗受朝廷恩中遭全間二今歸于此豈可不與朝廷立事王義深嘗為全所辱五人相謂曰朝廷不降錢糧為有反者未除耳乃共議殺李福及全妻楊氏以獻遂帥衆趨楊氏家福走出邢德手刃之相屠者數百人有郭統制者殺全次子通及全妾劉氏妄稱楊氏函其首并福首獻于楊紹雲馳送臨安傾朝皆喜詔知盱眙軍彭􅗘及時青經理淮東八月􅗘將張惠等執􅗘以盱眙降金時檄􅗘及總管張惠范成進時青并兵往楚州使便冝盡戮李全餘黨􅗘輕儇不為惠等所服得檄不敢自決請制府及朝廷處之朝議以時青望重檄青區畫青恐禍及密遣人報全于青州遷延不決惠成進以朝檄專委青不及已乃歸盱眙設燕邀􅗘乘其醉縳之渡淮以盱𣅿降于金金人俾惠專制河南以拒蒙古而使總帥完顔額爾克戍之蒙古以李全行省事于山東淮南全自青州復入淮安殺張林全得時青報慟哭力告蒙古大將求南還不許全因斷一指以示之誓還南必叛蒙古大將乃承制授全山東淮南行省得專制山東歲獻金幣全遂與蒙古張宣差及通事數人還楚州服蒙古衣冠文移紀甲子而無年號楊紹雲聞其至遂留楊州不還王義深奔金國安用張林殺邢德以自贖郭統制亦為全所殺既而全誘殺時青併其衆冬十二月金封李全為淮南王全不受時全敗完顔額爾克于龜山故也蒙古兵入關外謂大散關以外諸隘四川制置使鄭損棄三關方輿紀要此三關謂陽平白水仙人也漢中西面之險以三關為最考陽平關在漢中府寧羌州東北古陽安關地六朝以後謂之陽平非二國時白馬城之陽平關也注已詳前白水關在寧羌州西南與四川昭化縣接界仙人關注見前逃歸先是蒙古自鳯翔侵京兆入之關中大震及是蒙古復以兵破關外諸隘至武階注見前鄭損棄沔州宋開禧中置今漢中府略陽縣是而遁于是三關不守時金人盡棄河北山東關陜惟併力守河南保潼關自洛陽三門注見前析津即禹貢析城山在今澤州府陽城縣西南東至邳州之源雀鎮在邳州東北東西二千餘里立四行省帥精兵二十萬以守禦之議者乞謹邉備以防南侵帝命樞臣采其計蒙古主特穆津殂于六盤山少子圖壘監國蒙古主在六盤山病革謂左右曰金精兵在潼關南據連山北限大河難以遽破若假道于宋宋金世讐必能許我則下兵唐鄧直搗大梁金急必徴兵潼關然以數萬之衆千里赴援人馬疲弊雖至弗能戰破之必矣言訖而殂年六十六葬起輦各廟號太祖帝起輦谷在漠外方輿紀要元諸皆葬此不加築為陵第四子圖壘監國史臣曰元太祖深沉有大略用兵如神故能滅國四十遂平西夏其竒勳偉績甚衆惜乎當時史官不備或多失于紀載云蒙古入西河州知州事陳寅寶謨閣待制感之子死之蒙古兵薄西和城寅率民兵晝夜苦戰援兵不至城陷寅謂妻杜氏曰若速自為計杜厲聲曰安有生同君祿死不共王事者即飲藥自殺二子及婦俱死母旁寅斂而焚之乃自伏劒死賓客同死者二十八人事聞贈右文殿修撰諡襄節戊子紹定元年金正大五年春三月金將完顔禪華善名彛字艮佐世以小字行豐州人舊作陳和尚今改大敗蒙古兵于大昌原在慶陽府寧州東南宋史地理志寧州定平有大昌鎮蒙古兵入大昌原金平章政事完顔哈達問誰可為前鋒者忠孝軍提控完顔禪華善出應命許之禪華善即擐甲上馬以四百騎大敗蒙古八千之衆士氣皆倍蓋自有蒙古之難二十年間始有此捷奏功第一名震國中授定逺大將軍世襲穆昆忠孝一軍皆回紇奈曼混渾及中原被俘避罪而歸者鷙狠難制禪華善御之有方坐作進退皆中陳式所過州邑秋毫無犯每戰則先登陷陳諸軍倚以為重已而禪華善復敗蒙古于衛州在正大六年後又敗蒙古蘇布特蒙古烏梁海人按蘇布特舊作速不臺梁海罕舊作兀良合今並改于倒回谷在正大八年倒回谷在西安府藍田縣七盤山舊志唐貞觀中刺史記西華以七盤山路險峻開新道七百里回山取途故有倒回之名夏六月壬寅朔日食冬十一月雷己丑二年金正大六年台蒙古太宗却特烏格元年秋八月蒙古烏格台立是為元太宗烏格台自和博在和林北舊作霍博今改而來會喪于是耶律楚材以太祖遺詔召諸王畢會請立烏格台時圖壘監國諸王意猶豫未決楚材言于監國曰此社稷大計若不早定恐生他變監國乃與諸王奉烏格台即位于和林東奎騰阿喇勒在和林東舊作庫鐵烏阿剌里今改之地時因庶事草創儀制簡率楚材始定册立禮儀俾皇族諸王尊長皆就班列以拜又中原新定未有號令長吏皆得自專生殺稍有忤意刀鋸隨之至有全家被禍者楚材以為言命禁絶之冬十二月蒙古始定算賦中原以戶西域以丁蒙古以牛馬羊蒙古以史天澤等為萬戶分守中原蒙古以史天澤劉哈瑪爾本名嶷字孟方濟南人舊作黑馬今改蕭札拉為萬戶分統漢兵真定河間大名東平濟南五路隸天澤平陽宣德等路𨽻哈瑪爾庚寅三年金正大七年春二月起復趙范趙葵節制鎮江滁州軍馬范葵時丁母憂求解官不許乃卒哭俱復視事蒙古立十路課稅所初蒙古太祖征西域倉庫無斗粟尺帛之儲於是羣臣咸言雖得漢人亦無所用不若盡殺之使草木暢茂以為牧地耶律楚材曰夫以天下之廣四海之富何求而不得但不為耳誠均定中原地稅商稅酒醋鹽鐵山澤之利周嵗可得銀五十萬兩絹八萬匹粟四十餘萬石何為無用哉太祖曰誠如卿言則國用有餘矣卿試為之至是楚村奏立十路課稅所設使副二員悉用士人楚材因間進説周孔之教且謂天下雖得之馬上不可以馬上治蒙古主深然之由是文臣漸進用矣夏五月以李全為彰化保康節度使京東鎮撫使全不受命遂罷知揚州翟朝宗全自還楚即厚募人為兵不限南北全知東南利舟楫謀習水戰米商至悉併舟糴之留其舵工以一教十又遣人泛江湖市桐油黏筏厚募南匠大治舭􅭥船自淮口及海相望時時試舟於射陽湖在淮安府阜寧縣北與鹽城實應分界即古射陂也及海洋復以糧少為辭遣海舟自蘇州洋入平江嘉興告糴實欲習海道以覘畿甸然以山東經理未定而嵗貢蒙古者不可缺故外恭順朝廷以就錢糧因以貿貨輸蒙古朝廷亦以全往來山東得以少寬北顧之憂遣餉不絶全因縱遊説于朝復請建閫山陽又遣使入金且欲銷朝廷兵備乃遣軍士穆椿潛入京師皇城縱火焚前軍器庫于是先朝兵甲盡喪全欲先據楊州以渡江分兵徇通泰以趨海共下皆曰通泰鹽場在焉莫若先取為家計且使朝廷失鹽利全欲朝廷不為備且雖反不敢絶其給乃挾蒙古李宣差來宣差以恫疑虛喝而蒙古實未常資全兵其李宣差則青州資藥入也朝廷雖知其姦姑事苟安不之詰及全糴麥舟過鹽城漢鹽瀆縣晉改鹽城今縣屬淮安府知揚州翟朝宗嗾尉兵奪之全怒以捕盜為名水陸數萬徑搗鹽城戍將陳益樓強知縣陳遇皆遁全入城據之朝宗倉皇遣幹官王節懇全退師全不許留鄭祥董友守鹽城而自提兵還楚州以狀白于朝曰遣兵捕盜過鹽城縣令自棄城遁去慮軍民驚擾不免入城安衆朝廷乃授全莭鉞令釋兵命制置司幹官往諭之全曰朝廷待我如小兒啼則與果不受制命朝廷為罷朝宗命通判趙璥夫攝州事趙范趙葵深以全必反為慮纍疏力言之史彌逺不納秋八月蒙古史天澤攻武仙于汲仙敗走胡嶺關在懷慶府濟源縣西亦名虎嶺關先是天澤擊仙仙自西山敗走汲縣金史作仙走汴京與此異金復封仙為恆山公置府衛州至是天澤合諸軍圍之金將完顔哈逹率衆來援蒙古諸軍皆北天澤獨以千人繞出其後諸軍合攻之仙逸去屯胡嶺關天澤遂取衛州冬十月以趙善湘為江淮制置使李全造舟益急招沿海亡命為水手又紿趙璥夫以蒙古為辭邀增五千人錢糧求誓書鐵劵朝廷猶遣餉不絶全得米即自轉輸淮海入鹽城以贍其衆他軍士見者曰朝廷惟恐賊不飽我曹何力殺賊射陽湖人至有養北賊戕淮民之語聞者太息時史彌逺多在告諸執政又不以為意獨鄭清之深憂之力勸帝討全帝乃以趙善湘制置江淮許便宜從事然猶有內圖進討外用調停之説惟趙范趙葵兄弟力請進兵討之蒙古主帥衆入陕西金以完顔哈逹伊喇布哈行省事于閺卿以備潼關初蒙古使翁鄂羅舊作幹骨欒今改至陕西議和金行省伊喇布哈赫舍里約赫德等懼其泄事機留之已而蒙古圍慶陽布哈擊敗之圍遂解布哈志意驕滿乃遣翁鄂羅還謂之曰我已準備軍馬能戰則來翁鄂羅還見蒙古主白之蒙古主怒即與其弟圖壘帥衆入陜西翶翔京兆同華之間破諸山寨柵六十餘所遂趨鳯翔金以平章政事完顔哈逹及伊喇布哈行省閺卿以備之十二月李全寇揚州趙范趙葵會師擊敗之全突至揚州灣頭即茱萸灣一曰東塘注見前揚州副都統丁勝拒之全乃攻城南門趙璥夫得史逺彌逺書許增萬五千名糧勸全歸楚州即遣劉易就全壘示之全笑曰丞相勸我歸丁都統與我戰非相紿邪擲書不受璥夫恐亟發牌印迓趙范于鎮江范亦克日約葵葵帥雄勝寧淮武定強勇四軍萬四千赴之時全引兵攻泰州知州宋濟迎降全入坐郡治盡收其子女貨幣將趨揚州聞范葵已入揚城全鞕鄭衍德曰我計先取揚州渡江爾曹勸我取通泰今二趙已入揚州矣江其可渡邪既而曰今惟有徑搗揚州耳遂分兵守泰而悉衆攻揚州至灣頭立寨據運河之衝使胡義將先鋒駐平山堂以伺三城舊志周顯德中克揚州韓令坤以故城大難守于城東南隅築小城以治已而李重進改築于故城之南謂之西城宋紹興中郭棣知揚州以重進所築處勢卑泄復就故城遺址建築大城所謂三城機便全攻東門葵親搏戰全將張友呼城門請葵出葵出與全隔濠立馬相勞苦問全來為何全曰朝廷動見猜疑今復絶我糧餉我非背叛索錢糧耳葵曰朝廷待汝以忠臣孝子而乃反戈攻陷城邑朝廷安得不絶汝錢糧汝云非叛欺人乎欺天乎全無以對彎弓抽矢向葵而去自是屢戰全兵多敗宗雄武獻䇿曰城中素無薪且儲蓄為總領所支借殆盡若築長圍三城自困全乃悉衆及驅鄉農凡數十萬列寨圍三城制司總所糧援俱絶范葵命三城諸門各出兵劫寨舉火為期夜半縱兵衝擊殱賊甚衆自是全一意長圍以持久困官軍不復薄城全張蓋奏樂于平山堂布置築圍范令諸門以輕兵牽制親帥將士出堡寨西攻之全分兵諸門鏖戰自辰至未殺傷相當明日范出師大戰獲全糧數十艘葵亦戰敗之詔史彌逺十日一赴都堂治事立皇后謝氏天台人故相深甫之孫后父渠伯早世産業破壞后躬親汲飪帝即位議擇中官楊太后以謝深甫有援已功楊后立于寧宗嘉泰二年時深甫為丞相然宋史楊后及深甫傳俱不言援立之事惟謝后傳載之今依續綱目從謝后傳輯命選謝氏女謝氏獨后在室后生而黧黑翳一目兄弟欲納入宫諸父櫸伯不可曰即奉詔納女當厚奉資裝異時不過一老官婢事奚益會元夕縣有鵲來巢燈山衆以為后妃之象櫸伯不能止乃共送后就道后旋病疹良已膚蛻瑩白如玉醫又藥去翳遂與賈涉女同入宫賈女有殊色帝欲立之太后曰謝女端重有福宜正中宫左右亦相竊語曰不立真皇后乃立假皇后邪帝不能奪賈妃專寵後宫后處之裕如不以介懷太后益賢之帝禮遇日加辛卯四年金正大八年春正月趙范趙葵大敗李全于揚州城下全走死新塘在揚州府城北上接雷塘下連運河全浚圍城塹范葵遣諸將出揚州東門掩擊全走土城官軍躡之蹂溺甚衆范陳于西門賊閉壘不出葵曰賊俟我收兵而出爾乃伏騎破垣間收步卒誘之賊兵數千果趨濠側李虎力戰城上矢石如雨注賊退有頃賊别隊自東北馳至范葵揮步騎夾浮橋弔橋並出為三迭陳以待之自己至未與賊大戰别遣虎等以馬步五百出賊背而葵率輕兵橫衝之三道夾擊賊敗走始全反謀已成然多顧忌且懼其黨不順而邊陲喜事者欲抉全為重遂贊成之故全決計反及趙善湘趙范趙葵用事聲罪致討罷支錢糧攻城不得欲戰不利始大悔已而置酒髙會于平山堂有堡塞候卒識全槍垂雙拂為號以告范范喜謂葵曰此賊勇而輕若出必成擒矣乃悉精鋭數千而西取官軍素為賊所易者張其旗幟以誘之全望見突鬬而前范麾兵並進葵親摶戰諸軍爭奮賊始疑非前日軍欲走入土城李虎軍已塞其甕門全窘從數十騎北走葵率諸將以制勇寧淮二軍蹙之全趨新塘淖深數尺會久晴浮戰塵如燥壤全騎過之皆陷淖中不能自拔制勇軍追及奮長槍三十餘亂刺之全呼曰無殺我我乃頭目羣卒捽其尸而分其鞍馬器甲並殺三十餘人皆將校也全死餘黨欲潰國安用不從議推一人為首莫肯相下欲還淮安奉全妻楊氏范葵追擊大破之乃散去范還揚州捷聞加趙善湘江淮制置大使范淮東安撫使葵淮東提刑善湘季子汝梅史彌逺壻也奏請無阻而善湘亦以范葵進止有方慰藉殷勤故能成功蒙古圍金鳯翔夏四月克之蒙古圍金鳯翔府金行省哈逹布哈逗留不進金主遣樞密判官白華字文舉粵州人往諭之哈達布哈言北兵勢盛不可輕進白華還金主復遣諭以鳯翔圍久恐守者不能支可領軍出關略與渭北軍交手計北軍聞之必當奔赴少紓鳯翔之急哈達布哈乃始出關行至華陰界與渭北軍交戰比晚收軍入關不復顧鳯翔矣蒙古遂取鳯翔哈逹布哈遷京兆民于河南使完彥慶善努戍之五月趙范趙葵等收復淮安趙范趙葵復帥步騎十萬攻鹽城屢敗賊衆遂薄淮安城殺賊萬計焚二千餘家城中哭聲震天五月淮安五城此賊所築以屯兵者俱破斬首數千燒寨柵萬餘家淮北賊歸赴援舟師又勦擊焚其水柵夷五城餘址賊始懼王旻趙必勝全子才等移寨西門與賊大戰又敗之全妻楊氏謂鄭衍德曰二十年梨花槍天下無敵手今事勢已去撑拄不行汝等未降者以我在故耳遂絶淮而去其黨即遣馮垍等納欵軍門趙范許之淮安遂平國安用降蒙古以為山東都元帥安用從李全妻楊氏走山東降于蒙古蒙古以為都元帥行省山東蒙古侵金使蘇巴爾罕舊作逺不罕今改來假道秋七月至沔州統制張宣殺之初金降人李昌國言于家古圖壘曰金遷汴將二十年其所恃以安者潼關黃河耳若出寶雞以侵漢中不一月可達唐鄧大事集矣圖壘然之至是白于蒙古主蒙古主乃會諸將期以明年正月合南北軍攻汴遣圖壘先趨寶雞蘇巴爾罕來假道淮東以趨河南且請以兵會之至沔州青野原注見前統制張宣殺之圖壘聞蘇巴爾罕死曰宋自食言背盟棄好今日之事曲直有歸矣八月蒙古圖壘入武休破興元遂侵仙人關注俱見前蒙古圖壘分騎兵三萬入大散關攻破鳯州徑趨華陽今漢中府洋縣北有華陽山元魏置華縣以此名後廢屠洋州攻武休開生山截焦崖棧道名輿程記連雲棧有焦崖鋪出武休東南遂圍興元軍民敗走死于沙􅌪者數十萬分軍而西西軍由别路入沔州取大安軍路開魚鱉山在寧羌州東南撤屋為筏渡嘉陵江入關堡並江趨葭萌略地至西水縣後周縣元省故城在今四川保寧府䦘中縣破城寨百四十而還東軍屯于興元洋州之間以趨饒風關注亦見前蒙古主以耶律楚材為中書令楚才奏諸路州縣長吏專理民事萬户府專總軍政課稅所專掌錢穀各不用相統攝著為令蒙古主至雲中諸路所貢課額銀幣及倉廩物料文簿具陳于前悉符楚材元奏之數笑曰卿何使錢幣流入如此即日授以中書省印俾領其事事無巨細一以委之九月太廟火丙戌夜臨安火延及太廟三省六部御史臺祕書省玉牒所惟丞相史彌逺府獨存蓋殿帥馮榯率衛卒力救之也帝素服減膳徹樂宰執降官封一品太常少卿度正國史院編修官李心傳上疏言宗廟之制未合于古兹緣災異宜舉行之詔兩省侍從臺諫集議之遂求直言籍田令徐清叟上疏乞為濟王置後以和異氣帝不省度正字周卿合州人李心傳字微之舜臣之子徐清叟字真翁應龍之子蒙古攻金河中取之蒙古主圍河中急金完顔慶善努棄京兆東還簽樞草火額爾克元帥板子額爾克俱內族一得賊好以草火燒之一嘗誤呼宫中牙牌為板子時人以其兩人同時同名故加比號以别之懼軍力不足截故城之半以守蒙古築松樓髙二百尺下瞰城中土山地穴百道並進晝夜力戰樓櫓俱盡白戰又半月力竭城破草火額爾克猶親搏戰數十合始被擒就死板子額爾克以敗卒三千奪船走閺鄉初板子額爾克在鳯翔為監戰奉御陸爾舊作六兒今改所制有隙及改河中總帥同赴召陸爾遂譖其奉旨防秋畏怯違避金主信之至是怒其不能死節因杖殺之冬十月蜀口諸郡陷于蒙古四川制置使桂如淵逃歸詔以李􅌫為四川制置使知成都府趙顔呐字敏若彭州人副之知興元府初彥呐治西和五年安丙待之甚厚崔與之以彥呐大言無實必誤國事不可付以邊閫朝廷不從蒙古伐髙麗以其殺使者珠古十一月蒙古圖壘入饒風關十二月渡漢江金完顔哈逹伊喇布哈自順陽漢侯邑晉置郡宋為縣元省故城在今南陽府淅川縣還鄧州蒙古追之獲其輜重圖壘攻饒風關入之由金州而東將趨汴京民皆入保城壁險阻以避之金主召宰執臺諫入議皆曰北軍冒萬里之險厯二年之久方入武休其勞苦已極為吾計者以兵屯雎鄭昌武今河南許州金為昌武軍節度使歸德金改宋應天府為歸德府今府屬河南及京畿諸縣以大將守洛陽潼關懷孟等處嚴兵備之京師積糧數百萬斛令河南州郡堅壁清野彼欲攻不能欲戰不得師老食盡不擊自歸矣金主太息曰南渡二十年所在之民破田宅鬻妻子以養軍士今敵至不能迎戰徒以自保京城雖存何以為國天下其謂我何朕思之熟矣存亡有天命惟不負吾民可也乃召諸將屯襄鄧十二月哈達布哈帥諸軍入鄧州楊古延一名沃哩賜姓烏林噶朔州靜邊官莊人按楊古延舊作楊沃衍沃哩舊作斡烈烏林噶舊作兀林答今並改後倣此禪華善武仙兵皆會之遂出屯順陽圖壘將兵屯漢江哈達布哈召諸將議由光化截江與戰及放之渡江而後戰孰是張惠阿達茂舊作按得木今改皆曰截江便縱之渡則我腹空虛必為所潰布哈曰使彼在沙磧且當往求之况自來乎未幾蒙古兵畢渡哈達布哈始進至禹山在南陽府鄧州西南分據地勢列步卒于前山騎士於山後蒙古兵觀之竟不前陳散如雁趐轉山麓出金騎兵之後分三隊而來哈達曰今日之勢未可戰也俄蒙古兵少突前金兵不得不戰短兵接三合蒙古兵少郤其在西者望布哈親軍環繞甲騎後而突之金富察鼎珠舊作定住今改力戰始退哈達曰彼衆號三萬輜重居其一今相持二三日彼不得食乘其却而擁之必勝布哈曰江路已絶黃河不氷彼入重地將安歸乎何以速為遂不逐明日蒙古兵忽不見邏騎還始知在光化對岸棗林中晝作食夜不下馬已四日林外不聞音響哈達布哈議入鄧州就糧辰巳間到林後蒙古忽至哈達布哈迎戰交接之際蒙古以百騎邀兩省輜重而去金兵幾不成列逮夜二鼓哈達布哈乃入鄧州城懼軍士迷路鳴鐘招之哈達布哈隱其敗以大捷聞百官表賀諸相置酒省中左丞李蹊且喜且泣曰非今日之捷生靈之禍可勝言哉蓋以為實然也于是民保城壁者皆散還鄉社不數日蒙古遊騎突至多被俘獲新作太廟壬辰五年金天興元年春正月以孟珙字璞玉宗政字為京西兵馬軡轄屯棗陽初珙父宗政知棗陽招唐鄧蔡州壯士三萬餘人號忠順軍命江海統之衆不服制置司以珙代海珙分其軍為三衆皆帖然珙又創平堰于棗陽自城至軍西十八里由八壘河經漸水即濜水今亦曰沙河在棗陽縣西南入白水側水跨九阜建通天槽八十有三丈溉田十萬傾立十莊三轄使軍民分屯邊儲豐足珙又命忠順軍家自畜馬官給芻粟馬益蕃息至是以母憂起復駐劄棗陽以史嵩之字子由鄞人為京湖制置使知襄陽府蒙古主自白坡即白波鎮在懷慶府孟縣西南宋初河清縣嘗治此後徙渡河次鄭州使其將蘇布特圍金汴京蒙古主用西夏人實克舊作恤可今改計自河中由河清縣唐置金徙治孟津渡因改曰孟津此稱清河蓋指舊名也今屬河南府白坡渡河遣人馳報圖壘以師來會蒙古主遂入鄭州遣蘇布特攻汴城金主召羣臣議所守有言珠格髙琪所築裏城決不可守外城決不可棄于是決計守外城命修樓櫓器具時京城諸軍不滿四萬而城周百二十里不能遍守故議以遷避之民充軍又召在京軍官假借而用得百餘人又集京東西沿河舊屯兩都尉及衛州義軍四萬并丁壯二萬分置四面每面選千名飛虎軍以專救應然亦不能軍矣金主命翰林學士趙秉文為赦文改元布宣悔悟哀痛之意指事陳義辭情俱盡聞者莫不感勵洛陽人至于慟哭金完顔哈達伊喇布哈引兵援汴及蒙古圖壘戰于三峯山名在開封府禹州西南大敗忠孝軍總領完顔禪華善死之蒙古兵自禹山之戰散漫而北所過州縣無不降破遂自唐州以趨汴京金二行省自鄧州赴援步騎十五萬蒙古以騎三千尾之哈達等謀曰敵兵止三千而我不戰是弱也金軍至鈞州金開封府禹州金曰鈞州沙河即須水在禹州東北蒙古兵不戰而退金軍方盤營蒙古兵復來襲金軍不得休息食飲且行且戰至黃榆店望鈞州二十五里雨雪不能進忽得旨云兩省軍悉赴京師哈達等遂發蒙古兵自北渡者畢集前後以大樹塞道金將楊古延奪路得之金軍遂進次于三峯山軍士有不食至三日者蒙古兵與河北兵合四面圍之熾薪燔肉更迭休息乘金困憊乃開鈞州路縱之走而以生兵夾擊之金軍遂潰聲如崩山武仙率三十騎入竹林中遂走密縣揚古延樊澤張惠步持大搶奮戰而死考金史楊古延傳三峯山之敗古延走鈞州部曲勸之降古延劍斫之望汴京再拜自縊死與此所載不同哈逹知大事已去欲下馬戰而布哈已失所在哈達乃與襌華善等以數百騎走入鈞州蒙古主時在鄭州聞圖壘與金相持遣昆布哈宗王伯勒格特季子按昆布哈舊作口溫不花伯勒格持依舊作别里古台今並改齊拉衮等赴之至則金軍已潰于是乃合攻鈞州塹其城外哈達匿窟室中城破蒙古兵發而殺之因揚言曰汝家所恃惟黃河與哈逹耳今哈達為我殺黃河為我有不降何待禪華善趨避隱處殺掠稍定乃出自言曰我金國大將欲見白事蒙古兵士以數騎夾之詣圖壘問其姓名曰我忠孝軍總領禪華善也大昌原衛州倒回谷之勝皆我也我死亂軍中人將謂我負國家今日明白死天下必有知我者蒙古兵欲其降不肯乃斫足脛折之劃口吻至耳噀血而呼至死不屈蒙古將有義之者以馬潼酹而祝曰好男子他日再生當令我得之布哈走蒙古兵追躡擒之械至官山在禹州東北圖壘欲降之往復數百言終不從唯曰我金國大臣惟當金國境內死耳遂殺之金之健將鋭卒自是俱盡不復可為矣二月金陜西諸將棄潼關東還蒙古追及之于鐵嶺在陕州盧氏縣北皆殺之初金聞蒙古入饒風關遣圖克坦烏登舊作兀典今改行省閺鄉以備潼關圖克坦百家為關陕總帥便宜行事會阿里哈舊作阿里合今改傳旨召烏登援汴烏登遂與潼關總帥納哈塔舍音舊作納合合閏今改及秦藍總帥完顔重喜等帥軍十一萬騎五千盡撤秦藍諸關之備從虢入陕金守將李平以潼關降于蒙古蒙古兵遂長驅至陕烏登發閺鄉軍士各以老幼自隨由西南徑入大山氷雪中部將多叛去蒙古聞之自盧氏以數百騎追及之山路積雪晝日凍釋泥淖及脛隨軍婦女棄擲老幼哀號盈路行至鐵嶺欲戰而飢憊于是重喜先降蒙古斬之于馬前金兵遂大潰烏登舍音從數十騎走山谷間追騎擒之皆被殺蒙古取金睢州遂圍歸德府不克蒙古圍金歸德金行省實嘉紐勒勸本名十六舊作石盞女魯歡今改後仿此命經歷冀禹錫守禦禹錫竭其材智故得不破金復以完彥薩布為左丞相先是完顔薩布謂都事商衡字平叔曹州人曰古來宰相必用文人以共知為相之道薩布何所知使居此位吾特恐他日史官書某時以某為相而亡國遂請致仕至是蒙古攻汴日急財匱援絶金主大懼平章政事拜甡內族名承裔系出世祖諸孫按拜甡按作白撤今改後倣此以為勢必講和和議定則首相當往為質乃力請金主起復薩布為相且括汴京民軍二十萬分𨽻諸帥三月蒙古圍洛陽金警巡使齊克紳河中射糧軍子弟力戰却之蒙古立炮攻洛洛城中唯三峯潰卒三四千及忠孝軍百餘守禦而已留守薩哈連內族字安之按薩哈連舊作撒合輦今改疽發于背不能軍遂投濠水死已而元帥任守貞復立府事及守貞援汴河南人推齊克紳為府僉事紳貌極寢陋而膂力過人領所有軍二千五百人甫三日蒙古圍其三面紳括衣帛為幟立之城上率士卒赤身而戰以壯士數百往求救應大呼以憨子軍為號其聲勢與萬衆無異兵器已盡以錢為鏃得蒙古兵一箭截而為四以筒鞭發之又創遏炮用不過數人能發大石于百步外所擊無不中紳奔走四應所至必捷蒙古益兵力攻凡三月餘不能拔乃退金遣曹王額爾克為質于蒙古請和夏四月蒙古退軍河洛蒙古主將北還遣使自鄭州至汴諭金主降金主乃封荆王守純宣宗子子額爾克為曹王命尚書左丞李蹊送之蒙古為質請和諫議大夫費摩阿固岱舊作阿虎帶今改為講和使未行蒙古蘇布特聞之曰我受命攻城不知其他也乃立攻具沿濠列木柵驅漢俘及婦女老幼負新草填濠頃刻平十餘步平章拜甡以議和不敢與戰城中喧閧金主聞之從六七騎出端門時新雨淖車駕忽出都人驚愕失措俱跪于道傍老幼遮擁至有誤觸金主衣者少頃宰相從官皆至進笠不受曰軍中暴露我何用此西南軍士五六十輩進曰北兵填濠過半平章傳令勿放一鏃恐壞和事豈有此計邪金主曰朕以生靈之故稱臣進奉無不順從止有一子養未長成令往作質于軍矣汝等略忍待曹王出韃靼不退汝等死戰未晚是日曹王行蒙古兵併力進攻金造炮石取艮嶽太湖靈壁假山為之大小各有斤重其圓如燈毬之狀蒙古用炮則破大磑或碌碡為二三皆用之攢竹炮有至十三稍者餘炮稱是每城一角置炮百餘杖更迭上下晝夜不息數日石幾與裏城平父老所傳周世宗築京城取虎牢土為之堅密如鐡受炮所擊唯凹而已金募死士千人穴城由壕徑渡燒其炮生城上懸紅紙燈為應約燈起渡壕又為蒙古所覺又放紙鳶置文書其上至蒙古營則斷之以誘被俘者矣識者謂宰相欲以紙鳶紙燈退敵難蒙古攻城十六晝夜內外死者以百萬計蘇布特知不可取乃為好語曰兩國已講和更相攻邪金人因就應之乃遣户部侍郎楊居仁字行之大興人出宜秋門以酒炙犒蒙古兵且以金帛珍異賂之蘇布特乃許退兵散屯河洛之間參政特嘉喀齊喀舊作赤盞合喜今改以守城為已功欲率百人入賀參政內族色埓南陽郡王襄之子曰城下之盟春秋以為恥况以罷攻為可賀耶喀齊喀怒曰社稷不亡君后免難汝等不以為喜耶乃命趙秉文為表先是蒙古攻城時金主母明惠皇后陵被發秉文曰春秋新宫災三日哭今園陵如此酌之以禮當慰不當賀事乃已金主御端門肆赦改元天興詔內外官民能完復州郡者功賞有差上書不得稱聖改聖旨為制旨釋衛紹王族禁錮汴京解嚴步兵始出封邱門外采蔬薪金命其平章政事完顔拜甡致仕拜甡恇怯無能性復貪鄙軍士怨憤其不戰拜甡不自安謂尚書令史元好問字裕之太原秀容人曰我妨賢路久矣得退為幸為我撰乞致仕表頃之金主已遣使持詔至其第令致仕軍士猶欲殺之拜甡懼一夕數遷金主以親軍二百陰為之衛軍士無以泄其憤遂相率毁其别墅而後已五月金汴京大疫凡五十日諸門出柩九十餘萬貧不能葬者不在是數尋以疫後園户僧道醫師鬻棺者擅厚利命有司倍征之以助國用秋七月金殺蒙古使者三十餘人金飛虎卒申福等殺蒙古行人唐慶等三十餘人于館金主不問和議遂絶蒙古國安用降金金封為兖王行東京尚書省事賜姓名完顔永安舊作用安今改後仿此先是金徐州軍亂國安用入據之掃兵總領王祐張興都統豐新等夜燒草場作亂逐行省圖克坦伊都安用率兵入徐斬祐等以豐新為帥主徐州事按圖克坦伊都舊作徒單益都豐新舊作豐仙今並改至是金宿州東面總帥劉安國邳州杜政皆以州歸之安用逐據三州蒙古帥額蘇倫蒙古氏舊作阿木魯今改怒曰此三州我當取安用何人輒受其降遣將張進率兵入徐欲圖安用安用懼乃與徐州總帥王德全劫殺張進及海州元帥田福等數百人乃還邳州會山東諸州及徐邳宿三州主帥刑白馬結盟誓歸金既盟諸將皆散去安用無所歸遂同德全安國因宿州從宜重僧弩舊作衆僧奴今改後仿此自通于金重僧弩以聞金主遣近侍直長因世英等持手詔至邳封拜安用賜姓改名且以空頭河朔山東赦文使得便宜從事先是重僧弩遣使未報安國即服金衣冠及聞使至復猶豫不決遣迎使者監于州廨問所以來使者對以封建事安用意頗順明日出見使者跪揖如等夷坐定使人取金所賜物遍觀之喜見顔色乃設宴拜受如儀令主事常謹隨世英奉表入謝從金所賜姓名為完顔永安金主遣世英賜以鐵劵虎符龍文衣玉魚帶及郡王宣世襲千户宣各十聽同盟可賜者賜之世英過徐德全安國説之曰朝廷恩命豈宜出自永安郡王宣吾二人最當得者乞就留之世英乃留郡王宣世襲千户由是與永安有隙已而永安徴兵徐宿欲圖山東德全安國不應永安駐師徐州城下遣人殺安國因攻徐州三月不能下退還漣水以軍食不給來乞糧朝廷許之永安即日改從宋衣冠而陰降于金糧乏軍多流亡金恆山公武仙等會兵救汴八月遇蒙古于京水即今開封府賈魯河源出榮陽縣髙渚山自鄭州以上謂之京水鄭州以下謂之賈魯河以元賈魯濬此故名皆潰初三峯之敗仙走南陽收潰軍十萬人屯留山在汝州郟縣西北隋書地理志郟縣城有大留山即此今亦謂之大劉山汴京被圍金主召仙與鄧州行省完顔色埓鞏昌總帥完顔呼沙呼即完顔仲德海蘭路人按呼沙呼舊作匆斜虎今改後倣此合兵入援仙至密縣東遇蒙古兵即按軍眉山店在密縣東北眉當作梅以地近梅山故名報色埒曰阻澗結營待仙至俱進色埒急欲至汴不聽金主又命樞密使持嘉喀齊喀帥兵應仙色埓等至京水蒙古乘之不戰而潰仙亦敗走還留山喀齊喀屯中牟三日聞色埓軍潰即夜棄輜重馳還喀齊喀被劾廢居汴常鞅鞅不樂後為崔立所殺閏九月彗出于角帝避殿減善撒樂詔中外臣僚指陳缺失無所隱諱諸路監司察守令之貪亷仁暴及民間利便疾苦以聞髙麗盡殺蒙古所署官蒙古伐之髙麗盡殺蒙古所署官逹嚕喀齊帥衆入海島蒙古薩喇達舊作撒里塔今改伐之卒于軍金括粟民間金主以和議既絶懼兵再至乃復僉民兵為守禦備遂括汴京粟以完顔珠赫字仲平後死崔立之難按珠赫舊作珠皓今改後倣此等主之置局以推舉為名珠赫諭民曰汝當從實推唱果如一旦糧食盡令汝妻子作軍食復能吝否既而罷括粟復以進奉取之且賣官及令民買進士第前御史大夫內族哈昭一名永錫按哈昭舊作合周今改後倣此復覬進用建言京城括粟尚可得百萬石金主乃命哈昭為參知政事與左丞李蹊復括之哈昭先令各家自實壯者存石三斗幼者半之仍書其數門首敢有匿者以升斗論罪京城三十六坊各選深刻者主之完顔玖珠尤酷暴有寡婦二口實豆六斗內有蓬子約三升玖珠笑曰吾得之為矣執寡婦以令衆婦泣訴曰妾夫死于兵姑老不能飬故雜蓬粃以自食耳非敢以為軍儲也且三升六斗之餘也玖珠不聽竟杖死聞者股栗盡棄其餘于糞溷中或白于李蹊蹊顰蹙曰白之參政及白哈昭哈昭曰人云花又不損蜜又得成余謂花不損何由成蜜且京城危急今欲存社稷耶存百姓耶衆莫敢言所括不能三萬斛而滿城蕭然死者相枕貧富束手待斃而已遂至人相食金主聞之命出倉米作粥以食餓者翰林直學士錫默愛實嘆曰與其食之寧如勿奪為奉御博諾所告金主怒送愛實有司賴近侍李大莭救免錫默愛實字正之䇿論進士按完顔玖珠舊作完顔久住錫默愛實舊作斜卵愛實博諾舊作把奴今並改冬十月金盱眙守將以城來歸詔改為昭信軍蒙古圖壘卒夜追諡睿宗圖壘生六子長莽賫扣即憲宗舊作蒙哥次默爾根舊作木兒哥三胡土克圖舊作匆覩都四呼必賚即世宗舊作匆必烈五實喇舊作旭烈六額哷布格舊作阿里不哥今並改後倣此金以江世顯字仲明鞏昌鹽川人為鞏昌便宜總帥初世顯以戰功為征行從宜分治陕西西路時調度窘迫世顯發家資率豪右助邊鄰郡效之軍餉遂足金主以呼沙呼為鞏昌總帥世顯同知府事二人盡忠固守以抗蒙古及呼沙呼勤王東下而潰乃以世顯代之世顯勵志自奮糧械精贍十二月皇太后楊氏崩諡恭聖仁烈詔外朝以日易月宫中行三年喪蒙古遣使來議伐金許之蒙古再遣王楫字巨川鳯翔虢縣人來京湖議夾攻金史嵩之以聞朝臣皆以為可遂復讐之舉獨趙范不喜曰宣和海上之盟厥初甚堅迄以取禍不可不鑒帝不從命嵩之報使許之嵩乃遣鄒伸之往報蒙古許俟成功以河南地來歸金主守緒出奔河北蒙古蘇布特復圍汴汴京糧盡援絶勢益危急召諸臣入議或言歸德四面皆水可以自保或言宜沿西山入鄧或言設欲入鄧蒙古蘇布特在汝州不如取陳蔡路轉往鄧下金主未決乃起院判白華為右司郎中問之華言歸德城雖堅久而食盡坐以待斃決不可往既汝州有蘇布特則鄧下亦不可往計今事勢當直赴汝州與之一決然汝州戰不如半途戰半途戰不如出城戰蓋我軍食力猶在若便得戰存亡決此一舉外則可以激三軍之氣內則可以慰都人之心或止為避遷之計人心顧戀家業未必毅然從行可詳審之金主不從翌日集軍士于大慶殿諭以京城食盡今擬親出遂以右丞相薩布平章拜甡等帥諸軍扈從參知政納紳即完顔納紳字正甫蘇哷之弟按納紳舊作奴申今改後仿此樞副兼知開封薩尼雅布舊作習揑阿不今改後仿此等留守金主乃發汴京與太后皇后妃公主别大慟至開陽門詔諭留守兵士曰社稷宗廟在此汝等壯士毋以不預進發之數便謂無功若保無虞將來功賞豈在戰士下聞者皆灑泣是日鞏昌元帥呼沙呼援兵至言于金主曰京西三百里之間無井竈不可往金主遂決意東行進次黃陵岡諸將請幸河朔金主從之蒙古蘇布特聞金主東走復進圍汴京御批歷代通鑑輯覽卷九十一

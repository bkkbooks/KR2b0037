front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷九十宋寧宗皇帝丙寅開禧二年金泰和六年元太祖却特特穆津元年按元自太祖至憲宗皆未建年號難以分注今依南北朝例但紀其即位首年至世祖中統元年以後始每年備書却特舊作竒渥溫特穆津舊作鐡木真今並改按元史又以竒渥溫為元室之姓亦非也元之國姓乃博爾錦氏却特其貴種耳此俱以䝉古源流訂正春正月夏李安全夏主乾順之孫與純佑從兄弟弒其主純佑而自立二月夀慈宫火

front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷三十晉起武帝秦始元年乙酉至恭帝元熙二年庚申凡十二世十五帝共一百五十六年世祖武皇帝
  hash: sha256:8e74bcf1b03f3fcc62f0b73a1c03fe5da75c4e3b9b827b9240a2db88f9818675

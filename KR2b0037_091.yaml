front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷九十二宋理宗皇帝癸己紹定六年金天興二年春正月金主守緒濟河使完顔博索攻衛州與蒙古兵戰大敗金主走歸德博索伏誅
  hash: sha256:49593f75fb765f16bec3ea542b75468a80fb271f819909b28e1968c540234a7b

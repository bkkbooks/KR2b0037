front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷七十九宋哲宗皇帝壬申元祐七年春三月以程頤直祕閣判西京國子監既而罷之
  hash: sha256:4049679e255b265c668e5141668bde978631c50603e5de138c7f9f3eb9f900ab
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_078-1a, image: WYG0338/WYG0338-0253a.png}
body:
  text: 頤服闋三省擬除館職判檢院宋史職官志登聞檢院𨽻諌議大失掌文武官及士民章奏表疏蘇轍進曰頤入朝恐不肯靜太后納之遂差管勾崇福宫頤亦懇辭訖不就職范祖禹言頤經術行義天下共知司馬光吕公著豈欺罔者耶但草茅之人未習朝廷事體則有之寧有他故如言者所指哉乞召勸講必有補聖明不聽夏四月始備六禮立皇后孟氏洺州人馬軍都虞候元之孫帝年益壯太皇太后歷選世家女百餘入宫后年十六太皇太后及太后皆愛之教以女儀至是太皇太后諭執政曰孟氏女能執婦禮宜正位中宫命學士草制又以近世禮儀簡略詔翰林臺諫給舍與禮官議册后六禮以進遂命吕大防兼六禮使韓忠彥充奉迎使蘇頌王巖叟充發册使蘇轍趙宗景鎮恭懿王元偓孫充告期使髙密郡王宗晟濮安懿王之子范百祿字子功鎮兄子充納成使王存劉奉世字仲馮敞之子充納吉使梁燾鄭雍充納采問名使帝御文德殿册為皇后太皇太后語帝曰得賢內助非細事也既而歎曰斯人賢淑惜福薄耳異曰國有事變必此人當之五月王巖叟罷言者論巖叟救劉摯為朋黨出知鄭州遼女真部節度使合理博卒金追贈世祖合理博疾篤呼弟盈格字烏魯完按盈格舊作盈哥今改後仿此謂曰烏雅舒合理博長子按烏雅舒舊作烏雅束今改後仿此柔善若辦集契丹事阿古逹合理博次子按阿古逹舊作阿骨打今改後仿此能之遂卒阿古違始此母弟蒲拉舒舊作頗剌淑今改後仿此襲為節度使合理博嚴重多智每戰未嘗被甲襲位之初內外潰叛合理博乃因敗為功變弱為疆遂破和諾克舊作桓赧今改薩克逹舊作散逹今改後仿此烏春烏木干皆女真部人與合理博相攻者按烏木干舊作窩謀罕今改後仿此基業始大初建官屬統諸部其官之長皆稱貝勒舊金史作勃極烈今改後仿此金史國語解勃極烈總治官名六月以蘇頌為尚書左僕射兼中書侍郎蘇轍為門下侍郎范百祿為中書侍郎梁燾鄭雍為尚書左右丞韓忠彥知樞密院事劉奉世簽書院事秋九月陜西地震永興軍蘭州鎮戎軍環州地皆震召蘇軾為兵部尚書兼侍讀軾自揚州召為兵部尚書兼侍讀尋又遷禮部兼端明侍讀二學士御史董敦逸字夢授吉州永豐人黃慶基言軾為中書舍人時草吕惠卿制詞指斥先帝其弟轍相為表裏以紊朝政吕大防奏曰先帝欲冨強中國鞭撻四夷而一時羣臣將順太過故事或失當太皇太后與皇帝臨御因民所欲隨事救改蓋理之當然比來言官用此以中傷士人兼欲搖動朝廷意極不善轍亦為其兄辦所撰惠卿謫詞其言及先帝者初非謗誹謂辭中始以帝堯之仁姑試伯鯀終焉孔子之聖不信宰子句太后曰先帝追悔往事至于泣下大防曰先帝一時過舉非其本意太后曰此事官家宜深知于是罷敦逸慶基為湖北福建路轉運判官未幾軾亦罷知定州癸酉八年春三月蘇頌范百祿罷先是侍御史賈易坐言事出既復監司更赦除知蘇州頌謂易在御史名敢言不宜下遷于簾前爭之時殿中侍御史楊畏來之邵字祖德開封咸平人附吕大防蘇轍即劾頌稽留詔命頌遂上章辭位乃罷為觀文殿學士集禧觀使百祿坐與頌同職事畏等纍章劾之遂罷知河中府頌器局間逺以禮法自持為相務在奉行故事使百官守法遵職量能授任杜絶僥幸之原深戒疆埸之臣邀功生事論議有未安者毅然力爭之見帝年幼諸臣大紛紜常曰君長誰任其咎每大臣奏事但取決于太后帝有言或無對者惟頌奏后已必再稟帝帝或有所宣諭必告諸臣以聽聖語帝深重之夏六月梁燾罷夏人自得四寨纍遣使以地界為言詔二府議燾與同列語不合遂乞去帝不許至是以疾罷燾自立朝一以引拔人物為意嘗作薦士録具載姓名或曰公所植桃李乘時而發但不向人開耳燾笑曰燾出入侍從致仕執政八年之間所薦用之不盡負愧多矣帝以燾求去遣近臣密訪人材燾具奏訪人才可大任者陛下當自知之但須識别邪正公天下之善惡圖任舊人中堅正純厚有人望者不牽左右好惡之言以移聖意天下幸甚帝然之秋七月以范純仁為尚書右僕射兼中書侍郎純仁入謝太后謂曰或謂卿必先引用王覿彭汝礪卿宜與吕大防一心對曰此二人實有士望臣終不敢保位蔽賢望陛下加察純仁之將召也殿中侍御史楊畏附蘇轍欲相之因與來之邵上疏論純仁不可復相乞進用章惇安燾吕惠卿不報及純仁視事吕大防欲引畏為諫議大夫以自助純仁以畏不端不可用大防曰豈以畏嘗言相公邪蘇轍即從旁誦其彈文純仁初不知也已而竟遷畏禮部侍郎八月京東西河南北淮南水九月太皇太后髙氏崩太皇太后不豫吕大防范純仁等問疾太皇太后曰試言九年間曽施恩髙氏否只為至公一男一女病且死皆不得見言訖泣下又曰老身沒後必多有調戲官家者冝勿聽公等亦冝早退令官家别用一番人乃呼左右賜社飯曰明年社飯時思量老身也尋崩太后聽政召用故老名臣罷廢新法苛政舉邊寨之地以賜西夏于是宇內復安遼主以戒臣下令勿生事于疆埸曰南朝盡行仁宗之政矣有司請循天聖故事帝后皆御殿又請受册寶于文德殿太后曰母后當陽非國家美事況天子正衙豈所當御就崇政足矣臨朝九年朝廷清明華夏綏定力行故事抑絶外家私恩人以為女中堯舜冬十月帝始親政詔內侍劉瑗等復入內給事太后既崩中外洶洶人懷顧望在位者畏懼莫敢發言翰林學士范祖禹慮小人乘間害政上疏曰陛下方攬庶政延見羣臣此國家隆替之本社稷安危之機生民休戚之端君子小人進退消長之際天命人心去就離合之時也可不畏哉先后有大功于宗社有大德于生靈九年之間始終如一然羣小怨恨亦不為少必將以改先帝之政逐先帝之臣為言以事離間不可不察也惟剖析是非深拒邪説有以姦言惑聽者付之典刑痛懲一人以警羣慝則恬然無事此等既誤先帝又欲誤陛下天下之事豈堪小人再破壞邪時蘇軾方具疏將諫及見祖禹奏曰經世之文也遂附名同進而毁已草疏入不報會有旨詔內侍劉瑗等十人復職祖禹又諫曰陛下親政以來未聞訪一賢臣而所召乃先內侍四海必謂陛下私于近習不可弗聽已而祖禹復請對曰熙寧之初王安石吕惠卿造立新法悉變祖宗之政多引小人以誤國勳舊之臣屏棄不用忠正之士相繼逺引又用兵開邊結怨外夷天下愁苦百姓流徙賴先帝覺悟罷逐兩人而所引羣小已布滿天下不可復去蔡確連起大獄王韶創取熙河章惇開五溪沈起擾交管沈括徐禧俞允种諤興造西事兵民死傷者不下二十萬先帝臨朝悼悔謂朝廷不得不任其咎以至吳居厚行鐵冶之法于京東王子京行茶法于福建蹇周輔行鹽法于江西李稷陸師閔行茶法市易于西川劉定教保甲于河北民皆愁痛嗟怨比屋思亂賴陛下與先后起而救之天下之民如解倒懸惟是向來所斥逐之人窺伺事變妄意陛下不以修改法度為是如得至左右必進姦言萬一過聽而復用之臣恐國家自此陵遲不復振矣蹇周輔字皤翁成都雙流人十二月范純仁乞罷政不許初太皇太后寢疾召純仁曰卿父仲淹可謂忠臣在明肅垂簾時唯勸明肅盡母道明肅上賔唯勸仁宗盡子道卿當似之純仁泣曰敢不盡忠及帝親政純仁乞避位帝語吕大防曰純仁有時望不冝去可為朕留之且趣入覲帝問先朝行青苗法如何純仁對曰先帝愛民之意本深但王安石立法過甚激以賞罰故官吏急切以致民害退而上疏其要以為青苗非所當行行之終不免擾民也時羣小力排宣仁后時事純仁奏曰太皇太后保祐聖躬功烈誠心幽明共鑒議者不恤國是一何薄哉因以仁宗禁言明肅垂簾時事詔書上之曰望陛下稽倣而行以戒薄俗韓忠彥亦言于帝曰昔仁宗始政羣臣亦多言章獻之非仁宗惡其持情近薄下詔戒飭陛下能法仁祖則善矣帝不納復章惇吕惠卿官貶樞密都承旨劉安世知成德軍吕大防為山陵使甫出國門楊畏首叛大防上疏言神宗更立法制以垂萬世乞賜講求以成繼述之道帝即召對詢以先朝故臣孰可召用者畏遂列上章惇安燾吕惠卿鄧潤甫李清臣等行義各加品題且言神宗所以建立法度之意與王安石學術之美乞召章惇為相帝深納之遂復惇惠卿官安世諫以為不可出知成德軍甲戌紹聖元年是年四月始改元紹聖宋史哲宗紀仍唐書例于正月即書紹聖元年今依之春二月以李清臣為中書侍郎鄧潤甫為尚書左丞潤甫首陳武王能廣文王之聲成王能嗣武王之道以開紹述故有是命范純仁以時用大臣皆從中出言于帝曰陛下親政之初四方拭目以觀天下治亂實本于此舜舉臯陶湯舉伊尹不仁者逺縱未能如古人亦須極天下之選帝不納葬宣仁聖烈皇后三月壬申朔日食不盡如鈎吕大防罷初宣仁后時大防懇乞避位后曰上冨于春秋公未可即去少須嵗月吾亦就東朝矣及后崩殿中侍御史來之邵逆探時旨首劾大防而大防亦自求去帝亟從之大防立朝挺挺進退百官不可干以私不市恩嫁怨以要譽執政八年始終如一䇿進士罷門下侍郎蘇轍廷試進士李清臣發䇿意絀元祐之政略曰今復詞賦之選而士不知勸罷常平之官而農不加富可差可募之説雜而役法病或東或北之論異而河患滋賜上以柔逺也而羌夷之患未弭弛利以便民也而商賈之路不通夫可則因否則革惟當之為貴聖人亦何有必焉蘇轍諫曰伏見䇿題歷詆近嵗行事有紹復熙寧元豐之意臣謂先帝設施蓋有百世不可改者元祐以來上下奉行未嘗失墜至于事或失當何世無之父作于前子救于後前後相濟此則聖人之孝也漢武帝外事四夷內興宫室財用匱竭于是修鹽鐵𣙜酤均輸之政民不堪食幾至大亂昭帝委任霍光罷去煩苛漢室乃定光武顯宗以察為明以讖決事上下恐懼人懷不安章帝深鑒其失代之寬厚愷悌之政後世稱焉本朝真宗天書章獻臨御攬大臣之議藏之梓宫以泯其迹仁宗聽政絶口不言英宗濮議朝廷洶洶者數年先帝寢之遂以安靜夫以漢昭章之賢與吾仁宗神宗之聖豈其薄于孝敬而輕事變易也哉陛下若輕變九年已行之事擢任纍嵗不用之人懷私忿而以先帝為辭大事去矣帝覽奏大怒曰安得以漢武比先帝轍下殿待罪衆莫敢救范純仁從容言曰武帝雄才大略史無貶辭轍以比先帝非謗也陛下親事之始進退大臣不當如訶斥奴僕鄧潤甫越次進曰先帝法度為司馬光蘇轍壞盡純仁曰不然法本無弊弊則當改帝曰人謂秦皇漢武按蘇轍以漢武為言帝以漢武從古與秦皇並譏故疑轍為誹謗耳純仁曰轍所論事與時也非人也帝為少霽轍平日與純仁多異至是謝曰公佛地位中人也竟落轍職出知汝州及進士對䇿考官第主元祐者居上禮部侍郎楊畏覆考乃悉下之而以主熙豐者置前列遂拔畢漸為第一自是紹述之論大興國是遂變矣河南尹焞應舉見發䇿有絀元祐諸臣之議乃嘆曰尚可以干祿乎哉不對而出焞少師事程頤謂頤曰焞不復應進士舉矣頤曰子有母在歸告其母陳陳曰吾知汝以善養不知汝以祿養頤聞之曰賢哉母也于是終身不就舉尹焞字彥明一字德充洙兄源之子以曽布為翰林學士承旨初司馬光諭布增損役法布辭曰免役一事法令纎悉皆出己手遽自改易義不可為遂以戶部尚書出知太原府至是徙江寧過京留拜承旨夏四月以張商英為右正言帝初即位稍更新法之不便于民者商英時為開封推官上書言三年無改于父之道可謂孝矣今先帝陵土未乾即議變更得為孝乎復屢請執政求進且為諛詞貽蘇軾求入臺吕公著聞之不悅出為河東提刑至是召為右正言商英在外十年憾元祐諸臣因極力攻之上疏言神宗盛德大業跨絶古今而司馬光吕公著劉摯吕大防援引朋儔敢行譏議凡詳定局之建明中書之勘會戶部之行遣言官之論列詞臣之誥命無非指擲嗤笑翦除陛下羽翼于內擊逐股肱于外天下之勢岌岌殆矣今天日清明誅賞未正乞下禁省檢索前後章牘付臣等看詳簽揭以上望陛下與大臣斟酌可否焉貶蘇軾知英州御史趙挺之等會劾蘇軾撰吕惠卿誥詞訕謗先帝黜知英州范純仁諫曰熙寧法度皆惠卿附會王安石建議不副先帝愛民求治之意至垂簾之際始用言者特行貶竄已八年矣言者多當時御史何故畏避不即納忠今乃有是奏豈非觀望邪帝不納未幾侍御史虞䇿言軾罪罰未當又追一官惠州安置詔改元曽布上疏請復先帝政事且乞改元以順天意帝從之改元祐九年為紹聖元年于是天下曉然知帝意所向矣罷翰林學士范祖禹時帝欲相章惇祖禹言惇不可用帝不悅祖禹乞郡乃出知陜州祖禹在邇英守經據正獻納又多每當講前夕必正衣冠如在上側命子弟侍先按講其説開列古義參之時事言簡而當義理明白蘇軾稱為講官第一以章惇為尚書左僕射兼門下侍郎范純仁罷帝既相惇純仁請去益力乃以觀文殿大學士出知頴昌府自帝親政純仁扶佑之力居多然羣邪間之不能盡行其言凡薦引人才必以天下公議其人不知自純仁所舉或曰為宰相豈可不牢籠天下士使知出于門下純仁曰但朝廷進用不失正人何必其知出于我邪惇之被召也通判陳瓘從衆道謁之惇聞瓘名邀與同載詢當世之務瓘因問惇曰天子待公為政敢問何先惇曰司馬光姦邪所當先辨勢無急于此瓘曰公誤矣果爾將失天下之望惇厲聲曰光不務纘述先烈而大改成緒誤國如此非姦邪而何瓘曰不察其心而疑其迹則不為無罪若指為姦邪又復改作則誤國益甚矣為今之計惟消朋黨持中道庶可以救弊惇不悅惇既相專以紹述為事引其黨蔡卞張商英等居要地任言責協謀報復陳瓘字瑩中南劍州沙縣人以林希字子中福州人為中書舍人章惇嘗言元祐初司馬光作相用蘇軾掌制所以能鼓動四方安得斯人而用之或曰林希可會希赴成都過闕惇欲使典書誥逞毒于元祐諸臣且許以為執政希久不得志請甘心焉凡元祐名臣貶黜之制皆希為之極其醜詆至以老姦擅國之語陰斥宣仁讀者無不憤嘆一日草制罷擲筆于地曰壞名節矣復免役法章惇請復行免役法置司講議久而不決時蔡京方召為戶部尚書謂惇曰取熙寧成法施行之爾何以講為惇然之雇役遂定差雇兩法司馬光章惇所見不同京再蒞其事成于反掌兩人相倚以濟識者有以見其姦以蔡卞為國史修撰元祐中史官范祖禹等修神宗實録盡書王安石之過蔡卞安石壻也至是上疏言實録所紀類多疑似不根乞重行刋定詔從之以卞兼同修國史卞遂從安石從子防所求安石舊作日録文飾姦偽芟落事實盡改正史閏月復以陸師閔等為諸路提舉常平官罷十科舉士法貶吏部尚書彭汝礪知江州言者謂其附會劉摯也汝礪將行帝問所欲言對曰陛下今所復者其政不能無是非其人不能無賢不肖政惟其是則無不善人惟其賢則無不得矣至郡數月而卒五月詔進士專習經義罷制舉置宏詞科三省上言今進士純用經義如詔誥章表等文皆朝廷官守日用不可闕者若悉不為試之何以兼收文學博異之士于是改置宏詞科嵗詔進士登科者請試試者雖多取無過五人詞格超異者特奏命官劉奉世罷奉世為人簡厚有法度常云家世唯知事君內省不愧恃士大夫公論而已得喪常理也譬如寒暑加人雖善攝生者不能無病正須安以處之以章惇用事力乞外乃出知成德軍以黃履字安中邵武人為御史中丞元豐末履為中丞與蔡確章惇邢恕相交結每確惇有所嫌惡則使恕道風旨于履履即排擊之時謂之四凶為劉安世所論而出至是惇復引用俾報復仇怨元祐正人無一得免矣六月除字説之禁秋七月奪司馬光吕公著等贈諡貶吕大防劉摯蘇轍梁燾等官詔諭天下黃履張商英上官均來之邵等交章論司馬光等變更先朝之法畔道逆理章惇蔡卞請發光公著冢斫棺暴尸帝問許將將對曰此非盛德事也帝乃止于是追奪光公著贈諡仆所立碑奪王巖叟贈官貶吕大防為祕書監摯為光祿卿轍為少府監並分司南京初李清臣冀為相首創紹述之説以計去蘇轍范純仁亟復青苖免役法及章惇至心甚不悅復與為異惇既貶司馬光等又籍文彥博以下三十人將悉竄嶺表清臣進曰更先帝法度不能無過然皆纍朝元老若從惇言必大駭物聽帝乃下詔曰大臣朋黨司馬光以下各以輕重議罰其布告天下餘悉不問議者亦勿復言初朋黨論起帝曰梁燾每起中正之論其開誠排擊盡出公議朕皆記之又曰蘇頌知君臣之義無輕議也由是頌獲免而燾止謫提舉舒州靈仙觀八月罷廣惠倉復免行錢冬十月以吕惠卿知大名府監察御史常安民言北都重鎮而除惠卿惠卿賦性深險背王安石者其事君可知今將過闕必言先帝而泣以感動陛下希望留京矣帝納之及惠卿至京請對見帝果言先朝事而泣帝正色不答計卒不施而去時論快之十二月重修神宗實録成安置范祖禹等于逺州蔡卞進神宗實録于是祖禹及趙彥若師民子黃庭堅字魯直洪州分寧人等並坐詆誣降官安置永灃黔州遷卞為翰林學士初禮部侍郎陸佃預修實録數與祖禹等爭辨大要是安石為之晦隱庭堅曰如公言蓋佞史也佃曰盡用君意豈非謗書乎至是佃亦落職言者又以吕大防監修神宗實録徙安州居住乙亥二年春二月復保甲法夏四月置律學博士冬十月贈蔡確太師諡忠懷時確黨屢言確有定策功會馮京卒帝臨奠確子渭京壻也于喪次闌訴遂有是命貶監察御史常安民監滁州酒稅時蔡京深結中官裴彥臣安民因論之謂京姦足以惑衆辨足以飾非巧足以移奪人主之視聽力足以顛倒天下之是否內結中官外連朝士一不附已則誣以黨于元祐非先帝法必擠之而後已今在朝之臣京黨過半陛下不可不早覺悟而逐之他日羽翼成就悔無及矣是時京之姦始萌芽人多未測獨安民首發之又言今大臣為紹述之説皆借此名以報復私仇朋附之流遂從而和之張商英在元祐時上吕公著詩求進諛佞無恥近乃乞毁司馬光及吕公著神道碑周秩為博士親定光諡為文正近乃乞斫棺鞭尸陛下察此輩之言果出于公論乎章疏前後至數十百上度終不能回遂丐外帝慰勉而已至是復論章惇顓國植黨乞收主柄而抑其權反覆曲折言之不置惇遣所親信語之曰君本以文學聞于時奈何以言語自任與人為怨少安靜當左右右相處安民正色斥之曰爾乃為時相遊説邪惇益怒至是御史董敦逸論安民黨于蘇軾兄弟會安民言事忤旨惇遂出安民監滁州酒稅安燾救之不克左司諫張商英有罪免商英黨章惇以攻安燾帝不直之遂免十一月安燾罷燾與章惇為布衣交惇顗其助己而燾不下之遂有隙惇用白帖宋制中書省大事奏稟得旨為畫黃小事擬進得旨為録黃今不由奏擬而直以帖行之猶唐之堂帖也貶謫元祐諸臣燾言于帝帝疑之鄭雍欲為自安計謂惇曰王安石作相嘗用白帖行事惇大喜取其案牘懷之以白帝燾言不行惇怨益深及救常安民惇遂言燾與之表裏出知鄭州貶范純仁知隨州時吕大防等竄居逺州會明堂赦章惇豫言此數十人當終身勿徙純仁聞之憂憤欲申理所親勸其勿觸怒萬一逺斥非髙年所冝純仁曰事至于此無一人敢言若上心遂回所繫大矣如其不然死亦何憾因上言大防等所犯亦因持心失恕好惡任情違老氏好還之戒忽孟軻反爾之言然牛李之禍數十年淪胥不解豈可尚遵前軌願斷自淵𠂻原放大防等疏奏章惇大怒遂落觀文殿大學士徙知隨州丙子三年奉正月以楊畏知虢州右正言孫諤字元忠睢陽人言畏在元豐間為御史議論皆與朝廷合元祐末吕大防蘇轍用事則盡變而從之紹聖初陛下親政則又偷合詭隨締交執政天下之人謂之楊三變望顯黜之故有是命二月女真攻赫舍哩舊作紇石烈今改部遼史百官志小部族有某鍚哩猶言縣也赫舍哩本女真别部後入金以為氏阿蘇人名舊作阿疏今改後仿此阿蘇奔遼生女真節度使蒲拉舒卒金追贈肅宗弟盈格嗣以兄和琢烏古鼐長子按和琢舊作劾者今改子薩拉噶舊作撒改今改為國相金史世紀和諾克薩克逹父雅逹納稱為國相景祖以幣馬求得之以命肅宗雅逹納舊作雅逹今改時赫舍哩部阿蘇與部人穆都哩舊作毛睹録今改阻兵為難盈格自往伐之至阿蘇城阿蘇往訴于遼遼遣使止盈格勿攻盈格留和琢按此又一和琢據金史金初有兩和琢其一薩拉噶父後贈韓國公其一守阿蘇城後贈特進守阿蘇城而還久之阿蘇不敢歸盈格遂取其城秋八月竄范祖禹于賀州劉安世于英州時劉媫妤專寵內庭章惇蔡京托祖禹安世元祐中諫乳媪事事具前以為斥媫妤也于是坐二人搆造誣謗之罪謫授祖禹昭州别駕賀州安置安世新州别駕英州安置九月廢皇后孟氏劉媫好恃寵事后多不循禮媫妤嘗同后朝景靈宫訖事就坐嬪御皆立侍媫妤獨背立簾下后閣中陳迎兒呵之不顧閣中皆忿會冬至朝大后于隆祐宫后座朱髹金飾媫妤亦欲得之從者知其意易座與后等衆弗能平因傳唱曰皇太后出后起立婕妤亦起尋復坐則或已撤媫妤坐遂仆于地懟不復朝泣訴于帝內侍郝隨謂媫妤曰毋以此戚戚願為大家早生子此座正當與媫妤也會后女福慶公主疾后有姊頗知醫嘗以后危疾以故出入宫掖公主藥勿效持道家治病符水入治后驚曰姊寧知宫中嚴禁與外間異邪令左右藏之俟帝至具言其故帝曰此人之常情耳后即爇符于帝前宫中相傳厭魅之端作矣未幾后養母聽宣夫人燕氏尼法端為后禱祠事聞詔入內押班梁從政開封人等即皇城司鞫之捕逮宦者宫妾三十人搒掠備至肢體毁折至有斷舌者獄成命侍御史董敦逸覆録罪人過庭下氣息僅屬無一人能出聲者敦逸秉筆疑未下郝隨等以言脅之敦逸畏禍乃以奏牘上詔廢后為華陽教主玉清妙靜仙師法名沖真出居瑶華官時章惇欲誣宣仁后有廢立計以后逮事宣仁又陰附劉媫妤欲請建為后遂與郝隨搆成是獄天下寃之冬十月雷大雨雹夏人冦鄜延陷金明寨注見前夏人自得四寨事具前連嵗以書界未定侵掠邊民且遣使欲以蘭州一境易塞門二寨朝廷不許夏主乾順乃奉其母率衆五十萬大入鄜延是月自長城注見前一日馳至金明列營環城縱騎四掠邊將悉兵掩擊不退金明遂陷初帝聞有夏冦泰然笑曰五十萬衆深入吾境不過十日勝不過一二寨須去已而果破金明引退以龔原字深之處州遂昌人為國子司業原少師王安石安石之改學校法嘗引原自助原亦為盡力及為司業遂請以安石所撰字説洪範傳及王雱論語孟子義刋板傳學者故學校舉子之文靡然從之其弊自原始丁丑四年春正月李清臣免帝幸楚王似神宗第十三子帝同母弟初封簡王崇寧中改贈楚王此云楚王蓋史臣追敘之文第有狂婦人遮道呌呼告清臣謀反乃清臣姑子田嗣宗外婦也清臣不能引去御史劾免之二月追貶司馬光吕公著等官三省言司馬光等倡為姦謀詆毁先帝變易法度罪惡至深當時凶黨雖已死及告老亦冝薄示懲沮遂追貶司馬光為清逺軍節度副使吕公著為建武軍節度副使王巖叟為雷州别駕奪趙瞻傳堯俞贈諡追韓維到任及孫固范百祿胡宗愈等遺表恩未幾復追貶光朱崖軍司户公著為昌化軍司戶流吕大防劉摰蘇轍梁燾范純仁等于嶺南貶韓維等三十人官大防道卒大防之徙安州也其兄大忠字進伯自涇原入朝帝訪大防安否且曰執政欲遷諸嶺南朕獨令處安陸為朕寄聲問之大防朴直為人所賣二三年可復見也大忠泄其語于章惇惇繩之益力會侍御史來之邵言司馬光畔道逆理典刑未正鬼得而誅獨劉摰尚存實天以遺陛下于是三省言吕大防等為臣不忠罪與司馬光等不異頃朝廷雖嘗懲責而罰不稱愆生死異罪無以垂示後世遂貶大防舒州摰鼎州團練副使轍化州本唐辨州宋改名今州屬髙州府燾雷州别駕純仁武安軍節度副使安置于循新雷化永五州劉奉世光祿少卿郴州居住尋安置桞州韓維落職致仕再貶均州安置王覿韓川字元伯陜人孫升字君孚髙郵人吕陶范純禮字彛惠仲淹中子趙君錫馬默字處厚單州城武人顧臨范純粹字德孺仲淹少子孔武仲字常父文仲弟王欽臣吕希哲字原明公著長子吕希純字子進公著季子吕希績字紀常公著次子姚緬胡安詩秦觀字少遊揚州髙郵人十七人通隨峽衡蔡亳單饒均池信和金光衢連橫諸州通州五季周置今𨽻江南單州後唐置今為縣屬曹州府衢州唐置今為府屬浙江連州隋置今𨽻廣東橫州唐置今屬廣西南寧府餘注見前居住王攽落職致仕孔平仲字義父武仲弟落職知衡州張耒字文潛楚州淮陰人朝補之字無咎宗慤曾孫賈易並監當官朱光庭孫覺趙卨李之純字端明滄州無棣人李周字純之馮翊人並追奪官秩復追貶孔文仲李周為别駕中書舍人葉濤字致逺處州龍泉人當制文極醜詆聞者切齒先是左司諌張商英上言願陛下無忘元祐時章惇無忘汝州時安燾無忘許昌時李清臣曾布無忘河陽時以激怒之由此諸賢皆不免時燾已卒大防行至虔州信豐唐縣今屬江西贛州府而卒天下惜之既而梁燾卒于化州劉摰卒于新州蘇軾自惠州徙昌化軍范祖禹自賀州徙賔州劉安世自英州徙髙州純仁時因疾失明聞命怡然就道或謂近名純仁曰七十之年兩目俱喪萬里之行豈其欲哉但區區之愛君有懷不盡若避好名之嫌則無為善之路矣諸子欲以與司馬光議役法不同為請冀得免行純仁曰吾用君實薦以致宰相昔同朝論事不合則可汝輩以為今日之言則不可也有愧心而生不若無愧心而死其子乃止每戒子弟不可小有不平聞諸子怨章惇必怒止之及在道舟覆于江純仁衣盡溼顧諸子曰此豈章惇為之哉賔州唐置今屬廣西栁州府降太師致仕文彥博為太子少保言者論其朋附司馬光詆毁先烈也閏月以曽布知樞密院事林希同知院事許將為中書侍郎蔡卞黃履為尚書左右丞布初附章惇覬惇引居同省故草惇制極其稱美復贊紹述甚力惇忌之處于樞府由是稍不相能時章惇蔡卞同肆羅織貶謫元祐諸臣欲舉漢唐故事誅戮黨人帝以問將將對曰二代固有之但祖宗以來未之有本朝治道所以逺過漢唐者以未嘗輒戮大臣也帝深然之三月詔中書舍人蹇序辰字授之用輔子等編類司馬光等章疏章惇議遣吕升卿惠卿弟董必字子強處州龍泉人察訪嶺南將盡殺流人帝曰朕遵祖宗遺志未嘗殺戮大臣其釋不治惇志不快于是中書舍人蹇序辰上疏言朝廷前日正司馬光等姦惡明其罪罰以告中外唯變亂典刑改廢法度訕讟宗廟睥睨兩宫觀事考言實狀彰著其章疏案牘散在有司若不彚輯而藏之嵗久必致淪棄願選官編類人為一帙置之二府以示天下後世之大戒章惇蔡卞請即命序辰及直學士院徐鐸字振文興化莆田人編類凡司馬光等一時施行文書攟拾附著纎悉不遺由是搢紳之士無得脫禍者矣卞黨薛昻林自又乞毀司馬光資治通鑑板太學博士陳瓘因䇿士引神宗所製序文以問昻自議沮得免夏四月知渭州章楶字質夫建州浦城人城平夏此平夏故城在今平涼府固原州北有曰細腰葫蘆峽城前沈括欲盡城橫山以瞰平夏乃指夏州而言注己見前楶以夏人猖獗上言城葫蘆河川注見前據形勝以逼夏朝廷許之遂合熙河秦鳯環慶鄜延四路之師陽繕理他寨數十所以示怯而陰具版築守戰之備出葫蘆河川築二寨于石門峽江口在平涼府固原州西北水經注石門水導源髙平縣左會三川混濤歷峽峽即隴山之北垂也謂之石門口好水河即好水川注見前之陰夏人聞之帥衆來襲楶迎擊敗之二旬又二日城成賜名曰平夏城靈平寨在平夏城南章惇因請絶夏人嵗賜而命沿邊諸路相繼築城于要害以進拓境土凡五十餘所夏五月潞公文彥博卒後追諡忠烈彥博逮事四朝任將相五十年名聞四夷平居接物謙下尊德樂善如恐不及其在洛也洛人邵雍程皓兄弟以道自重賔接之如布衣交卒年九十二崇寧中預黨籍後特令出籍追復太師賜諡六月癸未朔日食太白晝見七月又晝見秋八月慧星見西方鄜延經略使吕惠卿復宥州惠卿乞諸路出兵乘便討擊詔河東環慶並聽惠卿期約惠卿遂遣將官王愍攻破宥州尋又奏築威戎本名升平塔是年賜名威羌本名白洛嘴元符元年賜名二城故城俱在今延安府安定縣加惠卿銀青光祿大夫時章惇肆開邊隙故諸道興役進築屢被爵賞冬十月以邢恕為御史中丞追貶王圭為萬安軍宋置今瓊州府萬州是司戶參軍初恕久出外心懷憤恨自河陽間道謁蔡確于鄧州將緒成太后王圭廢立事以明確與已定䇿功謀已定而無司馬光左驗會光子康赴闕過河陽恕乃紿康手書稱確功既而梁燾以諫議召過河陽恕復頌確功于燾且出康書為證既而恕帥中山置酒誘髙遵裕之子士京曰公知元祐間獨不與先公推恩否士京曰不知又問有兄弟無士京曰有兄士充已死恕曰此乃傳王圭語言之人也當時王圭為相欲立徐王遣士充傳道言語于禁中公知否士京曰不知恕因啖以官爵曰不可言不知為公作此事第勿以語人士京庸暗從之至是章惇蔡卞將甘心元祐諸賢引恕自助遂召還三遷為中丞恕遂以北齊婁太后宫名宣訓嘗廢孫少帝立子演設為司馬光語范祖禹曰方今主少國疑宣訓事猶可慮又今王棫為髙士京作奏言父遵裕臨死屏左右謂士京曰神宗彌留之際王圭遣士充來問曰不知皇太后欲立誰我叱士充去之事遂已會給事中葉祖洽亦以王圭于册立時有異論于是詔追貶王圭為萬安軍司戶贈遵裕奉國軍節度使十一月編管程頥于涪州頥時放歸田里帝一時與輔臣語及元祐政事曰程頥妄自尊大在經筵多不遜于是言者論頥與司馬光同惡相濟削籍竄涪州河南尹李清臣即日迫遣欲入內别叔母不許明日贐以銀一百兩頥亦不受復立市易務十二月火入輿鬼太史奏主賊在君側上召太史詰之對曰讒慝之臣皆賊也惟親近正人修德敬慎可以備之戊寅元符元年春正月得秦璽于咸陽咸陽縣民假義于劉銀村修舍得古玉印其文曰受命于天既壽永昌上之詔蔡京等驗辨京以為秦璽遂命曰天授傳國受命寶帝御大慶殿受寶行朝會禮詔賜義絹二百匹授右班殿直三月下文彥博子及甫于同文館獄遂錮劉摰梁燾子孫于嶺南以蔡京為翰林學士承旨安惇字處厚廣安軍人為御史中丞彥博之子及甫居喪于洛服除恐不得京官抵書邢恕曰改月遂除入朝之計未可必當途猜忌于鷹揚者益深其徒實繁司馬昭之心路人所知也濟之以粉昆必欲以眇躬為甘心快意之地可為寒心其謂司馬昭者指吕大防獨當國久粉昆世謂駙馬都尉為粉侯韓嘉彥尚主其兄忠彥則粉昆也恕以書示蔡確之弟碩至是恕令確子渭上書訟摰等陷其父陰圖不軌謀危宗社引及甫書為證章惇蔡卞因是欲殺摰及梁燾王巖叟等以為摰有廢立意遂置獄于同文館令蔡京安惇雜治逮問及甫及甫因詭言其父彥博稱摰為司馬昭粉則以王巖叟面白昆則以梁燾字況之況猶兄也京惇因組織萬端將陷諸人以族罪奏摰等大逆不道死有餘責不治無以示天下帝曰元祐人果如是乎京惇對曰誠有是心特仄形未具爾會摰燾已卒于貶所京等奏上不及考驗乃下詔禁錮摰燾子孫于嶺南勒停巖叟諸子官職京覬求執政故治獄極意羅織元祐諸賢既成而曾布忌京密言于帝曰蔡卞備位丞轄京不可以同升遂止進承旨京布由是有隙章惇蔡卞請追廢宣仁聖烈皇后不果行惇卞恐元祐舊臣一日復起日夜與邢恕等謀且結內侍郝隨為助媒蘖宣仁常欲危帝之事既貶王圭又起同文館獄又誣司馬光劉摰梁燾吕大防等結主宣仁閣內侍陳衍謀廢立時衍已先得罪配朱崖又以內侍張士良嘗與衍同主后閣自郴州召還使蔡京安惇雜治之以實其説京等列鼎鑊刀鋸于前謂之曰言有即還舊職無則就刑士良仰天大哭曰太皇太后不可誣天地神祗不可欺乞即戮京等煆鍊無所得乃奏衍疏隔兩宫斥隨龍內侍劉瑗等于外以剪除人主腹心羽翼為大逆不道處死帝頗惑之至是惇卞自作詔書請廢宣仁為庶人皇太后方寢聞之遽起謂帝曰吾日侍崇慶天日在上此語曷從出且帝必如此亦何有于我帝感悟取惇卞奏就燭焚之郝隨覘知之密語惇卞明日惇卞再具狀堅請施行帝怒曰卿等不欲朕入英宗廟乎抵其奏于地事得寢夏四月林希免初章惇疑曾布在樞密府間己使希為二以相伺察希日為布所誘且恨惇不引為執政漸有怨隙邢恕承惇意論免之秋七月再竄范祖禹劉安世于化梅州祖禹尋卒初章惇怨范祖禹劉安世尤深必欲置諸死地至是諷蔡京併陷二人以罪詔徙祖禹于化州安世于梅州安世至貶所章惇將必置之死陰令殺陳衍使者過梅脅安世使自裁使者不忍而止惇又擢土豪為轉運判官使殺之判官承意疾馳未至梅三十里嘔血而死安世獲免祖禹尋卒祖禹平居恂恂口不言人過遇事則别白是非不少借隱長于勸講論諫不啻數十萬言開陳治道辨釋事宜平易明白泂見底藴雖賈誼陸贄不是過也京師地震冬十月夏人冦平夏城章楶大敗之獲其將威明阿密舊作嵬名阿埋今改等夏人圍平夏章楶禦之獲其勇將威明阿密及西壽監軍穆爾圖卜舊作妹勒都逋今改斬獲甚衆捷至帝御紫宸殿受賀楶在涇原日久嘗言夏嗜利畏威不有懲艾邊不得休息冝稍取其土疆如古削地之制以固吾圉然後諸路出兵擇要害不一再舉勢將自蹙矣章惇與楶同宗言多見采由是創州一即西安州以南牟會新城建故城在平涼府固原州西北城寨九宋史地理志西安州有蕩羌天都臨羌橫嶺諸寨通會寧韋定戎諸堡皆元符中建屢敗夏人而諸路多建城寨以逼夏及平夏之捷夏人不復振己卯二年春三月遼人為夏請和夏人求援于遼遼主遣簽書樞密院事蕭德崇來為夏人議和仍獻玉帶詔郭知章報之復書謂若果出至誠深悔謝罪當徐度所冝開以自新之路夏六月河決內黃初元祐中議回河東流自小吳掃之決東流填淤范子竒始建議回河王令圖王孝先繼之文彥博吕大防安燾等謂河不東則失中國之險為契丹之利范純仁王存胡宗愈則以虛費勞民為憂蘇轍復力言其不可詔遣范百䘵行視役遂罷已而吳安持李偉等復主其説吳安持充之子久之不決至紹聖初卒行之先是吕火防以吳安持為都水使者尋以王宗望代之紹聖元年宗望奏築金堤七十里盡障北流使全河東還故道王宗望字磻叟光州固始人然是時東流堤防未固瀕河多被水患至是河決內黃口東流斷絶吳安持等三十人以前主議回河降責有差考續綱目是條敘回河事不詳核今節採宋史河渠志改輯秋七月洮西安撫使王贍秦州寧逺人取吐蕃邈川青唐降其酋轄戩初額爾古死子轄戩嗣轄戩性嗜殺部曲暌二大酋星摩沁占舊作沁牟欽氊今改之屬有異志忌轄戩季父蘇南黨征雄勇多智共誣其謀亂轄戩不能察殺之盡誅其黨獨沁魯克節舊作籛羅結今改逃奔希卜溫舊作溪巴溫今改希卜溫者董戩疏族也自額爾古之立去依隴逋部河南諸羌多歸之沁魯克節奉希卜溫長子表怎舊作杓今改據溪哥城本唐積石軍後陷吐蕃改名轄戩攻殺表怎沁魯克節奔河州説知州王瞻以取青唐之策贍言于朝章惇許之至是贍引兵趨邈川守者以城降贍留屯之轄戩自知其下多叛乃脫身自青唐降于贍詔胡宗回字醇夫宗愈弟帥熙河以節制之于是遂城會州元豐中雖加蘭會與熙河為一路而會州實未復至是始城之以西安城北六寨隸焉會州西魏置唐沒吐蕃宋收復今為靖逺縣未幾王贍與總管王愍爭功交訟于朝于是星摩沁占迎希卜溫入青唐立木征之子隆咱爾舊作隴今改為主其勢復張轄戩大懼自髠為僧以祈免宗回督贍進師贍急攻隆咱爾及星摩沁占等皆出降贍遂入據其城詔以青唐為鄯州贍知州事邈川為湟州王厚知州事時二酋雖降然其種人本不樂內附議者謂不先修邈川以東城障而遽取青唐道險地逺聲援不相及皆咎王贍之失策己而星摩沁占等果叛九月立賢妃劉氏為皇后竄右正言鄒浩字志完常州晉陵人于新州注見前妃多材藝有盛寵既搆廢孟后章惇與內侍郝隨劉友端相結請妃正位中宫時帝未有儲嗣會妃生子茂帝大喜遂立焉茂亦尋卒浩以數論事帝親擢為右正言露章劾章惇不忠慢上之罪未報而劉后立浩上疏言賢妃與孟后爭寵而孟后廢今乃立之殊纍聖德乞追停册禮帝曰此祖宗故事豈獨朕邪蓋指真宗立劉德妃也浩對曰祖宗大德可法者多矣陛下不之取而效其小疵邪帝變色持其章躊躇若有所思因付于外明日章惇詆其狂妄除名勒停羈管新州尚書右丞黃履乞與善地不聽尋出履知亳州御史中丞邢恕免恕內懷猜猾而外持正論帝多嘉納其言章惇恐其大用切忌之恕亦揣帝稍厭惇因屢白惇短惇遂搆陷以罪出知汝州以安惇代之置看詳訴理局安惇言陛下未親政時姦臣置訴理所凡得罪熙豐之間者咸為除雪歸怨先朝收恩私室乞取公案看詳從初加罪之意復依斷施行蔡卞勸章惇置局命中書舍人蹇序辰及安惇看詳由是重得罪者八百三十家士大夫或千里會逮天下怨疾有二蔡二惇之謡冬十一月許夏人通好夏人屢敗遣其臣凌囊舊作令能今改威明節舊作嵬名濟今改等來謝罪且進誓表詔嵗賜如舊自是西陲民少安詔諸州行三舍法考選升補悉如太學州許補上舍一人內舍二人歲貢之其上舍附太學外舍試中補內舍三試不升遣還其州其內舍免試補太學外舍生此後世歲貢之始庚辰三年春正月帝崩端王佶神宗第十子即位是為徽宗太后權同聽政赦帝崩無子皇太后向氏哭謂宰臣曰國家不幸大行皇帝無嗣事須早定章惇抗聲曰在禮律當立母弟簡王似注見前太后曰老身無子諸王皆神宗庶子莫難如此分别惇復曰以長則申王佖神宗第九子當立太后曰申王有目疾不可于次則端王佶當立惇曰端王輕佻不可以君天下言未畢曾布叱之曰章惇未嘗與臣商議如皇太后聖諭極當蔡卞許將相繼曰合依聖旨太后又曰先帝嘗言端王有福壽且仁孝于是惇默然乃召端王入即位于柩前羣臣請太后權同處分軍國事后以長君辭帝泣拜移時乃許之尊皇后劉氏為元符皇后二月立皇后王氏開封人德州刺史璪之女以韓忠彥為門下侍郎黃履為尚書右丞忠彥入對陳四事曰廣仁恩開言路去疑似戒用兵太后納之自是忠直敢言知名之士稍見收用三月吐蕃復叛詔棄鄯湟州畀之竄王贍等于嶺南贍未至自殺初贍留鄯州縱所部剽掠羌衆攜二星摩等結諸族帳謀反贍擊破之悉捕斬城中羌積級如山贍又諷諸羌酋籍勝兵者皆涅其臂無應者沁魯克節請歸帥本路為倡贍聽之去遂嘯聚數千人圍邈川夏衆十萬助之城中危甚苖履潞州人姚雄字毅夫五原人帥所部兵來援圍始解贍因棄青唐而還希卜溫與其子希卜薩羅桑舊作溪賖羅撒今改據之羣羌復合兵攻邈川王厚亦不能支朝論請並棄邈川且謂隆咱爾乃木征之子遂命知鄯州賜姓名曰趙懷德其弟彭布鄂特丹斡舊作邦辟勿丁咓今改曰懷義同知涅州加轄戩懷逺軍節度使而貶贍于昌化軍厚于賀州胡宗回奪職知蘄州贍至穰縣注見前自縊死詔求直言以四月朔日當食詔求直言筠州推官崔鶠字德符陽翟人上書略曰毀譽者朝廷之公議故責授朱崖軍司戶司馬光左右以為姦而天下皆曰忠今宰相章惇左右以為忠而天下皆曰姦此何理也夫乘時扺巇以盜冨貴探微揣端以固權寵謂之姦可也苞苴滿門私謁踵路陰交不逞密結禁庭謂之姦可也以竒技淫巧蕩上心以偶優女色敗君德獨操刑賞自報恩怨謂之姦可也蔽遮主聽排斥正人微言者坐以刺譏直諫者陷以指斥以杜天下之言掩滔天之罪謂之姦可也凡此數者光有之乎惇有之乎賞繆罰濫佞人徜徉如此而國不亂未之有也小人譬之蝮蝎其凶忍害人根乎天性隨遇必發天下無事不過賊陷忠良破碎善類至緩急危疑之際必有反覆賣國跋扈不臣之心比年以來諫官不論得失御史不劾姦邪門下不駁詔令共持喑默以為得計夫以股肱耳目治亂安危所繫而一切如此陛下雖有堯舜之聰明將誰使言之誰使行之夫四月陽極盛陰極衰之時而陰于陽故其變為大惟陛下畏天威聽明命大運乾網大明邪正則天意解矣若夫伐鼓用幣素服撤欒而無修德善政之實非所以應天也帝覽而善之以為相州教授召龔夬字彥和瀛州人為殿中侍御史陳瓘鄒浩為左右正言韓忠彥等薦之也御史中丞安惇言鄒浩復用慮彰先帝之失帝曰立后大事也中丞不言而浩獨敢言何為不可復用惇懼而退陳瓘言陛下欲開正路取浩既往之善惇乃誑惑主聽規騁其私若明示好惡當自惇始遂出惇知潭州詔許劉摰梁燾歸葬録其子孫夏四月丁酉朔日食以韓忠彥為尚書右僕射兼中書侍郎李清臣為門下侍郎蔣之竒同知樞密院事復范純仁等官徙蘇轍等于內郡純仁時在永州遣中使賜以茶藥諭之曰皇帝在藩邸太皇太后在宫中知公先朝言事忠直今虛相位以待不知目疾如何用何人醫之純仁頓首謝徙居鄧州在道拜觀文殿大學士中太乙宫使制詞有曰豈惟尊德尚齒昭示寵優庶幾鯁論嘉謀日聞忠告純仁聞制泣曰上果用我矣死有餘責既又遣中使趣入覲純仁乞歸養疾帝不得已許之每見輔臣問安否且曰范純仁得一識而足矣軾自昌化移亷徙永更三赦復提舉玉局觀未幾卒于常州軾與弟轍師父洵為文如行雲流水初無定質雖嬉笑怒罵之辭皆可書而誦之自為舉子至出入侍從必以愛君為本忠規讜論挺挺大節但為小人忌嫉不得久居朝列五月詔復哲宗廢后孟氏為元祐皇后初哲宗嘗悔廢后事嘆曰章惇壞我名節至是太后將復后位會布衣何文正上書言之遂降是詔自瑶華宫還居禁中蔡卞有罪免卞專托紹述之説上欺天子下脅同列凡中傷善類皆密疏建白然後請帝親札付外行之章惇雖巨姦然猶在其術中惇輕率不思而卞深阻寡言論議之際惇毅然主持卞或噤不啓齒一時論者以為惇迹易明卞心難見至是龔夬論惇卞之惡大略以為昔日丁謂當國號為恣睢然不過陷一冦凖而已及惇則故老元輔侍從臺省之臣凡天下之所謂賢者一日之間布滿嶺海自有宋以來未之聞也當是時惇之威勢震于海內此陛下所親見蓋其立造不根之語文致悖逆之罪俾朽骨銜寃于地下子孫禁錮于炎荒海內之人憤悶而不敢言皆以歸怨先帝其罪如此尚何俟而不正典刑哉卞事上不忠懷姦深阻凡惇所為皆卞發之為力居多望采之至公昭示譴黜未報而臺諫陳師錫字伯約建陽人陳次升字當時興化仙逰人陳瓘任伯雨字德翁眉州眉山人張庭堅字叔才廣安軍人等極論卞罪浮于惇乞正典刑以謝天下乃出知江寧臺諫論之不已遂以祕書少監分司池州追復文彥博王圭司馬光吕公著吕大防劉摰等三十三人官從韓忠彥之言也六月邢恕有罪安置均州陳瓘論其矯誣定䇿之罪也秋七月太后罷聽政八月葬永泰陵在鞏縣西南昌陵西史臣曰哲宗以幼沖踐阼宣仁同政召用諸賢罷廢新法故元祜之政庶幾仁宗奈何熙豐舊姦拔去未盡已而媒蘖復用卒假紹述之言務反前政報復善良馴致黨禍君子盡斥而國政益敝矣九月章惇有罪免惇為相專圖復怨屢興大獄以陷忠良天下嫉之及兼山陵使靈輿陷淖中越宿而行臺諫豐稷字相之明州鄞人陳次升龔夬陳瓘等劾其不恭免知越州冬十月復以程頤判西京國子監頤先量移陜州尋復宣德郎還洛及是受命即謁告欲遷延為尋醫計既而供職門人尹焞深疑之頤曰上初即位首被大恩不如是則何以仰承德意然吾之不能仕蓋已決矣受一月之俸焉然後惟吾所欲爾未幾致仕安惇蹇序辰有罪除名放章惇于潭州惇既罷知越州陳瓘等以為責輕復論惇在紹聖中置看詳元祐訴理局凡于先朝言語不順者加以釘足剝皮斬頸拔舌之刑其慘刻如此看詳之官如安惇蹇序辰等受大臣諷諭迎合紹述之意傅致語言指為謗訕遂使朝廷紛紛不已考之公論宜正典刑于是二人並除名放歸田里而貶惇武昌節度副使居潭州蔡京有罪免削林希官徙知揚州侍御史陳師錫上疏言京卞同惡迷國誤朝而京好大喜功日夜結交內侍戚里以覬大用若果用之天下治亂自是而分祖宗基業自是而隳矣龔夬亦言京治文及甫獄本以償報私仇始則上誣宣仁終則歸咎先帝必將族滅無辜以逞其欲臣料當時必有案牘章疏可以見煅煉附會願考證其實以正姦臣之罪皆未報會中丞豐稷召自河南初入對與京遇京謂之曰天子自外服召公中執法今日必有髙論稷正色曰行自知之是日論京姦狀帝猶未納臺諫陳瓘江公望字民表睦州人等相繼言之帝亦不聽稷曰京在朝吾屬何面目居此復力論之始出知永興軍言者不已乃奪職居杭州右司諫陳祐字純益仙井人復論林希紹聖初黨附權要詞命醜詆之罪乃削端明殿學士徙知揚州以韓忠彥曽布為尚書左右僕射兼門下中書侍郎布初附章惇凡惇所為多布所建白及不得同省始與乖異元符中惇以士心不附欲薦引名士且乞正所奪司馬光吕公著等贈諡布以為無益沮之且奏人主操柄不可倒持今自丞弼以至言者知畏宰相不知畏陛下其意蓋欲傾惇會哲宗崩而止及帝即位鋭意圖治延進忠鯁布因力排紹聖之人而去之以此得相既拜相其弟翰林學士肇引嫌出知陳州言于布曰兄方得君當引用善人翊正道以杜惇卞復起之萌而數月以來所謂端人吉士繼迹去朝所進以為輔佐侍從臺諫往往皆前日事惇卞者一旦勢異今日必首引之以為固位計思之可為慟哭比來主意已移小人道長進則必論元祐人于帝前退則盡排元祐者于要路異時惇卞縱未至一蔡京足以兼二人可不深慮乎布不能從曽肇字子開十一月詔改元時議以元祐紹聖均有所失欲以大公至正消釋黨朋遂詔改明年元為建中靖國由是邪正雜進矣初曽布密陳紹述之説帝不能決以問給事中徐績績對曰聖意得非欲兩存乎天下之事有是與非朝廷之人有忠與佞若不考其實姑務兩存臣未見其可也徐績字元功宣州南陵人徽宗皇帝辛巳建中靖國元年春正月壬戌朔有赤氣亘天是夕有赤氣起東北亘西南中函白氣將散復有黑祲在旁右正言任伯雨言正嵗之始而赤氣起于暮夜之幽日為陽夜為隂東南為陽西北為隂朝廷為陽宫禁為隂中國為陽戎狄為隂君子為陽小人為隂此宫禁隂謀下干上夷狄竊發之證也天心仁愛以災異為警戒願陛下進忠良絀邪佞正名分擊姦惡使小人無得生犯上之心則災異可變為休祥矣觀文殿大學士髙平公范純仁卒諡忠宣純仁疾革口占遺表勸帝清心寡欲約己便民絶朋黨之論察邪正之歸毋輕議邊事易逐言官辨明宣仁誣謗且云蓋嘗先天下而憂期不負聖人之學此先臣所以教子而微臣資以事君者也卒贈開府儀同三司純仁性夷易寬簡不以聲色加人誼之所在則挺然不少屈嘗曰吾生平所學得之忠恕二字一生用不盡以至立朝事君接待僚友親睦宗族未嘗須臾離此也每戒子弟曰人雖至愚責人則明雖有聰明恕己則昏苟能以責人之心責己恕己之心恕人不患不至聖賢地位也皇太后向氏崩諡曰欽聖憲肅追尊太妃陳氏帝生母為欽慈皇后陪葬永裕陵注見前遼主洪基卒孫延禧立遼主卒于混同江即松花江在今吉林烏喇城東南發源長白山北流會鄂諾河又東合黑龍等江入于海按鄂諾河舊作鄂嫩河今改後仿此行宫孫延禧即位是為天祚帝改元乾統詔為耶律伊遜所誣陷者復其官爵籍沒者出之流放者還之尋尊其考昭懷太子濬為大孝順聖皇帝廟號順宗妣蕭氏為貞順皇后誅伊遜黨徙其子孫于邊發伊遜特爾特舊作得里特今改之墓剖棺戮尸以其家屬分賜被殺之家二月貶章惇為雷州司户參軍任伯雨論惇久竊朝柄迷國罔上毒流搢紳乘先帝變故倉猝輒逞異志向使其計得行將置陛下與皇太后于何地若貸而不誅則天下大義不明大法不立矣臣聞北使言去年遼主方食聞中國黜惇放箸而起稱善者再謂南朝錯用此人北使又問何為只若是行遣以此觀之不獨孟子所謂國人皆曰可殺雖蠻貊之邦莫不以為可殺也章八上未報會臺諫陳瓘陳次升等復極論之乃貶惇為雷州司户參軍初蘇轍謫雷州不許占官舍遂僦民屋惇又以為強奪民居下州究治以僦劵甚明乃止至是惇問舍于民民曰前蘇公來為章丞相幾破我家今不可也後徙睦州死方惇之入相也妻張氏病且死囑之曰君作相幸勿報怨既祥惇與陳瓘曰悼亡不堪奈何瓘曰與其悲傷無益曷若念其臨絶之語耶惇無以對三月罷權給事中任伯雨伯雨初為右正言半嵗之間凡上百八疏大臣畏其多言俾權給事中密諭以少默即為真伯雨不聽抗論愈力時曽布欲和調元祐紹聖之人伯雨言人才固不當分黨與然自古未有君子小人雜然並進可以致治者蓋君子易退小人難退二者並用終于君子盡去小人獨留唐德宗坐此致播遷之禍建中乃其紀號不可以不戒既而欲劾布布覺之徙為度支員外郎夏四月辛卯朔日食葬欽聖憲肅皇后六月罷尚書右丞范純禮時韓忠彥雖首相而曽布専政漸進紹述之説諷中丞趙挺之排擊元祐諸臣純禮從容言于帝曰邇者朝廷命令莫不是元豐而非元祐以臣觀之神宗立法之意固善吏推行之或有失當以致病民宣仁聽斷一時小有潤色蓋大臣識見異同非必盡懷邪為私也今議論之臣有不得志故挾此以藉口以元豐為是則欲賢元豐之人以元祐為非則欲斥元祐之士其心豈恤國是直欲快私忿以售其姦不可不深察也純禮沉毅剛正曽布憚之謂駙馬都尉王詵曰上欲除君承旨范右丞不可詵怒會詵館遼使純禮主宴詵誣其輒斥御名遂罷知頴昌府罷左司諫江公望先是公望上疏言自先帝有紹述之意輔政非其人以媚于己為同忠于君為異借威柄以快私隙使天下騷然泰陵不得盡繼述之美元祐人才皆出于熙豐培養之餘遭紹聖竄逐之後存者無幾矣神考與元祐之臣其先非有射鈎斬袪之隙也先帝信仇人而黜之陛下若立元祐為名必有元豐紹聖為之對有對則爭興爭興則黨復立矣陛下改元詔旨亦稱思建皇極端好惡以示人本中和而立政皇天后土實聞斯言今若渝之奈皇天后土何帝嘗以示范純禮純禮贊之乞褒遷公望以勸來者會蔡王即簡王似帝即位初徙封蔡府史以語言疑似成獄王上表待罪續綱目作蔡王府相告有不遜語及于王文法不明今依宋史楚王似及公望傳改輯公望乞勿以無根之言加諸至親遂坐罪冬十月李清臣免清臣與韓忠彥有姻好忠彥惟其言是聽范純禮之罷亦其謀也至是以忤曽布免罷權給事中陳瓘瓘議論持平務存大體不以細故藉口未嘗及人暗昧之過及權給事中曽布使客告以將即真瓘語子正彚曰吾與丞相議事多不合今若此是以官爵相餌也若受其薦進復有異同則公義私恩兩有愧矣吾有一書論其過將投之以決去就汝其書之旦持入省布使數人邀相見甫就席遽出書布大怒爭辨移時至箕踞誶語瓘色不變徐起言曰適所論者國事是非有公議公未可遽失待士禮布矍然改容信宿出瓘知泰州十一月復召蔡京為翰林學士承旨供奉官童貫史不詳何所人性巧媚善測人主微指先事順承以故得幸及詣三吳訪書畫竒巧留杭纍月蔡京與之遊不舍晝夜凡所畫屏障扇帶之屬貫日達禁中且附語言論奏于帝所由是帝屬意用京左階道録徐知常以符水出入元符皇后所太學博士范致虛字謙叔建州建陽人與之厚因薦京才可相知常入宫言之由是宫妾宦官衆口一詞譽京遂起京知定州改大名會韓忠彥與曽布交惡布謀引京自助乃召為翰林學士承旨再詔改元曽布主于紹述請改明年元為崇寧帝從之以鄧洵武字子常綰之子為給事中兼侍講洵武為起居郎嘗因對言陛下乃神宗子今相忠彥乃琦之子神宗行新法以利民琦嘗論其非今忠彥更神宗之法是忠彥為能繼父志陛下為不能也必欲繼志述事非用蔡京不可又曰陛下方紹述先志羣臣無助者乃作愛莫助之圖以獻其圖如史記年表例旁行七重别為左右左曰元豐右曰元祐自宰相執政侍從臺諫郎官館閣學校各為一重左序助紹述者執政中惟溫益字禹弼泉州人蔡京二人餘不過三四若趙挺之范致虛王能甫錢遹字德循婺州浦江人之屬而已右序舉朝輔相公卿百執事咸在以百數帝出示曾布而揭去左方一姓名布請之帝曰蔡京也洵武謂非相此人不可以與卿不同故去之布曰洵武既與臣見異臣安敢與議明日改付溫益益欣然奉行請相蔡京而籍異論者於是善人皆不見容而帝決意相京矣乃進洵武中書舍人給事中兼侍講罷禮部尚書豐稷復蔡卞邢恕吕嘉問安惇蹇序辰等官稷初自河南入對論罷蔡京又欲率臺屬論曽布布覺之遷稷尚書稷數以論事忤權近大抵以崇儉愛人為言至君子小人之際必反覆切究及是出知蘇州壬午崇寧元年春正月河東地震太原等十一郡地震彌旬晝夜不止壞城壁屋宇人畜死者甚衆二月太妃朱氏卒哲宗生母諡曰欽成皇后祔葬永裕陵三月命宦者童貫製御器于蘇杭州童貫置局于蘇杭造作器用曲盡其巧牙角犀玉金銀竹蕂裝畫糊抹雕刻織繡諸色匠日役數千而材物所須悉科于民民力重困夏五月罷韓忠彥知大名府忠彥為相召還流人進用忠讜之士張庭堅陳瓘鄒浩龔夬江公望常安民任伯雨陳次升陳君錫張舜民字藝叟邠州人等皆居臺諫翕然稱為得人然與曽布不協至是左司諫吳材字聖取處州龍泉人右正言王能甫附布論忠彥變神考之法度逐神考之人才遂罷知大名府復追貶司馬光等四十四人官吳材王能甫等復舉元祐黨籍以排斥諸賢諫議大夫彭汝霖字巖老汝礪弟言諸人罪狀已經紹聖黜削案籍俱在但可據以行不必俟指名彈擊于是司馬光文彥博等四十四人復貶奪有差詔籍元祐元符黨人陸佃罷詔元祐及元符末今來責降人除韓忠彥曽任宰相安燾曽任執政王覿豐稷見任侍從官外餘並會三省籍記蘇轍范純禮劉奉世范純梓劉安世賈易吕希純張舜民陳次升韓川吕仲甫張耒歐陽棐吕希哲劉唐老吳安詩黃庭堅黃隱畢仲遊常安民劉當時孔平仲徐常王鞏張保原朝補之商倚張庭堅謝良佐韓跋馬琮陳彥默李祉陳祐任伯雨陳郛朱光裔蘇嘉鄭俠劉昱魯君貺陳瓘龔夬江衍余爽湯馘程頤朱光庭張巽張士良曾燾趙約談扆楊稱陳殉張琳裴彥臣凡五十餘人不得與在京差遣又詔司馬光等二十一人子弟毋得官京師佃與曽布比而持論近恕每欲參用元祐人材尤惡奔競嘗曰人才無大相逺當以資歷序進少緩之則士知自重矣又曰今天下之勢如人大病向愈當以藥餌輔養之須其安平苟為輕自改作是使之騎射也會御史請更懲元祐餘黨佃言于帝曰不宜窮治乃下詔云元祐諸臣各己削秩自今無所復問言者亦勿輒言揭之朝堂言者用是論佃名在黨籍不欲窮治正恐自及耳遂罷知亳州卒以許將溫益為門下中書侍郎蔡京趙挺之為尚書左右丞京素與屯田員外郎孫鼛字叔靜錢塘人善鼛嘗曰蔡子貴人也然才不勝德恐貽天下憂及是京謂之曰我若用于天子願助我鼛曰公誠能謹守祖宗之法以正論輔人主示節儉以先百吏而絶口不言兵天下幸甚京默然挺之初通判德州希時相意行市易法及召試館職學士蘇軾言其聚斂小人學行無取豈堪此選挺之深銜之既拜中丞遂與曽布比黨建議紹述排擊元祐諸賢由是進居政府閏六月曽布免布與蔡京素有隙議事多不合會布擬壻父陳佑甫為户部侍郎京言布私其所親布忿然爭辨久之聲色俱厲溫益叱之曰曽布上前安得失禮帝不悅殿中侍御史錢遹言布援元祐之姦黨擠紹聖之忠賢于是布請罷出知潤州秋七月以蔡京為尚書右僕射兼中書侍郎制下之日賜坐延和殿命之曰神宗創法立制先帝繼之兩遭更變國是未定朕欲上述父兄之志卿何以教之京頓首謝曰敢不盡死禁元祐法置講議司于都省蔡京起于逐臣一旦得志天下拭目所為而京隂托紹述之柄箝制天子用熙寧條例司故事即都省置講議司自為提舉講議熙豐已行法度及神宗欲為而未暇者以其黨吳居厚王漢之字彥昭衢州常山人等十餘人為僚屬取政事之大者如宗室冗官國用商旅鹽澤賦調尹牧每一事以三人主之凡所設施皆由是出而法制屢變無常矣八月詔天下興學貢士作辟雍于都城南蔡京請興學貢士縣學生選考升諸州學州學生每三年貢太學考分三等入上等補上舍入中等補上舍下等入下等補內舍餘俱外舍諸州軍解額各以三分之一充貢士京又請建外學乃詔即京城南門外營建賜名辟雍外圓內方為屋千八百七十二楹太學専處上舍內外生而外學則處外舍生士初貢至皆入外學經試補入上舍內舍始得進處太學太學外舍亦令出居外學于是上舍至二百人內舍六百人外舍三千人以趙挺之張商英為尚書左右丞商英為中書舍人謝表歷詆元祐諸賢及任翰林學士草蔡京拜相制極其褒美故京引之復令進士兼試律復紹聖役法九月立黨人碑于端禮門籍元符末上書人分邪正等黜陟之時元祐元符末羣賢貶竄死徙者略盡蔡京猶未愜意乃與其客強浚明錢塘人葉夢得字少藴蘇州吳縣人籍宰執司馬光文彥博吕公著吕大防劉摯范純仁韓忠彥王圭梁燾王巖叟王存鄭雍傅堯俞趙瞻韓維孫固范百祿胡宗愈李清臣蘇轍劉奉世范純禮安燾陸佃曽任待制以上官蘇軾范祖禹孔文仲孔武仲朱光庭孫覺鮮于侁賈易鄒浩等餘官程頤秦觀張耒朝補之黃庭堅孔平仲等及內臣張士良等武臣王獻可等凡百二十人列其罪狀謂之姦黨請御書刻石于端禮門京等復請下詔籍元符末日食求言章疏及論熙寧紹聖之政者付中書定為正上正中正下三等邪上邪中邪下三等于是鍾世美以下四十一人為正等悉加旌擢鄧考甫以下五百餘人為邪等降責有差又詔降責人不得同州居住冬十月復廢元祐皇后孟氏貶韓忠彥等官竄豐稷陳瓘等于逺州時元符皇后閣宦者郝隨諷蔡京再廢元祐皇后京未得間既而昌州判官馮澥上書論復后為非于是御史中丞錢遹殿中侍御史石豫左膚連章論韓忠彥等乘一布衣誑言復瑶華之廢后掠流俗之虛美當時物議固已洶洶乃至疏逖小臣詣闕上書忠義激切則天下公議從可知矣望詢考大臣斷以大義無牽于流俗非正之論以纍聖朝京與許將溫益趙挺之張商英皆主臺臣之説帝不得已從之詔罷元祐皇后之號復居瑶華宫且治元符末議復后號者降宰臣韓忠彥曽布官追貶李清臣雷州司户參軍黃履祁州團練副使安置翰林學士曽肇御史中丞豐稷諫臣陳瓘龔夬等十七人于逺州擢馮澥鴻臚寺主簿遼將蕭哈里舊作海里今改叛女真部節度使盈格擊斬之蕭哈里叛遼亡入女真阿克占舊作阿典今改部遣其族人烏達喇舊作幹達剌今改至生女真約同舉兵盈格執之會遼王命盈格討哈里盈格募兵得千餘人兄子阿古達曰有此甲兵何事不可圖也先此女真甲兵未嘗滿千故云遂次混同水與哈里遇時遼兵追哈里者數千不能克盈格謂遼將曰退爾軍我當獨取哈里遼將許之盈格使阿古達與哈里戰哈里中流矢墜馬阿古達執而殺之大破其黨函哈里首獻于遼遼主大喜賜豫加等盈格知遼兵易與益自肆矣未幾盈格卒金追贈穆宗兄子烏雅舒嗣女真自此漸強十二月追諡哲宗子茂為獻愍太子竄鄒浩于昭州初鄒浩召自新州入對帝首及諫立后事奬歎再三詢諫草安在對曰已焚之矣退告陳瓘瓘曰禍其在此乎異時姦人妄出一緘則不可辨矣蔡京用事乃使其黨偽為浩疏有劉后殺卓氏而奪其子以為己出欺人可也詎可以欺天乎之語帝詔暴其事遂追册茂為太子而竄浩于昭州癸未二年春正月安置任伯雨等十二人于逺州蔡京蔡卞怨元符末臺諫之論己悉陷以黨事同日貶竄任伯雨昌化軍陳壦連州龔夬化州陳次升循州陳師錫郴州陳佑澧州李深復州江公望安南軍常安民溫州張舜民商州馬涓吉州豐稷台州初蔡京帥蜀張庭堅在其幕府及入相欲引以自助庭堅不從京恨之至是亦編管于象州知荆南舒亶奏辰溪蠻納土元祐初傅堯俞等言沅誠州既建事具前布列寨縣設官募役調兵戍守所費巨萬公私騷然願斟酌廢置乃罷誠州為渠陽軍尋復為州而沅州如故會諸蠻復叛朝廷方務休息因盡廢堡寨而其地復為蠻酋所據及是蔡京當國開邊拓土之議復熾京以舒亶知荆南亶奏誠徽二州蠻酋楊晟臻等二千餘人並納土詔加亶待制羣臣表賀尋改誠州為靖州徽州為蒔竹縣二月尊元符皇后劉氏為皇太后宫名崇恩三月詔黨人子弟毋得至闕下其因緣趨附黨人罷任在外指射差遣及得罪停替臣僚亦如之尋又詔元符末上書進士充三舍生者罷歸以元祐學術聚徒傳授者監司覺察必罰無赦元符上書邪等人亦毋得至京師時策進士于集英殿李階為禮部進士第一階深之子而陳瓘之甥也特奏名安忱對策言使黨人之子階魁南宫多士無以示天下遂奪階出身而賜忱第忱惇兄也又黃定等十八人皆上書邪等上臨軒召謂之曰卿等攻朕短可也神宗哲宗何負于卿等亦並黜之夏四月詔毁司馬光等景靈宫繪像司馬光及吕公著吕大防范純仁劉摯范百祿梁燾鄭雍趙瞻王巖叟凡十人時又詔毁范祖禹唐鑑及三蘇黃庭堅秦觀文集除故直祕閣程頤名言者希蔡京意論頤學術頗僻素行譎怪専以詭異聾瞽愚俗乃追毁頤出身文字其所著書令監司嚴加覺察范致虛又言頤以邪説詖行惑亂衆聽而尹焞張繹字思叔河南夀安人為之羽翼乞下河南盡逐學徒頤于是遷居龍門之南止四方學者曰尊所聞行所知可矣不必及吾門也更鹽鈔法蔡京欲囊括四方之錢實中都以誇富強而固恩寵俾商人先輸錢于𣙜貨務請鈔赴産鹽州郡受鹽而舊鈔悉不用商人凡三輸錢始獲一直之貨因無資更鈔已輸錢悉乾沒于是有齎數十萬劵一旦廢棄者朝為豪商夕儕流丐有赴水投繯而死者商賈不通邊儲失備提點淮東刑獄章繹見而哀之奏改法誤民京怒奪繹官詔童貫監洮西軍六月貫及安撫王厚復湟州貶韓忠彥等官有差蔡京議復湟鄯還王厚前秩會羌人都爾本舊作多羅巴今改奉希卜薩羅桑謀復國趙懷德畏逼奔河南種落更挾之以令諸部朝廷患衆羌扇結命王厚安撫洮西合兵十萬討之京又與內客省使童貫善因言貫嘗使陜右悉五路事宜與諸將能否請用李憲故事監其軍帝從之貫至湟州適禁中火帝下手札驛止貫兵毋西貫發視遽納鞾中厚問故貫曰上趣成功耳遂行都爾本知王師且至集衆以拒厚聲言駐兵而隂戒行羌備益弛乃與偏將髙永年異道而進都爾本三子以數萬人分據險要厚擊殺其二子唯少子阿蒙中流矢去道遇都爾本與俱遁厚遂拔湟州捷聞進蔡京官三等蔡卞以下二等降德音于熙河蘭會路論棄湟州罪貶忠彥為磁州團練副使安燾為祁州團練副使曾布為賀州别駕范純禮為靜江軍節度副使奪蔣之竒三秩凡預議者貶黜有差秋八月張商英罷商英復與蔡京議政不合數詆京身為輔相志在逢君御史余深等希蔡京指取商英所作元祐嘉禾頌及祭司馬光文斥其反覆罷知亳州詔八元祐黨籍九月始定選人階官吏部侍郎鄧洵武言神宗稽古建官既正臺省寺監之職而以寄祿階易空名矣今選人七階自兩使判官至主簿尉有帶知安州雲夢縣而為河東幹當公事者有河中府司𨽻參軍而監楚州鹽場者有瀛州軍事推官充濮州教授者殽亂紛錯莫甚于此宜造為新名因而制祿詔悉更之乃改留守節察判官為承直郎書記支使防團判官為儒林郎留守節察推官軍監判官為文林郎防團推官為從事郎令録為通仕郎知令録為登仕郎判司簿尉為將仕郎後改通仕為從政登仕為修職將仕為迪功令州縣立黨人碑蔡京又自書姦黨為大碑頒于郡縣令監司長吏廳皆刻石有長安石工安民當鐫字辭曰民愚人固不知立碑之意但如司馬相公者海內稱其正直今謂之姦邪民不忍刻也府官怒欲加之罪民泣曰被役不敢辭乞免鐫安民二字于石末恐得罪後世聞者愧之髙麗與女真通好女真雖舊屬髙麗不相通者久矣會髙麗醫者至女真還言于髙麗王曰女真居黑水即今黑龍江上源曰鄂諾河流六千餘里與混同江合者部族日強兵益精悍其王乃通使于女真自是來往不阻既而女真徇地别部髙麗恐不利于己因侵之為女真所敗髙麗懼還所俘復請和冬十月置都大軍器所初知渭州邢恕建兵車之議下諸路創造凡數千乘及是蔡碩又請製河北五十萬兵器及兵車萬乘于京師置官以領之十一月遼封耶律淳為越王淳篤好文章昭懷太子之得罪也道宗嘗欲立淳為太子羣臣不可而止遼主即位寵待加厚號其父和囉噶為太叔封淳越王留守東京御批厯代通鑑輯覽卷七十九

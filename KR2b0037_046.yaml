front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷四十七隋起文帝開皇元年辛丑至恭帝侗皇泰二年己夘凡四帝三世共三十九年髙祖文皇帝
  hash: sha256:3278d4ab11d95e4bce83a6bc80f3bf35609ff845e562e2f203743227927cc5e8

body:
  text: 欽定四庫全書御批厯代通鑑輯覽卷一百十九附眀唐桂二王本末桂王二我大清世祖章皇帝順治五年春正月總兵金聲桓叛以江西附于桂王由榔聲桓本左良玉部將王師南征聲桓自九江率衆歸附令與降將王體忠合營規取江右聲桓計殺體忠以其黨王得仁代之得仁亦闖部禆將所稱王雜毛者也江西既平授聲桓總兵恃衆驕恣江西撫按每裁制之聲桓得仁心怏怏嘗遣其客雷徳復通𣢾于桂王由榔以聲桓妻子在京師未敢發㑹有以兩人陰事告巡按御史董學成者聲桓得仁懼適其孥亦自京師至反謀遂決以是月二十五日閉城門部勒全營圍學成官署殺之并及副使成大業執巡撫章于天於江中迎故明在籍大學士姜曰廣入城以資號召遣人奉表由榔由榔封聲桓昌國公得仁新喻侯得仁統兵陷九江揚言將窺江寧或說聲桓曰贛州居省上流文武督在焉宜先攻贛不然且伺我後聲桓從之立召得仁還與并力犯贛以宋奎光守南昌賊圍贛州大兵守禦甚固久之不能拔聲桓乃令得仁往綴章貢上下而引兵踰嶺犯雄韶故明朱容藩僭稱監國于䕫州尋敗死時四川地尚附于桂王由榔容藩本明宗室奉田榔命為總制而李乾徳楊喬然江爾文又先後以巡撫至各自署置官多於民諸將亦皆擁兵自雄由榔總督尚書樊一蘅令不行惟保敘州一郡㑹廣西危迫川中相傳由榔已死容藩遂偽稱監國天下兵馬副元帥建行臺于䕫州稱制封拜御史錢邦芑傳檄討之堵允錫以湖南地失無所歸由貴州走蜀見容藩責以大義曉譬利害其黨頗㪚由榔命其大學士吕大器代王應熊督師四川大器至涪州過將軍李占春營具言由榔無恙容藩乗機僭竊當得罪占春以為然李乾徳亦檄諸鎮致討容藩窘乃北依譚詣兄弟以兵攻石砫土司占春援之容藩兵敗走死雲陽魯王以海遁居琅𤦺島時以海竄居海島鄭彩專柄與其大學士熊汝霖有隙遣兵潛害之并害汝霖幼子又殺其義興侯鄭遵謙皆投屍海中汝霖遵謙賜諡忠節賜諡節愍以海以錢肅樂為大學士二月我大清兵至靈川桂王由榔奔南寧郝永忠在桂以不得鈔掠惡城外團練兵盡破水東十八村殺戮無算與瞿式耜搆難式耜力調劑永忠乃移駐興安至是大兵前驅至靈川永忠戰敗奔入桂林請由榔即夕西走式耜力持不可言督師警報未至無大恐若播遷不已國勢愈弱兵氣愈難振民心皇皇復何所依不聽由榔左右皆請速駕式耜又言俟督師還背城借一勝敗未可知若以走為策則何地不危反覆數百言由榔曰卿不過欲予死社稷爾式耜為泣下沾衣嚴起恒曰明日當議之迨夜半由榔已行甫出城永忠即大掠捶殺太常卿黄太元式耜家亦被掠家人矯何騰蛟令箭乃得釋日中趙印選諸營自靈川至亦大掠城内外如洗永忠走栁州印選等走永寧明日式耜息城中餘燼安撫逺近焦璉及諸鎮周金湯熊兆佐胡一青等各率所部至騰蛟亦自永福至民心粗定由榔自象州走南寧故少詹事朱天麟寓居安平土州由榔召為大學士天麟請親率土兵畧江右不聽天麟乃趨謁由榔於南寜天麟字游初崑山人三月我大清兵攻桂林大兵偵知桂林兵變乗虚進襲直抵北門何騰蛟督焦璉胡一青等分三門力戰拒守大兵乃還駐全州城獲全時桂王由榔在南寧瞿式耜遣使慰由榔及太妃起居由榔始知式耜無恙為之泣下我大清兵克興化遂盡復魯王以海所䧟諸州縣魯王以海自航海後數遣兵擾閩境先後攻陷三府一州二十七縣軍勢頗盛至是王師進討克興化城以海大學士朱繼祚及叅政湯芬字方侯嘉善人給事中林嵋字小眉莆田人知縣都廷諫杭州人等並死之繼祚嵋廷賜諡忠節芬諡節賜諡烈愍諫俱賜愍遂連克永福長樂建寜諸郡縣永福破邑人給事中鄢正畿御史林逢經俱投水死長樂破邑人御史王恩及服毒死妻李氏同死建寜破守将王祈巷戰不勝自焚死正畿逢經恩及俱賜諡節愍祈烈愍賜諡凡以海所據地一時盡復以海不敢更犯閩乃謀窺浙東時沈宸荃棄家從以海于海外以海擢為大學士錢肅樂在舟中以鄭彩專恣憂憤嘔血聞連江破以頭觸牀而死故相葉向節髙曾孫進晟𦵏之福清黄檗山山中肅樂賜諡忠夏四月提督李成棟叛以廣東附于桂王由榔成棟本髙傑部将以徐州總兵來降從王師平粤用為提督成棟不樂受總督佟養甲節制常懷異謀及是金聲桓誘之同反計益決是月十一日黎眀成棟令其兵集教場聲言索餉欲為變成棟請養甲出城撫輯養甲至衆兵呼噪劫之以叛遂傳檄各屬遣使附于由榔廣西巡撫耿獻忠聞之亦舉梧州叛降由榔封成棟惠國公養甲襄平伯以獻忠為兵部尚書初獲大兵破亷州推官張孝起謀以兵拒就不屈羈軍中至是脫歸由榔以為吏科給事中人張孝起吳江五月桂王由榔遣兵陷全州時金聲桓李成棟相繼叛大兵在湖南者姑退何騰蛟乗間復陷全州遣保昌侯曹志建宜章侯盧鼎新興侯焦璉新寧侯趙印選等進攻永州我大清兵圍南昌時征南大将軍都統譚泰等帥師討金聲桓連克九江南康饒州諸府進薄南昌而令别将搜麥源青嵐諸道薄西山未下營血刃已數百里大兵遂圍南昌聲桓兄成功密約來降宋奎光諜知殺之大兵攻得勝門城壊數處奎光囊土塞之得不破報至贛聲桓等大懼撒兵急回贛人掩擊亡其大半至南昌中伏大敗于七里街遂盡撤城外屯兵入城堅壁不出其部将請戰不聽遣所署江西巡按吳尊周乞師于桂王由榔尊周盡匿敗狀但盛誇其强由榔喜以尊周為總督大兵見聲桓終無出兵意乃用鎖圍法東自王家渡屬灌城西自雞籠山屬生米渡掘濠載版起土城自是内外耗絶王得仁自軍敗後不復親督陣方娶武都司女為繼室繡斾親迎金鼔喧遝瞭者皆望而大駭莫疑為王雜毛娶婦也已城中糧盡人相食乃大出居民聲桓等情實盡為大兵所得因以餘暇畧定諸郡縣聲桓等但守空城而已時揭重熙傅鼎銓皆聚兵應聲桓由榔以重熙為部尚書總督江西兵鼎銓為兵部右侍郎兼翰林院侍讀學士重熙以萬餘人犯邵武取還鼎銓往援聲桓亦敗走大兵克都昌督師尚書余應桂死之余傅鼎銓字維衡臨川人應桂賜諡忠節六月桂王由榔至潯州李成棟請由榔入廣州由榔将赴之瞿式耜請還桂林䟽言駕若東幸軍中将帥謂朝廷樂新復之土成棟亦有邀駕之嫌號令既逺人心渙㪚臣不能制也再疏令檢討蔡之俊往迎又疏令給事中䝉正發往迎由榔俱不報遂至潯州封潯帥陳邦傅為慶國公邦傅請世居廣西如黔國公故事大學士朱天麟執不允邦傅怒以慶國公印尚方劒擲天麟舟中要必得仍報不允瞿式耜亦持疏劾之㑹諸臣多争者邦傅乃止秋八月桂王由榔至肇慶瞿式耜慮李成棟挾由榔自專如劉承允事復上疏力争由榔乃駐肇慶成棟進謁由榔拜成棟大将軍以其子元允為錦衣指揮使封南陽伯成棟言式耜擁戴元臣不宜久在外由榔召式耜式耜願留桂林終不入然聞政有闕失必具疏力諫嘗曰臣與主上患難相隨休戚與共不同他臣一切大政自得與聞由榔雖褒納不能盡從也時由榔諸臣各樹黨從成棟至者曹華耿獻忠洪天擢潘曽緯毛毓祥李綺自誇降附功氣陵朝士自廣西從由榔至者朱天麟嚴起恒王化澄晏清吳貞毓吳其雷洪士彭尹三聘許兆進張孝起皆自恃舊臣詆斥曹耿等久之復分吳楚兩黨主吳者天麟孝起貞毓化澄及李用楫堵允錫萬翺程源郭之竒皆内結馬吉翔外結陳邦傅主楚者都御史袁彭年少詹事劉湘客給事中丁時魁䝉正發金堡皆外結瞿式耜内結李元允元允方握政柄彭年等倚為心腹攬權殖貨勢甚張時人目為五虎彭年嘗論事由榔前語不遜由榔責以君臣之義彭年勃然曰倘向者惠國以五千鐵騎鼓行而西君臣義安在由榔變色大惡之彭年等謀攻去吉翔邦傅權可獨擅也令堡疏陳八事劾邦傅十可斬吉翔及中官龎天壽大學士起恒化澄與焉起恒化澄乞去天麟奏留之堡與時魁等復相繼劾起恒吉翔天夀無已太妃召天麟面諭武岡危難賴吉翔左右令擬諭嚴責堡等天麟為兩解卒未嘗罪言者而彭年等益怒不止由榔知羣臣水火甚令盟於太廟然黨益固不能解冬十月李成棟犯贛州敗走李成棟駐南雄盡率部衆及峝蠻土宼號稱百萬度嶺犯贛州以救南昌營柵未立㑹巡撫劉武元總兵胡有陞等出擊大敗之成棟單騎走斬首萬餘級俘獲無算成棟退屯南康縣李成棟忌佟養甲密請除之桂王由榔命養甲祭其父桂王常瀛于梧州遣盜邀殺之白沙洲十一月桂王由榔遣兵復陷湖南州縣何騰蛟遣曹志建等攻永州圍城三月大小三十六戰遂為所陷未幾桂王由榔監軍御史余鯤起職方主事李甲春陷寶慶别将陷衡州馬進忠陷常徳王進才李赤心髙必正等陷桃源澧州臨武藍山道州靖州荆門宜城諸州縣湖南地大半復為由榔所據騰蛟議進兵長沙瞿式耜以機㑹可乗請由榔還桂林圖出楚之計不納己丑我大清世祖章皇帝順治六年春正月我大清兵至湘潭桂王由榔督師大學士定興侯何騰蛟死之由榔總制堵允錫與馬進忠有隙令李赤心髙必正争進忠所取常徳進忠大怒盡驅居民出城焚廬舍走武岡寶慶守将王進才亦棄城走他守将皆焚營潰湖南州縣為一空赤心等所至見皆空城旋棄走東趨長沙騰蛟時駐衡州大駭乃令允錫向江西檄進忠由益陽出長沙期諸将畢㑹而親詣忠貞營邀赤心入衡部下卒六千人懼忠貞營掩襲不䕶行止攜吏卒三十人往将至聞其軍已東即尾之至湘潭湘潭空城也赤心不守而去騰蛟乃入居之大兵知騰蛟入空城遣将徐勇引軍入勇騰蛟舊部将也率其卒羅拜勸騰蛟降騰蛟大叱勇遂擁之去絶食七日乃殺之諸軍遂㪚赤心等走廣西騰蛟忠誠賜諡桂王由榔罷其大學士朱天麟等官陳邦傅訐金堡官臨清嘗降流賊受其職且請堡為已監軍朱天麟因擬諭譏堡堡大憤丁時魁乃鼓言官十六人詣閣詆天麟至登由榔所居殿大譁棄官擲印而出由榔方坐與侍臣論事大驚兩手交戰茶傾於衣急取還天麟所擬而罷天麟遂辭位由榔慰留再三不可陛辭叩頭泣由榔亦泣曰卿去余益孤矣初時魁等謂所擬出嚴起恒意欲入署毆之是日起恒不入而天麟獨自承遂移怒天麟逐之去并逐其弟為行人兩子為御史中書舍人者天麟移居慶逺王化澄貪鄙無物望亦為時魁等所攻碎冠服辭去由榔乃召何吾騶黄士俊入直吾騶尋亦為堡等排去獨士俊起恒在由榔乃復召天麟天麟不至上疏言今國勢累卵路人皆知而建言者絶不問瑣屑一人一事掉頭以争曰我古遺直也今而後請勿以四方無利害者執也為極重大事而獨使主上憂社稷其意亦為堡等發臣等謹案明自神宗以後科道諸臣懷私逞臆把持朝政黨禍交興桂王﨑嶇嶺海事急燃眉乃金堡等猶欲呼朋引類任意恣行甚至擲印喧嘩弁造髦主上及兩粤就平堡不能殺身又復詭托緇流聖諭作語言以文其畏死偷生之跡臣等伏讀前後所頒仰見我皇上大公彰癉盡節者雖阻兵犯順而猶曲予燭照靡遺抒忠闡揚若進退無據之徒縱獲保首領而準情理之平所斧鉞維嚴亦必追加誅殛是非褒貶一垂訓以維風教正人心矣萬世者至深且切我大清兵克南昌金聲桓等伏誅聲桓部将湯執中守進賢門其偏裨約來降大兵因以厚陣佯攻得勝門礮聲聞三百里聲桓等悉衆赴之而竒兵已從進賢門登雲梯而上城遂破聲桓中二矢赴池水死生擒王得仁及宋奎光劉一鵬郭天才等皆伏誅故明大學士姜曰廣投偰家池死瑞州臨江袁州諸府皆平曰廣忠確賜諡二月我大清兵至信豐李成棟敗死成棟再度嶺犯贛州不能克屯兵信豐大兵既定南昌泝流援贛直趨信豐成棟兵敗諸将欲拔營歸成棟不可天久雨召諸将議事去者已大半成棟命酒痛飲既大醉左右挽之上馬渡水水漲人馬俱沈三日後見成棟植立水中始知其死諸營皆潰大兵追至南雄城下而還桂王由榔以杜永和為兩廣總督駐廣州代成棟閻可義守南雄可義尋死以羅成耀代之命瞿式耜以留守督師兼江楚各省兵馬三月我大清兵克衡州何騰蛟既死堵允錫乃入衡州與胡一青固守大兵至戰敗一青走廣西允錫走桂陽大兵遂入衡州初李赤心之入廣西也緣道淫掠龍虎闗守将曹志建惡之并惡允錫或說志建允錫将召忠貞營圖志建志建夜發兵圍允錫殺從卒千餘允錫及子逃入富川猺峒志建索之急猺潛送允錫於監軍僉事何圖復間闗達梧州㑹桂王由榔遣嚴起恒劉湘客安輯忠貞營至梧而赤心等已走賓横二州乃載允錫謁由榔於肇慶志建遷怒圖復誘殺之闔門俱盡臣等謹案明季兵政廢弛上無約束任其縱肆或緣道淫掠或索金鼔譟卒至闖獻横行無一人足資禦侮者況復粤西假息孑遺幾何諸将如郝永忠李赤心等尚復縱兵焚刧曹志建且擅殺職官闔門俱盡武臣恣横紀律蕩然亦由習見崇禎時之悍将驕兵而貽害遂至於此極也我大清兵克福安魯王以海大學士劉中藻既陷福寧旋移駐福安固守不下至是大兵破城中藻冠帶坐堂上為文自祭吞金屑死時以海已盡失閩地鄭彩見事勢窮蹙遂棄以海去張名振阮進奉以海遁居南田劉中藻烈愍賜謚夏四月孫可望遣使求封於桂王由榔可望既得雲南故明在籍御史臨安任僎議尊可望為國主以干支紀年鑄興朝通寶錢而李定國劉文秀故可望同輩一旦自尊兩人不為下可望以事杖定國演武場欲以威衆孫李益有隙可望聞桂王由榔在肇慶李錦等並加封爵念得朝命加王封庶可相制議遣使奉表楊畏知亦素以尊主為言乃遣畏知及永昌故兵部郎中龔彞赴肇慶進可望表請王封由榔大學士嚴起恒給事中金堡等皆持不可畏知曰可望欲權出劉李上爾今晉之上公而卑劉李侯爵可也乃議封可望景國公賜名朝宗定國文秀皆列侯遣大理寺卿趙昱為使加畏知兵部尚書彞兵部侍郎同行時堵允錫駐梧州先是允錫至肇慶結歡馬吉翔欲圖李元允由榔不恱丁時金堡又論其喪師失地由榔因令其總統兵馬移駐梧州允錫曽賜空敕得便宜行事昱就與謀允錫念李赤心等不足恃欲遙結可望為强援矯命改封平遼王易敕書以往允錫尋至潯州自恨發病卒武康伯胡執恭者慶國公陳邦傅中軍也守泗城州與雲南接亦欲自結可望言於邦傅先矯命封可望秦王曰藉其力可制李赤心也邦傅乃鑄金章曰秦王之寶填所給空敕令執恭齎行可望大喜郊迎亡何畏知等至可望駭不受曰我已封秦王矣畏知曰此偽也執恭亦曰彼亦偽也其時桂王所封實景國公敕印故在可望怒辭敕使下畏知及執恭獄秋七月桂王由榔遣兵犯南安敗走桂王由榔遣兵度嶺犯南安别分兵兩路窺信豐逼崇義大兵㑹擊奪其木城大破之八月我大清兵定湖南定逺大将軍鄭親王濟爾哈朗等帥師克辰州進攻寶慶王進才馬進忠等戰敗遁去分兵定沅州靖州守将皆望風棄城走至永州周金湯熊兆佐等立柵大松橋拒戰敗之下其城復克黎平府郝永忠奔永從縣大兵躡其後永忠返戰擊破之永忠攜妻子潛遁九月魯王以海遁入舟山以海以七月中至健跳所大兵圍之㑹阮進救至得解去時張肯堂方以私財募兵海上以海貽肯堂書云将北還舟山約肯堂共事至是以海遂遣張名振阮進合軍討斬黄斌卿入居舟山以肯堂為大學士吳鍾巒為禮部尚書冬十二月我大清兵克南雄平南王尚可喜靖南王耿繼茂等帥師征廣東除夕潛兵襲南雄桂王由榔守将江起龍倉皇棄城去羅成耀方駐韶州聞之亦棄輜重走髙州庚寅我大清世祖章皇帝順治七年春正月我大清兵克韶州桂王由榔奔梧州是月六日大兵下韶州由榔聞庾闗不守大懼急登舟走梧州加馬吉翔兵部尚書與南陽伯李元允督守肇慶瞿式耜馳疏請留不聽陳邦傅謁由榔梧州以其将茅守憲率兵入衛二月桂王由榔下其給事中金堡等獄堡等既連逐大臣勢益横戶部尚書吳貞毓等欲排去之畏李元允為援不敢發㑹由榔走梧州元允留肇慶陳邦傅適遣兵入衛貞毓郭之竒萬翺程源乃合諸給事御史劾袁彭年劉湘客丁時魁䝉正發及堡等五人把持朝政罔上行私罪由榔以彭年有歸附功免議下堡等錦衣獄杖之大學士嚴起恒跪由榔舟力請留守大學士瞿式耜七疏論救皆不納命法司定議堡以語觸時忌與時魁並謫戍湘客正發贖配追贓由榔再召朱天麟天麟疏言年來百爾搆争盡壊實事昔宋髙宗航海猶有退步今則何地可退當奮然自将文武諸臣盡擐甲胄臣亦抽峒丁擇土豪募水手經畧嶺北湖南為六軍倡若徒責票擬以為主持政本今政本安在乎時已大兵日逼由榔不能從但召天麟入直進官而我大清兵圍廣州時李赤心已死養子來亨代領其衆推髙必正為主大兵圍廣州桂王由榔命陳邦傅與必正東援邦傅故與李元允有隙意在修怨又憾必正等之屢擾其境也陰令副将姚春登等連結土司㑹來亨等調兵土司遂相讐殺必正怒而歸邦傅駐清逺馬吉翔駐三水俱不敢進廣州城守久李元允弟建捷拒戰甚力由榔封為安肅伯我大清兵克全州平南王孔有徳帥師征廣西曹志建戰敗大兵入龍虎闗馬進忠復敗於𤓰里走入武岡桂林大震百姓苦諸鎮鈔掠競迎王師長驅入全州開國公趙印選居桂林衛國公胡一青守榕江與寧逺伯王永祚皆懼不敢出大兵遂入嚴闗無一禦者夏六月桂王由榔罷其大學士嚴起恒官尋召還起恒潔亷遇事持平與馬吉翔龎天壽共患難久無所忤五虎憾起恒詆為邪黨及五虎得罪起恒反力救吳貞毓等惡之乃請召還王化澄而合攻起恒給事中雷徳復劾其二十餘罪比之嚴嵩由榔不恱奪徳復官起恒力求罷由榔輓留之不得放舟竟去㑹鄖國公髙必正入朝貞毓欲藉其力以傾起恒言朝事壊於五虎主之者起恒也公入見請除君側奸數言決矣必正許之有為起恒解者謂必正曰五虎攻嚴公嚴公反救五虎此長者奈何以為奸必正見由榔乃力言起恒虚公可任請由榔手敕邀與俱還孫可望復遣使求封於桂王由榔可望欲真得秦封不受景國公命遣使至梧州問故由榔始知矯詔事瞿式耜上疏請斬胡執恭不納馬吉翔議封可望􅊹江王使者言非秦不敢復命大學士嚴起恒持不可兵部侍郎楊鼎和江安人給事中劉堯珍鎮雄人等助之且請却所獻白金玉帶時髙必正尚在梧州因召使者言本朝無異姓封王例我蕩覆北京䝉恩宥赦亦止公爵爾張氏竊據一隅封上公足矣安敢冀王爵自今當與我同心報國洗去賊名毋欺朝廷孱弱我兩家士馬足相當也又致書可望詞義嚴正使者唯唯退議遂寢可望不得封益怒秋九月孫可望率兵至貴州可望由雲南東襲貴州匡國公皮熊走清浪衛追執之奪其兵又遣白文選攻破遵義忠國公王祥自刎死降其衆二十餘萬張先璧馬進忠皆歸於可望勢益强孫可望遣兵據嘉定初桂王由榔遣李乾徳入蜀自巡撫進尚書經畧川湖雲貴軍務乾徳察諸将惟袁韜最勇悍可用力說之攻佛圖闗取重慶亡何諸将大㑹韜以位髙坐李占春上占春怒并怒乾徳欲襲取之乾徳占星氣有異走匿山谷間占春襲韜不克搜乾徳船取其孥而返尋還之諸将益相猜韜及武大定久駐重慶食盡乾徳說嘉定楊展與大定結為兄弟資之食已而乾徳利展富搆韜殺之分其貲蜀人咸不直乾徳可望聞展死将圖蜀乃為展訟寃使王自竒将兵由川南進而别遣劉文秀渡金沙河出黎州趨嘉定韜大定方拒自竒於川南撤師還救自竒尾擊之韜大定大敗悉被擒嘉定陷乾徳以其父死於流賊也曰吾不可再辱驅家人與其弟御史升徳俱赴水死乾徳諡賜賜諡忠節升徳節愍文秀兵復東譚宏譚詣譚文盡降乃遣盧名臣下涪州占春敗走于大海在忠州知不支引兵出䕫入楚與占春來降於王師文秀遂據蜀冬十一月我大清兵克廣州廣州城三面臨水李成棟在時復築兩翼附于城外為砲臺水環其下大兵攻圍十閱月不下杜永和偏将范承恩約内應決砲臺之水大兵藉薪徑渡遂得砲臺是月二日克其城承恩來降永和由海道奔瓊州我大清兵克桂林桂王由榔留守大學士臨桂伯瞿式耜等死之王永祚胡一青俱以領餉入桂林榕江一帶皆空壁大兵益深入是月五日式耜檄趙印選出城為戰守計不肯行再趣之則盡室逃一青及武陵侯楊國棟綏寧伯蒲纓寧武伯馬養麟亦逃去永祚迎降城中無一兵式耜端坐府中家人亦㪚部将戚良勛請式耜上馬速走式耜堅不聽叱退之適兵部侍郎總督諸路軍務張同敞同敝以式耜薦為總督有文武才每出兵輒躍馬為諸将先或敗奔同敞危坐不去諸将復還戰或取勝軍中以是服之自靈川至見式耜式耜曰我為留守當死此子無城守責盍去諸同敞正色曰昔人恥獨為君子公顧不許同敞共死乎式耜喜取酒與飲一老兵侍式耜令召中軍徐髙付以敕印屬馳送桂王由榔是夕兩人秉燭危坐達旦黎眀數騎至式耜曰吾兩人待死久矣遂與偕行至則踞坐於地諭之降不從令為僧亦不從乃幽之民舍兩人雖異室聲息相聞日賦詩倡和得百餘首閱四十餘日将就刑式耜從容肅衣冠南向拜訖與同敞並死同敞屍植立首墜躍而前者三人皆辟易式耜敞賜諡忠宣同賜諡忠烈桂王由榔奔南寧由榔至潯州亂卒夜掠街市火光燭天由榔亟解維衝雨而去陳邦傅在清逺飛帆先歸邀刼從官于藤江殺部郎潘駿觀童英許王鳳等由榔踉蹌至南寧胡一青趙印選率兵駐賓州我大清兵克平樂大兵由灌陽至平樂桂王由榔征西将軍朱旻如臨桂人固守城破旻如殺其妻子自刎死焦璉方往禦鎮峽闗聞之遂走梧州旻如烈愍賜諡辛卯我大清世祖章皇帝順治八年春二月我大清兵克肇慶髙州梧州栁州諸府總兵許爾顯克肇慶及羅定州徐成功克髙州線國安馬蛟麟克梧栁二州桂王由榔南陽伯李元允安肅伯李建㨗自肇慶走南寧尋請出靈山收髙雷兵復擾廣東郡孫可望遣兵至南寧迎桂王由榔遂殺其大學士嚴起恒等由榔走南寧見事急乃遣編修劉茝封孫可望冀王可望仍不受楊畏知曰秦冀等爾假何如真可望不聽李定國等勸可望遣畏知終其事可望許之先遣部将賀九儀張勝張明志等率勁卒五千迎由榔九儀直上嚴起恒舟怒目攘臂問王封是秦非秦嚴起恒曰君逺迎主上功甚偉朝廷當有隆恩若專問此事是挾封非迎主上也九儀怒格殺之投屍于江遂殺給事中劉堯珍吳霖歙縣人張載述涇縣人追殺兵部尚書楊鼎和於崑崙闗皆以阻封議故起恒鼎和俱賜諡忠節堯珍霖載述愍俱賜諡烈朱天麟力勸由榔從可望請赴雲南諸臣以起恒被殺皆不可乃命天麟經畧左右兩江土司而真封可望為秦王畏知旋至痛哭自劾語多侵可望由榔因留為東閣大學士與吳貞毓同輔政可望聞之怒使人召至貴陽面責數之畏知大憤除頭上冠擊可望遂被殺楚雄人立祠以祀畏知忠節賜諡三月我大清兵克嘉定劉文秀既據蜀旋還雲南留白文選守嘉定劉鎮國守雅州至是大兵南征文選鎮國戰敗挾曹勛遁走王師遂入嘉定桂王由榔巡撫川南僉都御史范文光賦詩一章仰藥死巡撫川北僉都御史詹天顔兵敗于石泉就執不屈死總督尚書樊一蘅時已謝事避山中至九月亦遘疾死范文光詹賜諡天顔俱忠節夏四月桂王由榔遣其大學士文安之督師四川為孫可望所阻不果行安之應由榔召至梧州從赴南寧以大兵日迫而雲南又為孫可望所據不可往念川中諸鎮兵尚强欲結之為援乃自請督師加諸鎮封爵由榔從之加安之吏兵二部尚書總督川湖諸處軍務賜劒便宜從事進諸将王光興郝永忠劉體仁袁宗第李來亨王友進塔天寶馬雲翔郝珍李復榮譚宏譚詣譚文黨守素等公侯爵即令安之齎敕印行可望聞而惡之遣兵伺於都勻邀止安之追奪光興等敕印留數月乃令入湖廣安之逺客他鄉無所歸復赴貴州将趨謁由榔可望誣以罪戍之畢節衛秋八月我大清兵克舟山魯王以海遁入海都統金礪劉之源總督陳錦提督田雄等㑹師討舟山以大艦乗潮出洋至蛟門魯王以海遣阮進拒戰敗死進烈愍賜謚大兵乗天霧集螺頭門守俾者方覺定西侯張名振兵部尚書張煌言奉以海航海去屬大學士張肯堂城守城中兵六千居民萬餘堅守十餘日大兵掘地道破其城肯堂衣蟒玉南向坐令四妾二子婦一女孫先死乃從容賦詩自經一時同死者兵部尚書李向中鍾祥人以下凡二十一人大帥召向中不赴發兵捕之以衰絰見大帥呵之曰聘汝不至捕即至何也向中從容曰前則辭官今就戮爾遂死之禮部尚書吳鍾巒常往來普陀山以大兵至寜波鍾巒慷慨謂人曰昔仲達死璫禍吾諸生不得死君常死賊難吾以逺臣不得從死今其時矣乃急渡海入昌國衛之孔廟積薪左廡下抱孔子木主自焚死仲達者鍾巒弟子李應昇君常者鍾巒友馬世竒也左都督張名揚乃名振弟與其母范以下數十人皆自焚死吏部侍郎上海朱永佑安洋将軍上元劉世勲通政司㑹稽鄭遵儉兵科給事中鄞縣董志寜兵部郎中江陰朱養時戶部主事福建林瑛蘇州江用楫禮部主事㑹稽董元兵部主事福建朱萬年長洲顧珍臨山衛李開國工部主事長洲顧中堯中書舍人蘇州蘇兆人工部所正鄞縣戴仲明定西侯㕘謀順天顧明楫諸生福建林世英内官監太監劉朝俱不屈死開國母瑛明楫妻皆自盡錦衣指揮王朝相聞城破䕶以海妃陳氏貴嬪張氏義陽王妃杜氏入井用巨石覆之自刎其旁肯堂賜諡忠穆鍾巒賜諡忠烈向中志寜儉賜諡忠節永佑世勲名揚朝相俱兆賜諡烈愍遵養時瑛用楫元萬年珍開國中堯人仲明俱俱賜諡節愍明楫世英賜祀忠義祠以海漂泊無所歸檥舟南日山颶風大作其大學士沈宸荃沒於海宸荃節諡忠九月我大清兵克潯州定南王孔有徳率師駐賓陽遣總兵線國安等分路畧定廣西郡縣桂王由榔慶國公陳邦傅在潯州宣國公焦璉兵敗走武靖邦傅邀與俱降璉不從邦傅殺之函其首遣使以潯南之地及所部兵來歸璉賜諡烈愍冬十一月魯王以海遁居金門以海舟次巖頭鄭成功移之金門禮待頗恭以海既失其衆乃自去監國號遣使間道奉表於桂王由榔久之張名振亦卒成功事以海益懈以海積不能平将往南澳成功使人沈之海中張煌言自以海死後㪚遣部曲遁居懸嶴為杭大兵所執諭降不從戮於州煌言十二月桂王由榔奔廣南孫可望既移駐貴陽議移由榔自近挾以作威其将掌塘執者曹延生惎由榔大學士吳貞毓言不可移黔至是大兵盡定廣西諸府南寧危迫由榔召諸臣共議有請走海濱依李元允者有議入安南避難者有議泛海抵閩依鄭成功者惟馬吉翔龎天夀結可望堅主赴黔貞毓入延生言不敢決元允疏請出海由榔不欲就可望而以海濱逺再下諸臣議終不決亡何開國公趙印選衛國公胡一青殿後軍戰敗奔還請由榔速行急由水道走土司抵瀨湍二将報大兵益近相距止百里上下失色皆㪚去已次羅江土司追騎相距止一舍㑹日晡引去乃稍安次龍英抵廣南嵗已暮矣大學士朱天麟扶病追從由榔以明年四月始抵廣南病篤不能入見卒於西坂村御批厯代通鑑輯覽卷一百十九

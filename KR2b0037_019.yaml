  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_019-1a, image: WYG0335/WYG0335-0498a.png}
body:
  text: 嬰廣戚漢縣故城在今江南徐州府沛縣侯顯之子也楚孝王囂之子􅈴封廣戚侯顯􅈴之子也年二歲託以卜相最吉立之尊皇后曰皇太后夏四月安衆漢縣故城在今河南南陽府鎮平縣侯劉崇長沙定王六世孫起兵討莽不克死之安衆侯劉崇與相張紹謀曰莽必危劉氏天下非之莫敢先舉此乃宗室之恥也吾帥宗族為先海內必和從者百餘人遂進攻宛漢縣今南陽府南陽縣是不得入而敗紹從弟竦與崇族父嘉詣闕自歸莽赦弗罪竦因為嘉作奏請豬崇宫室用永監戒于是莽大悅封嘉竦皆為列侯長安為之語曰欲求封過張伯松力戰鬬不如巧為奏伯松竦字五月莽朝見稱假皇帝羣臣白劉崇等謀逆者以莽權輕也宜尊重以填海內太皇太后乃詔莽朝見稱假皇帝丁卯二年秋九月東郡太守翟義起兵討莽立劉信東平王雲子為天子三輔豪傑應之莽遣兵拒擊義戰不堯死之信亡走翟義丞相方進之子也與姊子陳豐上蔡人謀曰新都侯攝天子位故擇宗室幼稚者以為孺子且以觀望必代漢家方今宗室衰弱外無彊藩天下傾首服從莫能亢扞國難吾父子受漢厚恩義當為國討賊欲舉兵西誅不當攝者選宗室子孫輔而立之汝肯從我乎豐年十八勇壯許諾義遂與都尉劉宇嚴鄉胡三省注嚴鄉侯國當在東郡侯劉信信弟璜結謀勒其車騎材官士募郡中勇敢部署將帥立信為天子義自號大司馬柱天將軍移擊郡國言莽鴆殺孝平皇帝攝天子位欲絶漢室今天子已立共行天罰郡國皆震比至山陽衆十餘萬莽聞之惶懼不能食太皇太后謂左右曰人心不相逺也我雖婦人亦知莽必以是自危莽乃拜孫建等七人為將軍建為奮武將軍王邑為虎牙將軍王駿為彊弩將軍王况為震威將軍劉宏為奮衝將軍王昌為中堅將軍竇况為奮威將軍將關東甲卒發奔命以擊義三輔豪傑趙朋霍鴻等聞義起自稱將軍燒宫寺殺郡尉火見未央前殿莽復拜王級等為將軍級為虎賁將軍閻遷為折衝將軍西擊朋等日抱孺子禱郊廟㑹羣臣而稱曰昔周公攝政而管蔡挾祿父以畔今翟義亦挾劉信而作亂自古聖猶懼此况臣莽之斗筲羣臣皆曰不遭此變不彰聖德乃依周書作大誥諭天下以當反位孺子之意諸將至陳留漢縣注見前與翟義戰義敗死竟不得信初汝南舊有鴻隙大陂郡以為饒成帝時關東數水陂溢為害方進為相奏罷之及翟氏滅郡中常枯罕追怨方進童謡曰壞陂誰翟子威飯我豆食羮芋魁反乎覆陂當復誰云者兩黃鵠河鴻隙陂亦曰鴻池陂今南汝寧府汝陽縣東明年春三輔兵皆破滅莽于是自謂獲天人助遂謀即真之事矣戊辰初始元年春地震秋九月莽母功顯君死莽自以居攝踐阼奉漢大宗之後為功顯君緦縗辨而加麻環絰顔師古曰于辨上加環絰也謂之環者輕細如環之形如天子弔諸侯服令其孫宗為主服喪三年冬十一月莽以太皇太后詔號令奏事毋言攝劉京宗室廣饒侯扈雲車騎將軍千人臧鴻太保屬奏符命符命之起自謝囂始事見前京言齊郡新井臨淄縣昌興亭長辛當一暮夢天公使來告之曰攝皇帝當為真即不信此亭中當有新井晨起視之誠有新井入地且百尺雲言巴郡漢郡治江州今四川重慶府巴縣是石牛鴻言扶風雍石莽皆迎受于是奏請號令天下天下奏事毋言攝以居攝三年為初始元年用應天命期門郎張充等謀誅莽不克死之張充等六人謀共劫莽立楚王事覺被殺十二月莽自稱新皇帝更號太皇太后為新室文母太皇太后梓潼今縣夲漢置屬四川綿州人哀章師古曰哀姓章名學問長安素無行作銅匱為兩檢署其一曰天帝行璽金匱圖其一署曰赤帝璽邦漢髙帝名傳豫讀曰與皇帝金策書書言王莽為真天子并書莽大臣八人又取命名王興王盛章亦自竄姓名凡十一人皆署官爵為輔佐日昏時衣黃衣持匱至髙廟以付僕射僕射以聞莽至髙廟拜受金匱神禪師古曰言有神命使漢禪位于莽也御王冠謁太后還坐未央宫前殿即真天子位建有天下之號曰新以十二月朔為始建國元年正月之朔服色尚黃使節之旄幡署曰新使五威節時以孺子未立璽藏長樂宫莽請之太后不肯授莽使安陽侯舜諭指太后怒罵之曰而屬父子宗族蒙漢家力富貴纍世既無以報受人孤寄乘便利時奪取其國不復顧恩義人如此者狗猪不食其餘天下豈有而兄弟耶且若自以金匱符命為新皇帝亦當自更作璽傳之萬世何用此亡國不祥璽為我漢家老寡婦旦暮且死欲與此璽俱葬終不可得因涕泣旁側長御以下皆垂涕舜亦悲不能自止良久乃仰謂太后臣等已無可言莽必欲得璽寧能終不與耶太后恐莽欲脅之乃出漢傳國璽投之地曰我老已死知而兄弟今族滅也莽又欲改太后漢家舊號易其璽綬于是張永獻符命言太皇太后當為新室文母太皇太后莽從之班彪贊曰三代以來王公失世稀不以女寵及王莽之興由孝元后歷漢四世為天下母饗國六十餘載羣弟世權更持國柄五將十侯卒成新都位號已移于天下而元后卷卷猶握一璽不欲以授莽婦人之仁悲夫已新莽始建國元年統是年以後至壬巳午依綱目篡賊干例分注紀年春正月莽廢孺子為定安公定安胡三省無注馮智舒以為漢縣故城在寧州考地理志漢有安定郡無定安縣寧州之名定安乃後魏非漢也莽策命孺子為定安公孝平皇后為定安太后以大鴻臚府為定安公第置門衛使者監領敕阿乳母不得與嬰語常在四壁中至長大不能名六畜改諸官名降漢諸侯王及王子侯爵莽按金匱封拜其黨與王舜平晏劉秀哀章為四輔甄邯王尋王邑為三公甄豐王興孫建王盛為四將凡十一公如王興故城門令史王盛賣餅兒莽按符命登用以示神焉乃更漢諸官名大司農曰羲和後更為納言大理曰作士太常曰秩宗大鴻臚曰典樂少府曰共工水衝都尉曰豫虞又更光􅈴等為六監郡太守曰大尹都尉曰太尉縣令長曰宰其餘百官盡易其名不可勝紀降諸侯王皆為公三十二人王子侯皆為子百八十一人立九廟以漢髙廟為文祖廟莽狹小漢家制度欲更為踈闊乃自謂黃帝虞舜之後至齊王建孫濟北王安失國齊人謂之王家因以為氏以黃帝為初祖虞舜為始祖追尊陳胡公為陳胡王田敬仲為田敬王濟北王安為濟北愍王立祖廟五親廟四天下姚媯陳田王五姓皆為宗室以漢髙廟為文祖廟師古曰欲法舜受終于文祖漢氏園廟祠薦如故禁剛卯金刀莽以劉之為字卯金刀也詔正月剛卯金刀之利皆不得行服䖍曰剛卯以正月卯日作佩之長三寸廣一寸四方或用玉或用金彧用桃著革𢃄佩之今有玉在者銘其一靣曰正月剛卯金刀莽所鑄之錢也卿士僉曰天人同應昭然著明其去剛卯莫以為佩除刀錢勿以為利先是莽造錯刀一直五千契刀一直五百大錢一直五十與五銖錢並行及是罷錯刀契刀及五銖錢更自别作小錢徑六分重一銖與前大錢五十者為二品欲防民盜鑄乃禁不得挾銅炭夏四月徐鄉漢縣故城在今山東登州府黃縣侯劉快膠東恭王子起兵討莽不克死之徐鄉侯劉快結黨數千人起兵于其國快兄殷故漢膠東王時改為扶崇公快攻即墨膠東國都殷閉城門自繫獄吏民距快快敗走至長廣漢縣故城在今山東登州府萊陽縣死莽禁不得賣買田及奴婢莽更名天下田曰王田奴婢曰私屬皆不得賣買其男口不盈八而田過一井者分餘田豫九族鄉黨故無田今當受田者如制度敢有非井田聖制無法惑衆者投之四裔以禦魑魅冬靁桐華大雨雹庚始建國午二年春二月莽廢漢諸侯王為民先是莽遣五威將帥每一將各置左右前後中五帥衣冠車服駕馬各如其方面色數班符命四十二篇於天下王侯官吏外及蠻夷皆授新室印綬因收故漢印綬至是還奏漢諸侯王為公者悉上印綬為民以獻符命封侯者三人故廣陽王嘉魯王閔中山王成都立五均司市錢府官令民各以所業為貢𣙜酒酤劉秀言周有泉府之官周禮有泉府收不售民貨不售則敘而置之與欲得無而欲得則官出與之莽遂立五均樂語有五均司市周禮有司市錢府即泉府官司市以四時仲月定物之賈為其市平皮命反平定物賈也民物不售者均官考驗用其本賈以取之物貴過平一錢則以平賈賣與民賤减平者聽民自相與市民欲賖貸者錢府與之每月百錢收息三錢又令民各自占注見前其所為諸取山林水澤及畜牧桑蠶工匠醫巫卜祝方技商賈皆各自占縣官除其本計其利十分之而以其一為貢敢不自占占不以實者盡沒入所取作縣官一歲作役也羲和魯匡復奏請𣙜酒酤莽從之冬十一月莽罷漢廟及諸為吏者孫建奏漢氏宗廟不當在長安城中及諸劉當與漢俱廢請皆罷之莽曰可嘉新公國師即劉秀等三十二人皆知天命勿罷賜姓曰王唯國師以女配莽子故不賜姓秀女愔配莽子臨更號定安太后曰黃皇室主太后自劉氏廢常稱疾不朝㑹時年未二十莽欲嫁之乃更號為黃皇室主欲絶之于漢令孫建世子盛飾將醫往問疾太后大怒鞭笞其傍侍御因發病不肯起十二月靁更作寶貨莽更作金黃金也銀朱提銀及他銀龜元龜尺二寸以下貝大貝四寸八分以上錢布顔師古曰布亦錢耳謂之布者言其分布流行也之品名曰寶貨凡五物金銀銅龜貝六名錢貨金貨銀貨龜貨貝貨布貨二十八品錢六品金一品銀二品四四品貝五品布十品百姓憒亂其貨不行莽知之乃但行小錢直一與大錢五十並行民皆便安漢五銖錢多以之市買莽乃下令諸挾五銖錢者投諸四裔扺罪者不可勝數于是農商失業食貨俱廢其後莽復改錢貨之法頗增損其賈直而罷大小錢更作貨布泉布二品並行令既數更名用破業而大陷于刑事在天鳯元年莽將軍甄豐豐以符命為莽更始將軍自殺大夫揚雄自投天祿閣在未央宫中下莽遂殺甄尋劉棻丁隆等數百人莽既以符命自立甄豐王舜劉秀為莽腹心安漢宰衡之號皆所共謀然非欲令莽居攝也居攝之萌出自劉慶謝囂踈逺希進者因之並作符命莽遂據以即真後又欲絶其原以神前事是時爭為符命封侯其不為者相戲曰獨無天帝除書乎陳崇白莽莽亦厭之乃使尚書驗治非五威將帥所班皆下獄而甄豐子尋復言之莽即真之後舜秀內懼而已豐素剛彊莽頗覺其不悅㑹豐子尋為京兆大尹復作符命言黃皇室主當為尋妻莽因是發怒遂收捕尋尋亡豐自殺未幾王舜亦病悸而死已捕得尋辭連劉秀子棻及丁隆秀門人等棻嘗從揚雄學作竒字時雄方校書天祿閣上使者來欲收之雄恐不能自免乃從閣上自投下幾死莽聞之以雄不知情詔勿問誅尋棻及隆等死者凡數百人流棻幽州放尋于三危殛隆于羽山皆驛車載其尸傳致云初成帝之世雄以奏賦為郎與莽及秀並列哀帝時又與董賢同官莽篡為三公權傾人主所薦莫不拔擢而雄三世不徙官及莽篡位稱功德獲封爵者甚衆雄獨以耆老久次轉為大夫恬于勢利好古樂道欲以文章成名于後世故作太元以準易法言以象論語用心于內不求于外人皆忽之惟劉秀及范逡敬焉而桓談字君山沛郡相人以為絶倫巨鹿侯芭師事之然雄自投閣之後時人為之語曰惟寂寞自投閣爰清靜作符命君子病焉上元焦竑曰漢書揚雄傳贊謂雄仕莽作符命投閣年七十一天鳯五年辛考雄至京見成帝年四十餘矣自成帝建始改元至莽天鳯五年計五十有二歲以五十二合四十餘已將近百年則與所謂年七十一者相抵牾矣又考王莽自平帝元始間始號安漢公而法言稱漢公且云漢興二百一十載自髙帝至平帝末蓋其數矣然則雄之終或在平帝末正年七十餘也世謂班固早卒曹大家傳失其實豈不然哉竑之論如此而寧都魏禮亦引證各書謂雄賣文自瞻文不虛美人多惡之及卒其怨家取法言多為竄益至劇秦美新則劉棻作也紫陽綱目特書莽大夫揚雄死是舉禇淵馮道所未嘗加者而加之矣據焦魏二家之說班史所載幾不足信今考外戚傳元后崩莽詔雄作誄雄傳贊雄投閣京師為之語其所載甚詳特所云天鳯五年卒年七十一者史文誠不免抵牾今書雄投閣事仍據班史而于其死則闕之辛始建國未三年胸奴諸部分道入塞州郡兵起莽恃府庫之富欲立威胸奴先是莽遣五威將帥至胸奴易漢故璽更其印文曰新胸奴單于章單于解故印綬奉上將軍受著新級左帥陳饒知單于必求故印即引斧椎壞之明日單于果白將帥曰漢諸侯王以下乃言章今去璽加新與臣下無别願得故印將帥以故印示之單于知己無奈何即遣使入謝然重怨恨于是勒兵于朔方塞下受車師降者與同入冦乃更名胸奴單于曰降奴服于遣孫建等分道並出募卒三十萬人先至者屯邊郡須畢具乃同時出窮追胸奴分其國土人民以為十五立呼韓邪子孫十五人皆為單于莽招誘呼韓邪諸子右犁汗王咸咸子登助三人至脅拜咸為孝單于助為順單于咸走出塞傳送登㫑至長安單于聞之怒曰先單于受漢宣帝恩不可負也今天子非宣帝子孫何以得立遣兵入雲中塞注見前大殺吏民歷告左右部諸邊王入塞殺太守都尉略吏民畜産不可勝數是時諸將在邊以大衆未集未敢出擊嚴尤諫曰臣聞胸奴為害周秦漢征之周得中策漢得下策秦無策焉今天下比年饑饉西北邊尤甚大用民力功不可必立臣伏憂之莽不聽轉兵榖如故吏士屯邊者所在放縱而內郡愁于徵發民棄城郭始流亡為盜賊莽遣中郎繡衣執法分督之皆乘便為姦撓亂州郡北邊自宣帝以來數世不見烟火之警人民熾盛牛馬滿野及莽撓亂胸奴與之搆難邊民死亡繫獲數年之間北邊虛空野有暴骨矣莽迎龔勝為太子師友祭酒勝不食而卒莽遣使者奉璽書印綬安車駟馬迎龔勝即拜為太子師友祭酒勝稱病篤使者要說至以印綬就加勝身勝輒推不受謂門人髙暉等曰吾受漢家厚恩無以報今年老矣旦暮入地誼豈以一身事二姓下見故主哉語畢遂不復飲食積十四日死是時清名之士又有琅琊紀逡齊薛方沛唐林唐尊皆以明經飭行顯名逡兩唐皆仕莽封侯莽以安車迎方方謝曰堯舜在上下有巢由今明主方隆唐虞之德小臣欲守箕山之節莽悅其言不彊致初隃麋郭欽為南郡太守杜陵蔣詡為兖州刺史亦以亷直為名莽居攝欽詡皆以病免官歸鄉里卧不出户卒于家沛國陳咸以律令為尚書見何武鮑宣死歎曰易稱見幾而作不俟終日吾可以逝矣即乞骸骨去職莽篡位召咸為掌寇大夫咸謝病不肯應三子參豐欽皆在位咸悉令解官歸閉門不出入猶用漢家祖臘人問其故咸曰我先人豈知王氏臘乎又齊栗融北海禽慶蘇章山陽曹竟皆儒生去官不仕于莽瀕河郡蝗生河决河决魏郡泛清河以東數郡先是莽恐河决為元城今縣夲漢置屬直𨽻大名府冡墓害及决東去元城不憂水故遂不隄塞禹貢錐指王莽時河决魏郡自元城東出館陶東武陽絶漯水而東北至髙唐又絶漯水東北至千乘入海以水經注所載合今輿地言之滑縣開州范縣朝城陽榖茌平禹城平原德平樂陵商河蒲臺髙苑博興利津皆王莽以後大河之所行也考黃河自周定王五年後至此乃東徙而禹貢至于大陸播為九河以下之故道遂絶焉壬始建國申四年定東西都及諸侯員數莽下書以洛陽為東都常安莽改長安曰常安為西都諸侯員千八百附城孺子嬰時當賜關內侯爵者更名附城數亦如之以俟有功諸公一同地方百里曰同有衆萬戶其餘以是為差以圖簿未定未授國邑且令受奉都內月錢數千諸侯皆困乏至有傭作者令民得賣田莽性躁擾不能無為每有所興造動欲慕古不度時宜制度又不定吏緣為姦天下謷謷陷刑者衆莽知民愁怨乃令民食王田者皆得賣之然他政悖亂刑罰深刻賦斂重數猶如故焉西南夷殺牂牁注見前大尹貉後漢書髙句驪一名貊耳貊與貉同人入邊初五威將帥出西南夷改句町音朐挺王今雲南臨安府古句町國漢武于此置縣仍封其夷人為王為侯王邯怨怒莽諷牂牁大尹周歆詐殺邯邯弟承起兵殺歆州郡攻之不能服莽又發髙句驪夫餘别種漢武滅朝鮮以高句驪為縣仍封其種人為侯今朝鮮國咸興府是其地也兵擊胸奴髙句驪不欲行彊迫之乃皆亡出塞犯邊為寇于是東北西南皆亂莽志方盛以四夷不足憂專念稽古之事後益州蠻夷亦殺其大尹莽發兵擊之㑹疾疫死者十六七越嶲蠻亦畔自立為卬榖王癸始建國酉五年春二月太皇太后王氏崩莽既改號太后為新室文母絶之于漢乃隳壞孝元廟更為太后起廟獨置孝元廟故殿以為文母纂同饌也食堂既成名曰長夀宫置酒請太后既至見廟廢徹塗地驚泣曰此漢家宗廟皆有神靈與羊洳切何治猶言干何事也而壞之且使鬼神無知何用廟為如令有知我乃人之妃妾豈宜辱帝之堂以陳饋食哉飲酒不樂而罷莽更漢家黑貂著黃貂又改漢正朔伏臘日太后令其官屬黑貂至漢家正臘日獨與其左右相對飲食至是崩年八十四葬渭陵與元帝合而溝絶之如淳曰葬于司馬門內用溝絶之焉耆西域國治員渠城去長安七千三百里殺莽都護但欽但姓欽名西域諸國以莽積失恩信焉耆先叛殺欽西城遂瓦解後天鳯四年莽遣五威將王駿等並出于西域焉考詐降駿等至伏兵龔殺之西域遂絶冬十一月彗星出甲新莽天戌鳯元年春三月壬申晦日食夏四月隕霜殺草木六月黃霧四塞秋七月大風雨雹風拔木飛北闕直城門屋瓦雹殺牛羊莽置萬國莽以周官王制之文置卒正連率大尹如太守屬令屬長如都尉州牧如三公分六鄉長安城旁六尉三輔衆縣六隊河內河東𢎞農河南潁川南陽又倣古為六服惟城惟寧惟翰惟屏惟垣九州之外曰惟藩總之為萬國後歲復變更一郡至五易名而還復其故吏民不能紀每下詔書輒繫其故名云北邊大饑莽與胸奴和親胸奴烏珠留單于死烏纍若鞮單于立即莽所拜孝單于咸用事大臣須卜當王昭君女伊墨居次云之壻勸單于與中國和親㑹緣邊大饑人相食莽遣使賀單于新立徵還諸將罷屯兵單于貪莽賂遺外不失漢家故事內實利寇掠又聞其子登前死莽前殺順單于登事在始建國四年怨恨寇虜從左地入不絶已而莽改胸奴單于為恭奴單于單于貪金幣曲聽之然寇盜如故乙天鳳亥二年春二月日中星見民訛言黃龍死民訛言黃龍隳死黃山宫在西安府興平縣中走觀者萬數莽惡之師古曰莽自謂黃德故有此妖捕繫問所從起不能得五原代郡兵起莽以制定則天下自平故鋭思于地理制禮作樂講合六經之說公卿旦入暮出論議連年不决不暇省獄訟寃結民之急務縣宰缺者數年守兼師古曰不拜正官權令人守兼一切貪殘日甚繡衣執法在郡國者並乘權勢傳知戀反相舉奏又十一公士漢公府各有掾屬莽置十一公故掾曰士分布勸農桑班時令按諸章斯時冠蓋相望郡縣賦斂遞相賕賂白黑紛然莽自見前顓權以得漢政故務自攬衆事又好變改制度政令煩多前後相乘憒眊不泄猶清也莽常御燈火至明猶不能勝尚書因是為姦寢事上書待報者連年不得去拘繫郡縣者逄赦而後出衛卒不交代者至三歲榖糴常貴邊兵二十餘萬人仰衣食縣官五原代郡尤被其毒起為盜賊數千人為輩轉入旁郡莽遣兵與郡縣擊歲餘乃定邯鄲以北大雨水深者數丈流殺數千人乙天鳳亥三年春二月地震大雨雪雪深一丈竹柏為枯夏五月莽始賦吏祿先是莽以制作未定上自公卿下至小吏皆不得俸祿至是始賦吏祿凡十五等僚祿一歲六十六斛稍以差增至四輔而為萬斛又曰古者歲穰則充其禮災害則有所損上計奉上戶口錢穀之數若今計帳也時通計天下幸無災害者大官膳羞備品即有災害以什率多少而損膳焉以什為率視災害所减多少而制分數公卿以下各分州郡國邑保其災害亦以什率多少而損其祿中都官吏謂京師諸官府也食祿者以大官膳羞備損為節莽制度煩碎如此課計不可理吏終不得祿各因官職為姦受取賕賂以自共給焉長平岸即長平坂注見前崩壅涇水莽發兵擊胸奴莽羣臣以岸崩上夀曰河圖所謂以土填水胸奴滅亡之祥也莽乃遣將擊胸奴至邊上屯秋七月戊子晦日食丁天鳯丑四年夏六月莽授諸侯茅土古者天子大社以五色土為壇凡封諸侯鑿土如其方之色苞以黃土苴以白茅于明堂莽好空言慕古法多封爵人性實吝嗇託以地理未定故且先賦菁茅蔡沈尚書集傳管子云江淮之間一茅而三脊是為菁茅四色之土顔師古曰土有五色此云四色者中央之土不以封也用慰喜封者臨淮漢郡治徐故城在今江南泗州琅邪注見前及荆州緑林兵起是時莽更設立六管鹽一酒二鐵三名山大澤四五均賖貸五銅冶六之令用富賈督之乘傳求利交錯天下因與郡縣通姦百姓愈病復下詔每一管申明科禁犯者罪至死民搖手觸禁不得耕桑繇役煩劇旱蝗相仍富者不能自别貧者無以自存于是並起為盜賊吏不能禽而覆蔽之浸淫日廣臨淮瓜田儀姓瓜田名儀等依阻㑹稽漢郡治吳今江南蘇州府吳縣是長州即今長洲縣與吳縣俱為蘇州府治琅邪吕母聚黨數千人入海中為盜其衆浸多至萬數初吕母子為海曲宰寃殺母散家財隂厚貧窮少年得百餘人遂攻殺宰以祭子墓引兵入海日海曲漢縣故城在今山東沂州府照縣荆州饑饉民衆入野澤掘鳬茈爾雅芍鳬茈注鳬茈生下田苖此龍須而細根如指黑色可食而食之更相侵奪新市後漢侯國故城在今湖北安陸府京山縣人王匡王鳳為平理諍訟遂推為渠帥衆數百人于是諸亡命者馬武字子張南陽湖陽人王常字顔卿潁川舞陽人及成丹等皆往從之藏於緑林山中數月間至七八千人又南陽張霸江夏漢郡治西陵故城在今湖北黃州府黃岡縣羊牧俱起衆皆萬人莽遣使者即赦盜賊還言盜賊復合問其故皆曰愁法禁煩苛不得舉手力作所得不足以給貢稅閉門自守又坐鄰伍鑄錢挾銅姦吏因以愁民民窮悉起為盜賊莽大怒免之或言民驕黠當誅及言時運適然且滅不久莽悅輒遷官戊天鳯寅五年春莽考吏致富者收其財以給軍吏以不得俸祿並為姦利郡尹縣宰家纍千金莽乃考諸軍吏及緣邊吏增産致富者收其家財産五分之四以助邊急開吏告其將奴婢告其主冀以禁姦而姦愈甚琅邪樊崇東海刁漢書作力子都刁出齊豎刁之後等兵起琅邪樊崇起兵于莒注見前衆百餘人羣盜以崇勇猛咸附之一歲間至萬餘人崇同郡人逄薄紅切安東海人徐宣謝祿楊音各起兵合數萬人從崇轉掠青徐間又有東海刁子都亦發兵鈔擊徐兖莽遣使者發兵擊之不能克是時關東饑旱連年刁子都等黨衆寢多至六七萬已天鳳卯六年春莽下書六歲一改元莽見盜賊多乃令太史推三萬六千歲厯紀六歲一改元下書布天下自言當如黃帝升天欲以誑耀百姓銷解盜賊人皆笑之明年改元地皇從三萬六千歲厯號也大募兵擊胸奴胸奴冦邊益甚烏纍單于死弟左賢王輿立為呼都尸道臯若鞮單于莽誘致須卜當至長安立為須卜單于胸奴怒入北邊為冦莽大募天下丁男及死罪囚吏民奴名曰豬突稀勇以為鋭卒一切稅天下吏民訾與資同三千取一令公卿以下至郡縣黃綬百官表比二百石以上黃綬皆保養軍馬多少以秩為差又博募有竒術可以攻胸奴者或言能渡水不用舟揖連馬接騎濟百萬師或言不持斗糧服食藥物三軍不飢或言能飛一日千里可窺胸奴莽雖知其不可用茍欲獲其名皆拜為理軍賜以車馬待發嚴尤諌曰胸奴可且後先憂山東莽大怒䇿免尤是歲夙夜連率韓博進長人巨毋霸霸出蓬萊海瀕長丈大十圍卧則枕鼓以鐡箸食軺車不能載三馬不能勝博以大車四馬建虎旗載之詣闕意欲以諷莽莽字巨君言毋得篡盜而霸也莽惡之留霸新豐而徵博棄市更霸姓曰巨母氏謂因文母太后而霸王符云夙夜即漢東萊不夜莽更名故城在今山東登州府文登縣庚新莽地辰皇元年秋七月大風毁莽王路堂莽改未央宫前殿曰王路堂服䖍曰如言路寢也九月大雨六十餘日巨鹿男子馬適求等謀誅莽不克死適求等謀舉燕趙兵誅莽事覺逮治黨與連及郡國豪傑死者數千人收郅惲字君章汝南西平人繫獄惲明天文厯數以漢必再受命乃上書說莽曰臣聞智者順以成德愚者逆以取害神器有命不可虛獲上天垂戒欲悟陛下令就臣位轉禍為福劉氏永享天命陛下順節盛衰取之以天還之以天可謂知命矣莽大怒即收繫詔獄㑹赦得出時卜者王况謂李焉曰漢家當復興為焉作䜟書合十餘萬言事覺莽殺之辛地皇已二年春正月莽妻死子臨謀殺莽事覺自殺初莽妻以莽數殺其子莽殺子宇事見前又先在侯國時以中子獲殺奴令自殺涕泣失明莽令太子臨居中飬焉莽妻傍侍者原碧莽幸之臨亦通焉恐事泄遂謀共殺莽㑹莽妻病死事覺收原碧考問具服莽欲祕之殺案事使者賜臨藥臨不肯飲自刺死臨妻愔亦自殺秋隕霜殺菽關東大饑蝗莽毁漢高廟莽惡高廟神靈遣虎賁武士入廟四面提擊斧壞戶牖桃湯赭鞭鞭灑屋壁令輕車校尉居其中南郡秦豐兵起豐聚衆萬人平原女子遲昭平遲氏商賢人遲任之後亦聚數千人在河阻中莽問羣臣禽賊方略皆曰此天囚行尸命在漏刻故左將軍公孫祿徴來與議祿曰太史令宗宣宗氏晉伯宗之後伯宗出於宋桓公以凶為吉紊亂天文太傅唐尊飾虛僞以偷名位尊以國虛民貧咎在奢泰乃身短衣小褎乘牝馬柴車藉槀以瓦器飲食莽說之封尊為平化侯國師劉秀顚倒五經毁師法張邯孫陽造井田使民棄土業魯匡設六管以窮工商崔發阿諛取容令下情不上通宜誅此數子以慰天下又言胸奴不可攻當與和親恐新室憂不在胸奴而在封域之中也莽怒使虎賁扶祿出莽以田况為青徐二州牧既而罷之况素果敢發民年十八以上四萬餘人授與庫兵與刻石為約樊崇等聞之不敢入界後况自請出界擊賊所嚮皆破莽令况領青徐二州牧事時莽多出將帥遣使者傳相監趣郡縣苦之反甚于賊况因上言請盡徵還乘𫝊諸使者以休息郡縣委任臣况以二州盜賊必平定之莽畏惡况遣使者賜况璽書因令代監其兵遣况西詣長安况去齊地遂敗壬地皇午三年關東人相食夏莽遣太師王匡將軍亷丹擊赤眉樊崇匡敗走丹死是時赤眉樊崇等衆既寖盛乃相與為約殺人者死傷人者償創及聞太師王匡更始將軍亷丹討之恐其衆與莽兵亂乃皆朱其眉以相識别由是號曰赤眉匡丹合將鋭士十餘萬人所過放縱東方為之語曰寧逢赤眉不逢太師太師尚可更始殺我時赤眉别校董憲東海人等衆數萬人在梁郡匡丹引兵進戰兵敗匡走丹戰死先是莽以書讓丹丹召其掾馮衍示之衍曰海內懷漢德甚于詩人思召公人所鼓舞天必從之為將軍計莫若屯據大郡鎮撫吏士興社稷之利除萬人之害俾功烈著于時而不滅丹不聽孫馮衍字敬通奉世曽緑林兵分為下江新市兵荆州平林漢鄉名晉置縣唐省故城在今湖北德安府隨州兵起應之先是莽荆州牧討緑林王匡等迎擊大破牧軍遂攻拔竟陵漢縣今改京山屬湖北安陸府安陸漢縣今為德安府治多略婦女還入緑林中至五萬餘口㑹疾疫死者大半乃各分散王常等西入南郡號下江兵王匡等北入南陽號新市兵皆自稱將軍匡等進攻隨即今隨州平林人陳牧廖湛聚衆千餘人號平林兵以應之莽遣納言大將軍嚴尤秩宗大將軍陳茂擊破下江兵成丹等收散卒復戰大破之流民數十萬入關莽置養贍官稟食之使者監領與小吏共盜其稟餓死者什七八漢宗室劉縯及弟秀起兵舂陵漢侯國後漢改章陵縣故城在今湖北襄陽府棗陽縣興復帝室光武事始此初長沙定王發景帝子母唐姬所出微無寵故王卑濕貧國生舂陵節侯買顔師古曰漢紀言元朔五年以零陵泠道之舂陵鄉封長沙王子買為舂陵侯至考侯仁以春陵下濕上書請徙南陽元帝許之以蔡陽之白水鄉徙仁為舂陵侯買生欎林注見前太守外外生巨鹿都尉回後漢書城陽王傳節侯買子戴侯熊渠熊渠子孝侯仁徙封南陽遂與從弟回及宗族往家焉回生南頓注亦見前令欽欽娶湖陽漢縣故城在今南陽府唐縣樊重女生三男縯字伯升仲秀字文叔縯性剛毅慷慨有大節常憤憤懷復社稷之慮傾身破産交結天下雄俊秀美須眉隆凖日角嘗受尚書長安略通大義性勤稼穡縯常非笑之比于髙祖兄仲仲事見前秀嘗過穰注見前蔡少公少公頗學圖䜟言劉秀當為天子或曰是國師公劉秀乎秀戲曰何繇知非僕耶坐者大笑宛人李守好䜟記常謂其子通字次元曰劉氏當興李氏為輔及新市平林兵起南陽騷動通從弟軼字季文謂通曰今四方擾亂漢當復興南陽宗室獨劉伯升兄弟泛愛容衆可與謀大事通笑曰吾意也㑹秀賣榖于宛通遣軼迎秀與約結定謀使歸舂陵舉兵相應于是縯召諸豪傑計議曰王莽暴虐百姓分崩今枯旱連年兵革並起此亦天亡之時復髙祖之業定萬世之秋也衆皆然之乃分遣親客于諸縣起兵續自發舂陵子弟子弟懼皆亡匿曰伯升殺我及見秀絳衣大冠皆驚曰謹厚者亦復為之乃稍自安凡得七八千人部署賔客自稱柱天都部秀時年二十八李通未發事覺守及家屬皆坐死縯招說新市平林兵與其帥王鳯陳牧西擊長聚秀初騎牛殺新野尉乃得馬進屠唐子鄉在唐縣以唐子山名又殺湖陽尉進拔棘陽漢縣故城在今南陽府新野縣李軼鄧晨新野人字偉卿皆將賔客來㑹既而漢兵與莽守將甄阜梁邱賜戰不利縯欲攻宛至小長安與阜賜戰兵敗新市平林兵皆欲解去南小長安城在今陽府南陽縣㑹下江兵五千餘人至宜秋聚名在唐縣縯與秀造其壁見王常說以合縱之利常悟為餘將言之皆曰大丈夫既起當各自為主何故受人制乎常曉之曰王莽苛酷失百姓心民之謳吟思漢非一日也民所怨者天所去民所思者天所與今南陽諸劉舉宗起兵觀其來議者皆有深計大慮王公之才與之并合必成大功諸將乃曰無王將軍吾屬幾陷于不義即引軍與漢軍及新市平林合自是諸部齊心鋭氣益壯縯大饗軍士休卒三日十二月晦潛師夜起襲取藍鄉在新野縣盡獲阜賜輜重明年春正月攻阜賜誅之又破莽將嚴尤陳茂于淯陽亦曰育陽漢縣故城在今南陽縣遂圍宛先是青徐賊衆雖數萬人訖無文書號令旌旗部曲及漢兵起皆稱將軍攻城略地移書稱說莽聞之始懼冬十一月有星孛于張張六星在天廟北為周分癸漢淮陽王元更始元年之更始雖立綱目以不成君未例仍用分注紀年今依又綱目于更始元年之上書曰漢帝元通鑑則書淮陽王以光武所封也今依通鑑春二月新市平林諸將共立更始將軍劉元為皇帝大赦改元舂陵戴侯曾孫元字聖公在平林兵中號更始將軍時漢兵已十餘萬諸將議以兵多而無所統一欲立劉氏以從人望南陽豪傑等皆欲立縯而新市平林將帥憚縯威明貪元懦弱先共定策立之諸將召縯示其議縯曰諸將軍欲尊立宗室甚厚然今赤眉起青徐聞南陽立宗室赤眉復有所立莽未滅而宗室相攻是疑天下而自損權非所以破莽也不如且稱王以號令若赤眉所立者賢相率而往從之若無所立破莽降赤眉然後舉尊號亦未晚也諸將多曰善張卬拔劔擊地曰疑事無功今日之議不得有二衆從之二月朔設壇場于淯水俗曰白河源出嵩縣雙雞嶺東徑南召南陽新野至湖北襄陽入于漢上元即皇帝位南面立朝辱臣羞愧流汗舉手不能言大赦改元以縯為大司徒秀為太常偏將軍由是豪傑失望三月秀徇下昆陽定陵郾五月縯拔宛更始入都之城昆陽故城在今南陽府葉縣定陵故城在許州郾縣郾即郾城夏六月劉秀大破莽兵于昆陽下誅王尋莽聞更始立大懼漢兵言莽鴆殺平帝莽乃㑹公卿以下開所為平帝請命金縢之策泣以示羣臣乃遣其司徒王尋司空王邑大發州郡兵徵諸明兵法六十三家以備軍吏以長人巨毋霸為壘尉中壘校尉又驅諸猛獸虎豹犀象之屬以助威武邑至洛陽州郡兵㑹者四十二萬人號百餘萬旌旗輜重千里不絶五月出潁川與嚴尤陳茂合諸將見兵盛皆反走入昆陽惶怖欲散歸諸城劉秀曰今兵榖既少而外寇彊大并力禦之功庶可立如欲分散勢無俱全今不同心膽共舉功名反欲守妻子財物邪諸將怒㑹候騎還言大兵且至城下諸將迫急秀復為圖畫成敗乃皆曰諾時城中唯八九千人秀使王鳯王常守昆陽夜與李軼等十三騎出城南門于外收兵初秀常為舂陵家訟逋租于嚴尤尤見而竒之及是城中出降尤者言秀不取財物但㑹兵計策尤笑曰是美須眉者耶何為乃若是尋邑縱兵圍昆陽鉦鼓之聲聞數十里或為地道衝輣撞城衝陷陳車輣有樓車以之撞城積弩亂發矢下如雨城中負户而汲鳯等乞降不許尋邑自以功在漏刻不以軍事為憂秀至郾定陵悉發諸營兵諸將貪惜財物欲分兵守之秀曰今若破敵珍寶萬倍大功可成如為所敗首領無餘何財物之有乃悉發之秀自將步騎千餘為前鋒去大軍四五里而陳尋邑遣兵數千合戰秀奔之斬首數十級諸將喜曰劉將軍平生見小敵怯今見大敵勇甚可怪也且復居前請助將軍秀復進尋邑兵却諸部共乘之斬首數百千級連勝遂前諸將膽氣益壯無不一當百秀乃與敢死者三千人從城西水上衝其中堅尋邑陳亂漢兵乘鋭奔之遂殺尋城中亦鼓譟而出中外合勢震呼動天地莽兵大潰走者相騰踐伏尸百餘里㑹大雷風屋瓦皆飛雨下如注滍川出魯山縣大吳嶺東徑葉縣舞陽至襄城入汝盛溢虎豹皆股戰士卒溺死以萬數水為不流邑尤茂輕騎乘死人渡水逃去盡獲其軍實輕重不可勝算舉之連月不盡或燔燒其餘于是海內豪傑翕然響應皆殺其牧守自稱將軍用漢年號以待詔命旬月之間遍于天下劉秀徇潁川馮異字公孫潁川父城人以五縣降秀徇潁川屯兵巾車鄉在今河南汝州寶豐縣郡掾馮異監五縣為漢兵所獲異曰異有老母在父城即今寶豐縣願歸據五城以報德秀許之異歸謂父城長苗萌曰諸將多暴橫獨劉將軍所到不虜略觀其言語舉止非庸人也遂與苖萌率五縣以降更始殺大司徒縯以劉秀為破虜大將軍綱目于更始綱特書名目仍書年號今以綱從目皆書更始新市平林諸將以縯兄弟威名益盛隂勸更始除之縯部將劉稷勇冠三軍聞更始立怒曰本起兵圖大事者伯升兄弟也今更始何為者邪以為將軍又不肯拜更始乃陳兵收稷將誅之縯固爭李軼朱鮪因勸更始并殺縯秀自父城馳詣宛謝司徒官屬迎弔秀秀不與交私語惟深引過而己未嘗自伐昆陽之功又不敢為縯服喪飲食言笑如平常更始以是慙拜秀為破虜大將軍封武信侯莽將軍王涉國師劉秀自殺道士西門君惠謂涉曰䜟文劉氏當復興國師公姓名是也涉遂與秀謀劫莽降漢謀泄皆自殺莽以軍師外破大臣內畔左右亡所信憂悶不能食但飲酒啖鰒魚讀軍書倦因馮凡寐不復就枕矣成紀注見前隗囂隗氏出于赤狄囂字李孟起兵應漢成紀隗崔隗義同起兵以應漢崔兄子囂素有名好經書共推為上將軍囂聘平陵昭帝陵因以為縣故城在成陽方望以為軍師望說囂立廟祀髙祖太宗世宗稱臣執事殺馬同盟移檄郡國數莽罪惡擊言莽鴆殺孝平皇帝篡奪其位矯託天命僞作符書欺惑衆庶震怒上帝楚越之竹不足以書其惡因數莽逆天逆地逆人之大罪勒兵十萬擊殺莽雍州牧安定大尹分遣諸將徇隴西武都金城武威張掖酒泉敦煌注俱見前皆下之公孫述字子陽扶風茂陵人起兵成都初述為清水今縣本漢置屬甘肅秦州長有能名遷𨗳江莽改蜀郡曰𨗳江郡卒正治臨卭漢縣今四川卭州是南陽宗成等起兵徇漢中以應漢衆數萬人述遣使迎之成等至成都虜掠暴橫述謂郡中豪傑曰天下同苦新室思劉氏久矣故聞漢將軍到馳迎道路今百姓無辜而婦子係獲此冦賊非義兵也乃詐為漢使者拜述將軍兼益州牧擊成殺之而并其衆劉望長沙頃王駙駒之後稱帝于汝南漢郡治平輿平輿注見前更始遣兵擊殺之誅嚴尤陳茂故鍾武故城在汝寧府信陽州侯劉望起兵汝南遂自立為天子嚴尤陳茂自昆陽戰敗後往歸之望以尤為大司馬茂為丞相更始遣將軍劉信擊殺望并誅尤茂遣上公王匡攻洛陽大將軍申屠建攻武關九月建入長安孝平皇后自焚崩衆共誅莽傳首詣宛更始遣王匡攻洛陽申屠建李松攻武關三輔震動析漢縣故城在今南陽府內鄉縣人鄧曄于匡起兵應漢莽憂不知所出乃率羣臣至南郊陳符命本末仰天大哭氣盡伏而叩頭諸生小民旦夕㑹哭拜將軍九人皆以虎為號將精兵數萬以東時省中黃金尚六十餘萬斤他財物稱是莽賜九虎士人四千錢衆無鬬意至華隂回溪亦曰回阮在河南府永寧縣拒隘自守匡曄擊之敗走曄南出閿鄉今縣本漢置屬河南陜州開武關迎漢兵以𢎞農掾王憲為校尉將數百人北渡渭至瀕陽注見前所過迎降諸縣大姓各起兵稱漢將率衆隨憲李松等引軍至華隂而長安旁兵四㑹城下爭欲先入城莽赦囚徒授兵使史諶將之度渭橋皆散走衆兵發掘莽妻子父祖冢燒其棺槨及九廟明堂辟雍火照城中九月朔兵入明日城中少年燒作室門工徒出入之門藍未央宫之便門也火及掖庭黃皇室主曰何面目以見漢家自投火中死莽避火宣室前殿火輒隨之莽旋席隨斗柄初莽鑄威斗以五石銅為之若北斗欲以厭勝衆兵司命負之出在前入在旁而坐曰天生德于豫漢兵其如豫何又明日羣臣扶莽之漸臺此未央宫漸臺在滄池中建章漸臺在太液池中程大昌曰凡臺之環浸于水者皆云漸臺衆兵上臺商人杜吳殺莽校尉公賔就公賔氏出魯大夫公賔庚之後就名也斬莽首軍人分莽身節解臠分之就持詣王憲憲自稱漢大將軍城中兵數十萬皆屬焉居二日李松等入長安趙萌申屠建亦至以王憲得璽綬不上多挾宮女建天子鼓旗收斬之傳莽首詣宛縣于市百姓共提擊之或切食其舌史臣曰王莽始起外戚折節力行以要名譽及居位輔政勤勞國家豈所謂色取仁而行違者耶至竊位南面顛覆之勢險于桀紂而莽晏然自以黃虞復出乃始恣睢奮其威詐毒流諸夏亂延蠻貊四海囂然逹近俱發城池不守肢體分裂自書傳所載亂臣賊子考其禍敗未有如莽之甚也昔秦燔詩書以立私議莽誦六藝以文姦言同歸殊途俱用滅亡皆聖王之驅除云爾冬十月更始北都洛王匡拔洛陽誅莽守將王匡哀章更始將都之以劉秀行司𨽻校尉使前修宫府秀乃置僚屬作文移從事司察一如舊章時三輔吏士東迎更始見諸將過皆冠幘劉昭曰秦作絳袙為武將首飾漢加其顔題名之曰幘貴賤皆服之文者長耳武者短耳而服婦人衣諸于袿衣也繡镼其物反半臂也莫不笑之及見司𨽻僚屬皆歡喜不自勝老吏或垂涕曰不圖今日復見漢官威儀由是識者皆屬心焉更始遂北都洛樊崇降漢既而逃歸更始遣使降赤眉樊崇等聞漢室復興留其兵自將渠帥二十餘人隨使者至洛陽皆封為列侯未有國邑而留衆稍離畔乃復亡歸分其衆為二部崇與逄安為一部徐宣謝祿楊音為一部崇安拔長社擊殺宛令宣祿等亦拔陽翟擊殺河南太守長社漢縣故城在今河南許州莽廬江注見前連率李憲潁川許昌人自稱淮南王莽末江賊王州公等起衆十餘萬攻掠郡縣莽以憲為偏將軍廬江連率擊破之莽既誅憲遂據郡自稱淮南王封劉永為梁王永故梁王立之子立在平帝時坐與帝外家衛氏交通為莽所殺孝王八世孫也首詣洛陽更始紹封為梁王都睢陽後永見更始政亂舉兵攻下濟隂山陽等郡凡得二十八城又拜賊帥西防故城在今山東曹州府單縣佼彊佼姓彊名東海董憲時起兵據本郡琅邪張步宇文公不其人漢兵起步亦聚衆數千自為五威將軍遂據本郡皆為將軍與之連兵遂專據東方以劉秀行大司馬事遣徇河北更始欲令大將徇河北大司徒賜更始從兄字子琴言諸家子獨有文叔可用朱鮪等以為不可賜深勸之乃以秀行大司馬事持節北渡河鎮慰州郡秀所過考察官吏黜陟能否平遣囚徒除莽苛政復漢官名吏民喜悅爭持牛酒迎勞秀皆不受南陽鄧禹字仲華新野人杖策追秀及于鄴秀曰我得專封拜生逺來寧欲仕乎禹曰不願也秀曰即如是欲何為禹曰但願明公威德加于四海禹得效其尺寸垂功名于竹帛耳秀笑因留宿間猶私也語禹進說曰今山東未安赤眉之屬動以萬數更始常才不自聽斷諸將皆庸人屈求勿反起志在財帛非有深慮逺圖欲尊主安民者也明公素有盛德大功為天下所嚮服為今之計莫如延攬英雄務悅民心立髙祖之業救萬民之命天下不足定也秀大悅因令禹常宿止于中與定計議每任使諸將多訪於禹皆當其才初秀自兄縯之死每獨居輒不御酒肉枕席有涕泣處主簿馮異獨叩頭寬譬秀止之曰卿勿妄言至是異進說曰更始政亂百姓無依人久饑渴易為充飽宜分遣官屬循行郡縣宣布惠澤秀納之騎都尉耿純謁秀于邯鄲退見官屬將兵法度不與他將同遂自結納獻馬及縑帛宋耿純字伯山巨鹿子人以劉賜為丞相令入關修宗廟宫室冬十二月王郎一曰王昌邯鄲人稱帝于邯鄲故趙繆王名元景帝七世孫子林言于大司馬秀曰赤眉今在河東決河水灌之百萬之衆可使為魚秀不答去之真定注見前林于是以卜者王郎為成帝子子輿初王莽時有自稱為成帝子子與者莽殺之郎緣是詐稱矣子與林素任俠于趙魏間與郎親善遂信之與趙國大豪李育張參等入邯鄲立郎為天子林為丞相育為大司馬參為大將軍徇下幽冀移檄州郡檄言聖公未知且持帝號翟義不死詣行在所于是趙國以北遼東以西望風響應甲更始申二年春正月大司馬秀北徇薊今順天府大興縣以耿弇字伯昭扶風茂陵人為長史秀以王郎新盛乃北徇薊時耿况字俠游為上谷大守初更始分遣使者徇郡國曰先降者復爵位至上谷况上印綬使者納之一宿無還意功曹冦恂勒兵入責使者首墮大信召况至進取印綬帶况使者不得已承制詔之冦氏蘇忿生為周司冦其後以官為氏恂字子翼上谷昌平人遣其子弇詣長安弇時年二十一至宋子漢縣故城在今直𨽻趙州㑹王郎起弇聞大司馬在盧奴注見前乃馳北上謁秀留署長史與俱北至薊令功曹王霸字元伯潁川潁陽人至市中募人擊王郎市人皆大笑以手邪揄音耶喻之霸慚懅而退秀將南歸弇曰今兵從南方來不可南行漁陽太守彭寵公邑人彭寵字伯通宛人與鄉人吳漢共亡命漁陽更始立韓鴻徇北州承制拜寵行漁陽太守事以漢為安樂令吳漢字子顔宛人漁陽注見前安樂漢縣故城在今順天府密雲縣上谷太守即弇父也發此兩郡控弦萬騎邯鄲不足慮也秀官屬皆曰死尚南首奈何北行入囊中秀指弇曰是我北道主人也二月更始遷都長安三輔既平申屠建李松迎更始遷都長安時長安惟未央宫被焚其餘宫室供帳太倉武庫官府市里不改于舊更始既至居長樂宫升前殿即吏以次列庭中更始羞怍俯首刮猶摩也席不敢視諸將後至者更始間虜掠得幾何左右侍官皆宮省久吏驚愕相視李松趙萌請悉王諸功臣朱鮪不可更始乃先封諸宗室然後立諸功臣皆為王以鮪為左大司馬鮪封膠東王辭不受與李軼等軼封舞隂王鎮撫關東李松為丞相趙萌為右大司馬共秉內政更始納趙萌女為夫人故委政于萌日夜飲宴後庭羣臣欲言事輒醉不能見時不得已乃令侍中坐帷內與語萌專權自恣羣小膳夫皆濫受官爵長安為之語曰竈下養中郎將爛羊胃騎都尉爛羊頭關內侯諸將在外者皆專行誅賞各置牧守州郡交錯不知所從由是關中離心四海怨畔薊城反應王郎大司馬秀走信都注見前和戎一作和成王莽分巨鹿郡置發兵擊邯鄲故廣陽王名嘉武帝五世孫廣陽國治薊子接起兵薊中以應郎城內擾亂于是秀趣駕出城晨夜舍猶止也食道傍不敢入城邑至蕪蔞亭在今直𨽻深州饒陽縣東北俗曰蕪蔞社時天寒烈馮異上豆粥明旦秀謂諸將曰昨得公孫豆粥飢寒俱解至饒陽今縣夲漢置官屬皆乏食秀自稱邯鄲使者入傳舍吏方進食從者飢爭奪之傳吏疑其僞乃椎鼓數十通紿言邯鄲將軍至從者皆失色秀开車欲馳既而懼不免徐還坐曰請邯鄲將軍入久乃駕去晨夜兼行蒙犯霜雪靣皆破裂至呼一作滹沱河源出山西代州繁峙縣泰戲山由欣州平定徑直𨽻之正定保定河間天津之境其下流亦曰子牙河候吏還白水流澌氷澌也無船不可以濟秀使王霸往視之霸恐驚衆還即詭曰氷堅可渡遂前至河河氷適合乃渡未畢數騎而氷解至南宫今縣夲漢置屬直𨽻冀州遇大風雨入道傍空舍馮異抱薪鄧禹爇火秀對竈燎衣馮異復進麥飯至下博漢縣故城在今深州惶惑不知所之有白衣老人指曰努力信都為長安城守去此八十里秀即馳赴之時郡國皆已降王郎獨信都太守任光字伯卿南陽宛人和戎太守邳彤風俗通奚仲為夏車正封于邳其後以為氏彤字偉君信都人不肯從光以孤城獨守恐不能全聞秀至大喜開門迎謁吏民皆呼萬歲邳彤亦自和戎來㑹議者多言可因信都兵自送西還長安邳彤以為不可彤曰吏民歌吟思漢久矣王郎假名因勢驅集烏合之衆非有根夲之固明公奮二郡之兵以討之何患不克今釋此而歸豈徒空失河北必更驚動三輔墮損威重非計之得者也且明公無征伐之意則雖信都之兵猶難㑹也何者明公既西則邯鄲勢成民不肯捐父母背成主千里而從公其離散亡逃可必也秀乃止秀以二郡兵弱光乃發傍縣得精兵四千人秀拜光彤大將軍將兵以從光多作檄文曰大司馬劉公將城頭子路刁子都兵百萬衆從東方來擊諸反虜城頭子路者東平人爰曾字子路起兵盧城頭因號焉衆至二十餘萬刁子都即前起兵東海者也秀先欲依此二人光故假以為檄吏民得檄轉相告語劉植字伯先巨鹿昌城人耿純各率其宗親子弟迎秀衆稍合至數萬人北擊中山漢國今直𨽻定州拔盧奴所過發奔命兵移檄邊部共擊邯鄲郡縣復響應時真定王陽起兵附王郎衆十餘萬秀遣劉植說降楊因納楊甥郭氏為夫人以結之為真定王楊漢書作陽武帝封常山憲王舜子平真定王傳國五世至陽王莽時國除南擊元氏今縣夲漢置屬直𨽻正定府房子漢縣故城在今直𨽻趙州高邑縣皆下因入趙界時王郎大將李育屯柏人注見前進戰大破之育還保城攻之不下于是引兵拔廣阿漢縣故城在今趙州隆平縣延岑字叔牙南陽人據漢中漢中王嘉舂陵考侯仁之孫字孝孫更始封為王擊降之岑起武當漢縣以武當山名山在湖北襄陽府均州南今州北有延岑城岑所築遂據漢中復略南陽漢中王嘉擊破之于冠軍霍去病所封邑注見前岑乃降嘉都南鄭注見前有衆數十萬校尉賈復字君文南陽冠軍人說曰今天下未定而大王安守所保所保得無不可保乎嘉曰卿言大非吾任也大司馬在河北必能相用乃為書薦復及長史陳俊字子昭南陽西鄂人于秀秀以復為將軍俊為掾時祭遵為秀軍市令秀舍中兒犯法遵格殺之秀怒將收遵主簿陳副諫曰明公常欲軍衆整齊今遵夲法不避是教令所行也乃貰之以為刺姦將軍謂諸將曰當備祭遵吾舍中犯法尚殺之必不私諸卿也潁祭氏周祭伯之後以國為氏遵字弟孫潁川陽人夏四月大司馬秀以上谷漁陽兵進拔邯鄲斬王郎初薊中之亂耿弇與大司馬秀相失乃北走昌平漢縣今為州屬順天府就其父况請擊邯鄲况以邯鄲方盛力不能獨拒寇恂曰東約漁陽同心合衆邯鄲不足圖也况遣恂約彭寵寵吏吳漢蓋延字巨卿漁陽要陽人王梁字君嚴漁陽安陽人方勸寵從秀㑹恂至寵乃發步騎三千人使漢延梁將之攻薊斬即將趙閎恂自漁陽還與長史景丹字孫卿馮翊櫟陽人及弇將兵俱南與漁陽軍合所過擊斬王郎大將以下三萬級定縣二十有二前及廣阿聞城中車騎甚衆景丹問何兵曰大司馬劉公也諸將喜即進城中初傳言二郡兵為邯鄲來秀自勒兵登城問之耿弇拜于城下具言發兵狀秀乃悉召入笑曰邯鄲將帥數言我發漁陽上谷兵吾聊應言我亦發之何意二郡良為吾來方與士大夫共此功名耳乃以丹等為偏將軍加况寵大將軍封列侯㑹更始遣尚書令謝躬字子張南陽人率六將軍討郎不能下秀與合軍圍巨鹿郎太守王饒城守月餘連攻不堯耿純曰久守王饒士衆疲敝不如及大兵精鋭進攻邯鄲若王郎已誅巨鹿不戰自服矣秀從之四月進軍邯鄲連戰破之郎遣杜威請降威稱郎實成帝遺體秀曰設使成帝復生天下不可得况詐子輿乎威求萬戶侯秀曰顧得全身可矣威怒而去秀急攻之遂拔邯鄲郎亡走王霸追斬之秀收文書得吏人與郎交關謗毁者數千章秀不省㑹諸將燒之曰令反側子自安秀部分吏卒皆言願歸大樹將軍大樹將軍者馮異也異為人謙退不伐每所止舍諸將並坐論功異常獨屏樹下故軍中號曰大樹將軍更始立大司馬秀為蕭注見前王更始遣使立秀為蕭王令罷兵諸將有功者詣行在所遣苗曽為幽州牧韋順蔡充為上谷漁陽太守蕭王居邯鄲宫晝卧溫明殿耿弇入請歸上谷益兵王曰河北略平益兵何為弇曰王郎雖破天下兵革方始聖公不能辦也敗必不久王起坐曰卿失言吾斬卿弇曰大王哀厚弇如父子故敢披赤心王曰我戲卿耳何以言之弇曰百姓患苦王莽復思劉氏聞漢起兵莫不歡喜如去虎口得歸慈母今更始為天子而諸將擅命於山東貴戚縱橫於都內元元叩心更思莽朝是以知其必敗也公功名已著以義征伐天下可傳檄而定天下至重不可令他姓得之聞使者從東方來欲罷兵不可從也王乃辭以河北未平不就徵始二于更始時虎牙將軍銚期亦勸王毋就徴期初從王徇薊王出薊城時百姓遮道不得行期奮㦸瞋目大呼左右曰䟆衆皆披靡及是進說王笑曰卿欲遂前趕耶蹕銚音姚期字次况潁川郟人趕與同惟天子得稱秋蕭王擊降銅馬諸賊南下河內是時諸賊銅馬大彤髙湖重連鐵脛大搶尤來上江青犢五校檀鄉五幡五樓富平獲索等或以山川土地為名或以軍容彊盛為號各領部曲衆合數十百萬人所在寇掠蕭王將擊之乃拜吳漢耿弇俱為大將軍持節發幽州突騎苗曽不從漢收斬之弇亦斬韋順蔡充悉發其衆秋王擊銅馬于鄡漢書作􅀈音若么反縣屬巨鹿郡故城在今直𨽻保定府束鹿縣吳漢將突騎來㑹王堅營自守絶賊糧道賊夜遁去王追擊大破之受降未盡而髙湖重連從東南來與銅馬餘衆合王復與大戰悉破降之封其渠帥為列侯降者猶不自安王知其意敕令各歸營勒兵乃自乘輕騎案行部陳降者更相語曰蕭王推赤心置人腹中安得不投死乎由是皆服悉以分配諸將衆遂數十萬于是關西號蕭王曰銅馬帝赤眉别帥與青犢上江大彤鐵脛十餘萬衆在射犬故城在今河南懷慶府河內縣王擊破之南徇河內太守韓歆降歆同邑人岑彭漢兵初起時守宛攻之月餘食盡乃降諸將欲殺之大司徒縯曰彭堅心執守是其節也今舉大事當封之以勸後乃封彭歸德侯及縯遇害彭授淮揚都尉道阻不得之官乃依歆河內歆既降王召見彭彭曰幸䝉司徒見全未有報德今復遭遇願出身自效王深接納之岑古岑子國之後彭字君然南陽棘陽人謝躬數欲襲王未發率兵數萬屯鄴王遣邀尤來躬兵大敗王使吳漢岑彭襲鄴躬還漢等斬之其衆悉降明年蕭王擊尤來大搶五愓連破之乘勝輕進反為所敗歸保范陽軍中不見王或言已殁諸將不知所為吳漢曰卿曹努力王兄子在南陽何憂無主衆乃定賊雖戰勝而素懾大威夜逐遁去大軍復進斬首三千餘級賊入漁陽王遣吳漢等十二將軍迢擊之破散略盡賈復與五校戰傷創甚王大驚曰我所以不令復别將者以其輕敵也果然失吾名將聞其婦有孕生女邪我子娶之生男邪我女嫁之不令其憂妻子也復病尋愈冬赤眉西攻長安赤眉雖數戰勝而疲敝愁泣思欲東歸樊崇等慮衆東向必散不如西攻長安于是崇逢安自武關徐宣謝祿楊音從陸渾武關陸渾注俱見前兩道俱入更始遣蘇茂等拒之軍敗赤眉遂進至湖注亦見前秦豐據黎邱故城在今湖北襄陽府宜城縣自稱楚黎王章懷曰豐木黎邱鄉人黎邱楚地故稱楚黎王豐自莽末起兵攻得十有餘縣遂自稱為王時汝南田戎攻陷夷陵注見前自稱掃地大將軍與豐合豐以女妻之蕭王遣鄧禹將兵入關冦恂守河內馮異拒洛陽自引兵徇燕趙蕭王將北徇燕趙度赤眉必破長安乃拜鄧禹為前將軍將兵西入關時朱鮪李軼守洛陽鮑永字君長宣之子更始徴拜尚書僕射安集河東屯太原田邑為上黨太守在并州王以河內險要富實欲擇守者而難其人問于鄧禹禹曰寇恂文武備足有牧民禦衆之才乃拜恂河內太守謂曰昔髙祖留蕭何關中吾今委公河內當給足軍糧率厲士馬防遏他兵勿令北渡拜馮異為孟津將軍統兵河上以拒洛陽王乃引兵而北恂調餱糧治器械以供軍未嘗乏絶乙三年更是年依前楚漢之例一歲兩係六月以前為始三年光武即位以後為建武元年春正月平陵人方望以前孺子嬰稱帝于臨涇漢縣故城在今甘肅平涼府鎮原縣更始遣兵擊斬之方望度更始必敗更始徴隗囂囂將行望止之不聽遂辭囂而去與安陵人弓林弓魯大夫叔弓之後以名為氏等求得前定安公嬰于長安將至臨涇立之聚衆數千人望為丞相林為大司馬更始遣李松擊破皆斬之夏四月公孫述稱帝于蜀先是更始遣李寶徇蜀漢公孫述遣其弟恢迎擊于綿竹漢縣故城在今四川綿州德陽縣大破走之述遂自立為蜀王民夷皆附至是功曹李熊說述宜稱天子述遂即帝位號成家改元龍興熊為大司徒述弟光為大司馬恢為大司空朱鮪殺李軼攻溫平隂漢縣故城在今河南府孟津縣馮異冦恂擊破之馮異遺李軼書為陳禍福勸令歸附軼知長安已危而以伯升之死心不自安乃報異書而不復與爭鋒故異得北攻天井關在今山西澤州府鳯臺縣關南有天井泉三所南下成臯以東降者十餘萬斬河南太守武勃軼閉門不救異見其信效具以白王王報曰季文李軼字多詐人不能得其要領乃故宣露其書令朱鮪知之鮪怒使人刺殺軼由是城中乖離多有降者鮪遣其將攻溫自將攻平陰以綴異冦恂聞之勒兵馳出移告屬縣發兵㑹溫軍吏諫曰宜待衆軍畢集乃出恂曰溫郡之藩蔽失溫則郡不可守遂馳赴之將戰㑹異遣救諸縣兵皆至恂令士卒乘城鼓譟大呼劉公兵到奔擊破之異亦渡河擊鮪鮪走異與恂追至洛陽環城一匝而歸御批歷代通鑑輯覽卷二十

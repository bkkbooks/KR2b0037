front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷六十九五季壬晉天福七年六月晉王室婁立漢寅劉珹光天元年是嵗國三鎮春正月晉以杜重威為順國歐史綱目俱作順徳今依通鑑節度使
  hash: sha256:d19ca3a1c2f7f88bed1c7bb3bcd68986cc3d0b4414981f5ab72feba77bdce384

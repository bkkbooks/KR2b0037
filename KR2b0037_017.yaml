body:
  text: 吕氏祖謙曰宣帝標核名實信賞必罰功光祖宗業垂後嗣然用恭順而啓元帝之信宦者貴許史而啓成帝之任外戚殺趙韓楊而啓哀帝之誅大臣故論其功則為中興之君論其過亦為基禍之主大赦是月以三輔太常郡國公田及苑可省者振業貧民賦貸種食顔師古曰賦給與之也貸假也三月立皇后王氏即王政君后父禁有四女八男后次女也長男鳯字孝卿次曼字元卿談字子元崇字少子商字子夏立字子叔根字稚卿逢時字季卿禁多取傍妻惟鳯崇與后同母母李禁適妻任后任身夢月入其懷後以妬出后既立禁封平陽侯食邑東郡永光二年禁卒鳯嗣侯夏六月大疫詔大官省膳減樂府員省苑馬以振困乏秋九月關東大水飢關東郡國十一大水飢人或相食轉旁郡錢榖以相救以貢禹貢氏子貢之後以字為氏禹字少翁琅邪人為諫大夫上素聞王吉貢禹皆明經潔行吉與禹為友世稱王陽在位貢禹彈冠言其取舍同也遣使者徴之吉道病卒上悼之遣使者弔祠焉禹至拜諫大夫問以政事禹言古者人君節儉什一而稅亡他賦役故家給人足髙祖文景宫女不過十餘廄馬百餘匹故時齊三服官李斐曰齊國舊有三服之官春獻冠幘縰為首服紈素為冬服輕綃為夏服凡三輸物不過十笥今工作數千嵗費巨萬廄馬食粟將萬匹惟陛下深察古道從其儉者天生聖人蓋為萬民非獨使自娛樂已也帝善其言下詔令諸宫館希幸御者勿膳治太僕減穀食馬水衡省肉食獸省宜春下苑以與貧民遷禹為光祿大夫初置戊巳校尉師古曰甲乙丙丁庚辛壬癸皆有正位惟戊巳寄冶今所置校尉亦無常居故以戊巳為名也有戊校尉已核尉有丞司馬各一人候五人使屯田車師故地宣帝元康二年以車師地與胸奴今胸奴欵服故復屯田其地甲戌二年春正月下蕭望之周堪及宗正劉更生字子政陽城侯德子後改名向獄皆免為庶人時史高以外屬領尚書事望之堪副之二人皆以師傅舊恩望之前以御史大夫左遷太子太傅堪亦前為太子少傅帝任之數宴見言治亂陳王事選宗室明經有行劉更生給事中與侍中金敞日磾姪安上之子並拾遺左右四人同心謀議勸導上以古制多所匡正史髙充位而已由是與望之有隙中書令臣瓚曰漢初中人有中謁者今孝武加為中書謁者令百官表中書謁者黃門諸僕射署長中黃門皆屬焉𢎞恭沛人僕射注見前石顯濟南人自宣帝時久典樞機及帝即位多疾以顯中人無外黨遂委以政事事無大小因顯自決顯巧慧能深得人主微旨內深賊持詭辨以中傷人與高表裏望之既患許史放縱又疾恭顯擅權建白以為中書政本國家樞機宜以通明公正處之武帝遊宴後庭故用宦者非古制也宜罷中書宦官應古不近刑人之義帝不聼而出更生為宗正望之堪數薦名儒以備諫官鄭朋會稽人隂欲附望之上疏言許史罪過堪白令待詔金馬門注見前後知其傾邪絶不與道朋怨恨更求入許史推所言事曰皆堪更生教我待詔華龍欲入堪等堪等不納亦與朋相結恭顯乃令二人告望之等欲疏退許史狀事下恭顯推問恭顯因奏望之堪更生朋黨相稱舉毁離親戚欲以專擅權勢為臣不忠請召致廷尉時上初即位不省召致廷尉為送獄可其奏後上召堪更生曰繫獄上大驚曰非但廷尉耶以責恭顯皆叩頭謝上曰令出視事恭顯使高説上皆免為庶人二月隴西地震壞太上皇廟敗城郭室屋壓殺人衆是秋七月地復震夏四月立子驁為皇太子待詔鄭朋奏張敞先帝名臣宜傳太子上問蕭望之望之曰敞能吏任治繁亂材輕非師傅之器上欲以為左馮翊會敞病卒冬賜蕭望之爵關內侯詔曰故前將軍望之傳朕八年道以經術厥功茂焉其賜爵關內侯食邑朝朔望坐次將軍以周堪劉更生為中郎尋繫獄免十二月蕭望之自殺以宦者石顯為中書令上復徵周堪劉更生欲以為諫大夫恭顯白以為中郎上器重蕭望之不已欲倚以為相恭顯許史皆側目更生乃使其外親上變事言地震殆為恭等宜退恭顯以彰蔽善之罰進望之等以通賢者之路恭顯疑更生所為請考姦詐辭服遂繫獄下太傳韋元成諫大夫貢禹與廷尉雜考劾更生前為九卿坐與望之謀棑許史而欲専權幸不伏誅復蒙徵用又教人言變事誣罔不道免為庶人會望之子伋官散騎中郎亦上書訟望之前事事下有司復奏望之教于上書失大臣體請逮捕上曰太傅素剛安肯就吏顯等曰人命至重望之所坐語言薄罪必無所憂乃可其奏顯等令謁者召望之因急發執金吾車騎圍其第望之以問門下生朱雲魯人徙平陵事望之受論語時顯用事百僚畏之惟御史中丞陳咸年少抗節不附顯等而與雲相結陳咸字子康萬年子雲好節士勸望之自裁望之嘆曰吾嘗備位將相年踰六十矣老入牢獄茍求生活不亦鄙乎飲鴆自殺帝聞之驚拊手曰曩固疑其不就牢獄果然殺吾賢傅卻食涕泣召顯等責問以議不詳皆免冠謝良久然後已詔令長子伋嗣為關內侯每歲時遣使祭其家是歲恭死遂以顯為中書令乙亥三年春罷珠崖郡珠崖諸縣叛儋耳珠崖民暴惡數犯吏自武帝元鼎六年置郡至昭帝始元元年凡六反五年罷儋耳郡並屬珠崖宣帝神爵三年珠崖三縣反甘露九年九縣反輒發兵擊定之至是又叛發兵擊之連年不定上與有司議大發軍待詔賈捐之誼曽孫曰臣聞秦興兵逺攻貪外虛內而天下潰叛孝武皇帝厲兵馬以攘四夷賦繁役重冦賊並起是皆廓地泰大征伐不休之故也今關東民困流離道路至嫁妻賣子法不能禁此社稷之憂也願遂棄珠崖専用恤關東為憂奏上上以問丞相御史御史大夫陳萬年以為當擊丞相于定國以為前日興兵擊之護軍都尉校尉及丞凡十一人還者二人卒士及轉輸死者萬人以上費用三萬萬餘尚不能降今關東困乏民難搖動捐之議是從之詔罷珠崖郡民有慕義欲內屬便處之不欲勿強以周堪為光祿勳張猛堪弟子為光祿大夫給事中丁丑五年春正月以周子南君名延其祖父姬嘉武帝時封為周承休故城在今河南汝州漢立周後國于此後廢侯夏四月有星孛于參漢書天文志參為白虎三星直者是為衡石下有三星鋭曰罰為斬艾事其外四星左右肩股也六月以貢禹為御史大夫禹由光祿大夫遷長信少府帝用禹言詔大官毋日殺所具各減半罷角抵齊三服官北假田官北假地名在吳喇忒西北史記秦使蒙恬渡河據陽山北假中即此鹽鐵官常平倉博士弟子母置員以廣學者省刑罰七十餘事時御史大夫陳萬年卒以禹代之禹在位數言得失書數十上帝嘉之十二月卒以長信少府薛廣德字長卿沛郡相人為御史大夫戊寅永光元年春正月郊泰畤上郊泰畤禮畢因留射獵薛廣德曰關東困極人民流離陛下日撞亡秦之鐘聽鄭衛之樂臣誠悼之今士卒暴露從官勞倦陛下亟反宫與百姓同樂天下幸甚上即日還是秋上酎祭宗廟出便門欲御樓船廣德當乘車免冠頓首曰宜從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血汙車輪陛下不得入廟矣上不悅光祿大夫張猛進曰臣聞主聖臣直乘船危就橋安聖主不乘危御史大夫言可聽上曰曉人不當如是耶乃從橋丞相定國御史大夫廣德罷以韋元成為御史大夫上自即位連年災害言者歸咎大臣于是上以朝日引見丞相責以職事定國等惶恐上書自劾乞骸骨乃賜安車駟馬黃金罷就第城門校尉諸葛豐葛伯之後居琅邪諸縣人謂之諸葛遂以為氏豐字少季琅邪人有罪免左遷周堪為河東太守張猛為槐里注見前令石顯憚堪猛等數譛毁之劉更生懼其傾危上封事諌略曰臣聞舜命九官濟濟相讓和之至也衆臣和于朝則萬物和于野和氣致祥乖氣致異正臣進者治之表正臣陷者亂之機也夫執狐疑之心者來讒賊之口持不斷之意者開羣枉之門讒邪進則衆賢退羣枉盛則正士消今用賢如轉石去邪如拔山如此望隂陽之調不亦難乎陛下誠深思天地之心以揆當世之變杜閉羣枉之門廣開衆正之路決斷狐疑分别猶豫則百異消滅而衆祥並至太平之基萬世之利也顯見其書愈與許史比而怨更生等是歲夏寒日青顯及許史皆言堪猛用事之咎帝內重堪又患衆口浸潤無所取信時長安令楊興以材能幸常稱譽堪帝欲以為助乃問興朝臣斷魚巾反斷爭辨之意不可光祿勳何耶興傾巧謂帝疑堪因順旨曰堪非獨不可于朝廷即州里亦不可也臣前見衆人以為當誅故言堪不可誅為國養恩也帝于是疑之城門校尉諸葛豐以剛直著名上書告堪猛罪帝不直豐乃詔御史曰豐前數稱堪猛之美為司𨽻校尉専作苛暴京師為之語曰問何濶逢諸葛言何久不見以逢諸葛故也朕不忍下吏以為城門校尉不內省已而反怨堪猛告按無證之辭暴揚難驗之罪毁譽恣已不顧前言其免為庶人豐言堪猛貞信不立朕惜其才能未有所效其左遷堪為河東太守猛槐里令待詔賈捐之棄市初捐之與楊興善捐之數短石顯以故不得官希復進見興新以材能得幸捐之欲得召見謂興曰京兆尹缺使我得見言君蘭興字京兆尹可立得興曰君房捐之字下筆言語妙天下使君房為尚書令勝五鹿充宗風俗通五鹿衛邑晉文公封舅犯于此後因為氏充宗頓邱人顯之黨時為少府逺甚捐之曰令我得代充宗君蘭為京兆京兆郡國首尚書百官本天下真大治士則不隔矣興曰顯方信用今欲進用且與合意即得入矣即共為薦顯奏稱其美捐之又作薦興奏以為可試守京兆尹顯聞其謀白之帝乃下興捐之獄令顯治之捐之坐罔上不道棄市興髠鉗為城旦己卯二年春二月以韋元成為丞相元成前削一級為關內侯至是為相復封扶陽侯三月壬戌朔日食夏六月以匡衡匡以邑為氏衡字稚圭東海承人為光祿大夫衡為給事中初衡以明經稱諸儒為之語曰無説詩匡鼎來匡説詩解人頭長安令楊興説史高辟為議曹髙薦于上上以為郎中博士遷給事中上問以地震日食之變衡上疏曰陛下閔愚民觸法抵禁比年大赦使得自新天下幸甚臣竊見大赦之後姦邪不為衰止此殆導之未得其務也今天下貪財賤義亷恥之節薄淫辟之意縱茍合徼幸以身設施也利不改其原雖歲赦之刑猶難使錯而不用也臣愚以為宜曠然大變其俗夫朝廷者天下之楨幹也公卿相與循禮恭讓則民興行寬柔和惠則衆相愛二者明王所以不嚴而成化也今長安天子之都親承聖化然其習俗無以異于逺方郡國來者無所法則或見侈靡而放效之此教化之原本風俗之樞機宜先正者也臣聞天人之際精祲氣也有以相蕩善惡有以相推事作乎下者象動乎上隂變則靜者動陽蔽則明者暗水旱之災隨類而至陛下祇畏天戒哀閔元元宜省靡麗考制度近中正逺巧佞以崇至仁匡失俗道德鴻于京師淑問揚乎疆外然後大化可成禮讓可興也上悅其言遷衡為光祿大夫秋七月隴西羌反遣右將軍馮奉世將兵擊破之羌反上詔丞相元成等入議右將軍馮奉世曰西羌近在境內背叛不以時誅無以制逺臣願帥師討之上問用兵之數對曰臣聞善用兵者役不再興糧不三載師不久暴而天誅亟決今叛羌無慮三萬人法當倍用六萬人然羌戎之兵器不犀利可用四萬人一月足以決丞相御史皆以為民方收斂發萬人屯守之具足奉世曰不可以萬人分屯三處戰則銼兵病師守則百姓不救如此怯弱之形見羌人乘利諸種並和將相扇而起故少發師而曠日與一舉而疾決利害相萬也固爭之不能得有詔益二千人遣奉世到隴西分屯三處護軍都尉韓昌先遣兩校尉與羌戰為所破殺奉世具上地形部衆多少之計願益三萬六千人上為發六萬人以太常任千秋為奮威將軍將五校並進冬十月大破羌俘斬首數千級餘皆走出塞明年奉世還賜爵關內侯庚辰三年春三月立子康為濟陽故城在河南開封府蘭陽縣王後徙山陽復徙定陶王傅昭儀子冬十一月地震雨水辛巳四年夏六月戊寅晦日食以周堪為光祿大夫張猛為大中大夫堪卒猛自殺上以日食召諸前言日變在堪猛者責問皆稽首謝因下詔稱堪之美徴拜光祿大夫領尚書事猛復為大中大夫給事中石顯管尚書尚書五人漢舊儀尚書四人為四曹常侍尚書主丞相御史事二千石尚書主刺史二千石事户曹尚書主庶人上書事主客尚書主外國事成帝始置五人有三公曹主斷獄事是時尚書五員止四人胡三省曰顯與牢梁五鹿充宗伊嘉陳順人皆典領尚書雖未有定員寶亦五人也皆其黨堪希得見常因顯白事事決顯口會堪疾咽不能言而卒顯誣譖猛令自殺于公車劉更生傷之乃著疾讒擲要危及世頌凡八篇以悼之更生亦坐廢十餘年冬十月罷祖宗廟在郡國者初貢禹奏言孝惠孝景廟皆親盡宜毁又郡國立廟不應古禮宜正定髙祖時令諸侯王國都皆立太上皇廟至惠帝尊高帝廟為太祖廟景帝尊孝文廟為太宗廟行所幸郡國各立太祖太宗廟至宣帝本始二年復尊孝武廟為世宗廟行所巡守亦立焉凡祖宗廟在郡國六十八廟合百六十七所而京師自高祖下至宣帝與太上皇悼皇考各自居陵旁立廟而昭靈后武哀王昭哀后孝文太后孝昭太后衛思后戾太子戾后亦各有寢園故禹請毁之哀昭靈后髙祖母武哀王髙祖兄昭后高祖姊衛恩后戾太子母帝是其議至是行之時禹巳先卒尋復從韋元成議毁太上皇孝惠帝寢廟園其後又罷孝文太后孝昭太后寢園事在建昭元年後五年復太上皇寢廟園原廟昭靈后武哀王昭哀公衛思后園竟寧元年春又復孝惠帝寢廟園孝文太后孝昭太后寢園五月復悉毁之至成帝河平二年以無繼嗣又復太上皇之寢廟園壬午五年秋潁川大水以匡衡為太子少傅上好儒術文辭頗改宣帝之政言事者多進見又傅昭儀傅出商傅説之後以地為氏及濟陽王康愛幸逾于皇后太子衡上疏曰臣聞治亂安危之機在乎審所用心傳曰審好惡理性情而王道畢矣治性之道必審已之所有餘而強其所不足蓋聰明疏通者戒于太察寡聞少見者戒于壅蔽猛勇剛強者戒于太暴仁愛溫良者戒於無斷湛靜安舒者戒于後時廣心浩大者戒于遺忘必審已之所當戒而齊之以義然後巧偽之徒不敢比周而望進臣又聞室家之道修而天下之理得故聖王必慎后妃之際别嫡長之位卑不踰尊新不先故嫡子冠乎阼衆子不得與列所以貴正體而别嫌疑也非虛加其禮文而已如當親者疏當尊者卑則巧佞之姦因時而動以亂國家故聖人慎防其端禁于未然不以私恩害公義傳曰正家而天下定矣河決初武帝既塞宣防見元封二年河復北決于館陶分為屯氏河漢書地理志魏郡館陶河水别出為屯氏河東北至章武入海過郡四行千五百里水經大河故瀆自沙邱堰南分屯氏河出焉大今山東之館陶冠縣邱縣茌平高唐州及直𨽻之名景州寧津南皮滄州鹽山俱有屯氏河故道東北入海寰宇記毛河在清池縣西南至鹽山入海蓋自隋時誤以屯氏為毛氏後遂直稱為毛河也天清池故城在今直隸滄州鹽山今縣屬直隸津府廣深與大河等言其與黃河經流相等也馮智舒以大河源出登州棲霞至福山入海謬矣故因其自然不隄塞也是歲河決于清河漢郡注見前靈漢縣故城在今山東東昌府髙唐州鳴犢口顔師古曰清河郡之靈縣鳴犢口也今故瀆在髙唐州南而屯氏河絶考漢書地理志鳴犢河東北至蓚入屯氏河其曰絶者言蓚縣以上之瀆也蓚縣注見前癸未建昭元年春正月隕石于梁冬帝如長楊射熊館長楊宫名在盩厔縣東南三輔黃圖宫中有垂楊數畝門曰射熊布車騎大獵復幸虎圈注見前鬬獸後宫皆坐熊佚出圈攀檻欲上殿左右貴人傅昭儀等皆驚走馮倢妤左將軍奉世女直前當熊而立左右格殺熊上問人情驚懼何故前當熊偼妤對曰猛獸得人而止妾恐熊至御坐故以身當之上嗟嘆倍敬重焉傅昭儀慙于是與馮偼妤有隙甲申二年夏六月立子興馮偼妤出為信都即廣川國廣川注見前王後徙中山薨子衎嗣即平帝秋殺魏郡太守京房字君明頓邱人本姓李推易自定為京氏房學易于焦延壽梁人字贛亦曰焦贛以郡吏察舉補小黃令延夀常曰得我道以亡身者京生也其説長于災變分六十四卦更直日用事孔頴達易正義卦氣起中孚故離坎震兌各主其一方其餘六十卦卦有六爻爻主一日凡主三百六十日餘有五日四分日之一每日分為八十分五日分四百分四分日之一又分為二十分六十卦分之卦各得七分是每爻直一日有竒而每卦直六日七分也以風雨寒溫為候各有占驗房好鍾律知音聲以孝廉為郎屢言災異有驗上説之數召見問房對曰古帝王以功舉賢則萬化成瑞應著末世以毁譽取人故功業廢而致災異宜令百官各試其功災異可息詔使房作其事房奏考功課吏法上意嚮之時石顯專權房嘗宴見問上曰幽厲之君何以危所任者何人也上曰君不明而所任者巧佞房曰齊桓公秦二世亦嘗聞此君而笑之然所任豎刁趙髙政治日亂何不以幽厲卜之而覺寤乎上曰唯有道者能以往知來耳房免冠頓首言春秋紀二百四十二年災異以示萬世今陛下即位以來日月失明星辰逆行山崩泉湧地震石隕夏霜冬雷春凋秋榮水旱螟蟲民人飢偹疫盜賊不禁刑人滿市春秋所紀災異盡因曰陛下視今為治邪為亂邪上曰亦極亂耳尚何道房曰今所任者誰與上曰然幸其愈于彼又以為不在此人也房曰前世之君亦皆然矣臣恐後之視今猶今之視前也上良久乃曰今為亂者誰哉房曰明主冝自知之上曰不知也如知何故用之房曰上所最信任與圖事帷幄之中進退天下之士者是矣房指石顯上亦知之謂房曰己諭後卒不能退顯顯與五鹿充宗疾房欲逺之建言以房為魏郡太守得以考功法治郡房去月餘顯知房與張博為淮陽王求朝奏草博淮王陽之舅從房受學以女妻房博知帝欲用房而為衆所排欲令王上書求入朝以助房因記房所説災異及為王求朝奏草皆持以與王告房等泄漏省中語誹謗政治詿誤諸侯王皆下獄棄市妻子徙邉初房見帝道幽厲事出為御史大夫鄭𢎞言之𢎞亦坐免為庶人自殺鄭𢎞字稚卿泰山剛人下御史中丞陳咸獄髠為城旦初咸以父萬年任為郎有異材抗直數言事萬年嘗教戒之語至夜半咸睡萬年怒欲杖之咸叩頭謝曰具曉其言大要教我諂也萬年乃不復言及遷御史中丞數毁石顯坐與槐里令朱雲善泄漏省中語有司考雲風吏殺人上問雲治行丞相元成奏雲暴虐無狀咸聞語雲雲上書自訟丞相具發其事下獄髠為城旦雲亦廢錮顯威權日盛與中書僕射牢梁少府五鹿充宗結為黨友諸依附者得寵位民歌之曰牢邪石邪五鹿客邪印何纍纍綬若若邪顯聞衆人洶洶言已殺蕭望之恐天下學士訕已以貢禹明經著節乃深自結納薦禹位厯九卿禮事之甚備帝常使至諸官有所徴發先自白恐後宫門閉請使詔吏開門上許之顯故投夜還稱詔開門入後果有告顯矯詔開宫門上笑以其書示顯顯因泣曰陛下過私小臣屬任以事羣下無不嫉妬欲陷害臣者事如此非一願歸樞機之職受後宫掃除之役死無所恨惟陛下哀憐以此全活小臣上憐之益勉勞顯顯之設變詐以自解免取信人主者皆此類也閏八月太皇太后崩昭帝上官后冬十一月齊楚地震大雨雪樹折屋壞乙酉三年夏六月丞相元成卒諡曰共秋七月以匡衡為丞相封樂安侯冬西域副校尉陳湯字子公山陽瑕邱人矯制發兵與都護甘延夀字君况北地郁郅人襲擊胸奴郅支單于于康居斬之郅支單于自徙居堅昆在單于庭之西今鄂羅斯南境地怨漢擁護呼韓邪而不助已困辱使者江乃始等遣使求侍子即駒于利受見甘露二年漢遣衛司馬谷吉長安人送之貢禹匡衡以為郅支嚮化未醇所在絶逺宜令使者送其子至塞而還吉願送至庭許之既至為郅支所殺郅支自知負漢又聞呼韓邪益強恐見襲擊會康居遣使迎郅支欲與合兵取烏孫郅支素怨烏孫遂引兵西康居王以女妻郅支欲倚其威以脅諸國郅支數借兵擊烏孫深入至赤谷城烏孫大昆彌治于此烏孫西邊空虛不居者且千里郅支自以大國又乘勝驕不為康居王禮漢遣使三輩至康居求谷吉等死皆困辱之不奉詔陳湯乃與甘延夀謀襲郅支湯曰西域本屬胸奴今郅支威名逺聞常為康居畫計欲降服烏孫大宛如得此二國久之必為中國患今發屯田吏士驅從烏孫衆兵直指其城下彼亡則無所之守則不自保千載之功可一朝而成也延夀欲奏請湯曰國家與公卿議大䇿非凡所見事必不從會延壽病湯獨矯制發諸國兵及屯田吏士四萬餘人上疏自劾陳言兵狀即日引軍分為六校其三校從南道踰蔥嶺其三校都護自將發溫宿國從北道溫宿國治溫宿城去長安八千五百五十里進薄康居城下鹵楯在前戟弩在後土城外有木城發薪燒之四面火起吏士喜大呼乘之康居引郤漢兵推鹵楯並入土城中單于被創死斬其首傳至京師縣藁街顔師古曰藁街街名蠻夷邸在此街也十日四年以誅郅支告祠郊廟赦天下羣臣置酒上夀丁亥五年夏六月壬申晦日食戊子竟寧元年春正月胸奴單于來朝胸奴呼韓邪單于聞郅支既誅且喜且懼入朝自言願壻漢氏以自親帝以後宫良家子王嬙字昭君南郡秭歸人王穰之女賜之單于喜上書願保塞請罷邊備以休天子民人議者皆以為便郎中侯應習邊事以為不可許上問狀應以十事對略曰臣聞北邊塞外有隂山東西千餘里草木茂盛多禽獸本冒頓依阻其中治作弓矢來出為冦孝武世斥奪此地建塞徼起亭隧築外城設屯戍以守之邊境得用少安邊長老言胸奴失陰山之後過之未嘗不哭也如罷備塞戍卒示外國之大利不可一也前已罷外城省亭隧才足候望通烽火安不忘危不可復罷二也中國愚民猶尚犯禁何况胸奴豈能必不犯約三也中國設關梁置屯戍非獨為胸奴亦為諸屬國降民逃亡四也西羌保塞漢吏民貪利侵盜以此怨起而背叛今罷乘塞則生嫚易分爭之漸五也往者從軍多沒不還子孫貧困必出亡從之六也邊人奴婢愁苦聞胸奴中樂欲亡者多七也盜賊犯法亡走北出八也起塞以來卒徒勞苦功費久逺不深慮其終始欲以一切省繇戍卒有他變障塞破壞當更繕治纍世之功不可卒復九也單于自以保塞守禦請求無已小失其意則不可測十也賀隂山徐廣曰在五原北考陰山橫障漠北起寧夏蘭山當河套北亘吳喇忒歸化城之境蜿蜒而東隨地易名蓋數千里侯應以為東西千餘里亦約略言之耳對奏上詔勿議罷邊塞事使許嘉延壽子大司馬車騎將軍襲封平恩侯諭單于曰單于上書嚮慕禮義所以為民計者甚厚朕甚嘉之中國四方皆有關梁障塞非獨以備塞外亦以防中國姦邪放縱出為冦害也敬諭單于之意朕無疑焉單于謝曰愚不知大計天子幸使大臣告語甚厚歸號王嬙為寧胡閼氏三月以張談為御史大夫初石顯見馮奉世父子為公卿著名女又為昭儀由偼妤進昭儀昭儀位視丞相爵比諸侯王帝時始置心欲附之薦昭儀兄逡字子望修敕宜侍帷幄帝召見逡逡因言顯專權帝怒罷逡及御史大夫缺二月李延夀卒在位多舉逡兄大鴻臚野王字君卿行能第一帝以問顯顯曰九卿無出野王者然親昭儀兄臣恐後世必以陛下私後宫親以為三公上曰善乃以太子少傅張談為御史大夫以召信臣字翁卿九江夀春人為少府信臣先為南陽太守後遷河南治行常第一好為民興利躬耕勸稼稀有安居通溝瀆起水門提閼閼所以壅水以廣灌溉禁止奢靡務於儉約案其不法以示好惡其化大行户口增倍吏民親愛號曰召父徵為少府請諸離宮稀幸者勿復治省樂府諸戲及大官不時非法之物歲省數十萬夏侯甘延夀為義成侯賜陳湯爵關內侯初石顯常欲以姊妻甘延夀延夀不取而陳湯素貪所鹵獲財物入塞多不法司𨽻校尉繫吏士案驗之湯上疏言臣與吏士共誅郅支萬里振旅宜有使者勞迎今司隸反收繫案驗是為郅支報讐也帝立出吏士令縣道具酒食以過軍既至論功顯與匡衡以為延夀湯興師矯制幸得不誅如復加爵土則後奉使者爭欲乘危徼幸為國招難帝內嘉延夀湯功而重違衡顯之議久之不決劉向上疏頌其功疏曰郅支囚殺使者傷威毁重陛下欲誅之意未嘗有忘延夀湯承聖指倚神靈出百死入絶域斬郅支之首掃谷吉之耻且使呼韓喜懼稽首來賔願守北藩纍世稱臣勳莫大焉論大功者不録小過舉大美者不疵小瑕宜以時除過勿治尊寵爵位以勸有功于是封延夀為義成侯長水校尉賜湯爵關內侯射聲校尉時杜欽上疏訟馮奉世破莎車功帝以先帝時事不復録五月帝崩六月太子驁即位是為孝成帝太子少好經書寬博謹慎後幸酒晉灼曰好酒也樂五孝反燕樂而傅昭儀子山陽王康有材藝上好音樂或置鼙鼓殿下自臨軒檻上隤銅丸以撾鼓中嚴鼓之節後宫左右知音者皆莫能而山陽王亦能之帝數稱之駙馬都尉史丹高之子進曰凡所謂材者敏而好學溫故知新皇太子是也若乃器人于絲竹鼓鼙之間則是陳惠李微服虔曰二人皆黃門鼓吹高于匡衡可相國也于是帝默然而笑其後中山哀王薨太子前弔王帝少弟與太子遊學相長大上悲不能自止而太子不哀上大恨曰安有人不慈仁而可奉宗廟為民父母者乎以責誚丹丹免冠謝曰臣誠見陛下哀痛感損切戒太子母哭泣感傷陛下臣罪當死上意乃解及寢疾數問尚書以景帝時立膠東王故事見景帝中元六年史丹以親密臣得侍疾候上獨寢時直入卧內頓首伏青蒲應劭曰以青規地曰青蒲自非皇后不得至此上涕泣言曰皇太子以嫡長立天下莫不歸心今者道路流言以為太子有動搖之議審若此公卿以下必以死爭臣願先賜死以示羣臣帝意感悟曰無有此議且皇后謹慎先帝又愛太子吾豈可違指吾病寖加恐不能自還善輔道太子丹唏噓而起太子遂定至是即位以元舅王鳳為大司馬大將軍領尚書事尹氏起莘曰此外戚得權之始新莽篡弒之漸履霜堅冰可不戒哉秋七月葬渭陵永光四年以渭城夀陵亭部原上為初陵詔勿治縣邑既葬號渭陵在今西安府咸陽縣東北史臣曰元帝寬宏恭儉少而好儒及即位徵用儒生委之以政貢薛韋匡迭為宰相而帝牽制文義優柔不斷孝宣之業衰焉孝成皇帝己丑建始元年春正月石顯以罪免歸道死時顯徙為中太僕掌皇太后輿馬不常置不復典權丞相御史奏顯舊惡免官徙歸故郡憂悶道死因左遷少府五鹿充宗為元莬太守御史中丞伊嘉為雁門都尉及牢梁陳順皆免官司隸校尉王尊字子贛涿郡髙陽人劾奏丞相衡御史大夫談知顯等專權擅勢為海內害不以時白奏行罰而阿諛曲從附下罔上無大臣輔政之義皆不道事在赦前及赦後衡談奏顯不自陳不忠之罪反言先帝任用傾覆之徒百官畏之甚于主上失大臣體于是衡慙懼謝罪上丞相侯印綬帝新即位重傷大臣乃左遷尊為高陵注見前令然羣下多是尊者衡由是默默不自安尊初為益州刺史行部邛郲有九折坂前琅邪王陽過之嘆曰奉先人遺體奈何數乘此險遂以病去及尊至其坂曰此非王陽所畏也邪叱其馭驅之曰王陽為孝子王尊為忠臣西九折坂在四川雅州府榮經縣之卭郲山有星孛于營室營室二星天子之宫軍糧之府又土功事封舅光祿大夫崇為安成侯賜談商立根逢時爵關內侯後崇卒有遺腹子奉世嗣侯夏四月黃霧四塞詔博問公卿大夫無有隱諱諫大夫楊興博士駟勝等皆以為隂盛侵陽之氣也高祖之約非功臣不侯今太后諸弟皆以無功為侯外戚未曾有也大將軍鳳懼上書辭職優詔不許秋八月有兩月相承服虔曰相承在上下也晨見東方九月流星光燭地長四五丈委曲蛇形貫紫宮注見前冬十二月作南北郊罷甘泉汾隂祠匡衡奏言祭天于南郊就陽之義也瘞地顔師古曰祭地曰瘞薶故云瘞地于北郊即隂之象也往者孝武帝于雲陽注見前立泰畤郊見皇天反北之泰隂于汾隂祠后土反東之少陽與古殊制宜徙置長安定南北郊為萬世基上從之既定衡又言享帝之義貴誠上質紫壇偽飾女樂顔師古曰漢舊儀祭天用六綵綺席六重用玉几玉飾器凡七十女樂使童男童女俱歌也及鸞路騂駒龍馬石壇之類宜皆勿修又雍鄜密上下畤本秦所立不當遵上皆從焉明年復奏罷陳寶祠祠在今陜西鳯翔府寶雞縣史記封禪書秦文公獲若石于陳倉北坂城祠之其神來常以夜光輝若流星從東南來集于祠城則若雄雞其聲殷云以一牢祠命曰陳寶庚寅二年春正月始親祠南郊赦奉郊縣長安奉南郊長陵奉北郊減天下賦算錢四十三月始祠后土于北郊立皇后許氏后車騎將軍嘉之女元帝傷母恭哀后居位日淺遭霍氏之辜故選嘉女以配太子至是立為后帝自為太子時以好色聞及即位皇太后詔采良家女以備後宮杜欽説王鳯曰主上富于春秋未有適嗣方鄉術入學將軍宜建九女之制詳擇行義之家求淑女之質母必有聲色技能為萬世大法鳯不能用公羊傳諸侯一娶九女故欽曰九女之制夏大旱辛卯三年秋大雨京師民訛言大水至關內大雨四十餘日京師民相驚言大水至奔走相蹂躪長安中大亂王鳳以為太后與上及後宮可御船令民上城避水王商宣帝舅樂昌侯武之子嗣爵為左將軍曰此必訛言不宜重驚百姓乃止有頃稍定問之果訛言上于是美壯商之固守數稱其議而鳯大慙恨八月䇿免大司馬車騎將軍許嘉欲專任王鳯故免嘉冬十二月戊申朔日食夜地震未央宮殿中詔舉直言極諫之士杜欽延年子字子夏茂陵杜鄴與欽同姓字俱以材能稱欽目偏盲故京師謂欽盲杜子夏以相别欽惡以疾見詆乃為小冠由是京師更謂欽小冠杜子夏云谷永吉之子字子雲上對皆以為女寵太盛嫉妬專上將害繼嗣之咎丞相樂安侯匡衡有罪免為庶人初衡子昌為越騎校尉醉殺人繫獄昌弟謀篡奪取也昌事發覺衡徒跣待罪帝優禮之至是司隸校尉劾衡多取封邑四百頃免為庶人終于家壬辰四年春正月隕石于亳注見前四于肥纍漢縣即春秋肥子國注見前二罷中書宦官初置尚書員五人注已見前三月以王商為丞相夏四月雨雪復召直言極諫之士詣白虎殿三輔黃圖未央宫有白虎殿對䇿時上委政王鳯議者多歸咎焉谷永以鳯方柄用陰欲自托乃曰方今四夷賔服皆為臣妾骨肉大臣有申伯之忠無重合馬何羅弟通封重合侯事見前安陽上官桀事見前博陸霍禹事見前之亂竊恐陛下歸咎無辜重失天心不可之大者也誠宜深察愚言解偏駁之患使列妾得人人更進益納宜子婦人以慰釋皇太后之憂愠解謝上帝之譴怒杜欽亦倣此意上以永為光祿大夫秋桃李實河決先是清河都尉馮逡逡由長樂屯衛司馬遷都尉奏言郡承河上流土壤輕脆易傷頃所以無大害者以屯氏河通兩川分流也今屯氏河塞靈鳴犢口又益不利獨一川兼受數河之任雖高增隄防終不能泄九河注見前今既難明屯氏河絶未久其處易浚又其口所居高于分殺水力道里便宜可復浚以助大河泄暴水備非常事下丞相御史議格不行至是大雨十餘日河果決于館陶及東郡金隄凡灌四郡三十二縣水居地深者三丈事聞以御史大夫尹忠對方略疏濶切責之忠自殺遣大司農非調人名非子之後以名為氏調均錢榖存給所灌之郡顔師古曰調發均平錢榖于遭水之郡使存給也謁者發河南以東漕船五百㮴先勞反徙民避水大將軍鳯以陳湯為從事中郎帝初即位匡衡奏陳湯奉使顓命盜所收康居財物湯坐免後湯以言事不實湯言康居侍子非王子按驗實王子也下獄當死谷永上疏訟湯曰君子聞鼓鼙之聲則思將帥之臣湯前斬郅支威震百蠻今坐言事非是欲致之大辟非所以厲死難之臣也書奏乃詔出湯奪爵為士伍會西域都尉假會宗字子松上邽人為烏孫所圍驛騎上書鳯言湯多籌䇿習外國事可問上召見宣室示以會宗奏湯知烏孫瓦合不能久攻屈指計曰不出五日當有吉語聞居四日軍書到言已解鳳奏以為從事中郎幕府事一決于湯後湯坐惑衆不道免為庶人徙邊議郎耿育復訟其寃乃赦還長安卒癸巳河平元年春以王延世犍為資中人為河隄使者塞河決杜欽薦王延世為河隄使者延世以竹落長四丈大九圍集覽落與絡通以竹蔑為外藩而籠絡之盛以小石兩船夾載而下之三十六日隄成于是改元河平以延世為光祿大夫賜爵關內侯後二嵗河復決平原流入濟南千乘所敗壞者半建始時復遣延世同丞相史楊焉治之六月乃成夏四月己亥晦日食詔百官陳過失時許皇后專寵後宫希得進見中外皆憂上無繼嗣劉向杜欽谷永皆以為言上于是減省椒房掖庭用度皆如竟寧以前故事秋減死刑省律令詔曰今大辟之刑千有餘條律令煩多百有餘萬言竒居宜反請謂于常文之外主者别有所請以定罪也他比毗至反謂引他類以比附之稍增律條也日以益滋自明習者不知所由欲以曉諭衆庶不亦難乎其議減死刑及可蠲除約省者令較然易知條奏時有司不能廣宣上意徒鉤托微細毛舉數事以塞詔而已甲午二年春正月沛郡本秦泗水漢改曰沛治相故城在今江南鳯陽府宿州鐵官冶鐵飛劉友益曰金失其性也夏楚國雨雹大如釡悉封諸舅為列侯王談為平阿侯商為成都侯立為紅陽侯根為曲陽侯逢時為高平侯五侯同日封故世謂之五侯免京兆尹王尊官復以為徐州刺史先是尊因王鳯薦時南山盜宗傰等為吏民害校尉傅剛不能禽故薦尊徵為諫大夫守京輔都尉行京兆尹事旬月間盜賊清遷光祿大夫守京兆尹凡三歲御史大夫張尊奏尊暴虐免官吏民多惜之湖三老注見前公乘興等上書訟尊治京兆尹前所希有今御史大夫奏尊原其所以出御史丞楊輔與尊有怨外依公事傅致奏文臣等竊痛尊修身砥節功著職修昨以京師賊亂選用為卿賊亂既除即以佞巧廢黜一尊之身三期之間乍賢乍佞豈不甚哉于是復以尊為徐州刺史後遷東郡太守久之河水溢尊親祀水神請以身填金隄因止宿隄上及水盛隄壞吏民奔走尊立不動水波稍郤三老朱英等奏狀上嘉之秩尊中二千石數嵗卒于官乙未三年春二月犍為地震山崩壅江水逆流秋八月乙卯晦日食求遺書帝以中祕書頗散亡使謁者陳農求遺書于天下詔光祿大夫劉向校之向以王氏權位太甚而上方嚮詩書古文乃因尚書洪範集合上古以來厯春秋六國至秦漢符瑞災異之記推迹行事著其占驗號曰洪範五行傳論奏之帝心知向忠故為鳯兄弟起此論也然終不能奪王氏權丙申四年春正月胸奴單于來朝初呼韓邪單于死子復株絫若鞮單于名雕陶莫臯立事在建始二年因遣右臯林王伊邪莫演奉獻既罷伊邪莫演自言欲降議者言宜受之谷永杜欽以為單于稱臣無有二心今既享其聘貢之職而更受其逋逃之臣是貪一夫之得而失一國之心也假令單于初立使之詐降以卜吉凶或設為反間欲因而生隙受之適合其䇿使得歸曲而責直此誠邉境安危之原不可不詳也不如勿受以昭日月之信抑諼詐之謀上從之至是單于遂入朝丞相王商多質有威重容貌絶人單于拜謁商仰視大畏之遷延却退上聞而嘆曰真漢相矣三月癸丑朔日食夏四月詔收丞相樂昌侯王商印綬商以憂卒琅邪太守楊彤與王鳯連昏其郡有災害商按問之鳯以為請商不聽竟奏免彤奏寢不下鳯以是怨商使人告商淫亂事上以為暗昧之過不足以傷大臣鳯固爭下其事司隸大中大夫張匡素佞巧復上書極言詆商詔勿治鳯固爭之乃使使者收商丞相印綬商免相三日發病嘔血卒諡戾侯子弟親屬皆出補吏莫得留給事宿衛者有司請除國邑詔子安嗣侯以張禹字子文河內軹人徙蓮勺為丞相封安昌侯上為太子受論語于禹禹從琅邪王陽膠東庸生問論語以博士鄭寬薦詔授太子論語及即位賜爵關內侯拜光祿大夫給事中與王鳯並領尚書禹內不自安數病上書求退上不許撫待愈厚遂以為相罽賔治循鮮城去長安萬二千二百里明史西域傳撒馬兒罕即漢罽賔地隋曰漕國唐復曰罽賔去嘉峪關九千六百里遣使來獻初武帝通西域罽賔以絶逺漢兵不能至獨不服數剽殺漢使元帝時遣使者上書謝帝放其使者于懸度去陽關五千八百八十八里在烏秅國之西本石山也溪谷不通以繩索相引而度絶而不通至是復遣使來獻漢欲遣使者報送其使杜欽説王鳯曰罽賔前親逆節故絶而不通今悔過來而奉獻者皆行賈賤人欲通貨市買以獻為名使者承至尊之命送蠻夷之賈非計也業已受節可送至皮山國名治皮山城去長安萬五十里西南當罽賔道而還于是鳯白從欽言罽賔實利賞賜賈市其使數年而一至云罽賔民巧雕文刻鏤治宫室織罽刺文繡以金銀為錢文為騎馬幕為人面出封牛孔雀珠璣珊瑚虎魄流離明史西域傳其國傳有照世杯光明洞徹照之可知世事云丁酉陽朔以前年山陽火生石中故改元元年春二月丁未晦日食冬下京兆尹王章字仲卿泰山巨平人獄殺之章初為中郎將毁中書令石顯為顯所陷免官及帝立擢司隸校尉遷京兆尹時大將軍鳯用事上謙讓無所顓章素剛直敢言雖為鳯所舉非鳯專權不親附鳯乃奏封事言日食之咎帝召見延問上即位數年無繼嗣定陶王來朝太后與上承先帝意遇王甚厚留之不遣歸國旦夕侍上甚見親重鳯心不便會日食因言日食陰盛之象定陶王當奉藩在國今留侍京師詭正非常故天見戒宜遣之國帝不得已許之王辭去上與涕泣而訣章因對曰陛下未有繼嗣引近定陶王所以承宗廟奉社稷上順天心下安百姓何故致災異災異之發為大臣顓政者也今鳯不自省責反歸咎于定陶王建遣之國欲使天子孤立于上顓擅朝事以便其私且鳯誣罔不忠非一事也前丞相商守正不隨為鳯所罷身以憂死鳯小婦弟張美人已嘗適人託以為宜子內之後宫以私其妻弟此三者皆大事陛下所自見足以知其餘鳯不可令典事宜選忠賢以代之上聞章言感悟謂章曰君試為朕求可以自輔者章薦琅邪太守馮野王鳯聞甚懼杜欽令鳯上疏乞骸骨辭甚哀太后聞之埀涕不食上乃強起鳯而使尚書劾章奏章知野王前以王舅出補吏而私薦之阿附諸侯又張美人體御至尊非所宜言下章吏廷尉致其大逆罪章竟死獄中初章為諸生獨與妻居章疾病無被臥牛衣中與妻決涕泣後章為京兆欲上封事妻止之曰人當知足獨不念牛衣中涕泣時耶章曰非女子所知也書上果下獄妻子皆收繫章小女年可十二夜起號哭曰平時獄上呼囚數常至九今八而止我君素剛先死者必君問之果死妻子皆徙合浦自是公卿見鳯側目而視野王懼不自安遂病滿三月賜告歸杜陵就醫藥鳯風御史劾奏野王賜告養病而私自持虎符出界歸家奉詔不敬免官以薛宣字贛君東海郯人為左馮翊宣為郡所至有聲迹宣由長安令補御史中丞出為臨淮太守遷陳留太守及為左馮翊屬令有楊湛謝遊皆貪猾不遜宣察湛有改過之效乃密書曉之遊自以大儒輕宣獨移書顯責之二人得檄皆解印綬去宣得吏民罪名即告其縣長吏使自行罰曰不欲代縣治奪賢令長名也戊戌二年夏四月以王音太后從弟為御史大夫于是王氏愈盛郡國守相刺史皆出其門五侯羣弟爭為奢侈賂遺珍寶四面而至然皆好士養賢傾財施豫賔客競為之聲譽劉向上封事極諫曰王氏一姓乘朱輪華轂者二十三人青紫貂蟬充盈幄內大將軍秉事用權五侯驕奢僭盛依東宮顔師古曰東宮太后所居之尊假甥舅之親以為威重管執樞機朋黨比周稱譽者登進忤恨者誅傷排擯宗室孤弱公族外戚僭貴未有如王氏者也物盛必有非常之變先見為其人微象王氏先祖墳墓在濟南者其梓柱生枝葉扶疏上出屋根插地中事勢不兩大王氏與劉氏不並立如下有泰山之安則上有纍卵之危陛下為人子孫守持宗廟而令國祚移于外親縱不為身奈宗廟何宜發明詔援近宗室疏逺外戚子子孫孫無疆之計也書奏帝召見向嘆息悲傷其意曰君且休矣吾將思之然終不能用其言秋關東大水己亥三年春三月隕石東郡八秋八月大司馬大將軍鳯卒九月以王音為大司馬車騎將軍詔王談位特進領城門兵王鳯疾上臨問之執手涕泣曰將軍病如有不可言平阿侯談次將軍矣鳯頓首泣曰談等雖至親行皆奢僭不如御史大夫音謹敕臣敢以死保之初談倨不肯事鳯而音敬鳯卑恭如子故鳯薦之鳯卒上以音代鳯而詔談領城門兵由是談音相與不平庚子四年夏四月雨雪以王駿吉之子為京兆尹駿經明行修以陳咸匡衡薦遷諫大夫厯官至少府帝欲大用之出為京兆京兆典京師于三輔尤為劇唯趙廣漢張敞王尊王章及駿皆有能名故京師稱曰前有趙張後有三王辛丑鴻嘉元年春二月帝始微行上從期門郎或私奴或乘小車或皆騎出入市里郊野逺至旁縣鬬雞走馬常自稱富平侯家人富平侯者侍中張放也放安世元孫元帝妹敬武公主之子取皇后弟平恩侯許嘉女襲封富平侯為侍中中郎將監長樂屯兵儀比將軍與上同臥起寵幸無比故假稱之三月丞相禹罷夏四月以薛宣為丞相封高陽侯禹以老病罷朝朔望位特進賞賜甚厚宣為相宣以左馮翊遷少府谷永言宣經術文雅足以謀王體斷國論乃擢為御史大夫遂相官屬譏其煩碎無大體不稱賢也壬寅二年春三月飛雉集未央宮承明殿三輔黃圖未央宮有承明殿博士行大射禮胡三省注古者天子諸侯大夫士皆有大射之禮博士所行士之射禮也有飛雉集于庭登堂而雊又集太常宗正丞相御史車騎府又集未央宮承明殿王音言曰天地之氣以類相應譴告人君甚微而著雉者聽察先聞雷聲故經載高宗雊雉之異事見前以明轉禍為福之驗今以博士行禮之日大衆聚會飛集于庭厯階登堂厯三公之府典宗廟骨肉之官然後入宮宿留其曉人備具深切雖人道相戒何以過是後帝使詔音曰聞捕得雉毛羽頗摧折類拘執者得無人為之音復對曰誰為佞諂之語誣亂聖聽如此陛下即位十五年繼嗣不立日日駕車而出流聞海內皇天數見災異尚不能感動陛下臣子何望獨有極言待死命在朝暮而已如有不然高祖天下當以誰屬乎宜謀于賢知克已復禮以求天意則繼嗣可立災異尚可銷也癸卯三年夏王氏五侯有罪詣闕謝赦不誅王氏五侯爭以奢侈相尚商嘗病從上借明光宮後又穿城引水注第中大陂以行船立羽蓋張周帷上幸商第見而銜之後微行出過曲陽侯第又見園中土山漸臺象白虎殿于是怒以讓車騎將軍音商根欲自黥劓以謝太后上大怒使尚書責問司隸京兆知商等奢僭不軌阿縱不舉奏又賜音䇿書曰外家宗族強上一身寖弱日久今將一施之師古曰行刑罰君其召諸侯令待府舍是日詔尚書奏文帝時誅將軍薄昭故事音藉稿請罪商立根皆負斧質謝上競不忍誅冬十一月廢皇后許氏初許皇后與班偼妤班氏楚鬬班之後以名為氏偼妤越騎校尉况女皆有寵上嘗遊後庭欲與偼妤同輦辭曰觀古圖畫聖賢之君皆有名臣在側三代末主乃有嬖妾今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬列女傳樊姬楚莊王夫人王好獵姬數諫不聽乃不食禽獸肉二年王感悟之而勤政事今有班偼妤後帝微行過陽阿主家悅歌舞者趙飛燕召入宫大幸女弟復召入姿性尤醲粹左右皆嘖嘖嘆賞有宣帝時披香博士淖方城在帝後唾曰此禍水也滅火必矣姊弟俱為偼妤貴傾後宮于是譖告許皇后班偼妤祝詛主上后姊平安剛侯夫人謁等為媚道祝詛後宮有身者王美人及王鳯等事發覺太后大怒下吏考問謁等誅死許后廢處昭臺宮考問班偼妤對曰妾聞死生有命富貴在天修正尚未蒙福為邪欲以何望使鬼神有知不受不臣之訴如其無知訴之何益故不為也上善其對赦之偼妤久恐見危乃求共養太后于長信宮上許之後帝崩偼妤充奉園陵卒因葬園中甲辰四年秋河水溢渤海清河信都河水湓溢灌縣邑三十一敗官亭民舍四萬餘所李尋平陵人字子長治尚書好洪範災異等奏言議者常欲索九河故道而穿之時河隄都尉許商與丞相史孫禁共行視圖方略禁以為可決平原金隄間開道大河令入故篤馬河至海五百里商以為古九河有徒駭胡蘇鬲津今見在成平東光鬲界中相去二百餘里今河雖數移徙不離此域禁所欲開在九河南失水之迹不可許公卿皆從商言曰篤馬河在山東平原縣徑樂陵陽信其入海處亦陷河徒駭河胡渭以為即禹河入海故道注見前胡蘇河在直𨽻東光縣今縣有胡蘇亭于欽齊乘曰滄州南有大連澱即胡蘇也鬲津河在今山東德州徑德平樂陵至海豐入海成平鬲皆漢縣注見前東光今縣屬直𨽻河間府今因其自決可且勿塞以觀水勢河欲居之當稍自成川跳出沙土然後順天心而圖之必有成功而用財力寡于是遂止不塞朝臣數言百姓可哀上遣使者振贍之冬以趙護河東都尉為廣漢太守討賊鄭躬等平之先是廣漢鄭躬等篡囚徒盜庫兵自稱山君事在三年時黨與寖廣犯厯四縣拜護為太守發郡中及蜀郡兵合三萬人擊之或相捕斬除罪旬月平遷護為執金吾後陳留樊並山陽鐵官徒蘇令復攻殺長吏自稱將軍延厯數郡皆即捕誅事在水始三年王談卒詔王商位特進領城門兵談卒上悔前廢之不輔政而薨也乃復詔成都侯商以特進領城門兵置幕府得舉吏如將軍杜鄴説音宜承聖意加異往時每議必與及之音由是與商親密乙巳永始元年夏四月封趙臨為成陽侯下諫大夫劉輔河間宗室獄論為鬼薪上欲立趙偼妤為皇后皇太后嫌其所出微難之太后姊子淳于長魏郡元城人少為黃門郎以王鳯薦至九卿往來通語歲餘始許之乃先封偼妤父臨為成陽侯劉輔上言臣聞天之所與必先賜以符瑞天之所違必先降以災變此自然之占驗也昔武王周公承順天地以饗魚烏之瑞然猶君臣祗懼動色相戒况于季世不蒙繼嗣之福屢受威怒之異者乎雖夙夜自責改過易行妙選有德之世考卜窈窕之女以承宗廟順神祗子孫之祥猶恐晚暮今乃觸情縱欲傾于卑賤之女欲以母天下惑莫大焉書奏詔繫掖庭祕獄顔師古曰漢書舊儀掖庭詔獄令丞宦者為之主理婦人女官也于是辛慶忌武賢子字子真亷褒師丹師以官為氏丹字仲公琅琊東武人谷永俱上書救援略曰臣聞明王垂寬容之聽不罪狂狷之言然後百僚竭忠不懼後患竊見劉輔前以縣令求見擢為諫大夫旬月之間下祕獄臣愚以為輔新從下土來未知朝廷體獨觸忌諱不足深過如有大惡宜暴治理官與衆共之惟陛下留神省察上乃徙繫輔共公獄師古曰少府之屬官也亦有詔獄減死罪一等論為鬼薪終于家五月封太后弟子莽為新都侯國南陽新野之都鄉太后兄弟八人獨弟曼早死不侯子莾幼孤時五侯侈靡子弟以輿馬聲色佚遊相高莽因折節為恭儉勤身博學被服如儒生事母及寡嫂養孤兄子行甚敕備又外交英俊內事諸父曲有禮意鳯且死以莽託太后及帝拜黃門郎久之成都侯商又請分戶邑封莽至是封新都侯遷騎都尉光祿大夫侍中宿衛謹敕爵位益尊節操愈謙振施賔客家無所餘收贍名士交結將相故在位更推薦之虛譽隆洽傾其諸父矣六月立偼妤趙氏為皇后后既立寵少衰而其女弟絶幸為昭儀居昭陽宫皆以黃金白玉明珠翠羽飾之自後宫未嘗有焉后居别館多通侍郎宫奴多子者然卒無子光祿大夫劉向以為王教由內及外自近者始于是采取詩書所載賢妃貞婦興國顯家及孽嬖為亂亡者序次為列女傳又采傳記行事著新序説苑奏之數上疏言得失陳法戒上雖不能盡用然內嘉其言常嗟嘆之秋七月詔罷昌陵反故陵勿徙吏民初元帝儉約渭陵不復徙民起邑至帝以渭城延陵亭部在今西安府咸陽縣西北為初陵數年復樂霸陵曲亭南更起昌陵營之將作大將解萬年自詭三年可成請徙郡國豪傑于昌陵帝從之制度泰奢功久不就劉向上書諫略曰孝文皇帝嘗美石椁之固張釋之曰使其中有可欲雖錮南山猶有隙夫死者無終極而國家有廢興故釋之之言為無窮計也黃帝堯舜禹湯文武周公邱隴皆小葬具甚微其賢臣孝子亦承命順意而薄葬之此誠奉安君父忠孝之至也孔子葬母于防墳四尺延陵季子葬其子封墳掩坎其高可隱故仲尼孝子而延陵慈父舜禹忠臣周公弟弟其葬君親骨肉皆微薄非茍為儉誠便于體也秦始皇葬于驪山之阿下錮三泉上崇山墳數年之間項籍燔其宫室營宇牧兒持火照求亡羊失火燒其藏椁是故德彌厚者葬彌薄知愈深者葬愈微邱隴彌高宫廟甚麗發掘必速唯陛下上覽明聖之制以為則下觀亡秦之禍以為戒上感其言詔罷昌陵反故陵勿徙吏民萬年以邪佞徙敦煌封蕭何六世孫喜為酇侯喜時為南䜌漢縣隋更名巨鹿今屬直𨽻順德府長以杜業請故封喜傳至曽孫禹更為蕭鄉侯王莽敗絶八月太皇太后崩宣帝卭成王皇后九月黑龍見東萊丁巳晦日食丙午二年春正月大司馬車騎將軍音卒諡曰敬王氏惟音為修整數諫正有忠節子舜嗣為太僕侍中二月星隕如雨是月乙酉晦日食谷永為涼州刺史奏事京師上使尚書問永所欲言時帝溺于燕樂皇太后與王商等深以為憂乃使永因天變切諫而勸上納用之永亦知有內應展意無所依違遂具疏對略言去年九月龍見日食今年二月星隕日食六月之間大異四發三代之末未嘗聞也臣聞三代所以隕喪者皆由婦人與羣惡沈湎于酒秦所以亡者養生泰奢奉終泰厚也今陛下兼而有之建始河平之際許班熏灼四方女寵極矣今之後起什倍于前掖庭獄阱生入死出者不可勝數是以日食再既以昭其辜陛下棄萬乘之至貴樂家人之賤事聚僄輕無義小人以為私客數離深宮晨夜與羣小相隨烏集吏民之家亂服共坐沈湎媟嫚典門户奉宿衛之臣執干戈而守空宮公卿百僚不知陛下所在積數年矣陛下輕奪民財不愛民力去高敞初陵改作昌陵大興繇役靡敝天下五年不成而後反故百姓怨恨上下俱匱無以相救漢興九世繼體之主或以中興或以治安陛下獨違道縱欲輕身妄行無繼嗣之福有危亡之憂為人後嗣如此豈不負哉誠肯昭然逺寤舊愆畢改新德既章則大異可銷天命可復社禝宗廟可保對上上大怒王商密摘永令發去上使侍御史收永敕過交道廄在今西安府咸陽縣西北者勿追御史不及永還上意亦解三月以王商為大司馬衛將軍王立位特進領城門兵侍中張放以罪左遷北地都尉上嘗與張放等宴飲禁中皆引滿舉白談笑大噱時乘輿幄坐屏風畫紂醉踞妲己作長夜之樂侍中班伯况之子偼妤之弟以王鳳薦由中常侍至侍中光祿大夫久疾新起入見上指畫問之曰此圖何以示戒伯對曰沈湎于酒微子所以告去也式號式呼大雅所以流連也詩書淫亂之戒其原皆在于酒上乃喟然嘆曰吾久不見班生今日復聞讜言放等不懌稍自引起更衣因罷出後上朝東宫太后泣曰帝間顔色瘦黑班侍中本大將軍所舉宜寵異之以輔聖德遣富平侯且就國上曰諾時上諸舅皆害放寵聞太后言風丞相薛宣御史大夫翟方進字子威汝南上蔡人奏放罪惡上不得已左遷放為北地都尉數月徵入為侍中復出為天水屬國都尉上雖愛放然上迫太后下用大臣故常涕泣而遣之既去璽書勞問不絶後放歸侍母疾疾瘳出為河東都尉復徴為侍中丞相翟方進復奏放上不得已免放賜錢五百萬因遣就國及帝崩放思慕哭泣而死冬十二月䇿免丞相宣及御史大夫翟方進復以方進為丞相封髙陵侯孔光字子夏孔子十四世孫霸之子為御史大夫太皇太后王氏崩喪事倉卒吏賦斂以趨辦師古曰趨讀曰趣與促同言茍取辦上以過丞相御史䇿免宣為庶人方進左遷執金吾丞相官缺羣臣多舉方進上亦器其能擢方進為丞相以光為御史大夫方進公潔請托不行持法刻深任勢立威中傷甚多陳咸朱博蕭育逄信孫閎之屬皆京師世家以材能少歷牧守列卿知名當世方進據法以彈皆罷退之有言其挾私詆罪者上以方進所舉應科不以為非也光領尚書典樞機十餘年上有所問據經法以心所安而對不希指茍合如或不從不敢強爭以是久而安時有所言輒削草藁以為章主之過以姦忠直人臣大罪也有所薦舉惟恐其人聞知沐日歸休兄弟妻子燕語終不及朝省政事或問光溫室樹皆何木也光不應更答以他語其不泄如是丁未三年春正月己卯晦日食冬十月復泰畤汾隂五畤陳寶祠初帝罷甘泉泰畤事在建始元年其日大風壞甘泉竹宫禮樂志武帝用事甘泉圜丘至夜常有神光天子自竹宫而望拜韋昭曰以竹為宫天子居中漢舊儀云竹宫去壇三里折拔畤中樹木十圍以上百餘帝異之以問劉向對曰家人尚不欲絶種祠况于國之神寶舊畤且其始立皆有神祇感應誠未易動上意恨顔師古曰悔也之又以久無繼嗣令詔有司復甘泉泰畤汾隂后土如故及雍五畤陳倉陳寶祠是時上頗好鬼神方術祠祭費用多谷永上書曰臣聞明于天地之性不可惑以神怪知萬物之情不可罔以非類諸背仁義之正道不遵五經之法言而盛稱竒怪鬼神及有仙人服食不終之藥黃白變化之術者皆詐偽欺罔聽其言洋洋滿耳若將可遇求之蕩蕩如繫風捕景終不可得是以明主拒而不聽聖人絶而不語惟陛下拒絶此類毋令姦人有所窺𨵦上善其言後帝崩復南北郊長安如故哀帝建平二年又復甘泉泰畤汾隂后土祠至平帝元始五年復南北郊如匡衡等議故南昌尉梅福九江夀春人明尚書榖梁春秋為郡文學補南昌尉上書不報福數因縣道上變事顔師古曰附縣道之使而封奏也輒報罷至是復上書曰士者國之重器得士則重失士則輕臣聞齊桓之時有以九九見者顔師古曰九九算術若今九章之類桓公不逆今臣所言非特九九也自陽朔以來羣臣皆承順上指莫有執正故京兆尹王章面引廷爭戮及妻子折直士之節結諌臣之舌天下以言為戒最國家之大患也往者不可及來者猶可追方今君命犯而主威奪外戚之權日以益隆陛下不見其形願察其景建始以來日食地震三倍春秋水災亡與比數隂盛陽微金鐵為飛事見前此何景也親親之道全之為右今乃尊寵其位授以魁柄勢凌于君權隆于主然後防之亦亡及已上不納時福家居常以讀書養性為事至元始中王莽顓政福一朝棄妻子去人傳以為仙其後有見之于會稽者變名姓為吳市門卒云戊申四年秋七月辛未晦日食以何武字君公蜀郡郫縣人為京兆尹武為吏守法盡公進善退惡所居無赫赫名去後常見思其為刺史時二千石有罪應時輒奏行部必先即學宫見諸生問以得失然後入傳舍問墾田美惡已見二千石後以所舉方正詭衆虛偽坐左遷楚內史又遷沛郡太守復入為廷尉御批歷代通鑑輯覽卷十八

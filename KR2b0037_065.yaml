front:
  text: 欽定四庫全書御批厯代通鑑輯覽卷六十六五季癸晉岐吳稱唐天祐十年梁主瑱酉乾化三年是嵗凡五國五鎮春二月梁均王友貞起兵討賊友圭伏誅友貞立于大梁更名瑱朱友謙復歸梁
  hash: sha256:54895e7bd4f034e7805442755193631fb700f7661169a94da818b66b5c8372b4

front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷五十九唐徳宗皇帝甲戌貞元十年春正月雲南撃吐蕃大破之遣使來獻捷
  hash: sha256:f0c4e6478832916f0c456f973b4a1d963980fbf74ebf6aaebafcd5636df0598f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_058-1a, image: WYG0337/WYG0337-0325a.png}
body:
  text: 韋臯遣其節度巡官崔佐時齎詔詣雲南佐時至吐蕃使者數百人先在其國異牟尋令佐時衣牂牁注見前服而入佐時曰我大唐使者豈得衣小夷之服異牟尋不得已乃夜迎之佐時大宣詔書異牟尋恐懼失色歔欷受詔佐時因勸異牟尋悉斬吐蕃使者去其所立之號復南詔舊名異牟尋皆從之與佐時盟于㸃蒼山在今大理府太和縣西湞載記山高千餘仞有峯十九蒼翠如玉䝉氏封為中岳神祠在山中峯之麓先是吐蕃徵兵于雲南異牟尋許發五千人與之至是遣五千人前行異牟尋自將數萬人踵其後襲撃吐蕃大破之取十六城虜其五王降其衆十餘萬遣使獻捷已而異牟尋復遣其弟獻地圖土貢及吐蕃所給金印請復號南詔詔以袁滋字徳深蔡州朗山人為冊使立異牟尋為南詔王詔賜銀窠金印異牟尋北面跪受因與使者宴出元宗所賜器物指老笛工歌女曰皇帝所賜龜兹樂唯二人在耳袁滋曰南詔當深思祖考子子孫孫盡忠于唐異牟尋曰敢不敬承使者之命夏六月昭義節度使李抱真卒李抱真卒抱真惑方士之言餌丹二萬餘丸不食而死其子緘祕不發䘮詐為抱真表求以職事授已都虞候王延貴字君佐汝州梁人素以義勇聞上知抱真已卒遣中使第五守進往觀變且以軍事委延貴守進至謂緘曰朝廷已知相公捐館令王延貴權知軍事侍御宜發䘮行服緘愕然出謂諸將曰朝廷不許緘掌事諸君意何如衆莫對緘乃發䘮守進召延貴宣口詔令視事趣緘赴東都尋以延貴為節度使賜名䖍休冬十二月陸䞇罷為太子賔客裴延齡恣為詭譎處之不疑上欲修神龍寺延齡奏同州一谷有木數千株皆可八十尺上曰開元天寳間求美材于近畿猶不可得今安得有之對曰天生珍材固待聖君乃出開元天寳何從得之又奏簡閲左藏于糞土中得銀十三萬兩雜貨百萬有餘請入雜庫以供别支大府少卿韋少華抗表稱此皆每月申奏之物請加推驗不許上亦頗知延齡誕妄但以其好詆毁人冀聞外事故親厚之羣臣畏其有竉莫敢言陸䞇獨以身當之上書極陳延齡姦詐數其罪惡其畧曰延齡以聚歛為長策以詭妄為嘉謀以掊克歛怨為匪躬以靖譖服讒為盡節可謂堯代之共工魯邦之少卯跡其姦蠧日長月滋移東就西便為課績取此通彼遂號羨餘昔趙髙指鹿為馬臣謂鹿之與馬物理猶同豈若延齡掩有為無指無為有臣以卑鄙任當台衡情激于喪雖欲罷而不能自黙也書奏上不悦待延齡益厚趙憬之入相也䞇實引之既而有憾于䞇事見前宻以䞇所譏彈延齡事告之延齡益得以為計上由是信延齡而不直䞇䞇與憬約至上前極論延齡姦邪上怒形于色憬黙而無言遂罷䞇為太子賓客䞇為相嘗奏論備邊六失以為措置乖方課責虧度財匱于兵衆力分于將多怨生于不均機失于遥制夫闗東戍卒不習土風身苦邊荒心畏戎虜或利王師之敗乘擾攘而東潰或拔棄城鎮摇逺近之心豈惟無益實亦有損可謂措置乖方矣自頃權移于下柄失于朝將之號令既鮮克行之於軍國之典常又不能施之于將罪以隐忍而不彰功以嫌疑而不賞使忘身效節者獲誚于等夷率衆先登者取怨于士卒僨軍蹙國者不懷于愧畏緩救失期者自以為智能可謂課責虧度矣虜毎入冦將帥虚張威勢惟務徵發益師無禆備禦之功重増供億之弊有司所入半以事邊閭井日耗徵求日繁可謂財匱于兵衆矣夫兵以氣勢用者也氣聚則盛散則消勢合則盛析則弱自頃分割朔方列為三使其餘鎮軍數且四十既無軍法下臨惟以客禮相待可謂力分于將多矣理戎之要在于練覈優劣之科以為衣食等級之制使能者企及否者息心今窮邊長鎮之兵皆百戰傷夷之餘終年勤苦而常有凍餒之色關東戍卒怯于應敵而衣糧所頒厚踰數等又有素非禁旅遥𨽻神策其于廪賜之饒遂有三倍之益可謂怨生于不均矣自頃邊軍去就裁斷多出宸裏戎虜馳突迅如風飈驛書上聞旬月方報守土者以兵寡不敢抗敵分鎮者以無詔不肯出師賊既縱掠退歸此乃陳功告㨗將帥幸于總制在朝不憂罪累陛下又以為大權由已不究事情可謂機失于遥制矣臣謂宜罷諸道防秋令本道但供衣糧募戍卒願留及蕃漢子弟多開屯田官為収糴冦至則人自為戰時至則家自力農又擇文武能臣為隴右朔方河東之元帥縁邊諸鎮有非要者隨便併之然後减姦濫虚浮之費以豐財定衣糧等級之制以和衆𢎞委任之道以宣其用懸賞罰之典以考其成如是則戎狄威懷疆塲寧謐矣上雖不能盡用心甚重之収上性猜忌官無大小必自選用一經譴責終身不好以辨給取人不得敦實之士䞇又諫曰登進以懋庸黜退以懲過二者迭用理如循環故能使黜退者克勵以求復登進者警飭以恪居上無滯疑下無蓄怨又曰明王不以辭盡人不以意選士如或好善而不擇所用悦言而不驗所行進退隨愛憎之情離合繫異同之趣是猶捨繩墨而意裁曲直棄權衡而手揣重輕雖甚精微不能無謬又曰中人以上迭有所長苟區别得宜付授當器及乎合以成功亦與全才無異但在明鑒大度御之有道而已以一言稱愜為能而不核虚實以一事違忤為咎而不考忠邪稱愜則付任逾涯不思其所不及違忤則罪責過當不恕其所不能則職司之内無成功君臣之際無定分矣上不聽贄又奏請均節財賦凡六條其一論兩税之弊畧曰舊制租庸調法天下均一雖欲轉徙莫容其姦故入無摇心而事有定制兵興以來版圖隳壊執事者知弊之宜革而遂失其原知簡之可從而不得其要遽更舊法以為兩税但取大厯中一年科率最多者以為定數夫財之所生必因人力故先王之制賦入必以丁夫為本不以務穡増其税不以輟稼減其租則播種多不以殖産厚其征不以流寓免其調則地著固不以飭勵重其役不以窳怠蠲其庸則功力勤兩税之立惟以資産為宗不以丁身為本由是務輕資而樂轉徙者恒脱于徭税敦本業而樹居産者毎困于徵求此乃誘之為姦驅之避役創制之首不務齊平供應有煩簡之殊牧守有能否之異所在徭賦輕重相懸所遣使臣意見各異計奏一定有加無除又大厯中供軍進奉之類既収入兩税今于兩税之外復又並存望稍行均減以救彫殘其二請兩税以布帛為額畧曰榖帛者人之所為錢貨者官之所為也是以兩朝著令租出穀庸出絹調出繒纊布曷有禁人鑄錢而以錢為賦者哉今之兩税獨以錢穀定税所徵非所業所業非所徵遂或増價以買其所無減價以賣其所有一増一減耗損已多望勘會諸州初納兩税年絹布定估比類當今時價加賤減貴酌取其中總計合税之錢折為布帛之數其三論長吏以増户加税闢田為課績畧曰長人者罕能推忠恕之情體至公之意以傾奪隣境為智能以招萃逋逃為理化捨彼適此者既為新収而有復倐往忽來者又以復業而見優惟安居不遷者則使之日重斂之日加請詳定考績若管内阜殷税額有餘任其據戸口均減以減數多少為考課等差其十分減三者為上課減二者次焉減一者又次焉如或人多流亡加税見户比較殿罰法亦如之其四論税限廹促畧曰蠶事方興已輸縑税農功未艾遽斂穀租上司之繩責既嚴下吏之威暴愈促有者急賣而耗其半直無者求假而費其倍酬望更詳定徵税期限其五請以税茶錢置義倉以備水旱其六論兼并之家私斂重于公税請為占田條限裁減租價事皆不行䞇以上知待之厚事有不可常力争之或規其太鋭䞇曰吾上不負天子下不負所學他無所恤乙亥十一年夏四月貶陸䞇為忠州唐置今𨽻四川别駕裴延齡譖李充張滂李銛黨于陸䞇充為京兆尹滂為鹽鐵使銛為司農卿以職事相闗時證延齡之妄故惡之㑹旱延齡奏言䞇等失勢怨望言天旱民流度支多欠諸軍芻糧動摇衆心其意非止欲中傷臣而已後數日上獵苑中適有軍士訴度支不給馬芻上意延齡言為信遽還宫貶䞇為忠州别駕充滂銛皆為諸州長史初陽城自處士徵為諫議大夫拜官不辭人皆想望風采曰城必諫諍死職下及至諸諫官紛紛言事細碎天子益厭之而城方與客日夜痛飲人莫能窺其際皆以為虛得名耳前進士韓愈字退之河陽人作争臣論以譏之城亦不以屑意及陸䞇等坐貶上怒未觧中外惴恐以為罪且不測無敢救者城即帥拾遺王仲舒字宏中并州祁人補闕熊執易崔邠字處仁武城人等守延英門上疏論延齡姦侫䞇等無罪上大怒欲罪之太子為營救乃觧令宰相諭遣之金吾將軍張萬福聞諌官伏閤趣往大言賀曰武朝廷有直臣天下必太平矣遂徧拜城等萬福人年八十餘自此名重天下時朝夕相延齡城曰脱以延齡為相當取白麻壞之慟哭于廷李繁者泌之子也城盡數延齡過惡欲密論之使繁繕冩繁徑以告延齡延齡先詣上一一自觧疏入上以為妄不之省尋改城為國子司業五月以李説字巖甫淮安王神通五世孫為河東留後河東節度使李自良卒監軍王定逺奏請以行軍司馬李説為留後説深徳定逺為請鑄監軍印從之監軍有印自此始定逺自以有功于李説遂專軍政殺大將彭令茵説奏其状定逺詣説刺之説走免定逺召諸將謂曰有勅以李景畧為留後諸軍皆遷官大將馬良輔覺之麾衆不受定逺走踰城墜死秋八月司徒侍中北平王馬燧卒謚曰莊武冬十月横海軍亂逐其節度使程懷直横海節度使程懷直不恤士卒出獵數日不歸懷直從父兄懷信閉門拒之懷直奔京師以懷信為留後丙子十二年春正月以渾瑊王武俊兼中書令嚴震田緒劉濟韋臯並同平章事諸節鎮悉加檢校官欲以悦其意也三月以李齊運蔣王惲之孫為禮部尚書齊運無才能學術專以柔佞得幸每宰相對罷則齊運進决其議或病卧家上欲有所除授遣中使就問之夏四月魏博節度使田緒卒緒尚嘉誠公主有庻子三人季安最㓜公主子之緒卒左右推季安為留後六月以竇文場霍僊鳴為䕶軍中尉初上置六統軍視六尚書以處罷鎮者相承用麻紙冩制至是文場諷宰相比統軍降麻翰林學士鄭絪字文明鄭州榮陽人奏故事惟封王命相用白麻今不識陛下特以寵文場邪遂為著令也上乃謂文場曰武徳貞觀時中人不過員外將軍衣緋者無幾輔國以來始隳制度朕令用爾不謂無私若復降麻天下必謂爾脇我為之矣文場叩頭謝遂焚之謂絪曰宰相不能違拒中人朕得卿言方寤耳是時竇霍勢傾中外藩帥多出神策軍臺省清要亦有出其門者矣以嚴綬挺之族孫為刑部員外郎初上以奉天窘乏故還宫以來專意聚斂藩鎮多以進奉市恩皆云税外方圓胡三省注折則成方轉則成圓言于常税之外别自轉折以致貨財也亦云用度羡餘其實或増斂百姓或減刻吏禄或販鬻蔬果往往自入所進纔什一二李兼在江西有月進韋臯在西川有日進其後常州刺史裴肅濟源人以進奉遷浙東觀察使刺史進奉自肅始宣歙判官嚴綬掌留務竭府庫以進奉徵為刑部員外郎幕僚進奉自綬始綬以進奉上記其名行遷河東行軍司馬不踰年即授節度使湖南觀察使吕渭奏發永州刺吏陽履贓賄三司鞫之對曰所斂物已市馬進之矣詰馬主為誰馬齒幾何對曰馬主東西南北之人今不知所之按禮齒路馬有誅故不知其齒上悦其進奉之言免官而已吕渭字君載河中人秋七月宣武軍亂以董晉為節度使宣武節度使李萬榮病不知事霍仙鳴薦押牙劉沐為行軍司馬時萬榮子廼為兵馬使上遣中使第五守進至汴州宣慰軍士呼曰兵馬使勤勞無賞劉沭何人為行軍司馬沐懼陽中風舁出軍士欲斫守進廼止之遂殺大將數人都虞候鄧惟恭滑州匡城人執廼送京師詔董晉為宣武節度使萬榮卒惟恭遂權軍事不遣人迎晉晉受詔即與傔從十餘人赴鎮不用兵衛惟恭以晉來速不及謀乃帥諸將出迎晉命惟恭勿下馬氣色甚和既入仍委以軍政惟恭尋謀作亂晉誅其黨械惟恭送京時朝議以董晉柔仁恐不能集事乃以汝州刺史陸長源為行軍司馬以佐之長源性剛刻多更張事晉初皆許之案成則命且罷由是軍中得安陸長源字泳吳人八月乙未朔日食九月以李景畧為豐州都防禦使初上不欲生代節度使常自擇行軍司馬以為儲帥李景畧為河東行軍司馬李説忌之囘鶻梅録入貢過太原説與之宴梅錄争坐次説不能遏景畧叱之梅錄識其聲趨而拜之曰非豐州李端公唐人稱侍御史為端公邪遂就下坐坐中皆屬目于景畧説益不平乃厚賂竇文場使去之㑹有傳囘鶻將入寇者上以豐州當虜衝擇可守者文場因薦景畧豐州窮邊氣寒土瘠民貧景畧以勤儉帥衆二嵗之後儲備完實雄于北邊裴延齡死中外相賀上獨悼惜之諌議大夫崔損常為延齡所薦上即以為同平章事崔損字至無元暐之從孫冬十一月以韋渠牟述從孫為諫議大夫上自陸䞇貶官尤不任宰相自縣以上皆自選用中書行文書而已然深居宫中所取信者裴延齡李齊運司農卿李實道王元慶四世孫翰林學士韋執誼京兆人及渠牟皆權傾宰相趨附盈門實狡險掊克執誼以文章與上唱和年二十餘入翰林渠牟形神恌躁尤為上所親狎故事上生日用沙門道士講論于麟徳殿既而以儒士參之渠牟嘲談辯給上悦之由四門博士旬日間遷補闕至是遂為諌議大夫上毎對執政漏不過三刻渠牟奏事率至六刻語笑欵狎往往聞外所薦引咸不次遷擢率皆庸鄙之士丁丑十三年春二月築方渠合道木波九域志環州方渠縣有木波馬嶺石昌合道四鎮四環州今慶陽府環縣是方渠廢縣及鎮故址俱在今環縣三城上以方渠合道木波皆吐蕃要路欲城之使問邠寧節度使楊朝晟須幾何兵對曰邠寧兵足以城之上曰曏城鹽州用兵七萬今三城尤逼虜境如此何也對曰今發本鎮兵不旬日至出其不意而城之虜謂吾衆不減七萬不敢輕來不過三旬吾城已畢虜雖至城旁草盡不能乆留虜退則運芻糧以實之此萬全之策也若大集諸道兵踰月始至虜亦集衆而來與我争戰勝負未可知何暇築城哉上從之朝晟分軍為三各築一城踰月三城成朝晟軍還至馬嶺吐蕃始出追之相拒數日而去朝晟遂城馬嶺而還開地三百里皆如其素謂皆如其素所慮之期也以姚南仲革州下邽人為義成節度使初李復為義成節度使辟盧坦字保衡洛陽人為判官監軍薛盈珍數侵軍政坦據理拒之盈珍曰盧侍御所言公我固不違也及是復卒詔以陜虢觀察使姚南仲代之盈珍曰姚大夫書生豈將才也坦私謂人曰姚大夫外柔中剛監軍侵之必不受軍府之禍自此始矣遂潛去既而盈珍與南仲有隙盈珍欲奪南仲軍政南仲不從故有隙幕府多以罪貶有死者後上徴盈珍還盈珍遣小吏乗驛誣奏南仲罪牙將曹文洽追殺之自作表雪南仲之寃且首專殺之罪遂自殺驛吏以聞上異之遂召還盈珍南仲亦入朝待罪上召見問曰盈珍擾卿邪對曰盈珍不擾臣但壞陛下法耳且天下如盈珍軰何可勝數雖使羊杜復生亦不能行愷悌之政成攻取之功也上黙然竟不罪盈珍乃使掌機密秋七月起復張茂宗茂昭之弟為左衛軍尚公主茂宗許尚義章公主帝之女未成昏母卒遺表請終嘉禮上許之拾遺蔣艾字徳源常州義興人上疏曰古有墨衰以從金革之事者未聞駙馬起復尚主也上曰人間多借吉成昏者卿何執此之堅對曰婚姻䘮紀人之大倫吉凶不可凟也委巷之家不知禮數其女孤貧無恃或有借吉從人未聞男子借吉娶婦者也上不悦命趣下嫁之期遂成昏冬十二月以宦者為宫市使先是宫中市外間物令官吏主之隨給其直比嵗以宦者為使謂之宫市置白望數百人抑買人物以紅紫染故衣敗繒尺寸裂而給之仍索進奉門户及脚價錢名為宫市其實奪之嘗有農夫以驢負柴宦者稱宫市取之又就索門户農夫曰我有父母妻子待此然後食今以柴與汝不取直而歸汝尚不肯我有死而已遂毆宦者街吏擒以聞詔黜宦者賜農夫絹十匹然宫市亦不為之改諫官御史數諫不聽徐州節度使張建封入朝具奏之上頗嘉納以問判度支蘇弁弁希宦者意對曰京師游手萬家無土著生業仰宫市取給上信之故凡言宫市者皆不聽戊寅十四年秋八月初置神策統軍時禁軍戍邊者禀賜優厚諸將多請遥𨽻神䇿其軍遂至十五萬人九月以于頔字允元謹七世孫為山南東道節度使頔由陜虢觀察使為山南東道節度使請陞襄州為大都督府從之上晚年益務姑息頔所奏建無不開允頔嘗誣劾吉州刺史元洪贓罪上為之流端州頔復表洪責太重丄因改洪吉州長史頔又怒判官薛正倫奏貶之比詔下頔怒已觧復奏署舊職初㐮州有髹器天下以為法及頔驕蹇凡方帥不法者號襄様節度吉州唐置今江西吉安府是端州隋置今廣東肇慶府是吳少誠判少誠遣兵侵掠夀州殺鎮遏使已而復寇唐州掠臨潁陳許留後上官涚時曲環卒涚以刺史知留從遣將救之敗没少誠遂圍許州朝廷以涚為節度使涚欲棄城走營田副使劉昌裔字光後太原陽曲人諫止之少誠晝夜急攻昌裔鑿城出擊大破之城由是全兵馬使安國寜謀翻城應賊昌裔以斬之召其麾下人給二縑伏兵要巷見持縑者悉斬之無得脱者貶陽城為道州注見前刺史太學生薛約師事司業陽城坐言事徙連州隋置今𨽻廣東城送之郊外上以城黨罪人貶道州刺史城治民如治家賦税不登觀察使數加誚譲城自署其考曰撫字心勞徵科政拙考下下觀察使遣判官督其賦城自繫獄判官大驚馳謁之城不復歸判官辭去又遣他判官往案之判官載妻子行中道逸去己卯十五年春宣武節度使董晉卒軍亂殺留後陸長源長源性刻急恃才傲物軍中惡之晉卒長源知留後揚言曰將士弛慢日乆當以法齊之耳衆皆懼或勸之發財以勞軍長源曰我豈效河北賊以錢買健兒求節鉞邪軍中怨怒作亂殺長源監軍俱文珍以宋州刺史劉逸凖正臣之子乆為宣武大將得衆心召之逸凖引兵徑入汴州衆乃定遂以為節度使錫名曰全諒以李錡國貞之子為浙西觀察使諸道鹽鐵轉運使李齊運受李錡賂數十萬薦之于上故用之錡刻剥以事進奉上由是悦之錡以饋遺結權貴恃此驕縱無所忌憚布衣崔善貞詣闕上封事言宫市進奉及鹽鐵之弊因言錡不法事上械送錡錡生瘞之逺近聞之不寒而慄錡復欲為自全計増廣兵衆選有力善射者謂之挽彊胡奚雜類謂之蕃落給賜十倍他卒判官盧坦屢諫不悛與幕僚李守約等皆去之李守約勉之子以韓𢎞滑州匡城人為宣武節度使劉全諒卒軍中思劉元佐之恩推其甥兵馬使韓𢎞為留後詔以為節度使𢎞將兵識其才鄙勇怯指顧必堪其事先是吳少誠遣使與全諒約共攻陳許使者數軰猶在館𢎞悉驅出斬之選卒三千擊許下少誠由是失勢宣武軍自元佐卒凡五作亂𢎞召倡者及其黨三百人數而斬之自是至𢎞入朝二十一年士卒無一人敢讙呼于城郭者詔削奪呉少誠官爵令諸道兵討之諸軍討呉少誠者既無統帥進退不一自潰于小溵水溵亦作㶏水經注汝水别派謂之㶏水東逕征羗城北合小㶏水南流注于大㶏水考征羌故城在今許州郾城縣縣南有沙河下流至陳州府商水縣入于潁即古㶏水也委棄器械資糧皆為少誠所有于是始議置招討使冬十二月中書令咸寧王渾瑊卒諡曰忠武瑊性謙謹雖位窮將相無自矜大之色毎貢物必躬自閲視受賜如在上前上還自興元雖一州一鎮有兵者皆務姑息瑊毎奏事不過胡三省注唐制凡奏事得可者皆過中書門下不過者寢其奏不下也輒私喜曰上不疑我故能以功名終庚辰十六年春二月以韓全義興卒伍史失其先世為蔡州招討使夏五月全義與淮西兵戰于溵南溵水之南也大潰全義本出神策軍中尉竇文場愛之薦于上使統諸軍討呉少誠十七道兵皆受節度全義素無勇畧既為大帥毎議軍事監軍數十人争論紛然不決而罷士卒乆屯沮洳之地天暑病疫全義不存撫人有離心與淮西戰鋒鏑未交諸軍大潰退保五樓地名在今陳州府商水縣西南已而少誠襲擊全義全義大敗走保陳州徐泗濠節度使張建封卒建封鎮彭城十餘年軍府稱治病篤累表請代詔以韋夏卿字雲客京兆萬年人為行軍司馬勅下建封已卒軍士為變刦建封子愔令知軍府事殺留後及大將數人械繋監軍上聞之以李鄘為宣尉使鄘至召將士宣朝㫖諭以禍福脱監軍械使復其位比鄘還愔表求旌節朝廷不許加淮南節度使杜佑兼徐泗濠節度使使討之前鋒濟淮而敗佑不敢進朝廷不得已除愔團練使後名其軍曰武寧以愔為節度使初建封之疾病也濠州刺史杜兼隂圖代之疾驅至府幕僚李藩曰僕射疾危如此公宜在州防遏來欲何為不速去當奏之兼錯愕徑歸及是兼誣奏藩播動軍情上大恕密詔杜佑殺之佑素重藩出詔示之藩神色不變佑曰吾已密論用百口保君矣上猶疑之召藩詣長安望見其儀度安雅乃曰此豈為惡者耶即除秘書郎孫杜兼字處𢎞正倫五世李藩字叔翰趙州人秋九月以李元素字太樸密之裔孫為義成貞元元年更號滑亳許節度為義成軍節度使義成節度使盧羣字載初范陽人卒賈躭曰凡就軍中除節度使必有愛憎向背喜懼者相半故衆心不安自今願陛下只自朝廷除人庻無他變上以為然故有是命冬十月赦呉少誠復其官爵呉少誠引兵還蔡州先是韋臯聞諸軍討少誠無功請以渾瑊賈躭為元帥統諸軍若重煩元老則臣請以精鋭萬人下巴峽以翦凶逆不然因其請罪而赦之罷兩河諸軍以休息公私亦策之次也若少誠一旦為麾下所殺又當以其官爵授之則是除一少誠生一少誠為患無窮矣賈躭言于上曰賊意亦望恩貸恐須開其生路上然之㑹少誠致書監軍求昭洗監軍奏之詔赦少誠復其官爵韓全義至長安竇文場為掩其敗迹上禮遇甚厚全義稱足疾遣司馬崔放入對放為全義謝無功上曰全義能招來少誠其功大矣何必殺人然後為功耶辛巳十七年夏五月壬戌朔日食以髙固本渾瑊僮奴瑊以齊有髙固因名之為朔方節度使朔方節度使楊朝晟卒軍中欲奉寧州刺史劉南金為帥南金曰節度使固我所欲然非天子之命則不可命閉門不納衆去詣兵馬使髙固固逃匿搜得之固曰諸軍能用吾言則可衆曰惟命固曰母殺人母掠金帛衆曰諾乃共詣監軍請奏之衆曰劉君必撓吾事詐稱監軍命召計事至而殺之上聞之遣髙品唐内侍省官名薛盈珍往詗軍情盈珍遂以上㫖命固知軍事固宿將以寛厚得衆前使忌之置于散地同列多輕侮之及起為帥一無所報復由是軍中遂安成徳節度使王武俊卒以其子士真代之秋九月韋臯大破吐蕃于雅州唐置今為府屬四川初吐蕃寇鹽州又䧟麟州敇臯出兵深入吐蕃以分其勢臯遣將將兵二萬分出九道破吐蕃于雅州轉戰千里凡拔城七軍鎮五焚堡百五十斬首萬餘級圍維州唐置故城在今四川茂州保縣及昆明城唐縣後没吐蕃今為鹽源縣屬四川寧逺府明年吐蕃救維州臯撃敗之獲其將論莽熱吐蕃遣論莽熱將兵十萬觧維州之圍四川兵據險設伏以待之虜衆大敗擒論莽熱士卒死者大半維州毘明竟不下引兵還遣使獻論莽熱上赦之冬十月以韋臯為司徒南康王壬午十八年秋七月詔百官毋得正牙奏事嘉王諮議髙𢎞本正牙奏事自理逋債詔自今母得正牙奏事如有陳奏詣延英門請對議者以為正牙奏事所以達羣情講政事𢎞本無知黜之可也不當因人而廢事癸未十九年夏六月以孫榮義為右神策中尉榮義與右神策中尉楊志亷皆驕縱招權依附者衆宦官之勢益盛自正月不雨至於秋七月冬十二月以髙郢鄭珣瑜字元伯鄭州滎澤入同平章事時崔損卒齊抗罷相遂以郢珣瑜並同平章事貶韓愈為陽山漢縣今屬廣東連州令京兆尹李實恃恩驕傲為政暴戾務徵求以給進奉言于上曰今嵗雖早而禾苗甚美由是租税皆不免人窮至壞屋賣瓦木麥苗以輸官優人成輔端為謡嘲之實奏輔端誹謗朝政杖殺之監察御史韓愈言京畿百姓窮困今年税物徵未得者請俟來年遂坐貶甲申二十年春正月以任廸簡京兆萬年人為天徳軍防禦使初天徳防禦使李景畧嘗宴僚佐行酒者誤以醯進廸簡恐行酒者獲罪彊飲之歸而嘔血軍士聞之泣下及景畧卒遂欲奉以為帥監軍以聞詔從之秋八月以盧從史其先元魏時盛族後徙籍不常為昭義節度使昭義節度使李長榮卒上遣中使以手詔授本軍大將但軍士所附者即授之時大將來希皓為衆所服中使以手詔付之希皓曰此軍取人合是希皓但作節度使不得若朝廷以一束草來希皓亦必敬事言若束草為節度使亦必敬而事之因固辭兵馬使盧從史潛與監軍相結超出伍曰從史請且勾當此軍監軍曰此固合聖㫖中使因取詔授之從史再拜舞蹈希皓亟囘揮同列北面稱賀九月太子有疾初翰林待詔王伾杭州人善書王叔文越州山陰人善碁俱出入東宫娛侍太子叔文詭譎多詐自言讀書知治道太子嘗與諸侍讀論及宫市事曰寡人方欲極言之衆皆稱賛獨叔文無言既退太子自留叔文謂曰向者君獨無言豈有意耶叔文曰太子職當視膳問安不宜言外事陛下在位乆如疑太子収人心何以自觧太子泣曰非先生寡人無以知此遂大愛幸與伾相依附因言某可為相某可為將幸異日用之密結翰林學士韋執誼及朝士有名而求速進者陸淳字伯冲後更名質呉縣人吕温字和叔渭之子李景儉漢中王瑀之子韓曄滉族子韓泰字安平瑗族曽孫陳諫史不言何所人柳宗元字子厚其先河東人後徙于呉劉禹錫字夢得中山人等定為死友而凌凖字宗一程异字師舉長安人等又因其黨以進日與遊處蹤跡詭秘莫有知其端者及是太子始得風疾瘖不能言乙酉二十一年順宗皇帝永貞元年春正月帝崩太子即位是為順宗正月朔諸王親戚入賀太子獨以疾不能來上涕泣悲歎由是得疾凡二十餘日中外不通莫知兩宮安否帝崩倉猝召翰林學士鄭絪衛次公字從周河東人等草遺詔宦官或曰禁中議所立尚未定次公遽言曰太子雖有疾地居冡嫡中外屬心必不得已猶應立廣陵王名純太子之子即憲宗不然必大亂絪等從而和之議始定太子知人心憂疑力疾出九仙門内西苑東北角門召見諸軍使京師粗安明日太子即位以失音不能決事宦官李忠言昭容牛氏侍左右百官奏事自帷中可其奏王伾召叔文坐翰林中使決事伾入言于忠言稱詔行下外初無知者以韋執誼同平章事王叔文專國政首引執誼為相已用事于中與相倡和李師古發兵屯曹州時告哀使未至諸道義成節度使李元素密以遺詔示師古師古欲乗國䘮噬隣境乃集將士謂曰聖上萬福而元素忽傳遺詔是反也宜擊之遂發兵屯曹州且告假道于汴韓𢎞使謂曰汝能越吾界而為盗耶元素告急𢎞曰吾在此公安無恐或告曰剪棘夷道兵且至矣請備之𢎞曰兵來不除道也不為之應師古計窮且聞上即位乃罷兵呉少誠以牛皮遺師古師古以鹽資少誠譖過宣武界𢎞皆留之曰此于法不得以私相餽師古等皆憚之貶李實為通州西魏置宋改達州今州𨽻四川長史實殘暴掊斂及貶市里讙呼皆袖瓦碟遮道伺之以王伾為左散騎常侍王叔文為翰林學士伾寢陋呉語上所褻狎而叔文自許微知文義好言事上以故稍敬之以伾為散騎常侍仍待詔翰林叔文為學士庻事先下翰林使叔文可否然後宣于中書韋執誼承而行之韓泰柳宗元劉禹錫等采聽謀議汲汲如狂互相推奨僴然自得以為伊周管葛復出也榮辱進退生于造次惟其所欲不拘程式其門晝夜車馬如市伾亦尋為翰林學士大赦罷進奉宮市五坊小兒先是鹽鐵月進羡餘經入益少五坊小兒張捕鳥雀于閭里者皆為暴横以取人錢物至有張羅網于門或張井上近之輒曰汝驚供奉鳥雀即痛毆之出錢物求謝乃去或相聚飲于酒肆賣者就索其直多被毆詈或時留蛇一囊為質賣者求哀乃挈而去上在東宫知其弊故即位首禁之追陸䞇陽城赴京師未至卒徳宗之末十年無赦羣臣以微譴逐者不復敘用至是始得量移追陸䞇陽城赴京師二人皆未聞追詔而卒䞇之秉政也貶李吉甫為明州長史及䞇貶吉甫徙刺忠州䞇門人以為憂而吉甫忻然以宰相禮事之䞇遂與深交浙李吉甫字洪憲栖筠之子明州唐置今江寧波府是以杜佑為度支等使王叔文為副使先是叔文與其黨謀得國賦在手則可以結諸用事人取軍士心以固其權又懼人心不服藉杜佑雅有會計之名位重而務自全佑于貞元十八年春同平章事易可制故先令佑主其名而自除為副以專之叔文不以簿書為意日夜與其黨屏人竊語人莫測其所為以武元衡字伯蒼平一之孫為左庻子叔文之黨多為御史中丞元衡薄之劉禹錫求為山陵儀仗使判官不許叔文又使其黨誘元衡以權利不從由是左遷元衡為左庻子侍御史竇羣奏禹錫挾邪亂政不宜在朝又嘗謁叔文曰事固有不可知者叔文曰何謂也羣曰去嵗李實怙恩挾貴氣葢一時公當此時逡巡路旁乃江南一吏耳今公一旦復據其地安知路旁無如公者乎其黨欲逐之韋執誼以羣素有强直名止之京竇羣字丹立兆金城人立廣陵王純為皇太子上乆疾不愈中外危懼思早立太子而王叔文之黨欲專大權惡聞之宦官俱文珍劉光琦薛盈珍等疾叔文等乃啟上召學士鄭絪等入草制時牛昭容軰以廣陵王淳英睿惡之絪不復請書紙為立嫡以長字呈上上頷之乃立淳為太子更名純百官睹太子儀表大喜相賀有感泣者而叔文獨有憂色誦杜甫字子美襄陽人題諸葛亮祠堂詩以自况聞者哂之先是杜黄裳為裴延齡所惡留滯臺閣十年不遷及其壻韋執誼為相始遷太常卿黄裳勸執誼帥羣臣請太子監國執誼驚曰丈人甫得一官奈何啟口議禁中事黄裳勃然曰黄裳受恩三朝豈得以一官相買乎拂衣起出至是執誼恐太子不悦故以陸質為侍讀使潛伺太子意且觧之太子怒曰陛下令先生為寡人講經義耳何為預他事質懼而出陸質即陸淳避太子名改賈躭鄭珣瑜病不視事躭以王叔文黨用事惡之稱疾不出屢乞骸骨故事丞相方食百寮無敢謁見者叔文至中書欲見執誼直省以舊事告叔文怒叱之直省懼入白執誼慙赧起迎叔文就其閣語良乆叔文索飯執誼遂與同食閣中杜佑髙郢心知不可而莫敢言珣瑜獨歎曰吾豈可復居此位顧左右取馬徑歸遂不起二相皆天下重望相次歸卧叔文等益無所忌逺近大懼夏五月以范希朝為神策京西行營節度使韓㤗為行軍司馬王叔文自知為内外所疾欲奪取宦官兵權以自固藉希朝老將使主其名而實以泰專其事人益疑懼泰有籌畫能決大事為叔文等所倚重以王叔文為户部侍郎叔文為户部侍郎俱文珍等惡其專權削去翰林之職叔文驚曰叔文日至此商量公事若不得此院職事則無因而至矣王伾即為疏請乃許三五日一入翰林叔文始懼六月貶羊士諤為寧化唐縣今屬福建汀州府尉宣化巡官羊士諤以事至長安遇叔文用事公言其罪叔文怒欲斬之執誼不可遂貶焉執誼初為叔文所引用深附之既得位欲掩其迹且迫于公議故時時為異同輒使人謝叔文曰非敢負約乃欲曲成兄事耳叔文詬怒不之信遂成仇怨王叔文以母䘮去位叔文既以范希朝韓泰主神策行營邊將各以状辭中尉宦者始悟兵柄為叔文等所奪乃大怒密令其使歸告諸將曰無以兵屬人希朝至奉天諸将無至者泰馳歸白之叔文計無所出未幾以母䘮去位韋執誼益不用其語叔文怒與其黨謀起復斬執誼而盡誅不附已者王伾日詣宦官及杜佑請起叔文為相總北軍坐翰林中疏三上不報知事不濟忽呌曰伾中風矣遂輿歸不出横海軍節度使程懷信卒以其子執恭為留後後賜名權秋七月太子監國先是韋臯表請太子監國臯上表曰陛下哀毁成俟請權令太子親監庻政皇躬痊愈復歸春宫又上太子牋曰聖上亮陰不言委政臣下而所付非人王叔文王伾李忠言之徒輙當重任墮紊紀綱樹置心腹恐危家邦願殿下即日奏聞斥逐羣小使政出人主則四方獲安俄而荆南裴均字君齊光庭曾孫河東嚴綬牋表繼至意與臯同中外皆倚以為援至是上亦惡叔文黨俱文珍等因屢請以太子監國上許之以杜黄裳袁滋同平章事鄭珣瑜高郢罷俱文珍等以黄裳滋皆舊臣故引用之八月帝傳位于太子自號太上皇貶王伾為開州唐置今四川䕫州府開縣是司馬叔文為渝州唐置今四川重慶府是司户伾尋病死明年賜叔文死太子即位是為憲宗昇平公主獻女口上曰上皇不受獻朕何敢違遂郤之荆南獻毛龜上曰朕所寳惟賢嘉禾神芝皆虚美耳所以春秋不書祥瑞自今勿復以聞珍禽奇獸亦毋得進西川節度使南康王韋臯卒謚曰忠武臯在蜀二十一年重加賦斂豐貢獻以結主恩厚給賜以撫士卒士卒婚嫁死䘮皆供其費以是得乆安其位士卒樂為之用服南詔摧吐蕃府庫既實時寛其民三年一復租賦蜀人服其智謀而畏其威及卒畫像為土神祀之夏綏節度使韓全義致仕全義敗于溵水還不朝覲而去上在藩邸聞而惡之全義懼乃請入朝杜黄裳直令致仕罷裴延齡所置庫遣使宣慰江淮以鄭餘慶字君業絪從子同平章事貞元中餘慶為相以比户部侍郎于䪹頔之兄坐貶餘慶與䪹素善䪹所奏事餘慶多勸行之徳宗以為朋比遂貶郴州及上即位復以為同平章事明年夏餘慶罷始令史官撰日厯劉友益曰日厯之名始見于此從監修國史韋執誼之請也貶韓泰韓曄柳宗元劉禹錫為諸州刺史已又貶泰等為諸州司馬冬十月塟崇陵在西安府涇陽縣嵯峨山范氏祖禹曰徳宗享國二十有六年粃政尢多初欲削平僭叛剗滅藩鎮一有奉天之難而心隕膽破惟恐生事既猜防臣下則專任宦者思其窮窘則聚斂掊克自古治愈久而政愈弊年彌進而徳彌退鮮有如徳宗者也是以藩鎮强而王室弱宦者專而國命危貪政多而民心離唐室之亡卒以是三者其所從來漸矣十一月祔于太廟禮儀使杜黄裳等議以為國家法周制太祖猶后稷髙祖猶文王太宗猶武王皆不遷髙宗在三昭三穆之外請遷主于西夾室從之貶韋執誼為崖州司户叔文敗執誼亦自失形勢奄奄無氣聞人行聲輙惶悸失色以至于貶十二月以劉闢字太初貞元中進士為西川節度副使韋丹字文明孝寛六世孫為東川節度使先是韋臯卒劍南支度副使唐六典凡天下邊軍皆有支度使以計軍資糧仗劉闢由支度副使表求旌節尋授為節度副使綱目于闢求旌節即作節度副使誤今依新舊書及通鑑改正劉闢自為留後表求節鉞朝廷不許以袁滋為節度使徵闢為給事中闢不受徵阻兵自守滋畏其彊不敢進上怒貶滋吉州刺史又以新嗣位力未能討闢因授闢節度副使諫議大夫韋丹上疏曰今釋闢不誅則朝廷可以指臂而使者惟兩京耳此外誰不為叛上善其言以丹鎮東川以鄭絪同平章事絪由翰林學士為中書侍郎同平章事憲宗皇帝丙戌元和元年春正月太上皇崩劉闢反命神策行營節度使髙崇文幽州人將兵討之闢既得旌節志益驕求兼領三川上不許闢遂發兵圍梓州推官林藴力諌闢闢怒將斬之陰戒行刑者使不殺但數礪刃于其頸欲使屈服而赦之藴叱之曰豎子當斬即斬我頸豈汝砥石耶闢曰忠烈士也乃黜之林氏風俗通曰林放之後藴字復夢莆田人上欲討闢而重于用兵公卿議者亦以為蜀險固難取杜黄裳獨曰闢狂戅書生取之如拾芥耳臣知神策軍使髙崇文勇畧可用願陛下専以軍事委之勿置監軍闢必可擒上從之翰林學士李吉甫亦勸上討蜀上由是器之乃削闢官爵詔崇文與神策行營兵馬使李元奕河南西道節度使嚴礪字元明震從祖弟討之時宿將甚衆皆自謂當征蜀之選及詔用崇文皆大驚崇文時屯長武城注見前練卒五千常如寇至受詔即行器械糗糧一無所闕軍士有食于逆旅折人七箸者崇文斬以狥劉闢陷梓州執東川節度使李康崇文引兵趣梓州闢歸康以求自雪崇文以康敗軍失守斬之初上與杜黄裳論及藩鎮黄裳曰徳宗自經憂患務為姑息不生除節帥有物故者遣中使察軍情所與則授之未嘗出朝廷之意陛下必欲振舉綱紀宜稍以法度裁制藩鎮然後天下可得而理也上深以為然于是用兵討蜀以至威行兩河皆黄裳啟之也上嘗與宰相論自古帝王或勤勞庻政或拱無為何為而可黄裳對曰王者上承天地宗廟下撫百姓四夷夙夜憂勤固不可自暇逸然上下有分紀綱有叙苟慎選賢才而委任之有功則賞有罪則刑誰不盡力明主勞于求人而逸于任人此虞舜所以無為而治者也至于簿書獄市煩細之事各有司存非人主所宜親也昔秦始皇以衡石程書魏明帝自按行尚書事隋文帝衞士傳餐皆無補當時取譏後世所務非其道也丄深然之三月夏綏留後楊惠琳拒命詔河東天徳軍討誅之韓全義之入朝也以其甥楊惠琳知留後朝廷以將軍李演為夏綏節度使惠琳勒兵拒之河東節度使嚴綬表請討之遣牙將阿跌代北複姓光進其先河曲諸部後家太原及弟光顔字光逺將兵赴之夏州兵馬使張承金斬惠琳傳首京師光進兄弟在河東皆以勇敢聞後賜姓李氏夏四月以髙崇文為東川節度副使韋丹至漢中表言髙崇文容軍逺鬬無所資若與梓州綴其士心必能有功故有是命策試制舉之士于是元稹字微之河南人獨孤郁字古風及之子白居易字樂天下邽人蕭俛字師謙華之孫沈𫝊師字子言既濟之子出焉上以稹俛為左右拾遺居易為盩厔尉傳師為校書郎稹上疏論諌職畧曰昔太宗以王珪魏徵為諌官宴遊寝食未嘗不在左右三品以上入議大政必遣諫官一人隨之以參得失故天下大理今諌官就列朝謁而已近年以來正牙不奏事庻官罷巡對諫官能舉職者獨誥命有不便則上封事耳君臣之際諷諭于未形籌畫于至密尚不能囘至尊之盛意况已行之誥令而欲以咫尺之書収之誠亦難矣願陛下時于延英召對使盡所懷頃之復上疏曰開直言廣視聽理之萌也甘詔䛕蔽近習亂之象也自古人主即位之初必有敢言之士苟受而賞之則君子樂行其道競為忠讜小人亦貪得其利不為回邪如是則上下之志通幽逺之情達欲無理得乎苟拒而罪之則君子将括囊以保身小人迎合以竊位十歩之事皆可欺也欲無亂得乎昔太宗初即位孫伏伽以小事諫太宗厚賞之故當時言事者惟患不深切未嘗以觸忌諱為憂也太宗豈好逆意而惡從欲哉誠以順適之快小而危亡之禍大故也陛下踐祚今已周嵗未見有受伏伽之賞者臣等備位諌列曠日彌年不得召見而况疏逺之臣乎因條奏請次對百官復正牙奏事禁非時貢獻等十事又勸上以伾文為戒早擇修正之士輔導諸子上頗嘉納其言時召見之訪巡對猶云轉對貞元中令常参官毎日引見二人以政事謂之巡對後罷焉以李巽為度支鹽鐵轉運使杜佑請觧鹽鐵舉巽自代自劉晏之後居職者莫能繼之巽掌使一年征課所入類晏之多明年過之又一年加一百八十萬緡塟豐陵在西安府富平縣東北秋八月平盧節度使李師古卒師古卒判官髙沭李公度奉師古異母弟師道為節度副使總軍務乆之朝命未下或請出兵掠四境髙沭固止之請輸兩税申官吏行鹽法奉表京師杜黄裳請乗其未定而分之上以劉闢未平以師道為留後九月堂後主書堂後官也滑渙伏誅渙乆在中書與知樞密代宗時始置内樞密使以宦者為之劉光琦相結杜佑鄭絪等皆善視之鄭餘慶與諸相議事渙從旁指陳是非餘慶怒叱之未幾罷相四方賂遺無虚日中書舍人李吉甫言其專恣請去之上命宰相闔中書四門捜掩盡得姦狀賜死籍没家財凡數十萬髙崇文克成都擒劉闢送京師誅之先是崇文破鹿頭闗在今四川綿州徳陽縣北以鹿頭山名連戰皆㨗詔征蜀諸軍悉取崇文處分至是崇文復屢敗劉闢河東將阿跌光顔將兵㑹崇文于行營愆期一日懼誅欲深入自贖軍于鹿頭之西㫁其糧道于是綿江即今綿陽河源出綿竹縣下流至漢州入雒江雒江今名石亭江鹿頭諸將皆以城降崇文遂長驅直指成都克之闢奔吐蕃崇文使髙霞寓幽州范陽人追擒之遂入成都屯于通衢市肆不驚秋毫無犯檻闢送京師斬其大將邢泚餘無所問命軍府事一遵韋南康韋臯封南康王故云故事從容指撝一境皆平先是知卬州崔從以書諫闢闢發兵攻之從固守得免韋臯參佐皆素服請罪崇文皆禮而薦之獨謂段文昌曰君必為將相未敢奉薦闢有二妾皆殊色監軍請獻之崇文曰天子命我討平凶䜿當以撫百姓為先遽獻婦人以求媚豈天子之意邪崇文義不為此乃以配將吏之無妻者卭州梁置今𨽻四川崔從字子乂融曽孫段文昌字墨卿志元元孫初杜黄裳建議征蜀指授方畧皆懸合事宜崇文素憚劉澭盧龍節度使濟之弟徳宗時舉部歸朝授秦州刺史御軍嚴整蕃戎懾服黄裳使謂崇文曰若無功當以澭相代故能得其死力及蜀平宰相入賀上目黄裳曰卿之功也闢至長安并族黨悉誅之徵少室見注山人李渤字濬之洛陽人為左拾遺渤辭疾不至然朝廷政有得失輒附奏陳論冬十月以髙崇文為西川節度使栁晟河中觧人為山南西道節度使晟至漢中府兵討劉闢還未至城詔復遣戍梓州軍士怨怒謀作亂晟聞之疾驅入城慰勞之曰汝曹何以得成功對曰誅反者劉闢耳晟言闢以不受詔命故汝曹得以立功豈可復使他人誅汝以為功邪衆皆拜謝請詣戍所十一月以吐突承璀吐突代北複姓承璀閩人為左神策中尉承璀事上于東宫以幹敏得幸囘鶻入貢始以摩尼偕來摩尼猶中國之僧也其法日晏乃食食葷而不食湩酪囘鶻信奉之置寺處之其後徃來為姦十二年遣歸其國丁亥二年春正月司徒杜佑請致仕上以佑髙年重徳禮重之常呼司徒而不名佑以老疾請致仕詔令佑毎月一再入朝因至中書議大政杜黄裳罷為河中節度使黄裳有經濟大畧而不修小節故不得久在相位以武元衡李吉甫同平章事吉甫謂中書舍人裴垍字𢎞中聞喜人日吉甫流落江淮踰十五年一旦䝉恩至此思所以報徳惟在進賢而朝廷後進罕所接識君有精鑒願悉為我言之垍取筆疏三十餘人數月之間選用畧盡當時翕然稱吉甫為得人夏四月以范希朝為朔方靈鹽節度使以右神策鹽州定逺軍名唐初置故城在今寧夏府新渠縣北兵𨽻焉以革舊弊任邊將也希朝以宿衛出帥以革任用邊將之弊李錡反制削官爵屬籍發諸道兵討之鎮海兵馬使張子良執錡送京師伏誅夏蜀既平藩鎮惕息鎮海節度使李錡不自安求入朝上許之錡實無行意屢遷行期稱疾請至嵗暮武元衡曰錡求朝得朝求止得止將何以令四海上以為然下詔徵之錡計窮遂謀反殺留後王澹制削錡官爵遣淮南節度使王鍔統諸道兵討之時常州刺史顔防斬錡將李深傳檄蘇杭湖睦請同進討湖州刺史辛秘亦斬錡將趙惟忠辛秘系出隴西睦州隋置今浙江嚴州府是餘注俱見前錡遣兵馬使張子良等將兵襲宣州子良等知錡必敗與牙將裴行立同謀夜還趣城執錡械送京師時羣臣入賀上愀然曰朕不徳致宇内數有干紀者何賀之有上御興安門引錡面詰之對曰臣初不反張子良等教臣耳上曰卿為元帥子良等謀反何不斬之而入朝錡無以對乃并其子腰斬之宰相議誅錡大功以上親兵部郎中蔣乂曰錡大功親皆淮安靖王之後也淮安有佐命之功陪陵享廟豈可以末孫為惡而累之乎又欲誅其兄弟又曰錡兄弟故都統國貞之子也國貞死王事豈可使之不祀乎乃皆流貶淮安靖王名神通李國貞為絳州行營兵所殺事具前有司籍其家財輸京師翰林學士裴垍李絳字深之系本賛皇言錡割剥六州以富其家今以輸上京恐逺近失望願以賜浙西百姓代今年租賦上嘉歎從之以武元衡為西川節度使髙崇文為邠寧節度使髙崇文在蜀朞年謂監軍曰西川為宰相囘翔之地崇文豈敢自安屢上表稱蜀中安逸無所陳力願効死邊陲故有是命盧從史擅出兵屯邢洺昭義節度使盧從史内與王士真劉濟通而外獻策請圖山東擅引兵東出邢洺上召令還從史不時奉詔乆之乃還上召李絳語之曰朕與鄭絪議敇從史歸上黨續徵入朝絪乃泄之于從史使稱上黨乏糧就食山東負朕乃爾將何以處之對曰審如此滅族有餘矣然絪從史不自言陛下誰從得之上曰吉甫密奏絳曰搢紳之論以絪為佳士恐必不然或者同列欲專朝政疾寵忌前願陛下熟察之上良乆曰非卿言朕幾誤處分上又嘗問絳曰諫官多謗訕無事實朕欲摘其尤者一二以儆其餘何如對曰此殆非陛下之意必有邪臣欲壅蔽陛下之聰明也人臣死生繄人主喜怒敢發口諫者有幾就有諫者皆晝度夜思朝刪暮減比得上達什無二三故人主孜孜求諌猶懼不至况罪之乎如此杜天下之口非社稷之福也上善其言謂宰相曰太宗以神聖之資羣臣進諫者猶往復數四况朕寡昧自今事有違宜卿當十論無但一二而已羣臣上尊號以白居易為翰林學士居易作樂府百餘篇規諷詩事流傳禁中上悦之故有是命李吉甫上元和國計簿總計天下方鎮四十八州府二百九十五縣千四百五十三其鳳翔鄜坊邠寧振武涇原銀夏靈鹽河東易定魏博鎮冀范陽滄景淮西湽青等十五道七十一州不申户口外每嵗賦税倚辦止于浙江東西宣歙淮南江西鄂岳福建湖南八道四十九州百四十四萬户户税比天寳四分減三兵給比天寳三分増一大率二户資一兵其水旱所傷非時調發不在此數戊子三年春正月大赦禁長吏詣闗進奉知樞密院劉光琦奏分遣中使齎敇詣諸道意欲分其饋遺翰林學士裴垍李綘奏敇使所至煩擾不若但付急遞傳遞馳驛兼程而行上從之光琦稱舊例上曰例是固當從之苟非是何不改中丞盧坦彈奏山南西道節度使柳晟浙東觀察使閻濟美違赦進奉上召坦褒慰之曰朕已釋之不可失信坦曰赦令宣布海内陛下之大信也晟等不畏陛下法奈何存小信棄大信乎上乃命歸所進于有司夏四月策試賢良方正直言直諫舉人牛僧孺字思黯𢎞七世孫皇甫湜字持正睦州新安人李宗閔字損之鄭王元懿四世孫皆指陳時政之失無所避考官楊於陵字達夫漢太尉震之後韋貫之本名純避諱以字行夐八世孫署為上第上亦嘉之李吉甫惡其言直泣訴于上且言湜翰林學士王涯字廣津太原人之甥也涯與裴垍覆策而不自言上不得已罷垍貶貫之巴州刺史涯虢州司馬於陵嶺南節度使僧孺等乆之不調各從辟于藩府劉友益曰唐末黨禍起于此以裴均為右僕射盧坦為庻子均素附宦官嘗入朝踰位而立御史中丞盧坦揖而退之均不從坦曰昔姚南仲為僕射位在此均曰南仲何人坦曰是守正不交權倖者坦尋改右庻子白居易上疏曰牛僧孺等直言時事而遭斥逐楊於陵等以収直言而坐譴謫盧坦以舉時事而黯庻子此數人皆今之人望天下視其進退以卜時之否臧者也一旦無罪悉疎棄之上下杜口衆心恟恟陛下亦知之乎且陛下既下詔徵之直言索之極諌僧孺等所對如此縱未能推而行之又何忿斥而罪之乎五月沙陀來降以其酋長執宜為陰山兵馬使劉友益曰朱邪之入中國也始此沙陀勁勇冠諸胡吐蕃每戰沙陀降吐蕃事具前以為前鋒囘鶻攻吐蕃取凉州吐蕃疑沙陀貳于囘鶻欲遷之河外沙陀懼酋長朱邪盡忠與其子執宜謀復歸唐帥部落三萬而東吐蕃追之轉戰數百合盡忠死部衆亡者大半餘萬人詣靈州降節度使范希朝置之鹽州為市牛羊廣其畜牧善撫之詔置陰山府以執宜為兵馬使毎有征討用之皆㨗靈鹽軍益彊秋七月辛巳朔日食以盧坦為宣歙觀察使坦到官值嵗饑榖價日増或請抑之坦曰宣歙榖少仰食四方若價賤則商船不來益困矣既而斗米二百商旅輻輳民賴以生淮南節度使王鍔入朝鍔厚進奉賂宦官求平章事白居易言宰相人臣極位非清望大功不應授今除鍔則諸鎮皆生冀望與之則典章大壞又不感恩不與則厚薄有殊或生怨望且鍔在鎮百計誅求自入進奉若除宰相藩鎮效之競為割剥則百姓何以堪之事遂寢以裴垍同平章事上雖以李吉甫故罷垍學士然寵信彌厚故未幾復擢為相嘗謂之曰以太宗元宗猶藉輔佐以成其理况如朕不及先聖萬倍者乎垍亦竭誠輔佐上嘗問垍為理之要何先對曰先正其心舊制民税分上供供度支送使送本道留州存留本州三品建中初定兩税時貨重錢輕是後貨輕錢重民所出已倍其初民輸本色凖錢過倍其留州送使者所在又降省估都省所立之價就實估出物處時價以重斂于民有司于折價則凖省價以多取錢于買物則又凖時價以多取物是反覆倍征于民也垍奏請一用省估其觀察使先税所理州以自給不足然後税屬州由是江淮稍蘇先是執政多惡諌官言時政得失垍獨賞之垍器局峻整人不敢干以私嘗有故人自逺詣之垍待之優厚其人乗間求京兆判司垍曰公才不稱此官垍不敢以私害公他日有盲宰相憐公者不妨得之垍則必不可李吉甫罷吉甫病醫者夜宿其家御史中丞竇羣劾吉甫交通術士上大駭訊之無狀羣坐貶吉甫亦乞免乃出為淮南節度使邠公杜黄裳卒諡曰宣黄裳達權變有王佐大畧當大政未乆不究其才及處外天下嘗所屬意至是卒年七十贈司徒己丑四年春正月南方旱饑遣使宣慰賑恤宣慰使鄭敬徳等將行上戒之曰朕宫中用帛一匹皆籍其數惟賙救百姓則不計費卿等宜識此意鄭絪罷以李藩同平章事藩為給事中制敇有不可者即于黄紙後批之吏請更連素紙藩曰如此乃狀也何名批敇裴垍薦藩有宰相器上以絪循黙罷之擢藩為相藩知無不言上甚重之三月成徳節度使王士真卒子承宗自為留後承宗叔父士則以承宗擅立恐禍及宗與幕客劉栖楚俱自歸京師詔以士則為神策大将軍劉栖楚鎮州人閏月制降繋囚蠲租税出宫人絶進奉禁掠賣上以乆旱欲降徳音李絳白居易言欲令實惠及人無如減其租税宫人數廣宜簡出之諸道横斂以充進奉南方多掠良人賣為奴婢皆宜禁絶上悉從之制下而雨絳表賀曰乃知憂先于事故能無憂事至而憂無救于事詔贖魏徵故第賜其家魏徵元孫稠貧甚以故第質錢于人平盧節度使李師道請以私財贖出之白居易奏言事闗激勸宜出朝廷師道何人敢掠斯美望敇有司以官錢贖還上乃出内庫二千緡贖以賜稠仍禁質賣立鄧王寧為皇太子李絳等奏曰陛下臨御四年儲關未立非所以承宗廟重社稷也故有是命夏四月山南東道節度使裴均于頔入朝均節度山南東道進銀器均有中人之助于徳音後首進銀器千五百兩李絳白居易等言均欲以此嘗陛下願却之上遽命出付度支尋密諭進奏院自今諸道進奉無得申御史臺有訪問者輒以名聞居易復以為言上不聽起復盧從史為金吾大將軍上欲乗王士真死除人代之不從則興師討之以革河北諸鎮世襲之弊裴垍曰李納跋扈不恭王武俊有功于國陛下前許師道今奪承宗沮勸違理彼必不服由是議乆不决上以問諸學士李絳曰武俊父子相承四十餘年今承宗又以總軍務一旦易之恐未即奉詔又河北諸鎮事體正同必不自安陰相黨助雖有勸成之請亦非誠意若所除之人得入彼則自以為功若不得入興師致討彼又復潛相交結按兵玩冦進退獲利而勞費之病咸歸國家且今江淮大水公私困竭軍旅之事恐未可輕議也中尉吐突承璀欲奪垍權自請將兵討之時昭義節度使盧從史遭父䘮朝廷乆未起復遭䘮在軍不觧職亦未奉命起復從史懼因承璀進説請以本軍討承宗詔走復金吾大將軍吐蕃請和許之六月以范希朝為河東節度使朝議以沙陀在靈武廹近吐蕃慮其反覆命悉從希朝詣河東希朝選其驍騎號沙陀軍處其餘衆於定襄川唐定襄縣之川也在今大同府大同縣西北於是朱邪執宜始保神武川後魏故神武郡之川也在今寧武府神池縣東北之黄花堆在今大同府山陰縣北一名黄𤓰堆毁安國寺碑樓吐突承璀領功徳使盛修安國寺奉立聖徳碑先搆樓請勅學士撰文欲以萬緡酬之上命李絳為之絳言堯舜禹湯未嘗立碑自言聖徳惟秦始皇刻石髙自稱述未審陛下欲何所法且敘修寺之美豈所以光聖徳邪上命曵倒碑樓承璀言樓大不可曵請徐毁拆上厲聲曰多用牛曵之承璀乃不敢言凡用百牛曵之乃倒秋七月貶楊慿字虚受𢎞農人為臨賀漢縣今廣西平樂府賀縣是尉中丞李夷簡字易之鄭王元懿四世孫彈京兆尹楊慿貪汚僭侈貶臨賀尉憑親友無敢送者櫟陽尉徐晦獨至藍田與别權徳輿字載之丹徒人謂之曰君送楊臨賀誠為厚矣無乃為累乎對曰晦自布衣䝉楊君知奨今日逺謫豈得不與之别借如明公他日為讒人所逐晦敢自同路人乎徳輿嗟歎稱之于朝後數日李夷簡奏晦為監察御史謂之曰君不負楊臨賀肯負國乎九月王承宗表獻徳棣二州詔以承宗為成徳節度使薛昌朝嵩之子為保信軍節度使領徳棣二州承宗襲昌朝執之以歸上審問諸學士曰今欲用王承宗為成徳留後割其徳棣二州更為一鎮使輸二税請官吏何如李絳等對曰徳棣𨽻成徳已乆一旦割之恐其憂疑怨望復為隣道搆扇萬一旅拒倍難處置不若使弔祭使以其私諭承宗令其表請幸而聽命於理固順若其不聽體亦無損上又問今劉濟田季安皆病若其物故又如成徳天下何時當平議者皆言宜乘此際代之不受則發兵討之何時當平議者皆言宜乘此際代之不受則發兵討之何如對曰羣臣見取蜀取呉易于反掌故謟躁之徒争獻策畫勸開河北陛下亦以前日成功之易而信其言臣竊以為河北之勢與二方異何則西川浙西皆非反側之地其四隣皆國家臂指之臣劉闢李錡獨生狂謀大軍一臨則渙然離耳河北則不然其將士百姓懐其累代煦嫗之恩不知君臣逆順之理隣道各爲子孫之謀亦慮他日及此萬一或相表裏兵連禍結戎狄乘閒内侵其為憂患可勝道哉濟及季安物故之際若有隙可乗當臨事圖之于今用兵則恐未可太平之業非朝夕可致願陛下審處之時呉少誠病甚絳等因言少誠病必不起淮西四旁皆國家州縣不與賊通朝廷命帥今正其時萬一不從可議征討故臣願捨恒冀難致之策就申蔡易成之謀脱或恒冀連兵事未如意蔡州有釁勢可興師南北俱興財用不贍儻事不得已須赦承宗則恩威兩廢不如早賜處分既而承宗以未得朝命頗懼累表自訴上遣京兆少尹裴武宣慰承宗受詔甚恭請獻徳棣二州武復命以承宗為成徳軍節度徳州刺史薛昌朝為保信軍節度領徳棣二州昌朝王氏壻故就用之田季安使謂承宗曰昌朝陰與朝廷通故受節鉞承宗襲執昌朝囚之上以裴武為欺㒺又有譖之者曰武使還先宿裴垍家明旦乃入見上怒甚欲貶之李絳曰武昔䧟李懷光軍中守節不屈豈容今日遽為姦囘葢承宗始懼朝廷誅討故請獻二州而隣道不欲其然計必有陰行間説使不得守其初心者非武之罪也况垍武乆處朝廷諳練事體豈有使未復命而先宿宰相家乎此殆讒人中傷之言願陛下察之上遂不問以許孟容字公範長安人為京兆尹左神策軍吏李昱貸長安富人錢不償孟容収捕械繫立期使償曰期滿不足當死中尉訴于上上遣中使宣㫖送本軍孟容曰臣不奉詔當死然臣為陛下尹京畿非抑制豪彊何以肅清輦下錢未償李昱不可得上嘉其剛直而許之京城震慄冬十月削奪王承宗官爵發兵討之以吐突承璀為招討處置等使上遣中使諭王承宗使遣薛昌朝還鎮承宗不奉詔制削奪其官爵以吐突承璀為神策河中等道行營兵馬使諸軍招討處置等使翰林學士白居易上疏諫畧曰國家征伐當責成將帥近嵗始以中使為監軍已非令典自古及今未有徵天下之兵專令中使統領者也今神䇿不置行營節度使則承璀乃制將又統諸軍招討使則都統也臣恐四方聞之必輕朝廷四夷聞之必笑中國陛下忍令後代相傳云以中官為制將都統自陛下始乎又恐諸道耻受指麾心既不齊功何由立且軍國權柄動闗理亂朝廷制度出自祖宗陛下寧忍徇彼之欲而自隳法制以損聖朝乎度支使李元素鹽鐵使李鄘京兆尹許孟容御史中丞李夷簡給事中吕元膺字景夫鄆州東平人穆質懷州河内人右補闕獨孤郁亦極言其不可上不得已削承璀四道兵馬使改處置為宣慰而已李絳嘗極言宦官驕横侵害政事讒毁忠良上曰此屬安敢為讒就使為之朕亦不聽絳曰此屬大抵不知仁義不分枉直惟利是嗜得賂則譽跖蹻為亷良拂意則毁龔黄為貪暴惟用傾巧之智搆成疑似之端朝夕左右浸潤以入之陛下必有時而信之矣自古宦官敗國者備載方冊陛下豈得不防其漸乎上不能用十一月呉少誠死牙將呉少陽滄州清池人自為彰義軍留後先是少誠寵其大將呉少陽名以從弟出入如至親少誠病少陽殺其子自攝副使知軍州事及少誠死少陽遂自為留後上以河朔方用兵不能討少陽明年三月遂以少陽為淮西留後尋授節度使庚寅五年春正月吐突承璀討王承宗戰不利先是幽州牙將譚忠絳人使于魏時田季安方舉其徒謀出兵以拒吐突承璀忠聞之往説季安季安聞吐突承璀討王承宗聚其徒曰師不跨河二十五年矣今一旦越魏伐趙趙虜魏亦虜矣為之奈何其將有超伍而言者曰願借騎五千以除君憂季安欲從之忠知其謀入謂季安曰如某之計是引天下之兵也往年王師取蜀取呉算不一失是皆相臣之謀今王師越魏伐趙不使耆臣宿將而專付中臣不輸天下之甲而多出秦甲君知誰為之謀此乃天子自為之謀欲將夸服于臣下也若師未叩趙而先碎于魏是上之謀反不如下能不耻且怒乎既耻且怒必任智士畫長策仗猛將練精兵畢力再舉鑑前之敗必不越魏而伐趙校罪輕重必不先趙而後魏矣季安曰然則若之何忠曰王師入魏君厚犒之而悉甲壓境號曰伐趙陰遺趙書使觧障遺魏一城特以奏㨗則魏之霸基安矣季安善其言遂與趙陰計得其堂陽漢縣宋省故城在今冀州武邑縣已而忠歸幽州復激劉濟使伐趙濟合諸將曰天子知我怨趙今必命我伐之趙亦必大備我伐與不伐孰利忠曰是必皆將無之濟怒曰我與承宗反乎命繋忠獄使人視成徳之境果不為備而詔至亦止令濟䕶北邊濟乃召忠問何以知之忠曰盧從史外親燕内實忌之外絶趙内實與之此為趙畫曰燕以趙為障雖怨趙必不殘趙不必為備一示趙不敗抗燕二使燕獲疑天子此忠所以知天子之不使君伐趙而趙之不備燕也濟曰今則柰何忠曰天子伐趙君坐燕之甲不濟易水使潞人得以藉口是燕貯忠義之心卒染私趙之謗不見徳于趙人惡聲徒嘈嘈于天下耳請君熟思之濟曰吾知之矣時諸軍皆未進濟下令軍中曰五日畢出後者醢以狥乃自將兵七萬獨出擊趙拔饒陽束鹿注俱見前于是諸軍皆㑹于定州及是承璀至行營威令不振與承宗戰屢敗大將軍酈定進戰死軍中奪氣河北用兵乆無功㑹上以吳少陽為淮西留後白居易言河北本不當用兵今承璀未嘗苦戰已失大將遷延進退乆未有功師道季安元不可保察其情狀似相計㑹各収一縣遂不進軍觀此事勢速須罷兵若復遲延所費滋多且河北諸將見吳少陽已受制命必引事例輕重請雪承宗章表繼來義無不許如此則是與奪皆由隣道恩信不出朝廷此臣所為陛下痛惜者也况今天時已熱兵氣相蒸饑渴疲勞疾疫暴露一有奔潰諸軍必摇西戎北虜承虚入冦兵連禍生何事不有萬一及此實國安危此臣所為陛下深憂者也不聽貶元稹為江陵士曹河南尹房式有不法事東臺監察御史元稹奏攝之擅令停務朝廷以為不可罰俸召還至敷水驛在今同州府華陰縣西有内侍後至破驛門入擊稹傷面上復引稹前過貶之李絳崔羣字敦詩武城人言稹無罪白居易言中使陵辱朝士中使不問而稹先貶恐自今中使出外益暴横人無敢言者又稹為御史多所舉奏不避權勢切齒者衆恐自今無人肯為陛下當官執法有大姦猾陛下無從得知上不聽吐突承璀誘盧從史執送京師以烏重𦙍字保君承玼之子為河陽節度使盧從史陰與王承宗通謀上甚患之㑹從史遣牙將王翊元入奏事裴垍引與語為言君臣之義微動其心翊元遂輸誠言從史陰謀及可取之狀垍令翊元還本軍經營遂得其都知兵馬使烏重𦙍欵要垍言于上曰從史必為亂今與承璀對營而不設備失今不取後雖興大兵未可以嵗月平也上許之承璀乃召從史入營與博伏壯士擒縛之馳詣京師昭義士卒聞之皆甲以出重𦙍當軍門叱之曰天子有詔從者賞違者斬遂皆散上嘉重𦙍功欲即以為昭義帥李絳以為不可乃以重𦙍鎮河陽而徙河陽節度使孟元陽鎮昭義貶從史驩州司馬秋七月制雪王承宗復其官爵加劉濟中書令王承宗遣使自陳為盧從史所離間乞輸貢賦請官吏許其自新李師道等亦數上表請雪之白居易復奏罷兵于是制先雪承宗復以徳棣二州與之悉罷諸道行營加劉濟中書令瀛州刺史劉總弑其父濟及其兄緄濟之討王承宗也長子緄為副大使掌留務河北三鎮相承各置副大使以嫡長為之父没則代領軍務濟軍瀛州次子總為刺史濟有疾總與判官張圮謀使人從長安來曰朝廷以相公逗遛無功已除副大使為節度使矣濟怒追緄詣行營總因進毒殺濟緄至又殺之遂領軍務九月罷吐突承璀為軍器使裴垍言于上曰承璀首唱用兵疲弊天下卒無成功陛下縱以舊恩不加顯戮豈得全不貶黜以謝天下乎李絳奏曰陛下不責承璀他日復有敗軍之將何以處之若誅之則同罪異罰彼必不服若釋之則誰不保身而玩冦乎上即罷承璀中尉中外相賀以權徳輿同平章事上問宰相為政寛猛何先權徳輿對曰秦以慘刻而亡漢以寛大而興先後可見矣上善其言冬十月以任廸簡為義武節度使張茂昭為河中節度使初義武節度使張茂昭請除代河北諸鎮互遣人説止之不從凡四上表上乃許之以任廸簡為義武行軍司馬茂昭悉以簿書管鑰授之遣其妻子先行曰吾不欲子孫染于汚俗茂昭既去都虞候楊伯玉張佐元相繼作亂將士共殺之奉廸簡主軍務時府庫罄竭閭閻亦空廸簡無以犒士乃設糲飯與士卒共食之居㦸門下經月士卒感之共請還府然後得安上聞之命以綾絹十萬賜易定將士授廸簡節鉞徙茂昭鎮河中十一月以王鍔為河東節度使上左右受鍔厚賂多稱譽之上命鍔兼平章事李藩固執以為不可權徳輿曰宰相非序進之官今鍔既無忠勲朝廷又非不得已何為遽以此名假之上乃止鍔有吏才工于完聚范希朝以河東全軍出屯河北耗散甚衆鍔到鎮之初兵不滿三萬人馬不過六百匹嵗餘兵至五萬人馬有五千匹器械精利倉庫充實又進家財三十萬緡上復欲加鍔平章事李絳諫曰鍔在太原雖頗著績效今因獻家財而命之若後世何乃止裴垍罷為兵部尚書垍得風疾上甚悼惜之十二月以李絳為中書舍人上每有軍國大事必與諸學士謀之嘗踰月不見學士絳等上言臣等飽食不言其為自計則得矣如陛下何陛下詢訪理道開納直言實天下之幸非臣等之幸也上遂召對白居易因論事言陛下錯上色莊而罷宻召絳謂曰居易小臣不遜須令出院絳曰陛下容納直言故羣臣敢竭誠無隐居易言雖少思志在納忠陛下今日罪之臣恐天下各思箝口非所以廣聰明昭聖徳也上悦待居易如初上嘗欲近獵苑中至蓬萊池西謂左右曰李絳必諫不如且止絳嘗面陳吐突承璀專横語極懇切上作色曰卿言太過絳泣曰陛下置臣于腹心耳目之地若臣畏避左右愛身不言是臣負陛下言之而陛下惡聞乃陛下負臣也上怒觧曰卿所言皆人所不能言真忠臣也他日盡言皆應如是遂以為中書舍人絳嘗從容諫上聚財上曰今政令不及兩河河湟淪于北敵朕日夜思雪祖宗之耻而財力不贍故不得不蓄聚耳不然朕宫中用度儉薄多藏何用邪辛卯六年春正月以李吉甫同平章事吉甫自淮南召還復以前官秉政上尊任之二月李藩罷為太子詹事李吉甫復相藩頗沮止㑹詔授吳少陽淮西節度吉甫既見上潛欲中藩即奏曰道逄中使假印節與吳少陽臣為陛下恨之上色變翼日罷藩為太子詹事上嘗與宰相語及神仙李藩對曰秦始皇漢武帝學仙之效具在前史太宗服天竺僧長年藥致疾此古今之明戒也陛下春秋鼎盛勵志太平宜拒絶方士之説茍道盛徳充人安國理何憂無堯舜之壽乎以李絳為戸部侍郎宦官惡李絳在翰林以為户部侍郎判本司上問絳故事戸部皆進羡餘卿獨無進何也對曰守土之官厚斂于人以市私恩天下猶共非之况戸部所掌皆陛下府庫之物給納有籍安得羡餘若自左藏輸之内藏以為進奉是猶東庫移之西庫臣不敢踵此弊也上喜其直益重之夏四月以盧坦判度支或告泗州刺史薛謇有異馬不以獻事下度支使巡官徃驗未返上遲之使品官内侍省官劉㤗昕按其事盧坦曰陛下既使有司驗之又使品官繼往豈大臣不足信于品官乎臣請先就黜免上乃召泰昕還五月以李惟簡范陽人為鳳翔節度使隴州地與吐蕃接舊常更入攻抄人不得息惟簡以為邊將當謹守備蓄財榖以待寇不當䂓少利起事益市耕牛鑄農器以給農之不能自具者増墾田數十萬畆屬嵗豐稔公私有餘販者流及他方六月詔有司省吏員併州縣減仕塗均俸給李吉甫奏中原宿兵見在八十餘萬商賈僧道不服田畆者什有五六是常以三分勞筯苦骨之人奉七分待衣坐食之輩也今内外官以税錢給俸者不下萬員天下或以一縣之地而為州一鄉之民而為縣者甚衆舊制一品月俸三十緡職田禄米不過千斛艱難以來増置使額厚給俸錢大厯中權臣月至九千緡州無大小刺史皆千緡常衮始立限約李泌稍復増加然有名存職廢或額去俸存閒劇之間厚薄頓異請敇有司請定省吏員併州縣減入仕之塗定俸給之數于是詔段平仲字秉庸武威人韋貫之許孟容李絳同詳定省併八百八員諸色流外千七百餘人秋九月梁悦報讐殺人杖而流之富平此唐所置富平縣也今屬西安府漢故縣在今寜夏府靈州人梁悦報父讐殺秦杲自詣縣請罪敇復讐據禮經則義不同天徵法令則殺人者死宜令都省集議聞奏職方員外郎韓愈議曰律無復讐之條非闕文也葢不許則傷孝子之心而乖先王之訓許之則人將依法專殺而無以禁止其端故聖人丁寧其義于經而深没其文于律其意將使法吏一㫁于法而經術之士得引經而議也宜定其制曰凡復父讐者事發具事申尚書省集議奏聞酌其宜而處之則經律無失其指矣于是杖悦一百流循州隋置今廣東惠州府是冬十一月弓箭庫使劉希光伏誅以吐突承璀為淮南監軍希光受羽林大將軍孫璹錢二萬緡為求方鎮事覺賜死事連知内侍省事吐突承璀出為淮南監軍上問李絳朕出承璀何如對曰外人不意陛下遽能如是上曰此家奴耳曏以其驅使之人故假以私恩若有違犯朕去之輕如一毛耳試太子通事舍人李渉知上于承璀恩顧未衰乃投匭上疏稱承璀有功希光無罪知匭使孔戣見其副章詰責不受上疏極言淡姦險欺天請加顯戮詔貶渉峽州司倉子李渉渤之兄弟戣字君嚴巢父從峽州注見前十二月以李絳同平章事李吉甫復相多修舊怨上頗知之故擢絳為相吉甫善迎逢上意而絳鯁直數争論于上前上多直絳而從其言由是二人有隙上御延英吉甫言天下已太平陛下宜為樂絳曰漢文帝時兵木無刃家給人足賈誼猶以為厝火積薪之下不可謂安今法令所不能制者河南北五十餘州強鄰侵犯近接涇隴烽火屢驚加之水旱時作倉庫空虚此正陛下宵衣旰食之時豈得謂之太平遽為樂哉上欣然曰卿言正合朕意退謂左右曰吉甫專為悦媚如李絳真宰相也上嘗問貞元中政事不理何乃至此吉甫對曰徳宗自任聖智不信宰相使姦臣得乗間弄威福故也上曰然此亦未必皆徳宗之過朕幼在徳宗左右見事有得失當時宰相亦未有再三執奏者今日豈得專歸咎于徳宗邪卿軰宜用此為戒事有非是當力陳不已勿畏朕譴責而遽止也吉甫嘗言人臣不當彊諫使君悦臣安不亦美乎李絳曰人臣當犯顔苦口指陳得失若䧟君于惡豈得為忠上曰絳言是也吉甫至中書卧不視事長吁而已李絳或乆不諫上輙謂之曰豈朕不能容受邪將無事可諫也吉甫又嘗言于上曰賞罰人主之二柄不可偏廢今惠凙已深而威刑未振中外觧惰願加嚴以振之上顧李絳曰何如對曰王者之政尚徳不尚刑豈可捨成康文景而效秦始皇父子者乎上曰然後旬餘于頔入對亦勸上峻刑上謂宰相曰于頔大是姦臣勸朕峻刑卿知其意乎皆對曰不知也上曰此欲使朕失人心耳吉甫失色退而抑首不言笑竟日太子寧卒大稔是嵗天下大稔米斗有值二錢者壬辰七年春正月以元義方為鄜坊觀察使義方媚事吐突承璀李吉甫欲自托于承璀擢義方為京兆尹李絳惡而出之義方入謝因言絳私其同年許季同以為京兆少尹故出臣鄜坊專作威福明日上以詰絳曰人于同年固有情乎對曰同年乃四海九州之人偶同科第情于何有且陛下不以臣愚備位宰相宰相職在量才授任若其人果才雖在兄弟子姪之中猶將用之况同年乎避嫌而棄才是乃便身非徇公也上曰善遂趣義方之官夏四月以崔羣為中書舍人上嘉翰林學士崔羣讜直命學士自今奏事必取羣連署然後進之羣曰翰林舉動皆為故事必如是後來萬一有阿媚之人為之長則下位直言無從而進矣遂不奉詔五月詔蠲淮浙租賦上謂宰相曰卿軰屢言淮浙去嵗水旱近有御史自彼還言不至為災事竟何如李絳對曰臣按淮浙諸道奏狀皆云水旱人流求設法招撫其意似恐朝廷罪之者豈肯無災而妄言災邪此葢御史欲為姦諛以悦上意耳願得其主名按致其法上曰卿言是也國以人為本聞有災當亟救之豈可復疑之邪因命速蠲其税上嘗與宰相論治道于延英殿日旰暑甚汗透御服宰相求退上留之曰朕入禁中所與處者獨宫人宦官耳故樂與卿等且共談為理之要殊不知倦也秋七月立遂王恒為皇太子即穆宗八月魏博節度使田季安卒季安病軍政廢亂夫人元氏立其子懷諫為副大使知軍務召牙内兵馬使田興字安道廷玠之子為都知兵馬使興有勇力頗讀書性恭遜季安淫虐興數規諫季安以為收衆心欲殺不果未幾季安卒上與宰相議魏博事李吉甫請興兵討之李絳曰魏博不必用兵當自歸朝廷上意以吉甫議為然絳曰懷諫乳臭子不能自聽㫁軍府大權必有所歸諸將不服怨怒必起田氏不為屠肆則悉為俘囚何足煩天兵哉然彼自列將起代主帥隣道之所深惡不倚朝廷之援則無以自存故臣以為不必用兵可坐待魏博之自歸也上曰善冬十月魏博兵馬使田興請吏奉貢詔以興為節度使尋賜名𢎞正田懷諫幼弱軍政皆决于家僮蔣士則數以愛憎移易諸將衆皆憤怒朝命乆不至軍中不安田興晨入府士卒大譟環拜請為留後興驚仆乆之起謂衆曰汝肯聽吾言勿犯副大使守朝廷法令申版籍請官吏然後可皆曰諾興乃殺蔣士則等十餘人遷懷諫于外自田承嗣據魏博至懷諫凡四世四十九年監軍以聞上亟召李絳曰卿揣魏博若符契吉甫請遣中使宣慰以觀其變絳曰今田興奉其土地兵衆坐待詔命不乗此際推心撫納必待勅使至彼持將士表來然後與之則是恩出于下而其感戴之心非今日比矣上欲且除留後絳曰田興恭順如此自非恩出不次無以深慰其心上從之除興節度使制命至魏州興感恩流涕士衆鼓舞十一月遣知制誥裴度字中立聞喜人宣慰魏博李絳言魏博五十餘年不霑皇化一旦來歸不有重賞過其所望則無以慰士卒之心使四隣勸慕請發内庫錢百五十萬緡以賜之宦官以為太多上以語絳絳曰田興不貪專地之利不顧四隣之患歸命聖朝陛下奈何愛小費而遺大計不以収一道人心錢用盡更來機事一失不可復追借使國家發十五萬兵以取六州期年而克之其費豈止如此而已乎上悦曰朕所以惡衣菲食蓄聚貨財正欲為平定四方不然徒貯之府庫何為十一月遣知制誥裴度宣慰魏博頒賞軍士六州百姓給復一年軍士受賜歡聲如雷成徳兖鄆使者數軰見之相顧失色歎曰倔强者果何益乎度為興陳君臣上下之義興聽之終夕不倦請度徧行所部宣布朝命又奉所部缺官請有司注擬奉法令輸税賦室屋僣侈者皆避不居鄆蔡恒遣遊客間説多方興終不聽李師道使人謂韓𢎞曰我世與田氏約相保援今興非其族又首變兩河事亦公之所惡也我與成徳合軍討之𢎞曰我不知利害知奉詔行事耳若兵北渡河我則以兵東取曹州師道懼不敢動置振武乾元初置振武軍領麟勝二州地在今陜西葭州神木縣天徳注見前營田李絳奏振武天徳左右良田可萬頃請擇能吏開置營田可以省費足食上從之命度支使盧坦經度四年之間開田四千八百頃収榖四千餘萬斛嵗省度支錢二千餘萬緡吐蕃寇涇州吐蕃數入寇上患之李絳言京西京北始置神策鎮兵欲以備禦吐蕃使與節度使掎角相應今則鮮衣美食坐耗縣官每有寇至節度使邀與俱進則云申取中尉處分比及得報虜去逺矣縱有果鋭之將聞命奔赴節度使無刑戮以相制相視如平交左右前却莫肯用命請據所在之地割𨽻本鎮使號令齊一則軍威大振虜不敢入寇矣上曰不知舊事如此當亟行之既而神策軍驕恣日乆不樂𨽻節度使竟為宦官所沮而止御批厯代通鑑輯覽卷五十九

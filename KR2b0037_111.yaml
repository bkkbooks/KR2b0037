body:
  text: 皇太子婚禮甫畢帝忽有疾急召諸大臣至仁德門俄獨命一貫入啓祥宫後殿西暖閣皇太后南面立稍非帝稍東冠服席地坐亦南面太子諸王跪于前一貫叩頭起居畢帝命之前諭曰朕病篤矣礦稅事朕因宫殿未竣權宜採取今可與江南織造江西陶器俱止勿行所遣內監皆令還京法司釋久繫罪囚建言得罪諸臣咸復其官言已就卧一貫尋叩頭出擬旨以進是夕閣臣九卿俱直宿朝房漏三鼓中使捧諭至具如帝語一貫者諸大臣期即奉行翼日帝疾瘳悔之遣中使二十輩至閣追取前諭一貫不能持遑遽繳入時司禮太監王義方在帝前力爭曰王言何可反汗帝怒欲手刃之義言愈力而中使己持前諭至後義見一貫唾曰相公稍持之礦稅撤矣何怯也自是大臣言官疏請者日相繼皆不聽閏月河州黃河竭三十一年春正月營兩宫詔户兵二部核軍實時內府所供寖多户部困不能支九邊額軍八十六萬有竒將辨率以空名支餉且多尅減邊兵屢譁帝急命户兵二部鈎考軍實卒不能振刷也夏四月丁亥朔日食是日當享太廟禮部侍郎郭正域字美命江夏人言禮當祭而日食牲未殺則廢朔旦宜救日詰朝享廟從之五月京師地震六月黜楚中尉華趆為庶人初楚恭王名英㷿顯榕次子薨遺腹宫人胡氏孿生子華奎華璧或曰內官郭綸取他人子養之言華奎乃恭王妃兄王如言子華壁乃妃族人王如綍奴王玉子儀賓汪若泉嘗訐奏事下撫按王妃持甚堅得寢帝八年華奎嗣爵華璧亦封宣化王宗人華趆者素強禦忤王及是遣人訐華奎異姓子不當亂宗沈一貫納華奎重賄屬通政使格其疏不上月餘華奎劾華趆疏至乃上之事下禮部署尚書事郭正域楚人也頗知假王事請勘虛實以定罪案一貫右華奎言親王不當勘但宜體訪正域以事關宗室不聽華奎懼奉百金為正域夀且屬毋竟楚事當酬萬金正域嚴拒之已而撫按行勘皆言無左驗而華趆妻乃王如言女持偽王説甚堅廷議令覆勘詔公卿集議于西闕門議者三十七人各具一單言人人殊李廷機以禮部左侍郎代正域署部事正域欲盡録諸人議廷機以辭太繁先撮其要以上一貫遂嗾御史康丕揚濟南陵縣人等劾禮部壅閼羣議不以實聞正域亦發一貫匿疏沮勘及華奎饋遺事中旨以楚王襲封已二十餘年何至今始發且夫姦妻證不足慿據遂坐華趆等誣奏降庶人錮之鳯陽明年華奎獻萬金助工經漢陽宗人疑其輸賄遮奪之巡撫趙可懷屬有司捕治宗人方恨可懷治楚獄不平持兵突入撫署擊殺可懷于是逮捕諸宗人置重典者六人禁錮間住者四十五人秋七月京師大雨雹八月禮部侍郎郭正域罷正域初右華趆積忤沈一貫給事中錢夢臯富順人遂希一貫指劾正域陷害親藩楊應文無錫人又言正域父懋嘗笞辱于楚恭王故正域因事陷之正域疏辨言恭王卒于隆慶時臣父方以舉人任知州何由被笞留中不報因乞休去已而華奎亦奏劾正域略如應文言且訐其不法數事請褫正域官詔下部院集議李廷機謂正域已去可無苛求給事中張問達字德充涇陽人言藩王欲進退大臣不可訓乃不罪正域而令巡按御史勘王所訐以聞皆無狀冬十一月獲妖書先是刑部侍郎吕坤字叔簡寧陵人嘗撰閨範圖説太監陳矩安肅人購入禁中帝以賜鄭貴妃妃重刻之二十六年秋或撰閨範圖説跋名曰憂危竑議其文託朱東吉為問答東吉者東朝也其名憂危以吕坤曽有憂危一疏因借其名以諷言坤書首載漢明德馬后由宫人進位中宫意以頌妃而妃之刋刻實藉此為奪嫡地妃兄國泰以給事中戴士衡字章尹莆田人嘗糾坤全椒知縣樊玊衡字以齊黃岡人並糾貴妃疑出自二人手言于帝帝重謫二人事遂寢至是續憂危竑議復出朱賡于寓門外獲之其辭假鄭福成為問答鄭福成者謂鄭氏子福王當成也大略言帝立東宫出于不得已當日必當更易其用朱賡為內閣者以賡更同音寓更易之意詞極詭妄時皆謂之妖書帝大怒敕有司大索姦人沈一貫以楚宗事銜郭正域又惡沈鯉相逼初鯉將入閣一貫以士心夙附鯉深忌之欲諷鯉辭召命乃貽書李三才曰歸德公來必奪吾位將何以備之歸德鯉邑名三才答書言鯉忠實無他腸勸一貫同心一貫并憾三才欲因是傾之給事中錢夢臯直指為正域鯉所造遂發卒圍正域舟于楊村在順天府武清縣東南捕僕𨽻乳媼十餘人御史康丕揚先後捕正域所善醫人沈令譽僧達觀等雜治之竟無所得最後錦衣衛獲順天生員皎生光生光性險賊多脅取人財又嘗為妖詩傾戚里生光嘗偽作富商包繼志詩有鄭主乘黃屋之句以脅鄭國泰及繼志金疑書出其手遂下獄拷訊夢臯丕揚令引正域生光仰面大罵曰死則死耳奈何教我迎相公指妄引郭侍郎乎久之獄不能具會皇太子在東宫數語近侍曰何為欲殺我好講官諸人聞之皆懼而陳矩提督東厰屢會法司拷訊心念獄無主名帝必怒甚恐輾轉攀纍無已遂與法司歸獄生光磔之釋諸波及者正域始得歸正域博通載籍有經濟大略自守介然人望歸之方獄急時邏卒圍鯉舍及正域舟鈴柝達旦又聲言正域且逮迫使自裁正域曰大臣有罪當伏尸都市安能自屏野外歸十年卒致仕東閣大學士王家屏卒諡文端家屏歸後八年儲位始定遣官齎敕存問及是卒贈少保家屏在閣每議事秉政持法與同列不亢不隨李獻可之謫家屏求去甚力或勸少需家屏曰人君惟所欲為者由大臣持祿小臣畏罪有輕羣下心吾意大臣不愛爵祿小臣不畏刑誅庶有濟耳遂懇請得歸甲辰三十二年夏四月辛巳朔日食開濬泇河成泇冇東西二河注已見前今運河上自山東滕縣下至江南邳州統謂之泇河泇河界滕嶧間南通淮海引漕甚便前總河侍郎翁大立首議開濬事具前已都御史傅希摯復言之朝廷數遣官行勘迄無成畫其後尚書舒應龍創鑿韓莊在嶧縣微山湖東今有閘以引湖水微山湖之水劉東星又開良城在邳州北漢置良成縣晉改良城唐省侯莊在韓莊東今為侯仙閘以試行運時漕舟行泇河者十之三工皆中輟東星卒官役遂止至是侍郎李化龍與淮揚巡撫李三才循東星舊迹修之由直河在邳州東蒙沂諸山之水所滙入泇口在邳州西北抵夏鎮凡二百六十里避黃河吕梁之險會化龍憂去侍郎曹時聘獲鹿人終其事由是泇河遂為漕道永利五月雷火焚長陵明樓帝以陵災下詔咨實政大學士沈鯉請除礦稅屬沈一貫朱賡各為一疏俟時上之一日大雨鯉曰可矣一貫等問故鯉曰帝惡言礦稅事疏入多不視今吾輩冒雨素服詣文華奏之上訝而取閲亦一機也一貫等從其言帝得疏疑必有急事啓視果為心動户部尚書趙世卿宇象賢歷城人亦上疏力請言今日實政孰有切于罷礦稅者古明王不貴異物今也取悖入之財斂蒼生之怨飾儉之謂何是為君德計不可不罷者一多取所以招尤謾藏必將誨盜鹿臺巨橋必致倒戈之禍是為宗社計不可不罷者二古者國家無事則預桑土之謀有事則議金湯之䇿安有鑿四海之山擁三家之市操弓挾矢戕及良民燬室踰垣禍延雞犬經十數年而不休者是為國體計不可不罷者三貂璫漁獵翼虎炮烋毁掘冢墓則枯骨蒙殃姦虐子女而良家飲恨人與為怨歡譟屢聞是為民困計不可不罷者四國家財賦不在民則在官今盡括入姦人之室故督逋租而逋租絀稽關稅而關稅虧搜庫藏而庫藏絶課鹽策而鹽策薄徵贖鍰而贖鍰消外府一空司農若掃是為國課計不可不罷者五天子之令信如四時三載前嘗曰朕心仁愛自有停止之時今年復一年更待何日天子有戲言王命委草莽是為詔令計不可不罷者六陛下試思服食宫室以至營造征討上何事不取之民民何事不供之上嗟此赤子曾無負于國乃民方歡呼以供九重之欲而陛下不少遂其欲民方奔走以供九重之勞而陛下不少慰其勞民方竭蹶以赴九重之難而陛下不少恤其難反之于心必有不自安者今天譴頻仍變不虛生故欲回天意在恤民心欲恤民心在罷礦稅無煩再計而決也帝優答之然不為罷六月太白晝見沈一貫等以災異疊見疏請罷礦稅出繫囚補缺員發臣下章奏帝答以修省實政俟次第舉行一貫等又言俟之為言有何底極臣等非不欲俟而天下危亂恐有不能俟者帝不省秋七月大雨水乙巳三十三年夏五月雷震郊壇鳯陽大風雨毁陵廟左都御史溫純罷純清白奉公五主南北考察澄汰悉當妖書事起力為沈鯉郭正域辨誣又楚宗人殺撫臣純言無反狀積忤沈一貫時大計京朝官純與吏部侍郎楊時喬字宜遷上饒入主之一貫所欲庇者鍾兆斗海鹽人錢夢臯等皆在謫中一貫怒言于帝降旨切責純察疏亦不下盡留被察科道官純力求去夢臯等遂連章訐純楚事誣以納賄給事中陳嘉訓鄱陽人極論夢臯兆斗朋比為姦請聽純歸以全大臣之體帝豫純致仕夢臯兆斗亦罷歸一貫請留察疏主事劉元珍龎時雍御火朱吾弼等力爭之謂二百年來計疏無留者時南京察疏亦留中後迫衆議始下諧劉元珍字伯先無錫人龎時雍汶上人朱吾弼字卿高安人秋九月京師地震冬十月濬朱旺口在碭山縣西前年河決豐縣單縣決口亦潰魚臺濟寧間平地成湖河臣李化龍上言自泇河既成山東南直間河不能為運河害獨朱旺口以上決單則單沼決曹則曹魚及豐沛徐邳魚碭皆命懸一線隄防宜急會化龍憂去曹時聘代至是聘大濬朱旺口凡役夫五十萬六閲月工竣自朱旺達小浮橋延袤百七十里渠廣隄厚河歸故道十一月皇長孫由校生即熹宗選侍明制太子女侍有淑女選侍才人等名號王氏順天人所生十二月詔罷天下開礦以稅務歸有司中使仍留不撤自礦稅使設廷臣諫者不下百餘悉寢不報自二十五年至是年諸璫所進礦銀三百萬兩金珠寶玩貂皮名馬雜然進奉帝以為能會長至日沈一貫在告沈鯉朱賡謁賀仁德門帝賜食司禮監陳矩侍鯉因極陳礦稅害民狀且言礦使破壞天下名山大川靈氣盡矣恐于聖躬不利矩乃具為帝道之帝悚然遣矩咨鯉所以補救者鯉言急停開鑿則靈氣自復帝為首肯一貫慮鯉獨收其功急草疏上帝不懌復止踰月始下停礦之命以稅務歸有司嵗輸所入之半于內府半户工二部然中使不撤吏民尤苦之其害遂終帝世丙申三十四年春二月雲南指揮賀世勳等殺稅監楊榮雲南孟密土司有寶井正德以後多以內臣掌之及榮領稅使妄奏井多晴緑珍瑰之屬可嵗益數十萬帝特賜之專敕而榮所進不得什一會緬賊侵蠻莫其執詞以奉稅使令令殺宣撫思正以開道路正奔騰越緬人追之有司不得已殺正以謝賊乃退既而榮又請麗江土知府本越析詔地明設土府今改流官木增獻地聽開採巡按御史宋興祖中江人言太祖令木氏世守兹土限石門關名在府西北以絶西域守鐵橋亦在府西北以斷土蕃奈何自撤藩蔽生逺人心不報榮由是怙寵益橫夷漢居民恨入骨相率燔稅厰殺委官榮猶弗悛恣行毒虐杖斃數千人至是以求馬不獲繫指揮使賀瑞鳯且言將盡捕六衛官于是世勳等率寃民萬人焚榮第殺之并殺其黨二百餘人事聞帝為不食者數日欲逮問守土官閣臣沈鯉揭爭且密囑太監陳矩剖陳帝乃止誅首凶世勳等時高淮徵稅遼東時時出塞射獵發黃票龍旗走朝鮮索冠珠貂馬數與邉將爭功山海關內外咸被其毒于是前屯衛軍盡甲而譁誓食淮肉未幾錦州松山軍復變淮所遣承舍吳守政自剄死淮懼內奔閣臣朱賡言未踰月而遼境四亂皆淮所致飢軍合叛衆臣不知遼事之終矣不報夏六月畿內蝗秋七月沈一貫沈鯉罷給事中陳嘉訓御史孫居相字伯輔沁水人交章詆一貫姦貪一貫憤求去帝為黜嘉訓奪居相俸而允一貫歸一貫數與沈鯉忤懼去後鯉為己憂因密傾之帝亦嫌鯉方鯁會鯉同時乞休遂並命致仕而一貫獨得溫旨焉一貫當國枝柱清議好同惡異與前後諸臣略同而楚宗妖書京察三事獨犯不韙論者醜之歸後言者追劾之不止及卒贈太傅諡文恭鯉在政府秉政不阿以壓于一貫志不盡行罷相命下舉朝駭愕及抵家猶極陳怠政之弊以明作進規卒贈太師諡文端冬十二月棄六堡初六堡既築生聚日繁至六萬四千餘戶至是李成梁以地孤懸難守與總督蹇達重慶人巡撫趙楫大興人建議棄之盡徙居民于內地居民懸戀家室或不從則以大軍驅迫之死者狼籍給事中宋一韓陳州衛人力言棄地非策御史熊廷弼字飛百江夏人亦以為言帝卒用成梁議自是遼左藩籬盡撤丁未三十五年夏四月伊勒敦達春舊作銀定歹成今改後仿此犯涼州官軍擊破之時松山既復寇復據賀蘭山結青海諸部寇抄不已伊勒敦達春尤桀驁三十三年連營犯鎮畨注見前總兵官達雲與副將柴國柱西寧衛人擊之寇大敗去未幾青海寇復大入將士分道遮擊生擒其長沙喇舊作沙賴今改餘敗走至是伊勒敦達春復連兵犯涼州雲與國柱及副總兵官秉忠榆林衛人逆戰大破之寇屢被挫悉去五月以于慎行李廷機葉向高字進卿福興人俱為禮部尚書兼東閣大學士預機務時內閣惟朱賡在帝命增置閣臣廷推慎行廷機向高三人遂用之并召還王錫爵三辭不允時言官方厲鋒氣錫爵進密揭力詆中有上于章奏一概留中特鄙夷之如禽鳥之音等語言官聞之大憤交章論劾錫爵闔門養重竟辭不赴又三年錫爵卒于家贈太保諡文肅秋八月彗星見冬十一月于慎行卒諡文定慎行明習典制為禮部尚書諸大禮多所裁定以請建儲忤帝意家居十餘年召掌詹事不至入閣命下再疏辭不允至京十有三日而卒慎行學有原委貫穿百家在詞館中以慎行及馮琦文學為一時冠馮琦字用韞臨淄人十二月蠻陷武定元羅婺部後改武定路明置武定軍民府今為府屬雲南武定自洪武十四年以女土官商勝首先歸附詔設土知府即以勝署府事正德初武定阿英以賄通劉瑾得襲知府改姓鳯氏嘉靖中以武定屢叛土舍鳯朝文與尋甸土舍安銓合兵為亂官軍討誅之未幾鳯繼祖復叛繼祖本他姓子冒鳯氏宗謀嗣職遂發兵圍府劫掠州縣屢敗官軍會鎮撫官督諸道兵並進繼祖奔東川婦家賊帥者色斬之以獻尋甸元德仁府明改尋甸今為州屬曲靖府東川注見前乃改設流官授鳯歷子思堯為經歷歷以思堯不得知府怨望復謀作亂被擒誅死鳯氏土職盡絶至是鳯阿克繼祖之孫與賊黨鄭舉等阿克徙居金沙江有馬頭四十八人而鄭舉稱首慓悍多力富于財知府陳典收禁之舉以兼金置魚腹中饋典獲免已復收之如是者再四舉惡其無厭乃誘阿克作亂結會川注見前諸蠻攻陷武定大肆劫掠連破元謀元縣今屬武定府羅次元州後改縣今屬雲南府諸城索府印會知府攜印會城不能得乃劫推官直抵會城請冠帶印信鎮撫以徵兵未集遣人以府印授之賊退入武定立阿克為知府戊申三十六年春二月京師地震飭邊偹是時蒙古喀爾喀諸部悉歸我大清薊遼總督蹇達疏陳東方隱憂宜早為備廷臣請亟罷礦稅以安人心不省尋命守臣嚴備邊夏六月李成梁罷成梁始鎮遼東鋭意封拜師出必捷威鎮絶域已而位望益隆子弟盡列崇階成梁弟成材參將子如松如柏如楨如樟如梅皆總兵官如梓如梧如桂如楠亦皆至參將僕𨽻無不榮顯貴極而驕奢侈無度軍資馬價鹽課市賞嵗乾沒不資全遼商民之利盡籠入己以是灌輸權門結納朝士中外要人無不飽其重賕為之左右其戰功率在塞外易為緣飾若敵入內地則以堅壁清野為辭擁兵觀望甚或掩敗為功殺良民冒級閣部共為蒙蔽以故物議沸騰後申時行許國王錫爵相繼謝政成梁失內主遂以去位其所藉健兒李平胡孫守廉輩皆富貴擁專城暮氣難振又轉相掊尅士馬為之蕭耗及成梁再鎮遼又議棄六堡為言者論劾帝素眷成梁不之罪及是罷久之卒年九十秋九月武定賊平鳯阿克既自立為知府益結賊徒四出焚掠所至殘滅巡撫陳用賓總兵沐睿俱以失事下獄論死時尋甸土目揚禮亦結火頭者色及土婦海沖為亂攻破嵩明注見前吏目韋宗孝學正龍旌死之官吏多為賊殺御史周懋相急調霑益注見前等處土兵擊之屢戰皆捷及是鎮撫官分五路兵進剿鄭舉等方西破祿豐元縣今屬雲南府知縣蘇夢㿩力戰死聞諸路兵已大集舉與阿克遂奔東川官軍追及之土司祿哲縳阿克鄭舉以獻而參政楊俊臣亦擊敗海沖副使羅希益復擊斬楊禮于是武定及元謀羅次嵩明祿豐等州縣皆復械阿克等至京師磔于市乃悉置流官冬十一月朱賡卒諡文懿賡醇謹無大過與沈一貫同鄉相比昵給事中姚文蔚錢塘人以故蒙詬病當一貫沈鯉去位時賡年已七十有二獨當國政時朝事日弛中外解體賡疏揭月數上請帝更新庶政帝雖優答之而不能行至是卒于官贈太保十二月朵顔寇薊州京師戒嚴朵顔長安之子賚雲丹舊作賴狡暈歹今改黠為邊患與其從父莽吉爾舊作蟒金今並改潛入薊鎮大掠河流口參將馬棟等不能禦時援師所過居民望見火光驚為敵至逃入京師者日數萬九門盡閉兵部尚書李化龍請以三十萬金補薊鎮缺餉并修守備之具而度支告匱户部請暫借內庫礦稅銀限以嵗月補還帝難之命發太僕寺馬價十萬戶部銀十萬舁之軍情稍定敵以有備引去己酉三十七年春三月恭圖陷大勝堡在錦州府錦縣北先是朵顔結黃台吉謀犯喜峰口總兵官杜松字來清崑山人受總督王象乾字子廓濟南新城人指潛搗黃台吉帳以牽薊寇乃從寧逺中左所夜馳恭圖營掩殺百餘人以大捷聞兵備副使馬拯謂彼無故被勦必復仇事且叵測至是果以五千人攻大勝堡執守將耿尚仁支解之殺掠幾盡復深入小淩河注見前二十二里官軍禦之大敗時杜松駐大凌河在錦縣東源出喀剌沁威蘇圖山下流至鮎魚塘入海不敢救遼人多咎松部議亦以釁由杜松令戴罪自效松恚甚言撫按諸臣附會馬拯害其竒功乃自提兵出塞將搗巢以雪前恥而所得止五級士馬多陷沒松益慚盡焚鎧仗置兵事不問乃勒還籍葉向高請發言官章疏不報時言路互相詆訐帝心厭之章悉留中御史鄭繼芳鹽山人力攻給事中王元翰字伯舉寧州人貪婪不法元翰亦疏詆繼芳左右二人者復相角不已向高請盡下諸疏敕部院大臣評曲直罪其論議顛倒者一二人以警其餘不報諸臣既無所見曲直益樹黨相攻繼芳劾元翰姦贓數十萬即潛遣人圍守元翰家元翰憤甚乃盡出筐篋舁置國門縱吏士簡括慟哭辭朝而去吏部坐元翰擅離職守謫其官庚戊三十八年夏四月正陽門災時京師久旱正陽門樓火給事中周曰庠臨川人疏言正陽城樓與正殿相對義取當陽自萬厯二十年來大小臣工莫見聖容朝夕左右不過宦官精明強毅之心日蝕月消而人材邪正政事得失都置膜外昔年宫殿災葉已示譴迄今十餘年玩愒如初所謂恭己正南面者杳無時日則何取于正陽之名為哉願稍振刷勤庶政親百姓疏入不報冬十一月壬寅朔日食禮部右侍郎翁正春字兆震候官人言前兩嵗食四月朔純陽之月也今食十一月朔陽生之月也豈非陽德有虧是以上天譴告如此日之食與更在一時而皇上之寢與行祗在一念誠翻然轉移太平盛業將綿萬世疏入不報辛亥三十九年春二月巡撫鳯陽都御史李三才罷三才在淮久以凌折稅監得民心山東稅監陳增兼領徐州數窘辱長吏獨三才以氣凌之裁抑其爪牙肆惡者嘗密令死囚引為黨輒捕殺之增為奪氣歙人程守訓以資官中書為增參隨縱橫自恣三才劾治之得贓數十萬增懼為己纍亦收獲守訓違禁珍寶聞于朝論死逺近大快屢加至户部尚書然頗通賂遺結納遍海內輔臣缺建議者請參用外􅒼意在三才由是忌者日衆工部郎中邵輔忠定海人劾其貪偽險橫御史徐兆魁東莞人喬應甲猗氏人給事中王紹徽咸寧人等十餘人繼之胡欣泰州人曹于汴字自梁安邑人等交章論救朝端聚訟數月未已顧憲成方講學東林貽書葉向高孫丕揚盛稱三才廉直三才與憲成深相結嘗請增大􅒼選科道録遺佚因言諸臣祇以議論意見一觸當途遂永棄不收要之于陛下無忤今乃假天子威以錮諸臣復假忤主之名以文已過負國負君罪莫大此意為憲臣發也三才用財如流水嘗宴憲成止蔬三四色厥明盛陳百味憲成訝而問之三才曰昨偶乏即寥寥今偶有故羅列憲成以此不疑其綺靡御史吳亮武進人中行子素善三才以憲成書附傳邸報中由是議者益譁三才力請罷去疏至十五上不得命遂自引歸帝亦不罪也三才才大而好用機權善籠絡朝士既家居忌者慮其復用御史劉光復劾其盜皇木營建私第至二十二萬又侵奪官厰為園囿且言與于玉立遙執相權意所欲用銓部輒為推舉給事中劉文炳御史李徵儀等亦相繼論劾三才憤甚請諸臣會勘乃詔徴儀偕給事中吳亮嗣往未幾光復坐視下獄三才請釋之而復力為東林辨白言東林者顧憲成講學之所從之遊者如髙攀龍薑士昌錢一本劉元珍安希范嶽元聲薛敷教等並束身厲名行何負國家哉偶曰東林便成陷穽如鄒元標趙南星等被以此名即力阻其進其朝上而夕下者惟史繼偕諸人耳人才邪正實國祚所關疏入衆益恨之亮嗣既往勘久之無所得第如光復言還報遂落三才職為民方三才之罷攻之者邵輔忠徐兆魁喬應甲等後皆附忠賢名麗逆案而推轂三才若顧憲成鄒元標趙南復星輩皆表表為時名臣故世以三才為賢劉光青陽人于玉立字中甫金壇人劉文炳寧晉人李徵儀廣德州人吳亮嗣廣濟人薑士昌字仲文丹陽人安希范字小范無錫人史繼偕晉江人三月大計京官祭酒湯賓尹字嘉賓宣城人等降黜有差時廷臣黨勢日盛賓尹與諭德顧天埈各收召朋徒干預時政謂之宣崑黨皆以賓尹天埈所居縣目之也而言路又有齊楚浙三黨自帝倦勤內外章奏悉留中不發惟言路一攻則其人自去以故臺諫之勢積重不返齊則亓詩教萊蕪人周永春金鄉人韓浚淄川人張延登鄒平人為之魁而燕人趙興邦高邑人輩附之楚則宫應震黃岡人吳亮嗣田生金麻城人為之魁而蜀人田一甲忠州人徐紹吉保寧衛人輩附之浙則姚宗文慈溪人劉廷元平湖人為之魁而商周祚會稽人毛一鷺遂安人過庭訓平湖人等附之與賓尹天埈聲勢相倚並以攻東林排異己為事創大東小東之説自東宫為大東東林為小東一人稍異議輒羣起逐之大􅒼非其黨不得安于其位天下號為當關虎豹是年當大計京官惡東林者設詞以惑吏部尚書孫丕揚令發單咨是非將陰為鈎黨計侍郎王圖字則之耀州人急言于丕揚止之羣小大恨圖先典庚戍會試賓尹以庶子為分校官嘗越房取其私人韓敬字求仲歸安人為第一敬受業賓尹及會試敬卷為他考官所棄賓尹搜得之與各房互換闈卷凡十八人強圖録敬為第一知貢舉侍郎吳道南字會甫崇仁人欲劾之未果至是賓尹已為祭酒而圖方掌翰林院祭酒京察例由掌院注考賓尹恐被察屬圖鄉人王紹徽為之請圖峻拒之又御史金明時德清人居官不職慮見斥會有為浙江巡按鄭繼芳偽書抵紹徽者書有云欲去福清先去富平欲去富平先去耀州兄弟又言秦脈斬斷吾輩可以得志福清謂葉向高耀州兄弟謂圖與其兄國富平即丕揚也國時巡撫保定圖為侍郎與丕揚俱秦人故曰秦脈蓋小人設為挑激語以害繼芳輩而其書乃達之丕揚丕揚不為意明時廉之明時疑書出選授御史徐縉芳晉江人等時候命未下乃先上疏力攻圖并詆縉芳因及偽書事圖與縉芳皆疏辨朝端鬨然及注考丕揚與侍郎蕭雲舉廣西宣化人副都御史許宏綱東陽人領其事考功郎王宗賢清源人都給事中曹于汴御史湯兆京字伯閎宜興人喬允升佐之兆京謂明時倡言要挾逃察丕揚特疏劾之旨下議罪而明時辨疏復犯御諱帝怒褫其職其黨大譁謂明時未嘗要挾兆京祗以劾圖一疏為圖報復于是主事秦聚奎漢陽人力攻丕揚等結黨欺君丕揚因發聚奎前為知縣時貪虐狀劾罷之而賓尹天埈御史劉國縉及前給事中鍾兆斗陳治則餘姚人宋一韓姚文蔚御史康丕揚徐大化會稽人主事鄭振先武進人張嘉言湘潭人等咸被察又以年例出紹徽及其同官喬應甲于外時察疏未下黨人咸謂丕揚果以偽書故斥紹徽國縉且二人嘗攻李三才王元翰故為修隙議論洶洶禮部主事丁元薦甫入朝即抗章盡發宣臺搆謀狀于是黨人姚宗文等爭擊元薦為金明時訟寃賴葉向高調護至五月察疏乃下丁元薦字長孺長興人由是諸失意者相繼攻丕揚及圖至秋圖遂引去明年二月丕揚亦拜疏歸初嘉隆以前士大夫廉恥自重以挂察典為終身之玷及帝之世閣臣有所徇庇間留一二以撓部權而羣臣水火之爭莫甚于是年及丁巳黨局既成互相報復至國亡乃已丁巳京察事具後夏六月大水南北兩畿及湖廣皆大水諸大吏請罷榷稅以蘇民命不省秋九月户部尚書趙世卿上疏去位世卿饒心計在户部酌劑贏縮軍國賴焉福王成婚及公主下嫁凡額外宣索世卿俱力爭楚王與宗人相訐世卿嘗官楚府長史言王非偽與沈一貫合遂為廷臣所惡論劾相繼世卿上疏乞罷出城候命踰年不報乃乘柴車去壬子四十年夏五月甲午朔日食秋八月以刑部尚書趙煥字文光掖縣人兼吏部尚書時帝怠荒益甚二十餘年未嘗一接見大臣曹署多空內閣止葉向高杜門已久六卿惟煥一人又兼署兵部至是改署吏部兵部尚書李化龍卒召王象乾未至亦不除侍郎户工禮三部止各一人都察院自溫純罷去八年無正官六科止數人十三道皆以一人領數職在外巡按十餘年不得代督撫監司亦屢闕不補郡守缺什之五六文武大選急選官及四方教職積數千人以吏兵二科缺掌印不給牒久滯都下時攀執政輿哀訴煥纍疏乞除補始除侍郎四人既而考察命下補科道六十餘人時稱盛事云九月李廷機罷廷機性廉潔然頗刻深不諳大體其在禮部楚宗人華趆以奏訐楚王既擬奪爵錮高墻廷機援祖訓謀害親王例議置之死言路勢張政府暨銓曹畏之不敢出諸外年例幾廢主事聶雲翰論之廷機希言路意中雲翰察興初入閣廷臣爭論之廷機纍疏乞休不允杜門不出待命踰年乃屏居荒廟人迹都絶言者猶攻之不已至是疏已百二十餘上不得命竟歸廷機繫閣籍六年秉政止九月無大過言路以其與申時行沈一貫密相比故交章逐之輔臣以齮齕受辱屏棄積年而後去前此未有也歸四年卒贈少保諡文節癸丑四十一年春三月加淮揚田賦時江上有倭警需餉急鳯陽巡撫陳薦祁陽人請加派銀十五萬兩有竒從之夏六月詔布色圖襲封順義王三十五年順義王徹哩克死孫布色圖應嗣求婚于忠順夫人忠順拒之其所部薩納台吉舊作素囊台吉及烏魯台吉舊作五路台吉今並改等各不相下封號久未定至是圖始婚于忠順東西諸部長皆具狀為請封忠順夫人旋卒詔封布色圖為順義王然勢益衰不復能力制諸部矣時布色圖所制止山大二鎮外十二部其部長烏魯台吉薩納額森台吉等兵力皆與順義埒朝廷因宣大總督塗宗濬言各與升賞如例凃宗濬南昌人額森台吉舊作兀慎台吉今改秋七月兵部尚書孫瑋字純玉渭南人罷瑋素負時望以兵部尚書兼掌都察院左都御史事方欲振肅風紀而是時朋黨勢成言路大橫會御史孫居相給事中孫振基字肖岡潼關衛人再發湯賓尹科場事賓尹以考察褫官韓敬亦稱疾去事三年矣會進士鄒之麟分校順天鄉試所取童學顔有私居相并賓尹事發之旨下部院議顧不及賓尹事振基疏請並議未得命禮部侍郎翁正春議黜學顔謫之麟亦不及賓尹等振基謂議者庇湯上疏論劾帝再下廷臣議正春乃坐敬不謹落職于是黨人亓詩教等交章論列并劾正春紛呶不已鄒之麟武進人而南畿巡按御史荆養喬臨晉人與提學御史熊廷弼復以賓尹鄉人事相訐賓尹家居嘗謀奪生員施天德妻為妾訐訟女投池死諸生馮應祥芮永縉輩遂告于官為建祠以愧賓尹後永縉又發諸生梅振祚宣祚朋姦事廷弼素交歡賓尹判牒云此施湯故智會有司報永縉及應祥行劣廷弼杖之永縉尋斃養喬夙與廷弼抵牾遂劾廷弼殺人媚人疏上徑自引歸廷弼亦上疏辨瑋議養喬鐫秩廷弼解職聽勘廷弼黨官應震吳亮嗣遂連章攻瑋而振基及諸給事御史劾應震等植黨背公南北臺諫議論方囂各有所左右而帝竟如瑋言令廷弼解職吏部尚書趙煥亓詩教鄉人也惟詩教言是聽以年例出振基及御史王時熙南昌人魏雲中武鄉人與時熙俱力攻賓尹廷弼者于外不關都察院瑋以失職求去疏十餘上始豫告歸大水兩畿河南山東湖廣江西廣西俱大水八月以方從哲字仲涵其先德清人𨽻籍錦衣衛吳道南並為禮部尚書兼東閣大學士預機務自朱賡卒李廷機罷葉向高遂獨相屢請增置閣臣章百餘上至是始命二臣入閣時道南在籍踰年乃至故事廷臣受官先面謝始蒞任帝久不視朝道南至不獲見不敢入直從哲為言帝令先蒞任道南始視事九月吏部尚書趙煥罷煥素有清望于朝臣無所左右顧雅不善東林故諸黨人攻東林者乘間入之所舉措往往不協清議先後為御史李若星字紫垣息縣人給事中孫振基等所劾煥遂乞罷葉向高請諭煥起視事向高言今國事艱難人才日寡在野者既賜環無期在朝者復晨星無幾乃大小臣工日尋水火甚非國家福也臣願自今以後共捐成心憂國事議論聽之言官主張聽之當事使大臣得展布而毋苦言官之掣肘言官得發舒而母患當事之摧殘天下事尚可為也煥乃出既而御史湯兆京以振基出外不移咨都察院守故事力爭不得投劾徑歸其同官李拜華字孟吉水人周起元字仲先海澄人孫居相及郎中賀烺丹陽人復交章劾煥擅權帝為奪諸臣俸貶烺官以慰煥煥請去益力遂叩首闕前出城待命踰月乃許乘傳歸甲寅四十二年春二月以鄭繼之字伯孝襄陽人為吏部尚書繼之年八十餘耄而憒一聽楚黨意指文選郎王大智玉田人繼之所倚信已而復任胡來朝贊皇人定制科道外轉必會都察院吏科協議自趙煥始及繼之皆不令與聞都給事中李瑾襄陵人抗章力爭御史周起元等亦引故事以言瑾爭之尤強來朝不能難乃嗾其黨羣起攻之瑾疏三上來朝亦三疏詆訐詞頗窮乃言年例協贊之旨實秉國者調停兩袓非可為制乞改前令從事帝一無所處分時給事中張國儒已階推京卿法不當轉外來朝以其異己遂出之繼之不能禁也慈聖皇太后李氏崩諡孝定太后性嚴明萬厯初政保護之力居多薑應麟以疏請建儲被謫太后聞之弗善也一日帝入侍太后問故帝曰彼都人子也內廷呼宫人曰都人太后亦由宫人進遂大怒曰爾亦都人子帝伏地不敢起儲位由是定福王之藩期屢易鄭貴妃欲遲之明年以祝太后誕為辭太后曰吾潞王亦可來上壽乎貴妃乃不敢留王未行而太后崩三月福王常洵之國初福王婚費三十萬營洛陽邸第至二十八萬十倍常制又設官店于崇文門外以供福邸及府第成廷臣請王之藩者數十百奏不報四十一年春廷臣復交章力請帝以明春為期已忽得旨莊田非四萬頃不行廷臣大駭葉向高因言莊田四萬頃必不能足今王之國且無日明旨又不信于天下矣且王疏引祖制而祖制無有是事曩惟世祖時景王有之景王久不之國皇考在裕邸危疑不安此何可效也帝報曰莊田自有成例且今大分已定何猜向高又言皇考時名位雖未正然講讀不輟情意自通今東宮輟講八年且不奉天顔久而福王一日兩見以故不能無疑惟堅守明春期而無以莊田藉口天下疑自釋曾錦衣百戶王日乾訐奏鄭貴妃內侍薑嚴山與姦人孔學及妖人王三詔等用厭勝術詛咒皇太后皇太子死欲擁立福王曰乾京師姦人與孔學趙宗舜趙聖等相訐告刑官讞未竟曰乾乃入皇城放炮上疏刑官大驚將擬以死罪曰乾遂訐學等謀變欲以害之帝震怒葉向高請帝以靜處之因言日乾疏不宜發宜留中而别諭法司治諸姦人罪且速定福王明春之國期以息羣喙帝納其言尋又諭改期向高封還手敕力諫帝不得已從之至是始令就藩歷年稅使礦使所進珍竒贏羡悉以資之賜莊田二萬頃以廷臣言減去二萬中州腴土不足取山東湖廣田益之王又奏乞淮鹽數千引開市洛陽河東引遏不行邊餉由此大絀釋楚宗幽禁諸人楚宗之獄廷臣互有左右歷數年卒不得白至是禮部侍郎孫慎行字聞斯武進人力言楚宗殺趙可懷不得為叛乃稱太后遺詔釋之夏六月葬孝定皇后于昭陵秋八月禮部侍郎孫慎行罷慎行素講學東林為黨人所忌及在禮部遇事皆切諫時郊廟大享諸禮帝二十餘年不躬親東宫輟講至八年皇長孫九齡未就外傅瑞王年二十三未婚福府莊田取盈二萬將之國貴妃復請留王慎行並力言之韓敬科場議久不定慎行擬黜敬黨人袒敬者追論湯賓尹越房取卷時各分考俱效之競相搜取因欲十七人並罪藉以寬敬慎行乃集廷臣議卒坐敬關節而為十七人昭雪黨人益大恨會疏上留中于是過庭訓亓詩教等相繼攻之慎行遂連疏引歸時敬科場事先後與敬為難者非出外即引去而敬以黨人護持久之僅謫行人司副凡七年而事始竟葉向高罷向高以宿望居相位每事執爭效忠藎帝心重之而其言多格不用所救正十二三而已向高嘗疏言今天下必亂必危之道蓋有數端災傷寇盜物怪人妖不與焉廊廟空虛一也上下否隔二也士大夫好勝喜爭三也多藏厚積必有悖出之釁四也風聲氣習日趨日下不可挽回五也非陛下奮然振作簡任老成布列朝署取積年廢弛政事一舉新之恐宗社之憂不在敵國外患而在廟堂之上也帝不能用向高復言陛下欲用臣則當行臣言今章奏不發大􅒼不補起廢不行臣留何益又言今中外離心輦轂肘腋聞怨聲憤盈禍機不測而陛下務與羣臣隔絶帷幄不得關其中六曹不得舉其職舉天下無一可信之人而自以為神明之妙用臣恐自古聖帝明王無此法也帝俱不省嘗卧疾閣中無人章奏就其家擬旨者一月後堅卧不出即家擬旨如前論者以為非體及主癸丑會試章奏皆送闈中尤為異事纍疏引退輒優旨慰留至是疏四十餘上詞極哀始允其去乙卯四十三年春三月丁未朔日食夏五月畿內山東旱男子張差持梃入慈慶宫伏誅太子居慈慶宫有不知姓名男子持棗木梃入宫門擊傷守門內侍至殿前簷下被執皇太子奏聞帝命法司案問巡視皇城御史劉廷元鞫奏犯名張差薊州人口中呶呶語無倫次按其迹若涉風癲稽其貌實係黠猾請下法司嚴訊時東宫雖久定帝待之薄中外方疑鄭貴妃與其弟國泰謀危太子及差被執舉朝驚駭廷元既以風癲奏刑部郎中胡士相平湖人等復訊一如廷元指言差收積薪草為人所燒氣憤赴朝聲寃行至東華門遇一人謂持梃入可當寃狀遂誤入東宫按律當斬加等立決奏定未上會提牢主事王之宷字心一朝邑人散飯獄中私詰差得口詞甚悉差初不肯承已云不敢説之宷麾左右出留二吏扶問之始言小名張五兒有馬三舅李外父令隨不知姓名一老公説事成與汝地幾畝比至京入不知街道大宅子一老公飯我云汝先衝一遭遇人輒打死乃舁我棗木棍導我由厚載門到宫擊門者墮地老公多遂被執老公內侍通稱也之宷備揭其語因侍郎張問達以聞且言差不癲不狂有心有膽乞縛凶犯敇九卿科道三法司會問疏入未下廷臣連章趣之而郎中陸大受字凝逺武進人疏有姦戚二字帝惡之與之宷疏俱不報御史過庭訓言禍生肘腋宜亟翦除亦不報庭訓遂移文薊州蹤迹之知州戚延齡具言其致癲始末言貴妃遣璫建佛寺璫置陶造甓居民多鬻薪獲利者差賣田負薪往市于璫土人忌之焚其薪差訟于璫被責差産破薪焚不勝憤故持梃欲告御狀于是原問諸臣據為口實遂以風癲二字為定案越數日問達以員外郎陸夢龍字君啓會稽人言令十三司會鞫衆咸囁嚅夢龍獨詳訊之具得內監龎保劉成主使狀夢龍見差長身駢脅睨視傲語絶無風癲狀因呼紙筆命畫所從入路須臾圖成具供馬三舅名三道李外父名守才不知姓名老公乃修鐡瓦殿之龎保不知街道宅子乃住朝外大宅之劉成且言二人與我金銀壺各一豢我已三年令我打上宫門打得小爺喫有著有小爺者內監所稱皇太子者也又言有姊夫孔道同謀凡五人于是刑部行薊州道提差所供馬三道等疏請法司提龎保劉成對質保成皆貴妃內侍中外籍籍語多侵國泰國泰懼出揭自白給事中何士晉字武莪宜興人直攻國泰且侵貴妃士晉疏言國泰若欲釋人疑惟明告貴妃力求陛下速令保成下吏考訊如果國泰主謀是大逆罪人非但貴妃不能庇即陛下亦不能庇設與國泰無干請令國泰自任凡皇太子皇長孫一切起居悉屬國泰保護稍有疏虞罪即坐之則臣與在廷諸臣亦願陛下保全國泰無替恩禮若國泰畏有連引預熒惑聖聰久稽廷訊或潛散黨與使之逺遁或陰斃張差以冀滅口則國泰罪不容誅矣疏人帝大怒初姦人王日乾上變言巫蠱事辭已連成至是復涉成帝心動諭貴妃善為計貴妃窘乞哀皇太子自明無他帝令太子白之廷臣太子亦以事連貴妃大懼請帝速具獄毋株連帝乃御慈寧宫太子侍御座右三皇孫雁行列左階下召大學士方從哲吳道南及文武諸臣入責以離間父子因執太子手謂諸臣曰此兒極孝朕極愛惜使朕有别意何不早更置御史劉光復跪于班後大言曰皇上甚慈愛太子甚仁孝其意固將順也帝不甚悉詰問為誰中使以御史劉光復對先復猶大言不止帝令中縛之著刑部重擬光復罪因命內侍引三皇孫至石級上令諸臣熟視曰朕諸孫俱已長成更何説顧問太子有何語與諸臣悉言無隱太子具言瘋癲之人宜速決并責諸臣言我父子何等親愛而外廷議論紛如爾等為無君之臣使我為不孝之子諸臣叩頭出遂磔差于市掠死成保禁中馬三道等皆議流其事遂止帝不見羣臣二十有五年矣至是特一出以釋羣疑且調劑貴妃太子念其事似有迹故于諸言者亦不遽罪也未幾士晉調外之宷削籍大受奪官而夢龍獨免光復亦見釋秋閏八月河套諸部犯延綏官軍禦之敗績是時套虜號十萬然其衆分四十二枝多者二三千少不過千騎惟布色圖之子濟農士馬雄諸部為套中之主先是蒙克錫里舊作猛克什里今改等以挾賞不獲數沿邊寇掠總兵官秉忠隨所向以徑騎遮擊屢破之寇遂遁去至是濟農挾求封王且請市賞邊臣不許濟農遂合套中諸部大舉入寇東道高家在葭州北大柏油在神木縣西神木柏林在神木縣西南中道波羅在榆林府懷逺縣東北西道磚井在延安府定邊縣東寧塞在延安府靖邊縣西諸城堡盡被蹂躙副將孫洪謨禦之大柏油遇伏被執士卒死傷過半官秉忠聞寇入急遣遊擊張榜潛劫其營又敗死四百餘人會故帥杜松寧夏總兵杜文煥字􅌢武松之姪援軍至共擊之寇始敗退秉忠被劾罷去冬十月京師地震丙辰四十四年春正月我太祖髙皇帝建元天命元年臣等謹按一代之興鴻猷炳爍史家紀載必據實以徴文我國家王肇基大東奄宅前卷中所載整旋興師既已恭𫐠大略至于紀年系統正續綱目于周末元末書朝宋明二太祖事間有參差未為允當伏思我龍興之始雖明統未亡而肇基興朝建國紀年例應大書以昭績臣等屢蒙睿訓指示仰見正之心實超越千古謹于萬厯四十年以聖天子大公至列聖建後凡恭遇繫月特書元之初並創垂之統而嵗首則仍存明之紀年庶前後體例均歸盡善而我皇上筆削維嚴之至意與垂萬世云纘承靡斁之盛心並足昭我太祖髙皇帝自誅尼堪外蘭之後國勢日隆葉赫等九部來侵大破其衆事在辛卯年哈達貝勒蒙格布祿為葉赫所誘將害我助防哈達之兵征克其城獲之以歸事在己亥年輝發貝勒拜音達哩亦二于葉赫數背盟約率兵滅之撫定其國事在丁未年烏拉貝勒布占泰嘗戰敗被俘釋遣歸國申以姻好布占泰復謀背叛屢討不悛遂大舉伐之布占泰勢窮奔于葉赫其國遂滅事在癸丑太祖復年時葉赫貝勒錦台什居東城布揚古居西城既而我定取葉赫䇿遣一軍圍布揚古而親督大兵圍錦台什破其城錦台什就執布揚古亦降葉赫屬城俱下事在己未年太祖既削平諸國德威逺播又製國書先以蒙古字合國語聮綴成句創立滿洲文尋復以十二字頭無圈點上下字雷同無别因加圈點以分析之定旗制初削平諸國設有四旗旗以純色為别曰黃曰紅曰藍曰白尋又添設四旗參用其色鑲之共為八旗分左右翼規模宏逺帝業已成于是諸貝勒大臣等咸奉表勸進以正月壬申朔尊太祖為覆育列國英明皇帝以是年為天命元年兩畿山東河南大飢是嵗陕西山西旱蝗江西廣東湖廣大水三月辛未朔日食夏六月天鼓鳴兵科給事中熊明遇字良孺進賢人疏言入春以來天鼓兩鳴于晉地流星晝隕于清豐唐縣今屬大名府地震二十八天火九石首晉縣今屬荆州府雨菽河內女妖遼東兵端吐火即春秋二百四十年間未有稠于今日者且山東大䘲人相食黃河水羡溢兼以太白經天輔星湛沒熒惑襲月金水愆行或日光無芒日月同暈為恆風為枯旱天譴愈深而陛下所行皆誣天拂經之事此誠禽息碎首韓詩外傳禽息秦人薦百里奚于秦穆為私而加刑焉公後知奚之賢召禽息謝之禽息曰臣聞忠臣進賢不私顯烈士憂國不喪志奚陷刑臣之罪也乃對使者以首觸楹而死賈生痛哭之時也敢以八憂五漸三無之説進內庫太實外庫太虛可憂一餉臣乏餉邊臣開邊可憂二套部圖王插部覬賞可憂三黃河泛濫運河膠淤可憂四齊苦荒天楚苦索地可憂五鼎鉉不備棟梁常撓可憂六羣譁盈衢訛言載道可憂七吳民喜亂冠履倒置可憂八八憂未已五漸繼之太阿之柄漸付中涓魁壘之人漸如隕籜制科之法漸成姦藪武庫之器漸至銷亡商旅之途漸至梗塞五漸未已三無繼之匹夫可熒惑天子小校可濫邀絲綸是朝廷無紀綱滇黔之守令皆窮途揚粵之監司多規避是逺方無吏治讒搆之口甚于戈戟頃危之禍慘于蘇張是士大夫無人心天下事可不寒心哉帝不省套虜犯延綏總兵官杜文焕破降之延綏被冦文煥赴救大破之遂代官秉忠鎮延綏屢敗冦衆浩爾齊布延泰舊作卜言太沙津舊作沙計今並改等懼相率降既而復與濟農合駐高家柏林要封王補賞十事文煥襲其營斬首百五十浩爾齊諸部落攢刀立誓獻罰九九部落中罰駝馬牛羊之數已沙津又設伏兵誘殺都指揮王國安糾蒙克錫里連犯雙山在榆林縣東南波羅二堡文煥擊破之追奔二十餘里寇屢不得志沙津乃與濟農蒙克錫里浩爾齊布延泰等相繼納欵延綏遂少事秋八月皇太子出閣講學皇太子輟講已十有二年羣臣諫疏凡數百上及是始命舉行然一講而輟後不復舉矣九月兵部請治兵不報前以孝定太后喪停操三年至是兵部上言大禮久竣當新戎壘以應秋氣不省丁巳四十五年夏旱自去冬無雪入春不雨至是大旱災歉遍天下有司請賑率寢不報盜賊四起帝但敕羣臣修省而已秋七月癸亥朔日食吳道南罷道南遇事有操執通達政體頗負時望自入閣後未嘗一見帝及梃擊之變帝召見羣臣于慈寧宫道南始得面謝自後不再見前年典會試副都御史沈季文吳江人子同和以代倩獲第事覺同和逺戍同和素不能文倩同里趙鳴陽為之同和得舉第一鳴陽第六事發兩人並謫戍湯賓尹以道南嘗欲發其科場事遂嗾其黨交章論之給事中劉文炳御史張至發淄川人相與攻之尤力肆口詆諆道南不能堪言臺諫劾閣臣職也二百年來有糾閣臣之言官無詈閣臣之言官臣辱國已甚請立罷黜帝為謫文炳于外言官疏救文炳復詆道南道南益求去杜門踰年疏至二十七上帝猶慰留會母喪乃歸居二年卒贈少保諡文恪戊午四十六年夏四月京城壕水赤大清兵克撫順時我太祖親率步騎兵二萬進發臨行書七大恨告天其詞曰我之祖父未嘗損明邊一草寸土也明無端啓釁邊陲害我人等祖父恨一也明雖啓釁我尚欲修好設碑勒誓凡滿漢毋越疆圍敢有越者見即誅之見而故縱殃及縱者詎明復渝誓言逞兵越界衛助葉赫恨二也明人于清河以南江岸以北每嵗竊踰疆場肆其攘奪我遵誓行誅明負前盟責我擅殺拘我廣寧使臣綱古哩方吉納挾取十人殺之邊境恨三也明越境以兵助葉赫俾我已聘之女改適蒙古恨四也柴河三岔撫安三路我纍世分守疆土之衆耕田藝榖明不容刈穫遣兵驅逐恨五也邊外葉赫獲罪于天明乃偏信其言特遣使臣遺書詬詈肆行陵侮恨六也昔哈逹助葉赫二次來侵我自報之天既授我哈達之人矣明又黨之挾我以還其國已而哈達之人數被葉赫侵掠夫列國之相爭伐也順天心者勝而存逆天意者敗而亡何能使死于兵者更生得其人者更還乎天建大國之君即為天下共主何獨搆怨于我國也初呼倫諸國合兵侵我故天厭呼倫啓釁惟我是眷今明助天譴之葉赫抗天意倒置是非罔為剖斷恨七也因此七大恨之故是以征之隨告諸貝勒大臣以興師之故遂趨撫順圍其城遣人以書諭遊擊李永芳永芳降撫順東州瑪哈丹三城及臺堡悉下撫順守將王命印死之廣寧總兵張承廕榆林衛人率師往援分兵為三據險立營以待大軍乘風奮擊大破其營承廕及副將頗廷相參將蒲芳等皆戰死士卒逃歸者十無一二焉時察罕胡土克圖及西部阿延妻璊達勒皆擁衆入邉乘機邀賞羽書日數十至中外戒嚴帝初頗憂懼章奏時下不數月泄泄如故矣日中有黑子閏月起楊鎬經略遼東初征倭事竣復用鎬巡撫遼東嘗襲綽哈之衆破之言官劾其開釁罷去至是以遼警廷議謂鎬熟諳邊事起兵部尚書往經略六月復以趙煥為吏部尚書先是丁巳京察鄭繼之與署都察院尚書李志縉雲人主其事考功郎趙士諤給事中徐紹吉御史韓浚佐之所去留悉出紹吉等意繼之志受成而已一時清流與黨人異趣者斥逐殆盡即在籍不免大􅒼則中以拾遺以孫慎行趣福王之國為邀功列之拾遺疏中帝察慎行無罪獲免善類為空至是繼之去位亓詩教以煥為鄉人老而易制力引代繼之年七十有七矣比至一聽詩教指揮由是素望益損與繼之並為時議所譏京師地震秋七月清兵克清河堡時大兵由鴉鶻關入圍清河城守將鄒儲賢張斾以兵萬人固守城上矢石俱下大兵樹雲梯以登不避鋒刃遂克之儲賢斾皆戰死清河既失全遼震動而諸路兵尚未出關帝賜楊鎬尚方劍得斬總兵以下官鎬乃斬清河逃將陳大道高炫徇軍中至冬四方援兵始集九月加天下田賦帝以遼左軍餉不敷除貴州地磽兼有苗變不加外餘省照萬厯六年會計録派定七百餘萬頃每畝加三釐六毫共加銀二百萬有竒次年復加賦額至八百萬時遼餉五百餘萬軍心賴以粗安而天下蕭然民生困弊矣茂陵災冬十月彗星見見氐分後十數日犯太微又三日逼紫微垣凡三十四日乃滅戊午四十七年春正月蚩尤旗見長竟天又星隕地震時方議進師識者以為兵敗之徵三月楊鎬帥師出塞敗績帝以四方援遼兵大集恐師老財匱下廷議方從哲與兵部尚書黃嘉善即墨人兵科給事中趙興邦等發紅旗日趣鎬進兵鎬乃于二月中出塞分兵四道令總兵官馬林蔚州人芳之子出開原攻北僉事潘宗顔字士贊保安衛人監其軍杜松出撫順攻西以趙夢麟榆林人苛之子王宣亦榆林人為佐李如柏從鴉鶻關方輿紀要在清河東南關之東有喜昌口出趨清河攻南東南則以劉綎出寬甸由涼馬甸在寬甸東北亦曰晾馬臺搗後以副使康應乾監之而令遊擊喬一琦字伯圭上海人别監朝鮮兵為助號四十七萬期三月一日會二道關在今西興京城並進天大雪兵不前師期泄松欲立首功先渡渾河即古小遼水自邊外流入經縣興京東北境西流至奉天府承德南入太子河連克二小寨遂乘勢趨薩爾滸舊作撒爾湖今改谷口我大清方築界藩城在鐡興京西北背山上役夫萬五千以精騎四百護之聞松軍至伏精騎于谷口以待松軍過將半伏兵尾擊之追至界藩渡口與築城夫合據吉林崖松引軍圍崖别遣將營薩爾滸山上松軍攻崖方戰大清益千人助之已又續遣二旗兵趨界藩以為援而别遣六旗兵攻松别將于薩爾滸山上明日六旗兵大戰破薩爾滸軍死者相枕藉所遣助吉林崖者自山馳下擊松軍二旗兵亦直前夾擊松與夢麟宣皆死全軍盡覆林率開原兵出三岔口在今奉天府海城縣西明置三岔關今廢聞松軍敗結營自固大清兵乘高奮擊林大敗遁去尋謫充為事官令仍守開原潘宗顔力戰死鎬聞急檄止如柏綎兩軍如柏甫抵虎攔關大清哨兵二十人見之登山鳴鑼作大軍追擊狀如柏軍大驚奔走相蹴死者亦千餘人綎已深入三百里至深河輿程記寬甸東北由鎮江路二百五十餘里為深河子皆小徑深林克三寨時大清兵守董鄂路聞綎軍至逆戰綎猶不知杜松軍覆復整衆進登阿布達里岡遇大清兵亦登岡出其上而别以一軍趨綎西岡上軍自高馳下奮擊綎軍趨綎西者復從旁夾擊已乃張松旗幟被其衣甲以紿綎綎營中大亂力戰死綎養子劉招孫突圍手格殺數人亦死綎于諸將中最驍勇大小數百戰名震海內所用鑌鐡刀百二十斤天下稱為劉大刀自綎死舉朝大悚邊事日難為矣本朝賜専諡忠壯士卒脫者無幾時康應乾兵及朝鮮軍營富察之野大清遂移師邀擊大破之應乾僅以數百騎免一琦敗走朝鮮營朝鮮帥懼率衆降一琦投崖死是役也文武將吏前後死者三百一十餘亡失馬駝甲仗無算敗書聞京師大震言官交章劾鎬尋逮下詔獄論死夏四月遣給事中姚宗文閲遼兵初宗文丁憂歸還朝欲補官而吏部題請諸疏率數年不下宗文患之假招徠西部名屬當事薦已疏屢上不得命宗文計窮致書熊廷弼令其代請廷弼不從宗文怨之至是夤緣復吏科遂命閲視遼東士馬六月以熊廷弼為兵部侍郎兼右僉都御史經略遼東楊鎬既喪師廷議以廷弼嘗按遼熟邊事廷弼前按遼趙楫李成梁議棄六堡宋一韓論之下廷弼復勘具得棄地驅民狀劾兩人罪康丕揚黨庇疏竟不下時有詔興屯廷弼言遼多曠土嵗于額軍八萬中以三分屯種好可得粟三十萬石帝優詔褒美命推行于諸邊邊將輕師啓釁廷弼言防邊以守為上繕垣建堡有十五利奏行之在遼數年杜餽遺核軍實按劾將吏不事姑息風紀大振命代鎬經略未出京我大清兵已克開原馬林敗沒廷弼上言遼左京師肩背河東遼鎮腹心開原又河東根本開原今已破則北關難保朝鮮亦不足恃遼瀋何可守也乞速遣將備芻糧修器械毋窘臣用毋緩臣期毋中格以阻臣氣毋旁撓以掣臣肘毋獨遺臣以艱危以致誤臣誤遼兼誤國也疏入報允北關在奉天府葉赫城西北甫出關鐵嶺復失瀋陽及諸城堡軍民一時盡竄遼陽洶洶廷弼兼程進遇逃者諭令歸斬逃將劉遇節等三人以祭死節之士誅貪將陳倫劾罷總兵李如楨如楨成梁第三子素不知兵由父廕歷官至右都督並在錦衣會其兄如柏革任遼人謂李氏世鎮遼東邊人憚服非再用李氏不可黃嘉善遂以為請帝從之如楨抵遼楊鎬使守鐡嶺鐡嶺故李氏宗族墳墓所在時如柏還京其族黨部曲高資者悉隨之西城中為空如楨以孤城難守還屯瀋陽及鐡嶺被圍遼兵不救城遂失督軍士造戰車治火器濬濠繕城為守禦計法嚴令行數月守備大固又請集兵十八萬分布靉陽清河撫順柴河堡名在奉天府鐵嶺縣東北以近柴河名鎮江堡名在奉天府鳯凰城東南與朝鮮分界處等諸要口使首尾相應帝從之廷弼初抵遼令僉事韓原善往撫瀋陽憚不肯行繼命僉事閻鳴泰至虎皮驛慟哭而返廷弼乃躬自巡歷自虎皮驛抵瀋陽復乘雪夜赴撫順時兵燹後數百里無人迹廷弼祭諸死事者乃耀兵奉集相度形勢而還所至招流移繕守具分置士馬由是人心始安韓原善趙城人閻鳴泰清苑人虎皮驛一作十里河站在奉天府承德縣南與遼陽州接界奉集遼縣後廢今為堡在奉天府承德縣東南秋九月廷臣伏文華門請帝視朝發奏章不報時邊警日至方從哲請帝出御文華殿召見羣臣面商戰守方略吏部尚書趙煥率廷臣詣文華門固請帝臨朝議政抵暮遣中官諭之退而諸軍機要務廢閣如故煥等復上疏趣之且作危語曰他日薊門蹂躙鐵騎臨郊陛下能高枕深宫稱疾却之乎帝深嗛焉煥尋卒恤典不及己未四十八年春正月朝鮮乞援是時我大清兵攻破北關降蒙古宰桑舊作宰賽今改等進攻朝鮮國王李琿昖之子三十六年襲封上疏乞援而朝議誤聽遼鎮塘報遂謂琿陽衡陰順宜遣官宣諭或命將監護其説紛拏琿疏辨言二百年忠誠事大死生一節詞極剴摰禮兵二部請降敕慰諭以安其心帝是其議然敕令陪臣齎往不遣官也夏四月皇后王氏崩諡孝端大學士方從哲哭臨畢召見𢎞德殿跪語良久從哲請補閣臣用大􅒼下臺諌命帝許之從哲叩頭出復如故秋七月帝崩先是帝寢疾不食者半月外庭憂危時皇太子未得見給事中楊漣偕諸給事御史走謁方從哲御史左光斗趣從哲問安從哲曰帝諱疾即問左右不敢傳漣曰昔文潞公問宋仁宗疾內侍不肯言潞公曰天子起居汝曹不令宰相知將毋有他志速下中書行法公誠日三問不必見亦不必上知第令宫中知廷臣在事自濟公更當宿閣中從哲曰無故事漣曰潞公不訶史志聰此何時尚問故事耶越二日從哲始率廷臣入問及帝疾亟太子尚躊躇宫門外漣與光斗遣人語東宫伴讀王安曰帝疾甚不召太子非帝意當力請入侍嘗藥侍膳薄暮始還太子深納之楊璉字文孺應山人左光斗字遺直桐城人王安雄縣人至是大漸召英國公張惟賢輔七世孫大賢士方從哲尚書周嘉謨字明卿漢川人李汝華字茂夫睢州人黃嘉善張問達黃克纘字紹夫晉江人侍郎孫如遊字景文餘姚人等于𢎞德殿勉諸臣勤職輔理嗣君越二日崩遺詔發帑金百萬充邊賞罷一切礦稅及監稅中官起用建言得罪諸臣光宗皇帝庚申泰昌元年是年八月以前為神宗萬厯四十八年八月以後為光宗泰昌元年從當時廷議據實分系以存光宗之統與前例一年兩系者不同秋八月太子常洛即位赦以史繼偕沈㴶字銘縝烏程人並為禮部尚書兼東閣大學士預機務神宗末方從哲獨當國請補閣臣㴶與從哲同里相善給事中亓詩教等緣從哲意以㴶及繼偕名上疏未發二人俱在籍至是帝召用之㴶于明年六月始至繼偕于十月至㴶官翰林時嘗授內侍書劉朝魏進忠皆其弟子既入閣密結二人奏言遼左用兵臣嘗募東陽義烏諸邑及揚州淮安材官勇士二百餘請以勇士𨽻錦衣衛而量授材官職進忠朝方舉內操得㴶奏大喜詔錦衣官訓練募士授材官王應于等遊擊以下官有差㴶又奏募兵後至者復二百餘人請發遼東四川軍前亦從之傷魏進忠肅寧人後更名忠賢義烏漢烏縣唐改名今屬金華府帝有疾初鄭貴妃侍神宗疾留居乾清宫及帝嗣位猶未移懼帝以福王事銜已進珠玉及美姬八人噉帝知選侍李氏時宫中有二李選侍人稱東西李此為西李其東李嘗撫視信王後為客魏所間害憤鬱而卒最得帝寵因請立為皇后選侍亦為貴妃求封皇太后帝力疾御門趣舉册封禮方從哲即以命禮部禮部侍郎孫如遊力爭事得寢時都下紛言貴妃使內侍崔文升進泄藥帝由此委頓羣情疑駭外家王郭二戚畹帝生母王氏皇后郭氏遍謁朝士泣訴宫禁危急狀言鄭李交固甚包藏禍心于是給事中楊漣御史左光斗昌言于朝與吏部尚書周嘉謨以大義責貴妃兄子鄭養性趣貴妃移宫貴妃恐即移居慈寧漣遂劾文升用藥無狀并及輔臣方從哲以何宗彥字君美隨州人劉一燝字季晦南昌人韓爌字象雲蒲州人朱國祚字兆隆秀水人並為禮部尚書兼東閣大學士預機務召葉向高復入閣時內閣止方從哲一人史繼偕沈㴶尚未至帝遂復有宗彥等命而宗彥國祚向高亦俱在籍惟一燝爌入直明年六月宗彥國祚至十月向髙至復為首輔帝召見方從哲等于乾清宫九月朔崩帝疾甚召見英國公張惟賢閣臣方從哲劉一燝韓爌尚書周嘉謨李汝華侍郎孫如遊都御史張問達并及給事中楊漣漣以小臣特預召帝數目之命封選侍為皇貴妃選侍挽皇長子入復推之出告帝曰欲封后帝不應羣臣愕然帝問有鴻臚官進藥者安在從哲曰鴻臚寺丞李可灼自云仙方臣等未敢信帝命宣可灼至趣和藥進所謂紅丸者也帝服訖稱忠臣者再諸臣退俟宫門外中使傳上體平善日晡可灼復進一丸出明日味爽帝崩選侍據乾清宫與心腹閹魏進忠謀挾皇長子自重羣臣入臨為閹人所格漣厲聲責之得入臨如禮一燝詰皇長子所在羣閹不應一燝大言誰敢匿新天子者東宫伴讀王安入白選侍紿曰第出即返遂抱皇長子疾趨出及門中官數輩追及攬衣請還漣呵退之一燝與惟賢遂掖皇長子升輦至文華殿羣臣叩頭呼萬嵗還居慈慶宫擇日登極時衆議未定有請改初三者有請于即日午時者漣曰今海宇清宴內無嫡庶之嫌父死之謂何含斂未畢冠冕臨朝非禮也或言登極則人心安漣曰安與不安不在登極早暮處之得宜即朝委裘何害議定出過文華殿太僕少卿徐養量御史左光斗至責漣誤大事唾其面曰事脫不濟汝死肉足食乎漣為悚然徐養量應城人選侍李氏移居噦鸞宫選侍欲專大權必欲與皇長子同居廷臣箋奏令先進乾清然後進慈慶左光斗上言內廷有乾清宫猶外廷有皇極殿惟天子御天得居之惟皇后配天得共居之其他妃嬪雖以次進御不得恆居非但避嫌亦以别尊卑也選侍既非嫡母又非生母儼然尊居正宫而殿下乃退居慈慶不得守几筵行大禮名分謂何及今不早斷決將借撫養之名行專制之實武氏之禍再見于今將來有不忍言者選侍得光斗疏遂大怒將加以嚴譴數使宣召光斗光斗曰我天子法官也非天子召不赴若輩何為者選侍益怒邀皇長子議之皇長子深以光斗言為善趣擇日移宫而首輔方從哲徘徊其間顧欲緩之劉一燝曰本朝故事仁聖嫡母也移慈慶慈聖生母也移慈寧今何日可姑緩耶至登極前一日楊漣復抗疏言選侍陽託保護之名陰圖專擅之實宫必不可不移臣言之在今日殿下行之在今日諸大臣贊決亦惟今日于是一燝韓爌邀從哲請即日降旨佇立宫門以俟選侍不得已乃移噦鸞宫皇長子復還乾清是時宫府危疑人情洶懼光斗與漣協心建議辰極獲正朝野稱為楊左皇長子由校即位是為熹宗時廷議改元或議削泰昌弗紀或議去萬厯四十八年即以今年為泰昌或議以明年為泰昌後年為天啓元年左光斗請以今年八月以前為萬厯以後為泰昌明年為天啓從之劉一燝韓爌周嘉謨等念內廷惟王安足倚初光宗在東宮時鄭貴妃謀立己子數使人陰托其過安善為調護貴妃無所得及梃擊事起安又為屬草下令旨釋羣臣疑以安貴妃神宗大悅及光宗即位擢司禮秉筆嘗勸行諸善政發帑金濟邊起用直臣鄒元標王德完等中外翕然稱賢引與共事安亦頃心向之內閣吏部所奏請無不從發內帑抑近幸搜拔賢才中外欣然望治賜太監魏進忠世廕封乳母客氏定興人為奉聖大人進忠初為帝母王才人典膳進忠少無賴善馬射尢好博嘗與悍少年博不勝為所苦恚而自宫遂入內廷與諸監博益窘乏久之始夤緣為才人典膳因魏朝以結王安朝先與客氏私即所稱為對食者及進忠入亦通焉客氏遂薄朝而愛進忠兩人深相結帝嗣位進忠客氏並有寵封客氏奉聖夫人廕其子侯國興弟客光先及進忠兄釗俱錦衣千户先是進忠直東宫有道士歌于市曰委鬼當頭立茄花滿地紅委鬼謂魏茄則析其字為客也及是客魏始用事蓋已有先兆云諭內閣暴選侍李氏罪責御史賈繼春新鄉人選侍移宫雖迫然帝奉養甚備會宫奴劉朝田詔等盜寶選侍移宫時朝等盜內府祕藏過乾清門仆金寶墜地帝怒下法司案治甚急諸閹懼搆蜚語謂選侍投繯皇八妹選侍出入井熒惑朝士繼春信之即上書內閣言新君御極之時不當導以違忤先帝逼逐庶母俾先帝玉體未寒不能保其姬女于是左光斗首上疏述移宫事略言皇上當還乾清則選侍自當移宫其理易曉唯是移宫以後自宜存大體捐小過若使宫闈不安便于國體有損帝乃宣諭內閣備述選侍凌虐聖母及要挾傳封皇后與即日欲垂簾聽政諸狀方從哲封還上諭帝不允復降諭數選侍過惡言選侍前因驅崩聖母自度有罪每使宫人竊伺不令朕與聖母舊侍言有輒捕去朕之苦衷外廷豈能盡悉因責繼春妄生謗議理法安在且言朕今停選侍封號以慰聖母在天之靈厚養選侍及皇八妹以遵皇考之意爾諸臣可以仰體朕心矣未幾噦鸞宫災帝諭內閣言選侍皇八妹無恙而是時給事中周朝端字思永臨清人謂繼春生事繼春與相詆諆乃再揭內閣至稱選侍為未亡人繼春揭有云伶仃之皇八妹入井誰憐孀寡之未亡人雉經莫訴楊漣恐繼春説遂滋亦上疏具陳移宫始末且言選侍自裁皇八妹入井蜚語何自恐釀今日之疑端流為他年之實事臣安敢無言帝優詔褒漣而深惡繼春將加嚴譴劉一燝力為解乃止無何繼春黨忌漣詆漣結王安圖封拜漣不勝憤抗疏引歸而繼春出按江西馳疏自明上書之故帝屢旨切責明年四月繼春遂削籍冬十月葬定陵孝端皇后同葬諡曰顯皇帝廟號神宗明史贊曰神宗沖齡踐阼江陵秉政國勢幾于富強繼乃因循牽制晏處深宫綱紀廢弛君臣否隔于是小人姦權趨利者與名節之士為仇讐門户紛然邪黨滋蔓在廷正類無深識逺慮以折其機牙而不勝憤激交相攻訐以致人主蓄疑賢姦雜用潰敗決裂不可振救論者謂明之亡實亡于神宗豈不諒歟罷熊廷弼以袁應泰字大來鳯翔人經略遼東廷弼有膽略知兵然性剛好嫚罵物情不甚附給事中姚宗文向與廷弼同在言路意氣相得專以排東林攻道學為事後以廷弼不薦己巳怨及出閲邊廷弼以其書生藐之遂積相失宗文持內府體自尊廷弼心易之甫開燕幕吏傳外警廷弼介而馳命屬吏欵宗文宗文色動未幾廷弼還笑曰老掌科無恐此邊關常事耳燕罷宗文偵外實無警意廷弼戲之恨甚主事劉國縉向亦與廷弼同官以京察被謫及是贊畫軍前以故舊意望廷弼廷弼不能如前國怒遂與宗文比而傾廷弼比宗文還疏陳遼土日蹙詆廷弼廢羣䇿而雄獨智復鼓其同類攻擊必欲去之于是御史顧慥山陽人馮三元三河人張修德大原人給事魏應嘉興化人等先後劾廷弼破壞遼疆廷弼憤甚抗疏求罷朝議以應泰代之應泰歷官精敏強毅用兵非所長廷弼在邊持法嚴厲部伍整肅應泰以寬矯之多所更易是時蒙古諸部大飢多入塞乞食應泰下令招降處之遼瀋二城優其食廪與民雜居議者言收降過多恐反不利後應泰卒以此敗方廷弼之去遼也上疏求勘朝廷命給事中朱童蒙往廷弼復上疏言今廟堂議論全不知兵冬春之際冰雪稍緩鬨然言師老財匱馬上促戰及軍敗愀然不敢復言比收拾甫定愀然者復鬨然責戰自有遼難以來用武將用文吏何非臺省所建白何嘗有一效疆場事當聽疆場吏自為之何用拾帖括語徒亂人意哉及童蒙還備陳廷弼供狀末言廷弼功在存遼勞有可紀而遽爾乞歸負君之罪實無所逃時頗以其言為當云朱童蒙萊蕪人以孫如遊為禮部尚書兼東閣大學士預機務帝即位如遊以帝為皇長孫時未就外傅即請開講筵報可至是遂入閣十二月方從哲罷先是光宗崩中外皆恨李可灼而從哲擬遺旨賚可灼銀幣御史王安舜廣州後衛人首劾從哲輕薦狂醫又賞之以自掩其罪從哲因改奪可灼俸一年已而御史鄭宗周文水人復劾崔文升罪請下法司從哲擬旨令司禮察處于是御史馮三元焦源溥字涵一三原人郭如楚晉江人給事中魏應嘉太常卿曹珖字用韋益都人光祿少卿高攀龍主事吕維祺字介孺新安人等相繼言文升可灼罪不容誅而從哲反為徇庇國法安在給事中惠世揚清澗人直糾從哲十罪三可殺言從哲獨相七年妨賢病國罪一驕蹇無禮失誤哭臨罪二梃擊青宫庇護姦黨罪三恣行胸臆破壞絲綸罪四縱子殺人蔑視憲典罪五阻抑言官蔽壅耳目罪六陷城失律寬議撫臣罪七馬上催戰覆沒全師罪八徇私罔上鼎鉉遺羞罪九代營榷稅蠧國殃民罪十貴妃求封后舉朝力爭從哲依違兩可當誅者一選侍乃鄭氏私人從哲受其宫奴所盜美珠欲封為貴妃又聽其久據乾清當誅者二崔文升用泄藥傷損先帝諸臣論之從哲擬脫罪李可灼進劫藥從哲擬賞賚當誅者三從哲力求去疏六上命進中極殿大學士賚銀幣蟒衣允其致仕當神宗之末從哲獨秉國成一無所匡救又用姚宗文閲邊齮經略熊廷弼去遼陽遂失論者謂明之亡神宗實階之而從哲其罪首也御批厯代通鑑輯覽卷一百十二

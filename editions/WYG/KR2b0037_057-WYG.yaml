front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷五十八唐徳宗皇帝甲子興元元年春正月大赦
  hash: sha256:857d3272ad6f6d04eaecaac543179a8694c4b5ebe0e028701fc6688e42c50e64
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_057-1a, image: WYG0337/WYG0337-0289a.png}
body:
  text: 先是陸贄言于上曰昔成湯以罪己勃興楚昭以善言復國楚昭王遭闔閭之難出亡父老送之王曰父老反矣何患無君父老曰有君如是其賢也相與從之請救秦人遂走吴師復國詳見劉向説苑陛下能不吝改過以謝天下使書詔無所避忌則反側之徒革心向化矣上然之故奉天所下書詔雖驕將悍卒聞之無不感激揮涕㑹術者言國家厄運宜有變更羣臣請更加尊號上以問贄贄曰尊號之典本非古制行于安泰之日已累謙沖襲乎喪亂之時尤傷事體必也俯稽術數須有變更與其増美稱而失人心不若黜舊號以祇天戒上納其言但改年號因以中書所撰赦文示贄贄上言動人以言所感已淺言又不切人誰肯懐今兹徳音悔過之意不得不深引咎之辭不得不盡洗刷疵垢宣暢鬱堙使人人各得所欲則何有不從者乎然知過非難改過為難言善非難行善為難假使赦文至精止于知過言善猶願聖慮更思所難上然之至是乃下詔大赦制曰致理興化必在推誠忘己濟人不吝改過小子長于深宫之中暗于經國之務積習易溺居安忘危不知稼穡之艱難不恤征戍之勞苦澤靡下究情未上通事既壅隔人懐疑阻由昧省已遂用興戎逺近騷然衆庶勞止天譴于上而朕不寤人怨于下而朕不知馴致亂階變興都邑萬品失序九廟震驚上累祖宗下負烝庶痛心靦貌罪實在予自今中外書奏不得言聖神文武之號李希烈田悦王武俊李納等咸以勲舊各守藩維朕撫御乖方致其疑懼皆由上失其道下罹其災朕實不君人則何罪宜并所管將吏等一切待之如初朱滔雖縁朱泚連坐路逺必不同謀念其勲舊務在宏貸如能効順亦與維新朱泚反易天常盜竊名器暴犯陵寢所不忍言獲罪祖宗朕不敢赦其脇從將吏百姓等官軍未到以前並從赦例赴奉天及收京城將士並賜名奉天定難功名其所加墊陌錢税間架竹木茶漆𣙜鐵之類悉宜停罷赦下四方人心大悦王武俊田悦李納皆去王號上表謝罪後李抱真入朝為上言山東宣布赦書士卒皆感泣臣見人情如此知賊不足平也李希烈僭號李希烈自恃兵强遂謀稱帝遣人問儀于顔真卿真卿曰老夫嘗為禮官所記惟諸侯朝天子禮耳希烈遂稱大楚皇帝以其黨鄭賁孫廣李緩李元平為宰相遣其將辛景臻謂顔真卿曰不能屈節當自焚積薪灌油于其庭真卿趨赴火景臻遽止之希烈遣其將楊峯齎勅賜陳少遊及夀州刺史張建封建封執峯腰斬以徇具奏少遊附賊之狀上以建封為濠壽廬都團練使希烈欲取壽州建封遣將守霍邱希烈兵不得過希烈又南寇蘄黄及鄂州為曹王臯及鄂州刺史李兼所敗希烈由是不敢復窺江淮已而希烈將兵圍寧陵濮州刺史劉昌拒守凡四十五日不釋甲鎮海節度使韓滉遣其將王栖曜將兵助之以强弩數千游汴水夜入城明日從城上射希烈及其坐幄希烈驚曰宣潤弩手至矣遂解圍去潁廬州隋置今江南廬州府是霍邱隋縣今屬江南州府鎮海軍建中初置治潤州王栖曜濮州人置瓊林大盈庫于行宫上于行宫廡下貯諸道貢獻之物榜曰瓊林大盈庫陸贄諫曰天子與天同徳以四海為家何為撓廢公方崇聚私貨效匹夫之藏以誘姦聚怨乎且頃者六師初降百物無儲殆將五旬死傷相枕畢命同力竟夷大難無猛制而人不攜懐所感也無厚賞而人不怨悉所無也今攻圍已解衣食已豐而謠讟方興軍情稍阻豈不以患難既與之同憂而安樂不與之同利乎誠能近想重圍之殷通作隱憂追戒平居之專欲凡在二庫貨賄盡令出賜有功每獲珍華先給軍賞如此則亂必靖賊必平徐駕六龍旋復都邑是乃散小儲而成大儲損小寶而固大寶也上即命去其榜以蕭復為江淮等道宣慰安撫使復與姜公輔俱于建中四年十月同平章事蕭復嘗言于上曰宦官為監軍恃恩縱橫此屬但應掌宫掖之事不宜委以兵權國政上不悦又嘗言陛下踐阼之初聖徳光被自用楊炎盧杞瀆亂朝政以致今日陛下誠能變更睿志臣敢不竭力儻使臣依阿茍免臣實不能又嘗與杞同奏事杞順上㫖復正色曰盧杞言不正上愕然退謂左右曰蕭復輕朕命復充山南荆湖江淮等道宣慰安撫使實疎之也既而復自江淮還以忤㫖辭位罷為左庶子詔復王武俊田悦李納官爵先是李抱真在臨洺上出奉天抱真退屯臨洺事具前遣賈林説王武俊歸國武俊許之田悦欲與武俊共襲抱真林説武俊曰臨洺兵精而有備未易圖也今戰勝得地則利歸魏博不勝則恒冀大傷且易定滄乃趙故地胡不取之武俊遂辭悦而北㑹武俊先所召回紇兵至幽州朱滔欲與俱取東都林復激武俊曰朱滔西倚其兄北引回紇其志欲盡王河朔大夫當臣事之否則見攻能臣滔乎武俊投袂曰二百年天子猶不能事安能臣豎子邪乃定計通好抱真而與馬燧盟然武俊猶外事滔而陰約田悦共背之使相望至是朱滔使人説田悦欲與共取大梁悦不欲行而未忍絶滔召官屬議之許士則曰朱滔殺懐仙屠希彩怵兄使如京師而奪之權有恩者誅同謀者覆其心腹詎可量哉今不若陽許偕行陰為之備厚加迎勞至則託以他故遣將分兵而隨之則外不失報徳之名而内無倉猝之憂矣㑹武俊亦遣田秀馳説悦秀述武俊語曰天子方在隱憂以徳綏我我曹何得不悔過而歸之且捨九葉天子不事而事泚及滔乎八郎慎勿與俱南但閉城拒守武俊請伺其隙連昭義之兵擊而滅之與八郎再清河朔共事天子不亦善乎悦意遂決因遣秀還具道其謀而報滔曰如約滔喜將步騎五萬人回紇三千人發河間而南入趙境武俊大設犒享入魏境悦供承倍豐滔遣使見悦約與偕行悦曰昨將出軍將士勒兵不聴若舎城邑而去朝出暮必有變然悦不敢貳已令步騎五千從行供芻牧之役矣滔大怒即日遣兵攻拔數縣又縱回紇大掠而去悦閉城自守滔分兵攻貝魏于是詔加田悦右僕射復以武俊為恒冀深趙節度使李納為平盧節度使遣使發吐蕃兵吐蕃尚結贊請出兵助唐收京城遣秘書監崔漢衡博平人使吐蕃發其兵二月李晟還軍東渭橋先是李晟屯軍東渭橋軍勢日振李懐光既脅朝廷逐盧杞等内不自安遂有異志惡晟獨當一面恐其成功奏請與晟合軍詔許之晟與懐光㑹于咸陽西懐光屯咸陽累月逗留不進密與朱泚通謀事迹頗露李晟屢奏恐為所併請移軍東渭橋久乃許之晟遂自咸陽結陳而行歸東渭橋加李懐光太尉賜鐵券上欲親總禁兵幸咸陽趣諸將進討或謂懐光曰此漢祖遊雲夢之策也懐光大懼反謀益甚詔加懐光太尉賜鐵券遣使諭㫖懐光對使者投鐵券于地曰人臣反賜鐵劵懐光不反今賜鐵券是使之反也辭氣甚悖左兵馬使張名振當軍門大呼曰太尉視賊不擊待天使不敬果欲反耶懐光曰我不反欲蓄鋭以俟時耳懐光又發卒城咸陽移軍據之名振曰乃者言不反今不攻長安殺朱泚取富貴而拔軍此來何耶懐光殺之懐光潛與朱泚通謀其養子石演芬遣客詣行在告之事覺懐光召演芬責之曰我以爾為子奈何負我死甘心乎演芬曰天子以太尉為股肱太尉以演芬為心腹太尉既負天子演芬安得不負太尉乎演芬胡人不能異心惟知事一人茍免賊名而死死甘心矣懐光使左右臠食之皆曰義士也可令快死以刀㫁其喉而去石演芬西域胡人李懐光反帝奔梁州上以懐光附賊將幸梁州山南西道節度使嚴震字遐聞梓州鹽亭人聞之馳表奉迎時李建徽陽惠元尚與懐光連營懐光襲殺惠元建徽走免先是陸贄自咸陽還奏言建徽惠元軍附麗懐光必不兩全宜託言李晟兵少恐為賊泚所邀藉此兩軍為掎角仍先諭㫖二人即日進路上不從遂及變懐光與韓遊瓌書約使為變遊瓌奏之懐光復遣其將趙昇鸞入奉天約為内應昇鸞詣渾瑊自言瑊遽以上聞且請決幸梁州上遂出城命戴休顔夏州人守奉天休顔徇于軍中曰懐光已反遂乘城拒守懐光遣其將孟保惠靜夀孫福達將精騎趣南山邀車駕至盩厔相謂曰彼使我為不臣我以追不及報之不過不使我將耳遂帥衆而東縱之剽掠由是百官行者俱得入駱谷注見前以追不及還報懐光皆黜之初涇卒之亂兵部侍郎劉迺以病卧家朱泚召之不起使蔣鎮説之再往不從鎮乃歎曰鎮不能捨生以至于此豈可復以已之腥臊汚漫賢者乎欷歔而反迺聞上幸山南自投于床不食而卒喬琳從至盩厔稱病為僧泚召為吏部尚書于是朝士之竄匿者多出仕泚矣加神策行營節度使李晟同平章事李晟得除官制拜哭受命謂將佐曰長安宗廟所在天下根本若諸將皆從行誰當滅賊者乃治城隍東渭橋營塹繕甲兵為復京城之計是時懐光朱泚連兵聲勢甚盛晟以孤軍處其間内無資糧外無救援徒以忠義激發將士故其衆雖單弱而鋭氣不衰又以書遺懐光辭禮卑遜而諭以禍福勸之立功補過故懐光慙恧未忍擊之晟以判官張彧假京兆尹擇四十餘人假之官以督渭北諸縣芻粟不旬日皆充羨乃流涕誓衆決志平賊三月魏博兵馬使田緒殺其節度使田悦權知軍府田悦用兵數敗士卒死者什六七其下厭苦之上以給事中孔巢父字弱翁孔子三十七世孫為魏博宣慰使巢父性辨博至魏州對其衆為陳逆順禍福悦及將士皆喜兵馬使田緒承嗣之子也凶險多過失悦杖而拘之悦以歸國撤警備緒遂與左右殺悦及其將佐扈㟧許士則蔡濟等登城大呼謂衆曰緒先相公之子諸君受先相公恩若能立緒兵馬使賞緡錢二千大將半之士卒百緡竭公私之貨五日取辦于是將士皆歸緒軍府乃定因請命于巢父巢父命緒權知軍府朱滔聞悦死遣將馬實攻魏州别遣人説緒許以本道節度使李抱真王武俊又遣使詣緒緒召將佐議之幕僚曽穆盧南史曰用兵雖尚威武亦本仁義然後有功幽陵之兵恣行殺掠今雖盛强其亡可立而待也奈何以目前之急欲從人為反逆乎不若歸命朝廷天子方䝉塵于外聞魏博使至必喜官爵旋踵而至矣緒從之遣使奉表詣行在上以緒為節度使李懐光奔河中懐光以李晟軍浸盛惡之欲引軍襲之三令其衆衆不應皆竊言曰若擊朱泚惟力是視若欲反我曹有死不能從也懐光知之問計于賔佐李景畧良鄉人曰取長安殺朱泚散軍還諸道單騎詣行在如此臣節亦未虧功名猶可保也頓首懇請至于流涕懐光許之既而閻晏等勸懐光東保河中徐圖去就懐光乃説其衆曰今且往河中俟春裝既辦還攻長安未晚也東方諸縣皆富實聴爾俘掠衆遂許之懐光乃謂景畧曰鄉者之議衆軍不從子宜速去遣數騎送之景畧出軍門慟哭曰不意此軍一旦陷于不義遂遁歸始懐光方彊朱泚與書以兄事之約分帝闗中及懐光已反其下多叛泚乃賜以詔書且徵其兵懐光慙怒内憂麾下為變外恐李晟襲之遂燒營東走掠涇陽等十二縣雞犬無遺至河中或勸守將吕鳴岳焚橋拒之鳴岳以兵少恐不能支遂納之上之發奉天也韓遊瓌帥其麾下八百餘人還邠州已而懐光遣使詣邠州令留後張昕悉發所留兵萬餘人及行營將士家屬㑹涇陽遊瓌説昕曰李太尉功高自棄已蹈禍機中丞今日可以自求富貴昕曰昕微賤賴太尉得至此不負也遊瓌乃謝病不出陰與諸將相結舉兵殺昕會崔漢衡以吐蕃病至矯詔以遊瓌知軍府事于是遊瓌屯邠寧戴休顔屯奉天駱元光屯昭應尚可孤屯藍田皆受李晟節度晟軍聲大振車駕至梁州山南地薄民貧盜賊之餘户口減半大駕駐蹕糧用頗窘上欲西幸成都嚴震曰山南地接京畿李晟方圖收復藉六軍以為聲援若幸西川則晟未有收復之期也衆議未決㑹晟表至言陛下駐蹕漢中所以繫億兆之心成滅賊之勢若規小舎大遷都岷峨謂岷山峨眉山也岷山注見前峨眉山今在四川嘉定府峨眉縣西南有大峨中峨小峨三山則士庶失望雖有猛將謀臣無所施矣上乃止嚴震百方以聚財賦民不至困窮而供億無乏上之在道也民有獻𤓰果者上欲以散試官授之陸贄奏曰爵位恒宜慎惜不可輕用獻𤓰果者賜之錢帛可也上曰試官虚名無損于事贄曰當今所病方在爵輕設法貴之猶恐不重若又自棄將何勸人夫誘人之方惟名與利名近虚而于教為重利近實而于徳為輕專實利而不濟之以虚則物力不給專虚名而不副之以實則人情不趨故國家命秩之制有職事有散官有勲官有爵號然掌務而受俸者惟係職事之一官此所謂施實利而寓虚名者也其勲散爵號三者止于服色資蔭而已此所謂假虚名以佐實利者也今之員外試官雖則授無費禄然而突銛鋒排患難竭筋力展勤效者皆以是酬之若獻𤓰果者亦以授之則彼必相謂曰吾以忘軀命而獲官此以進𤓰果而獲官是乃國家以吾之軀命同于𤓰果也視人如草木誰復為用哉今陛下既未有實利以敦勸又不重虚名而濫施則後之立功者將曷用為賞哉上居艱難中雖有宰相小大之事必與贄謀之故當時謂之内相上行止必與之俱梁洋道險嘗與贄相失上驚憂涕泣募得贄者賞千金久之乃至上喜甚太子以下皆賀然贄數直諫忤上意盧把貶上心庇之贄極言杞姦邪致亂上雖貌從心頗不悦故恩遇雖隆未得為相鳳翔節度使李楚琳遣使詣行在初奉天圍既解李楚琳遣使入貢上不得已除鳳翔節度使而心惡之楚琳殺張鎰事具前使者數輩至上皆不引見欲以渾瑊代之陸贄奏曰楚琳之罪固大但以乘輿朱復大憝猶存勤王之師悉在畿内僅通王命惟在褒斜儻或楚琳發憾猖狂則我咽喉梗而心膂分矣今幸兩端顧望正宜厚加撫循得其持疑便足集事必欲精求素行追抉宿疵則是改過不足以補愆自新不足以贖罪凡今將吏豈盡無疵又况阻命脇從之流安敢歸化哉上乃善待楚琳使者優詔存慰之上又問贄近有卑官自山北來者論説賊勢語多張皇察其事情頗似窺覘若不追尋恐成姦計贄上奏曰以一人之聼覽而欲窮宇宙之變熊以一人之防慮而欲勝億兆之姦欺役智彌精失道彌逺項籍納秦降卒二十萬慮其懐詐而盡阬之其於防虞亦已甚矣漢高豁達大度天下之士至者納用不疑其於備慮可謂疎矣然而項氏以滅劉氏以昌蓄疑之與推誠其效固不同也陛下智出庶物有輕待人臣之心思周萬幾有獨御區㝢之意謀吞衆畧有過慎之防明照羣情有先事之察嚴束百辟有任刑致理之規威制四方有以力勝殘之志由是才能者怨于不任忠藎者憂于見疑著勲業者懼于不容懐反側者迫于及討馴致離叛搆成禍災願陛下以覆轍為戒天下幸甚夏四月加李晟諸道副元帥晟家百口及神策軍士家屬皆在長安朱泚善遇之軍中有言及家者晟泣曰天子何在敢言家乎泚使晟親近以家書遺晟曰公家無恙晟怒曰爾敢為賊為間立斬之軍士未授春衣盛夏猶衣裘褐終無叛志渾瑊以吐蕃兵拔武功注見前渾瑊帥諸軍出斜谷崔漢衡勸吐蕃出兵助之尚結贊曰邠軍不出將襲我後韓遊瓌聞之遣其將曹子達將兵往㑹吐蕃遣兵二萬從之李楚琳遣將從瑊拔武功泚遣其將韓旻等攻之子達以吐蕃拒擊斬首萬餘級旻僅以身免瑊遂引兵屯奉天與李晟東西相應以逼長安姜公輔罷為左庶子上長女唐安公主薨上欲為造塔厚葬之姜公輔表諫以為山南非久安之地且宜儉薄以副軍須之急上謂陸贄曰造塔小費非宰相所宜論公輔正欲指朕過失自求名耳贄上奏以為公輔任居宰相遇事論諫不當罪之畧曰凡論事者當問理之是非豈計事之大小故唐虞之際主聖臣賢而慮事之微日至萬數然則微之不可不重也如此陛下又安可忽而勿念乎若謂諫爭為指過則剖心之主不宜見罪于哲王以諌爭為取名則匪躬之臣不應垂訓于聖典假有意將指過諫以取名但能聞善而遷見諫不逆則所指者適足以彰陛下莫大之善所取者適足以資陛下無疆之休因而利焉所獲多矣倘或怒其指過而不改則陛下招惡直之譏黜其取名而不容則陛下被違諫之謗是乃掩己過而過彌著損彼名而名益彰果而行之所失大矣上意猶怒罷公輔為左庶子涇原牙將田希鑒殺其節度使馮河清朱泚姚令言數遣人誘河清河清皆斬其使者牙將田希鑒密與泚通殺河清而附于泚泚授希鑒為節度使以賈耽字敦詩滄州南皮人為工部尚書先是耽為山南東道節度使使行軍司馬樊澤字安時河中人奏事行在澤既復命方大宴有急牒至以澤代耽耽内牒懐中顔色不變宴罷召澤告之且命將吏謁澤牙將張獻甫怒曰行軍自圖節鉞事人不忠請殺之耽曰天子所命則為節度使矣即日離鎮以獻甫自隨軍府遂安李抱真㑹王武俊于南宫注見前朱滔攻貝州百餘日其將馬實攻魏州亦踰四旬皆不能下賈林復為李抱真説王武俊使合兵攻滔林曰朱滔志吞貝魏復值田悦被害倘旬日不救則魏博皆為滔有矣魏博既下則張孝忠必為之臣滔連三道之兵益以回紇進臨常山明公欲保其宗族得乎常山不守則昭義退保西山河朔盡入于滔矣不若乘貝魏未下與昭義合兵救之滔既破亡則朱泚不日梟夷鑾輿反正諸將之功孰居明公之右者哉武俊悦從之軍于南宫東南抱真自臨洺引兵㑹之兩軍尚相疑抱真以數騎詣武俊營命行軍司馬盧元卿勒兵以俟曰今日之舉繫天下安危若其不還領軍事以聴朝命亦惟子勵將士以雪讐恥亦惟子言終遂行見武俊敘國家禍難天子播遷持武俊哭流涕縱橫武俊亦悲不自勝左右莫能仰視遂與武俊約為兄弟誓同滅賊抱真退入武俊帳中酣寢久之武俊感激待之益恭指心仰天曰此身已許十兄死矣遂連營而進五月韓滉遣使貢獻韓滉欲遣使獻綾羅四十儋于行在幕僚何士幹請行滉喜曰君能相為行請今日過江士幹許諾歸别家則薪米儲偫已羅門庭矣登舟則資裝器用已滿舟中矣每儋夫與白金一版使置腰間又運米百艘以餉李晟自負囊米置舟中將佐爭舉之須臾而畢艘置五百弩手有寇則叩舷相警五百弩已彀矣比達渭橋盜不敢近時闗中斗米五百及滉米至減五之四先是租庸鹽鐵使包佶遣判官王紹進奉江淮繒帛比入闗上已西幸紹由間道走洋州見上行在時山南地熱上以軍士未有春服亦自御袷衣及紹至上命先給將士然後御衫未幾韓滉使亦至純包佶字㓜正潤州延陵人王紹本名字徳素萬年人後避憲宗諱改名吐蕃引兵歸國朱泚使田希鑒以金帛賂吐蕃吐蕃受之遂引兵去上以李晟渾瑊兵少欲倚吐蕃以復京城聞其去甚憂之以問陸贄贄上奏曰吐蕃遷延觀望翻覆多端致令羣帥進退憂虞欲捨之獨前則慮其懐怨乘躡欲待之合勢則苦其失信稽延戎若未歸寇終不滅將帥意陛下不見信任且患蕃戎之奪其功士卒恐陛下不䘏舊勞而畏蕃戎之專其利賊黨懼蕃戎之勝不死則悉為之擒百姓畏蕃戎之來有財必盡為所掠今懐光别保蒲絳吐蕃逺避封疆形勢既分腹背無患瑊晟諸帥才力得伸但願陛下慎于撫接勤于砥礪中興大業旬月可期不宜尚眷眷于犬羊之羣以失將士之情也上曰卿言甚善然瑊晟諸軍當議規畫令其進取卿宜審細條疏以聞贄對曰賢君選將委任責成故能有功况今秦梁千里兵勢無常遙為規畫未必合宜彼違命則失君威從命則害軍事進退羈礙難以成功不若假以便宜之權待以殊常之賞則將帥感悦智勇得伸矣夫鋒鏑交于原野而決策于九重之中機㑹變于斯須而定計于千里之外是以用捨相礙否臧皆凶上有掣肘之譏而下無死綏之志矣且君上之權特異臣下惟不自用乃能用人惟陛下圖之李抱真王武俊大破朱滔于貝州李抱真王武俊距貝州三十里而軍滔聞兩軍將至急召馬實或謂滔曰武俊善野戰不可當其鋒宜徙營稍前逼之待其饑疲然後可制也㑹實軍至滔命明日出戰實請休息數日回紇達干見滔曰回紇受大王金帛牛酒無算思為大王立效久矣明日願大王駐馬高邱觀回紇為大王翦武俊之騎使匹馬不返滔遂決意出戰武俊遣其兵馬使趙琳將五百騎伏于桑林胡三省注在經城西南縣經城廢縣在今廣平府威抱真列方陳于後武俊引騎兵居前與回紇戰趙琳自林中出橫擊之回紇及滔軍皆敗走抱真武俊合兵追之滔與數千人走還夜焚營遁歸兩軍以霧不能追也滔歸恐范陽留守劉怦因敗圖已怦悉發守兵具儀仗迎之以程日華本名華定州安喜人為滄州節度使初張孝忠以易州歸國詔以孝忠為義武節度使以易定滄三州𨽻之孝忠版其將程華攝滄州刺史華素寛厚將士安之朱滔王武俊更遣人招華華皆不從時孝忠在定州自滄如定必涉滔境參軍李宇説華表請别為一軍華從之上即以華知節度事賜名日華令嵗供義武租錢十二萬緡六月李晟等收復京城朱泚亡走其將韓旻斬之以降李晟大陳兵諭以收復京城引所獲諜人以所陳兵示之飲之酒給錢而縱之謂曰歸語諸賊努力固守勿不忠于賊也召諸將問兵所從入皆請先取外城據坊市然後北攻宫闕晟曰坊市狹隘賊若伏兵格鬭居人驚亂非官軍之利也今賊重兵皆聚苑中不若自苑北攻之潰其腹心賊必奔亡如此則宫闕不殘坊市無擾策之上者也諸將皆曰善乃牒渾瑊駱元光尚可孤刻期集城下尚可孤敗泚將仇敬忠于藍田西斬之晟移軍光泰門外方築壘泚兵大至晟縱兵擊之賊敗走明日晟復出兵諸將請待西師至夾攻之晟曰賊數敗已破膽不乘勝取之使其成備非計也賊出戰屢敗晟使兵馬使李演王佖晟之甥將騎兵史萬頃將步兵直抵苑牆晟先開牆二百餘步賊柵㫁之晟怒欲斬萬頃等萬頃帥衆抜柵而入佖演繼之賊衆大潰諸軍分道並入且戰且前凡十餘合賊不能支皆潰張光晟勸泚出亡泚乃與姚令言帥餘衆西走光晟降晟遣兵馬使田子竒以騎兵追泚令諸軍曰晟賴將士之功克清宫禁長安士庶久陷賊庭若小有震驚非弔民伐罪之意晟與公等家室相見非晚五日内無得通家信大將高明曜取賊妓尚可孤軍士取賊馬晟皆斬之軍中股栗公私安堵秋毫無犯是日渾瑊戴休顔韓遊瓌亦克咸陽晟斬泚黨李希倩希烈之弟等于市表守節不屈者劉迺蔣沇等遣掌書記于公異吴人作露布上行在曰臣已肅清宫禁祇謁寢園鐘簴不移廟貌如故上覽之泣下曰天生李晟以為社稷非為朕也晟之在渭橋也熒惑守嵗久之乃退賔佐皆賀晟曰天子野次臣下知死敵而已天象高逺誰得知之既克長安乃謂之曰曏非相拒也吾聞五星贏縮無常萬一復來守嵗吾軍不戰自潰矣皆謝曰非所及也朱泚將奔吐蕃其衆隨道散亡比至涇州纔百餘騎田希鑒閉城拒之泚謂之曰汝之節吾所授也奈何臨危相負使焚其門希鑒取節投火中曰還汝節泚衆皆哭涇卒遂殺姚令言詣希鑒降泚獨與范陽親兵北走寧州泚將梁庭芬射泚墜坑中韓旻等斬之詣涇州降傳首行在詔以希鑒為涇原節度使上命陸贄草詔賜渾瑊使訪求奉天所失内人贄上奏曰今巨盜始平疲瘵之民瘡痍之卒尚未循拊而首訪婦人非所以副維新之望也上遂不降詔而遣中使求之以李晟為司徒中書令渾瑊為侍中駱元光等遷官有差上發梁州詔以梁州為興元府上問陸贄今至鳳翔諸軍甚盛因此遣人代李楚琳何如贄上奏曰如此則事同脇執以言乎除亂則不武以言乎務理則不誠用是時巡後將安入議者或謂之權臣竊未喻其理夫權之為義取類權衡今輦路所經首行脇奪易一帥而虧萬乘之義得一方而結四海之疑乃是重其所輕而輕其所重謂之權也不亦反乎天以反道為權以任數為智此古今所以多喪亂而長姦邪也不如俟奠枕京邑徵授一官彼將奔走不暇安敢復勞誅鉏哉秋七月至鳳翔喬琳蔣鎮張光晟等伏誅遣給事中孔巢父宣慰河中李懐光殺之副元帥判官高郢勸李懐光歸款懐光遣其子璀詣行在謝罪請束身歸朝詔孔巢父宣慰并其將士悉復官爵巢父至河中懐光素服待罪巢父不之止懐光左右多胡人皆歎曰太尉無官矣巢父又宣言于衆曰軍中誰可代太尉領軍事者于是懐光左右發怒殺巢父懐光不之止復治兵拒守車駕還長安渾瑊韓遊瓌戴休顔以其衆扈從李晟駱元光尚可孤以其衆奉迎步騎十餘萬旌旗數十里晟謁見上于三橋在長安縣西先賀平賊後謝收復之晚伏路左請罪上駐馬慰撫為之掩涕令左右扶上馬至宫每閒日閒讀曰閑胡三省注唐世天子以隻日視朝雙日謂之閑日輒宴勲臣李晟為之首渾瑊次之諸將相又次之徵李泌為左散騎常侍李泌為杭州刺史徵詣行在日直西省朝野皆屬目上以河中為憂泌曰天下事甚有可憂者若惟河中不足憂也陛下已還宫闕懐光不束身歸罪乃虐殺使臣鼠伏河中不日必為帳下所梟矣初上發吐蕃以討朱泚許以安西北庭之地與之及泚誅吐蕃來求地上欲與之泌曰安西北庭人性驍悍控制西域五十七國及十姓突厥又分吐蕃之勢使不得併兵奈何拱手與之且口者吐蕃觀望不進陰持兩端大掠而去何功之有衆議亦以為然上遂不與之八月顔真卿為李希烈所殺李希烈聞希倩伏誅忿怒遣中使至蔡州殺顔真卿中使曰有勅真卿再拜中使曰今賜卿死真卿曰老臣無狀罪當死不知使者幾日發長安使者曰自大梁來真卿曰然則賊耳何謂勅邪遂縊殺之事聞詔贈司徒諡文忠以李晟為鳳翔隴右節度等使進爵西平王李晟以涇州倚邊屢害軍帥奏請往理不用命者力田積粟以攘吐蕃遂以晟兼鳳翔隴右節度等使時李楚琳入朝晟請與俱至鳳翔斬之以懲逆亂上以新復京師務安反仄不許以楚琳為左金吾大將軍晟至鳳翔討殺張鎰之罪斬裨將王斌等十餘人尋詣涇州誅田希鑒晟託言巡邊至涇州希鑒出迎晟與之並轡而入道舊結歡希鑒妻李氏以叔父事晟晟謂之田郎希鑒不復疑晟伏甲而宴之引見諸將問姓名得前為亂者三十餘人數其罪而斬之顧謂希鑒曰田郎亦不得無過引出縊殺之入其營諭以誅希鑒之意衆股栗無敢動者遣渾瑊等討李懐光軍于同州上命渾瑊駱元光討懐光懐光遣其將徐庭光軍長春宫在同州府朝邑縣西北寰宇記後周武帝置以拒之瑊等數戰不利時度支用度不給議者多請赦懐光上不許已而度支以懐光所部將士同反不給冬衣上曰朔方軍累代忠義今為懐光所制耳將士何罪其别貯以俟道路稍通即時給之馬燧討李懐光取晉慈隰州慈州唐置今山西吉州是餘注見前以渾瑊為河中節度使康日知為晉慈隰節度使懐光遣將守晉慈隰三州馬燧遣人説下之詔以渾瑊鎮河中三州𨽻燧燧初以王武俊急攻康日知於趙州奏請詔武俊與李抱真同撃朱滔而以深趙與之改日知為晉慈隰節度使上從之日知未至而三州降燧上使燧兼領之燧表讓日知且言因降而授恐後有功者踵以為常上嘉而許之燧遣使迎日知既至籍府庫而歸之已而燧復取絳州冬十月以竇文場王希遷皆宦者為監神策軍兵馬使初魚朝恩既誅代宗不復使宦者典兵上即位悉以禁兵委白志貞志貞得罪上復以竇文場代之及還長安頗忌宿將握兵多者稍稍罷之以文場希遷分典禁旅十一月李澄以鄭滑降李希烈奔蔡州劉洽遂克汴州李希烈遣其將翟崇暉圍陳州久之不克李澄知大梁兵少不能制滑州遂焚希烈所授旌節誓衆歸國劉洽遣都虞候劉昌與隴右行營節度使曲環等將兵救陳州擒崇暉進攻汴州希烈懼奔蔡州澄引兵趣汴州希烈鄭州守將詣澄降汴州守將田懐珍開門納洽軍李勉累表請自貶詔罷都統平章事如故至長安素服待罪議者多以勉失守不應尚為相李泌言于上曰李勉公忠雅正而用兵非其所長然劉洽出勉麾下勉悉衆以授之卒平大梁亦勉之功也上乃命勉復位十二月加韓滉同平章事議者或言滉聚兵修城陰蓄異志上疑之以問李泌對曰滉公忠清儉貢獻不絶鎮撫江東盜賊不起所以修城為迎扈之備耳此乃人臣忠篤之慮奈何更以為罪乎滉性剛嚴不附權貴故多謗毁臣敢保其無他上曰外議洶洶卿弗聞乎對曰臣固聞之其子臯字仲文為郎不敢歸省正以謗語沸騰故也退遂上章請以百口保滉他日又言于上曰臣之上章非私于滉乃為朝廷計也今天下旱蝗闗中斗米千錢倉廩耗竭而江東豐稔願陛下早下臣章以解朝衆之惑面諭韓臯使之歸覲令滉速運糧儲此朝廷之大計也上即下泌章令臯歸覲面諭之曰卿父比有謗言朕不復信闗中乏糧宜速致之臯至滉感悦即日發米百萬斛聴臯留五日即還朝自送至江上冒風濤而遣之陳少遊聞之即貢米二十萬斛㑹少遊死劉洽得李希烈起居注云某月日陳少遊上表歸順少遊聞之慙懼發疾死大將王韶欲自為留後韓滉遣使謂之曰汝敢為亂吾即日全軍渡江誅汝矣韶懼而止上聞之喜謂李泌曰滉不惟安江東又能安淮南真大臣之器卿可謂知人遂加滉平章事江淮轉運使滉入貢無虚月朝廷賴之使者勞問相繼恩遇始深矣是嵅蝗大饑乙丑貞元元年春正月以盧杞為澧州别駕盧杞遇赦移吉州唐置今江西吉安府是長史謂人曰吾必再入未幾上果欲用為饒州注見前刺史給事中袁高字公頤恕已孫應草制執以白盧翰義禧七世孫劉從一林甫元孫二人皆同平章事曰盧杞作相致乘輿播遷海内瘡痍奈何遽遷大郡願相公執奏翰等不從更命他舎人草制制出高執之不下且奏杞極惡窮凶何可復用上不聴補闕陳京趙需等上疏曰杞三年擅權百揆失敘天地所知華夷同棄倘加巨姦之寵必失百姓之心袁高復于正牙唐謂大明宫含元殿為正牙亦謂之南牙論奏上曰杞已再更赦高曰赦者止原其罪不可為刺史陳京等亦爭之曰杞之執政百官常如兵在其頸今復用之則姦黨皆唾手而起上大怒諫者稍引却京顧曰需等勿退此國大事當以死爭之上怒稍解謂宰相與杞小州李勉曰陛下欲用之雖大州亦可其如天下失望何乃以杞為澧州别駕上謂李泌曰朕已可袁高所奏泌曰累日外人竊議比陛下于桓靈今承徳音乃堯舜之不逮也上悦杞竟死于澧州三月馬燧敗李懐光兵于陶城在蒲州府永濟縣北寰宇記舜陶河濵即此夏四月燧及渾瑊又破懐光兵于長春宫注見前馬燧軍寶鼎本漢汾陰縣唐更名宋改曰榮河今屬蒲州府敗懐光兵于陶城斬首萬餘級分兵㑹渾瑊逼河中破懐光兵于長春宫南遂圍宫城懐光諸將相繼來降韓遊瓌請兵于渾瑊共取朝邑注見前懐光將閻晏欲爭之士卒指邠軍曰彼非吾父兄則吾子弟奈何以白刃相向乎語甚囂晏遽引兵去懐光知衆心不從乃詐稱欲歸國聚貨財飾車馬云俟路通入貢由是得復踰旬月時連年旱蝗資糧匱竭言事者多請赦懐光李晟上言赦懐光有五不可河中距長安纔三百里同州當其衝多兵則未為示信少兵則不足隄防忽驚東偏何以制之一也今赦懐光必以晉絳慈隰還之渾瑊既無所詣康日知又應遷移土宇不安何以奬勵二也陛下連兵一年計除小醜兵力未窮遽赦其罪今西有吐蕃北有回紇南有淮西觀我强弱必起窺覦三也懐光既赦則朔方將士皆應敘勲行賞今府庫方虚賞不滿望是愈激之使叛四也既解河中罷諸道兵賞典不舉怨言必起五也今河中斗米五百芻藁且盡陛下但勅諸道圍守旬時彼必有内潰之變何必養腹心之疾為他日之悔哉㑹馬燧入朝奏曰懐光凶逆尤甚赦之無以令天下願更得一月糧必為陛下平之上許之以曹王臯為荆南節度使淮西將李思登以隨州降之六月以韋臯為西川節度使朱滔死以劉怦為幽州節度使滔為王武俊所攻殆不能軍上表待罪遂病死將士奉劉怦知軍事詔以怦為幽州盧龍節度使是秋怦卒以其子濟知節度事秋七月陜虢軍亂殺其節度使張勸詔以李泌為都防禦轉運使陜虢兵馬使達奚抱暉鴆殺節度使張勸代總軍務邀求旌節且陰召李懐光將達奚小俊為援上謂李泌曰若蒲陜連衡則猝不可制而水陸之運皆絶矣不得不煩卿一往乃以泌為都防禦水陸運使欲以神策軍送之泌曰陜城三面懸絶攻之未可以嵗月下也臣請以單騎入之且今河東全軍屯安邑馬燧入朝願勅燧與臣同辭偕行使陜人知之亦一勢也上曰雖然朕方大用卿寧失陜州不可失卿當更使他人往耳對曰他人猶豫遷延必不能入上乃許之泌見陜州將吏在長安者語之曰主上以陜虢饑故不授泌節而領運使欲令督江淮米以賑之今當使抱暉將行營有功則賜旌節矣抱暉聞之稍自安泌與馬燧疾驅而前將佐不俟抱暉之命來迎泌笑曰吾事濟矣去城十五里抱暉亦出謁泌慰撫之抱暉喜泌視事賔佐有請屏人白事者泌曰易帥之際軍中煩言乃其常理泌到自妥貼矣不願聞也由是反仄者皆自安泌但索簿書治糧儲明日召抱暉語之曰吾非愛汝而不誅恐自今有危疑之地朝廷所命將帥皆不能入故匄汝餘生汝為我齎版幣祭前使慎無入闗自擇安處潛來取家保無他也抱暉遂亡命不知所之達奚小俊聞泌已入陜而還大旱灞滻將竭長安井皆無水度支奏中外經費纔支七旬詔浮費冗食皆罷之八月馬燧平河中李懐光縊死馬燧與諸將謀曰長春宫不下則懐光不可得然其守備甚嚴攻之曠日持久我當身往諭之遂徑造城下呼其守將徐庭光庭光帥將士羅拜城上燧知其心屈徐謂之曰我自朝廷來可西向受命庭光等復西向拜燧曰汝曹徇國立功四十餘年何忽為滅族之計從吾言非止免禍富貴可圖也衆不對燧披襟曰汝不信吾言何不射我將士皆伏泣燧曰此皆懐光所為汝曹無罪第堅守勿出皆曰諾燧等遂進逼河中懐光舉火諸營不應駱元光在長春宫下使人招庭光庭光罵辱之元光使白燧燧還乃開門降燧以數騎入城慰撫之其衆大呼曰吾輩復為王人矣渾瑊謂僚佐曰始吾謂馬公用兵不吾逮也今乃知吾不逮多矣燧帥諸軍至河西唐縣屬河中府後廢河中軍士皆相驚曰西城擐甲矣又曰東城娖音捉整也隊矣唐河中府夾河為兩城西城即河西縣東城即河東縣河中府所治須臾軍士皆易其號為太平字懐光不知所為乃縊而死朔方將牛名俊㫁懐光首出降燧斬閻晏等七人餘皆不問先是懐光都虞候吕鳴岳密通款于馬燧事泄懐光殺之事連幕僚高郢李鄘懐光責之郢鄘抗言逆順無所慙隱懐光囚之至是燧皆出之于獄奏置幕下李鄘字建侯邕之孫燧自辭行至是凡二十七日駱元光以徐庭光辱已殺之入見馬燧頓首請罪燧大怒曰庭光已降公輒殺之是無統帥也欲斬之韓遊瓌曰元光殺裨將公猶如此公殺節度使天子其謂何燧乃捨之渾瑊盡得李懐光之衆朔方軍自是分居邠蒲矣初懐光之解奉天圍也上以其子璀為監察御史及懐光屯咸陽不進璀宻言于上曰臣父必負陛下願早為之備臣聞君父一也但今日陛下未能誅臣父而臣父足以危陛下故不忍不言上驚曰卿大臣愛子當為朕委曲彌縫之對曰臣父非不愛臣臣非不愛其父與宗族也顧臣力竭不能迴耳上曰然則卿以何策自免對曰臣父敗則臣與之俱死復有何策哉使臣賣父求生陛下亦安用之及李泌赴陜上謂之曰朕所以欲全懐光誠惜璀也卿至陜試為朕招之對曰陛下未幸梁洋懐光猶可降也今雖請降臣不敢受况招之乎璀固賢者必與父俱死矣若其不死則亦無足貴也及懐光死璀亦自殺上以懐光嘗有功宥其一男歸其尸使收葬加馬燧兼侍中罷討淮西兵上問陸贄今復有何事宜區處者贄以河中既平慮希㫖生事之人請乘勝討河西則四方負罪者自疑河朔青齊固當響應建中之憂行將復起乃上奏言之畧曰陛下悔過降號聞者涕流故諸將效死叛夫請罪逆泚懐光相繼梟殄曩以百萬之師而力殫今以咫尺之詔而化洽則是聖王之敷理道服暴人任徳而不任兵明矣羣帥之悖臣禮拒天誅圖沽而不圖王又明矣葢好生以及物者乃自生之方施安以及物者乃自安之術若擠彼于死地而求此之久生措彼于危地而求此之久安從古及今未之有也今叛帥革面復修臣禮然其深言密議固亦未盡坦然必當聚心而謀傾耳而聽觀陛下所行之事考陛下所誓之言若言與事符則遷善之心漸固倘事與言背則慮禍之態復興所宜布恤人之惠以濟威乘滅賊之威以行惠臣所未敢保者惟希烈耳想其私心非不追悔但以猖狂失計已竊大名雖荷陛下全宥之恩然不能不自靦于天地之間耳縱未順命斯為獨夫内則無辭以起兵外則無類以求助陛下但勅諸郡各守封疆彼既氣奪算窮是乃狴牢之類不有人禍則當鬼誅古所謂不戰而屈人之兵者斯之謂歟上從贄言詔諸道與淮西連接者非彼侵軼不須進討李希烈若降當待以不死自餘一無所問以張延賞為左僕射初李晟戍成都取其營妓以還西川節度使張延賞怒追而返之晟遂與延賞有隙至是上召延賞入相晟表陳其過惡上重違其意以延賞為左僕射丙寅二年春正月以劉滋字公茂知幾孫崔造字元宰安平人齊映同平章事造少與韓㑹盧車美張正則為友以王佐自許時人謂之四夔上以造敢言故不次用之滋映多讓事于造造久在江外疾錢穀諸使罔上之弊奏罷水陸度支轉運等使諸道租賦悉委觀察使刺史遣官送京師令宰相分判六曹映判兵部李勉判刑部滋判吏禮部造判户工部造與户部侍郎元琇善使判諸道鹽鐵𣙜酒韓滉奏論其過失罷之諸使之職行之已久中外安之造既改法事多不集及元琇失職造憂懼成疾不視事既而江淮運米大至上嘉韓滉功以滉兼度支轉運等使造所條奏皆改之造亦尋罷二月李泌開運道成泌自集津倉名在三門東至三門鑿山開運道十八里以避底柱之險是月道成闗中倉廩竭禁軍或自脱巾呼于道曰拘吾于軍而不給糧吾罪人也上憂之甚㑹韓滉運米三萬斛至陜李泌即奏之上喜謂太子曰吾父子得生矣時禁中不釀命于坊市取酒為樂又遣中使諭神策六軍軍士皆呼萬嵗時比嵗饑饉兵民率皆黒瘦及麥熟市有醉者人以為瑞然人乍飽食死者甚衆數月人膚色乃復故夏四月淮西將陳僊竒殺李希烈以降以僊竒為節度使希烈别將寇襄鄭州樊澤李澄撃破之希烈兵勢日蹙㑹有疾僊竒使醫毒殺之因屠其家舉衆來降詔以為淮西節度使秋七月陳僊竒為其將吴少誠所殺以少誠為留後少誠素狡險為李希烈所寵任故為之報仇以曲環為陳許節度使陳許荒亂之餘户口流散環以勤儉率下政令寛簡賦役平均數年間流亡復業兵食皆足八月吐蕃入寇使渾瑊駱元光屯咸陽九月置十六衛注見前上將軍初上與李泌議復府兵泌言府兵平日皆安居田畝毎府有折衝領之農隙教戰有事徵發則以符契下州府參驗發之至所期處將帥按閲有不精者罪其折衝甚者罪及刺史軍還則賜勲加賞行者近不踰時逺不經嵗高宗以劉仁軌為洮河鎮守使以圖吐蕃于是始有久戍之役又牛僊客以積財得宰相邊將效之誘戍卒使以所齎繒帛寄于府庫而苦役之利其死而沒入其財故戍卒還者什無二三然未嘗有内叛外侮者誠以顧戀田園恐累宗族故也自開元之末張説始募長征兵兵不土著不自重惜忘身徇利禍亂遂生曏使府兵之法不廢安有如此下陵上替之患哉上以為然因有是命然卒亦不能復也以賈耽為義成貞元元年置義成軍治滑州節度使義成節度使李澄卒其子克寧秘不發喪殺行軍司馬墨縗視事増兵城門劉元佐即劉洽前以克汴州賜名出師境上使人告諭之克寧乃不敢襲位詔以賈耽鎮鄭滑克寧悉取軍資夜出軍士剽之殆盡京城戒嚴吐蕃遊騎及好畤此唐所置好畤縣也故城在今乾州西漢故縣在州東南京城戒嚴民間傳言上復欲出幸齊映見上言曰外間皆言陛下已理裝具糧人情恟懼夫大福不再陛下奈何不與臣等熟計之因伏地流涕上亦為之動容李晟遣兵撃吐蕃于汧城即臨汧城唐書地理志汧陽有臨汧城汧陽縣今屬鳳翔府敗之李晟遣其將王佖將驍勇三千伏于汧城戒之曰虜過城下勿撃其首俟見五方旗虎豹衣乃其中軍也出其不意撃之必大捷佖用其言尚結贊敗走僅而獲免謂其人曰唐之良將李晟馬燧渾瑊而已當以計去之入鳳翔境禁虜掠以兵直抵城下曰李令公召我來何不出犒我經宿而退是冬晟遣蕃落使野詩良輔與王佖襲吐蕃摧沙堡遇吐蕃與戰破之乘勝至堡下攻拔之斬其將焚其蓄積而還尚結贊引兵自寧慶北去韓遊􅅛遣將追之虜棄所掠而去尋寇鹽夏等州皆陷之野詩番姓良輔其名鹽夏州注俱見前冬十一月韓滉劉元佐曲環俱入朝劉元佐在汴習鄰道故事久未入朝韓滉過汴相與約為兄弟請拜其母其母喜為置酒酒半滉曰弟何時入朝元佐曰久欲入朝力未能辦耳滉曰滉力可及弟宜早入朝丈母父行為丈人行故呼其母為丈母垂白不可使帥諸婦女往填宫也凡叛者家屬皆沒入掖庭故云母悲泣不自勝滉乃遺元佐錢二十萬緡備行裝滉留大梁三日大出金帛賞勞一軍為之傾動元佐驚服遂與曲環俱入朝十二月李晟入朝上忌李晟功名㑹吐蕃有離間之言張延賞等騰謗于朝無所不至晟聞之晝夜泣目為之腫悉遣其子弟詣長安表請為僧不許入朝稱疾懇辭方鎮亦不許韓滉素與晟善上命滉諭㫖使與延賞釋怨引延賞詣晟第謝因飲盡歡晟表薦延賞為相丁卯三年春正月以張延賞同平章事李晟為其子請婚于延賞不許晟謂人曰武夫性快釋怨于杯酒間則不復貯胸中矣非如文士難犯外雖解和内蓄憾如故吾得無懼哉雲南王異牟尋請内附初雲南王閤羅鳳陷巂州獲西瀘唐縣故城在今四川寧逺府西昌縣令鄭回相州人回通經術閤羅鳳愛重之其子及孫異牟尋皆師事之及異牟尋為王以回為相號清平官雲南有衆數十萬吐蕃每入寇常以為前鋒賦斂重數又奪其險要地立城堡嵗徵兵助防雲南苦之回説異牟尋自歸于唐曰中國尚禮義有惠澤無賦役異牟尋以為然㑹西川節度使韋臯招撫羣蠻異牟尋潛遣人因諸蠻求内附臯奏宜招納之以離吐蕃之黨分其勢上命臯先作邊將書以諭之微觀其趣貶齊映為夔州注見前刺史張延賞與齊映有隙映在諸相中頗稱敢言上浸不悦延賞因言映非宰相器貶之劉滋罷以栁渾字夷曠一字惟深襄州人同平章事韓滉性苛暴方為上所任言無不從他相充位而已百官羣吏救過不贍渾雖為滉所引薦正色讓之曰先相公謂韓休以褊察為相不滿嵗而罷今公又甚焉奈何搒吏于省中至有死者且作福作威豈人臣所宜滉愧為之少霽威嚴二月鎮海節度使同平章事韓滉卒滉强力嚴毅自奉儉素衣裘十年乃易及是病卒滉久在二浙所辟僚佐各隨其長無不得人嘗有故人子謁之滉考其能一無所長然與之宴竟席未嘗左右視因使監庫門其人終日危坐吏卒無敢妄出入者以白志貞為浙西觀察使是年始分置浙江東西二道各置觀察使浙西治潤州浙東治越州上以白志貞為浙西觀察使栁渾曰志貞憸人不可復用㑹渾疾不視事詔下用之渾病間遂乞骸骨不許三月以李晟為太尉初吐蕃尚結贊得鹽夏州各留兵戍之退屯鳴沙隋縣故城在今寧夏府中衞縣宋白曰人馬行沙上有聲異于餘沙故名羊馬多死糧運不繼又聞李晟克摧沙堡渾瑊馬燧各舉兵臨之大懼屢遣使求和上未之許乃卑辭厚禮求和于馬燧燧信其言為之請于朝李晟曰戎狄無信不如撃之韓滉曰今兩河無虞若城原鄯洮渭使晟及劉元佐等守之河湟二十餘州可復也上欲從之㑹滉卒張延賞與晟有隙數言和親便上亦素恨回紇欲與吐蕃撃之遂從燧延賞計延賞又言晟不宜久典兵上乃謂晟曰朕以百姓之故與吐蕃和親決矣大臣既與吐蕃有怨宜留輔朕自擇代者晟薦都虞候邢君牙瀛州樂夀人遂以君牙為鳳翔尹加晟太尉罷鎮晟在鳳翔嘗謂僚佐曰魏徵好直諫吾竊慕之行軍司馬李叔度曰此儒者事非勲徳所宜也晟斂容曰司馬失言矣晟任兼將相知朝廷得失而不言何以為臣哉叔度慙而退及在朝廷上有所顧問極言無隱而性沈宻未嘗泄于人夏五月以渾瑊為㑹盟使先是遣右庶子崔澣使吐蕃澣見尚結贊責以負約尚結贊曰破朱泚未獲賞是以來耳今明公欲修舊好固所願也然渾侍中信厚聞于異域請必使之主盟及是澣還遂遣瑊與吐蕃盟于清水瑊將二萬餘人赴盟所尚結贊請盟于土梨樹堡名在今平涼府鎮原縣東或言土梨樹多險阻不如平涼乃許盟于平涼初韓滉薦劉元佐可使將兵復河湟元佐亦贊成之至是元佐奏言吐蕃方强未可與爭張延賞奏以河湟事委李抱真抱真亦固辭由延賞罷李晟兵柄故武臣皆憤怒解體不肯為用故也閏月省州縣官省州縣官收其祿以給戰士張延賞之謀也時新除官千五百人而當減者千餘人嗟怨盈路既而以李泌言詔所減官並復故以曹王臯為山南東道節度使吴少誠繕兵完城欲拒朝命判官鄭常大將楊冀謀逐之事泄少誠殺之上以襄鄧扼淮西衝要以臯為節度使以襄鄧復郢安隨唐七州復州後周置今安陸府沔陽州是唐州唐置今南陽府唐縣是餘注俱見前𨽻之渾瑊與吐蕃盟于平涼吐蕃刦盟渾瑊之發長安也李晟深戒之以盟所為備不可不嚴張延賞言于上曰晟不欲盟好之成故戒瑊以嚴備我有疑彼之形則彼亦疑我矣盟何由成上乃召瑊切戒以推誠待虜勿為猜疑瑊奏吐蕃決以辛未盟延賞集百官稱詔示之曰李太尉謂和好必不成今盟日定矣晟聞之泣曰吾生長西陲備諳虜情所以論奏但恥朝廷為犬戎所侮耳上始命駱元光屯潘原注見前韓遊􅅛屯洛口即水洛口在平涼府靜寧州南瓦亭川東北以為瑊援元光謂瑊曰潘原距盟所且七十里公有急何從知之請與公俱瑊以詔指固止之元光不從與瑊連營相次距盟所三十餘里元光伏兵于營西遊􅅛亦遣五百騎伏于其側曰若有變則汝曹西趣柏泉當作百泉隋縣故城在今平涼府平涼縣以分其勢將盟尚結贊請各以甲士列壇東西又請各遣遊騎數十更相覘索瑊皆許之吐蕃伏精騎數萬于壇西遊騎貫穿唐軍出入無禁唐騎入虜軍悉為所擒瑊等皆不知入幕易禮服虜伐鼓三聲大譟而至瑊自幕後出偶得他馬乘之伏鬛入其銜散馬不銜伏身鬛上而入之馳十里銜方及馬口虜縱兵追撃唐將卒死者數百人副使崔漢衡被擒瑊至其營將卒已遁元先發伏成陳以待之虜騎乃還是日上視朝謂諸相曰今日和戎息兵社稷之福栁渾曰敵人無信義非盟誓可結今日之事臣竊憂之李晟曰誠如渾言上變色曰栁渾書生不知邊計大臣亦為此言邪皆頓首謝是夕韓遊􅅛表言虜劫盟諸兵臨近鎮上大驚謂渾曰卿書生乃能料敵如此其審邪上欲出幸大臣諫而止既而上遣中使齎詔遺尚結贊不納而還六月以馬燧為司徒兼侍中初吐蕃尚結贊惡李晟馬燧渾瑊曰去三人則唐可圖也于是離間李晟因馬燧以求和欲執渾瑊以賣燧使并獲罪因縱兵直犯長安㑹失渾瑊而止獲馬燧之姪弇謂曰胡以馬為命吾在河曲春草未生馬不能舉足當是時侍中度河掩之吾全軍覆沒矣今䝉侍中力全軍得歸奈何拘其子孫遣弇與宦官俱文珍等歸上聞尚結贊之言由是惡燧罷其副元帥節度使以為司徒侍中張延賞慙懼謝病以李泌同平章事泌初視事與李晟等俱入見上謂泌曰朕欲與卿有約卿慎勿報讐有恩者朕當為卿報之對曰臣素奉道不與人為讐李輔國元載皆害臣者今自斃矣素所善者率已顯達或多零落臣無可報也臣今日亦願與陛下為約可乎上曰何不可泌曰願陛下勿害功臣李晟馬燧有大功于國聞有讒之者陛下萬一害之則宿衛之士方鎮之臣無不憤怨反仄恐中外之變復生也陛下誠不以二臣功大而忌之二臣不以位高而自疑則天下永無事矣上以為然晟燧皆起泣謝上因謂泌曰自今凡軍旅糧儲事卿主之吏禮委延賞刑法委渾泌曰陛下不以臣不才使待罪宰相宰相之職天下之事咸共平章不可分也若各有所主是乃有司非宰相矣上笑曰朕適失辭卿言是也秋七月以李昇為詹事初上入駱谷衛士多亡李叔明字晉卿閬州新政人本鮮于仲通之弟表請宗姓之子昇及郭曙子儀之子令狐建彰之子等恐有姦人危乘輿相與齧臂為盟更鞚上馬以至梁州及還長安上皆以為禁衛將軍寵遇甚厚張延賞故與叔明有隙知昇私出入郜國大長公主肅宗女蕭升妻第密以白上上使李泌察之泌曰此必有欲動搖東宫者其延賞乎上曰何以知之泌具為上言二人之隙且言昇承恩顧延賞無以中傷而郜主乃太子妃之母也故欲以此陷之耳上笑曰是也泌因請罷昇宿衛以逺嫌從之是月張延賞卒以韓潭為夏綏銀三州皆唐置夏注見前綏今陜西綏徳州是銀今綏徳州米脂縣是節度使吐蕃之戍鹽夏者饋運不繼人多病疫思歸尚結贊遺三千騎逆之悉焚其廬舎毁其城驅其民而去于是割振武之綏銀二州以潭為節度使帥神策軍之士五千朔方河東之士三千鎮夏州以元反直為諸道句音鈎戡兩税錢帛使時防秋兵大集國用不充李泌奏自變兩税法以來藩鎮州縣聚斂𣙜率謂𣙜利而率其數以為軍資自懼違法匿不敢言請赦其罪促令革正自非于法應留使留以應本道諸使徵調留州留以給本州經用之外悉輸京師其官典逋負可徵者徵之難徵者釋之敢有淪沒者罪之上喜曰卿策甚長然立法太寛恐所得無幾對曰寛則人喜于免罪而樂輸所得必多而速急則競為蔽匿非推鞫不能得其實財不足以濟今日之急而皆入于姦吏所得必少而遲矣上曰善乃以友直充使友直句簡諸道税外物悉輸户部遂為定制嵗輸百餘萬緡民不堪命後諸道多自訴于上上意悟乃詔已在官者輸京師未入者悉以與民以後悉免于是東南之民復安其業停西域使者廩給分𨽻神策軍初河隴既沒于吐蕃安西北庭及西域使人在長安者歸路阻險皆仰給于度支李泌知胡客皆有妻子買田宅安居不欲歸命停其給凡四千人皆詣政府訴之泌曰此皆從來宰相之過豈有外國使者留京師數十年不聴歸乎今當假道回紇各遣歸國不願者當于鴻臚自陳授以職位給俸禄人生當乘時展用豈可終身客死乎于是胡客無一人願歸者泌皆分𨽻神策兩軍禁旅益壯嵗省五十萬緡募戍卒屯田京師上復問泌以復府兵之䇿對曰國家比遭饑亂經費不充未暇議復府兵也上曰然則亟減戍卒歸之如何對曰陛下誠用臣言可不減戍卒不擾百姓糧食皆足府兵亦成上曰果能如是何為不用對曰此須急為之過旬日則不及矣上問其計泌曰吐蕃久居原蘭原州注見前蘭州唐置今甘肅蘭州府是之間以牛運糧糧盡牛無所用請發左藏惡繒染為綵纈因党項以市之計十八萬匹可致六萬餘頭命諸冶鑄農器糴麥種分賜緣邊軍鎮募戍卒耕荒田而種之約麥熟倍償其種其餘據時價五分増一官為糴之來春種禾亦如之沃土久荒所收必厚戍卒獲利耕者浸多糴價必賤名為増之而實比今嵗所減多矣且邊地官多闕請募人入粟以補之可足今嵗之糧上皆從之因問曰卿言府兵亦集如何對曰舊制戍卒五年而代今既因田致富必不思歸及其將滿下令有願留者即以所開田為永業家人願來者本貫續食遣之不過數番則戍卒皆土著乃悉以府兵之法理之是變闗中之疲弊為富强也上喜曰如此天下無復事矣泌曰未也臣能不用中國之兵使吐蕃自困上曰計將安出對曰臣未敢言之俟麥禾有效然後可議也泌意欲結回紇未食雲南與共圖吐蕃知上素恨回紇恐聞之不悦并屯田之議不行故不肯言既而戍卒應募願耕屯田者什有五六八月辛巳朔日食栁渾罷為左散騎常侍初渾與張延賞議事數異同延賞使人謂曰相公節言則重位可久矣渾曰為吾謝張公栁渾頭可㫁舌不可禁由是交惡上好文雅藴藉而渾質直無威儀時發俚語上不悦罷之幽郜國大長公主流李昇于嶺南公主女為太子妃恩禮甚厚宗戚皆疾之主素不謹李昇等數出入其第或告主淫亂且為厭禱上大怒幽之禁中流昇等嶺表切責太子太子懼請與妃離昏上召李泌告之且曰舒王近已長立孝友溫仁泌曰陛下惟有二子奈何廢之而立姪且陛下所生之子而疑之何有于姪舒王雖孝自今陛下宜努力勿復望其孝矣上曰卿不愛家族乎對曰臣惟愛家族故不敢不盡言若畏陛下盛怒而為曲從陛下明日悔之必尤臣云吾獨任汝為相不力諫使至此必復殺而子臣老矣餘年不足惜若寃殺臣子使臣以姪為嗣臣未知得歆其祀乎因嗚咽流涕上亦泣曰事已如此奈何對曰此大事願陛下審圖之自古父子相疑未有不亡國者且陛下不記建寧之事乎上曰建寧叔實寃肅宗性急故耳泌曰臣昔為此故辭歸誓不近天子左右不幸今日復為陛下相又覩兹事且其時先帝常懐畏懼臣臨辭日因誦黄臺𤓰辭肅宗乃悔而泣上曰朕固知之意稍解乃曰貞觀開元皆易太子何故不亡對曰承乾謀反事覺太宗使其舅與朝臣數十人鞫之事狀顯白然當時言者猶云陛下不失為慈父使太子得終天年太宗從之并廢魏王泰且陛下既知肅宗急而建寧寃則願陛下深戒其失從容三日究其端緒必釋然知太子之無他矣若果有其迹願陛下如貞觀之法并廢舒王而立皇孫則百代之後有天下者猶陛下子孫也至于武惠妃譖太子瑛兄弟殺之海内寃憤乃百代所當戒此又可法乎且太子居少陽院未嘗接外人預外事安得有異謀彼譖人者巧詐百端雖有手書如晉愍懐衷甲如太子瑛猶未可信况但以妻母為累乎幸賴陛下語臣臣敢以宗族保太子曏使楊素許敬宗李林甫之徒承此㫖已就舒王圖定策之功矣丄曰此朕家事何預于卿而力爭如此對曰天子以四海為家臣今獨任宰相之重四海之内一物失所責歸于臣况坐視太子寃横而不言臣罪大矣上曰為卿遷延至明日思之泌抽笏叩頭而泣曰如此臣知陛下父子慈孝如初矣然陛下還宫當自審思勿露此意于左右露之則彼皆欲樹功于舒王太子危矣上曰具曉卿意泌歸太子遣人謝泌曰若必不可救欲先自仰藥如何泌曰必無此慮願太子起敬起孝苟泌身不存則事不可知耳間一日上開延英殿獨召泌流涕曰非卿切言朕今日悔無及矣太子仁孝實無他也自今軍國及朕家事皆當謀于卿矣泌拜賀因曰臣報國畢矣驚悸亡魂不可復用願乞骸骨上慰諭不許舒王名誼代宗次子鄭王邈之子帝愛之取為己子九月回紇求和親許之回紇合骨咄祿可汗屢求和親上未之許㑹邊將告乏馬李泌言于上曰臣有愚策可使馬賤十倍上問之對曰願陛下推至公之心屈已徇人為社稷計臣乃敢言上曰何故泌曰臣願陛下北和回紇南通雲南西結大食天竺注俱見前如此則吐蕃自困馬亦易致矣上曰三國當如卿言至于回紇則不可泌曰臣固知陛下如此所以不敢早言然今日之計回紇為先三國差緩且陛下所以不可豈非以陜州之恥邪帝為雍王時見回紇于陜州事具前上曰然韋少華等以朕之故受辱而死朕豈能忘之泌曰害少華者乃牟羽可汗後復入寇為今可汗所殺然則今可汗乃有功于陛下又何怨邪是後泌凡十五對反復論之上終不許沁乃乞骸骨上曰朕不憚屈已但不能負少華輩耳泌曰以臣觀之少華輩負陛下非陛下負之也上曰何故對曰昔葉䕶將兵助國肅宗止令臣宴勞之亦不許至其營及大軍將發先帝始與相見葢敵人叵測不得不過為之防耳陛下在陜富于春秋少華輩不能深慮以萬乘元子徑造其營又不先與之議相見之儀使彼得肆其桀驁豈非少華輩負陛下邪且香積之㨗葉䕶欲掠長安先帝親拜于馬前以止之當時觀者十萬餘人皆嘆息曰廣平王真華夷主也然則先帝所屈者少所伸者多矣况牟羽身為可汗舉國赴難當是之時臣不敢言其他若留陛下于營中歡飲十日天下豈得不寒心哉以此二事觀之則屈己為是乎不屈己為是乎上謂李晟馬燧曰朕素怨回紇今聞泌言自覺少理卿以為如何皆對曰誠如泌言泌曰臣以為回紇不足怨向來宰相乃可怨耳回紇再復京城今可汗又殺牟羽復有何罪吐蕃幸國之災陷河隴數千里之地又入京城使先帝蒙塵于陜此乃百代必報之讐為可怨耳上曰朕與回紇為怨已久今往與之和得無復拒我為夷狄之笑乎對曰臣請以書與之約稱臣為陛下子每來不過二百人印馬不過千匹無得攜中國人及商胡出塞五者皆能如約則主上必許和親如此威加北荒旁讋吐蕃足以快陛下平昔之心矣上從之既而回紇可汗遣使上表凡泌所約五事皆聴命上大喜謂泌曰回紇何畏服卿如此對曰此乃陛下威靈臣何力焉上因問招雲南大食天竺之計對曰回紇和則吐蕃已不敢輕犯塞矣雲南若吐蕃賦役未嘗一日不思復為唐臣也大食在西域為最强與天竺皆久慕中國代與吐蕃為讐臣是以知其可招也遂遣回紇使者歸許以公主妻之吐蕃陷連雲堡在平涼府涇州西三垂峭絶北據高所為涇西要地先是吐蕃寇隴州連營數十里京城震駭虜大掠驅丁壯萬餘口而去至是復陷連雲堡涇西恃連雲堡為斥堠既陷西門不開門外皆為虜境樵采路絶常苦乏食已而吐蕃城故原州而屯之冬十月李軟奴等作亂伏誅妖僧李軟奴結殿前射生將韓欽緒等謀作亂其黨告之上命捕送内侍省推之李晟聞之驚仆曰晟族滅矣李泌問其故晟曰晟新罹謗毁中外有家人千餘若有一人在其黨中則兄亦不能救矣泌乃密奏大獄一起所引必多聞人情恟懼請出付臺推上從之欽緒遊瓌之子也亡抵邠州械送京師與軟奴等皆腰斬而朝臣無連及者遊瓌以欽緒誅委軍入謝上遣還鎮大稔詔和糴粟麥自興元以來是嵗最為豐稔米斗直錢百五十粟八十詔所在和糴上畋于新店入民趙光竒家問百姓樂乎對曰不樂上曰今嵗頗稔何為不樂對曰詔令不信前云兩税之外悉無他徭今非税而誅求者殆過于税又云和糴而實强取之曽不識一錢始云所糴粟麥納于道次今則遣致京西行營動數百里車摧牛斃破産不能支愁苦如此何樂之有上命復其家戊辰四年春正月以劉昌為涇原節度使李元諒即駱元光賜姓名為隴右節度使昌元諒皆帥卒力田數年軍食充羨涇隴稍安二月以諸道税外錢帛輸大盈庫先是上謂李泌曰每嵗諸道貢獻共直錢五十萬緡今嵗僅得三十萬緡宫中用度殊不足泌曰古者天子不私求財今請供宫中錢百萬緡願陛下勿受貢獻及罷宣索必有所須降勅折税所市之物準時價以税錢折之不使姦吏因緣誅剝上從之及元友直運淮南錢帛二十萬至泌悉輸大盈庫然上猶數有宣索仍勅諸道勿令宰相知泌聞之惆悵而不敢言詔葺白起廟贈兵部尚書咸陽人或上言見白起云請為國家扞禦西陲既而吐蕃入寇邊將敗之上以為信然欲于京城立廟贈司徒李泌曰今將帥立功而陛下褒賞白起臣恐邊臣解體矣且立廟祈禱將長巫風今杜郵注見前有舊祠請勅葺之則不至驚人耳目矣且起列國之將贈三公太重贈兵部尚書可也上從之夏四月更命殿前射生曰神威軍左右羽林龍武神武神策神威凡十軍雲南遣使入貢五月吐蕃寇涇邠寧慶鄜州先是吐蕃常以秋冬入寇及春多病疫而退至是得唐人質其妻子遣其將將之盛夏入寇諸州無敢與戰者吐蕃大掠而去六月徵陽城字亢宗定州北平人徙夏縣為諌議大夫城以學行著聞隱居栁谷在今解州夏縣東南集覽釋為張掖之栁谷口誤李泌薦之秋七月以張獻甫為邠寧節度使先是韓遊􅅛忌都虞候范希朝字致君河中虞鄉人得衆心將殺之希朝奔鳳翔上召置神策軍至是遊􅅛以病求歸詔以張獻甫代之未至戍卒裴滿等帥衆作亂奏請希朝為節度使都虞候楊朝晟字叔明夏州朔方人勒兵斬之而迎獻甫上聞軍衆欲得希朝將授之希朝辭曰臣畏遊瓌之禍而來今往代之非所以防窺覦安反仄也上嘉之擢為寧州刺史以副獻甫冬十月回紇來迎公主仍請改號回鶻回紇可汗遣其妹及大臣妻來迎可敦辭禮甚恭曰昔為兄弟今為子壻半子也若吐蕃為患子當為父除之仍請改號回鶻許之乃冊合骨咄祿為回鶻長夀天親可汗以咸安公主帝之女妻之明年冬天親可汗死立其子為忠貞可汗吐蕃寇西川韋臯遣兵拒撃破之吐蕃發兵十萬將寇西川亦發雲南兵雲南内雖附唐外未敢叛吐蕃亦發兵數萬屯瀘北瀘水之北瀘水注見前韋臯乃為書遺雲南王敘其歸化之誠轉致吐蕃吐蕃始疑雲南遣兵屯㑹川唐縣今四川寧逺府㑹理州是以塞其趨蜀之路雲南怒歸唐之志益堅而吐蕃兵始弱矣臯遣兵拒撃破之于清溪闗外在今四川雅州府清溪縣南與寧逺府越巂衛接界其地連山帶谷夾澗臨溪倚險接關恃為控禦十一月以張建封為徐泗濠節度使李泌言于上曰江淮漕運自淮入汴以甬橋注見前為咽喉地屬徐州鄰于李納若納一旦復有異圖竊據徐州則失江淮矣請徙張建封鎮徐州割濠泗以𨽻之則淄青惕息而運路常通江淮安矣上從之建封為政寛厚而有綱紀不貸人以法其下畏而悦之橫海節度使程日華卒子懐直自知留後明年以懐直為滄州觀察使懐直請分景城弓高為景州請除刺史上喜曰三十年無此事也以徐伸為景州刺史景城注見前弓高漢故縣在今河間府故城縣界唐故縣在今東光縣西景州唐治弓髙元移蓚縣明廢縣入州今州屬河間府己巳五年春二月以董晉竇參字時中誕四世孫同平章事李泌自陳衰老乞更除一相上曰朕深知卿勞苦但未得其人耳因從容論即位以來宰相曰盧杞忠清强介人言杞姦邪朕殊不覺泌曰此乃杞之所以為姦邪也倘陛下覺之豈有建中之亂乎杞以私隙殺楊炎擠顔真卿于死地激李懐光使叛賴陛下聖明竄逐之人心頓喜天亦悔禍不然亂何由弭上曰楊炎以童子視朕意以朕為不足與言以是朕不可忍非由杞也建中之亂術士豫請城奉天此葢天命非杞所致也泌曰天命他人皆可以言之惟君相不可言君相所以造命也君言命則禮樂政刑皆無所用矣紂曰我生不有命在天此商之所以亡也上因復言盧杞小心朕所言無不從對曰夫言而莫予違此孔子所謂一言喪邦者也上曰惟卿則異于彼朕言當卿常有喜色不當常有憂色雖時有逆耳之言而氣色和順無陵傲好勝之志直使朕中懐已盡而屈服不能不從此朕所以私喜于得卿也既而泌薦竇參通敏可兼度支鹽鐵董晉方正可處門下上皆以為不可泌疾甚復薦二人上遂相之參為人剛果峭刻無學術多權數毎奏事諸相出參獨居後以奏度支事為辭實專大政多引親黨置要地使為耳目董晉充位而已然晉為人重慎所言于上前者未嘗泄于人子弟或問之晉曰欲知宰相能否視天下安危所謀議于上前者不足道也三月中書侍郎同平章事鄴侯李泌卒泌有謀畧而好談神僊詭誕故為世所輕庚午六年冬十月回鶻忠貞可汗為其下所殺回鶻忠貞可汗之弟殺忠貞而自立國人殺之而立忠貞之子阿啜為可汗遣其臣梅錄來告喪且求冊命先是回鶻使者入中國禮容驕慢梅錄至豐州刺史李景畧先據高坐梅錄俯僂前哭景畧撫之曰可汗棄代助爾哀慕自是回鶻使至皆拜景畧于庭威名聞塞外明年春遣使冊阿啜為奉誠可汗奉誠立五年而死無子其相骨咄祿有勇畧諸酋長畏服之立為可汗遣使來告乃冊為懐信可汗吐蕃陷安西先是吐蕃寇北庭回鶻大相頡干迦斯將兵救之北庭地近回鶻又有沙陀六千餘帳與北庭相依至是頡干迦斯與吐蕃戰不利吐蕃急攻北庭北庭人與沙陀酋長皆降于吐蕃安西由是遂絶莫知存亡而西州猶為唐固守辛未七年春二月義武節度使張孝忠卒秋七月以其子昇雲為留後昇雲尋賜名茂昭授節度使八月以陸贄為兵部侍郎解内職竇參惡之也吐蕃寇靈州回鶻撃敗之九月遣使來獻俘冬十二月以吴湊為陜虢觀察使福建觀察使吴湊治有聲竇參以私憾毁之且言其病風上召至京師知參之誣由是始惡參以湊為陜虢觀察使代參黨李翼壬申八年春三月宣武節度使劉元佐卒元佐卒將士擁其子士寧為留後劫監軍孟介請于朝許之元佐有威畧毎李納使至元佐厚結之故常得其陰事先為之備納憚之其母雖貴日織絹一匹謂元佐曰汝本寒微天子富貴汝至此必以死報之故元佐始終不失臣節夏四月賜諫議大夫吴通元海州人死貶竇參為栁州唐置今廣西栁州府是别駕竇參陰狡而愎恃權而貪每遷除多與族子給事中申議之申招權受賂時人謂之喜鵲上頗聞之申恐陸贄進用陰與諫議大夫吴通元作謗書以傾贄上察知之貶參賜通元死以趙憬字退翁隴西人陸贄同平章事陸贄請令臺省長官各舉其屬著其名于詔書異日考其殿最并以升黜舉者詔行之未幾而罷或言于上曰諸司所舉皆有情故不得實才上密諭贄自今除改卿宜自擇勿任諸司贄上奏曰國朝之制五品以上制勅命之葢宰相商議奏可者也六品以下則㫖授葢吏部銓材署職詔㫖畫聞而不可否者也開元中起居遺補御史等官猶並列于選曹其後倖臣專朝廢公舉行私惠使周行庶品茍不出時宰之意則莫致也今臣所奏宣行以來纔舉十數議其資望不愧班行考其行能未聞闕敗而議者遽以騰口上頃聖聰道之難行亦可知矣請使所言之人指陳其狀覈其虚實謬舉者必行其罰誣善者亦反其辜若不出主名不加辯詰使枉直同貫則人何賴焉又宰相不過數人豈能遍諳多士理須展轉詢訪是則變公舉為私薦情故必多且今日之宰相則往日之臺省長官今日之臺省長官乃將來之宰相豈有為長官之時則不能舉一二屬吏居宰相之位則可擇千百具僚物議悠悠其惑甚矣葢尊者領其要卑者任其詳是以人主擇輔臣輔臣擇庶長庶長擇佐僚將務得人無易于此上竟追前詔不行平盧節度使李納卒軍中推其子師古為留後秋七月以司農少卿裴延齡判度支事陸贄請以李巽權判度支上許之既而復欲用延齡贄言度支準平萬貨刻吝則生患寛假則容姦延齡誕妄小人用之恐傷聖鑒上不從八月遣使宣撫諸道時四十餘州大水溺死三萬餘人陸贄請遣使賑撫上曰聞所損殊少即議優恤恐生姦欺贄曰流俗之弊多徇諂諛揣所悦意則侈其言度所惡聞則小其事今遣使巡撫所費者財用所收者人心茍不失人何憂乏用上曰淮西貢賦既闕不必遣也贄曰昔秦晉讐敵穆公猶救其饑而况帝王懐柔萬邦惟徳與義寧人負我無我負人乃遣中書舎人奚陟字殷卿京兆人等宣撫諸道九月減江淮運米令京兆邊鎮和糴從陸贄之請也贄言于上曰邊儲不贍由措置失當蓄斂乖宜故也今戍卒不𨽻于守臣守臣不總于元帥至有一城之將一旅之兵各降中使監臨若承别詔委任毎有寇至方從申覆比䝉徵發救援寇已獲勝罷歸此所謂措置失當者頃設就軍和糴之法以省運制加倍之價以勸農此令初行人皆悦慕而有司競為纎嗇不時斂藏遂使豪家貪吏反操利權賤取于人以俟公私之乏度支物估轉高軍城穀價轉貴空申簿帳偽指困倉計其數則億萬有餘考其實則百十不足此所謂蓄斂乖宜者也也舊制闗中嵗運東方租米至有斗錢運斗米之言習聞見而不達時宜者則以為國之大事不計費損習近利而不防逺患者則以為但令畿内和糴既易集事又足勸農臣以為兩家之語互有長短將制國用須權重輕食不足而財有餘則弛財而務實倉廩食有餘而財不足則緩食而嗇用貨泉近嵗闗輔屢豐公儲委積江淮水潦米貴加倍闗輔宜加價以糴而無錢江淮宜減價以糶而無米而運彼所乏益此有餘所謂習聞見而不達時宜矣今江淮斗米直百五十錢運至東渭橋僦直又約二百而市司估糴三十七錢耗其九而存其一餒彼人而傷此農制事若斯可謂深失頃者每年江淮運米百一十萬斛主河陰太原留七十萬斛而以四十萬斛輸東渭橋今二倉見米猶有三百二十餘萬斛京兆諸縣斗米不過直錢七十請令來年江淮止運三十萬斛至河陰而河陰太原以次運至京師其江淮所停八十萬斛委轉運使每斗取八十錢于水災州縣糶之以救貧乏計得錢六十四萬緡減僦直六十九萬緡先令户部以二十萬緡付京兆糴米以補渭橋之闕數斗用百錢以利農人以一百二萬六千緡付邊鎮使糴十萬人六年之糧餘十萬四千緡以充來年和糴之價其江淮米錢僦直並委轉運使折市綾絹絁綿以輸上都償先貸户部錢詔行其䇿邊備浸充冬十一月壬子朔日食十二月以柏良器柏氏古柏國之後以國為氏為右領軍神策大將軍柏良器募才勇之士以易敗鬻者監軍竇文場惡之左遷右領軍自是宦官始專軍政矣癸酉九年春正月初税茶爾雅檟苦茶郭璞注早採者為茶晚取者為茗一名荈蜀人謂之苦荼魏了翁卭州茶記茶之始其字為荼如春秋書齊荼之類自陸徳明等始轉入茶音至陸羽盧仝以後遂改荼字為茶凡州縣産茶及茶山外要路皆估其直什税一從鹽鐵使張滂之請也滂又奏税錢别貯俟有水旱代民田税自是嵗收錢四十萬緡未嘗以救水旱也二月城鹽州初鹽州既陷塞外無復保障吐蕃常阻絶靈武侵擾鄜坊詔發兵城鹽州又詔涇原山南劒南各發兵深入吐蕃以分其勢城之二旬而畢命節度使杜彦光戍之由是靈武銀夏河西獲安三月貶竇參為驩州注見前司馬尋賜死初竇參惡李巽出為常州刺史及參貶汴州節度使劉士寧遺參絹五十匹巽奏參交結藩鎮上大怒欲殺參陸贄曰劉晏之死罪不明白至使叛臣得以為辭參之貪縱天下共知至于潛懐異圖事跡曖昧若遽加重辟駭動不細乃更貶參驩州司馬時宦官恨參尤深謗毁不已竟賜死于路竇申杖殺貨財奴婢悉傳送京師夏五月以趙憬為門下侍郎與賈耽盧邁字子元河南人同平章事先是上使人諭陸贄曰自今要重之事勿對趙憬陳論當密封手疏以聞又苗晉卿往年攝政元宗崩肅宗疾甚詔以晉卿攝冢宰嘗有不臣之言諸子皆與古帝王同名晉卿子發丕堅垂等與帝王同名今不欲明行斥逐宜各除外官又卿清慎太過諸道饋遺一皆拒絶恐事情不通鞭靴之類受亦無傷贄以為不可上奏言之畧曰昨臣所奏惟憬得聞陛下已至勞神委曲防䕶是于心膂之内尚有形迹之拘職同事殊鮮克以濟恐爽無私之徳且傷不吝之名古者爵人于朝刑人于市惟恐衆之不睹事之不彰是以君上行之無愧心兆庶聴之無疑議凡是譖記之事多非信實之言利于中傷懼于公辯或云嵗月已久不可究尋或云事體有妨須為隱忍或云惡逆未露宜假他事為名或云但棄其人何必明言責辱詞皆近理意實矯誣傷善售姦莫斯為甚若晉卿父子實有大罪則當公議典憲若被誣枉豈令陰受播遷夫監臨受賄盈尺有刑至于士吏之微尚當嚴禁矧居風化之首反可通行賄道一開展轉滋甚鞭靴不已遂及金玉目見可欲何能自窒于心已與交私豈能中絶其意乎至是憬反疑贄排已置之門下由是與贄有隙雲南王異牟尋遣使上表吐蕃雲南日益相猜韋臯復遺雲南王書欲與共襲吐蕃驅之雲嶺之外雲嶺即雪山亦曰雪嶺在今雲南麗江府西北滇載記雪山九峯積雪四時玉立萬仞望之與蜀松州諸山相接或謂之雪嶺唐韋臯約雲南共驅吐蕃于雲嶺之外葢即雪嶺外也獨與雲南築大城于境上置戍相保永同一家至是異牟尋遣使詣臯上表請棄吐蕃歸唐臯遣其使者詣長安上賜異牟尋詔令臯遣使慰撫之秋七月詔宰相迭秉筆以處政事賈耽陸贄趙憬盧邁為相百官白事更讓不言乃奏請依至徳故事宰相迭秉筆旬日一易詔從之其後日一易之置欠負耗賸染練庫户部侍郎裴延齡奏檢責諸州欠負錢八百餘萬緡收抽貫錢即除陌錢也三百萬緡呈樣物三十餘萬緡請别置庫以掌之欠負皆貧人無所償抽貫錢給用旋盡呈樣染練皆左藏正物延齡徙置别庫虛張名數以惑上上信之以為能富國而寵之左補闕權徳輿奏曰延齡取常賦支用未盡者充羡餘以為已功縣官市物再給其直以充别貯邊軍自今春以來並不支糧陛下必以延齡孤貞獨立時人醜正流言何不遣信臣覆視究其本末明行賞罰今衆喧于朝市豈皆朋黨邪上不從之權徳輿字載丹徒人八月太尉中書令西平王李晟卒諡曰忠武冬十二月宣武軍亂逐其節度使劉士寧劉士寧淫亂殘忍軍中苦之兵馬使李萬榮得衆心㑹士寧出畋數日不返萬榮召親兵詐之曰勅徵大夫入朝以吾掌留務汝輩人賜錢三十緡衆皆聴命乃分兵閉城士寧逃歸京師陸贄請選朝臣宣勞徐察事情上欲令萬榮知留後贄奏曰萬榮得志驕盈不悖則敗與其圖之于滋蔓不若絶之于萌芽且為國之道以義訓人若使傾奪之徒便得代居其任非獨長亂之道亦開謀逆之端但選能臣命為節度奬萬榮而别加寵任褒將士而厚賜資裝理必寧息上不從御批歴代通鑑輯覽卷五十八

front:
  text: 欽定四庫全書御批歷代通鑑輯覽卷十周赧王壬午三十六年秦趙㑹于澠池注見前寰宇記澠池西有澠坂秦趙相㑹處
  hash: sha256:54e5eaa824f1a9e9c270423a98e3051666a067feda2eb314056643026f7d024f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0037_WYG_009-1a, image: WYG0335/WYG0335-0233a.png}
body:
  text: 秦王告趙王願為好㑹于河外澠池趙王欲毋行廉頗廉氏顓帝曾孫大康之後藺相如曰王不行示趙弱且怯也趙王乃待相如從頗送至境與王訣曰王行度道里㑹遇之禮畢不過三十日過此不還請立太子以絶秦望王許之及㑹飲酒秦王請趙王鼓瑟趙王鼓之相如請秦王擊缶秦王不肯相如曰五步之內臣請得以頸血濺大王矣左右欲刃相如相如張目叱之左右皆靡秦王乃一擊缶罷酒秦終不能有加于趙趙人亦盛為之備秦不敢動趙王歸以相如為上卿位亷頗右頗曰我有攻城野戰之功相如徒以口舌位加我上我見必辱之相如聞之每朝常稱病出而望見輒引車避匿其舍人皆以為耻相如曰子視廉將軍孰與秦王曰不若相如曰夫以秦王之威而相如廷叱之相如雖駑獨畏亷將軍哉顧吾念之秦所以不敢加兵于趙徒以吾兩人在也今兩虎相鬭勢不俱生吾所以為此者先國家之急而後私讐也頗聞之肉袒負荆至門謝罪遂為刎頸交崔浩曰言要齊死生斷首無悔燕君平卒樂毅奔趙齊田單諸田疏屬襲破燕軍盡復齊地齊君入臨淄封單為安平注見前君時齊地皆已屬燕獨莒即墨未下樂毅并軍圍之即墨大夫戰死即墨人曰田單多智習兵初燕攻安平田單使其宗人皆以鐡籠傅車轊及城潰人爭門而出俱以軸折被擒獨單宗人得免遂奔即墨轊車軸頭也以鐡附之故謂之鐡籠立以為將樂毅圍二邑期年不尅乃令解圍去城九里而為壘令曰城中民出者勿獲困者賑之使即舊業三年而猶未下或讒之于燕王曰樂毅伐齊呼吸之間下七十餘城今不下者兩城耳非其力不能拔欲久仗兵威以服齊人南面而王耳燕王置酒大㑹引言者斬之燕王讓言者曰齊為無道以害先王寡人痛之入骨故招延賔客以求報仇有成功者尚欲與共燕國今樂君親為寡人破齊夷其宗廟報塞先仇齊固樂君之有非燕所得也汝何敢言若此乃斬之遣國相立毅為齊王毅惶恐不受拜書以死自誓由是齊人服其義諸侯畏其信莫敢復有謀者頃之昭王薨太子立是為惠王太子素與毅有隙田單知之乃縱反間于燕曰樂毅與燕新王有隙畏誅欲連兵王齊齊人未附故且緩攻即墨以待其事齊人所患惟恐他將之來耳燕王惠王以為然乃使騎劫胡三省注騎劫以能而將騎乃官稱非姓也代將而召樂毅毅知王不善代之知王遣代其意不善遂奔趙燕將士由是憤惋不和田單乃以計誑燕軍故激怒城中單令城中人食必祭其先祖于庭飛鳥皆翔舞而下燕人怪之單因宣言曰當有神師下教俄有一卒曰臣可以為師乎單逐師之每有約束必稱神師單又宣言曰吾惟懼燕人劓所得齊卒置之前行即墨敗矣燕人如其言城中皆怒堅守惟恐見得單又言吾懼燕人掘吾城外冢墓可為寒心燕人掘燒之齊人望見皆涕泣怒自十倍城中皆欲出戰單知其可用乃身操版鍤與士卒分功妻妾編于行伍之間盡散飲食饗士令甲卒皆伏使老弱女子乘城遣使約降燕軍益懈單收城中得午千餘為絳繒衣畫以五采龍文束兵刃于其角灌脂束葦于其尾鑿城數十穴夜縱牛燒葦端壯士五千人隨之牛尾熱怒奔燕軍所觸盡死傷五千人因銜枚奮擊而城中鼓譟從之老弱皆擊銅器為聲聲動天地燕軍大駭敗走齊人殺騎劫追亡逐北至河上齊七十餘城皆復乃迎齊王于莒入臨淄王以田單為相封安平君以太史敫之女為后是為君王后生太子建太史敫曰女不取媒因自嫁非吾種也汚吾世終身不見君王后君王后亦不以不見故失人子之禮田單攻狄三月不克問于魯仲連仲連曰將軍在即墨織蕢仗鍤為士卒倡當此之時將軍有死之心士卒無生之氣莫不揮泣奮臂而欲戰此所以破燕也今將軍東有夜邑之奉西有淄上之娛黃金橫帶騁乎淄澠之間有生之樂無死之心所以不勝也明日單厲氣循城立于矢石之所援槍鼓之狄人乃下魯仲連魯以國為氏仲連齊人狄齊邑漢為縣後漢改臨濟故城在今青州府髙苑縣夜邑即漢掖縣今為萊州府治淄澠二水名淄水出青州府博山縣原山東北至夀光入海澠水出臨淄縣即申池水之分流北入時水趙封樂毅為望諸君胡三省注望諸澤名本齊地毅自齊奔趙趙以此號之本其所從來也趙王與樂毅謀伐燕毅泣曰臣疇昔之事昭王猶今日之事大王也若復得罪在他國終身不敢謀趙之奴𨽻况子孫乎趙王乃止封樂毅于觀津故城在今直𨽻冀州武邑縣東南號望諸君尊寵之以警動于燕齊燕王恐趙用之以乘其敝乃使人讓毅且謝之曰將軍捐燕歸趙自為計則可矣何以報先王所以遇將軍之意乎毅報書曰免身立功以明先王之迹臣之上計也罹毁辱之謗墮先王之名臣之大恐也臨不測之罪以幸為利謂與趙謀燕義之所不敢出也古之君子交絶不出惡聲忠臣去國不潔其名臣雖不佞數奉教于君子矣燕乃復以毅子間為昌國君而毅往來復通燕竟卒于趙田文卒齊魏滅薛綱目提要田文卒下有齊魏滅薛四字今從之初齊湣王既滅宋欲去孟嘗君孟嘗君奔魏魏以為相與諸侯共伐破齊齊王襄王復國而孟嘗君中立為諸侯無所屬齊王畏之與連和至是卒諸子爭立齊魏共滅之癸未三十七年燕惠王元年秦白起伐楚拔郢今湖北荆州府江陵縣楚郢都有故郢城在縣東南楚徙都陳今河南陳州府注見前白起攻楚拔郢燒夷陵楚先王墓史記索隱夷陵陵名後遂為縣今湖北宜昌府東湖縣是也楚王兵散遂不復戰東北徙都于陳秦遂置南郡今荆州府秦為南郡封起為武安君胡三省注戰國之君分封其臣如平原武安之類非真食其縣之入也明年秦復取楚巫黔中注俱見前又明年楚王收東地兵淮泗之地得十餘萬復西取秦所拔江南十五邑為郡以拒秦乙酉三十九年魏安釐王元年魏封公子無忌魏昭王少子安釐王異母弟為信陵君今河南歸德府寧陵縣有寧陵故城無忌食邑無忌仁而下士士無賢不肖皆以禮交之士以此爭往歸焉戊子四十二年趙魏伐韓秦救之大破其軍魏割南陽即春秋晉南陽戰國屬魏以和先是秦伐魏韓救之秦大破韓軍斬首四萬魏納八城于秦又割溫即春秋晉溫邑注見前以和至是魏與趙伐韓韓告急于秦秦救韓敗趙魏之師斬首沈卒十五萬斬魏軍首十三萬沈趙卒二萬人于河魏將段干子請割南陽豫秦以和蘇代曰欲璽者段干子也謂假干子欲得秦封故請魏割地欲地者秦也今王使欲地者制璽欲璽者制地魏地盡矣夫以地事秦猶抱薪救火薪不盡火不滅王曰事已行不可更矣代曰博之所以貴梟者便則食不便則止博局戲以五木為骰有梟盧雉犢塞五者之采梟為最勝便宜也得梟者合食其子不便則為徐行食行棊也今何王之用智不如用梟也魏王卒不聽己丑四十三年韓桓惠王元年楚太子完質于秦秦王將使武安君與韓魏伐楚楚使者黃歇黃氏黃之後歇楚人至秦聞之恐其一舉而滅楚也乃上書曰楚國援也鄰國敵也今王妬楚之不毁而忘毁楚之彊韓魏臣恐韓魏之卒欺大國也何則王無重世猶言再世之德于韓魏而有纍世之怨乃欲資之與攻楚不亦過乎臣為王慮莫若善楚秦楚合一則韓魏必為關內之侯注地以兵截之也于齊則齊右壤可拱手而取也王之地一經兩海東西為經取齊右壤則自西海至東海皆為秦地故曰一經要約天下然後危動燕趙直搖齊楚此四國者不待痛而服矣秦王從之使歇歸約親于楚楚復使歇侍太子完為質于秦庚寅四十四年燕武成王元年辛卯四十五年秦圍趙閼與音焉與城名在今山西沁州西北俗呼烏蘇村趙奢趙人擊却之初趙奢為田部吏收租稅平原君家不肯出奢以法殺其用事者九人平原君怒將殺之奢曰君于趙為貴公子今縱君家而不奉公則法削法削則國弱國弱則諸侯加兵是無趙也君安得有此富乎以君之貴奉公如法則上下平上下平則國强國強則趙固而君為貴戚豈輕于天下邪平原君賢之言于王使治國賦國賦大平民富而府庫實及秦圍閼與趙王召羣臣問之亷頗樂乘樂毅宗人皆曰道逺險狹難救奢曰道逺險狹如兩鼠鬬于穴中將勇者勝王乃令奢將兵救之去邯鄲三十里而止令軍中曰有以軍事諫者死秦師軍武安今縣屬河南彰德府有故城在縣西南即秦人勒兵處西鼓譟勒兵武安屋瓦皆震有言急救武安者奢立斬之堅壁二十八日不行復益增壘秦間入趙軍奢善食而遣之間還報秦將大喜奢既遣間卷甲而趨一日一夜距閼與五十里而軍軍壘成秦師聞之悉甲而往趙軍士許歷許以國為氏請諫奢進之歷曰秦不意趙至此其來氣盛必厚集其陳以待之不然必敗奢曰請受教歷請刑不許歷復請曰先據北山者勝奢即發萬人趨之秦師後至爭山不得上奢縱兵擊之秦師大敗解閼與而還趙封奢為馬服君服䖍曰馬服猶言服馬也史記正義因馬服山為號也山在邯鄲縣西北以許歷為國尉明年秦復攻趙閼與不拔秦以范雎范晉范氏之别雎魏人字叔為客卿初范睢欲事魏王家貧無以自資乃先事中大夫須賈須須句之後以國為氏賈使于齊雎從齊王聞雎辨口私賜之金賈疑雎以國隂事告齊也歸告其相魏齊魏諸公子齊怒笞擊睢折脅摺齒置厠中睢佯死得出魏人鄭安平鄭以國為氏持睢亡匿更姓名曰張祿秦謁者秦官名王稽王氏所出不一鄭樵統謂其王者之裔以爵為氏使魏載與俱歸薦之王王見之離宫雎佯為不知永巷而入其中王來而宦者怒逐之曰王至睢謬曰秦安得王獨有太后穰侯魏冉封穰侯穰故城在今河南南陽府鄧州耳王微聞其言乃屏左右跽而請者三曰先生幸教寡人睢曰臣羈旅之臣也交踈于王而所願陳者皆匡君之事處人骨肉之間願效愚忠而未知王之心也王跽曰事無大小上及太后下至天臣願先生悉以教寡人無疑也睢見左右多竊聽者未敢言內先言外事以觀秦王之俯仰因進曰穰侯越韓魏而攻齊非計也是年穰侯伐齊取剛壽剛壽二邑名剛今兖州府寧陽縣之故剛城是壽今兖州府之夀張縣是今不如逺交而近攻得寸則王之寸也得尺則王之尺也夫韓魏中國之處去聲謂中國所在而天下之樞也王若欲霸必親中國以為天下樞而威楚趙則齊附而韓魏可虜矣王曰善乃以睢為客卿與謀兵事後二年秦始用范雎之謀伐魏取懷又二年拔魏邢邱又二年伐韓拔九城取南陽攻絶太行道故懷周畿內邑戰國屬魏今懷慶府武陟縣有懷縣城邢邱注見前春秋晉邑戰國屬魏考邢邱即平臯班志應劭注甚明杜預左傳注從之王幼學不之考引魏世家以為即郪邱又引徐廣注以為即廪邱其說殊混乙未四十九年秦君廢其母逐魏冉穰侯芊戎華陽君公子市髙陵君公子悝涇陽君二君皆秦昭王同母弟以范雎為丞相封應侯古應城在今河南汝州寶豐縣范睢日益親用事因私說秦王曰臣居山東時聞齊有孟嘗君不聞有王聞秦有太后穰侯不聞有王夫擅國之謂王能利害之謂王制殺生之謂王今太后擅行不顧太后與義渠戎王亂生二子遂詐殺戎王起兵滅義渠穰侯出使不報華陽涇陽擊斷無諱謂刑人無所避忌髙陵進退不請四貴備而國不危未之有也臣聞木實繁者披其枝披其枝者傷其心大其都者危其國尊其臣者卑其主今四貴用事而王獨立于朝竊恐萬世之後有秦國者非王子孫也秦王以為然于是廢太后明年以憂死逐穰侯及華陽涇陽髙陵三君于關外各令就封穰侯卒于陶涇陽君未之國而卒定陶魏冉封邑史記冉封穰復益封陶孟康曰陶即陶徐廣曰陶一作隂考定陶在今山東曹州府穰故城在今南陽府鄧州地隔韓魏相去殊逺隂故楚邑今襄陽府光化縣隂故城是也與南陽鄰近徐說似為得之以睢為丞相封應侯丙申五十年趙孝成王丹元年秦伐趙齊救郤之秦攻趙趙王新立趙惠文王卒太子丹立是為孝成王太后用事求救于齊齊人曰必以長安君惠文王少子史記正義長安君以長安善故名為質太后不可齊師不出大臣彊諫太后明謂左右曰有復言者老婦必唾其面左師觸龍左師冗散之官以優老臣者觸龍名也戰國策作觸讋請見太后盛氣而胥待也之入左師徐趨而坐謝曰老臣病足不得見久矣恐太后之體有所苦也故願望見太后太后曰老婦恃輦而行曰食得毋衰乎曰恃粥耳太后不和之色稍解左師曰賤息舒祺兒子曰息舒祺名也最少不肖而臣衰竊愛之願得補黑衣皂衣也衛士之服之缺以衛王宫太后曰諾年幾何矣對曰十五嵗矣雖少願及臣未填溝壑而託之太后曰丈夫亦愛少子乎對曰甚于婦人太后笑曰婦人異甚對曰老臣竊以媪婦老者之稱之愛燕后賢于長安君太后曰君過矣不如長安君甚左師曰父母愛其子必為之計深逺媪之送燕后也持其踵而哭念其逺也亦哀之矣已行非不思也祭祀則祝之曰必勿使反勿使失意于燕而反趙也豈非為之計長久為子孫相繼為王也哉太后曰然左師曰今三世以前至于趙王之子孫為侯者其繼有在者乎曰無有曰此其近者禍及身逺者及其子孫豈人主之子侯則不善哉位尊而無功奉讀曰俸厚而無勞而挾重器多也今媪尊長安君之位封以膏腴之地多與之重器而不及今令有功于趙一旦山陵崩長安君何以自託于趙哉太后曰諾恣君之所使之于是為長安君約車百乘質于齊齊師乃出秦師退丁酉五十一年齊王建元年戊戌五十二年楚太子完自秦逃歸楚君橫卒完立是為考烈王以黃歇為相封春申君楚王頃襄王疾病黃歇侍太子于秦聞之言于應侯曰楚王疾恐不起秦若歸其太子則是親與國而得儲萬乘也不歸則咸陽布衣耳楚更立君必不事秦應侯以告秦王王令太子傅先往問疾反而後圖之歇與太子謀曰王疾病而陽文君之子二人在中王若卒大命陽文君之子必立為後太子不得奉宗廟矣乃教太子變服為楚使者御以出關而自為守舍謝病度已逺乃自言請死王怒欲聽之應侯曰歇出身以徇其主太子立必用歇不如歸之以親楚王從之歇至楚三月頃襄王薨太子即位以歇為相封之淮北歇後請于楚王徙封于吳城吳故墟而都之歇所都今蘇州府治是己亥五十三年秦白起伐韓拔野王今河南懷慶府河內縣是上黨今山西潞安府秦上黨郡以其地極髙與天為黨故名降趙秦拔韓野王上黨路絶上黨守馮亭畢公之後食采于馮因以為氏與其民謀曰鄭道韓治鄭都故云已絶不如歸趙趙受我秦必攻之趙被秦兵必親韓韓趙為一則可以當秦矣乃告于趙曰韓不能守上黨入之秦其吏民皆安為趙不樂為秦願再拜獻之大王趙王以問平陽君豹對曰聖人甚禍無故之利王曰何謂無故對曰秦蠶食韓地中絶不令相通固自以為坐而受上黨也韓氏所以不入之秦者欲嫁其禍于趙也秦服其勞而趙受其利雖彊大不能得之于弱小弱小顧能得之于彊大乎豈得謂非無故不如勿受平原君請受之王乃使平原君往受地封亭為華陽君亭垂涕不見使者曰吾不忍賣主之地而食之也辛丑五十五年秦王齕攻趙上黨拔之白起代將大破趙軍殺其將趙括坑降卒四十萬秦使王齕攻上黨拔之上黨民走趙趙廉頗軍長平故城在今山西澤州府髙平縣西元和志秦白起敗趙括于此以按音遏捺也據援也之謂屯兵長平以援上黨齕遂攻趙趙軍數敗亷頗堅壁不出又失亡多趙王怒數讓之應侯又使人行千金于趙為反間曰秦獨畏馬服君之子括為將耳亷頗易與且降矣趙王遂以括代頗將藺相如曰王以名使括若膠柱鼓瑟絃有緩急調之在柱若膠其柱則不能運轉而絃不調矣括徒能讀其父書傳不知合變也王不聽括自少學兵法嘗與父奢言之奢不能難然不謂善括母問其故奢曰兵死地也而括易言之趙若將括破趙軍者必括也括將行其母上書言括不可使王曰母置之吾已決矣母曰即有不稱妾請無隨坐王許之秦王聞括為將乃隂使武安君為上將而齕為禆將令軍中敢泄者斬括至軍悉更約束易置軍吏出兵擊秦武安君佯敗走張二竒兵以劫之趙括乘勝追造秦壁壁堅拒不得入而秦竒兵絶其後軍分為二糧道絶武安君出輕兵擊之趙戰不利因築壁堅守以待救至秦王自如河內發民年十五以上悉詣長平遮絶趙救兵及糧食趙請粟于齊齊王勿許趙軍絶食四十六日人相食急攻秦壘欲出不得括自出搏戰秦射殺之卒四十萬人皆降武安君挾詐盡坑之遺其小者二百四十人歸趙前後斬首虜四十五萬人趙人大震壬寅五十六年秦攻趙拔武安注見前皮牢即皮氏注見前定太原上黨韓趙又割地以和武安君分軍為三王齕拔武安皮牢司馬梗北定太原盡有上黨地韓趙恐使蘇代說應侯曰趙亡則秦王王去聲言秦王破趙則將王天下也而武安君為三公矣君能為之下乎且趙亡北地入燕東地入齊南地入韓魏秦之所得幾何不如因而割之無以為武安君功也應侯言于秦王曰秦兵勞請許韓趙割地以和王聽之割韓垣雍即春秋衡雍注見前趙六城而罷兵武安君由是與應侯有隙魏以孔斌穿之子字子順孔子七世孫為相尋以病免初魏王聞孔斌賢聘以為相斌改嬖寵之官以事賢才奪無任之祿以賜有功諸喪職秩者咸不悅斌陳大計又不用乃以病致仕人謂之曰子其行乎答曰行將安之山東之國將并于秦秦為不義義所不入遂寢于家喟然嘆曰死病無良醫不出二十年天下其盡為秦乎秦之始伐趙也魏人皆以于魏為便斌曰何謂也曰秦勝吾因而服焉不勝則乘其弊而擊之斌曰不然秦貪暴之國也勝趙必復他求吾恐于時魏受其師也先人有言燕雀處屋子母相哺詬詬相樂自以為安矣竈突炎上棟宇將焚燕雀顔不變不知禍之將及已也今子不悟趙破而患將及魏可以人而同于燕雀乎秦誘執趙公子勝既而歸之初魏須賈聘于秦范睢因辱之范雎既相秦號曰張祿魏不知也須賈至秦雎微服往見賈驚曰范叔固無恙乎留坐飲食取一綈袍贈之睢遂為賈御至相府雎請先入良久賈問門下曰范叔何不出也門下曰無范叔鄉者吾相君也賈知見賣乃膝行入謝罪雎坐責讓之且曰爾所以得無死者以綈袍戀戀尚有故人之意耳乃大供具請諸侯使坐賈堂下置莝豆而馬食之使歸告魏王曰速斬魏齊頭來不然且屠大梁須賈還以告魏齊齊奔趙匿平原君家秦王欲為范雎必報其仇乃誘平原君至而執之使謂趙王曰不得齊首吾不出王弟于關齊窮扺虞卿游說之士為趙上卿食邑于虞故號虞卿虞卿棄相印與齊偕亡走魏信陵君意難見之齊怒自殺趙王卒取其首以與秦秦乃歸平原君雎言王稽于秦王王以為河東守又任鄭安平王以為將軍雎散家財物以報嘗所困厄者一飯之德必償睚眦之仇必報癸卯五十七年秦伐趙圍邯鄲趙公子勝如楚乞師楚黃歇帥師救趙秦武安君病使王陵伐趙攻邯鄲少利武安君病愈王欲使代之武安君辭不行武安君曰邯鄲實未易攻且諸侯之救日至趙應其內諸侯攻其外破秦軍必矣王使應侯請之終不肯行乃以王齕代陵趙王使平原君求救于楚平原君約其門下客文武備具者二十人與俱得十九人餘無可取者毛遂毛以國為氏自薦平原君曰賢士之處世如錐之處囊中其末立見今先生處勝門下三年矣勝未有所聞是先生無所有也遂曰臣乃今日請處囊中耳使臣得早處囊中乃脫穎而出非特其末見而已平原君乃與之俱十九人相與目笑之比至楚平原君與楚王言合從之利久而不决毛遂按劔歷階而上曰從之利害兩言而决耳今日出而言日中不决何也楚王怒叱之遂按劔而前曰王之所以叱遂者以楚國之衆也今十步之內王不得恃楚國之衆也王之命縣于遂手吾君在前叱者何也且遂聞湯以七十里而王天下文王以百里而臣諸侯今楚地方五千里持㦸百萬此霸王之資也白起小豎子耳率數萬之衆一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨趙之所羞而王不知惡焉合從者為楚非為趙也楚王曰唯唯乃與楚王歃血毛遂取血奉銅盤而跪進之楚王曰王當歃血次者吾君次者遂以手招十九人曰相與歃此血于堂下公等録録所謂因人成事者也定從而歸平原君曰勝不敢復相天下士矣因以毛遂為上客而楚使春申君將兵救趙魏晉鄙晉既滅子孫以國為氏鄙魏將軍帥師救趙次于鄴注見前公子無忌襲殺鄙奪其軍以進魏王使晉鄙救趙秦王使謂魏王曰吾攻趙旦暮且下諸侯敢救者必移兵先擊之魏王恐止晉鄙壁鄴又使新垣衍陳留風俗傳畢公之後居于梁為新垣氏說趙王欲共尊秦為帝以却其兵魯仲連在邯鄲聞之往見衍曰彼秦者棄禮義而上首功秦以戰而能斬首有功者為上故曰上首功之國也即肆然而為帝則連有蹈東海而死耳不願為之民也且秦梁皆萬乘之國秦無已而帝則將行天子之禮以號令天下變易諸侯之大臣奪其所憎而與其所愛梁王安得晏然而已乎而將軍又何以得故寵乎衍再拜曰吾乃今知先生天下士也不敢復言帝秦矣初魏有隱士曰侯嬴侯氏出于鄭侯宣多年七十家貧為大梁夷門梁之東門監者公子無忌聞其賢欲厚遺之不可公子乃置酒大㑹賔客坐定從車騎虛左自迎侯生侯生攝敝衣冠直上載不讓公子執轡愈恭生又謂公子曰臣有客在市屠中願枉車騎過之公子引車入市生下見其客睥睨故久立與其客語微察公子公子色愈恭乃謝客就車侯生至引坐上坐賔客皆驚及秦圍趙趙平原君夫人公子姊也使者冠蓋相屬于魏讓魏救不至公子數請于魏王及賔客辨士游說萬端王終不聽公子乃屬賔客約車騎百餘乘欲赴鬭以死于趙過見侯生生曰公子無他端而欲赴秦軍如以肉投餒虎何功之有公子再拜問計生曰吾聞晉鄙兵符符以代古之圭璋取簡易也在王卧內如姬姬姓如最幸力能竊之公子嘗為姬報其父讎姬欲為公子死無所辭誠一開口則得虎符兵符以虎為之取其威猛奪鄙兵北救趙西却秦此五伯之功也公子如其言果得兵符侯生曰將在外君令有所不受有如鄙疑而復請之則事危矣臣客朱亥邾為楚所滅子孫乃去邑氏朱力士可與俱鄙不聽使擊之公子至鄴晉鄙合符果疑之亥袖四十斤鐵椎椎殺鄙公子勒兵下令曰父子俱在軍中者父歸兄弟俱在軍中者兄歸獨子無兄弟者歸養得選兵八萬人將之而進公子之行也與侯生訣生曰臣老不能從請數公子至晉鄙軍之日北鄉自剄以送公子及公子至軍生果自剄甲辰五十八年燕孝王元年秦殺白起王齕久圍邯鄲不拔諸侯來救戰數不利武安君曰不聽吾計今何如矣秦王聞之怒彊起之武安君稱病篤乃免為士伍遷之隂密即密須注見前行至杜郵今陜西西安府咸陽縣東有杜郵館即白起伏劒處郵傳驛之郵亭也應侯曰起之遷意怏怏有餘言王乃使賜之劔武安君引劍將自剄曰我何罪于天而至此哉良久曰我固當死長平之戰趙卒降者數十萬我詐而盡坑之是足以死遂自殺應侯乃任鄭安平使將擊趙魏公子無忌大破秦軍邯鄲下信陵君大破秦軍于邯鄲下王齕解圍走鄭安平以二萬人降趙信陵君不敢歸魏使將將其軍以還趙王德信陵君欲以五城封之信陵君有自功之色客或說曰物有不可忘有不可不忘人有德于公子公子不可忘也公子有德于人願公子忘之于是信陵君立自責若無所容趙王自迎執主人之禮引信陵君就西階信陵君側行辭讓從東階上自言罪古文罪字秦始皇以其近皇字故改為罪過以負于魏無功于趙飲至暮趙王以信陵君退讓竟不忍言獻五城平原君欲封魯仲連仲連不受乃以千金為壽仲連笑曰所貴為天下士者為人排患難解紛亂而無取也即有取者是商賈之事連不忍為也遂辭去秦太子秦昭襄王太子死以其次子安國君為太子安國君名柱即孝文王之子異人自趙逃歸秦太子妃曰華陽湯沐邑名夫人無子夏姬生子異人質于趙秦數伐趙趙不禮之困不得意陽翟注見前大賈吕不韋吕以國為氏適邯鄲見之曰此竒貨可居居積也以異人方財貨言可居積以射利乃說之曰太子愛華陽夫人而無子子之兄弟二十餘人子居中不甚見幸太子即位子不得爭為嗣矣異人曰奈何不韋曰能立適嗣者獨華陽夫人耳不韋雖貧請以千金為子西游立子為嗣異人曰必如君䇿秦國與子共之不韋乃與五百金令結賔客復以五百金買竒物玩好自奉而西見夫人姊而以獻于夫人因譽異人之賢賔客遍天下日夜泣思太子及夫人曰異人也以夫人為天夫人喜不韋因使其姊說曰夫人愛而無子不以繁華時蚤自結于諸子中賢孝者舉以為適即色衰愛弛雖欲開一言尚可得乎今異人賢自知中子不得為適誠以此時拔之是異人無國而有國夫人無子而有子也則終身有寵于秦矣夫人以為然乘間言于太子太子許之與夫人刻玉符約以為嗣因請不韋傅之不韋取邯鄲姬絶美者與居有身異人見而請之不韋佯怒既而獻之期年而生子政即始皇異人遂以為夫人邯鄲之圍趙欲殺異人不韋賂守者得脫亡赴秦軍遂歸趙欲殺異人妻子姬故趙豪家女得匿母子皆不死後趙歸之于秦異人楚服而見夫人夫人曰吾楚人也當自子之因更名曰楚乙巳五十九年秦伐韓趙王命諸侯討之秦遂入冦西周君武公入秦獻地王卒綱目作王入秦獻地歸而卒考史記秦使將軍摎攻西周西周君奔秦正義曰謂西周武公又史記周君王赧卒索隱曰此周君即西周武公時武公與王赧俱卒故連言之據此則獻地入秦者乃武公而非赧王周君王赧者乃兩人而非一人今以史記按之既云西周君奔秦則獻地當係之武公不得以為赧王今從正義說改書至所云周君王赧蓋即指赧王一人而言稱之曰周君而不沒其王號也若如索隱所云史記何不于周君之上加以西字且赧王武公既同時而卒何不書王赧于周君之上而顧以臣先君乎說不足據今仍書王卒蓋武公既獻地則王亦從失尊例書卒也秦伐韓取陽城負黍注俱見前斬首四萬伐趙取二十餘縣斬首九萬王恐史記作西周恐時王寄居西周故史記云與諸侯約從將天下鋭師出伊闕注見前攻秦令無得通陽城秦使將軍摎來攻西周君奔秦頓首受罪盡獻其邑三十六口三萬秦受其獻歸西周君于周是嵗王卒丙東周君一秦昭襄王五十二楚考烈王八燕孝王三午魏安釐王二十二趙孝成王十一韓桓惠王十八齊王建十年是年燕孝王薨子喜立周通鑑于是嵗即以秦系年綱目則用分注而不書東君今依綱目分注例兼採薛應旗甲子彚紀先書東周君于前次列七國于後秦丞相范睢免鄭安平既降趙秦王令毋得言其事以順適應侯之意至是王稽坐與諸侯通棄市王臨朝而嘆應侯請其故王曰武安君死而鄭安平王稽皆應侯所任等皆畔內無良將外多敵國吾是以憂應侯懼不知所出燕客蔡澤蔡以國為氏澤燕人聞之西入秦先使人宣言于應侯曰蔡澤見王必奪君位應侯召澤讓之澤曰吁君何見之晚也夫四時之序成功者退商君吳起大夫種事俱見前何足願歟應侯謬曰何為不可君子有殺身以成名死無所恨澤曰身名俱全者上也名可法而身死者次也三子之可願孰與閎夭周公哉語曰日中則移月滿則虧進退嬴縮與時變化今君怨已讎而德已報意欲至矣而無變計竊為君危之應侯曰善遂薦澤于王因謝病免王悅澤計以為相數月免澤初游學干諸侯不遇從唐舉相曰富貴吾所自有不知者夀也舉曰先生之夀自今以往四十三嵗澤笑而去曰吾持梁齒肥富貴四十三年足矣及入秦既為相人或惡之澤乃謝病歸相印號綱成君居秦十餘年卒唐舉梁人楚以荀况晉荀氏之别况趙人時人相尊號之曰卿漢避宣帝諱曰孫卿為蘭陵故城在今山東兖州府嶧縣東令况游學于齊三為祭酒老師儒之稱適楚春申君以為蘭陵令况嘗與臨武君荀子注楚將未知姓名論兵于趙王孝成王前王曰請問兵要况曰要在附民仁人之兵上下一心下之于上也若子弟之事父兄手臂之扞頭目而覆胸腹也故齊之技擊技材力也技擊以勇力擊斬敵者不可以遇魏之武卒選擇武勇之士以度取之魏之武卒不可以遇秦之鋭士以功賞相長得五甲首則役𨽻五家故為最彊秦之鋭士不可以當桓文之節制桓文之節制不可以敵湯武之仁義王曰請問為將况曰號令欲嚴以威賞罰欲必以信處舍營壘也欲周以固徙舉進退欲安以重靜則安重不為輕舉欲疾以速動則疾速不失機宜窺敵觀變謂用問諜欲潛以深潛隱深入欲伍以參錯雜敵中盡知其事遇敵决戰必行吾所明無行吾所疑是之謂六術無欲將而惡廢欲將求進也惡廢懼黜也無怠勝而忘敗既勝而怠則忘敗無威內而輕外無見利而不顧其害凡慮事欲熟而用財欲泰不當吝賞是之謂五權可殺而不可使處不完可殺而不可使擊不勝可殺而不可使欺百姓是之謂三至凡百事之成也必在敬之其敗也必在慢之敬謀無曠敬事無曠敬吏無曠敬衆無曠敬敵無曠是之謂五無曠慎行此六術五權三至而處之以恭敬無曠是之謂天下之大將于是臨武君稱善陳囂問曰先生議兵以仁義為本又何以兵為哉况曰仁者愛人故惡人之害之也義者循理故惡人之亂之也彼兵者所以禁暴除害非爭奪也後春申君死荀卿廢因家蘭陵著書數萬言流傳于世秦遷西周公索隱武公子文公于􅓆狐聚在今河南汝州東北周既獻地其民不樂屬秦遂東亡于是秦取周九鼎寶器而遷西周公于􅓆狐戊東周君三秦昭襄五十四楚考烈十燕王喜二魏安申釐二十四趙孝成十三韓桓惠二十齊王建十二年秦王郊見上帝于雍注見前是時天下皆賔于秦魏後至秦使將軍摎伐之取吳城即虞城注見前于是韓王入朝魏舉國聽命庚東周君五秦昭襄五十六楚考烈十二燕王喜四魏戌安釐二十六趙孝成十五韓桓惠二十二齊王建十四年秦王稷薨子柱立是為孝文王韓王衰絰入弔祠諸侯皆使其將相往視喪事燕伐趙趙敗之遂圍燕燕王使栗腹栗氏栗陸氏之後約歡于趙反而言曰趙壯者死長平其孤未壯可伐也王使腹將而攻鄗今直𨽻趙州柏鄉縣北有鄗縣故城春秋晉邑戰國屬趙將渠索隱人姓名或云將官渠其名也曰與人通關約交使者報而攻之不祥師必無功王不聽自將偏軍隨之將渠又泣諌不從趙使亷頗擊之敗其兩軍逐北五百里遂圍燕燕人請和趙人曰必令將渠處和謂主和也燕王以將渠為相而處和趙師乃解是年趙公子勝卒辛東周君六秦孝文元楚考烈十三燕王喜五魏安釐亥二十七趙孝成十六韓桓惠二十三齊王建十五年冬十月秦王柱薨子楚立是為莊襄王秦孝文王即位三日而薨子楚立尊華陽夫人為華陽太后夏姬為夏太后燕伐齊拔聊城今縣屬山東東昌府齊攻取之燕將攻齊聊城拔之或譖之燕王燕將保聊城不敢歸齊田單攻之嵗餘不下魯仲連乃為書約之矢以射城中遺燕將曰為公計者不歸燕則歸齊今獨守孤城齊兵日益而燕救不至將何為乎燕將見書泣三日遂自殺聊城亂田單克之歸言仲連于齊王欲爵之仲連逃之海上曰吾與富貴而詘于人寧貧賤而輕世肆志焉魏王嘗問天下之髙士于孔斌斌曰世無其人也抑可以為次其魯仲連乎壬東周君七秦莊襄元楚考烈十四燕王喜六魏安釐子二十八趙孝成十七韓桓惠二十四齊王建十六年是嵗東周亡秦以吕不韋為相國封不韋為文信侯食河南洛陽十萬户秦滅東周遷其君于陽人聚在今河南汝州西亦名陽人城東周君與諸侯謀伐秦秦使吕不韋滅之遷東周君于陽人聚周遂不祀周自武王已卯受命至赧王乙巳凡三十七王三十三世八百六十七年又東周君七年共八百七十四年秦伐韓取滎陽故城在今河南開封府滎澤縣西南成臯即春秋鄭虎牢注見前秦界至大梁初置三川注見前郡今河南府秦三川郡漢更名河南楚滅魯先是楚遷魯于莒注見前而取其地至是遂滅魯遷魯君頃公讎于卞注見前為家人周公不祀魯自周公至頃公凡三十四世癸秦莊襄二楚考烈十五燕王喜七魏安釐二十丑九趙考成十八韓桓惠二十五齊王建十七年日食甲秦莊襄三楚考烈十六燕王喜八魏安釐三十寅趙孝成十九韓桓惠二十六齊王建十八年秦伐魏魏公子無忌率五國之師敗之追至函谷而還秦使蒙驁䝉氏以䝉山為氏驁齊人仕秦為上卿伐魏拔髙都今山西澤州府鳳臺縣髙都村是汲故城在今河南衛輝府汲縣西南魏王患之使人請信陵君信陵君不肯還其客毛公薛公皆趙處士毛公隱于博徒薛公隱于賣漿家信陵君從之游平原君聞而非之信陵君曰平原君徒豪舉耳不求士也以無忌從此兩人游尚恐其不我欲也乃以為羞乎及魏使至信陵君誡門下勿許通賔客莫敢勸兩人獨往見諫曰公子所以重于諸侯者徒以有魏也今魏急而公子不恤一旦秦克大梁夷先王之宗廟公子何面目立天下乎語未畢信陵君色變趣駕還魏魏王持信陵君而泣以為上將軍求援于諸侯諸侯聞信陵君復為魏將皆遣兵救魏信陵君遂率五國之師敗䝉驁于河外胡三省注自春秋至戰國率以黃河之西為河外晉賂秦以河外列城五即其證也追至函谷關而還五月秦王楚薨子政立即始皇帝政生十三年矣國事皆委于文信侯號仲父乙秦王政元楚考烈十七燕王喜九魏安釐三十卯一趙孝成二十韓桓惠二十七齊王建十九年秦鑿涇水注見前為渠韓欲疲秦使無東伐乃使水工鄭國為間于秦鑿涇水自仲山在今陕西西安府涇陽縣西北為渠並步浪反與傍通北山東注洛中作而覺秦欲殺之國曰臣為韓延數年之命然渠成亦秦萬世之利也乃使卒為之鄭渠故道自今涇陽縣西北分涇水東流歷三原富平蒲城諸縣界入沮洛久堙注填閼壅泥也之水溉舄鹵鹹地也之地四萬餘頃收皆畝一鍾六斛四斗由是秦益富饒丙秦王二楚考烈十八燕王喜十魏安釐三十二辰趙孝成二十一韓桓惠二十八齊王建二十年趙王丹薨廉頗奔魏趙使廉頗伐魏取繁陽故城在今河南彰德府內黃縣東孝成王薨太子偃立是為悼襄王使樂乘代頗頗怒攻之遂奔魏魏不能用趙師數困于秦趙王悼襄王思復得頗使使視頗尚可用否頗之仇郭開多與使者金令毁之頗見使者一飯斗米肉十斤被甲上馬以示可用使者還報曰廉將軍老尚善飯然與臣坐頃之三遺矢矣王遂不召楚人迎之頗一為楚將無功曰我思用趙人遂卒于楚丁秦王三楚考烈十九燕王喜十一魏安釐三十已三趙悼襄元韓桓惠二十九齊王建二十一年趙以李牧為將李牧者趙北邊良將嘗居代今宣化府蔚州趙為代郡秦因之雁門今山西代州趙為雁門郡秦因之備胸奴夏桀少子淳維逃居北野殷曰獯粥周曰獫狁戰國以後曰胸奴以便宜置吏市租皆輸莫府莫亦作幕古者出征以幕帳為府署故名為士卒費日擊數牛饗士習騎射謹烽火多間諜為約曰胸奴入盜則急收保收畜産自保有敢捕虜者斬如是數嵗無所亡失胸奴皆以為怯雖趙邊兵亦以為怯趙王使人讓之牧如故王怒使人代之屢出戰不利邊不得田畜王復請牧牧稱病不出王彊起之牧曰必用臣臣如前乃敢奉令王許之牧之邊如約胸奴數嵗無所得終以為怯邊士卒日得賞賜皆願一戰乃選車騎習戰大縱畜牧人民滿野胸奴小入佯北以數十人委之單于胸奴天子之稱聞之大率衆入牧乃多為竒陳張左右翼擊之大破殺胸奴十餘萬騎單于奔走十餘嵗不敢近趙邊魏公子無忌卒秦既敗于河外使人行萬金以間信陵君求得晉鄙客令說魏王曰公子亡在外十年矣今復為將諸侯皆屬天下徒聞信陵君不聞有王矣秦王又數使人賀信陵君曰得為魏王未也魏王信之使人代將于是信陵君謝病不朝日夜以酒色自娛四嵗而卒戊秦王四楚考烈二十燕王喜十二魏安釐三十四趙午悼襄二韓桓惠三十齊王建二十二年是嵗魏安釐王卒太子增立是為景湣王秋七月秦蝗疫先是秦大饑在丁巳年至是蝗疫令民納粟千石拜爵一級後五年夏四月秦大寒民有凍死者庚秦王六楚考烈二十二燕王喜十四魏景湣二申趙悼襄四韓桓惠三十二齊王建二十四年楚趙魏韓衛合從以伐秦至函谷皆敗走諸侯患秦攻伐無已時五國合從以伐之楚王為從長春申君用事取壽陵胡三省注壽陵當在宜陽新城問徐廣以為在常山非也至函谷關秦師出五國兵皆敗走楚遷于壽春今江南鳯陽府壽州楚壽春邑考烈王徙都于此朱英觀津人謂楚春申君曰先君時秦善楚二十年不攻者踰黽厄黽亦作冥塞名在今河南汝寧府信陽州東南有大小石門鑿山通道淮南子天下九塞此其一也今曰平靖關而攻楚不便假道兩周背韓魏而攻楚不可今則不然魏旦暮亡不能愛許鄢陵注俱見前割以與秦秦兵去陳百六十里臣見秦楚之日鬭也楚于是去陳徙夀春命曰郢衛徙居野王注見前秦拔魏朝歌注見前及衛濮陽衛都注見前衛君率其支屬徙居野王阻其山以保魏之河內衛元君魏之壻也魏殺懷君而立之故依于魏癸秦王九楚考烈二十五燕王喜十七魏景湣亥五趙悼襄七韓王安元齊王建二十七年彗星見長竟天既而見西方又見北方從斗以南八十日秋九月秦嫪郎報反毒烏改反集覽嫪毒人姓名也作亂伏誅夷三族父族母族妻族也秦王遷其太后于雍注見前初秦王即位年少太后時與文信侯私通王益壯文信侯恐事覺及禍乃以舍人嫪毒詐為宦者進之生二子封毒為長信侯政事皆决于毒至是有告毒實非宦者王下吏治毒毒懼矯王御璽發兵為亂王使相國昌平君昌文君史失其姓名索隱昌平君楚公子也攻毒毒戰敗走獲之夷三族遷太后于雍萯陽宫在今陜西西安府鄠縣西南秦惠文王所建殺其二子下令敢諫者死諫而死者二十七人齊客茅焦周公子封茅其後以國為氏請諫王大怒按劔而坐趣召鑊欲烹之焦徐行至前再拜謁起稱曰臣聞有生者不諱死有國者不諱亡諱死者不可以得生諱亡者不可以得存死生存亡聖主所急欲聞也陛下欲聞之乎王曰何謂也焦曰陛下有狂悖之行車裂假父囊撲以囊投擲而擊殺之二弟遷母于雍殘戮諫士桀紂之行不至于是令天下聞之盡瓦解無嚮秦者臣竊為陛下危之言已解衣伏質與鑕同王下殿手接之爵以上卿自駕虛左方迎太后歸復為母子如初楚王完薨盜殺黃歇楚王無子趙人李園進其妹子春申君既有娠園使妹說春申君曰楚王無子即百嵗後將更立兄弟彼亦貴其故所親君又安得長保此寵乎今妾有娠而人莫知誠以君之重進妾于王賴天而有男則是君之子為王也楚國可盡得矣春申君乃出之謹舍别為館舍以居之奉衛甚謹也而進諸王王召幸之遂生男立為太子園妹為后園亦貴用事恐春申君泄其語隂養死士欲殺之以滅口朱英知之以告春申君春申君曰李園弱人也足下置之英遂亡去及楚王薨園伏死士于棘門夀春城門名之內刺殺春申君滅其家太子立名悍是為幽王甲秦王十楚幽一燕王喜十八魏景湣六于趙悼襄八韓王安二齊王建二十八年冬十月秦相國吕不韋以罪免秦王以不韋奉先王功大不忍誅免就國不韋既之國嵗餘諸侯使者請之相望于道秦王恐其為變賜不韋書曰君何功于秦封十萬戶何親于秦號稱仲父其徙處蜀不韋恐誅飲鴆死鴆鳥出南方噉蝮蛇以其羽畫酒中飲之立死秦大索逐客客卿李斯楚上蔡人從荀卿學入秦吕不韋賢之上書召復故官遂除其令秦宗室大臣議曰諸侯人來仕者皆為其主遊間耳請一切逐之于是大索逐客李斯亦在逐中行且上書曰昔穆公求士取由余由余以下諸人事俱見前于戎得百里奚于宛迎蹇叔于宋求丕豹公孫支于晉并國二十遂霸西戎孝公用商鞅諸侯親服惠王用張儀散六國從使之事秦昭王得范雎彊公室杜私門此四君者皆以客為功由此觀之客何負于秦哉今乃不問可否不論曲直非秦者去為客者逐棄黔首以資敵國却賓客以業諸侯此所謂藉冦兵而齎盜糧者也王乃召斯復其官除逐客令卒用斯謀隂遣辨士齎金玉遊說諸侯厚遺結其名士不可下者刺之離其君臣之計然後使良將將兵隨其後數年之中卒兼天下丁秦王十三楚幽四燕王喜二十一魏景湣卯九趙幽繆二韓王安五齊王建三十一年秦伐趙趙以李牧為大將軍敗秦師于宜安故城在今直𨽻真定府藁城縣西南秦桓齮桓以諡為氏齮秦將軍伐趙殺趙將扈輒扈氏夏有扈氏之後趙以李牧為大將軍復戰宜安秦師敗績桓齮奔還趙封牧為武安君戊秦王十四楚幽五燕王喜二十二魏景湣辰十趙幽繆三韓王安六齊王建三十二年韓遣使稱藩于秦韓諸公子非善刑名法術之學見韓削弱數以書干韓王王不能用非作孤憤言孤直不容于時五蠧言蠧政之事有五說音稅難言游說之道不易等篇十餘萬言至是王使納地效呈獻也璽于秦請為藩臣非因說秦王曰大王誠聽臣說一舉而天下之從不破趙不舉韓不亡荆魏不臣齊燕不親則斬臣狥國以戒為王謀不忠者王悅之未用李斯譖之下吏自殺斯與非同事荀卿斯自以為不如非及非說秦王斯害之遂毁之于王下吏治非斯使人遺非藥令亟自殺秦王後悔赦非非已死矣辛秦王十七楚幽八燕王喜二十五魏景湣十三趙未幽繆六韓王安九齊王建三十五年是歲韓亡秦滅韓虜王安韓自景侯䖍至王安凡十一傳而為秦所滅先是韓獻南陽注見前秦遣使發卒受地尋使內史周官名秦因之掌治京師三輔勝史記作騰滅韓虜王安以其地置潁川郡今河南許州及開封府之禹州新鄭諸州縣皆秦潁川郡地壬秦王十八楚幽九燕王喜二十六魏景申湣十四趙幽繆七齊王建三十六年趙殺其大將軍李牧秦王翦頻陽東鄉人伐趙下井陘今縣屬直𨽻真定府縣西有井陘故關淮南子九塞之一趙使李牧禦之秦多與趙嬖臣郭開金使言牧欲反趙王使趙葱顔聚代牧牧不受命遂捕殺之癸秦王十九楚幽十燕王喜二十七魏景湣十五趙幽酉繆八齊王建三十七年是嵗趙亡楚幽王薨庶兄負芻殺其弟郝而自立魏景湣王薨子假立秦滅趙趙自烈侯籍至幽繆王遷凡十傳而為秦滅虜王遷秦王如邯鄲王翦大破趙軍殺趙葱顔聚亡遂克邯鄲虜趙王遷秦王如邯鄲故與母家有怨者皆殺之王歸王翦屯中山注見前以臨燕趙公子嘉自立為代王初趙王遷之母故倡也嬖于悼襄王王廢適子嘉而立遷遷素無行信讒故用郭開誅李牧遷既為秦虜嘉帥其宗數百人奔代自立為代王趙亡大夫稍稍歸之與燕合兵軍上谷燕郡括地志上谷故城在媯州懷戎縣懷戎今宣化府懷來縣是甲秦王二十楚王負芻元燕王喜二十八戌魏王假元齊王建三十八代王嘉元年燕太子使盜劫秦王不克秦遂擊破燕代兵進圍薊燕都今順天府大興縣初丹嘗質于趙與秦王善及秦王即位丹質于秦秦王不禮焉丹怒亡歸欲報秦王丹問其傅鞠武武請約諸侯媾胸奴以圖之丹以曠日彌久不能須也秦將軍樊於期周仲山甫封樊其後因以為氏得罪亡之燕丹受而舍之鞠武諫不聽丹聞衛人荆軻楚本曰荆其後亦以為氏軻在衛衛人謂之慶卿之燕燕人謂之荆卿賢卑辭厚禮而請見之謂曰丹誠得天下之勇士使于秦劫秦王使悉反諸侯侵地若曹沫之與齊桓公事見前則善矣不可則因而刺殺之惟荆卿留意焉軻許之㑹秦滅趙丹懼欲遣軻軻曰行而無信秦未可親也願得樊將軍首及燕督亢音剛燕膏腴地今順天府涿州東南有督亢陂跨連新城固安二境地圗以獻秦王丹曰樊將軍窮困來歸丹不忍也軻私與於期謀於期遂自刎丹奔往伏哭然已無可奈何乃函其首又嘗豫求天下之利匕首使工以藥焠水與火合為焠之以試人血濡縷血出如絲縷人無不立死者乃裝遣軻以燕勇士秦舞陽為之副使入秦太子賓客知其事者皆白衣冠送之易水上軻之客髙漸離擊筑軻和而歌曰風蕭蕭兮易水寒壯士一去兮不復還遂就車而去軻至咸陽見秦王奉圗以進秦舞陽色變軻顧笑舞陽為謝取圖奉之圖窮而匕首見軻把秦王袖持匕首揕知鴆反擊也之未至身秦王驚起袖絶軻逐王王環柱而走秦法羣臣侍殿上者不得操尺寸兵左右以手共搏之且曰王負劔王遂拔以擊軻斷其左股軻引匕首擲王不中自知事不就罵曰事所以不成者欲生劫之必得約契以報太子也遂體解以狥秦王大怒益發兵就王翦于中山與燕代戰易水西大破之遂圍薊燕王走遼東燕郡地在遼水之東故名斬丹以獻于秦其後荆軻客髙漸離以擊筑事秦王置鉛筑中撲秦王不中被誅丙秦王二十二楚王負芻三燕王喜三十魏王子假三齊王建四十代王嘉三年是嵗魏亡秦伐魏魏王假降殺之遂滅魏魏自文侯斯至王假凡九傳而為秦滅秦王賁王翦子賁音奔伐魏引河溝以灌大梁禹貢錐指河溝即鴻溝亦曰蒗蕩梁水經注梁在浚儀縣北自王賁斷故渠引水東南出以灌大梁謂之梁溝于是水出縣南而不徑其北即浚儀故縣在今開封府西北大梁城魏所都也三月城壞魏王請降秦殺之而以魏地為郡縣戊秦王二十四楚王負芻五燕王喜三十二寅齊王建四十二代王嘉五年是嵗楚亡秦滅楚虜王負芻楚自熊繹始封至負芻凡四十一傳而為秦滅初秦王問于李信秦將軍曰吾欲取荆度用幾何人信曰不過二十萬問王翦翦曰非六十萬人不可秦王曰將軍老矣何怯也乃使信及䝉恬䝉驁之孫將二十萬人伐楚翦謝病歸頻陽秦縣故城在今陜西西安府富平縣東北已而信敗楚軍引兵西與䝉恬㑹楚人因隨之三日三夜不頓舍大敗秦師信奔還秦王怒自詣頻陽謝翦強起之使將六十萬人伐楚王親送至灞上灞水在今陜西西安府城東源出秦嶺合滻水北注于渭翦請美田宅甚衆王曰將軍行矣何憂貧既行又使使者數請之或曰將軍之乞貸亦已甚矣翦曰王怛與粗通中而不信人今空國委我不請田宅以自堅顧令王坐而疑我矣翦至平輿故城在今河南汝寧府汝寧縣東南楚人禦之翦堅壁不戰日休士洗沐而善飲食撫循之親與士卒同食久之問軍中戲乎對曰方投石超距跳躍也翦曰可矣楚既不得戰引而東翦追擊大破之殺其將項燕燕之先世為楚將封于項故姓項氏楚師敗走翦乘勝略定城邑至是遂滅楚置楚郡秦置楚郡冶夀春兼有淮南之地已秦王二十五燕王喜三十三齊王建卯四十三代王嘉六年是嵗燕代亡秦滅燕虜王喜滅代虜王嘉燕自召公至王喜凡四十三傳而為秦滅秦大興兵使王賁攻遼東虜燕王喜還遂滅代虜王嘉是年王翦定江南降百越置㑹稽郡秦㑹稽郡治吳縣兼有兩浙之地御批歷代通鑑輯覽卷十

front:
  text: 欽定四庫全書御批歴代通鑑輯覽卷七周景王戊辰十有二年使詹伯詹桓伯周大夫如晉晉使趙成趙武之子謚景子來致閻田氏族畧唐叔虞之後晉成公子懿食采于閻春秋彚纂注閻屬晉與甘相近之邑
  hash: sha256:9324805cd2cba9ad9794c5051393e73ccd3e143d08f9a8562117a9789a988e79

body:
  text: 金主新即政鋭意于治嘗問漢宣帝綜核名實之道其施行之實果何如守貞誦樞機周密品式詳備以對上曰行之果何始守貞曰在陛下勵精無倦耳久之進守貞尚書左丞出知東乎府明昌四年召拜平章事二月殿中侍御史劉光祖字德修簡州陽安人乞禁譏議道學者光祖初登第廷對切直淳熙五年召對論恢復事請以太祖用人為法及帝即位殿中侍御史闕上方嚴其選謂宰臣留正曰卿監郎官中有其人正沈思久之曰得非劉光祖乎帝曰是久在朕心矣光祖入對即上疏極論近世譏貶道學之非略謂是非不明則邪正互攻公論不立則私情交起此固道之消長時之否泰而實為國家之禍福社稷之存亡甚可畏也本朝士大夫學術最為近古初非有强國之術而國勢尊安根本深厚咸平景德之間道臻皇極治保太和至于慶厯嘉祐盛矣不幸而壞于豐熙之邪說疏棄正士招徠小人幸而元祐君子起而敕之末流大分事故反覆紹聖元符之際羣凶得志絶滅綱常其論既勝其勢既成崇觀而下尚復何言臣始至時聞有譏貶道學之說而實未覩朋黨之分逮臣復來則朋黨已成而忠諫者獲罪矣大以忠諫為罪其去紹聖幾何陛下即位之初凡所進退率用人言初無好惡之私豈以黨偏為主而一嵗之內逐者紛紛往往納忠之言謂為沾名之舉至于潔身以退亦曰憤懟而然欲激怒于至尊必加之以謗訕臣欲熄將來之禍故不憚反覆以陳伏幾聖心豁然永為皇極之主使是非由此而定邪正由此而别公論由此而明私意由此而熄道學之議由此而消朋黨之跡由此而滅和平之福由此而集國家之事由此而理則生靈之幸社稷之福也不然相激相勝展轉反覆為禍無窮臣實末知稅駕之所帝下其章讀者至于流涕是年廷試舉人進士王介字元石婺州金華人䇿亦言今之所謂道學者即世之君子正士也君子正士之名不可逐故設為此名一網去之聖明在上而天下以道學為諱將何以立國哉帝嘉歎擢為第三由是道學之譏少沮光祖尋以帝用潛邸巫醫吳端為閣門宣贊舍人疏論忤旨出為潼川府判官潼川府重和初置注見前三月金初設制舉及宏詞科舉無常期上意欲行則特詔天下二科皆以待非常之士也夏四月以伯圭秀王子稱長子夀皇母兄嗣秀王詔即湖州秀園立廟奉神主建祠臨安府以藏神御如濮王故事而以伯圭嗣王伯圭謙謹不以近屬自居每入見帝行家人禮宴私隆洽伯圭執臣禮愈恭秋七月以留正為左丞相王藺為樞密使葛邲參知政事胡晉臣簽書樞密院事藺在政府不存形迹除目或自中出未愜人心者藺輒留納之時方議建皇后家廟藺力爭以為不可未幾中丞何淡論之遂罷帝以葛邲知樞密而以晉臣代邲辛亥二年金明昌二年春二月詔羣臣各言時政闕失時以雷雪交作故有是命吏部侍郎陳騤字叔進台州臨海人疏三十條如宫闈之分不嚴則權柄移內謁之漸不杜則明斷息宴飲不時則精神昏賜子無節則財用竭尤切時病按騤此疏續綱目誤繫于明年騤知樞密之時今据騤本傳改輯尋詔以米五萬石賑京城權罷修皇后家廟秋七月金以圖克坦鎰本名安春上京路明安人按安春舊作按出今改後仿此為尚書右丞鎰該習經史以材能稱而有執守時金主鋭意治平鎰上言陛下撫太平之基宜稽古崇德無因物以為好惡喜怒無以好惡喜怒輕忽小善不恤人言唐陸贄嘗陳隔塞之九弊上有其六下有其三陛下能慎其六為臣者敢不慎其三哉上下之情通則大綱舉而羣目張矣金主嘉之未幾罷為定武軍節度使知平陽府事冬十一月帝有事于太廟皇后殺貴妃黃氏翼日郊大風雨不卒事而還帝有疾初帝欲誅宦者近習懼遂謀離間三宫帝疑之㑹帝得心疾夀皇購得良藥欲因帝至宫授之宦者遂訴于皇后曰太上合藥一大丸俟宫車過即授藥萬一不虞奈宗社何后覘藥實有心銜之頃之內宴后請立嘉王擴為太子夀皇不許后退持嘉王泣訴于帝謂夀皇有廢立意帝惑之遂不朝夀皇后以黃貴妃有寵因帝祭太廟宿齊宫后殺貴妃以暴卒聞翼日合祭天地風雨大作黃壇燭盡滅不能成禮而罷帝既聞貴妃卒又值此變震懼增疾不視朝政事多决于后后益驕恣夀皇聞帝疾亟往南內視之且責后后怨愈深壬子三年金明昌三年春三月帝疾瘳羣臣請朝重華宫不果行帝自有疾後重華溫凊之禮以及誕辰節序屢以夀皇傳㫖而免既而帝神思寖清宰輔百官下至韋布之士以過宫為請者甚衆至有叩頭引裾號泣而諌者帝開悟有翻然夙駕之意既而不果行都人始以為憂夏四月帝朝重華宫以邱崈為四川制置使初留正帥蜀慮吳氏世將謀去之不果至是議更蜀帥正言西邊三將惟吳氏世襲兵柄號為吳家軍不知有朝廷遂以户部侍郎邱崈往崈陛辭奏曰臣入蜀後吳挺字仲烈璘之子脫至死亡兵權不可復付其子臣請得以便宜撫定諸軍許之六月以陳騤同知樞密院事冬十一月日南至越六日帝始朝重華宫日南至丞相留正率百官詣重華宫稱慶兵部尚書羅㸃字春伯撫州崇仁人給事中尤袤中書舍人黃裳字文叔隆慶府普城人御史黃度字文叔紹興新昌人尚書左選郎官葉適等上疏請帝朝重華宫不從祕書郎彭龜年字千夀臨江軍清江人以書譙吏部尚書趙汝愚且上疏極諫略謂夀皇之事髙宗備極子道此陛下所親覩也况夀皇今日止有陛下一人聖心拳拳不言可知特遇過宫日分陛下或遲其行則夀皇不容不降免到宫之旨蓋為陛下辭責于人使人不得以竊議陛下其心非不願陛下之來自古人君處骨肉之間多不與外臣謀而與小人謀之所以交鬪日深疑隙日大今日兩宫萬萬無此然臣所憂者外無韓琦富弼吕誨司馬光之臣而小人之中已有任守忠者在焉惟陛下裁察又言使陛下虧過宫定省之禮皆左右小人間諜之罪宰執侍從但能推父子之愛調停重華臺諫豈能仗父子之義責望人主至于疑間之根盤固不去曽無一語及之今內侍間諜兩宫者固非一人獨陳源在夀皇朝得罪至重近復進用外人皆謂離間之機必自源始宜亟發威斷首逐陳源然後肅命鑾輿負罪引慝以謝夀皇使父子歡然宗社有賴顧不幸歟汝愚入對往復規諫帝意乃悟汝愚又屬嗣秀王伯圭調護于是兩宫之情始通辛卯帝朝重華宫皇后繼至從容竟日而還都人大悅后歸謁家廟推恩親屬及使臣鄧從訓等幾二百人知荆門軍陸九淵字子靜撫州金溪人卒九淵少聞靖康間事慨然有感于復讎之義訪智勇士議恢復大略乾道中以薦除敕令所刪定官因輪對陳五論一論仇耻未復願博求天下之俊傑二論願致尊德樂道之誠三論知人之難四論事當馴致而不可驟五論人主不當親細事未幾以主管台州崇道觀還鄉及帝即位差知荆門軍民有訴者無早暮皆得造于庭多所勸釋嚴保伍之法盜賊屏息荆門為次邊而無城九淵以為郡居江漢之間荆門固則四鄰有所恃乃請于朝而城之逾年政行令修民俗為變一日謂僚屬曰某將告終㑹禱雪明日雪乃沭浴更衣端坐後二日卒九淵兄九齡九韶皆學行淵粹為學務窮原本不為章句訓詁嘗與朱熹㑹鵝湖論辨多不合及熹守南康九淵訪之熹與至白鹿洞九淵為講君子小人喻義利一章聽者至為泣下熹以為切中學者隱微深痼之病九齡字子夀九韶字子美鵝湖山名山有寺為朱熹與九淵兄弟㑹講之所今為鵝湖書院在江西廣信府鉊山縣北白鹿洞注見前是嵗諸路大水癸丑四年金明昌四年春正月己巳朔帝朝重華宫三月帝朝重華宫皇后從以葛邲為右丞相陳騤參知政事胡晉臣知樞密院事趙汝愚同知院事御史汪義端與汝愚有隙上言髙宗聖訓不用宗室為宰執汝愚楚王元佐七世孫不宜用之汝愚亦力辭不許命當制學士申諭上意而黜義端汝愚乃拜命金弛禁地許民耕種金主諭㸃檢司行宫外地及圍獵之處悉與民耕金主嘗謂近臣曰凡稱政有異蹟者謂其斷事有軼才也若止清亷此乃本分以貪汚者多故顯其異耳又謂近言事者以方今孝弟亷耻道缺乞正風俗此蓋官吏不能奉宣教化使然今之案舉官吏者多責近效以幹辦為心其有秉心寬厚欲行德化者輒謂之迂濶故人人皆以教化為餘事此孝弟所以廢也今之所察舉皆先才而後德巧猾之徒雖有賊汚一旦見用猶為能吏此亷耻所以喪也又東京路副使王勝進鷹金主遣諭之曰汝職非輕民間利害官吏邪正略不其聞而乃以鷹進此豈汝所職也後母復爾是年夏百官屢表請上尊號金主曰比年五榖不登百姓流離正當戒懼修省之日豈得虛受榮名耶不許仍斷來章金以胥持國字秉鈞代州繁畤人參知政事持國以中經童科入仕為太子祇應司令金主在東宫識之及即位遂大用持國為人柔佞有智術時昭容李氏得幸李氏名師兒父湘其家以罪沒入宫籍監金主納之金主好文詞李氏慧黠能作字知文義遂大愛幸持國隂附之又多遺賂左右昭容亦自嫌門第寒薄欲藉外廷為重乃數譽持國金主愈信任之表裏擅政士之好利躁進者爭趨其門四方為之語曰經童作相監婢為妃翰林應奉文字趙秉文字周臣磁州滏陽人上書論之且薦完顔守貞可大用金主召問秉文言頗差異命知大興府事內族膏音庸續綱目悮作膏本名額里埒金宗室也元史類編云避世宗父宗堯諱故凡宗字皆改之按額里埒舊作阿里剌今改後仿此鞫之秉文遂引同議者修撰王庭筠字子端河東人御史周昂字德卿真定人省令史潘豹鄭贊道髙坦等五人皆下獄被斥明年刲昭容為淑妃復進封元妃兄喜兒弟鐡晉皆顯擢勢傾朝野監察御史姬端修上書乞逺小人金主遣李喜兒問瑞修小人為誰端修曰小人者李仁惠兄弟仁惠喜兒賜名也喜兒以聞金主稍呵責之然不能去及圖克坦鎰相一日金主問漢高光武孰優鎰曰光武在位嵗久無沉湎昌色之事髙祖惑戚姬卒致亂由是言之光武優金主知其諷諫默然久之姬瑞修字平叔汝州人本姓宗亦以避諱改夏五月賜禮部進士陳亮字同父永康人及第亮才氣超邁善談兵議論風生下筆數千言立就所交皆一時豪傑志存經濟隆興初上中興五論不報嘗環視錢塘喟然歎曰城可灌也蓋以地下于西湖爾淳熙中詣闕上書極言時事因言錢塘非駐蹕之所壽皇赫然震動欲榜朝堂以勵羣臣用种放故事召令上殿將擢用之曾覿聞而欲見焉亮耻之踰垣而逃覿不悅大臣亦惡其切直交沮之待命十日再詣闕上書夀皇欲官亮亮聞而笑曰吾欲為社稷開數百年之基寧用以博一官乎即渡江歸益力學著書其學自孟子後惟推王通嘗曰研窮義理之精微辨析古今之同異原心于秒匆較禮于分寸以積纍為上以涵養為正睟面盎背則于諸儒誠有愧焉至于堂堂之陳正正之旗風雨雲雷交發而並至龍蛇虎豹變見而出沒推倒一世之智勇開拓萬古之心胸自謂差有一日之長蓋指朱熹吕祖謙也至是䇿進士問以禮樂刑政之要亮以君道師道對且曰臣竊歎陛下于夀皇涖政一十有八年之間寧有一政一事之不在聖懷而問安視寢之餘所以察辭而觀色因此而得彼者其端甚衆亦既得其機要而見之施行矣豈徒一月四朝為京邑之美觀也哉帝得其䇿大喜以為善處父子之間御筆擢為第一授簽書建康府判官㕔公事未上一夕卒利州安撫使吳挺卒邱崈使總領財賦楊輔字嗣勳遂寧人等權總其軍崈命總領財賦楊輔權安撫使統制官李世廣權總其軍以殺吳氏之權召浙東副總管姜特立還留正乞罷相不許六月正出城待罪帝念特立不已召之留正引唐憲宗召吐突承璀事乞罷不報乃出待罪六和塔在今錢塘縣西南臨江北岸而上疏切諫于是著作郎沈有開著作佐郎李唐卿祕書郎范黼彭龜年校書郎王奭正字蔡幼學字行之溫州瑞安人顔棫吳獵字德夫潭州醴陵人項安世字平父其先括蒼人後家江陵等上疏乞寢特立召命不報正因繳進前後錫賚及告敕乞歸田里亦不許正出城待罪凡百四十日帝遣左司徐誼字子直一字宏父溫州人諭㫖乃復入都堂視事復命差特立還浙東胡晉臣卒帝自有疾不視朝晉臣與留正同心輔政中外帖然其所奏陳以溫凊定省為先次及親君子逺小人抑僥幸消朋黨啓沃剴切彌縫縝密人無知者秋七月以趙汝愚知樞密院事余端禮字處恭衢州龍游人同知院事蜀帥吳挺卒端禮謂汝愚曰吳氏世握蜀兵若復承襲將為後患汝愚是其言合辭以奏帝意未決及樞密命下汝愚辭不拜帝尋以興州都統制張詔代挺領武興軍汝愚始受命按汝愚之辭續通鑑據光宗紀係于明年正月今從本傳八月金主釋奠孔子廟北靣再拜九月羣臣請帝朝重華宫不聽冬十一月始朝帝制于后久不朝重華宫㑹九月重明節帝生辰也羣臣連章請帝過宫不聽而召內侍陳源為押班中書舍人陳傅良字君舉溫州瑞安人不草詞且上疏力諫給事中謝深甫字子肅台州臨海人景之之子言父子至親天理昭然太上之愛陛下亦猶陛下之愛嘉王太上春秋髙千秋萬嵗陛下何以見天下帝感悟趣命駕往朝百官班立以俟帝出至御屏后挽留帝入曰天寒官家且飲酒百僚侍衛相顧莫敢言傅良趨進引帝裾請毋入因至屏後后叱曰此何地秀才欲斫頭耶傅良痛哭于庭后益怒遂傳㫖罷還內于是著作郎沈有開祕書郎彭龜年禮部侍郎倪思字正甫湖州歸安人國子録王介等皆上疏請朝不從十月工部尚書趙彥逾字德光等上書重華宫乞㑹慶節勿降㫖免朝夀皇曰朕自秋凉以來思與皇帝相見卿等奏疏已令進御前矣及㑹慶節帝復稱疾不朝丞相以下皆上疏自劾乞罷黜嘉王府翊善黃裳請誅內侍楊舜卿彭龜年請逐陳源以謝天下太學生汪安仁等二百一十八人上書請朝重華宫皆不報十一月彥逾等復力陳帝始往朝十二月夏主仁孝卒子純佑立夏主在位五十五年始建學校于國中立小學于禁中親為訓導尊孔子為文宣帝然權臣擅國兵政衰弱子純佑立改元天慶號仁孝曰仁宗以朱熹知潭州使者自金還言金人問朱先生安在故有是命甲寅五年金明昌五年春正月癸亥朔帝朝重華宫癸酉夀皇不豫葛邲罷邲為相専守祖宗法度薦進人才博采公論至是罷知建康邲後判紹興府簡稽期㑹錢榖刑獄必親或謂大臣均佚有體邲曰崇大體而簡細務吾不為也金購求遺書凡崇文總目內所闕書籍悉購之尋又置𢎞文院譯寫經書夏四月帝及后幸玉津園羣臣請帝問疾重華宫不從夀皇自正月不豫羣臣請帝省視皆不報四月帝與皇后幸玉津園兵部尚書羅㸃請先過重華宫且曰陛下為夀皇子四十餘年無一間言止緣初郊違豫夀皇嘗至南內督過左右之人自此讒言遂生以臣觀之夀皇與天下相忘久矣今大臣同心輔政百執事奉法循理宗室戚里三軍百姓皆無二志設有間離誅之不疑乃若深居不出久虧子道衆口謗讟禍患將作不可以不慮帝曰卿等可為朕調護之侍講黃裳對曰父子之親何俟調護㸃曰陛下一出即當釋然帝猶未許㸃乃率講官言之帝曰朕心未嘗不思夀皇㸃曰陛下久闕定省雖有此心何以自白起居舍人彭龜年連三疏請對不報屬帝視朝龜年不離班位伏地叩額血流漬甃帝曰素知卿忠直欲何言龜年奏今日無大于過宫余端禮因曰叩額龍墀曲致忠懇臣子至此豈得已耶帝曰知之然猶不往夀皇疾益甚羣臣上疏請者相繼帝將以癸丑日朝至期丞相以下入宫門俟至日昃帝復辭以疾于是羣臣請斥罷者百餘人詔不許裳與祕書少監孫逢吉字從之吉州龍泉人等再上疏以請起居郎兼中書舍人陳傅良請以親王執政一人充重華宫使臺諫交章劾內侍陳源楊舜卿林億年離間之罪請逐之五月夀皇疾大漸詔嘉王擴問疾重華宫夀皇欲一見帝數顧視左右陳傅良以帝不往重華宫乃繳上告敕出城待罪丞相留正等率宰執進諫帝拂衣起正引帝裾泣諫羅㸃進曰夀皇疾勢已危不及今一見後悔何及羣臣隨帝入至福寧殿內侍闔門慟哭而出越二日正等又請對帝令知閣門事韓托胄字節夫琦曽孫傳㫖云宰執並出正等俱出浙江亭即樟亭在今仁和縣南錢塘江北岸待罪夀皇聞之憂甚托胄奏曰昨傳㫖令宰執出殿門今乃出都門請自往宣押入城于是正汝愚等復還第明日帝召羅㸃入對㸃言前日迫切獻忠舉措失禮陛下赦而不誅然引裾亦故事也帝曰引裾可也何得輒入宫禁乎㸃引辛毗事以謝且言夀皇止有一子既付神器惟恐見之不速耳從官及彭龜年黃裳沈有開奏乞令嘉王詣重華宫問疾許之王至宫夀皇為之感動六月夀皇崩帝稱疾不出留正等請夀聖皇太后代行喪禮夀皇崩是夕重華宫內侍訃于宰執私第趙汝愚恐帝疑惑不出視朝持其札不上次日帝視朝汝愚以聞因請詣重華宫成禮帝許之至日昃不出宰相乃率百官發喪將成服留正與汝愚議請夀聖太后暫主喪事太后不許正等附奏云臣等連日造南內請對不獲纍上疏不得報今當率百官恭請若皇帝不出百官相與慟哭于宫門恐人情騷動為社稷憂乞太后降㫖以皇帝為有疾暫就宫中成服然喪不可以無主祝文稱孝子嗣皇帝宰臣不敢代行太后夀皇之母也請攝行祭禮太后許之尊夀聖皇太后為太皇太后夀成皇后為皇太后秋七月留正請建皇太子不許遂稱疾而遁葉適言于留正曰帝疾而不執喪將何辭以謝天下今嘉王長若預建參決則疑謗釋矣正從之率宰執入奏云皇子嘉王仁孝夙成宜早正儲位以安人心不報越六日又請御批云甚好明日宰執同擬㫖以進乞帝親批付學士院降詔是夕御劄付丞相云厯事嵗久念欲退閒正得之大懼因朝佯仆于庭即出國門上表請老且云願陛下速回淵鑒追悟前非漸收人心庶保國祚初正始議帝以疾未克主喪宜立皇太子監國若未倦勤當復明辟設議內禪太子可即位而趙汝愚請以太皇太后㫖禪位嘉王正謂建儲詔未下遽及此他日必難處與汝愚異遂以肩輿五鼓逃去太皇太后詔嘉王擴成服即位是為寧宗尊帝為太上皇帝留正既去人心益搖㑹帝臨朝忽仆于地趙汝愚憂危不知所出內禪之議益決屬工部尚書趙彥逾結殿帥郭杲而與左選郎官葉適左司郎中徐誼謀可以白內禪之意于太皇太后者乃遣知閣門事韓托胄托胄太后女弟之子也托胄因所善內侍張宗尹以奏太后不獲命明日往又不獲命逡巡將退內侍關禮見而問之托胄具述汝愚意禮令少俟入見太后而泣太后問故禮對曰聖人讀書萬卷亦嘗見有如此時而保無亂者乎太后曰此非汝所知也禮曰此事人人知之今丞相已出所賴者趙知院旦夕亦去矣言與淚俱下太后驚曰知院同姓事體與他人異乃亦去乎禮曰知院未去非但以同姓故以太皇太后為可恃耳今定大計而不獲命勢不得不去去將如天下何願聖人三思太后問托胄安在禮曰臣已留其俟命太后曰事順則可令諭好為之禮報托胄且曰來早太后于夀皇梓宫前垂簾引見執政托胄復命日已向夕汝愚始以其事語陳騤余端禮亟命殿帥郭杲等夜以兵分衛南北內關禮使傅昌朝密製黃袍是日嘉王謁告不入臨時將禫祭汝愚曰禫祭重事王不可不出翼日甲子羣臣入王亦入汝愚率百官詣梓宫前太后垂簾汝愚率同列再拜奏皇帝疾未能執喪臣等乞立皇子嘉王為太子以係人心皇帝批出有甚好二字繼有念欲退閒之㫖取太皇太后處分太后曰既有御筆相公當奉行汝愚曰兹事重大播之天下書之史冊須議一指揮太后允諾汝愚䄂出所擬太后指揮以進云皇帝以疾至今未能執喪曽有御筆欲自退閒皇子嘉王擴可即皇帝位尊皇帝為太上皇帝皇后為太上皇后太后覽畢曰甚善汝愚奏曰今臣等有合奏事當取嗣君處分然恐兩宫父子之間有難處者須煩太后主張太后乃命汝愚以旨諭皇子即位皇子固辭曰恐負不孝名汝愚奏天子當以安社稷定國家為孝今中外人人憂亂萬一變生置太上皇何地衆扶皇子入素幄被黃袍方却立未坐汝愚率同列再拜皇子詣几筵奠哭盡哀須臾立仗訖催百官班皇子衰服出就重華殿東廡素幄立內侍扶掖乃坐百官起居訖行禫祭禮尋詔即以寢殿為泰安宫以奉上皇民心悅懌中外晏然汝愚之力也立皇后韓氏后琦六世孫父同卿托胄同卿之季父也續綱目以為后之季父誤后被選入宫能順適兩宫意遂歸嘉王邸至是立為后大赦復召留正赴都堂視事以趙汝愚兼權參知政事正既去及帝即位以為大行欑宫總護使入謝復出城太皇太后命速宣押趙汝愚復以為請帝手札遣使召正還侍御史張叔椿請議正棄國之罰詔徙叔椿為吏部侍郎而正復相汝愚首裁抑僥幸收召四方知名之士中外引領望治按是月除拜諸人續綱目前後參錯今依寧宗本紀及宰輔表改正加殿前都指揮使郭杲武康節度使知閣門事韓托胄汝州防禦使韓托胄欲推定䇿功趙汝愚曰吾宗臣汝外戚也何可以言功惟爪牙之臣則當推賞乃加杲節鉞但遷托胄防禦使托胄大失望然以傳導詔㫖浸見親幸知臨安府徐誼告汝愚曰托胄異時必為國患宜飽其欲而逺之不聽汝愚欲推葉適之功適辭曰國危效忠職也適何功之有及聞托胄望言于汝愚曰托胄所望不過節鉞宜與之不從適歎曰禍自此始矣遂力求補外以趙汝愚為樞密使汝愚既免兼參知政事詔拜右丞相汝愚辭曰同姓之卿不幸處君臣之變敢言功乎乃命為樞密使尋又以羅㸃簽書院事貶內侍陳源等十人侍御史章頴字茂獻臨江軍人論源及楊舜卿林億年離間之罪詔皆貶官斥外八月召知潭州朱熹為煥章閣待制兼侍講先是黃裳為嘉王府翊善光宗諭之曰嘉王進學皆卿之功裳謝曰若欲進德修業追跡古先哲王則須尋天下第一等人光宗問為誰裳以熹對彭龜年為嘉王府直講因講魯莊公不能制其母云母不可制當制其侍御僕從王問此誰之說對曰朱熹說也自後每講必問熹說如何至是趙汝愚首薦熹遂自知潭州召入經筵熹在道聞泰安朝禮尚缺近習已有用事者即具奏云陛下嗣位之初方將一新庶政所宜愛恤名器若使幸門一開其弊不可復塞至于博延儒臣専意講學必求所以深得親歡者為建極導民之本思所以大振朝綱者為防微慮逺之圖不報且辭新命不許及入對首言乃者太皇太后躬定大䇿陛下寅紹丕圗可謂處之以權而庶幾不失其正今反不能無疑于逆順之際竊為陛下憂之猶有可諉者亦曰陛下之心前日未嘗有求位之計今日未嘗忘思親之心此則所以行權而不失其正之根本也充未嘗求位之心以盡負罪引慝之誠充未嘗忘親之心以致溫凊定省之理始終不越乎此而大倫正大本立矣時趙彥邇按視孝宗山陵以為土肉淺薄下有水石孫逢吉覆按乞别求吉兆有旨集議熹上議狀言夀皇聖德衣冠之藏當博求名山不宜偏信臺史委之水泉沙礫之中不報增置講讀官從趙汝愚之請以給事中黃裳中書舍人陳傅良彭龜年為之詔經筵官開陳經㫖救正缺失內批罷左丞相留正韓托胄浸謀預政數詣都堂正使省吏諭之曰此非知閣日往來之地托胄怒而退會正與汝愚議欑宫不合托胄因間之于帝遂以手詔罷正出知建康府正謹法度惜名器毫髮不可干以私與周必大俱以相業稱以趙汝愚為右丞相汝愚本倚留正共事正之罷由中㫖汝愚怒韓托胄不以告及來謁因不見之托胄慙忿羅㸃謂汝愚曰公誤矣汝愚悟乃見之托胄終不懌河決金陽武考黃河自金明昌五年南北分澆從此南流不能復塞關係甚巨續綱目失載今採金史章宗紀及河渠志兼採胡渭禹貢錐指增輯河決陽武故堤灌封邱而東歷曹濮鄆范諸州縣中至夀張注梁山濼分為二派北派由北清河即今大清河注見前入海南派由南清河即泗水注亦見前入淮禹貢錐指河滙梁山濼分二泒入南北凊河自宋熙寧十年始尋經塞治至是復行其道而河流又一大變九月簽書樞密院事羅㸃卒㸃孝友端介不為矯激之行或謂天下事非才不辦㸃曰當論其心心苟不正才雖過人果何取哉時給事中黃裳亦卒趙汝愚泣謂帝曰黃裳羅㸃相繼淪謝二臣不幸天下之不幸也以京鏜簽書樞密院事初帝欲除鏜帥蜀趙汝愚謂人曰鏜望輕資淺豈可當此方靣鏜聞而憾之由是韓托胄引以自助却瑞慶節賀表前此改生日天祐節為瑞慶節從朱熹奏也冬十月內批以謝深甫為御史中丞劉德秀為監察御史罷右正言黃度韓托胄日夜謀去趙汝愚知閣門事劉㢸霅川人亦以不得預內禪心懷不平因謂托胄曰趙相欲専大功君豈惟不得節鉞將恐不免嶺海之行托胄愕然問計㢸曰惟有用臺諫耳托胄問若何而可㢸曰御筆批出是也托胄然之遂以內批拜給事中謝深甫為中丞㑹汝愚請令近臣薦御史托胄密以其黨劉德秀屬深甫遂以內批用之由是劉三傑李沐湖州德清人彥頴之子等牽連以進言路皆托胄之人排斥正士朱熹憂其害政每因進對為帝切言之又約吏部侍郎彭龜年同劾托胄㑹龜年出護使客不果熹復白汝愚當以厚賞酬托胄之勞勿使預政汝愚為人疏謂其易制不以為慮黃度將上疏論托胄之姦托胄覺之以御筆除度知平江府政和中升平江軍為府𨽻兩淅路今蘇州府是度言蔡京擅權天下所由以亂今托胄假御筆逐諌臣使俯首去不得效一言非國之利也固辭奉祠歸飬閏月詔議祧廟時以孝宗祔廟議宗廟迭毀之制孫逢吉曽三復字無玷臨江人首請并祧僖宣二祖奉太祖居第一室祫祭則正東向之位有旨集議僖順翼宣四祖祧主宜有所歸自太祖首尊四祖之廟治平間議者以世數寖逺請遷僖祖于夾室後王安石等奏僖祖有廟與稷契無異請復其舊丞相趙汝愚不以復祀僖祖為然侍從多從其說吏部尚書鄭僑字惠叔興化人欲且祧宣祖而祔孝宗侍講朱熹獻議力主王安石之說略謂藏四祖之主于夾室是以祖宗之主下藏于子孫之室欲别立一廟則喪事即逺有毁無立議者急欲尊奉太祖以東嚮之故不知實無益于太祖之尊徒使僖祖太祖兩朝威靈相與爭校强弱于冥冥之中并使四祖之神疑于受擯令人痛傷今當以僖祖為始祖如周之后稷太祖如文王太宗如武王與仁祖之廟皆萬世不祧又據程頤之說以為僖祖不當祧順以下祧可也或難以僖祖無功業不知物豈有無本而生者安石所見終髙于世俗之儒帝召對熹復以所論畫為圖本陳奏久之帝稱善曰可于榻前撰數語徑批出施行熹方懲內批之弊因乞降出劄子再令集議帝然之熹退即進擬詔意以上意諭廟堂則聞已毁四祖廟而遷之矣于是别建一殿以奉祧主而藝祖始正東向之位續綱目于熹之議採録不詳又云廟堂不以聞而毁撤僖宣廟室按熹阮具議又經靣陳安得云不以間乎今依通考及宋史禮志原文改正內批罷煥章閣待制兼侍講朱熹熹每進講務積誠意以感動帝心以平日所論著敷陳開析坦然明白可舉而行講畢有可以開益帝德者罄竭無𨼆帝亦虛心嘉納焉至是以黃度之去因講畢奏疏極言陛下即位未能旬月而進退宰臣移易臺諫皆出陛下之獨斷中外咸謂左右或竊其柄臣恐主威下移求治反亂矣疏入托胄大怒使優人峩冠濶䄂象大儒戲于帝前因乘間言熹迂濶不可用帝方倚任托胄乃出御批云憫卿耆艾恐難立講已除卿宫觀趙汝愚袖御筆見帝且諫且拜帝不省汝愚因求罷政不許越二日托胄使其黨封內批付熹熹即附奏謝遂行中書舍人陳傅良封還録黃起居郎劉光祖起居舍人鄧驛御史吳獵吏部侍郎孫逢吉登聞鼓院游仲鴻交章留熹不報傅良光祖亦坐罷熹登第五十年仕于外僅九考立朝才四十六日進講者七知無不言既去托胄益無所忌憚矣游仲鴻字子正梁州南充人十一月以韓托胄兼樞密院都承旨初詔托胄可特遷二官托胄覬覦節鉞意不滿力辭乃止遷一官為宜州觀察使怨趙汝愚益深至是特遷都承旨詔行孝宗皇帝喪三年先是有司請于易月之外用漆紗淺黃之制朱熹奏言自漢文短喪歷代因之天子遂無三年之喪人紀廢壞三綱不明千有餘年莫能釐正夀皇聖帝至性自天易月之外猶執通喪朝衣朝冠皆用大布所宜著在方冊為萬世法程陛下以世嫡承大統承重之服著在禮律宜遵夀皇已行之法一時倉卒不及詳議遂用漆紗淺黃之服使夀皇已行之禮舉而復墜臣竊痛之然既往之事不及追改啓殯發引禮當復用初喪之服至是詔遵用三年之制中外百官皆以涼衫視事蓋用熹言也葬永阜陵史臣曰髙宗以公天下之心擇太祖之後而立之乃得孝宗之賢聰明英毅卓然為南渡諸帝稱首即位之初鋭志恢復重違髙宗之命不輕出師又值金國平治無釁可乘然易表為書改臣稱姪淢去嵗幣以定鄰好金人易宋之心至是亦寖異于前日故世宗每戒羣臣積錢榖謹邊備蓋忌帝之將有為也天厭兵革欲休生民故帝用兵之志弗遂而終自古人君起自外藩入繼大統而能盡宫庭之孝未有若帝者終喪三年又能却羣臣之請而力行之廟號孝宗其無愧矣十二月金平章政事完顔守貞罷按守貞之罷續綱目誤書于明年之冬今據金史章宗本紀改正守貞剛忠明亮通習典故凡論對必傅經義時金有國七十年禮樂刑政多因舊制金主欲更定修正為一代法其儀式條約多守貞裁訂故明昌之治號稱清明又好接引善類以列朝廷為胥持國所忌罷去內批罷更部侍郎兼侍講彭龜年進韓托胄一官托胄權勢日重龜年條奏其姦請去之且云陛下逐朱熹太暴故欲陛下亦亟去小人毋使天下人謂陛下去君子易去小人難于是龜年托胄俱請祠帝欲兩罷之陳騤進曰以閣門去經筵何以示天下既而內批龜年與郡托胄進一官與在京宫觀給事中林大中字和叔婺州永康人中書舍人樓鑰字大防明州鄞縣人繳奏以為非是不聽由是托胄愈橫明年又加托胄保寧節度使陳騤罷以余端禮知樞密院事京鏜恭知政事鄭僑同知樞密院事騤與趙汝愚素不協未嘗同堂語及爭彭龜年事韓托胄語人曰彭侍郎不貪好官固也元樞亦欲為好人耶故罷之而引京鏜居政府以間汝愚汝愚孤立于朝天子亦無所倚信罷起居舍人劉光祖劉德秀劾之也以趙彥逾為四川制置使工部尚書趙彥逾以有功于帝室冀趙汝愚引居政府及除蜀帥大怒遂與韓托胄合因陛辭疏廷臣姓名于帝指為汝愚之黨且曰老奴今去不惜為陛下言之由是帝亦疑汝愚矣寧宗皇帝乙卯慶元元年金明昌六年春正月白虹貫日二月罷右丞相趙汝愚韓托胄欲逐汝愚而難其名謀于京鏜鏜曰彼宗姓也誣以謀危社稷則一網打盡矣托胄然之以祕書監李沐嘗有怨于汝愚引為右正言使奏汝愚以同姓居相位將不利于社稷乞罷其政以尊安天位杜塞姦源是日汝愚出浙江亭待罪遂以觀文殿學士出知福州謝深甫等論汝愚冒居相位今既罷免不當加以書殿隆名帥藩重寄乞令奉祠請咎命提舉洞霄宫直學士院鄭湜草制詞有曰頃國家之多難賴碩輔之精忠持危定頃安社稷以為悅任公堨節利國家無不為坐無貶辭亦免官兵部侍郎章頴侍經幃帝曰諫官有言趙汝愚者卿等謂何同列漫無可否頴奏言天地變遷人情危疑加以敵人嫚侮國勢未安未可輕退大臣願降詔宣諭汝愚毋聽其去國子祭酒李祥言去嵗國遭大戚中外洶洶留正棄宰相而去官僚幾欲解散軍民皆將為亂兩宫隔絶國喪無主汝愚以摳臣獨不避殞身滅族之禍奉太皇太后命翊陛下以登九五勛勞著于社稷精忠貫于天地乃卒受黯黮而去天下後世其謂何知臨安府徐誼素為汝愚所器又嘗勸汝愚早退及豫防托胄之姦托胄尤怨之及是與國子博士楊簡亦抗論留汝愚李沐劾為黨皆斥之李祥字元德常州無錫人楊簡字微中慈溪人三月丙戌朔日食夏四月安置大府寺丞吕祖儉字子約祖謙弟于韶州祖儉上書訴趙汝愚之忠併論朱熹彭龜年李祥不當罷斥語侵韓托胄有㫖祖儉朋比罔上送韶州安置中書舍人鄧驛繳奏祖儉不當貶不從樓鑰因進讀讑及之托胄語人曰復有諭救祖儉者當處以新州衆乃不敢言或謂托胄曰自趙丞相去天下已切齒今又投祖儉瘴鄉不幸或死則怨益重托胄始改送吉州祖儉嘗曰因世變有所摧折失其素履者固不足言因世變而意氣有所加者亦私心也竟死吉州縣新州唐置明廢今廣東肇慶府新興是吉州隋置今江西吉安府是以余端禮為右丞相鄭僑恭知政事京鏜知樞密院事謝深甫簽書院事流太學生楊宏中字克甫福州人等六人宏中與周端朝字子靜溫州人張衜字用叟福州人林仲麟字景仲福州人蔣傅字象夫信州人徐範字彛父福州侯官人六人伏闕上書言近者諫官李沐論罷趙汝愚中外咨憤而李沐以為父老歡呼䝉蔽天聽一至于此陛下獨不念去嵗之事乎人心驚疑變在朝夕是時假非汝愚出死力定大議雖百李沐罔知攸濟當國家多難汝愚位樞府本兵柄指揮􅍾縱何向不可不以此時為利今上下安妥乃有異意乎章頴李祥楊簡發于中激力辨其非即遭斥逐李沐自知邪正不兩立思欲盡覆正人以便其私必託朋黨以罔陛下之聽臣恐君子小人消長之機于此一判則靖康已然之驗何堪再見于今日耶伏願陛下念汝愚之忠勤察祥簡之非黨灼李沐之回邪竄沐以謝天下還祥等以收士心疏上詔宏中等罔亂上書煽搖國是悉送五百里外編管五月詔諸路提舉司置廣惠倉修胎飬之令也未幾余端禮鄭僑言福建地狹人稠無以瞻飬生子多不舉福建提舉宋之瑞乞免鬻建劍汀邵沒官田收其租助民舉子之費詔從之六月右正言劉德秀乞考核邪正真僞遂罷國子司業汪逵等自程皓程頤傳孔孟千載之學其徒楊時傳之羅從彥從彥傳之李侗朱熹師侗其學大振流俗醜正多不便之遂有道學之名隂以攻詆及韓托胄用事士大夫素為清議所擯者乃教以凡相與異者皆道學之人也隂疏姓名授之俾以次斥逐或又言以道學目之則有何罪當名曰僞學蓋謂貪黷放肆乃人真情亷潔好修者皆僞耳由是有僞學之目善類皆不自安至是德秀上言願考核真僞以辨邪正詔下其章由是博士孫元卿樂清人袁燮字和叔慶元府鄞縣人國子正陳武皆罷汪逵入劄子辨之德秀以逵為狂言亦被斥中丞何淡急欲執政亦上疏言専門之學流而為僞文詐沽名願風勵學者専師孔子不必自相標榜詔榜于朝堂淡復上疏言在朝之臣大臣既熟知其邪迹然亦不敢白發以招報復之禍望明詔大臣去其所當去者冬十一月竄故相趙汝愚于永州按汝愚卒于明年正月續綱目併繫于此殊失實今改正韓托胄忌汝愚必欲置之死以息人言至是用何淡疏落汝愚觀文殿大學士及宫觀監察御史胡紘字應期處州遂昌人遂上言汝愚倡引僞徒謀為不軌乘龍授鼎假夢為符因條奏其十不遜且及徐誼詔責汝愚寧逺軍節度副使永州安置誼惠州團練副使南安軍安置時汪義端當制遂用漢誅劉屈氂唐戮李林甫事示欲殺之之意迪功郎趙師召亦上書乞斬汝愚帝不從汝愚怡然就道謂諸子曰觀托胄之意必欲殺我我死汝曹尚可免也丙辰二年金承安元年春正月故相趙汝愚卒于衡州汝愚行至衡州病作衡守錢鍪承托胄密諭窘辱百端汝愚暴卒天下聞而寃之訃聞有旨追復原官許歸葬中書舍人吳宗旦繳還復官之命汝愚學務有用常以司馬光富弼韓琦范仲淹自期凡平昔所聞于師反如張栻朱熹吕祖謙汪應辰王十朋胡銓李燾林光朝之言欲次第行之未果而罷政初汝愚嘗夢孝宗授以湯鼎背負白龍升天後翼嘉王以素服即位蓋其驗也讒者遂以為罪云以余端禮京鏜為左右丞相謝深甫恭知政事鄭僑知樞密院事何淡同知院事二月以端明殿學士葉翥和貢舉翥與劉德秀同知貢舉奏言僞學之魁以匹夫竊人主之柄鼓動天下故文風未能丕變乞將語録之類盡行除毁故是科取士稍涉義理者悉皆黜落六經語孟中庸大學之書為世大禁夏四月余端禮罷端禮始與趙汝愚同心共政及汝愚竄逐端禮不能救後黃度吕祖儉之獲罪端禮救解不獲遂為公議所責在相位期年為韓托胄所制抑鬱不愜志稱疾求退乃以觀文殿大學士提舉洞霄宫以何淡參知政事葉翥簽書樞密院事罷吏部按倪思本傳時為吏部續綱目作禮誤侍郎倪思初翥要思列疏論僞學思不從至是御史姚愈平江人劾思遂出知太平府秋七月罷殿中侍御史黃黼字元章臨安餘杭人中書舍人汪義端以僞學之黨皆名士欲盡除之太皇太后聞而非之帝乃詔臺諫給舍論奏不必更及舊事務在平正以副朕建中之意詔下韓托胄及其黨皆怒自是攻治之志愈急矣黃黼上言治道在黜首惡而任其賢使才者不失其職而不才者無所憾故仁宗嘗曰朕不欲留人過失于心此皇極之道也遂罷黼而以姚愈代之八月禁用僞學之黨太常少卿胡紘上書言比年以來僞學猖獗賴二三大臣臺諫出死力而排之故元惡殞命羣邪屏跡自御筆存救偏建中之說或者誤認天意取前日僞學姦黨次第用之以冀幸其他日不相報復往者建中靖國之事可以為戒陛下何未悟也宜令退伏田里循省愆咎遂詔僞學之黨宰執權住進擬自是學禁愈急大理司直邵裒然言三十年來僞學顯行場屋之權盡歸其黨乞詔大臣盡察其所學詔僞學之黨勿除在內差遣已而言者又論僞學之禍乞鑒元祐調停之說杜其根源道有詔監司帥守薦舉改官並于奏牘前聲說非僞學之人㑹鄉試漕司前期取家狀必令書以不是僞學五字撫州推官柴中行獨申漕司云自幼習易讀程氏易傳如以為僞不願考校士論壯之冬十月召陳賈為兵部侍郎以其嘗擊朱熹也十二月削祕閣修撰朱熹官竄處士蔡元定字季通建州建陽人于道州熹家居自以䝉纍朝知遇之恩且常帶從臣職名義不容默乃草封事數萬言陳姦邪蔽主之禍因以明丞相趙汝愚之寃子弟諸生更進迭諫以為必且賈禍熹不聽蔡元定請以蓍決之遇遁之同人熹默然取藁焚之遂上奏力辭職名詔仍充祕閣修撰時臺諫皆韓托胄所引洶洶爭欲以熹為竒貨然無敢先發者胡紘未逹時嘗謁熹于建安熹待學子惟脫粟飯遇紘不能異也紘不悅及是為監察御史乃鋭意以擊熹為己任物色無所得經年醖釀章疏乃成㑹改太常少卿不果有沈繼祖富川人者為小官時嘗採托熹語孟之語以自售至是以追論程頤得為御史紘以疏草授之繼祖謂可立致富貴遂誣論熹十罪且言熹剽竊張載程頤之餘論簧鼓後進乞禠熹職罷祠其徒蔡元定佐熹為妖乞送别州編管詔熹落職罷祠竄元定于道州已而選人余嚞上書乞斬熹以絶僞學謝深甫抵其書于地語同列曰朱元晦蔡元定不過自相講明耳果何罪乎事乃止元定生而頴異父發博覽羣書以程氏語祿邵氏經世張氏正䝉授元定曰此孔孟正胍也元定深涵其義既長辨析益精登建陽西山頂忍饑啖韲以讀書閒熹名往師之熹叩其學驚曰季通吾老友也尤袤楊萬里交薦于朝召之不起㑹僞學黨禁之論起元定曰吾其不免乎及聞竄不辭家即就道同其子沈行三千里足為流血無幾微見言面至春陵逺近來學者甚衆愛元定者謂宜謝生徒元定曰彼以學來何忍拒之若有禍患亦非閉門塞竇所能避也貽書訓諸子曰獨行勿愧影獨寢不愧衾勿以吾得罪故遂懈其志在道逾年卒學者尊之曰西山先生熹嘗曰造化微妙惟深于理者能識之吾與季通言而不厭也每諸生請疑必令先質元定而後為之折衷小人尤深疾之故是時有朱熹倡僞蔡元定實羽翼之之奏楊萬里字廷季吉州吉水人蔡沈字仲默丁巳三年金氶安二年春正月鄭僑罷夏閏六月貶留正為光祿卿正既罷相繼為劉德秀所劾初德秀未為正所知正客范仲黼以為言正曰此人若留之班行朝廷必不靜乃除大理簿德秀憾之自是彈者無虛嵗朝散大夫劉三傑免喪入見論僞學之黨今變而為逆黨防之不可不至及論留正共引僞學之罪托胄大喜即日降旨除三傑右正言正坐貶邵州居住按正本傳正之貶光祿卿由張釡劾之與續綱目異張釡字君量綱之孫秋八月金胥持國有罪免持國為金主信任與李妃管擅朝政張復亨右司諫張嘉貞右拾遺趙樞同知豐安軍節度使事張光庭同知定海軍節度使事髙元甫户部主事張巖叟刑部員外郎字孟弼代州五臺人傅汝梅張翰字林卿欣州秀容人裴元郭郛四人皆尚書省令史皆趨走其門謂之胥門十哲續綱目云十人俱為御史臺官按持國本傳十人之官班班可考必因為御史臺所劾而誤也今改正至是為御史臺所劾持國致仕十人皆外補續綱目云九月復以持國參知政事按持國本傳言頃之起為樞密副使佐樞密使內族襄治軍于北京翰林修撰路鐸恐其復相因他事奏持國奸邪金主曰朕豈以此人復為相耶持國尋死據此則持國並未復為參知政事續綱目誤今削之舊內族襄本名按實古納孫路鐸字宣叔冀州人按作唵實古納舊作什古乃今改後倣此冬十一月太皇太后吳氏崩諡曰憲聖慈烈十二月籍僞學罷吏部侍郎黃由字子由長洲人知綿州王沇上疏乞置僞學之籍仍自今曽受僞學舉薦關升及刑法亷吏自代之人並令省部籍記姓名與閒慢差遣從之于是僞學得罪者凡五十九人宰執則有趙汝愚留正周必大王藺等四人待制以上則有朱熹徐誼彭龜年陳傅良薛叔似章頴鄭湜樓鑰林大中黃由黃黼何異孫逢吉等十三人餘官則有劉光祖吕祖儉葉適楊芳項安世李􅐉沈有開曽三聘游仲鴻吳獵李祥楊簡趙汝讜趙汝談陳峴范仲黼汪逵孫元卿袁燮陳武田淡黃度張體仁蔡幼學黃皓周南吳柔勝王厚之孟浩趙鞏白炎震等三十一人武臣則有皇甫斌危仲壬張致逺等三人士人則有楊宏中周端朝張衜林仲麟蔣傳徐範蔡元定吕祖泰等八人何異字同叔撫州崇仁人李􅐉燾之子曽三聘字無逸臨江新淦人趙汝讜字蹈中趙汝談字履常陳峴字夀南溫州平陽人周南字南仲平江人吳桑勝字勝之宣州人張致逺字里無考與紹興中官侍御史者當别是一人吕祖泰字泰然祖儉從弟黃由上言人主不可待天下以黨與不必置籍以示不廣殿中侍御史張巖字肖翁大梁人徙家揚州劾由阿附罷之而擢沇為利州路轉運判官戊午四年金承安三年春正月以葉翥同知樞密院事詔有司寬恤兩浙江淮荆湖四川流民三月葬憲聖慈烈皇后夏五月加韓托胄少傅封豫國公詔嚴僞學之禁先是張釡請下詔禁僞學姚愈復上言近世行險僥幸之徒倡為道學之名權臣力主其說結為死黨願下明詔播告天下于是命直學士院髙文虎字炳如四明人草詔諭告宜各改視回聽毋復借疑似之說以惑亂世俗詔既下韓托胄大喜即遷文虎愈于要職秋七月葉翥罷八月以謝深甫知樞密院事許及之字深甫溫州永嘉人同知院事許及之為吏部尚書諂事托胄無所不至居二年不遷見托胄流涕叙其知遇之意衰遲之狀不覺屈滕托胄惻然憐之故有是命托胄嘗值生辰羣公上夀既畢集及之適後至閽人掩關拒之及之大窘㑹門閘未及閉遂俯僂而入當持有由竇尚書屈滕執政之語傳以為笑育太祖十世孫與願于宫中賜名曮帝未有嗣京鏜等請擇宗室子育之詔育燕懿王德昭九世孫與願于宫中年六嵗矣尋以為福州觀察使賜名曮封衛國公以趙師􅋷字從善燕懿王八世孫為工部侍郎師􅋷附韓托胄得知臨安府托胄生日百官爭貢珍異師􅋷最後至出小合曰願獻小果核侑觴啓之乃粟金蒲桃小架上綴大珠百餘顆衆慙沮托胄有愛妾張談王陳四人皆封郡夫人其次有名位者又十人或獻北珠冠四枚于托胄托胄以遺四夫人其十人亦欲之未有以應也師􅋷聞之亟市北珠製十冠以獻十人者喜為求遷官拜工部侍郎托胄嘗與衆客飲南園過山莊顧竹籬草舍曰此真田舍間氣象但缺犬吠雞鳴耳俄聞犬嘷叢薄視之乃師􅋷也托胄大笑聞者莫不鄙之冬十月金造承安寶貨己未五年金承安四年春正月奪前起居舍人彭龜年等官初趙汝愚定䇿時樞密院直省官蔡璉從旁竊聽因而漏言汝愚竄之既而逃還臨安韓托胄聞之乃使璉誣告汝愚定䇿時有異謀具列賔僚所言凡七十餘紙詔下大理捕鞫彭龜年曽三聘沈有開葉適項安世等以實其事奪龜年三聘官而擢璉進義副尉二月放主管王虛觀劉光祖于房州光祖撰涪州學記謂學者明聖人之道以修其身而世方以道為僞以學為棄物好惡出于一時是非定于萬世諫議大夫張釡劾光祖佐逆不成蓄憤懷姦欺世罔上詔落職房州居住夏五月行統天歷先是詔造新歷至是成賜名統天蓋自建隆迄慶元二百五十年間歷十四變上距黃帝之歷凡五十變矣議者謂自渡江以來統天新歷尤疏謬秋八月帝始朝太上皇于夀康宫太上皇疾平帝率羣臣詣夀康宫上夀成禮而還明日羣臣以過宫上夀禮成奉表稱賀九月加韓托胄少師封平原郡王是嵗諸州大水庚申六年金承安五年春閏二月以京鏜謝深甫為左右丞相何淡知樞密院事初淳煕中鏜以使金守禮遂見擢用事具前及帥蜀罷征斂斬瀘州卒之殺太守者蜀以大治既與趙汝愚有隙事亦見前為韓托胄所引遂大變其守于國事無可否又薦劉德秀排擊善類士論醜之未幾卒三月故祕閣修撰朱熹卒嘉定二年諡曰文時攻僞學日急熹與諸生講學不休或有勸其謝遣生徒者笑而不答疾且革正坐整衣冠就寢而卒年七十一熹所著有易本義啓䝉蓍卦考誤詩集傳大學中庸章句或問論語孟子集注太極圖通書西銘解楚辭集注辨正韓文考異所編次有論孟集義孟子指要中庸輯略孝經刋誤小學書通鑑綱目宋名臣言行録家禮近思録河南程氏遺書伊洛淵源録儀禮經傳通解其門人不可勝計最知名者黃幹李燔字敬之南康建昌人張洽字元德臨江清江人陳淳字安卿漳州龍溪人李方子字公晦昭武人黃灝字商伯南康都昌人輔廣字漢卿本河朔人後居秀州蔡沈黃幹歷知臨川新淦兩縣又知安慶府漢陽軍和州所至皆有異政在安慶日金人已破光山民震恐韓請于朝城安慶以資捭禦後江水暴至又以城堅免于漯溺舒人德之幹嘗入荆湖幕府奔走諸關與江淮豪傑游幹倜儻有謀軍民之心翕然歸向權要忌之㑹召幹赴行在為御史李楠所劾幹遂歸里弟子口盛編著禮書卒贈朝奉郎李燔初授嶽州教授教士不因時好且曰古人皆通材用則文武兼焉故即武學諸生文振而議髙者拔之闢射圃令習射廪老將之長于藝者率之後除大理司直辭尋差江西運司幹辦公事㑹洞寇作亂燔請于帥臣自往駐兵守險馳辨士諭賊禍福皆帖服復改官潭州通判真德秀帥長沙一府之事皆咨燔不數日辭歸紹定中理宗論及髙士史臣李心傳以燔對不果召卒贈直文華閣張洽初授松滋尉湖右經界不正洽請行推排法吏奸無所匿改袁州司理參軍尋知永新縣湖冦作亂與縣接壤民大恐洽單車以往延見隅官訪利害而犒之又結約土豪得其歡心寇聞有備乃去端平初用薦召赴都堂審察不至將以說書待之洽固辭遂除直祕閣卒陳享性至孝篤于內行雖不用于世而憂時論事感慨動人以持奏恩授安溪主簿未上而卒李方子入太學廷對擢第三調泉州觀察推官守真德秀以師友禮之故事秩滿必先通書廟堂方子曰是求也丞相史彌逺聞之怒踰年始除國子録無何將選入宫僚方子不少貶彌逺使臺臣劾之遂罷黃灝知德化縣以薦除登聞鼓院歷太常寺丞出知常州提舉本路常乎時荐飢有旨停閣夏稅灝奏乞併停秋稅不俟報行之言者罪其専削兩秩而從其請熹之卒也黨禁方厲灝單車往赴無所顧云蔡沈始其從其父元定謫道州父殁徒步護喪以歸有遺之金者輒謝之曰不忍纍先人也年三十屏棄舉子業隱居九峯著書傳真德秀字景元浦城人李心傳字微之舜臣之子史彌逺字同叔浩之子新淦漢縣今屬臨江府安慶府漢廬江郡地宋慶元初改德慶軍曰安慶府今𨽻安徽省漢陽軍唐置今湖北漢陽府是松滋晉縣今屬荆州府永新縣孫吳置今屬吉安府安溪縣宋置今屬泉州府德化縣五代王閩置今屬永春州餘注俱見前夏六月乙酉朔日食太上皇后李氏崩諡曰慈懿詔權欑于修吉寺秋七月以陳自强字勉之福州閩縣人簽書樞密院事自强嘗為韓托胄童子師托胄當國自强入都待銓托胄諷從官論薦之即除太學録由選人至樞府裁四年八月太上皇崩九月處士吕祖泰上書請誅韓托胄詔配祖泰于欽州牢城貶周必大為少保祖泰論世事無忌諱先是祖儉以事貶祖泰語其友曰自我兄之貶諸人箝口我雖無位義必以言報國當少須之今亦未敢以纍我兄也至是祖儉卒祖泰乃擊登聞鼓上書論韓托胄有無君之心請誅之以防禍亂略曰道學自古所恃以為國者也丞相汝愚今之有大勳勞者也立僞學之禁逐汝愚之黨是將空陛下之國而陛下不知悟耶陳自强韓托胄童稚之師躐至宰輔陛下舊學之臣彭龜年等今安在耶蘇師旦平江之吏胥周筠韓氏之厮役人人知之今師旦以潛邸隨龍筠以皇后親屬俱得大官不知陛下在潛邸時果識師旦乎椒房之親果有筠乎托胄徒自尊大而卑陵朝廷一至于此願急誅托胄師旦筠而逐罷自强之徒故大臣在者獨周必大可用宜以代之不然事將不測書出中外大駭有旨祖泰挾私上書語言狂妄拘管連州右諫議大夫程松字冬老池州青陽人與祖泰狎友懼曰人知我與遊共謂我與聞乎乃獨奏言祖泰有當誅之罪且其上書必有教之者今縱不殺猶當杖黥竄之逺方殿中侍御史陳讜字仲甫莆田人亦以為言乃杖祖泰一百配欽州收管祖泰既得罪監察御史林采言僞習之成造端自周必大宜加貶削施康年亦言必大首倡僞徒私植黨與遂貶必大為少保冬十月加韓托胄太傅十一月皇后韓氏崩諡曰恭淑詔權欑于廣教寺十二月葬永崇陵史臣曰光宗幼有令聞嚮用儒雅即位之初總權綱屏嬖幸薄賦寬刑有可觀者及夫宫幃妬悍閹寺交搆驚憂致疾孝飬曰怠孝宗之業哀矣辛酉嘉泰元年金泰和元年春三月臨安大火四日乃滅焚燒民居五萬三千餘家自渡江以來都城火災未有如是嵗者帝下詔罪已避殿減膳出內府錢十六萬米六萬餘斛分賜被火之家秋七月何淡罷以陳自强參知政事張釡簽書樞密院事時吳廷子曦為殿前副都指揮使曦自以世守西國藩屏而身留行都不得如志乃賄賂宰輔規圖帥蜀未及賂淡韓托胄已許之淡持不可托胄怒曰始以君肯相就黜僞學汲引至此今顧立異耶遂罷奉祠淡急于榮進阿附托胄斥逐善類賢士為之一空士論罪之以吳曦為興州都統制曦至鎮譖副都統制王大節罷之更不除副帥于是兵權悉歸于曦矣自紹興末王人出總蜀賦移牒宣司勢均禮敵曦至蜀未幾托胄以總計𨽻宣撫副使得節制按劾而財賦之權又歸于曦于是異志遂成矣大旱八月張釡罷以張巖恭知政事程松同知樞密院事皆附韓托胄者松諂托胄尤甚自知錢塘縣不二年為諫議大夫滿嵗未遷殊怏怏乃市一妾獻之名曰松夀托胄曰奈何與大諫同名答曰欲使賤名常逹鈞聽耳托胄憐之遂除同知樞密院事奈曼韃靼别部方輿紀要云在葱嶺西南按奈曼舊作乃蠻今改後仿此襲西遼滅之自宋徽宗宣和七年西遼大石稱帝歷三傳乃滅凡七十八年西遼主珠勒呼出獵奈曼王庫楚類舊作屈出律伏兵八千擒之而據其位尊珠勒呼為太上皇朝夕問起居珠勒呼尋死遼祀遂絶壬戌二年金泰和二年春正月以蘇師旦兼樞密都承旨初韓托胄為平江府兵馬鈐轄時師旦以筆吏事之托胄愛其辨慧帝登極竄姓名于藩邸吏士內遂以隨龍恩得官至是權勢日盛二月弛僞學黨禁復諸貶謫者官僞學之禍雖本于韓托胄欲去異已以快所私然實京鏜創謀而何淡劉德秀胡紘成之及鏜死三人亦罷托胄厭前事之乖戾欲稍更改以消中外之議㑹張孝伯謂托胄曰不弛黨禁恐後不免報復之禍籍田令陳景思故相康伯之孫托胄之姻也亦謂托胄勿為己甚托胄然之于是趙汝愚追復資政殿學士黨人見在者咸先後復官自便時朱熹沒己踰年周必大留正各已貶秩致仕詔熹以待制致仕必大復少傅正復少保禁私史有商人私持起居郎熊克中興小歷及九朝通略等書欲渡淮旴𣅿軍以聞遂命諸道察郡邑書坊所鬻書有事干國體者悉令毁棄言者因請取禮部員外郎李燾續通鑑長編知龍州王稱東都事略監都鹽倉李丙丁未録及通略録語家傳等書下史官考訂或有禆于公議即乞存留不許刋行從之夏五月甲辰朔日食秋七月程松罷八月以袁說友字起巖建安人同知樞密院事冬十月月以陳自强知樞密院事許及之𠫭知政事十二月立貴妃楊氏為皇后后少以姿容選入宫帝即位封媫妤韓后崩中宫未有所屬時后為貴妃與曹美人俱有寵韓托胄以后頗涉書史知古今性警敏任權術而曹美人柔順勸帝立曹氏帝不從竟立后由是后與托胄有怨加韓托胄太師先是監惠民局夏允中上書請依文彥博故事以托胄平章軍國重事托胄謬為辭謝乞致仕詔不許而罷允中至是進位太師是嵗大蝗癸亥三年金泰和三年春正月謝深甫罷初深甫力求罷政帝曰卿能為朕守法度惜名器不可言去至是固請乃許之夏四月己亥朔日食五月以陳自强為右丞相許及之知樞密院事時托胄専權凡所欲為宰執惕息不敢為異自强至印空名勑劄授之惟所欲為宰執不預知也言路厄塞每月按舉小吏一二人謂之月課又有泛論君德時事皆取其陳熟緩漫略無攖拂者言之或問之則愧謝曰聊以塞責耳自强性貪鄙四方致書餽必題其緘云某物若干并獻凡書題無并字則不聞縱子弟親戚關通貨賄仕進干請必諧價而後豫都城大火自强所貯一夕煨燼托胄首遺之萬緡執政列郡聞之皆有助不數月得六十萬緡遂倍所失之數嘗語人曰自强惟一死以報師王每稱托胄為恩主恩父蘇師旦為叔堂吏史逹祖為兄托胄姦宄専國自强表裏之功為多史逹祖字邦卿汴人秋七月造戰艦八月增置襄陽騎軍尋又置澉浦在今浙江嘉興府海鹽縣南水經注谷水于縣出為澉浦以通巨海即此水軍甲子四年金泰和四年春正月韓托胄定議伐金金自明昌末北部哈逹錦舊作合底欣今改與桑節衮舊作山只衮今改恃彊擾邊又有光嘉喇舊作廣吉剌今改者尤桀驁屢脅諸部入塞而卓木布舊作阻䪁今改亦叛連嵗用兵饋餉空乏洎諸部平定先命瓜爾佳清臣討之失利遂以內族襄代將又命內族宗浩駐泰州宗浩分兵奮擊諸部多降瓜爾佳清臣本名阿卜薩和囉噶路罕都入宗浩字師孟本名老昭祖四世孫泰州遼置金承安二年移州于長春縣今為䝉古郭爾羅斯旗地按阿卜薩舊作阿不沙和囉噶路罕都舊作胡里改路桓篤今並改又築濠壘備戌守議者謂金勢已弱有勸韓托胄立不世勳以自固者托胄然之遂議恢復聚財募卒出封樁庫金萬兩以待賞功命吳曦練兵西蜀既而安豐守臣厲仲方言淮北流民咸願歸附浙東安撫使辛棄疾入見言金國必亂亡願屬元老大臣備兵為倉卒應變之計托胄大喜鄭挺鄧友龍等又附和其說托胄用師之意益鋭矣三月臨安大火延及太廟帝下詔罪已詔百官陳時政闕失夏四月許及之罷以張孝伯參知政事錢象祖同知樞密院事時兵端開韓托胄欲令及之守金陵及之辭不行遂罷孝伯尋亦罷以張巖參知政事五月追封嶽飛為鄂王先是賜諡武穆至是韓托胄欲風厲諸將乃追封飛尋封劉光世為鄜王贈字文虛中少保十二月詔宰相兼國用使韓托胄議恢復陳自强請遵孝宗典故創國用司總核內外財賦遂以自强兼國用使費士寅張巖同知國用事掊克民財州郡騷動乙丑開禧元年金泰和五年春三月費士寅罷士寅于嘉泰三年十月恭知政事夏四月以錢象祖參知政事劉德秀簽書樞密院事韓托胄欲以士寅鎮興元為宣威之漸士寅固辭遂罷以皇甫斌知襄陽府尋以斌為七路招撫副使竄武學生華嶽字子西貴池人于建寧嶽上書諫朝廷未宜用兵啓邊釁且乞斬韓托胄蘇師旦周筠以謝天下托胄大怒下嶽大理編管建寧五月金以布薩揆本名臨喜其先上京人左丞相忠義之子為河南宣撫使金主聞南朝將用兵召諸大臣問之皆曰宋敗衄之餘自救不暇恐不敢叛盟完顔匡本名薩克素始祖九世孫按薩克素舊作撒速今改後仿此獨曰彼置忠義保捷軍取先世開寶天禧紀元豈忘中國者哉金主然之乃命平章璞薩揆宣撫㑹兵于汴以備之揆至汴移文來責敗盟三省摳密院答言邊臣生事已行貶黜所置兵亦已抽去揆信之白于金主時金羣臣皆勸先舉金主南北和好四十餘年民不知兵不可及聞揆言遂命罷宣撫使及新置兵事在八月秋七月詔韓托胄平章軍國事從陳自强鄧友龍等請也命托胄三日一朝赴都堂治事論者謂托胄繫銜比吕夷簡省同字則其體尤尊比文彥博省重字則其所與者廣于是三省印並納其第托胄置機速房于私第甚者假作御筆升黜將帥事關機要未嘗奏禀人莫敢言以蘇師旦為安逺節度使領閣門事韓托胄昵師旦為腹心故有是除八月以郭倪知揚州尋兼山東京東招撫使九月劉德秀罷遣使如金韓托胄欲審金人虛實故遣陳景俊往賀正旦景俊還金主諭之曰大定初世宗許宋世為姪國朕遵守至今豈意爾國屢犯我邊以此遣大臣宣撫河南及得爾國公移朕即罷司而爾國侵擾益甚朕惟和好嵗久委曲涵容恐姪宋皇帝或未詳知卿歸國當具言之景俊還以告陳自强自强戒勿言由是用兵益決未幾金使太常卿趙之傑來賀正旦入見韓托胄故使贊者犯金主父嫌名以桃之之傑遂倨慢托胄請帝還內著作郎朱質乞斬金使不報以邱崈為江淮宣撫使崈辭不拜初韓托胄以北伐之議示崈崈曰中原淪陷且百年在我固不可一日而忘然兵凶戰危若首倡非常之舉兵交勝負未可知則首事之禍其誰任之必有誇誕貪進之人攘臂以僥幸萬一宜亟斥絶不然必誤國矣托胄不納至是命崈宣撫江淮崈手書切諫曰金人未必有意敗盟中國當示大體宜申警軍實使吾常有勝勢若釁自彼作我有詞矣因力辭不拜托胄不悅御批歷代通鑑輯覽卷八十九
